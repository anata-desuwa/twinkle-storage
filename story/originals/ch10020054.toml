[[dialogue]]
speaker = "unk"
# 第４話,お姉ちゃんと癒されたい,P
line = "第４話,お姉ちゃんと癒されたい,P"

[[dialogue]]
speaker = "unk"
# その日、俺はトレーニング施設で長い時間訓練した後、星徒会室に戻ってきていた。
line = "その日、俺はトレーニング施設で長い時間訓練した後、星徒会室に戻ってきていた。"

[[dialogue]]
speaker = "サーシャ"
# 「あらっ、会長くん、おかえりなさ～い♪」
line = "「あらっ、会長くん、おかえりなさ～い♪」"

[[dialogue]]
speaker = "unk"
# 星徒会室に入ると明かりが点いており、遅い時間にも関わらず、サーシャさんが１人で待っていた。
line = "星徒会室に入ると明かりが点いており、遅い時間にも関わらず、サーシャさんが１人で待っていた。"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、フラフラでお疲れの顔をしているわ。大丈夫？」
line = "「会長くん、フラフラでお疲れの顔をしているわ。大丈夫？」"

[[dialogue]]
speaker = "unk"
# 新しい力の制御がなかなか上手く行かなくて
line = "新しい力の制御がなかなか上手く行かなくて"

[[dialogue]]
speaker = "サーシャ"
# 「そう、それでずっと頑張ってたのね。よしよし♪」
line = "「そう、それでずっと頑張ってたのね。よしよし♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ねぇ、会長くん、もうみんな帰っちゃったし、２人きりの時ぐらい、お姉ちゃんに甘えていいのよ？」
line = "「ねぇ、会長くん、もうみんな帰っちゃったし、２人きりの時ぐらい、お姉ちゃんに甘えていいのよ？」"

[[dialogue]]
speaker = "サーシャ"
# 「――ふふっ、違うでしょ、会長くん？　サーシャさんじゃなくて、お姉ちゃんに甘えたい時は、なんて言うんだっけ？」
line = "「――ふふっ、違うでしょ、会長くん？　サーシャさんじゃなくて、お姉ちゃんに甘えたい時は、なんて言うんだっけ？」"

[[dialogue]]
speaker = "unk"
# お、お姉ちゃん……
line = "お、お姉ちゃん……"

[[dialogue]]
speaker = "サーシャ"
# 「は～い<emoji=heart04>　よくできました<emoji=heart04>」
line = "「は～い<emoji=heart04>　よくできました<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「じゃあ……会長くんが大好きなパフパフ、してあげるわね<emoji=heart04>」
line = "「じゃあ……会長くんが大好きなパフパフ、してあげるわね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ソファーへ移動し、サーシャさんが先に腰かける。その横に、向かい合う形で腰を下ろすと――
line = "ソファーへ移動し、サーシャさんが先に腰かける。その横に、向かい合う形で腰を下ろすと――"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、今日も１日お疲れ様<emoji=heart04>　ぎゅぅ～っ<emoji=heart04>」
line = "「会長くん、今日も１日お疲れ様<emoji=heart04>　ぎゅぅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サーシャさんはちょっと露出した制服の胸元のネクタイを緩め、シャツのボタンを緩めると……
line = "サーシャさんはちょっと露出した制服の胸元のネクタイを緩め、シャツのボタンを緩めると……"

[[dialogue]]
speaker = "unk"
# 俺の顔面をおっぱいで挟み込み、左右の乳房で顔をマッサージするように抱きかかえる。
line = "俺の顔面をおっぱいで挟み込み、左右の乳房で顔をマッサージするように抱きかかえる。"

[[dialogue]]
speaker = "サーシャ"
# 「私が『お姉ちゃん』って呼ばれたいって趣味に付き合ってくれて、会長くん、本当に優しい<emoji=heart04>」
line = "「私が『お姉ちゃん』って呼ばれたいって趣味に付き合ってくれて、会長くん、本当に優しい<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「恋人の好みに付き合ってくれる、優しい『弟くん』のこと、今日もたくさん癒してあげたいな～」
line = "「恋人の好みに付き合ってくれる、優しい『弟くん』のこと、今日もたくさん癒してあげたいな～」"

[[dialogue]]
speaker = "unk"
# ──別に、お姉ちゃんの趣味に付き合ってるだけじゃないよ、と俺は告げる。
line = "──別に、お姉ちゃんの趣味に付き合ってるだけじゃないよ、と俺は告げる。"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ♪　ひょっとして会長くんの中でも、お姉ちゃんに甘えるの、気持ちよくなってきちゃった？」
line = "「ふふふ♪　ひょっとして会長くんの中でも、お姉ちゃんに甘えるの、気持ちよくなってきちゃった？」"

[[dialogue]]
speaker = "サーシャ"
# 「もしそうだったら、お姉ちゃんも嬉しい<emoji=heart04>」
line = "「もしそうだったら、お姉ちゃんも嬉しい<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺がおっぱいの中でこくんと頷くと、サーシャさんは俺の頭を優しく撫でてきて……
line = "俺がおっぱいの中でこくんと頷くと、サーシャさんは俺の頭を優しく撫でてきて……"

[[dialogue]]
speaker = "サーシャ"
# 「そっか、そっか～<emoji=heart04>　じゃあ私たち、すっごくお似合いのカップルってことね<emoji=heart04>　うふふっ♪」
line = "「そっか、そっか～<emoji=heart04>　じゃあ私たち、すっごくお似合いのカップルってことね<emoji=heart04>　うふふっ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あのね、このままパフパフしててもいいんだけど……お姉ちゃん、ちょっと勉強してきたことがあるの。試してみても、いい？」
line = "「あのね、このままパフパフしててもいいんだけど……お姉ちゃん、ちょっと勉強してきたことがあるの。試してみても、いい？」"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃあ、会長くん。マッサージ行くわよ～<emoji=heart04>」
line = "「それじゃあ、会長くん。マッサージ行くわよ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺がソファーにうつ伏せで身を預けると、サーシャさんが腰の上にそっとまたがり、マッサージをしてくれることになった。
line = "俺がソファーにうつ伏せで身を預けると、サーシャさんが腰の上にそっとまたがり、マッサージをしてくれることになった。"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふっ<emoji=heart04>　会長くん、可愛い声が出てるわよ？　お姉ちゃんの手で触られて、気持ちよくなっちゃったのかしら～？」
line = "「あらあら、うふふっ<emoji=heart04>　会長くん、可愛い声が出てるわよ？　お姉ちゃんの手で触られて、気持ちよくなっちゃったのかしら～？」"

[[dialogue]]
speaker = "unk"
# サーシャさんはちょっとふざけた調子で言っているが、本当に気持ちがいい。
line = "サーシャさんはちょっとふざけた調子で言っているが、本当に気持ちがいい。"

[[dialogue]]
speaker = "unk"
# いやらしいスキンシップというわけではなく、本当に疲労回復が見込める、ちゃんとしたマッサージだった。
line = "いやらしいスキンシップというわけではなく、本当に疲労回復が見込める、ちゃんとしたマッサージだった。"

[[dialogue]]
speaker = "unk"
# かなり本格的だけど、一体どこで……？
line = "かなり本格的だけど、一体どこで……？"

[[dialogue]]
speaker = "サーシャ"
# 「実は、会長くんに喜んでほしくて、本を読んで勉強してみたの～」
line = "「実は、会長くんに喜んでほしくて、本を読んで勉強してみたの～」"

[[dialogue]]
speaker = "サーシャ"
# 「最近、会長くんが遅くまでトレーニングしてることがあるから、疲れが翌日まで残らないように、マッサージで癒せたらなって♪」
line = "「最近、会長くんが遅くまでトレーニングしてることがあるから、疲れが翌日まで残らないように、マッサージで癒せたらなって♪」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　もちろん、大好きな会長くんの体を合法的に触りたい、っていう下心込みよ<emoji=heart04>」
line = "「うふふ♪　もちろん、大好きな会長くんの体を合法的に触りたい、っていう下心込みよ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「疲れも取れて、イチャイチャもできるなんて、一石二鳥でしょう？」
line = "「疲れも取れて、イチャイチャもできるなんて、一石二鳥でしょう？」"

[[dialogue]]
speaker = "unk"
# これ、後で俺にもやり方教えてください
line = "これ、後で俺にもやり方教えてください"

[[dialogue]]
speaker = "unk"
# 気持ちよくて、本当に癒される……。
line = "気持ちよくて、本当に癒される……。"

[[dialogue]]
speaker = "サーシャ"
# 「あら、どうして？」
line = "「あら、どうして？」"

[[dialogue]]
speaker = "unk"
# ──今度、サーシャさんがお疲れの時は俺がやってあげたい、と伝えると、サーシャさんは嬉しそうに目を細める。
line = "──今度、サーシャさんがお疲れの時は俺がやってあげたい、と伝えると、サーシャさんは嬉しそうに目を細める。"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　すごく嬉しいわ<emoji=heart04>」
line = "「あらあら、うふふ♪　すごく嬉しいわ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「疲労回復効果がありつつ、大好きな会長くんに体を隅々まで触ってもらえちゃうなんて……一石二鳥ね<emoji=heart04>」
line = "「疲労回復効果がありつつ、大好きな会長くんに体を隅々まで触ってもらえちゃうなんて……一石二鳥ね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ──それを言うなら俺だって、大好きなサーシャさんに合法的に触れて一石三鳥だ。そう伝えると……
line = "──それを言うなら俺だって、大好きなサーシャさんに合法的に触れて一石三鳥だ。そう伝えると……"

[[dialogue]]
speaker = "サーシャ"
# 「あんっ<emoji=heart04>　なんだかその台詞、すっごくキュンって来ちゃった<emoji=heart04>」
line = "「あんっ<emoji=heart04>　なんだかその台詞、すっごくキュンって来ちゃった<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# サーシャさんは俺の背中に柔らかな胸を押し付けてきながら、耳元へ甘い声音でささやく。
line = "サーシャさんは俺の背中に柔らかな胸を押し付けてきながら、耳元へ甘い声音でささやく。"

[[dialogue]]
speaker = "サーシャ"
# 「ねぇ、会長くん……お姉ちゃん、キスしちゃってもいい？」
line = "「ねぇ、会長くん……お姉ちゃん、キスしちゃってもいい？」"

[[dialogue]]
speaker = "unk"
# サーシャさんの言葉にうなずくよりも先に、俺はゆっくりと体を起こすと、腰に手を添えて視線を重ねた。
line = "サーシャさんの言葉にうなずくよりも先に、俺はゆっくりと体を起こすと、腰に手を添えて視線を重ねた。"

[[dialogue]]
speaker = "サーシャ"
# 「あっ……<emoji=heart04>　会長くん……んっ<emoji=heart04>」
line = "「あっ……<emoji=heart04>　会長くん……んっ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「ちゅっ<emoji=heart04>　はあぁ……<emoji=heart04>　んちゅ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　はあぁ……<emoji=heart04>　んちゅ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ……お姉ちゃんがリードしたかったのに、先にキスされちゃったわ<emoji=heart04>」
line = "「ふふっ……お姉ちゃんがリードしたかったのに、先にキスされちゃったわ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なら今度は、お姉ちゃんからキスして下さい
line = "なら今度は、お姉ちゃんからキスして下さい"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、本当に甘え上手になって、お姉ちゃん好みの彼氏さんになっちゃったわね<emoji=heart04>」
line = "「あらあら、本当に甘え上手になって、お姉ちゃん好みの彼氏さんになっちゃったわね<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「ちゅっ……<emoji=heart04>　大好きよ、会長くん<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　大好きよ、会長くん<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「あっ……うふふっ<emoji=heart04>　今度は前からマッサージ、する？」
line = "「あっ……うふふっ<emoji=heart04>　今度は前からマッサージ、する？」"

[[dialogue]]
speaker = "サーシャ"
# 「ほら、こことか、固くなってるわよ<emoji=heart04>　お姉ちゃんが柔らかくなるまで、してあげるわね<emoji=heart04>」
line = "「ほら、こことか、固くなってるわよ<emoji=heart04>　お姉ちゃんが柔らかくなるまで、してあげるわね<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「んっ……ちゅっ<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 触れ合うぬくもりに時を忘れて、俺たちはただ、甘やかな夜に溶けていくのだった。
line = "触れ合うぬくもりに時を忘れて、俺たちはただ、甘やかな夜に溶けていくのだった。"
