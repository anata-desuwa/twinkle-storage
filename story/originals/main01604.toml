[[dialogue]]
speaker = "unk"
# 第５話,星見の長女、その使命,B
line = "第５話,星見の長女、その使命,B"

[[dialogue]]
speaker = "unk"
# フィオナと敵対することに、一瞬の躊躇いを見せるアポロ。
line = "フィオナと敵対することに、一瞬の躊躇いを見せるアポロ。"

[[dialogue]]
speaker = "unk"
# フィオナは俺と同じ魔王の系譜。だが、決して平行世界の根源ではない。
line = "フィオナは俺と同じ魔王の系譜。だが、決して平行世界の根源ではない。"

[[dialogue]]
speaker = "アポロ"
# 「そ……そうだ。ソイツだって……オマエの仲間には違いないだろう！」
line = "「そ……そうだ。ソイツだって……オマエの仲間には違いないだろう！」"

[[dialogue]]
speaker = "unk"
# アポロは苦々しげにフィオナを見つめる。
line = "アポロは苦々しげにフィオナを見つめる。"

[[dialogue]]
speaker = "unk"
# 彼女の中にもまだ、葛藤が残っているようだった。
line = "彼女の中にもまだ、葛藤が残っているようだった。"

[[dialogue]]
speaker = "フィオナ"
# 「……ふう」
line = "「……ふう」"

[[dialogue]]
speaker = "フィオナ"
# 「無理しなくていいんですよ、姉さん」
line = "「無理しなくていいんですよ、姉さん」"

[[dialogue]]
speaker = "アポロ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# そしてフィオナは──何もかも包み込むように、優しく笑った。
line = "そしてフィオナは──何もかも包み込むように、優しく笑った。"

[[dialogue]]
speaker = "フィオナ"
# 「『使徒』としてのあなたの志は──十分に理解しました」
line = "「『使徒』としてのあなたの志は──十分に理解しました」"

[[dialogue]]
speaker = "フィオナ"
# 「──けれど。それはあくまで、仮面があなたに貼りつけたペルソナでしかないはずです」
line = "「──けれど。それはあくまで、仮面があなたに貼りつけたペルソナでしかないはずです」"

[[dialogue]]
speaker = "フィオナ"
# 「本当の、優しかった姉さんなら、今のあなたの行為を望んだはずがない」
line = "「本当の、優しかった姉さんなら、今のあなたの行為を望んだはずがない」"

[[dialogue]]
speaker = "アポロ"
# 「……思い上がるな！」
line = "「……思い上がるな！」"

[[dialogue]]
speaker = "アポロ"
# 「あたしを人間だと思ってるのか？　勝てると思ってるのか？　話せば通じると思ってるのか？」
line = "「あたしを人間だと思ってるのか？　勝てると思ってるのか？　話せば通じると思ってるのか？」"

[[dialogue]]
speaker = "アポロ"
# 「見ただろ！　あたしは何度だって強くなる。人間じゃない。オマエ達なんかに勝てる相手じゃないんだ！」
line = "「見ただろ！　あたしは何度だって強くなる。人間じゃない。オマエ達なんかに勝てる相手じゃないんだ！」"

[[dialogue]]
speaker = "フィオナ"
# 「思い上がってなどいません。私が硬く信じているのは、私と姉さんの絆です」
line = "「思い上がってなどいません。私が硬く信じているのは、私と姉さんの絆です」"

[[dialogue]]
speaker = "アポロ"
# 「なんだと……？」
line = "「なんだと……？」"

[[dialogue]]
speaker = "クロト"
# 「確かに……俺たちじゃ、無限に再創生を続けられる君には勝てないかもしれない」
line = "「確かに……俺たちじゃ、無限に再創生を続けられる君には勝てないかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「だけど──君自身が殻を破ることは、できるはずだ」
line = "「だけど──君自身が殻を破ることは、できるはずだ」"

[[dialogue]]
speaker = "アポロ"
# 「……っ！」
line = "「……っ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、そうです。姉さん──あなた自身なら、打ち勝てるはずなんです。リクリエの使徒に！」
line = "「ええ、そうです。姉さん──あなた自身なら、打ち勝てるはずなんです。リクリエの使徒に！」"

[[dialogue]]
speaker = "アポロ"
# 「あたしが──あたしに、だと……？」
line = "「あたしが──あたしに、だと……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あんたにもし、お姉さんとしての心が残ってるなら──」
line = "「あんたにもし、お姉さんとしての心が残ってるなら──」"

[[dialogue]]
speaker = "セーラ"
# 「現状、一番ワンチャンあるよね」
line = "「現状、一番ワンチャンあるよね」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　わたしのような者の言葉は、届かないかもしれませんが……！」
line = "「はい！　わたしのような者の言葉は、届かないかもしれませんが……！」"

[[dialogue]]
speaker = "unk"
# 無理でも──内からなら。
line = "無理でも──内からなら。"

[[dialogue]]
speaker = "unk"
# あの強固な仮面の外殻を、打ち崩せるかも知れない。俺たちはみんなそう信じている。
line = "あの強固な仮面の外殻を、打ち崩せるかも知れない。俺たちはみんなそう信じている。"

[[dialogue]]
speaker = "アポロ"
# 「……フ」
line = "「……フ」"

[[dialogue]]
speaker = "アポロ"
# 「姉としての心……か」
line = "「姉としての心……か」"

[[dialogue]]
speaker = "アポロ"
# 「確かに……いくつか、思い出せる断片はある。ギエルにもそう語った」
line = "「確かに……いくつか、思い出せる断片はある。ギエルにもそう語った」"

[[dialogue]]
speaker = "アポロ"
# 「姉妹で一緒に寝たり、ごっこ遊びをしたりな。懐かしいなんて気持ちもある」
line = "「姉妹で一緒に寝たり、ごっこ遊びをしたりな。懐かしいなんて気持ちもある」"

[[dialogue]]
speaker = "フィオナ"
# 「なら……！」
line = "「なら……！」"

[[dialogue]]
speaker = "アポロ"
# 「──だけど。今のあたしは、アポロなんだ」
line = "「──だけど。今のあたしは、アポロなんだ」"

[[dialogue]]
speaker = "アポロ"
# 「今さら……星見という人間には、もう戻れない。あたしはもう、この世界に影響を及ぼしすぎた」
line = "「今さら……星見という人間には、もう戻れない。あたしはもう、この世界に影響を及ぼしすぎた」"

[[dialogue]]
speaker = "フィオナ"
# 「──姉、さん……」
line = "「──姉、さん……」"

[[dialogue]]
speaker = "unk"
# アポロは──ふっと儚げに笑った。
line = "アポロは──ふっと儚げに笑った。"

[[dialogue]]
speaker = "unk"
# そこにはどこか、諦めが滲んでいるようで……
line = "そこにはどこか、諦めが滲んでいるようで……"

[[dialogue]]
speaker = "アポロ"
# 「……いいだろう。昔話をしてやる。どうせ終わる、ごみ箱みたいな世界に捨て去っていくにはちょうどいい」
line = "「……いいだろう。昔話をしてやる。どうせ終わる、ごみ箱みたいな世界に捨て去っていくにはちょうどいい」"

[[dialogue]]
speaker = "unk"
# それから、とつとつと過去を語り始めた──
line = "それから、とつとつと過去を語り始めた──"

[[dialogue]]
speaker = "アポロ"
# 「──星見の家には定めがあった」
line = "「──星見の家には定めがあった」"

[[dialogue]]
speaker = "アポロ"
# 「『月の壁画』が伝わる星見家において、来たるリクリエの再来においては『魔王』を輩出すること──と」
line = "「『月の壁画』が伝わる星見家において、来たるリクリエの再来においては『魔王』を輩出すること──と」"

[[dialogue]]
speaker = "アポロ"
# 「そして、その使命は双子の長女に委ねられた」
line = "「そして、その使命は双子の長女に委ねられた」"

[[dialogue]]
speaker = "アポロ"
# 「双子の姉妹はよく２人で遊んだものだった。離れていた時の記憶さえ、思い当たらぬほどだ」
line = "「双子の姉妹はよく２人で遊んだものだった。離れていた時の記憶さえ、思い当たらぬほどだ」"

[[dialogue]]
speaker = "アポロ"
# 「だが……長女には魔王となる使命がある。やがて、妹に構っている暇はなくなっていった」
line = "「だが……長女には魔王となる使命がある。やがて、妹に構っている暇はなくなっていった」"

[[dialogue]]
speaker = "フィオナ"
# 「……あの頃……」
line = "「……あの頃……」"

[[dialogue]]
speaker = "unk"
# フィオナは唇を噛み締めていた。
line = "フィオナは唇を噛み締めていた。"

[[dialogue]]
speaker = "unk"
# 記憶のなかに、思い当たる節がいくつもあるのだろう。
line = "記憶のなかに、思い当たる節がいくつもあるのだろう。"

[[dialogue]]
speaker = "アポロ"
# 「星見の長女は早くより星とのリンクに成功していた。星騎士としてみれば、逸材と言ってよかったろう」
line = "「星見の長女は早くより星とのリンクに成功していた。星騎士としてみれば、逸材と言ってよかったろう」"

[[dialogue]]
speaker = "アポロ"
# 「そして本人もたゆまぬ鍛錬を続けていた。すでに一騎当千の実力は備えていたと言っていい」
line = "「そして本人もたゆまぬ鍛錬を続けていた。すでに一騎当千の実力は備えていたと言っていい」"

[[dialogue]]
speaker = "アポロ"
# 「だが……それでも、星見の長女は苦悩していた。魔王に求められる資質は、並大抵のものではなかったからだ」
line = "「だが……それでも、星見の長女は苦悩していた。魔王に求められる資質は、並大抵のものではなかったからだ」"

[[dialogue]]
speaker = "アポロ"
# 「世俗の人間がリクリエの脅威を正確に理解していたとは言い難い。３０００年前の厄災など、ほとんどが抽象的にしか語られてこなかった」
line = "「世俗の人間がリクリエの脅威を正確に理解していたとは言い難い。３０００年前の厄災など、ほとんどが抽象的にしか語られてこなかった」"

[[dialogue]]
speaker = "アポロ"
# 「だが星見の長女は違った。より詳細で、鮮明で、かつ抗わねばならない世界の危機をずっと聞かされてきたからこそ、重圧に耐えきれなかった」
line = "「だが星見の長女は違った。より詳細で、鮮明で、かつ抗わねばならない世界の危機をずっと聞かされてきたからこそ、重圧に耐えきれなかった」"

[[dialogue]]
speaker = "アポロ"
# 「学園の偉そうな連中がわざわざ成長具合を確かめにきたりな。当然、妹と遊んでいる場合などではなくなった」
line = "「学園の偉そうな連中がわざわざ成長具合を確かめにきたりな。当然、妹と遊んでいる場合などではなくなった」"

[[dialogue]]
speaker = "unk"
# アポロ──人間だった頃のアポロ──は、絶えずプレッシャーに押し潰されそうになっていたという。
line = "アポロ──人間だった頃のアポロ──は、絶えずプレッシャーに押し潰されそうになっていたという。"

[[dialogue]]
speaker = "unk"
# そして、運命の歯車が致命的に違えてしまったのは、その後で。
line = "そして、運命の歯車が致命的に違えてしまったのは、その後で。"

[[dialogue]]
speaker = "アポロ"
# 「そして──星見の長女は何度目かの誕生日を迎えた。それは、正式な『フィオナ』の襲名日だった」
line = "「そして──星見の長女は何度目かの誕生日を迎えた。それは、正式な『フィオナ』の襲名日だった」"

[[dialogue]]
speaker = "フィオナ"
# 「……っ……」
line = "「……っ……」"

[[dialogue]]
speaker = "unk"
# 隣のフィオナが息を呑んだ。それだけで、続く結末がわかった気がした。
line = "隣のフィオナが息を呑んだ。それだけで、続く結末がわかった気がした。"

[[dialogue]]
speaker = "アポロ"
# 「その日を境に──星見の長女は長い眠りについた」
line = "「その日を境に──星見の長女は長い眠りについた」"

[[dialogue]]
speaker = "アポロ"
# 「どうして？　さあ。だが、糸が切れてしまったんだろう」
line = "「どうして？　さあ。だが、糸が切れてしまったんだろう」"

[[dialogue]]
speaker = "アポロ"
# 「逃げたかったのだ。奴は。世界を救うまで終わらない、魔王という使命から」
line = "「逃げたかったのだ。奴は。世界を救うまで終わらない、魔王という使命から」"

[[dialogue]]
speaker = "アポロ"
# 「そして星見の長女は混沌の瘴気に包まれ、以来、二度と目覚めることはなかった……」
line = "「そして星見の長女は混沌の瘴気に包まれ、以来、二度と目覚めることはなかった……」"

[[dialogue]]
speaker = "アポロ"
# 「そして、代わりに──奴の<ruby=こんぱく>魂魄</ruby>を引き継いだ『使徒』が平行世界をまたいでやってきた」
line = "「そして、代わりに──奴の<ruby>魂魄<rt>こんぱく</rt></ruby>を引き継いだ『使徒』が平行世界をまたいでやってきた」"

[[dialogue]]
speaker = "アポロ"
# 「デネブの世界は片付いた。残るアルタイルさえ刷新できれば、今代のリクリエは完遂する」
line = "「デネブの世界は片付いた。残るアルタイルさえ刷新できれば、今代のリクリエは完遂する」"

[[dialogue]]
speaker = "unk"
# それが今、目の前にいるアポロ。仮面を被ったリクリエの使徒。
line = "それが今、目の前にいるアポロ。仮面を被ったリクリエの使徒。"

[[dialogue]]
speaker = "unk"
# 本体が目覚めなくなったことといい、彼女の使命は常に『アルタイルの魔王を倒す』ことに帰結している。
line = "本体が目覚めなくなったことといい、彼女の使命は常に『アルタイルの魔王を倒す』ことに帰結している。"

[[dialogue]]
speaker = "ユウリ"
# 「……フィオナ。今のって……」
line = "「……フィオナ。今のって……」"

[[dialogue]]
speaker = "フィオナ"
# 「……ええ。事実です。私の知っている姉さんのまま」
line = "「……ええ。事実です。私の知っている姉さんのまま」"

[[dialogue]]
speaker = "アポロ"
# 「『リクリエの使徒』というのはな。誰にでもなれるものじゃないんだ」
line = "「『リクリエの使徒』というのはな。誰にでもなれるものじゃないんだ」"

[[dialogue]]
speaker = "アポロ"
# 「強くなきゃいけない。ヒーローのように。後はそう、使命感も必要だ。やるべきことをなすんだからな。真面目で努力家なのがいい」
line = "「強くなきゃいけない。ヒーローのように。後はそう、使命感も必要だ。やるべきことをなすんだからな。真面目で努力家なのがいい」"

[[dialogue]]
speaker = "unk"
# あまりに残酷な基準だった。
line = "あまりに残酷な基準だった。"

[[dialogue]]
speaker = "unk"
# 生来、強い責任感を抱いてしまったばかりに、アポロは都合よく仮面に取り込まれた。
line = "生来、強い責任感を抱いてしまったばかりに、アポロは都合よく仮面に取り込まれた。"

[[dialogue]]
speaker = "クロト"
# （なら──その資質ってのを満たしていたのは恐らく、学園長の奥さんも……）
line = "（なら──その資質ってのを満たしていたのは恐らく、学園長の奥さんも……）"

[[dialogue]]
speaker = "アポロ"
# 「宇宙が三つに分かたれているとはいえ──個々人に宿る魂、あいでんてぃてぃというものは共通だ」
line = "「宇宙が三つに分かたれているとはいえ──個々人に宿る魂、あいでんてぃてぃというものは共通だ」"

[[dialogue]]
speaker = "アポロ"
# 「星見の長女は魂レベルでリクリエに同調した。そうでなきゃ使徒になんかなれない」
line = "「星見の長女は魂レベルでリクリエに同調した。そうでなきゃ使徒になんかなれない」"

[[dialogue]]
speaker = "アポロ"
# 「わかるか？　星見の長女の<ruby=ココロ>精神</ruby>が望んだんだよ。この世界は完璧じゃない──よりよく正されなくちゃならないんだ、って」
line = "「わかるか？　星見の長女の<ruby>精神<rt>ココロ</rt></ruby>が望んだんだよ。この世界は完璧じゃない──よりよく正されなくちゃならないんだ、って」"

[[dialogue]]
speaker = "アポロ"
# 「だから、今さら、オマエの言う『姉さん』なんかに、戻っていいわけないだろう……！」
line = "「だから、今さら、オマエの言う『姉さん』なんかに、戻っていいわけないだろう……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ぁっ……」
line = "「ぁっ……」"

[[dialogue]]
speaker = "unk"
# アポロは<ruby=やけ>自棄</ruby>で己を曲げないわけじゃなかった。
line = "アポロは<ruby>自棄<rt>やけ</rt></ruby>で己を曲げないわけじゃなかった。"

[[dialogue]]
speaker = "unk"
# 彼女は自分が世界にもたらした影響も、悪事も、すべてを理解していて……
line = "彼女は自分が世界にもたらした影響も、悪事も、すべてを理解していて……"

[[dialogue]]
speaker = "unk"
# 己の正しいルーツを自覚しつつも、仮面による使徒としての支配を受け入れている──いや、受け入れざるをえなくなっている。
line = "己の正しいルーツを自覚しつつも、仮面による使徒としての支配を受け入れている──いや、受け入れざるをえなくなっている。"

[[dialogue]]
speaker = "unk"
# 元の人格が強い使命感を抱いていたからこそ──彼女はアポロを<b>降りられない</b>んだ。
line = "元の人格が強い使命感を抱いていたからこそ──彼女はアポロを<b>降りられない</b>んだ。"

[[dialogue]]
speaker = "クロト"
# （頑固さは……姉妹譲り、だな）
line = "（頑固さは……姉妹譲り、だな）"

[[dialogue]]
speaker = "unk"
# アポロの表情が悲しげに見えたのもきっと、気のせいなんかじゃなくて。
line = "アポロの表情が悲しげに見えたのもきっと、気のせいなんかじゃなくて。"

[[dialogue]]
speaker = "ユウリ"
# 「なんか……むかつくな」
line = "「なんか……むかつくな」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。心が折れたりすることくらい、誰だって一度はあるものね」
line = "「ええ。心が折れたりすることくらい、誰だって一度はあるものね」"

[[dialogue]]
speaker = "ソフィア"
# 「そこにつけ込もうというリクリエも、仮面も最低です」
line = "「そこにつけ込もうというリクリエも、仮面も最低です」"

[[dialogue]]
speaker = "unk"
# 世界規模の厄災に抗う『魔王』になるか──
line = "世界規模の厄災に抗う『魔王』になるか──"

[[dialogue]]
speaker = "unk"
# それとも世界規模の厄災を従える『英雄』になるか──
line = "それとも世界規模の厄災を従える『英雄』になるか──"

[[dialogue]]
speaker = "unk"
# 彼女には最初から、その両極端な２つの道しか残されていなかった。
line = "彼女には最初から、その両極端な２つの道しか残されていなかった。"

[[dialogue]]
speaker = "unk"
# 類まれなる血統と資質がゆえの……悲劇だ。
line = "類まれなる血統と資質がゆえの……悲劇だ。"
