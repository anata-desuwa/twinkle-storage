[[dialogue]]
speaker = "unk"
# 第９話,アルタイルのレティシア,B
line = "第９話,アルタイルのレティシア,B"

[[dialogue]]
speaker = "レティシア"
# 「──つまらない昔話はこれで終わり」
line = "「──つまらない昔話はこれで終わり」"

[[dialogue]]
speaker = "レティシア"
# 「これで夜間外出と、セレスティアを持ち出した罰は私だけにしてくれる？　グレイスが落ち込むようなことはしないであげて」
line = "「これで夜間外出と、セレスティアを持ち出した罰は私だけにしてくれる？　グレイスが落ち込むようなことはしないであげて」"

[[dialogue]]
speaker = "unk"
# あまりにも凄惨な、レティシアの過去──
line = "あまりにも凄惨な、レティシアの過去──"

[[dialogue]]
speaker = "unk"
# その話を聞いたことで、彼女がセレスティアを持ち出した理由にも、おおよその見当がついた気がした。
line = "その話を聞いたことで、彼女がセレスティアを持ち出した理由にも、おおよその見当がついた気がした。"

[[dialogue]]
speaker = "unk"
# サーシャさんに目配せをすると、彼女も同じ様子だった。
line = "サーシャさんに目配せをすると、彼女も同じ様子だった。"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん。ここはお姉ちゃんに任せてもらえる？」
line = "「会長くん。ここはお姉ちゃんに任せてもらえる？」"

[[dialogue]]
speaker = "クロト"
# 「……ええ」
line = "「……ええ」"

[[dialogue]]
speaker = "サーシャ"
# 「ねえレティシアちゃん。ルヴィネちゃんはいつも、あなたにどんな命令をしていたのかしら？」
line = "「ねえレティシアちゃん。ルヴィネちゃんはいつも、あなたにどんな命令をしていたのかしら？」"

[[dialogue]]
speaker = "レティシア"
# 「……たくさんあるわ。数え切れないくらい」
line = "「……たくさんあるわ。数え切れないくらい」"

[[dialogue]]
speaker = "レティシア"
# 「『星騎士として人々を守りなさい』、『困っている人がいたら助けなさい』……」
line = "「『星騎士として人々を守りなさい』、『困っている人がいたら助けなさい』……」"

[[dialogue]]
speaker = "レティシア"
# 「『任務のために危険を冒すことがあっても、あまり無理はしないこと』。それから……」
line = "「『任務のために危険を冒すことがあっても、あまり無理はしないこと』。それから……」"

[[dialogue]]
speaker = "レティシア"
# 「『健康に気を付けなさい』。『怪我や病気をした時に隠してはダメ』。『よく食べて、よく寝なさい』」
line = "「『健康に気を付けなさい』。『怪我や病気をした時に隠してはダメ』。『よく食べて、よく寝なさい』」"

[[dialogue]]
speaker = "レティシア"
# 「『やることがわからない時は、年長者としてみんなのお世話をしなさい』。『ただしグレイスを甘やかすのは１日に３回まで』……まだまだあるわ」
line = "「『やることがわからない時は、年長者としてみんなのお世話をしなさい』。『ただしグレイスを甘やかすのは１日に３回まで』……まだまだあるわ」"

[[dialogue]]
speaker = "サーシャ"
# 「命を捨ててこいとか。転送装置を暴走させて自爆しなさい、とか……そういう命令はないのね」
line = "「命を捨ててこいとか。転送装置を暴走させて自爆しなさい、とか……そういう命令はないのね」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。ルヴィは賢いのに、そういう命令だけは絶対に私にしないの……どうしてかしら？」
line = "「ええ。ルヴィは賢いのに、そういう命令だけは絶対に私にしないの……どうしてかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「そんなのわかりきってる。あなたに生きていて欲しい……それ以外にないじゃない」
line = "「そんなのわかりきってる。あなたに生きていて欲しい……それ以外にないじゃない」"

[[dialogue]]
speaker = "サーシャ"
# 「話を聞くほど、ルヴィネちゃんのことがよくわからなくなってくる。リクリエを起こそうとしているのに……あなたたちへの態度は本当に愛情深い」
line = "「話を聞くほど、ルヴィネちゃんのことがよくわからなくなってくる。リクリエを起こそうとしているのに……あなたたちへの態度は本当に愛情深い」"

[[dialogue]]
speaker = "レティシア"
# 「だから言っているでしょう？　ルヴィはリクリエの側なんかじゃない」
line = "「だから言っているでしょう？　ルヴィはリクリエの側なんかじゃない」"

[[dialogue]]
speaker = "レティシア"
# 「私は、何があってもあなたたちを否定するわ。私はルヴィのために働いて、デネブが存続する未来を掴み取る。極星学園のみんなと一緒に」
line = "「私は、何があってもあなたたちを否定するわ。私はルヴィのために働いて、デネブが存続する未来を掴み取る。極星学園のみんなと一緒に」"

[[dialogue]]
speaker = "サーシャ"
# 「残念だけど、それは無理よ」
line = "「残念だけど、それは無理よ」"

[[dialogue]]
speaker = "サーシャ"
# 「ルヴィネちゃんは、このままだと死んでしまう。あなたたちの目の前で」
line = "「ルヴィネちゃんは、このままだと死んでしまう。あなたたちの目の前で」"

[[dialogue]]
speaker = "レティシア"
# 「……どういう意味？　ルヴィは死なない。私が守るわ」
line = "「……どういう意味？　ルヴィは死なない。私が守るわ」"

[[dialogue]]
speaker = "サーシャ"
# 「そうはならないの。私たちの仲間に、未来の可能性を視通す特別な『眼』をもった子がいる」
line = "「そうはならないの。私たちの仲間に、未来の可能性を視通す特別な『眼』をもった子がいる」"

[[dialogue]]
speaker = "サーシャ"
# 「ルヴィネちゃんが死ぬ未来を、その子が視たの」
line = "「ルヴィネちゃんが死ぬ未来を、その子が視たの」"

[[dialogue]]
speaker = "unk"
# サーシャさんが伝えた真実は、レティシアに一蹴されるとばかり思っていた。しかし──
line = "サーシャさんが伝えた真実は、レティシアに一蹴されるとばかり思っていた。しかし──"

[[dialogue]]
speaker = "レティシア"
# 「天機の星眼……？」
line = "「天機の星眼……？」"

[[dialogue]]
speaker = "クロト"
# 「……！　君は、ジグの力を知っているのか」
line = "「……！　君は、ジグの力を知っているのか」"

[[dialogue]]
speaker = "レティシア"
# 「少し前に、デネブで会ったことがある。チナがアルタイルへ襲撃に行く前日だったわ」
line = "「少し前に、デネブで会ったことがある。チナがアルタイルへ襲撃に行く前日だったわ」"

[[dialogue]]
speaker = "ジグ"
# 「いきなり背中から斬りかかるだなんて、随分なご挨拶だね？」
line = "「いきなり背中から斬りかかるだなんて、随分なご挨拶だね？」"

[[dialogue]]
speaker = "レティシア"
# 「あら。不法侵入者には妥当な対応じゃないかしら。星徒会室は関係者以外、立ち入り禁止よ」
line = "「あら。不法侵入者には妥当な対応じゃないかしら。星徒会室は関係者以外、立ち入り禁止よ」"

[[dialogue]]
speaker = "ジグ"
# 「そう邪険にしないで欲しいなぁ。君のボスから呼び出されたというのに」
line = "「そう邪険にしないで欲しいなぁ。君のボスから呼び出されたというのに」"

[[dialogue]]
speaker = "レティシア"
# 「……ルヴィが？」
line = "「……ルヴィが？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシア、彼女は客人よ。一応ね」
line = "「レティシア、彼女は客人よ。一応ね」"

[[dialogue]]
speaker = "レティシア"
# 「そうなのね。これは失礼したわ」
line = "「そうなのね。これは失礼したわ」"

[[dialogue]]
speaker = "ジグ"
# 「……まったく。部下の教育くらいしておいてくれるかい？　とりあえず頼まれていた用件はすんだよ」
line = "「……まったく。部下の教育くらいしておいてくれるかい？　とりあえず頼まれていた用件はすんだよ」"

[[dialogue]]
speaker = "ジグ"
# 「香堂チナ、だっけ？　あの子の可能性を調べておいた。今回のアルタイル襲撃では死なないようだよ」
line = "「香堂チナ、だっけ？　あの子の可能性を調べておいた。今回のアルタイル襲撃では死なないようだよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……そう」
line = "「……そう」"

[[dialogue]]
speaker = "ジグ"
# 「だからもう少し、お尻を叩いてあげた方がいいんじゃないかな？」
line = "「だからもう少し、お尻を叩いてあげた方がいいんじゃないかな？」"

[[dialogue]]
speaker = "ジグ"
# 「刺し違えてでも戦果をあげて来い、とでも言ってあげた方が、現場の士気もあがるってものだよ」
line = "「刺し違えてでも戦果をあげて来い、とでも言ってあげた方が、現場の士気もあがるってものだよ」"

[[dialogue]]
speaker = "ジグ"
# 「いっそのこと、アルタイルに着いたら即座に転送装置を自爆させるよう、指示を出してみては？　色々手っ取り早いと思うよ」
line = "「いっそのこと、アルタイルに着いたら即座に転送装置を自爆させるよう、指示を出してみては？　色々手っ取り早いと思うよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「転送装置は貴重なの。余計なお節介はやめなさい」
line = "「転送装置は貴重なの。余計なお節介はやめなさい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「チナの未来がわかったのなら、あなたへの用件は終わりよ。さっさと帰って」
line = "「チナの未来がわかったのなら、あなたへの用件は終わりよ。さっさと帰って」"

[[dialogue]]
speaker = "ジグ"
# 「使い走りにしたうえ、お茶も出さないなんてね……まあいいさ。それじゃあ、お暇しようかな」
line = "「使い走りにしたうえ、お茶も出さないなんてね……まあいいさ。それじゃあ、お暇しようかな」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィ、彼女は何者なのかしら？　極星の星騎士ではなかったようだけれど……」
line = "「ルヴィ、彼女は何者なのかしら？　極星の星騎士ではなかったようだけれど……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「平行世界ベガの生き残りよ。今は利害が一致しているから、好意的に捉えれば『協力者』と言ったところかしら」
line = "「平行世界ベガの生き残りよ。今は利害が一致しているから、好意的に捉えれば『協力者』と言ったところかしら」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ただ、信用はできない相手よ。デネブを守るために戦っているわけではないもの」
line = "「ただ、信用はできない相手よ。デネブを守るために戦っているわけではないもの」"

[[dialogue]]
speaker = "レティシア"
# 「──『チナの可能性を調べた』、というのは？」
line = "「──『チナの可能性を調べた』、というのは？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「彼女にはそういう力があるの。レティシア、少しとはいえ剣を交えたのでしょう。どう思ったかしら？」
line = "「彼女にはそういう力があるの。レティシア、少しとはいえ剣を交えたのでしょう。どう思ったかしら？」"

[[dialogue]]
speaker = "レティシア"
# 「妙な相手だったわ。私が何をするのか、わかった上で動いてるような……」
line = "「妙な相手だったわ。私が何をするのか、わかった上で動いてるような……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「上出来よ。彼女は未来の可能性を視る眼をもっている」
line = "「上出来よ。彼女は未来の可能性を視る眼をもっている」"

[[dialogue]]
speaker = "ルヴィネ"
# 「『天機の星眼』というらしいわ……その眼でチナの可能性を調べて、未来の無事を確認するために呼び出したの」
line = "「『天機の星眼』というらしいわ……その眼でチナの可能性を調べて、未来の無事を確認するために呼び出したの」"

[[dialogue]]
speaker = "レティシア"
# 「そんなに不安なら、私がアルタイル襲撃を代わってもいいのに」
line = "「そんなに不安なら、私がアルタイル襲撃を代わってもいいのに」"

[[dialogue]]
speaker = "ルヴィネ"
# 「レティシアには他にしてもらいたいことがあるわ。あと……今日のことは、みんなには言わないでおいてくれるかしら？」
line = "「レティシアには他にしてもらいたいことがあるわ。あと……今日のことは、みんなには言わないでおいてくれるかしら？」"

[[dialogue]]
speaker = "レティシア"
# 「その方がルヴィにとって都合がいいのなら。内緒にしておくわ」
line = "「その方がルヴィにとって都合がいいのなら。内緒にしておくわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ありがとう。バタフライエフェクトではないけれど、誰かに言えば未来が変わってしまう可能性もある。だからチナの安全のためにも、お願いね」
line = "「ありがとう。バタフライエフェクトではないけれど、誰かに言えば未来が変わってしまう可能性もある。だからチナの安全のためにも、お願いね」"

[[dialogue]]
speaker = "レティシア"
# 「天機の星眼はそういう力を持つと、ルヴィは確かに言っていた……」
line = "「天機の星眼はそういう力を持つと、ルヴィは確かに言っていた……」"

[[dialogue]]
speaker = "レティシア"
# 「──どういうこと？　ルヴィが死ぬ未来を視た？　それを私に教えて……何がしたいの……？」
line = "「──どういうこと？　ルヴィが死ぬ未来を視た？　それを私に教えて……何がしたいの……？」"

[[dialogue]]
speaker = "レティシア"
# 「あなたたちは敵……そんな未来を視たのなら、都合がいいはず、でしょう……？」
line = "「あなたたちは敵……そんな未来を視たのなら、都合がいいはず、でしょう……？」"

[[dialogue]]
speaker = "レティシア"
# 「アルタイルを滅ぼすと言ってるルヴィが死ぬことは、あなたたちにとって歓迎すべきこと……のはず」
line = "「アルタイルを滅ぼすと言ってるルヴィが死ぬことは、あなたたちにとって歓迎すべきこと……のはず」"

[[dialogue]]
speaker = "レティシア"
# 「言えば未来が変わる。アルタイルにとって都合のいい未来を知ったのに、それを変えようとするだなんて……」
line = "「言えば未来が変わる。アルタイルにとって都合のいい未来を知ったのに、それを変えようとするだなんて……」"

[[dialogue]]
speaker = "クロト"
# 「何度でも言う──俺たちの目的はリクリエを止めることであって、ルヴィネを倒すことじゃない」
line = "「何度でも言う──俺たちの目的はリクリエを止めることであって、ルヴィネを倒すことじゃない」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に最も近しい存在だ。神と対話するにせよ、戦うにせよ……ルヴィネが亡くなることは俺たちにとっても痛手なんだ」
line = "「ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に最も近しい存在だ。神と対話するにせよ、戦うにせよ……ルヴィネが亡くなることは俺たちにとっても痛手なんだ」"

[[dialogue]]
speaker = "クロト"
# 「ただ戦いに備えるだけでは、いずれルヴィネの死亡が確定してしまう。それを避けるために、新しい可能性を切り開かなくちゃならない」
line = "「ただ戦いに備えるだけでは、いずれルヴィネの死亡が確定してしまう。それを避けるために、新しい可能性を切り開かなくちゃならない」"

[[dialogue]]
speaker = "クロト"
# 「未来を変える可能性が最も高いのが、ルヴィネの幼なじみである極星星徒会との協力だと考えている」
line = "「未来を変える可能性が最も高いのが、ルヴィネの幼なじみである極星星徒会との協力だと考えている」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルに<ruby=くみ>与</ruby>しろ、というわけじゃない。一時的な共闘でいい……」
line = "「アルタイルに<ruby>与<rt>くみ</rt></ruby>しろ、というわけじゃない。一時的な共闘でいい……」"

[[dialogue]]
speaker = "クロト"
# 「少しでも怪しいところを感じたら……その時は俺を、背中から斬ってくれて構わない。だから、頼む」
line = "「少しでも怪しいところを感じたら……その時は俺を、背中から斬ってくれて構わない。だから、頼む」"

[[dialogue]]
speaker = "クロト"
# 「ルヴィネを生かしたままリクリエを止めるために、俺たちと共同戦線を張ってくれないか」
line = "「ルヴィネを生かしたままリクリエを止めるために、俺たちと共同戦線を張ってくれないか」"

[[dialogue]]
speaker = "unk"
# 再び、長い沈黙が訪れる。
line = "再び、長い沈黙が訪れる。"

[[dialogue]]
speaker = "unk"
# けれど今回の沈黙は、以前までとは違っていた。レティシアの迷いがはっきりと見えていた。
line = "けれど今回の沈黙は、以前までとは違っていた。レティシアの迷いがはっきりと見えていた。"

[[dialogue]]
speaker = "レティシア"
# 「……あ、あなたたちは、私を騙そうとしている？　本当はルヴィが勝つ未来を視ているから、それを変えようとして……」
line = "「……あ、あなたたちは、私を騙そうとしている？　本当はルヴィが勝つ未来を視ているから、それを変えようとして……」"

[[dialogue]]
speaker = "サーシャ"
# 「そういう慎重な考え方、嫌いじゃないけれど。あり得ないってわかるでしょう？」
line = "「そういう慎重な考え方、嫌いじゃないけれど。あり得ないってわかるでしょう？」"

[[dialogue]]
speaker = "レティシア"
# 「……そう、ね。だって、ルヴィが勝つ未来を視たのだとしたら……あの子の隣には、必ず私がいるもの……」
line = "「……そう、ね。だって、ルヴィが勝つ未来を視たのだとしたら……あの子の隣には、必ず私がいるもの……」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィとの戦いの脅威を減らすなら……私を懐柔なんてしなくていい……閉じ込めるなり、殺すなり……いくらでもチャンスはあるのに……」
line = "「ルヴィとの戦いの脅威を減らすなら……私を懐柔なんてしなくていい……閉じ込めるなり、殺すなり……いくらでもチャンスはあるのに……」"

[[dialogue]]
speaker = "レティシア"
# 「最初からあなたたちはおかしい……ベアトたちだけじゃない。私までデネブへ連れていくって、ルヴィの説得を手伝ってくれって、そればかり……」
line = "「最初からあなたたちはおかしい……ベアトたちだけじゃない。私までデネブへ連れていくって、ルヴィの説得を手伝ってくれって、そればかり……」"

[[dialogue]]
speaker = "レティシア"
# 「わからない……わからなく、なってきた……どうしてルヴィはここにいないの？　あの子が命令してくれれば、私は納得、できるのに」
line = "「わからない……わからなく、なってきた……どうしてルヴィはここにいないの？　あの子が命令してくれれば、私は納得、できるのに」"

[[dialogue]]
speaker = "サーシャ"
# 「いない以上、あなたが決めるしかないわ。ルヴィネちゃんのためにも、あなた自身が変わらなくちゃ」
line = "「いない以上、あなたが決めるしかないわ。ルヴィネちゃんのためにも、あなた自身が変わらなくちゃ」"

[[dialogue]]
speaker = "レティシア"
# 「無理よ……私は『空っぽ』なの。命令されないと、動けない……正しいことが、わからない……」
