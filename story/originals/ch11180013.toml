[[dialogue]]
speaker = "unk"
# 第３話,ナターシャの好きな場所,P
line = "第３話,ナターシャの好きな場所,P"

[[dialogue]]
speaker = "メルエル"
# 「あ、おはよう、会長くん！」
line = "「あ、おはよう、会長くん！」"

[[dialogue]]
speaker = "ナターシャ"
# 「おはよー」
line = "「おはよー」"

[[dialogue]]
speaker = "unk"
# ２人ともおはよう
line = "２人ともおはよう"

[[dialogue]]
speaker = "unk"
# 天界からの留学生、そして聖庭園の特務エージェントであるナターシャだが、すでに新星学園の日常に馴染みつつあった。
line = "天界からの留学生、そして聖庭園の特務エージェントであるナターシャだが、すでに新星学園の日常に馴染みつつあった。"

[[dialogue]]
speaker = "ナターシャ"
# 「前から思ってたんだけどさー」
line = "「前から思ってたんだけどさー」"

[[dialogue]]
speaker = "メルエル"
# 「うん？」
line = "「うん？」"

[[dialogue]]
speaker = "ナターシャ"
# 「メルエルと会長さんってホントに幼なじみなの？」
line = "「メルエルと会長さんってホントに幼なじみなの？」"

[[dialogue]]
speaker = "メルエル"
# 「ほえっ？」
line = "「ほえっ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「メルエルが昔流星市国にいたのって、半年だけなんだよね？　会長さんもほとんど覚えてなかったみたいだし」
line = "「メルエルが昔流星市国にいたのって、半年だけなんだよね？　会長さんもほとんど覚えてなかったみたいだし」"

[[dialogue]]
speaker = "ナターシャ"
# 「それで幼なじみって言っちゃっていいのかなーって」
line = "「それで幼なじみって言っちゃっていいのかなーって」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃ～んっ！？」
line = "「ナターシャちゃ～んっ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「あはは、冗談冗談。でも会長さんよりメルエルと付き合いの長い幼なじみとしては、ちょっと妬けちゃうな」
line = "「あはは、冗談冗談。でも会長さんよりメルエルと付き合いの長い幼なじみとしては、ちょっと妬けちゃうな」"

[[dialogue]]
speaker = "ナターシャ"
# 「……ね、会長さん？」
line = "「……ね、会長さん？」"

[[dialogue]]
speaker = "unk"
# （圧を感じる……）
line = "（圧を感じる……）"

[[dialogue]]
speaker = "メルエル"
# 「ねぇ、会長くん。こ、今週末のお話、なんだけどぉ……」
line = "「ねぇ、会長くん。こ、今週末のお話、なんだけどぉ……」"

[[dialogue]]
speaker = "メルエル"
# （お休みの日に遊園地へ行こうって、これ、デートのお誘いになっちゃうかな……？　ひゃーっ）
line = "（お休みの日に遊園地へ行こうって、これ、デートのお誘いになっちゃうかな……？　ひゃーっ）"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さん、私たち遊園地に行くんだけどさ、一緒に来てくれないかな？」
line = "「会長さん、私たち遊園地に行くんだけどさ、一緒に来てくれないかな？」"

[[dialogue]]
speaker = "ナターシャ"
# 「天界には遊園地がないから、メルエルに案内してもらうんだけど、女の子だけだとまたナンパされるかもしれないじゃない？」
line = "「天界には遊園地がないから、メルエルに案内してもらうんだけど、女の子だけだとまたナンパされるかもしれないじゃない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「だから会長さんが一緒にいてくれると安心だなって」
line = "「だから会長さんが一緒にいてくれると安心だなって」"

[[dialogue]]
speaker = "unk"
# そういうことなら喜んで
line = "そういうことなら喜んで"

[[dialogue]]
speaker = "メルエル"
# 「やったぁ！」
line = "「やったぁ！」"

[[dialogue]]
speaker = "メルエル"
# （ありがとう、ナターシャちゃんっ）
line = "（ありがとう、ナターシャちゃんっ）"

[[dialogue]]
speaker = "ナターシャ"
# （どうしたしまして。当日は私消えるから頑張って）
line = "（どうしたしまして。当日は私消えるから頑張って）"

[[dialogue]]
speaker = "メルエル"
# （それはそれで不安だよっ！？）
line = "（それはそれで不安だよっ！？）"

[[dialogue]]
speaker = "unk"
# そして次の休日──
line = "そして次の休日──"

[[dialogue]]
speaker = "ナターシャ"
# 「メルエル、来れなくなっちゃったねー。まさか風邪ひいて熱を出すなんて思わなかったよ」
line = "「メルエル、来れなくなっちゃったねー。まさか風邪ひいて熱を出すなんて思わなかったよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「メルエルは気にしないで楽しんでって言ってたけど、どうしよっか？」
line = "「メルエルは気にしないで楽しんでって言ってたけど、どうしよっか？」"

[[dialogue]]
speaker = "unk"
# チケット無駄になるし、お言葉に甘えようか
line = "チケット無駄になるし、お言葉に甘えようか"

[[dialogue]]
speaker = "ナターシャ"
# 「あー……ま、そうなるよね」
line = "「あー……ま、そうなるよね」"

[[dialogue]]
speaker = "ナターシャ"
# （それじゃ意味ないんだけど……仕方ないか。ここで帰っても不自然だし）
line = "（それじゃ意味ないんだけど……仕方ないか。ここで帰っても不自然だし）"

[[dialogue]]
speaker = "ナターシャ"
# 「じゃ、会長さんにエスコートをお願いしようかな。デートの練習だと思って、紳士的にお願いね？」
line = "「じゃ、会長さんにエスコートをお願いしようかな。デートの練習だと思って、紳士的にお願いね？」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さんは何がおすすめ？　遊園地に来たら何に乗るものなの？」
line = "「会長さんは何がおすすめ？　遊園地に来たら何に乗るものなの？」"

[[dialogue]]
speaker = "ナターシャ"
# 「……遊園地といえばジェットコースター？　ああ、聞いたことある。あの大きなレールのやつだね」
line = "「……遊園地といえばジェットコースター？　ああ、聞いたことある。あの大きなレールのやつだね」"

[[dialogue]]
speaker = "ナターシャ"
# 「他には……メリーゴーラウンド、お化け屋敷……ふんふん、いろいろあるんだね。じゃあ行ってみよっか」
line = "「他には……メリーゴーラウンド、お化け屋敷……ふんふん、いろいろあるんだね。じゃあ行ってみよっか」"

[[dialogue]]
speaker = "unk"
# 早速、ナターシャといくつかアトラクションに乗ってみたが──
line = "早速、ナターシャといくつかアトラクションに乗ってみたが──"

[[dialogue]]
speaker = "ナターシャ"
# 「へ～、遊園地ってこういうのなんだね」
line = "「へ～、遊園地ってこういうのなんだね」"

[[dialogue]]
speaker = "unk"
# 反応薄っ！？
line = "反応薄っ！？"

[[dialogue]]
speaker = "ナターシャ"
# 「ごめんごめん。私、昔からこういう感じでさ。何やっててもそう言われるんだよね」
line = "「ごめんごめん。私、昔からこういう感じでさ。何やっててもそう言われるんだよね」"

[[dialogue]]
speaker = "ナターシャ"
# 「アトラクションは乗ったし、趣向を変えて、遊園地の中歩いてみよっか？」
line = "「アトラクションは乗ったし、趣向を変えて、遊園地の中歩いてみよっか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「へ～、売店もあるんだ。ホットドッグと、チュロスと、ソフトクリームと……ふぅん、こんな感じなんだ」
line = "「へ～、売店もあるんだ。ホットドッグと、チュロスと、ソフトクリームと……ふぅん、こんな感じなんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、向こうは家族かな？　子ども連れが多いなぁ。カップルもいるし、いろんな人がいるね」
line = "「あ、向こうは家族かな？　子ども連れが多いなぁ。カップルもいるし、いろんな人がいるね」"

[[dialogue]]
speaker = "ナターシャ"
# 「でもみんな楽しそう。遊園地ってこんな場所なんだ」
line = "「でもみんな楽しそう。遊園地ってこんな場所なんだ」"

[[dialogue]]
speaker = "unk"
# ナターシャが楽しめてなかったらごめん
line = "ナターシャが楽しめてなかったらごめん"

[[dialogue]]
speaker = "ナターシャ"
# 「ううん、会長さんが謝ることじゃないよ。私がそういう性分なだけ」
line = "「ううん、会長さんが謝ることじゃないよ。私がそういう性分なだけ」"

[[dialogue]]
speaker = "ナターシャ"
# 「私、人が楽しいと思うものを、楽しいと思えなくてさ」
line = "「私、人が楽しいと思うものを、楽しいと思えなくてさ」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも人が楽しんでるところを見るのは好き。私もそんな気持ちになれる気がするから」
line = "「でも人が楽しんでるところを見るのは好き。私もそんな気持ちになれる気がするから」"

[[dialogue]]
speaker = "ナターシャ"
# 「だから遊園地は気に入ったよ。みんな笑顔で、楽しそうにしてる」
line = "「だから遊園地は気に入ったよ。みんな笑顔で、楽しそうにしてる」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さんが楽しんでるところも見せて？　私のことは気にしないでいいから」
line = "「会長さんが楽しんでるところも見せて？　私のことは気にしないでいいから」"

[[dialogue]]
speaker = "unk"
# それからナターシャの言う通り、俺が乗りたいアトラクションに乗った。
line = "それからナターシャの言う通り、俺が乗りたいアトラクションに乗った。"

[[dialogue]]
speaker = "unk"
# 遊園地を楽しむ俺を、ナターシャはすぐ近くから微笑とともに眺めていた。
line = "遊園地を楽しむ俺を、ナターシャはすぐ近くから微笑とともに眺めていた。"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ、結局、暗くなるまで遊んじゃったね。私なりに楽しめたよ」
line = "「ふふ、結局、暗くなるまで遊んじゃったね。私なりに楽しめたよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さんも楽しんでたね。撮れ高ばっちり。……それじゃメルエルに写真送信っと」
line = "「会長さんも楽しんでたね。撮れ高ばっちり。……それじゃメルエルに写真送信っと」"

[[dialogue]]
speaker = "unk"
# いつの間に撮ったんだ！？
line = "いつの間に撮ったんだ！？"

[[dialogue]]
speaker = "ナターシャ"
# 「特務エージェントだからね、監視対象に気付かれずに撮影するくらいはお手の物だよ」
line = "「特務エージェントだからね、監視対象に気付かれずに撮影するくらいはお手の物だよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「それじゃまたね、会長さん。次は楽しんでるところ以外も見たいな？」
line = "「それじゃまたね、会長さん。次は楽しんでるところ以外も見たいな？」"
