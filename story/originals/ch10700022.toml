[[dialogue]]
speaker = "unk"
# 第２話,チョコレート全席,P
line = "第２話,チョコレート全席,P"

[[dialogue]]
speaker = "unk"
# 流星学園のバレンタインイベント──大聖堂でのチョコレート配りはつつがなく終了した。
line = "流星学園のバレンタインイベント──大聖堂でのチョコレート配りはつつがなく終了した。"

[[dialogue]]
speaker = "unk"
# 準備期間中にトラブルもあったが、大事には至らなかったので一安心。そしてとうとう、後片付けを終えたウズメが俺の家へとやってきて……
line = "準備期間中にトラブルもあったが、大事には至らなかったので一安心。そしてとうとう、後片付けを終えたウズメが俺の家へとやってきて……"

[[dialogue]]
speaker = "ウズメイア"
# 「ふ～っ。会長くん、お待たせ。荷物が多くて手間取っちゃったし……！」
line = "「ふ～っ。会長くん、お待たせ。荷物が多くて手間取っちゃったし……！」"

[[dialogue]]
speaker = "unk"
# （友達から貰ったチョコかな……？）
line = "（友達から貰ったチョコかな……？）"

[[dialogue]]
speaker = "unk"
# お疲れ様、すごい荷物だね
line = "お疲れ様、すごい荷物だね"

[[dialogue]]
speaker = "ウズメイア"
# 「よいしょっと……さーて、ようやく２人きりだし。まずはずっと我慢してたスキンシップからしちゃうし～<emoji=heart04>」
line = "「よいしょっと……さーて、ようやく２人きりだし。まずはずっと我慢してたスキンシップからしちゃうし～<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くん、好きー<emoji=heart04>　んー……ちゅっ<emoji=heart04>」
line = "「会長くん、好きー<emoji=heart04>　んー……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ♪　学園だと人目があるけど、会長くんのお家なら２人っきりだし。いっぱいイチャイチャできるから嬉しい<emoji=heart04>」
line = "「えへへ♪　学園だと人目があるけど、会長くんのお家なら２人っきりだし。いっぱいイチャイチャできるから嬉しい<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「んー……ちゅ<emoji=heart04>　ちゅっ……ちゅぅーっ……ちゅっ<emoji=heart04>」
line = "「んー……ちゅ<emoji=heart04>　ちゅっ……ちゅぅーっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「ふふ～♪　会長くん、まだあたしからチョコ貰ってないのに、すっごく嬉しそうな顔してるし～<emoji=heart04>」
line = "「ふふ～♪　会長くん、まだあたしからチョコ貰ってないのに、すっごく嬉しそうな顔してるし～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# すごくドキドキしてるんだ
line = "すごくドキドキしてるんだ"

[[dialogue]]
speaker = "unk"
# ウズメもバレンタイン衣装も可愛いから
line = "ウズメもバレンタイン衣装も可愛いから"

[[dialogue]]
speaker = "ウズメイア"
# 「あはー♪　嬉しいっ<emoji=heart04>　会長くん、いっつもあたしのこと、いっぱい褒めてくれるから大好きっ<emoji=heart04>」
line = "「あはー♪　嬉しいっ<emoji=heart04>　会長くん、いっつもあたしのこと、いっぱい褒めてくれるから大好きっ<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「改めて会長くん。流星学園のバレンタインイベント、色々と手伝ってくれてありがとね」
line = "「改めて会長くん。流星学園のバレンタインイベント、色々と手伝ってくれてありがとね」"

[[dialogue]]
speaker = "ウズメイア"
# 「フィオナ会長もすっごく助かったって言ってたし……もちろんあたしもシャルレーヌちゃんも、めっちゃ感謝してるよ！」
line = "「フィオナ会長もすっごく助かったって言ってたし……もちろんあたしもシャルレーヌちゃんも、めっちゃ感謝してるよ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「頑張ってくれた会長くんにお待ちかね……こ、恋人のあたしから本命チョコ、プレゼントしちゃうし……<emoji=heart04>」
line = "「頑張ってくれた会長くんにお待ちかね……こ、恋人のあたしから本命チョコ、プレゼントしちゃうし……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「本当は大聖堂で渡すつもりだったんだけどさ。直前になって、友達の目があるのが恥ずかしくなっちゃって……」
line = "「本当は大聖堂で渡すつもりだったんだけどさ。直前になって、友達の目があるのが恥ずかしくなっちゃって……」"

[[dialogue]]
speaker = "ウズメイア"
# 「めっっっちゃ気合い入れて作ったからさ……。それってあたしの想いの強さが形になってるわけで……それを見られるの、ハズいなって」
line = "「めっっっちゃ気合い入れて作ったからさ……。それってあたしの想いの強さが形になってるわけで……それを見られるの、ハズいなって」"

[[dialogue]]
speaker = "ウズメイア"
# 「へ、変だよね～。ギャルファッションにハマってから、そーゆー……羞恥心？　みたいなの、耐性がついたと思ってたんだけど」
line = "「へ、変だよね～。ギャルファッションにハマってから、そーゆー……羞恥心？　みたいなの、耐性がついたと思ってたんだけど」"

[[dialogue]]
speaker = "ウズメイア"
# 「で、でも！　いつまでもモジモジしてるのはあたしらしくないし！　というわけで、はいこれ！　受け取って！」
line = "「で、でも！　いつまでもモジモジしてるのはあたしらしくないし！　というわけで、はいこれ！　受け取って！」"

[[dialogue]]
speaker = "unk"
# …………んっ？
line = "…………んっ？"

[[dialogue]]
speaker = "unk"
# ウズメが部屋に入ってきた時に肩に担いでいた、まるでサンタクロースのプレゼント袋みたいな、巨大な大袋。
line = "ウズメが部屋に入ってきた時に肩に担いでいた、まるでサンタクロースのプレゼント袋みたいな、巨大な大袋。"

[[dialogue]]
speaker = "unk"
# それが、俺の前にドンと置かれた──
line = "それが、俺の前にドンと置かれた──"

[[dialogue]]
speaker = "unk"
# ……この中のどれが、俺へのチョコ？
line = "……この中のどれが、俺へのチョコ？"

[[dialogue]]
speaker = "ウズメイア"
# 「全部！！」
line = "「全部！！」"

[[dialogue]]
speaker = "ウズメイア"
# 「この袋のチョコ……全部があたしの本命チョコだし！！」
line = "「この袋のチョコ……全部があたしの本命チョコだし！！」"

[[dialogue]]
speaker = "unk"
# 本当にめっっっちゃ気合い入れたね！？
line = "本当にめっっっちゃ気合い入れたね！？"

[[dialogue]]
speaker = "ウズメイア"
# 「むふふ～♪　どうせなら思い出に残るインパクトってやつ、突き詰めてみようかと思って！」
line = "「むふふ～♪　どうせなら思い出に残るインパクトってやつ、突き詰めてみようかと思って！」"

[[dialogue]]
speaker = "ウズメイア"
# 「しかもさ～、知ってる会長くん？　バレンタインに贈るお菓子って、それぞれに意味があるんだよ！」
line = "「しかもさ～、知ってる会長くん？　バレンタインに贈るお菓子って、それぞれに意味があるんだよ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「マカロンは『あなたは特別な人』って意味だし、ドーナツは『永遠に大好き』って意味だし──」
line = "「マカロンは『あなたは特別な人』って意味だし、ドーナツは『永遠に大好き』って意味だし──」"

[[dialogue]]
speaker = "ウズメイア"
# 「マドレーヌは『仲良くなりたい』、キャンディーは『あなたと一緒にいたい』ってメッセージになるの！」
line = "「マドレーヌは『仲良くなりたい』、キャンディーは『あなたと一緒にいたい』ってメッセージになるの！」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヤバいよね！？　日本のバレンタイン文化って本当に奥が深いし！　で、どのメッセージにするか悩みに悩んでさ～？」
line = "「ヤバいよね！？　日本のバレンタイン文化って本当に奥が深いし！　で、どのメッセージにするか悩みに悩んでさ～？」"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くんってあたしの彼氏じゃん？　つまり、究極の推しってことじゃん！？」
line = "「会長くんってあたしの彼氏じゃん？　つまり、究極の推しってことじゃん！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「どれか１つを選んで贈るのは、そもそも間違いなんじゃないかなって思ったんだ～♪」
line = "「どれか１つを選んで贈るのは、そもそも間違いなんじゃないかなって思ったんだ～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「で！　それならいっそのこと、全部作っちゃえって！　名付けて雨野ウズメイア特製──バレンタインチョコ全席だし～っ<emoji=heart04>」
line = "「で！　それならいっそのこと、全部作っちゃえって！　名付けて雨野ウズメイア特製──バレンタインチョコ全席だし～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# わ、わァ……！
line = "わ、わァ……！"

[[dialogue]]
speaker = "ウズメイア"
# 「むっふふふ～♪　味はもちろん、ぜーんぶチョコ味！　マトイ先輩直伝のビタースウィートな味付けだし～♪」
line = "「むっふふふ～♪　味はもちろん、ぜーんぶチョコ味！　マトイ先輩直伝のビタースウィートな味付けだし～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「それじゃ～早速、チョコマカロンからどーぞ<emoji=heart04>　食べさせてあげるっ<emoji=heart04>」
line = "「それじゃ～早速、チョコマカロンからどーぞ<emoji=heart04>　食べさせてあげるっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お……おいしい！
line = "お……おいしい！"

[[dialogue]]
speaker = "ウズメイア"
# 「でしょ～？　にひひ、味見役のアナちゃんから花丸貰ったもんね～♪」
line = "「でしょ～？　にひひ、味見役のアナちゃんから花丸貰ったもんね～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「さっきもゆった通り、マカロンは『あなたは特別な存在』って意味だよ。いっぱい味わってほしいな～<emoji=heart04>」
line = "「さっきもゆった通り、マカロンは『あなたは特別な存在』って意味だよ。いっぱい味わってほしいな～<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「ねぇねぇ会長くん、次はどのチョコを食べたい？」
line = "「ねぇねぇ会長くん、次はどのチョコを食べたい？」"

[[dialogue]]
speaker = "unk"
# じゃあ、カップケーキで……
line = "じゃあ、カップケーキで……"

[[dialogue]]
speaker = "ウズメイア"
# 「これに目を付けるとは、お主なかなかの目利きであるな～……なんちて♪」
line = "「これに目を付けるとは、お主なかなかの目利きであるな～……なんちて♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「チョコチップを散らしてあるから、食感も楽しめるんだ！　あ、ちなみにこれも『あなたは特別な存在』って意味♪」
line = "「チョコチップを散らしてあるから、食感も楽しめるんだ！　あ、ちなみにこれも『あなたは特別な存在』って意味♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「面白いよね。お菓子の意味が被ってるやつも結構あるの。それ意味ないじゃんってマトイ先輩たちとツッコミ入れちゃったし♪」
line = "「面白いよね。お菓子の意味が被ってるやつも結構あるの。それ意味ないじゃんってマトイ先輩たちとツッコミ入れちゃったし♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「さぁお客さん、次のチョコは何にしやしょうっ？」
line = "「さぁお客さん、次のチョコは何にしやしょうっ？」"

[[dialogue]]
speaker = "unk"
# じゃ、じゃあマフィンで……
line = "じゃ、じゃあマフィンで……"

[[dialogue]]
speaker = "ウズメイア"
# 「お目が高い！　このチョコマフィン、会心の焼き加減なんだ～<emoji=heart04>　味わって味わって<emoji=heart04>　はい、あ～んっ♪」
line = "「お目が高い！　このチョコマフィン、会心の焼き加減なんだ～<emoji=heart04>　味わって味わって<emoji=heart04>　はい、あ～んっ♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「にひひひ～っ♪　大好きな会長くんに手作りお菓子食べてもらえるの、めっちゃ嬉しいし～<emoji=heart04>」
line = "「にひひひ～っ♪　大好きな会長くんに手作りお菓子食べてもらえるの、めっちゃ嬉しいし～<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「ちなみにマフィンも『あなたは特別な存在』って意味らしいし♪　３連続で同じ意味になっちゃったね、あはは♪」
line = "「ちなみにマフィンも『あなたは特別な存在』って意味らしいし♪　３連続で同じ意味になっちゃったね、あはは♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「まだまだチョコドーナツもチョコバウムクーヘンもチョコマロングラッセもあるよっ♪　次は何食べたい、会長くん？」
line = "「まだまだチョコドーナツもチョコバウムクーヘンもチョコマロングラッセもあるよっ♪　次は何食べたい、会長くん？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしの推しへの愛、お腹い～っぱいになるまで──召し上がれっ<emoji=heart04>」
line = "「あたしの推しへの愛、お腹い～っぱいになるまで──召し上がれっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 胸焼けしそうになるほどの甘いチョコたちだったが、どれもウズメの愛情がこもっているのだと思うとお残しなんてできるはずもなく。
line = "胸焼けしそうになるほどの甘いチョコたちだったが、どれもウズメの愛情がこもっているのだと思うとお残しなんてできるはずもなく。"

[[dialogue]]
speaker = "unk"
# この日、俺は間違いなく、人生史上最もチョコレートを食べた１日になったのだった──
line = "この日、俺は間違いなく、人生史上最もチョコレートを食べた１日になったのだった──"
