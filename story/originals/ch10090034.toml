[[dialogue]]
speaker = "unk"
# 第４話,等身大のセーラ,P
line = "第４話,等身大のセーラ,P"

[[dialogue]]
speaker = "セーラ"
# 「──およ？　会長さん？」
line = "「──およ？　会長さん？」"

[[dialogue]]
speaker = "unk"
# そろそろ帰る頃だと思って
line = "そろそろ帰る頃だと思って"

[[dialogue]]
speaker = "unk"
# お疲れさまです
line = "お疲れさまです"

[[dialogue]]
speaker = "セーラ"
# 「えぇー！　うちと一緒に帰るために、わざわざ待っててくれてたの？」
line = "「えぇー！　うちと一緒に帰るために、わざわざ待っててくれてたの？」"

[[dialogue]]
speaker = "セーラ"
# 「軽いサプライズ──って、もう。こっちに会長さんがいるなんて思わないから、びっくりしたよ」
line = "「軽いサプライズ──って、もう。こっちに会長さんがいるなんて思わないから、びっくりしたよ」"

[[dialogue]]
speaker = "セーラ"
# 「けど……嬉しいかも。うちのために校門で待っててくれるなんて……嬉しい後輩ムーブしてくれるじゃん？」
line = "「けど……嬉しいかも。うちのために校門で待っててくれるなんて……嬉しい後輩ムーブしてくれるじゃん？」"

[[dialogue]]
speaker = "セーラ"
# 「うん、一緒に帰ろ♪　今日は星徒会業務もないんだよね？」
line = "「うん、一緒に帰ろ♪　今日は星徒会業務もないんだよね？」"

[[dialogue]]
speaker = "セーラ"
# 「んー……そだ。せっかくならどこかで遊んでく？」
line = "「んー……そだ。せっかくならどこかで遊んでく？」"

[[dialogue]]
speaker = "セーラ"
# 「今ならけっこう時間あるし。ちょうどめちゃ寒かったからさ、リップルちゃんのリゾート結界とか──」
line = "「今ならけっこう時間あるし。ちょうどめちゃ寒かったからさ、リップルちゃんのリゾート結界とか──」"

[[dialogue]]
speaker = "セーラ"
# 「……え？　メンテ中！？」
line = "「……え？　メンテ中！？」"

[[dialogue]]
speaker = "unk"
# 夏パワーの落ち込みで
line = "夏パワーの落ち込みで"

[[dialogue]]
speaker = "unk"
# この前の事件の影響で
line = "この前の事件の影響で"

[[dialogue]]
speaker = "セーラ"
# 「そっか、リゾート結界自体が緊急拡張中なんだっけ。こりゃ落とし穴だ……」
line = "「そっか、リゾート結界自体が緊急拡張中なんだっけ。こりゃ落とし穴だ……」"

[[dialogue]]
speaker = "セーラ"
# 「全生徒向けのリゾート結界なら開いてる？　なら、全然そっちでも──」
line = "「全生徒向けのリゾート結界なら開いてる？　なら、全然そっちでも──」"

[[dialogue]]
speaker = "セーラ"
# 「──あっ！　待って！　でも！」
line = "「──あっ！　待って！　でも！」"

[[dialogue]]
speaker = "unk"
# 何か問題が？
line = "何か問題が？"

[[dialogue]]
speaker = "unk"
# どうしました？
line = "どうしました？"

[[dialogue]]
speaker = "セーラ"
# 「むぅ……いや……会長さんに限って……でも……今さらな話でもあって……うちが釘付けにすれば……ぐむむ……」
line = "「むぅ……いや……会長さんに限って……でも……今さらな話でもあって……うちが釘付けにすれば……ぐむむ……」"

[[dialogue]]
speaker = "セーラ"
# 「──よし。大丈夫。行こう！」
line = "「──よし。大丈夫。行こう！」"

[[dialogue]]
speaker = "セーラ"
# 「会長さん──そーれ！　あはは、もっとかけちゃえ～！」
line = "「会長さん──そーれ！　あはは、もっとかけちゃえ～！」"

[[dialogue]]
speaker = "セーラ"
# 「……ん？　周りキョロキョロして、どしたの？」
line = "「……ん？　周りキョロキョロして、どしたの？」"

[[dialogue]]
speaker = "unk"
# 注目されてる
line = "注目されてる"

[[dialogue]]
speaker = "unk"
# 目立ちますね
line = "目立ちますね"

[[dialogue]]
speaker = "セーラ"
# 「そう？　まーでも、しょうがないんじゃない？」
line = "「そう？　まーでも、しょうがないんじゃない？」"

[[dialogue]]
speaker = "セーラ"
# 「なんたって会長さんは会長さんだから！　魔王だし。有名人だし。ま、多少は有名税ってことで」
line = "「なんたって会長さんは会長さんだから！　魔王だし。有名人だし。ま、多少は有名税ってことで」"

[[dialogue]]
speaker = "セーラ"
# 「え……うちもうちで目立つ？」
line = "「え……うちもうちで目立つ？」"

[[dialogue]]
speaker = "セーラ"
# 「そうかな？　あんま自覚ないけど──まあ星徒会の役員だから、割と知られてはいるのかな……？」
line = "「そうかな？　あんま自覚ないけど──まあ星徒会の役員だから、割と知られてはいるのかな……？」"

[[dialogue]]
speaker = "セーラ"
# 「セーラさんは派手で綺麗だから……？　ほほーん……言うようになったねえ、会長さんも」
line = "「セーラさんは派手で綺麗だから……？　ほほーん……言うようになったねえ、会長さんも」"

[[dialogue]]
speaker = "セーラ"
# 「ま、褒め言葉として受け取っておきましょー！」
line = "「ま、褒め言葉として受け取っておきましょー！」"

[[dialogue]]
speaker = "セーラ"
# 「それより──会長さんのほうこそ、うちは気になるんだよねえ。むむむっ……！」
line = "「それより──会長さんのほうこそ、うちは気になるんだよねえ。むむむっ……！」"

[[dialogue]]
speaker = "unk"
# 俺の顔に何か？
line = "俺の顔に何か？"

[[dialogue]]
speaker = "unk"
# ……どうしました？
line = "……どうしました？"

[[dialogue]]
speaker = "セーラ"
# 「いや……うちのことずっと見てくれてるな──って……うん」
line = "「いや……うちのことずっと見てくれてるな──って……うん」"

[[dialogue]]
speaker = "セーラ"
# 「なんでもない！　さ、向こうでまたフライボードチャレンジしよ──！」
line = "「なんでもない！　さ、向こうでまたフライボードチャレンジしよ──！」"

[[dialogue]]
speaker = "unk"
# それからしばらく、セーラさんと浜辺で遊んだ……。
line = "それからしばらく、セーラさんと浜辺で遊んだ……。"

[[dialogue]]
speaker = "セーラ"
# 「見てみて、夕焼け！　水平線に沈む夕陽って──めっちゃロマンチックじゃない？」
line = "「見てみて、夕焼け！　水平線に沈む夕陽って──めっちゃロマンチックじゃない？」"

[[dialogue]]
speaker = "セーラ"
# 「ふふっ、だよね。会長さんと一緒にこんな景色見られるの、嬉しいな」
line = "「ふふっ、だよね。会長さんと一緒にこんな景色見られるの、嬉しいな」"

[[dialogue]]
speaker = "セーラ"
# 「……ん？　今日、うちの様子がちょっと変だった？」
line = "「……ん？　今日、うちの様子がちょっと変だった？」"

[[dialogue]]
speaker = "セーラ"
# 「……バレたか。実は、ちょっと気がかりだった」
line = "「……バレたか。実は、ちょっと気がかりだった」"

[[dialogue]]
speaker = "セーラ"
# 「ほら。今日はパブリックビーチの方でさあ。周りは可愛い水着の女の子だらけなワケじゃん？」
line = "「ほら。今日はパブリックビーチの方でさあ。周りは可愛い水着の女の子だらけなワケじゃん？」"

[[dialogue]]
speaker = "セーラ"
# 「だから──こっち来たら会長さん、目移りしちゃわないかなって。ちょっと不安になっちゃってた。杞憂だったけどね！」
line = "「だから──こっち来たら会長さん、目移りしちゃわないかなって。ちょっと不安になっちゃってた。杞憂だったけどね！」"

[[dialogue]]
speaker = "セーラ"
# 「恋人だから当然……？　ふふ、言ってくれるねえ」
line = "「恋人だから当然……？　ふふ、言ってくれるねえ」"

[[dialogue]]
speaker = "セーラ"
# 「……意外？　そんなことないっしょ」
line = "「……意外？　そんなことないっしょ」"

[[dialogue]]
speaker = "セーラ"
# 「焼きもちくらい……焼くよ。うちだって、１年先輩ってだけで……そんな大した人間じゃないんだからさ」
line = "「焼きもちくらい……焼くよ。うちだって、１年先輩ってだけで……そんな大した人間じゃないんだからさ」"

[[dialogue]]
speaker = "セーラ"
# 「会長さんの前じゃ、ちょっと無理して格好つけちゃうこともあるってだけで」
line = "「会長さんの前じゃ、ちょっと無理して格好つけちゃうこともあるってだけで」"

[[dialogue]]
speaker = "セーラ"
# 「ホントは……好きな人の前で保てる余裕とか、そんなにないんだからね？」
line = "「ホントは……好きな人の前で保てる余裕とか、そんなにないんだからね？」"

[[dialogue]]
speaker = "unk"
# ぐっときました
line = "ぐっときました"

[[dialogue]]
speaker = "unk"
# ……！
line = "……！"

[[dialogue]]
speaker = "セーラ"
# 「ふふっ、やりぃ。他の子なんて目に入らないよう、会長さんのハートは定期的に射抜いていかなくちゃ」
line = "「ふふっ、やりぃ。他の子なんて目に入らないよう、会長さんのハートは定期的に射抜いていかなくちゃ」"

[[dialogue]]
speaker = "セーラ"
# 「今日はうちの部屋……来る？」
line = "「今日はうちの部屋……来る？」"

[[dialogue]]
speaker = "セーラ"
# 「ふふっ……大人の階段昇るなら、それも全部一緒がいいよね。会長さん」
line = "「ふふっ……大人の階段昇るなら、それも全部一緒がいいよね。会長さん」"
