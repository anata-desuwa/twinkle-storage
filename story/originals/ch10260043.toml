[[dialogue]]
speaker = "unk"
# 第３話,マジカル新婚ドリーマー,P
line = "第３話,マジカル新婚ドリーマー,P"

[[dialogue]]
speaker = "unk"
# 目を覚ましたら、何故かリビングのソファーの上。
line = "目を覚ましたら、何故かリビングのソファーの上。"

[[dialogue]]
speaker = "unk"
# しかもリーリアは新婚ごっこのような話ぶりで、俺は困惑してしまっていた。
line = "しかもリーリアは新婚ごっこのような話ぶりで、俺は困惑してしまっていた。"

[[dialogue]]
speaker = "リーリア"
# 「そうですよ～☆　私とセンパイは学園を卒業した後に結婚して、今はこうして一緒に暮らしてるんじゃないですか～」
line = "「そうですよ～☆　私とセンパイは学園を卒業した後に結婚して、今はこうして一緒に暮らしてるんじゃないですか～」"

[[dialogue]]
speaker = "unk"
# 学園を卒業して、結婚……？
line = "学園を卒業して、結婚……？"

[[dialogue]]
speaker = "リーリア"
# 「センパイ？　本当に大丈夫ですか？　なんだかさっきから、様子が変ですけど……」
line = "「センパイ？　本当に大丈夫ですか？　なんだかさっきから、様子が変ですけど……」"

[[dialogue]]
speaker = "unk"
# ──そこで突然、俺の脳裏に『学園を卒業した後、リーリアと結婚した』記憶が、ゆっくりと思い出されてきて、自然と状況が飲み込めてくる。
line = "──そこで突然、俺の脳裏に『学園を卒業した後、リーリアと結婚した』記憶が、ゆっくりと思い出されてきて、自然と状況が飲み込めてくる。"

[[dialogue]]
speaker = "リーリア"
# 「――寝ぼけてて、頭が回らなくなってたみたい？　な～んだ、心配しちゃったじゃないですか～」
line = "「――寝ぼけてて、頭が回らなくなってたみたい？　な～んだ、心配しちゃったじゃないですか～」"

[[dialogue]]
speaker = "リーリア"
# 「それよりお正月なんで、学生時代の晴れ着フォームを久しぶりに着てみたんですけど、どうですか～？」
line = "「それよりお正月なんで、学生時代の晴れ着フォームを久しぶりに着てみたんですけど、どうですか～？」"

[[dialogue]]
speaker = "リーリア"
# 「ふふふっ☆　今も変わらずに可愛いでしょ～♪　結婚した奥様が魔女でよかったですね、センパイ<emoji=heart04>」
line = "「ふふふっ☆　今も変わらずに可愛いでしょ～♪　結婚した奥様が魔女でよかったですね、センパイ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「え？　――パッドもお洒落ですごく可愛いけど、胸元がセクシーすぎて他の人に見られちゃうから妬ける？」
line = "「え？　――パッドもお洒落ですごく可愛いけど、胸元がセクシーすぎて他の人に見られちゃうから妬ける？」"

[[dialogue]]
speaker = "リーリア"
# 「もう～<emoji=heart04>　センパイったら、恋人になって何年経ってると思ってるんですかぁ♪　私のこと好き過ぎて、未だにヤキモチを焼いちゃうの、ほんと可愛いんですから～<emoji=heart04>」
line = "「もう～<emoji=heart04>　センパイったら、恋人になって何年経ってると思ってるんですかぁ♪　私のこと好き過ぎて、未だにヤキモチを焼いちゃうの、ほんと可愛いんですから～<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「まあ～、でも？　センパイとの可愛い<b>赤ちゃん</b>もできちゃったわけですし、生まれた後は赤ちゃん連れてセクシー系もあれじゃないですか～」
line = "「まあ～、でも？　センパイとの可愛い<b>赤ちゃん</b>もできちゃったわけですし、生まれた後は赤ちゃん連れてセクシー系もあれじゃないですか～」"

[[dialogue]]
speaker = "unk"
# 赤ちゃん！？！？
line = "赤ちゃん！？！？"

[[dialogue]]
speaker = "unk"
# リーリアがぶっちゃけた爆弾発言に、俺は衝撃を受ける――おかしい！　それは記憶がないよ！？
line = "リーリアがぶっちゃけた爆弾発言に、俺は衝撃を受ける――おかしい！　それは記憶がないよ！？"

[[dialogue]]
speaker = "リーリア"
# 「あ～っ、さてはまだ寝ぼけたフリしてますね？　社会人になって同棲し始めてから、センパイが毎日するから、あっという間にできちゃったんじゃないですか～<emoji=heart04>」
line = "「あ～っ、さてはまだ寝ぼけたフリしてますね？　社会人になって同棲し始めてから、センパイが毎日するから、あっという間にできちゃったんじゃないですか～<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「で、それで『ちゃんと幸せにするから結婚しよう』ってプロポーズしてくれたんですよね？　忘れたなんて言わせませんよ～？」
line = "「で、それで『ちゃんと幸せにするから結婚しよう』ってプロポーズしてくれたんですよね？　忘れたなんて言わせませんよ～？」"

[[dialogue]]
speaker = "unk"
# しかも、できちゃった婚、だと！？
line = "しかも、できちゃった婚、だと！？"

[[dialogue]]
speaker = "unk"
# 思い出せないが、俺ならやりかねない気もする……！
line = "思い出せないが、俺ならやりかねない気もする……！"

[[dialogue]]
speaker = "リーリア"
# 「だからこれからは、可愛い奥さんと可愛い赤ちゃんの為に、２倍頑張らなきゃダメなんですからね、旦那様<emoji=heart04>」
line = "「だからこれからは、可愛い奥さんと可愛い赤ちゃんの為に、２倍頑張らなきゃダメなんですからね、旦那様<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「私も赤ちゃんを産んで落ち着いたら、新星学園のマジカル可愛い<b>先生</b>として、頑張りますから！」
line = "「私も赤ちゃんを産んで落ち着いたら、新星学園のマジカル可愛い<b>先生</b>として、頑張りますから！」"

[[dialogue]]
speaker = "unk"
# お腹を幸せそうにさすりながら、微笑むリーリア。
line = "お腹を幸せそうにさすりながら、微笑むリーリア。"

[[dialogue]]
speaker = "リーリア"
# 「ただ、赤ちゃんが産まれるのはすっごく楽しみですけど、センパイの恋人として過ごす時間はもうすぐ最後になるので、そこは寂しくもありますね～」
line = "「ただ、赤ちゃんが産まれるのはすっごく楽しみですけど、センパイの恋人として過ごす時間はもうすぐ最後になるので、そこは寂しくもありますね～」"

[[dialogue]]
speaker = "リーリア"
# 「なので今年は、『最後の２人きりイチャイチャデート』をたくさん企画しちゃいましょう♪」
line = "「なので今年は、『最後の２人きりイチャイチャデート』をたくさん企画しちゃいましょう♪」"

[[dialogue]]
speaker = "リーリア"
# 「――え？　子供が産まれたら、もうイチャイチャしてくれないのかって？」
line = "「――え？　子供が産まれたら、もうイチャイチャしてくれないのかって？」"

[[dialogue]]
speaker = "リーリア"
# 「なに言っちゃってるんですか～♪　そこは当然、可愛い後輩妻との新章『初めての子連れイチャイチャデート編』が始まります☆」
line = "「なに言っちゃってるんですか～♪　そこは当然、可愛い後輩妻との新章『初めての子連れイチャイチャデート編』が始まります☆」"

[[dialogue]]
speaker = "リーリア"
# 「ちなみにですけど、センパイの呼び方も『あなた』とか『パパ』とかに変えた方がいいんですかね～？」
line = "「ちなみにですけど、センパイの呼び方も『あなた』とか『パパ』とかに変えた方がいいんですかね～？」"

[[dialogue]]
speaker = "リーリア"
# 「センパイは、どういう呼ばれ方がお好みですか？　ふふふっ☆」
line = "「センパイは、どういう呼ばれ方がお好みですか？　ふふふっ☆」"

[[dialogue]]
speaker = "リーリア"
# 「と、家であんまり長居してたら、お寺さんが混んじゃいますね」
line = "「と、家であんまり長居してたら、お寺さんが混んじゃいますね」"

[[dialogue]]
speaker = "リーリア"
# 「まあとにかく、この晴れ着を着たのは、夫婦２人きりでする最後の初詣デートくらい、センパイの視線を独り占めしちゃいたいっていう乙女心なわけです<emoji=heart04>」
line = "「まあとにかく、この晴れ着を着たのは、夫婦２人きりでする最後の初詣デートくらい、センパイの視線を独り占めしちゃいたいっていう乙女心なわけです<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「今回はお願いしておきたいことが沢山ありますから、早く出かけましょう♪　センパイ<emoji=heart04>」
line = "「今回はお願いしておきたいことが沢山ありますから、早く出かけましょう♪　センパイ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアは笑顔で俺の手を取る。そうして、彼女に引っ張られるまま、俺は初詣に出かけていく――
line = "リーリアは笑顔で俺の手を取る。そうして、彼女に引っ張られるまま、俺は初詣に出かけていく――"

[[dialogue]]
speaker = "リーリア"
# 「って、どうしました、センパイ？」
line = "「って、どうしました、センパイ？」"

[[dialogue]]
speaker = "unk"
# リーリア、これからもっと幸せにするからな
line = "リーリア、これからもっと幸せにするからな"

[[dialogue]]
speaker = "リーリア"
# 「……！　はいっ♪　私も――」
line = "「……！　はいっ♪　私も――」"

[[dialogue]]
speaker = "unk"
# 目覚めると、そこはリビングではなく、俺の部屋のベッドの上だった。
line = "目覚めると、そこはリビングではなく、俺の部屋のベッドの上だった。"

[[dialogue]]
speaker = "リーリア"
# 「あ……うぅぅ……<emoji=heart04>　せ、センパイ……<emoji=heart04>」
line = "「あ……うぅぅ……<emoji=heart04>　せ、センパイ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 横を見ると、そこには俺と並んで寝ているリーリアがいた。いつになく恥ずかしそうに、真っ赤になっている彼女と目が合う。
line = "横を見ると、そこには俺と並んで寝ているリーリアがいた。いつになく恥ずかしそうに、真っ赤になっている彼女と目が合う。"

[[dialogue]]
speaker = "unk"
# もしかして、リーリアの能力で夢を……？
line = "もしかして、リーリアの能力で夢を……？"

[[dialogue]]
speaker = "リーリア"
# 「はうぅっ……<emoji=heart04>　ま――」
line = "「はうぅっ……<emoji=heart04>　ま――」"

[[dialogue]]
speaker = "リーリア"
# 「まさか本当に絵馬の願いが叶っちゃうとは思わなかったんですうぅぅぅ～～～～～～っ！！！」
line = "「まさか本当に絵馬の願いが叶っちゃうとは思わなかったんですうぅぅぅ～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# どうやら俺と同じ『夢』を見ていたらしいリーリアは、恥ずかしそうに顔を両手を覆いながら叫んでしまうのだった。
line = "どうやら俺と同じ『夢』を見ていたらしいリーリアは、恥ずかしそうに顔を両手を覆いながら叫んでしまうのだった。"
