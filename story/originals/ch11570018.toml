line = "「え……？」"

[[dialogue]]
speaker = "unk"
# ここあが振り向いて、とびおの方を見やると、そこには――未だ興奮が冷めやらぬ<ruby=オス>雄</ruby>の顔があって。
line = "ここあが振り向いて、とびおの方を見やると、そこには――未だ興奮が冷めやらぬ<ruby>雄<rt>オス</rt></ruby>の顔があって。"

[[dialogue]]
speaker = "unk"
# ここあはゾクゾクして、思わず悪戯な笑みを浮かべてしまう。
line = "ここあはゾクゾクして、思わず悪戯な笑みを浮かべてしまう。"

[[dialogue]]
speaker = "ここあ"
# 「じゃあさ、じゃあさぁ<emoji=heart04>　……あのね？　ここあ、もっとすごいエッチなこと思い付いちゃってて……<emoji=heart04>」
line = "「じゃあさ、じゃあさぁ<emoji=heart04>　……あのね？　ここあ、もっとすごいエッチなこと思い付いちゃってて……<emoji=heart04>」"

[[dialogue]]
speaker = "ここあ"
# 「電車が次の駅に止まったら、<b>繋がったまま</b>の状態で、駅のホームに降りちゃおうよぉ<emoji=heart04>」
line = "「電車が次の駅に止まったら、<b>繋がったまま</b>の状態で、駅のホームに降りちゃおうよぉ<emoji=heart04>」"

[[dialogue]]
speaker = "ここあ"
# 「あはぁあっ<emoji=heart04>　とびおっちに足を抱えてぇ、持ち上げて貰って<emoji=heart04>　いわゆる『背面駅弁スタイル』ってやつで<emoji=heart04>」
line = "「あはぁあっ<emoji=heart04>　とびおっちに足を抱えてぇ、持ち上げて貰って<emoji=heart04>　いわゆる『背面駅弁スタイル』ってやつで<emoji=heart04>」"

[[dialogue]]
speaker = "ここあ"
# 「それで駅のど真ん中でセックスしたら――もっと刺激的で、気持ち良くなれそうじゃない？<emoji=heart04>」
line = "「それで駅のど真ん中でセックスしたら――もっと刺激的で、気持ち良くなれそうじゃない？<emoji=heart04>」"

[[dialogue]]
speaker = "ここあ"
# 「あぁあっ<emoji=heart04>　そう<emoji=heart04>　そのまま持ち上げてぇ……<emoji=heart04>」
line = "「あぁあっ<emoji=heart04>　そう<emoji=heart04>　そのまま持ち上げてぇ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 電車が次の駅で止まったところで、とびおはみるみる復活した巨根を挿入し、ここあの両足を持って抱き上げる。
line = "電車が次の駅で止まったところで、とびおはみるみる復活した巨根を挿入し、ここあの両足を持って抱き上げる。"

[[dialogue]]
speaker = "ここあ"
# 「んっ……にゃあんっ<emoji=heart04>　深ぁいっ<emoji=heart04>　あはぁあんっ……<emoji=heart04>」
line = "「んっ……にゃあんっ<emoji=heart04>　深ぁいっ<emoji=heart04>　あはぁあんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして、２人は更なる刺激を求めながら、多くの人が待つ駅のホームへと歩き出すのだった――
line = "そうして、２人は更なる刺激を求めながら、多くの人が待つ駅のホームへと歩き出すのだった――"
