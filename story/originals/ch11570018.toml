[[dialogue]]
speaker = "unk"
# ここあはゆっくりとペニスを引き抜く。
line = "ここあはゆっくりとペニスを引き抜く。"

[[dialogue]]
speaker = "ここあ"
# 「あんっ<emoji=heart04>　はあぁあ……<emoji=heart04>　ふうぅ<emoji=heart04>　んふぅぅうっ<emoji=heart04>」
line = "「あんっ<emoji=heart04>　はあぁあ……<emoji=heart04>　ふうぅ<emoji=heart04>　んふぅぅうっ<emoji=heart04>」"

[[dialogue]]
speaker = "ここあ"
# 「はぁぁああん……<emoji=heart04>　たくさん人がいる中で、大きな声上げて、全力イキしちゃったねぇ<emoji=heart04>　あはぁあっ<emoji=heart04>」
line = "「はぁぁああん……<emoji=heart04>　たくさん人がいる中で、大きな声上げて、全力イキしちゃったねぇ<emoji=heart04>　あはぁあっ<emoji=heart04>」"

[[dialogue]]
speaker = "ここあ"
# 「あぁぁっ<emoji=heart04>　ダメなのに、でも……すっごく気持ちよくてぇ、幸せぇ<emoji=heart04>　あはぁあ……<emoji=heart04>」
line = "「あぁぁっ<emoji=heart04>　ダメなのに、でも……すっごく気持ちよくてぇ、幸せぇ<emoji=heart04>　あはぁあ……<emoji=heart04>」"

[[dialogue]]
speaker = "とびお"
# 「……次はどうする？」
line = "「……次はどうする？」"

