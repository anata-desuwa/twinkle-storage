[[dialogue]]
speaker = "unk"
# 第１話,裏の世界へようこそ,P
line = "第１話,裏の世界へようこそ,P"

[[dialogue]]
speaker = "unk"
# 星徒会の仕事で夜遅くなったある日の帰宅途中。ガラの悪い連中に囲まれている女子生徒を見つけ、助けに入ったのだが――
line = "星徒会の仕事で夜遅くなったある日の帰宅途中。ガラの悪い連中に囲まれている女子生徒を見つけ、助けに入ったのだが――"

[[dialogue]]
speaker = "チンピラ"
# 「この野郎！　オレ以外の連中を倒したからって、調子に乗ってんじゃねぇ！　くらいやがれ！」
line = "「この野郎！　オレ以外の連中を倒したからって、調子に乗ってんじゃねぇ！　くらいやがれ！」"

[[dialogue]]
speaker = "unk"
# ただのチンピラじゃないのか！？
line = "ただのチンピラじゃないのか！？"

[[dialogue]]
speaker = "unk"
# こいつも星術を……！
line = "こいつも星術を……！"

[[dialogue]]
speaker = "チンピラ"
# 「誰がチンピラだオラァ！　ぐあっ……！？」
line = "「誰がチンピラだオラァ！　ぐあっ……！？」"

[[dialogue]]
speaker = "unk"
# キミ、怪我はない？
line = "キミ、怪我はない？"

[[dialogue]]
speaker = "unk"
# ふぅ……何とか全員鎮圧出来たな……
line = "ふぅ……何とか全員鎮圧出来たな……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、お兄さん、強いね～♪　助かっちゃった～」
line = "「いや～、お兄さん、強いね～♪　助かっちゃった～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おっと……ちょっと足元がふらつくなぁ。気付かない内に攻撃くらってたかも……」
line = "「おっと……ちょっと足元がふらつくなぁ。気付かない内に攻撃くらってたかも……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　肩を貸してくれるの？　優しい～♪　じゃあ、お言葉に甘えて――」
line = "「ん？　肩を貸してくれるの？　優しい～♪　じゃあ、お言葉に甘えて――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「トラップ爆弾をくっ付けさせて貰うね♪」
line = "「トラップ爆弾をくっ付けさせて貰うね♪」"

[[dialogue]]
speaker = "unk"
# 全身に貼り付いて動けない！？
line = "全身に貼り付いて動けない！？"

[[dialogue]]
speaker = "unk"
# うわっ、何かガムみたいなのが
line = "うわっ、何かガムみたいなのが"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　私が事前に星術で作っておいた拘束用爆弾『ラプチャーガム』だよ。相手の星力を吸うことで粘着力が強くなるから、簡単には剥がせないよ～？」
line = "「にひひ♪　私が事前に星術で作っておいた拘束用爆弾『ラプチャーガム』だよ。相手の星力を吸うことで粘着力が強くなるから、簡単には剥がせないよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それにしても、星術を悪用する犯罪者を、秘密裏に処理する『公安委員会』なんて都市伝説があったけど、まさか実在したとはね～」
line = "「それにしても、星術を悪用する犯罪者を、秘密裏に処理する『公安委員会』なんて都市伝説があったけど、まさか実在したとはね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「違う？　自分は星徒会長？　いやいや、転入して早々に会長就任とか怪し過ぎるでしょ～。本当は公安委員会のエージェントなんだよね？　あくまでしらを切るっていうなら――」
line = "「違う？　自分は星徒会長？　いやいや、転入して早々に会長就任とか怪し過ぎるでしょ～。本当は公安委員会のエージェントなんだよね？　あくまでしらを切るっていうなら――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「脇腹を……えいっ♪」
line = "「脇腹を……えいっ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「こうやって、拷問するしかないよね～♪　こちょこちょこちょ～♪」
line = "「こうやって、拷問するしかないよね～♪　こちょこちょこちょ～♪」"

[[dialogue]]
speaker = "unk"
# あはははははは！
line = "あはははははは！"

[[dialogue]]
speaker = "unk"
# ちょっ……やめっ
line = "ちょっ……やめっ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　きゃはははははは！　会長の悶える顔見るの、楽しくて癖になっちゃうかも～♪」
line = "「にひひ♪　きゃはははははは！　会長の悶える顔見るの、楽しくて癖になっちゃうかも～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ……やべっ、会長って言っちった☆」
line = "「あっ……やべっ、会長って言っちった☆」"

[[dialogue]]
speaker = "せつな"
# 「マイン殿、ちょっと遊び過ぎでござる」
line = "「マイン殿、ちょっと遊び過ぎでござる」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あちゃ～、もう見つかっちゃったか。本丸はもう制圧終了？」
line = "「あちゃ～、もう見つかっちゃったか。本丸はもう制圧終了？」"

[[dialogue]]
speaker = "せつな"
# 「左様。その報告にと来てみれば……主様に何をしているのでござるか」
line = "「左様。その報告にと来てみれば……主様に何をしているのでござるか」"

[[dialogue]]
speaker = "unk"
# 制圧って一体何を……！？
line = "制圧って一体何を……！？"

[[dialogue]]
speaker = "unk"
# せつな……！？
line = "せつな……！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「しゃーない。もうちょっと遊びたかったけど……拘束解除っと」
line = "「しゃーない。もうちょっと遊びたかったけど……拘束解除っと」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はい、これで拘束は消えたから、自由に動けるよ～♪」
line = "「はい、これで拘束は消えたから、自由に動けるよ～♪」"

[[dialogue]]
speaker = "せつな"
# 「任務中に悪戯心を出すのは、マイン殿の悪い癖にござる。しかも主様相手とは……」
line = "「任務中に悪戯心を出すのは、マイン殿の悪い癖にござる。しかも主様相手とは……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長に獲物を奪われちゃったからさ～。その代わりに、ストレス解消を引き受けて貰ったんだよ♪　大丈夫、痛いことはしてないって～」
line = "「会長に獲物を奪われちゃったからさ～。その代わりに、ストレス解消を引き受けて貰ったんだよ♪　大丈夫、痛いことはしてないって～」"

[[dialogue]]
speaker = "せつな"
# 「そういう問題じゃないでござる！　第一、これでは主様に我々の任務を知られ……まさかマイン殿、主様に話したのでござるか？」
line = "「そういう問題じゃないでござる！　第一、これでは主様に我々の任務を知られ……まさかマイン殿、主様に話したのでござるか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや、まだ。……だけど、委員会の取り決めでは、星徒会長には事情に応じて身分を明かしていいってことになってたよ？」
line = "「いや、まだ。……だけど、委員会の取り決めでは、星徒会長には事情に応じて身分を明かしていいってことになってたよ？」"

[[dialogue]]
speaker = "せつな"
# 「ヴィーナスお嬢様には明かさなかったのにでござるか！？　それに、上の判断も仰ぐ必要が……」
line = "「ヴィーナスお嬢様には明かさなかったのにでござるか！？　それに、上の判断も仰ぐ必要が……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「怒られるかもね～。でも、そこはまあ交渉するよ。私は一応、交渉人だからね♪」
line = "「怒られるかもね～。でも、そこはまあ交渉するよ。私は一応、交渉人だからね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そんなわけで会長。色々と疑問符を頭に抱えてるだろうから、自己紹介させてもらうね」
line = "「そんなわけで会長。色々と疑問符を頭に抱えてるだろうから、自己紹介させてもらうね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私は新星学園の１年生、立朽ネーゼマイン。学園の裏組織『公安委員会』に所属するエージェントなんだ。よろしくね♪」
line = "「私は新星学園の１年生、立朽ネーゼマイン。学園の裏組織『公安委員会』に所属するエージェントなんだ。よろしくね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「当たり前だけど、星力を持っている人が全員、星騎士になるわけじゃないし、善人なわけでもない」
line = "「当たり前だけど、星力を持っている人が全員、星騎士になるわけじゃないし、善人なわけでもない」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そういった星術使いの犯罪が、事件化する前に秘密裏に処理するのが私達の使命ってわけ。だから表向きには存在しない、裏の委員会ってこと」
line = "「そういった星術使いの犯罪が、事件化する前に秘密裏に処理するのが私達の使命ってわけ。だから表向きには存在しない、裏の委員会ってこと」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「何故自分に話したのかって顔だね？　こうして現場を見られたからってのもあるけど……ヴィーナスさんより、会長はこっちの世界に向いてそうだって、私が感じたからかな？」
line = "「何故自分に話したのかって顔だね？　こうして現場を見られたからってのもあるけど……ヴィーナスさんより、会長はこっちの世界に向いてそうだって、私が感じたからかな？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「せつなとも既に面識があるみたいだし。会長の適応力に関しては、目を見張るものがあるよ」
line = "「せつなとも既に面識があるみたいだし。会長の適応力に関しては、目を見張るものがあるよ」"

[[dialogue]]
speaker = "せつな"
# 「せつなは別に、主様を巻き込む気は……」
line = "「せつなは別に、主様を巻き込む気は……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、せつなだって、主様がバックアップしてくれたら、心強いし、嬉しいでしょ？」
line = "「でも、せつなだって、主様がバックアップしてくれたら、心強いし、嬉しいでしょ？」"

[[dialogue]]
speaker = "せつな"
# 「それはまあ……仕事を褒めてもらえたりしたら、嬉しいでござるが……」
line = "「それはまあ……仕事を褒めてもらえたりしたら、嬉しいでござるが……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それに私の想像通りなら、会長はそういう悪が存在すると知ってしまった以上、何も見なかったことになんて出来ない人なんじゃないかな。……違います？」
line = "「それに私の想像通りなら、会長はそういう悪が存在すると知ってしまった以上、何も見なかったことになんて出来ない人なんじゃないかな。……違います？」"

[[dialogue]]
speaker = "unk"
# うん。見なかったことには出来ない
line = "うん。見なかったことには出来ない"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だったら、正体を明かして、協力を取り付けちゃった方がメリットが大きい。そうじゃない？」
line = "「だったら、正体を明かして、協力を取り付けちゃった方がメリットが大きい。そうじゃない？」"

[[dialogue]]
speaker = "せつな"
# 「……マイン殿、まさかとは思うでござるが、この状況をわざと作り出して……」
line = "「……マイン殿、まさかとは思うでござるが、この状況をわざと作り出して……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　いや、流石に勘繰り過ぎだよ～。偶然だよ、偶然♪　でも……」
line = "「ん？　いや、流石に勘繰り過ぎだよ～。偶然だよ、偶然♪　でも……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「偶然なら仕方ないよね？　見られてしまったから、交渉して協力関係を結んだ。ミスはフォロー出来たし、結果的にはプラスになってる」
line = "「偶然なら仕方ないよね？　見られてしまったから、交渉して協力関係を結んだ。ミスはフォロー出来たし、結果的にはプラスになってる」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私が怒られるだけで、結果オーライってやつじゃないかな？　にひひ♪」
line = "「私が怒られるだけで、結果オーライってやつじゃないかな？　にひひ♪」"

[[dialogue]]
speaker = "せつな"
# 「あ、あまり追究すると怖いので……せつなは聞かなかったことにしておくでござる」
line = "「あ、あまり追究すると怖いので……せつなは聞かなかったことにしておくでござる」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ともあれ、これから会長には色々とお願いすると思うんで、よろしくお願いしますね♪」
line = "「ともあれ、これから会長には色々とお願いすると思うんで、よろしくお願いしますね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「裏の世界へようこそ、会長♪」
line = "「裏の世界へようこそ、会長♪」"

[[dialogue]]
speaker = "unk"
# そう言って、ネーゼマインは楽しげに、ニヤリと笑ってみせるのだった。
line = "そう言って、ネーゼマインは楽しげに、ニヤリと笑ってみせるのだった。"
