[[dialogue]]
speaker = "unk"
# 第３話,デネブ探訪,P
line = "第３話,デネブ探訪,P"

[[dialogue]]
speaker = "ルヴィネ"
# 「ん……平行世界間の移動は、問題なしね」
line = "「ん……平行世界間の移動は、問題なしね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ごめんなさい魔王。まだチナたちがアルタイルから帰る日は先だけれど……こっちの世界にいる幼い彼女たちのことが気になってしまって」
line = "「ごめんなさい魔王。まだチナたちがアルタイルから帰る日は先だけれど……こっちの世界にいる幼い彼女たちのことが気になってしまって」"

[[dialogue]]
speaker = "unk"
# 改良された平行世界間の転送装置は、アルタイルとデネブの双方から、同時にヒトを送り合い、交換できるようになった。
line = "改良された平行世界間の転送装置は、アルタイルとデネブの双方から、同時にヒトを送り合い、交換できるようになった。"

[[dialogue]]
speaker = "unk"
# この機能により、双方の世界に同一存在がいたとしても、予定を合わせて人物を交換すれば、意識の昏倒は起こらない。
line = "この機能により、双方の世界に同一存在がいたとしても、予定を合わせて人物を交換すれば、意識の昏倒は起こらない。"

[[dialogue]]
speaker = "unk"
# ……逆に言うと、チナたちがアルタイルに出向いている間は、彼女らの同一存在はデネブに遊びに来ていることになる。
line = "……逆に言うと、チナたちがアルタイルに出向いている間は、彼女らの同一存在はデネブに遊びに来ていることになる。"

[[dialogue]]
speaker = "ルヴィネ"
# 「アルタイルのチナたちの様子を見るためにも、今日１日は、デネブで過ごしてもいいかしら？」
line = "「アルタイルのチナたちの様子を見るためにも、今日１日は、デネブで過ごしてもいいかしら？」"

[[dialogue]]
speaker = "unk"
# こっちの母さんやアポロにも挨拶したいから
line = "こっちの母さんやアポロにも挨拶したいから"

[[dialogue]]
speaker = "unk"
# 問題ないよ
line = "問題ないよ"

[[dialogue]]
speaker = "ルヴィネ"
# 「そう言ってくれると助かるわ。ついでと言ったら何だけど、デネブの流星市国を案内させて」
line = "「そう言ってくれると助かるわ。ついでと言ったら何だけど、デネブの流星市国を案内させて」"

[[dialogue]]
speaker = "ルヴィネ"
# 「まだ完全に復興しているとは言えないけれど……全ての戦いが終わった今、デネブは平和そのもの」
line = "「まだ完全に復興しているとは言えないけれど……全ての戦いが終わった今、デネブは平和そのもの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「貴方に対する誤解も解けているから『空間の魔女』の魔法で身を隠す必要もないわ」
line = "「貴方に対する誤解も解けているから『空間の魔女』の魔法で身を隠す必要もないわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「たくさん迷惑をかけてきたお詫びに、貴方をもてなしたいの。今日はゆっくり羽を伸ばしていって頂戴？」
line = "「たくさん迷惑をかけてきたお詫びに、貴方をもてなしたいの。今日はゆっくり羽を伸ばしていって頂戴？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ここが極星学園の中庭ね。広さ自体は、新星学園とほとんど変わらないかしら」
line = "「ここが極星学園の中庭ね。広さ自体は、新星学園とほとんど変わらないかしら」"

[[dialogue]]
speaker = "unk"
# カフェテリアや大聖堂の場所も同じだ
line = "カフェテリアや大聖堂の場所も同じだ"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうね。極星学園の建設にあたって、元あった建物から参考にした点も多いの」
line = "「そうね。極星学園の建設にあたって、元あった建物から参考にした点も多いの」"

[[dialogue]]
speaker = "ルヴィネ"
# 「アルタイルのアリーナみたいに、再現できていない場所もあるけれど……魔王が望むならどこでも案内するわ」
line = "「アルタイルのアリーナみたいに、再現できていない場所もあるけれど……魔王が望むならどこでも案内するわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「お互いの良いところをまねて、より良い学園を目指していけたらいいわね」
line = "「お互いの良いところをまねて、より良い学園を目指していけたらいいわね」"

[[dialogue]]
speaker = "unk"
# これまでデネブを訪れた回数は２回──１度目はチナの自爆を防いだ時の事故で。２度目は『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との決着のために乗り込んだ。
line = "これまでデネブを訪れた回数は２回──１度目はチナの自爆を防いだ時の事故で。２度目は『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との決着のために乗り込んだ。"

[[dialogue]]
speaker = "unk"
# だからこんなにも穏やかな気持ちでデネブの世界を回れるのは初めてのこと。１０年も未来を進む流星市国、楽しませてもらおう──
line = "だからこんなにも穏やかな気持ちでデネブの世界を回れるのは初めてのこと。１０年も未来を進む流星市国、楽しませてもらおう──"

[[dialogue]]
speaker = "ルヴィネ"
# 「そろそろお昼時だし、何か食べましょうか。魔王、希望はあるかしら？」
line = "「そろそろお昼時だし、何か食べましょうか。魔王、希望はあるかしら？」"

[[dialogue]]
speaker = "unk"
# ルヴィネのお気に入りの店だよな
line = "ルヴィネのお気に入りの店だよな"

[[dialogue]]
speaker = "unk"
# 『火仙』に行きたい
line = "『火仙』に行きたい"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうだけど──どうしてそのことを知っているの？」
line = "「そうだけど──どうしてそのことを知っているの？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「エステルと私が話しているのを聞いていた……？　そう、『空間の魔女』の力で、私のすぐ傍にいた時があったのね」
line = "「エステルと私が話しているのを聞いていた……？　そう、『空間の魔女』の力で、私のすぐ傍にいた時があったのね」"

[[dialogue]]
speaker = "unk"
# 担々麺はゴマが命！
line = "担々麺はゴマが命！"

[[dialogue]]
speaker = "ルヴィネ"
# 「その通りよ！！　よくわかっているじゃない！！」
line = "「その通りよ！！　よくわかっているじゃない！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……昔は食べ物にこだわりなんてなかったわ。でもベアトたちのおかげで、食事を楽しむようになって──」
line = "「……昔は食べ物にこだわりなんてなかったわ。でもベアトたちのおかげで、食事を楽しむようになって──」"

[[dialogue]]
speaker = "ルヴィネ"
# 「最初は『フリ』だったのよ。周りに怪しまれないようにしないとダメだって思って……」
line = "「最初は『フリ』だったのよ。周りに怪しまれないようにしないとダメだって思って……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも色々な食事を試しているうちに、自分の嗜好がわかってきて──こだわりも出てきた……」
line = "「でも色々な食事を試しているうちに、自分の嗜好がわかってきて──こだわりも出てきた……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「自覚していなかったけれど、女神の幼体としての私は、とっくに壊れていたんだと思う。そのことに、魔王と相対するまで気づかなかった……」
line = "「自覚していなかったけれど、女神の幼体としての私は、とっくに壊れていたんだと思う。そのことに、魔王と相対するまで気づかなかった……」"

[[dialogue]]
speaker = "unk"
# ルヴィネはもう傀儡じゃない
line = "ルヴィネはもう傀儡じゃない"

[[dialogue]]
speaker = "unk"
# 大切なのは『今』だ
line = "大切なのは『今』だ"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうね──全部、貴方のおかげよ」
line = "「そうね──全部、貴方のおかげよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それじゃあ『火仙』に行きましょうか。オススメのメニューから何から、全部教えてあげるわ」
line = "「それじゃあ『火仙』に行きましょうか。オススメのメニューから何から、全部教えてあげるわ」"

[[dialogue]]
speaker = "unk"
# そうしてルヴィネに案内されて、デネブの流星市国を満喫し──その足でレジスタンスのアジトにも訪れた。
line = "そうしてルヴィネに案内されて、デネブの流星市国を満喫し──その足でレジスタンスのアジトにも訪れた。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「よう、２人とも！　わざわざ顔を見せに来てくれたのか！」
line = "「よう、２人とも！　わざわざ顔を見せに来てくれたのか！」"

[[dialogue]]
speaker = "リノ"
# 「いらっしゃ～い♪　子供たちもみんな元気にしてるわよ」
line = "「いらっしゃ～い♪　子供たちもみんな元気にしてるわよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「感謝するわ──ベアトたちも元気そうね。お土産があるから皆で食べて頂戴」
line = "「感謝するわ──ベアトたちも元気そうね。お土産があるから皆で食べて頂戴」"

[[dialogue]]
speaker = "グレイス"
# 「くんくん！　甘いおやつの香り……これはおまんじゅうですね！」
line = "「くんくん！　甘いおやつの香り……これはおまんじゅうですね！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「よくわかるわね。帰り道で見つけて買ったの──デネブまんじゅうよ。どうぞ？」
line = "「よくわかるわね。帰り道で見つけて買ったの──デネブまんじゅうよ。どうぞ？」"

[[dialogue]]
speaker = "チナ"
# 「ありがと！　天使のお姉ちゃん！」
line = "「ありがと！　天使のお姉ちゃん！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「まさか平行世界の名前が付いたお菓子が作られるだなんてなぁ……」
line = "「まさか平行世界の名前が付いたお菓子が作られるだなんてなぁ……」"

[[dialogue]]
speaker = "リノ"
# 「ふふ。世界門の管理は大変だけれど、これからもたくさん交流していくだろうし……いい傾向じゃないかしら♪」
line = "「ふふ。世界門の管理は大変だけれど、これからもたくさん交流していくだろうし……いい傾向じゃないかしら♪」"

[[dialogue]]
speaker = "unk"
# アルタイルまんじゅうも、そのうちできそう
line = "アルタイルまんじゅうも、そのうちできそう"

[[dialogue]]
speaker = "ルヴィネ"
# 「そうなったら味比べね。ふふっ」
line = "「そうなったら味比べね。ふふっ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そういえば魔王。もうじき日も暮れるけど、今日はどこに泊まるんだ？」
line = "「そういえば魔王。もうじき日も暮れるけど、今日はどこに泊まるんだ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「極星の学園寮に空いている部屋があるから、そこを使ってもらう予定よ」
line = "「極星の学園寮に空いている部屋があるから、そこを使ってもらう予定よ」"

[[dialogue]]
speaker = "リノ"
# 「え～、せっかく来てくれたんだし、ここに泊まっていけばいいじゃない！　空間魔法で、部屋はいくらでも増やせるし」
line = "「え～、せっかく来てくれたんだし、ここに泊まっていけばいいじゃない！　空間魔法で、部屋はいくらでも増やせるし」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ。ルヴィネもどうだ？　遠慮はいらないぞ！」
line = "「ああ。ルヴィネもどうだ？　遠慮はいらないぞ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でも、迷惑じゃあ……」
line = "「でも、迷惑じゃあ……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そんなことないさ。子供たちも、きっとお前と話したがってる」
line = "「そんなことないさ。子供たちも、きっとお前と話したがってる」"

[[dialogue]]
speaker = "リノ"
# 「平行世界の自分が仲良くしてる相手だもの。ねぇ、みんな？」
line = "「平行世界の自分が仲良くしてる相手だもの。ねぇ、みんな？」"

[[dialogue]]
speaker = "ベアトリス"
# 「はい！　ルヴィネさんとお話、してみたいです……！」
line = "「はい！　ルヴィネさんとお話、してみたいです……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ベアト」
line = "「……ベアト」"

[[dialogue]]
speaker = "unk"
# お言葉に甘えちゃおうか
line = "お言葉に甘えちゃおうか"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ──そうね。そうしましょうか」
line = "「ええ──そうね。そうしましょうか」"

[[dialogue]]
speaker = "unk"
# そうして俺とルヴィネは、アルタイルからやってきたベアトリスたちに囲まれながら、賑やかな外泊を楽しんだ。
line = "そうして俺とルヴィネは、アルタイルからやってきたベアトリスたちに囲まれながら、賑やかな外泊を楽しんだ。"

[[dialogue]]
speaker = "ルヴィネ"
# 「──アポロとリノに、色々なところに連れて行ってもらっているの？」
line = "「──アポロとリノに、色々なところに連れて行ってもらっているの？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ふふ……よかったら詳しく聞かせて頂戴？　デネブのこと、もっと好きになってくれると嬉しいわ」
line = "「ふふ……よかったら詳しく聞かせて頂戴？　デネブのこと、もっと好きになってくれると嬉しいわ」"

[[dialogue]]
speaker = "unk"
# ──幼いベアトリスたちに囲まれて、穏やかにほほ笑むルヴィネは、本当に幸せそうで。
line = "──幼いベアトリスたちに囲まれて、穏やかにほほ笑むルヴィネは、本当に幸せそうで。"

[[dialogue]]
speaker = "unk"
# ルヴィネを救うことが出来て良かったと、俺は改めて思うのだった──
line = "ルヴィネを救うことが出来て良かったと、俺は改めて思うのだった──"
