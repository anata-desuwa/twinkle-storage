[[dialogue]]
speaker = "unk"
# 第１１話,断片,B
line = "第１１話,断片,B"

[[dialogue]]
speaker = "リノ"
# 「とはいえ──最後まで油断は禁物よ。あれはまだ残っているから」
line = "「とはいえ──最後まで油断は禁物よ。あれはまだ残っているから」"

[[dialogue]]
speaker = "ルリエル"
# 「そ、そうです！　仮面！　仮面はどうなりましたか──？」
line = "「そ、そうです！　仮面！　仮面はどうなりましたか──？」"

[[dialogue]]
speaker = "ユウリ"
# 「砕けて……そのへんに散らばってんな」
line = "「砕けて……そのへんに散らばってんな」"

[[dialogue]]
speaker = "unk"
# 散らばる仮面の断片にはどれも、よどんだ瘴気が色濃くくすぶり続けていた。
line = "散らばる仮面の断片にはどれも、よどんだ瘴気が色濃くくすぶり続けていた。"

[[dialogue]]
speaker = "unk"
# この状態でさえ一時的な破壊にすぎない。一刻も早く封じる必要がある。
line = "この状態でさえ一時的な破壊にすぎない。一刻も早く封じる必要がある。"

[[dialogue]]
speaker = "アポロ"
# 「気をつけろ。まだ、破片といえどもリクリエの強烈な瘴気を帯びているはずだ。下手したら取り込まれる」
line = "「気をつけろ。まだ、破片といえどもリクリエの強烈な瘴気を帯びているはずだ。下手したら取り込まれる」"

[[dialogue]]
speaker = "クロト"
# 「母さん。これは……」
line = "「母さん。これは……」"

[[dialogue]]
speaker = "リノ"
# 「ええ。再生が行われる前に回収しましょう。ただし、危険だから各個分かれて」
line = "「ええ。再生が行われる前に回収しましょう。ただし、危険だから各個分かれて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おっけ──クロト、集めるわよ！」
line = "「おっけ──クロト、集めるわよ！」"

[[dialogue]]
speaker = "クロト"
# 「ああ。どんな細かい破片も残さないよう」
line = "「ああ。どんな細かい破片も残さないよう」"

[[dialogue]]
speaker = "リノ"
# 「ありがとう、みんな──お願いするわね」
line = "「ありがとう、みんな──お願いするわね」"

[[dialogue]]
speaker = "unk"
# 母さんが『シエルの筐』を取り出す。
line = "母さんが『シエルの筐』を取り出す。"

[[dialogue]]
speaker = "unk"
# キューブのような形状からフタを開くと、聖なる光が辺り一面へあふれ出した。
line = "キューブのような形状からフタを開くと、聖なる光が辺り一面へあふれ出した。"

[[dialogue]]
speaker = "ルリエル"
# 「これが天界の聖遺物……！　神々しいオーラを感じます……！」
line = "「これが天界の聖遺物……！　神々しいオーラを感じます……！」"

[[dialogue]]
speaker = "アポロ"
# 「なるほどな……確かにただの箱じゃない。これなら封印できるかもしれない」
line = "「なるほどな……確かにただの箱じゃない。これなら封印できるかもしれない」"

[[dialogue]]
speaker = "リノ"
# 「元々、特級の天災が封じられていたのを空けてもらったのよ。ずいぶん無理を言ったんだから」
line = "「元々、特級の天災が封じられていたのを空けてもらったのよ。ずいぶん無理を言ったんだから」"

[[dialogue]]
speaker = "ニャリオン"
# 「んじゃゴミ拾いといくニャンよ！　ワガハイは怖いから触らないでおくニャンが」
line = "「んじゃゴミ拾いといくニャンよ！　ワガハイは怖いから触らないでおくニャンが」"

[[dialogue]]
speaker = "ユウリ"
# 「おい」
line = "「おい」"

[[dialogue]]
speaker = "セーラ"
# 「あ、アポロちゃんも一応触らないほうがいいかな？　何が起こるかわかんないから」
line = "「あ、アポロちゃんも一応触らないほうがいいかな？　何が起こるかわかんないから」"

[[dialogue]]
speaker = "アポロ"
# 「そうだな。悪いが、任せたぞ」
line = "「そうだな。悪いが、任せたぞ」"

[[dialogue]]
speaker = "ルリエル"
# 「全部お任せなのですよ～！」
line = "「全部お任せなのですよ～！」"

[[dialogue]]
speaker = "アポロ"
# 「……ありがとう。本当に、いい奴らだな」
line = "「……ありがとう。本当に、いい奴らだな」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ──自慢の仲間たちです」
line = "「ええ──自慢の仲間たちです」"

[[dialogue]]
speaker = "unk"
# それから俺たちはフィーニスの塔の頂上に散らばった破片を慎重に回収していった。
line = "それから俺たちはフィーニスの塔の頂上に散らばった破片を慎重に回収していった。"

[[dialogue]]
speaker = "unk"
# 『シエルの筐』の封印力は大したもので、内部に収めたピースからは一切の瘴気を感じ取れなくなっていた。
line = "『シエルの筐』の封印力は大したもので、内部に収めたピースからは一切の瘴気を感じ取れなくなっていた。"

[[dialogue]]
speaker = "ユウリ"
# 「うし、あそこに落ちてるのがラストだな──」
line = "「うし、あそこに落ちてるのがラストだな──」"

[[dialogue]]
speaker = "マトイ"
# 「よかった……これで……」
line = "「よかった……これで……」"

[[dialogue]]
speaker = "unk"
# 最後のピースに手をかけようとする。その時だ。
line = "最後のピースに手をかけようとする。その時だ。"

[[dialogue]]
speaker = "ギエル"
# 「ああ……いけませんねえ。英雄ともあろうものが、最後の最後でお役目を放棄してしまうなんて」
line = "「ああ……いけませんねえ。英雄ともあろうものが、最後の最後でお役目を放棄してしまうなんて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "クロト"
# 「ギエル──どうしてここに……」
line = "「ギエル──どうしてここに……」"

[[dialogue]]
speaker = "ギエル"
# 「どうして？　これは異なことを仰る。主のもとへ駆けつけるのは、従者として当然の定めでしょう」
line = "「どうして？　これは異なことを仰る。主のもとへ駆けつけるのは、従者として当然の定めでしょう」"

[[dialogue]]
speaker = "ギエル"
# 「本来は、地上のコントロールを命じられていたのですがね。主に何かあってはいけないと思い……ただちに馳せ参じた次第ですよ」
line = "「本来は、地上のコントロールを命じられていたのですがね。主に何かあってはいけないと思い……ただちに馳せ参じた次第ですよ」"

[[dialogue]]
speaker = "unk"
# その場にあらわれた燕尾服の男──ギエルが、最後の断片を拾っていった。
line = "その場にあらわれた燕尾服の男──ギエルが、最後の断片を拾っていった。"

[[dialogue]]
speaker = "アポロ"
# 「ギエル……待て。そいつを拾ったらダメだ」
line = "「ギエル……待て。そいつを拾ったらダメだ」"

[[dialogue]]
speaker = "ギエル"
# 「おやおや。アポロ様。どうされました？　仮面を脱いで、そのような者たちと馴れ合うなど」
line = "「おやおや。アポロ様。どうされました？　仮面を脱いで、そのような者たちと馴れ合うなど」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは……あたしは目を覚ました。世界を壊せばいいだなんて馬鹿げてた」
line = "「あたしは……あたしは目を覚ました。世界を壊せばいいだなんて馬鹿げてた」"

[[dialogue]]
speaker = "アポロ"
# 「オマエにも──迷惑かけた。悪かった。だから、それ以上アポロの幻影を追っちゃいけない」
line = "「オマエにも──迷惑かけた。悪かった。だから、それ以上アポロの幻影を追っちゃいけない」"

[[dialogue]]
speaker = "アポロ"
# 「オマエはただの人間だ。まだ引き返せる。妹たちと一緒に」
line = "「オマエはただの人間だ。まだ引き返せる。妹たちと一緒に」"

[[dialogue]]
speaker = "ギエル"
# 「なるほど。あなたが私の主だったなら従ったでしょう──が。『使徒』を捨てたあなた様に仕える義理はありませんねぇ」
line = "「なるほど。あなたが私の主だったなら従ったでしょう──が。『使徒』を捨てたあなた様に仕える義理はありませんねぇ」"

[[dialogue]]
speaker = "ソフィア"
# 「っ、この人……！」
line = "「っ、この人……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「待ちなさいよ──せっかく戦いは終わったのよ！　アポロだって正気に戻って──」
line = "「待ちなさいよ──せっかく戦いは終わったのよ！　アポロだって正気に戻って──」"

[[dialogue]]
speaker = "ギエル"
# 「で？　世界は何も変わっていない。それじゃあいけない」
line = "「で？　世界は何も変わっていない。それじゃあいけない」"

[[dialogue]]
speaker = "ギエル"
# 「何が仲間──所詮はひねた選民思想。あなた達のような正義だの、友情だの、そうした欺瞞が私は何より嫌いなのですよ」
line = "「何が仲間──所詮はひねた選民思想。あなた達のような正義だの、友情だの、そうした欺瞞が私は何より嫌いなのですよ」"

[[dialogue]]
speaker = "ギエル"
# 「元・<ruby=あるじ>主</ruby>にこれが不要というのなら……私が定めを受け継ぎ、真の終焉を拝ませていただくとしましょう！」
line = "「元・<ruby>主<rt>あるじ</rt></ruby>にこれが不要というのなら……私が定めを受け継ぎ、真の終焉を拝ませていただくとしましょう！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「──ッ！」
line = "「──ッ！」"

[[dialogue]]
speaker = "クロト"
# 「やめろギエル──おまえまで取り込まれるぞ！」
line = "「やめろギエル──おまえまで取り込まれるぞ！」"

[[dialogue]]
speaker = "unk"
# ギエルの拾い上げた最後の破片に、リクリエの瘴気が宿り始める。
line = "ギエルの拾い上げた最後の破片に、リクリエの瘴気が宿り始める。"

[[dialogue]]
speaker = "unk"
# それに対抗するかのように『シエルの筐』がかつてないほど<ruby=かくしゃく>赫灼</ruby>した。
line = "それに対抗するかのように『シエルの筐』がかつてないほど<ruby>赫灼<rt>かくしゃく</rt></ruby>した。"

[[dialogue]]
speaker = "リノ"
# 「させないわ──ソレは必ずこの場で封印する。私の命に代えても──！」
line = "「させないわ──ソレは必ずこの場で封印する。私の命に代えても──！」"

[[dialogue]]
speaker = "ギエル"
# 「天界の聖遺物……なるほど。魔女の動きは掴んでいましたが、そのアイテムは想定外だ」
line = "「天界の聖遺物……なるほど。魔女の動きは掴んでいましたが、そのアイテムは想定外だ」"

[[dialogue]]
speaker = "ギエル"
# 「ですが──無駄だ。世界を終わらせる厄災は、いかなる外殻にも縛られない！」
line = "「ですが──無駄だ。世界を終わらせる厄災は、いかなる外殻にも縛られない！」"

[[dialogue]]
speaker = "クロト"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# ギエルを覆っていた『影』が破片に共鳴した。
line = "ギエルを覆っていた『影』が破片に共鳴した。"

[[dialogue]]
speaker = "unk"
# すると、その現象へ呼応するかのように──『筐』内部に収めたはずの断片までもが暴走を始めた！
line = "すると、その現象へ呼応するかのように──『筐』内部に収めたはずの断片までもが暴走を始めた！"

[[dialogue]]
speaker = "ギエル"
# 「さあ──『使徒』の仮面よ！　新たな主導者の誕生を祝して集うがいい──！」
line = "「さあ──『使徒』の仮面よ！　新たな主導者の誕生を祝して集うがいい──！」"

[[dialogue]]
speaker = "ユウリ"
# 「なっ……待て！　せっかく集めた破片が──！」
line = "「なっ……待て！　せっかく集めた破片が──！」"

[[dialogue]]
speaker = "リノ"
# 「く──っ……！？　ダメ、流出が抑えられない──！」
line = "「く──っ……！？　ダメ、流出が抑えられない──！」"

[[dialogue]]
speaker = "unk"
# ギエルの掲げる一欠片へ向けて集約されていく仮面の断片！
line = "ギエルの掲げる一欠片へ向けて集約されていく仮面の断片！"

[[dialogue]]
speaker = "unk"
# 爆発的に膨れ上がる負のエネルギーが、ギエルの全身を包み込んで──
line = "爆発的に膨れ上がる負のエネルギーが、ギエルの全身を包み込んで──"

[[dialogue]]
speaker = "ギエル"
# 「さあ──終曲の調べを奏でるとしましょうか！」
line = "「さあ──終曲の調べを奏でるとしましょうか！」"
