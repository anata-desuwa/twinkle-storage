[[dialogue]]
speaker = "unk"
# アムとナミエルは物理的に離れられない二人三脚状態の為、その日の夜から、星見家内にあるナミエルの部屋で、一緒に寝泊りすることになった。
line = "アムとナミエルは物理的に離れられない二人三脚状態の為、その日の夜から、星見家内にあるナミエルの部屋で、一緒に寝泊りすることになった。"

[[dialogue]]
speaker = "ナミエル"
# 「ここが私の部屋です。どうぞ……」
line = "「ここが私の部屋です。どうぞ……」"

[[dialogue]]
speaker = "アム"
# 「お邪魔しま～す♪　わぁっ、すごい！　ぬいぐるみがめっちゃ沢山ある～♪」
line = "「お邪魔しま～す♪　わぁっ、すごい！　ぬいぐるみがめっちゃ沢山ある～♪」"

[[dialogue]]
speaker = "スノーマン"
# 「ほんとだ。数え切れないくらい、ぬいぐるみいっぱい♪」
line = "「ほんとだ。数え切れないくらい、ぬいぐるみいっぱい♪」"

[[dialogue]]
speaker = "アム"
# 「ナミエル、ぬいぐるみが好きなの？」
line = "「ナミエル、ぬいぐるみが好きなの？」"

[[dialogue]]
speaker = "ナミエル"
# 「えっと……まぁ、はい……」
line = "「えっと……まぁ、はい……」"

[[dialogue]]
speaker = "ナミエル"
# （状況が状況なので仕方ありませんが、まさか自分の部屋に誰かを泊めることになるなんて……）
line = "（状況が状況なので仕方ありませんが、まさか自分の部屋に誰かを泊めることになるなんて……）"

[[dialogue]]
speaker = "ナミエル"
# （おかげで、部屋の中がぬいぐるみだらけなのを見られることに……。うぅ……恥ずかしい……！）
line = "（おかげで、部屋の中がぬいぐるみだらけなのを見られることに……。うぅ……恥ずかしい……！）"

[[dialogue]]
speaker = "アム"
# 「ってことは、アレだ！　ナミエル、もしかしてクールで真面目だけど、実は『可愛いもの』が好きだったりする……！？」
line = "「ってことは、アレだ！　ナミエル、もしかしてクールで真面目だけど、実は『可愛いもの』が好きだったりする……！？」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、その……」
line = "「そ、その……」"

[[dialogue]]
speaker = "アム"
# 「あっ、その反応！　やっぱりそうなんだ～♪」
line = "「あっ、その反応！　やっぱりそうなんだ～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「うぅ……！　わ、悪いですかっ！？　可愛いものが好きだったら……！」
line = "「うぅ……！　わ、悪いですかっ！？　可愛いものが好きだったら……！」"

[[dialogue]]
speaker = "アム"
# 「え？　いや、全然？」
line = "「え？　いや、全然？」"

[[dialogue]]
speaker = "アム"
# 「好きなものは人それぞれだし、いいと思うよ♪　それに、人の好きなものをバカにするなんて、カッコよくないしね！」
line = "「好きなものは人それぞれだし、いいと思うよ♪　それに、人の好きなものをバカにするなんて、カッコよくないしね！」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そうですか……ちょっと意外な反応……」
line = "「そ、そうですか……ちょっと意外な反応……」"

[[dialogue]]
speaker = "アム"
# 「あっ！　そうだ、あたしもゲームセンターでたまにぬいぐるみを取ったりするよ？　ほら、この間クレーンゲームでゲットしたぬいぐるみ、ＳＮＳに写真をアップしたんだ～」
line = "「あっ！　そうだ、あたしもゲームセンターでたまにぬいぐるみを取ったりするよ？　ほら、この間クレーンゲームでゲットしたぬいぐるみ、ＳＮＳに写真をアップしたんだ～」"

[[dialogue]]
speaker = "unk"
# アムはＤＩＳＣを取り出し、ナミエルに写真を見せる。
line = "アムはＤＩＳＣを取り出し、ナミエルに写真を見せる。"

[[dialogue]]
speaker = "ナミエル"
# 「……！　こ、これは、なかなか可愛いですね……私もちょっと欲しいかも……」
line = "「……！　こ、これは、なかなか可愛いですね……私もちょっと欲しいかも……」"

[[dialogue]]
speaker = "ナミエル"
# （というか、アム先輩もやっぱり『マイ・スターグラム』やってるんだ……）
line = "（というか、アム先輩もやっぱり『マイ・スターグラム』やってるんだ……）"

[[dialogue]]
speaker = "unk"
# ちなみに、マイ・スターグラム――通称『マイスタ』は、写真や動画の投稿をメインとしたＳＮＳである。
line = "ちなみに、マイ・スターグラム――通称『マイスタ』は、写真や動画の投稿をメインとしたＳＮＳである。"

[[dialogue]]
speaker = "アム"
# 「そういえば、ナミエルはマイスタやってないの？　もしやってるなら、フォローするからアカウント教えて教えて♪」
line = "「そういえば、ナミエルはマイスタやってないの？　もしやってるなら、フォローするからアカウント教えて教えて♪」"

[[dialogue]]
speaker = "ナミエル"
# 「あっ、えっと……」
line = "「あっ、えっと……」"

[[dialogue]]
speaker = "unk"
# ナミエルはどうするか悩むが……アムの無邪気そうに言ってくる笑顔を見たら、なんだか気持ちがソワソワしてきてしまって。
line = "ナミエルはどうするか悩むが……アムの無邪気そうに言ってくる笑顔を見たら、なんだか気持ちがソワソワしてきてしまって。"

[[dialogue]]
speaker = "ナミエル"
# 「……わ、わかりました。アカウントは……これです」
line = "「……わ、わかりました。アカウントは……これです」"

[[dialogue]]
speaker = "アム"
# 「サンキュ～♪　どれどれ～？　――わあっ♪　ぬいぐるみ以外にも、可愛いものの写真が沢山投稿してあるじゃん！　このスイーツとか、めっちゃ映えてる～！」
line = "「サンキュ～♪　どれどれ～？　――わあっ♪　ぬいぐるみ以外にも、可愛いものの写真が沢山投稿してあるじゃん！　このスイーツとか、めっちゃ映えてる～！」"

[[dialogue]]
speaker = "ナミエル"
# 「そ、そうですか？　このケーキは先日、流星市国内に新しくできたカフェで見つけたもので……」
line = "「そ、そうですか？　このケーキは先日、流星市国内に新しくできたカフェで見つけたもので……」"

[[dialogue]]
speaker = "アム"
# 「えっ、そうなの！？　あたしも行ってみたいっ♪　今度一緒に行こうよ！」
line = "「えっ、そうなの！？　あたしも行ってみたいっ♪　今度一緒に行こうよ！」"

[[dialogue]]
speaker = "ナミエル"
# 「い、一緒にですか？　まあ……別に、構いませんけど……」
line = "「い、一緒にですか？　まあ……別に、構いませんけど……」"

[[dialogue]]
speaker = "アム"
# 「よしっ、それじゃあ約束ね♪　あっ、その時はもちろん、スノーマンも一緒にね！」
line = "「よしっ、それじゃあ約束ね♪　あっ、その時はもちろん、スノーマンも一緒にね！」"

[[dialogue]]
speaker = "スノーマン"
# 「え？　ボクも？」
line = "「え？　ボクも？」"

[[dialogue]]
speaker = "アム"
# 「うんっ！　せっかく知り合ったわけだしさ、仲を深める為にみんなでお出かけしようよ♪」
line = "「うんっ！　せっかく知り合ったわけだしさ、仲を深める為にみんなでお出かけしようよ♪」"

[[dialogue]]
speaker = "スノーマンL"
# 「みんなでお出かけ……うん！　楽しそう♪」
line = "「みんなでお出かけ……うん！　楽しそう♪」"

[[dialogue]]
speaker = "アム"
# 「そうだ！　せっかくだし、３人で写真を撮らない？」
line = "「そうだ！　せっかくだし、３人で写真を撮らない？」"

[[dialogue]]
speaker = "ナミエル"
# 「えっ、い、今ですか？　この衣装ですし、顔が映るのはちょっと……」
line = "「えっ、い、今ですか？　この衣装ですし、顔が映るのはちょっと……」"

[[dialogue]]
speaker = "アム"
# 「大丈夫！　ＳＮＳとかに載せるわけじゃなくて、これは仲良くなった記念だから♪」
line = "「大丈夫！　ＳＮＳとかに載せるわけじゃなくて、これは仲良くなった記念だから♪」"

[[dialogue]]
speaker = "ナミエル"
# 「な、仲良くって……」
line = "「な、仲良くって……」"

[[dialogue]]
speaker = "アム"
# 「ほら、スノーマンもこっちに寄って寄って！」
line = "「ほら、スノーマンもこっちに寄って寄って！」"

[[dialogue]]
speaker = "スノーマン"
# 「わかった。こんな感じ……？」
line = "「わかった。こんな感じ……？」"

[[dialogue]]
speaker = "unk"
# それから、スノーマンと一緒に写真を撮ろうとする２人。しかし――
line = "それから、スノーマンと一緒に写真を撮ろうとする２人。しかし――"

[[dialogue]]
speaker = "アム"
# 「あれ？　スノーマンがカメラに映ってない……？」
line = "「あれ？　スノーマンがカメラに映ってない……？」"

[[dialogue]]
speaker = "unk"
# ＤＩＳＣの画面には、アムとナミエルの姿しか映っていなかった。
line = "ＤＩＳＣの画面には、アムとナミエルの姿しか映っていなかった。"

[[dialogue]]
speaker = "ナミエル"
# 「あっ……！　スノーマンの姿は私たちにしか見えていないから、カメラにも……」
line = "「あっ……！　スノーマンの姿は私たちにしか見えていないから、カメラにも……」"

[[dialogue]]
speaker = "アム"
# 「そっか、あたし達には普通に見えているから、すっかり忘れちゃってた……！」
line = "「そっか、あたし達には普通に見えているから、すっかり忘れちゃってた……！」"

[[dialogue]]
speaker = "スノーマン"
# 「ってことは、ボク、２人と写真撮れないんだ……残念……」
line = "「ってことは、ボク、２人と写真撮れないんだ……残念……」"

[[dialogue]]
speaker = "unk"
# ションボリと頭を垂れるスノーマン。
line = "ションボリと頭を垂れるスノーマン。"

[[dialogue]]
speaker = "ナミエル"
# 「ごめんなさい。気づかなくて……」
line = "「ごめんなさい。気づかなくて……」"

[[dialogue]]
speaker = "アム"
# 「う～ん……よし！　ねぇ、ナミエル！」
line = "「う～ん……よし！　ねぇ、ナミエル！」"

[[dialogue]]
speaker = "アム"
# 「あたし達で、スノーマンの体を作ってあげない？」
line = "「あたし達で、スノーマンの体を作ってあげない？」"
