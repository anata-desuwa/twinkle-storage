[[dialogue]]
speaker = "unk"
# 第４話,はじめての寄り道,P
line = "第４話,はじめての寄り道,P"

[[dialogue]]
speaker = "ミア"
# 「はぁあああっっ！！　たぁっ！！　てやぁあっっ！！」
line = "「はぁあああっっ！！　たぁっ！！　てやぁあっっ！！」"

[[dialogue]]
speaker = "ミア"
# 「ふぅ……今日はありがとう、会長さん。わざわざ休日に呼び出しちゃってごめんね？」
line = "「ふぅ……今日はありがとう、会長さん。わざわざ休日に呼び出しちゃってごめんね？」"

[[dialogue]]
speaker = "ミア"
# 「今更だけど迷惑じゃなかったかしら……？　一応、今日は予定がないとは聞いていたけど……」
line = "「今更だけど迷惑じゃなかったかしら……？　一応、今日は予定がないとは聞いていたけど……」"

[[dialogue]]
speaker = "ミア"
# 「その……どうしても会長さんに特訓の成果を見てもらいたくって。他の人だと、私に変な気を遣ってすごいねすごいねって褒めてきたりするし……」
line = "「その……どうしても会長さんに特訓の成果を見てもらいたくって。他の人だと、私に変な気を遣ってすごいねすごいねって褒めてきたりするし……」"

[[dialogue]]
speaker = "unk"
# むしろ頼ってくれて嬉しかったよ
line = "むしろ頼ってくれて嬉しかったよ"

[[dialogue]]
speaker = "ミア"
# 「そ、そう？　ならこれからも頼らせてもらおうかしら……」
line = "「そ、そう？　ならこれからも頼らせてもらおうかしら……」"

[[dialogue]]
speaker = "ミア"
# 「会長さんはあんまり私のこと子ども扱いしないし。……まぁたまにされてるような気もするけど」
line = "「会長さんはあんまり私のこと子ども扱いしないし。……まぁたまにされてるような気もするけど」"

[[dialogue]]
speaker = "ミア"
# 「でも、なんだかんだ対等に見てくれてるんだって一緒に過ごしてきてわかってきたから。私もなんだか頼りやすいの」
line = "「でも、なんだかんだ対等に見てくれてるんだって一緒に過ごしてきてわかってきたから。私もなんだか頼りやすいの」"

[[dialogue]]
speaker = "ミア"
# 「私、誰かを頼るのってちょっぴり苦手で。だから会長さんがいてくれて本当に助かっちゃう」
line = "「私、誰かを頼るのってちょっぴり苦手で。だから会長さんがいてくれて本当に助かっちゃう」"

[[dialogue]]
speaker = "ミア"
# 「まるでお兄ちゃんみたいで──って、な、なんだか私、恥ずかしいこと言っちゃってる気が……！　今のは忘れてっ。なしだからね、なしっ……！」
line = "「まるでお兄ちゃんみたいで──って、な、なんだか私、恥ずかしいこと言っちゃってる気が……！　今のは忘れてっ。なしだからね、なしっ……！」"

[[dialogue]]
speaker = "ミア"
# 「あっ、もうっ、何をニヤニヤしてるのっ。その顔、絶対忘れる気ないじゃないっ。よしよしじゃないからっ、やっぱり私のこと子ども扱いしてるっ。絶対してるもんっ」
line = "「あっ、もうっ、何をニヤニヤしてるのっ。その顔、絶対忘れる気ないじゃないっ。よしよしじゃないからっ、やっぱり私のこと子ども扱いしてるっ。絶対してるもんっ」"

[[dialogue]]
speaker = "ミア"
# 「んもう、せっかく会長さんのこと認めてきたところだったのに。ふんだ、また嫌いになっちゃったもん」
line = "「んもう、せっかく会長さんのこと認めてきたところだったのに。ふんだ、また嫌いになっちゃったもん」"

[[dialogue]]
speaker = "ミア"
# 「そうだ。休日とはいえ寄り道せずに真っ直ぐお家に帰るのよ？　帰るまでがトレーニングなんだからね？」
line = "「そうだ。休日とはいえ寄り道せずに真っ直ぐお家に帰るのよ？　帰るまでがトレーニングなんだからね？」"

[[dialogue]]
speaker = "unk"
# せっかくだし送っていくよ
line = "せっかくだし送っていくよ"

[[dialogue]]
speaker = "ミア"
# 「むむっ、言った傍から私のこと子ども扱いして。一人で帰れるもんっ。私のこと見くびらないでっ」
line = "「むむっ、言った傍から私のこと子ども扱いして。一人で帰れるもんっ。私のこと見くびらないでっ」"

[[dialogue]]
speaker = "ミア"
# 「むしろ私が会長さんを送っていってあげるわ。会長さんのことだもん。これだけ言っても途中で寄り道するかもしれないし」
line = "「むしろ私が会長さんを送っていってあげるわ。会長さんのことだもん。これだけ言っても途中で寄り道するかもしれないし」"

[[dialogue]]
speaker = "ミア"
# 「ふふ、そうよ。私が責任を持ってお家まで送り届けてあげる♪　私の目が黒いうちは不良行為なんてさせないんだから♪」
line = "「ふふ、そうよ。私が責任を持ってお家まで送り届けてあげる♪　私の目が黒いうちは不良行為なんてさせないんだから♪」"

[[dialogue]]
speaker = "ミア"
# 「ええと。次の角を左に曲がればいいのよね？　えっ？　右だった？　あう、この辺りあんまり来ないから……」
line = "「ええと。次の角を左に曲がればいいのよね？　えっ？　右だった？　あう、この辺りあんまり来ないから……」"

[[dialogue]]
speaker = "ミア"
# 「当たり前だけど知らないお店ばっかりね。……わぁ、こんなところにクレープ屋さんあったんだっ。美味しそうっ……」
line = "「当たり前だけど知らないお店ばっかりね。……わぁ、こんなところにクレープ屋さんあったんだっ。美味しそうっ……」"

[[dialogue]]
speaker = "ミア"
# 「って、ダメダメっ。今は会長さんをお家に送ってる最中なんだから。ここで誘惑に負けたら風紀委員の名折れよ……！」
line = "「って、ダメダメっ。今は会長さんをお家に送ってる最中なんだから。ここで誘惑に負けたら風紀委員の名折れよ……！」"

[[dialogue]]
speaker = "ミア"
# 「でも知らない場所を会長さんと２人で歩いてると、その……。なんだか２人で寄り道してるような気分になってきちゃう……」
line = "「でも知らない場所を会長さんと２人で歩いてると、その……。なんだか２人で寄り道してるような気分になってきちゃう……」"

[[dialogue]]
speaker = "ミア"
# 「う、ううん、違うわっ。これは断じて寄り道じゃない……！　会長さんをお家に送ってるだけだもんっ！」
line = "「う、ううん、違うわっ。これは断じて寄り道じゃない……！　会長さんをお家に送ってるだけだもんっ！」"

[[dialogue]]
speaker = "unk"
# 休日なんだし気にしすぎだよ
line = "休日なんだし気にしすぎだよ"

[[dialogue]]
speaker = "ミア"
# 「だとしてもよ。普段あれだけうるさく言ってる私が会長さんと仲良く寄り道なんかしてたら、みんなに申し訳が立たないというか……！」
line = "「だとしてもよ。普段あれだけうるさく言ってる私が会長さんと仲良く寄り道なんかしてたら、みんなに申し訳が立たないというか……！」"

[[dialogue]]
speaker = "ミア"
# 「本当は、その。私がうるさく言い過ぎだってこともわかってるから。私だって寄り道したい日がないと言えば嘘になるし……」
line = "「本当は、その。私がうるさく言い過ぎだってこともわかってるから。私だって寄り道したい日がないと言えば嘘になるし……」"

[[dialogue]]
speaker = "ミア"
# 「でも風紀委員として、みんなが羽目を外しすぎないように注意はしなきゃとは思ってて。人に注意してるんだから私は絶対に寄り道なんかしちゃいけなくて」
line = "「でも風紀委員として、みんなが羽目を外しすぎないように注意はしなきゃとは思ってて。人に注意してるんだから私は絶対に寄り道なんかしちゃいけなくて」"

[[dialogue]]
speaker = "ミア"
# 「と、とにかく、私は寄り道をしちゃいけない人間なのっ。風紀委員になった時に自分でそう決めたんだからっ」
line = "「と、とにかく、私は寄り道をしちゃいけない人間なのっ。風紀委員になった時に自分でそう決めたんだからっ」"

[[dialogue]]
speaker = "ミア"
# 「買い食いもしないっ。放課後お友達と遊びに行ったりもしないっ。そ、そもそも寄り道に興味がないものっ……！」
line = "「買い食いもしないっ。放課後お友達と遊びに行ったりもしないっ。そ、そもそも寄り道に興味がないものっ……！」"

[[dialogue]]
speaker = "ミア"
# 「きゃっ！？　ななな、何っ！？　どうして急に私の手を掴むのっ……！？」
line = "「きゃっ！？　ななな、何っ！？　どうして急に私の手を掴むのっ……！？」"

[[dialogue]]
speaker = "ミア"
# 「わわっ、引っ張らないで……！　もしかして寄り道させようとしてるっ？　してるわよねっ？」
line = "「わわっ、引っ張らないで……！　もしかして寄り道させようとしてるっ？　してるわよねっ？」"

[[dialogue]]
speaker = "ミア"
# 「だからダメだってば……！　私は寄り道をしちゃいけない人間でっ……！」
line = "「だからダメだってば……！　私は寄り道をしちゃいけない人間でっ……！」"

[[dialogue]]
speaker = "ミア"
# 「とにかく離してっ、恥ずかしっ……！　パパ以外の男の人と手を繋ぐなんて、は、初めてでっ……！」
line = "「とにかく離してっ、恥ずかしっ……！　パパ以外の男の人と手を繋ぐなんて、は、初めてでっ……！」"

[[dialogue]]
speaker = "unk"
# じゃあ一緒に寄り道してくれる？
line = "じゃあ一緒に寄り道してくれる？"

[[dialogue]]
speaker = "ミア"
# 「あ、あう……。相変わらず変なところでお節介なんだから……。私、本当に寄り道なんか興味ないのに……」
line = "「あ、あう……。相変わらず変なところでお節介なんだから……。私、本当に寄り道なんか興味ないのに……」"

[[dialogue]]
speaker = "ミア"
# 「でも……会長さんのこういうところが私は……」
line = "「でも……会長さんのこういうところが私は……」"

[[dialogue]]
speaker = "ミア"
# 「っっ。な、なんでもない。なんでもないもんっ。それより手を離してってば。恥ずかしいって言ってるでしょっ」
line = "「っっ。な、なんでもない。なんでもないもんっ。それより手を離してってば。恥ずかしいって言ってるでしょっ」"

[[dialogue]]
speaker = "ミア"
# 「だから、その。会長さんと寄り道したらいいんでしょ……？　わかったから……」
line = "「だから、その。会長さんと寄り道したらいいんでしょ……？　わかったから……」"

[[dialogue]]
speaker = "ミア"
# 「か、勘違いしないでね？　別に私は寄り道したいわけじゃないわ。ただこれ以上イヤイヤしてたら、それこそ子どもっぽいなって思っただけっ」
line = "「か、勘違いしないでね？　別に私は寄り道したいわけじゃないわ。ただこれ以上イヤイヤしてたら、それこそ子どもっぽいなって思っただけっ」"

[[dialogue]]
speaker = "ミア"
# 「だから特別に……会長さんと寄り道してあげる。会長さんの言うとおり、今日は休日なわけだし……」
line = "「だから特別に……会長さんと寄り道してあげる。会長さんの言うとおり、今日は休日なわけだし……」"

[[dialogue]]
speaker = "unk"
# 休みの日はめいっぱい遊ばなくちゃね
line = "休みの日はめいっぱい遊ばなくちゃね"

[[dialogue]]
speaker = "unk"
# 風紀委員もたまには羽根を伸ばさなくちゃ
line = "風紀委員もたまには羽根を伸ばさなくちゃ"

[[dialogue]]
speaker = "ミア"
# 「う、うん。ありがとう、会長さん……」
line = "「う、うん。ありがとう、会長さん……」"

[[dialogue]]
speaker = "ミア"
# 「なら、その。その、ね？　私、カラオケ行ってみたい……」
line = "「なら、その。その、ね？　私、カラオケ行ってみたい……」"

[[dialogue]]
speaker = "ミア"
# 「あ、あとボーリングも……！　ゲームセンターで会長さんと対戦したりもしてみたい……！」
line = "「あ、あとボーリングも……！　ゲームセンターで会長さんと対戦したりもしてみたい……！」"

[[dialogue]]
speaker = "ミア"
# 「そうだ、さっきのクレープ屋さんも気になってて──って、～～っっ！　だ、だからニヤニヤしないでっ。また子ども扱いしてるわね……！」
line = "「そうだ、さっきのクレープ屋さんも気になってて──って、～～っっ！　だ、だからニヤニヤしないでっ。また子ども扱いしてるわね……！」"

[[dialogue]]
speaker = "ミア"
# 「やっぱり寄り道するのやめる……！　会長さんが子ども扱いしてくるならやめるもんっ……！」
line = "「やっぱり寄り道するのやめる……！　会長さんが子ども扱いしてくるならやめるもんっ……！」"

[[dialogue]]
speaker = "ミア"
# 「ふ、ふんだ。謝ったって許さないもん」
line = "「ふ、ふんだ。謝ったって許さないもん」"

[[dialogue]]
speaker = "ミア"
# 「わわっ、頭なでなでするなら、もっと許さないっ……！」
line = "「わわっ、頭なでなでするなら、もっと許さないっ……！」"

[[dialogue]]
speaker = "ミア"
# 「とにかく一旦、手を離してっ。離してってばっ。に、逃げないからっ。連絡するだけ……！」
line = "「とにかく一旦、手を離してっ。離してってばっ。に、逃げないからっ。連絡するだけ……！」"

[[dialogue]]
speaker = "ミア"
# 「誰にって。だから、その……ママによ」
line = "「誰にって。だから、その……ママによ」"

[[dialogue]]
speaker = "ミア"
# 「今日は晩ご飯いらないって、えへへ……。ちゃんと伝えておかなくっちゃ……」
line = "「今日は晩ご飯いらないって、えへへ……。ちゃんと伝えておかなくっちゃ……」"
