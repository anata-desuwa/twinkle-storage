[[dialogue]]
speaker = "パテル"
# 「次は釣りとかどう？　魚がパテルストーンを飲み込んでるかも」
line = "「次は釣りとかどう？　魚がパテルストーンを飲み込んでるかも」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「網ならアルモたんに任せろなのだー！　この網は何でも捕まえられるのだ！」
line = "「網ならアルモたんに任せろなのだー！　この網は何でも捕まえられるのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「でも、本当に釣りでパテルストーンが見つかるのでしょうか？」
line = "「でも、本当に釣りでパテルストーンが見つかるのでしょうか？」"

[[dialogue]]
speaker = "パテル"
# 「パテルストーンは本来あたしの力。だからあたしのところに引き寄せられる。──多分！」
line = "「パテルストーンは本来あたしの力。だからあたしのところに引き寄せられる。──多分！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「多分なのだ！？」
line = "「多分なのだ！？」"

[[dialogue]]
speaker = "unk"
# でもみんなで釣りをするのは楽しそう
line = "でもみんなで釣りをするのは楽しそう"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「確かにそうなのだ！　アルモたんはやりたいのだ！」
line = "「確かにそうなのだ！　アルモたんはやりたいのだ！」"

[[dialogue]]
speaker = "unk"
# 俺とアルモたん、マグダレナとパテルの二組に分かれて釣りを始める。
line = "俺とアルモたん、マグダレナとパテルの二組に分かれて釣りを始める。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長、釣れたのだ？」
line = "「会長、釣れたのだ？」"

[[dialogue]]
speaker = "unk"
# そんなすぐには釣れないよ
line = "そんなすぐには釣れないよ"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そうなのかー……早く出番が来てほしいのだ」
line = "「そうなのかー……早く出番が来てほしいのだ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「うずうず……うずうず……」
line = "「うずうず……うずうず……」"

[[dialogue]]
speaker = "unk"
# アルモたんはお魚好き？
line = "アルモたんはお魚好き？"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「好きなのだ！　お肉が一番好きだけど、お魚も美味しいのだ！」
line = "「好きなのだ！　お肉が一番好きだけど、お魚も美味しいのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アジ、イワシ、サーモン、タイ、マグロ、ブリ……美味しいお魚は数えきれないのだ！」
line = "「アジ、イワシ、サーモン、タイ、マグロ、ブリ……美味しいお魚は数えきれないのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「食べ方も、お寿司にお刺身に、煮魚や照り焼きもいいのだ！　全部好きなのだ！」
line = "「食べ方も、お寿司にお刺身に、煮魚や照り焼きもいいのだ！　全部好きなのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「え？　バーベキューならホイル焼きがおすすめ？　野菜と一緒にアルミホイルに包んで、金網の上でじゅう～っと…………じゅるり」
line = "「え？　バーベキューならホイル焼きがおすすめ？　野菜と一緒にアルミホイルに包んで、金網の上でじゅう～っと…………じゅるり」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「もう待ちきれないぞー！　アルモたんが海に入ってお魚獲ってくるのだ～！」
line = "「もう待ちきれないぞー！　アルモたんが海に入ってお魚獲ってくるのだ～！」"

[[dialogue]]
speaker = "unk"
# もうちょっと待って
line = "もうちょっと待って"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「待てないのだ～！　このままじゃお腹空きすぎて死んじゃうのだ～っ！」
line = "「待てないのだ～！　このままじゃお腹空きすぎて死んじゃうのだ～っ！」"

[[dialogue]]
speaker = "unk"
# 来た──！
line = "来た──！"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ヒットなのだ！！」
line = "「ヒットなのだ！！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「おお……釣り竿がグイグイ引いてるのだ……これは大物なのだ……！　会長、頑張るのだ！」
line = "「おお……釣り竿がグイグイ引いてるのだ……これは大物なのだ……！　会長、頑張るのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長、頑張れ、頑張れなのだ！」
line = "「会長、頑張れ、頑張れなのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「獲物が近づいてきたのだ……もう少し……もう少しなのだ……」
line = "「獲物が近づいてきたのだ……もう少し……もう少しなのだ……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「よーし、後はアルモたんに任せるのだ！　えいっ──！」
line = "「よーし、後はアルモたんに任せるのだ！　えいっ──！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「獲ったのだ～！！」
line = "「獲ったのだ～！！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「大きなお魚なのだ！　とっても美味しそうなのだ！」
line = "「大きなお魚なのだ！　とっても美味しそうなのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ホイル焼きにするのが楽しみなのだ……じゅるり」
line = "「ホイル焼きにするのが楽しみなのだ……じゅるり」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「すごい大物ですね～♪　会長もアルモタヘルもお見事でした♪」
line = "「すごい大物ですね～♪　会長もアルモタヘルもお見事でした♪」"

[[dialogue]]
speaker = "？？？"
# 「そ～っと……」
line = "「そ～っと……」"

[[dialogue]]
speaker = "パテル"
# 「コチョコチョコチョ～っ」
line = "「コチョコチョコチョ～っ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あはは、あははははっ！　くすぐったいのだ！」
line = "「あはは、あははははっ！　くすぐったいのだ！」"

[[dialogue]]
speaker = "パテル"
# 「アハハ、隙だらけだよ♪」
line = "「アハハ、隙だらけだよ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「パテル、せっかく獲ったお魚を逃がしたらどうするんですか」
line = "「パテル、せっかく獲ったお魚を逃がしたらどうするんですか」"

[[dialogue]]
speaker = "パテル"
# 「ごめんごめん。がら空きだったからつい、ね」
line = "「ごめんごめん。がら空きだったからつい、ね」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんはこれしきじゃお魚を逃がさないぞ！　絶対食べるのだ！」
line = "「アルモたんはこれしきじゃお魚を逃がさないぞ！　絶対食べるのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ん？　今、何かキラッと光ったのだ」
line = "「ん？　今、何かキラッと光ったのだ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「パテルストーン！　お魚の口から出てきたのだ！　このお魚、とっても食いしん坊さんなのだ！」
line = "「パテルストーン！　お魚の口から出てきたのだ！　このお魚、とっても食いしん坊さんなのだ！」"

[[dialogue]]
speaker = "パテル"
# 「ほら、言ったでしょ。あたしのところに引き寄せられてくるって」
line = "「ほら、言ったでしょ。あたしのところに引き寄せられてくるって」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長、この調子でどんどん釣るのだ！　アルモたんもどんどん捕まえるのだ！」
line = "「会長、この調子でどんどん釣るのだ！　アルモたんもどんどん捕まえるのだ！」"

[[dialogue]]
speaker = "？？？"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「誰だ──なのだっ」
line = "「誰だ──なのだっ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あれ？　誰もいないのだ。後ろに誰かいた気がしたのに……」
line = "「あれ？　誰もいないのだ。後ろに誰かいた気がしたのに……」"

[[dialogue]]
speaker = "unk"
# また来た……！
line = "また来た……！"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「やった！　またヒットなのだ！　今度はどんな魚が釣れ──」
line = "「やった！　またヒットなのだ！　今度はどんな魚が釣れ──」"

[[dialogue]]
speaker = "サメ"
# 「シャーーーッ！！」
line = "「シャーーーッ！！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「サメなのだーーー！！？」
line = "「サメなのだーーー！！？」"

[[dialogue]]
speaker = "サメ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "パテル"
# 「あ、またサメが逃げようとしてるね」
line = "「あ、またサメが逃げようとしてるね」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「逃がさないのだ！　捕まえるのだっ！　……ふん！」
line = "「逃がさないのだ！　捕まえるのだっ！　……ふん！」"

[[dialogue]]
speaker = "unk"
# アルモたんの網の口が大きく広がり、サメの巨体を呑み込むように捕獲した。
line = "アルモたんの網の口が大きく広がり、サメの巨体を呑み込むように捕獲した。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ふふん、この網に捕まえられない獲物はない……のだ！」
line = "「ふふん、この網に捕まえられない獲物はない……のだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「でも網の中にサメがいませんよ？」
line = "「でも網の中にサメがいませんよ？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あれ？」
line = "「あれ？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「え～っ！？　サメじゃなくてパテルストーンが網の中に入っているのだ！？」
line = "「え～っ！？　サメじゃなくてパテルストーンが網の中に入っているのだ！？」"

[[dialogue]]
speaker = "パテル"
# 「う～ん、どうなってるんだろうねー。サメと関係あるのかな？」
line = "「う～ん、どうなってるんだろうねー。サメと関係あるのかな？」"

[[dialogue]]
speaker = "パテル"
# 「ま、パテルストーンは手に入れられたし、結果オーライってことで♪」
line = "「ま、パテルストーンは手に入れられたし、結果オーライってことで♪」"

[[dialogue]]
speaker = "unk"
# その後も釣りを続けたが、釣果は上がるものの、サメは釣れなかった。
line = "その後も釣りを続けたが、釣果は上がるものの、サメは釣れなかった。"
