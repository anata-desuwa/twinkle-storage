[[dialogue]]
speaker = "梨緒"
# 「機械型モンスターが初めて出現したのは、私と君が出会う直前のことだったな」
line = "「機械型モンスターが初めて出現したのは、私と君が出会う直前のことだったな」"

[[dialogue]]
speaker = "梨緒"
# 「ジグが直接私たちの前に姿を現したのはその頃だ」
line = "「ジグが直接私たちの前に姿を現したのはその頃だ」"

[[dialogue]]
speaker = "梨緒"
# 『ジグ……！？』
line = "『ジグ……！？』"

[[dialogue]]
speaker = "ジグ"
# 『おや。私のことを知っているのかい？　どこかで会ったかな』
line = "『おや。私のことを知っているのかい？　どこかで会ったかな』"

[[dialogue]]
speaker = "アポロ"
# 『あたしは知らないぞ。誰だオマエは！？』
line = "『あたしは知らないぞ。誰だオマエは！？』"

[[dialogue]]
speaker = "ジグ"
# 『そうだね、初対面だから名乗らせてもらおう』
line = "『そうだね、初対面だから名乗らせてもらおう』"

[[dialogue]]
speaker = "ジグ"
# 『私は<ruby=ジグ>Ｚ</ruby>。“真なる神の騎士”だ』
line = "『私は<ruby>Ｚ<rt>ジグ</rt></ruby>。“真なる神の騎士”だ』"

[[dialogue]]
speaker = "梨緒"
# 「使徒になったジグは、“真なる神の騎士”を名乗り、私たち星騎士の前に立ちはだかった」
line = "「使徒になったジグは、“真なる神の騎士”を名乗り、私たち星騎士の前に立ちはだかった」"

[[dialogue]]
speaker = "梨緒"
# 「それにあの時のジグは、自分がベガの星騎士だったことを覚えていなかった」
line = "「それにあの時のジグは、自分がベガの星騎士だったことを覚えていなかった」"

[[dialogue]]
speaker = "梨緒"
# 『ジグ、君の相手は、私だ……！』
line = "『ジグ、君の相手は、私だ……！』"

[[dialogue]]
speaker = "ジグ"
# 『さっきも私を知っているような口ぶりだったけど、どこかで会ったかい？』
line = "『さっきも私を知っているような口ぶりだったけど、どこかで会ったかい？』"

[[dialogue]]
speaker = "梨緒"
# 『君は新星学園の星徒会長で、私は副会長だった。忘れたとは言わせないぞ！』
line = "『君は新星学園の星徒会長で、私は副会長だった。忘れたとは言わせないぞ！』"

[[dialogue]]
speaker = "ジグ"
# 『忘れたなぁ。世界を導く使命のために、私は生まれ変わったからね』
line = "『忘れたなぁ。世界を導く使命のために、私は生まれ変わったからね』"

[[dialogue]]
speaker = "梨緒"
# 「そしてジグは敵として、従えたモンスターとともに私たち選挙管理委員会に襲いかかってきた」
line = "「そしてジグは敵として、従えたモンスターとともに私たち選挙管理委員会に襲いかかってきた」"
