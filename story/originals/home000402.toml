[[dialogue]]
speaker = "いろは"
# 「こんにちはーーー！！！　『マジカミ』をプレイしてくれてた人は、お久しぶり！！　そうでない人は初めまして！」
line = "「こんにちはーーー！！！　『マジカミ』をプレイしてくれてた人は、お久しぶり！！　そうでない人は初めまして！」"

[[dialogue]]
speaker = "いろは"
# 「『マジカミ』の世界からやって来た魔法少女『<ruby=あそべ>遊部</ruby>いろは』だよ♪」
line = "「『マジカミ』の世界からやって来た魔法少女『<ruby>遊部<rt>あそべ</rt></ruby>いろは』だよ♪」"

[[dialogue]]
speaker = "花織"
# 「えっと……ちょっと名乗るの恥ずかしいけど、いろはと魔法少女をやってる『<ruby=ともながかおり>朝永花織</ruby>』です。よ、よろしくっ！」
line = "「えっと……ちょっと名乗るの恥ずかしいけど、いろはと魔法少女をやってる『<ruby>朝永花織<rt>ともながかおり</rt></ruby>』です。よ、よろしくっ！」"

[[dialogue]]
speaker = "ここあ"
# 「同じく、２人と一緒に魔法少女をやってる『<ruby=ゆわせ>百波瀬</ruby>ここあ』だよ～♪　背は小さいけど、いろはすやカオリンよりも１コ先輩なんだぞ♪　よろしくね～☆」
line = "「同じく、２人と一緒に魔法少女をやってる『<ruby>百波瀬<rt>ゆわせ</rt></ruby>ここあ』だよ～♪　背は小さいけど、いろはすやカオリンよりも１コ先輩なんだぞ♪　よろしくね～☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「お三方、挨拶ありがとうございま～す！　いいですね～♪　特に照れてる花織さんの表情、可愛くてグッドですよ～☆」
line = "「お三方、挨拶ありがとうございま～す！　いいですね～♪　特に照れてる花織さんの表情、可愛くてグッドですよ～☆」"

[[dialogue]]
speaker = "花織"
# 「そういうの言わなくていいですからっ！　余計に恥ずかしくなるじゃないですか！？」
line = "「そういうの言わなくていいですからっ！　余計に恥ずかしくなるじゃないですか！？」"

[[dialogue]]
speaker = "ここあ"
# 「にゃははっ☆　アンナちん、次は変身する流れでいいのかにゃ？」
line = "「にゃははっ☆　アンナちん、次は変身する流れでいいのかにゃ？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はいっ、ぜひぜひ可愛く変身ポーズを決めて、お願いしま～す♪」
line = "「はいっ、ぜひぜひ可愛く変身ポーズを決めて、お願いしま～す♪」"

[[dialogue]]
speaker = "いろは"
# 「まっかせてー！　今日の為に、かっこいいの考えてきたから！」
