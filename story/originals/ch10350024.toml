[[dialogue]]
speaker = "unk"
# 第４話,小悪魔の祝福,P
line = "第４話,小悪魔の祝福,P"

[[dialogue]]
speaker = "セナリィ"
# 「ふんふふふ～ん♪　ふん、ふん、ふ～ん♪」
line = "「ふんふふふ～ん♪　ふん、ふん、ふ～ん♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「鼻歌混じりなんて、随分とご機嫌じゃん、セナリィ☆　あれ？　新入社員ちゃんたちは何処？」
line = "「鼻歌混じりなんて、随分とご機嫌じゃん、セナリィ☆　あれ？　新入社員ちゃんたちは何処？」"

[[dialogue]]
speaker = "セナリィ"
# 「今日は休暇をあげてますわ。しばらく仕事もありませんし、ちょっとあの子たちは頑張りすぎですからね」
line = "「今日は休暇をあげてますわ。しばらく仕事もありませんし、ちょっとあの子たちは頑張りすぎですからね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「誰もいないなら好都合かな。ちょっとセナリィとふたりっきりで話したかったからさ」
line = "「誰もいないなら好都合かな。ちょっとセナリィとふたりっきりで話したかったからさ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィ、最近ちょっと丸くなったよね～」
line = "「セナリィ、最近ちょっと丸くなったよね～」"

[[dialogue]]
speaker = "セナリィ"
# 「ふ、太ったと言いたいんですの！？　むしろ、ミウの体調管理プランのおかげで、ちょっと痩せたくらいで──」
line = "「ふ、太ったと言いたいんですの！？　むしろ、ミウの体調管理プランのおかげで、ちょっと痩せたくらいで──」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「体型の話じゃないってば。なんてゆーか……とっつきやすくなって、可愛くなったよね～ってこと」
line = "「体型の話じゃないってば。なんてゆーか……とっつきやすくなって、可愛くなったよね～ってこと」"

[[dialogue]]
speaker = "セナリィ"
# 「何を今更。私は元より美しくてよ」
line = "「何を今更。私は元より美しくてよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうだね。セナリィは黙ってさえいれば美人さんだもんね。黙ってさえいればね」
line = "「そうだね。セナリィは黙ってさえいれば美人さんだもんね。黙ってさえいればね」"

[[dialogue]]
speaker = "セナリィ"
# 「引っかかる言い回しですけれど……まあ、そのように見えるのだとしたら、きっと優秀な新入社員のおかげで、経営も波に乗り、心に余裕ができたおかげですわね」
line = "「引っかかる言い回しですけれど……まあ、そのように見えるのだとしたら、きっと優秀な新入社員のおかげで、経営も波に乗り、心に余裕ができたおかげですわね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うんうん、そうだね。でも、それだけじゃ説明のつかないことが多くってさ。セナリィ自身に大きな心境の変化があったのかな～って」
line = "「うんうん、そうだね。でも、それだけじゃ説明のつかないことが多くってさ。セナリィ自身に大きな心境の変化があったのかな～って」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「例えば……乙女チックな恋しちゃってる、とかね☆」
line = "「例えば……乙女チックな恋しちゃってる、とかね☆」"

[[dialogue]]
speaker = "セナリィ"
# 「ドキッ！？　わ、私の恋人は、このゴールデングースですわ！　社員も増えて大変なこの時期、甘っちょろい恋愛などにうつつを抜かしている余裕はありません！」
line = "「ドキッ！？　わ、私の恋人は、このゴールデングースですわ！　社員も増えて大変なこの時期、甘っちょろい恋愛などにうつつを抜かしている余裕はありません！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そっかそっか～。ところでさ、会長ってモテるよね～」
line = "「そっかそっか～。ところでさ、会長ってモテるよね～」"

[[dialogue]]
speaker = "セナリィ"
# 「な、なんですの、藪から棒に！　どうして今の会話の流れで、会長様が出てきますの！？」
line = "「な、なんですの、藪から棒に！　どうして今の会話の流れで、会長様が出てきますの！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～？　ここに来る途中、会長が女の人と仲良さそうに歩いてるの見かけてさ～？」
line = "「いや～？　ここに来る途中、会長が女の人と仲良さそうに歩いてるの見かけてさ～？」"

[[dialogue]]
speaker = "セナリィ"
# 「んなっ……！？」
line = "「んなっ……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「星徒会も上から下まで、いろんな属性の美人揃いだしさ。そのうち誰か会長の恋人になっちゃいそうだよね～」
line = "「星徒会も上から下まで、いろんな属性の美人揃いだしさ。そのうち誰か会長の恋人になっちゃいそうだよね～」"

[[dialogue]]
speaker = "セナリィ"
# 「会長様は不貞を犯したりしませんわ！」
line = "「会長様は不貞を犯したりしませんわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「私だけを生涯愛してくれると、ちゃんと契約だって交わして──ハッ！？」
line = "「私だけを生涯愛してくれると、ちゃんと契約だって交わして──ハッ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……あ、もうそこまで行っちゃってんだ。セナリィもすっかりオトナの女かぁ、お熱いね～」
line = "「……あ、もうそこまで行っちゃってんだ。セナリィもすっかりオトナの女かぁ、お熱いね～」"

[[dialogue]]
speaker = "セナリィ"
# 「どこまで行ったと想像してますの！？　まだキス止まり──ハァンッ！？」
line = "「どこまで行ったと想像してますの！？　まだキス止まり──ハァンッ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ、自爆しすぎでしょ。セナリィらっしい～☆　あ、会長が女の人と歩いてたっての、嘘だから安心してね。カマかけてみただけだからさ」
line = "「にひひ、自爆しすぎでしょ。セナリィらっしい～☆　あ、会長が女の人と歩いてたっての、嘘だから安心してね。カマかけてみただけだからさ」"

[[dialogue]]
speaker = "セナリィ"
# 「マイン、あなたねぇ……！　冗談にしても、ついて良い嘘と悪い嘘が──」
line = "「マイン、あなたねぇ……！　冗談にしても、ついて良い嘘と悪い嘘が──」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふ～ん？　友達の私に今の今まで付き合ってるのを隠してたのは、ついても良い嘘なんだ～？」
line = "「ふ～ん？　友達の私に今の今まで付き合ってるのを隠してたのは、ついても良い嘘なんだ～？」"

[[dialogue]]
speaker = "セナリィ"
# 「むぐっ……！」
line = "「むぐっ……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私とセナリィの仲なのに、水臭いじゃん。いつまでも話してくれなくて悔しいから、強めにイジッちゃった☆」
line = "「私とセナリィの仲なのに、水臭いじゃん。いつまでも話してくれなくて悔しいから、強めにイジッちゃった☆」"

[[dialogue]]
speaker = "セナリィ"
# 「そうやってイジられるのが嫌だから、黙ってましたのよ……会長様との関係、いつから気づいてましたの？」
line = "「そうやってイジられるのが嫌だから、黙ってましたのよ……会長様との関係、いつから気づいてましたの？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「怪しいと思ったのは──ここにミウちゃん、ヒマワリちゃん、会長たちが集まってた時？」
line = "「怪しいと思ったのは──ここにミウちゃん、ヒマワリちゃん、会長たちが集まってた時？」"

[[dialogue]]
speaker = "セナリィ"
# 「早ぁっ！？　ミウとヒマワリに契約を見届けてもらった時じゃないですの！？」
line = "「早ぁっ！？　ミウとヒマワリに契約を見届けてもらった時じゃないですの！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あの時からセナリィの態度、露骨におかしかったもん。会長を見る目が、もう全然違ったし。いつぞやみたいなメス顔だったよ」
line = "「あの時からセナリィの態度、露骨におかしかったもん。会長を見る目が、もう全然違ったし。いつぞやみたいなメス顔だったよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「その後で裏取ったら、いろんなとこでデートしてる目撃情報が集まったしね。隠すつもりなら、もうちょっと忍ばなきゃ。公安の情報収集力、舐めんな～？」
line = "「その後で裏取ったら、いろんなとこでデートしてる目撃情報が集まったしね。隠すつもりなら、もうちょっと忍ばなきゃ。公安の情報収集力、舐めんな～？」"

[[dialogue]]
speaker = "セナリィ"
# 「……観念しますわ。会長様とお付き合いしてます」
line = "「……観念しますわ。会長様とお付き合いしてます」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「良かったじゃん！　私とセナリィの仲なんだし、ちゃんと祝わせてよ。おめでと、セナリィ。幸せになれ～☆」
line = "「良かったじゃん！　私とセナリィの仲なんだし、ちゃんと祝わせてよ。おめでと、セナリィ。幸せになれ～☆」"

[[dialogue]]
speaker = "セナリィ"
# 「……ありがとう、マイン」
line = "「……ありがとう、マイン」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちょっと目を離したら、その隙に他の子に会長様持ってかれちゃうかもだし油断禁物だよ」
line = "「ちょっと目を離したら、その隙に他の子に会長様持ってかれちゃうかもだし油断禁物だよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長、わりと流されやすいところもあったりするし。誘惑されたら、案外コロッといっちゃうかも。私とかにね☆」
line = "「会長、わりと流されやすいところもあったりするし。誘惑されたら、案外コロッといっちゃうかも。私とかにね☆」"

[[dialogue]]
speaker = "セナリィ"
# 「マイン！？　寝取られとかいくらあなたでも許しませんわよ！？」
line = "「マイン！？　寝取られとかいくらあなたでも許しませんわよ！？」"

[[dialogue]]
speaker = "unk"
# 随分と賑やかだけど……マイン！？
line = "随分と賑やかだけど……マイン！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ、会長。話は全部セナリィから聞き出しちゃった。お付き合いしてるんだって～？　おめでと☆」
line = "「あ、会長。話は全部セナリィから聞き出しちゃった。お付き合いしてるんだって～？　おめでと☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んじゃ、お邪魔虫の私は退散しよっかな。会長、私の代わりにセナリィのこと、た～っぷり可愛がってあげてね、にひひ☆」
line = "「んじゃ、お邪魔虫の私は退散しよっかな。会長、私の代わりにセナリィのこと、た～っぷり可愛がってあげてね、にひひ☆」"

[[dialogue]]
speaker = "セナリィ"
# 「まったく……マインには感情を振り回されっぱなしですわ……情緒不安定に陥らない己のメンタルを褒めたいくらいですわよ」
line = "「まったく……マインには感情を振り回されっぱなしですわ……情緒不安定に陥らない己のメンタルを褒めたいくらいですわよ」"

[[dialogue]]
speaker = "unk"
# いい友達だね
line = "いい友達だね"

[[dialogue]]
speaker = "セナリィ"
# 「はぁ……？　今の話からどうして、そういう結論になりますの」
line = "「はぁ……？　今の話からどうして、そういう結論になりますの」"

[[dialogue]]
speaker = "セナリィ"
# 「マインは人の心を弄ぶことに対してひたすらに長けてる厄介者で、神出鬼没で、付き合ってると気疲れしてしまう──」
line = "「マインは人の心を弄ぶことに対してひたすらに長けてる厄介者で、神出鬼没で、付き合ってると気疲れしてしまう──」"

[[dialogue]]
speaker = "セナリィ"
# 「──私の大切な友人ですわ」
line = "「──私の大切な友人ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「ふう……会長様、あの子の相手で疲れた心を、癒してくださいません？」
line = "「ふう……会長様、あの子の相手で疲れた心を、癒してくださいません？」"

[[dialogue]]
speaker = "unk"
# もたれかかってくるセナリィの肩を、俺はそっと抱きしめた。
line = "もたれかかってくるセナリィの肩を、俺はそっと抱きしめた。"
