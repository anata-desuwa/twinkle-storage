[[dialogue]]
speaker = "unk"
# 第４話,セシアと恋人スキンシップ,P
line = "第４話,セシアと恋人スキンシップ,P"

[[dialogue]]
speaker = "unk"
# セシアと恋人になってからしばらく経った、ある休日のこと。
line = "セシアと恋人になってからしばらく経った、ある休日のこと。"

[[dialogue]]
speaker = "セシア"
# 「――ねぇ、会長。わたくしたち、恋人になったじゃない？」
line = "「――ねぇ、会長。わたくしたち、恋人になったじゃない？」"

[[dialogue]]
speaker = "セシア"
# 「だから、恋人としての体験もちゃんと蓄積しないといけないと思うの」
line = "「だから、恋人としての体験もちゃんと蓄積しないといけないと思うの」"

[[dialogue]]
speaker = "unk"
# こ、恋人としての体験というと……？
line = "こ、恋人としての体験というと……？"

[[dialogue]]
speaker = "セシア"
# 「ええ。それはズバリ――」
line = "「ええ。それはズバリ――」"

[[dialogue]]
speaker = "セシア"
# 「マッサージよ！」
line = "「マッサージよ！」"

[[dialogue]]
speaker = "unk"
# ま、マッサージ！？
line = "ま、マッサージ！？"

[[dialogue]]
speaker = "セシア"
# 「？　会長、そんなに驚くこと？」
line = "「？　会長、そんなに驚くこと？」"

[[dialogue]]
speaker = "セシア"
# 「恋人同士は男女でマッサージをし合うものらしいから、わたくし、それを体験してみたいわ」
line = "「恋人同士は男女でマッサージをし合うものらしいから、わたくし、それを体験してみたいわ」"

[[dialogue]]
speaker = "unk"
# ちなみに、それはどこで仕入れた情報なのかと尋ねると――
line = "ちなみに、それはどこで仕入れた情報なのかと尋ねると――"

[[dialogue]]
speaker = "セシア"
# 「もちろん、紅明ママからよ！」
line = "「もちろん、紅明ママからよ！」"

[[dialogue]]
speaker = "unk"
# それは一体、どういう意味でのマッサージなんだ……！？
line = "それは一体、どういう意味でのマッサージなんだ……！？"

[[dialogue]]
speaker = "unk"
# そうして、変な想像はしないように気を付けつつ、俺たちはお互いの体をマッサージをすることになった。
line = "そうして、変な想像はしないように気を付けつつ、俺たちはお互いの体をマッサージをすることになった。"

[[dialogue]]
speaker = "セシア"
# 「――まずは会長からしてくれるの？　じゃあ、お願いするわ♪」
line = "「――まずは会長からしてくれるの？　じゃあ、お願いするわ♪」"

[[dialogue]]
speaker = "unk"
# セシアは全然凝ってないな
line = "セシアは全然凝ってないな"

[[dialogue]]
speaker = "セシア"
# 「ん……♪　会長の手、気持ちいいわ♪　マッサージも上手なのね」
line = "「ん……♪　会長の手、気持ちいいわ♪　マッサージも上手なのね」"

[[dialogue]]
speaker = "セシア"
# 「――前にセラピストのバイトをしてたことがある？　それは面白そうな体験ね。どんな感じだったのか、お話を聞かせて欲しいわ」
line = "「――前にセラピストのバイトをしてたことがある？　それは面白そうな体験ね。どんな感じだったのか、お話を聞かせて欲しいわ」"

[[dialogue]]
speaker = "unk"
# それから俺はバイトをしていた時の話をしつつ、腰や足などもマッサージしていった。
line = "それから俺はバイトをしていた時の話をしつつ、腰や足などもマッサージしていった。"

[[dialogue]]
speaker = "unk"
# 俺がマッサージを一通り終えると――
line = "俺がマッサージを一通り終えると――"

[[dialogue]]
speaker = "セシア"
# 「ふぅ……♪　会長にマッサージしてもらって、体も気分もリフレッシュできたわ♪」
line = "「ふぅ……♪　会長にマッサージしてもらって、体も気分もリフレッシュできたわ♪」"

[[dialogue]]
speaker = "セシア"
# 「じゃあ次は、わたくしが会長をマッサージする番ね♪」
line = "「じゃあ次は、わたくしが会長をマッサージする番ね♪」"

[[dialogue]]
speaker = "セシア"
# 「一応、ちゃんとやり方は調べて、知識を蓄積してきたのよ」
line = "「一応、ちゃんとやり方は調べて、知識を蓄積してきたのよ」"

[[dialogue]]
speaker = "セシア"
# 「こんな感じかしら……？　よいしょっと」
line = "「こんな感じかしら……？　よいしょっと」"

[[dialogue]]
speaker = "unk"
# っ……！
line = "っ……！"

[[dialogue]]
speaker = "unk"
# 意識しないようにしていたつもりだったが、恋人のセシアに触れられていると思うと、なんだか恥ずかしくなって体が熱くなってくる。
line = "意識しないようにしていたつもりだったが、恋人のセシアに触れられていると思うと、なんだか恥ずかしくなって体が熱くなってくる。"

[[dialogue]]
speaker = "セシア"
# 「あら？　会長……なんだか顔が赤いわよ？」
line = "「あら？　会長……なんだか顔が赤いわよ？」"

[[dialogue]]
speaker = "セシア"
# 「熱でもあるのかしら？　ちょっと、じっとしていてね――」
line = "「熱でもあるのかしら？　ちょっと、じっとしていてね――」"

[[dialogue]]
speaker = "セシア"
# 「ん……」
line = "「ん……」"

[[dialogue]]
speaker = "unk"
# セシアは俺のおでこの髪をそっとかき上げると、自分のおでこをぴったりとくっ付けてくる。
line = "セシアは俺のおでこの髪をそっとかき上げると、自分のおでこをぴったりとくっ付けてくる。"

[[dialogue]]
speaker = "unk"
# 心臓が、ドキッと跳ねた。
line = "心臓が、ドキッと跳ねた。"

[[dialogue]]
speaker = "セシア"
# 「うん。ちょっと熱いかしら……」
line = "「うん。ちょっと熱いかしら……」"

[[dialogue]]
speaker = "unk"
# セシアと間近で目が合い、しばらく見つめ合って――
line = "セシアと間近で目が合い、しばらく見つめ合って――"

[[dialogue]]
speaker = "セシア"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 不意に、セシアの唇が、俺の唇に触れた。
line = "不意に、セシアの唇が、俺の唇に触れた。"

[[dialogue]]
speaker = "unk"
# お互いのおでこが離れて――
line = "お互いのおでこが離れて――"

[[dialogue]]
speaker = "セシア"
# 「……ふふっ<emoji=heart04>　ファーストキス、というやつね<emoji=heart04>」
line = "「……ふふっ<emoji=heart04>　ファーストキス、というやつね<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「会長とキスをしてみたかったから、紅明ママのテクニックを使っちゃったわ<emoji=heart04>」
line = "「会長とキスをしてみたかったから、紅明ママのテクニックを使っちゃったわ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# も、もしかしてわざと……？
line = "も、もしかしてわざと……？"

[[dialogue]]
speaker = "セシア"
# 「女の子は、その気もないのに男の子と肌をくっつけあったりしないのよ？　守護天使であっても、ね<emoji=heart04>」
line = "「女の子は、その気もないのに男の子と肌をくっつけあったりしないのよ？　守護天使であっても、ね<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「次は、会長からキスをされる体験も、是非してみたいわ……<emoji=heart04>」
line = "「次は、会長からキスをされる体験も、是非してみたいわ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんな風に言われてしまえば、俺も気持ちは抑えられなくなってしまい――
line = "そんな風に言われてしまえば、俺も気持ちは抑えられなくなってしまい――"

[[dialogue]]
speaker = "セシア"
# 「あっ<emoji=heart04>　会長……<emoji=heart04>」
line = "「あっ<emoji=heart04>　会長……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「ちゅっ……<emoji=heart04>　ちゅ、ちゅっ<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　ちゅ、ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「んっ……<emoji=heart04>　――っはあぁ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　――っはあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「すぐにして貰えるなんて思ってなかったけれど、会長からキス……してもらっちゃったわ<emoji=heart04>」
line = "「すぐにして貰えるなんて思ってなかったけれど、会長からキス……してもらっちゃったわ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「……ねぇ、会長。キスする感覚、まだまだ蓄積不足だから――」
line = "「……ねぇ、会長。キスする感覚、まだまだ蓄積不足だから――」"

[[dialogue]]
speaker = "セシア"
# 「もう１回、してみてもいいかしら……？」
line = "「もう１回、してみてもいいかしら……？」"

[[dialogue]]
speaker = "セシア"
# 「じゃあ、今度はわたくしから……」
line = "「じゃあ、今度はわたくしから……」"

[[dialogue]]
speaker = "セシア"
# 「――あっ、そうだわ。キスばかりに意識が行っていて、今日はまだ、大切なことが言えてなかったわ」
line = "「――あっ、そうだわ。キスばかりに意識が行っていて、今日はまだ、大切なことが言えてなかったわ」"

[[dialogue]]
speaker = "セシア"
# 「あのね、わたくし……」
line = "「あのね、わたくし……」"

[[dialogue]]
speaker = "セシア"
# 「会長――あなたのことが大好きよ」
line = "「会長――あなたのことが大好きよ」"

[[dialogue]]
speaker = "セシア"
# 「んっ<emoji=heart04>」
line = "「んっ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その日、俺たちは何度もキスをして、忘れられない体験として積み重ねるのだった――
line = "その日、俺たちは何度もキスをして、忘れられない体験として積み重ねるのだった――"
