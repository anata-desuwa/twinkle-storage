[[dialogue]]
speaker = "unk"
# 第３話,あの頃の私たち,B
line = "第３話,あの頃の私たち,B"

[[dialogue]]
speaker = "unk"
# 後日、シルヴィはサーシャに連れられて星徒会室を訪れていた。
line = "後日、シルヴィはサーシャに連れられて星徒会室を訪れていた。"

[[dialogue]]
speaker = "シルヴィ"
# 「やっほー！　遊びに来たよ！」
line = "「やっほー！　遊びに来たよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いらっしゃーい！」
line = "「いらっしゃーい！」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたし、シルヴィ・グリムランド！　シルヴィって呼んでね！　よろしく！」
line = "「あたし、シルヴィ・グリムランド！　シルヴィって呼んでね！　よろしく！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ私から自己紹介するわね！　私は九浄ヴィーナス！　星徒会を陰から操るフィクサーとは私のことよ！」
line = "「じゃあ私から自己紹介するわね！　私は九浄ヴィーナス！　星徒会を陰から操るフィクサーとは私のことよ！」"

[[dialogue]]
speaker = "シルヴィ"
# 「なにそれおもしろー！　何やるのフィクサーって！」
line = "「なにそれおもしろー！　何やるのフィクサーって！」"

[[dialogue]]
speaker = "アナ"
# 「副会長のアナです。天界はウル出身、好き食べ物は和菓子です」
line = "「副会長のアナです。天界はウル出身、好き食べ物は和菓子です」"

[[dialogue]]
speaker = "シルヴィ"
# 「ウルって都会っ子じゃん！　確か１年なんだよね？　すご、あたしより仕事できそう！」
line = "「ウルって都会っ子じゃん！　確か１年なんだよね？　すご、あたしより仕事できそう！」"

[[dialogue]]
speaker = "サーシャ"
# 「実際、私よりもシルヴィよりもお仕事できるわ～。お姉ちゃん大助かり♪」
line = "「実際、私よりもシルヴィよりもお仕事できるわ～。お姉ちゃん大助かり♪」"

[[dialogue]]
speaker = "マトイ"
# 「詠野マトイ、書記です。普通で覚えづらいかもしれないですけど、よろしくお願いします」
line = "「詠野マトイ、書記です。普通で覚えづらいかもしれないですけど、よろしくお願いします」"

[[dialogue]]
speaker = "シルヴィ"
# 「？　覚えづらくなんかないよ。マトイちゃんでしょ、ちゃんと覚えたよ！」
line = "「？　覚えづらくなんかないよ。マトイちゃんでしょ、ちゃんと覚えたよ！」"

[[dialogue]]
speaker = "マトイ"
# 「っ！　サーシャさん！　シルヴィさん、すっごくいい人です！」
line = "「っ！　サーシャさん！　シルヴィさん、すっごくいい人です！」"

[[dialogue]]
speaker = "サーシャ"
# 「シルヴィは後輩キラーだから気を付けるのよ～」
line = "「シルヴィは後輩キラーだから気を付けるのよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「で、私が会計のサーシャで～す」
line = "「で、私が会計のサーシャで～す」"

[[dialogue]]
speaker = "シルヴィ"
# 「いや、それは知ってるから！」
line = "「いや、それは知ってるから！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ♪」
line = "「うふふっ♪」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしたちの代も楽しかったけど、今もすっごく楽しそう！」
line = "「あたしたちの代も楽しかったけど、今もすっごく楽しそう！」"

[[dialogue]]
speaker = "シルヴィ"
# 「あれ？　ところで会長は？」
line = "「あれ？　ところで会長は？」"

[[dialogue]]
speaker = "アナ"
# 「会長は購買へ行ったきり、帰ってきていません。また何かトラブルに巻き込まれたと思われます」
line = "「会長は購買へ行ったきり、帰ってきていません。また何かトラブルに巻き込まれたと思われます」"

[[dialogue]]
speaker = "シルヴィ"
# 「購買ってことはアニマっちか～。じゃあ仕方ないね！　まだ見ぬ会長くん、会える日までどうか元気でね～！」
line = "「購買ってことはアニマっちか～。じゃあ仕方ないね！　まだ見ぬ会長くん、会える日までどうか元気でね～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「シルヴィさんたちの星徒会ってどんな感じだったの？　気になるわ！」
line = "「シルヴィさんたちの星徒会ってどんな感じだったの？　気になるわ！」"

[[dialogue]]
speaker = "シルヴィ"
# 「どんな感じって……まず会長がサーシャでしょ」
line = "「どんな感じって……まず会長がサーシャでしょ」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い」
line = "「は～い」"

[[dialogue]]
speaker = "シルヴィ"
# 「んで、副会長があたしで」
line = "「んで、副会長があたしで」"

[[dialogue]]
speaker = "サーシャ"
# 「書記が蛍火ちゃんね」
line = "「書記が蛍火ちゃんね」"

[[dialogue]]
speaker = "マトイ"
# （息ぴったりっ！）
line = "（息ぴったりっ！）"

[[dialogue]]
speaker = "アナ"
# （阿吽の呼吸というやつですね）
line = "（阿吽の呼吸というやつですね）"

[[dialogue]]
speaker = "マトイ"
# 「おふたりが会長副会長だったら、トラブルも起きなさそうですよね」
line = "「おふたりが会長副会長だったら、トラブルも起きなさそうですよね」"

[[dialogue]]
speaker = "シルヴィ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "サーシャ"
# 「うん？」
line = "「うん？」"

[[dialogue]]
speaker = "シルヴィ"
# 「そんなことないよー。サーシャ、割と考えなしだし」
line = "「そんなことないよー。サーシャ、割と考えなしだし」"

[[dialogue]]
speaker = "サーシャ"
# 「それを言ったら、シルヴィだって計画性が全くないし～」
line = "「それを言ったら、シルヴィだって計画性が全くないし～」"

[[dialogue]]
speaker = "アナ"
# 「おや……？」
line = "「おや……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふむふむ、具体的には？」
line = "「ふむふむ、具体的には？」"

[[dialogue]]
speaker = "マトイ"
# （そこ掘り下げちゃうんだ！？）
line = "（そこ掘り下げちゃうんだ！？）"

[[dialogue]]
speaker = "サーシャ"
# 「サッカー部とソフトボール部が運動場の使用範囲でモメたことがあって～」
line = "「サッカー部とソフトボール部が運動場の使用範囲でモメたことがあって～」"

[[dialogue]]
speaker = "シルヴィ"
# 「あらかじめ年間計画で決めてあったんだけど、アニメだかなんだかの影響で新入部員に偏りが出ちゃって」
line = "「あらかじめ年間計画で決めてあったんだけど、アニメだかなんだかの影響で新入部員に偏りが出ちゃって」"

[[dialogue]]
speaker = "サーシャ"
# 「改めて使用範囲を決めなおしたいって言われたのよ～」
line = "「改めて使用範囲を決めなおしたいって言われたのよ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「そしたら、サーシャが全運動部を招集して収拾がつかなくなって」
line = "「そしたら、サーシャが全運動部を招集して収拾がつかなくなって」"

[[dialogue]]
speaker = "サーシャ"
# 「だって新入部員の問題はふたつの部だけじゃないし、不公平だと思って～。話し合えば解決すると思ったのよ～」
line = "「だって新入部員の問題はふたつの部だけじゃないし、不公平だと思って～。話し合えば解決すると思ったのよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「それにシルヴィだって、とんでもないこと言ったのよ～」
line = "「それにシルヴィだって、とんでもないこと言ったのよ～」"

[[dialogue]]
speaker = "マトイ"
# （サーシャさんが子どもみたいに頬を膨らませてる……）
line = "（サーシャさんが子どもみたいに頬を膨らませてる……）"

[[dialogue]]
speaker = "アナ"
# 「シルヴィ先輩はなんと？」
line = "「シルヴィ先輩はなんと？」"

[[dialogue]]
speaker = "サーシャ"
# 「みんな星騎士なんだし、戦って決めようって～」
line = "「みんな星騎士なんだし、戦って決めようって～」"

[[dialogue]]
speaker = "シルヴィ"
# 「だってそれが一番公平かなって思ったんだもん」
line = "「だってそれが一番公平かなって思ったんだもん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、で？　結局どうなったの？」
line = "「で、で？　結局どうなったの？」"

[[dialogue]]
speaker = "シルヴィ"
# 「というわけで開催したよ、運動部スーパーバトルロワイヤル！」
line = "「というわけで開催したよ、運動部スーパーバトルロワイヤル！」"

[[dialogue]]
speaker = "サーシャ"
# 「審判は蛍火ちゃんで、実況はコハルコちゃん♪」
line = "「審判は蛍火ちゃんで、実況はコハルコちゃん♪」"

[[dialogue]]
speaker = "マトイ"
# 「あああああっ！」
line = "「あああああっ！」"

[[dialogue]]
speaker = "アナ"
# 「どうしました急に」
line = "「どうしました急に」"

[[dialogue]]
speaker = "マトイ"
# 「そういえば去年、見たことある！　人がいっぱい！　吹き飛ばされてたやつ！」
line = "「そういえば去年、見たことある！　人がいっぱい！　吹き飛ばされてたやつ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ああ、あれね！　人形焼きの出店も出てたわ！」
line = "「ああ、あれね！　人形焼きの出店も出てたわ！」"

[[dialogue]]
speaker = "アナ"
# 「……一年生であることが悔やまれます。私もそこにいたかった」
line = "「……一年生であることが悔やまれます。私もそこにいたかった」"

[[dialogue]]
speaker = "マトイ"
# 「そんなトラブルがあったんだ……てっきりそういう行事があるんだと思ってた……」
line = "「そんなトラブルがあったんだ……てっきりそういう行事があるんだと思ってた……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たちもやるしかないわね！　ぜったい盛り上がるわよ！」
line = "「私たちもやるしかないわね！　ぜったい盛り上がるわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「やーりーまーせーん！！」
line = "「やーりーまーせーん！！」"

[[dialogue]]
speaker = "アナ"
# 「ちなみに、勝敗は……？」
line = "「ちなみに、勝敗は……？」"

[[dialogue]]
speaker = "サーシャ"
# 「私たちが勝ったわ～」
line = "「私たちが勝ったわ～」"

[[dialogue]]
speaker = "マトイ"
# 「……え？」
line = "「……え？」"

[[dialogue]]
speaker = "シルヴィ"
# 「事故がないようにあたしたちも変身して待機してたんだけど、血の気の多い子があたしたちも参加者だと思ったみたいで、戦いを挑まれちゃったんだよね～」
line = "「事故がないようにあたしたちも変身して待機してたんだけど、血の気の多い子があたしたちも参加者だと思ったみたいで、戦いを挑まれちゃったんだよね～」"

[[dialogue]]
speaker = "サーシャ"
# 「応戦してるうちに、気が付いたら全運動部ＶＳ星徒会になっちゃって～」
line = "「応戦してるうちに、気が付いたら全運動部ＶＳ星徒会になっちゃって～」"

[[dialogue]]
speaker = "シルヴィ"
# 「最後に立ってたのは、あたしたちふたりだけだったんだよね～あははっ！」
line = "「最後に立ってたのは、あたしたちふたりだけだったんだよね～あははっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「おかげで最終的に割り振りは星徒会で決められたけど、あれはしんどかったわ～」
line = "「おかげで最終的に割り振りは星徒会で決められたけど、あれはしんどかったわ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「楽しかったけどね！」
line = "「楽しかったけどね！」"

[[dialogue]]
speaker = "アナ"
# 「おー、ワイルド……」
line = "「おー、ワイルド……」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスってやんちゃな星徒会長だと思ってたけど、そうでもなかったんだね……」
line = "「ヴィーナスってやんちゃな星徒会長だと思ってたけど、そうでもなかったんだね……」"
