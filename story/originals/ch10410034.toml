[[dialogue]]
speaker = "unk"
# 第４話,逆襲の照れさせデート,P
line = "第４話,逆襲の照れさせデート,P"

[[dialogue]]
speaker = "unk"
# ここのところ、マインにはしてやられっぱなしだ。
line = "ここのところ、マインにはしてやられっぱなしだ。"

[[dialogue]]
speaker = "unk"
# 俺はイタズラっ子な彼女に反撃するため、マインを思いきり照れさせるデートプランを考えた──！
line = "俺はイタズラっ子な彼女に反撃するため、マインを思いきり照れさせるデートプランを考えた──！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「遊園地ね～。そういえば会長と遊園地デートはしたことなかったかもね」
line = "「遊園地ね～。そういえば会長と遊園地デートはしたことなかったかもね」"

[[dialogue]]
speaker = "受付のお姉さん"
# 「チケット、学生お２人ですね──割引できるものはお持ちですか？」
line = "「チケット、学生お２人ですね──割引できるものはお持ちですか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ、学生証ありま──」
line = "「あ、学生証ありま──」"

[[dialogue]]
speaker = "unk"
# カップル割引でお願いします！
line = "カップル割引でお願いします！"

[[dialogue]]
speaker = "unk"
# 俺たちカップルなんです！
line = "俺たちカップルなんです！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちょぉっ──かか、会長っ！？」
line = "「ちょぉっ──かか、会長っ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「お、大きな声で何言ってるのっ？　う、うわー……後ろの子供、めっちゃ笑ってるじゃん……！」
line = "「お、大きな声で何言ってるのっ？　う、うわー……後ろの子供、めっちゃ笑ってるじゃん……！」"

[[dialogue]]
speaker = "受付のお姉さん"
# 「ふふ、カップル割引、かしこまりました。仲がとてもよろしいんですね♪」
line = "「ふふ、カップル割引、かしこまりました。仲がとてもよろしいんですね♪」"

[[dialogue]]
speaker = "unk"
# （マインのほっぺにキスをする）
line = "（マインのほっぺにキスをする）"

[[dialogue]]
speaker = "unk"
# ええ、もちろん。ラブラブです
line = "ええ、もちろん。ラブラブです"

[[dialogue]]
speaker = "ネーゼマイン"
# 「──んにゃぁぁっ！？」
line = "「──んにゃぁぁっ！？」"

[[dialogue]]
speaker = "男の子"
# 「おかーさん！　みてみて！　いま、ちゅーした！！」
line = "「おかーさん！　みてみて！　いま、ちゅーした！！」"

[[dialogue]]
speaker = "母親"
# 「も、もうっ……指さしちゃいけません！」
line = "「も、もうっ……指さしちゃいけません！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ぅ、ぅあ～…………！？」
line = "「ぅ、ぅあ～…………！？」"

[[dialogue]]
speaker = "受付のお姉さん"
# 「チケットがご用意できました。どうぞデートをお楽しみくださいませ♪」
line = "「チケットがご用意できました。どうぞデートをお楽しみくださいませ♪」"

[[dialogue]]
speaker = "unk"
# 入り口で計画通りにマインを照れさせた俺は、続いてジェットコースターに彼女を誘った。
line = "入り口で計画通りにマインを照れさせた俺は、続いてジェットコースターに彼女を誘った。"

[[dialogue]]
speaker = "unk"
# 見せ場となる最後のループ部分で記念撮影があり、降車後にその写真が受付周りに展示されるポピュラーなジェットコースターなのだが──
line = "見せ場となる最後のループ部分で記念撮影があり、降車後にその写真が受付周りに展示されるポピュラーなジェットコースターなのだが──"

[[dialogue]]
speaker = "ネーゼマイン"
# 「う、うわあぁぁああ──！？　やっぱり！　ばっちり撮られてる……会長ってば何てことをっ……！？」
line = "「う、うわあぁぁああ──！？　やっぱり！　ばっちり撮られてる……会長ってば何てことをっ……！？」"

[[dialogue]]
speaker = "若い女性"
# 「あっ、見てあの２人の写真──ふふ♪　すっごく仲良しなのねー<emoji=heart04>」
line = "「あっ、見てあの２人の写真──ふふ♪　すっごく仲良しなのねー<emoji=heart04>」"

[[dialogue]]
speaker = "若い男性"
# 「あの４回転ループの最中に、ほっぺにキス……！？　あの彼氏、只者じゃないぜ……！？」
line = "「あの４回転ループの最中に、ほっぺにキス……！？　あの彼氏、只者じゃないぜ……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いい、行くよっ！　会長！　アプリに送信とかいらないから！　離れるのー！」
line = "「いい、行くよっ！　会長！　アプリに送信とかいらないから！　離れるのー！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もう！　チケット買う時も、さっきも！　どうしてあんなことばっかり……！」
line = "「もう！　チケット買う時も、さっきも！　どうしてあんなことばっかり……！」"

[[dialogue]]
speaker = "unk"
# ごめん。気持ちが抑えきれなかった
line = "ごめん。気持ちが抑えきれなかった"

[[dialogue]]
speaker = "ネーゼマイン"
# 「めっちゃ笑ってるし！　な、なに！？　今日のデートはそういう趣向ってコトなの！？」
line = "「めっちゃ笑ってるし！　な、なに！？　今日のデートはそういう趣向ってコトなの！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「確かに最近、からかいすぎたかな～とは思ってたけど……！」
line = "「確かに最近、からかいすぎたかな～とは思ってたけど……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私がああやって人前でいじられるの、恥ずかしいから嫌だって分かってて……くぅう～っ……！」
line = "「私がああやって人前でいじられるの、恥ずかしいから嫌だって分かってて……くぅう～っ……！」"

[[dialogue]]
speaker = "unk"
# 今日は俺の反撃タイムだ！
line = "今日は俺の反撃タイムだ！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「も、も～照れない！　会長がしてくるのなんて、不意打ちのチューくらいだし！　耐えてみせるから！！」
line = "「も、も～照れない！　会長がしてくるのなんて、不意打ちのチューくらいだし！　耐えてみせるから！！」"

[[dialogue]]
speaker = "unk"
# その後もマインと一緒に乗ったカボチャの馬車をサプライズでライトアップしてもらったり。
line = "その後もマインと一緒に乗ったカボチャの馬車をサプライズでライトアップしてもらったり。"

[[dialogue]]
speaker = "unk"
# 舞台の観劇は、休憩中にドローンカメラが客席を撮影してくれる。『ラブラブの星騎士のカップルです！　盛大な拍手を！』とお祝いしてもらったり。
line = "舞台の観劇は、休憩中にドローンカメラが客席を撮影してくれる。『ラブラブの星騎士のカップルです！　盛大な拍手を！』とお祝いしてもらったり。"

[[dialogue]]
speaker = "unk"
# レストランで突如、店内を消灯してサプライズケーキを運んでもらったり。
line = "レストランで突如、店内を消灯してサプライズケーキを運んでもらったり。"

[[dialogue]]
speaker = "unk"
# 遊園地とは本当にいい場所だ。事前に連絡しておけば、様々なことに対応してもらえる──
line = "遊園地とは本当にいい場所だ。事前に連絡しておけば、様々なことに対応してもらえる──"

[[dialogue]]
speaker = "ネーゼマイン"
# 「散々な１日だった……真っ白に燃え尽きたよ……」
line = "「散々な１日だった……真っ白に燃え尽きたよ……」"

[[dialogue]]
speaker = "unk"
# 楽しかったな～
line = "楽しかったな～"

[[dialogue]]
speaker = "ネーゼマイン"
# 「このぉ……ツヤツヤした顔して……！」
line = "「このぉ……ツヤツヤした顔して……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁ、でも……会長が色々と準備してくれたのは、素直に嬉しいよ……うん……」
line = "「まぁ、でも……会長が色々と準備してくれたのは、素直に嬉しいよ……うん……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今日はしてやられたけど……次は私がお返しする番だからね！　覚悟しててよ、会長っ！？」
line = "「今日はしてやられたけど……次は私がお返しする番だからね！　覚悟しててよ、会長っ！？」"

[[dialogue]]
speaker = "unk"
# 真っ赤に照れながらそう伝えてくるマインに、俺も頷いて返すのだった。
line = "真っ赤に照れながらそう伝えてくるマインに、俺も頷いて返すのだった。"
