[[dialogue]]
speaker = "unk"
# 第４話,再会を約して,P
line = "第４話,再会を約して,P"

[[dialogue]]
speaker = "ヴィーナス"
# 「今日のクロト、どうしたの？」
line = "「今日のクロト、どうしたの？」"

[[dialogue]]
speaker = "マトイ"
# 「いつになく疲れてるみたい。トレーニングのしすぎかな？」
line = "「いつになく疲れてるみたい。トレーニングのしすぎかな？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まあ、たまにはそういう日もあるでしょ。クロトも無理せず休んでなさい」
line = "「まあ、たまにはそういう日もあるでしょ。クロトも無理せず休んでなさい」"

[[dialogue]]
speaker = "unk"
# ちょっと休めば復活するから
line = "ちょっと休めば復活するから"

[[dialogue]]
speaker = "unk"
# ありがとう
line = "ありがとう"

[[dialogue]]
speaker = "マトイ"
# 「そうだ、栄養ドリンク飲む？　お高いやつがちょうどあるから……」
line = "「そうだ、栄養ドリンク飲む？　お高いやつがちょうどあるから……」"

[[dialogue]]
speaker = "？？？"
# 「にんにん！　そんな時こそ忍びの秘薬でござるよ～！」
line = "「にんにん！　そんな時こそ忍びの秘薬でござるよ～！」"

[[dialogue]]
speaker = "せつな"
# 「しゅたっ！　せつな参上でござる！」
line = "「しゅたっ！　せつな参上でござる！」"

[[dialogue]]
speaker = "マトイ"
# 「きゃあっ！」
line = "「きゃあっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう、ビックリするじゃないの！　いきなり現れないでよ！」
line = "「もう、ビックリするじゃないの！　いきなり現れないでよ！」"

[[dialogue]]
speaker = "シズル"
# 「うちの子がごめんなさい。改めまして、紫桜の里の鵜飼シズルと申します」
line = "「うちの子がごめんなさい。改めまして、紫桜の里の鵜飼シズルと申します」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃんから話は聞いてるわ！　ようこそ星徒会へ、ゆっくりしていってちょうだい！」
line = "「ヘレナちゃんから話は聞いてるわ！　ようこそ星徒会へ、ゆっくりしていってちょうだい！」"

[[dialogue]]
speaker = "シズル"
# 「ありがとうございます。お仕事の邪魔をするつもりはありませんから。ちょっと魔王さんの様子が気懸かりだっただけなので」
line = "「ありがとうございます。お仕事の邪魔をするつもりはありませんから。ちょっと魔王さんの様子が気懸かりだっただけなので」"

[[dialogue]]
speaker = "シズル"
# 「やっぱりお疲れみたいですね。特製の秘薬を持って来ましたから、どうぞ飲んで下さい」
line = "「やっぱりお疲れみたいですね。特製の秘薬を持って来ましたから、どうぞ飲んで下さい」"

[[dialogue]]
speaker = "unk"
# 秘薬こわい
line = "秘薬こわい"

[[dialogue]]
speaker = "unk"
# めちゃくちゃ苦い？
line = "めちゃくちゃ苦い？"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたの？　怯えちゃってるけど……」
line = "「どうしたの？　怯えちゃってるけど……」"

[[dialogue]]
speaker = "せつな"
# 「さもありなん。師匠の秘薬はめちゃ苦でござるからな！」
line = "「さもありなん。師匠の秘薬はめちゃ苦でござるからな！」"

[[dialogue]]
speaker = "シズル"
# 「大丈夫ですよ、この秘薬はあま～くしてますから、里の子どもでも飲めちゃうくらいなんです」
line = "「大丈夫ですよ、この秘薬はあま～くしてますから、里の子どもでも飲めちゃうくらいなんです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、だったら安心じゃない。思い切ってグイっといっちゃいなさいよ」
line = "「あら、だったら安心じゃない。思い切ってグイっといっちゃいなさいよ」"

[[dialogue]]
speaker = "マトイ"
# 「会長の怯え方が普通じゃないんだけど……大丈夫かな？」
line = "「会長の怯え方が普通じゃないんだけど……大丈夫かな？」"

[[dialogue]]
speaker = "シズル"
# 「本当に大丈夫なのに……そんなに怯えられると、私、悲しくなってしまいます」
line = "「本当に大丈夫なのに……そんなに怯えられると、私、悲しくなってしまいます」"

[[dialogue]]
speaker = "シズル"
# 「ねえ、魔王さん……」
line = "「ねえ、魔王さん……」"

[[dialogue]]
speaker = "シズル"
# （昨日はごめんなさい。ちょっと張り切りすぎちゃいましたね。秘薬には精力回復の効果をつけておきましたので、飲むことをオススメしますよ♪）
line = "（昨日はごめんなさい。ちょっと張り切りすぎちゃいましたね。秘薬には精力回復の効果をつけておきましたので、飲むことをオススメしますよ♪）"

[[dialogue]]
speaker = "ヴィーナス"
# 「見た目すっごく健全なのに……なーんか妖しい感じがするのは気のせいかしら？」
line = "「見た目すっごく健全なのに……なーんか妖しい感じがするのは気のせいかしら？」"

[[dialogue]]
speaker = "せつな"
# 「気のせいではないでござる。せつなの師匠はすごいでござるよ～♪」
line = "「気のせいではないでござる。せつなの師匠はすごいでござるよ～♪」"

[[dialogue]]
speaker = "シズル"
# 「ふふっ、それほどでもないですよ。ちょっと薬を作るのが上手なだけの、普通の女の子です♪」
line = "「ふふっ、それほどでもないですよ。ちょっと薬を作るのが上手なだけの、普通の女の子です♪」"

[[dialogue]]
speaker = "せつな"
# 「師匠が普通というのは無理があるでござるよ～」
line = "「師匠が普通というのは無理があるでござるよ～」"

[[dialogue]]
speaker = "unk"
# （激しく同意！）
line = "（激しく同意！）"

[[dialogue]]
speaker = "シズル"
# 「そんな事より、用件を先に済ませましょう……魔王さん、数日でしたがいろいろお世話になりました」
line = "「そんな事より、用件を先に済ませましょう……魔王さん、数日でしたがいろいろお世話になりました」"

[[dialogue]]
speaker = "シズル"
# 「せつなの様子も見ることができましたし、久々の大都会を満喫することもできました」
line = "「せつなの様子も見ることができましたし、久々の大都会を満喫することもできました」"

[[dialogue]]
speaker = "シズル"
# 「なので本日、紫桜の里に帰ろうと思います」
line = "「なので本日、紫桜の里に帰ろうと思います」"

[[dialogue]]
speaker = "unk"
# え…………
line = "え…………"

[[dialogue]]
speaker = "シズル"
# 「突然で申し訳ありません。魔王さんには帰る前に挨拶をしておきたかったので」
line = "「突然で申し訳ありません。魔王さんには帰る前に挨拶をしておきたかったので」"

[[dialogue]]
speaker = "せつな"
# 「あまり長く里を不在にしていると、残されたものが不安に思うでござる」
line = "「あまり長く里を不在にしていると、残されたものが不安に思うでござる」"

[[dialogue]]
speaker = "シズル"
# 「たくましく育ちつつも、まだまだ未熟な子供たちですから」
line = "「たくましく育ちつつも、まだまだ未熟な子供たちですから」"

[[dialogue]]
speaker = "シズル"
# 「それでは魔王さん。それから皆さんもありがとうございました」
line = "「それでは魔王さん。それから皆さんもありがとうございました」"

[[dialogue]]
speaker = "マトイ"
# 「いえいえ、ご丁寧にありがとうございます」
line = "「いえいえ、ご丁寧にありがとうございます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……どうしたのよ。なんかすごくショックを受けてない？」
line = "「……どうしたのよ。なんかすごくショックを受けてない？」"

[[dialogue]]
speaker = "unk"
# あ、いや、それは……
line = "あ、いや、それは……"

[[dialogue]]
speaker = "せつな"
# 「師匠とお別れするのが惜しいのでござろうか？　主様と師匠、すっかり仲良くなったでござるからな～」
line = "「師匠とお別れするのが惜しいのでござろうか？　主様と師匠、すっかり仲良くなったでござるからな～」"

[[dialogue]]
speaker = "シズル"
# 「そうですね。私も後ろ髪を引かれる思いです」
line = "「そうですね。私も後ろ髪を引かれる思いです」"

[[dialogue]]
speaker = "シズル"
# 「けれど今生の別れではありませんので。魔王さん、そんなに気を落とさずに」
line = "「けれど今生の別れではありませんので。魔王さん、そんなに気を落とさずに」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほー、ふーん、そういう感じなんだ～」
line = "「ほー、ふーん、そういう感じなんだ～」"

[[dialogue]]
speaker = "マトイ"
# 「えっ？　えっ？　どういうこと？　そういうことなの？」
line = "「えっ？　えっ？　どういうこと？　そういうことなの？」"

[[dialogue]]
speaker = "シズル"
# 「ふふっ……さて、どうでしょうか？」
line = "「ふふっ……さて、どうでしょうか？」"

[[dialogue]]
speaker = "マトイ"
# 「き、気になりますっ！！」
line = "「き、気になりますっ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まあまあ、野暮な詮索は不要よ、マトイ」
line = "「まあまあ、野暮な詮索は不要よ、マトイ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね、ひとつだけ言えることがあるとしたら……ヘレナちゃんにお願いすれば、いつでも紫桜の里に繋いでもらえるということね！」
line = "「そうね、ひとつだけ言えることがあるとしたら……ヘレナちゃんにお願いすれば、いつでも紫桜の里に繋いでもらえるということね！」"

[[dialogue]]
speaker = "unk"
# その笑顔が腹立つ……
line = "その笑顔が腹立つ……"

[[dialogue]]
speaker = "シズル"
# 「空間転移装置のおかげで行き来も楽になりましたから、会いたいと思った時には会いに来てください。また一緒に遊べる日を楽しみにしていますよ」
line = "「空間転移装置のおかげで行き来も楽になりましたから、会いたいと思った時には会いに来てください。また一緒に遊べる日を楽しみにしていますよ」"

[[dialogue]]
speaker = "シズル"
# 「それでは失礼します。最後に魔王さん……」
line = "「それでは失礼します。最後に魔王さん……」"

[[dialogue]]
speaker = "シズル"
# （せつなのことも、よろしく頼みましたよ……♪）
line = "（せつなのことも、よろしく頼みましたよ……♪）"

[[dialogue]]
speaker = "unk"
# こうしてシズルさんは、様々なものを残して帰って行った。
line = "こうしてシズルさんは、様々なものを残して帰って行った。"

[[dialogue]]
speaker = "unk"
# 次に来る時は、どんな爆弾が飛び出すのかわからないけど、楽しみであることに違いはなかった。
line = "次に来る時は、どんな爆弾が飛び出すのかわからないけど、楽しみであることに違いはなかった。"
