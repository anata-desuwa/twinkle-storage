[[dialogue]]
speaker = "unk"
# 第１話,お財布が大ピンチ！,B
line = "第１話,お財布が大ピンチ！,B"

[[dialogue]]
speaker = "unk"
# ３０００年の時を経て、その日はついに訪れた。
line = "３０００年の時を経て、その日はついに訪れた。"

[[dialogue]]
speaker = "unk"
# リクリエ──世界が新たに構築される滅びと新生の刻。
line = "リクリエ──世界が新たに構築される滅びと新生の刻。"

[[dialogue]]
speaker = "unk"
# 人類が、魔族が、天使が、そして魔女たちが。
line = "人類が、魔族が、天使が、そして魔女たちが。"

[[dialogue]]
speaker = "unk"
# この未曽有の危機の到来に慄きつつも、この日のために全てを賭けて立ち向かい──
line = "この未曽有の危機の到来に慄きつつも、この日のために全てを賭けて立ち向かい──"

[[dialogue]]
speaker = "unk"
# そして新星学園星徒会長にして魔王である緋宮クロトを中心とした星騎士たちによって、その大波は退けられた。
line = "そして新星学園星徒会長にして魔王である緋宮クロトを中心とした星騎士たちによって、その大波は退けられた。"

[[dialogue]]
speaker = "unk"
# 世界に喜びの声が響いてより数日。
line = "世界に喜びの声が響いてより数日。"

[[dialogue]]
speaker = "unk"
# それは、本懐を遂げたあとも活動を続けていた魔女の組織『ネビュラ』から始まった。
line = "それは、本懐を遂げたあとも活動を続けていた魔女の組織『ネビュラ』から始まった。"

[[dialogue]]
speaker = "ウェンディ"
# 「──以上のことから、大変申し上げにくいのですが……」
line = "「──以上のことから、大変申し上げにくいのですが……」"

[[dialogue]]
speaker = "ウェンディ"
# 「このまま元老会の支援が打ち切られた状態が続くなら、そう遠くない未来、組織の運営資金は底を突いてしまうと思います」
line = "「このまま元老会の支援が打ち切られた状態が続くなら、そう遠くない未来、組織の運営資金は底を突いてしまうと思います」"

[[dialogue]]
speaker = "セドナ"
# 「遠くない未来、か……具体的にはどのくらいだ？」
line = "「遠くない未来、か……具体的にはどのくらいだ？」"

[[dialogue]]
speaker = "ウェンディ"
# 「……ふた月ほど、かと」
line = "「……ふた月ほど、かと」"

[[dialogue]]
speaker = "セドナ"
# 「……………………」
line = "「……………………」"

[[dialogue]]
speaker = "ウェンディ"
# 「ちょ、長官……」
line = "「ちょ、長官……」"

[[dialogue]]
speaker = "セドナ"
# 「分かってはいたが、厳しい状況だな……」
line = "「分かってはいたが、厳しい状況だな……」"

[[dialogue]]
speaker = "ウェンディ"
# 「あぅうううううっ！！　申し訳ありません、セドナ長官！　私が不甲斐ないばかりに！！」
line = "「あぅうううううっ！！　申し訳ありません、セドナ長官！　私が不甲斐ないばかりに！！」"

[[dialogue]]
speaker = "ウェンディ"
# 「ネビュラの財政を預かる身として、申し開きの言葉もありませんっ！！」
line = "「ネビュラの財政を預かる身として、申し開きの言葉もありませんっ！！」"

[[dialogue]]
speaker = "セドナ"
# 「いや、今回ばかりは仕方ないだろう、お前の手腕をもってしても」
line = "「いや、今回ばかりは仕方ないだろう、お前の手腕をもってしても」"

[[dialogue]]
speaker = "セドナ"
# 「グレートウォール計画が成功し、想定通りの形でリクリエを乗り越えていたならば、今日のような状況にはなっていなかったのだから」
line = "「グレートウォール計画が成功し、想定通りの形でリクリエを乗り越えていたならば、今日のような状況にはなっていなかったのだから」"

[[dialogue]]
speaker = "ウェンディ"
# 「ですがですがっ！　私が余計なことをしなければっ！　人間界での事業を手放したりしていなければ、継続的な資金源として財政を維持できていたのに！」
line = "「ですがですがっ！　私が余計なことをしなければっ！　人間界での事業を手放したりしていなければ、継続的な資金源として財政を維持できていたのに！」"

[[dialogue]]
speaker = "セドナ"
# 「それも仕方あるまい。人間界はリクリエによって滅んでしまう想定だった……それを前提にお前には動いてもらっていた」
line = "「それも仕方あるまい。人間界はリクリエによって滅んでしまう想定だった……それを前提にお前には動いてもらっていた」"

[[dialogue]]
speaker = "セドナ"
# 「そう──リクリエにより人間界が滅び、そして新たな世界が構築された時……」
line = "「そう──リクリエにより人間界が滅び、そして新たな世界が構築された時……」"

[[dialogue]]
speaker = "セドナ"
# 「どのような再構築が行われるかは分からないが、復興のためにはやはり資金が必要だったのだ」
line = "「どのような再構築が行われるかは分からないが、復興のためにはやはり資金が必要だったのだ」"

[[dialogue]]
speaker = "セドナ"
# 「その為の資金を確保するために、人間界に構えていた会社を売却した……そういうことだろう？」
line = "「その為の資金を確保するために、人間界に構えていた会社を売却した……そういうことだろう？」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい……ですが完全に裏目に出てしまいました」
line = "「はい……ですが完全に裏目に出てしまいました」"

[[dialogue]]
speaker = "ウェンディ"
# 「人間界は滅びず、かといってリクリエの脅威も完全に去ったとは言い切れない状態」
line = "「人間界は滅びず、かといってリクリエの脅威も完全に去ったとは言い切れない状態」"

[[dialogue]]
speaker = "ウェンディ"
# 「組織は引き続き維持する必要があるというのに、その財源を全て失ってしまって……」
line = "「組織は引き続き維持する必要があるというのに、その財源を全て失ってしまって……」"

[[dialogue]]
speaker = "セドナ"
# 「もう言うな。裏を返せばその資金のおかげで、リクリエ後の急場をしのげたとも言えるのだ」
line = "「もう言うな。裏を返せばその資金のおかげで、リクリエ後の急場をしのげたとも言えるのだ」"

[[dialogue]]
speaker = "セドナ"
# 「そもそも人間界で事業を起こし、そこからネビュラの運営資金を補助する、という離れ業はお前の手腕あってのこと」
line = "「そもそも人間界で事業を起こし、そこからネビュラの運営資金を補助する、という離れ業はお前の手腕あってのこと」"

[[dialogue]]
speaker = "セドナ"
# 「お前がいなければ、グレートウォール計画の実現も危うかっただろうし、ネビュラという組織を維持することも難しかっただろう」
line = "「お前がいなければ、グレートウォール計画の実現も危うかっただろうし、ネビュラという組織を維持することも難しかっただろう」"

[[dialogue]]
speaker = "ウェンディ"
# 「ううう、勿体ないお言葉です……長官……」
line = "「ううう、勿体ないお言葉です……長官……」"

[[dialogue]]
speaker = "セドナ"
# 「それよりも、責められるべきは現状を楽観的にしか捉えられない元老会の連中だ」
line = "「それよりも、責められるべきは現状を楽観的にしか捉えられない元老会の連中だ」"

[[dialogue]]
speaker = "セドナ"
# 「リクリエが去ったと決めつけて、運営資金を打ち切り、執拗に組織の解体を迫ってくる」
line = "「リクリエが去ったと決めつけて、運営資金を打ち切り、執拗に組織の解体を迫ってくる」"

[[dialogue]]
speaker = "セドナ"
# 「奴らの戯言の相手をするだけで労力を強いられ、山積みになっている問題に集中させてもらえない」
line = "「奴らの戯言の相手をするだけで労力を強いられ、山積みになっている問題に集中させてもらえない」"

[[dialogue]]
speaker = "セドナ"
# 「財政に関してはウェンディ、お前を頼りきりにしてしまっているな」
line = "「財政に関してはウェンディ、お前を頼りきりにしてしまっているな」"

[[dialogue]]
speaker = "ウェンディ"
# 「とんでもありません！　本当に元老会の奴らときたら、セドナ長官のお手を煩わせることばかりして……」
line = "「とんでもありません！　本当に元老会の奴らときたら、セドナ長官のお手を煩わせることばかりして……」"

[[dialogue]]
speaker = "ウェンディ"
# 「世界で起きている事件に少しでも目を向ければ、楽観など出来るはずがない。どうしてそんなことも分からないのか！」
line = "「世界で起きている事件に少しでも目を向ければ、楽観など出来るはずがない。どうしてそんなことも分からないのか！」"

[[dialogue]]
speaker = "セドナ"
# 「ともかく、貯金が底を突く前に老人どもを説得しなければ」
line = "「ともかく、貯金が底を突く前に老人どもを説得しなければ」"

[[dialogue]]
speaker = "ウェンディ"
# 「私も急ぎ、新たな財源確保に努めます」
line = "「私も急ぎ、新たな財源確保に努めます」"

[[dialogue]]
speaker = "セドナ"
# 「頼んだぞ」
line = "「頼んだぞ」"

[[dialogue]]
speaker = "ウェンディ"
# 「はいっ！」
line = "「はいっ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「ひあっ！？　ば、爆発？　襲撃ですか！！？」
line = "「ひあっ！？　ば、爆発？　襲撃ですか！！？」"

[[dialogue]]
speaker = "セドナ"
# 「……またか」
line = "「……またか」"

[[dialogue]]
speaker = "ウェンディ"
# 「え？　またか、ということはこれって……」
line = "「え？　またか、ということはこれって……」"

[[dialogue]]
speaker = "セドナ"
# 「おそらく姫様の仕業だ」
line = "「おそらく姫様の仕業だ」"

[[dialogue]]
speaker = "カヤ"
# 『ご報告致します。クラウディア様が謹慎部屋の壁を破って抗議活動を開始致しました』
line = "『ご報告致します。クラウディア様が謹慎部屋の壁を破って抗議活動を開始致しました』"

[[dialogue]]
speaker = "カヤ"
# 『基地本部に向かって侵攻中。足止めを行っていますが、程なく突破されます。至急、援護をお願いします』
line = "『基地本部に向かって侵攻中。足止めを行っていますが、程なく突破されます。至急、援護をお願いします』"

[[dialogue]]
speaker = "セドナ"
# 「ご苦労、すぐに向かおう。それまで持ちこたえてくれ」
line = "「ご苦労、すぐに向かおう。それまで持ちこたえてくれ」"

[[dialogue]]
speaker = "カヤ"
# 『イエス・マム』
line = "『イエス・マム』"

[[dialogue]]
speaker = "セドナ"
# 「はぁ……姫様にも困ったものだ」
line = "「はぁ……姫様にも困ったものだ」"

[[dialogue]]
speaker = "ウェンディ"
# 「せめて私たちで抑えることが出来ればよいのですが、相手がクラウディア様では……」
line = "「せめて私たちで抑えることが出来ればよいのですが、相手がクラウディア様では……」"

[[dialogue]]
speaker = "セドナ"
# 「私以外には止められないだろう」
line = "「私以外には止められないだろう」"

[[dialogue]]
speaker = "ウェンディ"
# 「これで何度目になるでしょう。こうたびたび騒ぎを起こされてしまっては、ますます長官の身動きが取れなくなってしまいます」
line = "「これで何度目になるでしょう。こうたびたび騒ぎを起こされてしまっては、ますます長官の身動きが取れなくなってしまいます」"

[[dialogue]]
speaker = "ウェンディ"
# 「クラウディア様は例の要求を通すまで、暴れ続けるおつもりでしょうか？」
line = "「クラウディア様は例の要求を通すまで、暴れ続けるおつもりでしょうか？」"

[[dialogue]]
speaker = "セドナ"
# 「だろうな、頭の痛いことだ」
line = "「だろうな、頭の痛いことだ」"

[[dialogue]]
speaker = "セドナ"
# 「今は姫様の要求に応えることはできない。まずはネビュラという組織の存続を確定しなければ」
line = "「今は姫様の要求に応えることはできない。まずはネビュラという組織の存続を確定しなければ」"

[[dialogue]]
speaker = "セドナ"
# 「そして姫様が暴れていることは元老会にも悟られてはならない。姫様と元老会が対立する、などということになればそれこそ魔女の森全てを巻き込む大問題だ」
line = "「そして姫様が暴れていることは元老会にも悟られてはならない。姫様と元老会が対立する、などということになればそれこそ魔女の森全てを巻き込む大問題だ」"

[[dialogue]]
speaker = "ウェンディ"
# 「クラウディア様を我々だけで抑えつつ、その間に元老会を説得するしかない、と」
line = "「クラウディア様を我々だけで抑えつつ、その間に元老会を説得するしかない、と」"

[[dialogue]]
speaker = "セドナ"
# 「ああ。では、行くぞ」
line = "「ああ。では、行くぞ」"

[[dialogue]]
speaker = "ウェンディ"
# 「了解ですっ！」
line = "「了解ですっ！」"
