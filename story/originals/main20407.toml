[[dialogue]]
speaker = "unk"
# 第７話,星徒会長として,B
line = "第７話,星徒会長として,B"

[[dialogue]]
speaker = "シノ"
# 「学園長をお受けするか検討するにあたって、今の新星学園をよく知るおふたりにお話を聞きたいと思っていたんです」
line = "「学園長をお受けするか検討するにあたって、今の新星学園をよく知るおふたりにお話を聞きたいと思っていたんです」"

[[dialogue]]
speaker = "クロト"
# 「もちろん。俺に話せることなら」
line = "「もちろん。俺に話せることなら」"

[[dialogue]]
speaker = "シノ"
# 「ふむ……とても興味深いお話をありがとうございました。星騎士について、新星学園について、より深く学ぶことができました」
line = "「ふむ……とても興味深いお話をありがとうございました。星騎士について、新星学園について、より深く学ぶことができました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「気付いたらたくさん話してたわね。シノが聞き上手なのかしら」
line = "「気付いたらたくさん話してたわね。シノが聞き上手なのかしら」"

[[dialogue]]
speaker = "unk"
# 俺が星騎士を目指した理由や、転入後の活動など個人的な話から、星徒会長として学園を見た所感まで、様々なことを話した。
line = "俺が星騎士を目指した理由や、転入後の活動など個人的な話から、星徒会長として学園を見た所感まで、様々なことを話した。"

[[dialogue]]
speaker = "unk"
# 新星学園に来て、星騎士になって、星徒会長になって……本当にいろいろなことがあった。
line = "新星学園に来て、星騎士になって、星徒会長になって……本当にいろいろなことがあった。"

[[dialogue]]
speaker = "unk"
# たくさんの出来事があった。たくさんの出会いがあった。
line = "たくさんの出来事があった。たくさんの出会いがあった。"

[[dialogue]]
speaker = "unk"
# 心の奥の震えは止まらないけど、その<b>たくさん</b>が俺を強くしてくれた。
line = "心の奥の震えは止まらないけど、その<b>たくさん</b>が俺を強くしてくれた。"

[[dialogue]]
speaker = "シノ"
# 「しかし課題は……これからのことですね」
line = "「しかし課題は……これからのことですね」"

[[dialogue]]
speaker = "クロト"
# 「それは……はい。極星学園とデネブに対して、どうするべきなのか……」
line = "「それは……はい。極星学園とデネブに対して、どうするべきなのか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 星徒会長として俺が迷っている。
line = "星徒会長として俺が迷っている。"

[[dialogue]]
speaker = "unk"
# <ruby=こうれい>煌嶺</ruby>は理事会の場で「極星学園と戦い、この世界を守る」と言った。
line = "<ruby>煌嶺<rt>こうれい</rt></ruby>は理事会の場で「極星学園と戦い、この世界を守る」と言った。"

[[dialogue]]
speaker = "unk"
# だけどチナの言葉を信じるなら、それはデネブを滅ぼすことで……
line = "だけどチナの言葉を信じるなら、それはデネブを滅ぼすことで……"

[[dialogue]]
speaker = "シノ"
# 「まずは情報を整理しましょう」
line = "「まずは情報を整理しましょう」"

[[dialogue]]
speaker = "シノ"
# 「アルタイル、デネブ、ベガ……デネブから来たというヴィーナスさんの存在を考えても、３つの平行世界が存在するのは間違いないでしょう」
line = "「アルタイル、デネブ、ベガ……デネブから来たというヴィーナスさんの存在を考えても、３つの平行世界が存在するのは間違いないでしょう」"

[[dialogue]]
speaker = "シノ"
# 「加えて、いずれもリクリエによって危機にさらされている。しかしベガはすでに滅んだ」
line = "「加えて、いずれもリクリエによって危機にさらされている。しかしベガはすでに滅んだ」"

[[dialogue]]
speaker = "シノ"
# 「デネブも危うい状態であるはずだった。しかしそこから極星学園が現れ、アルタイルに宣戦布告した」
line = "「デネブも危うい状態であるはずだった。しかしそこから極星学園が現れ、アルタイルに宣戦布告した」"

[[dialogue]]
speaker = "シノ"
# 「これは生存競争であり、アルタイルとデネブのどちらかが滅びなければいけないと」
line = "「これは生存競争であり、アルタイルとデネブのどちらかが滅びなければいけないと」"

[[dialogue]]
speaker = "シノ"
# 「その真偽を確かめるため、新星学園は情報収集中──ということですね」
line = "「その真偽を確かめるため、新星学園は情報収集中──ということですね」"

[[dialogue]]
speaker = "クロト"
# 「はい、間違いありません」
line = "「はい、間違いありません」"

[[dialogue]]
speaker = "unk"
# そして残念ながら、極星学園の主張を裏付ける、あるいは否定する情報は掴めていない。
line = "そして残念ながら、極星学園の主張を裏付ける、あるいは否定する情報は掴めていない。"

[[dialogue]]
speaker = "unk"
# そのうえ例の動画が広がり、星騎士たちにも一般人にも混乱が<ruby=でんぱ>伝播</ruby>していた。
line = "そのうえ例の動画が広がり、星騎士たちにも一般人にも混乱が<ruby>伝播<rt>でんぱ</rt></ruby>していた。"

[[dialogue]]
speaker = "シノ"
# 「残念ながら、周囲は情報が揃うのを待ってはくれません。何らかの方針を打ち出す必要があるでしょう」
line = "「残念ながら、周囲は情報が揃うのを待ってはくれません。何らかの方針を打ち出す必要があるでしょう」"

[[dialogue]]
speaker = "クロト"
# 「そう……ですね。わかってはいるつもりなんですけど」
line = "「そう……ですね。わかってはいるつもりなんですけど」"

[[dialogue]]
speaker = "シノ"
# 「……心苦しそうなお顔をされていますね。星騎士の先頭に立つ責任を考えれば、無理もありません」
line = "「……心苦しそうなお顔をされていますね。星騎士の先頭に立つ責任を考えれば、無理もありません」"

[[dialogue]]
speaker = "シノ"
# 「では一旦、どうしたいかだけを考えましょう」
line = "「では一旦、どうしたいかだけを考えましょう」"

[[dialogue]]
speaker = "クロト"
# 「どうしたいか……？」
line = "「どうしたいか……？」"

[[dialogue]]
speaker = "シノ"
# 「はい。ひとまず理想を言葉にしてみましょう。都合のいい仮定で構いません」
line = "「はい。ひとまず理想を言葉にしてみましょう。都合のいい仮定で構いません」"

[[dialogue]]
speaker = "シノ"
# 「無茶でも不可能でもいいんです。現実とのギャップを認識するためにも有効なことだと思いますよ」
line = "「無茶でも不可能でもいいんです。現実とのギャップを認識するためにも有効なことだと思いますよ」"

[[dialogue]]
speaker = "クロト"
# 「それなら……」
line = "「それなら……」"

[[dialogue]]
speaker = "unk"
# 自分の中に渦巻いていた想いを、頭の中で言葉にしていく。
line = "自分の中に渦巻いていた想いを、頭の中で言葉にしていく。"

[[dialogue]]
speaker = "セイファート"
# 『君の両手には……他者を救う温かさが宿っている』
line = "『君の両手には……他者を救う温かさが宿っている』"

[[dialogue]]
speaker = "unk"
# あの言葉は、彼にとって気紛れに出たものなんだろう。
line = "あの言葉は、彼にとって気紛れに出たものなんだろう。"

[[dialogue]]
speaker = "unk"
# でも俺はあの言葉を本当にするために星騎士になったから。
line = "でも俺はあの言葉を本当にするために星騎士になったから。"

[[dialogue]]
speaker = "クロト"
# 「俺はこの世界を守りたい」
line = "「俺はこの世界を守りたい」"

[[dialogue]]
speaker = "クロト"
# 「みんながいる世界を。みんなで守った世界を」
line = "「みんながいる世界を。みんなで守った世界を」"

[[dialogue]]
speaker = "クロト"
# 「でもそのためにデネブを滅ぼしたくはない。アルタイルも、デネブも……滅びたと言われているベガだって救いたい」
line = "「でもそのためにデネブを滅ぼしたくはない。アルタイルも、デネブも……滅びたと言われているベガだって救いたい」"

[[dialogue]]
speaker = "クロト"
# 「手の届く限り全ての人を……いや届かないなら、この手を伸ばして、届かせたい」
line = "「手の届く限り全ての人を……いや届かないなら、この手を伸ばして、届かせたい」"

[[dialogue]]
speaker = "クロト"
# 「俺たち星騎士は、そのために守護星から力を授かったんだから……！」
line = "「俺たち星騎士は、そのために守護星から力を授かったんだから……！」"

[[dialogue]]
speaker = "シノ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「──と、すみません。熱くなってしまいました」
line = "「──と、すみません。熱くなってしまいました」"

[[dialogue]]
speaker = "unk"
# つい語気が強くなってしまったが、シノさんの視線に気付いてハッと我に返る。
line = "つい語気が強くなってしまったが、シノさんの視線に気付いてハッと我に返る。"

[[dialogue]]
speaker = "unk"
# いつの間にか、爪が食い込むほど拳を固く握っていた。
line = "いつの間にか、爪が食い込むほど拳を固く握っていた。"

[[dialogue]]
speaker = "シノ"
# 「いえ、緋宮会長のお気持ちがよくわかりました」
line = "「いえ、緋宮会長のお気持ちがよくわかりました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よく言ったわ。それでこそクロトよ！」
line = "「よく言ったわ。それでこそクロトよ！」"

[[dialogue]]
speaker = "クロト"
# 「はは……かっこつけちゃったかな」
line = "「はは……かっこつけちゃったかな」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの言葉が少しこそばゆい。
line = "ヴィーナスの言葉が少しこそばゆい。"

[[dialogue]]
speaker = "シノ"
# 「では、前会長のヴィーナスさんはどうお考えですか？」
line = "「では、前会長のヴィーナスさんはどうお考えですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトと同じよ！　星騎士らしく戦うわ！」
line = "「クロトと同じよ！　星騎士らしく戦うわ！」"

[[dialogue]]
speaker = "シノ"
# 「ふふ、気持ちのいいお言葉ですね」
line = "「ふふ、気持ちのいいお言葉ですね」"

[[dialogue]]
speaker = "シノ"
# 「ですが同時に、今どうしないといけないかも考えないといけません」
line = "「ですが同時に、今どうしないといけないかも考えないといけません」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 優しく微笑んでいたシノさんが、現実という刃を突き付ける。
line = "優しく微笑んでいたシノさんが、現実という刃を突き付ける。"

[[dialogue]]
speaker = "unk"
# 理想を語るだけで実現できるなら、誰だって苦労はしないのだ。
line = "理想を語るだけで実現できるなら、誰だって苦労はしないのだ。"

[[dialogue]]
speaker = "シノ"
# 「緋宮会長も理解しているはずです。香堂チナの言葉が本当なら、星徒会長として何を求められるか」
line = "「緋宮会長も理解しているはずです。香堂チナの言葉が本当なら、星徒会長として何を求められるか」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 否定できなくて、つい押し黙ってしまう。
line = "否定できなくて、つい押し黙ってしまう。"

[[dialogue]]
speaker = "unk"
# だけど自分から肯定することはできない。ましてやヴィーナスの前で。
line = "だけど自分から肯定することはできない。ましてやヴィーナスの前で。"

[[dialogue]]
speaker = "シノ"
# 「緋宮会長が考えていることを、あえて私が口にしましょう」
line = "「緋宮会長が考えていることを、あえて私が口にしましょう」"

[[dialogue]]
speaker = "シノ"
# 「新星学園の星徒会長を任された者として、何としてでもアルタイルを守る責任がある」
line = "「新星学園の星徒会長を任された者として、何としてでもアルタイルを守る責任がある」"

[[dialogue]]
speaker = "シノ"
# 「この世界の命運は俺たちに託されている。デネブと戦わなくてはいけないなら、自分が戦うと」
line = "「この世界の命運は俺たちに託されている。デネブと戦わなくてはいけないなら、自分が戦うと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# アルタイルとデネブ、どちらかを取らなければいけないのなら、俺はアルタイルを選ぶしかないだろう。
line = "アルタイルとデネブ、どちらかを取らなければいけないのなら、俺はアルタイルを選ぶしかないだろう。"

[[dialogue]]
speaker = "unk"
# でもそれを口にするのは……誰かを犠牲にするのは、星騎士として一線を越える気がして。
line = "でもそれを口にするのは……誰かを犠牲にするのは、星騎士として一線を越える気がして。"

[[dialogue]]
speaker = "シノ"
# 「緋宮会長が、感情と立場の間で板挟みにあっているのは理解できます」
line = "「緋宮会長が、感情と立場の間で板挟みにあっているのは理解できます」"

[[dialogue]]
speaker = "シノ"
# 「こうして迷っている間にも極星学園は攻めてくるかもしれない。決断するなら早い方がいい」
line = "「こうして迷っている間にも極星学園は攻めてくるかもしれない。決断するなら早い方がいい」"

[[dialogue]]
speaker = "シノ"
# 「選択を間違えればこの世界が滅ぶ──そうお考えなのでしょう」
line = "「選択を間違えればこの世界が滅ぶ──そうお考えなのでしょう」"

[[dialogue]]
speaker = "シノ"
# 「でも経験上、ひとつ言っておかなくてはいけないことがあります」
line = "「でも経験上、ひとつ言っておかなくてはいけないことがあります」"

[[dialogue]]
speaker = "クロト"
# 「はい？」
line = "「はい？」"

[[dialogue]]
speaker = "unk"
# 緊張が少し緩んだ──気がした。
line = "緊張が少し緩んだ──気がした。"

[[dialogue]]
speaker = "シノ"
# 「間違わないことなんて不可能ですよ。私たちは神様じゃないんですから」
line = "「間違わないことなんて不可能ですよ。私たちは神様じゃないんですから」"

[[dialogue]]
speaker = "シノ"
# 「ましてや女神様だってピンチという話じゃないですか。魔王と言えどヒトの子。できることには限りがあります」
line = "「ましてや女神様だってピンチという話じゃないですか。魔王と言えどヒトの子。できることには限りがあります」"

[[dialogue]]
speaker = "シノ"
# 「選択が間違いだったとしたら、気付いた時に何とかするしかないんです」
line = "「選択が間違いだったとしたら、気付いた時に何とかするしかないんです」"

[[dialogue]]
speaker = "クロト"
# 「もし手遅れになったら……？」
line = "「もし手遅れになったら……？」"

[[dialogue]]
speaker = "シノ"
# 「その時はその時です。不確定な状況の中で、確実な選択などありえません」
line = "「その時はその時です。不確定な状況の中で、確実な選択などありえません」"

[[dialogue]]
speaker = "シノ"
# 「合理的な判断をしたうえで、結果が伴わなかった場合は仕方ないです。もちろん反省して今後に活かしますが、どうしようもない時はどうしようもないです」
line = "「合理的な判断をしたうえで、結果が伴わなかった場合は仕方ないです。もちろん反省して今後に活かしますが、どうしようもない時はどうしようもないです」"

[[dialogue]]
speaker = "シノ"
# 「私たちにできるのは、最善を尽くすことだけ。結果は後にならないとわからないものです」
line = "「私たちにできるのは、最善を尽くすことだけ。結果は後にならないとわからないものです」"

[[dialogue]]
speaker = "シノ"
# 「そしてもうひとつ、経営者としてアドバイスです」
line = "「そしてもうひとつ、経営者としてアドバイスです」"

[[dialogue]]
speaker = "シノ"
# 「現実と理想のギャップを埋めることは大事ですが、それは現実に屈することを意味しません」
line = "「現実と理想のギャップを埋めることは大事ですが、それは現実に屈することを意味しません」"

[[dialogue]]
speaker = "シノ"
# 「何かを為すということは、現実を変えて、理想へと近づけていくことなんです」
line = "「何かを為すということは、現実を変えて、理想へと近づけていくことなんです」"

[[dialogue]]
speaker = "シノ"
# 「もちろん、上手くいかないことも多々あります」
line = "「もちろん、上手くいかないことも多々あります」"

[[dialogue]]
speaker = "シノ"
# 「それでも、現実に打ちのめされても諦めなかった者だけが、真に理想を実現することができるんです」
line = "「それでも、現実に打ちのめされても諦めなかった者だけが、真に理想を実現することができるんです」"

[[dialogue]]
speaker = "unk"
# そう語るシノさんの表情はどこまでも真摯で、その瞳に宿った意志の強さが伝わってくる。
line = "そう語るシノさんの表情はどこまでも真摯で、その瞳に宿った意志の強さが伝わってくる。"

[[dialogue]]
speaker = "unk"
# 経営のことは詳しくないけど、彼女が社長として呼ばれる理由が少しわかった気がした。
line = "経営のことは詳しくないけど、彼女が社長として呼ばれる理由が少しわかった気がした。"

[[dialogue]]
speaker = "クロト"
# 「……自分と同年代とは思えませんね」
line = "「……自分と同年代とは思えませんね」"

[[dialogue]]
speaker = "シノ"
# 「あはは……つい偉そうに語っちゃいました。ちょっと変わった人生経験してきただけなのに」
line = "「あはは……つい偉そうに語っちゃいました。ちょっと変わった人生経験してきただけなのに」"

[[dialogue]]
speaker = "クロト"
# 「いえ。生徒たちの上に立つ星徒会長として、とてもためにお話でした」
line = "「いえ。生徒たちの上に立つ星徒会長として、とてもためにお話でした」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よくわかんないけどわかった気がするわ！」
line = "「よくわかんないけどわかった気がするわ！」"

[[dialogue]]
speaker = "シノ"
# 「だったらいいんですけど……うぅ、恥ずかしい……」
line = "「だったらいいんですけど……うぅ、恥ずかしい……」"

[[dialogue]]
speaker = "unk"
# さっきとは打って変わって、年相応の女の子の表情を見せるシノさん。
line = "さっきとは打って変わって、年相応の女の子の表情を見せるシノさん。"

[[dialogue]]
speaker = "unk"
# もじもじと照れているところが、小動物的でかわいらしい。
line = "もじもじと照れているところが、小動物的でかわいらしい。"

[[dialogue]]
speaker = "シノ"
# 「ですが、会長さんたちの想い、確かにお聞きしました」
line = "「ですが、会長さんたちの想い、確かにお聞きしました」"

[[dialogue]]
speaker = "シノ"
# 「学園は畑違いだと思っていたんですけど、学園長、お引き受けします。私でよければ力にならせてください」
