[[dialogue]]
speaker = "パテル"
# 「いけーっ、フカヒレー！　アビスシャークパレード！」
line = "「いけーっ、フカヒレー！　アビスシャークパレード！」"

[[dialogue]]
speaker = "パテル？"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 分身がパテルストーンに戻ると、パテルが小さな手のひらでそれを受け止める。
line = "分身がパテルストーンに戻ると、パテルが小さな手のひらでそれを受け止める。"

[[dialogue]]
speaker = "パテル"
# 「……お疲れ様。あなたの言ってることはわかるけどね」
line = "「……お疲れ様。あなたの言ってることはわかるけどね」"

[[dialogue]]
speaker = "パテル"
# 「やったー！　あたしの勝ちー！　欠片の分際であたしに試練を与えようなんて生意気なんだから！」
line = "「やったー！　あたしの勝ちー！　欠片の分際であたしに試練を与えようなんて生意気なんだから！」"

[[dialogue]]
speaker = "unk"
# そして朝日が昇っていき──
line = "そして朝日が昇っていき──"

[[dialogue]]
speaker = "unk"
# サメと死神の夜が明けた。
line = "サメと死神の夜が明けた。"

[[dialogue]]
speaker = "パテル"
# 「は～、疲れたー」
line = "「は～、疲れたー」"

[[dialogue]]
speaker = "パテル"
# 「あ～あ、せっかくかわいい水着着たのに、死神トークしすぎたよ。あたしがかわいくなくなっちゃったら、どうしてくれるのさ」
line = "「あ～あ、せっかくかわいい水着着たのに、死神トークしすぎたよ。あたしがかわいくなくなっちゃったら、どうしてくれるのさ」"

[[dialogue]]
speaker = "パテル"
# 「んじゃ、みんなのところに戻ろっか」
line = "「んじゃ、みんなのところに戻ろっか」"

[[dialogue]]
speaker = "パテル"
# 「ただいま～。こっちは終わったよ」
line = "「ただいま～。こっちは終わったよ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「お帰りなさ～い」
line = "「お帰りなさ～い」"

[[dialogue]]
speaker = "unk"
# こっちは大丈夫だった？
line = "こっちは大丈夫だった？"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ギガロドンなら全部やっつけたのだ！　水着守護天使の敵じゃなかったのだ！」
line = "「ギガロドンなら全部やっつけたのだ！　水着守護天使の敵じゃなかったのだ！」"

[[dialogue]]
speaker = "リップル"
# 「倒したら全部パテルストーンになりました。ドウゾです！」
line = "「倒したら全部パテルストーンになりました。ドウゾです！」"

[[dialogue]]
speaker = "パテル"
# 「ありがと。それじゃパテルストーンもらうね」
line = "「ありがと。それじゃパテルストーンもらうね」"

[[dialogue]]
speaker = "unk"
# パテルストーンが光となり、パテルの中に吸い込まれていく。
line = "パテルストーンが光となり、パテルの中に吸い込まれていく。"

[[dialogue]]
speaker = "パテル"
# 「はい、これであたしの力も元通り～」
line = "「はい、これであたしの力も元通り～」"

[[dialogue]]
speaker = "パテル"
# 「手伝ってくれてありがとう、マグダレナ、アルモタヘル」
line = "「手伝ってくれてありがとう、マグダレナ、アルモタヘル」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「同じ守護天使ですから、これくらいお安い御用ですよ♪」
line = "「同じ守護天使ですから、これくらいお安い御用ですよ♪」"

[[dialogue]]
speaker = "パテル"
# 「リップルも邪魔してごめんね」
line = "「リップルも邪魔してごめんね」"

[[dialogue]]
speaker = "リップル"
# 「イエイエ、パテルストーンを集められてよかったです！」
line = "「イエイエ、パテルストーンを集められてよかったです！」"

[[dialogue]]
speaker = "リップル"
# 「サメは確かにサーファーには危険デスが、人気があるのもジジツ。うまく活用すれば、リゾート結界をもっと楽しくデキるかもしれません！」
line = "「サメは確かにサーファーには危険デスが、人気があるのもジジツ。うまく活用すれば、リゾート結界をもっと楽しくデキるかもしれません！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「リップルは前向きなのだ」
line = "「リップルは前向きなのだ」"

[[dialogue]]
speaker = "パテル"
# 「じゃあ用事も済んだし、あたしはこれで──」
line = "「じゃあ用事も済んだし、あたしはこれで──」"

[[dialogue]]
speaker = "unk"
# ちょっと待ったーっ！
line = "ちょっと待ったーっ！"

[[dialogue]]
speaker = "パテル"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「まだまだ遊び足りないのだ！　パテルも一緒に遊ぶのだ～っ！」
line = "「まだまだ遊び足りないのだ！　パテルも一緒に遊ぶのだ～っ！」"

[[dialogue]]
speaker = "パテル"
# 「でもあたしの用事終わったし」
line = "「でもあたしの用事終わったし」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いいじゃないですか。昨日はパテルストーンを探しながらでしたし、今度はそういうのを気にせず遊びませんか？」
line = "「いいじゃないですか。昨日はパテルストーンを探しながらでしたし、今度はそういうのを気にせず遊びませんか？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「しかもパテルは私たちを監視しながらだったんですよね？　なら今日は仕事を忘れて、本気で遊びましょう」
line = "「しかもパテルは私たちを監視しながらだったんですよね？　なら今日は仕事を忘れて、本気で遊びましょう」"

[[dialogue]]
speaker = "リップル"
# 「もちろんワタシも大歓迎でーす！」
line = "「もちろんワタシも大歓迎でーす！」"

[[dialogue]]
speaker = "unk"
# 俺もパテルと本気で遊びたい
line = "俺もパテルと本気で遊びたい"

[[dialogue]]
speaker = "パテル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "パテル"
# 「ま、いっか。今は忙しくないし、そこまで言うなら付き合ってあげるよ♪」
line = "「ま、いっか。今は忙しくないし、そこまで言うなら付き合ってあげるよ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「決まりなのだ！」
line = "「決まりなのだ！」"

[[dialogue]]
speaker = "リップル"
# 「この旗をイチバン早く取ったヒトの勝ちでーす！　位置に付いて～……レディー……」
line = "「この旗をイチバン早く取ったヒトの勝ちでーす！　位置に付いて～……レディー……」"

[[dialogue]]
speaker = "unk"
# ＧＯ！！
line = "ＧＯ！！"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「負けないのだ！」
line = "「負けないのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私だって──」
line = "「私だって──」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ひゃんっ！？」
line = "「ひゃんっ！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「マグダレナがこけたのだ！　今のうちに──」
line = "「マグダレナがこけたのだ！　今のうちに──」"

[[dialogue]]
speaker = "パテル"
# 「いくよフカヒレ！　ウェーブライドソウルテイカー！」
line = "「いくよフカヒレ！　ウェーブライドソウルテイカー！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「サメに乗るのはアリなのだ！？」
line = "「サメに乗るのはアリなのだ！？」"

[[dialogue]]
speaker = "パテル"
# 「いえーい！　あたしの勝ち～！」
line = "「いえーい！　あたしの勝ち～！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そりゃーっ！」
line = "「そりゃーっ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あー、外れたのだ……スイカ割り、次は会長の番なのだ」
line = "「あー、外れたのだ……スイカ割り、次は会長の番なのだ」"

[[dialogue]]
speaker = "unk"
# 任せて！
line = "任せて！"

[[dialogue]]
speaker = "unk"
# アルモたんから棒を受け取ると、目隠しをしてその場で１０回転。
line = "アルモたんから棒を受け取ると、目隠しをしてその場で１０回転。"

[[dialogue]]
speaker = "unk"
# フラつきながらスイカを目指す。
line = "フラつきながらスイカを目指す。"

[[dialogue]]
speaker = "？？？"
# 「会長、右です右！　あ、ちょっと行きすぎましたっ、少し左ですっ！」
line = "「会長、右です右！　あ、ちょっと行きすぎましたっ、少し左ですっ！」"

[[dialogue]]
speaker = "？？？"
# 「あ、また行きすぎなのだ！　そこを右なのだ！」
line = "「あ、また行きすぎなのだ！　そこを右なのだ！」"

[[dialogue]]
speaker = "？？？"
# 「後ろ後ろー！　バックだよー！」
line = "「後ろ後ろー！　バックだよー！」"

[[dialogue]]
speaker = "？？？"
# 「違うのだ！　さっきので合ってるのだ！　前に出るのだ！」
line = "「違うのだ！　さっきので合ってるのだ！　前に出るのだ！」"

[[dialogue]]
speaker = "？？？"
# 「そこを９０度左！　５歩前！」
line = "「そこを９０度左！　５歩前！」"

[[dialogue]]
speaker = "？？？"
# 「スイカから離れてます！　スイカは後ろですよ！」
line = "「スイカから離れてます！　スイカは後ろですよ！」"

[[dialogue]]
speaker = "unk"
# （１人怪しいのがいる……？）
line = "（１人怪しいのがいる……？）"

[[dialogue]]
speaker = "？？？"
# 「そう、そのまま近づいて……今なのだ！」
line = "「そう、そのまま近づいて……今なのだ！」"

[[dialogue]]
speaker = "？？？"
# 「そこです、いけますよ！」
line = "「そこです、いけますよ！」"

[[dialogue]]
speaker = "？？？"
# 「ダメダメ、そこを右だよ！」
line = "「ダメダメ、そこを右だよ！」"

[[dialogue]]
speaker = "unk"
# そこだ！
line = "そこだ！"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「お見事です、会長！　スイカが綺麗に割れましたね！」
line = "「お見事です、会長！　スイカが綺麗に割れましたね！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「これでスイカが食べられるのだ～！」
line = "「これでスイカが食べられるのだ～！」"

[[dialogue]]
speaker = "パテル"
# 「ちぇ、あたしのイタズラバレてたか～」
line = "「ちぇ、あたしのイタズラバレてたか～」"

[[dialogue]]
speaker = "unk"
# いろんな遊びをしている間に時間が過ぎていき、やがて日が傾いてきた。
line = "いろんな遊びをしている間に時間が過ぎていき、やがて日が傾いてきた。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「たくさん遊んで満足なのだ～♪」
line = "「たくさん遊んで満足なのだ～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「楽しかったですね～♪」
line = "「楽しかったですね～♪」"

[[dialogue]]
speaker = "パテル"
# 「え～、２人ともこれくらいで満足してるの？　あたしは全然だよ」
line = "「え～、２人ともこれくらいで満足してるの？　あたしは全然だよ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "パテル"
# 「まだまだこんなもんじゃ終わらせないよ！　あたしの本気を見せてあげるんだから！」
line = "「まだまだこんなもんじゃ終わらせないよ！　あたしの本気を見せてあげるんだから！」"

[[dialogue]]
speaker = "パテル"
# 「名付けて──パテルの肝試し試練！」
line = "「名付けて──パテルの肝試し試練！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ええ～～っ！？」
line = "「ええ～～っ！？」"
