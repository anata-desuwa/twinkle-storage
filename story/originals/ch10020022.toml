[[dialogue]]
speaker = "unk"
# 第２話,お姉ちゃんと母,P
line = "第２話,お姉ちゃんと母,P"

[[dialogue]]
speaker = "unk"
# 昨晩、星徒会の書類仕事を持ち帰ってリビングで作業していたら、徹夜になってしまい、うたた寝していたのだが――
line = "昨晩、星徒会の書類仕事を持ち帰ってリビングで作業していたら、徹夜になってしまい、うたた寝していたのだが――"

[[dialogue]]
speaker = "サーシャ"
# 「……朝ですよ～♪」
line = "「……朝ですよ～♪」"

[[dialogue]]
speaker = "unk"
# ん～……母さん……？
line = "ん～……母さん……？"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　は～い♪　お母さんですよ～」
line = "「あらあら、うふふ♪　は～い♪　お母さんですよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんってば、無防備で、可愛い寝顔……<emoji=heart04>　思わず、目覚めのキスをしたくなっちゃう――」
line = "「会長くんってば、無防備で、可愛い寝顔……<emoji=heart04>　思わず、目覚めのキスをしたくなっちゃう――」"

[[dialogue]]
speaker = "サーシャ"
# 「頬っぺたに……ちゅっ<emoji=heart04>」
line = "「頬っぺたに……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ファッ！？　母さんじゃない！？
line = "ファッ！？　母さんじゃない！？"

[[dialogue]]
speaker = "サーシャ"
# 「あら、目が覚めた？　正解～♪　本当は、お姉ちゃんでした～♪」
line = "「あら、目が覚めた？　正解～♪　本当は、お姉ちゃんでした～♪」"

[[dialogue]]
speaker = "unk"
# お姉ちゃんでもないけど！？
line = "お姉ちゃんでもないけど！？"

[[dialogue]]
speaker = "サーシャ"
# 「改めて、おはよう、会長くん♪　朝ご飯はもう出来てるわよ～」
line = "「改めて、おはよう、会長くん♪　朝ご飯はもう出来てるわよ～」"

[[dialogue]]
speaker = "リノ"
# 「しくしく……お母さん、悲しいわ……まさか、サーシャちゃんの方がお母さんだったなんて……私はもう用済みなのね……」
line = "「しくしく……お母さん、悲しいわ……まさか、サーシャちゃんの方がお母さんだったなんて……私はもう用済みなのね……」"

[[dialogue]]
speaker = "unk"
# いや何でそうなるのさ！？
line = "いや何でそうなるのさ！？"

[[dialogue]]
speaker = "リノ"
# 「冗談よ。ふふっ……でも、私と間違えちゃうくらい、サーシャちゃんが母性的ってことかしら？」
line = "「冗談よ。ふふっ……でも、私と間違えちゃうくらい、サーシャちゃんが母性的ってことかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　リノさんと同じくらいっていうのは、褒め言葉ですね～」
line = "「あらあら、うふふ♪　リノさんと同じくらいっていうのは、褒め言葉ですね～」"

[[dialogue]]
speaker = "サーシャ"
# 「私としても、こんなお母さん素敵だな～って、常日頃思っていましたから♪」
line = "「私としても、こんなお母さん素敵だな～って、常日頃思っていましたから♪」"

[[dialogue]]
speaker = "リノ"
# 「本当？　私も、サーシャちゃんみたいな美人で母性的な子が息子の彼女になってくれて良かったな～って、ずっと思ってたのよ♪」
line = "「本当？　私も、サーシャちゃんみたいな美人で母性的な子が息子の彼女になってくれて良かったな～って、ずっと思ってたのよ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「きゃ～♪　なんだか私、お姉ちゃんが出来たみたいで嬉しいです～♪」
line = "「きゃ～♪　なんだか私、お姉ちゃんが出来たみたいで嬉しいです～♪」"

[[dialogue]]
speaker = "リノ"
# 「そうしたら、ダブルお姉ちゃんね♪　あ、それならクロト、今日は私のことも、お姉ちゃんって呼んでみる？」
line = "「そうしたら、ダブルお姉ちゃんね♪　あ、それならクロト、今日は私のことも、お姉ちゃんって呼んでみる？」"

[[dialogue]]
speaker = "サーシャ"
# 「それならリノさん、今日だけ私と、お姉ちゃんとお母さんを交換しちゃいますか？」
line = "「それならリノさん、今日だけ私と、お姉ちゃんとお母さんを交換しちゃいますか？」"

[[dialogue]]
speaker = "リノ"
# 「それは面白そうかも～♪　ふふふっ」
line = "「それは面白そうかも～♪　ふふふっ」"

[[dialogue]]
speaker = "unk"
# なんか話が変な方向に行ってる！？
line = "なんか話が変な方向に行ってる！？"

[[dialogue]]
speaker = "unk"
# それから俺は着替えて来て、３人で朝の食卓を囲んだ――
line = "それから俺は着替えて来て、３人で朝の食卓を囲んだ――"

[[dialogue]]
speaker = "リノ"
# 「サーシャちゃん、朝食まで作ってくれてありがとうね。どれも凄く美味しいわ」
line = "「サーシャちゃん、朝食まで作ってくれてありがとうね。どれも凄く美味しいわ」"

[[dialogue]]
speaker = "サーシャ"
# 「いえいえ。こちらこそ度々、遊びに来た時に食事をご一緒させて頂いてますから」
line = "「いえいえ。こちらこそ度々、遊びに来た時に食事をご一緒させて頂いてますから」"

[[dialogue]]
speaker = "リノ"
# 「これならすぐにでもお嫁に来れちゃいそうね。というより、既にもう家族みたいな感じだけど♪」
line = "「これならすぐにでもお嫁に来れちゃいそうね。というより、既にもう家族みたいな感じだけど♪」"

[[dialogue]]
speaker = "サーシャ"
# 「そう言って頂けて、嬉しいです～♪」
line = "「そう言って頂けて、嬉しいです～♪」"

[[dialogue]]
speaker = "リノ"
# 「毎朝起こしに来てくれる彼女だなんて、幸せ者ね～」
line = "「毎朝起こしに来てくれる彼女だなんて、幸せ者ね～」"

[[dialogue]]
speaker = "サーシャ"
# 「それは～、毎朝会長くん成分を補給しないと、元気が出ないといいますか……<emoji=heart04>」
line = "「それは～、毎朝会長くん成分を補給しないと、元気が出ないといいますか……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、ゾッコンなのね～。お熱いですこと♪」
line = "「ふふっ、ゾッコンなのね～。お熱いですこと♪」"

[[dialogue]]
speaker = "リノ"
# 「――じゃあ、美味しい朝食も頂いたし、お母さん……じゃなかった、リノお姉ちゃんは出掛けて来るから」
line = "「――じゃあ、美味しい朝食も頂いたし、お母さん……じゃなかった、リノお姉ちゃんは出掛けて来るから」"

[[dialogue]]
speaker = "リノ"
# 「サーシャママ、お留守番よろしくね♪」
line = "「サーシャママ、お留守番よろしくね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い、いってらっしゃい～♪」
line = "「は～い、いってらっしゃい～♪」"

[[dialogue]]
speaker = "unk"
# 本当に役を交換してる！？
line = "本当に役を交換してる！？"

[[dialogue]]
speaker = "サーシャ"
# 「――というわけで、２人きりになっちゃったわけだけど……会長くん、どうする？」
line = "「――というわけで、２人きりになっちゃったわけだけど……会長くん、どうする？」"

[[dialogue]]
speaker = "サーシャ"
# 「せっかくだし、今日１日、サーシャママに甘えちゃう？」
line = "「せっかくだし、今日１日、サーシャママに甘えちゃう？」"

[[dialogue]]
speaker = "サーシャ"
# 「――興味が無いわけじゃないけど、恥ずかしい？　ふふっ、男の子だものね～♪」
line = "「――興味が無いわけじゃないけど、恥ずかしい？　ふふっ、男の子だものね～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「私は好奇心で凄くワクワクしちゃうわ……<emoji=heart04>　ある意味、お姉ちゃんよりも甘えさせられちゃうものね？」
line = "「私は好奇心で凄くワクワクしちゃうわ……<emoji=heart04>　ある意味、お姉ちゃんよりも甘えさせられちゃうものね？」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんがしたいって言ったら……お願い、聞いてくれる？」
line = "「お姉ちゃんがしたいって言ったら……お願い、聞いてくれる？」"

[[dialogue]]
speaker = "unk"
# そ、その言い方はずるい……
line = "そ、その言い方はずるい……"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　じゃあ、決まりね♪」
line = "「あらあら、うふふ♪　じゃあ、決まりね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃあ～、まずは呼び方よね～」
line = "「それじゃあ～、まずは呼び方よね～」"

[[dialogue]]
speaker = "サーシャ"
# 「私のこと――ママって呼んでみて？」
line = "「私のこと――ママって呼んでみて？」"

[[dialogue]]
speaker = "unk"
# 恥ずかしくて、無理です！
line = "恥ずかしくて、無理です！"

[[dialogue]]
speaker = "サーシャ"
# 「え～？　２人きりなんだから、気にすることないのに～」
line = "「え～？　２人きりなんだから、気にすることないのに～」"

[[dialogue]]
speaker = "サーシャ"
# 「でも……ふふっ♪　今日はまだ始まったばかりで、時間はたっぷりあるしね♪」
line = "「でも……ふふっ♪　今日はまだ始まったばかりで、時間はたっぷりあるしね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「いっぱいイチャイチャ甘えさせて、ママって呼ばせちゃうんだから……<emoji=heart04>」
line = "「いっぱいイチャイチャ甘えさせて、ママって呼ばせちゃうんだから……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 甘い誘惑に少しずつ理性が溶かされてゆくのを感じつつ、ドキドキして顔が熱くなってしまう俺なのだった――
line = "甘い誘惑に少しずつ理性が溶かされてゆくのを感じつつ、ドキドキして顔が熱くなってしまう俺なのだった――"
