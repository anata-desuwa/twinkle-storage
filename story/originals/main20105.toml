[[dialogue]]
speaker = "unk"
# 第７話,御前試合再び,B
line = "第７話,御前試合再び,B"

[[dialogue]]
speaker = "unk"
# 梨緒と名乗る女性と鮮烈な出会いを果たした翌日。
line = "梨緒と名乗る女性と鮮烈な出会いを果たした翌日。"

[[dialogue]]
speaker = "unk"
# 俺が御前試合を挑まれたという噂は、瞬く間に新星学園中を駆け抜けていた。
line = "俺が御前試合を挑まれたという噂は、瞬く間に新星学園中を駆け抜けていた。"

[[dialogue]]
speaker = "生徒D"
# 「ねぇ聞いた！？　謎の転校生が会長に挑戦状を叩きつけたんだって！」
line = "「ねぇ聞いた！？　謎の転校生が会長に挑戦状を叩きつけたんだって！」"

[[dialogue]]
speaker = "生徒E"
# 「でも緋宮会長ってヴィーナス前会長より強いんでしょう？　それにリクリエも阻止したし敵うはずないんじゃ……」
line = "「でも緋宮会長ってヴィーナス前会長より強いんでしょう？　それにリクリエも阻止したし敵うはずないんじゃ……」"

[[dialogue]]
speaker = "生徒F"
# 「会長の力を知らないはずないし、挑戦者は自信ありってことだろ？　へっ、御前試合楽しみだな！」
line = "「会長の力を知らないはずないし、挑戦者は自信ありってことだろ？　へっ、御前試合楽しみだな！」"

[[dialogue]]
speaker = "マトイ"
# 「学園中、御前試合の話で持ち切りだね……」
line = "「学園中、御前試合の話で持ち切りだね……」"

[[dialogue]]
speaker = "クロト"
# 「既視感がすごいな……」
line = "「既視感がすごいな……」"

[[dialogue]]
speaker = "ミルフィー"
# 「あはは……懐かしいといえば懐かしいね」
line = "「あはは……懐かしいといえば懐かしいね」"

[[dialogue]]
speaker = "unk"
# ヴィーナスとの御前試合の時を思い返し、苦笑いを浮かべるマトイと、クラス委員長のミルフィー。
line = "ヴィーナスとの御前試合の時を思い返し、苦笑いを浮かべるマトイと、クラス委員長のミルフィー。"

[[dialogue]]
speaker = "unk"
# 俺が転入した直後、ヴィーナスから御前試合を挑まれた時の学園内の盛り上がりはすごかった。
line = "俺が転入した直後、ヴィーナスから御前試合を挑まれた時の学園内の盛り上がりはすごかった。"

[[dialogue]]
speaker = "unk"
# なぜか俺がヴィーナスに挑戦したという話になっていて、無茶とか命知らずとか言われたっけ。
line = "なぜか俺がヴィーナスに挑戦したという話になっていて、無茶とか命知らずとか言われたっけ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」
line = "「あなたを今日付けでここ、新星学園星徒会──星徒会長に任命するわ。そして」"

[[dialogue]]
speaker = "ヴィーナス"
# 「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」
line = "「緋宮クロト──あなたは魔王となって、この世界を救うのよ！」"

[[dialogue]]
speaker = "クロト"
# 「…………………………え？」
line = "「…………………………え？」"

[[dialogue]]
speaker = "unk"
# 今はヴィーナスの事情を知っているけど、あの時は文字通り言葉を失った。
line = "今はヴィーナスの事情を知っているけど、あの時は文字通り言葉を失った。"

[[dialogue]]
speaker = "unk"
# 挑まれたのは同じだが、今回は立場が逆で、俺が会長だ。
line = "挑まれたのは同じだが、今回は立場が逆で、俺が会長だ。"

[[dialogue]]
speaker = "unk"
# そしてもうひとつ逆なのは──
line = "そしてもうひとつ逆なのは──"

[[dialogue]]
speaker = "梨緒"
# 「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」
line = "「君はいずれ悪しき魔王に堕ち、世界を滅ぼす」"

[[dialogue]]
speaker = "梨緒"
# 「だからその前に私が君を止める」
line = "「だからその前に私が君を止める」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは、俺が世界を救うと言った。
line = "ヴィーナスは、俺が世界を救うと言った。"

[[dialogue]]
speaker = "unk"
# だが彼女は──梨緒は、俺が世界を滅ぼすと言った。
line = "だが彼女は──梨緒は、俺が世界を滅ぼすと言った。"

[[dialogue]]
speaker = "unk"
# ヴィーナスが言ったことも最初は信じられなかったけど、梨緒の言葉も信じ難い──
line = "ヴィーナスが言ったことも最初は信じられなかったけど、梨緒の言葉も信じ難い──"

[[dialogue]]
speaker = "unk"
# いや、本当にそうか？
line = "いや、本当にそうか？"

[[dialogue]]
speaker = "unk"
# 俺の中にはリクリエの力が封じられている。その力が世界に破滅をもたらすかもしれない。
line = "俺の中にはリクリエの力が封じられている。その力が世界に破滅をもたらすかもしれない。"

[[dialogue]]
speaker = "unk"
# あの時だって俺は……
line = "あの時だって俺は……"

[[dialogue]]
speaker = "マトイ"
# 「御前試合、受けるの？」
line = "「御前試合、受けるの？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、いや……どうしよう」
line = "「ああ、いや……どうしよう」"

[[dialogue]]
speaker = "ミルフィー"
# 「でも受ける理由はないんじゃない？　ヴィーナスさんの時は負けたら退学だったけど、今は何かが懸かってるわけじゃないし」
line = "「でも受ける理由はないんじゃない？　ヴィーナスさんの時は負けたら退学だったけど、今は何かが懸かってるわけじゃないし」"

[[dialogue]]
speaker = "クロト"
# 「それは……そうなんだけど」
line = "「それは……そうなんだけど」"

[[dialogue]]
speaker = "ミルフィー"
# 「あ、そろそろ部活行かなきゃ。マトイさんも会長くんも星徒会頑張ってね～」
line = "「あ、そろそろ部活行かなきゃ。マトイさんも会長くんも星徒会頑張ってね～」"

[[dialogue]]
speaker = "クロト"
# 「ああ、ヒヨにもよろしくな」
line = "「ああ、ヒヨにもよろしくな」"

[[dialogue]]
speaker = "マトイ"
# 「委員長、また明日～」
line = "「委員長、また明日～」"

[[dialogue]]
speaker = "マトイ"
# 「じゃ、私たちも星徒会いこっか」
line = "「じゃ、私たちも星徒会いこっか」"

[[dialogue]]
speaker = "クロト"
# 「……ああ」
line = "「……ああ」"

[[dialogue]]
speaker = "unk"
# 確かに、御前試合を断ることに何のペナルティもないし、勝ったとしても得るものはない。
line = "確かに、御前試合を断ることに何のペナルティもないし、勝ったとしても得るものはない。"

[[dialogue]]
speaker = "unk"
# なのに、堂々と梨緒の挑戦を跳ねのけられない自分がいた。
line = "なのに、堂々と梨緒の挑戦を跳ねのけられない自分がいた。"

[[dialogue]]
speaker = "アナ"
# 「昨日の新種のモンスターですが、あれから発生はなし。怪我を負ったプリマステラも傷は浅く、近く復帰可能だそうです」
line = "「昨日の新種のモンスターですが、あれから発生はなし。怪我を負ったプリマステラも傷は浅く、近く復帰可能だそうです」"

[[dialogue]]
speaker = "クロト"
# 「そうか、報告ありがとう」
line = "「そうか、報告ありがとう」"

[[dialogue]]
speaker = "unk"
# そう、昨日起きた事件は梨緒の宣戦布告だけではない。
line = "そう、昨日起きた事件は梨緒の宣戦布告だけではない。"

[[dialogue]]
speaker = "クロト"
# 「モンスターの残骸の解析は進んでる？」
line = "「モンスターの残骸の解析は進んでる？」"

[[dialogue]]
speaker = "アナ"
# 「やはりガーディアン同様、リクリエの瘴気の影響が見られました」
line = "「やはりガーディアン同様、リクリエの瘴気の影響が見られました」"

[[dialogue]]
speaker = "アナ"
# 「問題はモンスターの汚染源。あれほど強力なモンスターであれば、影響を与えたリクリエの瘴気も相当な濃度であると考えられます」
line = "「問題はモンスターの汚染源。あれほど強力なモンスターであれば、影響を与えたリクリエの瘴気も相当な濃度であると考えられます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アステラに呑み込まれたとか？　モグモグペッ、って吐き出されたんじゃない？」
line = "「アステラに呑み込まれたとか？　モグモグペッ、って吐き出されたんじゃない？」"

[[dialogue]]
speaker = "マトイ"
# 「そんなガムじゃないんだから……」
line = "「そんなガムじゃないんだから……」"

[[dialogue]]
speaker = "アナ"
# 「アステラに呑み込まれて変質した……という可能性はあながち否定できません。モンスターにもアステラにも改変効果がありますから」
line = "「アステラに呑み込まれて変質した……という可能性はあながち否定できません。モンスターにもアステラにも改変効果がありますから」"

[[dialogue]]
speaker = "アナ"
# 「ですが現在流星市国に発生するアステラは、瘴気の濃度は高くありません。あれほど強力なモンスターが発生するとは考えにくいです」
line = "「ですが現在流星市国に発生するアステラは、瘴気の濃度は高くありません。あれほど強力なモンスターが発生するとは考えにくいです」"

[[dialogue]]
speaker = "クロト"
# 「汚染源は別にあるってことか……」
line = "「汚染源は別にあるってことか……」"

[[dialogue]]
speaker = "unk"
# 星徒会役員の攻撃すら耐える新種のモンスター。
line = "星徒会役員の攻撃すら耐える新種のモンスター。"

[[dialogue]]
speaker = "unk"
# もしあれが大挙して押し寄せていたらと思うとぞっとしない。
line = "もしあれが大挙して押し寄せていたらと思うとぞっとしない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「次は最初から全力よ！　仲間なんて増やさせないわ！」
line = "「次は最初から全力よ！　仲間なんて増やさせないわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね～。私たちも精進しないとかしら～」
line = "「そうね～。私たちも精進しないとかしら～」"

[[dialogue]]
speaker = "アナ"
# 「対策が必要ですね。シミュレーターへのデータの反映、再度遭遇した時の戦闘プランの策定などしておきます」
line = "「対策が必要ですね。シミュレーターへのデータの反映、再度遭遇した時の戦闘プランの策定などしておきます」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう～。さっすがアナちゃんね～」
line = "「ありがとう～。さっすがアナちゃんね～」"

[[dialogue]]
speaker = "サーシャ"
# 「で、会長くん。あの梨緒って子はどうするの～？」
line = "「で、会長くん。あの梨緒って子はどうするの～？」"

[[dialogue]]
speaker = "unk"
# 梨緒・Ａ・クリステレス。やはりこちらでも話題になった。
line = "梨緒・Ａ・クリステレス。やはりこちらでも話題になった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「突然クロトを攻撃してくるし、何なのよ。しかもいきなり御前試合を挑んでくるなんて非常識ね」
line = "「突然クロトを攻撃してくるし、何なのよ。しかもいきなり御前試合を挑んでくるなんて非常識ね」"

[[dialogue]]
speaker = "マトイ"
# 「転入直後の緋宮くんに『御前試合しなさい』って言ったの誰だっけ？」
line = "「転入直後の緋宮くんに『御前試合しなさい』って言ったの誰だっけ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私よ！　でもそれはクロトが魔王に覚醒するために必要なことだったじゃない」
line = "「私よ！　でもそれはクロトが魔王に覚醒するために必要なことだったじゃない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だいたい、クロトのこと悪しき魔王とか言い出して、なんなのあの梨緒って子！？　魔王は英雄でしょ！」
line = "「だいたい、クロトのこと悪しき魔王とか言い出して、なんなのあの梨緒って子！？　魔王は英雄でしょ！」"

[[dialogue]]
speaker = "アナ"
# 「<ruby=りお>梨緒</ruby>・<ruby=アガサ>Ａ</ruby>・クリステレスと言っていました」
line = "「<ruby>梨緒<rt>りお</rt></ruby>・<ruby>Ａ<rt>アガサ</rt></ruby>・クリステレスと言っていました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういう意味じゃなくてー！」
line = "「そういう意味じゃなくてー！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王が悪者っていつの話よ！　魔王は英雄！　この前だって世界を救ったんだから！」
line = "「魔王が悪者っていつの話よ！　魔王は英雄！　この前だって世界を救ったんだから！」"

[[dialogue]]
speaker = "サーシャ"
# 「太陽の壁画を信じてるってことかしら～？　あの壁画も、いろいろ謎が多いけれど～」
line = "「太陽の壁画を信じてるってことかしら～？　あの壁画も、いろいろ謎が多いけれど～」"

[[dialogue]]
speaker = "unk"
# 天使・人間・魔族が力を合わせて魔王を打ち破ったとされるのが、大聖堂にある『太陽の壁画』。
line = "天使・人間・魔族が力を合わせて魔王を打ち破ったとされるのが、大聖堂にある『太陽の壁画』。"

[[dialogue]]
speaker = "unk"
# それに対し、星見家に保管されているのは『月の壁画』。こちらは魔王がリクリエを退けた様を描いたもの。
line = "それに対し、星見家に保管されているのは『月の壁画』。こちらは魔王がリクリエを退けた様を描いたもの。"

[[dialogue]]
speaker = "unk"
# 真実に近いのはこちらなのだが、『太陽の壁画』は嘘にしては浸透しすぎている──というのがアナの所感だった。
line = "真実に近いのはこちらなのだが、『太陽の壁画』は嘘にしては浸透しすぎている──というのがアナの所感だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「彼女、ほんとに何者なの？　新星学園にあんな子いたかしら？」
line = "「彼女、ほんとに何者なの？　新星学園にあんな子いたかしら？」"

[[dialogue]]
speaker = "アナ"
# 「彼女は昨日付けで新星学園に転入したことになっています」
line = "「彼女は昨日付けで新星学園に転入したことになっています」"

[[dialogue]]
speaker = "アナ"
# 「現在の住所は教皇庁公邸。つまり星見家です」
line = "「現在の住所は教皇庁公邸。つまり星見家です」"
