[[dialogue]]
speaker = "unk"
# 第４話,エスメラルダの演奏,P
line = "第４話,エスメラルダの演奏,P"

[[dialogue]]
speaker = "unk"
# 数学の課題を教えてもらったり、分析官の視点から戦闘のアドバイスを貰ったり。
line = "数学の課題を教えてもらったり、分析官の視点から戦闘のアドバイスを貰ったり。"

[[dialogue]]
speaker = "unk"
# 逆に俺が先生の無茶な徹夜を咎めたり、ちょっぴり抜けたドジに振り回されたり。
line = "逆に俺が先生の無茶な徹夜を咎めたり、ちょっぴり抜けたドジに振り回されたり。"

[[dialogue]]
speaker = "unk"
# そんな日々を過ごす内、俺とエスメラルダ先生の仲はどんどん親密になっていった。
line = "そんな日々を過ごす内、俺とエスメラルダ先生の仲はどんどん親密になっていった。"

[[dialogue]]
speaker = "unk"
# そして今日。先生は俺だけのために、ハープを奏でてくれることになったのだった──
line = "そして今日。先生は俺だけのために、ハープを奏でてくれることになったのだった──"

[[dialogue]]
speaker = "エスメラルダ"
# 「──はい、おしまい」
line = "「──はい、おしまい」"

[[dialogue]]
speaker = "エスメラルダ"
# 「どうだったかしら、会長さん？」
line = "「どうだったかしら、会長さん？」"

[[dialogue]]
speaker = "unk"
# 素敵な音色でした、エスメラルダ先生
line = "素敵な音色でした、エスメラルダ先生"

[[dialogue]]
speaker = "エスメラルダ"
# 「ふふ。そう言ってくれると嬉しいわね」
line = "「ふふ。そう言ってくれると嬉しいわね」"

[[dialogue]]
speaker = "エスメラルダ"
# 「私も誰かのためにハープを弾いたのは久しぶりよ」
line = "「私も誰かのためにハープを弾いたのは久しぶりよ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「学生だった頃は、キリカやウィステリアによくオーディエンスになってもらったものだけど……」
line = "「学生だった頃は、キリカやウィステリアによくオーディエンスになってもらったものだけど……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「卒業してからは研究の方にばかり時間を割いていたからね。いい気分転換になったわ」
line = "「卒業してからは研究の方にばかり時間を割いていたからね。いい気分転換になったわ」"

[[dialogue]]
speaker = "unk"
# それが先生の武器なんですよね
line = "それが先生の武器なんですよね"

[[dialogue]]
speaker = "エスメラルダ"
# 「ええ。プリマステラとして活動していた時から、このハープは相棒よ」
line = "「ええ。プリマステラとして活動していた時から、このハープは相棒よ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「最近弾けてなかったから、なまった腕だとハープに叱られちゃうかと思ったけれど……ちゃんと手に馴染んでくれたわね」
line = "「最近弾けてなかったから、なまった腕だとハープに叱られちゃうかと思ったけれど……ちゃんと手に馴染んでくれたわね」"

[[dialogue]]
speaker = "unk"
# 今でも十分に星力はあるんでしょう？
line = "今でも十分に星力はあるんでしょう？"

[[dialogue]]
speaker = "エスメラルダ"
# 「ある程度はね。でも現役の会長さんたちに比べたらやっぱり見劣りしちゃうの」
line = "「ある程度はね。でも現役の会長さんたちに比べたらやっぱり見劣りしちゃうの」"

[[dialogue]]
speaker = "エスメラルダ"
# 「数値から客観的に判断して、前線に出ても現役の子たちに負けないくらいではあるけど」
line = "「数値から客観的に判断して、前線に出ても現役の子たちに負けないくらいではあるけど」"

[[dialogue]]
speaker = "エスメラルダ"
# 「今の私の仕事は、会長さんみたいな星騎士たちを後方から支援することだから」
line = "「今の私の仕事は、会長さんみたいな星騎士たちを後方から支援することだから」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ね……会長さん？」
line = "「ね……会長さん？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「私のハープ、本当に素敵だった？」
line = "「私のハープ、本当に素敵だった？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「もう一度……ううん。何度でも聴きたいなって、そう思ってくれたかしら？」
line = "「もう一度……ううん。何度でも聴きたいなって、そう思ってくれたかしら？」"

[[dialogue]]
speaker = "unk"
# はい。とても素敵でした！
line = "はい。とても素敵でした！"

[[dialogue]]
speaker = "エスメラルダ"
# 「だったら良かったわ」
line = "「だったら良かったわ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「これからも会長さんが望むなら、いつでもあなただけのために、最高の演奏をしてあげる」
line = "「これからも会長さんが望むなら、いつでもあなただけのために、最高の演奏をしてあげる」"

[[dialogue]]
speaker = "エスメラルダ"
# 「だから……どんなに厳しい戦いがあったとしても、絶対に無事に帰ってきてね？」
line = "「だから……どんなに厳しい戦いがあったとしても、絶対に無事に帰ってきてね？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「あなたは星徒会長であり、魔王だとも言われている。あらゆる戦闘で、常に最前線に立つことになると思う」
line = "「あなたは星徒会長であり、魔王だとも言われている。あらゆる戦闘で、常に最前線に立つことになると思う」"

[[dialogue]]
speaker = "エスメラルダ"
# 「それはきっと、辛く険しい道になるわ」
line = "「それはきっと、辛く険しい道になるわ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「とてつもなく強い敵。心が折れてしまうほどの最悪な状況……そこからあなたは逃れられない」
line = "「とてつもなく強い敵。心が折れてしまうほどの最悪な状況……そこからあなたは逃れられない」"

[[dialogue]]
speaker = "エスメラルダ"
# 「だけど……決して諦めないで欲しいの」
line = "「だけど……決して諦めないで欲しいの」"

[[dialogue]]
speaker = "エスメラルダ"
# 「毎日数字とにらめっこして、あらゆるデータを分析して、必死であなたを支えている人がいるってことを、忘れないで」
line = "「毎日数字とにらめっこして、あらゆるデータを分析して、必死であなたを支えている人がいるってことを、忘れないで」"

[[dialogue]]
speaker = "エスメラルダ"
# 「教師として、教え子を戦地に向かわせることは悔しいし……」
line = "「教師として、教え子を戦地に向かわせることは悔しいし……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「会長さんっていう男の子と離ればなれになるのは、もっと悲しいと思うから……」
line = "「会長さんっていう男の子と離ればなれになるのは、もっと悲しいと思うから……」"

[[dialogue]]
speaker = "unk"
# 約束します。どんな状況でも諦めません
line = "約束します。どんな状況でも諦めません"

[[dialogue]]
speaker = "エスメラルダ"
# 「ありがとう、会長さん」
line = "「ありがとう、会長さん」"

[[dialogue]]
speaker = "エスメラルダ"
# 「私も一生懸命、支えるわ。教師として、分析官として」
line = "「私も一生懸命、支えるわ。教師として、分析官として」"

[[dialogue]]
speaker = "エスメラルダ"
# 「そして星騎士のエスメラルダ・シーメインとして」
line = "「そして星騎士のエスメラルダ・シーメインとして」"

[[dialogue]]
speaker = "エスメラルダ"
# 「私の力が必要な時は言ってね。全力でサポートするから」
line = "「私の力が必要な時は言ってね。全力でサポートするから」"

[[dialogue]]
speaker = "エスメラルダ"
# 「……え？　もう１曲、弾いて欲しいの？」
line = "「……え？　もう１曲、弾いて欲しいの？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ふふ♪　しょうがないわね～……特別なんだからね？」
line = "「ふふ♪　しょうがないわね～……特別なんだからね？」"

[[dialogue]]
speaker = "unk"
# これから先、どんなに厳しい戦いが待っていたとしても俺はくじけない。
line = "これから先、どんなに厳しい戦いが待っていたとしても俺はくじけない。"

[[dialogue]]
speaker = "unk"
# どんな困難も跳ねのけて、仲間と共に学園へ戻ってきて……
line = "どんな困難も跳ねのけて、仲間と共に学園へ戻ってきて……"

[[dialogue]]
speaker = "unk"
# そして何度でも、先生のハープの音色を聴かせてもらおう──そう思った。
line = "そして何度でも、先生のハープの音色を聴かせてもらおう──そう思った。"
