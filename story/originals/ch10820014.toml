[[dialogue]]
speaker = "unk"
# 第４話,もっとキミの近くに,P
line = "第４話,もっとキミの近くに,P"

[[dialogue]]
speaker = "フェリシー"
# 「はぁ……やっと依頼が片付いた……」
line = "「はぁ……やっと依頼が片付いた……」"

[[dialogue]]
speaker = "unk"
# ここ数週間、フェリシーは１人で、エクソシストの仕事を忙しくこなしていた。
line = "ここ数週間、フェリシーは１人で、エクソシストの仕事を忙しくこなしていた。"

[[dialogue]]
speaker = "フェリシー"
# （本当は、会長くんに助手として手伝ってもらえたら嬉しかったけど、星徒会が忙しかったみたいだし、仕方ないよね）
line = "（本当は、会長くんに助手として手伝ってもらえたら嬉しかったけど、星徒会が忙しかったみたいだし、仕方ないよね）"

[[dialogue]]
speaker = "フェリシー"
# （でも、学園も違うし、お互い仕事があると、なかなか話せる機会がないなぁ……）
line = "（でも、学園も違うし、お互い仕事があると、なかなか話せる機会がないなぁ……）"

[[dialogue]]
speaker = "ソフレ"
# 「――何をそんな、辛気臭い顔をしているのだわ？」
line = "「――何をそんな、辛気臭い顔をしているのだわ？」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、ソフレ、起きてたんだ……」
line = "「あっ、ソフレ、起きてたんだ……」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレは吸血鬼だもの。夜の方が目が覚めるのだわ。……それで？　会長と何かあったの？」
line = "「ソフレは吸血鬼だもの。夜の方が目が覚めるのだわ。……それで？　会長と何かあったの？」"

[[dialogue]]
speaker = "フェリシー"
# 「え！？　な、なんで会長くんのことだってわかるの？」
line = "「え！？　な、なんで会長くんのことだってわかるの？」"

[[dialogue]]
speaker = "ソフレ"
# 「横から見ていればわかるのだわ。会えばいつも、恋人かってくらい近距離でベタベタしているじゃない」
line = "「横から見ていればわかるのだわ。会えばいつも、恋人かってくらい近距離でベタベタしているじゃない」"

[[dialogue]]
speaker = "フェリシー"
# 「嘘！？　そ、そんなに距離感近かったかな……！？」
line = "「嘘！？　そ、そんなに距離感近かったかな……！？」"

[[dialogue]]
speaker = "ソフレ"
# 「それはもう。面倒臭いから、もうさっさと付き合えって感じなのだわ」
line = "「それはもう。面倒臭いから、もうさっさと付き合えって感じなのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「い、いや、会長くんは確かに仲のいい男友達だけど……。知り合ってからまだ数ヶ月しか経ってないし……そういうのはまだ早いっていうか……」
line = "「い、いや、会長くんは確かに仲のいい男友達だけど……。知り合ってからまだ数ヶ月しか経ってないし……そういうのはまだ早いっていうか……」"

[[dialogue]]
speaker = "ソフレ"
# 「付き合う対象としては、別に問題ないわけ？」
line = "「付き合う対象としては、別に問題ないわけ？」"

[[dialogue]]
speaker = "フェリシー"
# 「えっ！？　そ、それは……優しいし、いざという時、男らしいところもあるし……その……」
line = "「えっ！？　そ、それは……優しいし、いざという時、男らしいところもあるし……その……」"

[[dialogue]]
speaker = "ソフレ"
# 「はいはい、お前がどう思っているかはよく分かったのだわ。……で、辛気臭い顔の原因はなんなの？」
line = "「はいはい、お前がどう思っているかはよく分かったのだわ。……で、辛気臭い顔の原因はなんなの？」"

[[dialogue]]
speaker = "フェリシー"
# 「……実は、ここ最近忙しかったから、会長くんと会って話せてないなぁと思って……」
line = "「……実は、ここ最近忙しかったから、会長くんと会って話せてないなぁと思って……」"

[[dialogue]]
speaker = "ソフレ"
# 「は？　それだけ？　……だったら、今すぐ会いに行けばいいのだわ」
line = "「は？　それだけ？　……だったら、今すぐ会いに行けばいいのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「いやでも、会長くんも星徒会の仕事が忙しそうだし……」
line = "「いやでも、会長くんも星徒会の仕事が忙しそうだし……」"

[[dialogue]]
speaker = "ソフレ"
# 「何を今更……。お前ときたら、ソフレに対しては入学初日から、頼んでもないのにガンガン絡んできていた癖に。会長だとダメな理由がわからないのよ」
line = "「何を今更……。お前ときたら、ソフレに対しては入学初日から、頼んでもないのにガンガン絡んできていた癖に。会長だとダメな理由がわからないのよ」"

[[dialogue]]
speaker = "フェリシー"
# 「う……それは女心というか……。ベタベタし過ぎて、嫌われたくないって思っちゃうというか……」
line = "「う……それは女心というか……。ベタベタし過ぎて、嫌われたくないって思っちゃうというか……」"

[[dialogue]]
speaker = "ソフレ"
# 「会って話すだけのどこに嫌われる要素があるの？　会長は今日だって、ソフレが星徒会室でお昼寝してても怒らなかったくらいのお人好しなのだわ」
line = "「会って話すだけのどこに嫌われる要素があるの？　会長は今日だって、ソフレが星徒会室でお昼寝してても怒らなかったくらいのお人好しなのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「え！？　ソフレ、会長と会ってたの！？」
line = "「え！？　ソフレ、会長と会ってたの！？」"

[[dialogue]]
speaker = "ソフレ"
# 「お前が最近元気にしてるかって、会長が気にしてたから、ソフレがわざわざこうして様子を見にきてやったのよ」
line = "「お前が最近元気にしてるかって、会長が気にしてたから、ソフレがわざわざこうして様子を見にきてやったのよ」"

[[dialogue]]
speaker = "unk"
# 今日でやっと、星徒会の仕事がひと息ついた。俺がソファーに腰かけて、大きく伸びをしていると――
line = "今日でやっと、星徒会の仕事がひと息ついた。俺がソファーに腰かけて、大きく伸びをしていると――"

[[dialogue]]
speaker = "フェリシー"
# 「お邪魔します～……あっ、会長くん！」
line = "「お邪魔します～……あっ、会長くん！」"

[[dialogue]]
speaker = "フェリシー"
# 「う、うん、久しぶり。今、大丈夫……？」
line = "「う、うん、久しぶり。今、大丈夫……？」"

[[dialogue]]
speaker = "フェリシー"
# 「――ちょうど仕事が一区切りついたところ？　じゃあ、その……少しお話していっても大丈夫かな？」
line = "「――ちょうど仕事が一区切りついたところ？　じゃあ、その……少しお話していっても大丈夫かな？」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、ううん！　別に特別な用事があるわけじゃないんだけど……今日、私も仕事の依頼が片付いたところだったから。会長くんは元気にしてるのかな～って思って……」
line = "「あっ、ううん！　別に特別な用事があるわけじゃないんだけど……今日、私も仕事の依頼が片付いたところだったから。会長くんは元気にしてるのかな～って思って……」"

[[dialogue]]
speaker = "フェリシー"
# 「――そっか、元気ならよかった！　えへへ……♪」
line = "「――そっか、元気ならよかった！　えへへ……♪」"

[[dialogue]]
speaker = "unk"
# ２人で久しぶりに会って、話は弾んだ。
line = "２人で久しぶりに会って、話は弾んだ。"

[[dialogue]]
speaker = "フェリシー"
# （ああ、やっぱり会長くんと一緒にいると楽しいなぁ。勇気を出して、会いにきてよかった
line = "（ああ、やっぱり会長くんと一緒にいると楽しいなぁ。勇気を出して、会いにきてよかった"

[[dialogue]]
speaker = "フェリシー"
# 「……って、あれ？　会長くん？　もしかして、寝てる？」
line = "「……って、あれ？　会長くん？　もしかして、寝てる？」"

[[dialogue]]
speaker = "フェリシー"
# （疲れてたのかな。ソファーに座ったまま、眠っちゃってる……）
line = "（疲れてたのかな。ソファーに座ったまま、眠っちゃってる……）"

[[dialogue]]
speaker = "フェリシー"
# （……ずっと会えてなかったから、少しだけ……。隣にくっ付くくらい、いいよね……？）
line = "（……ずっと会えてなかったから、少しだけ……。隣にくっ付くくらい、いいよね……？）"

[[dialogue]]
speaker = "フェリシー"
# （ん……♪　会長くんの体温が伝わってくる……温かくて、すごく安心する……）
line = "（ん……♪　会長くんの体温が伝わってくる……温かくて、すごく安心する……）"

[[dialogue]]
speaker = "フェリシー"
# （あ…………会長くんの顔が、すぐ近くに……）
line = "（あ…………会長くんの顔が、すぐ近くに……）"

[[dialogue]]
speaker = "フェリシー"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ！？　フェリシー、いま頬っぺたに……！？
line = "！？　フェリシー、いま頬っぺたに……！？"

[[dialogue]]
speaker = "フェリシー"
# 「ひゃっ！？　会長くん、起きちゃった！？　えっと、こここ、これはその……！」
line = "「ひゃっ！？　会長くん、起きちゃった！？　えっと、こここ、これはその……！」"

[[dialogue]]
speaker = "フェリシー"
# 「ご、ごめんなさい、私……！　つい、我慢できなくて……！」
line = "「ご、ごめんなさい、私……！　つい、我慢できなくて……！」"

[[dialogue]]
speaker = "unk"
# フェリシー、今のは……
line = "フェリシー、今のは……"

[[dialogue]]
speaker = "フェリシー"
# 「そ、その……」
line = "「そ、その……」"

[[dialogue]]
speaker = "フェリシー"
# 「……は、はい。そうです……私……」
line = "「……は、はい。そうです……私……」"

[[dialogue]]
speaker = "フェリシー"
# 「会長くんのことが、好きです……」
line = "「会長くんのことが、好きです……」"

[[dialogue]]
speaker = "unk"
# 顔を真っ赤にして、小さく告白する彼女を見ていたら――
line = "顔を真っ赤にして、小さく告白する彼女を見ていたら――"

[[dialogue]]
speaker = "unk"
# 俺も、フェリシーのことが好きだ
line = "俺も、フェリシーのことが好きだ"

[[dialogue]]
speaker = "フェリシー"
# 「えっ？　会長くんも？　私のこと……本当に？　ど、どうしよう……」
line = "「えっ？　会長くんも？　私のこと……本当に？　ど、どうしよう……」"

[[dialogue]]
speaker = "フェリシー"
# 「すごく嬉しい……」
line = "「すごく嬉しい……」"

[[dialogue]]
speaker = "unk"
# 両手で自分の頬を押さえながら、照れてしまうフェリシーなのだった――
line = "両手で自分の頬を押さえながら、照れてしまうフェリシーなのだった――"
