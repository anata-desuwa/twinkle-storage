[[dialogue]]
speaker = "unk"
# 第１話,波打ち際ランデブー,P
line = "第１話,波打ち際ランデブー,P"

[[dialogue]]
speaker = "ベアトリス"
# 「あははっ、あははははっ」
line = "「あははっ、あははははっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さ～んっ。こっちですよ、こっち～！！」
line = "「会長さ～んっ。こっちですよ、こっち～！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「私のこと、捕まえてみてくださ～いっ♪」
line = "「私のこと、捕まえてみてくださ～いっ♪」"

[[dialogue]]
speaker = "unk"
# 待て～～！！
line = "待て～～！！"

[[dialogue]]
speaker = "ベアトリス"
# 「待ちませ～んっ♪」
line = "「待ちませ～んっ♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「あははっ、波が冷たくて気持ちいいっ。太陽がキラキラ反射して、まるで光の上を走ってるみたいっ」
line = "「あははっ、波が冷たくて気持ちいいっ。太陽がキラキラ反射して、まるで光の上を走ってるみたいっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「踏む度に砂がきゅっきゅって鳴って、ふふふっ、とっても気持ちいいですっ」
line = "「踏む度に砂がきゅっきゅって鳴って、ふふふっ、とっても気持ちいいですっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ほら、会長さんっ。早く私を捕まえないと、どんどん逃げていっちゃいますよ～っ？　ほら早く──」
line = "「ほら、会長さんっ。早く私を捕まえないと、どんどん逃げていっちゃいますよ～っ？　ほら早く──」"

[[dialogue]]
speaker = "ベアトリス"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "unk"
# 危ないっ！
line = "危ないっ！"

[[dialogue]]
speaker = "ベアトリス"
# 「わわっ……。つ、捕まっちゃいました……<emoji=heart04>」
line = "「わわっ……。つ、捕まっちゃいました……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# はしゃぎすぎると危ないよ？
line = "はしゃぎすぎると危ないよ？"

[[dialogue]]
speaker = "ベアトリス"
# 「えへへ、すみません。でも、つい心が躍っちゃって」
line = "「えへへ、すみません。でも、つい心が躍っちゃって」"

[[dialogue]]
speaker = "ベアトリス"
# 「こんなに明るくて爽やかな太陽の光を浴びられるのも、星騎士でいられる今のうちだけですから」
line = "「こんなに明るくて爽やかな太陽の光を浴びられるのも、星騎士でいられる今のうちだけですから」"

[[dialogue]]
speaker = "ベアトリス"
# 「できる限り太陽の下で、楽しい思い出を作っておきたくて。こんなに綺麗なビーチ、きっと魔界にはありませんしね？」
line = "「できる限り太陽の下で、楽しい思い出を作っておきたくて。こんなに綺麗なビーチ、きっと魔界にはありませんしね？」"

[[dialogue]]
speaker = "ベアトリス"
# 「それに、こういうのちょっぴり憧れてたんです……」
line = "「それに、こういうのちょっぴり憧れてたんです……」"

[[dialogue]]
speaker = "ベアトリス"
# 「真夏のビーチの波打ち際で、大切に想っている人と……その、追いかけっこするの……」
line = "「真夏のビーチの波打ち際で、大切に想っている人と……その、追いかけっこするの……」"

[[dialogue]]
speaker = "ベアトリス"
# 「あっ、大切に想ってるって言っても、あくまで共に戦う仲間としてですけどねっ？」
line = "「あっ、大切に想ってるって言っても、あくまで共に戦う仲間としてですけどねっ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「波打ち際で追いかけっこっていうのも、人間界のドラマで見て、なんかいいなぁって思っただけですしっ」
line = "「波打ち際で追いかけっこっていうのも、人間界のドラマで見て、なんかいいなぁって思っただけですしっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「深い意味はないんですっ。本当にその、他意は何もっ」
line = "「深い意味はないんですっ。本当にその、他意は何もっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「や、やっぱり私……少しはしゃぎすぎていたのかもしれません」
line = "「や、やっぱり私……少しはしゃぎすぎていたのかもしれません」"

[[dialogue]]
speaker = "unk"
# それでいいんじゃないかな
line = "それでいいんじゃないかな"

[[dialogue]]
speaker = "ベアトリス"
# 「え？　どういうことですか？」
line = "「え？　どういうことですか？」"

[[dialogue]]
speaker = "unk"
# 思い出が何かを守る気持ちになるから
line = "思い出が何かを守る気持ちになるから"

[[dialogue]]
speaker = "ベアトリス"
# 「私の作った思い出が……」
line = "「私の作った思い出が……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ふふ、そうですね。きっとそうです。うんと楽しい思い出を作って、強くなります！」
line = "「ふふ、そうですね。きっとそうです。うんと楽しい思い出を作って、強くなります！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとうございます、会長さん」
line = "「ありがとうございます、会長さん」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、心の底から思いっきり、常夏のリゾートを、爽やかで開放的なビーチを、楽しんじゃいますね！」
line = "「私、心の底から思いっきり、常夏のリゾートを、爽やかで開放的なビーチを、楽しんじゃいますね！」"

[[dialogue]]
speaker = "unk"
# ああ、それでいいと思うよ
line = "ああ、それでいいと思うよ"

[[dialogue]]
speaker = "ベアトリス"
# 「えへへ。じゃあ質問なんですけど」
line = "「えへへ。じゃあ質問なんですけど」"

[[dialogue]]
speaker = "ベアトリス"
# 「私の水着姿……どう思いますか？　ふふ、似合ってます？」
line = "「私の水着姿……どう思いますか？　ふふ、似合ってます？」"

[[dialogue]]
speaker = "ベアトリス"
# 「あはは、そんなに驚かないでいいじゃないですか。さっきから、ずーっと見つめていますよね？」
line = "「あはは、そんなに驚かないでいいじゃないですか。さっきから、ずーっと見つめていますよね？」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、水着を着るのも初めてなんです。種族柄、あまり肌を露出するような衣装って着ませんしね」
line = "「私、水着を着るのも初めてなんです。種族柄、あまり肌を露出するような衣装って着ませんしね」"

[[dialogue]]
speaker = "ベアトリス"
# 「ねね、どう思いますか？　黒のビキニって大胆すぎます？　個人的には気に入ってるんですけど」
line = "「ねね、どう思いますか？　黒のビキニって大胆すぎます？　個人的には気に入ってるんですけど」"

[[dialogue]]
speaker = "ベアトリス"
# 「ほーら、上から下までよーく見て教えてください<emoji=heart04>」
line = "「ほーら、上から下までよーく見て教えてください<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
# 「アポロちゃんは動きやすそうでいいなって言ってくれたんですよ？　梨緒ちゃんも似合ってるって」
line = "「アポロちゃんは動きやすそうでいいなって言ってくれたんですよ？　梨緒ちゃんも似合ってるって」"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃんは、何故か意味深な顔で笑ってましたけど」
line = "「ナターシャちゃんは、何故か意味深な顔で笑ってましたけど」"

[[dialogue]]
speaker = "ベアトリス"
# 「ね、どう思います？　ふふ、急に顔を逸らさないでくださいよ♪　さっきまであんなに見てたじゃないですか♪」
line = "「ね、どう思います？　ふふ、急に顔を逸らさないでくださいよ♪　さっきまであんなに見てたじゃないですか♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「目を泳がせてないで、ちゃんと見てください♪　見てくれないなら、無理やりにでもこうして見せちゃいますよ？」
line = "「目を泳がせてないで、ちゃんと見てください♪　見てくれないなら、無理やりにでもこうして見せちゃいますよ？」"

[[dialogue]]
speaker = "unk"
# ベアトって意外と大胆だよな……
line = "ベアトって意外と大胆だよな……"

[[dialogue]]
speaker = "ベアトリス"
# 「こんな衣装を着られるのも今のうちだけですから。どんな風に感じてもらえるのか聞いておかないと損なので」
line = "「こんな衣装を着られるのも今のうちだけですから。どんな風に感じてもらえるのか聞いておかないと損なので」"

[[dialogue]]
speaker = "ベアトリス"
# 「それと、話も逸らさないでくださいね？　話題を変えようとしても無駄ですよ？　私、会長さんの感想が聞きたいんです」
line = "「それと、話も逸らさないでくださいね？　話題を変えようとしても無駄ですよ？　私、会長さんの感想が聞きたいんです」"

[[dialogue]]
speaker = "ベアトリス"
# 「普段の私より……魅力的に見えてますか？　ドキドキしちゃったりしてくれてます？」
line = "「普段の私より……魅力的に見えてますか？　ドキドキしちゃったりしてくれてます？」"

[[dialogue]]
speaker = "ベアトリス"
# 「だとしたら……えへへ。恥ずかしすぎて、灰になっちゃうかもしれません……」
line = "「だとしたら……えへへ。恥ずかしすぎて、灰になっちゃうかもしれません……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ただでさえ今日、会長さんをビーチに誘っただけでも灰になっちゃいそうなほど照れていたのに……」
line = "「ただでさえ今日、会長さんをビーチに誘っただけでも灰になっちゃいそうなほど照れていたのに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも、聞きたいです。あなたが私の水着姿をどんな風に思ってくれているのか」
line = "「でも、聞きたいです。あなたが私の水着姿をどんな風に思ってくれているのか」"

[[dialogue]]
speaker = "ベアトリス"
# 「教えてくれますか？　私の大切な大切な思い出のひとつにするために」
line = "「教えてくれますか？　私の大切な大切な思い出のひとつにするために」"

[[dialogue]]
speaker = "ベアトリス"
# 「ふふふ……楽しい思い出を私に作ってくださいね」
line = "「ふふふ……楽しい思い出を私に作ってくださいね」"
