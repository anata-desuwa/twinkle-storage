[[dialogue]]
speaker = "unk"
# 第１２話,御前試合開始,B
line = "第１２話,御前試合開始,B"

[[dialogue]]
speaker = "unk"
# そして人生二度目の御前試合が当日を迎えた。
line = "そして人生二度目の御前試合が当日を迎えた。"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 二千数百名の生徒が見守る中、アリーナの中央で梨緒と睨み合う。
line = "二千数百名の生徒が見守る中、アリーナの中央で梨緒と睨み合う。"

[[dialogue]]
speaker = "unk"
# 二度目とはいえ緊張はある。
line = "二度目とはいえ緊張はある。"

[[dialogue]]
speaker = "unk"
# いや、前はヴィーナスにばかり意識が向いていたから、むしろ今日の方が緊張しているかもしれない。
line = "いや、前はヴィーナスにばかり意識が向いていたから、むしろ今日の方が緊張しているかもしれない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が御前試合を観戦するなんて不思議な気分ね。クロト～！　負けちゃダメよ～！」
line = "「私が御前試合を観戦するなんて不思議な気分ね。クロト～！　負けちゃダメよ～！」"

[[dialogue]]
speaker = "マトイ"
# 「ドキドキ……」
line = "「ドキドキ……」"

[[dialogue]]
speaker = "アナ"
# 「うぉっちたいむ」
line = "「うぉっちたいむ」"

[[dialogue]]
speaker = "サーシャ"
# 「がんばってね～」
line = "「がんばってね～」"

[[dialogue]]
speaker = "unk"
# 喧噪に混じってヴィーナスの声が聞こえた。星徒会のみんなも一緒だ。
line = "喧噪に混じってヴィーナスの声が聞こえた。星徒会のみんなも一緒だ。"

[[dialogue]]
speaker = "梨緒"
# 「緋宮クロト。御前試合を受けてくれたことには感謝しよう」
line = "「緋宮クロト。御前試合を受けてくれたことには感謝しよう」"

[[dialogue]]
speaker = "クロト"
# 「礼はいらないよ。俺には俺で受ける理由があったからな」
line = "「礼はいらないよ。俺には俺で受ける理由があったからな」"

[[dialogue]]
speaker = "梨緒"
# 「そうか、なら心置きなく戦わせてもらおう。元から手加減などするつもりはないがな」
line = "「そうか、なら心置きなく戦わせてもらおう。元から手加減などするつもりはないがな」"

[[dialogue]]
speaker = "梨緒"
# 「それともうひとつ。以前、不躾な態度をとったことを謝罪させてほしい」
line = "「それともうひとつ。以前、不躾な態度をとったことを謝罪させてほしい」"

[[dialogue]]
speaker = "梨緒"
# 「少なくとも、今の君は世界の破滅など望む人間ではないようだ。すまなかった」
line = "「少なくとも、今の君は世界の破滅など望む人間ではないようだ。すまなかった」"

[[dialogue]]
speaker = "梨緒"
# 「しかし……だからこそ私は負けるわけにはいかない。やはり君は戦いから離れるべきだ」
line = "「しかし……だからこそ私は負けるわけにはいかない。やはり君は戦いから離れるべきだ」"

[[dialogue]]
speaker = "unk"
# 俺への認識が変わろうとも、会長の座を奪おうという意志は変わらない。
line = "俺への認識が変わろうとも、会長の座を奪おうという意志は変わらない。"

[[dialogue]]
speaker = "unk"
# 梨緒の瞳に宿る真っ直ぐな決意に、俺も受けて立てねばと闘志が奮い立つ。
line = "梨緒の瞳に宿る真っ直ぐな決意に、俺も受けて立てねばと闘志が奮い立つ。"

[[dialogue]]
speaker = "クロト"
# 「俺だって負ける気はない。星徒会長は譲らないぞ」
line = "「俺だって負ける気はない。星徒会長は譲らないぞ」"

[[dialogue]]
speaker = "梨緒"
# 「ならば力ずくで引きずり下ろすまでだ。そのための御前試合だからな」
line = "「ならば力ずくで引きずり下ろすまでだ。そのための御前試合だからな」"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ。戦いの前から火花を散らしているね。転入生同士、気が合ったのならば喜ばしい」
line = "「ふむ。戦いの前から火花を散らしているね。転入生同士、気が合ったのならば喜ばしい」"

[[dialogue]]
speaker = "ラティエ"
# 「立ち合いは、暫定的に総合学園長を務める私が行う。では両人、前へ。死力を尽くしてくれたまえ」
line = "「立ち合いは、暫定的に総合学園長を務める私が行う。では両人、前へ。死力を尽くしてくれたまえ」"

[[dialogue]]
speaker = "クロト＆梨緒"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "梨緒"
# 「では行くぞ！　魔王は私が倒す！」
line = "「では行くぞ！　魔王は私が倒す！」"

[[dialogue]]
speaker = "クロト"
# 「いいや、俺が勝つ！」
line = "「いいや、俺が勝つ！」"

[[dialogue]]
speaker = "unk"
# 雷を帯びた梨緒の矢と、波動をまとった拳が激突し、爆風が弾ける。
line = "雷を帯びた梨緒の矢と、波動をまとった拳が激突し、爆風が弾ける。"

[[dialogue]]
speaker = "unk"
# 次の瞬間には、稲妻と化した梨緒が背後をとっていた。
line = "次の瞬間には、稲妻と化した梨緒が背後をとっていた。"

[[dialogue]]
speaker = "梨緒"
# 「そこだ！」
line = "「そこだ！」"

[[dialogue]]
speaker = "クロト"
# 「させない！」
line = "「させない！」"

[[dialogue]]
speaker = "unk"
# 梨緒が矢を放つ刹那、拳から衝撃波を撃ち出す。
line = "梨緒が矢を放つ刹那、拳から衝撃波を撃ち出す。"

[[dialogue]]
speaker = "unk"
# 拳撃が矢を押し返すも、梨緒は素早く距離を取って危なげなく躱した。
line = "拳撃が矢を押し返すも、梨緒は素早く距離を取って危なげなく躱した。"

[[dialogue]]
speaker = "梨緒"
# 「星徒会長の肩書は飾りではないようだな」
line = "「星徒会長の肩書は飾りではないようだな」"

[[dialogue]]
speaker = "クロト"
# 「今までいろいろあったからな。鍛えられたよ」
line = "「今までいろいろあったからな。鍛えられたよ」"

[[dialogue]]
speaker = "unk"
# しかしここまでは小手調べ。お互い本気はまだまだだ。
line = "しかしここまでは小手調べ。お互い本気はまだまだだ。"

[[dialogue]]
speaker = "クロト"
# （みんなとの特訓のおかげで余裕はある）
line = "（みんなとの特訓のおかげで余裕はある）"

[[dialogue]]
speaker = "unk"
# 俺の中で暴れようとする力を抑えながら、大地の──守護星の鼓動に耳を傾ける。
line = "俺の中で暴れようとする力を抑えながら、大地の──守護星の鼓動に耳を傾ける。"

[[dialogue]]
speaker = "unk"
# 魔王としてではなく、ただの星騎士として、きっとまだ成長の余地はあるはずだ。
line = "魔王としてではなく、ただの星騎士として、きっとまだ成長の余地はあるはずだ。"

[[dialogue]]
speaker = "unk"
# まだ<ruby=リクリエ>厄災</ruby>が終わらないというならば──この試練、乗り越えて見せる！
line = "まだ<ruby>厄災<rt>リクリエ</rt></ruby>が終わらないというならば──この試練、乗り越えて見せる！"
