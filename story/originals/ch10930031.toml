[[dialogue]]
speaker = "unk"
# 第１話,よく似合う女,P
line = "第１話,よく似合う女,P"

[[dialogue]]
speaker = "ヘレナ"
# 「……来たか」
line = "「……来たか」"

[[dialogue]]
speaker = "ミルフィー"
# 「し、失礼しますっ。新星学園２年、ミルフィー・インセントです」
line = "「し、失礼しますっ。新星学園２年、ミルフィー・インセントです」"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、そのように怯えるでない。取って食おうというわけではないのだからな」
line = "「なに、そのように怯えるでない。取って食おうというわけではないのだからな」"

[[dialogue]]
speaker = "ミルフィー"
# 「は、はい……でも、私なんかを直々に呼び出すなんて、一体どんなご用件が？」
line = "「は、はい……でも、私なんかを直々に呼び出すなんて、一体どんなご用件が？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ミルフィー・インセント。お前のことはメイドの美鶴から聞いている」
line = "「ミルフィー・インセント。お前のことはメイドの美鶴から聞いている」"

[[dialogue]]
speaker = "ヘレナ"
# 「チアの衣装が似合う、めちゃくちゃドエロい女がいるとな！」
line = "「チアの衣装が似合う、めちゃくちゃドエロい女がいるとな！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふえぇえ～～～～～っ！！？　み、美鶴ちゃん！？　いったいどうしてそんなっ……！？」
line = "「ふえぇえ～～～～～っ！！？　み、美鶴ちゃん！？　いったいどうしてそんなっ……！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「いや、実際は違う表現だったがな。美鶴からの報告を私が意訳した結果だ」
line = "「いや、実際は違う表現だったがな。美鶴からの報告を私が意訳した結果だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「しかし、あのチア戦闘服は大層好評を博したようだな。そこでエッチな服がよく似合うお前に、新たな人工戦闘服を用意した。受け取るがいい」
line = "「しかし、あのチア戦闘服は大層好評を博したようだな。そこでエッチな服がよく似合うお前に、新たな人工戦闘服を用意した。受け取るがいい」"

[[dialogue]]
speaker = "ミルフィー"
# 「う、受け取り拒否は……」
line = "「う、受け取り拒否は……」"

[[dialogue]]
speaker = "ヘレナ"
# 「拒否が許されると思うか？」
line = "「拒否が許されると思うか？」"

[[dialogue]]
speaker = "ミルフィー"
# 「でもでもっ、エッチな服なんですよね……？」
line = "「でもでもっ、エッチな服なんですよね……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「無論だ。エッチなミルフィーのいやらし度が更にアップする出来映えだぞ」
line = "「無論だ。エッチなミルフィーのいやらし度が更にアップする出来映えだぞ」"

[[dialogue]]
speaker = "ミルフィー"
# 「や、やっぱり受け取り拒否でお願いします～～っ！」
line = "「や、やっぱり受け取り拒否でお願いします～～っ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほれ。つべこべ言わずに早く変身して見せよ」
line = "「ほれ。つべこべ言わずに早く変身して見せよ」"

[[dialogue]]
speaker = "ミルフィー"
# 「うううう～～～…………へ、変身っ」
line = "「うううう～～～…………へ、変身っ」"

[[dialogue]]
speaker = "ミルフィー"
# 「こ、これは……エッチじゃない？　ううん、エッチかどうかは微妙なところだけど……」
line = "「こ、これは……エッチじゃない？　ううん、エッチかどうかは微妙なところだけど……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ！　実にエッチだな！」
line = "「ふむ！　実にエッチだな！」"

[[dialogue]]
speaker = "ミルフィー"
# 「やっぱりエッチなんだぁ！」
line = "「やっぱりエッチなんだぁ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「諦めろ。人工戦闘服は多かれ少なかれそういうものだ」
line = "「諦めろ。人工戦闘服は多かれ少なかれそういうものだ」"

[[dialogue]]
speaker = "ミルフィー"
# 「ひ、開き直り強要された！？」
line = "「ひ、開き直り強要された！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「とにかく事態は急を要している。その人工戦闘服……チーパオフォームに備わっている能力が必要な状況なのだ」
line = "「とにかく事態は急を要している。その人工戦闘服……チーパオフォームに備わっている能力が必要な状況なのだ」"

[[dialogue]]
speaker = "ミルフィー"
# 「え？　それってどういう……」
line = "「え？　それってどういう……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ゾンビのような、幽霊のような……そのような存在が学園に出没している」
line = "「ゾンビのような、幽霊のような……そのような存在が学園に出没している」"

[[dialogue]]
speaker = "ヘレナ"
# 「このフォームは幽体や霊体に対して非常に有効だ。まさに今起きている事態に対応出来るのは、ミルフィー・インセント、お前だけなのだ！」
line = "「このフォームは幽体や霊体に対して非常に有効だ。まさに今起きている事態に対応出来るのは、ミルフィー・インセント、お前だけなのだ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「そういうことなら……頑張ってみます。エッチなのは恥ずかしいけど、我慢すればなんとか……」
line = "「そういうことなら……頑張ってみます。エッチなのは恥ずかしいけど、我慢すればなんとか……」"

[[dialogue]]
speaker = "ミルフィー"
# 「頑張れミルフィー、いける……いけるよね……いける、かなぁ？　うう、やっぱり不安かも……」
line = "「頑張れミルフィー、いける……いけるよね……いける、かなぁ？　うう、やっぱり不安かも……」"

[[dialogue]]
speaker = "ヘレナ"
# 「急な話で不安になるのも当然だ。もちろんそのままお前を戦場に放り出すつもりはない」
line = "「急な話で不安になるのも当然だ。もちろんそのままお前を戦場に放り出すつもりはない」"

[[dialogue]]
speaker = "ヘレナ"
# 「待たせたな、入れ」
line = "「待たせたな、入れ」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……トリシャ＝アポテレスマティカ、です……」
line = "「フフフ……トリシャ＝アポテレスマティカ、です……」"

[[dialogue]]
speaker = "トリシャ"
# 「……変身」
line = "「……変身」"

[[dialogue]]
speaker = "トリシャ"
# 「これが私の……新たな装い……です……」
line = "「これが私の……新たな装い……です……」"

[[dialogue]]
speaker = "ミルフィー"
# 「これも私と同じチーパオフォーム？　私のとは少し違うみたいだけど……」
line = "「これも私と同じチーパオフォーム？　私のとは少し違うみたいだけど……」"

[[dialogue]]
speaker = "ヘレナ"
# 「トリシャはミルフィーのオトモポジションだ。戦闘服の機能もオトモに適したものになっている」
line = "「トリシャはミルフィーのオトモポジションだ。戦闘服の機能もオトモに適したものになっている」"

[[dialogue]]
speaker = "トリシャ"
# 「ミルフィーさん……この私を……オトモにしてくれますか……？」
line = "「ミルフィーさん……この私を……オトモにしてくれますか……？」"

[[dialogue]]
speaker = "ミルフィー"
# 「え？　いや、別にオトモじゃなくても……よくない？」
line = "「え？　いや、別にオトモじゃなくても……よくない？」"

[[dialogue]]
speaker = "トリシャ"
# 「ううう……やっぱり私なんかがオトモじゃ嫌なんですね……そうですよね、陰気ですし、胡散臭いですし……」
line = "「ううう……やっぱり私なんかがオトモじゃ嫌なんですね……そうですよね、陰気ですし、胡散臭いですし……」"

[[dialogue]]
speaker = "ミルフィー"
# 「いや、そういうことじゃなくてね！　ていうかトリシャさん、そんなにオトモになりたいの？」
line = "「いや、そういうことじゃなくてね！　ていうかトリシャさん、そんなにオトモになりたいの？」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……オトモ……響きがとてもいいじゃありませんか……」
line = "「フフフ……オトモ……響きがとてもいいじゃありませんか……」"

[[dialogue]]
speaker = "トリシャ"
# （オトモ……オトモ……言葉の響きがオトモダチに似ていて……とても、いい……フフフ……）
line = "（オトモ……オトモ……言葉の響きがオトモダチに似ていて……とても、いい……フフフ……）"

[[dialogue]]
speaker = "ヘレナ"
# 「実はこのフォームには元ネタの映画があってな。ヒロインはオトモを連れているのだ」
line = "「実はこのフォームには元ネタの映画があってな。ヒロインはオトモを連れているのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「トリシャの戦闘服は、そのオトモの衣装を参考にして作られている。ちなみにミルフィーの戦闘服はヒロインのデザインを参考にした」
line = "「トリシャの戦闘服は、そのオトモの衣装を参考にして作られている。ちなみにミルフィーの戦闘服はヒロインのデザインを参考にした」"

[[dialogue]]
speaker = "トリシャ"
# 「ヒロインとオトモはとても仲良し……協力して冥界より現れし怪異を相手に戦います……そういう設定です……」
line = "「ヒロインとオトモはとても仲良し……協力して冥界より現れし怪異を相手に戦います……そういう設定です……」"

[[dialogue]]
speaker = "ミルフィー"
# 「せ、設定……うーん、私はその映画を知らないんですけど……そういう事なら仕方ないのかな……」
line = "「せ、設定……うーん、私はその映画を知らないんですけど……そういう事なら仕方ないのかな……」"

[[dialogue]]
speaker = "ミルフィー"
# 「わかりました、それではトリシャさんは私のオトモということで」
line = "「わかりました、それではトリシャさんは私のオトモということで」"

[[dialogue]]
speaker = "トリシャ"
# 「やった……ミルフィーさんに……オトモにしてもらえた……嬉しい……」
line = "「やった……ミルフィーさんに……オトモにしてもらえた……嬉しい……」"

[[dialogue]]
speaker = "ミルフィー"
# 「チーパオフォームをもらった者同士、頑張ろうね」
line = "「チーパオフォームをもらった者同士、頑張ろうね」"

[[dialogue]]
speaker = "トリシャ"
# 「はい……よろしくお願いします、ミルフィーさん……」
line = "「はい……よろしくお願いします、ミルフィーさん……」"

[[dialogue]]
speaker = "ミルフィー"
# （トリシャさんは全然エッチだって感じてないみたい。もしかして私が気にしすぎ？）
line = "（トリシャさんは全然エッチだって感じてないみたい。もしかして私が気にしすぎ？）"

[[dialogue]]
speaker = "ミルフィー"
# （ううん、気付いてないだけかもしれないし、ここは私が……）
line = "（ううん、気付いてないだけかもしれないし、ここは私が……）"

[[dialogue]]
speaker = "ミルフィー"
# 「ねえ、トリシャさん、ちょっと確認したいから、じっとしてもらっていい？」
line = "「ねえ、トリシャさん、ちょっと確認したいから、じっとしてもらっていい？」"

[[dialogue]]
speaker = "トリシャ"
# 「はい……フフフ……オトモとして、初めての命令……」
line = "「はい……フフフ……オトモとして、初めての命令……」"

[[dialogue]]
speaker = "ミルフィー"
# 「命令じゃないからね。お願いだから」
line = "「命令じゃないからね。お願いだから」"

[[dialogue]]
speaker = "トリシャ"
# 「主であるミルフィーさんの言葉は理解しています……お願いという名の絶対厳守の言霊……」
line = "「主であるミルフィーさんの言葉は理解しています……お願いという名の絶対厳守の言霊……」"

[[dialogue]]
speaker = "ミルフィー"
# 「いやほんと違うからね」
line = "「いやほんと違うからね」"

[[dialogue]]
speaker = "ミルフィー"
# （調子狂うなぁ……でも、尚更私がしっかり確認してあげなきゃ……）
line = "（調子狂うなぁ……でも、尚更私がしっかり確認してあげなきゃ……）"

[[dialogue]]
speaker = "ミルフィー"
# （どれどれ……うん、トリシャさんもスタイル抜群だし……エッチ、だよね……これって一般的にはエッチじゃないのかなぁ？）
line = "（どれどれ……うん、トリシャさんもスタイル抜群だし……エッチ、だよね……これって一般的にはエッチじゃないのかなぁ？）"

[[dialogue]]
speaker = "ヘレナ"
# 「トリシャもエッチだな！　実にドスケベで結構結構♪」
line = "「トリシャもエッチだな！　実にドスケベで結構結構♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「へ、ヘレナさん！？　そんなド直球な……！？　本人を前にして失礼じゃないですか！」
line = "「へ、ヘレナさん！？　そんなド直球な……！？　本人を前にして失礼じゃないですか！」"

[[dialogue]]
speaker = "ヘレナ"
# 「何を言う、女子にとってエッチは褒め言葉だぞ」
line = "「何を言う、女子にとってエッチは褒め言葉だぞ」"

[[dialogue]]
speaker = "ミルフィー"
# 「そう思うのはヘレナさんだけですっ」
line = "「そう思うのはヘレナさんだけですっ」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……ミルフィーさん、活力に満ち溢れていますね……素晴らしいことです……」
line = "「フフ……ミルフィーさん、活力に満ち溢れていますね……素晴らしいことです……」"

[[dialogue]]
speaker = "ヘレナ"
# 「結構。主従の絆も確認出来たようだし、現場に向かうぞ」
line = "「結構。主従の絆も確認出来たようだし、現場に向かうぞ」"

[[dialogue]]
speaker = "ミルフィー"
# 「は、はい……トリシャさん、一緒に頑張ろうね」
line = "「は、はい……トリシャさん、一緒に頑張ろうね」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……オトモの働き、任せてください……」
line = "「フフフ……オトモの働き、任せてください……」"

[[dialogue]]
speaker = "unk"
# こうしてミルフィーはオトモのトリシャさんと共に新星学園に急行するのだった。
line = "こうしてミルフィーはオトモのトリシャさんと共に新星学園に急行するのだった。"
