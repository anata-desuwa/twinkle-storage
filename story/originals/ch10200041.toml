[[dialogue]]
speaker = "unk"
# 第１話,クリスマスのビーチ撮影会,P
line = "第１話,クリスマスのビーチ撮影会,P"

[[dialogue]]
speaker = "unk"
# クリスマスも近づいた、とある日の放課後。俺は恋人のルルカとリゾート結界のプライベートビーチを訪れていた。
line = "クリスマスも近づいた、とある日の放課後。俺は恋人のルルカとリゾート結界のプライベートビーチを訪れていた。"

[[dialogue]]
speaker = "ルルカ"
# 「いやー、夏だねぇ、お兄ちゃん♪」
line = "「いやー、夏だねぇ、お兄ちゃん♪」"

[[dialogue]]
speaker = "unk"
# 今は冬だぞ？
line = "今は冬だぞ？"

[[dialogue]]
speaker = "ルルカ"
# 「わかってる、あたしもわかってるんだよ～。でも見て、この青空！　輝く海！　白い砂浜！」
line = "「わかってる、あたしもわかってるんだよ～。でも見て、この青空！　輝く海！　白い砂浜！」"

[[dialogue]]
speaker = "ルルカ"
# 「リップルさん様々だよね。冬なのにこうして、真夏のリゾートを満喫できるんだもん♪」
line = "「リップルさん様々だよね。冬なのにこうして、真夏のリゾートを満喫できるんだもん♪」"

[[dialogue]]
speaker = "ルルカ"
# 「って……お兄ちゃん、ジト目になってるね！　そうだよね、ツッコミたくて仕方がないって感じでしょ？」
line = "「って……お兄ちゃん、ジト目になってるね！　そうだよね、ツッコミたくて仕方がないって感じでしょ？」"

[[dialogue]]
speaker = "ルルカ"
# 「真夏のリゾートなのに、クリスマスフォームは場違いでは！？　って！」
line = "「真夏のリゾートなのに、クリスマスフォームは場違いでは！？　って！」"

[[dialogue]]
speaker = "unk"
# すごく可愛いとは思うけどね
line = "すごく可愛いとは思うけどね"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ♪　ありがと～<emoji=heart04>」
line = "「えへへ♪　ありがと～<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「まあでも、お兄ちゃんならそう言ってくれると思ってたよ♪　お兄ちゃんは彼氏さんなんだし、褒める一択しかないよね～」
line = "「まあでも、お兄ちゃんならそう言ってくれると思ってたよ♪　お兄ちゃんは彼氏さんなんだし、褒める一択しかないよね～」"

[[dialogue]]
speaker = "ルルカ"
# 「もちろんあたし自身も、このクリスマスフォームはめちゃくちゃ可愛いと思ってるし！」
line = "「もちろんあたし自身も、このクリスマスフォームはめちゃくちゃ可愛いと思ってるし！」"

[[dialogue]]
speaker = "ルルカ"
# 「それに、冬でも水着フォームが温かいように、このクリスマスフォームは夏でも涼しいんだよ♪」
line = "「それに、冬でも水着フォームが温かいように、このクリスマスフォームは夏でも涼しいんだよ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「試しにハグしてみる？　……んっ♪　えへへ<emoji=heart04>　お兄ちゃんと恋人ハグ～♪　ぎゅ～っ♪」
line = "「試しにハグしてみる？　……んっ♪　えへへ<emoji=heart04>　お兄ちゃんと恋人ハグ～♪　ぎゅ～っ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「どう？　涼しい？」
line = "「どう？　涼しい？」"

[[dialogue]]
speaker = "ルルカ"
# 「――よし♪　恋人同士のスキンシップも済ませたことだし、本題に入るよ、お兄ちゃん！」
line = "「――よし♪　恋人同士のスキンシップも済ませたことだし、本題に入るよ、お兄ちゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「今回のあたしのクリスマスフォーム、お兄ちゃんが褒めてくれたとおり、あたしもすっごく気に入ってるの」
line = "「今回のあたしのクリスマスフォーム、お兄ちゃんが褒めてくれたとおり、あたしもすっごく気に入ってるの」"

[[dialogue]]
speaker = "ルルカ"
# 「だからねっ、前の水着フォームとは逆で、今回はクリスマスフォームのデザインから、ルカルカの衣装を作ってみようかなって♪」
line = "「だからねっ、前の水着フォームとは逆で、今回はクリスマスフォームのデザインから、ルカルカの衣装を作ってみようかなって♪」"

[[dialogue]]
speaker = "unk"
# なるほど！　いいアイデアだな
line = "なるほど！　いいアイデアだな"

[[dialogue]]
speaker = "unk"
# そういえば、水着フォームとは異なり、今回のクリスマスフォームは人工戦闘服。衣装もヘレナちゃんがデザインしたものだったことを思い出した。
line = "そういえば、水着フォームとは異なり、今回のクリスマスフォームは人工戦闘服。衣装もヘレナちゃんがデザインしたものだったことを思い出した。"

[[dialogue]]
speaker = "ルルカ"
# 「このクリスマスフォームをもらってすぐ、お世話になってるデザイナーさんに連絡したの。これでルカルカの新衣装を作って下さいって！」
line = "「このクリスマスフォームをもらってすぐ、お世話になってるデザイナーさんに連絡したの。これでルカルカの新衣装を作って下さいって！」"

[[dialogue]]
speaker = "ルルカ"
# 「そしたらデザイナーさん、めちゃくちゃ乗り気で、今年のクリスマス当日までに絶対間に合わせるって言ってくれて――」
line = "「そしたらデザイナーさん、めちゃくちゃ乗り気で、今年のクリスマス当日までに絶対間に合わせるって言ってくれて――」"

[[dialogue]]
speaker = "ルルカ"
# 「それで、お兄ちゃんとここに来たってわけ！　色んな角度から撮ったデータがないと、３Ｄに起こせないからね♪」
line = "「それで、お兄ちゃんとここに来たってわけ！　色んな角度から撮ったデータがないと、３Ｄに起こせないからね♪」"

[[dialogue]]
speaker = "ルルカ"
# 「というわけで、今から<ruby=うみのべ>海野辺</ruby>ルルカのクリスマス撮影会を開催しようと思います！」
line = "「というわけで、今から<ruby>海野辺<rt>うみのべ</rt></ruby>ルルカのクリスマス撮影会を開催しようと思います！」"

[[dialogue]]
speaker = "unk"
# よし、写真撮影なら任せとけ！
line = "よし、写真撮影なら任せとけ！"

[[dialogue]]
speaker = "unk"
# 以前、カメラマンのアシスタントのバイトをしていたことがある俺は、グッと親指を立ててみせる。
line = "以前、カメラマンのアシスタントのバイトをしていたことがある俺は、グッと親指を立ててみせる。"

[[dialogue]]
speaker = "ルルカ"
# 「うん♪　今日もお願いするねっ。手伝ってくれた分の報酬は、もちろんスペシャルなものを用意してるよ～♪」
line = "「うん♪　今日もお願いするねっ。手伝ってくれた分の報酬は、もちろんスペシャルなものを用意してるよ～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「――スペシャルな報酬が気になる？　だったら、ちょっとだけ前払いしてあげる♪」
line = "「――スペシャルな報酬が気になる？　だったら、ちょっとだけ前払いしてあげる♪」"

[[dialogue]]
speaker = "ルルカ"
# 「こっち来て、お兄ちゃん♪」
line = "「こっち来て、お兄ちゃん♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ん～っ<emoji=heart04>　……ちゅっ<emoji=heart04>」
line = "「ん～っ<emoji=heart04>　……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ルルカの唇が頬に触れる。
line = "ルルカの唇が頬に触れる。"

[[dialogue]]
speaker = "ルルカ"
# 「――えへへ～<emoji=heart04>　お兄ちゃんへの報酬は、可愛い妹カノジョのキスでした～<emoji=heart04>」
line = "「――えへへ～<emoji=heart04>　お兄ちゃんへの報酬は、可愛い妹カノジョのキスでした～<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「もちろん、キスだけじゃないよ？　せっかくリゾート結界に来たんだもん、恋人らしいことも、いっぱいしようね<emoji=heart04>」
line = "「もちろん、キスだけじゃないよ？　せっかくリゾート結界に来たんだもん、恋人らしいことも、いっぱいしようね<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、でも、まだダメだよ～！　イチャイチャするのは撮影が終わってからね♪」
line = "「あっ、でも、まだダメだよ～！　イチャイチャするのは撮影が終わってからね♪」"

[[dialogue]]
speaker = "ルルカ"
# 「油断すると、いつまでもくっついていたくなっちゃうから、やることを先に終わらせなきゃ！」
line = "「油断すると、いつまでもくっついていたくなっちゃうから、やることを先に終わらせなきゃ！」"

[[dialogue]]
speaker = "ルルカ"
# 「というわけで、撮影頑張ろうっ♪」
line = "「というわけで、撮影頑張ろうっ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、こんな感じでどーお？」
line = "「お兄ちゃん、こんな感じでどーお？」"

[[dialogue]]
speaker = "unk"
# さすが俺の彼女、世界一可愛い！
line = "さすが俺の彼女、世界一可愛い！"

[[dialogue]]
speaker = "unk"
# 俺は褒めながら、ＤＩＳＣのカメラで撮影していく。
line = "俺は褒めながら、ＤＩＳＣのカメラで撮影していく。"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、もう<emoji=heart04>　お兄ちゃんたら、変なとこばっかり狙わないのっ！　あくまで資料用の写真なんだからね<emoji=heart04>」
line = "「あっ、もう<emoji=heart04>　お兄ちゃんたら、変なとこばっかり狙わないのっ！　あくまで資料用の写真なんだからね<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「正面ばっかりじゃなくて、横や後ろからも撮ってね。あと、小物もポイントだから、そこはズームを使ってしっかりとお願い」
line = "「正面ばっかりじゃなくて、横や後ろからも撮ってね。あと、小物もポイントだから、そこはズームを使ってしっかりとお願い」"

[[dialogue]]
speaker = "unk"
# オッケー！　バッチリ撮れてる
line = "オッケー！　バッチリ撮れてる"

[[dialogue]]
speaker = "unk"
# それからひと通り撮影が終わって――
line = "それからひと通り撮影が終わって――"

[[dialogue]]
speaker = "ルルカ"
# 「じゃあ、どんなのが撮れたのか、早速チェックしてみよっか。ＤＩＳＣ借りるね。どれどれ～？」
line = "「じゃあ、どんなのが撮れたのか、早速チェックしてみよっか。ＤＩＳＣ借りるね。どれどれ～？」"

[[dialogue]]
speaker = "ルルカ"
# 「――うん、すごく可愛く撮れてる♪　さっすがお兄ちゃん、妹を被写体にしたら、プロ顔負けのカメラマンになっちゃうね♪」
line = "「――うん、すごく可愛く撮れてる♪　さっすがお兄ちゃん、妹を被写体にしたら、プロ顔負けのカメラマンになっちゃうね♪」"

[[dialogue]]
speaker = "unk"
# スペシャルな報酬は貰えそうか？
line = "スペシャルな報酬は貰えそうか？"

[[dialogue]]
speaker = "ルルカ"
# 「ふふっ……キスしたくなっちゃった？　もう、しょうがないな～、お兄ちゃんは<emoji=heart04>」
line = "「ふふっ……キスしたくなっちゃった？　もう、しょうがないな～、お兄ちゃんは<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「でも、あたしのお願いを聞いて、手伝ってくれたから……感謝と愛を込めて――」
line = "「でも、あたしのお願いを聞いて、手伝ってくれたから……感謝と愛を込めて――」"

[[dialogue]]
speaker = "ルルカ"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 今度は唇同士が触れあうキス。
line = "今度は唇同士が触れあうキス。"

[[dialogue]]
speaker = "ルルカ"
# 「お疲れさま、お兄ちゃん。いつもありがとね<emoji=heart04>」
line = "「お疲れさま、お兄ちゃん。いつもありがとね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ルルカも撮影頑張ったな
line = "ルルカも撮影頑張ったな"

[[dialogue]]
speaker = "unk"
# そう言って頭を撫でると、彼女は嬉しそうに微笑んで……
line = "そう言って頭を撫でると、彼女は嬉しそうに微笑んで……"

[[dialogue]]
speaker = "ルルカ"
# 「あっ……えへへぇ<emoji=heart04>　あたしもご褒美、貰っちゃった♪」
line = "「あっ……えへへぇ<emoji=heart04>　あたしもご褒美、貰っちゃった♪」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん……大好き<emoji=heart04>」
line = "「お兄ちゃん……大好き<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ルルカもぎゅっと抱き着いてくる。
line = "ルルカもぎゅっと抱き着いてくる。"

[[dialogue]]
speaker = "unk"
# それから俺たちは、今度こそ恋人同士の時間をたっぷり満喫するのだった――
line = "それから俺たちは、今度こそ恋人同士の時間をたっぷり満喫するのだった――"
