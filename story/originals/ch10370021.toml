[[dialogue]]
speaker = "unk"
# 第１話,ふわふわラバーズ,P
line = "第１話,ふわふわラバーズ,P"

[[dialogue]]
speaker = "unk"
# サランと恋人として付き合い始めて、しばらく経ったある日のお昼休み。いつものようにサランと昼食をとる為、大聖堂カフェテリアに向かうと――
line = "サランと恋人として付き合い始めて、しばらく経ったある日のお昼休み。いつものようにサランと昼食をとる為、大聖堂カフェテリアに向かうと――"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃ～ん、こっちこっち～♪　席を取っておいたよ～」
line = "「会長ちゃ～ん、こっちこっち～♪　席を取っておいたよ～」"

[[dialogue]]
speaker = "unk"
# ありがとう。待たせちゃった？
line = "ありがとう。待たせちゃった？"

[[dialogue]]
speaker = "サラン"
# 「ううん、そんなに待ってないよ♪　それにサラン、会長ちゃんを待っている時間も、ふわふわなスパイスになるから、結構好きなんだ～♪」
line = "「ううん、そんなに待ってないよ♪　それにサラン、会長ちゃんを待っている時間も、ふわふわなスパイスになるから、結構好きなんだ～♪」"

[[dialogue]]
speaker = "サラン"
# 「――うん、ふわふわスパイス～♪　えっとね、会長ちゃんがどんな顔で現れるかな～って想像したり～、今日はどんなお話をしようかな～って考えたり～」
line = "「――うん、ふわふわスパイス～♪　えっとね、会長ちゃんがどんな顔で現れるかな～って想像したり～、今日はどんなお話をしようかな～って考えたり～」"

[[dialogue]]
speaker = "サラン"
# 「そうしてるとね～、実際に会長ちゃんと会った時に、サラン、何倍もふわふわな気持ちになるの～♪　えへへ♪」
line = "「そうしてるとね～、実際に会長ちゃんと会った時に、サラン、何倍もふわふわな気持ちになるの～♪　えへへ♪」"

[[dialogue]]
speaker = "unk"
# 今の話を聞いてたら、俺もふわふわになった
line = "今の話を聞いてたら、俺もふわふわになった"

[[dialogue]]
speaker = "サラン"
# 「本当？　それなら嬉しいな～♪」
line = "「本当？　それなら嬉しいな～♪」"

[[dialogue]]
speaker = "サラン"
# 「――あっ、えへへ♪　会長ちゃん、頭を撫でてくれるの？　サランもふわふわ～♪」
line = "「――あっ、えへへ♪　会長ちゃん、頭を撫でてくれるの？　サランもふわふわ～♪」"

[[dialogue]]
speaker = "サラン"
# 「じゃあ、そろそろ一緒にお昼ご飯選びに行こっか♪　サラン、今日は何食べようかな～？」
line = "「じゃあ、そろそろ一緒にお昼ご飯選びに行こっか♪　サラン、今日は何食べようかな～？」"

[[dialogue]]
speaker = "サラン"
# 「ん～<emoji=heart04>　日替わりの唐揚げ定食、美味しい～<emoji=heart04>　心がふわふわ～♪」
line = "「ん～<emoji=heart04>　日替わりの唐揚げ定食、美味しい～<emoji=heart04>　心がふわふわ～♪」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんも１個食べる～？　――うん、いいよ～♪　足りなかったら、おかわりすればいいし～」
line = "「会長ちゃんも１個食べる～？　――うん、いいよ～♪　足りなかったら、おかわりすればいいし～」"

[[dialogue]]
speaker = "サラン"
# 「サランが食べさせてあげるね～♪　はい、会長ちゃん。あ～ん♪」
line = "「サランが食べさせてあげるね～♪　はい、会長ちゃん。あ～ん♪」"

[[dialogue]]
speaker = "unk"
# そ、それは恥ずかしいっていうか……！
line = "そ、それは恥ずかしいっていうか……！"

[[dialogue]]
speaker = "サラン"
# 「え～？　なんで～？　――周りからの視線が気になるって？」
line = "「え～？　なんで～？　――周りからの視線が気になるって？」"

[[dialogue]]
speaker = "サラン"
# 「サランはふわふわだから気にしな～い♪　ほら、会長ちゃん、お口あけて～♪　あ～ん<emoji=heart04>」
line = "「サランはふわふわだから気にしな～い♪　ほら、会長ちゃん、お口あけて～♪　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# （サラン、ちょっと美食酔いしてる……）
line = "（サラン、ちょっと美食酔いしてる……）"

[[dialogue]]
speaker = "サラン"
# 「――美味しい～？　えへへ、ならよかった～♪」
line = "「――美味しい～？　えへへ、ならよかった～♪」"

[[dialogue]]
speaker = "蛍火"
# 「じーっ……」
line = "「じーっ……」"

[[dialogue]]
speaker = "サラン"
# 「あっ、蛍火ちゃんだ。蛍火ちゃ～ん♪　そんなところで、どうしたの～？」
line = "「あっ、蛍火ちゃんだ。蛍火ちゃ～ん♪　そんなところで、どうしたの～？」"

[[dialogue]]
speaker = "蛍火"
# 「ひゃっ！？　さ、サランさん、師匠……。え、えっと……これはですね……！」
line = "「ひゃっ！？　さ、サランさん、師匠……。え、えっと……これはですね……！」"

[[dialogue]]
speaker = "サラン"
# 「もしかして、休憩もらったところ～？　よければ蛍火ちゃんも、サランたちと一緒にランチタイムしよ～♪」
line = "「もしかして、休憩もらったところ～？　よければ蛍火ちゃんも、サランたちと一緒にランチタイムしよ～♪」"

[[dialogue]]
speaker = "蛍火"
# 「そ、それはありがたい申し出ですが、しかし私が、お２人の幸せそうな雰囲気に水を差すわけにも……！」
line = "「そ、それはありがたい申し出ですが、しかし私が、お２人の幸せそうな雰囲気に水を差すわけにも……！」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　確かに会長ちゃんと２人でいる時はふわふわだけど、それはお家でもできるし、気にしなくていいよ～？　――ほら、会長ちゃんもおいでって言ってるし♪」
line = "「ぽよ？　確かに会長ちゃんと２人でいる時はふわふわだけど、それはお家でもできるし、気にしなくていいよ～？　――ほら、会長ちゃんもおいでって言ってるし♪」"

[[dialogue]]
speaker = "蛍火"
# 「い、いいのですか？　ありがとうございます。それでは、同席失礼します……！」
line = "「い、いいのですか？　ありがとうございます。それでは、同席失礼します……！」"

[[dialogue]]
speaker = "unk"
# それから蛍火が料理を取ってきて、３人で談笑しつつ昼食をとっていると――
line = "それから蛍火が料理を取ってきて、３人で談笑しつつ昼食をとっていると――"

[[dialogue]]
speaker = "蛍火"
# 「あのっ……実はお２人に、前から聞いてみたかったことがありまして……」
line = "「あのっ……実はお２人に、前から聞いてみたかったことがありまして……」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　聞いてみたかったことって？」
line = "「ぽよ？　聞いてみたかったことって？」"

[[dialogue]]
speaker = "蛍火"
# 「その……お恥ずかしながら私、お２人がどういった経緯でお付き合いすることになったのか、気になっていて……どちらが先に告白されたのか、とか」
line = "「その……お恥ずかしながら私、お２人がどういった経緯でお付き合いすることになったのか、気になっていて……どちらが先に告白されたのか、とか」"

[[dialogue]]
speaker = "サラン"
# 「そういえば、誰にも話してなかったかも～。えへへ♪　告白はね～、会長ちゃんの方からしてくれたんだ～♪」
line = "「そういえば、誰にも話してなかったかも～。えへへ♪　告白はね～、会長ちゃんの方からしてくれたんだ～♪」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんの家に遊びに行った時にね、手作りお菓子を食べさせてくれて、サランのこと好きだって言ってくれたの～」
line = "「会長ちゃんの家に遊びに行った時にね、手作りお菓子を食べさせてくれて、サランのこと好きだって言ってくれたの～」"

[[dialogue]]
speaker = "サラン"
# 「サラン、その時ね、心がふわふわ～ってなるだけじゃなくて、なんだかすっごくドキドキしたんだ～」
line = "「サラン、その時ね、心がふわふわ～ってなるだけじゃなくて、なんだかすっごくドキドキしたんだ～」"

[[dialogue]]
speaker = "サラン"
# 「それで初めて、サランは会長ちゃんのこと、男の子として好きなんだって気付いて、お付き合いすることになったの～♪」
line = "「それで初めて、サランは会長ちゃんのこと、男の子として好きなんだって気付いて、お付き合いすることになったの～♪」"

[[dialogue]]
speaker = "蛍火"
# 「素敵です……♪　ちなみになのですが……師匠は、サランさんのどんなところを好きになったのですか？」
line = "「素敵です……♪　ちなみになのですが……師匠は、サランさんのどんなところを好きになったのですか？」"

[[dialogue]]
speaker = "unk"
# う～ん、好きなところは沢山あるけど……
line = "う～ん、好きなところは沢山あるけど……"

[[dialogue]]
speaker = "unk"
# いつも美味しそうにご飯を食べる顔とか。ポジティブで、悪いことがあってもへこたれずに次を頑張るところや、困っている人の助けになろうと行動できるところとか。
line = "いつも美味しそうにご飯を食べる顔とか。ポジティブで、悪いことがあってもへこたれずに次を頑張るところや、困っている人の助けになろうと行動できるところとか。"

[[dialogue]]
speaker = "unk"
# でも、何より――
line = "でも、何より――"

[[dialogue]]
speaker = "蛍火"
# 「――サランさんと一緒にいると、心がふわふわな気持ちになるから、ですか」
line = "「――サランさんと一緒にいると、心がふわふわな気持ちになるから、ですか」"

[[dialogue]]
speaker = "蛍火"
# 「分かる気がします。私もサランさんといる時は、こうして緊張せずに話せますから」
line = "「分かる気がします。私もサランさんといる時は、こうして緊張せずに話せますから」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　どうしたの、会長ちゃん？　――サランの頬っぺたにご飯粒が付いてる？」
line = "「ぽよ？　どうしたの、会長ちゃん？　――サランの頬っぺたにご飯粒が付いてる？」"

[[dialogue]]
speaker = "サラン"
# 「あ、取ってくれるの～？　……んっ<emoji=heart04>　ありがと～♪」
line = "「あ、取ってくれるの～？　……んっ<emoji=heart04>　ありがと～♪」"

[[dialogue]]
speaker = "サラン"
# 「えへへ～♪　サランは～、会長ちゃんの、今みたいな優しいところが好き～<emoji=heart04>」
line = "「えへへ～♪　サランは～、会長ちゃんの、今みたいな優しいところが好き～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、サランはまた、ふわふわの笑顔を浮かべるのだった。
line = "そう言って、サランはまた、ふわふわの笑顔を浮かべるのだった。"
