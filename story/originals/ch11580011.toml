[[dialogue]]
speaker = "unk"
# 第１話,異世界での触れ合い・前編,P
line = "第１話,異世界での触れ合い・前編,P"

[[dialogue]]
speaker = "unk"
# ――これは、陽彩や他の魔法少女たちがすぐには元の世界へ戻れず、追加で１週間ほどの滞在を余儀なくされた、『可能性』の世界。
line = "――これは、陽彩や他の魔法少女たちがすぐには元の世界へ戻れず、追加で１週間ほどの滞在を余儀なくされた、『可能性』の世界。"

[[dialogue]]
speaker = "陽彩"
# 「すまないな。わざわざ案内までしてもらって」
line = "「すまないな。わざわざ案内までしてもらって」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いえいえ♪　向こうの世界に戻るゲートを開くまでに、どうやらちょっとクールタイムが必要みたいですから」
line = "「いえいえ♪　向こうの世界に戻るゲートを開くまでに、どうやらちょっとクールタイムが必要みたいですから」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それに、私も陽彩さんとは、ゆっくりお話がしてみたかったんですよ～♪」
line = "「それに、私も陽彩さんとは、ゆっくりお話がしてみたかったんですよ～♪」"

[[dialogue]]
speaker = "陽彩"
# 「言っておくが、いろはたちと比べて、ぼくは人付き合いが得意じゃない。話をしても面白いどうかかは保証できないぞ」
line = "「言っておくが、いろはたちと比べて、ぼくは人付き合いが得意じゃない。話をしても面白いどうかかは保証できないぞ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あははっ☆　全然大丈夫ですよ～！　その分、私が喋って陽彩さんを楽しませちゃいますから♪」
line = "「あははっ☆　全然大丈夫ですよ～！　その分、私が喋って陽彩さんを楽しませちゃいますから♪」"

[[dialogue]]
speaker = "陽彩"
# （ああ、これは<b>押しが強い</b>タイプか……まあ、エリザやいろはで慣れてはいるが……）
line = "（ああ、これは<b>押しが強い</b>タイプか……まあ、エリザやいろはで慣れてはいるが……）"

[[dialogue]]
speaker = "トレジアンナ"
# 「それで、陽彩さんが図書館に来たいって言ったのは、こっちの世界で何か知りたかったことがあるからなんですかね？」
line = "「それで、陽彩さんが図書館に来たいって言ったのは、こっちの世界で何か知りたかったことがあるからなんですかね？」"

[[dialogue]]
speaker = "陽彩"
# 「ああ。まあ……異世界に来る機会なんて早々ないだろうからな。この世界の、三界や星力について調べてみたいと思ったんだ」
line = "「ああ。まあ……異世界に来る機会なんて早々ないだろうからな。この世界の、三界や星力について調べてみたいと思ったんだ」"

[[dialogue]]
speaker = "unk"
# それから陽彩は、気になった本を机に山積みにし、本を読み始めた。しばらく集中していて、ひと区切りついたところで──
line = "それから陽彩は、気になった本を机に山積みにし、本を読み始めた。しばらく集中していて、ひと区切りついたところで──"

[[dialogue]]
speaker = "トレジアンナ"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "陽彩"
# 「そのだな……ぼくはあまり気にしない方だが、流石にじろじろ見すぎじゃないか？」
line = "「そのだな……ぼくはあまり気にしない方だが、流石にじろじろ見すぎじゃないか？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、すみませ～ん♪　読書に没頭する陽彩さん、オモチャで遊ぶ赤ちゃんみたいな顔で、可愛かったのでつい……てへぺろ☆」
line = "「あっ、すみませ～ん♪　読書に没頭する陽彩さん、オモチャで遊ぶ赤ちゃんみたいな顔で、可愛かったのでつい……てへぺろ☆」"

[[dialogue]]
speaker = "陽彩"
# 「なっ！？　そ、そんな顔はしていないっ！」
line = "「なっ！？　そ、そんな顔はしていないっ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おぉっ♪　今の照れた顔、すごく可愛くていいですね～<emoji=heart04>　これはぜひ記憶魔法で脳内保存しとかないと～☆」
line = "「おぉっ♪　今の照れた顔、すごく可愛くていいですね～<emoji=heart04>　これはぜひ記憶魔法で脳内保存しとかないと～☆」"

[[dialogue]]
speaker = "陽彩"
# 「記憶魔法！？　待て、なんだそれは！　本当に保存してたら盗撮だぞ！？」
line = "「記憶魔法！？　待て、なんだそれは！　本当に保存してたら盗撮だぞ！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はあぁっ<emoji=heart04>　いいですね～♪　陽彩さん、性格はクールなボクっ娘なんですが、一方でふと見せる、どこか小動物を思わせる仕草や外見が保護欲をかき立てられるというか～♪」
line = "「はあぁっ<emoji=heart04>　いいですね～♪　陽彩さん、性格はクールなボクっ娘なんですが、一方でふと見せる、どこか小動物を思わせる仕草や外見が保護欲をかき立てられるというか～♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「魔法少女アニメ的に言うと、序盤は敵だけど、それにはやむを得ない事情があって、中盤から和解して仲間になりそうな良さがあります！」
line = "「魔法少女アニメ的に言うと、序盤は敵だけど、それにはやむを得ない事情があって、中盤から和解して仲間になりそうな良さがあります！」"

[[dialogue]]
speaker = "陽彩"
# 「全然わからん……というか、ぼくはそんな経緯はたどっていない」
line = "「全然わからん……というか、ぼくはそんな経緯はたどっていない」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、そのちょっとジト目な感じもいいですね～♪　陽彩さんの素の部分が覗けている感じがしますよ～♪」
line = "「あっ、そのちょっとジト目な感じもいいですね～♪　陽彩さんの素の部分が覗けている感じがしますよ～♪」"

[[dialogue]]
speaker = "陽彩"
# 「ああもう、下手に記憶魔法とか聞いたら、集中して本が読めないじゃないか！　仕方ない……トレジアンナ、この世界のことで色々質問してもいいか？」
line = "「ああもう、下手に記憶魔法とか聞いたら、集中して本が読めないじゃないか！　仕方ない……トレジアンナ、この世界のことで色々質問してもいいか？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　もちろん構いませんよ～」
line = "「はい♪　もちろん構いませんよ～」"

[[dialogue]]
speaker = "unk"
# トレジアンナは周囲に迷惑をかけないよう、自分たちを包むように防音結界を張った。
line = "トレジアンナは周囲に迷惑をかけないよう、自分たちを包むように防音結界を張った。"

[[dialogue]]
speaker = "unk"
# その中で、陽彩はトレジアンナに様々なことを尋ねていった。
line = "その中で、陽彩はトレジアンナに様々なことを尋ねていった。"

[[dialogue]]
speaker = "陽彩"
# 「なるほど……！　三界は決められた時期に、その湖を通ることで行き来ができるのか。面白いな」
line = "「なるほど……！　三界は決められた時期に、その湖を通ることで行き来ができるのか。面白いな」"

[[dialogue]]
speaker = "陽彩"
# 「そして、この世界では守護星から力を授けられた星騎士が、リクリエという天災から人々を守る為に戦っていて、ここはその最前線である星騎士たちの学園……！」
line = "「そして、この世界では守護星から力を授けられた星騎士が、リクリエという天災から人々を守る為に戦っていて、ここはその最前線である星騎士たちの学園……！」"

[[dialogue]]
speaker = "陽彩"
# 「参った……まるでおとぎ話のような世界だ、興味深すぎるぞ。頭の中で疑問や想像がどんどん膨らんで、もっと知りたくなってきてしまう！」
line = "「参った……まるでおとぎ話のような世界だ、興味深すぎるぞ。頭の中で疑問や想像がどんどん膨らんで、もっと知りたくなってきてしまう！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふっ♪　陽彩さん、どうやら未知のことを知るのが好きなタイプみたいですね～♪　瞳がすごくキラキラしてますよ～☆」
line = "「ふふっ♪　陽彩さん、どうやら未知のことを知るのが好きなタイプみたいですね～♪　瞳がすごくキラキラしてますよ～☆」"

[[dialogue]]
speaker = "陽彩"
# 「なっ！？　そ、そんな目はしていないっ！　だが……人より知的好奇心が強いのは、まあ間違ってない……」
line = "「なっ！？　そ、そんな目はしていないっ！　だが……人より知的好奇心が強いのは、まあ間違ってない……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「わかりますよ～♪　私も同じタイプですから！　つい好奇心で、未知を求めて体が動いちゃいますよね～♪」
line = "「わかりますよ～♪　私も同じタイプですから！　つい好奇心で、未知を求めて体が動いちゃいますよね～♪」"

[[dialogue]]
speaker = "陽彩"
# 「トレジアンナも？」
line = "「トレジアンナも？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　せっかくですから、陽彩さんには図書館の本に書かれてないことも教えちゃいましょうかね～」
line = "「はい♪　せっかくですから、陽彩さんには図書館の本に書かれてないことも教えちゃいましょうかね～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ロストアイテムや、それに関係する魔女の話を☆」
line = "「ロストアイテムや、それに関係する魔女の話を☆」"

[[dialogue]]
speaker = "unk"
# それから話は弾んで、２人はお互いのことを尋ねて、語り合った。
line = "それから話は弾んで、２人はお互いのことを尋ねて、語り合った。"

[[dialogue]]
speaker = "陽彩"
# 「まさか、トレジアンナの正体が大昔の魔女とは……そして、三界とは別に世界樹を中心とした魔女の住む森があり、そこはリクリエの干渉を受けずに存続し続けてきた……」
line = "「まさか、トレジアンナの正体が大昔の魔女とは……そして、三界とは別に世界樹を中心とした魔女の住む森があり、そこはリクリエの干渉を受けずに存続し続けてきた……」"

[[dialogue]]
speaker = "陽彩"
# 「そして、ロストアイテムはリクリエに飲み込まれても残り続ける存在強度を持ち、その起源は大昔の魔女に作られた物が多いと……」
line = "「そして、ロストアイテムはリクリエに飲み込まれても残り続ける存在強度を持ち、その起源は大昔の魔女に作られた物が多いと……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「その一部は、私が作った物も含まれてるんですよね～。しかもまだ、回収しきれてなくて行方不明のやつが幾つかあって……」
line = "「その一部は、私が作った物も含まれてるんですよね～。しかもまだ、回収しきれてなくて行方不明のやつが幾つかあって……」"

[[dialogue]]
speaker = "陽彩"
# 「……ちなみに、トレジアンナは本当のところ、何歳なんだ？」
line = "「……ちなみに、トレジアンナは本当のところ、何歳なんだ？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いやですね～、陽彩さん☆　同じ女性同士であっても、乙女の年齢はトップシークレットですよ♪」
line = "「いやですね～、陽彩さん☆　同じ女性同士であっても、乙女の年齢はトップシークレットですよ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そもそも私、長寿の魔女であることに加えて魔法で成長も止めているので、名実ともに永遠の乙女なんですから☆」
line = "「そもそも私、長寿の魔女であることに加えて魔法で成長も止めているので、名実ともに永遠の乙女なんですから☆」"

[[dialogue]]
speaker = "陽彩"
# 「胡散臭くて、嘘なのか本当なのかわからないな……」
line = "「胡散臭くて、嘘なのか本当なのかわからないな……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あははっ☆　ちなみに、陽彩さんはＳＦ好きで本をよく読んでるとのことですけど、そちらの世界の<b>悪魔</b>については、どのように考えていらっしゃいますか？」
line = "「あははっ☆　ちなみに、陽彩さんはＳＦ好きで本をよく読んでるとのことですけど、そちらの世界の<b>悪魔</b>については、どのように考えていらっしゃいますか？」"

[[dialogue]]
speaker = "陽彩"
# 「……トレジアンナがぼくと同じタイプなら、ぼくたちの世界のことが気になるのは当然か」
line = "「……トレジアンナがぼくと同じタイプなら、ぼくたちの世界のことが気になるのは当然か」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。できればもう少し、悪魔のことについて詳しく知れたらな～と思いまして☆」
line = "「はい。できればもう少し、悪魔のことについて詳しく知れたらな～と思いまして☆」"

[[dialogue]]
speaker = "陽彩"
# 「……わかった。キミたちには迷惑もかけたし、世界がこうして１度繋がった以上、次がないとは言えない。ぼくの知っていることはひと通り話しておこう」
line = "「……わかった。キミたちには迷惑もかけたし、世界がこうして１度繋がった以上、次がないとは言えない。ぼくの知っていることはひと通り話しておこう」"

[[dialogue]]
speaker = "unk"
# その後、悪魔について２人で話し、考察なども語り合っているうちに、夜になってしまった。
line = "その後、悪魔について２人で話し、考察なども語り合っているうちに、夜になってしまった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、すっかり話し込んじゃいましたね～」
line = "「いや～、すっかり話し込んじゃいましたね～」"

[[dialogue]]
speaker = "陽彩"
# 「そうだな……えっと」
line = "「そうだな……えっと」"

[[dialogue]]
speaker = "unk"
# 陽彩は目線を合わさず、ちょっと照れ臭そうに言う。
line = "陽彩は目線を合わさず、ちょっと照れ臭そうに言う。"

[[dialogue]]
speaker = "陽彩"
# 「トレジアンナ……その、ありがとう。今日は充実した１日だった」
line = "「トレジアンナ……その、ありがとう。今日は充実した１日だった」"

[[dialogue]]
speaker = "トレジアンナ"
# 「！　ふふっ、私もです♪　陽彩さん、またお話しましょう♪」
line = "「！　ふふっ、私もです♪　陽彩さん、またお話しましょう♪」"

[[dialogue]]
speaker = "unk"
# トレジアンナがにこやかに手を差し出す。陽彩は一瞬驚くが――
line = "トレジアンナがにこやかに手を差し出す。陽彩は一瞬驚くが――"

[[dialogue]]
speaker = "陽彩"
# 「ああ。ぼくの話についてこれる奴は、なかなかいないからな」
line = "「ああ。ぼくの話についてこれる奴は、なかなかいないからな」"

[[dialogue]]
speaker = "unk"
# 口元を緩ませて、トレジアンナの手を取り、握手を交わすのだった。
line = "口元を緩ませて、トレジアンナの手を取り、握手を交わすのだった。"
