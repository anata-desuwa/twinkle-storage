[[dialogue]]
speaker = "unk"
# 第２話,新年から初々しく,P
line = "第２話,新年から初々しく,P"

[[dialogue]]
speaker = "unk"
# シズハと恋人として付き合い始めた新年。お正月が明けた昼休みに、俺は彼女と学園で顔を合わせる。
line = "シズハと恋人として付き合い始めた新年。お正月が明けた昼休みに、俺は彼女と学園で顔を合わせる。"

[[dialogue]]
speaker = "シズハ"
# 「あ、あの……会長、ごきげんよう。えへへっ……」
line = "「あ、あの……会長、ごきげんよう。えへへっ……」"

[[dialogue]]
speaker = "シズハ"
# 「そ、それじゃあ、お昼食べに行こっか……」
line = "「そ、それじゃあ、お昼食べに行こっか……」"

[[dialogue]]
speaker = "unk"
# おそらく、シズハは照れくさくて緊張しているのだろう。そんな彼女を和ませようと、俺は冗談混じりに提案する。
line = "おそらく、シズハは照れくさくて緊張しているのだろう。そんな彼女を和ませようと、俺は冗談混じりに提案する。"

[[dialogue]]
speaker = "unk"
# なんか今日、ちょっと元気ない？　なら――
line = "なんか今日、ちょっと元気ない？　なら――"

[[dialogue]]
speaker = "シズハ"
# 「へ！？　恋人になったわけだし、会長のお尻だったら好きなだけ揉んでいい！？」
line = "「へ！？　恋人になったわけだし、会長のお尻だったら好きなだけ揉んでいい！？」"

[[dialogue]]
speaker = "unk"
# 『お尻を触るのはコミュニケーション』と豪語するシズハならば、これでいつもみたいに元気に食いついてくるはず――と思っていたのだが。
line = "『お尻を触るのはコミュニケーション』と豪語するシズハならば、これでいつもみたいに元気に食いついてくるはず――と思っていたのだが。"

[[dialogue]]
speaker = "シズハ"
# 「ななな、何言ってるの会長！？　バカバカ！　そんな破廉恥なこと、するわけないじゃない……！」
line = "「ななな、何言ってるの会長！？　バカバカ！　そんな破廉恥なこと、するわけないじゃない……！」"

[[dialogue]]
speaker = "unk"
# あれ！？！？
line = "あれ！？！？"

[[dialogue]]
speaker = "シズハ"
# 「恋人になったんだから、そういうのはもっと関係が深まってからじゃないと……！」
line = "「恋人になったんだから、そういうのはもっと関係が深まってからじゃないと……！」"

[[dialogue]]
speaker = "シズハ"
# 「か、会長も、私のお尻を勝手に触ったりしたらセクハラだからね！？」
line = "「か、会長も、私のお尻を勝手に触ったりしたらセクハラだからね！？」"

[[dialogue]]
speaker = "unk"
# その瞬間、俺の脳内に溢れ出した、確かに<b>存在する</b>記憶。
line = "その瞬間、俺の脳内に溢れ出した、確かに<b>存在する</b>記憶。"

[[dialogue]]
speaker = "シズハ"
# 「あっ！　会長～！　ごきげんよう♪」
line = "「あっ！　会長～！　ごきげんよう♪」"

[[dialogue]]
speaker = "シズハ"
# 「ヘイ、尻っ♪」
line = "「ヘイ、尻っ♪」"

[[dialogue]]
speaker = "unk"
# ひゃんっ！？
line = "ひゃんっ！？"

[[dialogue]]
speaker = "シズハ"
# 「うん！　今日も中性的で素敵なハイブリッドプリケツね♪　えへへっ、会長のお尻を触ると元気が出てくるわ♪」
line = "「うん！　今日も中性的で素敵なハイブリッドプリケツね♪　えへへっ、会長のお尻を触ると元気が出てくるわ♪」"

[[dialogue]]
speaker = "シズハ"
# 「――セクハラ？　なに言ってるの、私と会長との仲じゃない♪　だから、会長も私のお尻を触ってもいいわよ。ほらほら♪」
line = "「――セクハラ？　なに言ってるの、私と会長との仲じゃない♪　だから、会長も私のお尻を触ってもいいわよ。ほらほら♪」"

[[dialogue]]
speaker = "シズハ"
# 「な、なに？　会長、私の顔をじっと見たりして……」
line = "「な、なに？　会長、私の顔をじっと見たりして……」"

[[dialogue]]
speaker = "シズハ"
# 「ど、どれだけ見つめても、お尻を触るのはダメだからね！？」
line = "「ど、どれだけ見つめても、お尻を触るのはダメだからね！？」"

[[dialogue]]
speaker = "unk"
# あ、うん……そうだね……
line = "あ、うん……そうだね……"

[[dialogue]]
speaker = "シズハ"
# 「変なこと言ってないで、お昼を食べに行くわよ！　もうっ……！」
line = "「変なこと言ってないで、お昼を食べに行くわよ！　もうっ……！」"

[[dialogue]]
speaker = "unk"
# それから大聖堂カフェテリアへ向かおうとしたシズハだったが、俺は呼び止めて、中庭のベンチの方へ誘った。
line = "それから大聖堂カフェテリアへ向かおうとしたシズハだったが、俺は呼び止めて、中庭のベンチの方へ誘った。"

[[dialogue]]
speaker = "シズハ"
# 「これ……会長が作ったの！？　お弁当……！」
line = "「これ……会長が作ったの！？　お弁当……！」"

[[dialogue]]
speaker = "unk"
# 俺は頷いて、シズハにどうぞ食べて欲しいとすすめる。
line = "俺は頷いて、シズハにどうぞ食べて欲しいとすすめる。"

[[dialogue]]
speaker = "シズハ"
# 「う、うん。じゃあ……いただきます」
line = "「う、うん。じゃあ……いただきます」"

[[dialogue]]
speaker = "シズハ"
# 「あむっ、もぐもぐ…………す、すごく美味しいっ！」
line = "「あむっ、もぐもぐ…………す、すごく美味しいっ！」"

[[dialogue]]
speaker = "unk"
# 俺は、母さんが忙しいときに代わりに作れるよう練習していたことや、学園に転入する前に飲食店のバイトで色々覚えたことを話す。
line = "俺は、母さんが忙しいときに代わりに作れるよう練習していたことや、学園に転入する前に飲食店のバイトで色々覚えたことを話す。"

[[dialogue]]
speaker = "シズハ"
# 「会長って、そんなに料理できるんだ……」
line = "「会長って、そんなに料理できるんだ……」"

[[dialogue]]
speaker = "unk"
# なんだか浮かない顔をしているシズハに気づいて、俺はどうしたのかと尋ねる。
line = "なんだか浮かない顔をしているシズハに気づいて、俺はどうしたのかと尋ねる。"

[[dialogue]]
speaker = "unk"
# すると、シズハは慌てたように首を横に振った。
line = "すると、シズハは慌てたように首を横に振った。"

[[dialogue]]
speaker = "シズハ"
# 「あ、えっと……会長は何も悪くないの！　お弁当を作ってくれたことは嬉しくてね！　でも……」
line = "「あ、えっと……会長は何も悪くないの！　お弁当を作ってくれたことは嬉しくてね！　でも……」"

[[dialogue]]
speaker = "シズハ"
# 「私さ、ずっと入院生活だったから……自分が会長よりも料理ができないんだってことに気づいて、ちょっとショックを受けて……あはは」
line = "「私さ、ずっと入院生活だったから……自分が会長よりも料理ができないんだってことに気づいて、ちょっとショックを受けて……あはは」"

[[dialogue]]
speaker = "シズハ"
# 「これまであまり気にしてなかったんだけど……一応会長と付き合うことになったわけだし、そうすると自分の女子力低いのが気になってくるというか……」
line = "「これまであまり気にしてなかったんだけど……一応会長と付き合うことになったわけだし、そうすると自分の女子力低いのが気になってくるというか……」"

[[dialogue]]
speaker = "シズハ"
# 「え？　――これからは会長が私に、料理を教えてくれる……？」
line = "「え？　――これからは会長が私に、料理を教えてくれる……？」"

[[dialogue]]
speaker = "unk"
# その週の休日。俺はシズハと並んでキッチンに立ち、彼女に定番料理のカレーを教えていた。
line = "その週の休日。俺はシズハと並んでキッチンに立ち、彼女に定番料理のカレーを教えていた。"

[[dialogue]]
speaker = "シズハ"
# 「じゃがいもを切るのって、こんな感じ……？」
line = "「じゃがいもを切るのって、こんな感じ……？」"

[[dialogue]]
speaker = "unk"
# そうそう。上手い上手い
line = "そうそう。上手い上手い"

[[dialogue]]
speaker = "シズハ"
# 「えへへっ♪　じゃあ次は、ニンジンの切り方も教えて♪」
line = "「えへへっ♪　じゃあ次は、ニンジンの切り方も教えて♪」"

[[dialogue]]
speaker = "シズハ"
# 「──ふんふん。わかったわ。私もやってみるから、会長、見ててね♪」
line = "「──ふんふん。わかったわ。私もやってみるから、会長、見ててね♪」"

[[dialogue]]
speaker = "シズハ"
# （なんかこうして、一緒に並んで料理してると、新婚さんみたいかも……♪）
line = "（なんかこうして、一緒に並んで料理してると、新婚さんみたいかも……♪）"

[[dialogue]]
speaker = "シズハ"
# （えへへ<emoji=heart04>　頬が緩んで、顔がニヨニヨしちゃう……<emoji=heart04>）
line = "（えへへ<emoji=heart04>　頬が緩んで、顔がニヨニヨしちゃう……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# それから、出来上がったカレーを２人で食べることになった。
line = "それから、出来上がったカレーを２人で食べることになった。"

[[dialogue]]
speaker = "シズハ"
# 「ん～っ、美味しい～♪　初めての手作りなのに、こんなに美味しくなるなんて、カレーってすごい！」
line = "「ん～っ、美味しい～♪　初めての手作りなのに、こんなに美味しくなるなんて、カレーってすごい！」"

[[dialogue]]
speaker = "シズハ"
# 「あっ、もちろん、会長が教えてくれたからだっていうのは、ちゃんとわかってるのよ？　ありがとう♪」
line = "「あっ、もちろん、会長が教えてくれたからだっていうのは、ちゃんとわかってるのよ？　ありがとう♪」"

[[dialogue]]
speaker = "unk"
# シズハが笑顔になってよかった
line = "シズハが笑顔になってよかった"

[[dialogue]]
speaker = "シズハ"
# 「……！　んっ<emoji=heart04>　会長、他の料理も、また一緒に教えてくれる……？」
line = "「……！　んっ<emoji=heart04>　会長、他の料理も、また一緒に教えてくれる……？」"

[[dialogue]]
speaker = "unk"
# 俺がもちろんだと頷くと、彼女は嬉しそうな笑顔を浮かべて、スプーンでカレーを差し出す。
line = "俺がもちろんだと頷くと、彼女は嬉しそうな笑顔を浮かべて、スプーンでカレーを差し出す。"

[[dialogue]]
speaker = "シズハ"
# 「じゃあ、お礼に……あ、あ～ん……<emoji=heart04>」
line = "「じゃあ、お礼に……あ、あ～ん……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「え？　――私の方からあ～んしてくれるなんて、意外……？」
line = "「え？　――私の方からあ～んしてくれるなんて、意外……？」"

[[dialogue]]
speaker = "シズハ"
# 「ば、バカバカ！　そういうのは言わなくていいから、素直に受け取ってよ……！」
line = "「ば、バカバカ！　そういうのは言わなくていいから、素直に受け取ってよ……！」"

[[dialogue]]
speaker = "シズハ"
# 「ほ、ほら……あ～ん……<emoji=heart04>」
line = "「ほ、ほら……あ～ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、俺はシズハからカレーを食べさせてもらいながら、幸せなひと時を過ごすのだった。
line = "その後、俺はシズハからカレーを食べさせてもらいながら、幸せなひと時を過ごすのだった。"
