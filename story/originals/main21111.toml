[[dialogue]]
speaker = "unk"
# 第１１話,ジグの帰還,B
line = "第１１話,ジグの帰還,B"

[[dialogue]]
speaker = "unk"
# 梨緒の──ベガの星騎士たちの星力を結集した一撃で、ジグの中に巣食っていたリクリエは一片も残らず消滅した。
line = "梨緒の──ベガの星騎士たちの星力を結集した一撃で、ジグの中に巣食っていたリクリエは一片も残らず消滅した。"

[[dialogue]]
speaker = "ジグ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ！」
line = "「ジグ！」"

[[dialogue]]
speaker = "unk"
# 落下するジグを、梨緒が素早く滑り込んで受け止める。
line = "落下するジグを、梨緒が素早く滑り込んで受け止める。"

[[dialogue]]
speaker = "unk"
# だが……
line = "だが……"

[[dialogue]]
speaker = "ジグ"
# 「アガ、サ……」
line = "「アガ、サ……」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ！　今は喋るな！」
line = "「ジグ！　今は喋るな！」"

[[dialogue]]
speaker = "ジグ"
# 「私を止めて、くれたんだね……君を、副会長にして、よかった……」
line = "「私を止めて、くれたんだね……君を、副会長にして、よかった……」"

[[dialogue]]
speaker = "ジグ"
# 「でもまだリクリエは、終わっていない……後は任せる、よ……」
line = "「でもまだリクリエは、終わっていない……後は任せる、よ……」"

[[dialogue]]
speaker = "ジグ"
# 「今まで……ありが、とう……」
line = "「今まで……ありが、とう……」"

[[dialogue]]
speaker = "ジグ"
# 「アガ──サ──」
line = "「アガ──サ──」"

[[dialogue]]
speaker = "梨緒"
# 「ジグッ！！」
line = "「ジグッ！！」"

[[dialogue]]
speaker = "梨緒"
# 「そんな……ジグを救えると思ったのに……」
line = "「そんな……ジグを救えると思ったのに……」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……！　起きろジグ……！　ジグーーーッ！！」
line = "「ジグ……！　起きろジグ……！　ジグーーーッ！！」"

[[dialogue]]
speaker = "unk"
# 力の抜けたジグの体を強く抱き締める梨緒。
line = "力の抜けたジグの体を強く抱き締める梨緒。"

[[dialogue]]
speaker = "unk"
# こぼれる涙がジグの銀髪を濡らしていた。
line = "こぼれる涙がジグの銀髪を濡らしていた。"

[[dialogue]]
speaker = "ナターシャ"
# 「梨緒、そいつ生きてるよ」
line = "「梨緒、そいつ生きてるよ」"

[[dialogue]]
speaker = "梨緒"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# 腕の中のジグの顔をちらりと見ると……
line = "腕の中のジグの顔をちらりと見ると……"

[[dialogue]]
speaker = "ジグ"
# 「ははは」
line = "「ははは」"

[[dialogue]]
speaker = "梨緒"
# 「ジグーーーーーーッ！！！」
line = "「ジグーーーーーーッ！！！」"

[[dialogue]]
speaker = "梨緒"
# 「だから君のことは嫌いなんだ……いつも適当で、君の悪ふざけの始末をさせられて……」
line = "「だから君のことは嫌いなんだ……いつも適当で、君の悪ふざけの始末をさせられて……」"

[[dialogue]]
speaker = "ジグ"
# 「いやぁ、こんな簡単に引っかかるとは。やっぱりアガサで遊ぶのは楽しいね」
line = "「いやぁ、こんな簡単に引っかかるとは。やっぱりアガサで遊ぶのは楽しいね」"

[[dialogue]]
speaker = "ベアトリス"
# 「ジグ──さんってこんな人なんだ……」
line = "「ジグ──さんってこんな人なんだ……」"

[[dialogue]]
speaker = "梨緒"
# 「そうだ、こういうやつだ。だけど外面は良くて、肝心なところはちゃんと締めるから、余計に腹が立つ」
line = "「そうだ、こういうやつだ。だけど外面は良くて、肝心なところはちゃんと締めるから、余計に腹が立つ」"

[[dialogue]]
speaker = "ジグ"
# 「久しぶりに仮面が外れたからね。少々遊びたくなったのさ」
line = "「久しぶりに仮面が外れたからね。少々遊びたくなったのさ」"

[[dialogue]]
speaker = "ジグ"
# 「だけど感謝しているのは本当だ。ありがとう、アガサ。君のおかげで帰ってこれた。アガサの声、ちゃんと届いていたよ」
line = "「だけど感謝しているのは本当だ。ありがとう、アガサ。君のおかげで帰ってこれた。アガサの声、ちゃんと届いていたよ」"

[[dialogue]]
speaker = "ジグ"
# 「アガサは本当に強くなったんだね。アルタイルで新しい仲間と出会って」
line = "「アガサは本当に強くなったんだね。アルタイルで新しい仲間と出会って」"

[[dialogue]]
speaker = "ジグ"
# 「私もアガサと……みんなと一緒に絶望して、それから立ち上がればよかったのかもしれない」
line = "「私もアガサと……みんなと一緒に絶望して、それから立ち上がればよかったのかもしれない」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……」
line = "「ジグ……」"

[[dialogue]]
speaker = "ジグ"
# 「だが感傷に浸っている暇はない。正気に戻ったからには女神の神殿を止めないと」
line = "「だが感傷に浸っている暇はない。正気に戻ったからには女神の神殿を止めないと」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうそう。神殿を動かしたからには止められるんじゃないの？」
line = "「そうそう。神殿を動かしたからには止められるんじゃないの？」"

[[dialogue]]
speaker = "ジグ"
# 「神殿をコントロールするやり方は覚えたけど、ちゃんとできるかな？　ここをこうして……」
line = "「神殿をコントロールするやり方は覚えたけど、ちゃんとできるかな？　ここをこうして……」"

[[dialogue]]
speaker = "unk"
# ジグが球体のコンピューターに手をかざし、神殿のシステムを操作する。
line = "ジグが球体のコンピューターに手をかざし、神殿のシステムを操作する。"

[[dialogue]]
speaker = "梨緒"
# 「止まったか！？」
line = "「止まったか！？」"

[[dialogue]]
speaker = "ジグ"
# 「……いや、ダメだ」
line = "「……いや、ダメだ」"

[[dialogue]]
speaker = "ジグ"
# 「神殿の推力は停止させたが、これだけの質量だ。すぐには止まらない」
line = "「神殿の推力は停止させたが、これだけの質量だ。すぐには止まらない」"

[[dialogue]]
speaker = "ジグ"
# 「女神の神殿はこのまま──聖庭園に激突する」
line = "「女神の神殿はこのまま──聖庭園に激突する」"
