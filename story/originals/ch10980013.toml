[[dialogue]]
speaker = "unk"
# 第３話,熱量高めのアキバデート,P
line = "第３話,熱量高めのアキバデート,P"

[[dialogue]]
speaker = "unk"
# 週末。俺はヒマワリとともに秋葉原に来ていた。
line = "週末。俺はヒマワリとともに秋葉原に来ていた。"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さん、お買い物に付き合ってくれて、ありがとうございます」
line = "「会長さん、お買い物に付き合ってくれて、ありがとうございます」"

[[dialogue]]
speaker = "ヒマワリ"
# 「アキバ店限定プラモデル、１人１個限定なんで助かりますよー」
line = "「アキバ店限定プラモデル、１人１個限定なんで助かりますよー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あ、ちなみにミウは他に用事がありまして。それにいくら親友でも、いつもいつもあたしのわがままに振り回すわけにもいかないですからねー」
line = "「あ、ちなみにミウは他に用事がありまして。それにいくら親友でも、いつもいつもあたしのわがままに振り回すわけにもいかないですからねー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「むしろ会長さんを振り回しちゃって、ごめんなさいなんですけど……大丈夫でした？」
line = "「むしろ会長さんを振り回しちゃって、ごめんなさいなんですけど……大丈夫でした？」"

[[dialogue]]
speaker = "unk"
# もちろん。ところで何買うの？
line = "もちろん。ところで何買うの？"

[[dialogue]]
speaker = "ヒマワリ"
# 「店舗限定のスペシャルカラーのプラモなんですけど……会長さんは知ってます？　今期の超激アツロボアニメ！」
line = "「店舗限定のスペシャルカラーのプラモなんですけど……会長さんは知ってます？　今期の超激アツロボアニメ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「観た方が良いですよ！　絶・対！　めちゃ面白いですから！　まだ４話目なんで全然追いつけますし！」
line = "「観た方が良いですよ！　絶・対！　めちゃ面白いですから！　まだ４話目なんで全然追いつけますし！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「やー、事前情報がまったくなかったんで伏兵でしたよー。まさか、あんなアチアチアニメだなんて……主題歌もあたし的にもテンション爆上がりで！」
line = "「やー、事前情報がまったくなかったんで伏兵でしたよー。まさか、あんなアチアチアニメだなんて……主題歌もあたし的にもテンション爆上がりで！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ロボアニメのテンプレを逆手に取ったメタネタも『うわーやられたーそうきたかー！』って……しまった、これネタバレになっちゃう！？」
line = "「ロボアニメのテンプレを逆手に取ったメタネタも『うわーやられたーそうきたかー！』って……しまった、これネタバレになっちゃう！？」"

[[dialogue]]
speaker = "unk"
# そんなに面白いんだ
line = "そんなに面白いんだ"

[[dialogue]]
speaker = "ヒマワリ"
# 「もう最っ高！　最＆高！　最ｏｆ高ですね！」
line = "「もう最っ高！　最＆高！　最ｏｆ高ですね！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「サブスク視聴も当然なんですけど、円盤の初回版は設定資料集に限定プラモまでついてくるっていうし！　マストバイですね！　むふー！」
line = "「サブスク視聴も当然なんですけど、円盤の初回版は設定資料集に限定プラモまでついてくるっていうし！　マストバイですね！　むふー！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「って、喋りすぎた！　ごめんなさい、喋り始めると止まんなくなっちゃって……あはは、女の子が激アツロボアニメにハマるとか、おかしいですよねー」
line = "「って、喋りすぎた！　ごめんなさい、喋り始めると止まんなくなっちゃって……あはは、女の子が激アツロボアニメにハマるとか、おかしいですよねー」"

[[dialogue]]
speaker = "unk"
# 女の子でも男の子でも、面白いものは面白い！
line = "女の子でも男の子でも、面白いものは面白い！"

[[dialogue]]
speaker = "ヒマワリ"
# 「……！　ありがとうございます、会長さんっ！」
line = "「……！　ありがとうございます、会長さんっ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あっ、あそこのお店です。結構並んでるけど、買えるかなー。買えるといいなー♪」
line = "「あっ、あそこのお店です。結構並んでるけど、買えるかなー。買えるといいなー♪」"

[[dialogue]]
speaker = "unk"
# 目的のプラモを買った後もヒマワリの物欲は止まらなかった。
line = "目的のプラモを買った後もヒマワリの物欲は止まらなかった。"

[[dialogue]]
speaker = "ヒマワリ"
# 「うわ、こんなマイナー機も出てたんだー！　量産型は数揃えてなんぼですよね！　原作準拠で５個くらいでいいかなー」
line = "「うわ、こんなマイナー機も出てたんだー！　量産型は数揃えてなんぼですよね！　原作準拠で５個くらいでいいかなー」"

[[dialogue]]
speaker = "unk"
# 買うねぇ！？
line = "買うねぇ！？"

[[dialogue]]
speaker = "ヒマワリ"
# 「はい！　お金は趣味活に使うためにあるんで！」
line = "「はい！　お金は趣味活に使うためにあるんで！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さんは欲しいのないですか？　借りがいくつもありますから、良かったらプレゼントしますよー。遠慮なんてしないでくださいね？」
line = "「会長さんは欲しいのないですか？　借りがいくつもありますから、良かったらプレゼントしますよー。遠慮なんてしないでくださいね？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「おお、エース仕様機ですね、さすがいいセンスしてます！　量産機よりちょっとだけ強いカスタム機ってくすぐられますよねー！」
line = "「おお、エース仕様機ですね、さすがいいセンスしてます！　量産機よりちょっとだけ強いカスタム機ってくすぐられますよねー！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いくつにします？　一個小隊でいいですか？」
line = "「いくつにします？　一個小隊でいいですか？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そんなに作れない？　じゃ、１個だけにしておきましょうか。買ってきまーす」
line = "「そんなに作れない？　じゃ、１個だけにしておきましょうか。買ってきまーす」"

[[dialogue]]
speaker = "unk"
# 楽しそうにプラモの箱をいくつも抱えてレジに向かうヒマワリ。
line = "楽しそうにプラモの箱をいくつも抱えてレジに向かうヒマワリ。"

[[dialogue]]
speaker = "unk"
# 待つことしばらく──
line = "待つことしばらく──"

[[dialogue]]
speaker = "ヒマワリ"
# 「はい、会長さん。ささやかですけどあたしの気持ち、もらってください♪」
line = "「はい、会長さん。ささやかですけどあたしの気持ち、もらってください♪」"

[[dialogue]]
speaker = "unk"
# ありがとう。大切に作るよ
line = "ありがとう。大切に作るよ"

[[dialogue]]
speaker = "ヒマワリ"
# 「どうしたしまして！　プラモの楽しさを味わってください！」
line = "「どうしたしまして！　プラモの楽しさを味わってください！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「でも、これくらいであたしが借りを返したとか思わないでくださいね。命を助けられた恩は、こんなもんじゃないですから！」
line = "「でも、これくらいであたしが借りを返したとか思わないでくださいね。命を助けられた恩は、こんなもんじゃないですから！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「この前の会長さん、とってもカッコよかったです。窮地を救ってくれた会長さんは、あたしにとってのスーパ―ヒーローでした」
line = "「この前の会長さん、とってもカッコよかったです。窮地を救ってくれた会長さんは、あたしにとってのスーパ―ヒーローでした」"

[[dialogue]]
speaker = "ヒマワリ"
# 「そんなスーパーヒーローをアキバショッピングに連れ回すなって感じですけどね、あはは」
line = "「そんなスーパーヒーローをアキバショッピングに連れ回すなって感じですけどね、あはは」"

[[dialogue]]
speaker = "ヒマワリ"
# 「んー……スーパーヒーロー……スーパーヒーローかぁ……会長さん、まだ時間あります？」
line = "「んー……スーパーヒーロー……スーパーヒーローかぁ……会長さん、まだ時間あります？」"

[[dialogue]]
speaker = "unk"
# 今日１日、空いてるよ
line = "今日１日、空いてるよ"

[[dialogue]]
speaker = "ヒマワリ"
# 「なら、カラオケ行きましょ！　あたしのヒーローソング熱唱、聞かせてあげますよ！　会長さんの歌も聞きたいです！」
line = "「なら、カラオケ行きましょ！　あたしのヒーローソング熱唱、聞かせてあげますよ！　会長さんの歌も聞きたいです！」"

[[dialogue]]
speaker = "unk"
# 望むところだ！
line = "望むところだ！"

[[dialogue]]
speaker = "unk"
# この後、カラオケに行った俺とヒマワリは激アツソング５０連発を、喉がガラガラになるまで歌い続けたのだった。
line = "この後、カラオケに行った俺とヒマワリは激アツソング５０連発を、喉がガラガラになるまで歌い続けたのだった。"

[[dialogue]]
speaker = "ヒマワリ"
# 「ねー、良かったでしょー！？　ライバルキャラが仲間になるのは鉄板ですよねー！」
line = "「ねー、良かったでしょー！？　ライバルキャラが仲間になるのは鉄板ですよねー！」"

[[dialogue]]
speaker = "unk"
# そして、ヒマワリオススメの激アツロボアニメは最終回までドハマリし、再び熱いロボ談義を交わすことになったのである。
line = "そして、ヒマワリオススメの激アツロボアニメは最終回までドハマリし、再び熱いロボ談義を交わすことになったのである。"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さん、またアキバデートしましょうね♪」
line = "「会長さん、またアキバデートしましょうね♪」"
