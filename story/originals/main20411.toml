[[dialogue]]
speaker = "unk"
# 第１１話,神の影,B
line = "第１１話,神の影,B"

[[dialogue]]
speaker = "unk"
# 放課後、俺が星徒会業務を行っていると、星徒会室の扉をノックする音が響いた。
line = "放課後、俺が星徒会業務を行っていると、星徒会室の扉をノックする音が響いた。"

[[dialogue]]
speaker = "梨緒"
# 「失礼する、緋宮クロト」
line = "「失礼する、緋宮クロト」"

[[dialogue]]
speaker = "梨緒"
# 「新星星徒会に共有したい情報があるんだが、時間はもらえるだろうか？　例の“真なる神”についてだ」
line = "「新星星徒会に共有したい情報があるんだが、時間はもらえるだろうか？　例の“真なる神”についてだ」"

[[dialogue]]
speaker = "クロト"
# 「ああ、もちろん聞くよ」
line = "「ああ、もちろん聞くよ」"

[[dialogue]]
speaker = "梨緒"
# 「選挙管理委員会で図書館の資料をあたってみたんだが、残念ながら“真なる神”の有力な情報は見つからなかった」
line = "「選挙管理委員会で図書館の資料をあたってみたんだが、残念ながら“真なる神”の有力な情報は見つからなかった」"

[[dialogue]]
speaker = "梨緒"
# 「だがアポロが言っていたんだ。“真なる神”とは、かつてバジュラ教団なる組織が信仰していた、チャカパラ神かもしれないと」
line = "「だがアポロが言っていたんだ。“真なる神”とは、かつてバジュラ教団なる組織が信仰していた、チャカパラ神かもしれないと」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "クロト"
# 「フィーニスの塔で出会った亡霊が、チャカパラ神は『女神を超越する存在』と言っていた……。確かに関係がありそうだ」
line = "「フィーニスの塔で出会った亡霊が、チャカパラ神は『女神を超越する存在』と言っていた……。確かに関係がありそうだ」"

[[dialogue]]
speaker = "梨緒"
# 「チャカパラ神やバジュラ教団についてわかっていることは？」
line = "「チャカパラ神やバジュラ教団についてわかっていることは？」"

[[dialogue]]
speaker = "クロト"
# 「あまり多くはないな。約３０００年前、リクリエを進めようと魔王ラクシスと対立していたことくらいだ」
line = "「あまり多くはないな。約３０００年前、リクリエを進めようと魔王ラクシスと対立していたことくらいだ」"

[[dialogue]]
speaker = "クロト"
# 「ネビュラには考古学者がいて、チャカパラ神について調べていた魔女がいたそうなんだけど……彼女がまとめた資料はある事件でほとんど失われてしまったらしい」
line = "「ネビュラには考古学者がいて、チャカパラ神について調べていた魔女がいたそうなんだけど……彼女がまとめた資料はある事件でほとんど失われてしまったらしい」"

[[dialogue]]
speaker = "梨緒"
# 「……そうか。なかなかうまくはいかないものだな」
line = "「……そうか。なかなかうまくはいかないものだな」"

[[dialogue]]
speaker = "梨緒"
# 「それとチャカパラ神のような『女神と異なる信仰』は、今までにいくつか存在するらしい。ベアトとナターシャが似た存在を知っていた」
line = "「それとチャカパラ神のような『女神と異なる信仰』は、今までにいくつか存在するらしい。ベアトとナターシャが似た存在を知っていた」"

[[dialogue]]
speaker = "梨緒"
# 「それが“真なる神”と関係するかはわからないが」
line = "「それが“真なる神”と関係するかはわからないが」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。星徒会でもチャカパラ神について調べてみるよ」
line = "「ありがとう。星徒会でもチャカパラ神について調べてみるよ」"

[[dialogue]]
speaker = "unk"
# 仮面を付けたリクリエの使徒は、人格や記憶を上書きされているようで、ある意味役を演じているようなものだ。
line = "仮面を付けたリクリエの使徒は、人格や記憶を上書きされているようで、ある意味役を演じているようなものだ。"

[[dialogue]]
speaker = "unk"
# ジグの言葉に意味があるとは限らないが、『女神を超越する存在』というのは気になった。バジュラ教団など他にも同様の発言をした者がいるのならば、注視する必要がある。
line = "ジグの言葉に意味があるとは限らないが、『女神を超越する存在』というのは気になった。バジュラ教団など他にも同様の発言をした者がいるのならば、注視する必要がある。"

[[dialogue]]
speaker = "梨緒"
# 「そしてもう１つ。私の素性に関してわかったことがある」
line = "「そしてもう１つ。私の素性に関してわかったことがある」"

[[dialogue]]
speaker = "梨緒"
# 「君とフィオナは、平行世界について教えてくれた。だからこの件は、私も伝えておく必要があると思ったんだ」
line = "「君とフィオナは、平行世界について教えてくれた。だからこの件は、私も伝えておく必要があると思ったんだ」"

[[dialogue]]
speaker = "unk"
# 梨緒はこの世界の『梨緒・Ａ・クリステレス』がすでに死亡していること、そして自身が平行世界ベガから来たであろうことを、淡々と話した。
line = "梨緒はこの世界の『梨緒・Ａ・クリステレス』がすでに死亡していること、そして自身が平行世界ベガから来たであろうことを、淡々と話した。"

[[dialogue]]
speaker = "クロト"
# 「……なるほど、経緯は理解した。でも落ち着いているんだな」
line = "「……なるほど、経緯は理解した。でも落ち着いているんだな」"

[[dialogue]]
speaker = "梨緒"
# 「まぁ、受け止めるのに多少の抵抗はあったがな」
line = "「まぁ、受け止めるのに多少の抵抗はあったがな」"

[[dialogue]]
speaker = "梨緒"
# 「だがやるべきことは変わらない。ジグを取り戻し、リクリエを止める。それだけだ」
line = "「だがやるべきことは変わらない。ジグを取り戻し、リクリエを止める。それだけだ」"

[[dialogue]]
speaker = "unk"
# 梨緒はこれからもリクリエと戦うと言う。
line = "梨緒はこれからもリクリエと戦うと言う。"

[[dialogue]]
speaker = "unk"
# しかしチナが現れ、あの宣戦布告をしてから気になっていることがあった。
line = "しかしチナが現れ、あの宣戦布告をしてから気になっていることがあった。"

[[dialogue]]
speaker = "クロト"
# 「だけど、もしチナが言っていたことが本当なら、今アルタイルとデネブが存続しているのは……」
line = "「だけど、もしチナが言っていたことが本当なら、今アルタイルとデネブが存続しているのは……」"

[[dialogue]]
speaker = "unk"
# ３つの世界でリクリエを押し付け合っているという説が本当なら、一時でもアルタイルに平穏が戻ったのは、ベガが滅んだ影響かもしれない。
line = "３つの世界でリクリエを押し付け合っているという説が本当なら、一時でもアルタイルに平穏が戻ったのは、ベガが滅んだ影響かもしれない。"

[[dialogue]]
speaker = "unk"
# ならアルタイルもデネブも、梨緒にとって許しがたい存在ではないのか……？
line = "ならアルタイルもデネブも、梨緒にとって許しがたい存在ではないのか……？"

[[dialogue]]
speaker = "梨緒"
# 「いいや。ベガが滅んだことが、アルタイルやデネブのせいだとは思っていない」
line = "「いいや。ベガが滅んだことが、アルタイルやデネブのせいだとは思っていない」"

[[dialogue]]
speaker = "梨緒"
# 「正直に言って、私は香堂チナの言葉をまるで信じていないんだ」
line = "「正直に言って、私は香堂チナの言葉をまるで信じていないんだ」"

[[dialogue]]
speaker = "クロト"
# 「どうしてそこまで言い切れるんだ？」
line = "「どうしてそこまで言い切れるんだ？」"

[[dialogue]]
speaker = "梨緒"
# 「簡単だ。あの手が、片方の世界を潰したところで、もう一方の世界を見逃すと思うか？」
line = "「簡単だ。あの手が、片方の世界を潰したところで、もう一方の世界を見逃すと思うか？」"

[[dialogue]]
speaker = "unk"
# ディザスターハンド。
line = "ディザスターハンド。"

[[dialogue]]
speaker = "unk"
# 極星学園やジグを超える、現在最大の脅威。
line = "極星学園やジグを超える、現在最大の脅威。"

[[dialogue]]
speaker = "unk"
# 間近で相対したからわかる。あれは破滅の化身だ。
line = "間近で相対したからわかる。あれは破滅の化身だ。"

[[dialogue]]
speaker = "梨緒"
# 「私の世界は破滅を迎えた」
line = "「私の世界は破滅を迎えた」"

[[dialogue]]
speaker = "梨緒"
# 「だからこそ思うんだ。他の平行世界を滅ぼしたところでリクリエは止まらない」
line = "「だからこそ思うんだ。他の平行世界を滅ぼしたところでリクリエは止まらない」"

[[dialogue]]
speaker = "梨緒"
# 「例の動画も見た。香堂チナは言葉の通りの内容を信じているんだろうが……」
line = "「例の動画も見た。香堂チナは言葉の通りの内容を信じているんだろうが……」"

[[dialogue]]
speaker = "梨緒"
# 「片方が消えれば、もう片方が生き残る──私に言わせるなら、それは希望的観測だ」
line = "「片方が消えれば、もう片方が生き残る──私に言わせるなら、それは希望的観測だ」"

[[dialogue]]
speaker = "クロト"
# 「……なるほど」
line = "「……なるほど」"

[[dialogue]]
speaker = "unk"
# 梨緒の見立ては、ある意味チナや煌嶺よりも過酷で厳しい。
line = "梨緒の見立ては、ある意味チナや煌嶺よりも過酷で厳しい。"

[[dialogue]]
speaker = "unk"
# だが今までリクリエと対峙してきたなら、頷けるものではあった。
line = "だが今までリクリエと対峙してきたなら、頷けるものではあった。"

[[dialogue]]
speaker = "梨緒"
# 「それにジグの動きも気になる」
line = "「それにジグの動きも気になる」"

[[dialogue]]
speaker = "梨緒"
# 「ジグは積極的に介入することなく、アルタイルとデネブの星騎士の衝突を観察しようとしていた。リクリエの使徒なら、私たちもチナも敵であるはずなのに」
line = "「ジグは積極的に介入することなく、アルタイルとデネブの星騎士の衝突を観察しようとしていた。リクリエの使徒なら、私たちもチナも敵であるはずなのに」"

[[dialogue]]
speaker = "梨緒"
# 「彼女には何か思惑がある。元々飄々としていて真意が掴みにくいところはあったが、理由なく敵を見逃すようなやつではない」
line = "「彼女には何か思惑がある。元々飄々としていて真意が掴みにくいところはあったが、理由なく敵を見逃すようなやつではない」"

[[dialogue]]
speaker = "梨緒"
# 「そしてアルタイルとデネブが戦い消耗すれば、最後に笑うのはリクリエだ」
line = "「そしてアルタイルとデネブが戦い消耗すれば、最後に笑うのはリクリエだ」"

[[dialogue]]
speaker = "unk"
# ジグを唯一知る者として意見をくれるのはありがたい。
line = "ジグを唯一知る者として意見をくれるのはありがたい。"

[[dialogue]]
speaker = "unk"
# リクリエの使徒の動きを考えれば、軽々にデネブとの戦いを決断すべきでないように思える。
line = "リクリエの使徒の動きを考えれば、軽々にデネブとの戦いを決断すべきでないように思える。"

[[dialogue]]
speaker = "梨緒"
# 「そして最後に。選挙管理委員会として、星徒会の監視は継続中だ。星徒会長として恥ずかしくない行動を心がけるように」
line = "「そして最後に。選挙管理委員会として、星徒会の監視は継続中だ。星徒会長として恥ずかしくない行動を心がけるように」"

[[dialogue]]
speaker = "unk"
# ピシッと姿勢を正して、鋭い視線を向けてくる梨緒。
line = "ピシッと姿勢を正して、鋭い視線を向けてくる梨緒。"

[[dialogue]]
speaker = "unk"
# こんな時でもぶれないというか、真面目というか……平行世界の星徒会で副会長をしていたのも頷ける。
line = "こんな時でもぶれないというか、真面目というか……平行世界の星徒会で副会長をしていたのも頷ける。"

[[dialogue]]
speaker = "unk"
# そんな梨緒だからこそ、頼めることがある。
line = "そんな梨緒だからこそ、頼めることがある。"

[[dialogue]]
speaker = "クロト"
# 「選管の梨緒に手伝ってほしいことがあるんだが、いいか？」
line = "「選管の梨緒に手伝ってほしいことがあるんだが、いいか？」"

[[dialogue]]
speaker = "梨緒"
# 「？　選管の？」
line = "「？　選管の？」"
