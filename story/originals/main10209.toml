line = "「美鶴！　私の声、聞こえてる！？」"

[[dialogue]]
speaker = "美鶴"
# 「……ん？」
line = "「……ん？」"

[[dialogue]]
speaker = "ヨミ"
# 「美鶴さん、戻ってきてください！」
line = "「美鶴さん、戻ってきてください！」"

[[dialogue]]
speaker = "美鶴"
# 「あ……メイド長、ヨミー。おはよ」
line = "「あ……メイド長、ヨミー。おはよ」"

[[dialogue]]
speaker = "蘭美"
# 「寝ぼけてるの？　一旦止まりなさい」
line = "「寝ぼけてるの？　一旦止まりなさい」"

[[dialogue]]
speaker = "美鶴"
# 「え……？　あー、あー……そっか、うち、ずっと戦ってたんだっ──いたたた……！？　体バッキバキなんだけど」
line = "「え……？　あー、あー……そっか、うち、ずっと戦ってたんだっ──いたたた……！？　体バッキバキなんだけど」"

[[dialogue]]
speaker = "せつな"
# 「あれだけのスピードで、あれだけの数を相手にしてたら当たり前でござるよ」
line = "「あれだけのスピードで、あれだけの数を相手にしてたら当たり前でござるよ」"

[[dialogue]]
speaker = "ヨミ"
# 「生きてるのが不思議なくらいです……生きてますよね？　お化けとかじゃないですよね？」
line = "「生きてるのが不思議なくらいです……生きてますよね？　お化けとかじゃないですよね？」"

[[dialogue]]
speaker = "美鶴"
# 「……うち、そんなスゴかった？」
line = "「……うち、そんなスゴかった？」"

[[dialogue]]
speaker = "閃"
# 「自覚ないんですか！？　八面六臂の大活躍でしたよ」
line = "「自覚ないんですか！？　八面六臂の大活躍でしたよ」"

[[dialogue]]
speaker = "美鶴"
# 「やー……うち、没頭しちゃうと周りのことがよくわかんなくなるんで」
line = "「やー……うち、没頭しちゃうと周りのことがよくわかんなくなるんで」"

[[dialogue]]
speaker = "美鶴"
# 「とにかく、目の前の敵を片っ端からぶっ刺してたと思うんだけど……途中の記憶が、あんまないね」
line = "「とにかく、目の前の敵を片っ端からぶっ刺してたと思うんだけど……途中の記憶が、あんまないね」"

[[dialogue]]
speaker = "蘭美"
# 「呆れたものね。今みたいな『ゾーン』に入ることはよくあるの？」
line = "「呆れたものね。今みたいな『ゾーン』に入ることはよくあるの？」"

[[dialogue]]
speaker = "美鶴"
# 「服作ってると、よくありますね。時間を忘れて夢中で縫ってたら、外が明るくなってた、みたいな」
line = "「服作ってると、よくありますね。時間を忘れて夢中で縫ってたら、外が明るくなってた、みたいな」"

[[dialogue]]
speaker = "せつな"
# 「無我の境地というヤツでござるか？　格好いいでござるぅ……せつなも会得したいでござるよ！　美鶴殿、ご教授くだされ！」
line = "「無我の境地というヤツでござるか？　格好いいでござるぅ……せつなも会得したいでござるよ！　美鶴殿、ご教授くだされ！」"

[[dialogue]]
speaker = "蘭美"
# 「やめときなさい。美鶴ほどの没頭、誰にでもできるようなものじゃないわ。特にあなたみたいな煩悩まみれじゃね」
line = "「やめときなさい。美鶴ほどの没頭、誰にでもできるようなものじゃないわ。特にあなたみたいな煩悩まみれじゃね」"

[[dialogue]]
speaker = "せつな"
# 「酷い言われようでござるぅ」
line = "「酷い言われようでござるぅ」"

[[dialogue]]
speaker = "美鶴"
# 「誰にでもできるもんじゃないんすか……ま、なんでもいーや。うちがみんなの役に立てたんならバンバンザイ」
line = "「誰にでもできるもんじゃないんすか……ま、なんでもいーや。うちがみんなの役に立てたんならバンバンザイ」"

[[dialogue]]
speaker = "蘭美"
# 「世の中の全部に興味なさそうな顔しといて……何よ、あなたの胸にも熱いモノがあるのね」
line = "「世の中の全部に興味なさそうな顔しといて……何よ、あなたの胸にも熱いモノがあるのね」"

[[dialogue]]
speaker = "美鶴"
# 「うちの胸？　おっぱい？　メイド長のえっち」
line = "「うちの胸？　おっぱい？　メイド長のえっち」"

[[dialogue]]
speaker = "蘭美"
# 「ハートよ、ハート！　文脈で察しなさいよ！」
line = "「ハートよ、ハート！　文脈で察しなさいよ！」"

[[dialogue]]
speaker = "せつな"
# 「えっちでござるか！？」
line = "「えっちでござるか！？」"

[[dialogue]]
speaker = "蘭美"
# 「そこだけに反応するんじゃないの、エロ忍者！」
line = "「そこだけに反応するんじゃないの、エロ忍者！」"

[[dialogue]]
speaker = "美鶴"
# 「わかってますって、メイド長」
line = "「わかってますって、メイド長」"

[[dialogue]]
speaker = "美鶴"
# 「でも、ハートがメラメラしてんのを認めるのって……ちょっと恥ずいじゃないですか」
line = "「でも、ハートがメラメラしてんのを認めるのって……ちょっと恥ずいじゃないですか」"

[[dialogue]]
speaker = "蘭美"
# 「ふふ、何を恥ずかしがることがあるのよ。バカね」
line = "「ふふ、何を恥ずかしがることがあるのよ。バカね」"

[[dialogue]]
speaker = "蘭美"
# 「キツい戦いだったけど、あなたの人間味に触れられたのは大きな収穫だわ」
line = "「キツい戦いだったけど、あなたの人間味に触れられたのは大きな収穫だわ」"

[[dialogue]]
speaker = "ヨミ"
# 「美鶴さん、格好良かったですよ。先ほどの戦いぶり、鬼神が如しでした！」
line = "「美鶴さん、格好良かったですよ。先ほどの戦いぶり、鬼神が如しでした！」"

[[dialogue]]
speaker = "閃"
# 「お嬢様に次ぐほどの美しさでした。戦闘中ということも忘れて、見惚れてしまいそうでしたよ」
line = "「お嬢様に次ぐほどの美しさでした。戦闘中ということも忘れて、見惚れてしまいそうでしたよ」"

[[dialogue]]
speaker = "美鶴"
# 「なに、みんなして、うちのこと褒め殺すつもり？　てか、まだ全部片づいてないみたいなんだけど」
line = "「なに、みんなして、うちのこと褒め殺すつもり？　てか、まだ全部片づいてないみたいなんだけど」"

[[dialogue]]
speaker = "ヨミ"
# 「えええ！？　今たくさん倒したはずなんですけど！？」
line = "「えええ！？　今たくさん倒したはずなんですけど！？」"

[[dialogue]]
speaker = "せつな"
# 「大量の増援部隊が即湧きだなんて、バランス崩壊もいいとこでござるな」
line = "「大量の増援部隊が即湧きだなんて、バランス崩壊もいいとこでござるな」"

[[dialogue]]
speaker = "美鶴"
# 「しゃーない。もうひと働き──あれ？　体が動かない」
line = "「しゃーない。もうひと働き──あれ？　体が動かない」"

[[dialogue]]
speaker = "蘭美"
# 「あれだけ暴れてたなら反動が来て当然でしょ。無茶をしたら、それなりの代償があるものよ」
line = "「あれだけ暴れてたなら反動が来て当然でしょ。無茶をしたら、それなりの代償があるものよ」"

[[dialogue]]
speaker = "美鶴"
# 「こりゃ明日は１００パー筋肉痛だー。ベッドから動けなくなるヤツー」
line = "「こりゃ明日は１００パー筋肉痛だー。ベッドから動けなくなるヤツー」"

[[dialogue]]
speaker = "ヨミ"
# 「明日はゆっくり休んでていいですよ。美鶴さんの仕事は、私たちが代わりにやりますんで」
line = "「明日はゆっくり休んでていいですよ。美鶴さんの仕事は、私たちが代わりにやりますんで」"

[[dialogue]]
speaker = "閃"
# 「ただし、私たちが無事に今を乗り越えて、明日を迎えられれば、ですけどね」
line = "「ただし、私たちが無事に今を乗り越えて、明日を迎えられれば、ですけどね」"

[[dialogue]]
speaker = "蘭美"
# 「部下のあなたがあれだけの仕事をしてくれたんだもの。私ももっと働かなきゃメイド長の名折れだわ」
line = "「部下のあなたがあれだけの仕事をしてくれたんだもの。私ももっと働かなきゃメイド長の名折れだわ」"

[[dialogue]]
speaker = "蘭美"
# 「ちょっとうるさいだろうけど、そこでしばらく休んでいなさい。その間くらいは私たちで持ちこたえてあげるから」
line = "「ちょっとうるさいだろうけど、そこでしばらく休んでいなさい。その間くらいは私たちで持ちこたえてあげるから」"

[[dialogue]]
speaker = "美鶴"
# 「メイド長、カッコよ」
line = "「メイド長、カッコよ」"

[[dialogue]]
speaker = "？？？"
# 「ふふ。ならば、私は蘭美以上に気張らなくてはなるまい」
line = "「ふふ。ならば、私は蘭美以上に気張らなくてはなるまい」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿らを預かる当主としてな。ヘレナちゃん、颯爽と登場だ」
line = "「貴殿らを預かる当主としてな。ヘレナちゃん、颯爽と登場だ」"

[[dialogue]]
speaker = "蘭美"
# 「ご当主様！？」
line = "「ご当主様！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「よくここまで支えてくれた、メイド隊たちよ。貴殿らを召し抱えることができたことこそ私の自慢だ」
line = "「よくここまで支えてくれた、メイド隊たちよ。貴殿らを召し抱えることができたことこそ私の自慢だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「これが貴殿らが仕える九浄家当主の力だ。とくと目に焼きつけよ！」
line = "「これが貴殿らが仕える九浄家当主の力だ。とくと目に焼きつけよ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「花よ集え、豪華絢爛！」
line = "「花よ集え、豪華絢爛！」"

[[dialogue]]
speaker = "せつな"
# 「う、うわぁ……敵勢力壊滅でござる……！」
line = "「う、うわぁ……敵勢力壊滅でござる……！」"

[[dialogue]]
speaker = "美鶴"
# 「もう全部、当主様だけで良かったじゃん」
line = "「もう全部、当主様だけで良かったじゃん」"

[[dialogue]]
speaker = "ヨミ"
# 「それを言ってはおしまいな気がします」
line = "「それを言ってはおしまいな気がします」"

[[dialogue]]
speaker = "ヘレナ"
# 「遅れてしまってすまない。どうしてもあの場を離れられなかったものでな」
line = "「遅れてしまってすまない。どうしてもあの場を離れられなかったものでな」"

[[dialogue]]
speaker = "ヘレナ"
# 「大活躍だったようだな、美鶴」
line = "「大活躍だったようだな、美鶴」"

[[dialogue]]
speaker = "美鶴"
# 「そーですね。今回ばかりはさすがに頑張りすぎましたよー」
line = "「そーですね。今回ばかりはさすがに頑張りすぎましたよー」"

[[dialogue]]
speaker = "美鶴"
# 「働きぶりを査定していただけるなら、特別ボーナスいただけたりしますー？」
line = "「働きぶりを査定していただけるなら、特別ボーナスいただけたりしますー？」"

[[dialogue]]
speaker = "蘭美"
# 「ちょっ！？　ご当主様のアレを見ておいて、よくそんな口叩けるものね……！」
line = "「ちょっ！？　ご当主様のアレを見ておいて、よくそんな口叩けるものね……！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふ、いいとも」
line = "「ふふ、いいとも」"

[[dialogue]]
speaker = "美鶴"
# 「え、マジすか。言ってみるもんですね」
line = "「え、マジすか。言ってみるもんですね」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヴィーナスが無事に帰還した記念でもある。皆にも振る舞うとしよう」
line = "「ヴィーナスが無事に帰還した記念でもある。皆にも振る舞うとしよう」"

[[dialogue]]
speaker = "美鶴"
# 「それはおめでた……ん？　んんん？」
line = "「それはおめでた……ん？　んんん？」"

[[dialogue]]
speaker = "閃"
# 「当主様、今、なんと！？　お嬢様が！？　戻られた！？　しれっと爆弾発言されましたね！？」
line = "「当主様、今、なんと！？　お嬢様が！？　戻られた！？　しれっと爆弾発言されましたね！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふ、皆に朗報だ。ヴィーナスは無事に帰還した。さすがは我が娘。もちろん、元より心配などしていなかったがな」
line = "「ふふ、皆に朗報だ。ヴィーナスは無事に帰還した。さすがは我が娘。もちろん、元より心配などしていなかったがな」"

[[dialogue]]
speaker = "ヨミ"
# 「つまり、到着が遅れられたのは……？」
line = "「つまり、到着が遅れられたのは……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。ヴィーナス帰還の報を受けていたためだ。一刻も早く駆け付けたかったのだが、場を離れられなくてな」
line = "「うむ。ヴィーナス帰還の報を受けていたためだ。一刻も早く駆け付けたかったのだが、場を離れられなくてな」"

[[dialogue]]
speaker = "閃"
# 「お、お、お嬢様ぁあぁぁぁぁっ……ご無事で、良かった……！　それで？　お嬢様は何処へ！？」
line = "「お、お、お嬢様ぁあぁぁぁぁっ……ご無事で、良かった……！　それで？　お嬢様は何処へ！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヴィーナス、並びに緋宮クロトたちは、アポロ打倒のため、フィーニスの塔へと向かった」
line = "「ヴィーナス、並びに緋宮クロトたちは、アポロ打倒のため、フィーニスの塔へと向かった」"

[[dialogue]]
speaker = "蘭美"
# 「こんな街中の小競り合いじゃなくて、世界の命運をかけた戦い、ですね」
line = "「こんな街中の小競り合いじゃなくて、世界の命運をかけた戦い、ですね」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。世界の命運は、ヴィーナスたちに託された」
line = "「うむ。世界の命運は、ヴィーナスたちに託された」"

[[dialogue]]
speaker = "閃"
# 「さぁ、皆さん！　お嬢様たちが後顧の憂いなく戦えるよう、全力を尽くしましょう！」
line = "「さぁ、皆さん！　お嬢様たちが後顧の憂いなく戦えるよう、全力を尽くしましょう！」"

[[dialogue]]
speaker = "せつな"
# 「閃殿、お嬢様が無事だと分かった途端、すこぶる元気になったでござるな」
line = "「閃殿、お嬢様が無事だと分かった途端、すこぶる元気になったでござるな」"

[[dialogue]]
speaker = "ヨミ"
# 「閃さんには、お嬢様の存在が何よりのカンフル剤ですからね」
line = "「閃さんには、お嬢様の存在が何よりのカンフル剤ですからね」"

[[dialogue]]
speaker = "美鶴"
# 「おかげで、うちも立ち上がるくらいはできそ。このままおねんねしてるワケには行かないね」
line = "「おかげで、うちも立ち上がるくらいはできそ。このままおねんねしてるワケには行かないね」"

[[dialogue]]
speaker = "ヘレナ"
# 「九浄家メイド隊、全隊員に命ずる！　残存アステラをひとつ残らず掃討せよ！」
line = "「九浄家メイド隊、全隊員に命ずる！　残存アステラをひとつ残らず掃討せよ！」"

[[dialogue]]
speaker = "九浄家メイド隊"
# 「了解っ！」
line = "「了解っ！」"
