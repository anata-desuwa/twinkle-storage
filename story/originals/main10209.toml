line = "（また一段と大きなモノがうちの前に立ちはだかる。それでも、うちのやることは変わらない）"

[[dialogue]]
speaker = "美鶴"
# （どんなモノだって、的確に弱点を突けば─）
line = "（どんなモノだって、的確に弱点を突けば─）"

[[dialogue]]
speaker = "美鶴"
# （確実に、倒せる）
line = "（確実に、倒せる）"

[[dialogue]]
speaker = "美鶴"
# 「次……」
line = "「次……」"

[[dialogue]]
speaker = "蘭美"
