[[dialogue]]
speaker = "unk"
# 第１１話,逃走,B
line = "第１１話,逃走,B"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぅ、フィーニスの塔を脱出できたわね。ラクシャのおかげで降りるのは早かったわ」
line = "「ふぅ、フィーニスの塔を脱出できたわね。ラクシャのおかげで降りるのは早かったわ」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル──！」
line = "「ブルルル──！」"

[[dialogue]]
speaker = "フィオナ"
# 「！　極星従騎……予想以上に対応が早かったですね」
line = "「！　極星従騎……予想以上に対応が早かったですね」"

[[dialogue]]
speaker = "リノ"
# 『今魔法であなたたちに呼びかけてるんだけど、みんな聞こえてる？　塔の中で何かわかった？』
line = "『今魔法であなたたちに呼びかけてるんだけど、みんな聞こえてる？　塔の中で何かわかった？』"

[[dialogue]]
speaker = "ヴィーナス"
# 「おばあちゃん！」
line = "「おばあちゃん！」"

[[dialogue]]
speaker = "クロト"
# 「詳しく話してる時間はないけど、ルヴィネは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』によって生み出された、新しい女神だったんだ」
line = "「詳しく話してる時間はないけど、ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によって生み出された、新しい女神だったんだ」"

[[dialogue]]
speaker = "リノ"
# 『つまりルヴィネはリクリエの側で、やっぱり敵だったってわけね。よく頑張ったわ』
line = "『つまりルヴィネはリクリエの側で、やっぱり敵だったってわけね。よく頑張ったわ』"

[[dialogue]]
speaker = "リノ"
# 『極星従騎が集まっていることは把握してるわ。細かい話はいいから、言った通り教皇庁に来て！　あなたたちをアルタイルに帰すわ！』
line = "『極星従騎が集まっていることは把握してるわ。細かい話はいいから、言った通り教皇庁に来て！　あなたたちをアルタイルに帰すわ！』"

[[dialogue]]
speaker = "unk"
# 秘密基地を出発する前──
line = "秘密基地を出発する前──"

[[dialogue]]
speaker = "リノ"
# 「教皇庁にある時空の穴を使って、アルタイルに帰るのよ」
line = "「教皇庁にある時空の穴を使って、アルタイルに帰るのよ」"

[[dialogue]]
speaker = "リノ"
# 「私の力だけでは平行世界を渡ることはできない。でもすでに穴が空いているなら話が別だわ」
line = "「私の力だけでは平行世界を渡ることはできない。でもすでに穴が空いているなら話が別だわ」"

[[dialogue]]
speaker = "リノ"
# 「あの穴は、そのままではどこに出るかわからないし、通るだけでも命懸け。だから魔法でアルタイルに繋げて、安全に通れるようにするの」
line = "「あの穴は、そのままではどこに出るかわからないし、通るだけでも命懸け。だから魔法でアルタイルに繋げて、安全に通れるようにするの」"

[[dialogue]]
speaker = "クロト"
# 「そんなことできるの？」
line = "「そんなことできるの？」"

[[dialogue]]
speaker = "リノ"
# 「ええ、『空間の魔女』と呼ばれた私の力ならね」
line = "「ええ、『空間の魔女』と呼ばれた私の力ならね」"

[[dialogue]]
speaker = "リノ"
# 「今までも平行世界の研究はしてきたけど、あなたたちが来てくれたことで必要なデータが揃って、ようやく実現できそうなの」
line = "「今までも平行世界の研究はしてきたけど、あなたたちが来てくれたことで必要なデータが揃って、ようやく実現できそうなの」"

[[dialogue]]
speaker = "リノ"
# 「フィーニスの塔で何が起こるかはわからないわ。だからいつでもアルタイルに帰れるように準備しておくわね」
line = "「フィーニスの塔で何が起こるかはわからないわ。だからいつでもアルタイルに帰れるように準備しておくわね」"

[[dialogue]]
speaker = "クロト"
# 「教皇庁に向かうぞ、みんな！」
line = "「教皇庁に向かうぞ、みんな！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、飛ばすわよ！」
line = "「ええ、飛ばすわよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "梨緒"
# 「選挙管理委員会もついてきてくれ！」
line = "「選挙管理委員会もついてきてくれ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「はーい」
line = "「はーい」"

[[dialogue]]
speaker = "ベアトリス"
# 「う、うん……！」
line = "「う、うん……！」"

[[dialogue]]
speaker = "unk"
# 追いかけてくる極星従騎を無視し、人目も気にせず全力で飛ぶ。
line = "追いかけてくる極星従騎を無視し、人目も気にせず全力で飛ぶ。"

[[dialogue]]
speaker = "unk"
# だが俺たちの前にガーディアンが立ちふさがる。
line = "だが俺たちの前にガーディアンが立ちふさがる。"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルルル……！」
line = "「ブルルルル……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「おや、前からも来ちゃったね。挟まれちゃったかな」
line = "「おや、前からも来ちゃったね。挟まれちゃったかな」"

[[dialogue]]
speaker = "梨緒"
# 「呑気に言ってる場合じゃないぞ！　ここで足を止めれば極星従騎が集まってくる！」
line = "「呑気に言ってる場合じゃないぞ！　ここで足を止めれば極星従騎が集まってくる！」"

[[dialogue]]
speaker = "unk"
# 目の前に飛来した極星従騎を、青く輝く一閃が切り裂いた。
line = "目の前に飛来した極星従騎を、青く輝く一閃が切り裂いた。"

[[dialogue]]
speaker = "エステル"
# 「皆様、ご無事ですか！？」
line = "「皆様、ご無事ですか！？」"

[[dialogue]]
speaker = "クロト"
# 「エステル！　ああ、俺たちは大丈夫だ。ラクシャは塔の中に残してきてしまったけど……」
line = "「エステル！　ああ、俺たちは大丈夫だ。ラクシャは塔の中に残してきてしまったけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たち、今、教皇庁に向かってるの！」
line = "「私たち、今、教皇庁に向かってるの！」"

[[dialogue]]
speaker = "エステル"
# 「でしたらこちらに。東側ならまだ手薄です」
line = "「でしたらこちらに。東側ならまだ手薄です」"

[[dialogue]]
speaker = "unk"
# エステルの後に続いて、全速力で空を走る。
line = "エステルの後に続いて、全速力で空を走る。"

[[dialogue]]
speaker = "unk"
# 俺たちに協力すればエステルだって危ういだろうに、彼女には助けられっぱなしだ。
line = "俺たちに協力すればエステルだって危ういだろうに、彼女には助けられっぱなしだ。"

[[dialogue]]
speaker = "ベアトリス"
# 「あの、エステルちゃん、ルヴィのことなんだけど……」
line = "「あの、エステルちゃん、ルヴィのことなんだけど……」"

[[dialogue]]
speaker = "エステル"
# 「ルヴィネ会長がどうされました？　魔王様への誤解は解けたのですか？」
line = "「ルヴィネ会長がどうされました？　魔王様への誤解は解けたのですか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「いや、それが……」
line = "「いや、それが……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめん、後で話すよ。今はそれどころじゃないから」
line = "「ごめん、後で話すよ。今はそれどころじゃないから」"

[[dialogue]]
speaker = "エステル"
# 「わかりました。では後ほどお聞かせください」
line = "「わかりました。では後ほどお聞かせください」"

[[dialogue]]
speaker = "エステル"
# 「そろそろ教皇庁に到着します──！」
line = "「そろそろ教皇庁に到着します──！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お、来たな。ちゃんと全員揃って──いや、ラクシャがいないな」
line = "「お、来たな。ちゃんと全員揃って──いや、ラクシャがいないな」"

[[dialogue]]
speaker = "クロト"
# 「ラクシャは塔に残って俺たちを助けてくれた」
line = "「ラクシャは塔に残って俺たちを助けてくれた」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「──そうか。だが、お前たちだけでもよく帰ってきた。いい子だ」
line = "「──そうか。だが、お前たちだけでもよく帰ってきた。いい子だ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ところでその星騎士は？　極星のか？」
line = "「ところでその星騎士は？　極星のか？」"

[[dialogue]]
speaker = "エステル"
# 「極星学園１年、エステル・ミルフォードです。ええと、あの、あなたは……？」
line = "「極星学園１年、エステル・ミルフォードです。ええと、あの、あなたは……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「レジスタンスのアポロだ。お前は魔王の敵じゃないってことでいいんだよな？」
line = "「レジスタンスのアポロだ。お前は魔王の敵じゃないってことでいいんだよな？」"

[[dialogue]]
speaker = "エステル"
# 「はい、私の意志で魔王様についてきました」
line = "「はい、私の意志で魔王様についてきました」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ならいい。ったく、相変わらず魔王はモテモテだな」
line = "「ならいい。ったく、相変わらず魔王はモテモテだな」"

[[dialogue]]
speaker = "リノ"
# 「おかえり、クロト、ヴィーナスちゃん、フィオナちゃん。選管のみんなも怪我はなさそうね」
line = "「おかえり、クロト、ヴィーナスちゃん、フィオナちゃん。選管のみんなも怪我はなさそうね」"

[[dialogue]]
speaker = "リノ"
# 「それじゃいくわよ──！」
line = "「それじゃいくわよ──！」"

[[dialogue]]
speaker = "unk"
# 母さんがそう言ってロッドを構えると、空に時空の裂け目が開いた。
line = "母さんがそう言ってロッドを構えると、空に時空の裂け目が開いた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「空に空間の穴が……！　さすがおばあちゃんね！」
line = "「空に空間の穴が……！　さすがおばあちゃんね！」"

[[dialogue]]
speaker = "リノ"
# 「ふふふっ、孫にそう言われると嬉しくなっちゃうわね！」
line = "「ふふふっ、孫にそう言われると嬉しくなっちゃうわね！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスに飛び切りの笑顔を見せる母さん。
line = "ヴィーナスに飛び切りの笑顔を見せる母さん。"

[[dialogue]]
speaker = "unk"
# だけどその横顔は血の気が引き、青ざめていた。
line = "だけどその横顔は血の気が引き、青ざめていた。"

[[dialogue]]
speaker = "クロト"
# 「母さん、無理してない？」
line = "「母さん、無理してない？」"

[[dialogue]]
speaker = "リノ"
# 「最近、研究続きであんまり寝てなかったから、ちょっと疲れが出てるのかもね。ま、落ち着いたらぐっすり寝るわ」
line = "「最近、研究続きであんまり寝てなかったから、ちょっと疲れが出てるのかもね。ま、落ち着いたらぐっすり寝るわ」"

[[dialogue]]
speaker = "リノ"
# 「今アルタイルに繋いでるから、ちょっと待ってて」
line = "「今アルタイルに繋いでるから、ちょっと待ってて」"

[[dialogue]]
speaker = "クロト"
# 「……うん、ありがとう、母さん」
line = "「……うん、ありがとう、母さん」"

[[dialogue]]
speaker = "unk"
# おそらく相当な無茶をしているのだろう。
line = "おそらく相当な無茶をしているのだろう。"

[[dialogue]]
speaker = "unk"
# 強がりだとわかってはいても、今は母さんを頼るほかなかった。
line = "強がりだとわかってはいても、今は母さんを頼るほかなかった。"

[[dialogue]]
speaker = "梨緒"
# 「──！　来るぞ！！」
line = "「──！　来るぞ！！」"

[[dialogue]]
speaker = "unk"
# 梨緒が空を見上げると同時、破滅の手が俺たちへと迫りくる──！
line = "梨緒が空を見上げると同時、破滅の手が俺たちへと迫りくる──！"
