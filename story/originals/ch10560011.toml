[[dialogue]]
speaker = "unk"
# 第１話,宣戦布告！,P
line = "第１話,宣戦布告！,P"

[[dialogue]]
speaker = "unk"
# 御前試合でヴィーナスを倒し、俺が新星学園の星徒会長となってしばらく経ったある日。
line = "御前試合でヴィーナスを倒し、俺が新星学園の星徒会長となってしばらく経ったある日。"

[[dialogue]]
speaker = "unk"
# 星徒会室で仕事をしていた俺の元へ、１人の少女が訪ねて来たのだった──
line = "星徒会室で仕事をしていた俺の元へ、１人の少女が訪ねて来たのだった──"

[[dialogue]]
speaker = "？？？"
# 「──というわけで！　あたしはあなたが会長であることを認めていない！」
line = "「──というわけで！　あたしはあなたが会長であることを認めていない！」"

[[dialogue]]
speaker = "unk"
# いきなり何！？
line = "いきなり何！？"

[[dialogue]]
speaker = "？？？"
# 「うん……こうして間近で見るとやっぱり疑問だよ。こーんなひょろっちい男子がヴィーナス会長に勝てるわけないもん」
line = "「うん……こうして間近で見るとやっぱり疑問だよ。こーんなひょろっちい男子がヴィーナス会長に勝てるわけないもん」"

[[dialogue]]
speaker = "？？？"
# 「魔王って噂だし、きっと何か卑怯な手を使ったに違いないよね。今日はそれを暴きに来たの！」
line = "「魔王って噂だし、きっと何か卑怯な手を使ったに違いないよね。今日はそれを暴きに来たの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何だか騒がしいと思ったら……やっぱりアム。あなただったのね」
line = "「何だか騒がしいと思ったら……やっぱりアム。あなただったのね」"

[[dialogue]]
speaker = "アム"
# 「ぁ──ヴィーナス会長っ！　ご無沙汰してます！」
line = "「ぁ──ヴィーナス会長っ！　ご無沙汰してます！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まだその役職で呼ぶの？　私のことは前会長って呼ぶように何度も……最近だと昨日の夜にもそう言ったじゃない」
line = "「まだその役職で呼ぶの？　私のことは前会長って呼ぶように何度も……最近だと昨日の夜にもそう言ったじゃない」"

[[dialogue]]
speaker = "unk"
# ヴィーナス、この子は誰？
line = "ヴィーナス、この子は誰？"

[[dialogue]]
speaker = "アム"
# 「ぅえっ？　……あ、あたしのこと、まさか知らない！？　嘘だぁ！？」
line = "「ぅえっ？　……あ、あたしのこと、まさか知らない！？　嘘だぁ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトはまだ附属生の顔までは覚えていないのよ。まぁアムを知らない生徒も珍しいとは思うけど」
line = "「クロトはまだ附属生の顔までは覚えていないのよ。まぁアムを知らない生徒も珍しいとは思うけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「彼女は白楯アム。流星学園附属３年生の星騎士で……そうね。見てのとおり元気な子よ！」
line = "「彼女は白楯アム。流星学園附属３年生の星騎士で……そうね。見てのとおり元気な子よ！」"

[[dialogue]]
speaker = "アム"
# 「はい！　いつでも元気です！　元気じゃないと戦はできないからね！」
line = "「はい！　いつでも元気です！　元気じゃないと戦はできないからね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「言っておくけどとても優秀よ？　新星、流星をひっくるめても彼女以上の防御能力を持つ盾使いはいないと断言できるわ」
line = "「言っておくけどとても優秀よ？　新星、流星をひっくるめても彼女以上の防御能力を持つ盾使いはいないと断言できるわ」"

[[dialogue]]
speaker = "アム"
# 「ふっふーん……その通り！　そしてあたしは、ヴィーナス会長のライバル！」
line = "「ふっふーん……その通り！　そしてあたしは、ヴィーナス会長のライバル！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「訓練のアドバイスに乗っていたら、いつの間にかそんなことになってたのよね」
line = "「訓練のアドバイスに乗っていたら、いつの間にかそんなことになってたのよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、私に懐いてくれているせいかしら。アムはクロトの会長就任を認めていないのよ」
line = "「で、私に懐いてくれているせいかしら。アムはクロトの会長就任を認めていないのよ」"

[[dialogue]]
speaker = "アム"
# 「当然です！　ヴィーナス会長が負けるだなんて信じられない……試合の日は、そう、きっと調子が良くなかったんだよ！」
line = "「当然です！　ヴィーナス会長が負けるだなんて信じられない……試合の日は、そう、きっと調子が良くなかったんだよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アム。何度も言っているでしょ。私は万全だった。それをクロトが実力で上回っただけ」
line = "「アム。何度も言っているでしょ。私は万全だった。それをクロトが実力で上回っただけ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私を超えようと努力してくれるのは嬉しいけれど、現実は認めないといけないわ」
line = "「私を超えようと努力してくれるのは嬉しいけれど、現実は認めないといけないわ」"

[[dialogue]]
speaker = "アム"
# 「そんな……ヴィーナス会長」
line = "「そんな……ヴィーナス会長」"

[[dialogue]]
speaker = "ヴィーナス"
# 「違うわよ。『前会長』ね」
line = "「違うわよ。『前会長』ね」"

[[dialogue]]
speaker = "アム"
# 「うぅっ……」
line = "「うぅっ……」"

[[dialogue]]
speaker = "unk"
# ライバルを横取りしちゃったのか
line = "ライバルを横取りしちゃったのか"

[[dialogue]]
speaker = "アム"
# 「そうだよっ。ヴィーナス……前会長を倒すのはあたし。ずっとそう思って苦しい鍛錬にも耐えてきたのに！」
line = "「そうだよっ。ヴィーナス……前会長を倒すのはあたし。ずっとそう思って苦しい鍛錬にも耐えてきたのに！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アム……」
line = "「アム……」"

[[dialogue]]
speaker = "アム"
# 「おまけにあの就任劇……うぅううっ──羨ましいぃぃい～っ！！」
line = "「おまけにあの就任劇……うぅううっ──羨ましいぃぃい～っ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「羨ましい……悔しい、じゃなくて？」
line = "「羨ましい……悔しい、じゃなくて？」"

[[dialogue]]
speaker = "アム"
# 「悔しいです！　だけど同じくらい、羨ましい！　就任の流れ、すっごくカッコ良かったんだもん！」
line = "「悔しいです！　だけど同じくらい、羨ましい！　就任の流れ、すっごくカッコ良かったんだもん！」"

[[dialogue]]
speaker = "アム"
# 「もうずっと開催されていなかった御前試合がいきなり組まれて、衆目の中、ヴィーナス会長を撃破……！」
line = "「もうずっと開催されていなかった御前試合がいきなり組まれて、衆目の中、ヴィーナス会長を撃破……！」"

[[dialogue]]
speaker = "アム"
# 「あたしもあんな風にヴィーナス前会長を倒したかったー！　うわああー！」
line = "「あたしもあんな風にヴィーナス前会長を倒したかったー！　うわああー！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──なるほど。それでクロトが気に入らないのね」
line = "「──なるほど。それでクロトが気に入らないのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それならいっそのことアム。クロトもライバルにしちゃいなさい！」
line = "「それならいっそのことアム。クロトもライバルにしちゃいなさい！」"

[[dialogue]]
speaker = "アム"
# 「え……！？」
line = "「え……！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトの会長就任を羨ましがるんじゃなく、正々堂々と実力で超えていく。そっちの方がカッコイイでしょう！」
line = "「クロトの会長就任を羨ましがるんじゃなく、正々堂々と実力で超えていく。そっちの方がカッコイイでしょう！」"

[[dialogue]]
speaker = "アム"
# 「な、なるほど……。確かにその通りです！　流石はヴィーナス前会長！」
line = "「な、なるほど……。確かにその通りです！　流石はヴィーナス前会長！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ、我ながら名案ね！」
line = "「ふふ、我ながら名案ね！」"

[[dialogue]]
speaker = "アム"
# 「よし──それじゃあ今日からちゃんと会長って呼ぶ！　それで、あたしのライバル３号に任命！」
line = "「よし──それじゃあ今日からちゃんと会長って呼ぶ！　それで、あたしのライバル３号に任命！」"

[[dialogue]]
speaker = "unk"
# そんなにいるの、ライバル！？
line = "そんなにいるの、ライバル！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちなみに１号は私で、２号は流星附属の同級生。良かったわねクロト！」
line = "「ちなみに１号は私で、２号は流星附属の同級生。良かったわねクロト！」"

[[dialogue]]
speaker = "アム"
# 「よ～し燃えて来たぞぉ……！　ヴィーナス前会長の仇で、魔王を名乗るアヤシゲな男……何よりあたしの目標を横取りした相手！」
line = "「よ～し燃えて来たぞぉ……！　ヴィーナス前会長の仇で、魔王を名乗るアヤシゲな男……何よりあたしの目標を横取りした相手！」"

[[dialogue]]
speaker = "アム"
# 「絶対に負けないからね！　新星学園、次期星徒会長の座は──あたしがもらう！」
line = "「絶対に負けないからね！　新星学園、次期星徒会長の座は──あたしがもらう！」"

[[dialogue]]
speaker = "アム"
# 「そうと決まれば特訓だ！　やるぞおぉーっ……！」
line = "「そうと決まれば特訓だ！　やるぞおぉーっ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だってさ。星徒会室に来た時と違って、やる気満々だったわね」
line = "「だってさ。星徒会室に来た時と違って、やる気満々だったわね」"

[[dialogue]]
speaker = "unk"
# 俺も頑張る
line = "俺も頑張る"

[[dialogue]]
speaker = "ヴィーナス"
# 「その調子よ。あなたがアムに負けたら私も負けたことになるんだから、負けたら承知しないわよ！」
line = "「その調子よ。あなたがアムに負けたら私も負けたことになるんだから、負けたら承知しないわよ！」"
