[[dialogue]]
speaker = "unk"
# 第４話,２人はライバル,P
line = "第４話,２人はライバル,P"

[[dialogue]]
speaker = "unk"
# エルデリーゼとアムは、流星附属の中でもとりわけ有名な二人組だ。
line = "エルデリーゼとアムは、流星附属の中でもとりわけ有名な二人組だ。"

[[dialogue]]
speaker = "unk"
# 片や神速の槍の使い手。片や最強の盾の使い手。矛盾コンビと形容される２人だが……最近、彼女たちはどうにもお互いを避けているように見える。
line = "片や神速の槍の使い手。片や最強の盾の使い手。矛盾コンビと形容される２人だが……最近、彼女たちはどうにもお互いを避けているように見える。"

[[dialogue]]
speaker = "unk"
# 何かあったのかもしれない。そう思った俺は、エルデリーゼをトレーニングに誘ってみることにした。
line = "何かあったのかもしれない。そう思った俺は、エルデリーゼをトレーニングに誘ってみることにした。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふうぅ……ありがとうございました、会長様。新鮮な模擬試合でしたわ」
line = "「ふうぅ……ありがとうございました、会長様。新鮮な模擬試合でしたわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「その……いかがでしたか？　私の槍は」
line = "「その……いかがでしたか？　私の槍は」"

[[dialogue]]
speaker = "unk"
# いつもよりキレがない気がした
line = "いつもよりキレがない気がした"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そう、ですか……。私なりに、普段通りの動きを心がけていたつもりなのですが……」
line = "「そう、ですか……。私なりに、普段通りの動きを心がけていたつもりなのですが……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「やはり会長様ほどの星騎士がお相手となると、隠すのも無理な話でしたわね」
line = "「やはり会長様ほどの星騎士がお相手となると、隠すのも無理な話でしたわね」"

[[dialogue]]
speaker = "unk"
# アムと何かあった？
line = "アムと何かあった？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……っ。はい。実はその……少し前に、口論をしてしまいましたの……」
line = "「……っ。はい。実はその……少し前に、口論をしてしまいましたの……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「些細なことが原因だったのですが、私。『もうアムなんか知りませんわ』と心にもないことを言ってしまい……」
line = "「些細なことが原因だったのですが、私。『もうアムなんか知りませんわ』と心にもないことを言ってしまい……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「いつも特に約束をしなくても、この時間は模擬試合をしていたのです。けれど、アムの方が時間をずらしているようで……」
line = "「いつも特に約束をしなくても、この時間は模擬試合をしていたのです。けれど、アムの方が時間をずらしているようで……」"

[[dialogue]]
speaker = "アム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# （気付かないふりをしよう）
line = "（気付かないふりをしよう）"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私、嫌われてしまいました。きっとアムはもう顔も見たくないと思ってるに違いありませんわ……」
line = "「私、嫌われてしまいました。きっとアムはもう顔も見たくないと思ってるに違いありませんわ……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「どうしてあんなことを言ってしまったのでしょう。一番の学友、最も信頼を置くライバルを相手に……」
line = "「どうしてあんなことを言ってしまったのでしょう。一番の学友、最も信頼を置くライバルを相手に……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「時間を戻せるものなら、戻したいですわ……会長様」
line = "「時間を戻せるものなら、戻したいですわ……会長様」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……謝る練習？　ここで、ですか」
line = "「……謝る練習？　ここで、ですか」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「素直に謝れば許してもらえる……そ、そう、でしょうか……？」
line = "「素直に謝れば許してもらえる……そ、そう、でしょうか……？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「わかりました。練習、してみます。私たちの他は誰もいませんし。ちょうど良いかもしれませんわね……」
line = "「わかりました。練習、してみます。私たちの他は誰もいませんし。ちょうど良いかもしれませんわね……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「すー、はー……あ、あ、あー……アムっ」
line = "「すー、はー……あ、あ、あー……アムっ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、その。先日は申し訳ありませんでした。あなたが嫌うあだ名をわざと言ったのは、私があまりに大人げなかったです」
line = "「そ、その。先日は申し訳ありませんでした。あなたが嫌うあだ名をわざと言ったのは、私があまりに大人げなかったです」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「本心ではありません……その証拠に、あ、アムの実力は私が誰よりも評価しておりますもの」
line = "「本心ではありません……その証拠に、あ、アムの実力は私が誰よりも評価しておりますもの」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「で、でも……アムにも反省して欲しいのですわ！　あなたのあの行い、あまりに酷いと思うのです……！」
line = "「で、でも……アムにも反省して欲しいのですわ！　あなたのあの行い、あまりに酷いと思うのです……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私が後で食べようと楽しみに取っておいた……ショートケーキのいちごを奪うだなんて……！」
line = "「私が後で食べようと楽しみに取っておいた……ショートケーキのいちごを奪うだなんて……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「狼狽する私の前で『食べないから嫌いなのかと思った～』などと！　いちごを嫌う女子などおりません！　あんまりです！」
line = "「狼狽する私の前で『食べないから嫌いなのかと思った～』などと！　いちごを嫌う女子などおりません！　あんまりです！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私は謝ります。ですからあなたからも謝罪が欲しいですわ……！　それにて今回の件は手打ちとしましょう……！」
line = "「私は謝ります。ですからあなたからも謝罪が欲しいですわ……！　それにて今回の件は手打ちとしましょう……！」"

[[dialogue]]
speaker = "アム"
# 「あ～もうっ！　悪かったってば～！」
line = "「あ～もうっ！　悪かったってば～！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アム！？　き、聞いていたんですの！？」
line = "「アム！？　き、聞いていたんですの！？」"

[[dialogue]]
speaker = "アム"
# 「ずっと居たよ、会長と模擬戦してる時から！　ていうか何それ、謝る練習してる時にどうして口論してるの！？　エルゼは本当にさ～！！」
line = "「ずっと居たよ、会長と模擬戦してる時から！　ていうか何それ、謝る練習してる時にどうして口論してるの！？　エルゼは本当にさ～！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「な、何か間違っていましたか……？」
line = "「な、何か間違っていましたか……？」"

[[dialogue]]
speaker = "アム"
# 「逆効果でしょ、どう考えても！　謝る時は平身低頭！　いちごの件は蒸し返さなくてもあたしから言うから！」
line = "「逆効果でしょ、どう考えても！　謝る時は平身低頭！　いちごの件は蒸し返さなくてもあたしから言うから！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そうなんですの……すみません。友人と喧嘩をしたことがないものですから……」
line = "「そ、そうなんですの……すみません。友人と喧嘩をしたことがないものですから……」"

[[dialogue]]
speaker = "アム"
# 「はぁああ～……もう疲れたよ、喧嘩するのも。ごめんねエルゼ。いちごは冗談のつもりだったんだけど、確かにあれは悪かったよ」
line = "「はぁああ～……もう疲れたよ、喧嘩するのも。ごめんねエルゼ。いちごは冗談のつもりだったんだけど、確かにあれは悪かったよ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「い、いえ。私の方こそ……アムに無礼な言葉をぶつけてしまいました。許していただけますか……？」
line = "「い、いえ。私の方こそ……アムに無礼な言葉をぶつけてしまいました。許していただけますか……？」"

[[dialogue]]
speaker = "アム"
# 「うん。いいよ、許すよ。これで仲直りしよ。いいよね？」
line = "「うん。いいよ、許すよ。これで仲直りしよ。いいよね？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「もちろんです……あ、そうです。今後はいちごが欲しい時はちゃんと事前に訊ねてください。そうすれば差し上げますから……」
line = "「もちろんです……あ、そうです。今後はいちごが欲しい時はちゃんと事前に訊ねてください。そうすれば差し上げますから……」"

[[dialogue]]
speaker = "アム"
# 「いや、食べ物の恨みは恐ろしいからやめとく」
line = "「いや、食べ物の恨みは恐ろしいからやめとく」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様も、ありがとうございました。おかげでアムと仲直りができました……って、あら？　どうかしましたか」
line = "「会長様も、ありがとうございました。おかげでアムと仲直りができました……って、あら？　どうかしましたか」"

[[dialogue]]
speaker = "unk"
# もっと深刻な喧嘩かと……
line = "もっと深刻な喧嘩かと……"

[[dialogue]]
speaker = "エルデリーゼ"
# 「っ！？　深刻ですわ！　ショートケーキのいちごですわよ！？」
line = "「っ！？　深刻ですわ！　ショートケーキのいちごですわよ！？」"

[[dialogue]]
speaker = "アム"
# 「そうだよ！　あたしだって不名誉なあだ名を連呼されて心に深い傷を負ったんだから！　くだらない喧嘩なんてこの世にはないんだよ！」
line = "「そうだよ！　あたしだって不名誉なあだ名を連呼されて心に深い傷を負ったんだから！　くだらない喧嘩なんてこの世にはないんだよ！」"

[[dialogue]]
speaker = "unk"
# ご、ごめんなさい！？
line = "ご、ごめんなさい！？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……ふう。わかっていただけたようで何よりです、会長様」
line = "「……ふう。わかっていただけたようで何よりです、会長様」"

[[dialogue]]
speaker = "アム"
# 「何にせよ、会長が間に入ってくれたおかげでエルゼと話もできたしね……」
line = "「何にせよ、会長が間に入ってくれたおかげでエルゼと話もできたしね……」"

[[dialogue]]
speaker = "アム"
# 「──よし。せっかくだしさ、エルゼ。模擬戦やっとく？」
line = "「──よし。せっかくだしさ、エルゼ。模擬戦やっとく？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「望むところです。今日も負けませんわよ、アム」
line = "「望むところです。今日も負けませんわよ、アム」"

[[dialogue]]
speaker = "アム"
# 「へへんだ。あたしだって、白星取ってやるもんね！」
line = "「へへんだ。あたしだって、白星取ってやるもんね！」"

[[dialogue]]
speaker = "unk"
# こうしてエルゼとアムは仲直りして、一件落着……と思いきや。
line = "こうしてエルゼとアムは仲直りして、一件落着……と思いきや。"

[[dialogue]]
speaker = "unk"
# 後日、『ヴィーナス前会長とフィオナ会長はどっちが強いか』というテーマでまたもや揉めるのだが、それはまた別のお話……
line = "後日、『ヴィーナス前会長とフィオナ会長はどっちが強いか』というテーマでまたもや揉めるのだが、それはまた別のお話……"
