[[dialogue]]
speaker = "unk"
# 第３話,恋酔いトワイライト,P
line = "第３話,恋酔いトワイライト,P"

[[dialogue]]
speaker = "unk"
# 学園ＯＧ３人の食事会を終えたあと、俺は酔って上機嫌なトワちゃんを連れて、夜のビーチを歩いていた。
line = "学園ＯＧ３人の食事会を終えたあと、俺は酔って上機嫌なトワちゃんを連れて、夜のビーチを歩いていた。"

[[dialogue]]
speaker = "トワ先生"
# 「会長く～ん、お姫様抱っこして～<emoji=heart04>　ん～っ♪」
line = "「会長く～ん、お姫様抱っこして～<emoji=heart04>　ん～っ♪」"

[[dialogue]]
speaker = "unk"
# わかった、いいよ。ほら、よいしょっと
line = "わかった、いいよ。ほら、よいしょっと"

[[dialogue]]
speaker = "トワ先生"
# 「わぁ～い<emoji=heart04>　会長くん、好き好き<emoji=heart04>　ちゅっちゅ～っ<emoji=heart04>」
line = "「わぁ～い<emoji=heart04>　会長くん、好き好き<emoji=heart04>　ちゅっちゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リコさんとマリオンさんから『恋人として介抱を頼む』と言われて、俺はそのままトワちゃんを任されていた。それにしても、久しぶりにここまで酔ってるな……。
line = "リコさんとマリオンさんから『恋人として介抱を頼む』と言われて、俺はそのままトワちゃんを任されていた。それにしても、久しぶりにここまで酔ってるな……。"

[[dialogue]]
speaker = "トワ先生"
# 「ねぇ、どこ行くの～？　もしかして、水上コテージだったりして～？　えへへ～、会長くんのえっち<emoji=heart04>」
line = "「ねぇ、どこ行くの～？　もしかして、水上コテージだったりして～？　えへへ～、会長くんのえっち<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「――酔いが冷めるまで、ビーチチェアーで休もうと思って？　も～、そこは紳士にならなくていいのに～<emoji=heart04>」
line = "「――酔いが冷めるまで、ビーチチェアーで休もうと思って？　も～、そこは紳士にならなくていいのに～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# でも、こうしてると、前の時を思い出すよ
line = "でも、こうしてると、前の時を思い出すよ"

[[dialogue]]
speaker = "トワ先生"
# 「前って……付き合う前に、会長くんが酔っぱらいの私を介抱してくれた時のこと？」
line = "「前って……付き合う前に、会長くんが酔っぱらいの私を介抱してくれた時のこと？」"

[[dialogue]]
speaker = "トワ先生"
# 「そういえば、あの時もお姫様抱っこしてくれたんだよね～<emoji=heart04>　えへへ……懐かしい～♪」
line = "「そういえば、あの時もお姫様抱っこしてくれたんだよね～<emoji=heart04>　えへへ……懐かしい～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「あの時は生まれて初めて男の人に抱き上げられて……すごくドキドキしちゃったな～<emoji=heart04>」
line = "「あの時は生まれて初めて男の人に抱き上げられて……すごくドキドキしちゃったな～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 初めて――か。俺もあの日、トワちゃんと過ごして、不思議なくらい心が惹かれたのを覚えている。
line = "初めて――か。俺もあの日、トワちゃんと過ごして、不思議なくらい心が惹かれたのを覚えている。"

[[dialogue]]
speaker = "トワ先生"
# 「――え？　じゃあ、あれが運命の瞬間だったのかも<emoji=heart04>　なんて……えへへへぇ<emoji=heart04>」
line = "「――え？　じゃあ、あれが運命の瞬間だったのかも<emoji=heart04>　なんて……えへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女の笑顔が眩しくて、見ているだけで酔いそうになる。本当に、ずるいくらい可愛い。
line = "彼女の笑顔が眩しくて、見ているだけで酔いそうになる。本当に、ずるいくらい可愛い。"

[[dialogue]]
speaker = "unk"
# やがてビーチチェアーに着くと、トワちゃんは俺に下ろされながら、また両手を広げて甘えてきた。
line = "やがてビーチチェアーに着くと、トワちゃんは俺に下ろされながら、また両手を広げて甘えてきた。"

[[dialogue]]
speaker = "トワ先生"
# 「会長くん……んっ<emoji=heart04>　お姫様抱っこもいいけどぉ、もっとして欲しい抱っこがあるの～」
line = "「会長くん……んっ<emoji=heart04>　お姫様抱っこもいいけどぉ、もっとして欲しい抱っこがあるの～」"

[[dialogue]]
speaker = "トワ先生"
# 「先生、久しぶりに『赤ちゃん抱っこ』して欲しいなぁ～<emoji=heart04>」
line = "「先生、久しぶりに『赤ちゃん抱っこ』して欲しいなぁ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 懐かしいそのリクエストに苦笑しつつ、俺はトワちゃんを抱き上げつつ、そっとビーチチェアに腰を下ろす。
line = "懐かしいそのリクエストに苦笑しつつ、俺はトワちゃんを抱き上げつつ、そっとビーチチェアに腰を下ろす。"

[[dialogue]]
speaker = "トワ先生"
# 「あっ<emoji=heart04>　――ふわぁ～<emoji=heart04>　えへへぇ、この全身密着する感じ、やっぱり好きぃ～<emoji=heart04>」
line = "「あっ<emoji=heart04>　――ふわぁ～<emoji=heart04>　えへへぇ、この全身密着する感じ、やっぱり好きぃ～<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「会長くんの匂いと、体温と、心臓の音が伝わってきて、すごく安心するのぉ～<emoji=heart04>　スリスリ～<emoji=heart04>」
line = "「会長くんの匂いと、体温と、心臓の音が伝わってきて、すごく安心するのぉ～<emoji=heart04>　スリスリ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女が胸に顔を埋めて擦り寄ってくるたびに、心臓の鼓動がどんどん速くなっていく。
line = "彼女が胸に顔を埋めて擦り寄ってくるたびに、心臓の鼓動がどんどん速くなっていく。"

[[dialogue]]
speaker = "トワ先生"
# 「ふふっ<emoji=heart04>　会長くんのドキドキ、早くなってる～<emoji=heart04>　酔ってるトワ先生が、そんなに可愛いのかな～？」
line = "「ふふっ<emoji=heart04>　会長くんのドキドキ、早くなってる～<emoji=heart04>　酔ってるトワ先生が、そんなに可愛いのかな～？」"

[[dialogue]]
speaker = "unk"
# 好きになってるから、なおさら可愛いんだ
line = "好きになってるから、なおさら可愛いんだ"

[[dialogue]]
speaker = "トワ先生"
# 「ふあっ<emoji=heart04>　えへへ<emoji=heart04>　会長くんに力強く、ぎゅ～ってされちゃった～<emoji=heart04>」
line = "「ふあっ<emoji=heart04>　えへへ<emoji=heart04>　会長くんに力強く、ぎゅ～ってされちゃった～<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「じゃあ、そんな会長くんに……も～っと可愛い先生を見せちゃおうかな～<emoji=heart04>」
line = "「じゃあ、そんな会長くんに……も～っと可愛い先生を見せちゃおうかな～<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「リコが言ってた『附属生モード』のトワちゃん……恋人の会長くんになら、ちょっとだけ見せてあげる<emoji=heart04>」
line = "「リコが言ってた『附属生モード』のトワちゃん……恋人の会長くんになら、ちょっとだけ見せてあげる<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は驚きに思わず目を見開く。するとトワちゃんは、ふっと微笑んで俺の耳元に顔を寄せ、甘く囁いた。
line = "俺は驚きに思わず目を見開く。するとトワちゃんは、ふっと微笑んで俺の耳元に顔を寄せ、甘く囁いた。"

[[dialogue]]
speaker = "トワ先生"
# 「――お兄ちゃん<emoji=heart04>　トワね、いつも優しくしてくれるお兄ちゃんのこと、だいだい、だ～い好きだよ<emoji=heart04>」
line = "「――お兄ちゃん<emoji=heart04>　トワね、いつも優しくしてくれるお兄ちゃんのこと、だいだい、だ～い好きだよ<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「だからこれからも、トワにいっぱい甘えさせてくれたら嬉しいな<emoji=heart04>　――ちゅっ<emoji=heart04>」
line = "「だからこれからも、トワにいっぱい甘えさせてくれたら嬉しいな<emoji=heart04>　――ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って頬にキスをして、いたずらっぽく微笑む。
line = "そう言って頬にキスをして、いたずらっぽく微笑む。"

[[dialogue]]
speaker = "トワ先生"
# 「よろしくね、お兄ちゃん<emoji=heart04>　てへっ<emoji=heart04>」
line = "「よろしくね、お兄ちゃん<emoji=heart04>　てへっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 待って……可愛すぎるんだけどぉ～～っ！？
line = "待って……可愛すぎるんだけどぉ～～っ！？"

[[dialogue]]
speaker = "unk"
# 心臓が爆発するかと思った。『悩殺される』という言葉の意味を、俺は初めて体感した気がした。
line = "心臓が爆発するかと思った。『悩殺される』という言葉の意味を、俺は初めて体感した気がした。"

[[dialogue]]
speaker = "トワ先生"
# 「あっ！　会長くんの心臓、すっごくドキドキしてる～<emoji=heart04>」
line = "「あっ！　会長くんの心臓、すっごくドキドキしてる～<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「あははっ♪　そんなに附属生トワちゃん、可愛かった～？　ふ～ん♪　じゃあ――」
line = "「あははっ♪　そんなに附属生トワちゃん、可愛かった～？　ふ～ん♪　じゃあ――」"

[[dialogue]]
speaker = "トワ先生"
# 「今日はこのまま、トワがいっぱい甘えちゃうね？　――お兄ちゃん<emoji=heart04>」
line = "「今日はこのまま、トワがいっぱい甘えちゃうね？　――お兄ちゃん<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「ん～<emoji=heart04>　ちゅっ、ちゅっ<emoji=heart04>」
line = "「ん～<emoji=heart04>　ちゅっ、ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――その夜、俺は『附属生モード』のトワちゃんの甘さに、すっかり酔わされ続けてしまうのだった。
line = "――その夜、俺は『附属生モード』のトワちゃんの甘さに、すっかり酔わされ続けてしまうのだった。"
