[[dialogue]]
speaker = "エンジュ"
# 「はんっ、どうした、魔王に魔女！　威勢が良かったのは最初だけか！」
line = "「はんっ、どうした、魔王に魔女！　威勢が良かったのは最初だけか！」"

[[dialogue]]
speaker = "メテオラ"
# 「あはははっ！　やっぱり大したことないなー！」
line = "「あはははっ！　やっぱり大したことないなー！」"

[[dialogue]]
speaker = "リーリア"
# 「ったくもう、自信なくすなぁ！　あなたたちが規格外なんだってばーっ！」
line = "「ったくもう、自信なくすなぁ！　あなたたちが規格外なんだってばーっ！」"

[[dialogue]]
speaker = "unk"
# やっぱりコラプサーの能力が厄介だ……！
line = "やっぱりコラプサーの能力が厄介だ……！"

[[dialogue]]
speaker = "リーリア"
# 「そうですね。あと想定外なのは２人のコンビネーションです」
line = "「そうですね。あと想定外なのは２人のコンビネーションです」"

[[dialogue]]
speaker = "リーリア"
# 「今までのコラプサーは個々の戦闘力は高かったですけど、連携なんてしていませんでした。そこに付け入る隙があると思っていたんですが……」
line = "「今までのコラプサーは個々の戦闘力は高かったですけど、連携なんてしていませんでした。そこに付け入る隙があると思っていたんですが……」"

[[dialogue]]
speaker = "リーリア"
# 「メテオラって子は大暴れしてるだけなのに、エンジュって子がうまく誘導してて、すごく上手に使ってます。戦いにくいことこの上ないです」
line = "「メテオラって子は大暴れしてるだけなのに、エンジュって子がうまく誘導してて、すごく上手に使ってます。戦いにくいことこの上ないです」"

[[dialogue]]
speaker = "リーリア"
# 「あっ……！　もしかして、誘導してるのってメテオラだけじゃなくって、私たちも……！？」
line = "「あっ……！　もしかして、誘導してるのってメテオラだけじゃなくって、私たちも……！？」"

[[dialogue]]
speaker = "unk"
# この場所って──
line = "この場所って──"

[[dialogue]]
speaker = "エンジュ"
# 「やっと気づいたか、魔女！　そこだ、メテオラ！　思いっきりぶっ壊してやれ！」
line = "「やっと気づいたか、魔女！　そこだ、メテオラ！　思いっきりぶっ壊してやれ！」"

[[dialogue]]
speaker = "メテオラ"
# 「おうっ！　ぶっ飛べーーーっ！」
line = "「おうっ！　ぶっ飛べーーーっ！」"

[[dialogue]]
speaker = "リーリア"
# 「きゃああぁあぁっ！」
line = "「きゃああぁあぁっ！」"

[[dialogue]]
speaker = "unk"
# メテオラの爆撃で、分厚く作られていたはずの床が破壊されて──
line = "メテオラの爆撃で、分厚く作られていたはずの床が破壊されて──"

[[dialogue]]
speaker = "リーリア"
# 「げほっ、げほっ……！　ここって──地下の……！」
line = "「げほっ、げほっ……！　ここって──地下の……！」"

[[dialogue]]
speaker = "コハルコ"
# 「会長さん、リーリアさん！？　ここまで来ちゃったの！？」
line = "「会長さん、リーリアさん！？　ここまで来ちゃったの！？」"

[[dialogue]]
speaker = "リーリア"
# 「ごめんなさい！　あいつら思ったより強くて……！」
line = "「ごめんなさい！　あいつら思ったより強くて……！」"

[[dialogue]]
speaker = "エンジュ"
# 「やっぱりここにいたか！　ターゲットを発見した、ただちに確保する！」
line = "「やっぱりここにいたか！　ターゲットを発見した、ただちに確保する！」"

[[dialogue]]
speaker = "メテオラ"
# 「あいつがターゲットのコハルコかー！　捕まえるぞー！」
line = "「あいつがターゲットのコハルコかー！　捕まえるぞー！」"

[[dialogue]]
speaker = "unk"
# コハルコさんがコラプサーのターゲット……！？
line = "コハルコさんがコラプサーのターゲット……！？"

[[dialogue]]
speaker = "コハルコ"
# 「え？　え！？　ターゲットって何！？」
line = "「え？　え！？　ターゲットって何！？」"

[[dialogue]]
speaker = "リーリア"
# 「新星学園の破壊じゃなくって、あなたたちの目的は最初っからコハルコ先輩の誘拐だったってこと！？」
line = "「新星学園の破壊じゃなくって、あなたたちの目的は最初っからコハルコ先輩の誘拐だったってこと！？」"

[[dialogue]]
speaker = "コハルコ"
# 「私を……誘拐！？　私が狙われる理由なんて──」
line = "「私を……誘拐！？　私が狙われる理由なんて──」"

[[dialogue]]
speaker = "コハルコ"
# 「割と心当たりある！？」
line = "「割と心当たりある！？」"

[[dialogue]]
speaker = "リーリア"
# 「いやまぁ、伝説のハッカー・ジャスティスウィザードが欲しい組織なんていくらでもあると思いますけど……コラプサーの狙いはそこじゃないんでしょうね」
line = "「いやまぁ、伝説のハッカー・ジャスティスウィザードが欲しい組織なんていくらでもあると思いますけど……コラプサーの狙いはそこじゃないんでしょうね」"

[[dialogue]]
speaker = "コハルコ"
# 「その名前禁止だってば～！？」
line = "「その名前禁止だってば～！？」"

[[dialogue]]
speaker = "メテオラ"
# 「なんだ、コハルコって悪いやつなのか？」
line = "「なんだ、コハルコって悪いやつなのか？」"

[[dialogue]]
speaker = "コハルコ"
# 「え～と、違法という意味ではそうかもしれないけど……でも私は、正しいと思ったことしかしてないから！」
line = "「え～と、違法という意味ではそうかもしれないけど……でも私は、正しいと思ったことしかしてないから！」"

[[dialogue]]
speaker = "コハルコ"
# 「簡単にはやらせないよ！　エクスプロイトシュート！」
line = "「簡単にはやらせないよ！　エクスプロイトシュート！」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュ、後ろだぞ！」
line = "「エンジュ、後ろだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「死角からのドローン攻撃か」
line = "「死角からのドローン攻撃か」"

[[dialogue]]
speaker = "エンジュ"
# 「残念ながら、あたしらには無駄だ。お互いで全方位をカバーするメテオラとあたしに死角はない」
line = "「残念ながら、あたしらには無駄だ。お互いで全方位をカバーするメテオラとあたしに死角はない」"

[[dialogue]]
speaker = "メテオラ"
# 「そっちの魔女の弾は吸えないけど、おまえの星力はいただきだぞっ！」
line = "「そっちの魔女の弾は吸えないけど、おまえの星力はいただきだぞっ！」"

[[dialogue]]
speaker = "コハルコ"
# 「なるほど……連携の取れるコラプサーは思っていた以上に強敵ってわけだね……っ」
line = "「なるほど……連携の取れるコラプサーは思っていた以上に強敵ってわけだね……っ」"

[[dialogue]]
speaker = "unk"
# コラプサーの目的はなんなんだ？
line = "コラプサーの目的はなんなんだ？"

[[dialogue]]
speaker = "メテオラ"
# 「あたしたちは平和な世界を作るんだぞ！」
line = "「あたしたちは平和な世界を作るんだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「メテオラ、あまりお喋りは──まあ、いい。あたしたちの声は他の星騎士たちにも聞こえてるんだよな？」
line = "「メテオラ、あまりお喋りは──まあ、いい。あたしたちの声は他の星騎士たちにも聞こえてるんだよな？」"

[[dialogue]]
speaker = "エンジュ"
# 「これは星騎士どもへの通達だ。あたしたちは、お前らからかき集めた星力を使って、リクリエのない世界を作る。それがコラプサーの救世だ」
line = "「これは星騎士どもへの通達だ。あたしたちは、お前らからかき集めた星力を使って、リクリエのない世界を作る。それがコラプサーの救世だ」"

[[dialogue]]
speaker = "エンジュ"
# 「そのためには、この女が必要なんだ。世界のために借りてくぞ」
line = "「そのためには、この女が必要なんだ。世界のために借りてくぞ」"

[[dialogue]]
speaker = "unk"
# どうしてコハルコさんが必要なんだ？
line = "どうしてコハルコさんが必要なんだ？"

[[dialogue]]
speaker = "エンジュ"
# 「知る必要はない。星騎士どもが無駄にしているこいつの力は、あたしらコラプサーが上手く活用する」
line = "「知る必要はない。星騎士どもが無駄にしているこいつの力は、あたしらコラプサーが上手く活用する」"

[[dialogue]]
speaker = "メテオラ"
# 「そーゆーわけだから、おとなしくさらわれろー！　ご飯はちゃんと出すからなー！」
line = "「そーゆーわけだから、おとなしくさらわれろー！　ご飯はちゃんと出すからなー！」"

[[dialogue]]
speaker = "ミア"
# 「はぁ、はっ、はぁ……やっぱり強い……！」
line = "「はぁ、はっ、はぁ……やっぱり強い……！」"

[[dialogue]]
speaker = "キサナ"
# 「随分と頑張ったじゃねえか。そろそろお遊びは終わりに──ぁん……？　ギャーギャーうるせぇぞ、てめぇ」
line = "「随分と頑張ったじゃねえか。そろそろお遊びは終わりに──ぁん……？　ギャーギャーうるせぇぞ、てめぇ」"

[[dialogue]]
speaker = "ミア"
# 「……何のこと？　私じゃないわよ」
line = "「……何のこと？　私じゃないわよ」"

[[dialogue]]
speaker = "キサナ"
# 「ぁん？　なんだ、こりゃっ……！？　脳ミソの中に、ぐわんぐわん声が響いてやがるっ……」
line = "「ぁん？　なんだ、こりゃっ……！？　脳ミソの中に、ぐわんぐわん声が響いてやがるっ……」"

[[dialogue]]
speaker = "キサナ"
# 「うるせぇ、うるせぇ、うるせぇっ……！　頭がヘンになる、だろうが……この声を……声を、止めろぉおぉぉっ！」
line = "「うるせぇ、うるせぇ、うるせぇっ……！　頭がヘンになる、だろうが……この声を……声を、止めろぉおぉぉっ！」"

[[dialogue]]
speaker = "ミア"
# 「ちょっと、いきなり、なに……？　こいつ、どうしちゃったの……！？」
line = "「ちょっと、いきなり、なに……？　こいつ、どうしちゃったの……！？」"
