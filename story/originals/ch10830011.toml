[[dialogue]]
speaker = "unk"
# 第１話,暴虐の吸血鬼,P
line = "第１話,暴虐の吸血鬼,P"

[[dialogue]]
speaker = "unk"
# 某日、アステラが２つ同時に出現。１つは星徒会メンバーに任せ、俺はフェリシーとソフレの２人と一緒に、もう片方のアステラへと突入していた。
line = "某日、アステラが２つ同時に出現。１つは星徒会メンバーに任せ、俺はフェリシーとソフレの２人と一緒に、もう片方のアステラへと突入していた。"

[[dialogue]]
speaker = "ソフレ"
# 「ふわぁ～。せっかくいい感じのお昼寝タイムだったのに、叩き起こされて面倒なのだわ……」
line = "「ふわぁ～。せっかくいい感じのお昼寝タイムだったのに、叩き起こされて面倒なのだわ……」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレったら、そんなこと言わずに、シャキッと起きて頑張ろうよ～！」
line = "「ソフレったら、そんなこと言わずに、シャキッと起きて頑張ろうよ～！」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレのモットーは『働いたら負け』なのよ。大体、ソフレが所属しているのは流星学園なのだわ」
line = "「ソフレのモットーは『働いたら負け』なのよ。大体、ソフレが所属しているのは流星学園なのだわ」"

[[dialogue]]
speaker = "unk"
# 友達のよしみで、そこをなんとか！
line = "友達のよしみで、そこをなんとか！"

[[dialogue]]
speaker = "ソフレ"
# 「友達とか、調子のいいことを言って……大体、会長とそんなものになった覚えはないのよ」
line = "「友達とか、調子のいいことを言って……大体、会長とそんなものになった覚えはないのよ」"

[[dialogue]]
speaker = "フェリシー"
# 「え～、会長くんとも、この前の事件を一緒に解決した仲じゃない！」
line = "「え～、会長くんとも、この前の事件を一緒に解決した仲じゃない！」"

[[dialogue]]
speaker = "unk"
# ２人とは少し前、保健室に目撃される不審者の一件で知り合い、仲よくなった。
line = "２人とは少し前、保健室に目撃される不審者の一件で知り合い、仲よくなった。"

[[dialogue]]
speaker = "ソフレ"
# 「ふん。ソフレは仕方なく協力しただけで、別に仲よくなったつもりはないのだわ」
line = "「ふん。ソフレは仕方なく協力しただけで、別に仲よくなったつもりはないのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「というか、フェリシー！　お前のこともまだ、友達だと認めた覚えはないのよ！」
line = "「というか、フェリシー！　お前のこともまだ、友達だと認めた覚えはないのよ！」"

[[dialogue]]
speaker = "フェリシー"
# 「えぇ～！？　そんな～！」
line = "「えぇ～！？　そんな～！」"

[[dialogue]]
speaker = "unk"
# そして彼女は、流星学園２年生、ソフレ・ヴァートリン。１００年前に流星市国で暴れまわり、『暴虐の吸血鬼』という二つ名で恐れられた存在である。
line = "そして彼女は、流星学園２年生、ソフレ・ヴァートリン。１００年前に流星市国で暴れまわり、『暴虐の吸血鬼』という二つ名で恐れられた存在である。"

[[dialogue]]
speaker = "unk"
# その際に、エクソシストであったフェリシーの曾祖母によって封印され、現在は封印を解く為に、星騎士として奮闘中（？）であった。
line = "その際に、エクソシストであったフェリシーの曾祖母によって封印され、現在は封印を解く為に、星騎士として奮闘中（？）であった。"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレってば、素直じゃないんだから……って、そんなこと言ってる間に、モンスターが来たよ！」
line = "「ソフレってば、素直じゃないんだから……って、そんなこと言ってる間に、モンスターが来たよ！」"

[[dialogue]]
speaker = "ソフレ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ソフレ"
# 「スヤァ～………………スヤスヤ……♪」
line = "「スヤァ～………………スヤスヤ……♪」"

[[dialogue]]
speaker = "unk"
# って、この状況で寝てる！？
line = "って、この状況で寝てる！？"

[[dialogue]]
speaker = "フェリシー"
# 「仕方ない。それなら――ソフレ、ほら起きて！　こちょこちょこちょこちょ～♪」
line = "「仕方ない。それなら――ソフレ、ほら起きて！　こちょこちょこちょこちょ～♪」"

[[dialogue]]
speaker = "ソフレ"
# 「……！　ちょっ、お前！　止めるのだわ！　やめっ……あはっ！　あはははははっ！」
line = "「……！　ちょっ、お前！　止めるのだわ！　やめっ……あはっ！　あはははははっ！」"

[[dialogue]]
speaker = "フェリシー"
# 「戦う気になった！？」
line = "「戦う気になった！？」"

[[dialogue]]
speaker = "ソフレ"
# 「く、くすぐったいのだわ！　わ、わかったから！　ちゃんと起きるから、止めるのだわ！」
line = "「く、くすぐったいのだわ！　わ、わかったから！　ちゃんと起きるから、止めるのだわ！」"

[[dialogue]]
speaker = "ソフレ"
# 「はぁはぁ……全く。こうなったら、さっさとアステラを消滅させて、帰って寝るのだわ！」
line = "「はぁはぁ……全く。こうなったら、さっさとアステラを消滅させて、帰って寝るのだわ！」"

[[dialogue]]
speaker = "ソフレ"
# 「出でよ、雷雲」
line = "「出でよ、雷雲」"

[[dialogue]]
speaker = "unk"
# ソフレが指を鳴らすと、武器のパイプからもくもくと雲が量産されて、アステラ内の頭上を埋め尽くしていく。そして――
line = "ソフレが指を鳴らすと、武器のパイプからもくもくと雲が量産されて、アステラ内の頭上を埋め尽くしていく。そして――"

[[dialogue]]
speaker = "ソフレ"
# 「落雷で一斉砲撃なのだわ！」
line = "「落雷で一斉砲撃なのだわ！」"

[[dialogue]]
speaker = "ソフレ"
# 「――ふぅ。これでアステラ内の敵反応は全滅。コアも破壊したのだわ」
line = "「――ふぅ。これでアステラ内の敵反応は全滅。コアも破壊したのだわ」"

[[dialogue]]
speaker = "unk"
# たった一撃で！？
line = "たった一撃で！？"

[[dialogue]]
speaker = "unk"
# その後、アステラは本当にすぐ消滅して、もう１つのアステラも攻略に成功したと、ヴィーナスから連絡があった。
line = "その後、アステラは本当にすぐ消滅して、もう１つのアステラも攻略に成功したと、ヴィーナスから連絡があった。"

[[dialogue]]
speaker = "フェリシー"
# 「さすがソフレ、やる気を出せば一騎当千だね！」
line = "「さすがソフレ、やる気を出せば一騎当千だね！」"

[[dialogue]]
speaker = "ソフレ"
# 「ん？　なに、会長？　――改めて、ソフレの強さをすごいと思ったって？」
line = "「ん？　なに、会長？　――改めて、ソフレの強さをすごいと思ったって？」"

[[dialogue]]
speaker = "ソフレ"
# 「別に、これくらい当然なのだわ。腐っても、ソフレはヴァートリン家で歴代最強と言われた吸血鬼なのよ」
line = "「別に、これくらい当然なのだわ。腐っても、ソフレはヴァートリン家で歴代最強と言われた吸血鬼なのよ」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレの能力は『<ruby=らいうん>雷雲</ruby>使い』。本気を出せば、アステラどころか、この流星市国の空を雷雲で覆い尽くして、雷の雨を降らすことも可能なのだわ」
line = "「ソフレの能力は『<ruby>雷雲<rt>らいうん</rt></ruby>使い』。本気を出せば、アステラどころか、この流星市国の空を雷雲で覆い尽くして、雷の雨を降らすことも可能なのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「まあ……それはとても疲れるから、今更やる気なんてないけど」
line = "「まあ……それはとても疲れるから、今更やる気なんてないけど」"

[[dialogue]]
speaker = "フェリシー"
# 「それに今は、１００年反省して、『<ruby=い>善</ruby>い吸血鬼』になったもんね♪」
line = "「それに今は、１００年反省して、『<ruby>善<rt>い</rt></ruby>い吸血鬼』になったもんね♪」"

[[dialogue]]
speaker = "ソフレ"
# 「はあ？　そんなものになった覚えはないのだわ！」
line = "「はあ？　そんなものになった覚えはないのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「またまた～、学園を一緒に卒業して、卒業旅行に行こうって約束したじゃん♪」
line = "「またまた～、学園を一緒に卒業して、卒業旅行に行こうって約束したじゃん♪」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレはまだ、了承なんてしてないのよ！」
line = "「ソフレはまだ、了承なんてしてないのよ！」"

[[dialogue]]
speaker = "フェリシー"
# 「でも、今回のアステラ攻略で、また卒業旅行に１歩近づいたし！」
line = "「でも、今回のアステラ攻略で、また卒業旅行に１歩近づいたし！」"

[[dialogue]]
speaker = "フェリシー"
# 「さっきソフレの封印を確認したら、刑期が１年短くなってたよ♪　やったね！」
line = "「さっきソフレの封印を確認したら、刑期が１年短くなってたよ♪　やったね！」"

[[dialogue]]
speaker = "ソフレ"
# 「たった１年ぽっちじゃないの。封印はまだ２７９９年分も残ってるのよ？　全然嬉しくないのだわ」
line = "「たった１年ぽっちじゃないの。封印はまだ２７９９年分も残ってるのよ？　全然嬉しくないのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「星騎士として善行を積んだら刑期が減るといっても、こんなペースじゃ、毎日アステラを攻略したところで卒業までに間に合いっこないのよ」
line = "「星騎士として善行を積んだら刑期が減るといっても、こんなペースじゃ、毎日アステラを攻略したところで卒業までに間に合いっこないのよ」"

[[dialogue]]
speaker = "フェリシー"
# 「大丈夫大丈夫。コツコツ頑張ってれば、そのうちドカンと大活躍できるチャンスが必ずやって来るって！」
line = "「大丈夫大丈夫。コツコツ頑張ってれば、そのうちドカンと大活躍できるチャンスが必ずやって来るって！」"

[[dialogue]]
speaker = "ソフレ"
# 「心配性の癖に、お前のその根拠のない自信は一体どこからやって来るのだわ……」
line = "「心配性の癖に、お前のその根拠のない自信は一体どこからやって来るのだわ……」"

[[dialogue]]
speaker = "フェリシー"
# 「ん～、エクソシストの勘ってやつかな？　善行を積めば、それはいずれ自分に返って来るものだよ。女神様だって、ソフレが頑張ればきっと、見ていてくれるはずだしね！」
line = "「ん～、エクソシストの勘ってやつかな？　善行を積めば、それはいずれ自分に返って来るものだよ。女神様だって、ソフレが頑張ればきっと、見ていてくれるはずだしね！」"

[[dialogue]]
speaker = "unk"
# 実際、俺はすごく助かったしな。ありがとう
line = "実際、俺はすごく助かったしな。ありがとう"

[[dialogue]]
speaker = "ソフレ"
# 「……！　べ、別に、感謝される為にやったわけじゃないのだわ。ソフレはただ、さっさと帰って寝たいから、目の前の面倒事を仕方なく片づけただけなのよ」
line = "「……！　べ、別に、感謝される為にやったわけじゃないのだわ。ソフレはただ、さっさと帰って寝たいから、目の前の面倒事を仕方なく片づけただけなのよ」"

[[dialogue]]
speaker = "フェリシー"
# 「おっ、ソフレ、もしかしてちょっと照れてる？」
line = "「おっ、ソフレ、もしかしてちょっと照れてる？」"

[[dialogue]]
speaker = "ソフレ"
# 「なっ……そんなわけないのだわ！　お礼ごときで、ソフレは嬉しくなったりなんかしないのよ！」
line = "「なっ……そんなわけないのだわ！　お礼ごときで、ソフレは嬉しくなったりなんかしないのよ！」"

[[dialogue]]
speaker = "unk"
# かつて『暴虐の吸血鬼』と恐れられたソフレが、昔どんな感じだったのか、俺には分からない。
line = "かつて『暴虐の吸血鬼』と恐れられたソフレが、昔どんな感じだったのか、俺には分からない。"

[[dialogue]]
speaker = "unk"
# でも今は、友達として仲良くしていきたいと、素直に思うのだった。
line = "でも今は、友達として仲良くしていきたいと、素直に思うのだった。"
