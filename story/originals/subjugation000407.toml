[[dialogue]]
speaker = "unk"
# ネーゼマインとサランは見事なコンビネーションで、ついにジャック・オー・ランタンに勝利した。
line = "ネーゼマインとサランは見事なコンビネーションで、ついにジャック・オー・ランタンに勝利した。"

[[dialogue]]
speaker = "ジャック"
# 「ケラケラケラ♪」
line = "「ケラケラケラ♪」"

[[dialogue]]
speaker = "サラン"
# 「あ、ジャックちゃん、いっぱい遊んで満足したみたい♪　バイバ～イって、手を振ってるみたい」
line = "「あ、ジャックちゃん、いっぱい遊んで満足したみたい♪　バイバ～イって、手を振ってるみたい」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふぅ～……やれやれ、とんでもなく手強くて、勝つのも一苦労でしたけど――」
line = "「ふぅ～……やれやれ、とんでもなく手強くて、勝つのも一苦労でしたけど――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「久しぶりに楽しくて、スッキリしました。そこは感謝しないとですね♪」
line = "「久しぶりに楽しくて、スッキリしました。そこは感謝しないとですね♪」"

[[dialogue]]
speaker = "unk"
# そう言って、ネーゼマインも小さく手を振ると――
line = "そう言って、ネーゼマインも小さく手を振ると――"

[[dialogue]]
speaker = "ジャック"
# 「…………（紳士のようにお辞儀）
line = "「…………（紳士のようにお辞儀）"

[[dialogue]]
speaker = "サラン"
# 「ジャックちゃん、またね～！」
line = "「ジャックちゃん、またね～！」"

[[dialogue]]
speaker = "unk"
# それから、気絶していた生徒達はみんな、頭に被ったカボチャは消えて、何事もなかったかのように目を覚ました。
line = "それから、気絶していた生徒達はみんな、頭に被ったカボチャは消えて、何事もなかったかのように目を覚ました。"

[[dialogue]]
speaker = "セナリィ"
# 「トホホ……こんなはずでは……」
line = "「トホホ……こんなはずでは……」"

[[dialogue]]
speaker = "unk"
# セナリィは会場を騒がせたお詫びとして、ジャック・オー・ランタンに食べさせる目的で売ったお菓子の分を返金。
line = "セナリィは会場を騒がせたお詫びとして、ジャック・オー・ランタンに食べさせる目的で売ったお菓子の分を返金。"

[[dialogue]]
speaker = "unk"
# 残っていた在庫のカップケーキも無料で配布し、最終的な利益は、お小遣い稼ぎ程度のものとなった。
line = "残っていた在庫のカップケーキも無料で配布し、最終的な利益は、お小遣い稼ぎ程度のものとなった。"

[[dialogue]]
speaker = "サラン"
# 「パーティー楽しかったけど、お菓子全部なくなっちゃったね～」
line = "「パーティー楽しかったけど、お菓子全部なくなっちゃったね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「みんな、ジャックさんにあげてましたからね～」
line = "「みんな、ジャックさんにあげてましたからね～」"

[[dialogue]]
speaker = "サラン"
# 「サラン、少ししか食べられなかったかも～……残念～」
line = "「サラン、少ししか食べられなかったかも～……残念～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ああ、それなら、そうだ――」
line = "「……ああ、それなら、そうだ――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「一応ですけど、私、お菓子を持ってきてて……食べます？」
line = "「一応ですけど、私、お菓子を持ってきてて……食べます？」"

[[dialogue]]
speaker = "サラン"
# 「えっ？　マインちゃん、なにかあるの？　なになに～？」
line = "「えっ？　マインちゃん、なにかあるの？　なになに～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「その……辛い味なので、先輩の口に合うかはわかりませんけど……これ」
line = "「その……辛い味なので、先輩の口に合うかはわかりませんけど……これ」"

[[dialogue]]
speaker = "サラン"
# 「これって……ハバネロの……激辛お菓子～？」
line = "「これって……ハバネロの……激辛お菓子～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「すっごい辛いやつです。前に……ハロウィンに販売するお菓子の、試食会やったじゃないですか」
line = "「すっごい辛いやつです。前に……ハロウィンに販売するお菓子の、試食会やったじゃないですか」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あの時は言えなかったんですけど……本当は私、甘いものはそんなに好きじゃなくて」
line = "「あの時は言えなかったんですけど……本当は私、甘いものはそんなに好きじゃなくて」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「こういう、激辛のやつが好きなんです」
line = "「こういう、激辛のやつが好きなんです」"

[[dialogue]]
speaker = "サラン"
# 「そうだったんだ～！　サラン、激辛のお菓子も、すっごく好きだよ～？」
line = "「そうだったんだ～！　サラン、激辛のお菓子も、すっごく好きだよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「マジですか？　てっきり、甘いお菓子が好きなものだとばかり……」
line = "「マジですか？　てっきり、甘いお菓子が好きなものだとばかり……」"

[[dialogue]]
speaker = "サラン"
# 「もちろん甘いお菓子は好きだけど～。サラン、なんでも食べるよ～？　渋いのも、苦いのも好きだし～♪　辛い料理もよく食べるんだよ～♪」
line = "「もちろん甘いお菓子は好きだけど～。サラン、なんでも食べるよ～？　渋いのも、苦いのも好きだし～♪　辛い料理もよく食べるんだよ～♪」"

[[dialogue]]
speaker = "サラン"
# 「サラン、嫌いな食べ物がないのは、昔からの自慢なんだ～♪　えへへ♪」
line = "「サラン、嫌いな食べ物がないのは、昔からの自慢なんだ～♪　えへへ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、なるほど。言われてみればそうか……好きな食べ物ばかりで、嫌いな物はない……うん、桜十路先輩らしい」
line = "「あ～、なるほど。言われてみればそうか……好きな食べ物ばかりで、嫌いな物はない……うん、桜十路先輩らしい」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……先輩、さっきはありがとうございました」
line = "「……先輩、さっきはありがとうございました」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　なんのこと～？」
line = "「ぽよ？　なんのこと～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ジャックさんのことです。先輩のおかげで、止め方がわかりました」
line = "「ジャックさんのことです。先輩のおかげで、止め方がわかりました」"

[[dialogue]]
speaker = "サラン"
# 「う～ん、ごめんね？　サラン、美味しい物食べてふわふわになってたせいか、何を言ったのか、あんまりよく思い出せなくて……」
line = "「う～ん、ごめんね？　サラン、美味しい物食べてふわふわになってたせいか、何を言ったのか、あんまりよく思い出せなくて……」"

[[dialogue]]
speaker = "サラン"
# 「でも……えへへ♪　マインちゃんの役に立てたなら嬉しいかも～♪」
line = "「でも……えへへ♪　マインちゃんの役に立てたなら嬉しいかも～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「戦闘でも大活躍でしたよ？」
line = "「戦闘でも大活躍でしたよ？」"

[[dialogue]]
speaker = "サラン"
# 「サラン、また来年、ジャックちゃんと遊びたいな～♪」
line = "「サラン、また来年、ジャックちゃんと遊びたいな～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　まあ、確かに楽しかったですしね～」
line = "「にひひ♪　まあ、確かに楽しかったですしね～」"

[[dialogue]]
speaker = "セナリィ"
# 「もう呼び出すのは、懲り懲りですわよ！？」
line = "「もう呼び出すのは、懲り懲りですわよ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――だそうです♪」
line = "「――だそうです♪」"

[[dialogue]]
speaker = "サラン"
# 「え～？　サランは楽しかったけどな～♪」
line = "「え～？　サランは楽しかったけどな～♪」"

[[dialogue]]
speaker = "unk"
# ネーゼマインとサランは、すっかり打ち解けた様子で笑い合うのだった。
line = "ネーゼマインとサランは、すっかり打ち解けた様子で笑い合うのだった。"
