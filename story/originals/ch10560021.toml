[[dialogue]]
speaker = "unk"
# 第１話,２人の馴れ初め,P
line = "第１話,２人の馴れ初め,P"

[[dialogue]]
speaker = "unk"
# アムと恋人関係になり、しばらくの月日が経ったある日──
line = "アムと恋人関係になり、しばらくの月日が経ったある日──"

[[dialogue]]
speaker = "アム"
# 「ん～♪　やっぱりカフェのご飯おいし～！　午後の鍛錬に備えてしっかり補給しとかないとね！」
line = "「ん～♪　やっぱりカフェのご飯おいし～！　午後の鍛錬に備えてしっかり補給しとかないとね！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……アム。私、ここにいてもよいのでしょうか？」
line = "「……アム。私、ここにいてもよいのでしょうか？」"

[[dialogue]]
speaker = "アム"
# 「え、急にどうしたのエルゼ」
line = "「え、急にどうしたのエルゼ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「いえ。だってアムは会長様とお付き合いをされているのでしょう？　私、お邪魔虫ではないかと気になってしまって」
line = "「いえ。だってアムは会長様とお付き合いをされているのでしょう？　私、お邪魔虫ではないかと気になってしまって」"

[[dialogue]]
speaker = "アム"
# 「あはは、ないない！　お昼は大勢で食べた方がおいしいし！　ねー、会長？」
line = "「あはは、ないない！　お昼は大勢で食べた方がおいしいし！　ねー、会長？」"

[[dialogue]]
speaker = "unk"
# ああ、もちろん
line = "ああ、もちろん"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そ、そうですか。ありがとうございます」
line = "「そ、そうですか。ありがとうございます」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……しかし、驚きです。まさかアムと会長様が交際をされるだなんて、想像もしていませんでした」
line = "「……しかし、驚きです。まさかアムと会長様が交際をされるだなんて、想像もしていませんでした」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私、実はお友達からもよく訊ねられるのです。お２人はいったいどのような経緯でお付き合いすることになったのかと」
line = "「私、実はお友達からもよく訊ねられるのです。お２人はいったいどのような経緯でお付き合いすることになったのかと」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「特に何も知りません、といつも返しております。ですが──」
line = "「特に何も知りません、といつも返しております。ですが──」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「うずうず、うずうず……♪」
line = "「うずうず、うずうず……♪」"

[[dialogue]]
speaker = "アム"
# 「いや、気になるなら聞いてくれていいよエルゼ？　お嬢様だから、はしたないとか思ってるかもだけど……あたしも会長も気にしないし」
line = "「いや、気になるなら聞いてくれていいよエルゼ？　お嬢様だから、はしたないとか思ってるかもだけど……あたしも会長も気にしないし」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「本当ですか！　実はずっと、ずーっと気になって仕方がなかったのです！」
line = "「本当ですか！　実はずっと、ずーっと気になって仕方がなかったのです！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あのがさつで子供っぽいアムと！　学園も歳も離れた会長様が一体どうやって恋人の関係へと至ったのか……！」
line = "「あのがさつで子供っぽいアムと！　学園も歳も離れた会長様が一体どうやって恋人の関係へと至ったのか……！」"

[[dialogue]]
speaker = "アム"
# 「なんかどさくさに紛れて失礼なこと言われてる……！？」
line = "「なんかどさくさに紛れて失礼なこと言われてる……！？」"

[[dialogue]]
speaker = "アム"
# 「期待してるところ悪いけど、普通だよ？　エルゼが期待してるようなドラマチックな展開はないと思うけど……じゃあ質問どうぞ？」
line = "「期待してるところ悪いけど、普通だよ？　エルゼが期待してるようなドラマチックな展開はないと思うけど……じゃあ質問どうぞ？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「で、では。告白したのはどちらからなのですか！？」
line = "「で、では。告白したのはどちらからなのですか！？」"

[[dialogue]]
speaker = "アム"
# 「会長からだよ。放課後に呼び出されて、好きだ～って言われた感じ」
line = "「会長からだよ。放課後に呼び出されて、好きだ～って言われた感じ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「きゃああっ……♪　甘酸っぱい！　素敵ですわね！」
line = "「きゃああっ……♪　甘酸っぱい！　素敵ですわね！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それでアムはお返事をしたと……！　『あたしも好き』みたいなセリフを言って、ちゅ、ちゅーなんかも……！？」
line = "「それでアムはお返事をしたと……！　『あたしも好き』みたいなセリフを言って、ちゅ、ちゅーなんかも……！？」"

[[dialogue]]
speaker = "アム"
# 「ううん。返事は保留にして、決闘を申し込んだよね」
line = "「ううん。返事は保留にして、決闘を申し込んだよね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「──は？　えっ？　き、聞き間違いですか？」
line = "「──は？　えっ？　き、聞き間違いですか？」"

[[dialogue]]
speaker = "unk"
# アムに決闘を申し込まれたんだ
line = "アムに決闘を申し込まれたんだ"

[[dialogue]]
speaker = "unk"
# 聞き間違いじゃないよ
line = "聞き間違いじゃないよ"

[[dialogue]]
speaker = "アム"
# 「いやあ、熱かったよねえ、あの日のバトル♪」
line = "「いやあ、熱かったよねえ、あの日のバトル♪」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「どこが普通なのです！？　確かにドラマチックではありませんが！　なぜ急にバイオレンスな展開に！？」
line = "「どこが普通なのです！？　確かにドラマチックではありませんが！　なぜ急にバイオレンスな展開に！？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「詳しく聞かないことには理解が追い付きません……！　仔細に！　仔細にお願いします！」
line = "「詳しく聞かないことには理解が追い付きません……！　仔細に！　仔細にお願いします！」"

[[dialogue]]
speaker = "アム"
# 「うーん……負けた勝負のことだから、あんまり話したくないんだけど。エルゼがそう言うなら……」
line = "「うーん……負けた勝負のことだから、あんまり話したくないんだけど。エルゼがそう言うなら……」"

[[dialogue]]
speaker = "unk"
# ──俺がアムに告白した日の夜。特別に貸し切った真夜中のアリーナで決闘を行った。
line = "──俺がアムに告白した日の夜。特別に貸し切った真夜中のアリーナで決闘を行った。"

[[dialogue]]
speaker = "unk"
# アムは流星附属校にその盾ありと称される、突破困難な守備力を有する相手だ。
line = "アムは流星附属校にその盾ありと称される、突破困難な守備力を有する相手だ。"

[[dialogue]]
speaker = "unk"
# 受け止めた攻撃はそのまま盾に蓄積され、倍の力の光線となって反射までしてくる強者だが……
line = "受け止めた攻撃はそのまま盾に蓄積され、倍の力の光線となって反射までしてくる強者だが……"

[[dialogue]]
speaker = "unk"
# それでも俺は想いを伝えるために、全力でその防御を突破して──
line = "それでも俺は想いを伝えるために、全力でその防御を突破して──"

[[dialogue]]
speaker = "アム"
# 「はぁっ……はぁあっ……ここまで、かな……やるじゃん会長。あたしの負けだね……」
line = "「はぁっ……はぁあっ……ここまで、かな……やるじゃん会長。あたしの負けだね……」"

[[dialogue]]
speaker = "アム"
# 「うん。星騎士に二言はないよ。決闘に負けたんだもん。約束どおり、今日からあたしは会長の彼女だよ！」
line = "「うん。星騎士に二言はないよ。決闘に負けたんだもん。約束どおり、今日からあたしは会長の彼女だよ！」"

[[dialogue]]
speaker = "unk"
# 決闘しようと言われると思わなかった
line = "決闘しようと言われると思わなかった"

[[dialogue]]
speaker = "unk"
# まさか告白したら
line = "まさか告白したら"

[[dialogue]]
speaker = "アム"
# 「あはは……まあそこはあたしの性格ってことで！」
line = "「あはは……まあそこはあたしの性格ってことで！」"

[[dialogue]]
speaker = "アム"
# 「だってあたしと会長は、お互いに切磋琢磨するライバルでしょ？　この関係、お付き合いが始まってからも続けたいと思ったから……」
line = "「だってあたしと会長は、お互いに切磋琢磨するライバルでしょ？　この関係、お付き合いが始まってからも続けたいと思ったから……」"

[[dialogue]]
speaker = "アム"
# 「会長が、好きな女の子だからって理由で手加減しないかどうか。見極めたかったんだよね」
line = "「会長が、好きな女の子だからって理由で手加減しないかどうか。見極めたかったんだよね」"

[[dialogue]]
speaker = "アム"
# 「まあでも余計な心配だったかな……！　会長、全力で戦ってくれたし♪」
line = "「まあでも余計な心配だったかな……！　会長、全力で戦ってくれたし♪」"

[[dialogue]]
speaker = "unk"
# 手加減したら失礼だからな
line = "手加減したら失礼だからな"

[[dialogue]]
speaker = "アム"
# 「うん！　ありがとー、会長！　これからもお互い、一緒に強くなろうね！」
line = "「うん！　ありがとー、会長！　これからもお互い、一緒に強くなろうね！」"

[[dialogue]]
speaker = "アム"
# 「いーい、忘れちゃダメだよ？　今日からあたしたちはお付き合いをするけど、星徒会長の座をかけた勝負は終わってないからね！」
line = "「いーい、忘れちゃダメだよ？　今日からあたしたちはお付き合いをするけど、星徒会長の座をかけた勝負は終わってないからね！」"

[[dialogue]]
speaker = "アム"
# 「あたしは全力で新星の星徒会長を目指す！　会長は全力で星徒会長の座を守る！」
line = "「あたしは全力で新星の星徒会長を目指す！　会長は全力で星徒会長の座を守る！」"

[[dialogue]]
speaker = "アム"
# 「あたしが進級して、いつか……観客でいっぱいのアリーナで、御前試合をするんだからね！」
line = "「あたしが進級して、いつか……観客でいっぱいのアリーナで、御前試合をするんだからね！」"

[[dialogue]]
speaker = "unk"
# アムの挑戦の日まで俺は会長で居続ける
line = "アムの挑戦の日まで俺は会長で居続ける"

[[dialogue]]
speaker = "unk"
# もちろんだ
line = "もちろんだ"

[[dialogue]]
speaker = "アム"
# 「ありがと！　それじゃ、帰ろっか！」
line = "「ありがと！　それじゃ、帰ろっか！」"

[[dialogue]]
speaker = "アム"
# 「え……手を繋ぐの？　そ、そーだよね。恋人同士だもんね……」
line = "「え……手を繋ぐの？　そ、そーだよね。恋人同士だもんね……」"

[[dialogue]]
speaker = "アム"
# 「……えへへ<emoji=heart04>」
line = "「……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "アム"
# 「──とまあ、こんな感じ」
line = "「──とまあ、こんな感じ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……なるほど。アムらしいと言えば、らしいですわね」
line = "「……なるほど。アムらしいと言えば、らしいですわね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「いきなりのバイオレンス展開に驚きましたが、とても素敵な馴れ初めかと思います。お互いで高めあえる仲、素晴らしいです♪」
line = "「いきなりのバイオレンス展開に驚きましたが、とても素敵な馴れ初めかと思います。お互いで高めあえる仲、素晴らしいです♪」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「素敵なパートナーができたアムは、これからもっと強い星騎士になると思いますが……私だって負けませんわよ！」
line = "「素敵なパートナーができたアムは、これからもっと強い星騎士になると思いますが……私だって負けませんわよ！」"

[[dialogue]]
speaker = "アム"
# 「もっちろん！　エルゼはあたしのライバル２号だもんね！　これからもよろしくっ♪」
line = "「もっちろん！　エルゼはあたしのライバル２号だもんね！　これからもよろしくっ♪」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……その呼称だけは、どうにかして欲しいところですが」
line = "「……その呼称だけは、どうにかして欲しいところですが」"

[[dialogue]]
speaker = "unk"
# 俺とアムはお互いを想いあう恋人であり、星騎士としての力をぶつけ合うライバルでもある。
line = "俺とアムはお互いを想いあう恋人であり、星騎士としての力をぶつけ合うライバルでもある。"

[[dialogue]]
speaker = "unk"
# 付き合う以前よりもいっそう、気の置けない仲になれたことが俺も嬉しいのだった──
line = "付き合う以前よりもいっそう、気の置けない仲になれたことが俺も嬉しいのだった──"
