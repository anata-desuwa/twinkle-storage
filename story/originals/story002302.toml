[[dialogue]]
speaker = "リーリア"
# 「ここのところお世話になってますけど、コハルコ先輩のご家庭って、本当いい家族ですよね」
line = "「ここのところお世話になってますけど、コハルコ先輩のご家庭って、本当いい家族ですよね」"

[[dialogue]]
speaker = "コハルコ"
# 「まぁね、自慢の家族だよ」
line = "「まぁね、自慢の家族だよ」"

[[dialogue]]
speaker = "お客さん？"
# 「すみませーん、よろしいでしょうか」
line = "「すみませーん、よろしいでしょうか」"

[[dialogue]]
speaker = "コハルコ"
# 「あ、お客さんだ。お父さんはパソコンの組み立てしてるから、私行ってくるね」
line = "「あ、お客さんだ。お父さんはパソコンの組み立てしてるから、私行ってくるね」"

[[dialogue]]
speaker = "リーリア"
# 「はぁい。じゃあ私は掃除でもしてますね」
line = "「はぁい。じゃあ私は掃除でもしてますね」"

[[dialogue]]
speaker = "コハルコ"
# 「いらっしゃいませ。何かお探しものですか？」
line = "「いらっしゃいませ。何かお探しものですか？」"

[[dialogue]]
speaker = "お客さん？"
# 「……はい。パソコンを自作したいのですが、久しぶりなのでいろいろ教えていただければと思いまして」
line = "「……はい。パソコンを自作したいのですが、久しぶりなのでいろいろ教えていただければと思いまして」"

[[dialogue]]
speaker = "コハルコ"
# 「かしこまりました。最高の１台を組み上げましょうね！」
line = "「かしこまりました。最高の１台を組み上げましょうね！」"

[[dialogue]]
speaker = "お客さん？"
# 「は、はい……」
line = "「は、はい……」"

[[dialogue]]
speaker = "コハルコ"
# 「まずはスペックですね。どのような用途でお考えですか？」
line = "「まずはスペックですね。どのような用途でお考えですか？」"

[[dialogue]]
speaker = "お客さん？"
# 「えっと、その、特に何用とかは考えていなくて。……それほど高性能でなくてもいいんですが、スロットに余裕を持たせておこうかと」
line = "「えっと、その、特に何用とかは考えていなくて。……それほど高性能でなくてもいいんですが、スロットに余裕を持たせておこうかと」"

[[dialogue]]
speaker = "コハルコ"
# 「なるほど、あとで拡張しやすいですからね。ゲームはよく遊ばれますか？　オンラインゲームをされるのでしたらＣＰＵは最新のものがおすすめですよ」
line = "「なるほど、あとで拡張しやすいですからね。ゲームはよく遊ばれますか？　オンラインゲームをされるのでしたらＣＰＵは最新のものがおすすめですよ」"

[[dialogue]]
speaker = "お客さん？"
# 「対人戦は沼……いえ、ゲームはあまり嗜みませんね。消費電力を考えても、ＣＰＵはミドルクラスで十分だと思います」
line = "「対人戦は沼……いえ、ゲームはあまり嗜みませんね。消費電力を考えても、ＣＰＵはミドルクラスで十分だと思います」"

[[dialogue]]
speaker = "コハルコ"
# 「ふふっ。さすが経験者、お詳しいですね」
line = "「ふふっ。さすが経験者、お詳しいですね」"

[[dialogue]]
speaker = "お客さん？"
# 「いえ、それほどでは。……可笑しかったでしょうか？」
line = "「いえ、それほどでは。……可笑しかったでしょうか？」"

[[dialogue]]
speaker = "コハルコ"
# 「若い女の子でパソコンに詳しい人は珍しいですから、嬉しくて、つい。すみません」
line = "「若い女の子でパソコンに詳しい人は珍しいですから、嬉しくて、つい。すみません」"

[[dialogue]]
speaker = "お客さん？"
# 「分かります。コラ……私の友達もパソコンはさっぱりで、話が合わないんです」
line = "「分かります。コラ……私の友達もパソコンはさっぱりで、話が合わないんです」"

[[dialogue]]
speaker = "コハルコ"
# 「私もです。パーツの名前を出したら、なにそれ美味しいのって言われちゃって」
line = "「私もです。パーツの名前を出したら、なにそれ美味しいのって言われちゃって」"

[[dialogue]]
speaker = "お客さん？"
# 「あはは、私も同じこと聞かれました」
line = "「あはは、私も同じこと聞かれました」"

[[dialogue]]
speaker = "お客さん？"
# 「…………あ」
line = "「…………あ」"

[[dialogue]]
speaker = "unk"
# 客の視線がガラスケースの中に注がれている。そこには１点のパーツがあった。
line = "客の視線がガラスケースの中に注がれている。そこには１点のパーツがあった。"

[[dialogue]]
speaker = "コハルコ"
# 「『<ruby=ドーメキ>Ｄｏｍｅｋｉ</ruby>』……そちらは倒産したメーカーのパーツです。評価は非常に高かったのですが、今となっては型落ちですね。もし購入をお考えでしたら、お値引きしますよ」
line = "「『<ruby>Ｄｏｍｅｋｉ<rt>ドーメキ</rt></ruby>』……そちらは倒産したメーカーのパーツです。評価は非常に高かったのですが、今となっては型落ちですね。もし購入をお考えでしたら、お値引きしますよ」"

[[dialogue]]
speaker = "お客さん？"
# 「……これ、うちの出したパーツです」
line = "「……これ、うちの出したパーツです」"

[[dialogue]]
speaker = "コハルコ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "お客さん？"
# 「申し訳ありません、パソコンを買いに来たのはウソなんです」
line = "「申し訳ありません、パソコンを買いに来たのはウソなんです」"

[[dialogue]]
speaker = "レイラ"
# 「……私は<ruby=どうめき>百目騎</ruby>レイラ。最後のコラプサーです」
line = "「……私は<ruby>百目騎<rt>どうめき</rt></ruby>レイラ。最後のコラプサーです」"

[[dialogue]]
speaker = "コハルコ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "コハルコ"
# （百目騎といえば、五名門の一角。半導体産業で財を成した一族だ。最近は分家に事業を乗っ取られたらしいけど……）
line = "（百目騎といえば、五名門の一角。半導体産業で財を成した一族だ。最近は分家に事業を乗っ取られたらしいけど……）"

[[dialogue]]
speaker = "コハルコ"
# （ああ、そうか。この子が、コラプサーのハッカー……私の追跡を妨害していた張本人だ）
line = "（ああ、そうか。この子が、コラプサーのハッカー……私の追跡を妨害していた張本人だ）"

[[dialogue]]
speaker = "レイラ"
# 「お静かに。戦いになれば、私は手加減できません。あなたのご家族もこのお店も無事では済まないでしょう。……私もそれは望んでいません」
line = "「お静かに。戦いになれば、私は手加減できません。あなたのご家族もこのお店も無事では済まないでしょう。……私もそれは望んでいません」"

[[dialogue]]
speaker = "コハルコ"
# 「……何が目的なの？」
line = "「……何が目的なの？」"

[[dialogue]]
speaker = "レイラ"
# 「私たちコラプサーの目的はリクリエのない世界。そのために、朝比奈コハルコさん、あなたの…………命が必要なんです」
line = "「私たちコラプサーの目的はリクリエのない世界。そのために、朝比奈コハルコさん、あなたの…………命が必要なんです」"

[[dialogue]]
speaker = "コハルコ"
# 「私の……命……」
line = "「私の……命……」"

[[dialogue]]
speaker = "コハルコ"
# 「ちなみに……百目騎さんの言う、リクリエのない世界……その中には私の家族も含まれるんだよね？」
line = "「ちなみに……百目騎さんの言う、リクリエのない世界……その中には私の家族も含まれるんだよね？」"

[[dialogue]]
speaker = "レイラ"
# 「はい。世界の救済は必ず成し遂げます。そうでなければ、私の目的も果たされませんから」
line = "「はい。世界の救済は必ず成し遂げます。そうでなければ、私の目的も果たされませんから」"

[[dialogue]]
speaker = "レイラ"
# 「あらかじめ言っておきます。私の星術はコラプサーの中で最も強力です。……どんなに犠牲が出ても、止まるつもりはありません。だから、何もせずについてきてください」
line = "「あらかじめ言っておきます。私の星術はコラプサーの中で最も強力です。……どんなに犠牲が出ても、止まるつもりはありません。だから、何もせずについてきてください」"

[[dialogue]]
speaker = "コハルコ"
# 「分かった。あなたについていくよ」
line = "「分かった。あなたについていくよ」"

[[dialogue]]
speaker = "レイラ"
# 「……決断が早いんですね」
line = "「……決断が早いんですね」"

[[dialogue]]
speaker = "コハルコ"
# 「これでも星騎士としてはベテランだし、私じゃあなたに勝てないことは見たら理解できる。選択肢はないよ」
line = "「これでも星騎士としてはベテランだし、私じゃあなたに勝てないことは見たら理解できる。選択肢はないよ」"

[[dialogue]]
speaker = "コハルコ"
# （コラプサーの強さは実際戦ったから分かる。今は従って、相手の様子を見るしかない……）
line = "（コラプサーの強さは実際戦ったから分かる。今は従って、相手の様子を見るしかない……）"

[[dialogue]]
speaker = "リーリア"
# 「コハルコ先輩、お出かけですか？」
line = "「コハルコ先輩、お出かけですか？」"

[[dialogue]]
speaker = "リーリア"
# 「私、一応これでも護衛なので、お出かけなら一言欲しいんですが……そちらの方から何かされてます？」
line = "「私、一応これでも護衛なので、お出かけなら一言欲しいんですが……そちらの方から何かされてます？」"

[[dialogue]]
speaker = "コハルコ"
# 「ごめん、リーリアさん。私、行くことにしたから──」
line = "「ごめん、リーリアさん。私、行くことにしたから──」"

[[dialogue]]
speaker = "コハルコ"
# 「サイバーアナライズ！」
line = "「サイバーアナライズ！」"

[[dialogue]]
speaker = "リーリア"
# 「っ！？」
line = "「っ！？」"

[[dialogue]]
speaker = "コハルコ"
# 「私は家族を守りたい……だから、バイバイ。新星のみんなによろしくね」
line = "「私は家族を守りたい……だから、バイバイ。新星のみんなによろしくね」"

[[dialogue]]
speaker = "リーリア"
# 「あ、待って……！　コハルコ先輩、コハルコ先輩っ！！」
line = "「あ、待って……！　コハルコ先輩、コハルコ先輩っ！！」"
