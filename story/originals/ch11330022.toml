[[dialogue]]
speaker = "unk"
# 第２話,リィベル、漫画を買う,P
line = "第２話,リィベル、漫画を買う,P"

[[dialogue]]
speaker = "unk"
# 週末、俺とリィベルはある漫画を買いに秋葉原まで来ていた。
line = "週末、俺とリィベルはある漫画を買いに秋葉原まで来ていた。"

[[dialogue]]
speaker = "リィベル"
# 「ここが秋葉原……モンスター退治で来たことはあるけど、用があって来たのは初めてね」
line = "「ここが秋葉原……モンスター退治で来たことはあるけど、用があって来たのは初めてね」"

[[dialogue]]
speaker = "リィベル"
# 「なんというか……猥雑な街ね」
line = "「なんというか……猥雑な街ね」"

[[dialogue]]
speaker = "unk"
# 秋葉原には様々なパソコン、アニメグッズ、カードなどの店があり、中には大人のおもちゃの専門店まである。リィベルの言わんとすることは分かる。
line = "秋葉原には様々なパソコン、アニメグッズ、カードなどの店があり、中には大人のおもちゃの専門店まである。リィベルの言わんとすることは分かる。"

[[dialogue]]
speaker = "リィベル"
# 「悪い意味じゃないわ。こういう欲望に塗れたところに強い魔族はいるものよ。強そうな魔族がいたら魔将の候補者にしましょう」
line = "「悪い意味じゃないわ。こういう欲望に塗れたところに強い魔族はいるものよ。強そうな魔族がいたら魔将の候補者にしましょう」"

[[dialogue]]
speaker = "unk"
# リィベルはロストアイテム『深淵書庫』から生まれた存在だ。
line = "リィベルはロストアイテム『深淵書庫』から生まれた存在だ。"

[[dialogue]]
speaker = "unk"
# 『深淵書庫』はリクリエで滅ぼされた魔族の怨念を収めた書庫であり、暴走すれば呪いを撒き散らす危険性がある。
line = "『深淵書庫』はリクリエで滅ぼされた魔族の怨念を収めた書庫であり、暴走すれば呪いを撒き散らす危険性がある。"

[[dialogue]]
speaker = "unk"
# 書庫を制御するには７人の魔将が必要らしく、リィベルはあと５人の適合者を探している。
line = "書庫を制御するには７人の魔将が必要らしく、リィベルはあと５人の適合者を探している。"

[[dialogue]]
speaker = "リィベル"
# 「ここが秋葉原の本屋……うわ」
line = "「ここが秋葉原の本屋……うわ」"

[[dialogue]]
speaker = "リィベル"
# 「向こうの棚に卑猥な本が見えるのだけど……私の気のせいじゃないわよね？」
line = "「向こうの棚に卑猥な本が見えるのだけど……私の気のせいじゃないわよね？」"

[[dialogue]]
speaker = "unk"
# しまった。ここはいわゆるえっちな本も置いてある本屋だ。特典で選んでしまったけど、リィベルを連れてくるべきでなかったかもしれない。
line = "しまった。ここはいわゆるえっちな本も置いてある本屋だ。特典で選んでしまったけど、リィベルを連れてくるべきでなかったかもしれない。"

[[dialogue]]
speaker = "unk"
# 買ってこようか？
line = "買ってこようか？"

[[dialogue]]
speaker = "リィベル"
# 「イヤよ。ここまで来て棚に並んでいるところを見れないなんて」
line = "「イヤよ。ここまで来て棚に並んでいるところを見れないなんて」"

[[dialogue]]
speaker = "リィベル"
# 「ん」
line = "「ん」"

[[dialogue]]
speaker = "unk"
# リィベルが俺に向かって手を差し出す。
line = "リィベルが俺に向かって手を差し出す。"

[[dialogue]]
speaker = "リィベル"
# 「私が卑猥な本を見ると、変な恰好になるかもしれないし……私は目をつむっているから、あなたが連れて行って」
line = "「私が卑猥な本を見ると、変な恰好になるかもしれないし……私は目をつむっているから、あなたが連れて行って」"

[[dialogue]]
speaker = "リィベル"
# 「ほら、早く」
line = "「ほら、早く」"

[[dialogue]]
speaker = "unk"
# 女の子と手をつなぐことに躊躇するけど──その手を取りたくて、反射的に握る。
line = "女の子と手をつなぐことに躊躇するけど──その手を取りたくて、反射的に握る。"

[[dialogue]]
speaker = "リィベル"
# 「んっ……あなたの手、意外と大きい…………いえ、なんでもないわ」
line = "「んっ……あなたの手、意外と大きい…………いえ、なんでもないわ」"

[[dialogue]]
speaker = "リィベル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# できるだけ優しく、リィベルの手を引く。優しくできてる自信なんかないけど、それでも、できるだけ優しく。
line = "できるだけ優しく、リィベルの手を引く。優しくできてる自信なんかないけど、それでも、できるだけ優しく。"

[[dialogue]]
speaker = "unk"
# 着いたよ
line = "着いたよ"

[[dialogue]]
speaker = "リィベル"
# 「っ！　すごいわ……漫画が所狭しと並べられている」
line = "「っ！　すごいわ……漫画が所狭しと並べられている」"

[[dialogue]]
speaker = "リィベル"
# 「この漫画の全てに、描いた人と、読む人がいる…………美しいわね」
line = "「この漫画の全てに、描いた人と、読む人がいる…………美しいわね」"

[[dialogue]]
speaker = "リィベル"
# 「あ、これがあの小説の漫画ね」
line = "「あ、これがあの小説の漫画ね」"

[[dialogue]]
speaker = "unk"
# リィベルの目当ては、この前の変身のきっかけになった小説のコミカライズだ。相当な人気なのか、特設コーナーが設けられている。
line = "リィベルの目当ては、この前の変身のきっかけになった小説のコミカライズだ。相当な人気なのか、特設コーナーが設けられている。"

[[dialogue]]
speaker = "リィベル"
# 「ふぅん……こんな感じなのね。小説の挿絵に比べるとキャラクターが筋肉質だけど、これは漫画版の個性ということかしら」
line = "「ふぅん……こんな感じなのね。小説の挿絵に比べるとキャラクターが筋肉質だけど、これは漫画版の個性ということかしら」"

[[dialogue]]
speaker = "リィベル"
# 「５巻の表紙のキャラ、見たことないけど漫画のオリジナル？　……ああ、原作ではビジュアルがなかったキャラね。気が付くとしっくりくるわ」
line = "「５巻の表紙のキャラ、見たことないけど漫画のオリジナル？　……ああ、原作ではビジュアルがなかったキャラね。気が付くとしっくりくるわ」"

[[dialogue]]
speaker = "リィベル"
# 「最新刊がこの表紙ということは、まだ原作に追い付いてないのかしら。原作だと半分くらいだから、まだまだ巻数は増えそうね」
line = "「最新刊がこの表紙ということは、まだ原作に追い付いてないのかしら。原作だと半分くらいだから、まだまだ巻数は増えそうね」"

[[dialogue]]
speaker = "リィベル"
# 「……何よ、じろじろ見て」
line = "「……何よ、じろじろ見て」"

[[dialogue]]
speaker = "unk"
# 楽しそうだから、つい
line = "楽しそうだから、つい"

[[dialogue]]
speaker = "リィベル"
# 「っ！　私は、楽しんでなんか……」
line = "「っ！　私は、楽しんでなんか……」"

[[dialogue]]
speaker = "リィベル"
# 「…………いいえ、確かに私は楽しんでいる。肯定するわ。リクリエに復讐する使命も忘れて……まるで、ひとりの魔族みたいに」
line = "「…………いいえ、確かに私は楽しんでいる。肯定するわ。リクリエに復讐する使命も忘れて……まるで、ひとりの魔族みたいに」"

[[dialogue]]
speaker = "リィベル"
# 「だらしがないと、自分でも思うわ。それでも、私はこの本たちを読みたいと思っている。……意味のない寄り道だと分かっていても、ね」
line = "「だらしがないと、自分でも思うわ。それでも、私はこの本たちを読みたいと思っている。……意味のない寄り道だと分かっていても、ね」"

[[dialogue]]
speaker = "unk"
# そんなことはないよ
line = "そんなことはないよ"

[[dialogue]]
speaker = "unk"
# たとえ特殊な出自だとしても、何かのために生まれてきたとしても、それ以外をしちゃいけない理由なんてない。それをしなくちゃいけない理由もない。
line = "たとえ特殊な出自だとしても、何かのために生まれてきたとしても、それ以外をしちゃいけない理由なんてない。それをしなくちゃいけない理由もない。"

[[dialogue]]
speaker = "リィベル"
# 「ふん……あなたは優しいのね。お人好しで考えなし。私が使命を放って本ばかり読んでいたら、書庫はいずれ呪いで暴走するわ」
line = "「ふん……あなたは優しいのね。お人好しで考えなし。私が使命を放って本ばかり読んでいたら、書庫はいずれ呪いで暴走するわ」"

[[dialogue]]
speaker = "unk"
# その時はみんなでなんとかする
line = "その時はみんなでなんとかする"

[[dialogue]]
speaker = "リィベル"
# 「みんなで、ね。モネもウィステリアもそう言っていたわ。魔将システムもそうやって生まれたものだし」
line = "「みんなで、ね。モネもウィステリアもそう言っていたわ。魔将システムもそうやって生まれたものだし」"

[[dialogue]]
speaker = "リィベル"
# 「ほんとにみんな、お人好し……」
line = "「ほんとにみんな、お人好し……」"

[[dialogue]]
speaker = "リィベル"
# 「はぁ、脱線したわ。魔王がおかしなこと言うからよ」
line = "「はぁ、脱線したわ。魔王がおかしなこと言うからよ」"

[[dialogue]]
speaker = "リィベル"
# 「そもそも本屋に来ているんだから、楽しいに決まってるでしょ。……さ、漫画を買って帰るわよ。長居してもお店に迷惑でしょうし」
line = "「そもそも本屋に来ているんだから、楽しいに決まってるでしょ。……さ、漫画を買って帰るわよ。長居してもお店に迷惑でしょうし」"

[[dialogue]]
speaker = "リィベル"
# 「ふふっ……♪」
line = "「ふふっ……♪」"

[[dialogue]]
speaker = "unk"
# 漫画の入った紙袋を宝物のように抱えるリィベル。
line = "漫画の入った紙袋を宝物のように抱えるリィベル。"

[[dialogue]]
speaker = "リィベル"
# 「小冊子のオマケがあるとは思わなかったわ。得した気分ね。店舗特典らしいけど……あ」
line = "「小冊子のオマケがあるとは思わなかったわ。得した気分ね。店舗特典らしいけど……あ」"

[[dialogue]]
speaker = "リィベル"
# 「あなた、そのためにあの本屋にしたのね。なら先に話しなさいよ。卑猥な本の棚を見たら、さすがにぎょっとしたわ」
line = "「あなた、そのためにあの本屋にしたのね。なら先に話しなさいよ。卑猥な本の棚を見たら、さすがにぎょっとしたわ」"

[[dialogue]]
speaker = "リィベル"
# 「そういう本の存在は否定しないし、むしろあるべきだとも思うけど、いきなり目に入ると驚くものよ」
line = "「そういう本の存在は否定しないし、むしろあるべきだとも思うけど、いきなり目に入ると驚くものよ」"

[[dialogue]]
speaker = "リィベル"
# 「はぁ、まぁいいわ。今日は気分がいいから許してあげる」
line = "「はぁ、まぁいいわ。今日は気分がいいから許してあげる」"

[[dialogue]]
speaker = "リィベル"
# 「ふふっ、ふふふ……♪」
line = "「ふふっ、ふふふ……♪」"

[[dialogue]]
speaker = "unk"
# こんなに笑っている彼女を初めて見たかもしれない。寮に帰るまで、ずっと上機嫌だった。
line = "こんなに笑っている彼女を初めて見たかもしれない。寮に帰るまで、ずっと上機嫌だった。"
