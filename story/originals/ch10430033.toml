[[dialogue]]
speaker = "unk"
# 第３話,サチのマイブーム,P
line = "第３話,サチのマイブーム,P"

[[dialogue]]
speaker = "unk"
# その日は、サチが放課後に個人的な用事があるとのことで、会わない予定だった。
line = "その日は、サチが放課後に個人的な用事があるとのことで、会わない予定だった。"

[[dialogue]]
speaker = "unk"
# しかし、俺が星徒会の買い出しで街に出ていると、偶然サチの姿を見かけた。
line = "しかし、俺が星徒会の買い出しで街に出ていると、偶然サチの姿を見かけた。"

[[dialogue]]
speaker = "サチ"
# （学園の生徒には見られてませんよね……？）
line = "（学園の生徒には見られてませんよね……？）"

[[dialogue]]
speaker = "unk"
# きょろきょろと周囲を見回し、どこか落ち着かない様子のサチ。
line = "きょろきょろと周囲を見回し、どこか落ち着かない様子のサチ。"

[[dialogue]]
speaker = "unk"
# （サチ、なんの用事だろう……？）
line = "（サチ、なんの用事だろう……？）"

[[dialogue]]
speaker = "unk"
# 気になった俺は、少し距離を取って彼女の後を追ってみることにした。
line = "気になった俺は、少し距離を取って彼女の後を追ってみることにした。"

[[dialogue]]
speaker = "サチ"
# 「ふふっ……♪」
line = "「ふふっ……♪」"

[[dialogue]]
speaker = "unk"
# 家電量販店から出てきたサチは、どこか上機嫌だ。
line = "家電量販店から出てきたサチは、どこか上機嫌だ。"

[[dialogue]]
speaker = "unk"
# 俺は意を決して声をかける。
line = "俺は意を決して声をかける。"

[[dialogue]]
speaker = "サチ"
# 「ひゃっ！？　お、お兄さん！？　どうしてここに……！？」
line = "「ひゃっ！？　お、お兄さん！？　どうしてここに……！？」"

[[dialogue]]
speaker = "サチ"
# 「――星徒会の買い出し？　な、なるほど……」
line = "「――星徒会の買い出し？　な、なるほど……」"

[[dialogue]]
speaker = "unk"
# サチ、ごめん。実は――
line = "サチ、ごめん。実は――"

[[dialogue]]
speaker = "サチ"
# 「えっ！？　ずっと見てたんですか！？　お、お兄さん、エッチですよ……！」
line = "「えっ！？　ずっと見てたんですか！？　お、お兄さん、エッチですよ……！」"

[[dialogue]]
speaker = "サチ"
# 「――挙動不審だったから気になった？　そ、それは……」
line = "「――挙動不審だったから気になった？　そ、それは……」"

[[dialogue]]
speaker = "サチ"
# 「ちょっと恥ずかしくて……お兄さんや学園のみんなには、知られたくなかったというか……」
line = "「ちょっと恥ずかしくて……お兄さんや学園のみんなには、知られたくなかったというか……」"

[[dialogue]]
speaker = "サチ"
# 「その……実は……買ってたのは、魔法少女アニメの……」
line = "「その……実は……買ってたのは、魔法少女アニメの……」"

[[dialogue]]
speaker = "unk"
# そう言って、サチはおずおずと袋の中身を見せてくる。
line = "そう言って、サチはおずおずと袋の中身を見せてくる。"

[[dialogue]]
speaker = "unk"
# 入っていたのは、魔法少女アニメの光って鳴る変身アイテムのおもちゃだった。
line = "入っていたのは、魔法少女アニメの光って鳴る変身アイテムのおもちゃだった。"

[[dialogue]]
speaker = "unk"
# サチ、そういうのが好きだったのか
line = "サチ、そういうのが好きだったのか"

[[dialogue]]
speaker = "サチ"
# 「いえ……前は正直、私自身が『魔法少女』って言われることに少し抵抗があったので、なんとなく観るのを避けていたんです」
line = "「いえ……前は正直、私自身が『魔法少女』って言われることに少し抵抗があったので、なんとなく観るのを避けていたんです」"

[[dialogue]]
speaker = "サチ"
# 「でも、この前リコリンちゃんに『考え方を変えたら上手くいくかも』って言われて……今までなんとなく避けていた他のことも、見直してみようかと思って」
line = "「でも、この前リコリンちゃんに『考え方を変えたら上手くいくかも』って言われて……今までなんとなく避けていた他のことも、見直してみようかと思って」"

[[dialogue]]
speaker = "サチ"
# 「星騎士としての力の使い方も、もしかしたら発想が狭かったものがあるかもしれないって思って……それで、知見を広げてみようと」
line = "「星騎士としての力の使い方も、もしかしたら発想が狭かったものがあるかもしれないって思って……それで、知見を広げてみようと」"

[[dialogue]]
speaker = "サチ"
# 「でも、今放送中の魔法少女モノを観始めたら……ドハマりしてしまって……」
line = "「でも、今放送中の魔法少女モノを観始めたら……ドハマりしてしまって……」"

[[dialogue]]
speaker = "サチ"
# 「ぐ、グッズが欲しくなって……買いに来ちゃったんです」
line = "「ぐ、グッズが欲しくなって……買いに来ちゃったんです」"

[[dialogue]]
speaker = "サチ"
# 「子供っぽいかもって思って、お兄さんには言えませんでした……恥ずかしいですし、彼女として幻滅されたらどうしようって……」
line = "「子供っぽいかもって思って、お兄さんには言えませんでした……恥ずかしいですし、彼女として幻滅されたらどうしようって……」"

[[dialogue]]
speaker = "unk"
# 俺は首を横に振る。
line = "俺は首を横に振る。"

[[dialogue]]
speaker = "unk"
# 大丈夫だ、むしろ可愛いと思った
line = "大丈夫だ、むしろ可愛いと思った"

[[dialogue]]
speaker = "サチ"
# 「か、可愛い……！？　はうぅ……<emoji=heart04>」
line = "「か、可愛い……！？　はうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「え？　――今度、お兄さんの家に遊びに行ったとき、一緒にアニメを……？」
line = "「え？　――今度、お兄さんの家に遊びに行ったとき、一緒にアニメを……？」"

[[dialogue]]
speaker = "unk"
# 後日。
line = "後日。"

[[dialogue]]
speaker = "unk"
# 週末にサチが家に遊びに来て、一緒にアニメを観ることになった。
line = "週末にサチが家に遊びに来て、一緒にアニメを観ることになった。"

[[dialogue]]
speaker = "サチ"
# 「それで、お兄さん……第１話を観てみて、どうでしょうか？」
line = "「それで、お兄さん……第１話を観てみて、どうでしょうか？」"

[[dialogue]]
speaker = "サチ"
# 「私的には、子供向けに作られているのに、物語がすごく丁寧で……キャラも魅力的だと思っていて――」
line = "「私的には、子供向けに作られているのに、物語がすごく丁寧で……キャラも魅力的だと思っていて――」"

[[dialogue]]
speaker = "unk"
# 変身シーン、すごくよかった
line = "変身シーン、すごくよかった"

[[dialogue]]
speaker = "サチ"
# 「そうなんです！　私、この第１話を観たとき、なんだか感動してしまって……」
line = "「そうなんです！　私、この第１話を観たとき、なんだか感動してしまって……」"

[[dialogue]]
speaker = "サチ"
# 「それで、変身アイテムのグッズがどうしても欲しくなっちゃって……<emoji=heart04>」
line = "「それで、変身アイテムのグッズがどうしても欲しくなっちゃって……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ"
# 「あの……お兄さん。私の趣味に付き合って頂いて、ありがとうございます」
line = "「あの……お兄さん。私の趣味に付き合って頂いて、ありがとうございます」"

[[dialogue]]
speaker = "unk"
# いや、俺の方が付き合いたかったんだ
line = "いや、俺の方が付き合いたかったんだ"

[[dialogue]]
speaker = "サチ"
# 「え？　――好きな人と趣味を共有するのは、きっと楽しいだろうなって思ったから……ですか？」
line = "「え？　――好きな人と趣味を共有するのは、きっと楽しいだろうなって思ったから……ですか？」"

[[dialogue]]
speaker = "サチ"
# 「そうですね……私も――」
line = "「そうですね……私も――」"

[[dialogue]]
speaker = "サチ"
# 「こうしてお兄さんと好きなものを共有できて、すごく嬉しいです♪」
line = "「こうしてお兄さんと好きなものを共有できて、すごく嬉しいです♪」"

[[dialogue]]
speaker = "unk"
# 柔らかく微笑むサチが愛しくて、俺はそっと彼女の手を握る。
line = "柔らかく微笑むサチが愛しくて、俺はそっと彼女の手を握る。"

[[dialogue]]
speaker = "サチ"
# 「ん……えへへ<emoji=heart04>」
line = "「ん……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 照れくさそうにしながらも、サチは手を握り返し、肩を寄せてくる。
line = "照れくさそうにしながらも、サチは手を握り返し、肩を寄せてくる。"

[[dialogue]]
speaker = "unk"
# 俺たちはそのままアニメの続きを観ながら、穏やかな２人の時間を過ごすのだった。
line = "俺たちはそのままアニメの続きを観ながら、穏やかな２人の時間を過ごすのだった。"
