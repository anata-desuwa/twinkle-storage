[[dialogue]]
speaker = "unk"
# 第１２話,星徒会長の選択,B
line = "第１２話,星徒会長の選択,B"

[[dialogue]]
speaker = "unk"
# 今日は星徒会長権限を使って、新星学園の全校生徒に集まってもらった。
line = "今日は星徒会長権限を使って、新星学園の全校生徒に集まってもらった。"

[[dialogue]]
speaker = "unk"
# 壇上に登り、マイク越しに生徒たちを見渡しながら話を始める。
line = "壇上に登り、マイク越しに生徒たちを見渡しながら話を始める。"

[[dialogue]]
speaker = "クロト"
# 『まずはガーディアンとの戦い、お疲れ様。みんなの頑張りのおかげで、何とか流星市国を守ることができた』
line = "『まずはガーディアンとの戦い、お疲れ様。みんなの頑張りのおかげで、何とか流星市国を守ることができた』"

[[dialogue]]
speaker = "クロト"
# 『そして、みんなもきっと一度は見ただろう、あの動画について説明したい』
line = "『そして、みんなもきっと一度は見ただろう、あの動画について説明したい』"

[[dialogue]]
speaker = "クロト"
# 「みんなに相談したいことがあるんだ」
line = "「みんなに相談したいことがあるんだ」"

[[dialogue]]
speaker = "unk"
# 星徒会長として、新星学園の方針を決定したい。
line = "星徒会長として、新星学園の方針を決定したい。"

[[dialogue]]
speaker = "unk"
# そう話したのが昨日のことだ。
line = "そう話したのが昨日のことだ。"

[[dialogue]]
speaker = "サーシャ"
# 「そうね～。真偽を調べてます、だけじゃみんな不安になるだけだもの」
line = "「そうね～。真偽を調べてます、だけじゃみんな不安になるだけだもの」"

[[dialogue]]
speaker = "サーシャ"
# 「戦うにしても、戦わないにしても、星徒会長が決める必要があるわ」
line = "「戦うにしても、戦わないにしても、星徒会長が決める必要があるわ」"

[[dialogue]]
speaker = "クロト"
# 「はい。ただ戦いを躊躇うだけでは、アルタイルは滅ぼされてしまいます」
line = "「はい。ただ戦いを躊躇うだけでは、アルタイルは滅ぼされてしまいます」"

[[dialogue]]
speaker = "クロト"
# 「でも俺は、デネブを滅ぼしたくない。いや……リクリエに脅かされているのなら、デネブも救いたい」
line = "「でも俺は、デネブを滅ぼしたくない。いや……リクリエに脅かされているのなら、デネブも救いたい」"

[[dialogue]]
speaker = "マトイ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マトイ"
# 「うん。気持ちは私も同じだよ。星騎士なんだから、みんな守りたいよね」
line = "「うん。気持ちは私も同じだよ。星騎士なんだから、みんな守りたいよね」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんが決めたのなら、異論はないわ～」
line = "「会長くんが決めたのなら、異論はないわ～」"

[[dialogue]]
speaker = "アナ"
# 「問題はどうやってそれを実現するのかです。リクリエと極星学園、２つの敵を同時に相手しながらどう戦うのか」
line = "「問題はどうやってそれを実現するのかです。リクリエと極星学園、２つの敵を同時に相手しながらどう戦うのか」"

[[dialogue]]
speaker = "クロト"
# 「それなんだけど──」
line = "「それなんだけど──」"

[[dialogue]]
speaker = "unk"
# 俺の考えを包み隠さず、星徒会のみんなに伝える。
line = "俺の考えを包み隠さず、星徒会のみんなに伝える。"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　いいじゃない、さすがクロトだわ！」
line = "「！　いいじゃない、さすがクロトだわ！」"

[[dialogue]]
speaker = "アナ"
# 「ふむ、なるほど。発想の転換といってもいいかもしれませんね」
line = "「ふむ、なるほど。発想の転換といってもいいかもしれませんね」"

[[dialogue]]
speaker = "マトイ"
# 「でもできるのかな……？　向こうはこっちを本気で滅ぼそうとしてるわけだし、話を聞いてくれないかも……」
line = "「でもできるのかな……？　向こうはこっちを本気で滅ぼそうとしてるわけだし、話を聞いてくれないかも……」"

[[dialogue]]
speaker = "クロト"
# 「わからない。でもやってみる価値はあると思ってる」
line = "「わからない。でもやってみる価値はあると思ってる」"

[[dialogue]]
speaker = "サーシャ"
# 「一番大変な道になるかもしれないけど、それでもやるのね？」
line = "「一番大変な道になるかもしれないけど、それでもやるのね？」"

[[dialogue]]
speaker = "クロト"
# 「はい。そのためには星徒会だけじゃなくて、星騎士みんなの協力が必要です」
line = "「はい。そのためには星徒会だけじゃなくて、星騎士みんなの協力が必要です」"

[[dialogue]]
speaker = "クロト"
# 「だから生徒たちには俺から話をしたいと思います。みんな混乱しているだろうから、説明も兼ねて」
line = "「だから生徒たちには俺から話をしたいと思います。みんな混乱しているだろうから、説明も兼ねて」"

[[dialogue]]
speaker = "サーシャ"
# 「うん、そこまで考えてるなら何も言う必要ないわね～」
line = "「うん、そこまで考えてるなら何も言う必要ないわね～」"

[[dialogue]]
speaker = "unk"
# 理想と現実にはギャップがある。
line = "理想と現実にはギャップがある。"

[[dialogue]]
speaker = "unk"
# しかし現実に屈することなく、現実を理想に近づけていく。
line = "しかし現実に屈することなく、現実を理想に近づけていく。"

[[dialogue]]
speaker = "unk"
# 言葉にすれば当たり前のことかもしれないけど、その意識があるだけで、視界がより開けて見える気がした。
line = "言葉にすれば当たり前のことかもしれないけど、その意識があるだけで、視界がより開けて見える気がした。"

[[dialogue]]
speaker = "クロト"
# 「明日、新星学園のみんなの前で話すよ」
line = "「明日、新星学園のみんなの前で話すよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、熱弁を期待してるわよ！」
line = "「ええ、熱弁を期待してるわよ！」"

[[dialogue]]
speaker = "クロト"
# 『まず平行世界について』
line = "『まず平行世界について』"

[[dialogue]]
speaker = "クロト"
# 『信じられないかもしれないけど、人間界・天界・魔界の三界とは別に、本当に平行世界が存在しているんだ』
line = "『信じられないかもしれないけど、人間界・天界・魔界の三界とは別に、本当に平行世界が存在しているんだ』"

[[dialogue]]
speaker = "クロト"
# 『俺たちがいる世界はアルタイル。他にデネブとベガがある。ただ、ベガはすでにリクリエで滅びたとされている』
line = "『俺たちがいる世界はアルタイル。他にデネブとベガがある。ただ、ベガはすでにリクリエで滅びたとされている』"

[[dialogue]]
speaker = "クロト"
# 『その前提で俺の話を聞いてほしい』
line = "『その前提で俺の話を聞いてほしい』"

[[dialogue]]
speaker = "unk"
# 驚きか、困惑か、アリーナの席のあちこちから声が上がる。
line = "驚きか、困惑か、アリーナの席のあちこちから声が上がる。"

[[dialogue]]
speaker = "unk"
# 噂にはなっていたものの、平行世界が存在することさえ、一部でしか知られていなかったのだから、無理もないだろう。
line = "噂にはなっていたものの、平行世界が存在することさえ、一部でしか知られていなかったのだから、無理もないだろう。"

[[dialogue]]
speaker = "クロト"
# 『平行世界については意図して隠していたわけじゃない』
line = "『平行世界については意図して隠していたわけじゃない』"

[[dialogue]]
speaker = "クロト"
# 『だけど平行世界には不明な点が多く、星徒会や学園が把握していることさえ、いつ覆るかわからない。だから今までは話せずにいた』
line = "『だけど平行世界には不明な点が多く、星徒会や学園が把握していることさえ、いつ覆るかわからない。だから今までは話せずにいた』"

[[dialogue]]
speaker = "クロト"
# 『だけどあの動画が出た以上、今わかっている範囲で話すよ』
line = "『だけどあの動画が出た以上、今わかっている範囲で話すよ』"

[[dialogue]]
speaker = "クロト"
# 『そして動画の内容について』
line = "『そして動画の内容について』"

[[dialogue]]
speaker = "クロト"
# 『極星学園を名乗る星騎士と戦ったことも、彼女が動画にある発言をしたことも事実だ』
line = "『極星学園を名乗る星騎士と戦ったことも、彼女が動画にある発言をしたことも事実だ』"

[[dialogue]]
speaker = "クロト"
# 『ただし、彼女が語った内容については裏付けはとれていない。現在も調査中で、真偽は不明のままだ』
line = "『ただし、彼女が語った内容については裏付けはとれていない。現在も調査中で、真偽は不明のままだ』"

[[dialogue]]
speaker = "unk"
# ここまではただの説明に過ぎない。
line = "ここまではただの説明に過ぎない。"

[[dialogue]]
speaker = "unk"
# 新星学園の生徒たちに本当に話したいのはこれからだ。
line = "新星学園の生徒たちに本当に話したいのはこれからだ。"

[[dialogue]]
speaker = "クロト"
# 『みんなも新たな脅威が現れて不安だと思う。極星学園と戦っていいのか、それともよくないのか、わからなくて迷っている人もいるはずだ』
line = "『みんなも新たな脅威が現れて不安だと思う。極星学園と戦っていいのか、それともよくないのか、わからなくて迷っている人もいるはずだ』"

[[dialogue]]
speaker = "クロト"
# 『平行世界デネブと戦ってでもアルタイルを守るか、それとも戦わない道を取るのか』
line = "『平行世界デネブと戦ってでもアルタイルを守るか、それとも戦わない道を取るのか』"

[[dialogue]]
speaker = "クロト"
# 『俺は──』
line = "『俺は──』"

[[dialogue]]
speaker = "クロト"
# 『デネブとともにリクリエと戦いたいと思う』
line = "『デネブとともにリクリエと戦いたいと思う』"

[[dialogue]]
speaker = "unk"
# 俺がそう言い切ると、アリーナ全体が呆けたように<ruby=な>凪</ruby>ぐ。
line = "俺がそう言い切ると、アリーナ全体が呆けたように<ruby>凪<rt>な</rt></ruby>ぐ。"

[[dialogue]]
speaker = "unk"
# そして次の瞬間、沸騰するように客席がざわめきだした。
line = "そして次の瞬間、沸騰するように客席がざわめきだした。"

[[dialogue]]
speaker = "クロト"
# 『俺個人の考えとして……たとえアルタイルを守るためであっても、デネブを滅ぼしたくない』
line = "『俺個人の考えとして……たとえアルタイルを守るためであっても、デネブを滅ぼしたくない』"

[[dialogue]]
speaker = "クロト"
# 『平行世界だったとしても、そこに無辜の人々がいるならば、星騎士として救いたい』
line = "『平行世界だったとしても、そこに無辜の人々がいるならば、星騎士として救いたい』"

[[dialogue]]
speaker = "クロト"
# 『綺麗事だと思われるかもしれない。実際そう言われたこともある。だけど──』
line = "『綺麗事だと思われるかもしれない。実際そう言われたこともある。だけど──』"

[[dialogue]]
speaker = "クロト"
# 『これが俺の考える最善だ』
line = "『これが俺の考える最善だ』"

[[dialogue]]
speaker = "unk"
# 俺が考える最悪は、アルタイルとデネブが争った後、生き残った世界すらリクリエに滅ぼされることだ。
line = "俺が考える最悪は、アルタイルとデネブが争った後、生き残った世界すらリクリエに滅ぼされることだ。"

[[dialogue]]
speaker = "unk"
# アルタイルにもデネブにも属さないリクリエの使徒が存在し、こちらの動きを観察している以上、潰し合うことは避けるべきだろう。
line = "アルタイルにもデネブにも属さないリクリエの使徒が存在し、こちらの動きを観察している以上、潰し合うことは避けるべきだろう。"

[[dialogue]]
speaker = "クロト"
# 『かつてアポロと戦った時、流星市国の空に出現した、巨大な手のことを覚えているだろうか？　見た人も多いと思う』
line = "『かつてアポロと戦った時、流星市国の空に出現した、巨大な手のことを覚えているだろうか？　見た人も多いと思う』"

[[dialogue]]
speaker = "クロト"
# 『あれはディザスターハンド。さっき言った平行世界ベガを滅ぼしたものだ』
line = "『あれはディザスターハンド。さっき言った平行世界ベガを滅ぼしたものだ』"

[[dialogue]]
speaker = "クロト"
# 『ディザスターハンドは強い。かつて戦った何よりも』
line = "『ディザスターハンドは強い。かつて戦った何よりも』"

[[dialogue]]
speaker = "クロト"
# 『もしデネブと戦い、勝利しても、あれと戦うことになったら勝てないかもしれない。デネブとの戦いで疲弊していたらなおさらだ』
line = "『もしデネブと戦い、勝利しても、あれと戦うことになったら勝てないかもしれない。デネブとの戦いで疲弊していたらなおさらだ』"

[[dialogue]]
speaker = "クロト"
# 『リクリエはデネブにとっても敵だ。だからデネブと力を合わせてリクリエと戦う。それが俺の、新星星徒会長としての選択だ』
line = "『リクリエはデネブにとっても敵だ。だからデネブと力を合わせてリクリエと戦う。それが俺の、新星星徒会長としての選択だ』"

[[dialogue]]
speaker = "クロト"
# 『そしてそのために──新星星徒会はデネブに向かう』
line = "『そしてそのために──新星星徒会はデネブに向かう』"

[[dialogue]]
speaker = "unk"
# 不安か、期待か、アリーナのざわめきが強くなっていく。
line = "不安か、期待か、アリーナのざわめきが強くなっていく。"

[[dialogue]]
speaker = "unk"
# それでも俺は努めて冷静に、自分を落ち着かせながらマイクに声を乗せる。
line = "それでも俺は努めて冷静に、自分を落ち着かせながらマイクに声を乗せる。"

[[dialogue]]
speaker = "クロト"
# 『極星学園と共調をとるためには、デネブに行って話をつける必要があるだろう』
line = "『極星学園と共調をとるためには、デネブに行って話をつける必要があるだろう』"

[[dialogue]]
speaker = "クロト"
# 『今の俺たちは平行世界を渡る手段を持たない。だが香堂チナはそれができる術を持っている。その手段を解析、あるいは奪取し、デネブに行く』
line = "『今の俺たちは平行世界を渡る手段を持たない。だが香堂チナはそれができる術を持っている。その手段を解析、あるいは奪取し、デネブに行く』"

[[dialogue]]
speaker = "クロト"
# 『そして極星星徒会に真偽を<ruby=ただ>質</ruby>し、共にリクリエと戦おうと説得する』
line = "『そして極星星徒会に真偽を<ruby>質<rt>ただ</rt></ruby>し、共にリクリエと戦おうと説得する』"

[[dialogue]]
speaker = "クロト"
# 『決別すれば極星星徒会と戦う。ただしそれは命の奪い合いではなく、デネブを滅ぼすためでもない。方針を決するための、御前試合のようなものだ』
line = "『決別すれば極星星徒会と戦う。ただしそれは命の奪い合いではなく、デネブを滅ぼすためでもない。方針を決するための、御前試合のようなものだ』"

[[dialogue]]
speaker = "クロト"
# 『極星星徒会には、俺たち新星星徒会が対峙する。だからその間。みんなはアルタイルを守ってほしいんだ』
line = "『極星星徒会には、俺たち新星星徒会が対峙する。だからその間。みんなはアルタイルを守ってほしいんだ』"

[[dialogue]]
speaker = "クロト"
# 『アルタイルは滅ぼさせない。デネブも滅ぼさない。その上で生き残る』
line = "『アルタイルは滅ぼさせない。デネブも滅ぼさない。その上で生き残る』"

[[dialogue]]
speaker = "クロト"
# 『そのために、俺たち星徒会と一緒に戦ってほしい……！』
line = "『そのために、俺たち星徒会と一緒に戦ってほしい……！』"

[[dialogue]]
speaker = "unk"
# あれだけ喧騒が渦巻いていたアリーナが、次第に静かになっていく。
line = "あれだけ喧騒が渦巻いていたアリーナが、次第に静かになっていく。"

[[dialogue]]
speaker = "unk"
# 俺の言葉に迷っているのか、共に戦う決意をしてくれたのか、あるいはアルタイルを守るためにデネブを滅ぼすべきと考えているのか。
line = "俺の言葉に迷っているのか、共に戦う決意をしてくれたのか、あるいはアルタイルを守るためにデネブを滅ぼすべきと考えているのか。"

[[dialogue]]
speaker = "unk"
# それぞれが己の中で、想いと考えを固めようとしているのだろう。
line = "それぞれが己の中で、想いと考えを固めようとしているのだろう。"

[[dialogue]]
speaker = "クロト"
# 『急に言われて驚いているのはわかる。困惑するのもわかる。いきなり納得しろっていう方が無茶だと思う』
line = "『急に言われて驚いているのはわかる。困惑するのもわかる。いきなり納得しろっていう方が無茶だと思う』"

[[dialogue]]
speaker = "クロト"
# 『校則上は、星徒会長はみんなに命令することができる。だけど無理やり従わされたところで、星騎士は本当の力を発揮することなんてできない』
line = "『校則上は、星徒会長はみんなに命令することができる。だけど無理やり従わされたところで、星騎士は本当の力を発揮することなんてできない』"

[[dialogue]]
speaker = "クロト"
# 『だから俺は星徒会長権限を以て──信任選挙を行う』
line = "『だから俺は星徒会長権限を以て──信任選挙を行う』"

[[dialogue]]
speaker = "unk"
# 一度静まったアリーナに、再びわっと声が沸いた。
line = "一度静まったアリーナに、再びわっと声が沸いた。"

[[dialogue]]
speaker = "unk"
# ここでアリーナの舞台の隅にいる梨緒に目配せする。
line = "ここでアリーナの舞台の隅にいる梨緒に目配せする。"

[[dialogue]]
speaker = "unk"
# すると梨緒は壇上に登り、凛とした顔で生徒たちの前に立った。
line = "すると梨緒は壇上に登り、凛とした顔で生徒たちの前に立った。"

[[dialogue]]
speaker = "梨緒"
# 『選挙管理委員会委員長、梨緒・Ａ・クリステレスだ』
line = "『選挙管理委員会委員長、梨緒・Ａ・クリステレスだ』"

[[dialogue]]
speaker = "梨緒"
# 『先ほど緋宮会長から宣言があったが、これより星徒会長の信任選挙を行う。選挙の進行は、我々選挙管理委員会が取り仕切らせてもらう』
line = "『先ほど緋宮会長から宣言があったが、これより星徒会長の信任選挙を行う。選挙の進行は、我々選挙管理委員会が取り仕切らせてもらう』"

[[dialogue]]
speaker = "梨緒"
# 『これから全生徒のＤＩＳＣに、平行世界に関する資料を送付する。平行世界の全容は未だ掴めていないが、今までに判明した情報を網羅したものだ』
line = "『これから全生徒のＤＩＳＣに、平行世界に関する資料を送付する。平行世界の全容は未だ掴めていないが、今までに判明した情報を網羅したものだ』"

[[dialogue]]
speaker = "unk"
# ヴィーナスの出自など、個人的な事情については伏せたりぼかしたりしているが、現時点でできうる限りの情報を集めたものだ。
line = "ヴィーナスの出自など、個人的な事情については伏せたりぼかしたりしているが、現時点でできうる限りの情報を集めたものだ。"

[[dialogue]]
speaker = "unk"
# これからの戦いのための情報共有も含めて、すべての星騎士に知っておいてもらいたいものだった。
line = "これからの戦いのための情報共有も含めて、すべての星騎士に知っておいてもらいたいものだった。"

[[dialogue]]
speaker = "梨緒"
# 『みんなは資料を確認し、そして緋宮会長の日々の行いを判断材料にし、信任の票を入れるか否かを決めてほしい』
line = "『みんなは資料を確認し、そして緋宮会長の日々の行いを判断材料にし、信任の票を入れるか否かを決めてほしい』"

[[dialogue]]
speaker = "梨緒"
# 『投票は今日から一週間後。全生徒の過半数の信任が得られなかった場合、緋宮クロトは星徒会長解任となり、現星徒会役員も職を失う』
line = "『投票は今日から一週間後。全生徒の過半数の信任が得られなかった場合、緋宮クロトは星徒会長解任となり、現星徒会役員も職を失う』"

[[dialogue]]
speaker = "梨緒"
# 『そして星徒会長の座が空席になった場合、次の会長を決める星徒会選挙が行われる。その場合は改めて説明をさせてもらおう』
line = "『そして星徒会長の座が空席になった場合、次の会長を決める星徒会選挙が行われる。その場合は改めて説明をさせてもらおう』"

[[dialogue]]
speaker = "梨緒"
# 『では緋宮会長。最後に言葉を』
line = "『では緋宮会長。最後に言葉を』"

[[dialogue]]
speaker = "unk"
# 梨緒からマイクを受け取り、もう一度壇上に登る。
line = "梨緒からマイクを受け取り、もう一度壇上に登る。"

[[dialogue]]
speaker = "クロト"
# 『何が本当なのかわからなくて、今は迷うのも当然だと思う』
line = "『何が本当なのかわからなくて、今は迷うのも当然だと思う』"

[[dialogue]]
speaker = "クロト"
# 『だけど俺たち星徒会を信じて共に戦ってほしい』
line = "『だけど俺たち星徒会を信じて共に戦ってほしい』"

[[dialogue]]
speaker = "クロト"
# 『世界を──かけがえのないものを守るために、みんなの力を貸してほしい！』
line = "『世界を──かけがえのないものを守るために、みんなの力を貸してほしい！』"

[[dialogue]]
speaker = "クロト"
# 『今日は話を聞いてくれてありがとう。一週間後──みんなの答えを聞かせてくれ』
line = "『今日は話を聞いてくれてありがとう。一週間後──みんなの答えを聞かせてくれ』"
