[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――頑張ったけど、パーティーの準備、その日のうちには間に合わなかったわ！」
line = "「――頑張ったけど、パーティーの準備、その日のうちには間に合わなかったわ！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それはそう」
line = "「それはそう」"

[[dialogue]]
speaker = "メルエル"
# 「あはは……でも、数日かかったけど、ちゃんと準備できたよ♪」
line = "「あはは……でも、数日かかったけど、ちゃんと準備できたよ♪」"

[[dialogue]]
speaker = "unk"
# 小さなヴィーナスたちが増えてから３日後。俺たちは九浄家の広間で『こどもの日パーティー』を開催しようとしていた。
line = "小さなヴィーナスたちが増えてから３日後。俺たちは九浄家の広間で『こどもの日パーティー』を開催しようとしていた。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「レミカ、メルエル、準備を手伝ってくれてありがとう♪」
line = "「レミカ、メルエル、準備を手伝ってくれてありがとう♪」"

[[dialogue]]
speaker = "レミカ"
# 「私たちもお祝いしてもらうパーティーだからね」
line = "「私たちもお祝いしてもらうパーティーだからね」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「それに、やるなら全力っていうのが、私のスタンスだから」
line = "「それに、やるなら全力っていうのが、私のスタンスだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがはレミカね♪　それでこそ、私の推すトップアイドルよ！」
line = "「さすがはレミカね♪　それでこそ、私の推すトップアイドルよ！」"

[[dialogue]]
speaker = "unk"
# それにしても３人の制服姿、驚いたよ
line = "それにしても３人の制服姿、驚いたよ"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「えへへ♪　昨日でき上がったんだけど、パパにサプライズしようと思って、ここまで秘密にしておいたのよ♪」
line = "「えへへ♪　昨日でき上がったんだけど、パパにサプライズしようと思って、ここまで秘密にしておいたのよ♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「まさか附属校の制服とは思わなかったけど。ヴィーナスがヘレナさんに頼んだら、ノリノリで作ってくれたらしくて……」
line = "「まさか附属校の制服とは思わなかったけど。ヴィーナスがヘレナさんに頼んだら、ノリノリで作ってくれたらしくて……」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「会長くん、どうどう？　附属校の制服、可愛いかな？」
line = "「会長くん、どうどう？　附属校の制服、可愛いかな？」"

[[dialogue]]
speaker = "unk"
# ３人共、すごく可愛いよ
line = "３人共、すごく可愛いよ"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「えへへへぇ<emoji=heart04>　また可愛いって言ってもらっちゃった♪　嬉しくてメルトしちゃうよ～<emoji=heart04>」
line = "「えへへへぇ<emoji=heart04>　また可愛いって言ってもらっちゃった♪　嬉しくてメルトしちゃうよ～<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# （はうぅぅ<emoji=heart04>　小さい私が褒められてるのを見るのは嬉しいけど、ちょっと恥ずかしいよぉ～<emoji=heart04>）
line = "（はうぅぅ<emoji=heart04>　小さい私が褒められてるのを見るのは嬉しいけど、ちょっと恥ずかしいよぉ～<emoji=heart04>）"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ぷっ……ふふっ……！　会長、真面目な顔で、親指立てながら言うの反則でしょ……！」
line = "「ぷっ……ふふっ……！　会長、真面目な顔で、親指立てながら言うの反則でしょ……！」"

[[dialogue]]
speaker = "unk"
# レミカはツボに入ったらしく笑いを堪えていたが、すぐに咳払いをしてみせる。
line = "レミカはツボに入ったらしく笑いを堪えていたが、すぐに咳払いをしてみせる。"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「コホン――今のは笑ってないから。ちょっとむせちゃっただけだから」
line = "「コホン――今のは笑ってないから。ちょっとむせちゃっただけだから」"

[[dialogue]]
speaker = "unk"
# 実はやたら『笑いの沸点』が低いレミカだが、本人はそれが恥ずかしいのか、笑いそうになるとよく何事もなかったかのように誤魔化そうとする。
line = "実はやたら『笑いの沸点』が低いレミカだが、本人はそれが恥ずかしいのか、笑いそうになるとよく何事もなかったかのように誤魔化そうとする。"

[[dialogue]]
speaker = "レミカ"
# 「ふっ……ふふっ……！　そう、トップアイドルはこれくらいで、笑ったりしないから……！」
line = "「ふっ……ふふっ……！　そう、トップアイドルはこれくらいで、笑ったりしないから……！」"

[[dialogue]]
speaker = "unk"
# って、大きいレミカも笑ってるし。
line = "って、大きいレミカも笑ってるし。"

[[dialogue]]
speaker = "ヴィーナス"
# 「さあ、準備もできたことだし、パーティーを始めるわよ！」
line = "「さあ、準備もできたことだし、パーティーを始めるわよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ、こどもの日をお祝いして～、せ～のっ！」
line = "「それじゃあ、こどもの日をお祝いして～、せ～のっ！」"

[[dialogue]]
speaker = "全員"
# 「カンパ～イ♪」
line = "「カンパ～イ♪」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちはこどもの日パーティーを開始した。
line = "そうして、俺たちはこどもの日パーティーを開始した。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ねぇ、パパ！　料理をあ～んして、食べさせて欲しいわ♪」
line = "「ねぇ、パパ！　料理をあ～んして、食べさせて欲しいわ♪」"

[[dialogue]]
speaker = "unk"
# 甘えるようにそう言ってきたヴィーナスに、俺は彼女の好きな『オムライス』をスプーンで口に運んであげる。
line = "甘えるようにそう言ってきたヴィーナスに、俺は彼女の好きな『オムライス』をスプーンで口に運んであげる。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「あ～ん♪　――あむっ♪　もぐもぐ……♪」
line = "「あ～ん♪　――あむっ♪　もぐもぐ……♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ん～♪　美味しいわ！　えへへへぇ<emoji=heart04>」
line = "「ん～♪　美味しいわ！　えへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、小さい私だけずるいわ！　ねぇ、パパ、私にもお願～い♪」
line = "「あっ、小さい私だけずるいわ！　ねぇ、パパ、私にもお願～い♪」"

[[dialogue]]
speaker = "unk"
# 俺は頷いて、大きな方のヴィーナスの口にも、オムライスを食べさせてあげる。
line = "俺は頷いて、大きな方のヴィーナスの口にも、オムライスを食べさせてあげる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「――あ～ん♪　もぐもぐ……ふふっ、美味しい～<emoji=heart04>　パパ、ありがと～♪」
line = "「――あ～ん♪　もぐもぐ……ふふっ、美味しい～<emoji=heart04>　パパ、ありがと～♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「ふふっ……ヴィーナスってば、小さい自分につられてパパ呼びして、甘えん坊になってる」
line = "「ふふっ……ヴィーナスってば、小さい自分につられてパパ呼びして、甘えん坊になってる」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「会長くんにあ～んってしてもらえるの、羨ましい……！」
line = "「会長くんにあ～んってしてもらえるの、羨ましい……！」"

[[dialogue]]
speaker = "メルエル"
# 「ちょっ！？　わ～っ！　わ～っ！！」
line = "「ちょっ！？　わ～っ！　わ～っ！！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ねぇねぇ、パパ～！　私ね、もう１つお願いがあるの♪」
line = "「ねぇねぇ、パパ～！　私ね、もう１つお願いがあるの♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「こどもの日だから～、パパから『私の好きなところ』を１０個、教えて欲しいわ♪」
line = "「こどもの日だから～、パパから『私の好きなところ』を１０個、教えて欲しいわ♪」"

[[dialogue]]
speaker = "メルエル"
# 「えっ！？　好きなところ！？」
line = "「えっ！？　好きなところ！？」"

[[dialogue]]
speaker = "unk"
# １０個……！？
line = "１０個……！？"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「そう！　大きな私と相談して決めたのよ♪」
line = "「そう！　大きな私と相談して決めたのよ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「娘として、パパからどんなことを言ってもらえたら、愛が伝わってきて嬉しいかって♪」
line = "「娘として、パパからどんなことを言ってもらえたら、愛が伝わってきて嬉しいかって♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「好きなところを教えてもらえたら、私、そこを頑張って、もっといい子になろうって思えるもの♪」
line = "「好きなところを教えてもらえたら、私、そこを頑張って、もっといい子になろうって思えるもの♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「こ、これはまたすごい無茶ぶりだね……」
line = "「こ、これはまたすごい無茶ぶりだね……」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私も同じように教えてもらいたい……！　けど、いきなり１０個はさすがに……」
line = "「私も同じように教えてもらいたい……！　けど、いきなり１０個はさすがに……」"

[[dialogue]]
speaker = "unk"
# 言うのは、ちょっと恥ずかしいけど……
line = "言うのは、ちょっと恥ずかしいけど……"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――なになに？　まずはレミカの言う通り、『素直』なところ？　えへへ<emoji=heart04>　それから？」
line = "「――なになに？　まずはレミカの言う通り、『素直』なところ？　えへへ<emoji=heart04>　それから？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――『明るくて周りに元気をくれる』ところに、『仲間を大切にする』ところ？」
line = "「――『明るくて周りに元気をくれる』ところに、『仲間を大切にする』ところ？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――『仲間を心から信じられる』ところ。それから、『１度やると決めたことは最後まで頑張る』ところ？」
line = "「――『仲間を心から信じられる』ところ。それから、『１度やると決めたことは最後まで頑張る』ところ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あと、『困っている人を見かけたら手を差し伸べられる』ところに……」
line = "「あと、『困っている人を見かけたら手を差し伸べられる』ところに……」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――『その人の為に、本気で力になろうとする』ところ？　あとは、『相手の気持ちがすぐにわからなくても、諦めずに向き合い続ける』ところ」
line = "「――『その人の為に、本気で力になろうとする』ところ？　あとは、『相手の気持ちがすぐにわからなくても、諦めずに向き合い続ける』ところ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――『相手のすごいところを見つけて、褒められる』ところも？」
line = "「――『相手のすごいところを見つけて、褒められる』ところも？」"

[[dialogue]]
speaker = "unk"
# そして、１番は――
line = "そして、１番は――"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――『困難な壁があっても、その人なら越えられると、信じて疑わない』ところ」
line = "「――『困難な壁があっても、その人なら越えられると、信じて疑わない』ところ」"

[[dialogue]]
speaker = "unk"
# そう、ヴィーナスから言われると、無茶と思えることでもできる気がしてくる。
line = "そう、ヴィーナスから言われると、無茶と思えることでもできる気がしてくる。"

[[dialogue]]
speaker = "unk"
# それはヴィーナスが俺や仲間たちのことを『本気』で信じてくれているからなのだ。
line = "それはヴィーナスが俺や仲間たちのことを『本気』で信じてくれているからなのだ。"

[[dialogue]]
speaker = "unk"
# 『できない』とは１パーセントも考えていない。１００パーセント相手を信じて、背中を押すことができる――それがヴィーナスの凄さなのだ。
line = "『できない』とは１パーセントも考えていない。１００パーセント相手を信じて、背中を押すことができる――それがヴィーナスの凄さなのだ。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパ……！　えへへっ♪　そこまで深く考えたことなかったけど、私、すっごく嬉しいわ<emoji=heart04>」
line = "「パパ……！　えへへっ♪　そこまで深く考えたことなかったけど、私、すっごく嬉しいわ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ＤＩＳＣで録音しておいたから、これを聞き返しながら、パパが好きって言ってくれたところをもっと頑張って、いい子になるわね！」
line = "「ＤＩＳＣで録音しておいたから、これを聞き返しながら、パパが好きって言ってくれたところをもっと頑張って、いい子になるわね！」"

[[dialogue]]
speaker = "unk"
# 録音は聞いてないし恥ずかしいぞ！？
line = "録音は聞いてないし恥ずかしいぞ！？"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「会長くん……まさか１０個も、すんなり言えちゃうなんて！」
line = "「会長くん……まさか１０個も、すんなり言えちゃうなんて！」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「うん、すごいね！　親子の、というよりは、一緒に星徒会を続けてきたからこその絆って感じかな♪」
line = "「うん、すごいね！　親子の、というよりは、一緒に星徒会を続けてきたからこその絆って感じかな♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ありがと、パパ！　お願いを聞いてくれたお礼に～」
line = "「ありがと、パパ！　お願いを聞いてくれたお礼に～」"

[[dialogue]]
speaker = "unk"
# 小さいヴィーナスは不意に、俺の頬に唇を寄せると――
line = "小さいヴィーナスは不意に、俺の頬に唇を寄せると――"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "unk"
# 頬にキスをされて、思わずドキッとしてしまう。
line = "頬にキスをされて、思わずドキッとしてしまう。"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「わわわっ！？」
line = "「わわわっ！？」"

[[dialogue]]
speaker = "メルエル"
# 「びびび、ヴィーナスちゃん！？」
line = "「びびび、ヴィーナスちゃん！？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「えへへっ<emoji=heart04>　体が小さくなっているから、『娘』として頬っぺたにキスくらい、してもいいわよね♪」
line = "「えへへっ<emoji=heart04>　体が小さくなっているから、『娘』として頬っぺたにキスくらい、してもいいわよね♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「だ、大胆～……！」
line = "「だ、大胆～……！」"

[[dialogue]]
speaker = "レミカ"
# 「さすがヴィーナスだね……！」
line = "「さすがヴィーナスだね……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むむむっ。ずるいわよ、小さい私！　私はパパと同級生だから、そういうのは我慢してたのに……！」
line = "「むむむっ。ずるいわよ、小さい私！　私はパパと同級生だから、そういうのは我慢してたのに……！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「大丈夫！　元の１人に戻ったら、大きい私もパパとキスしたことになるでしょ？」
line = "「大丈夫！　元の１人に戻ったら、大きい私もパパとキスしたことになるでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はっ……！　なるほど、それなら問題ないわね♪」
line = "「はっ……！　なるほど、それなら問題ないわね♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「問題ないんだ……」
line = "「問題ないんだ……」"

[[dialogue]]
speaker = "レミカ"
# 「問題ないかな……？」
line = "「問題ないかな……？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ううん、頬っぺたでもキスは問題じゃないかな！？」
line = "「ううん、頬っぺたでもキスは問題じゃないかな！？」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ！　また体が光ったわ！」
line = "「あっ！　また体が光ったわ！」"

[[dialogue]]
speaker = "unk"
# ２人のヴィーナスの体が眩しく光り出し、それが収まった後に立っていたのは――小さなヴィーナスの姿だった。
line = "２人のヴィーナスの体が眩しく光り出し、それが収まった後に立っていたのは――小さなヴィーナスの姿だった。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「合体して元の１人に戻ったみたい！　でも……なんか小さい体のままだわ！？」
line = "「合体して元の１人に戻ったみたい！　でも……なんか小さい体のままだわ！？」"

[[dialogue]]
speaker = "unk"
# それから色々試すこと、小一時間。
line = "それから色々試すこと、小一時間。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――う～ん、ダメね。色々試してみたけど、変身解除はできても、やっぱり元の大きな体には戻れないみたい」
line = "「――う～ん、ダメね。色々試してみたけど、変身解除はできても、やっぱり元の大きな体には戻れないみたい」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「しばらくはまだ、この小さい姿のまま過ごさないといけないみたいね！」
line = "「しばらくはまだ、この小さい姿のまま過ごさないといけないみたいね！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「なんとなくだけど……大きな体に戻る為には、レミカとメルエルもそれぞれ元の１人に戻さなきゃいけない気がするわ！」
line = "「なんとなくだけど……大きな体に戻る為には、レミカとメルエルもそれぞれ元の１人に戻さなきゃいけない気がするわ！」"

[[dialogue]]
speaker = "レミカ"
# 「ヴィーナスの直感はよく当たるから、その可能性は高そうだね」
line = "「ヴィーナスの直感はよく当たるから、その可能性は高そうだね」"

[[dialogue]]
speaker = "メルエル"
# 「だとすると、私たちも小さな体になって望むことを、何か叶える必要があるのかな？」
line = "「だとすると、私たちも小さな体になって望むことを、何か叶える必要があるのかな？」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私が小さな体になって望むこと……」
line = "「私が小さな体になって望むこと……」"

