[[dialogue]]
speaker = "unk"
# 第８話,失星,B
line = "第８話,失星,B"

[[dialogue]]
speaker = "unk"
# アルタイルのフィーニスの塔で、一時的な対処をするしかなかったあの右腕が、再び俺たちの前に現れてしまった──
line = "アルタイルのフィーニスの塔で、一時的な対処をするしかなかったあの右腕が、再び俺たちの前に現れてしまった──"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「すべてを壊しなさい。滅ぼしなさい！　それこそがお前の悲願でしょう？　ベガの魔王──緋宮クロト！」
line = "「すべてを壊しなさい。滅ぼしなさい！　それこそがお前の悲願でしょう？　ベガの魔王──緋宮クロト！」"

[[dialogue]]
speaker = "unk"
# 大地を割るような破滅の薙ぎ払いによって、紙屑のように味方の星騎士たちが吹き飛ばされていく……！
line = "大地を割るような破滅の薙ぎ払いによって、紙屑のように味方の星騎士たちが吹き飛ばされていく……！"

[[dialogue]]
speaker = "クロト"
# 「みんな下がれ！　俺が相手を──」
line = "「みんな下がれ！　俺が相手を──」"

[[dialogue]]
speaker = "クロト"
# 「く、そぉぉぉおっ──！？」
line = "「く、そぉぉぉおっ──！？」"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』とディザスターハンドを同時に相手するだなんて──無理だ！　戦線が崩壊する！！
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』とディザスターハンドを同時に相手するだなんて──無理だ！　戦線が崩壊する！！"

[[dialogue]]
speaker = "クロト"
# 「総員！　教皇庁前から離れるんだ！　退路を切り開け！！」
line = "「総員！　教皇庁前から離れるんだ！　退路を切り開け！！」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「──たあぁああっ！！」
line = "「──たあぁああっ！！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「何とかして複製体たちをどかさないと──！」
line = "「何とかして複製体たちをどかさないと──！」"

[[dialogue]]
speaker = "unk"
# メルエルたちがホロウの大群が築いた壁を突破しようと動いてくれているが……このままでは背中を討たれてしまう！
line = "メルエルたちがホロウの大群が築いた壁を突破しようと動いてくれているが……このままでは背中を討たれてしまう！"

[[dialogue]]
speaker = "クロト"
# 「俺たちでディザスターハンドと『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を止めるしかない……！　行くぞ！！」
line = "「俺たちでディザスターハンドと『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を止めるしかない……！　行くぞ！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「この、攻撃はっ──！？」
line = "「この、攻撃はっ──！？」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「先の戦いよりも、強力に──だめです、とても抑えきれません！」
line = "「先の戦いよりも、強力に──だめです、とても抑えきれません！」"

[[dialogue]]
speaker = "unk"
# 大地がえぐれ──
line = "大地がえぐれ──"

[[dialogue]]
speaker = "unk"
# 破壊の嵐が、デネブの教皇庁前をさらなる廃墟へと変えていく。
line = "破壊の嵐が、デネブの教皇庁前をさらなる廃墟へと変えていく。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「どうして──どうしてこんなことをするの、<b>クロト</b>！？」
line = "「どうして──どうしてこんなことをするの、<b>クロト</b>！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「世界は違っても！　あなたは世界を守る魔王だったはずよ！　どうして！？」
line = "「世界は違っても！　あなたは世界を守る魔王だったはずよ！　どうして！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「あなたはいつだって、誰かのために戦っていたじゃない！　誰よりも真面目で、誰よりも優しい男の子だったじゃない！？」
line = "「あなたはいつだって、誰かのために戦っていたじゃない！　誰よりも真面目で、誰よりも優しい男の子だったじゃない！？」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「目を覚まして！　悪い奴はそこにいるのよ！　お願い、クロト！！」
line = "「目を覚まして！　悪い奴はそこにいるのよ！　お願い、クロト！！」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス、ダメだ！　こいつは話が通用する相手じゃない！！」
line = "「ヴィーナス、ダメだ！　こいつは話が通用する相手じゃない！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「九浄ヴィーナス。お前は本当に邪魔ね……いい加減に消えてもらわないと」
line = "「九浄ヴィーナス。お前は本当に邪魔ね……いい加減に消えてもらわないと」"

[[dialogue]]
speaker = "unk"
# ホロウたちが大量にヴィーナスの元に押し寄せ、四方八方から攻撃を浴びせていく。
line = "ホロウたちが大量にヴィーナスの元に押し寄せ、四方八方から攻撃を浴びせていく。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス、援護する！」
line = "「ヴィーナス、援護する！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「うんっ、パパ！！　一緒にやっつけましょう！」
line = "「うんっ、パパ！！　一緒にやっつけましょう！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──パパ。そう、魔王はこの女の父親……それをもっと早く意識するべきだったのよ」
line = "「──パパ。そう、魔王はこの女の父親……それをもっと早く意識するべきだったのよ」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「さっきアルタイルで面白いものを見たわ。娘を想うが故の、父親の愚かな行動を」
line = "「さっきアルタイルで面白いものを見たわ。娘を想うが故の、父親の愚かな行動を」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「なっ──きゃああっ！？」
line = "「なっ──きゃああっ！？」"

[[dialogue]]
speaker = "unk"
# 大量のホロウたちがヴィーナスに執拗にまとわりついていく──
line = "大量のホロウたちがヴィーナスに執拗にまとわりついていく──"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「さぁ、ディザスターハンド。私ごと、この女神の搾りカスを消し飛ばしなさい」
line = "「さぁ、ディザスターハンド。私ごと、この女神の搾りカスを消し飛ばしなさい」"

[[dialogue]]
speaker = "クロト"
# 「やめろぉおぉぉぉおッ────！！！！」
line = "「やめろぉおぉぉぉおッ────！！！！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスを庇い、絶対防御の盾を展開する──絶対に受け止めてみせる！
line = "ヴィーナスを庇い、絶対防御の盾を展開する──絶対に受け止めてみせる！"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「やはり、そうするわよね──父親なら」
line = "「やはり、そうするわよね──父親なら」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「我が子の危機の前に身体が動いてしまう。後先も考えず、ただただ愛しい子供を守りたい。それだけで頭がいっぱいになる」
line = "「我が子の危機の前に身体が動いてしまう。後先も考えず、ただただ愛しい子供を守りたい。それだけで頭がいっぱいになる」"

[[dialogue]]
speaker = "unk"
# いつの間にか側面から──『ＸＥＬＯＳ』が、攻撃を──！？
line = "いつの間にか側面から──『ＸＥＬＯＳ』が、攻撃を──！？"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「それがお前の弱さなのよ、緋宮クロト──」
line = "「それがお前の弱さなのよ、緋宮クロト──」"

[[dialogue]]
speaker = "unk"
# ──その瞬間。
line = "──その瞬間。"

[[dialogue]]
speaker = "unk"
# 灼けるような激痛が──凍えるような死の気配が、俺を貫いた。
line = "灼けるような激痛が──凍えるような死の気配が、俺を貫いた。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ぱ……ぱ？」
line = "「ぱ……ぱ？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──御見事です、お父様」
line = "「──御見事です、お父様」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「殺し損ねると魔王はさらに強くなって息を吹き返します。だから……即死させる以外に確実な勝利はありません」
line = "「殺し損ねると魔王はさらに強くなって息を吹き返します。だから……即死させる以外に確実な勝利はありません」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「おやすみなさい、緋宮クロト──<ruby=ボン・ボヤージュ>良き旅を</ruby>」
line = "「おやすみなさい、緋宮クロト──<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>」"
