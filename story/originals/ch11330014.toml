[[dialogue]]
speaker = "unk"
# 第４話,漫画みたいな約束,P
line = "第４話,漫画みたいな約束,P"

[[dialogue]]
speaker = "リィベル"
# 「新星学園の図書館には漫画があるのね。図書館なのに」
line = "「新星学園の図書館には漫画があるのね。図書館なのに」"

[[dialogue]]
speaker = "モネ"
# 「図書館だからあるんですよ。図書館は小説、実用書、雑誌など、様々な本を収蔵する場所ですからね」
line = "「図書館だからあるんですよ。図書館は小説、実用書、雑誌など、様々な本を収蔵する場所ですからね」"

[[dialogue]]
speaker = "unk"
# 深淵書庫には漫画はないの？
line = "深淵書庫には漫画はないの？"

[[dialogue]]
speaker = "リィベル"
# 「あるわけないでしょ、あんな俗っぽいもの」
line = "「あるわけないでしょ、あんな俗っぽいもの」"

[[dialogue]]
speaker = "リィベル"
# 「深淵書庫の本たちには、かつてリクリエに滅ぼされた魔族の生涯が記されている。漫画なんて、娯楽として消費されるだけのものを一緒に並べることはできないわ」
line = "「深淵書庫の本たちには、かつてリクリエに滅ぼされた魔族の生涯が記されている。漫画なんて、娯楽として消費されるだけのものを一緒に並べることはできないわ」"

[[dialogue]]
speaker = "モネ"
# 「確かに書庫の魔本たちは、魔族の人たちの生きた証ですけど、漫画も立派な本ですよ」
line = "「確かに書庫の魔本たちは、魔族の人たちの生きた証ですけど、漫画も立派な本ですよ」"

[[dialogue]]
speaker = "モネ"
# 「それに漫画はただ楽しむだけじゃなくて、歴史や健康の知識を啓蒙したりして、勉強になるものも多いんです」
line = "「それに漫画はただ楽しむだけじゃなくて、歴史や健康の知識を啓蒙したりして、勉強になるものも多いんです」"

[[dialogue]]
speaker = "リィベル"
# 「ふぅん……」
line = "「ふぅん……」"

[[dialogue]]
speaker = "リィベル"
# 「まぁ、モネがそこまで言うのなら……読んでみなくもないわ」
line = "「まぁ、モネがそこまで言うのなら……読んでみなくもないわ」"

[[dialogue]]
speaker = "モネ"
# （あれ？　リィベルさん、もしかして漫画が読みたいんでしょうか……？）
line = "（あれ？　リィベルさん、もしかして漫画が読みたいんでしょうか……？）"

[[dialogue]]
speaker = "unk"
# じゃ俺の漫画、読んでみる？
line = "じゃ俺の漫画、読んでみる？"

[[dialogue]]
speaker = "リィベル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "モネ"
# （あ、固まっちゃいましたね……やっぱり漫画に興味なかったんでしょうか……？）
line = "（あ、固まっちゃいましたね……やっぱり漫画に興味なかったんでしょうか……？）"

[[dialogue]]
speaker = "リィベル"
# 「そうね。じゃあ魔王の家に伺わせてもらうわ」
line = "「そうね。じゃあ魔王の家に伺わせてもらうわ」"

[[dialogue]]
speaker = "unk"
# ええっ、いきなり！？
line = "ええっ、いきなり！？"

[[dialogue]]
speaker = "リィベル"
# 「声が大きいわよ、魔王。図書館なんだから静かにしなさい」
line = "「声が大きいわよ、魔王。図書館なんだから静かにしなさい」"

[[dialogue]]
speaker = "unk"
# こうして今日の放課後、リィベルが俺の家に来ることになったのだった。
line = "こうして今日の放課後、リィベルが俺の家に来ることになったのだった。"

[[dialogue]]
speaker = "リィベル"
# 「失礼するわ」
line = "「失礼するわ」"

[[dialogue]]
speaker = "unk"
# どうぞ……
line = "どうぞ……"

[[dialogue]]
speaker = "リィベル"
# 「ふっ。どうしたの、その硬い表情は？　緊張しているの？　まさか私を女扱いしているのかしら」
line = "「ふっ。どうしたの、その硬い表情は？　緊張しているの？　まさか私を女扱いしているのかしら」"

[[dialogue]]
speaker = "リィベル"
# 「近代の魔王は初心なのね。先代はちゃっかり子孫まで残しているというのに」
line = "「近代の魔王は初心なのね。先代はちゃっかり子孫まで残しているというのに」"

[[dialogue]]
speaker = "リィベル"
# 「言ったでしょう。私は深淵書庫の魔力と煌竜ヴィライアの因子から生まれたもの。一応は魔族ということになっているけど、命と呼べるかも怪しい存在よ」
line = "「言ったでしょう。私は深淵書庫の魔力と煌竜ヴィライアの因子から生まれたもの。一応は魔族ということになっているけど、命と呼べるかも怪しい存在よ」"

[[dialogue]]
speaker = "リィベル"
# 「錬金術師が作った義体と同じ、動く人形とでも思えばいいわ。どうせ、リクリエを滅ぼしたら役目を終えるのだから」
line = "「錬金術師が作った義体と同じ、動く人形とでも思えばいいわ。どうせ、リクリエを滅ぼしたら役目を終えるのだから」"

[[dialogue]]
speaker = "リィベル"
# 「……急に黙って、どうしたの？　飲み物はコーヒーでも紅茶でもなんでもいいわ。あ、ミルクと砂糖は要らないから」
line = "「……急に黙って、どうしたの？　飲み物はコーヒーでも紅茶でもなんでもいいわ。あ、ミルクと砂糖は要らないから」"

[[dialogue]]
speaker = "リィベル"
# 「さて。あなたの書庫、見せてもらうわよ。…………ふむふむ。さすが漫画を読むのが趣味というだけはあるわね」
line = "「さて。あなたの書庫、見せてもらうわよ。…………ふむふむ。さすが漫画を読むのが趣味というだけはあるわね」"

[[dialogue]]
speaker = "リィベル"
# 「オススメはあるかしら？　は？　全部？　それはそうでしょうけど、全部はいっぺんに読めないから聞いてるんでしょ」
line = "「オススメはあるかしら？　は？　全部？　それはそうでしょうけど、全部はいっぺんに読めないから聞いてるんでしょ」"

[[dialogue]]
speaker = "リィベル"
# 「もう一度聞くわ。あなたのオススメを教えてちょうだい？」
line = "「もう一度聞くわ。あなたのオススメを教えてちょうだい？」"

[[dialogue]]
speaker = "リィベル"
# 「……時代劇ドラマの公式コミカライズ？　公式のくせにドラマと内容が全然違ってクセになる……？　何を言っているの？」
line = "「……時代劇ドラマの公式コミカライズ？　公式のくせにドラマと内容が全然違ってクセになる……？　何を言っているの？」"

[[dialogue]]
speaker = "リィベル"
# 「どれどれ……何よコレ！？　侍がサイボーグになったり巨大化したり、メチャクチャじゃない。あと、この妙に濃い悪役は何？」
line = "「どれどれ……何よコレ！？　侍がサイボーグになったり巨大化したり、メチャクチャじゃない。あと、この妙に濃い悪役は何？」"

[[dialogue]]
speaker = "unk"
# そいつはドラマだと３分で退場したキャラ
line = "そいつはドラマだと３分で退場したキャラ"

[[dialogue]]
speaker = "リィベル"
# 「うそ！？　全巻出てくるんだけど！　完全にメインキャラなんだけど！」
line = "「うそ！？　全巻出てくるんだけど！　完全にメインキャラなんだけど！」"

[[dialogue]]
speaker = "リィベル"
# 「ほ、他のオススメは……？」
line = "「ほ、他のオススメは……？」"

[[dialogue]]
speaker = "リィベル"
# 「王道の異能力バトル？　……死んだはずの妹が実は生きていて……なるほど、確かに王道ね」
line = "「王道の異能力バトル？　……死んだはずの妹が実は生きていて……なるほど、確かに王道ね」"

[[dialogue]]
speaker = "リィベル"
# 「ただし、登場人物は全てモヒカン！？　ヒロインまで例外なく！？　世紀末じゃない！？」
line = "「ただし、登場人物は全てモヒカン！？　ヒロインまで例外なく！？　世紀末じゃない！？」"

[[dialogue]]
speaker = "リィベル"
# 「ギャグをやりたい作者とシリアスがやりたい編集のせめぎあいでそうなった！？　……そのくせ、ちゃんと面白いから頭がおかしくなりそうね」
line = "「ギャグをやりたい作者とシリアスがやりたい編集のせめぎあいでそうなった！？　……そのくせ、ちゃんと面白いから頭がおかしくなりそうね」"

[[dialogue]]
speaker = "リィベル"
# 「つ、次……」
line = "「つ、次……」"

[[dialogue]]
speaker = "リィベル"
# 「怪物を倒すことのできる武器に選ばれた少年の成長物語……そう、今度こそ本当に王道のようね」
line = "「怪物を倒すことのできる武器に選ばれた少年の成長物語……そう、今度こそ本当に王道のようね」"

[[dialogue]]
speaker = "リィベル"
# 「え、その本編完結後に連載された前日譚スピンオフ！？　作者の<ruby=ヘキ>癖</ruby>が完全開放！？」
line = "「え、その本編完結後に連載された前日譚スピンオフ！？　作者の<ruby>癖<rt>ヘキ</rt></ruby>が完全開放！？」"

[[dialogue]]
speaker = "リィベル"
# 「本編で最後の最後に改心し、主人公を庇って散った敵が、闇に堕ちるまでの物語……」
line = "「本編で最後の最後に改心し、主人公を庇って散った敵が、闇に堕ちるまでの物語……」"

[[dialogue]]
speaker = "リィベル"
# 「なんて惨いの。この作者、登場人物には何をしてもいいと思っているのかしら」
line = "「なんて惨いの。この作者、登場人物には何をしてもいいと思っているのかしら」"

[[dialogue]]
speaker = "リィベル"
# 「でもだからこそ、闇の中に一筋の光を見出すことができる…………脱帽ね」
line = "「でもだからこそ、闇の中に一筋の光を見出すことができる…………脱帽ね」"

[[dialogue]]
speaker = "リィベル"
# 「あなたのオススメ、確かに面白いけど偏ってない？　普通の漫画を読ませる気はないの？」
line = "「あなたのオススメ、確かに面白いけど偏ってない？　普通の漫画を読ませる気はないの？」"

[[dialogue]]
speaker = "unk"
# リィベルにまた来てほしくて
line = "リィベルにまた来てほしくて"

[[dialogue]]
speaker = "リィベル"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "リィベル"
# 「……リクリエを阻止したら私がいなくなってしまう気がした？　漫画が気になれば、また来てくれると思った？」
line = "「……リクリエを阻止したら私がいなくなってしまう気がした？　漫画が気になれば、また来てくれると思った？」"

[[dialogue]]
speaker = "リィベル"
# 「『リクリエを滅ぼしたら役目を終える』……確かにそうは言ったけど」
line = "「『リクリエを滅ぼしたら役目を終える』……確かにそうは言ったけど」"

[[dialogue]]
speaker = "リィベル"
# 「……はぁ。分かったわよ」
line = "「……はぁ。分かったわよ」"

[[dialogue]]
speaker = "リィベル"
# 「約束するわ。リクリエを滅ぼした後も、あなたの家の漫画を読み終えるまでは勝手にいなくなったりしないわ。だから普通の漫画も紹介して」
line = "「約束するわ。リクリエを滅ぼした後も、あなたの家の漫画を読み終えるまでは勝手にいなくなったりしないわ。だから普通の漫画も紹介して」"

[[dialogue]]
speaker = "リィベル"
# 「それでいいでしょう？」
line = "「それでいいでしょう？」"

[[dialogue]]
speaker = "unk"
# ああ、ありがとう
line = "ああ、ありがとう"

[[dialogue]]
speaker = "リィベル"
# 「別に。あなたが礼を言うことじゃないでしょうに」
line = "「別に。あなたが礼を言うことじゃないでしょうに」"

[[dialogue]]
speaker = "リィベル"
# 「我ながら、変な約束をしてしまったものね。まるで漫画みたい」
line = "「我ながら、変な約束をしてしまったものね。まるで漫画みたい」"

[[dialogue]]
speaker = "リィベル"
# 「飲み物、お代わりもらえるかしら？　今日は思ったより長居することになりそうね」
line = "「飲み物、お代わりもらえるかしら？　今日は思ったより長居することになりそうね」"

[[dialogue]]
speaker = "unk"
# ソファに腰かけ、ゆったりと漫画を楽しむリィベル。
line = "ソファに腰かけ、ゆったりと漫画を楽しむリィベル。"

[[dialogue]]
speaker = "unk"
# そんな彼女を眺めながら、こんな日々がずっと続けばいいと思うのだった。
line = "そんな彼女を眺めながら、こんな日々がずっと続けばいいと思うのだった。"
