[[dialogue]]
speaker = "unk"
# 第１話,思わぬ再会？,P
line = "第１話,思わぬ再会？,P"

[[dialogue]]
speaker = "unk"
# 俺が新星学園の星徒会長になったばかりのある日──
line = "俺が新星学園の星徒会長になったばかりのある日──"

[[dialogue]]
speaker = "ヴィーナス"
# 「さぁ、今日も星徒会の仕事よ！　魔王の力をとくと見せなさい！」
line = "「さぁ、今日も星徒会の仕事よ！　魔王の力をとくと見せなさい！」"

[[dialogue]]
speaker = "マトイ"
# 「書類仕事に魔王関係あるかな……？」
line = "「書類仕事に魔王関係あるかな……？」"

[[dialogue]]
speaker = "環"
# 「お～～～～～い！」
line = "「お～～～～～い！」"

[[dialogue]]
speaker = "マトイ"
# 「あれ、この声は……」
line = "「あれ、この声は……」"

[[dialogue]]
speaker = "環"
# 「どーん！！」
line = "「どーん！！」"

[[dialogue]]
speaker = "unk"
# 廊下は走っちゃダメだぞ
line = "廊下は走っちゃダメだぞ"

[[dialogue]]
speaker = "環"
# 「はーい。もう、相変わらず変なところで真面目なんだから」
line = "「はーい。もう、相変わらず変なところで真面目なんだから」"

[[dialogue]]
speaker = "環"
# 「ま、いいや。久しぶりー！　まさか新星学園で会うとは思わなかったから、マジでびっくりしたよ～！」
line = "「ま、いいや。久しぶりー！　まさか新星学園で会うとは思わなかったから、マジでびっくりしたよ～！」"

[[dialogue]]
speaker = "環"
# 「ていうか星徒会長って何さ。こちとらまだプリマステラにもなってないってのに、いきなり抜かれてちょっとショックだったんだから」
line = "「ていうか星徒会長って何さ。こちとらまだプリマステラにもなってないってのに、いきなり抜かれてちょっとショックだったんだから」"

[[dialogue]]
speaker = "unk"
# どうして環が新星学園に？
line = "どうして環が新星学園に？"

[[dialogue]]
speaker = "環"
# 「そんなのボクが星騎士だからに決まってるじゃん」
line = "「そんなのボクが星騎士だからに決まってるじゃん」"

[[dialogue]]
speaker = "環"
# 「そういや言ってなかったっけ。じゃあそっちもびっくりしちゃったか。あははっ」
line = "「そういや言ってなかったっけ。じゃあそっちもびっくりしちゃったか。あははっ」"

[[dialogue]]
speaker = "環"
# 「何はともあれ、星徒会長就任──もとい退学回避おめでとう！　いや～、御前試合見てた時はほんとハラハラしたよ」
line = "「何はともあれ、星徒会長就任──もとい退学回避おめでとう！　いや～、御前試合見てた時はほんとハラハラしたよ」"

[[dialogue]]
speaker = "環"
# 「それじゃ……ハイターッチ！」
line = "「それじゃ……ハイターッチ！」"

[[dialogue]]
speaker = "環"
# 「これからは会長って呼ばなきゃだね。あはははっ♪」
line = "「これからは会長って呼ばなきゃだね。あはははっ♪」"

[[dialogue]]
speaker = "マトイ"
# 「会長って転校してきたばかりだよね？　市倉さんとめちゃくちゃ仲がいい気がするんだけど……というか、２人は知り合い？」
line = "「会長って転校してきたばかりだよね？　市倉さんとめちゃくちゃ仲がいい気がするんだけど……というか、２人は知り合い？」"

[[dialogue]]
speaker = "環"
# 「一緒に地獄を潜り抜けた仲だからね！」
line = "「一緒に地獄を潜り抜けた仲だからね！」"

[[dialogue]]
speaker = "マトイ"
# 「地獄……！？　魔界にでも行ってたの？」
line = "「地獄……！？　魔界にでも行ってたの？」"

[[dialogue]]
speaker = "unk"
# 一緒にバイトしてた
line = "一緒にバイトしてた"

[[dialogue]]
speaker = "環"
# 「そうそう。回転寿司に交通量調査にライブに、一緒にいろいろやったなー」
line = "「そうそう。回転寿司に交通量調査にライブに、一緒にいろいろやったなー」"

[[dialogue]]
speaker = "環"
# 「その中でも夏フェスはも～ヤバかった。日差しはきついし、汗かいてシャツが貼り付くし、いくら水飲んでも喉渇くんだもん。最後の方なんか意識が朦朧としてたね」
line = "「その中でも夏フェスはも～ヤバかった。日差しはきついし、汗かいてシャツが貼り付くし、いくら水飲んでも喉渇くんだもん。最後の方なんか意識が朦朧としてたね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それは確かに地獄ね……」
line = "「それは確かに地獄ね……」"

[[dialogue]]
speaker = "unk"
# 環は２人と知り合い？
line = "環は２人と知り合い？"

[[dialogue]]
speaker = "環"
# 「知り合いっていうか、２人とも友達だよ。ヴィーナスとはちょくちょくスイーツ食べに行ってるし。マトイもバドミントン部で会うよね？」
line = "「知り合いっていうか、２人とも友達だよ。ヴィーナスとはちょくちょくスイーツ食べに行ってるし。マトイもバドミントン部で会うよね？」"

[[dialogue]]
speaker = "マトイ"
# 「まぁ、うん。というか、市倉さんと仲良くない人ってこの学園にはいないくらいだと思う」
line = "「まぁ、うん。というか、市倉さんと仲良くない人ってこの学園にはいないくらいだと思う」"

[[dialogue]]
speaker = "環"
# 「それは言い過ぎ……でもないか！　ははっ、そういえばみんな友達だね」
line = "「それは言い過ぎ……でもないか！　ははっ、そういえばみんな友達だね」"

[[dialogue]]
speaker = "環"
# 「あ、そうだ。せっかくまた会えたんだし、今度一緒に遊びに行かない？　新星学園転入と星徒会長になったお祝いも兼ねてさ」
line = "「あ、そうだ。せっかくまた会えたんだし、今度一緒に遊びに行かない？　新星学園転入と星徒会長になったお祝いも兼ねてさ」"

[[dialogue]]
speaker = "環"
# 「ちょっと前にバイトしてたカフェがけっこうオシャレでね、ケーキもおいしいしオススメなんだ」
line = "「ちょっと前にバイトしてたカフェがけっこうオシャレでね、ケーキもおいしいしオススメなんだ」"

[[dialogue]]
speaker = "環"
# 「……ＯＫ？　やった、楽しみ！　ついでに映画も見ようぜ～！　ボクが好きなアクション映画のシリーズ最新作が公開中でさ、これが評判いいらしいんだよね」
line = "「……ＯＫ？　やった、楽しみ！　ついでに映画も見ようぜ～！　ボクが好きなアクション映画のシリーズ最新作が公開中でさ、これが評判いいらしいんだよね」"

[[dialogue]]
speaker = "環"
# 「にしても新星学園に入るなら教えてよ～。いなくなってちょっと寂しかったんだから。えいえい」
line = "「にしても新星学園に入るなら教えてよ～。いなくなってちょっと寂しかったんだから。えいえい」"

[[dialogue]]
speaker = "マトイ"
# （脇腹ツンツンしてる）
line = "（脇腹ツンツンしてる）"

[[dialogue]]
speaker = "環"
# 「お、効いてる効いてる。こちょこちょこちょ～」
line = "「お、効いてる効いてる。こちょこちょこちょ～」"

[[dialogue]]
speaker = "ヴィーナス"
# （とってもくすぐったそうね……）
line = "（とってもくすぐったそうね……）"

[[dialogue]]
speaker = "環"
# 「おりゃ～、食らえ～っ、必殺ベアハッグ！」
line = "「おりゃ～、食らえ～っ、必殺ベアハッグ！」"

[[dialogue]]
speaker = "マトイ"
# （さらに後ろから抱きついて……！？　ふざけてるだけにしても、ちょっと距離近すぎじゃない……？）
line = "（さらに後ろから抱きついて……！？　ふざけてるだけにしても、ちょっと距離近すぎじゃない……？）"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、あなたたち付き合ってるの？」
line = "「あ、あなたたち付き合ってるの？」"

[[dialogue]]
speaker = "unk"
# 全然
line = "全然"

[[dialogue]]
speaker = "環"
# 「そうだよー、普通の友達だってば。あ、ヴィーナスとマトイも来る？　星徒会のみんなが一緒でもいいよ」
line = "「そうだよー、普通の友達だってば。あ、ヴィーナスとマトイも来る？　星徒会のみんなが一緒でもいいよ」"

[[dialogue]]
speaker = "マトイ"
# 「仲の良さを見せつけられそうだから遠慮しとく……」
line = "「仲の良さを見せつけられそうだから遠慮しとく……」"

[[dialogue]]
speaker = "環"
# 「そう？　ちょ～っと付き合いが長いだけなんだけどなー」
line = "「そう？　ちょ～っと付き合いが長いだけなんだけどなー」"

[[dialogue]]
speaker = "環"
# 「あ、会長これ飲む？　購買で売ってたキャラメルマシマシマキアート。すんごく濃いよ」
line = "「あ、会長これ飲む？　購買で売ってたキャラメルマシマシマキアート。すんごく濃いよ」"

[[dialogue]]
speaker = "環"
# 「……おいしい？　だよねー、ボクもそう思う♪」
line = "「……おいしい？　だよねー、ボクもそう思う♪」"

[[dialogue]]
speaker = "マトイ"
# 「やっぱり付き合ってる？」
line = "「やっぱり付き合ってる？」"

[[dialogue]]
speaker = "環"
# 「全然」
line = "「全然」"

[[dialogue]]
speaker = "unk"
# 友達だよ
line = "友達だよ"

[[dialogue]]
speaker = "マトイ"
# 「いやただの友達にしては距離感近すぎでしょ！」
line = "「いやただの友達にしては距離感近すぎでしょ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぐぬぬぬぬ……！　なんか納得いかないわ！」
line = "「ぐぬぬぬぬ……！　なんか納得いかないわ！」"
