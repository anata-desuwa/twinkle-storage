[[dialogue]]
speaker = "ロクサーナ"
# 「さて、我々の文化祭は終了したわけだが」
line = "「さて、我々の文化祭は終了したわけだが」"

[[dialogue]]
speaker = "ロクサーナ"
# 「満員御礼の観客の声援と拍手を聞いたか？　あれが我々の劇に対する評価の全てだ」
line = "「満員御礼の観客の声援と拍手を聞いたか？　あれが我々の劇に対する評価の全てだ」"

[[dialogue]]
speaker = "ロクサーナ"
# 「つまり、今回の公演は成功だった、ということだ。まあ及第点、悪くない出来だったな。私からも褒めてやる」
line = "「つまり、今回の公演は成功だった、ということだ。まあ及第点、悪くない出来だったな。私からも褒めてやる」"

[[dialogue]]
speaker = "ロクサーナ"
# 「やはり今回のＭＶＰはロミオ役とジュリエット役の２人だな」
line = "「やはり今回のＭＶＰはロミオ役とジュリエット役の２人だな」"

[[dialogue]]
speaker = "メイプル"
# 「異議な～し！　お兄ちゃんのロミオ、めちゃめちゃ格好良かったし、藍のジュリエットもすっっっごく綺麗だったよ！」
line = "「異議な～し！　お兄ちゃんのロミオ、めちゃめちゃ格好良かったし、藍のジュリエットもすっっっごく綺麗だったよ！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「使い古された脚本、分かり切った結末だというのに、観客の涙を誘い、万雷の拍手をもらえたのは、演者の力だ。演じきったことを誇り、胸を張れ」
line = "「使い古された脚本、分かり切った結末だというのに、観客の涙を誘い、万雷の拍手をもらえたのは、演者の力だ。演じきったことを誇り、胸を張れ」"

[[dialogue]]
speaker = "藍"
# 「あ、ありがとうございます」
line = "「あ、ありがとうございます」"

[[dialogue]]
speaker = "ロクサーナ"
# 「２人の演技は、なかなか真に迫っていたぞ。まるで目の前に本物の恋人でもいるかのようにな」
line = "「２人の演技は、なかなか真に迫っていたぞ。まるで目の前に本物の恋人でもいるかのようにな」"

[[dialogue]]
speaker = "メイプル"
# 「ホント、ドッキドキだったよ～！　特に最後のアレは驚いちゃった！」
line = "「ホント、ドッキドキだったよ～！　特に最後のアレは驚いちゃった！」"

[[dialogue]]
speaker = "藍"
# 「な、何がですか？」
line = "「な、何がですか？」"

[[dialogue]]
speaker = "メイプル"
# 「ロミオが毒で死んじゃって、ジュリエットも後を追おうとする前だよ」
line = "「ロミオが毒で死んじゃって、ジュリエットも後を追おうとする前だよ」"

[[dialogue]]
speaker = "メイプル"
# 「ジュリエット、死んだロミオにキスしたでしょ？　あの演技、稽古の時にはなかったよね？」
line = "「ジュリエット、死んだロミオにキスしたでしょ？　あの演技、稽古の時にはなかったよね？」"

[[dialogue]]
speaker = "藍"
# 「キ、キスはしてないですよ！　顔を近づけて、したフリだけで……！」
line = "「キ、キスはしてないですよ！　顔を近づけて、したフリだけで……！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「あれは良いアドリブだった。あの瞬間、会場中からすすり泣く声が聞こえたぞ」
line = "「あれは良いアドリブだった。あの瞬間、会場中からすすり泣く声が聞こえたぞ」"

[[dialogue]]
speaker = "藍"
# 「ジュリエットなら、そうすると思ったんです。最期の瞬間まで愛する人と触れ合いたかったんじゃないかなって……」
line = "「ジュリエットなら、そうすると思ったんです。最期の瞬間まで愛する人と触れ合いたかったんじゃないかなって……」"

[[dialogue]]
speaker = "ロクサーナ"
# 「今回の脚本には書かなかったがな。ロミオが服毒死したことを察したジュリエットは、ロミオの唇に残っている毒を接吻で舐め取ろうとする描写がある」
line = "「今回の脚本には書かなかったがな。ロミオが服毒死したことを察したジュリエットは、ロミオの唇に残っている毒を接吻で舐め取ろうとする描写がある」"

[[dialogue]]
speaker = "ロクサーナ"
# 「それを無意識にやったならば……憑依型女優として一皮剥けたな、藍」
line = "「それを無意識にやったならば……憑依型女優として一皮剥けたな、藍」"

[[dialogue]]
speaker = "藍"
# 「あっ──ありがとうございます！　私、もっともっと演技を磨いて、部長を満足させられる俳優になります！」
line = "「あっ──ありがとうございます！　私、もっともっと演技を磨いて、部長を満足させられる俳優になります！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「はっ、デカい口を叩くようになったじゃ──お、おおおっ……！？　キた、キたぞっ！！」
line = "「はっ、デカい口を叩くようになったじゃ──お、おおおっ……！？　キた、キたぞっ！！」"

[[dialogue]]
speaker = "メイプル"
# 「部長！？　どうしたの！？」
line = "「部長！？　どうしたの！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「急に脚本のアイデアが下りてきた！　打ち上げなんてやってる場合ではないな！　この閃きが消える前に、書き留めなくては……！」
line = "「急に脚本のアイデアが下りてきた！　打ち上げなんてやってる場合ではないな！　この閃きが消える前に、書き留めなくては……！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「か、会長、また有事の際には頼む。我が部の大女優のポテンシャルを最大限に引き出せるのはお前しかいないのだからな！」
line = "「か、会長、また有事の際には頼む。我が部の大女優のポテンシャルを最大限に引き出せるのはお前しかいないのだからな！」"

[[dialogue]]
speaker = "メイプル"
# 「部長、行っちゃった……。天才って変わり者が多いっていうけど、ホントだよね」
line = "「部長、行っちゃった……。天才って変わり者が多いっていうけど、ホントだよね」"

[[dialogue]]
speaker = "藍"
# 「会長さん、今回のロミオ役、本当にありがとうございました。私が演者として、一皮剥けられたのは全部会長さんのおかげです」
line = "「会長さん、今回のロミオ役、本当にありがとうございました。私が演者として、一皮剥けられたのは全部会長さんのおかげです」"

[[dialogue]]
speaker = "藍"
# 「お忙しいでしょうけど、またいつでも演劇部にいらしてくださいね。良かったら、また稽古に付き合ってください」
line = "「お忙しいでしょうけど、またいつでも演劇部にいらしてくださいね。良かったら、また稽古に付き合ってください」"

[[dialogue]]
speaker = "メイプル"
# 「藍ばっかりズル～い！　お兄ちゃん、次はあたしと共演しようね！　Ｗ魔王なんて話題性抜群だよ！」
line = "「藍ばっかりズル～い！　お兄ちゃん、次はあたしと共演しようね！　Ｗ魔王なんて話題性抜群だよ！」"

[[dialogue]]
speaker = "unk"
# こうして、辛くも楽しい演劇部への出張の日々は、終わりを告げたのだった。
line = "こうして、辛くも楽しい演劇部への出張の日々は、終わりを告げたのだった。"

[[dialogue]]
speaker = "アナ"
# 「文化祭でのロミオの熱演、拝見させていただきました。不動不変のラブストーリー……会長、グッジョブでした」
line = "「文化祭でのロミオの熱演、拝見させていただきました。不動不変のラブストーリー……会長、グッジョブでした」"

[[dialogue]]
speaker = "アナ"
# 「今後も演劇部には出入りされるんですか？」
line = "「今後も演劇部には出入りされるんですか？」"

[[dialogue]]
speaker = "unk"
# いやいや、もう今回限りで──
line = "いやいや、もう今回限りで──"

[[dialogue]]
speaker = "ロクサーナ"
# 「演劇部部長ロクサーナ・ハイドランジアだ！　失礼する！」
line = "「演劇部部長ロクサーナ・ハイドランジアだ！　失礼する！」"

[[dialogue]]
speaker = "unk"
# また出たー！？
line = "また出たー！？"

[[dialogue]]
speaker = "アナ"
# 「ロクサーナ部長、どうしました」
line = "「ロクサーナ部長、どうしました」"

[[dialogue]]
speaker = "ロクサーナ"
# 「これを見てくれ！」
line = "「これを見てくれ！」"

[[dialogue]]
speaker = "アナ"
# 「すごい量の紙束ですが……これは脚本、ですか？」
line = "「すごい量の紙束ですが……これは脚本、ですか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ああ、文化祭後に書き上げた！」
line = "「ああ、文化祭後に書き上げた！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「あれ以降、インスピレーションが止まらなくなってしまってな！　ここまで創作の神が降臨した経験は今までにない！」
line = "「あれ以降、インスピレーションが止まらなくなってしまってな！　ここまで創作の神が降臨した経験は今までにない！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「四大悲劇の『マクベス』『オセロ』『リア王』『ハムレット』！　『ジュリアス・シーザー』も完成間近だ！　さぁ、会長、どの劇のどの役がいい！？」
line = "「四大悲劇の『マクベス』『オセロ』『リア王』『ハムレット』！　『ジュリアス・シーザー』も完成間近だ！　さぁ、会長、どの劇のどの役がいい！？」"

[[dialogue]]
speaker = "unk"
# 俺が演るの確定！？
line = "俺が演るの確定！？"

[[dialogue]]
speaker = "アナ"
# 「おお……会長が演じるブルータスは興味深いですね」
line = "「おお……会長が演じるブルータスは興味深いですね」"

[[dialogue]]
speaker = "ロクサーナ"
# 「話が分かるな！　この機に副会長も舞台デビューを飾ってみてはどうだ？　最適な役どころを用意する。悪いようにはせん！」
line = "「話が分かるな！　この機に副会長も舞台デビューを飾ってみてはどうだ？　最適な役どころを用意する。悪いようにはせん！」"

[[dialogue]]
speaker = "アナ"
# 「ふむふむ、興味深いですね。前向きに検討します」
line = "「ふむふむ、興味深いですね。前向きに検討します」"

[[dialogue]]
speaker = "ロクサーナ"
# 「これからも新春公演、オープンキャンパスとお披露目の機会は目白押しだ！」
line = "「これからも新春公演、オープンキャンパスとお披露目の機会は目白押しだ！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「藍も会長がいなくては稽古に身が入らないようでな！　さあ、観念して演劇部の軍門に下るがいい！」
line = "「藍も会長がいなくては稽古に身が入らないようでな！　さあ、観念して演劇部の軍門に下るがいい！」"

[[dialogue]]
speaker = "unk"
# もう勘弁してー！
line = "もう勘弁してー！"

[[dialogue]]
speaker = "unk"
# これからもロクサーナ率いる演劇部は幾度も星徒会を巻き込み、公演の度に振り回されることになるのであった。
line = "これからもロクサーナ率いる演劇部は幾度も星徒会を巻き込み、公演の度に振り回されることになるのであった。"
