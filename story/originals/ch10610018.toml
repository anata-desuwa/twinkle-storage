line = "「うぁ……マリオンのおっぱい、相変わらず乳圧すご……！」"

[[dialogue]]
speaker = "マリオン"
# 「んっ……<emoji=heart04>　ふふっ<emoji=heart04>　ご主人様のおち○ちん、みるみる大きくなってますよ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ふふっ<emoji=heart04>　ご主人様のおち○ちん、みるみる大きくなってますよ<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
