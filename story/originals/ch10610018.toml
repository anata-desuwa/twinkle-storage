[[dialogue]]
speaker = "unk"
# マリオンと恋人の関係になって、しばらく経ったある日のこと。
line = "マリオンと恋人の関係になって、しばらく経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 最近、俺は星徒会の仕事が忙しくて、マリオンと２人の時間をなかなか取れずにいたのだが――
line = "最近、俺は星徒会の仕事が忙しくて、マリオンと２人の時間をなかなか取れずにいたのだが――"

[[dialogue]]
speaker = "マリオン"
# 「失礼いたします、会長様」
line = "「失礼いたします、会長様」"

[[dialogue]]
speaker = "クロト"
# 「ああ、マリオン。残業が終わって、ちょうど今帰ろうと思ってたところで――」
line = "「ああ、マリオン。残業が終わって、ちょうど今帰ろうと思ってたところで――」"

[[dialogue]]
speaker = "マリオン"
# 「はい。そう思って、参りました。お疲れのところ、申し訳ありませんが……」
line = "「はい。そう思って、参りました。お疲れのところ、申し訳ありませんが……」"

[[dialogue]]
speaker = "マリオン"
# 「連行させていただきますね<emoji=heart04>」
line = "「連行させていただきますね<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「えっ！？　何！？　どういうこと！？」
line = "「えっ！？　何！？　どういうこと！？」"

[[dialogue]]
speaker = "マリオン"
# 「――まあまあ、うふふ♪　そう警戒なさらずに。<ruby=わたくし>私</ruby>の部屋にご招待したいと思っているだけですので」
line = "「――まあまあ、うふふ♪　そう警戒なさらずに。<ruby>私<rt>わたくし</rt></ruby>の部屋にご招待したいと思っているだけですので」"

[[dialogue]]
speaker = "マリオン"
# 「……明日も仕事が忙しいから、帰って早く寝ないとマズい？　ご心配なく。こういう時こそ、人形使いである私の出番です」
line = "「……明日も仕事が忙しいから、帰って早く寝ないとマズい？　ご心配なく。こういう時こそ、人形使いである私の出番です」"

[[dialogue]]
speaker = "マリオン"
# 「明日の仕事は私達が代わりにやりますし、リノ様にも既に話は通してあります」
line = "「明日の仕事は私達が代わりにやりますし、リノ様にも既に話は通してあります」"

[[dialogue]]
speaker = "マリオン"
# 「それに、真面目な会長様のことですから、忙しくて色々溜め込んでしまっているのではないですか？」
line = "「それに、真面目な会長様のことですから、忙しくて色々溜め込んでしまっているのではないですか？」"

[[dialogue]]
speaker = "クロト"
# 「う……実はここ１週間くらい……オナニーもしてなくて……」
line = "「う……実はここ１週間くらい……オナニーもしてなくて……」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ<emoji=heart04>　それは大変です<emoji=heart04>　会長様のケアは、恋人である私の務め――」
line = "「ふふっ<emoji=heart04>　それは大変です<emoji=heart04>　会長様のケアは、恋人である私の務め――」"

[[dialogue]]
speaker = "マリオン"
# 「今宵はゆっくり、私の部屋で、溜まったものを全部吐き出していってください<emoji=heart04>　ご主人様<emoji=heart04>」
line = "「今宵はゆっくり、私の部屋で、溜まったものを全部吐き出していってください<emoji=heart04>　ご主人様<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
