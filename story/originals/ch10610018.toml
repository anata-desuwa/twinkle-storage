line = "「ご主人様のも、相変わらず私のおっぱいに収まらないくらいご立派です<emoji=heart04>　思わず、うっとりしてしまいます……<emoji=heart04>　はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「パイズリでご奉仕する前に、ローションを塗っておきませんとね<emoji=heart04>　そちらの方が気持ちよくなれますから……」
line = "「パイズリでご奉仕する前に、ローションを塗っておきませんとね<emoji=heart04>　そちらの方が気持ちよくなれますから……」"

[[dialogue]]
speaker = "マリオン"
