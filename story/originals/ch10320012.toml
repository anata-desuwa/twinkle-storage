[[dialogue]]
speaker = "unk"
# 第２話,不運な司書さん,P
line = "第２話,不運な司書さん,P"

[[dialogue]]
speaker = "ウィステリア"
# 「こんにちは。御前試合勝ったそうね。星徒会長就任おめでとう」
line = "「こんにちは。御前試合勝ったそうね。星徒会長就任おめでとう」"

[[dialogue]]
speaker = "unk"
# ありがとうございます
line = "ありがとうございます"

[[dialogue]]
speaker = "ウィステリア"
# 「じゃあ、せっかくだから会長くんって呼んじゃおうかしら。ふふっ」
line = "「じゃあ、せっかくだから会長くんって呼んじゃおうかしら。ふふっ」"

[[dialogue]]
speaker = "ウィステリア"
# 「なんかすごかったらしいわね～。私も見たかったけど仕事中でね。ちょっと残念だわ」
line = "「なんかすごかったらしいわね～。私も見たかったけど仕事中でね。ちょっと残念だわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「……はぁ～」
line = "「……はぁ～」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、ごめん。溜息出ちゃった」
line = "「あ、ごめん。溜息出ちゃった」"

[[dialogue]]
speaker = "ウィステリア"
# 「……まぁ、うん、何かあったといえばあったんだけど。この前の休みに……」
line = "「……まぁ、うん、何かあったといえばあったんだけど。この前の休みに……」"

[[dialogue]]
speaker = "ウィステリア"
# 『今日は有名なロールケーキ専門店のオープン日。あの名店の支店が出るって聞いて楽しみにしてたんだから』
line = "『今日は有名なロールケーキ専門店のオープン日。あの名店の支店が出るって聞いて楽しみにしてたんだから』"

[[dialogue]]
speaker = "ウィステリア"
# 『お手軽なコンビニスイーツもいいけど、たまには高級なのもね。社会人になると、こういう楽しみが大事なのよ』
line = "『お手軽なコンビニスイーツもいいけど、たまには高級なのもね。社会人になると、こういう楽しみが大事なのよ』"

[[dialogue]]
speaker = "ウィステリア"
# 『並び始めて一時間半……あ、列進んできたわね。そろそろ買えそう……』
line = "『並び始めて一時間半……あ、列進んできたわね。そろそろ買えそう……』"

[[dialogue]]
speaker = "店員"
# 『申し訳ありません、ロールケーキここまででーす』
line = "『申し訳ありません、ロールケーキここまででーす』"

[[dialogue]]
speaker = "ウィステリア"
# 『え～～っ！？』
line = "『え～～っ！？』"

[[dialogue]]
speaker = "ウィステリア"
# 「って、私の目の前で売り切れたのよ！」
line = "「って、私の目の前で売り切れたのよ！」"

[[dialogue]]
speaker = "ウィステリア"
# 「休日の贅沢を楽しみに仕事頑張ってたのに……ロールケーキ……私のロールケーキ……」
line = "「休日の贅沢を楽しみに仕事頑張ってたのに……ロールケーキ……私のロールケーキ……」"

[[dialogue]]
speaker = "ウィステリア"
# 「お気に入りのルージュはどっかいくし、ドライヤーは壊れるし、間違えて部屋の水道止められるし……」
line = "「お気に入りのルージュはどっかいくし、ドライヤーは壊れるし、間違えて部屋の水道止められるし……」"

[[dialogue]]
speaker = "ウィステリア"
# 「そもそも実家からして最悪だし、ろくな青春も送れなかったし、私の人生ずっとこんなのばっかり……やっぱり呪われてる……」
line = "「そもそも実家からして最悪だし、ろくな青春も送れなかったし、私の人生ずっとこんなのばっかり……やっぱり呪われてる……」"

[[dialogue]]
speaker = "ウィステリア"
# 「いえ、気持ちを切り替えましょう。生徒にかっこ悪いところ見せられないわ」
line = "「いえ、気持ちを切り替えましょう。生徒にかっこ悪いところ見せられないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「図書館に何の用事かしら？　……この前応援してくれたお礼？　ふふっ、そんなのいいのに。でも嬉しいわ」
line = "「図書館に何の用事かしら？　……この前応援してくれたお礼？　ふふっ、そんなのいいのに。でも嬉しいわ」"

[[dialogue]]
speaker = "ウィステリア"
# （ハッ──もしかして私のこと気になるのかしら……？）
line = "（ハッ──もしかして私のこと気になるのかしら……？）"

[[dialogue]]
speaker = "ウィステリア"
# （ダメ、ダメよ！　情熱的な恋愛も素敵だと思うけど、星徒会長と学園職員なんだから節度を保たないと！）
line = "（ダメ、ダメよ！　情熱的な恋愛も素敵だと思うけど、星徒会長と学園職員なんだから節度を保たないと！）"

[[dialogue]]
speaker = "unk"
# それじゃあ……
line = "それじゃあ……"

[[dialogue]]
speaker = "ウィステリア"
# 「ひゃあっ！？　な、何？」
line = "「ひゃあっ！？　な、何？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ああ、これから星徒会？　そっか、会長のお仕事頑張ってね」
line = "「ああ、これから星徒会？　そっか、会長のお仕事頑張ってね」"

[[dialogue]]
speaker = "ウィステリア"
# （純粋にお礼に来たのに何考えてるのよ私のバカ！　色ボケ女～！）
line = "（純粋にお礼に来たのに何考えてるのよ私のバカ！　色ボケ女～！）"

[[dialogue]]
speaker = "unk"
# その日の帰宅中――
line = "その日の帰宅中――"

[[dialogue]]
speaker = "マトイ"
# 「はぁ、はぁ、モンスターが多い……！　こんなにモンスターが出るなんて、やっぱりリクリエが近いの？」
line = "「はぁ、はぁ、モンスターが多い……！　こんなにモンスターが出るなんて、やっぱりリクリエが近いの？」"

[[dialogue]]
speaker = "unk"
# でもあと少しだ！
line = "でもあと少しだ！"

[[dialogue]]
speaker = "マトイ"
# 「うん、気を付けて！」
line = "「うん、気を付けて！」"

[[dialogue]]
speaker = "女の子"
# 「きゃああっ！？」
line = "「きゃああっ！？」"

[[dialogue]]
speaker = "マトイ"
# 「！？　間に合わ──」
line = "「！？　間に合わ──」"

[[dialogue]]
speaker = "マトイ"
# 「えっ……？　今のは……」
line = "「えっ……？　今のは……」"

[[dialogue]]
speaker = "女の子"
# 「あ、ありがとう、お姉ちゃん」
line = "「あ、ありがとう、お姉ちゃん」"

[[dialogue]]
speaker = "マトイ"
# 「ど、どうしたしまして。みんなを守ることが私たち星騎士の役目だからね。じゃあね～」
line = "「ど、どうしたしまして。みんなを守ることが私たち星騎士の役目だからね。じゃあね～」"

[[dialogue]]
speaker = "マトイ"
# 「被害が出なくて本当に良かった～。でもあの時の攻撃は……会長じゃない？　じゃああんな強烈な攻撃誰が――」
line = "「被害が出なくて本当に良かった～。でもあの時の攻撃は……会長じゃない？　じゃああんな強烈な攻撃誰が――」"

[[dialogue]]
speaker = "ウィステリア"
# 「２人ともお疲れ～。会長くんはまた会ったわね」
line = "「２人ともお疲れ～。会長くんはまた会ったわね」"

[[dialogue]]
speaker = "マトイ"
# 「あれ？　ウィステリアさん？」
line = "「あれ？　ウィステリアさん？」"

[[dialogue]]
speaker = "ウィステリア"
# 「うん、ちょっと遠くから戦いを見させてもらったわよ。さすがは新星の星徒会ね」
line = "「うん、ちょっと遠くから戦いを見させてもらったわよ。さすがは新星の星徒会ね」"

[[dialogue]]
speaker = "マトイ"
# 「そう……ですね」
line = "「そう……ですね」"

[[dialogue]]
speaker = "ウィステリア"
# （ん？　会長くん、こっちをじっと見てるような……）
line = "（ん？　会長くん、こっちをじっと見てるような……）"

[[dialogue]]
speaker = "ウィステリア"
# （偶然の再会にときめきを感じてるとか？　まさかデートのお誘いかしら？　大胆ね。でも喫茶店ぐらいなら……）
line = "（偶然の再会にときめきを感じてるとか？　まさかデートのお誘いかしら？　大胆ね。でも喫茶店ぐらいなら……）"

[[dialogue]]
speaker = "unk"
# その本ずっと持ってるんですか？
line = "その本ずっと持ってるんですか？"

[[dialogue]]
speaker = "ウィステリア"
# 「そこかー！」
line = "「そこかー！」"

[[dialogue]]
speaker = "ウィステリア"
# （やっぱり私のバカ！　でももうちょっとお姉さんに惹かれてくれたっていいじゃない！）
line = "（やっぱり私のバカ！　でももうちょっとお姉さんに惹かれてくれたっていいじゃない！）"

[[dialogue]]
speaker = "マトイ"
# 「確かに、ウィステリアさんがその本持ってないの見たことないですね。何かの――」
line = "「確かに、ウィステリアさんがその本持ってないの見たことないですね。何かの――」"

[[dialogue]]
speaker = "キリカ"
# 「皆さま、こんにちは」
line = "「皆さま、こんにちは」"

[[dialogue]]
speaker = "ウィステリア"
# 「ええ、こんにちは。あなたも様子を見に来たの？」
line = "「ええ、こんにちは。あなたも様子を見に来たの？」"

[[dialogue]]
speaker = "キリカ"
# 「ええ、近くまで来ていたので。加勢の必要はなかったようですが」
line = "「ええ、近くまで来ていたので。加勢の必要はなかったようですが」"

[[dialogue]]
speaker = "ウィステリア"
# 「そ」
line = "「そ」"

[[dialogue]]
speaker = "キリカ"
# 「失礼いたします」
line = "「失礼いたします」"

[[dialogue]]
speaker = "マトイ"
# 「お知り合いですか？」
line = "「お知り合いですか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ちょっとね。ま、流星市国には星見家も九浄家もあるんだから、メイドの知り合いくらいいるわ」
line = "「ちょっとね。ま、流星市国には星見家も九浄家もあるんだから、メイドの知り合いくらいいるわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「じゃ、今日はお疲れ様。家に帰ってゆっくり休んでね～」
line = "「じゃ、今日はお疲れ様。家に帰ってゆっくり休んでね～」"
