[[dialogue]]
speaker = "unk"
# 第３話,ショコラティエ・ティータイム,P
line = "第３話,ショコラティエ・ティータイム,P"

[[dialogue]]
speaker = "unk"
# ある日の午後。
line = "ある日の午後。"

[[dialogue]]
speaker = "unk"
# カフェテリアではサランに見守られつつ、ウルスラがチョコレート作りに勤しんでいた。
line = "カフェテリアではサランに見守られつつ、ウルスラがチョコレート作りに勤しんでいた。"

[[dialogue]]
speaker = "サラン"
# 「そうそう、人肌よりもちょっぴりあったかいくらいで……ウルスラちゃん、手際良くなった～」
line = "「そうそう、人肌よりもちょっぴりあったかいくらいで……ウルスラちゃん、手際良くなった～」"

[[dialogue]]
speaker = "ウルスラ"
# 「恐縮です。ちゃんと師匠に習った通りの作り方で、日々、腕を磨いてますので」
line = "「恐縮です。ちゃんと師匠に習った通りの作り方で、日々、腕を磨いてますので」"

[[dialogue]]
speaker = "サラン"
# 「年上なんだから、師匠じゃなくってサランでいいのに～。ウルスラちゃんって真面目～」
line = "「年上なんだから、師匠じゃなくってサランでいいのに～。ウルスラちゃんって真面目～」"

[[dialogue]]
speaker = "ウルスラ"
# 「こちらはどうでしょうか……？　味見をお願いできますか？」
line = "「こちらはどうでしょうか……？　味見をお願いできますか？」"

[[dialogue]]
speaker = "サラン"
# 「どれどれ～、ぺろっ……」
line = "「どれどれ～、ぺろっ……」"

[[dialogue]]
speaker = "サラン"
# 「う～ん……口の温度だけで、とろ～り溶ける滑らかさ……ふわふわ～って広がる気持ちいい香り……」
line = "「う～ん……口の温度だけで、とろ～り溶ける滑らかさ……ふわふわ～って広がる気持ちいい香り……」"

[[dialogue]]
speaker = "ウルスラ"
# 「ドキドキ……！」
line = "「ドキドキ……！」"

[[dialogue]]
speaker = "サラン"
# 「ん～～っ♪　す～～っごく美味しい～！　さすがウルスラちゃん、チョコレートはバッチリだ♪」
line = "「ん～～っ♪　す～～っごく美味しい～！　さすがウルスラちゃん、チョコレートはバッチリだ♪」"

[[dialogue]]
speaker = "ウルスラ"
# 「ホッ……師匠にそう言っていただけて、良かったです」
line = "「ホッ……師匠にそう言っていただけて、良かったです」"

[[dialogue]]
speaker = "サラン"
# 「それじゃ、準備ができたところで～、そろそろ時間かな？」
line = "「それじゃ、準備ができたところで～、そろそろ時間かな？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「約束の場所は……こちらで合っていますわよね？」
line = "「約束の場所は……こちらで合っていますわよね？」"

[[dialogue]]
speaker = "ウルスラ"
# 「あ、お待ちしておりました。ヒルディオーネさん」
line = "「あ、お待ちしておりました。ヒルディオーネさん」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「本日はお誘いありがとうございますわ、ウルスラさん。サランさんもごきげんよう」
line = "「本日はお誘いありがとうございますわ、ウルスラさん。サランさんもごきげんよう」"

[[dialogue]]
speaker = "サラン"
# 「ヒルディちゃん、こんにちは～。２人はお友達なんだっけ？」
line = "「ヒルディちゃん、こんにちは～。２人はお友達なんだっけ？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ、同じ学年で、流星学園に入学した頃からのお付き合いですわ」
line = "「ええ、同じ学年で、流星学園に入学した頃からのお付き合いですわ」"

[[dialogue]]
speaker = "ウルスラ"
# 「何分、人間界には不慣れでしたので……学園に入学した頃はヒルディオーネさんによくしていただきました」
line = "「何分、人間界には不慣れでしたので……学園に入学した頃はヒルディオーネさんによくしていただきました」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ウルスラさんがチョコレートを作って待っているとのことでしたが……こちらがウルスラさんの作られたチョコレートですの？」
line = "「ウルスラさんがチョコレートを作って待っているとのことでしたが……こちらがウルスラさんの作られたチョコレートですの？」"

[[dialogue]]
speaker = "ウルスラ"
# 「はい、お口に合えばいいのですけど」
line = "「はい、お口に合えばいいのですけど」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「表面の光沢は、まるで宝玉のように艶やか。いい仕事されてますわね」
line = "「表面の光沢は、まるで宝玉のように艶やか。いい仕事されてますわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「口に入れずとも、まろやかな美味が想像できますわ……では、あんっ」
line = "「口に入れずとも、まろやかな美味が想像できますわ……では、あんっ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「んんっ……♪　なんて滑らかな口溶け。口内を愛撫するような快感……消えていってしまうのが惜しいですわ」
line = "「んんっ……♪　なんて滑らかな口溶け。口内を愛撫するような快感……消えていってしまうのが惜しいですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そこに紅茶を一口含むと……んっ……はぁぁ……♪　口の中に残ったフレーバーが際立って、華やかな余韻が訪れる……」
line = "「そこに紅茶を一口含むと……んっ……はぁぁ……♪　口の中に残ったフレーバーが際立って、華やかな余韻が訪れる……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「またひとつ、もうひとつと欲しくなってしまう罪深いお味……これは私の知る限り、五指に入る最高品質のチョコレートですわね」
line = "「またひとつ、もうひとつと欲しくなってしまう罪深いお味……これは私の知る限り、五指に入る最高品質のチョコレートですわね」"

[[dialogue]]
speaker = "ウルスラ"
# 「ありがとうございます。最高の賛辞です」
line = "「ありがとうございます。最高の賛辞です」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「もちろん、その一指にはサランさんのチョコレートも入っていますけれどね」
line = "「もちろん、その一指にはサランさんのチョコレートも入っていますけれどね」"

[[dialogue]]
speaker = "サラン"
# 「わ～、ありがと～♪」
line = "「わ～、ありがと～♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「品評会はこのくらいにしまして、ティータイムを楽しみましょう」
line = "「品評会はこのくらいにしまして、ティータイムを楽しみましょう」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「──そういえば、ここに来る途中、暴れているモンスターと遭遇しましたわ」
line = "「──そういえば、ここに来る途中、暴れているモンスターと遭遇しましたわ」"

[[dialogue]]
speaker = "ウルスラ"
# 「まあ、大丈夫でしたか？」
line = "「まあ、大丈夫でしたか？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ、無傷での勝利──といいたいところですけど、ちょうどそこに会長が駆けつけまして。私の見せ場はありませんでしたの」
line = "「ええ、無傷での勝利──といいたいところですけど、ちょうどそこに会長が駆けつけまして。私の見せ場はありませんでしたの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「その場にいた子どもやご老人にも怪我ひとつなく、実に見事な救出劇でしたわ」
line = "「その場にいた子どもやご老人にも怪我ひとつなく、実に見事な救出劇でしたわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「もっとも、会長はご老人を庇って、手傷を負われたようでしたが」
line = "「もっとも、会長はご老人を庇って、手傷を負われたようでしたが」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんあるあるだよね～。人は助けるのに自分が怪我するのは気にしないの～」
line = "「会長ちゃんあるあるだよね～。人は助けるのに自分が怪我するのは気にしないの～」"

[[dialogue]]
speaker = "ウルスラ"
# 「あの方は……確かにそういう方ですね」
line = "「あの方は……確かにそういう方ですね」"

[[dialogue]]
speaker = "ウルスラ"
# （あの時も、私の矢からイレーナさんを庇おうと身を挺して……あの献身さは尊く、素晴らしいものですけど──）
line = "（あの時も、私の矢からイレーナさんを庇おうと身を挺して……あの献身さは尊く、素晴らしいものですけど──）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「褒められるべき行為ではありますが、人の上に立つ身としては、危うい面もありますわね」
line = "「褒められるべき行為ではありますが、人の上に立つ身としては、危うい面もありますわね」"

[[dialogue]]
speaker = "サラン"
# 「だからこそ、みんなは会長ちゃんを助けてあげたくなっちゃうのかな～？」
line = "「だからこそ、みんなは会長ちゃんを助けてあげたくなっちゃうのかな～？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「何かしでかさないか、一挙一動が気になり、つい目で追ってしまいます。会長は人を惹きつける魅力に長けてますわね」
line = "「何かしでかさないか、一挙一動が気になり、つい目で追ってしまいます。会長は人を惹きつける魅力に長けてますわね」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんに憧れてる子もいっぱいいるよ～。バレンタインチョコあげるからって、チョコ作りを習いに来た子もたくさんいたし～」
line = "「会長ちゃんに憧れてる子もいっぱいいるよ～。バレンタインチョコあげるからって、チョコ作りを習いに来た子もたくさんいたし～」"

[[dialogue]]
speaker = "ウルスラ"
# 「そういえば、会長さんはチョコを袋いっぱいに抱えていました……」
line = "「そういえば、会長さんはチョコを袋いっぱいに抱えていました……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふふ、ホワイトデーのお返しも大変そうですわね。でも、彼はそのひとつひとつにも妥協をなさらないのでしょう」
line = "「ふふ、ホワイトデーのお返しも大変そうですわね。でも、彼はそのひとつひとつにも妥協をなさらないのでしょう」"

[[dialogue]]
speaker = "サラン"
# 「うふふ、ウルスラちゃんも会長ちゃんのこと、気になる～？」
line = "「うふふ、ウルスラちゃんも会長ちゃんのこと、気になる～？」"

[[dialogue]]
speaker = "ウルスラ"
# 「そう……ですね。私は会長さんと知り合ってまだ日が浅いのですが……少し、興味が出てきました」
line = "「そう……ですね。私は会長さんと知り合ってまだ日が浅いのですが……少し、興味が出てきました」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら。では恋が芽吹くところを、お茶請けにさせていただこうかしら」
line = "「あら。では恋が芽吹くところを、お茶請けにさせていただこうかしら」"

[[dialogue]]
speaker = "ウルスラ"
# 「──恋の……い、いえっ！？　興味というのは、あくまで人間的な意味ですっ！　会長さんの不思議さを解明したいだけで……！」
line = "「──恋の……い、いえっ！？　興味というのは、あくまで人間的な意味ですっ！　会長さんの不思議さを解明したいだけで……！」"

[[dialogue]]
speaker = "サラン"
# 「ふ～ん、そうなんだ～♪」
line = "「ふ～ん、そうなんだ～♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ウルスラさんの恋路に幸多からんことを……ですわね、ふふ」
line = "「ウルスラさんの恋路に幸多からんことを……ですわね、ふふ」"

[[dialogue]]
speaker = "ウルスラ"
# 「ですから、そういうのではないんですってばーっ！」
line = "「ですから、そういうのではないんですってばーっ！」"

[[dialogue]]
speaker = "unk"
# ウルスラが顔を真っ赤にして、２人に反論する。
line = "ウルスラが顔を真っ赤にして、２人に反論する。"

[[dialogue]]
speaker = "unk"
# そんな彼女を、サランとヒルディオーネは微笑ましく見つめるのだった。
line = "そんな彼女を、サランとヒルディオーネは微笑ましく見つめるのだった。"
