[[dialogue]]
speaker = "unk"
# 第４話,九浄ヘレナの青春,P
line = "第４話,九浄ヘレナの青春,P"

[[dialogue]]
speaker = "unk"
# 夜遅くまで残業することになってしまったある日。星徒会室で１人、頭を悩ませていると――
line = "夜遅くまで残業することになってしまったある日。星徒会室で１人、頭を悩ませていると――"

[[dialogue]]
speaker = "ヘレナ"
# 「失礼するぞ。ヴィーナスの心配していた通り、まだ残っていたか」
line = "「失礼するぞ。ヴィーナスの心配していた通り、まだ残っていたか」"

[[dialogue]]
speaker = "ヘレナ"
# 「こんな遅くまでする必要のある残業ならば、１人でやらず、周りに相談すればよいものを……」
line = "「こんな遅くまでする必要のある残業ならば、１人でやらず、周りに相談すればよいものを……」"

[[dialogue]]
speaker = "ヘレナ"
# 「――自分のスケジュールミスだから、自分でカバーしようと思った？　やれやれ、貴殿はたまに、そうやって背負い込みすぎる時があるな」
line = "「――自分のスケジュールミスだから、自分でカバーしようと思った？　やれやれ、貴殿はたまに、そうやって背負い込みすぎる時があるな」"

[[dialogue]]
speaker = "ヘレナ"
# 「それは貴殿の悪癖だぞ。もっと周りに相談せよ。私もいるであろう」
line = "「それは貴殿の悪癖だぞ。もっと周りに相談せよ。私もいるであろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「……大人だからと距離を置かれるのは寂しいものだ。特に、貴殿にはな」
line = "「……大人だからと距離を置かれるのは寂しいものだ。特に、貴殿にはな」"

[[dialogue]]
speaker = "ヘレナ"
# 「見たところ、行き詰った顔をしているし、少し気晴らしにでもいかないか？」
line = "「見たところ、行き詰った顔をしているし、少し気晴らしにでもいかないか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「――なに、ちょっとした大人の夜デートというやつだ」
line = "「――なに、ちょっとした大人の夜デートというやつだ」"

[[dialogue]]
speaker = "unk"
# そんな風にヘレナちゃんから誘われて、夜の校舎を散歩することになった――
line = "そんな風にヘレナちゃんから誘われて、夜の校舎を散歩することになった――"

[[dialogue]]
speaker = "ヘレナ"
# 「夜の学園というのも、こうして２人で歩くと、なかなかに雰囲気があってよいものであろう？」
line = "「夜の学園というのも、こうして２人で歩くと、なかなかに雰囲気があってよいものであろう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ちょうど周りの目もなく、よい機会だ。この前のデートではすっかり忘れてしまっていたが――」
line = "「ちょうど周りの目もなく、よい機会だ。この前のデートではすっかり忘れてしまっていたが――」"

[[dialogue]]
speaker = "unk"
# そう言って、ヘレナちゃんは俺の前に手を差し出す。
line = "そう言って、ヘレナちゃんは俺の前に手を差し出す。"

[[dialogue]]
speaker = "ヘレナ"
# 「男女のデートといえば、手を繋ぐのが定番であろう？　せっかくだから、試してみぬか？」
line = "「男女のデートといえば、手を繋ぐのが定番であろう？　せっかくだから、試してみぬか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「今度の時は、エスコートしてくれるとも言っていたしな？　ふふっ」
line = "「今度の時は、エスコートしてくれるとも言っていたしな？　ふふっ」"

[[dialogue]]
speaker = "unk"
# 俺はちょっと緊張しながら、手を繋ぐ。九浄家当主として大きなオーラを纏っている彼女だが、実際にその手を取ると、女性らしく小さくて――
line = "俺はちょっと緊張しながら、手を繋ぐ。九浄家当主として大きなオーラを纏っている彼女だが、実際にその手を取ると、女性らしく小さくて――"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ、こうして手を取り合うと、貴殿は確かに男なのだな。可愛い顔立ちをしているのに、手も、背丈も、大人の私より大きいのだと実感させられる」
line = "「ふむ、こうして手を取り合うと、貴殿は確かに男なのだな。可愛い顔立ちをしているのに、手も、背丈も、大人の私より大きいのだと実感させられる」"

[[dialogue]]
speaker = "ヘレナ"
# 「さあ、このまま少し、歩いてみようではないか」
line = "「さあ、このまま少し、歩いてみようではないか」"

[[dialogue]]
speaker = "unk"
# そのままヘレナちゃんの手を引きながら、校舎内を歩いていると――
line = "そのままヘレナちゃんの手を引きながら、校舎内を歩いていると――"

[[dialogue]]
speaker = "ヘレナ"
# 「……♪」
line = "「……♪」"

[[dialogue]]
speaker = "unk"
# ふと、ヘレナちゃんが俺の腕を組むように身を寄せてきて、ドキッとしてしまう。
line = "ふと、ヘレナちゃんが俺の腕を組むように身を寄せてきて、ドキッとしてしまう。"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、驚かせてしまったか。気分が高揚して、つい、な。……嫌だったか？」
line = "「ふふっ、驚かせてしまったか。気分が高揚して、つい、な。……嫌だったか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「――嫌でないのなら、よかった。なに、良い匂いがしてドキドキする？」
line = "「――嫌でないのなら、よかった。なに、良い匂いがしてドキドキする？」"

[[dialogue]]
speaker = "ヘレナ"
# 「お香を炊くのが趣味の１つでな。匂いも趣味が合うようで、嬉しいぞ」
line = "「お香を炊くのが趣味の１つでな。匂いも趣味が合うようで、嬉しいぞ」"

[[dialogue]]
speaker = "ヘレナ"
# 「魔王よ、もう１つワガママを言ってもよいか？」
line = "「魔王よ、もう１つワガママを言ってもよいか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「手の繋ぎ方を変えてみたいのだが、よいか？　恋人繋ぎというのがあるであろう？」
line = "「手の繋ぎ方を変えてみたいのだが、よいか？　恋人繋ぎというのがあるであろう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「どんなものなのか、試してみたいのだ。……ダメか？」
line = "「どんなものなのか、試してみたいのだ。……ダメか？」"

[[dialogue]]
speaker = "unk"
# 俺はそれを了承して、ヘレナちゃんと指を絡めて、繋ぎ直す。
line = "俺はそれを了承して、ヘレナちゃんと指を絡めて、繋ぎ直す。"

[[dialogue]]
speaker = "ヘレナ"
# 「――んっ……<emoji=heart04>　これは、なるほど。普通に繋ぐのとは全然違うな」
line = "「――んっ……<emoji=heart04>　これは、なるほど。普通に繋ぐのとは全然違うな」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ……九浄ヘレナとあろう者が、手汗をかいてしまっている」
line = "「ふふっ……九浄ヘレナとあろう者が、手汗をかいてしまっている」"

[[dialogue]]
speaker = "ヘレナ"
# 「これが男女の仲を深めるということか。悪くないが……」
line = "「これが男女の仲を深めるということか。悪くないが……」"

[[dialogue]]
speaker = "unk"
# そこで彼女は、パッと手を離した。
line = "そこで彼女は、パッと手を離した。"

[[dialogue]]
speaker = "ヘレナ"
# 「しかし、学生相手に少々やり過ぎた。頭を冷やすとしよう」
line = "「しかし、学生相手に少々やり過ぎた。頭を冷やすとしよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふぅ……調子に乗ってすまなかったな、魔王よ。貴殿といると、つい己の立場を忘れてしまいがちになる」
line = "「ふぅ……調子に乗ってすまなかったな、魔王よ。貴殿といると、つい己の立場を忘れてしまいがちになる」"

[[dialogue]]
speaker = "ヘレナ"
# 「……最近、私も貴殿と同じくらいの年で学生だったなら、と思うことがあるよ」
line = "「……最近、私も貴殿と同じくらいの年で学生だったなら、と思うことがあるよ」"

[[dialogue]]
speaker = "ヘレナ"
# 「まあ、青春とは得てして、こうやって後になってから羨み、望むものなのかもしれぬが……」
line = "「まあ、青春とは得てして、こうやって後になってから羨み、望むものなのかもしれぬが……」"

[[dialogue]]
speaker = "unk"
# これも青春じゃない？
line = "これも青春じゃない？"

[[dialogue]]
speaker = "ヘレナ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# 俺はヘレナちゃんと出会ってから、楽しいと感じている。最初は、九浄家のご当主様だし、年上の女の人だしと、確かに距離を感じていたけど……今は――
line = "俺はヘレナちゃんと出会ってから、楽しいと感じている。最初は、九浄家のご当主様だし、年上の女の人だしと、確かに距離を感じていたけど……今は――"

[[dialogue]]
speaker = "unk"
# 女の人だって意識してるし……
line = "女の人だって意識してるし……"

[[dialogue]]
speaker = "unk"
# 「だから、その……」と言いかけたところで、俺の唇にそっと、彼女の人差し指が触れた。
line = "「だから、その……」と言いかけたところで、俺の唇にそっと、彼女の人差し指が触れた。"

[[dialogue]]
speaker = "ヘレナ"
# 「……今日のところは、そこまでにしておくがよい」
line = "「……今日のところは、そこまでにしておくがよい」"

[[dialogue]]
speaker = "unk"
# 暗くてはっきりとはわからないが、ヘレナちゃんの顔を見ると、赤くなっているような気がして――
line = "暗くてはっきりとはわからないが、ヘレナちゃんの顔を見ると、赤くなっているような気がして――"

[[dialogue]]
speaker = "unk"
# もしかして、ヘレナちゃん――
line = "もしかして、ヘレナちゃん――"

[[dialogue]]
speaker = "ヘレナ"
# 「それ以上、言うでない」
line = "「それ以上、言うでない」"

[[dialogue]]
speaker = "ヘレナ"
# 「……誰にでも、初心なことはあるであろう？」
line = "「……誰にでも、初心なことはあるであろう？」"

[[dialogue]]
speaker = "unk"
# 俺は思わず、吹き出してしまう。
line = "俺は思わず、吹き出してしまう。"

[[dialogue]]
speaker = "ヘレナ"
# 「なっ……！　こら！　貴殿、なにを笑っているのだ！　女性相手に失礼だぞ！？」
line = "「なっ……！　こら！　貴殿、なにを笑っているのだ！　女性相手に失礼だぞ！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「笑うでない！　私だって怒るんだぞ、魔王……！？」
line = "「笑うでない！　私だって怒るんだぞ、魔王……！？」"

[[dialogue]]
speaker = "unk"
# そう言って、普通の女の子みたいに恥ずかしがるヘレナちゃんを、やっぱり可愛いと思ってしまうのだった――
line = "そう言って、普通の女の子みたいに恥ずかしがるヘレナちゃんを、やっぱり可愛いと思ってしまうのだった――"
