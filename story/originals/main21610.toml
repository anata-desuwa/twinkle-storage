[[dialogue]]
speaker = "unk"
# 第１０話,季節外れの転校生,B
line = "第１０話,季節外れの転校生,B"

[[dialogue]]
speaker = "unk"
# 【Vega】
line = "【Vega】"

[[dialogue]]
speaker = "unk"
# 校舎に近づく道すがら、いつものルーティンを行う。
line = "校舎に近づく道すがら、いつものルーティンを行う。"

[[dialogue]]
speaker = "unk"
# 転入してきて２週間ほど──慣れてきてからが一番ボロが出るものだ。身元がバレないように、しっかりしないと。
line = "転入してきて２週間ほど──慣れてきてからが一番ボロが出るものだ。身元がバレないように、しっかりしないと。"

[[dialogue]]
speaker = "unk"
# 何度も何度も頭の中で『例の名前』を反芻し、自分の本当の名前を上書きしていく。
line = "何度も何度も頭の中で『例の名前』を反芻し、自分の本当の名前を上書きしていく。"

[[dialogue]]
speaker = "メルエル"
# 「あっ、おはよう！」
line = "「あっ、おはよう！」"

[[dialogue]]
speaker = "？？？"
# 「姫咲さん、おはよう」
line = "「姫咲さん、おはよう」"

[[dialogue]]
speaker = "メルエル"
# 「──<ruby=ひのみや>緋宮</ruby>くん！」
line = "「──<ruby>緋宮<rt>ひのみや</rt></ruby>くん！」"

[[dialogue]]
speaker = "unk"
# 『緋宮クロト』──それが俺の、<b>偽名</b>だ。
line = "『緋宮クロト』──それが俺の、<b>偽名</b>だ。"

[[dialogue]]
speaker = "クロト"
# 「ふぁぁああ……」
line = "「ふぁぁああ……」"

[[dialogue]]
speaker = "メルエル"
# 「わ。おっきい欠伸だね。夜更かしでもしたの？」
line = "「わ。おっきい欠伸だね。夜更かしでもしたの？」"

[[dialogue]]
speaker = "クロト"
# 「そうなんだよ、遅くまでゲームしててさ」
line = "「そうなんだよ、遅くまでゲームしててさ」"

[[dialogue]]
speaker = "unk"
# ……本当は母さんに『最近たるんでる』って叱られて、戦闘訓練でシゴかれてたんだけどな。
line = "……本当は母さんに『最近たるんでる』って叱られて、戦闘訓練でシゴかれてたんだけどな。"

[[dialogue]]
speaker = "メルエル"
# 「そういえば緋宮くん。私の呼び方のことなんだけど……」
line = "「そういえば緋宮くん。私の呼び方のことなんだけど……」"

[[dialogue]]
speaker = "メルエル"
# 「この前言ったとおり、気軽に下の名前で呼んで欲しいなぁ～、なぁんて」
line = "「この前言ったとおり、気軽に下の名前で呼んで欲しいなぁ～、なぁんて」"

[[dialogue]]
speaker = "クロト"
# 「いや……急に親しげに呼んだら、周りに誤解されちゃいそうだしね」
line = "「いや……急に親しげに呼んだら、周りに誤解されちゃいそうだしね」"

[[dialogue]]
speaker = "メルエル"
# 「わ、私は別に！　……特に誤解ってわけでも、ないし……私も、クロトくんって呼んでみたかったなぁ～、とか……」
line = "「わ、私は別に！　……特に誤解ってわけでも、ないし……私も、クロトくんって呼んでみたかったなぁ～、とか……」"

[[dialogue]]
speaker = "クロト"
# 「いやいや。天界の魔王の血統──お姫様との仲が誤解されたら、俺が聖庭園から怒られちゃうよ」
line = "「いやいや。天界の魔王の血統──お姫様との仲が誤解されたら、俺が聖庭園から怒られちゃうよ」"

[[dialogue]]
speaker = "メルエル"
# 「っ！？　こ、声が大きいってば……緋宮くん！」
line = "「っ！？　こ、声が大きいってば……緋宮くん！」"

[[dialogue]]
speaker = "unk"
# 彼女の名前は、姫咲メルエル──２週間前に転校してきた俺の、隣の席になったのが彼女だった。
line = "彼女の名前は、姫咲メルエル──２週間前に転校してきた俺の、隣の席になったのが彼女だった。"

[[dialogue]]
speaker = "unk"
# メルエルは、表向きは天界からの留学生ということになっているが──その正体は、魔王の血を引くリガルタ老の実の娘。つまり聖庭園のトップだ。
line = "メルエルは、表向きは天界からの留学生ということになっているが──その正体は、魔王の血を引くリガルタ老の実の娘。つまり聖庭園のトップだ。"

[[dialogue]]
speaker = "unk"
# 先日、市国内に現れたアステラ攻略の際、俺とメルエルだけが取り残されるトラブルがあって……
line = "先日、市国内に現れたアステラ攻略の際、俺とメルエルだけが取り残されるトラブルがあって……"

[[dialogue]]
speaker = "unk"
# その時に助け合ったりしているうちに仲良くなって、メルエルが己の出自について口を滑らせた結果、秘密を共有する仲になってしまったのだ。
line = "その時に助け合ったりしているうちに仲良くなって、メルエルが己の出自について口を滑らせた結果、秘密を共有する仲になってしまったのだ。"

[[dialogue]]
speaker = "クロト"
# 「誰も聞いてないから大丈夫だよ──っと。悪い、星徒会長たちと模擬戦の約束があったんだった」
line = "「誰も聞いてないから大丈夫だよ──っと。悪い、星徒会長たちと模擬戦の約束があったんだった」"

[[dialogue]]
speaker = "メルエル"
# 「えっ、そうなんだ。あのぉ……私も、見に行ってもいいかな？」
line = "「えっ、そうなんだ。あのぉ……私も、見に行ってもいいかな？」"

[[dialogue]]
speaker = "クロト"
# 「……もちろん。応援が多い方が燃えるたちだよ、俺」
line = "「……もちろん。応援が多い方が燃えるたちだよ、俺」"

[[dialogue]]
speaker = "unk"
# 転校した当初は目立ってなかったんだけど……先日のアステラ駆逐の件で『あいつは意外とやるらしい』なんて噂が流れてしまって。
line = "転校した当初は目立ってなかったんだけど……先日のアステラ駆逐の件で『あいつは意外とやるらしい』なんて噂が流れてしまって。"

[[dialogue]]
speaker = "unk"
# 新星学園の星徒会から、手合わせを願いたいとの連絡を受けてしまったのだった──
line = "新星学園の星徒会から、手合わせを願いたいとの連絡を受けてしまったのだった──"

[[dialogue]]
speaker = "梨緒"
# 「ま、負けた……転校してきたばかりの相手に……」
line = "「ま、負けた……転校してきたばかりの相手に……」"

[[dialogue]]
speaker = "梨緒"
# 「やはり私は、充電を繰り返して半日も持たなくなったＤＩＳＣのバッテリーよりも価値のない存在なんだ……」
line = "「やはり私は、充電を繰り返して半日も持たなくなったＤＩＳＣのバッテリーよりも価値のない存在なんだ……」"

[[dialogue]]
speaker = "クロト"
# 「……副会長って、いつもこんな感じなのか？」
line = "「……副会長って、いつもこんな感じなのか？」"

[[dialogue]]
speaker = "レナーテ"
# 「すまないね、コレは無視してくれていいから」
line = "「すまないね、コレは無視してくれていいから」"

[[dialogue]]
speaker = "レナーテ"
# 「季節外れの転校生とは聞いていたけれど……緋宮くん。君は本当に最近、星力に目覚めたばかりなのかい？」
line = "「季節外れの転校生とは聞いていたけれど……緋宮くん。君は本当に最近、星力に目覚めたばかりなのかい？」"

[[dialogue]]
speaker = "クロト"
# 「ええ。流石に星徒会長には敵いませんでしたね……俺もまだまだです」
line = "「ええ。流石に星徒会長には敵いませんでしたね……俺もまだまだです」"

[[dialogue]]
speaker = "レナーテ"
# 「アガサに勝つだけでも大したものだよ。これは期待が持てそうだ」
line = "「アガサに勝つだけでも大したものだよ。これは期待が持てそうだ」"

[[dialogue]]
speaker = "レナーテ"
# 「君さえよければ、星徒会に勧誘したいところだが──」
line = "「君さえよければ、星徒会に勧誘したいところだが──」"

[[dialogue]]
speaker = "クロト"
# 「……すみません。色々と忙しいもので」
line = "「……すみません。色々と忙しいもので」"

[[dialogue]]
speaker = "レナーテ"
# 「そうか。だが今後、今よりもっと強くなるようなら、会長権限で無理にでも入ってもらうかな？　ふふっ、覚悟だけはしておいてくれ」
line = "「そうか。だが今後、今よりもっと強くなるようなら、会長権限で無理にでも入ってもらうかな？　ふふっ、覚悟だけはしておいてくれ」"

[[dialogue]]
speaker = "unk"
# ……参ったな。かなり実力は抑えたつもり、だったんだけど。
line = "……参ったな。かなり実力は抑えたつもり、だったんだけど。"

[[dialogue]]
speaker = "メルエル"
# 「緋宮くんってやっぱりすごいね……！　お疲れ様！　かっこよかったよ！」
line = "「緋宮くんってやっぱりすごいね……！　お疲れ様！　かっこよかったよ！」"

[[dialogue]]
speaker = "メルエル"
# 「レナーテ会長とあれだけ拮抗できるだなんて……見惚れちゃった！！」
line = "「レナーテ会長とあれだけ拮抗できるだなんて……見惚れちゃった！！」"

[[dialogue]]
speaker = "unk"
# メルエルだけでなく、いつの間にかトレーニング施設内には、新星の生徒たちがたくさん。
line = "メルエルだけでなく、いつの間にかトレーニング施設内には、新星の生徒たちがたくさん。"

[[dialogue]]
speaker = "unk"
# ……本当にまずいな。目立ちすぎだ。
line = "……本当にまずいな。目立ちすぎだ。"

[[dialogue]]
speaker = "リーリア"
# 「…………っ♪」
line = "「…………っ♪」"

[[dialogue]]
speaker = "unk"
# ……あいつめ。
line = "……あいつめ。"

[[dialogue]]
speaker = "クロト"
# 「それじゃあ会長、俺はこのあたりで。昼食に行きます」
line = "「それじゃあ会長、俺はこのあたりで。昼食に行きます」"

[[dialogue]]
speaker = "レナーテ"
# 「ああ。わざわざ呼び出してすまなかったね」
line = "「ああ。わざわざ呼び出してすまなかったね」"

[[dialogue]]
speaker = "メルエル"
# 「あ、そ、そのっ。よかったら緋宮くん、一緒にお昼……」
line = "「あ、そ、そのっ。よかったら緋宮くん、一緒にお昼……」"

[[dialogue]]
speaker = "クロト"
# 「ごめん！　先約があるんだ……次は俺の方から誘うよ」
line = "「ごめん！　先約があるんだ……次は俺の方から誘うよ」"

[[dialogue]]
speaker = "メルエル"
# 「あ、う、うんっ……わかった！　また今度ねっ」
line = "「あ、う、うんっ……わかった！　また今度ねっ」"

[[dialogue]]
speaker = "メルエル"
# 「やっぱりライバル、多いよね……私も頑張らないと！」
line = "「やっぱりライバル、多いよね……私も頑張らないと！」"

[[dialogue]]
speaker = "リーリア"
# 「<b>兄さん</b>！　こっちこっち～♪」
line = "「<b>兄さん</b>！　こっちこっち～♪」"

[[dialogue]]
speaker = "クロト"
# 「……学園内では先輩って呼べよ。あんまり目立つな」
line = "「……学園内では先輩って呼べよ。あんまり目立つな」"

[[dialogue]]
speaker = "リーリア"
# 「えー？　でも一応、魔界の同郷出身ってことにしてるじゃないですかー♪　スパイ同士、仲良くしましょうよー」
line = "「えー？　でも一応、魔界の同郷出身ってことにしてるじゃないですかー♪　スパイ同士、仲良くしましょうよー」"

[[dialogue]]
speaker = "クロト"
# 「……はぁ。ま、目立つなって言っても今さらか。胸に詰め物してる時点で目立ってるもんな」
line = "「……はぁ。ま、目立つなって言っても今さらか。胸に詰め物してる時点で目立ってるもんな」"

[[dialogue]]
speaker = "リーリア"
# 「はぁ～！？　これはこれで使えるんですけど！？　情報を引き出す上で武器になるんですけどー！？」
line = "「はぁ～！？　これはこれで使えるんですけど！？　情報を引き出す上で武器になるんですけどー！？」"

[[dialogue]]
speaker = "クロト"
# 「情報ねぇ。何を集められてるんだ？」
line = "「情報ねぇ。何を集められてるんだ？」"

[[dialogue]]
speaker = "リーリア"
# 「そうですねぇ。例えばクラスメイトのお姫様に、兄さんがめーっちゃアプローチされてることとか？」
line = "「そうですねぇ。例えばクラスメイトのお姫様に、兄さんがめーっちゃアプローチされてることとか？」"

[[dialogue]]
speaker = "リーリア"
# 「リノさんが知ったらどう思いますかねえ、これ♪」
line = "「リノさんが知ったらどう思いますかねえ、これ♪」"

[[dialogue]]
speaker = "クロト"
# 「……お前、それは反則だろ」
line = "「……お前、それは反則だろ」"

[[dialogue]]
speaker = "リーリア"
# 「あ、ついでにこわ～いお母様にも、スパイの癖に目立ちまくってるって報告しちゃいましょうか♪」
line = "「あ、ついでにこわ～いお母様にも、スパイの癖に目立ちまくってるって報告しちゃいましょうか♪」"

[[dialogue]]
speaker = "クロト"
# 「……リーリア、何が食べたい？　兄さんが何でもご馳走してあげよう。おかわりもいいぞ」
line = "「……リーリア、何が食べたい？　兄さんが何でもご馳走してあげよう。おかわりもいいぞ」"

[[dialogue]]
speaker = "リーリア"
# 「やったぁ♪　兄さん大好き～<emoji=heart04>」
line = "「やったぁ♪　兄さん大好き～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# こうして甘え上手な妹にさんざんにたかられ、そのまま昼食となったのだが──
line = "こうして甘え上手な妹にさんざんにたかられ、そのまま昼食となったのだが──"

[[dialogue]]
speaker = "リーリア"
# 「それでどうでした？　レナーテ会長たちとの模擬戦は」
line = "「それでどうでした？　レナーテ会長たちとの模擬戦は」"

[[dialogue]]
speaker = "クロト"
# 「星騎士としての実力は確かだけど、あれじゃまるで足りないな」
line = "「星騎士としての実力は確かだけど、あれじゃまるで足りないな」"

[[dialogue]]
speaker = "クロト"
# 「わざと負けるのも大変だった。全力ならたぶん１分もかからないと思う」
line = "「わざと負けるのも大変だった。全力ならたぶん１分もかからないと思う」"

[[dialogue]]
speaker = "リーリア"
# 「流石は、あのこわ～いお母様が鍛え上げた戦闘マシーンですね。学園トップの星騎士でも、そこまでの開きが……なら、やっぱり？」
line = "「流石は、あのこわ～いお母様が鍛え上げた戦闘マシーンですね。学園トップの星騎士でも、そこまでの開きが……なら、やっぱり？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。魔女の森で予言されている『使徒』──そのレベルの敵が相手となると、俺たちの足を引っ張るだろう」
line = "「ああ。魔女の森で予言されている『使徒』──そのレベルの敵が相手となると、俺たちの足を引っ張るだろう」"

[[dialogue]]
speaker = "クロト"
# 「当初の予定どおり、学園の星騎士は当てにしない。使徒が現れた際は、俺たち『ネビュラ』が迎撃にあたる」
line = "「当初の予定どおり、学園の星騎士は当てにしない。使徒が現れた際は、俺たち『ネビュラ』が迎撃にあたる」"

[[dialogue]]
speaker = "リーリア"
# 「はーい。じゃあ聖庭園のお姫様はどうです？　魔王の血統なら、何かしらのコードを持っているはずですけど」
line = "「はーい。じゃあ聖庭園のお姫様はどうです？　魔王の血統なら、何かしらのコードを持っているはずですけど」"

[[dialogue]]
speaker = "クロト"
# 「……わからない。そこまで踏み込んだ話は、まだしてない」
line = "「……わからない。そこまで踏み込んだ話は、まだしてない」"

[[dialogue]]
speaker = "リーリア"
# 「ちゃっちゃと<b>自分がラクシスだってバラして</b>、協力してもらえばよくないですか？」
line = "「ちゃっちゃと<b>自分がラクシスだってバラして</b>、協力してもらえばよくないですか？」"

[[dialogue]]
speaker = "クロト"
# 「ダメだ。教えればあの子も使徒の戦いに巻き込むことになる……弱すぎるんだよ、あの子。きっと死ぬぞ」
line = "「ダメだ。教えればあの子も使徒の戦いに巻き込むことになる……弱すぎるんだよ、あの子。きっと死ぬぞ」"

[[dialogue]]
speaker = "リーリア"
# 「…………むぅ」
line = "「…………むぅ」"

[[dialogue]]
speaker = "クロト"
# 「『ヴォイド・プラン』成功の妨げになる要素は排除する……何が不満だ？」
line = "「『ヴォイド・プラン』成功の妨げになる要素は排除する……何が不満だ？」"

[[dialogue]]
speaker = "リーリア"
# 「……不満だらけですよ。このままだと、兄さんとは確実にお別れですからね」
line = "「……不満だらけですよ。このままだと、兄さんとは確実にお別れですからね」"

[[dialogue]]
speaker = "リーリア"
# 「兄さんが死なないように、いろんなファクターを増やしたいと思う妹心も、もう少し察してくれません？」
line = "「兄さんが死なないように、いろんなファクターを増やしたいと思う妹心も、もう少し察してくれません？」"

[[dialogue]]
speaker = "unk"
# ……そう言うなよ。俺が死ぬことで、この世界は救われるはずなんだから。
line = "……そう言うなよ。俺が死ぬことで、この世界は救われるはずなんだから。"

[[dialogue]]
speaker = "unk"
# 俺の本当の名前は、ラクシス。
line = "俺の本当の名前は、ラクシス。"

[[dialogue]]
speaker = "unk"
# かつてクルセイダースを組織し、リクリエを１度防衛した魔王だ。
line = "かつてクルセイダースを組織し、リクリエを１度防衛した魔王だ。"

[[dialogue]]
speaker = "unk"
# ３０００年前、俺の肉体は数多の病に汚染されていた。どんな霊術も受け付けず、ただ死を待つのみとなってしまった。
line = "３０００年前、俺の肉体は数多の病に汚染されていた。どんな霊術も受け付けず、ただ死を待つのみとなってしまった。"

[[dialogue]]
speaker = "unk"
# だから俺は、トリュファイナに<ruby=レナトゥス>封理再誕</ruby>──命を巻き戻すことによる『生まれ直し』を施してもらった。
line = "だから俺は、トリュファイナに<ruby>封理再誕<rt>レナトゥス</rt></ruby>──命を巻き戻すことによる『生まれ直し』を施してもらった。"

[[dialogue]]
speaker = "unk"
# 世界樹の根へと封印された俺は、永い時の中で緩やかにその汚染を浄化してもらい……
line = "世界樹の根へと封印された俺は、永い時の中で緩やかにその汚染を浄化してもらい……"

[[dialogue]]
speaker = "セドナ"
# 「…………見つけたぞ。お前が、先代の封印した魔王だな？」
line = "「…………見つけたぞ。お前が、先代の封印した魔王だな？」"

[[dialogue]]
speaker = "unk"
