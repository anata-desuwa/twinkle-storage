line = "（──２人か。３人か……いや。うまくやれば、１０人は道連れにできる……）"

[[dialogue]]
speaker = "unk"
# 群衆の中に飛び込み、能天気な馬鹿共を滅多刺しにしてやろうと、レイトは歩を進めた……
