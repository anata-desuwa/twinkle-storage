[[dialogue]]
speaker = "クロト"
# 「だけどここは敵地。チナとの戦いで疲弊しているし、身を隠して体を休められる場所も必要だ」
line = "「だけどここは敵地。チナとの戦いで疲弊しているし、身を隠して体を休められる場所も必要だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「隠れるのはいいけど、はぐれたみんなが心配ね」
line = "「隠れるのはいいけど、はぐれたみんなが心配ね」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺たちが身の安全を確保できても、その間にみんながやられるのは看過できない」
line = "「ああ。俺たちが身の安全を確保できても、その間にみんながやられるのは看過できない」"

[[dialogue]]
speaker = "クロト"
# 「できるだけ目立たないようにしながら、みんなを探し──」
line = "「できるだけ目立たないようにしながら、みんなを探し──」"

[[dialogue]]
speaker = "アナウンス"
# 『緊急警報。緊急警報。新市街の住民の方は、屋内に避難してください』
line = "『緊急警報。緊急警報。新市街の住民の方は、屋内に避難してください』"

[[dialogue]]
speaker = "アナウンス"
# 『繰り返します。新市街周辺の方は、至急避難してください』
line = "『繰り返します。新市街周辺の方は、至急避難してください』"

[[dialogue]]
speaker = "unk"
# アナウンスが放送されると、周囲の人々は即座に反応して屋内に入っていく。
line = "アナウンスが放送されると、周囲の人々は即座に反応して屋内に入っていく。"

[[dialogue]]
speaker = "unk"
# 混乱を見せたり悲鳴を上げたりすることもなく、避難の手本のような、まるで訓練されたような動きだ。
line = "混乱を見せたり悲鳴を上げたりすることもなく、避難の手本のような、まるで訓練されたような動きだ。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルル……！」
line = "「ブルル……！」"

[[dialogue]]
speaker = "クロト"
# 「極星従騎……！」
line = "「極星従騎……！」"

[[dialogue]]
speaker = "unk"
# 空から舞い降りた極星従騎は、真っ直ぐにこちらを向かって突進してくる。
line = "空から舞い降りた極星従騎は、真っ直ぐにこちらを向かって突進してくる。"

[[dialogue]]
speaker = "クロト"
# 「もう見つかったか……こうなったら逃げても隠れても無駄だろうな。迎え撃つぞ！」
line = "「もう見つかったか……こうなったら逃げても隠れても無駄だろうな。迎え撃つぞ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、売られたケンカは買うわよ！」
line = "「ええ、売られたケンカは買うわよ！」"
