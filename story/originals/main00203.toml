[[dialogue]]
speaker = "unk"
# 第５話,《境界》のマグダレナ,B
line = "第５話,《境界》のマグダレナ,B"

[[dialogue]]
speaker = "ユウリ"
# 「……どうだ！？」
line = "「……どうだ！？」"

[[dialogue]]
speaker = "ソフィア"
# 「輝きが……！」
line = "「輝きが……！」"

[[dialogue]]
speaker = "マグダレナ"
# 「……ふぅ。ようやく自由になりました」
line = "「……ふぅ。ようやく自由になりました」"

[[dialogue]]
speaker = "unk"
# 輝きが収束すると、堕天使であった存在は一柱の天使となって再臨した。
line = "輝きが収束すると、堕天使であった存在は一柱の天使となって再臨した。"

[[dialogue]]
speaker = "マグダレナ"
# 「ありがとうございました──<ruby=スターナイト>星騎士</ruby>の皆さん。私はどうやら瘴気に汚染され、正気を失っていたようです」
line = "「ありがとうございました──<ruby>星騎士<rt>スターナイト</rt></ruby>の皆さん。私はどうやら瘴気に汚染され、正気を失っていたようです」"

[[dialogue]]
speaker = "フィオナ"
# 「お礼には及びません。ご無事で済んだのなら何よりです」
line = "「お礼には及びません。ご無事で済んだのなら何よりです」"

[[dialogue]]
speaker = "セーラ"
# 「ま、これがうちらの務めだしね～」
line = "「ま、これがうちらの務めだしね～」"

[[dialogue]]
speaker = "ルリエル"
# 「（……！　……！　瘴気が！　正気って！）」
line = "「（……！　……！　瘴気が！　正気って！）」"

[[dialogue]]
speaker = "ソフィア"
# 「（みんな気づいてるけど言わないだけだから）」
line = "「（みんな気づいてるけど言わないだけだから）」"

[[dialogue]]
speaker = "unk"
# 堕天使──であった天使は、改めて彼女たちに名を名乗った。
line = "堕天使──であった天使は、改めて彼女たちに名を名乗った。"

[[dialogue]]
speaker = "マグダレナ"
# 「私は守護天使──《境界》のマグダレナ」
line = "「私は守護天使──《境界》のマグダレナ」"

[[dialogue]]
speaker = "マグダレナ"
# 「女神に創造されし六柱が一──領域を司る存在」
line = "「女神に創造されし六柱が一──領域を司る存在」"

[[dialogue]]
speaker = "ルリエル"
# 「ほ、ほえー……守護天使さんというと、とてつもなくお偉い存在であったような……！」
line = "「ほ、ほえー……守護天使さんというと、とてつもなくお偉い存在であったような……！」"

[[dialogue]]
speaker = "ユウリ"
# 「ただ者じゃねーな。明らかに」
line = "「ただ者じゃねーな。明らかに」"

[[dialogue]]
speaker = "マグダレナ"
# 「<ruby=へいぜい>平生</ruby>であれば天界にも姿を現さず、陰ながら摂理の守護に務めております」
line = "「<ruby>平生<rt>へいぜい</rt></ruby>であれば天界にも姿を現さず、陰ながら摂理の守護に務めております」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかし、こうして守護天使の私まで堕ちることになるとは……やはり此度のリクリエ、普通ではありませんね」
line = "「しかし、こうして守護天使の私まで堕ちることになるとは……やはり此度のリクリエ、普通ではありませんね」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャ！　堕天使のような見た目だったニャン」
line = "「ニャニャ！　堕天使のような見た目だったニャン」"

[[dialogue]]
speaker = "フィオナ"
# 「此度の──という表現も、気にかかりますね」
line = "「此度の──という表現も、気にかかりますね」"

[[dialogue]]
speaker = "セーラ"
# 「多分、<b>前回</b>に比べてってことじゃないカナ？　確か三千年前はリクリエが来そうになったのを撃退したんっしょ？」
line = "「多分、<b>前回</b>に比べてってことじゃないカナ？　確か三千年前はリクリエが来そうになったのを撃退したんっしょ？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ……良い勘ですね。その通りです」
line = "「ふふ……良い勘ですね。その通りです」"

[[dialogue]]
speaker = "ユウリ"
# 「その時代から生きてる存在──ってことかよ……！」
line = "「その時代から生きてる存在──ってことかよ……！」"

[[dialogue]]
speaker = "unk"
# 守護天使の意味はわからずとも、マグダレナが高位な存在にあるというのはその場の誰にも感じ取れた。
line = "守護天使の意味はわからずとも、マグダレナが高位な存在にあるというのはその場の誰にも感じ取れた。"

[[dialogue]]
speaker = "unk"
# しかし……
line = "しかし……"

[[dialogue]]
speaker = "ユウリ"
# 「っと……いいとこなのによ。アステラが消えかかってるぜ」
line = "「っと……いいとこなのによ。アステラが消えかかってるぜ」"

[[dialogue]]
speaker = "セーラ"
# 「ま、汚染を解放したんだから当然なんだけど～」
line = "「ま、汚染を解放したんだから当然なんだけど～」"

[[dialogue]]
speaker = "マグダレナ"
# 「この場でもう少し語らいたいところですが……今の私も仮初めの身。あまり時間はなさそうですね」
line = "「この場でもう少し語らいたいところですが……今の私も仮初めの身。あまり時間はなさそうですね」"

[[dialogue]]
speaker = "マグダレナ"
# 「星見さま」
line = "「星見さま」"

[[dialogue]]
speaker = "フィオナ"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "マグダレナ"
# 「貴女がここに参られたこと──それが私の幸運です。ゆえに……」
line = "「貴女がここに参られたこと──それが私の幸運です。ゆえに……」"

[[dialogue]]
speaker = "unk"
# マグダレナはフィオナただ一人を呼び止めた。
line = "マグダレナはフィオナただ一人を呼び止めた。"

[[dialogue]]
speaker = "unk"
# それから、白光に包まれた一枚の小さな紙を彼女へと託す。
line = "それから、白光に包まれた一枚の小さな紙を彼女へと託す。"

[[dialogue]]
speaker = "フィオナ"
# 「これは……？」
line = "「これは……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「これこそ主の鍵──<ruby=しおり>栞</ruby>です。これを──ミコに──渡して──それか……ら………」
line = "「これこそ主の鍵──<ruby>栞<rt>しおり</rt></ruby>です。これを──ミコに──渡して──それか……ら………」"

[[dialogue]]
speaker = "unk"
# そのアイテムと共に言い残すと、マグダレナの姿は光の粒子となって消えた。
line = "そのアイテムと共に言い残すと、マグダレナの姿は光の粒子となって消えた。"

[[dialogue]]
speaker = "ソフィア"
# 「消えてしまいました……」
line = "「消えてしまいました……」"

[[dialogue]]
speaker = "ユウリ"
# 「これで良かったのか？」
line = "「これで良かったのか？」"

[[dialogue]]
speaker = "セーラ"
# 「満足そうだったし、いんじゃない？」
line = "「満足そうだったし、いんじゃない？」"

[[dialogue]]
speaker = "ルリエル"
# 「そうですねえ……消えたというより、どこかへ帰ったように感じました！」
line = "「そうですねえ……消えたというより、どこかへ帰ったように感じました！」"

[[dialogue]]
speaker = "unk"
# そして、深奥に座していた堕天使──だった存在──が消滅したことによりアステライトも崩壊を迎える。
line = "そして、深奥に座していた堕天使──だった存在──が消滅したことによりアステライトも崩壊を迎える。"

[[dialogue]]
speaker = "unk"
# 残された謎は多いものの、成果としては上々だった。
line = "残された謎は多いものの、成果としては上々だった。"

[[dialogue]]
speaker = "フィオナ"
# 「ひとまず……これで任務は完了ですね。みんなお疲れ様、街へ戻りましょう」
line = "「ひとまず……これで任務は完了ですね。みんなお疲れ様、街へ戻りましょう」"

[[dialogue]]
speaker = "ニャリオン"
# 「ミッションクリアーなのニャン！」
line = "「ミッションクリアーなのニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「みんな、ご苦労さま。おかげで被害も出なかったみたい」
line = "「みんな、ご苦労さま。おかげで被害も出なかったみたい」"

[[dialogue]]
speaker = "ルリエル"
# 「ふえぇ、大変でしたぁ。でもでもっ、これで街の平和が守られるなら、お安いことなのですっ」
line = "「ふえぇ、大変でしたぁ。でもでもっ、これで街の平和が守られるなら、お安いことなのですっ」"

[[dialogue]]
speaker = "ニャリオン"
# 「星見家がフィオナ嬢にかかればこの程度は朝飯前ニャン！　たとえ家来が犬サルキジでも余裕なのニャン！」
line = "「星見家がフィオナ嬢にかかればこの程度は朝飯前ニャン！　たとえ家来が犬サルキジでも余裕なのニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「誰がサルだ。オメーこそなんもしてねーだろ、アホ猫」
line = "「誰がサルだ。オメーこそなんもしてねーだろ、アホ猫」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャンにゃと！？」
line = "「ニャンにゃと！？」"

[[dialogue]]
speaker = "ソフィア"
# 「喧嘩ならよそでやってください、お２人」
line = "「喧嘩ならよそでやってください、お２人」"

[[dialogue]]
speaker = "セーラ"
# 「ま、無事に済んだんだからなんでもいいっしょ～♪」
line = "「ま、無事に済んだんだからなんでもいいっしょ～♪」"

[[dialogue]]
speaker = "unk"
# 変身を解いて制服に戻れば、彼女らもただの学生と変わらない。
line = "変身を解いて制服に戻れば、彼女らもただの学生と変わらない。"

[[dialogue]]
speaker = "unk"
# このまま今回の謎を語りつつ、帰路へつこうとしていたところ……
line = "このまま今回の謎を語りつつ、帰路へつこうとしていたところ……"

[[dialogue]]
speaker = "フィオナ"
# 「……あら」
line = "「……あら」"

[[dialogue]]
speaker = "unk"
# 彼らは、初めての対面を果たすことになった。
line = "彼らは、初めての対面を果たすことになった。"
