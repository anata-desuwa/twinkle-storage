[[dialogue]]
speaker = "unk"
# 第１２話,厄災の手,B
line = "第１２話,厄災の手,B"

[[dialogue]]
speaker = "unk"
# ディザスターハンドは俺たちを圧し潰さんと、上空からゆっくりと近づいてくる。
line = "ディザスターハンドは俺たちを圧し潰さんと、上空からゆっくりと近づいてくる。"

[[dialogue]]
speaker = "unk"
# 手からは破壊のエネルギーが迸っており、その余波だけで俺たちを絶命させるには十分だろう。
line = "手からは破壊のエネルギーが迸っており、その余波だけで俺たちを絶命させるには十分だろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「くっ……！　このままじゃ、あの手に潰される前に、木っ端ミジンコにされちゃうわ！」
line = "「くっ……！　このままじゃ、あの手に潰される前に、木っ端ミジンコにされちゃうわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「チェンジ・ノヴァフォーム！」
line = "「チェンジ・ノヴァフォーム！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「クロトたちは私が守るんだから！」
line = "「クロトたちは私が守るんだから！」"

[[dialogue]]
speaker = "フィオナ"
# 「私も行きます。──アルケインソーラーブレイズ！」
line = "「私も行きます。──アルケインソーラーブレイズ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「やらせません！」
line = "「やらせません！」"

[[dialogue]]
speaker = "unk"
# ノヴァフォームのヴィーナスと、魔王の力を解き放ったフィオナが障壁を生み出し、ディザスターハンドの衝撃波を弾き返す。
line = "ノヴァフォームのヴィーナスと、魔王の力を解き放ったフィオナが障壁を生み出し、ディザスターハンドの衝撃波を弾き返す。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ふふん、どんなもんよ！」
line = "「ふふん、どんなもんよ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「くっ……このプレッシャーは……！」
line = "「くっ……このプレッシャーは……！」"

[[dialogue]]
speaker = "unk"
# 今は何とか抑えられているが、ノヴァフォームも魔王フォームも消耗が激しい。
line = "今は何とか抑えられているが、ノヴァフォームも魔王フォームも消耗が激しい。"

[[dialogue]]
speaker = "unk"
# ディザスターハンドを押さえるとなれば、あと何秒持つか──
line = "ディザスターハンドを押さえるとなれば、あと何秒持つか──"

[[dialogue]]
speaker = "クロト"
# 「母さん、あとどのくらいかかりそう？」
line = "「母さん、あとどのくらいかかりそう？」"

[[dialogue]]
speaker = "リノ"
# 「１０分……いや、７分！」
line = "「１０分……いや、７分！」"

[[dialogue]]
speaker = "ナターシャ"
# 「いっそこのまま飛び込んじゃう？」
line = "「いっそこのまま飛び込んじゃう？」"

[[dialogue]]
speaker = "リノ"
# 「それはダメ！　ベガに出たりしたら二度と帰って来れなくなるわ！」
line = "「それはダメ！　ベガに出たりしたら二度と帰って来れなくなるわ！」"

[[dialogue]]
speaker = "ホルン"
# 「クルル！」
line = "「クルル！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルル！」
line = "「ブルル！」"

[[dialogue]]
speaker = "梨緒"
# 「極星従騎が……！　諸共に叩き潰すつもりか！」
line = "「極星従騎が……！　諸共に叩き潰すつもりか！」"

[[dialogue]]
speaker = "クロト"
# 「母さんとヴィーナス、フィオナを守るんだ！」
line = "「母さんとヴィーナス、フィオナを守るんだ！」"

[[dialogue]]
speaker = "unk"
# アルタイルへの道を繋ごうとしている母さんと、ディザスターハンドを止めている２人がやられれば、俺たちは全滅する。
line = "アルタイルへの道を繋ごうとしている母さんと、ディザスターハンドを止めている２人がやられれば、俺たちは全滅する。"

[[dialogue]]
speaker = "unk"
# ここは無理やりにでも凌ぐしかない……！
line = "ここは無理やりにでも凌ぐしかない……！"

[[dialogue]]
speaker = "アポロ（大人）"
# 「おおおっ！！」
line = "「おおおっ！！」"

[[dialogue]]
speaker = "梨緒"
# 「撃ち貫く！」
line = "「撃ち貫く！」"

[[dialogue]]
speaker = "ナターシャ"
# 「そこだよ」
line = "「そこだよ」"

[[dialogue]]
speaker = "エステル"
# 「私もお手伝いします……！」
line = "「私もお手伝いします……！」"

[[dialogue]]
speaker = "unk"
# 無防備な母さんたちを狙う極星従騎をみんなで食い止める。
line = "無防備な母さんたちを狙う極星従騎をみんなで食い止める。"

[[dialogue]]
speaker = "unk"
# だがいくらガーディアンを切り裂き、打ち砕いても、次から次へとなだれ込んでくる。
line = "だがいくらガーディアンを切り裂き、打ち砕いても、次から次へとなだれ込んでくる。"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒィン……！」
line = "「ヒィン……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "クロト"
# 「そうはさせない！　アビスインパクト！」
line = "「そうはさせない！　アビスインパクト！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……！」
line = "「ブルルル……！」"

[[dialogue]]
speaker = "unk"
# 闇を帯びた拳で、極星従騎の突進を相殺する。
line = "闇を帯びた拳で、極星従騎の突進を相殺する。"

[[dialogue]]
speaker = "unk"
# だが倒すには至らず、極星従騎が返す刀で剣を振るう。
line = "だが倒すには至らず、極星従騎が返す刀で剣を振るう。"

[[dialogue]]
speaker = "クロト"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "unk"
# 魔王の力を封印した今の俺では、極星従騎を撃破するのは容易ではない。
line = "魔王の力を封印した今の俺では、極星従騎を撃破するのは容易ではない。"

[[dialogue]]
speaker = "unk"
# このままでは押し切られ、ヴィーナスたちもやられてしまう。
line = "このままでは押し切られ、ヴィーナスたちもやられてしまう。"

[[dialogue]]
speaker = "クロト"
# （なら<ruby=リクリエ>厄災</ruby>の力を呼び起こす──！）
line = "（なら<ruby>厄災<rt>リクリエ</rt></ruby>の力を呼び起こす──！）"

[[dialogue]]
speaker = "unk"
# 俺の中の破滅の力を全て開放すれば、俺は呑まれてしまうだろう。
line = "俺の中の破滅の力を全て開放すれば、俺は呑まれてしまうだろう。"

[[dialogue]]
speaker = "unk"
# 激流のように溢れ出ようとする暴威、その一滴を拳に宿す。
line = "激流のように溢れ出ようとする暴威、その一滴を拳に宿す。"

[[dialogue]]
speaker = "クロト"
# 「デッドリークラスター！！」
line = "「デッドリークラスター！！」"

[[dialogue]]
speaker = "スレイプニル"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# <ruby=リクリエ>厄災</ruby>をまとった拳がガーディアンを貫き、剣ごと粉々に打ち砕いた。
line = "<ruby>厄災<rt>リクリエ</rt></ruby>をまとった拳がガーディアンを貫き、剣ごと粉々に打ち砕いた。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ありがとう、クロト！」
line = "「ありがとう、クロト！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「おばあちゃん、あと何分？」
line = "「おばあちゃん、あと何分？」"

[[dialogue]]
speaker = "リノ"
# 「ごめん、あと５分……！」
line = "「ごめん、あと５分……！」"

[[dialogue]]
speaker = "unk"
# 母さんが顔を歪めて空間の穴を調整している間もディザスターハンドは迫ってくる。
line = "母さんが顔を歪めて空間の穴を調整している間もディザスターハンドは迫ってくる。"

[[dialogue]]
speaker = "unk"
# 同じくルヴィネの配下のはずの極星従騎も、その力の奔流に巻き込まれて砕け散っていた。
line = "同じくルヴィネの配下のはずの極星従騎も、その力の奔流に巻き込まれて砕け散っていた。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「まるで星がそのまま落ちてくるような圧力……魔王フォームでも、潰されないだけで精一杯です……！」
line = "「まるで星がそのまま落ちてくるような圧力……魔王フォームでも、潰されないだけで精一杯です……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ぐっ……くぅぅっ……やらせないわよ……！」
line = "「ぐっ……くぅぅっ……やらせないわよ……！」"

[[dialogue]]
speaker = "unk"
# フィオナとヴィーナスが耐えてくれているが、２人の表情にも苦悶が現れていて、限界が近い。
line = "フィオナとヴィーナスが耐えてくれているが、２人の表情にも苦悶が現れていて、限界が近い。"

[[dialogue]]
speaker = "クロト"
# 「２人とも、あともう少しだけ耐えてくれ……！」
line = "「２人とも、あともう少しだけ耐えてくれ……！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「もちろんよ！　こんなところで死んでたまるもんですか！」
line = "「もちろんよ！　こんなところで死んでたまるもんですか！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「はい、私たちは元の世界に帰らないといけませんから！」
line = "「はい、私たちは元の世界に帰らないといけませんから！」"

[[dialogue]]
speaker = "ベアトリス"
# 「これをルヴィが……」
line = "「これをルヴィが……」"

[[dialogue]]
speaker = "unk"
# ディザスターハンドの暴威を目の当たりにして、呆然とするベアトリス。
line = "ディザスターハンドの暴威を目の当たりにして、呆然とするベアトリス。"

[[dialogue]]
speaker = "unk"
# ルヴィネはデネブの救世主で、ベアトリスの親友だった。
line = "ルヴィネはデネブの救世主で、ベアトリスの親友だった。"

[[dialogue]]
speaker = "梨緒"
# 「私も信じていたものが敵になったことがある」
line = "「私も信じていたものが敵になったことがある」"

[[dialogue]]
speaker = "梨緒"
# 「だけどルヴィネと話をするなら、ここで倒れるわけにはいかない。文句があるならルヴィネに直接ぶつけるんだ」
line = "「だけどルヴィネと話をするなら、ここで倒れるわけにはいかない。文句があるならルヴィネに直接ぶつけるんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん……！　ルヴィが女神様なんて、まだ信じられないけど……このままじゃ終われない……！」
line = "「うん……！　ルヴィが女神様なんて、まだ信じられないけど……このままじゃ終われない……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「クリムゾンカーニバル！」
line = "「クリムゾンカーニバル！」"

[[dialogue]]
speaker = "ホルン"
# 「クルルーーッ！？」
line = "「クルルーーッ！？」"

[[dialogue]]
speaker = "unk"
# ベアトリスの槍が赤い軌跡を描いて極星従騎を貫く。
line = "ベアトリスの槍が赤い軌跡を描いて極星従騎を貫く。"

[[dialogue]]
speaker = "梨緒"
# 「その調子だ、ベアト！」
line = "「その調子だ、ベアト！」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん。私、戦うよ。まだ全然納得いってないから！」
line = "「うん。私、戦うよ。まだ全然納得いってないから！」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうこなくっちゃね。頼りにしてるよ」
line = "「そうこなくっちゃね。頼りにしてるよ」"

[[dialogue]]
speaker = "リノ"
# 「アルタイルへの接続まで……あと１分！　もうちょっとよ！」
line = "「アルタイルへの接続まで……あと１分！　もうちょっとよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「はぁ、はぁ……くっ……」
line = "「はぁ、はぁ……くっ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あと少しなのに……！」
line = "「あと少しなのに……！」"

[[dialogue]]
speaker = "クロト"
# 「フィオナ！　ヴィーナス！」
line = "「フィオナ！　ヴィーナス！」"

[[dialogue]]
speaker = "unk"
# だが今までディザスターハンドのエネルギーを受け止めていたヴィーナスとフィオナも、限界を迎えて元のフォームに戻ってしまう。
line = "だが今までディザスターハンドのエネルギーを受け止めていたヴィーナスとフィオナも、限界を迎えて元のフォームに戻ってしまう。"

[[dialogue]]
speaker = "unk"
# その瞬間、障壁が砕け、ディザスターハンドが迫ってくる。
line = "その瞬間、障壁が砕け、ディザスターハンドが迫ってくる。"

[[dialogue]]
speaker = "unk"
# まるで空が落ちてくるように、巨大な手が俺たちを潰そうとして──
line = "まるで空が落ちてくるように、巨大な手が俺たちを潰そうとして──"

[[dialogue]]
speaker = "アポロ（大人）"
# 「アルケインソーラーブレイズ！！」
line = "「アルケインソーラーブレイズ！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ぶっつけ本番で使いたくはなかったが、なんとかうまくいったな……」
line = "「ぶっつけ本番で使いたくはなかったが、なんとかうまくいったな……」"

[[dialogue]]
speaker = "unk"
# アポロが二振りの剣を交差させ、光の刃でディザスターハンドを受け止めた。
line = "アポロが二振りの剣を交差させ、光の刃でディザスターハンドを受け止めた。"

[[dialogue]]
speaker = "unk"
# 赤と青の巨大な刃が、かろうじて破滅の化身を押しとどめている。
line = "赤と青の巨大な刃が、かろうじて破滅の化身を押しとどめている。"

[[dialogue]]
speaker = "ヴィーナス"
# 「いつの間にアルケインコードを！？」
line = "「いつの間にアルケインコードを！？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ルヴィネの尾行をしている間に、フィオナから伝授してもらったんだ。あたしも魔王だからな」
line = "「ルヴィネの尾行をしている間に、フィオナから伝授してもらったんだ。あたしも魔王だからな」"

[[dialogue]]
speaker = "リノ"
# 「アルタイルへの接続……完了！」
line = "「アルタイルへの接続……完了！」"

[[dialogue]]
speaker = "リノ"
# 「今なら次元の穴は安定しているわ。あの穴に飛び込めば、アルタイルの流星市国に帰れるはずよ」
line = "「今なら次元の穴は安定しているわ。あの穴に飛び込めば、アルタイルの流星市国に帰れるはずよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おばあちゃん……！」
line = "「おばあちゃん……！」"

[[dialogue]]
speaker = "クロト"
# 「でも母さんは──」
line = "「でも母さんは──」"

[[dialogue]]
speaker = "リノ"
# 「いいから行きなさい。息子と孫を送り出すのが、私の夢だったんだから」
line = "「いいから行きなさい。息子と孫を送り出すのが、私の夢だったんだから」"

[[dialogue]]
speaker = "リノ"
# 「大丈夫。何とかする算段は立ててあるわ。空間の魔女を甘く見ないで」
line = "「大丈夫。何とかする算段は立ててあるわ。空間の魔女を甘く見ないで」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ここはあたしたち大人に任せろ。お前たちはさっさとアルタイルに帰れ」
line = "「ここはあたしたち大人に任せろ。お前たちはさっさとアルタイルに帰れ」"

[[dialogue]]
speaker = "梨緒"
# 「待て、アポロ……！」
line = "「待て、アポロ……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「行くよ、梨緒」
line = "「行くよ、梨緒」"

[[dialogue]]
speaker = "unk"
# アポロに手を伸ばそうとする梨緒の肩を、ナターシャが掴んだ。
line = "アポロに手を伸ばそうとする梨緒の肩を、ナターシャが掴んだ。"

[[dialogue]]
speaker = "ナターシャ"
# 「巻き込んで悪いんだけど、エステルもアルタイルに来てもらうよ。デネブじゃ危険だからね」
line = "「巻き込んで悪いんだけど、エステルもアルタイルに来てもらうよ。デネブじゃ危険だからね」"

[[dialogue]]
speaker = "エステル"
# 「は、はいっ」
line = "「は、はいっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめんね、エステルちゃん」
line = "「ごめんね、エステルちゃん」"

[[dialogue]]
speaker = "エステル"
# 「いえ、自分で決めたことですから」
line = "「いえ、自分で決めたことですから」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ俺たち行くよ、母さん」
line = "「じゃあ俺たち行くよ、母さん」"

[[dialogue]]
speaker = "リノ"
# 「ええ、行ってらっしゃい！」
line = "「ええ、行ってらっしゃい！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「じゃあまたな、みんな」
line = "「じゃあまたな、みんな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「フィオナも達者でな。久しぶりに会えて嬉しかったよ」
line = "「フィオナも達者でな。久しぶりに会えて嬉しかったよ」"

[[dialogue]]
speaker = "フィオナ"
# 「……はい、姉さん。私も会えて良かったです」
line = "「……はい、姉さん。私も会えて良かったです」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「梨緒も泣くのはいいがほどほどにな。あんまり泣き虫だと周りが困っちゃうぞ」
line = "「梨緒も泣くのはいいがほどほどにな。あんまり泣き虫だと周りが困っちゃうぞ」"

[[dialogue]]
speaker = "梨緒"
# 「今はそんなことはどうでもいい！　君は──」
line = "「今はそんなことはどうでもいい！　君は──」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「大丈夫、あたしを信じろ」
line = "「大丈夫、あたしを信じろ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そしてあたしも、お前を信じてるぞ……梨緒」
line = "「そしてあたしも、お前を信じてるぞ……梨緒」"

[[dialogue]]
speaker = "梨緒"
# 「……！　ずるいだろう、そんな言い方……！」
