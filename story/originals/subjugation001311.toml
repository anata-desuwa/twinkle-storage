[[dialogue]]
speaker = "unk"
# 星徒会の仲間たちが、《試練》のパテル、《命脈》のアルモタヘル、《万成》のセシア、《円環》のラクシャの下へそれぞれ旅立った。
line = "星徒会の仲間たちが、《試練》のパテル、《命脈》のアルモタヘル、《万成》のセシア、《円環》のラクシャの下へそれぞれ旅立った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「次は私たちの番ね！」
line = "「次は私たちの番ね！」"

[[dialogue]]
speaker = "イニシュ"
# 「守護天使マグダレナの元には私が案内します」
line = "「守護天使マグダレナの元には私が案内します」"

[[dialogue]]
speaker = "ウェンディ"
# 「私はウェンディ。こちらはイニシュです。よろしくお願いします」
line = "「私はウェンディ。こちらはイニシュです。よろしくお願いします」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、よろしく。２人とも見たことないけど、前に戦った時いなかったわよね？」
line = "「ええ、よろしく。２人とも見たことないけど、前に戦った時いなかったわよね？」"

[[dialogue]]
speaker = "ウェンディ"
# 「私たちは魔界で守護天使の捜索をしていて、合流が間に合いませんでした。……というかイニシュが言うことを聞かなかったんですが」
line = "「私たちは魔界で守護天使の捜索をしていて、合流が間に合いませんでした。……というかイニシュが言うことを聞かなかったんですが」"

[[dialogue]]
speaker = "イニシュ"
# 「あの時は魔界の一部でも流星が降り注ぎ、アステラが大量に発生していました。ネビュラはリクリエと戦うための組織。モンスターを殲滅するのは当然です」
line = "「あの時は魔界の一部でも流星が降り注ぎ、アステラが大量に発生していました。ネビュラはリクリエと戦うための組織。モンスターを殲滅するのは当然です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふーん、なるほどね。あなたたちも別のところで戦ってたんだ」
line = "「ふーん、なるほどね。あなたたちも別のところで戦ってたんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも今さらだけど、そもそも魔女は魔女の森ってところに住んでて、そこにはリクリエは及ばないのよね？」
line = "「でも今さらだけど、そもそも魔女は魔女の森ってところに住んでて、そこにはリクリエは及ばないのよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあどうして、ネビュラはリクリエを止めようとするのよ。三界のことなんてほっとけばいいんじゃないの？」
line = "「じゃあどうして、ネビュラはリクリエを止めようとするのよ。三界のことなんてほっとけばいいんじゃないの？」"

[[dialogue]]
speaker = "イニシュ"
# 「ネビュラはリクリエを阻止するための組織だからです」
line = "「ネビュラはリクリエを阻止するための組織だからです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いや、だからどうしてネビュラはリクリエを──」
line = "「いや、だからどうしてネビュラはリクリエを──」"

[[dialogue]]
speaker = "イニシュ"
# 「ネビュラとは本来、魔女と人間によって設立された組織でした」
line = "「ネビュラとは本来、魔女と人間によって設立された組織でした」"

[[dialogue]]
speaker = "フィオナ"
# 「人間と……！？　しかしあなた方の中には人間がいないようですが……」
line = "「人間と……！？　しかしあなた方の中には人間がいないようですが……」"

[[dialogue]]
speaker = "イニシュ"
# 「ええ、今のネビュラはそうです。ですが<b>過去の</b>ネビュラは違いました」
line = "「ええ、今のネビュラはそうです。ですが<b>過去の</b>ネビュラは違いました」"

[[dialogue]]
speaker = "イニシュ"
# 「ネビュラが最初に設立されたのは、森羅歴や玄武暦より以前に遡ってさらに昔、数万年前のこと。後に真祖と呼ばれる初代光の魔女・ディアナがいた時代でした」
line = "「ネビュラが最初に設立されたのは、森羅歴や玄武暦より以前に遡ってさらに昔、数万年前のこと。後に真祖と呼ばれる初代光の魔女・ディアナがいた時代でした」"

[[dialogue]]
speaker = "イニシュ"
# 「当時の魔女は三界と交流を持ち、特に人間と厚い<ruby=ゆうぎ>友誼</ruby>を結んでいました」
line = "「当時の魔女は三界と交流を持ち、特に人間と厚い<ruby>友誼<rt>ゆうぎ</rt></ruby>を結んでいました」"

[[dialogue]]
speaker = "イニシュ"
# 「各地で起こる異常気象、地殻変動、天変地異……世界を襲う脅威にリクリエという名前もついていなかった頃」
line = "「各地で起こる異常気象、地殻変動、天変地異……世界を襲う脅威にリクリエという名前もついていなかった頃」"

[[dialogue]]
speaker = "イニシュ"
# 「それらの異変に立ち向かうため、魔女と人間が手を取り合って結成されたのがネビュラです」
line = "「それらの異変に立ち向かうため、魔女と人間が手を取り合って結成されたのがネビュラです」"

[[dialogue]]
speaker = "イニシュ"
# 「そして私も、その時代にネビュラに加わった構成員の１人です。時には人間の構成員とチームを組み、各地の調査に赴きました」
line = "「そして私も、その時代にネビュラに加わった構成員の１人です。時には人間の構成員とチームを組み、各地の調査に赴きました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、じゃああなたいくつなの？　何万年もずっと生きてきたっていうの？」
line = "「えっ、じゃああなたいくつなの？　何万年もずっと生きてきたっていうの？」"

[[dialogue]]
speaker = "イニシュ"
# 「いえ、私は永い間、コフィンの中で眠りに就いていました。そのせいで記憶を失っていましたが……流星を見て、少し過去を思い出したのです」
line = "「いえ、私は永い間、コフィンの中で眠りに就いていました。そのせいで記憶を失っていましたが……流星を見て、少し過去を思い出したのです」"

[[dialogue]]
speaker = "リノ"
# 『イニシュ……やはりあなたはディアナ様の時代の魔女だったのね』
line = "『イニシュ……やはりあなたはディアナ様の時代の魔女だったのね』"

[[dialogue]]
speaker = "イニシュ"
# 「はい。あなたたち現代の魔女が真祖と呼ぶディアナは、私の恩人であり、友人でもありました」
line = "「はい。あなたたち現代の魔女が真祖と呼ぶディアナは、私の恩人であり、友人でもありました」"

[[dialogue]]
speaker = "イニシュ"
# 「──しかし、<b>我々の</b>ネビュラはリクリエに勝てなかった」
line = "「──しかし、<b>我々の</b>ネビュラはリクリエに勝てなかった」"

[[dialogue]]
speaker = "イニシュ"
# 「私にも人間の親友がいました。ですが彼女はリクリエで消滅した。塵ひとつ残さずに」
line = "「私にも人間の親友がいました。ですが彼女はリクリエで消滅した。塵ひとつ残さずに」"

[[dialogue]]
speaker = "イニシュ"
# 「魔女だけがディアナの魔法で生き延び、幾星霜を重ねた。残された者の未練と、友を救えなかった悔恨とともに」
line = "「魔女だけがディアナの魔法で生き延び、幾星霜を重ねた。残された者の未練と、友を救えなかった悔恨とともに」"

[[dialogue]]
speaker = "セドナ"
# 『──そう。それは魔女にとって色褪せない、敗北と屈辱の記憶だ』
line = "『──そう。それは魔女にとって色褪せない、敗北と屈辱の記憶だ』"

[[dialogue]]
speaker = "セドナ"
# 『我々魔女は、魔女の森を救った偉大なる祖・ディアナへの畏敬とともに、先達たちの無念を幾千、幾万年もの間積み重ねてきた』
line = "『我々魔女は、魔女の森を救った偉大なる祖・ディアナへの畏敬とともに、先達たちの無念を幾千、幾万年もの間積み重ねてきた』"

[[dialogue]]
speaker = "セドナ"
# 『そして３０００年前、再びリクリエと戦うためにネビュラを結成した」
line = "『そして３０００年前、再びリクリエと戦うためにネビュラを結成した」"

[[dialogue]]
speaker = "セドナ"
# 『過去と同じネビュラの名を使ったのは、今度こそリクリエを打倒するという意志の顕れだ』
line = "『過去と同じネビュラの名を使ったのは、今度こそリクリエを打倒するという意志の顕れだ』"

[[dialogue]]
speaker = "ヴィーナス"
# 「ならどうして──人間界を犠牲にしようとしたのよ。ネビュラも、そのディアナさんも、三界全てを救いたかったんじゃないのかしら？」
line = "「ならどうして──人間界を犠牲にしようとしたのよ。ネビュラも、そのディアナさんも、三界全てを救いたかったんじゃないのかしら？」"

[[dialogue]]
speaker = "ウェンディ"
# 「それしか手がなかったからです。グレートウォール計画の成功率は９７．５％──」
line = "「それしか手がなかったからです。グレートウォール計画の成功率は９７．５％──」"

[[dialogue]]
speaker = "ウェンディ"
# 「そして魔王がアポロを打倒する可能性は、魔界に行く前の戦闘で計測した数値では０％でした。これでは賭ける方が愚かです」
line = "「そして魔王がアポロを打倒する可能性は、魔界に行く前の戦闘で計測した数値では０％でした。これでは賭ける方が愚かです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う……そんなのただの数字だし。クロトならそんな計算ぶっ飛ばしたわよ」
line = "「う……そんなのただの数字だし。クロトならそんな計算ぶっ飛ばしたわよ」"

[[dialogue]]
speaker = "フィオナ"
# 「それだけ緋宮会長が、魔界で目覚ましい成長を遂げたということですね」
line = "「それだけ緋宮会長が、魔界で目覚ましい成長を遂げたということですね」"

[[dialogue]]
speaker = "イニシュ"
# 「そもそも、私はグレート・ウォール計画について事前に知らされていなかったのですが」
line = "「そもそも、私はグレート・ウォール計画について事前に知らされていなかったのですが」"

[[dialogue]]
speaker = "ウェンディ"
# 「知っていたら、イニシュは命令を無視してリクリエの使徒を倒そうとしたでしょう。それを防ぐための措置です」
line = "「知っていたら、イニシュは命令を無視してリクリエの使徒を倒そうとしたでしょう。それを防ぐための措置です」"

[[dialogue]]
speaker = "イニシュ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ウェンディ"
# 「ほら、図星じゃないですか」
line = "「ほら、図星じゃないですか」"

[[dialogue]]
speaker = "unk"
# （明らかに不満そうだ……）
line = "（明らかに不満そうだ……）"

[[dialogue]]
speaker = "イニシュ"
# 「礼を言います、魔王。あなたのおかげでネビュラは後悔を繰り返さずに済みました」
line = "「礼を言います、魔王。あなたのおかげでネビュラは後悔を繰り返さずに済みました」"

[[dialogue]]
speaker = "イニシュ"
# 「ですが戦いは終わっていません。守護天使を解放しなければ、世界は朽ちてしまいます。──行きましょう」
line = "「ですが戦いは終わっていません。守護天使を解放しなければ、世界は朽ちてしまいます。──行きましょう」"

[[dialogue]]
speaker = "unk"
# ああ！
line = "ああ！"

[[dialogue]]
speaker = "ウェンディ"
# 「しかし世界樹といえど、守護天使マグダレナの元に伸びる根は細く、数名しか送り込むことができません。心してください」
line = "「しかし世界樹といえど、守護天使マグダレナの元に伸びる根は細く、数名しか送り込むことができません。心してください」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。それでも辿り着けるのなら勝機はあります」
line = "「はい。それでも辿り着けるのなら勝機はあります」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん。この前の魔界じゃずっと縛られてたもの。暴れてやるわ」
line = "「ふふん。この前の魔界じゃずっと縛られてたもの。暴れてやるわ」"

[[dialogue]]
speaker = "ミルフィー"
# 「じゃあ行ってくるね、ヒヨちゃん」
line = "「じゃあ行ってくるね、ヒヨちゃん」"

[[dialogue]]
speaker = "ヒヨ"
# 「無事に帰ってきてくれよ、姐さん。約束だぜ？」
line = "「無事に帰ってきてくれよ、姐さん。約束だぜ？」"

[[dialogue]]
speaker = "ミルフィー"
# 「うーん……約束はできないかも」
line = "「うーん……約束はできないかも」"

[[dialogue]]
speaker = "ヒヨ"
# 「ええっ！？　そこは帰ってくるって答えるところだろ！？」
line = "「ええっ！？　そこは帰ってくるって答えるところだろ！？」"

[[dialogue]]
speaker = "ミルフィー"
# 「そうなんだけど、ヒヨちゃんにウソはつきたくないから。でも全力を尽くすよ」
line = "「そうなんだけど、ヒヨちゃんにウソはつきたくないから。でも全力を尽くすよ」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん……無茶はしねえでくれよな」
line = "「姐さん……無茶はしねえでくれよな」"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、頑張るよ。じゃあ使命を果たしてくるね」
line = "「うん、頑張るよ。じゃあ使命を果たしてくるね」"

[[dialogue]]
speaker = "ウェンディ"
# 「ではお気をつけて。ボン・ボヤージュ！」
line = "「ではお気をつけて。ボン・ボヤージュ！」"
