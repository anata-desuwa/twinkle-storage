[[dialogue]]
speaker = "unk"
# 第５話,１０年前のデネブで起こったこと,B
line = "第５話,１０年前のデネブで起こったこと,B"

[[dialogue]]
speaker = "チナ"
# 「初めてルヴィに会ったのは、１０年以上前のことだよ」
line = "「初めてルヴィに会ったのは、１０年以上前のことだよ」"

[[dialogue]]
speaker = "チナ"
# 「当時の流星市国は、そりゃあもうひどいありさまだった。日増しに増えるアステラ。倒しても倒しても湧き出てくるモンスターたち……」
line = "「当時の流星市国は、そりゃあもうひどいありさまだった。日増しに増えるアステラ。倒しても倒しても湧き出てくるモンスターたち……」"

[[dialogue]]
speaker = "チナ"
# 「お前たちの世界……アルタイルでも言い伝えられてるか？　リクリエの<ruby=ほんぱ>本波</ruby>が近づくと、空には彗星の雨が降りそそぐって伝承は」
line = "「お前たちの世界……アルタイルでも言い伝えられてるか？　リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>が近づくと、空には彗星の雨が降りそそぐって伝承は」"

[[dialogue]]
speaker = "アナ"
# 「はい。旧森羅歴……３０００年前に観測されたのはセレーネ流星群。滅亡の到来を報せる前兆として、流星群は発生します」
line = "「はい。旧森羅歴……３０００年前に観測されたのはセレーネ流星群。滅亡の到来を報せる前兆として、流星群は発生します」"

[[dialogue]]
speaker = "チナ"
# 「セレーネ流星群、名前もデネブと一緒だな」
line = "「セレーネ流星群、名前もデネブと一緒だな」"

[[dialogue]]
speaker = "アナ"
# 「そしてついこの間、私たちの森羅歴でも流星群は観測されました。これがチナさんの語ろうとしている、１０年前の流星群ですね」
line = "「そしてついこの間、私たちの森羅歴でも流星群は観測されました。これがチナさんの語ろうとしている、１０年前の流星群ですね」"

[[dialogue]]
speaker = "グレイス"
# 「ついこの間……そうですか。アルタイルの世界はほとんど壊れていない。ということは──」
line = "「ついこの間……そうですか。アルタイルの世界はほとんど壊れていない。ということは──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ！　私たちみんなでリクリエを止めたの！」
line = "「そうよ！　私たちみんなでリクリエを止めたの！」"

[[dialogue]]
speaker = "アナ"
# 「大きな犠牲も払いましたが、会長が魔王の力に覚醒したこともあり、大事は免れました」
line = "「大きな犠牲も払いましたが、会長が魔王の力に覚醒したこともあり、大事は免れました」"

[[dialogue]]
speaker = "アナ"
# 「ＤＩＳＣで『フィヴォス流星群』と検索をすれば、色々と情報が出てきますよ」
line = "「ＤＩＳＣで『フィヴォス流星群』と検索をすれば、色々と情報が出てきますよ」"

[[dialogue]]
speaker = "チナ"
# 「……フィヴォス？　そこは違うのか。デネブで起こった流星群の名前は、ニュクス流星群だ」
line = "「……フィヴォス？　そこは違うのか。デネブで起こった流星群の名前は、ニュクス流星群だ」"

[[dialogue]]
speaker = "マトイ"
# 「どうして流星群の名前が違うんだろう……平行世界って、基本的には同じ道筋をたどるんだよね？」
line = "「どうして流星群の名前が違うんだろう……平行世界って、基本的には同じ道筋をたどるんだよね？」"

[[dialogue]]
speaker = "アナ"
# 「出現しているリクリエの使徒が違うからではないでしょうか？　この程度のズレは許容すべきかと」
line = "「出現しているリクリエの使徒が違うからではないでしょうか？　この程度のズレは許容すべきかと」"

[[dialogue]]
speaker = "グレイス"
# 「リクリエの使徒──その言葉は私たちの世界でも使われているものですが……」
line = "「リクリエの使徒──その言葉は私たちの世界でも使われているものですが……」"

[[dialogue]]
speaker = "チナ"
# 「ああ。デネブとアルタイルで同じ意味の言葉なのか、すり合わせておくか」
line = "「ああ。デネブとアルタイルで同じ意味の言葉なのか、すり合わせておくか」"

[[dialogue]]
speaker = "クロト"
# 「俺たちアルタイルの世界では、リクリエの到来に合わせて現れる……アステラとモンスターを使役する敵のことを、そう呼んでる」
line = "「俺たちアルタイルの世界では、リクリエの到来に合わせて現れる……アステラとモンスターを使役する敵のことを、そう呼んでる」"

[[dialogue]]
speaker = "クロト"
# 「会話自体はできるけれど、性格や思想が元の人格から強固に歪められているのも、共通して見られる特徴だ」
line = "「会話自体はできるけれど、性格や思想が元の人格から強固に歪められているのも、共通して見られる特徴だ」"

[[dialogue]]
speaker = "クロト"
# 「それ以外だと……使徒は全員、仮面を身に着けて現れる。天界で使徒だったジグを、キミたちも見ただろう？」
line = "「それ以外だと……使徒は全員、仮面を身に着けて現れる。天界で使徒だったジグを、キミたちも見ただろう？」"

[[dialogue]]
speaker = "チナ"
# 「……デネブでもほぼ同じ認識だ。まあ元々、この名称が定着したのも、使徒自身がそう名乗ったことに由来してるって聞いたし、ある意味では道理か」
line = "「……デネブでもほぼ同じ認識だ。まあ元々、この名称が定着したのも、使徒自身がそう名乗ったことに由来してるって聞いたし、ある意味では道理か」"

[[dialogue]]
speaker = "アナ"
# 「リクリエの使徒は、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』が用意した、リクリエを効率的に遂行するためのプログラム……私たちはそう推測しています」
line = "「リクリエの使徒は、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が用意した、リクリエを効率的に遂行するためのプログラム……私たちはそう推測しています」"

[[dialogue]]
speaker = "グレイス"
# 「そうですか。じゃあ、アルタイルの世界にも、あの『仮面の女』が……？」
line = "「そうですか。じゃあ、アルタイルの世界にも、あの『仮面の女』が……？」"

[[dialogue]]
speaker = "チナ"
# 「──待てよお前ら、そうだよっ。アルタイルはリクリエを防いだって……あの『仮面の女』を倒したのか！？　嘘だろ！？」
line = "「──待てよお前ら、そうだよっ。アルタイルはリクリエを防いだって……あの『仮面の女』を倒したのか！？　嘘だろ！？」"

[[dialogue]]
speaker = "クロト"
# 「仮面を被った使徒は確かに倒した。でもアルタイルに現れた使徒は、デネブとは違う使徒だ」
line = "「仮面を被った使徒は確かに倒した。でもアルタイルに現れた使徒は、デネブとは違う使徒だ」"

[[dialogue]]
speaker = "アナ"
# 「これも参照事例が少ないですが、使徒は平行世界からその存在が選ばれます」
line = "「これも参照事例が少ないですが、使徒は平行世界からその存在が選ばれます」"

[[dialogue]]
speaker = "チナ"
# 「なんだって……使徒は、平行世界人だってのか！？」
line = "「なんだって……使徒は、平行世界人だってのか！？」"

[[dialogue]]
speaker = "アナ"
# 「はい。選ばれるのは星騎士ばかり……仮面を被せられ、意思を奪われた後に、異なる世界に渡ってリクリエを扇動するんです」
line = "「はい。選ばれるのは星騎士ばかり……仮面を被せられ、意思を奪われた後に、異なる世界に渡ってリクリエを扇動するんです」"

[[dialogue]]
speaker = "チナ"
# 「デネブで暴れた『仮面の女』は、アルタイルには来ていない……？　じゃあ、アルタイルに現れた使徒って──」
line = "「デネブで暴れた『仮面の女』は、アルタイルには来ていない……？　じゃあ、アルタイルに現れた使徒って──」"

[[dialogue]]
speaker = "アポロ"
# 「あたしだ」
line = "「あたしだ」"

[[dialogue]]
speaker = "チナ"
# 「……は？」
line = "「……は？」"

[[dialogue]]
speaker = "アポロ"
# 「アルタイルに使徒として現れて、フィヴォス流星群を降らせたのはあたしだ。もっと正確に言えば──デネブのあたし、だけど」
line = "「アルタイルに使徒として現れて、フィヴォス流星群を降らせたのはあたしだ。もっと正確に言えば──デネブのあたし、だけど」"

[[dialogue]]
speaker = "アポロ"
# 「あたしの名前はアポロ。その前は、星見フィオナを名乗っていた者だ」
line = "「あたしの名前はアポロ。その前は、星見フィオナを名乗っていた者だ」"

[[dialogue]]
speaker = "チナ"
# 「はあぁ！？　星見って……このちんちくりんが星見家の長女！？」
line = "「はあぁ！？　星見って……このちんちくりんが星見家の長女！？」"

[[dialogue]]
speaker = "アポロ"
# 「ツッコむところそこか！？　って、オマエにだけは言われたくないぞ！」
line = "「ツッコむところそこか！？　って、オマエにだけは言われたくないぞ！」"

[[dialogue]]
speaker = "チナ"
# 「いやでも──そういう、ことか……」
line = "「いやでも──そういう、ことか……」"

[[dialogue]]
speaker = "チナ"
# 「昔、星見家の双子の妹が神隠しにあった、なんて噂があったけど……それがまさか、リクリエ絡みの事件だったなんて」
line = "「昔、星見家の双子の妹が神隠しにあった、なんて噂があったけど……それがまさか、リクリエ絡みの事件だったなんて」"

[[dialogue]]
speaker = "グレイス"
# 「チナ、すみません。真剣に聞いてたんですが、頭がこんがらがってきました……」
line = "「チナ、すみません。真剣に聞いてたんですが、頭がこんがらがってきました……」"

[[dialogue]]
speaker = "チナ"
# 「アルタイルで暴れたのは、デネブ出身の星見フィオナってことだよ。魔王の言うことを信じればだけど……」
line = "「アルタイルで暴れたのは、デネブ出身の星見フィオナってことだよ。魔王の言うことを信じればだけど……」"

[[dialogue]]
speaker = "クロト"
# 「ああ、そうだ。リクリエの使徒は、何者かに選ばれた後に世界を渡る。その跳躍は、時間すらも飛び越える」
line = "「ああ、そうだ。リクリエの使徒は、何者かに選ばれた後に世界を渡る。その跳躍は、時間すらも飛び越える」"

[[dialogue]]
speaker = "クロト"
# 「そして、渡った先の世界で破壊の限りを尽くすんだ」
line = "「そして、渡った先の世界で破壊の限りを尽くすんだ」"

[[dialogue]]
speaker = "クロト"
# 「デネブからやってきた『使徒・アポロ』はその呪縛から解放された。もう君たちの世界にも戻っている」
line = "「デネブからやってきた『使徒・アポロ』はその呪縛から解放された。もう君たちの世界にも戻っている」"

[[dialogue]]
speaker = "チナ"
# 「……デネブの星見フィオナが、今どこで何をしてるのかも聞きたいけど。もっと気になることがある……デネブで暴れた使徒、あれは……」
line = "「……デネブの星見フィオナが、今どこで何をしてるのかも聞きたいけど。もっと気になることがある……デネブで暴れた使徒、あれは……」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺たちの世界、アルタイルから選ばれてしまった存在だ。その『仮面の女』……マルキア・セイファートに似ている。そんな噂はなかったか？」
line = "「ああ。俺たちの世界、アルタイルから選ばれてしまった存在だ。その『仮面の女』……マルキア・セイファートに似ている。そんな噂はなかったか？」"

[[dialogue]]
speaker = "グレイス"
# 「そうです！　１０年前の当時、新星学園の学園長だった、英雄セイファートの奥方様に、面影が似ていたと……」
line = "「そうです！　１０年前の当時、新星学園の学園長だった、英雄セイファートの奥方様に、面影が似ていたと……」"

[[dialogue]]
speaker = "グレイス"
# 「扱う得物も、戦う時の出で立ちも……ただ素顔を確認できなかったため、あくまで噂でしかなく……」
line = "「扱う得物も、戦う時の出で立ちも……ただ素顔を確認できなかったため、あくまで噂でしかなく……」"

[[dialogue]]
speaker = "チナ"
# 「アタシ、その噂が大嫌いでさ……喋ってるやつがいたら、訂正しろって、よくケンカしてた……」
line = "「アタシ、その噂が大嫌いでさ……喋ってるやつがいたら、訂正しろって、よくケンカしてた……」"

[[dialogue]]
speaker = "チナ"
# 「戦姫マルキアは、英雄ジェラルドと同じ……流星市国のシンボルだった。星騎士たちみんなの憧れだったから」
line = "「戦姫マルキアは、英雄ジェラルドと同じ……流星市国のシンボルだった。星騎士たちみんなの憧れだったから」"

[[dialogue]]
speaker = "チナ"
# 「そっか……あの『戦姫マルキア』がリクリエの使徒……そりゃ、デネブが勝てないわけだ……」
line = "「そっか……あの『戦姫マルキア』がリクリエの使徒……そりゃ、デネブが勝てないわけだ……」"

[[dialogue]]
speaker = "アナ"
# 「チナさん。平行世界の移動の際、同一人物が同時に意識を保つことはできません」
line = "「チナさん。平行世界の移動の際、同一人物が同時に意識を保つことはできません」"

[[dialogue]]
speaker = "アナ"
# 「現在、アルタイルの香堂チナさんが眠っているように」
line = "「現在、アルタイルの香堂チナさんが眠っているように」"

[[dialogue]]
speaker = "チナ"
# 「……ああ」
line = "「……ああ」"

[[dialogue]]
speaker = "アナ"
# 「つまり、デネブで暮らすマルキア・セイファートも、意識を失っていたはずです。その辺りの記録などは……」
line = "「つまり、デネブで暮らすマルキア・セイファートも、意識を失っていたはずです。その辺りの記録などは……」"

[[dialogue]]
speaker = "チナ"
# 「……死んだって言われてるよ。夫も含めて」
line = "「……死んだって言われてるよ。夫も含めて」"

[[dialogue]]
speaker = "unk"
# 俺が星騎士として憧れた存在は、異なる世界でも死という運命から逃れられなかったのか。
line = "俺が星騎士として憧れた存在は、異なる世界でも死という運命から逃れられなかったのか。"

[[dialogue]]
speaker = "クロト"
# （…………セイファート、学園長）
line = "（…………セイファート、学園長）"

[[dialogue]]
speaker = "チナ"
# 「セイファート一家だけじゃない。デネブでは、大勢死んだ。生きてるやつを探す方が大変なくらいだ」
line = "「セイファート一家だけじゃない。デネブでは、大勢死んだ。生きてるやつを探す方が大変なくらいだ」"

[[dialogue]]
speaker = "チナ"
# 「あの仮面の女──リクリエの使徒は、三界で暴れた。天界では聖庭園を、魔界では<ruby=たいはい>頽廃</ruby>都市キュリオスを瞬く間に陥落させた」
line = "「あの仮面の女──リクリエの使徒は、三界で暴れた。天界では聖庭園を、魔界では<ruby>頽廃<rt>たいはい</rt></ruby>都市キュリオスを瞬く間に陥落させた」"

[[dialogue]]
speaker = "チナ"
# 「<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を機能不全にして、三界の連絡が取れないようにしてから、あいつは人間界に現れた」
line = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を機能不全にして、三界の連絡が取れないようにしてから、あいつは人間界に現れた」"

[[dialogue]]
speaker = "チナ"
# 「順番だったんだろうさ。あとは人間界で、魔王を自称する星徒会長様を殺せば、リクリエは達成されるってな」
line = "「順番だったんだろうさ。あとは人間界で、魔王を自称する星徒会長様を殺せば、リクリエは達成されるってな」"

[[dialogue]]
speaker = "サーシャ"
# 「徹底的ね。アルタイルに現れたアポロちゃんとは、やり方が違う……」
line = "「徹底的ね。アルタイルに現れたアポロちゃんとは、やり方が違う……」"

[[dialogue]]
speaker = "チナ"
# 「かろうじて生き残った星騎士から聞いた話だけど……戦争の天才って奴らしい。残虐で冷酷。攻め方は不規則かつ執拗で……」
line = "「かろうじて生き残った星騎士から聞いた話だけど……戦争の天才って奴らしい。残虐で冷酷。攻め方は不規則かつ執拗で……」"

[[dialogue]]
speaker = "チナ"
# 「当時のデネブ、流星市国にいた星騎士は、その９割以上が死んでるんだからな」
line = "「当時のデネブ、流星市国にいた星騎士は、その９割以上が死んでるんだからな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほ、ほとんど全員じゃないっ！？」
line = "「ほ、ほとんど全員じゃないっ！？」"

[[dialogue]]
speaker = "グレイス"
# 「どうしても記録には漏れがありますが……それでもほとんどが亡くなられています。特に、新星・流星の両学園の星徒会は全滅しています」
line = "「どうしても記録には漏れがありますが……それでもほとんどが亡くなられています。特に、新星・流星の両学園の星徒会は全滅しています」"

[[dialogue]]
speaker = "マトイ"
# 「そう、なの……？」
line = "「そう、なの……？」"

[[dialogue]]
speaker = "グレイス"
# 「はい。私の記憶では──デネブの新星学園、その星徒会メンバーは緋宮クロト、九浄テルル、奏サーシャ、詠野マトイ、アナの５名」
line = "「はい。私の記憶では──デネブの新星学園、その星徒会メンバーは緋宮クロト、九浄テルル、奏サーシャ、詠野マトイ、アナの５名」"

[[dialogue]]
speaker = "グレイス"
# 「その全員が、『仮面の女』との戦いで戦死したと記録にあります」
line = "「その全員が、『仮面の女』との戦いで戦死したと記録にあります」"

[[dialogue]]
speaker = "マトイ"
# 「…………そう、だったんだ」
line = "「…………そう、だったんだ」"

[[dialogue]]
speaker = "グレイス"
# 「あ、いえ……その。魔王さんだけは、記録上『逃亡』、でしたね……死体も見つかっていないみたいで……」
line = "「あ、いえ……その。魔王さんだけは、記録上『逃亡』、でしたね……死体も見つかっていないみたいで……」"

[[dialogue]]
speaker = "クロト"
# 「気にしていないよ。そのあたりのことも、よく聞きたいから」
line = "「気にしていないよ。そのあたりのことも、よく聞きたいから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………パパ、ママ」
line = "「…………パパ、ママ」"

[[dialogue]]
speaker = "チナ"
# 「ん？　でもアンタはヴィーナスだよな。九浄テルルって名前じゃない……？　その辺もズレがあるのかな」
line = "「ん？　でもアンタはヴィーナスだよな。九浄テルルって名前じゃない……？　その辺もズレがあるのかな」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは『人間に転生した女神テルル』と『デネブの緋宮クロト』の子──いずれその情報も、彼女たちに伝える必要がありそうだ。
line = "ヴィーナスは『人間に転生した女神テルル』と『デネブの緋宮クロト』の子──いずれその情報も、彼女たちに伝える必要がありそうだ。"

[[dialogue]]
speaker = "unk"
# でも今は、チナの話を聞こう。
line = "でも今は、チナの話を聞こう。"

[[dialogue]]
speaker = "チナ"
# 「……ともかくだ。デネブの星騎士たちは終始、あの『仮面の女』に劣勢だった」
line = "「……ともかくだ。デネブの星騎士たちは終始、あの『仮面の女』に劣勢だった」"

[[dialogue]]
speaker = "チナ"
# 「毎日、星騎士は数を減らしていった。彗星の雨は止まらない。流星市国全域が戦闘区域になって……」
line = "「毎日、星騎士は数を減らしていった。彗星の雨は止まらない。流星市国全域が戦闘区域になって……」"

[[dialogue]]
speaker = "チナ"
# 「そして魔王クロトは、デネブに見切りをつけて逃げだした──そう言われてるのは、もう耳タコだよな」
line = "「そして魔王クロトは、デネブに見切りをつけて逃げだした──そう言われてるのは、もう耳タコだよな」"

[[dialogue]]
speaker = "クロト"
# 「ああ。そして、絶望的な状況に陥った流星市国。そこに現れたのが──」
line = "「ああ。そして、絶望的な状況に陥った流星市国。そこに現れたのが──」"

[[dialogue]]
speaker = "チナ"
# 「…………うん。ルヴィ、だったんだ」
line = "「…………うん。ルヴィ、だったんだ」"

[[dialogue]]
speaker = "unk"
# チナは記憶をたぐるように、しばらく沈黙した後──ゆっくりと口を開く。
line = "チナは記憶をたぐるように、しばらく沈黙した後──ゆっくりと口を開く。"

[[dialogue]]
speaker = "チナ"
# 「ちょっと長くなるけど、できる限り詳しく話すよ。つまんない昔話だけど……」
line = "「ちょっと長くなるけど、できる限り詳しく話すよ。つまんない昔話だけど……」"
