[[dialogue]]
speaker = "unk"
# 飲み屋を出て、マリオンと別れた後、トワは自宅への帰路を歩いていた。
line = "飲み屋を出て、マリオンと別れた後、トワは自宅への帰路を歩いていた。"

[[dialogue]]
speaker = "トワ先生"
# （家に帰って、もう１度メイプルちゃんとよく話そう）
line = "（家に帰って、もう１度メイプルちゃんとよく話そう）"

[[dialogue]]
speaker = "unk"
# そう決意して顔を上げた、その時だった。
line = "そう決意して顔を上げた、その時だった。"

[[dialogue]]
speaker = "一般男性"
# 「うわあぁっ！？　モンスターが出たぞぉーーーッ！」
line = "「うわあぁっ！？　モンスターが出たぞぉーーーッ！」"

[[dialogue]]
speaker = "一般女性"
# 「キャーッ！　こっち来ないで！　誰か助けてーーーッ！」
line = "「キャーッ！　こっち来ないで！　誰か助けてーーーッ！」"

[[dialogue]]
speaker = "トワ先生"
# 「悲鳴！？　モンスターが近くに！？」
line = "「悲鳴！？　モンスターが近くに！？」"

[[dialogue]]
speaker = "unk"
# トワが現場に駆け付けると――
line = "トワが現場に駆け付けると――"

[[dialogue]]
speaker = "メイプル"
# 「みんな、逃げろ！　ここは魔王メイプルが引き受ける！」
line = "「みんな、逃げろ！　ここは魔王メイプルが引き受ける！」"

[[dialogue]]
speaker = "unk"
# メイプルは黒い方のパペットを構えて、その名を呼ぶ。
line = "メイプルは黒い方のパペットを構えて、その名を呼ぶ。"

[[dialogue]]
speaker = "メイプル"
# 「ゆくぞ、我が眷族『アルザード』！　くらえ、闇の黒き刃！」
line = "「ゆくぞ、我が眷族『アルザード』！　くらえ、闇の黒き刃！」"

[[dialogue]]
speaker = "メイプル"
# 「クラウンデスパレードッ！！」
line = "「クラウンデスパレードッ！！」"

[[dialogue]]
speaker = "unk"
# 星術で斬撃を飛ばし、周囲のモンスターを蹴散らして行く。
line = "星術で斬撃を飛ばし、周囲のモンスターを蹴散らして行く。"

[[dialogue]]
speaker = "メイプル"
# 「よし、数は多いけど、そんなに強いやつはいない……！　これならあたし１人でも、みんなの避難が終わるまで戦える！」
line = "「よし、数は多いけど、そんなに強いやつはいない……！　これならあたし１人でも、みんなの避難が終わるまで戦える！」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃん……！」
line = "「メイプルちゃん……！」"

[[dialogue]]
speaker = "メイプル"
# 「えっ？　あっ……トワちゃん……！」
line = "「えっ？　あっ……トワちゃん……！」"

[[dialogue]]
speaker = "メイプル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "メイプル"
# 「……悪いけど、あたしはこのまま戦闘を止める気はないよ。まだ周囲の人達の避難が十分じゃない。誰かがここに残って、モンスターを引きつけておかないと――」
line = "「……悪いけど、あたしはこのまま戦闘を止める気はないよ。まだ周囲の人達の避難が十分じゃない。誰かがここに残って、モンスターを引きつけておかないと――」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃん。あのね――」
line = "「メイプルちゃん。あのね――」"

[[dialogue]]
speaker = "unk"
# トワが言いかけた、次の瞬間。
line = "トワが言いかけた、次の瞬間。"

[[dialogue]]
speaker = "メイプル"
# 「えっ、何！？　辺りが急に暗く……！？」
line = "「えっ、何！？　辺りが急に暗く……！？」"

[[dialogue]]
speaker = "トワ先生"
# 「この感じ……まさか……！？」
line = "「この感じ……まさか……！？」"

[[dialogue]]
speaker = "メイプル"
# 「こ、ここって……」
line = "「こ、ここって……」"

[[dialogue]]
speaker = "メイプル"
# 「アステライトの内部……！？　なんでいきなり……！？」
line = "「アステライトの内部……！？　なんでいきなり……！？」"

[[dialogue]]
speaker = "トワ先生"
# 「……アステラがちょうど、私たちが立っていた場所に発生したんだよ」
line = "「……アステラがちょうど、私たちが立っていた場所に発生したんだよ」"

[[dialogue]]
speaker = "メイプル"
# 「えぇっ！？」
line = "「えぇっ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「レアケースだけど、過去には幾つも事例がある。高層ビルを丸ごと取り込むように発生したりとかね」
line = "「レアケースだけど、過去には幾つも事例がある。高層ビルを丸ごと取り込むように発生したりとかね」"

[[dialogue]]
speaker = "トワ先生"
# 「でも、これはその中でもかなり運が悪い。ここはおそらく、アステラの中心部……！」
line = "「でも、これはその中でもかなり運が悪い。ここはおそらく、アステラの中心部……！」"

[[dialogue]]
speaker = "メイプル"
# 「な、なにあのモンスター……？」
line = "「な、なにあのモンスター……？」"

[[dialogue]]
speaker = "unk"
# 背筋がゾクッとするような、強大なリクリエの気配。トワがメイプルの視線の先を追うと――
line = "背筋がゾクッとするような、強大なリクリエの気配。トワがメイプルの視線の先を追うと――"

[[dialogue]]
speaker = "モンスター"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "トワ先生"
# 「これまで学園で確認されたモンスターのデータは全部覚えてる。でも、このモンスターは知らない……！」
line = "「これまで学園で確認されたモンスターのデータは全部覚えてる。でも、このモンスターは知らない……！」"

[[dialogue]]
speaker = "メイプル"
# 「新種……！」
line = "「新種……！」"

[[dialogue]]
speaker = "トワ先生"
# 「うん……しかも、間違いなく強い……！」
line = "「うん……しかも、間違いなく強い……！」"

[[dialogue]]
speaker = "メイプル"
# 「……トワちゃん。あたしたち、ここは逃げるべき、だよね？」
line = "「……トワちゃん。あたしたち、ここは逃げるべき、だよね？」"

[[dialogue]]
speaker = "トワ先生"
# 「絶対に突っ込んじゃダメ。星徒会がここに辿り着くまで、ひたすら逃げ回るの。……いい？」
line = "「絶対に突っ込んじゃダメ。星徒会がここに辿り着くまで、ひたすら逃げ回るの。……いい？」"

[[dialogue]]
speaker = "メイプル"
# 「わかった。今回はちゃんと、言うことを聞くから」
line = "「わかった。今回はちゃんと、言うことを聞くから」"

[[dialogue]]
speaker = "モンスター"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# モンスターは２人を見据え、ゆっくりと接近してくる。
line = "モンスターは２人を見据え、ゆっくりと接近してくる。"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃん……来るよ！」
line = "「メイプルちゃん……来るよ！」"

[[dialogue]]
speaker = "メイプル"
# 「……うん！」
line = "「……うん！」"

[[dialogue]]
speaker = "モンスター"
# 「……グオオオォォォーーーッ！」
line = "「……グオオオォォォーーーッ！」"

[[dialogue]]
speaker = "unk"
# モンスターが咆哮を上げる。
line = "モンスターが咆哮を上げる。"

[[dialogue]]
speaker = "unk"
# トワとメイプルは戦闘を開始するのだった。
line = "トワとメイプルは戦闘を開始するのだった。"
