[[dialogue]]
speaker = "unk"
# しばらく羽根突きの練習を続けた後、練習相手を再びシャッフルして決めることになった。
line = "しばらく羽根突きの練習を続けた後、練習相手を再びシャッフルして決めることになった。"

[[dialogue]]
speaker = "unk"
# しかし、この場にいる星騎士は７人のため、くじ引きの結果シズハが１人余って、今回は一旦休憩することになった。
line = "しかし、この場にいる星騎士は７人のため、くじ引きの結果シズハが１人余って、今回は一旦休憩することになった。"

[[dialogue]]
speaker = "シズハ"
# 「ふぅ～、練習に熱が入り過ぎて、疲れた～」
line = "「ふぅ～、練習に熱が入り過ぎて、疲れた～」"

[[dialogue]]
speaker = "ディーラック"
# 「その割には元気そうじゃん」
line = "「その割には元気そうじゃん」"

[[dialogue]]
speaker = "シズハ"
# 「えへへ♪　羽根突きの練習を続けて、できるようになってきたら、だんだん楽しくなってきちゃった♪」
line = "「えへへ♪　羽根突きの練習を続けて、できるようになってきたら、だんだん楽しくなってきちゃった♪」"

[[dialogue]]
speaker = "シズハ"
# 「あ～あ、ディーちゃんとも羽根突きができたら、もっと楽しそうなんだけどな～」
line = "「あ～あ、ディーちゃんとも羽根突きができたら、もっと楽しそうなんだけどな～」"

[[dialogue]]
speaker = "ディーラック"
# 「え～、嫌だよ。仮にできたとしても面倒臭いし……」
line = "「え～、嫌だよ。仮にできたとしても面倒臭いし……」"

[[dialogue]]
speaker = "unk"
# 現在、ディーラックはマジックアイテムの檻に閉じ込められ、悪さができないように力を制限されている。そのため羽根突きをすることはできない状態だった。
line = "現在、ディーラックはマジックアイテムの檻に閉じ込められ、悪さができないように力を制限されている。そのため羽根突きをすることはできない状態だった。"

[[dialogue]]
speaker = "獅子舞"
# 「ふん。ならば吾輩が、その願いを叶えてやろう」
line = "「ふん。ならば吾輩が、その願いを叶えてやろう」"

[[dialogue]]
speaker = "シズハ"
# 「え？　獅子舞さん？」
line = "「え？　獅子舞さん？」"

[[dialogue]]
speaker = "unk"
# 突然現れた獅子舞が、正月の力を発動させる。
line = "突然現れた獅子舞が、正月の力を発動させる。"

[[dialogue]]
speaker = "ディーラック"
# 「なっ、これは……！？」
line = "「なっ、これは……！？」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃんの檻が消えちゃった！？」
line = "「ディーちゃんの檻が消えちゃった！？」"

[[dialogue]]
speaker = "獅子舞"
# 「吾輩の結界内でのみ、自由に行動できるように解放してやった。これでお前も羽根突きに参加できるな！」
line = "「吾輩の結界内でのみ、自由に行動できるように解放してやった。これでお前も羽根突きに参加できるな！」"

[[dialogue]]
speaker = "シズハ"
# 「本当ですか！？　やったね、ディーちゃん！」
line = "「本当ですか！？　やったね、ディーちゃん！」"

[[dialogue]]
speaker = "ディーラック"
# 「いやいや、全然嬉しくないよ！？　この獅子舞、なに余計なことをしてくれちゃってんのサ！」
line = "「いやいや、全然嬉しくないよ！？　この獅子舞、なに余計なことをしてくれちゃってんのサ！」"

[[dialogue]]
speaker = "獅子舞"
# 「これで参加者が８人になるし、ちょうどいいからな」
line = "「これで参加者が８人になるし、ちょうどいいからな」"

[[dialogue]]
speaker = "獅子舞"
# 「それに、吾輩の結界内で堂々とサボりなど、認めん。羽根突きに参加しなければ、お前には後で罰ゲームだ」
line = "「それに、吾輩の結界内で堂々とサボりなど、認めん。羽根突きに参加しなければ、お前には後で罰ゲームだ」"

[[dialogue]]
speaker = "ディーラック"
# 「げっ、最悪なんだけど！？」
line = "「げっ、最悪なんだけど！？」"

[[dialogue]]
speaker = "シズハ"
# 「最高の計らいだね！　獅子舞さん、ありがとう♪」
line = "「最高の計らいだね！　獅子舞さん、ありがとう♪」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん、１人だけ仲間<b>ハズレ</b>というのは、縁起が良くないからな」
line = "「ふん、１人だけ仲間<b>ハズレ</b>というのは、縁起が良くないからな」"

[[dialogue]]
speaker = "シズハ"
# 「ほら、ディーちゃん、せっかく獅子舞さんが檻から出してくれたんだし、一緒に羽根突きやろうよ！」
line = "「ほら、ディーちゃん、せっかく獅子舞さんが檻から出してくれたんだし、一緒に羽根突きやろうよ！」"

[[dialogue]]
speaker = "ディーラック"
# 「……あ～、もう。シズハちゃんはどうせ言い出したら聞かないし、やればいいんでしょやれば！」
line = "「……あ～、もう。シズハちゃんはどうせ言い出したら聞かないし、やればいいんでしょやれば！」"

[[dialogue]]
speaker = "シズハ"
# 「よしっ♪　えへへ♪」
line = "「よしっ♪　えへへ♪」"

[[dialogue]]
speaker = "unk"
# そうして、シズハはディーラックと羽根突きを始める。
line = "そうして、シズハはディーラックと羽根突きを始める。"

[[dialogue]]
speaker = "シズハ"
# 「えいっ♪　こうやってディーちゃんと外で遊ぶの、久しぶりだね！」
line = "「えいっ♪　こうやってディーちゃんと外で遊ぶの、久しぶりだね！」"

[[dialogue]]
speaker = "ディーラック"
# 「よっと。寮の部屋では、シズハちゃんからいつもしつこく遊ぼうって言ってくるから、そんなに久しぶりって感じはしないけどね」
line = "「よっと。寮の部屋では、シズハちゃんからいつもしつこく遊ぼうって言ってくるから、そんなに久しぶりって感じはしないけどね」"

[[dialogue]]
speaker = "unk"
# ディーラックは尻尾で羽根を打って、シズハに返す。
line = "ディーラックは尻尾で羽根を打って、シズハに返す。"

[[dialogue]]
speaker = "獅子舞"
# 「ほう、普段はどんな風に遊んでいるのだ？」
line = "「ほう、普段はどんな風に遊んでいるのだ？」"

[[dialogue]]
speaker = "ディーラック"
# 「って、獅子舞はなんでずっと見てるのサ。やりづらいんだけど……」
line = "「って、獅子舞はなんでずっと見てるのサ。やりづらいんだけど……」"

[[dialogue]]
speaker = "獅子舞"
# 「かつて吾輩を作り出した主から与えられた使命は、人間界の者たちを見守ることだからだ」
line = "「かつて吾輩を作り出した主から与えられた使命は、人間界の者たちを見守ることだからだ」"

[[dialogue]]
speaker = "獅子舞"
# 「それで？　シズハよ、普段はどのようにディーラックと遊んでいるのだ？」
line = "「それで？　シズハよ、普段はどのようにディーラックと遊んでいるのだ？」"

[[dialogue]]
speaker = "シズハ"
# 「えっと、ディーちゃんが檻の中でも遊べるように、携帯機で協力プレイができるゲームをプレイしてますね」
line = "「えっと、ディーちゃんが檻の中でも遊べるように、携帯機で協力プレイができるゲームをプレイしてますね」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん、すっかりハマったのか、最近は私じゃ勝てないくらい上手くなってて……」
line = "「ディーちゃん、すっかりハマったのか、最近は私じゃ勝てないくらい上手くなってて……」"

[[dialogue]]
speaker = "ディーラック"
# 「檻の中だと暇だからネ。最近はオンラインプレイのボイチャで煽ってくるヒトカス共を圧倒してから、雑魚煽りするのが趣味になりつつあるのサ！」
line = "「檻の中だと暇だからネ。最近はオンラインプレイのボイチャで煽ってくるヒトカス共を圧倒してから、雑魚煽りするのが趣味になりつつあるのサ！」"

[[dialogue]]
speaker = "獅子舞"
# 「いかにも負のエネルギーが溜まりそうな、縁起の悪い趣味だな……」
line = "「いかにも負のエネルギーが溜まりそうな、縁起の悪い趣味だな……」"

[[dialogue]]
speaker = "シズハ"
# 「大丈夫！　今年こそディーちゃんが自由に過ごせるように、私、頑張るよ！」
line = "「大丈夫！　今年こそディーちゃんが自由に過ごせるように、私、頑張るよ！」"

[[dialogue]]
speaker = "シズハ"
# （そう……マイナスエネルギーの問題を解決して、ディーちゃんが他のエネルギーでもお腹いっぱいになれるような方法を、見つけてみせるんだから！）
line = "（そう……マイナスエネルギーの問題を解決して、ディーちゃんが他のエネルギーでもお腹いっぱいになれるような方法を、見つけてみせるんだから！）"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……シズハ、それがお前の新年の目標というわけか」
line = "「ふん……シズハ、それがお前の新年の目標というわけか」"

[[dialogue]]
speaker = "シズハ"
# 「はい！　前にディーちゃんに、必ず叶えてみせるって約束をしたので！」
line = "「はい！　前にディーちゃんに、必ず叶えてみせるって約束をしたので！」"

[[dialogue]]
speaker = "ディーラック"
# 「まったく……根拠もない癖に、相変わらず威勢だけはいっちょ前なのサ」
line = "「まったく……根拠もない癖に、相変わらず威勢だけはいっちょ前なのサ」"

[[dialogue]]
speaker = "シズハ"
# 「本気で願えば掴めるって、私は信じてるから。サーシャさんやサチちゃんが、私の前で見せてくれたように」
line = "「本気で願えば掴めるって、私は信じてるから。サーシャさんやサチちゃんが、私の前で見せてくれたように」"

[[dialogue]]
speaker = "シズハ"
# 「それに私は、聖杯の力で変身する魔法少女だもん。だから――」
line = "「それに私は、聖杯の力で変身する魔法少女だもん。だから――」"

[[dialogue]]
speaker = "シズハ"
# 「願いは叶うって信じなくちゃ、何も始まらないでしょ」
line = "「願いは叶うって信じなくちゃ、何も始まらないでしょ」"

[[dialogue]]
speaker = "unk"
# シズハはディーラックの目を見て、力強く微笑んでみせる。その瞳には、ディーラックがこれまで見てきたように、揺らがぬ信念の輝きが宿っていて──
line = "シズハはディーラックの目を見て、力強く微笑んでみせる。その瞳には、ディーラックがこれまで見てきたように、揺らがぬ信念の輝きが宿っていて──"

[[dialogue]]
speaker = "ディーラック"
# 「だったら……せいぜい頑張って、ボクに見せてみなよ」
line = "「だったら……せいぜい頑張って、ボクに見せてみなよ」"

[[dialogue]]
speaker = "ディーラック"
# 「シズハちゃんの愚かな願いが、行き着く先をサ」
line = "「シズハちゃんの愚かな願いが、行き着く先をサ」"

[[dialogue]]
speaker = "シズハ"
# 「うん、見てて、ディーちゃん！　叶えてみせるよ……必ず！」
line = "「うん、見てて、ディーちゃん！　叶えてみせるよ……必ず！」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……」
line = "「ふん……」"

[[dialogue]]
speaker = "unk"
# 獅子舞は２人のやりとりに、どこか満足したように鼻を鳴らすと、背中を向けて去って行くのだった。
line = "獅子舞は２人のやりとりに、どこか満足したように鼻を鳴らすと、背中を向けて去って行くのだった。"

[[dialogue]]
speaker = "unk"
# 一方、その頃。
line = "一方、その頃。"

[[dialogue]]
speaker = "アナ"
# 「リーリアさん、少しいいですか？」
line = "「リーリアさん、少しいいですか？」"

[[dialogue]]
speaker = "リーリア"
# 「あれ？　アナちゃん、お疲れマジカル～☆　どうかしたの？」
line = "「あれ？　アナちゃん、お疲れマジカル～☆　どうかしたの？」"

[[dialogue]]
speaker = "unk"
# リーリアが羽根突きの技を自主練しているところへ、アナがやってきて告げる。
line = "リーリアが羽根突きの技を自主練しているところへ、アナがやってきて告げる。"

[[dialogue]]
speaker = "アナ"
# 「獅子舞さんに勝つ為に考えたことがあるのですが、リーリアさんの意見をお聞きしたいと思いまして」
line = "「獅子舞さんに勝つ為に考えたことがあるのですが、リーリアさんの意見をお聞きしたいと思いまして」"

[[dialogue]]
speaker = "リーリア"
# 「アナちゃん、何か思いついたの？　私に聞きたいことって……？」
line = "「アナちゃん、何か思いついたの？　私に聞きたいことって……？」"

[[dialogue]]
speaker = "アナ"
# 「はい。リーリアさん――」
line = "「はい。リーリアさん――」"

[[dialogue]]
speaker = "アナ"
# 「『<ruby=ハイパーサイメシア>完全記憶能力者</ruby>』であるあなたの目には、獅子舞さんの羽根突き術はどのように映りましたか？」
line = "「『<ruby>完全記憶能力者<rt>ハイパーサイメシア</rt></ruby>』であるあなたの目には、獅子舞さんの羽根突き術はどのように映りましたか？」"

[[dialogue]]
speaker = "unk"
# リーリアが生まれながらに持つ、もう１つの特殊能力。アナはその瞳を見つめながら、静かに問いかけるのだった。
line = "リーリアが生まれながらに持つ、もう１つの特殊能力。アナはその瞳を見つめながら、静かに問いかけるのだった。"
