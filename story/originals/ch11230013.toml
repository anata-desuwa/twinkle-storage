line = "「なっ、おまえ……正気か？」"

[[dialogue]]
speaker = "煌嶺"
# 「魔王さん的には、むしろリーエンちゃんの正気を疑いたい気分だよね～」
line = "「魔王さん的には、むしろリーエンちゃんの正気を疑いたい気分だよね～」"

[[dialogue]]
speaker = "リーエン"
