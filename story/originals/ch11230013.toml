speaker = "煌嶺"
# 「妾の剣に相応しい働きを期待する」
line = "「妾の剣に相応しい働きを期待する」"

[[dialogue]]
speaker = "リーエン"
# 「欲するものはどんな手段を使ってでも……絶対に手に入れる……」
line = "「欲するものはどんな手段を使ってでも……絶対に手に入れる……」"

[[dialogue]]
