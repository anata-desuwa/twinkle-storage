[[dialogue]]
speaker = "unk"
# 第３話,小さな疑問,P
line = "第３話,小さな疑問,P"

[[dialogue]]
speaker = "unk"
# 放課後、アリーナにて。
line = "放課後、アリーナにて。"

[[dialogue]]
speaker = "unk"
# いつものようにリーエンと模擬戦をするはずだったが、この日は少々様子が異なっていた。
line = "いつものようにリーエンと模擬戦をするはずだったが、この日は少々様子が異なっていた。"

[[dialogue]]
speaker = "リーエン"
# 「魔王よ！　今日だけは決して負けるわけにはいかぬ！　全力でいかせてもらうぞ！」
line = "「魔王よ！　今日だけは決して負けるわけにはいかぬ！　全力でいかせてもらうぞ！」"

[[dialogue]]
speaker = "リーエン"
# 「あたしは陛下に勝利を捧げる！　これは御前試合だ！」
line = "「あたしは陛下に勝利を捧げる！　これは御前試合だ！」"

[[dialogue]]
speaker = "煌嶺"
# 「リーエンちゃん、頑張って～！　負けたら承知しないぞ～！」
line = "「リーエンちゃん、頑張って～！　負けたら承知しないぞ～！」"

[[dialogue]]
speaker = "煌嶺"
# 「魔王さんも無様な戦いをしたら処しちゃうからね～♪」
line = "「魔王さんも無様な戦いをしたら処しちゃうからね～♪」"

[[dialogue]]
speaker = "リーエン"
# 「クッ、おまえまで陛下から応援を……ず、ずるいぞっ！」
line = "「クッ、おまえまで陛下から応援を……ず、ずるいぞっ！」"

[[dialogue]]
speaker = "unk"
# 応援なのか、あれ？
line = "応援なのか、あれ？"

[[dialogue]]
speaker = "煌嶺"
# 「では、始め～♪」
line = "「では、始め～♪」"

[[dialogue]]
speaker = "リーエン"
# 「うおおおおおおおおっ！！！！」
line = "「うおおおおおおおおっ！！！！」"

[[dialogue]]
speaker = "リーエン"
# 「煌け新星ッ──ノヴァフォォォォーーーームッ！！！！」
line = "「煌け新星ッ──ノヴァフォォォォーーーームッ！！！！」"

[[dialogue]]
speaker = "リーエン"
# 「どうだ、魔王！　これがあたしの全力……陛下の剣だ！」
line = "「どうだ、魔王！　これがあたしの全力……陛下の剣だ！」"

[[dialogue]]
speaker = "unk"
# これがリーエンのノヴァフォーム……
line = "これがリーエンのノヴァフォーム……"

[[dialogue]]
speaker = "リーエン"
# 「おまえが魔王の力を引き出せない以上、こちらもノヴァフォームを封印していたがッ！」
line = "「おまえが魔王の力を引き出せない以上、こちらもノヴァフォームを封印していたがッ！」"

[[dialogue]]
speaker = "リーエン"
# 「陛下の御前だ、この圧倒的な力によって、勝利を掴む！！」
line = "「陛下の御前だ、この圧倒的な力によって、勝利を掴む！！」"

[[dialogue]]
speaker = "リーエン"
# 「往くぞ、魔王！　……死ぬなよ」
line = "「往くぞ、魔王！　……死ぬなよ」"

[[dialogue]]
speaker = "リーエン"
# 「おおおおおおおおおおーーーーーーーっ！！！！」
line = "「おおおおおおおおおおーーーーーーーっ！！！！」"

[[dialogue]]
speaker = "unk"
# リーエンの攻撃は今までになく苛烈を極めた。
line = "リーエンの攻撃は今までになく苛烈を極めた。"

[[dialogue]]
speaker = "unk"
# それを何とか凌ぎながら攻撃を繰り出す──そして……
line = "それを何とか凌ぎながら攻撃を繰り出す──そして……"

[[dialogue]]
speaker = "リーエン"
# 「はぁっ……はぁっ……はぁっ……」
line = "「はぁっ……はぁっ……はぁっ……」"

[[dialogue]]
speaker = "リーエン"
# 「やったぞ……ついに魔王に打ち勝った……あたしの勝利だ！」
line = "「やったぞ……ついに魔王に打ち勝った……あたしの勝利だ！」"

[[dialogue]]
speaker = "unk"
# 悔しいけど完敗だよ
line = "悔しいけど完敗だよ"

[[dialogue]]
speaker = "リーエン"
# 「フッ、全力のあたしには、魔王も及ばなかったようだな」
line = "「フッ、全力のあたしには、魔王も及ばなかったようだな」"

[[dialogue]]
speaker = "リーエン"
# 「だが、ノヴァフォーム相手に健闘したと思うぞ。さすが魔王だ」
line = "「だが、ノヴァフォーム相手に健闘したと思うぞ。さすが魔王だ」"

[[dialogue]]
speaker = "煌嶺"
# 「うんうん、いい勝負だったね～。私も満足だよ～♪」
line = "「うんうん、いい勝負だったね～。私も満足だよ～♪」"

[[dialogue]]
speaker = "リーエン"
# 「ハッ、陛下！　御身のため、勝利を掴みました」
line = "「ハッ、陛下！　御身のため、勝利を掴みました」"

[[dialogue]]
speaker = "煌嶺"
# 「リーエンちゃんも強くなったみたいだね。最近は魔王さんとよく模擬戦やってるって聞いたけど」
line = "「リーエンちゃんも強くなったみたいだね。最近は魔王さんとよく模擬戦やってるって聞いたけど」"

[[dialogue]]
speaker = "リーエン"
# 「ご覧の通り、魔王はあたしにこそ及びませんが、なかなかの剛の者です。陛下の配下に加わる資格は備えているでしょう」
line = "「ご覧の通り、魔王はあたしにこそ及びませんが、なかなかの剛の者です。陛下の配下に加わる資格は備えているでしょう」"

[[dialogue]]
speaker = "煌嶺"
# 「うん、それはだいたい知ってる。でも、ちょ～～っと仲良くしすぎじゃない？」
line = "「うん、それはだいたい知ってる。でも、ちょ～～っと仲良くしすぎじゃない？」"

[[dialogue]]
speaker = "リーエン"
# 「え？　そ、それは……」
line = "「え？　そ、それは……」"

[[dialogue]]
speaker = "煌嶺"
# 「リーエンちゃんは私の護衛だよね？　それなのに、最近は魔王さんと一緒にいる時間の方が多いんじゃないかな～って」
line = "「リーエンちゃんは私の護衛だよね？　それなのに、最近は魔王さんと一緒にいる時間の方が多いんじゃないかな～って」"

[[dialogue]]
speaker = "煌嶺"
# 「ねえ、もしかして……私から離れて彼のものになるつもりだったりする？」
line = "「ねえ、もしかして……私から離れて彼のものになるつもりだったりする？」"

[[dialogue]]
speaker = "リーエン"
# 「そのような心積もり、一切ありませぬ！　もし我が忠誠をお疑いなら、疾くこの首をお刎ね下さい！！」
line = "「そのような心積もり、一切ありませぬ！　もし我が忠誠をお疑いなら、疾くこの首をお刎ね下さい！！」"

[[dialogue]]
speaker = "unk"
# そんなことは絶対にさせない
line = "そんなことは絶対にさせない"

[[dialogue]]
speaker = "リーエン"
# 「おい！　魔王には関係ないだろう！」
line = "「おい！　魔王には関係ないだろう！」"

[[dialogue]]
speaker = "煌嶺"
# 「じゃーん、ここに取り出しましたる短刀を……こうしてリーエンちゃんの首筋にぴた～ってくっつけたら……」
line = "「じゃーん、ここに取り出しましたる短刀を……こうしてリーエンちゃんの首筋にぴた～ってくっつけたら……」"

[[dialogue]]
speaker = "unk"
# っ！？　や、やめろっ！
line = "っ！？　や、やめろっ！"

[[dialogue]]
speaker = "煌嶺"
# 「だって。ほら、すっごく動揺してるじゃない。大切にされてるね～」
line = "「だって。ほら、すっごく動揺してるじゃない。大切にされてるね～」"

[[dialogue]]
speaker = "リーエン"
# 「ち、違います！　魔王はただ、誰に対しても優しい、博愛の心を持つ者だからっ……」
line = "「ち、違います！　魔王はただ、誰に対しても優しい、博愛の心を持つ者だからっ……」"

[[dialogue]]
speaker = "煌嶺"
# 「リーエンちゃんはこう言ってるけど、そうなの、魔王さん？」
line = "「リーエンちゃんはこう言ってるけど、そうなの、魔王さん？」"

[[dialogue]]
speaker = "unk"
# 誰よりも大切にしてる
line = "誰よりも大切にしてる"

[[dialogue]]
speaker = "unk"
# リーエンは特別だ
line = "リーエンは特別だ"

[[dialogue]]
speaker = "リーエン"
