line = "「リーエンちゃん、確かに魔王さんはものすご～～くお人好しちゃんだけどね……」"

[[dialogue]]
speaker = "煌嶺"
# 「敵になるかもしれない相手と呑気に模擬戦するほど、お間抜けさんじゃないと思うな」
line = "「敵になるかもしれない相手と呑気に模擬戦するほど、お間抜けさんじゃないと思うな」"

[[dialogue]]
speaker = "リーエン"
# 「ええと……やっぱりあたしにはわかりません……」
line = "「ええと……やっぱりあたしにはわかりません……」"

[[dialogue]]
speaker = "煌嶺"
# 「後は魔王さんから直接聞いて。じゃあ、私はそろそろ行くね～。いいもの見せてくれてありがと～」
line = "「後は魔王さんから直接聞いて。じゃあ、私はそろそろ行くね～。いいもの見せてくれてありがと～」"

[[dialogue]]
speaker = "煌嶺"
