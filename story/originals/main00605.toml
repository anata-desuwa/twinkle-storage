[[dialogue]]
speaker = "unk"
# 第６話,焔の魔女,B
line = "第６話,焔の魔女,B"

[[dialogue]]
speaker = "セドナ"
# 「魔導三式──<ruby=イフリータ>炎の女王</ruby>」
line = "「魔導三式──<ruby>炎の女王<rt>イフリータ</rt></ruby>」"

[[dialogue]]
speaker = "アポロ"
# 「──づううぅっ！？」
line = "「──づううぅっ！？」"

[[dialogue]]
speaker = "エリシア"
# 「……！？」
line = "「……！？」"

[[dialogue]]
speaker = "クロト"
# 「な……！」
line = "「な……！」"

[[dialogue]]
speaker = "unk"
# 目の前を黒炎が横切った。
line = "目の前を黒炎が横切った。"

[[dialogue]]
speaker = "unk"
# 炸裂した火花はそのままアポロを飲み込んでゆき、地獄のような灼熱をその場に顕現させる。
line = "炸裂した火花はそのままアポロを飲み込んでゆき、地獄のような灼熱をその場に顕現させる。"

[[dialogue]]
speaker = "unk"
# アナ──でもない。
line = "アナ──でもない。"

[[dialogue]]
speaker = "unk"
# だって、彼女の星術は今も使えないままだ。
line = "だって、彼女の星術は今も使えないままだ。"

[[dialogue]]
speaker = "unk"
# なら、なぜ──
line = "なら、なぜ──"

[[dialogue]]
speaker = "セドナ"
# 「撃て」
line = "「撃て」"

[[dialogue]]
speaker = "ネビュラ隊員Ａ"
# 「──イエス、マム！」
line = "「──イエス、マム！」"

[[dialogue]]
speaker = "アポロ"
# 「っ──くっ──」
line = "「っ──くっ──」"

[[dialogue]]
speaker = "ギエル"
# 「新手──バカな、星力はすべて封じているはずなのに──」
line = "「新手──バカな、星力はすべて封じているはずなのに──」"

[[dialogue]]
speaker = "unk"
# 驟雨のごとき一斉掃射がアポロとギエルを蜂の巣にする。
line = "驟雨のごとき一斉掃射がアポロとギエルを蜂の巣にする。"

[[dialogue]]
speaker = "unk"
# その弾丸は、先の炎と同じ黒き光で出来ていた。
line = "その弾丸は、先の炎と同じ黒き光で出来ていた。"

[[dialogue]]
speaker = "unk"
# そのどれも、見たこともない攻撃で……
line = "そのどれも、見たこともない攻撃で……"

[[dialogue]]
speaker = "セドナ"
# 「『仮面の少女』の動向を<ruby=うかが>窺</ruby>っていたつもりだったが──思いのほか<ruby=ひっぱく>逼迫</ruby>した事態となったな」
line = "「『仮面の少女』の動向を<ruby>窺<rt>うかが</rt></ruby>っていたつもりだったが──思いのほか<ruby>逼迫<rt>ひっぱく</rt></ruby>した事態となったな」"

[[dialogue]]
speaker = "セドナ"
# 「それに、興味深いことも聞けた」
line = "「それに、興味深いことも聞けた」"

[[dialogue]]
speaker = "unk"
# その全てを指揮した人物は、悠然と割れたコンクリートに佇んでいた。
line = "その全てを指揮した人物は、悠然と割れたコンクリートに佇んでいた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「み、味方……？」
line = "「み、味方……？」"

[[dialogue]]
speaker = "サーシャ"
# 「みたいだけど」
line = "「みたいだけど」"

[[dialogue]]
speaker = "ルリエル"
# （アナさんっ！）
line = "（アナさんっ！）"

[[dialogue]]
speaker = "アナ"
# （データにないです）
line = "（データにないです）"

[[dialogue]]
speaker = "unk"
# 見覚えのない顔立ち、服装。
line = "見覚えのない顔立ち、服装。"

[[dialogue]]
speaker = "unk"
# その場の誰も彼女らに覚えはないようで、しかも駆けつけてきたのは一人や二人ではなかった。
line = "その場の誰も彼女らに覚えはないようで、しかも駆けつけてきたのは一人や二人ではなかった。"

[[dialogue]]
speaker = "アイリーン"
# 「セドナ長官。ターゲットの沈黙を確認、しかし依然として鼓動を感じます」
line = "「セドナ長官。ターゲットの沈黙を確認、しかし依然として鼓動を感じます」"

[[dialogue]]
speaker = "セドナ"
# 「ご苦労。古来より駄々っ子には灸を据えるものだ」
line = "「ご苦労。古来より駄々っ子には灸を据えるものだ」"

[[dialogue]]
speaker = "unk"
# 黒炎の術式が天を灼く。
line = "黒炎の術式が天を灼く。"

[[dialogue]]
speaker = "unk"
# すると、張られていた障壁が散開して効力を失った。
line = "すると、張られていた障壁が散開して効力を失った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……力が使える！　やっと戻ったわよ、みんな！」
line = "「っ……力が使える！　やっと戻ったわよ、みんな！」"

[[dialogue]]
speaker = "ルリエル"
# 「おおおっ！　あ、安心しますね──これなら百人力です！」
line = "「おおおっ！　あ、安心しますね──これなら百人力です！」"

[[dialogue]]
speaker = "ソフィア"
# 「油断しないの、ルリ。まだ終わってないです」
line = "「油断しないの、ルリ。まだ終わってないです」"

[[dialogue]]
speaker = "unk"
# 再び星力をみなぎらせて、アポロの消えた砂塵を見る。
line = "再び星力をみなぎらせて、アポロの消えた砂塵を見る。"

[[dialogue]]
speaker = "unk"
# すると……
line = "すると……"

[[dialogue]]
speaker = "アポロ"
# 「ホンットに……どいつも、こいつも……！」
line = "「ホンットに……どいつも、こいつも……！」"

[[dialogue]]
speaker = "アイリーン"
# 「っ……！？　まだ戦えるなんて──不死身ですかっ！？」
line = "「っ……！？　まだ戦えるなんて──不死身ですかっ！？」"

[[dialogue]]
speaker = "セドナ"
# 「無力化するぞ。手を貸せ、<ruby=スターナイト>星騎士</ruby>のひよっ子ども」
line = "「無力化するぞ。手を貸せ、<ruby>星騎士<rt>スターナイト</rt></ruby>のひよっ子ども」"

[[dialogue]]
speaker = "クロト"
# 「どなたか存じ上げませんが──了解っ！」
line = "「どなたか存じ上げませんが──了解っ！」"
