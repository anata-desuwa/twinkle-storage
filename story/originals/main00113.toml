[[dialogue]]
speaker = "unk"
# 第１７話,誰かを救うために,B
line = "第１７話,誰かを救うために,B"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「ィィィ！」
line = "「ィィィ！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「ウィイイイイイ！！」
line = "「ウィイイイイイ！！」"

[[dialogue]]
speaker = "unk"
# 俺が姿を現すと、モンスターたちはエサに群がるようにこちらへ視線を向けてくる。
line = "俺が姿を現すと、モンスターたちはエサに群がるようにこちらへ視線を向けてくる。"

[[dialogue]]
speaker = "unk"
# こんな真似はもう何度も経験したが、ここまで絶望的な大群を相手にするのは初めてだった。そして最後になるかもしれない。
line = "こんな真似はもう何度も経験したが、ここまで絶望的な大群を相手にするのは初めてだった。そして最後になるかもしれない。"

[[dialogue]]
speaker = "クロト"
# 「おおおお────！！」
line = "「おおおお────！！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイ──ッ！」
line = "「イイイイ──ッ！」"

[[dialogue]]
speaker = "unk"
# 押し寄せるモンスターの波へ拳の乱れ打ちを浴びせていく。
line = "押し寄せるモンスターの波へ拳の乱れ打ちを浴びせていく。"

[[dialogue]]
speaker = "unk"
# その手ごたえは今までに類を見ないほど硬く、もしかするとＳランクをも上回る強度かもしれなかった。
line = "その手ごたえは今までに類を見ないほど硬く、もしかするとＳランクをも上回る強度かもしれなかった。"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイィィィ……！！」
line = "「イイイィィィ……！！」"

[[dialogue]]
speaker = "クロト"
# 「──まだまだッ！」
line = "「──まだまだッ！」"

[[dialogue]]
speaker = "unk"
# これが積み重ねてきた特訓の成果というものか。
line = "これが積み重ねてきた特訓の成果というものか。"

[[dialogue]]
speaker = "unk"
# 入学前ならとうに地を舐めていただろう戦闘を経ても、俺の身体は限界を越えて稼働していた。
line = "入学前ならとうに地を舐めていただろう戦闘を経ても、俺の身体は限界を越えて稼働していた。"

[[dialogue]]
speaker = "unk"
# 脳裏によみがえるのは、かつて連れ去られたモンスターの巣窟の記憶。あるいはこれが、走馬灯というやつだろうか。
line = "脳裏によみがえるのは、かつて連れ去られたモンスターの巣窟の記憶。あるいはこれが、走馬灯というやつだろうか。"

[[dialogue]]
speaker = "unk"
# あの時も死を覚悟した。でも今は、自らそんな死地に飛び込んでいる。
line = "あの時も死を覚悟した。でも今は、自らそんな死地に飛び込んでいる。"

[[dialogue]]
speaker = "unk"
# あの時の俺とは、もう違う。違うはずだ。
line = "あの時の俺とは、もう違う。違うはずだ。"

[[dialogue]]
speaker = "unk"
# ……だけど、本当にそうなのだろうか。
line = "……だけど、本当にそうなのだろうか。"

[[dialogue]]
speaker = "クロト"
# 「（いくら強くなったって、敵と戦うのは怖い。死ぬのだって、怖い……）」
line = "「（いくら強くなったって、敵と戦うのは怖い。死ぬのだって、怖い……）」"

[[dialogue]]
speaker = "unk"
# 気が付くと、俺は戦いながら泣いていた。
line = "気が付くと、俺は戦いながら泣いていた。"

[[dialogue]]
speaker = "？？？"
# 『──怪我はないか、少年』
line = "『──怪我はないか、少年』"

[[dialogue]]
speaker = "unk"
# モンスターと対峙して、怖くなかったことなんてない。学園に入る前も、星騎士になってからも、本当はずっと怖かった。
line = "モンスターと対峙して、怖くなかったことなんてない。学園に入る前も、星騎士になってからも、本当はずっと怖かった。"

[[dialogue]]
speaker = "unk"
# 奴らは当たり前のように俺を見つけた。はぐれモンスターは数も少ないし、弱い個体ばかりだったが、奴らを倒した後はいつも足が震えていた。
line = "奴らは当たり前のように俺を見つけた。はぐれモンスターは数も少ないし、弱い個体ばかりだったが、奴らを倒した後はいつも足が震えていた。"

[[dialogue]]
speaker = "？？？"
# 『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』
line = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"

[[dialogue]]
speaker = "unk"
# だけど、俺は「強くあれ」と言われた。
line = "だけど、俺は「強くあれ」と言われた。"

[[dialogue]]
speaker = "unk"
# 俺の体質も、治るようなものでないことは気が付いていた。だから俺は、強くなろうと思った。
line = "俺の体質も、治るようなものでないことは気が付いていた。だから俺は、強くなろうと思った。"

[[dialogue]]
speaker = "？？？"
# 『君の両手には……他者を救う温かさが宿っている』
line = "『君の両手には……他者を救う温かさが宿っている』"

[[dialogue]]
speaker = "unk"
# 戦うのは怖い。生き残るのは苦しい。残る傷跡は痛い。
line = "戦うのは怖い。生き残るのは苦しい。残る傷跡は痛い。"

[[dialogue]]
speaker = "unk"
# だけどそんなの、あの人だってきっと同じだったはずだ。
line = "だけどそんなの、あの人だってきっと同じだったはずだ。"

[[dialogue]]
speaker = "unk"
# 俺は──強くなればきっと、いつか恐怖は消えるのだと思っていた。
line = "俺は──強くなればきっと、いつか恐怖は消えるのだと思っていた。"

[[dialogue]]
speaker = "unk"
# けれど今、死を前にして気づいた。
line = "けれど今、死を前にして気づいた。"

[[dialogue]]
speaker = "unk"
# たとえどんなに修行を積もうと、心根に刻まれた恐怖心は消えない。
line = "たとえどんなに修行を積もうと、心根に刻まれた恐怖心は消えない。"

[[dialogue]]
speaker = "unk"
# でも……それでいいんだ。
line = "でも……それでいいんだ。"

[[dialogue]]
speaker = "unk"
# 俺を助けてくれたあの人だって、より強大な力を知りつつも立ち向かってくれたはずだから。
line = "俺を助けてくれたあの人だって、より強大な力を知りつつも立ち向かってくれたはずだから。"

[[dialogue]]
speaker = "unk"
# そう思うと、いつしか涙は消えていた。
line = "そう思うと、いつしか涙は消えていた。"

[[dialogue]]
speaker = "クロト"
# 「はは……吹っ切れはしたけど。なかなか、厳しいな」
line = "「はは……吹っ切れはしたけど。なかなか、厳しいな」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイイィィ……！！」
line = "「イイイイイィィ……！！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイ～～～ッ！！」
line = "「イイイイ～～～ッ！！」"

[[dialogue]]
speaker = "unk"
# 限界が来て膝をつく。見上げれば、まだまだわんさか残る敵の大群。
line = "限界が来て膝をつく。見上げれば、まだまだわんさか残る敵の大群。"

[[dialogue]]
speaker = "unk"
# 既に４、５体は討伐したはずだが──この量はどう見ても尋常じゃない。
line = "既に４、５体は討伐したはずだが──この量はどう見ても尋常じゃない。"

[[dialogue]]
speaker = "クロト"
# 「でも……最低限の時間は、稼いだぞ」
line = "「でも……最低限の時間は、稼いだぞ」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイイィィ……！！」
line = "「イイイイイィィ……！！」"

[[dialogue]]
speaker = "unk"
# ひたすら攻撃を引きつけることで被害も最小限に抑えた。
line = "ひたすら攻撃を引きつけることで被害も最小限に抑えた。"

[[dialogue]]
speaker = "unk"
# たとえ俺が力尽きても、きっともうすぐ、星徒会のみんなならこの事態に駆けつけてくれる。
line = "たとえ俺が力尽きても、きっともうすぐ、星徒会のみんなならこの事態に駆けつけてくれる。"

[[dialogue]]
speaker = "unk"
# だから──
line = "だから──"

[[dialogue]]
speaker = "クロト"
# 「これで、最後だ──オオオオオォォォォォッッッ！」
line = "「これで、最後だ──オオオオオォォォォォッッッ！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイイイィィ……！！」
line = "「イイイイイィィ……！！」"

[[dialogue]]
speaker = "クロト"
# 「（ごめん、ヴィーナス──約束、果たせなくて──）」
line = "「（ごめん、ヴィーナス──約束、果たせなくて──）」"

[[dialogue]]
speaker = "unk"
# 最後の力をふり絞っての突撃──御前試合を行うことすらできないことを、俺は心の中でヴィーナスに詫びた。
line = "最後の力をふり絞っての突撃──御前試合を行うことすらできないことを、俺は心の中でヴィーナスに詫びた。"

[[dialogue]]
speaker = "unk"
# その、刹那──
line = "その、刹那──"

[[dialogue]]
speaker = "unk"
# <size=30>バカね、あんたは──そんなことだから目が離せないって言われるのよ</size>
line = "<size=30>バカね、あんたは──そんなことだから目が離せないって言われるのよ</size>"

[[dialogue]]
speaker = "クロト"
# 「えっ────」
line = "「えっ────」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイィィィ～～～ッ！！」
line = "「イイイィィィ～～～ッ！！」"

[[dialogue]]
speaker = "ダークキングフワッチ"
# 「イイイィィィ～～～ッ！！」
line = "「イイイィィィ～～～ッ！！」"

[[dialogue]]
speaker = "クロト"
# 「っはぁ、はぁ、はぁ……生き残った──のか……？」
line = "「っはぁ、はぁ、はぁ……生き残った──のか……？」"

[[dialogue]]
speaker = "unk"
# 信じられない光景だった。なにかを察知して一斉に牙を剥いたモンスター達が、俺の振り抜いた拳ひとつにまとめて打ちのめされていた。
line = "信じられない光景だった。なにかを察知して一斉に牙を剥いたモンスター達が、俺の振り抜いた拳ひとつにまとめて打ちのめされていた。"

[[dialogue]]
speaker = "unk"
# 暴虐の限りを尽くしていた大群が消滅していく……。
line = "暴虐の限りを尽くしていた大群が消滅していく……。"

[[dialogue]]
speaker = "クロト"
# 「今のは……」
line = "「今のは……」"

[[dialogue]]
speaker = "unk"
# 特訓の成果──いや、それだけでは説明もつかないあの煌めきはなんだ。
line = "特訓の成果──いや、それだけでは説明もつかないあの煌めきはなんだ。"

[[dialogue]]
speaker = "unk"
# それに、胸の奥から感じたあの疼き……
line = "それに、胸の奥から感じたあの疼き……"

[[dialogue]]
speaker = "クロト"
# 「おかしくないか、俺──今の力……」
line = "「おかしくないか、俺──今の力……」"

[[dialogue]]
speaker = "unk"
# まだ２０体以上残っていたＳランク相当のモンスターを、一撃で消滅させる威力。
line = "まだ２０体以上残っていたＳランク相当のモンスターを、一撃で消滅させる威力。"

[[dialogue]]
speaker = "unk"
# それだけではない。あれだけ傷ついていたはずの体も、星力も、気が付いたら全快していた。
line = "それだけではない。あれだけ傷ついていたはずの体も、星力も、気が付いたら全快していた。"

[[dialogue]]
speaker = "unk"
# 服だけはボロボロで、自分の血で汚れているのに、当の体には傷一つない。まるで戦闘前の状態に戻ったかのような万全状態だ。
line = "服だけはボロボロで、自分の血で汚れているのに、当の体には傷一つない。まるで戦闘前の状態に戻ったかのような万全状態だ。"

[[dialogue]]
speaker = "クロト"
# 「（窮地に陥ると助けてくれる力……とか？　そんな都合のいい力はないよな……）」
line = "「（窮地に陥ると助けてくれる力……とか？　そんな都合のいい力はないよな……）」"

[[dialogue]]
speaker = "unk"
# いや──それとも、逆に考えて。
line = "いや──それとも、逆に考えて。"

[[dialogue]]
speaker = "unk"
# この湧き上がった力こそ、ヴィーナスが俺のことを求める根拠なのか……？
line = "この湧き上がった力こそ、ヴィーナスが俺のことを求める根拠なのか……？"

[[dialogue]]
speaker = "unk"
# ──そんなことを考えていた時だった。
line = "──そんなことを考えていた時だった。"

[[dialogue]]
speaker = "？？？"
# 「おにーさん、やるね！」
line = "「おにーさん、やるね！」"

[[dialogue]]
speaker = "クロト"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# どこからか響いた軽快な声。
line = "どこからか響いた軽快な声。"

[[dialogue]]
speaker = "unk"
# その正体は、たちまち俺の前に現れた。
line = "その正体は、たちまち俺の前に現れた。"
