# 「んっ<emoji=heart04>　ちょっ、何ち○ぽビクビクさせてんの！？　まさか想像して興奮してんの！？　ヘンタイ！」
line = "「んっ<emoji=heart04>　ちょっ、何ち○ぽビクビクさせてんの！？　まさか想像して興奮してんの！？　ヘンタイ！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ、エセ聖女でもさすがにやりすぎたわね……。つか何よ、神官として罪を受け入れますって。ダメに決まってんでしょうが」
line = "「はぁ、エセ聖女でもさすがにやりすぎたわね……。つか何よ、神官として罪を受け入れますって。ダメに決まってんでしょうが」"

[[dialogue]]
speaker = "イレーナ"
# 「しかもあんな声出して恥ずかしい……こら、思い出すんじゃないわよ。ち○ぽ脈打ってるのわかるんだからね」
line = "「しかもあんな声出して恥ずかしい……こら、思い出すんじゃないわよ。ち○ぽ脈打ってるのわかるんだからね」"

[[dialogue]]
speaker = "イレーナ"
# 「そもそも、あんた何しにここに来たのよ。まさか神官を襲いに来たわけじゃないでしょうね」
line = "「そもそも、あんた何しにここに来たのよ。まさか神官を襲いに来たわけじゃないでしょうね」"

[[dialogue]]
speaker = "クロト"
# 「もちろんイレーナに会いにだけど」
line = "「もちろんイレーナに会いにだけど」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁっ！？」
line = "「はぁっ！？」"

[[dialogue]]
speaker = "unk"
# 好きな人に会いに来るのに理由なんていらない。
line = "好きな人に会いに来るのに理由なんていらない。"

[[dialogue]]
speaker = "unk"
# 礼拝の後だから遠慮しようかとも思ったけど、やっぱりイレーナと話がしたかった。それだけだ。
line = "礼拝の後だから遠慮しようかとも思ったけど、やっぱりイレーナと話がしたかった。それだけだ。"

[[dialogue]]
speaker = "イレーナ"
# 「そう言えば女が喜ぶと思ってるの？　単純ね。５０点……いや３０点よ」
line = "「そう言えば女が喜ぶと思ってるの？　単純ね。５０点……いや３０点よ」"

[[dialogue]]
speaker = "イレーナ"
# 「でもまぁ……嫌いではないわよ。バーカ」
line = "「でもまぁ……嫌いではないわよ。バーカ」"
