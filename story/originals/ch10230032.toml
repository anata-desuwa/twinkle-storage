[[dialogue]]
speaker = "unk"
# 第２話,友チョコと本命チョコと,P
line = "第２話,友チョコと本命チョコと,P"

[[dialogue]]
speaker = "シャロン"
# 「うぅ……記憶が曖昧ですけど、私、会長さまとイレーナさまにご迷惑をおかけしてしまったような……？」
line = "「うぅ……記憶が曖昧ですけど、私、会長さまとイレーナさまにご迷惑をおかけしてしまったような……？」"

[[dialogue]]
speaker = "シャロン"
# 「お詫びと日頃の感謝を込めてプレゼントをお渡ししたいのですけど……」
line = "「お詫びと日頃の感謝を込めてプレゼントをお渡ししたいのですけど……」"

[[dialogue]]
speaker = "シャロン"
# 「シスターが特定の方に入れ込むのはよろしくないと、イレーナさまはおっしゃっていましたし……バレンタインはあまりお好きではなさそうでしたし……」
line = "「シスターが特定の方に入れ込むのはよろしくないと、イレーナさまはおっしゃっていましたし……バレンタインはあまりお好きではなさそうでしたし……」"

[[dialogue]]
speaker = "シャロン"
# 「他に何かいい方法は──」
line = "「他に何かいい方法は──」"

[[dialogue]]
speaker = "unk"
# どうしたの、シャロン
line = "どうしたの、シャロン"

[[dialogue]]
speaker = "シャロン"
# 「きゃっ！？　か、会長さま」
line = "「きゃっ！？　か、会長さま」"

[[dialogue]]
speaker = "シャロン"
# （ど、どうしましょうっ！？　会長さまに直接尋ねるのは、ちょっと恥ずかしいです──そうだっ！）
line = "（ど、どうしましょうっ！？　会長さまに直接尋ねるのは、ちょっと恥ずかしいです──そうだっ！）"

[[dialogue]]
speaker = "シャロン"
# 「も、もうじきバレンタインですよねっ！」
line = "「も、もうじきバレンタインですよねっ！」"

[[dialogue]]
speaker = "シャロン"
# 「ちょうどいい機会ですし、日頃の感謝を込めて、イレーナさまにプレゼントをお贈りしたいのですけど……」
line = "「ちょうどいい機会ですし、日頃の感謝を込めて、イレーナさまにプレゼントをお贈りしたいのですけど……」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまはあまりバレンタインを好ましく思っていないようでしたので、ご迷惑になってしまうかもと思い……どうでしょうか？」
line = "「イレーナさまはあまりバレンタインを好ましく思っていないようでしたので、ご迷惑になってしまうかもと思い……どうでしょうか？」"

[[dialogue]]
speaker = "unk"
# 友チョコって文化もあるし、いいと思う
line = "友チョコって文化もあるし、いいと思う"

[[dialogue]]
speaker = "シャロン"
# 「友チョコ……お友達同士でチョコレートを贈り合うのですか……！　なるほど、そのような文化もあるんですね！」
line = "「友チョコ……お友達同士でチョコレートを贈り合うのですか……！　なるほど、そのような文化もあるんですね！」"

[[dialogue]]
speaker = "シャロン"
# 「親友のイレーナさまに贈るなら問題ありませんよねっ！　ありがとうございます、会長さまっ！」
line = "「親友のイレーナさまに贈るなら問題ありませんよねっ！　ありがとうございます、会長さまっ！」"

[[dialogue]]
speaker = "シャロン"
# （イレーナさまには友チョコをお渡しすることに決めましたけど、会長さまには──）
line = "（イレーナさまには友チョコをお渡しすることに決めましたけど、会長さまには──）"

[[dialogue]]
speaker = "イレーナ"
# 「どうしたの、シャロン」
line = "「どうしたの、シャロン」"

[[dialogue]]
speaker = "シャロン"
# 「イ、イレーナさまっ！　その……バレンタインについて、ひとつご相談が……」
line = "「イ、イレーナさまっ！　その……バレンタインについて、ひとつご相談が……」"

[[dialogue]]
speaker = "シャロン"
# 「前にシスターは特定の方に入れ込むのはよろしくないとおっしゃっていましたけれど……」
line = "「前にシスターは特定の方に入れ込むのはよろしくないとおっしゃっていましたけれど……」"

[[dialogue]]
speaker = "シャロン"
# 「あの……会長さまにチョコレートをお渡ししてもよろしいものでしょうか……？」
line = "「あの……会長さまにチョコレートをお渡ししてもよろしいものでしょうか……？」"

[[dialogue]]
speaker = "イレーナ"
# 「んー……それって、本命？」
line = "「んー……それって、本命？」"

[[dialogue]]
speaker = "シャロン"
# 「あ、えっ、えっと、その……は、はい……」
line = "「あ、えっ、えっと、その……は、はい……」"

[[dialogue]]
speaker = "イレーナ"
# 「なら問題ないでしょ、好きなように渡しちゃえば？」
line = "「なら問題ないでしょ、好きなように渡しちゃえば？」"

[[dialogue]]
speaker = "シャロン"
# 「えっ！？　でも──」
line = "「えっ！？　でも──」"

[[dialogue]]
speaker = "イレーナ"
# 「教皇庁の教えじゃ貞淑にって言ってるけど、本命がちゃんと決まってるなら大丈夫でしょ。だいたい、流星教皇だって妻子持ちだし」
line = "「教皇庁の教えじゃ貞淑にって言ってるけど、本命がちゃんと決まってるなら大丈夫でしょ。だいたい、流星教皇だって妻子持ちだし」"

[[dialogue]]
speaker = "イレーナ"
# 「それにシャロンの性格的にも、スイッチ入っちゃったんなら、もう止まんなくない？」
line = "「それにシャロンの性格的にも、スイッチ入っちゃったんなら、もう止まんなくない？」"

[[dialogue]]
speaker = "シャロン"
# 「は、はいっ！　さすがは大親友のイレーナさま……私のことをよくご存じなんですねっ、嬉しいです。ふふ」
line = "「は、はいっ！　さすがは大親友のイレーナさま……私のことをよくご存じなんですねっ、嬉しいです。ふふ」"

[[dialogue]]
speaker = "イレーナ"
# 「ちょっ……大親友はやめなさいってば」
line = "「ちょっ……大親友はやめなさいってば」"

[[dialogue]]
speaker = "unk"
# シャロンに呼び出されて大聖堂に向かうと、そこにはイレーナの姿もあった。
line = "シャロンに呼び出されて大聖堂に向かうと、そこにはイレーナの姿もあった。"

[[dialogue]]
speaker = "シャロン"
# 「会長さま、イレーナさま。お呼び立てに応じて、足を運んでいただき、ありがとうございます」
line = "「会長さま、イレーナさま。お呼び立てに応じて、足を運んでいただき、ありがとうございます」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロンがあんたに言いたいことがあるんだって」
line = "「シャロンがあんたに言いたいことがあるんだって」"

[[dialogue]]
speaker = "unk"
# シャロンがイレーナに言いたいことがあるんだろ？
line = "シャロンがイレーナに言いたいことがあるんだろ？"

[[dialogue]]
speaker = "イレーナ"
# 「は？　なんであたしに──」
line = "「は？　なんであたしに──」"

[[dialogue]]
speaker = "シャロン"
# 「お呼び立てしたのは他でもありません。おふたりに私から伝えたいことがありましたので……まずはイレーナさま」
line = "「お呼び立てしたのは他でもありません。おふたりに私から伝えたいことがありましたので……まずはイレーナさま」"

[[dialogue]]
speaker = "シャロン"
# 「私、イレーナさまのことが大好きなんですっ！」
line = "「私、イレーナさまのことが大好きなんですっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「あ、あたし……？　言う相手、間違ってんでしょ」
line = "「あ、あたし……？　言う相手、間違ってんでしょ」"

[[dialogue]]
speaker = "シャロン"
# 「いいえ、イレーナさまで間違いありません。何度迷惑をかけても優しく接していただき、感謝の言葉もありません」
line = "「いいえ、イレーナさまで間違いありません。何度迷惑をかけても優しく接していただき、感謝の言葉もありません」"

[[dialogue]]
speaker = "シャロン"
# 「私からのせめてものお礼です。これからも親友として、末永くお付き合いくださいっ」
line = "「私からのせめてものお礼です。これからも親友として、末永くお付き合いくださいっ」"

[[dialogue]]
speaker = "unk"
# シャロンはプレゼントの包装を差し出す。
line = "シャロンはプレゼントの包装を差し出す。"

[[dialogue]]
speaker = "イレーナ"
# 「親友とか、末永くとか、そんなこっ恥ずかしいこと、よく真顔で言えるわね……」
line = "「親友とか、末永くとか、そんなこっ恥ずかしいこと、よく真顔で言えるわね……」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁ、あたしのために用意してくれたっていうんなら受け取るわ。ありがとね」
line = "「まぁ、あたしのために用意してくれたっていうんなら受け取るわ。ありがとね」"

[[dialogue]]
speaker = "シャロン"
# 「ありがとうございますっ！」
line = "「ありがとうございますっ！」"

[[dialogue]]
speaker = "unk"
# めでたし、めでたし
line = "めでたし、めでたし"

[[dialogue]]
speaker = "イレーナ"
# 「何、終わったみたいな空気出してんの。ほら、シャロン、女神様の前で誓いのチョコを渡すチャンスよ」
line = "「何、終わったみたいな空気出してんの。ほら、シャロン、女神様の前で誓いのチョコを渡すチャンスよ」"

[[dialogue]]
speaker = "シャロン"
# 「会長さまっ、私の想い、受け取ってくださいっ！」
line = "「会長さまっ、私の想い、受け取ってくださいっ！」"

[[dialogue]]
speaker = "unk"
# 俺にも！？
line = "俺にも！？"

[[dialogue]]
speaker = "unk"
# 震える腕で差し出されたのは、ハートのシールが貼られた箱。
line = "震える腕で差し出されたのは、ハートのシールが貼られた箱。"

[[dialogue]]
speaker = "シャロン"
# 「会長さまには……チョコレートのカヌレを作りました」
line = "「会長さまには……チョコレートのカヌレを作りました」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまに相談したら、女神様の信徒は貞淑に……でも本気の本命なら構わないとのことでしたので」
line = "「イレーナさまに相談したら、女神様の信徒は貞淑に……でも本気の本命なら構わないとのことでしたので」"

[[dialogue]]
speaker = "シャロン"
# 「世界中の皆様に捧げる慈愛と、特定の方に向ける愛は別物……私の本命の愛は、会長さまだけのものなんですっ」
line = "「世界中の皆様に捧げる慈愛と、特定の方に向ける愛は別物……私の本命の愛は、会長さまだけのものなんですっ」"

[[dialogue]]
speaker = "シャロン"
# 「ですので！　ひとつだけの！　ほ、ほ、本命チョコなんですっ！」
line = "「ですので！　ひとつだけの！　ほ、ほ、本命チョコなんですっ！」"

[[dialogue]]
speaker = "unk"
# ありがとう、シャロン
line = "ありがとう、シャロン"

[[dialogue]]
speaker = "unk"
# 俺は真正面から、彼女の想いを受け止めた。
line = "俺は真正面から、彼女の想いを受け止めた。"

[[dialogue]]
speaker = "シャロン"
# 「嬉しいです、会長さまっ……<emoji=heart04>」
line = "「嬉しいです、会長さまっ……<emoji=heart04>」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁー、アツいアツい。せっかくもらったチョコが溶けちゃいそうだわ。いろんな意味でごちそうさま。２人ともお幸せにねー」
line = "「はぁー、アツいアツい。せっかくもらったチョコが溶けちゃいそうだわ。いろんな意味でごちそうさま。２人ともお幸せにねー」"

[[dialogue]]
speaker = "unk"
# イレーナは背を向けてクールに去り──俺はシャロンとともに女神へ互いの愛を誓うのだった。
line = "イレーナは背を向けてクールに去り──俺はシャロンとともに女神へ互いの愛を誓うのだった。"

[[dialogue]]
speaker = "シャロン"
# 「これからもずっとずっと、命尽きるまで……よろしくお願いしますね、会長さま<emoji=heart04>」
line = "「これからもずっとずっと、命尽きるまで……よろしくお願いしますね、会長さま<emoji=heart04>」"
