[[dialogue]]
speaker = "unk"
# 第４話,マムの素直な気持ち,P
line = "第４話,マムの素直な気持ち,P"

[[dialogue]]
speaker = "unk"
# この前、マムと約束した『恋人として初めてのデート』。それを実行する為、俺たちは休日に街へとやって来ていた。
line = "この前、マムと約束した『恋人として初めてのデート』。それを実行する為、俺たちは休日に街へとやって来ていた。"

[[dialogue]]
speaker = "マハムート"
# 「手を繋いでもいいとは確かに言ったけど、まさか最初からなんて……」
line = "「手を繋いでもいいとは確かに言ったけど、まさか最初からなんて……」"

[[dialogue]]
speaker = "unk"
# 楽しみにしてたので
line = "楽しみにしてたので"

[[dialogue]]
speaker = "マハムート"
# 「まあ、約束だから、仕方ないわね……」
line = "「まあ、約束だから、仕方ないわね……」"

[[dialogue]]
speaker = "unk"
# 俺はマムと手を繋ぎながら、街を歩く。
line = "俺はマムと手を繋ぎながら、街を歩く。"

[[dialogue]]
speaker = "マハムート"
# 「一緒に買い出しに出かけたりすることはあったけど、デートとなるとやっぱり感覚が違うわね」
line = "「一緒に買い出しに出かけたりすることはあったけど、デートとなるとやっぱり感覚が違うわね」"

[[dialogue]]
speaker = "マハムート"
# 「――私が街に来たら、いつも何をして遊んでるのかって？」
line = "「――私が街に来たら、いつも何をして遊んでるのかって？」"

[[dialogue]]
speaker = "マハムート"
# 「正直、買い出し以外だと、１人で東京まで出向くことはほとんどないわよ。休日は寮内の掃除をしたり、寮の庭でガーデニングをしていることが多いかしら？」
line = "「正直、買い出し以外だと、１人で東京まで出向くことはほとんどないわよ。休日は寮内の掃除をしたり、寮の庭でガーデニングをしていることが多いかしら？」"

[[dialogue]]
speaker = "unk"
# マムは新星寮が好きなんですね
line = "マムは新星寮が好きなんですね"

[[dialogue]]
speaker = "マハムート"
# 「っ……そういうことは、いちいち言わなくていいの。寮長をやっているんだから、思い入れがあるのは当たり前でしょう？」
line = "「っ……そういうことは、いちいち言わなくていいの。寮長をやっているんだから、思い入れがあるのは当たり前でしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「――今度、ガーデニングを一緒に？　ん……いいわよ。その時は私のこだわりを教えてあげる」
line = "「――今度、ガーデニングを一緒に？　ん……いいわよ。その時は私のこだわりを教えてあげる」"

[[dialogue]]
speaker = "マハムート"
# 「他の趣味？　そうね……あとは、けん玉かしら」
line = "「他の趣味？　そうね……あとは、けん玉かしら」"

[[dialogue]]
speaker = "マハムート"
# 「妃竜院家の子供部屋に昔から置いてあってね。手持無沙汰な時はよく遊んでいたものよ」
line = "「妃竜院家の子供部屋に昔から置いてあってね。手持無沙汰な時はよく遊んでいたものよ」"

[[dialogue]]
speaker = "マハムート"
# 「貴方は気づいていたかしら？　実は変身した時の武器にも反映されていて、鉄球の持ち手がけん玉のような形状になっているのよ」
line = "「貴方は気づいていたかしら？　実は変身した時の武器にも反映されていて、鉄球の持ち手がけん玉のような形状になっているのよ」"

[[dialogue]]
speaker = "マハムート"
# 「あと、人間界に来てからけん玉の検定も受けたりしてね。私、五段まで持っているのよ」
line = "「あと、人間界に来てからけん玉の検定も受けたりしてね。私、五段まで持っているのよ」"

[[dialogue]]
speaker = "マハムート"
# 「どういう技ができるのか気になる？　ふふっ、いいわ。教えてあげる――」
line = "「どういう技ができるのか気になる？　ふふっ、いいわ。教えてあげる――」"

[[dialogue]]
speaker = "unk"
# その日は会話がよく弾んで、近くのカフェに入り、お互いの趣味や好きなことについて沢山話をした。
line = "その日は会話がよく弾んで、近くのカフェに入り、お互いの趣味や好きなことについて沢山話をした。"

[[dialogue]]
speaker = "unk"
# そうこうしている内に、気づけばあっという間に日が暮れてしまった。
line = "そうこうしている内に、気づけばあっという間に日が暮れてしまった。"

[[dialogue]]
speaker = "unk"
# 帰り道も楽しく話しをしながら歩いていたのだが、ふとマムが足を止めた。
line = "帰り道も楽しく話しをしながら歩いていたのだが、ふとマムが足を止めた。"

[[dialogue]]
speaker = "マハムート"
# 「このままもう少し歩けば、もう学園の前ね。……いま気づいたのだけれど、手もだいぶ自然に繋げるようになったと思うわ」
line = "「このままもう少し歩けば、もう学園の前ね。……いま気づいたのだけれど、手もだいぶ自然に繋げるようになったと思うわ」"

[[dialogue]]
speaker = "マハムート"
# 「帰り道、特に意識もしていなかったけれど……いつの間にか、貴方と手を繋いでいた」
line = "「帰り道、特に意識もしていなかったけれど……いつの間にか、貴方と手を繋いでいた」"

[[dialogue]]
speaker = "unk"
# 恋人繋ぎが出来る日も遠くなさそうですか？
line = "恋人繋ぎが出来る日も遠くなさそうですか？"

[[dialogue]]
speaker = "マハムート"
# 「そうね、会長……。今日はまだ、時間あるかしら？」
line = "「そうね、会長……。今日はまだ、時間あるかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「このまま近くのベンチに座って、もう少しだけ話して行かない……？」
line = "「このまま近くのベンチに座って、もう少しだけ話して行かない……？」"

[[dialogue]]
speaker = "マハムート"
# 「それで……さっき、恋人繋ぎの話をしていたじゃない？　その……」
line = "「それで……さっき、恋人繋ぎの話をしていたじゃない？　その……」"

[[dialogue]]
speaker = "マハムート"
# 「……してみる？」
line = "「……してみる？」"

[[dialogue]]
speaker = "unk"
# 俺が驚いて、マムの顔を見やると――
line = "俺が驚いて、マムの顔を見やると――"

[[dialogue]]
speaker = "マハムート"
# 「自然と繋げているし……今日はそういう気分だから……いいわよ」
line = "「自然と繋げているし……今日はそういう気分だから……いいわよ」"

[[dialogue]]
speaker = "unk"
# 俺はドキドキしながらも、彼女と手を繋ぎ直し……指を絡める。
line = "俺はドキドキしながらも、彼女と手を繋ぎ直し……指を絡める。"

[[dialogue]]
speaker = "マハムート"
# 「んっ……」
line = "「んっ……」"

[[dialogue]]
speaker = "マハムート"
# 「こ、これ、やっぱりなんか、いやらしいわ……」
line = "「こ、これ、やっぱりなんか、いやらしいわ……」"

[[dialogue]]
speaker = "マハムート"
# 「密着してる感がすごいというか…………はぁ…………」
line = "「密着してる感がすごいというか…………はぁ…………」"

[[dialogue]]
speaker = "マハムート"
# 「……な、なに？　私の顔をじっと見て……」
line = "「……な、なに？　私の顔をじっと見て……」"

[[dialogue]]
speaker = "unk"
# マムが可愛いから
line = "マムが可愛いから"

[[dialogue]]
speaker = "マハムート"
# 「ま、またそういうことを言う……」
line = "「ま、またそういうことを言う……」"

[[dialogue]]
speaker = "マハムート"
# 「ん……聞いてもいいかって？　何……？」
line = "「ん……聞いてもいいかって？　何……？」"

[[dialogue]]
speaker = "unk"
# マムは俺のこと、どう思ってますか？
line = "マムは俺のこと、どう思ってますか？"

[[dialogue]]
speaker = "マハムート"
# 「どうって……何よ、今更……」
line = "「どうって……何よ、今更……」"

[[dialogue]]
speaker = "マハムート"
# 「そんなの、決まっているでしょう？」
line = "「そんなの、決まっているでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「嫌だったら、手なんて繋がないわよ……初めてだって言ったでしょう？」
line = "「嫌だったら、手なんて繋がないわよ……初めてだって言ったでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「――私の口から、ちゃんと聞きたかった？」
line = "「――私の口から、ちゃんと聞きたかった？」"

[[dialogue]]
speaker = "マハムート"
# 「……なら、１度しか言わないから、ちゃんと聞きなさい」
line = "「……なら、１度しか言わないから、ちゃんと聞きなさい」"

[[dialogue]]
speaker = "マハムート"
# 「……好きよ。会長」
line = "「……好きよ。会長」"

[[dialogue]]
speaker = "マハムート"
# 「って、こ、こら……か、顔が近いわよ……？　あっ……！？　んっ……<emoji=heart04>」
line = "「って、こ、こら……か、顔が近いわよ……？　あっ……！？　んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はマムの唇を、そっと奪う。
line = "俺はマムの唇を、そっと奪う。"

[[dialogue]]
speaker = "マハムート"
# 「ちゅっ……<emoji=heart04>　んっ……はあぁ<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　んっ……はあぁ<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「も、もう。許してないのに、いきなりするなんて……」
line = "「も、もう。許してないのに、いきなりするなんて……」"

[[dialogue]]
speaker = "unk"
# ごめん、我慢できなかった
line = "ごめん、我慢できなかった"

[[dialogue]]
speaker = "マハムート"
# 「……仕方ないわね。今日、だけなんだからね……？　ん……<emoji=heart04>」
line = "「……仕方ないわね。今日、だけなんだからね……？　ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女は目を閉じて、唇を俺の方に向ける。そんな風にされたら――
line = "彼女は目を閉じて、唇を俺の方に向ける。そんな風にされたら――"

[[dialogue]]
speaker = "マハムート"
# 「んっ……<emoji=heart04>　ちゅっ<emoji=heart04>　……ちゅ、ちゅっ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ<emoji=heart04>　……ちゅ、ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺とマムはそれからしばらく、言葉を交わさず、時間も忘れ、初めてのキスに没頭してしまうのだった――
line = "俺とマムはそれからしばらく、言葉を交わさず、時間も忘れ、初めてのキスに没頭してしまうのだった――"
