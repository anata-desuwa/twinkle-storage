[[dialogue]]
speaker = "unk"
# 第２話,忠犬対決……！,P
line = "第２話,忠犬対決……！,P"

[[dialogue]]
speaker = "ヒヨ"
# 「じーーーーーーーっ」
line = "「じーーーーーーーっ」"

[[dialogue]]
speaker = "unk"
# めちゃくちゃ見られてる……！
line = "めちゃくちゃ見られてる……！"

[[dialogue]]
speaker = "ヒヨ"
# 「当たり前でい！　会長サンの毒牙にかかる生徒を、少しでも減らさないといけねぇからな！　たとえ火の中水の中、どこまでも付いていくぜ！」
line = "「当たり前でい！　会長サンの毒牙にかかる生徒を、少しでも減らさないといけねぇからな！　たとえ火の中水の中、どこまでも付いていくぜ！」"

[[dialogue]]
speaker = "unk"
# あんまり無理はしないようにね
line = "あんまり無理はしないようにね"

[[dialogue]]
speaker = "ヒヨ"
# 「おうよ！　無理しすぎると姐さんに迷惑をかけちまうからな！　姐さんは心配性だから、すぐにあたしのことを──」
line = "「おうよ！　無理しすぎると姐さんに迷惑をかけちまうからな！　姐さんは心配性だから、すぐにあたしのことを──」"

[[dialogue]]
speaker = "カティア"
# 「魔王様～～～～～～っ！！」
line = "「魔王様～～～～～～っ！！」"

[[dialogue]]
speaker = "unk"
# 急に抱きついてくると危ないよ？
line = "急に抱きついてくると危ないよ？"

[[dialogue]]
speaker = "カティア"
# 「ごめんなさい！　でも魔王様の姿を見かけたら、居ても立ってもいられず！」
line = "「ごめんなさい！　でも魔王様の姿を見かけたら、居ても立ってもいられず！」"

[[dialogue]]
speaker = "ヒヨ"
# 「いきなり、女生徒を抱きつかせるとは……！　やっぱりハーレムを作ってるのは本当だったか……！」
line = "「いきなり、女生徒を抱きつかせるとは……！　やっぱりハーレムを作ってるのは本当だったか……！」"

[[dialogue]]
speaker = "カティア"
# 「ハーレム？　魔王様、私をハーレムの一員に加えてくれるんですか！？」
line = "「ハーレム？　魔王様、私をハーレムの一員に加えてくれるんですか！？」"

[[dialogue]]
speaker = "ヒヨ"
# 「っていうか、よく見たらワン公じゃねぇか！　何してんだこんなところで」
line = "「っていうか、よく見たらワン公じゃねぇか！　何してんだこんなところで」"

[[dialogue]]
speaker = "カティア"
# 「なんだヒヨか……。私は魔王様のしもべとして、スキンシップ中ガオ」
line = "「なんだヒヨか……。私は魔王様のしもべとして、スキンシップ中ガオ」"

[[dialogue]]
speaker = "ヒヨ"
# 「よく分かんねぇが、不健全な匂いがプンプンするぜい」
line = "「よく分かんねぇが、不健全な匂いがプンプンするぜい」"

[[dialogue]]
speaker = "カティア"
# 「不健全なんかじゃないガオ！　私は魔王様の一番の配下であり右腕（自称）！　ヒヨの思うような軽い関係ではないガオ！」
line = "「不健全なんかじゃないガオ！　私は魔王様の一番の配下であり右腕（自称）！　ヒヨの思うような軽い関係ではないガオ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「配下で右腕？　ワン公なんかを部下にしてたら、組織が破滅するぜい」
line = "「配下で右腕？　ワン公なんかを部下にしてたら、組織が破滅するぜい」"

[[dialogue]]
speaker = "カティア"
# 「そんなことないワン！　私は魔王様の世界征服計画の特攻隊長として、獅子奮迅の活躍を見せているガオ！」
line = "「そんなことないワン！　私は魔王様の世界征服計画の特攻隊長として、獅子奮迅の活躍を見せているガオ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「語尾が安定しないやつだな……」
line = "「語尾が安定しないやつだな……」"

[[dialogue]]
speaker = "unk"
# ところで二人はどういう関係なの？
line = "ところで二人はどういう関係なの？"

[[dialogue]]
speaker = "カティア"
# 「よくぞ聞いてくれました！　私たちは同じ陸上部に所属しているライバルなのです！」
line = "「よくぞ聞いてくれました！　私たちは同じ陸上部に所属しているライバルなのです！」"

[[dialogue]]
speaker = "ヒヨ"
# 「悔しいが、成績は５０勝５０敗５０分けで、実力は完全に五分でさぁ」
line = "「悔しいが、成績は５０勝５０敗５０分けで、実力は完全に五分でさぁ」"

[[dialogue]]
speaker = "カティア"
# 「まさしく永遠のライバルですワン！」
line = "「まさしく永遠のライバルですワン！」"

[[dialogue]]
speaker = "ヒヨ"
# 「まあ、張り合いのあるやつではあるな、ワン公は」
line = "「まあ、張り合いのあるやつではあるな、ワン公は」"

[[dialogue]]
speaker = "カティア"
# 「私もヒヨがいてくれるおかげで、短距離のタイムも伸びていってますしね」
line = "「私もヒヨがいてくれるおかげで、短距離のタイムも伸びていってますしね」"

[[dialogue]]
speaker = "カティア"
# 「ですが、今の私は陸上部のカティアではなく、魔王様の手先！　ヒヨと馴れ合いをする気はないガオ！」
line = "「ですが、今の私は陸上部のカティアではなく、魔王様の手先！　ヒヨと馴れ合いをする気はないガオ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしだって、その気はないぜい！　なんたって今は、姐さんのために会長サンを監視してるんだからな！」
line = "「あたしだって、その気はないぜい！　なんたって今は、姐さんのために会長サンを監視してるんだからな！」"

[[dialogue]]
speaker = "カティア"
# 「つまり、今の私たちは敵同士……！」
line = "「つまり、今の私たちは敵同士……！」"

[[dialogue]]
speaker = "ヒヨ"
# 「ああ、いつでもかかってこいだ！」
line = "「ああ、いつでもかかってこいだ！」"

[[dialogue]]
speaker = "unk"
# いや、仲良くしようよ
line = "いや、仲良くしようよ"

[[dialogue]]
speaker = "カティア"
# 「いいえ！　魔王様の面子を保つためにも、ヒヨには負けるわけにはいかないのです！　……ガオ」
line = "「いいえ！　魔王様の面子を保つためにも、ヒヨには負けるわけにはいかないのです！　……ガオ」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしだって、姐さんのためにも負けるわけにはいかねぇぜ！」
line = "「あたしだって、姐さんのためにも負けるわけにはいかねぇぜ！」"

[[dialogue]]
speaker = "カティア"
# 「がるるるっ……！」
line = "「がるるるっ……！」"

[[dialogue]]
speaker = "ヒヨ"
# 「うぐるるるぅっ……！」
line = "「うぐるるるぅっ……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんたち、何をしてるの？」
line = "「会長くんたち、何をしてるの？」"

[[dialogue]]
speaker = "カティア"
# 「ひゃああ！？　ミルフィー先輩！」
line = "「ひゃああ！？　ミルフィー先輩！」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さん！」
line = "「姐さん！」"

[[dialogue]]
speaker = "カティア"
# 「ミルフィー先輩……急に出てこられると、心臓に悪いですよ」
line = "「ミルフィー先輩……急に出てこられると、心臓に悪いですよ」"

[[dialogue]]
speaker = "ミルフィー"
# 「ごめんね、驚かせるつもりはなかったんだけど」
line = "「ごめんね、驚かせるつもりはなかったんだけど」"

[[dialogue]]
speaker = "ヒヨ"
# 「姐さんレベルの天使なら、気配を消すぐれえわけないからな」
line = "「姐さんレベルの天使なら、気配を消すぐれえわけないからな」"

[[dialogue]]
speaker = "ミルフィー"
# 「いや、別に気配を消してたわけでもないんだけどね……。それよりも、みんな何を話してたの？」
line = "「いや、別に気配を消してたわけでもないんだけどね……。それよりも、みんな何を話してたの？」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしとワン公が出会ったらやる事は決まってんでい！」
line = "「あたしとワン公が出会ったらやる事は決まってんでい！」"

[[dialogue]]
speaker = "カティア"
# 「いざ尋常に勝負ですワン！」
line = "「いざ尋常に勝負ですワン！」"

[[dialogue]]
speaker = "ミルフィー"
# 「なるほど、ヒヨちゃんとカティアちゃんが、いつもの勝負を……」
line = "「なるほど、ヒヨちゃんとカティアちゃんが、いつもの勝負を……」"

[[dialogue]]
speaker = "カティア"
# 「……それで今日は何で決着をつけましょうか」
line = "「……それで今日は何で決着をつけましょうか」"

[[dialogue]]
speaker = "ヒヨ"
# 「だったら、互いの主人のどちらがすごいかで勝負をつけようじゃねぇか」
line = "「だったら、互いの主人のどちらがすごいかで勝負をつけようじゃねぇか」"

[[dialogue]]
speaker = "カティア"
# 「受けて立つワン！　ミルフィー先輩と言えども、魔王様には敵わないワン！」
line = "「受けて立つワン！　ミルフィー先輩と言えども、魔王様には敵わないワン！」"

[[dialogue]]
speaker = "ミルフィー"
# 「えと、私がヒヨちゃんの主人？」
line = "「えと、私がヒヨちゃんの主人？」"

[[dialogue]]
speaker = "カティア"
# 「魔王様はとても強いワン！　なんてったって、あの前会長をタイマンで倒したくらいだワン！」
line = "「魔王様はとても強いワン！　なんてったって、あの前会長をタイマンで倒したくらいだワン！」"

[[dialogue]]
speaker = "ヒヨ"
# 「強さなら、姐さんも負けてないぜぇ！　プリマステラとして、モンスターを倒してきた猛者でい！」
line = "「強さなら、姐さんも負けてないぜぇ！　プリマステラとして、モンスターを倒してきた猛者でい！」"

[[dialogue]]
speaker = "カティア"
# 「魔王様は強いだけじゃないガオ！　魔王様はとっても優しくて、私のことをいつもヨシヨシ撫でてくれるガオ！」
line = "「魔王様は強いだけじゃないガオ！　魔王様はとっても優しくて、私のことをいつもヨシヨシ撫でてくれるガオ！」"

[[dialogue]]
speaker = "ヒヨ"
# 「優しさも姐さんは負けてないぜ！　姐さんはいつも部活が終わるとお菓子をくれるんでい！」
line = "「優しさも姐さんは負けてないぜ！　姐さんはいつも部活が終わるとお菓子をくれるんでい！」"

[[dialogue]]
speaker = "ミルフィー"
# 「うーん、なんだか決着がつかなさそうだね……私なんかより会長くんの方が、全然すごいと思うんだけど」
line = "「うーん、なんだか決着がつかなさそうだね……私なんかより会長くんの方が、全然すごいと思うんだけど」"

[[dialogue]]
speaker = "unk"
# いや、ミルフィーの方がすごいよ
line = "いや、ミルフィーの方がすごいよ"

[[dialogue]]
speaker = "ミルフィー"
# 「いやいや、会長くんの方がすごいよ。いつも星徒会長として頑張ってるし」
line = "「いやいや、会長くんの方がすごいよ。いつも星徒会長として頑張ってるし」"

[[dialogue]]
speaker = "カティア"
# 「……なんだか、魔王様たち楽しそうですね」
line = "「……なんだか、魔王様たち楽しそうですね」"

[[dialogue]]
speaker = "ヒヨ"
# 「あたしを差し置いて姐さんに近づこうなんて許せねぇぜい！」
line = "「あたしを差し置いて姐さんに近づこうなんて許せねぇぜい！」"

[[dialogue]]
speaker = "カティア"
# 「私だって、魔王様が他の女の子とイチャイチャしてると、嫉妬してしまいます！」
line = "「私だって、魔王様が他の女の子とイチャイチャしてると、嫉妬してしまいます！」"

[[dialogue]]
speaker = "ミルフィー"
# 「あはは……なんというかお互い苦労するね……」
line = "「あはは……なんというかお互い苦労するね……」"
