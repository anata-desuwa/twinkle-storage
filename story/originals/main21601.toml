[[dialogue]]
speaker = "unk"
# 第１話,流星の騎士,B
line = "第１話,流星の騎士,B"

[[dialogue]]
speaker = "unk"
# １０年前のデネブ──魔界にて。
line = "１０年前のデネブ──魔界にて。"

[[dialogue]]
speaker = "アニュラス"
# 「ここが魔界……お父様とお母様が出会った世界なのですね」
line = "「ここが魔界……お父様とお母様が出会った世界なのですね」"

[[dialogue]]
speaker = "セイファート"
# 「ああ。といっても、マルキアの故郷はもっと果ての場所だがな……」
line = "「ああ。といっても、マルキアの故郷はもっと果ての場所だがな……」"

[[dialogue]]
speaker = "unk"
# 魔界へ赴く際、本来ならば<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を経由する必要がある。
line = "魔界へ赴く際、本来ならば<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を経由する必要がある。"

[[dialogue]]
speaker = "unk"
# しかし今は非常事態──ゆえに私たち討伐隊は、人間界のフィーニスの塔を下りることで、強引に魔界への来訪を果たしていた。
line = "しかし今は非常事態──ゆえに私たち討伐隊は、人間界のフィーニスの塔を下りることで、強引に魔界への来訪を果たしていた。"

[[dialogue]]
speaker = "unk"
# 禁域の塔内部を通るという暴挙も、非常時の今ならば女神も目こぼしをしてくださるはず。
line = "禁域の塔内部を通るという暴挙も、非常時の今ならば女神も目こぼしをしてくださるはず。"

[[dialogue]]
speaker = "セイファート"
# 「よし。例の『仮面の女』の消息を追うぞ。まずはここから東──ズヴィエダ方面へと向かう！」
line = "「よし。例の『仮面の女』の消息を追うぞ。まずはここから東──ズヴィエダ方面へと向かう！」"

[[dialogue]]
speaker = "unk"
# 我々は流星教皇から勅命を受けた『仮面の女』の討伐隊。
line = "我々は流星教皇から勅命を受けた『仮面の女』の討伐隊。"

[[dialogue]]
speaker = "unk"
# 世界を震撼させる謎の刺客を、何としても討ち取らなければならない──
line = "世界を震撼させる謎の刺客を、何としても討ち取らなければならない──"

[[dialogue]]
speaker = "unk"
# あれは数日前のことだった。
line = "あれは数日前のことだった。"

[[dialogue]]
speaker = "セイファート"
# 「聖庭園が……陥落しただと！？」
line = "「聖庭園が……陥落しただと！？」"

[[dialogue]]
speaker = "流星教皇"
# 「ああ、ジェラルド……信じられないが、間違いない。わずかな天使の生き残りが、瘴気にまみれた塔を降り、教皇庁に伝えてくれたのだ」
line = "「ああ、ジェラルド……信じられないが、間違いない。わずかな天使の生き残りが、瘴気にまみれた塔を降り、教皇庁に伝えてくれたのだ」"

[[dialogue]]
speaker = "流星教皇"
# 「信じがたいが、敵は１人。仮面を被った謎の女が、聖庭園を襲撃したと……」
line = "「信じがたいが、敵は１人。仮面を被った謎の女が、聖庭園を襲撃したと……」"

[[dialogue]]
speaker = "流星教皇"
# 「その女は自らを『リクリエの使徒』と名乗り、アステラとモンスターを手足のように操るらしい……」
line = "「その女は自らを『リクリエの使徒』と名乗り、アステラとモンスターを手足のように操るらしい……」"

[[dialogue]]
speaker = "流星教皇"
# 「生き残りの天使が言うには、仮面の女の次の狙いは、魔界とのことだ」
line = "「生き残りの天使が言うには、仮面の女の次の狙いは、魔界とのことだ」"

[[dialogue]]
speaker = "流星教皇"
# 「ジェラルド、君はどう思う？　今回の天界襲撃……聖庭園は確かに破壊された。だが女神の神殿は破壊されていないのだ」
line = "「ジェラルド、君はどう思う？　今回の天界襲撃……聖庭園は確かに破壊された。だが女神の神殿は破壊されていないのだ」"

[[dialogue]]
speaker = "unk"
# 女神の神殿が破壊されれば、この世界に生きる天使はみな実体を保てなくなる。しかし敵の狙いはそうではなかった──
line = "女神の神殿が破壊されれば、この世界に生きる天使はみな実体を保てなくなる。しかし敵の狙いはそうではなかった──"

[[dialogue]]
speaker = "流星教皇"
# 「あくまで聖庭園のみを狙った理由は、おそらく──」
line = "「あくまで聖庭園のみを狙った理由は、おそらく──」"

[[dialogue]]
speaker = "unk"
# リガルタ老の命を狙ったのだろう──つまり、魔王の血を引く者の抹殺が目的。
line = "リガルタ老の命を狙ったのだろう──つまり、魔王の血を引く者の抹殺が目的。"

[[dialogue]]
speaker = "セイファート"
# 「ならば魔界での狙いは……キュリオスの煌嶺だろうか？」
line = "「ならば魔界での狙いは……キュリオスの煌嶺だろうか？」"

[[dialogue]]
speaker = "流星教皇"
# 「おそらく。それが終われば、最後は人間界……私と、私の娘が狙われるはずだ」
line = "「おそらく。それが終われば、最後は人間界……私と、私の娘が狙われるはずだ」"

[[dialogue]]
speaker = "流星教皇"
# 「ジェラルド、君に魔界の防衛を頼めないだろうか？　聖庭園を単騎で壊滅させる怪物に、一介の星騎士では歯が立たない……」
line = "「ジェラルド、君に魔界の防衛を頼めないだろうか？　聖庭園を単騎で壊滅させる怪物に、一介の星騎士では歯が立たない……」"

[[dialogue]]
speaker = "流星教皇"
# 「今一度、流星の騎士の力を借りたいのだ……！」
line = "「今一度、流星の騎士の力を借りたいのだ……！」"

[[dialogue]]
speaker = "セイファート"
# 「教皇が頭など下げるな……古い付き合いの友人が相手なら、尚更その必要はない。無論、引き受けるとも」
line = "「教皇が頭など下げるな……古い付き合いの友人が相手なら、尚更その必要はない。無論、引き受けるとも」"

[[dialogue]]
speaker = "流星教皇"
# 「すまない……マルキア殿が寝たきりで、ただでさえ大変な君にこんな頼みを……」
line = "「すまない……マルキア殿が寝たきりで、ただでさえ大変な君にこんな頼みを……」"

[[dialogue]]
speaker = "セイファート"
# 「……気にするな」
line = "「……気にするな」"

[[dialogue]]
speaker = "unk"
# 妻のマルキアは、数週間前から突如として意識を失っていた。原因は不明。今も自宅で眠り続けている……
line = "妻のマルキアは、数週間前から突如として意識を失っていた。原因は不明。今も自宅で眠り続けている……"

[[dialogue]]
speaker = "セイファート"
# 「討伐隊を組織しよう。手練れの星騎士を連れ、魔界へ赴く。吉報を待っていてくれ」
line = "「討伐隊を組織しよう。手練れの星騎士を連れ、魔界へ赴く。吉報を待っていてくれ」"

[[dialogue]]
speaker = "流星教皇"
# 「恩に着る、ジェラルド。それともう１つ、不確かな情報ではあるのだが……」
line = "「恩に着る、ジェラルド。それともう１つ、不確かな情報ではあるのだが……」"

[[dialogue]]
speaker = "流星教皇"
# 「聖庭園を襲った使徒は、マルキア殿に瓜二つの女性だった、とのことだ……用心してくれ」
line = "「聖庭園を襲った使徒は、マルキア殿に瓜二つの女性だった、とのことだ……用心してくれ」"

[[dialogue]]
speaker = "unk"
# <ruby=マリウス>流星教皇</ruby>から伝え聞いたあの情報……
line = "<ruby>流星教皇<rt>マリウス</rt></ruby>から伝え聞いたあの情報……"

[[dialogue]]
speaker = "unk"
# いったい今、世界に何が起こっているというのだ──？
line = "いったい今、世界に何が起こっているというのだ──？"

[[dialogue]]
speaker = "unk"
# 魔界の空を高速で翔け抜け、幾度もの野営の果てに、討伐隊はズヴィエダ地方のレゾフへとたどり着いた。
line = "魔界の空を高速で翔け抜け、幾度もの野営の果てに、討伐隊はズヴィエダ地方のレゾフへとたどり着いた。"

[[dialogue]]
speaker = "セイファート"
# 「皆、ここまでの旅路で疲労がたまっているだろう。今夜から２日、ここで宿を取る。行軍に備えて英気を養ってくれ」
line = "「皆、ここまでの旅路で疲労がたまっているだろう。今夜から２日、ここで宿を取る。行軍に備えて英気を養ってくれ」"

[[dialogue]]
speaker = "unk"
# 煌嶺が支配するキュリオスは、ズヴィエダ地方からさらに東へ向かった先にある。
line = "煌嶺が支配するキュリオスは、ズヴィエダ地方からさらに東へ向かった先にある。"

[[dialogue]]
speaker = "unk"
# フィーニスの塔が<ruby=そび>聳</ruby>えるシャリオン地方から、道中で必ずこのレゾフを経由することになるのだ。これは私とアニュラスにとって、都合が良かった。
line = "フィーニスの塔が<ruby>聳<rt>そび</rt></ruby>えるシャリオン地方から、道中で必ずこのレゾフを経由することになるのだ。これは私とアニュラスにとって、都合が良かった。"

[[dialogue]]
speaker = "アニュラス"
# 「お父様とお母様の知り合いが、この街にいらっしゃるのですか？」
line = "「お父様とお母様の知り合いが、この街にいらっしゃるのですか？」"

[[dialogue]]
speaker = "セイファート"
# 「ああ。アニュラスが生まれるよりも前からの仲だ。彼らならば信用できる」
line = "「ああ。アニュラスが生まれるよりも前からの仲だ。彼らならば信用できる」"

[[dialogue]]
speaker = "unk"
# マリウスから伝え聞いた例の情報──リクリエの使徒は、私の妻に瓜二つであるという。
line = "マリウスから伝え聞いた例の情報──リクリエの使徒は、私の妻に瓜二つであるという。"

[[dialogue]]
speaker = "unk"
# この噂が人間界で広まれば、寝たきりの妻がどのような目に遭うかわからない。
line = "この噂が人間界で広まれば、寝たきりの妻がどのような目に遭うかわからない。"

[[dialogue]]
speaker = "unk"
# マリウスが保護を申し出てくれていたのだが、流星教皇である彼の肩に、これ以上の重荷を背負わせるのも忍びない。
line = "マリウスが保護を申し出てくれていたのだが、流星教皇である彼の肩に、これ以上の重荷を背負わせるのも忍びない。"

[[dialogue]]
speaker = "unk"
# だから私は眠り続けるマルキアを、魔界の友人に預けることに決めたのだった。
line = "だから私は眠り続けるマルキアを、魔界の友人に預けることに決めたのだった。"

[[dialogue]]
speaker = "魔族の女性"
# 「話はわかりました。マルキア様は丁重に保護いたします」
line = "「話はわかりました。マルキア様は丁重に保護いたします」"

[[dialogue]]
speaker = "魔族の男性"
# 「──ところで、その子が人間界でもうけた君たちの娘か？」
line = "「──ところで、その子が人間界でもうけた君たちの娘か？」"

[[dialogue]]
speaker = "アニュラス"
# 「は、はい。アニュラス・セイファートです」
line = "「は、はい。アニュラス・セイファートです」"

[[dialogue]]
speaker = "魔族の男性"
# 「なるほど、マルキア殿によく似て……とはまだ言えんか。仮面があると分かりづらいな。ハハハ」
line = "「なるほど、マルキア殿によく似て……とはまだ言えんか。仮面があると分かりづらいな。ハハハ」"

[[dialogue]]
speaker = "unk"
# ……憂いは<ruby=た>断</ruby>った。これで使徒との戦いに専念できる。
line = "……憂いは<ruby>断<rt>た</rt></ruby>った。これで使徒との戦いに専念できる。"

[[dialogue]]
speaker = "unk"
# ここを発てば、また過酷な移動の日々だ。魔界は人間界など比にもならぬほどの大界──疲れを癒し、備えねば。
line = "ここを発てば、また過酷な移動の日々だ。魔界は人間界など比にもならぬほどの大界──疲れを癒し、備えねば。"

[[dialogue]]
speaker = "unk"
# そうしてレゾフを発った後も、討伐隊はキュリオスに向けて飛び続けた。
line = "そうしてレゾフを発った後も、討伐隊はキュリオスに向けて飛び続けた。"

[[dialogue]]
speaker = "unk"
# 魔界に棲息する魔物たち。発生したアステラから湧き出るモンスター……それらを蹴散らしながら、使徒の背中を追いかける。
line = "魔界に棲息する魔物たち。発生したアステラから湧き出るモンスター……それらを蹴散らしながら、使徒の背中を追いかける。"

[[dialogue]]
speaker = "unk"
# こうして長旅を続けていると昔のことを思い出す。
line = "こうして長旅を続けていると昔のことを思い出す。"

[[dialogue]]
speaker = "unk"
# 旅とは不思議なものだ。普段ならば絶対に交わらない縁の糸が、結ばれることもある──
line = "旅とは不思議なものだ。普段ならば絶対に交わらない縁の糸が、結ばれることもある──"

[[dialogue]]
speaker = "セイファート"
# 「……む？」
line = "「……む？」"

[[dialogue]]
speaker = "unk"
# ある日の深夜。野営地から少し離れた場所で、私は就寝前の鍛錬を行っていた。
line = "ある日の深夜。野営地から少し離れた場所で、私は就寝前の鍛錬を行っていた。"

[[dialogue]]
speaker = "unk"
# 剣の素振りの合間に、かすかに声が聴こえた気がしたのだ──
line = "剣の素振りの合間に、かすかに声が聴こえた気がしたのだ──"

[[dialogue]]
speaker = "セイファート"
# 「…………子供の、泣き声か？」
line = "「…………子供の、泣き声か？」"

[[dialogue]]
speaker = "unk"
# まさか、こんな魔界の原野で──そう思いつつも歩を進めていくと。
line = "まさか、こんな魔界の原野で──そう思いつつも歩を進めていくと。"

[[dialogue]]
speaker = "魔族の少女"
# 「ひぐっ……えぐっ……」
line = "「ひぐっ……えぐっ……」"

[[dialogue]]
speaker = "unk"
# 洞窟の入口近くで泣きじゃくる、吸血鬼の少女を見つけた。
line = "洞窟の入口近くで泣きじゃくる、吸血鬼の少女を見つけた。"

[[dialogue]]
speaker = "セイファート"
# 「どうしたのだ、君。こんなところで……」
line = "「どうしたのだ、君。こんなところで……」"

[[dialogue]]
speaker = "魔族の少女"
# 「だ……れ？」
line = "「だ……れ？」"

[[dialogue]]
speaker = "セイファート"
# 「通りすがりの旅人だ。親とはぐれたのか？」
line = "「通りすがりの旅人だ。親とはぐれたのか？」"

[[dialogue]]
speaker = "unk"
# 魔族の少女は、吸血鬼の中でもとりわけ優秀な『影の一族』だった。
line = "魔族の少女は、吸血鬼の中でもとりわけ優秀な『影の一族』だった。"

[[dialogue]]
speaker = "unk"
# しかし彼女は病弱で──使徒が近くに現れたがゆえに足手まといと判断され、一族の総意で洞窟に捨て置かれたのだという。なんと不憫な……
line = "しかし彼女は病弱で──使徒が近くに現れたがゆえに足手まといと判断され、一族の総意で洞窟に捨て置かれたのだという。なんと不憫な……"

[[dialogue]]
speaker = "unk"
# 私は野営地から離れた場所にある、小さな村まで彼女を連れて行き、保護を依頼した──
line = "私は野営地から離れた場所にある、小さな村まで彼女を連れて行き、保護を依頼した──"

[[dialogue]]
speaker = "魔族の少女"
# 「おじさん……もう、いっちゃうの……？」
line = "「おじさん……もう、いっちゃうの……？」"

[[dialogue]]
speaker = "セイファート"
# 「すまない。私にはやるべきことがあるのだ」
line = "「すまない。私にはやるべきことがあるのだ」"

[[dialogue]]
speaker = "セイファート"
# 「心配はいらない。この村は優しい人達ばかりだ──世話をしてもらいなさい」
line = "「心配はいらない。この村は優しい人達ばかりだ──世話をしてもらいなさい」"

[[dialogue]]
speaker = "魔族の少女"
# 「でも私……おじさんに、なにもお返し、できてない……」
line = "「でも私……おじさんに、なにもお返し、できてない……」"

[[dialogue]]
speaker = "セイファート"
# 「律儀な子だな。では１つ約束をしてくれ」
line = "「律儀な子だな。では１つ約束をしてくれ」"

[[dialogue]]
speaker = "セイファート"
# 「困っている者がいたら、今度は君が助けてあげるのだ。その助け合いの輪。縁の糸こそが、ヒトにとって最も強い力になるのだから」
line = "「困っている者がいたら、今度は君が助けてあげるのだ。その助け合いの輪。縁の糸こそが、ヒトにとって最も強い力になるのだから」"

[[dialogue]]
speaker = "魔族の少女"
# 「私が誰かを？　そんなの、無理です……」
line = "「私が誰かを？　そんなの、無理です……」"

[[dialogue]]
speaker = "魔族の少女"
# 「私、おちこぼれで……何の力も、なくて……」
line = "「私、おちこぼれで……何の力も、なくて……」"

[[dialogue]]
speaker = "セイファート"
# 「そんなことはない。星々は、優しくまっすぐな者を見逃さないものだ。君は明日にでも、守護の星を得るかもしれないぞ？」
line = "「そんなことはない。星々は、優しくまっすぐな者を見逃さないものだ。君は明日にでも、守護の星を得るかもしれないぞ？」"

[[dialogue]]
speaker = "セイファート"
# 「もしも力に目覚めたら、人間界に来なさい。歓迎しよう」
line = "「もしも力に目覚めたら、人間界に来なさい。歓迎しよう」"

[[dialogue]]
speaker = "unk"
# 吸血鬼の少女の頭を撫で、私は別れを告げた──
line = "吸血鬼の少女の頭を撫で、私は別れを告げた──"

[[dialogue]]
speaker = "unk"
# リクリエの使徒の影響は、そこかしこで現れていると見ていい。あの吸血鬼の少女のように、不幸な者をこれからも増やしていくのだろう。
line = "リクリエの使徒の影響は、そこかしこで現れていると見ていい。あの吸血鬼の少女のように、不幸な者をこれからも増やしていくのだろう。"

[[dialogue]]
speaker = "unk"
# だからこそ──負けるわけにはいかない。
line = "だからこそ──負けるわけにはいかない。"

[[dialogue]]
speaker = "unk"
# そう心に誓っていたというのに──
line = "そう心に誓っていたというのに──"

[[dialogue]]
speaker = "アニュラス"
# 「ぅぁあああぁっ！？」
line = "「ぅぁあああぁっ！？」"

[[dialogue]]
speaker = "セイファート"
# 「アニュラス、下がれ！！　負傷した者の援護をしろ！　こいつは私が相手をする！！」
line = "「アニュラス、下がれ！！　負傷した者の援護をしろ！　こいつは私が相手をする！！」"

[[dialogue]]
speaker = "unk"
# ──吸血鬼の少女と別れて、十数日。
line = "──吸血鬼の少女と別れて、十数日。"

[[dialogue]]
speaker = "unk"
# キュリオスまであと数日という地点で、討伐隊は『仮面の女』と会敵した。
line = "キュリオスまであと数日という地点で、討伐隊は『仮面の女』と会敵した。"

[[dialogue]]
speaker = "セイファート"
# 「ぬ、ぅぅうっ！？」
line = "「ぬ、ぅぅうっ！？」"

[[dialogue]]
speaker = "リクリエの使徒"
# 「首を刎ねるつもりだったのに……ふふふっ！　やっぱり『あなた』は強いわね！」
line = "「首を刎ねるつもりだったのに……ふふふっ！　やっぱり『あなた』は強いわね！」"

[[dialogue]]
speaker = "セイファート"
# （何なのだ……この女は！？）
line = "（何なのだ……この女は！？）"

[[dialogue]]
speaker = "セイファート"
# （マルキアに……似ている！　似すぎているッ！！　まるでマルキア本人のような──いや、そんなことはありえない！）
line = "（マルキアに……似ている！　似すぎているッ！！　まるでマルキア本人のような──いや、そんなことはありえない！）"

[[dialogue]]
speaker = "unk"
# 私の妻は今、レゾフで眠っている。
line = "私の妻は今、レゾフで眠っている。"

[[dialogue]]
speaker = "unk"
# 似ているだけの別物だ……あの優しい妻の外見を騙る偽物め。正体を暴いてくれる──！
line = "似ているだけの別物だ……あの優しい妻の外見を騙る偽物め。正体を暴いてくれる──！"

[[dialogue]]
speaker = "セイファート"
# 「──ムゥウゥウウゥンッ！！！」
line = "「──ムゥウゥウウゥンッ！！！」"

[[dialogue]]
speaker = "unk"
# 一瞬の隙に、手ごたえを感じる袈裟の一撃を使徒に見舞う。
line = "一瞬の隙に、手ごたえを感じる袈裟の一撃を使徒に見舞う。"

[[dialogue]]
speaker = "リクリエの使徒"
# 「ぐ、ぁッ────！？」
line = "「ぐ、ぁッ────！？」"

[[dialogue]]
speaker = "unk"
# 顔を覆っていた仮面の半分が欠け、女の素顔が明らかになった──
line = "顔を覆っていた仮面の半分が欠け、女の素顔が明らかになった──"

[[dialogue]]
speaker = "マルキア"
# 「あ、あな……た──」
line = "「あ、あな……た──」"

[[dialogue]]
speaker = "セイファート"
# 「マル……キア？」
line = "「マル……キア？」"

[[dialogue]]
speaker = "unk"
# 見間違うことなどありえない、愛しい妻の顔。
line = "見間違うことなどありえない、愛しい妻の顔。"

[[dialogue]]
speaker = "unk"
# <b>今よりも１０歳ほど若い</b>ということを除けば、まぎれもなくそれは──私の妻だった！
line = "<b>今よりも１０歳ほど若い</b>ということを除けば、まぎれもなくそれは──私の妻だった！"

[[dialogue]]
speaker = "マルキア"
# 「お願い……私を、殺して……」
line = "「お願い……私を、殺して……」"

[[dialogue]]
speaker = "セイファート"
# 「な、何を──！？」
line = "「な、何を──！？」"

[[dialogue]]
speaker = "マルキア"
# 「天界で、魔界で……私は数えきれないほどの、罪のない人を……！」
line = "「天界で、魔界で……私は数えきれないほどの、罪のない人を……！」"

[[dialogue]]
speaker = "マルキア"
# 「全てを壊せ、滅ぼせと……声が頭の中で鳴りやまないの！　抵抗することすらできない……！！」
line = "「全てを壊せ、滅ぼせと……声が頭の中で鳴りやまないの！　抵抗することすらできない……！！」"

[[dialogue]]
speaker = "マルキア"
# 「お願い、あなた！　早く私を──殺して！！！」
line = "「お願い、あなた！　早く私を──殺して！！！」"

[[dialogue]]
speaker = "セイファート"
# 「マルキア……そんな……」
line = "「マルキア……そんな……」"

[[dialogue]]
speaker = "unk"
# 達人同士の一騎打ちにおいて、冷静さを欠くなどあってはならないのに──私は本当に未熟者だ。
line = "達人同士の一騎打ちにおいて、冷静さを欠くなどあってはならないのに──私は本当に未熟者だ。"

[[dialogue]]
speaker = "マルキア"
# 「ぁ──あぁああ──やめて！　もう、やめて────！！」
line = "「ぁ──あぁああ──やめて！　もう、やめて────！！」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、欠けていた仮面が再生し──泣いて懇願していたマルキアの口元には、再び嗜虐的な笑みが張り付いた。
line = "次の瞬間、欠けていた仮面が再生し──泣いて懇願していたマルキアの口元には、再び嗜虐的な笑みが張り付いた。"

[[dialogue]]
speaker = "リクリエの使徒"
# 「甘いわね、英雄──」
line = "「甘いわね、英雄──」"

[[dialogue]]
speaker = "セイファート"
# 「ぐッ────ァアァァアァァァアアッ！？！？」
line = "「ぐッ────ァアァァアァァァアアッ！？！？」"

[[dialogue]]
speaker = "unk"
# 私の意識は、そこで途絶えた──
line = "私の意識は、そこで途絶えた──"

[[dialogue]]
speaker = "unk"
# ……………………
line = "……………………"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "アニュラス"
# 「──お父様！」
line = "「──お父様！」"

[[dialogue]]
speaker = "unk"
# 声が──
line = "声が──"

[[dialogue]]
speaker = "マルキア"
# 「……あなた！！」
line = "「……あなた！！」"

[[dialogue]]
speaker = "unk"
# 声が、聴こえる──
line = "声が、聴こえる──"

[[dialogue]]
speaker = "セイファート"
# 「……ここ、は？」
line = "「……ここ、は？」"

[[dialogue]]
speaker = "アニュラス"
# 「お父様……レゾフです！　ほら、お母様もいますよ……しっかり！」
line = "「お父様……レゾフです！　ほら、お母様もいますよ……しっかり！」"

[[dialogue]]
speaker = "マルキア"
# 「あなた……ようやく目を覚ましてくれた……よかった……」
line = "「あなた……ようやく目を覚ましてくれた……よかった……」"

[[dialogue]]
speaker = "セイファート"
# 「私は、使徒に……なぜ、生きて、いるのだ……？」
line = "「私は、使徒に……なぜ、生きて、いるのだ……？」"

[[dialogue]]
speaker = "アニュラス"
# 「私とお父様だけは……生き延びることができたのです……」
line = "「私とお父様だけは……生き延びることができたのです……」"

[[dialogue]]
speaker = "アニュラス"
# 「瀕死のお父様を担いで、あらゆる人達の助けを借りて、レゾフまで撤退を……お母様は少し前に、突然目が覚めて……」
line = "「瀕死のお父様を担いで、あらゆる人達の助けを借りて、レゾフまで撤退を……お母様は少し前に、突然目が覚めて……」"

[[dialogue]]
speaker = "unk"
# アニュラスと私だけが生き延びられたのは、なぜだ。あのリクリエの使徒が、手心を加えたとでも？
line = "アニュラスと私だけが生き延びられたのは、なぜだ。あのリクリエの使徒が、手心を加えたとでも？"

[[dialogue]]
speaker = "unk"
# そして昏睡していたはずの妻が、再び目を覚ましている……いったい、何が原因だったのだ？
line = "そして昏睡していたはずの妻が、再び目を覚ましている……いったい、何が原因だったのだ？"

[[dialogue]]
speaker = "セイファート"
# 「……アニュラス。あれから、どれだけ経った？」
line = "「……アニュラス。あれから、どれだけ経った？」"

[[dialogue]]
speaker = "アニュラス"
# 「……１ヵ月ほどです」
line = "「……１ヵ月ほどです」"

[[dialogue]]
speaker = "セイファート"
# 「──！？　では、人間界はっ！？」
line = "「──！？　では、人間界はっ！？」"

[[dialogue]]
speaker = "アニュラス"
# 「わからないのです、お父様……」
line = "「わからないのです、お父様……」"

[[dialogue]]
speaker = "アニュラス"
# 「『仮面の女』はキュリオスを壊滅させた後、すぐに人間界へ向かったようなのですが……」
line = "「『仮面の女』はキュリオスを壊滅させた後、すぐに人間界へ向かったようなのですが……」"

[[dialogue]]
speaker = "アニュラス"
# 「<ruby=ラーゴ・シエロ>鏡界の湖</ruby>の道は閉ざされていて……人間界がどうなっているのか……確認も取れないのです！」
line = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>の道は閉ざされていて……人間界がどうなっているのか……確認も取れないのです！」"
