[[dialogue]]
speaker = "unk"
# 正月休みのある日。俺はウズメに誘われて、街へ遊びにきていた――
line = "正月休みのある日。俺はウズメに誘われて、街へ遊びにきていた――"

[[dialogue]]
speaker = "ウズメイア"
# 「というわけで、日本のオタクの聖地、秋葉原へとやってきたし♪」
line = "「というわけで、日本のオタクの聖地、秋葉原へとやってきたし♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「――うん？　誘う相手がソフィじゃなくてよかったのかって？」
line = "「――うん？　誘う相手がソフィじゃなくてよかったのかって？」"

[[dialogue]]
speaker = "ウズメイア"
# 「今日は会長くんと、もっと仲良くなりたいと思ったんだよね～」
line = "「今日は会長くんと、もっと仲良くなりたいと思ったんだよね～」"

[[dialogue]]
speaker = "ウズメイア"
# 「ほら、会長くんとはまだ１度も遊びに出かけたことがなかったじゃん？」
line = "「ほら、会長くんとはまだ１度も遊びに出かけたことがなかったじゃん？」"

[[dialogue]]
speaker = "ウズメイア"
# 「友達たるもの、やっぱ一緒におでかけしとかないとね♪　みたいな？」
line = "「友達たるもの、やっぱ一緒におでかけしとかないとね♪　みたいな？」"

[[dialogue]]
speaker = "unk"
# なるほど。誘われた理由はわかったけど――
line = "なるほど。誘われた理由はわかったけど――"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、貴殿の言いたいことはわかっているぞ、魔王よ」
line = "「ふふっ、貴殿の言いたいことはわかっているぞ、魔王よ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ここに何故、プリティーでゴージャスなヘレナちゃんがいるのか――であろう？」
line = "「ここに何故、プリティーでゴージャスなヘレナちゃんがいるのか――であろう？」"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、簡単な話だ。それは私と――」
line = "「なに、簡単な話だ。それは私と――」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしが、友達同士だからだし♪」
line = "「あたしが、友達同士だからだし♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「ウズメは私のことを、素直にヘレナちゃんと呼んでくれるのでな。それに日本好きであるが故に、好みも合う」
line = "「ウズメは私のことを、素直にヘレナちゃんと呼んでくれるのでな。それに日本好きであるが故に、好みも合う」"

[[dialogue]]
speaker = "ウズメイア"
# 「晴れ着フォームの起動実験で被験者に選ばれてから、友達になったんだよね～」
line = "「晴れ着フォームの起動実験で被験者に選ばれてから、友達になったんだよね～」"

[[dialogue]]
speaker = "ウズメイア"
# 「それで、ヘレナちゃんも会長くんとおでかけしたことないって聞いたから、３人で遊ぼうって話になったわけ」
line = "「それで、ヘレナちゃんも会長くんとおでかけしたことないって聞いたから、３人で遊ぼうって話になったわけ」"

[[dialogue]]
speaker = "ヘレナ"
# 「我が魂も、宣伝をしとけと囁くのでな。今回、参戦した次第だ」
line = "「我が魂も、宣伝をしとけと囁くのでな。今回、参戦した次第だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「む？　――宣伝というのは一体なんなのか、だと？」
line = "「む？　――宣伝というのは一体なんなのか、だと？」"

[[dialogue]]
speaker = "ヘレナ"
# 「それはもちろん、<b>貴殿</b>に対してのものに決まっておろう？　これを機に、ヘレナちゃんの魅力を更に知ってもらわねばな」
line = "「それはもちろん、<b>貴殿</b>に対してのものに決まっておろう？　これを機に、ヘレナちゃんの魅力を更に知ってもらわねばな」"

[[dialogue]]
speaker = "unk"
# それと、ウズメの衣装は……？
line = "それと、ウズメの衣装は……？"

[[dialogue]]
speaker = "ウズメイア"
# 「晴れ着フォーム？　お正月だし、日本のオタクたるもの、聖地に入るからには、コスプレをしないと♪」
line = "「晴れ着フォーム？　お正月だし、日本のオタクたるもの、聖地に入るからには、コスプレをしないと♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「うん？　――また日本文化を勘違いしてる？」
line = "「うん？　――また日本文化を勘違いしてる？」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ、コスプレってギャルファッションみたいなオシャレとは違うの！？」
line = "「えっ、コスプレってギャルファッションみたいなオシャレとは違うの！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「いやいや！　あそこにもほら、ネコミミと尻尾付けたメイドさんが立ってるじゃん！？」
line = "「いやいや！　あそこにもほら、ネコミミと尻尾付けたメイドさんが立ってるじゃん！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「――あれはメイド喫茶の店員さん？　そうなの！？」
line = "「――あれはメイド喫茶の店員さん？　そうなの！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふふ、コスプレして遊び歩くか。面白い。ウズメの友人として、この九浄ヘレナ、流れに乗らねばな！」
line = "「ふふふ、コスプレして遊び歩くか。面白い。ウズメの友人として、この九浄ヘレナ、流れに乗らねばな！」"

[[dialogue]]
speaker = "ヘレナ"
# 「いざ――変身！」
line = "「いざ――変身！」"

[[dialogue]]
speaker = "ウズメイア"
# 「こ、これが……！」
line = "「こ、これが……！」"

[[dialogue]]
speaker = "ヘレナ"
# 「桜も羨むその姿、とくと目に焼き付けよ――」
line = "「桜も羨むその姿、とくと目に焼き付けよ――」"

[[dialogue]]
speaker = "ヘレナ"
# 「ラブリーでファンシーなヘレナちゃん戦闘フォーム、ここに降臨である！」
line = "「ラブリーでファンシーなヘレナちゃん戦闘フォーム、ここに降臨である！」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヤバッ……カッコよ過ぎじゃん！？」
line = "「ヤバッ……カッコよ過ぎじゃん！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヘレナちゃんの戦闘服、マジで神々しいんだけど！？　日本文化オタクとしては、興奮不可避だし！」
line = "「ヘレナちゃんの戦闘服、マジで神々しいんだけど！？　日本文化オタクとしては、興奮不可避だし！」"

[[dialogue]]
speaker = "ヘレナ"
# 「であろう？　ふふっ、さあ、今日はこの姿で、思う存分休日を楽しもうぞ♪」
line = "「であろう？　ふふっ、さあ、今日はこの姿で、思う存分休日を楽しもうぞ♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「ゆくぞ、ウズメ。ヘレナちゃんに付いてくるがよい」
line = "「ゆくぞ、ウズメ。ヘレナちゃんに付いてくるがよい」"

[[dialogue]]
speaker = "ウズメイア"
# 「うんっ♪　あたしも正々堂々、晴れ着フォームで行くし♪」
line = "「うんっ♪　あたしも正々堂々、晴れ着フォームで行くし♪」"

[[dialogue]]
speaker = "unk"
# せめて武器はしまってね！？
line = "せめて武器はしまってね！？"

[[dialogue]]
speaker = "unk"
# そうして秋葉原を歩き始めた俺たちは、アニメショップを見つけて入ることになった――
line = "そうして秋葉原を歩き始めた俺たちは、アニメショップを見つけて入ることになった――"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くん、この漫画とかめっちゃ面白いから、ぜひ読んで欲しいし！　神属性の居合術を使うキャラが出てきて、普段はヘタレなんだけど、戦闘になるとカッコよくてさ～」
line = "「会長くん、この漫画とかめっちゃ面白いから、ぜひ読んで欲しいし！　神属性の居合術を使うキャラが出てきて、普段はヘタレなんだけど、戦闘になるとカッコよくてさ～」"

[[dialogue]]
speaker = "ヘレナ"
# 「その漫画ならば、ヘレナちゃんの推しは五刀流の奴だ。技が派手で、アニメ版の演出は実によいぞ」
line = "「その漫画ならば、ヘレナちゃんの推しは五刀流の奴だ。技が派手で、アニメ版の演出は実によいぞ」"

[[dialogue]]
speaker = "ウズメイア"
# 「わかりみが深いし♪　日本刀、マジでカッコいいよね～。九浄家メイド隊の閃先輩とか、マジリスペクトなんだけど♪」
line = "「わかりみが深いし♪　日本刀、マジでカッコいいよね～。九浄家メイド隊の閃先輩とか、マジリスペクトなんだけど♪」"

[[dialogue]]
speaker = "unk"
# ウズメはサブカルチャーも好きなんだな
line = "ウズメはサブカルチャーも好きなんだな"

[[dialogue]]
speaker = "ウズメイア"
# 「そりゃもう、漫画やアニメも日本の文化だし♪」
line = "「そりゃもう、漫画やアニメも日本の文化だし♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「私は時代劇が好きであるゆえ、ウズメよりもジャンルは偏っているがな」
line = "「私は時代劇が好きであるゆえ、ウズメよりもジャンルは偏っているがな」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヘレナちゃんは可愛い女の子がいっぱい出てくる作品も好きだよね～」
line = "「ヘレナちゃんは可愛い女の子がいっぱい出てくる作品も好きだよね～」"

[[dialogue]]
speaker = "ヘレナ"
# 「ラブリーでファンシーなものが好きなのでな。ほら、このラブコメ漫画とか、実によいぞ」
line = "「ラブリーでファンシーなものが好きなのでな。ほら、このラブコメ漫画とか、実によいぞ」"

[[dialogue]]
speaker = "ヘレナ"
# 「メイド服のプリティーな子が沢山出てくる。それに、主人公の男子もラブリーな顔をしていて、更によい。ふふっ……」
line = "「メイド服のプリティーな子が沢山出てくる。それに、主人公の男子もラブリーな顔をしていて、更によい。ふふっ……」"

[[dialogue]]
speaker = "ウズメイア"
# 「そういえば、九浄家メイド隊を作ったのもヘレナちゃんなんだっけ？」
line = "「そういえば、九浄家メイド隊を作ったのもヘレナちゃんなんだっけ？」"

[[dialogue]]
speaker = "ヘレナ"
# 「その通り。星見家メイド隊が羨ましくて、作ったのだ。ちなみに、メイド服のデザインも私だったりするぞ」
line = "「その通り。星見家メイド隊が羨ましくて、作ったのだ。ちなみに、メイド服のデザインも私だったりするぞ」"

[[dialogue]]
speaker = "ウズメイア"
# 「――あっ、この辺はボーイズラブのコーナーだね～。じゃあ、飛ばして別のところに……」
line = "「――あっ、この辺はボーイズラブのコーナーだね～。じゃあ、飛ばして別のところに……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ。待つがよい、ウズメよ」
line = "「ふむ。待つがよい、ウズメよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヘレナちゃん？」
line = "「ヘレナちゃん？」"

[[dialogue]]
speaker = "ヘレナ"
# 「なぜ<ruby=ビーエル>ＢＬ</ruby>を避けるのだ？」
line = "「なぜ<ruby>ＢＬ<rt>ビーエル</rt></ruby>を避けるのだ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「え？　何故って……」
line = "「え？　何故って……」"

[[dialogue]]
speaker = "ヘレナ"
# 「これもまた、日本のサブカルチャーを代表する１つであろう？」
line = "「これもまた、日本のサブカルチャーを代表する１つであろう？」"

[[dialogue]]
speaker = "ウズメイア"
# 「じ、実はその……あたし、人間界にくるまで、そういうジャンルがあるとは知らなくて……」
line = "「じ、実はその……あたし、人間界にくるまで、そういうジャンルがあるとは知らなくて……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしには刺激が強すぎて、触れてみる勇気がまだないというか～……」
line = "「あたしには刺激が強すぎて、触れてみる勇気がまだないというか～……」"

[[dialogue]]
speaker = "ヘレナ"
# 「オメガバース」
line = "「オメガバース」"

[[dialogue]]
speaker = "ヘレナ"
# 「というのを知っているか？」
line = "「というのを知っているか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「え？　いや、初めて聞いたかも。それって一体……？」
line = "「え？　いや、初めて聞いたかも。それって一体……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「簡単に言うと――」
line = "「簡単に言うと――」"

[[dialogue]]
speaker = "ヘレナ"
# 「<b>男が子供を産める</b>のだ」
line = "「<b>男が子供を産める</b>のだ」"

[[dialogue]]
speaker = "ウズメイア"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ、ちょっと待って。どゆこと、どゆこと？　それって自分１人で子孫を残せる的な？」
line = "「えっ、ちょっと待って。どゆこと、どゆこと？　それって自分１人で子孫を残せる的な？」"

[[dialogue]]
speaker = "ヘレナ"
# 「否、そうではない。これはＢＬの話だ」
line = "「否、そうではない。これはＢＬの話だ」"

[[dialogue]]
speaker = "ウズメイア"
# 「それってつまり……」
line = "「それってつまり……」"

[[dialogue]]
speaker = "ヘレナ"
# 「男同士で子を成せる世界観、ということだ」
line = "「男同士で子を成せる世界観、ということだ」"

[[dialogue]]
speaker = "ウズメイア"
# 「そんなことが……！？」
line = "「そんなことが……！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ウズメよ」
line = "「ウズメよ」"

[[dialogue]]
speaker = "ヘレナ"
# 「オメガバースは、よいぞ？」
line = "「オメガバースは、よいぞ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヘレナちゃん、ちなみにオススメは？」
line = "「ヘレナちゃん、ちなみにオススメは？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、これとかよいぞ？　『お前は魔王だ』と突然言われた主人公が、生徒会に入り、逆ハーレム状態で総受けになる――」
line = "「ふふっ、これとかよいぞ？　『お前は魔王だ』と突然言われた主人公が、生徒会に入り、逆ハーレム状態で総受けになる――」"

[[dialogue]]
speaker = "ウズメイア"
# 「よし、買うし！」
line = "「よし、買うし！」"

[[dialogue]]
speaker = "unk"
# 待て待て待て待て待て！！！
line = "待て待て待て待て待て！！！"

[[dialogue]]
speaker = "unk"
# どこかで聞いた設定に、全力でツッコミを入れる俺なのだった――
line = "どこかで聞いた設定に、全力でツッコミを入れる俺なのだった――"

[[dialogue]]
speaker = "unk"
# それから、ウズメはヘレナからオススメされた漫画を買って、アニメショップを後にした――
line = "それから、ウズメはヘレナからオススメされた漫画を買って、アニメショップを後にした――"

[[dialogue]]
speaker = "ウズメイア"
# 「ふふっ……ついに新たな日本文化に手を出してしまった……。でも、早く読みたくて、ウズウズするし♪」
line = "「ふふっ……ついに新たな日本文化に手を出してしまった……。でも、早く読みたくて、ウズウズするし♪」"

[[dialogue]]
speaker = "unk"
# くっ……！　阻止できなかった！
line = "くっ……！　阻止できなかった！"

[[dialogue]]
speaker = "ウズメイア"
# 「読み終わったら会長くんにも貸すね♪　友達ならシェアしないと！」
line = "「読み終わったら会長くんにも貸すね♪　友達ならシェアしないと！」"

[[dialogue]]
speaker = "ヘレナ"
# 「――さて、２人共、次はどうする？　私は、お腹がいい感じに空いてきたところではあるが……」
line = "「――さて、２人共、次はどうする？　私は、お腹がいい感じに空いてきたところではあるが……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、確かに～！　どっかで昼食にしよっか。なに食べたい？」
line = "「あっ、確かに～！　どっかで昼食にしよっか。なに食べたい？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ。ならば、せっかく秋葉原にきたのだし――」
line = "「ふむ。ならば、せっかく秋葉原にきたのだし――」"

[[dialogue]]
speaker = "ヘレナ"
# 「メイド喫茶に行ってみるのはどうだ？」
line = "「メイド喫茶に行ってみるのはどうだ？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたし入ったことない！　ヘレナちゃんは行ったことあるの？」
line = "「あたし入ったことない！　ヘレナちゃんは行ったことあるの？」"

[[dialogue]]
speaker = "ヘレナ"
# 「無論、メイド好きとして行ったことがあるとも。貴殿はどうだ？」
line = "「無論、メイド好きとして行ったことがあるとも。貴殿はどうだ？」"

[[dialogue]]
speaker = "unk"
# 俺も……入ったことはない、かな……
line = "俺も……入ったことはない、かな……"

[[dialogue]]
speaker = "ヘレナ"
# 「む？　魔王よ、なぜ目を逸らすのだ？」
line = "「む？　魔王よ、なぜ目を逸らすのだ？」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "メイドさん"
# 「あの～、ご主人様たちはひょっとして、メイド喫茶をお探しですかにゃん？」
line = "「あの～、ご主人様たちはひょっとして、メイド喫茶をお探しですかにゃん？」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "ウズメイア"
# 「わっ、めっちゃ可愛い～！　猫耳メイドさんだし♪　もしかしてメイド喫茶の？」
line = "「わっ、めっちゃ可愛い～！　猫耳メイドさんだし♪　もしかしてメイド喫茶の？」"

[[dialogue]]
speaker = "メイドさん"
# 「さすがは聡明なご主人様！　その通りですにゃん♪　私、近くにある猫耳メイド喫茶の店長をしてまして～」
line = "「さすがは聡明なご主人様！　その通りですにゃん♪　私、近くにある猫耳メイド喫茶の店長をしてまして～」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほう、実にプリティーではないか。ふふっ、我が魂も、その店に興味があると囁いているぞ」
line = "「ほう、実にプリティーではないか。ふふっ、我が魂も、その店に興味があると囁いているぞ」"

[[dialogue]]
speaker = "メイドさん"
# 「わぁっ♪　本当ですかにゃん？　ありがとうございます～♪　じゃあ、早速ご案内を～……って、あら？」
line = "「わぁっ♪　本当ですかにゃん？　ありがとうございます～♪　じゃあ、早速ご案内を～……って、あら？」"

[[dialogue]]
speaker = "メイドさん"
# 「そこにいるのって、もしかして……クロトくんじゃないかにゃん！？」
line = "「そこにいるのって、もしかして……クロトくんじゃないかにゃん！？」"

[[dialogue]]
speaker = "メイドさん"
# 「うわ～、久しぶり～♪　元気にしてた？」
line = "「うわ～、久しぶり～♪　元気にしてた？」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ！？　会長くん、知り合いなの！？」
line = "「えっ！？　会長くん、知り合いなの！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほほう、２人は一体どういう関係なのだ？」
line = "「ほほう、２人は一体どういう関係なのだ？」"

[[dialogue]]
speaker = "メイドさん"
# 「実はクロトくん、一時期うちの店でバイトしてたのにゃん！」
line = "「実はクロトくん、一時期うちの店でバイトしてたのにゃん！」"

[[dialogue]]
speaker = "unk"
# て、店長！　その話は――
line = "て、店長！　その話は――"

[[dialogue]]
speaker = "ウズメイア"
# 「え～、そうなの！？　別に恥ずかしがらずに言えばよかったのに～♪」
line = "「え～、そうなの！？　別に恥ずかしがらずに言えばよかったのに～♪」"

[[dialogue]]
speaker = "メイドさん"
# 「そうにゃん！　なにせクロトくんは、うちの店で人気ナンバー１だったんだから！」
line = "「そうにゃん！　なにせクロトくんは、うちの店で人気ナンバー１だったんだから！」"

[[dialogue]]
speaker = "ウズメイア"
# 「へぇ～！　すご～い♪　って」
line = "「へぇ～！　すご～い♪　って」"

[[dialogue]]
speaker = "ウズメイア"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「今なんて？」
line = "「今なんて？」"

[[dialogue]]
speaker = "メイドさん"
# 「にゃん？　クロトくんは当時、うちの店で人気ナンバー１のメ」
line = "「にゃん？　クロトくんは当時、うちの店で人気ナンバー１のメ」"

[[dialogue]]
speaker = "unk"
# 店長ぉぉぉ！　ストォォォーーープッ！！！
line = "店長ぉぉぉ！　ストォォォーーープッ！！！"

[[dialogue]]
speaker = "ヘレナ"
# 「ふっ……ふふふっ……！」
line = "「ふっ……ふふふっ……！」"

[[dialogue]]
speaker = "ヘレナ"
# 「あはっ……あはははははっ！　それは面白い！　よし、今日のお昼はそこにするぞ♪」
line = "「あはっ……あはははははっ！　それは面白い！　よし、今日のお昼はそこにするぞ♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ、会長くん、マジで！？　つまりはそういうこと！？」
line = "「えっ、会長くん、マジで！？　つまりはそういうこと！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヤバッ、なにそれ、めっちゃ気になるし！　もっと詳しく聞きたいんだけど～！」
line = "「ヤバッ、なにそれ、めっちゃ気になるし！　もっと詳しく聞きたいんだけど～！」"

[[dialogue]]
speaker = "メイドさん"
# 「もちろん、いいですよ～♪　当時の写真や動画もありますから、是非是非～♪」
line = "「もちろん、いいですよ～♪　当時の写真や動画もありますから、是非是非～♪」"

[[dialogue]]
speaker = "unk"
# 店長おおおぉぉぉーーーーーーっ！！？
line = "店長おおおぉぉぉーーーーーーっ！！？"

[[dialogue]]
speaker = "ヘレナ"
# 「よし、猫耳メイド喫茶にいざ出陣だ♪」
line = "「よし、猫耳メイド喫茶にいざ出陣だ♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「イェ～イ！　レッツゴー♪」
line = "「イェ～イ！　レッツゴー♪」"

[[dialogue]]
speaker = "メイドさん"
# 「ご主人様３名、ご案内にゃ～ん♪」
line = "「ご主人様３名、ご案内にゃ～ん♪」"

[[dialogue]]
speaker = "unk"
# その後、俺は猫耳メイド喫茶でのバイト経験について、２人から根ほり葉ほり聞かれることになったのだった――
line = "その後、俺は猫耳メイド喫茶でのバイト経験について、２人から根ほり葉ほり聞かれることになったのだった――"
