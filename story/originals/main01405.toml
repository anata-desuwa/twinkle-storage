[[dialogue]]
speaker = "unk"
# 第７話,英雄の末路,B
line = "第７話,英雄の末路,B"

[[dialogue]]
speaker = "unk"
# 初代『魔王』ラクシスはリクリエを退け、世界を破滅の危機から救った。
line = "初代『魔王』ラクシスはリクリエを退け、世界を破滅の危機から救った。"

[[dialogue]]
speaker = "unk"
# 彼の英雄譚はそこで幕を閉じる──
line = "彼の英雄譚はそこで幕を閉じる──"

[[dialogue]]
speaker = "unk"
# が、その人生はまだ、否応なく続いていくことになる。
line = "が、その人生はまだ、否応なく続いていくことになる。"

[[dialogue]]
speaker = "unk"
# 痛苦と病魔に苛まれた──艱難辛苦の道のりを。
line = "痛苦と病魔に苛まれた──艱難辛苦の道のりを。"

[[dialogue]]
speaker = "ラクシス"
# 「う……ぐっ……はっ……！　これが……ッ、力の──代償か……！」
line = "「う……ぐっ……はっ……！　これが……ッ、力の──代償か……！」"

[[dialogue]]
speaker = "unk"
# リクリエとの戦いを経て、ラクシスの体は完全に<ruby=むしば>蝕</ruby>まれていた。
line = "リクリエとの戦いを経て、ラクシスの体は完全に<ruby>蝕<rt>むしば</rt></ruby>まれていた。"

[[dialogue]]
speaker = "unk"
# 魔獣たちによる強毒性の血を幾度となく浴び、<ruby=じんだい>甚大</ruby>な瘴気に汚染された彼の肉体は深刻な容態に陥る。
line = "魔獣たちによる強毒性の血を幾度となく浴び、<ruby>甚大<rt>じんだい</rt></ruby>な瘴気に汚染された彼の肉体は深刻な容態に陥る。"

[[dialogue]]
speaker = "unk"
# また、数えきれない亡霊たちが彼の精神にも巣食っていた。
line = "また、数えきれない亡霊たちが彼の精神にも巣食っていた。"

[[dialogue]]
speaker = "unk"
# おびただしい後遺症の数々。英雄の心身は、無事などではなかったのだ。
line = "おびただしい後遺症の数々。英雄の心身は、無事などではなかったのだ。"

[[dialogue]]
speaker = "ラクシス"
# 「このまま朽ちるも定め……かも、しれないが──」
line = "「このまま朽ちるも定め……かも、しれないが──」"

[[dialogue]]
speaker = "ラクシス"
# 「リクリエは世界のリセット機構……なら、いずれもう一度大きな揺り戻しが来る……！」
line = "「リクリエは世界のリセット機構……なら、いずれもう一度大きな揺り戻しが来る……！」"

[[dialogue]]
speaker = "unk"
# 彼には地を這ってでも生きねばならない理由があった。
line = "彼には地を這ってでも生きねばならない理由があった。"

[[dialogue]]
speaker = "unk"
# そう。いずれ来たる２度目のリクリエがため、英雄としての使命を果たさんとしていたのだ。
line = "そう。いずれ来たる２度目のリクリエがため、英雄としての使命を果たさんとしていたのだ。"

[[dialogue]]
speaker = "unk"
# しかし……彼は自分の命が長くないことをわかっていた。
line = "しかし……彼は自分の命が長くないことをわかっていた。"

[[dialogue]]
speaker = "unk"
# 魔王としての覚醒は確かに彼の生命的寿命を格段に引き上げた──
line = "魔王としての覚醒は確かに彼の生命的寿命を格段に引き上げた──"

[[dialogue]]
speaker = "unk"
# それでも、この病に蝕まれた状態では、次のリクリエまで生き永らえることは不可能だと。
line = "それでも、この病に蝕まれた状態では、次のリクリエまで生き永らえることは不可能だと。"

[[dialogue]]
speaker = "unk"
# どんな治療や霊術を施しても、彼の病状はとても癒やせるものではなかった。
line = "どんな治療や霊術を施しても、彼の病状はとても癒やせるものではなかった。"

[[dialogue]]
speaker = "ラクシス"
# 「魔王の、因子……せめてこれだけでも──後世に伝えないと……！」
line = "「魔王の、因子……せめてこれだけでも──後世に伝えないと……！」"

[[dialogue]]
speaker = "unk"
# 彼に適合した『魔王』は元よりオルタナティブ宇宙からもたらされたもの。
line = "彼に適合した『魔王』は元よりオルタナティブ宇宙からもたらされたもの。"

[[dialogue]]
speaker = "unk"
# もしラクシスが没してしまえば、世界は再びリクリエに抗う術を失うことになる。
line = "もしラクシスが没してしまえば、世界は再びリクリエに抗う術を失うことになる。"

[[dialogue]]
speaker = "unk"
# 彼にはあまりにも時間がなかった。そんな折だ。
line = "彼にはあまりにも時間がなかった。そんな折だ。"

[[dialogue]]
speaker = "unk"
# ラクシスと共に最前線を生き抜いた戦友、フェリシアは彼の<ruby=おうのう>懊悩</ruby>を見抜いてこう提案した。
line = "ラクシスと共に最前線を生き抜いた戦友、フェリシアは彼の<ruby>懊悩<rt>おうのう</rt></ruby>を見抜いてこう提案した。"

[[dialogue]]
speaker = "unk"
# 私との間に子を為してはどうか──と。
line = "私との間に子を為してはどうか──と。"

[[dialogue]]
speaker = "unk"
# 血脈を通じて魔王の因子が受け継がれるかどうか──それも数千年の時を経て──は不明だったが、ラクシスはその方策に乗った。
line = "血脈を通じて魔王の因子が受け継がれるかどうか──それも数千年の時を経て──は不明だったが、ラクシスはその方策に乗った。"

[[dialogue]]
speaker = "unk"
# 果たして彼らの祈りは通じ、フェリシアは無事に子を宿した。
line = "果たして彼らの祈りは通じ、フェリシアは無事に子を宿した。"

[[dialogue]]
speaker = "unk"
# だが……ラクシスはついに、我が子の顔を拝むことはなかった。
line = "だが……ラクシスはついに、我が子の顔を拝むことはなかった。"

[[dialogue]]
speaker = "unk"
# 魔王が人間界にいた頃の記録はそこで途絶えている。
line = "魔王が人間界にいた頃の記録はそこで途絶えている。"

[[dialogue]]
speaker = "unk"
# 彼はそれからもどうにか自らの命を繋ぐ方法がないかと探し求めていた。
line = "彼はそれからもどうにか自らの命を繋ぐ方法がないかと探し求めていた。"

[[dialogue]]
speaker = "unk"
# そして、彼に最後の手を差し伸べたのは、当時、クルセイダースの中に紛れ込んでいた一人の魔女だった。
line = "そして、彼に最後の手を差し伸べたのは、当時、クルセイダースの中に紛れ込んでいた一人の魔女だった。"

[[dialogue]]
speaker = "unk"
# 『私たちの故郷に光の魔女さまがいる。その救済の魔法なら、あなたの病も治せるかもしれない』
line = "『私たちの故郷に光の魔女さまがいる。その救済の魔法なら、あなたの病も治せるかもしれない』"

[[dialogue]]
speaker = "unk"
# 『だけど、このことは決して口外してはいけない。魔女と三界はまだ交わる準備ができていないから』
line = "『だけど、このことは決して口外してはいけない。魔女と三界はまだ交わる準備ができていないから』"

[[dialogue]]
speaker = "unk"
# どんな霊術も受けつけなかったラクシスの病。
line = "どんな霊術も受けつけなかったラクシスの病。"

[[dialogue]]
speaker = "unk"
# <ruby=いちる>一縷</ruby>の望みがあるのならと、彼はその条件に応じる。
line = "<ruby>一縷<rt>いちる</rt></ruby>の望みがあるのならと、彼はその条件に応じる。"

[[dialogue]]
speaker = "unk"
# ラクシスは魔女の森へ導かれた。
line = "ラクシスは魔女の森へ導かれた。"

[[dialogue]]
speaker = "unk"
# 人間界の記録にも、魔女たちの文献にも残されていない。秘密の招待だった。
line = "人間界の記録にも、魔女たちの文献にも残されていない。秘密の招待だった。"

[[dialogue]]
speaker = "？？？"
# 「人間がこの森を訪れるなど……果たして、いつぶりのことでしょうか」
line = "「人間がこの森を訪れるなど……果たして、いつぶりのことでしょうか」"

[[dialogue]]
speaker = "？？？"
# 「お会いできて光栄です──救世の英雄、ラクシス様」
line = "「お会いできて光栄です──救世の英雄、ラクシス様」"

[[dialogue]]
speaker = "ラクシス"
# 「あなたが……光の、魔女か」
line = "「あなたが……光の、魔女か」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい。真祖ディアナの血を継ぎし……第７代“光の魔女”トリュファイナと申します」
line = "「はい。真祖ディアナの血を継ぎし……第７代“光の魔女”トリュファイナと申します」"

[[dialogue]]
speaker = "ラクシス"
# 「っ……これは……！？」
line = "「っ……これは……！？」"

[[dialogue]]
speaker = "unk"
# ラクシスは驚愕した。
line = "ラクシスは驚愕した。"

[[dialogue]]
speaker = "unk"
# トリュファイナの発する光の魔力に触れただけで、長らく苦しめられてきた臓腑の痛みが消え去ったからだ。
line = "トリュファイナの発する光の魔力に触れただけで、長らく苦しめられてきた臓腑の痛みが消え去ったからだ。"

[[dialogue]]
speaker = "トリュファイナ"
# 「一時的な対処です。そのままでは、語らうことさえ苦しいでしょう」
line = "「一時的な対処です。そのままでは、語らうことさえ苦しいでしょう」"

[[dialogue]]
speaker = "ラクシス"
# 「……ありがとう」
line = "「……ありがとう」"

[[dialogue]]
speaker = "ラクシス"
# （この波動……覚えがある。一度、クルセイダースが全滅しかけた時、奇跡的に助かったことがあった……）
line = "（この波動……覚えがある。一度、クルセイダースが全滅しかけた時、奇跡的に助かったことがあった……）"

[[dialogue]]
speaker = "unk"
# 魔女は三界との交流を断ったと伝えられていたが──どうもそうではないらしいとラクシスは察する。
line = "魔女は三界との交流を断ったと伝えられていたが──どうもそうではないらしいとラクシスは察する。"

[[dialogue]]
speaker = "unk"
# だが、それは言うまいと心に秘めた。
line = "だが、それは言うまいと心に秘めた。"

[[dialogue]]
speaker = "ラクシス"
# 「あなたの『再生』の魔法……どうか、俺に使ってもらえないか」
line = "「あなたの『再生』の魔法……どうか、俺に使ってもらえないか」"

[[dialogue]]
speaker = "unk"
# ラクシスは自らの抱える闇と悩みとすべて語った。
line = "ラクシスは自らの抱える闇と悩みとすべて語った。"

[[dialogue]]
speaker = "unk"
# 自身にはオルタナティブ宇宙由来の魔王の因子が眠っていること。
line = "自身にはオルタナティブ宇宙由来の魔王の因子が眠っていること。"

[[dialogue]]
speaker = "unk"
# リクリエはさらに大きな波が来るかもしれないこと。そして、汚染されきった自分の体はこのままじゃ持たないこと……。
line = "リクリエはさらに大きな波が来るかもしれないこと。そして、汚染されきった自分の体はこのままじゃ持たないこと……。"

[[dialogue]]
speaker = "トリュファイナ"
# 「なるほど……事態は把握しました」
line = "「なるほど……事態は把握しました」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ですが……あなたの汚染はあまりにも根深い。私の魔法をもってしても、総ての汚染を取り除くことは不可能です」
line = "「ですが……あなたの汚染はあまりにも根深い。私の魔法をもってしても、総ての汚染を取り除くことは不可能です」"

[[dialogue]]
speaker = "トリュファイナ"
# 「魔王という異界の<ruby=ことわり>理</ruby>に私の『再生』がどこまで通じるかは未知数。それに……たとえ効くことがあっても、得られる寿命は本来の人間のものに留まるでしょう」
line = "「魔王という異界の<ruby>理<rt>ことわり</rt></ruby>に私の『再生』がどこまで通じるかは未知数。それに……たとえ効くことがあっても、得られる寿命は本来の人間のものに留まるでしょう」"

[[dialogue]]
speaker = "ラクシス"
# 「そんなに都合のいい方法はない……か」
line = "「そんなに都合のいい方法はない……か」"

[[dialogue]]
speaker = "トリュファイナ"
# 「察するに……魔王というのはひとつの巨大な『器』なのでしょう」
line = "「察するに……魔王というのはひとつの巨大な『器』なのでしょう」"

[[dialogue]]
speaker = "ラクシス"
# 「器……」
line = "「器……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい。人間を、魔族を、天使を──あらゆる種族を率いる統率者として、あなたは大器となった」
line = "「はい。人間を、魔族を、天使を──あらゆる種族を率いる統率者として、あなたは大器となった」"

[[dialogue]]
speaker = "トリュファイナ"
# 「それは……たとえ忌むべき種であっても。どんな清濁をも<ruby=あわ>併</ruby>せ飲んでしまう、危うさも秘めた在り方です」
line = "「それは……たとえ忌むべき種であっても。どんな清濁をも<ruby>併<rt>あわ</rt></ruby>せ飲んでしまう、危うさも秘めた在り方です」"

[[dialogue]]
speaker = "unk"
# 魔王という器は強大すぎるがゆえに、ラクシスの体には規格外の瘴気が渦巻いている──
line = "魔王という器は強大すぎるがゆえに、ラクシスの体には規格外の瘴気が渦巻いている──"

[[dialogue]]
speaker = "unk"
# 一度適合してしまった魔王の因子は、水晶石として取り出すこともできないという。
line = "一度適合してしまった魔王の因子は、水晶石として取り出すこともできないという。"

[[dialogue]]
speaker = "ラクシス"
# 「打つ手はない……ということか」
line = "「打つ手はない……ということか」"

[[dialogue]]
speaker = "トリュファイナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# トリュファイナは熟考した。
line = "トリュファイナは熟考した。"

[[dialogue]]
speaker = "トリュファイナ"
# 「浄化の手立てが全くない……というわけではありません。最後の手段を除けば」
line = "「浄化の手立てが全くない……というわけではありません。最後の手段を除けば」"

[[dialogue]]
speaker = "ラクシス"
# 「……！　最後の手段、だって……？」
line = "「……！　最後の手段、だって……？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「<ruby=レナトゥス>封理再誕</ruby>──この森では、そう伝えられている禁術です」
line = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>──この森では、そう伝えられている禁術です」"

[[dialogue]]
speaker = "unk"
# トリュファイナは深刻な面持ちで言った。
line = "トリュファイナは深刻な面持ちで言った。"

[[dialogue]]
speaker = "トリュファイナ"
# 「これは……人間どころか、魔女に施すことさえ許されていない禁忌の魔法」
line = "「これは……人間どころか、魔女に施すことさえ許されていない禁忌の魔法」"

[[dialogue]]
speaker = "トリュファイナ"
# 「その名の通り──対象の人物を生まれ変わらせる効果を持ちます」
line = "「その名の通り──対象の人物を生まれ変わらせる効果を持ちます」"

[[dialogue]]
speaker = "ラクシス"
# 「生まれ変わらせる……そんなことができるのか……？」
line = "「生まれ変わらせる……そんなことができるのか……？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「想像してみてください」
line = "「想像してみてください」"

[[dialogue]]
speaker = "unk"
# トリュファイナの言葉と同時、宙には光の『<ruby=まゆ>繭</ruby>』が出現した。
line = "トリュファイナの言葉と同時、宙には光の『<ruby>繭<rt>まゆ</rt></ruby>』が出現した。"

[[dialogue]]
speaker = "トリュファイナ"
# 「蛾は通常、<ruby=まゆ>繭</ruby>の中で<ruby=さなぎ>蛹</ruby>となって成虫への変態を遂げます。<ruby=レナトゥス>封理再誕</ruby>は──この順序を逆転させるようなもの」
line = "「蛾は通常、<ruby>繭<rt>まゆ</rt></ruby>の中で<ruby>蛹<rt>さなぎ</rt></ruby>となって成虫への変態を遂げます。<ruby>封理再誕<rt>レナトゥス</rt></ruby>は──この順序を逆転させるようなもの」"

[[dialogue]]
speaker = "ラクシス"
# 「成虫から幼虫に……ってことか」
line = "「成虫から幼虫に……ってことか」"

[[dialogue]]
speaker = "トリュファイナ"
# 「これには多くの制約が伴います。まず、対象を一度、生命の種にまで若返らせるため、あらゆる記憶を失います」
line = "「これには多くの制約が伴います。まず、対象を一度、生命の種にまで若返らせるため、あらゆる記憶を失います」"

[[dialogue]]
speaker = "ラクシス"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「いわば擬似的な転生です。これによって今のあなたを侵食する病はすべて浄化されますが、同時に力と経験も消え去ります」
line = "「いわば擬似的な転生です。これによって今のあなたを侵食する病はすべて浄化されますが、同時に力と経験も消え去ります」"

[[dialogue]]
speaker = "unk"
# <ruby=レナトゥス>封理再誕</ruby>にかけられた人物は何もかも幼い状態に巻き戻って封印される。
line = "<ruby>封理再誕<rt>レナトゥス</rt></ruby>にかけられた人物は何もかも幼い状態に巻き戻って封印される。"

[[dialogue]]
speaker = "unk"
# だがそれなら、ラクシスに宿った魔王の因子は失われずに済む可能性があるという。
line = "だがそれなら、ラクシスに宿った魔王の因子は失われずに済む可能性があるという。"

[[dialogue]]
speaker = "ラクシス"
# 「だけど……記憶までなくなってしまうのなら、それはもう俺じゃなくなるんじゃないか？」
line = "「だけど……記憶までなくなってしまうのなら、それはもう俺じゃなくなるんじゃないか？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい。魔王という概念は残りますが、あなたはラクシスではなくなります」
line = "「はい。魔王という概念は残りますが、あなたはラクシスではなくなります」"

[[dialogue]]
speaker = "トリュファイナ"
# 「つまりこの法は……実質的には死を下すものと変わりません。ゆえに禁忌とされてきました」
line = "「つまりこの法は……実質的には死を下すものと変わりません。ゆえに禁忌とされてきました」"

[[dialogue]]
speaker = "ラクシス"
# 「……なるほどな。納得だ」
line = "「……なるほどな。納得だ」"

[[dialogue]]
speaker = "unk"
# 光の魔女が語った禁忌たる所以に、ラクシスは得心した。
line = "光の魔女が語った禁忌たる所以に、ラクシスは得心した。"

[[dialogue]]
speaker = "ラクシス"
# 「その禁術ってやつは、この場でかけられるのか？」
line = "「その禁術ってやつは、この場でかけられるのか？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「<ruby=レナトゥス>封理再誕</ruby>は光の魔法。私であれば可能です」
line = "「<ruby>封理再誕<rt>レナトゥス</rt></ruby>は光の魔法。私であれば可能です」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ただし……封印した相手がいつ目覚めるかは、私にもわかりません」
line = "「ただし……封印した相手がいつ目覚めるかは、私にもわかりません」"

[[dialogue]]
speaker = "ラクシス"
# 「長くてどのくらいになる？」
line = "「長くてどのくらいになる？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「何百年、いえ、何千年に及ぶかもしれません。特に今のあなたなら」
line = "「何百年、いえ、何千年に及ぶかもしれません。特に今のあなたなら」"

[[dialogue]]
speaker = "トリュファイナ"
# 「再誕のためにはまっさらになるまで浄化を促す必要があります。あなたの深刻な汚染を取り除くには、膨大な時間が必要なはずです」
line = "「再誕のためにはまっさらになるまで浄化を促す必要があります。あなたの深刻な汚染を取り除くには、膨大な時間が必要なはずです」"

[[dialogue]]
speaker = "unk"
# 膨大の時間。それはラクシスにとっても、無視できない問題だった。
line = "膨大の時間。それはラクシスにとっても、無視できない問題だった。"

[[dialogue]]
speaker = "ラクシス"
# 「次のリクリエに間に合う保証はない──」
line = "「次のリクリエに間に合う保証はない──」"

[[dialogue]]
speaker = "トリュファイナ"
# 「それだけではありません。もし無事に再誕が成功したとしても、今のあなたのように育つとは限らないのですから」
line = "「それだけではありません。もし無事に再誕が成功したとしても、今のあなたのように育つとは限らないのですから」"

[[dialogue]]
speaker = "ラクシス"
# 「魔王の資質が残っていても、英雄になれるかはわからない──ってことか」
line = "「魔王の資質が残っていても、英雄になれるかはわからない──ってことか」"

[[dialogue]]
speaker = "unk"
# 多くのデメリットがあることは承知した。その上で、彼は頷いた。
line = "多くのデメリットがあることは承知した。その上で、彼は頷いた。"

[[dialogue]]
speaker = "ラクシス"
# 「やってくれ。どうせ朽ち果てるだけの体──あなたに会えて俺は幸運だ」
line = "「やってくれ。どうせ朽ち果てるだけの体──あなたに会えて俺は幸運だ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「よいのですか。あなたは……今生に別れを告げることになりますよ」
line = "「よいのですか。あなたは……今生に別れを告げることになりますよ」"

[[dialogue]]
speaker = "ラクシス"
# 「俺の自我なんて……失われても構わない。魔王の因子が残るのなら」
line = "「俺の自我なんて……失われても構わない。魔王の因子が残るのなら」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ラクシス様……いえ、魔王様。なぜ──あなたはそこまで闘いを続けられるのですか？」
line = "「ラクシス様……いえ、魔王様。なぜ──あなたはそこまで闘いを続けられるのですか？」"

[[dialogue]]
speaker = "unk"
# トリュファイナは、ラクシスが生来の英雄でないことを見抜いていた。
line = "トリュファイナは、ラクシスが生来の英雄でないことを見抜いていた。"

[[dialogue]]
speaker = "unk"
# 対するラクシスもまた、呆気に取られたかのように笑う。
line = "対するラクシスもまた、呆気に取られたかのように笑う。"

[[dialogue]]
speaker = "ラクシス"
# 「さあ……どうしてだろうな。使命感──なんてものは、もう通り過ぎたつもりなんだが。性格かな」
line = "「さあ……どうしてだろうな。使命感──なんてものは、もう通り過ぎたつもりなんだが。性格かな」"

[[dialogue]]
speaker = "ラクシス"
# 「だけど──もし、これが、俺の魂に刻まれた想いだっていうなら。生まれ変わった先でも俺は、こうする気がする」
line = "「だけど──もし、これが、俺の魂に刻まれた想いだっていうなら。生まれ変わった先でも俺は、こうする気がする」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……わかりました。あなたの覚悟を尊重します」
line = "「……わかりました。あなたの覚悟を尊重します」"

[[dialogue]]
speaker = "トリュファイナ"
# 「これより行うは禁忌の秘術──<ruby=レナトゥス>封理再誕</ruby>。魔王ラクシス、病めるあなたを浄化するため……世界樹の根へと封印します」
line = "「これより行うは禁忌の秘術──<ruby>封理再誕<rt>レナトゥス</rt></ruby>。魔王ラクシス、病めるあなたを浄化するため……世界樹の根へと封印します」"

[[dialogue]]
speaker = "unk"
# 魔女の森で彼らはそう決意を固めた。
line = "魔女の森で彼らはそう決意を固めた。"

[[dialogue]]
speaker = "unk"
# この時、２人の間で取り交わされた約束を知る者は、以来数千年現れない。
line = "この時、２人の間で取り交わされた約束を知る者は、以来数千年現れない。"

[[dialogue]]
speaker = "トリュファイナ"
# 「森に宿りし聖なる光のマナよ……再誕の加護を汝に与えん」
line = "「森に宿りし聖なる光のマナよ……再誕の加護を汝に与えん」"

[[dialogue]]
speaker = "unk"
# 光の繭がラクシスを包み込んだ。
line = "光の繭がラクシスを包み込んだ。"

[[dialogue]]
speaker = "ラクシス"
# （これが……浄化……そして、再生──か……）
line = "（これが……浄化……そして、再生──か……）"

[[dialogue]]
speaker = "ラクシス"
# （悪いな、フェリシア……最後まで一緒にいてやれなくて……）
line = "（悪いな、フェリシア……最後まで一緒にいてやれなくて……）"

[[dialogue]]
speaker = "unk"
# <ruby=ぼうよう>茫洋</ruby>と失われゆく意識の中で、ラクシスは己が人生を回顧した。
line = "<ruby>茫洋<rt>ぼうよう</rt></ruby>と失われゆく意識の中で、ラクシスは己が人生を回顧した。"

[[dialogue]]
speaker = "トリュファイナ"
# 「ああ……そうでした。ひとつ、忠告しておかなくてはなりません」
line = "「ああ……そうでした。ひとつ、忠告しておかなくてはなりません」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あなたが再び目覚めた暁には──この世界のバランスに、なんらかの揺らぎが生じるはずです」
line = "「あなたが再び目覚めた暁には──この世界のバランスに、なんらかの揺らぎが生じるはずです」"

[[dialogue]]
speaker = "ラクシス"
# 「揺らぎ──それは……どんな……？」
line = "「揺らぎ──それは……どんな……？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「わかりません。あなたに眠る聖か、邪か、はたまたどちらでもない<ruby=カオス>混沌</ruby>か……その気質に影響されるのは間違いないでしょう」
line = "「わかりません。あなたに眠る聖か、邪か、はたまたどちらでもない<ruby>混沌<rt>カオス</rt></ruby>か……その気質に影響されるのは間違いないでしょう」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ただ、生まれ変わったあなたの魂は、本来その時代にないはずのもの。あなたほどの器であれば……その整合性を保つため、世界のほうを変えてしまうはず」
line = "「ただ、生まれ変わったあなたの魂は、本来その時代にないはずのもの。あなたほどの器であれば……その整合性を保つため、世界のほうを変えてしまうはず」"

[[dialogue]]
speaker = "unk"
# トリュファイナの言葉を、ラクシスは十全には理解できていなかった。
line = "トリュファイナの言葉を、ラクシスは十全には理解できていなかった。"

[[dialogue]]
speaker = "unk"
# ただ、自分の再誕と同時に、何かが起きるらしいことだけはわかった。
line = "ただ、自分の再誕と同時に、何かが起きるらしいことだけはわかった。"

[[dialogue]]
speaker = "トリュファイナ"
# 「その先の未来ではきっと、私も生きてはいないでしょう。新たに始まったこの森羅暦──その行く末を観測することは叶いません」
line = "「その先の未来ではきっと、私も生きてはいないでしょう。新たに始まったこの森羅暦──その行く末を観測することは叶いません」"

[[dialogue]]
speaker = "トリュファイナ"
# 「願わくは……その代にも、新たな光の魔女が誕生せんことを祈っています。もしあなたが出会ったのなら、良くしてあげてくださいね」
line = "「願わくは……その代にも、新たな光の魔女が誕生せんことを祈っています。もしあなたが出会ったのなら、良くしてあげてくださいね」"

[[dialogue]]
speaker = "ラクシス"
# 「どうかな……この会話も、どうせ……覚えてはいられないのだから……」
line = "「どうかな……この会話も、どうせ……覚えてはいられないのだから……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ふふ……それもそうでした」
line = "「ふふ……それもそうでした」"

[[dialogue]]
speaker = "unk"
# そうして彼は──魔王ラクシスはその生涯に幕を閉じた。
line = "そうして彼は──魔王ラクシスはその生涯に幕を閉じた。"

[[dialogue]]
speaker = "unk"
# 誰にも知られず。誰にも打ち明けず。ひっそりと、繭に封じられ、世界樹の根へ封印された。
line = "誰にも知られず。誰にも打ち明けず。ひっそりと、繭に封じられ、世界樹の根へ封印された。"

[[dialogue]]
speaker = "unk"
# それから彼は悠久の眠りについた。
line = "それから彼は悠久の眠りについた。"

[[dialogue]]
speaker = "unk"
# 禁術『封理再誕』は確かに、彼の<ruby=こんぱく>魂魄</ruby>を蝕んでいたリクリエによる汚染を浄化していった。
line = "禁術『封理再誕』は確かに、彼の<ruby>魂魄<rt>こんぱく</rt></ruby>を蝕んでいたリクリエによる汚染を浄化していった。"

[[dialogue]]
speaker = "unk"
# しかしその過程で、彼は告げられていた通り、力と経験と記憶とを何もかも失うこととなった。
line = "しかしその過程で、彼は告げられていた通り、力と経験と記憶とを何もかも失うこととなった。"

[[dialogue]]
speaker = "unk"
# すべての浄化が終わったのは、彼が封印されてからおよそ３０００年後──
line = "すべての浄化が終わったのは、彼が封印されてからおよそ３０００年後──"

[[dialogue]]
speaker = "unk"
# 長き時を経て、三界やリクリエを巡る魔女たちの情勢も移り変わっていった。
line = "長き時を経て、三界やリクリエを巡る魔女たちの情勢も移り変わっていった。"

[[dialogue]]
speaker = "unk"
# そんな時、魔王の伝承を探っていたある魔女が、２人の密約に勘づいた。
line = "そんな時、魔王の伝承を探っていたある魔女が、２人の密約に勘づいた。"

[[dialogue]]
speaker = "unk"
# それは奇しくも、彼が繭から羽化した直後のことだった。
line = "それは奇しくも、彼が繭から羽化した直後のことだった。"

[[dialogue]]
speaker = "リノ"
# 「──目覚めていたのね」
line = "「──目覚めていたのね」"

[[dialogue]]
speaker = "リノ"
# 「魔王……あなたには、新たな名前が必要ね。あなたはこのままだと、存在ごと利用されてしまうわ」
line = "「魔王……あなたには、新たな名前が必要ね。あなたはこのままだと、存在ごと利用されてしまうわ」"

[[dialogue]]
speaker = "unk"
# 彼には名が与えられ、その魔女によって人間界へ連れ帰られることとなる。
line = "彼には名が与えられ、その魔女によって人間界へ連れ帰られることとなる。"

[[dialogue]]
speaker = "unk"
# そして彼の誕生は──さらなる世界の変革を生んだ。
line = "そして彼の誕生は──さらなる世界の変革を生んだ。"

[[dialogue]]
speaker = "unk"
# デネブ──
line = "デネブ──"

[[dialogue]]
speaker = "unk"
# ベガ──
line = "ベガ──"

[[dialogue]]
speaker = "unk"
# アルタイル──
line = "アルタイル──"

[[dialogue]]
speaker = "unk"
# 魔王の再誕へ呼応するかのように、宇宙の運命は三つに分かたれた。
line = "魔王の再誕へ呼応するかのように、宇宙の運命は三つに分かたれた。"

[[dialogue]]
speaker = "unk"
# それは、今は亡き魔女トリュファイナも予言していた、決定的な世界の『揺らぎ』であった。
line = "それは、今は亡き魔女トリュファイナも予言していた、決定的な世界の『揺らぎ』であった。"

[[dialogue]]
speaker = "unk"
# 果たしてなぜこのような結果を生んだのか？
line = "果たしてなぜこのような結果を生んだのか？"

[[dialogue]]
speaker = "unk"
# 答えのない問いではあったが、かつてＳとトリュファイナが彼を称した言葉にすべてが詰まっていた。
line = "答えのない問いではあったが、かつてＳとトリュファイナが彼を称した言葉にすべてが詰まっていた。"

[[dialogue]]
speaker = "トリュファイナ"
# 『魔王ラクシス──あなたは、一輪の花のようですね』
line = "『魔王ラクシス──あなたは、一輪の花のようですね』"

[[dialogue]]
speaker = "トリュファイナ"
# 『重なり合う可能性の花弁。そんなあなたの種を植えれば、きっと……新たな領域が芽吹くことになるのでしょう』
line = "『重なり合う可能性の花弁。そんなあなたの種を植えれば、きっと……新たな領域が芽吹くことになるのでしょう』"
