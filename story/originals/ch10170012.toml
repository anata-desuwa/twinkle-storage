[[dialogue]]
speaker = "unk"
# 第２話,友達１００人計画・前編,P
line = "第２話,友達１００人計画・前編,P"

[[dialogue]]
speaker = "unk"
# 蛍火と友達になった数日後。星徒会室でサーシャ先輩と事務仕事をしていると、蛍火がやって来た。
line = "蛍火と友達になった数日後。星徒会室でサーシャ先輩と事務仕事をしていると、蛍火がやって来た。"

[[dialogue]]
speaker = "蛍火"
# 「お忙しいところ、失礼致します」
line = "「お忙しいところ、失礼致します」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、いらっしゃい、蛍火ちゃん。今日はどうしたの？」
line = "「あら、いらっしゃい、蛍火ちゃん。今日はどうしたの？」"

[[dialogue]]
speaker = "蛍火"
# 「……東雲蛍火、本日は会長に大事なお願いがあって参りました」
line = "「……東雲蛍火、本日は会長に大事なお願いがあって参りました」"

[[dialogue]]
speaker = "unk"
# 言うや否や、蛍火はなんとその場で土下座した！
line = "言うや否や、蛍火はなんとその場で土下座した！"

[[dialogue]]
speaker = "サーシャ"
# 「蛍火ちゃん！？」
line = "「蛍火ちゃん！？」"

[[dialogue]]
speaker = "蛍火"
# 「どうか私を……会長の弟子にして下さい！」
line = "「どうか私を……会長の弟子にして下さい！」"

[[dialogue]]
speaker = "unk"
# で……弟子ぃぃぃぃぃっ！？！？！？
line = "で……弟子ぃぃぃぃぃっ！？！？！？"

[[dialogue]]
speaker = "蛍火"
# 「先日、会長は緊張モードの私を前にしても快く、友達になろうと握手を交わしてくれました。まるで呼吸をするように、ごく自然に」
line = "「先日、会長は緊張モードの私を前にしても快く、友達になろうと握手を交わしてくれました。まるで呼吸をするように、ごく自然に」"

[[dialogue]]
speaker = "蛍火"
# 「私はそんな会長の姿に、とても感動したのです。これがいわゆる、『陽キャ』というやつなのかと……」
line = "「私はそんな会長の姿に、とても感動したのです。これがいわゆる、『陽キャ』というやつなのかと……」"

[[dialogue]]
speaker = "蛍火"
# 「私には１つ、叶えたい夢がありまして……」
line = "「私には１つ、叶えたい夢がありまして……」"

[[dialogue]]
speaker = "サーシャ"
# 「それってもしかして、私にも相談してくれたアレかしら？」
line = "「それってもしかして、私にも相談してくれたアレかしら？」"

[[dialogue]]
speaker = "蛍火"
# 「はい。名付けて『友達１００人計画』。……私は将来、友達を１００人作って自分の店に招き、パーティーを開くのが夢なのです」
line = "「はい。名付けて『友達１００人計画』。……私は将来、友達を１００人作って自分の店に招き、パーティーを開くのが夢なのです」"

[[dialogue]]
speaker = "蛍火"
# 「しかし、恥ずかしながら現状、全く友達が作れていない有様でして。なのでどうか、会長には私の友達作りの師匠となって頂きたく……」
line = "「しかし、恥ずかしながら現状、全く友達が作れていない有様でして。なのでどうか、会長には私の友達作りの師匠となって頂きたく……」"

[[dialogue]]
speaker = "unk"
# 陽キャかどうかは微妙だけど……
line = "陽キャかどうかは微妙だけど……"

[[dialogue]]
speaker = "unk"
# そういうことなら協力するよ。
line = "そういうことなら協力するよ。"

[[dialogue]]
speaker = "蛍火"
# 「即決！？　し、師匠……っ！」
line = "「即決！？　し、師匠……っ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、安心してリラックスモードになったわね、蛍火ちゃん。もちろん私も協力するわよ～」
line = "「ふふっ、安心してリラックスモードになったわね、蛍火ちゃん。もちろん私も協力するわよ～」"

[[dialogue]]
speaker = "蛍火"
# 「サーシャ先輩も、ありがとうございます……。改めまして、これからよろしくお願いいたしますね、師匠っ」
line = "「サーシャ先輩も、ありがとうございます……。改めまして、これからよろしくお願いいたしますね、師匠っ」"

[[dialogue]]
speaker = "蛍火"
# 「そうしたらまずは、２人目の友達探しからですね……」
line = "「そうしたらまずは、２人目の友達探しからですね……」"

[[dialogue]]
speaker = "unk"
# サーシャさんも居るから３人目じゃない？
line = "サーシャさんも居るから３人目じゃない？"

[[dialogue]]
speaker = "蛍火"
# 「は？　……何を言っているのですか、師匠」
line = "「は？　……何を言っているのですか、師匠」"

[[dialogue]]
speaker = "蛍火"
# 「サーシャ先輩が私と友達なわけないでしょう……。ふざけているのですか？」
line = "「サーシャ先輩が私と友達なわけないでしょう……。ふざけているのですか？」"

[[dialogue]]
speaker = "蛍火"
# 「──そのような畏れ多いこと、私が考えるとでも？」
line = "「──そのような畏れ多いこと、私が考えるとでも？」"

[[dialogue]]
speaker = "unk"
# 嘘でしょ！？　そんなことある！？
line = "嘘でしょ！？　そんなことある！？"

[[dialogue]]
speaker = "サーシャ"
# 「そ、そんな！　私、蛍火ちゃんにそんな風に思われてたなんて……」
line = "「そ、そんな！　私、蛍火ちゃんにそんな風に思われてたなんて……」"

[[dialogue]]
speaker = "サーシャ"
# 「しくしく。私、会長くんに蛍火ちゃんの友達第１号を、ＮＴＲされてしまったのね……しくしくしく」
line = "「しくしく。私、会長くんに蛍火ちゃんの友達第１号を、ＮＴＲされてしまったのね……しくしくしく」"

[[dialogue]]
speaker = "unk"
# サーシャさんはわかってやってますよね！？
line = "サーシャさんはわかってやってますよね！？"

[[dialogue]]
speaker = "サーシャ"
# 「……てへぺろ♪」
line = "「……てへぺろ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「──まあ、それは冗談として。……蛍火ちゃんは、私と友達になるのは嫌？」
line = "「──まあ、それは冗談として。……蛍火ちゃんは、私と友達になるのは嫌？」"

[[dialogue]]
speaker = "蛍火"
# 「断じてそんなことは……。ただ私は、サーシャ先輩が星徒会長であった時から、サーシャ先輩みたいな女性になりたいと、ずっと憧れておりましたので……」
line = "「断じてそんなことは……。ただ私は、サーシャ先輩が星徒会長であった時から、サーシャ先輩みたいな女性になりたいと、ずっと憧れておりましたので……」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう。そんな風に思って貰えて、嬉しいわ。……でもね、私は蛍火ちゃんともっと近い関係になれたらなって、ずっと思ってたの」
line = "「ありがとう。そんな風に思って貰えて、嬉しいわ。……でもね、私は蛍火ちゃんともっと近い関係になれたらなって、ずっと思ってたの」"

[[dialogue]]
speaker = "サーシャ"
# 「だから、蛍火ちゃんが嫌じゃなければ、今日から私とも、お友達になってくれないかしら。会長くんが蛍火ちゃんの師匠であると同時に、友達であるみたいに」
line = "「だから、蛍火ちゃんが嫌じゃなければ、今日から私とも、お友達になってくれないかしら。会長くんが蛍火ちゃんの師匠であると同時に、友達であるみたいに」"

[[dialogue]]
speaker = "蛍火"
# 「尊敬する先輩であると同時に、友達でもある、ということですか……？」
line = "「尊敬する先輩であると同時に、友達でもある、ということですか……？」"

[[dialogue]]
speaker = "サーシャ"
# 「そう。ダメかしら……？」
line = "「そう。ダメかしら……？」"

[[dialogue]]
speaker = "蛍火"
# 「いいえ……いいえっ。サーシャ先輩がそう言って下さるなら、私もサーシャ先輩と、友達になりたいですっ」
line = "「いいえ……いいえっ。サーシャ先輩がそう言って下さるなら、私もサーシャ先輩と、友達になりたいですっ」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう、蛍火ちゃん。そうしたら……改めてしましょうか、友達の握手♪」
line = "「ありがとう、蛍火ちゃん。そうしたら……改めてしましょうか、友達の握手♪」"

[[dialogue]]
speaker = "蛍火"
# 「はいっ、サーシャ先輩っ」
line = "「はいっ、サーシャ先輩っ」"

[[dialogue]]
speaker = "unk"
# サーシャが手を差し出し、それを蛍火が握る。２人は照れくさそうに笑った。
line = "サーシャが手を差し出し、それを蛍火が握る。２人は照れくさそうに笑った。"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ。本当は私ね、蛍火ちゃんに友達になろうって言って、断られたらどうしようかなって、ちょっと不安だったの。だから、自分からはなかなか言えなくて……」
line = "「ふふっ。本当は私ね、蛍火ちゃんに友達になろうって言って、断られたらどうしようかなって、ちょっと不安だったの。だから、自分からはなかなか言えなくて……」"

[[dialogue]]
speaker = "蛍火"
# 「私も、です。本当は友達になれたらって、ずっと思ってました。……でも、怖かったんです」
line = "「私も、です。本当は友達になれたらって、ずっと思ってました。……でも、怖かったんです」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、気が合うわね。ふふっ……」
line = "「あら、気が合うわね。ふふっ……」"

[[dialogue]]
speaker = "蛍火"
# 「ふふふっ」
line = "「ふふふっ」"

[[dialogue]]
speaker = "unk"
# サーシャさんと友達になれて、よかった
line = "サーシャさんと友達になれて、よかった"

[[dialogue]]
speaker = "蛍火"
# 「はいっ。ありがとうございます、師匠」
line = "「はいっ。ありがとうございます、師匠」"

[[dialogue]]
speaker = "蛍火"
# 「師匠がきっかけをくれたおかげで、サーシャ先輩と友達になることが出来ました。これからもご指導ご鞭撻のほど、よろしくお願い致します」
line = "「師匠がきっかけをくれたおかげで、サーシャ先輩と友達になることが出来ました。これからもご指導ご鞭撻のほど、よろしくお願い致します」"

[[dialogue]]
speaker = "unk"
# 蛍火は今週末の放課後、予定空けられる？
line = "蛍火は今週末の放課後、予定空けられる？"

[[dialogue]]
speaker = "蛍火"
# 「放課後、ですか？　ええ、大丈夫だと思いますが……一体？」
line = "「放課後、ですか？　ええ、大丈夫だと思いますが……一体？」"

[[dialogue]]
speaker = "蛍火"
# 「えっ、師匠と街にお出掛け、ですか……！？」
line = "「えっ、師匠と街にお出掛け、ですか……！？」"

[[dialogue]]
speaker = "unk"
# 蛍火の友達１００人計画は、こうして始動するのだった。
line = "蛍火の友達１００人計画は、こうして始動するのだった。"
