[[dialogue]]
speaker = "unk"
# 第３話,満足しないと出られない,P
line = "第３話,満足しないと出られない,P"

[[dialogue]]
speaker = "unk"
# 気づけば何故か、自分の家でトマルと２人きりなこの状況――
line = "気づけば何故か、自分の家でトマルと２人きりなこの状況――"

[[dialogue]]
speaker = "トマル"
# 「あなた様、なにか私にご命令はございませんか？」
line = "「あなた様、なにか私にご命令はございませんか？」"

[[dialogue]]
speaker = "トマル"
# 「あっ、そうだ♪　もしよかったら、３回まわってワンと鳴きましょうか？」
line = "「あっ、そうだ♪　もしよかったら、３回まわってワンと鳴きましょうか？」"

[[dialogue]]
speaker = "トマル"
# 「――えっ、ダメですか？　そんな～……くぅ～ん……」
line = "「――えっ、ダメですか？　そんな～……くぅ～ん……」"

[[dialogue]]
speaker = "unk"
# まさか……命令して欲しいのか？
line = "まさか……命令して欲しいのか？"

[[dialogue]]
speaker = "トマル"
# 「３回くるくるくる～♪　……ワン<emoji=heart04>」
line = "「３回くるくるくる～♪　……ワン<emoji=heart04>」"

[[dialogue]]
speaker = "トマル"
# 「――ひとまず１回落ち着け、ですか？　はい♪　あなた様のご命令通りに<emoji=heart04>」
line = "「――ひとまず１回落ち着け、ですか？　はい♪　あなた様のご命令通りに<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なんでそこで嬉しそうなんだ……
line = "なんでそこで嬉しそうなんだ……"

[[dialogue]]
speaker = "トマル"
# 「……え？　そもそもどうしてこんなことになったのか、よく思い出せない？」
line = "「……え？　そもそもどうしてこんなことになったのか、よく思い出せない？」"

[[dialogue]]
speaker = "トマル"
# 「う～んと、私も記憶が曖昧なのですが……確か、トレジアンナさまが新しいロストアイテムの気配を察知して――」
line = "「う～んと、私も記憶が曖昧なのですが……確か、トレジアンナさまが新しいロストアイテムの気配を察知して――」"

[[dialogue]]
speaker = "トマル"
# 「会長さまやサチさまと一緒に探し回っていたんです。それで、ロストアイテムを見つけて……気づけば、この部屋に閉じ込められていたんです」
line = "「会長さまやサチさまと一緒に探し回っていたんです。それで、ロストアイテムを見つけて……気づけば、この部屋に閉じ込められていたんです」"

[[dialogue]]
speaker = "トマル"
# 「そう！　この、ご主人さまが満足しないと出られない空間に……！」
line = "「そう！　この、ご主人さまが満足しないと出られない空間に……！」"

[[dialogue]]
speaker = "unk"
# そんなロストアイテムだったっけ！？
line = "そんなロストアイテムだったっけ！？"

[[dialogue]]
speaker = "トマル"
# 「はい。他の記憶は曖昧ですが、それだけははっきりとわかります」
line = "「はい。他の記憶は曖昧ですが、それだけははっきりとわかります」"

[[dialogue]]
speaker = "トマル"
# 「そして、脱出できるかもしれない方法が目の前にあるのなら、それを試してみるべきだと私は思います」
line = "「そして、脱出できるかもしれない方法が目の前にあるのなら、それを試してみるべきだと私は思います」"

[[dialogue]]
speaker = "トマル"
# 「というわけで、あなた様。どうか私にご命令くださいませ♪」
line = "「というわけで、あなた様。どうか私にご命令くださいませ♪」"

[[dialogue]]
speaker = "トマル"
# 「もしよろしければ、余興に野生のサルのモノマネでも致しましょうか？　ウキウキ♪」
line = "「もしよろしければ、余興に野生のサルのモノマネでも致しましょうか？　ウキウキ♪」"

[[dialogue]]
speaker = "unk"
# なんで動物の真似をしたがるんだ！？
line = "なんで動物の真似をしたがるんだ！？"

[[dialogue]]
speaker = "トマル"
# 「さあさあ、遠慮などなさらずに♪　なんでも仰って下さい」
line = "「さあさあ、遠慮などなさらずに♪　なんでも仰って下さい」"

[[dialogue]]
speaker = "トマル"
# 「――あっ、なにかご命令を思いついたのですか？　はい、なんでしょう♪」
line = "「――あっ、なにかご命令を思いついたのですか？　はい、なんでしょう♪」"

[[dialogue]]
speaker = "トマル"
# 「ふむふむ、なにか食事を作って欲しいと。……はい、私にお任せください♪」
line = "「ふむふむ、なにか食事を作って欲しいと。……はい、私にお任せください♪」"

[[dialogue]]
speaker = "トマル"
# 「母さまに習って、料理は普段から練習をしておりますので」
line = "「母さまに習って、料理は普段から練習をしておりますので」"

[[dialogue]]
speaker = "トマル"
# 「まずは冷蔵庫の中の食材、確認して参りますね」
line = "「まずは冷蔵庫の中の食材、確認して参りますね」"

[[dialogue]]
speaker = "トマル"
# 「冷蔵庫の中には食材が沢山ありまして、毒見もしましたが問題ないようです」
line = "「冷蔵庫の中には食材が沢山ありまして、毒見もしましたが問題ないようです」"

[[dialogue]]
speaker = "トマル"
# 「というわけで、白米、唐揚げ、お味噌汁、サラダにドレッシングと作ってみました。どうぞお召し上がりください」
line = "「というわけで、白米、唐揚げ、お味噌汁、サラダにドレッシングと作ってみました。どうぞお召し上がりください」"

[[dialogue]]
speaker = "トマル"
# 「ちなみに唐揚げは、詠野家の家系に伝わる秘伝の味なんです。あなた様が気に入って下さると嬉しいのですが……」
line = "「ちなみに唐揚げは、詠野家の家系に伝わる秘伝の味なんです。あなた様が気に入って下さると嬉しいのですが……」"

[[dialogue]]
speaker = "unk"
# この唐揚げ、すごく美味しい！
line = "この唐揚げ、すごく美味しい！"

[[dialogue]]
speaker = "トマル"
# 「本当ですか？　ふふっ、それならよかったです……♪」
line = "「本当ですか？　ふふっ、それならよかったです……♪」"

[[dialogue]]
speaker = "トマル"
# 「お食事が終わったら、次はなにを致しましょう？　あなた様が満足してくださるように、誠心誠意ご奉仕致します」
line = "「お食事が終わったら、次はなにを致しましょう？　あなた様が満足してくださるように、誠心誠意ご奉仕致します」"

[[dialogue]]
speaker = "トマル"
# 「ふむふむ、お掃除ですね。家事は好きですので、喜んで頑張りマッスル♪」
line = "「ふむふむ、お掃除ですね。家事は好きですので、喜んで頑張りマッスル♪」"

[[dialogue]]
speaker = "トマル"
# 「ふふっ、なんちゃって♪」
line = "「ふふっ、なんちゃって♪」"

[[dialogue]]
speaker = "unk"
# （ぎ、ギャグセンスは独特だな……）
line = "（ぎ、ギャグセンスは独特だな……）"

[[dialogue]]
speaker = "トマル"
# 「マッサージですね♪　是非お任せください。あなた様の体であれば、どこでも喜んでマッサージ致しますので」
line = "「マッサージですね♪　是非お任せください。あなた様の体であれば、どこでも喜んでマッサージ致しますので」"

[[dialogue]]
speaker = "トマル"
# 「あっ、でも私、体は男ですが……男性のデリケートな部分となると、心の準備が……」
line = "「あっ、でも私、体は男ですが……男性のデリケートな部分となると、心の準備が……」"

[[dialogue]]
speaker = "unk"
