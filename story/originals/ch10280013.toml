line = "「おやおや、トマルさんはまだ、幸せな夢を見ているみたいですね～」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、いくらトマルくんが可愛いからって、夢の中でエッチなこととかさせてませんよね？　じー……」
line = "「お兄さん、いくらトマルくんが可愛いからって、夢の中でエッチなこととかさせてませんよね？　じー……」"

[[dialogue]]
speaker = "unk"
# 疑いの眼差しを向けないでくれる！？
line = "疑いの眼差しを向けないでくれる！？"

[[dialogue]]
speaker = "unk"
# トマルが起きるまでの間、俺は夢の中の出来事について言及される羽目になるのだった――
line = "トマルが起きるまでの間、俺は夢の中の出来事について言及される羽目になるのだった――"
