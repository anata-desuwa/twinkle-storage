[[dialogue]]
speaker = "unk"
# 第２話,義体を作ってもらおう,P
line = "第２話,義体を作ってもらおう,P"

[[dialogue]]
speaker = "アナ"
# 「霊体となって再誕した、先代光の魔女様……！」
line = "「霊体となって再誕した、先代光の魔女様……！」"

[[dialogue]]
speaker = "サーシャ"
# 「最初は何を言ってるのかと思ったけれど、会長くんに紹介されて『ここにいるからよく見て』って言われたら見えるようになったわ～」
line = "「最初は何を言ってるのかと思ったけれど、会長くんに紹介されて『ここにいるからよく見て』って言われたら見えるようになったわ～」"

[[dialogue]]
speaker = "アナ"
# 「不思議なこともあるものですが、光栄です。３０００年前のリクリエ撃退の際、魔王ラクシスとまみえた伝説の存在とお話ができるだなんて」
line = "「不思議なこともあるものですが、光栄です。３０００年前のリクリエ撃退の際、魔王ラクシスとまみえた伝説の存在とお話ができるだなんて」"

[[dialogue]]
speaker = "トリュファイナ"
# 「そう畏まらないでください。私がラクシス様とお会いしたのはリクリエ終息後です。彼の仲間……クルセイダースとして戦ったことはありません」
line = "「そう畏まらないでください。私がラクシス様とお会いしたのはリクリエ終息後です。彼の仲間……クルセイダースとして戦ったことはありません」"

[[dialogue]]
speaker = "アナ"
# 「それでもトリュファイナ様は、表立ってはいませんがご活躍をされていたと記録されています」
line = "「それでもトリュファイナ様は、表立ってはいませんがご活躍をされていたと記録されています」"

[[dialogue]]
speaker = "アナ"
# 「名こそ残されていませんが、再生の奇蹟を用いる魔女様に救われた……という神話のような話は各所に残っていますよ」
line = "「名こそ残されていませんが、再生の奇蹟を用いる魔女様に救われた……という神話のような話は各所に残っていますよ」"

[[dialogue]]
speaker = "サーシャ"
# 「魔界も同じね。魔女様のおとぎ話は、レゾフにも伝わっているわ～」
line = "「魔界も同じね。魔女様のおとぎ話は、レゾフにも伝わっているわ～」"

[[dialogue]]
speaker = "アナ"
# 「この場を借りてお礼を申し上げます。かつて学術都市ウルの前身となった国。そこを襲ったリクリエ災害を救っていただけたのもあなた様だと……」
line = "「この場を借りてお礼を申し上げます。かつて学術都市ウルの前身となった国。そこを襲ったリクリエ災害を救っていただけたのもあなた様だと……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ああ、懐かしいですね。身元を隠して来訪したことがあります。その時のお話でしょうか？」
line = "「ああ、懐かしいですね。身元を隠して来訪したことがあります。その時のお話でしょうか？」"

[[dialogue]]
speaker = "アナ"
# 「人命だけでなく、崩落した建物全てを再生し、砕かれた古文書も直していただけたと。お陰でウルは文化的衰退を免れました」
line = "「人命だけでなく、崩落した建物全てを再生し、砕かれた古文書も直していただけたと。お陰でウルは文化的衰退を免れました」"

[[dialogue]]
speaker = "unk"
# すごいね、トリュファイナさん
line = "すごいね、トリュファイナさん"

[[dialogue]]
speaker = "トリュファイナ"
# 「待ってください！　私、そんなことはしておりませんが……！？」
line = "「待ってください！　私、そんなことはしておりませんが……！？」"

[[dialogue]]
speaker = "アナ"
# 「まさか。ウルで育った者ならば子供でも知っています」
line = "「まさか。ウルで育った者ならば子供でも知っています」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私の力は命ある者の再生です、無機物まではとても……！　ほ、他の魔女の御業ではないでしょうか？」
line = "「私の力は命ある者の再生です、無機物まではとても……！　ほ、他の魔女の御業ではないでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「レゾフにも言い伝えがあるわよ？　大いなる冬の折、産気づいた母親の出産に立ちあって今際の際の赤ちゃんの命を救った……」
line = "「レゾフにも言い伝えがあるわよ？　大いなる冬の折、産気づいた母親の出産に立ちあって今際の際の赤ちゃんの命を救った……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ああ、レゾフ。また懐かしい名前です。そちらにも一度赴いたことが──」
line = "「ああ、レゾフ。また懐かしい名前です。そちらにも一度赴いたことが──」"

[[dialogue]]
speaker = "サーシャ"
# 「その後、襲い来る魔獣を手懐けて使役して、暴れ狂う黒龍を素手で一撃のもとに粉砕したとか～♪」
line = "「その後、襲い来る魔獣を手懐けて使役して、暴れ狂う黒龍を素手で一撃のもとに粉砕したとか～♪」"

[[dialogue]]
speaker = "unk"
# すごいね、トリュファイナさん
line = "すごいね、トリュファイナさん"

[[dialogue]]
speaker = "トリュファイナ"
# 「待ってください！！　どこまで尾ひれが広がっているのですか！？」
line = "「待ってください！！　どこまで尾ひれが広がっているのですか！？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私は再生！　治癒の魔法使いです……！　龍を屠るなど、それこそラクシス様の功績でしょう！　どうしてこんなことに……！？」
line = "「私は再生！　治癒の魔法使いです……！　龍を屠るなど、それこそラクシス様の功績でしょう！　どうしてこんなことに……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「尾ひれがたくさんついちゃうくらい、すごい人ってことね～。ふふふ」
line = "「尾ひれがたくさんついちゃうくらい、すごい人ってことね～。ふふふ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……お話ができるのは嬉しいですが、不安になってまいりました、私……」
line = "「……お話ができるのは嬉しいですが、不安になってまいりました、私……」"

[[dialogue]]
speaker = "アナ"
# 「ぜひお茶を飲んで一服してほしいですが、トリュファイナ様は……」
line = "「ぜひお茶を飲んで一服してほしいですが、トリュファイナ様は……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい。この身は今、霊体です。魔王様にだけは限定的に触れられるようなのですが……ほら」
line = "「はい。この身は今、霊体です。魔王様にだけは限定的に触れられるようなのですが……ほら」"

[[dialogue]]
speaker = "サーシャ"
# 「あ……カップを指が透けちゃうのね……」
line = "「あ……カップを指が透けちゃうのね……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「お気持ちだけ頂戴しておきます。みなさんとお茶をできないのは寂しいですが……」
line = "「お気持ちだけ頂戴しておきます。みなさんとお茶をできないのは寂しいですが……」"

[[dialogue]]
speaker = "アナ"
# 「いえ、大丈夫です。体がないなら作ればいいだけ。会長のことですし、もう助っ人は呼んでありますよね？」
line = "「いえ、大丈夫です。体がないなら作ればいいだけ。会長のことですし、もう助っ人は呼んでありますよね？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「助っ人……？」
line = "「助っ人……？」"

[[dialogue]]
speaker = "アニマ"
# 「フフ。話は聞かせてもらっタ！　何だか面白い事態になってるみたいじゃないカ？」
line = "「フフ。話は聞かせてもらっタ！　何だか面白い事態になってるみたいじゃないカ？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「こ、この御方は……？」
line = "「こ、この御方は……？」"

[[dialogue]]
speaker = "unk"
# 学園きっての錬金術師です
line = "学園きっての錬金術師です"

[[dialogue]]
speaker = "アニマ"
# 「ふぅ～ム……お、見えるようになってきたゾ。星徒会長に触れると視認が可能になる霊体の魔女……実に興味深イ！」
line = "「ふぅ～ム……お、見えるようになってきたゾ。星徒会長に触れると視認が可能になる霊体の魔女……実に興味深イ！」"

[[dialogue]]
speaker = "アニマ"
# 「任せロ。守護天使と理屈は同じダ。霊体が依り代となれる義体を用意してやろウ！」
line = "「任せロ。守護天使と理屈は同じダ。霊体が依り代となれる義体を用意してやろウ！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「え……そのようなことが可能なのですか！？」
line = "「え……そのようなことが可能なのですか！？」"

[[dialogue]]
speaker = "アニマ"
# 「錬金術師に不可能はなイ。それに他ならぬ会長の頼みダ、最優先で事にあたらせてもらうヨ？」
line = "「錬金術師に不可能はなイ。それに他ならぬ会長の頼みダ、最優先で事にあたらせてもらうヨ？」"

[[dialogue]]
speaker = "アニマ"
# 「しかし再生と浄化の魔女……懸念点もあるガ……ま、何事も実験だナ。しばらく時間をくれたまえヨ？」
line = "「しかし再生と浄化の魔女……懸念点もあるガ……ま、何事も実験だナ。しばらく時間をくれたまえヨ？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あ……行ってしまいました。けれどそんな、霊体の依り代となる義体なんて、そうそう簡単には──」
line = "「あ……行ってしまいました。けれどそんな、霊体の依り代となる義体なんて、そうそう簡単には──」"

[[dialogue]]
speaker = "unk"
# ──翌日。
line = "──翌日。"

[[dialogue]]
speaker = "アニマ"
# 「出来たゾ！」
line = "「出来たゾ！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「早すぎませんか！？」
line = "「早すぎませんか！？」"

[[dialogue]]
speaker = "アニマ"
# 「なーニ、義体を用意するまでは簡単なコト。問題はこの後……ここに入れるかナ、魔女のキミ？」
line = "「なーニ、義体を用意するまでは簡単なコト。問題はこの後……ここに入れるかナ、魔女のキミ？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「義体に身体を重ねるようにして……ん、んんっ……？　うぅ……、上手く、入ることがっ、できません……！？」
line = "「義体に身体を重ねるようにして……ん、んんっ……？　うぅ……、上手く、入ることがっ、できません……！？」"

[[dialogue]]
speaker = "アニマ"
# 「ふぅム、やはりナ。彼女の持つ再生の魔力の影響かナ？　義体を異物として弾いているのかもしれなイ。これは厄介だゾ……改良が必要ダ」
line = "「ふぅム、やはりナ。彼女の持つ再生の魔力の影響かナ？　義体を異物として弾いているのかもしれなイ。これは厄介だゾ……改良が必要ダ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ありがとうございます。私のために……」
line = "「ありがとうございます。私のために……」"

[[dialogue]]
speaker = "アニマ"
# 「困難は新たな閃きの元だ！　フヒヒ、ますますキミに興味がわいてきたヨ？」
line = "「困難は新たな閃きの元だ！　フヒヒ、ますますキミに興味がわいてきたヨ？」"

[[dialogue]]
speaker = "unk"
# それからというもの……
line = "それからというもの……"

[[dialogue]]
speaker = "トリュファイナ"
# 「ふぅむむむぅ～っ……！　んぅむむむぅ～っ！　だ、だめです、弾かれてしまい、ますーっ……！」
line = "「ふぅむむむぅ～っ……！　んぅむむむぅ～っ！　だ、だめです、弾かれてしまい、ますーっ……！」"

[[dialogue]]
speaker = "unk"
# トリュファイナさんはアニマ先輩の実験室で、義体に入ることを試みるのが日課となった。
line = "トリュファイナさんはアニマ先輩の実験室で、義体に入ることを試みるのが日課となった。"

[[dialogue]]
speaker = "トリュファイナ"
# 「うぅうう～っ、入れませ～んっ……！！」
line = "「うぅうう～っ、入れませ～んっ……！！」"

[[dialogue]]
speaker = "unk"
# 義体完成までの道のりは、まだまだ遠そうなのだった──
line = "義体完成までの道のりは、まだまだ遠そうなのだった──"
