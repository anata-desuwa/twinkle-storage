[[dialogue]]
speaker = "unk"
# 第１話,再襲来,B
line = "第１話,再襲来,B"

[[dialogue]]
speaker = "unk"
# 流星市国全域で警報が鳴り響く。本来はモンスターの襲来を知らせるものだが、今警告すべき敵は別にいた。
line = "流星市国全域で警報が鳴り響く。本来はモンスターの襲来を知らせるものだが、今警告すべき敵は別にいた。"

[[dialogue]]
speaker = "unk"
# 街へと押し寄せているのは、女神のしもべであるはずのガーディアン。フィーニスの塔の守護者であるはずの彼らが、再び街を破壊しようと迫っていた。
line = "街へと押し寄せているのは、女神のしもべであるはずのガーディアン。フィーニスの塔の守護者であるはずの彼らが、再び街を破壊しようと迫っていた。"

[[dialogue]]
speaker = "unk"
# 先日撃退した極星学園が、態勢を整えてまた攻勢に出た。
line = "先日撃退した極星学園が、態勢を整えてまた攻勢に出た。"

[[dialogue]]
speaker = "unk"
# 一度撤退した上での再攻撃。以前より強力な戦力を連れてきた可能性が高い。
line = "一度撤退した上での再攻撃。以前より強力な戦力を連れてきた可能性が高い。"

[[dialogue]]
speaker = "unk"
# チナではなく他の役員が来ているかもしれないが、少なくとも極星星徒会の誰かがいるはずだ。
line = "チナではなく他の役員が来ているかもしれないが、少なくとも極星星徒会の誰かがいるはずだ。"

[[dialogue]]
speaker = "クロト"
# 「敵の数と規模はわかるか？」
line = "「敵の数と規模はわかるか？」"

[[dialogue]]
speaker = "アナ"
# 「はい、コハルコ先輩から報告が……──ッ！？」
line = "「はい、コハルコ先輩から報告が……──ッ！？」"

[[dialogue]]
speaker = "アナ"
# 「ガーディアン……極星従騎が流星市国と東京の各地を襲っています。その数……大小合わせて数百。今も反応は増え続けています」
line = "「ガーディアン……極星従騎が流星市国と東京の各地を襲っています。その数……大小合わせて数百。今も反応は増え続けています」"

[[dialogue]]
speaker = "クロト"
# 「！！」
line = "「！！」"

[[dialogue]]
speaker = "unk"
# 極星従騎は、星徒会総出で倒した強敵だ。
line = "極星従騎は、星徒会総出で倒した強敵だ。"

[[dialogue]]
speaker = "unk"
# 以前の襲撃でも、現れた極星従騎は十数体。それが桁違いの数で襲ってきたら……
line = "以前の襲撃でも、現れた極星従騎は十数体。それが桁違いの数で襲ってきたら……"

[[dialogue]]
speaker = "マトイ"
# 「それって……かなりヤバいってことなんじゃ……」
line = "「それって……かなりヤバいってことなんじゃ……」"

[[dialogue]]
speaker = "サーシャ"
# 「いきなりの決戦ね……」
line = "「いきなりの決戦ね……」"

[[dialogue]]
speaker = "unk"
# 世界の終わり、という言葉が頭の中でちらつく。
line = "世界の終わり、という言葉が頭の中でちらつく。"

[[dialogue]]
speaker = "unk"
# 戦力的には圧倒的不利。それでも何とか活路を見出すしかない……！
line = "戦力的には圧倒的不利。それでも何とか活路を見出すしかない……！"

[[dialogue]]
speaker = "クロト"
# 「基本は防御と足止めに徹し、星徒会と精鋭で極星従騎を叩く」
line = "「基本は防御と足止めに徹し、星徒会と精鋭で極星従騎を叩く」"

[[dialogue]]
speaker = "クロト"
# 「俺とヴィーナスは極星従騎と戦いながらチナを見つけ、デネブに渡る方法を聞き出す。マトイたちはノヴァフォームを使いながら極星従騎を殲滅してくれ」
line = "「俺とヴィーナスは極星従騎と戦いながらチナを見つけ、デネブに渡る方法を聞き出す。マトイたちはノヴァフォームを使いながら極星従騎を殲滅してくれ」"

[[dialogue]]
speaker = "3人"
# 「了解！」
line = "「了解！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかったわ！　あのちみっ子、今度こそ逃がさないわよ！」
line = "「わかったわ！　あのちみっ子、今度こそ逃がさないわよ！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィン！」
line = "「ヒヒィン！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そこよ！」
line = "「そこよ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが杖を向けると、明星のごとき眩い光が鎖となってガーディアンの動きを奪う。そこに──
line = "ヴィーナスが杖を向けると、明星のごとき眩い光が鎖となってガーディアンの動きを奪う。そこに──"

[[dialogue]]
speaker = "クロト"
# 「ディマイズブレイカー！」
line = "「ディマイズブレイカー！」"

[[dialogue]]
speaker = "unk"
# 闇を帯びた拳がガーディアンの鎧を砕き、天馬は塵となって消え失せた。
line = "闇を帯びた拳がガーディアンの鎧を砕き、天馬は塵となって消え失せた。"

[[dialogue]]
speaker = "クロト"
# （やはり極星従騎は強い。迎撃に当たっているみんなが心配だ……）
line = "（やはり極星従騎は強い。迎撃に当たっているみんなが心配だ……）"

[[dialogue]]
speaker = "クロト"
# （だけどこれだけの数で攻勢をかけるなら、指揮官は必要だ。だから今この瞬間も、極星星徒会の誰かは絶対にアルタイルに来ている）
line = "（だけどこれだけの数で攻勢をかけるなら、指揮官は必要だ。だから今この瞬間も、極星星徒会の誰かは絶対にアルタイルに来ている）"

[[dialogue]]
speaker = "クロト"
# （デネブとの戦いを避けるためにも、その指揮官を見つけ出さないと──）
line = "（デネブとの戦いを避けるためにも、その指揮官を見つけ出さないと──）"

[[dialogue]]
speaker = "ジグ"
# 「さてと……そろそろ頃合いかな」
line = "「さてと……そろそろ頃合いかな」"

[[dialogue]]
speaker = "クロト"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# 視界が歪む。
line = "視界が歪む。"

[[dialogue]]
speaker = "unk"
# 自分の中で、小さな小さな何かが弾けた。
line = "自分の中で、小さな小さな何かが弾けた。"

[[dialogue]]
speaker = "unk"
# まるで種が<ruby=ほうが>萌芽</ruby>するように、俺の中で得体の知れないものが膨らみ、根を伸ばしていく感覚。
line = "まるで種が<ruby>萌芽<rt>ほうが</rt></ruby>するように、俺の中で得体の知れないものが膨らみ、根を伸ばしていく感覚。"

[[dialogue]]
speaker = "unk"
# 俺が、俺でない何かに浸食されていく。
line = "俺が、俺でない何かに浸食されていく。"

[[dialogue]]
speaker = "unk"
# これはもしかして──
line = "これはもしかして──"

[[dialogue]]
speaker = "ジグ"
# 「えい♪」
line = "「えい♪」"

[[dialogue]]
speaker = "unk"
# 剣の切っ先が届いたあの瞬間、ジグは俺にリクリエの力を植え付けていた……！？
line = "剣の切っ先が届いたあの瞬間、ジグは俺にリクリエの力を植え付けていた……！？"

[[dialogue]]
speaker = "unk"
# 今まで眠っていた種が、ここで目覚めようとしている──！
line = "今まで眠っていた種が、ここで目覚めようとしている──！"

[[dialogue]]
speaker = "クロト"
# 「はぁ、はぁ……」
line = "「はぁ、はぁ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト、大丈夫！？　顔色が悪いわよ！？」
line = "「クロト、大丈夫！？　顔色が悪いわよ！？」"

[[dialogue]]
speaker = "unk"
# アポロを操り、ギエルに宿ったあの力が、俺の意識を乗っ取ろうとして──
line = "アポロを操り、ギエルに宿ったあの力が、俺の意識を乗っ取ろうとして──"

[[dialogue]]
speaker = "クロト"
# 「く──おおおおおっ！！」
line = "「く──おおおおおっ！！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……！」
line = "「ブルルル……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「相変わらず強いね、この馬。しかもこの前よりたくさん来てるし」
line = "「相変わらず強いね、この馬。しかもこの前よりたくさん来てるし」"

[[dialogue]]
speaker = "アポロ"
# 「だけどちょっと慣れてきたな。──そら！」
line = "「だけどちょっと慣れてきたな。──そら！」"

[[dialogue]]
speaker = "unk"
# 流星のごとき一閃が、極星従騎を剣ごと両断した。
line = "流星のごとき一閃が、極星従騎を剣ごと両断した。"

[[dialogue]]
speaker = "ベアトリス"
# 「さすがアポロちゃん！　これが魔王の力なんだ……」
line = "「さすがアポロちゃん！　これが魔王の力なんだ……」"

[[dialogue]]
speaker = "梨緒"
# （さっきから極星従騎はベアトを狙ってこない。以前ベアトの前で止まった時もあったが……）
line = "（さっきから極星従騎はベアトを狙ってこない。以前ベアトの前で止まった時もあったが……）"

[[dialogue]]
speaker = "梨緒"
# （いや、今は考えている場合ではない。脅威の排除が優先だ）
line = "（いや、今は考えている場合ではない。脅威の排除が優先だ）"

[[dialogue]]
speaker = "ナターシャ"
# 「敵も味方も忙しなく動いてるけど、私たちはどうする？」
line = "「敵も味方も忙しなく動いてるけど、私たちはどうする？」"

[[dialogue]]
speaker = "梨緒"
# 「緋宮会長と合流しよう。彼が極星星徒会と戦うなら、ジグもそこに現れる可能性が高い」
line = "「緋宮会長と合流しよう。彼が極星星徒会と戦うなら、ジグもそこに現れる可能性が高い」"

[[dialogue]]
speaker = "ベアトリス"
# 「極星……星徒会……」
line = "「極星……星徒会……」"

[[dialogue]]
speaker = "梨緒"
# 「どうした、ベアト？」
line = "「どうした、ベアト？」"

[[dialogue]]
speaker = "ベアトリス"
# 「えっと、あの……梨緒ちゃん、私……」
line = "「えっと、あの……梨緒ちゃん、私……」"

[[dialogue]]
speaker = "アポロ"
# 「ん？　ルリから連絡……？」
line = "「ん？　ルリから連絡……？」"

[[dialogue]]
speaker = "ルリエル"
# 『すみません、アポロさん！　流星学園にガーディアンがたくさん来てて、今流星星徒会で対応してるんですけど、ちょっと余裕ないです～！』
line = "『すみません、アポロさん！　流星学園にガーディアンがたくさん来てて、今流星星徒会で対応してるんですけど、ちょっと余裕ないです～！』"

[[dialogue]]
speaker = "ルリエル"
# 『できればこっちを手伝ってくれると助かりま──ひゃぁっ！？』
line = "『できればこっちを手伝ってくれると助かりま──ひゃぁっ！？』"

[[dialogue]]
speaker = "アポロ"
# 「くっ……今フィオナがいないのが痛いな……」
line = "「くっ……今フィオナがいないのが痛いな……」"

[[dialogue]]
speaker = "unk"
# 現在、流星・新星学園両校は、負傷者や付近の一般人を収容する拠点となっている。
line = "現在、流星・新星学園両校は、負傷者や付近の一般人を収容する拠点となっている。"

[[dialogue]]
speaker = "unk"
# 新星星徒会がガーディアンの掃討に回っている分、流星星徒会が防衛にあたっているが、敵の突破を許せば甚大な被害が出るだろう。
line = "新星星徒会がガーディアンの掃討に回っている分、流星星徒会が防衛にあたっているが、敵の突破を許せば甚大な被害が出るだろう。"

[[dialogue]]
speaker = "梨緒"
# 「アポロは流星学園の防衛に回ってくれ。学園を落とされるわけにはいかない」
line = "「アポロは流星学園の防衛に回ってくれ。学園を落とされるわけにはいかない」"

[[dialogue]]
speaker = "アポロ"
# 「了解！　そっちも気を付けてくれ！」
line = "「了解！　そっちも気を付けてくれ！」"

[[dialogue]]
speaker = "unk"
# アポロが翼を広げ、学園めがけて全速力で飛翔していく。
line = "アポロが翼を広げ、学園めがけて全速力で飛翔していく。"

[[dialogue]]
speaker = "ナターシャ"
# 「アポロが抜けちゃうと、残念ながら大きな戦力ダウンだね」
line = "「アポロが抜けちゃうと、残念ながら大きな戦力ダウンだね」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、だが仕方ない。……それでベアト、さっき何かを言いかけていたか？」
line = "「ああ、だが仕方ない。……それでベアト、さっき何かを言いかけていたか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「あ、ううん、何でもない……今大変だからまた後で話すね」
line = "「あ、ううん、何でもない……今大変だからまた後で話すね」"

[[dialogue]]
speaker = "梨緒"
# 「わかった、後で聞かせてくれ。では私たちは──」
line = "「わかった、後で聞かせてくれ。では私たちは──」"

[[dialogue]]
speaker = "梨緒"
# 「！？　この衝撃は……？　何が起きた……！？」
line = "「！？　この衝撃は……？　何が起きた……！？」"
