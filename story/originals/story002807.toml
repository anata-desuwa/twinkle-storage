[[dialogue]]
speaker = "ウィステリア"
# 「か、紙屋敷さん？　どちらも選ばないってどういうこと……？」
line = "「か、紙屋敷さん？　どちらも選ばないってどういうこと……？」"

[[dialogue]]
speaker = "ヴィライア"
# 『錯乱しているのかしら。いいから早くどきなさい。でなければ死ぬわよ』
line = "『錯乱しているのかしら。いいから早くどきなさい。でなければ死ぬわよ』"

[[dialogue]]
speaker = "モネ"
# 「いいえ、どきません！」
line = "「いいえ、どきません！」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさんは強くて、キレイで、気さくで、優しくて……星騎士としても人としても尊敬しています。必ず助け出します」
line = "「ウィステリアさんは強くて、キレイで、気さくで、優しくて……星騎士としても人としても尊敬しています。必ず助け出します」"

[[dialogue]]
speaker = "モネ"
# 「でも、この書庫を壊すこともあり得ません！」
line = "「でも、この書庫を壊すこともあり得ません！」"

[[dialogue]]
speaker = "モネ"
# 「この子が教えてくれました。ここにある本は、リクリエによって滅ぼされた魔族たちの無念が記されたものだと」
line = "「この子が教えてくれました。ここにある本は、リクリエによって滅ぼされた魔族たちの無念が記されたものだと」"

[[dialogue]]
speaker = "ウィステリア"
# 「……紙屋敷さん、あくまで本は本。無念や怨念が記録されているけれど、魔族たちの魂が宿っているわけじゃないのよ」
line = "「……紙屋敷さん、あくまで本は本。無念や怨念が記録されているけれど、魔族たちの魂が宿っているわけじゃないのよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「魔族たちに同情しているなら、やめなさい。呪いは甘さに容易く付け込んでくるわ」
line = "「魔族たちに同情しているなら、やめなさい。呪いは甘さに容易く付け込んでくるわ」"

[[dialogue]]
speaker = "モネ"
# 「わかっています。本は本であり、著者自身や、登場人物そのものではありません」
line = "「わかっています。本は本であり、著者自身や、登場人物そのものではありません」"

[[dialogue]]
speaker = "モネ"
# 「けれど、確かな『足跡』です」
line = "「けれど、確かな『足跡』です」"

[[dialogue]]
speaker = "モネ"
# 「この書庫に収められているのは、魔族たちの生きた証なんです」
line = "「この書庫に収められているのは、魔族たちの生きた証なんです」"

[[dialogue]]
speaker = "ヴィライア"
# 『…………っ！』
line = "『…………っ！』"

[[dialogue]]
speaker = "モネ"
# 「善も悪も、喜びも悲しみも、ここにはあります」
line = "「善も悪も、喜びも悲しみも、ここにはあります」"

[[dialogue]]
speaker = "モネ"
# 「怒り、憎しみ、妬み……色んな感情を本たちから感じます」
line = "「怒り、憎しみ、妬み……色んな感情を本たちから感じます」"

[[dialogue]]
speaker = "モネ"
# 「それは、滅びた魔族たちが感じていたもの。彼らの命の営みです」
line = "「それは、滅びた魔族たちが感じていたもの。彼らの命の営みです」"

[[dialogue]]
speaker = "モネ"
# 「この書庫を壊してしまったら、本たちを捨ててしまったら、彼らの生きた証がなくなってしまう」
line = "「この書庫を壊してしまったら、本たちを捨ててしまったら、彼らの生きた証がなくなってしまう」"

[[dialogue]]
speaker = "モネ"
# 「それを記した本があるのに、彼らのことを誰も知らない、憶えていないなんてあんまりじゃないですか」
line = "「それを記した本があるのに、彼らのことを誰も知らない、憶えていないなんてあんまりじゃないですか」"

[[dialogue]]
speaker = "モネ"
# 「だから、この書庫を壊すなんて、私は認めない」
line = "「だから、この書庫を壊すなんて、私は認めない」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさんでも……いえ、たとえこの世界を作った女神様にだって、譲れません！」
line = "「ウィステリアさんでも……いえ、たとえこの世界を作った女神様にだって、譲れません！」"

[[dialogue]]
speaker = "ヴィライア"
# 『……子どものわがままね』
line = "『……子どものわがままね』"

[[dialogue]]
speaker = "ヴィライア"
# 『このままでは呪いは暴走し、流星市国を覆い尽くす。それを止めるには、ウィステリアが呪いを受け入れるか、書庫を破壊するしかないわ』
line = "『このままでは呪いは暴走し、流星市国を覆い尽くす。それを止めるには、ウィステリアが呪いを受け入れるか、書庫を破壊するしかないわ』"

[[dialogue]]
speaker = "ヴィライア"
# 『けれど、援軍なんて呼ばせない。ウィステリアも逃がさない。あなたたちに初めから選択肢なんてないのよ』
line = "『けれど、援軍なんて呼ばせない。ウィステリアも逃がさない。あなたたちに初めから選択肢なんてないのよ』"

[[dialogue]]
speaker = "ヴィライア"
# 『それとも、目の前でこの娘を八つ裂きにしたら、ウィステリアも諦めて受け入れるかしら』
line = "『それとも、目の前でこの娘を八つ裂きにしたら、ウィステリアも諦めて受け入れるかしら』"

[[dialogue]]
speaker = "ウィステリア"
# 「こいつ……っ！」
line = "「こいつ……っ！」"

[[dialogue]]
speaker = "モネ"
# 「いいえ、ウィステリアさんを犠牲にはしません」
line = "「いいえ、ウィステリアさんを犠牲にはしません」"

[[dialogue]]
speaker = "ヴィライア"
# 『なら、どうするというの？』
line = "『なら、どうするというの？』"

[[dialogue]]
speaker = "モネ"
# 「私がこの子たちを受け入れます。……というか読ませてくださいお願いします！」
line = "「私がこの子たちを受け入れます。……というか読ませてくださいお願いします！」"

[[dialogue]]
speaker = "ヴィライア"
# 『…………は？』
line = "『…………は？』"

[[dialogue]]
speaker = "ウィステリア"
# 「ええと、紙屋敷さん、話聞いてた……？」
line = "「ええと、紙屋敷さん、話聞いてた……？」"

[[dialogue]]
speaker = "ウィステリア"
# 「呪いの本って読むと呪われるのよ。こんな量の呪いの本を読んだら、発狂するか、廃人になるか、まぁ普通に死ぬわよ」
line = "「呪いの本って読むと呪われるのよ。こんな量の呪いの本を読んだら、発狂するか、廃人になるか、まぁ普通に死ぬわよ」"

[[dialogue]]
speaker = "モネ"
# 「本が読めるなら、呪われるくらい構いません！　呪いが怖くて本が読めないくらいだったら読んで死にます！」
line = "「本が読めるなら、呪われるくらい構いません！　呪いが怖くて本が読めないくらいだったら読んで死にます！」"

[[dialogue]]
speaker = "ウィステリア"
# 「えぇ……今は呪いより紙屋敷さんが怖いわ、私」
line = "「えぇ……今は呪いより紙屋敷さんが怖いわ、私」"

[[dialogue]]
speaker = "モネ"
# 「本は私の友達で、かけがえのない宝物」
line = "「本は私の友達で、かけがえのない宝物」"

[[dialogue]]
speaker = "モネ"
# 「無念だって怨念だって、本であるなら、それすら愛しい」
line = "「無念だって怨念だって、本であるなら、それすら愛しい」"

[[dialogue]]
speaker = "モネ"
# 「だから、私も本にとって友達でありたいんです」
line = "「だから、私も本にとって友達でありたいんです」"

[[dialogue]]
speaker = "モネ"
# 「本は本として生まれた以上、読まれたがっています。なのに、呪いの本だからって何千年も何万年も誰にも読まれないなんて、寂しすぎます！」
line = "「本は本として生まれた以上、読まれたがっています。なのに、呪いの本だからって何千年も何万年も誰にも読まれないなんて、寂しすぎます！」"

[[dialogue]]
speaker = "ウィステリア"
# 「紙屋敷さんが本気で言ってるのはわかってるんだけど……さすがに無理が過ぎるわ」
line = "「紙屋敷さんが本気で言ってるのはわかってるんだけど……さすがに無理が過ぎるわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「呪いに耐性がある私でも、１人じゃ受け止めきれないもの。まして、呪いにも魔力にも触れたことのない紙屋敷さんには到底不可能──」
line = "「呪いに耐性がある私でも、１人じゃ受け止めきれないもの。まして、呪いにも魔力にも触れたことのない紙屋敷さんには到底不可能──」"

[[dialogue]]
speaker = "ウィステリア"
# 「ん……？　１人じゃ受け止めきれない……」
line = "「ん……？　１人じゃ受け止めきれない……」"

[[dialogue]]
speaker = "モネ"
# 「どうしました、ウィステリアさん？」
line = "「どうしました、ウィステリアさん？」"

[[dialogue]]
speaker = "ウィステリア"
# 「私、ちょっと思い付いちゃったかもしれないわ」
line = "「私、ちょっと思い付いちゃったかもしれないわ」"
