[[dialogue]]
speaker = "unk"
# 第５話,スタンピード,B
line = "第５話,スタンピード,B"

[[dialogue]]
speaker = "雪男の魔獣"
# 『グラアアアアアアアアアオ！！』
line = "『グラアアアアアアアアアオ！！』"

[[dialogue]]
speaker = "クロト"
# 「くっ……」
line = "「くっ……」"

[[dialogue]]
speaker = "ニャリオン"
# 「駄目ニャ──キリがないニャ──！」
line = "「駄目ニャ──キリがないニャ──！」"

[[dialogue]]
speaker = "unk"
# １０──２０──襲い来る魔獣たちを何度も撃退していく。
line = "１０──２０──襲い来る魔獣たちを何度も撃退していく。"

[[dialogue]]
speaker = "unk"
# だが、一向に全滅する気配が見えない。巣から出てきたというスタンピードの魔獣たちは──あまりに膨大な頭数だった。
line = "だが、一向に全滅する気配が見えない。巣から出てきたというスタンピードの魔獣たちは──あまりに膨大な頭数だった。"

[[dialogue]]
speaker = "マトイ"
# 「よりにもよって、こんな最悪なタイミングで……！」
line = "「よりにもよって、こんな最悪なタイミングで……！」"

[[dialogue]]
speaker = "ユウリ"
# 「チッ……仕方ねえ。<ruby=ここ>レゾフ</ruby>はあたしが守る。炎の星術がありゃ──寒波にも魔獣にも対抗できるはずだ」
line = "「チッ……仕方ねえ。<ruby>レゾフ<rt>ここ</rt></ruby>はあたしが守る。炎の星術がありゃ──寒波にも魔獣にも対抗できるはずだ」"

[[dialogue]]
speaker = "ソフィア"
# 「待ってください──いくらユウリ先輩でも、この規模の相手を一人は無茶です！」
line = "「待ってください──いくらユウリ先輩でも、この規模の相手を一人は無茶です！」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね──私たちも援護したいけど──『森』でヴィーナスちゃんが待ってるのに……」
line = "「そうね──私たちも援護したいけど──『森』でヴィーナスちゃんが待ってるのに……」"

[[dialogue]]
speaker = "クロト"
# （ッ……どうする？）
line = "（ッ……どうする？）"

[[dialogue]]
speaker = "unk"
# このままレゾフを放置すれば壊滅は必至──
line = "このままレゾフを放置すれば壊滅は必至──"

[[dialogue]]
speaker = "unk"
# しかしスタンピードの対処に手間取ってしまっていては、ヴィーナスの救助に支障が出る。あちらを立てればこちらが立たずだ。
line = "しかしスタンピードの対処に手間取ってしまっていては、ヴィーナスの救助に支障が出る。あちらを立てればこちらが立たずだ。"

[[dialogue]]
speaker = "クロト"
# 「フィオナ──」
line = "「フィオナ──」"

[[dialogue]]
speaker = "フィオナ"
# 「……ええ。こうなったら……手はひとつしかありませんね」
line = "「……ええ。こうなったら……手はひとつしかありませんね」"

[[dialogue]]
speaker = "unk"
# 俺はフィオナとアイコンタクトを取って、みんなに告げた。
line = "俺はフィオナとアイコンタクトを取って、みんなに告げた。"

[[dialogue]]
speaker = "クロト"
# 「『森』へは──俺とフィオナだけで行く。みんなはここで、魔獣たちからレゾフを守ってくれ」
line = "「『森』へは──俺とフィオナだけで行く。みんなはここで、魔獣たちからレゾフを守ってくれ」"

[[dialogue]]
speaker = "マトイ"
# 「２人だけで……！？」
line = "「２人だけで……！？」"

[[dialogue]]
speaker = "ユウリ"
# 「待ちやがれ、それこそ無茶だ！　あの黒騎士に２人ぽっちじゃ──」
line = "「待ちやがれ、それこそ無茶だ！　あの黒騎士に２人ぽっちじゃ──」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが、ソフィアの故郷をこのまま放っておくわけにはいきません。私と緋宮会長なら──」
line = "「ですが、ソフィアの故郷をこのまま放っておくわけにはいきません。私と緋宮会長なら──」"

[[dialogue]]
speaker = "ソフィア"
# 「ヴィーナスさんだって放っておけません！　それに、戦力が分散しすぎです！」
line = "「ヴィーナスさんだって放っておけません！　それに、戦力が分散しすぎです！」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ、会長くん──そんな無謀は看過できないわ！」
line = "「そうよ、会長くん──そんな無謀は看過できないわ！」"

[[dialogue]]
speaker = "クロト"
# 「サーシャさん……」
line = "「サーシャさん……」"

[[dialogue]]
speaker = "狼型の魔獣"
# 『──ガルルルルルルルルルッ！！』
line = "『──ガルルルルルルルルルッ！！』"

[[dialogue]]
speaker = "unk"
# ああ、くそ──参った。
line = "ああ、くそ──参った。"

[[dialogue]]
speaker = "unk"
# レゾフの街もヴィーナスのこともどちらだって見過ごせない。
line = "レゾフの街もヴィーナスのこともどちらだって見過ごせない。"

[[dialogue]]
speaker = "unk"
# どうしてこんな大事な局面で、２つを天秤にかけなきゃいけないんだ──！
line = "どうしてこんな大事な局面で、２つを天秤にかけなきゃいけないんだ──！"

[[dialogue]]
speaker = "？？？"
# 「構わん──先を急げよ、若人たち」
line = "「構わん──先を急げよ、若人たち」"

[[dialogue]]
speaker = "雪男の魔獣"
# 『ギラアアアアアアアアア────ッ！？』
line = "『ギラアアアアアアアアア────ッ！？』"

[[dialogue]]
speaker = "狼型の魔獣"
# 『──グルルルルルルァァッ！？』
line = "『──グルルルルルルァァッ！？』"

[[dialogue]]
speaker = "マトイ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "ユウリ"
# 「なっ──！？」
line = "「なっ──！？」"

[[dialogue]]
speaker = "unk"
# 一筋の雷光が天を割った。
line = "一筋の雷光が天を割った。"

[[dialogue]]
speaker = "unk"
# 吹雪ごと灼き尽くすかのような雷撃が魔獣たちの大群を一掃する。
line = "吹雪ごと灼き尽くすかのような雷撃が魔獣たちの大群を一掃する。"

[[dialogue]]
speaker = "unk"
# そこに立っていたのは……
line = "そこに立っていたのは……"

[[dialogue]]
speaker = "？？？"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "クロト"
# 「え……」
line = "「え……」"

[[dialogue]]
speaker = "ユウリ"
# 「あ──あんたは……あん時に会った──」
line = "「あ──あんたは……あん時に会った──」"

[[dialogue]]
speaker = "ソフィア"
# 「──旅人、さん……？」
line = "「──旅人、さん……？」"

[[dialogue]]
speaker = "unk"
# 旅人──自らをそう名乗った女性に違いなかった。
line = "旅人──自らをそう名乗った女性に違いなかった。"

[[dialogue]]
speaker = "unk"
# だが、その様子は明らかに以前と違う。
line = "だが、その様子は明らかに以前と違う。"

[[dialogue]]
speaker = "unk"
# 服装や武装もさることながら──なんなんだあの、圧倒的な星力の発露は！
line = "服装や武装もさることながら──なんなんだあの、圧倒的な星力の発露は！"

[[dialogue]]
speaker = "クロト"
# 「旅人さん──あなたは一体……」
line = "「旅人さん──あなたは一体……」"

[[dialogue]]
speaker = "ソフィア"
# 「なんで──どうして、あなたが……」
line = "「なんで──どうして、あなたが……」"

[[dialogue]]
speaker = "？？？"
# 「何故って……おかしなことを聞くな。<b>教え子</b>を魔の手から守るのは、教育者として当然の振る舞いだろう？」
line = "「何故って……おかしなことを聞くな。<b>教え子</b>を魔の手から守るのは、教育者として当然の振る舞いだろう？」"

[[dialogue]]
speaker = "狼型の魔獣"
# 『グルルルルルルァァッッ────！！』
line = "『グルルルルルルァァッッ────！！』"

[[dialogue]]
speaker = "unk"
# 敵対する魔獣の軍勢へ、再び<ruby=いかずち>雷</ruby>のまとう蛇腹剣を振るう──
line = "敵対する魔獣の軍勢へ、再び<ruby>雷<rt>いかずち</rt></ruby>のまとう蛇腹剣を振るう──"

[[dialogue]]
speaker = "クロト"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "ラティエ"
# 「流星学園学園長──白夜院ラティエ。<ruby=しょうび>焦眉</ruby>の急につき、生徒保護の任を全うさせてもらう」
line = "「流星学園学園長──白夜院ラティエ。<ruby>焦眉<rt>しょうび</rt></ruby>の急につき、生徒保護の任を全うさせてもらう」"

[[dialogue]]
speaker = "unk"
# そして。
line = "そして。"

[[dialogue]]
speaker = "unk"
# はためくドレスの裏地に描かれていたのは──俺たちもよく知るシンボル、流星学園の校章だった。
line = "はためくドレスの裏地に描かれていたのは──俺たちもよく知るシンボル、流星学園の校章だった。"

[[dialogue]]
speaker = "サーシャ"
# 「えっ──」
line = "「えっ──」"

[[dialogue]]
speaker = "ユウリ"
# 「がっ──学園長！？」
line = "「がっ──学園長！？」"

[[dialogue]]
speaker = "unk"
# 驚愕に湧く──
line = "驚愕に湧く──"

[[dialogue]]
speaker = "unk"
# 次の瞬間、けたたましい轟雷が眼前の魔獣たちを一掃した。
line = "次の瞬間、けたたましい轟雷が眼前の魔獣たちを一掃した。"

[[dialogue]]
speaker = "ラティエ"
# 「唸れ、バラクィエル──塵と消えろ」
line = "「唸れ、バラクィエル──塵と消えろ」"

[[dialogue]]
speaker = "マトイ"
# 「──！？！？」
line = "「──！？！？」"

[[dialogue]]
speaker = "ユウリ"
# 「半端、ねぇ……っ……！」
line = "「半端、ねぇ……っ……！」"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ──半分くらいは片付いたか。この様子であれば、まだ巣にいくらか残っていような」
line = "「ふむ──半分くらいは片付いたか。この様子であれば、まだ巣にいくらか残っていような」"

[[dialogue]]
speaker = "unk"
# 押し寄せていた魔獣たちが……またたく間に消し炭となって吹雪に散る。
line = "押し寄せていた魔獣たちが……またたく間に消し炭となって吹雪に散る。"

[[dialogue]]
speaker = "unk"
# 誰もが呆気に取られているなか、フィオナだけが嘆息して歩み寄った。
line = "誰もが呆気に取られているなか、フィオナだけが嘆息して歩み寄った。"

[[dialogue]]
speaker = "フィオナ"
# 「ふぅ……お人が悪いですよ、学園長。せめて事前に伝えておいていただけないと」
line = "「ふぅ……お人が悪いですよ、学園長。せめて事前に伝えておいていただけないと」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっ。今の私は根無し草だからな──旅人とは気まぐれなものさ」
line = "「はっはっ。今の私は根無し草だからな──旅人とは気まぐれなものさ」"

[[dialogue]]
speaker = "マトイ"
# 「は、初めて見た──流星の学園長……」
line = "「は、初めて見た──流星の学園長……」"

[[dialogue]]
speaker = "クロト"
# 「ああ……確か、ずっとどこかを放浪してたっていう……」
line = "「ああ……確か、ずっとどこかを放浪してたっていう……」"

[[dialogue]]
speaker = "unk"
# 白夜院ラティエ──さん。
line = "白夜院ラティエ──さん。"

[[dialogue]]
speaker = "unk"
# 流星の関係者さえ手を焼いていたという、放浪癖のある人だったか。
line = "流星の関係者さえ手を焼いていたという、放浪癖のある人だったか。"

[[dialogue]]
speaker = "サーシャ"
# 「もしかして……ヴィーナスちゃんのために魔界まで来てくれたとか？」
line = "「もしかして……ヴィーナスちゃんのために魔界まで来てくれたとか？」"

[[dialogue]]
speaker = "ラティエ"
# 「いや？　ただの偶然だ。前々からこの地の『冬』とやらに興味があってね」
line = "「いや？　ただの偶然だ。前々からこの地の『冬』とやらに興味があってね」"

[[dialogue]]
speaker = "ユウリ"
# 「がくっ」
line = "「がくっ」"

[[dialogue]]
speaker = "ソフィア"
# 「私も初めて会いました──じゃなくて！　そうです。いつかは文句を言ってやろうと思ってたんです！」
line = "「私も初めて会いました──じゃなくて！　そうです。いつかは文句を言ってやろうと思ってたんです！」"

[[dialogue]]
speaker = "ソフィア"
# 「あなたがいらっしゃらないせいで、普段のフィオナ会長の業務はてんてこまいなんですよ！」
line = "「あなたがいらっしゃらないせいで、普段のフィオナ会長の業務はてんてこまいなんですよ！」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは。そう怒るな奏ソフィア。私としても星見嬢には感謝しているさ」
line = "「はっはっは。そう怒るな奏ソフィア。私としても星見嬢には感謝しているさ」"

[[dialogue]]
speaker = "フィオナ"
# 「私は気にしていませんが……ソフィアの言うことも、一理ありますね」
line = "「私は気にしていませんが……ソフィアの言うことも、一理ありますね」"

[[dialogue]]
speaker = "フィオナ"
# 「なので、その借りを返してもらう意味でも──この場は学園長に任せましょう」
line = "「なので、その借りを返してもらう意味でも──この場は学園長に任せましょう」"

[[dialogue]]
speaker = "ニャリオン"
# 「へ、平気なのかニャ！？」
line = "「へ、平気なのかニャ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「その実力は──私が保証します。この規模の魔獣であっても……決して遅れを取ることはないでしょう」
line = "「その実力は──私が保証します。この規模の魔獣であっても……決して遅れを取ることはないでしょう」"

[[dialogue]]
speaker = "ユウリ"
# 「マジかよ……」
line = "「マジかよ……」"

[[dialogue]]
speaker = "クロト"
# 「こうして傍にいるだけでも──並々ならぬ実力なのはわかる。これ以上ない提案だ」
line = "「こうして傍にいるだけでも──並々ならぬ実力なのはわかる。これ以上ない提案だ」"

[[dialogue]]
speaker = "クロト"
# 「ただ──学園長以外にも、街を守る役目は必要かもしれない」
line = "「ただ──学園長以外にも、街を守る役目は必要かもしれない」"

[[dialogue]]
speaker = "サーシャ"
# 「……そうね。寒波からも逃げなきゃならないわけだし」
line = "「……そうね。寒波からも逃げなきゃならないわけだし」"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ。なれば魔獣の掃討は私が行うとして……」
line = "「ふむ。なれば魔獣の掃討は私が行うとして……」"

[[dialogue]]
speaker = "ラティエ"
# 「──楠葉嬢、奏妹。きみ達は残れ。レゾフの前線から住民を避難させつつ──凍結による被害から彼らを守るんだ」
line = "「──楠葉嬢、奏妹。きみ達は残れ。レゾフの前線から住民を避難させつつ──凍結による被害から彼らを守るんだ」"

[[dialogue]]
speaker = "ユウリ"
# 「ＯＫ──流星の魂、見せてやるよ」
line = "「ＯＫ──流星の魂、見せてやるよ」"

[[dialogue]]
speaker = "ソフィア"
# 「学園長……承知ですっ！」
line = "「学園長……承知ですっ！」"

[[dialogue]]
speaker = "ユウリ"
# 「──会長さん。フィオナ。マトイにサーシャさん、アホ猫も。ヴィーナスを頼んだぜ……！」
line = "「──会長さん。フィオナ。マトイにサーシャさん、アホ猫も。ヴィーナスを頼んだぜ……！」"

[[dialogue]]
speaker = "ソフィア"
# 「私からも。絶対に、あの黒い鎧を倒して、新星のメンバーを取り返してください！」
line = "「私からも。絶対に、あの黒い鎧を倒して、新星のメンバーを取り返してください！」"

[[dialogue]]
speaker = "クロト"
# 「２人とも……ああ。必ず戻る！」
line = "「２人とも……ああ。必ず戻る！」"

[[dialogue]]
speaker = "ラティエ"
# 「フフ──若人らしい良き心意気だ」
line = "「フフ──若人らしい良き心意気だ」"

[[dialogue]]
speaker = "ラティエ"
# 「急げよ、星騎士たち。その気概なら──いかなる壁も打ち崩せよう」
line = "「急げよ、星騎士たち。その気概なら──いかなる壁も打ち崩せよう」"

[[dialogue]]
speaker = "フィオナ"
# 「承知です──流星学園星徒会長星見フィオナ、参ります！」
line = "「承知です──流星学園星徒会長星見フィオナ、参ります！」"

[[dialogue]]
speaker = "ニャリオン"
# 「全速前進ニャアン──！」
line = "「全速前進ニャアン──！」"
