[[dialogue]]
speaker = "unk"
# 第２話,天機の星眼,B
line = "第２話,天機の星眼,B"

[[dialogue]]
speaker = "ジグ"
# 「やあ魔王。邪魔するよ」
line = "「やあ魔王。邪魔するよ」"

[[dialogue]]
speaker = "ジグ"
# 「天界で挨拶はさせてもらったが、落ち着いた場で話すのは初めてになるかな？」
line = "「天界で挨拶はさせてもらったが、落ち着いた場で話すのは初めてになるかな？」"

[[dialogue]]
speaker = "unk"
# 彼女はレナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート──平行世界ベガの星騎士だ。最近までリクリエの使徒として操られていたが、梨緒の懸命な説得によって解放された。
line = "彼女はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート──平行世界ベガの星騎士だ。最近までリクリエの使徒として操られていたが、梨緒の懸命な説得によって解放された。"

[[dialogue]]
speaker = "unk"
# ジグとはいずれ膝を突き合わせて話をしたいと思っていたが、彼女の方から訪ねて来てくれるとは。
line = "ジグとはいずれ膝を突き合わせて話をしたいと思っていたが、彼女の方から訪ねて来てくれるとは。"

[[dialogue]]
speaker = "クロト"
# 「ジグ、天界での負傷はもういいのか？」
line = "「ジグ、天界での負傷はもういいのか？」"

[[dialogue]]
speaker = "ジグ"
# 「ああ。久しぶりにトワちゃん先生の治療を受けたよ。このとおり、動くぶんにはもう問題ない」
line = "「ああ。久しぶりにトワちゃん先生の治療を受けたよ。このとおり、動くぶんにはもう問題ない」"

[[dialogue]]
speaker = "クロト"
# 「それならよかった。心配してたんだ」
line = "「それならよかった。心配してたんだ」"

[[dialogue]]
speaker = "ジグ"
# 「……君はお人好しだね。仮面に操られていたとはいえ、私は散々迷惑をかけたというのに」
line = "「……君はお人好しだね。仮面に操られていたとはいえ、私は散々迷惑をかけたというのに」"

[[dialogue]]
speaker = "ジグ"
# 「改めて──本当に申し訳なかった。そして、心からの感謝を」
line = "「改めて──本当に申し訳なかった。そして、心からの感謝を」"

[[dialogue]]
speaker = "クロト"
# 「お礼なら梨緒に。彼女が一番の功労者だ」
line = "「お礼なら梨緒に。彼女が一番の功労者だ」"

[[dialogue]]
speaker = "ジグ"
# 「もちろんアガサにも礼は伝えているよ。でもそれとは別に、君にもきちんとしておきたくてね」
line = "「もちろんアガサにも礼は伝えているよ。でもそれとは別に、君にもきちんとしておきたくてね」"

[[dialogue]]
speaker = "ジグ"
# 「敗戦の将ではあるが、できうる限り力になるよ」
line = "「敗戦の将ではあるが、できうる限り力になるよ」"

[[dialogue]]
speaker = "クロト"
# 「ああ、頼らせてもらう。ところで梨緒は一緒じゃないのか？　話があるって聞かされていたんだけど」
line = "「ああ、頼らせてもらう。ところで梨緒は一緒じゃないのか？　話があるって聞かされていたんだけど」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、そのことなら──」
line = "「ああ、そのことなら──」"

[[dialogue]]
speaker = "梨緒"
# 「すまない魔王、遅くなった。まったくジグのやつはどこに──」
line = "「すまない魔王、遅くなった。まったくジグのやつはどこに──」"

[[dialogue]]
speaker = "ジグ"
# 「やあ。遅かったねアガサ」
line = "「やあ。遅かったねアガサ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ！？　散々に探したんだぞ、どうして君が先に星徒会室に……！」
line = "「ジグ！？　散々に探したんだぞ、どうして君が先に星徒会室に……！」"

[[dialogue]]
speaker = "ジグ"
# 「<ruby=こっち>アルタイル</ruby>の新星学園が、ベガとどう違うのか気になってね。好奇心を満たしがてら、散歩をしてたんだ」
line = "「<ruby>アルタイル<rt>こっち</rt></ruby>の新星学園が、ベガとどう違うのか気になってね。好奇心を満たしがてら、散歩をしてたんだ」"

[[dialogue]]
speaker = "梨緒"
# 「本当に君というやつは……！」
line = "「本当に君というやつは……！」"

[[dialogue]]
speaker = "ナターシャ"
# 「仮面がはがれても相変わらずの自由人だねー、ジグは」
line = "「仮面がはがれても相変わらずの自由人だねー、ジグは」"

[[dialogue]]
speaker = "アポロ"
# 「よお、魔王！　会いに来たぞっ！」
line = "「よお、魔王！　会いに来たぞっ！」"

[[dialogue]]
speaker = "クロト"
# 「選管メンバーが勢ぞろい……ってわけじゃないな。ベアトリスは？」
line = "「選管メンバーが勢ぞろい……ってわけじゃないな。ベアトリスは？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ベアトは一足先に会議室。極星学園の人達の相手をしてもらってるよ」
line = "「ベアトは一足先に会議室。極星学園の人達の相手をしてもらってるよ」"

[[dialogue]]
speaker = "アポロ"
# 「デネブから来たあいつらにも、共闘を要請するんだろ？　早く行こうぜ！」
line = "「デネブから来たあいつらにも、共闘を要請するんだろ？　早く行こうぜ！」"

[[dialogue]]
speaker = "梨緒"
# 「待て。その前に選管の方から魔王に話がある」
line = "「待て。その前に選管の方から魔王に話がある」"

[[dialogue]]
speaker = "梨緒"
# 「改めて紹介しよう、彼女が平行世界ベガの──」
line = "「改めて紹介しよう、彼女が平行世界ベガの──」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、省略してくれて構わないよ。自己紹介は天界で済ませたし、魔王の方も何度も名乗られたって挨拶に困るだろうからね」
line = "「ああ、省略してくれて構わないよ。自己紹介は天界で済ませたし、魔王の方も何度も名乗られたって挨拶に困るだろうからね」"

[[dialogue]]
speaker = "梨緒"
# 「……レナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート。ファーストネームはレナーテだが、ジグの方が慣れているだろうからそう呼ぶといい」
line = "「……レナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート。ファーストネームはレナーテだが、ジグの方が慣れているだろうからそう呼ぶといい」"

[[dialogue]]
speaker = "梨緒"
# 「──いや。別に『アレ』でも『お前』でも『そこの』でも。好きに呼ぶといいだろう」
line = "「──いや。別に『アレ』でも『お前』でも『そこの』でも。好きに呼ぶといいだろう」"

[[dialogue]]
speaker = "ジグ"
# 「ふふ。そうやってすぐムキになるところが可愛いね、アガサは」
line = "「ふふ。そうやってすぐムキになるところが可愛いね、アガサは」"

[[dialogue]]
speaker = "梨緒"
# 「ああもう、うるさいっ……ともかく魔王。ジグはこれからしばらく、選管でその身を預かることにしたい。その許可をもらいに来た」
line = "「ああもう、うるさいっ……ともかく魔王。ジグはこれからしばらく、選管でその身を預かることにしたい。その許可をもらいに来た」"

[[dialogue]]
speaker = "ナターシャ"
# 「腕の立つ星騎士をフリーにしておいたら、会長さんも管理しづらいでしょ？　ジグに用事があったら、選管に連絡してって感じだね」
line = "「腕の立つ星騎士をフリーにしておいたら、会長さんも管理しづらいでしょ？　ジグに用事があったら、選管に連絡してって感じだね」"

[[dialogue]]
speaker = "梨緒"
# 「魔王の指示があれば、ジグは火の中でも水の中でも即座に派遣する。文字通りこき使ってくれ」
line = "「魔王の指示があれば、ジグは火の中でも水の中でも即座に派遣する。文字通りこき使ってくれ」"

[[dialogue]]
speaker = "ジグ"
# 「ひどいね、まだ傷も癒え切っていないのに」
line = "「ひどいね、まだ傷も癒え切っていないのに」"

[[dialogue]]
speaker = "梨緒"
# 「呑気に散歩できる元気があるくせに何を言う。それで魔王、どうだろうか？」
line = "「呑気に散歩できる元気があるくせに何を言う。それで魔王、どうだろうか？」"

[[dialogue]]
speaker = "クロト"
# 「問題ないよ。アルタイルで過ごす以上、ジグにも居場所は必要だ。梨緒が支えてあげてくれ」
line = "「問題ないよ。アルタイルで過ごす以上、ジグにも居場所は必要だ。梨緒が支えてあげてくれ」"

[[dialogue]]
speaker = "unk"
# 仮面を被っていた時の記憶は本人に残っている──かつてアポロはそう言っていた。
line = "仮面を被っていた時の記憶は本人に残っている──かつてアポロはそう言っていた。"

[[dialogue]]
speaker = "unk"
# である以上は、少しでも気心の知れた人をそばに置いておくべきだろう。アポロをフィオナが支えたように。
line = "である以上は、少しでも気心の知れた人をそばに置いておくべきだろう。アポロをフィオナが支えたように。"

[[dialogue]]
speaker = "アポロ"
# 「……？　どーした、魔王？」
line = "「……？　どーした、魔王？」"

[[dialogue]]
speaker = "クロト"
# 「いいや、何でもないよ」
line = "「いいや、何でもないよ」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ、これからジグの力が必要な時は、選管の誰かに連絡をするよ」
line = "「じゃあ、これからジグの力が必要な時は、選管の誰かに連絡をするよ」"

[[dialogue]]
speaker = "アポロ"
# 「よし！　話は終わりだな！　デネブの奴らに会いに──」
line = "「よし！　話は終わりだな！　デネブの奴らに会いに──」"

[[dialogue]]
speaker = "ナターシャ"
# 「はーいストップ。もうちょっとだけ話は続くよ」
line = "「はーいストップ。もうちょっとだけ話は続くよ」"

[[dialogue]]
speaker = "アポロ"
# 「ええ～……！？」
line = "「ええ～……！？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。私も詳しいことは聞いてないんだが……ジグの方から報告したい情報があるらしい」
line = "「ああ。私も詳しいことは聞いてないんだが……ジグの方から報告したい情報があるらしい」"

[[dialogue]]
speaker = "ジグ"
# 「すまないねアポロ。できる限り短くまとめよう」
line = "「すまないねアポロ。できる限り短くまとめよう」"

[[dialogue]]
speaker = "ジグ"
# 「魔王もアガサから話は聞いてると思う──私の『眼』についてだ」
line = "「魔王もアガサから話は聞いてると思う──私の『眼』についてだ」"

[[dialogue]]
speaker = "ジグ"
# 「私の一族の中で受け継がれるこの力は『天機の星眼』と呼ばれている」
line = "「私の一族の中で受け継がれるこの力は『天機の星眼』と呼ばれている」"

[[dialogue]]
speaker = "ジグ"
# 「視認した人、もしくは物に秘められた才能や潜在能力を捉え、可能性を視通す眼」
line = "「視認した人、もしくは物に秘められた才能や潜在能力を捉え、可能性を視通す眼」"

[[dialogue]]
speaker = "ジグ"
# 「まあ端的に言えば、未来を視通す眼だと思ってくれればいいよ」
line = "「まあ端的に言えば、未来を視通す眼だと思ってくれればいいよ」"

[[dialogue]]
speaker = "ジグ"
# 「消耗が激しいからあまり濫用するとリスクもあるが、この『眼』も魔王、君のために使わせてもらうよ」
line = "「消耗が激しいからあまり濫用するとリスクもあるが、この『眼』も魔王、君のために使わせてもらうよ」"

[[dialogue]]
speaker = "アポロ"
# 「未来を視る眼……改めて聞くとかっこいいな……！」
line = "「未来を視る眼……改めて聞くとかっこいいな……！」"

[[dialogue]]
speaker = "ジグ"
# 「ふふ、そうかい？」
line = "「ふふ、そうかい？」"

[[dialogue]]
speaker = "ナターシャ"
# 「聞くたびに思うよね。苦労しそうな眼」
line = "「聞くたびに思うよね。苦労しそうな眼」"

[[dialogue]]
speaker = "ジグ"
# 「それもそうだね。天機の星眼は、あくまで実現可能性がある未来を視るだけで、不都合な未来を絶対に避けられるようなものではない」
line = "「それもそうだね。天機の星眼は、あくまで実現可能性がある未来を視るだけで、不都合な未来を絶対に避けられるようなものではない」"

[[dialogue]]
speaker = "ジグ"
# 「事実、私はベガにいた頃、何度も自身の可能性を視た。世界の可能性を視た」
line = "「事実、私はベガにいた頃、何度も自身の可能性を視た。世界の可能性を視た」"

[[dialogue]]
speaker = "ジグ"
# 「視るたびに、どれだけ足掻いても変わらない結末を観測するばかり……まあ、それはいいんだ」
line = "「視るたびに、どれだけ足掻いても変わらない結末を観測するばかり……まあ、それはいいんだ」"

[[dialogue]]
speaker = "ジグ"
# 「ハッキリと言おう。私は使徒だった頃、魔王……君の可能性を幾度も覗いていた」
line = "「ハッキリと言おう。私は使徒だった頃、魔王……君の可能性を幾度も覗いていた」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ジグ"
# 「今よりも先の未来。魔王である君が目の当たりにする景色を観測していた。そのたびに、使徒だった私はほくそ笑んだものさ」
line = "「今よりも先の未来。魔王である君が目の当たりにする景色を観測していた。そのたびに、使徒だった私はほくそ笑んだものさ」"

[[dialogue]]
speaker = "ジグ"
# 「視える景色はベガと同じだった。全てが飲み込まれ、破滅する世界……それがアルタイルにも起こるはずだったからね」
line = "「視える景色はベガと同じだった。全てが飲み込まれ、破滅する世界……それがアルタイルにも起こるはずだったからね」"

[[dialogue]]
speaker = "unk"
# かつてセイファート学園長が『神の視座』で観測した、ベガのありさま……それと同じことが、アルタイルにも起こる……？
line = "かつてセイファート学園長が『神の視座』で観測した、ベガのありさま……それと同じことが、アルタイルにも起こる……？"

[[dialogue]]
speaker = "ジグ"
# 「けれど、今は違う未来が視える」
line = "「けれど、今は違う未来が視える」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "ジグ"
# 「リクリエの使徒であるジグは、守護天使ノルンの力によって覚醒したアガサに敗れた」
line = "「リクリエの使徒であるジグは、守護天使ノルンの力によって覚醒したアガサに敗れた」"

[[dialogue]]
speaker = "ジグ"
# 「だからだろうか……今まで見たこともない、新しいビジョンが視えるようになったんだ」
line = "「だからだろうか……今まで見たこともない、新しいビジョンが視えるようになったんだ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……そんな重要な話題だったのか！？　魔王に話したいことができたと、ずいぶん軽い口調で言うから……！」
line = "「ジグ……そんな重要な話題だったのか！？　魔王に話したいことができたと、ずいぶん軽い口調で言うから……！」"

[[dialogue]]
speaker = "ジグ"
# 「私自身、少し信じられなかったからね。伝えるのも慎重になるというものさ」
line = "「私自身、少し信じられなかったからね。伝えるのも慎重になるというものさ」"

[[dialogue]]
speaker = "ジグ"
# 「私の眼は可能性の高い未来も、低い未来も観測できる……しかし世界の命運に関しては、これまで結末が１つしかなかった」
line = "「私の眼は可能性の高い未来も、低い未来も観測できる……しかし世界の命運に関しては、これまで結末が１つしかなかった」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけど今は……可能性の１つに、破滅しないビジョンが視えたってこと？」
line = "「だけど今は……可能性の１つに、破滅しないビジョンが視えたってこと？」"

[[dialogue]]
speaker = "クロト"
# 「……聞かせてくれ。どんな未来なんだ？」
line = "「……聞かせてくれ。どんな未来なんだ？」"

[[dialogue]]
speaker = "ジグ"
# 「──アルタイルが勝利する」
line = "「──アルタイルが勝利する」"

[[dialogue]]
speaker = "アポロ"
# 「本当かっ！？　そいつはめでたいな！」
line = "「本当かっ！？　そいつはめでたいな！」"

[[dialogue]]
speaker = "ナターシャ"
# 「……？　ちょっとよくわからないね。曖昧すぎるよ。どんな景色を見たら、アルタイルが勝利するって言えるの？」
line = "「……？　ちょっとよくわからないね。曖昧すぎるよ。どんな景色を見たら、アルタイルが勝利するって言えるの？」"

[[dialogue]]
speaker = "ジグ"
# 「創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』が用意した、新しい女神の幼体──極星学園星徒会長、ルヴィネ」
line = "「創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が用意した、新しい女神の幼体──極星学園星徒会長、ルヴィネ」"

[[dialogue]]
speaker = "ジグ"
# 「彼女が死ぬビジョンを視たんだ」
line = "「彼女が死ぬビジョンを視たんだ」"
