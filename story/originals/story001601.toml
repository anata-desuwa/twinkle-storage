[[dialogue]]
speaker = "unk"
# バンデット・セナリィが総帥を名乗る秘密結社『ゴールデングース』──その事務所。
line = "バンデット・セナリィが総帥を名乗る秘密結社『ゴールデングース』──その事務所。"

[[dialogue]]
speaker = "unk"
# 『ゴールデングース』設立から少なからず月日が経過したものの、未だ正社員は社長のセナリィのみ。一人会社である。
line = "『ゴールデングース』設立から少なからず月日が経過したものの、未だ正社員は社長のセナリィのみ。一人会社である。"

[[dialogue]]
speaker = "unk"
# そんな彼女は今、九浄家当主・九浄ヘレナから大型依頼を引き受け──そして、難儀していた。
line = "そんな彼女は今、九浄家当主・九浄ヘレナから大型依頼を引き受け──そして、難儀していた。"

[[dialogue]]
speaker = "セナリィ"
# 「さて、充填開始から半日。どのくらい溜まったかしら？」
line = "「さて、充填開始から半日。どのくらい溜まったかしら？」"

[[dialogue]]
speaker = "セナリィ"
# 「……はぁ！？　まだ４０パーセントぽっち！？　なんなんですの、このエネルギー効率の悪さは！」
line = "「……はぁ！？　まだ４０パーセントぽっち！？　なんなんですの、このエネルギー効率の悪さは！」"

[[dialogue]]
speaker = "セナリィ"
# 「仮に出力が３倍になっていたとしても、エネルギー消費が１０倍では、まるで釣り合いが取れませんわ」
line = "「仮に出力が３倍になっていたとしても、エネルギー消費が１０倍では、まるで釣り合いが取れませんわ」"

[[dialogue]]
speaker = "セナリィ"
# 「他ならぬヘレナ様からの依頼な上、心躍る内容だったので、二つ返事で引き受けてしまいましたけど……」
line = "「他ならぬヘレナ様からの依頼な上、心躍る内容だったので、二つ返事で引き受けてしまいましたけど……」"

[[dialogue]]
speaker = "セナリィ"
# 「少々、安請け合いしすぎだったかもしれませんわね……今回の依頼、ちょっとばかし骨が折れそうですわ」
line = "「少々、安請け合いしすぎだったかもしれませんわね……今回の依頼、ちょっとばかし骨が折れそうですわ」"

[[dialogue]]
speaker = "ヘレナ"
# 「新種のモンスターが次々と発見されているのは、貴殿も聞き及んでおろう」
line = "「新種のモンスターが次々と発見されているのは、貴殿も聞き及んでおろう」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、なんでも機械の装甲を持ち、今までとは比にならぬほど強化されたモンスターだとか」
line = "「ええ、なんでも機械の装甲を持ち、今までとは比にならぬほど強化されたモンスターだとか」"

[[dialogue]]
speaker = "セナリィ"
# 「幸いにもまだ遭遇していませんけれど、いざ交戦となったら私でも勝てるかは定かではありませんわね」
line = "「幸いにもまだ遭遇していませんけれど、いざ交戦となったら私でも勝てるかは定かではありませんわね」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだな。太刀打ちできるのはよほどの猛者に限られるだろう。それほどまでに彼奴等は強敵である──そこでだ！」
line = "「そうだな。太刀打ちできるのはよほどの猛者に限られるだろう。それほどまでに彼奴等は強敵である──そこでだ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「我が九浄家は驚異的な開発力を駆使し、その結果、見事、疑似ノヴァフォーム試作品の開発に成功した！」
line = "「我が九浄家は驚異的な開発力を駆使し、その結果、見事、疑似ノヴァフォーム試作品の開発に成功した！」"

[[dialogue]]
speaker = "セナリィ"
# 「なんですって……？　ノヴァフォームと言えば、ごく一部の星騎士だけが発現しているという超強力フォーム……それってとんでもないことではありませんの？」
line = "「なんですって……？　ノヴァフォームと言えば、ごく一部の星騎士だけが発現しているという超強力フォーム……それってとんでもないことではありませんの？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、前例のないとんでもないことであるぞ。ヘレナちゃんを、そして、当家の開発陣を褒めるがよい。もちろん、まだ公には内密である」
line = "「うむ、前例のないとんでもないことであるぞ。ヘレナちゃんを、そして、当家の開発陣を褒めるがよい。もちろん、まだ公には内密である」"

[[dialogue]]
speaker = "セナリィ"
# 「とても私好みですわ。よもや、その疑似ノヴァフォーム完成の自慢のためだけに、ここへ足を運ばれたわけではありませんわよね？」
line = "「とても私好みですわ。よもや、その疑似ノヴァフォーム完成の自慢のためだけに、ここへ足を運ばれたわけではありませんわよね？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ヘレナちゃんはそんなに暇ではないからな。ここまで足を運んだ理由は他でもない」
line = "「ヘレナちゃんはそんなに暇ではないからな。ここまで足を運んだ理由は他でもない」"

[[dialogue]]
speaker = "ヘレナ"
# 「この試作品を──セナリィ、貴殿に試してほしくてな」
line = "「この試作品を──セナリィ、貴殿に試してほしくてな」"

[[dialogue]]
speaker = "セナリィ"
# 「栄えある試作品１号を、この私に……託すということですの！？」
line = "「栄えある試作品１号を、この私に……託すということですの！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。もちろん当家でも試してはいるが、サンプルは多ければ多いほど良いのでな。特に実践的なデータが欲しい」
line = "「うむ。もちろん当家でも試してはいるが、サンプルは多ければ多いほど良いのでな。特に実践的なデータが欲しい」"

[[dialogue]]
speaker = "ヘレナ"
# 「試作品ゆえ想定外の危険も孕んでいる。従来品との差異、メリット、デメリットなどを試運転で確認してほしい」
line = "「試作品ゆえ想定外の危険も孕んでいる。従来品との差異、メリット、デメリットなどを試運転で確認してほしい」"

[[dialogue]]
speaker = "ヘレナ"
# 「これは貴殿の会社、ゴールデングースへの依頼である。当然、危険度と報告内容に応じた報酬は支払う」
line = "「これは貴殿の会社、ゴールデングースへの依頼である。当然、危険度と報告内容に応じた報酬は支払う」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだな……疑似ノヴァフォームは、貴殿に合わせて<ruby=エンプレス>女帝</ruby>フォームと名付けよう。よい響きであろう？」
line = "「そうだな……疑似ノヴァフォームは、貴殿に合わせて<ruby>女帝<rt>エンプレス</rt></ruby>フォームと名付けよう。よい響きであろう？」"

[[dialogue]]
speaker = "セナリィ"
# 「<ruby=エンプレス>女帝</ruby>フォーム……！？」
line = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォーム……！？」"

[[dialogue]]
speaker = "セナリィ"
# 「承知いたしました。この依頼、慎まずにお引き受けいたしますわ！　朗報をお待ちくださいませ！」
line = "「承知いたしました。この依頼、慎まずにお引き受けいたしますわ！　朗報をお待ちくださいませ！」"

[[dialogue]]
speaker = "セナリィ"
# 「完成したばかりの新作！　従来品を大きく上回る驚異的かつ圧倒的な超火力！　危険を孕んだ試作品のテストプレイ！」
line = "「完成したばかりの新作！　従来品を大きく上回る驚異的かつ圧倒的な超火力！　危険を孕んだ試作品のテストプレイ！」"

[[dialogue]]
speaker = "セナリィ"
# 「こんなにもトキメくワードのバーゲンセールに、心躍らぬ者がいて！？」
line = "「こんなにもトキメくワードのバーゲンセールに、心躍らぬ者がいて！？」"

[[dialogue]]
speaker = "セナリィ"
# 「しかしながら、フルチャージして稼働時間は２０分に満たず、リチャージに必要なのは、およそ２７時間」
line = "「しかしながら、フルチャージして稼働時間は２０分に満たず、リチャージに必要なのは、およそ２７時間」"

[[dialogue]]
speaker = "セナリィ"
# 「この燃費の悪さは、いかんともし難いですわね。気軽に試すには充填時間が長すぎますわ」
line = "「この燃費の悪さは、いかんともし難いですわね。気軽に試すには充填時間が長すぎますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「実際どれほどの火力が出るものか……噂の新モンスターならば、試し撃ちにはうってつけかもしれませんけど……」
line = "「実際どれほどの火力が出るものか……噂の新モンスターならば、試し撃ちにはうってつけかもしれませんけど……」"

[[dialogue]]
speaker = "セナリィ"
# 「どんなに強力であろうとも、敵陣真っただ中で星力が切れて棒立ちになってしまったら、ただのカカシ。ストレス解消のサンドバッグですわ」
line = "「どんなに強力であろうとも、敵陣真っただ中で星力が切れて棒立ちになってしまったら、ただのカカシ。ストレス解消のサンドバッグですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「ワンチャン、超短期の決戦兵器としてなら運用可能……ま、報告書の体裁としては、こんなとこで十分そうですわね」
line = "「ワンチャン、超短期の決戦兵器としてなら運用可能……ま、報告書の体裁としては、こんなとこで十分そうですわね」"

[[dialogue]]
speaker = "セナリィ"
# 「しかし、<ruby=エンプレス>女帝</ruby>フォームの真の実力はこの程度ではありませんわよね」
line = "「しかし、<ruby>女帝<rt>エンプレス</rt></ruby>フォームの真の実力はこの程度ではありませんわよね」"

[[dialogue]]
speaker = "セナリィ"
# 「上手く使うことができれば、多くの星騎士が太刀打ちできない新型モンスターに、先んじて対処することができる……」
line = "「上手く使うことができれば、多くの星騎士が太刀打ちできない新型モンスターに、先んじて対処することができる……」"

[[dialogue]]
speaker = "セナリィ"
# 「そうすれば、ゴールデングースへの仕事依頼も引く手あまた、依頼料もガッポガッポ、左団扇生活の<ruby=プレリュード>序曲</ruby>ですわ……！」
line = "「そうすれば、ゴールデングースへの仕事依頼も引く手あまた、依頼料もガッポガッポ、左団扇生活の<ruby>序曲<rt>プレリュード</rt></ruby>ですわ……！」"

[[dialogue]]
speaker = "？？？"
# 「すみませーん！」
line = "「すみませーん！」"

[[dialogue]]
speaker = "？？？"
# 「誰かいらっしゃいませんかー？」
line = "「誰かいらっしゃいませんかー？」"

[[dialogue]]
speaker = "セナリィ"
# 「そう！　私の秘密結社ゴールデングースこそが、星徒会をも超える最強に──」
line = "「そう！　私の秘密結社ゴールデングースこそが、星徒会をも超える最強に──」"

[[dialogue]]
speaker = "？？？"
# 「ミウ、中から声が聞こえるよ」
line = "「ミウ、中から声が聞こえるよ」"

[[dialogue]]
speaker = "？？？"
# 「あの高らかかつ高貴な美声は……間違いないです」
line = "「あの高らかかつ高貴な美声は……間違いないです」"

[[dialogue]]
speaker = "ミウ"
# 「はわっ！？　ヒマワリちゃん、いた！　いたよ！」
line = "「はわっ！？　ヒマワリちゃん、いた！　いたよ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「いたよ！　本当にいたね、ミウ！」
line = "「いたよ！　本当にいたね、ミウ！」"

[[dialogue]]
speaker = "セナリィ"
# 「私は珍獣じゃありませんわ！？」
line = "「私は珍獣じゃありませんわ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「──って、あ、あら？　どなたかしら、あなたたち。ここは動物園でも託児所でもなくてよ」
line = "「──って、あ、あら？　どなたかしら、あなたたち。ここは動物園でも託児所でもなくてよ」"

[[dialogue]]
speaker = "セナリィ"
# 「たまたま迷い込んだのなら、とっととおうちにお帰りなさいな。ＤＩＳＣで可愛い猫ちゃんが戯れている動画でも見ているがいいですわ」
line = "「たまたま迷い込んだのなら、とっととおうちにお帰りなさいな。ＤＩＳＣで可愛い猫ちゃんが戯れている動画でも見ているがいいですわ」"

[[dialogue]]
speaker = "ヒマワリ"
# 「うわぁー！　本物のセナリィ様だーーー！」
line = "「うわぁー！　本物のセナリィ様だーーー！」"

[[dialogue]]
speaker = "セナリィ"
# 「え、ええ、裏社会にその人ありと謳われたバンデット・セナリィとは私のこと──しかして、その正体は！」
line = "「え、ええ、裏社会にその人ありと謳われたバンデット・セナリィとは私のこと──しかして、その正体は！」"

[[dialogue]]
speaker = "ミウ"
# 「秘密結社ゴールデングース総帥──ですよね？」
line = "「秘密結社ゴールデングース総帥──ですよね？」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ……あなたたち、どこでそれを？」
line = "「ええ……あなたたち、どこでそれを？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ミウと一緒に突き留めました！」
line = "「ミウと一緒に突き留めました！」"

[[dialogue]]
speaker = "セナリィ"
# 「なるほど、たまたまここに迷い込んだわけではない、と。よくこの場所に辿り着きましたわね」
line = "「なるほど、たまたまここに迷い込んだわけではない、と。よくこの場所に辿り着きましたわね」"

[[dialogue]]
speaker = "セナリィ"
# 「全てを知っていながら、私に会いに来たということは──ようこそ、秘密結社ゴールデングースへ」
line = "「全てを知っていながら、私に会いに来たということは──ようこそ、秘密結社ゴールデングースへ」"

[[dialogue]]
speaker = "セナリィ"
# 「あなたたちのようなお子様が、仕事の依頼ですのね？　私の腕はお安くなくてよ？」
line = "「あなたたちのようなお子様が、仕事の依頼ですのね？　私の腕はお安くなくてよ？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「い、依頼じゃないんです！」
line = "「い、依頼じゃないんです！」"

[[dialogue]]
speaker = "ミウ"
# 「そうなんです。私たち、折り入ってセナリィ社長にお願いがありまして！」
line = "「そうなんです。私たち、折り入ってセナリィ社長にお願いがありまして！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしたちをゴールデングースに入社させてください！」
line = "「あたしたちをゴールデングースに入社させてください！」"

[[dialogue]]
speaker = "ミウ＆ヒマワリ"
# 「お願いします！」
line = "「お願いします！」"

[[dialogue]]
speaker = "セナリィ"
# 「なるほど、入社志望ですの──」
line = "「なるほど、入社志望ですの──」"

[[dialogue]]
speaker = "セナリィ"
# 「……はぁ？」
line = "「……はぁ？」"
