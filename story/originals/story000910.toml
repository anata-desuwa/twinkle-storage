[[dialogue]]
speaker = "ヘレナ"
# 「よくやってくれた。貴殿らの助力に感謝する」
line = "「よくやってくれた。貴殿らの助力に感謝する」"

[[dialogue]]
speaker = "ヘレナ"
# 「新種のモンスターについてはこちらでも調査しておく。何かわかったらヴィーナスを通じて伝えよう」
line = "「新種のモンスターについてはこちらでも調査しておく。何かわかったらヴィーナスを通じて伝えよう」"

[[dialogue]]
speaker = "ヘレナ"
# 「さて、お待ちかねの報酬だが──」
line = "「さて、お待ちかねの報酬だが──」"

[[dialogue]]
speaker = "セーラ"
# 「いやー、たんまりもらっちゃったね～♪　お財布ほっくほくだよ～♪」
line = "「いやー、たんまりもらっちゃったね～♪　お財布ほっくほくだよ～♪」"

[[dialogue]]
speaker = "unk"
# すごく色を付けてもらえたもんね
line = "すごく色を付けてもらえたもんね"

[[dialogue]]
speaker = "ユウリ"
# 「こりゃ後輩に豪勢な誕生日会を開いてやってもおつりがくるぜ。せっかくだし打ち上げがてらクレープでも食べに行かねえか？」
line = "「こりゃ後輩に豪勢な誕生日会を開いてやってもおつりがくるぜ。せっかくだし打ち上げがてらクレープでも食べに行かねえか？」"

[[dialogue]]
speaker = "ユーリス"
# 「あ、いや。私はここで失礼するよ」
line = "「あ、いや。私はここで失礼するよ」"

[[dialogue]]
speaker = "ユウリ"
# 「んだよノリ悪りぃな。なんか予定でもあんのかよ？」
line = "「んだよノリ悪りぃな。なんか予定でもあんのかよ？」"

[[dialogue]]
speaker = "ユーリス"
# 「そういうわけじゃないんだけど……。お金が、その……」
line = "「そういうわけじゃないんだけど……。お金が、その……」"

[[dialogue]]
speaker = "セーラ"
# 「え？　たった今、たくさんもらったところじゃん」
line = "「え？　たった今、たくさんもらったところじゃん」"

[[dialogue]]
speaker = "ユーリス"
# 「祖国の復興資金の足しになればと全て送金しちゃったからね……。あ、でも私のことは気にしないでみんなで食べに行っちゃってよ」
line = "「祖国の復興資金の足しになればと全て送金しちゃったからね……。あ、でも私のことは気にしないでみんなで食べに行っちゃってよ」"

[[dialogue]]
speaker = "ユウリ"
# 「ったく、使命感が強すぎるってのも考えもんだな。いいから行くぞ。一人でも欠けてたら打ち上げになんねーじゃねえか」
line = "「ったく、使命感が強すぎるってのも考えもんだな。いいから行くぞ。一人でも欠けてたら打ち上げになんねーじゃねえか」"

[[dialogue]]
speaker = "ユーリス"
# 「えっ、でも──わわっ！？」
line = "「えっ、でも──わわっ！？」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしらと一緒にいる時くらい肩の力抜けっつったじゃねえか。今は王子じゃなくて、ただのいち生徒として過ごせよ。クレープくらい奢ってやっから」
line = "「あたしらと一緒にいる時くらい肩の力抜けっつったじゃねえか。今は王子じゃなくて、ただのいち生徒として過ごせよ。クレープくらい奢ってやっから」"

[[dialogue]]
speaker = "ユーリス"
# 「ユウリさん……」
line = "「ユウリさん……」"

[[dialogue]]
speaker = "セーラ"
# 「ふふ、ごめんね♪　うちの親方、昔かたぎの強引なお人でして♪」
line = "「ふふ、ごめんね♪　うちの親方、昔かたぎの強引なお人でして♪」"

[[dialogue]]
speaker = "ユウリ"
# 「だからねじり鉢巻き渡されても困るんすけど！？」
line = "「だからねじり鉢巻き渡されても困るんすけど！？」"

[[dialogue]]
speaker = "unk"
# ユーリスは今回のＭＶＰだしね
line = "ユーリスは今回のＭＶＰだしね"

[[dialogue]]
speaker = "ユーリス"
# 「そ、そうかな……？　けっこう迷惑をかけてしまったと思うんだけど」
line = "「そ、そうかな……？　けっこう迷惑をかけてしまったと思うんだけど」"

[[dialogue]]
speaker = "セーラ"
# 「そーそ。そもそも王子がいなかったらカジノへの潜入もままならなかったわけだし♪」
line = "「そーそ。そもそも王子がいなかったらカジノへの潜入もままならなかったわけだし♪」"

[[dialogue]]
speaker = "ユウリ"
# 「女子会っつーのも初めてだろ？　ま、会長さんもいるけど」
line = "「女子会っつーのも初めてだろ？　ま、会長さんもいるけど」"

[[dialogue]]
speaker = "unk"
# 今だけ女の子扱いしてもよろしくてよ
line = "今だけ女の子扱いしてもよろしくてよ"

[[dialogue]]
speaker = "ユウリ"
# 「何キャラだよ」
line = "「何キャラだよ」"

[[dialogue]]
speaker = "ユーリス"
# 「みんな、ありがとう……。ふふ、それじゃお言葉に甘えちゃおうかな」
line = "「みんな、ありがとう……。ふふ、それじゃお言葉に甘えちゃおうかな」"

[[dialogue]]
speaker = "セーラ"
# 「よーし、それじゃクレープ買ったら王子の部屋に直行だ～！　まだ戦闘服もカジノ仕様のままだし、着替えて朝まで盛り上がっちゃおうよ♪」
line = "「よーし、それじゃクレープ買ったら王子の部屋に直行だ～！　まだ戦闘服もカジノ仕様のままだし、着替えて朝まで盛り上がっちゃおうよ♪」"

[[dialogue]]
speaker = "ユウリ"
# 「は、はぁ！？　またバニーガールになれっつーんすかっ！？　もう嫌っすよ、絶対に嫌っすっ！」
line = "「は、はぁ！？　またバニーガールになれっつーんすかっ！？　もう嫌っすよ、絶対に嫌っすっ！」"

[[dialogue]]
speaker = "ユーリス"
# 「ふふ、私ももう一度見たいな、ユウリさんのバニーガール姿。とても似合っていたよ」
line = "「ふふ、私ももう一度見たいな、ユウリさんのバニーガール姿。とても似合っていたよ」"

[[dialogue]]
speaker = "ユウリ"
# 「調子に乗んなよポンコツ王子！？　つかあんただけバニー着てねえのもおかしいよなぁ……？」
line = "「調子に乗んなよポンコツ王子！？　つかあんただけバニー着てねえのもおかしいよなぁ……？」"

[[dialogue]]
speaker = "ユーリス"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "セーラ"
# 「あーそれ、うちもずっと思ってた。絶対王子も似合うよね～。あれだけ立派なものも、ふふ、お持ちだったし？」
line = "「あーそれ、うちもずっと思ってた。絶対王子も似合うよね～。あれだけ立派なものも、ふふ、お持ちだったし？」"

[[dialogue]]
speaker = "ユーリス"
# 「い、いや、私は。この通り普段は男として生きている身だしっ」
line = "「い、いや、私は。この通り普段は男として生きている身だしっ」"

[[dialogue]]
speaker = "セーラ"
# 「うちらの前では性別気にするなっつったじゃーん♪　それに王子の部屋でなら、ユリアーナちゃんに戻っても構わないよね～？」
line = "「うちらの前では性別気にするなっつったじゃーん♪　それに王子の部屋でなら、ユリアーナちゃんに戻っても構わないよね～？」"

[[dialogue]]
speaker = "ユウリ"
# 「友達になったついでだ。大切なことを教えてやんぜ。人を弄っていいのはな、弄られる覚悟のあるやつだけだ！」
line = "「友達になったついでだ。大切なことを教えてやんぜ。人を弄っていいのはな、弄られる覚悟のあるやつだけだ！」"

[[dialogue]]
speaker = "ユーリス"
# 「～～っっ！？　無理っ、無理だっ！　あんな恥ずかしい格好、私にはとても……！　会長、助けて……！」
line = "「～～っっ！？　無理っ、無理だっ！　あんな恥ずかしい格好、私にはとても……！　会長、助けて……！」"

[[dialogue]]
speaker = "unk"
# 俺もユリアーナのバニー姿を見てみたいな
line = "俺もユリアーナのバニー姿を見てみたいな"

[[dialogue]]
speaker = "ユーリス"
# 「会長っっ～～！！？」
line = "「会長っっ～～！！？」"

[[dialogue]]
speaker = "ユウリ"
# 「おら、行くぞ。あんたには散々恥ずかしい思いさせられたからな。ふふ、覚悟しときやがれ」
line = "「おら、行くぞ。あんたには散々恥ずかしい思いさせられたからな。ふふ、覚悟しときやがれ」"

[[dialogue]]
speaker = "セーラ"
# 「色仕掛け大会も開いちゃおうよ♪　可愛いバニーガール３人で会長さんを誘惑して、ドキドキさせちゃお♪」
line = "「色仕掛け大会も開いちゃおうよ♪　可愛いバニーガール３人で会長さんを誘惑して、ドキドキさせちゃお♪」"

[[dialogue]]
speaker = "ユーリス"
# 「ま、待ってっ……！　似合わないっ、絶対私にはバニーガールなんて似合わないからっ……！！」
line = "「ま、待ってっ……！　似合わないっ、絶対私にはバニーガールなんて似合わないからっ……！！」"

[[dialogue]]
speaker = "ユーリス"
# 「お願いだから勘弁してぇっっ～～！！！」
line = "「お願いだから勘弁してぇっっ～～！！！」"
