[[dialogue]]
speaker = "unk"
# 第６話,選ぶべき道,B
line = "第６話,選ぶべき道,B"

[[dialogue]]
speaker = "ニャリオン"
# 「星見家とは魔王の血族──すなわち、英雄の末裔なのニャン！」
line = "「星見家とは魔王の血族──すなわち、英雄の末裔なのニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「あ、アホネコ」
line = "「あ、アホネコ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういえばいなかったわね。静かだと思ったら」
line = "「そういえばいなかったわね。静かだと思ったら」"

[[dialogue]]
speaker = "ニャリオン"
# 「失敬ニャン！　久しぶりの戦闘でちょびっと消耗してただけなのニャン！」
line = "「失敬ニャン！　久しぶりの戦闘でちょびっと消耗してただけなのニャン！」"

[[dialogue]]
speaker = "unk"
# ぴょこんと現れたニャリオンが、大見得を切りつつそう言い放った。
line = "ぴょこんと現れたニャリオンが、大見得を切りつつそう言い放った。"

[[dialogue]]
speaker = "ルリエル"
# 「英雄の末裔……でありますか。大変クールでありますね！」
line = "「英雄の末裔……でありますか。大変クールでありますね！」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ！　魔王とは要するに、むちゃんこ強くてニャンダフルな人物の血統を指すニャン」
line = "「そうニャ！　魔王とは要するに、むちゃんこ強くてニャンダフルな人物の血統を指すニャン」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャというのに世間では魔王＝悪の図式が広まっているせいで、星見家としてもその事実を公表するわけにはいかなかったのニャン」
line = "「ニャというのに世間では魔王＝悪の図式が広まっているせいで、星見家としてもその事実を公表するわけにはいかなかったのニャン」"

[[dialogue]]
speaker = "アナ"
# 「描かれた本来の『魔王』から３０００年も経っていますから、末裔が多くいるのは不思議なことではありませんね」
line = "「描かれた本来の『魔王』から３０００年も経っていますから、末裔が多くいるのは不思議なことではありませんね」"

[[dialogue]]
speaker = "クロト"
# 「魔王の系譜は三界に散り散りになっている──フィーニスの塔でも、そう聞いたな」
line = "「魔王の系譜は三界に散り散りになっている──フィーニスの塔でも、そう聞いたな」"

[[dialogue]]
speaker = "unk"
# ３０００年前に初めてリクリエを退けたという人物──魔王。
line = "３０００年前に初めてリクリエを退けたという人物──魔王。"

[[dialogue]]
speaker = "unk"
# あの時、謎の声が挙げていた名には彼女も含まれていた。
line = "あの時、謎の声が挙げていた名には彼女も含まれていた。"

[[dialogue]]
speaker = "unk"
# 『そして……最も色濃く魔王の血を引く人物。それは今、人間界に存在します』
line = "『そして……最も色濃く魔王の血を引く人物。それは今、人間界に存在します』"

[[dialogue]]
speaker = "unk"
# 『流星市国の娘──星見フィオナ』
line = "『流星市国の娘──星見フィオナ』"

[[dialogue]]
speaker = "unk"
# あの時、俺は──隣に立っているフィオナのことと思ったけれど。
line = "あの時、俺は──隣に立っているフィオナのことと思ったけれど。"

[[dialogue]]
speaker = "unk"
# もしかするとあの『星見フィオナ』は、正しい人物のことを指していたのかもしれない……。
line = "もしかするとあの『星見フィオナ』は、正しい人物のことを指していたのかもしれない……。"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃあやっぱり、会長くんも『魔王の血統』ってことかしら」
line = "「それじゃあやっぱり、会長くんも『魔王の血統』ってことかしら」"

[[dialogue]]
speaker = "セーラ"
# 「そう考えんのが自然だよね～」
line = "「そう考えんのが自然だよね～」"

[[dialogue]]
speaker = "マトイ"
# 「確かに……御前試合の時もすごいオーラ出しまくってたし……！」
line = "「確かに……御前試合の時もすごいオーラ出しまくってたし……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふっふーん、当然よ。クロトが真の魔王だってのは私がさんざん言ってきたでしょ」
line = "「ふっふーん、当然よ。クロトが真の魔王だってのは私がさんざん言ってきたでしょ」"

[[dialogue]]
speaker = "クロト"
# 「あの時の力は、まだ自在には引き出せないんだけどな」
line = "「あの時の力は、まだ自在には引き出せないんだけどな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この絵がその証拠よ！　この魔王はクロトにそっくり似ているもの！」
line = "「この絵がその証拠よ！　この魔王はクロトにそっくり似ているもの！」"

[[dialogue]]
speaker = "マトイ"
# 「似てる……？　そう……？」
line = "「似てる……？　そう……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そっくりじゃない！　顔とか耳の形とか！」
line = "「そっくりじゃない！　顔とか耳の形とか！」"

[[dialogue]]
speaker = "ニャリオン"
# 「なんとでも言える気がするニャンよ」
line = "「なんとでも言える気がするニャンよ」"

[[dialogue]]
speaker = "セーラ"
# 「あはは。なんとなく雰囲気はわかるかも」
line = "「あはは。なんとなく雰囲気はわかるかも」"

[[dialogue]]
speaker = "クロト"
# （俺が……魔王の血統……か）
line = "（俺が……魔王の血統……か）"

[[dialogue]]
speaker = "unk"
# 確かにこれまでの話を聞けば自然な推測ではあった。
line = "確かにこれまでの話を聞けば自然な推測ではあった。"

[[dialogue]]
speaker = "unk"
# とはいえ、３０００年前の血が脈々と繋がっている──なんて言われても実感はあまり湧かない。
line = "とはいえ、３０００年前の血が脈々と繋がっている──なんて言われても実感はあまり湧かない。"

[[dialogue]]
speaker = "サーシャ"
# 「まとめると、会長くんもフィオナちゃんも立派な素質を秘めてるってことね♪」
line = "「まとめると、会長くんもフィオナちゃんも立派な素質を秘めてるってことね♪」"

[[dialogue]]
speaker = "アナ"
# 「そうなりますね。ただ……前会長の言っていた『魔王』が、流星会長のお姉さんにも繋がるとは予想外でした」
line = "「そうなりますね。ただ……前会長の言っていた『魔王』が、流星会長のお姉さんにも繋がるとは予想外でした」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ソフィア"
# 「フィオナ会長……」
line = "「フィオナ会長……」"

[[dialogue]]
speaker = "フィオナ"
# 「……そう不安そうにしないでください、ソフィア。こうして皆さんにお話できて、少し胸がスッとしました」
line = "「……そう不安そうにしないでください、ソフィア。こうして皆さんにお話できて、少し胸がスッとしました」"

[[dialogue]]
speaker = "フィオナ"
# 「フィオナの名と魔王の定め。これが──私と、星見家の者だけが知っている真実です」
line = "「フィオナの名と魔王の定め。これが──私と、星見家の者だけが知っている真実です」"

[[dialogue]]
speaker = "フィオナ"
# 「星徒会のみんなには……ごめんなさい。今まで騙すような真似をしていて」
line = "「星徒会のみんなには……ごめんなさい。今まで騙すような真似をしていて」"

[[dialogue]]
speaker = "ソフィア"
# 「い……いえ！　とんでもありません。やむなき事情ですし、私のフィオナ会長を思う気持ちは変わりません！」
line = "「い……いえ！　とんでもありません。やむなき事情ですし、私のフィオナ会長を思う気持ちは変わりません！」"

[[dialogue]]
speaker = "ユウリ"
# 「ま、事情はわかった方が対策も立てやすいしな」
line = "「ま、事情はわかった方が対策も立てやすいしな」"

[[dialogue]]
speaker = "セーラ"
# 「うちらはいつだってフィオナちゃんの味方だかんね～♪」
line = "「うちらはいつだってフィオナちゃんの味方だかんね～♪」"

[[dialogue]]
speaker = "unk"
# 内情がどうあれフィオナを受け入れる──というのは昨日から変わらぬ俺たちの総意だった。
line = "内情がどうあれフィオナを受け入れる──というのは昨日から変わらぬ俺たちの総意だった。"

[[dialogue]]
speaker = "unk"
# だから……
line = "だから……"

[[dialogue]]
speaker = "ヴィーナス"
# 「問題は──これからあのガキんちょとどう向き合っていくか、ね」
line = "「問題は──これからあのガキんちょとどう向き合っていくか、ね」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね。姉妹の事情だなんて聞いたら、放っておけないもの♪」
line = "「そうね。姉妹の事情だなんて聞いたら、放っておけないもの♪」"

[[dialogue]]
speaker = "アナ"
# 「次に出会えば──再び交戦に発展するでしょう。前回よりも激しくなるかもしれません」
line = "「次に出会えば──再び交戦に発展するでしょう。前回よりも激しくなるかもしれません」"

[[dialogue]]
speaker = "マトイ"
# 「じゃ、じゃあ……」
line = "「じゃ、じゃあ……」"

[[dialogue]]
speaker = "unk"
# その時、俺たちがどう動くべきか──できれば決めるのは彼女であってほしい。
line = "その時、俺たちがどう動くべきか──できれば決めるのは彼女であってほしい。"

[[dialogue]]
speaker = "クロト"
# 「──フィオナ。フィオナは、どうしたい？」
line = "「──フィオナ。フィオナは、どうしたい？」"

[[dialogue]]
speaker = "フィオナ"
# 「え──私、ですか……？」
line = "「え──私、ですか……？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。学園側の決定はすでに下った。もし次にアポロと相まみえたら──星騎士として、けりをつけなくちゃならない」
line = "「ああ。学園側の決定はすでに下った。もし次にアポロと相まみえたら──星騎士として、けりをつけなくちゃならない」"

[[dialogue]]
speaker = "クロト"
# 「それも退かせるとか、捕まえるとかじゃなくて。今度こそ息の根を止める必要があるってことだ」
line = "「それも退かせるとか、捕まえるとかじゃなくて。今度こそ息の根を止める必要があるってことだ」"

[[dialogue]]
speaker = "フィオナ"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# <ruby=くじゅう>苦渋</ruby>の思いで、俺たちの置かれている現状を告げる。
line = "<ruby>苦渋<rt>くじゅう</rt></ruby>の思いで、俺たちの置かれている現状を告げる。"

[[dialogue]]
speaker = "クロト"
# 「だけど……今の俺たちは、アポロの正体も知っている」
line = "「だけど……今の俺たちは、アポロの正体も知っている」"

[[dialogue]]
speaker = "クロト"
# 「あれは決して──フィオナのお姉さんを模した偽者なんかじゃない。きっとフィオナもそれを感じているはずだ」
line = "「あれは決して──フィオナのお姉さんを模した偽者なんかじゃない。きっとフィオナもそれを感じているはずだ」"

[[dialogue]]
speaker = "クロト"
# 「だから俺たちに──フィオナの素直な気持ちを聞かせてほしい。アポロと、どう向き合うべきか」
line = "「だから俺たちに──フィオナの素直な気持ちを聞かせてほしい。アポロと、どう向き合うべきか」"

[[dialogue]]
speaker = "ソフィア"
# 「……！　その通りです。私たちは学園の決定よりも、会長のご判断に従います！」
line = "「……！　その通りです。私たちは学園の決定よりも、会長のご判断に従います！」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……ソフィア……」
line = "「緋宮会長……ソフィア……」"

[[dialogue]]
speaker = "unk"
# 確かに俺たちはセイファート学園長から命令を受けた。
line = "確かに俺たちはセイファート学園長から命令を受けた。"

[[dialogue]]
speaker = "unk"
# しかしそれが、唯一の運命なんだと受け入れる必要はどこにもない。
line = "しかしそれが、唯一の運命なんだと受け入れる必要はどこにもない。"

[[dialogue]]
speaker = "unk"
# いくら世界を守れたとしても──その先でフィオナが笑えなかったら、意味なんてないのだから。
line = "いくら世界を守れたとしても──その先でフィオナが笑えなかったら、意味なんてないのだから。"

[[dialogue]]
speaker = "フィオナ"
# 「……ふふ」
line = "「……ふふ」"

[[dialogue]]
speaker = "フィオナ"
# 「わかりました。それなら……遠慮なく、わがままを伝えさせていただきますね」
line = "「わかりました。それなら……遠慮なく、わがままを伝えさせていただきますね」"

[[dialogue]]
speaker = "クロト"
# 「フィオナ……」
line = "「フィオナ……」"

[[dialogue]]
speaker = "unk"
# 面を上げた彼女は晴れ晴れとしていた。
line = "面を上げた彼女は晴れ晴れとしていた。"

[[dialogue]]
speaker = "unk"
# そして、凛とした声音で、告げる。
line = "そして、凛とした声音で、告げる。"

[[dialogue]]
speaker = "フィオナ"
# 「仮面の少女アポロを抹殺します──願わくは、私自ら、この手で」
line = "「仮面の少女アポロを抹殺します──願わくは、私自ら、この手で」"

[[dialogue]]
speaker = "クロト"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ！？」
line = "「ニャ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なっ……どうしてそうなるのよ！？」
line = "「なっ……どうしてそうなるのよ！？」"

[[dialogue]]
speaker = "ソフィア"
# 「そ、そうですよ！　あの子は会長のお姉さんなんですよね……！？」
line = "「そ、そうですよ！　あの子は会長のお姉さんなんですよね……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「どうして……などというのは愚問です。かの存在は世界を荒らし、今も私たち星騎士の存続をも脅かそうとしている<ruby=やくさい>厄災</ruby>の権化」
line = "「どうして……などというのは愚問です。かの存在は世界を荒らし、今も私たち星騎士の存続をも脅かそうとしている<ruby>厄災<rt>やくさい</rt></ruby>の権化」"

[[dialogue]]
speaker = "フィオナ"
# 「星騎士として。星徒会として。リクリエから世界を守るために、その使徒を排除しないなんてありえません」
line = "「星騎士として。星徒会として。リクリエから世界を守るために、その使徒を排除しないなんてありえません」"

[[dialogue]]
speaker = "ユウリ"
# 「それにしたって……！　もっとやり方とか、色々考える余地はあんだろ！」
line = "「それにしたって……！　もっとやり方とか、色々考える余地はあんだろ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「そ、そうニャ！　姉君を救うためにこいつらに協力を仰げばいいニャン！」
line = "「そ、そうニャ！　姉君を救うためにこいつらに協力を仰げばいいニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「いいえ。事態は既にひっ迫しています──あの『天蓋』がさらなる規模で引き起こされれば、私たちそのものが機能を失う」
line = "「いいえ。事態は既にひっ迫しています──あの『天蓋』がさらなる規模で引き起こされれば、私たちそのものが機能を失う」"

[[dialogue]]
speaker = "フィオナ"
# 「仮面の少女アポロを抹殺する──星騎士として、流星学園の星徒会長として。学園の命に従うのみです」
line = "「仮面の少女アポロを抹殺する──星騎士として、流星学園の星徒会長として。学園の命に従うのみです」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# フィオナの下した決断。
line = "フィオナの下した決断。"

[[dialogue]]
speaker = "unk"
# それは……学園の方針となんら変わらない、現実主義的なものだった。
line = "それは……学園の方針となんら変わらない、現実主義的なものだった。"

[[dialogue]]
speaker = "クロト"
# 「……本当に、それでいいのか？」
line = "「……本当に、それでいいのか？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。緋宮会長のお心遣いには感謝しています──ですが、この決定は変わりません」
line = "「はい。緋宮会長のお心遣いには感謝しています──ですが、この決定は変わりません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしてよ……！　フィオナのお姉さんなんでしょ……！？」
line = "「どうしてよ……！　フィオナのお姉さんなんでしょ……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「……いいえ。私にとっての姉は、今も近くで眠りについている一人だけです」
line = "「……いいえ。私にとっての姉は、今も近くで眠りについている一人だけです」"

[[dialogue]]
speaker = "unk"
# フィオナは一瞬、彼女が眠っている小部屋を見やった。
line = "フィオナは一瞬、彼女が眠っている小部屋を見やった。"

[[dialogue]]
speaker = "フィオナ"
# 「これは……星見フィオナの妹としての矜持でもあります」
line = "「これは……星見フィオナの妹としての矜持でもあります」"

[[dialogue]]
speaker = "フィオナ"
# 「身内が起こしている不始末なれば、なおさら──この手でけりをつけなくてはなりません」
line = "「身内が起こしている不始末なれば、なおさら──この手でけりをつけなくてはなりません」"

[[dialogue]]
speaker = "マトイ"
# 「そんな……そんな悲しいことって……」
line = "「そんな……そんな悲しいことって……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あのガキんちょはむかつくけど……抹殺なんてありえないわ！　もっとこう、正気に戻すとか、色々あるでしょ！」
line = "「あのガキんちょはむかつくけど……抹殺なんてありえないわ！　もっとこう、正気に戻すとか、色々あるでしょ！」"

[[dialogue]]
speaker = "フィオナ"
# 「確かに手がないとも限りません。しかし、今はそんな試行錯誤をしていられる余裕もないはずです」
line = "「確かに手がないとも限りません。しかし、今はそんな試行錯誤をしていられる余裕もないはずです」"

[[dialogue]]
speaker = "フィオナ"
# 「あの脅威を放置していて民間に被害が及ぶような事態を──教皇庁の一員として看過できません」
line = "「あの脅威を放置していて民間に被害が及ぶような事態を──教皇庁の一員として看過できません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う……な、なんでそんなに、自分に冷たい言い方するのよ……！」
line = "「う……な、なんでそんなに、自分に冷たい言い方するのよ……！」"

[[dialogue]]
speaker = "セーラ"
# 「はあ……フィオナちゃんも、こうなったら頑固なんだから……」
line = "「はあ……フィオナちゃんも、こうなったら頑固なんだから……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううう～～～～違う！　そんなのダメよ、フィオナ！　お姉さんを倒すだなんて間違ってる！」
line = "「ううう～～～～違う！　そんなのダメよ、フィオナ！　お姉さんを倒すだなんて間違ってる！」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさん……なぜあなたが、泣きそうになっているのです」
line = "「ヴィーナスさん……なぜあなたが、泣きそうになっているのです」"

[[dialogue]]
speaker = "フィオナ"
# 「そもそも、彼女を救えるだなんて根拠は、どこにもないじゃないですか──」
line = "「そもそも、彼女を救えるだなんて根拠は、どこにもないじゃないですか──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「根拠なんてないわよ！　でもね、私がダメって言ったらダメなの！　あなたが素直になれないならなおさらね！」
line = "「根拠なんてないわよ！　でもね、私がダメって言ったらダメなの！　あなたが素直になれないならなおさらね！」"

[[dialogue]]
speaker = "フィオナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "クロト"
# 「──俺もヴィーナスに同感だ。学園側の方針は理解しても、まだ手段を探る時間くらいはある」
line = "「──俺もヴィーナスに同感だ。学園側の方針は理解しても、まだ手段を探る時間くらいはある」"

[[dialogue]]
speaker = "unk"
# フィオナの決意は──確かに星徒会長という立場を踏まえれば当然のものだったかもしれない。
line = "フィオナの決意は──確かに星徒会長という立場を踏まえれば当然のものだったかもしれない。"

[[dialogue]]
speaker = "unk"
# しかしそれでも、本当の<b>エリシア</b>の気持ちは、押し殺されているように思えてならなかった。
line = "しかしそれでも、本当の<b>エリシア</b>の気持ちは、押し殺されているように思えてならなかった。"

[[dialogue]]
speaker = "セーラ"
# 「ま、諦めんのは早いよねー。もしかしたら次に会った時は正気になってるかもしんないし？」
line = "「ま、諦めんのは早いよねー。もしかしたら次に会った時は正気になってるかもしんないし？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そ、そうニャよフィオナ嬢。何もそう極端にニャらなくてもいいニャン」
line = "「そ、そうニャよフィオナ嬢。何もそう極端にニャらなくてもいいニャン」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──もっと幸せな結末があるはずだわ。根拠はこれから見つけ出す！」
line = "「──もっと幸せな結末があるはずだわ。根拠はこれから見つけ出す！」"

[[dialogue]]
speaker = "unk"
# そしてヴィーナスは──例の日誌をめくった。
line = "そしてヴィーナスは──例の日誌をめくった。"

[[dialogue]]
speaker = "アナ"
# 「……前会長。その日誌は以前、アポロに一部を書き換えられてしまったはずでは……」
line = "「……前会長。その日誌は以前、アポロに一部を書き換えられてしまったはずでは……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうだけど──でも、魔王に関しては最初から真実がここにあったもの」
line = "「そうだけど──でも、魔王に関しては最初から真実がここにあったもの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私の望む未来のことなら、きっと答えてくれるはずなの……！」
line = "「私の望む未来のことなら、きっと答えてくれるはずなの……！」"

[[dialogue]]
speaker = "unk"
# 一心不乱にページをめくっていくヴィーナス。
line = "一心不乱にページをめくっていくヴィーナス。"

[[dialogue]]
speaker = "unk"
# しかし、そう都合よく期待した記載があるはずもなく……
line = "しかし、そう都合よく期待した記載があるはずもなく……"

[[dialogue]]
speaker = "マトイ"
# 「どうだった……？」
line = "「どうだった……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──今はまだ……昨日のことまでしか書かれてない。けど！」
line = "「──今はまだ……昨日のことまでしか書かれてない。けど！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そのうち道を示してくれるわ。悪いけどみんな、それまで待っていて」
line = "「そのうち道を示してくれるわ。悪いけどみんな、それまで待っていて」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは急いで寝たきりのアポロ──の姿をした少女──のもとへ駆けていき、そっと手を握った。
line = "ヴィーナスは急いで寝たきりのアポロ──の姿をした少女──のもとへ駆けていき、そっと手を握った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「待ってなさい、フィオナのお姉さん。私たちが必ず──あなたを助けてあげるから」
line = "「待ってなさい、フィオナのお姉さん。私たちが必ず──あなたを助けてあげるから」"

[[dialogue]]
speaker = "クロト"
# （ヴィーナス……）
line = "（ヴィーナス……）"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさん……」
line = "「ヴィーナスさん……」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは解散となった。
line = "そうして俺たちは解散となった。"

[[dialogue]]
speaker = "unk"
# 今の複雑な状況を整理するのに、みんな落ち着く時間が必要だった。
line = "今の複雑な状況を整理するのに、みんな落ち着く時間が必要だった。"
