line = "「でも、どこを捜しに行けばいいんでしょうか？」"

[[dialogue]]
speaker = "ルリエル"
# 「片っ端から捜して回るしかないですね……行きましょう！」
line = "「片っ端から捜して回るしかないですね……行きましょう！」"
