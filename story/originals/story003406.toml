line = "「結局、ルリエルたちに丸投げして行ってしまったのです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「でも放置しておくわけにはいかないだろう？　騒ぎを起こす前に捕まえた方がいい」
line = "「でも放置しておくわけにはいかないだろう？　騒ぎを起こす前に捕まえた方がいい」"

[[dialogue]]
speaker = "ステラ"
