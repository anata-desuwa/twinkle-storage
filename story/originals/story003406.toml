[[dialogue]]
speaker = "黒ベア子"
# 「そんな大声で呼ばなくても黒ベア子だくま」
line = "「そんな大声で呼ばなくても黒ベア子だくま」"

[[dialogue]]
speaker = "ルリエル"
# 「ちょっとあなた、これはどういうことなのですか！」
line = "「ちょっとあなた、これはどういうことなのですか！」"

[[dialogue]]
speaker = "黒ベア子"
# 「あらら？　この世界でも何か問題が起きちゃってるくま？」
line = "「あらら？　この世界でも何か問題が起きちゃってるくま？」"

[[dialogue]]
speaker = "ラファエロ"
# 「ということは、別の世界でも問題が起こっているということかな？」
line = "「ということは、別の世界でも問題が起こっているということかな？」"

[[dialogue]]
speaker = "黒ベア子"
# 「そうくま！　問題起きまくりくま！　おかげであちこちの世界を飛び回らなきゃいけなくなってるくま！」
line = "「そうくま！　問題起きまくりくま！　おかげであちこちの世界を飛び回らなきゃいけなくなってるくま！」"

[[dialogue]]
speaker = "unk"
# とりあえず何が起きてるのか教えてくれ
line = "とりあえず何が起きてるのか教えてくれ"

[[dialogue]]
speaker = "黒ベア子"
# 「わかったくま、まず最初に赤ちゃんクマロボのことくま」
line = "「わかったくま、まず最初に赤ちゃんクマロボのことくま」"

[[dialogue]]
speaker = "黒ベア子"
# 「わたしたちは赤ちゃんクマロボのパパを捜して、色んな世界を旅していたくま」
