# 「そうくま！　赤ちゃんクマロボの正体は、クマロボが赤ちゃんの姿に変化したものくま」
line = "「そうくま！　赤ちゃんクマロボの正体は、クマロボが赤ちゃんの姿に変化したものくま」"

[[dialogue]]
speaker = "黒ベア子"
# 「召喚したクマロボたちがいなくなるから変だと思ってたくま。そしたらクマロボが赤ちゃんクマロボに変化してることがわかったんだくま」
line = "「召喚したクマロボたちがいなくなるから変だと思ってたくま。そしたらクマロボが赤ちゃんクマロボに変化してることがわかったんだくま」"

[[dialogue]]
speaker = "黒ベア子"
# 「しかも、ただ変化するだけじゃないくま。赤ちゃんになったクマロボは、恐ろしい力を使っていろんな騒ぎを起こし始めたくま」
line = "「しかも、ただ変化するだけじゃないくま。赤ちゃんになったクマロボは、恐ろしい力を使っていろんな騒ぎを起こし始めたくま」"

[[dialogue]]
speaker = "ステラ"
# 「そ、その恐ろしい力というのは何なんでしょうか……？」
line = "「そ、その恐ろしい力というのは何なんでしょうか……？」"

[[dialogue]]
speaker = "黒ベア子"
# 「ラブリーな姿で相手を『魅了』してしまうくま。その術中にはまった者は、赤ちゃんクマロボを可愛がりたくなったり、お世話したくなったりするくま」
line = "「ラブリーな姿で相手を『魅了』してしまうくま。その術中にはまった者は、赤ちゃんクマロボを可愛がりたくなったり、お世話したくなったりするくま」"

[[dialogue]]
speaker = "ルリエル"
# 「会長さんの言ってた通りなのです……！」
line = "「会長さんの言ってた通りなのです……！」"

[[dialogue]]
speaker = "ステラ"
# 「でもそれほど恐ろしい力、というわけでもないような……」
line = "「でもそれほど恐ろしい力、というわけでもないような……」"

[[dialogue]]
speaker = "黒ベア子"
