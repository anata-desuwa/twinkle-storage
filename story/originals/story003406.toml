[[dialogue]]
speaker = "黒ベア子"
# 「でも、違ったんだくま。赤ちゃんクマロボにパパなんて、最初からいなかったんだくま！」
line = "「でも、違ったんだくま。赤ちゃんクマロボにパパなんて、最初からいなかったんだくま！」"

[[dialogue]]
speaker = "ルリエル"
