line = "「会長さん！　ＤＩＳＣを開いたら、物凄い量の通知が来ているのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「学園の掲示板を通知登録していたのですが、今日になってから『物が消える』事件の報告が、さらに急増しているようなのです！」
line = "「学園の掲示板を通知登録していたのですが、今日になってから『物が消える』事件の報告が、さらに急増しているようなのです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「赤ちゃんクマロボが３匹に増えたから、事件の数も３倍になったとでもいうのかい？」
line = "「赤ちゃんクマロボが３匹に増えたから、事件の数も３倍になったとでもいうのかい？」"

[[dialogue]]
speaker = "unk"
# 書き込み量的には３倍くらいになってる
line = "書き込み量的には３倍くらいになってる"

[[dialogue]]
speaker = "unk"
# 大げさじゃないかも
