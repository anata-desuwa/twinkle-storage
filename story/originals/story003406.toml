line = "赤ちゃんクマロボが何故か２匹に増えたその翌日の朝。"

[[dialogue]]
speaker = "unk"
# いつもの面々で星徒会室に集合すると、ルリエル、ステラ、ラファエロの３人は、１人１匹ずつ赤ちゃんクマロボを抱きかかえていた。
line = "いつもの面々で星徒会室に集合すると、ルリエル、ステラ、ラファエロの３人は、１人１匹ずつ赤ちゃんクマロボを抱きかかえていた。"

[[dialogue]]
speaker = "ルリエル"
# 「まあでも、この子たちが増えてくれたおかげで、１人に１匹、一家に１台、赤ちゃんの取り合いになる心配はなくなったのです♪」
line = "「まあでも、この子たちが増えてくれたおかげで、１人に１匹、一家に１台、赤ちゃんの取り合いになる心配はなくなったのです♪」"

[[dialogue]]
speaker = "ステラ"
# 「そ、それを考えたら、むしろありがたい気もしますねっ」
line = "「そ、それを考えたら、むしろありがたい気もしますねっ」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくたちの願いに、この子が応えてくれたってことかな？」
line = "「ぼくたちの願いに、この子が応えてくれたってことかな？」"

[[dialogue]]
speaker = "unk"
# さすがにおかしい！！！
line = "さすがにおかしい！！！"

[[dialogue]]
speaker = "unk"
# いや、待って！！
line = "いや、待って！！"

[[dialogue]]
speaker = "ルリエル"
# 「はっ！？」
line = "「はっ！？」"

[[dialogue]]
speaker = "ラファエロ"
# 「そ、そうだね……危うく流されるところだったよ」
line = "「そ、そうだね……危うく流されるところだったよ」"

[[dialogue]]
speaker = "ステラ"
# 「どう考えてもおかしいのに、問題ないみたいな気分になっちゃってました……」
line = "「どう考えてもおかしいのに、問題ないみたいな気分になっちゃってました……」"

[[dialogue]]
speaker = "unk"
# 赤ちゃんクマロボを可愛いと思い、お世話したくなるという気持ちを持つことは不思議ではない。
line = "赤ちゃんクマロボを可愛いと思い、お世話したくなるという気持ちを持つことは不思議ではない。"

[[dialogue]]
speaker = "unk"
# けれど父親捜しについていったフィオナも含め、３人のそれはあまりにも過剰なもののように思えた。
line = "けれど父親捜しについていったフィオナも含め、３人のそれはあまりにも過剰なもののように思えた。"

[[dialogue]]
speaker = "ステラ"
# 「か、会長さん……もしかして、この子が犯人だと思ってるんですか？」
line = "「か、会長さん……もしかして、この子が犯人だと思ってるんですか？」"

[[dialogue]]
speaker = "unk"
# 可能性はあると思ってる
line = "可能性はあると思ってる"

[[dialogue]]
speaker = "ルリエル"
