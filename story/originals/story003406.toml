line = "「ええっ！？　さっきまで抱っこしてたはずなのに！」"

[[dialogue]]
speaker = "ラファエロ"
# 「正体がバレてしまったから、逃げ出したのかもしれないね」
line = "「正体がバレてしまったから、逃げ出したのかもしれないね」"

[[dialogue]]
speaker = "黒ベア子"
# 「急いで捕まえるくま！　わたしはこのことを他の世界にも伝えに行かなきゃいけないくま！　だから後は頼んだくま！」
line = "「急いで捕まえるくま！　わたしはこのことを他の世界にも伝えに行かなきゃいけないくま！　だから後は頼んだくま！」"

[[dialogue]]
speaker = "unk"
# なっ！？　ちょっと待て！
line = "なっ！？　ちょっと待て！"

[[dialogue]]
speaker = "unk"
# またしても止める間もなく、黒ベア子は黒い穴の中に消えて行ってしまう。
line = "またしても止める間もなく、黒ベア子は黒い穴の中に消えて行ってしまう。"

[[dialogue]]
speaker = "ルリエル"
