line = "「とんでもないくま！　エスカレートすると赤ちゃんクマロボを巡って大戦争が起こってしまうくま！　早く何とかしないとまずいくま！」"

[[dialogue]]
speaker = "ルリエル"
# 「とっても物騒な能力なのですぅ！？」
line = "「とっても物騒な能力なのですぅ！？」"

[[dialogue]]
speaker = "黒ベア子"
# 「だからこっちの世界でも、赤ちゃんクマロボを捕まえといて欲しいくま！」
line = "「だからこっちの世界でも、赤ちゃんクマロボを捕まえといて欲しいくま！」"

[[dialogue]]
speaker = "ラファエロ"
# 「ああ、心配しなくても、あの子たちのことはちゃんと世話をしているから大丈夫だよ……って、あれ？」
line = "「ああ、心配しなくても、あの子たちのことはちゃんと世話をしているから大丈夫だよ……って、あれ？」"

