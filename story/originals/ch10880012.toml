[[dialogue]]
speaker = "unk"
# 第２話,兄妹らしく……？,P
line = "第２話,兄妹らしく……？,P"

[[dialogue]]
speaker = "unk"
# リーナのことを知るには、俺がもっとリーナのお兄ちゃんらしくならないといけないのかもしれない。
line = "リーナのことを知るには、俺がもっとリーナのお兄ちゃんらしくならないといけないのかもしれない。"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんとお買い物～♪　ふんふふ～ん♪」
line = "「お兄ちゃんとお買い物～♪　ふんふふ～ん♪」"

[[dialogue]]
speaker = "リーナ"
# 「ねぇ、おやつ買っていい？　チョコと～、キャラメルと～、あとウエハースも買ってほしいな。カードがおまけで付いてるんだよ♪」
line = "「ねぇ、おやつ買っていい？　チョコと～、キャラメルと～、あとウエハースも買ってほしいな。カードがおまけで付いてるんだよ♪」"

[[dialogue]]
speaker = "unk"
# お菓子ばっかり食べてちゃダメだよ
line = "お菓子ばっかり食べてちゃダメだよ"

[[dialogue]]
speaker = "リーナ"
# 「は～い」
line = "「は～い」"

[[dialogue]]
speaker = "unk"
# 俺がどうしてリーナと買い物に来たかというと──
line = "俺がどうしてリーナと買い物に来たかというと──"

[[dialogue]]
speaker = "コハルコ"
# 『お姉ちゃんとして妹と何をしてるか？　そうだなぁ……年が離れてるから、一緒に遊んだりはあまりないけど……ご飯作ったり、宿題見てあげたり……』
line = "『お姉ちゃんとして妹と何をしてるか？　そうだなぁ……年が離れてるから、一緒に遊んだりはあまりないけど……ご飯作ったり、宿題見てあげたり……』"

[[dialogue]]
speaker = "コハルコ"
# 『あと、買い物かな。食材とか、日用品とか。そういう普段食べるものや使うものを一緒に買うのって家族っぽい気がするかも』
line = "『あと、買い物かな。食材とか、日用品とか。そういう普段食べるものや使うものを一緒に買うのって家族っぽい気がするかも』"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんは何買うの？　……ご飯の材料？　何作るの？」
line = "「お兄ちゃんは何買うの？　……ご飯の材料？　何作るの？」"

[[dialogue]]
speaker = "リーナ"
# 「……ピーマンの肉詰め？　え～、ピーマン！？　リーナ、ピーマンきら～いっ！」
line = "「……ピーマンの肉詰め？　え～、ピーマン！？　リーナ、ピーマンきら～いっ！」"

[[dialogue]]
speaker = "リーナ"
# 「好き嫌いしちゃダメってわかってるけどぉ～……ピーマンは苦いから嫌いなのっ」
line = "「好き嫌いしちゃダメってわかってるけどぉ～……ピーマンは苦いから嫌いなのっ」"

[[dialogue]]
speaker = "リーナ"
# 「……苦くないピーマンを選ぶから大丈夫？　できるだけ美味しく作る？　お兄ちゃんがそう言うなら、挑戦してみるけど……」
line = "「……苦くないピーマンを選ぶから大丈夫？　できるだけ美味しく作る？　お兄ちゃんがそう言うなら、挑戦してみるけど……」"

[[dialogue]]
speaker = "リーナ"
# 「うぅ……ピーマン嫌いだけど、お兄ちゃんが作ってくれたから、頑張って食べる。あ～……んっ」
line = "「うぅ……ピーマン嫌いだけど、お兄ちゃんが作ってくれたから、頑張って食べる。あ～……んっ」"

[[dialogue]]
speaker = "リーナ"
# 「んんっ……！？　やっぱり苦い……けど、思ったより苦くない、気がする……んくっ」
line = "「んんっ……！？　やっぱり苦い……けど、思ったより苦くない、気がする……んくっ」"

[[dialogue]]
speaker = "リーナ"
# 「これなら我慢して食べられるかも……あむ……あむあむ……ごくん」
line = "「これなら我慢して食べられるかも……あむ……あむあむ……ごくん」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、ピーマン食べられたよっ！」
line = "「お兄ちゃん、ピーマン食べられたよっ！」"

[[dialogue]]
speaker = "unk"
# 偉いぞ、リーナ
line = "偉いぞ、リーナ"

[[dialogue]]
speaker = "リーナ"
# 「えへへへ～♪　ピーマン食べたご褒美に、リーナにナデナデして？」
line = "「えへへへ～♪　ピーマン食べたご褒美に、リーナにナデナデして？」"

[[dialogue]]
speaker = "unk"
# リーナは甘えん坊だな
line = "リーナは甘えん坊だな"

[[dialogue]]
speaker = "リーナ"
# 「そうなの<emoji=heart04>　お兄ちゃんが大好きだからつい甘えちゃうの<emoji=heart04>」
line = "「そうなの<emoji=heart04>　お兄ちゃんが大好きだからつい甘えちゃうの<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
# 「えへへ<emoji=heart04>　お兄ちゃんにナデナデされるの好き～<emoji=heart04>」
line = "「えへへ<emoji=heart04>　お兄ちゃんにナデナデされるの好き～<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
# 「リーナはお兄ちゃん好き……スキ……ダイスキ……」
line = "「リーナはお兄ちゃん好き……スキ……ダイスキ……」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん……リーナの、お兄ちゃん……」
line = "「お兄ちゃん……リーナの、お兄ちゃん……」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん……嫌い……いらない……」
line = "「お兄ちゃん……嫌い……いらない……」"

[[dialogue]]
speaker = "unk"
# リーナ……？
line = "リーナ……？"

[[dialogue]]
speaker = "リーナ"
# 「──ッ！？　お兄ちゃんっ！？　リーナ、今、何しようとして……？」
line = "「──ッ！？　お兄ちゃんっ！？　リーナ、今、何しようとして……？」"

[[dialogue]]
speaker = "リーナ"
# 「どうして……なんだろう……？　お兄ちゃんのこと大好きなはずなのに、胸の奥がズキズキするよ……」
line = "「どうして……なんだろう……？　お兄ちゃんのこと大好きなはずなのに、胸の奥がズキズキするよ……」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんのこと好きって思えば思うほど、何もかもズタズタにしたくなるの……」
line = "「お兄ちゃんのこと好きって思えば思うほど、何もかもズタズタにしたくなるの……」"

[[dialogue]]
speaker = "unk"
# 今はおやつを食べよう
line = "今はおやつを食べよう"

[[dialogue]]
speaker = "リーナ"
# 「！　そうだ、おやつもあるんだった！　お兄ちゃんも一緒に食べようねっ」
line = "「！　そうだ、おやつもあるんだった！　お兄ちゃんも一緒に食べようねっ」"

[[dialogue]]
speaker = "リーナ"
# 「おやつ食べたらゲームしよっ。リーナ負けないんだからっ」
line = "「おやつ食べたらゲームしよっ。リーナ負けないんだからっ」"

[[dialogue]]
speaker = "リーナ"
# 「んん……すぅ……ムニャムニャ……」
line = "「んん……すぅ……ムニャムニャ……」"

[[dialogue]]
speaker = "シアン"
# 「よう、邪魔するぜ──おわっと！？　どうしてリーナがあんたんちにいるんだよ！？」
line = "「よう、邪魔するぜ──おわっと！？　どうしてリーナがあんたんちにいるんだよ！？」"

[[dialogue]]
speaker = "リーナ"
# 「ん～……ムニャ……お兄ちゃん……」
line = "「ん～……ムニャ……お兄ちゃん……」"

[[dialogue]]
speaker = "シアン"
# 「すやすや寝てやがる。導火線に火のついた爆弾抱えてる気分だぜ……」
line = "「すやすや寝てやがる。導火線に火のついた爆弾抱えてる気分だぜ……」"

[[dialogue]]
speaker = "シアン"
# 「まぁいいや。リーナについてわかったことだが、会長さんにも共有しておくべきだと思ってな」
line = "「まぁいいや。リーナについてわかったことだが、会長さんにも共有しておくべきだと思ってな」"

[[dialogue]]
speaker = "シアン"
# 「まずリーナの名前だが……最初は偽名かと思ったんだが、普通に本名だった。おかげで調査するのは苦労しなかった。後味は悪かったがな」
line = "「まずリーナの名前だが……最初は偽名かと思ったんだが、普通に本名だった。おかげで調査するのは苦労しなかった。後味は悪かったがな」"

[[dialogue]]
speaker = "シアン"
# 「<ruby=ひづき>火憑</ruby>リーナ。生まれは流星市国からも遠くない場所で、会社員の父とパート勤めの母の間に生まれた、ごくごく普通の女の子だ」
line = "「<ruby>火憑<rt>ひづき</rt></ruby>リーナ。生まれは流星市国からも遠くない場所で、会社員の父とパート勤めの母の間に生まれた、ごくごく普通の女の子だ」"

[[dialogue]]
speaker = "シアン"
# 「けどな、リーナには本当に兄貴がいたんだ。リーナが生まれる前に死んじまったがな」
line = "「けどな、リーナには本当に兄貴がいたんだ。リーナが生まれる前に死んじまったがな」"

[[dialogue]]
speaker = "シアン"
# 「リーナの兄は幼くして重い病を患い、長い闘病生活も実らず亡くなった。その後に生まれたのがリーナだ」
line = "「リーナの兄は幼くして重い病を患い、長い闘病生活も実らず亡くなった。その後に生まれたのがリーナだ」"

[[dialogue]]
speaker = "シアン"
# 「だから両親はいつもリーナに言っていたそうだ。『本当はお兄ちゃんがいたんだよ』って」
line = "「だから両親はいつもリーナに言っていたそうだ。『本当はお兄ちゃんがいたんだよ』って」"

[[dialogue]]
speaker = "シアン"
# 「『お兄ちゃんが天国から見守ってくれてる』『お兄ちゃんと違ってリーナは健康でよかった』とか、何かにつけて“お兄ちゃん”が出てくるんだ」
line = "「『お兄ちゃんが天国から見守ってくれてる』『お兄ちゃんと違ってリーナは健康でよかった』とか、何かにつけて“お兄ちゃん”が出てくるんだ」"

[[dialogue]]
speaker = "シアン"
# 「要するに、リーナの両親は兄のことをふっ切れてなかったんだろうな。写真でしか兄のことを知らないリーナにとっちゃ重荷だろうよ」
line = "「要するに、リーナの両親は兄のことをふっ切れてなかったんだろうな。写真でしか兄のことを知らないリーナにとっちゃ重荷だろうよ」"

[[dialogue]]
speaker = "シアン"
# 「自分を見ないで、死んだ兄貴にずっと執着する両親……まぁちょっとした呪いだな。そりゃ歪むっての」
line = "「自分を見ないで、死んだ兄貴にずっと執着する両親……まぁちょっとした呪いだな。そりゃ歪むっての」"

[[dialogue]]
speaker = "unk"
# リーナの両親は……？
line = "リーナの両親は……？"

[[dialogue]]
speaker = "シアン"
# 「死んでる」
line = "「死んでる」"

[[dialogue]]
speaker = "シアン"
# 「交通事故だってよ。リーナも一緒に死んだとみられていたが、遺体は見つからず……」
line = "「交通事故だってよ。リーナも一緒に死んだとみられていたが、遺体は見つからず……」"

[[dialogue]]
speaker = "シアン"
# 「そして、あたしたちの前にコラプサーとして姿を現したってわけだ。あたしが調べられたのはそこまでだ」
line = "「そして、あたしたちの前にコラプサーとして姿を現したってわけだ。あたしが調べられたのはそこまでだ」"

[[dialogue]]
speaker = "シアン"
# 「コラプサーとか関係なくリーナには気を付けろ。リーナは“お兄ちゃん”って存在を恨んでるかもしれねえ」
line = "「コラプサーとか関係なくリーナには気を付けろ。リーナは“お兄ちゃん”って存在を恨んでるかもしれねえ」"

[[dialogue]]
speaker = "シアン"
# 「それがどうして今のお兄ちゃん大好きっ娘になってるかは、あたしも知らねえがな」
line = "「それがどうして今のお兄ちゃん大好きっ娘になってるかは、あたしも知らねえがな」"

[[dialogue]]
speaker = "シアン"
# 「あたしがしてやれるのはここまでだ。じゃあな」
line = "「あたしがしてやれるのはここまでだ。じゃあな」"

[[dialogue]]
speaker = "リーナ"
# 「ん～……誰かいたの……？」
line = "「ん～……誰かいたの……？」"

[[dialogue]]
speaker = "リーナ"
# 「でもどうでもいいや。リーナにはお兄ちゃんがいるんだから」
line = "「でもどうでもいいや。リーナにはお兄ちゃんがいるんだから」"

[[dialogue]]
speaker = "リーナ"
# 「リーナはお兄ちゃん以外いらないの。だから──」
line = "「リーナはお兄ちゃん以外いらないの。だから──」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんはずっとリーナのお兄ちゃんでいてね……？」
line = "「お兄ちゃんはずっとリーナのお兄ちゃんでいてね……？」"
