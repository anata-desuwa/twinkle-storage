[[dialogue]]
speaker = "unk"
# 第５話,デネブのクロトとテルル,B
line = "第５話,デネブのクロトとテルル,B"

[[dialogue]]
speaker = "unk"
# グレイス・オベロニアは、魔界の妖精の森で生を受けた。
line = "グレイス・オベロニアは、魔界の妖精の森で生を受けた。"

[[dialogue]]
speaker = "unk"
# 両親は星騎士であり、大交流の人員にも抜擢されるほどのエリート。幼いグレイスは、両親についていく形で人間界へとやってきた。
line = "両親は星騎士であり、大交流の人員にも抜擢されるほどのエリート。幼いグレイスは、両親についていく形で人間界へとやってきた。"

[[dialogue]]
speaker = "unk"
# 人間と天使と魔族が共生し、多種多様な文化を形成している人間界に、グレイスはすぐ馴染んだ。
line = "人間と天使と魔族が共生し、多種多様な文化を形成している人間界に、グレイスはすぐ馴染んだ。"

[[dialogue]]
speaker = "unk"
# そうして人間界に来て２年ほどが過ぎた頃──グレイスはかねてよりの疑問を両親にぶつけた。
line = "そうして人間界に来て２年ほどが過ぎた頃──グレイスはかねてよりの疑問を両親にぶつけた。"

[[dialogue]]
speaker = "グレイス"
# 「あの、お父さん。お母さん。今日、友達とお話をしたんです……」
line = "「あの、お父さん。お母さん。今日、友達とお話をしたんです……」"

[[dialogue]]
speaker = "グレイス"
# 「みんな、魔王さんは悪者だって言うんです。太陽の壁画にもそう描いてあるよって……」
line = "「みんな、魔王さんは悪者だって言うんです。太陽の壁画にもそう描いてあるよって……」"

[[dialogue]]
speaker = "グレイス"
# 「でも森の長老さんたちは、魔王さんは悪い人じゃないって言ってました。どっちが本当なんでしょうか？」
line = "「でも森の長老さんたちは、魔王さんは悪い人じゃないって言ってました。どっちが本当なんでしょうか？」"

[[dialogue]]
speaker = "unk"
# 妖精の森の一族は長命ゆえに、多くの情報が口伝されていた。
line = "妖精の森の一族は長命ゆえに、多くの情報が口伝されていた。"

[[dialogue]]
speaker = "unk"
# だから幼いグレイスにとって、人間界の魔王観は違和感のあるものだったのだ。
line = "だから幼いグレイスにとって、人間界の魔王観は違和感のあるものだったのだ。"

[[dialogue]]
speaker = "グレイス"
# 「……え？　長老さんたちはどう言ってたか、ですか？　……ええっと」
line = "「……え？　長老さんたちはどう言ってたか、ですか？　……ええっと」"

[[dialogue]]
speaker = "グレイス"
# 「『曇りなき<ruby=まなこ>眼</ruby>で、真実を見定めなさい』って言ってました！」
line = "「『曇りなき<ruby>眼<rt>まなこ</rt></ruby>で、真実を見定めなさい』って言ってました！」"

[[dialogue]]
speaker = "unk"
# グレイスの両親は、娘に自分で考えさせる教育方針をとる人達だった。
line = "グレイスの両親は、娘に自分で考えさせる教育方針をとる人達だった。"

[[dialogue]]
speaker = "unk"
# 故にグレイスは──行動を起こした。
line = "故にグレイスは──行動を起こした。"

[[dialogue]]
speaker = "グレイス"
# 「潜入作戦、開始です！」
line = "「潜入作戦、開始です！」"

[[dialogue]]
speaker = "unk"
# いつも通っている学園で仮病を使って早退──その足で新星学園までやってきたグレイス。
line = "いつも通っている学園で仮病を使って早退──その足で新星学園までやってきたグレイス。"

[[dialogue]]
speaker = "unk"
# このまま学園内に侵入し、本物の魔王に会う。そして真偽を問い質すのだ。
line = "このまま学園内に侵入し、本物の魔王に会う。そして真偽を問い質すのだ。"

[[dialogue]]
speaker = "グレイス"
# 「こそこそ……こそこそ……！」
line = "「こそこそ……こそこそ……！」"

[[dialogue]]
speaker = "unk"
# 学園内は星騎士のお姉さんたちがたくさん。見つからないようにしていたグレイスだったが──
line = "学園内は星騎士のお姉さんたちがたくさん。見つからないようにしていたグレイスだったが──"

[[dialogue]]
speaker = "グレイス"
# 「おいしそう……」
line = "「おいしそう……」"

[[dialogue]]
speaker = "unk"
# 昼食も食べずに潜入作戦を実行していたグレイスは、お腹がぺこぺこだった。
line = "昼食も食べずに潜入作戦を実行していたグレイスは、お腹がぺこぺこだった。"

[[dialogue]]
speaker = "unk"
# そのまま、食事中の１人の女生徒の元へ吸い寄せられていき……
line = "そのまま、食事中の１人の女生徒の元へ吸い寄せられていき……"

[[dialogue]]
speaker = "女子生徒"
# 「……ん～。おいしい！　午後も訓練あるし、しっかり補給しておかないとね！」
line = "「……ん～。おいしい！　午後も訓練あるし、しっかり補給しておかないとね！」"

[[dialogue]]
speaker = "グレイス"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "女子生徒"
# 「──んぐっ！？　あ、あれっ。こんな小さい子が……迷子？」
line = "「──んぐっ！？　あ、あれっ。こんな小さい子が……迷子？」"

[[dialogue]]
speaker = "女子生徒"
# 「ねえ、どうかしたの？　何か困ってることがあったらお姉さんに──」
line = "「ねえ、どうかしたの？　何か困ってることがあったらお姉さんに──」"

[[dialogue]]
speaker = "グレイス"
# 「おなか……ぺこぺこです……！」
line = "「おなか……ぺこぺこです……！」"

[[dialogue]]
speaker = "女子生徒"
# 「ええっ……？　あ、じゃあ……これ、食べる……？」
line = "「ええっ……？　あ、じゃあ……これ、食べる……？」"

[[dialogue]]
speaker = "グレイス"
# 「いいんですか！？　嬉しいです～！」
line = "「いいんですか！？　嬉しいです～！」"

[[dialogue]]
speaker = "unk"
# グレイスは潜入中に協力者を得た。
line = "グレイスは潜入中に協力者を得た。"

[[dialogue]]
speaker = "unk"
# 彼女の名前は、<ruby=よみの>詠野</ruby>マトイ。なんと新星星徒会の役員だという。
line = "彼女の名前は、<ruby>詠野<rt>よみの</rt></ruby>マトイ。なんと新星星徒会の役員だという。"

[[dialogue]]
speaker = "unk"
# マトイは優しかった。頭ごなしに叱ったり、怖い大人に言いつけたりしないマトイに、グレイスはあっという間に懐いた。
line = "マトイは優しかった。頭ごなしに叱ったり、怖い大人に言いつけたりしないマトイに、グレイスはあっという間に懐いた。"

[[dialogue]]
speaker = "グレイス"
# 「マトイお姉さん！　あのおっきな建物は何ですか！？」
line = "「マトイお姉さん！　あのおっきな建物は何ですか！？」"

[[dialogue]]
speaker = "マトイ"
# 「ああ。あれはアリーナだね。星騎士同士の大事な試合とか、運動会とか、大きな出し物をする時に使うの。あの……グレイスちゃん、そろそろ……」
line = "「ああ。あれはアリーナだね。星騎士同士の大事な試合とか、運動会とか、大きな出し物をする時に使うの。あの……グレイスちゃん、そろそろ……」"

[[dialogue]]
speaker = "グレイス"
# 「あっちの人達は！？　すごく大きな武器を持っています！」
line = "「あっちの人達は！？　すごく大きな武器を持っています！」"

[[dialogue]]
speaker = "マトイ"
# 「あれは薙刀部だよ。うちは部活動もたくさんあるから……その、いい加減、お外に……」
line = "「あれは薙刀部だよ。うちは部活動もたくさんあるから……その、いい加減、お外に……」"

[[dialogue]]
speaker = "グレイス"
# 「くんくん！　あっちの方からいい匂いがします！　ぴゅー！」
line = "「くんくん！　あっちの方からいい匂いがします！　ぴゅー！」"

[[dialogue]]
speaker = "マトイ"
# 「ああっ。待って待って、じっとして～……！！」
line = "「ああっ。待って待って、じっとして～……！！」"

[[dialogue]]
speaker = "unk"
# 星騎士の通う学び舎はどこもかしこも新鮮で、グレイスは気になることを見つけてはマトイに質問をして、学園中を引っ張りまわし──
line = "星騎士の通う学び舎はどこもかしこも新鮮で、グレイスは気になることを見つけてはマトイに質問をして、学園中を引っ張りまわし──"

[[dialogue]]
speaker = "マトイ"
# 「お、お疲れ様～……」
line = "「お、お疲れ様～……」"

[[dialogue]]
speaker = "女子生徒"
# 「お疲れ～──って！？　マトイ、どうしたのっ？　くたくたのボロボロじゃない！？」
line = "「お疲れ～──って！？　マトイ、どうしたのっ？　くたくたのボロボロじゃない！？」"

[[dialogue]]
speaker = "マトイ"
# 「ご、ごめんテルル……この子、学園に勝手に入ってきちゃってるんだ。それで、うちの会長に会いたいって聞かなくて……」
line = "「ご、ごめんテルル……この子、学園に勝手に入ってきちゃってるんだ。それで、うちの会長に会いたいって聞かなくて……」"

[[dialogue]]
speaker = "マトイ"
# 「小さい子のお世話って大変なんだね……私、もうへとへとだよ……後はお願い……」
line = "「小さい子のお世話って大変なんだね……私、もうへとへとだよ……後はお願い……」"

[[dialogue]]
speaker = "マトイ"
# 「──がくっ」
line = "「──がくっ」"

[[dialogue]]
speaker = "テルル"
# 「うちのマトイをここまで弱らせるだなんて……なかなかやるみたいね！　名前を教えなさい！」
line = "「うちのマトイをここまで弱らせるだなんて……なかなかやるみたいね！　名前を教えなさい！」"

[[dialogue]]
speaker = "グレイス"
# 「こんにちは！　グレイス・オベロニアです！！」
line = "「こんにちは！　グレイス・オベロニアです！！」"

[[dialogue]]
speaker = "テルル"
# 「元気な子ね！　私は新星学園星徒会のアルティメットフィクサー……九浄テルルよ！」
line = "「元気な子ね！　私は新星学園星徒会のアルティメットフィクサー……九浄テルルよ！」"

[[dialogue]]
speaker = "グレイス"
# 「アルティメットフィクサー……！？　あ、あやしい肩書きですっ。やっぱり魔王さんの正体を確かめに来て正解でした……！」
line = "「アルティメットフィクサー……！？　あ、あやしい肩書きですっ。やっぱり魔王さんの正体を確かめに来て正解でした……！」"

[[dialogue]]
speaker = "テルル"
# 「確かめに……？　ふっふーん♪　うちのクロトを見定めに来たってわけね？　受けて立つわ！！」
line = "「確かめに……？　ふっふーん♪　うちのクロトを見定めに来たってわけね？　受けて立つわ！！」"

[[dialogue]]
speaker = "？？？"
# 「ずいぶん賑やかだな……テルル、どうかしたのか？」
line = "「ずいぶん賑やかだな……テルル、どうかしたのか？」"

[[dialogue]]
speaker = "グレイス"
# 「──っ！」
line = "「──っ！」"

[[dialogue]]
speaker = "テルル"
# 「あっ、クロト！　あなたにお客さんよ！」
line = "「あっ、クロト！　あなたにお客さんよ！」"

[[dialogue]]
speaker = "unk"
# 先ほどグレイスがくぐった扉の方向から、男の人の声がした。どうやら魔王が──緋宮クロトが帰って来たらしい。
line = "先ほどグレイスがくぐった扉の方向から、男の人の声がした。どうやら魔王が──緋宮クロトが帰って来たらしい。"

[[dialogue]]
speaker = "unk"
# いったいどんな人なのだろう。怖い人だろうか。いい加減な人だろうか──グレイスは意を決して振り向いた。
line = "いったいどんな人なのだろう。怖い人だろうか。いい加減な人だろうか──グレイスは意を決して振り向いた。"

[[dialogue]]
speaker = "クロト"
# 「ずいぶん可愛らしいお客さんだね。こんにちは」
line = "「ずいぶん可愛らしいお客さんだね。こんにちは」"

[[dialogue]]
speaker = "グレイス"
# 「……………………」
line = "「……………………」"

[[dialogue]]
speaker = "unk"
# 第一印象は、『思っていたのと違う』だった。
line = "第一印象は、『思っていたのと違う』だった。"

[[dialogue]]
speaker = "unk"
# 魔王というくらいだから、もっと強そうで、怖そうで、偉そうで、悪の親玉みたいな顔をしているとばかり。
line = "魔王というくらいだから、もっと強そうで、怖そうで、偉そうで、悪の親玉みたいな顔をしているとばかり。"

[[dialogue]]
speaker = "unk"
# 太陽の壁画で言い伝えられている悪者とは到底思えない、優しそうなお兄さんだった。
line = "太陽の壁画で言い伝えられている悪者とは到底思えない、優しそうなお兄さんだった。"

[[dialogue]]
speaker = "クロト"
# 「テルル。今日って何か用事が入ってたかな？　教皇庁の、子ども会の見学とか……」
line = "「テルル。今日って何か用事が入ってたかな？　教皇庁の、子ども会の見学とか……」"

[[dialogue]]
speaker = "テルル"
# 「ううん。あなたに会いたくて、学園に侵入したんですって。マトイが振り回されちゃって……」
line = "「ううん。あなたに会いたくて、学園に侵入したんですって。マトイが振り回されちゃって……」"

[[dialogue]]
speaker = "マトイ"
# 「きゅぅ…………」
line = "「きゅぅ…………」"

[[dialogue]]
speaker = "クロト"
# 「あ、ホントだ。ぐったりしてる」
line = "「あ、ホントだ。ぐったりしてる」"

[[dialogue]]
speaker = "クロト"
# 「そっか。こっそり入ってまで、俺に会いに来てくれたんだ？　じゃあ、自己紹介をしないとね」
line = "「そっか。こっそり入ってまで、俺に会いに来てくれたんだ？　じゃあ、自己紹介をしないとね」"

[[dialogue]]
speaker = "クロト"
# 「初めまして、緋宮クロトです。君の名前は？」
line = "「初めまして、緋宮クロトです。君の名前は？」"

[[dialogue]]
speaker = "グレイス"
# 「グレイス・オベロニアです！　ようやく会えましたね、魔王さん！」
line = "「グレイス・オベロニアです！　ようやく会えましたね、魔王さん！」"

[[dialogue]]
speaker = "グレイス"
# 「私、曇りなき眼で、あなたを見定めに来たんです！」
line = "「私、曇りなき眼で、あなたを見定めに来たんです！」"

[[dialogue]]
speaker = "グレイス"
# 「巷では魔王は悪者だって言われてますよね！？　どうなんですか、緋宮クロトさん！」
line = "「巷では魔王は悪者だって言われてますよね！？　どうなんですか、緋宮クロトさん！」"

[[dialogue]]
speaker = "グレイス"
# 「私、あなたが本当に悪者なのか──確かめに来ました！」
line = "「私、あなたが本当に悪者なのか──確かめに来ました！」"

[[dialogue]]
speaker = "クロト"
# 「はは……直球に聞いてくる子だな。それを聞くためだけに、学園に無断で入って来たのかな？」
line = "「はは……直球に聞いてくる子だな。それを聞くためだけに、学園に無断で入って来たのかな？」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　潜入捜査です！　それで、どうなんですか！？」
line = "「はい！　潜入捜査です！　それで、どうなんですか！？」"

[[dialogue]]
speaker = "クロト"
# 「元気な子だなあ……」
line = "「元気な子だなあ……」"

[[dialogue]]
speaker = "unk"
# 緋宮クロトはわざわざしゃがんで、グレイスと目の高さを合わせて──そして頭をなでてくれた。
line = "緋宮クロトはわざわざしゃがんで、グレイスと目の高さを合わせて──そして頭をなでてくれた。"

[[dialogue]]
speaker = "グレイス"
# 「…………あ」
line = "「…………あ」"

[[dialogue]]
speaker = "unk"
# 温かくて、優しくて、胸が温かくなる手のひら。
line = "温かくて、優しくて、胸が温かくなる手のひら。"

[[dialogue]]
speaker = "クロト"
# 「俺は魔王だけど、悪者じゃないよ。君や、この世界に住むみんなを守りたいと思ってる」
line = "「俺は魔王だけど、悪者じゃないよ。君や、この世界に住むみんなを守りたいと思ってる」"

[[dialogue]]
speaker = "グレイス"
# 「魔王さんが世界を守ってくれるんですか？　本当に？　私のお父さんも、お母さんも、友達も……みんなですか？」
line = "「魔王さんが世界を守ってくれるんですか？　本当に？　私のお父さんも、お母さんも、友達も……みんなですか？」"

[[dialogue]]
speaker = "クロト"
# 「うん、もちろん守るよ。危ない目に遭っている人を助けるのが星騎士だからね」
line = "「うん、もちろん守るよ。危ない目に遭っている人を助けるのが星騎士だからね」"

[[dialogue]]
speaker = "unk"
# ──多くの言葉がなくてもわかることがある。
line = "──多くの言葉がなくてもわかることがある。"

[[dialogue]]
speaker = "unk"
# この人は嘘を吐いていない。子供が相手だからと適当な返答もしていない。
line = "この人は嘘を吐いていない。子供が相手だからと適当な返答もしていない。"

[[dialogue]]
speaker = "クロト"
# 「──そうだ。せっかくだし約束しようか。指きりだ」
line = "「──そうだ。せっかくだし約束しようか。指きりだ」"

[[dialogue]]
speaker = "グレイス"
# 「……ゆびきり？」
line = "「……ゆびきり？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、魔界にはないのかな？　人間界には、指切りっていう風習があるんだよ」
line = "「ああ、魔界にはないのかな？　人間界には、指切りっていう風習があるんだよ」"

[[dialogue]]
speaker = "unk"
# ２年ほど人間界で過ごしてはいたが、知らない文化はまだまだある。グレイスは利き手を伸ばして、緋宮クロトを真似て小指を絡めた。
line = "２年ほど人間界で過ごしてはいたが、知らない文化はまだまだある。グレイスは利き手を伸ばして、緋宮クロトを真似て小指を絡めた。"

[[dialogue]]
speaker = "クロト"
# 「約束だ。君の家族も、友達も──もちろんグレイス、君自身も。俺が必ず守ってみせるよ」
line = "「約束だ。君の家族も、友達も──もちろんグレイス、君自身も。俺が必ず守ってみせるよ」"

[[dialogue]]
speaker = "クロト"
# 「嘘ついたら針千本のーます……はい、指切った」
line = "「嘘ついたら針千本のーます……はい、指切った」"

[[dialogue]]
speaker = "unk"
# 指を切ったあとも、グレイスは自分の小指を見つめた。じんわりと残る、魔王クロトの約束の温かさを、噛みしめた。
line = "指を切ったあとも、グレイスは自分の小指を見つめた。じんわりと残る、魔王クロトの約束の温かさを、噛みしめた。"

[[dialogue]]
speaker = "グレイス"
# （ゆびきり……やくそく……）
line = "（ゆびきり……やくそく……）"

[[dialogue]]
speaker = "グレイス"
# （あれれ……？　私、なんだか、変です……）
line = "（あれれ……？　私、なんだか、変です……）"

[[dialogue]]
speaker = "unk"
# 頬が熱い。心臓がどきどきする。
line = "頬が熱い。心臓がどきどきする。"

[[dialogue]]
speaker = "unk"
# なんだか落ち着かないのに、決してイヤではない、不思議な感覚が胸の内に広がる──
line = "なんだか落ち着かないのに、決してイヤではない、不思議な感覚が胸の内に広がる──"

[[dialogue]]
speaker = "クロト"
# 「そういえばテルル。体の調子は大丈夫か？」
line = "「そういえばテルル。体の調子は大丈夫か？」"

[[dialogue]]
speaker = "テルル"
# 「もう。クロトは心配しすぎ！　いつもどおり、元気いっぱいよ♪」
line = "「もう。クロトは心配しすぎ！　いつもどおり、元気いっぱいよ♪」"

[[dialogue]]
speaker = "クロト"
# 「心配しすぎってことはないだろ？　俺たち２人のことなんだし」
line = "「心配しすぎってことはないだろ？　俺たち２人のことなんだし」"

[[dialogue]]
speaker = "テルル"
# 「……うん。ありがとっ」
line = "「……うん。ありがとっ」"

[[dialogue]]
speaker = "グレイス"
# （──あれれ？　今度は、胸のチリチリが、ちょっと嫌な感じになりました……？）
line = "（──あれれ？　今度は、胸のチリチリが、ちょっと嫌な感じになりました……？）"

[[dialogue]]
speaker = "unk"
# クロトとテルルが話しているところを見ると、何だかもやもやする。
line = "クロトとテルルが話しているところを見ると、何だかもやもやする。"

[[dialogue]]
speaker = "unk"
# ２人の間の空気が、何かに似ている──
line = "２人の間の空気が、何かに似ている──"

[[dialogue]]
speaker = "グレイス"
# （……お父さんと、お母さん。２人の雰囲気に、そっくり）
line = "（……お父さんと、お母さん。２人の雰囲気に、そっくり）"

[[dialogue]]
speaker = "テルル"
# 「でもこれで、グレイスが聞きたかったことは聞けたかしら？」
line = "「でもこれで、グレイスが聞きたかったことは聞けたかしら？」"

[[dialogue]]
speaker = "グレイス"
# 「えっと……その……」
line = "「えっと……その……」"

[[dialogue]]
speaker = "テルル"
# 「なんでも聞いてくれていいわよ！　どんなことでもフィクサーが答えて──」
line = "「なんでも聞いてくれていいわよ！　どんなことでもフィクサーが答えて──」"

[[dialogue]]
speaker = "グレイス"
# 「……お２人は、ケッコンしているんですか？」
line = "「……お２人は、ケッコンしているんですか？」"

[[dialogue]]
speaker = "テルル"
# 「へっ──！？」
line = "「へっ──！？」"

[[dialogue]]
speaker = "クロト"
# 「ぶっ──！？」
line = "「ぶっ──！？」"

[[dialogue]]
speaker = "テルル"
# 「いきなり何を言うかと思えば……！　最近の子って案外マセてるのね！？」
line = "「いきなり何を言うかと思えば……！　最近の子って案外マセてるのね！？」"

[[dialogue]]
speaker = "女子生徒"
# 「あら～？　何だかコイバナの雰囲気～♪」
line = "「あら～？　何だかコイバナの雰囲気～♪」"

[[dialogue]]
speaker = "テルル"
# 「サーシャさん！？　ベ、別にコイバナなんて──」
line = "「サーシャさん！？　ベ、別にコイバナなんて──」"

[[dialogue]]
speaker = "女子生徒"
# 「隠さなくてもいいのでは？　今まで気づかないふりしていましたが、まあデキてるだろうなとは思ってましたので」
line = "「隠さなくてもいいのでは？　今まで気づかないふりしていましたが、まあデキてるだろうなとは思ってましたので」"

[[dialogue]]
speaker = "テルル"
# 「アナまで！？　えっ……そんなにバレバレ！？」
line = "「アナまで！？　えっ……そんなにバレバレ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろんよ～♪　うふふ、いっそのこと今からお祝いしちゃう？　可愛いお客さんもいることだし♪」
line = "「もちろんよ～♪　うふふ、いっそのこと今からお祝いしちゃう？　可愛いお客さんもいることだし♪」"

[[dialogue]]
speaker = "アナ"
# 「いいですね。会長のおごりで、レッツパーティー」
line = "「いいですね。会長のおごりで、レッツパーティー」"

[[dialogue]]
speaker = "クロト"
# 「えええっ！？　なんでだ！？」
line = "「えええっ！？　なんでだ！？」"

[[dialogue]]
speaker = "マトイ"
# 「──待って！　私もお祝いしたい！！」
line = "「──待って！　私もお祝いしたい！！」"

[[dialogue]]
speaker = "クロト"
# 「うわっ復活した！？」
line = "「うわっ復活した！？」"

[[dialogue]]
speaker = "unk"
# 楽しく、賑やかな新星星徒会。
line = "楽しく、賑やかな新星星徒会。"

[[dialogue]]
speaker = "unk"
# 彼らと話をしたのはその１日だけだったが、グレイスにとっては忘れがたい、とても大切な日になった。
line = "彼らと話をしたのはその１日だけだったが、グレイスにとっては忘れがたい、とても大切な日になった。"

[[dialogue]]
speaker = "unk"
# その後、両手いっぱいのお菓子をお土産に持たされて、ほくほく顔で帰宅したグレイスは、こんこんと両親にお説教をされるハメになったのだが……
line = "その後、両手いっぱいのお菓子をお土産に持たされて、ほくほく顔で帰宅したグレイスは、こんこんと両親にお説教をされるハメになったのだが……"

[[dialogue]]
speaker = "グレイス"
# （あとから思えば、私はあの日。初恋と失恋を同時にしたのだと思います）
line = "（あとから思えば、私はあの日。初恋と失恋を同時にしたのだと思います）"

[[dialogue]]
speaker = "グレイス"
# （それでもよかった。それだけなら、苦いけれど淡い思い出ですんだのに）
line = "（それでもよかった。それだけなら、苦いけれど淡い思い出ですんだのに）"

[[dialogue]]
speaker = "グレイス"
# （あの出会いから数ヶ月後、ニュクス流星群が起きて……私の両親も、新星星徒会のみなさんも、全員が亡くなって……）
line = "（あの出会いから数ヶ月後、ニュクス流星群が起きて……私の両親も、新星星徒会のみなさんも、全員が亡くなって……）"

[[dialogue]]
speaker = "unk"
# そして、緋宮クロトはデネブを見捨てた卑怯者だと教えられた。
line = "そして、緋宮クロトはデネブを見捨てた卑怯者だと教えられた。"

[[dialogue]]
speaker = "unk"
# 我が身可愛さにすべてを見捨てた恥知らず。外道。人でなし。皆が口をそろえて緋宮クロトを糾弾するたび、グレイスは違うと言い続けた。
line = "我が身可愛さにすべてを見捨てた恥知らず。外道。人でなし。皆が口をそろえて緋宮クロトを糾弾するたび、グレイスは違うと言い続けた。"

[[dialogue]]
speaker = "unk"
# けれどその意地も、両親の亡骸を見つけた時に、張れなくなり──
line = "けれどその意地も、両親の亡骸を見つけた時に、張れなくなり──"

[[dialogue]]
speaker = "グレイス"
# （初恋の人に幻滅するだなんていう、もっと嫌な経験もして……これはクロトさんにもヴィーナスさんにも教えられない。私だけの秘密です）
line = "（初恋の人に幻滅するだなんていう、もっと嫌な経験もして……これはクロトさんにもヴィーナスさんにも教えられない。私だけの秘密です）"
