[[dialogue]]
speaker = "unk"
# 第２話,美化委員ナミエル,P
line = "第２話,美化委員ナミエル,P"

[[dialogue]]
speaker = "unk"
# 今日も無事にモンスター討伐の役目を果たし、あとは家に帰って休むだけ──
line = "今日も無事にモンスター討伐の役目を果たし、あとは家に帰って休むだけ──"

[[dialogue]]
speaker = "unk"
# だったのだが、モンスターがいなくなった後の戦場で、複数人の女生徒たちが集まっているのを見つけた。
line = "だったのだが、モンスターがいなくなった後の戦場で、複数人の女生徒たちが集まっているのを見つけた。"

[[dialogue]]
speaker = "ナミエル"
# 「付近の破損状況、確認終わりました。なかなかに激しい戦闘だったようですね」
line = "「付近の破損状況、確認終わりました。なかなかに激しい戦闘だったようですね」"

[[dialogue]]
speaker = "ナミエル"
# 「あちらの大通りは瓦礫が多いので、人数を割いた方が良いかと思います」
line = "「あちらの大通りは瓦礫が多いので、人数を割いた方が良いかと思います」"

[[dialogue]]
speaker = "ナミエル"
# 「この辺りのお掃除は私１人で対処できます──はい。ではまた後ほど合流いたしましょう」
line = "「この辺りのお掃除は私１人で対処できます──はい。ではまた後ほど合流いたしましょう」"

[[dialogue]]
speaker = "ナミエル"
# 「……ふぅ。まったく。こんなにも散らかすだなんて。モンスター、許せません」
line = "「……ふぅ。まったく。こんなにも散らかすだなんて。モンスター、許せません」"

[[dialogue]]
speaker = "unk"
# ナミエル、何をしてるんだ？
line = "ナミエル、何をしてるんだ？"

[[dialogue]]
speaker = "ナミエル"
# 「あ……緋宮会長。ご無沙汰しております」
line = "「あ……緋宮会長。ご無沙汰しております」"

[[dialogue]]
speaker = "ナミエル"
# 「何をしているのかと言われても、お掃除ですよ。私は流星学園附属の美化委員でもありますから」
line = "「何をしているのかと言われても、お掃除ですよ。私は流星学園附属の美化委員でもありますから」"

[[dialogue]]
speaker = "unk"
# 美化委員が……街の掃除を？
line = "美化委員が……街の掃除を？"

[[dialogue]]
speaker = "ナミエル"
# 「はい。美化委員は学園内の清掃の他に、街中での戦闘行為の後始末も業務としています」
line = "「はい。美化委員は学園内の清掃の他に、街中での戦闘行為の後始末も業務としています」"

[[dialogue]]
speaker = "ナミエル"
# 「瓦礫が散乱したり、ベンチや街灯が破損したり……放っておくと新たな事故につながりかねませんから」
line = "「瓦礫が散乱したり、ベンチや街灯が破損したり……放っておくと新たな事故につながりかねませんから」"

[[dialogue]]
speaker = "ナミエル"
# 「美化委員の事、ご存じありませんでしたか？　まあ星徒会と違って目立つ役職ではないですから仕方ありません」
line = "「美化委員の事、ご存じありませんでしたか？　まあ星徒会と違って目立つ役職ではないですから仕方ありません」"

[[dialogue]]
speaker = "ナミエル"
# 「ともかく後始末はお任せください。緋宮会長は戦闘が終わったばかりでお疲れでしょう」
line = "「ともかく後始末はお任せください。緋宮会長は戦闘が終わったばかりでお疲れでしょう」"

[[dialogue]]
speaker = "ナミエル"
# 「どうかご帰宅し、ゆっくり休養なさってくださいませ」
line = "「どうかご帰宅し、ゆっくり休養なさってくださいませ」"

[[dialogue]]
speaker = "unk"
# 俺も清掃を手伝うよ
line = "俺も清掃を手伝うよ"

[[dialogue]]
speaker = "ナミエル"
# 「──え？　いえ、わざわざ手を貸していただくほどでは……」
line = "「──え？　いえ、わざわざ手を貸していただくほどでは……」"

[[dialogue]]
speaker = "unk"
# 会長として美化委員の仕事を知っておきたい
line = "会長として美化委員の仕事を知っておきたい"

[[dialogue]]
speaker = "ナミエル"
# 「……ずいぶん変わったことを言いだすのですね」
line = "「……ずいぶん変わったことを言いだすのですね」"

[[dialogue]]
speaker = "ナミエル"
# 「お役目でもないのに、わざわざ美化委員のお手伝いまでしようとする……実にアヤシイです」
line = "「お役目でもないのに、わざわざ美化委員のお手伝いまでしようとする……実にアヤシイです」"

[[dialogue]]
speaker = "ナミエル"
# 「また何かえっちなことを企んでいるのでしょうか……？　今日は女子生徒しかいませんし……」
line = "「また何かえっちなことを企んでいるのでしょうか……？　今日は女子生徒しかいませんし……」"

[[dialogue]]
speaker = "ナミエル"
# 「……いえ。あまり疑うと、またメイド長に叱られてしまいますね」
line = "「……いえ。あまり疑うと、またメイド長に叱られてしまいますね」"

[[dialogue]]
speaker = "ナミエル"
# 「良いでしょう。清掃は私と一緒に行いましょう。しっかりばっちり監視させていただきます」
line = "「良いでしょう。清掃は私と一緒に行いましょう。しっかりばっちり監視させていただきます」"

[[dialogue]]
speaker = "ナミエル"
# 「──言っておきますが、前回のようなドジはもう起こりません。また私のパンツ……こほん。何かを見られると思ったら大間違いですから」
line = "「──言っておきますが、前回のようなドジはもう起こりません。また私のパンツ……こほん。何かを見られると思ったら大間違いですから」"

[[dialogue]]
speaker = "ナミエル"
# 「それではついて来てください、緋宮会長」
line = "「それではついて来てください、緋宮会長」"

[[dialogue]]
speaker = "ナミエル"
# 「んっ……このくらいでいいでしょう。瓦礫もなし。すっかり綺麗になりましたね」
line = "「んっ……このくらいでいいでしょう。瓦礫もなし。すっかり綺麗になりましたね」"

[[dialogue]]
speaker = "ナミエル"
# 「街がぴかぴかになりました。汚れる前よりも綺麗にする。これこそお掃除のあるべき姿と言えましょう」
line = "「街がぴかぴかになりました。汚れる前よりも綺麗にする。これこそお掃除のあるべき姿と言えましょう」"

[[dialogue]]
speaker = "ナミエル"
# 「しかし……清掃をするあなたからは邪な思いが見られませんでした。私も掃除を愛する者ですので、そこは誤らないはずです」
line = "「しかし……清掃をするあなたからは邪な思いが見られませんでした。私も掃除を愛する者ですので、そこは誤らないはずです」"

[[dialogue]]
speaker = "ナミエル"
# 「まさか本当に、美化委員のことをねぎらい、理解するためだけに手伝いを申し出ていただけたのでしょうか……？」
line = "「まさか本当に、美化委員のことをねぎらい、理解するためだけに手伝いを申し出ていただけたのでしょうか……？」"

[[dialogue]]
speaker = "unk"
# 最初からそう言ってるのに……
line = "最初からそう言ってるのに……"

[[dialogue]]
speaker = "ナミエル"
# 「……少し、見直しました」
line = "「……少し、見直しました」"

[[dialogue]]
speaker = "ナミエル"
# 「花形であるモンスター討伐と比べて、美化委員は目立ちません。感謝の声を聞くことも少ないのです」
line = "「花形であるモンスター討伐と比べて、美化委員は目立ちません。感謝の声を聞くことも少ないのです」"

[[dialogue]]
speaker = "ナミエル"
# 「もちろん理解ある方から、お褒めのお言葉をいただくこともありますが……」
line = "「もちろん理解ある方から、お褒めのお言葉をいただくこともありますが……」"

[[dialogue]]
speaker = "ナミエル"
# 「緋宮会長のような、みなの上に立つ方から気配りをいただけたこと、嬉しく思います」
line = "「緋宮会長のような、みなの上に立つ方から気配りをいただけたこと、嬉しく思います」"

[[dialogue]]
speaker = "ナミエル"
# 「そういうところ、お嬢様に少し似ていますね」
line = "「そういうところ、お嬢様に少し似ていますね」"

[[dialogue]]
speaker = "ナミエル"
# 「──いえっ。そこまで持ち上げるべきではありませんね。ともかくお疲れさまでした」
line = "「──いえっ。そこまで持ち上げるべきではありませんね。ともかくお疲れさまでした」"

[[dialogue]]
speaker = "ナミエル"
# 「それと……その……」
line = "「それと……その……」"

[[dialogue]]
speaker = "ナミエル"
# 「こ、この前は、色々と失礼いたしました。今一度、謝罪をさせてください」
line = "「こ、この前は、色々と失礼いたしました。今一度、謝罪をさせてください」"

[[dialogue]]
speaker = "ナミエル"
# 「先日は申し訳ありませんでした」
line = "「先日は申し訳ありませんでした」"

[[dialogue]]
speaker = "ナミエル"
# 「い、言っておきますが、完全に信用したわけではありませんからね？」
line = "「い、言っておきますが、完全に信用したわけではありませんからね？」"

[[dialogue]]
speaker = "ナミエル"
# 「緋宮会長はお嬢様と距離の近い男性ですのでっ。警戒レベルを緩めるというだけです……誤解なきようお願いいたしますっ」
line = "「緋宮会長はお嬢様と距離の近い男性ですのでっ。警戒レベルを緩めるというだけです……誤解なきようお願いいたしますっ」"

[[dialogue]]
speaker = "ナミエル"
# 「では、失礼いたします。お家に帰るまでがお掃除ですよ、気を付けてお帰りください」
line = "「では、失礼いたします。お家に帰るまでがお掃除ですよ、気を付けてお帰りください」"

[[dialogue]]
speaker = "unk"
# その前に親睦も兼ねてご飯でもどう？
line = "その前に親睦も兼ねてご飯でもどう？"

[[dialogue]]
speaker = "ナミエル"
# 「え……食事……２人で、ですかっ？」
line = "「え……食事……２人で、ですかっ？」"

[[dialogue]]
speaker = "ナミエル"
# （んむむ……男性が女性を誘う……下心があるに違いありません……）
line = "（んむむ……男性が女性を誘う……下心があるに違いありません……）"

[[dialogue]]
speaker = "ナミエル"
# （しかしお仕事を手伝ってもらったのに無下にすると言うのは、あまりに無礼すぎる気がいたします……）
line = "（しかしお仕事を手伝ってもらったのに無下にすると言うのは、あまりに無礼すぎる気がいたします……）"

[[dialogue]]
speaker = "ナミエル"
# 「し……仕方ないですね。今回は誘いに乗ってあげます」
line = "「し……仕方ないですね。今回は誘いに乗ってあげます」"

[[dialogue]]
speaker = "ナミエル"
# 「ですがあくまで、今回だけ、ですよ？　いいですか。味をしめて何度も誘ったりしないようにしてくださいね」
line = "「ですがあくまで、今回だけ、ですよ？　いいですか。味をしめて何度も誘ったりしないようにしてくださいね」"

[[dialogue]]
speaker = "unk"
# その後、流星市国のカフェで軽く食事を取った。
line = "その後、流星市国のカフェで軽く食事を取った。"

[[dialogue]]
speaker = "unk"
# ナミエルはあまり誰かと外食はしないらしく緊張していたが、食事そのものは楽しんでもらえたように思う。
line = "ナミエルはあまり誰かと外食はしないらしく緊張していたが、食事そのものは楽しんでもらえたように思う。"

[[dialogue]]
speaker = "unk"
# これからも機会があれば誘ってみよう──そう思うのだった。
line = "これからも機会があれば誘ってみよう──そう思うのだった。"
