[[dialogue]]
speaker = "unk"
# 第２話,お人好しなユウリ,P
line = "第２話,お人好しなユウリ,P"

[[dialogue]]
speaker = "ユウリ"
# 「よーし、かかってきな！　流星の星徒会の力を見せてやる」
line = "「よーし、かかってきな！　流星の星徒会の力を見せてやる」"

[[dialogue]]
speaker = "モネ"
# 「よ、よろしくお願いします……。それじゃ……えいっ」
line = "「よ、よろしくお願いします……。それじゃ……えいっ」"

[[dialogue]]
speaker = "ユウリ"
# 「ふんっ」
line = "「ふんっ」"

[[dialogue]]
speaker = "モネ"
# 「あっさり弾かれた！？」
line = "「あっさり弾かれた！？」"

[[dialogue]]
speaker = "ユウリ"
# 「隙だらけだぜ！」
line = "「隙だらけだぜ！」"

[[dialogue]]
speaker = "モネ"
# 「きゃああああっ！　……バタン」
line = "「きゃああああっ！　……バタン」"

[[dialogue]]
speaker = "ユウリ"
# 「まずは一人。次！」
line = "「まずは一人。次！」"

[[dialogue]]
speaker = "シャロン"
# 「次は私ですね。よろしくお願いしますっ」
line = "「次は私ですね。よろしくお願いしますっ」"

[[dialogue]]
speaker = "ユウリ"
# 「よしっ、あたしのハルバードが受け止められるか試してやるぜ。ちゃんと構えろよ」
line = "「よしっ、あたしのハルバードが受け止められるか試してやるぜ。ちゃんと構えろよ」"

[[dialogue]]
speaker = "シャロン"
# 「流星の星徒会役員とはいえ、簡単に倒されるつもりはありませんよ」
line = "「流星の星徒会役員とはいえ、簡単に倒されるつもりはありませんよ」"

[[dialogue]]
speaker = "ユウリ"
# 「いい返事だ。そらよ！」
line = "「いい返事だ。そらよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「お疲れさま～。飲み物持ってきたわよ～」
line = "「お疲れさま～。飲み物持ってきたわよ～」"

[[dialogue]]
speaker = "ユウリ"
# 「あ、配るの手伝うぜ。ほい、慌てず飲むんだぞ」
line = "「あ、配るの手伝うぜ。ほい、慌てず飲むんだぞ」"

[[dialogue]]
speaker = "モネ"
# 「ぜぇ、ぜぇ……ありがとう……ございます……」
line = "「ぜぇ、ぜぇ……ありがとう……ございます……」"

[[dialogue]]
speaker = "環"
# 「いただきまーす」
line = "「いただきまーす」"

[[dialogue]]
speaker = "シャロン"
# 「生き返ります……女神さまとサーシャさま、ユウリさまに感謝を」
line = "「生き返ります……女神さまとサーシャさま、ユウリさまに感謝を」"

[[dialogue]]
speaker = "サーシャ"
# 「訓練に参加したうちの子はみんな倒しちゃったのね～。普段前線に出てない子も多いとはいえ、さすが流星星徒会だわ～」
line = "「訓練に参加したうちの子はみんな倒しちゃったのね～。普段前線に出てない子も多いとはいえ、さすが流星星徒会だわ～」"

[[dialogue]]
speaker = "unk"
# 訓練してみてどうだった？
line = "訓練してみてどうだった？"

[[dialogue]]
speaker = "ユウリ"
# 「そうだな……正直歯ごたえはなかったが、あんまり戦ってないヤツらならこんなもんだろ。でも筋は悪くないし、これから伸びてくると思うぜ」
line = "「そうだな……正直歯ごたえはなかったが、あんまり戦ってないヤツらならこんなもんだろ。でも筋は悪くないし、これから伸びてくると思うぜ」"

[[dialogue]]
speaker = "サーシャ"
# 「ふむふむ、なるほど～。次は私たちが流星の子たちを鍛える番ね」
line = "「ふむふむ、なるほど～。次は私たちが流星の子たちを鍛える番ね」"

[[dialogue]]
speaker = "ユウリ"
# 「流星のヤツらもなかなかやるぜ。一筋縄じゃいかないかもしれねーぞ」
line = "「流星のヤツらもなかなかやるぜ。一筋縄じゃいかないかもしれねーぞ」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふっ、それは楽しみね～」
line = "「ふふふっ、それは楽しみね～」"

[[dialogue]]
speaker = "モネ"
# 「あ、あのー……」
line = "「あ、あのー……」"

[[dialogue]]
speaker = "ユウリ"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "モネ"
# 「さっき手合わせした時の反省点を教えてもらえませんか？」
line = "「さっき手合わせした時の反省点を教えてもらえませんか？」"

[[dialogue]]
speaker = "ユウリ"
# 「なんだ、強くなりたいのか？　この前は戦いたくないって感じだったのに」
line = "「なんだ、強くなりたいのか？　この前は戦いたくないって感じだったのに」"

[[dialogue]]
speaker = "モネ"
# 「それはそうなんですけど、戦わなきゃいけないのはわかってますし。それに私が弱いままだと、この子たち……本たちにも悪いですから」
line = "「それはそうなんですけど、戦わなきゃいけないのはわかってますし。それに私が弱いままだと、この子たち……本たちにも悪いですから」"

[[dialogue]]
speaker = "ユウリ"
# 「ふーん、なるほどな。いいぜ、まだ時間もあるみたいだしみっちり鍛えてやる」
line = "「ふーん、なるほどな。いいぜ、まだ時間もあるみたいだしみっちり鍛えてやる」"

[[dialogue]]
speaker = "モネ"
# 「そ、そこまではいいんですけど……でもありがとうございますっ」
line = "「そ、そこまではいいんですけど……でもありがとうございますっ」"

[[dialogue]]
speaker = "unk"
# 親身になってくれてる
line = "親身になってくれてる"

[[dialogue]]
speaker = "ユウリ"
# 「そりゃ、星騎士として強くなりたいっていうヤツがいたらほっとけねえだろ」
line = "「そりゃ、星騎士として強くなりたいっていうヤツがいたらほっとけねえだろ」"

[[dialogue]]
speaker = "ユウリ"
# 「流星と新星はライバルだが、リクリエに立ち向かうのは同じだし、ライバルが強ければ強いほどあたしたちも強くなるってもんだ」
line = "「流星と新星はライバルだが、リクリエに立ち向かうのは同じだし、ライバルが強ければ強いほどあたしたちも強くなるってもんだ」"

[[dialogue]]
speaker = "シャロン"
# 「では私もお願いします。女神様に仕えるシスターとして、世界を守らねばなりませんから」
line = "「では私もお願いします。女神様に仕えるシスターとして、世界を守らねばなりませんから」"

[[dialogue]]
speaker = "環"
# 「はいはーい、ボクも！　会長に追い抜かれたままじゃ悔しいからね」
line = "「はいはーい、ボクも！　会長に追い抜かれたままじゃ悔しいからね」"

[[dialogue]]
speaker = "ユウリ"
# 「お、体を動かしたりないヤツがまだいるみたいだな。よし、まとめて相手してやる」
line = "「お、体を動かしたりないヤツがまだいるみたいだな。よし、まとめて相手してやる」"

[[dialogue]]
speaker = "サーシャ"
# 「あー……でもごめんなさい。ちょっと機材の調子が悪いみたいね～」
line = "「あー……でもごめんなさい。ちょっと機材の調子が悪いみたいね～」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしに任しとけ。見せてみろ」
line = "「あたしに任しとけ。見せてみろ」"

[[dialogue]]
speaker = "サーシャ"
# 「そんなこともできるの？　じゃあお願いするわね」
line = "「そんなこともできるの？　じゃあお願いするわね」"

[[dialogue]]
speaker = "unk"
# さすが流星の星徒会役員
line = "さすが流星の星徒会役員"

[[dialogue]]
speaker = "ソフィア"
# 「お邪魔します……あれ、どうしてユウリ先輩が機械をいじってるんですか？」
line = "「お邪魔します……あれ、どうしてユウリ先輩が機械をいじってるんですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「実はかくかくしかじかで」
line = "「実はかくかくしかじかで」"

[[dialogue]]
speaker = "ソフィア"
# 「えーと……気をつけてください」
line = "「えーと……気をつけてください」"

[[dialogue]]
speaker = "ソフィア"
# 「面倒見が良くて誰でも助けようとするところは、確かにユウリ先輩の美点ですが、自分にできることできないことを深く考えずに引き受けてしまうきらいがあります」
line = "「面倒見が良くて誰でも助けようとするところは、確かにユウリ先輩の美点ですが、自分にできることできないことを深く考えずに引き受けてしまうきらいがあります」"

[[dialogue]]
speaker = "サーシャ"
# 「つまり……」
line = "「つまり……」"

[[dialogue]]
speaker = "ユウリ"
# 「ん？　あれ？　どうなってんだこれ？　……ま、機械なんて叩けば直んだろ」
line = "「ん？　あれ？　どうなってんだこれ？　……ま、機械なんて叩けば直んだろ」"

[[dialogue]]
speaker = "unk"
# ストーップ！
line = "ストーップ！"

[[dialogue]]
speaker = "モネ"
# 「ハルバードで叩いたら絶対壊れますから！　直せる人連れてきますから！」
line = "「ハルバードで叩いたら絶対壊れますから！　直せる人連れてきますから！」"

[[dialogue]]
speaker = "ユウリ"
# 「おう、任せたぜ。それじゃ、直るまで筋トレでもするか」
line = "「おう、任せたぜ。それじゃ、直るまで筋トレでもするか」"
