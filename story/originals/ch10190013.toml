[[dialogue]]
speaker = "unk"
# 第３話,心の最も敏感で弱い部分,P
line = "第３話,心の最も敏感で弱い部分,P"

[[dialogue]]
speaker = "せつな"
# 「お嬢様、せつなに御用とは一体何でございましょう？」
line = "「お嬢様、せつなに御用とは一体何でございましょう？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヨミヨミから聞いたわよ。せつな、あなた『恋愛』が苦手だそうじゃない！」
line = "「ヨミヨミから聞いたわよ。せつな、あなた『恋愛』が苦手だそうじゃない！」"

[[dialogue]]
speaker = "せつな"
# 「う……そ、それは……！」
line = "「う……そ、それは……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトは将来、世界を救う魔王になるわ。その下に仕える忍者が、恋人のフリの１つも出来ないというのは問題よ！」
line = "「クロトは将来、世界を救う魔王になるわ。その下に仕える忍者が、恋人のフリの１つも出来ないというのは問題よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから、もう１人の主人として命じるわ。せつな……次の休日、クロトとデートに行きなさい！」
line = "「だから、もう１人の主人として命じるわ。せつな……次の休日、クロトとデートに行きなさい！」"

[[dialogue]]
speaker = "せつな"
# 「え……えぇぇぇえええ～～～～～～っ！！？」
line = "「え……えぇぇぇえええ～～～～～～っ！！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「くノ一として、いいえ、１人の女として、恋愛の経験を積むのよっ！」
line = "「くノ一として、いいえ、１人の女として、恋愛の経験を積むのよっ！」"

[[dialogue]]
speaker = "せつな"
# 「――ということで本日、主様をデ、デートにお誘いしたというわけでござりまする」
line = "「――ということで本日、主様をデ、デートにお誘いしたというわけでござりまする」"

[[dialogue]]
speaker = "unk"
# ヴィーナスらしい提案だな
line = "ヴィーナスらしい提案だな"

[[dialogue]]
speaker = "せつな"
# 「笑いごとではございませぬ！　こ、こんな人の往来が多いところでデートするなど、エッチ過ぎまする！」
line = "「笑いごとではございませぬ！　こ、こんな人の往来が多いところでデートするなど、エッチ過ぎまする！」"

[[dialogue]]
speaker = "せつな"
# 「で、デートは別に普通って……外でデートするということは、公衆の面前で恋愛している姿を晒すということでござるよ！？」
line = "「で、デートは別に普通って……外でデートするということは、公衆の面前で恋愛している姿を晒すということでござるよ！？」"

[[dialogue]]
speaker = "せつな"
# 「他のカップルも沢山歩いているでござるが、何故皆、普通に手を繋いだり出来るのでござるか！？　せつなには刺激が強過ぎて、直視出来ませぬ！」
line = "「他のカップルも沢山歩いているでござるが、何故皆、普通に手を繋いだり出来るのでござるか！？　せつなには刺激が強過ぎて、直視出来ませぬ！」"

[[dialogue]]
speaker = "unk"
# 全然恥ずかしくないと思うんだけどなぁ……
line = "全然恥ずかしくないと思うんだけどなぁ……"

[[dialogue]]
speaker = "unk"
# エッチな性癖の話に比べれば
line = "エッチな性癖の話に比べれば"

[[dialogue]]
speaker = "せつな"
# 「性への興味など当たり前のことでありまする！　しかし、恋愛は……す、好きという感情を人前に見せるのは、裸を見せるよりも恥ずかしいでござる！」
line = "「性への興味など当たり前のことでありまする！　しかし、恋愛は……す、好きという感情を人前に見せるのは、裸を見せるよりも恥ずかしいでござる！」"

[[dialogue]]
speaker = "せつな"
# 「だって、恋心は……心の奥底に忍ばせている、最も敏感で弱い部分ではござりませぬか……！」
line = "「だって、恋心は……心の奥底に忍ばせている、最も敏感で弱い部分ではござりませぬか……！」"

[[dialogue]]
speaker = "unk"
# せつなのこと少しだけ分かってきた気がする
line = "せつなのこと少しだけ分かってきた気がする"

[[dialogue]]
speaker = "せつな"
# 「そ、そうでござるか……？　ならばせめて、主様のお家など、誰にも見られないところで慣れることから……」
line = "「そ、そうでござるか……？　ならばせめて、主様のお家など、誰にも見られないところで慣れることから……」"

[[dialogue]]
speaker = "せつな"
# 「え！？　このままデート続行するのでござるか！？　そ、そんな主様……せつな、恥ずかし過ぎて倒れてしまうでござる！」
line = "「え！？　このままデート続行するのでござるか！？　そ、そんな主様……せつな、恥ずかし過ぎて倒れてしまうでござる！」"

[[dialogue]]
speaker = "せつな"
# 「その時はお姫様抱っこする？　おおお、お姫様抱っことは、それはむしろ逆効果でござる！」
line = "「その時はお姫様抱っこする？　おおお、お姫様抱っことは、それはむしろ逆効果でござる！」"

[[dialogue]]
speaker = "せつな"
# 「このまま帰るのはもったいないというのはわかるでござるが、しかし……あ、主様どこへ！？」
line = "「このまま帰るのはもったいないというのはわかるでござるが、しかし……あ、主様どこへ！？」"

[[dialogue]]
speaker = "unk"
# 忍として護衛を頼む
line = "忍として護衛を頼む"

[[dialogue]]
speaker = "unk"
# 街の散策に繰り出すんだよ
line = "街の散策に繰り出すんだよ"

[[dialogue]]
speaker = "せつな"
# 「そ、そんなぁ……お待ち下さい、主様！　その言い回しは卑怯でござるよぉ……！」
line = "「そ、そんなぁ……お待ち下さい、主様！　その言い回しは卑怯でござるよぉ……！」"

[[dialogue]]
speaker = "せつな"
# 「ちょっ、主様、人ごみの中をそんなズンズン進んでは……にゃんと！？　人ごみに流されてるですと！？」
line = "「ちょっ、主様、人ごみの中をそんなズンズン進んでは……にゃんと！？　人ごみに流されてるですと！？」"

[[dialogue]]
speaker = "せつな"
# 「分かりました！　せつながすぐに助けます故……！　ん～、もう少しで手が届くでござる……！」
line = "「分かりました！　せつながすぐに助けます故……！　ん～、もう少しで手が届くでござる……！」"

[[dialogue]]
speaker = "せつな"
# 「よし、主様の服を掴みました！　後はこのまま人の流れに逆らわず、広いところまで行けば……って」
line = "「よし、主様の服を掴みました！　後はこのまま人の流れに逆らわず、広いところまで行けば……って」"

[[dialogue]]
speaker = "せつな"
# 「あ、主様、なぜ手を繋いで……！？　はぐれないように……？　た、確かにそうでござるが……その……！」
line = "「あ、主様、なぜ手を繋いで……！？　はぐれないように……？　た、確かにそうでござるが……その……！」"

[[dialogue]]
speaker = "せつな"
# 「は、恥ずかしいので、出来れば手首とか、服の袖とかして頂けると……」
line = "「は、恥ずかしいので、出来れば手首とか、服の袖とかして頂けると……」"

[[dialogue]]
speaker = "unk"
# いいと言うまで、手を離すのは禁止ね
line = "いいと言うまで、手を離すのは禁止ね"

[[dialogue]]
speaker = "せつな"
# 「まさか主様、謀ったでござるか！？」
line = "「まさか主様、謀ったでござるか！？」"

[[dialogue]]
speaker = "せつな"
# 「に、にゃあぁぁぁ……！　主様、ダメでござるよぉ……そんな強くしては……！」
line = "「に、にゃあぁぁぁ……！　主様、ダメでござるよぉ……そんな強くしては……！」"

[[dialogue]]
speaker = "せつな"
# 「沢山の人に主様との結合部を見られて、せつな恥ずかしいでござるぅ……！」
line = "「沢山の人に主様との結合部を見られて、せつな恥ずかしいでござるぅ……！」"

[[dialogue]]
speaker = "unk"
# 誤解される言い方は止めてくれる！？
line = "誤解される言い方は止めてくれる！？"

[[dialogue]]
speaker = "unk"
# その後、何だかんだ手を繋いでデートすることになり――
line = "その後、何だかんだ手を繋いでデートすることになり――"

[[dialogue]]
speaker = "せつな"
# 「はっ……！　こ、ここは……！？　主様、ここに入ってみたいでござる！」
line = "「はっ……！　こ、ここは……！？　主様、ここに入ってみたいでござる！」"

[[dialogue]]
speaker = "せつな"
# 「にゃっほーっ♪　『ピンク色の怪しいお店』でござる～～～っ♪」
line = "「にゃっほーっ♪　『ピンク色の怪しいお店』でござる～～～っ♪」"

[[dialogue]]
speaker = "せつな"
# 「ほらほら、主様もそんな恥ずかしがらず、こっちで一緒に見るでござるよ！」
line = "「ほらほら、主様もそんな恥ずかしがらず、こっちで一緒に見るでござるよ！」"

[[dialogue]]
speaker = "unk"
# さっきまでの羞恥心はどこに行った！？
line = "さっきまでの羞恥心はどこに行った！？"

[[dialogue]]
speaker = "せつな"
# 「主様、この『ハリガタ』やばいでござるっ。なるほど……ほほぅ♪　これはこれは……<emoji=heart04>」
line = "「主様、この『ハリガタ』やばいでござるっ。なるほど……ほほぅ♪　これはこれは……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「……主様、相談なのでござるが――」
line = "「……主様、相談なのでござるが――」"

[[dialogue]]
speaker = "unk"
# 買っちゃダメだよ！？
line = "買っちゃダメだよ！？"

[[dialogue]]
speaker = "せつな"
# 「にゃんと殺生なっ！？　主様の許可がなければ、さすがにこれは買えないでござる！　……あっ、そうでござる！　主様、そちらに飾ってある衣装を御覧下され！」
line = "「にゃんと殺生なっ！？　主様の許可がなければ、さすがにこれは買えないでござる！　……あっ、そうでござる！　主様、そちらに飾ってある衣装を御覧下され！」"

[[dialogue]]
speaker = "せつな"
# 「もしご許可頂けたら、せつながそのデンジャラスでビーストな布面積のコスプレを着て、ご奉仕致しますよ？　お店の１番人気と書いてありまする。どうでござるか？」
line = "「もしご許可頂けたら、せつながそのデンジャラスでビーストな布面積のコスプレを着て、ご奉仕致しますよ？　お店の１番人気と書いてありまする。どうでござるか？」"

[[dialogue]]
speaker = "せつな"
# 「あっ！　今一瞬、考える間があったでござるな？　ふふっ……これはどちらにせよ、買ってお見せしなければ……♪」
line = "「あっ！　今一瞬、考える間があったでござるな？　ふふっ……これはどちらにせよ、買ってお見せしなければ……♪」"

[[dialogue]]
speaker = "せつな"
# 「おおっ、あちらにも面白そうな物が並んでいるでござる！　主様、参りましょう♪」
line = "「おおっ、あちらにも面白そうな物が並んでいるでござる！　主様、参りましょう♪」"

[[dialogue]]
speaker = "unk"
# 意気揚々と引っ張られる手に、やっぱり基準は変だなと思いつつも。せつなが楽しんでるならそれでいっか、と思うのであった。
line = "意気揚々と引っ張られる手に、やっぱり基準は変だなと思いつつも。せつなが楽しんでるならそれでいっか、と思うのであった。"
