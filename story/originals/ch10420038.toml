# 「んっ……<emoji=heart04>　はあぁ……<emoji=heart04>　ふうぅ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　はあぁ……<emoji=heart04>　ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女の中に入り切らなかった欲望が、白濁となって膣穴から溢れ出してくる。
line = "彼女の中に入り切らなかった欲望が、白濁となって膣穴から溢れ出してくる。"

[[dialogue]]
speaker = "フェニエル"
# 「ご主人様……中にいっぱいお射精頂いて、ありがとうございました……<emoji=heart04>」
line = "「ご主人様……中にいっぱいお射精頂いて、ありがとうございました……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
# 「ご主人様は、気持ち良くなって頂けましたか……？」
line = "「ご主人様は、気持ち良くなって頂けましたか……？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。これ以上ないくらい興奮して、気持ち良かった……」
line = "「ああ。これ以上ないくらい興奮して、気持ち良かった……」"

[[dialogue]]
speaker = "フェニエル"
# 「んっ<emoji=heart04>　えへへ<emoji=heart04>　ちゃんと癒すご奉仕ができてたのなら、嬉しいです……<emoji=heart04>」
line = "「んっ<emoji=heart04>　えへへ<emoji=heart04>　ちゃんと癒すご奉仕ができてたのなら、嬉しいです……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
# 「私もすごく気持ち良くて、なまら幸せな気持ちになっちゃいました……<emoji=heart04>」
line = "「私もすごく気持ち良くて、なまら幸せな気持ちになっちゃいました……<emoji=heart04>」"

[[dialogue]]
speaker = "フェニエル"
# 「……あの、ご主人様」
line = "「……あの、ご主人様」"

[[dialogue]]
speaker = "フェニエル"
# 「今までは私、ご主人様が望んでいらっしゃるかわからなかったので、言えなかったんですけど……」
line = "「今までは私、ご主人様が望んでいらっしゃるかわからなかったので、言えなかったんですけど……」"

[[dialogue]]
speaker = "フェニエル"
# 「よろしければ……『子作りご奉仕』、これからもまたさせて頂いてもよろしいでしょうか……？」
line = "「よろしければ……『子作りご奉仕』、これからもまたさせて頂いてもよろしいでしょうか……？」"

[[dialogue]]
speaker = "unk"
# 照れながら横目でそんなことを言うフニに、俺は猛烈な愛おしさを掻き立てられてしまって。
line = "照れながら横目でそんなことを言うフニに、俺は猛烈な愛おしさを掻き立てられてしまって。"

[[dialogue]]
speaker = "クロト"
# 「フニ、愛してる」
line = "「フニ、愛してる」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ<emoji=heart04>　ご主人様<emoji=heart04>　うなじにキス、くすぐったいです……<emoji=heart04>」
line = "「あっ<emoji=heart04>　ご主人様<emoji=heart04>　うなじにキス、くすぐったいです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも熱が冷めやらず、俺は彼女にマッサージの延長をお願いしてしまうのだった――
line = "それからも熱が冷めやらず、俺は彼女にマッサージの延長をお願いしてしまうのだった――"
