[[dialogue]]
speaker = "ウズメイア"
# 「余の顔を忘れるとは情けなし！　控えおろう！　この紋所が目に入らぬか～っ！！」
line = "「余の顔を忘れるとは情けなし！　控えおろう！　この紋所が目に入らぬか～っ！！」"

[[dialogue]]
