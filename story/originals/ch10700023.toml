line = "「──なぬーっ！？　そ、そそ、その<ruby>御紋<rt>ごもん</rt></ruby>は……！！」"

[[dialogue]]
speaker = "せつな"
# 「主様！　まずいでござる、あの御紋を持つということは、きゃつは将軍っ……上様ということでござる～！？」
line = "「主様！　まずいでござる、あの御紋を持つということは、きゃつは将軍っ……上様ということでござる～！？」"

[[dialogue]]
speaker = "unk"
# お手向かい致しますぞ！！
