[[dialogue]]
speaker = "unk"
# 第３話,早朝チャンバラごっこ,P
line = "第３話,早朝チャンバラごっこ,P"

[[dialogue]]
speaker = "unk"
# その日、なんだかやけに早く目が覚めてしまった俺は、家で時間を無駄にするのももったいないと思い、早めに登校していた。
line = "その日、なんだかやけに早く目が覚めてしまった俺は、家で時間を無駄にするのももったいないと思い、早めに登校していた。"

[[dialogue]]
speaker = "unk"
# そういえば流星星徒会に用事があったっけ
line = "そういえば流星星徒会に用事があったっけ"

[[dialogue]]
speaker = "unk"
# 早朝の散歩がてら、流星学園の方まで行くのもいいかもしれない──
line = "早朝の散歩がてら、流星学園の方まで行くのもいいかもしれない──"

[[dialogue]]
speaker = "unk"
# 流星学園までの道のりをのんびりと歩いていたら、朝の空気を切りさく見事な太刀筋の音が聞こえてきた。
line = "流星学園までの道のりをのんびりと歩いていたら、朝の空気を切りさく見事な太刀筋の音が聞こえてきた。"

[[dialogue]]
speaker = "ウズメイア"
# 「はーっ！　たっ──！　やぁっ──！！」
line = "「はーっ！　たっ──！　やぁっ──！！」"

[[dialogue]]
speaker = "ウズメイア"
# 「──はぁああっ！！」
line = "「──はぁああっ！！」"

[[dialogue]]
speaker = "unk"
# （ウズメの早朝鍛錬か……！）
line = "（ウズメの早朝鍛錬か……！）"

[[dialogue]]
speaker = "ウズメイア"
# 「てぇぇいっ──！」
line = "「てぇぇいっ──！」"

[[dialogue]]
speaker = "unk"
# ちょうどキリのいいところまで終わったように思えたので、声をかけようと思ったその時──
line = "ちょうどキリのいいところまで終わったように思えたので、声をかけようと思ったその時──"

[[dialogue]]
speaker = "ウズメイア"
# 「ふっ。またつまらぬ物を斬ってしまった……！」
line = "「ふっ。またつまらぬ物を斬ってしまった……！」"

[[dialogue]]
speaker = "unk"
# （あ、これは例の時代劇のマネ……！）
line = "（あ、これは例の時代劇のマネ……！）"

[[dialogue]]
speaker = "ウズメイア"
# 「よーし。次は薙刀術、基本の型・その参だし……！」
line = "「よーし。次は薙刀術、基本の型・その参だし……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「うりゃりゃりゃりゃ～っ……！！」
line = "「うりゃりゃりゃりゃ～っ……！！」"

[[dialogue]]
speaker = "unk"
# （見事な薙刀捌き……そして……！）
line = "（見事な薙刀捌き……そして……！）"

[[dialogue]]
speaker = "ウズメイア"
# 「しゅばばばばっ……！　ふん、犬畜生にかける情けなし……！」
line = "「しゅばばばばっ……！　ふん、犬畜生にかける情けなし……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「娘さん、怪我はないかい？　……すまぬな。生憎だが拙者、名乗るほどの者ではござらぬ。御免！」
line = "「娘さん、怪我はないかい？　……すまぬな。生憎だが拙者、名乗るほどの者ではござらぬ。御免！」"

[[dialogue]]
speaker = "ウズメイア"
# 「……く～っ♪　やっぱり時代劇のマネすると、残心が捗るし～♪」
line = "「……く～っ♪　やっぱり時代劇のマネすると、残心が捗るし～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、そうだ。せっかく傘の武器も手に入れたんだから……オンボロ傘シリーズのマネもやっちゃおっと♪」
line = "「あっ、そうだ。せっかく傘の武器も手に入れたんだから……オンボロ傘シリーズのマネもやっちゃおっと♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「許せねぇ……てめぇら人間じゃねぇっ！　叩っ切って──」
line = "「許せねぇ……てめぇら人間じゃねぇっ！　叩っ切って──」"

[[dialogue]]
speaker = "ウズメイア"
# 「────っ！？！？！？」
line = "「────っ！？！？！？」"

[[dialogue]]
speaker = "unk"
# おはよう
line = "おはよう"

[[dialogue]]
speaker = "ウズメイア"
# 「いいいっ、いつからいたし～～～っ！？」
line = "「いいいっ、いつからいたし～～～っ！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「とほほ……まさか時代劇のマネしてるところ見られちゃうだなんて……いつもはこの時間、誰もいないはずなのにぃ！」
line = "「とほほ……まさか時代劇のマネしてるところ見られちゃうだなんて……いつもはこの時間、誰もいないはずなのにぃ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「……偶然、朝早く目が覚めちゃったの？　そ、そっかぁ～……あ、ところで今見たものはどうかご内密に……」
line = "「……偶然、朝早く目が覚めちゃったの？　そ、そっかぁ～……あ、ところで今見たものはどうかご内密に……」"

[[dialogue]]
speaker = "unk"
# 俺も時代劇、大好きだからね
line = "俺も時代劇、大好きだからね"

[[dialogue]]
speaker = "unk"
# 正直、気持ちはわかるよ
line = "正直、気持ちはわかるよ"

[[dialogue]]
speaker = "ウズメイア"
# 「だ──だよねっ！？　あんなにカッコいいんだもん！　思わずマネしたくなっちゃうのも仕方ないよね！？」
line = "「だ──だよねっ！？　あんなにカッコいいんだもん！　思わずマネしたくなっちゃうのも仕方ないよね！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「見つかった時は思わず照れちゃったけど……よくよく考えれば別に全然平気な気がしてきたし！」
line = "「見つかった時は思わず照れちゃったけど……よくよく考えれば別に全然平気な気がしてきたし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「オンボロ傘シリーズは不朽の名作だし、見られても恥ずかしいものじゃない！　うん！」
line = "「オンボロ傘シリーズは不朽の名作だし、見られても恥ずかしいものじゃない！　うん！」"

[[dialogue]]
speaker = "ウズメイア"
# 「……ねぇ会長くん。何だかさっきからウズウズしてない？　もしかして会長くんも、時代劇ごっこやってみたいって思ってたり……？」
line = "「……ねぇ会長くん。何だかさっきからウズウズしてない？　もしかして会長くんも、時代劇ごっこやってみたいって思ってたり……？」"

[[dialogue]]
speaker = "unk"
# ──わかるか、ウズメ！
line = "──わかるか、ウズメ！"

[[dialogue]]
speaker = "ウズメイア"
# 「そりゃ～時代劇を愛する仲間だし！　どうどう、やっちゃう！？」
line = "「そりゃ～時代劇を愛する仲間だし！　どうどう、やっちゃう！？」"

[[dialogue]]
speaker = "せつな"
# 「なにやら稽古の気配がしたのでやってきたでござるが……主様とウズメ殿ではござりませぬか。おはようでござる」
line = "「なにやら稽古の気配がしたのでやってきたでござるが……主様とウズメ殿ではござりませぬか。おはようでござる」"

[[dialogue]]
speaker = "ウズメイア"
# 「ござるちゃん！　ちょうどいいところに！　ねぇねぇ、一緒に時代劇ごっこ、やらない！？」
line = "「ござるちゃん！　ちょうどいいところに！　ねぇねぇ、一緒に時代劇ごっこ、やらない！？」"

[[dialogue]]
speaker = "せつな"
# 「ファっ！？　いきなり謎のお誘いでござるが……」
line = "「ファっ！？　いきなり謎のお誘いでござるが……」"

[[dialogue]]
speaker = "せつな"
# 「主様の命とあらば、紫桜の里が忍・せつな！　いくらでもお付き合いするでござる！」
line = "「主様の命とあらば、紫桜の里が忍・せつな！　いくらでもお付き合いするでござる！」"

[[dialogue]]
speaker = "ウズメイア"
# 「悪行三昧、見捨てておけぬ！　お天道様が許しても、この和傘侍が許さ～ん！　悪代官よ、お主の悪行も今日までだし！！」
line = "「悪行三昧、見捨てておけぬ！　お天道様が許しても、この和傘侍が許さ～ん！　悪代官よ、お主の悪行も今日までだし！！」"

[[dialogue]]
speaker = "unk"
# 出合え、出合ぇぇい！！
line = "出合え、出合ぇぇい！！"

[[dialogue]]
speaker = "unk"
# うぬ……曲者じゃ！
line = "うぬ……曲者じゃ！"

[[dialogue]]
speaker = "せつな"
# 「──シュタッ！　我が屋敷の秘密を知ったとあっては、生かして帰すわけにはいかんでござる！　覚悟！」
line = "「──シュタッ！　我が屋敷の秘密を知ったとあっては、生かして帰すわけにはいかんでござる！　覚悟！」"

