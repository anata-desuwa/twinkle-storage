line = "「ちょっとちょっと～～！？　何で無視するし～！？」"

[[dialogue]]
speaker = "unk"
# こうして第１回時代劇ごっこは終わった。次は俺が上様の役をやってみたいなぁ……
line = "こうして第１回時代劇ごっこは終わった。次は俺が上様の役をやってみたいなぁ……"
