[[dialogue]]
speaker = "unk"
# 第２話,カフェテリアで勉強,P
line = "第２話,カフェテリアで勉強,P"

[[dialogue]]
speaker = "エスメラルダ"
# 「この間はごめんね。私ってばデータを取ることにばっかり夢中になっちゃって……」
line = "「この間はごめんね。私ってばデータを取ることにばっかり夢中になっちゃって……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「昔からこうなの……数字が絡むとつい周りが見えなくなっちゃうっていうか。同僚の先生方からもいっぱい叱られちゃったし……」
line = "「昔からこうなの……数字が絡むとつい周りが見えなくなっちゃうっていうか。同僚の先生方からもいっぱい叱られちゃったし……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「でも本当に、お勉強を教えるだなんてことで良かったの？　お詫びなんだからもっと色々お願いしてくれても良かったのに」
line = "「でも本当に、お勉強を教えるだなんてことで良かったの？　お詫びなんだからもっと色々お願いしてくれても良かったのに」"

[[dialogue]]
speaker = "エスメラルダ"
# 「でも頼ってくれたのなら応えないとね。よーし、先生に任せて！　数学なら何でも教えてあげちゃうから！」
line = "「でも頼ってくれたのなら応えないとね。よーし、先生に任せて！　数学なら何でも教えてあげちゃうから！」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ふむふむ……新星はこのあたりまで進んでいるのね。流星学園よりも進行が速いかも」
line = "「ふむふむ……新星はこのあたりまで進んでいるのね。流星学園よりも進行が速いかも」"

[[dialogue]]
speaker = "エスメラルダ"
# 「あ、そこ。ケアレスミスしてるわよ」
line = "「あ、そこ。ケアレスミスしてるわよ」"

[[dialogue]]
speaker = "unk"
# （すごく距離が近い……密着しそう……）
line = "（すごく距離が近い……密着しそう……）"

[[dialogue]]
speaker = "エスメラルダ"
# 「──うん。オッケー。飲み込みがいいわね。ちゃんと復習もしてるみたいだし」
line = "「──うん。オッケー。飲み込みがいいわね。ちゃんと復習もしてるみたいだし」"

[[dialogue]]
speaker = "エスメラルダ"
# 「このまま隣で見てるから、どんどん解いていこっか♪」
line = "「このまま隣で見てるから、どんどん解いていこっか♪」"

[[dialogue]]
speaker = "unk"
# （ちゃんと集中しないと……！）
line = "（ちゃんと集中しないと……！）"

[[dialogue]]
speaker = "エスメラルダ"
# 「うん、この辺りがいい区切りかも。休憩しましょう」
line = "「うん、この辺りがいい区切りかも。休憩しましょう」"

[[dialogue]]
speaker = "エスメラルダ"
# 「集中力は持って３０分。それ以上は非効率だからね」
line = "「集中力は持って３０分。それ以上は非効率だからね」"

[[dialogue]]
speaker = "エスメラルダ"
# 「短時間の集中と、疲労を感じる前のこまめな休憩。これを繰り返すことが一番効率的なのよ」
line = "「短時間の集中と、疲労を感じる前のこまめな休憩。これを繰り返すことが一番効率的なのよ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「喉が渇いたでしょ？　先生がコーヒー買ってきてあげる。待っててね！」
line = "「喉が渇いたでしょ？　先生がコーヒー買ってきてあげる。待っててね！」"

[[dialogue]]
speaker = "ウィステリア"
# 「こんにちは～、会長くん」
line = "「こんにちは～、会長くん」"

[[dialogue]]
speaker = "ウィステリア"
# 「さっきエスメラルダ先輩が見えたんだけど……飲み物を買いに行った？　１人で？」
line = "「さっきエスメラルダ先輩が見えたんだけど……飲み物を買いに行った？　１人で？」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ～……それなら財布を用意しておくといいかも」
line = "「あ～……それなら財布を用意しておくといいかも」"

[[dialogue]]
speaker = "unk"
# どういうことですか？
line = "どういうことですか？"

[[dialogue]]
speaker = "ウィステリア"
# 「すぐにわかるわよ……あ、戻ってきたわ」
line = "「すぐにわかるわよ……あ、戻ってきたわ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「うっかりしちゃってた。お財布にお金、ぜんぜん入ってなかったわ～」
line = "「うっかりしちゃってた。お財布にお金、ぜんぜん入ってなかったわ～」"

[[dialogue]]
speaker = "ウィステリア"
# 「──やっぱり」
line = "「──やっぱり」"

[[dialogue]]
speaker = "ウィステリア"
# 「はい、コーヒー。ミルクと砂糖もあるわよ」
line = "「はい、コーヒー。ミルクと砂糖もあるわよ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「あらら。教え子にごちそうできなかった上に、後輩にフォローまでされちゃったわ」
line = "「あらら。教え子にごちそうできなかった上に、後輩にフォローまでされちゃったわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「先輩の天然は今に始まったことじゃないですから」
line = "「先輩の天然は今に始まったことじゃないですから」"

[[dialogue]]
speaker = "エスメラルダ"
# 「私、そんなに天然かしら？」
line = "「私、そんなに天然かしら？」"

[[dialogue]]
speaker = "ウィステリア"
# 「そんなにです」
line = "「そんなにです」"

[[dialogue]]
speaker = "unk"
# ２人はどういう関係なんですか？
line = "２人はどういう関係なんですか？"

[[dialogue]]
speaker = "ウィステリア"
# 「流星学園の同窓生ってやつ。先輩は２学年上のクラスだったけど、なんだかんだ仲良くしてたわね」
line = "「流星学園の同窓生ってやつ。先輩は２学年上のクラスだったけど、なんだかんだ仲良くしてたわね」"

[[dialogue]]
speaker = "エスメラルダ"
# 「そうそう。キリカとウィステリアと３人で、仲良かったわよね～」
line = "「そうそう。キリカとウィステリアと３人で、仲良かったわよね～」"

[[dialogue]]
speaker = "ウィステリア"
# 「誤解です。私とキリカは仲良くないですから」
line = "「誤解です。私とキリカは仲良くないですから」"

[[dialogue]]
speaker = "エスメラルダ"
# 「え～？　いっつも２人でお喋りしてたじゃないの」
line = "「え～？　いっつも２人でお喋りしてたじゃないの」"

[[dialogue]]
speaker = "ウィステリア"
# 「あれが仲良く見えたのはエスメラルダ先輩だけです」
line = "「あれが仲良く見えたのはエスメラルダ先輩だけです」"

[[dialogue]]
speaker = "ウィステリア"
# 「エスメラルダ先輩は少し感受性がユニークというか、ずれてるというか……そのせいでびっくりするような失敗することもあるけど」
line = "「エスメラルダ先輩は少し感受性がユニークというか、ずれてるというか……そのせいでびっくりするような失敗することもあるけど」"

[[dialogue]]
speaker = "ウィステリア"
# 「分析官としてはとても優秀よ。頼りにしていいんじゃないかしら」
line = "「分析官としてはとても優秀よ。頼りにしていいんじゃないかしら」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ふふふ、ウィステリアに褒められちゃった♪」
line = "「ふふふ、ウィステリアに褒められちゃった♪」"

[[dialogue]]
speaker = "unk"
# （今のは褒めてないと思う）
line = "（今のは褒めてないと思う）"

[[dialogue]]
speaker = "ウィステリア"
# 「先輩の抜け方は本当にひどくて、財布を忘れるとか、お金が財布に入っていないとかしょっちゅうだし」
line = "「先輩の抜け方は本当にひどくて、財布を忘れるとか、お金が財布に入っていないとかしょっちゅうだし」"

[[dialogue]]
speaker = "ウィステリア"
# 「しかも研究してるとそればっかりになるのよね。ブラを付け忘れてたことも１度や２度じゃないし……」
line = "「しかも研究してるとそればっかりになるのよね。ブラを付け忘れてたことも１度や２度じゃないし……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「もう、ウィステリアってばー。ブラを忘れるなんて私でもしない──」
line = "「もう、ウィステリアってばー。ブラを忘れるなんて私でもしない──」"

[[dialogue]]
speaker = "エスメラルダ"
# 「……あれっ！？　着けてないっ！？」
line = "「……あれっ！？　着けてないっ！？」"

[[dialogue]]
speaker = "エスメラルダ"
# 「そういえば、研究室に置いてきたような……」
line = "「そういえば、研究室に置いてきたような……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「急いで取ってくるわねー、あははははー」
line = "「急いで取ってくるわねー、あははははー」"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁ。エスメラルダ先輩は相変わらずね……」
line = "「はぁ。エスメラルダ先輩は相変わらずね……」"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんは先輩と仲が良いみたいね。学校は違うけど、余裕がある時はフォローしてあげて」
line = "「会長くんは先輩と仲が良いみたいね。学校は違うけど、余裕がある時はフォローしてあげて」"

[[dialogue]]
speaker = "ウィステリア"
# 「しっかりしているのか抜けているのかわからないというか、両方なのがエスメラルダ先輩だから」
line = "「しっかりしているのか抜けているのかわからないというか、両方なのがエスメラルダ先輩だから」"

[[dialogue]]
speaker = "ウィステリア"
# 「後輩としては心配になっちゃうのよ。だからよろしくね、会長くん」
line = "「後輩としては心配になっちゃうのよ。だからよろしくね、会長くん」"
