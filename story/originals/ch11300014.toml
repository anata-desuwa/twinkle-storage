[[dialogue]]
speaker = "unk"
# 第４話,『初めて』を大切に,P
line = "第４話,『初めて』を大切に,P"

[[dialogue]]
speaker = "unk"
# ミヤハルと出会ってからしばらく経ち、仲良くなってきたある日のこと。
line = "ミヤハルと出会ってからしばらく経ち、仲良くなってきたある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺はミヤハルに誘われて、一緒に街へ出かけることになった――
line = "俺はミヤハルに誘われて、一緒に街へ出かけることになった――"

[[dialogue]]
speaker = "ミヤハル"
# 「会長はん、今日は来てくれて嬉しいわぁ<emoji=heart04>」
line = "「会長はん、今日は来てくれて嬉しいわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「えいっ<emoji=heart04>　ふふふっ<emoji=heart04>」
line = "「えいっ<emoji=heart04>　ふふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「これまで繰り返して来た甲斐あって、会長はん、腕に抱き着いても受け入れてくれるようになったなぁ<emoji=heart04>」
line = "「これまで繰り返して来た甲斐あって、会長はん、腕に抱き着いても受け入れてくれるようになったなぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 人前だと恥ずかしいけどね
line = "人前だと恥ずかしいけどね"

[[dialogue]]
speaker = "ミヤハル"
# 「せっかくやし今日は、手も繋ぎまひょ<emoji=heart04>」
line = "「せっかくやし今日は、手も繋ぎまひょ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「なんでかって？　ふふっ。だって、男女２人でこうして出かけたら、それは<b>デート</b>やろ？」
line = "「なんでかって？　ふふっ。だって、男女２人でこうして出かけたら、それは<b>デート</b>やろ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「せやから、こうして～<emoji=heart04>」
line = "「せやから、こうして～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 触れ合った手の指の間に、彼女の指が絡んで来て、俺はドキッとしてしまう。
line = "触れ合った手の指の間に、彼女の指が絡んで来て、俺はドキッとしてしまう。"

[[dialogue]]
speaker = "ミヤハル"
# 「ほら、指を絡めた恋人繋ぎ<emoji=heart04>　どうやろ？　ふふふっ<emoji=heart04>」
line = "「ほら、指を絡めた恋人繋ぎ<emoji=heart04>　どうやろ？　ふふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「会長はん、ちょっと熱っぽくなったりしてへん？」
line = "「会長はん、ちょっと熱っぽくなったりしてへん？」"

[[dialogue]]
speaker = "ミヤハル"
# 「もしあれなら――プランを変更して、うちの神社に行って、休んでくれてもええんよ？」
line = "「もしあれなら――プランを変更して、うちの神社に行って、休んでくれてもええんよ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「熱が収まるまで、うちがちゃあんと責任持って、介抱したるから<emoji=heart04>」
line = "「熱が収まるまで、うちがちゃあんと責任持って、介抱したるから<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「家でお休みデートプラン、うち的には悪くないんと思うんやけど、どうどす？」
line = "「家でお休みデートプラン、うち的には悪くないんと思うんやけど、どうどす？」"

[[dialogue]]
speaker = "unk"
# 耳元に唇を寄せて、囁いて来るミヤハル。
line = "耳元に唇を寄せて、囁いて来るミヤハル。"

[[dialogue]]
speaker = "unk"
# 俺は深呼吸をして、覚悟を決めて口を開く。
line = "俺は深呼吸をして、覚悟を決めて口を開く。"

[[dialogue]]
speaker = "unk"
# キミが本気なら、正直――俺はできる
line = "キミが本気なら、正直――俺はできる"

[[dialogue]]
speaker = "ミヤハル"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "unk"
# 俺はミヤハルと仲良くなって、今では魅力的に思っている。だから、そういうことは男として正直<b>したい</b>。だけど――
line = "俺はミヤハルと仲良くなって、今では魅力的に思っている。だから、そういうことは男として正直<b>したい</b>。だけど――"

[[dialogue]]
speaker = "unk"
# ミヤハルは『初めて』なんでしょ？
line = "ミヤハルは『初めて』なんでしょ？"

[[dialogue]]
speaker = "ミヤハル"
# 「――処女のうちが、このままあっさり経験しちゃうのは、もったいないんじゃないか、って……？」
line = "「――処女のうちが、このままあっさり経験しちゃうのは、もったいないんじゃないか、って……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「せっかくなら、もっとデートして、恋人同士になって、ロマンチックな初キスなんかしたり……？」
line = "「せっかくなら、もっとデートして、恋人同士になって、ロマンチックな初キスなんかしたり……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「全部の段階を踏んでから、初めてを経験する方が、もっとドキドキするし、気持ちいいはず……？」
line = "「全部の段階を踏んでから、初めてを経験する方が、もっとドキドキするし、気持ちいいはず……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「そないなこと……」
line = "「そないなこと……」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちはそういう、まどろっこしい流れとか、あんまり興味ないはずやのに……」
line = "「うちはそういう、まどろっこしい流れとか、あんまり興味ないはずやのに……」"

[[dialogue]]
speaker = "ミヤハル"
# 「なんか……今、変な気分になってるわ。うち――」
line = "「なんか……今、変な気分になってるわ。うち――」"

[[dialogue]]
speaker = "ミヤハル"
# 「えっちなことしようって言われてるわけやないのに、胸がドキドキして……<emoji=heart04>」
line = "「えっちなことしようって言われてるわけやないのに、胸がドキドキして……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 今日は初デートをしよう、ミヤハル
line = "今日は初デートをしよう、ミヤハル"

[[dialogue]]
speaker = "ミヤハル"
# 「んっ<emoji=heart04>　会長はんが、そこまで言うなら……<emoji=heart04>」
line = "「んっ<emoji=heart04>　会長はんが、そこまで言うなら……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ミヤハルは頬を染めながら、こくりと頷いてくれるのだった――
line = "ミヤハルは頬を染めながら、こくりと頷いてくれるのだった――"

[[dialogue]]
speaker = "unk"
# デートを開始した俺たちは、ゲームセンターに入っていた。
line = "デートを開始した俺たちは、ゲームセンターに入っていた。"

[[dialogue]]
speaker = "ミヤハル"
# 「ガンシューティングゲーム？　うち、こういうゲーム自体、あんまりやったことないんやけど……」
line = "「ガンシューティングゲーム？　うち、こういうゲーム自体、あんまりやったことないんやけど……」"

[[dialogue]]
speaker = "ミヤハル"
# 「――後ろに付いてレクチャーしてくれるん？　えっと……ゾンビを撃てばええんやよね？」
line = "「――後ろに付いてレクチャーしてくれるん？　えっと……ゾンビを撃てばええんやよね？」"

[[dialogue]]
speaker = "ミヤハル"
# 「こ、こう？　えいっ！」
line = "「こ、こう？　えいっ！」"

[[dialogue]]
speaker = "ミヤハル"
# 「アカン、弾切れや……！　銃のリロードってどうやったらええの？」
line = "「アカン、弾切れや……！　銃のリロードってどうやったらええの？」"

[[dialogue]]
speaker = "ミヤハル"
# 「あっ……倒した！　――ふふっ<emoji=heart04>　会長はんと一緒にくっ付いてゲームするの、結構ええかもしれへんね<emoji=heart04>」
line = "「あっ……倒した！　――ふふっ<emoji=heart04>　会長はんと一緒にくっ付いてゲームするの、結構ええかもしれへんね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから、スイーツのお店へ行き、一緒にケーキを食べることになって。
line = "それから、スイーツのお店へ行き、一緒にケーキを食べることになって。"

[[dialogue]]
speaker = "ミヤハル"
# 「会長はん、あ～ん<emoji=heart04>」
line = "「会長はん、あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# うん――美味しい
line = "うん――美味しい"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>　そんな満面の笑みで食べなはって……」
line = "「ふふっ<emoji=heart04>　そんな満面の笑みで食べなはって……」"

[[dialogue]]
speaker = "ミヤハル"
# 「――えっ？　今度はうちの番？」
line = "「――えっ？　今度はうちの番？」"

[[dialogue]]
speaker = "ミヤハル"
# 「あ、あ～ん<emoji=heart04>　あむっ……」
line = "「あ、あ～ん<emoji=heart04>　あむっ……」"

[[dialogue]]
speaker = "ミヤハル"
# 「こ、これされるの……なんか違う目で周りから見られて、恥ずかしいんやけど……」
line = "「こ、これされるの……なんか違う目で周りから見られて、恥ずかしいんやけど……」"

[[dialogue]]
speaker = "ミヤハル"
# 「でも……案外悪くあらへんかも……<emoji=heart04>」
line = "「でも……案外悪くあらへんかも……<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「もうこないな時間なんやね」
line = "「もうこないな時間なんやね」"

[[dialogue]]
speaker = "unk"
# 気付けばもう夕方になり、帰る時間になっていた。
line = "気付けばもう夕方になり、帰る時間になっていた。"

[[dialogue]]
speaker = "unk"
# 今日は楽しかった？
line = "今日は楽しかった？"

[[dialogue]]
speaker = "ミヤハル"
# 「ん<emoji=heart04>　……正直、こないにも楽しめるとは思ってへんかったわ」
line = "「ん<emoji=heart04>　……正直、こないにも楽しめるとは思ってへんかったわ」"

[[dialogue]]
speaker = "ミヤハル"
# 「それで……会長はん」
line = "「それで……会長はん」"

[[dialogue]]
speaker = "ミヤハル"
# 「今日はまだ、告白はしてくれへんの……？」
line = "「今日はまだ、告白はしてくれへんの……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ほら、デートが始まる前に、いろいろ言うてくれはりましたやろ？」
line = "「ほら、デートが始まる前に、いろいろ言うてくれはりましたやろ？」"

[[dialogue]]
speaker = "ミヤハル"
# 「……うちのこと、そういう目で見てくれてはるって、思うてもええんよね？」
line = "「……うちのこと、そういう目で見てくれてはるって、思うてもええんよね？」"

[[dialogue]]
speaker = "ミヤハル"
# 「――何回かデートして、お互いの相性を確かめてから……？」
line = "「――何回かデートして、お互いの相性を確かめてから……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「会長はん、いけずやわぁ<emoji=heart04>　そないな焦らしプレイをして来るなんて――」
line = "「会長はん、いけずやわぁ<emoji=heart04>　そないな焦らしプレイをして来るなんて――」"

[[dialogue]]
speaker = "ミヤハル"
# 「悪いお人なんやから<emoji=heart04>　もう……<emoji=heart04>」
line = "「悪いお人なんやから<emoji=heart04>　もう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 再び腕に抱き着いてきて、嬉しそうにそんなことを言うミヤハルなのだった――
line = "再び腕に抱き着いてきて、嬉しそうにそんなことを言うミヤハルなのだった――"
