# 「はぁ、はぁあっ……んんぅ、こんなに感じてくれると、もっともっと気持ち良くしてあげたくなっちゃう……んんっ<emoji=heart04>」
line = "「はぁ、はぁあっ……んんぅ、こんなに感じてくれると、もっともっと気持ち良くしてあげたくなっちゃう……んんっ<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ん、んんっ<emoji=heart04>　会長さんとえっち、すっごく、気持ち良くって……んんぁ、ぁっ、ぁっ、んんっ、ふぅっ<emoji=heart04>」
line = "「ん、んんっ<emoji=heart04>　会長さんとえっち、すっごく、気持ち良くって……んんぁ、ぁっ、ぁっ、んんっ、ふぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
# 「静かにえっちしなきゃいけないって、わかってるのに、んんっ、あっ<emoji=heart04>　ごめん、なさい、ぁっ<emoji=heart04>　ふぅ、んんっ、はぁっ、ああぁっ<emoji=heart04>」
