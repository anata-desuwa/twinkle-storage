# 「そう、よっ……<emoji=heart04>　先生だもの、んっ、ふっ、あっ<emoji=heart04>　生徒よりも詳しくないと、いけないでしょ<emoji=heart04>　んんっ、ふぅうっ<emoji=heart04>」
