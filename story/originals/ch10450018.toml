[[dialogue]]
speaker = "エスメラルダ"
# 「んっ、んっ、んんっ<emoji=heart04>　やっぱり<emoji=heart04>　速くした方がっ、んっ、おち○ちん、気持ち良さそうっ……ぁ、ぁっ、ぁっ<emoji=heart04>」
line = "「んっ、んっ、んんっ<emoji=heart04>　やっぱり<emoji=heart04>　速くした方がっ、んっ、おち○ちん、気持ち良さそうっ……ぁ、ぁっ、ぁっ<emoji=heart04>」"

[[dialogue]]
speaker = "エスメラルダ"
