[[dialogue]]
speaker = "unk"
# 第４話,エリスの願い,P
line = "第４話,エリスの願い,P"

[[dialogue]]
speaker = "unk"
# エリスと一緒に街で遊んだ別れ際。
line = "エリスと一緒に街で遊んだ別れ際。"

[[dialogue]]
speaker = "unk"
# 「私を口説いてくれませんか？」とお願いされて――
line = "「私を口説いてくれませんか？」とお願いされて――"

[[dialogue]]
speaker = "エリス"
# 「あっ、すみません、唐突なお願いで……」
line = "「あっ、すみません、唐突なお願いで……」"

[[dialogue]]
speaker = "エリス"
# 「どうしてこんなことをお願いしたかというと……父はフランス人で、母は元星騎士の天使だとお話したと思いますが……」
line = "「どうしてこんなことをお願いしたかというと……父はフランス人で、母は元星騎士の天使だとお話したと思いますが……」"

[[dialogue]]
speaker = "エリス"
# 「母が流星学園を卒業して、天界に帰る前に旅行をしている時、フランスを訪れた際に父に出会ったんです」
line = "「母が流星学園を卒業して、天界に帰る前に旅行をしている時、フランスを訪れた際に父に出会ったんです」"

[[dialogue]]
speaker = "エリス"
# 「父は母に一目惚れをして、普段の寡黙な様子からは想像できないくらい、それはもう積極的にアピールをしたそうです」
line = "「父は母に一目惚れをして、普段の寡黙な様子からは想像できないくらい、それはもう積極的にアピールをしたそうです」"

[[dialogue]]
speaker = "エリス"
# 「そんな思い出を語る母はとても幸せそうで、母から聞く父の言葉が情熱的で……いつしかそんな恋に憧れを持っていました」
line = "「そんな思い出を語る母はとても幸せそうで、母から聞く父の言葉が情熱的で……いつしかそんな恋に憧れを持っていました」"

[[dialogue]]
speaker = "エリス"
# 「風紀委員として、あまり表立って恋愛をするべきではないと思うのですが……憧れは捨てられなくて」
line = "「風紀委員として、あまり表立って恋愛をするべきではないと思うのですが……憧れは捨てられなくて」"

[[dialogue]]
speaker = "エリス"
# 「迷惑なのはわかっているんです。好きになってほしいとは言いません」
line = "「迷惑なのはわかっているんです。好きになってほしいとは言いません」"

[[dialogue]]
speaker = "エリス"
# 「ですから……真似事でいいので、少し付き合っていただけませんか？」
line = "「ですから……真似事でいいので、少し付き合っていただけませんか？」"

[[dialogue]]
speaker = "unk"
# 頑張ってみる
line = "頑張ってみる"

[[dialogue]]
speaker = "エリス"
# 「あ、ありがとうございます！」
line = "「あ、ありがとうございます！」"

[[dialogue]]
speaker = "エリス"
# 「でも少し時間が欲しい……？　は、はいっ、そうですよね、急でしたよね……ではその、よろしくお願いします……」
line = "「でも少し時間が欲しい……？　は、はいっ、そうですよね、急でしたよね……ではその、よろしくお願いします……」"

[[dialogue]]
speaker = "unk"
# そして一週間後――
line = "そして一週間後――"

[[dialogue]]
speaker = "エリス"
# 「こ、こんにちは……教室にあなたと私だけ、ですね……」
line = "「こ、こんにちは……教室にあなたと私だけ、ですね……」"

[[dialogue]]
speaker = "unk"
# いつ見ても綺麗だね
line = "いつ見ても綺麗だね"

[[dialogue]]
speaker = "エリス"
# 「い、いえ、私なんて……」
line = "「い、いえ、私なんて……」"

[[dialogue]]
speaker = "エリス"
# （一言だけなのに……とても胸がドキドキする……同性に言われた時とは違う……）
line = "（一言だけなのに……とても胸がドキドキする……同性に言われた時とは違う……）"

[[dialogue]]
speaker = "エリス"
# （あ……会長さんが近づいてくる……あの時の口紅を差しているのは、気付いてくれるでしょうか）
line = "（あ……会長さんが近づいてくる……あの時の口紅を差しているのは、気付いてくれるでしょうか）"

[[dialogue]]
speaker = "エリス"
# （会長さんがいつもより大きく見える……ううん、本当はこんなに大きかったんだ）
line = "（会長さんがいつもより大きく見える……ううん、本当はこんなに大きかったんだ）"

[[dialogue]]
speaker = "unk"
# 好きだよ
line = "好きだよ"

[[dialogue]]
speaker = "エリス"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "エリス"
# （会長さんが私を真っ直ぐ見つめる。少し見上げると視線が合う）
line = "（会長さんが私を真っ直ぐ見つめる。少し見上げると視線が合う）"

[[dialogue]]
speaker = "エリス"
# （真剣な表情。全身が緊張で強張る）
line = "（真剣な表情。全身が緊張で強張る）"

[[dialogue]]
speaker = "エリス"
# （胸が破裂しそうなくらい高鳴る）
line = "（胸が破裂しそうなくらい高鳴る）"

[[dialogue]]
speaker = "エリス"
# （この胸の音が彼に聞こえていたら、恥ずかしくて死んでしまいそう。だけど聞こえないのが寂しいとも思ってしまう）
line = "（この胸の音が彼に聞こえていたら、恥ずかしくて死んでしまいそう。だけど聞こえないのが寂しいとも思ってしまう）"

[[dialogue]]
speaker = "エリス"
# （貫くような鋭い視線が少し怖い。けれど私だけを見ているのが伝わってくる）
line = "（貫くような鋭い視線が少し怖い。けれど私だけを見ているのが伝わってくる）"

[[dialogue]]
speaker = "エリス"
# （会長さんが私の頬に手を添えて、会長さんの顔が近づいてきて……）
line = "（会長さんが私の頬に手を添えて、会長さんの顔が近づいてきて……）"

[[dialogue]]
speaker = "エリス"
# （！？　まさかこれはキ──）
line = "（！？　まさかこれはキ──）"

[[dialogue]]
speaker = "unk"
# 動かないで、エリス
line = "動かないで、エリス"

[[dialogue]]
speaker = "エリス"
# 「え、髪にゴミが……？　あ、そうなんですね……ありがとうございます……」
line = "「え、髪にゴミが……？　あ、そうなんですね……ありがとうございます……」"

[[dialogue]]
speaker = "エリス"
# 「ああいえ、会長さんが悪いわけではないんです。むしろ逆というか、ドキドキしすぎてしまって――」
line = "「ああいえ、会長さんが悪いわけではないんです。むしろ逆というか、ドキドキしすぎてしまって――」"

[[dialogue]]
speaker = "エリス"
# 「なな、何でもないです！　ちゃんと恋愛をしたことのない私には早かったみたいですね、あははは……」
line = "「なな、何でもないです！　ちゃんと恋愛をしたことのない私には早かったみたいですね、あははは……」"

[[dialogue]]
speaker = "エリス"
# 「父に口説かれた時の母はこんな気持ちだったのでしょうか？　うーん……実際に口説かれてみてもわかりませんね……」
line = "「父に口説かれた時の母はこんな気持ちだったのでしょうか？　うーん……実際に口説かれてみてもわかりませんね……」"

[[dialogue]]
speaker = "unk"
# 両親のことが本当に好きなんだな
line = "両親のことが本当に好きなんだな"

[[dialogue]]
speaker = "エリス"
# 「そうですね。父も母も私を愛してくれています。私も２人が大好きです」
line = "「そうですね。父も母も私を愛してくれています。私も２人が大好きです」"

[[dialogue]]
speaker = "エリス"
# 「思えば、私は証明したいのかもしれません。愛する両親の娘にふさわしいと」
line = "「思えば、私は証明したいのかもしれません。愛する両親の娘にふさわしいと」"

[[dialogue]]
speaker = "エリス"
# 「父は幼い頃から私に責務を教え、勉学のみならず護身術や剣術も学ばせました。だけどそれは私を想ってのことです。厳しくて優しい人なんです」
line = "「父は幼い頃から私に責務を教え、勉学のみならず護身術や剣術も学ばせました。だけどそれは私を想ってのことです。厳しくて優しい人なんです」"

[[dialogue]]
speaker = "エリス"
# 「富や力は欲しいままに貪るためではなく、世界をより良くするために与えられたもの」
line = "「富や力は欲しいままに貪るためではなく、世界をより良くするために与えられたもの」"

[[dialogue]]
speaker = "エリス"
# 「その責務を果たしてこそ真に高貴なる者たりえると、私はそう思っています」
line = "「その責務を果たしてこそ真に高貴なる者たりえると、私はそう思っています」"

[[dialogue]]
speaker = "エリス"
# 「母は星騎士だった頃の話をよく語ってくれました。楽しかったこと、嬉しかったこと……それだけじゃなくて辛かったことや苦しかったことも」
line = "「母は星騎士だった頃の話をよく語ってくれました。楽しかったこと、嬉しかったこと……それだけじゃなくて辛かったことや苦しかったことも」"

[[dialogue]]
speaker = "エリス"
# 「まぶたを閉じると、星騎士だった母の姿を思い浮かべることができます」
line = "「まぶたを閉じると、星騎士だった母の姿を思い浮かべることができます」"

[[dialogue]]
speaker = "エリス"
# 「私が星騎士になるのはきっと必然だったのでしょう」
line = "「私が星騎士になるのはきっと必然だったのでしょう」"

[[dialogue]]
speaker = "エリス"
# 「ノブレス・オブリージュ――父が私に教えた高貴なる者の責務。その責務を果たす者こそ、母が語って聞かせた星騎士なのだと思います」
line = "「ノブレス・オブリージュ――父が私に教えた高貴なる者の責務。その責務を果たす者こそ、母が語って聞かせた星騎士なのだと思います」"

[[dialogue]]
speaker = "エリス"
# 「いつかは伴侶を得て、２人のような夫婦になりたいです。もちろん少し遠い将来の話ですけど」
line = "「いつかは伴侶を得て、２人のような夫婦になりたいです。もちろん少し遠い将来の話ですけど」"

[[dialogue]]
speaker = "エリス"
# 「そのためにはリクリエを防いで世界を守らないといけませんね」
line = "「そのためにはリクリエを防いで世界を守らないといけませんね」"

[[dialogue]]
speaker = "エリス"
# 「今日の続きは……またいつかお願いします、会長さん」
line = "「今日の続きは……またいつかお願いします、会長さん」"
