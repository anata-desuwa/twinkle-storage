[[dialogue]]
speaker = "unk"
# 第３話,ぴとっとソフィア,P
line = "第３話,ぴとっとソフィア,P"

[[dialogue]]
speaker = "リップル"
# 「フー……なかなか困りましたデスね。例の隙間風はまだ元気ハツラツのようデース」
line = "「フー……なかなか困りましたデスね。例の隙間風はまだ元気ハツラツのようデース」"

[[dialogue]]
speaker = "unk"
# リゾート結界に時おり訪れる『隙間風』は、未だ解決を見ていなかった。
line = "リゾート結界に時おり訪れる『隙間風』は、未だ解決を見ていなかった。"

[[dialogue]]
speaker = "ソフィア"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "unk"
# 何してるの？
line = "何してるの？"

[[dialogue]]
speaker = "unk"
# ソフィア？
line = "ソフィア？"

[[dialogue]]
speaker = "ソフィア"
# 「風よけです。また、いつあの極寒の風が吹くやらわかりませんから。会長さんの後ろに隠れることで、寒波をやり過ごせるというわけです」
line = "「風よけです。また、いつあの極寒の風が吹くやらわかりませんから。会長さんの後ろに隠れることで、寒波をやり過ごせるというわけです」"

[[dialogue]]
speaker = "unk"
# 密着してない？
line = "密着してない？"

[[dialogue]]
speaker = "unk"
# 風よけっていうか
line = "風よけっていうか"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんを風よけにしつつ、私は人肌で温もりをチャージ！　ん～、実にホット……これぞ一挙両得の戦法というわけです」
line = "「会長さんを風よけにしつつ、私は人肌で温もりをチャージ！　ん～、実にホット……これぞ一挙両得の戦法というわけです」"

[[dialogue]]
speaker = "ソフィア"
# 「それに──ふふ。会長さんだって、水着の私に釘付けだったじゃありませんか。わかっちゃうんですからね、そういうの」
line = "「それに──ふふ。会長さんだって、水着の私に釘付けだったじゃありませんか。わかっちゃうんですからね、そういうの」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんは、寒さに凍える私を見捨てたりしませんよね……？」
line = "「会長さんは、寒さに凍える私を見捨てたりしませんよね……？」"

[[dialogue]]
speaker = "ユウリ"
# 「おーい、ソフィア──って……何やってんだ？　２人でぴったりくっついて」
line = "「おーい、ソフィア──って……何やってんだ？　２人でぴったりくっついて」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんが、どうしても人肌が恋しいと。仕方ないので私がくっついてあげているのです。むふふ」
line = "「会長さんが、どうしても人肌が恋しいと。仕方ないので私がくっついてあげているのです。むふふ」"

[[dialogue]]
speaker = "unk"
# 実はそう
line = "実はそう"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "ユウリ"
# 「ホントか？　会長のほう、驚いた顔してたけど……」
line = "「ホントか？　会長のほう、驚いた顔してたけど……」"

[[dialogue]]
speaker = "ユウリ"
# 「ま、仲が良いのはいいことか。おまえ達見てたら、あたしのほうもなんか熱くなってきちまったよ」
line = "「ま、仲が良いのはいいことか。おまえ達見てたら、あたしのほうもなんか熱くなってきちまったよ」"

[[dialogue]]
speaker = "ルリエル"
# 「あーっ！　ソフィアと会長さんが２人でいちゃいちゃしてますーっ、ここの日差しよりもアチアチですーっ！」
line = "「あーっ！　ソフィアと会長さんが２人でいちゃいちゃしてますーっ、ここの日差しよりもアチアチですーっ！」"

[[dialogue]]
speaker = "アポロ"
# 「ソフィアめ。あたしと変わんないくらいの背のくせに、もう大人の階段を昇ってんのか」
line = "「ソフィアめ。あたしと変わんないくらいの背のくせに、もう大人の階段を昇ってんのか」"

[[dialogue]]
speaker = "ソフィア"
# 「まあ私は大人の女性ですが……そ、そんなに注目されると少しばかり恥ずかしいですね」
line = "「まあ私は大人の女性ですが……そ、そんなに注目されると少しばかり恥ずかしいですね」"

[[dialogue]]
speaker = "ソフィア"
# 「これはいちゃいちゃしたくてくっついているわけではないのです。あくまで寒さを凌ぐため、そうですよね会長さん？」
line = "「これはいちゃいちゃしたくてくっついているわけではないのです。あくまで寒さを凌ぐため、そうですよね会長さん？」"

[[dialogue]]
speaker = "ソフィア"
# 「ほらほら、もっとしっかり引っ付いて、風よけとしての役目を果たしてください」
line = "「ほらほら、もっとしっかり引っ付いて、風よけとしての役目を果たしてください」"

[[dialogue]]
speaker = "unk"
# こうすればあったかい？
line = "こうすればあったかい？"

[[dialogue]]
speaker = "unk"
# それならいっそ……
line = "それならいっそ……"

[[dialogue]]
speaker = "ソフィア"
# 「な……！！」
line = "「な……！！」"

[[dialogue]]
speaker = "ソフィア"
# 「ななな、なんでいきなり抱きしめたりしてきて……！」
line = "「ななな、なんでいきなり抱きしめたりしてきて……！」"

[[dialogue]]
speaker = "ソフィア"
# 「う……それは、抱きしめてもらっていたほうが温かいですけど……」
line = "「う……それは、抱きしめてもらっていたほうが温かいですけど……」"

[[dialogue]]
speaker = "ソフィア"
# 「で、でもっ！　みんなが見ている前で恥ずかしすぎます！　離れてください！」
line = "「で、でもっ！　みんなが見ている前で恥ずかしすぎます！　離れてください！」"

[[dialogue]]
speaker = "ソフィア"
# 「ううっ、ブルブル！　や、やっぱりダメです！　離れないで、ギュッてしててください！」
line = "「ううっ、ブルブル！　や、やっぱりダメです！　離れないで、ギュッてしててください！」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、なによ～。やってること、やっぱイチャイチャじゃん♪」
line = "「あはは、なによ～。やってること、やっぱイチャイチャじゃん♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ。２人とも微笑ましいわ」
line = "「ふふ。２人とも微笑ましいわ」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、姉さん」
line = "「あ、姉さん」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィと会長くんが仲が良いのは何よりだけれど……私としては、少し妬けちゃうわね。妹の成長って意味でも」
line = "「ソフィと会長くんが仲が良いのは何よりだけれど……私としては、少し妬けちゃうわね。妹の成長って意味でも」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふん。私だっていつまでも子どもではないのです」
line = "「ふふん。私だっていつまでも子どもではないのです」"

[[dialogue]]
speaker = "ユウリ"
# 「……つかさ。今さらかもしんねーけど──サーシャさんの水着姿、やっぱ破壊力がすごいよな」
line = "「……つかさ。今さらかもしんねーけど──サーシャさんの水着姿、やっぱ破壊力がすごいよな」"

[[dialogue]]
speaker = "アポロ"
# 「わかるぞ。あれこそ大人のナイスバディーって感じだ。あたしも成長したらああならねーかな……？」
line = "「わかるぞ。あれこそ大人のナイスバディーって感じだ。あたしも成長したらああならねーかな……？」"

[[dialogue]]
speaker = "ルリエル"
# 「ごく……ど、どんな感触なんでしょうね？　女としてもちょっと気になると申しますか……」
line = "「ごく……ど、どんな感触なんでしょうね？　女としてもちょっと気になると申しますか……」"

[[dialogue]]
speaker = "サーシャ"
# 「もう。女の子がそんなこと言うものじゃないわよ」
line = "「もう。女の子がそんなこと言うものじゃないわよ」"

[[dialogue]]
speaker = "unk"
# サーシャさんはすごい
line = "サーシャさんはすごい"

[[dialogue]]
speaker = "unk"
# 確かに……
line = "確かに……"

[[dialogue]]
speaker = "ソフィア"
# 「く……姉さんの水着……！　身内にここまで強力な伏兵が潜んでいたとは……！」
line = "「く……姉さんの水着……！　身内にここまで強力な伏兵が潜んでいたとは……！」"

[[dialogue]]
speaker = "ソフィア"
# 「も、もうっ！　メッ、です！　まじまじと見てはいけません──あんなハレンチなカラダ！」
line = "「も、もうっ！　メッ、です！　まじまじと見てはいけません──あんなハレンチなカラダ！」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんのことをハレンチ呼ばわりだなんて。傷つくわ～、ソフィ……」
line = "「お姉ちゃんのことをハレンチ呼ばわりだなんて。傷つくわ～、ソフィ……」"

[[dialogue]]
speaker = "ソフィア"
# 「だ、だって、そのボリュームは反則すぎます……！」
line = "「だ、だって、そのボリュームは反則すぎます……！」"

[[dialogue]]
speaker = "ユウリ"
# （ま、どっちもいい関係ってとこか）
line = "（ま、どっちもいい関係ってとこか）"

[[dialogue]]
speaker = "ルリエル"
# （ソフィア、楽しそうです！）
line = "（ソフィア、楽しそうです！）"

[[dialogue]]
speaker = "unk"
# そんなこんなで、リゾートの午後は過ぎていった……。
line = "そんなこんなで、リゾートの午後は過ぎていった……。"
