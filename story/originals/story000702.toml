[[dialogue]]
speaker = "unk"
# サーシャさんとソフィアを、姉妹一緒に初詣へ行かせたいというウズメイア。俺とヴィーナスは、彼女から事情を聞くことにした。
line = "サーシャさんとソフィアを、姉妹一緒に初詣へ行かせたいというウズメイア。俺とヴィーナスは、彼女から事情を聞くことにした。"

[[dialogue]]
speaker = "ヴィーナス"
# 「――ふむふむ、ソフィアがそんなことを言っていたのね」
line = "「――ふむふむ、ソフィアがそんなことを言っていたのね」"

[[dialogue]]
speaker = "ウズメイア"
# 「はい。サーシャ先輩と初詣に行く気はないって」
line = "「はい。サーシャ先輩と初詣に行く気はないって」"

[[dialogue]]
speaker = "ウズメイア"
# 「でも、あたしとしては、ソフィアが意地を張ってるように見えるというか。なにより、もったいないって感じちゃうんですよ！」
line = "「でも、あたしとしては、ソフィアが意地を張ってるように見えるというか。なにより、もったいないって感じちゃうんですよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もったいない？」
line = "「もったいない？」"

[[dialogue]]
speaker = "ウズメイア"
# 「だって、家族が会いに行ける距離にいて、一緒に過ごせるのって幸せなことじゃないですか～」
line = "「だって、家族が会いに行ける距離にいて、一緒に過ごせるのって幸せなことじゃないですか～」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしは天使で、今は天界にいる家族と離れて、寮暮らしをしてるので……」
line = "「あたしは天使で、今は天界にいる家族と離れて、寮暮らしをしてるので……」"

[[dialogue]]
speaker = "ウズメイア"
# 「それにソフィアは、お姉さんと仲良くないって言いますけど、本当は仲良くしたいって、顔を見ればわかります」
line = "「それにソフィアは、お姉さんと仲良くないって言いますけど、本当は仲良くしたいって、顔を見ればわかります」"

[[dialogue]]
speaker = "ウズメイア"
# 「それくらいにはちゃんと<b>親友</b>だと、あたしは思ってますから。……まあ、ソフィアがあたしをどう思ってるのかは、わからないんですけど！」
line = "「それくらいにはちゃんと<b>親友</b>だと、あたしは思ってますから。……まあ、ソフィアがあたしをどう思ってるのかは、わからないんですけど！」"

[[dialogue]]
speaker = "unk"
# ウズメイアは友達想いなんだな
line = "ウズメイアは友達想いなんだな"

[[dialogue]]
speaker = "ウズメイア"
# 「あはは♪　どうなんですかね～。お節介かもって、正直自分で思ったりもするんですけど……でも」
line = "「あはは♪　どうなんですかね～。お節介かもって、正直自分で思ったりもするんですけど……でも」"

[[dialogue]]
speaker = "ウズメイア"
# 「見て見ぬフリするのも、友達として違うかなって思ったんで。それにほら、もうすぐ新年を迎えるわけだし！」
line = "「見て見ぬフリするのも、友達として違うかなって思ったんで。それにほら、もうすぐ新年を迎えるわけだし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「そこで心機一転、来年は姉妹仲良くできたら素敵じゃん！　的な？」
line = "「そこで心機一転、来年は姉妹仲良くできたら素敵じゃん！　的な？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわね！　確かにその通りだわ！」
line = "「いいわね！　確かにその通りだわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたはすごく素敵な天使よ、ウズメ。それで、ソフィアとサーシャさんのことだけど――」
line = "「あなたはすごく素敵な天使よ、ウズメ。それで、ソフィアとサーシャさんのことだけど――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私も喜んで協力するわ！　任せなさい！」
line = "「私も喜んで協力するわ！　任せなさい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで、ひとっ走り行ってくるわ！　クロト、ウズメのことをよろしく！」
line = "「というわけで、ひとっ走り行ってくるわ！　クロト、ウズメのことをよろしく！」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ！？　ちょっ、ヴィーナス先輩！？　いきなり走り出してどこへ！？」
line = "「えっ！？　ちょっ、ヴィーナス先輩！？　いきなり走り出してどこへ！？」"

[[dialogue]]
speaker = "unk"
# いつものことなんで大丈夫
line = "いつものことなんで大丈夫"

[[dialogue]]
speaker = "ウズメイア"
# 「なんか会長さんは、落ち着いてるし！」
line = "「なんか会長さんは、落ち着いてるし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「――え？　ＤＩＳＣの連絡先を交換してもいいか？」
line = "「――え？　ＤＩＳＣの連絡先を交換してもいいか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「会長さんも協力してくれるんですか？　……ありがとうございます！」
line = "「会長さんも協力してくれるんですか？　……ありがとうございます！」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヴィーナス先輩の行方は気になりますけど、改めて、よろしくお願いしますね♪」
line = "「ヴィーナス先輩の行方は気になりますけど、改めて、よろしくお願いしますね♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「それと、個人的にも、新星の会長さんとは友達になりたいなって思っていたんで、これから仲良くしてもらえると嬉しいです！」
line = "「それと、個人的にも、新星の会長さんとは友達になりたいなって思っていたんで、これから仲良くしてもらえると嬉しいです！」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしのことは是非、<b>ウズメ</b>って呼んで下さい♪　この国の愛称っぽいので、気に入ってるんです～」
line = "「あたしのことは是非、<b>ウズメ</b>って呼んで下さい♪　この国の愛称っぽいので、気に入ってるんです～」"

[[dialogue]]
speaker = "unk"
# 俺はそうして、新たな友人のウズメと、握手を交わすのだった。
line = "俺はそうして、新たな友人のウズメと、握手を交わすのだった。"

[[dialogue]]
speaker = "unk"
# 一方、その頃――
line = "一方、その頃――"

[[dialogue]]
speaker = "ソフィア"
# 「ふむ……」
line = "「ふむ……」"

[[dialogue]]
speaker = "ソフィア"
# （ウズメさん、なかなか部屋にこないし、連絡もないので探しにきましたが、いないですね……。なにかあったんでしょうか……？）
line = "（ウズメさん、なかなか部屋にこないし、連絡もないので探しにきましたが、いないですね……。なにかあったんでしょうか……？）"

[[dialogue]]
speaker = "？？？"
# 「ソ～フィ～ア～……！」
line = "「ソ～フィ～ア～……！」"

[[dialogue]]
speaker = "ソフィア"
# 「え？　この声は……！？」
line = "「え？　この声は……！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「見つけたわ！」
line = "「見つけたわ！」"

[[dialogue]]
speaker = "ソフィア"
# 「び、ヴィーナスさん？　どうしたんですか、すごい勢いで走ってきたりして……」
line = "「び、ヴィーナスさん？　どうしたんですか、すごい勢いで走ってきたりして……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こんにちは、ソフィア！　いきなりだけど、フィクサーとして、あなたに命令するわ！」
line = "「こんにちは、ソフィア！　いきなりだけど、フィクサーとして、あなたに命令するわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今度のお正月、サーシャさんと決闘しなさい！！」
line = "「今度のお正月、サーシャさんと決闘しなさい！！」"

[[dialogue]]
speaker = "ソフィア"
# 「どういうことです！？」
line = "「どういうことです！？」"

[[dialogue]]
speaker = "unk"
# 突然の提案に、ソフィアは目を白黒させてしまうのだった――
line = "突然の提案に、ソフィアは目を白黒させてしまうのだった――"
