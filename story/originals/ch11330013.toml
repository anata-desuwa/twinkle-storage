[[dialogue]]
speaker = "unk"
# 第３話,リィベルの図書館観察日記,P
line = "第３話,リィベルの図書館観察日記,P"

[[dialogue]]
speaker = "unk"
# 放課後、リィベルは図書委員の仕事をするため、受付カウンターに座っていた。
line = "放課後、リィベルは図書委員の仕事をするため、受付カウンターに座っていた。"

[[dialogue]]
speaker = "リィベル"
# （今日の利用者は……）
line = "（今日の利用者は……）"

[[dialogue]]
speaker = "リィベル"
# （百合崎ミア……風紀委員の１年生。読んでいるのは……）
line = "（百合崎ミア……風紀委員の１年生。読んでいるのは……）"

[[dialogue]]
speaker = "ミア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "リィベル"
# （熟語の辞典？　ずいぶん殊勝なものを読んでいるのね。……でも、その陰に隠れているのは……）
line = "（熟語の辞典？　ずいぶん殊勝なものを読んでいるのね。……でも、その陰に隠れているのは……）"

[[dialogue]]
speaker = "ミア"
# 「！　あの……リィベルさん、私の顔に何か付いてる？」
line = "「！　あの……リィベルさん、私の顔に何か付いてる？」"

[[dialogue]]
speaker = "リィベル"
# 「いいえ。珍しい本を読んでいると思っただけよ」
line = "「いいえ。珍しい本を読んでいると思っただけよ」"

[[dialogue]]
speaker = "ミア"
# 「え！？　え、あ、えっと……あ、この熟語辞典のこと？」
line = "「え！？　え、あ、えっと……あ、この熟語辞典のこと？」"

[[dialogue]]
speaker = "ミア"
# 「これは、難しい言葉を知っていれば子どもっぽく見られないと思って……最初はそんな理由だったけど、今は純粋に勉強するのが楽しいの」
line = "「これは、難しい言葉を知っていれば子どもっぽく見られないと思って……最初はそんな理由だったけど、今は純粋に勉強するのが楽しいの」"

[[dialogue]]
speaker = "ミア"
# 「知ってる？　言葉にもいろんな由来や歴史があるの。それが面白くて」
line = "「知ってる？　言葉にもいろんな由来や歴史があるの。それが面白くて」"

[[dialogue]]
speaker = "リィベル"
# 「ええ、そうね……知識は世界を豊かにしてくれるものよ」
line = "「ええ、そうね……知識は世界を豊かにしてくれるものよ」"

[[dialogue]]
speaker = "リィベル"
# （微笑ましい動機ね……）
line = "（微笑ましい動機ね……）"

[[dialogue]]
speaker = "リィベル"
# （けれどそれとは裏腹に、その手で隠したのは、男性同士の情愛を描いたドギツい小説）
line = "（けれどそれとは裏腹に、その手で隠したのは、男性同士の情愛を描いたドギツい小説）"

[[dialogue]]
speaker = "ミア"
# 「リィベルさん？　こっちをじっと見てどうしたの？」
line = "「リィベルさん？　こっちをじっと見てどうしたの？」"

[[dialogue]]
speaker = "リィベル"
# 「……いえ、何でもないわ」
line = "「……いえ、何でもないわ」"

[[dialogue]]
speaker = "リィベル"
# （モネなら嬉々として同じジャンルの本をオススメしそうだけど、私は見なかったことにするわ。不用意に踏み込まないのも図書委員の務めよ）
line = "（モネなら嬉々として同じジャンルの本をオススメしそうだけど、私は見なかったことにするわ。不用意に踏み込まないのも図書委員の務めよ）"

[[dialogue]]
speaker = "ミア"
# 「じゃ、私行くわね」
line = "「じゃ、私行くわね」"

[[dialogue]]
speaker = "リィベル"
# 「ええ、また来るといいわ」
line = "「ええ、また来るといいわ」"

[[dialogue]]
speaker = "リィベル"
# （他には……）
line = "（他には……）"

[[dialogue]]
speaker = "ヨミ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "リィベル"
# （天ヶ崎ヨミ。九浄家メイド隊の１人にして、自称クエスト受付嬢）
line = "（天ヶ崎ヨミ。九浄家メイド隊の１人にして、自称クエスト受付嬢）"

[[dialogue]]
speaker = "ヨミ"
# 「おや、リィベルさん。こんにちは」
line = "「おや、リィベルさん。こんにちは」"

[[dialogue]]
speaker = "リィベル"
# 「ええ。何を読んでいたの？」
line = "「ええ。何を読んでいたの？」"

[[dialogue]]
speaker = "ヨミ"
# 「これですか？　筋トレの本です」
line = "「これですか？　筋トレの本です」"

[[dialogue]]
speaker = "リィベル"
# 「あなたが筋トレ？　少し意外ね」
line = "「あなたが筋トレ？　少し意外ね」"

[[dialogue]]
speaker = "ヨミ"
# 「あはは……よく言われます。でも、メイドのお仕事にも巫女舞にも体力は不可欠ですからね。体は鍛えて損なしです」
line = "「あはは……よく言われます。でも、メイドのお仕事にも巫女舞にも体力は不可欠ですからね。体は鍛えて損なしです」"

[[dialogue]]
speaker = "リィベル"
# 「まぁ、それはそう」
line = "「まぁ、それはそう」"

[[dialogue]]
speaker = "ヨミ"
# 「でも、最近はやり方が合っていない気がして……こうして筋トレの勉強をしているんです」
line = "「でも、最近はやり方が合っていない気がして……こうして筋トレの勉強をしているんです」"

[[dialogue]]
speaker = "リィベル"
# 「間違ったやり方で時間を無駄にしていないか不安なのね。……ならいっそ全部試せばいいんじゃないかしら」
line = "「間違ったやり方で時間を無駄にしていないか不安なのね。……ならいっそ全部試せばいいんじゃないかしら」"

[[dialogue]]
speaker = "ヨミ"
# 「えぇ！？　全部ですか！？」
line = "「えぇ！？　全部ですか！？」"

[[dialogue]]
speaker = "リィベル"
# 「多少間違ったって最終的に合ったやり方が見つかればいいのよ。失敗は成功のもと、とよく言うでしょう」
line = "「多少間違ったって最終的に合ったやり方が見つかればいいのよ。失敗は成功のもと、とよく言うでしょう」"

[[dialogue]]
speaker = "ヨミ"
# 「そうですね！　うじうじ考えるより、まずはやってみます！」
line = "「そうですね！　うじうじ考えるより、まずはやってみます！」"

[[dialogue]]
speaker = "リィベル"
# 「ええ、それがいいわ。でも本の延滞だけは気を付けるように。でないと怖い取り立て屋が来るわよ」
line = "「ええ、それがいいわ。でも本の延滞だけは気を付けるように。でないと怖い取り立て屋が来るわよ」"

[[dialogue]]
speaker = "ヨミ"
# 「モネ先輩ですね……はい、気を付けます。今日はありがとうございました。爆裂感謝です！」
line = "「モネ先輩ですね……はい、気を付けます。今日はありがとうございました。爆裂感謝です！」"

[[dialogue]]
speaker = "リィベル"
# 「ええ、うまくいくといいわね」
line = "「ええ、うまくいくといいわね」"

[[dialogue]]
speaker = "リィベル"
# （あれは……）
line = "（あれは……）"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "リィベル"
# 「何かお探しかしら？」
line = "「何かお探しかしら？」"

[[dialogue]]
speaker = "梨緒"
# 「探し物ではなくて……書架を見ていたら、つい懐かしくなって………」
line = "「探し物ではなくて……書架を見ていたら、つい懐かしくなって………」"

[[dialogue]]
speaker = "梨緒"
# 「私の世界の新星学園を思い出して……いや、君に言っても詮無いことだな。すまない。邪魔なら立ち去るよ」
line = "「私の世界の新星学園を思い出して……いや、君に言っても詮無いことだな。すまない。邪魔なら立ち去るよ」"

[[dialogue]]
speaker = "リィベル"
# 「そうは言っていないでしょう。ところで、この前の図書館便りに寄稿されたポエム、あなたのでしょう？」
line = "「そうは言っていないでしょう。ところで、この前の図書館便りに寄稿されたポエム、あなたのでしょう？」"

[[dialogue]]
speaker = "梨緒"
# 「っ！　出すのを見ていたのか！？」
line = "「っ！　出すのを見ていたのか！？」"

[[dialogue]]
speaker = "リィベル"
# 「いいえ。でもわざわざ英語の詩を出すなんて、あなたぐらいしかいないでしょう？」
line = "「いいえ。でもわざわざ英語の詩を出すなんて、あなたぐらいしかいないでしょう？」"

[[dialogue]]
speaker = "梨緒"
# 「そう言われればそうだった！？」
line = "「そう言われればそうだった！？」"

[[dialogue]]
speaker = "リィベル"
# 「冗談よ」
line = "「冗談よ」"

[[dialogue]]
speaker = "リィベル"
# 「読んでみて、なんとなくあなただとわかったわ。軽率に気持ちが分かるとは言わないけど、私も多くの滅びを見てきたから」
line = "「読んでみて、なんとなくあなただとわかったわ。軽率に気持ちが分かるとは言わないけど、私も多くの滅びを見てきたから」"

[[dialogue]]
speaker = "リィベル"
# 「あなたのポエム、私は好きよ。また投稿しに来て」
line = "「あなたのポエム、私は好きよ。また投稿しに来て」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ、ありがとう」
line = "「……ああ、ありがとう」"

[[dialogue]]
speaker = "unk"
# 図書委員の活動を通して、リィベルは新星学園の星騎士たちを知っていく。
line = "図書委員の活動を通して、リィベルは新星学園の星騎士たちを知っていく。"

[[dialogue]]
speaker = "unk"
# リィベルは今日も明日も、図書館で彼女たちを見守っている。
line = "リィベルは今日も明日も、図書館で彼女たちを見守っている。"

[[dialogue]]
speaker = "リィベル"
# （じーー……）
line = "（じーー……）"
