[[dialogue]]
speaker = "unk"
# 第４話,フィオナの味方,P
line = "第４話,フィオナの味方,P"

[[dialogue]]
speaker = "フィオナ"
# 「この街はアニメや漫画のお店が多いと聞いていましたが、モンスターやアステラの対応以外で訪れたのは初めてです」
line = "「この街はアニメや漫画のお店が多いと聞いていましたが、モンスターやアステラの対応以外で訪れたのは初めてです」"

[[dialogue]]
speaker = "フィオナ"
# 「こうして見回すと本当にショップがたくさん……いろんなお店があるのですね」
line = "「こうして見回すと本当にショップがたくさん……いろんなお店があるのですね」"

[[dialogue]]
speaker = "フィオナ"
# 「この前は私ばかり語ってしまいましたけど、緋宮会長はあの漫画ではどのキャラクターがお好きですか？」
line = "「この前は私ばかり語ってしまいましたけど、緋宮会長はあの漫画ではどのキャラクターがお好きですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふむふむ……緋宮会長はあの作品では親友キャラがお好きなんですね。いつもは小心者だけど優しくて、でもいざという時は勇気を振り絞って……私も好きです」
line = "「ふむふむ……緋宮会長はあの作品では親友キャラがお好きなんですね。いつもは小心者だけど優しくて、でもいざという時は勇気を振り絞って……私も好きです」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長のベストバトルはどれですか？　私は悪に堕ちて怪人になったライバルとの最後の一戦ですね」
line = "「緋宮会長のベストバトルはどれですか？　私は悪に堕ちて怪人になったライバルとの最後の一戦ですね」"

[[dialogue]]
speaker = "フィオナ"
# 「互いを認めながらも怒りを捨てきれず、傷つけあって……胸が痛くなる戦いでした」
line = "「互いを認めながらも怒りを捨てきれず、傷つけあって……胸が痛くなる戦いでした」"

[[dialogue]]
speaker = "フィオナ"
# 「でも全力でぶつかり合うことで理解し合えた。素晴らしい決着でした。……緋宮会長も同じですか？　嬉しいですっ」
line = "「でも全力でぶつかり合うことで理解し合えた。素晴らしい決着でした。……緋宮会長も同じですか？　嬉しいですっ」"

[[dialogue]]
speaker = "unk"
# お店に入って見てみる？
line = "お店に入って見てみる？"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、私はグッズとかよくわからないもので……それに教皇の一人娘で流星学園の星徒会長ですから、私を知っている人もいるかもしれません」
line = "「いえ、私はグッズとかよくわからないもので……それに教皇の一人娘で流星学園の星徒会長ですから、私を知っている人もいるかもしれません」"

[[dialogue]]
speaker = "フィオナ"
# 「目立つかもしれませんし、こうして遠巻きに見ているだけでも楽しいですからお気になさらず……あれ、どちらに行かれるのですか？」
line = "「目立つかもしれませんし、こうして遠巻きに見ているだけでも楽しいですからお気になさらず……あれ、どちらに行かれるのですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「何を買っていたのですか？」
line = "「何を買っていたのですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「！　それは第五巻の限定版に付属していたマスコットキーホルダー！　これを私に……？」
line = "「！　それは第五巻の限定版に付属していたマスコットキーホルダー！　これを私に……？」"

[[dialogue]]
speaker = "フィオナ"
# 「まだ売っているところがあったんですか？　あ、リサイクルショップもこの街にはあるのですね、なるほど」
line = "「まだ売っているところがあったんですか？　あ、リサイクルショップもこの街にはあるのですね、なるほど」"

[[dialogue]]
speaker = "フィオナ"
# 「私が作品を知った時にはもうなくなっていて、諦めていたものでした。まさか手に入るとは思わなくて……ありがとうございます」
line = "「私が作品を知った時にはもうなくなっていて、諦めていたものでした。まさか手に入るとは思わなくて……ありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「ニャリオンにも似ててかわいいですよね。……あれ、どうして引きつった笑みを浮かべてるんですか？」
line = "「ニャリオンにも似ててかわいいですよね。……あれ、どうして引きつった笑みを浮かべてるんですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「あっ、見てください。あちらの書店に並んでいる漫画、あれも最近のお気に入りなんです」
line = "「あっ、見てください。あちらの書店に並んでいる漫画、あれも最近のお気に入りなんです」"

[[dialogue]]
speaker = "フィオナ"
# 「主人公のヒーローは周りの人たちを守るために正体を隠していて、だから孤独で……」
line = "「主人公のヒーローは周りの人たちを守るために正体を隠していて、だから孤独で……」"

[[dialogue]]
speaker = "フィオナ"
# 「でもやむを得ず正体を明かした時、立ち上がってくれる人がいた。自分が守ってきた人々が助けてくれた。だからまた戦うことができた」
line = "「でもやむを得ず正体を明かした時、立ち上がってくれる人がいた。自分が守ってきた人々が助けてくれた。だからまた戦うことができた」"

[[dialogue]]
speaker = "フィオナ"
# 「とても熱い展開で、いつの間にかページをめくるのが止まらなくなってしまいました」
line = "「とても熱い展開で、いつの間にかページをめくるのが止まらなくなってしまいました」"

[[dialogue]]
speaker = "フィオナ"
# 「もしかして緋宮会長もこの作品をご存じなんですか？　さすがですね」
line = "「もしかして緋宮会長もこの作品をご存じなんですか？　さすがですね」"

[[dialogue]]
speaker = "フィオナ"
# 「……えっ、この漫画の主人公が私に似てる？」
line = "「……えっ、この漫画の主人公が私に似てる？」"

[[dialogue]]
speaker = "フィオナ"
# 「世界を守るために一生懸命だからって……そう言われると、ちょっと照れてしまいますね」
line = "「世界を守るために一生懸命だからって……そう言われると、ちょっと照れてしまいますね」"

[[dialogue]]
speaker = "unk"
# フィオナがピンチの時は俺たちが助けるよ
line = "フィオナがピンチの時は俺たちが助けるよ"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、そうですね。お願いします」
line = "「ふふっ、そうですね。お願いします」"

[[dialogue]]
speaker = "フィオナ"
# 「教皇の娘として、星徒会長として……私にしかできないことがある。星見フィオナであること。それが私の使命だと思っていた」
line = "「教皇の娘として、星徒会長として……私にしかできないことがある。星見フィオナであること。それが私の使命だと思っていた」"

[[dialogue]]
speaker = "フィオナ"
# 「それは事実なんですけど……でも私の周りには味方がたくさんいて、みんな違う力を持っていて、みんな心強い存在で」
line = "「それは事実なんですけど……でも私の周りには味方がたくさんいて、みんな違う力を持っていて、みんな心強い存在で」"

[[dialogue]]
speaker = "フィオナ"
# 「ソフィア、ユウリ、セーラさん、ルリエル……キリカたちメイド隊に、新星学園の星徒会のみなさん。もちろんあなたもその１人です」
line = "「ソフィア、ユウリ、セーラさん、ルリエル……キリカたちメイド隊に、新星学園の星徒会のみなさん。もちろんあなたもその１人です」"

[[dialogue]]
speaker = "フィオナ"
# 「わかっていたつもりでも、あなたに気付かされました」
line = "「わかっていたつもりでも、あなたに気付かされました」"

[[dialogue]]
speaker = "フィオナ"
# 「……ふふふ。何のことかわからないって顔してますね。まぁあなたらしいですけど」
line = "「……ふふふ。何のことかわからないって顔してますね。まぁあなたらしいですけど」"

[[dialogue]]
speaker = "フィオナ"
# 「今日はたまたま時間が空いていましたが、私にはいつもやるべきことがありましたし、昔から同年代の子たちより忙しかったですから」
line = "「今日はたまたま時間が空いていましたが、私にはいつもやるべきことがありましたし、昔から同年代の子たちより忙しかったですから」"

[[dialogue]]
speaker = "フィオナ"
# 「だから今日は貴重な機会を頂けて、ありがとうございました」
line = "「だから今日は貴重な機会を頂けて、ありがとうございました」"

