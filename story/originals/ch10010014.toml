speaker = "フィオナ"
# （どうして緋宮会長は平気そうなのーっ。それはそれでちょっと不本意というか、少しくらい気にしてもいいんじゃないの？　私も一応女の子なんだし……）
line = "（どうして緋宮会長は平気そうなのーっ。それはそれでちょっと不本意というか、少しくらい気にしてもいいんじゃないの？　私も一応女の子なんだし……）"

