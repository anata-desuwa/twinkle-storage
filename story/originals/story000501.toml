[[dialogue]]
speaker = "ヴィーナス"
# 「ふむふむ……それが交流会の企画書？」
line = "「ふむふむ……それが交流会の企画書？」"

[[dialogue]]
speaker = "unk"
# どうかな？
line = "どうかな？"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん、バッチリだと思うわ！　あとはフィオナと話を詰めていくだけね」
line = "「うん、バッチリだと思うわ！　あとはフィオナと話を詰めていくだけね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「早速、流星学園にお邪魔しましょ。あちらも何かアイデアを思いついてる頃だろうし」
line = "「早速、流星学園にお邪魔しましょ。あちらも何かアイデアを思いついてる頃だろうし」"

[[dialogue]]
speaker = "フィオナ"
# 「ごめんください」
line = "「ごめんください」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、フィオナ。ちょうど訪ねるところだったのよ」
line = "「あ、フィオナ。ちょうど訪ねるところだったのよ」"

[[dialogue]]
speaker = "フィオナ"
# 「例の交流会のお話ですね？　私たちも良案を思いついていますよ」
line = "「例の交流会のお話ですね？　私たちも良案を思いついていますよ」"

[[dialogue]]
speaker = "フィオナ"
# 「でもごめんなさい。その前にお伺いしたいことがありまして。お二人ともルリエルを──」
line = "「でもごめんなさい。その前にお伺いしたいことがありまして。お二人ともルリエルを──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃっ！？　日誌が……！」
