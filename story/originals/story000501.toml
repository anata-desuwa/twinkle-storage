[[dialogue]]
speaker = "unk"
# まさかまた新しいページが？
line = "まさかまた新しいページが？"

[[dialogue]]
speaker = "ヴィーナス"
# 「今度は一体──って、あら？　特にページは増えてないわね」
line = "「今度は一体──って、あら？　特にページは増えてないわね」"

[[dialogue]]
speaker = "フィオナ"
