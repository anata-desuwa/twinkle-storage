line = "「まさか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん？　何か心当たりあるの？　で、さっき言ってた伺いたいことって？」
line = "「ん？　何か心当たりあるの？　で、さっき言ってた伺いたいことって？」"

[[dialogue]]
speaker = "フィオナ"
# 「もしかすると関係があるのかもしれませんが……お二人とも、ルリエルを見かけませんでしたか？」
line = "「もしかすると関係があるのかもしれませんが……お二人とも、ルリエルを見かけませんでしたか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ルリエル？　ああ、あのそそっかしい天使の子よね？　私たちは見ていないけど」
line = "「ルリエル？　ああ、あのそそっかしい天使の子よね？　私たちは見ていないけど」"

[[dialogue]]
speaker = "フィオナ"
# 「やはり……そうですか。実は彼女、数日前から行方知れずになっているんです」
line = "「やはり……そうですか。実は彼女、数日前から行方知れずになっているんです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大変じゃない！　モンスターに囚われていたりしたら……！」
line = "「大変じゃない！　モンスターに囚われていたりしたら……！」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、それはないと思います。アステラが発生したという報告も受けていませんから」
