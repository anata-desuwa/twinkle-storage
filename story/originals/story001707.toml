[[dialogue]]
speaker = "アナ"
# 「レッドデルタ──！」
line = "「レッドデルタ──！」"

[[dialogue]]
speaker = "ギガンドム"
# 「ゴォォ──！」
line = "「ゴォォ──！」"

[[dialogue]]
speaker = "アナ"
# 「硬いですね……ビクともしていません……！」
line = "「硬いですね……ビクともしていません……！」"

[[dialogue]]
speaker = "シュティレ"
# 「ただいま帰還しました。民間人の避難は完了です」
line = "「ただいま帰還しました。民間人の避難は完了です」"

[[dialogue]]
speaker = "アナ"
# 「予想の倍は速い。シュティレさん、グッジョブです」
line = "「予想の倍は速い。シュティレさん、グッジョブです」"

[[dialogue]]
speaker = "シュティレ"
# 「ぶい。スピードには自信があります。もう手加減しなくていいですよ、アナお姉ちゃん」
line = "「ぶい。スピードには自信があります。もう手加減しなくていいですよ、アナお姉ちゃん」"

[[dialogue]]
speaker = "アナ"
# 「ええ、全力を出せるなら好都合です──プラネットマルス・セット！」
line = "「ええ、全力を出せるなら好都合です──プラネットマルス・セット！」"

[[dialogue]]
speaker = "unk"
# 民間人の避難が完了すれば、最大火力の炎をお見舞いできる。アナは火星とのリンクを強め、対象を焼き尽くす炎の矢を生成し、放つ。
line = "民間人の避難が完了すれば、最大火力の炎をお見舞いできる。アナは火星とのリンクを強め、対象を焼き尽くす炎の矢を生成し、放つ。"

[[dialogue]]
speaker = "アナ"
# 「スカーレットシータ──！」
line = "「スカーレットシータ──！」"

[[dialogue]]
speaker = "ギガンドム"
# 「ォーン──！」
line = "「ォーン──！」"

[[dialogue]]
speaker = "アナ"
# 「くっ……！　損傷、まったくなし。外殻に焦げの１つも……何なんですか、こいつは！？」
line = "「くっ……！　損傷、まったくなし。外殻に焦げの１つも……何なんですか、こいつは！？」"

[[dialogue]]
speaker = "ギガンドム"
# 「ゴゴゴォ──！！」
line = "「ゴゴゴォ──！！」"

[[dialogue]]
speaker = "シュティレ"
# 「敵影接近、距離を取らないと──！」
line = "「敵影接近、距離を取らないと──！」"

[[dialogue]]
speaker = "アナ"
# 「くっ──速い、間に合わない……！？」
line = "「くっ──速い、間に合わない……！？」"

[[dialogue]]
speaker = "unk"
# ──ディマイズブレイカー！！
line = "──ディマイズブレイカー！！"

[[dialogue]]
speaker = "アニマ"
# 「バックフロウマイン──！！」
line = "「バックフロウマイン──！！」"

[[dialogue]]
speaker = "アニマ"
# 「ふぅ、間一髪だったかナ？」
line = "「ふぅ、間一髪だったかナ？」"

[[dialogue]]
speaker = "シュティレ"
# 「マスター！」
line = "「マスター！」"

[[dialogue]]
speaker = "unk"
# アナ、無事か！？
line = "アナ、無事か！？"

[[dialogue]]
speaker = "アナ"
# 「遅いですよ、会長。危うくぺしゃんこになるところでしたが……助かりました」
line = "「遅いですよ、会長。危うくぺしゃんこになるところでしたが……助かりました」"

[[dialogue]]
speaker = "シュティレ"
# 「マスター、会いたかったです。ぶいぶい」
line = "「マスター、会いたかったです。ぶいぶい」"

[[dialogue]]
speaker = "アニマ"
# 「シュティレも無事なようだネ。しかしあいつ、呆れた強さだナ……頑丈が服を着て歩いているみたいダ」
line = "「シュティレも無事なようだネ。しかしあいつ、呆れた強さだナ……頑丈が服を着て歩いているみたいダ」"

[[dialogue]]
speaker = "アニマ"
# 「よし──シュティレ。ここからは先輩たちに任せろ。キミは撤退したまエ」
line = "「よし──シュティレ。ここからは先輩たちに任せろ。キミは撤退したまエ」"

[[dialogue]]
speaker = "シュティレ"
# 「拒否します。助けに来てくださったマスターを置いて逃げるなど、弟子失格です」
line = "「拒否します。助けに来てくださったマスターを置いて逃げるなど、弟子失格です」"

[[dialogue]]
speaker = "アニマ"
# 「キミはまだ未熟な附属生ダ、ここは引くんダ！」
line = "「キミはまだ未熟な附属生ダ、ここは引くんダ！」"

[[dialogue]]
speaker = "シュティレ"
# 「私はマスターの正式な弟子ではないので、その命令は拒否します」
line = "「私はマスターの正式な弟子ではないので、その命令は拒否します」"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ。ああ言えばこう言うやつだナ……！」
line = "「フヒッ。ああ言えばこう言うやつだナ……！」"

[[dialogue]]
speaker = "シュティレ"
# 「私だって星騎士です。それにノヴァフォームの方々が応援に来ないということは……」
line = "「私だって星騎士です。それにノヴァフォームの方々が応援に来ないということは……」"

[[dialogue]]
speaker = "アニマ"
# 「……察しのとおりダ。各地で機械型モンスターが雨後のタケノコみたいに大発生中だヨ」
line = "「……察しのとおりダ。各地で機械型モンスターが雨後のタケノコみたいに大発生中だヨ」"

[[dialogue]]
speaker = "unk"
# 応援が来るまでの時間を稼ぐ！
line = "応援が来るまでの時間を稼ぐ！"

[[dialogue]]
speaker = "アナ"
# 「了解。しかし──どうやってあれを足止めしますか？」
line = "「了解。しかし──どうやってあれを足止めしますか？」"

[[dialogue]]
speaker = "アナ"
# 「先ほどの、会長とアニマ先輩の奇襲もほとんど効果なし。ピンピンしています」
line = "「先ほどの、会長とアニマ先輩の奇襲もほとんど効果なし。ピンピンしています」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　こんなこともあろうかと、弱体化薬──ヨワッチクナールはたっぷり持ってきたヨ」
line = "「フヒ♪　こんなこともあろうかと、弱体化薬──ヨワッチクナールはたっぷり持ってきたヨ」"

[[dialogue]]
speaker = "シュティレ"
# 「『こんなこともあろうかと』……何度でも言いたいロボットアニメのセリフです」
line = "「『こんなこともあろうかと』……何度でも言いたいロボットアニメのセリフです」"

[[dialogue]]
speaker = "アニマ"
# 「アニメはよくわからないが、何とか敵の核に弱体化薬をぶつけるしかないゾ」
line = "「アニメはよくわからないが、何とか敵の核に弱体化薬をぶつけるしかないゾ」"

[[dialogue]]
speaker = "unk"
# 作戦がある。聞いてくれ！
line = "作戦がある。聞いてくれ！"

[[dialogue]]
speaker = "アナ"
# 「……ギガンドムの装甲が手薄な、関節部分を狙うのですか？」
line = "「……ギガンドムの装甲が手薄な、関節部分を狙うのですか？」"

[[dialogue]]
speaker = "アニマ"
# 「いい案かもしれないナ。アナ、狙えそうカ？」
line = "「いい案かもしれないナ。アナ、狙えそうカ？」"

[[dialogue]]
speaker = "アナ"
# 「愚問です。弓兵の腕の見せ所」
line = "「愚問です。弓兵の腕の見せ所」"

[[dialogue]]
speaker = "シュティレ"
# 「私はアナお姉ちゃんが狙撃しやすいよう、ギガンドムの周囲を飛び回って<ruby=かくらん>攪乱</ruby>──承知いたしました」
line = "「私はアナお姉ちゃんが狙撃しやすいよう、ギガンドムの周囲を飛び回って<ruby>攪乱<rt>かくらん</rt></ruby>──承知いたしました」"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ。会長は正面からギガンドムの注意を引き、アナの狙撃した関節部へアニマが薬を散布すル。コレしかないナ……行くゾ！」
line = "「フヒッ。会長は正面からギガンドムの注意を引き、アナの狙撃した関節部へアニマが薬を散布すル。コレしかないナ……行くゾ！」"

[[dialogue]]
speaker = "ギガンドム"
# 「ゴゴゴゴォ────！！」
line = "「ゴゴゴゴォ────！！」"

[[dialogue]]
speaker = "unk"
# 正面から接近し、クロトは幾重にも打撃を叩きこむ。
line = "正面から接近し、クロトは幾重にも打撃を叩きこむ。"

[[dialogue]]
speaker = "unk"
# なんて頑丈さだ……！！
line = "なんて頑丈さだ……！！"

[[dialogue]]
speaker = "シュティレ"
# 「アドバンス・ブレードッ──！」
line = "「アドバンス・ブレードッ──！」"

[[dialogue]]
speaker = "unk"
# シュティレがギガンドムの周りを高速旋回し、機械剣による牽制を行う。
line = "シュティレがギガンドムの周りを高速旋回し、機械剣による牽制を行う。"

[[dialogue]]
speaker = "アナ"
# 「一発、二発、三発ッ──もう、少し……！」
line = "「一発、二発、三発ッ──もう、少し……！」"

[[dialogue]]
speaker = "unk"
# 生まれたわずかな隙を縫い、アナがギガンドムの関節部分へ的確な弓撃を撃ちこんでゆく──
line = "生まれたわずかな隙を縫い、アナがギガンドムの関節部分へ的確な弓撃を撃ちこんでゆく──"

[[dialogue]]
speaker = "unk"
# 星騎士として訓練を積んできた経験が、急造のメンバーであるにも関わらずチームワークを生んでいた。
line = "星騎士として訓練を積んできた経験が、急造のメンバーであるにも関わらずチームワークを生んでいた。"

[[dialogue]]
speaker = "unk"
# このままいけば、アニマお手製の弱体化薬をぶつけられるかもしれない──そんな考えが全員の頭によぎった、その時だった。
line = "このままいけば、アニマお手製の弱体化薬をぶつけられるかもしれない──そんな考えが全員の頭によぎった、その時だった。"

[[dialogue]]
speaker = "ギガンドム"
# 「ゴォオォォォオ────！！」
line = "「ゴォオォォォオ────！！」"

[[dialogue]]
speaker = "unk"
# ギガンドムは、モンスターは言葉を持たない。けれど気づいている。自分を追い込んでいるのは、４人のチームワークだと。
line = "ギガンドムは、モンスターは言葉を持たない。けれど気づいている。自分を追い込んでいるのは、４人のチームワークだと。"

[[dialogue]]
speaker = "unk"
# ならば簡単だ──分断させればいい。
line = "ならば簡単だ──分断させればいい。"

[[dialogue]]
speaker = "シュティレ"
# 「こ、これはっ……！？」
line = "「こ、これはっ……！？」"

[[dialogue]]
speaker = "アナ"
# 「シュティレさん！　危ない──！！」
line = "「シュティレさん！　危ない──！！」"

[[dialogue]]
speaker = "unk"
# シュティレの近くに発生した輝き。とっさに飛び出たアナも巻き込むと、それは天空へと上昇してゆき──
line = "シュティレの近くに発生した輝き。とっさに飛び出たアナも巻き込むと、それは天空へと上昇してゆき──"

[[dialogue]]
speaker = "アニマ"
# 「なッ……局所的なアステラの発生、だト……！？」
line = "「なッ……局所的なアステラの発生、だト……！？」"

[[dialogue]]
speaker = "unk"
# シュティレ──！！
line = "シュティレ──！！"

[[dialogue]]
speaker = "unk"
# ──アナ！！
line = "──アナ！！"

[[dialogue]]
speaker = "unk"
# アナとシュティレだけが、アステラ内部へと拉致されてしまった──
line = "アナとシュティレだけが、アステラ内部へと拉致されてしまった──"
