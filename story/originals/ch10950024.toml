[[dialogue]]
speaker = "unk"
# 第４話,初めてよりも甘く,P
line = "第４話,初めてよりも甘く,P"

[[dialogue]]
speaker = "unk"
# 酔った勢いでのキス事件からしばらく経ち、ようやく互いに顔を見ても動揺せずに済むくらいには落ち着きを取り戻してきた頃。
line = "酔った勢いでのキス事件からしばらく経ち、ようやく互いに顔を見ても動揺せずに済むくらいには落ち着きを取り戻してきた頃。"

[[dialogue]]
speaker = "シズハ"
# 「あの、会長……！　私――」
line = "「あの、会長……！　私――」"

[[dialogue]]
speaker = "シズハ"
# 「『恋人のスキンシップ』に挑戦したいわ！」
line = "「『恋人のスキンシップ』に挑戦したいわ！」"

[[dialogue]]
speaker = "unk"
# そんな宣言を受けて、翌日の休み。シズハは俺の家へとやって来ていた。
line = "そんな宣言を受けて、翌日の休み。シズハは俺の家へとやって来ていた。"

[[dialogue]]
speaker = "シズハ"
# 「そ、それじゃあ、会長！　昨日言ってた通り、これから２人でスキンシップをするわよ……！」
line = "「そ、それじゃあ、会長！　昨日言ってた通り、これから２人でスキンシップをするわよ……！」"

[[dialogue]]
speaker = "unk"
# 無理しなくてもいいんだぞ？
line = "無理しなくてもいいんだぞ？"

[[dialogue]]
speaker = "シズハ"
# 「だ、大丈夫……無理はしてないわ。その、この前の事故で私、会長にキスしちゃったでしょ？」
line = "「だ、大丈夫……無理はしてないわ。その、この前の事故で私、会長にキスしちゃったでしょ？」"

[[dialogue]]
speaker = "シズハ"
# 「それで……ずっとモヤモヤしてたの。本当はあんな形じゃなくて、もっとちゃんとお互いの気持ちを通じ合わせてから、キスだってしたかったのに……」
line = "「それで……ずっとモヤモヤしてたの。本当はあんな形じゃなくて、もっとちゃんとお互いの気持ちを通じ合わせてから、キスだってしたかったのに……」"

[[dialogue]]
speaker = "シズハ"
# 「だから、リベンジしたくて！　酔った勢いとかじゃなく、会長とちゃんと向き合って、モヤモヤを晴らしたいの！」
line = "「だから、リベンジしたくて！　酔った勢いとかじゃなく、会長とちゃんと向き合って、モヤモヤを晴らしたいの！」"

[[dialogue]]
speaker = "unk"
# わかった。優しくするからな
line = "わかった。優しくするからな"

[[dialogue]]
speaker = "シズハ"
# 「う、うん……<emoji=heart04>」
line = "「う、うん……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「え？　――ちなみに、なんで戦闘服なのかって？」
line = "「え？　――ちなみに、なんで戦闘服なのかって？」"

[[dialogue]]
speaker = "シズハ"
# 「そ、そんなの決まってるでしょ！　スキンシップは恋人同士の勝負みたいなものなんだから……その……」
line = "「そ、そんなの決まってるでしょ！　スキンシップは恋人同士の勝負みたいなものなんだから……その……」"

[[dialogue]]
speaker = "シズハ"
# 「勝負服ってこと……！」
line = "「勝負服ってこと……！」"

[[dialogue]]
speaker = "シズハ"
# 「――発想が可愛すぎる！？　ば、バカバカ！　私はこれでも真面目なんだから……！」
line = "「――発想が可愛すぎる！？　ば、バカバカ！　私はこれでも真面目なんだから……！」"

[[dialogue]]
speaker = "unk"
# じゃあシズハ……始めるよ
line = "じゃあシズハ……始めるよ"

[[dialogue]]
speaker = "シズハ"
# 「……！　んっ<emoji=heart04>　ちゃんと、優しくしてよね……<emoji=heart04>」
line = "「……！　んっ<emoji=heart04>　ちゃんと、優しくしてよね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は片手を繋いで、以前シズハがしてくれたように、そっと指先を絡めて恋人繋ぎにする。
line = "俺は片手を繋いで、以前シズハがしてくれたように、そっと指先を絡めて恋人繋ぎにする。"

[[dialogue]]
speaker = "シズハ"
# （あっ<emoji=heart04>　こ、この恋人繋ぎ……やっぱり普通に手を繋ぐのより、ずっとドキドキする……<emoji=heart04>）
line = "（あっ<emoji=heart04>　こ、この恋人繋ぎ……やっぱり普通に手を繋ぐのより、ずっとドキドキする……<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# （ぴったり密着してる感じがして……まるで会長に包まれてるみたいな……<emoji=heart04>）
line = "（ぴったり密着してる感じがして……まるで会長に包まれてるみたいな……<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ"
# （って……そういうのも恥ずかしがらずに、思っていることを素直に口にしないと……！）
line = "（って……そういうのも恥ずかしがらずに、思っていることを素直に口にしないと……！）"

[[dialogue]]
speaker = "シズハ"
# （これは、この前の酔っ払っちゃったときのモヤモヤを晴らす為にやっているんだから……！）
line = "（これは、この前の酔っ払っちゃったときのモヤモヤを晴らす為にやっているんだから……！）"

[[dialogue]]
speaker = "unk"
# 俺は空いている右手を彼女の頭に置いて、そっと撫でる。
line = "俺は空いている右手を彼女の頭に置いて、そっと撫でる。"

[[dialogue]]
speaker = "シズハ"
# 「ふあっ……！？　か、会長のバカバカっ<emoji=heart04>　そんな優しく頭を撫でられたら、安心しちゃうじゃない……<emoji=heart04>」
line = "「ふあっ……！？　か、会長のバカバカっ<emoji=heart04>　そんな優しく頭を撫でられたら、安心しちゃうじゃない……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから、頬に触れて、指でなぞるように撫でる。
line = "それから、頬に触れて、指でなぞるように撫でる。"

[[dialogue]]
speaker = "シズハ"
# 「あっ……バカぁ<emoji=heart04>　くすぐったいわよ……<emoji=heart04>　なんかいやらしくて、ゾクゾクしちゃうからぁ……<emoji=heart04>」
line = "「あっ……バカぁ<emoji=heart04>　くすぐったいわよ……<emoji=heart04>　なんかいやらしくて、ゾクゾクしちゃうからぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「んっ……<emoji=heart04>　真っすぐに目を見つめるのもダメぇ<emoji=heart04>　ドキドキしちゃうから、あんまり見ないで……っ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　真っすぐに目を見つめるのもダメぇ<emoji=heart04>　ドキドキしちゃうから、あんまり見ないで……っ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# （あれ！？　素直になろうと思ってるのに、反射的に素直じゃない言葉ばっかり出てきちゃう……！）
line = "（あれ！？　素直になろうと思ってるのに、反射的に素直じゃない言葉ばっかり出てきちゃう……！）"

[[dialogue]]
speaker = "シズハ"
# （うぅ……こ、こんなはずじゃなかったのに……）
line = "（うぅ……こ、こんなはずじゃなかったのに……）"

[[dialogue]]
speaker = "unk"
# シズハ？　大丈夫？
line = "シズハ？　大丈夫？"

[[dialogue]]
speaker = "unk"
# シズハの目に涙がじわりと溢れてきていることに気づいた俺は、それをそっと指で拭う。
line = "シズハの目に涙がじわりと溢れてきていることに気づいた俺は、それをそっと指で拭う。"

[[dialogue]]
speaker = "シズハ"
# 「か、会長、ごめんなさい……私……」
line = "「か、会長、ごめんなさい……私……」"

[[dialogue]]
speaker = "シズハ"
# 「本当はもっと素直に、気持ちを伝えようと思ってたの。でも、ドキドキしちゃうと私……素直じゃない言葉ばっかり出てきちゃう……」
line = "「本当はもっと素直に、気持ちを伝えようと思ってたの。でも、ドキドキしちゃうと私……素直じゃない言葉ばっかり出てきちゃう……」"

[[dialogue]]
speaker = "unk"
# シズハのことが好きだから、全部わかってる
line = "シズハのことが好きだから、全部わかってる"

[[dialogue]]
speaker = "シズハ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# ――シズハは照れているだけで、本当は優しい子だとわかっているし、むしろ照れると素直じゃなくなっちゃうのは可愛い。
line = "――シズハは照れているだけで、本当は優しい子だとわかっているし、むしろ照れると素直じゃなくなっちゃうのは可愛い。"

[[dialogue]]
speaker = "シズハ"
# 「――だから気にしてるのは、私がスキンシップを嫌じゃないかどうかだけ？」
line = "「――だから気にしてるのは、私がスキンシップを嫌じゃないかどうかだけ？」"

[[dialogue]]
speaker = "シズハ"
# 「それは全然、大丈夫……だって私も――」
line = "「それは全然、大丈夫……だって私も――」"

[[dialogue]]
speaker = "シズハ"
# 「会長が優しいってわかってるから。それに……その……」
line = "「会長が優しいってわかってるから。それに……その……」"

[[dialogue]]
speaker = "unk"
# シズハは１度照れて視線を外してから、深呼吸をして、改めて俺と目を合わせる。
line = "シズハは１度照れて視線を外してから、深呼吸をして、改めて俺と目を合わせる。"

[[dialogue]]
speaker = "シズハ"
# 「会長のこと……私も好き<emoji=heart04>」
line = "「会長のこと……私も好き<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「いつも私のことを気遣ってくれて、困っている時は引っ張ってくれて、頼りになってカッコいいなって……<emoji=heart04>」
line = "「いつも私のことを気遣ってくれて、困っている時は引っ張ってくれて、頼りになってカッコいいなって……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「う、ううん。カッコいいとは思っているけど、カッコいいから好きなんじゃなくて……」
line = "「う、ううん。カッコいいとは思っているけど、カッコいいから好きなんじゃなくて……」"

[[dialogue]]
speaker = "シズハ"
# 「私のことを好きだって、一緒にいたいって、言葉にしなくてもわかるくらい行動で伝えてくれているところが、すごくドキドキして、好きなの……<emoji=heart04>」
line = "「私のことを好きだって、一緒にいたいって、言葉にしなくてもわかるくらい行動で伝えてくれているところが、すごくドキドキして、好きなの……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「って、ちょっと泣きそうになったら……私もやっと素直に言えた……えへへ<emoji=heart04>」
line = "「って、ちょっと泣きそうになったら……私もやっと素直に言えた……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は愛おしくなって、シズハを抱き寄せる。
line = "俺は愛おしくなって、シズハを抱き寄せる。"

[[dialogue]]
speaker = "シズハ"
# 「あっ、会長……<emoji=heart04>」
line = "「あっ、会長……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# これからはもっと、好きって言葉に出すから
line = "これからはもっと、好きって言葉に出すから"

[[dialogue]]
speaker = "シズハ"
# 「う、うん……<emoji=heart04>　私も……これからもっといっぱい、好きって伝えられるように頑張るね……<emoji=heart04>」
line = "「う、うん……<emoji=heart04>　私も……これからもっといっぱい、好きって伝えられるように頑張るね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから俺は、シズハと近くから見つめ合って――そっと唇を寄せる。
line = "それから俺は、シズハと近くから見つめ合って――そっと唇を寄せる。"

[[dialogue]]
speaker = "シズハ"
# 「会長……<emoji=heart04>　ん……<emoji=heart04>」
line = "「会長……<emoji=heart04>　ん……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちは気持ちを通じ合わせたキスをする。
line = "そうして、俺たちは気持ちを通じ合わせたキスをする。"

[[dialogue]]
speaker = "シズハ"
# 「好きよ、会長<emoji=heart04>　ちゅっ……ちゅっ<emoji=heart04>」
line = "「好きよ、会長<emoji=heart04>　ちゅっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お互いの背中に手を回して、抱き合いながら、この前の初キスが上書きされてしまうくらい甘い時間を過ごすのだった。
line = "お互いの背中に手を回して、抱き合いながら、この前の初キスが上書きされてしまうくらい甘い時間を過ごすのだった。"
