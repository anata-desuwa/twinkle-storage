[[dialogue]]
speaker = "unk"
# 第２０話,御前試合Ⅱ,B
line = "第２０話,御前試合Ⅱ,B"

[[dialogue]]
speaker = "クロト"
# 「──ぐっ！」
line = "「──ぐっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたの──この程度なの？　緋宮クロト」
line = "「どうしたの──この程度なの？　緋宮クロト」"

[[dialogue]]
speaker = "unk"
# 強烈に地面へ打ちつけられる。
line = "強烈に地面へ打ちつけられる。"

[[dialogue]]
speaker = "unk"
# 這いつくばる俺を、ヴィーナスはまだまだ余力を残した様子で見下ろしてきた。
line = "這いつくばる俺を、ヴィーナスはまだまだ余力を残した様子で見下ろしてきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっぱり、私が来て正解だったみたいね」
line = "「やっぱり、私が来て正解だったみたいね」"

[[dialogue]]
speaker = "クロト"
# 「！　君が……来て……？」
line = "「！　君が……来て……？」"

[[dialogue]]
speaker = "unk"
# 逆だろう。転入してきたのは俺だ。
line = "逆だろう。転入してきたのは俺だ。"

[[dialogue]]
speaker = "unk"
# だが、今はそんな言葉尻を拾っている場合じゃない。
line = "だが、今はそんな言葉尻を拾っている場合じゃない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「確かに、先週見たときよりは強くなったみたいだけど……」
line = "「確かに、先週見たときよりは強くなったみたいだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まだまだ、魔王には程遠いわよっ！」
line = "「まだまだ、魔王には程遠いわよっ！」"

[[dialogue]]
speaker = "クロト"
# 「づっ──これくらいっ！」
line = "「づっ──これくらいっ！」"

[[dialogue]]
speaker = "unk"
# 私が来たという意味。
line = "私が来たという意味。"

[[dialogue]]
speaker = "unk"
# 魔王という言葉の真意。
line = "魔王という言葉の真意。"

[[dialogue]]
speaker = "unk"
# 彼女の態度も言動も、まだまだ理解できないことは多いけれど──
line = "彼女の態度も言動も、まだまだ理解できないことは多いけれど──"

[[dialogue]]
speaker = "unk"
# 本人に何かを欺く素振りは見えない。
line = "本人に何かを欺く素振りは見えない。"

[[dialogue]]
speaker = "unk"
# ならば俺も、全力で彼女にぶつかるだけだ。
line = "ならば俺も、全力で彼女にぶつかるだけだ。"

[[dialogue]]
speaker = "クロト"
# 「──づっ、あっ！」
line = "「──づっ、あっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星力が足りない──こんなものじゃないはずよ！　もっともっと、本気を振り絞りなさい！」
line = "「星力が足りない──こんなものじゃないはずよ！　もっともっと、本気を振り絞りなさい！」"

[[dialogue]]
speaker = "unk"
# 何回も、何合も。
line = "何回も、何合も。"

[[dialogue]]
speaker = "unk"
# 俺の攻撃は空を切り、彼女の攻撃ばかりが俺を打ちのめす。
line = "俺の攻撃は空を切り、彼女の攻撃ばかりが俺を打ちのめす。"

[[dialogue]]
speaker = "unk"
# 挑んでは何度も地に伏して、やがて……
line = "挑んでは何度も地に伏して、やがて……"

[[dialogue]]
speaker = "クロト"
# 「──ぐはァッ」
line = "「──ぐはァッ」"

[[dialogue]]
speaker = "unk"
# ついに、受け流せなかった一撃が俺の真芯を捉える。
line = "ついに、受け流せなかった一撃が俺の真芯を捉える。"

[[dialogue]]
speaker = "unk"
# 代わり映えのしない展開に、アリーナ席がどよめくのを感じた。
line = "代わり映えのしない展開に、アリーナ席がどよめくのを感じた。"

[[dialogue]]
speaker = "カティア"
# 「やっぱり会長には勝てっこないよ……」
line = "「やっぱり会長には勝てっこないよ……」"

[[dialogue]]
speaker = "モネ"
# 「勝負はついてるのに……」
line = "「勝負はついてるのに……」"

[[dialogue]]
speaker = "メルエル"
# 「もうやめて……」
line = "「もうやめて……」"

[[dialogue]]
speaker = "クロト"
# 「（……情けないな）」
line = "「（……情けないな）」"

[[dialogue]]
speaker = "unk"
# 派手な試合を期待していた生徒たちの声が、同情に変わっていくのがわかる。
line = "派手な試合を期待していた生徒たちの声が、同情に変わっていくのがわかる。"

[[dialogue]]
speaker = "unk"
# でも、どうしてだろう。
line = "でも、どうしてだろう。"

[[dialogue]]
speaker = "unk"
# この多数の観衆の目よりも──ヴィーナス本人に今のザマを晒すことが、何より情けないと感じるのは。
line = "この多数の観衆の目よりも──ヴィーナス本人に今のザマを晒すことが、何より情けないと感じるのは。"

[[dialogue]]
speaker = "クロト"
# 「ッ……まだ……まだッ」
line = "「ッ……まだ……まだッ」"

[[dialogue]]
speaker = "クロト"
# 「──ぐっ！？」
line = "「──ぐっ！？」"

[[dialogue]]
speaker = "unk"
# 再び立ち上がろうとする──しかしその時、度を越えた激痛と疲弊が一斉にのしかかってきた。
line = "再び立ち上がろうとする──しかしその時、度を越えた激痛と疲弊が一斉にのしかかってきた。"

[[dialogue]]
speaker = "セイファート"
# 「……戦闘不能か。ならば、勝者──」
line = "「……戦闘不能か。ならば、勝者──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──待って！」
line = "「──待って！」"

[[dialogue]]
speaker = "unk"
# つきかけた──否、ついたはずの決着。
line = "つきかけた──否、ついたはずの決着。"

[[dialogue]]
speaker = "unk"
# それを食い止めたのは、他ならぬ対戦相手のヴィーナスだった。
line = "それを食い止めたのは、他ならぬ対戦相手のヴィーナスだった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……どうして」
line = "「……どうして」"

[[dialogue]]
speaker = "unk"
# 彼女は、自分を責めるような、悲痛の面持ちで。
line = "彼女は、自分を責めるような、悲痛の面持ちで。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……どうして、勝ってくれないの？」
line = "「……どうして、勝ってくれないの？」"

[[dialogue]]
speaker = "クロト"
# 「……ッ」
line = "「……ッ」"

[[dialogue]]
speaker = "unk"
# あの眼だ。
line = "あの眼だ。"

[[dialogue]]
speaker = "unk"
# 星徒会室で初めて会った時と同じ──
line = "星徒会室で初めて会った時と同じ──"

[[dialogue]]
speaker = "unk"
# 乱暴な態度に覆い隠された、彼女の本心とも言える嘆願が、その瞳に浮かんでいる。
line = "乱暴な態度に覆い隠された、彼女の本心とも言える嘆願が、その瞳に浮かんでいる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうして……どうしてなのよ……」
line = "「どうして……どうしてなのよ……」"

[[dialogue]]
speaker = "unk"
# どうして──は、こっちのセリフだ。
line = "どうして──は、こっちのセリフだ。"

[[dialogue]]
speaker = "unk"
# どうして、君が泣く。
line = "どうして、君が泣く。"

[[dialogue]]
speaker = "unk"
# どうして、そんな目で俺を見る。
line = "どうして、そんな目で俺を見る。"

[[dialogue]]
speaker = "unk"
# 一方的にやられているのは、こちらのはずなのに。
line = "一方的にやられているのは、こちらのはずなのに。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……立ってよ」
line = "「……立ってよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……助けてよ」
line = "「……助けてよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ずっと、待ってたのに」
line = "「ずっと、待ってたのに」"

[[dialogue]]
speaker = "クロト"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 彼我の実力差は何より明白。
line = "彼我の実力差は何より明白。"

[[dialogue]]
speaker = "unk"
# 圧倒的な優位にある彼女が、悲しみ嘆く理由が俺にはわからない。
line = "圧倒的な優位にある彼女が、悲しみ嘆く理由が俺にはわからない。"

[[dialogue]]
speaker = "unk"
# でも……俺の魂は吠えていた。
line = "でも……俺の魂は吠えていた。"

[[dialogue]]
speaker = "unk"
# 彼女にだけは、あんな涙を流させてはいけないと。
line = "彼女にだけは、あんな涙を流させてはいけないと。"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王なんでしょ……英雄なんでしょ？」
line = "「魔王なんでしょ……英雄なんでしょ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だったら……私１人くらい、軽くひねってみせてよ──！」
line = "「だったら……私１人くらい、軽くひねってみせてよ──！」"

[[dialogue]]
speaker = "unk"
# ああ、そうか。
line = "ああ、そうか。"

[[dialogue]]
speaker = "クロト"
# 「（そういうこと、だったんだな……）」
line = "「（そういうこと、だったんだな……）」"

[[dialogue]]
speaker = "アナ"
# 『次期会長はどうしてそこまで──律儀に勝負を受けようとするのですか？』
line = "『次期会長はどうしてそこまで──律儀に勝負を受けようとするのですか？』"

[[dialogue]]
speaker = "unk"
# あの時は答えられなかったアナの質問。今になってその真意に気づく。
line = "あの時は答えられなかったアナの質問。今になってその真意に気づく。"

[[dialogue]]
speaker = "ヴィーナス"
# 『大丈夫よ２人とも。だってこれは──私から彼へのお願いだもの』
line = "『大丈夫よ２人とも。だってこれは──私から彼へのお願いだもの』"

[[dialogue]]
speaker = "ヴィーナス"
# 『彼はそれを裏切るような人じゃないわ。そうよね、緋宮クロト？』
line = "『彼はそれを裏切るような人じゃないわ。そうよね、緋宮クロト？』"

[[dialogue]]
speaker = "unk"
# ヴィーナスはあの時、確かにそう言った。
line = "ヴィーナスはあの時、確かにそう言った。"

[[dialogue]]
speaker = "unk"
# 星騎士になったばかりのひよっこの俺に、あれだけ強大な力を持つ彼女が、助けを求めていたんだ。
line = "星騎士になったばかりのひよっこの俺に、あれだけ強大な力を持つ彼女が、助けを求めていたんだ。"

[[dialogue]]
speaker = "unk"
# ──それが、どこまで意図してのことだったのか、俺にはわからない。
line = "──それが、どこまで意図してのことだったのか、俺にはわからない。"

[[dialogue]]
speaker = "unk"
# だけどヴィーナスは、彼女ほどの力を持ってしても、己を無力だと感じるような何かに立ち向かおうとしている……気がする。
line = "だけどヴィーナスは、彼女ほどの力を持ってしても、己を無力だと感じるような何かに立ち向かおうとしている……気がする。"

[[dialogue]]
speaker = "unk"
# そんな彼女が、俺に助けを求めた。
line = "そんな彼女が、俺に助けを求めた。"

[[dialogue]]
speaker = "unk"
# 緋宮クロトは、昔の自分のような戦う力が足りなくて泣いている人を、今度は自分が助けたくて星騎士を目指した。
line = "緋宮クロトは、昔の自分のような戦う力が足りなくて泣いている人を、今度は自分が助けたくて星騎士を目指した。"

[[dialogue]]
speaker = "unk"
# そんな俺に、１番最初に助けを求めたのが、ヴィーナスだったわけだ。
line = "そんな俺に、１番最初に助けを求めたのが、ヴィーナスだったわけだ。"

[[dialogue]]
speaker = "unk"
# そんな人を見捨てて逃げてしまったら、俺はもう本当の星騎士にはなれない。
line = "そんな人を見捨てて逃げてしまったら、俺はもう本当の星騎士にはなれない。"

[[dialogue]]
speaker = "unk"
# ──ヴィーナスの一見無茶苦茶に思える勝負から逃げたくなかったのは、そんな理由。
line = "──ヴィーナスの一見無茶苦茶に思える勝負から逃げたくなかったのは、そんな理由。"

[[dialogue]]
speaker = "クロト"
# 「（だけど、これは凄く、大事なことでもあった）」
line = "「（だけど、これは凄く、大事なことでもあった）」"

[[dialogue]]
speaker = "unk"
# 気付いているのと、いないのとでは、全然話が違う。
line = "気付いているのと、いないのとでは、全然話が違う。"

[[dialogue]]
speaker = "unk"
# 己がなんのために戦っているのか。誰のために戦っているのか。
line = "己がなんのために戦っているのか。誰のために戦っているのか。"

[[dialogue]]
speaker = "unk"
# ──答えは、ひとつだ。
line = "──答えは、ひとつだ。"

[[dialogue]]
speaker = "unk"
# 他の誰でもない、緋宮クロトを頼ってくれた九浄ヴィーナスを、俺は助けたかった。
line = "他の誰でもない、緋宮クロトを頼ってくれた九浄ヴィーナスを、俺は助けたかった。"

[[dialogue]]
speaker = "unk"
# これはただ、それだけの話だったんだ。
line = "これはただ、それだけの話だったんだ。"

[[dialogue]]
speaker = "クロト"
# 「──ヴィーナス」
line = "「──ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロ、ト……？」
line = "「クロ、ト……？」"

[[dialogue]]
speaker = "unk"
# そう──俺は地を這っていた。
line = "そう──俺は地を這っていた。"

[[dialogue]]
speaker = "unk"
# 何度も倒され、くたばって、ぼろぼろになりながらも足場を踏みしめて立とうとする。
line = "何度も倒され、くたばって、ぼろぼろになりながらも足場を踏みしめて立とうとする。"

[[dialogue]]
speaker = "unk"
# だからきっと、これは大地のくれた加護なのだろう。
line = "だからきっと、これは大地のくれた加護なのだろう。"

[[dialogue]]
speaker = "unk"
# 俺の守護星は彼女らとは違う──天じゃなく地に宿る星なのだから。
line = "俺の守護星は彼女らとは違う──天じゃなく地に宿る星なのだから。"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス」
line = "「ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っっ……！」
line = "「っっ……！」"

[[dialogue]]
speaker = "unk"
# 瞬間、ありとあらゆる力が流れ込んでくるのを感じた。
line = "瞬間、ありとあらゆる力が流れ込んでくるのを感じた。"

[[dialogue]]
speaker = "unk"
# 守護星の加護──否、そんな次元すら越えて。
line = "守護星の加護──否、そんな次元すら越えて。"

[[dialogue]]
speaker = "クラスの女子Ａ"
# 「な──何あれっ。超変身してるんだけどっ」
line = "「な──何あれっ。超変身してるんだけどっ」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん……っ！？」
line = "「緋宮くん……っ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら……？」
line = "「あらあら……？」"

[[dialogue]]
speaker = "アナ"
# 「（あれが……もしかして昨日の？）」
line = "「（あれが……もしかして昨日の？）」"

[[dialogue]]
speaker = "unk"
# 昨夜、一瞬だが掴みかけたその煌めきを宿す。
line = "昨夜、一瞬だが掴みかけたその煌めきを宿す。"

[[dialogue]]
speaker = "unk"
# 激しいが、暴れるでもない、優しささえ覚える深淵なる力が湧き上がってきた。
line = "激しいが、暴れるでもない、優しささえ覚える深淵なる力が湧き上がってきた。"

[[dialogue]]
speaker = "unk"
# なんだろうか、この力は──俺はどこかで──この温もりを知っているような。
line = "なんだろうか、この力は──俺はどこかで──この温もりを知っているような。"

[[dialogue]]
speaker = "クロト"
# 「ごめんな。情けない姿を見せた」
line = "「ごめんな。情けない姿を見せた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ク……ロト……」
line = "「ク……ロト……」"

[[dialogue]]
speaker = "unk"
# 彼女の瞳に浮かんだ涙は、もはや先ほどまでのそれではない。
line = "彼女の瞳に浮かんだ涙は、もはや先ほどまでのそれではない。"

[[dialogue]]
speaker = "クロト"
# 「始めよう──まだ戦いは終わってない」
line = "「始めよう──まだ戦いは終わってない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……うんっ！」
line = "「っ……うんっ！」"

[[dialogue]]
speaker = "unk"
# 今こそ俺が、彼女からその座を貰い受ける時だ。
line = "今こそ俺が、彼女からその座を貰い受ける時だ。"
