[[dialogue]]
speaker = "蛍火"
# 「実は……カフェテリアでも気になる事件が起きているんです」
line = "「実は……カフェテリアでも気になる事件が起きているんです」"

[[dialogue]]
speaker = "ルリエル"
# 「食材がなくなったり、作ったはずの料理が消えてしまったりする感じでしょうか！？」
line = "「食材がなくなったり、作ったはずの料理が消えてしまったりする感じでしょうか！？」"

[[dialogue]]
speaker = "蛍火"
# 「それだけなら、まだ良かったのですが……実は──」
line = "「それだけなら、まだ良かったのですが……実は──」"

[[dialogue]]
speaker = "unk"
# カフェテリアの被害は食材や料理の他に、スプーンやフォーク、お皿などの食器類にまで及んでいるらしい。
line = "カフェテリアの被害は食材や料理の他に、スプーンやフォーク、お皿などの食器類にまで及んでいるらしい。"

[[dialogue]]
speaker = "ルリエル"
# 「う～ん。事件の報告件数も増えてきて、『ちょっとした気のせい』とかではない感じになってきてしまっているのです～」
line = "「う～ん。事件の報告件数も増えてきて、『ちょっとした気のせい』とかではない感じになってきてしまっているのです～」"

[[dialogue]]
speaker = "ルリエル"
# 「誰が犯人なのでしょうか？　ご飯がなくなるだけなら、誰かがつまみ食いしてるんじゃないかと思ってたんですけど」
line = "「誰が犯人なのでしょうか？　ご飯がなくなるだけなら、誰かがつまみ食いしてるんじゃないかと思ってたんですけど」"

[[dialogue]]
speaker = "ラファエロ"
# 「金銭目当ての窃盗、ということはないかな？」
line = "「金銭目当ての窃盗、ということはないかな？」"

[[dialogue]]
speaker = "unk"
# わざわざ学園でやるかな……？
line = "わざわざ学園でやるかな……？"

[[dialogue]]
speaker = "ステラ"
# 「お金が目当てなら、もっと価値のあるものを狙いそうですけどね……」
line = "「お金が目当てなら、もっと価値のあるものを狙いそうですけどね……」"

[[dialogue]]
speaker = "ラファエロ"
# 「価値のあるもの……つまりぼくの絵が狙われている、ということか！」
line = "「価値のあるもの……つまりぼくの絵が狙われている、ということか！」"

[[dialogue]]
speaker = "ルリエル"
# 「ラファエロさんの絵が狙われた、という報告はあがってきていないのです！」
line = "「ラファエロさんの絵が狙われた、という報告はあがってきていないのです！」"

[[dialogue]]
speaker = "ラファエロ"
# 「なるほど。つまり犯人は芸術の何たるかを理解しない者、か……これは大きな手がかりかもしれないね」
line = "「なるほど。つまり犯人は芸術の何たるかを理解しない者、か……これは大きな手がかりかもしれないね」"

[[dialogue]]
speaker = "赤ちゃんクマロボ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「あ～、ごめんなさい！　お腹が空いたんですね～。すぐに食べさせてあげますからね～<emoji=heart04>」
line = "「あ～、ごめんなさい！　お腹が空いたんですね～。すぐに食べさせてあげますからね～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 赤ちゃんクマロボの鳴き声で、話し込んでしまっていた俺たちは、運ばれてきた料理を食べ始める。
line = "赤ちゃんクマロボの鳴き声で、話し込んでしまっていた俺たちは、運ばれてきた料理を食べ始める。"

[[dialogue]]
speaker = "unk"
# ３人は順番に赤ちゃんクマロボを抱きかかえては、甲斐甲斐しく料理を食べさせていた。
line = "３人は順番に赤ちゃんクマロボを抱きかかえては、甲斐甲斐しく料理を食べさせていた。"

[[dialogue]]
speaker = "unk"
# （うーん……）
line = "（うーん……）"

[[dialogue]]
speaker = "unk"
# ふと、疑問が湧いてくる。
line = "ふと、疑問が湧いてくる。"

[[dialogue]]
speaker = "unk"
# ……結局、この『赤ちゃんクマロボ』とは一体何なのだろうか？
line = "……結局、この『赤ちゃんクマロボ』とは一体何なのだろうか？"

[[dialogue]]
speaker = "unk"
# 黒ベア子が操るクマ型ロボットの赤ちゃんバージョン。
line = "黒ベア子が操るクマ型ロボットの赤ちゃんバージョン。"

[[dialogue]]
speaker = "unk"
# まるでこの子が誰かから生まれたように黒ベア子は話していたけれど……冷静に考えてみるとロボットだ。
line = "まるでこの子が誰かから生まれたように黒ベア子は話していたけれど……冷静に考えてみるとロボットだ。"

[[dialogue]]
speaker = "unk"
# 黒ベア子たちは大真面目にこの子の父親を捜していたけど、そもそもこの子に父親なんているのだろうか？
line = "黒ベア子たちは大真面目にこの子の父親を捜していたけど、そもそもこの子に父親なんているのだろうか？"

[[dialogue]]
speaker = "unk"
# 今まで深く考えていなかったけれど、この赤ちゃんクマロボは謎だらけの存在だ──
line = "今まで深く考えていなかったけれど、この赤ちゃんクマロボは謎だらけの存在だ──"

[[dialogue]]
speaker = "ルリエル"
# 「はーい、それじゃ最後にルリエルがデザートを食べさせてあげますからね～<emoji=heart04>」
line = "「はーい、それじゃ最後にルリエルがデザートを食べさせてあげますからね～<emoji=heart04>」"

[[dialogue]]
speaker = "ステラ"
# 「ルリエルさん、そろそろ交代の時間ですよ。デザートを食べさせる役目はボクがやりますから」
line = "「ルリエルさん、そろそろ交代の時間ですよ。デザートを食べさせる役目はボクがやりますから」"

[[dialogue]]
speaker = "ルリエル"
# 「え～、もう少しだけいいじゃないですか～。ちょっとだけ延長、お願いしますよ～」
line = "「え～、もう少しだけいいじゃないですか～。ちょっとだけ延長、お願いしますよ～」"

[[dialogue]]
speaker = "ステラ"
# 「う～、そんなこと言って～。ルリエルさん、ちょっとだけって言いながらずーっと抱っこしてるんですから～」
line = "「う～、そんなこと言って～。ルリエルさん、ちょっとだけって言いながらずーっと抱っこしてるんですから～」"

[[dialogue]]
speaker = "ラファエロ"
# 「まあまあ、延長の時間を決めればいいじゃないか」
line = "「まあまあ、延長の時間を決めればいいじゃないか」"

[[dialogue]]
speaker = "ステラ"
# 「そうですね……じゃ、１分延長でお願いします」
line = "「そうですね……じゃ、１分延長でお願いします」"

[[dialogue]]
speaker = "ルリエル"
# 「１分は短すぎます～。せめて３分、お願いします！」
line = "「１分は短すぎます～。せめて３分、お願いします！」"

[[dialogue]]
speaker = "ステラ"
# 「３分もですか～？　待ちきれませんよ～」
line = "「３分もですか～？　待ちきれませんよ～」"

[[dialogue]]
speaker = "ラファエロ"
# 「やれやれ、２人は完全に赤ちゃんクマロボに夢中になってしまっているね」
line = "「やれやれ、２人は完全に赤ちゃんクマロボに夢中になってしまっているね」"

[[dialogue]]
speaker = "ステラ"
# 「えへへ、だって可愛いですから～<emoji=heart04>」
line = "「えへへ、だって可愛いですから～<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「いつまででも抱っこしていたいですよね～<emoji=heart04>」
line = "「いつまででも抱っこしていたいですよね～<emoji=heart04>」"

[[dialogue]]
speaker = "ラファエロ"
# 「その気持ちはわかるよ。……いっそこの子が３体に分裂してくれれば解決するんだけどね」
line = "「その気持ちはわかるよ。……いっそこの子が３体に分裂してくれれば解決するんだけどね」"

[[dialogue]]
speaker = "ルリエル"
# 「あはは、それはいいですね～！　そしたら独り占めして、付きっ切りで可愛がれちゃうんですけど♪」
line = "「あはは、それはいいですね～！　そしたら独り占めして、付きっ切りで可愛がれちゃうんですけど♪」"

[[dialogue]]
speaker = "蛍火"
# 「あの～、すみません」
line = "「あの～、すみません」"

[[dialogue]]
speaker = "ルリエル"
# 「ほぇ？　蛍火先輩、どうかしましたか？」
line = "「ほぇ？　蛍火先輩、どうかしましたか？」"

[[dialogue]]
speaker = "蛍火"
# 「この子が厨房の方に紛れ込んでしまっていたので……どうぞ」
line = "「この子が厨房の方に紛れ込んでしまっていたので……どうぞ」"

[[dialogue]]
speaker = "赤ちゃんクマロボＢ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「…………え？」
line = "「…………え？」"

[[dialogue]]
speaker = "赤ちゃんクマロボＡ"
# 「ばぶー<emoji=heart04>」
line = "「ばぶー<emoji=heart04>」"

[[dialogue]]
speaker = "ステラ"
# 「…………え？」
line = "「…………え？」"

[[dialogue]]
speaker = "２体の赤ちゃん"
# 「「ばぶー<emoji=heart04>」」
line = "「「ばぶー<emoji=heart04>」」"

[[dialogue]]
speaker = "全員"
# 「増えたーーー！！？？？」
line = "「増えたーーー！！？？？」"
