[[dialogue]]
speaker = "unk"
# 第２話,妄想天使と恋をもう１度,P
line = "第２話,妄想天使と恋をもう１度,P"

[[dialogue]]
speaker = "unk"
# その日は街にモンスターが出現し、他のプリマステラがモンスターと交戦。そこへ俺とイクシーも駆け付けて、加勢することになった。
line = "その日は街にモンスターが出現し、他のプリマステラがモンスターと交戦。そこへ俺とイクシーも駆け付けて、加勢することになった。"

[[dialogue]]
speaker = "イクシリオン"
# 「集中一閃――はあぁっ！」
line = "「集中一閃――はあぁっ！」"

[[dialogue]]
speaker = "モンスター"
# 「ギアーーズッ！？」
line = "「ギアーーズッ！？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ふぅ……どうやら、これで終わりみたいですね」
line = "「ふぅ……どうやら、これで終わりみたいですね」"

[[dialogue]]
speaker = "星騎士女子Ａ"
# 「す、すごい……！　イクシリオンさん、敵の攻撃をギリギリで避けながら、あっという間に全部仕留めちゃった……！」
line = "「す、すごい……！　イクシリオンさん、敵の攻撃をギリギリで避けながら、あっという間に全部仕留めちゃった……！」"

[[dialogue]]
speaker = "星騎士女子Ｂ"
# 「しかも、それぞれ一撃で全部仕留めてる……！　前から実力ある星騎士だったけど、動きのキレが見違えるように上がってるよ……！」
line = "「しかも、それぞれ一撃で全部仕留めてる……！　前から実力ある星騎士だったけど、動きのキレが見違えるように上がってるよ……！」"

[[dialogue]]
speaker = "星騎士女子Ｃ"
# 「真面目で清楚で、あんなに可愛いバレンタインフォームでしかも強いなんて、イクシリオンさんってやっぱり優等生……！」
line = "「真面目で清楚で、あんなに可愛いバレンタインフォームでしかも強いなんて、イクシリオンさんってやっぱり優等生……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「会長、戦闘お疲れさまでした。他の星騎士の方々を確認して参りましたが、みなさん特に怪我もなく、無事のようです」
line = "「会長、戦闘お疲れさまでした。他の星騎士の方々を確認して参りましたが、みなさん特に怪我もなく、無事のようです」"

[[dialogue]]
speaker = "unk"
# イクシー、すごい大活躍だったな！
line = "イクシー、すごい大活躍だったな！"

[[dialogue]]
speaker = "イクシリオン"
# 「あ、ありがとうございます……<emoji=heart04>　会長が毎日訓練に付き合って下さってるおかげで、バレンタインフォームの能力も大分制御できるようになってきました」
line = "「あ、ありがとうございます……<emoji=heart04>　会長が毎日訓練に付き合って下さってるおかげで、バレンタインフォームの能力も大分制御できるようになってきました」"

[[dialogue]]
speaker = "unk"
# イクシーのバレンタインフォームは、聞けば覚醒当初『妄想に強制トリップしてしまう』という大きな問題を抱えていたらしい。
line = "イクシーのバレンタインフォームは、聞けば覚醒当初『妄想に強制トリップしてしまう』という大きな問題を抱えていたらしい。"

[[dialogue]]
speaker = "unk"
# しかし彼女はそれを訓練で克服し、短期間で『集中力を極限まで研ぎ澄ます』能力へと昇華させていた。我が彼女ながら、星騎士としてすごい才能の持ち主だと感心させられる。
line = "しかし彼女はそれを訓練で克服し、短期間で『集中力を極限まで研ぎ澄ます』能力へと昇華させていた。我が彼女ながら、星騎士としてすごい才能の持ち主だと感心させられる。"

[[dialogue]]
speaker = "イクシリオン"
# 「……おや？　会長、もしやどこかお怪我をされているのでは？」
line = "「……おや？　会長、もしやどこかお怪我をされているのでは？」"

[[dialogue]]
speaker = "イクシリオン"
# 「だとしたらいけません！　１度上着を脱いで、見せて頂いても……いえ、ここには他の方もいらっしゃるので、人のいない場所に移動しましょう」
line = "「だとしたらいけません！　１度上着を脱いで、見せて頂いても……いえ、ここには他の方もいらっしゃるので、人のいない場所に移動しましょう」"

[[dialogue]]
speaker = "イクシリオン"
# 「ハッ――！？　い、いえ、違います！　これは別に人気のない路地に会長を連れ込んで、外でハレンチなことに及ぼうとしたわけでは……！」
line = "「ハッ――！？　い、いえ、違います！　これは別に人気のない路地に会長を連れ込んで、外でハレンチなことに及ぼうとしたわけでは……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「って！　あわわわっ！？　私は何をテンパって恥ずかしいことを口にして……！　し、失礼しました！　今のは忘れて下さい！」
line = "「って！　あわわわっ！？　私は何をテンパって恥ずかしいことを口にして……！　し、失礼しました！　今のは忘れて下さい！」"

[[dialogue]]
speaker = "unk"
# なんか、懐かしいやり取りだ……
line = "なんか、懐かしいやり取りだ……"

[[dialogue]]
speaker = "イクシリオン"
# 「え？　――私と会長が初めて会った時みたい？　い、言われてみれば……！」
line = "「え？　――私と会長が初めて会った時みたい？　い、言われてみれば……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「私は、あの時も会長と会えたのが嬉しくて、ちゃんとしているところを見せようとテンパってしまって……」
line = "「私は、あの時も会長と会えたのが嬉しくて、ちゃんとしているところを見せようとテンパってしまって……」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "イクシリオン"
# 「い、いえ！　なんでもありません！」
line = "「い、いえ！　なんでもありません！」"

[[dialogue]]
speaker = "イクシリオン"
# 「そ、そういえば、初めて会った時はコンビニに寄って、買い食いをしましたね……」
line = "「そ、そういえば、初めて会った時はコンビニに寄って、買い食いをしましたね……」"

[[dialogue]]
speaker = "イクシリオン"
# （今思い返すと、あの時は会長の前でソーセージを沢山頬張ってしまって、恥ずかしい限りですが……<emoji=heart04>）
line = "（今思い返すと、あの時は会長の前でソーセージを沢山頬張ってしまって、恥ずかしい限りですが……<emoji=heart04>）"

[[dialogue]]
speaker = "イクシリオン"
# 「あっ……！？」
line = "「あっ……！？」"

[[dialogue]]
speaker = "unk"
# ふと、イクシーのお腹が鳴る音がして、彼女はかあぁっと顔を赤くする。
line = "ふと、イクシーのお腹が鳴る音がして、彼女はかあぁっと顔を赤くする。"

[[dialogue]]
speaker = "イクシリオン"
# 「う、うぅ……買い食いを思い出して、お腹が鳴ってしまうなんて……お、お恥ずかしいです……<emoji=heart04>」
line = "「う、うぅ……買い食いを思い出して、お腹が鳴ってしまうなんて……お、お恥ずかしいです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんなイクシーの様子が可愛くて、俺は思わずクスッと笑ってしまう。
line = "そんなイクシーの様子が可愛くて、俺は思わずクスッと笑ってしまう。"

[[dialogue]]
speaker = "unk"
# コンビニ、寄ってこうか
line = "コンビニ、寄ってこうか"

[[dialogue]]
speaker = "イクシリオン"
# 「そ、それは……その……」
line = "「そ、それは……その……」"

[[dialogue]]
speaker = "イクシリオン"
# 「――ひゃっ<emoji=heart04>　か、会長……！？」
line = "「――ひゃっ<emoji=heart04>　か、会長……！？」"

[[dialogue]]
speaker = "unk"
# 俺は彼女の手を取って、そのまま近くのコンビニへと向かった。
line = "俺は彼女の手を取って、そのまま近くのコンビニへと向かった。"

[[dialogue]]
speaker = "イクシリオン"
# 「すみません、会長。気を遣わせてしまって……」
line = "「すみません、会長。気を遣わせてしまって……」"

[[dialogue]]
speaker = "unk"
# ソーセージは買わなくてよかったの？
line = "ソーセージは買わなくてよかったの？"

[[dialogue]]
speaker = "イクシリオン"
# 「は、はい。チキンだけで大丈夫です」
line = "「は、はい。チキンだけで大丈夫です」"

[[dialogue]]
speaker = "イクシリオン"
# （会長の前でソーセージを食べるのは、ついエッチな妄想をしてしまいそうで、恥ずかしいですし……）
line = "（会長の前でソーセージを食べるのは、ついエッチな妄想をしてしまいそうで、恥ずかしいですし……）"

[[dialogue]]
speaker = "イクシリオン"
# （ああでも、フライドチキンは増量中だったので、つい３つも買ってしまいました……）
line = "（ああでも、フライドチキンは増量中だったので、つい３つも買ってしまいました……）"

[[dialogue]]
speaker = "イクシリオン"
# （最近は会長の前でガツガツ食べるのが恥ずかしくて、自重していたというのに……）
line = "（最近は会長の前でガツガツ食べるのが恥ずかしくて、自重していたというのに……）"

[[dialogue]]
speaker = "unk"
# 俺がフライドチキンを食べ始めると、イクシーも口元を隠すようにして食べ始めた。
line = "俺がフライドチキンを食べ始めると、イクシーも口元を隠すようにして食べ始めた。"

[[dialogue]]
speaker = "イクシリオン"
# 「し、失礼します……はむっ。――んんっ<emoji=heart04>　フライドチキン、おいひぃ……<emoji=heart04>」
line = "「し、失礼します……はむっ。――んんっ<emoji=heart04>　フライドチキン、おいひぃ……<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# 「はむっ……もぐもぐ……はあぁっ<emoji=heart04>　濃厚な汁が口の中で溢れて……って、ハッ――！？」
line = "「はむっ……もぐもぐ……はあぁっ<emoji=heart04>　濃厚な汁が口の中で溢れて……って、ハッ――！？」"

[[dialogue]]
speaker = "イクシリオン"
# （か、会長が微笑みながら、私が食べるのをじーっと見つめています……！）
line = "（か、会長が微笑みながら、私が食べるのをじーっと見つめています……！）"

[[dialogue]]
speaker = "イクシリオン"
# 「あ、あぅ……会長に食べているところをそんな見つめられると……恥ずかしいです……<emoji=heart04>」
line = "「あ、あぅ……会長に食べているところをそんな見つめられると……恥ずかしいです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は幸せ一杯に食べるイクシーが好きだからな
line = "俺は幸せ一杯に食べるイクシーが好きだからな"

[[dialogue]]
speaker = "イクシリオン"
# 「……！　そ、そんな風に言われてしまうと……ますます顔が熱くなってしまいます……<emoji=heart04>　えへへ……<emoji=heart04>」
line = "「……！　そ、そんな風に言われてしまうと……ますます顔が熱くなってしまいます……<emoji=heart04>　えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 恥じらいながらも嬉しそうに頬を緩ませる彼女を、改めて可愛いと思う俺なのだった。
line = "恥じらいながらも嬉しそうに頬を緩ませる彼女を、改めて可愛いと思う俺なのだった。"
