[[dialogue]]
speaker = "unk"
# 第３話,トリシャの意外な特技,P
line = "第３話,トリシャの意外な特技,P"

[[dialogue]]
speaker = "キリカ"
# 「魔界レゾフより、ようこそお越しくださいました。私、お嬢様にお仕えしております、星見家メイド隊の長──キリカと申します」
line = "「魔界レゾフより、ようこそお越しくださいました。私、お嬢様にお仕えしております、星見家メイド隊の長──キリカと申します」"

[[dialogue]]
speaker = "トリシャ"
# 「うっ、おっ、あ、わ、私は……トリ。トリシャ、アポ、ア、ポテレス……」
line = "「うっ、おっ、あ、わ、私は……トリ。トリシャ、アポ、ア、ポテレス……」"

[[dialogue]]
speaker = "キリカ"
# 「魔界では大層、お嬢様がお世話になったと伺っております。当家に滞在中は、ぜひご実家のように寛がれてください」
line = "「魔界では大層、お嬢様がお世話になったと伺っております。当家に滞在中は、ぜひご実家のように寛がれてください」"

[[dialogue]]
speaker = "トリシャ"
# 「きょ、恐縮の至り……あ、あなたにも、星の加護が訪れますよう……」
line = "「きょ、恐縮の至り……あ、あなたにも、星の加護が訪れますよう……」"

[[dialogue]]
speaker = "キリカ"
# 「高名な占星術師様からのお言葉、ありがたく頂戴いたします。それでは私は外に控えておりますので、何かありましたらお呼びください」
line = "「高名な占星術師様からのお言葉、ありがたく頂戴いたします。それでは私は外に控えておりますので、何かありましたらお呼びください」"

[[dialogue]]
speaker = "トリシャ"
# 「あ。ま、待って欲しい……これ。その、お近づきのしるしに……プレゼント……」
line = "「あ。ま、待って欲しい……これ。その、お近づきのしるしに……プレゼント……」"

[[dialogue]]
speaker = "キリカ"
# 「私にですか？　まあ……これは素敵なものを。ありがとうございます」
line = "「私にですか？　まあ……これは素敵なものを。ありがとうございます」"

[[dialogue]]
speaker = "キリカ"
# 「大切に使わせていただきますね。それでは……」
line = "「大切に使わせていただきますね。それでは……」"

[[dialogue]]
speaker = "トリシャ"
# 「ふっはぁああ～……！　スケールが、違う……星見家……物語で読んだ、お姫様の城、みたいです……」
line = "「ふっはぁああ～……！　スケールが、違う……星見家……物語で読んだ、お姫様の城、みたいです……」"

[[dialogue]]
speaker = "unk"
# お疲れ様、トリシャさん
line = "お疲れ様、トリシャさん"

[[dialogue]]
speaker = "トリシャ"
# 「ありがとう……でも、本当にすごい。屋敷にいる人、みんな心が綺麗で……星と繋がっている。フィオナさんの人柄、でしょうか……」
line = "「ありがとう……でも、本当にすごい。屋敷にいる人、みんな心が綺麗で……星と繋がっている。フィオナさんの人柄、でしょうか……」"

[[dialogue]]
speaker = "トリシャ"
# 「人間の友達が、どんどん増えて……に、へ、へへっ……師匠に伝えたらきっと卒倒する、でしょう……」
line = "「人間の友達が、どんどん増えて……に、へ、へへっ……師匠に伝えたらきっと卒倒する、でしょう……」"

[[dialogue]]
speaker = "unk"
# まだまだこれからだよ
line = "まだまだこれからだよ"

[[dialogue]]
speaker = "トリシャ"
# 「そうでした。そろそろ……本命の……」
line = "「そうでした。そろそろ……本命の……」"

[[dialogue]]
speaker = "ナミエル"
# 「失礼いたします。お嬢様より、こちらに顔を出すようにと仰せつか──」
line = "「失礼いたします。お嬢様より、こちらに顔を出すようにと仰せつか──」"

[[dialogue]]
speaker = "トリシャ"
# 「て、天使っ……！！　は、ははは、初めて、見た……！」
line = "「て、天使っ……！！　は、ははは、初めて、見た……！」"

[[dialogue]]
speaker = "ナミエル"
# 「ひゃっ！？　あ、あの、私が何か……？」
line = "「ひゃっ！？　あ、あの、私が何か……？」"

[[dialogue]]
speaker = "トリシャ"
# 「お、ぉおお……すごいっ……綺麗な羽……ヘイロー……魔族と全然違う……！」
line = "「お、ぉおお……すごいっ……綺麗な羽……ヘイロー……魔族と全然違う……！」"

[[dialogue]]
speaker = "ナミエル"
# 「ひ、緋宮会長。この方が、あの、トリシャ様……？　どうしてこんなに興奮して……！？」
line = "「ひ、緋宮会長。この方が、あの、トリシャ様……？　どうしてこんなに興奮して……！？」"

[[dialogue]]
speaker = "unk"
# 天使に会うの、初めてなんだ
line = "天使に会うの、初めてなんだ"

[[dialogue]]
speaker = "ナミエル"
# 「それは何となく分かるのですが……きゃっ。は、羽をつんつんしないでくださいっ……！」
line = "「それは何となく分かるのですが……きゃっ。は、羽をつんつんしないでくださいっ……！」"

[[dialogue]]
speaker = "トリシャ"
# 「素晴らしい……本当に綺麗……そしてただならぬ香りもする……くんくん……」
line = "「素晴らしい……本当に綺麗……そしてただならぬ香りもする……くんくん……」"

[[dialogue]]
speaker = "ナミエル"
# 「た、ただならぬ！？　嗅ぐのはもっとダメです！　ななな、何なんですか、この方はっ！」
line = "「た、ただならぬ！？　嗅ぐのはもっとダメです！　ななな、何なんですか、この方はっ！」"

[[dialogue]]
speaker = "トリシャ"
# 「申し遅れた。私は魔界レゾフの占星術師、トリシャ……フィオナさんとは、と、友達……に、へへっ……」
line = "「申し遅れた。私は魔界レゾフの占星術師、トリシャ……フィオナさんとは、と、友達……に、へへっ……」"

[[dialogue]]
speaker = "ナミエル"
# 「名前を聞いているのではありませんっ……う、ぅう、私はいったいどうすれば……？」
line = "「名前を聞いているのではありませんっ……う、ぅう、私はいったいどうすれば……？」"

[[dialogue]]
speaker = "unk"
# 優しい子だから相手してあげて
line = "優しい子だから相手してあげて"

[[dialogue]]
speaker = "ナミエル"
# 「わ……わかりました。そういうミッション、ということですね？」
line = "「わ……わかりました。そういうミッション、ということですね？」"

[[dialogue]]
speaker = "トリシャ"
# 「あなたの守護星は……<ruby=アルケス>コップ座α星</ruby>。なるほど。天の杯に似合う、水の波動……」
line = "「あなたの守護星は……<ruby>コップ座α星<rt>アルケス</rt></ruby>。なるほど。天の杯に似合う、水の波動……」"

[[dialogue]]
speaker = "ナミエル"
# 「え……！　見ただけで、他人の守護星が分かるのですか？」
line = "「え……！　見ただけで、他人の守護星が分かるのですか？」"

[[dialogue]]
speaker = "トリシャ"
# 「星との対話は占星術師の基本だから。天使さん、あの、お名前は……？」
line = "「星との対話は占星術師の基本だから。天使さん、あの、お名前は……？」"

[[dialogue]]
speaker = "ナミエル"
# 「ナミエルです。ナミエル・クレシェンテ……」
line = "「ナミエルです。ナミエル・クレシェンテ……」"

[[dialogue]]
speaker = "トリシャ"
# 「ナミエルさん……あの、良ければ、私と、友達に……」
line = "「ナミエルさん……あの、良ければ、私と、友達に……」"

[[dialogue]]
speaker = "ナミエル"
# 「あ、は、はい……？　それは、もちろん構いませんが……」
line = "「あ、は、はい……？　それは、もちろん構いませんが……」"

[[dialogue]]
speaker = "トリシャ"
# 「に、にへへっ……で、では。これ。お近づきのしるしに、お土産をどうぞ……」
line = "「に、にへへっ……で、では。これ。お近づきのしるしに、お土産をどうぞ……」"

[[dialogue]]
speaker = "ナミエル"
# 「あ、ありがとうございます──あ、でも、お嬢様の許可なく物をいただくわけには」
line = "「あ、ありがとうございます──あ、でも、お嬢様の許可なく物をいただくわけには」"

[[dialogue]]
speaker = "トリシャ"
# 「大丈夫。高価な物じゃない……その、私が編んだ、お手製の……」
line = "「大丈夫。高価な物じゃない……その、私が編んだ、お手製の……」"

[[dialogue]]
speaker = "ナミエル"
# 「あ……マフラー、ですね。丁寧に編み込まれていて、とても優しい手触り……」
line = "「あ……マフラー、ですね。丁寧に編み込まれていて、とても優しい手触り……」"

[[dialogue]]
speaker = "unk"
# 編み物、得意なんだ？
line = "編み物、得意なんだ？"

[[dialogue]]
speaker = "トリシャ"
# 「占星術以外で、唯一身に付いてる技……ここに来る予定が立った時から、レゾフでたくさん編んで、持ってきた……フフ……」
line = "「占星術以外で、唯一身に付いてる技……ここに来る予定が立った時から、レゾフでたくさん編んで、持ってきた……フフ……」"

[[dialogue]]
speaker = "トリシャ"
# 「ただし問題も、あって……」
line = "「ただし問題も、あって……」"

[[dialogue]]
speaker = "ルリエル"
# 「こんにちはー！　フィオナ会長に言われてやってきました！　魔界からのお客様がいらっしゃるそうでー！」
line = "「こんにちはー！　フィオナ会長に言われてやってきました！　魔界からのお客様がいらっしゃるそうでー！」"

[[dialogue]]
speaker = "トリシャ"
# 「お、おぉっ……新しい、天使、さん……！」
line = "「お、おぉっ……新しい、天使、さん……！」"

[[dialogue]]
speaker = "ルリエル"
# 「はい、ルリエルは天使なのですっ！　どんなご用事でしょうかっ！」
line = "「はい、ルリエルは天使なのですっ！　どんなご用事でしょうかっ！」"

[[dialogue]]
speaker = "トリシャ"
# 「どうしよう……あれだけ作ってきたマフラーのストックが……フィオナさんのコミュニティ……すごく広い……」
line = "「どうしよう……あれだけ作ってきたマフラーのストックが……フィオナさんのコミュニティ……すごく広い……」"

[[dialogue]]
speaker = "トリシャ"
# 「自分のことを占えていれば……こんなことには……」
line = "「自分のことを占えていれば……こんなことには……」"

[[dialogue]]
speaker = "トリシャ"
# 「ルリエル、さん……申し訳ないのだけど、３……いや、２時間ほど、待っていて欲しい……今からマフラー編むから……」
line = "「ルリエル、さん……申し訳ないのだけど、３……いや、２時間ほど、待っていて欲しい……今からマフラー編むから……」"

[[dialogue]]
speaker = "ルリエル"
# 「どどど、どういうことなのですっ！？」
line = "「どどど、どういうことなのですっ！？」"

[[dialogue]]
speaker = "unk"
# その後、さらに大勢の人たちがトリシャさんに会いに来て……そのたびに新しいマフラーを編んでいくトリシャさんなのだった。
line = "その後、さらに大勢の人たちがトリシャさんに会いに来て……そのたびに新しいマフラーを編んでいくトリシャさんなのだった。"
