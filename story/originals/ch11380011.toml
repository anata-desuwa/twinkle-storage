[[dialogue]]
speaker = "unk"
# 第１話,恋人のメルエルが増えた場合,P
line = "第１話,恋人のメルエルが増えた場合,P"

[[dialogue]]
speaker = "unk"
# メルエルと恋人として学園生活を送っていたある日のこと。
line = "メルエルと恋人として学園生活を送っていたある日のこと。"

[[dialogue]]
speaker = "メルエル"
# 「まさか、自分がもう１人増えちゃうなんて……！」
line = "「まさか、自分がもう１人増えちゃうなんて……！」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「うん、しかもちっちゃい体に変身しちゃってて、自分でもビックリしちゃったよ～」
line = "「うん、しかもちっちゃい体に変身しちゃってて、自分でもビックリしちゃったよ～」"

[[dialogue]]
speaker = "unk"
# なんと、ヴィーナスの持つ『女神の力』の影響を受けて、メルエルが２人に増えてしまった。
line = "なんと、ヴィーナスの持つ『女神の力』の影響を受けて、メルエルが２人に増えてしまった。"

[[dialogue]]
speaker = "unk"
# ヴィーナス自身や、その時近くにいたレミカも同じような現象に見舞われており、俺はその解決を手伝っていた。
line = "ヴィーナス自身や、その時近くにいたレミカも同じような現象に見舞われており、俺はその解決を手伝っていた。"

[[dialogue]]
speaker = "メルエル"
# 「でも、ヴィーナスちゃんが無事に元の１人へ戻れたのを見るに、私たちも戻る為には、何か自分が望むことを叶える必要があるみたいだけど……」
line = "「でも、ヴィーナスちゃんが無事に元の１人へ戻れたのを見るに、私たちも戻る為には、何か自分が望むことを叶える必要があるみたいだけど……」"

[[dialogue]]
speaker = "メルエル"
# 「う～ん、でも、私の望むことかぁ……」
line = "「う～ん、でも、私の望むことかぁ……」"

[[dialogue]]
speaker = "メルエル"
# 「正直、私は会長くんとお付き合いできててすごく幸せだから、パッとは思いつかないなぁ」
line = "「正直、私は会長くんとお付き合いできててすごく幸せだから、パッとは思いつかないなぁ」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「そこは色々あるでしょ？　たとえば、会長くんと早く本当に結婚したいとか……！」
line = "「そこは色々あるでしょ？　たとえば、会長くんと早く本当に結婚したいとか……！」"

[[dialogue]]
speaker = "メルエル"
# 「はいっ！？　なななっ、いっきなり何を言ってるのかな、ちっちゃい私！？」
line = "「はいっ！？　なななっ、いっきなり何を言ってるのかな、ちっちゃい私！？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「だって……もう婚約指輪までもらってるんだもん。内心ではよく妄想してるでしょ？」
line = "「だって……もう婚約指輪までもらってるんだもん。内心ではよく妄想してるでしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「それはそうだけど……って、違うよ！　そういうことじゃなくて、普通は考えてても恥ずかしくて言えないでしょ！？」
line = "「それはそうだけど……って、違うよ！　そういうことじゃなくて、普通は考えてても恥ずかしくて言えないでしょ！？」"

[[dialogue]]
speaker = "メルエル"
# 「それに、私が思ってても、会長くんが早く結婚したいかどうかは、わからないし……」
line = "「それに、私が思ってても、会長くんが早く結婚したいかどうかは、わからないし……」"

[[dialogue]]
speaker = "unk"
# そう言って恥ずかしそうに、ちらっと俺の顔を伺ってくるメルエル。
line = "そう言って恥ずかしそうに、ちらっと俺の顔を伺ってくるメルエル。"

[[dialogue]]
speaker = "unk"
# ただ、流石に学園を卒業してからかな？
line = "ただ、流石に学園を卒業してからかな？"

[[dialogue]]
speaker = "unk"
# 俺も、メルエルと早く結婚したい。
line = "俺も、メルエルと早く結婚したい。"

[[dialogue]]
speaker = "メルエル"
# 「！　か、会長くん……<emoji=heart04>」
line = "「！　か、会長くん……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「はうぅ～<emoji=heart04>　そんなこと言われたら、嬉しすぎて、メルトしちゃうよぉ～……<emoji=heart04>」
line = "「はうぅ～<emoji=heart04>　そんなこと言われたら、嬉しすぎて、メルトしちゃうよぉ～……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「えへへへへへぇ<emoji=heart04>　私も嬉しいな<emoji=heart04>　――って、あっ！　もしかして……」
line = "「えへへへへへぇ<emoji=heart04>　私も嬉しいな<emoji=heart04>　――って、あっ！　もしかして……」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「私が一体なんの為に増えたのか、わかったかも……！」
line = "「私が一体なんの為に増えたのか、わかったかも……！」"

[[dialogue]]
speaker = "メルエル"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「大きな私が恥ずかしがって言えない本心を、小さな私が背中を押すために増えたんじゃないかな？」
line = "「大きな私が恥ずかしがって言えない本心を、小さな私が背中を押すために増えたんじゃないかな？」"

[[dialogue]]
speaker = "メルエル"
# 「あっ！　だからさっき恥ずかしがらずに、思っていることを……！」
line = "「あっ！　だからさっき恥ずかしがらずに、思っていることを……！」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「うん。なんかこの体だと、不思議と勇気が湧いてくる感じがするんだ♪」
line = "「うん。なんかこの体だと、不思議と勇気が湧いてくる感じがするんだ♪」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「それなら……元に戻るには、私がよく妄想してるけど、会長くんの前だと恥ずかしくて言えないことを、実行に移せばいいんじゃないかな？」
line = "「それなら……元に戻るには、私がよく妄想してるけど、会長くんの前だと恥ずかしくて言えないことを、実行に移せばいいんじゃないかな？」"

[[dialogue]]
speaker = "メルエル"
# 「えっ……えぇ～っ！？」
line = "「えっ……えぇ～っ！？」"

[[dialogue]]
speaker = "unk"
# そうして、メルエルに『恥ずかしいから２人（３人）きりになれる場所がいい』とお願いされ、俺の部屋へと移動してくることになった。
line = "そうして、メルエルに『恥ずかしいから２人（３人）きりになれる場所がいい』とお願いされ、俺の部屋へと移動してくることになった。"

[[dialogue]]
speaker = "メルエル"
# 「うぅ～、妄想を実際に叶えちゃうなんて、恥ずかしい……！　このままメルトしちゃいそうだよぉ～……<emoji=heart04>」
line = "「うぅ～、妄想を実際に叶えちゃうなんて、恥ずかしい……！　このままメルトしちゃいそうだよぉ～……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「それじゃあ、発表するね♪　私が望んでいることは、『会長くんと新婚さんごっこをして、旦那様になってもらいたい』ってことだよ<emoji=heart04>」
line = "「それじゃあ、発表するね♪　私が望んでいることは、『会長くんと新婚さんごっこをして、旦那様になってもらいたい』ってことだよ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「なんでそんなノリノリで言えるの、ちっちゃい私！？」
line = "「なんでそんなノリノリで言えるの、ちっちゃい私！？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ふふっ♪　今まで恥ずかしくて、大好きな会長くんに本心を言えなかった分、なんだか素直に言葉を口にできることが嬉しくって～<emoji=heart04>」
line = "「ふふっ♪　今まで恥ずかしくて、大好きな会長くんに本心を言えなかった分、なんだか素直に言葉を口にできることが嬉しくって～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ……今までもだいぶストレートに好意を伝えてもらっていた気がするが、メルエル的にはあれでもまだ『恥ずかしい』と思って遠慮している部分があったらしい。
line = "……今までもだいぶストレートに好意を伝えてもらっていた気がするが、メルエル的にはあれでもまだ『恥ずかしい』と思って遠慮している部分があったらしい。"

[[dialogue]]
speaker = "unk"
# 彼氏としては『嬉しい』以外の感情はないのだけれど……まずい、メルエルは困っているのに、ニヤニヤしちゃうのはまずいぞ、俺！
line = "彼氏としては『嬉しい』以外の感情はないのだけれど……まずい、メルエルは困っているのに、ニヤニヤしちゃうのはまずいぞ、俺！"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「えへへぇ<emoji=heart04>　あんなことや、こんなことも、この体だったら言いたい放題だよぉ<emoji=heart04>」
line = "「えへへぇ<emoji=heart04>　あんなことや、こんなことも、この体だったら言いたい放題だよぉ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「一刻も早く元に戻らないといけない気がしてきたよ！？」
line = "「一刻も早く元に戻らないといけない気がしてきたよ！？」"

[[dialogue]]
speaker = "unk"
# なら早速、『新婚さんごっこ』しよっか
line = "なら早速、『新婚さんごっこ』しよっか"

[[dialogue]]
speaker = "メルエル"
# 「！　そ、そんな子供みたいなお願い、聞いてくれるの……！？」
line = "「！　そ、そんな子供みたいなお願い、聞いてくれるの……！？」"

[[dialogue]]
speaker = "unk"
# もちろんだと力強く頷いて見せる。
line = "もちろんだと力強く頷いて見せる。"

[[dialogue]]
speaker = "unk"
# というか、彼女とイチャイチャできるだけなので、俺にも得しかない……
line = "というか、彼女とイチャイチャできるだけなので、俺にも得しかない……"

[[dialogue]]
speaker = "メルエル"
# 「か、会長くん<emoji=heart04>　それじゃあ……」
line = "「か、会長くん<emoji=heart04>　それじゃあ……」"

[[dialogue]]
speaker = "メルエル"
# 「その……だ、<b>旦那様</b><emoji=heart04>　不束者ですが、よろしくお願いします……<emoji=heart04>」
line = "「その……だ、<b>旦那様</b><emoji=heart04>　不束者ですが、よろしくお願いします……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「旦那様……私、ラブラブなキスがしたいです<emoji=heart04>」
line = "「旦那様……私、ラブラブなキスがしたいです<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「えっ！？　ちっちゃな私！？」
line = "「えっ！？　ちっちゃな私！？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ん～っ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん～っ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ずいっと俺に顔を近づけてきた小さなメルエルから、そのまま唇を奪われる。
line = "ずいっと俺に顔を近づけてきた小さなメルエルから、そのまま唇を奪われる。"

[[dialogue]]
speaker = "メルエル"
# 「いきなりキスとか、早いよ！？　女の子から行くのもちょっとはしたない気がするし、ムードとか流れとか、色々あるでしょ！？」
line = "「いきなりキスとか、早いよ！？　女の子から行くのもちょっとはしたない気がするし、ムードとか流れとか、色々あるでしょ！？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「だって……私は旦那様のこと、大好きなんだもん<emoji=heart04>」
line = "「だって……私は旦那様のこと、大好きなんだもん<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「受け入れてくれるって思ったら、好きって気持ちが抑えられなくなっちゃうでしょ？」
line = "「受け入れてくれるって思ったら、好きって気持ちが抑えられなくなっちゃうでしょ？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「おっきい私だって、できることなら会長くんとちゅーしたまま、ベッドの中で２４時間ずっとイチャイチャしてみたいって思ってるじゃん♪」
line = "「おっきい私だって、できることなら会長くんとちゅーしたまま、ベッドの中で２４時間ずっとイチャイチャしてみたいって思ってるじゃん♪」"

[[dialogue]]
speaker = "メルエル"
# 「思ってないよ、そんなはしたないこと！？」
line = "「思ってないよ、そんなはしたないこと！？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「自分に嘘ついても意味ないんだよ？」
line = "「自分に嘘ついても意味ないんだよ？」"

[[dialogue]]
speaker = "メルエル"
# 「…………はいぃ、嘘です。妄想しちゃってたことあります」
line = "「…………はいぃ、嘘です。妄想しちゃってたことあります」"

[[dialogue]]
speaker = "unk"
# （メルエルが俺とそんな妄想を……！？）
line = "（メルエルが俺とそんな妄想を……！？）"

[[dialogue]]
speaker = "unk"
# まずい！　ニヤニヤするな、俺！　彼女が恥ずかしがってるのに、それはあまりよくないぞ……！
line = "まずい！　ニヤニヤするな、俺！　彼女が恥ずかしがってるのに、それはあまりよくないぞ……！"

[[dialogue]]
speaker = "unk"
# でも嬉しい！！　普段の行動が奥ゆかしいから、メルエルってもしかしてベタベタするの好きじゃないのかも、って思ってたところは正直ある！！
line = "でも嬉しい！！　普段の行動が奥ゆかしいから、メルエルってもしかしてベタベタするの好きじゃないのかも、って思ってたところは正直ある！！"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「だから、おっきい私がこのまま恥ずかしがってたら、私の方が旦那様といっぱいラブラブしちゃうんだから♪」
line = "「だから、おっきい私がこのまま恥ずかしがってたら、私の方が旦那様といっぱいラブラブしちゃうんだから♪」"

[[dialogue]]
speaker = "メルエル"
# 「そんなぁ……う、うぅぅ～～！」
line = "「そんなぁ……う、うぅぅ～～！」"

[[dialogue]]
speaker = "unk"
# メルエルは恥ずかしそうにしながらも、決意したように深呼吸をして──
line = "メルエルは恥ずかしそうにしながらも、決意したように深呼吸をして──"

[[dialogue]]
speaker = "メルエル"
# 「すぅ～、はぁ～。だ、旦那様……<emoji=heart04>」
line = "「すぅ～、はぁ～。だ、旦那様……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「私も、き、キス<emoji=heart04>　したいです……<emoji=heart04>」
line = "「私も、き、キス<emoji=heart04>　したいです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ちっちゃいメルエルと違い、受け身でそっと唇を差し出すメルエルの唇に、俺は優しくキスをする。
line = "ちっちゃいメルエルと違い、受け身でそっと唇を差し出すメルエルの唇に、俺は優しくキスをする。"

[[dialogue]]
speaker = "メルエル"
# 「んっ……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# どうしよう……これ、ヤバいかも
line = "どうしよう……これ、ヤバいかも"

[[dialogue]]
speaker = "メルエル"
# 「え？　い、今のキス、変だったかな……！？」
line = "「え？　い、今のキス、変だったかな……！？」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「――そうじゃなくて、好きな子２人に挟まれてのキスで、幸せすぎてクラクラしてきちゃう？」
line = "「――そうじゃなくて、好きな子２人に挟まれてのキスで、幸せすぎてクラクラしてきちゃう？」"

[[dialogue]]
speaker = "メルエル"
# 「そ、そうなんだ……えへへへへへぇ<emoji=heart04>　会長くんが幸せに感じてくれてるなら、嬉しいな……♪」
line = "「そ、そうなんだ……えへへへへへぇ<emoji=heart04>　会長くんが幸せに感じてくれてるなら、嬉しいな……♪」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ふふっ♪　なら奥さんとして、もっと旦那様にご奉仕しないとね<emoji=heart04>」
line = "「ふふっ♪　なら奥さんとして、もっと旦那様にご奉仕しないとね<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「うん<emoji=heart04>　旦那様、いっぱい幸せになって下さい<emoji=heart04>」
line = "「うん<emoji=heart04>　旦那様、いっぱい幸せになって下さい<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「ん～っ<emoji=heart04>　ちゅっ<emoji=heart04>　旦那様、大好きっ<emoji=heart04>」
line = "「ん～っ<emoji=heart04>　ちゅっ<emoji=heart04>　旦那様、大好きっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「私も好き……<emoji=heart04>　心から愛してます<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「私も好き……<emoji=heart04>　心から愛してます<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "２人"
# 「ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも２人のメルエルから時に同時に、時に交互にキスの雨を降らされて、俺は何も考えられなくなってしまうくらい、甘くて幸せな時間を過ごすのだった。
line = "それからも２人のメルエルから時に同時に、時に交互にキスの雨を降らされて、俺は何も考えられなくなってしまうくらい、甘くて幸せな時間を過ごすのだった。"
