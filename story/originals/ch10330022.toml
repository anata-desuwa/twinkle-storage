[[dialogue]]
speaker = "unk"
# 第２話,２代目、流星の騎士,P
line = "第２話,２代目、流星の騎士,P"

[[dialogue]]
speaker = "unk"
# フィヴォス流星群の騒動が終結し、しばらくの月日が経った。色々と後始末も大変だったが、俺たち星騎士はかつての日常を取り戻しつつある。
line = "フィヴォス流星群の騒動が終結し、しばらくの月日が経った。色々と後始末も大変だったが、俺たち星騎士はかつての日常を取り戻しつつある。"

[[dialogue]]
speaker = "unk"
# その日も俺は星徒会の業務を終えて、いつもの待ち合わせ場所へと向かった──
line = "その日も俺は星徒会の業務を終えて、いつもの待ち合わせ場所へと向かった──"

[[dialogue]]
speaker = "アニュラス"
# 「会長！　待っていたぞ。うん、私もいま来たところだ」
line = "「会長！　待っていたぞ。うん、私もいま来たところだ」"

[[dialogue]]
speaker = "アニュラス"
# 「今日は繁華街の……新しくできた喫茶店に連れて行ってくれるんだろう？　楽しみだな……！」
line = "「今日は繁華街の……新しくできた喫茶店に連れて行ってくれるんだろう？　楽しみだな……！」"

[[dialogue]]
speaker = "アニュラス"
# 「最近、ひとから話しかけられることが増えてな。今日も隣のクラスの女子たちと昼食をとったんだ」
line = "「最近、ひとから話しかけられることが増えてな。今日も隣のクラスの女子たちと昼食をとったんだ」"

[[dialogue]]
speaker = "アニュラス"
# 「仮面を着けなくなったからかな……親しみやすいとよく言われるようになった」
line = "「仮面を着けなくなったからかな……親しみやすいとよく言われるようになった」"

[[dialogue]]
speaker = "unk"
# 仮面は、もうずっと外すことにするの？
line = "仮面は、もうずっと外すことにするの？"

[[dialogue]]
speaker = "アニュラス"
# 「ああ。以前まで、憧れのお父様のようになりたいと思って着け続けていたが……」
line = "「ああ。以前まで、憧れのお父様のようになりたいと思って着け続けていたが……」"

[[dialogue]]
speaker = "アニュラス"
# 「霊力を受け継いで思ったんだ。大切なのは真似をすることではなく、その中身だとな」
line = "「霊力を受け継いで思ったんだ。大切なのは真似をすることではなく、その中身だとな」"

[[dialogue]]
speaker = "アニュラス"
# 「お父様がかつて抱いていた、人々を守りたい、世界を救いたいという精神。それを受け継ぐことこそが大切だろう？」
line = "「お父様がかつて抱いていた、人々を守りたい、世界を救いたいという精神。それを受け継ぐことこそが大切だろう？」"

[[dialogue]]
speaker = "アニュラス"
# 「形ばかり取り繕っても、未熟な自分の慰めになるだけだと思ってな……だから外した」
line = "「形ばかり取り繕っても、未熟な自分の慰めになるだけだと思ってな……だから外した」"

[[dialogue]]
speaker = "アニュラス"
# 「もちろん大切な宝物には変わりないから、肌身離さず持ち歩いてはいるが……もう目元を隠すことはしないつもりだ」
line = "「もちろん大切な宝物には変わりないから、肌身離さず持ち歩いてはいるが……もう目元を隠すことはしないつもりだ」"

[[dialogue]]
speaker = "unk"
# 俺もそれがいいと思う
line = "俺もそれがいいと思う"

[[dialogue]]
speaker = "アニュラス"
# 「ああ。お前にそう言ってもらえると嬉しいな。で……ええと、店はどっちだ。いや、東だ西だと言われてもわからん。右か左かで頼む」
line = "「ああ。お前にそう言ってもらえると嬉しいな。で……ええと、店はどっちだ。いや、東だ西だと言われてもわからん。右か左かで頼む」"

[[dialogue]]
speaker = "アニュラス"
# 「む。モンスターか……！　まったく空気の読めないやつらだな……！」
line = "「む。モンスターか……！　まったく空気の読めないやつらだな……！」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「よし。討伐に行くぞ、会長！」
line = "「よし。討伐に行くぞ、会長！」"

[[dialogue]]
speaker = "unk"
# 幸いなことに、現場に一番近かったのは俺たちだった。空を飛んで急行し、アニュラスと共にモンスターの群れへ突撃する──！
line = "幸いなことに、現場に一番近かったのは俺たちだった。空を飛んで急行し、アニュラスと共にモンスターの群れへ突撃する──！"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「はぁあああっ──！！」
line = "「はぁあああっ──！！」"

[[dialogue]]
speaker = "unk"
# お疲れ様、アニュラス！
line = "お疲れ様、アニュラス！"

[[dialogue]]
speaker = "unk"
# よし、これで最後だ……！
line = "よし、これで最後だ……！"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「会長もサポート感謝する。おかげで被害も出なかったようだが……民間人にいくらか混乱が見られるな。声をかけていこうか」
line = "「会長もサポート感謝する。おかげで被害も出なかったようだが……民間人にいくらか混乱が見られるな。声をかけていこうか」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「──そこのお２人。怪我はないか？」
line = "「──そこのお２人。怪我はないか？」"

[[dialogue]]
speaker = "女の子"
# 「うん、平気だよ！　ありがとう、星騎士のお姉ちゃん！」
line = "「うん、平気だよ！　ありがとう、星騎士のお姉ちゃん！」"

[[dialogue]]
speaker = "女の子の祖父"
# 「まさか孫娘を連れている時に襲われるとは……助かったよ。あんたは命の恩人だ……！」
line = "「まさか孫娘を連れている時に襲われるとは……助かったよ。あんたは命の恩人だ……！」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「なに、礼には及ばない。大事なかったのなら何よりだ」
line = "「なに、礼には及ばない。大事なかったのなら何よりだ」"

[[dialogue]]
speaker = "女の子の祖父"
# 「──ん？　あんた、その兜のように着けている仮面……もしかしてセイファートさんか……！？」
line = "「──ん？　あんた、その兜のように着けている仮面……もしかしてセイファートさんか……！？」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「え……？　ぁ、ああ。私の姓は確かにセイファートだが……ご老人とはどこかで会ったことがあるだろうか？」
line = "「え……？　ぁ、ああ。私の姓は確かにセイファートだが……ご老人とはどこかで会ったことがあるだろうか？」"

[[dialogue]]
speaker = "女の子の祖父"
# 「いいや、あんたとは初対面だが……その仮面には見覚えがあるよ。懐かしいな、ジェラルドさんとはよく現場で会ったもんだ」
line = "「いいや、あんたとは初対面だが……その仮面には見覚えがあるよ。懐かしいな、ジェラルドさんとはよく現場で会ったもんだ」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「お父様と……！？」
line = "「お父様と……！？」"

[[dialogue]]
speaker = "女の子の祖父"
# 「ああ、私は元警官でね。星騎士の数が足りなかった頃、モンスターが現れた時は教皇庁に連絡するのが習わしだったんだ」
line = "「ああ、私は元警官でね。星騎士の数が足りなかった頃、モンスターが現れた時は教皇庁に連絡するのが習わしだったんだ」"

[[dialogue]]
speaker = "女の子の祖父"
# 「現場に一番に駆け付けるのは、いつだってあんたの親父さんだったよ。教皇庁のトラブルシューター……そう呼ばれると彼は居心地が悪そうだったがな」
line = "「現場に一番に駆け付けるのは、いつだってあんたの親父さんだったよ。教皇庁のトラブルシューター……そう呼ばれると彼は居心地が悪そうだったがな」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「……そう、でしたか。お父様が……」
line = "「……そう、でしたか。お父様が……」"

[[dialogue]]
speaker = "女の子の祖父"
# 「あんたは親父さんによく似ているな。可憐なお嬢さんだが、凛々しい目元がそっくりだ」
line = "「あんたは親父さんによく似ているな。可憐なお嬢さんだが、凛々しい目元がそっくりだ」"

[[dialogue]]
speaker = "女の子の祖父"
# 「その……ニュースで見たよ。親父さんのことは……残念だったね」
line = "「その……ニュースで見たよ。親父さんのことは……残念だったね」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「──いえ。お気になさらず」
line = "「──いえ。お気になさらず」"

[[dialogue]]
speaker = "女の子の祖父"
# 「ジェラルドさんに伝えておいてくれるかい？　あんたは今でも俺たち警官の憧れだ、心から感謝している──と」
line = "「ジェラルドさんに伝えておいてくれるかい？　あんたは今でも俺たち警官の憧れだ、心から感謝している──と」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「…………はいっ。必ず……」
line = "「…………はいっ。必ず……」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「……お父様、感謝されていたな」
line = "「……お父様、感謝されていたな」"

[[dialogue]]
speaker = "unk"
# 俺だって救われた１人だよ
line = "俺だって救われた１人だよ"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「うん……ありがとう。そう言ってもらえると、私も嬉しい」
line = "「うん……ありがとう。そう言ってもらえると、私も嬉しい」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「なあ会長……お父様は最期には誤ってしまった。その事実は変えられない」
line = "「なあ会長……お父様は最期には誤ってしまった。その事実は変えられない」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「でも、だからといって、それまでの正しい行いまで偽物になるとは、思えない。いや……思いたくないと言った方が、正しいのかな」
line = "「でも、だからといって、それまでの正しい行いまで偽物になるとは、思えない。いや……思いたくないと言った方が、正しいのかな」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「私は理想に燃えていた頃のお父様の想いを継ぎたい。リクリエを退けたいと願っていた、誇り高きお父様の想いを……」
line = "「私は理想に燃えていた頃のお父様の想いを継ぎたい。リクリエを退けたいと願っていた、誇り高きお父様の想いを……」"

[[dialogue]]
speaker = "unk"
# ２代目の、流星の騎士に
line = "２代目の、流星の騎士に"

[[dialogue]]
speaker = "unk"
# アニュラスがなるんだよ
line = "アニュラスがなるんだよ"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「ああ！　これから先、迷うことがあるたび……私は今日のことを思い出すことにする」
line = "「ああ！　これから先、迷うことがあるたび……私は今日のことを思い出すことにする」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「それが武骨な人間である私にできる、たった１つのことだと思うから……」
line = "「それが武骨な人間である私にできる、たった１つのことだと思うから……」"

[[dialogue]]
speaker = "unk"
# 輝きの違う、二振りの剣を手に誓いを新たにするアニュラス。
line = "輝きの違う、二振りの剣を手に誓いを新たにするアニュラス。"

[[dialogue]]
speaker = "unk"
# 俺はそんな彼女を、誰よりもそばで支えていきたいと思うのだった──
line = "俺はそんな彼女を、誰よりもそばで支えていきたいと思うのだった──"
