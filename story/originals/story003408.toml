line = "「アンリーシュド・ラディアンスっ！」"

[[dialogue]]
speaker = "ラファエロ"
# 「それがきみの能力か！　なかなか強烈な光だね！！」
line = "「それがきみの能力か！　なかなか強烈な光だね！！」"

[[dialogue]]
speaker = "ラファエロ"
# 「ぼくも負けていられないな……ヘブンリー・レクイエムっ！」
line = "「ぼくも負けていられないな……ヘブンリー・レクイエムっ！」"

[[dialogue]]
speaker = "超巨大Ａクマロボ"
# 『バブーーーーーっ！！！！』
line = "『バブーーーーーっ！！！！』"

[[dialogue]]
speaker = "unk"
# ２人の連続攻撃によって咆哮を上げる巨大赤ちゃんクマロボ。
line = "２人の連続攻撃によって咆哮を上げる巨大赤ちゃんクマロボ。"

[[dialogue]]
speaker = "ルリエル"
# 「大暴れですね……もはや可愛げの欠片もありません！」
line = "「大暴れですね……もはや可愛げの欠片もありません！」"

[[dialogue]]
speaker = "unk"
# それだけ追い詰められるってことだ！
line = "それだけ追い詰められるってことだ！"

[[dialogue]]
speaker = "ルリエル"
# 「はい、その通りなのです！」
line = "「はい、その通りなのです！」"

[[dialogue]]
speaker = "unk"
# 手負いのクマのような大暴れをかいくぐり、最後の一撃を叩き込むチャンスを待つ。
line = "手負いのクマのような大暴れをかいくぐり、最後の一撃を叩き込むチャンスを待つ。"

[[dialogue]]
speaker = "unk"
# そして、その瞬間が来た──
line = "そして、その瞬間が来た──"

[[dialogue]]
speaker = "unk"
# 無言のままルリエルと目が合い、同時に動く！
line = "無言のままルリエルと目が合い、同時に動く！"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルに続いてください！　……ピカっと瞬け、お星様っ！」
line = "「ルリエルに続いてください！　……ピカっと瞬け、お星様っ！」"

[[dialogue]]
speaker = "ルリエル"
# 「ルミナス・スプリンクルっ！！！」
line = "「ルミナス・スプリンクルっ！！！」"

[[dialogue]]
speaker = "unk"
# ルリエルと俺の２人で放ったユニゾンアタックが炸裂し、巨大赤ちゃんクマロボの動きが止まる。
line = "ルリエルと俺の２人で放ったユニゾンアタックが炸裂し、巨大赤ちゃんクマロボの動きが止まる。"

[[dialogue]]
speaker = "超巨大Ａクマロボ"
# 『バーーーブゥーーーーッ！！！』
line = "『バーーーブゥーーーーッ！！！』"

[[dialogue]]
speaker = "unk"
# 巨体に亀裂が入り、そこから四方に光が漏れる。
line = "巨体に亀裂が入り、そこから四方に光が漏れる。"

[[dialogue]]
speaker = "unk"
# そして次の瞬間──巨大赤ちゃんクマロボの身体は爆発四散していた。
line = "そして次の瞬間──巨大赤ちゃんクマロボの身体は爆発四散していた。"

[[dialogue]]
speaker = "ルリエル"
# 「やったぁ！　やりましたよぉ！！」
line = "「やったぁ！　やりましたよぉ！！」"

[[dialogue]]
speaker = "ステラ"
# 「あ……赤ちゃんクマロボさんたちが……！」
line = "「あ……赤ちゃんクマロボさんたちが……！」"

[[dialogue]]
speaker = "ラファエロ"
# 「クマロボに戻っていく……」
line = "「クマロボに戻っていく……」"

[[dialogue]]
speaker = "黒ベア子"
# 「ナイスだくま！　これでこの世界の危機は回避されたくま！　合体が解けたおかげで、クマロボたちを全員連れて帰れるくま」
line = "「ナイスだくま！　これでこの世界の危機は回避されたくま！　合体が解けたおかげで、クマロボたちを全員連れて帰れるくま」"

[[dialogue]]
speaker = "unk"
# 数がものすごいけど大丈夫か？
line = "数がものすごいけど大丈夫か？"

[[dialogue]]
speaker = "黒ベア子"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "黒ベア子"
# 「た、大変そうだけど……まあ、なんとかなるくま♪」
line = "「た、大変そうだけど……まあ、なんとかなるくま♪」"

[[dialogue]]
speaker = "unk"
# ひきつった笑みを浮かべる黒ベア子に少し不安を覚えつつも、ひとまず当面の事件が解決したことに胸をなでおろすのだった。
line = "ひきつった笑みを浮かべる黒ベア子に少し不安を覚えつつも、ひとまず当面の事件が解決したことに胸をなでおろすのだった。"
