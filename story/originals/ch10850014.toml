[[dialogue]]
speaker = "unk"
# 第４話,恋人への独占欲,P
line = "第４話,恋人への独占欲,P"

[[dialogue]]
speaker = "unk"
# アニマ先輩の分裂薬により、俺も女子アバターを並行使用して、再び流星学園附属校に通うことができるようになった。そんな久しぶりの登校日。
line = "アニマ先輩の分裂薬により、俺も女子アバターを並行使用して、再び流星学園附属校に通うことができるようになった。そんな久しぶりの登校日。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「会長！　またクラスメイトとして一緒に過ごせて、嬉しいのだ♪」
line = "「会長！　またクラスメイトとして一緒に過ごせて、嬉しいのだ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「まあ、１度はクラスメイトになったわけですし、私からも一応……おかえりなさい、緋宮会長」
line = "「まあ、１度はクラスメイトになったわけですし、私からも一応……おかえりなさい、緋宮会長」"

[[dialogue]]
speaker = "セシア"
# 「クロトママ～♪　また会えて嬉しいわ♪」
line = "「クロトママ～♪　また会えて嬉しいわ♪」"

[[dialogue]]
speaker = "unk"
# ありがとう、みんな
line = "ありがとう、みんな"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、でもやっぱり、会長の姿はとても可愛くて似合っていますね♪　ママダレナとして色々お世話したくなっちゃいます。なでなで♪」
line = "「ふふっ、でもやっぱり、会長の姿はとても可愛くて似合っていますね♪　ママダレナとして色々お世話したくなっちゃいます。なでなで♪」"

[[dialogue]]
speaker = "セシア"
# 「クロトママ、今日の昼食は一緒に大聖堂カフェテリアへ行きましょう♪　セシア、久しぶりにあ～んってして欲しいわ♪」
line = "「クロトママ、今日の昼食は一緒に大聖堂カフェテリアへ行きましょう♪　セシア、久しぶりにあ～んってして欲しいわ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# そうして昼休み、セシアのお願いに応えることになったのだが――
line = "そうして昼休み、セシアのお願いに応えることになったのだが――"

[[dialogue]]
speaker = "セシア"
# 「――あ～ん♪　……もぐもぐ♪　えへへ～、クロトママ、ありがと～♪　とっても美味しいわ♪」
line = "「――あ～ん♪　……もぐもぐ♪　えへへ～、クロトママ、ありがと～♪　とっても美味しいわ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「むむむ……！」
line = "「むむむ……！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「マグダレナ、また会長にママの座を取られたことに嫉妬してるのだ？　大人のアバターに戻れば、セシアのママ判定は戻るわけだし、そこまで気にしなくても――」
line = "「マグダレナ、また会長にママの座を取られたことに嫉妬してるのだ？　大人のアバターに戻れば、セシアのママ判定は戻るわけだし、そこまで気にしなくても――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「やっぱり、譲れません！」
line = "「やっぱり、譲れません！」"

[[dialogue]]
speaker = "ナミエル"
# 「い、いきなりどうしたんですか……！？」
line = "「い、いきなりどうしたんですか……！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長があ～んしていいのは、私だけです！　だって私は――」
line = "「会長があ～んしていいのは、私だけです！　だって私は――」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長の恋人なんですから！　たとえセシアであっても、そう簡単に譲れません！」
line = "「会長の恋人なんですから！　たとえセシアであっても、そう簡単に譲れません！」"

[[dialogue]]
speaker = "セシア"
# 「えぇ～！　そんな～！？　ママにあ～んしてもらうのは、セシアの生き甲斐なのに！？」
line = "「えぇ～！　そんな～！？　ママにあ～んしてもらうのは、セシアの生き甲斐なのに！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「まさかのセシアに嫉妬する方向なのだ！？」
line = "「まさかのセシアに嫉妬する方向なのだ！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「なので、会長！　私にもちゃんと、あ～んして下さい！」
line = "「なので、会長！　私にもちゃんと、あ～んして下さい！」"

[[dialogue]]
speaker = "unk"
# わ、わかった。じゃあ――
line = "わ、わかった。じゃあ――"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい♪　――あ～ん♪」
line = "「はい♪　――あ～ん♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あむっ……もぐもぐ……んっ……♪」
line = "「あむっ……もぐもぐ……んっ……♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えへへ……<emoji=heart04>　美味しいです……<emoji=heart04>」
line = "「えへへ……<emoji=heart04>　美味しいです……<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ま、マグダレナ、見たことないくらいデレデレの笑顔を浮かべているのだ……！　なんか最近、会長との仲に変化でもあったのだ？」
line = "「ま、マグダレナ、見たことないくらいデレデレの笑顔を浮かべているのだ……！　なんか最近、会長との仲に変化でもあったのだ？」"

[[dialogue]]
speaker = "ナミエル"
# （ちょ、ちょっとだけ羨ましいかも……）
line = "（ちょ、ちょっとだけ羨ましいかも……）"

[[dialogue]]
speaker = "unk"
# その日の放課後、マグダレナから２人きりで過ごしたいと言われて、誰も来ないような校舎隅の空き教室へとやって来る。
line = "その日の放課後、マグダレナから２人きりで過ごしたいと言われて、誰も来ないような校舎隅の空き教室へとやって来る。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「今日は会長、クラスのみんなから話しかけられて大人気でしたから、ようやく２人きりで落ち着けますね」
line = "「今日は会長、クラスのみんなから話しかけられて大人気でしたから、ようやく２人きりで落ち着けますね」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「――いえ、何か特別な用事があるわけじゃないんですけど、ただ……」
line = "「――いえ、何か特別な用事があるわけじゃないんですけど、ただ……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「何だか、みんなに囲まれてる会長を見ていたら、独占欲が湧いてしまったと言いますか……」
line = "「何だか、みんなに囲まれてる会長を見ていたら、独占欲が湧いてしまったと言いますか……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「だから、こうやってくっ付いちゃいます……<emoji=heart04>」
line = "「だから、こうやってくっ付いちゃいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# い、今は女子の姿だけど……
line = "い、今は女子の姿だけど……"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そうですね。前は純粋に可愛くて、頭をなでなでしたいって気持ちの方が大きかったんですが、今は……」
line = "「そうですね。前は純粋に可愛くて、頭をなでなでしたいって気持ちの方が大きかったんですが、今は……」"

[[dialogue]]
speaker = "unk"
# そう言って、マグダレナはそっと唇を寄せると――
line = "そう言って、マグダレナはそっと唇を寄せると――"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「んっ……ちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……女の子の姿でも、恋人のスキンシップがしたくなっちゃうくらい、好きって気持ちが強くなってしまいました……」
line = "「……女の子の姿でも、恋人のスキンシップがしたくなっちゃうくらい、好きって気持ちが強くなってしまいました……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長が悪いんですよ？　この前のデートで、恋人として過ごすことの『甘さ』を教えたりするんですから……」
line = "「会長が悪いんですよ？　この前のデートで、恋人として過ごすことの『甘さ』を教えたりするんですから……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ママダレナとして接するだけじゃ、甘さが物足りないって、思うようになってしまったんです……<emoji=heart04>」
line = "「ママダレナとして接するだけじゃ、甘さが物足りないって、思うようになってしまったんです……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それに、今は会長が女の子になっているからこそ、好奇心も湧いてしまうんです」
line = "「それに、今は会長が女の子になっているからこそ、好奇心も湧いてしまうんです」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「今の会長とイチャイチャしたら、どんな甘さなのかなって<emoji=heart04>」
line = "「今の会長とイチャイチャしたら、どんな甘さなのかなって<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「だから、責任を取って、付き合って下さいね？　ふふっ……<emoji=heart04>」
line = "「だから、責任を取って、付き合って下さいね？　ふふっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お、お手柔らかにお願いします……
line = "お、お手柔らかにお願いします……"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい、頑張ります<emoji=heart04>」
line = "「はい、頑張ります<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「好きですよ、会長……<emoji=heart04>」
line = "「好きですよ、会長……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# この前のお返しと言わんばかりに、マグダレナから知らない甘さを教え込まれてしまう俺なのだった――
line = "この前のお返しと言わんばかりに、マグダレナから知らない甘さを教え込まれてしまう俺なのだった――"
