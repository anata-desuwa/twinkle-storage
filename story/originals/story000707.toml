[[dialogue]]
speaker = "unk"
# 決闘宣言をしたソフィアは、１度深呼吸をした後、サーシャに言った。
line = "決闘宣言をしたソフィアは、１度深呼吸をした後、サーシャに言った。"

[[dialogue]]
speaker = "ソフィア"
# 「３年前、姉さんが家を出て、人間界へ行ったあの日から、今日まで言えなかったことがあります」
line = "「３年前、姉さんが家を出て、人間界へ行ったあの日から、今日まで言えなかったことがあります」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ……？」
line = "「ソフィ……？」"

[[dialogue]]
speaker = "ソフィア"
# 「私……小さい頃から優しい姉さんが好きでした。私のことを大切にしてくれる姉さんのことを、疑うことなく、無邪気に信じていました」
line = "「私……小さい頃から優しい姉さんが好きでした。私のことを大切にしてくれる姉さんのことを、疑うことなく、無邪気に信じていました」"

[[dialogue]]
speaker = "ソフィア"
# 「だからこそ、それまで何も話していなかったのに、学園へ入学する為に人間界へ行くと言い出した時、私は置いてけぼりにされた気分になったんです」
line = "「だからこそ、それまで何も話していなかったのに、学園へ入学する為に人間界へ行くと言い出した時、私は置いてけぼりにされた気分になったんです」"

[[dialogue]]
speaker = "サーシャ"
# 「それは……ごめんなさい。あの時も言ったけれど、ソフィには相談しづらくて……なかなか言い出せなかったの」
line = "「それは……ごめんなさい。あの時も言ったけれど、ソフィには相談しづらくて……なかなか言い出せなかったの」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ。後から冷静になれば、そうだったんだろうなってわかります。ですが……私が聞きたかったのは、そういうことじゃないんです」
line = "「ええ。後から冷静になれば、そうだったんだろうなってわかります。ですが……私が聞きたかったのは、そういうことじゃないんです」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんっていつも、私に対して『大切だ』とか、『愛している』って言いますよね？」
line = "「姉さんっていつも、私に対して『大切だ』とか、『愛している』って言いますよね？」"

[[dialogue]]
speaker = "ソフィア"
# 「それって……本当にそう思っているんでしょうか？」
line = "「それって……本当にそう思っているんでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "サーシャ"
# 「それはもちろん、本気で思っているわ。私にとって、ソフィは大切な家族――妹だもの」
line = "「それはもちろん、本気で思っているわ。私にとって、ソフィは大切な家族――妹だもの」"

[[dialogue]]
speaker = "サーシャ"
# 「３年前、家を出る時に上手く仲直りできないままこっちへ来ちゃったけれど、気持ちが変わったりなんてしてないわ」
line = "「３年前、家を出る時に上手く仲直りできないままこっちへ来ちゃったけれど、気持ちが変わったりなんてしてないわ」"

[[dialogue]]
speaker = "サーシャ"
# 「今だって、昔みたいに仲直りできたらって思って――」
line = "「今だって、昔みたいに仲直りできたらって思って――」"

[[dialogue]]
speaker = "ソフィア"
# 「でも……私には信じられないです」
line = "「でも……私には信じられないです」"

[[dialogue]]
speaker = "サーシャ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ソフィア"
# 「本当はずっと、不安だったんです。だから、昔みたいに無邪気に振る舞うことなんてできなかった」
line = "「本当はずっと、不安だったんです。だから、昔みたいに無邪気に振る舞うことなんてできなかった」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんは、３年前に私と別れる時、寂しかったですか？」
line = "「姉さんは、３年前に私と別れる時、寂しかったですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「寂しかったわ。もちろん」
line = "「寂しかったわ。もちろん」"

[[dialogue]]
speaker = "ソフィア"
# 「それって、泣くくらいですか？」
line = "「それって、泣くくらいですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「え……」
line = "「え……」"

[[dialogue]]
speaker = "ソフィア"
# 「私は泣いてしまいました。姉さんが家を出て行った後、しばらく何も手がつかないくらい」
line = "「私は泣いてしまいました。姉さんが家を出て行った後、しばらく何も手がつかないくらい」"

[[dialogue]]
speaker = "ソフィア"
# 「でも、姉さんは泣くほどではなかったんじゃないですか？」
line = "「でも、姉さんは泣くほどではなかったんじゃないですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「私、気づいたんです。……生まれてこの方、姉さんの泣いた顔、１度も見たことないなって」
line = "「私、気づいたんです。……生まれてこの方、姉さんの泣いた顔、１度も見たことないなって」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんって……本当は私なんて別にいなくても、そこまで影響がないんじゃないですか？」
line = "「姉さんって……本当は私なんて別にいなくても、そこまで影響がないんじゃないですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「そんな……そんなことないわ、ソフィ」
line = "「そんな……そんなことないわ、ソフィ」"

[[dialogue]]
speaker = "ソフィア"
# 「実際、姉さんは３年前、学園に入学することを１人で決めました」
line = "「実際、姉さんは３年前、学園に入学することを１人で決めました」"

[[dialogue]]
speaker = "ソフィア"
# 「それはもう、仕方がないです。姉さんはそういうヒトだし、家族であっても姉さんのそういう性質は止められないんだって、わかりました」
line = "「それはもう、仕方がないです。姉さんはそういうヒトだし、家族であっても姉さんのそういう性質は止められないんだって、わかりました」"

[[dialogue]]
speaker = "ソフィア"
# 「でも去年、私が流星学園に入学した後も……姉さんは自分から時間を作って会いにくることは、なかったじゃないですか」
line = "「でも去年、私が流星学園に入学した後も……姉さんは自分から時間を作って会いにくることは、なかったじゃないですか」"

[[dialogue]]
speaker = "サーシャ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ソフィア"
# 「偶然会った時は、色々と話しかけたりもしてくれますが……」
line = "「偶然会った時は、色々と話しかけたりもしてくれますが……」"

[[dialogue]]
speaker = "ソフィア"
# 「家族に中々会えなくて寂しいとか、相手が恋しいとか思ってる人って、そういう行動を取るでしょうか……？」
line = "「家族に中々会えなくて寂しいとか、相手が恋しいとか思ってる人って、そういう行動を取るでしょうか……？」"

[[dialogue]]
speaker = "ソフィア"
# 「だから、私は不安になるんです」
line = "「だから、私は不安になるんです」"

[[dialogue]]
speaker = "ソフィア"
# 「自分から会いにこない癖に、いざ会うと、ニコニコ笑って私のことを可愛がろうとするから、わからなくなる」
line = "「自分から会いにこない癖に、いざ会うと、ニコニコ笑って私のことを可愛がろうとするから、わからなくなる」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんにとって、私って一体、何なんですか……！？」
line = "「姉さんにとって、私って一体、何なんですか……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「……ソフィ……私は……！」
line = "「……ソフィ……私は……！」"

[[dialogue]]
speaker = "ソフィア"
# 「…………っ」
line = "「…………っ」"

[[dialogue]]
speaker = "サーシャ"
# 「あっ……ソフィ……！」
line = "「あっ……ソフィ……！」"

[[dialogue]]
speaker = "unk"
# 追いかけようとして、しかし、サーシャは立ち止まってしまう。
line = "追いかけようとして、しかし、サーシャは立ち止まってしまう。"

[[dialogue]]
speaker = "サーシャ"
# （追いかけたところで、なんて言葉をかけたらいいのか、わからないわ……）
line = "（追いかけたところで、なんて言葉をかけたらいいのか、わからないわ……）"

[[dialogue]]
speaker = "ウズメイア"
# 「サーシャ先輩」
line = "「サーシャ先輩」"

[[dialogue]]
speaker = "ウズメイア"
# 「大丈夫ですか……？」
line = "「大丈夫ですか……？」"

[[dialogue]]
speaker = "サーシャ"
# 「ウズメちゃん……。それに、会長くん……」
line = "「ウズメちゃん……。それに、会長くん……」"

[[dialogue]]
speaker = "unk"
# 影で様子を見守っていたウズメと俺は、サーシャさんに声をかけるのだった――
line = "影で様子を見守っていたウズメと俺は、サーシャさんに声をかけるのだった――"
