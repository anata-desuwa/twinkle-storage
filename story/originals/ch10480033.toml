[[dialogue]]
speaker = "unk"
# 第３話,竜の甘やかしデー,P
line = "第３話,竜の甘やかしデー,P"

[[dialogue]]
speaker = "unk"
# 今日は休日。俺の家にマムが遊びに来ていた。
line = "今日は休日。俺の家にマムが遊びに来ていた。"

[[dialogue]]
speaker = "unk"
# そこで俺は、事前に考えていたことを提案する。
line = "そこで俺は、事前に考えていたことを提案する。"

[[dialogue]]
speaker = "unk"
# 今日は『マムを甘やかす』日です！
line = "今日は『マムを甘やかす』日です！"

[[dialogue]]
speaker = "マハムート"
# 「は？　なによ、いきなり……」
line = "「は？　なによ、いきなり……」"

[[dialogue]]
speaker = "unk"
# ――マムはいつも寮長として頑張っている。俺は恋人として、それを労いたい。
line = "――マムはいつも寮長として頑張っている。俺は恋人として、それを労いたい。"

[[dialogue]]
speaker = "unk"
# なので、時々でいいから、気を許して甘えて欲しい……と俺はマムに伝えた。
line = "なので、時々でいいから、気を許して甘えて欲しい……と俺はマムに伝えた。"

[[dialogue]]
speaker = "マハムート"
# 「それは、貴方が私とイチャイチャしたいってだけじゃないのかしら？」
line = "「それは、貴方が私とイチャイチャしたいってだけじゃないのかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「はぁ……やれやれ、仕方ないわね」
line = "「はぁ……やれやれ、仕方ないわね」"

[[dialogue]]
speaker = "マハムート"
# 「なら――膝枕をお願いしようかしら」
line = "「なら――膝枕をお願いしようかしら」"

[[dialogue]]
speaker = "unk"
# そうして、俺がマムに膝枕をする――と思っていたのだが。
line = "そうして、俺がマムに膝枕をする――と思っていたのだが。"

[[dialogue]]
speaker = "マハムート"
# 「～～♪　～～～♪」
line = "「～～♪　～～～♪」"

[[dialogue]]
speaker = "unk"
# あの……マム？
line = "あの……マム？"

[[dialogue]]
speaker = "マハムート"
# 「なによ、変な顔して」
line = "「なによ、変な顔して」"

[[dialogue]]
speaker = "マハムート"
# 「――どうして会長が膝枕をするのではなく、<b>される</b>側になっているのかって？」
line = "「――どうして会長が膝枕をするのではなく、<b>される</b>側になっているのかって？」"

[[dialogue]]
speaker = "マハムート"
# 「だって、この私を甘えさせてくれるんでしょう？　それってつまり、私のお願いを聞いてくれるってことよね？」
line = "「だって、この私を甘えさせてくれるんでしょう？　それってつまり、私のお願いを聞いてくれるってことよね？」"

[[dialogue]]
speaker = "マハムート"
# 「だからこうして、私がしたいことをお願いしているのよ」
line = "「だからこうして、私がしたいことをお願いしているのよ」"

[[dialogue]]
speaker = "マハムート"
# 「わかったのなら、大人しく畏怖をもって私に膝枕されてなさい」
line = "「わかったのなら、大人しく畏怖をもって私に膝枕されてなさい」"

[[dialogue]]
speaker = "unk"
# なんか思っていたのと違ってしまったが、マムがそう望むならと、俺は頷く。
line = "なんか思っていたのと違ってしまったが、マムがそう望むならと、俺は頷く。"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ……いい子ね。よしよし」
line = "「ふふっ……いい子ね。よしよし」"

[[dialogue]]
speaker = "unk"
# マムはそう言って、俺の頭を優しく撫でる。
line = "マムはそう言って、俺の頭を優しく撫でる。"

[[dialogue]]
speaker = "マハムート"
# 「そんな子供みたいな顔して……受け入れて、甘えモードになっちゃったみたいね。大きな子供だこと」
line = "「そんな子供みたいな顔して……受け入れて、甘えモードになっちゃったみたいね。大きな子供だこと」"

[[dialogue]]
speaker = "マハムート"
# 「ほら、なでなで……♪」
line = "「ほら、なでなで……♪」"

[[dialogue]]
speaker = "マハムート"
# 「――そうだ、貴方の好きな『耳かき』をしてあげましょうか」
line = "「――そうだ、貴方の好きな『耳かき』をしてあげましょうか」"

[[dialogue]]
speaker = "unk"
# 鞄の中から、耳かき棒を取り出すマム。
line = "鞄の中から、耳かき棒を取り出すマム。"

[[dialogue]]
speaker = "マハムート"
# 「通販で良いやつを買っておいたのよ。恋人になってから、してあげることが増えたしね」
line = "「通販で良いやつを買っておいたのよ。恋人になってから、してあげることが増えたしね」"

[[dialogue]]
speaker = "マハムート"
# 「それじゃあ、ゆっくりカキカキするわよ――」
line = "「それじゃあ、ゆっくりカキカキするわよ――」"

[[dialogue]]
speaker = "マハムート"
# 「はい、じっとして～？　……んっ、ふふっ」
line = "「はい、じっとして～？　……んっ、ふふっ」"

[[dialogue]]
speaker = "マハムート"
# 「いい顔ね。耳ほじほじされて、気持ちいいのかしら？」
line = "「いい顔ね。耳ほじほじされて、気持ちいいのかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「――上手いのは当たり前よ。この私を誰だと思っているのかしら？」
line = "「――上手いのは当たり前よ。この私を誰だと思っているのかしら？」"

[[dialogue]]
speaker = "マハムート"
# （会長の為に、動画でやり方を勉強しておいたお陰だけど、わざわざ教えてあげたりしないわ。ふふっ♪）
line = "（会長の為に、動画でやり方を勉強しておいたお陰だけど、わざわざ教えてあげたりしないわ。ふふっ♪）"

[[dialogue]]
speaker = "マハムート"
# 「はい、片方の耳はおしまい。次は反対側よ」
line = "「はい、片方の耳はおしまい。次は反対側よ」"

[[dialogue]]
speaker = "マハムート"
# 「――ん？　寮生たちにはしてあげないのかって？　ダメよ。そんなことしたら、寮長としての威厳がなくなるじゃない」
line = "「――ん？　寮生たちにはしてあげないのかって？　ダメよ。そんなことしたら、寮長としての威厳がなくなるじゃない」"

[[dialogue]]
speaker = "マハムート"
# 「それに、してあげるって言ったところで、貴方以外に喜ぶ子なんていないでしょう？」
line = "「それに、してあげるって言ったところで、貴方以外に喜ぶ子なんていないでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「――むしろ行列ができそう？　ふふっ、何を言ってるんだか」
line = "「――むしろ行列ができそう？　ふふっ、何を言ってるんだか」"

[[dialogue]]
speaker = "マハムート"
# 「ともかく、私が耳かきしてあげるのは、貴方だけってこと。畏怖をもって感謝なさい」
line = "「ともかく、私が耳かきしてあげるのは、貴方だけってこと。畏怖をもって感謝なさい」"

[[dialogue]]
speaker = "マハムート"
# 「よし、耳かきはこれでおしまいよ。それじゃあ、今度は――」
line = "「よし、耳かきはこれでおしまいよ。それじゃあ、今度は――」"

[[dialogue]]
speaker = "マハムート"
# 「貴方のリクエストを聞いてあげるわ。他に、私にして欲しいことはあるかしら？」
line = "「貴方のリクエストを聞いてあげるわ。他に、私にして欲しいことはあるかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「――ノヴァフォームの衣装でイチャイチャしたい？　やれやれ、贅沢者ね」
line = "「――ノヴァフォームの衣装でイチャイチャしたい？　やれやれ、贅沢者ね」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ほら、これでいい？　ふふっ、もう、そんなインコみたいにぶんぶん首を縦に振ったりして……」
line = "「ほら、これでいい？　ふふっ、もう、そんなインコみたいにぶんぶん首を縦に振ったりして……」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「全く、スケベな子ね……つんつん」
line = "「全く、スケベな子ね……つんつん」"

[[dialogue]]
speaker = "unk"
# 言いつつも楽しげな表情で、頬っぺたをつんつんして来るマム。
line = "言いつつも楽しげな表情で、頬っぺたをつんつんして来るマム。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「なぁに？　まだして欲しいことがあるの？　言ってごらんなさい」
line = "「なぁに？　まだして欲しいことがあるの？　言ってごらんなさい」"

[[dialogue]]
speaker = "unk"
# マムは俺のどんなところが好きですか？
line = "マムは俺のどんなところが好きですか？"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「そんなこと、わざわざ言わせる気？」
line = "「そんなこと、わざわざ言わせる気？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「普段なら言わないけど……今日だけは特別よ」
line = "「普段なら言わないけど……今日だけは特別よ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……頑張り屋なところ」
line = "「……頑張り屋なところ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「男として強いところ」
line = "「男として強いところ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「あとはそうね……可愛げのあるところ、かしら？」
line = "「あとはそうね……可愛げのあるところ、かしら？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「貴方が私に甘えてる時の顔……可愛くて好きよ<emoji=heart04>」
line = "「貴方が私に甘えてる時の顔……可愛くて好きよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんなことを言われたら、俺は愛おしい気持ちが抑えられなくなってしまって――
line = "そんなことを言われたら、俺は愛おしい気持ちが抑えられなくなってしまって――"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「キスをして欲しいの？　ふふっ、やれやれ、私が許してるからって調子に乗って。仕方ないわね――」
line = "「キスをして欲しいの？　ふふっ、やれやれ、私が許してるからって調子に乗って。仕方ないわね――」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「畏怖をもって、目を閉じなさい」
line = "「畏怖をもって、目を閉じなさい」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後も俺はマムと、たっぷり甘い休日を過ごすのだった――
line = "その後も俺はマムと、たっぷり甘い休日を過ごすのだった――"
