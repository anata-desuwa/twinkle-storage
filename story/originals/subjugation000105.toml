[[dialogue]]
speaker = "マグダレナ"
# 「思っていた以上にうまく行きませんね……」
line = "「思っていた以上にうまく行きませんね……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「然り。見ているのと実際にやってみるのは違うものなのだな……」
line = "「然り。見ているのと実際にやってみるのは違うものなのだな……」"

[[dialogue]]
speaker = "unk"
# 誰でも最初はうまくいかないものです
line = "誰でも最初はうまくいかないものです"

[[dialogue]]
speaker = "マグダレナ"
# 「会長さま……」
line = "「会長さま……」"

[[dialogue]]
speaker = "マグダレナ"
# 「そうですね。悠久の時を生きてきた守護天使として、一度の失敗で落ち込んでいるわけにはいきません」
line = "「そうですね。悠久の時を生きてきた守護天使として、一度の失敗で落ち込んでいるわけにはいきません」"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ。失敗を糧にしてこそ成長はあるのだ」
line = "「うむ。失敗を糧にしてこそ成長はあるのだ」"

[[dialogue]]
speaker = "コハルコ"
# 「それじゃあ、明日はまた別の仕事をしてもらいますね」
line = "「それじゃあ、明日はまた別の仕事をしてもらいますね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「どのような仕事だ？　自分で言うのもなんだが、我らにはあまり高度な仕事は期待できんぞ」
line = "「どのような仕事だ？　自分で言うのもなんだが、我らにはあまり高度な仕事は期待できんぞ」"

[[dialogue]]
speaker = "コハルコ"
# 「そんなに難しいお仕事ではないので、きっと大丈夫かと」
line = "「そんなに難しいお仕事ではないので、きっと大丈夫かと」"

[[dialogue]]
speaker = "コハルコ"
# 「よかったらティッシュどうぞ。アキバフェスタ、よろしくお願いしまーす」
line = "「よかったらティッシュどうぞ。アキバフェスタ、よろしくお願いしまーす」"

[[dialogue]]
speaker = "マグダレナ"
# 「よろしくお願いいたします」
line = "「よろしくお願いいたします」"

[[dialogue]]
speaker = "コハルコ"
# 「守護天使がティッシュ配りって、教皇庁の人が見たら卒倒しそうだね。仕事持ってきたのは私だけど」
line = "「守護天使がティッシュ配りって、教皇庁の人が見たら卒倒しそうだね。仕事持ってきたのは私だけど」"

[[dialogue]]
speaker = "コハルコ"
# 「フィオナさんに見られたのは……なかったことになったから大丈夫ということで。怒られたくないから教皇庁には黙っててね、会長さん」
line = "「フィオナさんに見られたのは……なかったことになったから大丈夫ということで。怒られたくないから教皇庁には黙っててね、会長さん」"

[[dialogue]]
speaker = "unk"
# コハルコさんまでティッシュ配らなくても……
line = "コハルコさんまでティッシュ配らなくても……"

[[dialogue]]
speaker = "コハルコ"
# 「それはそうなんだけど、乗りかかった船だからね。守護天使さんが働きたいって真剣に言ってるんだから手助けしてあげたいし」
line = "「それはそうなんだけど、乗りかかった船だからね。守護天使さんが働きたいって真剣に言ってるんだから手助けしてあげたいし」"

[[dialogue]]
speaker = "コハルコ"
# 「会長さんも手伝ってくれてありがとう。ティッシュ多いから助かるよ」
line = "「会長さんも手伝ってくれてありがとう。ティッシュ多いから助かるよ」"

[[dialogue]]
speaker = "マグダレナ"
# 「アキバフェスタ、よろしくお願いします」
line = "「アキバフェスタ、よろしくお願いします」"

[[dialogue]]
speaker = "学生"
# 「あ、は、はい……」
line = "「あ、は、はい……」"

[[dialogue]]
speaker = "コハルコ"
# （マグダレナさんがセクシーすぎて男の人が戸惑ってるような……。ちょっと心配だけどティッシュ受け取ってもらってるから大丈夫かな？）
line = "（マグダレナさんがセクシーすぎて男の人が戸惑ってるような……。ちょっと心配だけどティッシュ受け取ってもらってるから大丈夫かな？）"

[[dialogue]]
speaker = "アルモタヘル"
# 「ティッシュだ。何かと入用だろう。受け取れ」
line = "「ティッシュだ。何かと入用だろう。受け取れ」"

[[dialogue]]
speaker = "サラリーマン"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「どうした。お前はティッシュを使わないのか？」
line = "「どうした。お前はティッシュを使わないのか？」"

[[dialogue]]
speaker = "サラリーマン"
# 「いや、あの、使いますけど……ご、ごめんなさい！」
line = "「いや、あの、使いますけど……ご、ごめんなさい！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「おい、なぜ謝る！？　逃げるな──むぅ、行ってしまったか」
line = "「おい、なぜ謝る！？　逃げるな──むぅ、行ってしまったか」"

[[dialogue]]
speaker = "アルモタヘル"
# 「なぜだ……？　我のティッシュはなぜ誰も受け取ってくれない？」
line = "「なぜだ……？　我のティッシュはなぜ誰も受け取ってくれない？」"

[[dialogue]]
speaker = "マグダレナ"
# 「アルモタヘルは怖がられているのです。もっと穏やかに、微笑みで接するように心掛けなさい」
line = "「アルモタヘルは怖がられているのです。もっと穏やかに、微笑みで接するように心掛けなさい」"

[[dialogue]]
speaker = "アルモタヘル"
# 「微笑み……微笑みか……」
line = "「微笑み……微笑みか……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「どうだ、我は笑えているか……？」
line = "「どうだ、我は笑えているか……？」"

[[dialogue]]
speaker = "コハルコ"
# 「えーっと……」
line = "「えーっと……」"

[[dialogue]]
speaker = "unk"
# ぎこちないです……
line = "ぎこちないです……"

[[dialogue]]
speaker = "アルモタヘル"
# 「くっ……笑うことさえままならんとは難儀な……」
line = "「くっ……笑うことさえままならんとは難儀な……」"

[[dialogue]]
speaker = "マグダレナ"
# 「アキバフェスタ、よろしくお願いしますー。ティッシュをどうぞー」
line = "「アキバフェスタ、よろしくお願いしますー。ティッシュをどうぞー」"

[[dialogue]]
speaker = "マグダレナ"
# 「おや、そこのお方。お暗い顔をされていますが、何かあったのでしょうか」
line = "「おや、そこのお方。お暗い顔をされていますが、何かあったのでしょうか」"

[[dialogue]]
speaker = "女性"
# 「え？　ええと……はい、息子が反抗期で……」
line = "「え？　ええと……はい、息子が反抗期で……」"

[[dialogue]]
speaker = "unk"
# （人生相談始まっちゃった！？）
line = "（人生相談始まっちゃった！？）"

[[dialogue]]
speaker = "コハルコ"
# （善意だけに止めづらい……！）
line = "（善意だけに止めづらい……！）"

[[dialogue]]
speaker = "マグダレナ"
# 「大丈夫、息子さんが素直になれないだけで、あなたのお気持ちはきっと届いています。時間が解決してくれますよ」
line = "「大丈夫、息子さんが素直になれないだけで、あなたのお気持ちはきっと届いています。時間が解決してくれますよ」"

[[dialogue]]
speaker = "女性"
# 「はい……ありがとうございます」
line = "「はい……ありがとうございます」"

[[dialogue]]
speaker = "マグダレナ"
# 「他の方も悩みなどあればお聞かせください。生きとし生けるものは私の子のようなものなのですから」
line = "「他の方も悩みなどあればお聞かせください。生きとし生けるものは私の子のようなものなのですから」"

[[dialogue]]
speaker = "チャラい男"
# 「ねぇねぇ、金髪のおねーさん、今ヒマ？」
line = "「ねぇねぇ、金髪のおねーさん、今ヒマ？」"

[[dialogue]]
speaker = "マグダレナ"
# 「いえ、お仕事があるので暇ではありませんが……」
line = "「いえ、お仕事があるので暇ではありませんが……」"

[[dialogue]]
speaker = "チャラい男"
# 「実はオレ困っててさ、助けてほしいんだよねー。ちょっとこっち来てくんない？」
line = "「実はオレ困っててさ、助けてほしいんだよねー。ちょっとこっち来てくんない？」"

[[dialogue]]
speaker = "マグダレナ"
# 「そうでしたか。でしたら力をお貸しするのはやぶさかではありません」
line = "「そうでしたか。でしたら力をお貸しするのはやぶさかではありません」"

[[dialogue]]
speaker = "unk"
# ついていっちゃダメーッ！？
line = "ついていっちゃダメーッ！？"

[[dialogue]]
speaker = "アルモタヘル"
# 「おい、そこの男。我の同胞に何か用か？」
line = "「おい、そこの男。我の同胞に何か用か？」"

[[dialogue]]
speaker = "チャラい男"
# 「うわ、怖いねーちゃん来た。こんなのほっといて、オレと楽しいことしようよおねーさん」
line = "「うわ、怖いねーちゃん来た。こんなのほっといて、オレと楽しいことしようよおねーさん」"

[[dialogue]]
speaker = "アルモタヘル"
# 「聞く耳持たずか。なら多くは言わん。……失せろ」
line = "「聞く耳持たずか。なら多くは言わん。……失せろ」"

[[dialogue]]
speaker = "チャラい男"
# 「ヒィーーーッ！？」
line = "「ヒィーーーッ！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「何をするのです、アルモタヘル。あの方は私に助力を求めていたのですよ」
line = "「何をするのです、アルモタヘル。あの方は私に助力を求めていたのですよ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「騙されているぞ、マグダレナ。やつのどこが助けを欲しているように見えるのだ」
line = "「騙されているぞ、マグダレナ。やつのどこが助けを欲しているように見えるのだ」"

[[dialogue]]
speaker = "マグダレナ"
# 「え？　そうだったのですか？」
line = "「え？　そうだったのですか？」"

[[dialogue]]
speaker = "コハルコ"
# 「あはは……」
line = "「あはは……」"

[[dialogue]]
speaker = "unk"
# 結局、俺とコハルコさんが守護天使たちの分もティッシュを配ったのだった……
line = "結局、俺とコハルコさんが守護天使たちの分もティッシュを配ったのだった……"
