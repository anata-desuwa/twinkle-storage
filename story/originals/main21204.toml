[[dialogue]]
speaker = "unk"
# 第４話,極星学園の星徒会,B
line = "第４話,極星学園の星徒会,B"

[[dialogue]]
speaker = "アナ"
# 「どうぞグレイスさん。お近づきの印に、マイベスト・フェイバリットな和菓子。すあまをどうぞ」
line = "「どうぞグレイスさん。お近づきの印に、マイベスト・フェイバリットな和菓子。すあまをどうぞ」"

[[dialogue]]
speaker = "グレイス"
# 「はむっ、もぐもぐっ……んー♪　てっきりお水も満足にいただけないと思ってましたが……！」
line = "「はむっ、もぐもぐっ……んー♪　てっきりお水も満足にいただけないと思ってましたが……！」"

[[dialogue]]
speaker = "グレイス"
# 「甘いお菓子にお茶までいただけるだなんて感激です！　私、捕虜というものを誤解していたかもしれません。存外、悪くないものですね！」
line = "「甘いお菓子にお茶までいただけるだなんて感激です！　私、捕虜というものを誤解していたかもしれません。存外、悪くないものですね！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　会長くんから、極星学園の子は丁重におもてなししなさいって言われてるの。くつろいじゃってね♪」
line = "「うふふ♪　会長くんから、極星学園の子は丁重におもてなししなさいって言われてるの。くつろいじゃってね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「和菓子もいいけど、桜十路のケーキもあるわよ。チョコとラズベリー、どっちが好きかしら～？」
line = "「和菓子もいいけど、桜十路のケーキもあるわよ。チョコとラズベリー、どっちが好きかしら～？」"

[[dialogue]]
speaker = "グレイス"
# 「どっちも好きです！　両方ください！」
line = "「どっちも好きです！　両方ください！」"

[[dialogue]]
speaker = "チナ"
# 「グレイス、お前なぁ……！　もうちょい警戒心を持てっての！　アタシらは一時停戦してるだけだ、いつか敵になるかもなんだぞ！」
line = "「グレイス、お前なぁ……！　もうちょい警戒心を持てっての！　アタシらは一時停戦してるだけだ、いつか敵になるかもなんだぞ！」"

[[dialogue]]
speaker = "グレイス"
# 「もちろんわかってますよ。でも必要以上の警戒は不要なはずです」
line = "「もちろんわかってますよ。でも必要以上の警戒は不要なはずです」"

[[dialogue]]
speaker = "グレイス"
# 「向けられた好意を跳ねのければ、それだけ相互理解のハードルも上がるでしょう。それに今、私たちに提供されるものに毒などが入る可能性は限りなく低いはず」
line = "「向けられた好意を跳ねのければ、それだけ相互理解のハードルも上がるでしょう。それに今、私たちに提供されるものに毒などが入る可能性は限りなく低いはず」"

[[dialogue]]
speaker = "グレイス"
# 「強い説得を受けましたし、魔王さんは私たちの命も救ってくれましたし……」
line = "「強い説得を受けましたし、魔王さんは私たちの命も救ってくれましたし……」"

[[dialogue]]
speaker = "グレイス"
# 「それにチナが今日まで無事なのが、何よりの証拠でしょう。私、何か間違ってますか？」
line = "「それにチナが今日まで無事なのが、何よりの証拠でしょう。私、何か間違ってますか？」"

[[dialogue]]
speaker = "チナ"
# 「……このやろ～。基本的にアホなくせに、たまに筋が通ったことを言いやがって……！」
line = "「……このやろ～。基本的にアホなくせに、たまに筋が通ったことを言いやがって……！」"

[[dialogue]]
speaker = "グレイス"
# 「もぐもぐっ……ん～。美味ですが、このすあま。デネブで食べるやつとあまり変わりませんね」
line = "「もぐもぐっ……ん～。美味ですが、このすあま。デネブで食べるやつとあまり変わりませんね」"

[[dialogue]]
speaker = "グレイス"
# 「せっかくの平行世界。ここでしか食べられないものをぜひ食べたいものです。アルタイルまんじゅうとかないんでしょうか？」
line = "「せっかくの平行世界。ここでしか食べられないものをぜひ食べたいものです。アルタイルまんじゅうとかないんでしょうか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「デネブにも、デネブまんじゅうなかったじゃない！　おあいそよ！」
line = "「デネブにも、デネブまんじゅうなかったじゃない！　おあいそよ！」"

[[dialogue]]
speaker = "アナ"
# 「確かに『おあいこ』ですね。さぁグレイスさん。飲み物はどうします？　やはり和菓子にぴったりな渋いお茶でしょうか」
line = "「確かに『おあいこ』ですね。さぁグレイスさん。飲み物はどうします？　やはり和菓子にぴったりな渋いお茶でしょうか」"

[[dialogue]]
speaker = "サーシャ"
# 「ケーキに合うのは紅茶よね～？　砂糖とミルクもたくさん入れてあげちゃうわ～♪」
line = "「ケーキに合うのは紅茶よね～？　砂糖とミルクもたくさん入れてあげちゃうわ～♪」"

[[dialogue]]
speaker = "グレイス"
# 「どっちも好きです！　両方ください！」
line = "「どっちも好きです！　両方ください！」"

[[dialogue]]
speaker = "チナ"
# 「だーかーらっ。ちょっとは遠慮しろ！　同じ役員として恥ずかしいんだっての……！」
line = "「だーかーらっ。ちょっとは遠慮しろ！　同じ役員として恥ずかしいんだっての……！」"

[[dialogue]]
speaker = "チナ"
# 「レティシア、お前からも何とか言ってやってくれよ……！」
line = "「レティシア、お前からも何とか言ってやってくれよ……！」"

[[dialogue]]
speaker = "レティシア"
# 「当て身で気絶させてもいいかしら？」
line = "「当て身で気絶させてもいいかしら？」"

[[dialogue]]
speaker = "チナ"
# 「じ、実力行使以外で……」
line = "「じ、実力行使以外で……」"

[[dialogue]]
speaker = "レティシア"
# 「ふふ、だったら無理ね。戦闘時でないグレイスは、口で注意して聞く子じゃないもの」
line = "「ふふ、だったら無理ね。戦闘時でないグレイスは、口で注意して聞く子じゃないもの」"

[[dialogue]]
speaker = "グレイス"
# 「レティシア。そのケーキ食べないんですか？　だったらください！」
line = "「レティシア。そのケーキ食べないんですか？　だったらください！」"

[[dialogue]]
speaker = "レティシア"
# 「いいわよ。ちゃんと椅子に座って、お行儀よく食べてね」
line = "「いいわよ。ちゃんと椅子に座って、お行儀よく食べてね」"

[[dialogue]]
speaker = "グレイス"
# 「わーい！　了解です！！」
line = "「わーい！　了解です！！」"

[[dialogue]]
speaker = "サーシャ"
# 「むむむっ……？　自分のぶんのケーキをさりげなく渡すその仕草……！」
line = "「むむむっ……？　自分のぶんのケーキをさりげなく渡すその仕草……！」"

[[dialogue]]
speaker = "サーシャ"
# 「私にはわかるわ。レティシアちゃん、あなたがこの子たちの『お姉ちゃん』ね～♪」
line = "「私にはわかるわ。レティシアちゃん、あなたがこの子たちの『お姉ちゃん』ね～♪」"

[[dialogue]]
speaker = "レティシア"
# 「どういう意図の問いかけかわからないけれど、確かに私が最年長だわ。それがどうかしたのかしら？」
line = "「どういう意図の問いかけかわからないけれど、確かに私が最年長だわ。それがどうかしたのかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「私も新星学園の『お姉ちゃん』なの～♪　ふふ、私たち仲良しになれそうね？」
line = "「私も新星学園の『お姉ちゃん』なの～♪　ふふ、私たち仲良しになれそうね？」"

[[dialogue]]
speaker = "レティシア"
# 「お断りしておくわ。あっちに行ってちょうだい？」
line = "「お断りしておくわ。あっちに行ってちょうだい？」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん、またすげなく断られちゃったわ～」
line = "「あ～ん、またすげなく断られちゃったわ～」"

[[dialogue]]
speaker = "ベアトリス"
# 「う、うちの役員たちがすみません、すみませんっ……！」
line = "「う、うちの役員たちがすみません、すみませんっ……！」"

[[dialogue]]
speaker = "マトイ"
# 「いえいえ……」
line = "「いえいえ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「グレイスちゃんもレティシアちゃんも、別の世界に来てるからちょっとテンション上がってるのかも。あははっ……」
line = "「グレイスちゃんもレティシアちゃんも、別の世界に来てるからちょっとテンション上がってるのかも。あははっ……」"

[[dialogue]]
speaker = "チナ"
# 「いや普段通りだろ。こいつらいっつもこんな感じだよ」
line = "「いや普段通りだろ。こいつらいっつもこんな感じだよ」"

[[dialogue]]
speaker = "マトイ"
# 「星徒会のメンバーってキャラが濃いもんね……振り回される側の気持ち、よーくわかるよ……」
line = "「星徒会のメンバーってキャラが濃いもんね……振り回される側の気持ち、よーくわかるよ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「新顔に負けてられないわ！　マトイ、新星星徒会の濃さも見せつけてやりなさい！！」
line = "「新顔に負けてられないわ！　マトイ、新星星徒会の濃さも見せつけてやりなさい！！」"

[[dialogue]]
speaker = "マトイ"
# 「よ～し、こんな時のために仕込んでおいた一発芸を……って誰がやるかぁ！！」
line = "「よ～し、こんな時のために仕込んでおいた一発芸を……って誰がやるかぁ！！」"

[[dialogue]]
speaker = "クロト"
# 「えっと……」
line = "「えっと……」"

[[dialogue]]
speaker = "ベアトリス"
# 「あっ、会長さん！　選管のみんなも！」
line = "「あっ、会長さん！　選管のみんなも！」"

[[dialogue]]
speaker = "梨緒"
# 「……ずいぶんとにぎやかだな。ベアト」
line = "「……ずいぶんとにぎやかだな。ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめんね、うちの役員が騒いじゃって……」
line = "「ごめんね、うちの役員が騒いじゃって……」"

[[dialogue]]
speaker = "梨緒"
# 「……気にするな」
line = "「……気にするな」"

[[dialogue]]
speaker = "ベアトリス"
# 「……？　梨緒ちゃん、どうかしたの？」
line = "「……？　梨緒ちゃん、どうかしたの？」"

[[dialogue]]
speaker = "梨緒"
# 「いや──何でもない。私も片付けを手伝おう」
line = "「いや──何でもない。私も片付けを手伝おう」"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとう、梨緒ちゃん！」
line = "「ありがとう、梨緒ちゃん！」"

[[dialogue]]
speaker = "クロト"
# 「改めて、アルタイルにようこそ。極星学園のみんな」
line = "「改めて、アルタイルにようこそ。極星学園のみんな」"

[[dialogue]]
speaker = "グレイス"
# 「はい、お邪魔してます！　もぐもぐ……」
line = "「はい、お邪魔してます！　もぐもぐ……」"

[[dialogue]]
speaker = "チナ"
# 「お前まだ食ってんのかよ。それで魔王。アタシらに話ってことは……」
line = "「お前まだ食ってんのかよ。それで魔王。アタシらに話ってことは……」"

[[dialogue]]
speaker = "グレイス"
# 「──ごくん。ルヴィのこと、ですね？」
line = "「──ごくん。ルヴィのこと、ですね？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。俺たちが今まで見たこと、聞いたこと……人によっては重複してる部分もあるだろうけど、改めて伝えるよ」
line = "「ああ。俺たちが今まで見たこと、聞いたこと……人によっては重複してる部分もあるだろうけど、改めて伝えるよ」"

[[dialogue]]
speaker = "unk"
# この世界には『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』と呼ばれる創造神が存在すること。
line = "この世界には『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』と呼ばれる創造神が存在すること。"

[[dialogue]]
speaker = "unk"
# ルヴィネは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』によって創り出された、女神テルルに代わる次の女神、その幼体であること。
line = "ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によって創り出された、女神テルルに代わる次の女神、その幼体であること。"

[[dialogue]]
speaker = "unk"
# ルヴィネの目的は、リクリエを起こして世界を刷新すること。
line = "ルヴィネの目的は、リクリエを起こして世界を刷新すること。"

[[dialogue]]
speaker = "unk"
# 俺たちアルタイルの星騎士は、デネブと共存の道を探り、掴み取りたいと思っていることを改めて伝えた。
line = "俺たちアルタイルの星騎士は、デネブと共存の道を探り、掴み取りたいと思っていることを改めて伝えた。"

[[dialogue]]
speaker = "グレイス"
# 「……創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』。そしてルヴィは、新しい女神様になる女の子……ですか」
line = "「……創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』。そしてルヴィは、新しい女神様になる女の子……ですか」"

[[dialogue]]
speaker = "グレイス"
# 「やっぱり何度聞いても、混乱してしまいますね。もう今さら頭ごなしに拒絶するつもりはありませんが……」
line = "「やっぱり何度聞いても、混乱してしまいますね。もう今さら頭ごなしに拒絶するつもりはありませんが……」"

[[dialogue]]
speaker = "チナ"
# 「まあ、な。にわかには信じがたいって、なっちゃうよな……」
line = "「まあ、な。にわかには信じがたいって、なっちゃうよな……」"

[[dialogue]]
speaker = "レティシア"
# 「あら、そうかしら。ルヴィが私たちを騙すはずがない。この人達は嘘を吐いて、私たちデネブの結束を揺らがせようとしているのよ」
line = "「あら、そうかしら。ルヴィが私たちを騙すはずがない。この人達は嘘を吐いて、私たちデネブの結束を揺らがせようとしているのよ」"

[[dialogue]]
speaker = "レティシア"
# 「それ以外、私には考えられないけれど？」
line = "「それ以外、私には考えられないけれど？」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃん、でも……」
line = "「レティシアちゃん、でも……」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィはずっと私たちとデネブを守ってくれていた。あの子はいつだって正しい。間違わない」
line = "「ルヴィはずっと私たちとデネブを守ってくれていた。あの子はいつだって正しい。間違わない」"

[[dialogue]]
speaker = "レティシア"
# 「その上、急に『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』だなんて言われても……女神テルルよりも上位の存在がいるだなんて、信じる方が愚かね」
line = "「その上、急に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』だなんて言われても……女神テルルよりも上位の存在がいるだなんて、信じる方が愚かね」"

[[dialogue]]
speaker = "チナ"
# 「でも、デネブのフィーニスの塔で、ルヴィは怪しい動きをしていた。それをベアトも見たって言ってるし……」
line = "「でも、デネブのフィーニスの塔で、ルヴィは怪しい動きをしていた。それをベアトも見たって言ってるし……」"

[[dialogue]]
speaker = "レティシア"
# 「きっと何か誤解があるのよ。それ以外にない。ふふ、これで話は終わりね？」
line = "「きっと何か誤解があるのよ。それ以外にない。ふふ、これで話は終わりね？」"

[[dialogue]]
speaker = "チナ"
# 「そこで終わったら今までと同じじゃねーか。アタシは真実を探る。デネブのためならルヴィとだって戦う……だからちょっとでも情報が欲しい」
line = "「そこで終わったら今までと同じじゃねーか。アタシは真実を探る。デネブのためならルヴィとだって戦う……だからちょっとでも情報が欲しい」"

[[dialogue]]
speaker = "グレイス"
# 「あの、魔王さん。ルヴィが自身を女神だと認めたと言いますが……その時の映像や音声はないんでしょうか？」
line = "「あの、魔王さん。ルヴィが自身を女神だと認めたと言いますが……その時の映像や音声はないんでしょうか？」"

[[dialogue]]
speaker = "クロト"
# 「……すまない。はっきり提示できる証拠はないんだ」
line = "「……すまない。はっきり提示できる証拠はないんだ」"

[[dialogue]]
speaker = "レティシア"
# 「できるわけないわよね。だって口から出まかせの嘘なんだもの。チナ、こんな曖昧な情報でルヴィを疑うの？」
line = "「できるわけないわよね。だって口から出まかせの嘘なんだもの。チナ、こんな曖昧な情報でルヴィを疑うの？」"

[[dialogue]]
speaker = "チナ"
# 「証拠はなくてもアタシは……アルタイルの人間も、多少は信用してもいいと思ってる」
line = "「証拠はなくてもアタシは……アルタイルの人間も、多少は信用してもいいと思ってる」"

[[dialogue]]
speaker = "チナ"
# 「それにベアト──うちの副会長がこれだけ食い下がってるんだ。ルヴィと一番付き合いの長いベアトが、だ」
line = "「それにベアト──うちの副会長がこれだけ食い下がってるんだ。ルヴィと一番付き合いの長いベアトが、だ」"

[[dialogue]]
speaker = "チナ"
# 「アタシは少なくとも、ルヴィと直接話すまでは、あいつを疑うって決めたんだ」
line = "「アタシは少なくとも、ルヴィと直接話すまでは、あいつを疑うって決めたんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「チナちゃん……！」
line = "「チナちゃん……！」"

[[dialogue]]
speaker = "チナ"
# 「ベアトは抜けまくってるし、ドジもするし、簡単に騙せるお人好しだけど……」
line = "「ベアトは抜けまくってるし、ドジもするし、簡単に騙せるお人好しだけど……」"

[[dialogue]]
speaker = "ベアトリス"
# 「チナちゃん……！？」
line = "「チナちゃん……！？」"

[[dialogue]]
speaker = "チナ"
# 「でも、一度決めたらテコでも動かない芯のあるやつだ。そのベアトがルヴィを疑ってるんなら……白黒はっきりさせねーとな」
line = "「でも、一度決めたらテコでも動かない芯のあるやつだ。そのベアトがルヴィを疑ってるんなら……白黒はっきりさせねーとな」"

[[dialogue]]
speaker = "グレイス"
# 「私も同じ考えです。しかし、あのルヴィがリクリエ側……悪い夢だったらどんなにいいか……」
line = "「私も同じ考えです。しかし、あのルヴィがリクリエ側……悪い夢だったらどんなにいいか……」"

[[dialogue]]
speaker = "チナ"
# 「そう、だな……」
line = "「そう、だな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなにルヴィネって信頼できる子なのかしら？　どう見ても怪しいのに……」
line = "「そんなにルヴィネって信頼できる子なのかしら？　どう見ても怪しいのに……」"

[[dialogue]]
speaker = "チナ"
# 「お前らアルタイルの住人から見たら、ルヴィは怪しいのかもな。でも、逆の立場になってみろよ」
line = "「お前らアルタイルの住人から見たら、ルヴィは怪しいのかもな。でも、逆の立場になってみろよ」"

[[dialogue]]
speaker = "チナ"
# 「いきなり現れたデネブの人間に『緋宮クロトはお前たちを騙している。本当はリクリエ側で暗躍する敵なんだ』って言われて、信じられるか？」
line = "「いきなり現れたデネブの人間に『緋宮クロトはお前たちを騙している。本当はリクリエ側で暗躍する敵なんだ』って言われて、信じられるか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "チナ"
# 「そんで魔王が言うんだ。『誤解だ、俺はみんなの仲間だ。今までどおり一緒に戦ってくれ』ってな。どうだ、九浄ヴィーナス」
line = "「そんで魔王が言うんだ。『誤解だ、俺はみんなの仲間だ。今までどおり一緒に戦ってくれ』ってな。どうだ、九浄ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う～……！」
line = "「う～……！」"

[[dialogue]]
speaker = "クロト"
# 「……だったらやっぱり、俺たちはお互いを知るべきだろう」
line = "「……だったらやっぱり、俺たちはお互いを知るべきだろう」"

[[dialogue]]
speaker = "クロト"
# 「１０年前のデネブで何があったのか、キミたち４人とルヴィネはどう知り合ったのか……俺たちに、聞かせてくれないか？」
line = "「１０年前のデネブで何があったのか、キミたち４人とルヴィネはどう知り合ったのか……俺たちに、聞かせてくれないか？」"

[[dialogue]]
speaker = "レティシア"
# 「……面倒だし、意味を感じないけれど」
line = "「……面倒だし、意味を感じないけれど」"

[[dialogue]]
speaker = "グレイス"
# 「相互理解のためには、お腹を割って話す必要があると思います。賛成ですよ、私は」
line = "「相互理解のためには、お腹を割って話す必要があると思います。賛成ですよ、私は」"

[[dialogue]]
speaker = "チナ"
# 「いいよ。じゃあ、アタシが話す。……ただ、どこから話したもんかな？」
line = "「いいよ。じゃあ、アタシが話す。……ただ、どこから話したもんかな？」"

[[dialogue]]
speaker = "チナ"
# 「そうだな……１０年前の流星群のことから話すか。たぶんそれより前の歴史は、デネブとアルタイルで大きなズレはないだろうし」
line = "「そうだな……１０年前の流星群のことから話すか。たぶんそれより前の歴史は、デネブとアルタイルで大きなズレはないだろうし」"

[[dialogue]]
speaker = "チナ"
# 「アタシが初めてルヴィに会ったのは、流星群の直後だった」
line = "「アタシが初めてルヴィに会ったのは、流星群の直後だった」"
