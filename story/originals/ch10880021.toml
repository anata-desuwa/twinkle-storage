[[dialogue]]
speaker = "unk"
# 第１話,妹と海へ,P
line = "第１話,妹と海へ,P"

[[dialogue]]
speaker = "リーナ"
# 「見て見て、お兄ちゃん！　水着、似合ってる？」
line = "「見て見て、お兄ちゃん！　水着、似合ってる？」"

[[dialogue]]
speaker = "unk"
# うん、よく似合ってるよ
line = "うん、よく似合ってるよ"

[[dialogue]]
speaker = "リーナ"
# 「やったぁ♪　お兄ちゃんに褒めてもらえてすっごく嬉しいっ♪」
line = "「やったぁ♪　お兄ちゃんに褒めてもらえてすっごく嬉しいっ♪」"

[[dialogue]]
speaker = "unk"
# よほど嬉しかったのか、水着を見せびらかすようにくるくる回るリーナ。
line = "よほど嬉しかったのか、水着を見せびらかすようにくるくる回るリーナ。"

[[dialogue]]
speaker = "unk"
# 傍から見ると、俺たちは仲のいい兄妹に見えるのかもしれないが──リーナは俺の妹ではない。そもそも俺に妹はいない。いないはず。
line = "傍から見ると、俺たちは仲のいい兄妹に見えるのかもしれないが──リーナは俺の妹ではない。そもそも俺に妹はいない。いないはず。"

[[dialogue]]
speaker = "リーナ"
# 「今日は連れてきてくれてありがとう。いっぱい遊ぼうね、お兄ちゃんっ」
line = "「今日は連れてきてくれてありがとう。いっぱい遊ぼうね、お兄ちゃんっ」"

[[dialogue]]
speaker = "unk"
# リーナがなぜ俺をお兄ちゃんと呼ぶのかというと──
line = "リーナがなぜ俺をお兄ちゃんと呼ぶのかというと──"

[[dialogue]]
speaker = "レイラ"
# 「リーナについて、改めて私から説明します。すでにお聞きのことかもしれませんが、ご容赦ください」
line = "「リーナについて、改めて私から説明します。すでにお聞きのことかもしれませんが、ご容赦ください」"

[[dialogue]]
speaker = "レイラ"
# 「リーナのフルネームは、<ruby=ひづき>火憑</ruby>リーナ。流星市国から遠くない街に生まれた、普通の女の子でした」
line = "「リーナのフルネームは、<ruby>火憑<rt>ひづき</rt></ruby>リーナ。流星市国から遠くない街に生まれた、普通の女の子でした」"

[[dialogue]]
speaker = "レイラ"
# 「リーナには本当にお兄さんがいました。リーナが生まれる前に病気で亡くなってしまいましたが……もし生きていれば、私や魔王さんと同じくらいの歳ですね」
line = "「リーナには本当にお兄さんがいました。リーナが生まれる前に病気で亡くなってしまいましたが……もし生きていれば、私や魔王さんと同じくらいの歳ですね」"

[[dialogue]]
speaker = "レイラ"
# 「リーナが生まれた時、ご両親は大変な喜びようだったそうです。お兄さんは生まれた時から重篤な病を患っていましたが、リーナにはそれがなかったのです」
line = "「リーナが生まれた時、ご両親は大変な喜びようだったそうです。お兄さんは生まれた時から重篤な病を患っていましたが、リーナにはそれがなかったのです」"

[[dialogue]]
speaker = "レイラ"
# 「……ですが、それもすぐに呪いに変わります」
line = "「……ですが、それもすぐに呪いに変わります」"

[[dialogue]]
speaker = "レイラ"
# 「『お兄ちゃんが天国で見守ってくれている』『お兄ちゃんと違ってリーナは健康でよかった』……ご両親はいつもそう言っていたそうです」
line = "「『お兄ちゃんが天国で見守ってくれている』『お兄ちゃんと違ってリーナは健康でよかった』……ご両親はいつもそう言っていたそうです」"

[[dialogue]]
speaker = "レイラ"
# 「何をしても、していなくても、お兄さんのことがついて回る生活だったようです。リーナにとってお兄さんは…………重荷だったでしょうね」
line = "「何をしても、していなくても、お兄さんのことがついて回る生活だったようです。リーナにとってお兄さんは…………重荷だったでしょうね」"

[[dialogue]]
speaker = "レイラ"
# 「そんなある日、悲劇が起こりました。リーナとご両親を乗せた車が大型車両と衝突し、ご両親は即死。リーナだけはコラプサーとなって生き永らえました」
line = "「そんなある日、悲劇が起こりました。リーナとご両親を乗せた車が大型車両と衝突し、ご両親は即死。リーナだけはコラプサーとなって生き永らえました」"

[[dialogue]]
speaker = "レイラ"
# 「……事故の状況から考えて、リーナはご両親の死を目撃していた可能性が高いです。歪んだ家族とはいえ、実の両親です。リーナのショックは計り知れません」
line = "「……事故の状況から考えて、リーナはご両親の死を目撃していた可能性が高いです。歪んだ家族とはいえ、実の両親です。リーナのショックは計り知れません」"

[[dialogue]]
speaker = "レイラ"
# 「リーナが現在のような状態になったのもそれが原因でしょう。リーナはご両親の死を受け入れられず、また、魔王さんをいないはずのお兄ちゃんだと思い込んでいます」
line = "「リーナが現在のような状態になったのもそれが原因でしょう。リーナはご両親の死を受け入れられず、また、魔王さんをいないはずのお兄ちゃんだと思い込んでいます」"

[[dialogue]]
speaker = "レイラ"
# 「これは私の個人的な意見なのですが、リーナは夢を見ているんだと思います。……優しいお兄ちゃんが本当にいたら、という甘い夢を」
line = "「これは私の個人的な意見なのですが、リーナは夢を見ているんだと思います。……優しいお兄ちゃんが本当にいたら、という甘い夢を」"

[[dialogue]]
speaker = "レイラ"
# 「魔王さんがリーナの夢に付き合う義務はありません。……それでも、どうかもう少しの間、お兄ちゃんでいてあげてください」
line = "「魔王さんがリーナの夢に付き合う義務はありません。……それでも、どうかもう少しの間、お兄ちゃんでいてあげてください」"

[[dialogue]]
speaker = "unk"
# 今日はスイカ割りがしたいというリーナの願いを叶えに来た。プライベートの方のリゾート結界を借りているので、他の客もいない。
line = "今日はスイカ割りがしたいというリーナの願いを叶えに来た。プライベートの方のリゾート結界を借りているので、他の客もいない。"

[[dialogue]]
speaker = "リーナ"
# 「わー！　おっきなスイカ！　おおだまだね！」
line = "「わー！　おっきなスイカ！　おおだまだね！」"

[[dialogue]]
speaker = "リーナ"
# 「じゃあお兄ちゃん、目隠しして～」
line = "「じゃあお兄ちゃん、目隠しして～」"

[[dialogue]]
speaker = "unk"
# 途中で解けないように、でもきつくならないように気を付けて目隠しを結ぶ。
line = "途中で解けないように、でもきつくならないように気を付けて目隠しを結ぶ。"

[[dialogue]]
speaker = "リーナ"
# 「あはは！　何にも見えな～いっ」
line = "「あはは！　何にも見えな～いっ」"

[[dialogue]]
speaker = "リーナ"
# 「……お兄ちゃん、見えないからっていなくなっちゃダメだからね？」
line = "「……お兄ちゃん、見えないからっていなくなっちゃダメだからね？」"

[[dialogue]]
speaker = "リーナ"
# 「あはは！　冗談だよ、お兄ちゃん。お兄ちゃんはリーナを置いていなくなったりしないもんね。それに……」
line = "「あはは！　冗談だよ、お兄ちゃん。お兄ちゃんはリーナを置いていなくなったりしないもんね。それに……」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんがどこにいても、ゼッタイ見付けるからね<emoji=heart04>」
line = "「お兄ちゃんがどこにいても、ゼッタイ見付けるからね<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
# 「じゃあ、お兄ちゃん。リーナにスイカの場所教えて」
line = "「じゃあ、お兄ちゃん。リーナにスイカの場所教えて」"

[[dialogue]]
speaker = "unk"
# 少し右！
line = "少し右！"

[[dialogue]]
speaker = "リーナ"
# 「えっと、こうかな？」
line = "「えっと、こうかな？」"

[[dialogue]]
speaker = "リーナ"
# 「え、行きすぎ！？　じゃあこっち？」
line = "「え、行きすぎ！？　じゃあこっち？」"

[[dialogue]]
speaker = "リーナ"
# 「また行きすぎ？　も～、難しいよぉ、お兄ちゃんっ。……そうだ、お兄ちゃんが直接リーナを動かしてよ」
line = "「また行きすぎ？　も～、難しいよぉ、お兄ちゃんっ。……そうだ、お兄ちゃんが直接リーナを動かしてよ」"

[[dialogue]]
speaker = "unk"
# 直接？
line = "直接？"

[[dialogue]]
speaker = "リーナ"
# 「うん。お兄ちゃんはリーナの後ろに立って、肩を持ってリーナを動かして。そうすれば分かりやすいよ」
line = "「うん。お兄ちゃんはリーナの後ろに立って、肩を持ってリーナを動かして。そうすれば分かりやすいよ」"

[[dialogue]]
speaker = "リーナ"
# 「いいでしょ？　ね？」
line = "「いいでしょ？　ね？」"

[[dialogue]]
speaker = "unk"
# リーナがそう言うなら……
line = "リーナがそう言うなら……"

[[dialogue]]
speaker = "リーナ"
# 「あっ<emoji=heart04>」
line = "「あっ<emoji=heart04>」"

[[dialogue]]
speaker = "リーナ"
# 「ごめんね、変な声出して。目隠ししてるから、お兄ちゃんの手にびっくりしちゃった」
line = "「ごめんね、変な声出して。目隠ししてるから、お兄ちゃんの手にびっくりしちゃった」"

[[dialogue]]
speaker = "unk"
# じゃあ動かすよ
line = "じゃあ動かすよ"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、優しく動かしてね。リーナ、今見えないから急に動かすと怖いよ」
line = "「お兄ちゃん、優しく動かしてね。リーナ、今見えないから急に動かすと怖いよ」"

[[dialogue]]
speaker = "リーナ"
# 「……うん、そう。ゆっくり優しくね。お兄ちゃんの手、あったかくて大好き」
line = "「……うん、そう。ゆっくり優しくね。お兄ちゃんの手、あったかくて大好き」"

[[dialogue]]
speaker = "リーナ"
# 「ここでいいんだね？　じゃあ割るよっ！　せーの、チクチクバット！」
line = "「ここでいいんだね？　じゃあ割るよっ！　せーの、チクチクバット！」"

[[dialogue]]
speaker = "リーナ"
# 「当たった！？　……あ、あれ？　やりすぎちゃった？　スイカが粉々になってる……」
line = "「当たった！？　……あ、あれ？　やりすぎちゃった？　スイカが粉々になってる……」"

[[dialogue]]
speaker = "リーナ"
# 「ど、どうしようお兄ちゃん……」
line = "「ど、どうしようお兄ちゃん……」"

[[dialogue]]
speaker = "unk"
# もう一度やろう！
line = "もう一度やろう！"

[[dialogue]]
speaker = "リーナ"
# 「うん！　お兄ちゃんが一緒だもん、次はキレイにスイカ割ってみせるね！」
line = "「うん！　お兄ちゃんが一緒だもん、次はキレイにスイカ割ってみせるね！」"

[[dialogue]]
speaker = "リーナ"
# 「スイカ美味しいね、お兄ちゃん」
line = "「スイカ美味しいね、お兄ちゃん」"

[[dialogue]]
speaker = "リーナ"
# 「何度もスイカ粉々にしちゃったけど、ちゃんと綺麗に割れるようになったよ。えへへ～」
line = "「何度もスイカ粉々にしちゃったけど、ちゃんと綺麗に割れるようになったよ。えへへ～」"

[[dialogue]]
speaker = "リーナ"
# 「今日は楽しかった！　ありがとう、お兄ちゃん。また遊びに連れて行ってね！」
line = "「今日は楽しかった！　ありがとう、お兄ちゃん。また遊びに連れて行ってね！」"

[[dialogue]]
speaker = "unk"
# リーナの夢がいつ醒めるのかは分からない。いつまでお兄ちゃんでいるのかも。
line = "リーナの夢がいつ醒めるのかは分からない。いつまでお兄ちゃんでいるのかも。"

[[dialogue]]
speaker = "unk"
# それでも、今日食べたスイカの味を忘れないと思う。
line = "それでも、今日食べたスイカの味を忘れないと思う。"
