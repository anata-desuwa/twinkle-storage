[[dialogue]]
speaker = "unk"
# 第４話,顕現せし力,B
line = "第４話,顕現せし力,B"

[[dialogue]]
speaker = "クロト"
# 「オオオッ……！」
line = "「オオオッ……！」"

[[dialogue]]
speaker = "unk"
# クロトが腕を振りかぶり、梨緒の頭を吹き飛ばさんと鉄槌が襲い来る。
line = "クロトが腕を振りかぶり、梨緒の頭を吹き飛ばさんと鉄槌が襲い来る。"

[[dialogue]]
speaker = "unk"
# ──だが、そこに梨緒はいなかった。
line = "──だが、そこに梨緒はいなかった。"

[[dialogue]]
speaker = "梨緒"
# 「そこだ！」
line = "「そこだ！」"

[[dialogue]]
speaker = "unk"
# 梨緒は最小限の動きで拳を躱すと、稲妻の矢でクロトの肩を撃ち抜いた。
line = "梨緒は最小限の動きで拳を躱すと、稲妻の矢でクロトの肩を撃ち抜いた。"

[[dialogue]]
speaker = "クロト"
# 「グウゥゥッ！」
line = "「グウゥゥッ！」"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# クロトの拳が再び迫る──が、今度は梨緒は動かない。
line = "クロトの拳が再び迫る──が、今度は梨緒は動かない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ディバインスフィア！」
line = "「ディバインスフィア！」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# 拳が届く前に光条に包まれ、瘴気を焼かれながらクロトが飛び退く。
line = "拳が届く前に光条に包まれ、瘴気を焼かれながらクロトが飛び退く。"

[[dialogue]]
speaker = "ヴィーナス"
# 「梨緒、あなた今のが間に合うって見えてたの！？」
line = "「梨緒、あなた今のが間に合うって見えてたの！？」"

[[dialogue]]
speaker = "梨緒"
# 「視覚的に見えるわけではないが、なんとなくわかるんだ。たとえば──」
line = "「視覚的に見えるわけではないが、なんとなくわかるんだ。たとえば──」"

[[dialogue]]
speaker = "unk"
# 先ほど戦いながら放った、一本の矢。
line = "先ほど戦いながら放った、一本の矢。"

[[dialogue]]
speaker = "unk"
# それが空から真っ直ぐに落ちてきて、距離を取ったクロトに雷となって突き刺さる。
line = "それが空から真っ直ぐに落ちてきて、距離を取ったクロトに雷となって突き刺さる。"

[[dialogue]]
speaker = "クロト"
# 「オオオオッ！？」
line = "「オオオオッ！？」"

[[dialogue]]
speaker = "梨緒"
# 「こんな感じに……な」
line = "「こんな感じに……な」"

[[dialogue]]
speaker = "unk"
# 未来予知がごとく先を読み、紙一重で躱し、寸分狂わず矢を当てる。
line = "未来予知がごとく先を読み、紙一重で躱し、寸分狂わず矢を当てる。"

[[dialogue]]
speaker = "unk"
# まるで運命を見透すようなその力は、今までの梨緒には持ちえなかったもので、翼とともに顕現したのは明らかだ。
line = "まるで運命を見透すようなその力は、今までの梨緒には持ちえなかったもので、翼とともに顕現したのは明らかだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「すごいじゃない！　この調子なら、何とかなるかもしれないわね！」
line = "「すごいじゃない！　この調子なら、何とかなるかもしれないわね！」"

[[dialogue]]
speaker = "梨緒"
# 「ヴィーナス、次は大きいのが来る。一瞬早く攻めて、彼の攻撃を潰してくれ！」
line = "「ヴィーナス、次は大きいのが来る。一瞬早く攻めて、彼の攻撃を潰してくれ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかんないけどわかったわ！」
line = "「わかんないけどわかったわ！」"

[[dialogue]]
speaker = "クロト"
# 「グオオオオッ──！！」
line = "「グオオオオッ──！！」"

[[dialogue]]
speaker = "unk"
# クロトが低い唸りを上げ、拳撃を繰り出そうとする瞬間、わずかに先んじて光条が迸る。
line = "クロトが低い唸りを上げ、拳撃を繰り出そうとする瞬間、わずかに先んじて光条が迸る。"

[[dialogue]]
speaker = "ヴィーナス"
# 「シャイニングゴッデスビーーームッ！！！」
line = "「シャイニングゴッデスビーーームッ！！！」"

[[dialogue]]
speaker = "クロト"
# 「──ッ！？」
line = "「──ッ！？」"

[[dialogue]]
speaker = "unk"
# その隙を逃さず──
line = "その隙を逃さず──"

[[dialogue]]
speaker = "梨緒"
# 「悪しきものを切り裂け──」
line = "「悪しきものを切り裂け──」"

[[dialogue]]
speaker = "梨緒"
# 「ディメンション──エクスウェーブ！！！」
line = "「ディメンション──エクスウェーブ！！！」"

[[dialogue]]
speaker = "クロト"
# 「オオオオオーーーーーッ！！？？」
line = "「オオオオオーーーーーッ！！？？」"

[[dialogue]]
speaker = "unk"
# そして放たれた雷の波動が刃と化し、リクリエの瘴気を引き裂いた。
line = "そして放たれた雷の波動が刃と化し、リクリエの瘴気を引き裂いた。"

[[dialogue]]
speaker = "クロト"
# 「ク……オオ……」
line = "「ク……オオ……」"

[[dialogue]]
speaker = "unk"
# 身にまとう瘴気を全て剥がされたクロト。
line = "身にまとう瘴気を全て剥がされたクロト。"

[[dialogue]]
speaker = "unk"
# だがそれも一瞬。次の瞬間にはリクリエの瘴気が爆発的に膨れ上がるだろう。
line = "だがそれも一瞬。次の瞬間にはリクリエの瘴気が爆発的に膨れ上がるだろう。"

[[dialogue]]
speaker = "unk"
# その隙間を縫って、光の矢がクロトの胸に吸い込まれる。
line = "その隙間を縫って、光の矢がクロトの胸に吸い込まれる。"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# だがクロトは苦痛に表情を歪めることもなく、正気を取り戻す気配もない。
line = "だがクロトは苦痛に表情を歪めることもなく、正気を取り戻す気配もない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「何も起きないわよ！？」
line = "「何も起きないわよ！？」"

[[dialogue]]
speaker = "梨緒"
# 「大丈夫だ」
line = "「大丈夫だ」"

[[dialogue]]
speaker = "unk"
# 次の瞬間──
line = "次の瞬間──"

[[dialogue]]
speaker = "クロト"
# 「！！？？」
line = "「！！？？」"

[[dialogue]]
speaker = "unk"
# クロトの全身に稲妻が迸った。
line = "クロトの全身に稲妻が迸った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「何が起きてるの！？」
line = "「何が起きてるの！？」"

[[dialogue]]
speaker = "梨緒"
# 「緋宮クロトの中に封印されたリクリエの力を、今は完全に取り除くことはできない」
line = "「緋宮クロトの中に封印されたリクリエの力を、今は完全に取り除くことはできない」"

[[dialogue]]
speaker = "梨緒"
# 「ならば、ジグに植え付けられた力だけを、緋宮クロトの内側から焼き尽くす！」
line = "「ならば、ジグに植え付けられた力だけを、緋宮クロトの内側から焼き尽くす！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなことできるの！？」
line = "「そんなことできるの！？」"

[[dialogue]]
speaker = "梨緒"
# 「人の体を動かすのは電気信号だ。そして雷も電気……なら内側から攻めるには都合がいい」
line = "「人の体を動かすのは電気信号だ。そして雷も電気……なら内側から攻めるには都合がいい」"

[[dialogue]]
speaker = "クロト"
# 「グ──オオオオッーー！！」
line = "「グ──オオオオッーー！！」"

[[dialogue]]
speaker = "梨緒"
# 「正気に戻れ！　緋宮クロト！」
line = "「正気に戻れ！　緋宮クロト！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト！！」
line = "「クロト！！」"

[[dialogue]]
speaker = "unk"
# そして閃光が一際強く煌き──
line = "そして閃光が一際強く煌き──"

[[dialogue]]
speaker = "クロト"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "unk"
# 光が晴れると、クロトが膝を突き、その場に倒れる。
line = "光が晴れると、クロトが膝を突き、その場に倒れる。"

[[dialogue]]
speaker = "梨緒"
# 「やった……か？」
line = "「やった……か？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっ！？　それ言っちゃダメなやつ！」
line = "「ちょっ！？　それ言っちゃダメなやつ！」"

[[dialogue]]
speaker = "梨緒"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの指摘に、キョトンと目を丸くする梨緒。
line = "ヴィーナスの指摘に、キョトンと目を丸くする梨緒。"

[[dialogue]]
speaker = "unk"
# その背後からガーディアンが接近してきて──
line = "その背後からガーディアンが接近してきて──"

[[dialogue]]
speaker = "梨緒"
# 「！？　小型の極星従騎──！？」
line = "「！？　小型の極星従騎──！？」"

[[dialogue]]
speaker = "unk"
# しかしガーディアンは梨緒たちに攻撃する間もなく、闇を帯びた拳に砕かれた。
line = "しかしガーディアンは梨緒たちに攻撃する間もなく、闇を帯びた拳に砕かれた。"

[[dialogue]]
speaker = "梨緒"
# 「！　この攻撃は──」
line = "「！　この攻撃は──」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう、２人とも。おかげで帰ってこれた」
line = "「ありがとう、２人とも。おかげで帰ってこれた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まったく！　寝坊は困るわよ、パパ！」
line = "「まったく！　寝坊は困るわよ、パパ！」"

[[dialogue]]
speaker = "クロト"
# 「はは……気を付けるよ」
line = "「はは……気を付けるよ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスと梨緒の前に立ち、拳を下ろすクロト。
line = "ヴィーナスと梨緒の前に立ち、拳を下ろすクロト。"

[[dialogue]]
speaker = "unk"
# その目には、確かに理性の光が宿っていた。
line = "その目には、確かに理性の光が宿っていた。"

[[dialogue]]
speaker = "unk"
# 傷ついた──いや、傷つけた２人に向けて、俺は改めて深々と頭を下げる。
line = "傷ついた──いや、傷つけた２人に向けて、俺は改めて深々と頭を下げる。"

[[dialogue]]
speaker = "クロト"
# 「ごめん。リクリエの力に呑まれかけていた」
line = "「ごめん。リクリエの力に呑まれかけていた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「このくらい平気よ。パパの面倒見てあげるって言ったでしょ？」
line = "「このくらい平気よ。パパの面倒見てあげるって言ったでしょ？」"

[[dialogue]]
speaker = "梨緒"
# 「魔王を止めると決意した時から、覚悟はできている」
line = "「魔王を止めると決意した時から、覚悟はできている」"

[[dialogue]]
speaker = "梨緒"
# 「……が、足蹴にされるとはさすがに思わなかった。まあ、貴重な体験ではあったかな」
line = "「……が、足蹴にされるとはさすがに思わなかった。まあ、貴重な体験ではあったかな」"

[[dialogue]]
speaker = "クロト"
# 「う……本当にすまな──」
line = "「う……本当にすまな──」"

[[dialogue]]
speaker = "梨緒"
# 「謝罪というなら、戦いが終わったら勝負を受けてもらう。私の気が済むまでな」
line = "「謝罪というなら、戦いが終わったら勝負を受けてもらう。私の気が済むまでな」"

[[dialogue]]
speaker = "クロト"
# 「……ああ、わかった」
line = "「……ああ、わかった」"

[[dialogue]]
speaker = "unk"
# 梨緒は見るからにボロボロになりながらも、気丈に微笑む。
line = "梨緒は見るからにボロボロになりながらも、気丈に微笑む。"

[[dialogue]]
speaker = "unk"
# 今回は……いや、今回も彼女に助けられた。
line = "今回は……いや、今回も彼女に助けられた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「また勝負するの～？　飽きないわね」
line = "「また勝負するの～？　飽きないわね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ていうか、気が済むまで勝負するなら、今までもそうだったじゃない？」
line = "「ていうか、気が済むまで勝負するなら、今までもそうだったじゃない？」"

[[dialogue]]
speaker = "梨緒"
# 「なっ！？　そ、そんなことは……」
line = "「なっ！？　そ、そんなことは……」"

[[dialogue]]
speaker = "梨緒"
# 「ンッ、ンン……まずは流星市国を守ることが先決だ。それ以外のことは後で考えよう」
line = "「ンッ、ンン……まずは流星市国を守ることが先決だ。それ以外のことは後で考えよう」"

[[dialogue]]
speaker = "クロト"
# （ごまかした……）
line = "（ごまかした……）"

[[dialogue]]
speaker = "ヴィーナス"
# （ごまかしたわね……）
line = "（ごまかしたわね……）"

[[dialogue]]
speaker = "ナターシャ"
# 「おやおや、ホントに魔王を止めちゃったね。天界の特務エージェントも形無しだよ」
line = "「おやおや、ホントに魔王を止めちゃったね。天界の特務エージェントも形無しだよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんすごかった！　かっこよかったよ！」
line = "「梨緒ちゃんすごかった！　かっこよかったよ！」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ、君たちのおかげで立ち上がれた。ありがとう、ベアト、ナターシャ」
line = "「……ああ、君たちのおかげで立ち上がれた。ありがとう、ベアト、ナターシャ」"

[[dialogue]]
speaker = "梨緒"
# 「だがあの力の正体は私にもよくわからない……あれはいったい何だったんだ？」
line = "「だがあの力の正体は私にもよくわからない……あれはいったい何だったんだ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「自分のことなのにわからないの？」
line = "「自分のことなのにわからないの？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、本当に。少なくとも、こちらの世界に来る前はあんな力を出したことはなかった」
line = "「ああ、本当に。少なくとも、こちらの世界に来る前はあんな力を出したことはなかった」"

[[dialogue]]
speaker = "unk"
# 梨緒の背中に顕現した天使の翼と、未来視に近い行動予測。
line = "梨緒の背中に顕現した天使の翼と、未来視に近い行動予測。"

[[dialogue]]
speaker = "unk"
# そして俺を射貫いた雷から感じたのは、星力だけではなかった。
line = "そして俺を射貫いた雷から感じたのは、星力だけではなかった。"

[[dialogue]]
speaker = "クロト"
# （俺はあの力を知っている……<ruby=クロスダスト>霊屑</ruby>に宿る霊力のような……）
line = "（俺はあの力を知っている……<ruby>霊屑<rt>クロスダスト</rt></ruby>に宿る霊力のような……）"

[[dialogue]]
speaker = "unk"
# 梨緒が普通の人間だとすれば、セイファート前学園長のように後天的に得たものなのだろうか？
line = "梨緒が普通の人間だとすれば、セイファート前学園長のように後天的に得たものなのだろうか？"

[[dialogue]]
speaker = "unk"
# なら、それはどこで……？
line = "なら、それはどこで……？"

[[dialogue]]
speaker = "梨緒"
# 「残念ながら考察している暇はない。こうしている間にも極星学園の侵攻は進んでいる」
line = "「残念ながら考察している暇はない。こうしている間にも極星学園の侵攻は進んでいる」"

[[dialogue]]
speaker = "クロト"
# 「ああ、早く極星の指揮官を見つけて──」
line = "「ああ、早く極星の指揮官を見つけて──」"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「キシャーッ！！」
line = "「キシャーッ！！」"

[[dialogue]]
speaker = "クロト"
# 「機械型モンスター……！」
line = "「機械型モンスター……！」"

[[dialogue]]
speaker = "unk"
# 傷ついたヴィーナスと梨緒を背に庇い、機械型モンスターと対峙する。
line = "傷ついたヴィーナスと梨緒を背に庇い、機械型モンスターと対峙する。"

[[dialogue]]
speaker = "スクアルス"
# 「シャーッ！」
line = "「シャーッ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「後ろからもモンスター！？　ほんと節操ないわね！」
line = "「後ろからもモンスター！？　ほんと節操ないわね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ？　見慣れたサメというか、機械化してないモンスターがどうしてここに……？」
line = "「あれ？　見慣れたサメというか、機械化してないモンスターがどうしてここに……？」"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「キシャーーッ！！」
line = "「キシャーーッ！！」"

[[dialogue]]
speaker = "スクアルス"
# 「シャーーッ！！」
line = "「シャーーッ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え……？　モンスターとモンスターが戦ってる……！？　しかもサメ同士なんだけど！？」
line = "「え……？　モンスターとモンスターが戦ってる……！？　しかもサメ同士なんだけど！？」"

[[dialogue]]
speaker = "unk"
# モンスターがこちらの味方をするなんてありえない──
line = "モンスターがこちらの味方をするなんてありえない──"

[[dialogue]]
speaker = "unk"
# いや、三界にただ１人、モンスターすら従えられる存在がいた。
line = "いや、三界にただ１人、モンスターすら従えられる存在がいた。"

[[dialogue]]
speaker = "クロト"
# 「まさか──」
line = "「まさか──」"

[[dialogue]]
speaker = "煌嶺"
# 「おっと、あのモンスターには手を出すでないぞ。妾の所有物だ」
line = "「おっと、あのモンスターには手を出すでないぞ。妾の所有物だ」"

[[dialogue]]
speaker = "クロト"
# 「煌嶺……！」
line = "「煌嶺……！」"

[[dialogue]]
speaker = "煌嶺"
# 「何を驚いている？　妾が流星市国にいることは知っておろう」
line = "「何を驚いている？　妾が流星市国にいることは知っておろう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたがあの煌嶺ね！　なんていうか、悪そうなやつのオーラがするわ！」
line = "「あなたがあの煌嶺ね！　なんていうか、悪そうなやつのオーラがするわ！」"

[[dialogue]]
speaker = "煌嶺"
# 「ふむ、そういう貴様は九浄の娘か。魔王とは親子と聞いたが、揃って能天気な顔をしているな」
line = "「ふむ、そういう貴様は九浄の娘か。魔王とは親子と聞いたが、揃って能天気な顔をしているな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「聞いた聞いたっ！？　私、クロトと似てるって！」
line = "「聞いた聞いたっ！？　私、クロトと似てるって！」"

[[dialogue]]
speaker = "梨緒"
# 「今のは喜ぶところか……？」
line = "「今のは喜ぶところか……？」"

[[dialogue]]
speaker = "煌嶺"
# 「しかしどうした魔王、すでにくたびれているではないか。モンスターごときにやられたか？」
line = "「しかしどうした魔王、すでにくたびれているではないか。モンスターごときにやられたか？」"

[[dialogue]]
speaker = "煌嶺"
# 「それとも……己の身に宿した力に食われかけたか？」
line = "「それとも……己の身に宿した力に食われかけたか？」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 俺の中に封じたリクリエが暴走したのを知ってか知らずか、煌嶺の言葉に心臓が跳ねる。
line = "俺の中に封じたリクリエが暴走したのを知ってか知らずか、煌嶺の言葉に心臓が跳ねる。"

[[dialogue]]
speaker = "unk"
# モンスターすら従える魔界の女帝。それも魔王の系譜となれば、他の魔王のことなどお見通しとでも言うのか。
line = "モンスターすら従える魔界の女帝。それも魔王の系譜となれば、他の魔王のことなどお見通しとでも言うのか。"

[[dialogue]]
speaker = "スクアルス"
# 「シャー……」
line = "「シャー……」"

[[dialogue]]
speaker = "煌嶺"
# 「ほう、やはり機械型の方が強いのか。欲しくなってきたぞ。よって──」
line = "「ほう、やはり機械型の方が強いのか。欲しくなってきたぞ。よって──」"

[[dialogue]]
speaker = "煌嶺"
# 「妾のものとなれ！」
line = "「妾のものとなれ！」"

[[dialogue]]
speaker = "unk"
# 揺らめく九尾の尾から炎が広がり、勝ち残った方のモンスターを包み込む。
line = "揺らめく九尾の尾から炎が広がり、勝ち残った方のモンスターを包み込む。"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「キシャー！？」
line = "「キシャー！？」"

[[dialogue]]
speaker = "unk"
# するとモンスターも炎の球と化して、尾の中に吸い込まれていった。
line = "するとモンスターも炎の球と化して、尾の中に吸い込まれていった。"

[[dialogue]]
speaker = "煌嶺"
# 「ふむ、強靭になったとはいえ所詮はモンスターか。御するなど容易い」
line = "「ふむ、強靭になったとはいえ所詮はモンスターか。御するなど容易い」"

[[dialogue]]
speaker = "煌嶺"
# 「──来い！」
line = "「──来い！」"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「キシャーッ！！」
line = "「キシャーッ！！」"

[[dialogue]]
speaker = "unk"
# そしてモンスターは煌嶺の尾から解き放たれると、同じ形をしたモンスターめがけて突進していく。
line = "そしてモンスターは煌嶺の尾から解き放たれると、同じ形をしたモンスターめがけて突進していく。"

[[dialogue]]
speaker = "煌嶺"
# 「せいぜい役に立つがよい」
line = "「せいぜい役に立つがよい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今のでモンスターを支配したってこと……？　すごい力ね！」
line = "「今のでモンスターを支配したってこと……？　すごい力ね！」"

[[dialogue]]
speaker = "煌嶺"
# 「あ、そうそう。新学園長のシノさんから、魔王さんに伝言だよ～」
line = "「あ、そうそう。新学園長のシノさんから、魔王さんに伝言だよ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「キャラ変わった！？　二重人格ってやつ！？」
line = "「キャラ変わった！？　二重人格ってやつ！？」"

[[dialogue]]
speaker = "煌嶺"
# 「ううん、<ruby=そういうの>二重人格</ruby>じゃないよ。ただの気分」
line = "「ううん、<ruby>二重人格<rt>そういうの</rt></ruby>じゃないよ。ただの気分」"

[[dialogue]]
speaker = "クロト"
# 「シノさんから俺に伝言……？　今ここで？」
line = "「シノさんから俺に伝言……？　今ここで？」"

[[dialogue]]
speaker = "煌嶺"
# 「うん。魔王さんが一番、極星星徒会と接触する可能性が高いからって」
line = "「うん。魔王さんが一番、極星星徒会と接触する可能性が高いからって」"

[[dialogue]]
speaker = "煌嶺"
# 「香堂チナがなぜアルタイルに宣戦布告したのか疑問がある──って、学園長が言ってた」
line = "「香堂チナがなぜアルタイルに宣戦布告したのか疑問がある──って、学園長が言ってた」"

[[dialogue]]
speaker = "煌嶺"
# 「<ruby=敵>アルタイル側</ruby>の戦う意志を鈍らせる作戦かもしれないけど、アルタイルが戦う準備を整えちゃう危険性も高い」
line = "「<ruby>アルタイル側<rt>敵</rt></ruby>の戦う意志を鈍らせる作戦かもしれないけど、アルタイルが戦う準備を整えちゃう危険性も高い」"

[[dialogue]]
speaker = "煌嶺"
# 「真にこの戦いが生存競争であるなら、デネブの存在は知らせず、情報のアドバンテージを持っていた方がいいはずだって」
line = "「真にこの戦いが生存競争であるなら、デネブの存在は知らせず、情報のアドバンテージを持っていた方がいいはずだって」"

[[dialogue]]
speaker = "クロト"
# 「……なるほど。ありがとう」
line = "「……なるほど。ありがとう」"

[[dialogue]]
speaker = "unk"
# 確かにデネブ側の視点で見れば、あの宣戦布告をするメリットはあまりない。
line = "確かにデネブ側の視点で見れば、あの宣戦布告をするメリットはあまりない。"

[[dialogue]]
speaker = "unk"
# ならどうして……？　そもそもあれはチナ自身の意思だったのか……？
line = "ならどうして……？　そもそもあれはチナ自身の意思だったのか……？"

[[dialogue]]
speaker = "煌嶺"
# 「それじゃ、私はあの馬のガーディアンもコレクションするから、この辺ブラブラしてるね」
line = "「それじゃ、私はあの馬のガーディアンもコレクションするから、この辺ブラブラしてるね」"

[[dialogue]]
speaker = "梨緒"
# 「極星従騎をコレクションか……心強いといえば心強いが、大丈夫か？　戦況は芳しくないぞ」
line = "「極星従騎をコレクションか……心強いといえば心強いが、大丈夫か？　戦況は芳しくないぞ」"

[[dialogue]]
speaker = "煌嶺"
# 「誰に言ってるの？　私はキュリオスの皇帝だよ？」
line = "「誰に言ってるの？　私はキュリオスの皇帝だよ？」"

[[dialogue]]
speaker = "煌嶺"
# 「<ruby=うち>キュリオス</ruby>の子も出してあげるから、期待してていいよ♪」
line = "「<ruby>キュリオス<rt>うち</rt></ruby>の子も出してあげるから、期待してていいよ♪」"

[[dialogue]]
speaker = "クロト"
# 「うちの子……？」
line = "「うちの子……？」"
