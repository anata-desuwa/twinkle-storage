[[dialogue]]
speaker = "unk"
# 第２話,ネーゼマインとリノ,P
line = "第２話,ネーゼマインとリノ,P"

[[dialogue]]
speaker = "unk"
# その日、母さんの提案で、俺とマインと母さんの３人で遊ばないかという話になり、リゾート結界へとやって来ていた――
line = "その日、母さんの提案で、俺とマインと母さんの３人で遊ばないかという話になり、リゾート結界へとやって来ていた――"

[[dialogue]]
speaker = "リノ"
# 「マインちゃん、今日はお母さんに付き合ってくれてありがとね」
line = "「マインちゃん、今日はお母さんに付き合ってくれてありがとね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いえいえ♪　家にも何度もお邪魔させて貰って、リノさんにはお世話になってますから」
line = "「いえいえ♪　家にも何度もお邪魔させて貰って、リノさんにはお世話になってますから」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それで、今日は何して過ごします？」
line = "「それで、今日は何して過ごします？」"

[[dialogue]]
speaker = "リノ"
# 「実は私ね、この前の公安委員会の一件で、心残りがあって～」
line = "「実は私ね、この前の公安委員会の一件で、心残りがあって～」"

[[dialogue]]
speaker = "リノ"
# 「というわけでクロト、サンオイルお願いね♪」
line = "「というわけでクロト、サンオイルお願いね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まさかの、そうきましたか～♪」
line = "「まさかの、そうきましたか～♪」"

[[dialogue]]
speaker = "unk"
# 紫外線はカットされてるけど……
line = "紫外線はカットされてるけど……"

[[dialogue]]
speaker = "unk"
# リゾート結界は創造主である星騎士――リップルの力により、紫外線の影響はオフ設定にされている。その為、日焼け対策をする必要は特にないのだが……。
line = "リゾート結界は創造主である星騎士――リップルの力により、紫外線の影響はオフ設定にされている。その為、日焼け対策をする必要は特にないのだが……。"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、こういうのは気分よ、気分♪」
line = "「ふふっ、こういうのは気分よ、気分♪」"

[[dialogue]]
speaker = "リノ"
# 「マインちゃんも一緒にどう？」
line = "「マインちゃんも一緒にどう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私ですか？　ん～……」
line = "「私ですか？　ん～……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私はこの前楽しんだので、一旦様子を見てますよ☆」
line = "「私はこの前楽しんだので、一旦様子を見てますよ☆」"

[[dialogue]]
speaker = "unk"
# それから母さんの望みに応えて、サンオイルを塗ることになり――
line = "それから母さんの望みに応えて、サンオイルを塗ることになり――"

[[dialogue]]
speaker = "リノ"
# 「――ふぅ、満足したわ～♪　クロト、ありがと～♪」
line = "「――ふぅ、満足したわ～♪　クロト、ありがと～♪」"

[[dialogue]]
speaker = "リノ"
# 「お母さん、ちょっと喉が渇いたから、海の家まで飲み物買って来るわね♪」
line = "「お母さん、ちょっと喉が渇いたから、海の家まで飲み物買って来るわね♪」"

[[dialogue]]
speaker = "unk"
# そうして立ち上がり、席を外す母さん。
line = "そうして立ち上がり、席を外す母さん。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# マイン？　どうかした？
line = "マイン？　どうかした？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ねぇ、会長。やっぱ私もサンオイル塗ってくれない？」
line = "「……ねぇ、会長。やっぱ私もサンオイル塗ってくれない？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほら、こういうのは気分だから」
line = "「ほら、こういうのは気分だから」"

[[dialogue]]
speaker = "unk"
# それから、マインにもサンオイルを塗ることになり、手にオイルを垂らして馴染ませていると――
line = "それから、マインにもサンオイルを塗ることになり、手にオイルを垂らして馴染ませていると――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「リノさんにサンオイル塗るの、随分と手慣れてる感じだったね」
line = "「リノさんにサンオイル塗るの、随分と手慣れてる感じだったね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――親子だから？　マッサージしたりとかと同じ感覚？」
line = "「――親子だから？　マッサージしたりとかと同じ感覚？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふ～ん、まぁ……私もたまに、お父さんの背中を足で踏み踏みしたりすることあるけど……」
line = "「ふ～ん、まぁ……私もたまに、お父さんの背中を足で踏み踏みしたりすることあるけど……」"

[[dialogue]]
speaker = "unk"
# そんな会話をしながら、俺はマインの背中にサンオイルを塗り始めたのだが――
line = "そんな会話をしながら、俺はマインの背中にサンオイルを塗り始めたのだが――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん……なんか会長、ぎこちなくない？」
line = "「ん……なんか会長、ぎこちなくない？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――好きな子相手だから、ドキドキする？」
line = "「――好きな子相手だから、ドキドキする？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ふ～ん、そうなんだ～」
line = "「……ふ～ん、そうなんだ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ……つまり会長は今、いやらしいこと考えてるんだ～？」
line = "「にひひ……つまり会長は今、いやらしいこと考えてるんだ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ～♪」
line = "「じゃあ～♪」"

[[dialogue]]
speaker = "unk"
# 言いながら、ゴロンと寝返りを打ち、俺の方へ仰向けに向き直るマイン。
line = "言いながら、ゴロンと寝返りを打ち、俺の方へ仰向けに向き直るマイン。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「前も塗ってみる？」
line = "「前も塗ってみる？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははっ☆　会長、一気に顔赤くなってるよ～？」
line = "「きゃははっ☆　会長、一気に顔赤くなってるよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、恋人なんだから、ちゃんと塗ってくれるよね～？　お腹の辺りとかお願いしちゃおっかな～？」
line = "「でも、恋人なんだから、ちゃんと塗ってくれるよね～？　お腹の辺りとかお願いしちゃおっかな～？」"

[[dialogue]]
speaker = "unk"
# 段々とテンションの上がって来たマインが、悪戯スマイルを浮かべていると――
line = "段々とテンションの上がって来たマインが、悪戯スマイルを浮かべていると――"

[[dialogue]]
speaker = "リノ"
# 「ふふっ、楽しそうね♪」
line = "「ふふっ、楽しそうね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えっ！？　リノさん、いつの間に……！？」
line = "「えっ！？　リノさん、いつの間に……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……その、いつから見てました？」
line = "「……その、いつから見てました？」"

[[dialogue]]
speaker = "リノ"
# 「ごめんなさい。実は飲み物買いに行って来るっていうのは嘘で、こっそり様子をうかがってたの」
line = "「ごめんなさい。実は飲み物買いに行って来るっていうのは嘘で、こっそり様子をうかがってたの」"

[[dialogue]]
speaker = "リノ"
# 「マインちゃんがどんな子なのか、素の部分が知りたくて」
line = "「マインちゃんがどんな子なのか、素の部分が知りたくて」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、なるほど……そうですよね～。前にサンオイル塗ってた時もちょっと見られちゃいましたし……」
line = "「あ～、なるほど……そうですよね～。前にサンオイル塗ってた時もちょっと見られちゃいましたし……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――ごめんなさい、リノさん。私、定期的につい悪戯したくなっちゃう性質というか……」
line = "「――ごめんなさい、リノさん。私、定期的につい悪戯したくなっちゃう性質というか……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なるべく、会長の彼女として、いい子に見せたいとは思ってたんですけど……」
line = "「なるべく、会長の彼女として、いい子に見せたいとは思ってたんですけど……」"

[[dialogue]]
speaker = "リノ"
# 「大丈夫よ、マインちゃん」
line = "「大丈夫よ、マインちゃん」"

[[dialogue]]
speaker = "リノ"
# 「私、マインちゃんがクロトの恋人として不安だとか、そんな風には全然思ったりしてないから」
line = "「私、マインちゃんがクロトの恋人として不安だとか、そんな風には全然思ったりしてないから」"

[[dialogue]]
speaker = "リノ"
# 「クロトが好きになった女の子だもの。それに、公安委員会でリコが認めているすごい子だってことも知ってる」
line = "「クロトが好きになった女の子だもの。それに、公安委員会でリコが認めているすごい子だってことも知ってる」"

[[dialogue]]
speaker = "リノ"
# 「たとえ『いい子』じゃなくたって、素敵な子だって信じているわ」
line = "「たとえ『いい子』じゃなくたって、素敵な子だって信じているわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「リノさん……」
line = "「リノさん……」"

[[dialogue]]
speaker = "リノ"
# 「私はただ、マインちゃんのことをもっと知って、仲良くなりたかっただけなのよ」
line = "「私はただ、マインちゃんのことをもっと知って、仲良くなりたかっただけなのよ」"

[[dialogue]]
speaker = "リノ"
# 「これから長～い付き合いになるかもしれないしね♪」
line = "「これから長～い付き合いになるかもしれないしね♪」"

[[dialogue]]
speaker = "リノ"
# 「だから、もし手伝って欲しいこととかがあったら言ってね」
line = "「だから、もし手伝って欲しいこととかがあったら言ってね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "リノ"
# 「ほら、イチャイチャする時に、お母さんが協力した方が作りやすいシチュエーションとかあるでしょう？」
line = "「ほら、イチャイチャする時に、お母さんが協力した方が作りやすいシチュエーションとかあるでしょう？」"

[[dialogue]]
speaker = "unk"
# ちょっと、母さん！？
line = "ちょっと、母さん！？"

[[dialogue]]
speaker = "リノ"
# 「あら、だって母親としては、可愛い息子の彼女は応援したいじゃない？」
line = "「あら、だって母親としては、可愛い息子の彼女は応援したいじゃない？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「息子の彼女を応援……にひっ、にひひっ♪　きゃはははっ☆」
line = "「息子の彼女を応援……にひっ、にひひっ♪　きゃはははっ☆」"

[[dialogue]]
speaker = "unk"
# ネーゼマインは吹き出して、しばらく笑った後――
line = "ネーゼマインは吹き出して、しばらく笑った後――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……リノさん、ありがとうございます。私も、リノさんのこと、もっとよく知りたくなっちゃいました♪」
line = "「……リノさん、ありがとうございます。私も、リノさんのこと、もっとよく知りたくなっちゃいました♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今度、一緒にどこか出かけませんか？　２人で♪」
line = "「今度、一緒にどこか出かけませんか？　２人で♪」"

[[dialogue]]
speaker = "リノ"
# 「あら♪　ふふっ、それはすごく楽しそう♪」
line = "「あら♪　ふふっ、それはすごく楽しそう♪」"

[[dialogue]]
speaker = "unk"
# 俺は仲間ハズレ！？
line = "俺は仲間ハズレ！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　会長、ざんね～ん☆」
line = "「にひひ♪　会長、ざんね～ん☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、素敵な彼女なら、彼氏のお母さんとはちゃんと仲良くしておかないとね～♪」
line = "「でも、素敵な彼女なら、彼氏のお母さんとはちゃんと仲良くしておかないとね～♪」"

[[dialogue]]
speaker = "unk"
# そこからは、母さんと打ち解けて、楽しそうに沢山話をするマインなのだった――
line = "そこからは、母さんと打ち解けて、楽しそうに沢山話をするマインなのだった――"
