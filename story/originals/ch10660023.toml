[[dialogue]]
speaker = "unk"
# 第３話,ナイトプールへの招待,P
line = "第３話,ナイトプールへの招待,P"

[[dialogue]]
speaker = "unk"
# 遊園地が拡張されて出来た新しいプール、その名も『チェリークルーズ』。
line = "遊園地が拡張されて出来た新しいプール、その名も『チェリークルーズ』。"

[[dialogue]]
speaker = "unk"
# そこは夜も営業していて、ムーディーな雰囲気にライトアップされる。
line = "そこは夜も営業していて、ムーディーな雰囲気にライトアップされる。"

[[dialogue]]
speaker = "ラティエ"
# 「エルデリーゼ嬢から話を聞いて、夜のプールに遊びに来てみたのだが……」
line = "「エルデリーゼ嬢から話を聞いて、夜のプールに遊びに来てみたのだが……」"

[[dialogue]]
speaker = "ラティエ"
# 「昼間の様子とはまた違った雰囲気で良いものだな」
line = "「昼間の様子とはまた違った雰囲気で良いものだな」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そうなんですの！　昼間とは違ってちょっぴり大人な雰囲気なのですわ～」
line = "「そうなんですの！　昼間とは違ってちょっぴり大人な雰囲気なのですわ～」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「なんだかいけないことをしているみたいで、ドキドキしてしまいます」
line = "「なんだかいけないことをしているみたいで、ドキドキしてしまいます」"

[[dialogue]]
speaker = "unk"
# 思いっきりいけないことしてるよね！
line = "思いっきりいけないことしてるよね！"

[[dialogue]]
speaker = "unk"
# ……っていうか無断外泊だよね？
line = "……っていうか無断外泊だよね？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「わわわっ！　会長様、しーーーっ、ですわ！」
line = "「わわわっ！　会長様、しーーーっ、ですわ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私が<ruby=イルソーレ>流星寮</ruby>を抜け出して遊びに来ていること、学園長様には内緒にしておいてくださいませっ！」
line = "「私が<ruby>流星寮<rt>イルソーレ</rt></ruby>を抜け出して遊びに来ていること、学園長様には内緒にしておいてくださいませっ！」"

[[dialogue]]
speaker = "ラティエ"
# 「ほう……無許可でこんな夜中に外出して遊びまわっていると……悪い子だな、きみは」
line = "「ほう……無許可でこんな夜中に外出して遊びまわっていると……悪い子だな、きみは」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はうううううっ！！？　き、聞かれてしまいましたわっ！！」
line = "「はうううううっ！！？　き、聞かれてしまいましたわっ！！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「お願いですわ、学園長様！　どうか見逃してくださいませっ！！」
line = "「お願いですわ、学園長様！　どうか見逃してくださいませっ！！」"

[[dialogue]]
speaker = "ラティエ"
# 「さて、どうしたものかな……」
line = "「さて、どうしたものかな……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ぅぅぅ～～～……」
line = "「ぅぅぅ～～～……」"

[[dialogue]]
speaker = "ラティエ"
# 「まあいいだろう」
line = "「まあいいだろう」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「っっ！！！　あ、ありがとうございますわっ！！！」
line = "「っっ！！！　あ、ありがとうございますわっ！！！」"

[[dialogue]]
speaker = "ラティエ"
# 「私もよく学園長室を無断で抜け出しているからな、似た者同士のよしみだ」
line = "「私もよく学園長室を無断で抜け出しているからな、似た者同士のよしみだ」"

[[dialogue]]
speaker = "ラティエ"
# 「万が一見つかって注意を受けたら、学園長の許可を貰って外出したということにしておけばいい」
line = "「万が一見つかって注意を受けたら、学園長の許可を貰って外出したということにしておけばいい」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「な、なんてお話のわかる学園長様ですの！！！」
line = "「な、なんてお話のわかる学園長様ですの！！！」"

[[dialogue]]
speaker = "unk"
# 最近は息を吸うように寮を抜け出して遊びに出かけているエルゼ。
line = "最近は息を吸うように寮を抜け出して遊びに出かけているエルゼ。"

[[dialogue]]
speaker = "unk"
# その夜遊びを見逃しまくっている俺が言えたことではないが、学園長も大概甘かった。
line = "その夜遊びを見逃しまくっている俺が言えたことではないが、学園長も大概甘かった。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それにしても会長様、近ごろはずっと学園長様と一緒におられるように思いますわ」
line = "「それにしても会長様、近ごろはずっと学園長様と一緒におられるように思いますわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「先日のデートの件は結局、ヘレナ様の差し金だったとお伺いしたのですが……本当にそれだけなのでしょうか？」
line = "「先日のデートの件は結局、ヘレナ様の差し金だったとお伺いしたのですが……本当にそれだけなのでしょうか？」"

[[dialogue]]
speaker = "unk"
# そ、それは……
line = "そ、それは……"

[[dialogue]]
speaker = "ラティエ"
# 「そうか……きみは彼と私の関係を特別なものと疑っているのだな？」
line = "「そうか……きみは彼と私の関係を特別なものと疑っているのだな？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はい、もしかしたら……その……恋人、とか……」
line = "「はい、もしかしたら……その……恋人、とか……」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、残念ながら私たちはそういった特別な関係ではないんだ」
line = "「はっはっは、残念ながら私たちはそういった特別な関係ではないんだ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あら、そうなんですの……？」
line = "「あら、そうなんですの……？」"

[[dialogue]]
speaker = "ラティエ"
# 「だが気持ちを伝えられはしたがね、現在保留中ということになっている」
line = "「だが気持ちを伝えられはしたがね、現在保留中ということになっている」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「本当ですの、会長様っ！？　学園長様に告白されましたの！？」
line = "「本当ですの、会長様っ！？　学園長様に告白されましたの！？」"

[[dialogue]]
speaker = "unk"
# 一応、気持ちは伝えたよ
line = "一応、気持ちは伝えたよ"

[[dialogue]]
speaker = "エルデリーゼ"
# 「まあ！　それは素晴らしいことですわ！」
line = "「まあ！　それは素晴らしいことですわ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ですが、保留中なのですね……それはやはり教師と生徒だから、ということでしょうか？」
line = "「ですが、保留中なのですね……それはやはり教師と生徒だから、ということでしょうか？」"

[[dialogue]]
speaker = "ラティエ"
# 「いいや、そういうことは気にしない。私が求めているのは、隣に並び立てるだけの強さだ」
line = "「いいや、そういうことは気にしない。私が求めているのは、隣に並び立てるだけの強さだ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「強さ……」
line = "「強さ……」"

[[dialogue]]
speaker = "unk"
# 考えてくれるって
line = "考えてくれるって"

[[dialogue]]
speaker = "unk"
# もっと強い男になれたなら
line = "もっと強い男になれたなら"

[[dialogue]]
speaker = "エルデリーゼ"
# 「つまり脈ありということではありませんの！」
line = "「つまり脈ありということではありませんの！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「頑張ってください、会長様！　私、全力で応援させていただきますのよ！　何を隠そう、私、応援は大得意なのですわ！」
line = "「頑張ってください、会長様！　私、全力で応援させていただきますのよ！　何を隠そう、私、応援は大得意なのですわ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「…………あれ、少々お待ちくださいませ？」
line = "「…………あれ、少々お待ちくださいませ？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様は学園長様に見合う強い男にならねばならないのですよね？」
line = "「会長様は学園長様に見合う強い男にならねばならないのですよね？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「なのにどうしてプールでのんびり遊んでいるのです！」
line = "「なのにどうしてプールでのんびり遊んでいるのです！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「たるんでます！　たるみすぎですわ、会長様！　学園長様を射止めたいのであれば、もっと努力するべきです」
line = "「たるんでます！　たるみすぎですわ、会長様！　学園長様を射止めたいのであれば、もっと努力するべきです」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「仕方ありませんわ、私が会長様の鍛錬の相手になってさしあげます！」
line = "「仕方ありませんわ、私が会長様の鍛錬の相手になってさしあげます！」"

[[dialogue]]
speaker = "ラティエ"
# 「いいじゃないか。たまには私以外の相手と戦ってみるのも悪くない」
line = "「いいじゃないか。たまには私以外の相手と戦ってみるのも悪くない」"

[[dialogue]]
speaker = "ラティエ"
# 「私はここで優雅に水と戯れているから、しっかり鍛えてもらいたまえ」
line = "「私はここで優雅に水と戯れているから、しっかり鍛えてもらいたまえ」"

[[dialogue]]
speaker = "unk"
# ちょ、ちょっと待って……
line = "ちょ、ちょっと待って……"

[[dialogue]]
speaker = "エルデリーゼ"
# 「いざ勝負です！！！！」
line = "「いざ勝負です！！！！」"

[[dialogue]]
speaker = "unk"
# プールに遊びに来ただけだったのに。
line = "プールに遊びに来ただけだったのに。"

[[dialogue]]
speaker = "unk"
# こうして何故かエルデリーゼを相手に修行をすることになってしまった。
line = "こうして何故かエルデリーゼを相手に修行をすることになってしまった。"
