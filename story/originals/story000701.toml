[[dialogue]]
speaker = "unk"
# クリスマスパーティーが終わり、年末の最終登校日。
line = "クリスマスパーティーが終わり、年末の最終登校日。"

[[dialogue]]
speaker = "unk"
# 流星学園星徒会書記、１年生の奏ソフィアは教室から出て、流星寮への帰路を急いでいた――
line = "流星学園星徒会書記、１年生の奏ソフィアは教室から出て、流星寮への帰路を急いでいた――"

[[dialogue]]
speaker = "ソフィア"
# 「うー、寒いです……」
line = "「うー、寒いです……」"

[[dialogue]]
speaker = "ソフィア"
# （冬なんて存在しなければいいのに……まぁ、故郷のレゾフに比べればマシですが……）
line = "（冬なんて存在しなければいいのに……まぁ、故郷のレゾフに比べればマシですが……）"

[[dialogue]]
speaker = "？？？"
# 「あっ、いたいた！　ソフィア～♪」
line = "「あっ、いたいた！　ソフィア～♪」"

[[dialogue]]
speaker = "？？？"
# 「置いてくなんて酷いじゃ～ん。気づいたら、いつの間にか教室からいなくなってるし！」
line = "「置いてくなんて酷いじゃ～ん。気づいたら、いつの間にか教室からいなくなってるし！」"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメさん……。同じ寮暮らしなんだから、わざわざ一緒に帰らなくても顔を合わせるでしょう」
line = "「ウズメさん……。同じ寮暮らしなんだから、わざわざ一緒に帰らなくても顔を合わせるでしょう」"

[[dialogue]]
speaker = "ウズメイア"
# 「え～、クラスメイトで友達じゃ～ん！　今年１年頑張りましたってことで、他の子たちも誘って、打ち上げでカラオケ行かない？　カラオケ！」
line = "「え～、クラスメイトで友達じゃ～ん！　今年１年頑張りましたってことで、他の子たちも誘って、打ち上げでカラオケ行かない？　カラオケ！」"

[[dialogue]]
speaker = "ソフィア"
# 「遠慮します。私はそれよりも、早く部屋に戻って、コタツでぬくぬくしたいです」
line = "「遠慮します。私はそれよりも、早く部屋に戻って、コタツでぬくぬくしたいです」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ～、コタツいいよね～♪　１度知ってしまったら、それ無くしては生きられない魔性のアイテム……！　日本伝統文化が生み出した、恐るべき傑作だし♪」
line = "「あ～、コタツいいよね～♪　１度知ってしまったら、それ無くしては生きられない魔性のアイテム……！　日本伝統文化が生み出した、恐るべき傑作だし♪」"

[[dialogue]]
speaker = "ソフィア"
# 「それに関しては全力で同意します。とにかく、お誘いはありがたいですが、私はカラオケよりもコタツでミカンです」
line = "「それに関しては全力で同意します。とにかく、お誘いはありがたいですが、私はカラオケよりもコタツでミカンです」"

[[dialogue]]
speaker = "ウズメイア"
# 「そっか～。じゃあ、あたしも一緒にミカン食べよっかな！　いろいろ美味しい和菓子持ってくね♪」
line = "「そっか～。じゃあ、あたしも一緒にミカン食べよっかな！　いろいろ美味しい和菓子持ってくね♪」"

[[dialogue]]
speaker = "ソフィア"
# 「いや、なんで私の部屋に遊びにくる流れなんですか……ウズメさんの部屋にもコタツありますよね？」
line = "「いや、なんで私の部屋に遊びにくる流れなんですか……ウズメさんの部屋にもコタツありますよね？」"

[[dialogue]]
speaker = "ウズメイア"
# 「だって、ソフィアと打ち上げはやりたいし！　ついでにお正月のスケジュールとかも決めちゃわない？　初詣とか！」
line = "「だって、ソフィアと打ち上げはやりたいし！　ついでにお正月のスケジュールとかも決めちゃわない？　初詣とか！」"

[[dialogue]]
speaker = "ソフィア"
# 「お正月も一緒に遊ぶ気なんですか……」
line = "「お正月も一緒に遊ぶ気なんですか……」"

[[dialogue]]
speaker = "ソフィア"
# 「はぁ、仕方ないですね……いいですよ。ウズメさんは言い出したら、なかなか聞かないですし」
line = "「はぁ、仕方ないですね……いいですよ。ウズメさんは言い出したら、なかなか聞かないですし」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ♪　ソフィア、ありがと～！」
line = "「えへへ♪　ソフィア、ありがと～！」"

[[dialogue]]
speaker = "ウズメイア"
# 「やっぱお正月は、初詣に行かないとね～！　あっ！　そうだ――」
line = "「やっぱお正月は、初詣に行かないとね～！　あっ！　そうだ――」"

[[dialogue]]
speaker = "ウズメイア"
# 「ソフィアはお姉さんとか誘ったりしないの？　新星学園の、サーシャ先輩」
line = "「ソフィアはお姉さんとか誘ったりしないの？　新星学園の、サーシャ先輩」"

[[dialogue]]
speaker = "ソフィア"
# 「いえ、そういうのは特にないですね」
line = "「いえ、そういうのは特にないですね」"

[[dialogue]]
speaker = "ウズメイア"
# 「えっ、でも、姉妹じゃん？　ソフィアも人間界に来て、せっかく近くにいられるようになったんだし、それくらい――」
line = "「えっ、でも、姉妹じゃん？　ソフィアも人間界に来て、せっかく近くにいられるようになったんだし、それくらい――」"

[[dialogue]]
speaker = "ソフィア"
# 「前も言いましたけど」
line = "「前も言いましたけど」"

[[dialogue]]
speaker = "ソフィア"
# 「私と姉さんの仲は、そんなホットじゃないです。それに――」
line = "「私と姉さんの仲は、そんなホットじゃないです。それに――」"

[[dialogue]]
speaker = "ソフィア"
# 「今はもう、子供じゃないので。必要以上にベタベタしたりする気はありません」
line = "「今はもう、子供じゃないので。必要以上にベタベタしたりする気はありません」"

[[dialogue]]
speaker = "ウズメイア"
# 「う～ん、そっか～」
line = "「う～ん、そっか～」"

[[dialogue]]
speaker = "ソフィア"
# 「って、こんな外で立ち話していたら、ますます体が冷えますよ。早く帰りましょう」
line = "「って、こんな外で立ち話していたら、ますます体が冷えますよ。早く帰りましょう」"

[[dialogue]]
speaker = "unk"
# ソフィアは足早に、流星寮へと歩いていく。
line = "ソフィアは足早に、流星寮へと歩いていく。"

[[dialogue]]
speaker = "ウズメイア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# その背中を、ウズメイアは少し考えるように見つめるのだった――
line = "その背中を、ウズメイアは少し考えるように見つめるのだった――"

[[dialogue]]
speaker = "unk"
# 一方その頃。……こちらも今日が登校最終日の、新星学園星徒会室。
line = "一方その頃。……こちらも今日が登校最終日の、新星学園星徒会室。"

[[dialogue]]
speaker = "ヴィーナス"
# 「――できた！　私、ついにやったわ……！」
line = "「――できた！　私、ついにやったわ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「見なさい、クロト！　とうとう私――」
line = "「見なさい、クロト！　とうとう私――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「書類を１枚仕上げたのよ！　すごいでしょ！」
line = "「書類を１枚仕上げたのよ！　すごいでしょ！」"

[[dialogue]]
speaker = "unk"
# えっ！？　本当に！？
line = "えっ！？　本当に！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「本当よ！　ほらほら！」
line = "「本当よ！　ほらほら！」"

[[dialogue]]
speaker = "unk"
# そう言って渡された書類を確認すると、必要事項が間違いなく書き込まれている。
line = "そう言って渡された書類を確認すると、必要事項が間違いなく書き込まれている。"

[[dialogue]]
speaker = "ヴィーナス"
# 「――天気がいいのに、雨でも降るんじゃないかって？　もうっ、褒めてくれたっていいじゃない！」
line = "「――天気がいいのに、雨でも降るんじゃないかって？　もうっ、褒めてくれたっていいじゃない！」"

[[dialogue]]
speaker = "unk"
# （ヴィーナスの頭を撫でて褒める）
line = "（ヴィーナスの頭を撫でて褒める）"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ……♪　えっへへ～♪」
line = "「あっ……♪　えっへへ～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これでも私、クロトが大変そうにしてるのを見て、手伝えるようになろうって頑張ったんだから」
line = "「これでも私、クロトが大変そうにしてるのを見て、手伝えるようになろうって頑張ったんだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今はたかが１枚かもしれないけど、私にとっては大きな１歩よ！」
line = "「今はたかが１枚かもしれないけど、私にとっては大きな１歩よ！」"

[[dialogue]]
speaker = "unk"
# と、その時、星徒会室の扉を叩く音がした。
line = "と、その時、星徒会室の扉を叩く音がした。"

[[dialogue]]
speaker = "ウズメイア"
# 「こんにちは～。今、失礼しても大丈夫ですか？」
line = "「こんにちは～。今、失礼しても大丈夫ですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、ウズメじゃない！」
line = "「あら、ウズメじゃない！」"

[[dialogue]]
speaker = "ウズメイア"
# 「ヴィーナス先輩、こんにちは～♪　それに会長さん、はじめまして！　会長さんのことは、ソフィアからよく聞いてますっ」
line = "「ヴィーナス先輩、こんにちは～♪　それに会長さん、はじめまして！　会長さんのことは、ソフィアからよく聞いてますっ」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたし、ソフィアのクラスメイトで、流星学園１年生の、<ruby=あめの>雨野</ruby>ウズメイアって言います！」
line = "「あたし、ソフィアのクラスメイトで、流星学園１年生の、<ruby>雨野<rt>あめの</rt></ruby>ウズメイアって言います！」"

[[dialogue]]
speaker = "ウズメイア"
# 「それで今日は、新星星徒会の方にお願いしたいことがあって、来たんですけど……」
line = "「それで今日は、新星星徒会の方にお願いしたいことがあって、来たんですけど……」"

[[dialogue]]
speaker = "unk"
# お願いしたいこと？
line = "お願いしたいこと？"

[[dialogue]]
speaker = "ウズメイア"
# 「はい。実はあたし――」
line = "「はい。実はあたし――」"

[[dialogue]]
speaker = "ウズメイア"
# 「ソフィアとサーシャ先輩が、姉妹一緒に初詣へ行けるようにしたいんです！」
line = "「ソフィアとサーシャ先輩が、姉妹一緒に初詣へ行けるようにしたいんです！」"

[[dialogue]]
speaker = "unk"
# こうして俺たちは、<ruby=かなで>奏</ruby>姉妹を巡るお正月を迎えることになるのだった――
line = "こうして俺たちは、<ruby>奏<rt>かなで</rt></ruby>姉妹を巡るお正月を迎えることになるのだった――"
