[[dialogue]]
speaker = "unk"
# お互い全力を出し切っての激闘を繰り広げる俺とクーシェン――
line = "お互い全力を出し切っての激闘を繰り広げる俺とクーシェン――"

[[dialogue]]
speaker = "クーシェン"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "unk"
# やがて、先に片膝を着いた俺は――彼女を見上げる。
line = "やがて、先に片膝を着いた俺は――彼女を見上げる。"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキ♪　強かったよ、魔王様……。ボクの――」
line = "「ウキキ♪　強かったよ、魔王様……。ボクの――」"

[[dialogue]]
speaker = "クーシェン"
# 「負けだ……」
line = "「負けだ……」"

[[dialogue]]
speaker = "unk"
# クーシェンが仰向けに倒れ、その手から如意棒が離れて、地面に転がる。
line = "クーシェンが仰向けに倒れ、その手から如意棒が離れて、地面に転がる。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『試合終了ーーーっ！！！　勝者、新星学園星徒会長・緋宮クロト～～～っ！！！』
line = "『試合終了ーーーっ！！！　勝者、新星学園星徒会長・緋宮クロト～～～っ！！！』"

[[dialogue]]
speaker = "unk"
# 紅明がマイクで宣言する。
line = "紅明がマイクで宣言する。"

[[dialogue]]
speaker = "unk"
# 俺は立ち上がると、クーシェンに歩み寄り、彼女の体を支えて起き上がらせた。
line = "俺は立ち上がると、クーシェンに歩み寄り、彼女の体を支えて起き上がらせた。"

[[dialogue]]
speaker = "クーシェン"
# 「ん……ありがと♪」
line = "「ん……ありがと♪」"

[[dialogue]]
speaker = "クーシェン"
# 「よいしょっと……。はぁ～♪　本当に強かった～！」
line = "「よいしょっと……。はぁ～♪　本当に強かった～！」"

[[dialogue]]
speaker = "クーシェン"
# 「まさか……金斗雲の速さを見切れないのを、カウンターで対抗してくるとは思わなかったよ」
line = "「まさか……金斗雲の速さを見切れないのを、カウンターで対抗してくるとは思わなかったよ」"

[[dialogue]]
speaker = "unk"
# そう、俺は結局、金斗雲の動きを終始見切れなかった。だから、攻撃は全て避けずに、くらい続けることにしたのだ。
line = "そう、俺は結局、金斗雲の動きを終始見切れなかった。だから、攻撃は全て避けずに、くらい続けることにしたのだ。"

[[dialogue]]
speaker = "unk"
# そして、攻撃をして来る瞬間、必ず生まれる隙を突いて、捨て身の反撃で分身を１体１体倒して行くことにした。
line = "そして、攻撃をして来る瞬間、必ず生まれる隙を突いて、捨て身の反撃で分身を１体１体倒して行くことにした。"

[[dialogue]]
speaker = "クーシェン"
# 「……何か特殊な力を使ったわけじゃない。でも、何度攻撃を受けても立ち上がって、ボクの分身を全滅させるまで戦い続けた」
line = "「……何か特殊な力を使ったわけじゃない。でも、何度攻撃を受けても立ち上がって、ボクの分身を全滅させるまで戦い続けた」"

[[dialogue]]
speaker = "クーシェン"
# 「それは地道に鍛え続けて身に付けた力と、リクリエとの戦いを潜り抜けた経験による、<b>決して諦めない心</b>があってこそできた戦い方だ」
line = "「それは地道に鍛え続けて身に付けた力と、リクリエとの戦いを潜り抜けた経験による、<b>決して諦めない心</b>があってこそできた戦い方だ」"

[[dialogue]]
speaker = "クーシェン"
# 「それが魔王の持つ、本当の強さ。……だから、認めるよ。ボクの負けだ」
line = "「それが魔王の持つ、本当の強さ。……だから、認めるよ。ボクの負けだ」"

[[dialogue]]
speaker = "クーシェン"
# 「それで……あのさ。お願いがあるんだけど……」
line = "「それで……あのさ。お願いがあるんだけど……」"

[[dialogue]]
speaker = "unk"
# 俺がなんだろうと首を傾げると──
line = "俺がなんだろうと首を傾げると──"

[[dialogue]]
speaker = "クーシェン"
# 「魔王のこと――これからは『にーにー』って呼んでもいい？」
line = "「魔王のこと――これからは『にーにー』って呼んでもいい？」"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "クーシェン"
# 「聞いたんだけど……魔王、下級生の子から『お兄ちゃん』って呼ばれてたりするんでしょ？」
line = "「聞いたんだけど……魔王、下級生の子から『お兄ちゃん』って呼ばれてたりするんでしょ？」"

[[dialogue]]
speaker = "クーシェン"
# 「それにボクを負かしちゃうくらい、すごく強かったし。だからボクも……ダメかな？」
line = "「それにボクを負かしちゃうくらい、すごく強かったし。だからボクも……ダメかな？」"

[[dialogue]]
speaker = "unk"
# ちょっと驚きはしたが……下級生の子たちから兄のように呼ばれるのは、今更ではあるし、決して嫌ではない。
line = "ちょっと驚きはしたが……下級生の子たちから兄のように呼ばれるのは、今更ではあるし、決して嫌ではない。"

[[dialogue]]
speaker = "unk"
# いいよ。クーシェンがそう呼びたいのなら
line = "いいよ。クーシェンがそう呼びたいのなら"

[[dialogue]]
speaker = "クーシェン"
# 「本当？　えへへっ♪　じゃあ、これから遠慮なく、妹みたいに振舞っちゃうからね！」
line = "「本当？　えへへっ♪　じゃあ、これから遠慮なく、妹みたいに振舞っちゃうからね！」"

[[dialogue]]
speaker = "クーシェン"
# 「改めて、よろしくね♪　にーにー♪」
line = "「改めて、よろしくね♪　にーにー♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ダーリン、お疲れ様～♪」
line = "「ダーリン、お疲れ様～♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「いや～、クーちんと仲良くなれたみたいでよかったよかった☆」
line = "「いや～、クーちんと仲良くなれたみたいでよかったよかった☆」"

[[dialogue]]
speaker = "unk"
# 屈託のない元気な笑顔で言う彼女に、俺はやれやれと思いながら……
line = "屈託のない元気な笑顔で言う彼女に、俺はやれやれと思いながら……"

[[dialogue]]
speaker = "unk"
# もし俺が負けてたら、どうするつもりだったんだ？
line = "もし俺が負けてたら、どうするつもりだったんだ？"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「え？　ダーリンなら１００％勝つっしょ☆　だって、ダーリンだしね♪」
line = "「え？　ダーリンなら１００％勝つっしょ☆　だって、ダーリンだしね♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「――危うく負けるくらい、ボロボロだったって？　ふふっ♪　ダーリン……」
line = "「――危うく負けるくらい、ボロボロだったって？　ふふっ♪　ダーリン……」"

[[dialogue]]
speaker = "unk"
# 彼女は俺の耳元まで顔を近づけると──
line = "彼女は俺の耳元まで顔を近づけると──"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「すごくカッコよかったよ<emoji=heart04>　アタシ、惚れ直しちった<emoji=heart04>」
line = "「すごくカッコよかったよ<emoji=heart04>　アタシ、惚れ直しちった<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 他の人には聞こえないくらいの声でそんなことを言うので、ドキッとしてしまう。
line = "他の人には聞こえないくらいの声でそんなことを言うので、ドキッとしてしまう。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「それに、クーちんのこともみんなにバッチリ紹介できたし☆　結果オーライってことで♪」
line = "「それに、クーちんのこともみんなにバッチリ紹介できたし☆　結果オーライってことで♪」"

[[dialogue]]
speaker = "女生徒Ａ"
# 「クーちん、強かったよ～！」
line = "「クーちん、強かったよ～！」"

[[dialogue]]
speaker = "附属生Ｂ"
# 「これからよろしくね～！」
line = "「これからよろしくね～！」"

[[dialogue]]
speaker = "クーシェン"
# 「……！　え、えへへっ♪」
line = "「……！　え、えへへっ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「みんな、ありがと～！　こちらこそ、よろしく～♪」
line = "「みんな、ありがと～！　こちらこそ、よろしく～♪」"

[[dialogue]]
speaker = "unk"
# これが１番の目的だったんだな
line = "これが１番の目的だったんだな"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「ん？　ふふっ、まぁね～♪」
line = "「ん？　ふふっ、まぁね～♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「もしクーちんの性格が悟空と同じなら……普段は素直じゃないところがあると思ったんだ」
line = "「もしクーちんの性格が悟空と同じなら……普段は素直じゃないところがあると思ったんだ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「だけど悟空、戦いの時はすごく素直になる奴だからさ♪　それをみんなに見せたら、変な誤解とかなくわかってもらえるっしょ？　うしし☆」
line = "「だけど悟空、戦いの時はすごく素直になる奴だからさ♪　それをみんなに見せたら、変な誤解とかなくわかってもらえるっしょ？　うしし☆」"

[[dialogue]]
speaker = "unk"
# そこまで言うと、紅明は再びマイクを持って、呼びかける。
line = "そこまで言うと、紅明は再びマイクを持って、呼びかける。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『――さてと。クーち～ん！　この後はどうする？』
line = "『――さてと。クーち～ん！　この後はどうする？』"

[[dialogue]]
speaker = "クーシェン"
# 「この後……？　あっ！　もしかして、紅明とバトル！？　もちろん、やるやる～！」
line = "「この後……？　あっ！　もしかして、紅明とバトル！？　もちろん、やるやる～！」"

[[dialogue]]
speaker = "unk"
# えっ！？　クーシェン、まだ戦えるのか！？
line = "えっ！？　クーシェン、まだ戦えるのか！？"

[[dialogue]]
speaker = "クーシェン"
# 「うん！　ボク、体力には自信あるからね♪　少し休んだし、もう行けるよ！」
line = "「うん！　ボク、体力には自信あるからね♪　少し休んだし、もう行けるよ！」"

[[dialogue]]
speaker = "クーシェン"
# 「それに、連戦で限界を迎えた時にこそ、自分の中の新たな強さが見えてくるものだからね！」
line = "「それに、連戦で限界を迎えた時にこそ、自分の中の新たな強さが見えてくるものだからね！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『うしし♪　そう言うと思ってたっしょ☆』
line = "『うしし♪　そう言うと思ってたっしょ☆』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『んじゃまぁ、アタシも久しぶりに全力出しちゃいますか！』
line = "『んじゃまぁ、アタシも久しぶりに全力出しちゃいますか！』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『というわけで、会場のみんな～！　ここからは延長戦！　アタシがクーちんと戦っちゃうぜ～☆』
line = "『というわけで、会場のみんな～！　ここからは延長戦！　アタシがクーちんと戦っちゃうぜ～☆』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『実はアタシのこの衣装、つい先日に覚醒したばかりの新フォームなんだ！　今日はその力を披露しちゃうぜ～！』
line = "『実はアタシのこの衣装、つい先日に覚醒したばかりの新フォームなんだ！　今日はその力を披露しちゃうぜ～！』"

[[dialogue]]
speaker = "unk"
# 楽しそうに全力でぶつかり合う紅明とクーシェン。……再び大盛り上がりする会場。
line = "楽しそうに全力でぶつかり合う紅明とクーシェン。……再び大盛り上がりする会場。"

[[dialogue]]
speaker = "unk"
# そんな雰囲気に押されてか、俺もだんだん楽しくなって来てしまって。
line = "そんな雰囲気に押されてか、俺もだんだん楽しくなって来てしまって。"

[[dialogue]]
speaker = "unk"
# 最終的には、ノリノリで試合を実況してしまうのだった――
line = "最終的には、ノリノリで試合を実況してしまうのだった――"
