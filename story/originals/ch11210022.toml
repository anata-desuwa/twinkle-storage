[[dialogue]]
speaker = "unk"
# 第２話,大きすぎる枕,P
line = "第２話,大きすぎる枕,P"

[[dialogue]]
speaker = "unk"
# 今日はレイラと買い物だ。探しているものがあるそうで、相談に乗ってほしいと言われた。
line = "今日はレイラと買い物だ。探しているものがあるそうで、相談に乗ってほしいと言われた。"

[[dialogue]]
speaker = "レイラ"
# 「お待たせしました、魔王さん」
line = "「お待たせしました、魔王さん」"

[[dialogue]]
speaker = "unk"
# ううん、俺も今来たところ
line = "ううん、俺も今来たところ"

[[dialogue]]
speaker = "レイラ"
# 「前にもこんなことありましたね。デートみたい……いえ、今日は本当にデートなんですよね」
line = "「前にもこんなことありましたね。デートみたい……いえ、今日は本当にデートなんですよね」"

[[dialogue]]
speaker = "レイラ"
# 「エスコート、お願いしますね」
line = "「エスコート、お願いしますね」"

[[dialogue]]
speaker = "unk"
# レイラが差し出した手を握る。温かい、恋人の手だ。
line = "レイラが差し出した手を握る。温かい、恋人の手だ。"

[[dialogue]]
speaker = "レイラ"
# 「今日はですね、ぜひ魔王さんに一緒に選んでほしいものがあるんです」
line = "「今日はですね、ぜひ魔王さんに一緒に選んでほしいものがあるんです」"

[[dialogue]]
speaker = "レイラ"
# 「それはずばり──枕です」
line = "「それはずばり──枕です」"

[[dialogue]]
speaker = "unk"
# ……え、枕？
line = "……え、枕？"

[[dialogue]]
speaker = "レイラ"
# 「はい。というのもですね、ちょっと前にアドバイスをいただきまして……」
line = "「はい。というのもですね、ちょっと前にアドバイスをいただきまして……」"

[[dialogue]]
speaker = "レイラ"
# 「リーリアさん、お疲れ様です」
line = "「リーリアさん、お疲れ様です」"

[[dialogue]]
speaker = "リーリア"
# 「お疲れ様です。レイラ……さん」
line = "「お疲れ様です。レイラ……さん」"

[[dialogue]]
speaker = "レイラ"
# 「レイラで結構ですよ。一応、私の方が年上ですけど、組織ではリーリアさんが先輩ですから」
line = "「レイラで結構ですよ。一応、私の方が年上ですけど、組織ではリーリアさんが先輩ですから」"

[[dialogue]]
speaker = "リーリア"
# 「まぁそれはそうなんですけど……今日はどうしました？　私たち、あんまり話したことないですよね？」
line = "「まぁそれはそうなんですけど……今日はどうしました？　私たち、あんまり話したことないですよね？」"

[[dialogue]]
speaker = "レイラ"
# 「実は以前から、リーリアさんにお聞きしたいことがありまして……肩凝りについてなんですが」
line = "「実は以前から、リーリアさんにお聞きしたいことがありまして……肩凝りについてなんですが」"

[[dialogue]]
speaker = "リーリア"
# 「は？　肩凝り？」
line = "「は？　肩凝り？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「おやおや？　珍しい組み合わせだね～。何の話？」
line = "「おやおや？　珍しい組み合わせだね～。何の話？」"

[[dialogue]]
speaker = "リーリア"
# 「いえ、私にも何がなんだか……肩凝りについてらしいんですが」
line = "「いえ、私にも何がなんだか……肩凝りについてらしいんですが」"

[[dialogue]]
speaker = "レイラ"
# 「そう、人類の永遠の課題──肩凝りです。私、胸が大きいし、パソコン仕事ばかりなので、肩凝りに悩まされているんです」
line = "「そう、人類の永遠の課題──肩凝りです。私、胸が大きいし、パソコン仕事ばかりなので、肩凝りに悩まされているんです」"

[[dialogue]]
speaker = "レイラ"
# 「リーリアさん、スタイル抜群じゃないですか。だから肩凝り対策してるのかなと思ってお声掛けした次第です」
line = "「リーリアさん、スタイル抜群じゃないですか。だから肩凝り対策してるのかなと思ってお声掛けした次第です」"

[[dialogue]]
speaker = "リーリア"
# 「…………えっと～」
line = "「…………えっと～」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ぷっ、あはははははは！　そっか、リーリアもおっぱい仲間だと思って声かけたんだー！」
line = "「ぷっ、あはははははは！　そっか、リーリアもおっぱい仲間だと思って声かけたんだー！」"

[[dialogue]]
speaker = "リーリア"
# 「ちょ、笑わなくてもいいじゃないですか！」
line = "「ちょ、笑わなくてもいいじゃないですか！」"

[[dialogue]]
speaker = "レイラ"
# 「え？　え？」
line = "「え？　え？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「何を隠そう、リーリアは<ruby=パッド>偽乳</ruby>なんだよ！　スパイとして学園に通い出してから急におっぱいおっきくなってさ。種も仕掛けもあったというわけ」
line = "「何を隠そう、リーリアは<ruby>偽乳<rt>パッド</rt></ruby>なんだよ！　スパイとして学園に通い出してから急におっぱいおっきくなってさ。種も仕掛けもあったというわけ」"

[[dialogue]]
speaker = "リーリア"
# 「それは隠してー！？」
line = "「それは隠してー！？」"

[[dialogue]]
speaker = "レイラ"
# 「パ、パッド！？　じゃあリーリアさんは自ら重荷を？　修行ですか？　外したら素早く動けたりするんですか！？」
line = "「パ、パッド！？　じゃあリーリアさんは自ら重荷を？　修行ですか？　外したら素早く動けたりするんですか！？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「あはははははは！　あーもうおなか痛ーい！」
line = "「あはははははは！　あーもうおなか痛ーい！」"

[[dialogue]]
speaker = "リーリア"
# 「もうやだこの職場ー！」
line = "「もうやだこの職場ー！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「でも、レイラにはアタシのでんまちゃんを貸してあるよね？　それでも肩凝り治らないんだ？」
line = "「でも、レイラにはアタシのでんまちゃんを貸してあるよね？　それでも肩凝り治らないんだ？」"

[[dialogue]]
speaker = "レイラ"
# 「一時的にはよくなるんですけど、すぐまた凝っちゃうんです。特に寝起きなんかは肩も首もバキバキで」
line = "「一時的にはよくなるんですけど、すぐまた凝っちゃうんです。特に寝起きなんかは肩も首もバキバキで」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「寝起きかぁ。じゃあ、それは肩凝りっていうより、寝具が合ってないんじゃないかな？」
line = "「寝起きかぁ。じゃあ、それは肩凝りっていうより、寝具が合ってないんじゃないかな？」"

[[dialogue]]
speaker = "レイラ"
# 「寝具……ですか？」
line = "「寝具……ですか？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「うん、特に枕かな。枕が合ってないと肩にも首にも負担をかけるし、何より疲れもとれないからね」
line = "「うん、特に枕かな。枕が合ってないと肩にも首にも負担をかけるし、何より疲れもとれないからね」"

[[dialogue]]
speaker = "レイラ"
# 「さすがツェツィーリエさん。勉強になります」
line = "「さすがツェツィーリエさん。勉強になります」"

[[dialogue]]
speaker = "リーリア"
# 「この話、私必要でした？　必要なかったですよねー！？」
line = "「この話、私必要でした？　必要なかったですよねー！？」"

[[dialogue]]
speaker = "レイラ"
# 「というわけなんです。魔王さんはアルバイト経験が豊富ですから、その知見をお貸しください」
line = "「というわけなんです。魔王さんはアルバイト経験が豊富ですから、その知見をお貸しください」"

[[dialogue]]
speaker = "unk"
# それくらいお安い御用だよ
line = "それくらいお安い御用だよ"

[[dialogue]]
speaker = "レイラ"
# 「ありがとうございますっ」
line = "「ありがとうございますっ」"

[[dialogue]]
speaker = "unk"
# 俺が以前バイトしていた寝具店で、レイラの枕を見繕う。棚には見本がずらりと並んでいた。
line = "俺が以前バイトしていた寝具店で、レイラの枕を見繕う。棚には見本がずらりと並んでいた。"

[[dialogue]]
speaker = "レイラ"
# 「枕だけでもこんなに種類があるんですね……このブロックみたいなのも枕なんですか？　……なるほど、中身を組み替えて高さを調整できるんですね」
line = "「枕だけでもこんなに種類があるんですね……このブロックみたいなのも枕なんですか？　……なるほど、中身を組み替えて高さを調整できるんですね」"

[[dialogue]]
speaker = "レイラ"
# 「こっちはひんやり素材で夏にぴったり、こっちはしっとりふわふわ……う～ん、ギガンドム。永遠に触っていたい感触」
line = "「こっちはひんやり素材で夏にぴったり、こっちはしっとりふわふわ……う～ん、ギガンドム。永遠に触っていたい感触」"

[[dialogue]]
speaker = "レイラ"
# 「たくさんありすぎて選べませんね。魔王さんのオヌヌメはどちらですか？」
line = "「たくさんありすぎて選べませんね。魔王さんのオヌヌメはどちらですか？」"

[[dialogue]]
speaker = "レイラ"
# 「え、これは……この枕、大きすぎませんか？　横幅がベッドと同じくらいありますよ」
line = "「え、これは……この枕、大きすぎませんか？　横幅がベッドと同じくらいありますよ」"

[[dialogue]]
speaker = "レイラ"
# 「……いくら寝返りをうっても大丈夫？　しかも低反発で肩や首もしっかり支えてくれる……それは確かに魅力的です。実際に試すこともできるみたいですね」
line = "「……いくら寝返りをうっても大丈夫？　しかも低反発で肩や首もしっかり支えてくれる……それは確かに魅力的です。実際に試すこともできるみたいですね」"

[[dialogue]]
speaker = "unk"
# レイラがお試し用のベッドに寝転がる。
line = "レイラがお試し用のベッドに寝転がる。"

[[dialogue]]
speaker = "レイラ"
# 「これは……っ！」
line = "「これは……っ！」"

[[dialogue]]
speaker = "レイラ"
# 「頭が軽い……首が重力から解放されていく……なんという、なんという枕でしょう……」
line = "「頭が軽い……首が重力から解放されていく……なんという、なんという枕でしょう……」"

[[dialogue]]
speaker = "レイラ"
# 「こんなにすごい枕は体験したことがありません。でも、懐かしい感覚……まるでお母様の腕に抱かれているような……」
line = "「こんなにすごい枕は体験したことがありません。でも、懐かしい感覚……まるでお母様の腕に抱かれているような……」"

[[dialogue]]
speaker = "レイラ"
# 「この枕に比べたら、今使っている枕は……あえて言いましょう、カスであると！」
line = "「この枕に比べたら、今使っている枕は……あえて言いましょう、カスであると！」"

[[dialogue]]
speaker = "unk"
# そこまで言わなくても、とも思ったが、それだけこの枕を気に入ったんだろう。
line = "そこまで言わなくても、とも思ったが、それだけこの枕を気に入ったんだろう。"

[[dialogue]]
speaker = "レイラ"
# 「素晴らしい枕です。……でも、お高いんでしょう？」
line = "「素晴らしい枕です。……でも、お高いんでしょう？」"

[[dialogue]]
speaker = "レイラ"
# 「……ふむふむ。それだけあればハンバーガーが５０個買えますね。う～ん、その価値はあると思いますが、非常に悩みます……」
line = "「……ふむふむ。それだけあればハンバーガーが５０個買えますね。う～ん、その価値はあると思いますが、非常に悩みます……」"

[[dialogue]]
speaker = "unk"
# プレゼントしようか？
line = "プレゼントしようか？"

[[dialogue]]
speaker = "レイラ"
# 「ダメです。魔王さんは学生なんですから、そういうお金の使い方はいけません。ハンバーガーを奢るのとは額が違います」
line = "「ダメです。魔王さんは学生なんですから、そういうお金の使い方はいけません。ハンバーガーを奢るのとは額が違います」"

[[dialogue]]
speaker = "レイラ"
# 「決めました。買います。すみません、店員さん。これください！」
line = "「決めました。買います。すみません、店員さん。これください！」"

[[dialogue]]
speaker = "レイラ"
# 「え、デッカ！？」
line = "「え、デッカ！？」"

[[dialogue]]
speaker = "unk"
# 圧縮されて箱に収納されているはずだが、大きすぎる枕はそれでも大きい。
line = "圧縮されて箱に収納されているはずだが、大きすぎる枕はそれでも大きい。"

[[dialogue]]
speaker = "レイラ"
# 「この枕、やっぱり大きすぎませんか……？」
line = "「この枕、やっぱり大きすぎませんか……？」"

[[dialogue]]
speaker = "unk"
# 大荷物を抱えてデートというわけにもいかず、この日は解散したのだった。
line = "大荷物を抱えてデートというわけにもいかず、この日は解散したのだった。"
