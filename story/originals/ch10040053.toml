[[dialogue]]
speaker = "unk"
# 第３話,謎の芸術家・アポロシー出没！,P
line = "第３話,謎の芸術家・アポロシー出没！,P"

[[dialogue]]
speaker = "unk"
# 黒ベア子の出現からしばらく──
line = "黒ベア子の出現からしばらく──"

[[dialogue]]
speaker = "unk"
# アポロは未だ、フレイムフォームから元に戻れないままでいた。
line = "アポロは未だ、フレイムフォームから元に戻れないままでいた。"

[[dialogue]]
speaker = "アポロ"
# 「ぐむむ……ぐぬぬ……むぅ……どうしたもんか……むぅ……ああして……いや……うぅん……だが…………」
line = "「ぐむむ……ぐぬぬ……むぅ……どうしたもんか……むぅ……ああして……いや……うぅん……だが…………」"

[[dialogue]]
speaker = "アポロ"
# 「ああいや、つらいとか苦しいとかじゃないんだ。体は大丈夫だ」
line = "「ああいや、つらいとか苦しいとかじゃないんだ。体は大丈夫だ」"

[[dialogue]]
speaker = "アポロ"
# 「ただ……この格好でいると、どうにもインスピレーションが湧き上がるのを抑えられないんだ」
line = "「ただ……この格好でいると、どうにもインスピレーションが湧き上がるのを抑えられないんだ」"

[[dialogue]]
speaker = "アポロ"
# 「この……心の奥底から燃え上がる創作意欲！　今のあたしは──筆を取らずにはいられないっ！」
line = "「この……心の奥底から燃え上がる創作意欲！　今のあたしは──筆を取らずにはいられないっ！」"

[[dialogue]]
speaker = "アポロ"
# 「く……あぁっ！　もうダメだ、あたしはあたしの表現をするぞ魔王──！」
line = "「く……あぁっ！　もうダメだ、あたしはあたしの表現をするぞ魔王──！」"

[[dialogue]]
speaker = "アポロ"
# 「ここを──こうして──こうで──最後にインクを──よし、仕上げだ！」
line = "「ここを──こうして──こうで──最後にインクを──よし、仕上げだ！」"

[[dialogue]]
speaker = "アポロ"
# 「ふぅ、一丁あがりっと……！　見ろ、これがあたし作の芸術作品──『バルーンで遊ぶヒーロー』だ！」
line = "「ふぅ、一丁あがりっと……！　見ろ、これがあたし作の芸術作品──『バルーンで遊ぶヒーロー』だ！」"

[[dialogue]]
speaker = "unk"
# 壁に絵を描いちゃダメだって！
line = "壁に絵を描いちゃダメだって！"

[[dialogue]]
speaker = "アポロ"
# 「それについちゃ済まない。あふれるインスピレーションを抑えきれなかった」
line = "「それについちゃ済まない。あふれるインスピレーションを抑えきれなかった」"

[[dialogue]]
speaker = "アポロ"
# 「──だが！　真の芸術にキャンバスなんて関係ない。あたしの筆が舞った場所、そこがキャンバスだ！」
line = "「──だが！　真の芸術にキャンバスなんて関係ない。あたしの筆が舞った場所、そこがキャンバスだ！」"

[[dialogue]]
speaker = "アポロ"
# 「ほら、学園長も言ってただろ。あたしの新しい<ruby=ほむら>焔</ruby>に身を任せろって」
line = "「ほら、学園長も言ってただろ。あたしの新しい<ruby>焔<rt>ほむら</rt></ruby>に身を任せろって」"

[[dialogue]]
speaker = "unk"
# 確かに……
line = "確かに……"

[[dialogue]]
speaker = "unk"
# 余計なことを……
line = "余計なことを……"

[[dialogue]]
speaker = "アポロ"
# 「うーん、まさにアートだ……我ながら惚れ惚れする出来栄えだぜ。むむ……ますます創作意欲が湧いてきたぞ！」
line = "「うーん、まさにアートだ……我ながら惚れ惚れする出来栄えだぜ。むむ……ますます創作意欲が湧いてきたぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「こうしちゃいられない。さっそく次の作品に取りかからないとな！」
line = "「こうしちゃいられない。さっそく次の作品に取りかからないとな！」"

[[dialogue]]
speaker = "アポロ"
# 「ここの壁──いい感じだ！　よっ、よっ、よいっと──ペイント完了だ！」
line = "「ここの壁──いい感じだ！　よっ、よっ、よいっと──ペイント完了だ！」"

[[dialogue]]
speaker = "アポロ"
# 「この黒板にもチョチョイのチョイっと……うんうん。納得の出来栄えだぜ」
line = "「この黒板にもチョチョイのチョイっと……うんうん。納得の出来栄えだぜ」"

[[dialogue]]
speaker = "アポロ"
# 「むむっ……ビビッときたぞ！　こっちの壁にも──こう──こうっと──へへ……」
line = "「むむっ……ビビッときたぞ！　こっちの壁にも──こう──こうっと──へへ……」"

[[dialogue]]
speaker = "アポロ"
# 「……落書き？　違う、何度も言わせるな──これは芸術だ！」
line = "「……落書き？　違う、何度も言わせるな──これは芸術だ！」"

[[dialogue]]
speaker = "unk"
# これは猫？
line = "これは猫？"

[[dialogue]]
speaker = "unk"
# これは狐？
line = "これは狐？"

[[dialogue]]
speaker = "アポロ"
# 「違う、タヌキだ！　見ろ、このずんぐりむっくりしたフォルムを」
line = "「違う、タヌキだ！　見ろ、このずんぐりむっくりしたフォルムを」"

[[dialogue]]
speaker = "アポロ"
# 「どうだ魔王？　オマエに絵心があるかどうかはわからんが、ビビッとくるものがあるんじゃないか？」
line = "「どうだ魔王？　オマエに絵心があるかどうかはわからんが、ビビッとくるものがあるんじゃないか？」"

[[dialogue]]
speaker = "unk"
# 確かに……
line = "確かに……"

[[dialogue]]
speaker = "unk"
# 個性的な絵だね
line = "個性的な絵だね"

[[dialogue]]
speaker = "アポロ"
# 「ふふん、そうだろうそうだろう。なかなか見る目があるな」
line = "「ふふん、そうだろうそうだろう。なかなか見る目があるな」"

[[dialogue]]
speaker = "アポロ"
# 「ストリートアートってやつだ。あたしのあふれるインスピレーションそのままに、学園を藝術の園に変えてやるのさ！」
line = "「ストリートアートってやつだ。あたしのあふれるインスピレーションそのままに、学園を藝術の園に変えてやるのさ！」"

[[dialogue]]
speaker = "アポロ"
# 「さすがに街でやるとメーワクだからな。学園の中ならまあなんとかなるだろ！」
line = "「さすがに街でやるとメーワクだからな。学園の中ならまあなんとかなるだろ！」"

[[dialogue]]
speaker = "アポロ"
# 「学園でも迷惑だって？　そんなことはない。むしろ美術の参考が増えて、感謝されるんじゃないか？」
line = "「学園でも迷惑だって？　そんなことはない。むしろ美術の参考が増えて、感謝されるんじゃないか？」"

[[dialogue]]
speaker = "アポロ"
# 「ふふふっ──でもってここにサインをしておくのさ。謎めいたアポロシーのサインをな」
line = "「ふふふっ──でもってここにサインをしておくのさ。謎めいたアポロシーのサインをな」"

[[dialogue]]
speaker = "unk"
# それっぽくなったけど……
line = "それっぽくなったけど……"

[[dialogue]]
speaker = "unk"
# サインが子どもっぽすぎない？
line = "サインが子どもっぽすぎない？"

[[dialogue]]
speaker = "アポロ"
# 「このミステリアスさが鍵なんだ！　いいか、人は素性不明のアーティストに惹かれるものなんだ」
line = "「このミステリアスさが鍵なんだ！　いいか、人は素性不明のアーティストに惹かれるものなんだ」"

[[dialogue]]
speaker = "アポロ"
# 「学園のどこかにふと現れる謎のアート……しかしその描き手は不明……彼女は果たして何者で、いつ出没しているのか……」
line = "「学園のどこかにふと現れる謎のアート……しかしその描き手は不明……彼女は果たして何者で、いつ出没しているのか……」"

[[dialogue]]
speaker = "アポロ"
# 「へへへ──このくおりてぃなら、話題になること間違いなしだ！」
line = "「へへへ──このくおりてぃなら、話題になること間違いなしだ！」"

[[dialogue]]
speaker = "アポロ"
# 「よおし、この調子でドンドン学園をあたし色に染めてやるぜ～～！！」
line = "「よおし、この調子でドンドン学園をあたし色に染めてやるぜ～～！！」"

[[dialogue]]
speaker = "アポロ"
# 「おらおらおらー！」
line = "「おらおらおらー！」"

[[dialogue]]
speaker = "アポロ"
# 「芸術は爆炎だ──っ！」
line = "「芸術は爆炎だ──っ！」"

[[dialogue]]
speaker = "アポロ"
# 「あたしのアートに酔いしれ──うっ……」
line = "「あたしのアートに酔いしれ──うっ……」"

[[dialogue]]
speaker = "unk"
# アポロ、待って
line = "アポロ、待って"

[[dialogue]]
speaker = "unk"
# どうなっても知らないよ
line = "どうなっても知らないよ"

[[dialogue]]
speaker = "アポロ"
# 「び、びびってんじゃねえ！　ここにも壁画があるくらいなんだから、あたしのアートだって歓迎されるはずだ」
line = "「び、びびってんじゃねえ！　ここにも壁画があるくらいなんだから、あたしのアートだって歓迎されるはずだ」"

[[dialogue]]
speaker = "アポロ"
# （でも、ちょっと怒られそうだからこのへんに小さく描いておくぜ……！）
line = "（でも、ちょっと怒られそうだからこのへんに小さく描いておくぜ……！）"

[[dialogue]]
speaker = "アポロ"
# （なあに、心配いらない！　あたしの芸術の理解者は、きっと現れてくれるばずだ）
line = "（なあに、心配いらない！　あたしの芸術の理解者は、きっと現れてくれるばずだ）"

[[dialogue]]
speaker = "unk"
# そうして、翌日──……。
line = "そうして、翌日──……。"

[[dialogue]]
speaker = "アポロ"
# 「ふっふっふ……今ごろ学園中あたしの話題で持ち切りだろうな。あたし──いや、謎のアーティスト・アポロシーのことで」
line = "「ふっふっふ……今ごろ学園中あたしの話題で持ち切りだろうな。あたし──いや、謎のアーティスト・アポロシーのことで」"

[[dialogue]]
speaker = "アポロ"
# 「いいか魔王、簡単には正体を明かすんじゃないぞ。みんなの期待が高まるまで焦らしてだな……」
line = "「いいか魔王、簡単には正体を明かすんじゃないぞ。みんなの期待が高まるまで焦らしてだな……」"

[[dialogue]]
speaker = "ウィステリア"
# 「──失礼するわ。図書館に落書きを残した不届き者はこちらにいるかしら？」
line = "「──失礼するわ。図書館に落書きを残した不届き者はこちらにいるかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「私たちの星徒会室もです。アポロさん、言い逃れはできませんよ」
line = "「私たちの星徒会室もです。アポロさん、言い逃れはできませんよ」"

[[dialogue]]
speaker = "アポロ"
# 「！？　な……なんであたしだってわかった！？」
line = "「！？　な……なんであたしだってわかった！？」"

[[dialogue]]
speaker = "ソフィア"
# 「だって、アポロシーのサインに名前が入っちゃってるじゃないですか」
line = "「だって、アポロシーのサインに名前が入っちゃってるじゃないですか」"

[[dialogue]]
speaker = "アポロ"
# 「は！？　し、しまった！？」
line = "「は！？　し、しまった！？」"

[[dialogue]]
speaker = "unk"
# 今さら……？
line = "今さら……？"

[[dialogue]]
speaker = "unk"
# 気づいてなかったの……？
line = "気づいてなかったの……？"

[[dialogue]]
speaker = "アポロ"
# 「ま、まあ待て。にしてもあたしのアートが描かれるのは光栄なことのはずで……！」
line = "「ま、まあ待て。にしてもあたしのアートが描かれるのは光栄なことのはずで……！」"

[[dialogue]]
speaker = "ソフィア"
# 「多少、味のある絵だったのは認めますが」
line = "「多少、味のある絵だったのは認めますが」"

[[dialogue]]
speaker = "ウィステリア"
# 「それで罪が帳消しになるはずもないわね」
line = "「それで罪が帳消しになるはずもないわね」"

[[dialogue]]
speaker = "アポロ"
# 「つ、罪だとぉ！？」
line = "「つ、罪だとぉ！？」"

[[dialogue]]
speaker = "キリカ"
# 「──アポロ様、いらっしゃいますか？　大聖堂に残された『大変ご立派なアート』の件でお話がございます」
line = "「──アポロ様、いらっしゃいますか？　大聖堂に残された『大変ご立派なアート』の件でお話がございます」"

[[dialogue]]
speaker = "アポロ"
# 「うげげっ！？　た……助けてくれ、魔王～～～～！」
line = "「うげげっ！？　た……助けてくれ、魔王～～～～！」"

[[dialogue]]
speaker = "unk"
# その後、アポロは自ら描いたアートたちを清掃するという、なんとも自業自得な結末を迎えるのだった……。
line = "その後、アポロは自ら描いたアートたちを清掃するという、なんとも自業自得な結末を迎えるのだった……。"
