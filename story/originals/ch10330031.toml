[[dialogue]]
speaker = "unk"
# 第１話,不健全騎士アニュラス,P
line = "第１話,不健全騎士アニュラス,P"

[[dialogue]]
speaker = "unk"
# アニュラスのクリスマスフォームは意外にも附属生からの評判がいい。
line = "アニュラスのクリスマスフォームは意外にも附属生からの評判がいい。"

[[dialogue]]
speaker = "unk"
# 堅物のように思われがちなアニュラスは、年下の相手をすることに苦手意識があった。
line = "堅物のように思われがちなアニュラスは、年下の相手をすることに苦手意識があった。"

[[dialogue]]
speaker = "unk"
# だが、そう思っているのは本人だけで、最近は同じ目線で一緒に遊んでくれる楽しいお姉さんと思われているらしい。
line = "だが、そう思っているのは本人だけで、最近は同じ目線で一緒に遊んでくれる楽しいお姉さんと思われているらしい。"

[[dialogue]]
speaker = "アニュラス"
# 「うむ、私のクリスマスフォームについて、迷いが生じてしまってな」
line = "「うむ、私のクリスマスフォームについて、迷いが生じてしまってな」"

[[dialogue]]
speaker = "アニュラス"
# 「あ、いや！　別に不満はないんだ。最初こそ、実戦では使えないパーティーグッズかと落胆したが、その有用性に気付いた今、何の不満もない」
line = "「あ、いや！　別に不満はないんだ。最初こそ、実戦では使えないパーティーグッズかと落胆したが、その有用性に気付いた今、何の不満もない」"

[[dialogue]]
speaker = "アニュラス"
# 「私のバズーカクラッカーは安心安全な上、非常に派手なのが好評でな。皆から撃って欲しいとせがまれるんだ。それについては嬉しく思っている」
line = "「私のバズーカクラッカーは安心安全な上、非常に派手なのが好評でな。皆から撃って欲しいとせがまれるんだ。それについては嬉しく思っている」"

[[dialogue]]
speaker = "アニュラス"
# 「が……武装の優秀さにかまけて、それ以外に目を向けることを忘れてしまっていた」
line = "「が……武装の優秀さにかまけて、それ以外に目を向けることを忘れてしまっていた」"

[[dialogue]]
speaker = "unk"
# どういうこと？
line = "どういうこと？"

[[dialogue]]
speaker = "unk"
# それ以外のこと？
line = "それ以外のこと？"

[[dialogue]]
speaker = "アニュラス"
# 「バズーカクラッカーの試射をしていたら、予想外のクレームが来てしまってな」
line = "「バズーカクラッカーの試射をしていたら、予想外のクレームが来てしまってな」"

[[dialogue]]
speaker = "アニュラス"
# 「音がうるさいとか、近所迷惑とか、ビックリしたとか、そういう文句は私も覚悟していたんだ」
line = "「音がうるさいとか、近所迷惑とか、ビックリしたとか、そういう文句は私も覚悟していたんだ」"

[[dialogue]]
speaker = "アニュラス"
# 「だがしかし……そのー、なんだ？　私も簡単なことでは揺らがないつもりだったが、今回ばかりは正直参ったよ」
line = "「だがしかし……そのー、なんだ？　私も簡単なことでは揺らがないつもりだったが、今回ばかりは正直参ったよ」"

[[dialogue]]
speaker = "アニュラス"
# 「クレームによると……どうやら私は不健全らしい」
line = "「クレームによると……どうやら私は不健全らしい」"

[[dialogue]]
speaker = "アニュラス"
# 「附属生には教育上よろしくないと言われたんだ！　そんなことあるか！？　非常に納得がいかない誹謗中傷だ！」
line = "「附属生には教育上よろしくないと言われたんだ！　そんなことあるか！？　非常に納得がいかない誹謗中傷だ！」"

[[dialogue]]
speaker = "unk"
# 誹謗中傷は許せない！
line = "誹謗中傷は許せない！"

[[dialogue]]
speaker = "unk"
# アニュラスは健全だ！
line = "アニュラスは健全だ！"

[[dialogue]]
speaker = "アニュラス"
# 「ふふっ、同情してくれて感謝する。私も言われたときはカッとなって、そのように思ったんだ」
line = "「ふふっ、同情してくれて感謝する。私も言われたときはカッとなって、そのように思ったんだ」"

[[dialogue]]
speaker = "アニュラス"
# 「しかし、事の詳細を聞いて納得した。確かに私は騎士の風上にも置けぬ、不健全極まりない女だったようだ」
line = "「しかし、事の詳細を聞いて納得した。確かに私は騎士の風上にも置けぬ、不健全極まりない女だったようだ」"

[[dialogue]]
speaker = "アニュラス"
# 「問題はクリスマスフォームの形状だ。……破廉恥すぎると烙印を押されてしまって」
line = "「問題はクリスマスフォームの形状だ。……破廉恥すぎると烙印を押されてしまって」"

[[dialogue]]
speaker = "unk"
# 他のみんなと同じくらいだと思うけど
line = "他のみんなと同じくらいだと思うけど"

[[dialogue]]
speaker = "unk"
# 破廉恥って言うほど露出度高くない
line = "破廉恥って言うほど露出度高くない"

[[dialogue]]
speaker = "アニュラス"
# 「そうなんだ。だから最初は誹謗中傷だと感じた。可愛い衣装は私には似合わないと思っていたが、破廉恥と誹りを受けるほどではないとな」
line = "「そうなんだ。だから最初は誹謗中傷だと感じた。可愛い衣装は私には似合わないと思っていたが、破廉恥と誹りを受けるほどではないとな」"

[[dialogue]]
speaker = "アニュラス"
# 「まあ、まずは見てくれ。変身っ」
line = "「まあ、まずは見てくれ。変身っ」"

[[dialogue]]
speaker = "アニュラス"
# 「……こんな感じだ。今の私を見てどう感じた？　率直な意見を聞かせて欲しい」
line = "「……こんな感じだ。今の私を見てどう感じた？　率直な意見を聞かせて欲しい」"

[[dialogue]]
speaker = "unk"
# ギュッてしたい
line = "ギュッてしたい"

[[dialogue]]
speaker = "unk"
# かわいい
line = "かわいい"

[[dialogue]]
speaker = "アニュラス"
# 「お、お前っ！　いい、いきなり何を言い出すんだ！」
line = "「お、お前っ！　いい、いきなり何を言い出すんだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「そういうのは時と場所をわきまえろ。ここは大勢が集うカフェテリアだぞ。いくらその……こ、恋人であっても、抱き合ったりキスしたりは、なしだっ！」
line = "「そういうのは時と場所をわきまえろ。ここは大勢が集うカフェテリアだぞ。いくらその……こ、恋人であっても、抱き合ったりキスしたりは、なしだっ！」"

[[dialogue]]
speaker = "アニュラス"
# 「私を好いてくれているのは嬉しいが、誰もいないときにしてくれ。放課後ならば、その、お前のしたいようにして構わないから<emoji=heart04>」
line = "「私を好いてくれているのは嬉しいが、誰もいないときにしてくれ。放課後ならば、その、お前のしたいようにして構わないから<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
# 「って、本題からズレてるぞ！　話を元に戻す」
line = "「って、本題からズレてるぞ！　話を元に戻す」"

[[dialogue]]
speaker = "アニュラス"
# 「確かにこのクリスマスフォームは可愛い。私には勿体ないくらい華やかで可憐な装いだ。露出度も破廉恥と言われるほどではないはず」
line = "「確かにこのクリスマスフォームは可愛い。私には勿体ないくらい華やかで可憐な装いだ。露出度も破廉恥と言われるほどではないはず」"

[[dialogue]]
speaker = "アニュラス"
# 「そう思っていたのだが……大きな落とし穴があったんだ」
line = "「そう思っていたのだが……大きな落とし穴があったんだ」"

[[dialogue]]
speaker = "アニュラス"
# 「通常時は問題ない。だから私も気付かなかった。問題はバズーカを発射したときだ。どういうことかと言うとだな……」
line = "「通常時は問題ない。だから私も気付かなかった。問題はバズーカを発射したときだ。どういうことかと言うとだな……」"

[[dialogue]]
speaker = "アニュラス"
# 「バズーカを撃つと、パンツが見えてしまうんだ！」
line = "「バズーカを撃つと、パンツが見えてしまうんだ！」"

[[dialogue]]
speaker = "unk"
# パンチラするのか！？
line = "パンチラするのか！？"

[[dialogue]]
speaker = "unk"
# ……は！？
line = "……は！？"

[[dialogue]]
speaker = "アニュラス"
# 「た、たまにだぞ、たまに。ただ、発射時の衝撃はなかなか凄いんだ。スカートの前面が短いから、油断するとピラッとめくれてしまうらしい」
line = "「た、たまにだぞ、たまに。ただ、発射時の衝撃はなかなか凄いんだ。スカートの前面が短いから、油断するとピラッとめくれてしまうらしい」"

[[dialogue]]
speaker = "アニュラス"
# 「おい待て、なんだその目は？　頼まれたってこんなところで実演しないぞ。不健全騎士という評価を受けたくないからな！」
line = "「おい待て、なんだその目は？　頼まれたってこんなところで実演しないぞ。不健全騎士という評価を受けたくないからな！」"

[[dialogue]]
speaker = "アニュラス"
# 「おねだりしても駄目だぞ。先程も言ったがそういうのは後だ。どうしても見たいというなら……考えてやらんこともないから、とにかく放課後まで我慢するんだ！」
line = "「おねだりしても駄目だぞ。先程も言ったがそういうのは後だ。どうしても見たいというなら……考えてやらんこともないから、とにかく放課後まで我慢するんだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「ふふっ、いい子だ。お前の恋人であることは忘れていないから安心してくれ。ただ、今は騎士の時間だ。分けて考えて欲しい」
line = "「ふふっ、いい子だ。お前の恋人であることは忘れていないから安心してくれ。ただ、今は騎士の時間だ。分けて考えて欲しい」"

[[dialogue]]
speaker = "アニュラス"
# 「やかましいと文句を言われても反論出来るが……バズーカを撃つと下着が見えると言われては、もう何も言い返せなくて」
line = "「やかましいと文句を言われても反論出来るが……バズーカを撃つと下着が見えると言われては、もう何も言い返せなくて」"

[[dialogue]]
speaker = "アニュラス"
# 「だから、パーティー当日までクリスマスフォームを封印しようと考えているんだ」
line = "「だから、パーティー当日までクリスマスフォームを封印しようと考えているんだ」"

[[dialogue]]
speaker = "アニュラス"
# 「私のような女がパンツを見せてしまうのは、附属生の教育にもよくないだろう。いたずらに刺激するような真似は決して許されざる行為だからな」
line = "「私のような女がパンツを見せてしまうのは、附属生の教育にもよくないだろう。いたずらに刺激するような真似は決して許されざる行為だからな」"

[[dialogue]]
speaker = "アニュラス"
# 「皆の期待に応えられないのは、本当に残念でならないんだが……」
line = "「皆の期待に応えられないのは、本当に残念でならないんだが……」"

[[dialogue]]
speaker = "unk"
# その程度で諦めてしまうのか？
line = "その程度で諦めてしまうのか？"

[[dialogue]]
speaker = "unk"
# 皆の期待に応えてこそ騎士だ！
line = "皆の期待に応えてこそ騎士だ！"

[[dialogue]]
speaker = "アニュラス"
# 「……そうだな、お前の言う通りだ。こんなところで諦めては騎士の名折れ。パンチラを阻止することに全力を注げばいいだけだ！」
line = "「……そうだな、お前の言う通りだ。こんなところで諦めては騎士の名折れ。パンチラを阻止することに全力を注げばいいだけだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「バズーカの衝撃が来るとわかっているなら受け流せ！　騎士ならばそのくらい出来て当然だ！」
line = "「バズーカの衝撃が来るとわかっているなら受け流せ！　騎士ならばそのくらい出来て当然だ！」"

[[dialogue]]
speaker = "アニュラス"
# 「感謝するぞ、会長！　１人で悩んでいても解決出来なかったが、お前に相談に乗ってもらって道が開けたぞ」
line = "「感謝するぞ、会長！　１人で悩んでいても解決出来なかったが、お前に相談に乗ってもらって道が開けたぞ」"

[[dialogue]]
speaker = "アニュラス"
# 「よーし、今から特訓だ！　バズーカを撃っても絶対にパンチラしない完全防御を身につけるぞ！」
line = "「よーし、今から特訓だ！　バズーカを撃っても絶対にパンチラしない完全防御を身につけるぞ！」"

[[dialogue]]
speaker = "unk"
# こうして、アニュラスはパンチラしない特訓をすることになった。
line = "こうして、アニュラスはパンチラしない特訓をすることになった。"

[[dialogue]]
speaker = "unk"
# 完全防御を会得するまで、さほど時間はかからなかったが、何度も可愛いパンチラを見せてもらうのだった。
line = "完全防御を会得するまで、さほど時間はかからなかったが、何度も可愛いパンチラを見せてもらうのだった。"
