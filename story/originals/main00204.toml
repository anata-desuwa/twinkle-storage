[[dialogue]]
speaker = "unk"
# 第６話,流星学園星徒会,B
line = "第６話,流星学園星徒会,B"

[[dialogue]]
speaker = "フィオナ"
# 「流星学園星徒会会長、星見フィオナです」
line = "「流星学園星徒会会長、星見フィオナです」"

[[dialogue]]
speaker = "フィオナ"
# 「改めてよろしくお願いしますね──新星学園の、新星徒会長さん」
line = "「改めてよろしくお願いしますね──新星学園の、新星徒会長さん」"

[[dialogue]]
speaker = "クロト"
# 「……ああ。緋宮クロトだ──よろしく頼む」
line = "「……ああ。緋宮クロトだ──よろしく頼む」"

[[dialogue]]
speaker = "unk"
# 差し出された手を取り、名を告げる。
line = "差し出された手を取り、名を告げる。"

[[dialogue]]
speaker = "unk"
# 星徒会長と言われて一瞬面食らってしまったが……自分のことだ。そろそろ慣れないとな。
line = "星徒会長と言われて一瞬面食らってしまったが……自分のことだ。そろそろ慣れないとな。"

[[dialogue]]
speaker = "unk"
# しかし……
line = "しかし……"

[[dialogue]]
speaker = "フィオナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "クロト"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 握手を交わしたまま、数秒が経った。
line = "握手を交わしたまま、数秒が経った。"

[[dialogue]]
speaker = "unk"
# 向こうが力を緩めないのでなんとなく手を放せずにいる。
line = "向こうが力を緩めないのでなんとなく手を放せずにいる。"

[[dialogue]]
speaker = "unk"
# ここまでまじまじと顔を見つめられると照れが交じるが……これもトップに立つ者の宿命なのだろうか？
line = "ここまでまじまじと顔を見つめられると照れが交じるが……これもトップに立つ者の宿命なのだろうか？"

[[dialogue]]
speaker = "フィオナ"
# 「っと。ごめんなさい。これから、共に力を合わせていきましょうね」
line = "「っと。ごめんなさい。これから、共に力を合わせていきましょうね」"

[[dialogue]]
speaker = "クロト"
# 「そうだな。同じ星徒会長同士──良い関係を築いていこう」
line = "「そうだな。同じ星徒会長同士──良い関係を築いていこう」"

[[dialogue]]
speaker = "unk"
# お互いに手を放す。
line = "お互いに手を放す。"

[[dialogue]]
speaker = "unk"
# にしても、星見フィオナさん──か。
line = "にしても、星見フィオナさん──か。"

[[dialogue]]
speaker = "unk"
# どこかで聞いた覚えがあるような……
line = "どこかで聞いた覚えがあるような……"

[[dialogue]]
speaker = "ルリエル"
# 「（あ──あれが噂の下剋上星徒会長でありますかっ！）」
line = "「（あ──あれが噂の下剋上星徒会長でありますかっ！）」"

[[dialogue]]
speaker = "ユウリ"
# 「（とんでもねえ強者のオーラ──をそこまで纏ってるようには見えねえが……）」
line = "「（とんでもねえ強者のオーラ──をそこまで纏ってるようには見えねえが……）」"

[[dialogue]]
speaker = "セーラ"
# 「（能ある鷹は爪を隠すからね～。きっと戦いに入ったらヤバいんじゃない？）」
line = "「（能ある鷹は爪を隠すからね～。きっと戦いに入ったらヤバいんじゃない？）」"

[[dialogue]]
speaker = "ニャリオン"
# 「（どんニャ男だろうと、フィオナ嬢の足元にも及ばないのは決まっているニャン！）」
line = "「（どんニャ男だろうと、フィオナ嬢の足元にも及ばないのは決まっているニャン！）」"

[[dialogue]]
speaker = "ソフィア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 星見会長のすぐ後ろで会話をする４人の女子たち（あと謎の一匹）。なぜかじろじろ見つめられている。
line = "星見会長のすぐ後ろで会話をする４人の女子たち（あと謎の一匹）。なぜかじろじろ見つめられている。"

[[dialogue]]
speaker = "unk"
# 彼女たちが残る流星星徒会のメンバー……
line = "彼女たちが残る流星星徒会のメンバー……"

[[dialogue]]
speaker = "unk"
# そして、このアステライトを解放した立役者であることに疑いはなかった。
line = "そして、このアステライトを解放した立役者であることに疑いはなかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──流星星徒会のあなた達！　今回は私達に代わりアステラを解放してくれたこと、礼を言うわ！」
line = "「──流星星徒会のあなた達！　今回は私達に代わりアステラを解放してくれたこと、礼を言うわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。何事もなく済んで良かったです」
line = "「ええ。何事もなく済んで良かったです」"

[[dialogue]]
speaker = "unk"
# どん、と俺たちの前に出張ってきたのはヴィーナスだった。
line = "どん、と俺たちの前に出張ってきたのはヴィーナスだった。"

[[dialogue]]
speaker = "unk"
# 同じ立場という話をしたばかりなのに、偉そうに大きく腕を組んでいる。
line = "同じ立場という話をしたばかりなのに、偉そうに大きく腕を組んでいる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「こちらがうちの書記──もとい切り込み隊長、マトイよ」
line = "「こちらがうちの書記──もとい切り込み隊長、マトイよ」"

[[dialogue]]
speaker = "マトイ"
# 「えぇっ」
line = "「えぇっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そしてこっちが副会長──いえスーパー副会長のアナ！」
line = "「そしてこっちが副会長──いえスーパー副会長のアナ！」"

[[dialogue]]
speaker = "アナ"
# 「よろしく」
line = "「よろしく」"

[[dialogue]]
speaker = "unk"
# マトイは驚いて、アナはペコリと軽くお辞儀した。
line = "マトイは驚いて、アナはペコリと軽くお辞儀した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「そしてここにおわす我らが星徒会長こそが真の魔王・緋宮クロトなんだから！」
line = "「そしてここにおわす我らが星徒会長こそが真の魔王・緋宮クロトなんだから！」"

[[dialogue]]
speaker = "フィオナ"
# 「魔王……」
line = "「魔王……」"

[[dialogue]]
speaker = "クロト"
# 「（ヴィーナス、そこまで張り合わなくても）」
line = "「（ヴィーナス、そこまで張り合わなくても）」"

[[dialogue]]
speaker = "マトイ"
# 「（そうそう、緋宮くんが誤解されちゃうって！）」
line = "「（そうそう、緋宮くんが誤解されちゃうって！）」"

[[dialogue]]
speaker = "ヴィーナス"
# 「（いいのよ。こういうのは舐められたら終わりなんだから！　ファーストインプレッションが肝心よ！）」
line = "「（いいのよ。こういうのは舐められたら終わりなんだから！　ファーストインプレッションが肝心よ！）」"

[[dialogue]]
speaker = "unk"
# 舐められまいとひたすらハッタリを利かせるヴィーナスだった。
line = "舐められまいとひたすらハッタリを利かせるヴィーナスだった。"

[[dialogue]]
speaker = "unk"
# 一応ライバル校とはいえ……。
line = "一応ライバル校とはいえ……。"

[[dialogue]]
speaker = "ルリエル"
# 「で、ではでは貴女さまはっ？」
line = "「で、ではでは貴女さまはっ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私？　ふふっ、聞いて驚きなさい──私こそ新星学園の影のフィクサー・九浄ヴィーナス！」
line = "「私？　ふふっ、聞いて驚きなさい──私こそ新星学園の影のフィクサー・九浄ヴィーナス！」"

[[dialogue]]
speaker = "ルリエル"
# 「ふぃ、ふぃふぃくさー！？」
line = "「ふぃ、ふぃふぃくさー！？」"

[[dialogue]]
speaker = "ユウリ"
# 「……って何だっけ」
line = "「……って何だっけ」"

[[dialogue]]
speaker = "ソフィア"
# 「政財界などのバックから実務を牛耳る権力者……のはずです」
line = "「政財界などのバックから実務を牛耳る権力者……のはずです」"

[[dialogue]]
speaker = "ルリエル"
# 「う、裏ボスでありますか！？」
line = "「う、裏ボスでありますか！？」"

[[dialogue]]
speaker = "マトイ"
# 「（またヴィーナスがありもしない役職に就こうとしてる……）」
line = "「（またヴィーナスがありもしない役職に就こうとしてる……）」"

[[dialogue]]
speaker = "アナ"
# 「（どうしてああいう語彙は豊富なんでしょう）」
line = "「（どうしてああいう語彙は豊富なんでしょう）」"

[[dialogue]]
speaker = "unk"
# 言ったもん勝ちだった。
line = "言ったもん勝ちだった。"

[[dialogue]]
speaker = "unk"
# これを受けて、星見会長の右肩から一匹の従者が声を上げる。
line = "これを受けて、星見会長の右肩から一匹の従者が声を上げる。"

[[dialogue]]
speaker = "ニャリオン"
# 「こっちだって負けてないニャン！　フィオナ嬢はあの教皇庁・星見家が第一皇女にして次期教皇候補！」
line = "「こっちだって負けてないニャン！　フィオナ嬢はあの教皇庁・星見家が第一皇女にして次期教皇候補！」"

[[dialogue]]
speaker = "クロト"
# 「！　そうか、星見家の……」
line = "「！　そうか、星見家の……」"

[[dialogue]]
speaker = "ニャリオン"
# 「さらにフィオナ嬢は頭脳明晰・成績優秀・眉目秀麗と文武両道の超絶美少女！　どうだ！　参ったかニャン！」
line = "「さらにフィオナ嬢は頭脳明晰・成績優秀・眉目秀麗と文武両道の超絶美少女！　どうだ！　参ったかニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしらの紹介をしろよ」
line = "「あたしらの紹介をしろよ」"

[[dialogue]]
speaker = "セーラ"
# 「うちらのマスコット、ニャリオンちゃんでーす」
line = "「うちらのマスコット、ニャリオンちゃんでーす」"

[[dialogue]]
speaker = "ソフィア"
# 「……ソフィアです。よろしくお願いします」
line = "「……ソフィアです。よろしくお願いします」"

[[dialogue]]
speaker = "ルリエル"
# 「大天使……うーん熾天使……いやケルビムも捨てがたい……いっそユアエンジェルなんてのも……」
line = "「大天使……うーん熾天使……いやケルビムも捨てがたい……いっそユアエンジェルなんてのも……」"

[[dialogue]]
speaker = "unk"
# 泰然自若と微笑む星見会長に、和気あいあいと談笑するそのメンバーたち。
line = "泰然自若と微笑む星見会長に、和気あいあいと談笑するそのメンバーたち。"

[[dialogue]]
speaker = "unk"
# 俺たちとあり方は違えど、そこには十分な信頼関係が築かれているように思えた。
line = "俺たちとあり方は違えど、そこには十分な信頼関係が築かれているように思えた。"

[[dialogue]]
speaker = "クロト"
# 「（それにしても……星見家か……）」
line = "「（それにしても……星見家か……）」"

[[dialogue]]
speaker = "unk"
# 星見家は流星教皇庁の首長だ。
line = "星見家は流星教皇庁の首長だ。"

[[dialogue]]
speaker = "unk"
# つまり有りていに言って、星見家とは流星市国の統治者である。
line = "つまり有りていに言って、星見家とは流星市国の統治者である。"

[[dialogue]]
speaker = "unk"
# この国に住んでいれば知らぬ者はいない、九浄家に並ぶほどの由緒正しさと言えるだろう。
line = "この国に住んでいれば知らぬ者はいない、九浄家に並ぶほどの由緒正しさと言えるだろう。"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ……でも、面白い方々ですね。切り込み隊長にスーパー副会長、後は影のフィクサーと……」
line = "「ふふっ……でも、面白い方々ですね。切り込み隊長にスーパー副会長、後は影のフィクサーと……」"

[[dialogue]]
speaker = "マトイ"
# 「あ、あの。役職についてはあまり真に受けないでもらえると……」
line = "「あ、あの。役職についてはあまり真に受けないでもらえると……」"

[[dialogue]]
speaker = "unk"
# おどけた様子でこちらへと微笑みかける星見会長。
line = "おどけた様子でこちらへと微笑みかける星見会長。"

[[dialogue]]
speaker = "unk"
# マトイがそれを制止しようとするが──
line = "マトイがそれを制止しようとするが──"

[[dialogue]]
speaker = "フィオナ"
# 「それに」
line = "「それに」"

[[dialogue]]
speaker = "フィオナ"
# 「<b>魔王</b>」
line = "「<b>魔王</b>」"

[[dialogue]]
speaker = "クロト"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 一瞬。
line = "一瞬。"

[[dialogue]]
speaker = "unk"
# 星見会長の眼が、底知れぬ光を帯びた気がした。
line = "星見会長の眼が、底知れぬ光を帯びた気がした。"

[[dialogue]]
speaker = "フィオナ"
# 「……緋宮会長。あなたは……“魔王”なのですか？」
line = "「……緋宮会長。あなたは……“魔王”なのですか？」"

[[dialogue]]
speaker = "クロト"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "unk"
# 冗談めかした問い。
line = "冗談めかした問い。"

[[dialogue]]
speaker = "unk"
# だがそこには、どこか言い知れない深意らしきものが潜んでいて……
line = "だがそこには、どこか言い知れない深意らしきものが潜んでいて……"

[[dialogue]]
speaker = "クロト"
# 「魔王だ──と、ヴィーナスは言っている」
line = "「魔王だ──と、ヴィーナスは言っている」"

[[dialogue]]
speaker = "クロト"
# 「が……正直よくわからない」
line = "「が……正直よくわからない」"

[[dialogue]]
speaker = "ルリエル"
# 「わからないんかーーーーーいっっ」
line = "「わからないんかーーーーーいっっ」"

[[dialogue]]
speaker = "ソフィア"
# 「ルリ。よその会長さんに対する態度じゃない」
line = "「ルリ。よその会長さんに対する態度じゃない」"

[[dialogue]]
speaker = "ルリエル"
# 「はっ！　これは大変失礼いたしました！」
line = "「はっ！　これは大変失礼いたしました！」"

[[dialogue]]
speaker = "クロト"
# 「はは……別に構わないよ。生徒としては俺のほうが新参だし、ラフな方が助かるな」
line = "「はは……別に構わないよ。生徒としては俺のほうが新参だし、ラフな方が助かるな」"

[[dialogue]]
speaker = "ルリエル"
# 「新参……？　わたし達は一年生でありますが……」
line = "「新参……？　わたし達は一年生でありますが……」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん──会長は転入生だから。それも先週来たばかりの」
line = "「緋宮くん──会長は転入生だから。それも先週来たばかりの」"

[[dialogue]]
speaker = "ユウリ"
# 「先週……！？」
line = "「先週……！？」"

[[dialogue]]
speaker = "セーラ"
# 「スピード出世すぎん？」
line = "「スピード出世すぎん？」"

[[dialogue]]
speaker = "unk"
# さすがに驚愕された。
line = "さすがに驚愕された。"

[[dialogue]]
speaker = "unk"
# 御前試合の件といい、本当は成り行きだったのだが、とんでもない破天荒野郎に見えているかもしれない。
line = "御前試合の件といい、本当は成り行きだったのだが、とんでもない破天荒野郎に見えているかもしれない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん。その破天荒さこそクロトが魔王である証よ、規格外でしょ？」
line = "「ふふん。その破天荒さこそクロトが魔王である証よ、規格外でしょ？」"

[[dialogue]]
speaker = "マトイ"
# 「（あのねヴィーナス、魔王なんて子どもでも知ってる大昔の悪者なんだから……）」
line = "「（あのねヴィーナス、魔王なんて子どもでも知ってる大昔の悪者なんだから……）」"

[[dialogue]]
speaker = "アナ"
# 「（そんな人物が新星の会長と思われるのは、いささか対外的に不都合かと）」
line = "「（そんな人物が新星の会長と思われるのは、いささか対外的に不都合かと）」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの放言を抑えようとする２人だったが、時既に遅しというものだった。
line = "ヴィーナスの放言を抑えようとする２人だったが、時既に遅しというものだった。"

[[dialogue]]
speaker = "ルリエル"
# 「ううむ、魔王さん……！　こう見えて実はとんでもないワルなんでしょうか……！？」
line = "「ううむ、魔王さん……！　こう見えて実はとんでもないワルなんでしょうか……！？」"

[[dialogue]]
speaker = "クロト"
# 「別に普通だ。というより、正義の味方でありたいと思ってる」
line = "「別に普通だ。というより、正義の味方でありたいと思ってる」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが俺を魔王と呼ぶ真意は未だによくわかっていない。
line = "ヴィーナスが俺を魔王と呼ぶ真意は未だによくわかっていない。"

[[dialogue]]
speaker = "unk"
# ただ、彼女は彼女でこのように自信満々だから……俺としては“わからない”というほかないのだ。
line = "ただ、彼女は彼女でこのように自信満々だから……俺としては“わからない”というほかないのだ。"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。よくわかりました。変なことを聞いてごめんなさい」
line = "「ふふ。よくわかりました。変なことを聞いてごめんなさい」"

[[dialogue]]
speaker = "フィオナ"
# 「でも、否定はしないなんて──面白い方ですね。緋宮会長は」
line = "「でも、否定はしないなんて──面白い方ですね。緋宮会長は」"

[[dialogue]]
speaker = "unk"
# 星見会長のこちらを見る眼差しが、最後まで気になっていた……。
line = "星見会長のこちらを見る眼差しが、最後まで気になっていた……。"
