[[dialogue]]
speaker = "unk"
# とある放課後、俺はまた九浄家からの呼び出しを受けていた。
line = "とある放課後、俺はまた九浄家からの呼び出しを受けていた。"

[[dialogue]]
speaker = "ヘレナ"
# 「よく来てくれたな、魔王。時間もない故、早速本題に入ろう」
line = "「よく来てくれたな、魔王。時間もない故、早速本題に入ろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「実は、アニマがとんでもないものを発明してくれてな。……ヨミヨミ、例の物を」
line = "「実は、アニマがとんでもないものを発明してくれてな。……ヨミヨミ、例の物を」"

[[dialogue]]
speaker = "ヨミ"
# 「はいっ、当主様」
line = "「はいっ、当主様」"

[[dialogue]]
speaker = "unk"
# これは何です？
line = "これは何です？"

[[dialogue]]
speaker = "unk"
# なんだか物々しい機械が……
line = "なんだか物々しい機械が……"

[[dialogue]]
speaker = "ヘレナ"
# 「ふっふっふ……何を隠そう、これは空間転移装置だ！」
line = "「ふっふっふ……何を隠そう、これは空間転移装置だ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「どうだ、驚いて声も出まい。その名の通り、空間を転移する装置なのだ！」
line = "「どうだ、驚いて声も出まい。その名の通り、空間を転移する装置なのだ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「星騎士は高速で移動することが出来るが、それでも超長距離を一瞬でというわけにはいかぬ」
line = "「星騎士は高速で移動することが出来るが、それでも超長距離を一瞬でというわけにはいかぬ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ところがこの装置を使えば、リンクを行った場所に一瞬で転移することが出来るのだ」
line = "「ところがこの装置を使えば、リンクを行った場所に一瞬で転移することが出来るのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ただ今はまだ、転移先を自由に設定することは出来ない。転移できる場所は数か所に限られている。そういう意味ではこの装置は未完成なのだ」
line = "「ただ今はまだ、転移先を自由に設定することは出来ない。転移できる場所は数か所に限られている。そういう意味ではこの装置は未完成なのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そこで魔王には、この空間転移装置のテストをしてもらいたい。なに、そんな心配そうな顔をするな、転移自体には何も問題はない」
line = "「そこで魔王には、この空間転移装置のテストをしてもらいたい。なに、そんな心配そうな顔をするな、転移自体には何も問題はない」"

[[dialogue]]
speaker = "unk"
# ほ、本当ですか……？
line = "ほ、本当ですか……？"

[[dialogue]]
speaker = "ヘレナ"
# 「本当だとも。ついでと言っては何だが、転移先の視察も行ってきてくれれば重畳だ」
line = "「本当だとも。ついでと言っては何だが、転移先の視察も行ってきてくれれば重畳だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「その場所は以前、突発的に出現したアステラによって壊滅しかかった」
line = "「その場所は以前、突発的に出現したアステラによって壊滅しかかった」"

[[dialogue]]
speaker = "ヘレナ"
# 「今は復興が進んでいるが、流星市国から遠く離れた場所故に、なかなか視察に赴くことも難しい」
line = "「今は復興が進んでいるが、流星市国から遠く離れた場所故に、なかなか視察に赴くことも難しい」"

[[dialogue]]
speaker = "ヘレナ"
# 「その場所に赴いて、魔王の目でその復興状況を確かめて来て欲しい。どうだ、頼まれてくれるか？」
line = "「その場所に赴いて、魔王の目でその復興状況を確かめて来て欲しい。どうだ、頼まれてくれるか？」"

[[dialogue]]
speaker = "unk"
# 任せて下さい！
line = "任せて下さい！"

[[dialogue]]
speaker = "unk"
# そういうことであれば！
line = "そういうことであれば！"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、よい返事だな。結構結構」
line = "「うむ、よい返事だな。結構結構」"

[[dialogue]]
speaker = "ヘレナ"
# 「では今回、魔王たちに向かってもらう場所なのだが……『紫桜の里』だ」
line = "「では今回、魔王たちに向かってもらう場所なのだが……『紫桜の里』だ」"

[[dialogue]]
speaker = "せつな"
# 「何と！　それは誠でござるか！」
line = "「何と！　それは誠でござるか！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？」
line = "「こやっ！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「せつな……私が呼ぶまで忍んでいよと言い含めていたのだが、我慢できずに出てきてしまったか。まあ、分かってはいたがな」
line = "「せつな……私が呼ぶまで忍んでいよと言い含めていたのだが、我慢できずに出てきてしまったか。まあ、分かってはいたがな」"

[[dialogue]]
speaker = "せつな"
# 「はっ！？　申し訳ないでござる、当主様……」
line = "「はっ！？　申し訳ないでござる、当主様……」"

[[dialogue]]
speaker = "せつな"
# 「ですがですが！　紫桜の里と聞いては黙って忍んでなどおられませぬ！」
line = "「ですがですが！　紫桜の里と聞いては黙って忍んでなどおられませぬ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだろうな。紫桜の里は忍者の里であり、せつなの故郷だ」
line = "「そうだろうな。紫桜の里は忍者の里であり、せつなの故郷だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「故にせつなよ、この任務はお前に任せようと思う。魔王に同行し、その身を守護するのだ！」
line = "「故にせつなよ、この任務はお前に任せようと思う。魔王に同行し、その身を守護するのだ！」"

[[dialogue]]
speaker = "せつな"
# 「その任、しかと承ったでござる！」
line = "「その任、しかと承ったでござる！」"

[[dialogue]]
speaker = "ヘレナ"
# 「なーに、畏まらず久しぶりの里帰りも兼ねた休暇だと思えばよい」
line = "「なーに、畏まらず久しぶりの里帰りも兼ねた休暇だと思えばよい」"

[[dialogue]]
speaker = "ヨミ"
# 「よかったですね、せつなさん。お土産話をたくさん期待してますよ～」
line = "「よかったですね、せつなさん。お土産話をたくさん期待してますよ～」"

[[dialogue]]
speaker = "ヘレナ"
# 「何を言う、ヨミヨミ？　まるで他人事のようなことを」
line = "「何を言う、ヨミヨミ？　まるで他人事のようなことを」"

[[dialogue]]
speaker = "ヨミ"
# 「はい？」
line = "「はい？」"

[[dialogue]]
speaker = "ヘレナ"
# 「紫桜の里にはヨミヨミにも行ってもらう。魔王とせつなだけでは、少々心許ないからな」
line = "「紫桜の里にはヨミヨミにも行ってもらう。魔王とせつなだけでは、少々心許ないからな」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　わ、私もですか！？」
line = "「こやっ！？　わ、私もですか！？」"

[[dialogue]]
speaker = "unk"
# 頼りにしてるよ
line = "頼りにしてるよ"

[[dialogue]]
speaker = "せつな"
# 「何か問題が生じたら、ヨミ殿に頼ればいいでござるな！」
line = "「何か問題が生じたら、ヨミ殿に頼ればいいでござるな！」"

[[dialogue]]
speaker = "ヘレナ"
# 「はっはっは、頼んだぞ、ヨミヨミ」
line = "「はっはっは、頼んだぞ、ヨミヨミ」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁぁ～～～～んっ！」
line = "「こやぁぁ～～～～んっ！」"

[[dialogue]]
speaker = "unk"
# こうして俺とせつな、ヨミヨミの３人は、空間転移装置を使って紫桜の里を訪れることになったのだった。
line = "こうして俺とせつな、ヨミヨミの３人は、空間転移装置を使って紫桜の里を訪れることになったのだった。"
