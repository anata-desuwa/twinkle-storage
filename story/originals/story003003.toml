[[dialogue]]
speaker = "舞亜"
# 「それじゃあ、さっそく会議と行きたいんだけど……その前に、みんなはどうしてこの募集に応募したの？」
line = "「それじゃあ、さっそく会議と行きたいんだけど……その前に、みんなはどうしてこの募集に応募したの？」"

[[dialogue]]
speaker = "アニュラス"
# 「挨拶がてらに少し話をしよう、ということだな。ではまず私から話そう」
line = "「挨拶がてらに少し話をしよう、ということだな。ではまず私から話そう」"

[[dialogue]]
speaker = "アニュラス"
# 「私は……幼い頃より父に憧れ、父のような立派な剣士になることを目標に生きてきた」
line = "「私は……幼い頃より父に憧れ、父のような立派な剣士になることを目標に生きてきた」"

[[dialogue]]
speaker = "アニュラス"
# 「そのため、これまでの人生を剣の修行に費やし、こういった祭りごとに触れる機会が本当に少なかったのだ」
line = "「そのため、これまでの人生を剣の修行に費やし、こういった祭りごとに触れる機会が本当に少なかったのだ」"

[[dialogue]]
speaker = "アニュラス"
# 「だが最近になって、果たしてそれでよいのか……父の冠した『流星の騎士』の名を継ぐに足る星騎士になれるのか……そんな疑問を抱くようになった」
line = "「だが最近になって、果たしてそれでよいのか……父の冠した『流星の騎士』の名を継ぐに足る星騎士になれるのか……そんな疑問を抱くようになった」"

[[dialogue]]
speaker = "アニュラス"
# 「父に追いつくためには、ただ剣の技術を修めればよいというものではない。精神的に……いや人格的にもっと成長すべきではないかと思った」
line = "「父に追いつくためには、ただ剣の技術を修めればよいというものではない。精神的に……いや人格的にもっと成長すべきではないかと思った」"

[[dialogue]]
speaker = "アニュラス"
# 「だから私は、実行委員としてこのクリスマスパーティーに参加し、皆に笑顔を届けられる真の騎士を目指す！」
line = "「だから私は、実行委員としてこのクリスマスパーティーに参加し、皆に笑顔を届けられる真の騎士を目指す！」"

[[dialogue]]
speaker = "舞亜"
# 「おお～、めっちゃ立派な理由じゃない」
line = "「おお～、めっちゃ立派な理由じゃない」"

[[dialogue]]
speaker = "アポロ"
# 「正義の心に満ちた、素晴らしい志だな！　すごいぞ！」
line = "「正義の心に満ちた、素晴らしい志だな！　すごいぞ！」"

[[dialogue]]
speaker = "アニュラス"
# 「舞亜はどうなのだ？」
line = "「舞亜はどうなのだ？」"

[[dialogue]]
speaker = "舞亜"
# 「私はアニュラスみたいに気合いの入った理由は無いよ。行事にはしっかり参加して、青春を楽しんでおきたいなってだけ」
line = "「私はアニュラスみたいに気合いの入った理由は無いよ。行事にはしっかり参加して、青春を楽しんでおきたいなってだけ」"

[[dialogue]]
speaker = "アニュラス"
# 「ああそうか、舞亜はフィギュアスケートが忙しいからな。参加できるものは参加しておきたい、ということか」
line = "「ああそうか、舞亜はフィギュアスケートが忙しいからな。参加できるものは参加しておきたい、ということか」"

[[dialogue]]
speaker = "unk"
# 今は大丈夫な時期なの？
line = "今は大丈夫な時期なの？"

[[dialogue]]
speaker = "舞亜"
# 「えっと……実はそうでもなくて、むしろ今が１番忙しい時期、みたいな？」
line = "「えっと……実はそうでもなくて、むしろ今が１番忙しい時期、みたいな？」"

[[dialogue]]
speaker = "舞亜"
# 「でも、何て言ったらいいかな……忙しいからこそ逆にやるっきゃないって思ったんだよね」
line = "「でも、何て言ったらいいかな……忙しいからこそ逆にやるっきゃないって思ったんだよね」"

[[dialogue]]
speaker = "アニュラス"
# 「計算問題を前にすると、ついつい部屋の掃除をしたくなってしまう感じか？」
line = "「計算問題を前にすると、ついつい部屋の掃除をしたくなってしまう感じか？」"

[[dialogue]]
speaker = "舞亜"
# 「ん～、ちょっと違うかな」
line = "「ん～、ちょっと違うかな」"

[[dialogue]]
speaker = "舞亜"
# 「忙しいからってスケートに集中しすぎると、逆に調子が悪くなっちゃうんだよね」
line = "「忙しいからってスケートに集中しすぎると、逆に調子が悪くなっちゃうんだよね」"

[[dialogue]]
speaker = "舞亜"
# 「意識が張り詰めて鋭くなってる時だからこそ、こういうことをやってイメージを膨らませたいって言うか」
line = "「意識が張り詰めて鋭くなってる時だからこそ、こういうことをやってイメージを膨らませたいって言うか」"

[[dialogue]]
speaker = "舞亜"
# 「逆にそこでもらった刺激が、フィギュアスケートの方にもいい感じに影響してきたりするんだよね……わかる？」
line = "「逆にそこでもらった刺激が、フィギュアスケートの方にもいい感じに影響してきたりするんだよね……わかる？」"

[[dialogue]]
speaker = "アポロ"
# 「ん～、分かるような分からないような……」
line = "「ん～、分かるような分からないような……」"

[[dialogue]]
speaker = "アニュラス"
# 「プロフェッショナルの世界に身を置く舞亜にしか分からない話なのかもしれないな」
line = "「プロフェッショナルの世界に身を置く舞亜にしか分からない話なのかもしれないな」"

[[dialogue]]
speaker = "舞亜"
# 「アポロちゃんは楽しそうだったから、だよね？」
line = "「アポロちゃんは楽しそうだったから、だよね？」"

[[dialogue]]
speaker = "アポロ"
# 「そうだな」
line = "「そうだな」"

[[dialogue]]
speaker = "アポロ"
# 「あと、あたしはつい最近までずっと眠りについてたんだ」
line = "「あと、あたしはつい最近までずっと眠りについてたんだ」"

[[dialogue]]
speaker = "アポロ"
# 「こんな風に自分たちで計画して盛大にやるクリスマスパーティーってのはやったことがないんだ。だから楽しみで仕方ないぞ！」
line = "「こんな風に自分たちで計画して盛大にやるクリスマスパーティーってのはやったことがないんだ。だから楽しみで仕方ないぞ！」"

[[dialogue]]
speaker = "アニュラス"
# 「そうか……では、実行委員に立候補したのも？」
line = "「そうか……では、実行委員に立候補したのも？」"

[[dialogue]]
speaker = "アポロ"
# 「計画を立てるのも楽しそうだし、なにより実行委員ってカッコイイだろ？」
line = "「計画を立てるのも楽しそうだし、なにより実行委員ってカッコイイだろ？」"

[[dialogue]]
speaker = "舞亜"
# 「あ～、名前ね。確かにかっこいいかも」
line = "「あ～、名前ね。確かにかっこいいかも」"

[[dialogue]]
speaker = "アポロ"
# 「で、ついでだからたまたま通りかかった魔王も誘ったんだ」
line = "「で、ついでだからたまたま通りかかった魔王も誘ったんだ」"

[[dialogue]]
speaker = "unk"
# 何か手伝えればと思って
line = "何か手伝えればと思って"

[[dialogue]]
speaker = "unk"
# ちょっと心配だったから
line = "ちょっと心配だったから"

[[dialogue]]
speaker = "アニュラス"
# 「なるほどな。確かに会長が協力してくれるなら心強い」
line = "「なるほどな。確かに会長が協力してくれるなら心強い」"

[[dialogue]]
speaker = "アニュラス"
# 「だが本当に良かったのか？　新星学園の会長なのに、流星寮の催しの手伝いをさせてしまって」
line = "「だが本当に良かったのか？　新星学園の会長なのに、流星寮の催しの手伝いをさせてしまって」"

[[dialogue]]
speaker = "舞亜"
# 「それもだし、あとこの時期って会長さんは会長さんで忙しいんじゃないの？」
line = "「それもだし、あとこの時期って会長さんは会長さんで忙しいんじゃないの？」"

[[dialogue]]
speaker = "アポロ"
# 「どっちの学園とか関係ないじゃないか。それにヒルディオーネもオッケーだって言ってただろ？」
line = "「どっちの学園とか関係ないじゃないか。それにヒルディオーネもオッケーだって言ってただろ？」"

[[dialogue]]
speaker = "舞亜"
# 「ちょっとごり押し感あったけどね。ま、寮長さんが認めてるならオッケーってことでいいんじゃない？」
line = "「ちょっとごり押し感あったけどね。ま、寮長さんが認めてるならオッケーってことでいいんじゃない？」"

[[dialogue]]
speaker = "アニュラス"
# 「そうだな……会長の仕事の方はどうなんだ？」
line = "「そうだな……会長の仕事の方はどうなんだ？」"

[[dialogue]]
speaker = "unk"
# 手伝える余力はある
line = "手伝える余力はある"

[[dialogue]]
speaker = "unk"
# 大丈夫だよ
line = "大丈夫だよ"

[[dialogue]]
speaker = "アニュラス"
# 「そうか。ならば問題ないな」
line = "「そうか。ならば問題ないな」"

[[dialogue]]
speaker = "舞亜"
# 「遠慮なくバシバシこき使うから覚悟してねっ」
line = "「遠慮なくバシバシこき使うから覚悟してねっ」"

[[dialogue]]
speaker = "unk"
# お、お手柔らかに……
line = "お、お手柔らかに……"

[[dialogue]]
speaker = "アニュラス"
# 「ではそろそろ、本題に入ろうか──」
line = "「ではそろそろ、本題に入ろうか──」"
