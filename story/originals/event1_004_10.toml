[[dialogue]]
speaker = "トマル"
# （あの後の戦いについて、私の口から少しだけ）
line = "（あの後の戦いについて、私の口から少しだけ）"

[[dialogue]]
speaker = "トマル"
# （サチさまが記憶を取り戻してからは、それまでの苦戦が嘘のように、幸運がこちらに舞い込みました）
line = "（サチさまが記憶を取り戻してからは、それまでの苦戦が嘘のように、幸運がこちらに舞い込みました）"

[[dialogue]]
speaker = "トマル"
# （メルクリウスはビームをこれでもかと連射しますが、当たらないと決まっているかのように、突撃するサチさま、プリムラさまを捉えることはなく）
line = "（メルクリウスはビームをこれでもかと連射しますが、当たらないと決まっているかのように、突撃するサチさま、プリムラさまを捉えることはなく）"

[[dialogue]]
speaker = "トマル"
# （私、会長さま、マトイ姉さまはそんな２人を全力で援護）
line = "（私、会長さま、マトイ姉さまはそんな２人を全力で援護）"

[[dialogue]]
speaker = "トマル"
# （距離を詰めた魔法少女のお２人は、まるでダンスを踊るように息ぴったりの連携で、メルクリウスを終始圧倒）
line = "（距離を詰めた魔法少女のお２人は、まるでダンスを踊るように息ぴったりの連携で、メルクリウスを終始圧倒）"

[[dialogue]]
speaker = "トマル"
# （最後は、プリムラさまが強烈なアッパーで、メルクリウスの巨体を天高く打ち上げ――）
line = "（最後は、プリムラさまが強烈なアッパーで、メルクリウスの巨体を天高く打ち上げ――）"

[[dialogue]]
speaker = "サチ"
# 「タイダルフィーバーーーッ！！！」
line = "「タイダルフィーバーーーッ！！！」"

[[dialogue]]
speaker = "トマル"
# （サチさまの幸運を込めた必殺の一撃によって、ロストアイテムはついに、その機能を停止させたのでした――）
line = "（サチさまの幸運を込めた必殺の一撃によって、ロストアイテムはついに、その機能を停止させたのでした――）"

[[dialogue]]
speaker = "unk"
# 記憶のロストアイテムを回収した後、俺たちは受けた傷の治療も兼ねて、保健室に集まっていた。
line = "記憶のロストアイテムを回収した後、俺たちは受けた傷の治療も兼ねて、保健室に集まっていた。"

[[dialogue]]
speaker = "トマル"
# 「はい、サチさま。これで処置は終わりです」
line = "「はい、サチさま。これで処置は終わりです」"

[[dialogue]]
speaker = "サチ"
# 「ありがとう、トマルくん」
line = "「ありがとう、トマルくん」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや～、一時はどうなることかと思いましたが、皆さん、無事でよかったですね～」
line = "「いや～、一時はどうなることかと思いましたが、皆さん、無事でよかったですね～」"

[[dialogue]]
speaker = "マトイ"
# 「本当にね。まさかリクリエの危機にまで発展するとは思わなかったよ……」
line = "「本当にね。まさかリクリエの危機にまで発展するとは思わなかったよ……」"

[[dialogue]]
speaker = "サチ"
# 「マトイ先輩、この度は手伝っていただいて、ありがとうございました。それから、お兄さんも」
line = "「マトイ先輩、この度は手伝っていただいて、ありがとうございました。それから、お兄さんも」"

[[dialogue]]
speaker = "unk"
# 気にしなくていいよ。仲間なんだからさ
line = "気にしなくていいよ。仲間なんだからさ"

[[dialogue]]
speaker = "サチ"
# 「お兄さんの記憶も戻ったみたいで、安心しました。これからまた、よろしくお願いしますね」
line = "「お兄さんの記憶も戻ったみたいで、安心しました。これからまた、よろしくお願いしますね」"

[[dialogue]]
speaker = "マトイ"
# 「私も、ロストアイテムを放っておくとどうなるか、身をもって知っちゃったしね。だから困った時はまた、遠慮なく相談してね。サチちゃん」
line = "「私も、ロストアイテムを放っておくとどうなるか、身をもって知っちゃったしね。だから困った時はまた、遠慮なく相談してね。サチちゃん」"

[[dialogue]]
speaker = "サチ"
# 「はい、先輩にそう言っていただけると、心強いです」
line = "「はい、先輩にそう言っていただけると、心強いです」"

[[dialogue]]
speaker = "サチ"
# 「トマルくんも、今回は色々とフォローしてくれて、ありがとう」
line = "「トマルくんも、今回は色々とフォローしてくれて、ありがとう」"

[[dialogue]]
speaker = "サチ"
# 「保健室であの時、プリムラとのことをアドバイスしてくれたから、土壇場で記憶を取り戻せたんだと思う」
line = "「保健室であの時、プリムラとのことをアドバイスしてくれたから、土壇場で記憶を取り戻せたんだと思う」"

[[dialogue]]
speaker = "トマル"
# 「いえいえ。私はただ、サチさまの友達として、自分のしたかったことをしただけですから」
line = "「いえいえ。私はただ、サチさまの友達として、自分のしたかったことをしただけですから」"

[[dialogue]]
speaker = "トマル"
# 「それがサチさまの助けになったのなら、嬉しく思います」
line = "「それがサチさまの助けになったのなら、嬉しく思います」"

[[dialogue]]
speaker = "サチ"
# 「そっか……ふふっ」
line = "「そっか……ふふっ」"

[[dialogue]]
speaker = "サチ"
# 「トマルくんはやっぱり、美少女だね。見た目も、心も」
line = "「トマルくんはやっぱり、美少女だね。見た目も、心も」"

[[dialogue]]
speaker = "トマル"
# 「サチさまみたいな可愛らしい女性に言っていただけるなんて、光栄です。ふふっ……♪」
line = "「サチさまみたいな可愛らしい女性に言っていただけるなんて、光栄です。ふふっ……♪」"

[[dialogue]]
speaker = "プリムラ"
# 「やれやれ。記憶を奪うロストアイテムが、こんなに面倒くさいとは思わんかったのじゃ。２度と回収したくないぞ」
line = "「やれやれ。記憶を奪うロストアイテムが、こんなに面倒くさいとは思わんかったのじゃ。２度と回収したくないぞ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まあまあ、そのおかげでプリムラさんにも、いいことがあったじゃないですか♪」
line = "「まあまあ、そのおかげでプリムラさんにも、いいことがあったじゃないですか♪」"

[[dialogue]]
speaker = "プリムラ"
# 「いいこと？　なんじゃそれは？」
line = "「いいこと？　なんじゃそれは？」"

[[dialogue]]
speaker = "サチ"
# 「プリムラ」
line = "「プリムラ」"

[[dialogue]]
speaker = "プリムラ"
# 「ん？　なんじゃ、サチ」
line = "「ん？　なんじゃ、サチ」"

[[dialogue]]
speaker = "サチ"
# 「あの、さ……今回のことなんだけど――」
line = "「あの、さ……今回のことなんだけど――」"

[[dialogue]]
speaker = "プリムラ"
# 「記憶を失った時のことか？　戻ったからもういいじゃろ。さすがの我も、今日の戦いは疲れた。怒る気力も残ってないわ」
line = "「記憶を失った時のことか？　戻ったからもういいじゃろ。さすがの我も、今日の戦いは疲れた。怒る気力も残ってないわ」"

[[dialogue]]
speaker = "サチ"
# 「ありがとう」
line = "「ありがとう」"

[[dialogue]]
speaker = "プリムラ"
# 「あ？」
line = "「あ？」"

[[dialogue]]
speaker = "サチ"
# 「攻撃から庇ってくれたこと、それに記憶を奪われた私に怒ってくれたこと」
line = "「攻撃から庇ってくれたこと、それに記憶を奪われた私に怒ってくれたこと」"

[[dialogue]]
speaker = "サチ"
# 「ちゃんとお礼は伝えておかなくちゃと思って。……感謝してる」
line = "「ちゃんとお礼は伝えておかなくちゃと思って。……感謝してる」"

[[dialogue]]
speaker = "プリムラ"
# 「な……」
line = "「な……」"

[[dialogue]]
speaker = "プリムラ"
# 「馬鹿か貴様は！？　い、いきなり何わけわからんことを言い出しとるんじゃ！？」
line = "「馬鹿か貴様は！？　い、いきなり何わけわからんことを言い出しとるんじゃ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「我と貴様の関係で、礼とか……反応に困るじゃろ！　こちとら悪の終末兵器じゃぞ！？」
line = "「我と貴様の関係で、礼とか……反応に困るじゃろ！　こちとら悪の終末兵器じゃぞ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「それをそんな、今まで１度も言ったことない癖に、急に……！　あ～、もう、それなのに……！　貴様というやつはっ！　貴様というやつはぁぁぁ～～～っ！」
line = "「それをそんな、今まで１度も言ったことない癖に、急に……！　あ～、もう、それなのに……！　貴様というやつはっ！　貴様というやつはぁぁぁ～～～っ！」"

[[dialogue]]
speaker = "サチ"
# 「……ふっ……ふふっ……あはっ、あははははははっ」
line = "「……ふっ……ふふっ……あはっ、あははははははっ」"

[[dialogue]]
speaker = "プリムラ"
# 「って、なに笑っとんのじゃお前はぁぁぁっ！」
line = "「って、なに笑っとんのじゃお前はぁぁぁっ！」"

[[dialogue]]
speaker = "サチ"
# 「い、いやプリムラ……そんな顔真っ赤にしているの、見たことないから……あはっ、あははははははっ」
line = "「い、いやプリムラ……そんな顔真っ赤にしているの、見たことないから……あはっ、あははははははっ」"

[[dialogue]]
speaker = "プリムラ"
# 「このっ……！　馬鹿にしとるな貴様！？　ええい、笑うでない！」
line = "「このっ……！　馬鹿にしとるな貴様！？　ええい、笑うでない！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふっ☆　ほら、プリムラさんにもいいことあったでしょう？」
line = "「ふふっ☆　ほら、プリムラさんにもいいことあったでしょう？」"

[[dialogue]]
speaker = "プリムラ"
# 「お、おのれ、貴様ら……！」
line = "「お、おのれ、貴様ら……！」"

[[dialogue]]
speaker = "プリムラ"
# 「我を笑うなど、１０万年早いのじゃあぁぁぁ～～～っ！」
line = "「我を笑うなど、１０万年早いのじゃあぁぁぁ～～～っ！」"

[[dialogue]]
speaker = "トマル"
# 「ああ……そうです。この感じ――」
line = "「ああ……そうです。この感じ――」"

[[dialogue]]
speaker = "トマル"
# 「私の大好きな、いつもの附属校生徒会のお２人が、戻ってきました」
line = "「私の大好きな、いつもの附属校生徒会のお２人が、戻ってきました」"

[[dialogue]]
speaker = "unk"
# サチとプリムラのじゃれ合いを見ながら、トマルは嬉しそうに微笑むのだった――
line = "サチとプリムラのじゃれ合いを見ながら、トマルは嬉しそうに微笑むのだった――"
