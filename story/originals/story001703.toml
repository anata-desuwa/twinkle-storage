[[dialogue]]
speaker = "unk"
# シュティレと出会った翌日──
line = "シュティレと出会った翌日──"

[[dialogue]]
speaker = "シュティレ"
# 「完成しました。こちらがモンスターの装甲を破る発明となります」
line = "「完成しました。こちらがモンスターの装甲を破る発明となります」"

[[dialogue]]
speaker = "unk"
# 早すぎじゃない！？
line = "早すぎじゃない！？"

[[dialogue]]
speaker = "アナ"
# 「自称とはいえ、流石はアニマ先輩の弟子ですね。時間をくれと言われた次の日に成果物が到着する……このやり取り、デジャヴを感じます」
line = "「自称とはいえ、流石はアニマ先輩の弟子ですね。時間をくれと言われた次の日に成果物が到着する……このやり取り、デジャヴを感じます」"

[[dialogue]]
speaker = "シュティレ"
# 「恐縮です。さて、取り出したるこちらは、ドリルナックルです」
line = "「恐縮です。さて、取り出したるこちらは、ドリルナックルです」"

[[dialogue]]
speaker = "アナ"
# 「これは──ガントレットを改造したものですか？」
line = "「これは──ガントレットを改造したものですか？」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。握りの部分から星力を流し込むことで、取りつけてある先端のドリル部分が回転する仕組みとなっています」
line = "「はい。握りの部分から星力を流し込むことで、取りつけてある先端のドリル部分が回転する仕組みとなっています」"

[[dialogue]]
speaker = "シュティレ"
# 「マスターの弱体化薬は、モンスターの装甲を破れないことがネック」
line = "「マスターの弱体化薬は、モンスターの装甲を破れないことがネック」"

[[dialogue]]
speaker = "シュティレ"
# 「そして弱体化薬は、星力総量が低い星騎士こそが扱えなければなりません」
line = "「そして弱体化薬は、星力総量が低い星騎士こそが扱えなければなりません」"

[[dialogue]]
speaker = "シュティレ"
# 「その課題を解決するために、量産が可能な外部アタッチメントを作成すれば良いのでは、と考えました」
line = "「その課題を解決するために、量産が可能な外部アタッチメントを作成すれば良いのでは、と考えました」"

[[dialogue]]
speaker = "アナ"
# 「このドリルナックルが実用に耐えうるなら、非プリマステラでも機械型モンスター相手に有利に立ち回れるかもしれませんね」
line = "「このドリルナックルが実用に耐えうるなら、非プリマステラでも機械型モンスター相手に有利に立ち回れるかもしれませんね」"

[[dialogue]]
speaker = "unk"
# しかし……なぜドリル？
line = "しかし……なぜドリル？"

[[dialogue]]
speaker = "シュティレ"
# 「愚問です。ドリルはロマン」
line = "「愚問です。ドリルはロマン」"

[[dialogue]]
speaker = "アナ"
# 「おお、言い切った」
line = "「おお、言い切った」"

[[dialogue]]
speaker = "シュティレ"
# 「お二人はロボットアニメを視聴されないのですか？　今シーズンの超機動武神ギガンドムでも、ドリルは重要な役目を果たします」
line = "「お二人はロボットアニメを視聴されないのですか？　今シーズンの超機動武神ギガンドムでも、ドリルは重要な役目を果たします」"

[[dialogue]]
speaker = "シュティレ"
# 「１２話にて絶対的なシールドを持つ敵が現れるのですが、新武装ギガンドリルによって敵は葬られました」
line = "「１２話にて絶対的なシールドを持つ敵が現れるのですが、新武装ギガンドリルによって敵は葬られました」"

[[dialogue]]
speaker = "アナ"
# 「ほう。これはそのアニメから着想を得たと？」
line = "「ほう。これはそのアニメから着想を得たと？」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。星騎士が使用可能なギガンドリルを、私の主観と想像で補い、小型化させたのです」
line = "「はい。星騎士が使用可能なギガンドリルを、私の主観と想像で補い、小型化させたのです」"

[[dialogue]]
speaker = "シュティレ"
# 「さて──兵器は持っていて嬉しいコレクションではありません。使って見せなければ」
line = "「さて──兵器は持っていて嬉しいコレクションではありません。使って見せなければ」"

[[dialogue]]
speaker = "シュティレ"
# 「というわけでアナお姉ちゃん。トレーニング施設のモンスターをお願いします。お披露目させてください」
line = "「というわけでアナお姉ちゃん。トレーニング施設のモンスターをお願いします。お披露目させてください」"

[[dialogue]]
speaker = "アナ"
# 「わかりました。準備をしましょう」
line = "「わかりました。準備をしましょう」"

[[dialogue]]
speaker = "unk"
# 数分後──戦闘服へと変身したシュティレがフワッチと向き合った。
line = "数分後──戦闘服へと変身したシュティレがフワッチと向き合った。"

[[dialogue]]
speaker = "アナ"
# 「戦闘シミュレーションを開始。残念ながら、トレーニング施設で機械型モンスターを出現させる技術はまだありません」
line = "「戦闘シミュレーションを開始。残念ながら、トレーニング施設で機械型モンスターを出現させる技術はまだありません」"

[[dialogue]]
speaker = "フワッチ"
# 「イ～～～ッ」
line = "「イ～～～ッ」"

[[dialogue]]
speaker = "アナ"
# 「しかし、兵器の強さを確認するにはこれで十分のはずです。シュティレさん、攻撃をどうぞ」
line = "「しかし、兵器の強さを確認するにはこれで十分のはずです。シュティレさん、攻撃をどうぞ」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。それでは刮目ください。星力をドリルに込めます」
line = "「はい。それでは刮目ください。星力をドリルに込めます」"

[[dialogue]]
speaker = "unk"
# シュティレの持つ星力がドリルナックルに流れ込み、先端がギュィイイン──！！　ともの凄い回転を始めた！
line = "シュティレの持つ星力がドリルナックルに流れ込み、先端がギュィイイン──！！　ともの凄い回転を始めた！"

[[dialogue]]
speaker = "シュティレ"
# 「砕け散れ！　ギガンドリル・プレッシャー！」
line = "「砕け散れ！　ギガンドリル・プレッシャー！」"

[[dialogue]]
speaker = "アナ"
# 「おお、ドリルがフワッチに突き刺さって──えっ！？」
line = "「おお、ドリルがフワッチに突き刺さって──えっ！？」"

[[dialogue]]
speaker = "unk"
# ギュガガガガガァァ──！！
line = "ギュガガガガガァァ──！！"

[[dialogue]]
speaker = "フワッチ"
# 「イィイィィイィイィイイイ～～～～っ！？」
line = "「イィイィィイィイィイイイ～～～～っ！？」"

[[dialogue]]
speaker = "unk"
# フワッチーーー！？
line = "フワッチーーー！？"

[[dialogue]]
speaker = "unk"
# 高速回転する鋼鉄のドリルによって、フワッチの体が内側から破壊されていく。
line = "高速回転する鋼鉄のドリルによって、フワッチの体が内側から破壊されていく。"

[[dialogue]]
speaker = "シュティレ"
# 「ふぅ……殲滅完了です。ぶい」
line = "「ふぅ……殲滅完了です。ぶい」"

[[dialogue]]
speaker = "unk"
# シュティレの足元には、モザイクなしでは見せられないような姿のフワッチが……！
line = "シュティレの足元には、モザイクなしでは見せられないような姿のフワッチが……！"

[[dialogue]]
speaker = "シュティレ"
# 「いかがでしたかアナお姉ちゃん、私の発明は。ドリルがロマンであること、しっかりアピールできたかと」
line = "「いかがでしたかアナお姉ちゃん、私の発明は。ドリルがロマンであること、しっかりアピールできたかと」"

[[dialogue]]
speaker = "アナ"
# 「……木っ端ミジンコよ～、でした」
line = "「……木っ端ミジンコよ～、でした」"

[[dialogue]]
speaker = "unk"
# フワッチ……おいたわしや……
line = "フワッチ……おいたわしや……"

[[dialogue]]
speaker = "アナ"
# 「流石はアニマ先輩が評価するだけありますね。星力と機械技術をこれだけ組み合わせた逸品を作り上げてしまうとは」
line = "「流石はアニマ先輩が評価するだけありますね。星力と機械技術をこれだけ組み合わせた逸品を作り上げてしまうとは」"

[[dialogue]]
speaker = "アナ"
# 「まだ流星附属の１年生ですよね？　将来が楽しみです」
line = "「まだ流星附属の１年生ですよね？　将来が楽しみです」"

[[dialogue]]
speaker = "シュティレ"
# 「褒められました。ぶいぶい。ドリルもぎゅいんぎゅいん」
line = "「褒められました。ぶいぶい。ドリルもぎゅいんぎゅいん」"

[[dialogue]]
speaker = "アナ"
# 「あの、危ないのでモンスターがいない場所では回転させないように」
line = "「あの、危ないのでモンスターがいない場所では回転させないように」"

[[dialogue]]
speaker = "unk"
# アニマ先輩の言っていた通り、シュティレも素晴らしい才能を持っているようだ。
line = "アニマ先輩の言っていた通り、シュティレも素晴らしい才能を持っているようだ。"

[[dialogue]]
speaker = "シュティレ"
# 「この呼び出し音は──」
line = "「この呼び出し音は──」"

[[dialogue]]
speaker = "アナ"
# 「モンスター発見のアラームですね。市街地に……これは機械型モンスターの反応です！」
line = "「モンスター発見のアラームですね。市街地に……これは機械型モンスターの反応です！」"

[[dialogue]]
speaker = "unk"
# 実戦データが収集できるな
line = "実戦データが収集できるな"

[[dialogue]]
speaker = "unk"
# ちょうどいい！
line = "ちょうどいい！"

[[dialogue]]
speaker = "アナ"
# 「はい。シュティレさん、あなたも連れて行きます。ですが敵は手強い。必ず会長の指示を守ってください」
line = "「はい。シュティレさん、あなたも連れて行きます。ですが敵は手強い。必ず会長の指示を守ってください」"

[[dialogue]]
speaker = "シュティレ"
# 「承りました。マスターの顔に泥を塗らぬよう、全力でお供いたします」
line = "「承りました。マスターの顔に泥を塗らぬよう、全力でお供いたします」"

[[dialogue]]
speaker = "unk"
# 結論から言うと、機械型モンスターの強靭な外殻を、シュティレのドリルは突破できなかった。
line = "結論から言うと、機械型モンスターの強靭な外殻を、シュティレのドリルは突破できなかった。"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「これでトドメよ──フィンブル・ストライク！」
line = "「これでトドメよ──フィンブル・ストライク！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「お疲れ様～。みんな、怪我はない？」
line = "「お疲れ様～。みんな、怪我はない？」"

[[dialogue]]
speaker = "unk"
# シュティレの安全を確保するため、ノヴァフォームを操れるサーシャ先輩を呼んでいて正解だった。
line = "シュティレの安全を確保するため、ノヴァフォームを操れるサーシャ先輩を呼んでいて正解だった。"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです。助かりました、サーシャ先輩」
line = "「ノープロブレムです。助かりました、サーシャ先輩」"

[[dialogue]]
speaker = "シュティレ"
# 「これがノヴァフォームの戦闘力……素晴らしい火力です。感服いたしました」
line = "「これがノヴァフォームの戦闘力……素晴らしい火力です。感服いたしました」"

[[dialogue]]
speaker = "サーシャ"
# 「うんうん、ところでアナちゃん……聞いてもいいかしら？」
line = "「うんうん、ところでアナちゃん……聞いてもいいかしら？」"

[[dialogue]]
speaker = "アナ"
# 「はい、なんなりと」
line = "「はい、なんなりと」"

[[dialogue]]
speaker = "サーシャ"
# 「こちらのと～ってもキュートで、お姉ちゃん心をくすぐるちっちゃな星騎士ちゃんはだあれ？」
line = "「こちらのと～ってもキュートで、お姉ちゃん心をくすぐるちっちゃな星騎士ちゃんはだあれ？」"

[[dialogue]]
speaker = "アナ"
# 「ご紹介します。流星附属１年の不動シュティレさんです」
line = "「ご紹介します。流星附属１年の不動シュティレさんです」"

[[dialogue]]
speaker = "シュティレ"
# 「初めまして。購買部で美少女看板娘２号をやっております。趣味はロボットアニメ鑑賞とラーメン屋めぐり。嫌いなものは納豆です」
line = "「初めまして。購買部で美少女看板娘２号をやっております。趣味はロボットアニメ鑑賞とラーメン屋めぐり。嫌いなものは納豆です」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～ん♪　とっても可愛いわ～<emoji=heart04>　機械型モンスターが相手で怖かったでしょ？　お姉ちゃんがナデナデしてあげる～<emoji=heart04>」
line = "「あ～ん♪　とっても可愛いわ～<emoji=heart04>　機械型モンスターが相手で怖かったでしょ？　お姉ちゃんがナデナデしてあげる～<emoji=heart04>」"

[[dialogue]]
speaker = "シュティレ"
# 「いただけるものは何でも貰う。それが不動家の教えです。どうぞ、シュティレのサラサラショートカットの頭をご査収ください」
line = "「いただけるものは何でも貰う。それが不動家の教えです。どうぞ、シュティレのサラサラショートカットの頭をご査収ください」"

[[dialogue]]
speaker = "サーシャ"
# 「まあ♪　これはご丁寧に～<emoji=heart04>　うふふ、ナデナデ、ナデナデ～<emoji=heart04>」
line = "「まあ♪　これはご丁寧に～<emoji=heart04>　うふふ、ナデナデ、ナデナデ～<emoji=heart04>」"

[[dialogue]]
speaker = "アナ"
# 「むむっ……」
line = "「むむっ……」"

[[dialogue]]
speaker = "サーシャ"
# 「──はっ！？　お姉ちゃんセンサーが今、嫉妬の波動を背中に感じたわ……！　この気配は……アナちゃんね！！」
line = "「──はっ！？　お姉ちゃんセンサーが今、嫉妬の波動を背中に感じたわ……！　この気配は……アナちゃんね！！」"

[[dialogue]]
speaker = "アナ"
# 「……そんなものは出していません。サーシャ先輩の気のせいです」
line = "「……そんなものは出していません。サーシャ先輩の気のせいです」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。普段はすげなく断ってるけど、本当は寂しいのね？　大丈夫よ～、サーシャお姉ちゃんは反抗期の妹のお相手も慣れっこだから♪」
line = "「うふふ。普段はすげなく断ってるけど、本当は寂しいのね？　大丈夫よ～、サーシャお姉ちゃんは反抗期の妹のお相手も慣れっこだから♪」"

[[dialogue]]
speaker = "アナ"
# 「ですから、嫉妬なんてしていません」
line = "「ですから、嫉妬なんてしていません」"

[[dialogue]]
speaker = "unk"
# そっけなく言っているけれど、アナは新星星徒会最年少ということもあり、甘やかされることも多い。
line = "そっけなく言っているけれど、アナは新星星徒会最年少ということもあり、甘やかされることも多い。"

[[dialogue]]
speaker = "unk"
# サーシャさんがシュティレばかりに構っているのは、ちょっぴり面白くないのかもしれない。
line = "サーシャさんがシュティレばかりに構っているのは、ちょっぴり面白くないのかもしれない。"

[[dialogue]]
speaker = "シュティレ"
# 「ふう。サーシャ先輩、いえ、サーシャお姉ちゃんのナデナデは素晴らしいです。ドリルが通じなかったショックが和らぎました」
line = "「ふう。サーシャ先輩、いえ、サーシャお姉ちゃんのナデナデは素晴らしいです。ドリルが通じなかったショックが和らぎました」"

[[dialogue]]
speaker = "サーシャ"
# 「あん、呼び方まで変わっちゃった。とっても素直で可愛い後輩ちゃんね～♪」
line = "「あん、呼び方まで変わっちゃった。とっても素直で可愛い後輩ちゃんね～♪」"

[[dialogue]]
speaker = "シュティレ"
# 「この流れで、アナお姉ちゃんにも撫でてもらうことにします。シュティレは頑張りました、褒めてください」
line = "「この流れで、アナお姉ちゃんにも撫でてもらうことにします。シュティレは頑張りました、褒めてください」"

[[dialogue]]
speaker = "アナ"
# 「えっ──」
line = "「えっ──」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　新鮮な展開ね～」
line = "「あらあら、うふふ♪　新鮮な展開ね～」"

[[dialogue]]
speaker = "アナ"
# 「私が……？」
line = "「私が……？」"

[[dialogue]]
speaker = "シュティレ"
# 「はい。シュティレは後輩で、アナお姉ちゃんは先輩です。甘えたいです」
line = "「はい。シュティレは後輩で、アナお姉ちゃんは先輩です。甘えたいです」"

[[dialogue]]
speaker = "アナ"
# 「…………で、では、少しだけ」
line = "「…………で、では、少しだけ」"

[[dialogue]]
speaker = "シュティレ"
# 「アナお姉ちゃんの妹ポジもゲットです。ぶい」
line = "「アナお姉ちゃんの妹ポジもゲットです。ぶい」"

[[dialogue]]
speaker = "unk"
# 照れつつも、シュティレの頭をナデナデするアナなのだった──
line = "照れつつも、シュティレの頭をナデナデするアナなのだった──"

[[dialogue]]
speaker = "unk"
# 戦闘が終わった後、シュティレが駅前の広場に行きたいと言い出した。
line = "戦闘が終わった後、シュティレが駅前の広場に行きたいと言い出した。"

[[dialogue]]
speaker = "unk"
# シュティレの好きなロボットアニメの立像展示が、ちょうど今日から始まるらしい──
line = "シュティレの好きなロボットアニメの立像展示が、ちょうど今日から始まるらしい──"

[[dialogue]]
speaker = "アナ"
# 「おお、これが……！」
line = "「おお、これが……！」"

[[dialogue]]
speaker = "unk"
# すごい、ギガンドムだ……！
line = "すごい、ギガンドムだ……！"

[[dialogue]]
speaker = "シュティレ"
# 「はい。アニメ・超機動武神ギガンドムにて、主人公が搭乗する機体。そちらの実物展示になります。眼福の極み」
line = "「はい。アニメ・超機動武神ギガンドムにて、主人公が搭乗する機体。そちらの実物展示になります。眼福の極み」"

[[dialogue]]
speaker = "サーシャ"
# 「すごい迫力ね～……！　お姉ちゃん、ロボットアニメは全然詳しくないんだけど、人気なの？」
line = "「すごい迫力ね～……！　お姉ちゃん、ロボットアニメは全然詳しくないんだけど、人気なの？」"

[[dialogue]]
speaker = "シュティレ"
# 「もちろんです。人間界で育ってギガンドムを知らない者はおりません」
line = "「もちろんです。人間界で育ってギガンドムを知らない者はおりません」"

[[dialogue]]
speaker = "アナ"
# 「私たち留学生組には初見ですが……いえ。コンビニなどでこのロボットが印刷されたお菓子の箱を見たことがありますね」
line = "「私たち留学生組には初見ですが……いえ。コンビニなどでこのロボットが印刷されたお菓子の箱を見たことがありますね」"

[[dialogue]]
speaker = "unk"
# ギガンドム、懐かしいなぁ……！
line = "ギガンドム、懐かしいなぁ……！"

[[dialogue]]
speaker = "シュティレ"
# 「会長のテンション上昇を確認。私も嬉しいです……こうして悠然と立ち、身じろぎするギガンドムを見られるだなんて」
line = "「会長のテンション上昇を確認。私も嬉しいです……こうして悠然と立ち、身じろぎするギガンドムを見られるだなんて」"

[[dialogue]]
speaker = "unk"
# 数十分おきに、ギガンドムは小さく身じろぎをしたり、スモークを吐き出したりして、通行人を楽しませる仕組みになっているらしい。
line = "数十分おきに、ギガンドムは小さく身じろぎをしたり、スモークを吐き出したりして、通行人を楽しませる仕組みになっているらしい。"

[[dialogue]]
speaker = "unk"
# 小さい頃に夢中になったロボットの実物展示を見られるだなんて、感激だ。
line = "小さい頃に夢中になったロボットの実物展示を見られるだなんて、感激だ。"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ、シュティレちゃんってば、目をキラキラさせちゃって。クールな子かなって思ってたのに、可愛い所もあるのね～」
line = "「うふふ、シュティレちゃんってば、目をキラキラさせちゃって。クールな子かなって思ってたのに、可愛い所もあるのね～」"

[[dialogue]]
speaker = "シュティレ"
# 「表情筋は未発達ですが、スーパーロボットに対する熱い想いは誰にも負けません」
line = "「表情筋は未発達ですが、スーパーロボットに対する熱い想いは誰にも負けません」"

[[dialogue]]
speaker = "アナ"
# 「そんなに面白いアニメなのですか、ギガンドム」
line = "「そんなに面白いアニメなのですか、ギガンドム」"

[[dialogue]]
speaker = "シュティレ"
# 「もちろんです。息の長いアニメなので、シリーズは両手で収まりきらないほどあります」
line = "「もちろんです。息の長いアニメなので、シリーズは両手で収まりきらないほどあります」"

[[dialogue]]
speaker = "シュティレ"
# 「初見の方にはまず全４８話のファーストギガンドムをオススメしています。起源にして頂点と言えましょう」
line = "「初見の方にはまず全４８話のファーストギガンドムをオススメしています。起源にして頂点と言えましょう」"

[[dialogue]]
speaker = "アナ"
# 「シュティレさんが好むアニメ、少し興味が湧いてきました。今度、時間を作って見てみますね」
line = "「シュティレさんが好むアニメ、少し興味が湧いてきました。今度、時間を作って見てみますね」"

[[dialogue]]
speaker = "シュティレ"
# 「なんと……感激です。マスターは誘っても、なかなか頷いてくれないので」
line = "「なんと……感激です。マスターは誘っても、なかなか頷いてくれないので」"

[[dialogue]]
speaker = "アナ"
# 「人間界の文化は何でも知りたいです。せっかくの留学ですから」
line = "「人間界の文化は何でも知りたいです。せっかくの留学ですから」"

[[dialogue]]
speaker = "シュティレ"
# 「では、サーシャお姉ちゃんと会長もぜひご一緒に」
line = "「では、サーシャお姉ちゃんと会長もぜひご一緒に」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ、もちろんよ～。可愛い妹のおねだりは断れないものね♪」
line = "「うふふ、もちろんよ～。可愛い妹のおねだりは断れないものね♪」"

[[dialogue]]
speaker = "unk"
# その後、シュティレの趣味である自撮り（無表情）撮影をギガンドムの前でこなして。
line = "その後、シュティレの趣味である自撮り（無表情）撮影をギガンドムの前でこなして。"

[[dialogue]]
speaker = "unk"
# ギガンドムのアニメを４人で鑑賞してから、その日は解散となったのだった──
line = "ギガンドムのアニメを４人で鑑賞してから、その日は解散となったのだった──"

[[dialogue]]
speaker = "unk"
# その日の夜──トレーニング施設を訪れた人影がひとつ。
line = "その日の夜──トレーニング施設を訪れた人影がひとつ。"

[[dialogue]]
speaker = "アナ"
# 「モンスター数、最大。敵戦力のステータス数値、最大。ウェーブ数１０……いや、２０に設定」
line = "「モンスター数、最大。敵戦力のステータス数値、最大。ウェーブ数１０……いや、２０に設定」"

[[dialogue]]
speaker = "unk"
# ──新星星徒会副会長のアナは、黙々とパネルを操作する。
line = "──新星星徒会副会長のアナは、黙々とパネルを操作する。"

[[dialogue]]
speaker = "unk"
# 生徒を危険にさらさないよう、トワ先生が設定している安全用リミッターを勝手に解除しての操作。見つかれば叱責は免れない。
line = "生徒を危険にさらさないよう、トワ先生が設定している安全用リミッターを勝手に解除しての操作。見つかれば叱責は免れない。"

[[dialogue]]
speaker = "unk"
# 会長であるクロトにも、バレればきっと怒られてしまうだろう。ルールを破った事ではなく、危険なトレーニングを１人で行ったことを心配して。
line = "会長であるクロトにも、バレればきっと怒られてしまうだろう。ルールを破った事ではなく、危険なトレーニングを１人で行ったことを心配して。"

[[dialogue]]
speaker = "unk"
# けれどアナは操作を止めない。自分が意識を失うか否か、限界ぎりぎりの数値をパネルへ打ち込んでいく。
line = "けれどアナは操作を止めない。自分が意識を失うか否か、限界ぎりぎりの数値をパネルへ打ち込んでいく。"

[[dialogue]]
speaker = "アナ"
# 「今日も戦闘で、役に立てなかった……」
line = "「今日も戦闘で、役に立てなかった……」"

[[dialogue]]
speaker = "unk"
# ノヴァフォームに覚醒できないことに対する、焦り。
line = "ノヴァフォームに覚醒できないことに対する、焦り。"

[[dialogue]]
speaker = "unk"
# 特に今は、自分に懐いてくれる流星附属の後輩がいる。いつまでも弱いままではいられない。
line = "特に今は、自分に懐いてくれる流星附属の後輩がいる。いつまでも弱いままではいられない。"

[[dialogue]]
speaker = "アナ"
# 「プラネットマルス、セット──」
line = "「プラネットマルス、セット──」"

[[dialogue]]
speaker = "unk"
# アナのノヴァフォーム覚醒のためのハードトレーニングは、日付けが変わってもひたすらに続くのだった──
line = "アナのノヴァフォーム覚醒のためのハードトレーニングは、日付けが変わってもひたすらに続くのだった──"
