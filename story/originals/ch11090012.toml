[[dialogue]]
speaker = "unk"
# 第２話,アテネスと夢幻美術館,P
line = "第２話,アテネスと夢幻美術館,P"

[[dialogue]]
speaker = "unk"
# アルテはこちらの世界にいる間、九浄家に身を寄せている。
line = "アルテはこちらの世界にいる間、九浄家に身を寄せている。"

[[dialogue]]
speaker = "unk"
# 何だかんだ要領の良さそうなアルテのことだから、上手くやっているのだろうとは思ったが、念のため様子を見に来た。
line = "何だかんだ要領の良さそうなアルテのことだから、上手くやっているのだろうとは思ったが、念のため様子を見に来た。"

[[dialogue]]
speaker = "ヘレナ"
# 「──『アテネス』か……聞けば聞くほど興味深い世界だな」
line = "「──『アテネス』か……聞けば聞くほど興味深い世界だな」"

[[dialogue]]
speaker = "アルテ"
# 「アテネスは世界最大の芸術都市ですからね。世界中から私のような一流の藝術家や芸術品が集まってきます」
line = "「アテネスは世界最大の芸術都市ですからね。世界中から私のような一流の藝術家や芸術品が集まってきます」"

[[dialogue]]
speaker = "アルテ"
# 「そして、そんな芸術品の数々には魂が宿ります」
line = "「そして、そんな芸術品の数々には魂が宿ります」"

[[dialogue]]
speaker = "アルテ"
# 「それらが覚醒して人の姿をとったものがイマージュというわけです」
line = "「それらが覚醒して人の姿をとったものがイマージュというわけです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へえ……じゃあ夢幻美術館には藝術家の他にも、そのイマージュたちが一緒に暮らしてるんだ」
line = "「へえ……じゃあ夢幻美術館には藝術家の他にも、そのイマージュたちが一緒に暮らしてるんだ」"

[[dialogue]]
speaker = "アルテ"
# 「そういうことですね」
line = "「そういうことですね」"

[[dialogue]]
speaker = "unk"
# 夢のある世界だなあ
line = "夢のある世界だなあ"

[[dialogue]]
speaker = "アルテ"
# 「良いことばかりではありませんよ」
line = "「良いことばかりではありませんよ」"

[[dialogue]]
speaker = "アルテ"
# 「一流の藝術家が集まり、一流の芸術品が生み出されれば、それを狙う賊も集まってくるわけです」
line = "「一流の藝術家が集まり、一流の芸術品が生み出されれば、それを狙う賊も集まってくるわけです」"

[[dialogue]]
speaker = "アルテ"
# 「そういった不届き者から芸術品たちを守り、街の治安維持に貢献するのも私たちの役目でした」
line = "「そういった不届き者から芸術品たちを守り、街の治安維持に貢献するのも私たちの役目でした」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿らは自らそういった輩に対抗していたのか？」
line = "「貴殿らは自らそういった輩に対抗していたのか？」"

[[dialogue]]
speaker = "アルテ"
# 「ええ。もちろん市警はいるんですが、市警ではどうしようもないこともあるので」
line = "「ええ。もちろん市警はいるんですが、市警ではどうしようもないこともあるので」"

[[dialogue]]
speaker = "アルテ"
# 「それに、芸術から生まれるのはイマージュばかりではありません。負の感情から生まれた芸術品は、人々を襲う『死の芸術』になることもあるんです」
line = "「それに、芸術から生まれるのはイマージュばかりではありません。負の感情から生まれた芸術品は、人々を襲う『死の芸術』になることもあるんです」"

[[dialogue]]
speaker = "アルテ"
# 「そんな『死の芸術』と、それらを故意に生み出す『死の芸術家』を、市警が相手にするのは難しいですからね。私たち藝術家とイマージュの出番、というわけです」
line = "「そんな『死の芸術』と、それらを故意に生み出す『死の芸術家』を、市警が相手にするのは難しいですからね。私たち藝術家とイマージュの出番、というわけです」"

[[dialogue]]
speaker = "unk"
# そっちの世界もいろいろ大変なんだな
line = "そっちの世界もいろいろ大変なんだな"

[[dialogue]]
speaker = "アルテ"
# 「まあ私たちも１人ではありません。大勢の仲間がいますから」
line = "「まあ私たちも１人ではありません。大勢の仲間がいますから」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ……しかしそんな大勢が暮らしているとなると、夢幻美術館というのは相当な大きさなのだろうな」
line = "「ふむ……しかしそんな大勢が暮らしているとなると、夢幻美術館というのは相当な大きさなのだろうな」"

[[dialogue]]
speaker = "アルテ"
# 「そうですね。初めてだと、建物の中で迷子になってしまう子もいるほどです」
line = "「そうですね。初めてだと、建物の中で迷子になってしまう子もいるほどです」"

[[dialogue]]
speaker = "ヘレナ"
# 「そんなに大きな建物なのか……これは大事業になりそうだな」
line = "「そんなに大きな建物なのか……これは大事業になりそうだな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃん、もしかして？」
line = "「ヘレナちゃん、もしかして？」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ！　我が九浄家も美術館の建設に着手しようと思ってな！」
line = "「うむ！　我が九浄家も美術館の建設に着手しようと思ってな！」"

[[dialogue]]
speaker = "unk"
# またそんな思い付きで……
line = "またそんな思い付きで……"

[[dialogue]]
speaker = "ヘレナ"
# 「思い付きではないぞ……私も以前より美術品を収集する趣味があってな。いっそそれらを展示する場所を用意したいと考えていたのだ」
line = "「思い付きではないぞ……私も以前より美術品を収集する趣味があってな。いっそそれらを展示する場所を用意したいと考えていたのだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿の話す夢幻美術館は、まさに私の理想とする美術館のそれだ。ぜひ色々な意見を聞かせて欲しい」
line = "「貴殿の話す夢幻美術館は、まさに私の理想とする美術館のそれだ。ぜひ色々な意見を聞かせて欲しい」"

[[dialogue]]
speaker = "アルテ"
# 「そうですね……」
line = "「そうですね……」"

[[dialogue]]
speaker = "アルテ"
# 「私から言えることがひとつだけあるとしたら、それは美術館の管理者がとても重要な存在だということです」
line = "「私から言えることがひとつだけあるとしたら、それは美術館の管理者がとても重要な存在だということです」"

[[dialogue]]
speaker = "アルテ"
# 「夢幻美術館では、先代から今の館長に引き継がれる間に、館長不在の期間があったらしいのですが、それだけで一瞬で廃れたと聞いていますからね」
line = "「夢幻美術館では、先代から今の館長に引き継がれる間に、館長不在の期間があったらしいのですが、それだけで一瞬で廃れたと聞いていますからね」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほう。では館長不在で一度廃れた美術館を、今の館長がその手腕によって立て直した、ということか」
line = "「ほう。では館長不在で一度廃れた美術館を、今の館長がその手腕によって立て直した、ということか」"

[[dialogue]]
speaker = "アルテ"
# 「ん……まあ……そういうことですね」
line = "「ん……まあ……そういうことですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「急に歯切れが悪くなったわね。今の館長さん、ダメな人なの？」
line = "「急に歯切れが悪くなったわね。今の館長さん、ダメな人なの？」"

[[dialogue]]
speaker = "アルテ"
# 「そういうわけではありません。……優秀な部類の人ではあると思います。さすがにそれは認めないわけにはいきません」
line = "「そういうわけではありません。……優秀な部類の人ではあると思います。さすがにそれは認めないわけにはいきません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ何が不満なの？　仕事はできる人なんでしょ？」
line = "「じゃあ何が不満なの？　仕事はできる人なんでしょ？」"

[[dialogue]]
speaker = "アルテ"
# 「それも……少し違うというか、何と言ったらいいのでしょうね……」
line = "「それも……少し違うというか、何と言ったらいいのでしょうね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあやっぱりダメな人なの？」
line = "「じゃあやっぱりダメな人なの？」"

[[dialogue]]
speaker = "アルテ"
# 「……そんなことはありません。まがりなりにも館長ですので」
line = "「……そんなことはありません。まがりなりにも館長ですので」"

[[dialogue]]
speaker = "アルテ"
# 「私を見つけて夢幻美術館に連れてきたことは大きな功績です。ええ、館長の最大のお手柄と言ってもいいでしょう」
line = "「私を見つけて夢幻美術館に連れてきたことは大きな功績です。ええ、館長の最大のお手柄と言ってもいいでしょう」"

[[dialogue]]
speaker = "アルテ"
# 「ただ、色々と頼りなかったり危なっかしかったりするのです。お人好しで、人のフォローをして自分の仕事をため込んで、夜も遅くて徹夜もしばしば……」
line = "「ただ、色々と頼りなかったり危なっかしかったりするのです。お人好しで、人のフォローをして自分の仕事をため込んで、夜も遅くて徹夜もしばしば……」"

[[dialogue]]
speaker = "アルテ"
# 「だから私が一緒に行動してサポートしてあげなくてはならない、困った人なのです」
line = "「だから私が一緒に行動してサポートしてあげなくてはならない、困った人なのです」"

[[dialogue]]
speaker = "ヴィーナス"
# （ねえねえ、クロト。私だんだん分かってきたんだけど、アルテがこういう憎まれ口を叩く時って……）
line = "（ねえねえ、クロト。私だんだん分かってきたんだけど、アルテがこういう憎まれ口を叩く時って……）"

[[dialogue]]
speaker = "unk"
# むしろ心を許してる人？
line = "むしろ心を許してる人？"

[[dialogue]]
speaker = "アルテ"
# 「こほん……そこの２人、何をこそこそ話しているのですか？」
line = "「こほん……そこの２人、何をこそこそ話しているのですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふん、べっつに～♪」
line = "「ふふん、べっつに～♪」"

[[dialogue]]
speaker = "アルテ"
# 「変な勘違いはやめて頂けますか？　迷惑なので」
line = "「変な勘違いはやめて頂けますか？　迷惑なので」"

[[dialogue]]
speaker = "ヘレナ"
# 「要するに、だ。美術館を誰に任せるか、それはとても重要な問題ということだな」
line = "「要するに、だ。美術館を誰に任せるか、それはとても重要な問題ということだな」"

[[dialogue]]
speaker = "アルテ"
# 「ええ、そういうことです」
line = "「ええ、そういうことです」"

[[dialogue]]
speaker = "unk"
# 答えながら、プイッと俺たちから顔を反らすアルテ。
line = "答えながら、プイッと俺たちから顔を反らすアルテ。"

[[dialogue]]
speaker = "unk"
# そんな珍しく可愛げのある様子を見せてくれたアルテに、ホッコリした気持ちになる俺とヴィーナスだった。
line = "そんな珍しく可愛げのある様子を見せてくれたアルテに、ホッコリした気持ちになる俺とヴィーナスだった。"
