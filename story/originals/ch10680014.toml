# 「最後に一度だけ先輩が模擬戦に付き合ってあげる」
line = "「最後に一度だけ先輩が模擬戦に付き合ってあげる」"

[[dialogue]]
speaker = "リア"
# 「私に勝てたら、このまま好きなだけ訓練していていいから。その代わり私に負けたら素直に帰るんだよ？」
line = "「私に勝てたら、このまま好きなだけ訓練していていいから。その代わり私に負けたら素直に帰るんだよ？」"

