[[dialogue]]
speaker = "unk"
# 第４話,甘えちゃっていいんだゾ♪,P
line = "第４話,甘えちゃっていいんだゾ♪,P"

[[dialogue]]
speaker = "リア"
# 「こ～ら。いつまで訓練してるの？　もう帰宅時間でしょ？」
line = "「こ～ら。いつまで訓練してるの？　もう帰宅時間でしょ？」"

[[dialogue]]
speaker = "リア"
# 「帰り道でみんなと別れた後、こそこそ一人で学園に引き返して行ってるなーっと思ったら、まさか戻ってこんなことしてるなんて」
line = "「帰り道でみんなと別れた後、こそこそ一人で学園に引き返して行ってるなーっと思ったら、まさか戻ってこんなことしてるなんて」"

[[dialogue]]
speaker = "リア"
# 「もしかして……毎日こんな夜遅くまで一人で訓練してるの？　ただでさえ今日はみんなと朝から模擬戦ばっかりしてたじゃない」
line = "「もしかして……毎日こんな夜遅くまで一人で訓練してるの？　ただでさえ今日はみんなと朝から模擬戦ばっかりしてたじゃない」"

[[dialogue]]
speaker = "リア"
# 「体もフラついてるみたいだし、今日は大人しく帰った方がいいよ。無理のしすぎは良くないから」
line = "「体もフラついてるみたいだし、今日は大人しく帰った方がいいよ。無理のしすぎは良くないから」"

[[dialogue]]
speaker = "リア"
