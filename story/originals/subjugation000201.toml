[[dialogue]]
speaker = "unk"
# 学園の夏季休暇も終わりに近付きつつある、ある日のこと。
line = "学園の夏季休暇も終わりに近付きつつある、ある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は、サーシャさん、アナと共に再び、リップルのリゾート結界へとやって来ていた。
line = "俺は、サーシャさん、アナと共に再び、リップルのリゾート結界へとやって来ていた。"

[[dialogue]]
speaker = "アナ"
# 「……さて、サーシャ先輩、会長。準備はよろしいですか？」
line = "「……さて、サーシャ先輩、会長。準備はよろしいですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い♪　大丈夫よ～」
line = "「は～い♪　大丈夫よ～」"

[[dialogue]]
speaker = "unk"
# こっちもＯＫだ！
line = "こっちもＯＫだ！"

[[dialogue]]
speaker = "アナ"
# 「では――」
line = "「では――」"

[[dialogue]]
speaker = "アナ"
# 「サバイバル合宿を開始しましょう」
line = "「サバイバル合宿を開始しましょう」"

[[dialogue]]
speaker = "サーシャ"
# 「お～♪」
line = "「お～♪」"

[[dialogue]]
speaker = "unk"
# なぜ俺達３人が再び合宿をすることになったのかというと、時間は前日まで遡る――
line = "なぜ俺達３人が再び合宿をすることになったのかというと、時間は前日まで遡る――"

[[dialogue]]
speaker = "アナ"
# 「会長、こちらの書類も終わりました」
line = "「会長、こちらの書類も終わりました」"

[[dialogue]]
speaker = "サーシャ"
# 「私の方も終わったわ～。これで溜まっていた書類は、全部片付いたわね～」
line = "「私の方も終わったわ～。これで溜まっていた書類は、全部片付いたわね～」"

[[dialogue]]
speaker = "unk"
# ２人共、ありがとう
line = "２人共、ありがとう"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。会長を補佐するのが、副会長の務めですので」
line = "「ノープロブレム。会長を補佐するのが、副会長の務めですので」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ♪　アナちゃん、副会長として、もうすっかりベテランね～」
line = "「ふふっ♪　アナちゃん、副会長として、もうすっかりベテランね～」"

[[dialogue]]
speaker = "アナ"
# 「前会長は親戚同士の集まりで遠出中、マトイ先輩がお母様のご実家に帰省中で、不在の間、お２人の留守を頼まれていますから」
line = "「前会長は親戚同士の集まりで遠出中、マトイ先輩がお母様のご実家に帰省中で、不在の間、お２人の留守を頼まれていますから」"

[[dialogue]]
speaker = "unk"
# ２人はいつ頃帰って来るんだっけ？
line = "２人はいつ頃帰って来るんだっけ？"

[[dialogue]]
speaker = "アナ"
# 「お２人共、今週末には帰って来るそうですよ。留守番の報酬として、ご当地の和菓子を買ってきて貰う約束になってます……わくわく」
line = "「お２人共、今週末には帰って来るそうですよ。留守番の報酬として、ご当地の和菓子を買ってきて貰う約束になってます……わくわく」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら♪　いつもより張り切って仕事してると思ったら、そのせいだったのね～」
line = "「あらあら♪　いつもより張り切って仕事してると思ったら、そのせいだったのね～」"

[[dialogue]]
speaker = "サーシャ"
# 「あ、そうだわ。話は変わるけど、会長くんとアナちゃんは、リップルちゃんのこと聞いた？」
line = "「あ、そうだわ。話は変わるけど、会長くんとアナちゃんは、リップルちゃんのこと聞いた？」"

[[dialogue]]
speaker = "アナ"
# 「無人島での夏合宿の後、リップルさんが転入して来て、学園の生徒達に向けてリゾート結界を開放したんですよね」
line = "「無人島での夏合宿の後、リップルさんが転入して来て、学園の生徒達に向けてリゾート結界を開放したんですよね」"

[[dialogue]]
speaker = "サーシャ"
# 「そうそう。それでリゾート結界とリップルちゃんの海の家……たちまち人気になって、凄く繁盛しているんですって♪」
line = "「そうそう。それでリゾート結界とリップルちゃんの海の家……たちまち人気になって、凄く繁盛しているんですって♪」"

[[dialogue]]
speaker = "アナ"
# 「リゾート結界は、リップルさんの夢が詰まった、まさに常夏の楽園と言っていい場所。人気が出るのも頷けます」
line = "「リゾート結界は、リップルさんの夢が詰まった、まさに常夏の楽園と言っていい場所。人気が出るのも頷けます」"

[[dialogue]]
speaker = "unk"
# リゾート結界での合宿、楽しかったよね
line = "リゾート結界での合宿、楽しかったよね"

[[dialogue]]
speaker = "アナ"
# 「最初、結界に閉じ込められてしまった時は、どうなることかと思いましたが……」
line = "「最初、結界に閉じ込められてしまった時は、どうなることかと思いましたが……」"

[[dialogue]]
speaker = "アナ"
# 「蓋を開けてみれば、美味しい食事に、快適な寝床や温泉もありで、サバイバルとは無縁の１週間でした」
line = "「蓋を開けてみれば、美味しい食事に、快適な寝床や温泉もありで、サバイバルとは無縁の１週間でした」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね～。でも――」
line = "「そうね～。でも――」"

[[dialogue]]
speaker = "サーシャ"
# 「私は、当初の予定だった、無人島での自給自足の合宿も体験してみたかったかも～」
line = "「私は、当初の予定だった、無人島での自給自足の合宿も体験してみたかったかも～」"

[[dialogue]]
speaker = "アナ"
# 「おや？　サーシャ先輩、サバイバルに興味が……？」
line = "「おや？　サーシャ先輩、サバイバルに興味が……？」"

[[dialogue]]
speaker = "サーシャ"
# 「未知の体験ってワクワクするでしょ？　サバイバル経験は無いから、１度やってみたかったのよね～」
line = "「未知の体験ってワクワクするでしょ？　サバイバル経験は無いから、１度やってみたかったのよね～」"

[[dialogue]]
speaker = "アナ"
# 「……ふむ」
line = "「……ふむ」"

[[dialogue]]
speaker = "アナ"
# 「なら、改めてサバイバル合宿をしてみますか？」
line = "「なら、改めてサバイバル合宿をしてみますか？」"

[[dialogue]]
speaker = "サーシャ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "アナ"
# 「人間界のことわざで、思い立ったが吉日とも言います。せっかくだから、やってみてもいいんじゃないでしょうか？」
line = "「人間界のことわざで、思い立ったが吉日とも言います。せっかくだから、やってみてもいいんじゃないでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「でも……もうすぐ夏休みも終わりよ？　さすがに今から旅行計画を立ててる時間は……」
line = "「でも……もうすぐ夏休みも終わりよ？　さすがに今から旅行計画を立ててる時間は……」"

[[dialogue]]
speaker = "アナ"
# 「無人島のサバイバル合宿を想定するなら、そこを再現したリゾート結界を借りれば、遠出せずともノープロブレムです」
line = "「無人島のサバイバル合宿を想定するなら、そこを再現したリゾート結界を借りれば、遠出せずともノープロブレムです」"

[[dialogue]]
speaker = "アナ"
# 「合宿プログラムは私が考えますから、後は各自の予定ですね。明日から今週末にかけて、サーシャ先輩は何か用事がありますか？」
line = "「合宿プログラムは私が考えますから、後は各自の予定ですね。明日から今週末にかけて、サーシャ先輩は何か用事がありますか？」"

[[dialogue]]
speaker = "サーシャ"
# 「え～と、予定は空いてるけど……」
line = "「え～と、予定は空いてるけど……」"

[[dialogue]]
speaker = "アナ"
# 「ならやりましょう。私もサバイバルには興味がありましたし、ちょうどいい機会です」
line = "「ならやりましょう。私もサバイバルには興味がありましたし、ちょうどいい機会です」"

[[dialogue]]
speaker = "アナ"
# 「会長はサバイバル経験があると仰ってましたよね？　もしよろしければ、サバイバルのこと教えて頂けませんか？」
line = "「会長はサバイバル経験があると仰ってましたよね？　もしよろしければ、サバイバルのこと教えて頂けませんか？」"

[[dialogue]]
speaker = "unk"
# 分かった。予定は空いているから大丈夫だよ
line = "分かった。予定は空いているから大丈夫だよ"

[[dialogue]]
speaker = "アナ"
# 「ありがとうございます。後はサーシャ先輩の気持ち次第ですが、いかがでしょう？」
line = "「ありがとうございます。後はサーシャ先輩の気持ち次第ですが、いかがでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「……そうね。分かったわ、アナちゃん。こんなにも積極的にやろうって言ってくれてるんだもの」
line = "「……そうね。分かったわ、アナちゃん。こんなにも積極的にやろうって言ってくれてるんだもの」"

[[dialogue]]
speaker = "サーシャ"
# 「せっかく合宿するなら、楽しまないとね♪」
line = "「せっかく合宿するなら、楽しまないとね♪」"

[[dialogue]]
speaker = "アナ"
# 「決まりですね」
line = "「決まりですね」"

[[dialogue]]
speaker = "アナ"
# 「それでは明日から、この３人でサバイバル合宿を開催しましょう」
line = "「それでは明日から、この３人でサバイバル合宿を開催しましょう」"

[[dialogue]]
speaker = "unk"
# こうして俺達は再び、合宿をすることになったのだった。
line = "こうして俺達は再び、合宿をすることになったのだった。"
