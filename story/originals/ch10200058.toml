line = "俺がわざと焦らすように言うと、ルルカは自ら腰を振り、おま○こをペニスに擦り付けながら、懇願するように言う。"

[[dialogue]]
speaker = "ルルカ"
# 「はぁっ、はぁっ<emoji=heart04>　配信プレイはもうどうでもいいからぁっ！　早くおま○こ挿れてよぉ～っ<emoji=heart04>」
line = "「はぁっ、はぁっ<emoji=heart04>　配信プレイはもうどうでもいいからぁっ！　早くおま○こ挿れてよぉ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
