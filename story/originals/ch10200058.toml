line = "「やぁっ<emoji=heart04>　ご、ごめなさいぃっ<emoji=heart04>　わかりました！　ちゃんとしますっ！　配信しますからぁっ<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「なんでもするから、おち○ぽっ<emoji=heart04>　妹おま○こに早く――お兄ちゃんのおち○ぽ挿れて下さいぃぃ～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
