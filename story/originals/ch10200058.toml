[[dialogue]]
speaker = "unk"
# バレンタインの後日。恋人のルルカが俺の家へ遊びにやって来ていた時のこと。
line = "バレンタインの後日。恋人のルルカが俺の家へ遊びにやって来ていた時のこと。"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん<emoji=heart04>　ん～っ……ちゅっ<emoji=heart04>」
line = "「お兄ちゃん<emoji=heart04>　ん～っ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 改めてルルカが手作りしてきてくれたピンク色のハート型ルビーチョコを一緒に味わいながら、甘い香りと共に、俺たちは唇を重ね合っていた。
line = "改めてルルカが手作りしてきてくれたピンク色のハート型ルビーチョコを一緒に味わいながら、甘い香りと共に、俺たちは唇を重ね合っていた。"

[[dialogue]]
speaker = "ルルカ"
# 「んむっ……んちゅっ<emoji=heart04>　ちゅむっ……れろちゅっ<emoji=heart04>　ちゅぱっ……ちゅぷぷっ<emoji=heart04>　れろちゅっ<emoji=heart04>　ちゅむむっ<emoji=heart04>　れるれるっ、ちゅれるっ<emoji=heart04>ちゅるるるっ<emoji=heart04>　ちゅぱぁっ……<emoji=heart04>」
line = "「んむっ……んちゅっ<emoji=heart04>　ちゅむっ……れろちゅっ<emoji=heart04>　ちゅぱっ……ちゅぷぷっ<emoji=heart04>　れろちゅっ<emoji=heart04>　ちゅむむっ<emoji=heart04>　れるれるっ、ちゅれるっ<emoji=heart04>ちゅるるるっ<emoji=heart04>　ちゅぱぁっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 舌を絡め合うキスを交わしたあと、一旦唇を離す。ルルカは余韻を楽しむように、自分の唇をぺろりと舐めながら微笑んだ。
line = "舌を絡め合うキスを交わしたあと、一旦唇を離す。ルルカは余韻を楽しむように、自分の唇をぺろりと舐めながら微笑んだ。"

[[dialogue]]
speaker = "ルルカ"
# 「はあぁっ……<emoji=heart04>　えへへ<emoji=heart04>　チョコを食べたばかりだから、いつもより甘いキスだったね……<emoji=heart04>」
line = "「はあぁっ……<emoji=heart04>　えへへ<emoji=heart04>　チョコを食べたばかりだから、いつもより甘いキスだったね……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「それで、『試したいこと』っていうのは、一体……？」
line = "「それで、『試したいこと』っていうのは、一体……？」"

[[dialogue]]
speaker = "unk"
# イチャイチャして甘いムードに包まれる中、今日も疑似配信エッチをしようという流れになって、ルルカから一緒にチョコを食べてほしいと言われたのだ。
line = "イチャイチャして甘いムードに包まれる中、今日も疑似配信エッチをしようという流れになって、ルルカから一緒にチョコを食べてほしいと言われたのだ。"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ、チョコの効果は、すぐにわかると思うよ<emoji=heart04>　それじゃあ、お兄ちゃん――」
line = "「えへへ、チョコの効果は、すぐにわかると思うよ<emoji=heart04>　それじゃあ、お兄ちゃん――」"

[[dialogue]]
speaker = "ルルカ"
# 「ルルカとバレンタインのオフパコ配信……しちゃお<emoji=heart04>」
line = "「ルルカとバレンタインのオフパコ配信……しちゃお<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうしてルルカは、自身がイメージする仮想空間を展開する能力『ルルカワールド』を発動。
line = "そうしてルルカは、自身がイメージする仮想空間を展開する能力『ルルカワールド』を発動。"

[[dialogue]]
speaker = "unk"
# Ｖチューバーとしてチョコ作り配信を行った際の『キッチン』を、周囲に忠実に再現してみせたのだが――
line = "Ｖチューバーとしてチョコ作り配信を行った際の『キッチン』を、周囲に忠実に再現してみせたのだが――"

[[dialogue]]
speaker = "ルルカ"
# 「はぁっ、はぁっ<emoji=heart04>　んっ<emoji=heart04>　ふうぅっ……！」
line = "「はぁっ、はぁっ<emoji=heart04>　んっ<emoji=heart04>　ふうぅっ……！」"

[[dialogue]]
speaker = "unk"
# 疑似配信の撮影を始めてまもなく、俺はルルカの様子がなんだかおかしいことに気づいた。
line = "疑似配信の撮影を始めてまもなく、俺はルルカの様子がなんだかおかしいことに気づいた。"

[[dialogue]]
speaker = "クロト"
# 「どうした……？　なんかルルカ、いつもより興奮してないか？」
line = "「どうした……？　なんかルルカ、いつもより興奮してないか？」"

[[dialogue]]
speaker = "ルルカ"
# 「んうぅっ<emoji=heart04>　えっと、実はぁ……<emoji=heart04>　本当はさっきのチョコ、バレンタインフォームの能力で作った、<b>媚薬</b>入りのやつで――」
line = "「んうぅっ<emoji=heart04>　えっと、実はぁ……<emoji=heart04>　本当はさっきのチョコ、バレンタインフォームの能力で作った、<b>媚薬</b>入りのやつで――」"

[[dialogue]]
speaker = "クロト"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ルルカ"
# 「それをお兄ちゃんに食べさせて、発情したところをあたしが手玉に取って……エッチするつもりだったの……<emoji=heart04>」
line = "「それをお兄ちゃんに食べさせて、発情したところをあたしが手玉に取って……エッチするつもりだったの……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「でも……食べてもらうチョコを間違えて、逆に渡しちゃったみたいで……<emoji=heart04>」
line = "「でも……食べてもらうチョコを間違えて、逆に渡しちゃったみたいで……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「つまり、俺にイタズラしようと思っていたら、<b>自分が</b>媚薬入りの食べて発情してしまった……と？」
line = "「つまり、俺にイタズラしようと思っていたら、<b>自分が</b>媚薬入りの食べて発情してしまった……と？」"

[[dialogue]]
speaker = "ルルカ"
# 「ご、ごめなさいぃっ<emoji=heart04>　お兄ちゃん、お願い……っ<emoji=heart04>　あたし、もう我慢できないくらい、体が熱くなってきててぇ……！」
line = "「ご、ごめなさいぃっ<emoji=heart04>　お兄ちゃん、お願い……っ<emoji=heart04>　あたし、もう我慢できないくらい、体が熱くなってきててぇ……！」"

[[dialogue]]
speaker = "unk"
# 事情を理解した俺は、すでにエッチ前の気分になっていたこともあり、少し悪戯心が湧いてきてしまう。
line = "事情を理解した俺は、すでにエッチ前の気分になっていたこともあり、少し悪戯心が湧いてきてしまう。"

[[dialogue]]
speaker = "クロト"
# 「なら――どうしたいのか、ちゃんとカメラに向かって言わないと」
line = "「なら――どうしたいのか、ちゃんとカメラに向かって言わないと」"

[[dialogue]]
speaker = "ルルカ"
# 「こ、今回は――」
line = "「こ、今回は――」"

[[dialogue]]
speaker = "ルルカ"
# 「媚薬チョコで自爆して発情しちゃったあたしに、お兄ちゃんからエッチなお仕置きをしてもらおうと思いますぅっ<emoji=heart04>」
line = "「媚薬チョコで自爆して発情しちゃったあたしに、お兄ちゃんからエッチなお仕置きをしてもらおうと思いますぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ！？　あっ、あっ……あっ、ああっ、ふああぁぁあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「あっ！？　あっ、あっ……あっ、ああっ、ふああぁぁあああぁっ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# と、ルルカはまるで絶頂したかのように背筋を仰け反らせ、体を震わせた。おま○こからは大量の愛液が溢れ、キッチンの床にポタポタと滴り落ちていく。
line = "と、ルルカはまるで絶頂したかのように背筋を仰け反らせ、体を震わせた。おま○こからは大量の愛液が溢れ、キッチンの床にポタポタと滴り落ちていく。"

[[dialogue]]
speaker = "ルルカ"
# 「も、もうダメっ<emoji=heart04>　お兄ちゃんっ<emoji=heart04>　おち○ぽっ……！」
line = "「も、もうダメっ<emoji=heart04>　お兄ちゃんっ<emoji=heart04>　おち○ぽっ……！」"

[[dialogue]]
speaker = "ルルカ"
# 「――おち○ぽ、欲しいのぉっ！！　おま○こ疼いて、もう我慢できないよぉ～っ<emoji=heart04><emoji=heart04>」
line = "「――おち○ぽ、欲しいのぉっ！！　おま○こ疼いて、もう我慢できないよぉ～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「はぁっ、はぁっ<emoji=heart04>　ルルカの発情おま○こ、もうぐちょぐちょになってるから、お兄ちゃんのおち○ぽ挿れてぇ～っ<emoji=heart04><emoji=heart04>」
line = "「はぁっ、はぁっ<emoji=heart04>　ルルカの発情おま○こ、もうぐちょぐちょになってるから、お兄ちゃんのおち○ぽ挿れてぇ～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそんなルルカの発情している姿に興奮して、既にガチガチに勃起してしまったペニスを膣穴に擦り付ける。
line = "俺はそんなルルカの発情している姿に興奮して、既にガチガチに勃起してしまったペニスを膣穴に擦り付ける。"

[[dialogue]]
speaker = "ルルカ"
# 「お、お兄ちゃん、おま○こ大丈夫だから、早くっ、早くぅ～っ<emoji=heart04>」
