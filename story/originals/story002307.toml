[[dialogue]]
speaker = "unk"
# 緋宮クロトと人形がレイラと戦っている最中、マリオンは見知った魔力を感じ、廃教会に飛び込んだ。
line = "緋宮クロトと人形がレイラと戦っている最中、マリオンは見知った魔力を感じ、廃教会に飛び込んだ。"

[[dialogue]]
speaker = "unk"
# 荒んだ内装の中心には魔法陣に浮かぶコハルコの姿があった。
line = "荒んだ内装の中心には魔法陣に浮かぶコハルコの姿があった。"

[[dialogue]]
speaker = "マリオン"
# 「コハルコ様──」
line = "「コハルコ様──」"

[[dialogue]]
speaker = "マリオン"
# 「ぐっ……！？」
line = "「ぐっ……！？」"

[[dialogue]]
speaker = "unk"
# 四方八方からの斬撃。侵入者を歓迎するトラップだ。マリオンを容赦なく八つ裂きにする。
line = "四方八方からの斬撃。侵入者を歓迎するトラップだ。マリオンを容赦なく八つ裂きにする。"

[[dialogue]]
speaker = "イザベラ"
# 「久しぶりね、マリオン。相変わらず気色の悪い魔法」
line = "「久しぶりね、マリオン。相変わらず気色の悪い魔法」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「お褒め頂き光栄です。あなたもお元気そうですね」
line = "「お褒め頂き光栄です。あなたもお元気そうですね」"

[[dialogue]]
speaker = "unk"
# さっき斬られたのは人形だ。敵の拠点に乗り込むのに、最初から本体で乗り込む愚は犯さない。
line = "さっき斬られたのは人形だ。敵の拠点に乗り込むのに、最初から本体で乗り込む愚は犯さない。"

[[dialogue]]
speaker = "イザベラ"
# 「忌まわしい姿ね……見ているだけで腹が立つわ」
line = "「忌まわしい姿ね……見ているだけで腹が立つわ」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「ふふ、そう言わないでください。私にとっては正装なのですよ？」
line = "「ふふ、そう言わないでください。私にとっては正装なのですよ？」"

[[dialogue]]
speaker = "unk"
# これがマリオンの本来の姿。ネビュラ内部の反乱分子を抹殺する『魔女狩り』だ。
line = "これがマリオンの本来の姿。ネビュラ内部の反乱分子を抹殺する『魔女狩り』だ。"

[[dialogue]]
speaker = "イザベラ"
# 「会わないうちに、随分おしゃべりになったみたいね。人間界はよほど水が合ったのかしら」
line = "「会わないうちに、随分おしゃべりになったみたいね。人間界はよほど水が合ったのかしら」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「ええ、お陰様で。そちらは腕が落ちたようですが」
line = "「ええ、お陰様で。そちらは腕が落ちたようですが」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「結界術は私の専門外ですが、それでも魔法陣を見れば分かります。これは世界を救う魔法などではありません。いったい何を企んでいるのです？」
line = "「結界術は私の専門外ですが、それでも魔法陣を見れば分かります。これは世界を救う魔法などではありません。いったい何を企んでいるのです？」"

[[dialogue]]
speaker = "イザベラ"
# 「そりゃそうよ、世界なんてどうでもいいもの」
line = "「そりゃそうよ、世界なんてどうでもいいもの」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「は……？　あなたは世界を救う研究をしていたはずでは？」
line = "「は……？　あなたは世界を救う研究をしていたはずでは？」"

[[dialogue]]
speaker = "イザベラ"
# 「……けんじゃないわよ」
line = "「……けんじゃないわよ」"

[[dialogue]]
speaker = "イザベラ"
# 「ふざけんじゃないわよ！　どいつもこいつも口を開けば世界世界って！！　そんなに世界が大事なの！？」
line = "「ふざけんじゃないわよ！　どいつもこいつも口を開けば世界世界って！！　そんなに世界が大事なの！？」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「何を……？　リクリエを打倒し、世界を救う。それが我々、魔女の使命……」
line = "「何を……？　リクリエを打倒し、世界を救う。それが我々、魔女の使命……」"

[[dialogue]]
speaker = "イザベラ"
# 「それがくだらないって言ってるんでしょうがぁっ！！」
line = "「それがくだらないって言ってるんでしょうがぁっ！！」"

[[dialogue]]
speaker = "イザベラ"
# 「使命なんて、要らない！　私たち魔女は森に引きこもっていればよかった！」
line = "「使命なんて、要らない！　私たち魔女は森に引きこもっていればよかった！」"

[[dialogue]]
speaker = "イザベラ"
# 「そうすれば、ウェールは……っ！　世界を救う使命が、私からあの子を奪ったのよ！！」
line = "「そうすれば、ウェールは……っ！　世界を救う使命が、私からあの子を奪ったのよ！！」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「ウェール……あなたの娘でしたね。ネビュラの任務でアステラを調査している途中で行方不明になったと、報告にはありました」
line = "「ウェール……あなたの娘でしたね。ネビュラの任務でアステラを調査している途中で行方不明になったと、報告にはありました」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「しかしあなたが娘を養育していたのは、他の魔女の都合が悪くなり、仕方なく引き受けたからだと聞いています。子育てに辟易していたとも」
line = "「しかしあなたが娘を養育していたのは、他の魔女の都合が悪くなり、仕方なく引き受けたからだと聞いています。子育てに辟易していたとも」"

[[dialogue]]
speaker = "イザベラ"
# 「そりゃそうでしょ。子どもなんて、うるさいし、言うこと聞かないし、好き嫌いばっかだし、資料だって汚すし、いいことなんてひとつもなかったわ」
line = "「そりゃそうでしょ。子どもなんて、うるさいし、言うこと聞かないし、好き嫌いばっかだし、資料だって汚すし、いいことなんてひとつもなかったわ」"

[[dialogue]]
speaker = "イザベラ"
# 「でも、でも……私には、あの子が……あの子さえ……」
line = "「でも、でも……私には、あの子が……あの子さえ……」"

[[dialogue]]
speaker = "イザベラ"
# 「私はもう誰も死なない世界を作りたかった。だけど、もういいわ」
line = "「私はもう誰も死なない世界を作りたかった。だけど、もういいわ」"

[[dialogue]]
speaker = "イザベラ"
# 「あの子のいない世界に意味なんてないもの」
line = "「あの子のいない世界に意味なんてないもの」"

[[dialogue]]
speaker = "イザベラ"
# 「私はこの結界で秋葉原を切り離し、異界に隔離する。世界なんて勝手に滅びなさい」
line = "「私はこの結界で秋葉原を切り離し、異界に隔離する。世界なんて勝手に滅びなさい」"

[[dialogue]]
speaker = "イザベラ"
# 「あの子だっていつか帰ってくる……まだ見つかってないんだもの、希望はあるわ」
line = "「あの子だっていつか帰ってくる……まだ見つかってないんだもの、希望はあるわ」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「あなたが何を成そうとしているのかは分かりました。ですが、そのためにコハルコ様を犠牲にするわけには参りません。あなたはここで私が討ちます」
line = "「あなたが何を成そうとしているのかは分かりました。ですが、そのためにコハルコ様を犠牲にするわけには参りません。あなたはここで私が討ちます」"

[[dialogue]]
speaker = "イザベラ"
# 「やれるものならやってみなさい。どれだけ鈍らになったか見てあげるわ」
line = "「やれるものならやってみなさい。どれだけ鈍らになったか見てあげるわ」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "イザベラ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 両者が向かい合い、沈黙が落ちた。魔力が膨れ上がった次の瞬間──
line = "両者が向かい合い、沈黙が落ちた。魔力が膨れ上がった次の瞬間──"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「マリオネット・エグゼキューション！！」
line = "「マリオネット・エグゼキューション！！」"

[[dialogue]]
speaker = "イザベラ"
# 「ダークネス・オブリビオン！」
line = "「ダークネス・オブリビオン！」"

[[dialogue]]
speaker = "unk"
# マリオンの操る刃が、黒い斬撃を弾き、深々とイザベラに突き刺さる。
line = "マリオンの操る刃が、黒い斬撃を弾き、深々とイザベラに突き刺さる。"

[[dialogue]]
speaker = "unk"
# もともと研究職であったイザベラが、魔女との戦闘に特化したマリオンに敵うはずもない。
line = "もともと研究職であったイザベラが、魔女との戦闘に特化したマリオンに敵うはずもない。"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「さようなら」
line = "「さようなら」"

[[dialogue]]
speaker = "イザベラ"
# 「がはっ……」
line = "「がはっ……」"

[[dialogue]]
speaker = "unk"
# 致命傷だ。マリオンはそう判断し、コハルコを救出しようとして……立ち止まる。
line = "致命傷だ。マリオンはそう判断し、コハルコを救出しようとして……立ち止まる。"

[[dialogue]]
speaker = "マリオン（覚醒）"
# （何かがおかしい……）
line = "（何かがおかしい……）"

[[dialogue]]
speaker = "unk"
# これでは過去の再演だ。以前もこうしてイザベラを葬った。その時も確かに手ごたえはあった。だというのに、なぜ彼女は再び現れたのか？
line = "これでは過去の再演だ。以前もこうしてイザベラを葬った。その時も確かに手ごたえはあった。だというのに、なぜ彼女は再び現れたのか？"

[[dialogue]]
speaker = "イザベラ"
# 「──だから言ったじゃない、鈍らだって」
line = "「──だから言ったじゃない、鈍らだって」"

[[dialogue]]
speaker = "unk"
# マリオンが振り返ると同時、イザベラは立ち上がっていた。その手に、黒い球体──ブラックホールを浮かべて。
line = "マリオンが振り返ると同時、イザベラは立ち上がっていた。その手に、黒い球体──ブラックホールを浮かべて。"

[[dialogue]]
speaker = "unk"
# 穿たれたはずの傷はすでにふさがっている。
line = "穿たれたはずの傷はすでにふさがっている。"

[[dialogue]]
speaker = "マリオン（覚醒）"
# （なるほど、そういうことですか。コラプサーたちの経緯に共通点があると思いましたが……）
line = "（なるほど、そういうことですか。コラプサーたちの経緯に共通点があると思いましたが……）"

[[dialogue]]
speaker = "マリオン（覚醒）"
# （ブラックホールは死した星の成れの果て。そしてコラプサーも自身の死によってその力に目覚める）
line = "（ブラックホールは死した星の成れの果て。そしてコラプサーも自身の死によってその力に目覚める）"

[[dialogue]]
speaker = "マリオン（覚醒）"
# （一度討ったはずのイザベラが蘇ったのも──）
line = "（一度討ったはずのイザベラが蘇ったのも──）"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「……あなたもコラプサーだったのですね」
line = "「……あなたもコラプサーだったのですね」"

[[dialogue]]
speaker = "イザベラ"
# 「違うと言った覚えはないわ。……消えなさい、ブラックホール・ディバウアー！」
line = "「違うと言った覚えはないわ。……消えなさい、ブラックホール・ディバウアー！」"

[[dialogue]]
speaker = "イザベラ"
# 「これで邪魔者は……消えたわね……」
line = "「これで邪魔者は……消えたわね……」"

[[dialogue]]
speaker = "マリオン"
# （──！）
line = "（──！）"

[[dialogue]]
speaker = "unk"
# 人形のマリオンが消えゆく間際、イザベラの輪郭が解け、異形へと変じていく瞬間を目撃する。
line = "人形のマリオンが消えゆく間際、イザベラの輪郭が解け、異形へと変じていく瞬間を目撃する。"

[[dialogue]]
speaker = "イザベラ"
# 『さぁ……最後の仕上げよ……』
line = "『さぁ……最後の仕上げよ……』"
