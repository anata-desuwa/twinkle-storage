[[dialogue]]
speaker = "unk"
# それから、クリスマスプレゼントを配るサンタ大作戦は、順調に進んでいた。
line = "それから、クリスマスプレゼントを配るサンタ大作戦は、順調に進んでいた。"

[[dialogue]]
speaker = "unk"
# 知り合いの多い紅明と俺が事前に相談して、各生徒たちの喜ぶものをリサーチし、プレゼントを決めて渡していく形だ。
line = "知り合いの多い紅明と俺が事前に相談して、各生徒たちの喜ぶものをリサーチし、プレゼントを決めて渡していく形だ。"

[[dialogue]]
speaker = "セシア"
# 「――はい、メリークリスマス。あなたにクリスマスプレゼントのお届けものよ」
line = "「――はい、メリークリスマス。あなたにクリスマスプレゼントのお届けものよ」"

[[dialogue]]
speaker = "女生徒Ｃ"
# 「まぁ♪　ありがとう！　セシアちゃんっていったかしら？　その制服、附属校のよね？」
line = "「まぁ♪　ありがとう！　セシアちゃんっていったかしら？　その制服、附属校のよね？」"

[[dialogue]]
speaker = "セシア"
# 「ええ。今度、見学に行く予定なの」
line = "「ええ。今度、見学に行く予定なの」"

[[dialogue]]
speaker = "女生徒Ｃ"
# 「そうなのね。私、附属校の３年生だから、わからないことがあったら遠慮なく聞きにきてね」
line = "「そうなのね。私、附属校の３年生だから、わからないことがあったら遠慮なく聞きにきてね」"

[[dialogue]]
speaker = "セシア"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "女生徒Ｃ"
# 「セシアちゃん？　私の顔をじっと見て……どうかした？」
line = "「セシアちゃん？　私の顔をじっと見て……どうかした？」"

[[dialogue]]
speaker = "セシア"
# 「――ううん。あなたは優しい人なのね。附属校に行くのが楽しみになったわ」
line = "「――ううん。あなたは優しい人なのね。附属校に行くのが楽しみになったわ」"

[[dialogue]]
speaker = "女生徒Ｃ"
# 「ふふっ、セシアちゃんなら大歓迎よ。待ってるわね♪」
line = "「ふふっ、セシアちゃんなら大歓迎よ。待ってるわね♪」"

[[dialogue]]
speaker = "セシア"
# 「これで一旦、用意していたプレゼントは配り終わったわ」
line = "「これで一旦、用意していたプレゼントは配り終わったわ」"

[[dialogue]]
speaker = "unk"
# みんな喜んでくれて、よかったね
line = "みんな喜んでくれて、よかったね"

[[dialogue]]
speaker = "セシア"
# 「ええ。それだけじゃなく、優しくしてくれて……中には面白い人もいるけど、会長の紹介してくれる人はみんな、心の温かい人だわ」
line = "「ええ。それだけじゃなく、優しくしてくれて……中には面白い人もいるけど、会長の紹介してくれる人はみんな、心の温かい人だわ」"

[[dialogue]]
speaker = "セシア"
# 「それと、会長。あなたも含めてね」
line = "「それと、会長。あなたも含めてね」"

[[dialogue]]
speaker = "セシア"
# 「沢山の人を紹介して貰ったけど、あなたは嫌な顔１つせず、わたくしのことを繰り返し丁寧に説明してくれた」
line = "「沢山の人を紹介して貰ったけど、あなたは嫌な顔１つせず、わたくしのことを繰り返し丁寧に説明してくれた」"

[[dialogue]]
speaker = "セシア"
# 「あなたはわたくしのママではないと感じるけれど、ヴィーナスが力説する通り、素敵な人ね」
line = "「あなたはわたくしのママではないと感じるけれど、ヴィーナスが力説する通り、素敵な人ね」"

[[dialogue]]
speaker = "セシア"
# 「ありがとう、会長。わたくし、あなたのことがもっと知りたくなったわ」
line = "「ありがとう、会長。わたくし、あなたのことがもっと知りたくなったわ」"

[[dialogue]]
speaker = "unk"
# どういたしまして
line = "どういたしまして"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、後でＤＩＳＣの連絡先を交換しましょう」
line = "「ふふっ、後でＤＩＳＣの連絡先を交換しましょう」"

[[dialogue]]
speaker = "紅明"
# 「セッシ～、ダーリン～！」
line = "「セッシ～、ダーリン～！」"

[[dialogue]]
speaker = "セシア"
# 「あっ、紅明ママだわ♪　ママ～♪」
line = "「あっ、紅明ママだわ♪　ママ～♪」"

[[dialogue]]
speaker = "紅明"
# 「アタシとヨミヨミの方は、プレゼント配り終わったよ☆　そっちはどう？　って、ありゃ？」
line = "「アタシとヨミヨミの方は、プレゼント配り終わったよ☆　そっちはどう？　って、ありゃ？」"

[[dialogue]]
speaker = "ヨミ"
# 「セシアちゃん、いい笑顔してますけど、なにかありました？」
line = "「セシアちゃん、いい笑顔してますけど、なにかありました？」"

[[dialogue]]
speaker = "セシア"
# 「ええ。わたくし、会長と少し仲良くなったのよ」
line = "「ええ。わたくし、会長と少し仲良くなったのよ」"

[[dialogue]]
speaker = "紅明"
# 「おっ♪　いいじゃ～ん！　セッシーもヴィナちーやヨミヨミと同じで、アタシの恋敵に仲間入りか～☆　こいつは強敵だな～」
line = "「おっ♪　いいじゃ～ん！　セッシーもヴィナちーやヨミヨミと同じで、アタシの恋敵に仲間入りか～☆　こいつは強敵だな～」"

[[dialogue]]
speaker = "ヨミ"
# 「ちょっ、なんか私も入ってます！？　わ、私は別にそういうのじゃ……！」
line = "「ちょっ、なんか私も入ってます！？　わ、私は別にそういうのじゃ……！」"

[[dialogue]]
speaker = "セシア"
# 「会長に衣装を褒められた時、あんなに嬉しそうだったのに？」
line = "「会長に衣装を褒められた時、あんなに嬉しそうだったのに？」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　違います！　あれはその、違いますからっ！」
line = "「こやっ！？　違います！　あれはその、違いますからっ！」"

[[dialogue]]
speaker = "紅明"
# 「あはははっ☆　んモ～、ヨミヨミってば可愛いなぁ♪」
line = "「あはははっ☆　んモ～、ヨミヨミってば可愛いなぁ♪」"

[[dialogue]]
speaker = "unk"
# そういえばセシア、記憶の方はどう？
line = "そういえばセシア、記憶の方はどう？"

[[dialogue]]
speaker = "セシア"
# 「プレゼントを配りながら、みんなの喜びを分けてもらって。それがわたくしの中に蓄積されて、どんどん力が湧いてくるのを感じるわ」
line = "「プレゼントを配りながら、みんなの喜びを分けてもらって。それがわたくしの中に蓄積されて、どんどん力が湧いてくるのを感じるわ」"

[[dialogue]]
speaker = "セシア"
# 「でも、記憶はまだ思い出せないの。残念だけど……」
line = "「でも、記憶はまだ思い出せないの。残念だけど……」"

[[dialogue]]
speaker = "ヨミ"
# 「そうですか……」
line = "「そうですか……」"

[[dialogue]]
speaker = "紅明"
# 「ふ～む……」
line = "「ふ～む……」"

[[dialogue]]
speaker = "紅明"
# 「ならもっと、みんなに喜んでもらえるように、サンタらしい方法でプレゼントを配ってみるっしょ♪」
line = "「ならもっと、みんなに喜んでもらえるように、サンタらしい方法でプレゼントを配ってみるっしょ♪」"

[[dialogue]]
speaker = "セシア"
# 「サンタらしい方法……？」
line = "「サンタらしい方法……？」"

[[dialogue]]
speaker = "紅明"
# 「古事記のサンタ曰く、プレゼントはクリスマスの夜、枕元に置かれてた方が、子供たちに喜ばれるんだぜ☆　ってことで――」
line = "「古事記のサンタ曰く、プレゼントはクリスマスの夜、枕元に置かれてた方が、子供たちに喜ばれるんだぜ☆　ってことで――」"

[[dialogue]]
speaker = "紅明"
# 「みんなが寝静まった丑三つ時、我が新星学園の学生寮――『ラルーナ』に、こっそり忍び込もうじゃないか！」
line = "「みんなが寝静まった丑三つ時、我が新星学園の学生寮――『ラルーナ』に、こっそり忍び込もうじゃないか！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　いやいやいや、紅明先輩、なに言ってるんですか！？」
line = "「こやっ！？　いやいやいや、紅明先輩、なに言ってるんですか！？」"

[[dialogue]]
speaker = "unk"
# 寮に無断で侵入なんてしたら……！
line = "寮に無断で侵入なんてしたら……！"

[[dialogue]]
speaker = "ヨミ"
# 「マムに殺されますよ！？」
line = "「マムに殺されますよ！？」"

[[dialogue]]
speaker = "セシア"
# 「マム？　ヨミヨミのママってこと？」
line = "「マム？　ヨミヨミのママってこと？」"

[[dialogue]]
speaker = "ヨミ"
# 「いえ、マムっていうのは、新星寮の寮長を務めている人で……新星学園３年生の、妃竜院マハムートという先輩です」
line = "「いえ、マムっていうのは、新星寮の寮長を務めている人で……新星学園３年生の、妃竜院マハムートという先輩です」"

[[dialogue]]
speaker = "ヨミ"
# 「その高いカリスマ性から、寮母のように慕われているのですが、一方で怒らすと爆裂恐ろしいというか……」
line = "「その高いカリスマ性から、寮母のように慕われているのですが、一方で怒らすと爆裂恐ろしいというか……」"

[[dialogue]]
speaker = "unk"
# （前に怒らせた時のことを思い出して震える）
line = "（前に怒らせた時のことを思い出して震える）"

[[dialogue]]
speaker = "unk"
# ガクガクブルブル……
line = "ガクガクブルブル……"

[[dialogue]]
speaker = "セシア"
# 「寮母……！　セシア、それはとても興味があるわ♪」
line = "「寮母……！　セシア、それはとても興味があるわ♪」"

[[dialogue]]
speaker = "ヨミ"
# 「いやいやいや！　だからって、忍び込むのはダメですからね！？　絶対に！！！」
line = "「いやいやいや！　だからって、忍び込むのはダメですからね！？　絶対に！！！」"

[[dialogue]]
speaker = "unk"
# そうして、時刻は深夜。新星寮の前にて――
line = "そうして、時刻は深夜。新星寮の前にて――"

[[dialogue]]
speaker = "ヨミ"
# 「結局、押し切られてしまいました……」
line = "「結局、押し切られてしまいました……」"

[[dialogue]]
speaker = "紅明"
# 「と言いつつ、なんだかんだ付いてきてくれてありがとね。ヨミヨミ、ダーリン♪」
line = "「と言いつつ、なんだかんだ付いてきてくれてありがとね。ヨミヨミ、ダーリン♪」"

[[dialogue]]
speaker = "ヨミ"
# 「だって、心配じゃないですか……セシアちゃんも付いて行く気満々でしたし……」
line = "「だって、心配じゃないですか……セシアちゃんも付いて行く気満々でしたし……」"

[[dialogue]]
speaker = "セシア"
# 「マムに会うの、楽しみだわ。わくわく……♪」
line = "「マムに会うの、楽しみだわ。わくわく……♪」"

[[dialogue]]
speaker = "unk"
# 会ったらダメなんだって！
line = "会ったらダメなんだって！"

[[dialogue]]
speaker = "紅明"
# 「まぁ、バレなきゃ大丈夫っしょ☆　うん……マムにバレさえしなければ……」
line = "「まぁ、バレなきゃ大丈夫っしょ☆　うん……マムにバレさえしなければ……」"

[[dialogue]]
speaker = "ヨミ"
# 「言いながらちょっと震えてるじゃないですか！？　今からでも中止にしましょうよ！」
line = "「言いながらちょっと震えてるじゃないですか！？　今からでも中止にしましょうよ！」"

[[dialogue]]
speaker = "unk"
# （紅明でもマムは怖いんだな……）
line = "（紅明でもマムは怖いんだな……）"

[[dialogue]]
speaker = "紅明"
# 「いや、ここで退いたら、サンタの名が廃るぜ！　アタシはこの潜入ミッションをやり遂げてみせる！」
line = "「いや、ここで退いたら、サンタの名が廃るぜ！　アタシはこの潜入ミッションをやり遂げてみせる！」"

[[dialogue]]
speaker = "紅明"
# 「サンタの袋から出でよ、プレゼント！　箱をオープン！　新星寮の鍵を召喚！」
line = "「サンタの袋から出でよ、プレゼント！　箱をオープン！　新星寮の鍵を召喚！」"

[[dialogue]]
speaker = "ヨミ"
# 「サンタの袋、そんなものまで生み出せるんですか！？　爆裂物騒なんですけど！」
line = "「サンタの袋、そんなものまで生み出せるんですか！？　爆裂物騒なんですけど！」"

[[dialogue]]
speaker = "紅明"
# 「さあ、皆の衆、ここからが本当のサンタ大作戦の始まりだぜ……！」
line = "「さあ、皆の衆、ここからが本当のサンタ大作戦の始まりだぜ……！」"

[[dialogue]]
speaker = "unk"
# 新星寮の玄関扉が開き、俺たちは潜入ミッションを開始するのだった――
line = "新星寮の玄関扉が開き、俺たちは潜入ミッションを開始するのだった――"
