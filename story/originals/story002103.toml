[[dialogue]]
speaker = "ソフィア"
# 「寄せては返す白波……サンサンと照る太陽……心地よい海風……」
line = "「寄せては返す白波……サンサンと照る太陽……心地よい海風……」"

[[dialogue]]
speaker = "ソフィア"
# 「まさに極楽。私はもう人間界にも魔界にも帰りません。ここで春が来るまで過ごさせていただきます」
line = "「まさに極楽。私はもう人間界にも魔界にも帰りません。ここで春が来るまで過ごさせていただきます」"

[[dialogue]]
speaker = "ユウリ"
# 「クマかよ」
line = "「クマかよ」"

[[dialogue]]
speaker = "ソフィア"
# 「人間界にも魔界にも私にとって安住の地はありませんでした。しかし、ここにはあるのです」
line = "「人間界にも魔界にも私にとって安住の地はありませんでした。しかし、ここにはあるのです」"

[[dialogue]]
speaker = "ソフィア"
# 「今までお世話になりました、ユウリ先輩……」
line = "「今までお世話になりました、ユウリ先輩……」"

[[dialogue]]
speaker = "サーシャ"
# 「もう。ソフィったらすっかりリゾートに染まっちゃって」
line = "「もう。ソフィったらすっかりリゾートに染まっちゃって」"

[[dialogue]]
speaker = "リップル"
# 「──アハハー！　リゾート結界を気に入ってもらえて、リップルはサイコーにウレシーでーす！」
line = "「──アハハー！　リゾート結界を気に入ってもらえて、リップルはサイコーにウレシーでーす！」"

[[dialogue]]
speaker = "アポロ"
# 「──ん？　おい魔王、どこへ行こうとしてるんだ？」
line = "「──ん？　おい魔王、どこへ行こうとしてるんだ？」"

[[dialogue]]
speaker = "unk"
# 釣り
line = "釣り"

[[dialogue]]
speaker = "unk"
# 魚を捕りに
line = "魚を捕りに"

[[dialogue]]
speaker = "アポロ"
# 「釣りか！　へえ、面白そうじゃんか。あたしにもやらせてくれよ！」
line = "「釣りか！　へえ、面白そうじゃんか。あたしにもやらせてくれよ！」"

[[dialogue]]
speaker = "アポロ"
# 「やったこと？　ないぞ。磯釣り？　沖釣り？　知らん！　とにかくでっかい魚が釣れればなんでもいい！」
line = "「やったこと？　ないぞ。磯釣り？　沖釣り？　知らん！　とにかくでっかい魚が釣れればなんでもいい！」"

[[dialogue]]
speaker = "アポロ"
# 「もちろん、やるとなったら勝負だぞ！　よりでっけー魚を釣ったほうが勝ちだ！」
line = "「もちろん、やるとなったら勝負だぞ！　よりでっけー魚を釣ったほうが勝ちだ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、釣りをするのね？　なら当然私も参加するわ！」
line = "「あら、釣りをするのね？　なら当然私も参加するわ！」"

[[dialogue]]
speaker = "アナ"
# 「ふむ。私も興味が。この結界の中において、どのような海洋生物が生息しているのか……」
line = "「ふむ。私も興味が。この結界の中において、どのような海洋生物が生息しているのか……」"

[[dialogue]]
speaker = "アポロ"
# 「賑やかになってきたな。よーし、釣れそうなスポットに案内してくれ！　魔王！」
line = "「賑やかになってきたな。よーし、釣れそうなスポットに案内してくれ！　魔王！」"

[[dialogue]]
speaker = "リップル"
# 「皆サ～ン！　そろそろお腹が空いてマセンか～？　お昼にしまショ～！」
line = "「皆サ～ン！　そろそろお腹が空いてマセンか～？　お昼にしまショ～！」"

[[dialogue]]
speaker = "リップル"
# 「海の家には夏の名物がたくさんありマ～ス！　ここで元気をチャージするとよいデース！」
line = "「海の家には夏の名物がたくさんありマ～ス！　ここで元気をチャージするとよいデース！」"

[[dialogue]]
speaker = "アポロ"
# 「おーっ！　イカ焼きもトウモロコシも超うまそうだ……！」
line = "「おーっ！　イカ焼きもトウモロコシも超うまそうだ……！」"

[[dialogue]]
speaker = "ユウリ"
# 「やべ……さっき調子に乗って焼きそば食っちまった。まだ入っかな……」
line = "「やべ……さっき調子に乗って焼きそば食っちまった。まだ入っかな……」"

[[dialogue]]
speaker = "ルリエル"
# 「ほーほー。確かに満腹のご様子です」
line = "「ほーほー。確かに満腹のご様子です」"

[[dialogue]]
speaker = "ユウリ"
# 「や、やめろってルリ！　お腹つまむなよっ」
line = "「や、やめろってルリ！　お腹つまむなよっ」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、水着だと無防備になってしまいますね」
line = "「ふふ、水着だと無防備になってしまいますね」"

[[dialogue]]
speaker = "マトイ"
# 「──ひっ！？　な、何これっ！」
line = "「──ひっ！？　な、何これっ！」"

[[dialogue]]
speaker = "ルリエル"
# 「ありゃ。虫じゃないですか？」
line = "「ありゃ。虫じゃないですか？」"

[[dialogue]]
speaker = "リップル"
# 「ワーオ！　それは以前、アナに頼まれてセッチした虫取りエリアの虫デスネ～！」
line = "「ワーオ！　それは以前、アナに頼まれてセッチした虫取りエリアの虫デスネ～！」"

[[dialogue]]
speaker = "マトイ"
# 「な、なんだもう……びっくりしたぁ」
line = "「な、なんだもう……びっくりしたぁ」"

[[dialogue]]
speaker = "アポロ"
# 「おおっ虫取りか！　それも確かに夏の<b>ふーぶつし</b>だな！」
line = "「おおっ虫取りか！　それも確かに夏の<b>ふーぶつし</b>だな！」"

[[dialogue]]
speaker = "アナ"
# 「確かに希望しましたが……あれはあくまで虫取りエリア限定のはずでは？」
line = "「確かに希望しましたが……あれはあくまで虫取りエリア限定のはずでは？」"

[[dialogue]]
speaker = "セーラ"
# 「てか、めっちゃ流出してない？」
line = "「てか、めっちゃ流出してない？」"

[[dialogue]]
speaker = "unk"
# ここは虫取りエリアから離れているにもかかわらず、昆虫たちが何匹か発生していた。
line = "ここは虫取りエリアから離れているにもかかわらず、昆虫たちが何匹か発生していた。"

[[dialogue]]
speaker = "unk"
# 前はカブトムシだったけど……
line = "前はカブトムシだったけど……"

[[dialogue]]
speaker = "unk"
# 前はクワガタだったけど……
line = "前はクワガタだったけど……"

[[dialogue]]
speaker = "フィオナ"
# 「なんだか見慣れない虫が多いような」
line = "「なんだか見慣れない虫が多いような」"

[[dialogue]]
speaker = "セーラ"
# 「色合いが不気味に見えるんだけど、これ捕っても平気なの？」
line = "「色合いが不気味に見えるんだけど、これ捕っても平気なの？」"

[[dialogue]]
speaker = "アナ"
# 「いえ。以前、オーダーしたのはレアなカブクワ達でしたが……今回のこれは冬に活動するアブやカマキリですね」
line = "「いえ。以前、オーダーしたのはレアなカブクワ達でしたが……今回のこれは冬に活動するアブやカマキリですね」"

[[dialogue]]
speaker = "アナ"
# 「この子なんかは毒の噴射液を吹きつけてくるので普通に害虫です」
line = "「この子なんかは毒の噴射液を吹きつけてくるので普通に害虫です」"

[[dialogue]]
speaker = "マトイ"
# 「全然ダメじゃん！？」
line = "「全然ダメじゃん！？」"

[[dialogue]]
speaker = "アポロ"
# 「へっ──害虫がなんぼのもんだ。このアポロ様に任せろ～！」
line = "「へっ──害虫がなんぼのもんだ。このアポロ様に任せろ～！」"

[[dialogue]]
speaker = "ルリエル"
# 「よおし、わたしも！　退治してゆっくりランチと参りましょ～！」
line = "「よおし、わたしも！　退治してゆっくりランチと参りましょ～！」"

[[dialogue]]
speaker = "ソフィア"
# 「虫は得意ではありませんが、平穏な夏を守るため戦います──！」
line = "「虫は得意ではありませんが、平穏な夏を守るため戦います──！」"

[[dialogue]]
speaker = "unk"
# アポロを筆頭にみんなが虫を退治していった。
line = "アポロを筆頭にみんなが虫を退治していった。"

[[dialogue]]
speaker = "サーシャ"
# 「……それにしても、妙ねえ」
line = "「……それにしても、妙ねえ」"

[[dialogue]]
speaker = "サーシャ"
# 「確かここって、元々は快適さ重視で虫１匹いなかったはずよね。なのに意図しない害虫が自然発生するなんて……」
line = "「確かここって、元々は快適さ重視で虫１匹いなかったはずよね。なのに意図しない害虫が自然発生するなんて……」"

[[dialogue]]
speaker = "フィオナ"
# 「……リップルさんらしくない気はしますね」
line = "「……リップルさんらしくない気はしますね」"

[[dialogue]]
speaker = "リップル"
# 「ウ……」
line = "「ウ……」"

[[dialogue]]
speaker = "unk"
# 元気がなさそうだ
line = "元気がなさそうだ"

[[dialogue]]
speaker = "unk"
# 何かあったのか？
line = "何かあったのか？"

[[dialogue]]
speaker = "リップル"
# 「ま、参りましたデ～ス。カイチョ―達にそう心配されてはお伝えするしかありまセン」
line = "「ま、参りましたデ～ス。カイチョ―達にそう心配されてはお伝えするしかありまセン」"

[[dialogue]]
speaker = "セーラ"
# 「何か事情があるって感じかな？」
line = "「何か事情があるって感じかな？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ……ジツは……」
line = "「ハイ……ジツは……」"

[[dialogue]]
speaker = "マトイ"
# 「──ひゃあっ！？」
line = "「──ひゃあっ！？」"

[[dialogue]]
speaker = "unk"
# 冷たっ！？
line = "冷たっ！？"

[[dialogue]]
speaker = "unk"
# すごい風が……
line = "すごい風が……"

[[dialogue]]
speaker = "unk"
# 潮風の凪いだ隙に吹き抜けた、一陣の冷風──
line = "潮風の凪いだ隙に吹き抜けた、一陣の冷風──"

[[dialogue]]
speaker = "リップル"
# 「こ、コレです──コレが、リゾート結界をオビヤかしている脅威なのデ～ス！」
line = "「こ、コレです──コレが、リゾート結界をオビヤかしている脅威なのデ～ス！」"

[[dialogue]]
speaker = "サーシャ"
# 「なんですって！？」
line = "「なんですって！？」"
