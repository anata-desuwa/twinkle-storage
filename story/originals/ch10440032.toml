[[dialogue]]
speaker = "unk"
# 第２話,反転・暴走・ベイビー,P
line = "第２話,反転・暴走・ベイビー,P"

[[dialogue]]
speaker = "unk"
# その日、俺たちは仮想結界システムを使い、運動場を模した空間で戦闘訓練を行っていた。
line = "その日、俺たちは仮想結界システムを使い、運動場を模した空間で戦闘訓練を行っていた。"

[[dialogue]]
speaker = "プリムラ"
# 「どうじゃ、アルモタヘル、マグダレナ！　これが我の新しい力じゃ！」
line = "「どうじゃ、アルモタヘル、マグダレナ！　これが我の新しい力じゃ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「すごいのだ！　守護天使のアルモたん達に合わせて霊力へ変換、最適化してエネルギー供給がされているのだ！」
line = "「すごいのだ！　守護天使のアルモたん達に合わせて霊力へ変換、最適化してエネルギー供給がされているのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「相手を選ばずエネルギー供給ができるなんて、他の方にはない能力ですね～♪」
line = "「相手を選ばずエネルギー供給ができるなんて、他の方にはない能力ですね～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「そうじゃろう、そうじゃろう！　フハハハ♪」
line = "「そうじゃろう、そうじゃろう！　フハハハ♪」"

[[dialogue]]
speaker = "unk"
# 本来は俺とプリムラだけで訓練する予定だったのだが、そこへたまたま守護天使の２人がやってきて、そのまま一緒に訓練する流れになっていた。
line = "本来は俺とプリムラだけで訓練する予定だったのだが、そこへたまたま守護天使の２人がやってきて、そのまま一緒に訓練する流れになっていた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「強いのはもちろんですが、その戦闘服……とても可愛くてお似合いですよ～♪」
line = "「強いのはもちろんですが、その戦闘服……とても可愛くてお似合いですよ～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「はぁ！？　可愛いじゃと？」
line = "「はぁ！？　可愛いじゃと？」"

[[dialogue]]
speaker = "プリムラ"
# 「我は悪の終末兵器なのじゃぞ！　可愛いなどと、そんな言葉で喜ぶとでも思っているのか？　――フヘへへぇ<emoji=heart04>」
line = "「我は悪の終末兵器なのじゃぞ！　可愛いなどと、そんな言葉で喜ぶとでも思っているのか？　――フヘへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「めちゃくちゃ嬉しそうなのだ！」
line = "「めちゃくちゃ嬉しそうなのだ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「プリムラは、一人称が『我』で、衣装も白。なんだかアルモたんと似ているな♪」
line = "「プリムラは、一人称が『我』で、衣装も白。なんだかアルモたんと似ているな♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ふん、まあ、我ほどではないが、貴様の白い水着も悪くないのではないか？」
line = "「ふん、まあ、我ほどではないが、貴様の白い水着も悪くないのではないか？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ありがとうなのだ♪　同じ附属生として、これからも仲良くしてくれると嬉しいぞ♪」
line = "「ありがとうなのだ♪　同じ附属生として、これからも仲良くしてくれると嬉しいぞ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私のこともよろしくお願いしますね～♪　前から１度、プリムラさんとはゆっくりお話してみたかったんです♪」
line = "「私のこともよろしくお願いしますね～♪　前から１度、プリムラさんとはゆっくりお話してみたかったんです♪」"

[[dialogue]]
speaker = "プリムラ"
# 「よかろう。いずれ世界を統べる我としては、守護天使と絆を結んでおいて損はないのじゃ♪」
line = "「よかろう。いずれ世界を統べる我としては、守護天使と絆を結んでおいて損はないのじゃ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「さあ、訓練を続けるぞ！　我の力、もっと思い知るがよい！」
line = "「さあ、訓練を続けるぞ！　我の力、もっと思い知るがよい！」"

[[dialogue]]
speaker = "unk"
# プリムラ、あまり張り切り過ぎない方が……
line = "プリムラ、あまり張り切り過ぎない方が……"

[[dialogue]]
speaker = "プリムラ"
# 「問題ない！　さあ、眷族よ。我の力でパワーアップした守護天使たちを相手に戦うのじゃ！」
line = "「問題ない！　さあ、眷族よ。我の力でパワーアップした守護天使たちを相手に戦うのじゃ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「似た者コンビネーションなのだ♪」
line = "「似た者コンビネーションなのだ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私も混ざっちゃいますよ～♪」
line = "「私も混ざっちゃいますよ～♪」"

[[dialogue]]
speaker = "unk"
# 数分後。
line = "数分後。"

[[dialogue]]
speaker = "unk"
# プリムラがリバースフォームの能力を全開で発動していると、異変が起こる。
line = "プリムラがリバースフォームの能力を全開で発動していると、異変が起こる。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あれ？　プリムラ、なんか体が光ってるぞ？」
line = "「あれ？　プリムラ、なんか体が光ってるぞ？」"

[[dialogue]]
speaker = "プリムラ"
# 「なっ……！？　しまった……！　これは――」
line = "「なっ……！？　しまった……！　これは――」"

[[dialogue]]
speaker = "プリムラ"
# 「反転した力の『暴走』なのじゃ！　ぬわあああぁ～～～っ！？」
line = "「反転した力の『暴走』なのじゃ！　ぬわあああぁ～～～っ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ぷ、プリムラさん、大丈夫ですか？」
line = "「ぷ、プリムラさん、大丈夫ですか？」"

[[dialogue]]
speaker = "プリムラ"
# 「……ばぶぅ～♪」
line = "「……ばぶぅ～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "unk"
# 心配そうに近づいたマグダレナを見た瞬間――
line = "心配そうに近づいたマグダレナを見た瞬間――"

[[dialogue]]
speaker = "プリムラ"
# 「ママぁ～～っ♪　はああぁっ、ああぅ～♪」
line = "「ママぁ～～っ♪　はああぁっ、ああぅ～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えぇぇぇっ！？　わ、私がママですかぁ～～っ！？」
line = "「えぇぇぇっ！？　わ、私がママですかぁ～～っ！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「プリムラが赤ちゃんみたいになっちゃったのだ！？」
line = "「プリムラが赤ちゃんみたいになっちゃったのだ！？」"

[[dialogue]]
speaker = "unk"
# 実は、リバースフォームのデメリットで……
line = "実は、リバースフォームのデメリットで……"

[[dialogue]]
speaker = "unk"
# 反転の力は制御が難しく、精神面まで反転してしまうことがある。
line = "反転の力は制御が難しく、精神面まで反転してしまうことがある。"

[[dialogue]]
speaker = "unk"
# 『甘えたがりなのに甘えられない』プリムラの本質が裏返り――結果、『赤ちゃんモード』になってしまったのだ。
line = "『甘えたがりなのに甘えられない』プリムラの本質が裏返り――結果、『赤ちゃんモード』になってしまったのだ。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「なるほど！　プリムラは暴走すると、赤ちゃんみたいに甘えたい気持ちが全開になってしまうのだな！」
line = "「なるほど！　プリムラは暴走すると、赤ちゃんみたいに甘えたい気持ちが全開になってしまうのだな！」"

[[dialogue]]
speaker = "プリムラ"
# 「あぁ～い<emoji=heart04>　ママぁ～<emoji=heart04>」
line = "「あぁ～い<emoji=heart04>　ママぁ～<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はああぁっ！？<emoji=heart04><emoji=heart04>　私をママと呼んでくれるなんて、嬉しいですぅ～！　は～い、ママダレナですよぉ～っ<emoji=heart04>」
line = "「はああぁっ！？<emoji=heart04><emoji=heart04>　私をママと呼んでくれるなんて、嬉しいですぅ～！　は～い、ママダレナですよぉ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 甘えてくるプリムラを抱き締めて、頭を撫でるマグダレナ。
line = "甘えてくるプリムラを抱き締めて、頭を撫でるマグダレナ。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ぎゅ～っ♪　よしよし～<emoji=heart04>」
line = "「ぎゅ～っ♪　よしよし～<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「ふわあぁ～い<emoji=heart04>　きゃっきゃ♪」
line = "「ふわあぁ～い<emoji=heart04>　きゃっきゃ♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「プリムラ、本当の赤ちゃんみたいで可愛いのだ♪　アルモたんも遊んであげるぞ！」
line = "「プリムラ、本当の赤ちゃんみたいで可愛いのだ♪　アルモたんも遊んであげるぞ！」"

[[dialogue]]
speaker = "unk"
# そう言って、アルモもプリムラの頭を撫でる――すると。
line = "そう言って、アルモもプリムラの頭を撫でる――すると。"

[[dialogue]]
speaker = "プリムラ"
# 「あっ！　ママ<emoji=heart04>　アルモママ～っ<emoji=heart04>」
line = "「あっ！　ママ<emoji=heart04>　アルモママ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「えっ！？　ちょっ……！？」
line = "「えっ！？　ちょっ……！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「おおっ、アルモたんもママ認定してくれるのか？　よしよし～♪」
line = "「おおっ、アルモたんもママ認定してくれるのか？　よしよし～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「待ってください！　プリムラさん、もっとママダレナに甘えてくださ～い！」
line = "「待ってください！　プリムラさん、もっとママダレナに甘えてくださ～い！」"

[[dialogue]]
speaker = "プリムラ"
# 「ん～？　……ぷいむら、アルモママのほうがしゅき<emoji=heart04>」
line = "「ん～？　……ぷいむら、アルモママのほうがしゅき<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ、アルモにママ<ruby=りょく>力</ruby>で負けたぁぁぁっ！？」
line = "「あ、アルモにママ<ruby>力<rt>りょく</rt></ruby>で負けたぁぁぁっ！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そんなああぁぁぁっ！　うわああああああ～～んっ！！」
line = "「そんなああぁぁぁっ！　うわああああああ～～んっ！！」"

[[dialogue]]
speaker = "unk"
# その後、しばらくして暴走が収まり、プリムラは正気に戻るが……。
line = "その後、しばらくして暴走が収まり、プリムラは正気に戻るが……。"

[[dialogue]]
speaker = "プリムラ"
# 「ハ……ハハ……暴走して赤ちゃん化しているところを見られたのじゃ……最悪じゃ……」
line = "「ハ……ハハ……暴走して赤ちゃん化しているところを見られたのじゃ……最悪じゃ……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「アルモにママとして負けるなんて……ショックです……」
line = "「アルモにママとして負けるなんて……ショックです……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「２人共、精神ダメージが深刻なのだ」
line = "「２人共、精神ダメージが深刻なのだ」"

[[dialogue]]
speaker = "unk"
# プリムラ、大丈夫だ。可愛かったぞ
line = "プリムラ、大丈夫だ。可愛かったぞ"

[[dialogue]]
speaker = "プリムラ"
# 「はぁっ！？　バカモノ！　慰めにもならんわ！　――フヘへへ<emoji=heart04>」
line = "「はぁっ！？　バカモノ！　慰めにもならんわ！　――フヘへへ<emoji=heart04>」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「即回復したのだ！？　めちゃくちゃチョロいメンタルなのだ！」
line = "「即回復したのだ！？　めちゃくちゃチョロいメンタルなのだ！」"

[[dialogue]]
speaker = "unk"
# 俺はプリムラの恋人だからな
line = "俺はプリムラの恋人だからな"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「うぅ～、私も誰か慰めてくださ～い」
line = "「うぅ～、私も誰か慰めてくださ～い」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「お～、よしよし。いつものことだから気にするななのだ～」
line = "「お～、よしよし。いつものことだから気にするななのだ～」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いつものこと！？　酷いです！　うわああぁ～ん！」
line = "「いつものこと！？　酷いです！　うわああぁ～ん！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あ～あ～、泣くななのだ！　こういう時はお肉なのだ！　美味しいお肉を食べれば元気が出るぞ♪」
line = "「あ～あ～、泣くななのだ！　こういう時はお肉なのだ！　美味しいお肉を食べれば元気が出るぞ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「……我も気晴らししたい気分じゃ。ハンバーグでも食べに行くか？」
line = "「……我も気晴らししたい気分じゃ。ハンバーグでも食べに行くか？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えっ、プリムラ、ハンバーグが好きなのか？」
line = "「えっ、プリムラ、ハンバーグが好きなのか？」"

[[dialogue]]
speaker = "プリムラ"
# 「うむ。よく行く美味い店があってな。名前は――」
line = "「うむ。よく行く美味い店があってな。名前は――」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「あっ！　そこ、アルモたんもよく行くお店なのだ～♪」
line = "「あっ！　そこ、アルモたんもよく行くお店なのだ～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「本当か！？　貴様、気が合うではないか！　よし、ならば気晴らしに、一緒に食べに行くのじゃ！」
line = "「本当か！？　貴様、気が合うではないか！　よし、ならば気晴らしに、一緒に食べに行くのじゃ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「お肉で元気を補給するのだ♪　善は急げなのだ～！」
line = "「お肉で元気を補給するのだ♪　善は急げなのだ～！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「って、私だけ仲間ハズレにして盛り上がらないでくださいよ～！　うわ～ん！」
line = "「って、私だけ仲間ハズレにして盛り上がらないでくださいよ～！　うわ～ん！」"

[[dialogue]]
speaker = "unk"
# その後、俺たちはみんなでハンバーグを食べに行き、プリムラは守護天使の２人と、すっかり打ち解けるのだった。
line = "その後、俺たちはみんなでハンバーグを食べに行き、プリムラは守護天使の２人と、すっかり打ち解けるのだった。"
