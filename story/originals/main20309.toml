[[dialogue]]
speaker = "unk"
# 第９話,もう１人の星徒会長,B
line = "第９話,もう１人の星徒会長,B"

[[dialogue]]
speaker = "梨緒"
# 「私はこことは違う新星学園にいて、そこでは星徒会副会長だった」
line = "「私はこことは違う新星学園にいて、そこでは星徒会副会長だった」"

[[dialogue]]
speaker = "梨緒"
# 「そしてジグは……星徒会長だった」
line = "「そしてジグは……星徒会長だった」"

[[dialogue]]
speaker = "unk"
# だが記録上、新星にレナーテ・Ｚ・サイフリートという名の星徒会長は存在したことがない。
line = "だが記録上、新星にレナーテ・Ｚ・サイフリートという名の星徒会長は存在したことがない。"

[[dialogue]]
speaker = "unk"
# これも梨緒がアルタイルではない、平行世界からやって来たという証左の１つになってしまったわけだが、今は彼女の話に水を差すのはやめておこう。
line = "これも梨緒がアルタイルではない、平行世界からやって来たという証左の１つになってしまったわけだが、今は彼女の話に水を差すのはやめておこう。"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんの仲間……だったんだよね」
line = "「梨緒ちゃんの仲間……だったんだよね」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ。あいつと一緒に、いろんな敵と戦った」
line = "「……ああ。あいつと一緒に、いろんな敵と戦った」"

[[dialogue]]
speaker = "梨緒"
# 「周囲を侵食する植物型のモンスター……流星市国上空を覆う巨大なアステラ……そしてあの巨大な<b>手</b>──」
line = "「周囲を侵食する植物型のモンスター……流星市国上空を覆う巨大なアステラ……そしてあの巨大な<b>手</b>──」"

[[dialogue]]
speaker = "梨緒"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん！？」
line = "「梨緒ちゃん！？」"

[[dialogue]]
speaker = "unk"
# 梨緒の顔が苦痛に歪み、咄嗟に頭を押さえる。
line = "梨緒の顔が苦痛に歪み、咄嗟に頭を押さえる。"

[[dialogue]]
speaker = "梨緒"
# 「すまない……ジグのことを考えると、時々頭が痛むんだ……」
line = "「すまない……ジグのことを考えると、時々頭が痛むんだ……」"

[[dialogue]]
speaker = "梨緒"
# 「気にしないでくれ、少しすれば収まる……」
line = "「気にしないでくれ、少しすれば収まる……」"

[[dialogue]]
speaker = "unk"
# そう言って梨緒は、頭痛をこらえるように自分のこめかみをギュっと抑えた。
line = "そう言って梨緒は、頭痛をこらえるように自分のこめかみをギュっと抑えた。"

[[dialogue]]
speaker = "梨緒"
# 「……私は数ヶ月前、星見家に保護されてから、ずっとジグを探していた。私が生きているなら、きっとあいつも生きて近くにいると思っていた」
line = "「……私は数ヶ月前、星見家に保護されてから、ずっとジグを探していた。私が生きているなら、きっとあいつも生きて近くにいると思っていた」"

[[dialogue]]
speaker = "梨緒"
# 「確かにジグは生きていた。だけど──」
line = "「確かにジグは生きていた。だけど──」"

[[dialogue]]
speaker = "unk"
# 最悪の形で再会した。
line = "最悪の形で再会した。"

[[dialogue]]
speaker = "unk"
# ジグは仮面を付け、『リクリエの使徒』という、世界の最大の敵となって、俺たちの前に立ちふさがった。
line = "ジグは仮面を付け、『リクリエの使徒』という、世界の最大の敵となって、俺たちの前に立ちふさがった。"

[[dialogue]]
speaker = "梨緒"
# 「緋宮クロトから事前に聞かされていた『リクリエの使徒』の特徴に、ジグはあまりにも一致していた」
line = "「緋宮クロトから事前に聞かされていた『リクリエの使徒』の特徴に、ジグはあまりにも一致していた」"

[[dialogue]]
speaker = "梨緒"
# 「嫌でもわかる。あれは……私たちの敵だ」
line = "「嫌でもわかる。あれは……私たちの敵だ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグは昔から強かった」
line = "「ジグは昔から強かった」"

[[dialogue]]
speaker = "梨緒"
# 「彼女とは新星に入学した時から競い合う仲だったが……勝負はいつもジグの勝ちだった」
line = "「彼女とは新星に入学した時から競い合う仲だったが……勝負はいつもジグの勝ちだった」"

[[dialogue]]
speaker = "梨緒"
# 「星徒会長の座をかけて戦ったこともあったが、会長になったのはジグだった」
line = "「星徒会長の座をかけて戦ったこともあったが、会長になったのはジグだった」"

[[dialogue]]
speaker = "梨緒"
# 「副会長になってからも、ジグとは何度も勝負をした。だけどただの一度も、勝つことはできなかった」
line = "「副会長になってからも、ジグとは何度も勝負をした。だけどただの一度も、勝つことはできなかった」"

[[dialogue]]
speaker = "梨緒"
# 「私は……ジグが嫌いだった」
line = "「私は……ジグが嫌いだった」"

[[dialogue]]
speaker = "梨緒"
# 「何回挑んでも勝てなくて、いつも余裕で……誰よりも強くて……」
line = "「何回挑んでも勝てなくて、いつも余裕で……誰よりも強くて……」"

[[dialogue]]
speaker = "梨緒"
# 「だというのに、なぜ……ジグがリクリエの使徒なんかに……」
line = "「だというのに、なぜ……ジグがリクリエの使徒なんかに……」"

[[dialogue]]
speaker = "アポロ"
# 「<ruby=あれ>仮面</ruby>が持ちかけるのは、悪魔の契約だ。人の望みに付け入り、甘い言葉で誘惑し、解釈を捻じ曲げる」
line = "「<ruby>仮面<rt>あれ</rt></ruby>が持ちかけるのは、悪魔の契約だ。人の望みに付け入り、甘い言葉で誘惑し、解釈を捻じ曲げる」"

[[dialogue]]
speaker = "梨緒"
# 「アポロ……？」
line = "「アポロ……？」"

[[dialogue]]
speaker = "アポロ"
# 「ジグは恐らく、願っちまったんだろう。あたしと同じように、『もしやり直せたら』って」
line = "「ジグは恐らく、願っちまったんだろう。あたしと同じように、『もしやり直せたら』って」"

[[dialogue]]
speaker = "アポロ"
# 「だけどな！　『もっと上手くやりたかった』なんて、誰でも考えることだ！」
line = "「だけどな！　『もっと上手くやりたかった』なんて、誰でも考えることだ！」"

[[dialogue]]
speaker = "アポロ"
# 「あの仮面は、そういう誰もが当たり前に思っていることに付け入って、解釈を捻じ曲げる！」
line = "「あの仮面は、そういう誰もが当たり前に思っていることに付け入って、解釈を捻じ曲げる！」"

[[dialogue]]
speaker = "アポロ"
# 「ジグはリクリエなんて望んでないと思うぜ。たちの悪い仮面に利用されているだけだ！　当事者だったあたしが言うんだから、間違いない！」
line = "「ジグはリクリエなんて望んでないと思うぜ。たちの悪い仮面に利用されているだけだ！　当事者だったあたしが言うんだから、間違いない！」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。ありがとう、アポロ」
line = "「ああ。ありがとう、アポロ」"

[[dialogue]]
speaker = "ベアトリス"
# 「以前、アポロちゃんがリクリエの使徒だった、ということは、使徒になった人は助けられるってことだよね？」
line = "「以前、アポロちゃんがリクリエの使徒だった、ということは、使徒になった人は助けられるってことだよね？」"

[[dialogue]]
speaker = "ナターシャ"
# 「確かに。そこから助かった例があるなら、そこまで悲観的にならなくていいのかも？」
line = "「確かに。そこから助かった例があるなら、そこまで悲観的にならなくていいのかも？」"

[[dialogue]]
speaker = "クロト"
# 「……後ろ向きなことを言うようで申し訳ないが、正直に言って確証はない」
line = "「……後ろ向きなことを言うようで申し訳ないが、正直に言って確証はない」"

[[dialogue]]
speaker = "クロト"
# 「アポロの場合、双子であるフィオナとの共鳴や、本人が魔王の資質を開花させていることもあって、一般的な事例とは言いづらい」
line = "「アポロの場合、双子であるフィオナとの共鳴や、本人が魔王の資質を開花させていることもあって、一般的な事例とは言いづらい」"

[[dialogue]]
speaker = "クロト"
# 「ジグが梨緒の仲間なら、助けられるすべを探りたいとは思っているんだが……楽観視はしないでほしい」
line = "「ジグが梨緒の仲間なら、助けられるすべを探りたいとは思っているんだが……楽観視はしないでほしい」"

[[dialogue]]
speaker = "クロト"
# 「これは救出を諦めよう、ってことじゃない。恐らく困難な道になるから、今から備えようって話だ」
line = "「これは救出を諦めよう、ってことじゃない。恐らく困難な道になるから、今から備えようって話だ」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ、わかっている」
line = "「……ああ、わかっている」"

[[dialogue]]
speaker = "梨緒"
# 「それにいざという時は、私がジグを討つ。例え刺し違えたとしても──」
line = "「それにいざという時は、私がジグを討つ。例え刺し違えたとしても──」"

[[dialogue]]
speaker = "ナターシャ"
# 「えい」
line = "「えい」"

[[dialogue]]
speaker = "梨緒"
# 「あいたっ！？」
line = "「あいたっ！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃん！？」
line = "「ナターシャちゃん！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「はいはい、刺し違えるとか簡単に言わない。そういうのは最後の手段でしょ」
line = "「はいはい、刺し違えるとか簡単に言わない。そういうのは最後の手段でしょ」"

[[dialogue]]
speaker = "ナターシャ"
# 「だいたいさ、命捨てたからってあのジグってやつを倒せるの？　負けっぱなしだったんでしょ？」
line = "「だいたいさ、命捨てたからってあのジグってやつを倒せるの？　負けっぱなしだったんでしょ？」"

[[dialogue]]
speaker = "梨緒"
# 「な……！　それは──」
line = "「な……！　それは──」"

[[dialogue]]
speaker = "ナターシャ"
# 「ていうか会長さんの話聞いてた？　きっと大変だから、今のうちから準備しておこうって話をしてたわけ」
line = "「ていうか会長さんの話聞いてた？　きっと大変だから、今のうちから準備しておこうって話をしてたわけ」"

[[dialogue]]
speaker = "ナターシャ"
# 「私たちは昨日初めてジグに出会ったところなんだから、とりあえずあいつがどんなやつなのか知りたかっただけ」
line = "「私たちは昨日初めてジグに出会ったところなんだから、とりあえずあいつがどんなやつなのか知りたかっただけ」"

[[dialogue]]
speaker = "ナターシャ"
# 「それ以上のことは、これから調べるし、これから考えるんだから、先回りして答えを出さなくていいんだよ」
line = "「それ以上のことは、これから調べるし、これから考えるんだから、先回りして答えを出さなくていいんだよ」"

[[dialogue]]
speaker = "梨緒"
# 「……ナターシャ」
line = "「……ナターシャ」"

[[dialogue]]
speaker = "アポロ"
# 「ナターシャの言う通りだな！　ラッカン的もよくないが、ヒカン的なのもよくないぞ！」
line = "「ナターシャの言う通りだな！　ラッカン的もよくないが、ヒカン的なのもよくないぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「あたしという事例がある以上、あの仮面は顔に引っ付いて絶対に取れない、ってわけじゃない！　何かきっかけさえあれば助けられるってことだ」
line = "「あたしという事例がある以上、あの仮面は顔に引っ付いて絶対に取れない、ってわけじゃない！　何かきっかけさえあれば助けられるってことだ」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ、君たちの言う通りだな。考えすぎは良くない、肝に銘じておく」
line = "「……ああ、君たちの言う通りだな。考えすぎは良くない、肝に銘じておく」"

[[dialogue]]
speaker = "unk"
# 仲間の言葉を聞いた梨緒は、少しだけ肩の力を抜いて、小さく微笑んだ。
line = "仲間の言葉を聞いた梨緒は、少しだけ肩の力を抜いて、小さく微笑んだ。"

[[dialogue]]
speaker = "クロト"
# 「そういえば、ジグについてもう１つ聞いておきたいことがあった」
line = "「そういえば、ジグについてもう１つ聞いておきたいことがあった」"

[[dialogue]]
speaker = "梨緒"
# 「わかる範囲でなら、なんでも答えよう」
line = "「わかる範囲でなら、なんでも答えよう」"

[[dialogue]]
speaker = "クロト"
# 「彼女は『リクリエの使徒』ではなく、“真なる神の騎士”と名乗っていた。この“真なる神”というのが何を指しているのか、梨緒に心当たりはあるか……？」
line = "「彼女は『リクリエの使徒』ではなく、“真なる神の騎士”と名乗っていた。この“真なる神”というのが何を指しているのか、梨緒に心当たりはあるか……？」"

[[dialogue]]
speaker = "梨緒"
# 「すまない。それについては私も気になったんだが……思い当たる節は特にないんだ」
line = "「すまない。それについては私も気になったんだが……思い当たる節は特にないんだ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグは特別熱心な信徒ではなかったはずだが、それでも女神様を信じていた」
line = "「ジグは特別熱心な信徒ではなかったはずだが、それでも女神様を信じていた」"

[[dialogue]]
speaker = "梨緒"
# 「そもそも、星力を扱う私たち星騎士の中で、女神様を信じていない者はほとんどいないだろう？」
line = "「そもそも、星力を扱う私たち星騎士の中で、女神様を信じていない者はほとんどいないだろう？」"

[[dialogue]]
speaker = "クロト"
# 「となると、使徒になった後に何かがあったと考えるべきか……？」
line = "「となると、使徒になった後に何かがあったと考えるべきか……？」"

[[dialogue]]
speaker = "クロト"
# 「ひとまず、情報ありがとう。考えて答えが出るようなものではないから、今は頭の片隅に置いておくことにするよ」
line = "「ひとまず、情報ありがとう。考えて答えが出るようなものではないから、今は頭の片隅に置いておくことにするよ」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、私も何か関連するようなことを見聞きしたら、共有しよう」
line = "「ああ、私も何か関連するようなことを見聞きしたら、共有しよう」"

[[dialogue]]
speaker = "クロト"
# 「それと、ジグの詳細については、星徒会でも共有してしまっていいだろうか？」
line = "「それと、ジグの詳細については、星徒会でも共有してしまっていいだろうか？」"

[[dialogue]]
speaker = "梨緒"
# 「もちろんだ。そのために君を呼んだんだからな」
line = "「もちろんだ。そのために君を呼んだんだからな」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、それと……」
line = "「ああ、それと……」"

[[dialogue]]
speaker = "梨緒"
# 「平行世界絡みの事件では共同歩調を取るが、私は魔王、君を完全に信用したわけではない」
line = "「平行世界絡みの事件では共同歩調を取るが、私は魔王、君を完全に信用したわけではない」"

[[dialogue]]
speaker = "梨緒"
# 「選挙管理委員会として、今後も星徒会の動向と、魔王の力の管理を厳しく監視していくつもりだ」
line = "「選挙管理委員会として、今後も星徒会の動向と、魔王の力の管理を厳しく監視していくつもりだ」"

[[dialogue]]
speaker = "梨緒"
# 「まだ馴れ合うつもりはない、勘違いするんじゃないぞっ！」
line = "「まだ馴れ合うつもりはない、勘違いするんじゃないぞっ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「今、『まだ』って言った？」
line = "「今、『まだ』って言った？」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん、最終的には馴れ合っちゃうつもりなの？」
line = "「梨緒ちゃん、最終的には馴れ合っちゃうつもりなの？」"

[[dialogue]]
speaker = "アポロ"
# 「おぉ……これが『つんでれ』って奴か？」
line = "「おぉ……これが『つんでれ』って奴か？」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 選挙管理委員会の心強い仲間たちが、背中から委員長を串刺しにしていたが、梨緒は必死に振り向かないようにしていた。今のを聞こえないフリとは、なかなかやるな……
line = "選挙管理委員会の心強い仲間たちが、背中から委員長を串刺しにしていたが、梨緒は必死に振り向かないようにしていた。今のを聞こえないフリとは、なかなかやるな……"

[[dialogue]]
speaker = "クロト"
# 「俺としても魔王の力を暴走させるのは避けたい。だから、選管の力も遠慮なく頼ることにするよ」
line = "「俺としても魔王の力を暴走させるのは避けたい。だから、選管の力も遠慮なく頼ることにするよ」"

[[dialogue]]
speaker = "クロト"
# 「というわけで、お手柔らかに頼みます、梨緒委員長」
line = "「というわけで、お手柔らかに頼みます、梨緒委員長」"

[[dialogue]]
speaker = "unk"
# そう言い残して、俺は一足先に保健室を後にするのだった。
line = "そう言い残して、俺は一足先に保健室を後にするのだった。"
