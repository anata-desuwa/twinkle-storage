[[dialogue]]
speaker = "unk"
# 第２話,副会長来訪？,P
line = "第２話,副会長来訪？,P"

[[dialogue]]
speaker = "マトイ"
# 「ねぇ会長、学園生活や星徒会には慣れてきた？」
line = "「ねぇ会長、学園生活や星徒会には慣れてきた？」"

[[dialogue]]
speaker = "unk"
# おかげさまで
line = "おかげさまで"

[[dialogue]]
speaker = "マトイ"
# 「なら良かった。いきなりの御前試合だったもんね。私も驚いちゃった」
line = "「なら良かった。いきなりの御前試合だったもんね。私も驚いちゃった」"

[[dialogue]]
speaker = "セーラ"
# 「やっほー。遊びに来たよ～♪」
line = "「やっほー。遊びに来たよ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「セーラ先輩が言うと本気に聞こえますよ」
line = "「セーラ先輩が言うと本気に聞こえますよ」"

[[dialogue]]
speaker = "セーラ"
# 「ソフィアっち手厳しー。はい、これお土産のお菓子。お母さんの実家から送ってくれたやつでマジオススメ」
line = "「ソフィアっち手厳しー。はい、これお土産のお菓子。お母さんの実家から送ってくれたやつでマジオススメ」"

[[dialogue]]
speaker = "マトイ"
# 「あ、美味しそう……。わざわざありがとうございます。お茶淹れますね」
line = "「あ、美味しそう……。わざわざありがとうございます。お茶淹れますね」"

[[dialogue]]
speaker = "ソフィア"
# 「いえ、お構いなく。遊びに来たわけではありませんので」
line = "「いえ、お構いなく。遊びに来たわけではありませんので」"

[[dialogue]]
speaker = "セーラ"
# 「まぁまぁ。これから仲良くしなきゃだし、遠慮しなくていいんじゃない？」
line = "「まぁまぁ。これから仲良くしなきゃだし、遠慮しなくていいんじゃない？」"

[[dialogue]]
speaker = "マトイ"
# 「そうですね。どうぞどうぞ」
line = "「そうですね。どうぞどうぞ」"

[[dialogue]]
speaker = "ソフィア"
# 「むー……」
line = "「むー……」"

[[dialogue]]
speaker = "unk"
# 何かご用ですか？
line = "何かご用ですか？"

[[dialogue]]
speaker = "セーラ"
# 「新星の星徒会でも聞いてるっしょ？　今回のリクリエはヤバそうだから流星と新星両校の連携を強めていきたいって話。こないだの星読事変のこともあるしね」
line = "「新星の星徒会でも聞いてるっしょ？　今回のリクリエはヤバそうだから流星と新星両校の連携を強めていきたいって話。こないだの星読事変のこともあるしね」"

[[dialogue]]
speaker = "セーラ"
# 「でも新星学園ってこんな感じなんだね～。ライバル校だから入ったことなかったけど、こんなに近くにあるのに全然知らないってのも変な感じ」
line = "「でも新星学園ってこんな感じなんだね～。ライバル校だから入ったことなかったけど、こんなに近くにあるのに全然知らないってのも変な感じ」"

[[dialogue]]
speaker = "セーラ"
# 「そっちの星徒会は会長さんとマトイちゃん……あとヴィーナスちゃん、アナちゃん、サーシャさんだっけ」
line = "「そっちの星徒会は会長さんとマトイちゃん……あとヴィーナスちゃん、アナちゃん、サーシャさんだっけ」"

[[dialogue]]
speaker = "セーラ"
# 「新星の方が自由な校風ってイメージだけど、新星の星徒会のが真面目なメンツ多いかも。流星の方はガラじゃないメンツがけっこういるからね～、うち含めて」
line = "「新星の方が自由な校風ってイメージだけど、新星の星徒会のが真面目なメンツ多いかも。流星の方はガラじゃないメンツがけっこういるからね～、うち含めて」"

[[dialogue]]
speaker = "ソフィア"
# 「全くです。みなさんフィオナ会長をもう少し見習ってください」
line = "「全くです。みなさんフィオナ会長をもう少し見習ってください」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスがいるので自由さならこちらも負けていませんよ」
line = "「ヴィーナスがいるので自由さならこちらも負けていませんよ」"

[[dialogue]]
speaker = "セーラ"
# 「あ～、確かにあの子のフリーダムさには負けるかな。破天荒っていうか、型破りっていうか、楽しそうな子だとは思うけど」
line = "「あ～、確かにあの子のフリーダムさには負けるかな。破天荒っていうか、型破りっていうか、楽しそうな子だとは思うけど」"

[[dialogue]]
speaker = "セーラ"
# 「会長さんとマトイちゃんは星徒会楽しい？」
line = "「会長さんとマトイちゃんは星徒会楽しい？」"

[[dialogue]]
speaker = "マトイ"
# 「楽しいって言っていいのかわかりませんけど……そうですね、楽しんでると思います。振り回されることも多いですが」
line = "「楽しいって言っていいのかわかりませんけど……そうですね、楽しんでると思います。振り回されることも多いですが」"

[[dialogue]]
speaker = "unk"
# 俺もけっこう楽しいです
line = "俺もけっこう楽しいです"

[[dialogue]]
speaker = "セーラ"
# 「そっかそっか」
line = "「そっかそっか」"

[[dialogue]]
speaker = "セーラ"
# 「それで本題だけど、こういうのどう？　ちょっと企画資料作ってみたんだけど」
line = "「それで本題だけど、こういうのどう？　ちょっと企画資料作ってみたんだけど」"

[[dialogue]]
speaker = "マトイ"
# 「資料見やすいですね。さすがセーラ先輩です。ふむふむ……両星徒会主導で合同文化祭や、生徒同士で技術を教え合うなど……」
line = "「資料見やすいですね。さすがセーラ先輩です。ふむふむ……両星徒会主導で合同文化祭や、生徒同士で技術を教え合うなど……」"

[[dialogue]]
speaker = "セーラ"
# 「あと代表者を出して模擬戦したり、両校対抗の体育大会とか、バチバチぶつかるのでもいいと思うな。激闘の後で友情が芽生える、的な」
line = "「あと代表者を出して模擬戦したり、両校対抗の体育大会とか、バチバチぶつかるのでもいいと思うな。激闘の後で友情が芽生える、的な」"

[[dialogue]]
speaker = "ソフィア"
# 「流星学園と新星学園の部活同士で競うのもいいかもしれませんね」
line = "「流星学園と新星学園の部活同士で競うのもいいかもしれませんね」"

[[dialogue]]
speaker = "マトイ"
# 「ではお菓子いただきますね。……あ、このおせんべい、ほんとにおいしい」
line = "「ではお菓子いただきますね。……あ、このおせんべい、ほんとにおいしい」"

[[dialogue]]
speaker = "セーラ"
# 「マトイちゃんが全部食べちゃっても口裏合わせてあげるからね」
line = "「マトイちゃんが全部食べちゃっても口裏合わせてあげるからね」"

[[dialogue]]
speaker = "マトイ"
# 「もうっ、みんなの分もちゃんと残しておきますから」
line = "「もうっ、みんなの分もちゃんと残しておきますから」"

[[dialogue]]
speaker = "セーラ"
# 「ははははっ」
line = "「ははははっ」"

[[dialogue]]
speaker = "セーラ"
# 「見送りありがと。ソフィアちゃんはスケートの練習あるからって、お姉ちゃんにも会わずにさっさと帰っちったけど」
line = "「見送りありがと。ソフィアちゃんはスケートの練習あるからって、お姉ちゃんにも会わずにさっさと帰っちったけど」"

[[dialogue]]
speaker = "セーラ"
# 「いや～、ソフィアちゃんもマトイちゃんも真面目だけど、うちへの態度全然違うね～。あ、マトイちゃんにはお茶ありがとうって伝えといて」
line = "「いや～、ソフィアちゃんもマトイちゃんも真面目だけど、うちへの態度全然違うね～。あ、マトイちゃんにはお茶ありがとうって伝えといて」"

[[dialogue]]
speaker = "セーラ"
# 「じゃ、今日出たアイディアはお互いの星徒会で共有しとくとして、今後も案を出し合っていこー」
line = "「じゃ、今日出たアイディアはお互いの星徒会で共有しとくとして、今後も案を出し合っていこー」"

[[dialogue]]
speaker = "セーラ"
# 「会長さんはどんなふうに仕事してるのかなと思ったけど、それなりにやれてそうだね。見に来れて良かったよ」
line = "「会長さんはどんなふうに仕事してるのかなと思ったけど、それなりにやれてそうだね。見に来れて良かったよ」"

[[dialogue]]
speaker = "セーラ"
# 「流星と新星の星徒会って普通じゃないし大変だから、自分の意志じゃないと後悔するかもしれない。もちろん自分で選んでも後悔するかもしれないけど」
line = "「流星と新星の星徒会って普通じゃないし大変だから、自分の意志じゃないと後悔するかもしれない。もちろん自分で選んでも後悔するかもしれないけど」"

[[dialogue]]
speaker = "セーラ"
# 「……でも、会長さんがそうじゃなくて良かった」
line = "「……でも、会長さんがそうじゃなくて良かった」"

[[dialogue]]
speaker = "unk"
# セーラさんはどうだったんですか？
line = "セーラさんはどうだったんですか？"

[[dialogue]]
speaker = "セーラ"
# 「ん？　前の星徒会のことが気になる？　そっか、居残り組だって言ってたもんね」
line = "「ん？　前の星徒会のことが気になる？　そっか、居残り組だって言ってたもんね」"

[[dialogue]]
speaker = "セーラ"
# 「うち、前の星徒会長に誘われて星徒会に入ったの。自慢話みたいでアレなんだけど……１年の時に実技試験でめっちゃいい点出て、その時の星徒会長に目をつけられちゃって」
line = "「うち、前の星徒会長に誘われて星徒会に入ったの。自慢話みたいでアレなんだけど……１年の時に実技試験でめっちゃいい点出て、その時の星徒会長に目をつけられちゃって」"

[[dialogue]]
speaker = "セーラ"
# 「最初はやんわり断ったし、実技でわざと手を抜いて最初のはまぐれですって言ったんだけど、それでも諦めてくれなくて」
line = "「最初はやんわり断ったし、実技でわざと手を抜いて最初のはまぐれですって言ったんだけど、それでも諦めてくれなくて」"

[[dialogue]]
speaker = "セーラ"
# 「あなたが必要なの、ってまっすぐ目を見て口説かれちゃってね。結局、星徒会入っちゃった」
line = "「あなたが必要なの、ってまっすぐ目を見て口説かれちゃってね。結局、星徒会入っちゃった」"

[[dialogue]]
speaker = "セーラ"
# 「でもその時にはうちはもう２年になってて、センパイ――あ、例のうちを勧誘した当時の星徒会長のことなんだけど。センパイと同じ星徒会にいられたのは短い間だけだった」
line = "「でもその時にはうちはもう２年になってて、センパイ――あ、例のうちを勧誘した当時の星徒会長のことなんだけど。センパイと同じ星徒会にいられたのは短い間だけだった」"

[[dialogue]]
speaker = "セーラ"
# 「『センパイ、もういなくなっちゃうじゃないですか』って、ぶー垂れながら言ったんだけどさ、センパイは得意げに笑ってた」
line = "「『センパイ、もういなくなっちゃうじゃないですか』って、ぶー垂れながら言ったんだけどさ、センパイは得意げに笑ってた」"

[[dialogue]]
speaker = "セーラ"
# 「その顔見てたら、文句言えなくなっちゃって。会長が代わっても、何かの形で星徒会には関わろうって思ったの」
line = "「その顔見てたら、文句言えなくなっちゃって。会長が代わっても、何かの形で星徒会には関わろうって思ったの」"

[[dialogue]]
speaker = "セーラ"
# 「だからって副会長になるとは思わなかったけど！」
line = "「だからって副会長になるとは思わなかったけど！」"

[[dialogue]]
speaker = "セーラ"
# 「……って、会長さんはもっとすごいよね、転入してすぐ御前試合だったんだから。なんかおかしーや」
line = "「……って、会長さんはもっとすごいよね、転入してすぐ御前試合だったんだから。なんかおかしーや」"

[[dialogue]]
speaker = "セーラ"
# 「でも懐かしいな～。前の星徒会も楽しかったなー」
line = "「でも懐かしいな～。前の星徒会も楽しかったなー」"

[[dialogue]]
speaker = "セーラ"
# 「任期が終わって解散した時、いい仲間だったなって会長さんも振り返れるといいね」
line = "「任期が終わって解散した時、いい仲間だったなって会長さんも振り返れるといいね」"

[[dialogue]]
speaker = "セーラ"
# 「おっと、電話だ。ごめーん、それじゃまったね～」
line = "「おっと、電話だ。ごめーん、それじゃまったね～」"
