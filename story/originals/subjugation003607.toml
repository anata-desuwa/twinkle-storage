[[dialogue]]
speaker = "フワッチ"
# 「イ～～ッ」
line = "「イ～～ッ」"

[[dialogue]]
speaker = "イレーナ"
# 「あいつらね……」
line = "「あいつらね……」"

[[dialogue]]
speaker = "ジュエリー"
# 「では張り切っていこうじゃないか──ジュエルローズ！」
line = "「では張り切っていこうじゃないか──ジュエルローズ！」"

[[dialogue]]
speaker = "unk"
# 繰り出された攻撃がヒットし、モンスターを消滅させる。
line = "繰り出された攻撃がヒットし、モンスターを消滅させる。"

[[dialogue]]
speaker = "ジュエリー"
# 「ふむ。エクリプスフォームも良いが、こちらも気に入ったよ」
line = "「ふむ。エクリプスフォームも良いが、こちらも気に入ったよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「さあ、イレーナさんも試してみるといい」
line = "「さあ、イレーナさんも試してみるといい」"

[[dialogue]]
speaker = "イレーナ"
# 「どうしてそんな恥ずかしい格好でそんな堂々と戦えるわけ？　信じられないんだけど……」
line = "「どうしてそんな恥ずかしい格好でそんな堂々と戦えるわけ？　信じられないんだけど……」"

[[dialogue]]
speaker = "ジュエリー"
# 「愚問だね。助手とウェディングドレスで並んで戦うことが出来る。これほど誇らしいことがあるだろうか」
line = "「愚問だね。助手とウェディングドレスで並んで戦うことが出来る。これほど誇らしいことがあるだろうか」"

[[dialogue]]
speaker = "イレーナ"
# 「そういやあんた、普段から愛しの助手だの何だの恥ずかしげもなく言ってたわね……」
line = "「そういやあんた、普段から愛しの助手だの何だの恥ずかしげもなく言ってたわね……」"

[[dialogue]]
speaker = "フワッチ"
# 「イ～～！」
line = "「イ～～！」"

[[dialogue]]
speaker = "unk"
# イレーナ！　そっちに行った！
line = "イレーナ！　そっちに行った！"

[[dialogue]]
speaker = "イレーナ"
# 「分かってるわよ！　ディアマンテ・レガーメ！」
line = "「分かってるわよ！　ディアマンテ・レガーメ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「文句を言いながらも、ちゃんと使いこなしているじゃないか」
line = "「文句を言いながらも、ちゃんと使いこなしているじゃないか」"

[[dialogue]]
speaker = "イレーナ"
# 「誰かに見られる前にさっさと片付けたいだけよ」
line = "「誰かに見られる前にさっさと片付けたいだけよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ、私も負けていられないね。……そこだ！」
line = "「ふふ、私も負けていられないね。……そこだ！」"

[[dialogue]]
speaker = "unk"
# イレーナに負けじとモンスターに攻撃するジュエリー。
line = "イレーナに負けじとモンスターに攻撃するジュエリー。"

[[dialogue]]
speaker = "unk"
# しかし慣れないウェディングフォームのせいか、モンスターを仕留めそこなってしまった。
line = "しかし慣れないウェディングフォームのせいか、モンスターを仕留めそこなってしまった。"

[[dialogue]]
speaker = "イレーナ"
# 「ああもうっ！　ちょっと浮かれ過ぎっ！」
line = "「ああもうっ！　ちょっと浮かれ過ぎっ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「すまない、助かったよ」
line = "「すまない、助かったよ」"

[[dialogue]]
speaker = "unk"
# イレーナがジュエリーを攻撃からかばう。
line = "イレーナがジュエリーを攻撃からかばう。"

[[dialogue]]
speaker = "unk"
# その隙に今度こそ、ジュエリーは全ての敵をなぎ倒したのだった。
line = "その隙に今度こそ、ジュエリーは全ての敵をなぎ倒したのだった。"

[[dialogue]]
speaker = "ジュエリー"
# 「ふぅ……どうにか片付いたようだね」
line = "「ふぅ……どうにか片付いたようだね」"

[[dialogue]]
speaker = "イレーナ"
# 「ええ。それじゃ、人が集まってくる前にあたしたちは退散しましょ」
line = "「ええ。それじゃ、人が集まってくる前にあたしたちは退散しましょ」"

[[dialogue]]
speaker = "ジュエリー"
# 「どうしてだい？　せっかくだからウェディングフォームを皆にお披露目していけばいいのに」
line = "「どうしてだい？　せっかくだからウェディングフォームを皆にお披露目していけばいいのに」"

[[dialogue]]
speaker = "イレーナ"
# 「絶対に嫌よ。こんな格好、出来れば誰にも見られたくないわ。フォームが解除出来たらそのままお蔵入りにしてやるんだから」
line = "「絶対に嫌よ。こんな格好、出来れば誰にも見られたくないわ。フォームが解除出来たらそのままお蔵入りにしてやるんだから」"

[[dialogue]]
speaker = "ジュエリー"
# 「それはもったいない。白いドレスを翻して舞うように戦うキミの姿は、まさに聖女そのものだった。市井の人々もその姿を見たいと思うのだけど」
line = "「それはもったいない。白いドレスを翻して舞うように戦うキミの姿は、まさに聖女そのものだった。市井の人々もその姿を見たいと思うのだけど」"

[[dialogue]]
speaker = "イレーナ"
# 「だとしたら、ますます誰にも見せたくないわ」
line = "「だとしたら、ますます誰にも見せたくないわ」"

[[dialogue]]
speaker = "ジュエリー"
# 「おや、何故だい？」
line = "「おや、何故だい？」"

[[dialogue]]
speaker = "イレーナ"
# 「……そもそもあたしが聖女とか言われて崇められること自体が間違っているのよ」
line = "「……そもそもあたしが聖女とか言われて崇められること自体が間違っているのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしは別に熱心に女神さまを信じているわけでもないし、みんなが思っているような慈しみの心なんて持ち合わせていない」
line = "「あたしは別に熱心に女神さまを信じているわけでもないし、みんなが思っているような慈しみの心なんて持ち合わせていない」"

[[dialogue]]
speaker = "イレーナ"
# 「本当のあたしを見たあんたなら分かるでしょ？　こんなあたしが聖女なんておこがましいにも程があるわ」
line = "「本当のあたしを見たあんたなら分かるでしょ？　こんなあたしが聖女なんておこがましいにも程があるわ」"

[[dialogue]]
speaker = "ジュエリー"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "イレーナ"
# 「このウェディングフォームだって同じよ。あたしに花嫁なんて相応しくない」
line = "「このウェディングフォームだって同じよ。あたしに花嫁なんて相応しくない」"

[[dialogue]]
speaker = "イレーナ"
# 「聖女の仮面を被っている時ならいざ知らず、本当のあたしを花嫁に欲しがる物好きなんてどこにもいないんだから」
line = "「聖女の仮面を被っている時ならいざ知らず、本当のあたしを花嫁に欲しがる物好きなんてどこにもいないんだから」"

[[dialogue]]
speaker = "ジュエリー"
# 「イレーナさん……どうやらキミは勘違いをしているようだね」
line = "「イレーナさん……どうやらキミは勘違いをしているようだね」"

[[dialogue]]
speaker = "イレーナ"
# 「勘違い？」
line = "「勘違い？」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミは自分のことをエセ聖女だと思っているようだけど……違うね、キミは本物の聖女だ」
line = "「キミは自分のことをエセ聖女だと思っているようだけど……違うね、キミは本物の聖女だ」"

[[dialogue]]
speaker = "イレーナ"
# 「それもお得意の推理？」
line = "「それもお得意の推理？」"

[[dialogue]]
speaker = "ジュエリー"
# 「いいや。推理するまでもない、私は知っているからね」
line = "「いいや。推理するまでもない、私は知っているからね」"

[[dialogue]]
speaker = "ジュエリー"
# 「あれは私がイタリアで事件を解決した後の出来事、珍しく出現したモンスターに襲われてしまった時のことだ」
line = "「あれは私がイタリアで事件を解決した後の出来事、珍しく出現したモンスターに襲われてしまった時のことだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「当時の私はまだ戦闘経験も少なく、モンスターに追い込まれてしまった」
line = "「当時の私はまだ戦闘経験も少なく、モンスターに追い込まれてしまった」"

[[dialogue]]
speaker = "ジュエリー"
# 「手傷を負い、袋小路に追い詰められ……朦朧とした意識の中、最後の瞬間を覚悟した──その時だった」
line = "「手傷を負い、袋小路に追い詰められ……朦朧とした意識の中、最後の瞬間を覚悟した──その時だった」"

[[dialogue]]
speaker = "イレーナ"
# 「ああもう！　しっかりしなさい！！」
line = "「ああもう！　しっかりしなさい！！」"

[[dialogue]]
speaker = "ジュエリー"
# 「叱咤の声と共に、私を助けてくれた人がいた」
line = "「叱咤の声と共に、私を助けてくれた人がいた」"

[[dialogue]]
speaker = "ジュエリー"
# 「本当はお礼を言いたかったのだけど、残念なことに私を助けてくれたその声の主が誰なのかは分からなかった。途中で意識を失ってしまったからね」
line = "「本当はお礼を言いたかったのだけど、残念なことに私を助けてくれたその声の主が誰なのかは分からなかった。途中で意識を失ってしまったからね」"

[[dialogue]]
speaker = "ジュエリー"
# 「しかし本当のキミを見て理解した。あの時、私を助けてくれたのはキミだったんだね、イレーナさん」
line = "「しかし本当のキミを見て理解した。あの時、私を助けてくれたのはキミだったんだね、イレーナさん」"

[[dialogue]]
speaker = "イレーナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "イレーナ"
# 「そんなこと、あったような……なかったような……ごめん、あんまり覚えてないんだけど」
line = "「そんなこと、あったような……なかったような……ごめん、あんまり覚えてないんだけど」"

[[dialogue]]
speaker = "ジュエリー"
# 「うん、そうだろうと思ったよ。だけどね、私はそこにキミの本質があると思っているんだ」
line = "「うん、そうだろうと思ったよ。だけどね、私はそこにキミの本質があると思っているんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「あの時、キミはモンスターの群れの中に飛び込み、果敢に戦って私を助けてくれた」
line = "「あの時、キミはモンスターの群れの中に飛び込み、果敢に戦って私を助けてくれた」"

[[dialogue]]
speaker = "ジュエリー"
# 「あれはキミにとって当然の行動だった。特別なことではなかった」
line = "「あれはキミにとって当然の行動だった。特別なことではなかった」"

[[dialogue]]
speaker = "ジュエリー"
# 「キミは見返りを求めることなく、苦しむ者に救いの手を差し伸べることが出来る。時に我が身の危険も顧みず誰かを守ることが出来る」
line = "「キミは見返りを求めることなく、苦しむ者に救いの手を差し伸べることが出来る。時に我が身の危険も顧みず誰かを守ることが出来る」"

[[dialogue]]
speaker = "ジュエリー"
# 「その優しさは聖女の仮面をかぶっている時も、本当の自分をさらけ出している時も変わらない」
line = "「その優しさは聖女の仮面をかぶっている時も、本当の自分をさらけ出している時も変わらない」"

[[dialogue]]
speaker = "ジュエリー"
# 「明解に換言するならば──キミはまごうこと無き聖女だ」
line = "「明解に換言するならば──キミはまごうこと無き聖女だ」"

[[dialogue]]
speaker = "イレーナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ジュエリー"
# 「それに思い出してみてくれ　キミの素顔を知って、離れて行った者が１人でもいるかい？」
line = "「それに思い出してみてくれ　キミの素顔を知って、離れて行った者が１人でもいるかい？」"

[[dialogue]]
speaker = "イレーナ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "イレーナ"
# （シャロン……）
line = "（シャロン……）"

[[dialogue]]
speaker = "イレーナ"
# （ウルスラ……）
line = "（ウルスラ……）"

[[dialogue]]
speaker = "イレーナ"
# （いやこいつは記憶から消しておきたい……なかったことにしましょ）
line = "（いやこいつは記憶から消しておきたい……なかったことにしましょ）"

[[dialogue]]
speaker = "イレーナ"
# （会長も……この子も……）
line = "（会長も……この子も……）"

[[dialogue]]
speaker = "ジュエリー"
# 「私の推理によるとそんな人はいない、と思うのだが……どうかな、助手？」
line = "「私の推理によるとそんな人はいない、と思うのだが……どうかな、助手？」"

[[dialogue]]
speaker = "unk"
# 名推理だよ、ジュエリー
line = "名推理だよ、ジュエリー"

[[dialogue]]
speaker = "イレーナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ…………何よ、もう……」
line = "「はぁ…………何よ、もう……」"

[[dialogue]]
speaker = "イレーナ"
# 「結局、あたしが１人で空回ってただけってことじゃない……」
line = "「結局、あたしが１人で空回ってただけってことじゃない……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふ。そういうことだよ、イレーナさん」
line = "「ふふ。そういうことだよ、イレーナさん」"

[[dialogue]]
speaker = "イレーナ"
# 「そうね……あたしは聖女だっていばるつもりはないけど……もう少し、本当の自分に自信を持ってみようかしら」
line = "「そうね……あたしは聖女だっていばるつもりはないけど……もう少し、本当の自分に自信を持ってみようかしら」"

[[dialogue]]
speaker = "ジュエリー"
# 「うん、それでいいと思うよ」
line = "「うん、それでいいと思うよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「そうだ。仲良くなった記念に、私のことは『ジュエリー』と呼び捨てにしてほしい」
line = "「そうだ。仲良くなった記念に、私のことは『ジュエリー』と呼び捨てにしてほしい」"

[[dialogue]]
speaker = "イレーナ"
# 「ええ、そうさせてもらうわ。あたしも『イレーナ』でいいわよ」
line = "「ええ、そうさせてもらうわ。あたしも『イレーナ』でいいわよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「おっと、そういうわけにもいかないよ」
line = "「おっと、そういうわけにもいかないよ」"

[[dialogue]]
speaker = "ジュエリー"
# 「私は流星学園の１年生、イレーナさんは２年生だ。年長者は敬わないとね」
line = "「私は流星学園の１年生、イレーナさんは２年生だ。年長者は敬わないとね」"

[[dialogue]]
speaker = "unk"
# ジュエリーってそういうの気にするの！？
line = "ジュエリーってそういうの気にするの！？"

[[dialogue]]
speaker = "ジュエリー"
# 「失敬だな、我が助手。私は敬語が苦手なだけだ」
line = "「失敬だな、我が助手。私は敬語が苦手なだけだ」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、気持ちはわかるわ。敬語って肩凝るわよね」
line = "「ま、気持ちはわかるわ。敬語って肩凝るわよね」"

[[dialogue]]
speaker = "イレーナ"
# 「だから今後は、プライベートの時は遠慮なく言いたいこと言わせてもらうわ。いいわよね、<b>ジュエリー</b>？」
line = "「だから今後は、プライベートの時は遠慮なく言いたいこと言わせてもらうわ。いいわよね、<b>ジュエリー</b>？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ、よろしく、イレーナさん」
line = "「ああ、よろしく、イレーナさん」"

[[dialogue]]
speaker = "ジュエリー"
# 「──さて、とても今更になってしまったが、改めてお礼を言わせてほしい」
line = "「──さて、とても今更になってしまったが、改めてお礼を言わせてほしい」"

[[dialogue]]
speaker = "ジュエリー"
# 「では今度こそちゃんと伝えておかなくてはね」
line = "「では今度こそちゃんと伝えておかなくてはね」"

[[dialogue]]
speaker = "ジュエリー"
# 「あの時は危ないところを助けてくれてありがとう、イレーナさん」
line = "「あの時は危ないところを助けてくれてありがとう、イレーナさん」"

[[dialogue]]
speaker = "イレーナ"
# 「……どういたしまして。今度は手間かけさせないでよね」
line = "「……どういたしまして。今度は手間かけさせないでよね」"
