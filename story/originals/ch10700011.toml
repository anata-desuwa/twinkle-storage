[[dialogue]]
speaker = "unk"
# 第１話,フレンドリーなギャル天使,P
line = "第１話,フレンドリーなギャル天使,P"

[[dialogue]]
speaker = "unk"
# お正月休みが明けて、数日後のこと。流星寮に用事があって、俺がそこで偶然会ったフィオナと話していると――
line = "お正月休みが明けて、数日後のこと。流星寮に用事があって、俺がそこで偶然会ったフィオナと話していると――"

[[dialogue]]
speaker = "フィオナ"
# 「――なるほど。水着フォームに続いて、晴れ着フォームを……それは興味深いですね。あとで是非、拝見してみたいです」
line = "「――なるほど。水着フォームに続いて、晴れ着フォームを……それは興味深いですね。あとで是非、拝見してみたいです」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ！　会長くんじゃ～ん♪」
line = "「あっ！　会長くんじゃ～ん♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ちょりっす～♪　今日はどうしたの～？　って、フィオナ会長も！　こんにちは～♪」
line = "「ちょりっす～♪　今日はどうしたの～？　って、フィオナ会長も！　こんにちは～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「こんにちは、ウズメ。今、会長くんって呼んでたけど、もしかして緋宮会長と知り合いだったの？」
line = "「こんにちは、ウズメ。今、会長くんって呼んでたけど、もしかして緋宮会長と知り合いだったの？」"

[[dialogue]]
speaker = "ウズメイア"
# 「はい。お正月にソフィのことで相談したのがきっかけで、あっという間に仲良くなっちゃいました♪」
line = "「はい。お正月にソフィのことで相談したのがきっかけで、あっという間に仲良くなっちゃいました♪」"

[[dialogue]]
speaker = "フィオナ"
# 「確かに２人共、友達作りが上手だもんね。気が合いそう」
line = "「確かに２人共、友達作りが上手だもんね。気が合いそう」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ～♪　そうなんですよ～。今ではもう、すっかり友達、みたいな？」
line = "「えへへ～♪　そうなんですよ～。今ではもう、すっかり友達、みたいな？」"

[[dialogue]]
speaker = "フィオナ"
# 「お正月の話はちょうど緋宮会長から聞いてたところなんだけど、ソフィアがサーシャさんと仲直りしたんだってね。私も気になってたから、よかった」
line = "「お正月の話はちょうど緋宮会長から聞いてたところなんだけど、ソフィアがサーシャさんと仲直りしたんだってね。私も気になってたから、よかった」"

[[dialogue]]
speaker = "ウズメイア"
# 「はい！　姉妹一緒に初詣に行って、わだかまりを解くことができて……あたしとしても、ソフィの晴れやかな笑顔が見れて、すごく嬉しかったです♪」
line = "「はい！　姉妹一緒に初詣に行って、わだかまりを解くことができて……あたしとしても、ソフィの晴れやかな笑顔が見れて、すごく嬉しかったです♪」"

[[dialogue]]
speaker = "unk"
# 改めて、彼女はソフィアのクラスメイトで親友の、流星学園１年生、雨野ウズメイア。
line = "改めて、彼女はソフィアのクラスメイトで親友の、流星学園１年生、雨野ウズメイア。"

[[dialogue]]
speaker = "unk"
# ソフィアとサーシャさんを一緒に初詣に行かせたいと、俺とヴィーナスに相談してきたことがきっかけで知り合った。
line = "ソフィアとサーシャさんを一緒に初詣に行かせたいと、俺とヴィーナスに相談してきたことがきっかけで知り合った。"

[[dialogue]]
speaker = "unk"
# ギャルな見た目だが、友達想いな、優しい女の子である。
line = "ギャルな見た目だが、友達想いな、優しい女の子である。"

[[dialogue]]
speaker = "フィオナ"
# 「そういえば、初詣を通して、ウズメも晴れ着フォームに変身できるようになったんだって？　どんな感じなの？」
line = "「そういえば、初詣を通して、ウズメも晴れ着フォームに変身できるようになったんだって？　どんな感じなの？」"

[[dialogue]]
speaker = "ウズメイア"
# 「それだったら、見せちゃいますよ！　――変身！」
line = "「それだったら、見せちゃいますよ！　――変身！」"

[[dialogue]]
speaker = "ウズメイア"
# 「じゃ～ん♪　これがあたしの新しい戦闘服、晴れ着フォームで～す！　どうですか、フィオナ会長！」
line = "「じゃ～ん♪　これがあたしの新しい戦闘服、晴れ着フォームで～す！　どうですか、フィオナ会長！」"

[[dialogue]]
speaker = "フィオナ"
# 「こ、これは……！」
line = "「こ、これは……！」"

[[dialogue]]
speaker = "フィオナ"
# 「え～っと……なんというか――ざ、斬新なアレンジの晴れ着？　だね……？」
line = "「え～っと……なんというか――ざ、斬新なアレンジの晴れ着？　だね……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「なんで疑問形！？」
line = "「なんで疑問形！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「ソフィがトンチキとか言ってたけど、この晴れ着ってそんなに変なの！？　ヘレナちゃんもノリノリでデザインしてくれてたのに……！」
line = "「ソフィがトンチキとか言ってたけど、この晴れ着ってそんなに変なの！？　ヘレナちゃんもノリノリでデザインしてくれてたのに……！」"

[[dialogue]]
speaker = "フィオナ"
# 「いや、可愛いとは思うよ？　ただ、その……帯の結び目が前側だし……」
line = "「いや、可愛いとは思うよ？　ただ、その……帯の結び目が前側だし……」"

[[dialogue]]
speaker = "ウズメイア"
# 「結び目って後ろ側じゃないとおかしいの！？」
line = "「結び目って後ろ側じゃないとおかしいの！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「リボンみたいでアリだと思ったのに……！」
line = "「リボンみたいでアリだと思ったのに……！」"

[[dialogue]]
speaker = "unk"
# まぁでも、本当に似合ってると思うよ
line = "まぁでも、本当に似合ってると思うよ"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くん……！　えへへ♪　ありがと！　あたしとしても念願の和装戦闘服だから、気に入ってるんだ～♪」
line = "「会長くん……！　えへへ♪　ありがと！　あたしとしても念願の和装戦闘服だから、気に入ってるんだ～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ウズメは日本伝統文化が好きって言ってたものね」
line = "「ウズメは日本伝統文化が好きって言ってたものね」"

[[dialogue]]
speaker = "ウズメイア"
# 「はい♪　それが理由で天界から降りてきて、この学園に入学したくらいだし！」
line = "「はい♪　それが理由で天界から降りてきて、この学園に入学したくらいだし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、もちろんリクリエと戦おうって気持ちも本物ですよ？　大好きな日本文化が消されちゃうなんて、絶対に許せませんし！」
line = "「あっ、もちろんリクリエと戦おうって気持ちも本物ですよ？　大好きな日本文化が消されちゃうなんて、絶対に許せませんし！」"

[[dialogue]]
speaker = "フィオナ"
# 「でも、入学してわずか１ヶ月で、その……今時な女子の格好に変わった時は驚いたよ。セーラさんの影響だっていうのは知ってたけど……」
line = "「でも、入学してわずか１ヶ月で、その……今時な女子の格好に変わった時は驚いたよ。セーラさんの影響だっていうのは知ってたけど……」"

[[dialogue]]
speaker = "ウズメイア"
# 「ギャルファッションですか？　セーラ先輩の私服がカッコ可愛いな～って思って、色々教えてもらったら、ハマっちゃったんですよ～」
line = "「ギャルファッションですか？　セーラ先輩の私服がカッコ可愛いな～って思って、色々教えてもらったら、ハマっちゃったんですよ～」"

[[dialogue]]
speaker = "ウズメイア"
# 「みんなからよく言われますけど、ギャルファッションだって日本の立派な伝統文化ですから！」
line = "「みんなからよく言われますけど、ギャルファッションだって日本の立派な伝統文化ですから！」"

[[dialogue]]
speaker = "ウズメイア"
# 「伝統っていうのは、新しいものが続いてゆくことで、いつしか呼ばれるようになるものなんで！」
line = "「伝統っていうのは、新しいものが続いてゆくことで、いつしか呼ばれるようになるものなんで！」"

[[dialogue]]
speaker = "フィオナ"
# 「知り合ったばかりの時の、天使らしい清楚系の格好も、私は可愛かったと思うよ」
line = "「知り合ったばかりの時の、天使らしい清楚系の格好も、私は可愛かったと思うよ」"

[[dialogue]]
speaker = "unk"
# 前のウズメがどんなだったのか、気になる
line = "前のウズメがどんなだったのか、気になる"

[[dialogue]]
speaker = "ウズメイア"
# 「え、そう？　えへへ♪　２人にそう言われると、たまにはイメチェンしてみるのもいいかも♪」
line = "「え、そう？　えへへ♪　２人にそう言われると、たまにはイメチェンしてみるのもいいかも♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ、そうだ！　せっかくだし、あたしと入れ替えでフィオナ会長もギャルファッションにイメチェンしてみませんか？　お試しで！」
line = "「あ、そうだ！　せっかくだし、あたしと入れ替えでフィオナ会長もギャルファッションにイメチェンしてみませんか？　お試しで！」"

[[dialogue]]
speaker = "フィオナ"
# 「私が！？」
line = "「私が！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「フィオナ会長、ただでさえ可愛くてモテモテなんだから、ギャルな格好したら天下無双だし！」
line = "「フィオナ会長、ただでさえ可愛くてモテモテなんだから、ギャルな格好したら天下無双だし！」"

[[dialogue]]
speaker = "フィオナ"
# 「い、一応、星徒会長としてのイメージというものがありますから……」
line = "「い、一応、星徒会長としてのイメージというものがありますから……」"

[[dialogue]]
speaker = "ウズメイア"
# 「みんなの前では難しいかもしれないけど、部屋で遊びで着るだけなら、誰にも文句言われないし、問題なくないですか！？」
line = "「みんなの前では難しいかもしれないけど、部屋で遊びで着るだけなら、誰にも文句言われないし、問題なくないですか！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしの部屋で今度、メイクして遊びましょう！　服も貸しますし！」
line = "「あたしの部屋で今度、メイクして遊びましょう！　服も貸しますし！」"

[[dialogue]]
speaker = "フィオナ"
# 「…………なるほど、部屋の中だけなら……って、いやいやいや！」
line = "「…………なるほど、部屋の中だけなら……って、いやいやいや！」"

[[dialogue]]
speaker = "ウズメイア"
# 「この反応は脈ありっしょ！！」
line = "「この反応は脈ありっしょ！！」"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くんだって、フィオナ会長のギャルファッション、見てみたいよね！？」
line = "「会長くんだって、フィオナ会長のギャルファッション、見てみたいよね！？」"

[[dialogue]]
speaker = "unk"
# ギャルファッションのフィオナ……！
line = "ギャルファッションのフィオナ……！"

[[dialogue]]
speaker = "フィオナ"
# 「えぇっ！？　緋宮会長までそんなこと……！　は、恥ずかしいですから……」
line = "「えぇっ！？　緋宮会長までそんなこと……！　は、恥ずかしいですから……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ～、フィオナ会長ってば、顔赤くなってるし～！　めっちゃ乙女で可愛いんだけど～♪」
line = "「あ～、フィオナ会長ってば、顔赤くなってるし～！　めっちゃ乙女で可愛いんだけど～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「も～、からかわないでくださいっ、ウズメ……！」
line = "「も～、からかわないでくださいっ、ウズメ……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「あははっ、ごめんなさ～い♪」
line = "「あははっ、ごめんなさ～い♪」"

[[dialogue]]
speaker = "unk"
# フィオナとも学年の枠を越えて仲良くするウズメ。そんな彼女を改めてすごいと思うのだった――
line = "フィオナとも学年の枠を越えて仲良くするウズメ。そんな彼女を改めてすごいと思うのだった――"
