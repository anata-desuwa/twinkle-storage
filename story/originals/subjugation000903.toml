[[dialogue]]
speaker = "unk"
# 俺は保健室に現れたフェリシーという女生徒に、ソフレと出会った状況を説明した。
line = "俺は保健室に現れたフェリシーという女生徒に、ソフレと出会った状況を説明した。"

[[dialogue]]
speaker = "フェリシー"
# 「――なるほどね～。会長さんが保健室にきたら、ソフレが隠れてお昼寝してたってわけか」
line = "「――なるほどね～。会長さんが保健室にきたら、ソフレが隠れてお昼寝してたってわけか」"

[[dialogue]]
speaker = "ソフレ"
# 「酷い偶然なのだわ」
line = "「酷い偶然なのだわ」"

[[dialogue]]
speaker = "フェリシー"
# 「そう？　素敵な出会いじゃない？」
line = "「そう？　素敵な出会いじゃない？」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレの安眠スポットがまた１つ減ったのだわ！」
line = "「ソフレの安眠スポットがまた１つ減ったのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「お昼寝ばっかりしてないで、星騎士としてちゃんと働きましょうって女神様からのお告げだよ、きっと！」
line = "「お昼寝ばっかりしてないで、星騎士としてちゃんと働きましょうって女神様からのお告げだよ、きっと！」"

[[dialogue]]
speaker = "ソフレ"
# 「そんな面倒なこと、今更する気はないのよ！　働いたら負けなのだわ！」
line = "「そんな面倒なこと、今更する気はないのよ！　働いたら負けなのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレったら、またそういうこと言う。一緒に頑張ろうよ～」
line = "「ソフレったら、またそういうこと言う。一緒に頑張ろうよ～」"

[[dialogue]]
speaker = "ソフレ"
# 「お前となんて、ぜっっったいにイヤなのだわ！」
line = "「お前となんて、ぜっっったいにイヤなのだわ！」"

[[dialogue]]
speaker = "ソフレ"
# 「というか、相変わらず距離が近いのよ！　ソフレの肩とか手とか、気安く触るんじゃないのだわ！」
line = "「というか、相変わらず距離が近いのよ！　ソフレの肩とか手とか、気安く触るんじゃないのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、ごめんごめん。つい♪」
line = "「あっ、ごめんごめん。つい♪」"

[[dialogue]]
speaker = "unk"
# ２人は友達なのか？
line = "２人は友達なのか？"

[[dialogue]]
speaker = "ソフレ"
# 「違うのだわ！　ただのクラスメイトなのよ！」
line = "「違うのだわ！　ただのクラスメイトなのよ！」"

[[dialogue]]
speaker = "フェリシー"
# 「私は友達になりたいんだけどね。まだ認めてもらえてないって感じかな～」
line = "「私は友達になりたいんだけどね。まだ認めてもらえてないって感じかな～」"

[[dialogue]]
speaker = "ソフレ"
# 「この距離感バグってる女から、ソフレが一方的にセクシャルハラスメントを受けているだけなのだわ！」
line = "「この距離感バグってる女から、ソフレが一方的にセクシャルハラスメントを受けているだけなのだわ！」"

[[dialogue]]
speaker = "フェリシー"
# 「そこまで言わなくても……トホホ」
line = "「そこまで言わなくても……トホホ」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、そういえば私、まだ会長さんにちゃんと自己紹介してなかったよね？」
line = "「あっ、そういえば私、まだ会長さんにちゃんと自己紹介してなかったよね？」"

[[dialogue]]
speaker = "フェリシー"
# 「初めまして！　私は流星学園２年生の、<ruby=めぐはら>恵原</ruby>フェリシーです！　種族は人間で、お母さんがイタリア人、お父さんが日本人のハーフなんだ！」
line = "「初めまして！　私は流星学園２年生の、<ruby>恵原<rt>めぐはら</rt></ruby>フェリシーです！　種族は人間で、お母さんがイタリア人、お父さんが日本人のハーフなんだ！」"

[[dialogue]]
speaker = "フェリシー"
# 「生まれ育ったのはイタリアで、お母さんの家業を引き継いで『<ruby=エクソシスト>祓魔師</ruby>』をやってるの！」
line = "「生まれ育ったのはイタリアで、お母さんの家業を引き継いで『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』をやってるの！」"

[[dialogue]]
speaker = "フェリシー"
# 「――そう、エクソシスト。あまり聞いたことがない職業かな？」
line = "「――そう、エクソシスト。あまり聞いたことがない職業かな？」"

[[dialogue]]
speaker = "フェリシー"
# 「簡単に言うと、実際に起こってるけど、原因がわからないような『異変』の調査と解決をする仕事、って感じだね」
line = "「簡単に言うと、実際に起こってるけど、原因がわからないような『異変』の調査と解決をする仕事、って感じだね」"

[[dialogue]]
speaker = "フェリシー"
# 「実は私、会長さんのことは、前から友達に聞かされてたんだよね！」
line = "「実は私、会長さんのことは、前から友達に聞かされてたんだよね！」"

[[dialogue]]
speaker = "フェリシー"
# 「探偵の『ジュエリー』！　私、彼女とは昔からの友達なんだ♪」
line = "「探偵の『ジュエリー』！　私、彼女とは昔からの友達なんだ♪」"

[[dialogue]]
speaker = "unk"
# 流星学園１年生、ジュエリー・ブラウン。
line = "流星学園１年生、ジュエリー・ブラウン。"

[[dialogue]]
speaker = "unk"
# 流星市国でも数々の難事件を解決してきたことから有名な名探偵で、屋内でも日傘を差していることから『日傘探偵』と呼ばれている。
line = "流星市国でも数々の難事件を解決してきたことから有名な名探偵で、屋内でも日傘を差していることから『日傘探偵』と呼ばれている。"

[[dialogue]]
speaker = "unk"
# そして実はなんと、世界三大探偵の１人、『ブラウン神父』の子孫だったりする。
line = "そして実はなんと、世界三大探偵の１人、『ブラウン神父』の子孫だったりする。"

[[dialogue]]
speaker = "フェリシー"
# 「ジュエリーがよく、会長さんのことを頼れる助手だって話してたんだ。それで、私も前から会ってみたかったんだよね！」
line = "「ジュエリーがよく、会長さんのことを頼れる助手だって話してたんだ。それで、私も前から会ってみたかったんだよね！」"

[[dialogue]]
speaker = "フェリシー"
# 「同学年だし、よかったら、<b>会長くん</b>って呼んでもいいかな？」
line = "「同学年だし、よかったら、<b>会長くん</b>って呼んでもいいかな？」"

[[dialogue]]
speaker = "フェリシー"
# 「――うんっ♪　その代わり、私のこともフェリシーって呼んでくれていいよ！」
line = "「――うんっ♪　その代わり、私のこともフェリシーって呼んでくれていいよ！」"

[[dialogue]]
speaker = "unk"
# よろしく、フェリシー
line = "よろしく、フェリシー"

[[dialogue]]
speaker = "フェリシー"
# 「これから仲よくしようね！　会長くん♪」
line = "「これから仲よくしようね！　会長くん♪」"

[[dialogue]]
speaker = "unk"
# そういえば、フェリシーはどうして保健室に来たんだ？　と疑問に思い尋ねると――
line = "そういえば、フェリシーはどうして保健室に来たんだ？　と疑問に思い尋ねると――"

[[dialogue]]
speaker = "フェリシー"
# 「ああ、実は私、新星学園から『保健室の調査』の依頼を受けて来たの！」
line = "「ああ、実は私、新星学園から『保健室の調査』の依頼を受けて来たの！」"

[[dialogue]]
speaker = "フェリシー"
# 「なんでも最近、異変が報告されてるからって――」
line = "「なんでも最近、異変が報告されてるからって――」"

[[dialogue]]
speaker = "フェリシー"
# 「え？　会長くんも学園からの依頼で、ここに来たの？　じゃあ、聞いてた学園側からの助っ人っていうのは、キミのことだったんだね！」
line = "「え？　会長くんも学園からの依頼で、ここに来たの？　じゃあ、聞いてた学園側からの助っ人っていうのは、キミのことだったんだね！」"

[[dialogue]]
speaker = "フェリシー"
# 「これは、会長くんと仲よくなりましょうっていう、女神様からの思し召しかも♪」
line = "「これは、会長くんと仲よくなりましょうっていう、女神様からの思し召しかも♪」"

[[dialogue]]
speaker = "フェリシー"
# 「そうだ、せっかくだし、ソフレのこともちゃんと紹介しておくね！　この子は――って、あれ……？」
line = "「そうだ、せっかくだし、ソフレのこともちゃんと紹介しておくね！　この子は――って、あれ……？」"

[[dialogue]]
speaker = "フェリシー"
# 「いつの間にかソフレ、いなくなってる！？」
line = "「いつの間にかソフレ、いなくなってる！？」"

[[dialogue]]
speaker = "ソフレ"
# 「ふん……フェリシーの押し付け友達ムーブになんか、いちいち付き合っていられないのだわ」
line = "「ふん……フェリシーの押し付け友達ムーブになんか、いちいち付き合っていられないのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「……ソフレは、誰にも邪魔されず、１人でお昼寝ができれば、それで十分なのよ」
line = "「……ソフレは、誰にも邪魔されず、１人でお昼寝ができれば、それで十分なのよ」"

[[dialogue]]
speaker = "unk"
# ソフレは１人でそう呟きながら、雲に乗ってふわふわとその場を離れていくのだった――
line = "ソフレは１人でそう呟きながら、雲に乗ってふわふわとその場を離れていくのだった――"
