[[dialogue]]
speaker = "unk"
# 合宿２日目。
line = "合宿２日目。"

[[dialogue]]
speaker = "unk"
# 昨日と同じように、俺達はビーチの先にある森の中で、湧き水を汲んでいた。
line = "昨日と同じように、俺達はビーチの先にある森の中で、湧き水を汲んでいた。"

[[dialogue]]
speaker = "サーシャ"
# 「……よし、持ってきたペットボトルに全部入れ終わったわ。これで今日の分の飲み水は確保できたわね～」
line = "「……よし、持ってきたペットボトルに全部入れ終わったわ。これで今日の分の飲み水は確保できたわね～」"

[[dialogue]]
speaker = "アナ"
# 「お２人共、ビーチに戻る前に私から提案があるのですが、よろしいでしょうか？」
line = "「お２人共、ビーチに戻る前に私から提案があるのですが、よろしいでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、アナちゃん、何かしら？」
line = "「あら、アナちゃん、何かしら？」"

[[dialogue]]
speaker = "アナ"
# 「水汲みもひと段落しましたので、今日はついでに、この森の近くでレクリエーションをしたいと思っていまして……」
line = "「水汲みもひと段落しましたので、今日はついでに、この森の近くでレクリエーションをしたいと思っていまして……」"

[[dialogue]]
speaker = "サーシャ"
# 「レクリエーション？」
line = "「レクリエーション？」"

[[dialogue]]
speaker = "アナ"
# 「イエス。せっかくの合宿ですし、夏の思い出作りに遊ぶのも良いかなと。いかがでしょう？」
line = "「イエス。せっかくの合宿ですし、夏の思い出作りに遊ぶのも良いかなと。いかがでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「いいんじゃないかしら♪　面白そうなことは大歓迎よ～」
line = "「いいんじゃないかしら♪　面白そうなことは大歓迎よ～」"

[[dialogue]]
speaker = "アナ"
# 「――ふむ、会長もＯＫということで。それでは……」
line = "「――ふむ、会長もＯＫということで。それでは……」"

[[dialogue]]
speaker = "アナ"
# 「森で虫取りをしましょう」
line = "「森で虫取りをしましょう」"

[[dialogue]]
speaker = "サーシャ"
# 「えっ……む、虫？」
line = "「えっ……む、虫？」"

[[dialogue]]
speaker = "サーシャ"
# 「リゾート結界には虫は居なかったはずじゃ……？　リップルちゃんから、快適さを優先して、虫は省いているって聞いてたけど……」
line = "「リゾート結界には虫は居なかったはずじゃ……？　リップルちゃんから、快適さを優先して、虫は省いているって聞いてたけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「だから私、前の合宿の時は安心して探検を……」
line = "「だから私、前の合宿の時は安心して探検を……」"

[[dialogue]]
speaker = "unk"
# 確かに、見かけたことなかったな
line = "確かに、見かけたことなかったな"

[[dialogue]]
speaker = "アナ"
# 「その通りです。夏の風物詩とも言える蚊をはじめとして、基本的に虫の存在は省かれています」
line = "「その通りです。夏の風物詩とも言える蚊をはじめとして、基本的に虫の存在は省かれています」"

[[dialogue]]
speaker = "アナ"
# 「しかし今回、私の方から夏休みといえば虫取りだとリップルさんに力説して、特別に――」
line = "「しかし今回、私の方から夏休みといえば虫取りだとリップルさんに力説して、特別に――」"

[[dialogue]]
speaker = "アナ"
# 「カブトムシやクワガタが捕まえられる、虫取りエリアを作って貰ったのです……ふふふ」
line = "「カブトムシやクワガタが捕まえられる、虫取りエリアを作って貰ったのです……ふふふ」"

[[dialogue]]
speaker = "サーシャ"
# 「えっと……もしかしてアナちゃん、虫が好きなの？」
line = "「えっと……もしかしてアナちゃん、虫が好きなの？」"

[[dialogue]]
speaker = "アナ"
# 「はい、実は。釣りと同じくらい、虫取りは好きです」
line = "「はい、実は。釣りと同じくらい、虫取りは好きです」"

[[dialogue]]
speaker = "unk"
# カブトムシとクワガタ、カッコイイよな！
line = "カブトムシとクワガタ、カッコイイよな！"

[[dialogue]]
speaker = "アナ"
# 「さすが会長、分かってますね」
line = "「さすが会長、分かってますね」"

[[dialogue]]
speaker = "アナ"
# 「個人的には、人間界の中でも１、２を争う程にイケてる生物だと思ってます」
line = "「個人的には、人間界の中でも１、２を争う程にイケてる生物だと思ってます」"

[[dialogue]]
speaker = "サーシャ"
# 「か、会長くんも好きなの？」
line = "「か、会長くんも好きなの？」"

[[dialogue]]
speaker = "サーシャ"
# 「じ、実は私……虫はちょっと……」
line = "「じ、実は私……虫はちょっと……」"

[[dialogue]]
speaker = "アナ"
# 「おや？　サーシャ先輩は虫が苦手なのですか？」
line = "「おや？　サーシャ先輩は虫が苦手なのですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、故郷のレゾフには虫自体いなかったから……」
line = "「ええ、故郷のレゾフには虫自体いなかったから……」"

[[dialogue]]
speaker = "サーシャ"
# 「その……虫って、モンスターより不気味な見た目をしてない？」
line = "「その……虫って、モンスターより不気味な見た目をしてない？」"

[[dialogue]]
speaker = "アナ"
# 「う～ん、そうでしょうか……？」
line = "「う～ん、そうでしょうか……？」"

[[dialogue]]
speaker = "アナ"
# 「確かに、先輩の仰る通り、中には生存戦略として不気味な見た目をしている種もいますが……」
line = "「確かに、先輩の仰る通り、中には生存戦略として不気味な見た目をしている種もいますが……」"

[[dialogue]]
speaker = "unk"
# カブトムシは普通にカッコイイよね？
line = "カブトムシは普通にカッコイイよね？"

[[dialogue]]
speaker = "アナ"
# 「肯定。子供にも人気の虫ですよ？」
line = "「肯定。子供にも人気の虫ですよ？」"

[[dialogue]]
speaker = "サーシャ"
# 「そ、それは一応、知ってるけど……」
line = "「そ、それは一応、知ってるけど……」"

[[dialogue]]
speaker = "アナ"
# 「慣れれば、きっとサーシャ先輩も、カブトムシやクワガタが好きになるはずです」
line = "「慣れれば、きっとサーシャ先輩も、カブトムシやクワガタが好きになるはずです」"

[[dialogue]]
speaker = "サーシャ"
# 「そ、そうかしら……？」
line = "「そ、そうかしら……？」"

[[dialogue]]
speaker = "unk"
# そうして、虫取りをすることになったのだが──
line = "そうして、虫取りをすることになったのだが──"

[[dialogue]]
speaker = "サーシャ"
# 「きゃあああぁぁぁーーーっ！！！」
line = "「きゃあああぁぁぁーーーっ！！！」"

[[dialogue]]
speaker = "サーシャ"
# 「カブトムシとクワガタが飛んで追い駆けてくるわぁぁぁ～～～っ！」
line = "「カブトムシとクワガタが飛んで追い駆けてくるわぁぁぁ～～～っ！」"

[[dialogue]]
speaker = "サーシャ"
# 「しかも何で皆、私の方に飛んでくるのぉーーー！？　いやぁぁぁーーーっ！」
line = "「しかも何で皆、私の方に飛んでくるのぉーーー！？　いやぁぁぁーーーっ！」"

[[dialogue]]
speaker = "アナ"
# 「おぉ……サーシャ先輩、蜜の出てる木みたいに人気ですね……！」
line = "「おぉ……サーシャ先輩、蜜の出てる木みたいに人気ですね……！」"

[[dialogue]]
speaker = "サーシャ"
# 「言ってないで助けてぇぇぇ～～～っ！？　早くしないと追いつかれちゃうぅぅぅーーー！」
line = "「言ってないで助けてぇぇぇ～～～っ！？　早くしないと追いつかれちゃうぅぅぅーーー！」"

[[dialogue]]
speaker = "アナ"
# 「あ、すみません。サーシャ先輩が本気で慌ててる姿を初めて見たので、驚いて……」
line = "「あ、すみません。サーシャ先輩が本気で慌ててる姿を初めて見たので、驚いて……」"

[[dialogue]]
speaker = "サーシャ"
# 「ひぃぃぃ～～～っ！　カブトムシとクワガタ、見た目が！　やっぱり見た目が怖いわぁ～～～っ！」
line = "「ひぃぃぃ～～～っ！　カブトムシとクワガタ、見た目が！　やっぱり見た目が怖いわぁ～～～っ！」"

[[dialogue]]
speaker = "サーシャ"
# 「どうしてこの子たち、自分の何倍も大きい生き物に飛び掛かってくるのぉ～～～！　あぁぁ～～ん、こっち来ないでぇぇぇ～～～っ！」
line = "「どうしてこの子たち、自分の何倍も大きい生き物に飛び掛かってくるのぉ～～～！　あぁぁ～～ん、こっち来ないでぇぇぇ～～～っ！」"

[[dialogue]]
speaker = "サーシャ"
# 「というか、なんで私の方ばっかり寄って来るのぉぉぉーーーっ！？」
line = "「というか、なんで私の方ばっかり寄って来るのぉぉぉーーーっ！？」"

[[dialogue]]
speaker = "アナ"
# 「ふむ、サーシャ先輩は甘いフェロモンが人一倍出てるので、それで追いかけられてるのかもしれません」
line = "「ふむ、サーシャ先輩は甘いフェロモンが人一倍出てるので、それで追いかけられてるのかもしれません」"

[[dialogue]]
speaker = "unk"
# （確かに抱き着かれると、いい匂いする……）
line = "（確かに抱き着かれると、いい匂いする……）"

[[dialogue]]
speaker = "サーシャ"
# 「冷静に考察してる場合じゃないからぁぁぁ～～～っ！　追って来てるカブトムシとクワガタを捕まえてぇぇぇ！　早くぅぅぅーーーっ！」
line = "「冷静に考察してる場合じゃないからぁぁぁ～～～っ！　追って来てるカブトムシとクワガタを捕まえてぇぇぇ！　早くぅぅぅーーーっ！」"

[[dialogue]]
speaker = "アナ"
# 「あ、サーシャ先輩の髪にクワガタがくっ付きました」
line = "「あ、サーシャ先輩の髪にクワガタがくっ付きました」"

[[dialogue]]
speaker = "サーシャ"
# 「いやぁぁぁ～～～～～っ！！？　アナちゃん、取って取ってぇぇぇーーーっ！」
line = "「いやぁぁぁ～～～～～っ！！？　アナちゃん、取って取ってぇぇぇーーーっ！」"

[[dialogue]]
speaker = "アナ"
# 「了解。取りますから、じっとしてて下さい」
line = "「了解。取りますから、じっとしてて下さい」"

[[dialogue]]
speaker = "サーシャ"
# 「無理無理無理無理ムリぃぃぃーーーっ！　じっとしてたら他の子にも捕まっちゃうから、止まるなんて無理ぃぃぃ～～～っ！」
line = "「無理無理無理無理ムリぃぃぃーーーっ！　じっとしてたら他の子にも捕まっちゃうから、止まるなんて無理ぃぃぃ～～～っ！」"

[[dialogue]]
speaker = "サーシャ"
# 「って、きゃあぁぁぁーーーっ！！？　前に回り込まれて、胸の谷間にカブトムシがぁぁぁ～～～っ！」
line = "「って、きゃあぁぁぁーーーっ！！？　前に回り込まれて、胸の谷間にカブトムシがぁぁぁ～～～っ！」"

[[dialogue]]
speaker = "アナ"
# 「なるほど。確かにそこが１番、フェロモンの出てそうな場所ですね」
line = "「なるほど。確かにそこが１番、フェロモンの出てそうな場所ですね」"

[[dialogue]]
speaker = "サーシャ"
# 「ちょっ、待って！　カブトムシ動いてる！！　ダメダメ、そこはダメぇッ！！！」
line = "「ちょっ、待って！　カブトムシ動いてる！！　ダメダメ、そこはダメぇッ！！！」"

[[dialogue]]
speaker = "サーシャ"
# 「む、むむむむ胸の谷間に潜り込まれちゃった！？　いやぁぁぁ～～～～ん！！　会長くん、私のおっぱいを助けてぇぇぇーーーーっ！！！」
line = "「む、むむむむ胸の谷間に潜り込まれちゃった！？　いやぁぁぁ～～～～ん！！　会長くん、私のおっぱいを助けてぇぇぇーーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# おっぱいは無理です！！！
line = "おっぱいは無理です！！！"

[[dialogue]]
speaker = "unk"
# 結局その後、カブトムシとクワガタはアナの手によって無事保護されたのだった。
line = "結局その後、カブトムシとクワガタはアナの手によって無事保護されたのだった。"
