[[dialogue]]
speaker = "unk"
# 第６話,４人集合,B
line = "第６話,４人集合,B"

[[dialogue]]
speaker = "unk"
# 新入生歓迎会から、数日が経過したある日のこと。
line = "新入生歓迎会から、数日が経過したある日のこと。"

[[dialogue]]
speaker = "マトイ"
# 「あっ、あの、ヴィーナス会長、どこに？」
line = "「あっ、あの、ヴィーナス会長、どこに？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと１年生の教室にね！　新星学園史上トップクラスの新入生がいるって聞いたの」
line = "「ちょっと１年生の教室にね！　新星学園史上トップクラスの新入生がいるって聞いたの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「天使の子で、入学時の学力試験もぶっちぎりの１位らしいわ。ほら、マトイも行くわよ！」
line = "「天使の子で、入学時の学力試験もぶっちぎりの１位らしいわ。ほら、マトイも行くわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「ええっ、私も！？」
line = "「ええっ、私も！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「たのもー！」
line = "「たのもー！」"

[[dialogue]]
speaker = "新入生Ａ"
# 「えっ、あの方って」
line = "「えっ、あの方って」"

[[dialogue]]
speaker = "新入生Ｂ"
# 「ヴィーナス会長よ！」
line = "「ヴィーナス会長よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あはは、どーもどーもー」
line = "「あはは、どーもどーもー」"

[[dialogue]]
speaker = "新入生Ｂ"
# 「一緒にいるのはマトイ先輩だわ！」
line = "「一緒にいるのはマトイ先輩だわ！」"

[[dialogue]]
speaker = "新入生Ａ"
# 「先日の模擬戦、一番前で拝見させていただきました！　すごい迫力で……マトイ先輩も凄かったです！」
line = "「先日の模擬戦、一番前で拝見させていただきました！　すごい迫力で……マトイ先輩も凄かったです！」"

[[dialogue]]
speaker = "マトイ"
# 「あ、ありがとうございます」
line = "「あ、ありがとうございます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがとう。でも私たちはこのクラスの子に用事が――あっ、いたいた！」
line = "「ありがとう。でも私たちはこのクラスの子に用事が――あっ、いたいた！」"

[[dialogue]]
speaker = "マトイ"
# 「あの眼鏡をかけた、分厚い本を読んでる子がそうですか？」
line = "「あの眼鏡をかけた、分厚い本を読んでる子がそうですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうそう、あのちっちゃい子」
line = "「そうそう、あのちっちゃい子」"

[[dialogue]]
speaker = "マトイ"
# 「すごい……見るからに賢そうですね……」
line = "「すごい……見るからに賢そうですね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「当然よ！　なんたってぶっちぎりの１位なんだから」
line = "「当然よ！　なんたってぶっちぎりの１位なんだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こんにちは、あなたがアナね！」
line = "「こんにちは、あなたがアナね！」"

[[dialogue]]
speaker = "アナ"
# 「はい、私がアナです。どういった御用でしょう？」
line = "「はい、私がアナです。どういった御用でしょう？」"

[[dialogue]]
speaker = "マトイ"
# 「突然失礼します。私たち星徒会は、お近づきのご挨拶に――」
line = "「突然失礼します。私たち星徒会は、お近づきのご挨拶に――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたをスカウトに来たの！　星徒会副会長のポジションを、あなたに用意するわ！」
line = "「あなたをスカウトに来たの！　星徒会副会長のポジションを、あなたに用意するわ！」"

[[dialogue]]
speaker = "マトイ"
# 「そう、スカウトで副会長──って、ええっ！？」
line = "「そう、スカウトで副会長──って、ええっ！？」"

[[dialogue]]
speaker = "新入生Ａ"
# 「ええーーーっ！？」
line = "「ええーーーっ！？」"

[[dialogue]]
speaker = "新入生Ｂ"
# 「新入生が、いきなり副会長ーっ！？」
line = "「新入生が、いきなり副会長ーっ！？」"

[[dialogue]]
speaker = "マトイ"
# 「会長ーーーっ！？」
line = "「会長ーーーっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしてマトイが驚いてるのよ」
line = "「どうしてマトイが驚いてるのよ」"

[[dialogue]]
speaker = "マトイ"
# 「当たり前です！　何も聞かされないまま、無理やり連れて来られたんですから！」
line = "「当たり前です！　何も聞かされないまま、無理やり連れて来られたんですから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、そうだったわね。で、あなた、どうかしら？」
line = "「あ、そうだったわね。で、あなた、どうかしら？」"

[[dialogue]]
speaker = "アナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アナ"
# 「びっくりしました」
line = "「びっくりしました」"

[[dialogue]]
speaker = "マトイ"
# 「びっくりしてたんだね……リアクション小さいからわからなかった……」
line = "「びっくりしてたんだね……リアクション小さいからわからなかった……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで、アナ、どう？」
line = "「というわけで、アナ、どう？」"

[[dialogue]]
speaker = "アナ"
# 「はい、やってみます」
line = "「はい、やってみます」"

[[dialogue]]
speaker = "マトイ"
# 「やるんだ！？　すごいね！？」
line = "「やるんだ！？　すごいね！？」"

[[dialogue]]
speaker = "マトイ"
# （なんで即断即決出来るんだろう？　ヴィーナス会長といい、アナさんといい天才って変わり者しかいないの？？）
line = "（なんで即断即決出来るんだろう？　ヴィーナス会長といい、アナさんといい天才って変わり者しかいないの？？）"

[[dialogue]]
speaker = "アナ"
# 「おお、ここが星徒会室ですか」
line = "「おお、ここが星徒会室ですか」"

[[dialogue]]
speaker = "サーシャ"
# 「あなたがアナちゃん？　ヴィーナスちゃんが先走っちゃってごめんなさいね～」
line = "「あなたがアナちゃん？　ヴィーナスちゃんが先走っちゃってごめんなさいね～」"

[[dialogue]]
speaker = "サーシャ"
# 「ダメよ～、ヴィーナスちゃん。めっ」
line = "「ダメよ～、ヴィーナスちゃん。めっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「てへっ。ごめんね、アナ」
line = "「てへっ。ごめんね、アナ」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです」
line = "「ノープロブレムです」"

[[dialogue]]
speaker = "サーシャ"
# 「いくら会長権限で役員を指定できるとはいえ、いきなり１年生に副会長は大変じゃないかしら？」
line = "「いくら会長権限で役員を指定できるとはいえ、いきなり１年生に副会長は大変じゃないかしら？」"

[[dialogue]]
speaker = "サーシャ"
# 「だからといって、何も役職を与えないっていうのもね～……。あ、アナちゃんって計算とか数字は得意？」
line = "「だからといって、何も役職を与えないっていうのもね～……。あ、アナちゃんって計算とか数字は得意？」"

[[dialogue]]
speaker = "アナ"
# 「はい。３桁までの暗算でしたら、電卓が不要な程度には」
line = "「はい。３桁までの暗算でしたら、電卓が不要な程度には」"

[[dialogue]]
speaker = "サーシャ"
# 「９８２×７４４っていくつ～？」
line = "「９８２×７４４っていくつ～？」"

[[dialogue]]
speaker = "マトイ"
# 「３桁の暗算って、そうじゃなくないです！？」
line = "「３桁の暗算って、そうじゃなくないです！？」"

[[dialogue]]
speaker = "アナ"
# 「７３０６０８ですね」
line = "「７３０６０８ですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさん、合ってる？」
line = "「サーシャさん、合ってる？」"

[[dialogue]]
speaker = "サーシャ"
# 「はーい、大・正・解でーす♪」
line = "「はーい、大・正・解でーす♪」"

[[dialogue]]
speaker = "マトイ"
# 「ＤＩＳＣで計算したとしても、アナさんの暗算の方が速くて正確そうです……」
line = "「ＤＩＳＣで計算したとしても、アナさんの暗算の方が速くて正確そうです……」"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃ、アナちゃんはひとまず会計に就任ね～」
line = "「それじゃ、アナちゃんはひとまず会計に就任ね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「異議なーし！」
line = "「異議なーし！」"

[[dialogue]]
speaker = "マトイ"
# 「異議なしです」
line = "「異議なしです」"

[[dialogue]]
speaker = "アナ"
# 「新人ですが、ご指導・ご鞭撻のほど、よろしくお願いします。ぺこり」
line = "「新人ですが、ご指導・ご鞭撻のほど、よろしくお願いします。ぺこり」"

[[dialogue]]
speaker = "マトイ"
# 「あはは……むしろすぐに私の方が教えを乞う側になっちゃいそうだけど」
line = "「あはは……むしろすぐに私の方が教えを乞う側になっちゃいそうだけど」"

[[dialogue]]
speaker = "マトイ"
# 「でもそうならないように頑張るよ。よろしくねアナさん」
line = "「でもそうならないように頑張るよ。よろしくねアナさん」"

[[dialogue]]
speaker = "アナ"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これで星徒会メンバーは４人になったわね！　よーし、気張っていくわよー！！」
line = "「これで星徒会メンバーは４人になったわね！　よーし、気張っていくわよー！！」"

[[dialogue]]
speaker = "みんな"
# 「おーっ！」
line = "「おーっ！」"
