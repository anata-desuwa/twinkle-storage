[[dialogue]]
speaker = "unk"
# 第４話,プライベート・チア,P
line = "第４話,プライベート・チア,P"

[[dialogue]]
speaker = "ミルフィー"
# 「失礼しま～す。会長く～ん、一緒に帰ろ」
line = "「失礼しま～す。会長く～ん、一緒に帰ろ」"

[[dialogue]]
speaker = "ミルフィー"
# 「あれ？　まだお仕事中？　他の役員さんたちは？　パトロール終わったら直帰？」
line = "「あれ？　まだお仕事中？　他の役員さんたちは？　パトロール終わったら直帰？」"

[[dialogue]]
speaker = "ミルフィー"
# 「そうなんだ……会長くんのお仕事終わるまで待ってるね。別に急がなくても大丈夫だから」
line = "「そうなんだ……会長くんのお仕事終わるまで待ってるね。別に急がなくても大丈夫だから」"

[[dialogue]]
speaker = "unk"
# そういえば、あの時の命令ってまだ有効？
line = "そういえば、あの時の命令ってまだ有効？"

[[dialogue]]
speaker = "ミルフィー"
# 「命令？　あ……カティアちゃんとヒヨちゃんの勝負の時の？」
line = "「命令？　あ……カティアちゃんとヒヨちゃんの勝負の時の？」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くん……私にどんな命令しちゃうつもり？」
line = "「会長くん……私にどんな命令しちゃうつもり？」"

[[dialogue]]
speaker = "unk"
# チアガール衣装で応援してほしい！
line = "チアガール衣装で応援してほしい！"

[[dialogue]]
speaker = "ミルフィー"
# 「え……？　それが命令？　なんだぁ……もっとすごい命令されちゃうのかと思った……」
line = "「え……？　それが命令？　なんだぁ……もっとすごい命令されちゃうのかと思った……」"

[[dialogue]]
speaker = "ミルフィー"
# 「うん、いいよ。それじゃ──」
line = "「うん、いいよ。それじゃ──」"

[[dialogue]]
speaker = "ミルフィー"
# 「じゃんっ♪　チアミルフィーだよ！」
line = "「じゃんっ♪　チアミルフィーだよ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふふ、最初はちょっと抵抗あったけど、もうチアガールの衣装にも慣れてきちゃった」
line = "「ふふ、最初はちょっと抵抗あったけど、もうチアガールの衣装にも慣れてきちゃった」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんだけの特別チアリーディング、はじめまーす<emoji=heart04>」
line = "「会長くんだけの特別チアリーディング、はじめまーす<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「がんばれ、がんばれ、会長くん♪」
line = "「がんばれ、がんばれ、会長くん♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「ゴー・ゴー・レッツゴー！　ほらほら、こっちばかり見てたら、いつまでも書類片付かないよー？」
line = "「ゴー・ゴー・レッツゴー！　ほらほら、こっちばかり見てたら、いつまでも書類片付かないよー？」"

[[dialogue]]
speaker = "ミルフィー"
# 「ちゃんと手を動かしてっ！　ふぁいと、ふぁいと、会長くん♪」
line = "「ちゃんと手を動かしてっ！　ふぁいと、ふぁいと、会長くん♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「全部終わらせたら、ご褒美も待ってるよっ」
line = "「全部終わらせたら、ご褒美も待ってるよっ」"

[[dialogue]]
speaker = "unk"
# ミルフィーの応援を受けながら書類に集中する。
line = "ミルフィーの応援を受けながら書類に集中する。"

[[dialogue]]
speaker = "unk"
# しばらくして、思っていたよりも早く書類が完成した。
line = "しばらくして、思っていたよりも早く書類が完成した。"

[[dialogue]]
speaker = "ミルフィー"
# 「あんなにあったのに、もう終わったんだ！　お疲れさまでしたー。えらい、えらーい」
line = "「あんなにあったのに、もう終わったんだ！　お疲れさまでしたー。えらい、えらーい」"

[[dialogue]]
speaker = "unk"
# ミルフィーのおかげだよ
line = "ミルフィーのおかげだよ"

[[dialogue]]
speaker = "ミルフィー"
# 「お役に立てたなら何よりだよー」
line = "「お役に立てたなら何よりだよー」"

[[dialogue]]
speaker = "ミルフィー"
# 「星徒会長は学園のために身を粉にして働くのは当たり前……なんて言ってる人もいるけど」
line = "「星徒会長は学園のために身を粉にして働くのは当たり前……なんて言ってる人もいるけど」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんはすっっっごく頑張ってる。頑張ったら頑張った分だけ褒めてほしいよね」
line = "「会長くんはすっっっごく頑張ってる。頑張ったら頑張った分だけ褒めてほしいよね」"

[[dialogue]]
speaker = "ミルフィー"
# 「みんなが褒めてくれない分、私がい～～っぱい褒めて、甘やかしてあげる」
line = "「みんなが褒めてくれない分、私がい～～っぱい褒めて、甘やかしてあげる」"

[[dialogue]]
speaker = "ミルフィー"
# 「よくできました♪　えらいぞー、すごいぞー、格好いいよー♪　なでなでなで<emoji=heart04>」
line = "「よくできました♪　えらいぞー、すごいぞー、格好いいよー♪　なでなでなで<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「みんなのために頑張れるあなたが、だぁい好きっ<emoji=heart04>」
line = "「みんなのために頑張れるあなたが、だぁい好きっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ところで、ご褒美って……？
line = "ところで、ご褒美って……？"

[[dialogue]]
speaker = "ミルフィー"
# 「あんまり期待してたらごめんなんだけど……私からのご褒美は……」
line = "「あんまり期待してたらごめんなんだけど……私からのご褒美は……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ほっぺに……ちゅっ<emoji=heart04>」
line = "「ほっぺに……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふふ、私のキスくらいじゃ、ご褒美にならないかな？」
line = "「ふふ、私のキスくらいじゃ、ご褒美にならないかな？」"

[[dialogue]]
speaker = "unk"
# もっと、欲しいな
line = "もっと、欲しいな"

[[dialogue]]
speaker = "unk"
# 十分、ご褒美だけど
line = "十分、ご褒美だけど"

[[dialogue]]
speaker = "ミルフィー"
# 「ええっ……もっと……？　ふたりっきりだから、特別だよ……？」
line = "「ええっ……もっと……？　ふたりっきりだから、特別だよ……？」"

[[dialogue]]
speaker = "ミルフィー"
# 「んぅ、ちゅ、ちゅっ……んぅ、か、会長くん……あんまりイチャイチャしすぎると……」
line = "「んぅ、ちゅ、ちゅっ……んぅ、か、会長くん……あんまりイチャイチャしすぎると……」"

[[dialogue]]
speaker = "ミルフィー"
# 「え……？　我慢なんてできないって……？」
line = "「え……？　我慢なんてできないって……？」"

[[dialogue]]
speaker = "ミルフィー"
# 「んもぉ、仕方ないなぁ……会長くん、いつもは紳士なのに……スイッチ入ると止まんなくなっちゃうもんね」
line = "「んもぉ、仕方ないなぁ……会長くん、いつもは紳士なのに……スイッチ入ると止まんなくなっちゃうもんね」"

[[dialogue]]
speaker = "ミルフィー"
# （止まれなくなっちゃうのは、私もだけど。ごめんなさい、マグダレナ様）
line = "（止まれなくなっちゃうのは、私もだけど。ごめんなさい、マグダレナ様）"

[[dialogue]]
speaker = "ミルフィー"
# （普段はいい子にしてますので、好きな人の前ではちょっとくらい悪い子になっちゃっても……いいですよね？）
line = "（普段はいい子にしてますので、好きな人の前ではちょっとくらい悪い子になっちゃっても……いいですよね？）"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くん……ちゅ、ちゅっ……ぅんっ<emoji=heart04>」
line = "「会長くん……ちゅ、ちゅっ……ぅんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# せっかく早く仕事を終わらせたのに、結局、最終下校時刻を過ぎるまでミルフィーと甘い時間を過ごしたのだった。
line = "せっかく早く仕事を終わらせたのに、結局、最終下校時刻を過ぎるまでミルフィーと甘い時間を過ごしたのだった。"
