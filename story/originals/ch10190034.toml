[[dialogue]]
speaker = "unk"
# 第４話,ただのにゃんこ,P
line = "第４話,ただのにゃんこ,P"

[[dialogue]]
speaker = "unk"
# シズルさんが流星市国に来た日から数日。
line = "シズルさんが流星市国に来た日から数日。"

[[dialogue]]
speaker = "unk"
# 嵐のような日々は過ぎ去ってようやく落ち着きを取り戻したある日、俺はせつなを自宅に招いた。
line = "嵐のような日々は過ぎ去ってようやく落ち着きを取り戻したある日、俺はせつなを自宅に招いた。"

[[dialogue]]
speaker = "せつな"
# 「はぁぁ～～、どっと疲れたでござる……」
line = "「はぁぁ～～、どっと疲れたでござる……」"

[[dialogue]]
speaker = "unk"
# シズルさん、楽しそうだったね
line = "シズルさん、楽しそうだったね"

[[dialogue]]
speaker = "unk"
# お疲れさま
line = "お疲れさま"

[[dialogue]]
speaker = "せつな"
# 「師匠ははしゃぎすぎでござる。流星市国は初めてかと思ったら、実はそんなこと無かったみたいでござるし……」
line = "「師匠ははしゃぎすぎでござる。流星市国は初めてかと思ったら、実はそんなこと無かったみたいでござるし……」"

[[dialogue]]
speaker = "せつな"
# 「途中から逆にせつなたちをリードして……もうわけがわからなくなったでござる」
line = "「途中から逆にせつなたちをリードして……もうわけがわからなくなったでござる」"

[[dialogue]]
speaker = "せつな"
# 「せっかく師匠が遊びに来てくれたのだから、ゆっくり甘えて過ごそうと思っていたのに、ずっと圧倒されっぱなしだったでござるよ」
line = "「せっかく師匠が遊びに来てくれたのだから、ゆっくり甘えて過ごそうと思っていたのに、ずっと圧倒されっぱなしだったでござるよ」"

[[dialogue]]
speaker = "unk"
# せつなもゆっくり休んで
line = "せつなもゆっくり休んで"

[[dialogue]]
speaker = "unk"
# あれは仕方ないよ
line = "あれは仕方ないよ"

[[dialogue]]
speaker = "せつな"
# 「お言葉に甘えて、お膝でのんびりさせてもらうでござる～」
line = "「お言葉に甘えて、お膝でのんびりさせてもらうでござる～」"

[[dialogue]]
speaker = "せつな"
# 「うにゃ～～、主様、ぬくぬくでござる～♪」
line = "「うにゃ～～、主様、ぬくぬくでござる～♪」"

[[dialogue]]
speaker = "せつな"
# 「師匠もせつなと主様をくっつけるようなことばかりして……」
line = "「師匠もせつなと主様をくっつけるようなことばかりして……」"

[[dialogue]]
speaker = "せつな"
# 「忍としてしっかりお勤めしたかったのに、にゃあにゃあ叫んでばかりだったでござるよ……」
line = "「忍としてしっかりお勤めしたかったのに、にゃあにゃあ叫んでばかりだったでござるよ……」"

[[dialogue]]
speaker = "unk"
# もっと言って欲しい
line = "もっと言って欲しい"

[[dialogue]]
speaker = "unk"
# にゃあにゃあかわいかった
line = "にゃあにゃあかわいかった"

[[dialogue]]
speaker = "せつな"
# 「そんなこと言っても……無理にゃ<emoji=heart04>」
line = "「そんなこと言っても……無理にゃ<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「うう～っ、また語尾が甘くなってるって冷やかされるでござる……」
line = "「うう～っ、また語尾が甘くなってるって冷やかされるでござる……」"

[[dialogue]]
speaker = "せつな"
# （でもでもっ、師匠が言うには、もっともっとかわいく攻めろ、と……そんなのせつなには難しいでござるよ……）
line = "（でもでもっ、師匠が言うには、もっともっとかわいく攻めろ、と……そんなのせつなには難しいでござるよ……）"

[[dialogue]]
speaker = "せつな"
# （しかしっ、師匠は房中術の使い手にして、恋愛術の達人！　これを用いれば、主様もせつなにメロメロに……）
line = "（しかしっ、師匠は房中術の使い手にして、恋愛術の達人！　これを用いれば、主様もせつなにメロメロに……）"

[[dialogue]]
speaker = "せつな"
# 「ふにゃあああ～～～っ！」
line = "「ふにゃあああ～～～っ！」"

[[dialogue]]
speaker = "unk"
# グリグリしてきてびっくりした
line = "グリグリしてきてびっくりした"

[[dialogue]]
speaker = "unk"
# 急にどうしたの？
line = "急にどうしたの？"

[[dialogue]]
speaker = "せつな"
# 「うっ、済まないでござる。せつなにもいろいろ思うところがあるでござるよ」
line = "「うっ、済まないでござる。せつなにもいろいろ思うところがあるでござるよ」"

[[dialogue]]
speaker = "せつな"
# 「でも……せっかく主様に甘えているところでござるし……２人きりで誰も見てないし……」
line = "「でも……せっかく主様に甘えているところでござるし……２人きりで誰も見てないし……」"

[[dialogue]]
speaker = "せつな"
# 「もうちょっとだけ……主様にじゃれついてもいいかにゃ？」
line = "「もうちょっとだけ……主様にじゃれついてもいいかにゃ？」"

[[dialogue]]
speaker = "unk"
