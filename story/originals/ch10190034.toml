line = "「はぁはぁはぁ……回りくどいのは好きじゃないでござるよ。取り繕った言葉より、思いの丈をまっすぐに……あれ？」"

[[dialogue]]
speaker = "せつな"
# 「しまった！　つい！　今の取り消し！　聞かなかったことにして欲しいにゃあああああっ！！」
line = "「しまった！　つい！　今の取り消し！　聞かなかったことにして欲しいにゃあああああっ！！」"

[[dialogue]]
speaker = "unk"
