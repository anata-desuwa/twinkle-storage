[[dialogue]]
speaker = "unk"
# うっ！
line = "うっ！"

[[dialogue]]
speaker = "せつな"
# 「せつなはかわいくないにゃー！」
line = "「せつなはかわいくないにゃー！」"

[[dialogue]]
speaker = "せつな"
# 「でも……主様は、せつながかわいいほうがいいにゃ？」
line = "「でも……主様は、せつながかわいいほうがいいにゃ？」"

[[dialogue]]
speaker = "せつな"
# 「せつなは忍だけど……すき、って言ってくれるかにゃ？」
line = "「せつなは忍だけど……すき、って言ってくれるかにゃ？」"

[[dialogue]]
speaker = "せつな"
# 「ま、待って待って～～っ！　今のなし！　なしでござるよ～～っ！！」
line = "「ま、待って待って～～っ！　今のなし！　なしでござるよ～～っ！！」"

[[dialogue]]
speaker = "せつな"
# 「ぬあああ～～っ、せつなは血迷ったでござる！　ほんのちょっとの出来心だったでござるよ～～っ！！」
line = "「ぬあああ～～っ、せつなは血迷ったでござる！　ほんのちょっとの出来心だったでござるよ～～っ！！」"

[[dialogue]]
speaker = "せつな"
# 「それもこれも師匠のせいでござる！　師匠が恋愛術なんて教えるからっ」
line = "「それもこれも師匠のせいでござる！　師匠が恋愛術なんて教えるからっ」"

[[dialogue]]
speaker = "せつな"
# 「しかし、初心忘るべからず！　これまで通り、せつなは房中術を極めるでござるよ、主様」
line = "「しかし、初心忘るべからず！　これまで通り、せつなは房中術を極めるでござるよ、主様」"

[[dialogue]]
speaker = "せつな"
# 「そもそも、このせつなに恋愛を極めるなど無理にござる。どんなものかもよくわかってないのに……」
line = "「そもそも、このせつなに恋愛を極めるなど無理にござる。どんなものかもよくわかってないのに……」"

[[dialogue]]
