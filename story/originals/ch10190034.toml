line = "「これぞせつなが主に認めたお方！　せつなは……せつなは主様を……」"

[[dialogue]]
speaker = "せつな"
# 「お、お、お慕い……申し上げて……っっ」
line = "「お、お、お慕い……申し上げて……っっ」"

[[dialogue]]
speaker = "せつな"
# 「こんなのせつなじゃないでござる～～っ！！」
