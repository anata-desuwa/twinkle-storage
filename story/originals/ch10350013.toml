[[dialogue]]
speaker = "unk"
# 第３話,傭兵はお金好き,P
line = "第３話,傭兵はお金好き,P"

[[dialogue]]
speaker = "unk"
# セナリィと出会ってから数か月。俺は公安委員会の任務以外でも、彼女と行動することが多くなっていた――
line = "セナリィと出会ってから数か月。俺は公安委員会の任務以外でも、彼女と行動することが多くなっていた――"

[[dialogue]]
speaker = "紅明"
# 「いや～、猫の手ならぬ悪の手、めっちゃ助かったよ～。ホルスタミンの偽物売ってる元締め、見つけ出すのに凄い苦労してたからさ」
line = "「いや～、猫の手ならぬ悪の手、めっちゃ助かったよ～。ホルスタミンの偽物売ってる元締め、見つけ出すのに凄い苦労してたからさ」"

[[dialogue]]
speaker = "セナリィ"
# 「いえいえ、報酬に見合う働きをさせて頂いただけですわ。もし今後も困り事がございましたら、是非ご贔屓に……」
line = "「いえいえ、報酬に見合う働きをさせて頂いただけですわ。もし今後も困り事がございましたら、是非ご贔屓に……」"

[[dialogue]]
speaker = "紅明"
# 「うん、秘密結社ゴールデングース、覚えておくよ。それで報酬だけど……はいこれ、小切手ね！」
line = "「うん、秘密結社ゴールデングース、覚えておくよ。それで報酬だけど……はいこれ、小切手ね！」"

[[dialogue]]
speaker = "セナリィ"
# 「拝見させて頂きますわ。……え！？　こ、これは！？」
line = "「拝見させて頂きますわ。……え！？　こ、これは！？」"

[[dialogue]]
speaker = "紅明"
# 「今回の件、アタシはもちろん、善哉乳業の取締役……アタシのお母さんも凄く感謝しててさ。金額に色付けてくれって言われたんだ」
line = "「今回の件、アタシはもちろん、善哉乳業の取締役……アタシのお母さんも凄く感謝しててさ。金額に色付けてくれって言われたんだ」"

[[dialogue]]
speaker = "セナリィ"
# 「提示額の倍！？　思わぬサプライズですわぁ～～～っ！？」
line = "「提示額の倍！？　思わぬサプライズですわぁ～～～っ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「ふっ、ふふっ……！　１度にこれだけの大金……今夜は缶コーヒー片手に札束鑑賞会ですわ♪」
line = "「ふっ、ふふっ……！　１度にこれだけの大金……今夜は缶コーヒー片手に札束鑑賞会ですわ♪」"

[[dialogue]]
speaker = "unk"
# 札束鑑賞会って何！？
line = "札束鑑賞会って何！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　セナリィはお金に目がないからね～」
line = "「にひひ♪　セナリィはお金に目がないからね～」"

[[dialogue]]
speaker = "紅明"
# 「そうなんだ！　本当にやってるトコ想像したら、ちょっとウケる☆」
line = "「そうなんだ！　本当にやってるトコ想像したら、ちょっとウケる☆」"

[[dialogue]]
speaker = "セナリィ"
# 「はっ……！　ひょっとして、これを元手にギャンブルをすれば、１週間くらいで１００倍にすることも可能なのでは……？」
line = "「はっ……！　ひょっとして、これを元手にギャンブルをすれば、１週間くらいで１００倍にすることも可能なのでは……？」"

[[dialogue]]
speaker = "unk"
# マイン、止めなくていいのか！？
line = "マイン、止めなくていいのか！？"

[[dialogue]]
speaker = "unk"
# 絶対に失敗するやつ！
line = "絶対に失敗するやつ！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　公安委員会としてってこと？　まあ、上が何も言って来ない限りは、私にとっては業務外かな～」
line = "「ん？　公安委員会としてってこと？　まあ、上が何も言って来ない限りは、私にとっては業務外かな～」"

[[dialogue]]
speaker = "セナリィ"
# 「１００倍ともなれば、夢だった札束ベッドが実現出来ますわ♪　ああ、それで眠ったら、一体どんなに幸福な気分を味わえるのか……ふふ、ふふふ……♪」
line = "「１００倍ともなれば、夢だった札束ベッドが実現出来ますわ♪　ああ、それで眠ったら、一体どんなに幸福な気分を味わえるのか……ふふ、ふふふ……♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうそう、会長の人脈が加わったことで、ゴールデングースも順調に依頼が増えて来てるわけだし。ここで１つ、ドカンと賭けるのも悪くないんじゃない？」
line = "「そうそう、会長の人脈が加わったことで、ゴールデングースも順調に依頼が増えて来てるわけだし。ここで１つ、ドカンと賭けるのも悪くないんじゃない？」"

[[dialogue]]
speaker = "セナリィ"
# 「そうですわよね！　何より、悪即善……リスクを背負わないことには、大きな儲けは得られませんもの。今度こそ勝ってみせますわ！」
line = "「そうですわよね！　何より、悪即善……リスクを背負わないことには、大きな儲けは得られませんもの。今度こそ勝ってみせますわ！」"

[[dialogue]]
speaker = "unk"
# 紅明からも何とか言ってやってくれ！
line = "紅明からも何とか言ってやってくれ！"

[[dialogue]]
speaker = "unk"
# それっていつも負けてるってことだよね！？
line = "それっていつも負けてるってことだよね！？"

[[dialogue]]
speaker = "紅明"
# 「ん～、そうだな～……セナっち、アタシとしては、仕事に集中する方が結果的にお金は増えると思うぜ？」
line = "「ん～、そうだな～……セナっち、アタシとしては、仕事に集中する方が結果的にお金は増えると思うぜ？」"

[[dialogue]]
speaker = "紅明"
# 「別にギャンブルは否定しないさ。ただ、それって息抜きにするもので、負けても笑える範囲でやるべきっしょ」
line = "「別にギャンブルは否定しないさ。ただ、それって息抜きにするもので、負けても笑える範囲でやるべきっしょ」"

[[dialogue]]
speaker = "紅明"
# 「宝くじと同じで、ラッキーを楽しむ為にやるのであって、大金を稼ぐ為にギャンブルをするのは違うんと思うんだよね」
line = "「宝くじと同じで、ラッキーを楽しむ為にやるのであって、大金を稼ぐ為にギャンブルをするのは違うんと思うんだよね」"

[[dialogue]]
speaker = "セナリィ"
# 「た、確かに、宝くじには全額つぎ込んだりしませんわね……。それに、本物のお金持ちである紅明様が仰るなら……」
line = "「た、確かに、宝くじには全額つぎ込んだりしませんわね……。それに、本物のお金持ちである紅明様が仰るなら……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「別に負けてもいいじゃん？」
line = "「別に負けてもいいじゃん？」"

[[dialogue]]
speaker = "セナリィ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「紅明先輩が言ったように、楽しめばいいんじゃない？　大金賭けたギャンブルをさ」
line = "「紅明先輩が言ったように、楽しめばいいんじゃない？　大金賭けたギャンブルをさ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「戦場じゃないし、負けて命を失うわけでも無し。そう考えればローリスクハイリターン……当たれば１００倍、ガッポガッポの大儲け♪」
line = "「戦場じゃないし、負けて命を失うわけでも無し。そう考えればローリスクハイリターン……当たれば１００倍、ガッポガッポの大儲け♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「こんな楽しいことはそう無いと思うよ～？　それにたまには、頑張った自分へのご褒美があっても、私はいいんじゃないかと思うな～」
line = "「こんな楽しいことはそう無いと思うよ～？　それにたまには、頑張った自分へのご褒美があっても、私はいいんじゃないかと思うな～」"

[[dialogue]]
speaker = "セナリィ"
# 「ごくり……そ、そうですわ。命を賭ける戦場に比べれば、ギャンブル場はまるで天国……！　楽しいに決まってますわ……！」
line = "「ごくり……そ、そうですわ。命を賭ける戦場に比べれば、ギャンブル場はまるで天国……！　楽しいに決まってますわ……！」"

[[dialogue]]
speaker = "紅明"
# 「確かに楽しむのは大事っしょ！　つーか、あれだ！　マイマイの話聞いてたら、昔を思い出して、アタシもギャンブルに行ってみたくなって来たし☆」
line = "「確かに楽しむのは大事っしょ！　つーか、あれだ！　マイマイの話聞いてたら、昔を思い出して、アタシもギャンブルに行ってみたくなって来たし☆」"

[[dialogue]]
speaker = "unk"
# ちょっ、紅明さん！？
line = "ちょっ、紅明さん！？"

[[dialogue]]
speaker = "紅明"
# 「こう見えて、私も昔は悪童と呼ばれていた時期があって、悟空と賭場で遊んだことも……とにかく！　セナっちが行くなら、アタシも久しぶりにパーッと遊ぶっしょ☆」
line = "「こう見えて、私も昔は悪童と呼ばれていた時期があって、悟空と賭場で遊んだことも……とにかく！　セナっちが行くなら、アタシも久しぶりにパーッと遊ぶっしょ☆」"

[[dialogue]]
speaker = "セナリィ"
# 「紅明様がそう仰るなら、喜んでご案内致しますわ！　ふふふっ、大金ゲットして見せますわよ～っ！」
line = "「紅明様がそう仰るなら、喜んでご案内致しますわ！　ふふふっ、大金ゲットして見せますわよ～っ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　そう来なくっちゃ、セナリィじゃないよね！　私も行く～♪」
line = "「にひひ♪　そう来なくっちゃ、セナリィじゃないよね！　私も行く～♪」"

[[dialogue]]
speaker = "unk"
# ３人共、戻って来ーい！
line = "３人共、戻って来ーい！"

[[dialogue]]
speaker = "unk"
# いや、アカンて！
line = "いや、アカンて！"

[[dialogue]]
speaker = "unk"
# そうして、セナリィは大金を賭けたギャンブルに挑んだ――
line = "そうして、セナリィは大金を賭けたギャンブルに挑んだ――"

[[dialogue]]
speaker = "セナリィ"
# 「来た来た来た、来ましたわ！　ここで全額倍プッシュですわ！　これに勝てば、本当に１００倍！　札束ベッドでグッドナイトですわ！」
line = "「来た来た来た、来ましたわ！　ここで全額倍プッシュですわ！　これに勝てば、本当に１００倍！　札束ベッドでグッドナイトですわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふふっ、星騎士の私の動体視力を持ってすれば、スロットの目押しなど、何てことないですわ！　さあさあ、行きますわよ……ここですわ！　止まりなさい、トリプルセブン！」
line = "「ふふふっ、星騎士の私の動体視力を持ってすれば、スロットの目押しなど、何てことないですわ！　さあさあ、行きますわよ……ここですわ！　止まりなさい、トリプルセブン！」"

[[dialogue]]
speaker = "セナリィ"
# 「勝った……！　ん……？　待ちなさい、何ですの、このモードは！？　ボタン押してからの謎モードチェンジは卑怯じゃないですの！？」
line = "「勝った……！　ん……？　待ちなさい、何ですの、このモードは！？　ボタン押してからの謎モードチェンジは卑怯じゃないですの！？」"

[[dialogue]]
speaker = "セナリィ"
# 「ちょっ……ダメダメダメ！　そこで止まったら、マジでキレますわよ！　あっ！　ああっ！？　あああぁぁぁ～～～～～～っ！！！」
line = "「ちょっ……ダメダメダメ！　そこで止まったら、マジでキレますわよ！　あっ！　ああっ！？　あああぁぁぁ～～～～～～っ！！！」"

[[dialogue]]
speaker = "セナリィ"
# 「はっ……！？　何だ、夢か……５０倍まで稼いだ大金を一瞬で溶かしたかと思って、焦りましたわ……」
line = "「はっ……！？　何だ、夢か……５０倍まで稼いだ大金を一瞬で溶かしたかと思って、焦りましたわ……」"

[[dialogue]]
speaker = "unk"
# いえ、現実です
line = "いえ、現実です"

[[dialogue]]
speaker = "セナリィ"
# 「ホワイ！？」
line = "「ホワイ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、今日は楽しかったけど、残念だったね～、にひひ♪」
line = "「いや～、今日は楽しかったけど、残念だったね～、にひひ♪」"

[[dialogue]]
speaker = "セナリィ"
# 「ど――」
line = "「ど――」"

[[dialogue]]
speaker = "セナリィ"
# 「どうしてこうなるんですのぉぉぉ～～～～～～っ！？」
line = "「どうしてこうなるんですのぉぉぉ～～～～～～っ！？」"

[[dialogue]]
speaker = "紅明"
# 「まあまあ、セナっち、元気出して！　代わりに、今夜はアタシが焼肉奢るっしょ！　ウェ～イ☆」
line = "「まあまあ、セナっち、元気出して！　代わりに、今夜はアタシが焼肉奢るっしょ！　ウェ～イ☆」"

[[dialogue]]
speaker = "unk"
# ちゃっかり１人勝ちしてたしね
line = "ちゃっかり１人勝ちしてたしね"

[[dialogue]]
speaker = "セナリィ"
# 「キーッ、羨ましくて悔しいですわぁぁぁ～～～っ！」
line = "「キーッ、羨ましくて悔しいですわぁぁぁ～～～っ！」"

[[dialogue]]
speaker = "紅明"
# 「あはははっ！　妬むな妬むな！　まあ今度、新しい依頼も紹介するから！」
line = "「あはははっ！　妬むな妬むな！　まあ今度、新しい依頼も紹介するから！」"

[[dialogue]]
speaker = "unk"
# 散財はしたものの、意外と気が合ったのか、いつの間にか紅明と仲良くなったセナリィなのだった。
line = "散財はしたものの、意外と気が合ったのか、いつの間にか紅明と仲良くなったセナリィなのだった。"
