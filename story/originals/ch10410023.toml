[[dialogue]]
speaker = "unk"
# 第３話,好きにすれば？,P
line = "第３話,好きにすれば？,P"

[[dialogue]]
speaker = "unk"
# ある日、マインと一緒に昼食をとっていると、彼女と公安委員会でバディを組んでいるセナリィが訪ねてきた。
line = "ある日、マインと一緒に昼食をとっていると、彼女と公安委員会でバディを組んでいるセナリィが訪ねてきた。"

[[dialogue]]
speaker = "セナリィ"
# 「ごきげんよう、会長様。それに、マイン。恋人関係を楽しんでいるところ、失礼しますわね」
line = "「ごきげんよう、会長様。それに、マイン。恋人関係を楽しんでいるところ、失礼しますわね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おいっす、セナリィ。今日はどうしたの？　またなんか新しい悪巧みでも思いついた？」
line = "「おいっす、セナリィ。今日はどうしたの？　またなんか新しい悪巧みでも思いついた？」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふっ、そのようなものですわ。実は会長様に依頼したいことがあって、参りましたの」
line = "「ふふっ、そのようなものですわ。実は会長様に依頼したいことがあって、参りましたの」"

[[dialogue]]
speaker = "セナリィ"
# 「単刀直入に申し上げますと……会長様、私の１日レンタル彼氏になって下さらない？」
line = "「単刀直入に申し上げますと……会長様、私の１日レンタル彼氏になって下さらない？」"

[[dialogue]]
speaker = "unk"
# ファッ！？
line = "ファッ！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……どういうことか、説明して貰えるかな？　セナリィも知ってるよね？　会長は私の――」
line = "「……どういうことか、説明して貰えるかな？　セナリィも知ってるよね？　会長は私の――」"

[[dialogue]]
speaker = "セナリィ"
# 「もちろん存じておりますわ。お２人は、お試しの恋人関係を築いているのでしょう？」
line = "「もちろん存じておりますわ。お２人は、お試しの恋人関係を築いているのでしょう？」"

[[dialogue]]
speaker = "セナリィ"
# 「だからそれと同じで、私とも１日、お試しの恋人関係になって頂きたいというお話ですわ。私、何か変なことを言ってますかしら？」
line = "「だからそれと同じで、私とも１日、お試しの恋人関係になって頂きたいというお話ですわ。私、何か変なことを言ってますかしら？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ふ～ん、なるほどね～。――まぁ、別にいいんじゃない？」
line = "「……ふ～ん、なるほどね～。――まぁ、別にいいんじゃない？」"

[[dialogue]]
speaker = "unk"
# えっ！？　マイン！？
line = "えっ！？　マイン！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「確かにお試し期間中だし、セナリィも試したいって言うなら、独占する権利はないしね。好きにすれば？」
line = "「確かにお試し期間中だし、セナリィも試したいって言うなら、独占する権利はないしね。好きにすれば？」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、そうさせてもらいますわ。前々からお２人の関係を見て、私も試してみたいと思っておりましたの♪」
line = "「ええ、そうさせてもらいますわ。前々からお２人の関係を見て、私も試してみたいと思っておりましたの♪」"

[[dialogue]]
speaker = "unk"
# マインの反応に少し残念な気持ちになりつつも、セナリィに押し切られる形で１日レンタル彼氏を引き受けることになってしまい……約束していた休日の日。
line = "マインの反応に少し残念な気持ちになりつつも、セナリィに押し切られる形で１日レンタル彼氏を引き受けることになってしまい……約束していた休日の日。"

[[dialogue]]
speaker = "セナリィ"
# 「会長様、本日はレンタル彼氏を引き受けて下さり、ありがとうございますわ♪　それじゃあ早速、行きたいカフェがあるのですけれど、よろしいかしら？」
line = "「会長様、本日はレンタル彼氏を引き受けて下さり、ありがとうございますわ♪　それじゃあ早速、行きたいカフェがあるのですけれど、よろしいかしら？」"

[[dialogue]]
speaker = "セナリィ"
# 「実はそこが、カップル専門店という面白い触れ込みでして、一緒に入って下さる男性を探しておりましたの。というわけで――」
line = "「実はそこが、カップル専門店という面白い触れ込みでして、一緒に入って下さる男性を探しておりましたの。というわけで――」"

[[dialogue]]
speaker = "セナリィ"
# 「ドレスコードを守って、入店するとしましょう。――詳しい事情は、終わった後に説明させて頂きますので♪」
line = "「ドレスコードを守って、入店するとしましょう。――詳しい事情は、終わった後に説明させて頂きますので♪」"

[[dialogue]]
speaker = "セナリィ"
# 「――ふふっ、これで現場の証拠も押さえて、店も潰しましたし、依頼達成ですわ♪　ご協力ありがとうございました、会長様」
line = "「――ふふっ、これで現場の証拠も押さえて、店も潰しましたし、依頼達成ですわ♪　ご協力ありがとうございました、会長様」"

[[dialogue]]
speaker = "セナリィ"
# 「実は今回、九浄家の方から傭兵仕事の依頼がありまして、あのカップル専門店で違法な銃器売買が行われているとのことでしたの」
line = "「実は今回、九浄家の方から傭兵仕事の依頼がありまして、あのカップル専門店で違法な銃器売買が行われているとのことでしたの」"

[[dialogue]]
speaker = "セナリィ"
# 「さて、ずっと放置してましたけど……隠れて尾行なんてしてないで、さっさと出てきなさいな、マイン？」
line = "「さて、ずっと放置してましたけど……隠れて尾行なんてしてないで、さっさと出てきなさいな、マイン？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ハロウィンフォームで、影に隠れる能力を使って、星力感知も効かないはずなんだけど」
line = "「……ハロウィンフォームで、影に隠れる能力を使って、星力感知も効かないはずなんだけど」"

[[dialogue]]
speaker = "セナリィ"
# 「そこに生きている以上、気配を完全に消すことなど不可能ですわ。数多の戦場でスナイパーから銃口を向けられてきた私が、気付かないとでも思って？」
line = "「そこに生きている以上、気配を完全に消すことなど不可能ですわ。数多の戦場でスナイパーから銃口を向けられてきた私が、気付かないとでも思って？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そういうところは敵わないな～、本当……」
line = "「そういうところは敵わないな～、本当……」"

[[dialogue]]
speaker = "セナリィ"
# 「それで？　なんで尾行なんてしてましたの？」
line = "「それで？　なんで尾行なんてしてましたの？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それはほら、こっちも公安委員会の仕事だよ。武器の違法売買の情報が下りてきて、その調査で……」
line = "「それはほら、こっちも公安委員会の仕事だよ。武器の違法売買の情報が下りてきて、その調査で……」"

[[dialogue]]
speaker = "セナリィ"
# 「嘘ですわね。今回の件は、公安委員会のバックである九浄家から直接、武器商人の下で傭兵をしていた経験のある私に依頼されたもの。あなたには情報など行かないはずですわ」
line = "「嘘ですわね。今回の件は、公安委員会のバックである九浄家から直接、武器商人の下で傭兵をしていた経験のある私に依頼されたもの。あなたには情報など行かないはずですわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～……えっと……」
line = "「いや～……えっと……」"

[[dialogue]]
speaker = "セナリィ"
# 「あのですわね、マイン――いい加減めんどくせぇですわよ？　私と会長様のデートが気になって、付いてきたのでしょう？」
line = "「あのですわね、マイン――いい加減めんどくせぇですわよ？　私と会長様のデートが気になって、付いてきたのでしょう？」"

[[dialogue]]
speaker = "セナリィ"
# 「あなたの捻くれた性格はよく知っておりますし、私は愛なんて目に見えないものは信じておりませんけれど……」
line = "「あなたの捻くれた性格はよく知っておりますし、私は愛なんて目に見えないものは信じておりませんけれど……」"

[[dialogue]]
speaker = "セナリィ"
# 「気に入っているものなら、ちゃんと自分のものだって主張くらいしとけって話ですわ」
line = "「気に入っているものなら、ちゃんと自分のものだって主張くらいしとけって話ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「平静を装っておきながら嫉妬するだなんて、みっともないですわよ」
line = "「平静を装っておきながら嫉妬するだなんて、みっともないですわよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "セナリィ"
# 「やれやれ、ご自慢の交渉術はどこへ行ったのやら。ここからは会長様にお任せした方がよろしそうですわね」
line = "「やれやれ、ご自慢の交渉術はどこへ行ったのやら。ここからは会長様にお任せした方がよろしそうですわね」"

[[dialogue]]
speaker = "セナリィ"
# 「そういうことですから、後はよろしくお願いしますわね、会長様。――私はこれにて失礼致しますわ。あしなに♪」
line = "「そういうことですから、後はよろしくお願いしますわね、会長様。――私はこれにて失礼致しますわ。あしなに♪」"

[[dialogue]]
speaker = "unk"
# マイン、変に気を遣わせちゃってごめん
line = "マイン、変に気を遣わせちゃってごめん"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……なんで、会長が謝るのさ」
line = "「……なんで、会長が謝るのさ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――私の性格を知ってるはずなのに、１日彼氏を引き受けちゃったから？　それは別に……私もいいって言ったし……」
line = "「――私の性格を知ってるはずなのに、１日彼氏を引き受けちゃったから？　それは別に……私もいいって言ったし……」"

[[dialogue]]
speaker = "unk"
# 改めてちゃんと言うよ。
line = "改めてちゃんと言うよ。"

[[dialogue]]
speaker = "unk"
# ……俺は、マインのことが好きだ
line = "……俺は、マインのことが好きだ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「な、なに？　いきなり……。――会長とこれまで、お試しで付き合ってきてどうだったか？」
line = "「な、なに？　いきなり……。――会長とこれまで、お試しで付き合ってきてどうだったか？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それは……悪くなかったよ。思っていたよりもずっと……キスとかしても、別に嫌じゃないし……」
line = "「それは……悪くなかったよ。思っていたよりもずっと……キスとかしても、別に嫌じゃないし……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、会長の方はどうなの？　私のこと嫌だって思ったりすること、ないの？　よくふざけて、背中踏んだりとかしてるし……」
line = "「でも、会長の方はどうなの？　私のこと嫌だって思ったりすること、ないの？　よくふざけて、背中踏んだりとかしてるし……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「前も言ったけど、私……性悪だし……今回みたいに、面倒臭いことになったりするじゃん？」
line = "「前も言ったけど、私……性悪だし……今回みたいに、面倒臭いことになったりするじゃん？」"

[[dialogue]]
speaker = "unk"
# 確かに振り回されることは多い。だけど――
line = "確かに振り回されることは多い。だけど――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――それがなんか嬉しくて、可愛いと感じちゃうくらい、私のことが好きになっちゃってる？」
line = "「――それがなんか嬉しくて、可愛いと感じちゃうくらい、私のことが好きになっちゃってる？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「っ……バッカじゃないの？　そんなの会長、ドＭじゃん……」
line = "「っ……バッカじゃないの？　そんなの会長、ドＭじゃん……」"

[[dialogue]]
speaker = "unk"
# ドＭでもいい。だから――
line = "ドＭでもいい。だから――"

[[dialogue]]
speaker = "unk"
# お試しじゃなく、正式な恋人として付き合って欲しい。俺はマインに、そう告白した。
line = "お試しじゃなく、正式な恋人として付き合って欲しい。俺はマインに、そう告白した。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……私、意地悪だから、後で別れたいってなった時、すっっっごく大変だよ？」
line = "「……私、意地悪だから、後で別れたいってなった時、すっっっごく大変だよ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それでもいいなら…………す、好きにすれば？」
line = "「それでもいいなら…………す、好きにすれば？」"

[[dialogue]]
speaker = "unk"
# そう言って、マインは赤ずきんのフードで顔を隠しながら、俺の手をそっと握るのだった。
line = "そう言って、マインは赤ずきんのフードで顔を隠しながら、俺の手をそっと握るのだった。"
