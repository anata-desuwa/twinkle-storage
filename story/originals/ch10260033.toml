[[dialogue]]
speaker = "unk"
# 第３話,後輩とからかいスキンシップ,P
line = "第３話,後輩とからかいスキンシップ,P"

[[dialogue]]
speaker = "unk"
# とある休日。リーリアが俺の家に遊びに来ていたのだが――
line = "とある休日。リーリアが俺の家に遊びに来ていたのだが――"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、今日はですね～、マジカルチェ～ンジ☆」
line = "「センパイ、今日はですね～、マジカルチェ～ンジ☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「このアルカンシェルフォームの力を更に強化する為に、絆を高めるイチャイチャをしたいと思います☆」
line = "「このアルカンシェルフォームの力を更に強化する為に、絆を高めるイチャイチャをしたいと思います☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「――具体的にどんなことをするのか、ですか？」
line = "「――具体的にどんなことをするのか、ですか？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「そりゃあセンパイ、手を繋いだりとか、ハグとか、キスとか～<emoji=heart04>」
line = "「そりゃあセンパイ、手を繋いだりとか、ハグとか、キスとか～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# いつも通りじゃない？
line = "いつも通りじゃない？"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ちっちっち♪　今日は一味違いますよ～？」
line = "「ちっちっち♪　今日は一味違いますよ～？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「今日はズバリ、『からかいモード』のままスキンシップをします！」
line = "「今日はズバリ、『からかいモード』のままスキンシップをします！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「つまりは、私が普段の時以上にセンパイのことを煽りながら、イチャイチャしちゃう感じですね☆」
line = "「つまりは、私が普段の時以上にセンパイのことを煽りながら、イチャイチャしちゃう感じですね☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「それでは、早速始めちゃいましょう！　レッツマジカル☆」
line = "「それでは、早速始めちゃいましょう！　レッツマジカル☆」"

[[dialogue]]
speaker = "unk"
# 俺の隣、ソファーに座ったリーリアは、肩をくっ付けて来ながら言う。
line = "俺の隣、ソファーに座ったリーリアは、肩をくっ付けて来ながら言う。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ふふっ、センパ～イ、今日は私がどんなに可愛くても、勝手にスキンシップをしちゃったら負けですよ～？」
line = "「ふふっ、センパ～イ、今日は私がどんなに可愛くても、勝手にスキンシップをしちゃったら負けですよ～？」"

[[dialogue]]
speaker = "unk"
# さっきは『する』って言ってたのに？
line = "さっきは『する』って言ってたのに？"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ダメで～す、そんな簡単に許可はしてあげませ～ん☆」
line = "「ダメで～す、そんな簡単に許可はしてあげませ～ん☆」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「私が今から段階的にスキンシップをして行くので、それより先はお預けです♪」
line = "「私が今から段階的にスキンシップをして行くので、それより先はお預けです♪」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「まずは、手から行きます☆　こうして、センパイの手の上から、私の可愛い手を重ねて～<emoji=heart04>」
line = "「まずは、手から行きます☆　こうして、センパイの手の上から、私の可愛い手を重ねて～<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ほら、やわやわと触ったり、スリスリしちゃいますよ～？　ふふっ、すりすり……<emoji=heart04>」
line = "「ほら、やわやわと触ったり、スリスリしちゃいますよ～？　ふふっ、すりすり……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアは俺の耳元に唇を寄せ、息を吹きかけるように囁いて来る。
line = "リーリアは俺の耳元に唇を寄せ、息を吹きかけるように囁いて来る。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「次に、ここから１本１本指を絡めて～、恋人繋ぎにしてっちゃいますね～<emoji=heart04>」
line = "「次に、ここから１本１本指を絡めて～、恋人繋ぎにしてっちゃいますね～<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「じっくりと感触を確かめるように～……指と指の間にそ～っと<emoji=heart04>　ぴとっってくっ付けて……<emoji=heart04>　ふふっ、どうですか～？」
line = "「じっくりと感触を確かめるように～……指と指の間にそ～っと<emoji=heart04>　ぴとっってくっ付けて……<emoji=heart04>　ふふっ、どうですか～？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「付き合い始めてからはちょっと慣れちゃった気がしてましたけど、こうしてゆっくり手を繋ぐと、違う感じがしませんか？」
line = "「付き合い始めてからはちょっと慣れちゃった気がしてましたけど、こうしてゆっくり手を繋ぐと、違う感じがしませんか？」"

[[dialogue]]
speaker = "unk"
# そうして片手を恋人繋ぎにした後、もう片方の手が俺の頬へと伸ばされ、そっと触れる。
line = "そうして片手を恋人繋ぎにした後、もう片方の手が俺の頬へと伸ばされ、そっと触れる。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「センパイ<emoji=heart04>　次はお顔を撫でちゃいますね<emoji=heart04>」
line = "「センパイ<emoji=heart04>　次はお顔を撫でちゃいますね<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ほ～ら、すりすり～<emoji=heart04>　そこから、指の腹で優し～く、さわさわしちゃいますよ～<emoji=heart04>　こしょこしょ<emoji=heart04>」
line = "「ほ～ら、すりすり～<emoji=heart04>　そこから、指の腹で優し～く、さわさわしちゃいますよ～<emoji=heart04>　こしょこしょ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「首筋からうなじの辺りとか、どうですか～？　ふふっ、今ちょっとピクッと反応しましたね<emoji=heart04>　センパイ、感じちゃったんですか～？」
line = "「首筋からうなじの辺りとか、どうですか～？　ふふっ、今ちょっとピクッと反応しましたね<emoji=heart04>　センパイ、感じちゃったんですか～？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「他に感じそうなところは～、耳たぶの裏とかですかね？　ひと差し指で付け根をなぞるように～……あはっ<emoji=heart04>」
line = "「他に感じそうなところは～、耳たぶの裏とかですかね？　ひと差し指で付け根をなぞるように～……あはっ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「なんですか、センパイ？　呼吸が荒くなってますよ～？」
line = "「なんですか、センパイ？　呼吸が荒くなってますよ～？」"

[[dialogue]]
speaker = "unk"
# そう言って、リーリアはひと差し指を俺の唇へと持って来て、撫でる。
line = "そう言って、リーリアはひと差し指を俺の唇へと持って来て、撫でる。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「いつもセンパイのこの唇が、私の唇にキスして、可愛がって、気持ち良くしてくれてるんですよね～<emoji=heart04>」
line = "「いつもセンパイのこの唇が、私の唇にキスして、可愛がって、気持ち良くしてくれてるんですよね～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアはそのひと差し指を自分の唇へと持って行って、わざとらしく悪戯な笑みを浮かべる。
line = "リーリアはそのひと差し指を自分の唇へと持って行って、わざとらしく悪戯な笑みを浮かべる。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ん……<emoji=heart04>　ふふっ、間接キスしちゃいました<emoji=heart04>」
line = "「ん……<emoji=heart04>　ふふっ、間接キスしちゃいました<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「――さて、じゃあ次は～、えいっ☆」
line = "「――さて、じゃあ次は～、えいっ☆」"

[[dialogue]]
speaker = "unk"
# リーリアは俺と正面から向き合う形で、膝の上に座る。
line = "リーリアは俺と正面から向き合う形で、膝の上に座る。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ハグして、全身密着しちゃいますね<emoji=heart04>　それっ<emoji=heart04>」
line = "「ハグして、全身密着しちゃいますね<emoji=heart04>　それっ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「センパイに、ぎゅ～～っ<emoji=heart04><emoji=heart04>」
line = "「センパイに、ぎゅ～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 可愛い後輩彼女の柔らかい体の感触と、温かな体温、それといい匂いに包まれる。
line = "可愛い後輩彼女の柔らかい体の感触と、温かな体温、それといい匂いに包まれる。"

[[dialogue]]
speaker = "unk"
# 思わず手が彼女の背中へと動いて、そのまま抱き締めたい衝動に駆られるが、すんでのところで耐える。
line = "思わず手が彼女の背中へと動いて、そのまま抱き締めたい衝動に駆られるが、すんでのところで耐える。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「あれあれ～？　センパイ、まだ我慢しちゃうんですか～？」
line = "「あれあれ～？　センパイ、まだ我慢しちゃうんですか～？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「センパイの体、熱くなって、心臓がドキドキしちゃってるのが伝わって来てますよ<emoji=heart04>」
line = "「センパイの体、熱くなって、心臓がドキドキしちゃってるのが伝わって来てますよ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「このままキスしちゃってもいいんですよ～？」
line = "「このままキスしちゃってもいいんですよ～？」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ほら、こんなにお互いの唇が近くにあるのに……<emoji=heart04>」
line = "「ほら、こんなにお互いの唇が近くにあるのに……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 今にも唇が触れそうな距離にまで顔を近づけながら、リーリアは煽る。
line = "今にも唇が触れそうな距離にまで顔を近づけながら、リーリアは煽る。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「センパイ、ここまで耐えるなんて、もしかして私のこと、そんなに好きじゃないんですか～？　リーリア悲しいな～<emoji=heart04>」
line = "「センパイ、ここまで耐えるなんて、もしかして私のこと、そんなに好きじゃないんですか～？　リーリア悲しいな～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は首を横に振って、答えた。
line = "俺は首を横に振って、答えた。"

[[dialogue]]
speaker = "unk"
# なるべく長く見ていたいんだ
line = "なるべく長く見ていたいんだ"

[[dialogue]]
speaker = "unk"
# からかって来るリーリアが愛おし過ぎるから
line = "からかって来るリーリアが愛おし過ぎるから"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「せ、センパイ、その言い方は反則ですよぉ……<emoji=heart04>」
line = "「せ、センパイ、その言い方は反則ですよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「そんなこと言われると、私の方が我慢できなくなっちゃうじゃないですかっ<emoji=heart04>」
line = "「そんなこと言われると、私の方が我慢できなくなっちゃうじゃないですかっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアの方から、唇を重ねて来る。
line = "リーリアの方から、唇を重ねて来る。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「センパイっ<emoji=heart04>　んんっ……<emoji=heart04>」
line = "「センパイっ<emoji=heart04>　んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「はあぁ……<emoji=heart04>　センパイ……ちゅっ<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　センパイ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「好き<emoji=heart04>　んっ……<emoji=heart04>　センパイ<emoji=heart04>　好き、しゅき……<emoji=heart04>」
line = "「好き<emoji=heart04>　んっ……<emoji=heart04>　センパイ<emoji=heart04>　好き、しゅき……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ちゅっ……ちゅっ……<emoji=heart04>」
line = "「ちゅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後はあっと言う間にからかいモードじゃなくなり、デレデレと沢山甘えまくってくる可愛いリーリアなのであった――
line = "その後はあっと言う間にからかいモードじゃなくなり、デレデレと沢山甘えまくってくる可愛いリーリアなのであった――"
