[[dialogue]]
speaker = "unk"
# 第４話,アルタイルのグレイス,B
line = "第４話,アルタイルのグレイス,B"

[[dialogue]]
speaker = "アナ"
# 「──以上が、ここ数日のグレイスさんの大冒険の記録です」
line = "「──以上が、ここ数日のグレイスさんの大冒険の記録です」"

[[dialogue]]
speaker = "クロト"
# 「……ああ」
line = "「……ああ」"

[[dialogue]]
speaker = "アナ"
# 「星徒会の業務に支障が出ています。グレイスさんによってマトイ先輩が常に拘束され、書類仕事が進捗率マイナス８０％」
line = "「星徒会の業務に支障が出ています。グレイスさんによってマトイ先輩が常に拘束され、書類仕事が進捗率マイナス８０％」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ～♪」
line = "「あらあら、うふふ～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「グレイス・オベロニア……鉄砲玉みたいな子ね！」
line = "「グレイス・オベロニア……鉄砲玉みたいな子ね！」"

[[dialogue]]
speaker = "マトイ"
# 「どうして私ばかりに同伴を頼むんだろう？　会長とは昔、会ったことがあるみたいなのに……」
line = "「どうして私ばかりに同伴を頼むんだろう？　会長とは昔、会ったことがあるみたいなのに……」"

[[dialogue]]
speaker = "マトイ"
# 「そうだ、こうしちゃいられない。今のうちに、少しでも仕事を……」
line = "「そうだ、こうしちゃいられない。今のうちに、少しでも仕事を……」"

[[dialogue]]
speaker = "グレイス"
# 『マトイさん！　私、街にお買い物に行きたいです！』
line = "『マトイさん！　私、街にお買い物に行きたいです！』"

[[dialogue]]
speaker = "マトイ"
# 「ひえぇえ～っ……ごめん、抜けます～っ……！」
line = "「ひえぇえ～っ……ごめん、抜けます～っ……！」"

[[dialogue]]
speaker = "アナ"
# 「本当に台風のような方ですね……そうです、会長。依頼されていた調査の結果が出ましたよ」
line = "「本当に台風のような方ですね……そうです、会長。依頼されていた調査の結果が出ましたよ」"

[[dialogue]]
speaker = "アナ"
# 「グレイス・オベロニア。同姓同名の女の子が、アルタイルの流星市国にいること。そして存命であることも確認しました」
line = "「グレイス・オベロニア。同姓同名の女の子が、アルタイルの流星市国にいること。そして存命であることも確認しました」"

[[dialogue]]
speaker = "クロト"
# 「そうか……よかった」
line = "「そうか……よかった」"

[[dialogue]]
speaker = "アナ"
# 「会長の指示どおり、アルタイルのチナさんと同じ病院に搬送手続きを。シノ学園長にも協力を仰ぎ、手厚く保護していただきました」
line = "「会長の指示どおり、アルタイルのチナさんと同じ病院に搬送手続きを。シノ学園長にも協力を仰ぎ、手厚く保護していただきました」"

[[dialogue]]
speaker = "アナ"
# 「またデネブから同行してきた、エステル・ミルフォードさんについても同様です。市国在住のためすぐに発見できました」
line = "「またデネブから同行してきた、エステル・ミルフォードさんについても同様です。市国在住のためすぐに発見できました」"

[[dialogue]]
speaker = "アナ"
# 「昏睡の原因についてご家族へは伏せてありますが……今のところ大きなトラブルはありません」
line = "「昏睡の原因についてご家族へは伏せてありますが……今のところ大きなトラブルはありません」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう、アナ。大変だっただろ？」
line = "「ありがとう、アナ。大変だっただろ？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。会長の補佐をするのが、副会長の仕事です」
line = "「ノープロブレム。会長の補佐をするのが、副会長の仕事です」"

[[dialogue]]
speaker = "アナ"
# 「しかし、レティシア・オルティースという女の子の名前は確認できませんでした」
line = "「しかし、レティシア・オルティースという女の子の名前は確認できませんでした」"

[[dialogue]]
speaker = "サーシャ"
# 「もしかして、アルタイルではもう……？」
line = "「もしかして、アルタイルではもう……？」"

[[dialogue]]
speaker = "アナ"
# 「いいえ。出生記録と照合しましたが、データそのものがないんです。レティシアという名前も、偽名なのかもしれません」
line = "「いいえ。出生記録と照合しましたが、データそのものがないんです。レティシアという名前も、偽名なのかもしれません」"

[[dialogue]]
speaker = "クロト"
# 「……そうか。引き続き、何かわかったら教えてくれ」
line = "「……そうか。引き続き、何かわかったら教えてくれ」"

[[dialogue]]
speaker = "クロト"
# 「みんな、グレイス以外から外出の希望があったら対応を頼む。俺は少し出かけてくるよ」
line = "「みんな、グレイス以外から外出の希望があったら対応を頼む。俺は少し出かけてくるよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わかったわ！　行ってらっしゃい、クロト！」
line = "「わかったわ！　行ってらっしゃい、クロト！」"

[[dialogue]]
speaker = "unk"
# 天界からの援軍だけでは心もとない。次に助力を頼むべきは──魔界だ。
line = "天界からの援軍だけでは心もとない。次に助力を頼むべきは──魔界だ。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はろはろ～♪　会長から呼び出しなんてめずらしーね。しかも公安経由での依頼だなんて」
line = "「はろはろ～♪　会長から呼び出しなんてめずらしーね。しかも公安経由での依頼だなんて」"

[[dialogue]]
speaker = "クロト"
# 「折り入って頼みたいことがあるんだ。近づきつつある決戦に備えての、戦力拡充について」
line = "「折り入って頼みたいことがあるんだ。近づきつつある決戦に備えての、戦力拡充について」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……天界からの増援はすでに依頼済み。だから今度は魔界からも、ってこと？」
line = "「……天界からの増援はすでに依頼済み。だから今度は魔界からも、ってこと？」"

[[dialogue]]
speaker = "クロト"
# 「話が早くて助かる」
line = "「話が早くて助かる」"

[[dialogue]]
speaker = "クロト"
# 「向かってほしいのは、魔界の<ruby=たいはい>頽廃</ruby>都市キュリオスだ。<ruby=こうれい>煌嶺</ruby>の配下たちは猛者ぞろいと聞いている。彼らの力を借りたい」
line = "「向かってほしいのは、魔界の<ruby>頽廃<rt>たいはい</rt></ruby>都市キュリオスだ。<ruby>煌嶺<rt>こうれい</rt></ruby>の配下たちは猛者ぞろいと聞いている。彼らの力を借りたい」"

[[dialogue]]
speaker = "クロト"
# 「マインには流星市国代表の交渉人として、魔界で腕を振るってもらいたいんだ」
line = "「マインには流星市国代表の交渉人として、魔界で腕を振るってもらいたいんだ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んー……会長の頼みだし断る気はないんだけど。私、キュリオスに知り合いなんていないよ？」
line = "「んー……会長の頼みだし断る気はないんだけど。私、キュリオスに知り合いなんていないよ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ていうか、交渉するなら魔界じゃなくて、いま人間界にいる煌嶺さんに、じゃないの？」
line = "「ていうか、交渉するなら魔界じゃなくて、いま人間界にいる煌嶺さんに、じゃないの？」"

[[dialogue]]
speaker = "クロト"
# 「実は、キュリオスにいる戦力の貸し出し自体は、もう許可が下りてるんだ」
line = "「実は、キュリオスにいる戦力の貸し出し自体は、もう許可が下りてるんだ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「どゆことぉ！？」
line = "「どゆことぉ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ええっと、会長……？　ちゃんとイチから私にしてほしいことを説明してくれるかな？」
line = "「ええっと、会長……？　ちゃんとイチから私にしてほしいことを説明してくれるかな？」"

[[dialogue]]
speaker = "クロト"
# 「ややこしい話ですまない……」
line = "「ややこしい話ですまない……」"

[[dialogue]]
speaker = "クロト"
# 「煌嶺はキュリオスの皇帝だ。彼女の命令があれば、キュリオスの兵自体は動かせる」
line = "「煌嶺はキュリオスの皇帝だ。彼女の命令があれば、キュリオスの兵自体は動かせる」"

[[dialogue]]
speaker = "クロト"
# 「だが、そのことを頼みに行った時に言われてしまったんだ、『キュリオスだけでは足りない』と」
line = "「だが、そのことを頼みに行った時に言われてしまったんだ、『キュリオスだけでは足りない』と」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「足りない……？」
line = "「足りない……？」"

[[dialogue]]
speaker = "クロト"
# 「キュリオスの戦力だけではなく、事情を話して周辺諸国の戦力をまとめて連れてこい、と逆にミッションを課されてしまった」
line = "「キュリオスの戦力だけではなく、事情を話して周辺諸国の戦力をまとめて連れてこい、と逆にミッションを課されてしまった」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～～……なるほど、なるほど？　だいたい事情は察したよ」
line = "「あ～～……なるほど、なるほど？　だいたい事情は察したよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これ、要するに『キュリオスの戦力を借りたいなら、周辺諸国の戦力も同じだけ削いで来い』っていうミッションだね～」
line = "「これ、要するに『キュリオスの戦力を借りたいなら、周辺諸国の戦力も同じだけ削いで来い』っていうミッションだね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「噂によると、キュリオスって魔界じゃ相当悪名高いみたいだし。恨みを持ってる国も多そう……」
line = "「噂によると、キュリオスって魔界じゃ相当悪名高いみたいだし。恨みを持ってる国も多そう……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「キュリオスの力を借りるのなら、その間に周辺諸国から戦争を仕掛けられないように、同程度の戦力を連れてこなければダメってことかぁ」
line = "「キュリオスの力を借りるのなら、その間に周辺諸国から戦争を仕掛けられないように、同程度の戦力を連れてこなければダメってことかぁ」"

[[dialogue]]
speaker = "クロト"
# 「……本当に話が早くて助かるよ、マイン」
line = "「……本当に話が早くて助かるよ、マイン」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あの皇帝様も無茶苦茶を言うね～」
line = "「あの皇帝様も無茶苦茶を言うね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「キュリオス以外の戦力がどの程度で、どれくらい連れてくれば釣り合いが取れるのかなんて、専門家でもないと中々計算できないんですけど～？」
line = "「キュリオス以外の戦力がどの程度で、どれくらい連れてくれば釣り合いが取れるのかなんて、専門家でもないと中々計算できないんですけど～？」"

[[dialogue]]
speaker = "クロト"
# 「それについては、おおよその目星が書かれた資料を渡されてる。ＤＩＳＣでデータを送るよ」
line = "「それについては、おおよその目星が書かれた資料を渡されてる。ＤＩＳＣでデータを送るよ」"

[[dialogue]]
speaker = "unk"
# 煌嶺の作った資料を送信すると、マインは早速ＤＩＳＣの画面に目を走らせる。
line = "煌嶺の作った資料を送信すると、マインは早速ＤＩＳＣの画面に目を走らせる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「準備が良すぎて怖いなぁ……え～っと、なになに？」
line = "「準備が良すぎて怖いなぁ……え～っと、なになに？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふーむ、なるほどねぇ。いくつか外交カードも渡してくれてるし、キュリオスで合流するべき現地の専門家もちゃんと紹介してくれてるなぁ」
line = "「ふーむ、なるほどねぇ。いくつか外交カードも渡してくれてるし、キュリオスで合流するべき現地の専門家もちゃんと紹介してくれてるなぁ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これ、会長から相談を受けて即興で作った……わけじゃなさそ～」
line = "「これ、会長から相談を受けて即興で作った……わけじゃなさそ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「普段から『いつ戦争を仕掛けようか？』って考えてないと、こんなに具体的な数字は出てこないぞ～♪」
line = "「普段から『いつ戦争を仕掛けようか？』って考えてないと、こんなに具体的な数字は出てこないぞ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うん♪　だいたいわかった。煌嶺さん、流石は大国をまとめてるトップってカンジだね」
line = "「うん♪　だいたいわかった。煌嶺さん、流石は大国をまとめてるトップってカンジだね」"

[[dialogue]]
speaker = "クロト"
# 「本当なら、煌嶺自身にその交渉もお願いしたかったんだけどな」
line = "「本当なら、煌嶺自身にその交渉もお願いしたかったんだけどな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あはは、それは無理無理♪」
line = "「あはは、それは無理無理♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「性格の問題もあるけど、どちらかと言うと立場の違いかな？」
line = "「性格の問題もあるけど、どちらかと言うと立場の違いかな？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「キュリオスが言うのと、流星市国が言うのでは、内容が同じでも意味が変わっちゃうからね」
line = "「キュリオスが言うのと、流星市国が言うのでは、内容が同じでも意味が変わっちゃうからね」"

[[dialogue]]
speaker = "クロト"
# 「それはまあ、確かに……」
line = "「それはまあ、確かに……」"

[[dialogue]]
speaker = "unk"
# キュリオスがリーダーシップを取って流星市国に魔界の軍勢を手配しようとなれば、逆にキュリオスが周辺諸国へ戦争を仕掛けるための布石と疑われてしまうかもしれない。
line = "キュリオスがリーダーシップを取って流星市国に魔界の軍勢を手配しようとなれば、逆にキュリオスが周辺諸国へ戦争を仕掛けるための布石と疑われてしまうかもしれない。"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に立ち向かわなければならないこのタイミングで、ヒト同士の争いになりかねない火種は可能な限り避けたい。
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に立ち向かわなければならないこのタイミングで、ヒト同士の争いになりかねない火種は可能な限り避けたい。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それにしても、煌嶺さん的には結構な大盤振る舞いじゃない？　よく手を貸してくれたね？」
line = "「それにしても、煌嶺さん的には結構な大盤振る舞いじゃない？　よく手を貸してくれたね？」"

[[dialogue]]
speaker = "クロト"
# 「……大変だったよ」
line = "「……大変だったよ」"

[[dialogue]]
speaker = "煌嶺"
# 「ほう？　魔界で妾が擁する戦力を貸しだせ、と？」
line = "「ほう？　魔界で妾が擁する戦力を貸しだせ、と？」"

[[dialogue]]
speaker = "煌嶺"
# 「──ふむ。妾がキュリオスにて開花させたノヴァフォームを持つ星騎士は、確かにリーエンだけではない。我が国は精鋭揃いだが……」
line = "「──ふむ。妾がキュリオスにて開花させたノヴァフォームを持つ星騎士は、確かにリーエンだけではない。我が国は精鋭揃いだが……」"

[[dialogue]]
speaker = "煌嶺"
# 「しかし魔王よ？　まさか<b>ただ</b>で貸してもらおうなどと思ってはおらぬな？」
line = "「しかし魔王よ？　まさか<b>ただ</b>で貸してもらおうなどと思ってはおらぬな？」"

[[dialogue]]
speaker = "煌嶺"
# 「大欲の女帝に、頭を垂れるだけで願いが叶うと思うなよ。交渉をしてみせろ。貴様は妾に、何を提示できる？」
line = "「大欲の女帝に、頭を垂れるだけで願いが叶うと思うなよ。交渉をしてみせろ。貴様は妾に、何を提示できる？」"

[[dialogue]]
speaker = "クロト"
# 「……俺たちは近いうちにデネブに乗り込む。ルヴィネの傍には、<b>あれ</b>がいる」
line = "「……俺たちは近いうちにデネブに乗り込む。ルヴィネの傍には、<b>あれ</b>がいる」"

[[dialogue]]
speaker = "クロト"
# 「平行世界ベガを滅ぼした<ruby=やくさい>厄災</ruby>の化身──ディザスターハンドが」
line = "「平行世界ベガを滅ぼした<ruby>厄災<rt>やくさい</rt></ruby>の化身──ディザスターハンドが」"

[[dialogue]]
speaker = "煌嶺"
# 「……ほう？」
line = "「……ほう？」"

[[dialogue]]
speaker = "クロト"
# 「あなたは強く、美しく、<ruby=はげ>烈</ruby>しい者を愛すると聞いた。あの『手』が美しいかはわからない。けれど……」
line = "「あなたは強く、美しく、<ruby>烈<rt>はげ</rt></ruby>しい者を愛すると聞いた。あの『手』が美しいかはわからない。けれど……」"

[[dialogue]]
speaker = "クロト"
# 「途方もなく強く、触れるものすべてを抹殺する、破壊の権化には違いない」
line = "「途方もなく強く、触れるものすべてを抹殺する、破壊の権化には違いない」"

[[dialogue]]
speaker = "クロト"
# 「デネブへ移動する際、転送装置の移動メンバーにあなたの席を空けておく。ディザスターハンドとまみえる機会──それが俺の約束できる報酬だ」
line = "「デネブへ移動する際、転送装置の移動メンバーにあなたの席を空けておく。ディザスターハンドとまみえる機会──それが俺の約束できる報酬だ」"

[[dialogue]]
speaker = "煌嶺"
# 「……妾を死地へ誘う。それが報酬だと？」
line = "「……妾を死地へ誘う。それが報酬だと？」"

[[dialogue]]
speaker = "クロト"
# 「その通りだ。世界を滅ぼすほどの力を持つ、厄災の化身と出会う機会は、もう二度とないだろう」
line = "「その通りだ。世界を滅ぼすほどの力を持つ、厄災の化身と出会う機会は、もう二度とないだろう」"

[[dialogue]]
speaker = "クロト"
# 「自らのものにするか、滅してしまうか──それはあなたの自由だ。けれど、そもそも会えないとお話にならない。違うか？」
line = "「自らのものにするか、滅してしまうか──それはあなたの自由だ。けれど、そもそも会えないとお話にならない。違うか？」"

[[dialogue]]
speaker = "煌嶺"
# 「その交渉は意味を持たぬな。あの<ruby=やくさい>厄災</ruby>との決戦に、妾の助力がなくてどうする？　少しでも戦力が欲しいと願い出ている身のくせに、笑わせる」
line = "「その交渉は意味を持たぬな。あの<ruby>厄災<rt>やくさい</rt></ruby>との決戦に、妾の助力がなくてどうする？　少しでも戦力が欲しいと願い出ている身のくせに、笑わせる」"

[[dialogue]]
speaker = "クロト"
# 「あなたが国の戦力を貸せないというのなら、俺はデネブへあなたを連れて行かない」
line = "「あなたが国の戦力を貸せないというのなら、俺はデネブへあなたを連れて行かない」"

[[dialogue]]
speaker = "クロト"
# 「平行世界に干渉する能力と、次元転送装置の所持は、俺が持ちうる最大の手札だ。絶対に譲る気はない」
line = "「平行世界に干渉する能力と、次元転送装置の所持は、俺が持ちうる最大の手札だ。絶対に譲る気はない」"

[[dialogue]]
speaker = "クロト"
# 「交渉が決裂した場合……俺たちが世界を救う間、あなたはアルタイルで留守番だ」
line = "「交渉が決裂した場合……俺たちが世界を救う間、あなたはアルタイルで留守番だ」"

[[dialogue]]
speaker = "unk"
# ぞわり、と空気が灼ける気配がした。
line = "ぞわり、と空気が灼ける気配がした。"

[[dialogue]]
speaker = "煌嶺"
# 「殺されて奪われる可能性を考えぬとは、つくづく『甘い』男ではないか？」
line = "「殺されて奪われる可能性を考えぬとは、つくづく『甘い』男ではないか？」"

[[dialogue]]
speaker = "クロト"
# 「あなたは俺を殺さない。なぜなら魔王因子ではない、ラクシス固有の力──平行世界への干渉能力を、あなたは『欲しい』と思っているからだ」
line = "「あなたは俺を殺さない。なぜなら魔王因子ではない、ラクシス固有の力──平行世界への干渉能力を、あなたは『欲しい』と思っているからだ」"

[[dialogue]]
speaker = "unk"
# ５秒、１０秒……いつ業火の星術が飛んで来てもおかしくない殺気を放ちながら、お互いに見つめ合う。
line = "５秒、１０秒……いつ業火の星術が飛んで来てもおかしくない殺気を放ちながら、お互いに見つめ合う。"

[[dialogue]]
speaker = "unk"
# しかし──それはやがて収まり、煌嶺がくつくつと笑いだす。
line = "しかし──それはやがて収まり、煌嶺がくつくつと笑いだす。"

[[dialogue]]
speaker = "煌嶺"
# 「……くっくっく。よかろう。及第点をくれてやる。慣れぬ交渉に身を投じたいじらしさに免じて、その話乗ってやろうではないか」
line = "「……くっくっく。よかろう。及第点をくれてやる。慣れぬ交渉に身を投じたいじらしさに免じて、その話乗ってやろうではないか」"

[[dialogue]]
speaker = "煌嶺"
# 「何せ貴様は３０００年前の死にぞこないだ。ご老体は労わらねばな？」
line = "「何せ貴様は３０００年前の死にぞこないだ。ご老体は労わらねばな？」"

[[dialogue]]
speaker = "煌嶺"
# 「だが１つ、妾からも『交渉』を持ちかけよう」
line = "「だが１つ、妾からも『交渉』を持ちかけよう」"

[[dialogue]]
speaker = "煌嶺"
# 「キュリオスの周辺諸国からも、妾が提示する数の戦力を連れてこい」
line = "「キュリオスの周辺諸国からも、妾が提示する数の戦力を連れてこい」"

[[dialogue]]
speaker = "クロト"
# 「なんだって……？」
line = "「なんだって……？」"

[[dialogue]]
speaker = "煌嶺"
# 「この世界の創造主に喧嘩をしかけるのであろう？　『キュリオスだけでは足りない』のではないか？」
line = "「この世界の創造主に喧嘩をしかけるのであろう？　『キュリオスだけでは足りない』のではないか？」"

[[dialogue]]
speaker = "煌嶺"
# 「ああ、そうだとも。キュリオスは確かに精鋭揃いではあるが、それだけではまったく足りぬ！」
line = "「ああ、そうだとも。キュリオスは確かに精鋭揃いではあるが、それだけではまったく足りぬ！」"

[[dialogue]]
speaker = "煌嶺"
# 「『戦争』は愚か者のすることだぞ、魔王よ♪　戦いは同レベルの者同士でしか起こらぬ」
line = "「『戦争』は愚か者のすることだぞ、魔王よ♪　戦いは同レベルの者同士でしか起こらぬ」"

[[dialogue]]
speaker = "煌嶺"
# 「であればこそ、するべきは『蹂躙』と『略奪』だ。戦争なぞ、お互いの民や資源を浪費させる、最も愚かな行為と言えよう」
line = "「であればこそ、するべきは『蹂躙』と『略奪』だ。戦争なぞ、お互いの民や資源を浪費させる、最も愚かな行為と言えよう」"

[[dialogue]]
speaker = "煌嶺"
# 「他者を圧倒し、支配する。戦わずして勝つことが、この世で最も美しい勝利だ」
line = "「他者を圧倒し、支配する。戦わずして勝つことが、この世で最も美しい勝利だ」"

[[dialogue]]
speaker = "煌嶺"
# 「相手が神であれ、その道理は変わらぬ。何も<ruby=うしな>喪</ruby>わず、何もかもを奪い、この世がすでに創造主ごときの器に収まらぬことを証明するべきだ」
line = "「相手が神であれ、その道理は変わらぬ。何も<ruby>喪<rt>うしな</rt></ruby>わず、何もかもを奪い、この世がすでに創造主ごときの器に収まらぬことを証明するべきだ」"

[[dialogue]]
speaker = "煌嶺"
# 「違うか？　魔王ラクシス」
line = "「違うか？　魔王ラクシス」"

[[dialogue]]
speaker = "クロト"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 大欲の女帝が口にする理想に、俺は圧倒されていた。
line = "大欲の女帝が口にする理想に、俺は圧倒されていた。"

[[dialogue]]
speaker = "unk"
# だが、何も間違っていない。何も喪わず、何もかもを奪う。この戦いはそうあるべきだ。
line = "だが、何も間違っていない。何も喪わず、何もかもを奪う。この戦いはそうあるべきだ。"

[[dialogue]]
speaker = "unk"
# ……もちろん、煌嶺には今口にした理想以外の打算や計算もあるだろうが、それを指摘することすら今は野暮に思えた。
line = "……もちろん、煌嶺には今口にした理想以外の打算や計算もあるだろうが、それを指摘することすら今は野暮に思えた。"

[[dialogue]]
speaker = "煌嶺"
# 「そうと決まれば<ruby=ふみ>文</ruby>をしたためてやる。貴様たちがどのように足掻くのか、面白くなってきたぞ」
line = "「そうと決まれば<ruby>文<rt>ふみ</rt></ruby>をしたためてやる。貴様たちがどのように足掻くのか、面白くなってきたぞ」"

[[dialogue]]
speaker = "煌嶺"
# 「キュリオスは貴様らが起こす程度の低い『戦争』に参加するつもりはない」
line = "「キュリオスは貴様らが起こす程度の低い『戦争』に参加するつもりはない」"

[[dialogue]]
speaker = "煌嶺"
# 「神を相手にしてなお、『蹂躙』と『略奪』が行えるだけの準備を整えてみせよ。そうなった時に初めて、キュリオスの力を貸してやろう」
line = "「神を相手にしてなお、『蹂躙』と『略奪』が行えるだけの準備を整えてみせよ。そうなった時に初めて、キュリオスの力を貸してやろう」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あはは♪　会長、災難だったね～」
line = "「あはは♪　会長、災難だったね～」"

[[dialogue]]
speaker = "クロト"
# 「正直、生きた心地はしなかったよ……」
line = "「正直、生きた心地はしなかったよ……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ま～、でも？　煌嶺さんの言ってることもわからないでもないかな～」
line = "「ま～、でも？　煌嶺さんの言ってることもわからないでもないかな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「戦力が拮抗した争いって、泥沼になっちゃうからね～。戦うなら圧勝するべし！　ってのはその通りだと思うよ」
line = "「戦力が拮抗した争いって、泥沼になっちゃうからね～。戦うなら圧勝するべし！　ってのはその通りだと思うよ」"

[[dialogue]]
speaker = "クロト"
# 「俺としても、その理屈は理解できる」
line = "「俺としても、その理屈は理解できる」"

[[dialogue]]
speaker = "クロト"
# 「だからマイン、すまないが魔界での交渉をお願いしたい」
line = "「だからマイン、すまないが魔界での交渉をお願いしたい」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、これ結構しんどいよ？　キュリオスだけならともかく、複数の国の、話したこともない人たちから軍事力を借りなきゃいけないんだから」
line = "「いや～、これ結構しんどいよ？　キュリオスだけならともかく、複数の国の、話したこともない人たちから軍事力を借りなきゃいけないんだから」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「しかもキュリオスのノヴァフォーム持ちを全員連れてくる前提って書いてあるんですけど？」
line = "「しかもキュリオスのノヴァフォーム持ちを全員連れてくる前提って書いてあるんですけど？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これに匹敵する周辺諸国の戦力全部盛りって……今の流星市国が軽く７回は滅ぼせるくらいの力があるからね？」
line = "「これに匹敵する周辺諸国の戦力全部盛りって……今の流星市国が軽く７回は滅ぼせるくらいの力があるからね？」"

[[dialogue]]
speaker = "クロト"
# 「無理を言っている自覚はある……ただ、こんな大がかりな交渉、マイン以外には頼めない」
line = "「無理を言っている自覚はある……ただ、こんな大がかりな交渉、マイン以外には頼めない」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もう１回言って？」
line = "「もう１回言って？」"

[[dialogue]]
speaker = "クロト"
# 「マイン以外に頼める仕事じゃない。マインだけが頼りだ。お願いします」
line = "「マイン以外に頼める仕事じゃない。マインだけが頼りだ。お願いします」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今、何でもするって言った？」
line = "「今、何でもするって言った？」"

[[dialogue]]
speaker = "クロト"
# 「何でもします。マインだけが最後の希望です」
line = "「何でもします。マインだけが最後の希望です」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁ～～～～、しょ～がないなぁ♪　貸し１だからね、会長？」
line = "「まぁ～～～～、しょ～がないなぁ♪　貸し１だからね、会長？」"

[[dialogue]]
speaker = "クロト"
# 「本当にありがとう！　よろしく頼むよ」
line = "「本当にありがとう！　よろしく頼むよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、あ～、キラキラした笑顔見せちゃって。まったくこの人たらしめ」
line = "「あ～、あ～、キラキラした笑顔見せちゃって。まったくこの人たらしめ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ただ、これから魔界へ出張ってことになるなら、お披露目はもうちょっと後になりそうかな？」
line = "「ただ、これから魔界へ出張ってことになるなら、お披露目はもうちょっと後になりそうかな？」"

[[dialogue]]
speaker = "クロト"
# 「……お披露目？」
line = "「……お披露目？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「来たる決戦に向けて、準備を進めてるのは星徒会だけじゃないってこと」
line = "「来たる決戦に向けて、準備を進めてるのは星徒会だけじゃないってこと」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「公安委員会としても、九浄家としても、最終決戦に向けて準備していたことが形になりそうなんだよ」
line = "「公安委員会としても、九浄家としても、最終決戦に向けて準備していたことが形になりそうなんだよ」"

[[dialogue]]
speaker = "クロト"
# 「ヘレナちゃんが絡んでるってことは、まさか……」
line = "「ヘレナちゃんが絡んでるってことは、まさか……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「人工戦闘服の数もかなり増えてきたし、コア技術はセナリィのおかげでデータも集まってきたみたいだからね」
line = "「人工戦闘服の数もかなり増えてきたし、コア技術はセナリィのおかげでデータも集まってきたみたいだからね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もうすぐ見せられると思うよ、人工戦闘服の到達点ってやつ♪」
line = "「もうすぐ見せられると思うよ、人工戦闘服の到達点ってやつ♪」"

[[dialogue]]
speaker = "クロト"
# 「……！！」
line = "「……！！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そんじゃま、私は急いで魔界へ向かうとするよ。交渉の時間は足りないくらいだしね」
line = "「そんじゃま、私は急いで魔界へ向かうとするよ。交渉の時間は足りないくらいだしね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「頑張ってくるから、吉報を待っててよね～♪」
line = "「頑張ってくるから、吉報を待っててよね～♪」"

[[dialogue]]
speaker = "unk"
# マインも煌嶺も、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との戦いに『圧勝』があり得る、という立場を決して崩さなかった。
line = "マインも煌嶺も、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との戦いに『圧勝』があり得る、という立場を決して崩さなかった。"

[[dialogue]]
speaker = "unk"
# 『神』と呼ばれる存在に、俺たち物質世界に生きる者の力が届きうるのか。そもそも俺たちは『蹂躙される側』ではないのか？
line = "『神』と呼ばれる存在に、俺たち物質世界に生きる者の力が届きうるのか。そもそも俺たちは『蹂躙される側』ではないのか？"

[[dialogue]]
speaker = "unk"
# その疑念がぬぐえないことくらい、彼女たちは十分理解している。
line = "その疑念がぬぐえないことくらい、彼女たちは十分理解している。"

[[dialogue]]
speaker = "unk"
# それでも、誰も喪わない可能性にかけて、やれることをすべてやらなければ──
line = "それでも、誰も喪わない可能性にかけて、やれることをすべてやらなければ──"

[[dialogue]]
speaker = "unk"
# そうして日が暮れた頃──俺とヴィーナスだけになった星徒会室へ、マトイとグレイスがやってきた。
line = "そうして日が暮れた頃──俺とヴィーナスだけになった星徒会室へ、マトイとグレイスがやってきた。"

[[dialogue]]
speaker = "グレイス"
# 「お邪魔します！」
line = "「お邪魔します！」"

[[dialogue]]
speaker = "マトイ"
# 「さ、最後にうちの星徒会も見てみたいって……ごめんヴィーナス。今日はもう帰っていい……？」
line = "「さ、最後にうちの星徒会も見てみたいって……ごめんヴィーナス。今日はもう帰っていい……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイがボロボロだわ！？」
line = "「マトイがボロボロだわ！？」"

[[dialogue]]
speaker = "クロト"
# 「あとは俺とヴィーナスが引き継ぐよ。本当にお疲れ様……」
line = "「あとは俺とヴィーナスが引き継ぐよ。本当にお疲れ様……」"

[[dialogue]]
speaker = "マトイ"
# 「ありがとう……それじゃ、帰るね～……」
line = "「ありがとう……それじゃ、帰るね～……」"

[[dialogue]]
speaker = "グレイス"
# 「ふむふむ……ここが新星学園の星徒会室なんですね！」
line = "「ふむふむ……ここが新星学園の星徒会室なんですね！」"

[[dialogue]]
speaker = "クロト"
# 「グレイス、アルタイルの世界はどうだった？」
line = "「グレイス、アルタイルの世界はどうだった？」"

[[dialogue]]
speaker = "グレイス"
# 「とても<b>懐かしくて</b>、面白いです！　今日もたくさん遊びに行きました！」
line = "「とても<b>懐かしくて</b>、面白いです！　今日もたくさん遊びに行きました！」"

[[dialogue]]
speaker = "unk"
# 新鮮ではなく、懐かしい──それもそうか。彼女にとっては、かつての故郷を訪れているのだから。
line = "新鮮ではなく、懐かしい──それもそうか。彼女にとっては、かつての故郷を訪れているのだから。"

[[dialogue]]
speaker = "グレイス"
# 「それにしても……う～ん。ヴィーナスさんって本当に似ていますね！」
line = "「それにしても……う～ん。ヴィーナスさんって本当に似ていますね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「似てるって誰に？」
line = "「似てるって誰に？」"

[[dialogue]]
speaker = "グレイス"
# 「デネブにいた九浄テルルさんにです！　本当に、双子みたいにそっくりです」
line = "「デネブにいた九浄テルルさんにです！　本当に、双子みたいにそっくりです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ママに！？」
line = "「ママに！？」"

[[dialogue]]
speaker = "グレイス"
# 「まま？」
line = "「まま？」"

[[dialogue]]
speaker = "クロト"
# 「デネブの俺と会ったことがあるって言ってたけど……グレイスは他の星徒会メンバーにも会ったことがあるのか？」
line = "「デネブの俺と会ったことがあるって言ってたけど……グレイスは他の星徒会メンバーにも会ったことがあるのか？」"

[[dialogue]]
speaker = "グレイス"
# 「はい。マトイさんも、サーシャさんも、アナさんも……みなさんとお話したことがありますよ」
line = "「はい。マトイさんも、サーシャさんも、アナさんも……みなさんとお話したことがありますよ」"

[[dialogue]]
speaker = "グレイス"
# 「私にとっては、もう１０年以上も前のことですけど……」
line = "「私にとっては、もう１０年以上も前のことですけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「昔の話、聞きたいわ！　ママのこと、たくさん教えて！」
line = "「昔の話、聞きたいわ！　ママのこと、たくさん教えて！」"

[[dialogue]]
speaker = "グレイス"
# 「えっと～……あの、『まま』って一体どういうことなんです……？」
line = "「えっと～……あの、『まま』って一体どういうことなんです……？」"

[[dialogue]]
speaker = "unk"
# 首をかしげるグレイスだったが、ヴィーナスの懇願に押し切られて、１０年以上前のことを話し始めるのだった──
line = "首をかしげるグレイスだったが、ヴィーナスの懇願に押し切られて、１０年以上前のことを話し始めるのだった──"
