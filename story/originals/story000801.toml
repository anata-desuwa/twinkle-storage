[[dialogue]]
speaker = "パルミエ"
# 「あ～ん、またやられちゃったわ～。やっぱり編成から見直すべきなのかしら～？」
line = "「あ～ん、またやられちゃったわ～。やっぱり編成から見直すべきなのかしら～？」"

[[dialogue]]
speaker = "シフォン"
# 「ちょっとパルミエ。いくら暇だからって部室でゲームしないでくださいよ。そんなにグータラしてるから依頼の１つも来ないんじゃないですか」
line = "「ちょっとパルミエ。いくら暇だからって部室でゲームしないでくださいよ。そんなにグータラしてるから依頼の１つも来ないんじゃないですか」"

[[dialogue]]
speaker = "モナカ"
# 「あはは……。でも本当に全然依頼来ないね……。みんなにお悩みがないことはいいことなんだけど……」
line = "「あはは……。でも本当に全然依頼来ないね……。みんなにお悩みがないことはいいことなんだけど……」"

[[dialogue]]
speaker = "シフォン"
# 「やっぱり『おなか部』って名前が悪いんですよ。変に略さず『お悩み解決倶楽部』って名乗るべきなんです」
line = "「やっぱり『おなか部』って名前が悪いんですよ。変に略さず『お悩み解決倶楽部』って名乗るべきなんです」"

[[dialogue]]
speaker = "パルミエ"
# 「嫌よ～。そんなことしてたくさん相談が来ちゃったら面倒じゃな～い」
line = "「嫌よ～。そんなことしてたくさん相談が来ちゃったら面倒じゃな～い」"

[[dialogue]]
speaker = "シフォン"
# 「みんなのお悩みを解決するためにこの部を作ったんですよね！？」
line = "「みんなのお悩みを解決するためにこの部を作ったんですよね！？」"

[[dialogue]]
speaker = "モナカ"
# 「あっ……見て見て。いつの間にかポストにお手紙が届いてるよ？　ええと『この宿題を代わりにやって欲しい』。上級生の範囲だけど、よーし……」
line = "「あっ……見て見て。いつの間にかポストにお手紙が届いてるよ？　ええと『この宿題を代わりにやって欲しい』。上級生の範囲だけど、よーし……」"

[[dialogue]]
speaker = "シフォン"
# 「ダメですよ、モナカ！　そんな依頼は依頼じゃありません！　丁重にお断りしちゃってください！」
line = "「ダメですよ、モナカ！　そんな依頼は依頼じゃありません！　丁重にお断りしちゃってください！」"

[[dialogue]]
speaker = "モナカ"
# 「で、でもでも。何か宿題ができない事情があるのかもしれないし。せっかくモナカたちを頼ってくれたんだから……」
line = "「で、でもでも。何か宿題ができない事情があるのかもしれないし。せっかくモナカたちを頼ってくれたんだから……」"

[[dialogue]]
speaker = "パルミエ"
# 「モナカの言う通りよ～。ということでシフォン、モナカ、宿題の代筆お願いね～。明日提出のやつだから今日中にお願いするわ～」
line = "「モナカの言う通りよ～。ということでシフォン、モナカ、宿題の代筆お願いね～。明日提出のやつだから今日中にお願いするわ～」"

[[dialogue]]
speaker = "シフォン"
# 「手紙の主はあなたですか！？　自分のことは自分でやってください！」
line = "「手紙の主はあなたですか！？　自分のことは自分でやってください！」"

[[dialogue]]
speaker = "パルミエ"
# 「いいじゃな～い。どうせ何もやることなくて暇なんだし。宿題くらい代わりにやってくれたら♪」
line = "「いいじゃな～い。どうせ何もやることなくて暇なんだし。宿題くらい代わりにやってくれたら♪」"

[[dialogue]]
speaker = "シフォン"
# 「こ、このグータラ女は……！」
line = "「こ、このグータラ女は……！」"

[[dialogue]]
speaker = "モナカ"
# 「あ……。このアラート……」
line = "「あ……。このアラート……」"

[[dialogue]]
speaker = "シフォン"
# 「どうやらまた街のどこかにアステラが出現したみたいですね……」
line = "「どうやらまた街のどこかにアステラが出現したみたいですね……」"

[[dialogue]]
speaker = "パルミエ"
# 「最近多いわね～？　プリマステラの人たちも大変だわ～」
line = "「最近多いわね～？　プリマステラの人たちも大変だわ～」"

[[dialogue]]
speaker = "シフォン"
# 「歯がゆいです……。こうしてアラートを聞いているのに何もできないなんて……」
line = "「歯がゆいです……。こうしてアラートを聞いているのに何もできないなんて……」"

[[dialogue]]
speaker = "モナカ"
# 「今もモンスターに襲われて困ってる人がいるかもしれないのにね……」
line = "「今もモンスターに襲われて困ってる人がいるかもしれないのにね……」"

[[dialogue]]
speaker = "シフォン"
# 「そういえばモナカ、先日のプリマステラ昇格試験はどうでした？　私は、その……また落ちてしまいましたが」
line = "「そういえばモナカ、先日のプリマステラ昇格試験はどうでした？　私は、その……また落ちてしまいましたが」"

[[dialogue]]
speaker = "モナカ"
# 「あ、えっと……。モナカ、落ちこぼれだから……」
line = "「あ、えっと……。モナカ、落ちこぼれだから……」"

[[dialogue]]
speaker = "パルミエ"
# 「こーら。２人ともなんて暗い顔しちゃってるの。せっかくの可愛い顔が台無しよ～？」
line = "「こーら。２人ともなんて暗い顔しちゃってるの。せっかくの可愛い顔が台無しよ～？」"

[[dialogue]]
speaker = "パルミエ"
# 「心配しなくても２人ならすぐにプリマステラになれるわ。きっと今にチャンスが訪れるわよ♪」
line = "「心配しなくても２人ならすぐにプリマステラになれるわ。きっと今にチャンスが訪れるわよ♪」"

[[dialogue]]
speaker = "パルミエ"
# 「モナカとシフォンの努力は私が一番わかってるから。諦めずに何度でも挑戦してみなさい？」
line = "「モナカとシフォンの努力は私が一番わかってるから。諦めずに何度でも挑戦してみなさい？」"

[[dialogue]]
speaker = "モナカ"
# 「パルちゃん……。うんっ、モナカ、頑張るねっ……！」
line = "「パルちゃん……。うんっ、モナカ、頑張るねっ……！」"

[[dialogue]]
speaker = "シフォン"
# 「まったくもうパルミエは……。いつも唐突にお姉さんぶるんですから……」
line = "「まったくもうパルミエは……。いつも唐突にお姉さんぶるんですから……」"

[[dialogue]]
speaker = "パルミエ"
# 「ふふふ、やる気出てきた？　なら、もぐもぐ、私の宿題はお願いするわね♪」
line = "「ふふふ、やる気出てきた？　なら、もぐもぐ、私の宿題はお願いするわね♪」"

[[dialogue]]
speaker = "シフォン"
# 「ですから宿題は自分で──……って、なんですかその高そうなお菓子！　もしやまた部費を勝手に使い込んだんじゃないでしょうね？」
line = "「ですから宿題は自分で──……って、なんですかその高そうなお菓子！　もしやまた部費を勝手に使い込んだんじゃないでしょうね？」"

[[dialogue]]
speaker = "パルミエ"
# 「違うわよ～。ここに置いてあったの。シフォンが買ってきてくれたんじゃないの？」
line = "「違うわよ～。ここに置いてあったの。シフォンが買ってきてくれたんじゃないの？」"

[[dialogue]]
speaker = "シフォン"
# 「私はそんな無駄遣いしませんよ。モナカのじゃないんですか？」
line = "「私はそんな無駄遣いしませんよ。モナカのじゃないんですか？」"

[[dialogue]]
speaker = "モナカ"
# 「モナカもお菓子なんて買ってきてないよ……？」
line = "「モナカもお菓子なんて買ってきてないよ……？」"

[[dialogue]]
speaker = "パルミエ"
# 「ならきっと可愛い私への貢ぎ物ね♪　はぁ、やっぱり私って罪作りな女だわ～」
line = "「ならきっと可愛い私への貢ぎ物ね♪　はぁ、やっぱり私って罪作りな女だわ～」"

[[dialogue]]
speaker = "シフォン"
# 「寝言は寝て言ってください。というか１人で食べずにみんなで分けて──」
line = "「寝言は寝て言ってください。というか１人で食べずにみんなで分けて──」"

[[dialogue]]
speaker = "ヴィーナス"
# 『あ～、マイクテスマイクテス。生徒の呼び出しを行うわ』
line = "『あ～、マイクテスマイクテス。生徒の呼び出しを行うわ』"

[[dialogue]]
speaker = "モナカ"
# 「あれ？　何かあったのかなぁ？」
line = "「あれ？　何かあったのかなぁ？」"

[[dialogue]]
speaker = "パルミエ"
# 「来たわね来たわね。これを待ってたのよ」
line = "「来たわね来たわね。これを待ってたのよ」"

[[dialogue]]
speaker = "シフォン"
# 「はい？　どういう意味です？」
line = "「はい？　どういう意味です？」"

[[dialogue]]
speaker = "パルミエ"
# 「ゲームの話よ～。ようやく……よしっ、勝てなかったボスに勝てそうなの♪　やっぱり編成が悪かったわね♪」
line = "「ゲームの話よ～。ようやく……よしっ、勝てなかったボスに勝てそうなの♪　やっぱり編成が悪かったわね♪」"

[[dialogue]]
speaker = "シフォン"
# 「はぁ……ホントこのグータラ女は」
line = "「はぁ……ホントこのグータラ女は」"

[[dialogue]]
speaker = "ヴィーナス"
# 『お悩み解決倶楽部一同、今すぐ星徒会室まで来てちょうだい。繰り返すわよ。お悩み解決部一同、今すぐ星徒会室まで──』
line = "『お悩み解決倶楽部一同、今すぐ星徒会室まで来てちょうだい。繰り返すわよ。お悩み解決部一同、今すぐ星徒会室まで──』"

[[dialogue]]
speaker = "モナカ"
# 「えっ……！？　お悩み解決倶楽部一同って、モナカたちのことじゃ……」
line = "「えっ……！？　お悩み解決倶楽部一同って、モナカたちのことじゃ……」"

[[dialogue]]
speaker = "シフォン"
# 「ちょっとパルミエ……！　一体何をやらかしたんですかっ！？　今度は人様にどんな迷惑をかけたんですっ！？」
line = "「ちょっとパルミエ……！　一体何をやらかしたんですかっ！？　今度は人様にどんな迷惑をかけたんですっ！？」"

[[dialogue]]
speaker = "パルミエ"
# 「失礼ね、何もやってないわよ～。シフォンは私のことなんだと思ってるの～」
line = "「失礼ね、何もやってないわよ～。シフォンは私のことなんだと思ってるの～」"

[[dialogue]]
speaker = "モナカ"
# 「あぅ、モナカたち、何かしちゃったのかな……。ここ最近は依頼もなかったはずなのに……」
line = "「あぅ、モナカたち、何かしちゃったのかな……。ここ最近は依頼もなかったはずなのに……」"

[[dialogue]]
speaker = "シフォン"
# 「まさか実績がなさすぎて廃部勧告とか……！？　とにかく行きましょう！　待たせた分だけ心証が悪くなります……！」
line = "「まさか実績がなさすぎて廃部勧告とか……！？　とにかく行きましょう！　待たせた分だけ心証が悪くなります……！」"

[[dialogue]]
speaker = "パルミエ"
# 「行ってらっしゃーい。私は日課の日光浴で忙しいから～」
line = "「行ってらっしゃーい。私は日課の日光浴で忙しいから～」"

[[dialogue]]
speaker = "シフォン"
# 「あなたも行くんですよ、あなたも！　おなか部存続の危機かもしれないんですから！」
line = "「あなたも行くんですよ、あなたも！　おなか部存続の危機かもしれないんですから！」"

[[dialogue]]
speaker = "パルミエ"
# 「やーん。引っ張らないでよ～」
line = "「やーん。引っ張らないでよ～」"
