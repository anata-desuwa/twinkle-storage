[[dialogue]]
speaker = "unk"
# 時刻がちょうど正午を回った頃、事件は起きた。
line = "時刻がちょうど正午を回った頃、事件は起きた。"

[[dialogue]]
speaker = "unk"
# リゾート結界に来ていた女の子たちが、悲鳴を上げる。
line = "リゾート結界に来ていた女の子たちが、悲鳴を上げる。"

[[dialogue]]
speaker = "ヤハト"
# 「全員動くな！　動けば殺す！！」
line = "「全員動くな！　動けば殺す！！」"

[[dialogue]]
speaker = "unk"
# 突如としてビーチに出現したのは、無数の怪人たちであった。
line = "突如としてビーチに出現したのは、無数の怪人たちであった。"

[[dialogue]]
speaker = "リノ"
# 「これがミュータント……！」
line = "「これがミュータント……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これまた、すごい団体さんのお出ましだね～……」
line = "「これまた、すごい団体さんのお出ましだね～……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ついに現れたか。ユゴス」
line = "「ついに現れたか。ユゴス」"

[[dialogue]]
speaker = "ヤハト"
# 「ククッ……久しいな、リコリンフィア。俺が誰だか分かるか？」
line = "「ククッ……久しいな、リコリンフィア。俺が誰だか分かるか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ああ。その声、忘れもしない。私が１４年前に捕まえ損ねたユゴス幹部……国際指名手配犯、異東ヤハトだな」
line = "「ああ。その声、忘れもしない。私が１４年前に捕まえ損ねたユゴス幹部……国際指名手配犯、異東ヤハトだな」"

[[dialogue]]
speaker = "ヤハト"
# 「俺も１度たりとも、忘れたことはない――」
line = "「俺も１度たりとも、忘れたことはない――」"

[[dialogue]]
speaker = "ヤハト"
# 「貴様に日本支部を１度壊滅させられ、屈辱を味わう羽目になった、あの日からなぁ！！」
line = "「貴様に日本支部を１度壊滅させられ、屈辱を味わう羽目になった、あの日からなぁ！！」"

[[dialogue]]
speaker = "ヤハト"
# 「お前ならどうせ、こちらの目的は見抜いているんだろう？」
line = "「お前ならどうせ、こちらの目的は見抜いているんだろう？」"

[[dialogue]]
speaker = "ヤハト"
# 「大人しく――緋宮クロトの身柄を引き渡せ」
line = "「大人しく――緋宮クロトの身柄を引き渡せ」"

[[dialogue]]
speaker = "unk"
# ――俺は初日の夜、リコさんに呼び出された時のことを思い出していた。
line = "――俺は初日の夜、リコさんに呼び出された時のことを思い出していた。"

[[dialogue]]
speaker = "リコリンフィア"
# 「来たな、少年」
line = "「来たな、少年」"

[[dialogue]]
speaker = "リコリンフィア"
# 「言っていた通り、事前に敵が何者なのか、その目的について話しておこう」
line = "「言っていた通り、事前に敵が何者なのか、その目的について話しておこう」"

[[dialogue]]
speaker = "リコリンフィア"
# 「敵は、遥か昔より存在し、裏から世界を操ろうと蠢き続ける、星術犯罪組織『ユゴス』」
line = "「敵は、遥か昔より存在し、裏から世界を操ろうと蠢き続ける、星術犯罪組織『ユゴス』」"

[[dialogue]]
speaker = "リコリンフィア"
# 「連中の狙いは……少年。魔王であるキミを拉致することだ」
line = "「連中の狙いは……少年。魔王であるキミを拉致することだ」"

[[dialogue]]
speaker = "unk"
# 俺が目的……！？
line = "俺が目的……！？"

[[dialogue]]
speaker = "リコリンフィア"
# 「ユゴスは昔から、世界を操れる『力』を求め続けてきた。金、権力、星力……」
line = "「ユゴスは昔から、世界を操れる『力』を求め続けてきた。金、権力、星力……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「故に、連中は少年に目を付けた。リクリエを１度退けてみせた魔王の力、更にはその体の中に封じ込められたリクリエの力に」
line = "「故に、連中は少年に目を付けた。リクリエを１度退けてみせた魔王の力、更にはその体の中に封じ込められたリクリエの力に」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ユゴスは今回、キミを拉致し、新たな力を手に入れる為の実験体にしようとしている」
line = "「ユゴスは今回、キミを拉致し、新たな力を手に入れる為の実験体にしようとしている」"

[[dialogue]]
speaker = "リコリンフィア"
# 「少年は現在、魔王の力が引き出せない不完全な状態だと聞いている。故に拉致するなら今が好機と判断したのだろう」
line = "「少年は現在、魔王の力が引き出せない不完全な状態だと聞いている。故に拉致するなら今が好機と判断したのだろう」"

[[dialogue]]
speaker = "リコリンフィア"
# 「連中はキミがこれまでも公安委員会に密かに協力してきて、事件捜査に加わっていたことを知っている」
line = "「連中はキミがこれまでも公安委員会に密かに協力してきて、事件捜査に加わっていたことを知っている」"

[[dialogue]]
speaker = "リコリンフィア"
# 「つまり、リゾート結界でヴェノマイザーの受け渡しが行われているという噂は、少年をおびき出す為の<b>ブラフ</b>だったというわけだ」
line = "「つまり、リゾート結界でヴェノマイザーの受け渡しが行われているという噂は、少年をおびき出す為の<b>ブラフ</b>だったというわけだ」"

[[dialogue]]
speaker = "unk"
# 俺の身柄を要求する怪人に対し、リコさんは強い視線を向ける。
line = "俺の身柄を要求する怪人に対し、リコさんは強い視線を向ける。"

[[dialogue]]
speaker = "リコリンフィア"
# 「悪いが、少年の存在は学園――いや、三界における対リクリエの生命線だ。渡すわけにはいかない」
line = "「悪いが、少年の存在は学園――いや、三界における対リクリエの生命線だ。渡すわけにはいかない」"

[[dialogue]]
speaker = "ヤハト"
# 「そうだろうな。しかし、それが分かっていながら備えが甘かったな、リコリンフィア」
line = "「そうだろうな。しかし、それが分かっていながら備えが甘かったな、リコリンフィア」"

[[dialogue]]
speaker = "ヤハト"
# 「今の俺は、１４年前とは比べ物にならない力を手に入れている！　こうしてミュータントに変身することで、『空間操作』という新しい能力を得ているんだよ！！」
line = "「今の俺は、１４年前とは比べ物にならない力を手に入れている！　こうしてミュータントに変身することで、『空間操作』という新しい能力を得ているんだよ！！」"

[[dialogue]]
speaker = "ヤハト"
# 「その能力を使って空間転移を行えば、こうして１００体以上の軍勢を敵地に一瞬で送り込むことができるというわけだ！」
line = "「その能力を使って空間転移を行えば、こうして１００体以上の軍勢を敵地に一瞬で送り込むことができるというわけだ！」"

[[dialogue]]
speaker = "ヤハト"
# 「つまり、貴様ら公安委員会が、少数でこそこそボディーガードしていたところで無意味！　多勢に無勢というやつだ！！」
line = "「つまり、貴様ら公安委員会が、少数でこそこそボディーガードしていたところで無意味！　多勢に無勢というやつだ！！」"

[[dialogue]]
speaker = "ヤハト"
# 「――ああ、ちなみに言っておくが、緋宮リノ。貴様が『空間魔法』を操る魔女であるということは、ちゃんと調査済みだぞ？」
line = "「――ああ、ちなみに言っておくが、緋宮リノ。貴様が『空間魔法』を操る魔女であるということは、ちゃんと調査済みだぞ？」"

[[dialogue]]
speaker = "リノ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ヤハト"
# 「ククッ……馬鹿め。同じ空間に干渉できる能力持ちを警戒しないとでも思ったか？」
line = "「ククッ……馬鹿め。同じ空間に干渉できる能力持ちを警戒しないとでも思ったか？」"

[[dialogue]]
speaker = "ヤハト"
# 「ここへ侵入すると同時に、内側から転移魔法で逃げられないように、空間の境界を歪めてある」
line = "「ここへ侵入すると同時に、内側から転移魔法で逃げられないように、空間の境界を歪めてある」"

[[dialogue]]
speaker = "ヤハト"
# 「つまりは今、貴様たちは俺の作った『鳥籠の中の鳥』というわけだ！　ハハハハハハッ！！！」
line = "「つまりは今、貴様たちは俺の作った『鳥籠の中の鳥』というわけだ！　ハハハハハハッ！！！」"

[[dialogue]]
speaker = "ヤハト"
# 「それと、わかっていると思うが、ここにいる一般人も大勢含めてな！　こいつらは人質だ！　貴様らが抵抗するなら、容赦なく殺す！！」
line = "「それと、わかっていると思うが、ここにいる一般人も大勢含めてな！　こいつらは人質だ！　貴様らが抵抗するなら、容赦なく殺す！！」"

[[dialogue]]
speaker = "ヤハト"
# 「まぁ、抵抗しようとしまいと、リコリンフィア！　貴様ら目障りな公安委員会の連中はここで始末させて貰うがな！！　ハハハハハッ！！！」
line = "「まぁ、抵抗しようとしまいと、リコリンフィア！　貴様ら目障りな公安委員会の連中はここで始末させて貰うがな！！　ハハハハハッ！！！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「……異東。やはりお前は、厄介な奴だ。目的の為なら、どんな手段も厭わない。そうして、１４年前も逃げ切ってみせた」
line = "「……異東。やはりお前は、厄介な奴だ。目的の為なら、どんな手段も厭わない。そうして、１４年前も逃げ切ってみせた」"

[[dialogue]]
speaker = "リコリンフィア"
# 「だが、それも今日までだ」
line = "「だが、それも今日までだ」"

[[dialogue]]
speaker = "ヤハト"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お前が気づかなかったことが２つある」
line = "「お前が気づかなかったことが２つある」"

[[dialogue]]
speaker = "リコリンフィア"
# 「１つは、リゾート結界が２種類存在しているということだ」
line = "「１つは、リゾート結界が２種類存在しているということだ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「一般人が出入りするパブリックビーチ。それに、学園の星徒会メンバーを含む、一部の生徒しか存在を知らないプライベートビーチ」
line = "「一般人が出入りするパブリックビーチ。それに、学園の星徒会メンバーを含む、一部の生徒しか存在を知らないプライベートビーチ」"

[[dialogue]]
speaker = "ヤハト"
# 「ふん、俺がそれを知らないとでも思ったか？」
line = "「ふん、俺がそれを知らないとでも思ったか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「いや、知っているだろうと思っていたさ。だが、情報は調べていても、中がどんなところなのかまでは確認していなかった。違うか？」
line = "「いや、知っているだろうと思っていたさ。だが、情報は調べていても、中がどんなところなのかまでは確認していなかった。違うか？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「それはおそらく、お前の空間転移は１度行ったことのある場所でないとできないからだ。その証拠に――」
line = "「それはおそらく、お前の空間転移は１度行ったことのある場所でないとできないからだ。その証拠に――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「ここが<b>プライベート</b>ビーチの方であることに、今も気づいていない」
line = "「ここが<b>プライベート</b>ビーチの方であることに、今も気づいていない」"

[[dialogue]]
speaker = "ヤハト"
# 「は……？　何を言っている？　一般人がこんなにも大勢いるのに……」
line = "「は……？　何を言っている？　一般人がこんなにも大勢いるのに……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「本当に一般人か、ちゃんと確かめたのか？」
line = "「本当に一般人か、ちゃんと確かめたのか？」"

[[dialogue]]
speaker = "部下の怪人"
# 「がっ……！？」
line = "「がっ……！？」"

[[dialogue]]
speaker = "unk"
# 突然、怪人の１体が倒れる。
line = "突然、怪人の１体が倒れる。"

[[dialogue]]
speaker = "unk"
# その背後に立っていたのは――
line = "その背後に立っていたのは――"

[[dialogue]]
speaker = "せつな"
# 「にんにん♪　切り捨て御免でござる！」
line = "「にんにん♪　切り捨て御免でござる！」"

[[dialogue]]
speaker = "ヤハト"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "部下の怪人"
# 「ぎゃっ！？」
line = "「ぎゃっ！？」"

[[dialogue]]
speaker = "部下の怪人"
# 「ぐあぁっ！」
line = "「ぐあぁっ！」"

[[dialogue]]
speaker = "セナリィ"
# 「悪・即・善。２体頂きですわ♪」
line = "「悪・即・善。２体頂きですわ♪」"

[[dialogue]]
speaker = "部下の怪人"
# 「かはっ……！？」
line = "「かはっ……！？」"

[[dialogue]]
speaker = "シアン"
# 「よぉ、異東。海外では世話になったな。借りを返しに来たぜ」
line = "「よぉ、異東。海外では世話になったな。借りを返しに来たぜ」"

[[dialogue]]
speaker = "ヤハト"
# 「貴様、<ruby=ハウンドドッグ>猟犬</ruby>……！」
line = "「貴様、<ruby>猟犬<rt>ハウンドドッグ</rt></ruby>……！」"

[[dialogue]]
speaker = "ヤハト"
# 「まさか、ここにいる連中は全員……！？」
line = "「まさか、ここにいる連中は全員……！？」"

[[dialogue]]
speaker = "unk"
# そう。このビーチにいる水着の人たちは全員、一般人などではなく――
line = "そう。このビーチにいる水着の人たちは全員、一般人などではなく――"

[[dialogue]]
speaker = "リコリンフィア"
# 「そう――」
line = "「そう――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「公安委員会のエージェント、総員集結だ」
line = "「公安委員会のエージェント、総員集結だ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　そういうこと☆」
line = "「にひひ♪　そういうこと☆」"

[[dialogue]]
speaker = "unk"
# 一般人に偽装していた公安委員会のエージェント達。
line = "一般人に偽装していた公安委員会のエージェント達。"

[[dialogue]]
speaker = "unk"
# 俺の知らないメンバーも含め、その全員が戦闘フォームに変身し、一斉にミュータントたちへと武器を構えるのだった――
line = "俺の知らないメンバーも含め、その全員が戦闘フォームに変身し、一斉にミュータントたちへと武器を構えるのだった――"
