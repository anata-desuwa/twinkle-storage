[[dialogue]]
speaker = "unk"
# 第４話,密着、魔王ちゃん研究,P
line = "第４話,密着、魔王ちゃん研究,P"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ここが今日からアタシのお世話になるお家……よろしくお願いしまーす♪」
line = "「ここが今日からアタシのお世話になるお家……よろしくお願いしまーす♪」"

[[dialogue]]
speaker = "unk"
# 何故そんなことになっちゃってるの？
line = "何故そんなことになっちゃってるの？"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「そろそろ本格的に魔王ちゃんのことを研究したいと思ったからなんだよね」
line = "「そろそろ本格的に魔王ちゃんのことを研究したいと思ったからなんだよね」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「その為にネビュラの基地にキミを連れ込みたかったんだけど、ウェンディが口うるさいから」
line = "「その為にネビュラの基地にキミを連れ込みたかったんだけど、ウェンディが口うるさいから」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「前はお金にうるさいだけだったのに、最近じゃアタシたちの色恋にまで口出ししてくるようになっちゃって」
line = "「前はお金にうるさいだけだったのに、最近じゃアタシたちの色恋にまで口出ししてくるようになっちゃって」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「だから来ちゃった♪　ここに住めば魔王ちゃんとずっと一緒にいられるし、魔王ちゃんの力も研究し放題♪」
line = "「だから来ちゃった♪　ここに住めば魔王ちゃんとずっと一緒にいられるし、魔王ちゃんの力も研究し放題♪」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「あの大魔女のリノさんからお話を聞けるっていうのも魅力的だよね」
line = "「あの大魔女のリノさんからお話を聞けるっていうのも魅力的だよね」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ああ、大丈夫よん。リノさんからはオッケーを貰ってるから」
line = "「ああ、大丈夫よん。リノさんからはオッケーを貰ってるから」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「食洗器の調子が悪くて困ってたみたいだから修理したの。そしたら、ずっと居てもいいわよって」
line = "「食洗器の調子が悪くて困ってたみたいだから修理したの。そしたら、ずっと居てもいいわよって」"

[[dialogue]]
speaker = "unk"
# 簡単過ぎません！？
line = "簡単過ぎません！？"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「キミには初めて会った時から興味津々だったんだ」
line = "「キミには初めて会った時から興味津々だったんだ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「転生の魔法を受けた肉体、３０００年前のリクリエによって失われた力である霊力」
line = "「転生の魔法を受けた肉体、３０００年前のリクリエによって失われた力である霊力」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「話によるとその内側にリクリエという現象さえ呑み込んでしまったというじゃない？」
line = "「話によるとその内側にリクリエという現象さえ呑み込んでしまったというじゃない？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「何から調べようか……色々ありすぎて困ってしまうよ」
line = "「何から調べようか……色々ありすぎて困ってしまうよ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「とりあえず、その辺りに座ってくれたまえ」
line = "「とりあえず、その辺りに座ってくれたまえ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「うんうん、素直で宜しいね。それじゃ、アタシもよっこいしょ、と……」
line = "「うんうん、素直で宜しいね。それじゃ、アタシもよっこいしょ、と……」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「たはは、近い近い♪」
line = "「たはは、近い近い♪」"

[[dialogue]]
speaker = "unk"
# それは俺のセリフ……
line = "それは俺のセリフ……"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「まあまあ、近くに寄ってみなければ分からないこともあるでしょうに」
line = "「まあまあ、近くに寄ってみなければ分からないこともあるでしょうに」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「だからと言って、跨ってくる必要はないだろう、って？」
line = "「だからと言って、跨ってくる必要はないだろう、って？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「分かってないよね、キミは。こうやって密着した方が……嬉しいじゃないか」
line = "「分かってないよね、キミは。こうやって密着した方が……嬉しいじゃないか」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ほら、こうやってぎゅーっ、と……」
line = "「ほら、こうやってぎゅーっ、と……」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「どうだい？　キミは嬉しくないかい？」
line = "「どうだい？　キミは嬉しくないかい？」"

[[dialogue]]
speaker = "unk"
# とっても嬉しいです
line = "とっても嬉しいです"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ならいいよね。よし、このまま研究に入らせてもらうよ」
line = "「ならいいよね。よし、このまま研究に入らせてもらうよ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ほら、アタシによーく顔を見せて……」
line = "「ほら、アタシによーく顔を見せて……」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「こらこら、何を目をそらそうとしてるんだい？」
line = "「こらこら、何を目をそらそうとしてるんだい？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ちゃんとアタシの目を見つめ返してくれないと調べられないだろう」
line = "「ちゃんとアタシの目を見つめ返してくれないと調べられないだろう」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「大胆過ぎて恥ずかしいって？」
line = "「大胆過ぎて恥ずかしいって？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「そんなことを言いながら、キミもずいぶんと大胆なことをしているじゃないか」
line = "「そんなことを言いながら、キミもずいぶんと大胆なことをしているじゃないか」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「アタシの背中に手を回して、離れないようにしっかり抱きしめている」
line = "「アタシの背中に手を回して、離れないようにしっかり抱きしめている」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ああ、構わないよそのままで。好きにしてくれたらいい」
line = "「ああ、構わないよそのままで。好きにしてくれたらいい」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「キミのことを研究している間、暇にさせてしまっては申し訳ないからね」
line = "「キミのことを研究している間、暇にさせてしまっては申し訳ないからね」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「どうぞ、アタシのことを自由にしてくれたまえ……」
line = "「どうぞ、アタシのことを自由にしてくれたまえ……」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ぁう……もう、自由にしていいと言った途端に遠慮がなくなるんだから。そんなに背中を撫でまわされたらくすぐったいよ」
line = "「ぁう……もう、自由にしていいと言った途端に遠慮がなくなるんだから。そんなに背中を撫でまわされたらくすぐったいよ」"

[[dialogue]]
speaker = "unk"
# 集中力乱れちゃう？
line = "集中力乱れちゃう？"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「侮ってもらっては困るよ。その程度で乱れるような集中力はしていないさ」
line = "「侮ってもらっては困るよ。その程度で乱れるような集中力はしていないさ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「好きなだけ味わうといい。でもお返しに、アタシもしばらくこのままたっぷりと、キミのことを研究させてもらうからね♪」
line = "「好きなだけ味わうといい。でもお返しに、アタシもしばらくこのままたっぷりと、キミのことを研究させてもらうからね♪」"
