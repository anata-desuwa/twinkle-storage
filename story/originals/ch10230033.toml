[[dialogue]]
speaker = "unk"
# 第３話,最高のペアリング（前編）,P
line = "第３話,最高のペアリング（前編）,P"

[[dialogue]]
speaker = "シャロン"
# 「会長さまとデートっ、デートっ♪　大好きな人と、大好きなお菓子屋さん巡りだなんて、最高に幸せです」
line = "「会長さまとデートっ、デートっ♪　大好きな人と、大好きなお菓子屋さん巡りだなんて、最高に幸せです」"

[[dialogue]]
speaker = "unk"
# 今日はいっぱい楽しもう
line = "今日はいっぱい楽しもう"

[[dialogue]]
speaker = "シャロン"
# 「はいっ<emoji=heart04>　私、もう喜びで胸がはち切れてしまいそうですっ<emoji=heart04>」
line = "「はいっ<emoji=heart04>　私、もう喜びで胸がはち切れてしまいそうですっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「わぁ、試食やってますよ。美味しそうですねっ」
line = "「わぁ、試食やってますよ。美味しそうですねっ」"

[[dialogue]]
speaker = "unk"
# お酒が入ってるのは控えた方がいいかもね
line = "お酒が入ってるのは控えた方がいいかもね"

[[dialogue]]
speaker = "シャロン"
# 「あっ、そうですね……街中で酔っぱらっちゃったら、大変なことになっちゃいますもんね」
line = "「あっ、そうですね……街中で酔っぱらっちゃったら、大変なことになっちゃいますもんね」"

[[dialogue]]
speaker = "サラン"
# 「あまあまふわふわスイーツ限定販売中で～す。見てってくださ～い」
line = "「あまあまふわふわスイーツ限定販売中で～す。見てってくださ～い」"

[[dialogue]]
speaker = "シャロン"
# 「サランさま、どうしてここにっ！？」
line = "「サランさま、どうしてここにっ！？」"

[[dialogue]]
speaker = "サラン"
# 「あ～、会長ちゃんにシャロンちゃんだ～。このお店にね、サランが監修したスイーツを置かせてもらってるの～。お味見、ひとつどうぞ♪」
line = "「あ～、会長ちゃんにシャロンちゃんだ～。このお店にね、サランが監修したスイーツを置かせてもらってるの～。お味見、ひとつどうぞ♪」"

[[dialogue]]
speaker = "シャロン"
# 「では、失礼して……あむっ、甘くて香ばしくて、とっても美味しいですっ！」
line = "「では、失礼して……あむっ、甘くて香ばしくて、とっても美味しいですっ！」"

[[dialogue]]
speaker = "シャロン"
# 「これはピスタチオのマカロンですか？　試食くらいじゃ物足りないですっ！」
line = "「これはピスタチオのマカロンですか？　試食くらいじゃ物足りないですっ！」"

[[dialogue]]
speaker = "シャロン"
# 「あっ、こっちのも美味しいです。会長さま、いっぱい買っちゃいましょう！　イレーナさまにもおすそ分けしたいですっ」
line = "「あっ、こっちのも美味しいです。会長さま、いっぱい買っちゃいましょう！　イレーナさまにもおすそ分けしたいですっ」"

[[dialogue]]
speaker = "シャロン"
# 「まとめ買いすると、イベントに参加できるそうですよっ！　それなら、たくさん買わなきゃ損ですねっ！」
line = "「まとめ買いすると、イベントに参加できるそうですよっ！　それなら、たくさん買わなきゃ損ですねっ！」"

[[dialogue]]
speaker = "unk"
# イベント？
line = "イベント？"

[[dialogue]]
speaker = "サラン"
# 「そうなの～。いくつか買ってくれたお客様には、オリジナルブレンドティーの茶葉をプレゼント～」
line = "「そうなの～。いくつか買ってくれたお客様には、オリジナルブレンドティーの茶葉をプレゼント～」"

[[dialogue]]
speaker = "サラン"
# 「好きなように調合していいから、自分だけの最高のフードペアリングを見つけてね～」
line = "「好きなように調合していいから、自分だけの最高のフードペアリングを見つけてね～」"

[[dialogue]]
speaker = "シャロン"
# 「ペアリング……ですか？　２人でお揃いの指輪を……？」
line = "「ペアリング……ですか？　２人でお揃いの指輪を……？」"

[[dialogue]]
speaker = "サラン"
# 「ふふふ、そっちのペアリングじゃなくって～。フードとドリンクを組み合わせて～、お互いの味をもっとも～っと美味しくする相性のことだよ～」
line = "「ふふふ、そっちのペアリングじゃなくって～。フードとドリンクを組み合わせて～、お互いの味をもっとも～っと美味しくする相性のことだよ～」"

[[dialogue]]
speaker = "シャロン"
# 「そういう呼び方があるんですね。てっきり婚約指輪みたいなものかと……」
line = "「そういう呼び方があるんですね。てっきり婚約指輪みたいなものかと……」"

[[dialogue]]
speaker = "unk"
# お酒におつまみとか？
line = "お酒におつまみとか？"

[[dialogue]]
speaker = "サラン"
# 「そうそう、そういうのもフードペアリング～。上手に組み合わせると、１＋１が１０にも１００にもなるの～」
line = "「そうそう、そういうのもフードペアリング～。上手に組み合わせると、１＋１が１０にも１００にもなるの～」"

[[dialogue]]
speaker = "シャロン"
# 「面白そうですねっ！　せっかくですし、参加しますっ」
line = "「面白そうですねっ！　せっかくですし、参加しますっ」"

[[dialogue]]
speaker = "シャロン"
# 「……え？　会長さまから私にご提案を？」
line = "「……え？　会長さまから私にご提案を？」"

[[dialogue]]
speaker = "シャロン"
# 「ふむふむ……私と会長さまで、別々にブレンドティーを作る……と」
line = "「ふむふむ……私と会長さまで、別々にブレンドティーを作る……と」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、どっちのブレンドティーがより相性のいい組み合わせなのか、会長さまと勝負ですねっ。負けませんよっ」
line = "「ふふ、どっちのブレンドティーがより相性のいい組み合わせなのか、会長さまと勝負ですねっ。負けませんよっ」"

[[dialogue]]
speaker = "シャロン"
# 「うーん……今日買ったお菓子と合わせるのでしたら……サランさま、どのお紅茶と相性がよろしいですか？」
line = "「うーん……今日買ったお菓子と合わせるのでしたら……サランさま、どのお紅茶と相性がよろしいですか？」"

[[dialogue]]
speaker = "サラン"
# 「えっとね～、サランのマカロンなら～……好みもあるけど、キャンディとかディンブラがオススメかな～。果物系ならニルギリもいいよね～」
line = "「えっとね～、サランのマカロンなら～……好みもあるけど、キャンディとかディンブラがオススメかな～。果物系ならニルギリもいいよね～」"

[[dialogue]]
speaker = "サラン"
# 「ところでシャロンちゃん、会長ちゃんとデート中なの？」
line = "「ところでシャロンちゃん、会長ちゃんとデート中なの？」"

[[dialogue]]
speaker = "シャロン"
# 「はいっ……デ、デートです、えへへ……<emoji=heart04>」
line = "「はいっ……デ、デートです、えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「それならシャロンちゃんと会長ちゃんみたいな相性バッチリの組み合わせを探さないとね～、ふふ♪」
line = "「それならシャロンちゃんと会長ちゃんみたいな相性バッチリの組み合わせを探さないとね～、ふふ♪」"

[[dialogue]]
speaker = "シャロン"
# 「私と会長さまみたいな……えへ……<emoji=heart04>　恐縮です……<emoji=heart04>」
line = "「私と会長さまみたいな……えへ……<emoji=heart04>　恐縮です……<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんはどういう組み合わせがいいの～？　すっきり系～？　まったり系～？」
line = "「会長ちゃんはどういう組み合わせがいいの～？　すっきり系～？　まったり系～？」"

[[dialogue]]
speaker = "unk"
# 質問なんだけど──
line = "質問なんだけど──"

[[dialogue]]
speaker = "サラン"
# 「な～に？　えっ？　カヌレは置いてなかったと思うけど──」
line = "「な～に？　えっ？　カヌレは置いてなかったと思うけど──」"

[[dialogue]]
speaker = "unk"
# かくかくしかじかと、俺の意図を耳打ちでサランに伝える。
line = "かくかくしかじかと、俺の意図を耳打ちでサランに伝える。"

[[dialogue]]
speaker = "サラン"
# 「ふ～ん……なるほどなるほど～。会長ちゃんってばステキ～♪　それならね～、こしょこしょこしょ」
line = "「ふ～ん……なるほどなるほど～。会長ちゃんってばステキ～♪　それならね～、こしょこしょこしょ」"

[[dialogue]]
speaker = "シャロン"
# 「サランさま、ありがとうございました」
line = "「サランさま、ありがとうございました」"

[[dialogue]]
speaker = "サラン"
# 「こちらこそありがとう～♪　ステキなティータイムを楽しんでね～♪」
line = "「こちらこそありがとう～♪　ステキなティータイムを楽しんでね～♪」"

[[dialogue]]
speaker = "unk"
# 笑顔のサランに見送られつつ、焼き菓子とそれぞれが選んだブレンドティーの茶葉を手に、俺たちは店を後にした。
line = "笑顔のサランに見送られつつ、焼き菓子とそれぞれが選んだブレンドティーの茶葉を手に、俺たちは店を後にした。"

[[dialogue]]
speaker = "シャロン"
# 「会長さまがどんなお紅茶にされたのか楽しみです」
line = "「会長さまがどんなお紅茶にされたのか楽しみです」"

[[dialogue]]
speaker = "シャロン"
# 「それにしてもお菓子を買いすぎてしまいましたね。せっかくですし、お紅茶と一緒にゆっくり落ち着けるところで食べたいです……あの、会長さま──」
line = "「それにしてもお菓子を買いすぎてしまいましたね。せっかくですし、お紅茶と一緒にゆっくり落ち着けるところで食べたいです……あの、会長さま──」"

[[dialogue]]
speaker = "unk"
# じゃあウチに来る？
line = "じゃあウチに来る？"

[[dialogue]]
speaker = "シャロン"
# 「っ！　はいっ<emoji=heart04>」
line = "「っ！　はいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 待ち望んでいたようにシャロンが頷く。
line = "待ち望んでいたようにシャロンが頷く。"

[[dialogue]]
speaker = "unk"
# シャロンとふたりきりのティータイムを楽しむため、俺たちは我が家へと足を向けたのだった。
line = "シャロンとふたりきりのティータイムを楽しむため、俺たちは我が家へと足を向けたのだった。"
