[[dialogue]]
speaker = "unk"
# 第２話,魔王ハーレム建造計画,P
line = "第２話,魔王ハーレム建造計画,P"

[[dialogue]]
speaker = "unk"
# ヴィーナスに婚約のための準備がしたい、と話してから少しして。
line = "ヴィーナスに婚約のための準備がしたい、と話してから少しして。"

[[dialogue]]
speaker = "unk"
# 俺はヴィーナスを連れて、九浄家はヘレナちゃんの元を訪れていた。
line = "俺はヴィーナスを連れて、九浄家はヘレナちゃんの元を訪れていた。"

[[dialogue]]
speaker = "unk"
# お義母さん、娘さんを僕にください！！
line = "お義母さん、娘さんを僕にください！！"

[[dialogue]]
speaker = "ヘレナ"
# 「入り婿ということでいいか？」
line = "「入り婿ということでいいか？」"

[[dialogue]]
speaker = "unk"
# 返事が軽い……！
line = "返事が軽い……！"

[[dialogue]]
speaker = "ヘレナ"
# 「養子にしたはいいが、ヴィーナスに九浄家当主が務まるとは思っていなかったのでな。渡りに船というやつだ」
line = "「養子にしたはいいが、ヴィーナスに九浄家当主が務まるとは思っていなかったのでな。渡りに船というやつだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「そもそも魔王、『ください』も何も、お前の娘だろう。義母でしかない私の許可が必要か？」
line = "「そもそも魔王、『ください』も何も、お前の娘だろう。義母でしかない私の許可が必要か？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ……まあ、確かに。ヴィーナスの『九浄家の娘』という立場はそこまで軽いものではない。その配慮は痛み入る」
line = "「ふむ……まあ、確かに。ヴィーナスの『九浄家の娘』という立場はそこまで軽いものではない。その配慮は痛み入る」"

[[dialogue]]
speaker = "unk"
# 九浄家の血が途絶えてしまいますよね？
line = "九浄家の血が途絶えてしまいますよね？"

[[dialogue]]
speaker = "unk"
# ただ養子のヴィーナスと入り婿の子供では
line = "ただ養子のヴィーナスと入り婿の子供では"

[[dialogue]]
speaker = "ヘレナ"
# 「それもそうだなぁ……。正直私はまったく気にしないのだが、先祖に申し訳が立たない、という気持ちがないわけではない」
line = "「それもそうだなぁ……。正直私はまったく気にしないのだが、先祖に申し訳が立たない、という気持ちがないわけではない」"

[[dialogue]]
speaker = "ヘレナ"
# 「そうだ魔王、お前たちの子供と、私の子供を許嫁にしておくのはどうだろうか？」
line = "「そうだ魔王、お前たちの子供と、私の子供を許嫁にしておくのはどうだろうか？」"

[[dialogue]]
speaker = "unk"
# えっ、それはちょっと気が早いのでは……
line = "えっ、それはちょっと気が早いのでは……"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃん、そうは言うけれど、恋人はいるの？」
line = "「ヘレナちゃん、そうは言うけれど、恋人はいるの？」"

[[dialogue]]
speaker = "ヘレナ"
# 「はっはっはっ。居たこともないぞ！」
line = "「はっはっはっ。居たこともないぞ！」"

[[dialogue]]
speaker = "unk"
# ええええっ！？
line = "ええええっ！？"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、旧家名家というのは結婚して子供を作ることも大事な仕事なのだ。それに、自慢ではないが、私は結構モテるのだぞ？」
line = "「なに、旧家名家というのは結婚して子供を作ることも大事な仕事なのだ。それに、自慢ではないが、私は結構モテるのだぞ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うーーん。でも、ヘレナちゃんをどこの馬の骨ともわからないやつに任せるのは嫌よ、私」
line = "「うーーん。でも、ヘレナちゃんをどこの馬の骨ともわからないやつに任せるのは嫌よ、私」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうだ！　私たちの子供じゃなくて、ヘレナちゃんとクロトの子供を次期当主にすればいいんだわ！」
line = "「そうだ！　私たちの子供じゃなくて、ヘレナちゃんとクロトの子供を次期当主にすればいいんだわ！」"

[[dialogue]]
speaker = "unk"
# ！？！？！？！？！？
line = "！？！？！？！？！？"

[[dialogue]]
speaker = "ヘレナ"
# 「おや、いいのか？　ヴィーナス。私としても、魔王が相手であれば申し分ないが」
line = "「おや、いいのか？　ヴィーナス。私としても、魔王が相手であれば申し分ないが」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんも普通に乗ってこない！
line = "ヘレナちゃんも普通に乗ってこない！"

[[dialogue]]
speaker = "ヘレナ"
# 「自分の父親兼恋人を、自分の義理の母親の種馬に推薦する娘、と考えると中々狂気ではあるな？」
line = "「自分の父親兼恋人を、自分の義理の母親の種馬に推薦する娘、と考えると中々狂気ではあるな？」"

[[dialogue]]
speaker = "unk"
# 言い方ぁ！！
line = "言い方ぁ！！"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、将来ここに私の子供とヘレナちゃんの子供がいて、みんなで九浄家を盛り立てていければ、きっと幸せだと思うの！」
line = "「でも、将来ここに私の子供とヘレナちゃんの子供がいて、みんなで九浄家を盛り立てていければ、きっと幸せだと思うの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は私のことをちゃんと愛してくれれば、クロトが他の女の子も愛してても気にならないわよ？」
line = "「私は私のことをちゃんと愛してくれれば、クロトが他の女の子も愛してても気にならないわよ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むしろ最強の魔王なら、それくらいの甲斐性はあってしかるべきなんじゃないかしら！」
line = "「むしろ最強の魔王なら、それくらいの甲斐性はあってしかるべきなんじゃないかしら！」"

[[dialogue]]
speaker = "ヘレナ"
# 「なるほど、一理ある。それならば、近場の土地を買い取って、魔王のためのハーレムでも作ってみるか」
line = "「なるほど、一理ある。それならば、近場の土地を買い取って、魔王のためのハーレムでも作ってみるか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何それ、面白そう！　クロトのことを好きな女の子を集めて、みんなで暮らすのね！？」
line = "「何それ、面白そう！　クロトのことを好きな女の子を集めて、みんなで暮らすのね！？」"

[[dialogue]]
speaker = "unk"
# 待って待って、話が大きくなってる！！
line = "待って待って、話が大きくなってる！！"

[[dialogue]]
speaker = "ヘレナ"
# 「ヴィーナスのことが好きな俺の気持ちも尊重してくれ……だと？　ほほぅ、中々にラブラブだなぁ」
line = "「ヴィーナスのことが好きな俺の気持ちも尊重してくれ……だと？　ほほぅ、中々にラブラブだなぁ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「や、やるわね、クロト……っ。ヘレナちゃんの前でそんな恥ずかしいことを叫ぶなんて、流石の私もちょっとドキっとしちゃったわ！」
line = "「や、やるわね、クロト……っ。ヘレナちゃんの前でそんな恥ずかしいことを叫ぶなんて、流石の私もちょっとドキっとしちゃったわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とはいえ、クロトがヘレナちゃんを孕ませるのが、九浄家のお家問題を解決する一番の解決策であることには変わりないのよね……」
line = "「とはいえ、クロトがヘレナちゃんを孕ませるのが、九浄家のお家問題を解決する一番の解決策であることには変わりないのよね……」"

[[dialogue]]
speaker = "ヘレナ"
# 「王を名乗るのなら、その血統を後世に残すのも大事な仕事だぞ、魔王？」
line = "「王を名乗るのなら、その血統を後世に残すのも大事な仕事だぞ、魔王？」"

[[dialogue]]
speaker = "ヘレナ"
# 「なに？　魔王は人から受け継いだ能力のことで、王を名乗る気はないだと……？」
line = "「なに？　魔王は人から受け継いだ能力のことで、王を名乗る気はないだと……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なーに肝っ玉の小さいこと言ってるの！」
line = "「なーに肝っ玉の小さいこと言ってるの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃんだけじゃなく、クロトのことを好きって思ってる女の子はたくさんいるんだから、ハーレムの１つや２つ、作っちゃいなさいよ！」
line = "「ヘレナちゃんだけじゃなく、クロトのことを好きって思ってる女の子はたくさんいるんだから、ハーレムの１つや２つ、作っちゃいなさいよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトだって、可愛いとか好きって気持ちが、私以外にまったく沸かないわけじゃないでしょう！？」
line = "「クロトだって、可愛いとか好きって気持ちが、私以外にまったく沸かないわけじゃないでしょう！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「絶対にヴィーナスが１番だって気持ちは揺るがないから、他の女の子に申し訳が立たない……？」
line = "「絶対にヴィーナスが１番だって気持ちは揺るがないから、他の女の子に申し訳が立たない……？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほほぉ、これは中々の愛妻家ではないか。かえって私の気持ちの方が盛り上がってきたぞ<emoji=heart04>」
line = "「ほほぉ、これは中々の愛妻家ではないか。かえって私の気持ちの方が盛り上がってきたぞ<emoji=heart04>」"

[[dialogue]]
speaker = "ヘレナ"
# 「もちろん正妻はヴィーナスで構わないが、これだけ愛してもらえるなら、２番目以下でもまったく構わないぞ♪」
line = "「もちろん正妻はヴィーナスで構わないが、これだけ愛してもらえるなら、２番目以下でもまったく構わないぞ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなったら、やっぱりハーレムは必要よね！　ヘレナちゃん、どこか良さそうな土地はあったかしら？」
line = "「そうなったら、やっぱりハーレムは必要よね！　ヘレナちゃん、どこか良さそうな土地はあったかしら？」"

[[dialogue]]
speaker = "unk"
# ハーレム建造だけは諦めて！
line = "ハーレム建造だけは諦めて！"

[[dialogue]]
speaker = "unk"
# だぁー！　とにかく一旦
line = "だぁー！　とにかく一旦"

[[dialogue]]
speaker = "unk"
# その後、必死の説得により、何とか魔王ハーレム建造だけは思い留まらせるのだった。
line = "その後、必死の説得により、何とか魔王ハーレム建造だけは思い留まらせるのだった。"
