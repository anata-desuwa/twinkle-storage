line = "「け、け、結婚生活の予行演習……ですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「うん♪　恋人って結婚する前に同棲するものでしょ？」
line = "「うん♪　恋人って結婚する前に同棲するものでしょ？」"

[[dialogue]]
speaker = "キリカ"
# 「コ、コホン。大変有り難いお申し出ですが、私共には必要ありませんかと。仕事に差し障る可能性もありますので」
line = "「コ、コホン。大変有り難いお申し出ですが、私共には必要ありませんかと。仕事に差し障る可能性もありますので」"

[[dialogue]]
