# 「それに案外、仕事にも身が入るようになるんじゃない？　恋人が一つ屋根の下にいてくれた方が、いつ連絡が届くかどうかキリカも気を揉まずに済むでしょ？」
line = "「それに案外、仕事にも身が入るようになるんじゃない？　恋人が一つ屋根の下にいてくれた方が、いつ連絡が届くかどうかキリカも気を揉まずに済むでしょ？」"

[[dialogue]]
speaker = "キリカ"
# 「私は気など揉んでおりません」
line = "「私は気など揉んでおりません」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、嘘ばっかり。いつも気にしてるくせに。とにかく緋宮会長には私から伝えておくから。キリカは部屋の片付けでもしておきなさい」
line = "「ふふ、嘘ばっかり。いつも気にしてるくせに。とにかく緋宮会長には私から伝えておくから。キリカは部屋の片付けでもしておきなさい」"

[[dialogue]]
speaker = "フィオナ"
