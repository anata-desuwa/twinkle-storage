line = "「キリカも好きな人とイチャイチャできる時間が多い方がいいでしょ？　結婚前に同棲していると離婚率も大幅に下がるらしいしね♪」"

[[dialogue]]
speaker = "キリカ"
# 「……ともかくお嬢様の強い要望で同棲する流れになったのです。私は特段必要性を感じませんでしたが、お嬢様にああも言われては従うほかありませんので」
line = "「……ともかくお嬢様の強い要望で同棲する流れになったのです。私は特段必要性を感じませんでしたが、お嬢様にああも言われては従うほかありませんので」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様にも困ったものです。漫画か何かの影響か、恋人同士は四六時中イチャコラしたがっていると思い込んでおられるようでして」
line = "「お嬢様にも困ったものです。漫画か何かの影響か、恋人同士は四六時中イチャコラしたがっていると思い込んでおられるようでして」"

[[dialogue]]
speaker = "unk"
