# 「だからこその同棲じゃない。実際に一緒に暮らしてみて、自分の生活がどう変化するのか確認してみなくちゃ」
line = "「だからこその同棲じゃない。実際に一緒に暮らしてみて、自分の生活がどう変化するのか確認してみなくちゃ」"

[[dialogue]]
