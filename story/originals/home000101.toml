[[dialogue]]
speaker = "リア"
# 「はじめましての人はこんにちは。お久しぶりの人もいるかも？　流星学園生徒会の九浄リアですっ」
line = "「はじめましての人はこんにちは。お久しぶりの人もいるかも？　流星学園生徒会の九浄リアですっ」"

[[dialogue]]
speaker = "聖沙"
# 「流星生徒会（ふく）会長の聖沙・Ｂ・クリステレスよ。そして私たちは──」
line = "「流星生徒会（ふく）会長の聖沙・Ｂ・クリステレスよ。そして私たちは──」"

[[dialogue]]
speaker = "聖沙"
# 「流星町の平和を守る『流星クルセイダース』の一員なのよ！」
line = "「流星町の平和を守る『流星クルセイダース』の一員なのよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「３０００年前、私たちの世界を救った戦士たちと同じ名前を持っているんですね」
line = "「３０００年前、私たちの世界を救った戦士たちと同じ名前を持っているんですね」"

[[dialogue]]
speaker = "リア"
# 「え～と、みんなは<ruby=スターナイト>星騎士</ruby>っていうんだっけ。星の力で戦うって、なんだかかっこいいな」
line = "「え～と、みんなは<ruby>星騎士<rt>スターナイト</rt></ruby>っていうんだっけ。星の力で戦うって、なんだかかっこいいな」"

[[dialogue]]
speaker = "リア"
# 「ちなみに私たちクルセイダースは、ロザリオに宿った守護天使の力を借りてるんだよ」
line = "「ちなみに私たちクルセイダースは、ロザリオに宿った守護天使の力を借りてるんだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ～、こっちの世界の守護天使は、私たちの世界のとは違うのね。さすがリアさん、物知りだわ」
line = "「へぇ～、こっちの世界の守護天使は、私たちの世界のとは違うのね。さすがリアさん、物知りだわ」"

[[dialogue]]
speaker = "リア"
# 「えっへん。元生徒会長ですから」
line = "「えっへん。元生徒会長ですから」"

[[dialogue]]
speaker = "聖沙"
# 「私たち流星クルセイダースと、あなたたち星騎士が顔を合わせたなら道はひとつ──どちらが強いか、勝負よ！」
line = "「私たち流星クルセイダースと、あなたたち星騎士が顔を合わせたなら道はひとつ──どちらが強いか、勝負よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふっふっふ、受けて立つわ！　星騎士の代表として逃げるわけにはいかないわ！」
line = "「ふっふっふ、受けて立つわ！　星騎士の代表として逃げるわけにはいかないわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさんまで！？」
line = "「ヴィーナスさんまで！？」"

[[dialogue]]
speaker = "パッキー"
# 「おうおう、ヒスは相変わらず血の気が多いな～。バーサーカーかよ」
line = "「おうおう、ヒスは相変わらず血の気が多いな～。バーサーカーかよ」"

[[dialogue]]
speaker = "聖沙"
# 「パッキーさん！　でも私はバーサーカーじゃないわ！」
line = "「パッキーさん！　でも私はバーサーカーじゃないわ！」"

[[dialogue]]
speaker = "リア"
# 「怪我するといけないし、わんこそばとかで勝負すればいいんじゃないかな」
line = "「怪我するといけないし、わんこそばとかで勝負すればいいんじゃないかな」"

[[dialogue]]
speaker = "聖沙"
# 「さすがお姉さま！　じゃあ尋常に……わんこそば勝負よ！」
line = "「さすがお姉さま！　じゃあ尋常に……わんこそば勝負よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、負けないわよ！　フィーニスの塔のようにお椀を積み上げてやるわ！」
line = "「ええ、負けないわよ！　フィーニスの塔のようにお椀を積み上げてやるわ！」"

[[dialogue]]
speaker = "フィオナ"
# 「うーん……わんこそばだとクルセイダースも星騎士も関係ないような……でも平和なのが一番ですね」
line = "「うーん……わんこそばだとクルセイダースも星騎士も関係ないような……でも平和なのが一番ですね」"

[[dialogue]]
speaker = "ルリエル"
# 「ですですっ。わたしたち流星クルセイダースと仲良くしてくださいね、星騎士のみなさん♪」
line = "「ですですっ。わたしたち流星クルセイダースと仲良くしてくださいね、星騎士のみなさん♪」"

[[dialogue]]
speaker = "聖沙"
# 「えっ、あなたは星騎士よね？　クルセイダースじゃないんじゃ……？」
line = "「えっ、あなたは星騎士よね？　クルセイダースじゃないんじゃ……？」"

[[dialogue]]
speaker = "ルリエル"
# 「ええっ、副会長さん、ルリエル・ローゼンクロイツのことを忘れたのですか！？　ひどいですよ～！？」
line = "「ええっ、副会長さん、ルリエル・ローゼンクロイツのことを忘れたのですか！？　ひどいですよ～！？」"

[[dialogue]]
speaker = "聖沙"
# 「いや、ローゼンクロイツはロロットさんの名字で……いったいどういうこと……？」
line = "「いや、ローゼンクロイツはロロットさんの名字で……いったいどういうこと……？」"

[[dialogue]]
speaker = "リア"
# 「どうやらただ事じゃないことが起きる予感……！」
line = "「どうやらただ事じゃないことが起きる予感……！」"

[[dialogue]]
speaker = "リア"
# 「１１月１４日をお楽しみに～♪」
line = "「１１月１４日をお楽しみに～♪」"
