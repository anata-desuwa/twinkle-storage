[[dialogue]]
speaker = "unk"
# 大聖堂の怪盗事件があった、２日後。
line = "大聖堂の怪盗事件があった、２日後。"

[[dialogue]]
speaker = "unk"
# 俺は日常に戻り、星徒会室で書類仕事をしていたのだが――
line = "俺は日常に戻り、星徒会室で書類仕事をしていたのだが――"

[[dialogue]]
speaker = "ミネコ"
# 「やっほ～♪　おはよう、会長♪」
line = "「やっほ～♪　おはよう、会長♪」"

[[dialogue]]
speaker = "unk"
# ミネコ！？
line = "ミネコ！？"

[[dialogue]]
speaker = "unk"
# 以前と変わらぬ、人懐っこい笑顔で現れた彼女に、俺は思わず席から立ち上がる。
line = "以前と変わらぬ、人懐っこい笑顔で現れた彼女に、俺は思わず席から立ち上がる。"

[[dialogue]]
speaker = "ミネコ"
# 「うん。また来ちゃった♪」
line = "「うん。また来ちゃった♪」"

[[dialogue]]
speaker = "unk"
# 昨日、ジュエリーからミネコが欠席して、学園へ来ていないことを伝えられていた。
line = "昨日、ジュエリーからミネコが欠席して、学園へ来ていないことを伝えられていた。"

[[dialogue]]
speaker = "unk"
# それで、俺はもう、ミネコが再び学園に通うことはないのかもと、少し寂しい気持ちになったりもしたのだが……
line = "それで、俺はもう、ミネコが再び学園に通うことはないのかもと、少し寂しい気持ちになったりもしたのだが……"

[[dialogue]]
speaker = "ミネコ"
# 「あはは♪　大聖堂から逃げた後さ～、さすがに私も疲労困憊で、昨日は１日休むことにしたんだよね～」
line = "「あはは♪　大聖堂から逃げた後さ～、さすがに私も疲労困憊で、昨日は１日休むことにしたんだよね～」"

[[dialogue]]
speaker = "ミネコ"
# 「で、休みながら今後のことを色々考えたりもして……決めたんだ」
line = "「で、休みながら今後のことを色々考えたりもして……決めたんだ」"

[[dialogue]]
speaker = "ミネコ"
# 「私、このまましばらく、学園に残ろうと思うの！」
line = "「私、このまましばらく、学園に残ろうと思うの！」"

[[dialogue]]
speaker = "ミネコ"
# 「ジュエリーの話を聞いて、会長にもっと興味が湧いたからね♪」
line = "「ジュエリーの話を聞いて、会長にもっと興味が湧いたからね♪」"

[[dialogue]]
speaker = "unk"
# 俺に……？
line = "俺に……？"

[[dialogue]]
speaker = "ミネコ"
# 「うん♪　ジュエリーの言う『愛』ってやつ、私もちょっと知りたくなっちゃった♪」
line = "「うん♪　ジュエリーの言う『愛』ってやつ、私もちょっと知りたくなっちゃった♪」"

[[dialogue]]
speaker = "ミネコ"
# 「だ・か・ら」
line = "「だ・か・ら」"

[[dialogue]]
speaker = "unk"
# 彼女は猫のようにするりと席を回り込んで俺の前まで来ると、上目遣いで見上げて来て──
line = "彼女は猫のようにするりと席を回り込んで俺の前まで来ると、上目遣いで見上げて来て──"

[[dialogue]]
speaker = "ミネコ"
# 「それなら会長から教わるのが、一番楽しいかな～って♪　ふふっ<emoji=heart04>」
line = "「それなら会長から教わるのが、一番楽しいかな～って♪　ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「無駄だよ、ミネコ」
line = "「無駄だよ、ミネコ」"

[[dialogue]]
speaker = "ミネコ"
# 「おっと、ジュエリー、いつの間に……」
line = "「おっと、ジュエリー、いつの間に……」"

[[dialogue]]
speaker = "ジュエリー"
# 「選星者の能力で、星徒会室に何かが起こりそうな予感がしたのさ」
line = "「選星者の能力で、星徒会室に何かが起こりそうな予感がしたのさ」"

[[dialogue]]
speaker = "ジュエリー"
# 「来てみれば、キミが部屋の中へ入って行く姿が見えたというわけだ」
line = "「来てみれば、キミが部屋の中へ入って行く姿が見えたというわけだ」"

[[dialogue]]
speaker = "ミネコ"
# 「ありゃりゃ、こんな時まで発動するだなんて、つくづく厄介な能力だこと」
line = "「ありゃりゃ、こんな時まで発動するだなんて、つくづく厄介な能力だこと」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、助手との愛の絆を舐めてもらっては困る。仮に能力が発動しなくとも、助手がキミ側に付くことはないと断言できるよ」
line = "「ふふっ、助手との愛の絆を舐めてもらっては困る。仮に能力が発動しなくとも、助手がキミ側に付くことはないと断言できるよ」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ、そうだね～。でも――」
line = "「ふふっ、そうだね～。でも――」"

[[dialogue]]
speaker = "ミネコ"
# 「あいにく、私は難易度が高い方が燃えるタチでね♪」
line = "「あいにく、私は難易度が高い方が燃えるタチでね♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「そうか。だが、キミが怪盗を続けようとする限り、私は必ず証拠を掴んで、キミを捕まえてみせる」
line = "「そうか。だが、キミが怪盗を続けようとする限り、私は必ず証拠を掴んで、キミを捕まえてみせる」"

[[dialogue]]
speaker = "ジュエリー"
# 「何より――」
line = "「何より――」"

[[dialogue]]
speaker = "ジュエリー"
# 「どんな物語も、最後には愛が勝つものだからね」
line = "「どんな物語も、最後には愛が勝つものだからね」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ♪　そそるね～♪」
line = "「ふふっ♪　そそるね～♪」"

[[dialogue]]
speaker = "ミネコ"
# 「でもさ、私ってば怪盗なんだよね。だから――」
line = "「でもさ、私ってば怪盗なんだよね。だから――」"

[[dialogue]]
speaker = "ミネコ"
# 「最後に愛が勝つのなら、その愛を盗ませてもらうとするよ♪」
line = "「最後に愛が勝つのなら、その愛を盗ませてもらうとするよ♪」"

[[dialogue]]
speaker = "unk"
# ミネコはそう言って、最初に出会った時のように、不敵に微笑む。
line = "ミネコはそう言って、最初に出会った時のように、不敵に微笑む。"

[[dialogue]]
speaker = "unk"
# どうやら探偵と怪盗の戦いは、これからも学園で続いて行くらしかった――
line = "どうやら探偵と怪盗の戦いは、これからも学園で続いて行くらしかった――"
