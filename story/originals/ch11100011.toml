[[dialogue]]
speaker = "unk"
# 第１話,海の申し子、プトラ,P
line = "第１話,海の申し子、プトラ,P"

[[dialogue]]
speaker = "プトラ"
# 「海だ～～～っ！！！」
line = "「海だ～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# 彼方まで広がる青い海を前にして、プトラがキラキラと目を輝かせる。
line = "彼方まで広がる青い海を前にして、プトラがキラキラと目を輝かせる。"

[[dialogue]]
speaker = "フィオナ"
# 「このリゾート結界はリップルさんが作り出したものなんですよ」
line = "「このリゾート結界はリップルさんが作り出したものなんですよ」"

[[dialogue]]
speaker = "リップル"
# 「ソウなのです！　リゾート結界の中では、年中サマーがタノシメます！」
line = "「ソウなのです！　リゾート結界の中では、年中サマーがタノシメます！」"

[[dialogue]]
speaker = "プトラ"
# 「すごーい！　冬の寒い日でも夏の海で遊べちゃうね！」
line = "「すごーい！　冬の寒い日でも夏の海で遊べちゃうね！」"

[[dialogue]]
speaker = "プトラ"
# 「でも結界って……世界をまるごとひとつ作っちゃったってこと？　そんなこと出来ちゃうの！？」
line = "「でも結界って……世界をまるごとひとつ作っちゃったってこと？　そんなこと出来ちゃうの！？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　デキちゃいます！」
line = "「ハイ！　デキちゃいます！」"

[[dialogue]]
speaker = "unk"
# 桁外れな能力ではあるけど
line = "桁外れな能力ではあるけど"

[[dialogue]]
speaker = "unk"
# まあリップルの場合
line = "まあリップルの場合"

[[dialogue]]
speaker = "プトラ"
# 「へぇ～、すごいな～。ちょっと水に手をつけてみてー……と」
line = "「へぇ～、すごいな～。ちょっと水に手をつけてみてー……と」"

[[dialogue]]
speaker = "プトラ"
# 「おお～、ほんとに海だ！　しかもちょっとぬるい夏の海だ！　さっそくだけど泳いでもいいかな？」
line = "「おお～、ほんとに海だ！　しかもちょっとぬるい夏の海だ！　さっそくだけど泳いでもいいかな？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろんよ、そのつもりで連れてきたんだから。まずは水着になりましょう！」
line = "「もちろんよ、そのつもりで連れてきたんだから。まずは水着になりましょう！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、そうですね。では──変身！」
line = "「ええ、そうですね。では──変身！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どう？　これが星騎士の戦闘服のひとつ、水着フォームよ！」
line = "「どう？　これが星騎士の戦闘服のひとつ、水着フォームよ！」"

[[dialogue]]
speaker = "プトラ"
# 「うおっ！？　いきなり水着になった！」
line = "「うおっ！？　いきなり水着になった！」"

[[dialogue]]
speaker = "プトラ"
# 「へぇ～、いろんな戦闘服があるんだね。しかも水着かわいい！　変身もすぐ着替えられて便利！」
line = "「へぇ～、いろんな戦闘服があるんだね。しかも水着かわいい！　変身もすぐ着替えられて便利！」"

[[dialogue]]
speaker = "フィオナ"
# 「プトラさんには水着を用意したのでこれに着替えて──」
line = "「プトラさんには水着を用意したのでこれに着替えて──」"

[[dialogue]]
speaker = "プトラ"
# 「大丈夫！　今はあたしも変身できるから！」
line = "「大丈夫！　今はあたしも変身できるから！」"

[[dialogue]]
speaker = "プトラ"
# 「へん！　しん！」
line = "「へん！　しん！」"

[[dialogue]]
speaker = "プトラ"
# 「じゃーん！　あたしのはこのまま泳げるんだよ！　それいけ～！」
line = "「じゃーん！　あたしのはこのまま泳げるんだよ！　それいけ～！」"

[[dialogue]]
speaker = "フィオナ"
# 「プトラさん、真っ先に突っ込んでいっちゃいましたね……」
line = "「プトラさん、真っ先に突っ込んでいっちゃいましたね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「元気がよくていいじゃない！　私たちも行くわよ！」
line = "「元気がよくていいじゃない！　私たちも行くわよ！」"

[[dialogue]]
speaker = "リップル"
# 「ミンナで思いきり夏を楽しみましょー♪」
line = "「ミンナで思いきり夏を楽しみましょー♪」"

[[dialogue]]
speaker = "unk"
# みんなで和気あいあい海を楽しんでいたのだが、気が付くとプトラとリップルの勝負が始まっていた。
line = "みんなで和気あいあい海を楽しんでいたのだが、気が付くとプトラとリップルの勝負が始まっていた。"

[[dialogue]]
speaker = "リップル"
# 「ワタシはアワビやサザエ、イワガキにウニも獲ってキました！」
line = "「ワタシはアワビやサザエ、イワガキにウニも獲ってキました！」"

[[dialogue]]
speaker = "プトラ"
# 「なんのなんの、あたしは貝だけじゃなくてお魚も捕まえてきたもんね～♪」
line = "「なんのなんの、あたしは貝だけじゃなくてお魚も捕まえてきたもんね～♪」"

[[dialogue]]
speaker = "リップル"
# 「ムムム……ナカナカやりますね！」
line = "「ムムム……ナカナカやりますね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「すごい量ね……２人合わせてどれだけ獲ってきたの？」
line = "「すごい量ね……２人合わせてどれだけ獲ってきたの？」"

[[dialogue]]
speaker = "フィオナ"
# 「私たちだけでは食べきれそうにないですね」
line = "「私たちだけでは食べきれそうにないですね」"

[[dialogue]]
speaker = "リップル"
# 「ではミンナを呼んで、ミンナで食べればモンダイありませーん♪」
line = "「ではミンナを呼んで、ミンナで食べればモンダイありませーん♪」"

[[dialogue]]
speaker = "プトラ"
# 「いいねいいね。フレイマリンでも大漁の時はそうしてたよ。浜焼きで火を囲みながら食べるの♪」
line = "「いいねいいね。フレイマリンでも大漁の時はそうしてたよ。浜焼きで火を囲みながら食べるの♪」"

[[dialogue]]
speaker = "unk"
# すごく楽しそうだな
line = "すごく楽しそうだな"

[[dialogue]]
speaker = "プトラ"
# 「うん！　みんなで食べればサイコーに楽しいよ♪」
line = "「うん！　みんなで食べればサイコーに楽しいよ♪」"

[[dialogue]]
speaker = "フィオナ"
# 「じゃあ人を集めてきますね。流星星徒会のみんなも呼びましょうか」
line = "「じゃあ人を集めてきますね。流星星徒会のみんなも呼びましょうか」"

[[dialogue]]
speaker = "リップル"
# 「オネガイしまーす♪」
line = "「オネガイしまーす♪」"

[[dialogue]]
speaker = "プトラ"
# 「でもほんとにすごいね～。この海が全部、リップルの作り出したものだなんて」
line = "「でもほんとにすごいね～。この海が全部、リップルの作り出したものだなんて」"

[[dialogue]]
speaker = "リップル"
# 「えへへ、エンジョイしながら、ガンバって作りました」
line = "「えへへ、エンジョイしながら、ガンバって作りました」"

[[dialogue]]
speaker = "フィオナ"
# 「今も新しい結界を作り続けていると聞きましたが？」
line = "「今も新しい結界を作り続けていると聞きましたが？」"

[[dialogue]]
speaker = "リップル"
# 「ソウなんです！　もっともっとミンナに夏を楽しんでホシイのです！」
line = "「ソウなんです！　もっともっとミンナに夏を楽しんでホシイのです！」"

[[dialogue]]
speaker = "プトラ"
# 「リップルは夏が大好きなんだね？」
line = "「リップルは夏が大好きなんだね？」"

[[dialogue]]
speaker = "リップル"
# 「もちろんです！　プトラは夏、スキですか？」
line = "「もちろんです！　プトラは夏、スキですか？」"

[[dialogue]]
speaker = "プトラ"
# 「とーぜん！　あたしも夏はだいすきだよ♪」
line = "「とーぜん！　あたしも夏はだいすきだよ♪」"

[[dialogue]]
speaker = "リップル"
# 「なら仲間です！　プトラ、いい笑顔です♪」
line = "「なら仲間です！　プトラ、いい笑顔です♪」"

[[dialogue]]
speaker = "プトラ"
# 「えへへ、笑顔を褒めてもらえるのは嬉しいな」
line = "「えへへ、笑顔を褒めてもらえるのは嬉しいな」"

[[dialogue]]
speaker = "プトラ"
# 「というかみんなと一緒に居ると自然に楽しくなっちゃうんだけどね！」
line = "「というかみんなと一緒に居ると自然に楽しくなっちゃうんだけどね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「お待たせ～、適当に人を呼んできたわよ～！」
line = "「お待たせ～、適当に人を呼んできたわよ～！」"

[[dialogue]]
speaker = "プトラ"
# 「おーい、こっちだよ～！　一緒に食べよ～～～っ♪」
line = "「おーい、こっちだよ～！　一緒に食べよ～～～っ♪」"

[[dialogue]]
speaker = "unk"
# 底抜けに明るい元気少女のプトラ。
line = "底抜けに明るい元気少女のプトラ。"

[[dialogue]]
speaker = "unk"
# 彼女の周りには自然と笑顔があふれてくる、そんな不思議な魅力を持った女の子だった。
line = "彼女の周りには自然と笑顔があふれてくる、そんな不思議な魅力を持った女の子だった。"
