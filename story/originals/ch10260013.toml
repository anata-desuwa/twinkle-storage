[[dialogue]]
speaker = "unk"
# 第３話,おでかけはイノセントホワイト,P
line = "第３話,おでかけはイノセントホワイト,P"

[[dialogue]]
speaker = "unk"
# とある日の放課後、俺はリーリアと一緒に街へ出かけていた。
line = "とある日の放課後、俺はリーリアと一緒に街へ出かけていた。"

[[dialogue]]
speaker = "リーリア"
# （ま、まさかセンパイに冗談で提案した放課後デートが、ＯＫ貰えてしまうとは……！）
line = "（ま、まさかセンパイに冗談で提案した放課後デートが、ＯＫ貰えてしまうとは……！）"

[[dialogue]]
speaker = "リーリア"
# （けど、センパイの今までの態度からは、どうにも腑に落ちない。ひょっとして何か企んでいるのでは……！？）
line = "（けど、センパイの今までの態度からは、どうにも腑に落ちない。ひょっとして何か企んでいるのでは……！？）"

[[dialogue]]
speaker = "リーリア"
# （……はっ！　まさか、私の抱えている『秘密』に勘付いた？　私の素性をこのデートから探ろうとしている？）
line = "（……はっ！　まさか、私の抱えている『秘密』に勘付いた？　私の素性をこのデートから探ろうとしている？）"

[[dialogue]]
speaker = "リーリア"
# （もしそうなら、決してバレないように立ち振る舞わなきゃ……！）
line = "（もしそうなら、決してバレないように立ち振る舞わなきゃ……！）"

[[dialogue]]
speaker = "リーリア"
# 「センパイが私の誘いに乗って来るなんて思わなかったな～。一体どういう風の吹き回しです？」
line = "「センパイが私の誘いに乗って来るなんて思わなかったな～。一体どういう風の吹き回しです？」"

[[dialogue]]
speaker = "リーリア"
# 「あっ、もしかして☆　ついに私のこと、好きになっちゃいました？　まあ、こんな可愛い後輩に毎日迫られてたら、それも仕方ないですよね～♪」
line = "「あっ、もしかして☆　ついに私のこと、好きになっちゃいました？　まあ、こんな可愛い後輩に毎日迫られてたら、それも仕方ないですよね～♪」"

[[dialogue]]
speaker = "unk"
# いや、毎日来るから、実は友達少ないのかなって……
line = "いや、毎日来るから、実は友達少ないのかなって……"

[[dialogue]]
speaker = "リーリア"
# 「憐れまれてる！？　ちゃんと居ますから！　というか私、むしろ友達多いですから！　……ってセンパイ！　その『え～、うそ～』みたいな顔止めて貰えます！？」
line = "「憐れまれてる！？　ちゃんと居ますから！　というか私、むしろ友達多いですから！　……ってセンパイ！　その『え～、うそ～』みたいな顔止めて貰えます！？」"

[[dialogue]]
speaker = "リーリア"
# 「ちょっ、笑ってるじゃないですか！　私のこと、からかいましたね……！？」
line = "「ちょっ、笑ってるじゃないですか！　私のこと、からかいましたね……！？」"

[[dialogue]]
speaker = "リーリア"
# 「もう！　センパイってば、私に対してばっかり、そういうことするんですから！」
line = "「もう！　センパイってば、私に対してばっかり、そういうことするんですから！」"

[[dialogue]]
speaker = "リーリア"
# 「デートなんですから、最初会った時みたいに、紳士的なセンパイでリードして下さい！」
line = "「デートなんですから、最初会った時みたいに、紳士的なセンパイでリードして下さい！」"

[[dialogue]]
speaker = "リーリア"
# 「ほら、デートらしく腕を組んで行きますよ……！」
line = "「ほら、デートらしく腕を組んで行きますよ……！」"

[[dialogue]]
speaker = "リーリア"
# 「センパイ……腕に抱き着いたのに、相変わらずの平然とした顔……。他の男子なら、これだけでイチコロなはずなのに……」
line = "「センパイ……腕に抱き着いたのに、相変わらずの平然とした顔……。他の男子なら、これだけでイチコロなはずなのに……」"

[[dialogue]]
speaker = "リーリア"
# （だけど、このデートの主導権は渡さない。何も疑われることなく、私の可愛さを見せつけてやるんだから……！）
line = "（だけど、このデートの主導権は渡さない。何も疑われることなく、私の可愛さを見せつけてやるんだから……！）"

[[dialogue]]
speaker = "リーリア"
# 「ここ、凄い人ごみですね。あっ、信号、青になりましたよ」
line = "「ここ、凄い人ごみですね。あっ、信号、青になりましたよ」"

[[dialogue]]
speaker = "リーリア"
# 「……って、わわっ！？　人の波に流される！？」
line = "「……って、わわっ！？　人の波に流される！？」"

[[dialogue]]
speaker = "unk"
# （リーリアの手を取り、引き寄せる）
line = "（リーリアの手を取り、引き寄せる）"

[[dialogue]]
speaker = "リーリア"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "リーリア"
# 「ありがとうございます、センパイ……」
line = "「ありがとうございます、センパイ……」"

[[dialogue]]
speaker = "リーリア"
# （な、なんか一瞬ドキッとして、顔が熱くなってるんですが……！？）
line = "（な、なんか一瞬ドキッとして、顔が熱くなってるんですが……！？）"

[[dialogue]]
speaker = "リーリア"
# （いやいやいや、さっきまで腕組んでたし、今更センパイから手を握られた程度で、なんでこんな……！？）
line = "（いやいやいや、さっきまで腕組んでたし、今更センパイから手を握られた程度で、なんでこんな……！？）"

[[dialogue]]
speaker = "unk"
# それから今度は、オープンカフェでスイーツを食べることになったのだが──
line = "それから今度は、オープンカフェでスイーツを食べることになったのだが──"

[[dialogue]]
speaker = "リーリア"
# 「えっと……２人でそれぞれパフェを頼みましたよね？」
line = "「えっと……２人でそれぞれパフェを頼みましたよね？」"

[[dialogue]]
speaker = "リーリア"
# 「でも、スプーンが２つ付いたパフェが来ちゃってますね……」
line = "「でも、スプーンが２つ付いたパフェが来ちゃってますね……」"

[[dialogue]]
speaker = "リーリア"
# 「これって多分、カップルで頼んだと誤解されたやつですよね……！？」
line = "「これって多分、カップルで頼んだと誤解されたやつですよね……！？」"

[[dialogue]]
speaker = "unk"
# もう１個頼む？
line = "もう１個頼む？"

[[dialogue]]
speaker = "リーリア"
# （こ、ここで断ったら、私の方が恥ずかしがってるのバレバレに……！）
line = "（こ、ここで断ったら、私の方が恥ずかしがってるのバレバレに……！）"

[[dialogue]]
speaker = "リーリア"
# 「い、いや、せっかくのデートですし！　これを２人で食べるのも、面白そうじゃないですか……？☆」
line = "「い、いや、せっかくのデートですし！　これを２人で食べるのも、面白そうじゃないですか……？☆」"

[[dialogue]]
speaker = "unk"
# （口元にスプーンでパフェを運び『あ～ん』する）
line = "（口元にスプーンでパフェを運び『あ～ん』する）"

[[dialogue]]
speaker = "リーリア"
# 「え？　わ、わかりました。あ～ん……って！！！　何をやってるんですかセンパイ！？！？」
line = "「え？　わ、わかりました。あ～ん……って！！！　何をやってるんですかセンパイ！？！？」"

[[dialogue]]
speaker = "リーリア"
# 「き、今日のセンパイ、やっぱり何か変ですよ！？」
line = "「き、今日のセンパイ、やっぱり何か変ですよ！？」"

[[dialogue]]
speaker = "unk"
# 実は、この前の埋め合わせをしようと思ってて……
line = "実は、この前の埋め合わせをしようと思ってて……"

[[dialogue]]
speaker = "リーリア"
# 「星徒会室で、恥をかかせちゃった件？　……いや、あれは私の自爆で、これだと利害一致してませんから！」
line = "「星徒会室で、恥をかかせちゃった件？　……いや、あれは私の自爆で、これだと利害一致してませんから！」"

[[dialogue]]
speaker = "リーリア"
# 「な、何かセンパイが変に優しいと、調子が狂うというか……」
line = "「な、何かセンパイが変に優しいと、調子が狂うというか……」"

[[dialogue]]
speaker = "リーリア"
# 「へ？　い、いや別に、センパイにあ～んして貰うのは、嫌じゃありませんけど……」
line = "「へ？　い、いや別に、センパイにあ～んして貰うのは、嫌じゃありませんけど……」"

[[dialogue]]
speaker = "unk"
# ひょっとして、デートは初めてだった？
line = "ひょっとして、デートは初めてだった？"

[[dialogue]]
speaker = "リーリア"
# 「そ、そんなわけないじゃないですか！」
line = "「そ、そんなわけないじゃないですか！」"

[[dialogue]]
speaker = "リーリア"
# 「私が男子とのデートごときで緊張しているとでも？　『あ～ん』だって、何度もしてもらったことありますから！」
line = "「私が男子とのデートごときで緊張しているとでも？　『あ～ん』だって、何度もしてもらったことありますから！」"

[[dialogue]]
speaker = "リーリア"
# （本当は男の子とのデートも、『あ～ん』も初めてですけど！！　そんなこと、口が裂けてもセンパイには言えないし！）
line = "（本当は男の子とのデートも、『あ～ん』も初めてですけど！！　そんなこと、口が裂けてもセンパイには言えないし！）"

[[dialogue]]
speaker = "リーリア"
# 「ほ、ほらセンパイ！　早く私に『あ～ん』してくださいっ！　センパイとイチャイチャする程度、可愛い私にとっては造作もないことなんです！」
line = "「ほ、ほらセンパイ！　早く私に『あ～ん』してくださいっ！　センパイとイチャイチャする程度、可愛い私にとっては造作もないことなんです！」"

[[dialogue]]
speaker = "リーリア"
# 「今更積極的なセンパイとイチャイチャするのが恥ずかしいとか、そんなこと全然まったくちょっともなくて、ラクショーなんですよ！！！」
line = "「今更積極的なセンパイとイチャイチャするのが恥ずかしいとか、そんなこと全然まったくちょっともなくて、ラクショーなんですよ！！！」"

[[dialogue]]
speaker = "unk"
# 俺はそれ以上ツッコまず、だよねと話を打ち切ると、真っ赤な顔で大見得を切るリーリアにパフェを『あ～ん』してあげるのだった。
line = "俺はそれ以上ツッコまず、だよねと話を打ち切ると、真っ赤な顔で大見得を切るリーリアにパフェを『あ～ん』してあげるのだった。"

[[dialogue]]
speaker = "unk"
# ……リーリアがテンパりまくってくれたお陰で誤魔化せてるけど、俺だって恥ずかしくてドキドキして、ちょっと嬉しかったのは、この生意気な後輩には秘密だ。
line = "……リーリアがテンパりまくってくれたお陰で誤魔化せてるけど、俺だって恥ずかしくてドキドキして、ちょっと嬉しかったのは、この生意気な後輩には秘密だ。"
