[[dialogue]]
speaker = "unk"
# 第３話,甘々アンラッキーデー,P
line = "第３話,甘々アンラッキーデー,P"

[[dialogue]]
speaker = "unk"
# ある朝、俺がサチと一緒に登校していると、モンスター出現アラートが鳴った。
line = "ある朝、俺がサチと一緒に登校していると、モンスター出現アラートが鳴った。"

[[dialogue]]
speaker = "unk"
# それからすぐに２人で現場に向かい、モンスターを撃退して――
line = "それからすぐに２人で現場に向かい、モンスターを撃退して――"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「探知魔法……反応なし。よし、これで全部倒せたみたいですね」
line = "「探知魔法……反応なし。よし、これで全部倒せたみたいですね」"

[[dialogue]]
speaker = "unk"
# サチのおかげで難なく勝てたよ
line = "サチのおかげで難なく勝てたよ"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「いえ。私はむしろ、お兄さんが近くにいてくれるから、強くなれるというか……えへへ<emoji=heart04>」
line = "「いえ。私はむしろ、お兄さんが近くにいてくれるから、強くなれるというか……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちは飛行して学園に到着したのだが――
line = "そうして、俺たちは飛行して学園に到着したのだが――"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「……あれ？」
line = "「……あれ？」"

[[dialogue]]
speaker = "unk"
# どうしたんだ？
line = "どうしたんだ？"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「え、えっと……その……」
line = "「え、えっと……その……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「なんか……変身が解除できなくて……」
line = "「なんか……変身が解除できなくて……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「うぅぅ……まさか、この格好のまま授業を受けることになるなんて……」
line = "「うぅぅ……まさか、この格好のまま授業を受けることになるなんて……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あむっ……もぐもぐ……」
line = "「あむっ……もぐもぐ……」"

[[dialogue]]
speaker = "unk"
# 昼休みになり、星徒会室へ逃げるようにやって来たサチは、顔を赤くしたままお弁当を食べる。
line = "昼休みになり、星徒会室へ逃げるようにやって来たサチは、顔を赤くしたままお弁当を食べる。"

[[dialogue]]
speaker = "unk"
# トレジアンナさんに解析してもらった結果、サチの変身が解除できなくなったのは、フォルトゥーナフォームの<b>反動</b>が原因だと判明した。
line = "トレジアンナさんに解析してもらった結果、サチの変身が解除できなくなったのは、フォルトゥーナフォームの<b>反動</b>が原因だと判明した。"

[[dialogue]]
speaker = "unk"
# サチの幸運を更に強化するフォルトゥーナフォーム。その反動は大きく、本来なら年に１回周期で訪れる不幸の日――『アンラッキーデー』の周期が、早まってしまったらしい。
line = "サチの幸運を更に強化するフォルトゥーナフォーム。その反動は大きく、本来なら年に１回周期で訪れる不幸の日――『アンラッキーデー』の周期が、早まってしまったらしい。"

[[dialogue]]
speaker = "unk"
# つまりは今日、再び訪れたアンラッキーデーにより、サチは不幸にも変身解除ができなくなってしまった――というわけだった。
line = "つまりは今日、再び訪れたアンラッキーデーにより、サチは不幸にも変身解除ができなくなってしまった――というわけだった。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「……午前中、周りからは衣装が可愛いと沢山褒められました」
line = "「……午前中、周りからは衣装が可愛いと沢山褒められました」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「笑われないのはすごくありがたいんですけど……可愛い可愛いって褒められるのも、それはそれで無性に恥ずかしいというか……はぅぅ」
line = "「笑われないのはすごくありがたいんですけど……可愛い可愛いって褒められるのも、それはそれで無性に恥ずかしいというか……はぅぅ」"

[[dialogue]]
speaker = "unk"
# 今日は無理せず休んだっていいんだぞ？
line = "今日は無理せず休んだっていいんだぞ？"

[[dialogue]]
speaker = "unk"
# あんまり恥ずかしいなら
line = "あんまり恥ずかしいなら"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「いえ……私は流星学園附属校の生徒会長ですから」
line = "「いえ……私は流星学園附属校の生徒会長ですから」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「何より、私が誇れる自分でいたいんです」
line = "「何より、私が誇れる自分でいたいんです」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「たとえ不運な時でも、自分やみんなを信じて諦めずに戦い続ける、お兄さんみたいに強い星騎士であれるように」
line = "「たとえ不運な時でも、自分やみんなを信じて諦めずに戦い続ける、お兄さんみたいに強い星騎士であれるように」"

[[dialogue]]
speaker = "unk"
# サチのそういう頑張り屋なところ、好きだぞ
line = "サチのそういう頑張り屋なところ、好きだぞ"

[[dialogue]]
speaker = "unk"
# 俺は彼女の頭に手を置き、そっと撫でる。
line = "俺は彼女の頭に手を置き、そっと撫でる。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あっ……えへへへへぇ<emoji=heart04>」
line = "「あっ……えへへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「お兄さんに撫でられると……安心します♪」
line = "「お兄さんに撫でられると……安心します♪」"

[[dialogue]]
speaker = "unk"
# 俺はサチの恋人なんだから
line = "俺はサチの恋人なんだから"

[[dialogue]]
speaker = "unk"
# でも、本当に辛い時はちゃんと言ってね
line = "でも、本当に辛い時はちゃんと言ってね"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「……！　お兄さん……はい<emoji=heart04>」
line = "「……！　お兄さん……はい<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「じゃあ、その……お願いごと、してもいいですか？」
line = "「じゃあ、その……お願いごと、してもいいですか？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「授業は休まずに頑張って受けようと思っているんですけど……帰りに交通事故に合わないかとかは、ちょっと怖くて……」
line = "「授業は休まずに頑張って受けようと思っているんですけど……帰りに交通事故に合わないかとかは、ちょっと怖くて……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「だから……できれば今日は前の時みたいに、星徒会室に泊まることができたらって思うんですけど……どうでしょう？」
line = "「だから……できれば今日は前の時みたいに、星徒会室に泊まることができたらって思うんですけど……どうでしょう？」"

[[dialogue]]
speaker = "unk"
# 俺は頷いてみせる。
line = "俺は頷いてみせる。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「――幸い、急ぎの仕事はないし、みんなに事情を話して、星徒会は１日休みに……ですか？」
line = "「――幸い、急ぎの仕事はないし、みんなに事情を話して、星徒会は１日休みに……ですか？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ありがとうございます、お兄さん♪」
line = "「ありがとうございます、お兄さん♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「え？　――前みたいに、魔法少女のみんなも呼んでお泊り会にするかって？」
line = "「え？　――前みたいに、魔法少女のみんなも呼んでお泊り会にするかって？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「そ、それも楽しそうでいいんですけど……その、今回は……」
line = "「そ、それも楽しそうでいいんですけど……その、今回は……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「みんなには内緒で、お兄さんと２人きり……っていうのは、ダメですか……？」
line = "「みんなには内緒で、お兄さんと２人きり……っていうのは、ダメですか……？」"

[[dialogue]]
speaker = "unk"
# 一瞬、思考が停止する。が、次の瞬間、俺は全力で首を縦に振っていた。
line = "一瞬、思考が停止する。が、次の瞬間、俺は全力で首を縦に振っていた。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「いいんですか？　えへへへへぇ<emoji=heart04>」
line = "「いいんですか？　えへへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「――いつもと反応が違ってエッチ！？　も、もう、そこはわざわざツッコまないで下さいっ」
line = "「――いつもと反応が違ってエッチ！？　も、もう、そこはわざわざツッコまないで下さいっ」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「今日はアンラッキーデーだから……仕方なくです！　ほら、風邪を引いた時みたいなものですから……！」
line = "「今日はアンラッキーデーだから……仕方なくです！　ほら、風邪を引いた時みたいなものですから……！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「とりあえず、これで……放課後までどんなアンラッキーに遭っても、へっちゃらです♪」
line = "「とりあえず、これで……放課後までどんなアンラッキーに遭っても、へっちゃらです♪」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「あっ、でも……」
line = "「あっ、でも……」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「もう少しだけ、勇気をもらってもいいですか？　午後の授業を頑張れるように……」
line = "「もう少しだけ、勇気をもらってもいいですか？　午後の授業を頑張れるように……」"

[[dialogue]]
speaker = "unk"
# そう言って、照れた顔で近くへ来るサチ。
line = "そう言って、照れた顔で近くへ来るサチ。"

[[dialogue]]
speaker = "unk"
# 俺は頷いて、彼女の体を抱き寄せる。
line = "俺は頷いて、彼女の体を抱き寄せる。"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「ん……<emoji=heart04>　お兄さんの体……温かいです……<emoji=heart04>」
line = "「ん……<emoji=heart04>　お兄さんの体……温かいです……<emoji=heart04>」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「えへへ<emoji=heart04>　アンラッキーでも幸せな気分になっちゃいます<emoji=heart04>」
line = "「えへへ<emoji=heart04>　アンラッキーでも幸せな気分になっちゃいます<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして、しばらく抱き合ったまま過ごす俺たちなのだった――
line = "そうして、しばらく抱き合ったまま過ごす俺たちなのだった――"
