[[dialogue]]
speaker = "unk"
# 第３話,ダブルママダレナ再び,P
line = "第３話,ダブルママダレナ再び,P"

[[dialogue]]
speaker = "unk"
# その日は、マグダレナが俺の家へ遊びに来ていた。
line = "その日は、マグダレナが俺の家へ遊びに来ていた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長、お待たせしました～。ママダレナが愛を込めて作った親子丼ですよ～♪」
line = "「会長、お待たせしました～。ママダレナが愛を込めて作った親子丼ですよ～♪」"

[[dialogue]]
speaker = "unk"
# 最近、料理の練習をしているというマグダレナが、手料理を振る舞ってくれる。しかし今日は――
line = "最近、料理の練習をしているというマグダレナが、手料理を振る舞ってくれる。しかし今日は――"

[[dialogue]]
speaker = "大人ダレナ"
# 「会長、こちらの親子丼もでき上がりました。どうぞお召し上がり下さい♪」
line = "「会長、こちらの親子丼もでき上がりました。どうぞお召し上がり下さい♪」"

[[dialogue]]
speaker = "unk"
# なんと今日は、アニマ先輩特製の『魂分裂薬』によって、大きいマグダレナの方も一緒だった。
line = "なんと今日は、アニマ先輩特製の『魂分裂薬』によって、大きいマグダレナの方も一緒だった。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「どちらが会長に美味しい手料理を作れるか……大きい私には負けませんよ～！」
line = "「どちらが会長に美味しい手料理を作れるか……大きい私には負けませんよ～！」"

[[dialogue]]
speaker = "大人ダレナ"
# 「私も簡単には譲れません。会長を愛している気持ちは、どちらの私も同じですから」
line = "「私も簡単には譲れません。会長を愛している気持ちは、どちらの私も同じですから」"

[[dialogue]]
speaker = "unk"
# 同一人物なんだし、なにも競わなくても……
line = "同一人物なんだし、なにも競わなくても……"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いえ、これは大事な問題ですっ。将来、会長とどちらの姿で一緒に過ごすのか……その境界を定めなくてはなりませんから！」
line = "「いえ、これは大事な問題ですっ。将来、会長とどちらの姿で一緒に過ごすのか……その境界を定めなくてはなりませんから！」"

[[dialogue]]
speaker = "大人ダレナ"
# 「ええ。その答えを出すためにも、本日は会長に判断していただこうというわけです♪」
line = "「ええ。その答えを出すためにも、本日は会長に判断していただこうというわけです♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それでは会長、まずは小さいママダレナの方からいきますよ～。はい、あ～ん♪」
line = "「それでは会長、まずは小さいママダレナの方からいきますよ～。はい、あ～ん♪」"

[[dialogue]]
speaker = "unk"
# 小さなマグダレナにあ～んされ、親子丼を口に運んでもらう。
line = "小さなマグダレナにあ～んされ、親子丼を口に運んでもらう。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふふっ、美味しいですか～？　練習した甲斐がありました～♪」
line = "「ふふっ、美味しいですか～？　練習した甲斐がありました～♪」"

[[dialogue]]
speaker = "大人ダレナ"
# 「では次は、私の番ですね。失礼いたします……ふー……ふー……♪」
line = "「では次は、私の番ですね。失礼いたします……ふー……ふー……♪」"

[[dialogue]]
speaker = "大人ダレナ"
# 「会長、どうぞ♪　あ～ん<emoji=heart04>」
line = "「会長、どうぞ♪　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "大人ダレナ"
# 「――いかがでしょうか、会長？」
line = "「――いかがでしょうか、会長？」"

[[dialogue]]
speaker = "unk"
# こ、これは……！　うまい……！
line = "こ、これは……！　うまい……！"

[[dialogue]]
speaker = "unk"
# 大きなマグダレナの親子丼は、卵がふわりと、とろけるように仕上がっていた。
line = "大きなマグダレナの親子丼は、卵がふわりと、とろけるように仕上がっていた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そ、そんな……！　どうして……！？」
line = "「そ、そんな……！　どうして……！？」"

[[dialogue]]
speaker = "大人ダレナ"
# 「小さい方の私は……気持ちが先走ってしまったようですね。焦って卵を入れるタイミングが、少し早くなってしまったんです」
line = "「小さい方の私は……気持ちが先走ってしまったようですね。焦って卵を入れるタイミングが、少し早くなってしまったんです」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「まさか自分に負けちゃうなんて……！　う……うえええぇぇぇ～んっ！！」
line = "「まさか自分に負けちゃうなんて……！　う……うえええぇぇぇ～んっ！！」"

[[dialogue]]
speaker = "unk"
# ショックを受けたのか、小さいマグダレナが子供のように泣き出してしまう。
line = "ショックを受けたのか、小さいマグダレナが子供のように泣き出してしまう。"

[[dialogue]]
speaker = "大人ダレナ"
# 「ああ、そんな泣いてはみっともないですよ。ほら……よしよし♪」
line = "「ああ、そんな泣いてはみっともないですよ。ほら……よしよし♪」"

[[dialogue]]
speaker = "unk"
# 大きいマグダレナが小さい方の体を抱き締めて、子供をあやすように優しく頭を撫でる。
line = "大きいマグダレナが小さい方の体を抱き締めて、子供をあやすように優しく頭を撫でる。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「うぅ……自分に慰められてるのに、気持ちが安心してきてしまいます。これがセシアの言う、大人の私が持つ『ママ<ruby=りょく>力</ruby>』……！」
line = "「うぅ……自分に慰められてるのに、気持ちが安心してきてしまいます。これがセシアの言う、大人の私が持つ『ママ<ruby>力<rt>りょく</rt></ruby>』……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「く、悔しいですうぅ～～！　うわあああぁぁぁ～～んっ！！」
line = "「く、悔しいですうぅ～～！　うわあああぁぁぁ～～んっ！！」"

[[dialogue]]
speaker = "unk"
# 俺は２人にそっと近づき、双方の頭へ手を置いて撫でる。
line = "俺は２人にそっと近づき、双方の頭へ手を置いて撫でる。"

[[dialogue]]
speaker = "unk"
# 俺は、どっちのマグダレナも好きだ
line = "俺は、どっちのマグダレナも好きだ"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……会長？」
line = "「……会長？」"

[[dialogue]]
speaker = "unk"
# 俺にはどちらか片方だけなんて選べない。最初に恋をしたのは大きい方のマグダレナだが、小さいマグダレナとも同じように恋人としての時間を過ごしてきたからだ。
line = "俺にはどちらか片方だけなんて選べない。最初に恋をしたのは大きい方のマグダレナだが、小さいマグダレナとも同じように恋人としての時間を過ごしてきたからだ。"

[[dialogue]]
speaker = "大人ダレナ"
# 「――え？　場合によっては、会長も魂分裂薬を使って２人に分かれても構わない……？　会長、まさかそこまで……！」
line = "「――え？　場合によっては、会長も魂分裂薬を使って２人に分かれても構わない……？　会長、まさかそこまで……！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長……ごめんなさい。私たち、つい甘えて……ワガママを言ってしまっていました……」
line = "「会長……ごめんなさい。私たち、つい甘えて……ワガママを言ってしまっていました……」"

[[dialogue]]
speaker = "大人ダレナ"
# 「そうですね……。会長がどちらを選ぶのか、その好奇心もあって……試すような真似をしてしまって……」
line = "「そうですね……。会長がどちらを選ぶのか、その好奇心もあって……試すような真似をしてしまって……」"

[[dialogue]]
speaker = "unk"
# 俺は２人共、どちらも幸せにすると誓うよ
line = "俺は２人共、どちらも幸せにすると誓うよ"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長……えへへ<emoji=heart04>」
line = "「会長……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "大人ダレナ"
# 「会長がどちらも幸せにしてくださると仰るのなら……私たちもそれに応えて、会長を２倍幸せにして差し上げなくてはなりませんね<emoji=heart04>」
line = "「会長がどちらも幸せにしてくださると仰るのなら……私たちもそれに応えて、会長を２倍幸せにして差し上げなくてはなりませんね<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい♪　どちらも会長を愛する気持ちは一緒ですから<emoji=heart04>」
line = "「はい♪　どちらも会長を愛する気持ちは一緒ですから<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ２人は目を合わせて頷き合うと、俺の左右に座り、そっと体を寄せてきた。
line = "２人は目を合わせて頷き合うと、俺の左右に座り、そっと体を寄せてきた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長……♪　小さいママダレナは、こっちからぎゅ～っとしますね……<emoji=heart04>」
line = "「会長……♪　小さいママダレナは、こっちからぎゅ～っとしますね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 小さなマグダレナが腕を絡めるように抱き着いてくる。その反対側からは――
line = "小さなマグダレナが腕を絡めるように抱き着いてくる。その反対側からは――"

[[dialogue]]
speaker = "大人ダレナ"
# 「では私は……会長の肩をお借りしますね。ふふ……こうして寄り添うと、落ち着きます……<emoji=heart04>」
line = "「では私は……会長の肩をお借りしますね。ふふ……こうして寄り添うと、落ち着きます……<emoji=heart04>」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あっ……会長の手が背中に回されて……優しくて温かいです……<emoji=heart04>　もっと……もっと触れてほしいです……<emoji=heart04>」
line = "「あっ……会長の手が背中に回されて……優しくて温かいです……<emoji=heart04>　もっと……もっと触れてほしいです……<emoji=heart04>」"

[[dialogue]]
speaker = "大人ダレナ"
# 「んっ……<emoji=heart04>　会長……そんな風に抱かれてしまっては……私まで甘えたくなってしまいます……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　会長……そんな風に抱かれてしまっては……私まで甘えたくなってしまいます……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ２人が同時に身を寄せ、俺の腕が温かく柔らかな幸福感に包まれる。
line = "２人が同時に身を寄せ、俺の腕が温かく柔らかな幸福感に包まれる。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長、頬っぺたに失礼しますね……<emoji=heart04>　ちゅっ……<emoji=heart04>　会長、大好きです……<emoji=heart04>」
line = "「会長、頬っぺたに失礼しますね……<emoji=heart04>　ちゅっ……<emoji=heart04>　会長、大好きです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 小さなマグダレナの唇が頬に触れ、それに続くように――
line = "小さなマグダレナの唇が頬に触れ、それに続くように――"

[[dialogue]]
speaker = "大人ダレナ"
# 「んっ……ちゅ……<emoji=heart04>　会長、私も……心から愛しています……<emoji=heart04>」
line = "「んっ……ちゅ……<emoji=heart04>　会長、私も……心から愛しています……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 左右から交互に注がれるキスに、思考が甘くとろけていく。
line = "左右から交互に注がれるキスに、思考が甘くとろけていく。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「会長が２人共を好きと言ってくださったから……いっぱい甘えてもいいんですよね……？」
line = "「会長が２人共を好きと言ってくださったから……いっぱい甘えてもいいんですよね……？」"

[[dialogue]]
speaker = "大人ダレナ"
# 「でしたら……同じく、２倍で甘やかさせていただきますね、会長……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「でしたら……同じく、２倍で甘やかさせていただきますね、会長……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 今度は２人同時に頬へキス。次に額へ、そして唇へ――ふわりと重なるような甘く優しい連鎖が続く。
line = "今度は２人同時に頬へキス。次に額へ、そして唇へ――ふわりと重なるような甘く優しい連鎖が続く。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ちゅっ……<emoji=heart04>　会長を、世界で１番幸せにするのが……ここにいるママダレナの役目ですから……♪」
line = "「ちゅっ……<emoji=heart04>　会長を、世界で１番幸せにするのが……ここにいるママダレナの役目ですから……♪」"

[[dialogue]]
speaker = "大人ダレナ"
# 「ええ……どちらの姿の私も、会長のおそばを離れません……ずっと隣に……<emoji=heart04>　んちゅっ……<emoji=heart04>」
line = "「ええ……どちらの姿の私も、会長のおそばを離れません……ずっと隣に……<emoji=heart04>　んちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ２人の指が俺の手へ絡み、重なる。そして――左右から唇が同時に寄せられた。
line = "２人の指が俺の手へ絡み、重なる。そして――左右から唇が同時に寄せられた。"

[[dialogue]]
speaker = "２人"
# 「会長、愛しています……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「会長、愛しています……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そこから先は２人に身をゆだねて、これ以上ないくらい幸福な時間を過ごすのだった。
line = "そこから先は２人に身をゆだねて、これ以上ないくらい幸福な時間を過ごすのだった。"
