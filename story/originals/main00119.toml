[[dialogue]]
speaker = "unk"
# 第２４話,エピローグ2,B
line = "第２４話,エピローグ2,B"

[[dialogue]]
speaker = "マトイ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "アナ"
# 「学園長……」
line = "「学園長……」"

[[dialogue]]
speaker = "マトイ"
# 「こ、こちらにいらっしゃるなんて珍しいですね！　あっ、えっと私お茶を汲んできま──」
line = "「こ、こちらにいらっしゃるなんて珍しいですね！　あっ、えっと私お茶を汲んできま──」"

[[dialogue]]
speaker = "セイファート"
# 「そう構わなくていい。一度、新たな会長に挨拶せねばと思っただけだ」
line = "「そう構わなくていい。一度、新たな会長に挨拶せねばと思っただけだ」"

[[dialogue]]
speaker = "クロト"
# 「……恐縮です。セイファート学園長」
line = "「……恐縮です。セイファート学園長」"

[[dialogue]]
speaker = "unk"
# そういえば……御前試合を終えて俺は気絶してしまったから、こうして会うのは初めてだった。
line = "そういえば……御前試合を終えて俺は気絶してしまったから、こうして会うのは初めてだった。"

[[dialogue]]
speaker = "unk"
# 遠目にしか見ていなかったけれど、間近で見るとがっしりして背の高い御仁である。
line = "遠目にしか見ていなかったけれど、間近で見るとがっしりして背の高い御仁である。"

[[dialogue]]
speaker = "セイファート"
# 「……ふふ」
line = "「……ふふ」"

[[dialogue]]
speaker = "クロト"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "unk"
# すると、彼は俺をじっと見て微笑んで……
line = "すると、彼は俺をじっと見て微笑んで……"

[[dialogue]]
speaker = "セイファート"
# 「<b>強くなったな</b>──少年。見違えたよ」
line = "「<b>強くなったな</b>──少年。見違えたよ」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "セイファート"
# 『──怪我はないか、少年』
line = "『──怪我はないか、少年』"

[[dialogue]]
speaker = "セイファート"
# 『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』
line = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"

[[dialogue]]
speaker = "unk"
# あれから時が経っていて、遠目にしか見ていなかったから、気づかなかった。
line = "あれから時が経っていて、遠目にしか見ていなかったから、気づかなかった。"

[[dialogue]]
speaker = "unk"
# 間違いない。彼は、あの時の……
line = "間違いない。彼は、あの時の……"

[[dialogue]]
speaker = "マトイ"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "サーシャ"
# 「何か通じるものがあるみたいね～」
line = "「何か通じるものがあるみたいね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が選んだ最強の会長だもの！　無理もないわ！」
line = "「私が選んだ最強の会長だもの！　無理もないわ！」"

[[dialogue]]
speaker = "unk"
# ５年前の俺を死地から救い、星騎士を目指すきっかけになった憧れの人の姿が、そこにあった。
line = "５年前の俺を死地から救い、星騎士を目指すきっかけになった憧れの人の姿が、そこにあった。"

[[dialogue]]
speaker = "unk"
# そして他でもない、その人に「強くなった」と認めてもらえた。
line = "そして他でもない、その人に「強くなった」と認めてもらえた。"

[[dialogue]]
speaker = "unk"
# 人知れず涙が頬を伝う。この５年間の努力が、報われた瞬間だった──
line = "人知れず涙が頬を伝う。この５年間の努力が、報われた瞬間だった──"

[[dialogue]]
speaker = "セイファート"
# 「ふっ。自信は十分と言ったところか。ならばその新体制の君たちへ、新たな指令を告げよう」
line = "「ふっ。自信は十分と言ったところか。ならばその新体制の君たちへ、新たな指令を告げよう」"

[[dialogue]]
speaker = "セイファート"
# 「先ほど流星市国内で新たなリクリエの予兆が確認された。出動要請だ」
line = "「先ほど流星市国内で新たなリクリエの予兆が確認された。出動要請だ」"

[[dialogue]]
speaker = "クロト"
# 「出動、要請……！」
line = "「出動、要請……！」"

[[dialogue]]
speaker = "unk"
# 俺は目頭が熱くなるのをこらえ、気持ちを切り替える。
line = "俺は目頭が熱くなるのをこらえ、気持ちを切り替える。"

[[dialogue]]
speaker = "マトイ"
# 「またリクリエが……」
line = "「またリクリエが……」"

[[dialogue]]
speaker = "アナ"
# 「最近多い」
line = "「最近多い」"

[[dialogue]]
speaker = "unk"
# 言ったそばからというやつだった。
line = "言ったそばからというやつだった。"

[[dialogue]]
speaker = "unk"
# だが、実地経験を積むにはこの上ない機会だ。
line = "だが、実地経験を積むにはこの上ない機会だ。"

[[dialogue]]
speaker = "セイファート"
# 「場所は近隣の繁華街。付近に多数のモンスターが確認されていると聞く、至急現場に向かってくれたまえ」
line = "「場所は近隣の繁華街。付近に多数のモンスターが確認されていると聞く、至急現場に向かってくれたまえ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「了解よ♪」
line = "「了解よ♪」"

[[dialogue]]
speaker = "クロト"
# 「（なるほどな……こうやって要請を受けるわけか）」
line = "「（なるほどな……こうやって要請を受けるわけか）」"

[[dialogue]]
speaker = "アナ"
# 「（いつもは教頭先生からの連絡が多いですが。学園長が直接……というのは異例）」
line = "「（いつもは教頭先生からの連絡が多いですが。学園長が直接……というのは異例）」"

[[dialogue]]
speaker = "unk"
# 直々の指令は今回限りのようだった。当然か。
line = "直々の指令は今回限りのようだった。当然か。"

[[dialogue]]
speaker = "unk"
# ことリクリエ問題において、星騎士はさながら警察のような役割を担っている。
line = "ことリクリエ問題において、星騎士はさながら警察のような役割を担っている。"

[[dialogue]]
speaker = "unk"
# 俺たちの行動もそれだけ責任を伴うということだ。
line = "俺たちの行動もそれだけ責任を伴うということだ。"

[[dialogue]]
speaker = "サーシャ"
# 「ん～、どうしようかしら。先日の、モンスターの大群について調査のお呼ばれがかかってたのよね～」
line = "「ん～、どうしようかしら。先日の、モンスターの大群について調査のお呼ばれがかかってたのよね～」"

[[dialogue]]
speaker = "アナ"
# 「あの件ですか……私もいた方がいいでしょうか？」
line = "「あの件ですか……私もいた方がいいでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「ううん、私一人で十分よ～。現場も見たし、風紀委員の人たちも一緒だから」
line = "「ううん、私一人で十分よ～。現場も見たし、風紀委員の人たちも一緒だから」"

[[dialogue]]
speaker = "アナ"
# 「それではサーシャ先輩はその調査に向かってください。モンスターは新会長と私たちで行けば、事足りるかと」
line = "「それではサーシャ先輩はその調査に向かってください。モンスターは新会長と私たちで行けば、事足りるかと」"

[[dialogue]]
speaker = "unk"
# アナの言葉にうなずくサーシャ先輩。どうやら２人の話もまとまったらしい。
line = "アナの言葉にうなずくサーシャ先輩。どうやら２人の話もまとまったらしい。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ──腕が鳴るわね。クロトがついてるって思うと」
line = "「ふふ──腕が鳴るわね。クロトがついてるって思うと」"

[[dialogue]]
speaker = "クロト"
# 「緊張するな。足を引っ張らないよう頑張るよ」
line = "「緊張するな。足を引っ張らないよう頑張るよ」"

[[dialogue]]
speaker = "セイファート"
# 「それから──何やらアステラの出現も確認されているらしい。くれぐれも油断せずに頼む」
line = "「それから──何やらアステラの出現も確認されているらしい。くれぐれも油断せずに頼む」"

[[dialogue]]
speaker = "アナ"
# 「なるほど。大規模なのは久しぶりです」
line = "「なるほど。大規模なのは久しぶりです」"

[[dialogue]]
speaker = "クロト"
# 「！　アステラって、もしかして……」
line = "「！　アステラって、もしかして……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「来ればわかるわ。さあ、新生星徒会としての初陣──出動よ！」
line = "「来ればわかるわ。さあ、新生星徒会としての初陣──出動よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ？　でも新生星徒会だと、新生なのか新星なのかわかりづら……」
line = "「あれ？　でも新生星徒会だと、新生なのか新星なのかわかりづら……」"

[[dialogue]]
speaker = "アナ"
# 「早く行きますよ、前会長」
line = "「早く行きますよ、前会長」"

[[dialogue]]
speaker = "unk"
# ４人で出動し、繁華街へ向かった俺たち。
line = "４人で出動し、繁華街へ向かった俺たち。"

[[dialogue]]
speaker = "unk"
# 確かにこの現場において、目を見張るべきは一目瞭然だった。
line = "確かにこの現場において、目を見張るべきは一目瞭然だった。"

[[dialogue]]
speaker = "クロト"
# 「あれは……」
line = "「あれは……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アステライト──通称、アステラ」
line = "「アステライト──通称、アステラ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これから私たちが突入する、メインターゲットよ」
line = "「これから私たちが突入する、メインターゲットよ」"

[[dialogue]]
speaker = "アナ"
# 「リクリエの特異点に現れる一種の亜空間。三界を綯い交ぜにしようとした影響で生じると言われている」
line = "「リクリエの特異点に現れる一種の亜空間。三界を綯い交ぜにしようとした影響で生じると言われている」"

[[dialogue]]
speaker = "アナ"
# 「会長──覚えある？」
line = "「会長──覚えある？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。流星市国に住んでたら、たまに目にするし──それに……」
line = "「ああ。流星市国に住んでたら、たまに目にするし──それに……」"

[[dialogue]]
speaker = "クロト"
# 「以前、モンスターどもに連行されたこともあるからな」
line = "「以前、モンスターどもに連行されたこともあるからな」"

[[dialogue]]
speaker = "マトイ"
# 「そう言えばそんな話してたよね……超やばそうだけど」
line = "「そう言えばそんな話してたよね……超やばそうだけど」"

[[dialogue]]
speaker = "unk"
# でも、その危機がきっかけであの人──
line = "でも、その危機がきっかけであの人──"

[[dialogue]]
speaker = "unk"
# 在りし日のセイファート学園長に助けてもらって、今の俺がある。
line = "在りし日のセイファート学園長に助けてもらって、今の俺がある。"

[[dialogue]]
speaker = "unk"
# そう考えると、運命というもののアヤを感じてしまった。
line = "そう考えると、運命というもののアヤを感じてしまった。"

[[dialogue]]
speaker = "クロト"
# 「ただ……この規模の巣を見かけることなんて、そうそうあることじゃなかったけど」
line = "「ただ……この規模の巣を見かけることなんて、そうそうあることじゃなかったけど」"

[[dialogue]]
speaker = "マトイ"
# 「星徒会も最優先で処理に当たっているからね」
line = "「星徒会も最優先で処理に当たっているからね」"

[[dialogue]]
speaker = "unk"
# みんなの頑張りのおかげらしかった。
line = "みんなの頑張りのおかげらしかった。"

[[dialogue]]
speaker = "unk"
# かつて俺が連れ去られた──モンスターの巣窟。アステライト。
line = "かつて俺が連れ去られた──モンスターの巣窟。アステライト。"

[[dialogue]]
speaker = "unk"
# 今までは恐怖の記憶を呼び起こすような存在で、逃げることしかできなかったけれど……
line = "今までは恐怖の記憶を呼び起こすような存在で、逃げることしかできなかったけれど……"

[[dialogue]]
speaker = "unk"
# 今日からは違う。
line = "今日からは違う。"

[[dialogue]]
speaker = "unk"
# 星徒会の一員として、排除にあたる立場になったのだ。
line = "星徒会の一員として、排除にあたる立場になったのだ。"

[[dialogue]]
speaker = "アナ"
# 「内部にはモンスターが<ruby=ばっこ>跋扈</ruby>してる。放置してると、ここ一帯に放出されかねない」
line = "「内部にはモンスターが<ruby>跋扈<rt>ばっこ</rt></ruby>してる。放置してると、ここ一帯に放出されかねない」"

[[dialogue]]
speaker = "クロト"
# 「亜空間──ってことは、今からあそこに飛ぶのか」
line = "「亜空間──ってことは、今からあそこに飛ぶのか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ、覚悟を決めなさい！」
line = "「そうよ、覚悟を決めなさい！」"

[[dialogue]]
speaker = "unk"
# 全員がセレスティアを構える。
line = "全員がセレスティアを構える。"

[[dialogue]]
speaker = "unk"
# リクリエによって生み出された、モンスターの亜空間──見過ごすわけにはいかない。
line = "リクリエによって生み出された、モンスターの亜空間──見過ごすわけにはいかない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーし！　新生・新星星徒会、とつげきー！」
line = "「よーし！　新生・新星星徒会、とつげきー！」"

[[dialogue]]
speaker = "unk"
# ──いざゆかん。
line = "──いざゆかん。"

[[dialogue]]
speaker = "unk"
# そう、覚悟を決めて俺たちが一歩を踏み出したとき──
line = "そう、覚悟を決めて俺たちが一歩を踏み出したとき──"

[[dialogue]]
speaker = "クロト"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぇっ──！？」
line = "「ふぇっ──！？」"

[[dialogue]]
speaker = "unk"
# 目の前で、アステライトそのものが消滅した。
line = "目の前で、アステライトそのものが消滅した。"

[[dialogue]]
speaker = "アナ"
# 「……びっくり」
line = "「……びっくり」"

[[dialogue]]
speaker = "クロト"
# 「アステライトってのは──自然に消えるものなのか？」
line = "「アステライトってのは──自然に消えるものなのか？」"

[[dialogue]]
speaker = "マトイ"
# 「そんなはずないわ。けど……」
line = "「そんなはずないわ。けど……」"

[[dialogue]]
speaker = "unk"
# マトイですらも驚いた事象。
line = "マトイですらも驚いた事象。"

[[dialogue]]
speaker = "unk"
# 俺たちが目を見張っていると、その原因はたちまち判明する。
line = "俺たちが目を見張っていると、その原因はたちまち判明する。"

[[dialogue]]
speaker = "フィオナ"
# 「みんな、ご苦労さま。おかげで被害も出なかったみたい」
line = "「みんな、ご苦労さま。おかげで被害も出なかったみたい」"

[[dialogue]]
speaker = "ルリエル"
# 「ふえぇ、大変でしたぁ。でもでもっ、これで街の平和が守られるなら、お安いことなのですっ」
line = "「ふえぇ、大変でしたぁ。でもでもっ、これで街の平和が守られるなら、お安いことなのですっ」"

[[dialogue]]
speaker = "ニャリオン"
# 「星見家がフィオナ嬢にかかればこの程度は朝飯前ニャン！　たとえ家来が犬サルキジでも余裕なのニャン！」
line = "「星見家がフィオナ嬢にかかればこの程度は朝飯前ニャン！　たとえ家来が犬サルキジでも余裕なのニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「誰がサルだ。オメーこそなんもしてねーだろ、アホ猫」
line = "「誰がサルだ。オメーこそなんもしてねーだろ、アホ猫」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャンにゃと！？」
line = "「ニャンにゃと！？」"

[[dialogue]]
speaker = "ソフィア"
# 「喧嘩ならよそでやってください、お２人」
line = "「喧嘩ならよそでやってください、お２人」"

[[dialogue]]
speaker = "セーラ"
# 「ま、無事に済んだんだからなんでもいいっしょ～♪」
line = "「ま、無事に済んだんだからなんでもいいっしょ～♪」"

[[dialogue]]
speaker = "unk"
# 消失したアステラから降り立ったのは──総勢５人の少女たち「（＋１匹？）」。
line = "消失したアステラから降り立ったのは──総勢５人の少女たち「（＋１匹？）」。"

[[dialogue]]
speaker = "unk"
# その誰しも、俺たちとは異なる制服に身を包んでいた。
line = "その誰しも、俺たちとは異なる制服に身を包んでいた。"

[[dialogue]]
speaker = "unk"
# 彼女たちは……
line = "彼女たちは……"

[[dialogue]]
speaker = "フィオナ"
# 「……あら」
line = "「……あら」"

[[dialogue]]
speaker = "クロト"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "unk"
# 首をひねっていると、そのうちの一人と目があった。
line = "首をひねっていると、そのうちの一人と目があった。"

[[dialogue]]
speaker = "unk"
# 彼女は、俺のつけている腕章を確認すると──そのままこちらへと歩み寄ってくる。
line = "彼女は、俺のつけている腕章を確認すると──そのままこちらへと歩み寄ってくる。"

[[dialogue]]
speaker = "unk"
# そうして彼女は、魅入ってしまうほど高貴な微笑みを浮かべて……
line = "そうして彼女は、魅入ってしまうほど高貴な微笑みを浮かべて……"

[[dialogue]]
speaker = "フィオナ"
# 「流星学園星徒会会長、星見フィオナです」
line = "「流星学園星徒会会長、星見フィオナです」"

[[dialogue]]
speaker = "フィオナ"
# 「改めてよろしくお願いしますね──新星学園の、<b>新</b>星徒会長さん」
line = "「改めてよろしくお願いしますね──新星学園の、<b>新</b>星徒会長さん」"
