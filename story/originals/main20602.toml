[[dialogue]]
speaker = "unk"
# 第２話,デネブでの再会,B
line = "第２話,デネブでの再会,B"

[[dialogue]]
speaker = "unk"
# クロトとヴィーナスが極星従騎の襲撃を受ける少し前。
line = "クロトとヴィーナスが極星従騎の襲撃を受ける少し前。"

[[dialogue]]
speaker = "unk"
# 梨緒も目を覚まし、建物の陰に身を潜めてていた。
line = "梨緒も目を覚まし、建物の陰に身を潜めてていた。"

[[dialogue]]
speaker = "梨緒"
# （見慣れない景色……だが遠くにフィーニスの塔が見えた。ここは流星市国だ）
line = "（見慣れない景色……だが遠くにフィーニスの塔が見えた。ここは流星市国だ）"

[[dialogue]]
speaker = "梨緒"
# （おそらくデネブの……な。平行世界を転移するのも二度目だ、さすがにわかる）
line = "（おそらくデネブの……な。平行世界を転移するのも二度目だ、さすがにわかる）"

[[dialogue]]
speaker = "梨緒"
# （ベガ、アルタイル、デネブ……これで３つの平行世界全てを訪れたことになる。もしかすると私が初めてだろうか）
line = "（ベガ、アルタイル、デネブ……これで３つの平行世界全てを訪れたことになる。もしかすると私が初めてだろうか）"

[[dialogue]]
speaker = "梨緒"
# （それともリクリエの使徒となった君の方が先なのか？　……ジグ）
line = "（それともリクリエの使徒となった君の方が先なのか？　……ジグ）"

[[dialogue]]
speaker = "ジグ"
# 「私は可能性を見た。だけど世界を救える未来なんてどこにもなかった」
line = "「私は可能性を見た。だけど世界を救える未来なんてどこにもなかった」"

[[dialogue]]
speaker = "梨緒"
# （あの言葉とあの表情は、リクリエの使徒としてではなく、新星の星徒会長としてのものだった）
line = "（あの言葉とあの表情は、リクリエの使徒としてではなく、新星の星徒会長としてのものだった）"

[[dialogue]]
speaker = "梨緒"
# （ジグは世界を救えないと、最初からそう思っていたのか……？　君は諦めていたのか……？）
line = "（ジグは世界を救えないと、最初からそう思っていたのか……？　君は諦めていたのか……？）"

[[dialogue]]
speaker = "梨緒"
# （ならどうして言わなかった？　星徒会副会長として、私はそんなに頼りなかったのか？）
line = "（ならどうして言わなかった？　星徒会副会長として、私はそんなに頼りなかったのか？）"

[[dialogue]]
speaker = "梨緒"
# （…………副会長、か）
line = "（…………副会長、か）"

[[dialogue]]
speaker = "チナ"
# 「副会長！？　どうしてここに！？」
line = "「副会長！？　どうしてここに！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「……！　チナちゃんっ！」
line = "「……！　チナちゃんっ！」"

[[dialogue]]
speaker = "梨緒"
# （あの時、チナはベアトを『副会長』と呼んだ。そしてベアトはそれを否定せず、空間の穴からチナを助けた）
line = "（あの時、チナはベアトを『副会長』と呼んだ。そしてベアトはそれを否定せず、空間の穴からチナを助けた）"

[[dialogue]]
speaker = "梨緒"
# （ベアトが極星学園の星徒会副会長であることは、状況からして間違いないだろう）
line = "（ベアトが極星学園の星徒会副会長であることは、状況からして間違いないだろう）"

[[dialogue]]
speaker = "梨緒"
# （彼女は魔界からの留学生と聞いていたが、どうやって新星学園に入った……？）
line = "（彼女は魔界からの留学生と聞いていたが、どうやって新星学園に入った……？）"

[[dialogue]]
speaker = "梨緒"
# （彼女の目的は何だ？　チナとともにアルタイルを滅ぼすことか？）
line = "（彼女の目的は何だ？　チナとともにアルタイルを滅ぼすことか？）"

[[dialogue]]
speaker = "梨緒"
# （だがそれならチナを支援したはず……それとも味方としてチナの自爆を止めたのか……？）
line = "（だがそれならチナを支援したはず……それとも味方としてチナの自爆を止めたのか……？）"

[[dialogue]]
speaker = "梨緒"
# （ベアト……君は敵なのか？）
line = "（ベアト……君は敵なのか？）"

[[dialogue]]
speaker = "ベアトリス"
# 「泣くならちゃんと、私の見えるところで泣いて。そうじゃないと、必要な時に助けられなくなっちゃう」
line = "「泣くならちゃんと、私の見えるところで泣いて。そうじゃないと、必要な時に助けられなくなっちゃう」"

[[dialogue]]
speaker = "ベアトリス"
# 「まだ結成して日は浅いかもしれないけど、私たちは同じ、選挙管理委員会の仲間でしょ？」
line = "「まだ結成して日は浅いかもしれないけど、私たちは同じ、選挙管理委員会の仲間でしょ？」"

[[dialogue]]
speaker = "梨緒"
# （君はそう言って、私の涙を拭ってくれた……）
line = "（君はそう言って、私の涙を拭ってくれた……）"

[[dialogue]]
speaker = "梨緒"
# （だけどそれは、私に取り入って新星学園に潜入するためだったのか……？　ずっと私を騙していたのか……？）
line = "（だけどそれは、私に取り入って新星学園に潜入するためだったのか……？　ずっと私を騙していたのか……？）"

[[dialogue]]
speaker = "unk"
# 極星星徒会は敵だ。ならベアトリスも敵だ。
line = "極星星徒会は敵だ。ならベアトリスも敵だ。"

[[dialogue]]
speaker = "unk"
# だがベアトリスが敵なら、チナに加担してアルタイルを滅ぼそうとしたはずだ。だがベアトリスにそんな素振りはなかった。
line = "だがベアトリスが敵なら、チナに加担してアルタイルを滅ぼそうとしたはずだ。だがベアトリスにそんな素振りはなかった。"

[[dialogue]]
speaker = "unk"
# それに思い浮かぶベアトリスの言葉は、笑顔は、敵が向けてくるものだとはとても思えなかった。
line = "それに思い浮かぶベアトリスの言葉は、笑顔は、敵が向けてくるものだとはとても思えなかった。"

[[dialogue]]
speaker = "梨緒"
# （君は敵なのか？　味方なのか？）
line = "（君は敵なのか？　味方なのか？）"

[[dialogue]]
speaker = "梨緒"
# （敵でないならどうして私に言わなかった？　ベアトも、ジグも、どうして私に黙っていたんだ……！？）
line = "（敵でないならどうして私に言わなかった？　ベアトも、ジグも、どうして私に黙っていたんだ……！？）"

[[dialogue]]
speaker = "梨緒"
# 「……いや、今は動こう。デネブに飛ばされた仲間と合流しなければ」
line = "「……いや、今は動こう。デネブに飛ばされた仲間と合流しなければ」"

[[dialogue]]
speaker = "unk"
# ここは敵地だ。考えに耽ってばかりでは、敵である極星学園に見つかってしまう。
line = "ここは敵地だ。考えに耽ってばかりでは、敵である極星学園に見つかってしまう。"

[[dialogue]]
speaker = "梨緒"
# 「闇雲に行動しても危険なだけだ。ならばどう動く……？」
line = "「闇雲に行動しても危険なだけだ。ならばどう動く……？」"

[[dialogue]]
speaker = "unk"
# 新星・流星学園は星騎士たちの本拠地。
line = "新星・流星学園は星騎士たちの本拠地。"

[[dialogue]]
speaker = "unk"
# そして学園の敷地内には、流星教の中心である大聖堂と、三界を繋ぐフィーニスの塔がある。目印としてはこれ以上のものはない。
line = "そして学園の敷地内には、流星教の中心である大聖堂と、三界を繋ぐフィーニスの塔がある。目印としてはこれ以上のものはない。"

[[dialogue]]
speaker = "unk"
# だがそこには極星学園がある可能性が高い。
line = "だがそこには極星学園がある可能性が高い。"

[[dialogue]]
speaker = "梨緒"
# 「虎穴に入らずんば虎子を得ず……か」
line = "「虎穴に入らずんば虎子を得ず……か」"

[[dialogue]]
speaker = "unk"
# ある程度の危険を承知で、人目のある道を避けながらフィーニスの塔を目指すと──
line = "ある程度の危険を承知で、人目のある道を避けながらフィーニスの塔を目指すと──"

[[dialogue]]
speaker = "ベアトリス"
# 「あ──」
line = "「あ──」"

[[dialogue]]
speaker = "梨緒"
# 「ッ──！」
line = "「ッ──！」"

[[dialogue]]
speaker = "unk"
# 咄嗟に変身し、警戒を露わにする梨緒。ベアトリスも変身して梨緒に対峙する。
line = "咄嗟に変身し、警戒を露わにする梨緒。ベアトリスも変身して梨緒に対峙する。"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ぁ……ぅ……」
line = "「ぁ……ぅ……」"

[[dialogue]]
speaker = "unk"
# 梨緒はクロスボウを向けていないものの、強張った表情でベアトリスをにらむ。
line = "梨緒はクロスボウを向けていないものの、強張った表情でベアトリスをにらむ。"

[[dialogue]]
speaker = "unk"
# 一方、ベアトリスは口を開いては閉じたりを繰り返し、何も言葉にできずにいた。
line = "一方、ベアトリスは口を開いては閉じたりを繰り返し、何も言葉にできずにいた。"

[[dialogue]]
speaker = "梨緒"
# 「ベアトリス……なんだな」
line = "「ベアトリス……なんだな」"

[[dialogue]]
speaker = "ベアトリス"
# 「……うん」
line = "「……うん」"

[[dialogue]]
speaker = "梨緒"
# 「いくつか確認させてくれ。ここはデネブで間違いないな？」
line = "「いくつか確認させてくれ。ここはデネブで間違いないな？」"

[[dialogue]]
speaker = "ベアトリス"
# 「……うん」
line = "「……うん」"

[[dialogue]]
speaker = "unk"
# 梨緒の問いに、ベアトリスが力なく頷く。
line = "梨緒の問いに、ベアトリスが力なく頷く。"

[[dialogue]]
speaker = "梨緒"
# 「デネブに飛ばされる前、チナは君を副会長と呼び、君はチナを助けた」
line = "「デネブに飛ばされる前、チナは君を副会長と呼び、君はチナを助けた」"

[[dialogue]]
speaker = "梨緒"
# 「君は極星星徒会の副会長……だな？」
line = "「君は極星星徒会の副会長……だな？」"

[[dialogue]]
speaker = "ベアトリス"
# 「…………うん」
line = "「…………うん」"

[[dialogue]]
speaker = "梨緒"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 自身の出自をとうとう認めるベアトリス。
line = "自身の出自をとうとう認めるベアトリス。"

[[dialogue]]
speaker = "unk"
# 梨緒が向ける視線はより厳しいものになる。
line = "梨緒が向ける視線はより厳しいものになる。"

[[dialogue]]
speaker = "梨緒"
# 「チナは君にとって仲間なのか？」
line = "「チナは君にとって仲間なのか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「……うん。チナちゃんは星徒会の庶務で、私がドジするといつも助けてくれて……」
line = "「……うん。チナちゃんは星徒会の庶務で、私がドジするといつも助けてくれて……」"

[[dialogue]]
speaker = "梨緒"
# 「どうして極星の星徒会であることを黙っていた？　私たちを騙し討ちにするためか？」
line = "「どうして極星の星徒会であることを黙っていた？　私たちを騙し討ちにするためか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ち、ちが──！？　そんなつもりじゃなくて……」
line = "「ち、ちが──！？　そんなつもりじゃなくて……」"

[[dialogue]]
speaker = "ベアトリス"
# 「私は……梨緒ちゃんたちを傷つけるつもりじゃ……」
line = "「私は……梨緒ちゃんたちを傷つけるつもりじゃ……」"

[[dialogue]]
speaker = "梨緒"
# 「なら、どうして言わなかった？　なぜ自分から教えてくれなかった？」
line = "「なら、どうして言わなかった？　なぜ自分から教えてくれなかった？」"

[[dialogue]]
speaker = "ベアトリス"
# 「え、えっと……それは……」
line = "「え、えっと……それは……」"

[[dialogue]]
speaker = "ベアトリス"
# （もしアルタイルが、デネブのように他の平行世界を滅ぼそうと考えていたら……デネブ出身の私はどうなるかわからなかった）
line = "（もしアルタイルが、デネブのように他の平行世界を滅ぼそうと考えていたら……デネブ出身の私はどうなるかわからなかった）"

[[dialogue]]
speaker = "ベアトリス"
# （だから、私がどこから来たかを話すわけにはいかなかった）
line = "（だから、私がどこから来たかを話すわけにはいかなかった）"

[[dialogue]]
speaker = "ベアトリス"
# （でもアルタイルは、デネブと戦うことを選ばなかった。むしろデネブと一緒にリクリエと戦う道を選んだ）
line = "（でもアルタイルは、デネブと戦うことを選ばなかった。むしろデネブと一緒にリクリエと戦う道を選んだ）"

[[dialogue]]
speaker = "ベアトリス"
# （私が極星の副会長だって、話せたはずなのに……私は怖くて……）
line = "（私が極星の副会長だって、話せたはずなのに……私は怖くて……）"

[[dialogue]]
speaker = "ベアトリス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "梨緒"
# 「教えてくれ、ベアトリス。君は私たちの敵なのか？」
line = "「教えてくれ、ベアトリス。君は私たちの敵なのか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「っ……それは……」
line = "「っ……それは……」"

[[dialogue]]
speaker = "ベアトリス"
# （チナちゃんはみんなを傷つけて、アルタイルを滅ぼそうとした。デネブを守るためで、気持ちは痛いほどわかるけど……それは許されないことだ）
line = "（チナちゃんはみんなを傷つけて、アルタイルを滅ぼそうとした。デネブを守るためで、気持ちは痛いほどわかるけど……それは許されないことだ）"

[[dialogue]]
speaker = "ベアトリス"
# （アルタイルにとって極星学園は敵で、私は極星星徒会の副会長で……）
line = "（アルタイルにとって極星学園は敵で、私は極星星徒会の副会長で……）"

[[dialogue]]
speaker = "ベアトリス"
# （私が敵じゃないって言ったって、どうやって信じてもらえるんだろう……？）
line = "（私が敵じゃないって言ったって、どうやって信じてもらえるんだろう……？）"

[[dialogue]]
speaker = "ベアトリス"
# （私が敵じゃないなんて、何の証拠もない……。そんな都合のいいこと、信じてもらえるんだろうか……？）
line = "（私が敵じゃないなんて、何の証拠もない……。そんな都合のいいこと、信じてもらえるんだろうか……？）"

[[dialogue]]
speaker = "梨緒"
# （極星学園はアルタイルを滅ぼそうとする敵だ。だが、ベアトを敵だと断定するには疑問が多い）
line = "（極星学園はアルタイルを滅ぼそうとする敵だ。だが、ベアトを敵だと断定するには疑問が多い）"

[[dialogue]]
speaker = "梨緒"
# （理由があるなら、納得できるように説明してくれ）
line = "（理由があるなら、納得できるように説明してくれ）"

[[dialogue]]
speaker = "梨緒"
# （敵でないなら、そう言ってくれ……私を信じさせてくれ……）
line = "（敵でないなら、そう言ってくれ……私を信じさせてくれ……）"

[[dialogue]]
speaker = "梨緒"
# 「答えられないのか？」
line = "「答えられないのか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ぅ…………」
line = "「ぅ…………」"

[[dialogue]]
speaker = "梨緒"
# 「では問いを変えよう。君の目的は何だ？　君は何のためにアルタイルにやってきた？」
line = "「では問いを変えよう。君の目的は何だ？　君は何のためにアルタイルにやってきた？」"

[[dialogue]]
speaker = "梨緒"
# 「新星学園の情報を集めることか？　それともアルタイルを滅ぼすことか？」
line = "「新星学園の情報を集めることか？　それともアルタイルを滅ぼすことか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「そうじゃ、なくて……」
line = "「そうじゃ、なくて……」"

[[dialogue]]
speaker = "ベアトリス"
# （私はデネブも、アルタイルも、滅びなくていい道を探したかった）
line = "（私はデネブも、アルタイルも、滅びなくていい道を探したかった）"

[[dialogue]]
speaker = "ベアトリス"
# （ルヴィに無茶だ、不可能だって言われて、それでもアルタイルに渡った）
line = "（ルヴィに無茶だ、不可能だって言われて、それでもアルタイルに渡った）"

[[dialogue]]
speaker = "ベアトリス"
# （……でも私には何もできなかった）
line = "（……でも私には何もできなかった）"

[[dialogue]]
speaker = "ベアトリス"
# （チナちゃんがデネブからやってきて、アルタイルを滅ぼそうとして……だけど私はチナちゃんを説得することも、戦いを止めることもできなかった）
line = "（チナちゃんがデネブからやってきて、アルタイルを滅ぼそうとして……だけど私はチナちゃんを説得することも、戦いを止めることもできなかった）"

[[dialogue]]
speaker = "ベアトリス"
# （今でも気持ちは変わらない。デネブもアルタイルも救いたいと思ってる。でも私は何の力もない役立たずで……）
line = "（今でも気持ちは変わらない。デネブもアルタイルも救いたいと思ってる。でも私は何の力もない役立たずで……）"

[[dialogue]]
speaker = "ベアトリス"
# （２つの世界を救いたかったなんて、自信を持って言えない……この気持ちを梨緒ちゃんにまで否定されたら、私は──）
line = "（２つの世界を救いたかったなんて、自信を持って言えない……この気持ちを梨緒ちゃんにまで否定されたら、私は──）"

[[dialogue]]
speaker = "ベアトリス"
# 「私は……私は……」
line = "「私は……私は……」"

