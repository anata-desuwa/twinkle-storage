line = "「君は仲間だと言ってくれた。私が泣いていたら、ハンカチで涙を拭うと言ってくれた」"

[[dialogue]]
speaker = "梨緒"
# 「その言葉は嘘だったのか、ベアト……！」
line = "「その言葉は嘘だったのか、ベアト……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめん……本当にごめんなさい……私は、梨緒ちゃんを裏切っちゃったんだね……」
line = "「ごめん……本当にごめんなさい……私は、梨緒ちゃんを裏切っちゃったんだね……」"

[[dialogue]]
speaker = "ベアトリス"
# 「私はもう、梨緒ちゃんの前にいない方がいいと思う。だから──」
line = "「私はもう、梨緒ちゃんの前にいない方がいいと思う。だから──」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめんっ！」
