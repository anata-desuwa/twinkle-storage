[[dialogue]]
speaker = "unk"
# 第７話,太陽の魔王,B
line = "第７話,太陽の魔王,B"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「さあ……姉さん。これで邪魔は入りません」
line = "「さあ……姉さん。これで邪魔は入りません」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「その仮面を捨てて……素顔を見せてください。もう一度」
line = "「その仮面を捨てて……素顔を見せてください。もう一度」"

[[dialogue]]
speaker = "アポロ"
# 「仮面を……捨てる……」
line = "「仮面を……捨てる……」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ。『アポロごっこ』なら──少しは休んだっていいはずです。姉さんばかりヒーローを演じて、ずるいですよ」
line = "「ええ。『アポロごっこ』なら──少しは休んだっていいはずです。姉さんばかりヒーローを演じて、ずるいですよ」"

[[dialogue]]
speaker = "unk"
# 熱くも温かいフィオナのオーラが、アポロを抱きしめるように包み込む。
line = "熱くも温かいフィオナのオーラが、アポロを抱きしめるように包み込む。"

[[dialogue]]
speaker = "リノ"
# （そうね……説得するなら、私なんかよりフィオナちゃんのほうが……）
line = "（そうね……説得するなら、私なんかよりフィオナちゃんのほうが……）"

[[dialogue]]
speaker = "クロト"
# （ああ──最後まで戦わずに済む方法を。フィオナらしい）
line = "（ああ──最後まで戦わずに済む方法を。フィオナらしい）"

[[dialogue]]
speaker = "unk"
# そう──フィオナは太陽。
line = "そう──フィオナは太陽。"

[[dialogue]]
speaker = "unk"
# 決して、北風のように無理強いはせず、ただ旅人の意志を促せる存在なんだ。
line = "決して、北風のように無理強いはせず、ただ旅人の意志を促せる存在なんだ。"

[[dialogue]]
speaker = "アポロ"
# 「ああ……そうだ。そうだな──あたしは……お姉さんだもんな」
line = "「ああ……そうだ。そうだな──あたしは……お姉さんだもんな」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「はい。帰りましょう、姉さん──我が家に」
line = "「はい。帰りましょう、姉さん──我が家に」"

[[dialogue]]
speaker = "unk"
# 魔王として目覚めたフィオナの──
line = "魔王として目覚めたフィオナの──"

[[dialogue]]
speaker = "unk"
# 優しさの光ともいうべき温かみが、硬く閉ざされていたアポロの氷を溶かし始める。
line = "優しさの光ともいうべき温かみが、硬く閉ざされていたアポロの氷を溶かし始める。"

[[dialogue]]
speaker = "unk"
# ──が──
line = "──が──"

[[dialogue]]
speaker = "アポロ"
# 「──ぐあああああぁぁぁぁぁっっっ…………！！」
line = "「──ぐあああああぁぁぁぁぁっっっ…………！！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「！　姉さん──っ……！？」
line = "「！　姉さん──っ……！？」"

[[dialogue]]
speaker = "アポロ"
# 「ぐ……っ！　ぐ、ぐぅぅ──っ……違う……あたしは──使徒……リクリエの……そのために、来たんだ……っ……！」
line = "「ぐ……っ！　ぐ、ぐぅぅ──っ……違う……あたしは──使徒……リクリエの……そのために、来たんだ……っ……！」"

[[dialogue]]
speaker = "unk"
# 今、まさに手をかけていた仮面の瘴気がよどみを増す。
line = "今、まさに手をかけていた仮面の瘴気がよどみを増す。"

[[dialogue]]
speaker = "unk"
# アポロの全身を包み込むほどに拡散する濃紫のオーラ──
line = "アポロの全身を包み込むほどに拡散する濃紫のオーラ──"

[[dialogue]]
speaker = "アポロ"
# 「あ……あたしは──あたしは、魔王を……だから……もう、人間なんかには────」
line = "「あ……あたしは──あたしは、魔王を……だから……もう、人間なんかには────」"

[[dialogue]]
speaker = "ソフィア"
# 「！？　仮面が、また──！」
line = "「！？　仮面が、また──！」"

[[dialogue]]
speaker = "ユウリ"
# 「キリねえな、くそ──自分でも剥がせねえってのかよ！」
line = "「キリねえな、くそ──自分でも剥がせねえってのかよ！」"

[[dialogue]]
speaker = "アポロ"
# 「リクリエ──そうだ、リクリエ……再創生……起コセ……魔王──倒ス…………ッ！」
line = "「リクリエ──そうだ、リクリエ……再創生……起コセ……魔王──倒ス…………ッ！」"

[[dialogue]]
speaker = "クロト"
# 「アポロ自身でも抑制できない──なんて支配だ……！」
line = "「アポロ自身でも抑制できない──なんて支配だ……！」"

[[dialogue]]
speaker = "unk"
# あの仮面がある限り──アポロは決して解放されない。
line = "あの仮面がある限り──アポロは決して解放されない。"

[[dialogue]]
speaker = "アポロ"
# 「はぁ、はぁ……うるさい。うるさいぞ。あたしはただ正しいことをしてるだけなのに、どうしてこんなに苦しいんだ」
line = "「はぁ、はぁ……うるさい。うるさいぞ。あたしはただ正しいことをしてるだけなのに、どうしてこんなに苦しいんだ」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「それは──姉さんの本心が、反発しているからです」
line = "「それは──姉さんの本心が、反発しているからです」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「気を強く持って。私のところへ戻りたいと、また願ってください。必ず助け出してみせます──」
line = "「気を強く持って。私のところへ戻りたいと、また願ってください。必ず助け出してみせます──」"

[[dialogue]]
speaker = "アポロ"
# 「ああ……黙れ黙れ！　後はここだけ……アルタイルだけなんだ──世界の完成は、近づいてるんだ……！」
line = "「ああ……黙れ黙れ！　後はここだけ……アルタイルだけなんだ──世界の完成は、近づいてるんだ……！」"

[[dialogue]]
speaker = "アポロ"
# 「オマエたちみたいな塵屑は……宇宙に呑まれて消えればいいッ！」
line = "「オマエたちみたいな塵屑は……宇宙に呑まれて消えればいいッ！」"

[[dialogue]]
speaker = "アポロ"
# 「彗星──ダストストーム！！」
line = "「彗星──ダストストーム！！」"

[[dialogue]]
speaker = "クロト"
# 「────ッ！」
line = "「────ッ！」"

[[dialogue]]
speaker = "unk"
# アポロを中心に──凄絶な輝きの嵐が巻き起こった。
line = "アポロを中心に──凄絶な輝きの嵐が巻き起こった。"

[[dialogue]]
speaker = "unk"
# 万を越える彗星が尾を引いて、魚群のように頂上一帯へ渦を巻く！
line = "万を越える彗星が尾を引いて、魚群のように頂上一帯へ渦を巻く！"

[[dialogue]]
speaker = "モンスター"
# 「──ギアアアアアアッッ────！！」
line = "「──ギアアアアアアッッ────！！」"

[[dialogue]]
speaker = "モンスター"
# 「──グオオオオオオオッッッ………………！！！」
line = "「──グオオオオオオオッッッ………………！！！」"

[[dialogue]]
speaker = "ユウリ"
# 「なっ……なんつう威力だよ……！？」
line = "「なっ……なんつう威力だよ……！？」"

[[dialogue]]
speaker = "アナ"
# 「彗星の嵐──当たれば即死級です！」
line = "「彗星の嵐──当たれば即死級です！」"

[[dialogue]]
speaker = "unk"
# 敵味方無差別の超広範囲攻撃──
line = "敵味方無差別の超広範囲攻撃──"

[[dialogue]]
speaker = "unk"
# きらめく彗星は一瞬掠めただけでも、周囲のモンスターたちの図体を爆発四散させていった。
line = "きらめく彗星は一瞬掠めただけでも、周囲のモンスターたちの図体を爆発四散させていった。"

[[dialogue]]
speaker = "クロト"
# 「全霊で食い止める──いけるか、フィオナ！」
line = "「全霊で食い止める──いけるか、フィオナ！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「ええ──この命に、代えても──！」
line = "「ええ──この命に、代えても──！」"

[[dialogue]]
speaker = "ユウリ"
# 「おおおおお────！」
line = "「おおおおお────！」"

[[dialogue]]
speaker = "ルリエル"
# 「ここさえ凌げば──チャンスはあります──っ！」
line = "「ここさえ凌げば──チャンスはあります──っ！」"

[[dialogue]]
speaker = "unk"
# 一瞬でも垣間見えたアポロの正気を希望に、俺たちは全力で抗う。
line = "一瞬でも垣間見えたアポロの正気を希望に、俺たちは全力で抗う。"

[[dialogue]]
speaker = "unk"
# だが……
line = "だが……"

[[dialogue]]
speaker = "アポロ"
# 「広がれ……もっと──もっとだ……！」
line = "「広がれ……もっと──もっとだ……！」"

[[dialogue]]
speaker = "アポロ"
# 「もういい──何もかも──滅びろ────ッッ！！」
line = "「もういい──何もかも──滅びろ────ッッ！！」"

[[dialogue]]
speaker = "サーシャ"
# 「──ッッ！」
line = "「──ッッ！」"

[[dialogue]]
speaker = "リノ"
# 「さらに拡散──！」
line = "「さらに拡散──！」"

[[dialogue]]
speaker = "unk"
# 渦巻いていた彗星の嵐が、爆発するかのように四方八方へ飛散した。
line = "渦巻いていた彗星の嵐が、爆発するかのように四方八方へ飛散した。"

[[dialogue]]
speaker = "unk"
# それでいて、威力の濃度はまるで減衰していない──
line = "それでいて、威力の濃度はまるで減衰していない──"

[[dialogue]]
speaker = "クロト"
# 「北と東は俺がカバーする！　流星群と大差ないエネルギーの爆散だ、一発も漏らすな！」
line = "「北と東は俺がカバーする！　流星群と大差ないエネルギーの爆散だ、一発も漏らすな！」"

[[dialogue]]
speaker = "フィオナ（魔王覚醒）"
# 「私はこちらを──ですが──」
line = "「私はこちらを──ですが──」"

[[dialogue]]
speaker = "ルリエル"
# 「広範囲すぎます──とてもカバーしきれません！」
line = "「広範囲すぎます──とてもカバーしきれません！」"

[[dialogue]]
speaker = "unk"
# 撃ち落としても撃ち落としても、襲いくる彗星は限りない。
line = "撃ち落としても撃ち落としても、襲いくる彗星は限りない。"

[[dialogue]]
speaker = "リノ"
# 「まずいわクロト──地上に被害が及ぶわよ！」
line = "「まずいわクロト──地上に被害が及ぶわよ！」"

[[dialogue]]
speaker = "クロト"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "サーシャ"
# 「プリマステラ達だけじゃ……これを凌ぐのは無理よ！」
line = "「プリマステラ達だけじゃ……これを凌ぐのは無理よ！」"

[[dialogue]]
speaker = "unk"
# さらにこの規模──地上どころか、人間界全土に広がりかねない！
line = "さらにこの規模──地上どころか、人間界全土に広がりかねない！"

[[dialogue]]
speaker = "マトイ"
# 「ダメッそんなのっ！　あっ、あたしが降りて──助けにいくよっ！」
line = "「ダメッそんなのっ！　あっ、あたしが降りて──助けにいくよっ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「無茶を言うニャン！　今ここから離れたら、天蓋で飛べなくなって墜落するだけニャンよ！」
line = "「無茶を言うニャン！　今ここから離れたら、天蓋で飛べなくなって墜落するだけニャンよ！」"

[[dialogue]]
speaker = "マトイ"
# 「だ……だって、このままじゃ──！」
line = "「だ……だって、このままじゃ──！」"

[[dialogue]]
speaker = "リノ"
# 「っ──ならせめて、私だけでも──」
line = "「っ──ならせめて、私だけでも──」"

[[dialogue]]
speaker = "クロト"
# （くそっ、どうすれば──ここを離れるわけにも──）
line = "（くそっ、どうすれば──ここを離れるわけにも──）"

[[dialogue]]
speaker = "unk"
# 地上の星騎士たちを信じるしかないのか？
line = "地上の星騎士たちを信じるしかないのか？"

[[dialogue]]
speaker = "unk"
# 無謀だ。宇宙規模の災害を前に、限られた人類じゃどうしようもない。
line = "無謀だ。宇宙規模の災害を前に、限られた人類じゃどうしようもない。"

[[dialogue]]
speaker = "unk"
# 諦めかけた、その時──声が聞こえた。
line = "諦めかけた、その時──声が聞こえた。"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「──グレート・ウォール──」
line = "「──グレート・ウォール──」"

[[dialogue]]
speaker = "マトイ"
# 「え……な、何、今の……？」
line = "「え……な、何、今の……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ガキんちょの声──しかも、これって……！」
line = "「ガキんちょの声──しかも、これって……！」"

[[dialogue]]
speaker = "unk"
# 俺たちの立つ頂上、その周囲に──光の結界が張られていた。
line = "俺たちの立つ頂上、その周囲に──光の結界が張られていた。"

[[dialogue]]
speaker = "unk"
# 結界と言っても、生半可な厚みじゃない。
line = "結界と言っても、生半可な厚みじゃない。"

[[dialogue]]
speaker = "unk"
# 彗星の嵐さえ完全に内部へ封じきる、前代未聞の大結界──
line = "彗星の嵐さえ完全に内部へ封じきる、前代未聞の大結界──"

[[dialogue]]
speaker = "リノ"
# 「これは──グレート・ウォールの……局所展開！？」
line = "「これは──グレート・ウォールの……局所展開！？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「やれやれ……待ちきれんので使わせてもらったぞ」
line = "「やれやれ……待ちきれんので使わせてもらったぞ」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「とはいえ、これはあくまでも卵の段階。いつまでもこの範囲にリクリエの<ruby=ほんぱ>本波</ruby>を抑えられるとは思えん」
line = "「とはいえ、これはあくまでも卵の段階。いつまでもこの範囲にリクリエの<ruby>本波<rt>ほんぱ</rt></ruby>を抑えられるとは思えん」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「もし主らが散るようなら、こちらの予定通り展開させてもらう。が、粘れるなら好きにやるとよい」
line = "「もし主らが散るようなら、こちらの予定通り展開させてもらう。が、粘れるなら好きにやるとよい」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「その限られた範囲内に、使徒の持つリクリエすべてのエネルギーが集中する──」
line = "「その限られた範囲内に、使徒の持つリクリエすべてのエネルギーが集中する──」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「せいぜい気張るがよいぞ。金網<b>ですまっち</b>というやつだ」
line = "「せいぜい気張るがよいぞ。金網<b>ですまっち</b>というやつだ」"

[[dialogue]]
speaker = "クロト"
# 「これが本来──人間界全域に張られる計画だった、グレート・ウォール……」
line = "「これが本来──人間界全域に張られる計画だった、グレート・ウォール……」"

[[dialogue]]
speaker = "アナ"
# 「恐ろしいまでの強度──彗星も、流星群も、モンスター達の暴走も完全に防いでいます」
line = "「恐ろしいまでの強度──彗星も、流星群も、モンスター達の暴走も完全に防いでいます」"

[[dialogue]]
speaker = "リノ"
# 「クラウディア様は──どうやら、先んじてここだけに結界を張ったみたい」
line = "「クラウディア様は──どうやら、先んじてここだけに結界を張ったみたい」"

[[dialogue]]
speaker = "リノ"
# 「私たちも使徒さんも、まとめて飲み込むことで」
line = "「私たちも使徒さんも、まとめて飲み込むことで」"

[[dialogue]]
speaker = "unk"
# 元凶──使徒が範囲に収められていることに変わりはない。
line = "元凶──使徒が範囲に収められていることに変わりはない。"

[[dialogue]]
speaker = "unk"
# 言わば、これからここで巻き起こる災禍は、リクリエが人間界全土を襲う前哨戦だ。
line = "言わば、これからここで巻き起こる災禍は、リクリエが人間界全土を襲う前哨戦だ。"

[[dialogue]]
speaker = "ソフィア"
# 「私たちの逃げ場も封じられている──と」
line = "「私たちの逃げ場も封じられている──と」"

[[dialogue]]
speaker = "セーラ"
# 「宇宙規模の厄災を抑えるにしちゃ……激狭なフィールドじゃんね」
line = "「宇宙規模の厄災を抑えるにしちゃ……激狭なフィールドじゃんね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも──下に被害が及ぶより全然いいわ！」
line = "「でも──下に被害が及ぶより全然いいわ！」"

[[dialogue]]
speaker = "ユウリ"
# 「ああ。上等だ！　最初から逃げるつもりなんざねえ！」
line = "「ああ。上等だ！　最初から逃げるつもりなんざねえ！」"

[[dialogue]]
speaker = "unk"
# 救済か、全滅か。
line = "救済か、全滅か。"

[[dialogue]]
speaker = "unk"
# お互い全力でぶつかり合うことによってしか──この先の結末は生まれない。
line = "お互い全力でぶつかり合うことによってしか──この先の結末は生まれない。"
