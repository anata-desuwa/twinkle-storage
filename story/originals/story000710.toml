[[dialogue]]
speaker = "unk"
# その後、晴れ着フォームの活躍により、俺たちはアステライトの攻略に成功。
line = "その後、晴れ着フォームの活躍により、俺たちはアステライトの攻略に成功。"

[[dialogue]]
speaker = "unk"
# 住民の一時避難も解除され、お寺の周りは再び初詣の賑わいを取り戻した――
line = "住民の一時避難も解除され、お寺の周りは再び初詣の賑わいを取り戻した――"

[[dialogue]]
speaker = "ウズメイア"
# 「ソフィアとサーシャ先輩も仲直りして、晴れ着フォームも起動に成功――これにて万事解決だし♪」
line = "「ソフィアとサーシャ先輩も仲直りして、晴れ着フォームも起動に成功――これにて万事解決だし♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ、気を取り直して、初詣再開よ！」
line = "「それじゃあ、気を取り直して、初詣再開よ！」"

[[dialogue]]
speaker = "ソフィア"
# 「あの、ヴィーナスさん」
line = "「あの、ヴィーナスさん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん？　どうかした？　ソフィア」
line = "「ん？　どうかした？　ソフィア」"

[[dialogue]]
speaker = "ソフィア"
# 「今回は色々とありがとうございました。ヴィーナスさんのおかげで、姉さんに対して一歩を踏み出すことができました」
line = "「今回は色々とありがとうございました。ヴィーナスさんのおかげで、姉さんに対して一歩を踏み出すことができました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ、どういたしまして！　力になれてよかったわ。サーシャさんも嬉しそうだしね♪」
line = "「ふふっ、どういたしまして！　力になれてよかったわ。サーシャさんも嬉しそうだしね♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに私たちって、今まで深く関わりがなかったけど、今回のことを通して仲良くなれた気がするわ」
line = "「それに私たちって、今まで深く関わりがなかったけど、今回のことを通して仲良くなれた気がするわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアはどう？」
line = "「ソフィアはどう？」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。私も、ヴィーナスさんと仲良くなれてよかったです」
line = "「はい。私も、ヴィーナスさんと仲良くなれてよかったです」"

[[dialogue]]
speaker = "ソフィア"
# 「所属する学園は違っても、これからもよろしければ、先輩として色々ご指導して頂けると幸いです」
line = "「所属する学園は違っても、これからもよろしければ、先輩として色々ご指導して頂けると幸いです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろん！　今年もどうぞよろしくね、ソフィア♪」
line = "「もちろん！　今年もどうぞよろしくね、ソフィア♪」"

[[dialogue]]
speaker = "ソフィア"
# 「はい、先輩」
line = "「はい、先輩」"

[[dialogue]]
speaker = "unk"
# 一方で、サーシャさんはウズメに話しかけていた。
line = "一方で、サーシャさんはウズメに話しかけていた。"

[[dialogue]]
speaker = "サーシャ"
# 「ウズメちゃん、あの時はアドバイスをしてくれて、ありがとうね」
line = "「ウズメちゃん、あの時はアドバイスをしてくれて、ありがとうね」"

[[dialogue]]
speaker = "ウズメイア"
# 「いえいえ、元はといえば、今回の初詣を言い出したのはあたしでしたから。お役に立てたならよかったです」
line = "「いえいえ、元はといえば、今回の初詣を言い出したのはあたしでしたから。お役に立てたならよかったです」"

[[dialogue]]
speaker = "サーシャ"
# 「教えてもらった交換日記、ソフィとやってみようと思うわ」
line = "「教えてもらった交換日記、ソフィとやってみようと思うわ」"

[[dialogue]]
speaker = "ウズメイア"
# 「――天界の風習というよりは、あたしの家族の話なんですけど……」
line = "「――天界の風習というよりは、あたしの家族の話なんですけど……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしの両親、仕事で人間界の文化研究をしているんですよ」
line = "「あたしの両親、仕事で人間界の文化研究をしているんですよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「それで、研究に忙しくて、あたしが起きている時間に家に帰ってこないことも多くて」
line = "「それで、研究に忙しくて、あたしが起きている時間に家に帰ってこないことも多くて」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしは子供心に寂しいなと思っていたんですけど、そんな気持ちが両親に伝わったのか、ある日、交換日記をしようって言ってくれたんです」
line = "「あたしは子供心に寂しいなと思っていたんですけど、そんな気持ちが両親に伝わったのか、ある日、交換日記をしようって言ってくれたんです」"

[[dialogue]]
speaker = "ウズメイア"
# 「なかなか会えなくても、お互いどういうことを思って過ごしているのか、言葉を交わせるようにって」
line = "「なかなか会えなくても、お互いどういうことを思って過ごしているのか、言葉を交わせるようにって」"

[[dialogue]]
speaker = "ウズメイア"
# 「やってみると、面と向かって言えないことでも、日記でなら意外と言えたりするんですよ～。超エモいっすよね♪」
line = "「やってみると、面と向かって言えないことでも、日記でなら意外と言えたりするんですよ～。超エモいっすよね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ウズメちゃんになにか、お礼をしないといけないわね」
line = "「ウズメちゃんになにか、お礼をしないといけないわね」"

[[dialogue]]
speaker = "ウズメイア"
# 「マジですか！？　じゃあ今度、サーシャ先輩とソフィアとあたしの３人で、どっか遊びにいきましょうよ！　もっと仲良くなれるように♪」
line = "「マジですか！？　じゃあ今度、サーシャ先輩とソフィアとあたしの３人で、どっか遊びにいきましょうよ！　もっと仲良くなれるように♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあらうふふ♪　それはとっても面白そうだわ♪」
line = "「あらあらうふふ♪　それはとっても面白そうだわ♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメさん」
line = "「ウズメさん」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ、ソフィア！　ちょうどいいところに来たし――」
line = "「あ、ソフィア！　ちょうどいいところに来たし――」"

[[dialogue]]
speaker = "ソフィア"
# 「今回のこと、ありがとうございました」
line = "「今回のこと、ありがとうございました」"

[[dialogue]]
speaker = "ウズメイア"
# 「え？　ああ、お礼なんていいよ。むしろ、頼まれてないのにあたしが勝手に会長くんのところへ相談しに行っちゃって、ごめんね」
line = "「え？　ああ、お礼なんていいよ。むしろ、頼まれてないのにあたしが勝手に会長くんのところへ相談しに行っちゃって、ごめんね」"

[[dialogue]]
speaker = "ソフィア"
# 「いいえ。心配してくれて、感謝しています」
line = "「いいえ。心配してくれて、感謝しています」"

[[dialogue]]
speaker = "ソフィア"
# 「……こんな機会じゃないとなかなか言えないのが、あれなんですけど」
line = "「……こんな機会じゃないとなかなか言えないのが、あれなんですけど」"

[[dialogue]]
speaker = "ソフィア"
# 「入学した時から、ウズメさんにはいつも感謝しているんです。クラスで話しかけてくれて、一緒に何かしようって言ってくれて」
line = "「入学した時から、ウズメさんにはいつも感謝しているんです。クラスで話しかけてくれて、一緒に何かしようって言ってくれて」"

[[dialogue]]
speaker = "ソフィア"
# 「おかげで私は、クラスの皆とも、こうして姉さんとも仲良くなることができました」
line = "「おかげで私は、クラスの皆とも、こうして姉さんとも仲良くなることができました」"

[[dialogue]]
speaker = "ウズメイア"
# 「あはは♪　大袈裟オオゲサ～。今回、ソフィアの助けになったのは、あたしじゃなくてヴィーナス先輩だったと思うし」
line = "「あはは♪　大袈裟オオゲサ～。今回、ソフィアの助けになったのは、あたしじゃなくてヴィーナス先輩だったと思うし」"

[[dialogue]]
speaker = "ウズメイア"
# 「でも、大袈裟ついでに……ソフィアの性格はよく知ってるから、あたしもなかなか言えなかったんだけど――」
line = "「でも、大袈裟ついでに……ソフィアの性格はよく知ってるから、あたしもなかなか言えなかったんだけど――」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしはソフィアのこと、親友だと思ってるから」
line = "「あたしはソフィアのこと、親友だと思ってるから」"

[[dialogue]]
speaker = "ウズメイア"
# 「だから、力になりたいじゃん？　あたしもなかなか一歩が踏み出せずに、ここまで時間をかけちゃったけど……」
line = "「だから、力になりたいじゃん？　あたしもなかなか一歩が踏み出せずに、ここまで時間をかけちゃったけど……」"

[[dialogue]]
speaker = "ウズメイア"
# 「ソフィアのいい笑顔が見られて、あたしも嬉しいし♪」
line = "「ソフィアのいい笑顔が見られて、あたしも嬉しいし♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメさん……」
line = "「ウズメさん……」"

[[dialogue]]
speaker = "ウズメイア"
# 「ねぇ、あたしも今回のことで、１つやってみようって思いついたことがあるんだけど、聞いてくれる？」
line = "「ねぇ、あたしも今回のことで、１つやってみようって思いついたことがあるんだけど、聞いてくれる？」"

[[dialogue]]
speaker = "ソフィア"
# 「なんでしょう？」
line = "「なんでしょう？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしもさ、サーシャ先輩が呼んでいるみたいに、<b>ソフィ</b>って呼んじゃダメ？」
line = "「あたしもさ、サーシャ先輩が呼んでいるみたいに、<b>ソフィ</b>って呼んじゃダメ？」"

[[dialogue]]
speaker = "ソフィア"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "ウズメイア"
# 「その方がなんか、仲良さそうじゃん？　――どう？」
line = "「その方がなんか、仲良さそうじゃん？　――どう？」"

[[dialogue]]
speaker = "ソフィア"
# 「……じゃあ」
line = "「……じゃあ」"

[[dialogue]]
speaker = "ソフィア"
# 「私も……<b>さん付け</b>じゃなくて、ウズメって呼んでもいいですか？」
line = "「私も……<b>さん付け</b>じゃなくて、ウズメって呼んでもいいですか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ソフィア"
# 「交換条件で……それならいいですよ」
line = "「交換条件で……それならいいですよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「うんっ♪　もちろんだし……ソフィ！」
line = "「うんっ♪　もちろんだし……ソフィ！」"

[[dialogue]]
speaker = "ソフィア"
# 「これからもよろしくお願いします、ウズメ」
line = "「これからもよろしくお願いします、ウズメ」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪」
line = "「あら～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ、イイ感じになったみたいだし……そろそろ参拝に行きましょうか！」
line = "「ふふっ、イイ感じになったみたいだし……そろそろ参拝に行きましょうか！」"

[[dialogue]]
speaker = "unk"
# 素敵な１年になるようにお願いしよう
line = "素敵な１年になるようにお願いしよう"

[[dialogue]]
speaker = "ウズメイア"
# 「待ってました！　お寺だから、合掌して～」
line = "「待ってました！　お寺だから、合掌して～」"

[[dialogue]]
speaker = "ウズメイア"
# 「――今年１年、ここにいる皆ともっと仲良くなれますように♪」
line = "「――今年１年、ここにいる皆ともっと仲良くなれますように♪」"

[[dialogue]]
speaker = "ソフィア"
# 「さすがに祈るのが早いですよ、ウズメ」
line = "「さすがに祈るのが早いですよ、ウズメ」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ～♪」
line = "「えへへ～♪」"

[[dialogue]]
speaker = "unk"
# 舌を小さく出しておどけるウズメに、みんなで笑い合う。
line = "舌を小さく出しておどけるウズメに、みんなで笑い合う。"

[[dialogue]]
speaker = "unk"
# そうして改めて、俺たちは晴れ晴れしい気分で初詣に繰り出すのだった――
line = "そうして改めて、俺たちは晴れ晴れしい気分で初詣に繰り出すのだった――"
