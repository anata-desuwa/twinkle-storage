[[dialogue]]
speaker = "unk"
# 第２話,会長×ジャクリーヌ＝てぇてぇ,P
line = "第２話,会長×ジャクリーヌ＝てぇてぇ,P"

[[dialogue]]
speaker = "ヒトリ"
# 「まさかキャナンシーさんに気に入られて、いきなりハロウィン実行委員会の名誉会長に任命されるなんて……ジャクリーヌちゃんすごいです……！」
line = "「まさかキャナンシーさんに気に入られて、いきなりハロウィン実行委員会の名誉会長に任命されるなんて……ジャクリーヌちゃんすごいです……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆ～ん♪　ハロウィンの大幽霊であるこの余にかかれば、おちゃのこさいさいなの！」
line = "「ゆゆ～ん♪　ハロウィンの大幽霊であるこの余にかかれば、おちゃのこさいさいなの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「こ、これは是非お祝いしないとですね！　今日はわたしと会長さんの奢りです！」
line = "「こ、これは是非お祝いしないとですね！　今日はわたしと会長さんの奢りです！」"

[[dialogue]]
speaker = "unk"
# ああ。遠慮なくお菓子を食べていいぞ！
line = "ああ。遠慮なくお菓子を食べていいぞ！"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆ♪　あとで後悔しても知らないの！」
line = "「ゆーっゆっゆっゆ♪　あとで後悔しても知らないの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌちゃん、まずはどれを食べたいですか？」
line = "「ジャクリーヌちゃん、まずはどれを食べたいですか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それじゃあ……まずはこのバウムクーヘンを食べたいゆ！」
line = "「それじゃあ……まずはこのバウムクーヘンを食べたいゆ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「バウムクーヘンですね！　店員さ～ん、このバウムクーヘンの一番大きいサイズをくださ～い！」
line = "「バウムクーヘンですね！　店員さ～ん、このバウムクーヘンの一番大きいサイズをくださ～い！」"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わたしが切り分けますね……んしょ、んしょ……はい、どうぞ♪」
line = "「わ、わたしが切り分けますね……んしょ、んしょ……はい、どうぞ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それじゃあ、いただきますなの！　あむっ！！」
line = "「それじゃあ、いただきますなの！　あむっ！！」"

[[dialogue]]
speaker = "ヒトリ"
# 「どうですか？　おいしいですか？」
line = "「どうですか？　おいしいですか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「とってもおいしいのー！」
line = "「とってもおいしいのー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「それなら良かったです♪　じゃあ、わたしも……はむっ♪」
line = "「それなら良かったです♪　じゃあ、わたしも……はむっ♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「もぐもぐ、んぐんぐ……ん～～～、最高なの～～～♪」
line = "「もぐもぐ、んぐんぐ……ん～～～、最高なの～～～♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「もぐもぐもぐもぐ！！　はぐはぐはぐはぐ！」
line = "「もぐもぐもぐもぐ！！　はぐはぐはぐはぐ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「やっぱり……わたしはこうして、誰かが食べているのを見る方がいいですね～……」
line = "「やっぱり……わたしはこうして、誰かが食べているのを見る方がいいですね～……」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、あそこにいるのはもしかして……女の子カップルさんっ！？　しかも、あれは……！」
line = "「あ、あそこにいるのはもしかして……女の子カップルさんっ！？　しかも、あれは……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「１つのハート形のストローで顔を近づけさせて飲むという……カップル専用ドリンクじゃないですか……！」
line = "「１つのハート形のストローで顔を近づけさせて飲むという……カップル専用ドリンクじゃないですか……！」"

[[dialogue]]
speaker = "ヒトリ"
# 「はぁぁぁ～～～、会長さん、てぇてぇですよ……まさか、こんなところで拝めるなんて……最高じゃないですか！」
line = "「はぁぁぁ～～～、会長さん、てぇてぇですよ……まさか、こんなところで拝めるなんて……最高じゃないですか！」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー！」
line = "「てーてー！」"

[[dialogue]]
speaker = "unk"
# そ、そうだな
line = "そ、そうだな"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余もあれ、会長とやってみたいの！」
line = "「余もあれ、会長とやってみたいの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「はっ！？　わ、わたし、また自分の世界に入っちゃって……どうしました？」
line = "「はっ！？　わ、わたし、また自分の世界に入っちゃって……どうしました？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒトリが言ってたあのカップル専用ドリンク？　余もやってみたくなったの！」
line = "「ヒトリが言ってたあのカップル専用ドリンク？　余もやってみたくなったの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌちゃん、聞いてたんですね……は、恥ずかしいです……」
line = "「ジャクリーヌちゃん、聞いてたんですね……は、恥ずかしいです……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「早くするのー！」
line = "「早くするのー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「す、すすす、すみません……！　わかりました、今注文しちゃいますね……！」
line = "「す、すすす、すみません……！　わかりました、今注文しちゃいますね……！」"

[[dialogue]]
speaker = "unk"
# 俺でよかったの？
line = "俺でよかったの？"

[[dialogue]]
speaker = "unk"
# カップル専用ドリンクの相手、
line = "カップル専用ドリンクの相手、"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「会長とやりかったの！　……ダメなの？」
line = "「会長とやりかったの！　……ダメなの？」"

[[dialogue]]
speaker = "unk"
# ジャクリーヌが良いなら、別にいいけど……
line = "ジャクリーヌが良いなら、別にいいけど……"

[[dialogue]]
speaker = "unk"
# おそらくあのドリンクの意味を理解していない気もするけど、期待の眼差しで楽しそうに言われると不思議と悪い気はしなかった。
line = "おそらくあのドリンクの意味を理解していない気もするけど、期待の眼差しで楽しそうに言われると不思議と悪い気はしなかった。"

[[dialogue]]
speaker = "ヒトリ"
# 「お、お待たせしました！　はい、どうぞです！」
line = "「お、お待たせしました！　はい、どうぞです！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それじゃあ、行くゆ！」
line = "「それじゃあ、行くゆ！」"

[[dialogue]]
speaker = "unk"
# お互い同時にストローを咥え、ジャクリーヌの顔が近くに来て、俺は思わずドキッとしてしまう。
line = "お互い同時にストローを咥え、ジャクリーヌの顔が近くに来て、俺は思わずドキッとしてしまう。"

[[dialogue]]
speaker = "unk"
# それを悟られないように、グラスに入ったパンプキン味のジュースを飲んでいく。
line = "それを悟られないように、グラスに入ったパンプキン味のジュースを飲んでいく。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「んく、んく、んく……ごっくん……」
line = "「んく、んく、んく……ごっくん……」"

[[dialogue]]
speaker = "ヒトリ"
# 「どうですか？　おいしいですか？」
line = "「どうですか？　おいしいですか？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「おいしいの♪　会長はどうゆ？」
line = "「おいしいの♪　会長はどうゆ？」"

[[dialogue]]
speaker = "unk"
# あ、ああ。おいしいよ
line = "あ、ああ。おいしいよ"

[[dialogue]]
speaker = "unk"
# そう答えたものの、緊張で正直味なんてわからなかった。
line = "そう答えたものの、緊張で正直味なんてわからなかった。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「なら良かったゆ♪　あれ？　でも会長の顔、なんだか赤いの？」
line = "「なら良かったゆ♪　あれ？　でも会長の顔、なんだか赤いの？」"

[[dialogue]]
speaker = "unk"
# な、なんでもない！
line = "な、なんでもない！"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そうなの？　何だかそうしてる会長、可愛いゆ♪　ゆーっゆっゆっゆ♪」
line = "「そうなの？　何だかそうしてる会長、可愛いゆ♪　ゆーっゆっゆっゆ♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「えへへ……ジャクリーヌちゃん、とっても嬉しそう♪　お祝いして良かったです♪」
line = "「えへへ……ジャクリーヌちゃん、とっても嬉しそう♪　お祝いして良かったです♪」"

[[dialogue]]
speaker = "unk"
# こっちの気も知らないで……と思ったが、楽しそうなジャクリーヌの顔を見て、俺はまたドキッとしてしまっていた。
line = "こっちの気も知らないで……と思ったが、楽しそうなジャクリーヌの顔を見て、俺はまたドキッとしてしまっていた。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆ～ん♪　ゆゆ～ん♪」
line = "「ゆゆ～ん♪　ゆゆ～ん♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「なんだか……今のジャクリーヌちゃんと会長さん、とってもてぇてぇ、でしたねぇ……ね、ゆーちゃん？」
line = "「なんだか……今のジャクリーヌちゃんと会長さん、とってもてぇてぇ、でしたねぇ……ね、ゆーちゃん？」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー！」
line = "「てーてー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「これは……もしかしたら、もしかするかもですよ……！」
line = "「これは……もしかしたら、もしかするかもですよ……！」"
