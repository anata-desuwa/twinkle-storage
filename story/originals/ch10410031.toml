[[dialogue]]
speaker = "unk"
# 第１話,モーニングバニー,P
line = "第１話,モーニングバニー,P"

[[dialogue]]
speaker = "ネーゼマイン"
# 「も～♪　会長ってば、リビングで寝ちゃうなんてダメだな～♪」
line = "「も～♪　会長ってば、リビングで寝ちゃうなんてダメだな～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほら会長、朝だよ～♪　起きてー？」
line = "「ほら会長、朝だよ～♪　起きてー？」"

[[dialogue]]
speaker = "unk"
# マイン……？
line = "マイン……？"

[[dialogue]]
speaker = "unk"
# 休日の早朝。耳元でマインの楽しげな声がする……？
line = "休日の早朝。耳元でマインの楽しげな声がする……？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、やっと起きた♪　はろはろ～<emoji=heart04>」
line = "「あ～、やっと起きた♪　はろはろ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# どうしてバニーに！？
line = "どうしてバニーに！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひ♪　せっかくダッチにもらった衣装だし、戦闘以外でも着なきゃもったいないかな～って」
line = "「にひ♪　せっかくダッチにもらった衣装だし、戦闘以外でも着なきゃもったいないかな～って」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長の驚く顔が見たくてサプライズだよ～♪　どぉかな？　可愛い後輩彼女のバニー衣装～♪」
line = "「会長の驚く顔が見たくてサプライズだよ～♪　どぉかな？　可愛い後輩彼女のバニー衣装～♪」"

[[dialogue]]
speaker = "unk"
# 母さんに見られる前に着替えて！？
line = "母さんに見られる前に着替えて！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ざ～んねん♪　もうリノさんにはさっき、この格好でご挨拶しちゃった<emoji=heart04>」
line = "「ざ～んねん♪　もうリノさんにはさっき、この格好でご挨拶しちゃった<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長にこの格好で起こせって命令されて仕方なく……よよよ～……って♪」
line = "「会長にこの格好で起こせって命令されて仕方なく……よよよ～……って♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「怒ってたよ～♪　あとでお説教ね～って言い残して、お買い物に行っちゃった♪」
line = "「怒ってたよ～♪　あとでお説教ね～って言い残して、お買い物に行っちゃった♪」"

[[dialogue]]
speaker = "unk"
# 理不尽すぎる！？
line = "理不尽すぎる！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　ごめんね～。最近あんまりイタズラしてなかったでしょ？　ストレスゲージ溜まっちゃってさ～、つい<emoji=heart04>」
line = "「にひひ♪　ごめんね～。最近あんまりイタズラしてなかったでしょ？　ストレスゲージ溜まっちゃってさ～、つい<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マインは定期的に『悪いことをしたくなる発作』が訪れる。
line = "マインは定期的に『悪いことをしたくなる発作』が訪れる。"

[[dialogue]]
speaker = "unk"
# その衝動を抑えるには、ストレスを溜めないことが一番だ。欲求不満の解消相手として、恋人の俺を利用してくれていいとは伝えてあるのだけど……
line = "その衝動を抑えるには、ストレスを溜めないことが一番だ。欲求不満の解消相手として、恋人の俺を利用してくれていいとは伝えてあるのだけど……"

[[dialogue]]
speaker = "unk"
# 今日のイタズラはなかなか手厳しいなあと思うのだった──
line = "今日のイタズラはなかなか手厳しいなあと思うのだった──"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はいは～い、動かな～い♪　耳かきしてるんだから、奥までぶすってイっちゃったらイヤでしょー？」
line = "「はいは～い、動かな～い♪　耳かきしてるんだから、奥までぶすってイっちゃったらイヤでしょー？」"

[[dialogue]]
speaker = "unk"
# どうして急に耳かきを……？
line = "どうして急に耳かきを……？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んー？　会長、バニーの私のおっぱいだけじゃなく、太もももすっごい見てくるから……膝枕してあげたら喜ぶかな～って♪」
line = "「んー？　会長、バニーの私のおっぱいだけじゃなく、太もももすっごい見てくるから……膝枕してあげたら喜ぶかな～って♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「かき、かき、かき～……っと♪　それにウサギって穴掘りが好きっしょ？」
line = "「かき、かき、かき～……っと♪　それにウサギって穴掘りが好きっしょ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「この衣装に着替えてから、本能が疼くってゆーか。会長のお耳、ほじほじしたいな～って衝動が……<emoji=heart04>」
line = "「この衣装に着替えてから、本能が疼くってゆーか。会長のお耳、ほじほじしたいな～って衝動が……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 絶対にそれは嘘だ！
line = "絶対にそれは嘘だ！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ま～ね～。私がしたいだけかも……にひ♪　面白いな～。耳の穴が綺麗になってくのって楽しいね～」
line = "「ま～ね～。私がしたいだけかも……にひ♪　面白いな～。耳の穴が綺麗になってくのって楽しいね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これからも耳かき、予約しとこ～っと。他の女の子にさせちゃだめだよー？　もちろん自分でするのも禁止ね♪」
line = "「これからも耳かき、予約しとこ～っと。他の女の子にさせちゃだめだよー？　もちろん自分でするのも禁止ね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「かきかき、かき～……<emoji=heart04>　今日は休日だしゆっくりしよーね会長。リノさんが買い物から帰ってきたら、３人でお昼食べよっか」
line = "「かきかき、かき～……<emoji=heart04>　今日は休日だしゆっくりしよーね会長。リノさんが買い物から帰ってきたら、３人でお昼食べよっか」"

[[dialogue]]
speaker = "unk"
# 母さんが帰ってくるまでに着替えて……！
line = "母さんが帰ってくるまでに着替えて……！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え～、そんなのつまんないよー……♪　ん、よーし。耳かきお～わり<emoji=heart04>」
line = "「え～、そんなのつまんないよー……♪　ん、よーし。耳かきお～わり<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はーい会長、ソファに座ってー……ＯＫ♪　それじゃあ──」
line = "「はーい会長、ソファに座ってー……ＯＫ♪　それじゃあ──」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だ～いぶっ<emoji=heart04>　ギュー……<emoji=heart04>」
line = "「だ～いぶっ<emoji=heart04>　ギュー……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長の首の後ろに手をまわして、間近でジ～っ……<emoji=heart04>　にひひ♪　寝癖まだ残ってるねー、か～わいい<emoji=heart04>」
line = "「会長の首の後ろに手をまわして、間近でジ～っ……<emoji=heart04>　にひひ♪　寝癖まだ残ってるねー、か～わいい<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～？　会長、なんだかすっごく物欲しそうな顔してるー……<emoji=heart04>」
line = "「ん～？　会長、なんだかすっごく物欲しそうな顔してるー……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「したいことがあるならー、声に出して言ってくれないと、わかんないな～♪」
line = "「したいことがあるならー、声に出して言ってくれないと、わかんないな～♪」"

[[dialogue]]
speaker = "unk"
# マインとキスしたい……
line = "マインとキスしたい……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ<emoji=heart04>　しょうがないな～、彼氏のおねだりだしー、応えてあげよっかな<emoji=heart04>」
line = "「にひひ<emoji=heart04>　しょうがないな～、彼氏のおねだりだしー、応えてあげよっかな<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んー……ちゅ<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅぅっ……ちゅ<emoji=heart04>」
line = "「んー……ちゅ<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅぅっ……ちゅ<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「どーお？　日曜の朝から恋人に耳かきしてもらってー<emoji=heart04>　ぎゅーってハグもしてもらってからの、キス<emoji=heart04>　んちゅ、ちゅー……<emoji=heart04>」
line = "「どーお？　日曜の朝から恋人に耳かきしてもらってー<emoji=heart04>　ぎゅーってハグもしてもらってからの、キス<emoji=heart04>　んちゅ、ちゅー……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ぷぁ♪　最高の気分？　にひひー……でも会長、油断してるね～？」
line = "「ぷぁ♪　最高の気分？　にひひー……でも会長、油断してるね～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私は今日、イタズラをしに来たんだよー？　ふふふー……<emoji=heart04>」
line = "「私は今日、イタズラをしに来たんだよー？　ふふふー……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
# 「──ただいま～♪」
line = "「──ただいま～♪」"

[[dialogue]]
speaker = "unk"
# マイン、離れて──
line = "マイン、離れて──"

[[dialogue]]
speaker = "unk"
# 母さんが帰ってきた！
line = "母さんが帰ってきた！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「──にひ♪　待ってました～、この<ruby=とき>瞬間</ruby>をねっ♪」
line = "「──にひ♪　待ってました～、この<ruby>瞬間<rt>とき</rt></ruby>をねっ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んー、ちゅっ<emoji=heart04>　ちゅっ<emoji=heart04>　……ちゅっちゅっちゅっ、ちゅー<emoji=heart04>」
line = "「んー、ちゅっ<emoji=heart04>　ちゅっ<emoji=heart04>　……ちゅっちゅっちゅっ、ちゅー<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マイン！？　もうキスはやめて……！？
line = "マイン！？　もうキスはやめて……！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えー。寂しいこと言わないでよ～。んちゅ、ちゅ<emoji=heart04>　ちゅっちゅ、ちゅー<emoji=heart04>」
line = "「えー。寂しいこと言わないでよ～。んちゅ、ちゅ<emoji=heart04>　ちゅっちゅ、ちゅー<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ぎりぎりまでちゅーしよ<emoji=heart04>　にひ～、面白いイタズラでしょ？　んちゅ、ちゅ～っ<emoji=heart04>」
line = "「ぎりぎりまでちゅーしよ<emoji=heart04>　にひ～、面白いイタズラでしょ？　んちゅ、ちゅ～っ<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
# 「クロト～？　もう起きてるー？」
line = "「クロト～？　もう起きてるー？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「リノさん近づいてくるねー<emoji=heart04>　んちゅ<emoji=heart04>　キスしてるのバレちゃうねー<emoji=heart04>　んちゅ、ちゅ、ちゅっちゅっちゅ、んちゅー<emoji=heart04>」
line = "「リノさん近づいてくるねー<emoji=heart04>　んちゅ<emoji=heart04>　キスしてるのバレちゃうねー<emoji=heart04>　んちゅ、ちゅ、ちゅっちゅっちゅ、んちゅー<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# むむむむ～っ！？
line = "むむむむ～っ！？"

[[dialogue]]
speaker = "unk"
# やばいやばいやばい！　母さんにバレる！！　リビングの扉の向こうに影が見える──！？
line = "やばいやばいやばい！　母さんにバレる！！　リビングの扉の向こうに影が見える──！？"

[[dialogue]]
speaker = "unk"
# 扉が開いた瞬間、マインは実に鮮やかな身のこなしで俺から離れていた──
line = "扉が開いた瞬間、マインは実に鮮やかな身のこなしで俺から離れていた──"

[[dialogue]]
speaker = "ネーゼマイン"
# 「お帰りなさ～い、リノさん♪」
line = "「お帰りなさ～い、リノさん♪」"

[[dialogue]]
speaker = "リノ"
# 「マインちゃん、ただいま──」
line = "「マインちゃん、ただいま──」"

[[dialogue]]
speaker = "リノ"
# 「って！？　ク～ロ～ト～……！　まだこの格好させてたのっ！？」
line = "「って！？　ク～ロ～ト～……！　まだこの格好させてたのっ！？」"

[[dialogue]]
speaker = "リノ"
# 「いくらお付き合いしてるからって、こんな服を着させるんじゃありません！　<ruby=たちくち>立朽</ruby>さんのご両親に怒られちゃうでしょ～！？」
line = "「いくらお付き合いしてるからって、こんな服を着させるんじゃありません！　<ruby>立朽<rt>たちくち</rt></ruby>さんのご両親に怒られちゃうでしょ～！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……にひひ～♪」
line = "「……にひひ～♪」"

[[dialogue]]
speaker = "unk"
# 『マインが勝手に着たんだ』なんて言っても信じてもらえるわけもなく、俺はただ頷くしかないのだった。
line = "『マインが勝手に着たんだ』なんて言っても信じてもらえるわけもなく、俺はただ頷くしかないのだった。"

[[dialogue]]
speaker = "unk"
# くそー……このイタズラのお返し、いつか必ずしてやるからな！
line = "くそー……このイタズラのお返し、いつか必ずしてやるからな！"
