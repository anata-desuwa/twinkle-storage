line = "「はああぁ～っ……<emoji=heart04>　会長のおち○ちんが、わたくしの中にっ……<emoji=heart04>　はあぁっ……ふうぅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
