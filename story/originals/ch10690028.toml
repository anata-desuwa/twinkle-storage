[[dialogue]]
speaker = "unk"
# セシアと恋人関係になってからの期間も長くなって来た、とある休日の夜。
line = "セシアと恋人関係になってからの期間も長くなって来た、とある休日の夜。"

[[dialogue]]
speaker = "セシア"
# 「会長、メリークリスマス♪」
line = "「会長、メリークリスマス♪」"

[[dialogue]]
speaker = "クロト"
# 「セシア、なんでクリスマス衣装に……？」
line = "「セシア、なんでクリスマス衣装に……？」"

[[dialogue]]
speaker = "unk"
# ちなみに今日は、クリスマス当日というわけではない。
line = "ちなみに今日は、クリスマス当日というわけではない。"

[[dialogue]]
speaker = "unk"
# まだ肌寒い冬の時期ではあるが、学園のクリスマスパーティーは、もう大分前に終わってしまっていた。
line = "まだ肌寒い冬の時期ではあるが、学園のクリスマスパーティーは、もう大分前に終わってしまっていた。"

[[dialogue]]
speaker = "セシア"
# 「ふふっ、クリスマスはもう過ぎちゃったけど、今日はわたくしがプレゼントよ<emoji=heart04>　――なんちゃって♪」
line = "「ふふっ、クリスマスはもう過ぎちゃったけど、今日はわたくしがプレゼントよ<emoji=heart04>　――なんちゃって♪」"

[[dialogue]]
speaker = "セシア"
# 「紅明ママが、こうしたら会長は喜ぶはずだって、また教えてくれたの♪」
line = "「紅明ママが、こうしたら会長は喜ぶはずだって、また教えてくれたの♪」"

[[dialogue]]
speaker = "クロト"
# 「うーむ、紅明なぁ……」
line = "「うーむ、紅明なぁ……」"

[[dialogue]]
speaker = "unk"
# またセシアに変なことを教えたりして……と思う一方で、確かに男としては喜んでしまう自分もいる。
line = "またセシアに変なことを教えたりして……と思う一方で、確かに男としては喜んでしまう自分もいる。"

[[dialogue]]
speaker = "セシア"
# 「それで……会長、どうかしら？　今日は約束していた日でしょ？」
line = "「それで……会長、どうかしら？　今日は約束していた日でしょ？」"

[[dialogue]]
speaker = "セシア"
# 「――わたくしと最後まで初体験をする、って」
line = "「――わたくしと最後まで初体験をする、って」"

[[dialogue]]
speaker = "セシア"
# 「わたくしからのプレゼント……わたくしの初めて、貰ってくれるかしら？」
line = "「わたくしからのプレゼント……わたくしの初めて、貰ってくれるかしら？」"

[[dialogue]]
speaker = "unk"
# 俺はごくりと唾を飲み込む。
line = "俺はごくりと唾を飲み込む。"

[[dialogue]]
speaker = "unk"
# そう……俺はセシアからの強い押しに陥落して、ついに今日、『最後までエッチをする』という約束を交わしていたのだった。
line = "そう……俺はセシアからの強い押しに陥落して、ついに今日、『最後までエッチをする』という約束を交わしていたのだった。"

[[dialogue]]
speaker = "クロト"
# 「本当に、いいんだな……？」
line = "「本当に、いいんだな……？」"

[[dialogue]]
speaker = "セシア"
# 「ええ。わたくしは――」
line = "「ええ。わたくしは――」"

[[dialogue]]
speaker = "セシア"
# 「最初から、会長としたいって、ずっと思っていたわよ？　ふふっ<emoji=heart04>」
line = "「最初から、会長としたいって、ずっと思っていたわよ？　ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# セシアはいつもする時みたいに、霊力を使ってふわっと体を浮き上がらせる。目線が同じ高さになって――
line = "セシアはいつもする時みたいに、霊力を使ってふわっと体を浮き上がらせる。目線が同じ高さになって――"

[[dialogue]]
speaker = "セシア"
# 「会長……<emoji=heart04>　ん……<emoji=heart04>」
line = "「会長……<emoji=heart04>　ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は彼女を抱き寄せて、そっとキスをする。
line = "俺は彼女を抱き寄せて、そっとキスをする。"

[[dialogue]]
speaker = "セシア"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「んっ……ちゅっ……<emoji=heart04>　はあぁ……<emoji=heart04>」
line = "「んっ……ちゅっ……<emoji=heart04>　はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「会長、いつもみたいに舌を絡める、エッチなキスもしたいわ<emoji=heart04>　はい、あ～ん<emoji=heart04>」
line = "「会長、いつもみたいに舌を絡める、エッチなキスもしたいわ<emoji=heart04>　はい、あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# セシアに促されて口を開けると、今度は彼女の方からキスをして、小さな舌が入り込んで来る。
line = "セシアに促されて口を開けると、今度は彼女の方からキスをして、小さな舌が入り込んで来る。"

[[dialogue]]
speaker = "セシア"
# 「んむっ……<emoji=heart04>　んちゅっ<emoji=heart04>　ちゅぱっ<emoji=heart04>　れろちゅっ……<emoji=heart04>」
line = "「んむっ……<emoji=heart04>　んちゅっ<emoji=heart04>　ちゅぱっ<emoji=heart04>　れろちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「あっ……<emoji=heart04>　会長の舌も、わたくしの口の中に入ってきた……<emoji=heart04>　んっ……ちゅうっ……<emoji=heart04>」
line = "「あっ……<emoji=heart04>　会長の舌も、わたくしの口の中に入ってきた……<emoji=heart04>　んっ……ちゅうっ……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「ちゅぱっ……<emoji=heart04>　わたくしが、ママみたいに優しく受け止めて、いいこいいこしてあげるわ<emoji=heart04>　ちゅっ……<emoji=heart04>　ちゅぷっ……ちゅむるっ……れろちゅっ<emoji=heart04>」
line = "「ちゅぱっ……<emoji=heart04>　わたくしが、ママみたいに優しく受け止めて、いいこいいこしてあげるわ<emoji=heart04>　ちゅっ……<emoji=heart04>　ちゅぷっ……ちゅむるっ……れろちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「はあぁ……<emoji=heart04>　んむっ、ちゅぷっ<emoji=heart04>　ちゅぷぷっ……<emoji=heart04>　れろちゅっ<emoji=heart04>　ちゅるるっ……ちゅむっ<emoji=heart04>　ちゅぱっ……れるれるっ<emoji=heart04>　ちゅれるっ<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　んむっ、ちゅぷっ<emoji=heart04>　ちゅぷぷっ……<emoji=heart04>　れろちゅっ<emoji=heart04>　ちゅるるっ……ちゅむっ<emoji=heart04>　ちゅぱっ……れるれるっ<emoji=heart04>　ちゅれるっ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「んっ<emoji=heart04>　やっぱり、エッチなキス……気持ちいいわ<emoji=heart04>　ちゅぷっ……ちゅぷぷっ<emoji=heart04>　ちゅっ、ちゅぅっ<emoji=heart04>　ちゅれるっ……れるれるっ<emoji=heart04>　ちゅるるっ……れろちゅっ<emoji=heart04>」
line = "「んっ<emoji=heart04>　やっぱり、エッチなキス……気持ちいいわ<emoji=heart04>　ちゅぷっ……ちゅぷぷっ<emoji=heart04>　ちゅっ、ちゅぅっ<emoji=heart04>　ちゅれるっ……れるれるっ<emoji=heart04>　ちゅるるっ……れろちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「ちゅっ……ちゅむむっ<emoji=heart04>　ちゅむるっ……れろちゅっ<emoji=heart04>　ちゅぱっ……ぷはっ――はあぁ……<emoji=heart04>　わたくし興奮して、おま○こ濡れてきちゃった……<emoji=heart04>」
line = "「ちゅっ……ちゅむむっ<emoji=heart04>　ちゅむるっ……れろちゅっ<emoji=heart04>　ちゅぱっ……ぷはっ――はあぁ……<emoji=heart04>　わたくし興奮して、おま○こ濡れてきちゃった……<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「ふふっ<emoji=heart04>　それに会長も、ズボンが破れちゃいそうなくらい、大きくなってるわよ？　ズボン越しでも、固くて熱いのが伝わってくるわ<emoji=heart04>」
line = "「ふふっ<emoji=heart04>　それに会長も、ズボンが破れちゃいそうなくらい、大きくなってるわよ？　ズボン越しでも、固くて熱いのが伝わってくるわ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「ねぇ、そろそろ……お部屋に行きましょうか<emoji=heart04>」
line = "「ねぇ、そろそろ……お部屋に行きましょうか<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺たちはそれから、寝室へと移動して――
line = "俺たちはそれから、寝室へと移動して――"

[[dialogue]]
speaker = "セシア"
# 「ふふっ……はい、会長<emoji=heart04>　これが今日、あなただけのものになる、わたくしの処女おま○こよ<emoji=heart04>」
line = "「ふふっ……はい、会長<emoji=heart04>　これが今日、あなただけのものになる、わたくしの処女おま○こよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# セシアはベッドに仰向けになると、両足を抱えて広げ、自ら腰を上げて濡れたおま○この穴を見せつけてくる。
line = "セシアはベッドに仰向けになると、両足を抱えて広げ、自ら腰を上げて濡れたおま○この穴を見せつけてくる。"

[[dialogue]]
speaker = "クロト"
# 「っ……そ、それも紅明に教わった誘い方なのか？」
line = "「っ……そ、それも紅明に教わった誘い方なのか？」"

[[dialogue]]
speaker = "unk"
# セシアの幼い容姿から繰り出されるエッチな言い回しのギャップに、俺のペニスはますますギンギンに勃起してしまう。
line = "セシアの幼い容姿から繰り出されるエッチな言い回しのギャップに、俺のペニスはますますギンギンに勃起してしまう。"

[[dialogue]]
speaker = "セシア"
# 「ええ<emoji=heart04>　どうやら、効果はあったみたいね<emoji=heart04>」
line = "「ええ<emoji=heart04>　どうやら、効果はあったみたいね<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「会長のおち○ちん、わたくしの中に早く入りたい<emoji=heart04>　って期待して、大きくなってるわ。ふふっ<emoji=heart04>」
line = "「会長のおち○ちん、わたくしの中に早く入りたい<emoji=heart04>　って期待して、大きくなってるわ。ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「――あんっ<emoji=heart04>　会長のがおま○こに擦れて……<emoji=heart04>　あっ、んっ<emoji=heart04>　はあぁ……ふうぅ<emoji=heart04>」
line = "「――あんっ<emoji=heart04>　会長のがおま○こに擦れて……<emoji=heart04>　あっ、んっ<emoji=heart04>　はあぁ……ふうぅ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「はあぁ<emoji=heart04>　すごい……<emoji=heart04>　熱くて、固くて<emoji=heart04>　んんっ……逞しいわ<emoji=heart04>　あっ<emoji=heart04>　はあぁっ……んうぅ<emoji=heart04>」
line = "「はあぁ<emoji=heart04>　すごい……<emoji=heart04>　熱くて、固くて<emoji=heart04>　んんっ……逞しいわ<emoji=heart04>　あっ<emoji=heart04>　はあぁっ……んうぅ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「ふあぁっ<emoji=heart04>　わたくしのクリ、会長のおち○ちんに当たって……んあぁっ<emoji=heart04>　擦れて感じちゃう……んっ<emoji=heart04>　あっ……<emoji=heart04>　はあぁ……ふうぅ<emoji=heart04>」
line = "「ふあぁっ<emoji=heart04>　わたくしのクリ、会長のおち○ちんに当たって……んあぁっ<emoji=heart04>　擦れて感じちゃう……んっ<emoji=heart04>　あっ……<emoji=heart04>　はあぁ……ふうぅ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「あんっ<emoji=heart04>　会長……お尻を揉む手がエッチよ……<emoji=heart04>　はあぁっ……んんっ<emoji=heart04>」
line = "「あんっ<emoji=heart04>　会長……お尻を揉む手がエッチよ……<emoji=heart04>　はあぁっ……んんっ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「あっ<emoji=heart04>　太ももを撫でられて……<emoji=heart04>　ふうぅ……んんっ<emoji=heart04>　あっ……んっ<emoji=heart04>　はあぁ……ふうぅ……<emoji=heart04>」
line = "「あっ<emoji=heart04>　太ももを撫でられて……<emoji=heart04>　ふうぅ……んんっ<emoji=heart04>　あっ……んっ<emoji=heart04>　はあぁ……ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「セシアのおま○こ、愛液がどんどん溢れて来てる」
line = "「セシアのおま○こ、愛液がどんどん溢れて来てる」"

[[dialogue]]
speaker = "セシア"
# 「だってぇ……んんっ<emoji=heart04>　今日までおち○ちんを挿れない代わりに、会長の手でいっぱい、エッチな経験を蓄積してきたから……<emoji=heart04>　あっ、あんっ<emoji=heart04>」
line = "「だってぇ……んんっ<emoji=heart04>　今日までおち○ちんを挿れない代わりに、会長の手でいっぱい、エッチな経験を蓄積してきたから……<emoji=heart04>　あっ、あんっ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「触られるだけで……はあぁ<emoji=heart04>　気持ちいいのを思い出して、体が反応しちゃうの……<emoji=heart04>」
line = "「触られるだけで……はあぁ<emoji=heart04>　気持ちいいのを思い出して、体が反応しちゃうの……<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
# 「っ……その反応は、すごくエッチだ」
line = "「っ……その反応は、すごくエッチだ」"

[[dialogue]]
speaker = "セシア"
# 「んっ<emoji=heart04>　会長、わたくし、期待で頭がいっぱいになって……おま○こ、ウズウズしちゃってるの<emoji=heart04>　だから――」
line = "「んっ<emoji=heart04>　会長、わたくし、期待で頭がいっぱいになって……おま○こ、ウズウズしちゃってるの<emoji=heart04>　だから――」"

[[dialogue]]
speaker = "セシア"
# 「もう、挿れて……<emoji=heart04>」
line = "「もう、挿れて……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は再び、ごくりと唾を飲む。
line = "俺は再び、ごくりと唾を飲む。"

[[dialogue]]
speaker = "unk"
# ――いよいよだ。セシアの体がエッチをするにはまだ小さいから、という理由で今日まで本番を避けてきた。
line = "――いよいよだ。セシアの体がエッチをするにはまだ小さいから、という理由で今日まで本番を避けてきた。"

[[dialogue]]
speaker = "セシア"
# 「あんっ……<emoji=heart04>　会長<emoji=heart04>」
line = "「あんっ……<emoji=heart04>　会長<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 正式な恋人になって、素股や手マン手コキといった相互愛撫は何度も続けていた。
line = "正式な恋人になって、素股や手マン手コキといった相互愛撫は何度も続けていた。"

[[dialogue]]
speaker = "unk"
# そうするうちに、だんだんセシアの体がほぐれていって、より大きなものを受け入れられるようになってきた。
line = "そうするうちに、だんだんセシアの体がほぐれていって、より大きなものを受け入れられるようになってきた。"

[[dialogue]]
speaker = "セシア"
# 「ふあぁっ……<emoji=heart04>　ヌルヌルのおち○ちん、当たってる……<emoji=heart04>」
line = "「ふあぁっ……<emoji=heart04>　ヌルヌルのおち○ちん、当たってる……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして今日、ようやく本番をしよう、ということになったのだった。
