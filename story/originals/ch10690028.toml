line = "「っ……！　――あっ<emoji=heart04>　ふあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ぐっと押し破って、俺はついにセシアのおま○この中に初挿入を果たした。
