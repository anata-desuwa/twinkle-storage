[[dialogue]]
speaker = "セシア"
# 「大丈夫よ、会長、落ち着いて。んっ……<emoji=heart04>　おま○この穴は……ほら、ここよ<emoji=heart04>」
line = "「大丈夫よ、会長、落ち着いて。んっ……<emoji=heart04>　おま○この穴は……ほら、ここよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# セシアの小さな手が伸び、そっとペニスに触れて、先端をおま○この穴の前まで誘導してくれる。
line = "セシアの小さな手が伸び、そっとペニスに触れて、先端をおま○この穴の前まで誘導してくれる。"

