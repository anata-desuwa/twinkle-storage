line = "「セシア、挿れるぞ？」"

[[dialogue]]
speaker = "セシア"
# 「ええ、会長――」
line = "「ええ、会長――」"

[[dialogue]]
speaker = "セシア"
# 「わたくしの初めてのおま○こ……どうぞ召し上がれ<emoji=heart04>」
line = "「わたくしの初めてのおま○こ……どうぞ召し上がれ<emoji=heart04>」"

[[dialogue]]
speaker = "セシア"
# 「あっ……<emoji=heart04>　おち○ちん、入って――っ<emoji=heart04><emoji=heart04>」
line = "「あっ……<emoji=heart04>　おち○ちん、入って――っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は彼女の中にペニスの先っぽをゆっくりと入れて、処女膜のところに行き当たると――
line = "俺は彼女の中にペニスの先っぽをゆっくりと入れて、処女膜のところに行き当たると――"

[[dialogue]]
speaker = "セシア"
