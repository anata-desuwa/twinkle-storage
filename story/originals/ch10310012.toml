[[dialogue]]
speaker = "unk"
# 第２話,アニマファーストコンタクト・後編,P
line = "第２話,アニマファーストコンタクト・後編,P"

[[dialogue]]
speaker = "unk"
# 前略。アニマ先輩の薬を飲んで、副作用で盛大に爆発した。
line = "前略。アニマ先輩の薬を飲んで、副作用で盛大に爆発した。"

[[dialogue]]
speaker = "アニマ"
# 「ケホッ、ケホッ、爆発の煙で一面真っ白だナ……無事かね、会長？　……おや？」
line = "「ケホッ、ケホッ、爆発の煙で一面真っ白だナ……無事かね、会長？　……おや？」"

[[dialogue]]
speaker = "アニマ"
# 「……フヒヒッ、ヒヒヒッ、ハハハハハッ！　何ということダ、素晴らしい！　アニマが錬金術で仕上げをしてあげるヨ。そら、制服ダ！」
line = "「……フヒヒッ、ヒヒヒッ、ハハハハハッ！　何ということダ、素晴らしい！　アニマが錬金術で仕上げをしてあげるヨ。そら、制服ダ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「煙がようやく収まったわね。クロト、無事！？　……って、あなた誰！？」
line = "「煙がようやく収まったわね。クロト、無事！？　……って、あなた誰！？」"

[[dialogue]]
speaker = "マトイ"
# 「いやでも、どことなく……まさか、会長！？」
line = "「いやでも、どことなく……まさか、会長！？」"

[[dialogue]]
speaker = "unk"
# な……なんだよ、２人とも。どういうことだ？
line = "な……なんだよ、２人とも。どういうことだ？"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと自分で鏡を見てみなさい！　手鏡貸してあげるから！」
line = "「ちょっと自分で鏡を見てみなさい！　手鏡貸してあげるから！」"

[[dialogue]]
speaker = "アニマ"
# 「それなら、アニマが錬金術でスタンドミラーも出してあげるヨ。フヒ、そっちの方が見やすいダロウ？」
line = "「それなら、アニマが錬金術でスタンドミラーも出してあげるヨ。フヒ、そっちの方が見やすいダロウ？」"

[[dialogue]]
speaker = "アニマ"
# 「錬成陣展開。──よし、出来たゾ。見てみるといい……フヒヒッ」
line = "「錬成陣展開。──よし、出来たゾ。見てみるといい……フヒヒッ」"

[[dialogue]]
speaker = "unk"
# な……なんじゃこりゃあああぁぁぁ──ッ！？
line = "な……なんじゃこりゃあああぁぁぁ──ッ！？"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ、ハハハハハッ！　見事過ぎる程に、美少女に変身してるゾ、会長！　キミは薬の副作用で女体化したというわけダ！」
line = "「フヒッ、ハハハハハッ！　見事過ぎる程に、美少女に変身してるゾ、会長！　キミは薬の副作用で女体化したというわけダ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「か、可愛い……絶世の美少女だわ！　というか、胸が『可愛さ余って肉１００倍』になってるわよ！」
line = "「か、可愛い……絶世の美少女だわ！　というか、胸が『可愛さ余って肉１００倍』になってるわよ！」"

[[dialogue]]
speaker = "アニマ"
# 「ことわざが間違っているが……フヒヒッ、確かにとんでもない爆乳だゾ、会長。ちょっと失礼」
line = "「ことわざが間違っているが……フヒヒッ、確かにとんでもない爆乳だゾ、会長。ちょっと失礼」"

[[dialogue]]
speaker = "unk"
# きゃあぁぁぁっ！？　どこ触ってんの！？
line = "きゃあぁぁぁっ！？　どこ触ってんの！？"

[[dialogue]]
speaker = "アニマ"
# 「ハハハッ！　可愛い声が出たナ。アニマの鑑定によると……スリーサイズはなんと上から９９・６１・８９ダ！　カップサイズは脅威のＩカップ！」
line = "「ハハハッ！　可愛い声が出たナ。アニマの鑑定によると……スリーサイズはなんと上から９９・６１・８９ダ！　カップサイズは脅威のＩカップ！」"

[[dialogue]]
speaker = "マトイ"
# 「星徒会最強のサーシャさんより上！？」
line = "「星徒会最強のサーシャさんより上！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「可愛さ余って憎さ１００倍よ、クロト！」
line = "「可愛さ余って憎さ１００倍よ、クロト！」"

[[dialogue]]
speaker = "マトイ"
# 「嫉妬でことわざが一致した！？」
line = "「嫉妬でことわざが一致した！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というか、全身から美少女オーラが溢れてて、後光がさしてるみたいに眩しいんだけど……これはひょっとして星力なの！？」
line = "「というか、全身から美少女オーラが溢れてて、後光がさしてるみたいに眩しいんだけど……これはひょっとして星力なの！？」"

[[dialogue]]
speaker = "アニマ"
# 「その通りだヨ、ヴィーナス。実験は成功ダ！　会長は今、美少女に変身した上に星力も倍増した、まさに最強形態というわけサ！」
line = "「その通りだヨ、ヴィーナス。実験は成功ダ！　会長は今、美少女に変身した上に星力も倍増した、まさに最強形態というわけサ！」"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ、ハハハハハッ！　実に素晴らしイ！」
line = "「フヒッ、ハハハハハッ！　実に素晴らしイ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いやこれ……きっと私の星力を上回ってるわよ？　副作用の性転換を差し引いても、本当に対リクリエの切り札になり得るんじゃ……」
line = "「いやこれ……きっと私の星力を上回ってるわよ？　副作用の性転換を差し引いても、本当に対リクリエの切り札になり得るんじゃ……」"

[[dialogue]]
speaker = "unk"
# お花摘みに行きたい……！
line = "お花摘みに行きたい……！"

[[dialogue]]
speaker = "アニマ"
# 「フム……利尿作用もアリ、と」
line = "「フム……利尿作用もアリ、と」"

[[dialogue]]
speaker = "マトイ"
# 「お茶かな！？」
line = "「お茶かな！？」"

[[dialogue]]
speaker = "アニマ"
# 「いや、ちょっと待ちたまえ会長。思ったのだが……キミ、トイレのやり方は分かるのかい？」
line = "「いや、ちょっと待ちたまえ会長。思ったのだが……キミ、トイレのやり方は分かるのかい？」"

[[dialogue]]
speaker = "マトイ"
# 「そういえば、確かに……」
line = "「そういえば、確かに……」"

[[dialogue]]
speaker = "アニマ"
# 「今回の実験、アニマは凄く感謝している。おかげで世界を救う発明に大きく貢献しタ」
line = "「今回の実験、アニマは凄く感謝している。おかげで世界を救う発明に大きく貢献しタ」"

[[dialogue]]
speaker = "アニマ"
# 「──故にダ。キミの手伝いくらい、喜んで引き受けるヨ」
line = "「──故にダ。キミの手伝いくらい、喜んで引き受けるヨ」"

[[dialogue]]
speaker = "unk"
# いやいやいやいやいや大丈夫です！
line = "いやいやいやいやいや大丈夫です！"

[[dialogue]]
speaker = "アニマ"
# 「なに、遠慮するな。男と女だと体の構造は大きく異なる。初めてだと難儀すると思うゾ？」
line = "「なに、遠慮するな。男と女だと体の構造は大きく異なる。初めてだと難儀すると思うゾ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ち、ちょっと先輩！？　いきなり何言い出してるの！？」
line = "「ち、ちょっと先輩！？　いきなり何言い出してるの！？」"

[[dialogue]]
speaker = "アニマ"
# 「何って……初めてだと困るダロウ？　実験に協力してもらった身としては、シモの世話まで面倒みるのが責任というものダ」
line = "「何って……初めてだと困るダロウ？　実験に協力してもらった身としては、シモの世話まで面倒みるのが責任というものダ」"

[[dialogue]]
speaker = "マトイ"
# 「ダ、ダメです！　男女２人きりで、それは色々とマズいでしょう！？　普通に考えて！」
line = "「ダ、ダメです！　男女２人きりで、それは色々とマズいでしょう！？　普通に考えて！」"

[[dialogue]]
speaker = "アニマ"
# 「２人だとマズいのカ？　ならば、ヴィーナスとマトイも、一緒に来ればいいのでは？」
line = "「２人だとマズいのカ？　ならば、ヴィーナスとマトイも、一緒に来ればいいのでは？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "アニマ"
# 「３人で教えるのでも、アニマは別に構わないゾ」
line = "「３人で教えるのでも、アニマは別に構わないゾ」"

[[dialogue]]
speaker = "マトイ"
# 「ふ、普通に考えて……そ、そうよね。クラスメイトだもの。困った時は手を差し伸べるのが常識よね！」
line = "「ふ、普通に考えて……そ、そうよね。クラスメイトだもの。困った時は手を差し伸べるのが常識よね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイ！？」
line = "「マトイ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いえ……そうだわ！　私だって星徒会長を影から支えるフィクサー！　クロトが困っているなら全力で支えるわ！」
line = "「いえ……そうだわ！　私だって星徒会長を影から支えるフィクサー！　クロトが困っているなら全力で支えるわ！」"

[[dialogue]]
speaker = "unk"
# この状況で言われても全然嬉しくないんだけど！？
line = "この状況で言われても全然嬉しくないんだけど！？"

[[dialogue]]
speaker = "アニマ"
# 「フヒ、どうやら方針は決まったようだネ。さあ、皆で仲良くお花摘みに行こうじゃないか……って、おい会長、どこに行く？」
line = "「フヒ、どうやら方針は決まったようだネ。さあ、皆で仲良くお花摘みに行こうじゃないか……って、おい会長、どこに行く？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、クロトが逃げた！　待ちなさい！」
line = "「あっ、クロトが逃げた！　待ちなさい！」"

[[dialogue]]
speaker = "マトイ"
# 「会長、大丈夫！　女の子同士だったら普通！　普通のことだから！」
line = "「会長、大丈夫！　女の子同士だったら普通！　普通のことだから！」"

[[dialogue]]
speaker = "unk"
# 絶対に普通じゃなぁぁぁ──いッ！！！
line = "絶対に普通じゃなぁぁぁ──いッ！！！"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒッ、よく分からないが面白いゾ、星徒会長！　何故逃げるのか教えたまえ！　ハハハハハッ！」
line = "「フヒヒッ、よく分からないが面白いゾ、星徒会長！　何故逃げるのか教えたまえ！　ハハハハハッ！」"

[[dialogue]]
speaker = "unk"
# 後日、どこのクラスでも見つからない謎の美少女転校生が現れたと、学園中で噂になっていた。
line = "後日、どこのクラスでも見つからない謎の美少女転校生が現れたと、学園中で噂になっていた。"

[[dialogue]]
speaker = "unk"
# そして、この日を境に、アニマ先輩は俺に対してやたらと絡むようになるのだった。
line = "そして、この日を境に、アニマ先輩は俺に対してやたらと絡むようになるのだった。"
