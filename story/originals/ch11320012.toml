[[dialogue]]
speaker = "unk"
# 第２話,お茶会メンバー再会,P
line = "第２話,お茶会メンバー再会,P"

[[dialogue]]
speaker = "ケイティ"
# 「まあ、メルエルちゃん、ナターシャちゃん♪」
line = "「まあ、メルエルちゃん、ナターシャちゃん♪」"

[[dialogue]]
speaker = "メルエル"
# 「えへへ、ケイティお姉ちゃん、お久しぶり♪」
line = "「えへへ、ケイティお姉ちゃん、お久しぶり♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「ひぇぇ、ホントにケイティ姉さんだ……お勤めご苦労様です」
line = "「ひぇぇ、ホントにケイティ姉さんだ……お勤めご苦労様です」"

[[dialogue]]
speaker = "ケイティ"
# 「うん、今回は護衛の任務を受けて人間界に来たんだよ～」
line = "「うん、今回は護衛の任務を受けて人間界に来たんだよ～」"

[[dialogue]]
speaker = "ケイティ"
# 「せっかくだから、メルエルちゃんやナターシャちゃんにも会いたいな～って思って、魔王さんにお願いしたの」
line = "「せっかくだから、メルエルちゃんやナターシャちゃんにも会いたいな～って思って、魔王さんにお願いしたの」"

[[dialogue]]
speaker = "unk"
# ３人は昔馴染みなんだって？
line = "３人は昔馴染みなんだって？"

[[dialogue]]
speaker = "unk"
# 詳しいことまでは聞いてないけど
line = "詳しいことまでは聞いてないけど"

[[dialogue]]
speaker = "メルエル"
# 「そうなんだよ～。えへへ、私のお姉ちゃんみたいな感じでね、よくお茶会に招待してもらってたの」
line = "「そうなんだよ～。えへへ、私のお姉ちゃんみたいな感じでね、よくお茶会に招待してもらってたの」"

[[dialogue]]
speaker = "ケイティ"
# 「聖庭園には野外でお茶会を開ける場所があるんですよ～」
line = "「聖庭園には野外でお茶会を開ける場所があるんですよ～」"

[[dialogue]]
speaker = "ケイティ"
# 「そこにメルエルちゃんやナターシャちゃんを呼んで、お茶会を開いていました」
line = "「そこにメルエルちゃんやナターシャちゃんを呼んで、お茶会を開いていました」"

[[dialogue]]
speaker = "ケイティ"
# 「メルエルちゃんが星騎士になるために流星市国に行ってしまって、私が聖庭園の衛兵隊長になって忙しくなってしまって……」
line = "「メルエルちゃんが星騎士になるために流星市国に行ってしまって、私が聖庭園の衛兵隊長になって忙しくなってしまって……」"

[[dialogue]]
speaker = "ケイティ"
# 「それ以降は、お茶会が出来なくなってしまいましたが……また開きたいですね♪」
line = "「それ以降は、お茶会が出来なくなってしまいましたが……また開きたいですね♪」"

[[dialogue]]
speaker = "メルエル"
# 「とっても素敵なんだよ」
line = "「とっても素敵なんだよ」"

[[dialogue]]
speaker = "メルエル"
# 「お花を眺めたり、鳥の声を聞きながら、紅茶を飲んだりお菓子を食べたり……」
line = "「お花を眺めたり、鳥の声を聞きながら、紅茶を飲んだりお菓子を食べたり……」"

[[dialogue]]
speaker = "ケイティ"
# 「とても平和な時間を過ごしていました。なんだか遠い昔のことのように思えます……」
line = "「とても平和な時間を過ごしていました。なんだか遠い昔のことのように思えます……」"

[[dialogue]]
speaker = "unk"
# すごく優雅な光景が目に浮かびます
line = "すごく優雅な光景が目に浮かびます"

[[dialogue]]
speaker = "メルエル"
# 「うん。実はね、ケイティお姉ちゃんは結構なお嬢様だったりするんだよ」
line = "「うん。実はね、ケイティお姉ちゃんは結構なお嬢様だったりするんだよ」"

[[dialogue]]
speaker = "メルエル"
# 「それなのに戦うと、とっても強くて凛々しくて……私の憧れの人なんだぁ♪」
line = "「それなのに戦うと、とっても強くて凛々しくて……私の憧れの人なんだぁ♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「いやー、強いのは間違いないけど……。っていうか強すぎなのが問題なんだよね」
line = "「いやー、強いのは間違いないけど……。っていうか強すぎなのが問題なんだよね」"

[[dialogue]]
speaker = "ナターシャ"
# 「あの強さは方向的に、メルエルに憧れて欲しくない強さっていうか……」
line = "「あの強さは方向的に、メルエルに憧れて欲しくない強さっていうか……」"

[[dialogue]]
speaker = "unk"
# ナターシャの言いたいことはよく分かる。
line = "ナターシャの言いたいことはよく分かる。"

[[dialogue]]
speaker = "unk"
# 俺たちも初めてケイティさんの戦いを見た時は度肝を抜かれた。
line = "俺たちも初めてケイティさんの戦いを見た時は度肝を抜かれた。"

[[dialogue]]
speaker = "メルエル"
# 「ビックリしちゃうよね。こーんな大きくて分厚い剣を２本もブンブン振り回して戦うんだし」
line = "「ビックリしちゃうよね。こーんな大きくて分厚い剣を２本もブンブン振り回して戦うんだし」"

[[dialogue]]
speaker = "ナターシャ"
# 「圧倒的な力で相手をねじ伏せちゃうところから、『制圧天使』なんて物騒なあだ名までついちゃってるからさ」
line = "「圧倒的な力で相手をねじ伏せちゃうところから、『制圧天使』なんて物騒なあだ名までついちゃってるからさ」"

[[dialogue]]
speaker = "ケイティ"
# 「まあ……お恥ずかしいです～」
line = "「まあ……お恥ずかしいです～」"

[[dialogue]]
speaker = "unk"
# （赤くなって……可愛い……）
line = "（赤くなって……可愛い……）"

[[dialogue]]
speaker = "ナターシャ"
# 「おーい魔王様、この反応に騙されちゃいけないよ」
line = "「おーい魔王様、この反応に騙されちゃいけないよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「私からのアドバイス、っていうか忠告。ケイティ姉さんだけは絶対に怒らせない方がいいよ～」
line = "「私からのアドバイス、っていうか忠告。ケイティ姉さんだけは絶対に怒らせない方がいいよ～」"

[[dialogue]]
speaker = "ナターシャ"
# 「私もたとえ任務だとしても、相手がケイティ姉さんだって分かったら、その瞬間に逃げ出すからね。だって命が惜しいもん」
line = "「私もたとえ任務だとしても、相手がケイティ姉さんだって分かったら、その瞬間に逃げ出すからね。だって命が惜しいもん」"

[[dialogue]]
speaker = "unk"
# 酷い言われようだ……
line = "酷い言われようだ……"

[[dialogue]]
speaker = "unk"
# ケイティさんの戦いぶりを直接見ていなかったら、ナターシャの言葉を信じることは出来なかっただろう。
line = "ケイティさんの戦いぶりを直接見ていなかったら、ナターシャの言葉を信じることは出来なかっただろう。"

[[dialogue]]
speaker = "unk"
# けど、俺はケイティさんの戦い方がどれだけ苛烈か知ってるから……。
line = "けど、俺はケイティさんの戦い方がどれだけ苛烈か知ってるから……。"

[[dialogue]]
speaker = "ケイティ"
# 「出来れば私も平和的な解決で済ませようと務めているのですが、言葉だけではそれを成し得ないというのが現実の悲しいところです……」
line = "「出来れば私も平和的な解決で済ませようと務めているのですが、言葉だけではそれを成し得ないというのが現実の悲しいところです……」"

[[dialogue]]
speaker = "ケイティ"
# 「ですが私は信じています。平和を愛する心は誰もが同じ。誠意をもって話し合えば、きっと力によらずとも解決できると」
line = "「ですが私は信じています。平和を愛する心は誰もが同じ。誠意をもって話し合えば、きっと力によらずとも解決できると」"

[[dialogue]]
speaker = "ケイティ"
# 「その為にも皆が平和の尊さと素晴らしさを知るべきなんです」
line = "「その為にも皆が平和の尊さと素晴らしさを知るべきなんです」"

[[dialogue]]
speaker = "ナターシャ"
# 「とかなんとか言いながら、また制圧しちゃうんですよね」
line = "「とかなんとか言いながら、また制圧しちゃうんですよね」"

[[dialogue]]
speaker = "ケイティ"
# 「そんなことありませんよ～。次は必ず、平和的な解決をして見せます！」
line = "「そんなことありませんよ～。次は必ず、平和的な解決をして見せます！」"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃん、その辺にしておかないと知らないよ？」
line = "「ナターシャちゃん、その辺にしておかないと知らないよ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「おっとそうだね。いけないいけない」
line = "「おっとそうだね。いけないいけない」"

[[dialogue]]
speaker = "ケイティ"
# 「も～っ、ナターシャちゃんも相変わらずなんだから～」
line = "「も～っ、ナターシャちゃんも相変わらずなんだから～」"

[[dialogue]]
speaker = "メルエル"
# 「それよりお腹空いちゃったよ～。ご飯、ケイティお姉ちゃんも一緒に食べていけるんでしょ？」
line = "「それよりお腹空いちゃったよ～。ご飯、ケイティお姉ちゃんも一緒に食べていけるんでしょ？」"

[[dialogue]]
speaker = "ケイティ"
# 「うん、もちろん」
line = "「うん、もちろん」"

[[dialogue]]
speaker = "ケイティ"
# 「２人とこうしてテーブルを囲むのも久しぶり……魔王さんも是非ご一緒に～♪」
line = "「２人とこうしてテーブルを囲むのも久しぶり……魔王さんも是非ご一緒に～♪」"

[[dialogue]]
speaker = "unk"
# こうして昔馴染みの３人に加えてもらい、楽しい昼食の時間を過ごしたのだった。
line = "こうして昔馴染みの３人に加えてもらい、楽しい昼食の時間を過ごしたのだった。"
