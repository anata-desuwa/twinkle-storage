[[dialogue]]
speaker = "unk"
# 第６話,偽りなき自我,B
line = "第６話,偽りなき自我,B"

[[dialogue]]
speaker = "unk"
# 長き時の放浪の果てに──俺たちの意識は現実へ戻ってくる。
line = "長き時の放浪の果てに──俺たちの意識は現実へ戻ってくる。"

[[dialogue]]
speaker = "マトイ"
# 「っ……ぁ……今の、って……」
line = "「っ……ぁ……今の、って……」"

[[dialogue]]
speaker = "サーシャ"
# 「学園長の……人生……」
line = "「学園長の……人生……」"

[[dialogue]]
speaker = "フィオナ"
# （平行世界から実体を奪われ、仮面を被った使徒として行使される──なんて、それは……）
line = "（平行世界から実体を奪われ、仮面を被った使徒として行使される──なんて、それは……）"

[[dialogue]]
speaker = "クロト"
# （みんなにも見えていたみたいだな──）
line = "（みんなにも見えていたみたいだな──）"

[[dialogue]]
speaker = "unk"
# これで、彼の行動倫理は明らかになった。ヴィーナスが狙われていた理由も。
line = "これで、彼の行動倫理は明らかになった。ヴィーナスが狙われていた理由も。"

[[dialogue]]
speaker = "クロト"
# 「あなたは……<ruby=デネブ>異世界</ruby>に消えた奥さんを探求した結果、残酷な真実を知った」
line = "「あなたは……<ruby>異世界<rt>デネブ</rt></ruby>に消えた奥さんを探求した結果、残酷な真実を知った」"

[[dialogue]]
speaker = "クロト"
# 「そして現実世界──奥さんのいないアルタイルに絶望し、リクリエというリセットの機会を望んだ」
line = "「そして現実世界──奥さんのいないアルタイルに絶望し、リクリエというリセットの機会を望んだ」"

[[dialogue]]
speaker = "セイファート"
# 「ああ……矮小だろう？」
line = "「ああ……矮小だろう？」"

[[dialogue]]
speaker = "セイファート"
# 「ただ己の欲望がために破滅を招こうとした厚顔無恥な悪党だ。君たち星騎士にとって……討ち滅ぼすべき仇に違いない」
line = "「ただ己の欲望がために破滅を招こうとした厚顔無恥な悪党だ。君たち星騎士にとって……討ち滅ぼすべき仇に違いない」"

[[dialogue]]
speaker = "セイファート"
# 「だが。それでも。<ruby=マルキア>妻</ruby>と会う機がリクリエにしかないというならば……私は喜んで終末を望もう！」
line = "「だが。それでも。<ruby>妻<rt>マルキア</rt></ruby>と会う機がリクリエにしかないというならば……私は喜んで終末を望もう！」"

[[dialogue]]
speaker = "unk"
# セイファート学園長が立ち上がると──全身を覆っていた黒き鎧が、砕け始めた。
line = "セイファート学園長が立ち上がると──全身を覆っていた黒き鎧が、砕け始めた。"

[[dialogue]]
speaker = "セイファート"
# 「コォォォォォォッッッ…………！」
line = "「コォォォォォォッッッ…………！」"

[[dialogue]]
speaker = "フィオナ"
# 「鎧が──」
line = "「鎧が──」"

[[dialogue]]
speaker = "ニャリオン"
# 「ッ……！　まだ動けるのニャン……！？」
line = "「ッ……！　まだ動けるのニャン……！？」"

[[dialogue]]
speaker = "マトイ"
# 「どこにあんな力が……っ……こっちは、もう──！」
line = "「どこにあんな力が……っ……こっちは、もう──！」"

[[dialogue]]
speaker = "unk"
# 鎧がなくなったことで、むしろ先ほどよりも強烈な波動がこちらへ押し寄せてきた。
line = "鎧がなくなったことで、むしろ先ほどよりも強烈な波動がこちらへ押し寄せてきた。"

[[dialogue]]
speaker = "クロト"
# 「その鎧は──拘束具だったとでも言うのか！」
line = "「その鎧は──拘束具だったとでも言うのか！」"

[[dialogue]]
speaker = "セイファート"
# 「フィーニスの塔を制したあの日から、私は女神殺しの<ruby=とが>咎</ruby>を背負って生きてきた」
line = "「フィーニスの塔を制したあの日から、私は女神殺しの<ruby>咎<rt>とが</rt></ruby>を背負って生きてきた」"

[[dialogue]]
speaker = "セイファート"
# 「その代償として手にしたこの<ruby=ちから>霊力</ruby>は……こうして発露しているだけで周囲に多大な影響を与える」
line = "「その代償として手にしたこの<ruby>霊力<rt>ちから</rt></ruby>は……こうして発露しているだけで周囲に多大な影響を与える」"

[[dialogue]]
speaker = "セイファート"
# 「その余波を抑えるために、漆黒の鎧を利用していたが……優秀な教え子相手にもはや必要あるまい」
line = "「その余波を抑えるために、漆黒の鎧を利用していたが……優秀な教え子相手にもはや必要あるまい」"

[[dialogue]]
speaker = "unk"
# 黒騎士という悪のペルソナを彼は脱いだ。
line = "黒騎士という悪のペルソナを彼は脱いだ。"

[[dialogue]]
speaker = "セイファート"
# 「私は……もはや私を偽らない。ただジェラルド・セイファートという悪のまま、せめてこの異分子だけは排除する……！」
line = "「私は……もはや私を偽らない。ただジェラルド・セイファートという悪のまま、せめてこの異分子だけは排除する……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさん──！」
line = "「ヴィーナスさん──！」"

[[dialogue]]
speaker = "unk"
# とてつもない結界が俺たちとの間を阻む。
line = "とてつもない結界が俺たちとの間を阻む。"

[[dialogue]]
speaker = "unk"
# セイファートはこちらへ無防備に背を向け、すべての霊力をヴィーナスへの一閃に注ぎ込んだ。
line = "セイファートはこちらへ無防備に背を向け、すべての霊力をヴィーナスへの一閃に注ぎ込んだ。"

[[dialogue]]
speaker = "unk"
# 彼は自分がやられるとしても──ヴィーナスだけは排除するつもりだ！
line = "彼は自分がやられるとしても──ヴィーナスだけは排除するつもりだ！"

[[dialogue]]
speaker = "セイファート"
# 「──さらばだ、デネブの娘。その亡骸をもって……あちらへの<ruby=しるべ>標</ruby>となるがいい」
line = "「──さらばだ、デネブの娘。その亡骸をもって……あちらへの<ruby>標<rt>しるべ</rt></ruby>となるがいい」"

[[dialogue]]
speaker = "unk"
# 大剣が振り下ろされる。影がヴィーナスの全身を覆った。
line = "大剣が振り下ろされる。影がヴィーナスの全身を覆った。"

[[dialogue]]
speaker = "unk"
# しかし、その最後の一瞬まで──彼女に臆する素振りは一切なかった。
line = "しかし、その最後の一瞬まで──彼女に臆する素振りは一切なかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──不思議よね。私、ずっと落ち着いてる」
line = "「──不思議よね。私、ずっと落ち着いてる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こんなピンチは日誌のどこにもなかった。その日誌だって消えちゃって、絶望しかないはずなのに」
line = "「こんなピンチは日誌のどこにもなかった。その日誌だって消えちゃって、絶望しかないはずなのに」"

[[dialogue]]
speaker = "セイファート"
# 「……死を受け入れたか。賢明だ」
line = "「……死を受け入れたか。賢明だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「違うわよ。他の誰かが決めた筋書きなんか、私にはもう必要ないって話」
line = "「違うわよ。他の誰かが決めた筋書きなんか、私にはもう必要ないって話」"

[[dialogue]]
speaker = "ヴィーナス"
# 「<b>私</b>の決めた魔王がそこにいる。それで十分。あなたと違って、どんな可能性も捨てたりしない、最強の英雄が」
line = "「<b>私</b>の決めた魔王がそこにいる。それで十分。あなたと違って、どんな可能性も捨てたりしない、最強の英雄が」"

[[dialogue]]
speaker = "セイファート"
# 「根拠なき妄想だ──！」
line = "「根拠なき妄想だ──！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ……確かに、今まではそうだったかも」
line = "「ふふっ……確かに、今まではそうだったかも」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも──その根拠なら、もうとっくに気づいてるわ。クロト自身もね！」
line = "「でも──その根拠なら、もうとっくに気づいてるわ。クロト自身もね！」"

[[dialogue]]
speaker = "unk"
# 彼はひとつだけ勘違いをしている。
line = "彼はひとつだけ勘違いをしている。"

[[dialogue]]
speaker = "unk"
# ヴィーナスがこちらへやってきたのは、何も彼女自身の手でリクリエを食い止めるためじゃあない。
line = "ヴィーナスがこちらへやってきたのは、何も彼女自身の手でリクリエを食い止めるためじゃあない。"

[[dialogue]]
speaker = "ヴィーナス"
# 『クロトだって……何度か垣間見てきたんじゃない？　ここじゃない、どこかの自分の記憶』
line = "『クロトだって……何度か垣間見てきたんじゃない？　ここじゃない、どこかの自分の記憶』"

[[dialogue]]
speaker = "？？？"
# 『世界が大変な時だからこそ……そんな時間も、大切にしなくちゃいけないのかも』
line = "『世界が大変な時だからこそ……そんな時間も、大切にしなくちゃいけないのかも』"

[[dialogue]]
speaker = "？？？"
# 『それじゃ、頼りにしてるわね──クロト？』
line = "『それじゃ、頼りにしてるわね──クロト？』"

[[dialogue]]
speaker = "unk"
# なぜ、彼女は俺を待っていたのか。なぜ、彼女の元となる実体は存在しないのか。
line = "なぜ、彼女は俺を待っていたのか。なぜ、彼女の元となる実体は存在しないのか。"

[[dialogue]]
speaker = "unk"
# その答えが今──そこにある。
line = "その答えが今──そこにある。"

[[dialogue]]
speaker = "？？？"
# 『この子にも名前をつけないとね。ヴィーナス──なんて、どうかしら？』
line = "『この子にも名前をつけないとね。ヴィーナス──なんて、どうかしら？』"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから、ねえ──今こそ世界を救ってみなさいよ。<b>パパ</b>！」
line = "「だから、ねえ──今こそ世界を救ってみなさいよ。<b>パパ</b>！」"

[[dialogue]]
speaker = "クロト"
# 「──ああ。<b>待たせて悪かったな</b>、ヴィーナス」
line = "「──ああ。<b>待たせて悪かったな</b>、ヴィーナス」"

[[dialogue]]
speaker = "セイファート"
# 「なッ……！？」
line = "「なッ……！？」"

[[dialogue]]
speaker = "マトイ"
# 「は──えぇぇっ！？」
line = "「は──えぇぇっ！？」"

[[dialogue]]
speaker = "unk"
# それは時間も世界も超えた願い。
line = "それは時間も世界も超えた願い。"

[[dialogue]]
speaker = "unk"
# 魔力──霊力──星力──全てが<ruby=こんぜんいったい>渾然一体</ruby>の<ruby=はとう>波濤</ruby>となって、俺の全身にみなぎっていく。
line = "魔力──霊力──星力──全てが<ruby>渾然一体<rt>こんぜんいったい</rt></ruby>の<ruby>波濤<rt>はとう</rt></ruby>となって、俺の全身にみなぎっていく。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あはは──最高じゃない、クロト。私のスパルタも意味があったってとこかしら」
line = "「あはは──最高じゃない、クロト。私のスパルタも意味があったってとこかしら」"

[[dialogue]]
speaker = "セイファート"
# 「<ruby=あか>緋</ruby>き、眼……！？　これは──御前試合の、時の……！」
line = "「<ruby>緋<rt>あか</rt></ruby>き、眼……！？　これは──御前試合の、時の……！」"

[[dialogue]]
speaker = "クロト"
# 「ああ──あの時と同じだ。受け継がれてきた、魔王の力だ」
line = "「ああ──あの時と同じだ。受け継がれてきた、魔王の力だ」"

[[dialogue]]
speaker = "クロト"
# 「でも、俺はずっと……これを自在に引き出せずにいた。ピンチばかりの奇跡かと思っていた。だけど、違ったんだな」
line = "「でも、俺はずっと……これを自在に引き出せずにいた。ピンチばかりの奇跡かと思っていた。だけど、違ったんだな」"

[[dialogue]]
speaker = "クロト"
# 「ようやくわかった。俺が、この真価を引き出すのに、本当に必要だったものは何なのか」
line = "「ようやくわかった。俺が、この真価を引き出すのに、本当に必要だったものは何なのか」"

[[dialogue]]
speaker = "unk"
# ──あの時も。今回も。
line = "──あの時も。今回も。"

[[dialogue]]
speaker = "unk"
# 俺が、魔王として覚醒するために必要だった、最後のトリガー。
line = "俺が、魔王として覚醒するために必要だった、最後のトリガー。"

[[dialogue]]
speaker = "unk"
# それは……かけがえのない<ruby=むすめ>家族</ruby>による、魂の叫びだったんだ。
line = "それは……かけがえのない<ruby>家族<rt>むすめ</rt></ruby>による、魂の叫びだったんだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あんた聞いてなかったの──<ruby=むこう>デネブ</ruby>と<ruby=こっち>アルタイル</ruby>じゃ、時間にずれが生じるんだって」
line = "「あんた聞いてなかったの──<ruby>デネブ<rt>むこう</rt></ruby>と<ruby>アルタイル<rt>こっち</rt></ruby>じゃ、時間にずれが生じるんだって」"

[[dialogue]]
speaker = "セイファート"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# だから──今の俺からじゃ未来にあたる<b>別の俺</b>が、子を為していたっておかしくはない。
line = "だから──今の俺からじゃ未来にあたる<b>別の俺</b>が、子を為していたっておかしくはない。"

[[dialogue]]
speaker = "クロト"
# 「俺もまた……向こうの世界じゃ、滅亡を止められなかったんだろう」
line = "「俺もまた……向こうの世界じゃ、滅亡を止められなかったんだろう」"

[[dialogue]]
speaker = "クロト"
# 「だから望んだ。俺か、ヴィーナスか、それ以外の誰かはわからないが。三つ残された世界線のひとつだけでも──リクリエを防ぎきれるように」
line = "「だから望んだ。俺か、ヴィーナスか、それ以外の誰かはわからないが。三つ残された世界線のひとつだけでも──リクリエを防ぎきれるように」"

[[dialogue]]
speaker = "unk"
# <ruby=ベガ>世界Ａ</ruby>は滅んだ。
line = "<ruby>世界Ａ<rt>ベガ</rt></ruby>は滅んだ。"

[[dialogue]]
speaker = "unk"
# <ruby=デネブ>世界Ｂ</ruby>も危うい。
line = "<ruby>世界Ｂ<rt>デネブ</rt></ruby>も危うい。"

[[dialogue]]
speaker = "unk"
# だからこそ彼女はやってきたのだ。自分が生まれるよりも前の魔王を鍛えれば、せめて<ruby=アルタイル>世界Ｃ</ruby>の壊滅は防げるかもしれないと。
line = "だからこそ彼女はやってきたのだ。自分が生まれるよりも前の魔王を鍛えれば、せめて<ruby>世界Ｃ<rt>アルタイル</rt></ruby>の壊滅は防げるかもしれないと。"

[[dialogue]]
speaker = "unk"
# あるはずのない後悔が押し寄せるとともに、ここへ至った真意が理解できる気がした。
line = "あるはずのない後悔が押し寄せるとともに、ここへ至った真意が理解できる気がした。"

[[dialogue]]
speaker = "セイファート"
# 「リクリエの使徒──否──その対になる存在、だとでも……！？」
line = "「リクリエの使徒──否──その対になる存在、だとでも……！？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。単純なことだ。救いの糸なんだよ、ヴィーナスは」
line = "「ああ。単純なことだ。救いの糸なんだよ、ヴィーナスは」"

[[dialogue]]
speaker = "unk"
# <ruby=アルタイル>こちら</ruby>の住人が<ruby=デネブ>あちら</ruby>に<ruby=さら>拐</ruby>われてしまうことがあるなら──その逆が発生してもおかしくはない。
line = "<ruby>こちら<rt>アルタイル</rt></ruby>の住人が<ruby>あちら<rt>デネブ</rt></ruby>に<ruby>拐<rt>さら</rt></ruby>われてしまうことがあるなら──その逆が発生してもおかしくはない。"

[[dialogue]]
speaker = "unk"
# そしてヴィーナスは元々、こちらじゃまだ<b>生まれてもいない</b>存在だった。
line = "そしてヴィーナスは元々、こちらじゃまだ<b>生まれてもいない</b>存在だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が<ruby=こっち>アルタイル</ruby>に来た理由なんて──最初から教えてたでしょ。不甲斐ない<ruby=まおう>父親</ruby>を、鍛えるためなんだって」
line = "「私が<ruby>アルタイル<rt>こっち</rt></ruby>に来た理由なんて──最初から教えてたでしょ。不甲斐ない<ruby>父親<rt>まおう</rt></ruby>を、鍛えるためなんだって」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから──私は<ruby=メシア>救世主</ruby>じゃない。助っ人なのよ。<b>今度こそ</b>、クロトに真価を発揮してもらうためのね」
line = "「だから──私は<ruby>救世主<rt>メシア</rt></ruby>じゃない。助っ人なのよ。<b>今度こそ</b>、クロトに真価を発揮してもらうためのね」"

[[dialogue]]
speaker = "クロト"
# 「耳の痛い話だ──きっとヴィーナスがいなきゃ、俺はダメだったんだろうな」
line = "「耳の痛い話だ──きっとヴィーナスがいなきゃ、俺はダメだったんだろうな」"

[[dialogue]]
speaker = "unk"
# 彼の妻マルキアは──エリシアの姉フィオナは──リクリエによって<ruby=さら>拐</ruby>われ、破滅を喚ぶ仮面の使徒として平行世界に召喚された。
line = "彼の妻マルキアは──エリシアの姉フィオナは──リクリエによって<ruby>拐<rt>さら</rt></ruby>われ、破滅を喚ぶ仮面の使徒として平行世界に召喚された。"

[[dialogue]]
speaker = "unk"
# ヴィーナスがこうして俺のためにやってきたのは、その仕組みをまったく逆に利用した形になる。
line = "ヴィーナスがこうして俺のためにやってきたのは、その仕組みをまったく逆に利用した形になる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「日誌はもう必要ない。ここから先の未来は、どんな平行世界とも違う結末なんだから」
line = "「日誌はもう必要ない。ここから先の未来は、どんな平行世界とも違う結末なんだから」"

[[dialogue]]
speaker = "サーシャ"
# 「そっか……だから、ヴィーナスちゃんの日誌には……」
line = "「そっか……だから、ヴィーナスちゃんの日誌には……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスには使命があった。俺という魔王を目覚めさせる使命が。
line = "ヴィーナスには使命があった。俺という魔王を目覚めさせる使命が。"

[[dialogue]]
speaker = "unk"
# そして彼女の持ち込んだ日誌には、これから先の未来が記されていた。
line = "そして彼女の持ち込んだ日誌には、これから先の未来が記されていた。"

[[dialogue]]
speaker = "unk"
# だけどあの未来は、道筋は──最終的には失敗してしまった別の世界の物語でしかないんだ。
line = "だけどあの未来は、道筋は──最終的には失敗してしまった別の世界の物語でしかないんだ。"

[[dialogue]]
speaker = "クロト"
# 「ここから先の──本当の未来を紡げるのは……俺たちだけだ」
line = "「ここから先の──本当の未来を紡げるのは……俺たちだけだ」"

[[dialogue]]
speaker = "セイファート"
# 「……ふっ……ふっ。ははははっ！」
line = "「……ふっ……ふっ。ははははっ！」"

[[dialogue]]
speaker = "セイファート"
# 「平行世界間の移動は不可能──他ならぬ女神が<ruby=のたま>宣</ruby>ったこと。おまえは、あれさえ超越した存在だというのか！」
line = "「平行世界間の移動は不可能──他ならぬ女神が<ruby>宣<rt>のたま</rt></ruby>ったこと。おまえは、あれさえ超越した存在だというのか！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよ──と言いたいところだけど、まあ細かい理屈なんて知らないわ。別に奇跡でも偶然でも、今私がここに立ってることだけが現実」
line = "「そうよ──と言いたいところだけど、まあ細かい理屈なんて知らないわ。別に奇跡でも偶然でも、今私がここに立ってることだけが現実」"

[[dialogue]]
speaker = "ヴィーナス"
# 「パパ──ううん、魔王クロト。今度こそお願いするわ。リクリエから──アルタイルの世界を救って！」
line = "「パパ──ううん、魔王クロト。今度こそお願いするわ。リクリエから──アルタイルの世界を救って！」"

[[dialogue]]
speaker = "クロト"
# 「ああ……俺はヴィーナスと、この世界を守るために戦う！」
line = "「ああ……俺はヴィーナスと、この世界を守るために戦う！」"

[[dialogue]]
speaker = "クロト"
# 「我が魂とリンクせし大地の守護星よ──地脈を通じ、ここに始まりの兆しを灯せ」
line = "「我が魂とリンクせし大地の守護星よ──地脈を通じ、ここに始まりの兆しを灯せ」"

[[dialogue]]
speaker = "unk"
# 母なる地球の胎動が凍てついた大森林を揺るがす。
line = "母なる地球の胎動が凍てついた大森林を揺るがす。"

[[dialogue]]
speaker = "セイファート"
# 「っ、なんという……！」
line = "「っ、なんという……！」"

[[dialogue]]
speaker = "フィオナ"
# 「恐るべき闘気──ニャリオン、これは……！」
line = "「恐るべき闘気──ニャリオン、これは……！」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ──！　紛れもない先代魔王と同等の……ニャ、それとも違うニャ……！」
line = "「ニャ──！　紛れもない先代魔王と同等の……ニャ、それとも違うニャ……！」"

[[dialogue]]
speaker = "unk"
# 先代魔王は魔力と霊力を同時に操る無二の戦士だった。
line = "先代魔王は魔力と霊力を同時に操る無二の戦士だった。"

[[dialogue]]
speaker = "unk"
# だが今の俺はそれに加えて、緋宮クロトとして培ってきた地球の星力が根底に渦巻いている。
line = "だが今の俺はそれに加えて、緋宮クロトとして培ってきた地球の星力が根底に渦巻いている。"

[[dialogue]]
speaker = "unk"
# どんな力であっても<ruby=あわ>併</ruby>せ呑む魔王の器は──たとえ相手が神殺しの騎士だとしても、負けはしない！
line = "どんな力であっても<ruby>併<rt>あわ</rt></ruby>せ呑む魔王の器は──たとえ相手が神殺しの騎士だとしても、負けはしない！"

[[dialogue]]
speaker = "クロト"
# 「妻を想い、世界すら飲み込もうとする──あんたの覚悟はよくわかった。だが、俺も……ここじゃないどこかの俺も、同じように譲れない覚悟でここまで来た」
line = "「妻を想い、世界すら飲み込もうとする──あんたの覚悟はよくわかった。だが、俺も……ここじゃないどこかの俺も、同じように譲れない覚悟でここまで来た」"

[[dialogue]]
speaker = "クロト"
# 「なら、後は根比べだ。たとえ同情はしても──この道だけは譲らない」
line = "「なら、後は根比べだ。たとえ同情はしても──この道だけは譲らない」"

[[dialogue]]
speaker = "セイファート"
# 「……<ruby=よ>佳</ruby>い<ruby=め>眼</ruby>だ。まるで、十数年の成長を経たような──いや、実際に経たのだろうな。娘という結晶を通じて」
line = "「……<ruby>佳<rt>よ</rt></ruby>い<ruby>眼<rt>め</rt></ruby>だ。まるで、十数年の成長を経たような──いや、実際に経たのだろうな。娘という結晶を通じて」"

[[dialogue]]
speaker = "セイファート"
# 「魔王の血統は……その名の通り魔王にも、はたまた英雄にもなりうる。──よく言ったものだ」
line = "「魔王の血統は……その名の通り魔王にも、はたまた英雄にもなりうる。──よく言ったものだ」"

[[dialogue]]
speaker = "unk"
# もしかしたら別の世界じゃ、俺は魔王として<b>堕ちて</b>いたのかもしれない。
line = "もしかしたら別の世界じゃ、俺は魔王として<b>堕ちて</b>いたのかもしれない。"

[[dialogue]]
speaker = "unk"
# だが、そうさせないために九浄ヴィーナスという存在はやってきた。なら親として、それに答えなくてどうするんだ。
line = "だが、そうさせないために九浄ヴィーナスという存在はやってきた。なら親として、それに答えなくてどうするんだ。"

[[dialogue]]
speaker = "セイファート"
# 「ベガは滅んだ。デネブも秒読み。ここ、アルタイルの終焉さえ決せば、我が宿願は果たされる。邪魔立てはさせん──！」
line = "「ベガは滅んだ。デネブも秒読み。ここ、アルタイルの終焉さえ決せば、我が宿願は果たされる。邪魔立てはさせん──！」"

[[dialogue]]
speaker = "unk"
# 膨れ上がっていく闇の霊力。
line = "膨れ上がっていく闇の霊力。"

[[dialogue]]
speaker = "unk"
# ここに、互いの持てるものすべてを賭した、英雄同士の死闘が幕を開ける。
line = "ここに、互いの持てるものすべてを賭した、英雄同士の死闘が幕を開ける。"

[[dialogue]]
speaker = "クロト"
# 「いくぞセイファート──あなたの背中を今こそ超える！」
line = "「いくぞセイファート──あなたの背中を今こそ超える！」"

[[dialogue]]
speaker = "セイファート"
# 「来い、緋宮クロト──総ての因果を、今ここに清算しよう！」
line = "「来い、緋宮クロト──総ての因果を、今ここに清算しよう！」"
