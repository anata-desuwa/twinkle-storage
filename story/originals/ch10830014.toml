[[dialogue]]
speaker = "unk"
# 第４話,吸血鬼の初恋,P
line = "第４話,吸血鬼の初恋,P"

[[dialogue]]
speaker = "unk"
# ソフレの部屋へ遊びに行くという話をして以来、なんだか彼女の様子がおかしい。
line = "ソフレの部屋へ遊びに行くという話をして以来、なんだか彼女の様子がおかしい。"

[[dialogue]]
speaker = "ソフレ"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# あっ、ソフレ！
line = "あっ、ソフレ！"

[[dialogue]]
speaker = "ソフレ"
# 「……！　そ、ソフレは用事があるのよ！　会長、また今度なのだわ～！」
line = "「……！　そ、ソフレは用事があるのよ！　会長、また今度なのだわ～！」"

[[dialogue]]
speaker = "ソフレ"
# 「はぁ……また会長と話せなかったのだわ……」
line = "「はぁ……また会長と話せなかったのだわ……」"

[[dialogue]]
speaker = "ソフレ"
# （この前の部屋で遊ぶ約束は、結局理由を誤魔化してキャンセルしてしまったし……）
line = "（この前の部屋で遊ぶ約束は、結局理由を誤魔化してキャンセルしてしまったし……）"

[[dialogue]]
speaker = "ソフレ"
# （会長のことを異性として意識してしまったら、部屋で２人きりなんて、どんな顔をして過ごせばいいのかわからないのだわ）
line = "（会長のことを異性として意識してしまったら、部屋で２人きりなんて、どんな顔をして過ごせばいいのかわからないのだわ）"

[[dialogue]]
speaker = "ソフレ"
# （あれから、星徒会室にも行けなくなってしまったし……）
line = "（あれから、星徒会室にも行けなくなってしまったし……）"

[[dialogue]]
speaker = "ソフレ"
# （こ、これも全部、ソフレが会長をす、好きかもなんて、フェリシーが余計なことを言い出すからなのだわ……！）
line = "（こ、これも全部、ソフレが会長をす、好きかもなんて、フェリシーが余計なことを言い出すからなのだわ……！）"

[[dialogue]]
speaker = "unk"
# ソフレ、見つけた！
line = "ソフレ、見つけた！"

[[dialogue]]
speaker = "ソフレ"
# 「えっ！？　か、会長！？　どうしてここに！？」
line = "「えっ！？　か、会長！？　どうしてここに！？」"

[[dialogue]]
speaker = "ソフレ"
# 「――フェリシーから、最近ここを昼寝スポットにしてると教えられて？　アイツ、いつの間に調べて……」
line = "「――フェリシーから、最近ここを昼寝スポットにしてると教えられて？　アイツ、いつの間に調べて……」"

[[dialogue]]
speaker = "ソフレ"
# 「そ、それで会長は、一体何の用なのだわ？　ソフレはこれからお昼寝するから、会長の相手をする時間はないのよ」
line = "「そ、それで会長は、一体何の用なのだわ？　ソフレはこれからお昼寝するから、会長の相手をする時間はないのよ」"

[[dialogue]]
speaker = "unk"
# ソフレの様子が変だったから、心配になって
line = "ソフレの様子が変だったから、心配になって"

[[dialogue]]
speaker = "ソフレ"
# 「そ、それは……」
line = "「そ、それは……」"

[[dialogue]]
speaker = "ソフレ"
# （本当のことを面と向かって言えるわけがないのだわ……！）
line = "（本当のことを面と向かって言えるわけがないのだわ……！）"

[[dialogue]]
speaker = "ソフレ"
# 「って、会長？　――聞いて欲しいって……どうしたのだわ？」
line = "「って、会長？　――聞いて欲しいって……どうしたのだわ？」"

[[dialogue]]
speaker = "unk"
# 俺はソフレと、これからも仲よくしたい
line = "俺はソフレと、これからも仲よくしたい"

[[dialogue]]
speaker = "unk"
# だから、変に距離を置かれているのは寂しいと伝える。
line = "だから、変に距離を置かれているのは寂しいと伝える。"

[[dialogue]]
speaker = "ソフレ"
# 「……！　で、でも、色々と難しいと思うのだわ……。会長は男で、異性だし……」
line = "「……！　で、でも、色々と難しいと思うのだわ……。会長は男で、異性だし……」"

[[dialogue]]
speaker = "ソフレ"
# 「部屋で遊ぶ約束をした後に冷静に考えて、その……少し距離が近過ぎたかなと思ったのよ」
line = "「部屋で遊ぶ約束をした後に冷静に考えて、その……少し距離が近過ぎたかなと思ったのよ」"

[[dialogue]]
speaker = "ソフレ"
# 「だから、今までみたいな関係を続けるのは……」
line = "「だから、今までみたいな関係を続けるのは……」"

[[dialogue]]
speaker = "unk"
# 俺は、ソフレのことが好きだ！
line = "俺は、ソフレのことが好きだ！"

[[dialogue]]
speaker = "ソフレ"
# 「えっ！？　い、いきなり何を言い出すのだわ、会長！？　まさか、フェリシーから何か吹き込まれたの！？」
line = "「えっ！？　い、いきなり何を言い出すのだわ、会長！？　まさか、フェリシーから何か吹き込まれたの！？」"

[[dialogue]]
speaker = "ソフレ"
# 「そ、それはあくまで、フェリシーが勝手に言っているだけであって……」
line = "「そ、それはあくまで、フェリシーが勝手に言っているだけであって……」"

[[dialogue]]
speaker = "ソフレ"
# 「――フェリシーから言われたわけじゃない？　じゃあ、なんで……」
line = "「――フェリシーから言われたわけじゃない？　じゃあ、なんで……」"

[[dialogue]]
speaker = "unk"
# ソフレとこれ以上仲良くなる為には、自分がもっと素直にならなきゃダメだと思った。
line = "ソフレとこれ以上仲良くなる為には、自分がもっと素直にならなきゃダメだと思った。"

[[dialogue]]
speaker = "unk"
# だから、恋人候補として立候補したうえで、改めて男友達として仲良くして欲しい――俺はそう伝えた。
line = "だから、恋人候補として立候補したうえで、改めて男友達として仲良くして欲しい――俺はそう伝えた。"

[[dialogue]]
speaker = "ソフレ"
# 「そ、ソフレは確かに、素直じゃないと思うけど……」
line = "「そ、ソフレは確かに、素直じゃないと思うけど……」"

[[dialogue]]
speaker = "ソフレ"
# 「でも、そもそもソフレは吸血鬼なのよ？　寿命の長さが全然違うから、その……仲良くするなら色々と覚悟が必要なのだわ」
line = "「でも、そもそもソフレは吸血鬼なのよ？　寿命の長さが全然違うから、その……仲良くするなら色々と覚悟が必要なのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「それに、ソフレはフェリシーみたいにスタイルがいいわけではないのだわ」
line = "「それに、ソフレはフェリシーみたいにスタイルがいいわけではないのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「これは吸血鬼だからというわけじゃなくて、ソフレ個人が単純に発育がよくないからというか……」
line = "「これは吸血鬼だからというわけじゃなくて、ソフレ個人が単純に発育がよくないからというか……」"

[[dialogue]]
speaker = "ソフレ"
# 「あと、会長も知っていると思うけど、１００年前までは、すごい悪さをしていたし……」
line = "「あと、会長も知っていると思うけど、１００年前までは、すごい悪さをしていたし……」"

[[dialogue]]
speaker = "ソフレ"
# 「今だって、わかってると思うけど……捻くれてて、ワガママなのよ」
line = "「今だって、わかってると思うけど……捻くれてて、ワガママなのよ」"

[[dialogue]]
speaker = "ソフレ"
# 「付き合う異性としては、色々と問題があり過ぎると思うのだわ……」
line = "「付き合う異性としては、色々と問題があり過ぎると思うのだわ……」"

[[dialogue]]
speaker = "unk"
# それでも、今目の前にいるソフレが好きだ
line = "それでも、今目の前にいるソフレが好きだ"

[[dialogue]]
speaker = "ソフレ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ソフレ"
# 「ほ、本当に…………会長は物好きなんだから…………」
line = "「ほ、本当に…………会長は物好きなんだから…………」"

[[dialogue]]
speaker = "ソフレ"
# 「後悔しても、知らないのよ？　……それでもいいなら、会長を…………その…………」
line = "「後悔しても、知らないのよ？　……それでもいいなら、会長を…………その…………」"

[[dialogue]]
speaker = "ソフレ"
# 「試しに……ソフレの初めての男にしてあげなくもないのだわ……」
line = "「試しに……ソフレの初めての男にしてあげなくもないのだわ……」"

[[dialogue]]
speaker = "ソフレ"
# 「――それで一応……男女の関係になったわけだし……」
line = "「――それで一応……男女の関係になったわけだし……」"

[[dialogue]]
speaker = "ソフレ"
# 「今度はソフレの部屋に招待しても、問題はないと思うのだけど……どうかしら？」
line = "「今度はソフレの部屋に招待しても、問題はないと思うのだけど……どうかしら？」"

[[dialogue]]
speaker = "ソフレ"
# 「――そ、そう。わかったわ。じゃあ改めて、今週末ね？」
line = "「――そ、そう。わかったわ。じゃあ改めて、今週末ね？」"

[[dialogue]]
speaker = "ソフレ"
# 「あっ、で、でも一応、言っておくけど……」
line = "「あっ、で、でも一応、言っておくけど……」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレはまだ、会長のことを好きと認めたわけじゃなくて、あくまでお試しなのよ。だから――」
line = "「ソフレはまだ、会長のことを好きと認めたわけじゃなくて、あくまでお試しなのよ。だから――」"

[[dialogue]]
speaker = "ソフレ"
# 「一緒にお昼寝することになっても、まだ……へ、変なことはしちゃダメだからね？」
line = "「一緒にお昼寝することになっても、まだ……へ、変なことはしちゃダメだからね？」"

[[dialogue]]
speaker = "ソフレ"
# 「それは……ソフレにちゃんと好きって、言わせてからなんだから」
line = "「それは……ソフレにちゃんと好きって、言わせてからなんだから」"

[[dialogue]]
speaker = "unk"
# 期待するような上目遣いを向けてくるソフレに、俺は思わずドキッとしてしまうのだった――
line = "期待するような上目遣いを向けてくるソフレに、俺は思わずドキッとしてしまうのだった――"
