[[dialogue]]
speaker = "unk"
# コンテスト前日──
line = "コンテスト前日──"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヘレナちゃんの目論見を阻止するわよ！」
line = "「ヘレナちゃんの目論見を阻止するわよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「リゾート結界は……リップルさんの夢がたくさん詰まった楽園なんです。大人の魂胆になんか負けません！」
line = "「リゾート結界は……リップルさんの夢がたくさん詰まった楽園なんです。大人の魂胆になんか負けません！」"

[[dialogue]]
speaker = "アナ"
# 「ぬるりと現れますね、ソフィアさん」
line = "「ぬるりと現れますね、ソフィアさん」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしもいま～す」
line = "「わたしもいま～す」"

[[dialogue]]
speaker = "アポロ"
# 「あたしもだ！　授業が終わって、こっちに来たぞ！」
line = "「あたしもだ！　授業が終わって、こっちに来たぞ！」"

[[dialogue]]
speaker = "マトイ"
# 「ヘレナさんの目論見を阻止する……って言っても」
line = "「ヘレナさんの目論見を阻止する……って言っても」"

[[dialogue]]
speaker = "マトイ"
# 「それって、トリシャさんの優勝を阻止するってことだよね？」
line = "「それって、トリシャさんの優勝を阻止するってことだよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。トリシャには悪いけど──あんなこと言われて、黙ってられるもんですか」
line = "「ええ。トリシャには悪いけど──あんなこと言われて、黙ってられるもんですか」"

[[dialogue]]
speaker = "アナ"
# 「ええ。何もかも持てる者の思う通りにさせるわけにはいきません」
line = "「ええ。何もかも持てる者の思う通りにさせるわけにはいきません」"

[[dialogue]]
speaker = "マトイ"
# 「何言われたんだろ……」
line = "「何言われたんだろ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに大丈夫よ。トリシャは強敵だけど、こっちにも弾数はたくさんあるんだから」
line = "「それに大丈夫よ。トリシャは強敵だけど、こっちにも弾数はたくさんあるんだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ね、マトイ？」
line = "「ね、マトイ？」"

[[dialogue]]
speaker = "マトイ"
# 「へっ？」
line = "「へっ？」"

[[dialogue]]
speaker = "unk"
# と、いうわけで……
line = "と、いうわけで……"

[[dialogue]]
speaker = "ヴィーナス"
# 「さあ、張り切ってリハーサルいくわよ！」
line = "「さあ、張り切ってリハーサルいくわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「えっと……エントリーナンバー１番、詠野マトイ。チャームポイントは親しみやすさ……なのかな？　一応……」
line = "「えっと……エントリーナンバー１番、詠野マトイ。チャームポイントは親しみやすさ……なのかな？　一応……」"

[[dialogue]]
speaker = "マトイ"
# 「ねえ、ヴィーナス。室内で水着着るほうが恥ずかしいんだけど……」
line = "「ねえ、ヴィーナス。室内で水着着るほうが恥ずかしいんだけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その赤らんだ表情がぐっとくるわ！　ねえ！？」
line = "「その赤らんだ表情がぐっとくるわ！　ねえ！？」"

[[dialogue]]
speaker = "unk"
# 控えめさがいい
line = "控えめさがいい"

[[dialogue]]
speaker = "unk"
# 魅力的だ
line = "魅力的だ"

[[dialogue]]
speaker = "アポロ"
# 「エントリーナンバー２番、アポロ！　特技は犬かきだ！　賞金は全額グミ・パーティに注ぎ込むぞ！」
line = "「エントリーナンバー２番、アポロ！　特技は犬かきだ！　賞金は全額グミ・パーティに注ぎ込むぞ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわよ！　パワフルでチャーミング！　ねえ！？」
line = "「いいわよ！　パワフルでチャーミング！　ねえ！？」"

[[dialogue]]
speaker = "unk"
# たまらない
line = "たまらない"

[[dialogue]]
speaker = "unk"
# 魅力的だ
line = "魅力的だ"

[[dialogue]]
speaker = "ルリエル"
# 「エントリーナンバー３番、ルリエル！　アピールポイントは元気とお歌です！　えいえいおーっ！」
line = "「エントリーナンバー３番、ルリエル！　アピールポイントは元気とお歌です！　えいえいおーっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「眩しい！　可愛い！　天使の輪っかが超キューティー！　肩に守護星乗っけるつもり！？」
line = "「眩しい！　可愛い！　天使の輪っかが超キューティー！　肩に守護星乗っけるつもり！？」"

[[dialogue]]
speaker = "unk"
# 腹筋チョモランマ！
line = "腹筋チョモランマ！"

[[dialogue]]
speaker = "unk"
# 背筋仕上がってる！
line = "背筋仕上がってる！"

[[dialogue]]
speaker = "ソフィア"
# 「だんだん違う方向に行ってませんか……？」
line = "「だんだん違う方向に行ってませんか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういうソフィアも、出なくていいの？　１人でも多いほうが勝機はあるわ！」
line = "「そういうソフィアも、出なくていいの？　１人でも多いほうが勝機はあるわ！」"

[[dialogue]]
speaker = "ソフィア"
# 「う……確かに。私がリゾート結界のためにひと肌脱ぎませんと……！」
line = "「う……確かに。私がリゾート結界のためにひと肌脱ぎませんと……！」"

[[dialogue]]
speaker = "ソフィア"
# 「──４番、ソフィア。氷の上なら負けません！」
line = "「──４番、ソフィア。氷の上なら負けません！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──続いて５番ヴィーナス！　アピールポイントは健康美よ！　あとめちゃんこ強いんだから！」
line = "「──続いて５番ヴィーナス！　アピールポイントは健康美よ！　あとめちゃんこ強いんだから！」"

[[dialogue]]
speaker = "unk"
# 最高だ
line = "最高だ"

[[dialogue]]
speaker = "unk"
# どっちも魅力的
line = "どっちも魅力的"

[[dialogue]]
speaker = "ヴィーナス"
# 「最後は大本命よ！　かもん！」
line = "「最後は大本命よ！　かもん！」"

[[dialogue]]
speaker = "サーシャ"
# 「はーい。サーシャよ～。アピールポイントは～……ん～……包容力かしら？」
line = "「はーい。サーシャよ～。アピールポイントは～……ん～……包容力かしら？」"

[[dialogue]]
speaker = "ルリエル"
# 「う……なんというダイナマイトボディ……！」
line = "「う……なんというダイナマイトボディ……！」"

[[dialogue]]
speaker = "ソフィア"
# 「我が姉ながら……なぜこうも仕上がりに差があるのでしょうか……？」
line = "「我が姉ながら……なぜこうも仕上がりに差があるのでしょうか……？」"

[[dialogue]]
speaker = "アナ"
# 「大丈夫です。ソフィアさんにはまだまだ可能性が眠っているということですよ……！」
line = "「大丈夫です。ソフィアさんにはまだまだ可能性が眠っているということですよ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんな出揃ったわよ！　さあ、審査員席──優勝を手にするのは一体誰！？」
line = "「みんな出揃ったわよ！　さあ、審査員席──優勝を手にするのは一体誰！？」"

[[dialogue]]
speaker = "unk"
# 甲乙つけがたい
line = "甲乙つけがたい"

[[dialogue]]
speaker = "unk"
# みんな優勝
line = "みんな優勝"

[[dialogue]]
speaker = "アポロ"
# 「おい！　そんなのアリか！？」
line = "「おい！　そんなのアリか！？」"

[[dialogue]]
speaker = "アナ"
# 「本当にこんなことでトリシャさんに勝てるのでしょうか……」
line = "「本当にこんなことでトリシャさんに勝てるのでしょうか……」"

[[dialogue]]
speaker = "ソフィア"
# 「大丈夫です。本番の審査はオーディエンスの意見で決まるようですから──皆が皆、セクシー指向というわけではないはずです」
line = "「大丈夫です。本番の審査はオーディエンスの意見で決まるようですから──皆が皆、セクシー指向というわけではないはずです」"

[[dialogue]]
speaker = "サーシャ"
# 「それもそうよね。特に女の子はやっぱり、スレンダーな体型を好むんじゃないかしら……？」
line = "「それもそうよね。特に女の子はやっぱり、スレンダーな体型を好むんじゃないかしら……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なら、マトイにもやっぱり勝機はあるわね。ちょっとこっち来て」
line = "「なら、マトイにもやっぱり勝機はあるわね。ちょっとこっち来て」"

[[dialogue]]
speaker = "マトイ"
# 「ん？　な、何？」
line = "「ん？　な、何？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほら！　マトイの魅力をもっとじっくりくっきり見ていいのよ！」
line = "「ほら！　マトイの魅力をもっとじっくりくっきり見ていいのよ！」"

[[dialogue]]
speaker = "マトイ"
# 「！？　ちょっ、会長やめっ、間近で見るのは禁止～～～～っ！！」
line = "「！？　ちょっ、会長やめっ、間近で見るのは禁止～～～～っ！！」"

[[dialogue]]
speaker = "unk"
# 水着コンテスト本番は、いよいよ明日──
line = "水着コンテスト本番は、いよいよ明日──"
