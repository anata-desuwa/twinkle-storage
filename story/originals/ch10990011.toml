[[dialogue]]
speaker = "unk"
# 第１話,ゴールデングースのブレイン,P
line = "第１話,ゴールデングースのブレイン,P"

[[dialogue]]
speaker = "ミウ"
# 「う～んと、これで大丈夫かな？　次は忘れないでね」
line = "「う～んと、これで大丈夫かな？　次は忘れないでね」"

[[dialogue]]
speaker = "附属生Ａ"
# 「ありがと、ミウ。ミウのノート、綺麗で見やすいから助かったわー、恩に着る！」
line = "「ありがと、ミウ。ミウのノート、綺麗で見やすいから助かったわー、恩に着る！」"

[[dialogue]]
speaker = "附属生Ｂ"
# 「ミウ、帰りに鯛焼き食べに行かない？　ノート貸してくれたお礼に奢るからさ！」
line = "「ミウ、帰りに鯛焼き食べに行かない？　ノート貸してくれたお礼に奢るからさ！」"

[[dialogue]]
speaker = "ミウ"
# 「う～～ん、すっごく魅力的だけど……ごめんね、放課後はヒマワリちゃんと約束があって」
line = "「う～～ん、すっごく魅力的だけど……ごめんね、放課後はヒマワリちゃんと約束があって」"

[[dialogue]]
speaker = "附属生Ａ"
# 「えー、またー？　いつもヒマワリと一緒だね」
line = "「えー、またー？　いつもヒマワリと一緒だね」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ごめんねー、ミウはあたしのもんだからさ♪」
line = "「ごめんねー、ミウはあたしのもんだからさ♪」"

[[dialogue]]
speaker = "附属生Ｂ"
# 「独り占めはズルいってー。２人ってホントに仲良いよねー」
line = "「独り占めはズルいってー。２人ってホントに仲良いよねー」"

[[dialogue]]
speaker = "ミウ"
# 「うん、私たち、親友だから！　じゃ、行こっか、ヒマワリちゃん」
line = "「うん、私たち、親友だから！　じゃ、行こっか、ヒマワリちゃん」"

[[dialogue]]
speaker = "unk"
# 附属２年生・深沢ミウ。真面目で、人当たりがよくて、しっかり者の優等生。
line = "附属２年生・深沢ミウ。真面目で、人当たりがよくて、しっかり者の優等生。"

[[dialogue]]
speaker = "unk"
# しかし、そんな彼女の裏の顔は──
line = "しかし、そんな彼女の裏の顔は──"

[[dialogue]]
speaker = "ミウ"
# 「お疲れさまです、セナリィ社長」
line = "「お疲れさまです、セナリィ社長」"

[[dialogue]]
speaker = "unk"
# 秘密結社ゴールデングースの見習い新入社員である。
line = "秘密結社ゴールデングースの見習い新入社員である。"

[[dialogue]]
speaker = "ミウ"
# 「どうして新星の会長さんがいらっしゃるんですか？」
line = "「どうして新星の会長さんがいらっしゃるんですか？」"

[[dialogue]]
speaker = "セナリィ"
# 「今日は会長様を含めた合同任務ですわ。ミウとヒマワリは会長様に会うのは初めてだったかしら」
line = "「今日は会長様を含めた合同任務ですわ。ミウとヒマワリは会長様に会うのは初めてだったかしら」"

[[dialogue]]
speaker = "ヒマワリ"
# 「遠目に姿を見かけたことはありますけど、直に会うのは初めてです。よろしくお願いします、会長さん！」
line = "「遠目に姿を見かけたことはありますけど、直に会うのは初めてです。よろしくお願いします、会長さん！」"

[[dialogue]]
speaker = "ミウ"
# 「よろしくお願いします。かつての戦闘のアーカイブも拝見してます。会長の座にいるだけあって圧巻の戦闘力でした」
line = "「よろしくお願いします。かつての戦闘のアーカイブも拝見してます。会長の座にいるだけあって圧巻の戦闘力でした」"

[[dialogue]]
speaker = "ミウ"
# 「正式にセナリィ社長の傘下に入っていただければ、プランに投入できるのに……残念です」
line = "「正式にセナリィ社長の傘下に入っていただければ、プランに投入できるのに……残念です」"

[[dialogue]]
speaker = "ミウ"
# 「上から目線で恐縮ですけど……今回の任務で会長さんの実力、確かめさせてもらいますね」
line = "「上から目線で恐縮ですけど……今回の任務で会長さんの実力、確かめさせてもらいますね」"

[[dialogue]]
speaker = "unk"
# よろしくね、ミウ、ヒマワリ
line = "よろしくね、ミウ、ヒマワリ"

[[dialogue]]
speaker = "unk"
# 公安委員会から『違法薬物が混入された酒が流通・取引されている』という情報を受けた俺たちはその現場へと向かった。
line = "公安委員会から『違法薬物が混入された酒が流通・取引されている』という情報を受けた俺たちはその現場へと向かった。"

[[dialogue]]
speaker = "ヒマワリ"
# 「遊園地なんかで取引してんのー？」
line = "「遊園地なんかで取引してんのー？」"

[[dialogue]]
speaker = "ミウ"
# 「遊戯施設ならアルコールを提供していてもおかしくないですし、『まさかこんなところで』っていう隠れ蓑ですかね」
line = "「遊戯施設ならアルコールを提供していてもおかしくないですし、『まさかこんなところで』っていう隠れ蓑ですかね」"

[[dialogue]]
speaker = "セナリィ"
# 「しっ……！　怪しい人影がありますわ……５……８……１７人……なかなかの大所帯ですわね。ミウ、良いプランは思いつきまして？」
line = "「しっ……！　怪しい人影がありますわ……５……８……１７人……なかなかの大所帯ですわね。ミウ、良いプランは思いつきまして？」"

[[dialogue]]
speaker = "ミウ"
# 「そうですね……人数差がありますし、正面切っての交戦は控え、奇襲を仕掛けるべきかと」
line = "「そうですね……人数差がありますし、正面切っての交戦は控え、奇襲を仕掛けるべきかと」"

[[dialogue]]
speaker = "ミウ"
# 「私が遠距離から狙撃し、１人を無力化します。あえて射線を明らかにして、敵を引きつけ、手薄になったところを、社長とヒマワリちゃんで制圧……というのはどうでしょう？」
line = "「私が遠距離から狙撃し、１人を無力化します。あえて射線を明らかにして、敵を引きつけ、手薄になったところを、社長とヒマワリちゃんで制圧……というのはどうでしょう？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしとセナリィ社長……あれ？　会長さんは？」
line = "「あたしとセナリィ社長……あれ？　会長さんは？」"

[[dialogue]]
speaker = "ミウ"
# 「会長さんには私の方に寄ってくる敵を引き付けてもらいます。囮になってください」
line = "「会長さんには私の方に寄ってくる敵を引き付けてもらいます。囮になってください」"

[[dialogue]]
speaker = "unk"
# 了解。任せてよ
line = "了解。任せてよ"

[[dialogue]]
speaker = "ミウ"
# 「え……自分が提案したプランではありますけど、随分と簡単に了承してくれるんですね。最も危険な役回りですよ？」
line = "「え……自分が提案したプランではありますけど、随分と簡単に了承してくれるんですね。最も危険な役回りですよ？」"

[[dialogue]]
speaker = "unk"
# 君の導いた最適解なら間違いなさそうだから
line = "君の導いた最適解なら間違いなさそうだから"

[[dialogue]]
speaker = "ミウ"
# 「……っ！　はい、私のプランは失敗しません！」
line = "「……っ！　はい、私のプランは失敗しません！」"

[[dialogue]]
speaker = "セナリィ"
# 「行きますわよ、ゴールデングース！　ミッションスタート！　ですわ！」
line = "「行きますわよ、ゴールデングース！　ミッションスタート！　ですわ！」"

[[dialogue]]
speaker = "unk"
# ミウのプラン通り、ゴールデングースと俺が奇襲をかけ、犯罪者たちはあえなくお縄についた。
line = "ミウのプラン通り、ゴールデングースと俺が奇襲をかけ、犯罪者たちはあえなくお縄についた。"

[[dialogue]]
speaker = "セナリィ"
# 「ふふ、楽勝でしたわね！」
line = "「ふふ、楽勝でしたわね！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「会長さんがヘイト集めて、タンクになってくれたおかげです！　ありがとうございます！」
line = "「会長さんがヘイト集めて、タンクになってくれたおかげです！　ありがとうございます！」"

[[dialogue]]
speaker = "密売人"
# 「くっ、くそ……なんなんだ、てめぇら……」
line = "「くっ、くそ……なんなんだ、てめぇら……」"

[[dialogue]]
speaker = "セナリィ"
# 「おーっほっほっほ、何者と尋ねられれば颯爽と名乗らせていただきましょう！　我ら秘密結社ゴールデ──」
line = "「おーっほっほっほ、何者と尋ねられれば颯爽と名乗らせていただきましょう！　我ら秘密結社ゴールデ──」"

[[dialogue]]
speaker = "ミウ"
# 「おかしいですね。この程度の量では流通量と釣り合いません。取引場所はここだけではないですよね？　他の在庫は？」
line = "「おかしいですね。この程度の量では流通量と釣り合いません。取引場所はここだけではないですよね？　他の在庫は？」"

[[dialogue]]
speaker = "密売人"
# 「ハッ、バカが。言うわけねーだろ」
line = "「ハッ、バカが。言うわけねーだろ」"

[[dialogue]]
speaker = "ミウ"
# 「なるほど、なるほど……そうですよねー。会長さん、汚れ仕事で申し訳ないんですけど……そこに転がってる方をうつぶせにして、お尻を向けさせてくれますか？」
line = "「なるほど、なるほど……そうですよねー。会長さん、汚れ仕事で申し訳ないんですけど……そこに転がってる方をうつぶせにして、お尻を向けさせてくれますか？」"

[[dialogue]]
speaker = "セナリィ"
# 「ミウ？　貴方、何をするつもりですの？」
line = "「ミウ？　貴方、何をするつもりですの？」"

[[dialogue]]
speaker = "ミウ"
# 「ああ、いえ、悪い取引をされているので、お酒の危険性について教えてあげようかなぁって♪」
line = "「ああ、いえ、悪い取引をされているので、お酒の危険性について教えてあげようかなぁって♪」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あー……ミウを本気にさせちゃった。おじさん、早めに素直になっとけば良かったのにね」
line = "「あー……ミウを本気にさせちゃった。おじさん、早めに素直になっとけば良かったのにね」"

[[dialogue]]
speaker = "ミウ"
# 「私はまだ飲んだことはありませんけど……お尻からアルコールを摂取すると、即座に直腸で吸収されて、べろんべろんに酔っぱらっちゃうそうじゃないですか」
line = "「私はまだ飲んだことはありませんけど……お尻からアルコールを摂取すると、即座に直腸で吸収されて、べろんべろんに酔っぱらっちゃうそうじゃないですか」"

[[dialogue]]
speaker = "ミウ"
# 「おクスリの入ったお酒なら、さぞ悪酔いして、お喋りになっちゃうんでしょうねー？　さぁさ、女の子のお酌で一献、楽しんでくださいね♪」
line = "「おクスリの入ったお酒なら、さぞ悪酔いして、お喋りになっちゃうんでしょうねー？　さぁさ、女の子のお酌で一献、楽しんでくださいね♪」"

[[dialogue]]
speaker = "密売人"
# 「ちょ、ま、待て、な、なんなんだよ、オマエらッ！　女の面した悪魔か！？」
line = "「ちょ、ま、待て、な、なんなんだよ、オマエらッ！　女の面した悪魔か！？」"

[[dialogue]]
speaker = "ミウ"
# 「えーっ、悪魔なんてひどい言いがかりです。私たちはどこにでもいるごく普通の女の子なのに」
line = "「えーっ、悪魔なんてひどい言いがかりです。私たちはどこにでもいるごく普通の女の子なのに」"

[[dialogue]]
speaker = "ミウ"
# 「じゃあいきますよー。美味しいお酒を味わってくださいね♪」
line = "「じゃあいきますよー。美味しいお酒を味わってくださいね♪」"

[[dialogue]]
speaker = "密売人"
# 「ひっ！？　わかった！　わかったよ、喋るから、やめてくれぇっ！？」
line = "「ひっ！？　わかった！　わかったよ、喋るから、やめてくれぇっ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「ひぃいぃっ……！？」
line = "「ひぃいぃっ……！？」"

[[dialogue]]
speaker = "unk"
# 合掌……
line = "合掌……"

[[dialogue]]
speaker = "unk"
# こうして、秘密結社ゴールデングースの手により、またひとつ悪徳犯罪が解決されたのであった。
line = "こうして、秘密結社ゴールデングースの手により、またひとつ悪徳犯罪が解決されたのであった。"
