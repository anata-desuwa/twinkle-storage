[[dialogue]]
speaker = "unk"
# 第４話,広がる世界,P
line = "第４話,広がる世界,P"

[[dialogue]]
speaker = "unk"
# ──リップルの結界に異常が発生した『冬のイタズラ事件』のその後。
line = "──リップルの結界に異常が発生した『冬のイタズラ事件』のその後。"

[[dialogue]]
speaker = "unk"
# 改めてリップルにお願いしてプライベートビーチに招き入れてもらった。
line = "改めてリップルにお願いしてプライベートビーチに招き入れてもらった。"

[[dialogue]]
speaker = "ソフィア"
# 「ほわ……夕方だと、また違った風情がありますね。サンセットビーチ、というやつですか」
line = "「ほわ……夕方だと、また違った風情がありますね。サンセットビーチ、というやつですか」"

[[dialogue]]
speaker = "ソフィア"
# 「夕焼けに染まる海と砂浜──うっとりしてしまうくらい美しいです。ため息が漏れちゃいますね」
line = "「夕焼けに染まる海と砂浜──うっとりしてしまうくらい美しいです。ため息が漏れちゃいますね」"

[[dialogue]]
speaker = "ソフィア"
# 「私たちの他には──と……あれ？　誰もいませんね。すっかり静かな様子で……」
line = "「私たちの他には──と……あれ？　誰もいませんね。すっかり静かな様子で……」"

[[dialogue]]
speaker = "unk"
# 誰も来ないってさ
line = "誰も来ないってさ"

[[dialogue]]
speaker = "unk"
# 今日は２人だけ
line = "今日は２人だけ"

[[dialogue]]
speaker = "ソフィア"
# 「！　なるほど……私と会長さんだけ、ですか」
line = "「！　なるほど……私と会長さんだけ、ですか」"

[[dialogue]]
speaker = "ソフィア"
# 「道理で波の音しか聞こえてこないわけです。これは、ますますロマンチックさが増しましたね……」
line = "「道理で波の音しか聞こえてこないわけです。これは、ますますロマンチックさが増しましたね……」"

[[dialogue]]
speaker = "ソフィア"
# 「堂々とイチャイチャできるね──って……そ、そうかもしれませんけど……！」
line = "「堂々とイチャイチャできるね──って……そ、そうかもしれませんけど……！」"

[[dialogue]]
speaker = "ソフィア"
# 「確かにこの前はみんなの前で、気恥ずかしかったりしたものですが……こんな広い場所で２人きりというのも妙な緊張感があります」
line = "「確かにこの前はみんなの前で、気恥ずかしかったりしたものですが……こんな広い場所で２人きりというのも妙な緊張感があります」"

[[dialogue]]
speaker = "ソフィア"
# 「ビーチを独り占め？　ふふ……そうですね。今の私たちだけの特権、ですね」
line = "「ビーチを独り占め？　ふふ……そうですね。今の私たちだけの特権、ですね」"

[[dialogue]]
speaker = "ソフィア"
# 「なら……はい。やはり、これくらいは、近づいてもよさそうでしょうか」
line = "「なら……はい。やはり、これくらいは、近づいてもよさそうでしょうか」"

[[dialogue]]
speaker = "unk"
# もう隙間風はこないよ？
line = "もう隙間風はこないよ？"

[[dialogue]]
speaker = "ソフィア"
# 「日が暮れてきてますから。気温が下がってコールドになる可能性もありますから。あらかじめ暖を取っておくのです」
line = "「日が暮れてきてますから。気温が下がってコールドになる可能性もありますから。あらかじめ暖を取っておくのです」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふふ……恋人同士なのですから、これくらいの距離でも問題ありませんよね」
line = "「ふふふ……恋人同士なのですから、これくらいの距離でも問題ありませんよね」"

[[dialogue]]
speaker = "ソフィア"
# 「この広いビーチに私たちだけなんて……なんだかもったいない気もしますが。せっかくの機会ですし、甘えておきましょう」
line = "「この広いビーチに私たちだけなんて……なんだかもったいない気もしますが。せっかくの機会ですし、甘えておきましょう」"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ソフィア"
# 「……撫でていいなんて言ってませんよ」
line = "「……撫でていいなんて言ってませんよ」"

[[dialogue]]
speaker = "unk"
# イヤ？
line = "イヤ？"

[[dialogue]]
speaker = "unk"
# ごめん
line = "ごめん"

[[dialogue]]
speaker = "ソフィア"
# 「まあ、イヤでは、ありませんけど……。子どものように扱われるのは……姉さんじゃあるまいし……」
line = "「まあ、イヤでは、ありませんけど……。子どものように扱われるのは……姉さんじゃあるまいし……」"

[[dialogue]]
speaker = "ソフィア"
# 「彼氏が彼女にするのも普通？　確かに、言われてみればそうです。なら──これは彼女撫でということで、セーフにしておきましょう」
line = "「彼氏が彼女にするのも普通？　確かに、言われてみればそうです。なら──これは彼女撫でということで、セーフにしておきましょう」"

[[dialogue]]
speaker = "ソフィア"
# 「ほら、もっと彼女撫でをしてください。えい、えいっ」
line = "「ほら、もっと彼女撫でをしてください。えい、えいっ」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふふ。会長さんの手、大っきくて温かいです。私、こうされていると落ち着くんです」
line = "「ふふふ。会長さんの手、大っきくて温かいです。私、こうされていると落ち着くんです」"

[[dialogue]]
speaker = "ソフィア"
# 「いつまでもこのままでいたい……なんて、思わされます。これもビーチの夕日がかける魔法、でしょうか」
line = "「いつまでもこのままでいたい……なんて、思わされます。これもビーチの夕日がかける魔法、でしょうか」"

[[dialogue]]
speaker = "ソフィア"
# 「しばらくの間……このままでも、いいですか？」
line = "「しばらくの間……このままでも、いいですか？」"

[[dialogue]]
speaker = "unk"
# それから、黄昏時のビーチでゆったりした時間を過ごした……。
line = "それから、黄昏時のビーチでゆったりした時間を過ごした……。"

[[dialogue]]
speaker = "ソフィア"
# 「……いいものですね」
line = "「……いいものですね」"

[[dialogue]]
speaker = "unk"
# リゾートが？
line = "リゾートが？"

[[dialogue]]
speaker = "unk"
# なにが？
line = "なにが？"

[[dialogue]]
speaker = "ソフィア"
# 「……この時間が。うまくは言えませんが……私たちの周りを流れている空気も、全部」
line = "「……この時間が。うまくは言えませんが……私たちの周りを流れている空気も、全部」"

[[dialogue]]
speaker = "ソフィア"
# 「この海も……穏やかな気候も……故郷のレゾフからは、とても考えられない光景です。あっちは今も、猛吹雪に見舞われているでしょうから」
line = "「この海も……穏やかな気候も……故郷のレゾフからは、とても考えられない光景です。あっちは今も、猛吹雪に見舞われているでしょうから」"

[[dialogue]]
speaker = "ソフィア"
# 「水着なんて、見たこともなかったんですよ？　会長さんからすれば、信じられませんよね」
line = "「水着なんて、見たこともなかったんですよ？　会長さんからすれば、信じられませんよね」"

[[dialogue]]
speaker = "ソフィア"
# 「どれも──学園に入らなかったら、手に入ることのないものでした。ここまで来て良かったなって、思います」
line = "「どれも──学園に入らなかったら、手に入ることのないものでした。ここまで来て良かったなって、思います」"

[[dialogue]]
speaker = "ソフィア"
# 「最初は……わからないこと尽くしで、星徒会の活動も大変でしたけど。多くのことを乗り越えてこられて良かった」
line = "「最初は……わからないこと尽くしで、星徒会の活動も大変でしたけど。多くのことを乗り越えてこられて良かった」"

[[dialogue]]
speaker = "ソフィア"
# 「それに──あなたと出会えましたから」
line = "「それに──あなたと出会えましたから」"

[[dialogue]]
speaker = "ソフィア"
# 「知らないものに触れて、知らない土地を訪れるたびに──思うんです。まるで、奏ソフィアという自分の世界が広がっていくみたいな感覚だって」
line = "「知らないものに触れて、知らない土地を訪れるたびに──思うんです。まるで、奏ソフィアという自分の世界が広がっていくみたいな感覚だって」"

[[dialogue]]
speaker = "ソフィア"
# 「そこに会長さんがいることで、それがもっともーっと広がっていくんです。嘘じゃないですよ」
line = "「そこに会長さんがいることで、それがもっともーっと広がっていくんです。嘘じゃないですよ」"

[[dialogue]]
speaker = "ソフィア"
# 「……なんて。ちょっと湿っぽくなってしまいましたかね。まだ何も始まってませんのに」
line = "「……なんて。ちょっと湿っぽくなってしまいましたかね。まだ何も始まってませんのに」"

[[dialogue]]
speaker = "ソフィア"
# 「だから、これからも──私の隣で同じ時間を過ごしてくださいね。会長さん<emoji=heart04>」
line = "「だから、これからも──私の隣で同じ時間を過ごしてくださいね。会長さん<emoji=heart04>」"
