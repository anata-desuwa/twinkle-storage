[[dialogue]]
speaker = "unk"
# 第１話,嬉し恥ずかし,P
line = "第１話,嬉し恥ずかし,P"

[[dialogue]]
speaker = "unk"
# ヨミと恋人として付き合い始めてから、しばらく経ったある日のこと。俺が彼女に会いに大聖堂カフェテリアへやってくると――
line = "ヨミと恋人として付き合い始めてから、しばらく経ったある日のこと。俺が彼女に会いに大聖堂カフェテリアへやってくると――"

[[dialogue]]
speaker = "せつな"
# 「主様――いきなり御免でござりまする！」
line = "「主様――いきなり御免でござりまする！」"

[[dialogue]]
speaker = "unk"
# えっ、ちょっ、せつな！？　うおわぁ～っ！？
line = "えっ、ちょっ、せつな！？　うおわぁ～っ！？"

[[dialogue]]
speaker = "unk"
# なんと俺は、どこからか現れた縄に縛られ、一瞬で天井高く吊るされてしまった！　しかも口も縄で塞がれて、声が出せない。
line = "なんと俺は、どこからか現れた縄に縛られ、一瞬で天井高く吊るされてしまった！　しかも口も縄で塞がれて、声が出せない。"

[[dialogue]]
speaker = "ヨミ"
# 「あれ？　なんか今、会長の声が聞こえたような……？」
line = "「あれ？　なんか今、会長の声が聞こえたような……？」"

[[dialogue]]
speaker = "ヨミ"
# 「あっ、せつなさん！　会長を見たりしませんでしたか？」
line = "「あっ、せつなさん！　会長を見たりしませんでしたか？」"

[[dialogue]]
speaker = "ヨミ"
# 「お昼時で料理の匂いが多いので自信はないんですけど、なんだか会長の匂いもするような気がして……くんくん」
line = "「お昼時で料理の匂いが多いので自信はないんですけど、なんだか会長の匂いもするような気がして……くんくん」"

[[dialogue]]
speaker = "せつな"
# 「せつなは見ておりませぬが、なんだかヨミ殿は、そわそわしている様子でござるな？」
line = "「せつなは見ておりませぬが、なんだかヨミ殿は、そわそわしている様子でござるな？」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　そ、そうでしょうか？」
line = "「こやっ！？　そ、そうでしょうか？」"

[[dialogue]]
speaker = "せつな"
# 「もうすぐクリスマスでござるが、その日は主様と一緒に過ごしたりしないのでござるか？」
line = "「もうすぐクリスマスでござるが、その日は主様と一緒に過ごしたりしないのでござるか？」"

[[dialogue]]
speaker = "ヨミ"
# 「それがまだ、言えてなくて……って、せつなさん、なんでわかるんですか！？」
line = "「それがまだ、言えてなくて……って、せつなさん、なんでわかるんですか！？」"

[[dialogue]]
speaker = "せつな"
# 「え？　だって、ヨミ殿と主様は男女のお付き合いをされているのでは？」
line = "「え？　だって、ヨミ殿と主様は男女のお付き合いをされているのでは？」"

[[dialogue]]
speaker = "ヨミ"
# 「ど、どうしてそれを！？　周りには秘密にしてたはずなのに……」
line = "「ど、どうしてそれを！？　周りには秘密にしてたはずなのに……」"

[[dialogue]]
speaker = "せつな"
# 「そうだったのでござるか？　最近のヨミ殿は主様といる時、好意が駄々洩れでござったが……ヴィーナスお嬢様や、閃殿も、わかっているご様子でしたし」
line = "「そうだったのでござるか？　最近のヨミ殿は主様といる時、好意が駄々洩れでござったが……ヴィーナスお嬢様や、閃殿も、わかっているご様子でしたし」"

[[dialogue]]
speaker = "ヨミ"
# 「こっ、こやあぁぁぁーーーっ！？」
line = "「こっ、こやあぁぁぁーーーっ！？」"

[[dialogue]]
speaker = "ヨミ"
# 「ま、待って下さいっ。私ってそんなわかりやすかったですか！？　確かに会長のことは好きですし、付き合い始めてから、もっと好きになってる自覚はありますけど……！」
line = "「ま、待って下さいっ。私ってそんなわかりやすかったですか！？　確かに会長のことは好きですし、付き合い始めてから、もっと好きになってる自覚はありますけど……！」"

[[dialogue]]
speaker = "せつな"
# 「それはもう、ヨミ殿が主様と話されている時は、尻尾が嬉しそうにぶんぶんしているでござるから♪」
line = "「それはもう、ヨミ殿が主様と話されている時は、尻尾が嬉しそうにぶんぶんしているでござるから♪」"

[[dialogue]]
speaker = "ヨミ"
# 「む、無意識だったぁぁぁーーーっ！　ば……爆裂恥ずかしくて、死にそうです……！」
line = "「む、無意識だったぁぁぁーーーっ！　ば……爆裂恥ずかしくて、死にそうです……！」"

[[dialogue]]
speaker = "せつな"
# 「あまりにも露骨な恋愛オーラに、最初はなんと破廉恥なのかと、見ていて顔が熱くなってしまう程でござったが――」
line = "「あまりにも露骨な恋愛オーラに、最初はなんと破廉恥なのかと、見ていて顔が熱くなってしまう程でござったが――」"

[[dialogue]]
speaker = "ヨミ"
# 「破廉恥！？」
line = "「破廉恥！？」"

[[dialogue]]
speaker = "せつな"
# 「しかし今では、公衆の面前でも堂々と好意アピールをしてみせるヨミ殿を、せつなは素直に尊敬しているでござる！」
line = "「しかし今では、公衆の面前でも堂々と好意アピールをしてみせるヨミ殿を、せつなは素直に尊敬しているでござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「いや隠してるつもりだったんですけど！？」
line = "「いや隠してるつもりだったんですけど！？」"

[[dialogue]]
speaker = "せつな"
# 「これがいわゆる、バカップルというやつなのかと、日々勉強させてもらっているでござる！」
line = "「これがいわゆる、バカップルというやつなのかと、日々勉強させてもらっているでござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「バカップル認定されてるーーーっ！？　こやあぁぁぁーーーんっ！」
line = "「バカップル認定されてるーーーっ！？　こやあぁぁぁーーーんっ！」"

[[dialogue]]
speaker = "せつな"
# 「ちなみに、前から気になっていたのでござるが、お２人はどのようにして付き合い始めたのでござるか？」
line = "「ちなみに、前から気になっていたのでござるが、お２人はどのようにして付き合い始めたのでござるか？」"

[[dialogue]]
speaker = "ヨミ"
# 「そ、それは……２人で街へ遊びに出かけた時に、会長の方から告白してくれて……」
line = "「そ、それは……２人で街へ遊びに出かけた時に、会長の方から告白してくれて……」"

[[dialogue]]
speaker = "せつな"
# 「ほう！　さすがは主様でござる！」
line = "「ほう！　さすがは主様でござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「一緒にいると安心するから、これからも側にいてくれないかって言ってくれて……私も同じことを思ってたから、嬉しくて……<emoji=heart04>」
line = "「一緒にいると安心するから、これからも側にいてくれないかって言ってくれて……私も同じことを思ってたから、嬉しくて……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「なるほど、お２人はお互いに安心を感じられる関係なのでござるな。それならば――」
line = "「なるほど、お２人はお互いに安心を感じられる関係なのでござるな。それならば――」"

[[dialogue]]
speaker = "せつな"
# 「今度のクリスマス、主様もきっと、ヨミ殿と一緒にいたいと思っているはず。素直にヨミ殿の気持ちを伝えてみればいいのでは？」
line = "「今度のクリスマス、主様もきっと、ヨミ殿と一緒にいたいと思っているはず。素直にヨミ殿の気持ちを伝えてみればいいのでは？」"

[[dialogue]]
speaker = "ヨミ"
# 「そ、そうなんですけど……いざ言おうと思うと、なんだか恥ずかしくて……」
line = "「そ、そうなんですけど……いざ言おうと思うと、なんだか恥ずかしくて……」"

[[dialogue]]
speaker = "せつな"
# 「ふむ、恋愛とはやはり心の弱い部分をさらけ出すこと。想いが通じ合った相手も、恥ずかしさを感じてしまうものなのでござるな。実に興味深い――」
line = "「ふむ、恋愛とはやはり心の弱い部分をさらけ出すこと。想いが通じ合った相手も、恥ずかしさを感じてしまうものなのでござるな。実に興味深い――」"

[[dialogue]]
speaker = "せつな"
# 「というわけで主様、ヨミ殿の気持ちは以上にござりまする！　いま縄を解きますので、少々お待ち下さいませ」
line = "「というわけで主様、ヨミ殿の気持ちは以上にござりまする！　いま縄を解きますので、少々お待ち下さいませ」"

[[dialogue]]
speaker = "ヨミ"
# 「えっ、会長！？　い、一体いつからそこに！？」
line = "「えっ、会長！？　い、一体いつからそこに！？」"

[[dialogue]]
speaker = "unk"
# せつなが天井から降ろしてくれて、俺は自由の身になる。ヨミがせつなと話し始める直前からいたことを告げると――
line = "せつなが天井から降ろしてくれて、俺は自由の身になる。ヨミがせつなと話し始める直前からいたことを告げると――"

[[dialogue]]
speaker = "ヨミ"
# 「と、ということは、さっきの話は全部聞かれて……！？」
line = "「と、ということは、さっきの話は全部聞かれて……！？」"

[[dialogue]]
speaker = "ヨミ"
# 「ば、爆裂恥ずかし過ぎますぅ……！」
line = "「ば、爆裂恥ずかし過ぎますぅ……！」"

[[dialogue]]
speaker = "せつな"
# 「すまぬでござる、ヨミ殿。クリスマスをどうするかと主様に聞いたりしないのに、日頃そわそわとタイミングを伺っている様子だったので、つい……♪」
line = "「すまぬでござる、ヨミ殿。クリスマスをどうするかと主様に聞いたりしないのに、日頃そわそわとタイミングを伺っている様子だったので、つい……♪」"

[[dialogue]]
speaker = "ヨミ"
# 「気持ちはありがたいですけどぉ……！　か、会長にはなるべく恋人として良いところを見せたかったっていうか……！」
line = "「気持ちはありがたいですけどぉ……！　か、会長にはなるべく恋人として良いところを見せたかったっていうか……！」"

[[dialogue]]
speaker = "ヨミ"
# 「クリスマスが忙しかったりするかもしれないですし、一緒に過ごしたいとか、実は重いかもって考えたりもして、会長の予定がもし空いてたらくらいに自重しようと……！」
line = "「クリスマスが忙しかったりするかもしれないですし、一緒に過ごしたいとか、実は重いかもって考えたりもして、会長の予定がもし空いてたらくらいに自重しようと……！」"

[[dialogue]]
speaker = "unk"
# 実は俺も、言い出せないでいた
line = "実は俺も、言い出せないでいた"

[[dialogue]]
speaker = "ヨミ"
# 「え？　会長も、ですか……？」
line = "「え？　会長も、ですか……？」"

[[dialogue]]
speaker = "ヨミ"
# 「――そ、そっか……私たち、お互いに同じことを考えてたんですね……」
line = "「――そ、そっか……私たち、お互いに同じことを考えてたんですね……」"

[[dialogue]]
speaker = "unk"
# 俺は正直に「クリスマスの日、ヨミと一緒に過ごしたい」と気持ちを伝える。
line = "俺は正直に「クリスマスの日、ヨミと一緒に過ごしたい」と気持ちを伝える。"

[[dialogue]]
speaker = "ヨミ"
# 「あ……！」
line = "「あ……！」"

[[dialogue]]
speaker = "ヨミ"
# 「はい……♪　私も、会長とクリスマスを過ごしたいです……<emoji=heart04>」
line = "「はい……♪　私も、会長とクリスマスを過ごしたいです……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「ヨミ殿、よかったでござるな♪」
line = "「ヨミ殿、よかったでござるな♪」"

[[dialogue]]
speaker = "ヨミ"
# 「えへへ……♪　はい……♪」
line = "「えへへ……♪　はい……♪」"

[[dialogue]]
speaker = "ヨミ"
# 「その……会長。クリスマス、楽しみにしてますね……♪」
line = "「その……会長。クリスマス、楽しみにしてますね……♪」"

[[dialogue]]
speaker = "unk"
# 照れながらも、嬉しそうに尻尾を振るヨミなのだった――
line = "照れながらも、嬉しそうに尻尾を振るヨミなのだった――"
