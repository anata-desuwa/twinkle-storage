[[dialogue]]
speaker = "unk"
# 第３話,魔王の兄妹デート,P
line = "第３話,魔王の兄妹デート,P"

[[dialogue]]
speaker = "unk"
# メイプルと仲良くなってから、しばらく経ったある休日。
line = "メイプルと仲良くなってから、しばらく経ったある休日。"

[[dialogue]]
speaker = "unk"
# 俺は彼女と２人で出かける約束をして、街へとやって来ていた――
line = "俺は彼女と２人で出かける約束をして、街へとやって来ていた――"

[[dialogue]]
speaker = "メイプル"
# 「よし、着いた～♪　――じゃあ、何して遊ぼっか、お兄ちゃん？　スイーツビュッフェの予約時間まで、まだしばらくあるんだよね～」
line = "「よし、着いた～♪　――じゃあ、何して遊ぼっか、お兄ちゃん？　スイーツビュッフェの予約時間まで、まだしばらくあるんだよね～」"

[[dialogue]]
speaker = "メイプル"
# 「あ、そうだ！　せっかくだし、お兄ちゃんとの絆を深める為に、デートっぽいこととかしよっか♪」
line = "「あ、そうだ！　せっかくだし、お兄ちゃんとの絆を深める為に、デートっぽいこととかしよっか♪」"

[[dialogue]]
speaker = "unk"
# で、デート……！？
line = "で、デート……！？"

[[dialogue]]
speaker = "メイプル"
# 「うん♪　だって、兄妹２人でお出かけしてるわけだし、別におかしくはないでしょ？」
line = "「うん♪　だって、兄妹２人でお出かけしてるわけだし、別におかしくはないでしょ？」"

[[dialogue]]
speaker = "メイプル"
# 「――自称・妹だよねって？　もう、そこをツッコむのは野暮というものだよ、お兄ちゃん」
line = "「――自称・妹だよねって？　もう、そこをツッコむのは野暮というものだよ、お兄ちゃん」"

[[dialogue]]
speaker = "メイプル"
# 「というわけで、手を繋いでもいい？」
line = "「というわけで、手を繋いでもいい？」"

[[dialogue]]
speaker = "unk"
# 手を？　メイプルがいいなら……
line = "手を？　メイプルがいいなら……"

[[dialogue]]
speaker = "メイプル"
# 「じゃあ、繋ぐね？　――えいっ♪」
line = "「じゃあ、繋ぐね？　――えいっ♪」"

[[dialogue]]
speaker = "メイプル"
# 「にへへ……♪　お兄ちゃんの手、こうして触ってみると大きいね！　男の人と手を繋いだのは、小さい時にパパと出かけた時以来かな～？」
line = "「にへへ……♪　お兄ちゃんの手、こうして触ってみると大きいね！　男の人と手を繋いだのは、小さい時にパパと出かけた時以来かな～？」"

[[dialogue]]
speaker = "メイプル"
# 「このまま時間までショッピングでもして回ろっか♪　――それじゃあ、しゅっぱ～つ♪」
line = "「このまま時間までショッピングでもして回ろっか♪　――それじゃあ、しゅっぱ～つ♪」"

[[dialogue]]
speaker = "unk"
# そうして、予約しているスイーツビュッフェの時間になり、俺たちは店に入った。
line = "そうして、予約しているスイーツビュッフェの時間になり、俺たちは店に入った。"

[[dialogue]]
speaker = "メイプル"
# 「――ん～！　美味しい～♪　マカロンが食べ放題なんて、幸せ～♪」
line = "「――ん～！　美味しい～♪　マカロンが食べ放題なんて、幸せ～♪」"

[[dialogue]]
speaker = "unk"
# メイプルが皿に取ってきたのは、山盛りになった色とりどりのマカロンであった。
line = "メイプルが皿に取ってきたのは、山盛りになった色とりどりのマカロンであった。"

[[dialogue]]
speaker = "unk"
# マカロンが好きなのか？
line = "マカロンが好きなのか？"

[[dialogue]]
speaker = "メイプル"
# 「うん♪　魔界にもあるお菓子なんだよ。高級品だからたまにしか食べられなかったけど……」
line = "「うん♪　魔界にもあるお菓子なんだよ。高級品だからたまにしか食べられなかったけど……」"

[[dialogue]]
speaker = "メイプル"
# 「カラフルで甘くて、子供の頃から宝石みたいなお菓子ってイメージで……こうしていつかお腹いっぱい食べてみたいって、夢だったんだ～♪」
line = "「カラフルで甘くて、子供の頃から宝石みたいなお菓子ってイメージで……こうしていつかお腹いっぱい食べてみたいって、夢だったんだ～♪」"

[[dialogue]]
speaker = "メイプル"
# 「でも、人間界のマカロンはすごいね！　魔界のより値段は安いのに、こんなに美味しいなんて♪」
line = "「でも、人間界のマカロンはすごいね！　魔界のより値段は安いのに、こんなに美味しいなんて♪」"

[[dialogue]]
speaker = "メイプル"
# 「あむっ♪　もぐもぐ……食べるたびに笑顔でふにゃふにゃになっちゃう♪」
line = "「あむっ♪　もぐもぐ……食べるたびに笑顔でふにゃふにゃになっちゃう♪」"

[[dialogue]]
speaker = "unk"
# 夢中になって頬張る彼女がなんだか可愛くて、つい世話を焼きたくなってしまう。
line = "夢中になって頬張る彼女がなんだか可愛くて、つい世話を焼きたくなってしまう。"

[[dialogue]]
speaker = "メイプル"
# 「え？　口元にマカロンの欠片がくっ付いている？　――取ってくれるの？」
line = "「え？　口元にマカロンの欠片がくっ付いている？　――取ってくれるの？」"

[[dialogue]]
speaker = "メイプル"
# 「ん……♪　にへへ、ありがとう、お兄ちゃん♪」
line = "「ん……♪　にへへ、ありがとう、お兄ちゃん♪」"

[[dialogue]]
speaker = "unk"
# スイーツビュッフェを楽しんだ後、店を出た俺たちだったが、ちょっとした問題が発生していた。
line = "スイーツビュッフェを楽しんだ後、店を出た俺たちだったが、ちょっとした問題が発生していた。"

[[dialogue]]
speaker = "メイプル"
# 「う～、調子に乗って、食べ過ぎちゃったかも……」
line = "「う～、調子に乗って、食べ過ぎちゃったかも……」"

[[dialogue]]
speaker = "unk"
# 大丈夫か？　少しどこかに座って休むか？
line = "大丈夫か？　少しどこかに座って休むか？"

[[dialogue]]
speaker = "メイプル"
# 「うん、ごめん。そうしたいかな……」
line = "「うん、ごめん。そうしたいかな……」"

[[dialogue]]
speaker = "unk"
# 俺は周りを見回すが、ベンチとかはなさそうだ。ならばと思い立ち――
line = "俺は周りを見回すが、ベンチとかはなさそうだ。ならばと思い立ち――"

[[dialogue]]
speaker = "メイプル"
# 「って、えっ！？　お兄ちゃん、何を――」
line = "「って、えっ！？　お兄ちゃん、何を――」"

[[dialogue]]
speaker = "メイプル"
# 「ひゃっ！？」
line = "「ひゃっ！？」"

[[dialogue]]
speaker = "メイプル"
# 「こ、これって……お姫様抱っこ！？　ち、ちょっと待って、なんでいきなり……！？」
line = "「こ、これって……お姫様抱っこ！？　ち、ちょっと待って、なんでいきなり……！？」"

[[dialogue]]
speaker = "メイプル"
# 「――近くに座れる場所がないから、探しながら移動する？」
line = "「――近くに座れる場所がないから、探しながら移動する？」"

[[dialogue]]
speaker = "メイプル"
# 「で、でも、お姫様抱っこをする必要は……！　兄妹らしさ的には、おんぶとか……！」
line = "「で、でも、お姫様抱っこをする必要は……！　兄妹らしさ的には、おんぶとか……！」"

[[dialogue]]
speaker = "メイプル"
# 「――おんぶはお腹が圧迫されそう？　た、確かにそうかもだけど……！」
line = "「――おんぶはお腹が圧迫されそう？　た、確かにそうかもだけど……！」"

[[dialogue]]
speaker = "unk"
# もしかしてメイプル、恥ずかしがってる？
line = "もしかしてメイプル、恥ずかしがってる？"

[[dialogue]]
speaker = "メイプル"
# 「へ！？　ち、違……」
line = "「へ！？　ち、違……」"

[[dialogue]]
speaker = "unk"
# 口ごもった彼女は、いつもの眼帯を取り出して装着する。
line = "口ごもった彼女は、いつもの眼帯を取り出して装着する。"

[[dialogue]]
speaker = "メイプル"
# 「ふっ……ふははは！　何を言い出すのだ、お兄ちゃん！　魔王を目指している我が、この程度のことで恥ずかしがるわけがあるまい！？」
line = "「ふっ……ふははは！　何を言い出すのだ、お兄ちゃん！　魔王を目指している我が、この程度のことで恥ずかしがるわけがあるまい！？」"

[[dialogue]]
speaker = "メイプル"
# 「我が言いたいのは……そう！　魔王の威厳的に問題があるということだ！」
line = "「我が言いたいのは……そう！　魔王の威厳的に問題があるということだ！」"

[[dialogue]]
speaker = "メイプル"
# 「故に、ここはやはり、おんぶに切り替えるべき――って、何をニヤニヤしているのだ、お兄ちゃん！？」
line = "「故に、ここはやはり、おんぶに切り替えるべき――って、何をニヤニヤしているのだ、お兄ちゃん！？」"

[[dialogue]]
speaker = "unk"
# ふっ……甘いな、妹よ！
line = "ふっ……甘いな、妹よ！"

[[dialogue]]
speaker = "unk"
# 魔王として、困っている者を助けるのは当然のこと。それが可愛い妹の為ならば、尚更だ。故に、その提案は却下すると宣言する。
line = "魔王として、困っている者を助けるのは当然のこと。それが可愛い妹の為ならば、尚更だ。故に、その提案は却下すると宣言する。"

[[dialogue]]
speaker = "メイプル"
# 「ちょっ……こういう時だけ、ノリノリで魔王を名乗るのはずるいぞ、お兄ちゃん！？」
line = "「ちょっ……こういう時だけ、ノリノリで魔王を名乗るのはずるいぞ、お兄ちゃん！？」"

[[dialogue]]
speaker = "unk"
# 俺はメイプルを腕に抱えたまま、移動を開始する。
line = "俺はメイプルを腕に抱えたまま、移動を開始する。"

[[dialogue]]
speaker = "メイプル"
# 「ま、待って！　本当にこのまま運ぶの！？」
line = "「ま、待って！　本当にこのまま運ぶの！？」"

[[dialogue]]
speaker = "メイプル"
# 「うぅ～……！」
line = "「うぅ～……！」"

[[dialogue]]
speaker = "メイプル"
# （お兄ちゃん相手なのに、なんかドキドキしちゃう……！）
line = "（お兄ちゃん相手なのに、なんかドキドキしちゃう……！）"

[[dialogue]]
speaker = "unk"
# それから運んでいる間、赤くなった顔を両手で隠しながらも、指の間からチラチラとこちらを見てくるメイプルなのだった。
line = "それから運んでいる間、赤くなった顔を両手で隠しながらも、指の間からチラチラとこちらを見てくるメイプルなのだった。"
