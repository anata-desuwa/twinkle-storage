[[dialogue]]
speaker = "unk"
# 第１話,お付き合いしましょう、先輩,P
line = "第１話,お付き合いしましょう、先輩,P"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私、緋宮会長のことを、本当に好きになってしまいましたわぁぁぁ～～～～～～～～～っ！！！」
line = "「私、緋宮会長のことを、本当に好きになってしまいましたわぁぁぁ～～～～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# 昨日の早朝訓練中、いきなりとんでもない告白をした先輩は、ダッシュで俺の前から消えてしまった。
line = "昨日の早朝訓練中、いきなりとんでもない告白をした先輩は、ダッシュで俺の前から消えてしまった。"

[[dialogue]]
speaker = "unk"
# その後も学園ですれ違うたびに『ですわー！？』と叫んでまた逃走……昨日からずっと避けられているのだった──
line = "その後も学園ですれ違うたびに『ですわー！？』と叫んでまた逃走……昨日からずっと避けられているのだった──"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、会長さん。もしかしてお姉様に会いに来られたんですか？」
line = "「あっ、会長さん。もしかしてお姉様に会いに来られたんですか？」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様、何かあったんでしょうか？　昨日も寮に帰られてから、ずっと様子がおかしくて……」
line = "「お姉様、何かあったんでしょうか？　昨日も寮に帰られてから、ずっと様子がおかしくて……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （あぁ、どうしましょうどうしましょう……！？）
line = "（あぁ、どうしましょうどうしましょう……！？）"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様？　あの、私の淹れた紅茶……お口に合いませんでしたか？」
line = "「お姉様？　あの、私の淹れた紅茶……お口に合いませんでしたか？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「へっ！？　い、いいえ！　フニの淹れるお紅茶はいつも最高に美味でしてよ！」
line = "「へっ！？　い、いいえ！　フニの淹れるお紅茶はいつも最高に美味でしてよ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ぐびぐびっ──あっつぅ！？」
line = "「ぐびぐびっ──あっつぅ！？」"

[[dialogue]]
speaker = "フェニエル"
# 「ぴゃっ！？　お姉様、淹れたてなのにそんな勢いよく飲まれたら……！」
line = "「ぴゃっ！？　お姉様、淹れたてなのにそんな勢いよく飲まれたら……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「お、おほほ。お恥ずかしいところを見せてしまいましたわ……そ、そうですフニ。シュガーポットを取っていただけまして？」
line = "「お、おほほ。お恥ずかしいところを見せてしまいましたわ……そ、そうですフニ。シュガーポットを取っていただけまして？」"

[[dialogue]]
speaker = "フェニエル"
# 「は、はいっ。どうぞっ」
line = "「は、はいっ。どうぞっ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （あぁ……あんなにもいきなり胸の内を伝えてしまうだなんて。絶対にドン引きされておりますわよね……！？）
line = "（あぁ……あんなにもいきなり胸の内を伝えてしまうだなんて。絶対にドン引きされておりますわよね……！？）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （しかも言うに事欠いて『好きになってしまいましたわ～……！』だなんて。愛の告白ですらない！　何たる無様……！！）
line = "（しかも言うに事欠いて『好きになってしまいましたわ～……！』だなんて。愛の告白ですらない！　何たる無様……！！）"

[[dialogue]]
speaker = "フェニエル"
# 「ぴゃああ──！？　お姉様、砂糖を乗せすぎです！　カップの上！　角砂糖が山盛りに！」
line = "「ぴゃああ──！？　お姉様、砂糖を乗せすぎです！　カップの上！　角砂糖が山盛りに！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「──ですわっ！？　ご、ごめんなさい、せっかくフニが淹れてくれた紅茶が……！」
line = "「──ですわっ！？　ご、ごめんなさい、せっかくフニが淹れてくれた紅茶が……！」"

[[dialogue]]
speaker = "フェニエル"
# 「だ、大丈夫ですお姉様。まだポットにお代わりはありますから……新しいカップに注ぎますね？」
line = "「だ、大丈夫ですお姉様。まだポットにお代わりはありますから……新しいカップに注ぎますね？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「い、いえ。私がします。ポットだけお借りしますわ」
line = "「い、いえ。私がします。ポットだけお借りしますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ぼーっとしていてはいけませんわね……集中して注がねば……！」
line = "「ぼーっとしていてはいけませんわね……集中して注がねば……！」"

[[dialogue]]
speaker = "流星寮の女子"
# 「お姉様？　緋宮会長が訪ねてきております。何でも２人きりで話がしたいと──」
line = "「お姉様？　緋宮会長が訪ねてきております。何でも２人きりで話がしたいと──」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですわぁ──！？　お、おりません！　私はおりませんわ！　緋宮会長には留守とお伝えなさい！！」
line = "「ですわぁ──！？　お、おりません！　私はおりませんわ！　緋宮会長には留守とお伝えなさい！！」"

[[dialogue]]
speaker = "unk"
# ──バチャバチャバチャバチャッ！
line = "──バチャバチャバチャバチャッ！"

[[dialogue]]
speaker = "フェニエル"
# 「ぴゃあああっ！？　お姉様、テーブルが紅茶まみれに！？」
line = "「ぴゃあああっ！？　お姉様、テーブルが紅茶まみれに！？」"

[[dialogue]]
speaker = "フェニエル"
# 「……と、こんな感じなんです。流星寮のみなさん、すごくすごく心配していて……」
line = "「……と、こんな感じなんです。流星寮のみなさん、すごくすごく心配していて……」"

[[dialogue]]
speaker = "フェニエル"
# 「会長さん、お話を聞いてあげてもらえませんか？　お姉様なら今、学園の中庭あたりにいらっしゃるかと……！」
line = "「会長さん、お話を聞いてあげてもらえませんか？　お姉様なら今、学園の中庭あたりにいらっしゃるかと……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「毎日トレーニングをする約束でしたのに、今朝はすっぽかしてしまいましたわ……」
line = "「毎日トレーニングをする約束でしたのに、今朝はすっぽかしてしまいましたわ……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長、約束を違えた私に怒っているでしょうか……？」
line = "「緋宮会長、約束を違えた私に怒っているでしょうか……？」"

[[dialogue]]
speaker = "unk"
# （あ、花占いを始めた）
line = "（あ、花占いを始めた）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「会長は怒っている……怒っていない……怒っている……怒って──いない！　よ、よかったですわ……！」
line = "「会長は怒っている……怒っていない……怒っている……怒って──いない！　よ、よかったですわ……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「で、では……本題を。緋宮会長は私とお付き合いをしてくれる……してくれない……してくれる……」
line = "「で、では……本題を。緋宮会長は私とお付き合いをしてくれる……してくれない……してくれる……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「してくれ──ない！？　あ、あぁあああ！？　お、おしまいですわぁ～～っ！？」
line = "「してくれ──ない！？　あ、あぁあああ！？　お、おしまいですわぁ～～っ！？」"

[[dialogue]]
speaker = "unk"
# （……俺が勇気を出そう！）
line = "（……俺が勇気を出そう！）"

[[dialogue]]
speaker = "unk"
# 俺もヒルディー先輩が好きです！！
line = "俺もヒルディー先輩が好きです！！"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「──ですわっ！？　あ、ひ、緋宮会長っ！？　いつの間に！？」
line = "「──ですわっ！？　あ、ひ、緋宮会長っ！？　いつの間に！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「というか今、ななな、何と仰って！？　わ、私のことが好き……！？」
line = "「というか今、ななな、何と仰って！？　わ、私のことが好き……！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ほ、本当に？　本当によろしいんですの？　私、昨日からずっと、優雅とは程遠い失態を晒しておりますわ……」
line = "「ほ、本当に？　本当によろしいんですの？　私、昨日からずっと、優雅とは程遠い失態を晒しておりますわ……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そんなに取り乱すくらい、想ってくれて嬉しい……？　あ、あぁ……緋宮会長は本当に紳士ですのね……？」
line = "「そんなに取り乱すくらい、想ってくれて嬉しい……？　あ、あぁ……緋宮会長は本当に紳士ですのね……？」"

[[dialogue]]
speaker = "unk"
# お付き合いしましょう、先輩！
line = "お付き合いしましょう、先輩！"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あっ……ち、近いですわ……<emoji=heart04>　緋宮会長……そんなぎゅっと手を握って……」
line = "「あっ……ち、近いですわ……<emoji=heart04>　緋宮会長……そんなぎゅっと手を握って……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「は……はい<emoji=heart04>　ごらんのとおり、その……恋愛事に疎い私ではありますが……」
line = "「は……はい<emoji=heart04>　ごらんのとおり、その……恋愛事に疎い私ではありますが……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「お、お付き合い……よろしくお願い、いたしますわ……<emoji=heart04>」
line = "「お、お付き合い……よろしくお願い、いたしますわ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# こうして俺とヒルディー先輩は、トレーニングパートナーから一歩先に進んで、相思相愛の恋人同士になったのだった──
line = "こうして俺とヒルディー先輩は、トレーニングパートナーから一歩先に進んで、相思相愛の恋人同士になったのだった──"
