[[dialogue]]
speaker = "unk"
# 第３話,新春アイスダンス,P
line = "第３話,新春アイスダンス,P"

[[dialogue]]
speaker = "unk"
# 学園の新学期が近づいた、冬期休暇のとある日──俺はソフィに誘われてアリーナへとやってきていた。
line = "学園の新学期が近づいた、冬期休暇のとある日──俺はソフィに誘われてアリーナへとやってきていた。"

[[dialogue]]
speaker = "unk"
# 彼女が所属するフィギュア部では毎年、新春を祝うアイスダンスがあり、その催しは両校隔てなく見ることができるのだそう。
line = "彼女が所属するフィギュア部では毎年、新春を祝うアイスダンスがあり、その催しは両校隔てなく見ることができるのだそう。"

[[dialogue]]
speaker = "unk"
# 星力を用いて張られた氷の上で踊るフィギュア部のダンスはとても綺麗だった──
line = "星力を用いて張られた氷の上で踊るフィギュア部のダンスはとても綺麗だった──"

[[dialogue]]
speaker = "ソフィア"
# 「ふぅっ。どうでしたか、会長さん。フィギュア部のアイスダンス、楽しんでいただけていますか？」
line = "「ふぅっ。どうでしたか、会長さん。フィギュア部のアイスダンス、楽しんでいただけていますか？」"

[[dialogue]]
speaker = "unk"
# ああ、とても感動した！
line = "ああ、とても感動した！"

[[dialogue]]
speaker = "舞亜"
# 「あは、良かったねソフィ。しっかり準備した甲斐があったんじゃない？」
line = "「あは、良かったねソフィ。しっかり準備した甲斐があったんじゃない？」"

[[dialogue]]
speaker = "ソフィア"
# 「べ、別に私はいつも通りです」
line = "「べ、別に私はいつも通りです」"

[[dialogue]]
speaker = "舞亜"
# 「えー、そうかな。何度もプログラムを確認して、すっごい気合いが入ってたよね。これは会長さんにかっこいいところ見せたいんだな～って思ったんだけど」
line = "「えー、そうかな。何度もプログラムを確認して、すっごい気合いが入ってたよね。これは会長さんにかっこいいところ見せたいんだな～って思ったんだけど」"

[[dialogue]]
speaker = "ソフィア"
# 「そそ、そんなことないですからっ。フィギュア部の新春記念のダンスは、別に大会じゃありません。得点なんて付かないんですから……！」
line = "「そそ、そんなことないですからっ。フィギュア部の新春記念のダンスは、別に大会じゃありません。得点なんて付かないんですから……！」"

[[dialogue]]
speaker = "舞亜"
# 「ん～。別に隠すようなことでもないと思うんだけど……まあいいや」
line = "「ん～。別に隠すようなことでもないと思うんだけど……まあいいや」"

[[dialogue]]
speaker = "ソフィア"
# 「もう、舞亜さんってば余計なことまで言うんですから……」
line = "「もう、舞亜さんってば余計なことまで言うんですから……」"

[[dialogue]]
speaker = "ソフィア"
# 「少し休憩をはさんで午後の部もありますので、良かったらこのまま見ていってください」
line = "「少し休憩をはさんで午後の部もありますので、良かったらこのまま見ていってください」"

[[dialogue]]
speaker = "unk"
# ありがとう。楽しみにしてる
line = "ありがとう。楽しみにしてる"

[[dialogue]]
speaker = "ソフィア"
# 「午前中で印象に残ったシーンとかありました？　演技の参考にしたいので、良ければ聞かせて欲しいです」
line = "「午前中で印象に残ったシーンとかありました？　演技の参考にしたいので、良ければ聞かせて欲しいです」"

[[dialogue]]
speaker = "unk"
# 着物姿で滑っているのが新鮮だった
line = "着物姿で滑っているのが新鮮だった"

[[dialogue]]
speaker = "舞亜"
# 「あー、そっか。会長さんはあんまりフィギュアスケートは見ないんだっけ。ドレス以外の服で滑ることも多いんだよ。燕尾服着たり」
line = "「あー、そっか。会長さんはあんまりフィギュアスケートは見ないんだっけ。ドレス以外の服で滑ることも多いんだよ。燕尾服着たり」"

[[dialogue]]
speaker = "ソフィア"
# 「もちろん大会では専用のユニフォームですけれど。今日みたいなエキシビションではビジュアルから楽しませることもありますからね」
line = "「もちろん大会では専用のユニフォームですけれど。今日みたいなエキシビションではビジュアルから楽しませることもありますからね」"

[[dialogue]]
speaker = "ソフィア"
# 「アニメキャラクターのコスプレで滑っている海外の選手とか、ネットで見たことありませんか？　フィギュアスケートって意外と自由なんですよ」
line = "「アニメキャラクターのコスプレで滑っている海外の選手とか、ネットで見たことありませんか？　フィギュアスケートって意外と自由なんですよ」"

[[dialogue]]
speaker = "舞亜"
# 「まぁでもソフィは別の理由もありそうだけど……その恰好、けっこう気に入ってる？」
line = "「まぁでもソフィは別の理由もありそうだけど……その恰好、けっこう気に入ってる？」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。着物って見た目よりもずっと温かいので。氷の上でもソーホットです♪」
line = "「はい。着物って見た目よりもずっと温かいので。氷の上でもソーホットです♪」"

[[dialogue]]
speaker = "舞亜"
# 「どうりで滑ってる時、イキイキしてると思った。でもソフィ、今日はずっとその恰好で本当にいいの？」
line = "「どうりで滑ってる時、イキイキしてると思った。でもソフィ、今日はずっとその恰好で本当にいいの？」"

[[dialogue]]
speaker = "ソフィア"
# 「えっと……？　何か問題があったりしますか？　午後のプログラムも、この衣装で問題なく滑れるはずですが……」
line = "「えっと……？　何か問題があったりしますか？　午後のプログラムも、この衣装で問題なく滑れるはずですが……」"

[[dialogue]]
speaker = "舞亜"
# 「でも会長さん的にはちょっぴりがっかりしてるんじゃないのかな。可愛い彼女のアイスダンスを見に来てるんだし……」
line = "「でも会長さん的にはちょっぴりがっかりしてるんじゃないのかな。可愛い彼女のアイスダンスを見に来てるんだし……」"

[[dialogue]]
speaker = "ソフィア"
# 「かわ……！？　彼女……」
line = "「かわ……！？　彼女……」"

[[dialogue]]
speaker = "舞亜"
# 「フィギュアスケートの時の、ちゃんとしたドレス姿も見たい～って思ってるんじゃないかな～って」
line = "「フィギュアスケートの時の、ちゃんとしたドレス姿も見たい～って思ってるんじゃないかな～って」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……うぅ……そ、そうでしょうか？」
line = "「あ……うぅ……そ、そうでしょうか？」"

[[dialogue]]
speaker = "舞亜"
# 「私のスケートのファンの人たちも、男女問わずみんなドレスのデザイン、楽しみにしてるよ。観客にとっては大事なものだと思うけど」
line = "「私のスケートのファンの人たちも、男女問わずみんなドレスのデザイン、楽しみにしてるよ。観客にとっては大事なものだと思うけど」"

[[dialogue]]
speaker = "ソフィア"
# 「な、なるほど……会長さんは、あの……普段の私のドレス姿も、見てみたいって思ってくれていたり……？」
line = "「な、なるほど……会長さんは、あの……普段の私のドレス姿も、見てみたいって思ってくれていたり……？」"

[[dialogue]]
speaker = "unk"
# ドレス姿も綺麗だから大好きだよ
line = "ドレス姿も綺麗だから大好きだよ"

[[dialogue]]
speaker = "ソフィア"
# 「……っ！　そ、そそ、そうですかっ」
line = "「……っ！　そ、そそ、そうですかっ」"

[[dialogue]]
speaker = "舞亜"
# 「あ、でもそっか。ソフィは温かい恰好の方がいいんだっけ。ごめんごめん、余計なお世話だったかな」
line = "「あ、でもそっか。ソフィは温かい恰好の方がいいんだっけ。ごめんごめん、余計なお世話だったかな」"

[[dialogue]]
speaker = "ソフィア"
# 「──ちょっと失礼します」
line = "「──ちょっと失礼します」"

[[dialogue]]
speaker = "ソフィア"
# 「──お待たせしました」
line = "「──お待たせしました」"

[[dialogue]]
speaker = "舞亜"
# 「おー。いつもの格好だ。ふふ、でもいいの？　さっきの着物に比べて寒いんじゃない？」
line = "「おー。いつもの格好だ。ふふ、でもいいの？　さっきの着物に比べて寒いんじゃない？」"

[[dialogue]]
speaker = "ソフィア"
# 「リンクに立てばすぐに集中して寒さなんてわからなくなりますから。それに……」
line = "「リンクに立てばすぐに集中して寒さなんてわからなくなりますから。それに……」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふ。会長さんに喜んでもらいたかったので」
line = "「ふふ。会長さんに喜んでもらいたかったので」"

[[dialogue]]
speaker = "舞亜"
# 「あ、その笑顔、すごくきれい。艶っぽい感じ。午後のソフィの演技、私も楽しみになってきたかも」
line = "「あ、その笑顔、すごくきれい。艶っぽい感じ。午後のソフィの演技、私も楽しみになってきたかも」"

[[dialogue]]
speaker = "ソフィア"
# 「……そろそろ時間です。行きましょう、舞亜さん」
line = "「……そろそろ時間です。行きましょう、舞亜さん」"

[[dialogue]]
speaker = "舞亜"
# 「そうだね～。それじゃあ会長さん、楽しんでいってね」
line = "「そうだね～。それじゃあ会長さん、楽しんでいってね」"

[[dialogue]]
speaker = "ソフィア"
# 「アイスダンスが終わったら、一緒に帰りましょう。会長さん」
line = "「アイスダンスが終わったら、一緒に帰りましょう。会長さん」"

[[dialogue]]
speaker = "unk"
# ソフィアと舞亜、そして大勢のフィギュア部員が氷の上で舞う姿を、俺は最後まで特等席で見学した。
line = "ソフィアと舞亜、そして大勢のフィギュア部員が氷の上で舞う姿を、俺は最後まで特等席で見学した。"

[[dialogue]]
speaker = "unk"
# ダンスが美しかったのもそうだけど、寒がりのソフィが俺のために着替えてくれたことが何よりも嬉しいのだった──
line = "ダンスが美しかったのもそうだけど、寒がりのソフィが俺のために着替えてくれたことが何よりも嬉しいのだった──"
