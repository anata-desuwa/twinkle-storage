[[dialogue]]
speaker = "unk"
# 第１０話,蹂躙されるデネブ,B
line = "第１０話,蹂躙されるデネブ,B"

[[dialogue]]
speaker = "極星学園の星騎士"
# 「ど、どうしてルヴィネ様が！？」
line = "「ど、どうしてルヴィネ様が！？」"

[[dialogue]]
speaker = "極星学園の星騎士"
# 「私たちの世界を守ると──あの言葉は嘘だったのですか！？」
line = "「私たちの世界を守ると──あの言葉は嘘だったのですか！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「──問答に応える気はないわ。消えなさい」
line = "「──問答に応える気はないわ。消えなさい」"

[[dialogue]]
speaker = "極星学園の星騎士"
# 「また、増えてっ……！　ルヴィネ様……本物のルヴィネ様はどこに──！？」
line = "「また、増えてっ……！　ルヴィネ様……本物のルヴィネ様はどこに──！？」"

[[dialogue]]
speaker = "unk"
# 手練れのプリマステラが１人、また１人と倒れていく──
line = "手練れのプリマステラが１人、また１人と倒れていく──"

[[dialogue]]
speaker = "アポロ（大人）"
# 「リノ！　一体どうなってる──次から次へとルヴィネが現れてるぞ！？」
line = "「リノ！　一体どうなってる──次から次へとルヴィネが現れてるぞ！？」"

[[dialogue]]
speaker = "リノ"
# 「分析中よ、まさかこんな事態が起きるだなんて……！」
line = "「分析中よ、まさかこんな事態が起きるだなんて……！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「こいつの強さ……倒すたびに強くなっている！　応援はまだか！？」
line = "「こいつの強さ……倒すたびに強くなっている！　応援はまだか！？」"

[[dialogue]]
speaker = "リノ"
# 「各地で大量に出現しているの、とても割ける戦力がないわ！　持ちこたえて！！」
line = "「各地で大量に出現しているの、とても割ける戦力がないわ！　持ちこたえて！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「了解だっ……でもそんなに長くは持たないぞ！！」
line = "「了解だっ……でもそんなに長くは持たないぞ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「時の流れとは残酷ね。かつては誉れある使徒であったのに、ここまで衰えてしまうだなんて……」
line = "「時の流れとは残酷ね。かつては誉れある使徒であったのに、ここまで衰えてしまうだなんて……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「立ち上がるたびに、惨めな姿をさらすことになる。はやく諦めてしまいなさい」
line = "「立ち上がるたびに、惨めな姿をさらすことになる。はやく諦めてしまいなさい」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「言ってろ……あたしはかつて大きな過ちを犯した！　こんなとこで倒れるわけにはいかないんだよ！」
line = "「言ってろ……あたしはかつて大きな過ちを犯した！　こんなとこで倒れるわけにはいかないんだよ！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「アルタイルを破壊したことは、過ちではないわ。あれは世界に進歩と成長を促す、貴い行いよ？」
line = "「アルタイルを破壊したことは、過ちではないわ。あれは世界に進歩と成長を促す、貴い行いよ？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「黙れ！！　世界だけじゃない──あたしは、妹にまで剣を向けたんだぞ！」
line = "「黙れ！！　世界だけじゃない──あたしは、妹にまで剣を向けたんだぞ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「これは死ぬまで背負う──あたしの業なんだッ！！！」
line = "「これは死ぬまで背負う──あたしの業なんだッ！！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「今の攻撃……全力かしら？　あまりに軽すぎて、防御の必要すらなかったわね？」
line = "「今の攻撃……全力かしら？　あまりに軽すぎて、防御の必要すらなかったわね？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「はぁっ……はあっ……！」
line = "「はぁっ……はあっ……！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「<b>あがり</b>の近づいた星騎士など敵ではないわ──さようなら」
line = "「<b>あがり</b>の近づいた星騎士など敵ではないわ──さようなら」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「くっ──そおおぉっ！？」
line = "「くっ──そおおぉっ！？」"

[[dialogue]]
speaker = "？？？"
# 「──サン・アビソル・リグレッション！！！」
line = "「──サン・アビソル・リグレッション！！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「ぐぅっ──あぁあっ！？」
line = "「ぐぅっ──あぁあっ！？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「闇の炎──まさか！？」
line = "「闇の炎──まさか！？」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「姉さん、無事だったんですね！！」
line = "「姉さん、無事だったんですね！！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「──エリシア！！」
line = "「──エリシア！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「そう──アルタイルから渡ってきたのね……」
line = "「そう──アルタイルから渡ってきたのね……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「くっ……身体が、これ以上持たない……」
line = "「くっ……身体が、これ以上持たない……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「悪い……助かった。再会していきなり、カッコ悪いところ見せちゃったな……」
line = "「悪い……助かった。再会していきなり、カッコ悪いところ見せちゃったな……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「何を言ってるんですか。これだけの手練れを相手に、どれだけ傷ついても戦い続けて──」
line = "「何を言ってるんですか。これだけの手練れを相手に、どれだけ傷ついても戦い続けて──」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「姉さんはいつだって、最高にカッコいい私のヒーローです！」
line = "「姉さんはいつだって、最高にカッコいい私のヒーローです！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「…………ああ！　エリシアも、あたしの自慢の妹だ！！」
line = "「…………ああ！　エリシアも、あたしの自慢の妹だ！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「せっかく再会できたのですから、積もる話もありますが……まずは今の状況をお伝えします。実は──」
line = "「せっかく再会できたのですから、積もる話もありますが……まずは今の状況をお伝えします。実は──」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……なるほどな。ルヴィネは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に見限られて、その後釜が複製されている──とんでもないことになってきたな」
line = "「……なるほどな。ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に見限られて、その後釜が複製されている──とんでもないことになってきたな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「でも魔王たちが来てくれたんなら、どんな劣勢だって跳ね返せる！」
line = "「でも魔王たちが来てくれたんなら、どんな劣勢だって跳ね返せる！」"

[[dialogue]]
speaker = "クロト"
# 「それにしてもアポロ。あの時、俺たちを送ってくれた後……よく無事だったな？」
line = "「それにしてもアポロ。あの時、俺たちを送ってくれた後……よく無事だったな？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「こっちの世界の、ネビュラの魔女たち。その生き残りに救われたんだ」
line = "「こっちの世界の、ネビュラの魔女たち。その生き残りに救われたんだ」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「デネブのネビュラ……まだ解体されていなかったんですね！」
line = "「デネブのネビュラ……まだ解体されていなかったんですね！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……お前たちの馴染みの顔は、たぶん１人もいないけどな。今も各地で戦ってくれてる。だけど、とてもじゃないけど手が足りない」
line = "「……お前たちの馴染みの顔は、たぶん１人もいないけどな。今も各地で戦ってくれてる。だけど、とてもじゃないけど手が足りない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……レジスタンスのアポロ。その、身勝手だとは思うのだけれど──」
line = "「……レジスタンスのアポロ。その、身勝手だとは思うのだけれど──」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ！　今からあたしたちは仲間だ！　よろしくな！」
line = "「ああ！　今からあたしたちは仲間だ！　よろしくな！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──っ。いいの？　貴女は私に言いたいことが、たくさんあるはずでしょう？」
line = "「──っ。いいの？　貴女は私に言いたいことが、たくさんあるはずでしょう？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そんなの後だ！　それに熱いじゃんか、かつての敵と共闘して、さらなる巨悪を倒す！　流星ライダーでもお決まりのシチュエーションだぜ！」
line = "「そんなの後だ！　それに熱いじゃんか、かつての敵と共闘して、さらなる巨悪を倒す！　流星ライダーでもお決まりのシチュエーションだぜ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ルヴィネさん。姉さんは、こういう人なんです」
line = "「ルヴィネさん。姉さんは、こういう人なんです」"

[[dialogue]]
speaker = "unk"
# 転送直後にアポロと再会できたのは幸いだった。このまま、デネブ防衛のための作戦を──そう思っていた時だった。
line = "転送直後にアポロと再会できたのは幸いだった。このまま、デネブ防衛のための作戦を──そう思っていた時だった。"

[[dialogue]]
speaker = "デネブ市民"
# 「あぁ──ルヴィネ様だ！！」
line = "「あぁ──ルヴィネ様だ！！」"

[[dialogue]]
speaker = "デネブ市民"
# 「みんな、ルヴィネ様が帰って来たぞ！　極星学園の星徒会も一緒だ！！」
line = "「みんな、ルヴィネ様が帰って来たぞ！　極星学園の星徒会も一緒だ！！」"

[[dialogue]]
speaker = "unk"
# 逃げ惑っていたデネブの市民たちが感極まって押し寄せ──そして彼らの視線が、俺を捉えた──
line = "逃げ惑っていたデネブの市民たちが感極まって押し寄せ──そして彼らの視線が、俺を捉えた──"

[[dialogue]]
speaker = "デネブ市民"
# 「お前は──緋宮クロトッ！？」
line = "「お前は──緋宮クロトッ！？」"
