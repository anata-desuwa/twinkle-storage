[[dialogue]]
speaker = "unk"
# 第１話,星徒会のお姉ちゃん,P
line = "第１話,星徒会のお姉ちゃん,P"

[[dialogue]]
speaker = "サーシャ"
# 「はい、ＵＭＯ♪」
line = "「はい、ＵＭＯ♪」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、も、もうですか！？」
line = "「えっ、も、もうですか！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「誰か、ドロー４を出すのよ！　サーシャさんに地獄を見せてあげるわ！」
line = "「誰か、ドロー４を出すのよ！　サーシャさんに地獄を見せてあげるわ！」"

[[dialogue]]
speaker = "アナ"
# 「……ノーカード。万事休す」
line = "「……ノーカード。万事休す」"

[[dialogue]]
speaker = "サーシャ"
# 「はい、上がり～♪」
line = "「はい、上がり～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「これで私の４連勝ね～♪　初めに決めたルール通り、１着の人が罰ゲームを決めるってことでいいのよね？」
line = "「これで私の４連勝ね～♪　初めに決めたルール通り、１着の人が罰ゲームを決めるってことでいいのよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろんよ。そして、５着の人がなんでも言うことを聞く。はいっ、私も上がりね！」
line = "「もちろんよ。そして、５着の人がなんでも言うことを聞く。はいっ、私も上がりね！」"

[[dialogue]]
speaker = "アナ"
# 「とは言え、今のところ会長以外が全員１回ずつ５着を取ってる。上がり」
line = "「とは言え、今のところ会長以外が全員１回ずつ５着を取ってる。上がり」"

[[dialogue]]
speaker = "マトイ"
# 「……ってことは、これで会長も５着だね。あ、上がりです」
line = "「……ってことは、これで会長も５着だね。あ、上がりです」"

[[dialogue]]
speaker = "unk"
# くっ、しまった……！
line = "くっ、しまった……！"

[[dialogue]]
speaker = "サーシャ"
# 「うふふふふ～♪　……この時を待ってたのよ。これで、ここにいる人は全員５着。私は全員になんでも言うことを聞かせることができるってことよね～」
line = "「うふふふふ～♪　……この時を待ってたのよ。これで、ここにいる人は全員５着。私は全員になんでも言うことを聞かせることができるってことよね～」"

[[dialogue]]
speaker = "サーシャ"
# 「……全員、私のことを『お姉ちゃん』って呼んでね♪」
line = "「……全員、私のことを『お姉ちゃん』って呼んでね♪」"

[[dialogue]]
speaker = "みんな"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "マトイ"
# 「えっと、サーシャさ…………じゃなかった」
line = "「えっと、サーシャさ…………じゃなかった」"

[[dialogue]]
speaker = "マトイ"
# 「お、お姉ちゃん……」
line = "「お、お姉ちゃん……」"

[[dialogue]]
speaker = "サーシャ"
# 「ん～？　なになに、どうしたの～？　お姉ちゃんにお話があるのなら聞くわよ～♪」
line = "「ん～？　なになに、どうしたの～？　お姉ちゃんにお話があるのなら聞くわよ～♪」"

[[dialogue]]
speaker = "マトイ"
# 「こ、これ、思ったよりも恥ずかしいんですけど！　いつまで続くんですか！？」
line = "「こ、これ、思ったよりも恥ずかしいんですけど！　いつまで続くんですか！？」"

[[dialogue]]
speaker = "サーシャ"
# 「少なくとも今日中は有効よね？　ヴィーナスちゃん、そうよね～？」
line = "「少なくとも今日中は有効よね？　ヴィーナスちゃん、そうよね～？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、姉さん。なんなら明日もやっていいわよ！　私は本当に姉ができたみたいで、楽しいし！」
line = "「ええ、姉さん。なんなら明日もやっていいわよ！　私は本当に姉ができたみたいで、楽しいし！」"

[[dialogue]]
speaker = "アナ"
# 「慣れればノープロブレム。姉さま、書類のチェックをお願いしてもいいですか」
line = "「慣れればノープロブレム。姉さま、書類のチェックをお願いしてもいいですか」"

[[dialogue]]
speaker = "サーシャ"
# 「んふ、んふふ……♪　はぁ～～ここは天国かしら♪　一生この空間で生きていきたい～」
line = "「んふ、んふふ……♪　はぁ～～ここは天国かしら♪　一生この空間で生きていきたい～」"

[[dialogue]]
speaker = "アナ"
# 「姉さま、チェックを」
line = "「姉さま、チェックを」"

[[dialogue]]
speaker = "サーシャ"
# 「はいは～い。全部お姉ちゃんにお任せ～♪」
line = "「はいは～い。全部お姉ちゃんにお任せ～♪」"

[[dialogue]]
speaker = "アナ"
# 「ふっ……仕事が減りました。これからも姉さまって呼べば、仕事を代わってくれるかもしれない」
line = "「ふっ……仕事が減りました。これからも姉さまって呼べば、仕事を代わってくれるかもしれない」"

[[dialogue]]
speaker = "unk"
# （この状況を逆手にとってるだと！？）
line = "（この状況を逆手にとってるだと！？）"

[[dialogue]]
speaker = "サーシャ"
# 「……で、会長くんは、いつになったら私のことを、お姉ちゃんって呼んでくれるのかしら～？」
line = "「……で、会長くんは、いつになったら私のことを、お姉ちゃんって呼んでくれるのかしら～？」"

[[dialogue]]
speaker = "サーシャ"
# 「ねぇ、会長くんてば～。何か喋ってくれないと、お姉ちゃん寂しいな～？（頬っぺたつんつん）」
line = "「ねぇ、会長くんてば～。何か喋ってくれないと、お姉ちゃん寂しいな～？（頬っぺたつんつん）」"

[[dialogue]]
speaker = "unk"
# …………（無言を貫く）
line = "…………（無言を貫く）"

[[dialogue]]
speaker = "マトイ"
# 「ず、ずるい、会長だけ！　そうやってだんまり決め込んで、なんとか言わずに済ませようって考えてるんでしょ！」
line = "「ず、ずるい、会長だけ！　そうやってだんまり決め込んで、なんとか言わずに済ませようって考えてるんでしょ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何を恥ずかしがってるのよ？　姉さんだって喜んでるんだし、呼んであげればいいじゃない」
line = "「何を恥ずかしがってるのよ？　姉さんだって喜んでるんだし、呼んであげればいいじゃない」"

[[dialogue]]
speaker = "アナ"
# 「恥ずかしいのなら、別の呼び方をすればいい。姉貴とか、姉御とか……？」
line = "「恥ずかしいのなら、別の呼び方をすればいい。姉貴とか、姉御とか……？」"

[[dialogue]]
speaker = "サーシャ"
# 「い～え、ダメよ。会長くんには指定通り『お姉ちゃん』って呼んでもらわなくちゃ。これは罰ゲームなんだから、もちろん呼んでくれるわよね～？」
line = "「い～え、ダメよ。会長くんには指定通り『お姉ちゃん』って呼んでもらわなくちゃ。これは罰ゲームなんだから、もちろん呼んでくれるわよね～？」"

[[dialogue]]
speaker = "サーシャ"
# 「ほーら、お姉ちゃんって呼んでみて♪」
line = "「ほーら、お姉ちゃんって呼んでみて♪」"

[[dialogue]]
speaker = "unk"
# 恥ずかしさで顔が熱くなる。小さくその言葉を呟くが──
line = "恥ずかしさで顔が熱くなる。小さくその言葉を呟くが──"

[[dialogue]]
speaker = "サーシャ"
# 「ん～？　声が小さくて聞こえないから、もう一回♪」
line = "「ん～？　声が小さくて聞こえないから、もう一回♪」"

[[dialogue]]
speaker = "unk"
# お……お姉ちゃん……
line = "お……お姉ちゃん……"

[[dialogue]]
speaker = "サーシャ"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "サーシャ"
# 「……か、可愛い～～～～～～！！！　ねえ、もっと！　もっと呼んでみてっ、ほら、おねえーちゃんって、ほらほらっ♪」
line = "「……か、可愛い～～～～～～！！！　ねえ、もっと！　もっと呼んでみてっ、ほら、おねえーちゃんって、ほらほらっ♪」"

[[dialogue]]
speaker = "アナ"
# 「理由をつけて逃げようとしても無駄です、会長。パトロールでしたら前会長に行ってもらうので、今日外に出る用事はありません」
line = "「理由をつけて逃げようとしても無駄です、会長。パトロールでしたら前会長に行ってもらうので、今日外に出る用事はありません」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんって呼んでくれないのなら、こうしちゃうんだから。えいっ♪」
line = "「お姉ちゃんって呼んでくれないのなら、こうしちゃうんだから。えいっ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「はい、ぎゅーーーっ♪」
line = "「はい、ぎゅーーーっ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「はぁぁぁ……♪　ねえ、頭も撫でていいかしら♪　いいわよね？」
line = "「はぁぁぁ……♪　ねえ、頭も撫でていいかしら♪　いいわよね？」"

[[dialogue]]
speaker = "unk"
# （顔に胸を押しつけられて、声が出せない……！）
line = "（顔に胸を押しつけられて、声が出せない……！）"

[[dialogue]]
speaker = "サーシャ"
# 「はぁい、なでなで～～♪　ほんと可愛い～～～♪　あ～ん、胸がキュンキュンしちゃう♡」
line = "「はぁい、なでなで～～♪　ほんと可愛い～～～♪　あ～ん、胸がキュンキュンしちゃう♡」"

[[dialogue]]
speaker = "サーシャ"
# 「んふふ、急に大人しくなっちゃって～♪　そんなにお姉ちゃんに抱きしめられるのが良かったのかな～？」
line = "「んふふ、急に大人しくなっちゃって～♪　そんなにお姉ちゃんに抱きしめられるのが良かったのかな～？」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、サーシャさん！　じゃなかったお姉ちゃん！　いやいや、そゆことどうでもよくて！　息！　会長、息できてないです！」
line = "「あっ、サーシャさん！　じゃなかったお姉ちゃん！　いやいや、そゆことどうでもよくて！　息！　会長、息できてないです！」"

[[dialogue]]
speaker = "サーシャ"
# 「あ、あら……？　会長くん？　会長くーん？」
line = "「あ、あら……？　会長くん？　会長くーん？」"

[[dialogue]]
speaker = "アナ"
# 「会長……レスト・イン・ピース（安らかに眠れ）」
line = "「会長……レスト・イン・ピース（安らかに眠れ）」"

[[dialogue]]
speaker = "unk"
# （柔らかくて、めっちゃ良い匂いした……）
line = "（柔らかくて、めっちゃ良い匂いした……）"

[[dialogue]]
speaker = "unk"
# 意識が遠のく中で、俺の脳裏には初めての感触と匂いがバッチリ焼き付いてしまうのだった。
line = "意識が遠のく中で、俺の脳裏には初めての感触と匂いがバッチリ焼き付いてしまうのだった。"

[[dialogue]]
speaker = "unk"
# ……ばたり。
line = "……ばたり。"
