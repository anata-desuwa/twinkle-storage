[[dialogue]]
speaker = "unk"
# 第１話,誰の背中を見たい？,P
line = "第１話,誰の背中を見たい？,P"

[[dialogue]]
speaker = "リア"
# 「そうだね。こういう時は、こういう感じで計画をまとめてあげると──」
line = "「そうだね。こういう時は、こういう感じで計画をまとめてあげると──」"

[[dialogue]]
speaker = "アナ"
# 「なるほど……これなら万事上手くいきそうですね」
line = "「なるほど……これなら万事上手くいきそうですね」"

[[dialogue]]
speaker = "サーシャ"
# 「必要経費も当初の想定より削減できるわ～。どうにもお財布事情が厳しくて困っていたところだったの～」
line = "「必要経費も当初の想定より削減できるわ～。どうにもお財布事情が厳しくて困っていたところだったの～」"

[[dialogue]]
speaker = "マトイ"
# 「議事録のまとめ方もわかりやすいです！　リア先輩って、なんでもできちゃうんですね！」
line = "「議事録のまとめ方もわかりやすいです！　リア先輩って、なんでもできちゃうんですね！」"

[[dialogue]]
speaker = "リア"
# 「えっへん、先輩ですもの♪　このくらい朝飯前だよ～」
line = "「えっへん、先輩ですもの♪　このくらい朝飯前だよ～」"

[[dialogue]]
speaker = "リア"
# 「他にも相談があればなんでも聞いて？　元の世界に戻れるようになるまで私も暇しちゃってるから」
line = "「他にも相談があればなんでも聞いて？　元の世界に戻れるようになるまで私も暇しちゃってるから」"

[[dialogue]]
speaker = "アナ"
# 「とても助かります。いつもは、その……。その場の勢いで突き進むことが多いので……」
line = "「とても助かります。いつもは、その……。その場の勢いで突き進むことが多いので……」"

[[dialogue]]
speaker = "サーシャ"
# 「計画を立てる前にもう少し予算のことも考えてもらえると嬉しいんだけどね……」
line = "「計画を立てる前にもう少し予算のことも考えてもらえると嬉しいんだけどね……」"

[[dialogue]]
speaker = "マトイ"
# 「会議でメモした内容がそのまま反映されそうなのって久しぶりだなぁ……」
line = "「会議でメモした内容がそのまま反映されそうなのって久しぶりだなぁ……」"

[[dialogue]]
speaker = "リア"
# 「な、なんだか大変そうだね？」
line = "「な、なんだか大変そうだね？」"

[[dialogue]]
speaker = "unk"
# まぁ、ええと……
line = "まぁ、ええと……"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっと！　どうしてそこで私を見るのよ！？　悪かったわね、いつも雑に計画立てちゃったりして！」
line = "「ちょっと！　どうしてそこで私を見るのよ！？　悪かったわね、いつも雑に計画立てちゃったりして！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスはその時のテンションだけで生きてるもんね～」
line = "「ヴィーナスはその時のテンションだけで生きてるもんね～」"

[[dialogue]]
speaker = "サーシャ"
# 「でもでも私はヴィーナスちゃんのそういうところ好きよ～♪」
line = "「でもでも私はヴィーナスちゃんのそういうところ好きよ～♪」"

[[dialogue]]
speaker = "アナ"
# 「それにしても、あったんですね……自覚。意外です……」
line = "「それにしても、あったんですね……自覚。意外です……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぶふっ！？　アナの言葉が一番心を抉ってくるわ……。普段なんでも即答で乗っかってくれてるだけにダメージが……」
line = "「ぶふっ！？　アナの言葉が一番心を抉ってくるわ……。普段なんでも即答で乗っかってくれてるだけにダメージが……」"

[[dialogue]]
speaker = "リア"
# 「よしよし、大丈夫だよ～。無計画に計画を立てられるのも、それはそれで立派な才能だから♪　特にヴィーナスちゃんはみんなを引っ張って突き進んでいく立場だから」
line = "「よしよし、大丈夫だよ～。無計画に計画を立てられるのも、それはそれで立派な才能だから♪　特にヴィーナスちゃんはみんなを引っ張って突き進んでいく立場だから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ、そうよね！　私は間違ってないわよねっ？」
line = "「そ、そうよね！　私は間違ってないわよねっ？」"

[[dialogue]]
speaker = "リア"
# 「うんうん♪　そのまま自分の道を突き進むのがいいと思うよ♪」
line = "「うんうん♪　そのまま自分の道を突き進むのがいいと思うよ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがとう、リアさん……！　おかげで目が覚めたわ！」
line = "「ありがとう、リアさん……！　おかげで目が覚めたわ！」"

[[dialogue]]
speaker = "マトイ"
# 「思えば大変だったもんね～。ヴィーナスの会長時代は」
line = "「思えば大変だったもんね～。ヴィーナスの会長時代は」"

[[dialogue]]
speaker = "ヴィーナス"
# 「話がまとまりそうなのに、ほじくり返さないで！？　いいでしょ昔の話は！」
line = "「話がまとまりそうなのに、ほじくり返さないで！？　いいでしょ昔の話は！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、ヴィーナスちゃんがツッコミに回るなんて珍しいわね」
line = "「あらあら、ヴィーナスちゃんがツッコミに回るなんて珍しいわね」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩はいつも前会長に振り回されていますから。これが下克上というヤツでしょうか」
line = "「マトイ先輩はいつも前会長に振り回されていますから。これが下克上というヤツでしょうか」"

[[dialogue]]
speaker = "unk"
# ああもうリア先輩が来てくれてるのに
line = "ああもうリア先輩が来てくれてるのに"

[[dialogue]]
speaker = "リア"
# 「ふふ、気にしなくていいよ。見ていて微笑ましいから」
line = "「ふふ、気にしなくていいよ。見ていて微笑ましいから」"

[[dialogue]]
speaker = "リア"
# 「むしろ会長さんは、輪の中に入っていかないとダメだゾ？　生徒会長こそ役員のみんなとう～んと仲良しにならなきゃ。ね？」
line = "「むしろ会長さんは、輪の中に入っていかないとダメだゾ？　生徒会長こそ役員のみんなとう～んと仲良しにならなきゃ。ね？」"

[[dialogue]]
speaker = "リア"
# 「それとも、ふふふ。みんなより私と仲良くなりたいって話かな～？　それはそれで嬉しいけど♪」
line = "「それとも、ふふふ。みんなより私と仲良くなりたいって話かな～？　それはそれで嬉しいけど♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「む。まさかクロトも私に何か文句があるのかしら？　リアさんが前会長なら良かったのに～とか思ってないでしょうね？」
line = "「む。まさかクロトも私に何か文句があるのかしら？　リアさんが前会長なら良かったのに～とか思ってないでしょうね？」"

[[dialogue]]
speaker = "アナ"
# 「よく考えると、この場には三人も会長職を辞した役員がいらっしゃるんですよね。やはり誰が会長職に就くかによって星徒会の雰囲気も変わるのでしょうか」
line = "「よく考えると、この場には三人も会長職を辞した役員がいらっしゃるんですよね。やはり誰が会長職に就くかによって星徒会の雰囲気も変わるのでしょうか」"

[[dialogue]]
speaker = "マトイ"
# 「サーシャさんが会長をしてる時なんか楽しそうだよね。きっと、とても穏やかで過ごしやすい空間だったんだろうなぁ」
line = "「サーシャさんが会長をしてる時なんか楽しそうだよね。きっと、とても穏やかで過ごしやすい空間だったんだろうなぁ」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ。嬉しいこと言ってくれるわね～。お返しにぎゅ～ってしてあげるわ～♪」
line = "「あらあら、うふふ。嬉しいこと言ってくれるわね～。お返しにぎゅ～ってしてあげるわ～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ちょっと待って、マトイ。それは暗に私の会長時代は、とても慌ただしくて過ごしづらかったと言っているのかしら？」
line = "「……ちょっと待って、マトイ。それは暗に私の会長時代は、とても慌ただしくて過ごしづらかったと言っているのかしら？」"

[[dialogue]]
speaker = "アナ"
# 「私はリア先輩の下で働いてみたいです。手取り足取り優しく教えていただきながら、副会長としての能力を伸ばしていただけそうなので」
line = "「私はリア先輩の下で働いてみたいです。手取り足取り優しく教えていただきながら、副会長としての能力を伸ばしていただけそうなので」"

[[dialogue]]
speaker = "リア"
# 「あはは、それは買いかぶり過ぎだよ～♪　私もみんなとワイワイ楽しくするのが好きだから。イベント事とかサプライズとかも大好きだし。結構振り回しちゃうタイプかも♪」
line = "「あはは、それは買いかぶり過ぎだよ～♪　私もみんなとワイワイ楽しくするのが好きだから。イベント事とかサプライズとかも大好きだし。結構振り回しちゃうタイプかも♪」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くんはどうなの？　この三人の中で、もう一度会長になってもらうなら誰がいいとかある？」
line = "「緋宮くんはどうなの？　この三人の中で、もう一度会長になってもらうなら誰がいいとかある？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろん私よねっ？　クロトは私のカリスマ性と時たま見せる面倒見の良さにぞっこんのはずだわ」
line = "「もちろん私よねっ？　クロトは私のカリスマ性と時たま見せる面倒見の良さにぞっこんのはずだわ」"

[[dialogue]]
speaker = "サーシャ"
# 「クロトくんが助けてくれるのなら楽ちんそうね～。星徒会業務だけじゃなくて身の回りのお世話もお願いしちゃうそうだわ～。お家にまで連れ帰っちゃうかも～」
line = "「クロトくんが助けてくれるのなら楽ちんそうね～。星徒会業務だけじゃなくて身の回りのお世話もお願いしちゃうそうだわ～。お家にまで連れ帰っちゃうかも～」"

[[dialogue]]
speaker = "リア"
# 「くすくす。後輩として入ってくるなら私も容赦しないゾ♪　みっちりこき使っちゃってあげようかな～♪」
line = "「くすくす。後輩として入ってくるなら私も容赦しないゾ♪　みっちりこき使っちゃってあげようかな～♪」"

[[dialogue]]
speaker = "マトイ"
# 「元会長さんたちはこう言ってるけど、どうかな？」
line = "「元会長さんたちはこう言ってるけど、どうかな？」"

[[dialogue]]
speaker = "unk"
# あえてリア先輩
line = "あえてリア先輩"

[[dialogue]]
speaker = "unk"
# 断然リア先輩
line = "断然リア先輩"

[[dialogue]]
speaker = "リア"
# 「ええっ！？　そ、そんなに私にこき使われたいんだ……？　冗談で言ったつもりだったんだけど……（汗）」
line = "「ええっ！？　そ、そんなに私にこき使われたいんだ……？　冗談で言ったつもりだったんだけど……（汗）」"

[[dialogue]]
speaker = "unk"
# 会長として自分はまだまだ未熟なので
line = "会長として自分はまだまだ未熟なので"

[[dialogue]]
speaker = "リア"
# 「な～んだ。私の格好いい背中を見て学びたいって話だったんだね♪」
line = "「な～んだ。私の格好いい背中を見て学びたいって話だったんだね♪」"

[[dialogue]]
speaker = "リア"
# 「しょうがないな～。そういうことなら特別にリアお姉さんが教えてあげるっ」
line = "「しょうがないな～。そういうことなら特別にリアお姉さんが教えてあげるっ」"

[[dialogue]]
speaker = "unk"
# はい！
line = "はい！"

[[dialogue]]
speaker = "リア"
# 「よしよし、良い返事だぞ～。って、こ～ら。ネクタイが曲がってるよ？　生徒会長なら身だしなみに気を付けなきゃダーメ」
line = "「よしよし、良い返事だぞ～。って、こ～ら。ネクタイが曲がってるよ？　生徒会長なら身だしなみに気を付けなきゃダーメ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ああ、私のクロトがなんだかリアさんに盗られちゃいそうだわ」
line = "「……ああ、私のクロトがなんだかリアさんに盗られちゃいそうだわ」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ、大丈夫よ～。クロトくんはヴィーナスちゃんのためにもリアちゃんに教えを請いたがってるんだと思うわ」
line = "「ふふ、大丈夫よ～。クロトくんはヴィーナスちゃんのためにもリアちゃんに教えを請いたがってるんだと思うわ」"

[[dialogue]]
speaker = "リア"
# 「よーし。それじゃあ、まずはみんなでお茶会だね！　みんなと親睦を深めることが、良い生徒会長になるための第一歩だから♪」
line = "「よーし。それじゃあ、まずはみんなでお茶会だね！　みんなと親睦を深めることが、良い生徒会長になるための第一歩だから♪」"
