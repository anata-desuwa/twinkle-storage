[[dialogue]]
speaker = "unk"
# 後日。平日のお昼休み。
line = "後日。平日のお昼休み。"

[[dialogue]]
speaker = "unk"
# カフェテリアに向かうと、ネーゼマインとサランが一緒に食事しているところを見かけた。
line = "カフェテリアに向かうと、ネーゼマインとサランが一緒に食事しているところを見かけた。"

[[dialogue]]
speaker = "サラン"
# 「あっ、会長ちゃんだ～♪　お昼食べにきたの～？」
line = "「あっ、会長ちゃんだ～♪　お昼食べにきたの～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やっほ～、会長♪　一緒に食べる～？」
line = "「やっほ～、会長♪　一緒に食べる～？」"

[[dialogue]]
speaker = "unk"
# ２人とも、仲良くなったんだな
line = "２人とも、仲良くなったんだな"

[[dialogue]]
speaker = "サラン"
# 「うんっ♪　そうなの～♪」
line = "「うんっ♪　そうなの～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや、仲良くなったっていうか……」
line = "「いや、仲良くなったっていうか……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「<b>サラン</b>先輩のふわふわした態度見てたら、なんか変に気を遣うのも馬鹿らしくなってきてさ～、もっと気楽にすればいいかな～って」
line = "「<b>サラン</b>先輩のふわふわした態度見てたら、なんか変に気を遣うのも馬鹿らしくなってきてさ～、もっと気楽にすればいいかな～って」"

[[dialogue]]
speaker = "サラン"
# 「えへへ～♪　照れるな～」
line = "「えへへ～♪　照れるな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほらほら。なに言っても、こうやってポジティブに捉えるんだもん。厄介な相手だよ、全く」
line = "「ほらほら。なに言っても、こうやってポジティブに捉えるんだもん。厄介な相手だよ、全く」"

[[dialogue]]
speaker = "サラン"
# 「それで今度ね、マインちゃんとどこか一緒に遊びに行こうって話してたんだ～」
line = "「それで今度ね、マインちゃんとどこか一緒に遊びに行こうって話してたんだ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いやいや、それはまだ未確定ですから。大体、先輩は私とどこに遊びに行く気なの？」
line = "「いやいや、それはまだ未確定ですから。大体、先輩は私とどこに遊びに行く気なの？」"

[[dialogue]]
speaker = "サラン"
# 「激辛料理専門店とか？　サラン、美味しいお店ならいっぱい知ってるよ～？」
line = "「激辛料理専門店とか？　サラン、美味しいお店ならいっぱい知ってるよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……それはちょっと、興味あるけど」
line = "「……それはちょっと、興味あるけど」"

[[dialogue]]
speaker = "unk"
# と、その時。
line = "と、その時。"

[[dialogue]]
speaker = "セナリィ"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# セナリィが少し離れたところから、物陰に隠れてこちらの様子を見ていることに気づく。
line = "セナリィが少し離れたところから、物陰に隠れてこちらの様子を見ていることに気づく。"

[[dialogue]]
speaker = "unk"
# セナリィ、そんなところでどうしたんだ？
line = "セナリィ、そんなところでどうしたんだ？"

[[dialogue]]
speaker = "セナリィ"
# 「えっ！？　会長様、そ、それは……」
line = "「えっ！？　会長様、そ、それは……」"

[[dialogue]]
speaker = "サラン"
# 「セナリィちゃんだ～♪　こんにちは～♪」
line = "「セナリィちゃんだ～♪　こんにちは～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「お、おほほ♪　サラン様、先日はどうもですわ」
line = "「お、おほほ♪　サラン様、先日はどうもですわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィ、どうしたの～？　なんか隠れてこっち見てたみたいだけど……また悪巧み～？」
line = "「セナリィ、どうしたの～？　なんか隠れてこっち見てたみたいだけど……また悪巧み～？」"

[[dialogue]]
speaker = "セナリィ"
# 「え、ええ、まあ。そのようなものですわ」
line = "「え、ええ、まあ。そのようなものですわ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それとも～、ひょっとして……自分だけ友人の輪に上手く入れなくて、嫉妬とかしちゃってた感じかな～？　にひひ♪」
line = "「それとも～、ひょっとして……自分だけ友人の輪に上手く入れなくて、嫉妬とかしちゃってた感じかな～？　にひひ♪」"

[[dialogue]]
speaker = "セナリィ"
# 「ホワイ！？　ち、ちげぇですわよっ！　そんなんじゃないですわっ！」
line = "「ホワイ！？　ち、ちげぇですわよっ！　そんなんじゃないですわっ！」"

[[dialogue]]
speaker = "サラン"
# 「なんだ～、それなら言ってくれればいいのに～！　サランは、セナリィちゃんとも仲良くしたいよ～？」
line = "「なんだ～、それなら言ってくれればいいのに～！　サランは、セナリィちゃんとも仲良くしたいよ～？」"

[[dialogue]]
speaker = "サラン"
# 「せっかくだし、一緒にお昼ご飯食べよ～♪」
line = "「せっかくだし、一緒にお昼ご飯食べよ～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「い、いえ、違いますの！　<ruby=わたくし>私</ruby>はそんな友情とか、目に見えないものは信じない主義で――」
line = "「い、いえ、違いますの！　<ruby>私<rt>わたくし</rt></ruby>はそんな友情とか、目に見えないものは信じない主義で――」"

[[dialogue]]
speaker = "サラン"
# 「え～？　セナリィちゃん、サランと一緒にお昼食べるのは、嫌～？」
line = "「え～？　セナリィちゃん、サランと一緒にお昼食べるのは、嫌～？」"

[[dialogue]]
speaker = "セナリィ"
# 「う……！　無邪気に訴えかけてくる眼差しが、悪の心にも刺さりますわ……！」
line = "「う……！　無邪気に訴えかけてくる眼差しが、悪の心にも刺さりますわ……！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「サラン先輩のこういう無邪気に圧をかけてくるところ、ある意味凶悪だよね～♪」
line = "「サラン先輩のこういう無邪気に圧をかけてくるところ、ある意味凶悪だよね～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「で、でも……そうですわね！　改めて考えれば、一緒に食事するのは、悪くない提案ですわ」
line = "「で、でも……そうですわね！　改めて考えれば、一緒に食事するのは、悪くない提案ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「ビジネスには接待が必要ですもの！　サラン様とは、これからもビジネスパートナーとして、仲良くさせて頂きたいですし！　ええ！」
line = "「ビジネスには接待が必要ですもの！　サラン様とは、これからもビジネスパートナーとして、仲良くさせて頂きたいですし！　ええ！」"

[[dialogue]]
speaker = "サラン"
# 「やった～♪　それじゃあ今日は、ハロウィンの仲良しメンバーみんなで、ふわふわランチしよ～♪」
line = "「やった～♪　それじゃあ今日は、ハロウィンの仲良しメンバーみんなで、ふわふわランチしよ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　上手く輪に入れて、よかったね～、セナリィ♪」
line = "「にひひ♪　上手く輪に入れて、よかったね～、セナリィ♪」"

[[dialogue]]
speaker = "セナリィ"
# 「な、なにをニヤニヤ笑ってるんですの、マイン！？」
line = "「な、なにをニヤニヤ笑ってるんですの、マイン！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「別に～？」
line = "「別に～？」"

[[dialogue]]
speaker = "サラン"
# 「マインちゃん、楽しそうな顔してる～♪」
line = "「マインちゃん、楽しそうな顔してる～♪」"

[[dialogue]]
speaker = "unk"
# ３人はその後もわいわいと、仲の良い友達同士のように昼休みを過ごすのだった。
line = "３人はその後もわいわいと、仲の良い友達同士のように昼休みを過ごすのだった。"
