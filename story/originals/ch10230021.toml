[[dialogue]]
speaker = "unk"
# 第１話,シスターと聖女と友情と,P
line = "第１話,シスターと聖女と友情と,P"

[[dialogue]]
speaker = "シャロン"
# 「ええと、ここをこうして、こっちに通して……」
line = "「ええと、ここをこうして、こっちに通して……」"

[[dialogue]]
speaker = "イレーナ"
# 「ああ、待った待った。その辺りから編み方が変わるのよ。今まで編んでたのはかかとの部分だから──」
line = "「ああ、待った待った。その辺りから編み方が変わるのよ。今まで編んでたのはかかとの部分だから──」"

[[dialogue]]
speaker = "unk"
# ２人で何してるんだ？
line = "２人で何してるんだ？"

[[dialogue]]
speaker = "シャロン"
# 「あ、会長さま。実は今度またクリスマス会がありまして。参加してくださった子どもたちに手編みの靴下をプレゼントしようとしているところなんです」
line = "「あ、会長さま。実は今度またクリスマス会がありまして。参加してくださった子どもたちに手編みの靴下をプレゼントしようとしているところなんです」"

[[dialogue]]
speaker = "イレーナ"
# 「ちょっ、バカ。教室に鍵かけといてって言ったじゃない。来たのがコイツじゃなかったらどうしてくれたのよ。完全に気ぃ抜いちゃってたのに」
line = "「ちょっ、バカ。教室に鍵かけといてって言ったじゃない。来たのがコイツじゃなかったらどうしてくれたのよ。完全に気ぃ抜いちゃってたのに」"

[[dialogue]]
speaker = "unk"
# クリスマス用の靴下って懐かしいな
line = "クリスマス用の靴下って懐かしいな"

[[dialogue]]
speaker = "シャロン"
# 「ええ。しかし最近は靴下を用意する家庭も減ったと聞きます。 プレゼントが靴下に入っているあの感動を、子どもたちにも感じていただければと思いまして」
line = "「ええ。しかし最近は靴下を用意する家庭も減ったと聞きます。 プレゼントが靴下に入っているあの感動を、子どもたちにも感じていただければと思いまして」"

[[dialogue]]
speaker = "イレーナ"
# 「ったく。付き合わされるこっちの身にもなってほしいわよ。こんなのその辺の店でいくらでも売ってるでしょうに」
line = "「ったく。付き合わされるこっちの身にもなってほしいわよ。こんなのその辺の店でいくらでも売ってるでしょうに」"

[[dialogue]]
speaker = "シャロン"
# 「いえいえ、出来合いの物を贈るだけでは愛が足りません！」
line = "「いえいえ、出来合いの物を贈るだけでは愛が足りません！」"

[[dialogue]]
speaker = "シャロン"
# 「子どもたちに女神様の愛とプレゼントを無事に受け取ってもらうためにも私たちが真心を込めて編むべきです！」
line = "「子どもたちに女神様の愛とプレゼントを無事に受け取ってもらうためにも私たちが真心を込めて編むべきです！」"

[[dialogue]]
speaker = "イレーナ"
# 「靴下の編み方聞いてきたクセによく言うわ。もうちょっと考えてから行動に移しなさいってば」
line = "「靴下の編み方聞いてきたクセによく言うわ。もうちょっと考えてから行動に移しなさいってば」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、イレーナさまが手芸に精通しておられて本当に助かりました。やはり持つべきものは友人ですね！」
line = "「ふふ、イレーナさまが手芸に精通しておられて本当に助かりました。やはり持つべきものは友人ですね！」"

[[dialogue]]
speaker = "イレーナ"
# 「暑苦しいっ。ウザいっ。抱きついてくんなっ」
line = "「暑苦しいっ。ウザいっ。抱きついてくんなっ」"

[[dialogue]]
speaker = "unk"
# 以前にも増して仲良くなったね
line = "以前にも増して仲良くなったね"

[[dialogue]]
speaker = "シャロン"
# 「はい！　あのクリスマス会のおかげで今やもう私とイレーナさまは親友同士、深い深い愛で結ばれておりますから！」
line = "「はい！　あのクリスマス会のおかげで今やもう私とイレーナさまは親友同士、深い深い愛で結ばれておりますから！」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたが編み方教えて教えてうっさいから仕方なく教えてあげてるだけよ！　喋ってる暇があんなら手を動かしなさいってばっ！」
line = "「あんたが編み方教えて教えてうっさいから仕方なく教えてあげてるだけよ！　喋ってる暇があんなら手を動かしなさいってばっ！」"

[[dialogue]]
speaker = "シャロン"
# 「そうですね！　少しでも早く、しかし愛をたっぷりと込めて編んでいかなくては！　ええい、バババババっっ！！」
line = "「そうですね！　少しでも早く、しかし愛をたっぷりと込めて編んでいかなくては！　ええい、バババババっっ！！」"

[[dialogue]]
speaker = "イレーナ"
# 「それはそれで張り切りすぎ……。また倒れても知らないわよ」
line = "「それはそれで張り切りすぎ……。また倒れても知らないわよ」"

[[dialogue]]
speaker = "シャロン"
# 「ご心配無用です！　私には女神様の愛がついておりますから！　ズババババババっっ！！」
line = "「ご心配無用です！　私には女神様の愛がついておりますから！　ズババババババっっ！！」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……ったくもう。倒れても治してやんないからね。悪いけどあたしはマイペースに進めさせてもらうから」
line = "「はぁ……ったくもう。倒れても治してやんないからね。悪いけどあたしはマイペースに進めさせてもらうから」"

[[dialogue]]
speaker = "イレーナ"
# 「すぅ……すぅ……すぅ……」
line = "「すぅ……すぅ……すぅ……」"

[[dialogue]]
speaker = "シャロン"
# 「あら……ふふ。イレーナさまったら可愛い寝息を立てられて」
line = "「あら……ふふ。イレーナさまったら可愛い寝息を立てられて」"

[[dialogue]]
speaker = "unk"
# 編み疲れて寝ちゃったみたいだ
line = "編み疲れて寝ちゃったみたいだ"

[[dialogue]]
speaker = "シャロン"
# 「ですね。いつの間にか、こんなにもたくさん編んでくださって。私の２倍以上の量を完成させてくださいました」
line = "「ですね。いつの間にか、こんなにもたくさん編んでくださって。私の２倍以上の量を完成させてくださいました」"

[[dialogue]]
speaker = "シャロン"
# 「マイペースに進めさせてもらう──なんて仰っていたのに、くすくす。相変わらず素直でないお方ですね」
line = "「マイペースに進めさせてもらう──なんて仰っていたのに、くすくす。相変わらず素直でないお方ですね」"

[[dialogue]]
speaker = "unk"
# きっとシャロンが頑張りすぎないようにだよ
line = "きっとシャロンが頑張りすぎないようにだよ"

[[dialogue]]
speaker = "シャロン"
# 「私もそう思います。イレーナさまは本当に心根の優しいお方ですから。この前お会いした時も、文句を言いながら荷物を持ってくださったりして」
line = "「私もそう思います。イレーナさまは本当に心根の優しいお方ですから。この前お会いした時も、文句を言いながら荷物を持ってくださったりして」"

[[dialogue]]
speaker = "シャロン"
# 「友人というものはとてもいいものですね。イレーナさまと本音でぶつかって以来、本当にそう感じます」
line = "「友人というものはとてもいいものですね。イレーナさまと本音でぶつかって以来、本当にそう感じます」"

[[dialogue]]
speaker = "シャロン"
# 「実は私……今まで特別親しい友人がおりませんで。いえ正確には皆誰しも愛すべき隣人だとは思っているのですが」
line = "「実は私……今まで特別親しい友人がおりませんで。いえ正確には皆誰しも愛すべき隣人だとは思っているのですが」"

[[dialogue]]
speaker = "シャロン"
# 「こうして２人で手編みの靴下を作ったりするような友人は初めてです。ですから私、とても幸せです。イレーナさまと真の友人になれて」
line = "「こうして２人で手編みの靴下を作ったりするような友人は初めてです。ですから私、とても幸せです。イレーナさまと真の友人になれて」"

[[dialogue]]
speaker = "シャロン"
# 「こういうことをイレーナさまにお伝えすると、ふふ、とても不機嫌になられてしまうのですけどね」
line = "「こういうことをイレーナさまにお伝えすると、ふふ、とても不機嫌になられてしまうのですけどね」"

[[dialogue]]
speaker = "イレーナ"
# 「誰が、むにゃ、あんたを愛してるかっての……。倒れられたら、すぅ、すぅ、面倒なだけよ……」
line = "「誰が、むにゃ、あんたを愛してるかっての……。倒れられたら、すぅ、すぅ、面倒なだけよ……」"

[[dialogue]]
speaker = "シャロン"
# 「ふふふ、こういうおへそ曲がりな物言いにもすっかり慣れてしまいました」
line = "「ふふふ、こういうおへそ曲がりな物言いにもすっかり慣れてしまいました」"

[[dialogue]]
speaker = "シャロン"
# 「さて今度は私がイレーナさまへ愛をお伝えする番ですね！　イレーナさまの愛に──ズババババっ、全力で応えませんと！」
line = "「さて今度は私がイレーナさまへ愛をお伝えする番ですね！　イレーナさまの愛に──ズババババっ、全力で応えませんと！」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまが私の２倍の量を完成させてくださったのなら、私もまたその２倍の量を完成させてみせます！　見ていてください、会長さま！　私たちの愛の力を！」
line = "「イレーナさまが私の２倍の量を完成させてくださったのなら、私もまたその２倍の量を完成させてみせます！　見ていてください、会長さま！　私たちの愛の力を！」"

[[dialogue]]
speaker = "イレーナ"
# 「んで？　勝手に一人で盛り上がって、大張り切りした挙げ句に──」
line = "「んで？　勝手に一人で盛り上がって、大張り切りした挙げ句に──」"

[[dialogue]]
speaker = "シャロン"
# 「世界が、世界がぐるぐる回ってますぅ……。申し訳ございません、イレーナさまぁ……」
line = "「世界が、世界がぐるぐる回ってますぅ……。申し訳ございません、イレーナさまぁ……」"

[[dialogue]]
speaker = "イレーナ"
# 「結局、貧血起こしてんじゃない！？　あんたアホなの！？　人の気遣いなんだと思ってんのよ！？」
line = "「結局、貧血起こしてんじゃない！？　あんたアホなの！？　人の気遣いなんだと思ってんのよ！？」"

[[dialogue]]
speaker = "シャロン"
# 「あうぅ～。耳元で叫ばれないでくださ～い。頭に響いてしまいますぅ～……」
line = "「あうぅ～。耳元で叫ばれないでくださ～い。頭に響いてしまいますぅ～……」"

[[dialogue]]
speaker = "イレーナ"
# 「自業自得よ。しばらくそこで突っ伏してなさい」
line = "「自業自得よ。しばらくそこで突っ伏してなさい」"

[[dialogue]]
speaker = "シャロン"
# 「そ、そんなぁ～……。どうか、ご慈悲をぉ……」
line = "「そ、そんなぁ～……。どうか、ご慈悲をぉ……」"

[[dialogue]]
speaker = "イレーナ"
# 「いいから寝てなさいってば。どうせ治したら治したでまた編み始めるんでしょ」
line = "「いいから寝てなさいってば。どうせ治したら治したでまた編み始めるんでしょ」"

[[dialogue]]
speaker = "イレーナ"
# 「あともうちょっとで人数分仕上がりそうな感じだし。あとはあたしが片付けておいてあげるから、あんたは寝てろって言ってんの」
line = "「あともうちょっとで人数分仕上がりそうな感じだし。あとはあたしが片付けておいてあげるから、あんたは寝てろって言ってんの」"

[[dialogue]]
speaker = "シャロン"
# 「あ──ふふ。そういうことでしたか。意地悪ではなく、また私を気遣ってくださって……。ああ、イレーナさまの温かな愛を強く感じます……」
line = "「あ──ふふ。そういうことでしたか。意地悪ではなく、また私を気遣ってくださって……。ああ、イレーナさまの温かな愛を強く感じます……」"

[[dialogue]]
speaker = "イレーナ"
# 「～～っっ。やっぱやめた、あんたを治して手伝わせる！　どうしてあたしがあんたのために頑張らなくちゃいけないのよっ！」
line = "「～～っっ。やっぱやめた、あんたを治して手伝わせる！　どうしてあたしがあんたのために頑張らなくちゃいけないのよっ！」"

[[dialogue]]
speaker = "シャロン"
# 「はい！　２人で編みましょう！　この素晴らしい友情を、愛を、イレーナさまとともに形に残したいですから！」
line = "「はい！　２人で編みましょう！　この素晴らしい友情を、愛を、イレーナさまとともに形に残したいですから！」"

[[dialogue]]
speaker = "イレーナ"
# 「あ～もうっ、暑苦しい、うざいっ、張り切りすぎ！　もう二度とあんたの頼みなんか引き受けないからっ……！」
line = "「あ～もうっ、暑苦しい、うざいっ、張り切りすぎ！　もう二度とあんたの頼みなんか引き受けないからっ……！」"
