[[dialogue]]
speaker = "unk"
# 第４話,シズハと久しぶりのキス,P
line = "第４話,シズハと久しぶりのキス,P"

[[dialogue]]
speaker = "unk"
# その日は久しぶりに、シズハが俺の家へ遊びにやって来ていた。
line = "その日は久しぶりに、シズハが俺の家へ遊びにやって来ていた。"

[[dialogue]]
speaker = "シズハ"
# 「会長、あのね、今日は久しぶりに２人きりで過ごす休日だから――」
line = "「会長、あのね、今日は久しぶりに２人きりで過ごす休日だから――」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「じ、じゃ～ん♪　チェンジ、ヴィクトリアフォ～ム……！」
line = "「じ、じゃ～ん♪　チェンジ、ヴィクトリアフォ～ム……！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ってことで、今日はこの衣装で一緒に過ごしましょ。えへへっ……<emoji=heart04>」
line = "「ってことで、今日はこの衣装で一緒に過ごしましょ。えへへっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 少し頬を染め、指先でもじもじとスカートの裾をつまみながら言うシズハ。
line = "少し頬を染め、指先でもじもじとスカートの裾をつまみながら言うシズハ。"

[[dialogue]]
speaker = "unk"
# あれ？　ディーちゃん無しでも変身できるのか
line = "あれ？　ディーちゃん無しでも変身できるのか"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「うん、マイナスエネルギーはディーちゃんがいないと使えないけど、変身するだけはできるのよ」
line = "「うん、マイナスエネルギーはディーちゃんがいないと使えないけど、変身するだけはできるのよ」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「これはノヴァフォームみたいに、会長との『絆の力』でもあるしね」
line = "「これはノヴァフォームみたいに、会長との『絆の力』でもあるしね」"

[[dialogue]]
speaker = "unk"
# ちなみにディーちゃんは、俺たちが２人きりで過ごしたい時は、今日みたいに気を利かせてくれることが多い。
line = "ちなみにディーちゃんは、俺たちが２人きりで過ごしたい時は、今日みたいに気を利かせてくれることが多い。"

[[dialogue]]
speaker = "unk"
# 今度３人でゲームして遊ぶ時に、改めてお礼を言わないとな。
line = "今度３人でゲームして遊ぶ時に、改めてお礼を言わないとな。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「それでね、今日は『絆の力』を強くする為に、このフォームでイチャイチャの訓練をしようと思って……<emoji=heart04>」
line = "「それでね、今日は『絆の力』を強くする為に、このフォームでイチャイチャの訓練をしようと思って……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 訓練って、本当に～？
line = "訓練って、本当に～？"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「も。もうっ、会長のバカバカ！　そこは素直にいけいけゴーゴーな感じで流してよっ！」
line = "「も。もうっ、会長のバカバカ！　そこは素直にいけいけゴーゴーな感じで流してよっ！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ちゃんと理由がないと、私がただイチャイチャしたいだけになっちゃうじゃない<emoji=heart04>」
line = "「ちゃんと理由がないと、私がただイチャイチャしたいだけになっちゃうじゃない<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は訓練関係なく、イチャイチャしたいけどな
line = "俺は訓練関係なく、イチャイチャしたいけどな"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ば、バカバカ<emoji=heart04>　会長はそういうこと、ストレートに言いすぎなの<emoji=heart04>」
line = "「ば、バカバカ<emoji=heart04>　会長はそういうこと、ストレートに言いすぎなの<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「あっ、会長……<emoji=heart04>　んっ……<emoji=heart04>」
line = "「あっ、会長……<emoji=heart04>　んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はシズハの腰に手を回し、ゆっくりと抱き寄せた。
line = "俺はシズハの腰に手を回し、ゆっくりと抱き寄せた。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 唇が触れ合う瞬間、彼女の肩がぴくりと震える。
line = "唇が触れ合う瞬間、彼女の肩がぴくりと震える。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「はあぁっ……<emoji=heart04>　い、いきなりキスなんて、ずるいわよ<emoji=heart04>」
line = "「はあぁっ……<emoji=heart04>　い、いきなりキスなんて、ずるいわよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 最近はヴィクトリアフォームの訓練で、ディーちゃんも一緒にいることが多かったから、こうして２人でキスするのは久しぶりだった。
line = "最近はヴィクトリアフォームの訓練で、ディーちゃんも一緒にいることが多かったから、こうして２人でキスするのは久しぶりだった。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「まぁ……確かに、前にキスしてから『９日』ぶりだけど……」
line = "「まぁ……確かに、前にキスしてから『９日』ぶりだけど……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「――そこまで細かい日数は覚えてなかったって？　た、たまたまよ！　たまたま！」
line = "「――そこまで細かい日数は覚えてなかったって？　た、たまたまよ！　たまたま！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「別に気にしてたとか、寂しかったとか……そんなことないんだからねっ！」
line = "「別に気にしてたとか、寂しかったとか……そんなことないんだからねっ！」"

[[dialogue]]
speaker = "unk"
# 顔を真っ赤にして言い返してくるシズハ。
line = "顔を真っ赤にして言い返してくるシズハ。"

[[dialogue]]
speaker = "unk"
# その様子が愛おしくて、俺はもう１度、強めに抱きしめる。
line = "その様子が愛おしくて、俺はもう１度、強めに抱きしめる。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「んっ……<emoji=heart04>　もう、会長ってば、ハグするのも早いわよ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　もう、会長ってば、ハグするのも早いわよ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は背中に回した手で、ゆっくりと円を描くように撫でる。
line = "俺は背中に回した手で、ゆっくりと円を描くように撫でる。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「んんっ……<emoji=heart04>　はふぅ……<emoji=heart04>」
line = "「んんっ……<emoji=heart04>　はふぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# （会長の手、あったかい……<emoji=heart04>　優しく撫でられるだけで、胸の奥がじんわりして……<emoji=heart04>）
line = "（会長の手、あったかい……<emoji=heart04>　優しく撫でられるだけで、胸の奥がじんわりして……<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ（覚醒）"
# （あっ……頭も撫でられて……はあぁ……<emoji=heart04>）
line = "（あっ……頭も撫でられて……はあぁ……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# 俺が髪を梳くように撫でると、シズハは力を抜いて体重を預けてくる。
line = "俺が髪を梳くように撫でると、シズハは力を抜いて体重を預けてくる。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# （幸せ……<emoji=heart04>　こうしてくっ付いてるだけで、心が満たされていく感じ……<emoji=heart04>）
line = "（幸せ……<emoji=heart04>　こうしてくっ付いてるだけで、心が満たされていく感じ……<emoji=heart04>）"

[[dialogue]]
speaker = "シズハ（覚醒）"
# （会長の匂い、会長の体温……全部好き……<emoji=heart04>）
line = "（会長の匂い、会長の体温……全部好き……<emoji=heart04>）"

[[dialogue]]
speaker = "unk"
# ……シズハのこと、やっぱり好きだなぁ
line = "……シズハのこと、やっぱり好きだなぁ"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「えっ！？　か、会長も……好きなの？」
line = "「えっ！？　か、会長も……好きなの？」"

[[dialogue]]
speaker = "unk"
# 一瞬目を見開いたあと、顔を赤くして視線を逸らす。
line = "一瞬目を見開いたあと、顔を赤くして視線を逸らす。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「あっ、いや……なんでもないっ！」
line = "「あっ、いや……なんでもないっ！」"

[[dialogue]]
speaker = "unk"
# 俺は、もっと撫でてもいいかと尋ねる。
line = "俺は、もっと撫でてもいいかと尋ねる。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「……う、うん<emoji=heart04>　いいけど……」
line = "「……う、うん<emoji=heart04>　いいけど……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「でも、お尻を触るのは……もっと絆を深めてからじゃないとダメだからね<emoji=heart04>」
line = "「でも、お尻を触るのは……もっと絆を深めてからじゃないとダメだからね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# お尻のハードル、やっぱり高いのか
line = "お尻のハードル、やっぱり高いのか"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「あ、当たり前じゃない！　恋人同士でお尻を触り合うのは、その……愛をちゃんと確かめ合う時でしょ<emoji=heart04>」
line = "「あ、当たり前じゃない！　恋人同士でお尻を触り合うのは、その……愛をちゃんと確かめ合う時でしょ<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「だ、だから……心の準備ができるまでは、まだダメ<emoji=heart04>」
line = "「だ、だから……心の準備ができるまでは、まだダメ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――なら、それまでに、しっかりと絆を深めておかないとな。
line = "――なら、それまでに、しっかりと絆を深めておかないとな。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「あっ……<emoji=heart04>　ま、またキス、するの……？」
line = "「あっ……<emoji=heart04>　ま、またキス、するの……？」"

[[dialogue]]
speaker = "unk"
# ダメか？
line = "ダメか？"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「…………久しぶりだし……またしばらく出来ないかもしれないから……」
line = "「…………久しぶりだし……またしばらく出来ないかもしれないから……」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「いいわよ。『キス<ruby=だ>貯</ruby>め』ってことで……<emoji=heart04>」
line = "「いいわよ。『キス<ruby>貯<rt>だ</rt></ruby>め』ってことで……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「だから――ん……<emoji=heart04>」
line = "「だから――ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ゆっくりと目を閉じ、今度は自分から唇を近づけてくる。
line = "ゆっくりと目を閉じ、今度は自分から唇を近づけてくる。"

[[dialogue]]
speaker = "unk"
# 俺は彼女の頬に手を添え、丁寧に口づける。
line = "俺は彼女の頬に手を添え、丁寧に口づける。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# シズハ、好きだ
line = "シズハ、好きだ"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「はあぁっ……<emoji=heart04>　んっ……<emoji=heart04>」
line = "「はあぁっ……<emoji=heart04>　んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「んちゅっ……<emoji=heart04>　私も……<emoji=heart04>」
line = "「んちゅっ……<emoji=heart04>　私も……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「好きよ、会長……<emoji=heart04>」
line = "「好きよ、会長……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「んっ……ちゅっ……<emoji=heart04>　んちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ……<emoji=heart04>　んちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 互いの温もりを確かめ合うように、何度もキスを重ねる。
line = "互いの温もりを確かめ合うように、何度もキスを重ねる。"

[[dialogue]]
speaker = "unk"
# それから俺たちは、しばらく会えない日々に備えて――抱きしめ合いながら、たっぷりと『キス貯め』をするのだった。
line = "それから俺たちは、しばらく会えない日々に備えて――抱きしめ合いながら、たっぷりと『キス貯め』をするのだった。"
