[[dialogue]]
speaker = "unk"
# 新たなフォームへの覚醒を果たし、エントロフィーに再び挑むシズハ。
line = "新たなフォームへの覚醒を果たし、エントロフィーに再び挑むシズハ。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「願いの翼を――みんなに！」
line = "「願いの翼を――みんなに！」"

[[dialogue]]
speaker = "unk"
# 杖先の聖杯から、眩い雫が地面へと落ちる。
line = "杖先の聖杯から、眩い雫が地面へと落ちる。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ヴィクトリアフェザー！」
line = "「ヴィクトリアフェザー！」"

[[dialogue]]
speaker = "unk"
# 波紋のように光が広がり、空間がゆらめいていく。
line = "波紋のように光が広がり、空間がゆらめいていく。"

[[dialogue]]
speaker = "エントロフィー"
# 「なんすか、これ……！？」
line = "「なんすか、これ……！？」"

[[dialogue]]
speaker = "サチ"
# 「……ハッ！？」
line = "「……ハッ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「暴走が……止まったのじゃ！」
line = "「暴走が……止まったのじゃ！」"

[[dialogue]]
speaker = "エントロフィー"
# 「なっ……アネさんたちにかけた反転のロストアイテムの力が無効化された……！？」
line = "「なっ……アネさんたちにかけた反転のロストアイテムの力が無効化された……！？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「聖杯ちゃんの魔力と、ディーちゃんのマイナスエネルギーを融合させた力で、みんなに『願いを叶える翼』を授ける――」
line = "「聖杯ちゃんの魔力と、ディーちゃんのマイナスエネルギーを融合させた力で、みんなに『願いを叶える翼』を授ける――」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「それが私、『魔法少女グレイル☆シズハ』の――『ヴィクトリアフォーム』の能力だよ！」
line = "「それが私、『魔法少女グレイル☆シズハ』の――『ヴィクトリアフォーム』の能力だよ！」"

[[dialogue]]
speaker = "unk"
# 仲間たちの足元に、光の翼が顕現する。
line = "仲間たちの足元に、光の翼が顕現する。"

[[dialogue]]
speaker = "サチ"
# 「すごい……！　反転した力の暴れる感じが、全くしない！」
line = "「すごい……！　反転した力の暴れる感じが、全くしない！」"

[[dialogue]]
speaker = "プリムラ"
# 「ああ、自由自在に操れるような感覚じゃ！」
line = "「ああ、自由自在に操れるような感覚じゃ！」"

[[dialogue]]
speaker = "ディーラック"
# 「言っとくけど、ボクがマイナスエネルギーを制御してなくちゃ、その翼は維持できないんだから、感謝するんだね！」
line = "「言っとくけど、ボクがマイナスエネルギーを制御してなくちゃ、その翼は維持できないんだから、感謝するんだね！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「元々、シズハさんの戦闘服の足元には、何故か『小さな翼』が生えていました」
line = "「元々、シズハさんの戦闘服の足元には、何故か『小さな翼』が生えていました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あれは、シズハさんの――『願いへ飛翔する』イメージの象徴だったんですね！」
line = "「あれは、シズハさんの――『願いへ飛翔する』イメージの象徴だったんですね！」"

[[dialogue]]
speaker = "unk"
# サチとプリムラだけでなく、俺とトレジアンナさんの足元にも、同じく光の翼が生えていた。
line = "サチとプリムラだけでなく、俺とトレジアンナさんの足元にも、同じく光の翼が生えていた。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「みんな！　今こそ全員で――勝利の願いを叶える時だよ！」
line = "「みんな！　今こそ全員で――勝利の願いを叶える時だよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ああ！　ここまでよくも好き勝手やってくれたな、エントロフィー！」
line = "「ああ！　ここまでよくも好き勝手やってくれたな、エントロフィー！」"

[[dialogue]]
speaker = "サチ"
# 「はい。人事天命、ここからは――」
line = "「はい。人事天命、ここからは――」"

[[dialogue]]
speaker = "サチ"
# 「ハズレなしです！」
line = "「ハズレなしです！」"

[[dialogue]]
speaker = "エントロフィー"
# 「きゃはははっ！　いいっすよ！！　魔法少女の全力ってやつを、ウチに見せて下さい！！！」
line = "「きゃはははっ！　いいっすよ！！　魔法少女の全力ってやつを、ウチに見せて下さい！！！」"

[[dialogue]]
speaker = "unk"
# そうして、俺たちとエントロフィーの決戦が始まった。
line = "そうして、俺たちとエントロフィーの決戦が始まった。"

[[dialogue]]
speaker = "プリムラ"
# 「――サチ！　シズハ！　我のエネルギーを遠隔でくれてやる！　魔力切れを気にせず、ガンガン攻めまくれ！」
line = "「――サチ！　シズハ！　我のエネルギーを遠隔でくれてやる！　魔力切れを気にせず、ガンガン攻めまくれ！」"

[[dialogue]]
speaker = "サチ"
# 「うん！　シズハちゃん、合わせるよ！」
line = "「うん！　シズハちゃん、合わせるよ！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「オッケー！　お願い、ディーちゃん！」
line = "「オッケー！　お願い、ディーちゃん！」"

[[dialogue]]
speaker = "ディーラック"
# 「全く、ビーストづかいが荒いのサ！」
line = "「全く、ビーストづかいが荒いのサ！」"

[[dialogue]]
speaker = "unk"
# それでもディーラックは、シズハの願いに応え、マイナスエネルギーを聖杯の魔力に合わせる。
line = "それでもディーラックは、シズハの願いに応え、マイナスエネルギーを聖杯の魔力に合わせる。"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「グレイルボルテックス！」
line = "「グレイルボルテックス！」"

[[dialogue]]
speaker = "サチ"
# 「フォーチュンブレイカー！」
line = "「フォーチュンブレイカー！」"

[[dialogue]]
speaker = "エントロフィー"
# 「ぐうぅっ！？　サチのアネさんの能力で、マイナスエネルギーの制御が乱れるっす！」
line = "「ぐうぅっ！？　サチのアネさんの能力で、マイナスエネルギーの制御が乱れるっす！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私たちもいますよ！　プリティアブラスター！」
line = "「私たちもいますよ！　プリティアブラスター！」"

[[dialogue]]
speaker = "unk"
# アビスインパクトッ！！
line = "アビスインパクトッ！！"

[[dialogue]]
speaker = "エントロフィー"
# 「防げないんだったら――速さで避けるまでっすよ！」
line = "「防げないんだったら――速さで避けるまでっすよ！」"

[[dialogue]]
speaker = "unk"
# エントロフィーは防御から回避に専念して、俺たちの技を避ける。
line = "エントロフィーは防御から回避に専念して、俺たちの技を避ける。"

[[dialogue]]
speaker = "エントロフィー"
# 「どんな能力、どんな技でも、当たらなければどうということはないっす！」
line = "「どんな能力、どんな技でも、当たらなければどうということはないっす！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「だったら、『当たるように願う』までよ！」
line = "「だったら、『当たるように願う』までよ！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「デザイアトランスミッション！」
line = "「デザイアトランスミッション！」"

[[dialogue]]
speaker = "エントロフィー"
# 「なっ！？　――かはっ！？」
line = "「なっ！？　――かはっ！？」"

[[dialogue]]
speaker = "unk"
# シズハが攻撃を放つと同時に、エントロフィーに直撃して吹き飛ばす。
line = "シズハが攻撃を放つと同時に、エントロフィーに直撃して吹き飛ばす。"

[[dialogue]]
speaker = "エントロフィー"
# 「今度は、何が起きたっすか……！？」
line = "「今度は、何が起きたっすか……！？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「『攻撃が必ず当たる』ように強く願ったのよ。だから、技が発動すると同時に、あなたに当たったの！」
line = "「『攻撃が必ず当たる』ように強く願ったのよ。だから、技が発動すると同時に、あなたに当たったの！」"

[[dialogue]]
speaker = "エントロフィー"
# 「因果を超越したとでもいうんすか……！？」
line = "「因果を超越したとでもいうんすか……！？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「私だけじゃない。みんなの攻撃も、私と一緒の翼がある限り、強く願えばあなたに当たるわ！」
line = "「私だけじゃない。みんなの攻撃も、私と一緒の翼がある限り、強く願えばあなたに当たるわ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ノワールマジック！」
line = "「ノワールマジック！」"

[[dialogue]]
speaker = "エントロフィー"
# 「ぐあっ！？」
line = "「ぐあっ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　本当じゃ♪」
line = "「フハハハ！　本当じゃ♪」"

[[dialogue]]
speaker = "サチ"
# 「アンラッキー・テンペスト！」
line = "「アンラッキー・テンペスト！」"

[[dialogue]]
speaker = "エントロフィー"
# 「ぐうぅっ！？　こんなの……反則じゃないっすか！？」
line = "「ぐうぅっ！？　こんなの……反則じゃないっすか！？」"

[[dialogue]]
speaker = "プリムラ"
# 「反転のロストアイテムを使っていた貴様が言うな！」
line = "「反転のロストアイテムを使っていた貴様が言うな！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「私１人が願ったところで、この力は叶わない――」
line = "「私１人が願ったところで、この力は叶わない――」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ディーちゃんや、みんながいるから……一緒に強く願える仲間がいるから、このヴィクトリアフォームの能力は使えるのよ！」
line = "「ディーちゃんや、みんながいるから……一緒に強く願える仲間がいるから、このヴィクトリアフォームの能力は使えるのよ！」"

[[dialogue]]
speaker = "サチ"
# 「私のこの力も一緒です！　――フォルトゥーナ・ネメシス！」
line = "「私のこの力も一緒です！　――フォルトゥーナ・ネメシス！」"

[[dialogue]]
speaker = "unk"
# サチの斧の一撃を防御して、エントロフィーの動きが更に鈍る。
line = "サチの斧の一撃を防御して、エントロフィーの動きが更に鈍る。"

[[dialogue]]
speaker = "エントロフィー"
# 「ぐうぅっ……！？　足元のコンクリートが急に崩れて、踏ん張れない……！？」
line = "「ぐうぅっ……！？　足元のコンクリートが急に崩れて、踏ん張れない……！？」"

[[dialogue]]
speaker = "サチ"
# 「『不運を引き寄せる』力でも……仲間の力があれば、それを乗り越えて『幸運を掴むチャンス』に変えることができます！」
line = "「『不運を引き寄せる』力でも……仲間の力があれば、それを乗り越えて『幸運を掴むチャンス』に変えることができます！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「今です！　――トマルさん！！」
line = "「今です！　――トマルさん！！」"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "エントロフィー"
# 「！　まさかもう１人……！？」
line = "「！　まさかもう１人……！？」"

[[dialogue]]
speaker = "unk"
# エントロフィーが視線をやった先には、ジェットコースターのレールの上に立つ、俺たちの心強い仲間――『<ruby=よみの>詠野</ruby>トマル』の姿が。
line = "エントロフィーが視線をやった先には、ジェットコースターのレールの上に立つ、俺たちの心強い仲間――『<ruby>詠野<rt>よみの</rt></ruby>トマル』の姿が。"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「一本集中！」
line = "「一本集中！」"

[[dialogue]]
speaker = "エントロフィー"
# 「しまっ……！？」
line = "「しまっ……！？」"

[[dialogue]]
speaker = "unk"
# トマルの雷の矢がエントロフィーを狙撃し、その場に縫い留めたように固定する。
line = "トマルの雷の矢がエントロフィーを狙撃し、その場に縫い留めたように固定する。"

[[dialogue]]
speaker = "エントロフィー"
# 「こ、この魔法は……動けない……！？」
line = "「こ、この魔法は……動けない……！？」"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「それが私の『魔法少女フォーム』の能力――『<ruby=るてん>留転</ruby>』の力です！」
line = "「それが私の『魔法少女フォーム』の能力――『<ruby>留転<rt>るてん</rt></ruby>』の力です！」"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「みなさま、今です！」
line = "「みなさま、今です！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「ありがとう、トマルくん！　――みんな、決めるよ！」
line = "「ありがとう、トマルくん！　――みんな、決めるよ！」"

[[dialogue]]
speaker = "unk"
# サチ、プリムラ、トレジアンナさん、俺、シズハの５人で声を合わせて叫ぶ。
line = "サチ、プリムラ、トレジアンナさん、俺、シズハの５人で声を合わせて叫ぶ。"

[[dialogue]]
speaker = "全員"
# 「フルユニゾンッ！！！」
line = "「フルユニゾンッ！！！」"

[[dialogue]]
speaker = "unk"
# 動きを封じたエントロフィーに、俺たちは連続攻撃を次々と放ってゆく。
line = "動きを封じたエントロフィーに、俺たちは連続攻撃を次々と放ってゆく。"

[[dialogue]]
speaker = "エントロフィー"
# 「――くっ！？　ぬおおおぉぉぉっ！？」
line = "「――くっ！？　ぬおおおぉぉぉっ！？」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「サチちゃん！　今度は私が、最後の一撃を託す番だよ！」
line = "「サチちゃん！　今度は私が、最後の一撃を託す番だよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「決めろ、サチッ！！」
line = "「決めろ、サチッ！！」"

[[dialogue]]
speaker = "サチ"
# 「うん！　魔力反転、全開っ！！」
line = "「うん！　魔力反転、全開っ！！」"

[[dialogue]]
speaker = "unk"
# 足から光の翼を羽ばたかせて――
line = "足から光の翼を羽ばたかせて――"

[[dialogue]]
speaker = "unk"
# サチが斧の渾身の一撃を、エントロフィーに叩き込む！
line = "サチが斧の渾身の一撃を、エントロフィーに叩き込む！"

[[dialogue]]
speaker = "サチ"
# 「ドゥームフォーチュン・レイジッ！！！」
line = "「ドゥームフォーチュン・レイジッ！！！」"

[[dialogue]]
speaker = "エントロフィー"
# 「うおおおぉぉぉーーーっ！！？」
line = "「うおおおぉぉぉーーーっ！！？」"

[[dialogue]]
speaker = "エントロフィー"
# 「ふっ……ふふっ……！　どうやら、ここまでみたいっすね――」
line = "「ふっ……ふふっ……！　どうやら、ここまでみたいっすね――」"

[[dialogue]]
speaker = "エントロフィー"
# 「さすがっすね……ウチの負けっす！」
line = "「さすがっすね……ウチの負けっす！」"

[[dialogue]]
speaker = "エントロフィー"
# 「今回はこれにて退散しますんで、魔法少女のアネさんたち、魔王のアニさんも、またお会いしましょ～♪」
line = "「今回はこれにて退散しますんで、魔法少女のアネさんたち、魔王のアニさんも、またお会いしましょ～♪」"

[[dialogue]]
speaker = "unk"
# 光が消えると、いつの間にか仮想結界は解除されており、エントロフィーの姿はもうどこにもなかった。
line = "光が消えると、いつの間にか仮想結界は解除されており、エントロフィーの姿はもうどこにもなかった。"

[[dialogue]]
speaker = "サチ"
# 「なんとか勝てましたね。でも……」
line = "「なんとか勝てましたね。でも……」"

[[dialogue]]
speaker = "プリムラ"
# 「ああ、おそらく倒せてはおらんじゃろうな。逃げ足の速いやつじゃ」
line = "「ああ、おそらく倒せてはおらんじゃろうな。逃げ足の速いやつじゃ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「仮想結界内で仕掛けてきたのは、おそらく負けても逃げ切れるようにする為の保険の意味合いもあったんでしょう」
line = "「仮想結界内で仕掛けてきたのは、おそらく負けても逃げ切れるようにする為の保険の意味合いもあったんでしょう」"

[[dialogue]]
speaker = "ディーラック"
# 「実際はボクたちも、仮想結界で負けたところで、現実ではダメージにならない可能性もあったけど……そこはエントロフィーにしかわからないね」
line = "「実際はボクたちも、仮想結界で負けたところで、現実ではダメージにならない可能性もあったけど……そこはエントロフィーにしかわからないね」"

[[dialogue]]
speaker = "unk"
# でも、俺たちの勝ちだ
line = "でも、俺たちの勝ちだ"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「うん♪　私もこうしてヴィクトリアフォームに覚醒できたし♪」
line = "「うん♪　私もこうしてヴィクトリアフォームに覚醒できたし♪」"

[[dialogue]]
speaker = "サチ"
# 「はい。不運なトラブルでしたけど、結果的にみんなで乗り越えて、最後には幸運を掴むことができました」
line = "「はい。不運なトラブルでしたけど、結果的にみんなで乗り越えて、最後には幸運を掴むことができました」"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　そうじゃな♪　エントロフィーの奴め、ざまぁみろなのじゃ！」
line = "「フハハハ！　そうじゃな♪　エントロフィーの奴め、ざまぁみろなのじゃ！」"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「よかった。皆さま、ご無事で……！」
line = "「よかった。皆さま、ご無事で……！」"

[[dialogue]]
speaker = "シズハ（覚醒）"
# 「トマルくんも、助けに来てくれてありがとね♪」
line = "「トマルくんも、助けに来てくれてありがとね♪」"

[[dialogue]]
speaker = "トマル（覚醒）"
# 「いえいえ。間に合ってよかったです♪」
line = "「いえいえ。間に合ってよかったです♪」"

[[dialogue]]
speaker = "unk"
# こうして、俺たちとエントロフィーの戦いは、ひとまず幕を下ろしたのだった。
line = "こうして、俺たちとエントロフィーの戦いは、ひとまず幕を下ろしたのだった。"
