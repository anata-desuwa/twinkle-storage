[[dialogue]]
speaker = "unk"
# セシアをヴィーナスから紹介された後、俺たちは大聖堂カフェテリアに移動して、お茶しながら作戦会議をすることになった。
line = "セシアをヴィーナスから紹介された後、俺たちは大聖堂カフェテリアに移動して、お茶しながら作戦会議をすることになった。"

[[dialogue]]
speaker = "セシア"
# 「紅明ママ、ここでクリスマスパーティーが開催されるのね♪　生徒たちが飾り付けを進めているのが見えるわ」
line = "「紅明ママ、ここでクリスマスパーティーが開催されるのね♪　生徒たちが飾り付けを進めているのが見えるわ」"

[[dialogue]]
speaker = "紅明"
# 「そうそう。去年も参加したけど、新星学園に流星学園、それに附属校の子達も集まって、すごく賑やかになるんだぜ☆」
line = "「そうそう。去年も参加したけど、新星学園に流星学園、それに附属校の子達も集まって、すごく賑やかになるんだぜ☆」"

[[dialogue]]
speaker = "セシア"
# 「そうなのね。セシア、とっても楽しみだわ♪」
line = "「そうなのね。セシア、とっても楽しみだわ♪」"

[[dialogue]]
speaker = "unk"
# 気になってたことがあるんだけど
line = "気になってたことがあるんだけど"

[[dialogue]]
speaker = "セシア"
# 「あら？　会長、どうしたの？」
line = "「あら？　会長、どうしたの？」"

[[dialogue]]
speaker = "セシア"
# 「――わたくしが流星学園附属校の制服を着ているのはどうしてかって？　それは、ヴィーナスが用意してくれたのよ」
line = "「――わたくしが流星学園附属校の制服を着ているのはどうしてかって？　それは、ヴィーナスが用意してくれたのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「先週末にセシアを拾ったばかりで、屋敷の中で合うサイズの服を探してたら、<b>あの人</b>が持ってきたのよ」
line = "「先週末にセシアを拾ったばかりで、屋敷の中で合うサイズの服を探してたら、<b>あの人</b>が持ってきたのよ」"

[[dialogue]]
speaker = "unk"
# それって、九浄家のご当主様？
line = "それって、九浄家のご当主様？"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう。おそらく、セシアが可愛いから着せたかっただけって気がするわ。はしゃいで、写真撮りまくってたし」
line = "「そう。おそらく、セシアが可愛いから着せたかっただけって気がするわ。はしゃいで、写真撮りまくってたし」"

[[dialogue]]
speaker = "紅明"
# 「あはははっ♪　相変わらず、面白い人だな～！　でも、確かにセッシーに似合ってるっしょ、附属校の制服♪」
line = "「あはははっ♪　相変わらず、面白い人だな～！　でも、確かにセッシーに似合ってるっしょ、附属校の制服♪」"

[[dialogue]]
speaker = "セシア"
# 「うんっ、セシアも気に入ってるの♪　附属校にも興味を持って、今度見学させてもらう予定なのよ」
line = "「うんっ、セシアも気に入ってるの♪　附属校にも興味を持って、今度見学させてもらう予定なのよ」"

[[dialogue]]
speaker = "紅明"
# 「おっ、いいじゃん☆　面白そうだし、アタシも一緒に見学付いて行こっかな～」
line = "「おっ、いいじゃん☆　面白そうだし、アタシも一緒に見学付いて行こっかな～」"

[[dialogue]]
speaker = "セシア"
# 「本当？　セシア、紅明ママと一緒に見学できるなら、嬉しいわ♪」
line = "「本当？　セシア、紅明ママと一緒に見学できるなら、嬉しいわ♪」"

[[dialogue]]
speaker = "紅明"
# 「そっか♪　じゃあ、約束ね☆　セッシー、指切りげんまんって知ってる？」
line = "「そっか♪　じゃあ、約束ね☆　セッシー、指切りげんまんって知ってる？」"

[[dialogue]]
speaker = "セシア"
# 「指切りげんまん？　教えて欲しいわ」
line = "「指切りげんまん？　教えて欲しいわ」"

[[dialogue]]
speaker = "unk"
# そんな風にしばらく談笑を続けて、飲み物でひと息ついた後――
line = "そんな風にしばらく談笑を続けて、飲み物でひと息ついた後――"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ、そろそろサンタ大作戦の話に戻りましょうか」
line = "「それじゃあ、そろそろサンタ大作戦の話に戻りましょうか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「星徒会室でも言ったけど、クロトにはセシアのプレゼント配りを手伝ってあげて欲しいの」
line = "「星徒会室でも言ったけど、クロトにはセシアのプレゼント配りを手伝ってあげて欲しいの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトは学園問わず、交流関係が広いでしょう？　だから、プレゼントを配るついでに、セシアをみんなに紹介してあげて欲しいのよ」
line = "「クロトは学園問わず、交流関係が広いでしょう？　だから、プレゼントを配るついでに、セシアをみんなに紹介してあげて欲しいのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「紅明も同じく友人関係が広いから、協力してくれると助かるわ」
line = "「紅明も同じく友人関係が広いから、協力してくれると助かるわ」"

[[dialogue]]
speaker = "紅明"
# 「なるほど、そういうことなら任されたっしょ☆　セッシーは可愛いから、紹介したらみんな、すぐにメロメロになっちゃうと思うぜ？」
line = "「なるほど、そういうことなら任されたっしょ☆　セッシーは可愛いから、紹介したらみんな、すぐにメロメロになっちゃうと思うぜ？」"

[[dialogue]]
speaker = "unk"
# クリスマスパーティーの準備はどうしよっか
line = "クリスマスパーティーの準備はどうしよっか"

[[dialogue]]
speaker = "紅明"
# 「あ～、そういえば、ダーリンたち星徒会メンバーのみんなはクリスマスパーティーの準備もしなくちゃいけないんだっけ。忙しいよね」
line = "「あ～、そういえば、ダーリンたち星徒会メンバーのみんなはクリスマスパーティーの準備もしなくちゃいけないんだっけ。忙しいよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなのよ。だから今回、サンタ大作戦についてはクロトと紅明に一任したいと思ってるの。その代わり、私はクリスマスパーティーの準備の方を頑張るわ」
line = "「そうなのよ。だから今回、サンタ大作戦についてはクロトと紅明に一任したいと思ってるの。その代わり、私はクリスマスパーティーの準備の方を頑張るわ」"

[[dialogue]]
speaker = "紅明"
# 「それだと、ヴィナちーはサンタ大作戦に参加できないってことか。ちょっと残念だぜ」
line = "「それだと、ヴィナちーはサンタ大作戦に参加できないってことか。ちょっと残念だぜ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クリスマスパーティーとセシアのこと、両方成功させる為にどうするのがいいかって考えたら、この方法が１番だと思ったのよ」
line = "「クリスマスパーティーとセシアのこと、両方成功させる為にどうするのがいいかって考えたら、この方法が１番だと思ったのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトならセシアを安心して任せられる。だってクロトは――」
line = "「クロトならセシアを安心して任せられる。だってクロトは――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が信じて会長の役目を任せた、いつか最強で最高の魔王になる男だもの！」
line = "「私が信じて会長の役目を任せた、いつか最強で最高の魔王になる男だもの！」"

[[dialogue]]
speaker = "紅明"
# 「ヒュ～♪　ヴィナちー、言うねぇ。ちょっと妬けちゃうぜ☆」
line = "「ヒュ～♪　ヴィナちー、言うねぇ。ちょっと妬けちゃうぜ☆」"

[[dialogue]]
speaker = "セシア"
# 「ヴィーナスにとって、会長がママのような存在ということね。わたくし、会長に少し興味が湧いてきたのだわ」
line = "「ヴィーナスにとって、会長がママのような存在ということね。わたくし、会長に少し興味が湧いてきたのだわ」"

[[dialogue]]
speaker = "unk"
# そこまで言われたら、俺も頑張らないとな
line = "そこまで言われたら、俺も頑張らないとな"

[[dialogue]]
speaker = "ヴィーナス"
# 「うんっ、頼りにしているわ、クロト♪」
line = "「うんっ、頼りにしているわ、クロト♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、私が参加できない代わりに、あともう１人くらい人手があってもいいと思うのよね――」
line = "「でも、私が参加できない代わりに、あともう１人くらい人手があってもいいと思うのよね――」"

[[dialogue]]
speaker = "ヨミ"
# 「あっ、ヴィーナスお嬢様、会長、お疲れ様です」
line = "「あっ、ヴィーナスお嬢様、会長、お疲れ様です」"

[[dialogue]]
speaker = "ヨミ"
# 「セシアちゃんに、紅明先輩も。皆さんで集まって、なにかお話されてたんですか？」
line = "「セシアちゃんに、紅明先輩も。皆さんで集まって、なにかお話されてたんですか？」"

[[dialogue]]
speaker = "紅明"
# 「おっ、ヨミヨミ～♪　任務管轄係の仕事中かい？　今日も可愛いね～！　挨拶ついでに尻尾をモフモフさせてくれまいか♪」
line = "「おっ、ヨミヨミ～♪　任務管轄係の仕事中かい？　今日も可愛いね～！　挨拶ついでに尻尾をモフモフさせてくれまいか♪」"

[[dialogue]]
speaker = "ヨミ"
# 「ダメです！　というか、ヨミヨミ言わないで下さいっ」
line = "「ダメです！　というか、ヨミヨミ言わないで下さいっ」"

[[dialogue]]
speaker = "unk"
# 彼女の名前は、<ruby=あまがさき>天ヶ崎</ruby>ヨミ。九浄家メイド隊の一員であり、魔界にあるという３０００年の歴史を持つ天ヶ崎神宮の巫女でもある。
line = "彼女の名前は、<ruby>天ヶ崎<rt>あまがさき</rt></ruby>ヨミ。九浄家メイド隊の一員であり、魔界にあるという３０００年の歴史を持つ天ヶ崎神宮の巫女でもある。"

[[dialogue]]
speaker = "unk"
# 大聖堂カフェテリアで運営している任務管轄係の仕事を任されており、その名の通りリクリエに関する任務が発生した際のオペレーター業務や、受発注を担当してくれている。
line = "大聖堂カフェテリアで運営している任務管轄係の仕事を任されており、その名の通りリクリエに関する任務が発生した際のオペレーター業務や、受発注を担当してくれている。"

[[dialogue]]
speaker = "unk"
# ヨミヨミ、仕事お疲れ様
line = "ヨミヨミ、仕事お疲れ様"

[[dialogue]]
speaker = "セシア"
# 「ヨミヨミ、わたくしも尻尾触っていいかしら？　ヨミヨミの尻尾は柔らかいし、毛並みもよくて、とても触り心地がいいのよね」
line = "「ヨミヨミ、わたくしも尻尾触っていいかしら？　ヨミヨミの尻尾は柔らかいし、毛並みもよくて、とても触り心地がいいのよね」"

[[dialogue]]
speaker = "ヨミ"
# 「ほら、紅明先輩がヨミヨミ、ヨミヨミっていつも呼ぶから！　それがお嬢様から会長、セシアちゃんにまで、どんどん伝染していっちゃってるじゃないですかっ！」
line = "「ほら、紅明先輩がヨミヨミ、ヨミヨミっていつも呼ぶから！　それがお嬢様から会長、セシアちゃんにまで、どんどん伝染していっちゃってるじゃないですかっ！」"

[[dialogue]]
speaker = "セシア"
# 「ヨミヨミ、可愛い呼び方だと思うわよ？」
line = "「ヨミヨミ、可愛い呼び方だと思うわよ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね、うん！　ヨミヨミがいいわ！」
line = "「そうね、うん！　ヨミヨミがいいわ！」"

[[dialogue]]
speaker = "ヨミ"
# 「もう、お嬢様まで！　よくないですから！」
line = "「もう、お嬢様まで！　よくないですから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いや、呼び方の話じゃなくて。主人として指令を出すわ！　ヨミヨミもセシアのプレゼント配りを手伝いなさい！」
line = "「いや、呼び方の話じゃなくて。主人として指令を出すわ！　ヨミヨミもセシアのプレゼント配りを手伝いなさい！」"

[[dialogue]]
speaker = "ヨミ"
# 「こや？　えっと……どういうことですか？」
line = "「こや？　えっと……どういうことですか？」"

[[dialogue]]
speaker = "unk"
# 突然の指名に、目をぱちくりさせるヨミであった――
line = "突然の指名に、目をぱちくりさせるヨミであった――"
