[[dialogue]]
speaker = "ロクサーナ"
# 「聞くまでもないと思うが、会長、当然『ロミオとジュリエット』は知っているな？」
line = "「聞くまでもないと思うが、会長、当然『ロミオとジュリエット』は知っているな？」"

[[dialogue]]
speaker = "unk"
# 実はよく知らなかったり なんとなくは……
line = "実はよく知らなかったり\nなんとなくは……"

[[dialogue]]
speaker = "ロクサーナ"
# 「なんだと！？　信じられん、あれだけ語り継がれている作品を記憶していない人間が存在するのか！？」
line = "「なんだと！？　信じられん、あれだけ語り継がれている作品を記憶していない人間が存在するのか！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「いや、いやいや、そうだな、多様性は認めねばならんな。ザッとあらすじを説明してやろう」
line = "「いや、いやいや、そうだな、多様性は認めねばならんな。ザッとあらすじを説明してやろう」"

[[dialogue]]
speaker = "ロクサーナ"
# 「舞台はイタリアの都市ヴェローナだ。そこではモンタギュー家と、キャピュレット家が、血で血を洗う抗争を繰り返している」
line = "「舞台はイタリアの都市ヴェローナだ。そこではモンタギュー家と、キャピュレット家が、血で血を洗う抗争を繰り返している」"

[[dialogue]]
speaker = "メイプル"
# 「そんな中、モンタギュー家のロミオは、親友のマーキューシオに誘われ、キャピュレット家の仮面舞踏会に忍び込む！」
line = "「そんな中、モンタギュー家のロミオは、親友のマーキューシオに誘われ、キャピュレット家の仮面舞踏会に忍び込む！」"

[[dialogue]]
speaker = "藍"
# 「そこでキャピュレットの一人娘ジュリエットに出会い、一目惚れ……たちまち２人は運命的な恋に落ちます」
line = "「そこでキャピュレットの一人娘ジュリエットに出会い、一目惚れ……たちまち２人は運命的な恋に落ちます」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ここで出会って間もなく、２人はキスを交わす。現代では若者の性の乱れがどうとか言われるが、この時代の方がよっぽど手付けが早い」
line = "「ここで出会って間もなく、２人はキスを交わす。現代では若者の性の乱れがどうとか言われるが、この時代の方がよっぽど手付けが早い」"

[[dialogue]]
speaker = "メイプル"
# 「ジュリエットに惚れたロミオは、仮面舞踏会の後、キャピュレット家の果樹園に忍び込んで……」
line = "「ジュリエットに惚れたロミオは、仮面舞踏会の後、キャピュレット家の果樹園に忍び込んで……」"

[[dialogue]]
speaker = "藍"
# 「偶然、ジュリエットの部屋のバルコニー下に辿り着き、ひとり語りする彼女の愛の告白を耳にします」
line = "「偶然、ジュリエットの部屋のバルコニー下に辿り着き、ひとり語りする彼女の愛の告白を耳にします」"

[[dialogue]]
speaker = "ロクサーナ"
# 「どんな凡骨でも知っている、かの有名な『ああロミオ、あなたはどうしてロミオなの』だな」
line = "「どんな凡骨でも知っている、かの有名な『ああロミオ、あなたはどうしてロミオなの』だな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「恋した相手が敵の人間であることを嘆き、たまらずにロミオは彼女の前に姿を現し、思いの丈を打ち明ける」
line = "「恋した相手が敵の人間であることを嘆き、たまらずにロミオは彼女の前に姿を現し、思いの丈を打ち明ける」"

[[dialogue]]
speaker = "ロクサーナ"
# 「両想いの２人は、口頭で永遠の愛を誓った。まったく、焦れったい２人だ。とっとと言葉ではなく体を使って愛し合えばいいものを」
line = "「両想いの２人は、口頭で永遠の愛を誓った。まったく、焦れったい２人だ。とっとと言葉ではなく体を使って愛し合えばいいものを」"

[[dialogue]]
speaker = "ロクサーナ"
# 「いっそ、私のロミジュリでは本懐を遂げさせてやろうかと思ったくらいだ」
line = "「いっそ、私のロミジュリでは本懐を遂げさせてやろうかと思ったくらいだ」"

[[dialogue]]
speaker = "藍"
# 「ひゃあっ……！？　脚本家によって、細かな改変はよくありますけど……」
line = "「ひゃあっ……！？　脚本家によって、細かな改変はよくありますけど……」"

[[dialogue]]
speaker = "メイプル"
# 「そこまでやっちゃったら、さすがに原作崩壊じゃないですか？」
line = "「そこまでやっちゃったら、さすがに原作崩壊じゃないですか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「話の大筋さえ違わなければ、問題あるまい。中世を現代に置き換えたり、時事ネタを盛り込むような芝居を見たことはないか？」
line = "「話の大筋さえ違わなければ、問題あるまい。中世を現代に置き換えたり、時事ネタを盛り込むような芝居を見たことはないか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「観客が見たい物を見せるのが、脚本家の仕事だ。私の構築した世界について誰にも文句は言わせん」
line = "「観客が見たい物を見せるのが、脚本家の仕事だ。私の構築した世界について誰にも文句は言わせん」"

[[dialogue]]
speaker = "ロクサーナ"
# 「だが、今回に関しては、あくまで全年齢向けに配慮してやるとしよう」
line = "「だが、今回に関しては、あくまで全年齢向けに配慮してやるとしよう」"

[[dialogue]]
speaker = "unk"
# どんな濡れ場をやらせるつもりだったの！？
line = "どんな濡れ場をやらせるつもりだったの！？"

[[dialogue]]
speaker = "ロクサーナ"
# 「愛を誓ったふたりはその後、理解者であるロレンス神父のもとで、２人だけの結婚式を挙げるわけだが──とりあえずは、ここまで」
line = "「愛を誓ったふたりはその後、理解者であるロレンス神父のもとで、２人だけの結婚式を挙げるわけだが──とりあえずは、ここまで」"

[[dialogue]]
speaker = "ロクサーナ"
# 「聞いた通りだ。ロミオとジュリエットには早い段階で、手を取り合ってのキスシーンがある」
line = "「聞いた通りだ。ロミオとジュリエットには早い段階で、手を取り合ってのキスシーンがある」"

[[dialogue]]
speaker = "ロクサーナ"
# 「そして、ここからが本題だ。ヒロインのジュリエット役は、この藍なのだがな。とかく、男性に対して免疫がない」
line = "「そして、ここからが本題だ。ヒロインのジュリエット役は、この藍なのだがな。とかく、男性に対して免疫がない」"

