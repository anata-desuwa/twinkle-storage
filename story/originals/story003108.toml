[[dialogue]]
speaker = "unk"
# その後、リーリア以外のメンバーも散々苦労はしたが、リーリアから七彩流羽根突き術の攻略法を教わり、なんとか獅子舞から１勝ずつもぎ取ることに成功した。
line = "その後、リーリア以外のメンバーも散々苦労はしたが、リーリアから七彩流羽根突き術の攻略法を教わり、なんとか獅子舞から１勝ずつもぎ取ることに成功した。"

[[dialogue]]
speaker = "ウズメイア"
# 「――なんとか全員勝てたぁ～！」
line = "「――なんとか全員勝てたぁ～！」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん……とりあえずお前たち全員が、吾輩の試練を乗り越えたことを褒めてやろう」
line = "「ふん……とりあえずお前たち全員が、吾輩の試練を乗り越えたことを褒めてやろう」"

[[dialogue]]
speaker = "獅子舞"
# 「ただ言っておくが、散々戦った上で１勝を落としただけであって、九分九厘勝っていたのは吾輩だということを忘れるな！」
line = "「ただ言っておくが、散々戦った上で１勝を落としただけであって、九分九厘勝っていたのは吾輩だということを忘れるな！」"

[[dialogue]]
speaker = "獅子舞"
# 「吾輩は断じて負けていない！　そこは認めん！」
line = "「吾輩は断じて負けていない！　そこは認めん！」"

[[dialogue]]
speaker = "ディーラック"
# 「あ～、はいはい。負け惜しみ乙～」
line = "「あ～、はいはい。負け惜しみ乙～」"

[[dialogue]]
speaker = "獅子舞"
# 「お前にも１勝落としただけだ！　調子に乗るなよ！？」
line = "「お前にも１勝落としただけだ！　調子に乗るなよ！？」"

[[dialogue]]
speaker = "ディーラック"
# 「というか、ボクはそもそも勝つ必要あったのかな！？　すっげ～、めんどくさかったんだけど！？」
line = "「というか、ボクはそもそも勝つ必要あったのかな！？　すっげ～、めんどくさかったんだけど！？」"

[[dialogue]]
speaker = "unk"
# ふと、そんな中でアナが気づく。
line = "ふと、そんな中でアナが気づく。"

[[dialogue]]
speaker = "アナ"
# 「おや？　獅子舞さん、晴れ着フォームに何かしましたか？　羽根突きをする前よりも、星力が強くなっているような……」
line = "「おや？　獅子舞さん、晴れ着フォームに何かしましたか？　羽根突きをする前よりも、星力が強くなっているような……」"

[[dialogue]]
speaker = "ソフィア"
# 「確かに。言われてみれば、私の晴れ着フォームもパワーアップしている感じがします」
line = "「確かに。言われてみれば、私の晴れ着フォームもパワーアップしている感じがします」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしのもだし！」
line = "「あたしのもだし！」"

[[dialogue]]
speaker = "舞亜"
# 「私のも。これってもしかして、必死に羽根突きの練習をしたから……？」
line = "「私のも。これってもしかして、必死に羽根突きの練習をしたから……？」"

[[dialogue]]
speaker = "獅子舞"
# 「やっと気づいたか。晴れ着フォームに宿っているのは『お正月の力』。故に、お正月の羽根突きは、その力を洗練させる効率の良い修業となる」
line = "「やっと気づいたか。晴れ着フォームに宿っているのは『お正月の力』。故に、お正月の羽根突きは、その力を洗練させる効率の良い修業となる」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、つまり獅子舞さんは、最初から私たちの晴れ着フォームを強くする為に、姿を現してくれてたってことね～♪」
line = "「あら～、つまり獅子舞さんは、最初から私たちの晴れ着フォームを強くする為に、姿を現してくれてたってことね～♪」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん、勘違いするな。せっかく吾輩が戦う力を与えてやっているというのに、それを上手く使いこなせないのでは、崇高な晴れ着に失礼であるからな」
line = "「ふん、勘違いするな。せっかく吾輩が戦う力を与えてやっているというのに、それを上手く使いこなせないのでは、崇高な晴れ着に失礼であるからな」"

[[dialogue]]
speaker = "ディーラック"
# 「ボクは晴れ着関係ないのに、勝つまでやらされたんだけど……？」
line = "「ボクは晴れ着関係ないのに、勝つまでやらされたんだけど……？」"

[[dialogue]]
speaker = "獅子舞"
# 「だが、少しは鬱屈としていたストレスの解消になったのではないか？　檻の中にばかり居ては、縁起が良くならないからな」
line = "「だが、少しは鬱屈としていたストレスの解消になったのではないか？　檻の中にばかり居ては、縁起が良くならないからな」"

[[dialogue]]
speaker = "ディーラック"
# 「はんっ！　余計なお世話……って、おや？」
line = "「はんっ！　余計なお世話……って、おや？」"

[[dialogue]]
speaker = "獅子舞"
# 「ふっ……お前も気づいたようだな。晴れ着の力の代わりに、お前にもちゃんと褒美を用意してやったぞ」
line = "「ふっ……お前も気づいたようだな。晴れ着の力の代わりに、お前にもちゃんと褒美を用意してやったぞ」"

[[dialogue]]
speaker = "ディーラック"
# 「おいこれ……まさかお前、ボクを本当に、シズハちゃんの使い魔みたいにしたのか！？」
line = "「おいこれ……まさかお前、ボクを本当に、シズハちゃんの使い魔みたいにしたのか！？」"

[[dialogue]]
speaker = "シズハ"
# 「え？　それってどういうこと……？」
line = "「え？　それってどういうこと……？」"

[[dialogue]]
speaker = "獅子舞"
# 「ディーラックを檻に封じ込めていた魔法を変化させて、シズハの意に背くことはできない枷の術式にしたのだ」
line = "「ディーラックを檻に封じ込めていた魔法を変化させて、シズハの意に背くことはできない枷の術式にしたのだ」"

[[dialogue]]
speaker = "シズハ"
# 「つまり……ディーちゃんは悪さすることはできないけど、檻の外で自由に行動できるようになったってこと！？　すごい！　やったね、ディーちゃん♪」
line = "「つまり……ディーちゃんは悪さすることはできないけど、檻の外で自由に行動できるようになったってこと！？　すごい！　やったね、ディーちゃん♪」"

[[dialogue]]
speaker = "ディーラック"
# 「全然嬉しくないんだけど！？」
line = "「全然嬉しくないんだけど！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～、よかったわね～♪　これでまた、前みたいにシズハちゃんと一緒に過ごせるわね～」
line = "「あら～、よかったわね～♪　これでまた、前みたいにシズハちゃんと一緒に過ごせるわね～」"

[[dialogue]]
speaker = "ディーラック"
# 「全然よくない！　その親戚の子供を見るみたいな、生温かい目線をヤメロ！！」
line = "「全然よくない！　その親戚の子供を見るみたいな、生温かい目線をヤメロ！！」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん、今日は部屋に帰ったら、久しぶりに一緒にお風呂入ったり、寝たりしようね♪」
line = "「ディーちゃん、今日は部屋に帰ったら、久しぶりに一緒にお風呂入ったり、寝たりしようね♪」"

[[dialogue]]
speaker = "ディーラック"
# 「ちょっ、シズハちゃん！？　なにほざいちゃってんのサ！？」
line = "「ちょっ、シズハちゃん！？　なにほざいちゃってんのサ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふっ♪　前はそんなに仲良く過ごしてたのね～」
line = "「あらあら、うふふっ♪　前はそんなに仲良く過ごしてたのね～」"

[[dialogue]]
speaker = "ディーラック"
# 「ちちち違うっ！　正体明かすまでは、シズハちゃんを信用させる為、仕方なく付き合っていただけサ！」
line = "「ちちち違うっ！　正体明かすまでは、シズハちゃんを信用させる為、仕方なく付き合っていただけサ！」"

[[dialogue]]
speaker = "シズハ"
# 「わっ、すごい♪　ディーちゃんがそんな風に照れて動揺してるの、初めて見た！」
line = "「わっ、すごい♪　ディーちゃんがそんな風に照れて動揺してるの、初めて見た！」"

[[dialogue]]
speaker = "ディーラック"
# 「照れてないのサ！　あ～もう、なんだこれは！　ボクだけが貧乏くじを引かされるのは違うんじゃないかな！！」
line = "「照れてないのサ！　あ～もう、なんだこれは！　ボクだけが貧乏くじを引かされるのは違うんじゃないかな！！」"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ♪　晴れ着の起動も上手く行ったし、みんなの絆も深まったみたいで、ウィンウィンですね☆」
line = "「ふふっ♪　晴れ着の起動も上手く行ったし、みんなの絆も深まったみたいで、ウィンウィンですね☆」"

[[dialogue]]
speaker = "獅子舞"
# 「……渋谷リーリア」
line = "「……渋谷リーリア」"

[[dialogue]]
speaker = "リーリア"
# 「あっ、獅子舞さん、どうかしましたか？」
line = "「あっ、獅子舞さん、どうかしましたか？」"

[[dialogue]]
speaker = "獅子舞"
# 「今回、晴れ着の力を与えることは認めたが、吾輩はまだ、お前のことを全て認めたわけではない！」
line = "「今回、晴れ着の力を与えることは認めたが、吾輩はまだ、お前のことを全て認めたわけではない！」"

[[dialogue]]
speaker = "リーリア"
# 「はいぃ！？　まだダメなんですかぁ！？」
line = "「はいぃ！？　まだダメなんですかぁ！？」"

[[dialogue]]
speaker = "獅子舞"
# 「当たり前だ。七彩流羽根突き術の<ruby=しち>漆</ruby>ノ型を使ってみせたからと言って、調子に乗るな。吾輩はたかだか１回、隙を突かれただけだ。故に――」
line = "「当たり前だ。七彩流羽根突き術の<ruby>漆<rt>しち</rt></ruby>ノ型を使ってみせたからと言って、調子に乗るな。吾輩はたかだか１回、隙を突かれただけだ。故に――」"

[[dialogue]]
speaker = "獅子舞"
# 「晴れ着の力をもっと磨き、いつか吾輩に敗北を認めさせてみせるがいい！　リクリエから人間界を守れるくらい、強くなるのであろう？」
line = "「晴れ着の力をもっと磨き、いつか吾輩に敗北を認めさせてみせるがいい！　リクリエから人間界を守れるくらい、強くなるのであろう？」"

[[dialogue]]
speaker = "リーリア"
# 「……！　はい。この可愛い晴れ着の力、もっと綺麗な色に磨いて、見せに来ます！」
line = "「……！　はい。この可愛い晴れ着の力、もっと綺麗な色に磨いて、見せに来ます！」"

[[dialogue]]
speaker = "獅子舞"
# 「ふん、お前の色がこれからどう変わるか、せいぜい見守ってやるとしよう」
line = "「ふん、お前の色がこれからどう変わるか、せいぜい見守ってやるとしよう」"

[[dialogue]]
speaker = "unk"
# その場でカチンと獅子舞が歯を鳴らすと、結界は消え、周りには参拝客の姿と喧騒が戻ってくる。
line = "その場でカチンと獅子舞が歯を鳴らすと、結界は消え、周りには参拝客の姿と喧騒が戻ってくる。"

[[dialogue]]
speaker = "獅子舞"
# 「では、縁起良き年を。晴れ着の星騎士たちよ」
line = "「では、縁起良き年を。晴れ着の星騎士たちよ」"

[[dialogue]]
speaker = "シズハ"
# 「獅子舞さん、ありがとうございました！」
line = "「獅子舞さん、ありがとうございました！」"

[[dialogue]]
speaker = "アナ"
# 「ご指導、感謝します」
line = "「ご指導、感謝します」"

[[dialogue]]
speaker = "獅子舞"
# 「……ふん」
line = "「……ふん」"

[[dialogue]]
speaker = "unk"
# どこか優しく鼻を鳴らして、１度頷くように頭を振ると、背中を向けて去って行く獅子舞。
line = "どこか優しく鼻を鳴らして、１度頷くように頭を振ると、背中を向けて去って行く獅子舞。"

[[dialogue]]
speaker = "サーシャ"
# 「思わぬサプライズだったけど、これからどうしましょうか？」
line = "「思わぬサプライズだったけど、これからどうしましょうか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「そりゃあ、初詣に来たんですから、本堂までお参りして行かないと！　今年のお願いもちゃんと祈願したいですし♪」
line = "「そりゃあ、初詣に来たんですから、本堂までお参りして行かないと！　今年のお願いもちゃんと祈願したいですし♪」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね。改めて、みんなで向かいましょうか」
line = "「そうですね。改めて、みんなで向かいましょうか」"

[[dialogue]]
speaker = "リーリア"
# 「羽根突きで仲良くなったから、前よりマジカル楽しくなりそう☆」
line = "「羽根突きで仲良くなったから、前よりマジカル楽しくなりそう☆」"

[[dialogue]]
speaker = "アナ"
# 「舞亜さん、初詣が終わったら、練習中に言っていた浅草にある和菓子のお店を教えてもらっても？」
line = "「舞亜さん、初詣が終わったら、練習中に言っていた浅草にある和菓子のお店を教えてもらっても？」"

[[dialogue]]
speaker = "舞亜"
# 「うん、いいよ。アナさん、一緒に行こっか」
line = "「うん、いいよ。アナさん、一緒に行こっか」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、それ、あたしも行きた～い♪　リーリアも行こう！　まだまだ話したいこと沢山あってウズウズしてるし！」
line = "「あっ、それ、あたしも行きた～い♪　リーリアも行こう！　まだまだ話したいこと沢山あってウズウズしてるし！」"

[[dialogue]]
speaker = "リーリア"
# 「行く行く～♪　ソフィアちゃんともまだ、あんまり話せてなかったしね☆」
line = "「行く行く～♪　ソフィアちゃんともまだ、あんまり話せてなかったしね☆」"

[[dialogue]]
speaker = "ソフィア"
# 「そうでしたね。シズハもいかがですか？」
line = "「そうでしたね。シズハもいかがですか？」"

[[dialogue]]
speaker = "シズハ"
# 「はいっ♪　私もよければ、是非！　ディーちゃんも一緒に行こう！」
line = "「はいっ♪　私もよければ、是非！　ディーちゃんも一緒に行こう！」"

[[dialogue]]
speaker = "ディーラック"
# 「え～？　ボクもう、家に帰って休みたいんだけど～」
line = "「え～？　ボクもう、家に帰って休みたいんだけど～」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ♪　私も混ぜてもらっていいかしら～？」
line = "「うふふっ♪　私も混ぜてもらっていいかしら～？」"

[[dialogue]]
speaker = "ウズメイア"
# 「もちろんです！　今日はみんなで楽しく行っちゃいましょ～♪」
line = "「もちろんです！　今日はみんなで楽しく行っちゃいましょ～♪」"

[[dialogue]]
speaker = "シズハ"
# 「そうと決まったらまずは初詣に、いけいけゴーゴー♪」
line = "「そうと決まったらまずは初詣に、いけいけゴーゴー♪」"

[[dialogue]]
speaker = "unk"
# こうして新たなお正月を迎え、星騎士たちは晴れ着の力と共に、新たな縁も結んでゆくのだった。
line = "こうして新たなお正月を迎え、星騎士たちは晴れ着の力と共に、新たな縁も結んでゆくのだった。"
