[[dialogue]]
speaker = "unk"
# 第４話,ＶＳ星喰らいホロウ・ルヴィネ戦闘後,B
line = "第４話,ＶＳ星喰らいホロウ・ルヴィネ戦闘後,B"

[[dialogue]]
speaker = "フィオナ"
# 「これで終わりです──ゴッドブレスシャワー！！」
line = "「これで終わりです──ゴッドブレスシャワー！！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ガ────ガガ────ギィィイィッ！？」
line = "「ガ────ガガ────ギィィイィッ！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「お、お父様っ──うあぁあぁあっ！？」
line = "「お、お父様っ──うあぁあぁあっ！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「こ、こんなふざけたやつらに……！」
line = "「こ、こんなふざけたやつらに……！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「おの、れっ────緋宮──────クロトぉおぉぉ──ッ！？」
line = "「おの、れっ────緋宮──────クロトぉおぉぉ──ッ！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「……『星喰らい』の消滅を確認。これで１つ、勝負の振り子が我々の側へと揺れたようだ」
line = "「……『星喰らい』の消滅を確認。これで１つ、勝負の振り子が我々の側へと揺れたようだ」"

[[dialogue]]
speaker = "イレーナ"
# 「そうね。手にしたばかりの力を使いこなせるか、少し不安だったけれど……何とかなったみたい」
line = "「そうね。手にしたばかりの力を使いこなせるか、少し不安だったけれど……何とかなったみたい」"

[[dialogue]]
speaker = "ジュエリー"
# 「戦闘フォームと一緒に、戦闘経験も受け取ることができたおかげかな。運用にはまったく問題がなかったよ。これは各地の戦いも有利に運べそうだ」
line = "「戦闘フォームと一緒に、戦闘経験も受け取ることができたおかげかな。運用にはまったく問題がなかったよ。これは各地の戦いも有利に運べそうだ」"

[[dialogue]]
speaker = "ルルカ"
# 「つ、強かったぁ～……みんなのおかげで何とか勝てたよ～！！」
line = "「つ、強かったぁ～……みんなのおかげで何とか勝てたよ～！！」"

[[dialogue]]
speaker = "シャロン"
# 「何をおっしゃいますか。ルルカさまの歌のサポート、とても心強かったです！」
line = "「何をおっしゃいますか。ルルカさまの歌のサポート、とても心強かったです！」"

[[dialogue]]
speaker = "ルルカ"
# 「そ、そうかなぁ？　えへへ、役に立てたならよかった！」
line = "「そ、そうかなぁ？　えへへ、役に立てたならよかった！」"

[[dialogue]]
speaker = "シャロン"
# 「それにしても本当に歌がお上手ですね。流石は聖歌隊の御方です……！　しかしその衣装──どこかで見たような……？」
line = "「それにしても本当に歌がお上手ですね。流石は聖歌隊の御方です……！　しかしその衣装──どこかで見たような……？」"

[[dialogue]]
speaker = "ルルカ"
# 「ぎくっ！？」
line = "「ぎくっ！？」"

[[dialogue]]
speaker = "ウルスラ"
# 「シャロンさん、ご存知ないのですか？　ルルカさんの纏っているのは、Ｖチューバー・汐ルカルカのバレンタイン衣装ですよ♪」
line = "「シャロンさん、ご存知ないのですか？　ルルカさんの纏っているのは、Ｖチューバー・汐ルカルカのバレンタイン衣装ですよ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ぎくぎくぎくっ！？　ウルスラ先輩、どど、どうして知って──？」
line = "「ぎくぎくぎくっ！？　ウルスラ先輩、どど、どうして知って──？」"

[[dialogue]]
speaker = "ウルスラ"
# 「幹内世界から記憶を受け取っています。向こうの私も『バレンタイン』と名の付くものは余さずチェックしているようでして♪」
line = "「幹内世界から記憶を受け取っています。向こうの私も『バレンタイン』と名の付くものは余さずチェックしているようでして♪」"

[[dialogue]]
speaker = "シャロン"
# 「なるほどです！　私もその方の衣装、バレンタインのコラボ商品で見た覚えがありましたが……これも幹内世界の記憶なのですね」
line = "「なるほどです！　私もその方の衣装、バレンタインのコラボ商品で見た覚えがありましたが……これも幹内世界の記憶なのですね」"

[[dialogue]]
speaker = "シャロン"
# 「不思議な感覚です。見たことも聞いたこともない、ぶいちゅーばー様の衣装に、見覚えがあるだなんて……」
line = "「不思議な感覚です。見たことも聞いたこともない、ぶいちゅーばー様の衣装に、見覚えがあるだなんて……」"

[[dialogue]]
speaker = "シャロン"
# 「──でもどうして、ルルカさまが、ルカルカさまと同じ衣装を？」
line = "「──でもどうして、ルルカさまが、ルカルカさまと同じ衣装を？」"

[[dialogue]]
speaker = "ルルカ"
# （まずいよぉ、お兄ちゃ～ん！　身バレしちゃう～っ！？）
line = "（まずいよぉ、お兄ちゃ～ん！　身バレしちゃう～っ！？）"

[[dialogue]]
speaker = "ルルカ"
# 「あ、ああ──あたし！　ルカルカちゃんの大ファンだから！！　ファン愛が高じて、ついつい戦闘服が似ちゃうんだよねーっ！！　あはは！」
line = "「あ、ああ──あたし！　ルカルカちゃんの大ファンだから！！　ファン愛が高じて、ついつい戦闘服が似ちゃうんだよねーっ！！　あはは！」"

[[dialogue]]
speaker = "シャロン"
# 「まあ<emoji=heart04>　深い愛の御業だったのですね。素敵です！」
line = "「まあ<emoji=heart04>　深い愛の御業だったのですね。素敵です！」"

[[dialogue]]
speaker = "ウルスラ"
# 「私もバレンタインを愛し、それに影響を受ける者……ルルカさんのお気持ち、よ～くわかりますよ<emoji=heart04>」
line = "「私もバレンタインを愛し、それに影響を受ける者……ルルカさんのお気持ち、よ～くわかりますよ<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「ど、どうも～……」
line = "「ど、どうも～……」"

[[dialogue]]
speaker = "ウルスラ"
# 「うふふ<emoji=heart04>　私たち、仲良くなれそうですね<emoji=heart04>　ルカルカさまのこと、これからたくさん教えていただけますか？」
line = "「うふふ<emoji=heart04>　私たち、仲良くなれそうですね<emoji=heart04>　ルカルカさまのこと、これからたくさん教えていただけますか？」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、ハイ……！！！」
line = "「あっ、ハイ……！！！」"

[[dialogue]]
speaker = "ルルカ"
# （な、なんか近いうちに身バレしちゃいそうな気がするっ……ウルスラ先輩、察しが良さそうだもん～っ！？）
line = "（な、なんか近いうちに身バレしちゃいそうな気がするっ……ウルスラ先輩、察しが良さそうだもん～っ！？）"

[[dialogue]]
speaker = "フィオナ"
# 「魔王フォームに変身できなくなってしまった時は動揺しましたが……この状態の花嫁衣装の出力は、すさまじいものがありましたね」
line = "「魔王フォームに変身できなくなってしまった時は動揺しましたが……この状態の花嫁衣装の出力は、すさまじいものがありましたね」"

[[dialogue]]
speaker = "イレーナ"
# 「はい。無数の可能性から力を借りる、ということを、こんな形で体験するとは思いませんでしたが……」
line = "「はい。無数の可能性から力を借りる、ということを、こんな形で体験するとは思いませんでしたが……」"

[[dialogue]]
speaker = "ミヤハル"
# 「それにしても壮観やねぇ♪　まさかこんなにウェディングドレスを着た女の子たちがいる可能性も、あるやなんて♪」
line = "「それにしても壮観やねぇ♪　まさかこんなにウェディングドレスを着た女の子たちがいる可能性も、あるやなんて♪」"

[[dialogue]]
speaker = "イクシリオン"
# 「ご、ごくり……」
line = "「ご、ごくり……」"

[[dialogue]]
speaker = "フィオナ"
# 「な、何ですか、ミヤハルさん……？」
line = "「な、何ですか、ミヤハルさん……？」"

[[dialogue]]
speaker = "ミヤハル"
# 「フィオナ会長はん、その衣装を手に入れたときの花婿はんって、誰だったん？」
line = "「フィオナ会長はん、その衣装を手に入れたときの花婿はんって、誰だったん？」"

[[dialogue]]
speaker = "フィオナ"
# 「そっ──それは、その……ひ、緋宮会長、ですが……」
line = "「そっ──それは、その……ひ、緋宮会長、ですが……」"

[[dialogue]]
speaker = "ミヤハル"
# 「イレーナはんは？」
line = "「イレーナはんは？」"

[[dialogue]]
speaker = "イレーナ"
# 「…………フィオナ会長と同じ、ですけれど」
line = "「…………フィオナ会長と同じ、ですけれど」"

[[dialogue]]
speaker = "ジュエリー"
# 「無論、私もだよ」
line = "「無論、私もだよ」"

[[dialogue]]
speaker = "イクシリオン"
# （花嫁の皆さんのお相手は──緋宮会長！？　そ、そそそ、それってつまり──！）
line = "（花嫁の皆さんのお相手は──緋宮会長！？　そ、そそそ、それってつまり──！）"

[[dialogue]]
speaker = "ミヤハル"
# 「魔王はんと花嫁はんたちが、えっちぃことをする枝葉の世界も、あるってことやんねぇ？」
line = "「魔王はんと花嫁はんたちが、えっちぃことをする枝葉の世界も、あるってことやんねぇ？」"

[[dialogue]]
speaker = "イクシリオン"
# （ミヤハルさん、なんてストレートなぁっ！！　しかし、それは本当にその通りで、妄想が止まりません！！）
line = "（ミヤハルさん、なんてストレートなぁっ！！　しかし、それは本当にその通りで、妄想が止まりません！！）"

[[dialogue]]
speaker = "イレーナ"
# 「お、おかしな想像をするのはやめてください！　これはあくまで、トラブルから覚醒してしまっただけで……！！」
line = "「お、おかしな想像をするのはやめてください！　これはあくまで、トラブルから覚醒してしまっただけで……！！」"

[[dialogue]]
speaker = "フィオナ"
# 「そそ、そうですよ！　緋宮会長の名誉のためにも、反論しますっ。この衣装にまつわる事件の折、彼にはお手伝いいただいただけで……！」
line = "「そそ、そうですよ！　緋宮会長の名誉のためにも、反論しますっ。この衣装にまつわる事件の折、彼にはお手伝いいただいただけで……！」"

[[dialogue]]
speaker = "イレーナ"
# 「はい！　そもそもの始まりは太陽フレアで！　フィオナ会長が『結婚っていいな』って思ったことが始まりで──」
line = "「はい！　そもそもの始まりは太陽フレアで！　フィオナ会長が『結婚っていいな』って思ったことが始まりで──」"

[[dialogue]]
speaker = "フィオナ"
# 「イレーナさん！？　その話はやめてください！　幹内世界でも散々にこすられた気がしてるんですから！！」
line = "「イレーナさん！？　その話はやめてください！　幹内世界でも散々にこすられた気がしてるんですから！！」"

[[dialogue]]
speaker = "ケイティ"
# 「『結婚っていいな』……？」
line = "「『結婚っていいな』……？」"

[[dialogue]]
speaker = "エステル"
# 「魔王様のお手伝いで、事件が解決されたんですか？　いったいどのような……」
line = "「魔王様のお手伝いで、事件が解決されたんですか？　いったいどのような……」"

[[dialogue]]
speaker = "ミヤハル"
# 「詳しくはわからんけど、そりゃあ当然──<emoji=heart04>」
line = "「詳しくはわからんけど、そりゃあ当然──<emoji=heart04>」"

[[dialogue]]
speaker = "イクシリオン"
# （あああっ！！　こんなに美しいフィオナ会長たちにウェディング姿で迫られたら、あの紳士な緋宮会長だって我慢できるはずもなく──！？）
line = "（あああっ！！　こんなに美しいフィオナ会長たちにウェディング姿で迫られたら、あの紳士な緋宮会長だって我慢できるはずもなく──！？）"

[[dialogue]]
speaker = "ジュエリー"
# 「ああ。結婚式場で永遠の愛を誓い、助手の頬にキスをさせてもらったとも。イレーナさんと一緒にね？」
line = "「ああ。結婚式場で永遠の愛を誓い、助手の頬にキスをさせてもらったとも。イレーナさんと一緒にね？」"

[[dialogue]]
speaker = "イレーナ"
# 「ちょっと、ジュエリー！？」
line = "「ちょっと、ジュエリー！？」"

[[dialogue]]
speaker = "ケイティ"
# 「──まあ。魔王さん、まさかハーレムだなんて……」
line = "「──まあ。魔王さん、まさかハーレムだなんて……」"

[[dialogue]]
speaker = "エステル"
# 「た、大変です！　イクシリオンさんが鼻血を出しながら気絶してしまいました！？」
line = "「た、大変です！　イクシリオンさんが鼻血を出しながら気絶してしまいました！？」"

[[dialogue]]
speaker = "フィオナ"
# 「こ、この話はもうおしまいです！　もうすぐアルタイルに通信が繋がります！　戦果を報告しましょう！！」
line = "「こ、この話はもうおしまいです！　もうすぐアルタイルに通信が繋がります！　戦果を報告しましょう！！」"

[[dialogue]]
speaker = "unk"
# ──フィオナは先刻にくぐった平行世界門に近づき、アルタイルにいるアニマに連絡を取った。
line = "──フィオナは先刻にくぐった平行世界門に近づき、アルタイルにいるアニマに連絡を取った。"

[[dialogue]]
speaker = "アニマ"
# 「──無事に『星喰らいの使徒』を撃破できたようだナ。ご苦労ダ、帰投したまエ！」
line = "「──無事に『星喰らいの使徒』を撃破できたようだナ。ご苦労ダ、帰投したまエ！」"

[[dialogue]]
speaker = "アニマ"
# 「しかし……これは傑作ダ、実に面白イ！！　ウェディングフォームにバレンタインフォーム……会長との可能性は多岐に渡るようだナ！」
line = "「しかし……これは傑作ダ、実に面白イ！！　ウェディングフォームにバレンタインフォーム……会長との可能性は多岐に渡るようだナ！」"

[[dialogue]]
speaker = "アニマ"
# 「時間に余裕があれば、ぜひ隅々まで調べさせてもらいたいところだガ──敵は待ってくれないようダ」
line = "「時間に余裕があれば、ぜひ隅々まで調べさせてもらいたいところだガ──敵は待ってくれないようダ」"

[[dialogue]]
speaker = "フィオナ"
# 「……ええ。『星喰らいの使徒』はまだまだ残っています。他の戦場で戦う仲間の、勝利を祈るとしましょう」
line = "「……ええ。『星喰らいの使徒』はまだまだ残っています。他の戦場で戦う仲間の、勝利を祈るとしましょう」"
