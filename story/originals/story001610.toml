[[dialogue]]
speaker = "セナリィ"
# 「<ruby=エンプレス>女帝</ruby>フォームの着装により、新型モンスターの撃破に成功しましたわ」
line = "「<ruby>女帝<rt>エンプレス</rt></ruby>フォームの着装により、新型モンスターの撃破に成功しましたわ」"

[[dialogue]]
speaker = "セナリィ"
# 「ただし、燃費は最悪極まりないですわね。それでもなんとか使いこなすことができたのは、我がゴールデングースの有能な社員たちのおかげ」
line = "「ただし、燃費は最悪極まりないですわね。それでもなんとか使いこなすことができたのは、我がゴールデングースの有能な社員たちのおかげ」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほぉ……よくぞ、そこまで。文字通り、精魂枯れ果てるまで使いこなしてくれたようだな」
line = "「ほぉ……よくぞ、そこまで。文字通り、精魂枯れ果てるまで使いこなしてくれたようだな」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、おかげさまで！　あれ以来、私の体はガッタガタのポンコツですわ！　スプーンとフォークを持つ手が震えて、食事を取るのも一苦労ですわよ！」
line = "「ええ、おかげさまで！　あれ以来、私の体はガッタガタのポンコツですわ！　スプーンとフォークを持つ手が震えて、食事を取るのも一苦労ですわよ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「貴殿らの連携は、他の者では試せないあまりにも特殊な運用だ。見事なチームワークの勝利といえるだろう」
line = "「貴殿らの連携は、他の者では試せないあまりにも特殊な運用だ。見事なチームワークの勝利といえるだろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「私が依頼した内容は『試験運用』だ。星力の燃費がすこぶる悪いと指摘してくれれば、それでも十分だったのだがな」
line = "「私が依頼した内容は『試験運用』だ。星力の燃費がすこぶる悪いと指摘してくれれば、それでも十分だったのだがな」"

[[dialogue]]
speaker = "セナリィ"
# 「報酬を頂くだけなら、私がボロ雑巾になる必要はなかった……というわけですわね」
line = "「報酬を頂くだけなら、私がボロ雑巾になる必要はなかった……というわけですわね」"

[[dialogue]]
speaker = "ヘレナ"
# 「そういうことになる。しかし新型モンスターの貴重なデータも取れた。思わぬ成果といえるだろう」
line = "「そういうことになる。しかし新型モンスターの貴重なデータも取れた。思わぬ成果といえるだろう」"

[[dialogue]]
speaker = "セナリィ"
# （ヒマワリとミウがいつの間にやらデータを収集してたのよね。まったく抜け目のない子たちだわ）
line = "（ヒマワリとミウがいつの間にやらデータを収集してたのよね。まったく抜け目のない子たちだわ）"

[[dialogue]]
speaker = "ヘレナ"
# 「こちらのデータは買い取らせてもらう。新型モンスターを撃退した報酬も、上乗せして支払うとしよう」
line = "「こちらのデータは買い取らせてもらう。新型モンスターを撃退した報酬も、上乗せして支払うとしよう」"

[[dialogue]]
speaker = "セナリィ"
# 「そうしていただけると。心身ともにボロボロになってまで倒した甲斐があるというもの」
line = "「そうしていただけると。心身ともにボロボロになってまで倒した甲斐があるというもの」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。傷ついた心身に見合う報酬を約束する」
line = "「うむ。傷ついた心身に見合う報酬を約束する」"

[[dialogue]]
speaker = "セナリィ"
# 「存外に美味しい報酬になりましたけど……むうう……まだ星力が戻る気配すらありませんわね」
line = "「存外に美味しい報酬になりましたけど……むうう……まだ星力が戻る気配すらありませんわね」"

[[dialogue]]
speaker = "セナリィ"
# 「ミウの立てたプランは、守護星から直接、星力を前借りすること」
line = "「ミウの立てたプランは、守護星から直接、星力を前借りすること」"

[[dialogue]]
speaker = "セナリィ"
# 「私の《強奪の星眼》と、ヒマワリの投資と回収のスキルがあって、初めて成立するものですけど……」
line = "「私の《強奪の星眼》と、ヒマワリの投資と回収のスキルがあって、初めて成立するものですけど……」"

[[dialogue]]
speaker = "セナリィ"
# 「ムチャクチャな量をむしり取られたせいで、１か月経っても、全ッ然星力が戻ってきませんわ……」
line = "「ムチャクチャな量をむしり取られたせいで、１か月経っても、全ッ然星力が戻ってきませんわ……」"

[[dialogue]]
speaker = "セナリィ"
# 「私の守護星も怒髪天を突いたか、もしくは、シオシオに萎んで梅干しみたいになってるかもですわね……さすがに爆発は、してませんわよね……？」
line = "「私の守護星も怒髪天を突いたか、もしくは、シオシオに萎んで梅干しみたいになってるかもですわね……さすがに爆発は、してませんわよね……？」"

[[dialogue]]
speaker = "セナリィ"
# 「まったくあの子たち……可愛い顔して、とんでもないトラブルメーカーですわ。このまま、私が星騎士として戦えなくなったらどうするつもりですの……」
line = "「まったくあの子たち……可愛い顔して、とんでもないトラブルメーカーですわ。このまま、私が星騎士として戦えなくなったらどうするつもりですの……」"

[[dialogue]]
speaker = "セナリィ"
# 「あの子たちにしてやられてばかりではなく、キチンと社長としての威厳を見せつけなくては。厳しく叱ることも時には大切ですわね！」
line = "「あの子たちにしてやられてばかりではなく、キチンと社長としての威厳を見せつけなくては。厳しく叱ることも時には大切ですわね！」"

[[dialogue]]
speaker = "セナリィ"
# 「ただいま戻りましたわ」
line = "「ただいま戻りましたわ」"

[[dialogue]]
speaker = "ミウ"
# 「おかえりなさい、社長。ヘレナさんへのご報告はどうでしたか？」
line = "「おかえりなさい、社長。ヘレナさんへのご報告はどうでしたか？」"

[[dialogue]]
speaker = "セナリィ"
# 「あのねぇ、あなたたち──」
line = "「あのねぇ、あなたたち──」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あんなに強い敵を、社長単独で倒したんだもん！　もちろん、褒めていただけましたよね？」
line = "「あんなに強い敵を、社長単独で倒したんだもん！　もちろん、褒めていただけましたよね？」"

[[dialogue]]
speaker = "セナリィ"
# （こんなにも期待に満ちた目を輝かせて、私を出迎えてくれる）
line = "（こんなにも期待に満ちた目を輝かせて、私を出迎えてくれる）"

[[dialogue]]
speaker = "セナリィ"
# （私はあなたたちの期待に応えられるほどの、傑物ではないというのに）
line = "（私はあなたたちの期待に応えられるほどの、傑物ではないというのに）"

[[dialogue]]
speaker = "セナリィ"
# （そんな目をされたら、叱るどころか──あなたたちのために、虚勢のひとつも張りたくなってしまうじゃないの）
line = "（そんな目をされたら、叱るどころか──あなたたちのために、虚勢のひとつも張りたくなってしまうじゃないの）"

[[dialogue]]
speaker = "セナリィ"
# 「バッチリに決まってますわ！　素晴らしい働きを認められて、追加報酬までもらってしまいましたわ！」
line = "「バッチリに決まってますわ！　素晴らしい働きを認められて、追加報酬までもらってしまいましたわ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「やったー！　ゴールデングースの歴史に、新たな１ページ！」
line = "「やったー！　ゴールデングースの歴史に、新たな１ページ！」"

[[dialogue]]
speaker = "セナリィ"
# 「あなたたちの歓迎会もまだしていなかったことですし、今晩はパーッと美味しいご飯でも食べにいきますわよ」
line = "「あなたたちの歓迎会もまだしていなかったことですし、今晩はパーッと美味しいご飯でも食べにいきますわよ」"

[[dialogue]]
speaker = "ミウ"
# 「本当ですか！？　あ、でも……」
line = "「本当ですか！？　あ、でも……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ご飯に行くのは嬉しいんですけど、社長がいない間に討伐依頼が入ったんですよー」
line = "「ご飯に行くのは嬉しいんですけど、社長がいない間に討伐依頼が入ったんですよー」"

[[dialogue]]
speaker = "ミウ"
# 「新型モンスターの発見報告があったそうで、討伐経験のあるセナリィ社長の御力をお借りしたいとのことです」
line = "「新型モンスターの発見報告があったそうで、討伐経験のあるセナリィ社長の御力をお借りしたいとのことです」"

[[dialogue]]
speaker = "セナリィ"
# 「あの、あなたたち？　私の体にはまだ星力が全然戻ってないんですのよ？」
line = "「あの、あなたたち？　私の体にはまだ星力が全然戻ってないんですのよ？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「大丈夫ですよ！　あたしと社長のスキルコンボは無敵ですからね！」
line = "「大丈夫ですよ！　あたしと社長のスキルコンボは無敵ですからね！」"

[[dialogue]]
speaker = "セナリィ"
# 「ちっともだいじょばないですわ！　アレをやると１週間は全身筋肉痛でベッドから動けなくなりますのよ！？」
line = "「ちっともだいじょばないですわ！　アレをやると１週間は全身筋肉痛でベッドから動けなくなりますのよ！？」"

[[dialogue]]
speaker = "ミウ"
# 「そうですよね……社長の御体が第一ですから。厳しいようでしたら、今からお断りの電話を──」
line = "「そうですよね……社長の御体が第一ですから。厳しいようでしたら、今からお断りの電話を──」"

[[dialogue]]
speaker = "セナリィ"
# 「あー、もう！　仕方ありませんわね！　１体くらいなら、なんとかなるでしょう！」
line = "「あー、もう！　仕方ありませんわね！　１体くらいなら、なんとかなるでしょう！」"

[[dialogue]]
speaker = "セナリィ"
# 「豪勢な晩餐は、依頼を片付けた後で！　ゴールデングース全社員で向かいますわよ！」
line = "「豪勢な晩餐は、依頼を片付けた後で！　ゴールデングース全社員で向かいますわよ！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「はい、セナリィ社長！」
line = "「はい、セナリィ社長！」"

[[dialogue]]
speaker = "ミウ"
# 「どこまでもお供いたします！」
line = "「どこまでもお供いたします！」"

[[dialogue]]
speaker = "unk"
# 正式に新たな２名のメンバーを加え、賑やかになった秘密結社ゴールデングース。
line = "正式に新たな２名のメンバーを加え、賑やかになった秘密結社ゴールデングース。"

[[dialogue]]
speaker = "unk"
# その名が世に広く知れ渡るのは、もう少し先の話……かもしれない。
line = "その名が世に広く知れ渡るのは、もう少し先の話……かもしれない。"
