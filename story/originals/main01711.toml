[[dialogue]]
speaker = "unk"
# 今を生きる俺たちの視点では、それがあるのか、ないのかすら、確証を得ることはできない。
line = "今を生きる俺たちの視点では、それがあるのか、ないのかすら、確証を得ることはできない。"

[[dialogue]]
speaker = "unk"
# 世界から完全に脅威が消えてなくなるまで──俺たちの戦いは続くのだった。
