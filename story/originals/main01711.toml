[[dialogue]]
speaker = "アニマ"
# 「フヒっ♪　リクリエ討伐記念セール、今ならアニマ特製のお菓子詰め合わせセットがスペシャルプライスで登場だヨ……！」
line = "「フヒっ♪　リクリエ討伐記念セール、今ならアニマ特製のお菓子詰め合わせセットがスペシャルプライスで登場だヨ……！」"

[[dialogue]]
speaker = "リーリア"
# 「わーお！　これ、超おトク～！　３セット買いまーす♪」
line = "「わーお！　これ、超おトク～！　３セット買いまーす♪」"

[[dialogue]]
speaker = "せつな"
# 「こ、これ詰め込みすぎではござらんか……？」
line = "「こ、これ詰め込みすぎではござらんか……？」"

[[dialogue]]
speaker = "unk"
# 購買部はいつにも増して生徒たちで賑わいを見せていた。
line = "購買部はいつにも増して生徒たちで賑わいを見せていた。"

[[dialogue]]
speaker = "unk"
# そんな中、俺を見つけた女子が駆け寄ってくる。
line = "そんな中、俺を見つけた女子が駆け寄ってくる。"

[[dialogue]]
speaker = "リーリア"
