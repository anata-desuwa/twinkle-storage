[[dialogue]]
speaker = "unk"
# リクリエが去っても学園の日常は変わっていない。
line = "リクリエが去っても学園の日常は変わっていない。"

[[dialogue]]
speaker = "unk"
# だが俺にとって日常の象徴でもあった環の姿は……そこにはなかった。
