line = "「センパイ！　なにジロジロ乙女を盗み見てるんですかっ」"

[[dialogue]]
speaker = "クロト"
# 「リーリア──よかった。まだ学園にいられるんだな」
line = "「リーリア──よかった。まだ学園にいられるんだな」"

[[dialogue]]
speaker = "リーリア"
# 「当たり前じゃないですかぁ。私はまだまだ新星学園の１年生！　星騎士に変わりないんですから」
line = "「当たり前じゃないですかぁ。私はまだまだ新星学園の１年生！　星騎士に変わりないんですから」"

[[dialogue]]
speaker = "クロト"
# 「その、なんだ。色々あったから」
line = "「その、なんだ。色々あったから」"

[[dialogue]]
speaker = "リーリア"
# 「あはっ。冗談ですよ、冗談♪　そりゃスパイだった奴が堂々と学園に居残ってたら、驚きますよね」
line = "「あはっ。冗談ですよ、冗談♪　そりゃスパイだった奴が堂々と学園に居残ってたら、驚きますよね」"

[[dialogue]]
speaker = "リーリア"
# 「なんかぁ、ネビュラと学園のお偉いさん同士で話がついてるらしいですよ？　現場の私たちには、まだ詳しいことはわかんないですけど」
line = "「なんかぁ、ネビュラと学園のお偉いさん同士で話がついてるらしいですよ？　現場の私たちには、まだ詳しいことはわかんないですけど」"

[[dialogue]]
speaker = "リーリア"
# 「ネビュラとしても、人間界も守れるならそれに越したことはなかったわけですし。今は完全に利害が一致した、本当のウィンウィン♪　ってやつですね！」
line = "「ネビュラとしても、人間界も守れるならそれに越したことはなかったわけですし。今は完全に利害が一致した、本当のウィンウィン♪　ってやつですね！」"

[[dialogue]]
speaker = "リーリア"
# 「モンスターも完全には消えてないって聞きますし……近いうちに共同作戦があるとかないとか」
line = "「モンスターも完全には消えてないって聞きますし……近いうちに共同作戦があるとかないとか」"

[[dialogue]]
speaker = "リーリア"
# 「まあそこら辺のムズかしい話は、今度お偉いさんたちからセンパイに話がいくんじゃないですかね！」
line = "「まあそこら辺のムズかしい話は、今度お偉いさんたちからセンパイに話がいくんじゃないですかね！」"

[[dialogue]]
speaker = "クロト"
# 「そこはぶん投げじゃなくて、おまえも関わってくれよ」
line = "「そこはぶん投げじゃなくて、おまえも関わってくれよ」"

[[dialogue]]
speaker = "リーリア"
# 「えぇ～、ヤですよぉ。メンドーな会議に参加しなくていいってことだけが、下っ端の数少ない特権なんですから」
line = "「えぇ～、ヤですよぉ。メンドーな会議に参加しなくていいってことだけが、下っ端の数少ない特権なんですから」"

[[dialogue]]
speaker = "unk"
# リーリアはわざとらしく『うげぇ』とリアクションしてから、ぱっと表情を切り替えた。
line = "リーリアはわざとらしく『うげぇ』とリアクションしてから、ぱっと表情を切り替えた。"

[[dialogue]]
speaker = "リーリア"
# 「まっ、何はともあれ……サイコーの結末だってことは間違いないですから♪」
line = "「まっ、何はともあれ……サイコーの結末だってことは間違いないですから♪」"

[[dialogue]]
speaker = "リーリア"
# 「それもこれもセンパイのおかげです！　ありがとうございましたっ」
line = "「それもこれもセンパイのおかげです！　ありがとうございましたっ」"

[[dialogue]]
speaker = "クロト"
# 「……ネビュラのみんなのおかげでもあるよ。こっちこそ、ありがとうな」
line = "「……ネビュラのみんなのおかげでもあるよ。こっちこそ、ありがとうな」"

[[dialogue]]
speaker = "unk"
# アポロ、そしてギエルとの激戦は、紛れもない宇宙規模のそれだった。
line = "アポロ、そしてギエルとの激戦は、紛れもない宇宙規模のそれだった。"

[[dialogue]]
speaker = "unk"
# クラウディアの張ってくれたグレート・ウォールがなければ──ただ戦闘の余波だけで、人間界ごと壊滅していただろう。
line = "クラウディアの張ってくれたグレート・ウォールがなければ──ただ戦闘の余波だけで、人間界ごと壊滅していただろう。"

[[dialogue]]
speaker = "unk"
# 人間、魔族、天使、それに魔女……
line = "人間、魔族、天使、それに魔女……"

[[dialogue]]
speaker = "unk"
# この世界に生きるすべての人が、一丸となって掴んだ勝利だった。
line = "この世界に生きるすべての人が、一丸となって掴んだ勝利だった。"
