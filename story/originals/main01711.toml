[[dialogue]]
speaker = "メルエル"
# 「あ、世界を救った会長くんだ！　おっはよー！」
line = "「あ、世界を救った会長くんだ！　おっはよー！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長～♪　この間は大活躍だったらしいじゃないですか～、このこの～」
line = "「会長～♪　この間は大活躍だったらしいじゃないですか～、このこの～」"

[[dialogue]]
speaker = "クロト"
# 「変な絡み方をするな。無事に勝てたのは星騎士みんなの成果だよ」
line = "「変な絡み方をするな。無事に勝てたのは星騎士みんなの成果だよ」"

[[dialogue]]
speaker = "蛍火"
# 「会長は……謙虚ですね。大変な死闘だったと伺いしましたが……」
line = "「会長は……謙虚ですね。大変な死闘だったと伺いしましたが……」"

[[dialogue]]
speaker = "クロト"
# 「こっちも、蛍火が各地で一騎当千の活躍だったって聞いてるよ」
