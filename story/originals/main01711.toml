line = "人間界の被害は流星市国を中心とした最小限で済み、リクリエは過去のものとなった。"

[[dialogue]]
speaker = "unk"
# 魔界と、天界にも、軽くないひと悶着があったらしいものの、すでに解決されたと聞いている。
line = "魔界と、天界にも、軽くないひと悶着があったらしいものの、すでに解決されたと聞いている。"

[[dialogue]]
speaker = "unk"
# ３０００年の周期を経て再来したリクリエの脅威は、ようやく終わりを告げたのだ。
line = "３０００年の周期を経て再来したリクリエの脅威は、ようやく終わりを告げたのだ。"

[[dialogue]]
speaker = "クロト"
# （とはいえ……いつまでこの状態を保てるか、だけどな）
line = "（とはいえ……いつまでこの状態を保てるか、だけどな）"

[[dialogue]]
speaker = "unk"
# リクリエの本体──アポロとギエルを創り変えた瘴気は今、俺という器に封じられている。
line = "リクリエの本体──アポロとギエルを創り変えた瘴気は今、俺という器に封じられている。"

[[dialogue]]
speaker = "unk"
# 少なくともあれからずっとコントロール下には置けている。
line = "少なくともあれからずっとコントロール下には置けている。"

[[dialogue]]
speaker = "unk"
# <ruby=ラクシス>先代</ruby>が味わったような後遺症も今のところはない。
line = "<ruby>先代<rt>ラクシス</rt></ruby>が味わったような後遺症も今のところはない。"

[[dialogue]]
speaker = "unk"
# とはいえ、いつ爆発するかもわからない爆弾を抱えているようなものだ。
line = "とはいえ、いつ爆発するかもわからない爆弾を抱えているようなものだ。"

[[dialogue]]
speaker = "unk"
# しっかりとこの内に秘めた爆弾を制御できるようになるまで、俺だけは油断しちゃならないだろう。
line = "しっかりとこの内に秘めた爆弾を制御できるようになるまで、俺だけは油断しちゃならないだろう。"

[[dialogue]]
speaker = "トワ先生"
# 「生徒の諸君、おはよー！　今日も元気かな！？」
line = "「生徒の諸君、おはよー！　今日も元気かな！？」"

[[dialogue]]
speaker = "トワ先生"
# 「それじゃトワちゃん先生の～……抜き打ち荷物チェ～ック！　校則違反は許さないんだよ～！」
line = "「それじゃトワちゃん先生の～……抜き打ち荷物チェ～ック！　校則違反は許さないんだよ～！」"

[[dialogue]]
speaker = "トワ先生"
# 「お、我らが星徒会長くん！　まさか君は校則違反してないよねぇ？」
line = "「お、我らが星徒会長くん！　まさか君は校則違反してないよねぇ？」"

[[dialogue]]
speaker = "クロト"
# 「もちろんです。どこを調べてくれても構いませんよ」
line = "「もちろんです。どこを調べてくれても構いませんよ」"

[[dialogue]]
speaker = "トワ先生"
# 「えーっと…………あ！　カバンに漫画が入ってる！」
line = "「えーっと…………あ！　カバンに漫画が入ってる！」"

[[dialogue]]
speaker = "クロト"
# 「あ。マトイに借りてたの返そうと思って……」
line = "「あ。マトイに借りてたの返そうと思って……」"

[[dialogue]]
speaker = "トワ先生"
# 「もうっ。ちょっと世界を救ったからって気が抜けてるんじゃない？」
line = "「もうっ。ちょっと世界を救ったからって気が抜けてるんじゃない？」"

[[dialogue]]
speaker = "クロト"
# 「面目ないです」
line = "「面目ないです」"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ──朝から活気があってよいことだ」
line = "「ふむ──朝から活気があってよいことだ」"

[[dialogue]]
speaker = "トワ先生"
# 「こ──これは流星学園ちょ……じゃなかった総合学園長の白夜院先生！　おはようございます！」
line = "「こ──これは流星学園ちょ……じゃなかった総合学園長の白夜院先生！　おはようございます！」"

[[dialogue]]
speaker = "ラティエ"
# 「おはよう。やれやれ……けったいな肩書きとなってしまったものだ」
line = "「おはよう。やれやれ……けったいな肩書きとなってしまったものだ」"

[[dialogue]]
speaker = "クロト"
# 「おはようございます。人間界じゃお忙しそうですね、ラティエさん」
line = "「おはようございます。人間界じゃお忙しそうですね、ラティエさん」"

[[dialogue]]
speaker = "ラティエ"
# 「全くだ。しかも最近は星見嬢の監視がきつく、なかなか次の旅へ出られん」
line = "「全くだ。しかも最近は星見嬢の監視がきつく、なかなか次の旅へ出られん」"

[[dialogue]]
speaker = "クロト"
# 「自分で業務を全うするという発想はないんですね……」
line = "「自分で業務を全うするという発想はないんですね……」"

[[dialogue]]
speaker = "ラティエ"
# 「当然だ。私がこの役職でいるのも、あくまで一時的な措置にすぎん」
line = "「当然だ。私がこの役職でいるのも、あくまで一時的な措置にすぎん」"

[[dialogue]]
speaker = "ラティエ"
# 「学園長の椅子に座らせるちょうどいい人材さえ捕まれば……私も晴れてお役御免となろう。はっはっはっ」
line = "「学園長の椅子に座らせるちょうどいい人材さえ捕まれば……私も晴れてお役御免となろう。はっはっはっ」"

[[dialogue]]
speaker = "クロト"
# （学園長が務まる人材なんて、そうそう見つかるのかな……？）
line = "（学園長が務まる人材なんて、そうそう見つかるのかな……？）"

[[dialogue]]
speaker = "unk"
# リクリエから世界を守る──<ruby=スターナイト>星騎士</ruby>たちの本懐は無事に果たされた。
line = "リクリエから世界を守る──<ruby>星騎士<rt>スターナイト</rt></ruby>たちの本懐は無事に果たされた。"

[[dialogue]]
speaker = "unk"
# とはいえ、学園自体はまだしばらく存続していくことが決まっていた。
line = "とはいえ、学園自体はまだしばらく存続していくことが決まっていた。"

[[dialogue]]
speaker = "unk"
# なぜならまだ、モンスターの出現が報告されているからだ。
