line = "「ノヴァフォームのために必要な、私のブレイクスルーは、一体どこに……？」"

[[dialogue]]
speaker = "アナ"
# 「あぁ……もうすぐ授業ですね……副会長が遅刻したら大ごとです。急がないと……」
