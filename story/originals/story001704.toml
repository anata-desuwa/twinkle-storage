line = "「はぁっ……はぁっ……戦闘終了。自己ベスト更新。ハイスコア……」"

[[dialogue]]
speaker = "アナ"
# 「……強くは、なっているはずです。でも」
line = "「……強くは、なっているはずです。でも」"

[[dialogue]]
speaker = "アナ"
