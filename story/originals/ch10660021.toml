[[dialogue]]
speaker = "unk"
# 第１話,並び立つ強さを,P
line = "第１話,並び立つ強さを,P"

[[dialogue]]
speaker = "unk"
# 流星学園の学園長にして、最強クラスの力を誇る白夜院ラティエ。
line = "流星学園の学園長にして、最強クラスの力を誇る白夜院ラティエ。"

[[dialogue]]
speaker = "unk"
# その人に俺は、今日も稽古を付けてもらっていた。
line = "その人に俺は、今日も稽古を付けてもらっていた。"

[[dialogue]]
speaker = "ラティエ"
# 「──フフ、迂闊な攻めが減って、随分と動きが良くなったな」
line = "「──フフ、迂闊な攻めが減って、随分と動きが良くなったな」"

[[dialogue]]
speaker = "ラティエ"
# 「慎重なのは結構。だが、仕掛けて来なければ勝利することもできないぞ」
line = "「慎重なのは結構。だが、仕掛けて来なければ勝利することもできないぞ」"

[[dialogue]]
speaker = "unk"
# 学園長の繰り出す変幻自在の攻撃をどうにか受け流す。
line = "学園長の繰り出す変幻自在の攻撃をどうにか受け流す。"

[[dialogue]]
speaker = "unk"
# チャンスは少ない。その少ないチャンスを見極めなくては、攻撃に転じることは出来ない──
line = "チャンスは少ない。その少ないチャンスを見極めなくては、攻撃に転じることは出来ない──"

[[dialogue]]
speaker = "unk"
# （教えられたことを思い出せ……！）
line = "（教えられたことを思い出せ……！）"

[[dialogue]]
speaker = "unk"
# 目で追おうとするから捉えられない。
line = "目で追おうとするから捉えられない。"

[[dialogue]]
speaker = "unk"
# 視線を読み、感覚を研ぎ澄まして──
line = "視線を読み、感覚を研ぎ澄まして──"

[[dialogue]]
speaker = "unk"
# ここだ！！！
line = "ここだ！！！"

[[dialogue]]
speaker = "ラティエ"
# 「よしよし、今のはいい一撃だった。もう少し踏み込みが深ければ完璧だ」
line = "「よしよし、今のはいい一撃だった。もう少し踏み込みが深ければ完璧だ」"

[[dialogue]]
speaker = "ラティエ"
# 「もっともこの砂地の上では厳しかっただろうがな……だが、今の１歩を踏み込めたのは大きな成長だ」
line = "「もっともこの砂地の上では厳しかっただろうがな……だが、今の１歩を踏み込めたのは大きな成長だ」"

[[dialogue]]
speaker = "unk"
# そう言って学園長は距離を取り、攻撃の構えを解いた。
line = "そう言って学園長は距離を取り、攻撃の構えを解いた。"

[[dialogue]]
speaker = "unk"
# それが訓練終了の合図で、次の瞬間には砂浜の上にがっくり膝を突いていた。
line = "それが訓練終了の合図で、次の瞬間には砂浜の上にがっくり膝を突いていた。"

[[dialogue]]
speaker = "ラティエ"
# 「どうだ、足に来ているだろう。砂地での模擬戦は下半身を鍛えるいい訓練になる」
line = "「どうだ、足に来ているだろう。砂地での模擬戦は下半身を鍛えるいい訓練になる」"

[[dialogue]]
speaker = "ラティエ"
# 「それにしても膝が笑って立てなくなるほど、やわな鍛え方はしていなかったはずだと思っているな？」
line = "「それにしても膝が笑って立てなくなるほど、やわな鍛え方はしていなかったはずだと思っているな？」"

[[dialogue]]
speaker = "ラティエ"
# 「フフ、気付いていなかったか。私が意図的に、足腰に負担がかかるような攻撃を仕掛け続けていたこと……」
line = "「フフ、気付いていなかったか。私が意図的に、足腰に負担がかかるような攻撃を仕掛け続けていたこと……」"

[[dialogue]]
speaker = "ラティエ"
# 「飛んだり走ったりせず、ただ攻撃を受け続けているだけでも筋肉は疲労していくものだ」
line = "「飛んだり走ったりせず、ただ攻撃を受け続けているだけでも筋肉は疲労していくものだ」"

[[dialogue]]
speaker = "ラティエ"
# 「逆に言うならば、きみは私の攻撃を正しく受け続けた。だから、こんなに消耗させられてしまったのだ」
line = "「逆に言うならば、きみは私の攻撃を正しく受け続けた。だから、こんなに消耗させられてしまったのだ」"

[[dialogue]]
speaker = "ラティエ"
# 「基礎は確実に積み上がっている。これは素晴らしいことだぞ？」
line = "「基礎は確実に積み上がっている。これは素晴らしいことだぞ？」"

[[dialogue]]
speaker = "ラティエ"
# 「ともあれ楽な姿勢で休むといい。脚の張った筋肉をほぐしてやろう」
line = "「ともあれ楽な姿勢で休むといい。脚の張った筋肉をほぐしてやろう」"

[[dialogue]]
speaker = "unk"
# 学園長の言葉に、俺は両足を伸ばして砂の上に投げ出した。
line = "学園長の言葉に、俺は両足を伸ばして砂の上に投げ出した。"

[[dialogue]]
speaker = "unk"
# 学園長は何ともないのに
line = "学園長は何ともないのに"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、私は普段から鍛えているからな」
line = "「はっはっは、私は普段から鍛えているからな」"

[[dialogue]]
speaker = "ラティエ"
# 「この辺りは積み重ねた訓練の時間の差だ。だからそんなに落ち込んだ顔をしなくてもいい」
line = "「この辺りは積み重ねた訓練の時間の差だ。だからそんなに落ち込んだ顔をしなくてもいい」"

[[dialogue]]
speaker = "ラティエ"
# 「強い男になって私の旅に同行する。その望みはまだ捨てていないのだろう？」
line = "「強い男になって私の旅に同行する。その望みはまだ捨てていないのだろう？」"

[[dialogue]]
speaker = "ラティエ"
# 「おい……何を黙っているんだ？　まさか諦める、なんて言い出すんじゃないだろうな……」
line = "「おい……何を黙っているんだ？　まさか諦める、なんて言い出すんじゃないだろうな……」"

[[dialogue]]
speaker = "ラティエ"
# 「先ほども話したが、きみは順当に成長し続けている。その成長ぶりは目を見張るものだ」
line = "「先ほども話したが、きみは順当に成長し続けている。その成長ぶりは目を見張るものだ」"

[[dialogue]]
speaker = "ラティエ"
# 「なんならもう、私の旅に同行しても問題ないほどの実力は備えつつあるのだから、もっと自信を持って──」
line = "「なんならもう、私の旅に同行しても問題ないほどの実力は備えつつあるのだから、もっと自信を持って──」"

[[dialogue]]
speaker = "unk"
# ……今の言葉、本当ですか？
line = "……今の言葉、本当ですか？"

[[dialogue]]
speaker = "ラティエ"
# 「っ！？　私から発言を引き出すために、わざと黙っていたのか……なかなかいい性格をしているな、きみは」
line = "「っ！？　私から発言を引き出すために、わざと黙っていたのか……なかなかいい性格をしているな、きみは」"

[[dialogue]]
speaker = "unk"
# わざと自信を失ったように見せかけて反応を窺うと、それに気付いた学園長は珍しく非難するような目を向けてくる。
line = "わざと自信を失ったように見せかけて反応を窺うと、それに気付いた学園長は珍しく非難するような目を向けてくる。"

[[dialogue]]
speaker = "ラティエ"
# 「……まあ、きみの成長ぶりが素晴らしいというのはその通りだよ。旅に同行しても問題ないほど力を付けてきているというのも本当だ」
line = "「……まあ、きみの成長ぶりが素晴らしいというのはその通りだよ。旅に同行しても問題ないほど力を付けてきているというのも本当だ」"

[[dialogue]]
speaker = "ラティエ"
# 「だから、きみはこのまま真っ直ぐに努力を続けたまえ。ただし……」
line = "「だから、きみはこのまま真っ直ぐに努力を続けたまえ。ただし……」"

[[dialogue]]
speaker = "ラティエ"
# 「私の隣に立つ男になりたいというなら、もっともっと強くなる必要があるという事も忘れるなよ」
line = "「私の隣に立つ男になりたいというなら、もっともっと強くなる必要があるという事も忘れるなよ」"

[[dialogue]]
speaker = "unk"
# 学園長に見合うにはまだまだです
line = "学園長に見合うにはまだまだです"

[[dialogue]]
speaker = "unk"
# もちろんわかっています
line = "もちろんわかっています"

[[dialogue]]
speaker = "ラティエ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# けれど、必ずなってみせますから
line = "けれど、必ずなってみせますから"

[[dialogue]]
speaker = "ラティエ"
# 「む……ぅ……きみは、なかなかに……ずるいな……」
line = "「む……ぅ……きみは、なかなかに……ずるいな……」"

[[dialogue]]
speaker = "ラティエ"
# 「正直、その可能性を十分に感じさせてくるところが何よりずるい」
line = "「正直、その可能性を十分に感じさせてくるところが何よりずるい」"

[[dialogue]]
speaker = "ラティエ"
# 「だが私も、いつまでも待っていられないぞ？　きみが成長しきる前に、どこかへ旅立ってしまうかもしれないからな」
line = "「だが私も、いつまでも待っていられないぞ？　きみが成長しきる前に、どこかへ旅立ってしまうかもしれないからな」"

[[dialogue]]
speaker = "ラティエ"
# 「その前に強くなって私を認めさせてくれ。──少なからず期待しているから」
line = "「その前に強くなって私を認めさせてくれ。──少なからず期待しているから」"

[[dialogue]]
speaker = "unk"
# …………、はいっ！
line = "…………、はいっ！"

[[dialogue]]
speaker = "ラティエ"
# 「満面な笑みが小憎らしい……そんなきみには、こうしてやる！！」
line = "「満面な笑みが小憎らしい……そんなきみには、こうしてやる！！」"

[[dialogue]]
speaker = "unk"
# 首根っこを捕まえられると、思いっきり頬を抓られてしまった。
line = "首根っこを捕まえられると、思いっきり頬を抓られてしまった。"

[[dialogue]]
speaker = "unk"
# ──学園長の特訓のおかげで確実に実力は備わりつつある。
line = "──学園長の特訓のおかげで確実に実力は備わりつつある。"

[[dialogue]]
speaker = "unk"
# だがそれを通じて学園長との自然なやり取りも出来るようになってきていて、距離が縮まっていることを感じさせてくれるのだった。
line = "だがそれを通じて学園長との自然なやり取りも出来るようになってきていて、距離が縮まっていることを感じさせてくれるのだった。"
