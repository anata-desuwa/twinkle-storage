[[dialogue]]
speaker = "unk"
# アステライト消滅後、俺たちは学園に帰還し、改めてメイプルが何者なのか、話を聞くことになった。
line = "アステライト消滅後、俺たちは学園に帰還し、改めてメイプルが何者なのか、話を聞くことになった。"

[[dialogue]]
speaker = "トワ先生"
# 「じゃあ、改めて紹介するね。この子は魔界からやってきた、メイプルちゃん。年齢は、アナちゃんと同い年で――」
line = "「じゃあ、改めて紹介するね。この子は魔界からやってきた、メイプルちゃん。年齢は、アナちゃんと同い年で――」"

[[dialogue]]
speaker = "トワ先生"
# 「一週間前に、道で行き倒れてたところを、私が拾ったんだ」
line = "「一週間前に、道で行き倒れてたところを、私が拾ったんだ」"

[[dialogue]]
speaker = "マトイ"
# 「行き倒れてた！？」
line = "「行き倒れてた！？」"

[[dialogue]]
speaker = "メイプル"
# 「お腹が減り過ぎて、動けなくなっちゃったんだよね。そこをトワちゃんに助けてもらって、今はトワちゃんの家に居候させてもらってるんだ」
line = "「お腹が減り過ぎて、動けなくなっちゃったんだよね。そこをトワちゃんに助けてもらって、今はトワちゃんの家に居候させてもらってるんだ」"

[[dialogue]]
speaker = "サーシャ"
# 「ということは、学園に所属する生徒ではないのね」
line = "「ということは、学園に所属する生徒ではないのね」"

[[dialogue]]
speaker = "メイプル"
# 「うん。でも、あたしは魔王になる為に人間界へ来たから、できれば星騎士になりたいって思ってるんだ！」
line = "「うん。でも、あたしは魔王になる為に人間界へ来たから、できれば星騎士になりたいって思ってるんだ！」"

[[dialogue]]
speaker = "アナ"
# 「そういえば確か、クルセイダースの子孫だって仰っていましたね」
line = "「そういえば確か、クルセイダースの子孫だって仰っていましたね」"

[[dialogue]]
speaker = "メイプル"
# 「そう、あたしのご先祖様は、３０００年前に魔王と一緒にリクリエと戦った、伝説のクルセイダースの一員だったんだよ！」
line = "「そう、あたしのご先祖様は、３０００年前に魔王と一緒にリクリエと戦った、伝説のクルセイダースの一員だったんだよ！」"

[[dialogue]]
speaker = "unk"
# 魔王のことを知ってるのか？
line = "魔王のことを知ってるのか？"

[[dialogue]]
speaker = "メイプル"
# 「あたしの実家、モノクラウン家は代々、魔王の血を引く者の片腕として仕えてきたからね」
line = "「あたしの実家、モノクラウン家は代々、魔王の血を引く者の片腕として仕えてきたからね」"

[[dialogue]]
speaker = "マトイ"
# 「魔王の血を引く者……？」
line = "「魔王の血を引く者……？」"

[[dialogue]]
speaker = "メイプル"
# 「あたしの生まれ故郷は、魔界の<ruby=たいはい>頽廃</ruby>都市『キュリオス』。そこを統べる皇妃『<ruby=こうれい>煌嶺</ruby>』が、魔王の子孫だよ。公にはされてないけどね」
line = "「あたしの生まれ故郷は、魔界の<ruby>頽廃<rt>たいはい</rt></ruby>都市『キュリオス』。そこを統べる皇妃『<ruby>煌嶺<rt>こうれい</rt></ruby>』が、魔王の子孫だよ。公にはされてないけどね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それって、フィーニスの塔で聞いた名前だわ！」
line = "「それって、フィーニスの塔で聞いた名前だわ！」"

[[dialogue]]
speaker = "メイプル"
# 「まあ、最も、血を引いているだけで、実際は自己中で酷い奴だよ」
line = "「まあ、最も、血を引いているだけで、実際は自己中で酷い奴だよ」"

[[dialogue]]
speaker = "メイプル"
# 「自分の領地さえ守れればそれでよくて、リクリエの最前線である人間界に来ようとか、微塵も思っていないんだよ、煌嶺は」
line = "「自分の領地さえ守れればそれでよくて、リクリエの最前線である人間界に来ようとか、微塵も思っていないんだよ、煌嶺は」"

[[dialogue]]
speaker = "メイプル"
# 「私はあんな奴が魔王だなんて認めないし、パパやママのように仕えたいとは思えない」
line = "「私はあんな奴が魔王だなんて認めないし、パパやママのように仕えたいとは思えない」"

[[dialogue]]
speaker = "メイプル"
# 「だから、家出してきたんだ。あたしが本当の魔王になる為に」
line = "「だから、家出してきたんだ。あたしが本当の魔王になる為に」"

[[dialogue]]
speaker = "アナ"
# 「ふむ……メイプルさん、１つ気になるのですが、いいでしょうか？」
line = "「ふむ……メイプルさん、１つ気になるのですが、いいでしょうか？」"

[[dialogue]]
speaker = "アナ"
# 「魔界から人間界へ来たのは『大交流』で、ということですよね？」
line = "「魔界から人間界へ来たのは『大交流』で、ということですよね？」"

[[dialogue]]
speaker = "メイプル"
# 「うん、そうだよ」
line = "「うん、そうだよ」"

[[dialogue]]
speaker = "unk"
# ――大交流。それは、四半期に１度、三界を繋げて行き来できるようにする行事のことである。
line = "――大交流。それは、四半期に１度、三界を繋げて行き来できるようにする行事のことである。"

[[dialogue]]
speaker = "unk"
# そして、魔界と人間界を行き来する為には『<ruby=ラーゴ・シエロ>鏡界の湖</ruby>』という場所を、船に乗って通る必要がある。
line = "そして、魔界と人間界を行き来する為には『<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>』という場所を、船に乗って通る必要がある。"

[[dialogue]]
speaker = "アナ"
# 「ですが、<ruby=ラーゴ・シエロ>鏡界の湖</ruby>は誰でも自由に通れるわけではありません。１度に移動できる人数も限られています」
line = "「ですが、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>は誰でも自由に通れるわけではありません。１度に移動できる人数も限られています」"

[[dialogue]]
speaker = "サーシャ"
# 「移動できるヒトや物は事前に決められているんだものね。色々と許可が必要だし……」
line = "「移動できるヒトや物は事前に決められているんだものね。色々と許可が必要だし……」"

[[dialogue]]
speaker = "アナ"
# 「はい。なので、メイプルさんがどうやって人間界に来たのかが気になりまして」
line = "「はい。なので、メイプルさんがどうやって人間界に来たのかが気になりまして」"

[[dialogue]]
speaker = "トワ先生"
# 「えっと……それについては、あんまり大きな声じゃ言えないんだけど……」
line = "「えっと……それについては、あんまり大きな声じゃ言えないんだけど……」"

[[dialogue]]
speaker = "トワ先生"
# 「どうやらメイプルちゃん、船の積み荷に紛れて、密航して来たらしくて……」
line = "「どうやらメイプルちゃん、船の積み荷に紛れて、密航して来たらしくて……」"

[[dialogue]]
speaker = "マトイ"
# 「えぇっ！？　それってかなりマズいんじゃ……！？」
line = "「えぇっ！？　それってかなりマズいんじゃ……！？」"

[[dialogue]]
speaker = "メイプル"
# 「ふっ……魔王になる為には、時に綺麗事じゃ済まないこともやらなくちゃいけないんだよ」
line = "「ふっ……魔王になる為には、時に綺麗事じゃ済まないこともやらなくちゃいけないんだよ」"

[[dialogue]]
speaker = "アナ"
# 「なるほど、聞かなかったことにします」
line = "「なるほど、聞かなかったことにします」"

[[dialogue]]
speaker = "ヴィーナス"
# 「メイプル、あなた、大胆なことするわね！」
line = "「メイプル、あなた、大胆なことするわね！」"

[[dialogue]]
speaker = "トワ先生"
# 「とりあえず、そのことについては学園の上層部に相談中なので、星徒会の皆さん、オフレコでお願いします……」
line = "「とりあえず、そのことについては学園の上層部に相談中なので、星徒会の皆さん、オフレコでお願いします……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、Ｓランクモンスターを倒せる程の星術が使えるなら、クロトの会長権限で、新星学園の生徒として迎えればいいんじゃないかしら？」
line = "「でも、Ｓランクモンスターを倒せる程の星術が使えるなら、クロトの会長権限で、新星学園の生徒として迎えればいいんじゃないかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「リクリエと戦う為に必要な人材だからってことにすれば、密航のことも許してもらえそうじゃない？」
line = "「リクリエと戦う為に必要な人材だからってことにすれば、密航のことも許してもらえそうじゃない？」"

[[dialogue]]
speaker = "メイプル"
# 「にへへ♪　学園の生徒にしてもらえたら、あたしは喜んでリクリエと戦うよ！」
line = "「にへへ♪　学園の生徒にしてもらえたら、あたしは喜んでリクリエと戦うよ！」"

[[dialogue]]
speaker = "unk"
# う～ん、それについては、要相談かな
line = "う～ん、それについては、要相談かな"

[[dialogue]]
speaker = "メイプル"
# 「え～！？　お兄ちゃん、なんで～！？」
line = "「え～！？　お兄ちゃん、なんで～！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトが言うなら、仕方ないわね。メイプル、クロトに認めてもらえるように頑張りなさい！」
line = "「クロトが言うなら、仕方ないわね。メイプル、クロトに認めてもらえるように頑張りなさい！」"

[[dialogue]]
speaker = "メイプル"
# 「ぐぬぬ……！　やはりモンスターを倒して実績を上げるしか……」
line = "「ぐぬぬ……！　やはりモンスターを倒して実績を上げるしか……」"

[[dialogue]]
speaker = "トワ先生"
# 「メイプルちゃん、それはダメだってば！　言ったでしょ、学園に登録されていない星術使いがモンスターと戦うのは、危ないから認められてないんだって！」
line = "「メイプルちゃん、それはダメだってば！　言ったでしょ、学園に登録されていない星術使いがモンスターと戦うのは、危ないから認められてないんだって！」"

[[dialogue]]
speaker = "メイプル"
# 「む～っ……」
line = "「む～っ……」"

[[dialogue]]
speaker = "サーシャ"
# 「とりあえず、みんなでカフェテリアにお茶しにいかない？　メイプルちゃんと仲よくなりたいし♪」
line = "「とりあえず、みんなでカフェテリアにお茶しにいかない？　メイプルちゃんと仲よくなりたいし♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいわね！　メイプルにはまだまだ聞きたいこともあるし！」
line = "「いいわね！　メイプルにはまだまだ聞きたいこともあるし！」"

[[dialogue]]
speaker = "マトイ"
# 「確かにひと息つきたいかも。帰ってきてそのまま話し始めちゃってたしね」
line = "「確かにひと息つきたいかも。帰ってきてそのまま話し始めちゃってたしね」"

[[dialogue]]
speaker = "アナ"
# 「ちょうど和菓子を食べたい気分になってたところです」
line = "「ちょうど和菓子を食べたい気分になってたところです」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは一旦、場所を移すことになった。
line = "そうして俺たちは一旦、場所を移すことになった。"

[[dialogue]]
speaker = "unk"
# お茶をしながら、ヴィーナスが尋ねる。
line = "お茶をしながら、ヴィーナスが尋ねる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「――ねぇ、気になってたことといえば、メイプル。あなたの口調、アステラで出会った時となんか違くない？」
line = "「――ねぇ、気になってたことといえば、メイプル。あなたの口調、アステラで出会った時となんか違くない？」"

[[dialogue]]
speaker = "メイプル"
# 「ん？　ああ、今は『オフモード』だからね」
line = "「ん？　ああ、今は『オフモード』だからね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「オフモード？」
line = "「オフモード？」"

[[dialogue]]
speaker = "メイプル"
# 「あの時は眼帯を付けてたでしょ。それにより、自分の中に眠る魔王の人格が目覚め、強大な力を行使できるようになるんだよ」
line = "「あの時は眼帯を付けてたでしょ。それにより、自分の中に眠る魔王の人格が目覚め、強大な力を行使できるようになるんだよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの！？　まさか二重人格というやつ！？」
line = "「そうなの！？　まさか二重人格というやつ！？」"

[[dialogue]]
speaker = "メイプル"
# 「ふっふっふ……まあ、そんな感じかな♪」
line = "「ふっふっふ……まあ、そんな感じかな♪」"

[[dialogue]]
speaker = "トワ先生"
# 「こらこら！　嘘言わないの！　あれは単純にカッコつけて、魔王っぽい口調で喋ってただけでしょ！」
line = "「こらこら！　嘘言わないの！　あれは単純にカッコつけて、魔王っぽい口調で喋ってただけでしょ！」"

[[dialogue]]
speaker = "マトイ"
# 「ああ、なるほど。つまりそういう……」
line = "「ああ、なるほど。つまりそういう……」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあらうふふ♪　メイプルちゃんは、そういうのが好きなのね～」
line = "「あらあらうふふ♪　メイプルちゃんは、そういうのが好きなのね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　どういうこと？」
line = "「？　どういうこと？」"

[[dialogue]]
speaker = "アナ"
# 「ヘレナさんが時々、不思議なことを口にするのと同じ感じかと」
line = "「ヘレナさんが時々、不思議なことを口にするのと同じ感じかと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど！　理解したわ。いわゆる思春期にかかる<ruby=やまい>病</ruby>的なやつってことね！」
line = "「なるほど！　理解したわ。いわゆる思春期にかかる<ruby>病<rt>やまい</rt></ruby>的なやつってことね！」"

[[dialogue]]
speaker = "メイプル"
# 「思春期の病……？　ふふふ、よくわからないけど、魔王を目指す者として威厳は必要でしょ？」
line = "「思春期の病……？　ふふふ、よくわからないけど、魔王を目指す者として威厳は必要でしょ？」"

[[dialogue]]
speaker = "メイプル"
# 「ならば、自身の理想の姿を追い求め、それを実践するのは必然……！　あたしは我が魂の導きに従ったまでのこと！」
line = "「ならば、自身の理想の姿を追い求め、それを実践するのは必然……！　あたしは我が魂の導きに従ったまでのこと！」"

[[dialogue]]
speaker = "マトイ"
# 「私としては、会長をなんで『お兄ちゃん』って呼ぶのかも気になるんだけど……」
line = "「私としては、会長をなんで『お兄ちゃん』って呼ぶのかも気になるんだけど……」"

[[dialogue]]
speaker = "メイプル"
# 「それもまた運命だからだよ！」
line = "「それもまた運命だからだよ！」"

[[dialogue]]
speaker = "メイプル"
# 「実際に会って話して、ビビッと来たんだよね。魔王と噂される存在で、あたしと対になるライバル。そして、年上の男子！」
line = "「実際に会って話して、ビビッと来たんだよね。魔王と噂される存在で、あたしと対になるライバル。そして、年上の男子！」"

[[dialogue]]
speaker = "メイプル"
# 「それはつまり……お兄ちゃんと呼んでも過言ではないと！」
line = "「それはつまり……お兄ちゃんと呼んでも過言ではないと！」"

[[dialogue]]
speaker = "unk"
# いや、よくわからないんだけど！？
line = "いや、よくわからないんだけど！？"

[[dialogue]]
speaker = "サーシャ"
# 「わかるわ～。私もメイプルちゃん見てると、可愛くて自分の妹に欲しくなるもの～♪」
line = "「わかるわ～。私もメイプルちゃん見てると、可愛くて自分の妹に欲しくなるもの～♪」"

[[dialogue]]
speaker = "トワ先生"
# 「いや、サーシャちゃんには<ruby=ソフィアちゃん>本物の妹</ruby>がいるよね？」
line = "「いや、サーシャちゃんには<ruby>本物の妹<rt>ソフィアちゃん</rt></ruby>がいるよね？」"

[[dialogue]]
speaker = "メイプル"
# 「ただ！　お兄ちゃんとは呼んでも、魔王としては認めたわけじゃないから、そこは勘違いしないでよね！」
line = "「ただ！　お兄ちゃんとは呼んでも、魔王としては認めたわけじゃないから、そこは勘違いしないでよね！」"

[[dialogue]]
speaker = "メイプル"
# 「今回のリクリエを打倒し、新しい魔王となるのは、このあたしなんだから！」
line = "「今回のリクリエを打倒し、新しい魔王となるのは、このあたしなんだから！」"

[[dialogue]]
speaker = "メイプル"
# 「それにあたしは――魔王の秘伝である『アルケインコード』を知っている！」
line = "「それにあたしは――魔王の秘伝である『アルケインコード』を知っている！」"

[[dialogue]]
speaker = "unk"
# アルケインコード……？
line = "アルケインコード……？"

[[dialogue]]
speaker = "トワ先生"
# 「なんか、メイプルちゃん曰く、魔王だけが使うことのできる技らしいんだけど、詳しいことは教えてくれないんだよね」
line = "「なんか、メイプルちゃん曰く、魔王だけが使うことのできる技らしいんだけど、詳しいことは教えてくれないんだよね」"

[[dialogue]]
speaker = "メイプル"
# 「秘伝だからね！　それを私が自分で使えるようになった時、名実共に次代の魔王として君臨するというわけだよ！　ふふん♪」
line = "「秘伝だからね！　それを私が自分で使えるようになった時、名実共に次代の魔王として君臨するというわけだよ！　ふふん♪」"

[[dialogue]]
speaker = "メイプル"
# 「とにかく、今日からあたしたちは、どっちが真の魔王になるか競うライバルってこと！」
line = "「とにかく、今日からあたしたちは、どっちが真の魔王になるか競うライバルってこと！」"

[[dialogue]]
speaker = "メイプル"
# 「だから、ちゃんと覚えておいてよね、お兄ちゃん！」
line = "「だから、ちゃんと覚えておいてよね、お兄ちゃん！」"

[[dialogue]]
speaker = "unk"
# そう言って、メイプルは不敵に笑ってみせるのだった。
line = "そう言って、メイプルは不敵に笑ってみせるのだった。"
