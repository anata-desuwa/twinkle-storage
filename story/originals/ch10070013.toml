[[dialogue]]
speaker = "unk"
# 第３話,三界の柱？,P
line = "第３話,三界の柱？,P"

[[dialogue]]
speaker = "ルリエル"
# 「むむ……むむむむ…………」
line = "「むむ……むむむむ…………」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、新星の会長さんっ、こんにちはっ。実はわたし……大変なことに気付いてしまったかもしれないのです」
line = "「あ、新星の会長さんっ、こんにちはっ。実はわたし……大変なことに気付いてしまったかもしれないのです」"

[[dialogue]]
speaker = "ルリエル"
# 「天界と人間界を繋ぐ柱になれと、じっちゃんはわたしに言いました。わたしはそのために頑張ってきました」
line = "「天界と人間界を繋ぐ柱になれと、じっちゃんはわたしに言いました。わたしはそのために頑張ってきました」"

[[dialogue]]
speaker = "ルリエル"
# 「でもそれってどういう意味なんでしょうか？」
line = "「でもそれってどういう意味なんでしょうか？」"

[[dialogue]]
speaker = "ルリエル"
# 「天界と人間界の柱……でも天界と人間界を繋いでいるのってフィーニスの塔ですよね？」
line = "「天界と人間界の柱……でも天界と人間界を繋いでいるのってフィーニスの塔ですよね？」"

[[dialogue]]
speaker = "ルリエル"
# 「フィーニスの塔みたいに大きくなればいいんでしょうか？　でも天界に届くくらい背が高くなるなんて無理ですよぅ……」
line = "「フィーニスの塔みたいに大きくなればいいんでしょうか？　でも天界に届くくらい背が高くなるなんて無理ですよぅ……」"

[[dialogue]]
speaker = "ルリエル"
# 「……柱はたとえ？　柱のように頼りになる人？　あぁ～、なんだ、そういうことなのですねっ」
line = "「……柱はたとえ？　柱のように頼りになる人？　あぁ～、なんだ、そういうことなのですねっ」"

[[dialogue]]
speaker = "ルリエル"
# 「柱のようにすごい人……つまりフィオナ会長ですっ。ルリエルがフィオナ会長のように……」
line = "「柱のようにすごい人……つまりフィオナ会長ですっ。ルリエルがフィオナ会長のように……」"

[[dialogue]]
speaker = "ルリエル"
# 「流星学園星徒会長のルリエルなのですっ。流星市国、そして世界はこのスーパー天使ルリエルが守るのですよ」
line = "「流星学園星徒会長のルリエルなのですっ。流星市国、そして世界はこのスーパー天使ルリエルが守るのですよ」"

[[dialogue]]
speaker = "ルリエル"
# 「星徒会長たるもの、生徒の声を聞くことも仕事なのです。え～、なになに……部活の予算？　グラウンドの使用許可？」
line = "「星徒会長たるもの、生徒の声を聞くことも仕事なのです。え～、なになに……部活の予算？　グラウンドの使用許可？」"

[[dialogue]]
speaker = "ルリエル"
# 「あれ、この書類ってどうするんでしょうか？　どの先生のところに行けばいいんでしたっけ？」
line = "「あれ、この書類ってどうするんでしょうか？　どの先生のところに行けばいいんでしたっけ？」"

[[dialogue]]
speaker = "ソフィア"
# 「ルリエル会長、転生ゲームやりませんか？」
line = "「ルリエル会長、転生ゲームやりませんか？」"

[[dialogue]]
speaker = "ルリエル"
# 「わーい、やるのです～♪」
line = "「わーい、やるのです～♪」"

[[dialogue]]
speaker = "ルリエル"
# 「うぅ～っ、ルリエルにはできる気がしないのです……」
line = "「うぅ～っ、ルリエルにはできる気がしないのです……」"

[[dialogue]]
speaker = "unk"
# そこで遊ばなければいいのでは……？
line = "そこで遊ばなければいいのでは……？"

[[dialogue]]
speaker = "ルリエル"
# 「いやぁ～……フィリスティアでは友達と遊んだりできなかったのでついつい……」
line = "「いやぁ～……フィリスティアでは友達と遊んだりできなかったのでついつい……」"

[[dialogue]]
speaker = "ルリエル"
# 「でも！　副会長ならできるかもしれません。セーラ先輩みたいに……」
line = "「でも！　副会長ならできるかもしれません。セーラ先輩みたいに……」"

[[dialogue]]
speaker = "ルリエル"
# 「ちょりーっす、ルリエルだよ～。うちさ、流星学園で副会長してるんだよね～」
line = "「ちょりーっす、ルリエルだよ～。うちさ、流星学園で副会長してるんだよね～」"

[[dialogue]]
speaker = "ルリエル"
# 「やっぱギャルなら映えだよね～。タピオカ持って～、ＤＩＳＣで撮ってアップっと。キャハハ～」
line = "「やっぱギャルなら映えだよね～。タピオカ持って～、ＤＩＳＣで撮ってアップっと。キャハハ～」"

[[dialogue]]
speaker = "ルリエル"
# 「あとは～……ギャルって何すればいいんだっけ？　ネイル？　日サロ？　え～っとぉ……」
line = "「あとは～……ギャルって何すればいいんだっけ？　ネイル？　日サロ？　え～っとぉ……」"

[[dialogue]]
speaker = "ルリエル"
# 「うーん、ルリエルにギャルは難しいのです……」
line = "「うーん、ルリエルにギャルは難しいのです……」"

[[dialogue]]
speaker = "unk"
# （副会長と関係なくなってる……）
line = "（副会長と関係なくなってる……）"

[[dialogue]]
speaker = "ルリエル"
# 「ではユウリ先輩なら……」
line = "「ではユウリ先輩なら……」"

[[dialogue]]
speaker = "ルリエル"
# 「オラオラオラー！　オレは流星星徒会の特攻隊長、ルリエル様だー！」
line = "「オラオラオラー！　オレは流星星徒会の特攻隊長、ルリエル様だー！」"

[[dialogue]]
speaker = "ルリエル"
# 「モンスターだろうがリクリエだろうが、オレ様がぶっ飛ばしてやるぜ！　あーっはっはっは！」
line = "「モンスターだろうがリクリエだろうが、オレ様がぶっ飛ばしてやるぜ！　あーっはっはっは！」"

[[dialogue]]
speaker = "ルリエル"
# 「あん？　意見の陳情？　星徒会に逆らう連中もまとめてボッコボコにしてやる！　流星学園は星徒会の天下だぜ！」
line = "「あん？　意見の陳情？　星徒会に逆らう連中もまとめてボッコボコにしてやる！　流星学園は星徒会の天下だぜ！」"

[[dialogue]]
speaker = "ルリエル"
# 「あはははっ、楽しそうですぅ～」
line = "「あはははっ、楽しそうですぅ～」"

[[dialogue]]
speaker = "unk"
# （絶対そんなんじゃなかった）
line = "（絶対そんなんじゃなかった）"

[[dialogue]]
speaker = "ルリエル"
# 「でも柱って感じではないですねぇ。ソフィアなら――」
line = "「でも柱って感じではないですねぇ。ソフィアなら――」"

[[dialogue]]
speaker = "ソフィア"
# 「ちょっと待ってください」
line = "「ちょっと待ってください」"

[[dialogue]]
speaker = "ルリエル"
# 「おわぁっ！？」
line = "「おわぁっ！？」"

[[dialogue]]
speaker = "ソフィア"
# 「妙に変な予感がして来てみれば、何失礼なことしてるんですか。これじゃ私は『うぅ～、寒いですぅ～』って震えるだけになるじゃないですか」
line = "「妙に変な予感がして来てみれば、何失礼なことしてるんですか。これじゃ私は『うぅ～、寒いですぅ～』って震えるだけになるじゃないですか」"

[[dialogue]]
speaker = "ルリエル"
# 「そそ、そんなことはないのですよ……？」
line = "「そそ、そんなことはないのですよ……？」"

[[dialogue]]
speaker = "ソフィア"
# 「目が泳いでる……」
line = "「目が泳いでる……」"

[[dialogue]]
speaker = "unk"
# （完全に図星の反応だ……）
line = "（完全に図星の反応だ……）"

[[dialogue]]
speaker = "ルリエル"
# 「うーん、ルリエルでは他の皆さんのようにはなれなさそうですね……どうすればいいのでしょうかぁ？」
line = "「うーん、ルリエルでは他の皆さんのようにはなれなさそうですね……どうすればいいのでしょうかぁ？」"
