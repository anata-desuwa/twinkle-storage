[[dialogue]]
speaker = "unk"
# 第２話,普通のカップル,P
line = "第２話,普通のカップル,P"

[[dialogue]]
speaker = "unk"
# マトイと付き合い始めて、１週間ほど経ったある日──
line = "マトイと付き合い始めて、１週間ほど経ったある日──"

[[dialogue]]
speaker = "マトイ"
# 「会長、この書類なんだけど、先にやっておいたよ。後は最終確認だけなんで、よろしくお願いします」
line = "「会長、この書類なんだけど、先にやっておいたよ。後は最終確認だけなんで、よろしくお願いします」"

[[dialogue]]
speaker = "unk"
# ちょうど次にやろうと思ってたから、助かる
line = "ちょうど次にやろうと思ってたから、助かる"

[[dialogue]]
speaker = "マトイ"
# 「えへへ、何となくそんな気がしてたんだ♪」
line = "「えへへ、何となくそんな気がしてたんだ♪」"

[[dialogue]]
speaker = "マトイ"
# 「――以心伝心だなんて、会長ってば大袈裟だよ～。これくらいは……ね？　今なら普通っていうか～」
line = "「――以心伝心だなんて、会長ってば大袈裟だよ～。これくらいは……ね？　今なら普通っていうか～」"

[[dialogue]]
speaker = "アナ"
# 「じ～っ」
line = "「じ～っ」"

[[dialogue]]
speaker = "マトイ"
# 「うん？　アナ……こっちをじっと見て、どうしたの？」
line = "「うん？　アナ……こっちをじっと見て、どうしたの？」"

[[dialogue]]
speaker = "アナ"
# 「……もしかしてお２人、付き合い始めましたか？」
line = "「……もしかしてお２人、付き合い始めましたか？」"

[[dialogue]]
speaker = "マトイ"
# 「なっ！？　何でそんな……」
line = "「なっ！？　何でそんな……」"

[[dialogue]]
speaker = "アナ"
# 「いやむしろ、気付かない方がおかしいレベルでは？　甘いオーラが駄々漏れてますよ」
line = "「いやむしろ、気付かない方がおかしいレベルでは？　甘いオーラが駄々漏れてますよ」"

[[dialogue]]
speaker = "マトイ"
# 「う、嘘！？　隠してるつもりだったのに……！」
line = "「う、嘘！？　隠してるつもりだったのに……！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　１週間くらい前からよね～。そうなんだろうなって思ってたわ～♪」
line = "「うふふ♪　１週間くらい前からよね～。そうなんだろうなって思ってたわ～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えっ、なに、そうなの！？　クロトとマトイ、いつの間にそんな関係に……！」
line = "「えっ、なに、そうなの！？　クロトとマトイ、いつの間にそんな関係に……！」"

[[dialogue]]
speaker = "アナ"
# 「気付いてない人、ここにいましたね……」
line = "「気付いてない人、ここにいましたね……」"

[[dialogue]]
speaker = "マトイ"
# 「は、恥ずかしいから黙ってたけど……うん、そうなの。１週間前から私、会長と男女のお付き合いを始めることになりまして……」
line = "「は、恥ずかしいから黙ってたけど……うん、そうなの。１週間前から私、会長と男女のお付き合いを始めることになりまして……」"

[[dialogue]]
speaker = "アナ"
# 「おめでとうございます。お２人が互いに好意を抱いていることは予想出来てましたから、無事に気持ちが通じ合えたようで何より」
line = "「おめでとうございます。お２人が互いに好意を抱いていることは予想出来てましたから、無事に気持ちが通じ合えたようで何より」"

[[dialogue]]
speaker = "サーシャ"
# 「おめでと～♪　後で何か、お祝いしないといけないわね～」
line = "「おめでと～♪　後で何か、お祝いしないといけないわね～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おめでとう！　……だけど、ちょっと待って！　私にとっては突然のカミングアウトで、色々聞きたいことが山盛りよ！」
line = "「おめでとう！　……だけど、ちょっと待って！　私にとっては突然のカミングアウトで、色々聞きたいことが山盛りよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイはクロトのこと、いつから好きだったの？」
line = "「マトイはクロトのこと、いつから好きだったの？」"

[[dialogue]]
speaker = "マトイ"
# 「え！？　そ、それは……」
line = "「え！？　そ、それは……」"

[[dialogue]]
speaker = "unk"
# 確かに、聞いてなかった
line = "確かに、聞いてなかった"

[[dialogue]]
speaker = "マトイ"
# 「えっと……会長が最初に転入してきた時に、整っている顔立ちだけど、親近感を持てる雰囲気がいいなって思ってて……」
line = "「えっと……会長が最初に転入してきた時に、整っている顔立ちだけど、親近感を持てる雰囲気がいいなって思ってて……」"

[[dialogue]]
speaker = "マトイ"
# 「努力家で、諦めずに何度も立ち上がって、御前試合でヴィーナスに勝っちゃうのは、見惚れちゃうくらいカッコよかったし……」
line = "「努力家で、諦めずに何度も立ち上がって、御前試合でヴィーナスに勝っちゃうのは、見惚れちゃうくらいカッコよかったし……」"

[[dialogue]]
speaker = "マトイ"
# 「それから一緒にいる内に、普通な私のこともちゃんと女の子として見てくれてることが分かったり、困っていると気付いて助けてくれる優しいところも素敵だし……」
line = "「それから一緒にいる内に、普通な私のこともちゃんと女の子として見てくれてることが分かったり、困っていると気付いて助けてくれる優しいところも素敵だし……」"

[[dialogue]]
speaker = "マトイ"
# 「気付いたら……頭の中が会長でいっぱいになっちゃうくらい、好きになってました……はい」
line = "「気付いたら……頭の中が会長でいっぱいになっちゃうくらい、好きになってました……はい」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　会長くん、顔が真っ赤になってるわ～」
line = "「あらあら、うふふ♪　会長くん、顔が真っ赤になってるわ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイがクロトのこと、大好きなのはよく分かったわ！　告白はどっちがしたの？」
line = "「マトイがクロトのこと、大好きなのはよく分かったわ！　告白はどっちがしたの？」"

[[dialogue]]
speaker = "マトイ"
# 「えっと……会長がこの前、リゾート結界で遊ぼうって誘ってくれて、会長が告白してくれて……」
line = "「えっと……会長がこの前、リゾート結界で遊ぼうって誘ってくれて、会長が告白してくれて……」"

[[dialogue]]
speaker = "アナ"
# 「ほほう。どちらが告白してもおかしくないと思っていましたが……会長、やりますね」
line = "「ほほう。どちらが告白してもおかしくないと思っていましたが……会長、やりますね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それでそれで？　どんな風に告白されたの？」
line = "「それでそれで？　どんな風に告白されたの？」"

[[dialogue]]
speaker = "マトイ"
# 「さ、流石にそれは……秘密」
line = "「さ、流石にそれは……秘密」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え～！　凄く気になるのに～！」
line = "「え～！　凄く気になるのに～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあじゃあ、クロトは？　マトイのどんなところが好きになったの？」
line = "「じゃあじゃあ、クロトは？　マトイのどんなところが好きになったの？」"

[[dialogue]]
speaker = "unk"
# 俺にはいつも嬉しくて……可愛いんだ
line = "俺にはいつも嬉しくて……可愛いんだ"

[[dialogue]]
speaker = "unk"
# マトイが自分では普通だと思っていることが
line = "マトイが自分では普通だと思っていることが"

[[dialogue]]
speaker = "unk"
# ――何気ない気遣いだとか、仕草だとか、好意が隠し切れないところだとか。気付けば俺にとってのマトイは、無くてはならない、当たり前の『普通』の存在になっていた。
line = "――何気ない気遣いだとか、仕草だとか、好意が隠し切れないところだとか。気付けば俺にとってのマトイは、無くてはならない、当たり前の『普通』の存在になっていた。"

[[dialogue]]
speaker = "マトイ"
# 「会長……私、普通って言われて、こんなに嬉しく思ったのは初めて……♪」
line = "「会長……私、普通って言われて、こんなに嬉しく思ったのは初めて……♪」"

[[dialogue]]
speaker = "マトイ"
# 「――うん、分かってる。欠かせない普通ってことは……会長にとっての『特別』ってことなんでしょ？」
line = "「――うん、分かってる。欠かせない普通ってことは……会長にとっての『特別』ってことなんでしょ？」"

[[dialogue]]
speaker = "マトイ"
# 「えへへ……どうしよう、会長の気持ちが分かったら、ますます好きになっちゃったかも……♪」
line = "「えへへ……どうしよう、会長の気持ちが分かったら、ますます好きになっちゃったかも……♪」"

[[dialogue]]
speaker = "unk"
# ……俺もだ
line = "……俺もだ"

[[dialogue]]
speaker = "アナ"
# 「……何というか、普通にバカップルでは？」
line = "「……何というか、普通にバカップルでは？」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ！？　いやいや、お互い好きなの分かっているんだから、これくらい普通のカップルでもする会話でしょ！？」
line = "「ちょっ！？　いやいや、お互い好きなの分かっているんだから、これくらい普通のカップルでもする会話でしょ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「す、凄いわマトイ！　私いまちょっと、顔が熱くなってるもの！　これがバカップルってやつなのね……！」
line = "「す、凄いわマトイ！　私いまちょっと、顔が熱くなってるもの！　これがバカップルってやつなのね……！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスが赤面するレベルで恥ずかしいこと言ってた！？」
line = "「ヴィーナスが赤面するレベルで恥ずかしいこと言ってた！？」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　さっきの会話で、会長くんがどんな告白したか、何となく分かっちゃったわね～♪」
line = "「あら～♪　さっきの会話で、会長くんがどんな告白したか、何となく分かっちゃったわね～♪」"

[[dialogue]]
speaker = "アナ"
# 「ええ、満足しました。ごちそうさまです」
line = "「ええ、満足しました。ごちそうさまです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なになに、２人共、告白内容が分かったの？　私に教えて！」
line = "「なになに、２人共、告白内容が分かったの？　私に教えて！」"

[[dialogue]]
speaker = "サーシャ"
# 「うふふっ、それはね～♪」
line = "「うふふっ、それはね～♪」"

[[dialogue]]
speaker = "マトイ"
# 「わあぁぁぁーーーっ！　ちょっと待って！　サーシャさん、ストップ！　ストォォォーーーップ！！！」
line = "「わあぁぁぁーーーっ！　ちょっと待って！　サーシャさん、ストップ！　ストォォォーーーップ！！！」"

[[dialogue]]
speaker = "unk"
# そんな風に、マトイが顔を赤くして、慌てる姿も可愛くて……うん、我ながらバカップルだなと思ってしまうのだった。
line = "そんな風に、マトイが顔を赤くして、慌てる姿も可愛くて……うん、我ながらバカップルだなと思ってしまうのだった。"
