[[dialogue]]
speaker = "unk"
# 第４話,ぎゅーってしたくなっちゃうんだ,P
line = "第４話,ぎゅーってしたくなっちゃうんだ,P"

[[dialogue]]
speaker = "エンジュ"
# 「魔王、頼みがある」
line = "「魔王、頼みがある」"

[[dialogue]]
speaker = "メテオラ"
# 「お願いしますだぞ！」
line = "「お願いしますだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「メテオラがなんでもかんでも壊さないよう、稽古をつけてやってくれないか。親や施設の先生には無理でも、魔王なら何とかできるかもしれない」
line = "「メテオラがなんでもかんでも壊さないよう、稽古をつけてやってくれないか。親や施設の先生には無理でも、魔王なら何とかできるかもしれない」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしも壊してばっかじゃダメだしなー。ドーナツ作る時も、べちゃべちゃにしちゃったしなー。次はひとりで作れるようになりたいぞ！」
line = "「あたしも壊してばっかじゃダメだしなー。ドーナツ作る時も、べちゃべちゃにしちゃったしなー。次はひとりで作れるようになりたいぞ！」"

[[dialogue]]
speaker = "unk"
# ２人からの提案には大賛成だ。
line = "２人からの提案には大賛成だ。"

[[dialogue]]
speaker = "unk"
# メテオラが力加減を覚えてくれれば、街中の物は壊されなくなるし、気軽に力仕事も頼めるようになるだろう。メリットは大きい。
line = "メテオラが力加減を覚えてくれれば、街中の物は壊されなくなるし、気軽に力仕事も頼めるようになるだろう。メリットは大きい。"

[[dialogue]]
speaker = "unk"
# というわけで、俺たち３人は地下トレーニング施設へやってきた。
line = "というわけで、俺たち３人は地下トレーニング施設へやってきた。"

[[dialogue]]
speaker = "メテオラ"
# 「よーし、トレーニングするぞー！　えいえいおー！」
line = "「よーし、トレーニングするぞー！　えいえいおー！」"

[[dialogue]]
speaker = "エンジュ"
# 「力を入れないようにする訓練なんだから、気合を入れるのも控えめにな」
line = "「力を入れないようにする訓練なんだから、気合を入れるのも控えめにな」"

[[dialogue]]
speaker = "メテオラ"
# 「そ、そうだな！　ぇ……ぇぃぇぃぉー」
line = "「そ、そうだな！　ぇ……ぇぃぇぃぉー」"

[[dialogue]]
speaker = "エンジュ"
# 「それじゃ魔王、メテオラと手合わせしてやってくれ。メテオラは力をセーブして戦うんだ」
line = "「それじゃ魔王、メテオラと手合わせしてやってくれ。メテオラは力をセーブして戦うんだ」"

[[dialogue]]
speaker = "メテオラ"
# 「せーぶ……せーぶだな……せーぶするぞ」
line = "「せーぶ……せーぶだな……せーぶするぞ」"

[[dialogue]]
speaker = "unk"
# 俺とメテオラは、しばらくの間、手加減しながら手合わせをしていたのだが──
line = "俺とメテオラは、しばらくの間、手加減しながら手合わせをしていたのだが──"

[[dialogue]]
speaker = "メテオラ"
# 「うぅぅ、守りを崩しきれないぞ！　さすがは魔王だな！　でゃああぁぁーっ！」
line = "「うぅぅ、守りを崩しきれないぞ！　さすがは魔王だな！　でゃああぁぁーっ！」"

[[dialogue]]
speaker = "エンジュ"
# 「待て、メテオラ、思いっきり力が入っている。セーブしろって言っただろ」
line = "「待て、メテオラ、思いっきり力が入っている。セーブしろって言っただろ」"

[[dialogue]]
speaker = "メテオラ"
# 「うわー、そうだったー！　魔王と戦ってると、どうしても力が入っちゃうぞー！」
line = "「うわー、そうだったー！　魔王と戦ってると、どうしても力が入っちゃうぞー！」"

[[dialogue]]
speaker = "エンジュ"
# 「魔王もちょっと本気になりかけてたな。メテオラが相手だと手加減し続けるのは難しいか？」
line = "「魔王もちょっと本気になりかけてたな。メテオラが相手だと手加減し続けるのは難しいか？」"

[[dialogue]]
speaker = "メテオラ"
# 「やっぱ無理かなー？　うぅ、ごめんだぞ……」
line = "「やっぱ無理かなー？　うぅ、ごめんだぞ……」"

[[dialogue]]
speaker = "エンジュ"
# 「魔王、手伝ってくれたのは感謝する。だが別の手を考えるか……」
line = "「魔王、手伝ってくれたのは感謝する。だが別の手を考えるか……」"

[[dialogue]]
speaker = "unk"
# 俺はまだ諦めるつもりはない
line = "俺はまだ諦めるつもりはない"

[[dialogue]]
speaker = "unk"
# 待って！
line = "待って！"

[[dialogue]]
speaker = "エンジュ"
# 「いいアイデアでもあるのか？」
line = "「いいアイデアでもあるのか？」"

[[dialogue]]
speaker = "unk"
# よし、メテオラ！　俺をハグするんだ！
line = "よし、メテオラ！　俺をハグするんだ！"

[[dialogue]]
speaker = "エンジュ"
# 「正気か！？　メテオラに抱きしめられたりしたら、全身がバラバラになるぞ！」
line = "「正気か！？　メテオラに抱きしめられたりしたら、全身がバラバラになるぞ！」"

[[dialogue]]
speaker = "メテオラ"
# 「そうだぞ！？　魔王の体、ぶっ壊れちゃうぞ！？」
line = "「そうだぞ！？　魔王の体、ぶっ壊れちゃうぞ！？」"

[[dialogue]]
speaker = "unk"
# 壊れない程度に加減する訓練だからね？
line = "壊れない程度に加減する訓練だからね？"

[[dialogue]]
speaker = "unk"
# 鍛えてるから大丈夫！
line = "鍛えてるから大丈夫！"

[[dialogue]]
speaker = "エンジュ"
# 「命知らずだな……」
line = "「命知らずだな……」"

[[dialogue]]
speaker = "メテオラ"
# 「こ、壊しちゃわないように、そーっとだな？　そーっと、そーっと……」
line = "「こ、壊しちゃわないように、そーっとだな？　そーっと、そーっと……」"

[[dialogue]]
speaker = "メテオラ"
# 「ぎゅーーーーっ！」
line = "「ぎゅーーーーっ！」"

[[dialogue]]
speaker = "unk"
# 背骨がーーーっ！？
line = "背骨がーーーっ！？"

[[dialogue]]
speaker = "unk"
# ぎゃーーっ！？
line = "ぎゃーーっ！？"

[[dialogue]]
speaker = "メテオラ"
# 「わーっ！　ごめんだぞー！」
line = "「わーっ！　ごめんだぞー！」"

[[dialogue]]
speaker = "エンジュ"
# 「言わんこっちゃない。メテオラは人との触れ合いに慣れていないからな」
line = "「言わんこっちゃない。メテオラは人との触れ合いに慣れていないからな」"

[[dialogue]]
speaker = "メテオラ"
# 「うぅ……どんな風に触ればいいのかわかんないんだ……好きなものほど、ぎゅーってしたくなっちゃうんだぞ……」
line = "「うぅ……どんな風に触ればいいのかわかんないんだ……好きなものほど、ぎゅーってしたくなっちゃうんだぞ……」"

[[dialogue]]
speaker = "unk"
# メテオラの生い立ちを聞いた限り、ハグをされたり、愛情を注いでもらった経験そのものが乏しいのかもしれない。なら──
line = "メテオラの生い立ちを聞いた限り、ハグをされたり、愛情を注いでもらった経験そのものが乏しいのかもしれない。なら──"

[[dialogue]]
speaker = "unk"
# おいで、メテオラ
line = "おいで、メテオラ"

[[dialogue]]
speaker = "メテオラ"
# 「うん？　なんだ？」
line = "「うん？　なんだ？」"

[[dialogue]]
speaker = "メテオラ"
# 「ひゃあっ……！？　魔王にギューってされてる……！？」
line = "「ひゃあっ……！？　魔王にギューってされてる……！？」"

[[dialogue]]
speaker = "エンジュ"
# 「なっ……！？」
line = "「なっ……！？」"

[[dialogue]]
speaker = "メテオラ"
# 「ふわぁ……魔王のギューは優しいな……？　優しいのにポカポカあったかくて……ホワッとするぞ」
line = "「ふわぁ……魔王のギューは優しいな……？　優しいのにポカポカあったかくて……ホワッとするぞ」"

[[dialogue]]
speaker = "メテオラ"
# 「そっか……わかったぞ……魔王のくらい、ソーッとギューして、ポカポカして、ホワッとすればいいんだな……？」
line = "「そっか……わかったぞ……魔王のくらい、ソーッとギューして、ポカポカして、ホワッとすればいいんだな……？」"

[[dialogue]]
speaker = "メテオラ"
# 「ぎゅ、ぎゅーっ……」
line = "「ぎゅ、ぎゅーっ……」"

[[dialogue]]
speaker = "メテオラ"
# 「こ、これなら大丈夫か、魔王……？」
line = "「こ、これなら大丈夫か、魔王……？」"

[[dialogue]]
speaker = "エンジュ"
# 「……ちょっと苦しそうだけど、大丈夫そうだな」
line = "「……ちょっと苦しそうだけど、大丈夫そうだな」"

[[dialogue]]
speaker = "メテオラ"
# 「ホントか……！　やったー！　あたしも優しいぎゅーができたぞー！」
line = "「ホントか……！　やったー！　あたしも優しいぎゅーができたぞー！」"

[[dialogue]]
speaker = "unk"
# くっきりと痕が残りそうなくらい強めのハグだけど、さっきより加減ができるようになっている。ゆっくりだけど、この分ならいつかは──
line = "くっきりと痕が残りそうなくらい強めのハグだけど、さっきより加減ができるようになっている。ゆっくりだけど、この分ならいつかは──"

[[dialogue]]
speaker = "メテオラ"
# 「魔王、ありがとな！　大好きだぞ！　ぎゅーーーーっ！」
line = "「魔王、ありがとな！　大好きだぞ！　ぎゅーーーーっ！」"

[[dialogue]]
speaker = "unk"
# 脊髄がーーーーっ！！
line = "脊髄がーーーーっ！！"

[[dialogue]]
speaker = "unk"
# んぎゃーーーっ！
line = "んぎゃーーーっ！"

[[dialogue]]
speaker = "メテオラ"
# 「わーーーっ！　ごめんだぞ、魔王ーーーっ！」
line = "「わーーーっ！　ごめんだぞ、魔王ーーーっ！」"

[[dialogue]]
speaker = "unk"
# 体を張った甲斐もあり、ほんの少～しだけ、メテオラは力加減というものを覚えられた……と思う。
line = "体を張った甲斐もあり、ほんの少～しだけ、メテオラは力加減というものを覚えられた……と思う。"
