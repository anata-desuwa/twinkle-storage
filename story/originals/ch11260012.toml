[[dialogue]]
speaker = "unk"
# 第２話,ＴＳ魔法少女計画,P
line = "第２話,ＴＳ魔法少女計画,P"

[[dialogue]]
speaker = "unk"
# サチとディーラックの幸運を巡る事件を終えて、少し経ったある日のこと。
line = "サチとディーラックの幸運を巡る事件を終えて、少し経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は良からぬ噂を聞いて、購買部へ勢いよく乗り込んだ――
line = "俺は良からぬ噂を聞いて、購買部へ勢いよく乗り込んだ――"

[[dialogue]]
speaker = "unk"
# 御用改めであるッ！！
line = "御用改めであるッ！！"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さん！？　何故ここに！？」
line = "「会長さん！？　何故ここに！？」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒ♪　バレてしまったカ」
line = "「フヒヒ♪　バレてしまったカ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「くっ……！　一体どこから情報が洩れて……」
line = "「くっ……！　一体どこから情報が洩れて……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「――え？　複数の生徒たちから、私たち２人がカフェテリアで怪しい会話をしながら、滅茶苦茶盛り上がってるのを見たって証言が寄せられた？」
line = "「――え？　複数の生徒たちから、私たち２人がカフェテリアで怪しい会話をしながら、滅茶苦茶盛り上がってるのを見たって証言が寄せられた？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あちゃ～！　あの時でしたか～！」
line = "「あちゃ～！　あの時でしたか～！」"

[[dialogue]]
speaker = "アニマ"
# 「<b>アンナ</b>はそれはもうテンションが上がってたからネ。フヒ♪」
line = "「<b>アンナ</b>はそれはもうテンションが上がってたからネ。フヒ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そりゃあ、会長さんを『ＴＳ魔法少女』に変身させるという案が、アニマさんとの共同制作なら実現可能となれば、テンションぶち上がっちゃいますよ！」
line = "「そりゃあ、会長さんを『ＴＳ魔法少女』に変身させるという案が、アニマさんとの共同制作なら実現可能となれば、テンションぶち上がっちゃいますよ！」"

[[dialogue]]
speaker = "unk"
# 変身しないよ！？
line = "変身しないよ！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「そう言うと思ったから、完成するまで隠してたんですよ！」
line = "「そう言うと思ったから、完成するまで隠してたんですよ！」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "サチ"
# 「お、お兄さんが、女の子に変身して魔法少女に……！？」
line = "「お、お兄さんが、女の子に変身して魔法少女に……！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、サチさん！　何かご用事ですか？」
line = "「あっ、サチさん！　何かご用事ですか？」"

[[dialogue]]
speaker = "サチ"
# 「は、はい。フォルトゥーナフォームの訓練を見てもらおうと思って、お願いしに来たんですけど……そしたら、購買部へ新撰組みたいに乗り込んで行くのを見かけて………」
line = "「は、はい。フォルトゥーナフォームの訓練を見てもらおうと思って、お願いしに来たんですけど……そしたら、購買部へ新撰組みたいに乗り込んで行くのを見かけて………」"

[[dialogue]]
speaker = "unk"
# サチはナシだと思うだろ！？
line = "サチはナシだと思うだろ！？"

[[dialogue]]
speaker = "サチ"
# 「た、確かにそうですね。常識的に考えれば、お兄さんが魔法少女に変身するのは、エッチなのでナシです！」
line = "「た、確かにそうですね。常識的に考えれば、お兄さんが魔法少女に変身するのは、エッチなのでナシです！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そんなぁ～！？　ヘレナさんに頼んだら、喜んで新フォームのデザインをしてくれることになってたのに～！」
line = "「そんなぁ～！？　ヘレナさんに頼んだら、喜んで新フォームのデザインをしてくれることになってたのに～！」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんノリノリなの！？
line = "ヘレナちゃんノリノリなの！？"

[[dialogue]]
speaker = "サチ"
# 「ですが……」
line = "「ですが……」"

[[dialogue]]
speaker = "unk"
# サチはこれまで見たこともない程、葛藤の表情を浮かべながら──
line = "サチはこれまで見たこともない程、葛藤の表情を浮かべながら──"

[[dialogue]]
speaker = "サチ"
# 「お兄さんが性別ごと魔法少女に変身したら、きっと似合うだろうなと思ってしまう自分もいるんです……！」
line = "「お兄さんが性別ごと魔法少女に変身したら、きっと似合うだろうなと思ってしまう自分もいるんです……！」"

[[dialogue]]
speaker = "unk"
# サチさん！？
line = "サチさん！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「……会長さん」
line = "「……会長さん」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私はかつて、ロストアイテムを自作していた時に、本当に作っていいのかと悩んだことがあります。その時、思ったんです」
line = "「私はかつて、ロストアイテムを自作していた時に、本当に作っていいのかと悩んだことがあります。その時、思ったんです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「――作らずに悩むより、作ってから後のことを考えればいいや……と」
line = "「――作らずに悩むより、作ってから後のことを考えればいいや……と」"

[[dialogue]]
speaker = "unk"
# やらかす科学者の思考！！！
line = "やらかす科学者の思考！！！"

[[dialogue]]
speaker = "unk"
# いやもう、実際にやらかし済みだけど！
line = "いやもう、実際にやらかし済みだけど！"

[[dialogue]]
speaker = "アニマ"
# 「アンナ」
line = "「アンナ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「アニマさん……？」
line = "「アニマさん……？」"

[[dialogue]]
speaker = "アニマ"
# 「我が親しき後輩の口癖を借りて、キミにこの言葉を送るヨ」
line = "「我が親しき後輩の口癖を借りて、キミにこの言葉を送るヨ」"

[[dialogue]]
speaker = "unk"
# アニマ先輩はぐっと親指を立てて、告げる。
line = "アニマ先輩はぐっと親指を立てて、告げる。"

[[dialogue]]
speaker = "アニマ"
# 「ノープロブレム」
line = "「ノープロブレム」"

[[dialogue]]
speaker = "トレジアンナ"
# 「オゥ……！　マイソウルフレンド！」
line = "「オゥ……！　マイソウルフレンド！」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ、ミートゥー♪」
line = "「フヒ、ミートゥー♪」"

[[dialogue]]
speaker = "unk"
# ピシパシグッグッ、と謎のハンドサインを交わす２人。
line = "ピシパシグッグッ、と謎のハンドサインを交わす２人。"

[[dialogue]]
speaker = "unk"
# なにこのやり取り！？
line = "なにこのやり取り！？"

[[dialogue]]
speaker = "アニマ"
# 「つまりは、技術の進歩とは、失敗を繰り返すことで生まれるということダ。フヒ♪」
line = "「つまりは、技術の進歩とは、失敗を繰り返すことで生まれるということダ。フヒ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「――会長さん！　どうかお願いします！　これは更なるフォームチェンジ技術発展の為にも、大事なプロセスなんですよ～！」
line = "「――会長さん！　どうかお願いします！　これは更なるフォームチェンジ技術発展の為にも、大事なプロセスなんですよ～！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「それに、会長さんが魔法少女になってくれたら、いい感じに５人揃って、魔法少女戦隊が完成して……ふふふっ♪」
line = "「それに、会長さんが魔法少女になってくれたら、いい感じに５人揃って、魔法少女戦隊が完成して……ふふふっ♪」"

[[dialogue]]
speaker = "unk"
# 絶対そっちが主目的だよね！？
line = "絶対そっちが主目的だよね！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、しまった。つい本音が……てへぺろ☆」
line = "「あっ、しまった。つい本音が……てへぺろ☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ちなみにですね～、トマルさんは、最初友人枠でいるところから、中盤に追加戦士として魔法少女になるパターンで～」
line = "「ちなみにですね～、トマルさんは、最初友人枠でいるところから、中盤に追加戦士として魔法少女になるパターンで～」"

[[dialogue]]
speaker = "unk"
# それはアリだな
line = "それはアリだな"

[[dialogue]]
speaker = "サチ"
# （アリなんだ……）
line = "（アリなんだ……）"

[[dialogue]]
speaker = "トレジアンナ"
# 「ですよね！　だから、会長さんも――」
line = "「ですよね！　だから、会長さんも――」"

[[dialogue]]
speaker = "unk"
# だが、認めん！！！
line = "だが、認めん！！！"

[[dialogue]]
speaker = "トレジアンナ"
# 「なんでですかぁ～～～っ！」
line = "「なんでですかぁ～～～っ！」"

[[dialogue]]
speaker = "unk"
# その後、俺の魔法少女フォーム計画についてはなんとか保留ということになったが――
line = "その後、俺の魔法少女フォーム計画についてはなんとか保留ということになったが――"

[[dialogue]]
speaker = "unk"
# 実現する日は来ないはずだ。きっと……多分。
line = "実現する日は来ないはずだ。きっと……多分。"
