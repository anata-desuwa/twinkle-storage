[[dialogue]]
speaker = "unk"
# 第３話,蘭美と初デート,P
line = "第３話,蘭美と初デート,P"

[[dialogue]]
speaker = "unk"
# 蘭美と顔を合わせることが多くなってきた、ある休日。俺は彼女に呼び出されて、街へやってきていた。
line = "蘭美と顔を合わせることが多くなってきた、ある休日。俺は彼女に呼び出されて、街へやってきていた。"

[[dialogue]]
speaker = "蘭美"
# 「きたわね。待っていたわよ、会長！」
line = "「きたわね。待っていたわよ、会長！」"

[[dialogue]]
speaker = "unk"
# かなり早く着いたと思ったのに
line = "かなり早く着いたと思ったのに"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ。――私が先に待ってて、驚いたって？」
line = "「ふふっ。――私が先に待ってて、驚いたって？」"

[[dialogue]]
speaker = "蘭美"
# 「私は最速のメイドだもの。身支度を速く整えるのは得意なのよ」
line = "「私は最速のメイドだもの。身支度を速く整えるのは得意なのよ」"

[[dialogue]]
speaker = "蘭美"
# 「さて、それじゃあ早速、事前に言っていた通り、初めてのデートといきましょうか♪」
line = "「さて、それじゃあ早速、事前に言っていた通り、初めてのデートといきましょうか♪」"

[[dialogue]]
speaker = "unk"
# 数日前――
line = "数日前――"

[[dialogue]]
speaker = "蘭美"
# 「会長、突然だけど、私とデートをしない？」
line = "「会長、突然だけど、私とデートをしない？」"

[[dialogue]]
speaker = "unk"
# 別にいいけど……って、デート！？
line = "別にいいけど……って、デート！？"

[[dialogue]]
speaker = "蘭美"
# 「そ。休日に男女２人で出かけましょう、ってお誘いよ。会長、まだ誰かと付き合っているわけじゃなかったわよね？」
line = "「そ。休日に男女２人で出かけましょう、ってお誘いよ。会長、まだ誰かと付き合っているわけじゃなかったわよね？」"

[[dialogue]]
speaker = "蘭美"
# 「――なんで急にって？　会長とはここ最近、親しくなってる気がしたし、そういうのもいいかなって」
line = "「――なんで急にって？　会長とはここ最近、親しくなってる気がしたし、そういうのもいいかなって」"

[[dialogue]]
speaker = "蘭美"
# 「ていうか、そんなに驚くこと？　男女で出かけるくらい、別に普通でしょ？　大学生がよく男女で合コンしてるじゃない。それと同じようなものよ」
line = "「ていうか、そんなに驚くこと？　男女で出かけるくらい、別に普通でしょ？　大学生がよく男女で合コンしてるじゃない。それと同じようなものよ」"

[[dialogue]]
speaker = "蘭美"
# 「まあ、私の場合は実家の事情も入ってるけど……」
line = "「まあ、私の場合は実家の事情も入ってるけど……」"

[[dialogue]]
speaker = "蘭美"
# 「――別に隠すことじゃないわ。説明しておくと、私が将来メイドを目指すことを許してもらう代わりに、両親と約束を交わしたのよ」
line = "「――別に隠すことじゃないわ。説明しておくと、私が将来メイドを目指すことを許してもらう代わりに、両親と約束を交わしたのよ」"

[[dialogue]]
speaker = "蘭美"
# 「将来結婚して幸せな家庭を築けるような、婿探しもちゃんとしておくようにって」
line = "「将来結婚して幸せな家庭を築けるような、婿探しもちゃんとしておくようにって」"

[[dialogue]]
speaker = "蘭美"
# 「私は貴族の１人娘だしね。いずれ羽宮家に戻って、跡取りは作らないといけないわ。両親の為にもね」
line = "「私は貴族の１人娘だしね。いずれ羽宮家に戻って、跡取りは作らないといけないわ。両親の為にもね」"

[[dialogue]]
speaker = "蘭美"
# 「それでまぁ、会長のことは男性として嫌いじゃないし？　２人で遊びに出かけてみるのもいいかなって思ったのよ」
line = "「それでまぁ、会長のことは男性として嫌いじゃないし？　２人で遊びに出かけてみるのもいいかなって思ったのよ」"

[[dialogue]]
speaker = "蘭美"
# 「それで……会長としては、どうなのかしら……？」
line = "「それで……会長としては、どうなのかしら……？」"

[[dialogue]]
speaker = "蘭美"
# 「…………いいの？　ふふっ♪」
line = "「…………いいの？　ふふっ♪」"

[[dialogue]]
speaker = "蘭美"
# 「じゃあ、決まりね♪」
line = "「じゃあ、決まりね♪」"

[[dialogue]]
speaker = "unk"
# そうして、蘭美から行きたいところがあると言われ、連れてこられたのは、ゲームセンターだった。
line = "そうして、蘭美から行きたいところがあると言われ、連れてこられたのは、ゲームセンターだった。"

[[dialogue]]
speaker = "蘭美"
# 「久しぶりにきたわ。私、実は対戦する系のゲームが好きなのよね♪」
line = "「久しぶりにきたわ。私、実は対戦する系のゲームが好きなのよね♪」"

[[dialogue]]
speaker = "蘭美"
# 「というわけで会長、なにか勝負しましょ！　レースゲームとか得意よ私♪」
line = "「というわけで会長、なにか勝負しましょ！　レースゲームとか得意よ私♪」"

[[dialogue]]
speaker = "蘭美"
# 「――このゲームの操作感覚はもうわかってきたわ。見せてあげるわ、この私のドライビングテクニックを！」
line = "「――このゲームの操作感覚はもうわかってきたわ。見せてあげるわ、この私のドライビングテクニックを！」"

[[dialogue]]
speaker = "蘭美"
# 「最速でかっ飛ばしていくわよ！　それっ！」
line = "「最速でかっ飛ばしていくわよ！　それっ！」"

[[dialogue]]
speaker = "蘭美"
# 「この速度でコーナーを曲がれるのかって？　むしろ遅くみえるくらいよ！　私、動体視力はすごくいいんだから！」
line = "「この速度でコーナーを曲がれるのかって？　むしろ遅くみえるくらいよ！　私、動体視力はすごくいいんだから！」"

[[dialogue]]
speaker = "蘭美"
# 「内側ギリギリのラインでドリフト決めてあげるから、覚悟なさい！　とりゃあっ！」
line = "「内側ギリギリのラインでドリフト決めてあげるから、覚悟なさい！　とりゃあっ！」"

[[dialogue]]
speaker = "蘭美"
# 「――ふふふっ！　イェーイ♪　私の勝ちね！」
line = "「――ふふふっ！　イェーイ♪　私の勝ちね！」"

[[dialogue]]
speaker = "蘭美"
# 「最速の景色は、やっぱり気持ちいいものだわ♪」
line = "「最速の景色は、やっぱり気持ちいいものだわ♪」"

[[dialogue]]
speaker = "蘭美"
# 「ふぅ♪　ゲームセンター、楽しかったわ！　やっぱり私は、ゲームは誰かと一緒にするのが好きね」
line = "「ふぅ♪　ゲームセンター、楽しかったわ！　やっぱり私は、ゲームは誰かと一緒にするのが好きね」"

[[dialogue]]
speaker = "蘭美"
# 「次は、ウィンドウショッピングでもしましょうか。それで、これはデートなわけだし――」
line = "「次は、ウィンドウショッピングでもしましょうか。それで、これはデートなわけだし――」"

[[dialogue]]
speaker = "蘭美"
# 「会長、手を繋いで歩いてみない？」
line = "「会長、手を繋いで歩いてみない？」"

[[dialogue]]
speaker = "蘭美"
# 「ふふっ、１度目のデートでは早いかもしれないわね。でも、私は何事も最速を目指す主義なの♪」
line = "「ふふっ、１度目のデートでは早いかもしれないわね。でも、私は何事も最速を目指す主義なの♪」"

[[dialogue]]
speaker = "蘭美"
# 「男女のスキンシップってやつを１つくらい試しておきたいと思ってね。……どうかしら？」
line = "「男女のスキンシップってやつを１つくらい試しておきたいと思ってね。……どうかしら？」"

[[dialogue]]
speaker = "蘭美"
# 「――ＯＫね♪　じゃあ、私が言い出しっぺだし……」
line = "「――ＯＫね♪　じゃあ、私が言い出しっぺだし……」"

[[dialogue]]
speaker = "unk"
# 蘭美が手を差し出す。俺はその手を握ったのだが――
line = "蘭美が手を差し出す。俺はその手を握ったのだが――"

[[dialogue]]
speaker = "蘭美"
# 「ぴゃっ！？」
line = "「ぴゃっ！？」"

[[dialogue]]
speaker = "蘭美"
# 「……い、いや、別になんでもないわ！　初めてだから、ちょっと驚いただけで……」
line = "「……い、いや、別になんでもないわ！　初めてだから、ちょっと驚いただけで……」"

[[dialogue]]
speaker = "unk"
# てっきり経験があるものだと思ってた
line = "てっきり経験があるものだと思ってた"

[[dialogue]]
speaker = "蘭美"
# 「あいにく、今日が人生初のデートよ。私、学園に来るまでは、メイドの修行に明け暮れてたし……」
line = "「あいにく、今日が人生初のデートよ。私、学園に来るまでは、メイドの修行に明け暮れてたし……」"

[[dialogue]]
speaker = "蘭美"
# 「――って、なに笑ってるのよ！　誰にだって、初めてはあるものでしょ！？」
line = "「――って、なに笑ってるのよ！　誰にだって、初めてはあるものでしょ！？」"

[[dialogue]]
speaker = "unk"
# いや、光栄だなと思って
line = "いや、光栄だなと思って"

[[dialogue]]
speaker = "蘭美"
# 「え……？　――初めての相手に貴方を選んだから？」
line = "「え……？　――初めての相手に貴方を選んだから？」"

[[dialogue]]
speaker = "蘭美"
# 「ふ、ふぅん。そう……」
line = "「ふ、ふぅん。そう……」"

[[dialogue]]
speaker = "蘭美"
# 「――初めてなら、焦らずゆっくり慣れていこうって？」
line = "「――初めてなら、焦らずゆっくり慣れていこうって？」"

[[dialogue]]
speaker = "蘭美"
# 「て、手を繋ぐくらい、すぐに慣れるから、別にそんな気を遣わなくたって……」
line = "「て、手を繋ぐくらい、すぐに慣れるから、別にそんな気を遣わなくたって……」"

[[dialogue]]
speaker = "蘭美"
# 「――も、もう、わかったわよ。そこまで言うなら……今日は貴方のペースに付き合ってあげるわ」
line = "「――も、もう、わかったわよ。そこまで言うなら……今日は貴方のペースに付き合ってあげるわ」"

[[dialogue]]
speaker = "unk"
# そう言って照れた顔で視線を逸らす蘭美を見て、可愛いと思ってしまう俺なのだった――
line = "そう言って照れた顔で視線を逸らす蘭美を見て、可愛いと思ってしまう俺なのだった――"
