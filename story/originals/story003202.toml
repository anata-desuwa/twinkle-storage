[[dialogue]]
speaker = "unk"
# 蜂だか蝶だかのように、ふらふらと甘い香りに惹かれ、学園内のカフェテリアに立ち寄る。
line = "蜂だか蝶だかのように、ふらふらと甘い香りに惹かれ、学園内のカフェテリアに立ち寄る。"

[[dialogue]]
speaker = "unk"
# 中では可愛らしいハートマークの装飾が飛び交っており、バレンタインデーが近づいているのを否が応でも感じさせられた。
line = "中では可愛らしいハートマークの装飾が飛び交っており、バレンタインデーが近づいているのを否が応でも感じさせられた。"

[[dialogue]]
speaker = "イレーナ"
# 「もう少し、ブランデーの量を増やしてもいいんじゃないかしら？　お酒の風味を強く感じられた方が、大人の恋人イベントっぽくならない？」
line = "「もう少し、ブランデーの量を増やしてもいいんじゃないかしら？　お酒の風味を強く感じられた方が、大人の恋人イベントっぽくならない？」"

[[dialogue]]
speaker = "シャロン"
# 「でも、お酒の風味が得意じゃない方もいらっしゃいますし、子どもたちにも配ることを考えると──あっ、会長さま」
line = "「でも、お酒の風味が得意じゃない方もいらっしゃいますし、子どもたちにも配ることを考えると──あっ、会長さま」"

[[dialogue]]
speaker = "unk"
# ２人ともその衣装は……？
line = "２人ともその衣装は……？"

[[dialogue]]
speaker = "イレーナ"
# 「新しく変身できるようになったバレンタインフォームよ。不本意ながら必要に迫られてね」
line = "「新しく変身できるようになったバレンタインフォームよ。不本意ながら必要に迫られてね」"

[[dialogue]]
speaker = "シャロン"
# 「私もイレーナさまにコツを教わって変身できるようになりました！」
line = "「私もイレーナさまにコツを教わって変身できるようになりました！」"

[[dialogue]]
speaker = "unk"
# 必要性？
line = "必要性？"

[[dialogue]]
speaker = "シャロン"
# 「実は教皇庁主催で、バレンタインイベントが催されることになりまして」
line = "「実は教皇庁主催で、バレンタインイベントが催されることになりまして」"

[[dialogue]]
speaker = "イレーナ"
# 「そのイベントを盛り上げろって教皇庁に言われて、イベントで配るお菓子を作ってるところなのよ。つまりこれも仕事ってわけ」
line = "「そのイベントを盛り上げろって教皇庁に言われて、イベントで配るお菓子を作ってるところなのよ。つまりこれも仕事ってわけ」"

[[dialogue]]
speaker = "シャロン"
# 「おや、意外そうな顔をされていますね、会長さま。確かに教皇庁にはお堅いイメージがあるかもしれません」
line = "「おや、意外そうな顔をされていますね、会長さま。確かに教皇庁にはお堅いイメージがあるかもしれません」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしも面食らったわ。教皇庁の外まで聞こえそうな、変な悲鳴まであげちゃったわよ」
line = "「あたしも面食らったわ。教皇庁の外まで聞こえそうな、変な悲鳴まであげちゃったわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「『リクリエで不安が多い世相だからこそ、愛を感じて安らぎを覚えてほしい』ってのが教皇庁の判断なんだって……だからって、ねぇ？」
line = "「『リクリエで不安が多い世相だからこそ、愛を感じて安らぎを覚えてほしい』ってのが教皇庁の判断なんだって……だからって、ねぇ？」"

[[dialogue]]
speaker = "unk"
# 不服そうだ
line = "不服そうだ"

[[dialogue]]
speaker = "イレーナ"
# 「不服も不服、大不服よ。教皇庁の命令だから、仕方な～くチョコにまみれてるの」
line = "「不服も不服、大不服よ。教皇庁の命令だから、仕方な～くチョコにまみれてるの」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさま、ダメですよ。チョコを作る時は笑顔じゃないと。嫌そうな顔をしていると苦くなっちゃいますよ」
line = "「イレーナさま、ダメですよ。チョコを作る時は笑顔じゃないと。嫌そうな顔をしていると苦くなっちゃいますよ」"

[[dialogue]]
speaker = "イレーナ"
# 「はいはい、ニッコニッコニッコ♪　美味しくな～れ、甘くな～れ……って、いつまでやればいいのよ？　これ何個作ればいいの？」
line = "「はいはい、ニッコニッコニッコ♪　美味しくな～れ、甘くな～れ……って、いつまでやればいいのよ？　これ何個作ればいいの？」"

[[dialogue]]
speaker = "シャロン"
# 「そうですね……イレーナさまの人気を考えれば、ざっと１０００個は必要かと」
line = "「そうですね……イレーナさまの人気を考えれば、ざっと１０００個は必要かと」"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ！？　なんでそうなるのよ！？」
line = "「はぁ！？　なんでそうなるのよ！？」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまは故郷イタリアだけでなく、流星市国でも聖女として老若男女に敬われ、慕われていますから、至極当然かと」
line = "「イレーナさまは故郷イタリアだけでなく、流星市国でも聖女として老若男女に敬われ、慕われていますから、至極当然かと」"

[[dialogue]]
speaker = "イレーナ"
# 「何よそれ……さすがに言いすぎでしょ……」
line = "「何よそれ……さすがに言いすぎでしょ……」"

[[dialogue]]
speaker = "シャロン"
# 「でも教皇庁からは、無理のない範囲で、と言われているのですよね？」
line = "「でも教皇庁からは、無理のない範囲で、と言われているのですよね？」"

[[dialogue]]
speaker = "イレーナ"
# 「言われてるけど、だからといってイベントに来た人を手ぶらで帰らせるわけにはいかないでしょ」
line = "「言われてるけど、だからといってイベントに来た人を手ぶらで帰らせるわけにはいかないでしょ」"

[[dialogue]]
speaker = "イレーナ"
# 「せっかくお菓子をもらいに来たのに、悲しい顔されるのはゴメンよ」
line = "「せっかくお菓子をもらいに来たのに、悲しい顔されるのはゴメンよ」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ……イレーナさまは流星市国のみなさまを愛されているのですね」
line = "「ふふ……イレーナさまは流星市国のみなさまを愛されているのですね」"

[[dialogue]]
speaker = "イレーナ"
# 「べ、別にそんなんじゃないわよ！　足りなくて文句が出たら、上司にくどくど言われるのは私なんだから、それが嫌なだけ！」
line = "「べ、別にそんなんじゃないわよ！　足りなくて文句が出たら、上司にくどくど言われるのは私なんだから、それが嫌なだけ！」"

[[dialogue]]
speaker = "unk"
# （イレーナらしいな）
line = "（イレーナらしいな）"

[[dialogue]]
speaker = "シャロン"
# （ですね。イレーナさまは相変わらず素直じゃないです）
line = "（ですね。イレーナさまは相変わらず素直じゃないです）"

[[dialogue]]
speaker = "イレーナ"
# 「とにかく数を揃えないとダメね。でも何を作るにしたって、助っ人が欲しいわ……」
line = "「とにかく数を揃えないとダメね。でも何を作るにしたって、助っ人が欲しいわ……」"

[[dialogue]]
speaker = "？？？"
# 「お邪魔いたします」
line = "「お邪魔いたします」"

[[dialogue]]
speaker = "イレーナ"
# 「あら、どちらさまでしょう？　私たちに何かご用でしょうか？」
line = "「あら、どちらさまでしょう？　私たちに何かご用でしょうか？」"

[[dialogue]]
speaker = "？？？"
# 「こちらからチョコの甘～い匂いと、とても強いバレンタインの波動を感じたものですから」
line = "「こちらからチョコの甘～い匂いと、とても強いバレンタインの波動を感じたものですから」"

[[dialogue]]
speaker = "？？？"
# 「ちょこっと覗いてみようかと思いまして。チョコだけに<emoji=heart04>」
line = "「ちょこっと覗いてみようかと思いまして。チョコだけに<emoji=heart04>」"

[[dialogue]]
speaker = "シャロン"
# 「バレンタインの……波動？」
line = "「バレンタインの……波動？」"

[[dialogue]]
speaker = "イレーナ"
# （あんたの知り合い？　なんかただならぬ気配を感じるんだけど……）
line = "（あんたの知り合い？　なんかただならぬ気配を感じるんだけど……）"

[[dialogue]]
speaker = "unk"
# いや、初対面だ
line = "いや、初対面だ"

[[dialogue]]
speaker = "ウルスラ"
# 「申し遅れました。私、流星学園３年生の──ウルスラ・バレンタインと申します」
line = "「申し遅れました。私、流星学園３年生の──ウルスラ・バレンタインと申します」"

[[dialogue]]
speaker = "ウルスラ"
# 「何やら難儀しているようにお見受けしますが、よろしければ私に、バレンタインのお手伝いをさせていただけませんか？」
line = "「何やら難儀しているようにお見受けしますが、よろしければ私に、バレンタインのお手伝いをさせていただけませんか？」"
