[[dialogue]]
speaker = "unk"
# 第０話,チナの決意,B
line = "第０話,チナの決意,B"

[[dialogue]]
speaker = "チナ"
# 「アルタイルの破壊に失敗しました……申し訳ありません、ルヴィネ会長……」
line = "「アルタイルの破壊に失敗しました……申し訳ありません、ルヴィネ会長……」"

[[dialogue]]
speaker = "unk"
# チナが傷ついた体を引きずり、苦々しい表情を浮かべて星徒会室に入ってくる。
line = "チナが傷ついた体を引きずり、苦々しい表情を浮かべて星徒会室に入ってくる。"

[[dialogue]]
speaker = "ルヴィネ"
# 「問題ないわ。今回の目的は威力偵察。アルタイルの様子を知ることができれば十分よ」
line = "「問題ないわ。今回の目的は威力偵察。アルタイルの様子を知ることができれば十分よ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「宣戦布告も、私の言った通りにしてくれてありがとう」
line = "「宣戦布告も、私の言った通りにしてくれてありがとう」"

[[dialogue]]
speaker = "ルヴィネ"
# 「この戦いが平行世界同士の生存競争であることを知れば、覚悟のないアルタイルの星騎士たちは、ためらいを感じることでしょう」
line = "「この戦いが平行世界同士の生存競争であることを知れば、覚悟のないアルタイルの星騎士たちは、ためらいを感じることでしょう」"

[[dialogue]]
speaker = "チナ"
# 「でも、多数の極星従騎を失ってしまいました。会長が女神様から賜った貴重な戦力を……」
line = "「でも、多数の極星従騎を失ってしまいました。会長が女神様から賜った貴重な戦力を……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それも大丈夫。アルタイルへの本格侵攻のために、女神様に補充をお願いしてきたわ」
line = "「それも大丈夫。アルタイルへの本格侵攻のために、女神様に補充をお願いしてきたわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「何よりチナが無事に帰ってきてくれて良かった。あなたは私の大事な星徒会役員なんだから」
line = "「何よりチナが無事に帰ってきてくれて良かった。あなたは私の大事な星徒会役員なんだから」"

[[dialogue]]
speaker = "チナ"
# 「……！　会長……！」
line = "「……！　会長……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それに言ったでしょう。失敗したなら正せばいい。最初から完全である必要はないと」
line = "「それに言ったでしょう。失敗したなら正せばいい。最初から完全である必要はないと」"

[[dialogue]]
speaker = "ルヴィネ"
# 「人はそうやって技術を、理論を……世界を進化させてきた。だから今があるの」
line = "「人はそうやって技術を、理論を……世界を進化させてきた。だから今があるの」"

[[dialogue]]
speaker = "unk"
# 失敗はより良き未来への糧となる──極星の会長がよく口にする言葉だ。
line = "失敗はより良き未来への糧となる──極星の会長がよく口にする言葉だ。"

[[dialogue]]
speaker = "チナ"
# 「ところで、副会長はいまどこに……？」
line = "「ところで、副会長はいまどこに……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……極秘任務の最中よ。彼女なら無事に戻ってくるわ」
line = "「……極秘任務の最中よ。彼女なら無事に戻ってくるわ」"

[[dialogue]]
speaker = "チナ"
# 「そ、そうですよね。あの人なら大丈夫ですよね……」
line = "「そ、そうですよね。あの人なら大丈夫ですよね……」"

[[dialogue]]
speaker = "チナ"
# 「それで、その……会長」
line = "「それで、その……会長」"

[[dialogue]]
speaker = "unk"
# 爪が食い込むほど、小さな拳を強く握るチナ。
line = "爪が食い込むほど、小さな拳を強く握るチナ。"

[[dialogue]]
speaker = "unk"
# 会長を見つめるその眼には、悲壮な覚悟が宿っている。
line = "会長を見つめるその眼には、悲壮な覚悟が宿っている。"

[[dialogue]]
speaker = "チナ"
# 「アタシにもっと力を下さい。もっと、もっと……アルタイルのやつらに絶対負けないように」
line = "「アタシにもっと力を下さい。もっと、もっと……アルタイルのやつらに絶対負けないように」"

[[dialogue]]
speaker = "ルヴィネ"
# 「駄目よ。あなたの身が持たないわ」
line = "「駄目よ。あなたの身が持たないわ」"

[[dialogue]]
speaker = "チナ"
# 「デネブを守るためなら本望です……！」
line = "「デネブを守るためなら本望です……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# チナの真剣な眼差しに押されるように、極星の会長が押し黙る。
line = "チナの真剣な眼差しに押されるように、極星の会長が押し黙る。"

[[dialogue]]
speaker = "unk"
# 険しい顔でしばし逡巡するも、その沈黙を振り払うようにはっきりと告げる。
line = "険しい顔でしばし逡巡するも、その沈黙を振り払うようにはっきりと告げる。"

[[dialogue]]
speaker = "ルヴィネ"
# 「わかったわ。あなたがそこまで言うなら止めはしない」
line = "「わかったわ。あなたがそこまで言うなら止めはしない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「デネブのためにあなたの命を捧げて、チナ」
line = "「デネブのためにあなたの命を捧げて、チナ」"

[[dialogue]]
speaker = "チナ"
# 「はい、任せてください！」
line = "「はい、任せてください！」"
