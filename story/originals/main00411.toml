[[dialogue]]
speaker = "unk"
# 第１３話,命脈のアルモタヘル,B
line = "第１３話,命脈のアルモタヘル,B"

[[dialogue]]
speaker = "アルモタヘル"
# 「ッヅヅ……ヅアアァァ……！」
line = "「ッヅヅ……ヅアアァァ……！」"

[[dialogue]]
speaker = "サーシャ"
# 「ふぅ……なんとかなったかしら？」
line = "「ふぅ……なんとかなったかしら？」"

[[dialogue]]
speaker = "ルリエル"
# 「ア、アナちゃんさんとの連携を試していなかったら危なかったです……！」
line = "「ア、アナちゃんさんとの連携を試していなかったら危なかったです……！」"

[[dialogue]]
speaker = "unk"
# 最後の一撃を受けて崩折れる堕天使。
line = "最後の一撃を受けて崩折れる堕天使。"

[[dialogue]]
speaker = "セーラ"
# 「！　これは──確か、前にも……」
line = "「！　これは──確か、前にも……」"

[[dialogue]]
speaker = "unk"
# 光の拡散が落ち着く。
line = "光の拡散が落ち着く。"

[[dialogue]]
speaker = "アルモタヘル"
# そこには、瘴気から解き放たれた天使の姿があった。
line = "そこには、瘴気から解き放たれた天使の姿があった。"

[[dialogue]]
speaker = "アルモタヘル"
# 「──苦労をかけた。星騎士の子らよ」
line = "「──苦労をかけた。星騎士の子らよ」"

[[dialogue]]
speaker = "ルリエル"
# 「！　正気に戻られたのですね……！」
line = "「！　正気に戻られたのですね……！」"

[[dialogue]]
speaker = "マトイ"
# 「ほっ……第二形態とかあったらどうしようかと思った……」
line = "「ほっ……第二形態とかあったらどうしようかと思った……」"

[[dialogue]]
speaker = "セーラ"
# 「うちら、前もあなたと同じような境遇の天使さんを見たことあるんだけど……？」
line = "「うちら、前もあなたと同じような境遇の天使さんを見たことあるんだけど……？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「<ruby=しか>然</ruby>り。察しの通り、我はフィーニスの塔を護りし守護天使が一柱──《命脈》のアルモタヘル」
line = "「<ruby>然<rt>しか</rt></ruby>り。察しの通り、我はフィーニスの塔を護りし守護天使が一柱──《命脈》のアルモタヘル」"

[[dialogue]]
speaker = "unk"
# 両翼を広げた守護天使アルモタヘルは、神々しいまでの存在感を放って君臨する。
line = "両翼を広げた守護天使アルモタヘルは、神々しいまでの存在感を放って君臨する。"

[[dialogue]]
speaker = "サーシャ"
# 「守護天使様って、普段はフィーニスの塔にいるんでしょうか……？」
line = "「守護天使様って、普段はフィーニスの塔にいるんでしょうか……？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「然り。だが守護天使はただの門番ではない。摂理の統治者だ」
line = "「然り。だが守護天使はただの門番ではない。摂理の統治者だ」"

[[dialogue]]
speaker = "マトイ"
# 「摂理の、統治者……？」
line = "「摂理の、統治者……？」"

[[dialogue]]
speaker = "unk"
# 聞き慣れない単語に戸惑う面々。
line = "聞き慣れない単語に戸惑う面々。"

[[dialogue]]
speaker = "unk"
# アルモタヘルはその困惑を斟酌することなく話を続けた。
line = "アルモタヘルはその困惑を斟酌することなく話を続けた。"

[[dialogue]]
speaker = "アルモタヘル"
# 「我らは女神の下に仕える全６柱の守護天使。我々はそれぞれ異なる摂理の管轄権を与えられ、塔を守ることによりその秩序を維持している」
line = "「我らは女神の下に仕える全６柱の守護天使。我々はそれぞれ異なる摂理の管轄権を与えられ、塔を守ることによりその秩序を維持している」"

[[dialogue]]
speaker = "アルモタヘル"
# 「瘴気に呑まれたことにより、不覚にも醜態を晒すこととなったが……本来であれば人の子の前に姿を見せることさえ禁じられている」
line = "「瘴気に呑まれたことにより、不覚にも醜態を晒すこととなったが……本来であれば人の子の前に姿を見せることさえ禁じられている」"

[[dialogue]]
speaker = "ルリエル"
# （前回のマグダレナさんに比べると、ずいぶん厳格そうなお方でありますね）
line = "（前回のマグダレナさんに比べると、ずいぶん厳格そうなお方でありますね）"

[[dialogue]]
speaker = "ソフィア"
# （クールですね）
line = "（クールですね）"

[[dialogue]]
speaker = "アルモタヘル"
# 「マグダレナか。奴も堕天していたとは……ふむ。やはり事態は<ruby=ひっぱく>逼迫</ruby>していると言わざるをえない」
line = "「マグダレナか。奴も堕天していたとは……ふむ。やはり事態は<ruby>逼迫<rt>ひっぱく</rt></ruby>していると言わざるをえない」"

[[dialogue]]
speaker = "ルリエル"
# 「ひええ、聞こえておりました！？」
line = "「ひええ、聞こえておりました！？」"

[[dialogue]]
speaker = "unk"
# ルリエルの小声も拾い、アルモタヘルは顔色ひとつ変えず続ける。
line = "ルリエルの小声も拾い、アルモタヘルは顔色ひとつ変えず続ける。"

[[dialogue]]
speaker = "アルモタヘル"
# 「マグダレナは“領域”を司る守護天使」
line = "「マグダレナは“領域”を司る守護天使」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そして我──守護天使アルモタヘルは“種族”を司る一柱だ」
line = "「そして我──守護天使アルモタヘルは“種族”を司る一柱だ」"

[[dialogue]]
speaker = "アナ"
# 「それが……摂理の統括、ということですね」
line = "「それが……摂理の統括、ということですね」"

[[dialogue]]
speaker = "unk"
# アルモタヘルは無言で首肯する。
line = "アルモタヘルは無言で首肯する。"

[[dialogue]]
speaker = "unk"
# ６柱の守護天使が司る摂理とは、三界すべてにまたがる共通の理であると語った。
line = "６柱の守護天使が司る摂理とは、三界すべてにまたがる共通の理であると語った。"

[[dialogue]]
speaker = "セーラ"
# 「それってつまり……アルモタヘルさんのおかげで三種族のバランスは保たれてる、みたいな？」
line = "「それってつまり……アルモタヘルさんのおかげで三種族のバランスは保たれてる、みたいな？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「然り。だが、リクリエは三界、三種族、その全ての均衡を崩して更地にする。その現象を前に我らは完全なる障害だ」
line = "「然り。だが、リクリエは三界、三種族、その全ての均衡を崩して更地にする。その現象を前に我らは完全なる障害だ」"

[[dialogue]]
speaker = "マトイ"
# 「だ、だからって堕天させられちゃうなんて……」
line = "「だ、だからって堕天させられちゃうなんて……」"

[[dialogue]]
speaker = "unk"
# 守護天使らが集うフィーニスの塔はいわば摂理の大黒柱。
line = "守護天使らが集うフィーニスの塔はいわば摂理の大黒柱。"

[[dialogue]]
speaker = "unk"
# その本丸を崩さんと迫り、また事実、危機に瀕させている此度のリクリエはやはりただ事ではないと語る。
line = "その本丸を崩さんと迫り、また事実、危機に瀕させている此度のリクリエはやはりただ事ではないと語る。"

[[dialogue]]
speaker = "アルモタヘル"
# 「解放してもらえたのは僥倖だが──今の我も、あくまで実体なき幻影にすぎない。本体は魔界の奥底に囚われている」
line = "「解放してもらえたのは僥倖だが──今の我も、あくまで実体なき幻影にすぎない。本体は魔界の奥底に囚われている」"

[[dialogue]]
speaker = "ソフィア"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "サーシャ"
# 「魔界……そうなのね」
line = "「魔界……そうなのね」"

[[dialogue]]
speaker = "unk"
# かつての守護天使マグダレナも同様の事態にあった。
line = "かつての守護天使マグダレナも同様の事態にあった。"

[[dialogue]]
speaker = "unk"
# 流星の面々はその意味を飲み込めたが……
line = "流星の面々はその意味を飲み込めたが……"

[[dialogue]]
speaker = "アルモタヘル"
# 「そして……ッ。どうやら、あちらでも干渉を受けているようだ」
line = "「そして……ッ。どうやら、あちらでも干渉を受けているようだ」"

[[dialogue]]
speaker = "マトイ"
# 「それって──攻撃されてるってこと……？」
line = "「それって──攻撃されてるってこと……？」"

[[dialogue]]
speaker = "ソフィア"
# 「守護天使さんを守るには、魔界の本体を救出しなくてはならないということですか？　それならそこはどこですか？」
line = "「守護天使さんを守るには、魔界の本体を救出しなくてはならないということですか？　それならそこはどこですか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「前者はその通りだが、後者については我にもわからぬ」
line = "「前者はその通りだが、後者については我にもわからぬ」"

[[dialogue]]
speaker = "unk"
# 冷静に受け答えるアルモタヘル──
line = "冷静に受け答えるアルモタヘル──"

[[dialogue]]
speaker = "unk"
# しかし彼女の存在感は次第に希薄となってゆき……
line = "しかし彼女の存在感は次第に希薄となってゆき……"

[[dialogue]]
speaker = "アルモタヘル"
# 「礼を言おう諸君。諸君らが務めを果たせし後、きっと我らも真の姿で見えることができるだろう」
line = "「礼を言おう諸君。諸君らが務めを果たせし後、きっと我らも真の姿で見えることができるだろう」"

[[dialogue]]
speaker = "セーラ"
# 「あー、消えるのはちょっと待ってくれるかな天使さん。うちらのフィオナ会長とクロトくん、ヴィーナスちゃんは結局どうしてるわけ？」
line = "「あー、消えるのはちょっと待ってくれるかな天使さん。うちらのフィオナ会長とクロトくん、ヴィーナスちゃんは結局どうしてるわけ？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「御子らのことか。彼らは今、“塔”の中で……」
line = "「御子らのことか。彼らは今、“塔”の中で……」"

[[dialogue]]
speaker = "unk"
# 守護天使アルモタヘルが言葉を紡ごうとする──その時だった。
line = "守護天使アルモタヘルが言葉を紡ごうとする──その時だった。"

[[dialogue]]
speaker = "マトイ"
# 「……？」
line = "「……？」"

[[dialogue]]
speaker = "ソフィア"
# 「なんでしょうか、この揺れは……」
line = "「なんでしょうか、この揺れは……」"

[[dialogue]]
speaker = "unk"
# わずかな震動が不気味に大地を揺らし続ける。
line = "わずかな震動が不気味に大地を揺らし続ける。"

[[dialogue]]
speaker = "unk"
# その後、誰の目にも明らかな異変が巻き起こった。
line = "その後、誰の目にも明らかな異変が巻き起こった。"

[[dialogue]]
speaker = "ルリエル"
# 「！？　夜に──」
line = "「！？　夜に──」"

[[dialogue]]
speaker = "マトイ"
# 「これって──！」
line = "「これって──！」"

[[dialogue]]
speaker = "セーラ"
# 「へえ……もしかしてコレが、星読のなんちゃらってやつかな？」
line = "「へえ……もしかしてコレが、星読のなんちゃらってやつかな？」"

[[dialogue]]
speaker = "サーシャ"
# 「正解。私たちがあの子の家来をこらしめちゃったから……怒っちゃったのかしら？」
line = "「正解。私たちがあの子の家来をこらしめちゃったから……怒っちゃったのかしら？」"

[[dialogue]]
speaker = "unk"
# 新星の三人には覚えのある、流星の四人には初めてとなる異常事態に不気味さはいっそう加速する。
line = "新星の三人には覚えのある、流星の四人には初めてとなる異常事態に不気味さはいっそう加速する。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "ソフィア"
# 「これは……！」
line = "「これは……！」"

[[dialogue]]
speaker = "サーシャ"
# 「異常な数のアステラ──ふふ、壮観ね。私が学園に入ってからもこんなのは初めて見るわ」
line = "「異常な数のアステラ──ふふ、壮観ね。私が学園に入ってからもこんなのは初めて見るわ」"

[[dialogue]]
speaker = "ユウリ"
# 「とんでもねー異常事態、ってか……」
line = "「とんでもねー異常事態、ってか……」"

[[dialogue]]
speaker = "unk"
# 戦いはまだ終わっていない。
line = "戦いはまだ終わっていない。"

[[dialogue]]
speaker = "unk"
# 弛緩しかけた気を引き締め、彼女たちは再び得物を手に取った。
line = "弛緩しかけた気を引き締め、彼女たちは再び得物を手に取った。"

[[dialogue]]
speaker = "アルモタヘル"
# 「──この体は限界のようだ。御子らはじきにこちらへ戻る、そう信じろ」
line = "「──この体は限界のようだ。御子らはじきにこちらへ戻る、そう信じろ」"

[[dialogue]]
speaker = "セーラ"
# 「はーい。ま、フィオナちゃん達なら大丈夫って信じてるけどね」
line = "「はーい。ま、フィオナちゃん達なら大丈夫って信じてるけどね」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮くん……」
line = "「緋宮くん……」"

[[dialogue]]
speaker = "unk"
# 全てを告げられぬまま、アルモタヘルの残影が消えていく。
line = "全てを告げられぬまま、アルモタヘルの残影が消えていく。"

[[dialogue]]
speaker = "unk"
# 終わりの始まりがその<ruby=らっぱ>喇叭</ruby>を鳴らそうとしていた。
line = "終わりの始まりがその<ruby>喇叭<rt>らっぱ</rt></ruby>を鳴らそうとしていた。"
