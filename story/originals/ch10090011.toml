[[dialogue]]
speaker = "unk"
# 第１話,副会長はギャル？,P
line = "第１話,副会長はギャル？,P"

[[dialogue]]
speaker = "セーラ"
# 「お、そこにいるのは……新星の会長さんじゃ～ん。元気してる～？」
line = "「お、そこにいるのは……新星の会長さんじゃ～ん。元気してる～？」"

[[dialogue]]
speaker = "セーラ"
# 「あ～、そういえばちゃんと自己紹介できてなかったっけ？　うち、桐原セーラ。流星の３年で星徒会の副会長してるよ」
line = "「あ～、そういえばちゃんと自己紹介できてなかったっけ？　うち、桐原セーラ。流星の３年で星徒会の副会長してるよ」"

[[dialogue]]
speaker = "セーラ"
# 「確か新星の会長さんはうちの会長とタメだから、１つ上だね。呼び方は何でもいいよ～。呼び捨てでもセーラ様でも、なんならセーラちゃんでも」
line = "「確か新星の会長さんはうちの会長とタメだから、１つ上だね。呼び方は何でもいいよ～。呼び捨てでもセーラ様でも、なんならセーラちゃんでも」"

[[dialogue]]
speaker = "unk"
# じゃあセーラさんで
line = "じゃあセーラさんで"

[[dialogue]]
speaker = "セーラ"
# 「はは、普通だ。おっけおっけー。よろしく～」
line = "「はは、普通だ。おっけおっけー。よろしく～」"

[[dialogue]]
speaker = "セーラ"
# 「あ、そうだ。ここで会ったのも何かの縁ってことで、買い物付き合ってくれない？　ネイルとかアクセとかいろいろ見たくてさ～」
line = "「あ、そうだ。ここで会ったのも何かの縁ってことで、買い物付き合ってくれない？　ネイルとかアクセとかいろいろ見たくてさ～」"

[[dialogue]]
speaker = "セーラ"
# 「おっけー？　やったっ。女子同士も楽しいけど、たまには男の子とショッピングしたかったんだよね～。レッツゴー！」
line = "「おっけー？　やったっ。女子同士も楽しいけど、たまには男の子とショッピングしたかったんだよね～。レッツゴー！」"

[[dialogue]]
speaker = "セーラ"
# 「んじゃ、まずはコスメから！　会長さんはどういう色がお好き？」
line = "「んじゃ、まずはコスメから！　会長さんはどういう色がお好き？」"

[[dialogue]]
speaker = "セーラ"
# 「ありがと～。ふむふむ、なるほど、新星の会長さんはナチュラルめのやつが好みっぽいね」
line = "「ありがと～。ふむふむ、なるほど、新星の会長さんはナチュラルめのやつが好みっぽいね」"

[[dialogue]]
speaker = "セーラ"
# 「ねぇねぇ、２人でお買い物してるとなんかデートみたいだね」
line = "「ねぇねぇ、２人でお買い物してるとなんかデートみたいだね」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、ビックリしちゃってかわい～。そんな慌てなくてもいいじゃん。年頃の男女がデートするのは普通のことなんだから」
line = "「あはは、ビックリしちゃってかわい～。そんな慌てなくてもいいじゃん。年頃の男女がデートするのは普通のことなんだから」"

[[dialogue]]
speaker = "セーラ"
# 「……あ、また照れてる。けっこうウブなんだー」
line = "「……あ、また照れてる。けっこうウブなんだー」"

[[dialogue]]
speaker = "セーラ"
# 「はははっ、からかってごめんってば。男の子と一緒なの珍しくて、ついね」
line = "「はははっ、からかってごめんってば。男の子と一緒なの珍しくて、ついね」"

[[dialogue]]
speaker = "セーラ"
# 「あ、うちのこと、副会長っぽくないって思ってるっしょ？」
line = "「あ、うちのこと、副会長っぽくないって思ってるっしょ？」"

[[dialogue]]
speaker = "セーラ"
# 「あはは、今ギクッてした。だいじょーぶ、だいじょーぶ、うちも自分でそう思ってるし」
line = "「あはは、今ギクッてした。だいじょーぶ、だいじょーぶ、うちも自分でそう思ってるし」"

[[dialogue]]
speaker = "セーラ"
# 「そういや、会長さんは前の会長に御前試合を挑まれて、それに勝って星徒会長になったんだっけ。どう？　驚いた？」
line = "「そういや、会長さんは前の会長に御前試合を挑まれて、それに勝って星徒会長になったんだっけ。どう？　驚いた？」"

[[dialogue]]
speaker = "セーラ"
# 「うんうん……だよねー。でもまぁ、なったからにはちゃんとやらないとだね」
line = "「うんうん……だよねー。でもまぁ、なったからにはちゃんとやらないとだね」"

[[dialogue]]
speaker = "セーラ"
# 「そうそう、付き合ってくれたお礼に……はい、さっき買ったリップクリームあげる。会長さん、さっきから唇渇き気味だし、カサカサだと切れちゃって痛いよ」
line = "「そうそう、付き合ってくれたお礼に……はい、さっき買ったリップクリームあげる。会長さん、さっきから唇渇き気味だし、カサカサだと切れちゃって痛いよ」"

[[dialogue]]
speaker = "セーラ"
# 「いろいろ色や香りが付いてるのもあるんだけど、無香料で男の人でも使いやすいやつ。良かったら使って」
line = "「いろいろ色や香りが付いてるのもあるんだけど、無香料で男の人でも使いやすいやつ。良かったら使って」"

[[dialogue]]
speaker = "unk"
# ありがとうございます
line = "ありがとうございます"

[[dialogue]]
speaker = "セーラ"
# 「うんうん、素直でよろしい」
line = "「うんうん、素直でよろしい」"

[[dialogue]]
speaker = "セーラ"
# 「せっかくだから何か食べよっか？　甘いものはへーき？　近くにオススメのお店が……あ、ちょい待ち」
line = "「せっかくだから何か食べよっか？　甘いものはへーき？　近くにオススメのお店が……あ、ちょい待ち」"

[[dialogue]]
speaker = "セーラ"
# 「おばあちゃーん、どこ行くとこ？」
line = "「おばあちゃーん、どこ行くとこ？」"

[[dialogue]]
speaker = "おばあさん"
# 「え？　あ、あのー……実は息子と待ち合わせをしていたのですが……」
line = "「え？　あ、あのー……実は息子と待ち合わせをしていたのですが……」"

[[dialogue]]
speaker = "セーラ"
# 「ふむふむ、なるほど……あ、場所はここからだと駅の反対か。そうだ、うちら向こう側に用事あるんで一緒に行きません？」
line = "「ふむふむ、なるほど……あ、場所はここからだと駅の反対か。そうだ、うちら向こう側に用事あるんで一緒に行きません？」"

[[dialogue]]
speaker = "unk"
# 荷物、持ちますよ
line = "荷物、持ちますよ"

[[dialogue]]
speaker = "セーラ"
# 「あ、怪しいものじゃないですよ。うちら、流星学園と新星学園の生徒なんです。ほら、今制服着てるでしょ」
line = "「あ、怪しいものじゃないですよ。うちら、流星学園と新星学園の生徒なんです。ほら、今制服着てるでしょ」"

[[dialogue]]
speaker = "おばあさん"
# 「あなたたちがあの……若いのにすごいのね。いつもありがとう」
line = "「あなたたちがあの……若いのにすごいのね。いつもありがとう」"

[[dialogue]]
speaker = "セーラ"
# 「おばあちゃん、星騎士のこと知ってるんだ。えへへ、こっちこそありがと～」
line = "「おばあちゃん、星騎士のこと知ってるんだ。えへへ、こっちこそありがと～」"

[[dialogue]]
speaker = "セーラ"
# 「ごめんね、結局お店遠くなっちゃった」
line = "「ごめんね、結局お店遠くなっちゃった」"

[[dialogue]]
speaker = "unk"
# 息子さんに会えて良かった
line = "息子さんに会えて良かった"

[[dialogue]]
speaker = "セーラ"
# 「そう言ってくれて良かった。荷物も持ってくれてありがとう」
line = "「そう言ってくれて良かった。荷物も持ってくれてありがとう」"

[[dialogue]]
speaker = "セーラ"
# 「優しそうなおばあちゃんだったし、普通に案内すると全力で断られそうだったからさ」
line = "「優しそうなおばあちゃんだったし、普通に案内すると全力で断られそうだったからさ」"

[[dialogue]]
speaker = "セーラ"
# 「さすが流星の副会長……って、はは、褒めても何も出ないぞー。なりたくてなった副会長でもないしね」
line = "「さすが流星の副会長……って、はは、褒めても何も出ないぞー。なりたくてなった副会長でもないしね」"

[[dialogue]]
speaker = "unk"
# セーラさんはどうして副会長に？
line = "セーラさんはどうして副会長に？"

[[dialogue]]
speaker = "セーラ"
# 「あ、それ聞いちゃう？」
line = "「あ、それ聞いちゃう？」"

[[dialogue]]
speaker = "セーラ"
# 「ジョーダンジョーダン。聞いちゃいけない話じゃないってば」
line = "「ジョーダンジョーダン。聞いちゃいけない話じゃないってば」"

[[dialogue]]
speaker = "セーラ"
# 「実はうち、前の星徒会からの居残り組なんだけど、代替わりした時に現会長のフィオナちゃんにお願いされてね」
line = "「実はうち、前の星徒会からの居残り組なんだけど、代替わりした時に現会長のフィオナちゃんにお願いされてね」"

[[dialogue]]
speaker = "セーラ"
# 「肩書が付くのあんま好きじゃないんだけど、フィオナちゃんに頼まれたら断れなくさ。まぁいっかーって引き受けた。ほんとそれだけ」
line = "「肩書が付くのあんま好きじゃないんだけど、フィオナちゃんに頼まれたら断れなくさ。まぁいっかーって引き受けた。ほんとそれだけ」"

[[dialogue]]
speaker = "セーラ"
# 「でも大雑把に言えば全生徒で２番目に偉いってことじゃん。ガラじゃないよねー、ホント。うちは軽い人間だから、もっと軽く扱ってほしいわけ」
line = "「でも大雑把に言えば全生徒で２番目に偉いってことじゃん。ガラじゃないよねー、ホント。うちは軽い人間だから、もっと軽く扱ってほしいわけ」"

[[dialogue]]
speaker = "unk"
# 俺も副会長にふさわしいと思います
line = "俺も副会長にふさわしいと思います"

[[dialogue]]
speaker = "セーラ"
# 「そっかー、新星の会長さんもそう思うのかー。それならもっと自信もっていいかもね」
line = "「そっかー、新星の会長さんもそう思うのかー。それならもっと自信もっていいかもね」"

[[dialogue]]
speaker = "セーラ"
# 「じゃあ改めて甘い物を食べに……と行きたいところだけど、来た道戻るには微妙に遠いか」
line = "「じゃあ改めて甘い物を食べに……と行きたいところだけど、来た道戻るには微妙に遠いか」"

[[dialogue]]
speaker = "セーラ"
# 「あ、おばあちゃんからもらったおまんじゅうあるんだった。じゃあ、おまんじゅう一緒に食べよっか」
line = "「あ、おばあちゃんからもらったおまんじゅうあるんだった。じゃあ、おまんじゅう一緒に食べよっか」"

[[dialogue]]
speaker = "セーラ"
# 「はむ……ん～、あま～い♪　ふふっ、情けは人のためならずってやつだね」
line = "「はむ……ん～、あま～い♪　ふふっ、情けは人のためならずってやつだね」"
