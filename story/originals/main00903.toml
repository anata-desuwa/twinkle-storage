[[dialogue]]
speaker = "unk"
# 第３話,霊力,B
line = "第３話,霊力,B"

[[dialogue]]
speaker = "マグダレナ"
# 「──なるほど。得体の知れない力を使ったと」
line = "「──なるほど。得体の知れない力を使ったと」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。あれは明らかに、私たちの星術とは異なる摂理で動いていました」
line = "「はい。あれは明らかに、私たちの星術とは異なる摂理で動いていました」"

[[dialogue]]
speaker = "フィオナ"
# 「守護天使のあなたなら、何か思い当たる節はないでしょうか──マグダレナ様」
line = "「守護天使のあなたなら、何か思い当たる節はないでしょうか──マグダレナ様」"

[[dialogue]]
speaker = "unk"
# クロトとセイファートが相まみえていたその頃──星徒会室の面々は、マグダレナに意見を仰いでいた。
line = "クロトとセイファートが相まみえていたその頃──星徒会室の面々は、マグダレナに意見を仰いでいた。"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ。心当たりがあります。いくつか」
line = "「ええ。心当たりがあります。いくつか」"

[[dialogue]]
speaker = "マグダレナ"
# 「まずその『黒騎士』が操ったという力は──恐らく、霊力」
line = "「まずその『黒騎士』が操ったという力は──恐らく、霊力」"

[[dialogue]]
speaker = "マトイ"
# 「霊、力……？」
line = "「霊、力……？」"

[[dialogue]]
speaker = "ルリエル"
# 「……聞き覚えがあるような」
line = "「……聞き覚えがあるような」"

[[dialogue]]
speaker = "アナ"
# 「三千年前──世界を救った『クルセイダース』が用いたといわれる力ですね」
line = "「三千年前──世界を救った『クルセイダース』が用いたといわれる力ですね」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。星の力が存在しない当時、彼らは霊力という機構を活かして勇敢に戦いました」
line = "「はい。星の力が存在しない当時、彼らは霊力という機構を活かして勇敢に戦いました」"

[[dialogue]]
speaker = "マグダレナ"
# 「その結果、以前のリクリエを打ち払うことができたというのもまた……皆さんが知っての通り」
line = "「その結果、以前のリクリエを打ち払うことができたというのもまた……皆さんが知っての通り」"

[[dialogue]]
speaker = "ユウリ"
# 「？　だけどよ、そいつはもう残ってないんじゃなかったのか？」
line = "「？　だけどよ、そいつはもう残ってないんじゃなかったのか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「その通りです。一度、リクリエを退けた霊力は、世界の働きによってその存在ごと失われました」
line = "「その通りです。一度、リクリエを退けた霊力は、世界の働きによってその存在ごと失われました」"

[[dialogue]]
speaker = "セーラ"
# 「リクリエさんにとって都合が悪い力だから──ってことだね～」
line = "「リクリエさんにとって都合が悪い力だから──ってことだね～」"

[[dialogue]]
speaker = "マグダレナ"
# 「皆さんが用いている『星力』は──失われた霊力に代わり、女神テルルがこの時代へ授けたものです」
line = "「皆さんが用いている『星力』は──失われた霊力に代わり、女神テルルがこの時代へ授けたものです」"

[[dialogue]]
speaker = "マグダレナ"
# 「どちらも元はリクリエに対抗する力。目的としては同じものです」
line = "「どちらも元はリクリエに対抗する力。目的としては同じものです」"

[[dialogue]]
speaker = "アナ"
# 「人は剣を失った代わりに、槍を手にした……そんなところでしょうか」
line = "「人は剣を失った代わりに、槍を手にした……そんなところでしょうか」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ、そう言い換えても構いませんね」
line = "「ふふ、そう言い換えても構いませんね」"

[[dialogue]]
speaker = "ソフィア"
# 「そう考えると──余計に相手の不気味さが際立ちます」
line = "「そう考えると──余計に相手の不気味さが際立ちます」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。あの黒騎士は──何らかの手段で失われたはずの霊力を使っている……」
line = "「ええ。あの黒騎士は──何らかの手段で失われたはずの霊力を使っている……」"

[[dialogue]]
speaker = "セーラ"
# 「星術っぽい気配も感じなかったかな」
line = "「星術っぽい気配も感じなかったかな」"

[[dialogue]]
speaker = "サーシャ"
# 「その意味じゃ──あのアポロちゃん以上に特殊な相手ね」
line = "「その意味じゃ──あのアポロちゃん以上に特殊な相手ね」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ。ですが私の知る限りただひとつ──現代においても霊力を扱うことのできる『器』が存在します」
line = "「ええ。ですが私の知る限りただひとつ──現代においても霊力を扱うことのできる『器』が存在します」"

[[dialogue]]
speaker = "ルリエル"
# 「それって──？」
line = "「それって──？」"

[[dialogue]]
speaker = "マグダレナ"
# 「魔王──そう呼ばれた存在の系譜です」
line = "「魔王──そう呼ばれた存在の系譜です」"

[[dialogue]]
speaker = "unk"
# ──星徒会室へ戻ってみると、そこにはマグダレナさん含め勢ぞろいだった。
line = "──星徒会室へ戻ってみると、そこにはマグダレナさん含め勢ぞろいだった。"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長──ど、泥だらけですけれど、大丈夫ですか？」
line = "「緋宮会長──ど、泥だらけですけれど、大丈夫ですか？」"

[[dialogue]]
speaker = "クロト"
# 「はは……いや、少し稽古をつけてもらっててさ」
line = "「はは……いや、少し稽古をつけてもらっててさ」"

[[dialogue]]
speaker = "アナ"
# 「……星力の消耗量から言って、ただ事ではない。何があったんですか？」
line = "「……星力の消耗量から言って、ただ事ではない。何があったんですか？」"

[[dialogue]]
speaker = "クロト"
# 「──少し……な」
line = "「──少し……な」"

[[dialogue]]
speaker = "クロト"
# 「──ぐっ……！」
line = "「──ぐっ……！」"

[[dialogue]]
speaker = "セイファート"
# 「──まだまだ、青いな」
line = "「──まだまだ、青いな」"

[[dialogue]]
speaker = "unk"
# ──ひんやりとした剣刃が俺の首元に添えられていた。
line = "──ひんやりとした剣刃が俺の首元に添えられていた。"

[[dialogue]]
speaker = "クロト"
# （一瞬──届いたと、思ったのに……）
line = "（一瞬──届いたと、思ったのに……）"

[[dialogue]]
speaker = "unk"
# ようやく彼の太刀さばきにも目が慣れてきて、こちらの星術がかすり始めたと思いきや……
line = "ようやく彼の太刀さばきにも目が慣れてきて、こちらの星術がかすり始めたと思いきや……"

[[dialogue]]
speaker = "unk"
# こちらが攻め急ぐのを見透かしたように、前もって踏み込みの位置に切り返しが置かれていた。
line = "こちらが攻め急ぐのを見透かしたように、前もって踏み込みの位置に切り返しが置かれていた。"

[[dialogue]]
speaker = "クロト"
# 「……完敗です。はっ……この体たらくじゃ……あの黒騎士に敵うほどの力は、俺にはまだ……」
line = "「……完敗です。はっ……この体たらくじゃ……あの黒騎士に敵うほどの力は、俺にはまだ……」"

[[dialogue]]
speaker = "セイファート"
# 「……勘違いをするな。青いと言ったのは、その実力に対してではない」
line = "「……勘違いをするな。青いと言ったのは、その実力に対してではない」"

[[dialogue]]
speaker = "クロト"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "セイファート"
# 「私はただ──君の焦る心を刈り取ったにすぎない。一辺倒な攻め口と、迷いの多い足さばきをな」
line = "「私はただ──君の焦る心を刈り取ったにすぎない。一辺倒な攻め口と、迷いの多い足さばきをな」"

[[dialogue]]
speaker = "クロト"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "unk"
# 俺の立ち回りはあまりにも浅はかだった。
line = "俺の立ち回りはあまりにも浅はかだった。"

[[dialogue]]
speaker = "unk"
# 目の前の敵に打ち勝たねばという一心で、気づけば突貫を繰り返していた。そんなことにも今さら気づかされた。
line = "目の前の敵に打ち勝たねばという一心で、気づけば突貫を繰り返していた。そんなことにも今さら気づかされた。"

[[dialogue]]
speaker = "セイファート"
# 「思い出せ。君はこの新星学園を導く、星徒会長なのだ。今のそれがリーダーにふさわしい姿か？」
line = "「思い出せ。君はこの新星学園を導く、星徒会長なのだ。今のそれがリーダーにふさわしい姿か？」"

[[dialogue]]
speaker = "セイファート"
# 「今の君の背中に、星徒会のメンバーが、新星の全<ruby=スターナイト>星騎士</ruby>たちがついてきてくれると思うか？」
line = "「今の君の背中に、星徒会のメンバーが、新星の全<ruby>星騎士<rt>スターナイト</rt></ruby>たちがついてきてくれると思うか？」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "セイファート"
# 「無論──その真摯な<ruby=がむしゃら>我武者羅</ruby>さ全てが悪いとは思わない。大事なのは、己を冷静にコントロールすることだ」
line = "「無論──その真摯な<ruby>我武者羅<rt>がむしゃら</rt></ruby>さ全てが悪いとは思わない。大事なのは、己を冷静にコントロールすることだ」"

[[dialogue]]
speaker = "セイファート"
# 「上に立つ者は、常にその資質を求められる──仲間を信用しているのならなおさらな」
line = "「上に立つ者は、常にその資質を求められる──仲間を信用しているのならなおさらな」"

[[dialogue]]
speaker = "セイファート"
# 「もっとも……こんな説教をしてしまう私も、まだまだ青いか」
line = "「もっとも……こんな説教をしてしまう私も、まだまだ青いか」"

[[dialogue]]
speaker = "クロト"
# 「学園……長……」
line = "「学園……長……」"

[[dialogue]]
speaker = "unk"
# 彼はそう自嘲気味に笑い、去っていった……。
line = "彼はそう自嘲気味に笑い、去っていった……。"

[[dialogue]]
speaker = "クロト"
# （まだまだ学園長の言うとおりに出来てるとは思えないけれど、あるべき姿の指標は得られた……と思う）
line = "（まだまだ学園長の言うとおりに出来てるとは思えないけれど、あるべき姿の指標は得られた……と思う）"

[[dialogue]]
speaker = "アナ"
# 「ふむ。何やら会長なりに、得られるものがあった様子」
line = "「ふむ。何やら会長なりに、得られるものがあった様子」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっとだけ、いつもの調子が戻ってきた……かな？」
line = "「ちょっとだけ、いつもの調子が戻ってきた……かな？」"

[[dialogue]]
speaker = "クロト"
# 「いつもの調子……か。そうだといいんだけど、実際はそうじゃないと思う。今だって、気持ちが急いて仕方ないから……」
line = "「いつもの調子……か。そうだといいんだけど、実際はそうじゃないと思う。今だって、気持ちが急いて仕方ないから……」"

[[dialogue]]
speaker = "unk"
# 焦りは今も拭えない。
line = "焦りは今も拭えない。"

[[dialogue]]
speaker = "unk"
# ──<ruby=がむしゃら>我武者羅</ruby>なのは悪いことではない。
line = "──<ruby>我武者羅<rt>がむしゃら</rt></ruby>なのは悪いことではない。"

[[dialogue]]
speaker = "unk"
# ──大事なのは、焦りもコントロールして冷静さを保つことだ。
line = "──大事なのは、焦りもコントロールして冷静さを保つことだ。"

[[dialogue]]
speaker = "unk"
# 熱さと冷たさ、両方を心に備えるなんて矛盾している。だけどきっと、それを成り立たせることこそが、リーダーに求められるものなんだ。
line = "熱さと冷たさ、両方を心に備えるなんて矛盾している。だけどきっと、それを成り立たせることこそが、リーダーに求められるものなんだ。"

[[dialogue]]
speaker = "unk"
# 今はそれを完璧にできなくとも、そこを目指して進むしかない。
line = "今はそれを完璧にできなくとも、そこを目指して進むしかない。"

[[dialogue]]
speaker = "クロト"
# 「──ヴィーナスは強い。こっちも闇雲に足掻くんじゃなく、今ある時間を有効に使って次の手を考えないと」
line = "「──ヴィーナスは強い。こっちも闇雲に足掻くんじゃなく、今ある時間を有効に使って次の手を考えないと」"

[[dialogue]]
speaker = "unk"
# 半分以上、自分に言い聞かせるように宣言する。
line = "半分以上、自分に言い聞かせるように宣言する。"

[[dialogue]]
speaker = "サーシャ"
# 「うんうん。さすが会長くんね」
line = "「うんうん。さすが会長くんね」"

[[dialogue]]
speaker = "クロト"
# 「それで──マグダレナさんを呼んで、何の話をしてたんだ？」
line = "「それで──マグダレナさんを呼んで、何の話をしてたんだ？」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。ちょうど今、会長さん達の話になったところなんです」
line = "「はい。ちょうど今、会長さん達の話になったところなんです」"

[[dialogue]]
speaker = "クロト"
# 「俺……たち？」
line = "「俺……たち？」"

[[dialogue]]
speaker = "アナ"
# 「はい。霊力を操る器──それが魔王の血統だとか」
line = "「はい。霊力を操る器──それが魔王の血統だとか」"

[[dialogue]]
speaker = "マグダレナ"
# 「……軽くお話しましょうか」
line = "「……軽くお話しましょうか」"

[[dialogue]]
speaker = "unk"
# マグダレナさんの口から、黒騎士の使っていた『霊力』について話を聞いた。
line = "マグダレナさんの口から、黒騎士の使っていた『霊力』について話を聞いた。"

[[dialogue]]
speaker = "クロト"
# 「──なるほど。黒騎士の得体の知れない力は、霊力だったのか」
line = "「──なるほど。黒騎士の得体の知れない力は、霊力だったのか」"

[[dialogue]]
speaker = "アナ"
# 「はい。本来は、クルセイダースの時代に失われたもののはずですが……魔王の系譜なら例外的に操れると」
line = "「はい。本来は、クルセイダースの時代に失われたもののはずですが……魔王の系譜なら例外的に操れると」"

[[dialogue]]
speaker = "サーシャ"
# 「てことはー、会長くん達にも同じ力が備わってたり？」
line = "「てことはー、会長くん達にも同じ力が備わってたり？」"

[[dialogue]]
speaker = "クロト"
# 「意識したことはありませんが……」
line = "「意識したことはありませんが……」"

[[dialogue]]
speaker = "unk"
# ただ、御前試合の時に『覚醒』したことは思い出す。
line = "ただ、御前試合の時に『覚醒』したことは思い出す。"

[[dialogue]]
speaker = "unk"
# あの時にあふれた得体の知れない力──あれは今思えば、星力とはまた別のベクトルも混じっていたかもしれない。
line = "あの時にあふれた得体の知れない力──あれは今思えば、星力とはまた別のベクトルも混じっていたかもしれない。"

[[dialogue]]
speaker = "セーラ"
# 「ってか……魔王の血統ってことなら、フィオナちゃんのご両親も同じ感じなの？」
line = "「ってか……魔王の血統ってことなら、フィオナちゃんのご両親も同じ感じなの？」"

[[dialogue]]
speaker = "マグダレナ"
# 「いえ。そうとは限りません」
line = "「いえ。そうとは限りません」"

[[dialogue]]
speaker = "マグダレナ"
# 「魔王の系譜は隔世遺伝──脈々と受け継がれていく中で……時折、極めて濃度の高い個体が生まれる。と思ったほうがよいでしょう」
line = "「魔王の系譜は隔世遺伝──脈々と受け継がれていく中で……時折、極めて濃度の高い個体が生まれる。と思ったほうがよいでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。実際──私の父も告げていました。自分に魔王の資質はないと」
line = "「はい。実際──私の父も告げていました。自分に魔王の資質はないと」"

[[dialogue]]
speaker = "ソフィア"
# 「フィオナ会長のお父様……つまりは、流星教皇さま……」
line = "「フィオナ会長のお父様……つまりは、流星教皇さま……」"

[[dialogue]]
speaker = "フィオナ"
# 「だからこそ父は──私たち姉妹に期待していました。私たち双子には、魔王の血がしかと眠っているからと」
line = "「だからこそ父は──私たち姉妹に期待していました。私たち双子には、魔王の血がしかと眠っているからと」"

[[dialogue]]
speaker = "unk"
# 星見家には元々、月の壁画を通じて正しい『魔王』観が伝わっていた──
line = "星見家には元々、月の壁画を通じて正しい『魔王』観が伝わっていた──"

[[dialogue]]
speaker = "unk"
# だからこそ星見姉妹にその資質があったことは、恐らく喜ばしいこととして歓迎されたのだろう。
line = "だからこそ星見姉妹にその資質があったことは、恐らく喜ばしいこととして歓迎されたのだろう。"

[[dialogue]]
speaker = "サーシャ"
# 「じゃあ、会長くんのお母さん……リノさんも、魔王じゃないんだ」
line = "「じゃあ、会長くんのお母さん……リノさんも、魔王じゃないんだ」"

[[dialogue]]
speaker = "クロト"
# 「はは……母さんはそんなガラじゃないですよ」
line = "「はは……母さんはそんなガラじゃないですよ」"

[[dialogue]]
speaker = "unk"
# それに──そもそものことを言えば、俺と母さんは血が繋がっているわけじゃない。
line = "それに──そもそものことを言えば、俺と母さんは血が繋がっているわけじゃない。"

[[dialogue]]
speaker = "unk"
# とはいえ、今に切り出すことでもないので黙っていた。
line = "とはいえ、今に切り出すことでもないので黙っていた。"

[[dialogue]]
speaker = "アナ"
# 「魔王の末裔だけは霊力が使える──と。平たく言えばそういうことですか」
line = "「魔王の末裔だけは霊力が使える──と。平たく言えばそういうことですか」"

[[dialogue]]
speaker = "マトイ"
# 「でも……本当なのかな。三千年前に消えちゃった力なんでしょ？　それなのに……」
line = "「でも……本当なのかな。三千年前に消えちゃった力なんでしょ？　それなのに……」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ──間違いないニャ。<b>魔王</b>の器というのは『霊力』と『魔力』。その身に双方を宿すものだからニャン」
line = "「ニャ──間違いないニャ。<b>魔王</b>の器というのは『霊力』と『魔力』。その身に双方を宿すものだからニャン」"

[[dialogue]]
speaker = "unk"
# ひょっこりと。
line = "ひょっこりと。"

[[dialogue]]
speaker = "unk"
# フィオナの肩から顔を出したニャリオンが、堂々と腕を組んで宣言した。
line = "フィオナの肩から顔を出したニャリオンが、堂々と腕を組んで宣言した。"

[[dialogue]]
speaker = "ソフィア"
# 「魔力って……」
line = "「魔力って……」"

[[dialogue]]
speaker = "ユウリ"
# 「あの『魔女』たちが使ってたヤツだろ？　デタラメ言うなよアホネコ」
line = "「あの『魔女』たちが使ってたヤツだろ？　デタラメ言うなよアホネコ」"

[[dialogue]]
speaker = "ニャリオン"
# 「デタラメではないニャン！　これにはれっきとした根拠があるニャン」
line = "「デタラメではないニャン！　これにはれっきとした根拠があるニャン」"

[[dialogue]]
speaker = "ユウリ"
# 「根拠だあ？」
line = "「根拠だあ？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ。ニャぜニャら三千年前の魔王もまた──霊力と魔力を操っていたからニャン！」
line = "「そうニャ。ニャぜニャら三千年前の魔王もまた──霊力と魔力を操っていたからニャン！」"

[[dialogue]]
speaker = "ソフィア"
# 「随分、見てきたかのように語りますね」
line = "「随分、見てきたかのように語りますね」"

[[dialogue]]
speaker = "アナ"
# 「マグダレナさん。ニャリオンが言っているのは……」
line = "「マグダレナさん。ニャリオンが言っているのは……」"

[[dialogue]]
speaker = "マグダレナ"
# 「……真実です。守護天使の認識とも合致します」
line = "「……真実です。守護天使の認識とも合致します」"

[[dialogue]]
speaker = "ユウリ"
# 「デタラメじゃないってのか──？」
line = "「デタラメじゃないってのか──？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャッニャッニャッ。吾輩に間違いはないニャ」
line = "「ニャッニャッニャッ。吾輩に間違いはないニャ」"

[[dialogue]]
speaker = "ルリエル"
# 「なんでそんなこと知ってるんです……？」
line = "「なんでそんなこと知ってるんです……？」"

[[dialogue]]
speaker = "ソフィア"
# 「というか、今の今までずいぶんとお静かでしたね。ニャリオンさん」
line = "「というか、今の今までずいぶんとお静かでしたね。ニャリオンさん」"

[[dialogue]]
speaker = "フィオナ"
# 「ニャリオンは昨日からすっかり塞ぎ込んでいました。落ち込んでいたものかと思ったのですが……」
line = "「ニャリオンは昨日からすっかり塞ぎ込んでいました。落ち込んでいたものかと思ったのですが……」"

[[dialogue]]
speaker = "ニャリオン"
# 「ご心配をおかけしたニャン、フィオナ嬢。ニャがもう大丈夫ニャンよ」
line = "「ご心配をおかけしたニャン、フィオナ嬢。ニャがもう大丈夫ニャンよ」"

[[dialogue]]
speaker = "ニャリオン"
# 「なぜなら吾輩は思い出したのニャン。あいつの波動を……間近で浴びることでニャン」
line = "「なぜなら吾輩は思い出したのニャン。あいつの波動を……間近で浴びることでニャン」"

[[dialogue]]
speaker = "フィオナ"
# 「思い出した……？」
line = "「思い出した……？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうですニャ。それは……前世の記憶とでも言うべきものニャ」
line = "「そうですニャ。それは……前世の記憶とでも言うべきものニャ」"

[[dialogue]]
speaker = "ユウリ"
# 「おいおい。とうとう頭がいかれちまったか」
line = "「おいおい。とうとう頭がいかれちまったか」"

[[dialogue]]
speaker = "ニャリオン"
# 「お黙りニャ！　吾輩は三千年前、あの先代魔王に仕えた由緒正しき使い魔ニャンぞ！」
line = "「お黙りニャ！　吾輩は三千年前、あの先代魔王に仕えた由緒正しき使い魔ニャンぞ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「そして今はフィオナ嬢という、次なる魔王の器の導き手なのニャアン！」
line = "「そして今はフィオナ嬢という、次なる魔王の器の導き手なのニャアン！」"

[[dialogue]]
speaker = "ソフィア"
# 「さ、三千年前……？」
line = "「さ、三千年前……？」"

[[dialogue]]
speaker = "マトイ"
# 「ええと……？　つまり、どゆこと……？」
line = "「ええと……？　つまり、どゆこと……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「……なるほど。ニャリオン、あなたはそういう存在でしたか」
line = "「……なるほど。ニャリオン、あなたはそういう存在でしたか」"

[[dialogue]]
speaker = "ルリエル"
# 「？　そういう存在──と仰いますと」
line = "「？　そういう存在──と仰いますと」"

[[dialogue]]
speaker = "マグダレナ"
# 「過去──クルセイダースの時代、魔王には特別な使い魔がついたと言います」
line = "「過去──クルセイダースの時代、魔王には特別な使い魔がついたと言います」"

[[dialogue]]
speaker = "マグダレナ"
# 「大賢者──かつての使い魔は、自らをそう名乗ったとか」
line = "「大賢者──かつての使い魔は、自らをそう名乗ったとか」"

[[dialogue]]
speaker = "ユウリ"
# 「大賢者ぁ……？」
line = "「大賢者ぁ……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。ニャリオンはもしかすると、かの大賢者と同一の存在かもしれません」
line = "「はい。ニャリオンはもしかすると、かの大賢者と同一の存在かもしれません」"

[[dialogue]]
speaker = "マグダレナ"
# 「いかなる経緯かはわかりませんが──今代のリクリエに応じて、この森羅暦３０００年の世界にもやってきたのではないでしょうか」
line = "「いかなる経緯かはわかりませんが──今代のリクリエに応じて、この森羅暦３０００年の世界にもやってきたのではないでしょうか」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうそう、そうなのだニャン！　神聖にして偉大なる大賢者、ニャリオン様を仰ぐのだニャン！」
line = "「そうそう、そうなのだニャン！　神聖にして偉大なる大賢者、ニャリオン様を仰ぐのだニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「意味がわからん」
line = "「意味がわからん」"

[[dialogue]]
speaker = "ソフィア"
# 「若干ついていけません」
line = "「若干ついていけません」"

[[dialogue]]
speaker = "クロト"
# 「つまり──ニャリオンの前世？　は、先代魔王の使い魔だったってことか」
line = "「つまり──ニャリオンの前世？　は、先代魔王の使い魔だったってことか」"

[[dialogue]]
speaker = "ニャリオン"
# 「大体そーニャ！」
line = "「大体そーニャ！」"

[[dialogue]]
speaker = "アナ"
# 「会長の飲み込みの早さは美徳と思われます」
line = "「会長の飲み込みの早さは美徳と思われます」"

[[dialogue]]
speaker = "unk"
# まあニャリオンは見た目からして特別な使い魔だし、俺のソウルフレンドでもある。
line = "まあニャリオンは見た目からして特別な使い魔だし、俺のソウルフレンドでもある。"

[[dialogue]]
speaker = "unk"
# それくらいスペシャルな存在でも驚きはしないというものだ。
line = "それくらいスペシャルな存在でも驚きはしないというものだ。"

[[dialogue]]
speaker = "フィオナ"
# 「……ニャリオンは私の召喚した使い魔です。<ruby=あね>フィオナ</ruby>ではなく、<ruby=わたし>エリシア</ruby>の」
line = "「……ニャリオンは私の召喚した使い魔です。<ruby>フィオナ<rt>あね</rt></ruby>ではなく、<ruby>エリシア<rt>わたし</rt></ruby>の」"

[[dialogue]]
speaker = "フィオナ"
# 「私はたびたび召喚術を用いますが、あの時のことはよく覚えています。不思議な──引っ張られるような感覚があったので」
line = "「私はたびたび召喚術を用いますが、あの時のことはよく覚えています。不思議な──引っ張られるような感覚があったので」"

[[dialogue]]
speaker = "マグダレナ"
# 「魔王の血に引きずられて──遠い時空から召喚されたのかもしれませんね」
line = "「魔王の血に引きずられて──遠い時空から召喚されたのかもしれませんね」"

[[dialogue]]
speaker = "セーラ"
# 「フィオナちゃんすご！」
line = "「フィオナちゃんすご！」"

[[dialogue]]
speaker = "アナ"
# 「つまりその前世の記憶とやらを、霊力との接触によって思い出した……と。一応筋は通りますが」
line = "「つまりその前世の記憶とやらを、霊力との接触によって思い出した……と。一応筋は通りますが」"

[[dialogue]]
speaker = "ルリエル"
# 「そんなに偉い存在には見えませんねえ。ニャリオンさんは」
line = "「そんなに偉い存在には見えませんねえ。ニャリオンさんは」"

[[dialogue]]
speaker = "ニャリオン"
# 「失敬ニャ！　そもそも最初から神聖なる猫の化身と再三言っておるニャ！」
line = "「失敬ニャ！　そもそも最初から神聖なる猫の化身と再三言っておるニャ！」"

[[dialogue]]
speaker = "クロト"
# 「ニャリオン。それじゃ君の知ってる範囲でいいから、教えて欲しいことがある」
line = "「ニャリオン。それじゃ君の知ってる範囲でいいから、教えて欲しいことがある」"

[[dialogue]]
speaker = "ニャリオン"
# 「何ニャ？」
line = "「何ニャ？」"

[[dialogue]]
speaker = "クロト"
# 「先代の魔王ってのは、どんな人物だったんだ？」
line = "「先代の魔王ってのは、どんな人物だったんだ？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ。大事なのはそこニャ」
line = "「そうニャ。大事なのはそこニャ」"

[[dialogue]]
speaker = "ニャリオン"
# 「先代の魔王はとんでもニャく強かったニャ。先代魔王の操る二つの力──霊力と魔力は、相互に絡み合ってものすごいパワーを生み出していたニャン」
line = "「先代の魔王はとんでもニャく強かったニャ。先代魔王の操る二つの力──霊力と魔力は、相互に絡み合ってものすごいパワーを生み出していたニャン」"

[[dialogue]]
speaker = "マトイ"
# 「二つの力……！」
line = "「二つの力……！」"

[[dialogue]]
speaker = "アナ"
# 「なるほど。先の話に繋がりますね」
line = "「なるほど。先の話に繋がりますね」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ。だからこそ、同じく魔王の血を継ぐフィオナ嬢たちもまた、霊力と魔力を操る器であると言えるニャン」
line = "「そうニャ。だからこそ、同じく魔王の血を継ぐフィオナ嬢たちもまた、霊力と魔力を操る器であると言えるニャン」"

[[dialogue]]
speaker = "マグダレナ"
# 「どうやらニャリオンは正しく歴史を理解しているようです。取り立てて補足する点はありません」
line = "「どうやらニャリオンは正しく歴史を理解しているようです。取り立てて補足する点はありません」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーッニャッニャッニャッ！　吾輩は大賢者なる偉大な存在ニャン！　これくらい当然ニャンよ！」
line = "「ニャーッニャッニャッニャッ！　吾輩は大賢者なる偉大な存在ニャン！　これくらい当然ニャンよ！」"

[[dialogue]]
speaker = "ユウリ"
# 「箔が付いて余計にうざくなったな……」
line = "「箔が付いて余計にうざくなったな……」"

[[dialogue]]
speaker = "ソフィア"
# 「度が過ぎたらキリカさんにお願いしましょう」
line = "「度が過ぎたらキリカさんにお願いしましょう」"

[[dialogue]]
speaker = "unk"
# 霊力──
line = "霊力──"

[[dialogue]]
speaker = "unk"
# その失われたはずの力を通じて、３０００年前の先代リクリエの事情が俺たちに深く関わるらしいこともわかってきた。
line = "その失われたはずの力を通じて、３０００年前の先代リクリエの事情が俺たちに深く関わるらしいこともわかってきた。"

[[dialogue]]
speaker = "セーラ"
# 「へー……あれ、でも待って？　今のフィオナちゃんと会長さんは、星力だって使ってるじゃんね？」
line = "「へー……あれ、でも待って？　今のフィオナちゃんと会長さんは、星力だって使ってるじゃんね？」"

[[dialogue]]
speaker = "クロト"
# 「そうですね。現代に生きる俺たちに与えられた力──ってことですから」
line = "「そうですね。現代に生きる俺たちに与えられた力──ってことですから」"

[[dialogue]]
speaker = "フィオナ"
# 「！　となると……もし私たちに霊力が扱えたら？」
line = "「！　となると……もし私たちに霊力が扱えたら？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうニャ。吾輩がフィオナ嬢に期待するのもそこなのニャ──つまり」
line = "「そうニャ。吾輩がフィオナ嬢に期待するのもそこなのニャ──つまり」"

[[dialogue]]
speaker = "ニャリオン"
# 「もし二人が今代の魔王として覚醒したニャら──霊力・星力・魔力のすべてを兼ね備えた、究極の存在となるのニャ！」
line = "「もし二人が今代の魔王として覚醒したニャら──霊力・星力・魔力のすべてを兼ね備えた、究極の存在となるのニャ！」"

[[dialogue]]
speaker = "マトイ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "クロト"
# 「盛りだくさんだな……」
line = "「盛りだくさんだな……」"

[[dialogue]]
speaker = "セーラ"
# 「アナちゃんの例えに乗っかるなら──剣も槍も、ついでに弓も使えるみたいな感じかな？」
line = "「アナちゃんの例えに乗っかるなら──剣も槍も、ついでに弓も使えるみたいな感じかな？」"

[[dialogue]]
speaker = "unk"
# 『もし、二度目の制覇を願うのなら──最強の魔王が必要なのです』
line = "『もし、二度目の制覇を願うのなら──最強の魔王が必要なのです』"

[[dialogue]]
speaker = "クロト"
# （最強の魔王……あれが言っていたのはもしかすると）
line = "（最強の魔王……あれが言っていたのはもしかすると）"

[[dialogue]]
speaker = "フィオナ"
# （……ええ。そういう意味だったのかもしれません）
line = "（……ええ。そういう意味だったのかもしれません）"

[[dialogue]]
speaker = "unk"
# 霊力の代わりに女神から授かった星力──
line = "霊力の代わりに女神から授かった星力──"

[[dialogue]]
speaker = "unk"
# それを身に着けた俺たちが、なお過去の力を引き出して生まれる進化形。
line = "それを身に着けた俺たちが、なお過去の力を引き出して生まれる進化形。"

[[dialogue]]
speaker = "unk"
# 『今代の魔王』をそう定義するなら、確かに未知にして最強の器に違いなかった。
line = "『今代の魔王』をそう定義するなら、確かに未知にして最強の器に違いなかった。"

[[dialogue]]
speaker = "アナ"
# 「しかし──これでなんとなく見えてきました。あの黒騎士という相手も、会長たちと似たような存在なのかもしれないと」
line = "「しかし──これでなんとなく見えてきました。あの黒騎士という相手も、会長たちと似たような存在なのかもしれないと」"

[[dialogue]]
speaker = "ニャリオン"
# 「可能性はあるニャン。ただ、断言はできないニャン」
line = "「可能性はあるニャン。ただ、断言はできないニャン」"

[[dialogue]]
speaker = "ニャリオン"
# 「あの男からは……正直、邪気しか感じなかったニャンからね」
line = "「あの男からは……正直、邪気しか感じなかったニャンからね」"

[[dialogue]]
speaker = "マグダレナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マグダレナ"
# 「……あの。これも伝えておかねばと思っていたのですが」
line = "「……あの。これも伝えておかねばと思っていたのですが」"

[[dialogue]]
speaker = "クロト"
# 「？　なんでしょう」
line = "「？　なんでしょう」"

[[dialogue]]
speaker = "マグダレナ"
# 「その『黒騎士』という人物──もしかすると、<ruby=わたしたち>守護天使</ruby>を封印したのと同じ存在かもしれません」
line = "「その『黒騎士』という人物──もしかすると、<ruby>守護天使<rt>わたしたち</rt></ruby>を封印したのと同じ存在かもしれません」"

[[dialogue]]
speaker = "フィオナ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "ユウリ"
# 「おいおい……そっちにも繋がってんのか？」
line = "「おいおい……そっちにも繋がってんのか？」"

[[dialogue]]
speaker = "クロト"
# 「守護天使は確か──六柱バラバラに、どこかへ本体が封印されているんだったか」
line = "「守護天使は確か──六柱バラバラに、どこかへ本体が封印されているんだったか」"

[[dialogue]]
speaker = "アナ"
# 「ええ。しかし、本当にあの影が……」
line = "「ええ。しかし、本当にあの影が……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「間違いないだろう──我の記憶とも一致する」
line = "「間違いないだろう──我の記憶とも一致する」"

[[dialogue]]
speaker = "マグダレナ"
# 「アルモタヘル……」
line = "「アルモタヘル……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「話は聞いた。一刻を争う事態のようだが──我らとしても捨て置けぬ」
line = "「話は聞いた。一刻を争う事態のようだが──我らとしても捨て置けぬ」"

[[dialogue]]
speaker = "マグダレナ"
# 「あなたは……当時のことを覚えているのですか？」
line = "「あなたは……当時のことを覚えているのですか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「朧げだがな。何より、お前たちの証言で確信を得た」
line = "「朧げだがな。何より、お前たちの証言で確信を得た」"

[[dialogue]]
speaker = "アルモタヘル"
# 「あの日。塔にいた我々に奇襲を仕掛けてきたのは……漆黒の甲冑だった」
line = "「あの日。塔にいた我々に奇襲を仕掛けてきたのは……漆黒の甲冑だった」"

[[dialogue]]
speaker = "フィオナ"
# 「！　なら、やはり……」
line = "「！　なら、やはり……」"

[[dialogue]]
speaker = "クロト"
# 「守護天使の皆さんは──元々、フィーニスの塔を守る存在なんですよね」
line = "「守護天使の皆さんは──元々、フィーニスの塔を守る存在なんですよね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「然り。そして奴はあの時も『塔』に現れた。どんな手段で侵入してきたのかは知らないが……」
line = "「然り。そして奴はあの時も『塔』に現れた。どんな手段で侵入してきたのかは知らないが……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「奴は超常的な力によって──我ら六柱の守護天使を<b>さらった</b>。本体を封印することによって」
line = "「奴は超常的な力によって──我ら六柱の守護天使を<b>さらった</b>。本体を封印することによって」"

[[dialogue]]
speaker = "アルモタヘル"
# 「その後の醜い堕天に関しては……お前たちも知る通りだ」
line = "「その後の醜い堕天に関しては……お前たちも知る通りだ」"

[[dialogue]]
speaker = "アナ"
# 「守護天使六柱をまとめて相手に……それだけでも、尋常でない脅威です」
line = "「守護天使六柱をまとめて相手に……それだけでも、尋常でない脅威です」"

[[dialogue]]
speaker = "アルモタヘル"
# 「一人ではなかったかもしれない。詳細に覚えているわけではないが」
line = "「一人ではなかったかもしれない。詳細に覚えているわけではないが」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ただ、今にして思えば……奴の手管はいささか<ruby=こな>熟</ruby>れすぎていた。まるで、塔の構造を把握していたかのような……」
line = "「ただ、今にして思えば……奴の手管はいささか<ruby>熟<rt>こな</rt></ruby>れすぎていた。まるで、塔の構造を把握していたかのような……」"

[[dialogue]]
speaker = "unk"
# マグダレナさんやアルモタヘルさんは、未だに核の部分をいずこかに封印されたままでいる。
line = "マグダレナさんやアルモタヘルさんは、未だに核の部分をいずこかに封印されたままでいる。"

[[dialogue]]
speaker = "unk"
# そしてまだ見ぬ他の守護天使たちは、どこかで堕天している恐れもあるのだ。
line = "そしてまだ見ぬ他の守護天使たちは、どこかで堕天している恐れもあるのだ。"

[[dialogue]]
speaker = "アルモタヘル"
# 「いずれにせよ……我らにとっても捨て置けぬ相手だ。その黒騎士とやらは」
line = "「いずれにせよ……我らにとっても捨て置けぬ相手だ。その黒騎士とやらは」"

[[dialogue]]
speaker = "ルリエル"
# 「おおっ！　なればアルモタヘルさんも共に戦ってくれるのですね！」
line = "「おおっ！　なればアルモタヘルさんも共に戦ってくれるのですね！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「いや……この身はあくまでも一時的な依り代──さしたる戦力にはならないだろう」
line = "「いや……この身はあくまでも一時的な依り代──さしたる戦力にはならないだろう」"

[[dialogue]]
speaker = "アルモタヘル"
# 「代わりに──これを渡しておく」
line = "「代わりに──これを渡しておく」"

[[dialogue]]
speaker = "クロト"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "フィオナ"
# 「それは……？」
line = "「それは……？」"

[[dialogue]]
speaker = "unk"
# アルモタヘルさんから俺に手渡されたひと欠片の輝石。
line = "アルモタヘルさんから俺に手渡されたひと欠片の輝石。"

[[dialogue]]
speaker = "unk"
# まるで星屑のようなきらめきを放つ、それは……
line = "まるで星屑のようなきらめきを放つ、それは……"

[[dialogue]]
speaker = "アルモタヘル"
# 「『<ruby=クロスダスト>霊屑</ruby>』──我ら守護天使にのみ与えられた、かつての<b>霊力の残滓</b>だ」
line = "「『<ruby>霊屑<rt>クロスダスト</rt></ruby>』──我ら守護天使にのみ与えられた、かつての<b>霊力の残滓</b>だ」"

[[dialogue]]
speaker = "クロト＆フィオナ"
# 「！！」
line = "「！！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「霊力は──本来、この時代に存在しない術式ゆえに、星術をすり抜ける。相殺しないのだ」
line = "「霊力は──本来、この時代に存在しない術式ゆえに、星術をすり抜ける。相殺しないのだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「よって、霊力の使い手に対抗できるとすれば……それはより強き霊力の持ち主しかいない」
line = "「よって、霊力の使い手に対抗できるとすれば……それはより強き霊力の持ち主しかいない」"

[[dialogue]]
speaker = "クロト"
# 「これを……俺に」
line = "「これを……俺に」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そうだ。信じて託すとする」
line = "「そうだ。信じて託すとする」"

[[dialogue]]
speaker = "サーシャ"
# 「そこに会長くんの本来の力が合わされば……！」
line = "「そこに会長くんの本来の力が合わされば……！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「最強だ。霊力＋魔力＋星力は３じゃない、３００にもなろう。十倍だぞ十倍」
line = "「最強だ。霊力＋魔力＋星力は３じゃない、３００にもなろう。十倍だぞ十倍」"

[[dialogue]]
speaker = "アナ"
# 「百倍です」
line = "「百倍です」"

[[dialogue]]
speaker = "ソフィア"
# （ア、アルモタヘルさんって、こういう方だったんですね……）
line = "（ア、アルモタヘルさんって、こういう方だったんですね……）"

[[dialogue]]
speaker = "unk"
# 先代魔王は霊力と魔力とを融合させ、すさまじい力を誇った──とニャリオンは言っていた。
line = "先代魔王は霊力と魔力とを融合させ、すさまじい力を誇った──とニャリオンは言っていた。"

[[dialogue]]
speaker = "unk"
# その図式に則れば、アルモタヘルさんの言うことも理解できる気がした。
line = "その図式に則れば、アルモタヘルさんの言うことも理解できる気がした。"

[[dialogue]]
speaker = "マグダレナ"
# 「……なるほど。そういうことなら、私の分も渡しておきましょう」
line = "「……なるほど。そういうことなら、私の分も渡しておきましょう」"

[[dialogue]]
speaker = "unk"
# そして、マグダレナさんからはフィオナへ──
line = "そして、マグダレナさんからはフィオナへ──"

[[dialogue]]
speaker = "unk"
# 俺たちは共に、霊力の資格ありとして『<ruby=クロスダスト>霊屑</ruby>』を受け取った。
line = "俺たちは共に、霊力の資格ありとして『<ruby>霊屑<rt>クロスダスト</rt></ruby>』を受け取った。"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます──マグダレナ様。必ず役に立てます」
line = "「ありがとうございます──マグダレナ様。必ず役に立てます」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ！　フィオナ嬢なら必ずや、かの先代魔王をも超える存在になると信じているニャン！」
line = "「ニャ！　フィオナ嬢なら必ずや、かの先代魔王をも超える存在になると信じているニャン！」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ。頼もしいですね」
line = "「ふふ。頼もしいですね」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……どうかしたのか。新星の魔王」
line = "「……どうかしたのか。新星の魔王」"

[[dialogue]]
speaker = "クロト"
# 「──あ、いえ……そもそもの疑問を感じてしまって」
line = "「──あ、いえ……そもそもの疑問を感じてしまって」"

[[dialogue]]
speaker = "アルモタヘル"
# 「そもそもの疑問？」
line = "「そもそもの疑問？」"

[[dialogue]]
speaker = "クロト"
# 「はい。俺は──本当に魔王でいいんでしょうか」
line = "「はい。俺は──本当に魔王でいいんでしょうか」"

[[dialogue]]
speaker = "unk"
# いつか、塔に響いた謎の声は、魔王の血統として最も濃い候補は『星見フィオナ』と宣言していた。
line = "いつか、塔に響いた謎の声は、魔王の血統として最も濃い候補は『星見フィオナ』と宣言していた。"

[[dialogue]]
speaker = "unk"
# 他にも魔界、天界にもそれぞれ候補がいたとも……。
line = "他にも魔界、天界にもそれぞれ候補がいたとも……。"

[[dialogue]]
speaker = "unk"
# そう考えると俺を魔王とする根拠は、ヴィーナスがしきりに連呼してくれていた事実しかない。
line = "そう考えると俺を魔王とする根拠は、ヴィーナスがしきりに連呼してくれていた事実しかない。"

[[dialogue]]
speaker = "アルモタヘル"
# 「フィーニスの塔で聴こえた声……ということは、ふむ」
line = "「フィーニスの塔で聴こえた声……ということは、ふむ」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ。間違いはないでしょうね。…………あのお方のお告げならば」
line = "「ええ。間違いはないでしょうね。…………あのお方のお告げならば」"

[[dialogue]]
speaker = "unk"
# 最後にぼそりと呟いたのは、わずかに聞き取れなかった。
line = "最後にぼそりと呟いたのは、わずかに聞き取れなかった。"

[[dialogue]]
speaker = "マグダレナ"
# 「とはいえ問題はありません。そもそも三千年前の魔王の血統は、すでに三界に散り散りになっているもの──」
line = "「とはいえ問題はありません。そもそも三千年前の魔王の血統は、すでに三界に散り散りになっているもの──」"

[[dialogue]]
speaker = "マグダレナ"
# 「あなたが発揮したという力は紛れもなく人間を超えたそれでした。あなたが魔王の系譜にあるというのも確かでしょう」
line = "「あなたが発揮したという力は紛れもなく人間を超えたそれでした。あなたが魔王の系譜にあるというのも確かでしょう」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ああ。たとえ星見の娘より血が薄かったとしても……緋宮クロトという人間には『器』がある」
line = "「ああ。たとえ星見の娘より血が薄かったとしても……緋宮クロトという人間には『器』がある」"

[[dialogue]]
speaker = "クロト"
# 「……なるほど。ありがとうございます」
line = "「……なるほど。ありがとうございます」"

[[dialogue]]
speaker = "unk"
# 血の濃淡の差はあれ、資格としては十分とのことだった。
line = "血の濃淡の差はあれ、資格としては十分とのことだった。"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃー会長くんとフィオナちゃんが霊力に目覚めたら、一気に対抗できちゃう感じかしら？」
line = "「それじゃー会長くんとフィオナちゃんが霊力に目覚めたら、一気に対抗できちゃう感じかしら？」"

[[dialogue]]
speaker = "マグダレナ"
# 「……どうでしょう。<ruby=クロスダスト>霊屑</ruby>はあくまでも前世界の残滓。少々寄せ集めたところで、かの存在に敵うとは思えません」
line = "「……どうでしょう。<ruby>霊屑<rt>クロスダスト</rt></ruby>はあくまでも前世界の残滓。少々寄せ集めたところで、かの存在に敵うとは思えません」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……そうだな。こうしてカケラとして渡せる程度のものでしかない」
line = "「……そうだな。こうしてカケラとして渡せる程度のものでしかない」"

[[dialogue]]
speaker = "クロト"
# 「──いえ。それでも……持つ価値は十分にあると思います」
line = "「──いえ。それでも……持つ価値は十分にあると思います」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね。もし私たちに『器』が備わっているのなら、まずは回路を開かなくてはなりませんから」
line = "「そうですね。もし私たちに『器』が備わっているのなら、まずは回路を開かなくてはなりませんから」"

[[dialogue]]
speaker = "unk"
# 今まで──『もうないもの』としか聞いてこなかった力。霊力。
line = "今まで──『もうないもの』としか聞いてこなかった力。霊力。"

[[dialogue]]
speaker = "unk"
# それを会得する資格が俺たちにあるのなら、賭けてみたい。
line = "それを会得する資格が俺たちにあるのなら、賭けてみたい。"

[[dialogue]]
speaker = "クロト"
# 「フィオナ──」
line = "「フィオナ──」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。──必ずや目にものをみせてやりましょう」
line = "「ええ。──必ずや目にものをみせてやりましょう」"

[[dialogue]]
speaker = "unk"
# 黒騎士というかつてない強大な相手。
line = "黒騎士というかつてない強大な相手。"

[[dialogue]]
speaker = "unk"
# それに再会しても勝てる見込みはあるのか？
line = "それに再会しても勝てる見込みはあるのか？"

[[dialogue]]
speaker = "unk"
# そんな絶望的な問いかけに対して、わずかでも希望の光が見いだせたのは大きい。
line = "そんな絶望的な問いかけに対して、わずかでも希望の光が見いだせたのは大きい。"

[[dialogue]]
speaker = "unk"
# そう、前向きになっていると──
line = "そう、前向きになっていると──"

[[dialogue]]
speaker = "セーラ"
# 「ん？　ＤＩＳＣ？」
line = "「ん？　ＤＩＳＣ？」"

[[dialogue]]
speaker = "アナ"
# 「私です──どうやら頼んでいた宛てが間に合ったようですね」
line = "「私です──どうやら頼んでいた宛てが間に合ったようですね」"

[[dialogue]]
speaker = "マトイ"
# 「宛て？」
line = "「宛て？」"

[[dialogue]]
speaker = "アナ"
# 「トレーニングルームへ向かいましょう──<b>先輩</b>が待っています」
line = "「トレーニングルームへ向かいましょう──<b>先輩</b>が待っています」"
