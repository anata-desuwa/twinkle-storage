[[dialogue]]
speaker = "unk"
# 街の至る所からクリスマスツリーが撤去された途端、世間の空気は一気に様変わり。
line = "街の至る所からクリスマスツリーが撤去された途端、世間の空気は一気に様変わり。"

[[dialogue]]
speaker = "unk"
# スーパーやコンビニにはお節の食材や鏡餅が並び、年越しムードが高まりつつあった。
line = "スーパーやコンビニにはお節の食材や鏡餅が並び、年越しムードが高まりつつあった。"

[[dialogue]]
speaker = "ヘレナ"
# 「ヘレナちゃんである！　クリスマスはどうであったか？」
line = "「ヘレナちゃんである！　クリスマスはどうであったか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「各々が思い思いに楽しんだことだろう。だが、クリスマスが終わればすぐに年末、そして、新春」
line = "「各々が思い思いに楽しんだことだろう。だが、クリスマスが終わればすぐに年末、そして、新春」"

[[dialogue]]
speaker = "ヘレナ"
# 「新春となれば、当然、晴れ着である。いやはや、イベント目白押しの師走になると、デザインのインスピレーションが高まってしまってな」
line = "「新春となれば、当然、晴れ着である。いやはや、イベント目白押しの師走になると、デザインのインスピレーションが高まってしまってな」"

[[dialogue]]
speaker = "ヘレナ"
# 「我がメイド隊自慢の服飾担当、美鶴には少々無理をさせてしまい、申し訳なく思っている。反省はするが、自制はしないのが私だ」
line = "「我がメイド隊自慢の服飾担当、美鶴には少々無理をさせてしまい、申し訳なく思っている。反省はするが、自制はしないのが私だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「美鶴があつらえた出来立てほやほや、冬の最新モデル。栄えある晴れ着戦闘服にふさわしい者は──」
line = "「美鶴があつらえた出来立てほやほや、冬の最新モデル。栄えある晴れ着戦闘服にふさわしい者は──」"

[[dialogue]]
speaker = "フィオナ"
# 「私、ですか」
line = "「私、ですか」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ。フィオナにはうちのヴィーナスが散々世話になっているであろう。保護者からのせめてもの礼だ。ぜひ受け取ってほしい」
line = "「うむ。フィオナにはうちのヴィーナスが散々世話になっているであろう。保護者からのせめてもの礼だ。ぜひ受け取ってほしい」"

[[dialogue]]
speaker = "フィオナ"
# 「お礼を頂くほどのことはしていませんけど……そういうことでしたら受け取らせていただきます。ありがとうございます」
line = "「お礼を頂くほどのことはしていませんけど……そういうことでしたら受け取らせていただきます。ありがとうございます」"

[[dialogue]]
speaker = "ヘレナ"
# 「そして、もう１着。受け取ってくれるな、トリシャ」
line = "「そして、もう１着。受け取ってくれるな、トリシャ」"

[[dialogue]]
speaker = "トリシャ"
# 「此度、私が呼び出されたのは、そのような用件でしたか……その、いただいても、よろしいのですか……？　恐れ多いです……」
line = "「此度、私が呼び出されたのは、そのような用件でしたか……その、いただいても、よろしいのですか……？　恐れ多いです……」"

[[dialogue]]
speaker = "ヘレナ"
# 「何を恐れることがあろうか。遠慮せずに受け取るがよい。貴殿の占いには皆も世話になっておる」
line = "「何を恐れることがあろうか。遠慮せずに受け取るがよい。貴殿の占いには皆も世話になっておる」"

[[dialogue]]
speaker = "トリシャ"
# 「かしこまりました。では、謹んで……わ、これが晴れ着……すごく綺麗……にへへ♪」
line = "「かしこまりました。では、謹んで……わ、これが晴れ着……すごく綺麗……にへへ♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「２人とも早速、着替えてきてはどうだ？　ひとりでは難解な着付けも、我がメイド隊の手にかかればマッハで解決だ。蘭美」
line = "「２人とも早速、着替えてきてはどうだ？　ひとりでは難解な着付けも、我がメイド隊の手にかかればマッハで解決だ。蘭美」"

[[dialogue]]
speaker = "蘭美"
# 「その通りです当主様。２人とも、私が最速で着替えさせてみせるから安心しなさい」
line = "「その通りです当主様。２人とも、私が最速で着替えさせてみせるから安心しなさい」"

[[dialogue]]
speaker = "フィオナ"
# 「は、はい……」
line = "「は、はい……」"

[[dialogue]]
speaker = "蘭美"
# 「準備が終わりました。まずはフィオナ様から、どうぞ」
line = "「準備が終わりました。まずはフィオナ様から、どうぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「ええと……」
line = "「ええと……」"

[[dialogue]]
speaker = "ヘレナ"
# 「どうした？　恥ずかしがらずに出てくるがよい」
line = "「どうした？　恥ずかしがらずに出てくるがよい」"

[[dialogue]]
speaker = "フィオナ"
# 「はい……あ、あの……ウズメの時も思いましたけど、和服にしてはアレンジが斬新で、大胆ですよね……トリシャさんの方は？」
line = "「はい……あ、あの……ウズメの時も思いましたけど、和服にしてはアレンジが斬新で、大胆ですよね……トリシャさんの方は？」"

[[dialogue]]
speaker = "トリシャ"
# 「このような装いとなっております……」
line = "「このような装いとなっております……」"

[[dialogue]]
speaker = "フィオナ"
# 「これは、また大胆な……いえ、とても似合っていますし、お綺麗なんですけど……」
line = "「これは、また大胆な……いえ、とても似合っていますし、お綺麗なんですけど……」"

[[dialogue]]
speaker = "トリシャ"
# 「和装の文化、ちょっと憧れてました……」
line = "「和装の文化、ちょっと憧れてました……」"

[[dialogue]]
speaker = "トリシャ"
# 「晴れ着の効果でしょうか……？　いつもの戦闘服以上に、力が満ち満ちているような……占いの精度も、必ずや高まることでしょう……」
line = "「晴れ着の効果でしょうか……？　いつもの戦闘服以上に、力が満ち満ちているような……占いの精度も、必ずや高まることでしょう……」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふむ、もう晴れ着戦闘服を着こなしているのか。貴殿の星力を操る力は相当のようだな」
line = "「ふむ、もう晴れ着戦闘服を着こなしているのか。貴殿の星力を操る力は相当のようだな」"

[[dialogue]]
speaker = "unk"
# 今度の晴れ着はフィオナとトリシャ？
line = "今度の晴れ着はフィオナとトリシャ？"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長！？　何故ここに！？」
line = "「緋宮会長！？　何故ここに！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「こんなこともあろうかと、私が呼びつけておいた。どれ、魔王よ、２人に忌憚ない感想を聞かせてやってくれ」
line = "「こんなこともあろうかと、私が呼びつけておいた。どれ、魔王よ、２人に忌憚ない感想を聞かせてやってくれ」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長……ど、どうでしょうか？　普段より露出が多くて、少し恥ずかしいのですけれど……」
line = "「緋宮会長……ど、どうでしょうか？　普段より露出が多くて、少し恥ずかしいのですけれど……」"

[[dialogue]]
speaker = "unk"
# ふたりともよく似合ってるよ
line = "ふたりともよく似合ってるよ"

[[dialogue]]
speaker = "フィオナ"
# 「そう、ですか……？　真正面から緋宮会長に褒めてもらえると、悪い気はしませんね……」
line = "「そう、ですか……？　真正面から緋宮会長に褒めてもらえると、悪い気はしませんね……」"

[[dialogue]]
speaker = "トリシャ"
# 「あ、ありがとうございます……気を抜くと、胸がまろび出てしまいそうですが……」
line = "「あ、ありがとうございます……気を抜くと、胸がまろび出てしまいそうですが……」"

[[dialogue]]
speaker = "unk"
# まろび出ちゃわないよう気をつけて！？
line = "まろび出ちゃわないよう気をつけて！？"

[[dialogue]]
speaker = "ヘレナ"
# 「おや魔王、顔が赤いではないか。お披露目している方よりも照れてどうする」
line = "「おや魔王、顔が赤いではないか。お披露目している方よりも照れてどうする」"

[[dialogue]]
speaker = "ヘレナ"
# 「いやしかし、２人に似合うと確信していたが、やはり完璧であったな。我ながら自分のセンスには感嘆する」
line = "「いやしかし、２人に似合うと確信していたが、やはり完璧であったな。我ながら自分のセンスには感嘆する」"

[[dialogue]]
speaker = "ヴィーナス"
# 「新衣装のお披露目は終わったようね。流石はメイド隊自慢の服飾担当。美鶴はいい仕事するわ。フィオナも晴れ着よく似合ってるじゃない！」
line = "「新衣装のお披露目は終わったようね。流石はメイド隊自慢の服飾担当。美鶴はいい仕事するわ。フィオナも晴れ着よく似合ってるじゃない！」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。普段から和服を着慣れている九浄家のみなさんほどではないと思いますけど……」
line = "「ありがとうございます。普段から和服を着慣れている九浄家のみなさんほどではないと思いますけど……」"

[[dialogue]]
speaker = "ウズメイア"
# 「謙遜なしなーし！　フィオナ会長、めっちゃ可愛いってば！　前から興味津々だったもんねー。ついに念願のお正月フォームってカンジ？」
line = "「謙遜なしなーし！　フィオナ会長、めっちゃ可愛いってば！　前から興味津々だったもんねー。ついに念願のお正月フォームってカンジ？」"

[[dialogue]]
speaker = "ソフィア"
# 「さすがフィオナ会長です。もちろんトリシャさんも……ヴィーナスさんも、ウズメも、皆さんとても素敵です」
line = "「さすがフィオナ会長です。もちろんトリシャさんも……ヴィーナスさんも、ウズメも、皆さんとても素敵です」"

[[dialogue]]
speaker = "フィオナ"
# 「ウズメにソフィアまで……晴れ着フォーム勢ぞろいだね」
line = "「ウズメにソフィアまで……晴れ着フォーム勢ぞろいだね」"

[[dialogue]]
speaker = "ウズメイア"
# 「ね、ね、せっかくの晴れ着なんだし、みんなで写真撮ろ！　トリシャさんもそんな隅っこでちっちゃくなってないでさ！　おっぱいはおっきいんだから！」
line = "「ね、ね、せっかくの晴れ着なんだし、みんなで写真撮ろ！　トリシャさんもそんな隅っこでちっちゃくなってないでさ！　おっぱいはおっきいんだから！」"

[[dialogue]]
speaker = "トリシャ"
# 「そ、そんな……一緒に写真なんて撮ったら、皆さんと、友達になってしまいますよ……？」
line = "「そ、そんな……一緒に写真なんて撮ったら、皆さんと、友達になってしまいますよ……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「友達になったら、何か困るん？　なっちゃおーよ、友達！」
line = "「友達になったら、何か困るん？　なっちゃおーよ、友達！」"

[[dialogue]]
speaker = "トリシャ"
# 「そ、そんな簡単に……！？」
line = "「そ、そんな簡単に……！？」"

[[dialogue]]
speaker = "unk"
# 友達が増えて、良かったね
line = "友達が増えて、良かったね"

[[dialogue]]
speaker = "トリシャ"
# 「は、はい……これもあなたと出会い、人間界にやってきたおかげ……僥倖です……」
line = "「は、はい……これもあなたと出会い、人間界にやってきたおかげ……僥倖です……」"

[[dialogue]]
speaker = "トリシャ"
# 「お近づきの印に……よろしければ、ひと占い、しましょう……おみくじの力も、試してみたいですし……」
line = "「お近づきの印に……よろしければ、ひと占い、しましょう……おみくじの力も、試してみたいですし……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいじゃない！　占ってもらいましょ！」
line = "「いいじゃない！　占ってもらいましょ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「何について占ってもらっちゃう～？　やっぱり恋愛運？」
line = "「何について占ってもらっちゃう～？　やっぱり恋愛運？」"

[[dialogue]]
speaker = "ヘレナ"
# 「この場で皆の恋路を占うのは、なかなか拗れそうな気がするのでな、却下としよう」
line = "「この場で皆の恋路を占うのは、なかなか拗れそうな気がするのでな、却下としよう」"

[[dialogue]]
speaker = "フィオナ"
# 「それは、まあ……では、来年の運気を見てもらうというのはどうでしょうか？」
line = "「それは、まあ……では、来年の運気を見てもらうというのはどうでしょうか？」"

[[dialogue]]
speaker = "トリシャ"
# 「かしこまり……ました……かしこみ、かしこみ……カシャ、カシャ……」
line = "「かしこまり……ました……かしこみ、かしこみ……カシャ、カシャ……」"

[[dialogue]]
speaker = "ウズメイア"
# 「ドキドキワクワク♪」
line = "「ドキドキワクワク♪」"

[[dialogue]]
speaker = "ソフィア"
# 「出ましたね。その真っ黒な棒、なんて書いてあるんですか？」
line = "「出ましたね。その真っ黒な棒、なんて書いてあるんですか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「どことな～く不吉なカンジ……見てて、背中がゾワゾワするっていうか……」
line = "「どことな～く不吉なカンジ……見てて、背中がゾワゾワするっていうか……」"

[[dialogue]]
speaker = "トリシャ"
# 「その通りです……世にも恐ろしい凶兆が……出てしまいました……」
line = "「その通りです……世にも恐ろしい凶兆が……出てしまいました……」"

[[dialogue]]
speaker = "ソフィア"
# 「具体的に、どのような……？」
line = "「具体的に、どのような……？」"

[[dialogue]]
speaker = "トリシャ"
# 「そう……ですね。具体的に申し上げると、新年を迎える前に……」
line = "「そう……ですね。具体的に申し上げると、新年を迎える前に……」"

[[dialogue]]
speaker = "トリシャ"
# 「世界は……滅亡します……」
line = "「世界は……滅亡します……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「な、なんですってー！」
line = "「な、なんですってー！」"
