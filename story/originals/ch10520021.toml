[[dialogue]]
speaker = "unk"
# 第１話,海の家でアルバイト（前編）,P
line = "第１話,海の家でアルバイト（前編）,P"

[[dialogue]]
speaker = "unk"
# 星騎士と魔女による初めての合同作戦『オペレーション・ペンタグラム』──あの戦いをきっかけに、新星・流星両学園とネビュラは正式に同盟を結ぶこととなった。
line = "星騎士と魔女による初めての合同作戦『オペレーション・ペンタグラム』──あの戦いをきっかけに、新星・流星両学園とネビュラは正式に同盟を結ぶこととなった。"

[[dialogue]]
speaker = "unk"
# 以前から俺とセドナさんは個人的に交流をしていた間柄だったが、最近は特に腹を割った話し合いができるようになった気がする。
line = "以前から俺とセドナさんは個人的に交流をしていた間柄だったが、最近は特に腹を割った話し合いができるようになった気がする。"

[[dialogue]]
speaker = "unk"
# これはセドナさんが水着フォームを披露してくれたあの親睦会から、しばらくの月日が経った頃の話──
line = "これはセドナさんが水着フォームを披露してくれたあの親睦会から、しばらくの月日が経った頃の話──"

[[dialogue]]
speaker = "セドナ"
# 「魔王、わざわざ時間を取ってもらって感謝する。今日は折り入って、貴様に相談したいことがあってな」
line = "「魔王、わざわざ時間を取ってもらって感謝する。今日は折り入って、貴様に相談したいことがあってな」"

[[dialogue]]
speaker = "セドナ"
# 「いや、<ruby=ネビュラ>組織</ruby>からの要請ではない。今日は私……セドナ個人の悩みだ」
line = "「いや、<ruby>組織<rt>ネビュラ</rt></ruby>からの要請ではない。今日は私……セドナ個人の悩みだ」"

[[dialogue]]
speaker = "セドナ"
# 「単刀直入に言おう。お前のような、部下に好かれる人物になる方法を教えて欲しい」
line = "「単刀直入に言おう。お前のような、部下に好かれる人物になる方法を教えて欲しい」"

[[dialogue]]
speaker = "unk"
# 理由をお聞きしても？
line = "理由をお聞きしても？"

[[dialogue]]
speaker = "unk"
# なんだか漠然としたお願いですね
line = "なんだか漠然としたお願いですね"

[[dialogue]]
speaker = "セドナ"
# 「ああ。もちろんだ」
line = "「ああ。もちろんだ」"

[[dialogue]]
speaker = "セドナ"
# 「最近、我々魔女と星騎士は同盟を結んだ。私も基地だけでなく、こうして星騎士たちの総本山で過ごすことが増えた」
line = "「最近、我々魔女と星騎士は同盟を結んだ。私も基地だけでなく、こうして星騎士たちの総本山で過ごすことが増えた」"

[[dialogue]]
speaker = "セドナ"
# 「そうすれば必然的に、貴様と生徒たちの日常を目にする機会も増えるわけだが……」
line = "「そうすれば必然的に、貴様と生徒たちの日常を目にする機会も増えるわけだが……」"

[[dialogue]]
speaker = "セドナ"
# 「軍隊式のネビュラと違い、この学園の雰囲気はとても穏やかだ。常に笑顔と笑いが絶えず、いつ訪れてもモチベーションの高さを感じる」
line = "「軍隊式のネビュラと違い、この学園の雰囲気はとても穏やかだ。常に笑顔と笑いが絶えず、いつ訪れてもモチベーションの高さを感じる」"

[[dialogue]]
speaker = "セドナ"
# 「以前は貴様らのそういう部分を『甘い』と断じ、切り捨てていた私だが……」
line = "「以前は貴様らのそういう部分を『甘い』と断じ、切り捨てていた私だが……」"

[[dialogue]]
speaker = "セドナ"
# 「フィヴォス流星群の際も、オペレーション・ペンタグラムの際も……星騎士たちの活躍は目を見張るものがあった」
line = "「フィヴォス流星群の際も、オペレーション・ペンタグラムの際も……星騎士たちの活躍は目を見張るものがあった」"

[[dialogue]]
speaker = "セドナ"
# 「その力の源は、この穏やかでのびのびとした雰囲気にあるのではないか、と思ったのだ」
line = "「その力の源は、この穏やかでのびのびとした雰囲気にあるのではないか、と思ったのだ」"

[[dialogue]]
speaker = "セドナ"
# 「集団の雰囲気というものは、それを率いる者の人柄によって決定されると私は考えている」
line = "「集団の雰囲気というものは、それを率いる者の人柄によって決定されると私は考えている」"

[[dialogue]]
speaker = "セドナ"
# 「で──だ。私はこの通りの武骨な見た目だろう？」
line = "「で──だ。私はこの通りの武骨な見た目だろう？」"

[[dialogue]]
speaker = "セドナ"
# 「どうしても、部下に威圧感を与えてしまうようでな。だから、お前に指南を仰ぎたいと思った次第だ」
line = "「どうしても、部下に威圧感を与えてしまうようでな。だから、お前に指南を仰ぎたいと思った次第だ」"

[[dialogue]]
speaker = "unk"
# 海での合宿の時、セドナさんは……
line = "海での合宿の時、セドナさんは……"

[[dialogue]]
speaker = "unk"
# そうでしょうか？
line = "そうでしょうか？"

[[dialogue]]
speaker = "セドナ"
# 「確かにリーリアからは、以前よりも肩の力を抜いて接してもらえるようになったと感じている」
line = "「確かにリーリアからは、以前よりも肩の力を抜いて接してもらえるようになったと感じている」"

[[dialogue]]
speaker = "セドナ"
# 「だが、他の者とはまだ、な。ネビュラは対リクリエのためにトップダウンの構造を徹底してきた組織だ」
line = "「だが、他の者とはまだ、な。ネビュラは対リクリエのためにトップダウンの構造を徹底してきた組織だ」"

[[dialogue]]
speaker = "セドナ"
# 「統制管理官という肩書きを持つ私の前で、まだ萎縮している者は多い」
line = "「統制管理官という肩書きを持つ私の前で、まだ萎縮している者は多い」"

[[dialogue]]
speaker = "セドナ"
# 「もちろん緩めればいいというものではないが、過度の緊張感はマイナスに働くことがあるのも事実」
line = "「もちろん緩めればいいというものではないが、過度の緊張感はマイナスに働くことがあるのも事実」"

[[dialogue]]
speaker = "セドナ"
# 「かつてウェンディがミスを隠そうとしたのも、私の叱責を恐れたことが原因だ」
line = "「かつてウェンディがミスを隠そうとしたのも、私の叱責を恐れたことが原因だ」"

[[dialogue]]
speaker = "セドナ"
# 「それについ先日も、書類の小さな数字のミスを、この世の終わりのような顔で報告しにきた部下がいてな……」
line = "「それについ先日も、書類の小さな数字のミスを、この世の終わりのような顔で報告しにきた部下がいてな……」"

[[dialogue]]
speaker = "セドナ"
# 「私は、部下にとって良い上官でありたいと思う。だからこそ、お前から学べることは何でも吸収したい」
line = "「私は、部下にとって良い上官でありたいと思う。だからこそ、お前から学べることは何でも吸収したい」"

[[dialogue]]
speaker = "セドナ"
# 「だから手ほどきをして欲しい。どうすれば、部下を威圧しない上司になれるだろうか？」
line = "「だから手ほどきをして欲しい。どうすれば、部下を威圧しない上司になれるだろうか？」"

[[dialogue]]
speaker = "セドナ"
# 「──ふむ？　お前はアルバイトの経験が豊富……ああ、そういえば部下からの調査資料にそんなことが書いてあったな」
line = "「──ふむ？　お前はアルバイトの経験が豊富……ああ、そういえば部下からの調査資料にそんなことが書いてあったな」"

[[dialogue]]
speaker = "セドナ"
# 「なるほど。様々な職場のコミュニティに関わるうちに、自然と人好きする笑顔を見に付けられた、と……」
line = "「なるほど。様々な職場のコミュニティに関わるうちに、自然と人好きする笑顔を見に付けられた、と……」"

[[dialogue]]
speaker = "セドナ"
# 「一理あるな。しかし、私は魔女だ。ネビュラ以外の場所で職に就くのは難しいな……」
line = "「一理あるな。しかし、私は魔女だ。ネビュラ以外の場所で職に就くのは難しいな……」"

[[dialogue]]
speaker = "unk"
# なら俺がアルバイトを紹介しましょうか
line = "なら俺がアルバイトを紹介しましょうか"

[[dialogue]]
speaker = "セドナ"
# 「ほう？　やはり話してみるものだな。頼めるか」
line = "「ほう？　やはり話してみるものだな。頼めるか」"

[[dialogue]]
speaker = "セドナ"
# 「次の日曜日……？　わかった、予定を空けておこう。よろしく頼む」
line = "「次の日曜日……？　わかった、予定を空けておこう。よろしく頼む」"

[[dialogue]]
speaker = "unk"
# そして後日──俺はセドナさんを誘って、リゾート結界にやってきていた。アルバイトの内容は、海の家のお手伝いだ。
line = "そして後日──俺はセドナさんを誘って、リゾート結界にやってきていた。アルバイトの内容は、海の家のお手伝いだ。"

[[dialogue]]
speaker = "セドナ"
# 「なるほど……プライベートビーチでなく、一般開放されているリゾート結界もあるのだな。とは言っても、まだ誰もいないようだが？」
line = "「なるほど……プライベートビーチでなく、一般開放されているリゾート結界もあるのだな。とは言っても、まだ誰もいないようだが？」"

[[dialogue]]
speaker = "unk"
# 段取りを決めておかないとですからね
line = "段取りを決めておかないとですからね"

[[dialogue]]
speaker = "unk"
# お客が入って来る前に
line = "お客が入って来る前に"

[[dialogue]]
speaker = "セドナ"
# 「研修の時間というわけか。助かる」
line = "「研修の時間というわけか。助かる」"

[[dialogue]]
speaker = "リップル"
# 「ワオ！　こんにちはデス、魔女のお姉さん！」
line = "「ワオ！　こんにちはデス、魔女のお姉さん！」"

[[dialogue]]
speaker = "リップル"
# 「今日はカイチョーと一緒に海の家のお手伝い、頑張ってくれるって聞きマシタ！　ＢＩＧ助かりま～す♪」
line = "「今日はカイチョーと一緒に海の家のお手伝い、頑張ってくれるって聞きマシタ！　ＢＩＧ助かりま～す♪」"

[[dialogue]]
speaker = "セドナ"
# 「ああ。よろしく頼む。して、私は何をすればいい？」
line = "「ああ。よろしく頼む。して、私は何をすればいい？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　もうすぐお客さん、イッパイ来ます！　ワタシは料理を作るので、フロアの方をお願いしま～す♪」
line = "「ハイ！　もうすぐお客さん、イッパイ来ます！　ワタシは料理を作るので、フロアの方をお願いしま～す♪」"

[[dialogue]]
speaker = "セドナ"
# 「給仕か。初めての試みだが、心得た」
line = "「給仕か。初めての試みだが、心得た」"

[[dialogue]]
speaker = "リップル"
# 「では、ワタシは仕込みがあるので失礼しま～す！　詳しいことはカイチョーに聞いてクダサイ！」
line = "「では、ワタシは仕込みがあるので失礼しま～す！　詳しいことはカイチョーに聞いてクダサイ！」"

[[dialogue]]
speaker = "セドナ"
# 「で、フロアの業務は……なるほどな。やってきた客の注文を伝票に書き、リップルに伝えればいいのか。承知した」
line = "「で、フロアの業務は……なるほどな。やってきた客の注文を伝票に書き、リップルに伝えればいいのか。承知した」"

[[dialogue]]
speaker = "セドナ"
# 「ではメニュー表を見せろ。ふむ──この内容ならば３分ですべて記憶できる」
line = "「ではメニュー表を見せろ。ふむ──この内容ならば３分ですべて記憶できる」"

[[dialogue]]
speaker = "セドナ"
# 「ああそうだ、お前。ここの目玉の商品はなんだ。男と女で頼むメニューに偏りはあるか？」
line = "「ああそうだ、お前。ここの目玉の商品はなんだ。男と女で頼むメニューに偏りはあるか？」"

[[dialogue]]
speaker = "セドナ"
# 「客からオススメを問われた際は何と答えればいい？　あとは、そうだな。店員にノルマなどあれば聞いておきたい」
line = "「客からオススメを問われた際は何と答えればいい？　あとは、そうだな。店員にノルマなどあれば聞いておきたい」"

[[dialogue]]
speaker = "unk"
# 店員が最も気を付けることは……
line = "店員が最も気を付けることは……"

[[dialogue]]
speaker = "unk"
# それも大切ですけれど
line = "それも大切ですけれど"

[[dialogue]]
speaker = "セドナ"
# 「……接客スマイル？　ああ、わかった。笑顔だな。了解した」
line = "「……接客スマイル？　ああ、わかった。笑顔だな。了解した」"

[[dialogue]]
speaker = "セドナ"
# 「何？　試しに笑ってみろ、だと？　まあ、構わんが──」
line = "「何？　試しに笑ってみろ、だと？　まあ、構わんが──」"

[[dialogue]]
speaker = "セドナ"
# 「──フッ」
line = "「──フッ」"

[[dialogue]]
speaker = "unk"
# もうちょっとニッコリお願いします
line = "もうちょっとニッコリお願いします"

[[dialogue]]
speaker = "セドナ"
# 「なんだと……？　これ以上、どう笑えというんだ？　もう十分に笑顔を作っているだろう」
line = "「なんだと……？　これ以上、どう笑えというんだ？　もう十分に笑顔を作っているだろう」"

[[dialogue]]
speaker = "セドナ"
# 「表情が硬い？　馬鹿な……今でもかなり笑っているつもりなんだが……」
line = "「表情が硬い？　馬鹿な……今でもかなり笑っているつもりなんだが……」"

[[dialogue]]
speaker = "セドナ"
# 「開店までまだ間がある……？　そ、そうだな。できる限り練習してみよう……」
line = "「開店までまだ間がある……？　そ、そうだな。できる限り練習してみよう……」"

[[dialogue]]
speaker = "unk"
# こうしてセドナさんの、海の家でのアルバイト体験が始まった。
line = "こうしてセドナさんの、海の家でのアルバイト体験が始まった。"

[[dialogue]]
speaker = "unk"
# しかし、笑顔の表情を何回作ってみても、どこかぎこちない、硬い表情になってしまうのだった……
line = "しかし、笑顔の表情を何回作ってみても、どこかぎこちない、硬い表情になってしまうのだった……"
