[[dialogue]]
speaker = "unk"
# 第２話,双子の絆,B
line = "第２話,双子の絆,B"

[[dialogue]]
speaker = "ギエル"
# 「──そうです！　あなた様こそがアポロ！　この世界の英雄にして、私を救いたもうた救世主に他なりません！」
line = "「──そうです！　あなた様こそがアポロ！　この世界の英雄にして、私を救いたもうた救世主に他なりません！」"

[[dialogue]]
speaker = "エリシア"
# 「っつ────！！」
line = "「っつ────！！」"

[[dialogue]]
speaker = "クロト"
# 「ギエル──！」
line = "「ギエル──！」"

[[dialogue]]
speaker = "ギエル"
# 「フフフ、少々遅れを取ってしまいましたが。まだ戦闘は終わっていないというのに、呆けているのは感心しませんねえ」
line = "「フフフ、少々遅れを取ってしまいましたが。まだ戦闘は終わっていないというのに、呆けているのは感心しませんねえ」"

[[dialogue]]
speaker = "unk"
# アポロと挟み撃ちするように、ギエルが攻撃を仕掛けてきた。
line = "アポロと挟み撃ちするように、ギエルが攻撃を仕掛けてきた。"

[[dialogue]]
speaker = "unk"
# 衝撃を逸らすも、真横に吹き飛ばされてしまったフィオナを受け止めて抱える。
line = "衝撃を逸らすも、真横に吹き飛ばされてしまったフィオナを受け止めて抱える。"

[[dialogue]]
speaker = "クロト"
# 「大丈夫だったか──フィオナ。いや、エリシア」
line = "「大丈夫だったか──フィオナ。いや、エリシア」"

[[dialogue]]
speaker = "エリシア"
# 「緋宮、会長……あ、ありがとうございます」
line = "「緋宮、会長……あ、ありがとうございます」"

[[dialogue]]
speaker = "unk"
# 抱きかかえた彼女がこちらを見上げる。
line = "抱きかかえた彼女がこちらを見上げる。"

[[dialogue]]
speaker = "unk"
# その眼には、不安と戸惑いも混じっていた。
line = "その眼には、不安と戸惑いも混じっていた。"

[[dialogue]]
speaker = "クロト"
# 「──大丈夫だ。俺たちにとって、君は君……仲間であることに変わりはない」
line = "「──大丈夫だ。俺たちにとって、君は君……仲間であることに変わりはない」"

[[dialogue]]
speaker = "クロト"
# 「正直、まだ理解は追いついてないけどな。そのへんは後で聞かせてもらおう」
line = "「正直、まだ理解は追いついてないけどな。そのへんは後で聞かせてもらおう」"

[[dialogue]]
speaker = "エリシア"
# 「緋宮会長……はい。ありがとうございます」
line = "「緋宮会長……はい。ありがとうございます」"

[[dialogue]]
speaker = "unk"
# フィオナが地に降りると、俺たちは再び彼らと向かい合う格好となった。
line = "フィオナが地に降りると、俺たちは再び彼らと向かい合う格好となった。"

[[dialogue]]
speaker = "アポロ"
# 「ふう……いいぞギエル、よくやった」
line = "「ふう……いいぞギエル、よくやった」"

[[dialogue]]
speaker = "ギエル"
# 「いえいえ。主の危機に馳せ参じるのは従者として当然でございます」
line = "「いえいえ。主の危機に馳せ参じるのは従者として当然でございます」"

[[dialogue]]
speaker = "ギエル"
# 「あなた様はアポロ。魔王を倒し、世界を救うヒーローに他なりません。でしょう？」
line = "「あなた様はアポロ。魔王を倒し、世界を救うヒーローに他なりません。でしょう？」"

[[dialogue]]
speaker = "アポロ"
# 「ああ──その通りだ。危うく、大義を忘れるところだったぞ」
line = "「ああ──その通りだ。危うく、大義を忘れるところだったぞ」"

[[dialogue]]
speaker = "unk"
# アポロの様子はいくらか落ち着き、仮面を装着している頃のテンションに戻りかけていた。
line = "アポロの様子はいくらか落ち着き、仮面を装着している頃のテンションに戻りかけていた。"

[[dialogue]]
speaker = "ユウリ"
# 「あの野郎……なんか余計なこと吹き込んでねえか」
line = "「あの野郎……なんか余計なこと吹き込んでねえか」"

[[dialogue]]
speaker = "アナ"
# 「あちらの関係も気にかかりますが──」
line = "「あちらの関係も気にかかりますが──」"

[[dialogue]]
speaker = "unk"
# 乱入してきたギエルは訳知り顔で、こちらへと語りかける。
line = "乱入してきたギエルは訳知り顔で、こちらへと語りかける。"

[[dialogue]]
speaker = "ギエル"
# 「……ククク。化けの皮が剥がれたというならあなたも同じでしょう、星見のご令嬢」
line = "「……ククク。化けの皮が剥がれたというならあなたも同じでしょう、星見のご令嬢」"

[[dialogue]]
speaker = "エリシア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ギエル"
# 「まあ無理もありませんか！　五年前──『魔王』を志すも虚しく昏睡状態に陥ってしまった双子の姉の姿が、そのまま暴れているとあってはねぇ」
line = "「まあ無理もありませんか！　五年前──『魔王』を志すも虚しく昏睡状態に陥ってしまった双子の姉の姿が、そのまま暴れているとあってはねぇ」"

[[dialogue]]
speaker = "エリシア"
# 「あなた……何？」
line = "「あなた……何？」"

[[dialogue]]
speaker = "unk"
# そのおどけた様子に、彼女は冷徹に問いかけた。
line = "そのおどけた様子に、彼女は冷徹に問いかけた。"

[[dialogue]]
speaker = "エリシア"
# 「あなたは……あなたは何を、どこまで知っているのです？」
line = "「あなたは……あなたは何を、どこまで知っているのです？」"

[[dialogue]]
speaker = "エリシア"
# 「私は──姉さんとは幼い頃からずっと一緒でした。ですが、あなたのことはこれっぽっちも存じません」
line = "「私は──姉さんとは幼い頃からずっと一緒でした。ですが、あなたのことはこれっぽっちも存じません」"

[[dialogue]]
speaker = "エリシア"
# 「もし、あなたが姉さんを焚きつけているのなら──私は決して許せません」
line = "「もし、あなたが姉さんを焚きつけているのなら──私は決して許せません」"

[[dialogue]]
speaker = "ギエル"
# 「何、私はただの人間ですとも。この偉大なる救世主──アポロ様に目を覚ましてもらった、ね」
line = "「何、私はただの人間ですとも。この偉大なる救世主──アポロ様に目を覚ましてもらった、ね」"

[[dialogue]]
speaker = "アポロ"
# 「フン」
line = "「フン」"

[[dialogue]]
speaker = "unk"
# 慇懃にアポロを敬うギエル──
line = "慇懃にアポロを敬うギエル──"

[[dialogue]]
speaker = "unk"
# 彼の忠誠心は確かに本物のようで、それが余計に関係のいびつさを浮き彫りにさせる。
line = "彼の忠誠心は確かに本物のようで、それが余計に関係のいびつさを浮き彫りにさせる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王……？　双子の姉……？　気になるワードが多すぎてついていけないわ……！」
line = "「魔王……？　双子の姉……？　気になるワードが多すぎてついていけないわ……！」"

[[dialogue]]
speaker = "アナ"
# 「双子──面影は見られますね。アポロと、流星会長──」
line = "「双子──面影は見られますね。アポロと、流星会長──」"

[[dialogue]]
speaker = "unk"
# 仮面の剥がれたアポロ。
line = "仮面の剥がれたアポロ。"

[[dialogue]]
speaker = "unk"
# 俺たちがフィオナだと思っていたエリシア。
line = "俺たちがフィオナだと思っていたエリシア。"

[[dialogue]]
speaker = "unk"
# ２人の顔立ちは似通っており、同じ血が流れているとしても確かに納得のいくものがある。
line = "２人の顔立ちは似通っており、同じ血が流れているとしても確かに納得のいくものがある。"

[[dialogue]]
speaker = "unk"
# ただ……
line = "ただ……"

[[dialogue]]
speaker = "ルリエル"
# 「双子さんなのに、全然学年が違うように見えると申しますか……！」
line = "「双子さんなのに、全然学年が違うように見えると申しますか……！」"

[[dialogue]]
speaker = "エリシア"
# 「それは、姉の成長が５年前で止まっているためです」
line = "「それは、姉の成長が５年前で止まっているためです」"

[[dialogue]]
speaker = "エリシア"
# 「意識を失い、覚めない眠りについてしまった、あの日から……ずっと」
line = "「意識を失い、覚めない眠りについてしまった、あの日から……ずっと」"

[[dialogue]]
speaker = "クロト"
# （っ──なんだ……？）
line = "（っ──なんだ……？）"

[[dialogue]]
speaker = "unk"
# 一瞬──
line = "一瞬──"

[[dialogue]]
speaker = "unk"
# 俺の頭の中に見知らぬ少女の姿が湧き上がってきた。
line = "俺の頭の中に見知らぬ少女の姿が湧き上がってきた。"

[[dialogue]]
speaker = "unk"
# まさか覚えがあるわけでもないというのに──
line = "まさか覚えがあるわけでもないというのに──"

[[dialogue]]
speaker = "エリシア"
# 「最初は……誰かが姉さんの姿を騙っているのかと、思っていました」
line = "「最初は……誰かが姉さんの姿を騙っているのかと、思っていました」"

[[dialogue]]
speaker = "エリシア"
# 「本物の姉さんは……今も眠っているはずですから」
line = "「本物の姉さんは……今も眠っているはずですから」"

[[dialogue]]
speaker = "ニャリオン"
# 「そ……そうニャ！　本物のフィオナ嬢はずっと意識不明のままニャン、これは間違いないニャン！」
line = "「そ……そうニャ！　本物のフィオナ嬢はずっと意識不明のままニャン、これは間違いないニャン！」"

[[dialogue]]
speaker = "unk"
# ５年前寝たきりになったはずの姉──
line = "５年前寝たきりになったはずの姉──"

[[dialogue]]
speaker = "unk"
# その立場を継いで『フィオナ』として生きていくことを決めた彼女の前に、その姿そのものが現れたのだ。
line = "その立場を継いで『フィオナ』として生きていくことを決めた彼女の前に、その姿そのものが現れたのだ。"

[[dialogue]]
speaker = "unk"
# 心中穏やかでないのも頷ける。
line = "心中穏やかでないのも頷ける。"

[[dialogue]]
speaker = "エリシア"
# 「──ですが」
line = "「──ですが」"

[[dialogue]]
speaker = "エリシア"
# 「こうして──言葉を交わして確信しました。彼女は本物──いえ、少なくとも本物が<b>混じっている</b>」
line = "「こうして──言葉を交わして確信しました。彼女は本物──いえ、少なくとも本物が<b>混じっている</b>」"

[[dialogue]]
speaker = "エリシア"
# 「そして……それならなおのこと許せない！」
line = "「そして……それならなおのこと許せない！」"

[[dialogue]]
speaker = "エリシア"
# 「姉さんは……姉さんは、あんなことする人じゃありませんでした。決して！」
line = "「姉さんは……姉さんは、あんなことする人じゃありませんでした。決して！」"

[[dialogue]]
speaker = "ギエル"
# 「──などと仰っておられますが、アポロ様？」
line = "「──などと仰っておられますが、アポロ様？」"

[[dialogue]]
speaker = "アポロ"
# 「……フン。ヨマイゴトだな」
line = "「……フン。ヨマイゴトだな」"

[[dialogue]]
speaker = "unk"
# エリシアの弁を最後まで聞き届けて──
line = "エリシアの弁を最後まで聞き届けて──"

[[dialogue]]
speaker = "unk"
# アポロは、偉そうに両腕を組んだ。
line = "アポロは、偉そうに両腕を組んだ。"

[[dialogue]]
speaker = "アポロ"
# 「あたしは正義のヒーロー──アポロだ。他の名はない」
line = "「あたしは正義のヒーロー──アポロだ。他の名はない」"

[[dialogue]]
speaker = "エリシア"
# 「嘘です。ならなぜ私の本名を知っていたのですか」
line = "「嘘です。ならなぜ私の本名を知っていたのですか」"

[[dialogue]]
speaker = "アポロ"
# 「たまたまだ」
line = "「たまたまだ」"

[[dialogue]]
speaker = "エリシア"
# 「欺瞞ですね。あなたは、自分をも偽ろうとしている」
line = "「欺瞞ですね。あなたは、自分をも偽ろうとしている」"

[[dialogue]]
speaker = "エリシア"
# 「『流星ライダーアポロ』だって、私と姉が欠かさず観ていた番組です。姉さんは、誰よりアポロが好きでした」
line = "「『流星ライダーアポロ』だって、私と姉が欠かさず観ていた番組です。姉さんは、誰よりアポロが好きでした」"

[[dialogue]]
speaker = "ヴィーナス"
# （え、フィオナ……あの番組知ってたんだ……？）
line = "（え、フィオナ……あの番組知ってたんだ……？）"

[[dialogue]]
speaker = "unk"
# フィオナにはずっと『アポロ』の名に引っかかるものがあったのかもしれない。
line = "フィオナにはずっと『アポロ』の名に引っかかるものがあったのかもしれない。"

[[dialogue]]
speaker = "unk"
# 仮面の上からでも彼女の存在を確信できるほどに。
line = "仮面の上からでも彼女の存在を確信できるほどに。"

[[dialogue]]
speaker = "エリシア"
# 「２人でごっこ遊びをしていたのを覚えていますか？　そんなのは男の子のやることだと、父に小言を言われたのも」
line = "「２人でごっこ遊びをしていたのを覚えていますか？　そんなのは男の子のやることだと、父に小言を言われたのも」"

[[dialogue]]
speaker = "アポロ"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "エリシア"
# 「思い出せるはずです。どんなに時が経っても──姉さんは姉さんですから」
line = "「思い出せるはずです。どんなに時が経っても──姉さんは姉さんですから」"

[[dialogue]]
speaker = "unk"
# フィオナの眼からは怒りが消えていた。
line = "フィオナの眼からは怒りが消えていた。"

[[dialogue]]
speaker = "unk"
# アポロを姉であると確信し、そこからの希望をすでに見出している。
line = "アポロを姉であると確信し、そこからの希望をすでに見出している。"

[[dialogue]]
speaker = "unk"
# つまり──
line = "つまり──"

[[dialogue]]
speaker = "エリシア"
# 「解き放ってみせます──私が。姉さんを、そんな姿に変えてしまった、呪いから」
line = "「解き放ってみせます──私が。姉さんを、そんな姿に変えてしまった、呪いから」"

[[dialogue]]
speaker = "アポロ"
# 「ッッ……！！」
line = "「ッッ……！！」"

[[dialogue]]
speaker = "unk"
# ためらうことなくアポロを見据える瞳──
line = "ためらうことなくアポロを見据える瞳──"

[[dialogue]]
speaker = "unk"
# それは妹による、救済の宣戦布告だった。
line = "それは妹による、救済の宣戦布告だった。"
