[[dialogue]]
speaker = "unk"
# 第２話,学園対抗杯とまだ見ぬライバル,P
line = "第２話,学園対抗杯とまだ見ぬライバル,P"

[[dialogue]]
speaker = "unk"
# とある放課後、新星寮の近くを通りかかると、マハムート先輩とフィオナが話しているのを見かけた。
line = "とある放課後、新星寮の近くを通りかかると、マハムート先輩とフィオナが話しているのを見かけた。"

[[dialogue]]
speaker = "マハムート"
# 「ん……？　あら、会長じゃない」
line = "「ん……？　あら、会長じゃない」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長、こんにちは。お邪魔してます」
line = "「緋宮会長、こんにちは。お邪魔してます」"

[[dialogue]]
speaker = "unk"
# こんにちは。２人で何を話してたの？
line = "こんにちは。２人で何を話してたの？"

[[dialogue]]
speaker = "マハムート"
# 「『学園対抗杯』のことについて話してたのよ。流星寮はどんな調子かってね」
line = "「『学園対抗杯』のことについて話してたのよ。流星寮はどんな調子かってね」"

[[dialogue]]
speaker = "マハムート"
# 「前にも話したけど、『学園対抗杯』を通じて、流星学園と新星学園はお互いに切磋琢磨し合っているの」
line = "「前にも話したけど、『学園対抗杯』を通じて、流星学園と新星学園はお互いに切磋琢磨し合っているの」"

[[dialogue]]
speaker = "unk"
# そういえば、学園対抗杯の内容って？
line = "そういえば、学園対抗杯の内容って？"

[[dialogue]]
speaker = "マハムート"
# 「会長の仕事を覚えるので忙しくて、『学園対抗杯』まで気が回らなかったって顔ね」
line = "「会長の仕事を覚えるので忙しくて、『学園対抗杯』まで気が回らなかったって顔ね」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ仕方ないわね、教えてあげるわ。畏怖をもって感謝なさい」
line = "「やれやれ仕方ないわね、教えてあげるわ。畏怖をもって感謝なさい」"

[[dialogue]]
speaker = "マハムート"
# 「私たちは普段、アステラが出現するたびに出動しているでしょう？　星徒会は直接アステラへ、その他のプリマステラは外に出たモンスターの掃討を行っている」
line = "「私たちは普段、アステラが出現するたびに出動しているでしょう？　星徒会は直接アステラへ、その他のプリマステラは外に出たモンスターの掃討を行っている」"

[[dialogue]]
speaker = "マハムート"
# 「出現モンスターの種類や討伐数は学園の分析官によって、しっかり記録を付けられているというのは、星徒会の仕事をしているアナタなら知っているわね？」
line = "「出現モンスターの種類や討伐数は学園の分析官によって、しっかり記録を付けられているというのは、星徒会の仕事をしているアナタなら知っているわね？」"

[[dialogue]]
speaker = "マハムート"
# 「その戦績を、新星学園と流星学園に振り分けて競うのが『学園対抗杯』よ」
line = "「その戦績を、新星学園と流星学園に振り分けて競うのが『学園対抗杯』よ」"

[[dialogue]]
speaker = "フィオナ"
# 「『学園対抗杯』は毎年行われていて、１年ごとに結果が発表されます」
line = "「『学園対抗杯』は毎年行われていて、１年ごとに結果が発表されます」"

[[dialogue]]
speaker = "フィオナ"
# 「普段の戦績以外にも、いくつか成績が加点される年間行事があったりして、それらの成績も加味して、総合成績が出される形です」
line = "「普段の戦績以外にも、いくつか成績が加点される年間行事があったりして、それらの成績も加味して、総合成績が出される形です」"

[[dialogue]]
speaker = "マハムート"
# 「『学園対抗杯』は私のように強くこだわっている生徒もいれば、特に気にしていない生徒も居るけれど、寮生は概ねこだわっているわね」
line = "「『学園対抗杯』は私のように強くこだわっている生徒もいれば、特に気にしていない生徒も居るけれど、寮生は概ねこだわっているわね」"

[[dialogue]]
speaker = "マハムート"
# 「それは、『学園対抗杯』の成績で次年度の寮の予算が大きく変動するからよ」
line = "「それは、『学園対抗杯』の成績で次年度の寮の予算が大きく変動するからよ」"

[[dialogue]]
speaker = "マハムート"
# 「会長もこの前、新星寮と流星寮の設備格差を見たでしょう？」
line = "「会長もこの前、新星寮と流星寮の設備格差を見たでしょう？」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、あれは……元寮長のＯＧが、流星寮を愛する余り暴走した結果と言いますか……」
line = "「あ、あれは……元寮長のＯＧが、流星寮を愛する余り暴走した結果と言いますか……」"

[[dialogue]]
speaker = "フィオナ"
# 「資産家の本気って凄いですよね……あはは」
line = "「資産家の本気って凄いですよね……あはは」"

[[dialogue]]
speaker = "マハムート"
# 「とにかく、今年こそヒルディオーネのやつをギャフンと言わせてやるわ！」
line = "「とにかく、今年こそヒルディオーネのやつをギャフンと言わせてやるわ！」"

[[dialogue]]
speaker = "unk"
# ヒルディオーネ？
line = "ヒルディオーネ？"

[[dialogue]]
speaker = "フィオナ"
# 「流星寮の寮長<ruby=エトワール・イルソーレ>『白昼の極星』</ruby>の称号を持つ、流星学園の３年生です」
line = "「流星寮の寮長<ruby>『白昼の極星』<rt>エトワール・イルソーレ</rt></ruby>の称号を持つ、流星学園の３年生です」"

[[dialogue]]
speaker = "マハムート"
# 「<ruby=せんおんじ>千園寺</ruby>ヒルディオーネ。認めたくないけど、寮長のアイツのお陰で、流星寮が２年連続の勝利をもぎ取っていることは事実よ」
line = "「<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネ。認めたくないけど、寮長のアイツのお陰で、流星寮が２年連続の勝利をもぎ取っていることは事実よ」"

[[dialogue]]
speaker = "マハムート"
# 「寮長に選ばれるだけあって、星徒会長のフィオナにも匹敵する実力者よ」
line = "「寮長に選ばれるだけあって、星徒会長のフィオナにも匹敵する実力者よ」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、それどころか……もしヒルディオーネさんが寮長ではなく星徒会を選んでいたら、会長は私ではなかったかもしれません」
line = "「いえ、それどころか……もしヒルディオーネさんが寮長ではなく星徒会を選んでいたら、会長は私ではなかったかもしれません」"

[[dialogue]]
speaker = "unk"
# そんなに強いの！？
line = "そんなに強いの！？"

[[dialogue]]
speaker = "マハムート"
# 「言っておくけど、私の方が強いわよ。直接対決はまだしたことないけれど……ヴィーナスやアナタにも、最強の座を譲るつもりはないわ」
line = "「言っておくけど、私の方が強いわよ。直接対決はまだしたことないけれど……ヴィーナスやアナタにも、最強の座を譲るつもりはないわ」"

[[dialogue]]
speaker = "マハムート"
# 「<ruby=エトワール・ラルーナ>宵闇の極星</ruby>という称号は伊達じゃないと言ったでしょう？」
line = "「<ruby>宵闇の極星<rt>エトワール・ラルーナ</rt></ruby>という称号は伊達じゃないと言ったでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「寮長というのは、寮生達から選ばれた『最強』だということよ。頭に刻み込んでおきなさい」
line = "「寮長というのは、寮生達から選ばれた『最強』だということよ。頭に刻み込んでおきなさい」"

[[dialogue]]
speaker = "フィオナ"
# 「ヒルディオーネさんもただ強いだけではなく、流星学園では模範生として尊敬も集めていて、寮生からは『お姉様』と慕われているんですよ」
line = "「ヒルディオーネさんもただ強いだけではなく、流星学園では模範生として尊敬も集めていて、寮生からは『お姉様』と慕われているんですよ」"

[[dialogue]]
speaker = "マハムート"
# 「後はそうね……特徴を一言で表すなら──」
line = "「後はそうね……特徴を一言で表すなら──」"

[[dialogue]]
speaker = "マハムート"
# 「ズバリ、『ドリル』ね」
line = "「ズバリ、『ドリル』ね」"

[[dialogue]]
speaker = "unk"
# なんて？
line = "なんて？"

[[dialogue]]
speaker = "マハムート"
# 「ドリルよ。回転しながら穴を開けるやつ」
line = "「ドリルよ。回転しながら穴を開けるやつ」"

[[dialogue]]
speaker = "マハムート"
# 「まあ、そのうち嫌でも顔を合わせることになるでしょうし、実際に会ってみればすぐわかるわ」
line = "「まあ、そのうち嫌でも顔を合わせることになるでしょうし、実際に会ってみればすぐわかるわ」"

[[dialogue]]
speaker = "フィオナ"
# 「ヒルディオーネさん、星騎士としては何となく緋宮会長に似ているかもしれませんね」
line = "「ヒルディオーネさん、星騎士としては何となく緋宮会長に似ているかもしれませんね」"

[[dialogue]]
speaker = "フィオナ"
# 「ひょっとしたら、意気投合するかもしれません」
line = "「ひょっとしたら、意気投合するかもしれません」"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マハムート"
# 「会長、一応言っておくけれど」
line = "「会長、一応言っておくけれど」"

[[dialogue]]
speaker = "マハムート"
# 「アナタはあくまで新星学園の星徒会長。流星寮の寮長と会っても、くれぐれも仲良くし過ぎないように」
line = "「アナタはあくまで新星学園の星徒会長。流星寮の寮長と会っても、くれぐれも仲良くし過ぎないように」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ、だそうです。マムは、ヒルディオーネさんに個人的なライバル意識を持っているんですよ」
line = "「ふふっ、だそうです。マムは、ヒルディオーネさんに個人的なライバル意識を持っているんですよ」"

[[dialogue]]
speaker = "マハムート"
# 「会長、戯言を言うそこのお隣さんとも、仲良くしなくていいわよ」
line = "「会長、戯言を言うそこのお隣さんとも、仲良くしなくていいわよ」"

[[dialogue]]
speaker = "フィオナ"
# 「えぇっ！？　そんな～！」
line = "「えぇっ！？　そんな～！」"

[[dialogue]]
speaker = "マハムート"
# 「あら、どちら様だったかしら？　流星学園のお嬢さん」
line = "「あら、どちら様だったかしら？　流星学園のお嬢さん」"

[[dialogue]]
speaker = "フィオナ"
# 「そんなこと言わないで、許して下さいよ、マム～！」
line = "「そんなこと言わないで、許して下さいよ、マム～！」"

[[dialogue]]
speaker = "unk"
# そんな風に先輩とじゃれ付くフィオナの姿は新鮮で、何だかんだ仲良げな２人に、俺は思わず笑ってしまうのだった。
line = "そんな風に先輩とじゃれ付くフィオナの姿は新鮮で、何だかんだ仲良げな２人に、俺は思わず笑ってしまうのだった。"
