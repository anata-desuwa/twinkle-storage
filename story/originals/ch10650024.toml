[[dialogue]]
speaker = "unk"
# 第４話,聖女とクリスマスデート,P
line = "第４話,聖女とクリスマスデート,P"

[[dialogue]]
speaker = "イレーナ"
# 「皆さまの多大なる献身と祈りに、女神様に代わって感謝を。これからもシスターとして迷える子羊たちを導いてあげてください」
line = "「皆さまの多大なる献身と祈りに、女神様に代わって感謝を。これからもシスターとして迷える子羊たちを導いてあげてください」"

[[dialogue]]
speaker = "イレーナ"
# 「ふー、終わった終わった。どうして各地の教会のシスターをあたしが激励してやんなきゃいけないのかしら」
line = "「ふー、終わった終わった。どうして各地の教会のシスターをあたしが激励してやんなきゃいけないのかしら」"

[[dialogue]]
speaker = "イレーナ"
# 「おかげでせっかくのクリスマスが台無しよ。何が悲しくて朝から晩までずっと教会をはしごしなくちゃなんないのよ」
line = "「おかげでせっかくのクリスマスが台無しよ。何が悲しくて朝から晩までずっと教会をはしごしなくちゃなんないのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「でも助かったわ。あたし、まだこの辺の地理を完全に覚えてなくて。１人だったらたぶん迷子になっちゃってたと思う」
line = "「でも助かったわ。あたし、まだこの辺の地理を完全に覚えてなくて。１人だったらたぶん迷子になっちゃってたと思う」"

[[dialogue]]
speaker = "イレーナ"
# 「だけど、その……。あんたは良かったの？　せっかくのクリスマスなのにあたしなんかと一日過ごす羽目になっちゃって」
line = "「だけど、その……。あんたは良かったの？　せっかくのクリスマスなのにあたしなんかと一日過ごす羽目になっちゃって」"

[[dialogue]]
speaker = "unk"
# 特に予定もなかったから
line = "特に予定もなかったから"

[[dialogue]]
speaker = "イレーナ"
# 「そ、そう。色んな女の子に粉かけて回ってる割にはモテないのね」
line = "「そ、そう。色んな女の子に粉かけて回ってる割にはモテないのね」"

[[dialogue]]
speaker = "イレーナ"
# 「なら、その……このまま軽く街中でも散歩しない？」
line = "「なら、その……このまま軽く街中でも散歩しない？」"

[[dialogue]]
speaker = "unk"
# もしかしてデートのお誘い？
line = "もしかしてデートのお誘い？"

[[dialogue]]
speaker = "イレーナ"
# 「ち、違うわよ！　変な勘違いしないで。少しでも普通にクリスマスを楽しみたいと思っただけよっ」
line = "「ち、違うわよ！　変な勘違いしないで。少しでも普通にクリスマスを楽しみたいと思っただけよっ」"

[[dialogue]]
speaker = "イレーナ"
# 「これだけ人が大勢いたら、あたしが聖女だってこともバレないだろうし。あんたと一緒なら……その。あたしも無駄にキャラ作んなくてもいいし」
line = "「これだけ人が大勢いたら、あたしが聖女だってこともバレないだろうし。あんたと一緒なら……その。あたしも無駄にキャラ作んなくてもいいし」"

[[dialogue]]
speaker = "イレーナ"
# 「一応、一日付き合わせちゃったお礼も兼ねてというか……。あたしなんかと回っても面白くないかもだけど……」
line = "「一応、一日付き合わせちゃったお礼も兼ねてというか……。あたしなんかと回っても面白くないかもだけど……」"

[[dialogue]]
speaker = "unk"
# 楽しいクリスマスになりそうだ
line = "楽しいクリスマスになりそうだ"

[[dialogue]]
speaker = "イレーナ"
# 「バっ──！？　もうっ。変にハードル上げるなっての。こちとら聖女になって以来ずっと教会で、クリスマスは祈ってばっかりだったんだから」
line = "「バっ──！？　もうっ。変にハードル上げるなっての。こちとら聖女になって以来ずっと教会で、クリスマスは祈ってばっかりだったんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「でもまぁ、そこまで言うなら今夜はトコトン付き合ってもらうわよ？　あたし、やってみたいことたくさんあるんだから」
line = "「でもまぁ、そこまで言うなら今夜はトコトン付き合ってもらうわよ？　あたし、やってみたいことたくさんあるんだから」"

[[dialogue]]
speaker = "イレーナ"
# 「手始めにアレねっ。向こうの広場にスケートリンクが作られてるらしいわっ」
line = "「手始めにアレねっ。向こうの広場にスケートリンクが作られてるらしいわっ」"

[[dialogue]]
speaker = "イレーナ"
# 「ほーらボサっとしてないで早く行くわよっ」
line = "「ほーらボサっとしてないで早く行くわよっ」"

[[dialogue]]
speaker = "イレーナ"
# 「スケートが終わったら今度はゲーセンよ！　一度でいいから<ruby=きょうたい>筐体</ruby>の格ゲーを遊んでみたかったのっ♪」
line = "「スケートが終わったら今度はゲーセンよ！　一度でいいから<ruby>筐体<rt>きょうたい</rt></ruby>の格ゲーを遊んでみたかったのっ♪」"

[[dialogue]]
speaker = "イレーナ"
# 「ん～……！　楽しかったぁ～！　かなり満足できたかも♪」
line = "「ん～……！　楽しかったぁ～！　かなり満足できたかも♪」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたの無様な姿も、ふふ、たくさん見られたしね。スケート下手すぎでしょ。終始転びっぱなしだったじゃない」
line = "「あんたの無様な姿も、ふふ、たくさん見られたしね。スケート下手すぎでしょ。終始転びっぱなしだったじゃない」"

[[dialogue]]
speaker = "イレーナ"
# 「このクレープも、はむ……♪　美味しいじゃない。食べ歩きするのなんて何年振りかしら♪　クリスマスさまさまね♪」
line = "「このクレープも、はむ……♪　美味しいじゃない。食べ歩きするのなんて何年振りかしら♪　クリスマスさまさまね♪」"

[[dialogue]]
speaker = "イレーナ"
# 「まぁ行く先々であんたとカップル扱いされたのは癪だったけど……。そうだ。ゲーセンで撮らされた写真、ちゃんと処分しときなさいよね？」
line = "「まぁ行く先々であんたとカップル扱いされたのは癪だったけど……。そうだ。ゲーセンで撮らされた写真、ちゃんと処分しときなさいよね？」"

[[dialogue]]
speaker = "イレーナ"
# 「あれは５プレイ分無料になるって言うから仕方なく撮ってあげただけなんだから。くれぐれもＤＩＳＣとかに貼るんじゃないわよ？　絶対だからねっ？」
line = "「あれは５プレイ分無料になるって言うから仕方なく撮ってあげただけなんだから。くれぐれもＤＩＳＣとかに貼るんじゃないわよ？　絶対だからねっ？」"

[[dialogue]]
speaker = "イレーナ"
# 「……でも本当に楽しかったわ。一緒にスケートしたり、ゲーセンで遊んだり、クレープ食べたり……」
line = "「……でも本当に楽しかったわ。一緒にスケートしたり、ゲーセンで遊んだり、クレープ食べたり……」"

[[dialogue]]
speaker = "イレーナ"
# 「こんなクリスマスを送れる日が来るなんて夢にも思ってなかった。おかげで少しの間だけど、普通の女の子に戻れた気がするわ」
line = "「こんなクリスマスを送れる日が来るなんて夢にも思ってなかった。おかげで少しの間だけど、普通の女の子に戻れた気がするわ」"

[[dialogue]]
speaker = "イレーナ"
# 「だけどそろそろ聖女に戻らなくちゃ。夜は大聖堂でミサがあるし……あんたも家に帰してあげなきゃね」
line = "「だけどそろそろ聖女に戻らなくちゃ。夜は大聖堂でミサがあるし……あんたも家に帰してあげなきゃね」"

[[dialogue]]
speaker = "イレーナ"
# 「今日は付き合ってくれてありがと……。色々と感謝してるわ……。今夜のことだけじゃなくて普段からも……」
line = "「今日は付き合ってくれてありがと……。色々と感謝してるわ……。今夜のことだけじゃなくて普段からも……」"

[[dialogue]]
speaker = "イレーナ"
# 「そのお礼ってわけじゃないけど、ええと……」
line = "「そのお礼ってわけじゃないけど、ええと……」"

[[dialogue]]
speaker = "イレーナ"
# 「～～っっ。や、やっぱなんでもないわっ。はい、今夜は解散！　帰った帰ったっ！　いいから帰りなさいってば──」
line = "「～～っっ。や、やっぱなんでもないわっ。はい、今夜は解散！　帰った帰ったっ！　いいから帰りなさいってば──」"

[[dialogue]]
speaker = "イレーナ"
# 「あっ……！　しまっ──……！」
line = "「あっ……！　しまっ──……！」"

[[dialogue]]
speaker = "unk"
# ポケットから何か落ちて……手袋？
line = "ポケットから何か落ちて……手袋？"

[[dialogue]]
speaker = "イレーナ"
# 「こ、ここのところ寒かったから自分用に作ったのよっ。ほらあたし、こう見えて手芸とか好きだから……！」
line = "「こ、ここのところ寒かったから自分用に作ったのよっ。ほらあたし、こう見えて手芸とか好きだから……！」"

[[dialogue]]
speaker = "イレーナ"
# 「欲しいなら……その。あんたにプレゼントしてあげてもいいけど。つい大きめに作り過ぎちゃったし……」
line = "「欲しいなら……その。あんたにプレゼントしてあげてもいいけど。つい大きめに作り過ぎちゃったし……」"

[[dialogue]]
speaker = "イレーナ"
# 「たぶん、あんたの手にぴったりだと思うわ……。た、たぶんだけどねっ。少なくともあたしがはめるにはブカブカだから」
line = "「たぶん、あんたの手にぴったりだと思うわ……。た、たぶんだけどねっ。少なくともあたしがはめるにはブカブカだから」"

[[dialogue]]
speaker = "イレーナ"
# 「だから、えと……できれば貰ってくれる？」
line = "「だから、えと……できれば貰ってくれる？」"

[[dialogue]]
speaker = "unk"
# ありがとう。大切に使うよ
line = "ありがとう。大切に使うよ"

[[dialogue]]
speaker = "イレーナ"
# 「だ、だからあんたのために作ったんじゃないってば。お礼なんか言われても困るってのっ」
line = "「だ、だからあんたのために作ったんじゃないってば。お礼なんか言われても困るってのっ」"

[[dialogue]]
speaker = "イレーナ"
# 「って、なにニヤニヤしてんのよ！　そういうところがムカつくのよ、このバカっ！」
line = "「って、なにニヤニヤしてんのよ！　そういうところがムカつくのよ、このバカっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「だから、その。機嫌直すのにもうちょっと付き合いなさいよね……。どうせ帰っても暇なんでしょ？」
line = "「だから、その。機嫌直すのにもうちょっと付き合いなさいよね……。どうせ帰っても暇なんでしょ？」"

[[dialogue]]
speaker = "イレーナ"
# 「あたし、パネットーネが食べたいわ。そら、とっとと店探す。急がなきゃお店閉まっちゃうでしょうに！」
line = "「あたし、パネットーネが食べたいわ。そら、とっとと店探す。急がなきゃお店閉まっちゃうでしょうに！」"

[[dialogue]]
speaker = "イレーナ"
# 「せっかくのクリスマスだもの。もう少しだけ、その……普通の女の子でいたいし……」
line = "「せっかくのクリスマスだもの。もう少しだけ、その……普通の女の子でいたいし……」"

[[dialogue]]
speaker = "イレーナ"
# 「あ……そうだ。大切なこと言い忘れてたわ」
line = "「あ……そうだ。大切なこと言い忘れてたわ」"

[[dialogue]]
speaker = "イレーナ"
# 「メリークリスマス」
line = "「メリークリスマス」"

[[dialogue]]
speaker = "イレーナ"
# 「ふふ、ありがたく思いなさいよね。聖女さまから直に言われるなんて、これ以上なく贅沢なことなんだから♪」
line = "「ふふ、ありがたく思いなさいよね。聖女さまから直に言われるなんて、これ以上なく贅沢なことなんだから♪」"

[[dialogue]]
speaker = "イレーナ"
# 「ま……あんたといる今この瞬間だけは聖女じゃなくて……──だけど」
line = "「ま……あんたといる今この瞬間だけは聖女じゃなくて……──だけど」"

[[dialogue]]
speaker = "イレーナ"
# 「ふふ、なんでもないわよ。それよりパネットーネがあるお店は見つかった？　なら行くわよ」
line = "「ふふ、なんでもないわよ。それよりパネットーネがあるお店は見つかった？　なら行くわよ」"

[[dialogue]]
speaker = "イレーナ"
# 「今までロクにクリスマスを楽しめなかった分、思いっきり楽しんでやるんだからっ♪」
line = "「今までロクにクリスマスを楽しめなかった分、思いっきり楽しんでやるんだからっ♪」"
