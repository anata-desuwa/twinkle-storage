[[dialogue]]
speaker = "ウィステリア"
# 「強引だけどあの術式を応用して、リソースを工面して……制約をかければ……うん、何とかなる気がするわ！」
line = "「強引だけどあの術式を応用して、リソースを工面して……制約をかければ……うん、何とかなる気がするわ！」"

[[dialogue]]
speaker = "モネ"
# 「さすがウィステリアさん、何か方法を見つけたんですね！」
line = "「さすがウィステリアさん、何か方法を見つけたんですね！」"

[[dialogue]]
speaker = "ウィステリア"
# 「ええ、私１人じゃきっと思いつかなかったわ。ありがとう、紙屋敷さんのおかげだわ」
line = "「ええ、私１人じゃきっと思いつかなかったわ。ありがとう、紙屋敷さんのおかげだわ」"

[[dialogue]]
speaker = "モネ"
# 「いえいえ、私は本が読みたいだけですから」
line = "「いえいえ、私は本が読みたいだけですから」"

[[dialogue]]
speaker = "ウィステリア"
# 「謙遜じゃなくて１００％言葉通りなんだからすごいわ……」
line = "「謙遜じゃなくて１００％言葉通りなんだからすごいわ……」"

[[dialogue]]
speaker = "ヴィライア"
# 『何をするつもり？』
line = "『何をするつもり？』"

[[dialogue]]
speaker = "ウィステリア"
# 「簡単よ。私だけじゃ呪いを背負いきれないなら、分けちゃえばいいの。何も全てをひとりで背負う必要はないわ」
line = "「簡単よ。私だけじゃ呪いを背負いきれないなら、分けちゃえばいいの。何も全てをひとりで背負う必要はないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「だって、私は『英雄』なんかじゃないんだもの」
line = "「だって、私は『英雄』なんかじゃないんだもの」"

[[dialogue]]
speaker = "ヴィライア"
# 『ふざけたことを……あなたが“英雄”にならなければ、誰が魔族の無念を晴らすというの』
line = "『ふざけたことを……あなたが“英雄”にならなければ、誰が魔族の無念を晴らすというの』"

[[dialogue]]
speaker = "ウィステリア"
# 「いや、それ私の仕事じゃないから！」
line = "「いや、それ私の仕事じゃないから！」"

[[dialogue]]
speaker = "ウィステリア"
# 「私の仕事は新星学園図書館の司書。業務内容は蔵書の管理と本の貸し出し、あといろいろ」
line = "「私の仕事は新星学園図書館の司書。業務内容は蔵書の管理と本の貸し出し、あといろいろ」"

[[dialogue]]
speaker = "ウィステリア"
# 「それを今から見せてあげる」
line = "「それを今から見せてあげる」"

[[dialogue]]
speaker = "ウィステリア"
# 「さぁ、来なさい。深淵書庫の呪いとやら、受け止めてあげるわ」
line = "「さぁ、来なさい。深淵書庫の呪いとやら、受け止めてあげるわ」"

[[dialogue]]
speaker = "ヴィライア"
# 『そう。何か企みがあるようだけど、やれるものならやってみなさい』
line = "『そう。何か企みがあるようだけど、やれるものならやってみなさい』"

[[dialogue]]
speaker = "ヴィライア"
# 『魔本たちよ、英雄の魂に深き眠りを与えなさい』
line = "『魔本たちよ、英雄の魂に深き眠りを与えなさい』"

[[dialogue]]
speaker = "unk"
# 呪いの奔流が、ウィステリアを飲み込まんと殺到する。
line = "呪いの奔流が、ウィステリアを飲み込まんと殺到する。"

[[dialogue]]
speaker = "unk"
# けれど、ウィステリアの眼に絶望はない。
line = "けれど、ウィステリアの眼に絶望はない。"

[[dialogue]]
speaker = "ウィステリア"
# 「ああ……声が聞こえる」
line = "「ああ……声が聞こえる」"

[[dialogue]]
speaker = "男の声"
# 『死にたくない……死にたくないよぉ……』
line = "『死にたくない……死にたくないよぉ……』"

[[dialogue]]
speaker = "子どもの声"
# 『お母さん、どこ？　どこに行っちゃったの？』
line = "『お母さん、どこ？　どこに行っちゃったの？』"

[[dialogue]]
speaker = "魔族の声"
# 『痛い、痛い、痛い！　うで、うで、おれのうでがぁ！』
line = "『痛い、痛い、痛い！　うで、うで、おれのうでがぁ！』"

[[dialogue]]
speaker = "女の声"
# 『はははは！　見て、街が燃えてるわ！　……こんなの、もう笑うしか、ないでしょ……』
line = "『はははは！　見て、街が燃えてるわ！　……こんなの、もう笑うしか、ないでしょ……』"

[[dialogue]]
speaker = "ウィステリア"
# 「ヴィライアに……あるいはそれ以前のリクリエに滅ぼされた魔族たちの断末魔」
line = "「ヴィライアに……あるいはそれ以前のリクリエに滅ぼされた魔族たちの断末魔」"

[[dialogue]]
speaker = "ウィステリア"
# 「耳を貸してはいけない。少しでも心を動かせば、呪いに囚われる」
line = "「耳を貸してはいけない。少しでも心を動かせば、呪いに囚われる」"

[[dialogue]]
speaker = "男の声"
# 『憎い、憎い、憎い……私を殺したものが憎い』
line = "『憎い、憎い、憎い……私を殺したものが憎い』"

[[dialogue]]
speaker = "子どもの声"
# 『お母さん、お母さん、お母さんっ！』
line = "『お母さん、お母さん、お母さんっ！』"

[[dialogue]]
speaker = "魔族の声"
# 『おれのうで、あし、しっぽ…………どこだ、どこ……』
line = "『おれのうで、あし、しっぽ…………どこだ、どこ……』"

[[dialogue]]
speaker = "女の声"
# 『はは、あはは、ははははははっ！』
line = "『はは、あはは、ははははははっ！』"

[[dialogue]]
speaker = "ウィステリア"
# 「激しい怒り、憎しみ、恨み……怨嗟は尽きない」
line = "「激しい怒り、憎しみ、恨み……怨嗟は尽きない」"

[[dialogue]]
speaker = "ウィステリア"
# 「けれど、紙屋敷さんの言葉を借りるなら、これも彼らの生きた証なのよね」
line = "「けれど、紙屋敷さんの言葉を借りるなら、これも彼らの生きた証なのよね」"

[[dialogue]]
speaker = "ウィステリア"
# 「なら……」
line = "「なら……」"

[[dialogue]]
speaker = "unk"
# ウィステリアは手を伸ばし、目の前にある本の<ruby=ページ>頁</ruby>をめくる。呪いの奥にある、本当の心を見付けるために。
line = "ウィステリアは手を伸ばし、目の前にある本の<ruby>頁<rt>ページ</rt></ruby>をめくる。呪いの奥にある、本当の心を見付けるために。"

[[dialogue]]
speaker = "男の声"
# 『今日も平和だねぇ……こんな日がずっと続けばいいのにね』
line = "『今日も平和だねぇ……こんな日がずっと続けばいいのにね』"

[[dialogue]]
speaker = "子どもの声"
# 『お母さん、大好き！　お母さんのごはんも大好き！』
line = "『お母さん、大好き！　お母さんのごはんも大好き！』"

[[dialogue]]
speaker = "魔族の声"
# 『どうだ、カッコいいだろ？　この手足も、しっぽに角も、親父譲りなんだぜ』
line = "『どうだ、カッコいいだろ？　この手足も、しっぽに角も、親父譲りなんだぜ』"

[[dialogue]]
speaker = "女の声"
# 『この美しい街で、愛しい人と暮らすの。それだけで幸せ……』
line = "『この美しい街で、愛しい人と暮らすの。それだけで幸せ……』"

[[dialogue]]
speaker = "ウィステリア"
# 「憎しみの裏には愛があり、怒りの裏には慈しみがあり、恨みの裏には安らぎがあった」
line = "「憎しみの裏には愛があり、怒りの裏には慈しみがあり、恨みの裏には安らぎがあった」"

[[dialogue]]
speaker = "ウィステリア"
# 「それを奪われたら、どす黒い呪いになるのも仕方ないわよね」
line = "「それを奪われたら、どす黒い呪いになるのも仕方ないわよね」"

[[dialogue]]
speaker = "ウィステリア"
# 「同情も同調もしない。でも寄り添い、残すことはできる」
line = "「同情も同調もしない。でも寄り添い、残すことはできる」"

[[dialogue]]
speaker = "ウィステリア"
# 「本という形で！」
line = "「本という形で！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ふぅ、なんとか戻ってこれたみたいね」
line = "「ふぅ、なんとか戻ってこれたみたいね」"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさん、その姿は……！」
line = "「ウィステリアさん、その姿は……！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「話はあとよ、このままじゃ私も呪いに押し潰されちゃう。だから……」
line = "「話はあとよ、このままじゃ私も呪いに押し潰されちゃう。だから……」"

[[dialogue]]
speaker = "モネ"
# 「はい！　ウィステリアさん、私に『本を貸してください』！」
line = "「はい！　ウィステリアさん、私に『本を貸してください』！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ええ！　魔本、貸出承認！」
line = "「ええ！　魔本、貸出承認！」"

[[dialogue]]
speaker = "unk"
# ウィステリアが虚空に手をかざすと、光り輝く魔法陣が浮かんだ。
line = "ウィステリアが虚空に手をかざすと、光り輝く魔法陣が浮かんだ。"

[[dialogue]]
speaker = "unk"
# そして魔法陣から本が現れ、それをモネが手にする。
line = "そして魔法陣から本が現れ、それをモネが手にする。"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「魔本、確かに受け取りました。──紙屋敷モネ、新章突入です！」
line = "「魔本、確かに受け取りました。──紙屋敷モネ、新章突入です！」"
