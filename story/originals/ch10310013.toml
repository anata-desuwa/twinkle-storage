[[dialogue]]
speaker = "unk"
# 第３話,アニマ凸凹コンビネーション,P
line = "第３話,アニマ凸凹コンビネーション,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後。俺が星徒会室に行くと、アニマ先輩とアナが何やら話していた。
line = "ある日の放課後。俺が星徒会室に行くと、アニマ先輩とアナが何やら話していた。"

[[dialogue]]
speaker = "アニマ"
# 「やあ、お邪魔しているヨ、会長」
line = "「やあ、お邪魔しているヨ、会長」"

[[dialogue]]
speaker = "アナ"
# 「お疲れ様です、会長。頼まれていた資料の作成はやっておきましたので、ノープロブレムです」
line = "「お疲れ様です、会長。頼まれていた資料の作成はやっておきましたので、ノープロブレムです」"

[[dialogue]]
speaker = "unk"
# ありがとう。２人は何を話していたの？
line = "ありがとう。２人は何を話していたの？"

[[dialogue]]
speaker = "アニマ"
# 「実はまた、新しい薬を発明してネ。今回はアナに試して貰うのが有効だと思い、協力を依頼してたところサ」
line = "「実はまた、新しい薬を発明してネ。今回はアナに試して貰うのが有効だと思い、協力を依頼してたところサ」"

[[dialogue]]
speaker = "アナ"
# 「不本意ですが、和菓子の提供が条件ならば仕方がありません。アニマ先輩の作る和菓子は、神聖さを感じるほどに美味しいので……」
line = "「不本意ですが、和菓子の提供が条件ならば仕方がありません。アニマ先輩の作る和菓子は、神聖さを感じるほどに美味しいので……」"

[[dialogue]]
speaker = "アニマ"
# 「お菓子作りは錬金術と似ているからナ。こう見えて、薬を作る際にも味には拘る派なんだヨ♪」
line = "「お菓子作りは錬金術と似ているからナ。こう見えて、薬を作る際にも味には拘る派なんだヨ♪」"

[[dialogue]]
speaker = "アナ"
# 「先輩は薬ではなく和菓子だけ作ってて下さい。そして、女神様と私に休みなく捧げ続けて下さい」
line = "「先輩は薬ではなく和菓子だけ作ってて下さい。そして、女神様と私に休みなく捧げ続けて下さい」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒ、酷いナァ。せっかくアナが実験しやすいように、薬をこうして和菓子の形に仕上げたというのに」
line = "「フヒヒ、酷いナァ。せっかくアナが実験しやすいように、薬をこうして和菓子の形に仕上げたというのに」"

[[dialogue]]
speaker = "unk"
# ２人は仲が良いんだな
line = "２人は仲が良いんだな"

[[dialogue]]
speaker = "アニマ"
# 「その通りダ。まるで姉妹のように仲が良いとも」
line = "「その通りダ。まるで姉妹のように仲が良いとも」"

[[dialogue]]
speaker = "アナ"
# 「ノー。事実無根です。アニマ先輩が時々、和菓子を盾に実験を迫って来ているだけです」
line = "「ノー。事実無根です。アニマ先輩が時々、和菓子を盾に実験を迫って来ているだけです」"

[[dialogue]]
speaker = "アニマ"
# 「おやおや、ならば仕方ないナ。この実験は、会長に手伝って貰うとしよう」
line = "「おやおや、ならば仕方ないナ。この実験は、会長に手伝って貰うとしよう」"

[[dialogue]]
speaker = "アニマ"
# 「今回の実験薬は、和菓子としても美味しく出来たと思ったんだがナ……実験が嫌なら仕方がない」
line = "「今回の実験薬は、和菓子としても美味しく出来たと思ったんだがナ……実験が嫌なら仕方がない」"

[[dialogue]]
speaker = "アナ"
# 「短慮軽率です、アニマ先輩。姉妹のように仲の良い私が、その和菓子──いえ、薬を服用するに決まっているでしょう。会長に実験の代役をさせるわけにも行きませんからね、ええ」
line = "「短慮軽率です、アニマ先輩。姉妹のように仲の良い私が、その和菓子──いえ、薬を服用するに決まっているでしょう。会長に実験の代役をさせるわけにも行きませんからね、ええ」"

[[dialogue]]
speaker = "アニマ"
# 「フヒヒッ。さすがはアニマの心の姉妹だヨ、アナ。可愛い妹ダ、よしよし♪」
line = "「フヒヒッ。さすがはアニマの心の姉妹だヨ、アナ。可愛い妹ダ、よしよし♪」"

[[dialogue]]
speaker = "アナ"
# 「雑な撫で方は髪が乱れるので止めて貰えますか、オネエチャン」
line = "「雑な撫で方は髪が乱れるので止めて貰えますか、オネエチャン」"

[[dialogue]]
speaker = "unk"
# ところで、その薬は一体どういう効果があるんだ？
line = "ところで、その薬は一体どういう効果があるんだ？"

[[dialogue]]
speaker = "アニマ"
# 「ああ、これカ？　戦闘中の連携向上を目指したもので、名付けて『絆アップ薬』ダ」
line = "「ああ、これカ？　戦闘中の連携向上を目指したもので、名付けて『絆アップ薬』ダ」"

[[dialogue]]
speaker = "アナ"
# 「胡散臭さ全開ですが……これを食べると絆がアップして、私とアニマ先輩のように不仲であっても、お互いの気持ちがわかるようになるとか……もぐもぐ、美味しいです……」
line = "「胡散臭さ全開ですが……これを食べると絆がアップして、私とアニマ先輩のように不仲であっても、お互いの気持ちがわかるようになるとか……もぐもぐ、美味しいです……」"

[[dialogue]]
speaker = "アニマ"
# 「ン？　どうしたんだい会長、怪訝そうな顔をして」
line = "「ン？　どうしたんだい会長、怪訝そうな顔をして」"

[[dialogue]]
speaker = "unk"
# 何だかそれって……一種の惚れ薬みたいな……
line = "何だかそれって……一種の惚れ薬みたいな……"

[[dialogue]]
speaker = "アニマ"
# 「フム？　……なるほど。言われてみれば、そうかもしれないナ。……おや、アナ？」
line = "「フム？　……なるほど。言われてみれば、そうかもしれないナ。……おや、アナ？」"

[[dialogue]]
speaker = "アナ"
# 「むふー……会長っ」
line = "「むふー……会長っ」"

[[dialogue]]
speaker = "unk"
# あ、アナ、いきなり抱き付いてどうした！？
line = "あ、アナ、いきなり抱き付いてどうした！？"

[[dialogue]]
speaker = "unk"
# おわぁっ！？
line = "おわぁっ！？"

[[dialogue]]
speaker = "アナ"
# 「……感情が制御不能。よって、申し訳ありませんが、予定を大幅に前倒しして、既成事実を作る為の作戦に移行します」
line = "「……感情が制御不能。よって、申し訳ありませんが、予定を大幅に前倒しして、既成事実を作る為の作戦に移行します」"

[[dialogue]]
speaker = "アナ"
# 「？　……既成事実は既成事実です。第一段階として、キスが有効手段と考えます」
line = "「？　……既成事実は既成事実です。第一段階として、キスが有効手段と考えます」"

[[dialogue]]
speaker = "アナ"
# 「何故慌てるのです、会長。事前計算によれば、私への好感度は他の星徒会メンバーと比較しても五分。十分勝算があるところまで上がっていたはず……」
line = "「何故慌てるのです、会長。事前計算によれば、私への好感度は他の星徒会メンバーと比較しても五分。十分勝算があるところまで上がっていたはず……」"

[[dialogue]]
speaker = "アニマ"
# 「止めたまえ、アナ。薬の効果とはいえ暴走し過ぎだゾ。会長が嫌がってるダロウ？」
line = "「止めたまえ、アナ。薬の効果とはいえ暴走し過ぎだゾ。会長が嫌がってるダロウ？」"

[[dialogue]]
speaker = "アナ"
# 「これは私と会長の問題なので、邪魔しないで下さい。というか……アニマ先輩も、何さりげなく会長に抱き付いてるんですか」
line = "「これは私と会長の問題なので、邪魔しないで下さい。というか……アニマ先輩も、何さりげなく会長に抱き付いてるんですか」"

[[dialogue]]
speaker = "アニマ"
# 「会長、もう心配しなくて大丈夫だゾ。キミのことは、研究パートナーとしてアニマが守るとも」
line = "「会長、もう心配しなくて大丈夫だゾ。キミのことは、研究パートナーとしてアニマが守るとも」"

[[dialogue]]
speaker = "アナ"
# 「アニマ先輩も私と同じで、事前に『絆アップ薬』、食べてましたよね？　相互に服用することで、連携が完成するとかで」
line = "「アニマ先輩も私と同じで、事前に『絆アップ薬』、食べてましたよね？　相互に服用することで、連携が完成するとかで」"

[[dialogue]]
speaker = "アニマ"
# 「ああ、確かに薬は食べタ。だからこそ、アニマにはアナの暴走を止める責任がある」
line = "「ああ、確かに薬は食べタ。だからこそ、アニマにはアナの暴走を止める責任がある」"

[[dialogue]]
speaker = "アニマ"
# 「──会長と既成事実を作るのは、研究パートナーであるアニマだ<emoji=heart04>　キミではなイ」
line = "「──会長と既成事実を作るのは、研究パートナーであるアニマだ<emoji=heart04>　キミではなイ」"

[[dialogue]]
speaker = "unk"
# 先輩も思いっきり暴走してるぅぅぅ──ッ！？
line = "先輩も思いっきり暴走してるぅぅぅ──ッ！？"

[[dialogue]]
speaker = "アニマ"
# 「おっと会長、逃がさないゾ？　キミの逃走にはもう慣れている。……アナ！」
line = "「おっと会長、逃がさないゾ？　キミの逃走にはもう慣れている。……アナ！」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。言われずとも、既に入り口の前に待機済みです」
line = "「ノープロブレム。言われずとも、既に入り口の前に待機済みです」"

[[dialogue]]
speaker = "アニマ"
# 「上出来ダ。逃げられては元も子もない」
line = "「上出来ダ。逃げられては元も子もない」"

[[dialogue]]
speaker = "アニマ"
# 「よって、既成事実は二人一緒に作るということでどうダ？」
line = "「よって、既成事実は二人一緒に作るということでどうダ？」"

[[dialogue]]
speaker = "アナ"
# 「不本意ですが……合理的な利害一致の結論として了承。アニマ先輩、挟み撃ちのカウントをお願いします」
line = "「不本意ですが……合理的な利害一致の結論として了承。アニマ先輩、挟み撃ちのカウントをお願いします」"

[[dialogue]]
speaker = "アニマ"
# 「いいとも。カウント、スリー、ツー、ワン、ゼ……ロ……」
line = "「いいとも。カウント、スリー、ツー、ワン、ゼ……ロ……」"

[[dialogue]]
speaker = "アナ"
# 「急に……眠気が……ふにゃあ……」
line = "「急に……眠気が……ふにゃあ……」"

[[dialogue]]
speaker = "unk"
# どうやら……薬の副作用は、急激な眠気であったらしい。
line = "どうやら……薬の副作用は、急激な眠気であったらしい。"

[[dialogue]]
speaker = "unk"
# た、助かった……
line = "た、助かった……"

[[dialogue]]
speaker = "unk"
# それにしても、恐ろしく息の合ったコンビネーションだった。
line = "それにしても、恐ろしく息の合ったコンビネーションだった。"

[[dialogue]]
speaker = "unk"
# 後日──
line = "後日──"

[[dialogue]]
speaker = "アナ"
# 「あっ、会長……きゅ、急用を思い出したので失礼します……」
line = "「あっ、会長……きゅ、急用を思い出したので失礼します……」"

[[dialogue]]
speaker = "アニマ"
# 「っ……おっとすまなイ！　今は実験で忙しくてネ！」
line = "「っ……おっとすまなイ！　今は実験で忙しくてネ！」"

[[dialogue]]
speaker = "unk"
# 顔を合わせるとそっくりな反応で恥ずかしそうに逃げ出す２人の反応を見て、やはり似た者同士だと思うのであった。
line = "顔を合わせるとそっくりな反応で恥ずかしそうに逃げ出す２人の反応を見て、やはり似た者同士だと思うのであった。"
