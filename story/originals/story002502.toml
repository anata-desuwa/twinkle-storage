[[dialogue]]
speaker = "ラティエ"
# 「まさかきみのような人気者からデートに誘われるとは思わなかった」
line = "「まさかきみのような人気者からデートに誘われるとは思わなかった」"

[[dialogue]]
speaker = "ラティエ"
# 「しかも素敵な水着までプレゼントしてもらえるなんて。これを作ってくれた九浄ヘレナ理事長にも感謝しなければならないな」
line = "「しかも素敵な水着までプレゼントしてもらえるなんて。これを作ってくれた九浄ヘレナ理事長にも感謝しなければならないな」"

[[dialogue]]
speaker = "unk"
# あの依頼を引き受けてから数日が経過し──
line = "あの依頼を引き受けてから数日が経過し──"

[[dialogue]]
speaker = "unk"
# 俺はヘレナちゃんに言われた通り学園長に水着を渡し、デートに誘って遊園地へとやってきていた。
line = "俺はヘレナちゃんに言われた通り学園長に水着を渡し、デートに誘って遊園地へとやってきていた。"

[[dialogue]]
speaker = "unk"
# どうしても理事長を誘いたくて
line = "どうしても理事長を誘いたくて"

[[dialogue]]
speaker = "unk"
# よ、よろこんで貰えて光栄です
line = "よ、よろこんで貰えて光栄です"

[[dialogue]]
speaker = "ラティエ"
# 「そうかそうか。しかしきみがそんなにも私に好意を寄せてくれていたとはね。気付いてあげられなくて済まなかった」
line = "「そうかそうか。しかしきみがそんなにも私に好意を寄せてくれていたとはね。気付いてあげられなくて済まなかった」"

[[dialogue]]
speaker = "ラティエ"
# 「恥ずかしながら私の青春は旅と修練の毎日で灰色に彩られている。故にこういった色事はあまり得意ではないのだよ」
line = "「恥ずかしながら私の青春は旅と修練の毎日で灰色に彩られている。故にこういった色事はあまり得意ではないのだよ」"

[[dialogue]]
speaker = "ラティエ"
# 「だが、あれほど必死で私のことを探し回り、熱烈な言葉で誘ってくれたのだ。その純粋な想いをおねーさんは無下にしないさ」
line = "「だが、あれほど必死で私のことを探し回り、熱烈な言葉で誘ってくれたのだ。その純粋な想いをおねーさんは無下にしないさ」"

[[dialogue]]
speaker = "ラティエ"
# 「少年、今日は何もかも忘れて思い切り楽しもう！　はっはっは！」
line = "「少年、今日は何もかも忘れて思い切り楽しもう！　はっはっは！」"

[[dialogue]]
speaker = "ラティエ"
# 「……ん？　先ほどから口数が少ないがどうしたのかな？」
line = "「……ん？　先ほどから口数が少ないがどうしたのかな？」"

[[dialogue]]
speaker = "unk"
# き、緊張してるんです！
line = "き、緊張してるんです！"

[[dialogue]]
speaker = "ラティエ"
# 「ほうほう、そうだったか。きみはいつも冷静沈着な印象があったからな、意外に可愛いところもあるのか」
line = "「ほうほう、そうだったか。きみはいつも冷静沈着な印象があったからな、意外に可愛いところもあるのか」"

[[dialogue]]
speaker = "ラティエ"
# 「デートだからといって固くならなくていい。普段通りに接してくれればいいのだ。と言っても、それが難しいのかもしれないがな」
line = "「デートだからといって固くならなくていい。普段通りに接してくれればいいのだ。と言っても、それが難しいのかもしれないがな」"

[[dialogue]]
speaker = "ラティエ"
# 「そうだ、いっそ腕でも組んでみようか。荒療治というやつだ」
line = "「そうだ、いっそ腕でも組んでみようか。荒療治というやつだ」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、遠慮するな。今日だけは学園長ではなく、自分の彼女と思って接してくれていいぞ」
line = "「はっはっは、遠慮するな。今日だけは学園長ではなく、自分の彼女と思って接してくれていいぞ」"

[[dialogue]]
speaker = "ラティエ"
# 「それとも……もしかしてきみはデートのつもりではなかったのかな？　私はそのつもりだったのだが……」
line = "「それとも……もしかしてきみはデートのつもりではなかったのかな？　私はそのつもりだったのだが……」"

[[dialogue]]
speaker = "unk"
# た、たぁのしぃな～
line = "た、たぁのしぃな～"

[[dialogue]]
speaker = "unk"
# で、デートです、勿論！
line = "で、デートです、勿論！"

[[dialogue]]
speaker = "ラティエ"
# 「そうかそうか！　ならば早く腕を組もう、さあ！」
line = "「そうかそうか！　ならば早く腕を組もう、さあ！」"

[[dialogue]]
speaker = "unk"
# 脂汗をかきながら、学園長と腕を組んだ。
line = "脂汗をかきながら、学園長と腕を組んだ。"

[[dialogue]]
speaker = "unk"
# すると、無線を通じてエスメラルダ先生の声が耳に響いてくる。
line = "すると、無線を通じてエスメラルダ先生の声が耳に響いてくる。"

[[dialogue]]
speaker = "エスメラルダ"
# 『あの……ちょっと下手過ぎじゃないかしら……？』
line = "『あの……ちょっと下手過ぎじゃないかしら……？』"

[[dialogue]]
speaker = "unk"
# それについては弁解のしようがない。
line = "それについては弁解のしようがない。"

[[dialogue]]
speaker = "unk"
# だがそもそも今、俺が置かれている状況が地獄なのだということも分かって欲しい。
line = "だがそもそも今、俺が置かれている状況が地獄なのだということも分かって欲しい。"

[[dialogue]]
speaker = "エスメラルダ"
# 『ともかく、このデートが理事長の計画したものであることは絶対に悟られないでね！』
line = "『ともかく、このデートが理事長の計画したものであることは絶対に悟られないでね！』"

[[dialogue]]
speaker = "unk"
# 学園長を誘って、新設のプールに行くことが俺に課せられたオーダーである。
line = "学園長を誘って、新設のプールに行くことが俺に課せられたオーダーである。"

[[dialogue]]
speaker = "unk"
# しかし、それが何故、学園長の放浪癖の矯正に繋がるのか見当もつかない。
line = "しかし、それが何故、学園長の放浪癖の矯正に繋がるのか見当もつかない。"

[[dialogue]]
speaker = "エスメラルダ"
# 「それは私も疑問に思っていたのですが……」
line = "「それは私も疑問に思っていたのですが……」"

[[dialogue]]
speaker = "ヘレナ"
# 「奴の自由奔放な性質は生半可なことでは叩き直せぬ。それはエスメラルダも良く知っているだろう」
line = "「奴の自由奔放な性質は生半可なことでは叩き直せぬ。それはエスメラルダも良く知っているだろう」"

[[dialogue]]
speaker = "ヘレナ"
# 「そのために私はこの水着フォームを用意したのだ」
line = "「そのために私はこの水着フォームを用意したのだ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「なるほど……この人工戦闘服に作戦の鍵がある、と」
line = "「なるほど……この人工戦闘服に作戦の鍵がある、と」"

[[dialogue]]
speaker = "unk"
# ＧＰＳ機能がついているとか？
line = "ＧＰＳ機能がついているとか？"

[[dialogue]]
speaker = "エスメラルダ"
# 「もしかしたら孫悟空の輪かもしれないわね。執務から逃げようとしたら全身に電気がビリビリーっと」
line = "「もしかしたら孫悟空の輪かもしれないわね。執務から逃げようとしたら全身に電気がビリビリーっと」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふ、それは面白いな。呪文を唱えれば、いつでも奴の苦しむ顔が見られるというわけだ」
line = "「ふふ、それは面白いな。呪文を唱えれば、いつでも奴の苦しむ顔が見られるというわけだ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「り、理事長……本気になさらないでください……」
line = "「り、理事長……本気になさらないでください……」"

[[dialogue]]
speaker = "ヘレナ"
# 「冗談だ。いくらあの無法者が相手だとしてもそんな非人道的な手段には訴えない」
line = "「冗談だ。いくらあの無法者が相手だとしてもそんな非人道的な手段には訴えない」"

[[dialogue]]
speaker = "ヘレナ"
# 「作戦の詳細はあえて伏せよう。とにかく魔王はラティエをプールに誘い出し、一緒に楽しむこと」
line = "「作戦の詳細はあえて伏せよう。とにかく魔王はラティエをプールに誘い出し、一緒に楽しむこと」"

[[dialogue]]
speaker = "ヘレナ"
# 「そしてエスメラルダは魔王をサポートしながら、ラティエの星力と人工戦闘服のデータを収集する」
line = "「そしてエスメラルダは魔王をサポートしながら、ラティエの星力と人工戦闘服のデータを収集する」"

[[dialogue]]
speaker = "ヘレナ"
# 「その際、奴にこの計画を悟らせなければそれでいい」
line = "「その際、奴にこの計画を悟らせなければそれでいい」"

[[dialogue]]
speaker = "エスメラルダ"
# 「わ、わかりました」
line = "「わ、わかりました」"

[[dialogue]]
speaker = "unk"
# 結局、当日になってもヘレナちゃんから作戦内容は伝えられなかった。
line = "結局、当日になってもヘレナちゃんから作戦内容は伝えられなかった。"

[[dialogue]]
speaker = "unk"
# ということはつまり、知らない方がよい、という事なのだろう。
line = "ということはつまり、知らない方がよい、という事なのだろう。"

[[dialogue]]
speaker = "エスメラルダ"
# 『あくまで自然にデートを楽しみつつ、でも学園長から目を離さないでね』
line = "『あくまで自然にデートを楽しみつつ、でも学園長から目を離さないでね』"

[[dialogue]]
speaker = "エスメラルダ"
# 『裏があると気付かれたらもちろん、気まぐれに姿を消してしまうなんてことも十分考えられるから』
line = "『裏があると気付かれたらもちろん、気まぐれに姿を消してしまうなんてことも十分考えられるから』"

[[dialogue]]
speaker = "unk"
# エスメラルダ先生の懸念は十分に予想できることだった。
line = "エスメラルダ先生の懸念は十分に予想できることだった。"

[[dialogue]]
speaker = "ラティエ"
# 「おや、あの２人は……もしかして今日の案内人かな？」
line = "「おや、あの２人は……もしかして今日の案内人かな？」"

[[dialogue]]
speaker = "unk"
# 学園長の言葉に目をやると、その内の１人の女の子が大きく手を振る。
line = "学園長の言葉に目をやると、その内の１人の女の子が大きく手を振る。"

[[dialogue]]
speaker = "サラン"
# 「ようこそお越しくださいました～。お待ちしておりましたよ～」
line = "「ようこそお越しくださいました～。お待ちしておりましたよ～」"

[[dialogue]]
speaker = "サラン"
# 「桜十路サランです。本日はよろしくお願いします～」
line = "「桜十路サランです。本日はよろしくお願いします～」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「桜十路エルデリーゼです。よろしくお願い致しますわ」
line = "「桜十路エルデリーゼです。よろしくお願い致しますわ」"

[[dialogue]]
speaker = "ラティエ"
# 「こちらこそよろしくお願いします、可愛いお嬢さん方」
line = "「こちらこそよろしくお願いします、可愛いお嬢さん方」"

[[dialogue]]
speaker = "サラン"
# 「まあ、可愛いだなんてお上手です～。でも嬉しいな～♪」
line = "「まあ、可愛いだなんてお上手です～。でも嬉しいな～♪」"

[[dialogue]]
speaker = "ラティエ"
# 「２人は姉妹なのかな？」
line = "「２人は姉妹なのかな？」"

[[dialogue]]
speaker = "サラン"
# 「いいえ、エルゼは従妹なのですよ～。けれどサランとは姉妹のように仲良しなのです～」
line = "「いいえ、エルゼは従妹なのですよ～。けれどサランとは姉妹のように仲良しなのです～」"

[[dialogue]]
speaker = "サラン"
# 「今回の遊園地が大きくなることについて関わっていたのはサランだけど、一緒に遊びたかったからエルゼも呼んじゃいました～」
line = "「今回の遊園地が大きくなることについて関わっていたのはサランだけど、一緒に遊びたかったからエルゼも呼んじゃいました～」"

[[dialogue]]
speaker = "サラン"
# 「なんとサランもエルゼもヘレナさんから新しい水着をもらったんですよ～」
line = "「なんとサランもエルゼもヘレナさんから新しい水着をもらったんですよ～」"

[[dialogue]]
speaker = "ラティエ"
# 「ほう、それは奇遇だ。私もヘレナが作ったという水着を持っている。ちょうど彼からプレゼントしてもらったばかりなんだよ」
line = "「ほう、それは奇遇だ。私もヘレナが作ったという水着を持っている。ちょうど彼からプレゼントしてもらったばかりなんだよ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様から？　そうなんですの？」
line = "「会長様から？　そうなんですの？」"

[[dialogue]]
speaker = "unk"
# その通り、です……
line = "その通り、です……"

[[dialogue]]
speaker = "unk"
# あっ、いや、ええと……
line = "あっ、いや、ええと……"

[[dialogue]]
speaker = "ラティエ"
# 「私とプールに行きたくて、ヘレナに頼んで作ってもらったそうだ」
line = "「私とプールに行きたくて、ヘレナに頼んで作ってもらったそうだ」"

[[dialogue]]
speaker = "ラティエ"
# 「急に水着を渡されてデートに誘われた時はさすがの私も面食らったが、あまりにも熱心だったものでね」
line = "「急に水着を渡されてデートに誘われた時はさすがの私も面食らったが、あまりにも熱心だったものでね」"

[[dialogue]]
speaker = "サラン"
# 「そうだったのですね～。ふふふ、会長ちゃんが学園長さんのこと好きだったなんてびっくりだよ～」
line = "「そうだったのですね～。ふふふ、会長ちゃんが学園長さんのこと好きだったなんてびっくりだよ～」"

[[dialogue]]
speaker = "unk"
# 今すぐに誤解を解きたかったが、それを説明するためには全てを明るみにする必要がある。
line = "今すぐに誤解を解きたかったが、それを説明するためには全てを明るみにする必要がある。"

[[dialogue]]
speaker = "unk"
# そんなことは出来なかった。
line = "そんなことは出来なかった。"

[[dialogue]]
speaker = "ラティエ"
# 「彼に口説かれたということもあるが、私としてもちょうど良かったのだ」
line = "「彼に口説かれたということもあるが、私としてもちょうど良かったのだ」"

[[dialogue]]
speaker = "ラティエ"
# 「何しろ日々、学園長としての職務に追われる毎日だ。たまにはプールでゆっくり羽を伸ばしたいと思ってね」
line = "「何しろ日々、学園長としての職務に追われる毎日だ。たまにはプールでゆっくり羽を伸ばしたいと思ってね」"

[[dialogue]]
speaker = "エスメラルダ"
# 『はぁ？　なーにが学園長の職務に追われる毎日ですか！？』
line = "『はぁ？　なーにが学園長の職務に追われる毎日ですか！？』"

[[dialogue]]
speaker = "エスメラルダ"
# 『あなたはいつだって職務を放り出して羽を伸ばしているじゃないですか！　良くもまあ言えたものです！』
line = "『あなたはいつだって職務を放り出して羽を伸ばしているじゃないですか！　良くもまあ言えたものです！』"

[[dialogue]]
speaker = "unk"
# 無線の向こうでエスメラルダ先生がブチ切れていた。
line = "無線の向こうでエスメラルダ先生がブチ切れていた。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「──フィオナ会長に仕事を押し付けて、遊び回っているという噂も耳にしましたけれど？」
line = "「──フィオナ会長に仕事を押し付けて、遊び回っているという噂も耳にしましたけれど？」"

[[dialogue]]
speaker = "ラティエ"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "unk"
# ぼそりと呟くようにエルゼがこぼす。
line = "ぼそりと呟くようにエルゼがこぼす。"

[[dialogue]]
speaker = "unk"
# そういえば先ほどから、普段に比べてエルゼが大人しいように感じていた。
line = "そういえば先ほどから、普段に比べてエルゼが大人しいように感じていた。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「いえ、失礼いたしましたわ。サランお姉さま、立ち話はこのくらいにしてプールの方へご案内しましょう」
line = "「いえ、失礼いたしましたわ。サランお姉さま、立ち話はこのくらいにしてプールの方へご案内しましょう」"

[[dialogue]]
speaker = "サラン"
# 「そうだね～。ではでは、遊園地に新たにそーせつされたプールエリア、『チェリークルーズ』はこちらになりま～す♪」
line = "「そうだね～。ではでは、遊園地に新たにそーせつされたプールエリア、『チェリークルーズ』はこちらになりま～す♪」"

[[dialogue]]
speaker = "unk"
# エルゼの様子に引っ掛かりつつも、俺たちはサランの後についてプールエリアへと向かったのだった。
line = "エルゼの様子に引っ掛かりつつも、俺たちはサランの後についてプールエリアへと向かったのだった。"
