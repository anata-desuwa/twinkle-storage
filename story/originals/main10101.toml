[[dialogue]]
speaker = "unk"
# 第１話,想い出のきなこクッキー,B
line = "第１話,想い出のきなこクッキー,B"

[[dialogue]]
speaker = "unk"
# とある日の放課後。
line = "とある日の放課後。"

[[dialogue]]
speaker = "unk"
# 新星学園星徒会役員の面々は、各々に与えられた事務作業に勤しんでいた。
line = "新星学園星徒会役員の面々は、各々に与えられた事務作業に勤しんでいた。"

[[dialogue]]
speaker = "マトイ"
# 「ふぅ……んーっ……！　議事録のまとめ、終わったー……！」
line = "「ふぅ……んーっ……！　議事録のまとめ、終わったー……！」"

[[dialogue]]
speaker = "クロト"
# 「俺もこの判子で終わりかな」
line = "「俺もこの判子で終わりかな」"

[[dialogue]]
speaker = "アナ"
# 「会長、こちらの書類もコンプリートです」
line = "「会長、こちらの書類もコンプリートです」"

[[dialogue]]
speaker = "サーシャ"
# 「こっちの会計処理も終わったわ～。どうしてみんなギリギリになって領収書を出すのかしら～？」
line = "「こっちの会計処理も終わったわ～。どうしてみんなギリギリになって領収書を出すのかしら～？」"

[[dialogue]]
speaker = "unk"
# 一番乗りのマトイを皮切りに、示し合わせたかのように続々と終わらせていく。
line = "一番乗りのマトイを皮切りに、示し合わせたかのように続々と終わらせていく。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょうどみんな、ひと段落したみたいね！　お疲れさま！」
line = "「ちょうどみんな、ひと段落したみたいね！　お疲れさま！」"

[[dialogue]]
speaker = "クロト"
# 「……ヴィーナスは何もしてないような」
line = "「……ヴィーナスは何もしてないような」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなことないわ！　みんなのこと応援してたもの！」
line = "「そんなことないわ！　みんなのこと応援してたもの！」"

[[dialogue]]
speaker = "unk"
# 得意顔で胸を張るヴィーナス。
line = "得意顔で胸を張るヴィーナス。"

[[dialogue]]
speaker = "unk"
# 確かにヴィーナスの応援のおかげで仕事が捗った……かもしれない。
line = "確かにヴィーナスの応援のおかげで仕事が捗った……かもしれない。"

[[dialogue]]
speaker = "サーシャ"
# 「モンスターの出現報告もないし～」
line = "「モンスターの出現報告もないし～」"

[[dialogue]]
speaker = "アナ"
# 「奇天烈な部活からの直談判もないですし」
line = "「奇天烈な部活からの直談判もないですし」"

[[dialogue]]
speaker = "マトイ"
# 「今日はいつになく平和な１日だね。ちょっと気味が悪いくらい」
line = "「今日はいつになく平和な１日だね。ちょっと気味が悪いくらい」"

[[dialogue]]
speaker = "クロト"
# 「マトイ、それフラグっぽいよ」
line = "「マトイ、それフラグっぽいよ」"

[[dialogue]]
speaker = "マトイ"
# 「えっ、私、やっちゃった？　……大丈夫だよね？」
line = "「えっ、私、やっちゃった？　……大丈夫だよね？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムだといいですね」
line = "「ノープロブレムだといいですね」"

[[dialogue]]
speaker = "サーシャ"
# 「休憩用のお茶菓子は～っと……あらら？　お菓子のストック、切れてるわね～？」
line = "「休憩用のお茶菓子は～っと……あらら？　お菓子のストック、切れてるわね～？」"

[[dialogue]]
speaker = "アナ"
# 「おかしいですね。人数分のチョコビスケットが残っていたと記憶していますが」
line = "「おかしいですね。人数分のチョコビスケットが残っていたと記憶していますが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、私が食べた後、補充するの忘れてたわ！　ごめーん！」
line = "「あっ、私が食べた後、補充するの忘れてたわ！　ごめーん！」"

[[dialogue]]
speaker = "マトイ"
# 「まったく、ヴィーナスってば……。でも、そんなこともあろうかと──」
line = "「まったく、ヴィーナスってば……。でも、そんなこともあろうかと──」"

[[dialogue]]
speaker = "マトイ"
# 「今日は久しぶりにきなこクッキー焼いてきたんだ！」
line = "「今日は久しぶりにきなこクッキー焼いてきたんだ！」"

[[dialogue]]
speaker = "アナ"
# 「おぉ……」
line = "「おぉ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイのきなこクッキー、久しぶりじゃない！」
line = "「マトイのきなこクッキー、久しぶりじゃない！」"

[[dialogue]]
speaker = "クロト"
# 「久しぶり？　きなこクッキー？」
line = "「久しぶり？　きなこクッキー？」"

[[dialogue]]
speaker = "unk"
# 俺以外の星徒会メンバーには周知のお菓子らしい。
line = "俺以外の星徒会メンバーには周知のお菓子らしい。"

[[dialogue]]
speaker = "アナ"
# 「そういえば、会長は知らないのですね」
line = "「そういえば、会長は知らないのですね」"

[[dialogue]]
speaker = "サーシャ"
# 「ヴィーナスちゃんの星徒会が発足してすぐ後だったかしら～。マトイちゃんが作ってきてくれたのよ～」
line = "「ヴィーナスちゃんの星徒会が発足してすぐ後だったかしら～。マトイちゃんが作ってきてくれたのよ～」"

[[dialogue]]
speaker = "サーシャ"
# 「星徒会のみんなにとって、大切な思い出のお菓子なの～」
line = "「星徒会のみんなにとって、大切な思い出のお菓子なの～」"

[[dialogue]]
speaker = "マトイ"
# 「あ、あの時は……その、ごめんなさい。まだ慣れてなくて、空回りしっぱなしで……」
line = "「あ、あの時は……その、ごめんなさい。まだ慣れてなくて、空回りしっぱなしで……」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです。マトイ先輩のおかげで、私たち星徒会の結束は強くなったんですから」
line = "「ノープロブレムです。マトイ先輩のおかげで、私たち星徒会の結束は強くなったんですから」"

[[dialogue]]
speaker = "アナ"
# 「想い出補正も込みで、マトイ先輩印のきなこクッキー、私は大好きです」
line = "「想い出補正も込みで、マトイ先輩印のきなこクッキー、私は大好きです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナより私の方が好きよ！　そこは譲れないわね！」
line = "「アナより私の方が好きよ！　そこは譲れないわね！」"

[[dialogue]]
speaker = "サーシャ"
# 「私も大好きよ～。素朴なんだけど、とても美味しいの～」
line = "「私も大好きよ～。素朴なんだけど、とても美味しいの～」"

[[dialogue]]
speaker = "unk"
# 満場一致の支持率１００％だ。
line = "満場一致の支持率１００％だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「だって、美味しすぎるんだもの！　クロトだって、一口食べたら最後、きなこクッキーの虜よ！」
line = "「だって、美味しすぎるんだもの！　クロトだって、一口食べたら最後、きなこクッキーの虜よ！」"

[[dialogue]]
speaker = "アナ"
# 「ユー・キャント・ストップです」
line = "「ユー・キャント・ストップです」"

[[dialogue]]
speaker = "クロト"
# 「へぇ、そんなに美味しいなら俺も期待しちゃうな」
line = "「へぇ、そんなに美味しいなら俺も期待しちゃうな」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっと、みんな！　あんまりハードル上げないでー！」
line = "「ちょっと、みんな！　あんまりハードル上げないでー！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういえば、クロトが着けてるマントが生まれたのも同じ頃だったわね！」
line = "「そういえば、クロトが着けてるマントが生まれたのも同じ頃だったわね！」"

[[dialogue]]
speaker = "クロト"
# 「このマントが？」
line = "「このマントが？」"

[[dialogue]]
speaker = "サーシャ"
# 「前にも言ったことあったかしら～？　そのマント、私の手作りなの～」
line = "「前にも言ったことあったかしら～？　そのマント、私の手作りなの～」"

[[dialogue]]
speaker = "unk"
# 素人目でもわかるくらいに高級な生地を使っているし、縫製もしっかりしている。その道のプロかと思うような仕事ぶりだ。
line = "素人目でもわかるくらいに高級な生地を使っているし、縫製もしっかりしている。その道のプロかと思うような仕事ぶりだ。"

[[dialogue]]
speaker = "マトイ"
# 「サーシャさん、なんでもできてすごいよね」
line = "「サーシャさん、なんでもできてすごいよね」"

[[dialogue]]
speaker = "アナ"
# 「サーシャ先輩はとてもマルチです。ちなみに、私が和菓子の美味しさに目覚めたのもその頃です」
line = "「サーシャ先輩はとてもマルチです。ちなみに、私が和菓子の美味しさに目覚めたのもその頃です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今でこそ副会長はアナだけど、もともとはサーシャさんだったのよ！」
line = "「今でこそ副会長はアナだけど、もともとはサーシャさんだったのよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「そうだったわ～。副会長と会計を兼任していた時期もあったわね～」
line = "「そうだったわ～。副会長と会計を兼任していた時期もあったわね～」"

[[dialogue]]
speaker = "クロト"
# 「そういえば、俺が会長になる前の新星学園星徒会って、どんな感じだったんだ？」
line = "「そういえば、俺が会長になる前の新星学園星徒会って、どんな感じだったんだ？」"

[[dialogue]]
speaker = "unk"
# ふと思えば、今に至るまであまり詳しい話を聞いたことがない。きなこクッキーの話も初耳だ。
line = "ふと思えば、今に至るまであまり詳しい話を聞いたことがない。きなこクッキーの話も初耳だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「それはもう、いろいろあったわ。聞くも涙、語るも涙よ。ヨヨヨ」
line = "「それはもう、いろいろあったわ。聞くも涙、語るも涙よ。ヨヨヨ」"

[[dialogue]]
speaker = "マトイ"
# 「泣くような話ではないでしょ」
line = "「泣くような話ではないでしょ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なによー、マトイは顔べしゃべしゃにして泣いてたじゃなーい！」
line = "「なによー、マトイは顔べしゃべしゃにして泣いてたじゃなーい！」"

[[dialogue]]
speaker = "マトイ"
# 「わー！　わー！　わー！　それは言わないでー！」
line = "「わー！　わー！　わー！　それは言わないでー！」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんが知らない頃にも、いろんな出来事があったわね～。それが積み重なって、今の星徒会になったのよ～」
line = "「会長くんが知らない頃にも、いろんな出来事があったわね～。それが積み重なって、今の星徒会になったのよ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いい機会だし私たちの昔語り、しちゃいましょっか！」
line = "「いい機会だし私たちの昔語り、しちゃいましょっか！」"

[[dialogue]]
speaker = "クロト"
# 「お願いするよ。面白いエピソードが飛び出てきそうだ」
line = "「お願いするよ。面白いエピソードが飛び出てきそうだ」"

[[dialogue]]
speaker = "マトイ"
# 「面白い話かはわからないけどね……」
line = "「面白い話かはわからないけどね……」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩、ノープロブレムです。星徒会の皆さんと出会ってからの毎日は、とても愉快で退屈知らずです」
line = "「マトイ先輩、ノープロブレムです。星徒会の皆さんと出会ってからの毎日は、とても愉快で退屈知らずです」"

[[dialogue]]
speaker = "マトイ"
# 「あの、あまり余計なことは言わないで……。思い返すと、結構恥ずかしいことしちゃってるから……」
line = "「あの、あまり余計なことは言わないで……。思い返すと、結構恥ずかしいことしちゃってるから……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで、新星星徒会むかし話、はじまりはじまりー！」
line = "「というわけで、新星星徒会むかし話、はじまりはじまりー！」"
