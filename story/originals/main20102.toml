[[dialogue]]
speaker = "unk"
# 第２話,終わらないリクリエ,B
line = "第２話,終わらないリクリエ,B"

[[dialogue]]
speaker = "unk"
# 今日は、ここ最近のモンスターやアステラの発生に関するデータを星徒会で吟味していたのだが……
line = "今日は、ここ最近のモンスターやアステラの発生に関するデータを星徒会で吟味していたのだが……"

[[dialogue]]
speaker = "ヴィーナス"
# 「流星群の前よりガクンと減ってるわね！　このままゼロにしていくわよ！」
line = "「流星群の前よりガクンと減ってるわね！　このままゼロにしていくわよ！」"

[[dialogue]]
speaker = "クロト"
# 「いや、どうだろう。最近のモンスター発生率の横に並んだデータを見てくれ」
line = "「いや、どうだろう。最近のモンスター発生率の横に並んだデータを見てくれ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？　どれどれ……今は森羅暦３００２年で～……ん～……グニャグニャしたグラフばっかりでよくわかんないわ」
line = "「え？　どれどれ……今は森羅暦３００２年で～……ん～……グニャグニャしたグラフばっかりでよくわかんないわ」"

[[dialogue]]
speaker = "unk"
# 眉を吊り上げて資料とにらめっこするヴィーナス。
line = "眉を吊り上げて資料とにらめっこするヴィーナス。"

[[dialogue]]
speaker = "unk"
# アナが横のグラフを指差しながら説明を始める。
line = "アナが横のグラフを指差しながら説明を始める。"

[[dialogue]]
speaker = "アナ"
# 「確かにフィヴォス流星群の前を基準にすれば、モンスターもアステラも発生数は圧倒的に減少しています。それは私たちの感覚とも一致している」
line = "「確かにフィヴォス流星群の前を基準にすれば、モンスターもアステラも発生数は圧倒的に減少しています。それは私たちの感覚とも一致している」"

[[dialogue]]
speaker = "マトイ"
# 「うん。流星市国に住んでて、こんなにモンスターが出ないのって初めてだもんね」
line = "「うん。流星市国に住んでて、こんなにモンスターが出ないのって初めてだもんね」"

[[dialogue]]
speaker = "unk"
# そう。流星群の前と後のデータだけ見れば、ヴィーナスの言う通り、モンスターもアステラも減っている。
line = "そう。流星群の前と後のデータだけ見れば、ヴィーナスの言う通り、モンスターもアステラも減っている。"

[[dialogue]]
speaker = "unk"
# だが……
line = "だが……"

[[dialogue]]
speaker = "サーシャ"
# 「資料によると、今の出現ペースは森羅歴２９５０年代に近いみたいね～。でも大きな戦いの直後なんだから、もっとゼロに近づいてもいいはずよね？」
line = "「資料によると、今の出現ペースは森羅歴２９５０年代に近いみたいね～。でも大きな戦いの直後なんだから、もっとゼロに近づいてもいいはずよね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「つまり？」
line = "「つまり？」"

[[dialogue]]
speaker = "アナ"
# 「現時点ではリクリエが収束したと見るのは早計かと」
line = "「現時点ではリクリエが収束したと見るのは早計かと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え～っ！？　ギエルだってやっつけたじゃない！」
line = "「え～っ！？　ギエルだってやっつけたじゃない！」"

[[dialogue]]
speaker = "unk"
# そもそも、俺たちの世代が物心ついた頃からモンスターは多かったんだ。
line = "そもそも、俺たちの世代が物心ついた頃からモンスターは多かったんだ。"

[[dialogue]]
speaker = "unk"
# 今の状態はそこから減っただけで、森羅歴全体で見ればそれなりの頻度だった。
line = "今の状態はそこから減っただけで、森羅歴全体で見ればそれなりの頻度だった。"

[[dialogue]]
speaker = "アナ"
# 「中長期的に観測していけば、発生率が低下していく可能性もありますが……今現れているモンスターは余波なのか、それとも本波がまた来るのか、それはわかりません」
line = "「中長期的に観測していけば、発生率が低下していく可能性もありますが……今現れているモンスターは余波なのか、それとも本波がまた来るのか、それはわかりません」"

[[dialogue]]
speaker = "クロト"
# 「アポロが現れた頃ほどじゃないとしても、警戒していかないといけないな」
line = "「アポロが現れた頃ほどじゃないとしても、警戒していかないといけないな」"

[[dialogue]]
speaker = "マトイ"
# 「うーん、スッパリ何も起きなくなるのかと思ったけど……そううまくはいかないのね……」
line = "「うーん、スッパリ何も起きなくなるのかと思ったけど……そううまくはいかないのね……」"

[[dialogue]]
speaker = "アナ"
# 「魔王ラクシスが一度リクリエを退けたのが約３０００年前。それだけでも例のないことでしたが、会長が再びリクリエを阻止したのもまた異例」
line = "「魔王ラクシスが一度リクリエを退けたのが約３０００年前。それだけでも例のないことでしたが、会長が再びリクリエを阻止したのもまた異例」"

[[dialogue]]
speaker = "サーシャ"
# 「結局、どうなるかは誰にもわからないってことね～」
line = "「結局、どうなるかは誰にもわからないってことね～」"

[[dialogue]]
speaker = "unk"
# モンスターが現れるということは、リクリエはまだ続くということだろう。
line = "モンスターが現れるということは、リクリエはまだ続くということだろう。"

[[dialogue]]
speaker = "unk"
# あれを最後にできなかったのは……率直に言って悔しい。
line = "あれを最後にできなかったのは……率直に言って悔しい。"

[[dialogue]]
speaker = "unk"
# だが嘆いていても仕方ない。俺たちが星騎士である限り、できることをするだけだ。
line = "だが嘆いていても仕方ない。俺たちが星騎士である限り、できることをするだけだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふん。リクリエなら、クロトが何度だってぶっ飛ばしてくれるわ！　ね？」
line = "「ふん。リクリエなら、クロトが何度だってぶっ飛ばしてくれるわ！　ね？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、俺の目の<ruby=あか>緋</ruby>いうちは好きにはさせない。星徒会長として、魔王としてな」
line = "「ああ、俺の目の<ruby>緋<rt>あか</rt></ruby>いうちは好きにはさせない。星徒会長として、魔王としてな」"

[[dialogue]]
speaker = "マトイ"
# 「でも次のリクリエがあるとしたら、また３０００年後でしょ？　３０００年後って流星市国も新星学園もどうなってるんだろ……？」
line = "「でも次のリクリエがあるとしたら、また３０００年後でしょ？　３０００年後って流星市国も新星学園もどうなってるんだろ……？」"

[[dialogue]]
speaker = "アナ"
# 「いえ、３０００年後とは限りません。１０００年後か、１００年後か……それとも１０年後かもしれません」
line = "「いえ、３０００年後とは限りません。１０００年後か、１００年後か……それとも１０年後かもしれません」"

[[dialogue]]
speaker = "マトイ"
# 「あ、そっか……そういう可能性もあるんだ……」
line = "「あ、そっか……そういう可能性もあるんだ……」"

[[dialogue]]
speaker = "unk"
# ３０００年前にラクシスがリクリエを退けた時よりも、今回のリクリエは強力になっていたと聞く。
line = "３０００年前にラクシスがリクリエを退けた時よりも、今回のリクリエは強力になっていたと聞く。"

[[dialogue]]
speaker = "unk"
# その時代その時代で星騎士が勝ってくれればいいが、退ける度にリクリエが激しさを増すとすれば、不安にならざるを得ない。
line = "その時代その時代で星騎士が勝ってくれればいいが、退ける度にリクリエが激しさを増すとすれば、不安にならざるを得ない。"

[[dialogue]]
speaker = "アナ"
# 「またリクリエが起こる可能性は十分にあります。警戒しておくべきでしょう」
line = "「またリクリエが起こる可能性は十分にあります。警戒しておくべきでしょう」"

[[dialogue]]
speaker = "マトイ"
# 「そうね。それが星徒会の役目なんだから」
line = "「そうね。それが星徒会の役目なんだから」"

[[dialogue]]
speaker = "unk"
# リクリエがもう来ないと証拠付けるデータはない。現在の状況を見れば、またリクリエが発生しても不思議じゃないだろう。
line = "リクリエがもう来ないと証拠付けるデータはない。現在の状況を見れば、またリクリエが発生しても不思議じゃないだろう。"

[[dialogue]]
speaker = "unk"
# なら──
line = "なら──"

[[dialogue]]
speaker = "クロト"
# 「……なぁ。リクリエを完全に止めることってできないんだろうか？」
line = "「……なぁ。リクリエを完全に止めることってできないんだろうか？」"

[[dialogue]]
speaker = "アナ"
# 「完全に止める……ですか」
line = "「完全に止める……ですか」"

[[dialogue]]
speaker = "クロト"
# 「ああ。マグダレナさんが言っていたことはみんなにも共有したけど……」
line = "「ああ。マグダレナさんが言っていたことはみんなにも共有したけど……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ええ、いかにも。しかしリクリエという機構に善しも悪しきもありません」
line = "「ええ、いかにも。しかしリクリエという機構に善しも悪しきもありません」"

[[dialogue]]
speaker = "マグダレナ"
# 「ただ世界そのものがより良く発展するのを求めて、新陳代謝のごとく終焉と再誕を繰り返す。それだけです」
line = "「ただ世界そのものがより良く発展するのを求めて、新陳代謝のごとく終焉と再誕を繰り返す。それだけです」"

[[dialogue]]
speaker = "unk"
# リクリエの本質がマグダレナさんの言った通りなら、いくらモンスターを倒そうが、使徒を止めようが、リクリエに終わりはない。
line = "リクリエの本質がマグダレナさんの言った通りなら、いくらモンスターを倒そうが、使徒を止めようが、リクリエに終わりはない。"

[[dialogue]]
speaker = "unk"
# <ruby=リクリエ>再創世</ruby>こそが世界の意志で、むしろ邪魔しているのは俺たちなんだから。
line = "<ruby>再創世<rt>リクリエ</rt></ruby>こそが世界の意志で、むしろ邪魔しているのは俺たちなんだから。"

[[dialogue]]
speaker = "クロト"
# 「リクリエは世界の新陳代謝……それが本当なら、その機構を止めない限り、リクリエは永遠に続く」
line = "「リクリエは世界の新陳代謝……それが本当なら、その機構を止めない限り、リクリエは永遠に続く」"

[[dialogue]]
speaker = "クロト"
# 「俺たちがしていることがただの対処療法だとすれば、リクリエを止めるにはどうすればいいんだ？　そもそも、今でもリクリエについてはわからないことばかりだ」
line = "「俺たちがしていることがただの対処療法だとすれば、リクリエを止めるにはどうすればいいんだ？　そもそも、今でもリクリエについてはわからないことばかりだ」"

[[dialogue]]
speaker = "マトイ"
# 「うーん……２度もリクリエを止めたのに、全然わからないのはもどかしいなぁ……」
line = "「うーん……２度もリクリエを止めたのに、全然わからないのはもどかしいなぁ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わからなければ調べればいいのよ！　私たちはそうしてきたでしょ？」
line = "「わからなければ調べればいいのよ！　私たちはそうしてきたでしょ？」"

[[dialogue]]
speaker = "クロト"
# 「……そうだな。そのためにフィーニスの塔に登って……守護天使に出会って、リクリエの真相もそこで知った。きっとどこかに手がかりがあるはずだ」
line = "「……そうだな。そのためにフィーニスの塔に登って……守護天使に出会って、リクリエの真相もそこで知った。きっとどこかに手がかりがあるはずだ」"

[[dialogue]]
speaker = "サーシャ"
# 「リクリエはなくなってないとしても、世界の破滅は食い止めたわ。調べものをする時間くらいはあるわよ～」
line = "「リクリエはなくなってないとしても、世界の破滅は食い止めたわ。調べものをする時間くらいはあるわよ～」"

[[dialogue]]
speaker = "クロト"
# 「はい。焦らずにいきましょう」
line = "「はい。焦らずにいきましょう」"

[[dialogue]]
speaker = "unk"
# 時間は無限ではないが、猶予はある。
line = "時間は無限ではないが、猶予はある。"

[[dialogue]]
speaker = "unk"
# その間にできることがあるはず──
line = "その間にできることがあるはず──"

[[dialogue]]
speaker = "unk"
# と考えたところで、モンスターの出現を知らせる警報が鳴った。
line = "と考えたところで、モンスターの出現を知らせる警報が鳴った。"

[[dialogue]]
speaker = "クロト"
# 「何はともあれ、まずはモンスターを倒さないとな。星徒会、出撃だ！」
line = "「何はともあれ、まずはモンスターを倒さないとな。星徒会、出撃だ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ！」
line = "「ええ！」"
