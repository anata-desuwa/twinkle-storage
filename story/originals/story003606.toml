[[dialogue]]
speaker = "unk"
# 再び姿を現したエントロフィーと、戦闘を開始したサチとプリムラ。
line = "再び姿を現したエントロフィーと、戦闘を開始したサチとプリムラ。"

[[dialogue]]
speaker = "サチ"
# 「プリムラ、訓練通りに行くよ！」
line = "「プリムラ、訓練通りに行くよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ああ、構わん！　サチ、全力でやるのじゃ！」
line = "「ああ、構わん！　サチ、全力でやるのじゃ！」"

[[dialogue]]
speaker = "unk"
# ２人は視線を交わし――プリムラが武器を解除して、空いた手をサチと繋ぐ。
line = "２人は視線を交わし――プリムラが武器を解除して、空いた手をサチと繋ぐ。"

[[dialogue]]
speaker = "サチ"
# 「せ～のっ！」
line = "「せ～のっ！」"

[[dialogue]]
speaker = "プリムラ"
# 「はああぁっ！！」
line = "「はああぁっ！！」"

[[dialogue]]
speaker = "エントロフィー"
# 「さぁ～て、どんなもんすかね～！」
line = "「さぁ～て、どんなもんすかね～！」"

[[dialogue]]
speaker = "unk"
# 手を繋いだまま２人はエントロフィーに突撃。サチが斧を振り下ろす。
line = "手を繋いだまま２人はエントロフィーに突撃。サチが斧を振り下ろす。"

[[dialogue]]
speaker = "unk"
# エントロフィーはそれを、マイナスエネルギーのフィールドで受け止めるが――
line = "エントロフィーはそれを、マイナスエネルギーのフィールドで受け止めるが――"

[[dialogue]]
speaker = "エントロフィー"
# 「！　これは……！？」
line = "「！　これは……！？」"

[[dialogue]]
speaker = "unk"
# エントロフィーのマイナスエネルギーが急に出力不調に陥ったように、揺らいで不安定になる。
line = "エントロフィーのマイナスエネルギーが急に出力不調に陥ったように、揺らいで不安定になる。"

[[dialogue]]
speaker = "サチ"
# （私の『不運を引き寄せる』能力を武器に込めることで――攻撃した相手にもアンラッキーを分け与える！）
line = "（私の『不運を引き寄せる』能力を武器に込めることで――攻撃した相手にもアンラッキーを分け与える！）"

[[dialogue]]
speaker = "unk"
# 揺らいだフィールドを斧が貫通し、エントロフィーは斬撃をくらって吹き飛ばされる。
line = "揺らいだフィールドを斧が貫通し、エントロフィーは斬撃をくらって吹き飛ばされる。"

[[dialogue]]
speaker = "エントロフィー"
# 「くっ……面白いっすね～！」
line = "「くっ……面白いっすね～！」"

[[dialogue]]
speaker = "プリムラ"
# 「いいぞ！　サチ、そのまま押すのじゃ！」
line = "「いいぞ！　サチ、そのまま押すのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# （我の『放出供給』の能力は、あらゆるエネルギーを相手に合わせて最適化し、供給することができる――）
line = "（我の『放出供給』の能力は、あらゆるエネルギーを相手に合わせて最適化し、供給することができる――）"

[[dialogue]]
speaker = "プリムラ"
# （故に、サチと手を繋ぐことによって、サチに必要な『幸運』を供給し、『不運』のデメリットを打ち消しているのじゃ！）
line = "（故に、サチと手を繋ぐことによって、サチに必要な『幸運』を供給し、『不運』のデメリットを打ち消しているのじゃ！）"

[[dialogue]]
speaker = "サチ"
# （私１人では、扱いきれない破滅的な能力……でも、こうして仲間の力と合わされば――！）
line = "（私１人では、扱いきれない破滅的な能力……でも、こうして仲間の力と合わされば――！）"

[[dialogue]]
speaker = "サチ"
# 「アンラッキー・テンペストッ！！」
line = "「アンラッキー・テンペストッ！！」"

[[dialogue]]
speaker = "unk"
# サチが斧を薙ぎ払い、『不運』の力で荒れ狂う暴風のような衝撃波を炸裂させる。
line = "サチが斧を薙ぎ払い、『不運』の力で荒れ狂う暴風のような衝撃波を炸裂させる。"

[[dialogue]]
speaker = "エントロフィーL"
# 「うおおおぉっ！？　くっ……きゃはははっ！　面白いっす！！　魔法少女、いいじゃないっすか！！！」
line = "「うおおおぉっ！？　くっ……きゃはははっ！　面白いっす！！　魔法少女、いいじゃないっすか！！！」"

[[dialogue]]
speaker = "unk"
# 防御フィールドをかき消され、吹き飛ばされながらも、狂喜の笑い声を上げるエントロフィー。
line = "防御フィールドをかき消され、吹き飛ばされながらも、狂喜の笑い声を上げるエントロフィー。"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃん！　プリムラちゃん！　トレジアンナさん！　大丈夫！？」
line = "「サチちゃん！　プリムラちゃん！　トレジアンナさん！　大丈夫！？」"

[[dialogue]]
speaker = "unk"
# そこへシズハたちが駆け付ける。
line = "そこへシズハたちが駆け付ける。"

[[dialogue]]
speaker = "unk"
# 状況は！？
line = "状況は！？"

[[dialogue]]
speaker = "トレジアンナ"
# 「みなさん、お待ちしてました！　今のところ、サチさんとプリムラさんが押してます！」
line = "「みなさん、お待ちしてました！　今のところ、サチさんとプリムラさんが押してます！」"

[[dialogue]]
speaker = "シズハ"
# 「通信が妨害されてなくて、よかった……！」
line = "「通信が妨害されてなくて、よかった……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「いや……おそらくエントロフィーさんが意図したものでしょう。調べてみましたが、仮想空間から脱出できないように『封鎖術式』が張られています」
line = "「いや……おそらくエントロフィーさんが意図したものでしょう。調べてみましたが、仮想空間から脱出できないように『封鎖術式』が張られています」"

[[dialogue]]
speaker = "ディーラック"
# 「だろうね。仮想空間全体が強力なマイナスエネルギーの気配で満ちてるよ」
line = "「だろうね。仮想空間全体が強力なマイナスエネルギーの気配で満ちてるよ」"

[[dialogue]]
speaker = "エントロフィー"
# 「きゃはははっ♪　その通りっす！　アネさんたちに逃げられちゃうと面白くないんで、出られないようにさせてもらいました～」
line = "「きゃはははっ♪　その通りっす！　アネさんたちに逃げられちゃうと面白くないんで、出られないようにさせてもらいました～」"

[[dialogue]]
speaker = "エントロフィー"
# 「あっ、ちなみに、ここで受けるダメージは現実でも反映されるような変更もしといたんで♪」
line = "「あっ、ちなみに、ここで受けるダメージは現実でも反映されるような変更もしといたんで♪」"

[[dialogue]]
speaker = "エントロフィー"
# 「負けたら死ぬかもって緊張感があった方が、やっぱり面白いでしょ～？　きゃははははっ☆」
line = "「負けたら死ぬかもって緊張感があった方が、やっぱり面白いでしょ～？　きゃははははっ☆」"

[[dialogue]]
speaker = "エントロフィー"
# 「――さて、魔法少女のアネさんたちが全員揃ったところで、ここからが本番っすよ♪」
line = "「――さて、魔法少女のアネさんたちが全員揃ったところで、ここからが本番っすよ♪」"

[[dialogue]]
speaker = "unk"
# エントロフィーは向かってくるサチとプリムラの方に手をかざして、告げる。
line = "エントロフィーは向かってくるサチとプリムラの方に手をかざして、告げる。"

[[dialogue]]
speaker = "エントロフィーL"
# 「精神――反転☆」
line = "「精神――反転☆」"

[[dialogue]]
speaker = "サチ"
# 「なっ……！？　この感覚は……体が光って……！」
line = "「なっ……！？　この感覚は……体が光って……！」"

[[dialogue]]
speaker = "プリムラ"
# 「いかん！　精神が暴走してしまう時のやつじゃ……！」
line = "「いかん！　精神が暴走してしまう時のやつじゃ……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「触れられていないのにどうして……いや、既に１回触れられているから……！？」
line = "「触れられていないのにどうして……いや、既に１回触れられているから……！？」"

[[dialogue]]
speaker = "エントロフィー"
# 「ふふふっ、反転のロストアイテム、マジで凶悪な力っすよね～♪」
line = "「ふふふっ、反転のロストアイテム、マジで凶悪な力っすよね～♪」"

[[dialogue]]
speaker = "エントロフィー"
# 「１回タッチしちゃえば、呪いにかかったように、こんな風にいつでも強制的に暴走、そして――」
line = "「１回タッチしちゃえば、呪いにかかったように、こんな風にいつでも強制的に暴走、そして――」"

[[dialogue]]
speaker = "エントロフィー"
# 「敵と味方の判別までも、反転させられちゃうんすから！」
line = "「敵と味方の判別までも、反転させられちゃうんすから！」"

[[dialogue]]
speaker = "プリムラ"
# 「……ばぶぅ♪」
line = "「……ばぶぅ♪」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、お兄さん、また遊べますね<emoji=heart04>」
line = "「ふふっ、お兄さん、また遊べますね<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「そんな……２人共……！」
line = "「そんな……２人共……！」"

[[dialogue]]
speaker = "エントロフィー"
# 「じゃあ、サチのアネさんとプリムラのアネさんは、こっちチームってことで、よろしくお願いしますね～♪」
line = "「じゃあ、サチのアネさんとプリムラのアネさんは、こっちチームってことで、よろしくお願いしますね～♪」"

[[dialogue]]
speaker = "サチ"
# 「はい。行きますよ――お兄さん♪」
line = "「はい。行きますよ――お兄さん♪」"

[[dialogue]]
speaker = "unk"
# サチが俺に攻撃を仕掛けてくる。
line = "サチが俺に攻撃を仕掛けてくる。"

[[dialogue]]
speaker = "unk"
# サチ！　しっかりしろ！
line = "サチ！　しっかりしろ！"

[[dialogue]]
speaker = "サチ"
# 「ごめんなさい。お兄さんとは、今は<b>敵同士</b>なので<emoji=heart04>」
line = "「ごめんなさい。お兄さんとは、今は<b>敵同士</b>なので<emoji=heart04>」"

[[dialogue]]
speaker = "プリムラ"
# 「あぁ～いっ<emoji=heart04>　アンナママぁ～<emoji=heart04>　あそんで～っ♪」
line = "「あぁ～いっ<emoji=heart04>　アンナママぁ～<emoji=heart04>　あそんで～っ♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あ、赤ちゃん化してるプリムラさんとは、さすがに戦いづらいです……！　反転のロストアイテム、まさかここまでとは……！」
line = "「あ、赤ちゃん化してるプリムラさんとは、さすがに戦いづらいです……！　反転のロストアイテム、まさかここまでとは……！」"

[[dialogue]]
speaker = "エントロフィーL"
# 「じゃあウチは、シズハのアネさんに相手をお願いしましょうかね～♪」
line = "「じゃあウチは、シズハのアネさんに相手をお願いしましょうかね～♪」"

[[dialogue]]
speaker = "シズハ"
# 「……ディーちゃん、やるよ！」
line = "「……ディーちゃん、やるよ！」"

[[dialogue]]
speaker = "ディーラック"
# 「ああ、わかってるよ。さすがにここは本気でやらなきゃ……マズそうだからね！」
line = "「ああ、わかってるよ。さすがにここは本気でやらなきゃ……マズそうだからね！」"

[[dialogue]]
speaker = "エントロフィー"
# 「ふふっ♪　１回でもタッチされたらアウトの鬼ごっこ、どこまで逃げられるっすかね～？」
line = "「ふふっ♪　１回でもタッチされたらアウトの鬼ごっこ、どこまで逃げられるっすかね～？」"

[[dialogue]]
speaker = "エントロフィー"
# 「もちろん、鬼役はウチってことで――」
line = "「もちろん、鬼役はウチってことで――」"

[[dialogue]]
speaker = "unk"
# そう言って大きく口を開け、砂時計――『反転のロストアイテム』を飲み込むエントロフィー。
line = "そう言って大きく口を開け、砂時計――『反転のロストアイテム』を飲み込むエントロフィー。"

[[dialogue]]
speaker = "エントロフィーL"
# 「あ～ん<emoji=heart04>　……ごっくん☆」
line = "「あ～ん<emoji=heart04>　……ごっくん☆」"

[[dialogue]]
speaker = "エントロフィー"
# 「ふふっ……これがウチの戦闘形態っす♪　どうっすか～？」
line = "「ふふっ……これがウチの戦闘形態っす♪　どうっすか～？」"

[[dialogue]]
speaker = "unk"
# こうして、暴走したサチとプリムラ、変身したエントロフィーとの乱戦が始まるのだった。
line = "こうして、暴走したサチとプリムラ、変身したエントロフィーとの乱戦が始まるのだった。"
