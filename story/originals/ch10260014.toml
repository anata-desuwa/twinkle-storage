[[dialogue]]
speaker = "unk"
# 第４話,曇りのちラディアントブルー,P
line = "第４話,曇りのちラディアントブルー,P"

[[dialogue]]
speaker = "unk"
# ──これまで毎日のように絡んできていたリーリアが、ある日を境に１週間も顔を見せていない。
line = "──これまで毎日のように絡んできていたリーリアが、ある日を境に１週間も顔を見せていない。"

[[dialogue]]
speaker = "unk"
# 心配になって探していると、空き教室で窓の外を眺めている彼女の姿を見つけた。
line = "心配になって探していると、空き教室で窓の外を眺めている彼女の姿を見つけた。"

[[dialogue]]
speaker = "リーリア"
# 「はぁ……」
line = "「はぁ……」"

[[dialogue]]
speaker = "リーリア"
# 「……って、あれ？　センパイじゃないですか」
line = "「……って、あれ？　センパイじゃないですか」"

[[dialogue]]
speaker = "リーリア"
# 「こんな校舎の端っこまで、何か星徒会の用事でも？」
line = "「こんな校舎の端っこまで、何か星徒会の用事でも？」"

[[dialogue]]
speaker = "リーリア"
# 「え……私のことを探していた、んですか？　センパイが……？」
line = "「え……私のことを探していた、んですか？　センパイが……？」"

[[dialogue]]
speaker = "unk"
# 何かあったのか？
line = "何かあったのか？"

[[dialogue]]
speaker = "リーリア"
# 「……あー－いや、実はちょっと、頭冷やせってある人に言われて。それで１週間、自分を見つめ直してた感じです」
line = "「……あー－いや、実はちょっと、頭冷やせってある人に言われて。それで１週間、自分を見つめ直してた感じです」"

[[dialogue]]
speaker = "リーリア"
# 「でも、私はまだ、考えを改める気になれなくて。これからどうしたものかな～って……ちょっと途方に暮れてたところです」
line = "「でも、私はまだ、考えを改める気になれなくて。これからどうしたものかな～って……ちょっと途方に暮れてたところです」"

[[dialogue]]
speaker = "unk"
# リーリアさえよければ、相談に乗るぞ？
line = "リーリアさえよければ、相談に乗るぞ？"

[[dialogue]]
speaker = "リーリア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "リーリア"
# 「……例えば。例えばですよ？　センパイ……」
line = "「……例えば。例えばですよ？　センパイ……」"

[[dialogue]]
speaker = "リーリア"
# 「私が……世界を救おうとしてる、『悪』の秘密結社エージェントだったりしたら、どうしますか？」
line = "「私が……世界を救おうとしてる、『悪』の秘密結社エージェントだったりしたら、どうしますか？」"

[[dialogue]]
speaker = "unk"
# 世界を救おうとしてるのに、悪なのか？
line = "世界を救おうとしてるのに、悪なのか？"

[[dialogue]]
speaker = "リーリア"
# 「ええ、まあ。……大を救う為なら、小は切り捨てるという方針の組織なので、私からすれば、やっぱり『悪』だと思いますね」
line = "「ええ、まあ。……大を救う為なら、小は切り捨てるという方針の組織なので、私からすれば、やっぱり『悪』だと思いますね」"

[[dialogue]]
speaker = "リーリア"
# 「それで、私は今回、直属の上司にとある上申をしたわけです」
line = "「それで、私は今回、直属の上司にとある上申をしたわけです」"

[[dialogue]]
speaker = "リーリア"
# 「学園と秘密結社が協力関係を結べば、小を切り捨てずとも、世界を救えるんじゃないか──」
line = "「学園と秘密結社が協力関係を結べば、小を切り捨てずとも、世界を救えるんじゃないか──」"

[[dialogue]]
speaker = "リーリア"
# 「いつまでも監視ばっかりしてないで、その分の時間を信頼関係構築に当てた方がいいんじゃないか……ってね」
line = "「いつまでも監視ばっかりしてないで、その分の時間を信頼関係構築に当てた方がいいんじゃないか……ってね」"

[[dialogue]]
speaker = "リーリア"
# 「ところが、その上司というのが、組織の方針を体現するようなクールな人でして。淡々と怒られたわけです。曰く──」
line = "「ところが、その上司というのが、組織の方針を体現するようなクールな人でして。淡々と怒られたわけです。曰く──」"

[[dialogue]]
speaker = "リーリア"
# 「学園や、切り捨てることになるかもしれない『小』に、私情を挟んでいるのではないか……とのことで」
line = "「学園や、切り捨てることになるかもしれない『小』に、私情を挟んでいるのではないか……とのことで」"

[[dialogue]]
speaker = "リーリア"
# 「で、任務を正しく遂行できていないから頭を冷やせと、１週間の謹慎を言い渡されたわけです」
line = "「で、任務を正しく遂行できていないから頭を冷やせと、１週間の謹慎を言い渡されたわけです」"

[[dialogue]]
speaker = "unk"
# リーリア、それって……
line = "リーリア、それって……"

[[dialogue]]
speaker = "リーリア"
# 「……な～んてね！　まあ全部作り話なんですけど☆　あはは♪」
line = "「……な～んてね！　まあ全部作り話なんですけど☆　あはは♪」"

[[dialogue]]
speaker = "リーリア"
# 「本当はちょっと友達と喧嘩して、ギスってた気持ちを癒してただけです☆」
line = "「本当はちょっと友達と喧嘩して、ギスってた気持ちを癒してただけです☆」"

[[dialogue]]
speaker = "リーリア"
# 「もしかして信じちゃいましたか？　センパイってば、なんだかんだ言って私のこと好きすぎですもんね～♪」
line = "「もしかして信じちゃいましたか？　センパイってば、なんだかんだ言って私のこと好きすぎですもんね～♪」"

[[dialogue]]
speaker = "unk"
# そっか、作り話か
line = "そっか、作り話か"

[[dialogue]]
speaker = "リーリア"
# 「ええ。私が本当にスパイだったりしたら、格好良かったんですけどね～」
line = "「ええ。私が本当にスパイだったりしたら、格好良かったんですけどね～」"

[[dialogue]]
speaker = "リーリア"
# 「残念ながら、私は世界一可愛いだけが取り柄の、しがないセンパイの後輩なので☆」
line = "「残念ながら、私は世界一可愛いだけが取り柄の、しがないセンパイの後輩なので☆」"

[[dialogue]]
speaker = "unk"
# でも、仮にリーリアがスパイだったとしても、安心したよ
line = "でも、仮にリーリアがスパイだったとしても、安心したよ"

[[dialogue]]
speaker = "リーリア"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、それってどういう──」
line = "「センパイ、それってどういう──」"

[[dialogue]]
speaker = "unk"
# リーリアは俺たちを裏切らないってことだ
line = "リーリアは俺たちを裏切らないってことだ"

[[dialogue]]
speaker = "unk"
# 利害一致してるなら、
line = "利害一致してるなら、"

[[dialogue]]
speaker = "リーリア"
# 「な……」
line = "「な……」"

[[dialogue]]
speaker = "リーリア"
# 「ふ……ふふっ……」
line = "「ふ……ふふっ……」"

[[dialogue]]
speaker = "リーリア"
# 「……なんか、ちょっとだけわかった気がします」
line = "「……なんか、ちょっとだけわかった気がします」"

[[dialogue]]
speaker = "リーリア"
# 「何を……って、センパイが実は、超マジカルおバカな人だってことをです」
line = "「何を……って、センパイが実は、超マジカルおバカな人だってことをです」"

[[dialogue]]
speaker = "unk"
# いきなり酷くない！？
line = "いきなり酷くない！？"

[[dialogue]]
speaker = "リーリア"
# 「あ～、何かセンパイと話してたら、落ち込んでるのがバカらしくなってきちゃいました！」
line = "「あ～、何かセンパイと話してたら、落ち込んでるのがバカらしくなってきちゃいました！」"

[[dialogue]]
speaker = "リーリア"
# 「私、いまとてもパフェが食べたい気分です☆」
line = "「私、いまとてもパフェが食べたい気分です☆」"

[[dialogue]]
speaker = "リーリア"
# 「センパイに朗報です♪　世界一可愛い後輩に、パフェを餌付けする権利をあげます。あはっ☆　利害が一致しますね？」
line = "「センパイに朗報です♪　世界一可愛い後輩に、パフェを餌付けする権利をあげます。あはっ☆　利害が一致しますね？」"

[[dialogue]]
speaker = "unk"
# それで利害一致するのか？
line = "それで利害一致するのか？"

[[dialogue]]
speaker = "リーリア"
# 「ええ、もちろん──」
line = "「ええ、もちろん──」"

[[dialogue]]
speaker = "リーリア"
# 「私、ウィンウィンな関係が好きなんで♪」
line = "「私、ウィンウィンな関係が好きなんで♪」"

[[dialogue]]
speaker = "unk"
# すっかり元気を取り戻したリーリアは、そう言って晴れやかな笑顔を見せるのだった。
line = "すっかり元気を取り戻したリーリアは、そう言って晴れやかな笑顔を見せるのだった。"
