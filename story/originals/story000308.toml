[[dialogue]]
speaker = "ウェンディ"
# 「私は基本内勤なので、あまり機会はないかもしれませんが、またお会いしましょう」
line = "「私は基本内勤なので、あまり機会はないかもしれませんが、またお会いしましょう」"

[[dialogue]]
speaker = "イニシュ"
# 「失礼します」
line = "「失礼します」"

[[dialogue]]
speaker = "リーリア"
