line = "『おそらく、以前星徒会の報告に挙がっていた魔女だね。私はちょっと特殊な立場だから情報共有されてるけど、一般生徒には明かされてないから秘密にしておいてね』"

[[dialogue]]
speaker = "リーリア"
# 「はーい、リーリアお口チャックしてまーす♪」
line = "「はーい、リーリアお口チャックしてまーす♪」"

[[dialogue]]
speaker = "リーリア"
# 「でもラーメンの話してるから、私も食べたくなっちゃいましたよ。めちゃくちゃ戦ったしお腹ペコペコです」
line = "「でもラーメンの話してるから、私も食べたくなっちゃいましたよ。めちゃくちゃ戦ったしお腹ペコペコです」"

[[dialogue]]
