line = "「ま、いいや。ラーメンでも食べて帰ろーっと」"

[[dialogue]]
speaker = "ウェンディ"
# 「ふぅ……今日は大変な一日でした。ラーメンくらいしかいい思い出がないです」
line = "「ふぅ……今日は大変な一日でした。ラーメンくらいしかいい思い出がないです」"

[[dialogue]]
speaker = "アイリーン"
# 「おかえりなさーい。いいなー、私もラーメン食べてみたいなー」
line = "「おかえりなさーい。いいなー、私もラーメン食べてみたいなー」"

[[dialogue]]
speaker = "ウェンディ"
