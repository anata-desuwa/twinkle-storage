line = "「全て失ったと……そういうことで間違いないな？」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい、その通りです。この度は申し訳ございませんでした……」
line = "「はい、その通りです。この度は申し訳ございませんでした……」"

[[dialogue]]
speaker = "セドナ"
# 「はっきり言って失望している。お前はもっと利口だと思っていたんだがな」
line = "「はっきり言って失望している。お前はもっと利口だと思っていたんだがな」"

[[dialogue]]
speaker = "セドナ"
# 「更迭に値する失態だ。お前が魔女の森に戻されればどうなるか……わかっているだろうな」
line = "「更迭に値する失態だ。お前が魔女の森に戻されればどうなるか……わかっているだろうな」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい……どのような処分でもお受けいたします」
line = "「はい……どのような処分でもお受けいたします」"

[[dialogue]]
speaker = "セドナ"
# 「言ったな？　ではネビュラの活動資金を２０％増やせ」
line = "「言ったな？　ではネビュラの活動資金を２０％増やせ」"

[[dialogue]]
speaker = "ウェンディ"
# 「は──？」
line = "「は──？」"

[[dialogue]]
speaker = "セドナ"
# 「お前が欠けると<b>計画</b>に支障が出る。働きで返せ」
line = "「お前が欠けると<b>計画</b>に支障が出る。働きで返せ」"

[[dialogue]]
speaker = "ウェンディ"
# 「は……はい！」
line = "「は……はい！」"

[[dialogue]]
speaker = "ウェンディ"
# 「って、相当無茶なんですけど！？　関連会社は今の利益を維持するので精いっぱいですし、ネビュラ内の資金運用も切り詰めて……」
line = "「って、相当無茶なんですけど！？　関連会社は今の利益を維持するので精いっぱいですし、ネビュラ内の資金運用も切り詰めて……」"

[[dialogue]]
speaker = "セドナ"
# 「処分なのだから無茶なぐらいでないと意味がない。それとも……お前にはできないか？」
line = "「処分なのだから無茶なぐらいでないと意味がない。それとも……お前にはできないか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「で……できまぁす！」
line = "「で……できまぁす！」"

[[dialogue]]
speaker = "セドナ"
# 「さて……問題行動を起こしたのはもう１人。イニシュ。お前には出撃の命令は下っていなかったはずだが」
line = "「さて……問題行動を起こしたのはもう１人。イニシュ。お前には出撃の命令は下っていなかったはずだが」"

[[dialogue]]
speaker = "イニシュ"
# 「ネビュラはリクリエを防ぐための機関です。モンスターを駆逐するのに命令など必要ありません」
line = "「ネビュラはリクリエを防ぐための機関です。モンスターを駆逐するのに命令など必要ありません」"

[[dialogue]]
speaker = "イニシュ"
# 「それにモンスターを使った実験とは何です？　我々ネビュラがモンスターを使役するなど、リクリエの危険性を理解しているのですか？」
line = "「それにモンスターを使った実験とは何です？　我々ネビュラがモンスターを使役するなど、リクリエの危険性を理解しているのですか？」"

[[dialogue]]
speaker = "セドナ"
# 「毒を以て毒を制す。使えるものは使うのがネビュラだろう？」
line = "「毒を以て毒を制す。使えるものは使うのがネビュラだろう？」"

[[dialogue]]
speaker = "セドナ"
# 「それにお前は兵器としてネビュラに置いてやっている身だ。私に意見する権利はない」
line = "「それにお前は兵器としてネビュラに置いてやっている身だ。私に意見する権利はない」"

[[dialogue]]
speaker = "セドナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "イニシュ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# （一触即発……！？）
line = "（一触即発……！？）"

[[dialogue]]
speaker = "セドナ"
# 「……まぁいい。実験内容を知らなかったことに免じて、謹慎程度にしておいてやる。どうせお前はスリープしているだろうがな」
line = "「……まぁいい。実験内容を知らなかったことに免じて、謹慎程度にしておいてやる。どうせお前はスリープしているだろうがな」"

[[dialogue]]
speaker = "イニシュ"
# 「……了解です」
line = "「……了解です」"

[[dialogue]]
speaker = "セドナ"
# （森ではさんざん頑固な老人たちの相手をさせられたが、一番頑固な魔女はこちらにいたか）
line = "（森ではさんざん頑固な老人たちの相手をさせられたが、一番頑固な魔女はこちらにいたか）"

[[dialogue]]
speaker = "セドナ"
# （やはりイニシュは始祖の時代の……）
line = "（やはりイニシュは始祖の時代の……）"

[[dialogue]]
speaker = "セドナ"
# 「魔王よ」
line = "「魔王よ」"

[[dialogue]]
speaker = "unk"
# ！？
line = "！？"

[[dialogue]]
speaker = "セドナ"
# 「相変わらず不甲斐ない戦いぶりだったな。魔王の名が泣くぞ」
line = "「相変わらず不甲斐ない戦いぶりだったな。魔王の名が泣くぞ」"

[[dialogue]]
speaker = "セドナ"
# 「ところでアイリーンによると、何者かが再捕獲したモンスターを逃がしたそうだ。外部から侵入された形跡もあった。魔王に心当たりはないか？」
line = "「ところでアイリーンによると、何者かが再捕獲したモンスターを逃がしたそうだ。外部から侵入された形跡もあった。魔王に心当たりはないか？」"

[[dialogue]]
speaker = "unk"
# わからないです
line = "わからないです"

[[dialogue]]
speaker = "セドナ"
# 「だろうな。所在を知られているからといって、お前たち星徒会に易々と侵入されるほどネビュラの警備は甘くはない」
line = "「だろうな。所在を知られているからといって、お前たち星徒会に易々と侵入されるほどネビュラの警備は甘くはない」"

[[dialogue]]
speaker = "セドナ"
# 「星騎士と魔女、そしてリクリエの使徒以外にも思惑を持って動いている者がいるということだ。注意しておけ、魔王」
line = "「星騎士と魔女、そしてリクリエの使徒以外にも思惑を持って動いている者がいるということだ。注意しておけ、魔王」"

[[dialogue]]
speaker = "セドナ"
# 「では私は行く。今日は野次馬をしに来たわけではないからな」
line = "「では私は行く。今日は野次馬をしに来たわけではないからな」"

[[dialogue]]
speaker = "イニシュ"
# 「──魔王」
line = "「──魔王」"

[[dialogue]]
speaker = "イニシュ"
# 「今日は魔王のおかげで、初めて本物のラーメンを食すことができました」
line = "「今日は魔王のおかげで、初めて本物のラーメンを食すことができました」"

[[dialogue]]
speaker = "イニシュ"
