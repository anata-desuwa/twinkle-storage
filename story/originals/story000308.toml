line = "そして『<ruby>辣麺<rt>ラーメン</rt></ruby>』と書かれたのれんををくぐって──"

[[dialogue]]
speaker = "セドナ"
# 「激烈<ruby=マーラー>麻辣</ruby>麺、唐辛子１０倍で」
line = "「激烈<ruby>麻辣<rt>マーラー</rt></ruby>麺、唐辛子１０倍で」"

[[dialogue]]
speaker = "unk"
