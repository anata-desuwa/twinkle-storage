line = "「どの店にも個性があり、甲乙つけがたい味でした。しかも人間界にはまだまだたくさんのラーメンがあると聞きます」"

[[dialogue]]
speaker = "イニシュ"
# 「しばらくは謹慎の身になってしまいますが、いつかまた一緒にラーメンを食べたいです」
line = "「しばらくは謹慎の身になってしまいますが、いつかまた一緒にラーメンを食べたいです」"

[[dialogue]]
speaker = "ウェンディ"
# 「あのイニシュがこんなに柔らかく……。これもラーメンの力……！？」
line = "「あのイニシュがこんなに柔らかく……。これもラーメンの力……！？」"

[[dialogue]]
speaker = "ウェンディ"
# 「えーっと、あの……なんか流れで私の順番になってますけど……今日はご協力ありがとうございました」
line = "「えーっと、あの……なんか流れで私の順番になってますけど……今日はご協力ありがとうございました」"

[[dialogue]]
speaker = "ウェンディ"
