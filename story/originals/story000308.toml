[[dialogue]]
speaker = "セドナ"
# 「改めて評価するまでもないが、モンスターを戦力とする実験は失敗といっていいだろう」
line = "「改めて評価するまでもないが、モンスターを戦力とする実験は失敗といっていいだろう」"

[[dialogue]]
speaker = "セドナ"
# 「だがその過程は看過できないな。事情を整理するに──」
line = "「だがその過程は看過できないな。事情を整理するに──」"

[[dialogue]]
speaker = "セドナ"
# 「ミスで実験対象のモンスターを逃がし」
line = "「ミスで実験対象のモンスターを逃がし」"

[[dialogue]]
speaker = "ウェンディ"
# 「うっ」
line = "「うっ」"

[[dialogue]]
speaker = "セドナ"
# 「それを私に報告せず」
line = "「それを私に報告せず」"

[[dialogue]]
speaker = "ウェンディ"
# 「うぐっ」
line = "「うぐっ」"

[[dialogue]]
speaker = "セドナ"
