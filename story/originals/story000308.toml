[[dialogue]]
speaker = "ウェンディ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "unk"
# セドナは基地に戻るでもなく、ひとり人間界の繁華街にいた。
line = "セドナは基地に戻るでもなく、ひとり人間界の繁華街にいた。"

[[dialogue]]
speaker = "unk"
# 曲がりくねった細い路地を、勝手知ったるとばかりに迷いなく歩く。
line = "曲がりくねった細い路地を、勝手知ったるとばかりに迷いなく歩く。"

[[dialogue]]
speaker = "unk"
