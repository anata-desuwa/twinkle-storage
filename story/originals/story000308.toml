line = "それはセドナがこの店で頼むお決まりのメニュー。"

[[dialogue]]
speaker = "unk"
# セドナは涼しい顔で赤いスープに塗れた麺をすすり、彼女の獄炎のごとき辛味に舌鼓を打つのであった──
line = "セドナは涼しい顔で赤いスープに塗れた麺をすすり、彼女の獄炎のごとき辛味に舌鼓を打つのであった──"
