line = "「もぉぉ～～っ！　そんなに褒めるばっかりじゃ、恥ずかしくてどんな顔すればいいのか、わからないよぉ」"

[[dialogue]]
speaker = "レミカ"
# 「本当のことだから、仕方がないよ。この調子でレッスンと本番を重ねれば、私も間違いなく成長できるって確信してる」
line = "「本当のことだから、仕方がないよ。この調子でレッスンと本番を重ねれば、私も間違いなく成長できるって確信してる」"

[[dialogue]]
