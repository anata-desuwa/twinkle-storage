[[dialogue]]
speaker = "unk"
# メルエルとレミカの初めてのレッスン。その１曲目が終わった……！
line = "メルエルとレミカの初めてのレッスン。その１曲目が終わった……！"

[[dialogue]]
speaker = "メルエル"
# 「はぁっ……はぁっ……！　ど、どうだったかな……？　一応、最後まで通せたけれど……！」
line = "「はぁっ……はぁっ……！　ど、どうだったかな……？　一応、最後まで通せたけれど……！」"

[[dialogue]]
speaker = "レミカ"
# 「何でも言ってね。どんな意見でもありがたいから」
line = "「何でも言ってね。どんな意見でもありがたいから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあまずは私からね」
line = "「じゃあまずは私からね」"

[[dialogue]]
speaker = "メルエル"
# 「ご、ごくり……！」
line = "「ご、ごくり……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もう教えることはないわね！！」
line = "「もう教えることはないわね！！」"

[[dialogue]]
speaker = "メルエル"
# 「ええええ～っ！？　初日なのに！　初めての練習なのに！　もうちょっと何かあるでしょ、ヴィーナスちゃんっ！？」
line = "「ええええ～っ！？　初日なのに！　初めての練習なのに！　もうちょっと何かあるでしょ、ヴィーナスちゃんっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも実際、レミカもメルエルも完璧だったもの。意地悪なツッコミしようと思ってたのに肩透かしだったわ。クロトも同じ感想でしょ？」
line = "「でも実際、レミカもメルエルも完璧だったもの。意地悪なツッコミしようと思ってたのに肩透かしだったわ。クロトも同じ感想でしょ？」"

[[dialogue]]
speaker = "unk"
# 正直、言うことはあまりないかも
line = "正直、言うことはあまりないかも"

[[dialogue]]
speaker = "unk"
# そうだね……
line = "そうだね……"

[[dialogue]]
speaker = "メルエル"
# 「そ、そんなあっ！？　逆に不安になっちゃうんだけど……！」
line = "「そ、そんなあっ！？　逆に不安になっちゃうんだけど……！」"

[[dialogue]]
speaker = "レミカ"
# 「２人はお世辞で言ってるんじゃないと思うよ。私も同じ気持ちだから」
line = "「２人はお世辞で言ってるんじゃないと思うよ。私も同じ気持ちだから」"

[[dialogue]]
speaker = "レミカ"
# 「メルエルが歌上手なのは知ってたけど……ダンスもすごいね。キレがあって、よどみもなくて」
line = "「メルエルが歌上手なのは知ってたけど……ダンスもすごいね。キレがあって、よどみもなくて」"

[[dialogue]]
speaker = "レミカ"
# 「体力もあるから息切れもしないし。プリマステラ……エリート星騎士の名は伊達じゃないってことなのかな」
line = "「体力もあるから息切れもしないし。プリマステラ……エリート星騎士の名は伊達じゃないってことなのかな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、特に笑顔のキープが素敵だったわ！　ほんの一瞬たりとも『カワイイ』が崩れないなんて……やるじゃないメルエル！」
line = "「ええ、特に笑顔のキープが素敵だったわ！　ほんの一瞬たりとも『カワイイ』が崩れないなんて……やるじゃないメルエル！」"

[[dialogue]]
speaker = "メルエル"
# 「そ、それは……えへへ♪　会長くんが見ててくれたからかな、張り切っちゃって……！」
line = "「そ、それは……えへへ♪　会長くんが見ててくれたからかな、張り切っちゃって……！」"

[[dialogue]]
speaker = "unk"
# （俺は何もしてないような……？）
