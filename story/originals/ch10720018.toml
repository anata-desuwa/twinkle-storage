# 手足を拘束されたままミアがガクンガクンと痙攣する。一切抵抗できない彼女にありったけの精を注ぎ続ける。
line = "手足を拘束されたままミアがガクンガクンと痙攣する。一切抵抗できない彼女にありったけの精を注ぎ続ける。"

[[dialogue]]
speaker = "unk"
# そうして満足したところでゆっくりとペニスを抜いて──
line = "そうして満足したところでゆっくりとペニスを抜いて──"

[[dialogue]]
speaker = "ミア"
# 「はぁ、はぁ、はぁっ……<emoji=heart04>　え、えへへ、すごかった……<emoji=heart04>　本当の意味で会長さんとエッチできた気がする……<emoji=heart04>」
line = "「はぁ、はぁ、はぁっ……<emoji=heart04>　え、えへへ、すごかった……<emoji=heart04>　本当の意味で会長さんとエッチできた気がする……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
# 「私も、はぁはぁ、変な扉開いちゃったかも……<emoji=heart04>　縛られるのも、無理やりされるのも、ホント気持ち良かった……<emoji=heart04>」
line = "「私も、はぁはぁ、変な扉開いちゃったかも……<emoji=heart04>　縛られるのも、無理やりされるのも、ホント気持ち良かった……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
# 「へ、変態でごめんね……？　引いちゃうかしら……」
line = "「へ、変態でごめんね……？　引いちゃうかしら……」"

[[dialogue]]
speaker = "unk"
# まだ縛られたミアが不安そうに見つめてくる。でも変態というなら俺も──
line = "まだ縛られたミアが不安そうに見つめてくる。でも変態というなら俺も──"

[[dialogue]]
speaker = "ミア"
# 「ふぁ……<emoji=heart04>　ふふ、また固くなってる……<emoji=heart04>　やっぱり思った通り、会長さんってＳっ気が強かったのね……<emoji=heart04>」
line = "「ふぁ……<emoji=heart04>　ふふ、また固くなってる……<emoji=heart04>　やっぱり思った通り、会長さんってＳっ気が強かったのね……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
# 「なら、その……<emoji=heart04>　も、もっと私のこと調教してくれる……？　今まで我慢してきたこと、全部してくれていいから……<emoji=heart04>」
line = "「なら、その……<emoji=heart04>　も、もっと私のこと調教してくれる……？　今まで我慢してきたこと、全部してくれていいから……<emoji=heart04>」"

[[dialogue]]
speaker = "ミア"
# 「私を会長さんの、えへへ、愛の奴隷にして……？」
line = "「私を会長さんの、えへへ、愛の奴隷にして……？」"
