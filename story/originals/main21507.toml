[[dialogue]]
speaker = "unk"
# 第７話,Echoes of the Stars,B
line = "第７話,Echoes of the Stars,B"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「魔王の血統は伊達ではないようね。流石は広大な魔界の一角を統べるだけはある」
line = "「魔王の血統は伊達ではないようね。流石は広大な魔界の一角を統べるだけはある」"

[[dialogue]]
speaker = "煌嶺"
# 「気に食わん……！　妾を見下し、評するなど……貴様、よほど死にたいらしいな！」
line = "「気に食わん……！　妾を見下し、評するなど……貴様、よほど死にたいらしいな！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「称賛は素直に受け取るものよ。まさかここまで複製体を仕留められるとは思わなかったわ」
line = "「称賛は素直に受け取るものよ。まさかここまで複製体を仕留められるとは思わなかったわ」"

[[dialogue]]
speaker = "クロト"
# 「煌嶺、一旦下がってろ……あんたにだって、休息は必要なはずだ……！」
line = "「煌嶺、一旦下がってろ……あんたにだって、休息は必要なはずだ……！」"

[[dialogue]]
speaker = "煌嶺"
# 「あの痴れ者より先に死にたいか貴様？　手を出すな……！」
line = "「あの痴れ者より先に死にたいか貴様？　手を出すな……！」"

[[dialogue]]
speaker = "クロト"
# 「そんなこと、言ってる場合か……！　自分の負傷を考えろ！！」
line = "「そんなこと、言ってる場合か……！　自分の負傷を考えろ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「どちらが前に出ようと同じことよ」
line = "「どちらが前に出ようと同じことよ」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「新時代の女神として、貴方達の健闘を称えましょう。見事だったわ、アルタイルの星騎士たち」
line = "「新時代の女神として、貴方達の健闘を称えましょう。見事だったわ、アルタイルの星騎士たち」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「さようなら──パラレルライト・エグゼキュート」
line = "「さようなら──パラレルライト・エグゼキュート」"

[[dialogue]]
speaker = "unk"
# 最前線にいる、俺と煌嶺に殺到する光線の束──腕がちぎれるかもしれないが、今一度あの盾を使うしか──
line = "最前線にいる、俺と煌嶺に殺到する光線の束──腕がちぎれるかもしれないが、今一度あの盾を使うしか──"

[[dialogue]]
speaker = "クロト"
# 「な──！？」
line = "「な──！？」"

[[dialogue]]
speaker = "unk"
# ホロウの攻撃が、別方向から飛んできたもう１つの光弾によって相殺された……！？
line = "ホロウの攻撃が、別方向から飛んできたもう１つの光弾によって相殺された……！？"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「…………そんな、馬鹿な」
line = "「…………そんな、馬鹿な」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今度こそ一緒に行きましょう──ポラリス！！」
line = "「今度こそ一緒に行きましょう──ポラリス！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「くっ！？　相殺だけでは飽き足らず、反撃まで……！？」
line = "「くっ！？　相殺だけでは飽き足らず、反撃まで……！？」"

[[dialogue]]
speaker = "クロト"
# 「────ルヴィネ！！！」
line = "「────ルヴィネ！！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……遅れてごめんなさい、魔王」
line = "「……遅れてごめんなさい、魔王」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「まさか息を吹き返すだなんて……いや、それよりも、どうしてまた変身できるように……！？」
line = "「まさか息を吹き返すだなんて……いや、それよりも、どうしてまた変身できるように……！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「霊力を取り上げ損ねていた？　そんなはずは……」
line = "「霊力を取り上げ損ねていた？　そんなはずは……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「お父様──いいえ。『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』から受け取っていた霊力はもう、どこにもない」
line = "「お父様──いいえ。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』から受け取っていた霊力はもう、どこにもない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ポラリスが応えてくれた。私は１０年以上も嘘を吐き続けた、不誠実者なのに……」
line = "「ポラリスが応えてくれた。私は１０年以上も嘘を吐き続けた、不誠実者なのに……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「──大切なものを守るためなら、星の輝きを届けてあげる。そう言ってもらえた！」
line = "「──大切なものを守るためなら、星の輝きを届けてあげる。そう言ってもらえた！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「極星学園星徒会長、ルヴィネ──戦線に戻るわ！　リクリエを退ける手助けをさせて頂戴！」
line = "「極星学園星徒会長、ルヴィネ──戦線に戻るわ！　リクリエを退ける手助けをさせて頂戴！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「出来損ないのくせに、ずいぶんと大口を叩くわね？　たかが星騎士が１人増えたところで──」
line = "「出来損ないのくせに、ずいぶんと大口を叩くわね？　たかが星騎士が１人増えたところで──」"

[[dialogue]]
speaker = "unk"
# 嘲笑しようとしたホロウが、驚きで目を見開く。
line = "嘲笑しようとしたホロウが、驚きで目を見開く。"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「……どういうこと？　お前のその力は……いったい！？」
line = "「……どういうこと？　お前のその力は……いったい！？」"

[[dialogue]]
speaker = "フィオナ"
# 「温かで、澄んだ星力が──」
line = "「温かで、澄んだ星力が──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ルヴィネから、私たちに流れ込んでくるわ……！？」
line = "「ルヴィネから、私たちに流れ込んでくるわ……！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王。貴方は倒れるたびに自身の戦闘力を底上げする──そんな特性を持っていたわね」
line = "「魔王。貴方は倒れるたびに自身の戦闘力を底上げする──そんな特性を持っていたわね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私がポラリスから与えられたのは、愛しいものすべてを守る力……」
line = "「私がポラリスから与えられたのは、愛しいものすべてを守る力……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「みんなとずっと一緒にいるための──戦う力よ！！」
line = "「みんなとずっと一緒にいるための──戦う力よ！！」"

[[dialogue]]
speaker = "クロト"
# 「これは……！！」
line = "「これは……！！」"

[[dialogue]]
speaker = "unk"
# 癒やしの力とは違う、傷が治っているわけではないが──
line = "癒やしの力とは違う、傷が治っているわけではないが──"

[[dialogue]]
speaker = "unk"
# 彼女の発散した温かな星力が身体に馴染み、限界を超えて引き上げられていくのを感じる──！！
line = "彼女の発散した温かな星力が身体に馴染み、限界を超えて引き上げられていくのを感じる──！！"

[[dialogue]]
speaker = "マトイ"
# 「凄い……もう限界だって、思ってたのに……！」
line = "「凄い……もう限界だって、思ってたのに……！」"

[[dialogue]]
speaker = "サーシャ"
# 「戦える。ルヴィネちゃんの星力が、支えてくれているのを感じるわ……！！」
line = "「戦える。ルヴィネちゃんの星力が、支えてくれているのを感じるわ……！！」"

[[dialogue]]
speaker = "unk"
# 周囲の味方に自らの星力を分け与え、限界を超えて戦う力を付与する──それがルヴィネが手にした、星の輝き。
line = "周囲の味方に自らの星力を分け与え、限界を超えて戦う力を付与する──それがルヴィネが手にした、星の輝き。"

[[dialogue]]
speaker = "unk"
# 人間も天使も魔族も隔てなく。どこまでも優しく温かい力──！
line = "人間も天使も魔族も隔てなく。どこまでも優しく温かい力──！"

[[dialogue]]
speaker = "アナ"
# 「──なるほど。この力で、トリュファイナさんの治癒の力すら引き上げられた。だからこそ、ルヴィネさんも復活できた……！？」
line = "「──なるほど。この力で、トリュファイナさんの治癒の力すら引き上げられた。だからこそ、ルヴィネさんも復活できた……！？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はい！　強化された今の私ならば……今一度、奇蹟を起こせるはずです！」
line = "「はい！　強化された今の私ならば……今一度、奇蹟を起こせるはずです！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「皆様、立ち上がってください！　ルクス・アルカナ──ベネディクティオ！！」
line = "「皆様、立ち上がってください！　ルクス・アルカナ──ベネディクティオ！！」"

[[dialogue]]
speaker = "unk"
# トリュファイナさんの足元に形成された魔法陣がフィールド全域に広がり、負傷によって閉じかけていた守護星とのリンクが急速に回復していく──！
line = "トリュファイナさんの足元に形成された魔法陣がフィールド全域に広がり、負傷によって閉じかけていた守護星とのリンクが急速に回復していく──！"

[[dialogue]]
speaker = "ヴィーナス"
# 「凄いわ──これなら！！」
line = "「凄いわ──これなら！！」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ……もう一度！！」
line = "「ええ……もう一度！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「そんな、馬鹿なことが……！？」
line = "「そんな、馬鹿なことが……！？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「フィーニスの塔に入る前より、今の方がずっと強い……！」
line = "「フィーニスの塔に入る前より、今の方がずっと強い……！」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「元気いっぱい。フルチャージ完了です」
line = "「元気いっぱい。フルチャージ完了です」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「絶好調ね～、うふふ♪」
line = "「絶好調ね～、うふふ♪」"

[[dialogue]]
speaker = "アポロ"
# 「すごい、どんどん力が送られてくる……！　これならイケるぜ！！」
line = "「すごい、どんどん力が送られてくる……！　これならイケるぜ！！」"

[[dialogue]]
speaker = "ジグ"
# 「ここまでお膳立てされたからには、勝利を掴まなくちゃね」
line = "「ここまでお膳立てされたからには、勝利を掴まなくちゃね」"

[[dialogue]]
speaker = "煌嶺"
# 「フン……余計なことを。だが今の妾なら、あの木偶を残らず殺しきれよう！」
line = "「フン……余計なことを。だが今の妾なら、あの木偶を残らず殺しきれよう！」"

[[dialogue]]
speaker = "チナ"
# 「へへ。またルヴィと一緒に戦えるだなんてな！」
line = "「へへ。またルヴィと一緒に戦えるだなんてな！」"

[[dialogue]]
speaker = "レティシア"
# 「みんなが一緒の未来を勝ち取るために……！」
line = "「みんなが一緒の未来を勝ち取るために……！」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　目にものを見せてやりましょう！」
line = "「はい！　目にものを見せてやりましょう！」"

[[dialogue]]
speaker = "ベアトリス"
# 「行くよ、極星星徒会！　アルタイルを救って世界を守る！！」
line = "「行くよ、極星星徒会！　アルタイルを救って世界を守る！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「想定外の状況──覆さなくては。デネブから私を、呼べるだけ呼ばなくては……！」
line = "「想定外の状況──覆さなくては。デネブから私を、呼べるだけ呼ばなくては……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王。転送装置を持っているホロウは……」
line = "「魔王。転送装置を持っているホロウは……」"

[[dialogue]]
speaker = "クロト"
# 「一番奥にいる。何十人と溢れているホロウたちに囲まれた、完璧な陣形の向こうに」
line = "「一番奥にいる。何十人と溢れているホロウたちに囲まれた、完璧な陣形の向こうに」"

[[dialogue]]
speaker = "ルヴィネ"
# 「そう──デネブへの逃亡を許さず、奪い取るしかないわね」
line = "「そう──デネブへの逃亡を許さず、奪い取るしかないわね」"

[[dialogue]]
speaker = "unk"
# 絶望的な状況なのに、闘志が湧くばかりだ。
line = "絶望的な状況なのに、闘志が湧くばかりだ。"

[[dialogue]]
speaker = "unk"
# 今の俺たちには、トリュファイナさんによる回復と、ルヴィネからの星力供給がある。
line = "今の俺たちには、トリュファイナさんによる回復と、ルヴィネからの星力供給がある。"

[[dialogue]]
speaker = "ルヴィネ"
# 「背中を任せていいかしら、魔王」
line = "「背中を任せていいかしら、魔王」"

[[dialogue]]
speaker = "クロト"
# 「ああ。君の背中は俺に任せろ。誰一人欠けることなく、勝利を掴む！」
line = "「ああ。君の背中は俺に任せろ。誰一人欠けることなく、勝利を掴む！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ！　いきましょう──決着をつけるわ！！」
line = "「ええ！　いきましょう──決着をつけるわ！！」"
