[[dialogue]]
speaker = "unk"
# とある休日。
line = "とある休日。"

[[dialogue]]
speaker = "unk"
# 俺は恋人のジュエリーと、リゾート結界のプライベートビーチにやって来ていた。
line = "俺は恋人のジュエリーと、リゾート結界のプライベートビーチにやって来ていた。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「そ～っと……」
line = "「そ～っと……」"

[[dialogue]]
speaker = "unk"
# 彼女はおもむろに、日傘の影から手を出すと――
line = "彼女はおもむろに、日傘の影から手を出すと――"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「おおっ！　すごい！」
line = "「おおっ！　すごい！」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「助手の言っていた通り、本当に日の光を浴びても痛くない！　むしろ心地良い暖かさだ♪」
line = "「助手の言っていた通り、本当に日の光を浴びても痛くない！　むしろ心地良い暖かさだ♪」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふふっ♪　あははっ♪」
line = "「ふふっ♪　あははっ♪」"

[[dialogue]]
speaker = "unk"
# 日傘をどけて常夏の太陽を見上げながら、嬉しそうにくるくると回って、はしゃぐジュエリー。
line = "日傘をどけて常夏の太陽を見上げながら、嬉しそうにくるくると回って、はしゃぐジュエリー。"

[[dialogue]]
speaker = "unk"
# リゾート結界は、結界の主であるリップルの設定次第で紫外線をカットすることが可能だという。
line = "リゾート結界は、結界の主であるリップルの設定次第で紫外線をカットすることが可能だという。"

[[dialogue]]
speaker = "unk"
# 俺からそのことを聞いたジュエリーが、是非試してみたいと言い出して、本日遊びに来たというわけである。
line = "俺からそのことを聞いたジュエリーが、是非試してみたいと言い出して、本日遊びに来たというわけである。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふふふっ♪　これはいい♪　今までにないくらい開放的な気分だよ♪」
line = "「ふふふっ♪　これはいい♪　今までにないくらい開放的な気分だよ♪」"

[[dialogue]]
speaker = "クロト"
# 「喜んでもらえて何よりだ」
line = "「喜んでもらえて何よりだ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「……！　そうだ。いいことを思いついたぞ」
line = "「……！　そうだ。いいことを思いついたぞ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「なぁ助手？　このプライベートビーチは今日、私たちの貸しきりで、他に誰も来ないと言っていただろう？」
line = "「なぁ助手？　このプライベートビーチは今日、私たちの貸しきりで、他に誰も来ないと言っていただろう？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「なら――」
line = "「なら――」"

[[dialogue]]
speaker = "unk"
# 彼女は俺に近付くと、耳元で囁く。
line = "彼女は俺に近付くと、耳元で囁く。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「この開放的なロケーションの中で、エッチとか……どうだい？」
line = "「この開放的なロケーションの中で、エッチとか……どうだい？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「いわゆる、『青姦エッチ』だ<emoji=heart04>　青空の下、見晴らしのいい場所で、最愛の人と睦みあったらどんな風になってしまうのか……とても好奇心が疼く<emoji=heart04>」
line = "「いわゆる、『青姦エッチ』だ<emoji=heart04>　青空の下、見晴らしのいい場所で、最愛の人と睦みあったらどんな風になってしまうのか……とても好奇心が疼く<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「もちろん私の体では、しようと思ってできるものではないが──この場所なら、それも可能なんだろう？」
line = "「もちろん私の体では、しようと思ってできるものではないが──この場所なら、それも可能なんだろう？」"

[[dialogue]]
speaker = "クロト"
# 「……正直、期待してなかったと言ったら嘘になる」
line = "「……正直、期待してなかったと言ったら嘘になる」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふふっ<emoji=heart04>　決まりだね<emoji=heart04>」
line = "「ふふっ<emoji=heart04>　決まりだね<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「じゃあ……」
line = "「じゃあ……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そっと唇を差し出してくる彼女に、俺はキスをする。
line = "そっと唇を差し出してくる彼女に、俺はキスをする。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ちゅっ<emoji=heart04>　ちゅむっ……ちゅぷっ、ちゅぷぷっ<emoji=heart04>　ちゅれるっ……ちゅるるっ、れるれるっ<emoji=heart04>　れろちゅっ<emoji=heart04>　ちゅっ……ちゅうぅっ……ちゅぱっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　ちゅむっ……ちゅぷっ、ちゅぷぷっ<emoji=heart04>　ちゅれるっ……ちゅるるっ、れるれるっ<emoji=heart04>　れろちゅっ<emoji=heart04>　ちゅっ……ちゅうぅっ……ちゅぱっ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「んっ……はあぁぁ<emoji=heart04>　キス、気持ちいいな……<emoji=heart04>」
line = "「んっ……はあぁぁ<emoji=heart04>　キス、気持ちいいな……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「足の力が抜けてしまったよ……<emoji=heart04>」
line = "「足の力が抜けてしまったよ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから、俺たちはビーチチェアーのところまで移動して――
