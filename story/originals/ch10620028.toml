[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、ありがとう。多少弱いところもあるが、はぁぁ<emoji=heart04>　……私は自分の肌の美しさは誇りでね。だからそれを褒められると、とても嬉しい……<emoji=heart04>」
line = "「ふふっ、ありがとう。多少弱いところもあるが、はぁぁ<emoji=heart04>　……私は自分の肌の美しさは誇りでね。だからそれを褒められると、とても嬉しい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
