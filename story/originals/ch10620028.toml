line = "「ごめん、ジュエリーは俺の恋人なんだって気分になっちゃうとつい……」"

[[dialogue]]
speaker = "ジュエリー"
# 「ふふっ、なるほど……マーキングか。はふぅぅ<emoji=heart04>　なら、せめて……服に隠れて見えないところにしてくれたまえ<emoji=heart04>」
