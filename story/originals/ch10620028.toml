line = "「んっ……<emoji=heart04>　白い肌だからこそ、余計に目立ってしまうだろう<emoji=heart04>　はふぅ<emoji=heart04>　……この前、ミネコやフェリシーに見つけられて、大変だったんだぞ<emoji=heart04>」"

[[dialogue]]
speaker = "クロト"
