[[dialogue]]
speaker = "ジュエリー"
# 「だ、誰もいないとわかっていても……はぁぁ<emoji=heart04>　外でおっぱいとおま○こを晒しているだけで、んぅぅ<emoji=heart04>　……落ち着かない心持ちとでもいうのか、ドキドキ、するな<emoji=heart04>」
line = "「だ、誰もいないとわかっていても……はぁぁ<emoji=heart04>　外でおっぱいとおま○こを晒しているだけで、んぅぅ<emoji=heart04>　……落ち着かない心持ちとでもいうのか、ドキドキ、するな<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「人は脳内で他人の視線を想定するという……ふぅぅ<emoji=heart04>　この羞恥心は、私の脳が勝手に作り出したものだと考えると、とても興味深いな<emoji=heart04>　はふぅぅ……」
line = "「人は脳内で他人の視線を想定するという……ふぅぅ<emoji=heart04>　この羞恥心は、私の脳が勝手に作り出したものだと考えると、とても興味深いな<emoji=heart04>　はふぅぅ……」"

[[dialogue]]
speaker = "クロト"
# 「ジュエリーの肌、すごく綺麗だ」
