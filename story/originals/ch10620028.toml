[[dialogue]]
speaker = "unk"
# そんな風に許可が下りるものだから、俺は首筋よりもう少し下の、肩や背中にキスを落としてゆく。
line = "そんな風に許可が下りるものだから、俺は首筋よりもう少し下の、肩や背中にキスを落としてゆく。"

