[[dialogue]]
speaker = "ジュエリー"
# 「はあぁ……ふうぅ……<emoji=heart04>」
line = "「はあぁ……ふうぅ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 日傘をしまったジュエリーの白い肌が、明るい日差しの下にさらけ出される。
