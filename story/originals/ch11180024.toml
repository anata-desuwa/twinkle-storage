[[dialogue]]
speaker = "unk"
# 第４話,複雑な関係,P
line = "第４話,複雑な関係,P"

[[dialogue]]
speaker = "メルエル"
# 「あ、会長くんっ。ナターシャちゃん見なかった？　……そっか、見てないんだ」
line = "「あ、会長くんっ。ナターシャちゃん見なかった？　……そっか、見てないんだ」"

[[dialogue]]
speaker = "メルエル"
# 「実はここのところナターシャちゃんに全然会えなくて。なんとなく遠目から監視されてる気配は感じるんだけど」
line = "「実はここのところナターシャちゃんに全然会えなくて。なんとなく遠目から監視されてる気配は感じるんだけど」"

[[dialogue]]
speaker = "メルエル"
# 「やっぱり避けられてるのかな……。話したいことたくさんあるんだけどな……」
line = "「やっぱり避けられてるのかな……。話したいことたくさんあるんだけどな……」"

[[dialogue]]
speaker = "unk"
# ナターシャを見つけたら言っとくよ
line = "ナターシャを見つけたら言っとくよ"

[[dialogue]]
speaker = "メルエル"
# 「ありがとう。もしナターシャちゃんを見つけたら、申し訳ないけどお願いね。それじゃまた」
line = "「ありがとう。もしナターシャちゃんを見つけたら、申し訳ないけどお願いね。それじゃまた」"

[[dialogue]]
speaker = "unk"
# いるんだろ、ナターシャ
line = "いるんだろ、ナターシャ"

[[dialogue]]
speaker = "ナターシャ"
# 「……よくわかったね？　気配は完全に消してたのに」
line = "「……よくわかったね？　気配は完全に消してたのに」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さんも人が悪いね。私に気付いてたのにメルエルに言わないなんて」
line = "「会長さんも人が悪いね。私に気付いてたのにメルエルに言わないなんて」"

[[dialogue]]
speaker = "unk"
# まだ見つけてはいなかったから
line = "まだ見つけてはいなかったから"

[[dialogue]]
speaker = "ナターシャ"
# 「うわー、屁理屈だー。そういうの女の子に嫌われるよー？」
line = "「うわー、屁理屈だー。そういうの女の子に嫌われるよー？」"

[[dialogue]]
speaker = "unk"
# 俺も２人が話すのはまだ早いと思ってる
line = "俺も２人が話すのはまだ早いと思ってる"

[[dialogue]]
speaker = "ナターシャ"
# 「ふーん……」
line = "「ふーん……」"

[[dialogue]]
speaker = "ナターシャ"
# 「私のことなんか気遣わなくていいのに。所詮、いつ果てるかもわからない暗殺者だよ？」
line = "「私のことなんか気遣わなくていいのに。所詮、いつ果てるかもわからない暗殺者だよ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「私を気遣うくらいなら、メルエルを気遣ってあげなよ。あの通り、私に袖にされて悩んでるみたいだから」
line = "「私を気遣うくらいなら、メルエルを気遣ってあげなよ。あの通り、私に袖にされて悩んでるみたいだから」"

[[dialogue]]
speaker = "ナターシャ"
# 「きっと今ならメルエルのこと簡単に堕とせるよ？　傍に居るだけで好感度爆上がりだ」
line = "「きっと今ならメルエルのこと簡単に堕とせるよ？　傍に居るだけで好感度爆上がりだ」"

[[dialogue]]
speaker = "unk"
# 誰の傍にいるかは俺が決めるよ
line = "誰の傍にいるかは俺が決めるよ"

[[dialogue]]
speaker = "ナターシャ"
# 「……本当に物好きだね、会長さんは」
line = "「……本当に物好きだね、会長さんは」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さん、最近、私とメルエルが鉢合わせしないように気を遣ってくれてるよね」
line = "「会長さん、最近、私とメルエルが鉢合わせしないように気を遣ってくれてるよね」"

[[dialogue]]
speaker = "ナターシャ"
# 「それとなくメルエルの行き先を教えてくれたりとか、メルエルが選管の活動場所に来ないようにしてくれたりとか」
line = "「それとなくメルエルの行き先を教えてくれたりとか、メルエルが選管の活動場所に来ないようにしてくれたりとか」"

[[dialogue]]
speaker = "ナターシャ"
# 「気付かないとでも思った？　私だって会長さんの考えてることくらい、少しはわかるよ」
line = "「気付かないとでも思った？　私だって会長さんの考えてることくらい、少しはわかるよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「なんだかんだ長い付き合いになってきたしね？　ま、幼馴染みには負けるけど」
line = "「なんだかんだ長い付き合いになってきたしね？　ま、幼馴染みには負けるけど」"

[[dialogue]]
speaker = "ナターシャ"
# 「変なところで優しくて……。余計なお節介ばかり焼いてくれて……」
line = "「変なところで優しくて……。余計なお節介ばかり焼いてくれて……」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ、会長さんがモテモテな理由がよくわかるよ。私が単純な女の子なら、コロっと堕ちちゃいそうだ」
line = "「ふふ、会長さんがモテモテな理由がよくわかるよ。私が単純な女の子なら、コロっと堕ちちゃいそうだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも、私はそこまで単純じゃないから。そういう感情を私に期待するのはお門違いだよ？」
line = "「でも、私はそこまで単純じゃないから。そういう感情を私に期待するのはお門違いだよ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「私はあくまで仕事で会長さんの近くにいるだけだから。ビジネスライクな関係ってヤツ？」
line = "「私はあくまで仕事で会長さんの近くにいるだけだから。ビジネスライクな関係ってヤツ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま……会長さんと一緒にいるのは嫌いじゃないけどね？」
line = "「ま……会長さんと一緒にいるのは嫌いじゃないけどね？」"

[[dialogue]]
speaker = "ナターシャ"
# 「会長さんが私を好きになる分には……勝手にしてくれて構わないけど」
line = "「会長さんが私を好きになる分には……勝手にしてくれて構わないけど」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも、メルエルの前で露骨にそういう態度は見せないでね？　今以上に険悪な仲になっちゃいそうだ」
line = "「でも、メルエルの前で露骨にそういう態度は見せないでね？　今以上に険悪な仲になっちゃいそうだ」"

[[dialogue]]
speaker = "unk"
# 気を付けるよ
line = "気を付けるよ"

[[dialogue]]
speaker = "ナターシャ"
# 「うん……気を付けて」
line = "「うん……気を付けて」"

[[dialogue]]
speaker = "ナターシャ"
# 「ちゃんと気を付けてくれるのなら──……」
line = "「ちゃんと気を付けてくれるのなら──……」"

[[dialogue]]
speaker = "ナターシャ"
# 「ちゅ……んっ……<emoji=heart04>」
line = "「ちゅ……んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
# 「色仕掛けの練習がてら、ふふ。ほっぺにチューくらいしてあげるから<emoji=heart04>」
line = "「色仕掛けの練習がてら、ふふ。ほっぺにチューくらいしてあげるから<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
# 「あはは、顔真っ赤じゃない。ほっぺにキスされたくらいで、そんなに照れるなんて、よっぽど私のこと好きなんだね？」
line = "「あはは、顔真っ赤じゃない。ほっぺにキスされたくらいで、そんなに照れるなんて、よっぽど私のこと好きなんだね？」"

[[dialogue]]
speaker = "ナターシャ"
# 「この前の不意打ちキスより赤くなってるよ？　コロっと堕ちやすいのは、会長さんの方だったか♪」
line = "「この前の不意打ちキスより赤くなってるよ？　コロっと堕ちやすいのは、会長さんの方だったか♪」"

[[dialogue]]
speaker = "ナターシャ"
# 「でも、会長さんのそういう顔見てると心が和んでくるよ」
line = "「でも、会長さんのそういう顔見てると心が和んでくるよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ありがとね、会長さん。私なんかの傍にいてくれて」
line = "「ありがとね、会長さん。私なんかの傍にいてくれて」"

[[dialogue]]
speaker = "ナターシャ"
# 「私もちゃんとわかってるから。いつまでもメルエルのこと無視していられないって。そのうち、きちんと話すつもり」
line = "「私もちゃんとわかってるから。いつまでもメルエルのこと無視していられないって。そのうち、きちんと話すつもり」"

[[dialogue]]
speaker = "ナターシャ"
# 「その時は……会長さんにも一緒にいてもらっていいかな？」
line = "「その時は……会長さんにも一緒にいてもらっていいかな？」"

[[dialogue]]
speaker = "unk"
# もちろん、そのつもりだよ
line = "もちろん、そのつもりだよ"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ、心強いよ。その言葉だけで楽になった気がする」
line = "「ふふ、心強いよ。その言葉だけで楽になった気がする」"

[[dialogue]]
speaker = "ナターシャ"
# 「じゃあ、その時はよろしくね？　それとこれは──」
line = "「じゃあ、その時はよろしくね？　それとこれは──」"

[[dialogue]]
speaker = "ナターシャ"
# 「んっ……んちゅぅっ……<emoji=heart04>　ふっ……んんっ……<emoji=heart04>」
line = "「んっ……んちゅぅっ……<emoji=heart04>　ふっ……んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ、お礼の前払いだよ<emoji=heart04>　こんな時でもなければ払えそうにないからね<emoji=heart04>」
line = "「ふふ、お礼の前払いだよ<emoji=heart04>　こんな時でもなければ払えそうにないからね<emoji=heart04>」"

[[dialogue]]
speaker = "ナターシャ"
# 「メルエルには……内緒だよ<emoji=heart04>」
line = "「メルエルには……内緒だよ<emoji=heart04>」"
