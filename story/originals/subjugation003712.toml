[[dialogue]]
speaker = "unk"
# 第１２話,ＶＳ星喰らいシャドウ・黒騎士戦闘後,B
line = "第１２話,ＶＳ星喰らいシャドウ・黒騎士戦闘後,B"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「メルエル！　敵陣の中央に風穴を開けるよ、突っ込んで！」
line = "「メルエル！　敵陣の中央に風穴を開けるよ、突っ込んで！」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「任せて！！　────たあぁあぁああぁっ！！」
line = "「任せて！！　────たあぁあぁああぁっ！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「────ぐぅうっ！！」
line = "「────ぐぅうっ！！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「いい動きだね～♪　私たち、けっこー良いコンビかも？」
line = "「いい動きだね～♪　私たち、けっこー良いコンビかも？」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「デネブでも一緒に戦ったしね！　マインちゃん、どんどん行こう！」
line = "「デネブでも一緒に戦ったしね！　マインちゃん、どんどん行こう！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「りょ～かい♪　会長に情けない報告もできないし！　爆弾ちゃんバズーカ、一斉射撃っ！！」
line = "「りょ～かい♪　会長に情けない報告もできないし！　爆弾ちゃんバズーカ、一斉射撃っ！！」"

[[dialogue]]
speaker = "レイラ"
# 「集団相手なら私にお任せください──デッドエンド・コラプサー！！！」
line = "「集団相手なら私にお任せください──デッドエンド・コラプサー！！！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──エラーを検知。処理スピード、異常」
line = "「──エラーを検知。処理スピード、異常」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「こちらの攻撃。空振り、空振り、空振り──何故！？」
line = "「こちらの攻撃。空振り、空振り、空振り──何故！？」"

[[dialogue]]
speaker = "コハルコ（覚醒）"
# 「みんな、感覚を研ぎ澄ませて！　黒騎士までの道を切り開くよ！！」
line = "「みんな、感覚を研ぎ澄ませて！　黒騎士までの道を切り開くよ！！」"

[[dialogue]]
speaker = "キサナ"
# 「はは！　いいぞ！　もっと加速星術を飛ばせ！　楽しくなってきた！」
line = "「はは！　いいぞ！　もっと加速星術を飛ばせ！　楽しくなってきた！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「げ、激戦区すぎでございますわ～！？　いくら光の魔女のブーストがあるからって！　一歩間違えば即死なのですけど！？」
line = "「げ、激戦区すぎでございますわ～！？　いくら光の魔女のブーストがあるからって！　一歩間違えば即死なのですけど！？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「嗚呼──ホロウ・ルヴィネのシャドウ。美しいものが儚く散る様は、どうしてこんなにも素晴らしいのでしょう！」
line = "「嗚呼──ホロウ・ルヴィネのシャドウ。美しいものが儚く散る様は、どうしてこんなにも素晴らしいのでしょう！」"

[[dialogue]]
speaker = "リーナ"
# 「みんな消えちゃえ、消えちゃえ消えちゃえ消えちゃえ──！！」
line = "「みんな消えちゃえ、消えちゃえ消えちゃえ消えちゃえ──！！」"

[[dialogue]]
speaker = "エンジュ"
# 「気に入らないっ……消滅する時もあっさりした顔しやがって！　覚悟もない癖に戦場に出てくるなっ！！」
line = "「気に入らないっ……消滅する時もあっさりした顔しやがって！　覚悟もない癖に戦場に出てくるなっ！！」"

[[dialogue]]
speaker = "イングリット"
# 「全部私の獲物だ！　もっと斬らせろ！！」
line = "「全部私の獲物だ！　もっと斬らせろ！！」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしのグレネードも負けてないぞっ──火力ＭＡＸだ！！」
line = "「あたしのグレネードも負けてないぞっ──火力ＭＡＸだ！！」"

[[dialogue]]
speaker = "黒騎士"
# 「ぐぅ、ううぅっ────！？」
line = "「ぐぅ、ううぅっ────！？」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「見えたっ──！！」
line = "「見えたっ──！！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「これが、最後の一発──！！」
line = "「これが、最後の一発──！！」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「おおぉぉぉおぉぉおおおおおっ────！！！」
line = "「おおぉぉぉおぉぉおおおおおっ────！！！」"

[[dialogue]]
speaker = "unk"
# コハルコの加速星術で人智を超えるスピードを手に入れた星騎士たちが、一斉に黒騎士に肉薄する。
line = "コハルコの加速星術で人智を超えるスピードを手に入れた星騎士たちが、一斉に黒騎士に肉薄する。"

[[dialogue]]
speaker = "黒騎士"
# 「──ムゥウゥゥゥウウンッ！！！」
line = "「──ムゥウゥゥゥウウンッ！！！」"

[[dialogue]]
speaker = "unk"
# 亡き父の幻影が振り下ろした一撃は、思わず見惚れてしまうほどの<ruby=れっぱく>裂帛</ruby>の一撃。
line = "亡き父の幻影が振り下ろした一撃は、思わず見惚れてしまうほどの<ruby>裂帛<rt>れっぱく</rt></ruby>の一撃。"

[[dialogue]]
speaker = "unk"
# ──しかし。
line = "──しかし。"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「──遅いッ！！！」
line = "「──遅いッ！！！」"

[[dialogue]]
speaker = "unk"
# アニュラスは一刀の剣でそれを弾き、黒騎士の体勢を崩した。
line = "アニュラスは一刀の剣でそれを弾き、黒騎士の体勢を崩した。"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「私は……１人じゃない！　仲間の力で──今！　貴方を超えるッ！！」
line = "「私は……１人じゃない！　仲間の力で──今！　貴方を超えるッ！！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「最後はみんなで──！！」
line = "「最後はみんなで──！！」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「うん──アニュラスちゃん！！」
line = "「うん──アニュラスちゃん！！」"

[[dialogue]]
speaker = "３人"
# 『ユニゾン！！！』
line = "『ユニゾン！！！』"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「スプリーム────デターミネーションッ！！！」
line = "「スプリーム────デターミネーションッ！！！」"

[[dialogue]]
speaker = "unk"
# アニュラス、メルエル、ネーゼマインのユニゾンアタックが、黒騎士に致命の一撃を与えた──
line = "アニュラス、メルエル、ネーゼマインのユニゾンアタックが、黒騎士に致命の一撃を与えた──"

[[dialogue]]
speaker = "黒騎士"
# 「グ…………ゥ、ァッ…………！！」
line = "「グ…………ゥ、ァッ…………！！」"

[[dialogue]]
speaker = "黒騎士"
# 「フ…………フ、フフ………………」
line = "「フ…………フ、フフ………………」"

[[dialogue]]
speaker = "黒騎士"
# 「見事、だ…………星、騎、士…………」
line = "「見事、だ…………星、騎、士…………」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「……終わった、ね」
line = "「……終わった、ね」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「うん……これで、ようやく会長をベガに呼ぶことができるよ……」
line = "「うん……これで、ようやく会長をベガに呼ぶことができるよ……」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「…………お父様、さようなら」
line = "「…………お父様、さようなら」"

[[dialogue]]
speaker = "アニュラス（覚醒）"
# 「どうか──安らかに────」
line = "「どうか──安らかに────」"

[[dialogue]]
speaker = "クロト"
# 「……そうか。連絡ありがとう、メルエル」
line = "「……そうか。連絡ありがとう、メルエル」"

[[dialogue]]
speaker = "unk"
# 平行世界門から、最後の『星喰らい』を討滅した報せを受け取った。
line = "平行世界門から、最後の『星喰らい』を討滅した報せを受け取った。"

[[dialogue]]
speaker = "梨緒"
# 「……魔王、いよいよだな」
line = "「……魔王、いよいよだな」"

[[dialogue]]
speaker = "ジグ"
# 「今の勝利によって視える未来が変わった──『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の位置が、特定できたよ」
line = "「今の勝利によって視える未来が変わった──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の位置が、特定できたよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「最終決戦だね、会長？」
line = "「最終決戦だね、会長？」"

[[dialogue]]
speaker = "クロト"
# 「…………ああ。待たせたな、極星学園のみんな」
line = "「…………ああ。待たせたな、極星学園のみんな」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ええ。魔王、行きましょう」
line = "「……ええ。魔王、行きましょう」"

[[dialogue]]
speaker = "unk"
# 俺は右手を握り、開き──そこに宿る厄災の力を確認した。
line = "俺は右手を握り、開き──そこに宿る厄災の力を確認した。"

[[dialogue]]
speaker = "unk"
# ……問題ない。
line = "……問題ない。"

[[dialogue]]
speaker = "クロト"
# 「行こう──『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』のところに」
line = "「行こう──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』のところに」"
