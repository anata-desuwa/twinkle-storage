[[dialogue]]
speaker = "unk"
# 気がつくと──そこは九浄家のカジノではなかった。
line = "気がつくと──そこは九浄家のカジノではなかった。"

[[dialogue]]
speaker = "unk"
# ここは一体……！？
line = "ここは一体……！？"

[[dialogue]]
speaker = "unk"
# かつて九浄家のカジノに出没したトランプモンスターが、カジノ中のいたるところで忙しなく働いている。
line = "かつて九浄家のカジノに出没したトランプモンスターが、カジノ中のいたるところで忙しなく働いている。"

[[dialogue]]
speaker = "unk"
# モンスターの近くには、可憐なバニー服に身を纏った女性が何人も──というか、モンスター以外はバニーガールしかいない……？
line = "モンスターの近くには、可憐なバニー服に身を纏った女性が何人も──というか、モンスター以外はバニーガールしかいない……？"

[[dialogue]]
speaker = "unk"
# 幸いモンスターたちに今のところ敵意は見られない。ドル箱やチップを運んで、バニーガールたちと共にゲームに興じている様子だが──
line = "幸いモンスターたちに今のところ敵意は見られない。ドル箱やチップを運んで、バニーガールたちと共にゲームに興じている様子だが──"

[[dialogue]]
speaker = "unk"
# こうしてはいられない。みんなを探さないと！
line = "こうしてはいられない。みんなを探さないと！"

[[dialogue]]
speaker = "unk"
# 大勢のバニーとトランプモンスターでごった返す謎のカジノを走り回っていると──
line = "大勢のバニーとトランプモンスターでごった返す謎のカジノを走り回っていると──"

[[dialogue]]
speaker = "unk"
# マイン──！？
line = "マイン──！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "unk"
# でも無事でよかった！
line = "でも無事でよかった！"

[[dialogue]]
speaker = "unk"
# 一体その恰好は……！？
line = "一体その恰好は……！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えっ……まさか……会長……？」
line = "「えっ……まさか……会長……？」"

[[dialogue]]
speaker = "unk"
# 他の２人は！？
line = "他の２人は！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えっと……２人なら会長を探しに行って──あ、戻ってきたっ」
line = "「えっと……２人なら会長を探しに行って──あ、戻ってきたっ」"

[[dialogue]]
speaker = "セナリィ"
# 「マイン、だめですわ。会長様はどこにも……」
line = "「マイン、だめですわ。会長様はどこにも……」"

[[dialogue]]
speaker = "セナリィ"
# 「──ってぇ！？　会長様！？」
line = "「──ってぇ！？　会長様！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「こちらにも見当たりませんわ……」
line = "「こちらにも見当たりませんわ……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「──ですわっ！？　ひひひ、緋宮会長ですのっ！？」
line = "「──ですわっ！？　ひひひ、緋宮会長ですのっ！？」"

[[dialogue]]
speaker = "unk"
# みんな無事だったのはいいんだけど──！
line = "みんな無事だったのはいいんだけど──！"

[[dialogue]]
speaker = "unk"
# どうしたんだ、その恰好！？
line = "どうしたんだ、その恰好！？"

[[dialogue]]
speaker = "セナリィ"
# 「どうしたんだと言われましても、気がついたらいつの間にかこの姿で──というか！」
line = "「どうしたんだと言われましても、気がついたらいつの間にかこの姿で──というか！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あの……<b>貴女</b>は、緋宮会長……なのですか？　確かに面影はありますが……」
line = "「あの……<b>貴女</b>は、緋宮会長……なのですか？　確かに面影はありますが……」"

[[dialogue]]
speaker = "unk"
# みんなの様子がおかしい。俺のことをじろじろと見てくる。何だろうと思って自分の体を見ると──
line = "みんなの様子がおかしい。俺のことをじろじろと見てくる。何だろうと思って自分の体を見ると──"

[[dialogue]]
speaker = "unk"
# おまけにバニー服を着てるー！？
line = "おまけにバニー服を着てるー！？"

[[dialogue]]
speaker = "unk"
# 俺、女の子になって……！？
line = "俺、女の子になって……！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「い、意味不明なんだけどっ……ふ、ふふっ！　会長、めっちゃ可愛い女の子になってる……あはははっ！」
line = "「い、意味不明なんだけどっ……ふ、ふふっ！　会長、めっちゃ可愛い女の子になってる……あはははっ！」"

[[dialogue]]
speaker = "セナリィ"
# 「笑ってる場合じゃねぇですわよマイン！？　異常事態にもほどがありますわ！？」
line = "「笑ってる場合じゃねぇですわよマイン！？　異常事態にもほどがありますわ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「敵の攻撃、なのでしょうか……？　この場所もアステラのような気配がいたしますが──えぇえ……？」
line = "「敵の攻撃、なのでしょうか……？　この場所もアステラのような気配がいたしますが──えぇえ……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「女性にこのような、はしたない服を着させて、緋宮会長を女性に変身させる……その目的は一体……？」
line = "「女性にこのような、はしたない服を着させて、緋宮会長を女性に変身させる……その目的は一体……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「精神攻撃、ですの？　……全く意味が分かりませんわ！」
line = "「精神攻撃、ですの？　……全く意味が分かりませんわ！」"

[[dialogue]]
speaker = "unk"
# 先輩、落ち着いてください！（ゆさゆさ）
line = "先輩、落ち着いてください！（ゆさゆさ）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「──ぶっふぅ！　おやめくださいませ、緋宮会長っ！　大きな胸を揺らしながら、にじり寄らないでほしいですわ！？」
line = "「──ぶっふぅ！　おやめくださいませ、緋宮会長っ！　大きな胸を揺らしながら、にじり寄らないでほしいですわ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～あ。千園寺先輩まで笑い出しちゃった。でも気持ちはわかるな～」
line = "「あ～あ。千園寺先輩まで笑い出しちゃった。でも気持ちはわかるな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「普段の会長とバニーガールになっちゃった会長を重ねちゃって。ギャップでつい──ぷぷぷっ♪」
line = "「普段の会長とバニーガールになっちゃった会長を重ねちゃって。ギャップでつい──ぷぷぷっ♪」"

[[dialogue]]
speaker = "セナリィ"
# 「２人とも、呑気すぎますわ！　ここは敵の巣！　いつ攻撃が来るかわからないんですわよ！？」
line = "「２人とも、呑気すぎますわ！　ここは敵の巣！　いつ攻撃が来るかわからないんですわよ！？」"

[[dialogue]]
speaker = "？？？"
# 「フフフ、盛り上がっていらっしゃるようですね！」
line = "「フフフ、盛り上がっていらっしゃるようですね！」"

[[dialogue]]
speaker = "セナリィ"
# 「貴方は──先ほどの怪しい男！？」
line = "「貴方は──先ほどの怪しい男！？」"

[[dialogue]]
speaker = "？？？"
# 「嗚呼──とてもお似合いです！　私の可愛い子ウサギたち！」
line = "「嗚呼──とてもお似合いです！　私の可愛い子ウサギたち！」"

[[dialogue]]
speaker = "？？？"
# 「髪の色に合わせてバニーガールの色味も完璧！　見て楽しい、喋って嬉しい！　そんなバニーをイメージしましたが、私の見立てに間違いはなかった！」
line = "「髪の色に合わせてバニーガールの色味も完璧！　見て楽しい、喋って嬉しい！　そんなバニーをイメージしましたが、私の見立てに間違いはなかった！」"

[[dialogue]]
speaker = "？？？"
# 「淑女の３名もお美しいですが……ヌフフフ！　新星の星徒会長、あなたの美しさは想像以上だ！」
line = "「淑女の３名もお美しいですが……ヌフフフ！　新星の星徒会長、あなたの美しさは想像以上だ！」"

[[dialogue]]
speaker = "？？？"
# 「貴方を一目見た時から、絶対に女体化が似合うと！　いつかバニー衣装を着させてみたいと……ずっとずっと思っていたのですよ！」
line = "「貴方を一目見た時から、絶対に女体化が似合うと！　いつかバニー衣装を着させてみたいと……ずっとずっと思っていたのですよ！」"

[[dialogue]]
speaker = "unk"
# これ、お前の趣味なのか！？
line = "これ、お前の趣味なのか！？"

[[dialogue]]
speaker = "セナリィ"
# 「ヘ──ヘンタイですわ～～～っ！？」
line = "「ヘ──ヘンタイですわ～～～っ！？」"
