[[dialogue]]
speaker = "unk"
# 文化祭が近づき、学園内も<ruby=にわ>俄</ruby>かに活気づいてきた頃。
line = "文化祭が近づき、学園内も<ruby>俄<rt>にわ</rt></ruby>かに活気づいてきた頃。"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃ～ん、助けて～っ！」
line = "「お兄ちゃ～ん、助けて～っ！」"

[[dialogue]]
speaker = "unk"
# 俺をお兄ちゃんと呼ぶ妹の１人・メイプルが星徒会室に駆け込んできた。
line = "俺をお兄ちゃんと呼ぶ妹の１人・メイプルが星徒会室に駆け込んできた。"

[[dialogue]]
speaker = "アナ"
# 「メイプルさん、血相を変えてどうされました？」
line = "「メイプルさん、血相を変えてどうされました？」"

[[dialogue]]
speaker = "メイプル"
# 「アナ！　ウチの部長に『会長を呼んでこい』って脅さ──頼まれたの」
line = "「アナ！　ウチの部長に『会長を呼んでこい』って脅さ──頼まれたの」"

[[dialogue]]
speaker = "unk"
# 不穏な言葉が聞こえたけど……ウチの部長？
line = "不穏な言葉が聞こえたけど……ウチの部長？"

[[dialogue]]
speaker = "メイプル"
# 「前に言わなかったっけ？　あたし、演劇部に入ってるんだ！」
line = "「前に言わなかったっけ？　あたし、演劇部に入ってるんだ！」"

[[dialogue]]
speaker = "アナ"
# 「眼帯の着用で豹変するメイプルさんにはベストマッチ＆ベストチョイスですね」
line = "「眼帯の着用で豹変するメイプルさんにはベストマッチ＆ベストチョイスですね」"

[[dialogue]]
speaker = "メイプル"
# 「でしょ！　楽しくやってる……じゃなくって！　この話は後！　今すぐ演劇部に来て！　じゃないと、全身くすぐりの刑に処されちゃうの！」
line = "「でしょ！　楽しくやってる……じゃなくって！　この話は後！　今すぐ演劇部に来て！　じゃないと、全身くすぐりの刑に処されちゃうの！」"

[[dialogue]]
speaker = "アナ"
# 「ごくり……それはなんと恐ろしい。演劇部の部長というと……ロクサーナさんですか」
line = "「ごくり……それはなんと恐ろしい。演劇部の部長というと……ロクサーナさんですか」"

[[dialogue]]
speaker = "unk"
# ロクサーナさん？
line = "ロクサーナさん？"

[[dialogue]]
speaker = "アナ"
# 「３年生のロクサーナ・ハイドランジアさんです。演劇部部長にして脚本家、兼演出家。演劇部の舞台の全ては彼女によって作られているといっても過言ではないです」
line = "「３年生のロクサーナ・ハイドランジアさんです。演劇部部長にして脚本家、兼演出家。演劇部の舞台の全ては彼女によって作られているといっても過言ではないです」"

[[dialogue]]
speaker = "アナ"
# 「天才にして、唯我独尊にして、気分屋。彼女の機嫌を損ねると厄介なことになるそうです」
line = "「天才にして、唯我独尊にして、気分屋。彼女の機嫌を損ねると厄介なことになるそうです」"

[[dialogue]]
speaker = "アナ"
# 「会長、業務は引き継いでおきますので、演劇部に向かってあげてください」
line = "「会長、業務は引き継いでおきますので、演劇部に向かってあげてください」"

[[dialogue]]
speaker = "メイプル"
# 「アナ、ありがと！」
line = "「アナ、ありがと！」"

[[dialogue]]
speaker = "unk"
# 迷惑かけるね、アナ
line = "迷惑かけるね、アナ"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレムです。会長は会長にしかできない仕事を成し遂げてください」
line = "「ノープロブレムです。会長は会長にしかできない仕事を成し遂げてください」"

[[dialogue]]
speaker = "unk"
# 残っていた業務はアナにお任せして、俺はメイプルとともに演劇部室へと向かった。
line = "残っていた業務はアナにお任せして、俺はメイプルとともに演劇部室へと向かった。"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん、くれぐれも気をつけてね」
line = "「お兄ちゃん、くれぐれも気をつけてね」"

[[dialogue]]
speaker = "メイプル"
# 「アナが言ってた通り、部長は天才肌で気分屋。機嫌を損ねると、雷が落ちたり、無理難題を押し付けられたりするから！」
line = "「アナが言ってた通り、部長は天才肌で気分屋。機嫌を損ねると、雷が落ちたり、無理難題を押し付けられたりするから！」"

[[dialogue]]
speaker = "unk"
# 真剣みを帯びたメイプルの警告の意味は、わずか数分後に理解することになる。
line = "真剣みを帯びたメイプルの警告の意味は、わずか数分後に理解することになる。"

[[dialogue]]
speaker = "メイプル"
# 「部長～、お兄ちゃ──じゃない、星徒会長を連れてきました～」
line = "「部長～、お兄ちゃ──じゃない、星徒会長を連れてきました～」"

[[dialogue]]
speaker = "部長？"
# 「メイプルさん、お疲れさまです。すごいですね、本当に会長さんを連れてこられるなんて……」
line = "「メイプルさん、お疲れさまです。すごいですね、本当に会長さんを連れてこられるなんて……」"

[[dialogue]]
speaker = "unk"
# あなたが部長のロクサーナさん？
はじめまして、会長のクロトです
line = "あなたが部長のロクサーナさん？
はじめまして、会長のクロトです"

[[dialogue]]
speaker = "メイプル"
# 「あ……ヤバッ……！」
line = "「あ……ヤバッ……！」"

[[dialogue]]
speaker = "藍"
# 「い、いえっ、私は、その……私は部長ではなく……ただの部員です。<ruby=いずはらあい>泉原藍</ruby>、１年生です」
line = "「い、いえっ、私は、その……私は部長ではなく……ただの部員です。<ruby>泉原藍<rt>いずはらあい</rt></ruby>、１年生です」"

[[dialogue]]
speaker = "unk"
# １年生！？　ということは──
line = "１年生！？　ということは──"

[[dialogue]]
speaker = "？？？"
# 「ほほう？　星徒会長様は木っ端演劇部の部長の顔などご存じないようだな」
line = "「ほほう？　星徒会長様は木っ端演劇部の部長の顔などご存じないようだな」"

[[dialogue]]
speaker = "ロクサーナ"
# 「演劇部の部長は、この私、ロクサーナ・ハイドランジアだ！　いずれ世界に刻まれるこの名、覚えておいて損はさせん」
line = "「演劇部の部長は、この私、ロクサーナ・ハイドランジアだ！　いずれ世界に刻まれるこの名、覚えておいて損はさせん」"

[[dialogue]]
speaker = "unk"
# 小さいから、てっきり──もがっ
line = "小さいから、てっきり──もがっ"

[[dialogue]]
speaker = "メイプル"
# 「わーっ！　お兄ちゃん、黙って！」
line = "「わーっ！　お兄ちゃん、黙って！」"

[[dialogue]]
speaker = "ロクサーナ"
# 「……まあ、いい。私への非礼は、頼みを聞くことでチャラにしてやる」
line = "「……まあ、いい。私への非礼は、頼みを聞くことでチャラにしてやる」"

[[dialogue]]
speaker = "ロクサーナ"
# 「メイプルを使って、ここに呼びつけたのは他でもない。折り入って、会長に頼みがある」
line = "「メイプルを使って、ここに呼びつけたのは他でもない。折り入って、会長に頼みがある」"

[[dialogue]]
speaker = "ロクサーナ"
# 「我が演劇部は毎年、文化祭の出し物として舞台を披露しているのだが、少々困ったことになっていてな。そいつを高名な会長様の体で解決してもらいたい」
line = "「我が演劇部は毎年、文化祭の出し物として舞台を披露しているのだが、少々困ったことになっていてな。そいつを高名な会長様の体で解決してもらいたい」"

[[dialogue]]
speaker = "藍"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん、あたしからもお願いっ！　このままだと演劇部の危機なのっ！」
line = "「お兄ちゃん、あたしからもお願いっ！　このままだと演劇部の危機なのっ！」"

[[dialogue]]
speaker = "unk"
# ひとまず、具体的な困りごとの内容と、受けるか否かはともかくとして──
line = "ひとまず、具体的な困りごとの内容と、受けるか否かはともかくとして──"

[[dialogue]]
speaker = "unk"
# ちなみに今年の演目は？
line = "ちなみに今年の演目は？"

[[dialogue]]
speaker = "ロクサーナ"
# 「ん？　星徒会には事前に演目予定を提出していたはずだが、目を通していないのか？」
line = "「ん？　星徒会には事前に演目予定を提出していたはずだが、目を通していないのか？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「まぁさしたる手間でもない、問われれば答えよう。呆れかえるほどに定番もド定番」
line = "「まぁさしたる手間でもない、問われれば答えよう。呆れかえるほどに定番もド定番」"

[[dialogue]]
speaker = "ロクサーナ"
# 「言わずと知れたウィリアム・シェイクスピアの戯曲を原作とした悲恋物語の教科書──『ロミオとジュリエット』だ」
line = "「言わずと知れたウィリアム・シェイクスピアの戯曲を原作とした悲恋物語の教科書──『ロミオとジュリエット』だ」"
