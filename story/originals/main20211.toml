[[dialogue]]
speaker = "unk"
# 第１１話,白銀のガーディアン,B
line = "第１１話,白銀のガーディアン,B"

[[dialogue]]
speaker = "unk"
# そして、クイズ大会が始まった。
line = "そして、クイズ大会が始まった。"

[[dialogue]]
speaker = "ベアトリス"
# 「わかりました！　答えは『坦々麺』です！」
line = "「わかりました！　答えは『坦々麺』です！」"

[[dialogue]]
speaker = "アポロ"
# 「おおっ、正解みたいだぞ！　すごいなベアトリス！」
line = "「おおっ、正解みたいだぞ！　すごいなベアトリス！」"

[[dialogue]]
speaker = "ナターシャ"
# 「こっちの答えも分かったよ。『ハルバード』だね」
line = "「こっちの答えも分かったよ。『ハルバード』だね」"

[[dialogue]]
speaker = "梨緒"
# 「ナターシャもやるな」
line = "「ナターシャもやるな」"

[[dialogue]]
speaker = "アポロ"
# 「よーし、この調子でどんどん解いていくぞー！！」
line = "「よーし、この調子でどんどん解いていくぞー！！」"

[[dialogue]]
speaker = "unk"
# 選管チームは順当にポイントを重ねて勝ち上がり──
line = "選管チームは順当にポイントを重ねて勝ち上がり──"

[[dialogue]]
speaker = "unk"
# 一方で俺たち新星星徒会チームも予選、１回戦、２回戦と駒を進めていった。
line = "一方で俺たち新星星徒会チームも予選、１回戦、２回戦と駒を進めていった。"

[[dialogue]]
speaker = "unk"
# そして、いよいよ迎えた決勝戦。その舞台に立っていたのは──
line = "そして、いよいよ迎えた決勝戦。その舞台に立っていたのは──"

[[dialogue]]
speaker = "梨緒"
# 「やはり勝ち上がってきたな」
line = "「やはり勝ち上がってきたな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたたちこそね！」
line = "「あなたたちこそね！」"

[[dialogue]]
speaker = "梨緒"
# 「今日こそは絶対に勝つぞ、緋宮クロト！」
line = "「今日こそは絶対に勝つぞ、緋宮クロト！」"

[[dialogue]]
speaker = "クロト"
# 「受けて立つよ、梨緒」
line = "「受けて立つよ、梨緒」"

[[dialogue]]
speaker = "紅明"
# 『おお～、バチバチ火花が散ってるぜ！　因縁の対決ってやつだな！』
line = "『おお～、バチバチ火花が散ってるぜ！　因縁の対決ってやつだな！』"

[[dialogue]]
speaker = "紅明"
# 『そいじゃ決勝戦のルール説明だ』
line = "『そいじゃ決勝戦のルール説明だ』"

[[dialogue]]
speaker = "紅明"
# 『決勝戦はなんとバトル形式だ。クイズが出題されると、空中を飛んでるドローンが画像を何枚か表示するぜ』
line = "『決勝戦はなんとバトル形式だ。クイズが出題されると、空中を飛んでるドローンが画像を何枚か表示するぜ』"

[[dialogue]]
speaker = "紅明"
# 『その中から正解の画像を見つけて、星術で撃ち抜けばポイントだ』
line = "『その中から正解の画像を見つけて、星術で撃ち抜けばポイントだ』"

[[dialogue]]
speaker = "紅明"
# 『もちろん相手チームを妨害するのもありだからバチバチやってくれよな！』
line = "『もちろん相手チームを妨害するのもありだからバチバチやってくれよな！』"

[[dialogue]]
speaker = "紅明"
# 『さてと……それじゃ時間だ。両チーム、準備はいいか？』
line = "『さてと……それじゃ時間だ。両チーム、準備はいいか？』"

[[dialogue]]
speaker = "紅明"
# 『決勝戦──レディー……ゴー！！！！』
line = "『決勝戦──レディー……ゴー！！！！』"

[[dialogue]]
speaker = "ヴィーナス"
# 「外さないわ！」
line = "「外さないわ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの光条が解答を撃ち抜き、得点は４対４。息もつかせぬ接戦となっている。
line = "ヴィーナスの光条が解答を撃ち抜き、得点は４対４。息もつかせぬ接戦となっている。"

[[dialogue]]
speaker = "ヴィーナス"
# 「何とか追いついたけど……手ごわいわね、選管チーム」
line = "「何とか追いついたけど……手ごわいわね、選管チーム」"

[[dialogue]]
speaker = "クロト"
# 「ああ、急造チームとは思えないくらい息が合ってるな」
line = "「ああ、急造チームとは思えないくらい息が合ってるな」"

[[dialogue]]
speaker = "unk"
# 稲妻のようなスピードを生かして積極的に答えを狙う梨緒。
line = "稲妻のようなスピードを生かして積極的に答えを狙う梨緒。"

[[dialogue]]
speaker = "unk"
# 気配なく接近し、こちらのチームを妨害するナターシャ。
line = "気配なく接近し、こちらのチームを妨害するナターシャ。"

[[dialogue]]
speaker = "unk"
# そして２人を効率的に動かすためにフォローに回るベアトリス。
line = "そして２人を効率的に動かすためにフォローに回るベアトリス。"

[[dialogue]]
speaker = "unk"
# それぞれが実力の高い星騎士であり、全員が上手く立ち回っている。そして何より──
line = "それぞれが実力の高い星騎士であり、全員が上手く立ち回っている。そして何より──"

[[dialogue]]
speaker = "アポロ"
# 「大丈夫！　ヒーローは追い詰められてからが本番だぞ！」
line = "「大丈夫！　ヒーローは追い詰められてからが本番だぞ！」"

[[dialogue]]
speaker = "アポロ"
# 「次はいけるぞ！　みんな、頑張ろう！」
line = "「次はいけるぞ！　みんな、頑張ろう！」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、絶対に諦めない！」
line = "「ああ、絶対に諦めない！」"

[[dialogue]]
speaker = "unk"
# 目立った活躍こそしていないが、意外なことにチームの精神的な支柱となっているのはアポロだった。
line = "目立った活躍こそしていないが、意外なことにチームの精神的な支柱となっているのはアポロだった。"

[[dialogue]]
speaker = "unk"
# 他３人の連携が上手くいっているのは、アポロの存在があってこそと言えるだろう。
line = "他３人の連携が上手くいっているのは、アポロの存在があってこそと言えるだろう。"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、チームワークなら星徒会だって負けてないわ。みんなで何度も危機を潜り抜けてきたんだから」
line = "「でも、チームワークなら星徒会だって負けてないわ。みんなで何度も危機を潜り抜けてきたんだから」"

[[dialogue]]
speaker = "クロト"
# 「そうだな、負けるわけにはいかない。絶対に勝って優勝する！」
line = "「そうだな、負けるわけにはいかない。絶対に勝って優勝する！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よく言ったわ、クロト！　こうなったら私も奥の手を出すしかないわね」
line = "「よく言ったわ、クロト！　こうなったら私も奥の手を出すしかないわね」"

[[dialogue]]
speaker = "クロト"
# 「……奥の手？　何か作戦があるのか？」
line = "「……奥の手？　何か作戦があるのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふっふ～ん。私にドーンと任せなさいっ♪」
line = "「ふっふ～ん。私にドーンと任せなさいっ♪」"

[[dialogue]]
speaker = "紅明"
# 『うっしし～♪　盛り上がってるね～！』
line = "『うっしし～♪　盛り上がってるね～！』"

[[dialogue]]
speaker = "紅明"
# 『決勝戦は５点先取した方の勝利！　つまり泣いても笑っても次が最後の問題だ！　心してくれよな！』
line = "『決勝戦は５点先取した方の勝利！　つまり泣いても笑っても次が最後の問題だ！　心してくれよな！』"

[[dialogue]]
speaker = "紅明"
# 『では、問題！』
line = "『では、問題！』"

[[dialogue]]
speaker = "梨緒"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "紅明"
# 『──新星学園の学生寮はラルーナで・す・が～……流星学園の学生寮は何と呼ばれている？』
line = "『──新星学園の学生寮はラルーナで・す・が～……流星学園の学生寮は何と呼ばれている？』"

[[dialogue]]
speaker = "unk"
# 選択肢は『メンソーレ』『エルソーレ』『イルソーレ』……
line = "選択肢は『メンソーレ』『エルソーレ』『イルソーレ』……"

[[dialogue]]
speaker = "unk"
# 正解は──イルソーレ！
line = "正解は──イルソーレ！"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス！」
line = "「ヴィーナス！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、加減はしないわよ！」
line = "「ええ、加減はしないわよ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの鎖が俺の足に巻き付いて──
line = "ヴィーナスの鎖が俺の足に巻き付いて──"

[[dialogue]]
speaker = "ヴィーナス"
# 「ひっさつの～～……クロトハンマー！！」
line = "「ひっさつの～～……クロトハンマー！！」"

[[dialogue]]
speaker = "梨緒"
# 「は──？」
line = "「は──？」"

[[dialogue]]
speaker = "unk"
# 遠心力で加速された俺自身が、解答へと一直線に突き進んで──
line = "遠心力で加速された俺自身が、解答へと一直線に突き進んで──"

[[dialogue]]
speaker = "アポロ"
# 「な……そんなのアリか！？」
line = "「な……そんなのアリか！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さんが突っ込んできますーーっ！？」
line = "「会長さんが突っ込んできますーーっ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「あはは、おもしろ」
line = "「あはは、おもしろ」"

[[dialogue]]
speaker = "unk"
# 迎撃しようとした梨緒たちの星術を突き破り、俺の拳が届く。
line = "迎撃しようとした梨緒たちの星術を突き破り、俺の拳が届く。"

[[dialogue]]
speaker = "クロト"
# 「俺たちの──勝ちだ！！」
line = "「俺たちの──勝ちだ！！」"

[[dialogue]]
speaker = "紅明"
# 『せ～いか～～いっ！！　流星寮はイルソーレでした～っ！』
line = "『せ～いか～～いっ！！　流星寮はイルソーレでした～っ！』"

[[dialogue]]
speaker = "紅明"
# 『ダーリ──オッホン。緋宮会長、体を張った魂の解答！　星徒会チームの勝利だーーーーっ！！』
line = "『ダーリ──オッホン。緋宮会長、体を張った魂の解答！　星徒会チームの勝利だーーーーっ！！』"

[[dialogue]]
speaker = "unk"
# 観戦していた生徒たちから、どっと歓声が巻き起こる。
line = "観戦していた生徒たちから、どっと歓声が巻き起こる。"

[[dialogue]]
speaker = "unk"
# 負けた生徒たちも少なからず見ていたようで、星徒会と選管の勝負を楽しんでくれたようだった。
line = "負けた生徒たちも少なからず見ていたようで、星徒会と選管の勝負を楽しんでくれたようだった。"

[[dialogue]]
speaker = "マトイ"
# 「お疲れ様！　まさか緋宮くんがあんなことするとは思わなかったよ」
line = "「お疲れ様！　まさか緋宮くんがあんなことするとは思わなかったよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私とクロトの合体技よ！　どう、羨ましい？」
line = "「私とクロトの合体技よ！　どう、羨ましい？」"

[[dialogue]]
speaker = "マトイ"
# 「いや、羨ましくはないかな……。というか緋宮くんは大丈夫？」
line = "「いや、羨ましくはないかな……。というか緋宮くんは大丈夫？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、大丈夫。ちょっと目が回ったけど」
line = "「ああ、大丈夫。ちょっと目が回ったけど」"

[[dialogue]]
speaker = "マトイ"
# 「やっぱり目は回るんだ……」
line = "「やっぱり目は回るんだ……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ、主催なのに楽しんじゃったわね～」
line = "「ふふふ、主催なのに楽しんじゃったわね～」"

[[dialogue]]
speaker = "アナ"
# 「盛り上がったので結果オーライということで。その点では、選挙管理委員会のおかげでもありますが」
line = "「盛り上がったので結果オーライということで。その点では、選挙管理委員会のおかげでもありますが」"

[[dialogue]]
speaker = "unk"
# 梨緒に勝負を挑まれたからとはいえ、盛り上げるのに一役買ってくれた選管には感謝だ。
line = "梨緒に勝負を挑まれたからとはいえ、盛り上げるのに一役買ってくれた選管には感謝だ。"

[[dialogue]]
speaker = "unk"
# その選管はというと……
line = "その選管はというと……"

[[dialogue]]
speaker = "梨緒"
# 「ぐっ……負けた……！」
line = "「ぐっ……負けた……！」"

[[dialogue]]
speaker = "unk"
# 地面に膝を付き、拳を握って悔しさを露わにする梨緒。
line = "地面に膝を付き、拳を握って悔しさを露わにする梨緒。"

[[dialogue]]
speaker = "unk"
# だけどすぐに俺に向き直り、姿勢よくビシッと指を突き立てて──
line = "だけどすぐに俺に向き直り、姿勢よくビシッと指を突き立てて──"

[[dialogue]]
speaker = "梨緒"
# 「緋宮クロト！　次は必ず勝つ！　勝つからな！」
line = "「緋宮クロト！　次は必ず勝つ！　勝つからな！」"

[[dialogue]]
speaker = "クロト"
# 「あ、ああ……」
line = "「あ、ああ……」"

[[dialogue]]
speaker = "unk"
# まるでゲームに負けた子どものように、目にわずかに涙を浮かべ、勝つと連呼する。
line = "まるでゲームに負けた子どものように、目にわずかに涙を浮かべ、勝つと連呼する。"

[[dialogue]]
speaker = "unk"
# その剣幕に少し押されながら、本当に悔しかったんだな、と彼女の心境を想像する。
line = "その剣幕に少し押されながら、本当に悔しかったんだな、と彼女の心境を想像する。"

[[dialogue]]
speaker = "アポロ"
# 「あっはっはっはっは！　いや～、楽しかったな、梨緒！　あたしは全然活躍できなかったけど！」
line = "「あっはっはっはっは！　いや～、楽しかったな、梨緒！　あたしは全然活躍できなかったけど！」"

[[dialogue]]
speaker = "アポロ"
# 「それに比べて、オマエ凄いな！　選管チームの正解の８割は梨緒だったぞ！」
line = "「それに比べて、オマエ凄いな！　選管チームの正解の８割は梨緒だったぞ！」"

[[dialogue]]
speaker = "梨緒"
# 「あ、ぅ……だが負けたぞ。どうせ私は、知識ばかりを頭に詰め込んだ、頭でっかちの役立たずなんだ……」
line = "「あ、ぅ……だが負けたぞ。どうせ私は、知識ばかりを頭に詰め込んだ、頭でっかちの役立たずなんだ……」"

[[dialogue]]
speaker = "梨緒"
# （って、ちっがーーう！　アポロはそんなこと言ってない！　どうして私はいつもこう、勝手にスイッチが入ってしまうんだ！）
line = "（って、ちっがーーう！　アポロはそんなこと言ってない！　どうして私はいつもこう、勝手にスイッチが入ってしまうんだ！）"

[[dialogue]]
speaker = "梨緒"
# （早く否定しなくちゃ！　せっかく仲間が褒めてくれたのに、急に相手の発言を否定するなんて失礼だぞ！）
line = "（早く否定しなくちゃ！　せっかく仲間が褒めてくれたのに、急に相手の発言を否定するなんて失礼だぞ！）"

[[dialogue]]
speaker = "梨緒"
# 「いや、すまない。発言を間違えた。……えっと、私はとっても賢いな。クイズも結構、得意な方だぞ」
line = "「いや、すまない。発言を間違えた。……えっと、私はとっても賢いな。クイズも結構、得意な方だぞ」"

[[dialogue]]
speaker = "梨緒"
# （って、今度は澄まし顔で何言ってるんだ、私はーー！？）
line = "（って、今度は澄まし顔で何言ってるんだ、私はーー！？）"

[[dialogue]]
speaker = "アポロ"
# 「オマエは何を言ってるんだ？　もしかして、実はちょっと頭が悪いのか？」
line = "「オマエは何を言ってるんだ？　もしかして、実はちょっと頭が悪いのか？」"

[[dialogue]]
speaker = "梨緒"
# 「もしかして結構真剣に頭の心配をされている！？」
line = "「もしかして結構真剣に頭の心配をされている！？」"

[[dialogue]]
speaker = "アポロ"
# 「あのなぁ、もちろん勝った負けたは重要だぞ。強い弱いも大切なことだ！　だけど、あたしが言いたかったことは……」
line = "「あのなぁ、もちろん勝った負けたは重要だぞ。強い弱いも大切なことだ！　だけど、あたしが言いたかったことは……」"

[[dialogue]]
speaker = "アポロ"
# 「──クイズ大会、楽しかったよな、ってことだ！」
line = "「──クイズ大会、楽しかったよな、ってことだ！」"

[[dialogue]]
speaker = "梨緒"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "アポロ"
# 「ここでオマエが言うべきことは、自分が『強かったか弱かったか』じゃなくて、『楽しかったかどうか』だ！」
line = "「ここでオマエが言うべきことは、自分が『強かったか弱かったか』じゃなくて、『楽しかったかどうか』だ！」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは楽しかったぞ！　仲間が点を沢山取ってるところは爽快だったからな！」
line = "「あたしは楽しかったぞ！　仲間が点を沢山取ってるところは爽快だったからな！」"

[[dialogue]]
speaker = "ベアトリス"
# 「わ、私も楽しかった……です！」
line = "「わ、私も楽しかった……です！」"

[[dialogue]]
speaker = "ナターシャ"
# 「私も、思ってたより悪くなかったよ」
line = "「私も、思ってたより悪くなかったよ」"

[[dialogue]]
speaker = "梨緒"
# 「みんな……ああ、そうだな」
line = "「みんな……ああ、そうだな」"

[[dialogue]]
speaker = "梨緒"
# 「負けたけど、楽しかった。この４人で戦えたことが、何よりも」
line = "「負けたけど、楽しかった。この４人で戦えたことが、何よりも」"

[[dialogue]]
speaker = "アポロ"
# 「へへっ。梨緒、ちょっとはいい顔になったじゃんか！」
line = "「へへっ。梨緒、ちょっとはいい顔になったじゃんか！」"

[[dialogue]]
speaker = "梨緒"
# 「だが、勝つことを諦めたわけじゃないぞ。私は必ず、緋宮クロトに勝ってみせる！」
line = "「だが、勝つことを諦めたわけじゃないぞ。私は必ず、緋宮クロトに勝ってみせる！」"

[[dialogue]]
speaker = "アポロ"
# 「もちろんだぜ！　あたしたち、選挙管理委員会の力を見せてやる……！」
line = "「もちろんだぜ！　あたしたち、選挙管理委員会の力を見せてやる……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「……すっかり意気投合してますけど、アポロさん、内部監査は大丈夫なんでしょうか？」
line = "「……すっかり意気投合してますけど、アポロさん、内部監査は大丈夫なんでしょうか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「それ言うと、むしろ梨緒の方が星徒会の監視っていう目的を忘れてないか、不安になるけどね」
line = "「それ言うと、むしろ梨緒の方が星徒会の監視っていう目的を忘れてないか、不安になるけどね」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま、でもいいんじゃない。みんなが笑っていられるうちは、特に問題はないってことだと思うよ」
line = "「ま、でもいいんじゃない。みんなが笑っていられるうちは、特に問題はないってことだと思うよ」"

[[dialogue]]
speaker = "unk"
# ベアトリスは苦笑いを浮かべ、ナターシャはやれやれと肩を竦める。
line = "ベアトリスは苦笑いを浮かべ、ナターシャはやれやれと肩を竦める。"

[[dialogue]]
speaker = "unk"
# だけど、しばらくすると梨緒も落ち着いてきたようで……
line = "だけど、しばらくすると梨緒も落ち着いてきたようで……"

[[dialogue]]
speaker = "梨緒"
# 「すまない。色々と恥ずかしいところを見せた」
line = "「すまない。色々と恥ずかしいところを見せた」"

[[dialogue]]
speaker = "ベアトリス"
# 「いいえ。負けちゃって残念ですけど、楽しかったです、本当に」
line = "「いいえ。負けちゃって残念ですけど、楽しかったです、本当に」"

[[dialogue]]
speaker = "梨緒"
# 「……そうか。なら参加した甲斐があったな」
line = "「……そうか。なら参加した甲斐があったな」"

[[dialogue]]
speaker = "unk"
# ベアトリスが柔らかく微笑むと、梨緒も小さく笑みを見せる。
line = "ベアトリスが柔らかく微笑むと、梨緒も小さく笑みを見せる。"

[[dialogue]]
speaker = "梨緒"
# 「選管に入ってくれてありがとう、ベアトリス」
line = "「選管に入ってくれてありがとう、ベアトリス」"

[[dialogue]]
speaker = "ベアトリス"
# 「ベアトって呼んでください。仲のいい友達はそう呼ぶので」
line = "「ベアトって呼んでください。仲のいい友達はそう呼ぶので」"

[[dialogue]]
speaker = "梨緒"
# 「そうか。なら君も敬語はやめてくれ」
line = "「そうか。なら君も敬語はやめてくれ」"

[[dialogue]]
speaker = "梨緒"
# 「これからもよろしく、ベアト」
line = "「これからもよろしく、ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「……うん、梨緒ちゃん」
line = "「……うん、梨緒ちゃん」"

[[dialogue]]
speaker = "ナターシャ"
# 「おやおや、おふたりさん、ずいぶん仲良くなったね」
line = "「おやおや、おふたりさん、ずいぶん仲良くなったね」"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃんも仲間だよ」
line = "「ナターシャちゃんも仲間だよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、私も入っていい流れ？」
line = "「あ、私も入っていい流れ？」"

[[dialogue]]
speaker = "ナターシャ"
# 「じゃあ遠慮なく。私もよろしくね、ベアト」
line = "「じゃあ遠慮なく。私もよろしくね、ベアト」"

[[dialogue]]
speaker = "アポロ"
# 「あっはっはっはっは！　あたしもよろしくなー、ベアト！」
line = "「あっはっはっはっは！　あたしもよろしくなー、ベアト！」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん♪　アポロちゃん」
line = "「うん♪　アポロちゃん」"

[[dialogue]]
speaker = "unk"
# クイズ大会を経て、４人は仲間になれたようだった。
line = "クイズ大会を経て、４人は仲間になれたようだった。"

[[dialogue]]
speaker = "unk"
# 星徒会で出ることになるとは思わなかったけど、留学生の親睦という最初の目的は果たせたようだ。
line = "星徒会で出ることになるとは思わなかったけど、留学生の親睦という最初の目的は果たせたようだ。"

[[dialogue]]
speaker = "梨緒"
# 「よし。次こそ勝つぞ、この４人で」
line = "「よし。次こそ勝つぞ、この４人で」"

[[dialogue]]
speaker = "ナターシャ"
# 「ホント好きなんだねー、勝負するの。でもまた負けちゃうかもよ？」
line = "「ホント好きなんだねー、勝負するの。でもまた負けちゃうかもよ？」"

[[dialogue]]
speaker = "梨緒"
# 「負けるのはイヤだ」
line = "「負けるのはイヤだ」"

[[dialogue]]
speaker = "梨緒"
# 「でも一度も勝てないのはもっとイヤだ。勝つまで諦めない」
line = "「でも一度も勝てないのはもっとイヤだ。勝つまで諦めない」"

[[dialogue]]
speaker = "ナターシャ"
# 「あは。なるほど。一理あるね」
line = "「あは。なるほど。一理あるね」"

[[dialogue]]
speaker = "紅明"
# 『んじゃ、閉会式と賞品の授与を──』
line = "『んじゃ、閉会式と賞品の授与を──』"

[[dialogue]]
speaker = "紅明"
# 『！？　街にモンスター……じゃない！？　何かわかんないけど、とにかくヤバいのが暴れてるらしいぜ！』
line = "『！？　街にモンスター……じゃない！？　何かわかんないけど、とにかくヤバいのが暴れてるらしいぜ！』"

[[dialogue]]
speaker = "unk"
# ＤＩＳＣの通知を見て、アリーナにいたプリマステラたちが急ぎ駆けていく。
line = "ＤＩＳＣの通知を見て、アリーナにいたプリマステラたちが急ぎ駆けていく。"

[[dialogue]]
speaker = "unk"
# 情報によれば流星市国全域が何者かに襲われてるという。特に教皇庁周辺の脅威度が高い。
line = "情報によれば流星市国全域が何者かに襲われてるという。特に教皇庁周辺の脅威度が高い。"

[[dialogue]]
speaker = "クロト"
# 「新星星徒会、出撃だ！」
line = "「新星星徒会、出撃だ！」"

[[dialogue]]
speaker = "マトイ"
# 「うん！」
line = "「うん！」"

[[dialogue]]
speaker = "unk"
# この流星市国の中枢──流星教皇庁。
line = "この流星市国の中枢──流星教皇庁。"

[[dialogue]]
speaker = "unk"
# 俺たちが急行するとそこには──
line = "俺たちが急行するとそこには──"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……！」
line = "「ブルルル……！」"

[[dialogue]]
speaker = "unk"
# まるで騎士のような鎧をまとい、剣を携えた馬型のガーディアン。
line = "まるで騎士のような鎧をまとい、剣を携えた馬型のガーディアン。"

[[dialogue]]
speaker = "unk"
# 巨躯の神馬が、刃を鈍く光らせ、鋼のごとき蹄を鳴らして街を蹂躙していた。
line = "巨躯の神馬が、刃を鈍く光らせ、鋼のごとき蹄を鳴らして街を蹂躙していた。"

[[dialogue]]
speaker = "クロト"
# 「ガーディアン……？　本来ならフィーニスの塔の内部にしかいないはずじゃ？」
line = "「ガーディアン……？　本来ならフィーニスの塔の内部にしかいないはずじゃ？」"

[[dialogue]]
speaker = "unk"
# 女神の領域たるフィーニスの塔。その内部を守る使徒がガーティアンだ。
line = "女神の領域たるフィーニスの塔。その内部を守る使徒がガーティアンだ。"

[[dialogue]]
speaker = "unk"
# ガーディアンは機械でできたものと、神獣の姿をしたものが現在確認されているが、あれは後者だ。
line = "ガーディアンは機械でできたものと、神獣の姿をしたものが現在確認されているが、あれは後者だ。"

[[dialogue]]
speaker = "マトイ"
# 「またリクリエの瘴気に当てられて……って雰囲気じゃないよね。このガーディアンに、ああいう歪さはないし」
line = "「またリクリエの瘴気に当てられて……って雰囲気じゃないよね。このガーディアンに、ああいう歪さはないし」"

[[dialogue]]
speaker = "マトイ"
# 「むしろ綺麗っていうか……いや、敵にこんなこと言うのは変だけど」
line = "「むしろ綺麗っていうか……いや、敵にこんなこと言うのは変だけど」"

[[dialogue]]
speaker = "アナ"
# 「神々しさすら感じます。ですが」
line = "「神々しさすら感じます。ですが」"

[[dialogue]]
speaker = "サーシャ"
# 「街を破壊するなら捨て置けないわね～」
line = "「街を破壊するなら捨て置けないわね～」"

[[dialogue]]
speaker = "unk"
# まるで裁きだとでも言わんばかりに、天の使いが建物を、広場を破壊する。
line = "まるで裁きだとでも言わんばかりに、天の使いが建物を、広場を破壊する。"

[[dialogue]]
speaker = "unk"
# その光景は、破滅の尖兵たるモンスターが世界を侵すがごとく。
line = "その光景は、破滅の尖兵たるモンスターが世界を侵すがごとく。"

[[dialogue]]
speaker = "クロト"
# 「モンスターだろうと、ガーディアンだろうと、街を壊すなら戦うまでだ」
line = "「モンスターだろうと、ガーディアンだろうと、街を壊すなら戦うまでだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、宇宙の果てまでぶっ飛ばしてやるわ！」
line = "「ええ、宇宙の果てまでぶっ飛ばしてやるわ！」"
