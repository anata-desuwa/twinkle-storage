[[dialogue]]
speaker = "unk"
# 第３話,カッコイイ星騎士になるために,P
line = "第３話,カッコイイ星騎士になるために,P"

[[dialogue]]
speaker = "アム"
# 「うっ、うぅうっ……コーヒー、やっぱり苦い……！」
line = "「うっ、うぅうっ……コーヒー、やっぱり苦い……！」"

[[dialogue]]
speaker = "ユーリス"
# 「ふふ。慣れないうちはそうかもしれませんね」
line = "「ふふ。慣れないうちはそうかもしれませんね」"

[[dialogue]]
speaker = "unk"
# 何してるんだ？
line = "何してるんだ？"

[[dialogue]]
speaker = "アム"
# 「カッコイイ星騎士になるにはね、クールでスマートなレディにならないといけないんだ」
line = "「カッコイイ星騎士になるにはね、クールでスマートなレディにならないといけないんだ」"

[[dialogue]]
speaker = "アム"
# 「だから今日こそ、この漆黒の液体を克服して……んぐ、んぐ……！」
line = "「だから今日こそ、この漆黒の液体を克服して……んぐ、んぐ……！」"

[[dialogue]]
speaker = "アム"
# 「ぅえぇええ～っ……やっぱり苦いよぉっ……！」
line = "「ぅえぇええ～っ……やっぱり苦いよぉっ……！」"

[[dialogue]]
speaker = "ユーリス"
# 「無理に飲まなくてもいいんじゃないですか？　好きなものを好きなように飲むのが一番だと思いますが……」
line = "「無理に飲まなくてもいいんじゃないですか？　好きなものを好きなように飲むのが一番だと思いますが……」"

[[dialogue]]
speaker = "アム"
# 「それじゃあダメなんですよ、ユーリス先輩！」
line = "「それじゃあダメなんですよ、ユーリス先輩！」"

[[dialogue]]
speaker = "アム"
# 「附属を卒業して、新星学園の星徒会長になった時！　甘いカフェオレしか飲めないんじゃ示しがつかないもん！」
line = "「附属を卒業して、新星学園の星徒会長になった時！　甘いカフェオレしか飲めないんじゃ示しがつかないもん！」"

[[dialogue]]
speaker = "unk"
# また変なこだわりを……
line = "また変なこだわりを……"

[[dialogue]]
speaker = "アム"
# 「大事なことだよ！　常に凛々しく、カッコよく！　そんな星騎士になることがあたしの目標なんだから」
line = "「大事なことだよ！　常に凛々しく、カッコよく！　そんな星騎士になることがあたしの目標なんだから」"

[[dialogue]]
speaker = "アム"
# 「ユーリス先輩も王子様なんだから、イメージが大事っていうのはわかるでしょ？」
line = "「ユーリス先輩も王子様なんだから、イメージが大事っていうのはわかるでしょ？」"

[[dialogue]]
speaker = "ユーリス"
# 「う。そこを突かれると私も弱いですね」
line = "「う。そこを突かれると私も弱いですね」"

[[dialogue]]
speaker = "アム"
# 「会長だって星徒会長じゃん！　ブラックも飲めない子供舌なんて噂が広まったら恥ずかしいよね？」
line = "「会長だって星徒会長じゃん！　ブラックも飲めない子供舌なんて噂が広まったら恥ずかしいよね？」"

[[dialogue]]
speaker = "unk"
# 俺はあんまり気にしないかな
line = "俺はあんまり気にしないかな"

[[dialogue]]
speaker = "アム"
# 「会長はブラック飲めるからそんな余裕こいていられるんだって。ブラックが苦手な星徒会長なんていないよ！」
line = "「会長はブラック飲めるからそんな余裕こいていられるんだって。ブラックが苦手な星徒会長なんていないよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「くちゅんっ。今、誰か私の噂をしてた……？」
line = "「くちゅんっ。今、誰か私の噂をしてた……？」"

[[dialogue]]
speaker = "ナミエル"
# 「お嬢様。よいコーヒー豆が入ったのですが、いかがされますか。ブラックがおすすめとのことですが」
line = "「お嬢様。よいコーヒー豆が入ったのですが、いかがされますか。ブラックがおすすめとのことですが」"

[[dialogue]]
speaker = "フィオナ"
# 「あー、えーと……ミルクと砂糖も付けてくれると嬉しいかな……」
line = "「あー、えーと……ミルクと砂糖も付けてくれると嬉しいかな……」"

[[dialogue]]
speaker = "アム"
# 「あたしは気にするの！　うーん……どうすれば攻略できるのかな～？」
line = "「あたしは気にするの！　うーん……どうすれば攻略できるのかな～？」"

[[dialogue]]
speaker = "アム"
# 「鍛錬と違って何杯飲んでもぜんぜん慣れないし……ていうか飲む度にどんどん嫌いになっていきそう……」
line = "「鍛錬と違って何杯飲んでもぜんぜん慣れないし……ていうか飲む度にどんどん嫌いになっていきそう……」"

[[dialogue]]
speaker = "ユーリス"
# 「それなら苦くないコーヒーを淹れられるようにするのはいかがでしょう。自分で調節すれば苦みも抑えられますよ」
line = "「それなら苦くないコーヒーを淹れられるようにするのはいかがでしょう。自分で調節すれば苦みも抑えられますよ」"

[[dialogue]]
speaker = "アム"
# 「それなら──って、それできるの自分で淹れる時だけじゃないですか！　カフェテリアのコーヒーは苦いままですよー！」
line = "「それなら──って、それできるの自分で淹れる時だけじゃないですか！　カフェテリアのコーヒーは苦いままですよー！」"

[[dialogue]]
speaker = "ユーリス"
# 「そうでした。確かに解決にはなりませんね」
line = "「そうでした。確かに解決にはなりませんね」"

[[dialogue]]
speaker = "ユーリス"
# 「では逆転の発想をしてはどうでしょう？」
line = "「では逆転の発想をしてはどうでしょう？」"

[[dialogue]]
speaker = "アム"
# 「逆転……？」
line = "「逆転……？」"

[[dialogue]]
speaker = "ユーリス"
# 「ええ。人前で、砂糖をたっぷり入れるのが恥ずかしい。ならば誰にもバレないよう砂糖を入れられれば良いのです」
line = "「ええ。人前で、砂糖をたっぷり入れるのが恥ずかしい。ならば誰にもバレないよう砂糖を入れられれば良いのです」"

[[dialogue]]
speaker = "アム"
# 「そんな方法が……！？」
line = "「そんな方法が……！？」"

[[dialogue]]
speaker = "ユーリス"
# 「私が披露しましょう──剣よ！」
line = "「私が披露しましょう──剣よ！」"

[[dialogue]]
speaker = "アム"
# 「あっ……これってユーリス先輩の聖剣の力……勇者スキル！？　カッコイイ～！」
line = "「あっ……これってユーリス先輩の聖剣の力……勇者スキル！？　カッコイイ～！」"

[[dialogue]]
speaker = "ユーリス"
# 「ええ。今呼び出したのは勇者スキル『手品』です。私は今だけ、手品の達人になりました」
line = "「ええ。今呼び出したのは勇者スキル『手品』です。私は今だけ、手品の達人になりました」"

[[dialogue]]
speaker = "ユーリス"
# 「白楯さんのコーヒーカップを借りますね。右手で持ち上げ、そっと左手をかざす。いち、に、さん──さぁどうぞ」
line = "「白楯さんのコーヒーカップを借りますね。右手で持ち上げ、そっと左手をかざす。いち、に、さん──さぁどうぞ」"

[[dialogue]]
speaker = "アム"
# 「ごくごく……んんっ！？　あ、あっ……あまーい！！」
line = "「ごくごく……んんっ！？　あ、あっ……あまーい！！」"

[[dialogue]]
speaker = "unk"
# ……嘘！？
line = "……嘘！？"

[[dialogue]]
speaker = "アム"
# 「すごいすごい！　タネを教えて！　これならバッチリだよ！」
line = "「すごいすごい！　タネを教えて！　これならバッチリだよ！」"

[[dialogue]]
speaker = "ユーリス"
# 「ええ。では順に解説していきましょう。大事なのは実は、カップを持っていた右手の方で──」
line = "「ええ。では順に解説していきましょう。大事なのは実は、カップを持っていた右手の方で──」"

[[dialogue]]
speaker = "アム"
# 「会長のカップ貸して！　こうやってー……左手をかざして……ワン、ツー、スリー……！　はい！」
line = "「会長のカップ貸して！　こうやってー……左手をかざして……ワン、ツー、スリー……！　はい！」"

[[dialogue]]
speaker = "unk"
# 甘くなってる……！？
line = "甘くなってる……！？"

[[dialogue]]
speaker = "アム"
# 「やったー！　会得したぞー！」
line = "「やったー！　会得したぞー！」"

[[dialogue]]
speaker = "ユーリス"
# 「流石ですね。これで堂々と人前でブラックコーヒーが飲めるでしょう」
line = "「流石ですね。これで堂々と人前でブラックコーヒーが飲めるでしょう」"

[[dialogue]]
speaker = "アム"
# 「ありがとー先輩！　うしし、これでもうエルゼに子供舌なんて言われないですむぞ～！」
line = "「ありがとー先輩！　うしし、これでもうエルゼに子供舌なんて言われないですむぞ～！」"

[[dialogue]]
speaker = "アム"
# 「明日、カフェテリアに誘って驚かせてやろ～っと！」
line = "「明日、カフェテリアに誘って驚かせてやろ～っと！」"

[[dialogue]]
speaker = "アム"
# 「ごくごくっ……んー♪　あまーい♪」
line = "「ごくごくっ……んー♪　あまーい♪」"

[[dialogue]]
speaker = "ユーリス"
# （足をパタパタさせて……それにカップも両手持ちで……）
line = "（足をパタパタさせて……それにカップも両手持ちで……）"

[[dialogue]]
speaker = "unk"
# （子供みたいだ……）
line = "（子供みたいだ……）"

[[dialogue]]
speaker = "ユーリス"
# （あはは……思っても言わない方がいいね、きっと）
line = "（あはは……思っても言わない方がいいね、きっと）"

[[dialogue]]
speaker = "アム"
# 「コーヒーが好きになっちゃったな～♪　ふっふ～ん♪」
line = "「コーヒーが好きになっちゃったな～♪　ふっふ～ん♪」"
