[[dialogue]]
speaker = "unk"
# 第１話,ケンカするほどなんとやら,P
line = "第１話,ケンカするほどなんとやら,P"

[[dialogue]]
speaker = "イレーナ"
# 「あちゃー……。また焦げちゃったわ。どうしてこうなっちゃうのかしら」
line = "「あちゃー……。また焦げちゃったわ。どうしてこうなっちゃうのかしら」"

[[dialogue]]
speaker = "シャロン"
# 「ですがだんだんといい焼き色になっておりますよ。この調子で参りましょう！」
line = "「ですがだんだんといい焼き色になっておりますよ。この調子で参りましょう！」"

[[dialogue]]
speaker = "unk"
# クリスマス会は終わったんじゃ？
line = "クリスマス会は終わったんじゃ？"

[[dialogue]]
speaker = "イレーナ"
# 「ひゃっ、ご機嫌よう──って、エロ会長じゃない。驚かせないでよ」
line = "「ひゃっ、ご機嫌よう──って、エロ会長じゃない。驚かせないでよ」"

[[dialogue]]
speaker = "シャロン"
# 「明日また別のクリスマス会が他の教会で開かれるんです。そこで出すケーキやお菓子を私どもで用意しようとイレーナさまと計画しておりまして」
line = "「明日また別のクリスマス会が他の教会で開かれるんです。そこで出すケーキやお菓子を私どもで用意しようとイレーナさまと計画しておりまして」"

[[dialogue]]
speaker = "イレーナ"
# 「さもあたしも乗り気で参加してるみたいに言わないでよ。あたしはシャロンに無理やり付き合わされてるだけなんだから」
line = "「さもあたしも乗り気で参加してるみたいに言わないでよ。あたしはシャロンに無理やり付き合わされてるだけなんだから」"

[[dialogue]]
speaker = "シャロン"
# 「そうなのですか？　お話をした際は乗り気だったような。仕方ないわねーと仰ってましたし」
line = "「そうなのですか？　お話をした際は乗り気だったような。仕方ないわねーと仰ってましたし」"

[[dialogue]]
speaker = "イレーナ"
# 「それのどこが乗り気なのよ」
line = "「それのどこが乗り気なのよ」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまの場合は乗り気の時のお答えでは？」
line = "「イレーナさまの場合は乗り気の時のお答えでは？」"

[[dialogue]]
speaker = "unk"
# だいだい合ってる
line = "だいだい合ってる"

[[dialogue]]
speaker = "イレーナ"
# 「んな──！？　違うわよ、神官の仕事を合法的にサボる言い訳になるからよっ。シスターとクリスマス会に備えて準備をしているってことなら誰も文句言えないからっ」
line = "「んな──！？　違うわよ、神官の仕事を合法的にサボる言い訳になるからよっ。シスターとクリスマス会に備えて準備をしているってことなら誰も文句言えないからっ」"

[[dialogue]]
speaker = "シャロン"
# 「そうだったのですか……。てっきり、私の前であれば無理に聖女を演じる必要もないからなのかと思って。そんな信頼と友情の深まりを喜んでおりましたのに……」
line = "「そうだったのですか……。てっきり、私の前であれば無理に聖女を演じる必要もないからなのかと思って。そんな信頼と友情の深まりを喜んでおりましたのに……」"

[[dialogue]]
speaker = "イレーナ"
# 「んぬぬぬ……何よ、しおらしい顔しちゃって。これで否定したらあたしが悪者みたいじゃない。好きに取りなさいよ」
line = "「んぬぬぬ……何よ、しおらしい顔しちゃって。これで否定したらあたしが悪者みたいじゃない。好きに取りなさいよ」"

[[dialogue]]
speaker = "シャロン"
# 「では好きに解釈させていただきます。ふふふ」
line = "「では好きに解釈させていただきます。ふふふ」"

[[dialogue]]
speaker = "unk"
# ほんとイレーナは素直じゃない……
line = "ほんとイレーナは素直じゃない……"

[[dialogue]]
speaker = "イレーナ"
# 「う、うっさいわね。わかったような顔して眺めてんじゃないわよ！　あんたはクッキーの味見でもしてなさい！」
line = "「う、うっさいわね。わかったような顔して眺めてんじゃないわよ！　あんたはクッキーの味見でもしてなさい！」"

[[dialogue]]
speaker = "シャロン"
# 「それなら私の作ったクッキーも是非お願いいたします！　たっぷりと愛を込めて作りましたから！」
line = "「それなら私の作ったクッキーも是非お願いいたします！　たっぷりと愛を込めて作りましたから！」"

[[dialogue]]
speaker = "unk"
# しょっぱっ！？
line = "しょっぱっ！？"

[[dialogue]]
speaker = "unk"
# めちゃ甘っ！？
line = "めちゃ甘っ！？"

[[dialogue]]
speaker = "イレーナ"
# 「む、人が丹精込めて作ったお菓子だってのにご挨拶ね」
line = "「む、人が丹精込めて作ったお菓子だってのにご挨拶ね」"

[[dialogue]]
speaker = "シャロン"
# 「ですからお塩を利かせすぎとご忠告したではありませんか」
line = "「ですからお塩を利かせすぎとご忠告したではありませんか」"

[[dialogue]]
speaker = "イレーナ"
# 「それを言うならあんたも砂糖の量が多すぎるでしょ。『愛を込めてるんです』の一点張りでドバドバ投入しちゃってさ」
line = "「それを言うならあんたも砂糖の量が多すぎるでしょ。『愛を込めてるんです』の一点張りでドバドバ投入しちゃってさ」"

[[dialogue]]
speaker = "シャロン"
# 「元よりお菓子作りは砂糖を使うものなのです。クリスマスですから一層甘くしてみました！」
line = "「元よりお菓子作りは砂糖を使うものなのです。クリスマスですから一層甘くしてみました！」"

[[dialogue]]
speaker = "イレーナ"
# 「こんなの食べさせたら虫歯になっちゃうでしょ。今の流行りは塩バタークッキーよ！」
line = "「こんなの食べさせたら虫歯になっちゃうでしょ。今の流行りは塩バタークッキーよ！」"

[[dialogue]]
speaker = "シャロン"
# 「いいえ、子どもはやはり甘いものが好きなもの。私のホワイトチョコクッキーの方が好まれるに決まっています」
line = "「いいえ、子どもはやはり甘いものが好きなもの。私のホワイトチョコクッキーの方が好まれるに決まっています」"

[[dialogue]]
speaker = "イレーナ"
# 「は～？　大体あんたは生地ひとつ作るのに時間をかけすぎなのよ。何時間もコネコネ、コネコネ──出来上がる前にクリスマス会が終わっちゃうじゃない」
line = "「は～？　大体あんたは生地ひとつ作るのに時間をかけすぎなのよ。何時間もコネコネ、コネコネ──出来上がる前にクリスマス会が終わっちゃうじゃない」"

[[dialogue]]
speaker = "シャロン"
# 「だとしてもイレーナさまは乱雑すぎますよ。計量は正確でなければなりません。そこに愛は在るのですかっ？」
line = "「だとしてもイレーナさまは乱雑すぎますよ。計量は正確でなければなりません。そこに愛は在るのですかっ？」"

[[dialogue]]
speaker = "イレーナ"
# 「食えりゃいいのよ、食えりゃっ。イチイチ愛を感じながらお菓子を食う子どもなんていやしないんだから──」
line = "「食えりゃいいのよ、食えりゃっ。イチイチ愛を感じながらお菓子を食う子どもなんていやしないんだから──」"

[[dialogue]]
speaker = "イレーナ"
# 「って……あんたは何にやついてるのよ？　気色悪いわね……」
line = "「って……あんたは何にやついてるのよ？　気色悪いわね……」"

[[dialogue]]
speaker = "unk"
# イレーナが楽しそうにしてるなと思って
line = "イレーナが楽しそうにしてるなと思って"

[[dialogue]]
speaker = "イレーナ"
# 「なっ。どこをどう見ればそうなるのよっ。絶賛ケンカ中だってばっ」
line = "「なっ。どこをどう見ればそうなるのよっ。絶賛ケンカ中だってばっ」"

[[dialogue]]
speaker = "シャロン"
# 「ふふ、私はなんだかんだ楽しいですよ。以前はこのようにイレーナさまと言い争うこともありませんでしたし」
line = "「ふふ、私はなんだかんだ楽しいですよ。以前はこのようにイレーナさまと言い争うこともありませんでしたし」"

[[dialogue]]
speaker = "シャロン"
# 「イレーナさまが本音でぶつかってきてくださっているとわかって嬉しいくらいです！　これもまた友情の形ですよね！　ケンカするほどなんとやら！」
line = "「イレーナさまが本音でぶつかってきてくださっているとわかって嬉しいくらいです！　これもまた友情の形ですよね！　ケンカするほどなんとやら！」"

[[dialogue]]
speaker = "イレーナ"
# 「～～っっ！　だからあんたは照れもせずによくそんな恥ずかしいことを……！　あたしは普通に接してるだけよ、普通に！」
line = "「～～っっ！　だからあんたは照れもせずによくそんな恥ずかしいことを……！　あたしは普通に接してるだけよ、普通に！」"

[[dialogue]]
speaker = "シャロン"
# 「その『普通』を私に見せてくださることが嬉しいのではありませんかっ！」
line = "「その『普通』を私に見せてくださることが嬉しいのではありませんかっ！」"

[[dialogue]]
speaker = "シャロン"
# 「そうだ、よいことを思いつきました！　今まで各々でお菓子を作っていましたが今度は２人で一緒に作ってみませんかっ？」
line = "「そうだ、よいことを思いつきました！　今まで各々でお菓子を作っていましたが今度は２人で一緒に作ってみませんかっ？」"

[[dialogue]]
speaker = "イレーナ"
# 「２人で？　まぁ計量とかめんどくさい部分はあんたにやってもらえれば助かるけど……」
line = "「２人で？　まぁ計量とかめんどくさい部分はあんたにやってもらえれば助かるけど……」"

[[dialogue]]
speaker = "シャロン"
# 「私たちの友情を以てすれば必ずや美味しいお菓子ができあがりますよ！　私、追加の材料を持ってきますねっ！」
line = "「私たちの友情を以てすれば必ずや美味しいお菓子ができあがりますよ！　私、追加の材料を持ってきますねっ！」"

[[dialogue]]
speaker = "イレーナ"
# 「あっ、ちょっ──……まったくもう。ウザったいくらい友情友情、連呼しちゃって……。あたしなんか別に進んで友達になりたいようなやつじゃないでしょうに」
line = "「あっ、ちょっ──……まったくもう。ウザったいくらい友情友情、連呼しちゃって……。あたしなんか別に進んで友達になりたいようなやつじゃないでしょうに」"

[[dialogue]]
speaker = "unk"
# 気にしすぎだよ
line = "気にしすぎだよ"

[[dialogue]]
speaker = "イレーナ"
# 「そう……かもしれないわね」
line = "「そう……かもしれないわね」"

[[dialogue]]
speaker = "イレーナ"
# 「あの子を見てるとね？　もうちょっとあたしも素を出してもいいのかなって思わなくはないの。意外とその、受け入れてもらえるのかなって……」
line = "「あの子を見てるとね？　もうちょっとあたしも素を出してもいいのかなって思わなくはないの。意外とその、受け入れてもらえるのかなって……」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしが思っているよりこの世界は愛で満ちてるのかなって。ただあたしが怖がりすぎてるだけなのかなって。そう思ったりもして──」
line = "「あたしが思っているよりこの世界は愛で満ちてるのかなって。ただあたしが怖がりすぎてるだけなのかなって。そう思ったりもして──」"

[[dialogue]]
speaker = "シャロン"
# 「その通りですよ！！」
line = "「その通りですよ！！」"

[[dialogue]]
speaker = "イレーナ"
# 「ひゃっ！？　あ、あんた、もう戻ってきて──」
line = "「ひゃっ！？　あ、あんた、もう戻ってきて──」"

[[dialogue]]
speaker = "シャロン"
# 「その通りですよ、イレーナさま！　ああ、ようやく私の愛が届いてくださいましたかっ！」
line = "「その通りですよ、イレーナさま！　ああ、ようやく私の愛が届いてくださいましたかっ！」"

[[dialogue]]
speaker = "シャロン"
# 「ならば恐れずに本来のイレーナさまを出していきましょう！　私もお手伝いしますよ！　イレーナさまの無二の親友として！」
line = "「ならば恐れずに本来のイレーナさまを出していきましょう！　私もお手伝いしますよ！　イレーナさまの無二の親友として！」"

[[dialogue]]
speaker = "イレーナ"
# 「あ～もう、うざいっ！　暑苦しいっ！　あんたみたいなのが増えるってんなら、逆に素を出したくなくなってくるっての！」
line = "「あ～もう、うざいっ！　暑苦しいっ！　あんたみたいなのが増えるってんなら、逆に素を出したくなくなってくるっての！」"

[[dialogue]]
speaker = "シャロン"
# 「そんなぁ～！？　一体私の何がいけないと仰るのですか～！」
line = "「そんなぁ～！？　一体私の何がいけないと仰るのですか～！」"
