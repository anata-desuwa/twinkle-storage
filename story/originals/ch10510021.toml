[[dialogue]]
speaker = "unk"
# 第１話,これが真の姿だ！,P
line = "第１話,これが真の姿だ！,P"

[[dialogue]]
speaker = "unk"
# 人間界にお忍び旅行をするクラウディアと接するうち、俺と彼女はどんどん仲を深めていった。
line = "人間界にお忍び旅行をするクラウディアと接するうち、俺と彼女はどんどん仲を深めていった。"

[[dialogue]]
speaker = "unk"
# そしてとうとう俺はクラウディアに想いを打ち明け、彼女も応えてくれることになり──
line = "そしてとうとう俺はクラウディアに想いを打ち明け、彼女も応えてくれることになり──"

[[dialogue]]
speaker = "クラウディア"
# 「よし。動くなよ魔王、初めての口付けだ。余がりーどするからの……？」
line = "「よし。動くなよ魔王、初めての口付けだ。余がりーどするからの……？」"

[[dialogue]]
speaker = "クラウディア"
# 「んぅっ……ちゅっ<emoji=heart04>」
line = "「んぅっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
# 「ふ、ふふん♪　<ruby=おもは>面映</ruby>ゆいが、高鳴る鼓動も心地よい……お前も同じ気持ちか？　そうか、そうか<emoji=heart04>」
line = "「ふ、ふふん♪　<ruby>面映<rt>おもは</rt></ruby>ゆいが、高鳴る鼓動も心地よい……お前も同じ気持ちか？　そうか、そうか<emoji=heart04>」"

[[dialogue]]
speaker = "クラウディア"
# 「よいか。光栄に思うのだぞ？　光の魔女のふぁーすときっすを受けられるなど、人の身に余る幸福なのだからな！」
line = "「よいか。光栄に思うのだぞ？　光の魔女のふぁーすときっすを受けられるなど、人の身に余る幸福なのだからな！」"

[[dialogue]]
speaker = "クラウディア"
# 「して魔王よ、お前は余のしもべ兼、恋人となったわけだが……恋人というのはどのように仲を深めるものなのだ？」
line = "「して魔王よ、お前は余のしもべ兼、恋人となったわけだが……恋人というのはどのように仲を深めるものなのだ？」"

[[dialogue]]
speaker = "クラウディア"
# 「ふむ、秘密の共有……？　なるほどな。確かに秘密を打ち明ければ、より深い仲になれそうだのう」
line = "「ふむ、秘密の共有……？　なるほどな。確かに秘密を打ち明ければ、より深い仲になれそうだのう」"

[[dialogue]]
speaker = "クラウディア"
# 「となれば……うむ。余の<b>あれ</b>を見せてやるか」
line = "「となれば……うむ。余の<b>あれ</b>を見せてやるか」"

[[dialogue]]
speaker = "クラウディア"
# 「いや、今日は無理だ。迎えにセドナが来るのでな、感づかれてしまう」
line = "「いや、今日は無理だ。迎えにセドナが来るのでな、感づかれてしまう」"

[[dialogue]]
speaker = "クラウディア"
# 「次に会う時までに準備しておく。期待しておれよ！」
line = "「次に会う時までに準備しておく。期待しておれよ！」"

[[dialogue]]
speaker = "unk"
# と、ここまでが先週の話。クラウディアは一体何を見せてくれるのだろうと首をかしげていたら、彼女はいつもどおり予告もなく訪問してきて──
line = "と、ここまでが先週の話。クラウディアは一体何を見せてくれるのだろうと首をかしげていたら、彼女はいつもどおり予告もなく訪問してきて──"

[[dialogue]]
speaker = "クラウディア"
# 「では約束通り、お前に余の秘密を見せてやる。刮目するのだぞっ！」
line = "「では約束通り、お前に余の秘密を見せてやる。刮目するのだぞっ！」"

[[dialogue]]
speaker = "unk"
# 神聖な魔力のオーラが迸ってる！？
line = "神聖な魔力のオーラが迸ってる！？"

[[dialogue]]
speaker = "unk"
# す、すごい……！
line = "す、すごい……！"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ふふふ、驚いておるようだな♪　これこそが余の真の姿。体の<ruby=うち>裡</ruby>に眠った魔力をすべて開放すると、こうなるのだ！」
line = "「ふふふ、驚いておるようだな♪　これこそが余の真の姿。体の<ruby>裡<rt>うち</rt></ruby>に眠った魔力をすべて開放すると、こうなるのだ！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「お前に読ませてもらったしょーねん漫画に例えると、フルパワーモードというやつだな！　ほれ、感想を述べてみよ！」
line = "「お前に読ませてもらったしょーねん漫画に例えると、フルパワーモードというやつだな！　ほれ、感想を述べてみよ！」"

[[dialogue]]
speaker = "unk"
# すごく綺麗だ
line = "すごく綺麗だ"

[[dialogue]]
speaker = "unk"
# すごく可愛い
line = "すごく可愛い"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「そうであろう！　余は普段から偉くて凄い！　が、この姿になるとも～～～っと偉くて凄くなるのだ！」
line = "「そうであろう！　余は普段から偉くて凄い！　が、この姿になるとも～～～っと偉くて凄くなるのだ！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「だがちょいと言葉が足りん気がするな？　ほれ、もっと褒めんか♪」
line = "「だがちょいと言葉が足りん気がするな？　ほれ、もっと褒めんか♪」"

[[dialogue]]
speaker = "unk"
# とても素敵なレディだ
line = "とても素敵なレディだ"

[[dialogue]]
speaker = "unk"
# 見惚れてしまう
line = "見惚れてしまう"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「そうであろう、そうであろう！　ふははっ！　苦しゅうないぞ、語彙が尽きるまで褒めるのだっ！」
line = "「そうであろう、そうであろう！　ふははっ！　苦しゅうないぞ、語彙が尽きるまで褒めるのだっ！」"

[[dialogue]]
speaker = "unk"
# 花嫁の衣装みたいだね
line = "花嫁の衣装みたいだね"

[[dialogue]]
speaker = "unk"
# えーっと……
line = "えーっと……"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ハナヨメ？　なんだそれは。人間界の言葉か？」
line = "「ハナヨメ？　なんだそれは。人間界の言葉か？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「──む。なんだ、また魔王の連絡機が鳴っておるぞ」
line = "「──む。なんだ、また魔王の連絡機が鳴っておるぞ」"

[[dialogue]]
speaker = "マトイ"
# 『もしもし会長！？　大変、アステラが同時に３つも出ちゃったの！　場所は──！』
line = "『もしもし会長！？　大変、アステラが同時に３つも出ちゃったの！　場所は──！』"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「フン、無粋だな──余が消してやる。ちょちょい、っとな」
line = "「フン、無粋だな──余が消してやる。ちょちょい、っとな」"

[[dialogue]]
speaker = "マトイ"
# 『あ、あれ？　いきなり消えちゃった！？　前にもこんなことあったよね……なんでだろ。せっかくの休日にごめんね、出動はなしで！』
line = "『あ、あれ？　いきなり消えちゃった！？　前にもこんなことあったよね……なんでだろ。せっかくの休日にごめんね、出動はなしで！』"

[[dialogue]]
speaker = "unk"
# 普段の時よりもずっと強いんだな
line = "普段の時よりもずっと強いんだな"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「うむ。この姿になると魔力が跳ね上がるのだ。ただ強すぎるせいかの、セドナから決して変身するなときつ～く言われておる」
line = "「うむ。この姿になると魔力が跳ね上がるのだ。ただ強すぎるせいかの、セドナから決して変身するなときつ～く言われておる」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ネビュラとのおやくそく第……何条だったかの？　『必要な時以外、ぜったい本気モードになっちゃダメ』というのがあってのう」
line = "「ネビュラとのおやくそく第……何条だったかの？　『必要な時以外、ぜったい本気モードになっちゃダメ』というのがあってのう」"

[[dialogue]]
speaker = "unk"
# バレたらマジでまずいやつでは！？
line = "バレたらマジでまずいやつでは！？"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「うむ！　バレたらマジでまずいやつだ！　どうだ、これが余の秘密だぞ。ふふん、共有できて光栄であろう？」
line = "「うむ！　バレたらマジでまずいやつだ！　どうだ、これが余の秘密だぞ。ふふん、共有できて光栄であろう？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「それよりも魔王、あれだ！　てれびげーむをしようではないか。基地にこもって鬱憤がたまっておるのだ、付き合え！」
line = "「それよりも魔王、あれだ！　てれびげーむをしようではないか。基地にこもって鬱憤がたまっておるのだ、付き合え！」"

[[dialogue]]
speaker = "unk"
# そうしてフルパワーモードの白衣装をまとったクラウディアを膝に乗せ、レースゲームを楽しんだ。
line = "そうしてフルパワーモードの白衣装をまとったクラウディアを膝に乗せ、レースゲームを楽しんだ。"

[[dialogue]]
speaker = "unk"
# とっぷりと日が暮れた頃、ネビュラからお迎えがやってきて……
line = "とっぷりと日が暮れた頃、ネビュラからお迎えがやってきて……"

[[dialogue]]
speaker = "ウェンディ"
# 「失礼します。クラウディア様、僭越ながらご帰宅の時間で──」
line = "「失礼します。クラウディア様、僭越ながらご帰宅の時間で──」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「おお、ウェンディ。もうそんな時間か。楽しい時間はあっという間だのう」
line = "「おお、ウェンディ。もうそんな時間か。楽しい時間はあっという間だのう」"

[[dialogue]]
speaker = "ウェンディ"
# 「──その恰好～ッ！！？？」
line = "「──その恰好～ッ！！？？」"

[[dialogue]]
speaker = "ウェンディ"
# 「クラウディア様！　そのお姿はみだりに見せてはなりませんとあれほど……！　セ、セドナ長官にどう報告をすれば！？」
line = "「クラウディア様！　そのお姿はみだりに見せてはなりませんとあれほど……！　セ、セドナ長官にどう報告をすれば！？」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「何を異なことを。報告書に書かなければよいだろう？　書類の改竄やミスの隠蔽は、お前のお得意ではないか♪」
line = "「何を異なことを。報告書に書かなければよいだろう？　書類の改竄やミスの隠蔽は、お前のお得意ではないか♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「ひどい！　隠蔽しようとしたのはモンスター捕獲作戦の時だけです！　人聞きの悪い言い方はやめてください！！」
line = "「ひどい！　隠蔽しようとしたのはモンスター捕獲作戦の時だけです！　人聞きの悪い言い方はやめてください！！」"

[[dialogue]]
speaker = "ウェンディ"
# 「ていうか、そのために私をお迎え係に指名したんですか！？　普段はアイリーンに頼むからおかしいと思ったんですよ！」
line = "「ていうか、そのために私をお迎え係に指名したんですか！？　普段はアイリーンに頼むからおかしいと思ったんですよ！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「ふふん。適材適所というやつだ。優れた指導者は部下の特性を把握せねばならん」
line = "「ふふん。適材適所というやつだ。優れた指導者は部下の特性を把握せねばならん」"

[[dialogue]]
speaker = "ウェンディ"
# 「嬉しくないです、その評価は全然嬉しくないです……！！」
line = "「嬉しくないです、その評価は全然嬉しくないです……！！」"

[[dialogue]]
speaker = "クラウディア（黄昏）"
# 「さて、魔王よ──お別れだな」
line = "「さて、魔王よ──お別れだな」"

[[dialogue]]
speaker = "クラウディア"
# 「ふふ、久しぶりに力を解放したからすっきりしたぞ。また来るからの～♪」
line = "「ふふ、久しぶりに力を解放したからすっきりしたぞ。また来るからの～♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「……会長さん、お願いがあります」
line = "「……会長さん、お願いがあります」"

[[dialogue]]
speaker = "ウェンディ"
# 「セドナ長官には内緒にしてください！！　この通りですから！！」
line = "「セドナ長官には内緒にしてください！！　この通りですから！！」"
