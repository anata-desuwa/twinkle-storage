[[dialogue]]
speaker = "unk"
# 第１話,自称・悪の終末兵器（前編）,P
line = "第１話,自称・悪の終末兵器（前編）,P"

[[dialogue]]
speaker = "サチ"
# 「きゃあああぁぁぁ～～～っ！」
line = "「きゃあああぁぁぁ～～～っ！」"

[[dialogue]]
speaker = "サチ"
# 「お兄さん、転んだどさくさに紛れて、どこを触ってるんですか！　というか、お兄さんが一緒にいると、どうしてこんなエッチなことばかり起きるんですかぁぁぁっ！？」
line = "「お兄さん、転んだどさくさに紛れて、どこを触ってるんですか！　というか、お兄さんが一緒にいると、どうしてこんなエッチなことばかり起きるんですかぁぁぁっ！？」"

[[dialogue]]
speaker = "unk"
# ごめん、わざとじゃないんだーーーっ！
line = "ごめん、わざとじゃないんだーーーっ！"

[[dialogue]]
speaker = "？？？"
# 「ククク……！　ついに見つけたのじゃ、<b>特異点</b>を……！」
line = "「ククク……！　ついに見つけたのじゃ、<b>特異点</b>を……！」"

[[dialogue]]
speaker = "unk"
# 流星学園附属校の生徒会長であるサチと知り合って少し経った、ある日のこと。外を歩いていると、どこからか大きな笑い声が聞こえてきた。
line = "流星学園附属校の生徒会長であるサチと知り合って少し経った、ある日のこと。外を歩いていると、どこからか大きな笑い声が聞こえてきた。"

[[dialogue]]
speaker = "？？？"
# 「フハハハハハ！　新星学園の星徒会長、待っておったぞ！」
line = "「フハハハハハ！　新星学園の星徒会長、待っておったぞ！」"

[[dialogue]]
speaker = "？？？"
# 「って、どこを見ておるのじゃ！　我がいるのは、校門の上じゃ、上！」
line = "「って、どこを見ておるのじゃ！　我がいるのは、校門の上じゃ、上！」"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　我の名は、プリムラ！　かつて世界をリクリエの危機におとしいれ、今は世界征服をもくろむ、悪の終末兵器じゃ！」
line = "「フハハハ！　我の名は、プリムラ！　かつて世界をリクリエの危機におとしいれ、今は世界征服をもくろむ、悪の終末兵器じゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「喜べ、新星の星徒会長よ！　貴様はこたび、特異点として我の眼鏡にかなったのじゃ。よって貴様を、我の第一の<ruby=けんぞく>眷族</ruby>にしてやろう！」
line = "「喜べ、新星の星徒会長よ！　貴様はこたび、特異点として我の眼鏡にかなったのじゃ。よって貴様を、我の第一の<ruby>眷族<rt>けんぞく</rt></ruby>にしてやろう！」"

[[dialogue]]
speaker = "unk"
# そんなところに立っていると、危ないよ？
line = "そんなところに立っていると、危ないよ？"

[[dialogue]]
speaker = "プリムラ"
# 「いや、人の話を聞かんか！　というか、我を子供扱いすなぁーーっ！」
line = "「いや、人の話を聞かんか！　というか、我を子供扱いすなぁーーっ！」"

[[dialogue]]
speaker = "プリムラ"
# 「よく見ろ、流星学園附属の制服を着とるじゃろうが！　我は２年生で、しかも生徒会役員なのじゃ！」
line = "「よく見ろ、流星学園附属の制服を着とるじゃろうが！　我は２年生で、しかも生徒会役員なのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「――そうじゃ、サチと同じじゃ！　だからもっと礼を尽くし――のわっ！？　しまったのじゃ、足が滑っ……！？」
line = "「――そうじゃ、サチと同じじゃ！　だからもっと礼を尽くし――のわっ！？　しまったのじゃ、足が滑っ……！？」"

[[dialogue]]
speaker = "unk"
# 言わんこっちゃない！　キャッチ！
line = "言わんこっちゃない！　キャッチ！"

[[dialogue]]
speaker = "プリムラ"
# 「おおっ！　さすがは我が認めた男じゃ、苦しゅうないぞ♪」
line = "「おおっ！　さすがは我が認めた男じゃ、苦しゅうないぞ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「もっとも、我は<b>どんな高さから落ちようと</b>体に傷１つ付きはせぬが……レディに対するその気遣いは悪くないのじゃ」
line = "「もっとも、我は<b>どんな高さから落ちようと</b>体に傷１つ付きはせぬが……レディに対するその気遣いは悪くないのじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「改めて名乗ろう。我はプリムラ。不本意ながらサチの『ロストアイテム』回収を手伝わされておる。あやつから魔法少女活動のことは聞いておろう？」
line = "「改めて名乗ろう。我はプリムラ。不本意ながらサチの『ロストアイテム』回収を手伝わされておる。あやつから魔法少女活動のことは聞いておろう？」"

[[dialogue]]
speaker = "プリムラ"
# 「――そう、ロストアイテムは、使い方によっては世界を滅ぼすことも可能な、危険な古代遺物じゃ。それを放置して、勝手に世界を終末へ導かれても困るのでな」
line = "「――そう、ロストアイテムは、使い方によっては世界を滅ぼすことも可能な、危険な古代遺物じゃ。それを放置して、勝手に世界を終末へ導かれても困るのでな」"

[[dialogue]]
speaker = "プリムラ"
# 「ククク……それにあわよくば、サチの横から掠めとり、世界征服に利用してやるのも悪くないのじゃ。あやつをいつか、ギャフンと言わせてやらねば気が済まぬからな」
line = "「ククク……それにあわよくば、サチの横から掠めとり、世界征服に利用してやるのも悪くないのじゃ。あやつをいつか、ギャフンと言わせてやらねば気が済まぬからな」"

[[dialogue]]
speaker = "プリムラ"
# 「なんせ我は、あやつが持っているロストアイテムのせいで、命令に逆らうことができぬ。『悪の終末兵器』だというのに、無理矢理従わされているのじゃ」
line = "「なんせ我は、あやつが持っているロストアイテムのせいで、命令に逆らうことができぬ。『悪の終末兵器』だというのに、無理矢理従わされているのじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「これも全て、サチの化け物じみた幸運のせい。我はそのとばっちりを受け、散々辛酸を舐めさせられてきたのじゃ。しかし、そんな不幸な日々もこれまで！」
line = "「これも全て、サチの化け物じみた幸運のせい。我はそのとばっちりを受け、散々辛酸を舐めさせられてきたのじゃ。しかし、そんな不幸な日々もこれまで！」"

[[dialogue]]
speaker = "プリムラ"
# 「我はついにあやつの幸運に対抗し得る特異点を見つけたのじゃ！　それが、新星の星徒会長……貴様じゃ！」
line = "「我はついにあやつの幸運に対抗し得る特異点を見つけたのじゃ！　それが、新星の星徒会長……貴様じゃ！」"

[[dialogue]]
speaker = "unk"
# 俺が、特異点……？
line = "俺が、特異点……？"

[[dialogue]]
speaker = "プリムラ"
# 「そうじゃ。我の目はあざむけぬぞ！　サチは貴様といると、何故かハレンチなトラブルに見舞われる！　それはつまり、貴様がサチの幸運を狂わす存在ということなのじゃ！」
line = "「そうじゃ。我の目はあざむけぬぞ！　サチは貴様といると、何故かハレンチなトラブルに見舞われる！　それはつまり、貴様がサチの幸運を狂わす存在ということなのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「その力を見込んでこたび、貴様を我の眷属にしてやろうというわけじゃ。光栄に思うがよい！」
line = "「その力を見込んでこたび、貴様を我の眷属にしてやろうというわけじゃ。光栄に思うがよい！」"

[[dialogue]]
speaker = "プリムラ"
# 「――よし、それでは貴様。頭の位置を少し下げるがよい」
line = "「――よし、それでは貴様。頭の位置を少し下げるがよい」"

[[dialogue]]
speaker = "プリムラ"
# 「何故かって？　先程、我が校門の上から落ちたところを助けたであろう？　その礼みたいなものじゃ」
line = "「何故かって？　先程、我が校門の上から落ちたところを助けたであろう？　その礼みたいなものじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「ククク……よいぞ。その頭の高さなら、ちょうどよく届く」
line = "「ククク……よいぞ。その頭の高さなら、ちょうどよく届く」"

[[dialogue]]
speaker = "プリムラ"
# 「ん……ちゅっ<emoji=heart04>」
line = "「ん……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# っ！？　ちょっ、いきなり何でキスを！？
line = "っ！？　ちょっ、いきなり何でキスを！？"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　かかったな！　今更警戒しても、もう遅い！」
line = "「フハハハ！　かかったな！　今更警戒しても、もう遅い！」"

[[dialogue]]
speaker = "プリムラ"
# 「我の体の一部をお前に飲ませた。契約の儀式により、貴様は強制的に我の眷属となるのじゃ！」
line = "「我の体の一部をお前に飲ませた。契約の儀式により、貴様は強制的に我の眷属となるのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　契約成立なのじゃ！」
line = "「フハハハ！　契約成立なのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「これで貴様は、我の眷族となった。我の命令は絶対で、逆らうことはできないのじゃ。フフフ、試してみるか？　そうじゃな……ほれ――」
line = "「これで貴様は、我の眷族となった。我の命令は絶対で、逆らうことはできないのじゃ。フフフ、試してみるか？　そうじゃな……ほれ――」"

[[dialogue]]
speaker = "プリムラ"
# 「我の手の甲に、キスをするのじゃ！」
line = "「我の手の甲に、キスをするのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「……って、どうした？　何をボーッとしておる？　我の命令には絶対のはず……」
line = "「……って、どうした？　何をボーッとしておる？　我の命令には絶対のはず……」"

[[dialogue]]
speaker = "unk"
# 手の甲にって、忠誠を示せ！　ってこと？
line = "手の甲にって、忠誠を示せ！　ってこと？"

[[dialogue]]
speaker = "プリムラ"
# 「そうじゃ！　――のわっ！？　な、何……！？　わ、我の体が勝手に動いて……！」
line = "「そうじゃ！　――のわっ！？　な、何……！？　わ、我の体が勝手に動いて……！」"

[[dialogue]]
speaker = "プリムラ"
# 「ちゅっ<emoji=heart04>　……って、どうして我の方が、貴様の手にキスをしておるのじゃあぁぁぁっ！？」
line = "「ちゅっ<emoji=heart04>　……って、どうして我の方が、貴様の手にキスをしておるのじゃあぁぁぁっ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「ま、まさか我よりも、貴様の格の方が上じゃというのか……！？　それ故に、我の方が貴様の眷族になってしまったとでも！？」
line = "「ま、まさか我よりも、貴様の格の方が上じゃというのか……！？　それ故に、我の方が貴様の眷族になってしまったとでも！？」"

[[dialogue]]
speaker = "プリムラ"
# 「そ、そんな馬鹿なぁぁぁーーーっ！　何故こうなるのじゃあぁぁぁーーーっ！？」
line = "「そ、そんな馬鹿なぁぁぁーーーっ！　何故こうなるのじゃあぁぁぁーーーっ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「貴様を眷族にして、サチからロストアイテムを奪い取らせ、我の力を取り戻すという完璧な計画が……！」
line = "「貴様を眷族にして、サチからロストアイテムを奪い取らせ、我の力を取り戻すという完璧な計画が……！」"

[[dialogue]]
speaker = "サチ"
# 「ふんふん、それでそれで？」
line = "「ふんふん、それでそれで？」"

[[dialogue]]
speaker = "プリムラ"
# 「もちろん、力を取り戻した後は、サチに戦闘を挑み、眷族との共闘で理不尽な幸運を封殺、我の終末兵器としての本領を発揮し、ギャフンと……ってサチ、いつからそこに！？」
line = "「もちろん、力を取り戻した後は、サチに戦闘を挑み、眷族との共闘で理不尽な幸運を封殺、我の終末兵器としての本領を発揮し、ギャフンと……ってサチ、いつからそこに！？」"

[[dialogue]]
speaker = "サチ"
# 「拘束ーーーーーーっ！！！」
line = "「拘束ーーーーーーっ！！！」"

[[dialogue]]
speaker = "プリムラ"
# 「ぎゃあああぁぁぁ～～～っ！！！　鎖は止めるのじゃあああぁぁぁ～～～っ！！！」
line = "「ぎゃあああぁぁぁ～～～っ！！！　鎖は止めるのじゃあああぁぁぁ～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# 何もないところから突然、無数の鎖が！？
line = "何もないところから突然、無数の鎖が！？"

[[dialogue]]
speaker = "サチ"
# 「悪いことは禁止ですっ！」
line = "「悪いことは禁止ですっ！」"

[[dialogue]]
speaker = "プリムラ"
# 「す、<ruby=すま>簀巻</ruby>きは嫌なのじゃ……」
line = "「す、<ruby>簀巻<rt>すま</rt></ruby>きは嫌なのじゃ……」"

[[dialogue]]
speaker = "unk"
# 鎖で雁字搦めにされたプリムラを見て、サチに逆らえないのはこういうことかと納得する俺なのだった。
line = "鎖で雁字搦めにされたプリムラを見て、サチに逆らえないのはこういうことかと納得する俺なのだった。"
