[[dialogue]]
speaker = "unk"
# 第２話,護衛はお嬢様に恋してる,P
line = "第２話,護衛はお嬢様に恋してる,P"

[[dialogue]]
speaker = "unk"
# ある日、ヴィーナスと共にモンスターと戦闘していた時のこと――
line = "ある日、ヴィーナスと共にモンスターと戦闘していた時のこと――"

[[dialogue]]
speaker = "モンスター"
# 「イイイイイ！」
line = "「イイイイイ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナス、後ろだ！
line = "ヴィーナス、後ろだ！"

[[dialogue]]
speaker = "ヴィーナス"
# 「むっ……！」
line = "「むっ……！」"

[[dialogue]]
speaker = "閃"
# 「お嬢様、危ない……！」
line = "「お嬢様、危ない……！」"

[[dialogue]]
speaker = "閃"
# 「間一髪……でしたね」
line = "「間一髪……でしたね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「センちゃん！　助けに来てくれたのね！」
line = "「センちゃん！　助けに来てくれたのね！」"

[[dialogue]]
speaker = "閃"
# 「もちろんです。私はお嬢様の護衛ですから」
line = "「もちろんです。私はお嬢様の護衛ですから」"

[[dialogue]]
speaker = "unk"
# その後、閃の加勢もあって、戦闘は無事に終了した。
line = "その後、閃の加勢もあって、戦闘は無事に終了した。"

[[dialogue]]
speaker = "unk"
# ありがとう。閃のおかげで助かったよ
line = "ありがとう。閃のおかげで助かったよ"

[[dialogue]]
speaker = "閃"
# 「いえいえ、会長さんもご無事で何よりです」
line = "「いえいえ、会長さんもご無事で何よりです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「センちゃんはいつも私がピンチの時に助けてくれるのよね！」
line = "「センちゃんはいつも私がピンチの時に助けてくれるのよね！」"

[[dialogue]]
speaker = "閃"
# 「もちろんです！　お嬢様の為ならば火の中水の中、どこへでも助太刀に参りますっ……！」
line = "「もちろんです！　お嬢様の為ならば火の中水の中、どこへでも助太刀に参りますっ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがとう、さすがセンちゃんね！　これからも頼りにしているわ！」
line = "「ありがとう、さすがセンちゃんね！　これからも頼りにしているわ！」"

[[dialogue]]
speaker = "閃"
# 「ああ、なんて勿体ない褒め言葉っ。私の脳内メモリに永久保存です……！」
line = "「ああ、なんて勿体ない褒め言葉っ。私の脳内メモリに永久保存です……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ、大げさなんだから。センちゃんのお世辞はいつも面白いわね！」
line = "「ふふっ、大げさなんだから。センちゃんのお世辞はいつも面白いわね！」"

[[dialogue]]
speaker = "閃"
# 「お嬢様に喜んでもらえたなら何よりですっ。……って、会長さん！？」
line = "「お嬢様に喜んでもらえたなら何よりですっ。……って、会長さん！？」"

[[dialogue]]
speaker = "閃"
# 「どうかしたか、ではありません。よく見たら、腕を怪我してるじゃないですか！」
line = "「どうかしたか、ではありません。よく見たら、腕を怪我してるじゃないですか！」"

[[dialogue]]
speaker = "unk"
# 大丈夫、かすり傷だよ
line = "大丈夫、かすり傷だよ"

[[dialogue]]
speaker = "ヴィーナス"
# 「なっ……怪我なら早く言わなきゃダメよ！　とにかく、保健室に急ぐわよ！」
line = "「なっ……怪我なら早く言わなきゃダメよ！　とにかく、保健室に急ぐわよ！」"

[[dialogue]]
speaker = "unk"
# それから学園に戻り、傷跡を治療して貰って、保健室を後にした。
line = "それから学園に戻り、傷跡を治療して貰って、保健室を後にした。"

[[dialogue]]
speaker = "閃"
# 「本当に軽傷だったみたいで、安心しました」
line = "「本当に軽傷だったみたいで、安心しました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト。たとえ自分で平気だと思っていても、怪我をした時はちゃんと申告しないとダメよ！」
line = "「クロト。たとえ自分で平気だと思っていても、怪我をした時はちゃんと申告しないとダメよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まだ、付き合いが長いとは言えないけれど――」
line = "「まだ、付き合いが長いとは言えないけれど――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たちは『仲間』でしょう？」
line = "「私たちは『仲間』でしょう？」"

[[dialogue]]
speaker = "unk"
# ごめん……次からはちゃんと言うよ
line = "ごめん……次からはちゃんと言うよ"

[[dialogue]]
speaker = "ヴィーナス"
# 「分かればいいのよ！」
line = "「分かればいいのよ！」"

[[dialogue]]
speaker = "閃"
# 「じーっ……」
line = "「じーっ……」"

[[dialogue]]
speaker = "unk"
# 手を握るのはその辺で……
line = "手を握るのはその辺で……"

[[dialogue]]
speaker = "unk"
# 閃が後ろで嫉妬してるから
line = "閃が後ろで嫉妬してるから"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？　どういうこと？」
line = "「え？　どういうこと？」"

[[dialogue]]
speaker = "閃"
# 「ななっ……何を言っているのですか会長さん！？　わ、私は別に、嫉妬なんて……！」
line = "「ななっ……何を言っているのですか会長さん！？　わ、私は別に、嫉妬なんて……！」"

[[dialogue]]
speaker = "unk"
# 閃はヴィーナスのこと大好きらしいぞ
line = "閃はヴィーナスのこと大好きらしいぞ"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうだったの？　いつもお嬢様の為にって言ってくれてたのは、大げさじゃなく本当だったのね！」
line = "「そうだったの？　いつもお嬢様の為にって言ってくれてたのは、大げさじゃなく本当だったのね！」"

[[dialogue]]
speaker = "閃"
# 「い、いえ、私はあくまでお嬢様のことを深く尊敬しているのであって、好きとかそういう俗な感情では……！」
line = "「い、いえ、私はあくまでお嬢様のことを深く尊敬しているのであって、好きとかそういう俗な感情では……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「違うってこと……？　そう、残念ね」
line = "「違うってこと……？　そう、残念ね」"

[[dialogue]]
speaker = "閃"
# 「ああっ！？　そんな悲しい顔をしないでください……！」
line = "「ああっ！？　そんな悲しい顔をしないでください……！」"

[[dialogue]]
speaker = "閃"
# 「何も違いません！　わ、私はお嬢様のことを……心からお慕いしています！」
line = "「何も違いません！　わ、私はお嬢様のことを……心からお慕いしています！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの！？　センちゃん、嬉しいわ！」
line = "「そうなの！？　センちゃん、嬉しいわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私もセンちゃんのこと、大好きよ！」
line = "「私もセンちゃんのこと、大好きよ！」"

[[dialogue]]
speaker = "閃"
# 「きゃ～～っ！？」
line = "「きゃ～～っ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっ！？　センちゃんどうしたの！？　大丈夫！？」
line = "「ちょっ！？　センちゃんどうしたの！？　大丈夫！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの天然ビームが直撃した……
line = "ヴィーナスの天然ビームが直撃した……"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、そんな技知らないんだけど！？」
line = "「私、そんな技知らないんだけど！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「センちゃん、しっかり！　保健室行く！？」
line = "「センちゃん、しっかり！　保健室行く！？」"

[[dialogue]]
speaker = "閃"
# 「いえ、問題ありません。むしろとても元気です！！」
line = "「いえ、問題ありません。むしろとても元気です！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「鼻血たれてるし、クロトの怪我より重症に見えるんだけど！？」
line = "「鼻血たれてるし、クロトの怪我より重症に見えるんだけど！？」"

[[dialogue]]
speaker = "unk"
# その後、ヴィーナスに保健室で鼻血の世話をされながらも、終始幸せそうな表情を浮かべる閃なのだった。
line = "その後、ヴィーナスに保健室で鼻血の世話をされながらも、終始幸せそうな表情を浮かべる閃なのだった。"
