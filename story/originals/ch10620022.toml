[[dialogue]]
speaker = "unk"
# 第２話,キミの横顔を見ながら,P
line = "第２話,キミの横顔を見ながら,P"

[[dialogue]]
speaker = "unk"
# とある休日、ジュエリーが俺の家に遊びに来ていた。
line = "とある休日、ジュエリーが俺の家に遊びに来ていた。"

[[dialogue]]
speaker = "unk"
# 隣り合ってソファーに座り、家庭用ゲーム機のステージ攻略型アクションゲームを交互にプレイしていたのだが――
line = "隣り合ってソファーに座り、家庭用ゲーム機のステージ攻略型アクションゲームを交互にプレイしていたのだが――"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふむふむ……このステージはおそらく……こうすればギミックが解除できて……よし、次は――」
line = "「ふむふむ……このステージはおそらく……こうすればギミックが解除できて……よし、次は――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「っと、おや？　どうしたんだい、助手？　私の顔をじっと見たりして」
line = "「っと、おや？　どうしたんだい、助手？　私の顔をじっと見たりして」"

[[dialogue]]
speaker = "unk"
# 日傘を持ったまま器用だなと思って
line = "日傘を持ったまま器用だなと思って"

[[dialogue]]
speaker = "unk"
# ジュエリーは日傘を持ったままの手で、ゲームのコントローラーも同時に持ってプレイしていた。
line = "ジュエリーは日傘を持ったままの手で、ゲームのコントローラーも同時に持ってプレイしていた。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「なるほど、そういうことか」
line = "「なるほど、そういうことか」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふふっ、常に日傘を差しているからね、これはもはや体の一部のようなものなんだ」
line = "「ふふっ、常に日傘を差しているからね、これはもはや体の一部のようなものなんだ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「逆に日傘を差してないと、プレイ感覚がおかしくなるくらいだよ」
line = "「逆に日傘を差してないと、プレイ感覚がおかしくなるくらいだよ」"

[[dialogue]]
speaker = "unk"
# その衣装も最近はよく着てるよね
line = "その衣装も最近はよく着てるよね"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ああ、この『エクリプスフォーム』は、助手との『愛の証』だからね」
line = "「ああ、この『エクリプスフォーム』は、助手との『愛の証』だからね」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「通常の戦闘服よりも星力の消耗は激しいが、それも慣れれば星力総量が上昇して、変身の持続時間が伸びて行くことがわかっている」
line = "「通常の戦闘服よりも星力の消耗は激しいが、それも慣れれば星力総量が上昇して、変身の持続時間が伸びて行くことがわかっている」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「なればこそ、時間があれば着ていた方が一石二鳥というものだろう？　それに――」
line = "「なればこそ、時間があれば着ていた方が一石二鳥というものだろう？　それに――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「キミも可愛いと言ってくれるしね。ふふっ<emoji=heart04>」
line = "「キミも可愛いと言ってくれるしね。ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから交代して、今度は俺がゲームをプレイしていたのだが――
line = "それから交代して、今度は俺がゲームをプレイしていたのだが――"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# 今度は彼女が俺の横顔を見つめていることに気づく。
line = "今度は彼女が俺の横顔を見つめていることに気づく。"

[[dialogue]]
speaker = "unk"
# なんだろうと思いつつ、ゲームオーバーにならないようにプレイしていると……
line = "なんだろうと思いつつ、ゲームオーバーにならないようにプレイしていると……"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 頬っぺたにキスされて、ドキッとした。
line = "頬っぺたにキスされて、ドキッとした。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――あっ、しまった。ゲームオーバーになってしまったか」
line = "「――あっ、しまった。ゲームオーバーになってしまったか」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「すまない……キミの横顔を見ていたら、つい。その……愛おしい気持ちが湧いてきてしまってね……<emoji=heart04>」
line = "「すまない……キミの横顔を見ていたら、つい。その……愛おしい気持ちが湧いてきてしまってね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ゲーム……交代する？
line = "ゲーム……交代する？"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「いや、今の失敗は私のせいだろう。キミがそのまま続けてくれ」
line = "「いや、今の失敗は私のせいだろう。キミがそのまま続けてくれ」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――といっても、すぐにゲームという気分でもなくなってしまったか……」
line = "「――といっても、すぐにゲームという気分でもなくなってしまったか……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふふっ<emoji=heart04>　恋人になってから、２人でいるとなかなかゲームに集中できなくなってしまったね」
line = "「ふふっ<emoji=heart04>　恋人になってから、２人でいるとなかなかゲームに集中できなくなってしまったね」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「うん？　――ゲーム中はキス禁止にするかって？」
line = "「うん？　――ゲーム中はキス禁止にするかって？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「そんな風に言われると……むしろ、したくなってきてしまうよ<emoji=heart04>」
line = "「そんな風に言われると……むしろ、したくなってきてしまうよ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「助手……<emoji=heart04>」
line = "「助手……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ん……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 今度は唇にキスをされる。
line = "今度は唇にキスをされる。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「んむっ……<emoji=heart04>　ちゅっ……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「んむっ……<emoji=heart04>　ちゅっ……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「んっ……<emoji=heart04>　はあぁ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふぅ……<emoji=heart04>　キスとはやはり、不思議だ……<emoji=heart04>」
line = "「ふぅ……<emoji=heart04>　キスとはやはり、不思議だ……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「唇を触れ合わせているだけでも、胸から一気に愛おしさが溢れてくる……<emoji=heart04>」
line = "「唇を触れ合わせているだけでも、胸から一気に愛おしさが溢れてくる……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 初めてキスした時も、こんな感じだったよね
line = "初めてキスした時も、こんな感じだったよね"

[[dialogue]]
speaker = "unk"
# その時は、ジュエリーの部屋だった。
line = "その時は、ジュエリーの部屋だった。"

[[dialogue]]
speaker = "unk"
# 今日みたいに２人でゲームをしていたら、彼女の方から唇を寄せてきて、キスをされたのだった。
line = "今日みたいに２人でゲームをしていたら、彼女の方から唇を寄せてきて、キスをされたのだった。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「それは、助手のことが――」
line = "「それは、助手のことが――」"

[[dialogue]]
speaker = "unk"
# 彼女は顔を赤くして、１度呼吸をしてから……
line = "彼女は顔を赤くして、１度呼吸をしてから……"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「その……キミのことが好き過ぎるから、２人きりになると、抑えが効かなくなってしまうんだ……<emoji=heart04>」
line = "「その……キミのことが好き過ぎるから、２人きりになると、抑えが効かなくなってしまうんだ……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「というか、今気づいたのだけれど……」
line = "「というか、今気づいたのだけれど……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「キミの方からキスを迫られたことがないね……？」
line = "「キミの方からキスを迫られたことがないね……？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「もしかして、私ばっかり、その……発情していて、迷惑をかけているだろうか……？　だとしたら……」
line = "「もしかして、私ばっかり、その……発情していて、迷惑をかけているだろうか……？　だとしたら……」"

[[dialogue]]
speaker = "unk"
# 俺は慌てて首を横に振って否定した。
line = "俺は慌てて首を横に振って否定した。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――甘えてくる私の姿が可愛いから、何度も見たくなって、つい受け身に回ってしまっている……？」
line = "「――甘えてくる私の姿が可愛いから、何度も見たくなって、つい受け身に回ってしまっている……？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「そうだったのか……ふふふっ<emoji=heart04>　そういえば、この間も私の素の反応が見たくてと言っていたね」
line = "「そうだったのか……ふふふっ<emoji=heart04>　そういえば、この間も私の素の反応が見たくてと言っていたね」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「我ながら、付き合い始めても相変わらず、恋愛感情の機微には疎いな……」
line = "「我ながら、付き合い始めても相変わらず、恋愛感情の機微には疎いな……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「なら、せっかく気持ちがわかったのだし……もっと甘えてもいいかい？　助手――」
line = "「なら、せっかく気持ちがわかったのだし……もっと甘えてもいいかい？　助手――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「このまま……ハグ……してもいいだろうか……？」
line = "「このまま……ハグ……してもいいだろうか……？」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「――じゃあ、失礼して……。ん……<emoji=heart04>」
line = "「――じゃあ、失礼して……。ん……<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ふぅ……<emoji=heart04>　キミの温もりと……心臓の鼓動が伝わってくる……<emoji=heart04>」
line = "「ふぅ……<emoji=heart04>　キミの温もりと……心臓の鼓動が伝わってくる……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の方からも彼女の小さな体を抱き寄せて、耳元で告げる。
line = "俺の方からも彼女の小さな体を抱き寄せて、耳元で告げる。"

[[dialogue]]
speaker = "unk"
# 愛しているよ、ジュエリー
line = "愛しているよ、ジュエリー"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ん……<emoji=heart04>　私も――」
line = "「ん……<emoji=heart04>　私も――」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「キミを……愛している。助手<emoji=heart04>」
line = "「キミを……愛している。助手<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからしばらく抱き合ったままでいると――
line = "それからしばらく抱き合ったままでいると――"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「助手……」
line = "「助手……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「すまない。抱き合っている内に、また……」
line = "「すまない。抱き合っている内に、また……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「キスがしたくなってきてしまった……<emoji=heart04>　いいだろうか……？」
line = "「キスがしたくなってきてしまった……<emoji=heart04>　いいだろうか……？」"

[[dialogue]]
speaker = "unk"
# 俺が頷くと、彼女は顔を赤くしながらも嬉しそうに笑ってくれた。
line = "俺が頷くと、彼女は顔を赤くしながらも嬉しそうに笑ってくれた。"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「じゃあ……」
line = "「じゃあ……」"

[[dialogue]]
speaker = "ジュエリー（究明）"
# 「ん……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「ん……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも俺たちは、甘いキスを繰り返し堪能するのだった――
line = "それからも俺たちは、甘いキスを繰り返し堪能するのだった――"
