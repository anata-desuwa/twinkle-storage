[[dialogue]]
speaker = "unk"
# 守護天使の２人から俺宛に、力を借りたいと要請があった。
line = "守護天使の２人から俺宛に、力を借りたいと要請があった。"

[[dialogue]]
speaker = "unk"
# 守護天使といえば世界を運営する力を持ち、女神にも近い高位の存在。
line = "守護天使といえば世界を運営する力を持ち、女神にも近い高位の存在。"

[[dialogue]]
speaker = "unk"
# もしかすると世界の危機かもしれない……！
line = "もしかすると世界の危機かもしれない……！"

[[dialogue]]
speaker = "コハルコ"
# 「あれ、会長さんがどうしてここに？」
line = "「あれ、会長さんがどうしてここに？」"

[[dialogue]]
speaker = "マグダレナ"
# 「私たちが会長さまをお呼びしたのです」
line = "「私たちが会長さまをお呼びしたのです」"

[[dialogue]]
speaker = "アルモタヘル"
# 「我々の呼びかけに応えてくれたようだな。感謝するぞ、人の子よ」
line = "「我々の呼びかけに応えてくれたようだな。感謝するぞ、人の子よ」"

[[dialogue]]
speaker = "unk"
# コハルコさんは何してたところですか？
line = "コハルコさんは何してたところですか？"

[[dialogue]]
speaker = "コハルコ"
# 「ここの設備を使って守護天使さんの義体のデータ取り──つまり健康診断、かな」
line = "「ここの設備を使って守護天使さんの義体のデータ取り──つまり健康診断、かな」"

[[dialogue]]
speaker = "コハルコ"
# 「アニマさんが作った義体は高性能ではあるけど、運用においてはまだまだ未知数な部分が多いから」
line = "「アニマさんが作った義体は高性能ではあるけど、運用においてはまだまだ未知数な部分が多いから」"

[[dialogue]]
speaker = "コハルコ"
# 「運動機能や認知機能、その他生命維持に必要な各種機能に異常がないかチェックしてたんだけど、今のところ２人とも異常なし。健康そのものだね」
line = "「運動機能や認知機能、その他生命維持に必要な各種機能に異常がないかチェックしてたんだけど、今のところ２人とも異常なし。健康そのものだね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ。あれだけ栄養を摂取しているのだから当然だ」
line = "「うむ。あれだけ栄養を摂取しているのだから当然だ」"

[[dialogue]]
speaker = "コハルコ"
# 「アルモタヘルさんは食べすぎかと思ったけど、義体の消化能力と代謝のおかげだね……」
line = "「アルモタヘルさんは食べすぎかと思ったけど、義体の消化能力と代謝のおかげだね……」"

[[dialogue]]
speaker = "マグダレナ"
# 「これは何の機械でしょうか……？　ピカピカと光っておりますね」
line = "「これは何の機械でしょうか……？　ピカピカと光っておりますね」"

[[dialogue]]
speaker = "コハルコ"
# 「あ～っ、マグダレナさん、それは触っちゃダメ～！」
line = "「あ～っ、マグダレナさん、それは触っちゃダメ～！」"

[[dialogue]]
speaker = "コハルコ"
# 「ごめん、お待たせ。えーと、マグダレナさん、会長さんを呼んだ理由を教えてもらえますか？」
line = "「ごめん、お待たせ。えーと、マグダレナさん、会長さんを呼んだ理由を教えてもらえますか？」"

[[dialogue]]
speaker = "マグダレナ"
# 「はい。会長さまにお願いしたいのは他でもありません」
line = "「はい。会長さまにお願いしたいのは他でもありません」"

[[dialogue]]
speaker = "マグダレナ"
# 「私とアルモタヘルがアルバイトできるように手伝っていただきたいのです！」
line = "「私とアルモタヘルがアルバイトできるように手伝っていただきたいのです！」"

[[dialogue]]
speaker = "unk"
# はいぃぃっ！？
line = "はいぃぃっ！？"

[[dialogue]]
speaker = "コハルコ"
# 「守護天使さんが……アルバイト？」
line = "「守護天使さんが……アルバイト？」"

[[dialogue]]
speaker = "マグダレナ"
# 「アニマさまの義体で受肉して以来、我々は教皇庁から生活費をいただいて暮らしています」
line = "「アニマさまの義体で受肉して以来、我々は教皇庁から生活費をいただいて暮らしています」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかしモンスターやアステラが発生している時はまだいい……いえよくないのですが。戦っていない時の我々は暇を持て余すばかりなのです」
line = "「しかしモンスターやアステラが発生している時はまだいい……いえよくないのですが。戦っていない時の我々は暇を持て余すばかりなのです」"

[[dialogue]]
speaker = "マグダレナ"
# 「例えば……アルモタヘル、あなたは昨日何をしていましたか？」
line = "「例えば……アルモタヘル、あなたは昨日何をしていましたか？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「午前は流星市国初出店のカフェでコーヒーを嗜み、昼食は香り高い十割そばを賞味し、間食にケバブ、夕食にラーメンを食し、夜食にアイスを食って寝た」
line = "「午前は流星市国初出店のカフェでコーヒーを嗜み、昼食は香り高い十割そばを賞味し、間食にケバブ、夕食にラーメンを食し、夜食にアイスを食って寝た」"

[[dialogue]]
speaker = "コハルコ"
# （本当に食べてばっかりだ！？）
line = "（本当に食べてばっかりだ！？）"

[[dialogue]]
speaker = "マグダレナ"
# 「ちなみに私は鉄壁の刑務所から脱獄するドラマを一気見しておりました。ドキドキハラハラする大変面白い作品でした」
line = "「ちなみに私は鉄壁の刑務所から脱獄するドラマを一気見しておりました。ドキドキハラハラする大変面白い作品でした」"

[[dialogue]]
speaker = "コハルコ"
# （気持ちはわかるけど！　そんな生活ちょっとうらやましい！）
line = "（気持ちはわかるけど！　そんな生活ちょっとうらやましい！）"

[[dialogue]]
speaker = "アルモタヘル"
# 「守護天使ともあろう者が、人に世話になってばかりではな。少しくらいは自分で使う金を自らの労働で稼ぎたいのだ」
line = "「守護天使ともあろう者が、人に世話になってばかりではな。少しくらいは自分で使う金を自らの労働で稼ぎたいのだ」"

[[dialogue]]
speaker = "マグダレナ"
# 「ですから、幾多のアルバイトをこなしてきたという会長さまのお力を貸していただきたいのです」
line = "「ですから、幾多のアルバイトをこなしてきたという会長さまのお力を貸していただきたいのです」"

[[dialogue]]
speaker = "コハルコ"
# 「なるほど、それなら確かに会長さんが適任かもね。仕事なら私もいろいろしてるけど……」
line = "「なるほど、それなら確かに会長さんが適任かもね。仕事なら私もいろいろしてるけど……」"

[[dialogue]]
speaker = "マグダレナ"
# 「コハルコさまのお仕事といえば……」
line = "「コハルコさまのお仕事といえば……」"

[[dialogue]]
speaker = "コハルコ"
# 「学園のシステム・セキュリティ関連にデータの分析、あと放送委員としてのオペレーター活動ですね」
line = "「学園のシステム・セキュリティ関連にデータの分析、あと放送委員としてのオペレーター活動ですね」"

[[dialogue]]
speaker = "アルモタヘル"
# 「どれも我々には無理だな。手伝おうとすれば余計に迷惑がかかるだろう」
line = "「どれも我々には無理だな。手伝おうとすれば余計に迷惑がかかるだろう」"

[[dialogue]]
speaker = "マグダレナ"
# 「コハルコさまは本当に多才で、新星学園に貢献されているお方。私などは頭が下がります」
line = "「コハルコさまは本当に多才で、新星学園に貢献されているお方。私などは頭が下がります」"

[[dialogue]]
speaker = "コハルコ"
# 「守護天使さんに言われると恐縮です……」
line = "「守護天使さんに言われると恐縮です……」"

[[dialogue]]
speaker = "コハルコ"
# 「誰に電話かけてるの？　あ、バイトなら環さんかな」
line = "「誰に電話かけてるの？　あ、バイトなら環さんかな」"

[[dialogue]]
speaker = "環"
# 『どしたの会長？　遊びのお誘いとか？　それならバイトの予定次第だけど──』
line = "『どしたの会長？　遊びのお誘いとか？　それならバイトの予定次第だけど──』"

[[dialogue]]
speaker = "環"
# 『守護天使がバイトしたいって言ってる？　え～、そんなの勝手にやらせときなよー』
line = "『守護天使がバイトしたいって言ってる？　え～、そんなの勝手にやらせときなよー』"

[[dialogue]]
speaker = "環"
# 『コホン。ほら、守護天使さまってめちゃくちゃエライ存在だから。畏れ多いし粗相があるといけないし、悪いけど他をあたってよ。ごめんねー』
line = "『コホン。ほら、守護天使さまってめちゃくちゃエライ存在だから。畏れ多いし粗相があるといけないし、悪いけど他をあたってよ。ごめんねー』"

[[dialogue]]
speaker = "コハルコ"
# 「どうだった？　……って、その顔はダメだったみたいだね」
line = "「どうだった？　……って、その顔はダメだったみたいだね」"

[[dialogue]]
speaker = "コハルコ"
# 「あ、そうだ！　もうすぐ秋葉原でイベントがあるから、それを手伝ってもらおうかな」
line = "「あ、そうだ！　もうすぐ秋葉原でイベントがあるから、それを手伝ってもらおうかな」"

[[dialogue]]
speaker = "unk"
# イベント？
line = "イベント？"

[[dialogue]]
speaker = "コハルコ"
# 「うん。私の実家は秋葉原にあるんだけど、最近モンスターの動きが活発で、秋葉原全体で客足が少なくなっててね」
line = "「うん。私の実家は秋葉原にあるんだけど、最近モンスターの動きが活発で、秋葉原全体で客足が少なくなっててね」"

[[dialogue]]
speaker = "コハルコ"
# 「今一度秋葉原に興味を持ってもらおう、ってことでイベントを催すことになったの」
line = "「今一度秋葉原に興味を持ってもらおう、ってことでイベントを催すことになったの」"

[[dialogue]]
speaker = "コハルコ"
# 「アニメ、ゲーム、漫画、アイドル……電器やメイドまで、秋葉原らしいものを集めたイベントなんだ」
line = "「アニメ、ゲーム、漫画、アイドル……電器やメイドまで、秋葉原らしいものを集めたイベントなんだ」"

[[dialogue]]
speaker = "コハルコ"
# 「題してアキバフェスタ。店先で特設ショップを開いたり、アニメとのコラボメニューが出たり、アイドルの新曲リリースイベントもあるんだよ」
line = "「題してアキバフェスタ。店先で特設ショップを開いたり、アニメとのコラボメニューが出たり、アイドルの新曲リリースイベントもあるんだよ」"

[[dialogue]]
speaker = "コハルコ"
# 「私はいろいろ手伝わないといけないことがあるから、会長さんが守護天使さんをサポートしてくれる？」
line = "「私はいろいろ手伝わないといけないことがあるから、会長さんが守護天使さんをサポートしてくれる？」"

[[dialogue]]
speaker = "unk"
# わかりました！
line = "わかりました！"

[[dialogue]]
speaker = "アルモタヘル"
# 「助かるぞ、２人とも。我ら守護天使、秋葉原の助けになれるよう力を尽くそう」
line = "「助かるぞ、２人とも。我ら守護天使、秋葉原の助けになれるよう力を尽くそう」"

[[dialogue]]
speaker = "コハルコ"
# 「そんな大げさな……」
line = "「そんな大げさな……」"

[[dialogue]]
speaker = "マグダレナ"
# 「私とアルモタヘルは生まれて以来ずっと守護天使しかしていなかったため、他で働いた経験がありません」
line = "「私とアルモタヘルは生まれて以来ずっと守護天使しかしていなかったため、他で働いた経験がありません」"

[[dialogue]]
speaker = "コハルコ"
# 「守護天使しかしてないって、守護天使は職業なの……？」
line = "「守護天使しかしてないって、守護天使は職業なの……？」"

[[dialogue]]
speaker = "マグダレナ"
# 「ご迷惑をおかけすると思いますが、何卒よろしくお願い致します」
line = "「ご迷惑をおかけすると思いますが、何卒よろしくお願い致します」"
