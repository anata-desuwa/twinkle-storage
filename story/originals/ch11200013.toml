[[dialogue]]
speaker = "unk"
# 第３話,あなたの人生,P
line = "第３話,あなたの人生,P"

[[dialogue]]
speaker = "シノ"
# 「会長さんもお買い物ですか？」
line = "「会長さんもお買い物ですか？」"

[[dialogue]]
speaker = "unk"
# 購買に顔を出すとばったりシノさんと遭遇した。
line = "購買に顔を出すとばったりシノさんと遭遇した。"

[[dialogue]]
speaker = "シノ"
# 「ふふ。完全栄養食、在庫を全部買い占めてしまいました」
line = "「ふふ。完全栄養食、在庫を全部買い占めてしまいました」"

[[dialogue]]
speaker = "シノ"
# 「これを買っている人は私だけのようなので、いっそ全部持っていってくださいと言われたので……」
line = "「これを買っている人は私だけのようなので、いっそ全部持っていってくださいと言われたので……」"

[[dialogue]]
speaker = "シノ"
# 「それより、ここで会長さんに会ったのも何かの縁です。少し付き合ってもらえませんか？」
line = "「それより、ここで会長さんに会ったのも何かの縁です。少し付き合ってもらえませんか？」"

[[dialogue]]
speaker = "シノ"
# 「ん……？　どうしたんですか、私の顔をそんなに見つめて」
line = "「ん……？　どうしたんですか、私の顔をそんなに見つめて」"

[[dialogue]]
speaker = "unk"
# 凄腕の実業家なんですよね
line = "凄腕の実業家なんですよね"

[[dialogue]]
speaker = "unk"
# シノさんって……
line = "シノさんって……"

[[dialogue]]
speaker = "シノ"
# 「ふふ、購買で大人買いしてるところを見てしまったらとてもそうは思えない、でしょうか？」
line = "「ふふ、購買で大人買いしてるところを見てしまったらとてもそうは思えない、でしょうか？」"

[[dialogue]]
speaker = "シノ"
# 「自分では凄腕、なんて思ってないんですけど……歳の割には色々な経験をさせてもらっていると思いますよ」
line = "「自分では凄腕、なんて思ってないんですけど……歳の割には色々な経験をさせてもらっていると思いますよ」"

[[dialogue]]
speaker = "シノ"
# 「以前もお話ししましたが、最初は父の会社でした。急逝した父に代わって、ただの学生だった私が経営を引き継ぐことになって……」
line = "「以前もお話ししましたが、最初は父の会社でした。急逝した父に代わって、ただの学生だった私が経営を引き継ぐことになって……」"

[[dialogue]]
speaker = "シノ"
# 「大勢の人に助けてもらいながら、なんとか倒産を免れることが出来ました」
line = "「大勢の人に助けてもらいながら、なんとか倒産を免れることが出来ました」"

[[dialogue]]
speaker = "unk"
# 大変だったんですね……
line = "大変だったんですね……"

[[dialogue]]
speaker = "シノ"
# 「ええ……でも、私は運が良かったんだと思います。出会いに恵まれ、その人たちから沢山の大切な言葉を貰いましたから」
line = "「ええ……でも、私は運が良かったんだと思います。出会いに恵まれ、その人たちから沢山の大切な言葉を貰いましたから」"

[[dialogue]]
speaker = "シノ"
# 「そんな大切なものの数々が、今も私の中に、夢への懸け橋として息づいています」
line = "「そんな大切なものの数々が、今も私の中に、夢への懸け橋として息づいています」"

[[dialogue]]
speaker = "シノ"
# 「目指していること、やりたいこと、自分の生き方、人生をどう作り上げていくのか……」
line = "「目指していること、やりたいこと、自分の生き方、人生をどう作り上げていくのか……」"

[[dialogue]]
speaker = "シノ"
# 「今ではなく、これからもっと先、自分がどこに向かいたいのか──」
line = "「今ではなく、これからもっと先、自分がどこに向かいたいのか──」"

[[dialogue]]
speaker = "シノ"
# 「それらと向き合うことの大切さを、これまでの経験から学ばせてもらいました」
line = "「それらと向き合うことの大切さを、これまでの経験から学ばせてもらいました」"

[[dialogue]]
speaker = "unk"
# その経験を活かして学園長に？
line = "その経験を活かして学園長に？"

[[dialogue]]
speaker = "シノ"
# 「……ヘレナさんから新星学園の学園長にという話をいただいたとき、私はとても驚きました」
line = "「……ヘレナさんから新星学園の学園長にという話をいただいたとき、私はとても驚きました」"

[[dialogue]]
speaker = "シノ"
# 「経験もまだまだ足りない、前学園長のような名声も力も持ち合わせていない、皆を導くような強いカリスマ性も指導力もあるわけでもない」
line = "「経験もまだまだ足りない、前学園長のような名声も力も持ち合わせていない、皆を導くような強いカリスマ性も指導力もあるわけでもない」"

[[dialogue]]
speaker = "シノ"
# 「ヘレナさんはなぜ、こんな私を学園長に推薦したのか──」
line = "「ヘレナさんはなぜ、こんな私を学園長に推薦したのか──」"

[[dialogue]]
speaker = "シノ"
# 「それは……もしかしたら私が大切にしている、この夢と向き合う姿勢を評価して下さったのかもしれません」
line = "「それは……もしかしたら私が大切にしている、この夢と向き合う姿勢を評価して下さったのかもしれません」"

[[dialogue]]
speaker = "シノ"
# 「そしてそれが、新星学園の学園長として必要なものだとお考えなのかも……」
line = "「そしてそれが、新星学園の学園長として必要なものだとお考えなのかも……」"

[[dialogue]]
speaker = "シノ"
# 「だから私は、リクリエという脅威にさらされ続ける星騎士のみなさんが、今を精一杯生きるだけでなく、未来に夢を抱けるように──そう思っています」
line = "「だから私は、リクリエという脅威にさらされ続ける星騎士のみなさんが、今を精一杯生きるだけでなく、未来に夢を抱けるように──そう思っています」"

[[dialogue]]
speaker = "シノ"
# 「それが新星学園の学園長として私がどうしても成し遂げたい『夢』です」
line = "「それが新星学園の学園長として私がどうしても成し遂げたい『夢』です」"

[[dialogue]]
speaker = "unk"
# ありがとうございます
line = "ありがとうございます"

[[dialogue]]
speaker = "unk"
# 俺たちのことをそんな風に……
line = "俺たちのことをそんな風に……"

[[dialogue]]
speaker = "シノ"
# 「いえいえ！　これは私が勝手に思っていることですから！　むしろお節介過ぎるかな、とも……」
line = "「いえいえ！　これは私が勝手に思っていることですから！　むしろお節介過ぎるかな、とも……」"

[[dialogue]]
speaker = "シノ"
# 「けれど、私が命がけで戦う星騎士に出来る、１番の手助けだと思っています」
line = "「けれど、私が命がけで戦う星騎士に出来る、１番の手助けだと思っています」"

[[dialogue]]
speaker = "シノ"
# 「追い詰められ、窮地に立たされた時、支えになってくれるのはきっとそういうものなんです」
line = "「追い詰められ、窮地に立たされた時、支えになってくれるのはきっとそういうものなんです」"

[[dialogue]]
speaker = "シノ"
# 「以前に会長さんからは理想を伺いましたね？」
line = "「以前に会長さんからは理想を伺いましたね？」"

[[dialogue]]
speaker = "シノ"
# 「その時会長さんは──世界を守りたい。たとえ手の届かないところに居る人でも、精一杯手を伸ばして──と答えてくださいました」
line = "「その時会長さんは──世界を守りたい。たとえ手の届かないところに居る人でも、精一杯手を伸ばして──と答えてくださいました」"

[[dialogue]]
speaker = "シノ"
# 「その決意と覚悟、素晴らしいものだと思います」
line = "「その決意と覚悟、素晴らしいものだと思います」"

[[dialogue]]
speaker = "シノ"
# 「ではその先は？　その先に何がしたい、という夢はお持ちですか？」
line = "「ではその先は？　その先に何がしたい、という夢はお持ちですか？」"

[[dialogue]]
speaker = "シノ"
# 「将来こうなりたいな、とか、こんな人間になりたいな、とかそんなあやふやなものでも構いません。そんな夢を会長さんは持っていますか？」
line = "「将来こうなりたいな、とか、こんな人間になりたいな、とかそんなあやふやなものでも構いません。そんな夢を会長さんは持っていますか？」"

[[dialogue]]
speaker = "unk"
# 具体的には、特に……
line = "具体的には、特に……"

[[dialogue]]
speaker = "シノ"
# 「会長さんは背負うものが沢山あって精一杯ですから、特に難しいのかもしれませんね……」
line = "「会長さんは背負うものが沢山あって精一杯ですから、特に難しいのかもしれませんね……」"

[[dialogue]]
speaker = "シノ"
# 「でも、守るべきものの大きさに圧し潰されて、自分の夢を抱くことを忘れてしまう、そんな人生を送って欲しくないんです」
line = "「でも、守るべきものの大きさに圧し潰されて、自分の夢を抱くことを忘れてしまう、そんな人生を送って欲しくないんです」"

[[dialogue]]
speaker = "シノ"
# 「もしかしたらこれは、あなたに余計な重荷を背負わせてしまうことなのかもしれません……」
line = "「もしかしたらこれは、あなたに余計な重荷を背負わせてしまうことなのかもしれません……」"

[[dialogue]]
speaker = "シノ"
# 「今が精一杯だと、そんなことを考えている余裕すらなくなってしまいますから」
line = "「今が精一杯だと、そんなことを考えている余裕すらなくなってしまいますから」"

[[dialogue]]
speaker = "シノ"
# 「会長さんの抱えるものの大きさとは比べられないかもしれませんが、私も同じような状態になってしまったことがあります」
line = "「会長さんの抱えるものの大きさとは比べられないかもしれませんが、私も同じような状態になってしまったことがあります」"

[[dialogue]]
speaker = "シノ"
# 「その頃の私は、父の会社を守るために必死でした。それこそ夢を抱いている余裕すらないほどに」
line = "「その頃の私は、父の会社を守るために必死でした。それこそ夢を抱いている余裕すらないほどに」"

[[dialogue]]
speaker = "シノ"
# 「何度も重圧に潰されそうになりました。けれど、そんな私を心配した方々が揃って声をかけてくれたんです」
line = "「何度も重圧に潰されそうになりました。けれど、そんな私を心配した方々が揃って声をかけてくれたんです」"

[[dialogue]]
speaker = "シノ"
# 「自分の人生を生きなさい、と」
line = "「自分の人生を生きなさい、と」"

[[dialogue]]
speaker = "シノ"
# 「その言葉をかけてくださったのは、私が必死で守ろうとしていた従業員の皆さんでした」
line = "「その言葉をかけてくださったのは、私が必死で守ろうとしていた従業員の皆さんでした」"

[[dialogue]]
speaker = "シノ"
# 「私はなぜ、私が守ろうとしている人たちからこんなにも心配されてしまっているんだろう。とても不思議な気持ちになりました」
line = "「私はなぜ、私が守ろうとしている人たちからこんなにも心配されてしまっているんだろう。とても不思議な気持ちになりました」"

[[dialogue]]
speaker = "シノ"
# 「そして私は、自分のことを顧みて……今にも折れてしまいそうな弱々しい小枝のような心を見つけました」
line = "「そして私は、自分のことを顧みて……今にも折れてしまいそうな弱々しい小枝のような心を見つけました」"

[[dialogue]]
speaker = "シノ"
# 「それからです。どんなに苦しくても、余裕がない時でも、自分の夢とは何か……それと常に向き合うようになったのは」
line = "「それからです。どんなに苦しくても、余裕がない時でも、自分の夢とは何か……それと常に向き合うようになったのは」"

[[dialogue]]
speaker = "unk"
# そうすることで強くなれたんですね？
line = "そうすることで強くなれたんですね？"

[[dialogue]]
speaker = "シノ"
# 「はい。気が付けば、抱えていた重荷を、重荷と感じなくなっていました」
line = "「はい。気が付けば、抱えていた重荷を、重荷と感じなくなっていました」"

[[dialogue]]
speaker = "シノ"
# 「それだけ心が、強く育ってくれたのだと思っています」
line = "「それだけ心が、強く育ってくれたのだと思っています」"

[[dialogue]]
speaker = "シノ"
# 「だからみなさんにも──会長さん、あなたにも自身を支えてくれる強い夢を抱いて欲しいと思っているんです」
line = "「だからみなさんにも──会長さん、あなたにも自身を支えてくれる強い夢を抱いて欲しいと思っているんです」"

[[dialogue]]
speaker = "シノ"
# 「あなたが守り切った先にある、あなただけの未来を……描いた未来は、きっとあなたを支えてくれるはずですから」
line = "「あなたが守り切った先にある、あなただけの未来を……描いた未来は、きっとあなたを支えてくれるはずですから」"

[[dialogue]]
speaker = "シノ"
# 「すみません、いきなりこんな事を語られても困ってしまいますよね」
line = "「すみません、いきなりこんな事を語られても困ってしまいますよね」"

[[dialogue]]
speaker = "シノ"
# 「でも、私の想いは会長さんに伝えておきたくて……話を聞いてくださってありがとうございました」
line = "「でも、私の想いは会長さんに伝えておきたくて……話を聞いてくださってありがとうございました」"

[[dialogue]]
speaker = "unk"
# すごく貴重なお話でした
line = "すごく貴重なお話でした"

[[dialogue]]
speaker = "unk"
# とんでもないです
line = "とんでもないです"

[[dialogue]]
speaker = "シノ"
# 「な、何だか恥ずかしくなってきてしまいました……やはりお節介が過ぎますね」
line = "「な、何だか恥ずかしくなってきてしまいました……やはりお節介が過ぎますね」"

[[dialogue]]
speaker = "シノ"
# 「こういった話になるとつい熱が入ってしまうのは悪い癖です……」
line = "「こういった話になるとつい熱が入ってしまうのは悪い癖です……」"

[[dialogue]]
speaker = "unk"
# それは、それだけシノさんが学園のみんなのことを真剣に考えてくれているからだろう。
line = "それは、それだけシノさんが学園のみんなのことを真剣に考えてくれているからだろう。"

[[dialogue]]
speaker = "unk"
# 照れ臭そうに頬をかく姿を見つめながら、理事長の人選が間違いのないものだったことを感じるのだった。
line = "照れ臭そうに頬をかく姿を見つめながら、理事長の人選が間違いのないものだったことを感じるのだった。"
