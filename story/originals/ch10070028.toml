line = "「体操服とか、水着とか、ちょっとエッチな下着とか……色々な格好で誘惑しちゃいますよぅ♪」"

[[dialogue]]
speaker = "ルリエル"
# 「それでも会長さんが喜ばなかったら、コスプレは趣味じゃないって認めてあげます♪」
line = "「それでも会長さんが喜ばなかったら、コスプレは趣味じゃないって認めてあげます♪」"

[[dialogue]]
speaker = "クロト"
# 「……もしもコスプレが趣味だって結論になったら、どうなるんだ？」
line = "「……もしもコスプレが趣味だって結論になったら、どうなるんだ？」"

[[dialogue]]
speaker = "ルリエル"
