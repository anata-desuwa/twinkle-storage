[[dialogue]]
speaker = "unk"
# ヘレナちゃんとデートに出かけていた、ある日のこと。
line = "ヘレナちゃんとデートに出かけていた、ある日のこと。"

[[dialogue]]
speaker = "unk"
# 帰り際に彼女から提案を受けた。
line = "帰り際に彼女から提案を受けた。"

[[dialogue]]
speaker = "ヘレナ"
# 「魔王よ。このあと――」
line = "「魔王よ。このあと――」"

[[dialogue]]
speaker = "ヘレナ"
# 「私の家へ泊まりにこないか？」
line = "「私の家へ泊まりにこないか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「なに、こうして夜遅くなってしまったであろう？　それに明日は祝日だ」
line = "「なに、こうして夜遅くなってしまったであろう？　それに明日は祝日だ」"

[[dialogue]]
speaker = "ヘレナ"
# 「――ふふっ、確かに、別に帰ろうと思えば帰れるであろう……しかし、そこは魔王よ、あれだ」
line = "「――ふふっ、確かに、別に帰ろうと思えば帰れるであろう……しかし、そこは魔王よ、あれだ」"

[[dialogue]]
speaker = "ヘレナ"
# 「私のワガママ、といえば察してくれるか？」
line = "「私のワガママ、といえば察してくれるか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ちなみに、そのことは事前に、リノにも伝えてあるのだ。だから、気兼ねなくデートの続きをすることができる」
line = "「ちなみに、そのことは事前に、リノにも伝えてあるのだ。だから、気兼ねなくデートの続きをすることができる」"

[[dialogue]]
speaker = "ヘレナ"
# 「――続きとはなにか？　ふふっ、それは……」
line = "「――続きとはなにか？　ふふっ、それは……」"

[[dialogue]]
speaker = "unk"
# お香の甘い匂いを漂わせて、彼女は耳元でそっと囁く。
line = "お香の甘い匂いを漂わせて、彼女は耳元でそっと囁く。"

[[dialogue]]
speaker = "ヘレナ"
# 「<ruby=よとぎ>夜伽</ruby><emoji=heart04>　……といえば、伝わるか？」
line = "「<ruby>夜伽<rt>よとぎ</rt></ruby><emoji=heart04>　……といえば、伝わるか？」"

[[dialogue]]
speaker = "ヘレナ"
# 「……どうだ？　私と、してみないか？」
line = "「……どうだ？　私と、してみないか？」"

[[dialogue]]
speaker = "unk"
# そうして、俺は九浄家に行き、ヘレナちゃんの寝室へ招かれることとなった――
line = "そうして、俺は九浄家に行き、ヘレナちゃんの寝室へ招かれることとなった――"

[[dialogue]]
