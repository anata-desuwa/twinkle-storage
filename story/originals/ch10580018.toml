[[dialogue]]
speaker = "ヘレナ"
# 「んっ……<emoji=heart04>　まったく、なんでもしてやると言ったが、はぁぁ<emoji=heart04>　まさか、そんなお願いとは……。はあぁぁっ<emoji=heart04>」
