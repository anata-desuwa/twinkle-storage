[[dialogue]]
speaker = "unk"
# ――それはサーシャが、会長とシズハと共に、ロストアイテム探しを進めていた時のことだった。
line = "――それはサーシャが、会長とシズハと共に、ロストアイテム探しを進めていた時のことだった。"

[[dialogue]]
speaker = "サーシャ"
# （……！　まただわ……）
line = "（……！　まただわ……）"

[[dialogue]]
speaker = "サーシャ"
# （一体いつから――これで何度目なのかも記憶が曖昧だけれど……）
line = "（一体いつから――これで何度目なのかも記憶が曖昧だけれど……）"

[[dialogue]]
speaker = "unk"
# サーシャは少し前から、拭えない既視感が繰り返されていると感じていた。
line = "サーシャは少し前から、拭えない既視感が繰り返されていると感じていた。"

[[dialogue]]
speaker = "サーシャ"
# （直前のことが何事もなかったかのように、修正されている気がする。突然、自分がそれまで何をしていたのか、ド忘れしてしまうかのような……）
line = "（直前のことが何事もなかったかのように、修正されている気がする。突然、自分がそれまで何をしていたのか、ド忘れしてしまうかのような……）"

[[dialogue]]
speaker = "サーシャ"
# （これって……もしかして私たち、すでにロストアイテムの能力に巻き込まれてる……？）
line = "（これって……もしかして私たち、すでにロストアイテムの能力に巻き込まれてる……？）"

[[dialogue]]
speaker = "unk"
# そのことに気づけたのは、手の中に握っていた小さなメモの切れ端のおかげだ。中に書かれているのはサーシャ自身の字で――
line = "そのことに気づけたのは、手の中に握っていた小さなメモの切れ端のおかげだ。中に書かれているのはサーシャ自身の字で――"

[[dialogue]]
speaker = "サーシャ"
# （『もしかして強制力が働いているかも？』『一体、何に対して？』『おそらく何かの会話をしていた時』）
line = "（『もしかして強制力が働いているかも？』『一体、何に対して？』『おそらく何かの会話をしていた時』）"

[[dialogue]]
speaker = "unk"
# 今のサーシャに、これを書いた記憶はない。
line = "今のサーシャに、これを書いた記憶はない。"

[[dialogue]]
speaker = "unk"
# しかし、強制力が働く前に、自分自身が書き残していたようだ。それを手に握っておくことで、記憶を忘却しても違和感に気づくことができた。
line = "しかし、強制力が働く前に、自分自身が書き残していたようだ。それを手に握っておくことで、記憶を忘却しても違和感に気づくことができた。"

[[dialogue]]
speaker = "サーシャ"
# （『会長くんとの会話では何かが起こる様子はない』『だとしたら原因は――』）
line = "（『会長くんとの会話では何かが起こる様子はない』『だとしたら原因は――』）"

[[dialogue]]
speaker = "サーシャ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# サーシャさん？ 急に立ち止まって、どうしました？
line = "サーシャさん？\n急に立ち止まって、どうしました？"

[[dialogue]]
speaker = "サーシャ"
# 「……ねぇ、シズハ。聞きたいことがあるの」
line = "「……ねぇ、シズハ。聞きたいことがあるの」"

[[dialogue]]
speaker = "シズハ"
# 「ん？　何？　お姉ちゃん」
line = "「ん？　何？　お姉ちゃん」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハは……ロストアイテムで病気が治って、学園へ通えるようになったって言ってたわよね？」
line = "「シズハは……ロストアイテムで病気が治って、学園へ通えるようになったって言ってたわよね？」"

[[dialogue]]
speaker = "シズハ"
# 「？　うん。その力を借りて、星騎士としても戦えるようになったんだよ」
line = "「？　うん。その力を借りて、星騎士としても戦えるようになったんだよ」"

[[dialogue]]
speaker = "シズハ"
# 「といっても、星力とは異なる力だから、ディーちゃんのアドバイスで、周囲には星力だと<b>思わせてる</b>んだけどね。てへへ」
line = "「といっても、星力とは異なる力だから、ディーちゃんのアドバイスで、周囲には星力だと<b>思わせてる</b>んだけどね。てへへ」"

[[dialogue]]
speaker = "サーシャ"
# 「それで、教えて欲しいのだけれど――」
line = "「それで、教えて欲しいのだけれど――」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハのロストアイテムって……一体、何だったかしら？」
line = "「シズハのロストアイテムって……一体、何だったかしら？」"

[[dialogue]]
speaker = "シズハ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# 『だとしたら原因はシズハ？』『シズハのロストアイテムが思い出せない』
line = "『だとしたら原因はシズハ？』『シズハのロストアイテムが思い出せない』"

[[dialogue]]
speaker = "unk"
# メモの先には、そう書かれていた。
line = "メモの先には、そう書かれていた。"

[[dialogue]]
speaker = "unk"
# サーシャは実の姉であるはずなのに、シズハの病気が治るきっかけとなったロストアイテムが何なのか、思い出すことができなかった。
line = "サーシャは実の姉であるはずなのに、シズハの病気が治るきっかけとなったロストアイテムが何なのか、思い出すことができなかった。"

[[dialogue]]
speaker = "シズハ"
# 「あれ……？　前に話さなかったっけ？」
line = "「あれ……？　前に話さなかったっけ？」"

[[dialogue]]
speaker = "サーシャ"
# 「ううん。話してもらったと思うんだけど、お姉ちゃん、ド忘れしちゃったみたい」
line = "「ううん。話してもらったと思うんだけど、お姉ちゃん、ド忘れしちゃったみたい」"

[[dialogue]]
speaker = "シズハ"
# 「えっとね、私は――」
line = "「えっとね、私は――」"

[[dialogue]]
speaker = "シズハ"
# 「『願望』のロストアイテム、『願いの聖杯』と融合したことで、病気が治って、その力が使えるようになったんだよ」
line = "「『願望』のロストアイテム、『願いの聖杯』と融合したことで、病気が治って、その力が使えるようになったんだよ」"

[[dialogue]]
speaker = "サーシャ"
# 「願いの……」
line = "「願いの……」"

[[dialogue]]
speaker = "サーシャ"
# （ああ、そうだわ……）
line = "（ああ、そうだわ……）"

[[dialogue]]
speaker = "unk"
# サーシャがシズハと出会ったのは、今から１ヶ月程前のこと。
line = "サーシャがシズハと出会ったのは、今から１ヶ月程前のこと。"

[[dialogue]]
speaker = "unk"
# クロトが知らぬ間に、サーシャが単独で別のロストアイテムの事件に巻き込まれたことがきっかけだった。
line = "クロトが知らぬ間に、サーシャが単独で別のロストアイテムの事件に巻き込まれたことがきっかけだった。"

[[dialogue]]
speaker = "unk"
# そこで、魔法少女として活動し始めていたシズハと遭遇。サチやプリムラも合流し、ロストアイテムの回収に協力して、仲良くなったのだった――
line = "そこで、魔法少女として活動し始めていたシズハと遭遇。サチやプリムラも合流し、ロストアイテムの回収に協力して、仲良くなったのだった――"

[[dialogue]]
speaker = "unk"
# それから少し経って、シズハが流星学園附属校に転入。サーシャはシズハとよく会うようになっていたのだが――
line = "それから少し経って、シズハが流星学園附属校に転入。サーシャはシズハとよく会うようになっていたのだが――"

[[dialogue]]
speaker = "シズハ"
# 「えへへ～♪　それでねそれでね――お姉ちゃん」
line = "「えへへ～♪　それでねそれでね――お姉ちゃん」"

[[dialogue]]
speaker = "サーシャ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "シズハ"
# 「あっ……！　ご、ごめんなさい、サーシャさん！　つい……」
line = "「あっ……！　ご、ごめんなさい、サーシャさん！　つい……」"

[[dialogue]]
speaker = "シズハ"
# 「……えっとね、私、サーシャさんといると、お姉ちゃんのことを思い出しちゃって……」
line = "「……えっとね、私、サーシャさんといると、お姉ちゃんのことを思い出しちゃって……」"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃん、お姉さんがいたの？」
line = "「シズハちゃん、お姉さんがいたの？」"

[[dialogue]]
speaker = "シズハ"
# 「うん。実はそうなんだ。ただ――」
line = "「うん。実はそうなんだ。ただ――」"

[[dialogue]]
speaker = "シズハ"
# 「お姉ちゃんは、５年前に亡くなっちゃってて……」
line = "「お姉ちゃんは、５年前に亡くなっちゃってて……」"

[[dialogue]]
speaker = "サーシャ"
# 「え……」
line = "「え……」"

[[dialogue]]
speaker = "シズハ"
# 「当時、お姉ちゃんはちょうど今のサーシャさんと同じくらいの年で。学校が終わると、よく私のお見舞いに病院へ来てくれていたの」
line = "「当時、お姉ちゃんはちょうど今のサーシャさんと同じくらいの年で。学校が終わると、よく私のお見舞いに病院へ来てくれていたの」"

[[dialogue]]
speaker = "シズハ"
# 「それはもう、毎日のように。受験勉強で忙しくても、私に会いに来てくれて、話をしてくれた」
line = "「それはもう、毎日のように。受験勉強で忙しくても、私に会いに来てくれて、話をしてくれた」"

[[dialogue]]
speaker = "シズハ"
# 「でも……そんなある日、お姉ちゃんが突然、私の入院してる病院へ、救急車で運ばれてきた……」
line = "「でも……そんなある日、お姉ちゃんが突然、私の入院してる病院へ、救急車で運ばれてきた……」"

[[dialogue]]
speaker = "シズハ"
# 「病院へ来る途中、交通事故に巻き込まれたんだって……後から聞いた。それで、お姉ちゃんは助からずにそのまま……」
line = "「病院へ来る途中、交通事故に巻き込まれたんだって……後から聞いた。それで、お姉ちゃんは助からずにそのまま……」"

[[dialogue]]
speaker = "サーシャ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シズハ"
# 「……ごめんなさい、サーシャさん。楽しいお話じゃないから、あんまり言うつもりはなかったんだけど……」
line = "「……ごめんなさい、サーシャさん。楽しいお話じゃないから、あんまり言うつもりはなかったんだけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「……ううん、いいの。ありがとう、シズハちゃん。話してくれて」
line = "「……ううん、いいの。ありがとう、シズハちゃん。話してくれて」"

[[dialogue]]
speaker = "シズハ"
# 「うん。これからは私、気をつけるから……」
line = "「うん。これからは私、気をつけるから……」"

[[dialogue]]
speaker = "サーシャ"
# 「……ねぇ、シズハちゃん」
line = "「……ねぇ、シズハちゃん」"

[[dialogue]]
speaker = "サーシャ"
# 「よかったらだけど……そのまま、私のことを『お姉ちゃん』って呼んでくれてもいいのよ？」
line = "「よかったらだけど……そのまま、私のことを『お姉ちゃん』って呼んでくれてもいいのよ？」"

[[dialogue]]
speaker = "シズハ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "サーシャ"
# 「ほら、私、いつも自分のこと『お姉ちゃん』って言ってるしね。だから別に、そう呼ばれても構わないわ」
line = "「ほら、私、いつも自分のこと『お姉ちゃん』って言ってるしね。だから別に、そう呼ばれても構わないわ」"

[[dialogue]]
speaker = "シズハ"
# 「……いいの？」
line = "「……いいの？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ♪　シズハちゃんさえよければ」
line = "「ええ♪　シズハちゃんさえよければ」"

[[dialogue]]
speaker = "シズハ"
# 「じゃあ……サーシャお姉ちゃん」
line = "「じゃあ……サーシャお姉ちゃん」"

[[dialogue]]
speaker = "サーシャ"
# 「は～い♪」
line = "「は～い♪」"

[[dialogue]]
speaker = "シズハ"
# 「え、えへへ……♪」
line = "「え、えへへ……♪」"

[[dialogue]]
speaker = "サーシャ"
# （……思い出した）
line = "（……思い出した）"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん。私たち、おそらくロストアイテムの能力で認識が歪められているわ」
line = "「会長くん。私たち、おそらくロストアイテムの能力で認識が歪められているわ」"

[[dialogue]]
speaker = "サーシャ"
# 「それでシズハちゃん。あなたは――」
line = "「それでシズハちゃん。あなたは――」"

[[dialogue]]
speaker = "サーシャ"
# 「私の本当の妹じゃない。……あなたと私は、１ヶ月前に出会ったばかりよ」
line = "「私の本当の妹じゃない。……あなたと私は、１ヶ月前に出会ったばかりよ」"

[[dialogue]]
speaker = "unk"
# 俺もそこで、忘れていた違和感を、はっと思い出す。
line = "俺もそこで、忘れていた違和感を、はっと思い出す。"

[[dialogue]]
speaker = "unk"
# （シズハはやっぱり、魔族じゃなくて人間だ）
line = "（シズハはやっぱり、魔族じゃなくて人間だ）"

[[dialogue]]
speaker = "シズハ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "シズハ"
# 「……か、仮に、認識が歪んでいたとして、それってそんなに困ること？」
line = "「……か、仮に、認識が歪んでいたとして、それってそんなに困ること？」"

[[dialogue]]
speaker = "サーシャ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "シズハ"
# 「私は、サーシャさんが本当にお姉ちゃんだったら、嬉しいよ？　サーシャさんは、私が妹だったら嫌？」
line = "「私は、サーシャさんが本当にお姉ちゃんだったら、嬉しいよ？　サーシャさんは、私が妹だったら嫌？」"

[[dialogue]]
speaker = "サーシャ"
# 「それは……でも」
line = "「それは……でも」"

[[dialogue]]
speaker = "サーシャ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# サーシャさんはそこで、押し黙ってしまった。
line = "サーシャさんはそこで、押し黙ってしまった。"

[[dialogue]]
speaker = "シズハ"
# 「とりあえず、聖杯ちゃんの影響がそれだけなら、大丈夫だよ。そんなことよりも、解放のロストアイテムを探さなくっちゃ！」
line = "「とりあえず、聖杯ちゃんの影響がそれだけなら、大丈夫だよ。そんなことよりも、解放のロストアイテムを探さなくっちゃ！」"

[[dialogue]]
speaker = "シズハ"
# 「ほら行こっ、会長、お姉ちゃん！　行け行けゴーゴー♪」
line = "「ほら行こっ、会長、お姉ちゃん！　行け行けゴーゴー♪」"

[[dialogue]]
speaker = "unk"
# シズハは明るく笑ってみせると、ズンズンと前を進んで行ってしまう。
line = "シズハは明るく笑ってみせると、ズンズンと前を進んで行ってしまう。"

[[dialogue]]
speaker = "unk"
# サーシャさんはその背中を見つめたまま、シズハに声をかけることができず立ち尽くしていた。
line = "サーシャさんはその背中を見つめたまま、シズハに声をかけることができず立ち尽くしていた。"

[[dialogue]]
speaker = "unk"
# サーシャさん、この現象って……
line = "サーシャさん、この現象って……"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、そうね。一体いつ始まったのか、ハッキリとした時期はわからないけれど……」
line = "「ええ、そうね。一体いつ始まったのか、ハッキリとした時期はわからないけれど……」"

[[dialogue]]
speaker = "サーシャ"
# 「これは多分、プリムラちゃんに起こった現象と同じ──」
line = "「これは多分、プリムラちゃんに起こった現象と同じ──」"

[[dialogue]]
speaker = "サーシャ"
# 「要するに、『解放』のロストアイテムによって、シズハちゃんの持つ『願望』のロストアイテムの能力が、解放させられちゃったんじゃないかしら」
line = "「要するに、『解放』のロストアイテムによって、シズハちゃんの持つ『願望』のロストアイテムの能力が、解放させられちゃったんじゃないかしら」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、それはシズハちゃんの責任じゃないわ。……思い出したの。原因を作ったのは、きっと私」
line = "「でも、それはシズハちゃんの責任じゃないわ。……思い出したの。原因を作ったのは、きっと私」"

[[dialogue]]
speaker = "サーシャ"
# 「……私はまた、間違ったことをしてしまったのかもしれない」
line = "「……私はまた、間違ったことをしてしまったのかもしれない」"

[[dialogue]]
speaker = "unk"
# サーシャさん……？
line = "サーシャさん……？"

[[dialogue]]
speaker = "サーシャ"
# 「……ねぇ、会長くん。お願いしたいことがあるの」
line = "「……ねぇ、会長くん。お願いしたいことがあるの」"

[[dialogue]]
speaker = "unk"
# 俺に向き直ったサーシャさんは――お正月の時に見たような、本気で弱った顔をしていて。
line = "俺に向き直ったサーシャさんは――お正月の時に見たような、本気で弱った顔をしていて。"

[[dialogue]]
speaker = "サーシャ"
# 「シズハちゃんを、どうか助けてあげて」
line = "「シズハちゃんを、どうか助けてあげて」"

[[dialogue]]
speaker = "unk"
# そう言って、深く頭を下げるのだった――
line = "そう言って、深く頭を下げるのだった――"

[[dialogue]]
speaker = "unk"
# 一方その頃、サチとプリムラは――
line = "一方その頃、サチとプリムラは――"

[[dialogue]]
speaker = "サチ"
# 「そんな……まさか！？」
line = "「そんな……まさか！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「くそっ……力の制御がままならぬというのに……！　よりによって――」
line = "「くそっ……力の制御がままならぬというのに……！　よりによって――」"

[[dialogue]]
speaker = "メルクリウス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「またこやつと戦わねばならぬとは……！」
line = "「またこやつと戦わねばならぬとは……！」"

[[dialogue]]
speaker = "unk"
# プリムラの本来の姿――『終末兵器メルクリウス』の防御形態。
line = "プリムラの本来の姿――『終末兵器メルクリウス』の防御形態。"

[[dialogue]]
speaker = "unk"
# 深淵書庫の防衛システムによって複製されたそれが、魔法少女２人の前に再び、立ち塞がるのだった――
line = "深淵書庫の防衛システムによって複製されたそれが、魔法少女２人の前に再び、立ち塞がるのだった――"
