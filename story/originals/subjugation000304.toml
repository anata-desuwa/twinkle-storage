[[dialogue]]
speaker = "イクシリオン"
# 「図書委員の当番お疲れ様でした、モネさん」
line = "「図書委員の当番お疲れ様でした、モネさん」"

[[dialogue]]
speaker = "モネ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "モネ"
# 「あ、すみません、考え事をしていて」
line = "「あ、すみません、考え事をしていて」"

[[dialogue]]
speaker = "イクシリオン"
# 「図書館の利用者を増やす方法ですね」
line = "「図書館の利用者を増やす方法ですね」"

[[dialogue]]
speaker = "モネ"
# 「はい。でも何も浮かばなくて、読書していても半分くらいしかページが進みません……」
line = "「はい。でも何も浮かばなくて、読書していても半分くらいしかページが進みません……」"

[[dialogue]]
speaker = "イクシリオン"
# （それでもすごいスピードでページをめくっています……集中したらどのくらい読めるのでしょうか）
line = "（それでもすごいスピードでページをめくっています……集中したらどのくらい読めるのでしょうか）"

[[dialogue]]
speaker = "モネ"
# 「図書館としては、いろいろな取り組みをしているつもりなんです」
line = "「図書館としては、いろいろな取り組みをしているつもりなんです」"

[[dialogue]]
speaker = "モネ"
# 「流行しているドラマの原作を紹介したり、刀剣をテーマにした作品が話題になると、刀の歴史の本を取り上げたりとか」
line = "「流行しているドラマの原作を紹介したり、刀剣をテーマにした作品が話題になると、刀の歴史の本を取り上げたりとか」"

[[dialogue]]
speaker = "モネ"
# 「詩を募集して、生徒の詩集を作るという企画もありました。本の製法を学ぶワークショップも催しました」
line = "「詩を募集して、生徒の詩集を作るという企画もありました。本の製法を学ぶワークショップも催しました」"

[[dialogue]]
speaker = "モネ"
# 「本以外にも、講演会を開いたり、視聴覚室で映画を上映したり……」
line = "「本以外にも、講演会を開いたり、視聴覚室で映画を上映したり……」"

[[dialogue]]
speaker = "イクシリオン"
# 「なるほど。私は魅力的だと思うのですが……難しいですね」
line = "「なるほど。私は魅力的だと思うのですが……難しいですね」"

[[dialogue]]
speaker = "モネ"
# 「ところでイクシーさんが食べてるのは……」
line = "「ところでイクシーさんが食べてるのは……」"

[[dialogue]]
speaker = "イクシリオン"
# 「ふわふわパンケーキとプリン２つです」
line = "「ふわふわパンケーキとプリン２つです」"

[[dialogue]]
speaker = "モネ"
# 「お昼少なかったんですか？」
line = "「お昼少なかったんですか？」"

[[dialogue]]
speaker = "イクシリオン"
# 「いえ、しっかり食べました。ですが人間界の食べ物はどれもおいしくて……ふふ♪」
line = "「いえ、しっかり食べました。ですが人間界の食べ物はどれもおいしくて……ふふ♪」"

[[dialogue]]
speaker = "モネ"
# 「そ、そうですか……」
line = "「そ、そうですか……」"

[[dialogue]]
speaker = "イクシリオン"
# 「む」
line = "「む」"

[[dialogue]]
speaker = "モネ"
# 「どうしました？」
line = "「どうしました？」"

[[dialogue]]
speaker = "イクシリオン"
# 「プリンを２つ並べて、上にさくらんぼを乗せると、こう、何かに見えてくるような……柔らかくてプルプル揺れる何かに……」
line = "「プリンを２つ並べて、上にさくらんぼを乗せると、こう、何かに見えてくるような……柔らかくてプルプル揺れる何かに……」"

[[dialogue]]
speaker = "モネ"
# 「は、はぁ……」
line = "「は、はぁ……」"

[[dialogue]]
speaker = "モネ"
# （イクシーさんって時々よくわからない……）
line = "（イクシーさんって時々よくわからない……）"

[[dialogue]]
speaker = "サーシャ"
# 「あ、モネちゃん。お疲れさま～」
line = "「あ、モネちゃん。お疲れさま～」"

[[dialogue]]
speaker = "モネ"
# 「しゃしゃ、サーシャさん！？　お疲れ様です！」
line = "「しゃしゃ、サーシャさん！？　お疲れ様です！」"

[[dialogue]]
speaker = "アナ"
# 「と、イクシーさん」
line = "「と、イクシーさん」"

[[dialogue]]
speaker = "イクシリオン"
# 「こんにちは～」
line = "「こんにちは～」"

[[dialogue]]
speaker = "サーシャ"
# 「私たち星徒会のお仕事が終わったところなの～。ご一緒させてもらうわね～」
line = "「私たち星徒会のお仕事が終わったところなの～。ご一緒させてもらうわね～」"

[[dialogue]]
speaker = "アナ"
# 「お邪魔します」
line = "「お邪魔します」"

[[dialogue]]
speaker = "モネ"
# 「あ、ど、どうも……」
line = "「あ、ど、どうも……」"

[[dialogue]]
speaker = "モネ"
# （おふたりは星徒会だし、イクシーさんはプリマステラだし、肩身が狭い……）
line = "（おふたりは星徒会だし、イクシーさんはプリマステラだし、肩身が狭い……）"

[[dialogue]]
speaker = "サーシャ"
# 「２人は何のお話してたの～？」
line = "「２人は何のお話してたの～？」"

[[dialogue]]
speaker = "モネ"
# 「ええっと実は、図書館の利用者を増やしたいと思っていまして……よく図書館を利用されるサーシャさんとアナさんからも何かご意見ありませんか？」
line = "「ええっと実は、図書館の利用者を増やしたいと思っていまして……よく図書館を利用されるサーシャさんとアナさんからも何かご意見ありませんか？」"

[[dialogue]]
speaker = "モネ"
# 「こうした方がいいああした方がいいというのだけじゃなくて、不満でもいいので何か……何か……」
line = "「こうした方がいいああした方がいいというのだけじゃなくて、不満でもいいので何か……何か……」"

[[dialogue]]
speaker = "サーシャ"
# 「そう言われてもー」
line = "「そう言われてもー」"

[[dialogue]]
speaker = "アナ"
# 「特になし」
line = "「特になし」"

[[dialogue]]
speaker = "モネ"
# 「そんなぁっ！？」
line = "「そんなぁっ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「悪い意味じゃないのよ～。新星学園の図書館にはお世話になってるし、モネちゃんはじめ図書委員や司書さんにはよくしてもらってるわ～」
line = "「悪い意味じゃないのよ～。新星学園の図書館にはお世話になってるし、モネちゃんはじめ図書委員や司書さんにはよくしてもらってるわ～」"

[[dialogue]]
speaker = "アナ"
# 「はい。私も図書館に不満はありません。稀に求める資料がない場合もありますが、おそらくどの図書館でも扱っていないものでしょう」
line = "「はい。私も図書館に不満はありません。稀に求める資料がない場合もありますが、おそらくどの図書館でも扱っていないものでしょう」"

[[dialogue]]
speaker = "アナ"
# 「図書館の利用者を増加させたいのは理解できます。ただ注意点として、現在図書館を利用している生徒の満足度を損ねる施策は避けるべき」
line = "「図書館の利用者を増加させたいのは理解できます。ただ注意点として、現在図書館を利用している生徒の満足度を損ねる施策は避けるべき」"

[[dialogue]]
speaker = "サーシャ"
# 「それはそうね～。新しく人が来るようになっても、今来てる人が来なくなっても意味がないもの」
line = "「それはそうね～。新しく人が来るようになっても、今来てる人が来なくなっても意味がないもの」"

[[dialogue]]
speaker = "サーシャ"
# 「それに、図書館の利用者が少なくなっているのだとしても、それはモネちゃんや司書さんたちのせいじゃないわ～」
line = "「それに、図書館の利用者が少なくなっているのだとしても、それはモネちゃんや司書さんたちのせいじゃないわ～」"

[[dialogue]]
speaker = "アナ"
# 「特別な施策を行うのではなく、現在のサービスを維持、または向上させていくのも１つの手かと」
line = "「特別な施策を行うのではなく、現在のサービスを維持、または向上させていくのも１つの手かと」"

[[dialogue]]
speaker = "モネ"
# 「な、なるほど……」
line = "「な、なるほど……」"

[[dialogue]]
speaker = "モネ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "モネ"
# 「今図書館を利用している人が満足していれば、確かにそれでいいのかもしれません」
line = "「今図書館を利用している人が満足していれば、確かにそれでいいのかもしれません」"

[[dialogue]]
speaker = "モネ"
# 「でも私のエゴだとしても、もっと多くの人に図書館に来てもらいたいです」
line = "「でも私のエゴだとしても、もっと多くの人に図書館に来てもらいたいです」"

[[dialogue]]
speaker = "モネ"
# 「私はとても本の多い家で育ちました」
line = "「私はとても本の多い家で育ちました」"

[[dialogue]]
speaker = "モネ"
# 「いつも書斎でおじいちゃんと本を読んでいて……おじいちゃんが亡くなってからも、本たちはずっと一緒にいてくれました」
line = "「いつも書斎でおじいちゃんと本を読んでいて……おじいちゃんが亡くなってからも、本たちはずっと一緒にいてくれました」"

[[dialogue]]
speaker = "モネ"
# 「私にとって本は友達なんです。だから寂しがっている友達を見ていられなくて……もっともっと、みんなに本を手に取ってほしいんです！」
line = "「私にとって本は友達なんです。だから寂しがっている友達を見ていられなくて……もっともっと、みんなに本を手に取ってほしいんです！」"

[[dialogue]]
speaker = "モネ"
# 「──って、すみません！　せっかくご意見いただいたのに、私ったらつい……」
line = "「──って、すみません！　せっかくご意見いただいたのに、私ったらつい……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふふ～♪　モネちゃんは本をとても大事にしているのね～。いいと思うわ～」
line = "「ふふふ～♪　モネちゃんは本をとても大事にしているのね～。いいと思うわ～」"

[[dialogue]]
speaker = "アナ"
# 「しかしモネ先輩の理想を実現するには今までにない作戦が必要。それこそ逆転の発想と言えるような何かが」
line = "「しかしモネ先輩の理想を実現するには今までにない作戦が必要。それこそ逆転の発想と言えるような何かが」"

[[dialogue]]
speaker = "モネ"
# 「作戦……逆転の発想……」
line = "「作戦……逆転の発想……」"

[[dialogue]]
speaker = "サーシャ"
# 「ところでイクシーちゃんは何をしてるの～？」
line = "「ところでイクシーちゃんは何をしてるの～？」"

[[dialogue]]
speaker = "イクシリオン"
# 「ううむ……まだ小腹が空いているような……購買でおやつを買うのもいいですが、学園の外に出るのもアリですね」
line = "「ううむ……まだ小腹が空いているような……購買でおやつを買うのもいいですが、学園の外に出るのもアリですね」"

[[dialogue]]
speaker = "モネ"
# 「外に出る……外に……」
line = "「外に出る……外に……」"

[[dialogue]]
speaker = "モネ"
# 「！　ちょっと思いついたかもしれません！」
line = "「！　ちょっと思いついたかもしれません！」"
