[[dialogue]]
speaker = "unk"
# 第２話,突撃赤ずきん,P
line = "第２話,突撃赤ずきん,P"

[[dialogue]]
speaker = "unk"
# ある週末。その日は特に予定もなく、家で過ごしていたのだが――
line = "ある週末。その日は特に予定もなく、家で過ごしていたのだが――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「トリックオアトリート～♪　お菓子をくれないと、悪戯しちゃうぞ～？」
line = "「トリックオアトリート～♪　お菓子をくれないと、悪戯しちゃうぞ～？」"

[[dialogue]]
speaker = "unk"
# ハロウィンはもう終わったのでは！？
line = "ハロウィンはもう終わったのでは！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「何を言ってるのさ、会長。ハロウィンパーティーで衣装が戦闘服に変化したでしょ？　それはつまり、いつでもハロウィンの悪戯が楽しめるということ」
line = "「何を言ってるのさ、会長。ハロウィンパーティーで衣装が戦闘服に変化したでしょ？　それはつまり、いつでもハロウィンの悪戯が楽しめるということ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「となれば、使わない手はないよね？　にひひ♪」
line = "「となれば、使わない手はないよね？　にひひ♪」"

[[dialogue]]
speaker = "unk"
# 仕方ない、秘蔵の辛口せんべいを出すか……
line = "仕方ない、秘蔵の辛口せんべいを出すか……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おやおや？　今日は恋人としての悪戯は、しなくてもいいのかな～？」
line = "「おやおや？　今日は恋人としての悪戯は、しなくてもいいのかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――放っておいてもしてくるでしょ、って？　にひひ♪　さてさて、どうかな～？」
line = "「――放っておいてもしてくるでしょ、って？　にひひ♪　さてさて、どうかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それにしても、私の影響で、会長もすっかり辛い物好きになっちゃったよね～」
line = "「それにしても、私の影響で、会長もすっかり辛い物好きになっちゃったよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁ、一緒に辛い物食べて楽しめるのは、悪い気分じゃないけどね～。もぐもぐ……うん♪　この辛口せんべい、思ってたよりずっと辛くていいね♪」
line = "「まぁ、一緒に辛い物食べて楽しめるのは、悪い気分じゃないけどね～。もぐもぐ……うん♪　この辛口せんべい、思ってたよりずっと辛くていいね♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長の入れてくれた緑茶との相性もイイ感じ……って、どうしたの会長？　なんか聞きたそうな顔をしてるけど？」
line = "「会長の入れてくれた緑茶との相性もイイ感じ……って、どうしたの会長？　なんか聞きたそうな顔をしてるけど？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――どうして私が会長を踏んでるのかって？」
line = "「――どうして私が会長を踏んでるのかって？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　それはあれだよ～、そこに会長の踏みやすそうな背中があるから☆」
line = "「にひひ♪　それはあれだよ～、そこに会長の踏みやすそうな背中があるから☆」"

[[dialogue]]
speaker = "unk"
# 粘着罠で無理矢理うつ伏せにされたけど！？
line = "粘着罠で無理矢理うつ伏せにされたけど！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？　恋人同士なら、普通のコミュニケーションじゃない？」
line = "「え？　恋人同士なら、普通のコミュニケーションじゃない？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「こうやってじゃれ合って、家でゴロゴロしながら、一緒にテレビニュースを観たりとかさ～」
line = "「こうやってじゃれ合って、家でゴロゴロしながら、一緒にテレビニュースを観たりとかさ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ！　ほら、テレビ観て会長！　あの有名俳優が不倫だってさ！　きゃははっ♪　マジか～！　優しそうな顔して悪だね～♪」
line = "「あ！　ほら、テレビ観て会長！　あの有名俳優が不倫だってさ！　きゃははっ♪　マジか～！　優しそうな顔して悪だね～♪」"

[[dialogue]]
speaker = "unk"
# なにこのシュールな状況！？
line = "なにこのシュールな状況！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え～？　そんなこと言いつつ、会長も満更でもない癖に～。ほれほれ～♪」
line = "「え～？　そんなこと言いつつ、会長も満更でもない癖に～。ほれほれ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　私も踏み慣れてきたから、会長のやらしい声が出ちゃう場所とか、わかっちゃってるんだよ～？　この辺りとか～、えいっ<emoji=heart04>」
line = "「にひひ♪　私も踏み慣れてきたから、会長のやらしい声が出ちゃう場所とか、わかっちゃってるんだよ～？　この辺りとか～、えいっ<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははっ♪　感じちゃった～？　会長のへ・ん・た・い<emoji=heart04>」
line = "「きゃははっ♪　感じちゃった～？　会長のへ・ん・た・い<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんな感じで楽しそうなマインに踏み踏みされながら過ごしていて、ふと思ったことを聞いてみる。
line = "そんな感じで楽しそうなマインに踏み踏みされながら過ごしていて、ふと思ったことを聞いてみる。"

[[dialogue]]
speaker = "unk"
# マインって、意外と家で過ごすの好きだよね
line = "マインって、意外と家で過ごすの好きだよね"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～？　なんで？　――外でデートするよりも、家デートの頻度が多いから？」
line = "「ん～？　なんで？　――外でデートするよりも、家デートの頻度が多いから？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まあ、外だと人の目があるから、良い子を取り繕わないといけないしね～。やっぱり家の中にいた方が気が楽かな～」
line = "「まあ、外だと人の目があるから、良い子を取り繕わないといけないしね～。やっぱり家の中にいた方が気が楽かな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、会長が外でデートしたいっていうなら、話に乗るよ～？　今日この後、どっか出かける？」
line = "「でも、会長が外でデートしたいっていうなら、話に乗るよ～？　今日この後、どっか出かける？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――私が家デートで満足してるなら、別にいい？　会長ってば、優しいね～」
line = "「――私が家デートで満足してるなら、別にいい？　会長ってば、優しいね～」"

[[dialogue]]
speaker = "unk"
# 今日はストレス解消できた？
line = "今日はストレス解消できた？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　どうして？　――私が悪戯をしにきたって言ったから？　あ～、そうか……」
line = "「ん？　どうして？　――私が悪戯をしにきたって言ったから？　あ～、そうか……」"

[[dialogue]]
speaker = "ネーゼマイン"
# （そこまで深く考えてなかったけど、言われてみると、ストレス解消をしにきたわけじゃなかったかも……）
line = "（そこまで深く考えてなかったけど、言われてみると、ストレス解消をしにきたわけじゃなかったかも……）"

[[dialogue]]
speaker = "ネーゼマイン"
# （じゃあ、何しにきたのかって話になると……たまたま今日は暇だったし、なんとなく会長に会いにきただけっていうか……）
line = "（じゃあ、何しにきたのかって話になると……たまたま今日は暇だったし、なんとなく会長に会いにきただけっていうか……）"

[[dialogue]]
speaker = "ネーゼマイン"
# （いやでもそれって、冷静に考えるとなんだか――）
line = "（いやでもそれって、冷静に考えるとなんだか――）"

[[dialogue]]
speaker = "ネーゼマイン"
# （……うん、今日は悪戯をしにきたことにしよう）
line = "（……うん、今日は悪戯をしにきたことにしよう）"

[[dialogue]]
speaker = "ネーゼマイン"
# 「こちょこちょこちょ～♪」
line = "「こちょこちょこちょ～♪」"

[[dialogue]]
speaker = "unk"
# ちょっ！？　足で脇腹くすぐるのやめて！
line = "ちょっ！？　足で脇腹くすぐるのやめて！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なんか悔しいから、ダメで～す」
line = "「なんか悔しいから、ダメで～す」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「悪い反撃をしてくる彼氏には、お仕置きしないとね～」
line = "「悪い反撃をしてくる彼氏には、お仕置きしないとね～」"

[[dialogue]]
speaker = "unk"
# どういうこと！？　なんか悪いことした！？
line = "どういうこと！？　なんか悪いことした！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふ～んだ、教えてあげないよ～」
line = "「ふ～んだ、教えてあげないよ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「許して欲しかったら、会長の方から悪戯して欲しいって、正直に言ってくれないとね～♪」
line = "「許して欲しかったら、会長の方から悪戯して欲しいって、正直に言ってくれないとね～♪」"

[[dialogue]]
speaker = "unk"
# 結局、お仕置きの理由は教えてくれず、降参するまでくすぐられてしまうのだった。
line = "結局、お仕置きの理由は教えてくれず、降参するまでくすぐられてしまうのだった。"
