[[dialogue]]
speaker = "unk"
# 第３話,働く梨緒,P
line = "第３話,働く梨緒,P"

[[dialogue]]
speaker = "unk"
# とある休日。買い物のために秋葉原まで足を延ばすと……
line = "とある休日。買い物のために秋葉原まで足を延ばすと……"

[[dialogue]]
speaker = "マグダレナ"
# 「あ、会長さま、こんにちは。ティッシュどうぞ～」
line = "「あ、会長さま、こんにちは。ティッシュどうぞ～」"

[[dialogue]]
speaker = "unk"
# マグダレナさんがティッシュを配るのももう見慣れた光景だけど、１人意外な顔を見つけた。
line = "マグダレナさんがティッシュを配るのももう見慣れた光景だけど、１人意外な顔を見つけた。"

[[dialogue]]
speaker = "梨緒"
# 「ティ、ティッシュどうぞー……うぅ、誰も受け取ってくれない……」
line = "「ティ、ティッシュどうぞー……うぅ、誰も受け取ってくれない……」"

[[dialogue]]
speaker = "unk"
# 梨緒もティッシュ配り？
line = "梨緒もティッシュ配り？"

[[dialogue]]
speaker = "梨緒"
# 「ひ、緋宮会長！？　どうしてここに！？　いや、買い物に来ることくらいあるか……」
line = "「ひ、緋宮会長！？　どうしてここに！？　いや、買い物に来ることくらいあるか……」"

[[dialogue]]
speaker = "梨緒"
# 「私は今、星見家に居候しているんだが……ただで世話になるのも心苦しくてな。アルバイトをして少しでも生活費を入れることにしたんだ」
line = "「私は今、星見家に居候しているんだが……ただで世話になるのも心苦しくてな。アルバイトをして少しでも生活費を入れることにしたんだ」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふ、では私やアルモタヘルと同じですね」
line = "「ふふ、では私やアルモタヘルと同じですね」"

[[dialogue]]
speaker = "梨緒"
# 「そんな、マグダレナ様と同じなんて畏れ多いです。私なんて、何も守れない役立たずですから……」
line = "「そんな、マグダレナ様と同じなんて畏れ多いです。私なんて、何も守れない役立たずですから……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ご自分を大事になさってください、梨緒さま。それに働きたいという気持ちに、人も守護天使もありませんよ」
line = "「ご自分を大事になさってください、梨緒さま。それに働きたいという気持ちに、人も守護天使もありませんよ」"

[[dialogue]]
speaker = "マグダレナ"
# 「しかし梨緒さま。さっきからティッシュがあまり減っていないようですが……」
line = "「しかし梨緒さま。さっきからティッシュがあまり減っていないようですが……」"

[[dialogue]]
speaker = "梨緒"
# 「うっ……申し訳ありません。何分アルバイトは初めてなものでして……」
line = "「うっ……申し訳ありません。何分アルバイトは初めてなものでして……」"

[[dialogue]]
speaker = "マグダレナ"
# 「いえ、責めているのではありません。私も最初は不甲斐なかったですから」
line = "「いえ、責めているのではありません。私も最初は不甲斐なかったですから」"

[[dialogue]]
speaker = "マグダレナ"
# 「ティッシュ配りが苦手なら、アルバイト経験豊富な会長さまにご指導いただいてはどうかと思いまして」
line = "「ティッシュ配りが苦手なら、アルバイト経験豊富な会長さまにご指導いただいてはどうかと思いまして」"

[[dialogue]]
speaker = "梨緒"
# 「緋宮会長がアルバイトを……？　そうなのか？」
line = "「緋宮会長がアルバイトを……？　そうなのか？」"

[[dialogue]]
speaker = "unk"
# ああ、そういうことなら力になるよ
line = "ああ、そういうことなら力になるよ"

[[dialogue]]
speaker = "梨緒"
# 「すまない……。ティッシュ配りはどうすればうまくできるんだ？　私が配っていても、なかなか手に取ってもらえなくて……」
line = "「すまない……。ティッシュ配りはどうすればうまくできるんだ？　私が配っていても、なかなか手に取ってもらえなくて……」"

[[dialogue]]
speaker = "梨緒"
# 「ふむふむ……ティッシュは相手の手の高さに出す……人の流れを読んで、導線を塞がないように脇に立つ……」
line = "「ふむふむ……ティッシュは相手の手の高さに出す……人の流れを読んで、導線を塞がないように脇に立つ……」"

[[dialogue]]
speaker = "梨緒"
# 「声掛けはシンプルに……そして笑顔で明るく、だな。ありがとう、参考になった」
line = "「声掛けはシンプルに……そして笑顔で明るく、だな。ありがとう、参考になった」"

[[dialogue]]
speaker = "マグダレナ"
# 「では会長さまを相手に、さっそく実践してみてはいかがでしょうか」
line = "「では会長さまを相手に、さっそく実践してみてはいかがでしょうか」"

[[dialogue]]
speaker = "梨緒"
# 「緋宮会長にするのか……？　いや、ここは恥じてなどいられない。いくぞ」
line = "「緋宮会長にするのか……？　いや、ここは恥じてなどいられない。いくぞ」"

[[dialogue]]
speaker = "梨緒"
# 「ティッシュどうぞ♪」
line = "「ティッシュどうぞ♪」"

[[dialogue]]
speaker = "unk"
# そうそう、いい感じ
line = "そうそう、いい感じ"

[[dialogue]]
speaker = "梨緒"
# 「うぅ～～っ。通りすがりの人ならともかく、見知った相手に見られるのは……言葉にしがたい気持ちになるな……」
line = "「うぅ～～っ。通りすがりの人ならともかく、見知った相手に見られるのは……言葉にしがたい気持ちになるな……」"

[[dialogue]]
speaker = "マグダレナ"
# 「ふふふ、よい笑顔でしたよ、梨緒さま」
line = "「ふふふ、よい笑顔でしたよ、梨緒さま」"

[[dialogue]]
speaker = "梨緒"
# 「う……マグダレナ様まで……」
line = "「う……マグダレナ様まで……」"

[[dialogue]]
speaker = "梨緒"
# 「だがティッシュ配りの要領は学んだ。では──」
line = "「だがティッシュ配りの要領は学んだ。では──」"

[[dialogue]]
speaker = "unk"
# ティッシュ配りで勝負だ！
line = "ティッシュ配りで勝負だ！"

[[dialogue]]
speaker = "梨緒"
# 「先に言われた！？」
line = "「先に言われた！？」"

[[dialogue]]
speaker = "梨緒"
# 「だが君もその気なら話が早い。どちらが多くのティッシュを配れるか勝負だ！」
line = "「だが君もその気なら話が早い。どちらが多くのティッシュを配れるか勝負だ！」"

[[dialogue]]
speaker = "梨緒"
# 「くっ……負けた……」
line = "「くっ……負けた……」"

[[dialogue]]
speaker = "マグダレナ"
# 「さすが会長さま。熟練の腕でダンボール一箱分のティッシュを配り終えてしまいました」
line = "「さすが会長さま。熟練の腕でダンボール一箱分のティッシュを配り終えてしまいました」"

[[dialogue]]
speaker = "マグダレナ"
# 「ですがティッシュ配り勝負のおかげで、あんなにたくさんあったティッシュがこの通り、すっかり少なくなりましたね」
line = "「ですがティッシュ配り勝負のおかげで、あんなにたくさんあったティッシュがこの通り、すっかり少なくなりましたね」"

[[dialogue]]
speaker = "梨緒"
# 「！　そ、そうだ、勝負に負けて戦いに勝つというやつだ。私の作戦勝ちだな」
line = "「！　そ、そうだ、勝負に負けて戦いに勝つというやつだ。私の作戦勝ちだな」"

[[dialogue]]
speaker = "unk"
# （違う気がするけど、梨緒が満足ならいいか）
line = "（違う気がするけど、梨緒が満足ならいいか）"

[[dialogue]]
speaker = "梨緒"
# 「な、なんだその顔は！　微笑ましそうに見るな！」
line = "「な、なんだその顔は！　微笑ましそうに見るな！」"

[[dialogue]]
speaker = "梨緒"
# 「確かに今回は私の負けだが、ティッシュ配りはもう覚えた！　次は負けないからな！」
line = "「確かに今回は私の負けだが、ティッシュ配りはもう覚えた！　次は負けないからな！」"

[[dialogue]]
speaker = "フィオナ"
# 「こんにちは。梨緒さんがバイトをしていると聞いて、見に来たのですが……」
line = "「こんにちは。梨緒さんがバイトをしていると聞いて、見に来たのですが……」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、エリ──フィオナか。私なら大丈夫だ。今日はたくさんティッシュを配ったぞ」
line = "「ああ、エリ──フィオナか。私なら大丈夫だ。今日はたくさんティッシュを配ったぞ」"

[[dialogue]]
speaker = "unk"
# 梨緒は本当に頑張ってたよ
line = "梨緒は本当に頑張ってたよ"

[[dialogue]]
speaker = "フィオナ"
# 「なら安心しました。緋宮会長にもお世話になったようで、ありがとうございます」
line = "「なら安心しました。緋宮会長にもお世話になったようで、ありがとうございます」"

[[dialogue]]
speaker = "フィオナ"
# 「梨緒さん、緋宮会長とすっかり仲良くなったみたいですね」
line = "「梨緒さん、緋宮会長とすっかり仲良くなったみたいですね」"

[[dialogue]]
speaker = "梨緒"
# 「べ、別に仲良くなってなどいないっ。確かに緋宮会長には助けられたが、選挙管理委員会として適切な距離は保っている」
line = "「べ、別に仲良くなってなどいないっ。確かに緋宮会長には助けられたが、選挙管理委員会として適切な距離は保っている」"

[[dialogue]]
speaker = "梨緒"
# 「だろう、緋宮会長？　だよな……？」
line = "「だろう、緋宮会長？　だよな……？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふっ♪」
line = "「ふふっ♪」"

[[dialogue]]
speaker = "マグダレナ"
# 「うふふふ♪」
line = "「うふふふ♪」"

[[dialogue]]
speaker = "梨緒"
# 「なんだその笑顔は！？　笑うな～～っ！」
line = "「なんだその笑顔は！？　笑うな～～っ！」"

[[dialogue]]
speaker = "unk"
# 梨緒が顔を赤くしてムキになればなるほど、フィオナとマグダレナさんは微笑ましそうに笑うのだった。
line = "梨緒が顔を赤くしてムキになればなるほど、フィオナとマグダレナさんは微笑ましそうに笑うのだった。"
