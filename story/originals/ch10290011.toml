[[dialogue]]
speaker = "unk"
# 第１話,私のペットになりませんか？,P
line = "第１話,私のペットになりませんか？,P"

[[dialogue]]
speaker = "unk"
# シャルレーヌ・ディアーブルという少女は、魔界の貴族で、しかも魔王の血筋であるらしい。
line = "シャルレーヌ・ディアーブルという少女は、魔界の貴族で、しかも魔王の血筋であるらしい。"

[[dialogue]]
speaker = "unk"
# 魔王と呼ばれる者として、機会があれば色々と語り合いたい──そう思っていたのだが。
line = "魔王と呼ばれる者として、機会があれば色々と語り合いたい──そう思っていたのだが。"

[[dialogue]]
speaker = "unk"
# 今……なんて？
line = "今……なんて？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「もぉ、会長さんってば。しっかり聞いてくれないと困ってしまいます♪」
line = "「もぉ、会長さんってば。しっかり聞いてくれないと困ってしまいます♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私と会長さんって～、魔王と関わりが深いっていう共通点があるじゃないですか？」
line = "「私と会長さんって～、魔王と関わりが深いっていう共通点があるじゃないですか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「機会があれば色々とおしゃべりしたいな～って思っていたんです。積もる話もあると思いますので、今夜、私の部屋に来ませんか？」
line = "「機会があれば色々とおしゃべりしたいな～って思っていたんです。積もる話もあると思いますので、今夜、私の部屋に来ませんか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「他に誰もいないので、二人きりでゆ～っくりお話ができますよ<emoji=heart04>」
line = "「他に誰もいないので、二人きりでゆ～っくりお話ができますよ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# な、何かあったらどうするんだ……！
line = "な、何かあったらどうするんだ……！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「え～っ？　会長さぁん、『何か』ってー……いったい何のことですかぁ？」
line = "「え～っ？　会長さぁん、『何か』ってー……いったい何のことですかぁ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「魔王の話はみだりにするものじゃないから、落ち着ける場所で話したいって言っただけなのに」
line = "「魔王の話はみだりにするものじゃないから、落ち着ける場所で話したいって言っただけなのに」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふ♪　もしかして～……シャルレーヌみたいなちっちゃな女の子のこと、意識しちゃってたりするんですか？」
line = "「くふ♪　もしかして～……シャルレーヌみたいなちっちゃな女の子のこと、意識しちゃってたりするんですか？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……う～ん、そんなわけない！　って顔してるけど～……ほんとかなぁ？」
line = "「……う～ん、そんなわけない！　って顔してるけど～……ほんとかなぁ？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「スカートの裾ぉ……ぴらっ♪」
line = "「スカートの裾ぉ……ぴらっ♪」"

[[dialogue]]
speaker = "unk"
# ！？！？！？
line = "！？！？！？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふっ♪　くふふふふっ♪　真っ赤になってる～♪」
line = "「くふっ♪　くふふふふっ♪　真っ赤になってる～♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんのスケベ♪　へーんたい♪」
line = "「会長さんのスケベ♪　へーんたい♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そっか、そっかぁ。だから、お泊まりを断ったんだぁ。こわ～い♪」
line = "「そっか、そっかぁ。だから、お泊まりを断ったんだぁ。こわ～い♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「今さら言い訳しても遅いですよ♪　ちょっとスカートの裾を持ち上げただけで、すっごい反応しちゃったのは事実なんですから♪」
line = "「今さら言い訳しても遅いですよ♪　ちょっとスカートの裾を持ち上げただけで、すっごい反応しちゃったのは事実なんですから♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「うーん。ここまでえっちな人なら、いっそのことペット扱いしてあげた方がいいのかも」
line = "「うーん。ここまでえっちな人なら、いっそのことペット扱いしてあげた方がいいのかも」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんが欲望に抗えなくなって暴走しないようにー、私が躾けてあげますよ♪　どうですか？」
line = "「会長さんが欲望に抗えなくなって暴走しないようにー、私が躾けてあげますよ♪　どうですか？」"

[[dialogue]]
speaker = "unk"
# 出会った時とずいぶん印象が違うなぁ……
line = "出会った時とずいぶん印象が違うなぁ……"

[[dialogue]]
speaker = "シャルレーヌ"
# 「貴族の令嬢なんてこんなものですよ？　隠し事や演技がいっぱいです」
line = "「貴族の令嬢なんてこんなものですよ？　隠し事や演技がいっぱいです」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「それこそ魔王とは何の関係もないのに、家名に箔を付けるために『魔王の血族』って名乗ってるくらいですし……」
line = "「それこそ魔王とは何の関係もないのに、家名に箔を付けるために『魔王の血族』って名乗ってるくらいですし……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ、このことは他言無用でお願いしますね」
line = "「あ、このことは他言無用でお願いしますね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「悪名は無名に勝る、と言うでしょう？　貴族に必要なのは権威とブランディング。これは人も魔族も変わりません」
line = "「悪名は無名に勝る、と言うでしょう？　貴族に必要なのは権威とブランディング。これは人も魔族も変わりません」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「先祖が魔王なんだ、スゴい一族なんだぞ～って言って活動してきたのが我がディアーブル家なんです」
line = "「先祖が魔王なんだ、スゴい一族なんだぞ～って言って活動してきたのが我がディアーブル家なんです」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「その家の娘が、本物の魔王と出会ってしまったら。これはもう手に入れないわけにはいかないでしょう？　ほら、会長さん──」
line = "「その家の娘が、本物の魔王と出会ってしまったら。これはもう手に入れないわけにはいかないでしょう？　ほら、会長さん──」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……って、いけない、いけない。人が来ちゃった」
line = "「……って、いけない、いけない。人が来ちゃった」"

[[dialogue]]
speaker = "マトイ"
# 「あれ、そこにいるのって会長と……シャルレーヌちゃん？　珍しい組み合わせだね～」
line = "「あれ、そこにいるのって会長と……シャルレーヌちゃん？　珍しい組み合わせだね～」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「マトイ先輩。こんにちは。お久しぶりです」
line = "「マトイ先輩。こんにちは。お久しぶりです」"

[[dialogue]]
speaker = "マトイ"
# 「うん、久しぶり！　何のお話をしてたの？」
line = "「うん、久しぶり！　何のお話をしてたの？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「現代の魔王だという会長さんに興味があったんです。お恥ずかしいですが、好奇心が抑えきれなくって」
line = "「現代の魔王だという会長さんに興味があったんです。お恥ずかしいですが、好奇心が抑えきれなくって」"

[[dialogue]]
speaker = "マトイ"
# 「あ～、そうだったんだぁ」
line = "「あ～、そうだったんだぁ」"

[[dialogue]]
speaker = "マトイ"
# 「会長も仲良くしてあげてね。シャルレーヌちゃんって、す～っごく良い子なんだよ」
line = "「会長も仲良くしてあげてね。シャルレーヌちゃんって、す～っごく良い子なんだよ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そんなことないですよ。私なんてまだまだ至らないところばかりです」
line = "「そんなことないですよ。私なんてまだまだ至らないところばかりです」"

[[dialogue]]
speaker = "マトイ"
# 「謙遜しなくてもいいじゃない。シャルレーヌちゃんが努力してるのはみんな知ってるんだから」
line = "「謙遜しなくてもいいじゃない。シャルレーヌちゃんが努力してるのはみんな知ってるんだから」"

[[dialogue]]
speaker = "マトイ"
# 「優しくて、気配り上手で、すっごく偉いお家の生まれだけど全然いばった所もないし、附属の１年生なのにプリマステラにまでなってるし」
line = "「優しくて、気配り上手で、すっごく偉いお家の生まれだけど全然いばった所もないし、附属の１年生なのにプリマステラにまでなってるし」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「星徒会のマトイ先輩に評価していただけるだなんて、光栄です。今後も一層頑張りますね」
line = "「星徒会のマトイ先輩に評価していただけるだなんて、光栄です。今後も一層頑張りますね」"

[[dialogue]]
speaker = "マトイ"
# 「私も負けてられないよね。お互い頑張ろ──って、あわわ！　あんまり道草してちゃ駄目なんだった！　それじゃあね、二人とも！」
line = "「私も負けてられないよね。お互い頑張ろ──って、あわわ！　あんまり道草してちゃ駄目なんだった！　それじゃあね、二人とも！」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「はい、マトイ先輩。またの機会に」
line = "「はい、マトイ先輩。またの機会に」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「さぁ、会長さん、お返事がまだですよ？　私のペットになりましょう？」
line = "「さぁ、会長さん、お返事がまだですよ？　私のペットになりましょう？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「マトイ先輩のおっしゃっていた通り、私はと～っても優しくて気配り上手なんです♪」
line = "「マトイ先輩のおっしゃっていた通り、私はと～っても優しくて気配り上手なんです♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「特に配下や領民は、これでもかと甘やかすタイプで……」
line = "「特に配下や領民は、これでもかと甘やかすタイプで……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私、おあずけをしたり、いぢめたりするのが得意なんです♪　きっと会長さんは気に入ると思いますよ♪」
line = "「私、おあずけをしたり、いぢめたりするのが得意なんです♪　きっと会長さんは気に入ると思いますよ♪」"

[[dialogue]]
speaker = "unk"
# だ、だ、誰が気に入るかっ……！！
line = "だ、だ、誰が気に入るかっ……！！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「そう言いつつ、お耳まで真っ赤ですね。面白～い♪」
line = "「そう言いつつ、お耳まで真っ赤ですね。面白～い♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さんってすっごく良い反応してくれるんですね。これはすぐに落としちゃうとツマラナイかも♪」
line = "「会長さんってすっごく良い反応してくれるんですね。これはすぐに落としちゃうとツマラナイかも♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「──うん、決めた♪　会長さんが自分からペットにしてくださいって言うまで、じ～っくり誘惑することにしよっと<emoji=heart04>」
line = "「──うん、決めた♪　会長さんが自分からペットにしてくださいって言うまで、じ～っくり誘惑することにしよっと<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「どうせ私が勝っちゃうに決まってますしね」
line = "「どうせ私が勝っちゃうに決まってますしね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「明日もいっぱいからかってあげますから、期待しててください<emoji=heart04>」
line = "「明日もいっぱいからかってあげますから、期待しててください<emoji=heart04>」"
