[[dialogue]]
speaker = "unk"
# 第４話,転入生の献身的生活,P
line = "第４話,転入生の献身的生活,P"

[[dialogue]]
speaker = "unk"
# フニとの付き合いも長くなり始めた頃。母さんが出張で家を空けることになり、その間フニが俺の家でメイドのバイトをしてくれることになった――
line = "フニとの付き合いも長くなり始めた頃。母さんが出張で家を空けることになり、その間フニが俺の家でメイドのバイトをしてくれることになった――"

[[dialogue]]
speaker = "フェニエル"
# 「はい、ケーキと紅茶をお持ち致しました、ご主人様♪」
line = "「はい、ケーキと紅茶をお持ち致しました、ご主人様♪」"

[[dialogue]]
speaker = "unk"
# でも、ご主人様呼びは慣れないな……
line = "でも、ご主人様呼びは慣れないな……"

[[dialogue]]
speaker = "unk"
# 今日もありがとう、フニ
line = "今日もありがとう、フニ"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ……♪　この場では会長さんのメイドですので」
line = "「えへへ……♪　この場では会長さんのメイドですので」"

[[dialogue]]
speaker = "フェニエル"
# 「それとも、ご主人様って呼ばれるのは、お嫌でしたか……？」
line = "「それとも、ご主人様って呼ばれるのは、お嫌でしたか……？」"

[[dialogue]]
speaker = "unk"
# 嫌じゃないから困る
line = "嫌じゃないから困る"

[[dialogue]]
speaker = "フェニエル"
# 「ふふっ、じゃあこのまま、ご主人様って呼びますね♪」
line = "「ふふっ、じゃあこのまま、ご主人様って呼びますね♪」"

[[dialogue]]
speaker = "フェニエル"
# 「あっ、ちなみに紅茶のお砂糖は、いつもご主人様が飲む際の分量を既に入れてありますので」
line = "「あっ、ちなみに紅茶のお砂糖は、いつもご主人様が飲む際の分量を既に入れてありますので」"

[[dialogue]]
speaker = "unk"
# すっかりメイドが板に付いたなぁ
line = "すっかりメイドが板に付いたなぁ"

[[dialogue]]
speaker = "フェニエル"
# 「最近は自分でも、ひょっとしたら天職かもと思ったりします」
line = "「最近は自分でも、ひょっとしたら天職かもと思ったりします」"

[[dialogue]]
speaker = "フェニエル"
# 「地元にいた時から、将来は誰かの役に立てるような大人になりたいって思ってましたから。……メイドは性に合ってるのかもしれません」
line = "「地元にいた時から、将来は誰かの役に立てるような大人になりたいって思ってましたから。……メイドは性に合ってるのかもしれません」"

[[dialogue]]
speaker = "フェニエル"
# 「でも本当は、メイドというより、決めた１人に献身的に尽くしたいというか……」
line = "「でも本当は、メイドというより、決めた１人に献身的に尽くしたいというか……」"

[[dialogue]]
speaker = "unk"
# え……？
line = "え……？"

[[dialogue]]
speaker = "フェニエル"
# 「と、とりあえず、紅茶が冷めてしまう、前にどうぞっ」
line = "「と、とりあえず、紅茶が冷めてしまう、前にどうぞっ」"

[[dialogue]]
speaker = "フェニエル"
# 「それから、イチゴのショートケーキも。フォークで……はい、あ～ん♪」
line = "「それから、イチゴのショートケーキも。フォークで……はい、あ～ん♪」"

[[dialogue]]
speaker = "unk"
# さ、さすがにそれは恥ずかしい……
line = "さ、さすがにそれは恥ずかしい……"

[[dialogue]]
speaker = "フェニエル"
# 「こういうの、前から１度やってみたかったんです。メイドがご主人様に奉仕しているだけですから……ね？」
line = "「こういうの、前から１度やってみたかったんです。メイドがご主人様に奉仕しているだけですから……ね？」"

[[dialogue]]
speaker = "フェニエル"
# 「どうぞ、ご主人様♪　あ～ん♪　……えへへ、どうです？　甘くて美味しいですか？」
line = "「どうぞ、ご主人様♪　あ～ん♪　……えへへ、どうです？　甘くて美味しいですか？」"

[[dialogue]]
speaker = "フェニエル"
# 「ご主人様の顔を見ていたら、私も何だか嬉しくなっちゃいます♪　もう１口、あ～ん♪」
line = "「ご主人様の顔を見ていたら、私も何だか嬉しくなっちゃいます♪　もう１口、あ～ん♪」"

[[dialogue]]
speaker = "unk"
# 結局、ショートケーキは最後のイチゴまでフニに食べさせてもらってしまった――
line = "結局、ショートケーキは最後のイチゴまでフニに食べさせてもらってしまった――"

[[dialogue]]
speaker = "フェニエル"
# 「その……どうでしたか？　私、上手くご主人様にご奉仕できてましたかっ？」
line = "「その……どうでしたか？　私、上手くご主人様にご奉仕できてましたかっ？」"

[[dialogue]]
speaker = "フェニエル"
# 「あ……えへへ♪　だったら、良かったです♪　それで出来れば……いつもの、頑張ったご褒美を……」
line = "「あ……えへへ♪　だったら、良かったです♪　それで出来れば……いつもの、頑張ったご褒美を……」"

[[dialogue]]
speaker = "unk"
# （フニの頭を優しく撫でる）
line = "（フニの頭を優しく撫でる）"

[[dialogue]]
speaker = "フェニエル"
# 「ん……<emoji=heart04>　ご主人様の手、温かくて、優しくて、少しくすぐったくて……でも、安心します……」
line = "「ん……<emoji=heart04>　ご主人様の手、温かくて、優しくて、少しくすぐったくて……でも、安心します……」"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ、こうして撫でられると私、嬉しくて幸せな気分になっちゃいます……♪」
line = "「えへへ、こうして撫でられると私、嬉しくて幸せな気分になっちゃいます……♪」"

[[dialogue]]
speaker = "unk"
# フニの髪って、柔らかくて触り心地がいい
line = "フニの髪って、柔らかくて触り心地がいい"

[[dialogue]]
speaker = "フェニエル"
# 「そ、そうですか？　あっ、ご主人様、そこは……」
line = "「そ、そうですか？　あっ、ご主人様、そこは……」"

[[dialogue]]
speaker = "フェニエル"
# 「やんっ<emoji=heart04>　頭の羽は、くすぐったいですよぉ……」
line = "「やんっ<emoji=heart04>　頭の羽は、くすぐったいですよぉ……」"

[[dialogue]]
speaker = "unk"
# ご、ごめん、つい……
line = "ご、ごめん、つい……"

[[dialogue]]
speaker = "フェニエル"
# 「い……嫌ではないんですけど、その、ちょっと敏感で……感じ過ぎちゃうというか……」
line = "「い……嫌ではないんですけど、その、ちょっと敏感で……感じ過ぎちゃうというか……」"

[[dialogue]]
speaker = "フェニエル"
# 「でも、会長さんが相手なら、私……」
line = "「でも、会長さんが相手なら、私……」"

[[dialogue]]
speaker = "unk"
# フニ……
line = "フニ……"

[[dialogue]]
speaker = "フェニエル"
# 「んっ<emoji=heart04>　あっ……<emoji=heart04>　会長さん……<emoji=heart04>」
line = "「んっ<emoji=heart04>　あっ……<emoji=heart04>　会長さん……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
# 「２人共、ただいま～！　思ってたより早く帰って来れちゃった～……って」
line = "「２人共、ただいま～！　思ってたより早く帰って来れちゃった～……って」"

[[dialogue]]
speaker = "リノ"
# 「あ」
line = "「あ」"

[[dialogue]]
speaker = "フェニエル"
# 「ぴゃあぁぁぁっ！？　リノさん！？」
line = "「ぴゃあぁぁぁっ！？　リノさん！？」"

[[dialogue]]
speaker = "unk"
# か、母さん。これはその……！
line = "か、母さん。これはその……！"

[[dialogue]]
speaker = "リノ"
# 「ふふふっ♪　あらあら。これはこれは……ごゆっくり～♪」
line = "「ふふふっ♪　あらあら。これはこれは……ごゆっくり～♪」"

[[dialogue]]
speaker = "unk"
# ち、違わないけど、違うんだぁぁぁ！
line = "ち、違わないけど、違うんだぁぁぁ！"

[[dialogue]]
speaker = "フェニエル"
# 「き、今日はその、すみませんでした……」
line = "「き、今日はその、すみませんでした……」"

[[dialogue]]
speaker = "フェニエル"
# 「私が調子に乗っちゃったから、会長さんに恥をかかせてしまって……」
line = "「私が調子に乗っちゃったから、会長さんに恥をかかせてしまって……」"

[[dialogue]]
speaker = "unk"
# いや、俺も下心全開だったし……
line = "いや、俺も下心全開だったし……"

[[dialogue]]
speaker = "フェニエル"
# 「え……か、会長さん、私に下心、持ってくれてたんですか……？」
line = "「え……か、会長さん、私に下心、持ってくれてたんですか……？」"

[[dialogue]]
speaker = "unk"
# 今回のことで気付いたけど……好きだ
line = "今回のことで気付いたけど……好きだ"

[[dialogue]]
speaker = "unk"
# フニは良い子だし、可愛いし……
line = "フニは良い子だし、可愛いし……"

[[dialogue]]
speaker = "フェニエル"
# 「はわわっ！？　で、でも私、片目の問題もありますし、田舎娘ですし……こんな私でも、良いんですか……？」
line = "「はわわっ！？　で、でも私、片目の問題もありますし、田舎娘ですし……こんな私でも、良いんですか……？」"

[[dialogue]]
speaker = "unk"
# フニがいいんだ。付き合ってほしい
line = "フニがいいんだ。付き合ってほしい"

[[dialogue]]
speaker = "フェニエル"
# 「あ……はいっ。私も会長さんのことが、好きです……！　お付き合い、是非よろしくお願いします……！」
line = "「あ……はいっ。私も会長さんのことが、好きです……！　お付き合い、是非よろしくお願いします……！」"

[[dialogue]]
speaker = "フェニエル"
# 「えへへ……♪　会長さんと恋人になれるなんて、何だか夢みたいです……」
line = "「えへへ……♪　会長さんと恋人になれるなんて、何だか夢みたいです……」"

[[dialogue]]
speaker = "フェニエル"
# 「でも、恋人同士なら、今度は私の部屋で、気兼ねなくご主人様呼びが出来ちゃいますね……<emoji=heart04>」
line = "「でも、恋人同士なら、今度は私の部屋で、気兼ねなくご主人様呼びが出来ちゃいますね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 次にスキンシップした時は、果たして理性を保つことが出来るだろうか……と可愛い恋人を前に、そわそわしてしまうのであった。
line = "次にスキンシップした時は、果たして理性を保つことが出来るだろうか……と可愛い恋人を前に、そわそわしてしまうのであった。"
