[[dialogue]]
speaker = "unk"
# 第４話,不器用なりに全力で,P
line = "第４話,不器用なりに全力で,P"

[[dialogue]]
speaker = "unk"
# 流星寮のクリスマスパーティーは大いに盛り上がった。
line = "流星寮のクリスマスパーティーは大いに盛り上がった。"

[[dialogue]]
speaker = "unk"
# 興奮の余韻が冷めない俺は、恋人のアニュラスを伴って家に戻ってきた。
line = "興奮の余韻が冷めない俺は、恋人のアニュラスを伴って家に戻ってきた。"

[[dialogue]]
speaker = "アニュラス"
# 「むむむむむ……」
line = "「むむむむむ……」"

[[dialogue]]
speaker = "unk"
# 落ち着かない？
line = "落ち着かない？"

[[dialogue]]
speaker = "unk"
# どうしたの？
line = "どうしたの？"

[[dialogue]]
speaker = "アニュラス"
# 「当然だっ。家長不在のところに来訪しているし、それに……」
line = "「当然だっ。家長不在のところに来訪しているし、それに……」"

[[dialogue]]
speaker = "アニュラス"
# 「こんなっ、クリスマス全開の格好をしてるんだぞっ。浮かれすぎじゃないか？」
line = "「こんなっ、クリスマス全開の格好をしてるんだぞっ。浮かれすぎじゃないか？」"

[[dialogue]]
speaker = "アニュラス"
# 「パーティーの最中、私がめちゃくちゃ浮かれていたのは事実だ。しかし、パーティーは終わったんだぞ。もう日常に戻って然るべきだ」
line = "「パーティーの最中、私がめちゃくちゃ浮かれていたのは事実だ。しかし、パーティーは終わったんだぞ。もう日常に戻って然るべきだ」"

[[dialogue]]
speaker = "unk"
# 日常に戻りたくないな
line = "日常に戻りたくないな"

[[dialogue]]
speaker = "unk"
# まだクリスマスは終わってないよ
line = "まだクリスマスは終わってないよ"

[[dialogue]]
speaker = "アニュラス"
# 「……楽しかったからな。終わりたくない気持ちはわかる。私だって、クリスマスフォームのままでここに来てしまったのだから」
line = "「……楽しかったからな。終わりたくない気持ちはわかる。私だって、クリスマスフォームのままでここに来てしまったのだから」"

[[dialogue]]
speaker = "アニュラス"
# 「しかしっ、急に我に返ってしまったんだ。私ははしゃぎ過ぎていないか？　リノお母様が戻ってきて、今の私を見たら、いったいどう思うか……」
line = "「しかしっ、急に我に返ってしまったんだ。私ははしゃぎ過ぎていないか？　リノお母様が戻ってきて、今の私を見たら、いったいどう思うか……」"

[[dialogue]]
speaker = "unk"
# うちの嫁かわいい、かな？
line = "うちの嫁かわいい、かな？"

[[dialogue]]
speaker = "アニュラス"
# 「よ、嫁ぇぇっっ！！？　おい待て！　お母様の中で、いったい私はどういう位置づけなんだ？」
line = "「よ、嫁ぇぇっっ！！？　おい待て！　お母様の中で、いったい私はどういう位置づけなんだ？」"

[[dialogue]]
speaker = "アニュラス"
# 「確かにそのっ、お前の恋人だし、交際を続けて行けば、いずれはその延長に……よ、嫁……お嫁さんっ、に、なることだってっっ<emoji=heart04>」
line = "「確かにそのっ、お前の恋人だし、交際を続けて行けば、いずれはその延長に……よ、嫁……お嫁さんっ、に、なることだってっっ<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
# 「うわぁぁぁっ！！　私はいったい何を考えてるんだっ！　煩悩退散！　浮かれ心、死すべし！」
line = "「うわぁぁぁっ！！　私はいったい何を考えてるんだっ！　煩悩退散！　浮かれ心、死すべし！」"

[[dialogue]]
speaker = "unk"
# 意識してくれて嬉しい
line = "意識してくれて嬉しい"

[[dialogue]]
speaker = "unk"
# 大袈裟だなぁ
line = "大袈裟だなぁ"

[[dialogue]]
speaker = "アニュラス"
# 「流星の騎士を目指すんだから、恋愛にうつつを抜かすのがそもそもおかしいのかもしれない。だとしたら、そんなのっ……そんなのっ……」
line = "「流星の騎士を目指すんだから、恋愛にうつつを抜かすのがそもそもおかしいのかもしれない。だとしたら、そんなのっ……そんなのっ……」"

[[dialogue]]
speaker = "アニュラス"
# 「騎士失格……かなぁ？」
line = "「騎士失格……かなぁ？」"

[[dialogue]]
speaker = "unk"
# 騎士ならば愛を知るべき
line = "騎士ならば愛を知るべき"

[[dialogue]]
speaker = "unk"
# 失格じゃない
line = "失格じゃない"

[[dialogue]]
speaker = "アニュラス"
# 「そう、だな……うん、お前の言う通りだ」
line = "「そう、だな……うん、お前の言う通りだ」"

[[dialogue]]
speaker = "アニュラス"
# 「悪を打倒するだけが騎士じゃない。そのことを教えてもらったはずなのに情けないな。こんな些細なことで揺らいでしまうなんて」
line = "「悪を打倒するだけが騎士じゃない。そのことを教えてもらったはずなのに情けないな。こんな些細なことで揺らいでしまうなんて」"

[[dialogue]]
speaker = "アニュラス"
# 「私はもう否定しない。お前という恋人の存在も、人を愛する素晴らしさも」
line = "「私はもう否定しない。お前という恋人の存在も、人を愛する素晴らしさも」"

[[dialogue]]
speaker = "アニュラス"
# 「お前の彼女にしてもらって学んだことだからな。感謝している」
line = "「お前の彼女にしてもらって学んだことだからな。感謝している」"

[[dialogue]]
speaker = "アニュラス"
# 「そうだ、感謝のついでではないが……プレゼントを用意してきたんだ。受け取ってくれ」
line = "「そうだ、感謝のついでではないが……プレゼントを用意してきたんだ。受け取ってくれ」"

[[dialogue]]
speaker = "unk"
# じゃあ俺も……
line = "じゃあ俺も……"

[[dialogue]]
speaker = "unk"
# ありがとう！
line = "ありがとう！"

[[dialogue]]
speaker = "アニュラス"
# 「お前もプレゼント用意してたのか。ははっ、クリスマスだもんな、しかも恋人同士なんだ、プレゼントの１つくらい用意するのが当然だろう」
line = "「お前もプレゼント用意してたのか。ははっ、クリスマスだもんな、しかも恋人同士なんだ、プレゼントの１つくらい用意するのが当然だろう」"

[[dialogue]]
speaker = "アニュラス"
# 「と……言いたいところだが、すまない！　情けないことを告白するが、パーティーの準備が忙しすぎてすっかり失念していたんだ！」
line = "「と……言いたいところだが、すまない！　情けないことを告白するが、パーティーの準備が忙しすぎてすっかり失念していたんだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「教えてくれたのは舞亜だ。恋人にプレゼントを用意しておいた方がいいって」
line = "「教えてくれたのは舞亜だ。恋人にプレゼントを用意しておいた方がいいって」"

[[dialogue]]
speaker = "アニュラス"
# 「そのくらい私は気が利かない女なんだ。１つのことで頭がいっぱいになって、同時に色々なことが考えられない」
line = "「そのくらい私は気が利かない女なんだ。１つのことで頭がいっぱいになって、同時に色々なことが考えられない」"

[[dialogue]]
speaker = "アニュラス"
# 「そんな自分も変えたいと思っている……が、今回の件を通して学ばせてもらった。自分に出来ないことは、誰かに力を借りてもいい」
line = "「そんな自分も変えたいと思っている……が、今回の件を通して学ばせてもらった。自分に出来ないことは、誰かに力を借りてもいい」"

[[dialogue]]
speaker = "アニュラス"
# 「私は私らしく。アニュラス・セイファートのまま、お前を愛したい」
line = "「私は私らしく。アニュラス・セイファートのまま、お前を愛したい」"

[[dialogue]]
speaker = "アニュラス"
# 「不器用なら不器用なりに全力で、気持ちを込めて……好きだって伝え続けるからな<emoji=heart04>」
line = "「不器用なら不器用なりに全力で、気持ちを込めて……好きだって伝え続けるからな<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 愛してる♥
line = "愛してる♥"

[[dialogue]]
speaker = "unk"
# 好きだよ♥
line = "好きだよ♥"

[[dialogue]]
speaker = "アニュラス"
# 「う、うん、知ってる。知ってても、やはり言われると嬉しいな<emoji=heart04>」
line = "「う、うん、知ってる。知ってても、やはり言われると嬉しいな<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
# 「伝えたい想いがあるなら、恥ずかしがらず伝えた方がいい。真っ直ぐに届けるのが一番大事だからな」
line = "「伝えたい想いがあるなら、恥ずかしがらず伝えた方がいい。真っ直ぐに届けるのが一番大事だからな」"

[[dialogue]]
speaker = "アニュラス"
# 「だから私は言うぞっ。そ、そのっ……キスしたい……パーティーの間ずっと我慢してたんだぞ。お前が私を褒めるたび、キスしたい、ギュッと抱き締めたいって」
line = "「だから私は言うぞっ。そ、そのっ……キスしたい……パーティーの間ずっと我慢してたんだぞ。お前が私を褒めるたび、キスしたい、ギュッと抱き締めたいって」"

[[dialogue]]
speaker = "アニュラス"
# 「だからするぞ。恋人だから遠慮なんてしない」
line = "「だからするぞ。恋人だから遠慮なんてしない」"

[[dialogue]]
speaker = "アニュラス"
# 「ちゅ<emoji=heart04>　んちゅ<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅ～～っ<emoji=heart04>」
line = "「ちゅ<emoji=heart04>　んちゅ<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅ～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
# 「ふへへ……キス、してしまったな<emoji=heart04>　やっぱりキスするの、好きだ……<emoji=heart04>　もっとしていいか？　いや、駄目だと言ってもするぞ。彼氏として彼女を満足させてくれ<emoji=heart04>」
line = "「ふへへ……キス、してしまったな<emoji=heart04>　やっぱりキスするの、好きだ……<emoji=heart04>　もっとしていいか？　いや、駄目だと言ってもするぞ。彼氏として彼女を満足させてくれ<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
# 「ふふっ、好きだぞ<emoji=heart04>　愛してる<emoji=heart04>　いっぱいいっぱい……私のこと忘れられないくらい、キスしまくるからなっ<emoji=heart04>」
line = "「ふふっ、好きだぞ<emoji=heart04>　愛してる<emoji=heart04>　いっぱいいっぱい……私のこと忘れられないくらい、キスしまくるからなっ<emoji=heart04>」"

[[dialogue]]
speaker = "アニュラス"
# 「んちゅう～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「んちゅう～～～～～っっ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# こうして俺とアニュラスは夢中になって、キスを繰り返すのだった。
line = "こうして俺とアニュラスは夢中になって、キスを繰り返すのだった。"
