[[dialogue]]
speaker = "unk"
# 第２話,れっつ忍者♪,P
line = "第２話,れっつ忍者♪,P"

[[dialogue]]
speaker = "シズル"
# 「いやはや、大変な目に遭ってしまいましたね。都会というのは本当に何が起こるか分からないです」
line = "「いやはや、大変な目に遭ってしまいましたね。都会というのは本当に何が起こるか分からないです」"

[[dialogue]]
speaker = "せつな"
# 「お願いですからあまり心配させないで欲しいでござるよ」
line = "「お願いですからあまり心配させないで欲しいでござるよ」"

[[dialogue]]
speaker = "シズル"
# 「ごめんなさい。でも、折角の社会勉強の機会ですから……」
line = "「ごめんなさい。でも、折角の社会勉強の機会ですから……」"

[[dialogue]]
speaker = "せつな"
# 「社会勉強が必要なほど、師匠の人生経験は浅くないと思うのでござるが……？」
line = "「社会勉強が必要なほど、師匠の人生経験は浅くないと思うのでござるが……？」"

[[dialogue]]
speaker = "シズル"
# 「そんなことないです。私なんてまだまだ世間知らずの若輩者です」
line = "「そんなことないです。私なんてまだまだ世間知らずの若輩者です」"

[[dialogue]]
speaker = "せつな"
# 「と・に・か・く、外に出る時は必ず供の者を連れるでござる！　わかったでござるか？」
line = "「と・に・か・く、外に出る時は必ず供の者を連れるでござる！　わかったでござるか？」"

[[dialogue]]
speaker = "シズル"
# 「そうですね。では、そのような時には魔王さんに案内をお願いしてもいいですか？」
line = "「そうですね。では、そのような時には魔王さんに案内をお願いしてもいいですか？」"

[[dialogue]]
speaker = "unk"
# それは構いませんけど……
line = "それは構いませんけど……"

[[dialogue]]
speaker = "unk"
# えっ、俺ですか？
line = "えっ、俺ですか？"

[[dialogue]]
speaker = "シズル"
# 「あはっ、やったぁ、ありがとうございます♪」
line = "「あはっ、やったぁ、ありがとうございます♪」"

[[dialogue]]
speaker = "せつな"
# 「どうして主様でござる？　せつなでもいいではありませぬか！」
line = "「どうして主様でござる？　せつなでもいいではありませぬか！」"

[[dialogue]]
speaker = "シズル"
# 「せつなより地理に詳しそうですし心強いですから」
line = "「せつなより地理に詳しそうですし心強いですから」"

[[dialogue]]
speaker = "シズル"
# 「というわけで魔王さん、いっぱい楽しいところに連れて行ってください♪」
line = "「というわけで魔王さん、いっぱい楽しいところに連れて行ってください♪」"

[[dialogue]]
speaker = "unk"
# 任せて！
line = "任せて！"

[[dialogue]]
speaker = "せつな"
# 「待つでござる。今日はもう出かけないでお屋敷に居るでござる。この後、師匠の歓迎の宴を開くでござるから」
line = "「待つでござる。今日はもう出かけないでお屋敷に居るでござる。この後、師匠の歓迎の宴を開くでござるから」"

[[dialogue]]
speaker = "シズル"
# 「えっ、そうなのですか？」
line = "「えっ、そうなのですか？」"

[[dialogue]]
speaker = "シズル"
# 「急におしかけたというのに、そんな宴まで開いていただいて……」
line = "「急におしかけたというのに、そんな宴まで開いていただいて……」"

[[dialogue]]
speaker = "シズル"
# 「ヘレナさんにご迷惑をおかけするわけにはいきませんね、大人しくいい子にして待っています」
line = "「ヘレナさんにご迷惑をおかけするわけにはいきませんね、大人しくいい子にして待っています」"

[[dialogue]]
speaker = "せつな"
# 「そうしてくだされ……主様、念のために師匠から目を離さないでいてもらえまするか？」
line = "「そうしてくだされ……主様、念のために師匠から目を離さないでいてもらえまするか？」"

[[dialogue]]
speaker = "シズル"
# 「もう、せつなったら、いつからそんな心配性になっちゃったんですか？」
line = "「もう、せつなったら、いつからそんな心配性になっちゃったんですか？」"

[[dialogue]]
speaker = "unk"
# 確かに普通なら何も心配するところではないが、相手はシズルさんである。
line = "確かに普通なら何も心配するところではないが、相手はシズルさんである。"

[[dialogue]]
speaker = "unk"
# 話を聞いていると、目を離した隙に煙のように姿を消してしまった、なんてことがあっても不思議ではない。
line = "話を聞いていると、目を離した隙に煙のように姿を消してしまった、なんてことがあっても不思議ではない。"

[[dialogue]]
speaker = "unk"
# 俺は決して油断しないように、用意が出来るまでの間、シズルさんを見張ることにしたのだった。
line = "俺は決して油断しないように、用意が出来るまでの間、シズルさんを見張ることにしたのだった。"

[[dialogue]]
speaker = "ヘレナ"
# 「よくぞ参られたシズル殿。今日は目いっぱい楽しんでいって欲しい」
line = "「よくぞ参られたシズル殿。今日は目いっぱい楽しんでいって欲しい」"

[[dialogue]]
speaker = "シズル"
# 「ありがとうございます、九浄の当主様」
line = "「ありがとうございます、九浄の当主様」"

[[dialogue]]
speaker = "ヘレナ"
# 「そう畏まるな。そうだな……私のことは今後、ヘレナちゃんと呼ぶがいい」
line = "「そう畏まるな。そうだな……私のことは今後、ヘレナちゃんと呼ぶがいい」"

[[dialogue]]
speaker = "シズル"
# 「紫桜の里の者にとって、当主様は大恩あるお方ですから……さすがにそのような呼び方は出来ません」
line = "「紫桜の里の者にとって、当主様は大恩あるお方ですから……さすがにそのような呼び方は出来ません」"

[[dialogue]]
speaker = "シズル"
# 「ではヘレナさん、とお呼びしますね」
line = "「ではヘレナさん、とお呼びしますね」"

[[dialogue]]
speaker = "ヘレナ"
# 「うむ、よい！　その愛らしい笑顔で呼ばれると、幼い子供に甘えられているような気になるな！　実に創作意欲をかき立てる！」
line = "「うむ、よい！　その愛らしい笑顔で呼ばれると、幼い子供に甘えられているような気になるな！　実に創作意欲をかき立てる！」"

[[dialogue]]
speaker = "蘭美"
# 「当主様、食事の席ですので……暴走はお控えください」
line = "「当主様、食事の席ですので……暴走はお控えください」"

[[dialogue]]
speaker = "ヘレナ"
# 「おっと、これは失礼した」
line = "「おっと、これは失礼した」"

[[dialogue]]
speaker = "ヘレナ"
# 「ああ、そうだ。折角だから我がメイド隊を紹介しておくとしようか……まずはこちらがメイド長を務める蘭美だ」
line = "「ああ、そうだ。折角だから我がメイド隊を紹介しておくとしようか……まずはこちらがメイド長を務める蘭美だ」"

[[dialogue]]
speaker = "蘭美"
# 「羽宮蘭美です。どうぞお見知り置きください」
line = "「羽宮蘭美です。どうぞお見知り置きください」"

[[dialogue]]
speaker = "シズル"
# 「はい、よろしくお願いします」
line = "「はい、よろしくお願いします」"

[[dialogue]]
speaker = "ヘレナ"
# 「それから閃、美鶴……ヨミヨミの紹介は必要ないな」
line = "「それから閃、美鶴……ヨミヨミの紹介は必要ないな」"

[[dialogue]]
speaker = "ヨミ"
# 「ご無沙汰しております。紫桜の里ではお世話になりました」
line = "「ご無沙汰しております。紫桜の里ではお世話になりました」"

[[dialogue]]
speaker = "シズル"
# 「こちらこそお世話になりました。お変わりなくお元気そうで何よりです」
line = "「こちらこそお世話になりました。お変わりなくお元気そうで何よりです」"

[[dialogue]]
speaker = "シズル"
# 「そうですか……この方々がせつなの同僚、日頃よりお世話になっている方々というわけですね？」
line = "「そうですか……この方々がせつなの同僚、日頃よりお世話になっている方々というわけですね？」"

[[dialogue]]
speaker = "せつな"
# 「九浄家メイド隊、せつなの頼もしい仲間でござるよ！」
line = "「九浄家メイド隊、せつなの頼もしい仲間でござるよ！」"

[[dialogue]]
speaker = "蘭美"
# 「こちらこそ、せつなにはいつも助けられているわ」
line = "「こちらこそ、せつなにはいつも助けられているわ」"

[[dialogue]]
speaker = "蘭美"
# 「師匠の教えがいいのね。頑張り屋で明るくいい子で……今やメイド隊には欠かせない存在よ」
line = "「師匠の教えがいいのね。頑張り屋で明るくいい子で……今やメイド隊には欠かせない存在よ」"

[[dialogue]]
speaker = "シズル"
# 「ありがとうございます、自分のことのように嬉しいです」
line = "「ありがとうございます、自分のことのように嬉しいです」"

[[dialogue]]
speaker = "せつな"
# 「そ、そんなに持ち上げられると恥ずかしいでござるよ！」
line = "「そ、そんなに持ち上げられると恥ずかしいでござるよ！」"

[[dialogue]]
speaker = "シズル"
# 「こんな素晴らしい縁に恵まれたなら何も憂うことはありませんね。せつなのこと、今後ともよろしくお願いします」
line = "「こんな素晴らしい縁に恵まれたなら何も憂うことはありませんね。せつなのこと、今後ともよろしくお願いします」"

[[dialogue]]
speaker = "蘭美"
# 「ええ、この私に任せておきなさい♪」
line = "「ええ、この私に任せておきなさい♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「こう見えて蘭美は、世界最高のメイドを決める大会『メイド・オブ・メイド』で２位の成績を収めているからな」
line = "「こう見えて蘭美は、世界最高のメイドを決める大会『メイド・オブ・メイド』で２位の成績を収めているからな」"

[[dialogue]]
speaker = "ヘレナ"
# 「蘭美に任せておけば間違いない、と言い切れる程には優秀だぞ」
line = "「蘭美に任せておけば間違いない、と言い切れる程には優秀だぞ」"

[[dialogue]]
speaker = "蘭美"
# 「そういうことね！　──ところで当主様の口にした『こう見えて』だけど、それは私が少しばかり幼く見えるということを暗に指しているの」
line = "「そういうことね！　──ところで当主様の口にした『こう見えて』だけど、それは私が少しばかり幼く見えるということを暗に指しているの」"

[[dialogue]]
speaker = "蘭美"
# 「けれど実のところ、私はそんなにちっちゃくないのよ。だからせつなのことは安心して任せてくれていいわ！」
line = "「けれど実のところ、私はそんなにちっちゃくないのよ。だからせつなのことは安心して任せてくれていいわ！」"

[[dialogue]]
speaker = "シズル"
# 「…………ええと……」
line = "「…………ええと……」"

[[dialogue]]
speaker = "シズル"
# 「蘭美さんは、小さくないのでは？」
line = "「蘭美さんは、小さくないのでは？」"

[[dialogue]]
speaker = "蘭美"
# 「は……！？」
line = "「は……！？」"

[[dialogue]]
speaker = "ヘレナ"
# 「ほう……」
line = "「ほう……」"

[[dialogue]]
speaker = "シズル"
# 「体とか私の方が全然小さいですし、少しお話ししただけでもとってもしっかりした方だと分かりますし」
line = "「体とか私の方が全然小さいですし、少しお話ししただけでもとってもしっかりした方だと分かりますし」"

[[dialogue]]
speaker = "シズル"
# 「むしろお姉ちゃんみたいで、甘えたくなっちゃいます♪」
line = "「むしろお姉ちゃんみたいで、甘えたくなっちゃいます♪」"

[[dialogue]]
speaker = "蘭美"
# 「はうっ！！？」
line = "「はうっ！！？」"

[[dialogue]]
speaker = "せつな"
# 「ああっ、蘭美殿の撃ち抜かれる音が聞こえたでござる！」
line = "「ああっ、蘭美殿の撃ち抜かれる音が聞こえたでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「あ、慌てないでせつな……私は大丈夫よ……」
line = "「あ、慌てないでせつな……私は大丈夫よ……」"

[[dialogue]]
speaker = "蘭美"
# 「そう……私がお姉ちゃん……。いいわ、貴方がそう思うなら……いつでも甘えていいのよ……ふふ……」
line = "「そう……私がお姉ちゃん……。いいわ、貴方がそう思うなら……いつでも甘えていいのよ……ふふ……」"

[[dialogue]]
speaker = "シズル"
# 「えへへ、ありがとうございます♪」
line = "「えへへ、ありがとうございます♪」"

[[dialogue]]
speaker = "蘭美"
# 「あら、飲み物がもうなくなりそうね？　他にも何か食べたいものがあったら言って頂戴。最速で持ってきてあげるから」
line = "「あら、飲み物がもうなくなりそうね？　他にも何か食べたいものがあったら言って頂戴。最速で持ってきてあげるから」"

[[dialogue]]
speaker = "ヨミ"
# 「メイド長がシズルさんにデレデレです……」
line = "「メイド長がシズルさんにデレデレです……」"

[[dialogue]]
speaker = "せつな"
# 「師匠は天然でああいうことをするでござる……本当に恐ろしい人でござる……」
line = "「師匠は天然でああいうことをするでござる……本当に恐ろしい人でござる……」"

[[dialogue]]
speaker = "unk"
# その後もシズルさんを歓迎する宴は、にぎやかに続いていった。
line = "その後もシズルさんを歓迎する宴は、にぎやかに続いていった。"

[[dialogue]]
speaker = "unk"
# 恐ろしい事にシズルさんは、蘭美以外のメイド隊のメンバーも次々と虜にしていき……
line = "恐ろしい事にシズルさんは、蘭美以外のメイド隊のメンバーも次々と虜にしていき……"

[[dialogue]]
speaker = "unk"
# いつの間にか、みんなの妹ちゃんポジションへと収まってしまっていたのだった。
line = "いつの間にか、みんなの妹ちゃんポジションへと収まってしまっていたのだった。"
