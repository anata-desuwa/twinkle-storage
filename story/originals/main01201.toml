line = "第１話,黒の正体,B"

[[dialogue]]
speaker = "unk"
# ──その一撃は<ruby=かぶと>兜</ruby>を割った。
line = "──その一撃は<ruby>兜<rt>かぶと</rt></ruby>を割った。"

[[dialogue]]
speaker = "unk"
# そして、甲冑の下から現れたのは……
line = "そして、甲冑の下から現れたのは……"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "サーシャ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マトイ"
# 「セイファート……学園……長……」
line = "「セイファート……学園……長……」"

[[dialogue]]
speaker = "unk"
# 俺たち新星学園星騎士たちの長──ジェラルド・セイファートその人だった。
line = "俺たち新星学園星騎士たちの長──ジェラルド・セイファートその人だった。"

[[dialogue]]
speaker = "セイファート"
# 「いつから……気づいていた……」
line = "「いつから……気づいていた……」"

[[dialogue]]
speaker = "クロト"
# 「拳を交えた時に……その呼吸から。信じたくは、なかったけど……」
line = "「拳を交えた時に……その呼吸から。信じたくは、なかったけど……」"

[[dialogue]]
speaker = "マトイ"
# （緋宮くんは……戦いの中で……）
line = "（緋宮くんは……戦いの中で……）"

[[dialogue]]
speaker = "サーシャ"
# （そういえば──この間、稽古をつけてもらったとかって……）
line = "（そういえば──この間、稽古をつけてもらったとかって……）"

[[dialogue]]
speaker = "unk"
# 学園長は膝を地につき、それ以上抵抗する素振りを見せなかった。
line = "学園長は膝を地につき、それ以上抵抗する素振りを見せなかった。"

[[dialogue]]
speaker = "unk"
# 御前試合を取り仕切ってくれていたときの毅然さはもうない。
line = "御前試合を取り仕切ってくれていたときの毅然さはもうない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「学園、長……どうして、あなたが……」
line = "「学園、長……どうして、あなたが……」"

[[dialogue]]
speaker = "セイファート"
# 「……フ。ま……知られては仕方がないな」
line = "「……フ。ま……知られては仕方がないな」"

[[dialogue]]
speaker = "クロト"
# 「あなたは俺たち新星の星騎士を率いる者──俺は星徒会長として、このまま見過ごすわけにはいかない」
line = "「あなたは俺たち新星の星騎士を率いる者──俺は星徒会長として、このまま見過ごすわけにはいかない」"

[[dialogue]]
speaker = "セイファート"
# 「……ああ。申し開きをするつもりはない」
line = "「……ああ。申し開きをするつもりはない」"

[[dialogue]]
speaker = "セイファート"
# 「私はもはや身も心も暗黒に堕ちた。おまえ達にとって憎むべき仇敵……それだけだ」
line = "「私はもはや身も心も暗黒に堕ちた。おまえ達にとって憎むべき仇敵……それだけだ」"

[[dialogue]]
speaker = "クロト"
# 「そうじゃない──！　俺はただ、あなたの本心を……！」
line = "「そうじゃない──！　俺はただ、あなたの本心を……！」"

[[dialogue]]
speaker = "unk"
# 黙ろうとする学園長に、俺は焦りがこらえきれず叫んだ。
line = "黙ろうとする学園長に、俺は焦りがこらえきれず叫んだ。"

[[dialogue]]
speaker = "フィオナ"
# 「私も……このまま見過ごすわけにはいきません」
line = "「私も……このまま見過ごすわけにはいきません」"

[[dialogue]]
speaker = "フィオナ"
# 「──お聞かせください。なぜ、あなたがそうなってしまったのか」
line = "「──お聞かせください。なぜ、あなたがそうなってしまったのか」"

[[dialogue]]
speaker = "セイファート"
# 「……星見の娘」
line = "「……星見の娘」"

[[dialogue]]
speaker = "フィオナ"
# 「いつだったか……父が言っていました。あなたは、流星市国を守る真の騎士であると」
line = "「いつだったか……父が言っていました。あなたは、流星市国を守る真の騎士であると」"

[[dialogue]]
speaker = "クロト"
# 「フィオナのお父さん──流星教皇が？」
line = "「フィオナのお父さん──流星教皇が？」"

[[dialogue]]
speaker = "サーシャ"
# 「知り合いだったの……？」
line = "「知り合いだったの……？」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。そもそも、彼を新星学園の初代学園長へ推薦したのも──私の父ですから」
line = "「ええ。そもそも、彼を新星学園の初代学園長へ推薦したのも──私の父ですから」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そうだったんだ……」
line = "「そ、そうだったんだ……」"

[[dialogue]]
speaker = "unk"
# それは意外な関係だった。セイファート学園長と流星教皇は昔からの仲だったようだ。
line = "それは意外な関係だった。セイファート学園長と流星教皇は昔からの仲だったようだ。"

[[dialogue]]
speaker = "フィオナ"
# 「父は……それほどまでにあなたを信頼していました。陰ながら流星市国を支え続けてきた、あなたを」
line = "「父は……それほどまでにあなたを信頼していました。陰ながら流星市国を支え続けてきた、あなたを」"

[[dialogue]]
speaker = "クロト"
# 「流星市国を支える──それは、どういう……？」
line = "「流星市国を支える──それは、どういう……？」"

[[dialogue]]
speaker = "フィオナ"
# 「今の私たちと似たようなものです。彼は独自の立場で、数々のリクリエ問題に対処し続けてきた……」
line = "「今の私たちと似たようなものです。彼は独自の立場で、数々のリクリエ問題に対処し続けてきた……」"

[[dialogue]]
speaker = "フィオナ"
# 「特に新星学園の設立前──増え続けるアステラに対し、出動できる星騎士たちの数は限られていましたから」
line = "「特に新星学園の設立前──増え続けるアステラに対し、出動できる星騎士たちの数は限られていましたから」"

[[dialogue]]
speaker = "フィオナ"
# 「そうして彼は、人知れず多くの街と命を救っていた……」
line = "「そうして彼は、人知れず多くの街と命を救っていた……」"

[[dialogue]]
speaker = "フィオナ"
# 「生徒としてでも、教師としてでもない……ただ純粋に平和を願う『流星の騎士』として」
line = "「生徒としてでも、教師としてでもない……ただ純粋に平和を願う『流星の騎士』として」"

[[dialogue]]
speaker = "セイファート"
# 『──怪我はないか、少年』
line = "『──怪我はないか、少年』"

[[dialogue]]
speaker = "セイファート"
# 『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』
line = "『強くあれ。世界を取り込まんとする力に、決して飲まれることなきように』"

[[dialogue]]
speaker = "unk"
# 俺の原点――
line = "俺の原点――"

[[dialogue]]
speaker = "unk"
# いつだって胸の中に抱いてきた、あの日の言葉がよみがえる。
line = "いつだって胸の中に抱いてきた、あの日の言葉がよみがえる。"

[[dialogue]]
speaker = "unk"
# あの頃の彼は──学園長でも黒騎士でもない、ただの正義感あふれる戦士として……
line = "あの頃の彼は──学園長でも黒騎士でもない、ただの正義感あふれる戦士として……"

[[dialogue]]
speaker = "セイファート"
# 「……過ぎた話だ。人は変わる」
line = "「……過ぎた話だ。人は変わる」"

[[dialogue]]
speaker = "フィオナ"
# 「いいえ──私は星見の娘として、あなたを選んだ責任を背負わねばなりません」
line = "「いいえ──私は星見の娘として、あなたを選んだ責任を背負わねばなりません」"

[[dialogue]]
speaker = "フィオナ"
# 「アニュラスさんだって──父親であるあなたを目標としていました。その人物像が作られたものでないことくらいわかります」
line = "「アニュラスさんだって──父親であるあなたを目標としていました。その人物像が作られたものでないことくらいわかります」"

[[dialogue]]
speaker = "フィオナ"
# 「そんなあなたが……なぜリクリエを望むのです？　そして再三口にしていたデネブとはなんなのですか？」
line = "「そんなあなたが……なぜリクリエを望むのです？　そして再三口にしていたデネブとはなんなのですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「すべてを明かしていただけるまで──この剣はあなたを放しません」
line = "「すべてを明かしていただけるまで──この剣はあなたを放しません」"

[[dialogue]]
speaker = "セイファート"
# 「……フッ」
line = "「……フッ」"

[[dialogue]]
speaker = "unk"
# 太陽の星力で編まれた剣を、眼前へと突きつけるフィオナ。
line = "太陽の星力で編まれた剣を、眼前へと突きつけるフィオナ。"

[[dialogue]]
speaker = "unk"
# だが、セイファート学園長は膝をついたままくつくつと笑った。
line = "だが、セイファート学園長は膝をついたままくつくつと笑った。"

[[dialogue]]
speaker = "unk"
# そこで俺はもう、我慢が効かなくなってしまった。
line = "そこで俺はもう、我慢が効かなくなってしまった。"

[[dialogue]]
speaker = "クロト"
# 「…………えてくれよ」
line = "「…………えてくれよ」"

[[dialogue]]
speaker = "フィオナ"
# 「え……」
line = "「え……」"

[[dialogue]]
speaker = "クロト"
# 「答えてくれよ……何が目的だってんだよっ！　学園長っ！！」
line = "「答えてくれよ……何が目的だってんだよっ！　学園長っ！！」"

[[dialogue]]
speaker = "セイファート"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "マトイ"
# 「緋宮、くん……」
line = "「緋宮、くん……」"

[[dialogue]]
speaker = "クロト"
# 「あなたは……あなたは俺に示してくれたはずだ。星騎士としての道を。破滅から人々を救う手立てを」
line = "「あなたは……あなたは俺に示してくれたはずだ。星騎士としての道を。破滅から人々を救う手立てを」"

[[dialogue]]
speaker = "クロト"
# 「──だったらっ！　どうして自分から災厄を招くような真似をするんだ！　どうしてヴィーナスに手をかけようなんて思うんだ！」
line = "「──だったらっ！　どうして自分から災厄を招くような真似をするんだ！　どうしてヴィーナスに手をかけようなんて思うんだ！」"

[[dialogue]]
speaker = "クロト"
# 「あの時の言葉は嘘だったのか！？　答えて、くれよ……っ！」
line = "「あの時の言葉は嘘だったのか！？　答えて、くれよ……っ！」"

[[dialogue]]
speaker = "unk"
# 抑えていた感情があふれ出す。
line = "抑えていた感情があふれ出す。"

[[dialogue]]
speaker = "unk"
# 俺は期待していたのだろう。彼もまた、なんらかの不可抗力によって操られているのかもしれないと。
line = "俺は期待していたのだろう。彼もまた、なんらかの不可抗力によって操られているのかもしれないと。"

[[dialogue]]
speaker = "unk"
# だが……
line = "だが……"

[[dialogue]]
speaker = "セイファート"
# 「当時の私の考えを語るのは易い。目の前の悪を倒していれば、飽くなき平和が手に入ると信じていた……青い理想だ」
line = "「当時の私の考えを語るのは易い。目の前の悪を倒していれば、飽くなき平和が手に入ると信じていた……青い理想だ」"

[[dialogue]]
speaker = "クロト"
# 「ッ……！　あくまで……<ruby=かえり>顧</ruby>みないって、いうのか」
line = "「ッ……！　あくまで……<ruby>顧<rt>かえり</rt></ruby>みないって、いうのか」"

[[dialogue]]
speaker = "セイファート"
# 「ああ。過去の私は過っていた。それだけだ」
line = "「ああ。過去の私は過っていた。それだけだ」"

[[dialogue]]
speaker = "unk"
# 彼には<ruby=とうかい>韜晦</ruby>も……改心もなかった。真っ直ぐに見返すその瞳に陰りはない。
line = "彼には<ruby>韜晦<rt>とうかい</rt></ruby>も……改心もなかった。真っ直ぐに見返すその瞳に陰りはない。"

[[dialogue]]
speaker = "セイファート"
# 「どうした？　その拳は、剣は飾りか？　生徒として──不甲斐ない教師に引導を渡すのなら、今しかないぞ？」
line = "「どうした？　その拳は、剣は飾りか？　生徒として──不甲斐ない教師に引導を渡すのなら、今しかないぞ？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ……っ！？」
line = "「ニャ……っ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「このままとどめを刺せっていうの──？」
line = "「このままとどめを刺せっていうの──？」"

[[dialogue]]
speaker = "フィオナ"
# 「待ってください──聞きたいことがまだ全く聞けていません！」
line = "「待ってください──聞きたいことがまだ全く聞けていません！」"

[[dialogue]]
speaker = "unk"
# セイファート──学園長──は、無防備に大手を広げてみせた。
line = "セイファート──学園長──は、無防備に大手を広げてみせた。"

[[dialogue]]
speaker = "セイファート"
# 「倒すべき敵なのだろう。許すべからざる相手だろう。それを殺す覚悟もなしに、のこのこと乗り込んできたのか？」
line = "「倒すべき敵なのだろう。許すべからざる相手だろう。それを殺す覚悟もなしに、のこのこと乗り込んできたのか？」"

[[dialogue]]
speaker = "クロト"
# 「……あなたの言う通りだ。俺たちはとうに覚悟を決めてきた」
line = "「……あなたの言う通りだ。俺たちはとうに覚悟を決めてきた」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっと、緋宮くん──っ！？」
line = "「ちょっと、緋宮くん──っ！？」"

[[dialogue]]
speaker = "unk"
# この拳を振り下ろす。少なくともそれで、<ruby=かたき>仇</ruby>としていた黒騎士は討てる。
line = "この拳を振り下ろす。少なくともそれで、<ruby>仇<rt>かたき</rt></ruby>としていた黒騎士は討てる。"

[[dialogue]]
speaker = "unk"
# 彼が憧れの騎士だったというのは俺の個人的な感情で、強大な力を持ちリクリエに加担する存在を、星徒会長として見逃すわけにはいかない。
line = "彼が憧れの騎士だったというのは俺の個人的な感情で、強大な力を持ちリクリエに加担する存在を、星徒会長として見逃すわけにはいかない。"

[[dialogue]]
speaker = "unk"
# なにより、同情も共感も、理解さえも。この漆黒の騎士は求めていなかった。
line = "なにより、同情も共感も、理解さえも。この漆黒の騎士は求めていなかった。"

[[dialogue]]
speaker = "クロト"
# （手を下すなら、俺がやるべきだ。他のみんなに、この役目を負わせるわけには──）
line = "（手を下すなら、俺がやるべきだ。他のみんなに、この役目を負わせるわけには──）"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ふざけんじゃないわよ」
line = "「……ふざけんじゃないわよ」"

[[dialogue]]
speaker = "unk"
# 無限にも等しい<ruby=しゅんじゅん>逡巡</ruby>が回り回った、その時──ヴィーナスが重たい口を開いた。
line = "無限にも等しい<ruby>逡巡<rt>しゅんじゅん</rt></ruby>が回り回った、その時──ヴィーナスが重たい口を開いた。"

[[dialogue]]
speaker = "セイファート"
# 「……ああ。デネブの娘──悪かったな。失望したか？」
line = "「……ああ。デネブの娘──悪かったな。失望したか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──違うわよ。謝る相手が違うでしょ」
line = "「──違うわよ。謝る相手が違うでしょ」"

[[dialogue]]
speaker = "セイファート"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……怒ってるわ。私。でも、それは私を連れ去ったとか、悪事を働いたとかじゃなくて」
line = "「……怒ってるわ。私。でも、それは私を連れ去ったとか、悪事を働いたとかじゃなくて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あんたが……クロトの想いを裏切ったこと。それだけは絶対に許せない」
line = "「あんたが……クロトの想いを裏切ったこと。それだけは絶対に許せない」"

[[dialogue]]
speaker = "クロト"
# 「ヴィー……ナス……」
line = "「ヴィー……ナス……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトはね──あんたを尊敬してたのよ！　新星に入学するずっと前から！」
line = "「クロトはね──あんたを尊敬してたのよ！　新星に入学するずっと前から！」"

[[dialogue]]
speaker = "セイファート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「会長になった次の日──私に教えてくれたわ。いつかの学園長の背中を見て、星騎士になるのを決めたんだって。御前試合が終わって、憧れのあんたがいることに気づいたんだって」
line = "「会長になった次の日──私に教えてくれたわ。いつかの学園長の背中を見て、星騎士になるのを決めたんだって。御前試合が終わって、憧れのあんたがいることに気づいたんだって」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なのに、そのあんたが……みっともなく開き直ってんじゃないわよ！」
line = "「なのに、そのあんたが……みっともなく開き直ってんじゃないわよ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは──過去に例を見ないほど、激昂していた。
line = "ヴィーナスは──過去に例を見ないほど、激昂していた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私のことなんてどうでもいいから──あんたはクロトにけじめをつけなさいよ！　負け逃げなんて、絶対に許さないんだから──！」
line = "「私のことなんてどうでもいいから──あんたはクロトにけじめをつけなさいよ！　負け逃げなんて、絶対に許さないんだから──！」"

[[dialogue]]
speaker = "セイファート"
# 「っっ……何──！？」
line = "「っっ……何──！？」"

[[dialogue]]
speaker = "unk"
# 黒騎士──否、セイファート学園長の握っていた『未来の日誌』が、突如として宙へ舞い上がった。
line = "黒騎士──否、セイファート学園長の握っていた『未来の日誌』が、突如として宙へ舞い上がった。"

[[dialogue]]
speaker = "クロト"
# （<ruby=ヴィーナス>持ち主</ruby>へ還っている──？　いや違う、これは……！）
line = "（<ruby>持ち主<rt>ヴィーナス</rt></ruby>へ還っている──？　いや違う、これは……！）"

[[dialogue]]
speaker = "ヴィーナス"
# 「デブだかデネブだかなんだか知らないけど──人のことほじくり返しといて、自分は黙秘なんてムシがよすぎるのよ」
line = "「デブだかデネブだかなんだか知らないけど──人のことほじくり返しといて、自分は黙秘なんてムシがよすぎるのよ」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ──ニャんニャのニャ、これは──！？」
line = "「ニャ──ニャんニャのニャ、これは──！？」"

[[dialogue]]
speaker = "クロト"
# 「光の星術──それも、<b>日誌そのものを媒体とした</b>──！？」
line = "「光の星術──それも、<b>日誌そのものを媒体とした</b>──！？」"

[[dialogue]]
speaker = "unk"
# 弾けた日誌のページ、その一枚一枚が粉雪のように舞い散っていく──そうして放たれた輝きは冥森林の一帯を包み込んだ。
line = "弾けた日誌のページ、その一枚一枚が粉雪のように舞い散っていく──そうして放たれた輝きは冥森林の一帯を包み込んだ。"

[[dialogue]]
speaker = "unk"
# 黒騎士の鎧、その中身を<ruby=ひょうはく>漂白</ruby>するかのように！
line = "黒騎士の鎧、その中身を<ruby>漂白<rt>ひょうはく</rt></ruby>するかのように！"

[[dialogue]]
speaker = "セイファート"
# 「なんだ──この波動は──っ……！」
line = "「なんだ──この波動は──っ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「暴かせてもらうわ、あんたの全部──そこでおとなしくしてなさい！」
line = "「暴かせてもらうわ、あんたの全部──そこでおとなしくしてなさい！」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは、白濁する光の中へとに呑み込まれた……。
line = "そうして俺たちは、白濁する光の中へとに呑み込まれた……。"
