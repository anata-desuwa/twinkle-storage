line = "「ちょっと我慢が効かなくなるとかそういうレベルじゃなくて、欲望駄々洩れ、煩悩一直線のおバカさんになっちゃうみたいです☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そして、感染者はその内に秘めた欲望を叶えるための歯止めが効かなくなり大暴走！　その欲望が叶うまでは、本人の意思ではまったく止まれないようです」
line = "「そして、感染者はその内に秘めた欲望を叶えるための歯止めが効かなくなり大暴走！　その欲望が叶うまでは、本人の意思ではまったく止まれないようです」"

[[dialogue]]
speaker = "ここあ"
