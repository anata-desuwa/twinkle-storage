[[dialogue]]
speaker = "トレジアンナ"
# 「まあ、見たまんまなんですが、感染者は理性が大幅に低下してしまうようですね～」
line = "「まあ、見たまんまなんですが、感染者は理性が大幅に低下してしまうようですね～」"

[[dialogue]]
speaker = "トレジアンナ"
