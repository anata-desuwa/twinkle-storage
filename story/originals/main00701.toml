[[dialogue]]
speaker = "unk"
# 第１話,臨時招集,B
line = "第１話,臨時招集,B"

[[dialogue]]
speaker = "unk"
# クロトら一行が組織『ネビュラ』と接触していた、そのとき。
line = "クロトら一行が組織『ネビュラ』と接触していた、そのとき。"

[[dialogue]]
speaker = "リノ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 天蓋は晴れ、空が戻った。
line = "天蓋は晴れ、空が戻った。"

[[dialogue]]
speaker = "unk"
# 高層マンションの一室からその様子を眺め、リノはふうとため息をつく。
line = "高層マンションの一室からその様子を眺め、リノはふうとため息をつく。"

[[dialogue]]
speaker = "unk"
# 星術の使えなかったほんの一瞬、街中にきらめいた魔の焔を──彼女は決して見逃さない。
line = "星術の使えなかったほんの一瞬、街中にきらめいた魔の焔を──彼女は決して見逃さない。"

[[dialogue]]
speaker = "リノ"
# 「無事に済んだのかしら。あなたに今さら、こんなこと言うのは無駄かもしれないけれど」
line = "「無事に済んだのかしら。あなたに今さら、こんなこと言うのは無駄かもしれないけれど」"

[[dialogue]]
speaker = "リノ"
# 「あまり……手厳しくしないでもらいたいわね。セドナ」
line = "「あまり……手厳しくしないでもらいたいわね。セドナ」"

[[dialogue]]
speaker = "unk"
# 一方──
line = "一方──"

[[dialogue]]
speaker = "セイファート"
# 「出席ご苦労──諸君。新星学園学園長、セイファートだ」
line = "「出席ご苦労──諸君。新星学園学園長、セイファートだ」"

[[dialogue]]
speaker = "セイファート"
# 「これよりは両学園合同による緊急会議を始める。議題は無論のこと、近日国内で起きている特殊な『異変』についてだ」
line = "「これよりは両学園合同による緊急会議を始める。議題は無論のこと、近日国内で起きている特殊な『異変』についてだ」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 『ネビュラ』の基地でひと悶着あった後。
line = "『ネビュラ』の基地でひと悶着あった後。"

[[dialogue]]
speaker = "unk"
# 俺は学園長から緊急の呼び出しに応じ、帰投してすぐこの場へ赴いていた。
line = "俺は学園長から緊急の呼び出しに応じ、帰投してすぐこの場へ赴いていた。"

[[dialogue]]
speaker = "セイファート"
# 「流星の学園長──ラティエ殿にも、本来は出席してもらうべきなのだが。例によってあの御仁は今も放浪中でな」
line = "「流星の学園長──ラティエ殿にも、本来は出席してもらうべきなのだが。例によってあの御仁は今も放浪中でな」"

[[dialogue]]
speaker = "セイファート"
# 「代わって星見会長には、会議後、全体への通達もお願いしたい。よいかな？」
line = "「代わって星見会長には、会議後、全体への通達もお願いしたい。よいかな？」"

[[dialogue]]
speaker = "フィオナ"
# 「──はい」
line = "「──はい」"

[[dialogue]]
speaker = "unk"
# フィオナは俺の隣で起立し、凛々しく返事をした。
line = "フィオナは俺の隣で起立し、凛々しく返事をした。"

[[dialogue]]
speaker = "クロト"
# （流星の学園長……か）
line = "（流星の学園長……か）"

[[dialogue]]
speaker = "unk"
# そういえば顔を合わせた覚えもないな。どんな人なのだろう。
line = "そういえば顔を合わせた覚えもないな。どんな人なのだろう。"

[[dialogue]]
speaker = "unk"
# 国内にはいないような口ぶりだったけど……今は気にすることでもないか。
line = "国内にはいないような口ぶりだったけど……今は気にすることでもないか。"

[[dialogue]]
speaker = "セイファート"
# 「諸君らも周知の通り──現在、流星市国には様々な異変が取り巻いている」
line = "「諸君らも周知の通り──現在、流星市国には様々な異変が取り巻いている」"

[[dialogue]]
speaker = "セイファート"
# 「これまでのリクリエ余波とは一線を画する、予断を許さない状況だ」
line = "「これまでのリクリエ余波とは一線を画する、予断を許さない状況だ」"

[[dialogue]]
speaker = "セイファート"
# 「エスメラルダ女史。今の状況をまとめてくれ」
line = "「エスメラルダ女史。今の状況をまとめてくれ」"

[[dialogue]]
speaker = "エスメラルダ"
# 「は。先ほど１５時１０分すぎより大規模なアステライトとモンスターの発生──」
line = "「は。先ほど１５時１０分すぎより大規模なアステライトとモンスターの発生──」"

[[dialogue]]
speaker = "エスメラルダ"
# 「それから３０分後には全世界から星術の実行が不可能化するという、停電にも似た現象が発生。しかしこれは、およそ３分で復旧しました」
line = "「それから３０分後には全世界から星術の実行が不可能化するという、停電にも似た現象が発生。しかしこれは、およそ３分で復旧しました」"

[[dialogue]]
speaker = "エスメラルダ"
# 「また、先日の『星読事変』と同様に『仮面の少女』なる存在も確認されており……」
line = "「また、先日の『星読事変』と同様に『仮面の少女』なる存在も確認されており……」"

[[dialogue]]
speaker = "エスメラルダ"
# 「リクリエの接近に伴って、異常事態の活性化が進んでいることは明白と考えられます」
line = "「リクリエの接近に伴って、異常事態の活性化が進んでいることは明白と考えられます」"

[[dialogue]]
speaker = "セイファート"
# 「ふむ。市街地の被害も尋常ではないと聞く」
line = "「ふむ。市街地の被害も尋常ではないと聞く」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 淡々としたエスメラルダ先生の説明を黙して聞く。
line = "淡々としたエスメラルダ先生の説明を黙して聞く。"

[[dialogue]]
speaker = "unk"
# 俺の隣にはフィオナ──その周りには、両学園の先生方がずらりと顔を揃えていた。
line = "俺の隣にはフィオナ──その周りには、両学園の先生方がずらりと顔を揃えていた。"

[[dialogue]]
speaker = "unk"
# ──『臨時招集』。
line = "──『臨時招集』。"

[[dialogue]]
speaker = "unk"
# そう称されたこの会合には、主に両学園の先生たちのみが出席を許されており、ものものしい雰囲気だ。
line = "そう称されたこの会合には、主に両学園の先生たちのみが出席を許されており、ものものしい雰囲気だ。"

[[dialogue]]
speaker = "unk"
# 星徒会でさえ出席できたのは会長職である俺とフィオナの２人だけ──
line = "星徒会でさえ出席できたのは会長職である俺とフィオナの２人だけ──"

[[dialogue]]
speaker = "unk"
# ヴィーナスは大層首を突っ込みたがっていたが、もう会長を降りた身なのでやむなく待機してもらった。
line = "ヴィーナスは大層首を突っ込みたがっていたが、もう会長を降りた身なのでやむなく待機してもらった。"

[[dialogue]]
speaker = "クロト"
# （重々しいな……当然だが）
line = "（重々しいな……当然だが）"

[[dialogue]]
speaker = "フィオナ"
# （臨時招集は滅多にかかるものではありません。当代になってからは、初めてです）
line = "（臨時招集は滅多にかかるものではありません。当代になってからは、初めてです）"

[[dialogue]]
speaker = "unk"
# それほどの緊急事態ということだろう。
line = "それほどの緊急事態ということだろう。"

[[dialogue]]
speaker = "unk"
# アポロの出現だけならまだしも、彼女の行使した『星術の停止』は俺たちの存在意義をも危ぶませるものだった。
line = "アポロの出現だけならまだしも、彼女の行使した『星術の停止』は俺たちの存在意義をも危ぶませるものだった。"

[[dialogue]]
speaker = "セイファート"
# 「なれば実際に最前線へ立ち、脅威を退けた彼らに話を聞こう。両星徒会、会長の諸君──」
line = "「なれば実際に最前線へ立ち、脅威を退けた彼らに話を聞こう。両星徒会、会長の諸君──」"

[[dialogue]]
speaker = "フィオナ"
# 「──はい。状況を説明します」
line = "「──はい。状況を説明します」"

[[dialogue]]
speaker = "unk"
# フィオナは立ち上がると、毅然とした面持ちで今回の交戦について報告した。
line = "フィオナは立ち上がると、毅然とした面持ちで今回の交戦について報告した。"

[[dialogue]]
speaker = "unk"
# 見たこともない魔獣が出てきたことや、アポロとギエルという指揮者が存在していたことについてだ。
line = "見たこともない魔獣が出てきたことや、アポロとギエルという指揮者が存在していたことについてだ。"

[[dialogue]]
speaker = "クロト"
# 「同じく新星会長、緋宮からも。この前の『星読』と合わせて得た知見をご報告します」
line = "「同じく新星会長、緋宮からも。この前の『星読』と合わせて得た知見をご報告します」"

[[dialogue]]
speaker = "unk"
# 俺は前回と今回に共通していたこと、また新たに確認された事項について話した。
line = "俺は前回と今回に共通していたこと、また新たに確認された事項について話した。"

[[dialogue]]
speaker = "セイファート"
# 「アポロ──ギエル──ふむ。後者の脅威度は低いようだが、マークしておくに越したことはないだろう」
line = "「アポロ──ギエル──ふむ。後者の脅威度は低いようだが、マークしておくに越したことはないだろう」"

[[dialogue]]
speaker = "セイファート"
# 「聞く限り、その少女が台風の目であるようだ。それに……『天蓋』、か」
line = "「聞く限り、その少女が台風の目であるようだ。それに……『天蓋』、か」"

[[dialogue]]
speaker = "トワ先生"
# 「あの時はわたしも本当にパニックでしたぁ～……。星術が使えなくなっちゃったら、もうどうしたらいいか……！」
line = "「あの時はわたしも本当にパニックでしたぁ～……。星術が使えなくなっちゃったら、もうどうしたらいいか……！」"

[[dialogue]]
speaker = "エスメラルダ"
# 「当時の状況を分析した結果──流星市国の星騎士たち全て、星との交信そのものが途絶えていたことが明らかになっています」
line = "「当時の状況を分析した結果──流星市国の星騎士たち全て、星との交信そのものが途絶えていたことが明らかになっています」"

[[dialogue]]
speaker = "エスメラルダ"
# 「言わずもがな、星術には守護星との交信が欠かせません。星とリンクできなければ星騎士としての能力は事実上すべて封じられます」
line = "「言わずもがな、星術には守護星との交信が欠かせません。星とリンクできなければ星騎士としての能力は事実上すべて封じられます」"

[[dialogue]]
speaker = "セイファート"
# 「天蓋──その名の通り、我々に対するフタというところか。由々しき事態だな」
line = "「天蓋──その名の通り、我々に対するフタというところか。由々しき事態だな」"

[[dialogue]]
speaker = "unk"
# これまでとは比べ物にならないアポロの脅威に、議論は白熱していく。
line = "これまでとは比べ物にならないアポロの脅威に、議論は白熱していく。"

[[dialogue]]
speaker = "unk"
# そうして、最終的に導き出された結論は……
line = "そうして、最終的に導き出された結論は……"

[[dialogue]]
speaker = "セイファート"
# 「これまでの情報を総合して──我々の取るべき手段はひとつ。仮面の少女──『アポロ』を抹殺することだ」
line = "「これまでの情報を総合して──我々の取るべき手段はひとつ。仮面の少女──『アポロ』を抹殺することだ」"

[[dialogue]]
speaker = "クロト"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 学園長は強い語気で、そう断言した。
line = "学園長は強い語気で、そう断言した。"

[[dialogue]]
speaker = "セイファート"
# 「アステラを始めとするリクリエ現象は──これからますます激化していくだろう」
line = "「アステラを始めとするリクリエ現象は──これからますます激化していくだろう」"

[[dialogue]]
speaker = "セイファート"
# 「もし、また同じ手段で我々の力がもがれてしまうようなら──なすすべなく壊滅の憂き目に遭いかねない。これまでの苦労など水泡となって」
line = "「もし、また同じ手段で我々の力がもがれてしまうようなら──なすすべなく壊滅の憂き目に遭いかねない。これまでの苦労など水泡となって」"

[[dialogue]]
speaker = "エスメラルダ"
# 「ええ。なるべく速やかに排除しなくては、星騎士そのものの存亡にかかわります」
line = "「ええ。なるべく速やかに排除しなくては、星騎士そのものの存亡にかかわります」"

[[dialogue]]
speaker = "unk"
# その決定に異を挟む者はいなかった。
line = "その決定に異を挟む者はいなかった。"

[[dialogue]]
speaker = "unk"
# だが、まだ……彼らは知らない。
line = "だが、まだ……彼らは知らない。"

[[dialogue]]
speaker = "unk"
# 仮面の少女アポロ──彼女の本当の<b>正体</b>については。
line = "仮面の少女アポロ──彼女の本当の<b>正体</b>については。"
