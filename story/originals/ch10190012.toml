[[dialogue]]
speaker = "unk"
# 第２話,忍者少女の好きなこと,P
line = "第２話,忍者少女の好きなこと,P"

[[dialogue]]
speaker = "unk"
# 昼食をとろうと大聖堂カフェテリアに行くと、席に腰掛け手を振る、九浄家メイド隊の２人の姿が目に入った――
line = "昼食をとろうと大聖堂カフェテリアに行くと、席に腰掛け手を振る、九浄家メイド隊の２人の姿が目に入った――"

[[dialogue]]
speaker = "せつな"
# 「主様～♪　今からお昼でござるか？」
line = "「主様～♪　今からお昼でござるか？」"

[[dialogue]]
speaker = "ヨミ"
# 「会長、こんにちは～。私達もこれから一緒に食べるところだったんです」
line = "「会長、こんにちは～。私達もこれから一緒に食べるところだったんです」"

[[dialogue]]
speaker = "せつな"
# 「せっかくですし、主様もご一緒にいかがでしょうか？　せつな、主様にお聞きしたいこともあったのでござる」
line = "「せっかくですし、主様もご一緒にいかがでしょうか？　せつな、主様にお聞きしたいこともあったのでござる」"

[[dialogue]]
speaker = "unk"
# それじゃあ、同席させて貰うよ
line = "それじゃあ、同席させて貰うよ"

[[dialogue]]
speaker = "せつな"
# 「でしたら、ささっ、どうぞこちらへ。注文は決まっておりますか？　せつなが料理を取って参りまする！」
line = "「でしたら、ささっ、どうぞこちらへ。注文は決まっておりますか？　せつなが料理を取って参りまする！」"

[[dialogue]]
speaker = "せつな"
# 「そんな遠慮なさらず。これぞ主様を支える忍の役目。是非、ご命令下さいませ♪」
line = "「そんな遠慮なさらず。これぞ主様を支える忍の役目。是非、ご命令下さいませ♪」"

[[dialogue]]
speaker = "ヨミ"
# 「ふふっ、せつなさん、嬉しそう♪　いつか主様が出来たらって、ずっと言ってましたもんね」
line = "「ふふっ、せつなさん、嬉しそう♪　いつか主様が出来たらって、ずっと言ってましたもんね」"

[[dialogue]]
speaker = "せつな"
# 「はいっ♪　なので今は、毎日が充実していて、とても楽しいのでござる♪」
line = "「はいっ♪　なので今は、毎日が充実していて、とても楽しいのでござる♪」"

[[dialogue]]
speaker = "unk"
# それから、せつなが料理を取って来てくれて、３人で世間話を楽しみながら昼食をとっていると、ふと思い出した。
line = "それから、せつなが料理を取って来てくれて、３人で世間話を楽しみながら昼食をとっていると、ふと思い出した。"

[[dialogue]]
speaker = "unk"
# 何か俺に聞きたいことがあるって？
line = "何か俺に聞きたいことがあるって？"

[[dialogue]]
speaker = "せつな"
# 「おおっ、そうでした。実はせつな、主様のことをもっと知りたいと思っていたのでござる。忍として主様との絆を深める為にも！」
line = "「おおっ、そうでした。実はせつな、主様のことをもっと知りたいと思っていたのでござる。忍として主様との絆を深める為にも！」"

[[dialogue]]
speaker = "せつな"
# 「主様もせつなに聞きたいことがあるのでござるか？　もちろん、何なりとお聞き下さいませ」
line = "「主様もせつなに聞きたいことがあるのでござるか？　もちろん、何なりとお聞き下さいませ」"

[[dialogue]]
speaker = "せつな"
# 「ほうほう、せつなの趣味嗜好でござるか」
line = "「ほうほう、せつなの趣味嗜好でござるか」"

[[dialogue]]
speaker = "unk"
# 同僚の趣味には興味があるようで、ヨミも緑茶を飲みながらせつなの話に耳を傾けて──
line = "同僚の趣味には興味があるようで、ヨミも緑茶を飲みながらせつなの話に耳を傾けて──"

[[dialogue]]
speaker = "せつな"
# 「好きなことは○○○○とエロ本集め。特技は房中術でござる！」
line = "「好きなことは○○○○とエロ本集め。特技は房中術でござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「ぶほっ！？　げほっ、げほごほっ！」
line = "「ぶほっ！？　げほっ、げほごほっ！」"

[[dialogue]]
speaker = "unk"
# ちょっ！？　そんな大声で、堂々と……！
line = "ちょっ！？　そんな大声で、堂々と……！"

[[dialogue]]
speaker = "ヨミ"
# 「こんな真昼間の公共の場で、なんて恥ずかしいことを話してるんですか！」
line = "「こんな真昼間の公共の場で、なんて恥ずかしいことを話してるんですか！」"

[[dialogue]]
speaker = "せつな"
# 「にゃんと！？　エロは別に恥ずかしいことなんかじゃないでござる！」
line = "「にゃんと！？　エロは別に恥ずかしいことなんかじゃないでござる！」"

[[dialogue]]
speaker = "せつな"
# 「年頃の男女であれば、内心誰しもエロに興味は抱くもの。それは何もおかしいことなど無いはずでござる」
line = "「年頃の男女であれば、内心誰しもエロに興味は抱くもの。それは何もおかしいことなど無いはずでござる」"

[[dialogue]]
speaker = "せつな"
# 「確かにまだ親しくない相手、気を使う間柄では積極的に口にしない話題かもしれぬでござるが……今ここに居るのは、友であるヨミ殿と、忠義を捧げる主様でありますれば！」
line = "「確かにまだ親しくない相手、気を使う間柄では積極的に口にしない話題かもしれぬでござるが……今ここに居るのは、友であるヨミ殿と、忠義を捧げる主様でありますれば！」"

[[dialogue]]
speaker = "せつな"
# 「せつなは好きなものを問われれば、真正面からエロを語るでござる！　己が定めた掟を貫く……それがせつなの忍道であるが故に！」
line = "「せつなは好きなものを問われれば、真正面からエロを語るでござる！　己が定めた掟を貫く……それがせつなの忍道であるが故に！」"

[[dialogue]]
speaker = "せつな"
# 「温泉に入る時、洗い場で体を隠すことを咎める者はおりませぬ。しかし、いざ湯舟に浸かると決めたならば、タオルは取らねばなりませぬ！」
line = "「温泉に入る時、洗い場で体を隠すことを咎める者はおりませぬ。しかし、いざ湯舟に浸かると決めたならば、タオルは取らねばなりませぬ！」"

[[dialogue]]
speaker = "せつな"
# 「それが裸の付き合いというもの！　故にこの身は、エロに対して一片の恥じらいも無し！　せつなはただ、湯舟でタオルを取り去るだけにござる！」
line = "「それが裸の付き合いというもの！　故にこの身は、エロに対して一片の恥じらいも無し！　せつなはただ、湯舟でタオルを取り去るだけにござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「こ、神々しいまでの姿……！　ごめんなさい。私、深く考えず、反射的にせつなさんを批判してしまいました……」
line = "「こ、神々しいまでの姿……！　ごめんなさい。私、深く考えず、反射的にせつなさんを批判してしまいました……」"

[[dialogue]]
speaker = "ヨミ"
# 「確かに私も、エッチなことに対する興味というか、人には言えないような性癖がありますし……」
line = "「確かに私も、エッチなことに対する興味というか、人には言えないような性癖がありますし……」"

[[dialogue]]
speaker = "せつな"
# 「そうなのでござるか？　せっかくの機会、よければ打ち明けてみてはどうでござるか？」
line = "「そうなのでござるか？　せっかくの機会、よければ打ち明けてみてはどうでござるか？」"

[[dialogue]]
speaker = "ヨミ"
# 「はい……実は私は――」
line = "「はい……実は私は――」"

[[dialogue]]
speaker = "unk"
# えっ、ヨミちょっと待っ……
line = "えっ、ヨミちょっと待っ……"

[[dialogue]]
speaker = "ヨミ"
# 「匂いフェチで、他の人の匂いを嗅ぐのが好きなんです……！」
line = "「匂いフェチで、他の人の匂いを嗅ぐのが好きなんです……！」"

[[dialogue]]
speaker = "せつな"
# 「わかるでござる！　せつなも最近は、主様の匂いにハマっておりまする！」
line = "「わかるでござる！　せつなも最近は、主様の匂いにハマっておりまする！」"

[[dialogue]]
speaker = "ヨミ"
# 「た、確かに会長の匂いは、私も最近少し気になってたり……」
line = "「た、確かに会長の匂いは、私も最近少し気になってたり……」"

[[dialogue]]
speaker = "unk"
# それは俺が聞いていい話題なのか！？
line = "それは俺が聞いていい話題なのか！？"

[[dialogue]]
speaker = "せつな"
# 「ちなみに、ヨミ殿は匂いフェチとして、どんなシチュエーションがお好みでござるか？」
line = "「ちなみに、ヨミ殿は匂いフェチとして、どんなシチュエーションがお好みでござるか？」"

[[dialogue]]
speaker = "せつな"
# 「せつなとしては朝に主様の布団へ忍び込み、にゃんにゃんしながら起こしてみたいでござる！」
line = "「せつなとしては朝に主様の布団へ忍び込み、にゃんにゃんしながら起こしてみたいでござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「それは良いですね……！　ただ、出来れば私は、相手を起こしてから、お互いの気持ちを確認し合いながらの方が、もっと素敵かなって……」
line = "「それは良いですね……！　ただ、出来れば私は、相手を起こしてから、お互いの気持ちを確認し合いながらの方が、もっと素敵かなって……」"

[[dialogue]]
speaker = "ヨミ"
# 「相手の匂いを好きだと伝えて、その人も同じように私の匂いを好きだと言ってくれて、そんな好きな匂いが混じり合った布団の中でキスをして、その後は……えへへ……<emoji=heart04>」
line = "「相手の匂いを好きだと伝えて、その人も同じように私の匂いを好きだと言ってくれて、そんな好きな匂いが混じり合った布団の中でキスをして、その後は……えへへ……<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「へ……」
line = "「へ……」"

[[dialogue]]
speaker = "せつな"
# 「変態でござるーーーーっ！！！」
line = "「変態でござるーーーーっ！！！」"

[[dialogue]]
speaker = "ヨミ"
# 「えぇっ！？　どこがですか！　せつなさんのシチュエーションとちょっと違うだけですよね！？」
line = "「えぇっ！？　どこがですか！　せつなさんのシチュエーションとちょっと違うだけですよね！？」"

[[dialogue]]
speaker = "せつな"
# 「そんな、好きと言い合ったりとか、キスをしたりとかは、大人がする恋愛でござる！　エッチ過ぎて、どう考えてもアウトでござるっ！！！」
line = "「そんな、好きと言い合ったりとか、キスをしたりとかは、大人がする恋愛でござる！　エッチ過ぎて、どう考えてもアウトでござるっ！！！」"

[[dialogue]]
speaker = "unk"
# エッチの基準おかしくない！？
line = "エッチの基準おかしくない！？"

[[dialogue]]
speaker = "ヨミ"
# 「房中術とか○○○○とか堂々と言ってたじゃないですか！？」
line = "「房中術とか○○○○とか堂々と言ってたじゃないですか！？」"

[[dialogue]]
speaker = "せつな"
# 「恋愛とエロは別物にござる！　恋愛は結婚を前提にした、大人の男女がするものなのでござる！」
line = "「恋愛とエロは別物にござる！　恋愛は結婚を前提にした、大人の男女がするものなのでござる！」"

[[dialogue]]
speaker = "せつな"
# 「恋愛はまだ、せつなにはまだ早いのでござるぅ～～～～～～っ！！！」
line = "「恋愛はまだ、せつなにはまだ早いのでござるぅ～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# 恋愛とエロの羞恥心の基準が逆！！
line = "恋愛とエロの羞恥心の基準が逆！！"

[[dialogue]]
speaker = "ヨミ"
# 「ちょっと、せつなさん！？　こ、これじゃまるで――」
line = "「ちょっと、せつなさん！？　こ、これじゃまるで――」"

[[dialogue]]
speaker = "ヨミ"
# 「逃げられた私が、とんでもない変態みたいじゃないですかっ！　こやぁぁぁ～～～～～～んっ！！！」
line = "「逃げられた私が、とんでもない変態みたいじゃないですかっ！　こやぁぁぁ～～～～～～んっ！！！」"

[[dialogue]]
speaker = "unk"
# 残されたヨミの魂の叫びが、空へと響き渡るのだった。
line = "残されたヨミの魂の叫びが、空へと響き渡るのだった。"
