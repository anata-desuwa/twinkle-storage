[[dialogue]]
speaker = "ニャリオン"
# 「ニャんニャと！？」
line = "「ニャんニャと！？」"

[[dialogue]]
speaker = "ルリエル"
# 「あはは、ニャリオンさんよわーい！　人がやられてるのを見るのは楽しいですぅ」
