[[dialogue]]
speaker = "セーラ"
# 「常識っしょ～。ルリちーはまだ人間の遊びに慣れてないかな～？」
line = "「常識っしょ～。ルリちーはまだ人間の遊びに慣れてないかな～？」"

[[dialogue]]
speaker = "ルリエル"
# 「あああっ！　そんなこと言ってまたドロー<ruby=ナイン>９</ruby>！　セーラ先輩の鬼！　悪魔！」
line = "「あああっ！　そんなこと言ってまたドロー<ruby>９<rt>ナイン</rt></ruby>！　セーラ先輩の鬼！　悪魔！」"

[[dialogue]]
speaker = "ニャリオン"
