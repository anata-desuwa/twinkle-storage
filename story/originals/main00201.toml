[[dialogue]]
speaker = "unk"
# 第１話,もうひとつの日常,B
line = "第１話,もうひとつの日常,B"

[[dialogue]]
speaker = "unk"
# 流星市国の中枢である学園都市──
line = "流星市国の中枢である学園都市──"

[[dialogue]]
speaker = "unk"
# 幾多もの星騎士を排出するそこは、広大な敷地に姉妹校となる２つの学園を構えていた。
line = "幾多もの星騎士を排出するそこは、広大な敷地に姉妹校となる２つの学園を構えていた。"

[[dialogue]]
speaker = "unk"
# ひとつは６年前に新設された『新星学園』。
line = "ひとつは６年前に新設された『新星学園』。"

[[dialogue]]
speaker = "unk"
# そしてもうひとつは、遥か昔からこの地に根ざした歴史と伝統の学び舎──
line = "そしてもうひとつは、遥か昔からこの地に根ざした歴史と伝統の学び舎──"

[[dialogue]]
speaker = "unk"
# 『流星学園』であった。
line = "『流星学園』であった。"

[[dialogue]]
speaker = "ルリエル"
# 「──ラスト！　はい！　はい！　これで手札ゼロ！　わたしの勝ちですやったー！」
line = "「──ラスト！　はい！　はい！　これで手札ゼロ！　わたしの勝ちですやったー！」"

[[dialogue]]
speaker = "ユウリ"
# 「はい残ね～ん！　ＵＭＯって言ってなーい！　ペナルティ４枚追加ー！」
line = "「はい残ね～ん！　ＵＭＯって言ってなーい！　ペナルティ４枚追加ー！」"

[[dialogue]]
speaker = "ルリエル"
# 「へ、へぇっ！？　そんなの聞いてないです！　ずるい！　極悪！　陰謀！」
