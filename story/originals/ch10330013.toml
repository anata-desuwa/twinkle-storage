[[dialogue]]
speaker = "unk"
# 第３話,強さの向こうに,P
line = "第３話,強さの向こうに,P"

[[dialogue]]
speaker = "アニュラス"
# 「……どうやら収まったようだな」
line = "「……どうやら収まったようだな」"

[[dialogue]]
speaker = "アニュラス"
# 「怪我人はいないかっ！？　いたらあちらの救護班のところへ連れていってくれ！」
line = "「怪我人はいないかっ！？　いたらあちらの救護班のところへ連れていってくれ！」"

[[dialogue]]
speaker = "アニュラス"
# （……怪我人がゼロ、とはいかないか。私もまだまだ未熟だ）
line = "（……怪我人がゼロ、とはいかないか。私もまだまだ未熟だ）"

[[dialogue]]
speaker = "アニュラス"
# （驕りは捨てろ。また今日から鍛錬のやり直しだ）
line = "（驕りは捨てろ。また今日から鍛錬のやり直しだ）"

[[dialogue]]
speaker = "unk"
# アニュラス！　大丈夫か！
line = "アニュラス！　大丈夫か！"

[[dialogue]]
speaker = "アニュラス"
# 「ん……新星の会長か。大丈夫だ。そっちこそアステラの攻略は大丈夫だったのか？　流星の星徒会も出動していたみたいだが」
line = "「ん……新星の会長か。大丈夫だ。そっちこそアステラの攻略は大丈夫だったのか？　流星の星徒会も出動していたみたいだが」"

[[dialogue]]
speaker = "アニュラス"
# 「……心配はない、か。星徒会のメンバーはみな、実力者ばかりだものな」
line = "「……心配はない、か。星徒会のメンバーはみな、実力者ばかりだものな」"

[[dialogue]]
speaker = "アニュラス"
# 「私にはまだ実力が足りていない、というのは重々承知している。いつか、アステラの攻略に参加させてもらえるだろうか……」
line = "「私にはまだ実力が足りていない、というのは重々承知している。いつか、アステラの攻略に参加させてもらえるだろうか……」"

[[dialogue]]
speaker = "unk"
# 実力不足なんてことは、ないと思うよ
line = "実力不足なんてことは、ないと思うよ"

[[dialogue]]
speaker = "アニュラス"
# 「いや、すまない。少し弱気になって、変なことを口にした。あくまでも目標の話だ。それに、星徒会に入ること自体には興味がない」
line = "「いや、すまない。少し弱気になって、変なことを口にした。あくまでも目標の話だ。それに、星徒会に入ること自体には興味がない」"

[[dialogue]]
speaker = "アニュラス"
# 「お父様のような星騎士になるためには、実力を示して星徒会入りを目指すべきなのかもしれないが……」
line = "「お父様のような星騎士になるためには、実力を示して星徒会入りを目指すべきなのかもしれないが……」"

[[dialogue]]
speaker = "アニュラス"
# 「事務仕事のようなことをしている時間がもったいない。私は、強くならなければならないのだ」
line = "「事務仕事のようなことをしている時間がもったいない。私は、強くならなければならないのだ」"

[[dialogue]]
speaker = "unk"
# どうしてそんなに、強さにこだわるんだ？
line = "どうしてそんなに、強さにこだわるんだ？"

[[dialogue]]
speaker = "アニュラス"
# 「む……まあ、お前になら話してもいいか」
line = "「む……まあ、お前になら話してもいいか」"

[[dialogue]]
speaker = "アニュラス"
# 「……私の母の話だ。母は魔族で、実は自分は魔族と人間のハーフなのだ」
line = "「……私の母の話だ。母は魔族で、実は自分は魔族と人間のハーフなのだ」"

[[dialogue]]
speaker = "unk"
# そうだったのか。初めて知った
line = "そうだったのか。初めて知った"

[[dialogue]]
speaker = "アニュラス"
# 「あまり大っぴらに話すようなことでもないからな」
line = "「あまり大っぴらに話すようなことでもないからな」"

[[dialogue]]
speaker = "アニュラス"
# 「……母も父と同じく、魔界で無双の強さを誇っていた武人だった。話にしか聞いたことはないが、『戦姫』と呼ばれ賞賛されていたほどだったらしい」
line = "「……母も父と同じく、魔界で無双の強さを誇っていた武人だった。話にしか聞いたことはないが、『戦姫』と呼ばれ賞賛されていたほどだったらしい」"

[[dialogue]]
speaker = "アニュラス"
# 「話にしか聞いたことがないというのは、私が生まれてすぐ、母は亡くなったからだ」
line = "「話にしか聞いたことがないというのは、私が生まれてすぐ、母は亡くなったからだ」"

[[dialogue]]
speaker = "アニュラス"
# 「かつてないほど大規模なアステラが発生し、そのアステラでの戦いで戦死した……と聞かされている」
line = "「かつてないほど大規模なアステラが発生し、そのアステラでの戦いで戦死した……と聞かされている」"

[[dialogue]]
speaker = "アニュラス"
# 「だが、死体も見つかっていないし、死亡したところを見た人物もいない」
line = "「だが、死体も見つかっていないし、死亡したところを見た人物もいない」"

[[dialogue]]
speaker = "アニュラス"
# 「要するに、状況としては行方不明、なんだ。お父様も亡くなったと言っているから、疑いたくはないのだが……」
line = "「要するに、状況としては行方不明、なんだ。お父様も亡くなったと言っているから、疑いたくはないのだが……」"

[[dialogue]]
speaker = "アニュラス"
# 「――私はまだ、どこかで母が生きているんじゃないかと考えているんだ」
line = "「――私はまだ、どこかで母が生きているんじゃないかと考えているんだ」"

[[dialogue]]
speaker = "アニュラス"
# 「そしてその真相は、この学園や、アステラに隠されていると思っている。……といっても正直、まだ見当もついていないんだがな」
line = "「そしてその真相は、この学園や、アステラに隠されていると思っている。……といっても正直、まだ見当もついていないんだがな」"

[[dialogue]]
speaker = "unk"
# お母さんを探したくて、アステラに？
line = "お母さんを探したくて、アステラに？"

[[dialogue]]
speaker = "アニュラス"
# 「……それもある。だが、私が強さにこだわるのは、仮に母が生きていて、もし何か窮地に立たされていたのだとしたら――」
line = "「……それもある。だが、私が強さにこだわるのは、仮に母が生きていて、もし何か窮地に立たされていたのだとしたら――」"

[[dialogue]]
speaker = "アニュラス"
# 「私が母を助け出す、その強さを身に着けておかなければならないからだ」
line = "「私が母を助け出す、その強さを身に着けておかなければならないからだ」"

[[dialogue]]
speaker = "アニュラス"
# 「星徒会に入りたくないのも、この調査の時間を奪われてはたまらないからだ」
line = "「星徒会に入りたくないのも、この調査の時間を奪われてはたまらないからだ」"

[[dialogue]]
speaker = "アニュラス"
# 「私には私のやらなければならないことがある、ということだ」
line = "「私には私のやらなければならないことがある、ということだ」"

[[dialogue]]
speaker = "アニュラス"
# 「けが人の搬送まで手伝ってくれて感謝する。私もまだまだ未熟だ。今後より一層精進しなければな」
line = "「けが人の搬送まで手伝ってくれて感謝する。私もまだまだ未熟だ。今後より一層精進しなければな」"

[[dialogue]]
speaker = "アニュラス"
# 「とは言え、頑張ったのは事実だ。反省すべきことは反省するとして、それとは別に自分に褒美をやらなければな」
line = "「とは言え、頑張ったのは事実だ。反省すべきことは反省するとして、それとは別に自分に褒美をやらなければな」"

[[dialogue]]
speaker = "unk"
# それは、チョコレート？
line = "それは、チョコレート？"

[[dialogue]]
speaker = "アニュラス"
# 「うむ。頑張ったらチョコレートを食べる。自分へのご褒美だ」
line = "「うむ。頑張ったらチョコレートを食べる。自分へのご褒美だ」"

[[dialogue]]
speaker = "アニュラス"
# 「新星の会長は、自分にご褒美を用意していたりしないのか？」
line = "「新星の会長は、自分にご褒美を用意していたりしないのか？」"

[[dialogue]]
speaker = "アニュラス"
# 「特にない？　そうか。なら私のチョコレートをわけてやろう。ほら、手を出せ。一口サイズの小さいものだが、とっても甘いぞ？」
line = "「特にない？　そうか。なら私のチョコレートをわけてやろう。ほら、手を出せ。一口サイズの小さいものだが、とっても甘いぞ？」"

[[dialogue]]
speaker = "アニュラス"
# 「では、いただきます。あーーんっ……んくっ」
line = "「では、いただきます。あーーんっ……んくっ」"

[[dialogue]]
speaker = "unk"
# 俺も、いただきます
line = "俺も、いただきます"

[[dialogue]]
speaker = "アニュラス"
# 「んふふふ……甘いな。昔、お父様が鍛錬の後にご褒美としてくれたんだ。それ以来、ずっとこうしている」
line = "「んふふふ……甘いな。昔、お父様が鍛錬の後にご褒美としてくれたんだ。それ以来、ずっとこうしている」"

[[dialogue]]
speaker = "アニュラス"
# 「思えば、こうして人と一緒に食べたのは初めてだな……どうだ？　ご褒美の味は。明日からもまた頑張ろうという気にならないか？」
line = "「思えば、こうして人と一緒に食べたのは初めてだな……どうだ？　ご褒美の味は。明日からもまた頑張ろうという気にならないか？」"

[[dialogue]]
speaker = "unk"
# ああ、頑張ろうって気になってきた
line = "ああ、頑張ろうって気になってきた"

[[dialogue]]
speaker = "アニュラス"
# 「……ふふ、それはよかった。私の貴重なチョコレートをわけ与えた甲斐があったというものだ」
line = "「……ふふ、それはよかった。私の貴重なチョコレートをわけ与えた甲斐があったというものだ」"

[[dialogue]]
speaker = "アニュラス"
# 「自分を高めるために極限まで追い込むことも必要だが、たまの褒美をあげてやらないと潰れてしまうからな」
line = "「自分を高めるために極限まで追い込むことも必要だが、たまの褒美をあげてやらないと潰れてしまうからな」"

[[dialogue]]
speaker = "アニュラス"
# 「お父様の教えだ」
line = "「お父様の教えだ」"

[[dialogue]]
speaker = "アニュラス"
# 「さあ、事後処理を済ませたら少し鍛錬するか。お前も一緒にどうだ？　学園の外周を１０周ほど走り込もうと思うのだが」
line = "「さあ、事後処理を済ませたら少し鍛錬するか。お前も一緒にどうだ？　学園の外周を１０周ほど走り込もうと思うのだが」"

[[dialogue]]
speaker = "unk"
# ……さすがにもう頑張れない
line = "……さすがにもう頑張れない"

[[dialogue]]
speaker = "アニュラス"
# 「チョコレートをわけてやっただろう？　それに稽古をつけるとも約束したな？」
line = "「チョコレートをわけてやっただろう？　それに稽古をつけるとも約束したな？」"

[[dialogue]]
speaker = "アニュラス"
# 「というわけで、これも稽古だ！　ほら、一緒に走るぞ！」
line = "「というわけで、これも稽古だ！　ほら、一緒に走るぞ！」"

[[dialogue]]
speaker = "unk"
# そう言って、アニュラスは俺の手を取って走り出す。
line = "そう言って、アニュラスは俺の手を取って走り出す。"

[[dialogue]]
speaker = "unk"
# 表情は仮面でわからないけれど、何だか楽しそうに見えたのだった。
line = "表情は仮面でわからないけれど、何だか楽しそうに見えたのだった。"
