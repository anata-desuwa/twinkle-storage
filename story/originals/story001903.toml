[[dialogue]]
speaker = "アイリーン"
# 「こちら、魔界～、魔界～。降り口は左側でーす」
line = "「こちら、魔界～、魔界～。降り口は左側でーす」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はい到着～っと。魔界に来るのも何回目かしら？　ちょっとした小旅行気分だわ」
line = "「はい到着～っと。魔界に来るのも何回目かしら？　ちょっとした小旅行気分だわ」"

[[dialogue]]
speaker = "舞亜"
# 「うん、飛行機で移動するより、楽なくらいかも。時差ボケとか大変なんだよね」
line = "「うん、飛行機で移動するより、楽なくらいかも。時差ボケとか大変なんだよね」"

[[dialogue]]
speaker = "アイリーン"
# 「流石は世界を股にかけるフィギュアスケーターだねー。舞亜さんの名前はネビュラでも知られてるよ。あとでサインもらってもいい？」
line = "「流石は世界を股にかけるフィギュアスケーターだねー。舞亜さんの名前はネビュラでも知られてるよ。あとでサインもらってもいい？」"

[[dialogue]]
speaker = "舞亜"
# 「いーよー。サインなんて書いても減るものじゃないしね」
line = "「いーよー。サインなんて書いても減るものじゃないしね」"

[[dialogue]]
speaker = "フィオナ"
# 「油断は禁物ですよ。相手は守護天使最後の一柱、容易に倒せる相手ではありません」
line = "「油断は禁物ですよ。相手は守護天使最後の一柱、容易に倒せる相手ではありません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもトリシャが占った目標ポイントまではまだ距離があるし、今から緊張しても仕方ないわ。お気楽なくらいでちょうどいいのよ」
line = "「でもトリシャが占った目標ポイントまではまだ距離があるし、今から緊張しても仕方ないわ。お気楽なくらいでちょうどいいのよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「そーそー！　難しいこと考えてても始まらないしね！」
line = "「そーそー！　難しいこと考えてても始まらないしね！」"

[[dialogue]]
speaker = "フィオナ"
# 「……今回選出されたメンバー、随分とマイペースな方が多いような……緋宮会長、ソフィア、頑張りましょう」
line = "「……今回選出されたメンバー、随分とマイペースな方が多いような……緋宮会長、ソフィア、頑張りましょう」"

[[dialogue]]
speaker = "ソフィア"
# 「はい……なんだか、世界の命運を背負っているとは思えない雰囲気ですね……」
line = "「はい……なんだか、世界の命運を背負っているとは思えない雰囲気ですね……」"

[[dialogue]]
speaker = "舞亜"
# 「でも、世界が終わる瞬間っていうのは、案外こういうものなのかもしれないね」
line = "「でも、世界が終わる瞬間っていうのは、案外こういうものなのかもしれないね」"

[[dialogue]]
speaker = "舞亜"
# 「みんながパニックになるわけでもなく、いつも通りの日常が突然プツンと途切れて、あーあ終わっちゃった、みたいな」
line = "「みんながパニックになるわけでもなく、いつも通りの日常が突然プツンと途切れて、あーあ終わっちゃった、みたいな」"

[[dialogue]]
speaker = "ソフィア"
# 「トリシャさんが気づいてくれてなかったら、そうなっていたかもしれません。恐ろしい限りです」
line = "「トリシャさんが気づいてくれてなかったら、そうなっていたかもしれません。恐ろしい限りです」"

[[dialogue]]
speaker = "フィオナ"
# 「やらせませんよ。明るく楽しくいつも通りの新年を迎えるために、私たちはここまで来たんです」
line = "「やらせませんよ。明るく楽しくいつも通りの新年を迎えるために、私たちはここまで来たんです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いい意気込み表明ね！　ついでに来年の抱負もどうぞ！　未来に希望があれば、もーっと頑張れるでしょ」
line = "「いい意気込み表明ね！　ついでに来年の抱負もどうぞ！　未来に希望があれば、もーっと頑張れるでしょ」"

[[dialogue]]
speaker = "フィオナ"
# 「ら、来年の抱負ですか……？　突然言われても……ソフィアは何かある？」
line = "「ら、来年の抱負ですか……？　突然言われても……ソフィアは何かある？」"

[[dialogue]]
speaker = "ソフィア"
# 「私は年が明けたら……しばらく会えてないので、姉さんとお出かけがしたいですね。水族館かプラネタリウムがいいです」
line = "「私は年が明けたら……しばらく会えてないので、姉さんとお出かけがしたいですね。水族館かプラネタリウムがいいです」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、それは楽しみだね。舞亜さんは何かありますか？」
line = "「ふふ、それは楽しみだね。舞亜さんは何かありますか？」"

[[dialogue]]
speaker = "舞亜"
# 「私……？　うーん……ここ最近ね、演技の表現が伸び悩んでいるの」
line = "「私……？　うーん……ここ最近ね、演技の表現が伸び悩んでいるの」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜が伸び悩み……！？　この前も世界大会で金メダルを取ってたのに……」
line = "「舞亜が伸び悩み……！？　この前も世界大会で金メダルを取ってたのに……」"

[[dialogue]]
speaker = "舞亜"
# 「うーん……そういうのじゃなくてさ、自分の中の変化がないっていうか」
line = "「うーん……そういうのじゃなくてさ、自分の中の変化がないっていうか」"

[[dialogue]]
speaker = "舞亜"
# 「マンネリ化してるのかな。目新しさがなくなっちゃってるのが、自分でもわかるんだよね」
line = "「マンネリ化してるのかな。目新しさがなくなっちゃってるのが、自分でもわかるんだよね」"

[[dialogue]]
speaker = "ソフィア"
# 「舞亜は大会出場数もトップクラスだから、披露する回数が多い以上、似通っちゃうのも仕方ないんじゃない？」
line = "「舞亜は大会出場数もトップクラスだから、披露する回数が多い以上、似通っちゃうのも仕方ないんじゃない？」"

[[dialogue]]
speaker = "舞亜"
# 「それはそうなんだけどね。小さい頃からやってきた弊害かな。自分を包んでる殻がカチカチに固まっちゃってて、内側からはなかなか壊せなくなってるっていうか……」
line = "「それはそうなんだけどね。小さい頃からやってきた弊害かな。自分を包んでる殻がカチカチに固まっちゃってて、内側からはなかなか壊せなくなってるっていうか……」"

[[dialogue]]
speaker = "ウズメイア"
# 「ちょっち不謹慎だけど、子役からデビューした俳優さんが、いつまでも子役のままのイメージで……やがて消えてっちゃう～、みたいな？」
line = "「ちょっち不謹慎だけど、子役からデビューした俳優さんが、いつまでも子役のままのイメージで……やがて消えてっちゃう～、みたいな？」"

[[dialogue]]
speaker = "舞亜"
# 「あー、うん。わりと近いかも。スケート選手としての柊舞亜の寿命はもう長くないのかもね」
line = "「あー、うん。わりと近いかも。スケート選手としての柊舞亜の寿命はもう長くないのかもね」"

[[dialogue]]
speaker = "ソフィア"
# 「そ、そんなこと言わないで！　舞亜の演技はのびやかで、優雅で……私の目標で……とにかく、まだまだ舞えるんだから！　引退なんて早まらないで！」
line = "「そ、そんなこと言わないで！　舞亜の演技はのびやかで、優雅で……私の目標で……とにかく、まだまだ舞えるんだから！　引退なんて早まらないで！」"

[[dialogue]]
speaker = "舞亜"
# 「もちろん。だからあがいてるつもりだし、そうならないよう新しいインスピレーションが欲しいんだよね」
line = "「もちろん。だからあがいてるつもりだし、そうならないよう新しいインスピレーションが欲しいんだよね」"

[[dialogue]]
speaker = "舞亜"
# 「内なる情熱をかき立てる……今までの全てをリセットして、生まれ変わったかのような新しい表現……そう簡単には見つけられないだろうけど」
line = "「内なる情熱をかき立てる……今までの全てをリセットして、生まれ変わったかのような新しい表現……そう簡単には見つけられないだろうけど」"

[[dialogue]]
speaker = "舞亜"
# 「というわけで、私の来年の抱負は『新しい自分を生み出す』だよ。こんなとこでどう？」
line = "「というわけで、私の来年の抱負は『新しい自分を生み出す』だよ。こんなとこでどう？」"

[[dialogue]]
speaker = "マグダレナ"
# 「クールに見えて、胸には熱い想いを秘めている……前向きで実に素晴らしいです」
line = "「クールに見えて、胸には熱い想いを秘めている……前向きで実に素晴らしいです」"

[[dialogue]]
speaker = "舞亜"
# 「ふふ、ありがとう、マグダレナさん」
line = "「ふふ、ありがとう、マグダレナさん」"

[[dialogue]]
speaker = "マグダレナ"
# 「いえ、礼には及びません。ですが未来を語る楽しい時間もここまでです。あれが──」
line = "「いえ、礼には及びません。ですが未来を語る楽しい時間もここまでです。あれが──」"

[[dialogue]]
speaker = "フィオナ"
# 「あれが、守護天使オオヒメが封印されている神殿……！」
line = "「あれが、守護天使オオヒメが封印されている神殿……！」"

[[dialogue]]
speaker = "オオヒメ"
# 「世界に破滅を……遍く死を……」
line = "「世界に破滅を……遍く死を……」"

[[dialogue]]
speaker = "マグダレナ"
# 「彼女がオオヒメ。守護天使、最後の一柱です」
line = "「彼女がオオヒメ。守護天使、最後の一柱です」"

[[dialogue]]
speaker = "ウズメイア"
# 「へ～、あれがオオヒメ様……かっこ的には親近感湧いちゃうかも」
line = "「へ～、あれがオオヒメ様……かっこ的には親近感湧いちゃうかも」"

[[dialogue]]
speaker = "マグダレナ"
# 「オオヒメ。<ruby=ふる>旧</ruby>き神殿に囚われるのも今日までです。フィーニスの塔に戻り、その責務を果たしなさい」
line = "「オオヒメ。<ruby>旧<rt>ふる</rt></ruby>き神殿に囚われるのも今日までです。フィーニスの塔に戻り、その責務を果たしなさい」"

[[dialogue]]
speaker = "オオヒメ"
# 「責務……世界に滅びを……終焉を……」
line = "「責務……世界に滅びを……終焉を……」"

[[dialogue]]
speaker = "フィオナ"
# 「ペンタグラムの時と同様、やはり話が通じませんね。今は堕天使を倒すしかないようです」
line = "「ペンタグラムの時と同様、やはり話が通じませんね。今は堕天使を倒すしかないようです」"

[[dialogue]]
speaker = "オオヒメ"
# 「私が世界を満たす……死と絶望で……」
line = "「私が世界を満たす……死と絶望で……」"

[[dialogue]]
speaker = "ソフィア"
# 「今までに感じたことのないほどの禍々しい圧……！　これが最後の守護天使の力……！」
line = "「今までに感じたことのないほどの禍々しい圧……！　これが最後の守護天使の力……！」"

[[dialogue]]
speaker = "オオヒメ"
# 「我が剣を受けよ……！」
line = "「我が剣を受けよ……！」"

[[dialogue]]
speaker = "ソフィア"
# 「堕天使オオヒメ、来ます！」
line = "「堕天使オオヒメ、来ます！」"

[[dialogue]]
speaker = "unk"
# 全員、戦闘態勢！
line = "全員、戦闘態勢！"

[[dialogue]]
speaker = "unk"
# 最後の堕天使と星騎士たちが真っ向からぶつかり合う、激闘の幕が開けた。
line = "最後の堕天使と星騎士たちが真っ向からぶつかり合う、激闘の幕が開けた。"
