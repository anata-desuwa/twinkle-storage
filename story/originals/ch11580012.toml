[[dialogue]]
speaker = "unk"
# 第２話,異世界での触れ合い・後編,P
line = "第２話,異世界での触れ合い・後編,P"

[[dialogue]]
speaker = "サチ"
# 「陽彩さん、それでは流星市国を案内させて頂きますね」
line = "「陽彩さん、それでは流星市国を案内させて頂きますね」"

[[dialogue]]
speaker = "プリムラ"
# 「我が美味しいチョコスイーツの店を教えてやろう！」
line = "「我が美味しいチョコスイーツの店を教えてやろう！」"

[[dialogue]]
speaker = "シズハ"
# 「私も自分のお気に入りスポット、色々オススメしちゃいますよ～♪」
line = "「私も自分のお気に入りスポット、色々オススメしちゃいますよ～♪」"

[[dialogue]]
speaker = "陽彩"
# 「ああ。そうだな……よろしく頼む」
line = "「ああ。そうだな……よろしく頼む」"

[[dialogue]]
speaker = "unk"
# トレジアンナと図書館で語り合った翌日。陽彩は、サチ、プリムラ、シズハの３人に誘われて、流星市国の市街地へとやって来ていた。
line = "トレジアンナと図書館で語り合った翌日。陽彩は、サチ、プリムラ、シズハの３人に誘われて、流星市国の市街地へとやって来ていた。"

[[dialogue]]
speaker = "陽彩"
# （ぼくたちの世界には流星市国が存在していないから観光案内する――と言われて、街に連れ出されてしまった……）
line = "（ぼくたちの世界には流星市国が存在していないから観光案内する――と言われて、街に連れ出されてしまった……）"

[[dialogue]]
speaker = "陽彩"
# （正直あまり気は進まないから断ろうと思ったが……今回の件ではとても迷惑をかけたし、助けてもらった恩があるからな……）
line = "（正直あまり気は進まないから断ろうと思ったが……今回の件ではとても迷惑をかけたし、助けてもらった恩があるからな……）"

[[dialogue]]
speaker = "unk"
# ちなみに、トレジアンナは異世界のゲートを開く準備をする為に、今日はアニマに協力を頼みに行っており不在だった。
line = "ちなみに、トレジアンナは異世界のゲートを開く準備をする為に、今日はアニマに協力を頼みに行っており不在だった。"

[[dialogue]]
speaker = "陽彩"
# （だが、困った。今日はいろはたちも居ないし、何を話せばいいかわからないぞ……）
line = "（だが、困った。今日はいろはたちも居ないし、何を話せばいいかわからないぞ……）"

[[dialogue]]
speaker = "unk"
# それから、サチたちに案内されて、流星市国の観光名所を歩き回ることになった陽彩。
line = "それから、サチたちに案内されて、流星市国の観光名所を歩き回ることになった陽彩。"

[[dialogue]]
speaker = "サチ"
# 「――ここから見えるのが、流星市国の教皇庁になりますね。ここに来ると空気がちょっと神聖なものに変わる感じがして、私は結構好きなんです」
line = "「――ここから見えるのが、流星市国の教皇庁になりますね。ここに来ると空気がちょっと神聖なものに変わる感じがして、私は結構好きなんです」"

[[dialogue]]
speaker = "陽彩"
# 「なるほど。日本の東京の敷地内に、小さな宗教国家が存在しているというわけか……」
line = "「なるほど。日本の東京の敷地内に、小さな宗教国家が存在しているというわけか……」"

[[dialogue]]
speaker = "陽彩"
# （ぼくたちの世界にも、欧州に似たような国は存在しているから、そこまで驚くようなことではない。それよりもぼくは――）
line = "（ぼくたちの世界にも、欧州に似たような国は存在しているから、そこまで驚くようなことではない。それよりもぼくは――）"

[[dialogue]]
speaker = "陽彩"
# （向こうの世界にはない星力と、リクリエに対抗するために発達した技術を多数所持している<b>学園</b>――この２つの方が興味を惹かれる、というのが正直なところだ）
line = "（向こうの世界にはない星力と、リクリエに対抗するために発達した技術を多数所持している<b>学園</b>――この２つの方が興味を惹かれる、というのが正直なところだ）"

[[dialogue]]
speaker = "プリムラ"
# 「ここが我が認めた世界最強のチョコスイーツが食べられるカフェじゃ！」
line = "「ここが我が認めた世界最強のチョコスイーツが食べられるカフェじゃ！」"

[[dialogue]]
speaker = "サチ"
# 「えっと、プリムラは自分が認めたものはなんでも世界最強と言ってしまうというか……でも、本当に美味しいお店なんですよ！」
line = "「えっと、プリムラは自分が認めたものはなんでも世界最強と言ってしまうというか……でも、本当に美味しいお店なんですよ！」"

[[dialogue]]
speaker = "シズハ"
# 「すごく美味しいよね～♪　陽彩さんはどれにします？　はい、メニューをどうぞ♪」
line = "「すごく美味しいよね～♪　陽彩さんはどれにします？　はい、メニューをどうぞ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ちなみに我のオススメは、ジャンボチョコパフェじゃ！　味も最強ながら、量も最強じゃぞ！」
line = "「ちなみに我のオススメは、ジャンボチョコパフェじゃ！　味も最強ながら、量も最強じゃぞ！」"

[[dialogue]]
speaker = "陽彩"
# 「いや、ぼくはシンプルなチョコケーキでいい」
line = "「いや、ぼくはシンプルなチョコケーキでいい」"

[[dialogue]]
speaker = "陽彩"
# （チョコは考えごとをするときに集中できるから、好きな方ではある。だが、味にこだわりがあるわけじゃないし、ちょっと食べられれば十分だ……）
line = "（チョコは考えごとをするときに集中できるから、好きな方ではある。だが、味にこだわりがあるわけじゃないし、ちょっと食べられれば十分だ……）"

[[dialogue]]
speaker = "unk"
# やがて、注文したチョコレートケーキが１つテーブルに運ばれてきて、陽彩は何気なくそれを口にする。
line = "やがて、注文したチョコレートケーキが１つテーブルに運ばれてきて、陽彩は何気なくそれを口にする。"

[[dialogue]]
speaker = "陽彩"
# 「……！　これ……め、滅茶苦茶美味い……！」
line = "「……！　これ……め、滅茶苦茶美味い……！」"

[[dialogue]]
speaker = "プリムラ"
# 「フハハハ！　そうじゃろう！　ここのチョコスイーツはどれも最強なのじゃ♪」
line = "「フハハハ！　そうじゃろう！　ここのチョコスイーツはどれも最強なのじゃ♪」"

[[dialogue]]
speaker = "陽彩"
# 「こんな美味しいチョコケーキを食べたのは、生まれて初めてかもしれない……！　あむっ……もぐもぐ……」
line = "「こんな美味しいチョコケーキを食べたのは、生まれて初めてかもしれない……！　あむっ……もぐもぐ……」"

[[dialogue]]
speaker = "シズハ"
# 「陽彩さん、もう食べ終わっちゃいましたね♪　またメニュー見ますか？」
line = "「陽彩さん、もう食べ終わっちゃいましたね♪　またメニュー見ますか？」"

[[dialogue]]
speaker = "陽彩"
# 「あ……ああ。せっかくだし、もう１つ何か頼もうかな……」
line = "「あ……ああ。せっかくだし、もう１つ何か頼もうかな……」"

[[dialogue]]
speaker = "サチ"
# 「新星学園には、天才美食家のサラン先輩って人がいるんですけど……」
line = "「新星学園には、天才美食家のサラン先輩って人がいるんですけど……」"

[[dialogue]]
speaker = "サチ"
# 「流星市国の飲食店は、そのサラン先輩に認められたい店主さんたちが集まってくるので、名店が多いんです」
line = "「流星市国の飲食店は、そのサラン先輩に認められたい店主さんたちが集まってくるので、名店が多いんです」"

[[dialogue]]
speaker = "シズハ"
# 「でも、陽彩さんがようやくちょっと興味ありそうな顔をしてくれて、よかった～♪」
line = "「でも、陽彩さんがようやくちょっと興味ありそうな顔をしてくれて、よかった～♪」"

[[dialogue]]
speaker = "陽彩"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "シズハ"
# 「なんか、無理やり連れ出す感じになっちゃったかなって……サチちゃんとちょっと話してたんです」
line = "「なんか、無理やり連れ出す感じになっちゃったかなって……サチちゃんとちょっと話してたんです」"

[[dialogue]]
speaker = "サチ"
# 「私たち、陽彩さんとも仲良くなりたくてお誘いしたんですけど……」
line = "「私たち、陽彩さんとも仲良くなりたくてお誘いしたんですけど……」"

[[dialogue]]
speaker = "サチ"
# 「陽彩さん、本当は何か別にしたいことがあったりしますか？　もしそうなら、今日は付き合わせてしまって申し訳ないなって……」
line = "「陽彩さん、本当は何か別にしたいことがあったりしますか？　もしそうなら、今日は付き合わせてしまって申し訳ないなって……」"

[[dialogue]]
speaker = "シズハ"
# 「こっちの世界でやりたいことがあったら、ぜひ教えて下さい！　陽彩さんが『楽しい』って思ってくれることが大事なので！」
line = "「こっちの世界でやりたいことがあったら、ぜひ教えて下さい！　陽彩さんが『楽しい』って思ってくれることが大事なので！」"

[[dialogue]]
speaker = "陽彩"
# 「……すまない。年下の女の子たちにここまで気を遣わせてしまうなんてな」
line = "「……すまない。年下の女の子たちにここまで気を遣わせてしまうなんてな」"

[[dialogue]]
speaker = "陽彩"
# 「今更だが……ぼくもちゃんと自己開示しようと思う」
line = "「今更だが……ぼくもちゃんと自己開示しようと思う」"

[[dialogue]]
speaker = "陽彩"
# 「ぼくとしては、本当は……街を観光するよりも、学園などの施設を見て回って、この世界の最先端技術に触れてみたいというのが本音なんだ……」
line = "「ぼくとしては、本当は……街を観光するよりも、学園などの施設を見て回って、この世界の最先端技術に触れてみたいというのが本音なんだ……」"

[[dialogue]]
speaker = "プリムラ"
# 「なんじゃ、それならそうと早く言えばいいじゃろう！　なかなか面倒なやつじゃな！」
line = "「なんじゃ、それならそうと早く言えばいいじゃろう！　なかなか面倒なやつじゃな！」"

[[dialogue]]
speaker = "サチ"
# 「それなら、この後は学園に戻りましょう！」
line = "「それなら、この後は学園に戻りましょう！」"

[[dialogue]]
speaker = "陽彩"
# 「……いいのか？」
line = "「……いいのか？」"

[[dialogue]]
speaker = "シズハ"
# 「もちろん♪　学園の最先端技術といえば――仮想結界システムとかですかね～？」
line = "「もちろん♪　学園の最先端技術といえば――仮想結界システムとかですかね～？」"

[[dialogue]]
speaker = "陽彩"
# 「仮想結界……？」
line = "「仮想結界……？」"

[[dialogue]]
speaker = "陽彩"
# 「これが、仮想結界で再現した魔界！？」
line = "「これが、仮想結界で再現した魔界！？」"

[[dialogue]]
speaker = "陽彩"
# 「すごい……！　まるで本当にそこへ行っているかのような感覚だ！　フルダイブＶＲ技術が、この世界では実用にこぎつけているのか！」
line = "「すごい……！　まるで本当にそこへ行っているかのような感覚だ！　フルダイブＶＲ技術が、この世界では実用にこぎつけているのか！」"

[[dialogue]]
speaker = "サチ"
# 「はい。アニマ先輩という天才錬金術師が、トレジアンナさんとも協力して、星騎士が全力で訓練できるようにと最近になって完成させたんです」
line = "「はい。アニマ先輩という天才錬金術師が、トレジアンナさんとも協力して、星騎士が全力で訓練できるようにと最近になって完成させたんです」"

[[dialogue]]
speaker = "陽彩"
# 「しかもヘッドセット式を飛び越して、実物の体をシームレスで仮想空間内に入れているなんて……！　信じられない、一体どうやっているんだ……！？」
line = "「しかもヘッドセット式を飛び越して、実物の体をシームレスで仮想空間内に入れているなんて……！　信じられない、一体どうやっているんだ……！？」"

[[dialogue]]
speaker = "サチ"
# 「なんでも、結界星術の仕組みを応用して、結界内では体が物理的な影響を受けない、透明人間のような設定になっているとか、なんとか……？」
line = "「なんでも、結界星術の仕組みを応用して、結界内では体が物理的な影響を受けない、透明人間のような設定になっているとか、なんとか……？」"

[[dialogue]]
speaker = "陽彩"
# 「そうか……！　その上から体と同位置にアバターを被せることで、実体験と変わらない戦闘訓練を再現でき、現実の体は物理的なダメージを受けないようにしているのか！」
line = "「そうか……！　その上から体と同位置にアバターを被せることで、実体験と変わらない戦闘訓練を再現でき、現実の体は物理的なダメージを受けないようにしているのか！」"

[[dialogue]]
speaker = "プリムラ"
# 「おい、シズハ。難しくて何を言ってるか、我にはよくわからんのじゃが……」
line = "「おい、シズハ。難しくて何を言ってるか、我にはよくわからんのじゃが……」"

[[dialogue]]
speaker = "シズハ"
# 「うん、大丈夫！　私にもよくわかってないから！」
line = "「うん、大丈夫！　私にもよくわかってないから！」"

[[dialogue]]
speaker = "陽彩"
# 「ここが、あの大きなフィーニスの塔の頂上……！」
line = "「ここが、あの大きなフィーニスの塔の頂上……！」"

[[dialogue]]
speaker = "陽彩"
# 「これが天界……！」
line = "「これが天界……！」"

[[dialogue]]
speaker = "陽彩"
# 「すごい、すごいな！　この虹の橋は一体どうなっているんだ！？　ちゃんと渡れるようになっている。あとでこれも、学園の天使に話を聞きたいところだ……！」
line = "「すごい、すごいな！　この虹の橋は一体どうなっているんだ！？　ちゃんと渡れるようになっている。あとでこれも、学園の天使に話を聞きたいところだ……！」"

[[dialogue]]
speaker = "サチ"
# 「あの～、陽彩さん……？」
line = "「あの～、陽彩さん……？」"

[[dialogue]]
speaker = "陽彩"
# 「よし、ここで気になる点も、ひと通り確認してくるか……！」
line = "「よし、ここで気になる点も、ひと通り確認してくるか……！」"

[[dialogue]]
speaker = "unk"
# そうして仮想結界を解除し現実へ戻ってきた頃には、すっかり夕方になってしまっていた。
line = "そうして仮想結界を解除し現実へ戻ってきた頃には、すっかり夕方になってしまっていた。"

[[dialogue]]
speaker = "プリムラ"
# 「まさか、仮想結界で再現できる場所をひと通り歩き回ることになるとは、思わなかったのじゃ……」
line = "「まさか、仮想結界で再現できる場所をひと通り歩き回ることになるとは、思わなかったのじゃ……」"

[[dialogue]]
speaker = "シズハ"
# 「ある意味、名所巡りだったね……仮想空間だったから、体は疲れてないけど、精神的にはちょっとヘトヘトな感じ……」
line = "「ある意味、名所巡りだったね……仮想空間だったから、体は疲れてないけど、精神的にはちょっとヘトヘトな感じ……」"

[[dialogue]]
speaker = "陽彩"
# 「うぅ～、やってしまった……」
line = "「うぅ～、やってしまった……」"

[[dialogue]]
speaker = "陽彩"
# 「まさか魔界や天界を体験できるとは思ってもみなかったから、柄にもなくはしゃいでしまった気がする…………本当にすまない」
line = "「まさか魔界や天界を体験できるとは思ってもみなかったから、柄にもなくはしゃいでしまった気がする…………本当にすまない」"

[[dialogue]]
speaker = "サチ"
# 「いえ、それほどまでに仮想結界を楽しんでもらえたってことですから。何よりです」
line = "「いえ、それほどまでに仮想結界を楽しんでもらえたってことですから。何よりです」"

[[dialogue]]
speaker = "陽彩"
# 「……ぼくはやっぱり、周りと合わせるのが苦手だ……」
line = "「……ぼくはやっぱり、周りと合わせるのが苦手だ……」"

[[dialogue]]
speaker = "サチ"
# 「苦手？」
line = "「苦手？」"

[[dialogue]]
speaker = "陽彩"
# 「ああ……ぼくは昔から、周りとは興味の引かれる対象が違っていて、話が合わなかった。だから、誰かと一緒に居ても退屈に感じることが多くて……」
line = "「ああ……ぼくは昔から、周りとは興味の引かれる対象が違っていて、話が合わなかった。だから、誰かと一緒に居ても退屈に感じることが多くて……」"

[[dialogue]]
speaker = "陽彩"
# 「いつしか、むやみに触れ合っても摩擦を起こすだけ。触れ合わなければ、摩擦など起こらなくて済む……そう考えるようになっていた」
line = "「いつしか、むやみに触れ合っても摩擦を起こすだけ。触れ合わなければ、摩擦など起こらなくて済む……そう考えるようになっていた」"

[[dialogue]]
speaker = "陽彩"
# 「でも……いろはたちと出会ってから、最近は他者との関わりも大事なものだと、少しずつ理解ができるようになってきたんだ……」
line = "「でも……いろはたちと出会ってから、最近は他者との関わりも大事なものだと、少しずつ理解ができるようになってきたんだ……」"

[[dialogue]]
speaker = "陽彩"
# 「だから……悪かった。キミたちにまた、迷惑をかけてしまって」
line = "「だから……悪かった。キミたちにまた、迷惑をかけてしまって」"

[[dialogue]]
speaker = "プリムラ"
# 「でも、仮想結界は楽しめたんじゃろ？」
line = "「でも、仮想結界は楽しめたんじゃろ？」"

[[dialogue]]
speaker = "陽彩"
# 「ああ、もちろんだ。こんなに何かに熱中したのは久しぶりだ……」
line = "「ああ、もちろんだ。こんなに何かに熱中したのは久しぶりだ……」"

[[dialogue]]
speaker = "プリムラ"
# 「なら、許してやるのじゃ！　迷惑かけたとか、暗い話は面倒じゃからな！」
line = "「なら、許してやるのじゃ！　迷惑かけたとか、暗い話は面倒じゃからな！」"

[[dialogue]]
speaker = "プリムラ"
# 「その代わり、腹も減ったし、我はまたどこか美味い物を食べに行きたいのじゃ！」
line = "「その代わり、腹も減ったし、我はまたどこか美味い物を食べに行きたいのじゃ！」"

[[dialogue]]
speaker = "陽彩"
# 「……ぼくも一緒にか？」
line = "「……ぼくも一緒にか？」"

[[dialogue]]
speaker = "プリムラ"
# 「うむ。それでこの前の悪魔騒動と、今日の件はチャラじゃ！」
line = "「うむ。それでこの前の悪魔騒動と、今日の件はチャラじゃ！」"

[[dialogue]]
speaker = "サチ"
# 「と、プリムラは言ってますけど、それは建前で、お腹減ってたらご飯食べに行きませんかっていう普通のお誘いです」
line = "「と、プリムラは言ってますけど、それは建前で、お腹減ってたらご飯食べに行きませんかっていう普通のお誘いです」"

[[dialogue]]
speaker = "プリムラ"
# 「サチ！　余計なことを言うでない！」
line = "「サチ！　余計なことを言うでない！」"

[[dialogue]]
speaker = "陽彩"
# 「……ぼくは、キミたちが面白いと思うような話はできないぞ？」
line = "「……ぼくは、キミたちが面白いと思うような話はできないぞ？」"

[[dialogue]]
speaker = "シズハ"
# 「話題なんていくらでもありますよ！　例えば……私たち、こっちの世界の魔法少女の話とか！」
line = "「話題なんていくらでもありますよ！　例えば……私たち、こっちの世界の魔法少女の話とか！」"

[[dialogue]]
speaker = "陽彩"
# 「言われてみれば……トレジアンナからも、キミたちがこれまでどんな風に活動してきたのは、詳しく聞けてなかったな……」
line = "「言われてみれば……トレジアンナからも、キミたちがこれまでどんな風に活動してきたのは、詳しく聞けてなかったな……」"

[[dialogue]]
speaker = "サチ"
# 「陽彩さんなら、魔法少女やロストアイテムのことについて話しても大丈夫ですし……どうでしょうか？」
line = "「陽彩さんなら、魔法少女やロストアイテムのことについて話しても大丈夫ですし……どうでしょうか？」"

[[dialogue]]
speaker = "陽彩"
# 「……わかった。何を食べに行くんだ？」
line = "「……わかった。何を食べに行くんだ？」"

[[dialogue]]
speaker = "プリムラ"
# 「決まりじゃな！　それなら我が気に入っているハンバーグ屋を教えてやろう！　その名も『ギガバーグ本舗』じゃ！」
line = "「決まりじゃな！　それなら我が気に入っているハンバーグ屋を教えてやろう！　その名も『ギガバーグ本舗』じゃ！」"

[[dialogue]]
speaker = "陽彩"
# 「店名からして重たそうだな……」
line = "「店名からして重たそうだな……」"

[[dialogue]]
speaker = "プリムラ"
# 「なんじゃと！？　ええい、騙されたと思って１度食べてみるのじゃ！」
line = "「なんじゃと！？　ええい、騙されたと思って１度食べてみるのじゃ！」"

[[dialogue]]
speaker = "unk"
# ４人はその後、なんだかんだハンバーグ屋へ行き、魔法少女の話題で盛り上がるのだった。
line = "４人はその後、なんだかんだハンバーグ屋へ行き、魔法少女の話題で盛り上がるのだった。"

[[dialogue]]
speaker = "unk"
# ――そうして、あっという間に１週間が経過し、陽彩たちが元の世界へ帰る時がやってきた。
line = "――そうして、あっという間に１週間が経過し、陽彩たちが元の世界へ帰る時がやってきた。"

[[dialogue]]
speaker = "陽彩"
# 「トレジアンナ、世話になったな」
line = "「トレジアンナ、世話になったな」"

[[dialogue]]
speaker = "unk"
# いろはたちが先に別れの挨拶を済ませた後、陽彩はトレジアンナと別れの握手を交わす。
line = "いろはたちが先に別れの挨拶を済ませた後、陽彩はトレジアンナと別れの握手を交わす。"

[[dialogue]]
speaker = "トレジアンナ"
# 「いえいえ～♪　お互い、それぞれの場所で頑張って行きましょう」
line = "「いえいえ～♪　お互い、それぞれの場所で頑張って行きましょう」"

[[dialogue]]
speaker = "サチ"
# 「陽彩さん！　悪魔との戦い、いろはさんたちと一緒に頑張って下さい！」
line = "「陽彩さん！　悪魔との戦い、いろはさんたちと一緒に頑張って下さい！」"

[[dialogue]]
speaker = "プリムラ"
# 「悪魔の力に飲み込まれず、今度は制御してみせるがいい！」
line = "「悪魔の力に飲み込まれず、今度は制御してみせるがいい！」"

[[dialogue]]
speaker = "シズハ"
# 「いろはさんたちと仲良く、自分の願いを叶えてね♪」
line = "「いろはさんたちと仲良く、自分の願いを叶えてね♪」"

[[dialogue]]
speaker = "陽彩"
# 「……ああ。サチ、プリムラ、シズハ」
line = "「……ああ。サチ、プリムラ、シズハ」"

[[dialogue]]
speaker = "陽彩"
# 「この前は……ありがとう。ハンバーグ屋での話、楽しかった」
line = "「この前は……ありがとう。ハンバーグ屋での話、楽しかった」"

[[dialogue]]
speaker = "プリムラ"
# 「……！　ふん♪　次来た時は、別の美味い店にも案内してやるのじゃ！」
line = "「……！　ふん♪　次来た時は、別の美味い店にも案内してやるのじゃ！」"

[[dialogue]]
speaker = "シズハ"
# 「またきっと遊びに来てね！　私も魔法少女、頑張るから！」
line = "「またきっと遊びに来てね！　私も魔法少女、頑張るから！」"

[[dialogue]]
speaker = "サチ"
# 「陽彩さん、またいつか！　この世界を変わらず守って、お待ちしてます！」
line = "「陽彩さん、またいつか！　この世界を変わらず守って、お待ちしてます！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「陽彩さん、お元気で！　またお会いしましょう♪」
line = "「陽彩さん、お元気で！　またお会いしましょう♪」"

[[dialogue]]
speaker = "陽彩"
# 「ああ――」
line = "「ああ――」"

[[dialogue]]
speaker = "unk"
# 陽彩はゲートに向けて歩き出しながら１度、振り返って。
line = "陽彩はゲートに向けて歩き出しながら１度、振り返って。"

[[dialogue]]
speaker = "陽彩"
# 「みんな、またな」
line = "「みんな、またな」"

[[dialogue]]
speaker = "unk"
# 口元を緩めながら軽く手を振り、元の世界へと帰っていくのだった。
line = "口元を緩めながら軽く手を振り、元の世界へと帰っていくのだった。"
