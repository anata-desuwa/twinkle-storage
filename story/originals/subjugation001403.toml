speaker = "ヘレナ"
# 「身に付けるものひとつで世界の見え方や気分が変わると言ったが、己がその世界や心持ちに適応できなければ意味がない」
line = "「身に付けるものひとつで世界の見え方や気分が変わると言ったが、己がその世界や心持ちに適応できなければ意味がない」"

