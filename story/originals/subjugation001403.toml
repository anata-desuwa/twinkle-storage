[[dialogue]]
speaker = "ルリエル"
# 「おふたりとも脳まで筋肉さんですか！？　ぜーったいに嫌ですよぉ！　こんな地味で辛いだけの特訓をしても星力制御なんかできませんってばぁ～！」
line = "「おふたりとも脳まで筋肉さんですか！？　ぜーったいに嫌ですよぉ！　こんな地味で辛いだけの特訓をしても星力制御なんかできませんってばぁ～！」"

[[dialogue]]
speaker = "ルリエル"
