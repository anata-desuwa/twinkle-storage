[[dialogue]]
speaker = "unk"
# 巫女修行の後日――
line = "巫女修行の後日――"

[[dialogue]]
speaker = "unk"
# ルリエルがミヤハルと共に、星徒会室へと遊びにやって来た。
line = "ルリエルがミヤハルと共に、星徒会室へと遊びにやって来た。"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん、フィオナ会長に言われていた書類をお届けなのです～！」
line = "「会長さん、フィオナ会長に言われていた書類をお届けなのです～！」"

[[dialogue]]
speaker = "unk"
# ありがとう、ルリエル
line = "ありがとう、ルリエル"

[[dialogue]]
speaker = "ミヤハル"
# 「会長はん、ごきげんようどす<emoji=heart04>　またはんなりと遊びに来てしもうたわぁ<emoji=heart04>」
line = "「会長はん、ごきげんようどす<emoji=heart04>　またはんなりと遊びに来てしもうたわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "ルリエル"
# 「こっちに来る途中でミヤハルさんと会って、一緒に来たのです♪」
line = "「こっちに来る途中でミヤハルさんと会って、一緒に来たのです♪」"

[[dialogue]]
speaker = "unk"
# えっと、それは別にいいんだけど……
line = "えっと、それは別にいいんだけど……"

[[dialogue]]
speaker = "ミヤハル"
# 「――ん～？　なんで毎回、腕に抱き着いて来るのかって？」
line = "「――ん～？　なんで毎回、腕に抱き着いて来るのかって？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>　それはやね～、単純接触効果ってやつやよ<emoji=heart04>　会長はんの周りには可愛い女の子が多いから、こうして積極的にアピールしていかんとなぁ<emoji=heart04>」
line = "「ふふっ<emoji=heart04>　それはやね～、単純接触効果ってやつやよ<emoji=heart04>　会長はんの周りには可愛い女の子が多いから、こうして積極的にアピールしていかんとなぁ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「はいはい、そこまで～！」
line = "「はいはい、そこまで～！」"

[[dialogue]]
speaker = "unk"
# 一緒に仕事していたマトイがこっちに来て、ミヤハルの首根っこを掴み、俺から引き剥がす。
line = "一緒に仕事していたマトイがこっちに来て、ミヤハルの首根っこを掴み、俺から引き剥がす。"

[[dialogue]]
speaker = "ミヤハル"
# 「あんっ<emoji=heart04>　マトイもおったん？　気付かんかったわぁ～」
line = "「あんっ<emoji=heart04>　マトイもおったん？　気付かんかったわぁ～」"

[[dialogue]]
speaker = "マトイ"
# 「いや、居たの分かっててやってたでしょ！？」
line = "「いや、居たの分かっててやってたでしょ！？」"

[[dialogue]]
speaker = "マトイ"
# 「というか、ミヤハル！　巫女修行の件で、クレームがあるんだけど！？」
line = "「というか、ミヤハル！　巫女修行の件で、クレームがあるんだけど！？」"

[[dialogue]]
speaker = "マトイ"
# 「ヨミちゃんから聞いたんだけど、巫女って本来、『煩悩を捨て去る』修業をするのが一般的らしいじゃない！」
line = "「ヨミちゃんから聞いたんだけど、巫女って本来、『煩悩を捨て去る』修業をするのが一般的らしいじゃない！」"

[[dialogue]]
speaker = "マトイ"
# 「ミヤハルの『煩悩を解放する』って修行法、聞いたことないって言ってたんだけど！？」
line = "「ミヤハルの『煩悩を解放する』って修行法、聞いたことないって言ってたんだけど！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちのオリジナルだから、当然やねぇ」
line = "「うちのオリジナルだから、当然やねぇ」"

[[dialogue]]
speaker = "マトイ"
# 「修行法がオリジナルなんてこと、あり得る！？」
line = "「修行法がオリジナルなんてこと、あり得る！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「そういえば九浄家メイド隊のヨミはんも、巫女の力を使える子やったねぇ」
line = "「そういえば九浄家メイド隊のヨミはんも、巫女の力を使える子やったねぇ」"

[[dialogue]]
speaker = "ミヤハル"
# 「まあ、あれや。こないだ教えた修行は、うちなりの経験則に基づく、分かりやすいアレンジバージョンってことで<emoji=heart04>」
line = "「まあ、あれや。こないだ教えた修行は、うちなりの経験則に基づく、分かりやすいアレンジバージョンってことで<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「最初に説明して欲しかったんですけど！？」
line = "「最初に説明して欲しかったんですけど！？」"

[[dialogue]]
speaker = "ルリエル"
# 「でも、ルリエルは煩悩を解放するの、すごく楽しかったのですよ♪」
line = "「でも、ルリエルは煩悩を解放するの、すごく楽しかったのですよ♪」"

[[dialogue]]
speaker = "unk"
# 煩悩を、解放……？
line = "煩悩を、解放……？"

[[dialogue]]
speaker = "ミヤハル"
# 「そうなんよ～<emoji=heart04>　どういう修行だったのかっていうとな～？」
line = "「そうなんよ～<emoji=heart04>　どういう修行だったのかっていうとな～？」"

[[dialogue]]
speaker = "マトイ"
# 「わあああぁ～～っ！　会長には説明しなくていいからっ！！」
line = "「わあああぁ～～っ！　会長には説明しなくていいからっ！！」"

[[dialogue]]
speaker = "unk"
# と、その時、室内に警報が鳴り響く。
line = "と、その時、室内に警報が鳴り響く。"

[[dialogue]]
speaker = "ルリエル"
# 「モンスターの出現アラートなのです！」
line = "「モンスターの出現アラートなのです！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あらぁ、ええところやったのに～」
line = "「あらぁ、ええところやったのに～」"

[[dialogue]]
speaker = "unk"
# すぐに出撃だ！
line = "すぐに出撃だ！"

[[dialogue]]
speaker = "マトイ"
# 「うん！　ミヤハル、ちょっと行って来るね！」
line = "「うん！　ミヤハル、ちょっと行って来るね！」"

[[dialogue]]
speaker = "unk"
# それから現場に急行し、モンスターとの戦闘を開始した俺たち。
line = "それから現場に急行し、モンスターとの戦闘を開始した俺たち。"

[[dialogue]]
speaker = "マトイ"
# 「二刀流、水纏の太刀！」
line = "「二刀流、水纏の太刀！」"

[[dialogue]]
speaker = "ルリエル"
# 「でんでん♪　ウェザードラムなのです！」
line = "「でんでん♪　ウェザードラムなのです！」"

[[dialogue]]
speaker = "モンスター"
# 「ギーーーッ！？」
line = "「ギーーーッ！？」"

[[dialogue]]
speaker = "unk"
# ２人共、強い……！
line = "２人共、強い……！"

[[dialogue]]
speaker = "unk"
# 巫女修行を経てから、２人の巫女フォームは目覚ましい活躍を見せるようになっていた。
line = "巫女修行を経てから、２人の巫女フォームは目覚ましい活躍を見せるようになっていた。"

[[dialogue]]
speaker = "ミヤハル"
# 「ほんまにな～。コツを掴んでからそう経ってないのに、もう使いこなして。すっかり立派な巫女さんやねぇ<emoji=heart04>」
line = "「ほんまにな～。コツを掴んでからそう経ってないのに、もう使いこなして。すっかり立派な巫女さんやねぇ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「って、ミヤハル？」
line = "「って、ミヤハル？」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちも来てしもうたわぁ<emoji=heart04>　――陰陽術！」
line = "「うちも来てしもうたわぁ<emoji=heart04>　――陰陽術！」"

[[dialogue]]
speaker = "モンスター"
# 「ギアーーーズッ！？」
line = "「ギアーーーズッ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「ミヤハルさん、手伝いに来てくれたんですか！？　嬉しいのです！」
line = "「ミヤハルさん、手伝いに来てくれたんですか！？　嬉しいのです！」"

[[dialogue]]
speaker = "マトイ"
# 「……でも、どうして？」
line = "「……でも、どうして？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ん～、なんとなく？　ほら、あれや――」
line = "「ん～、なんとなく？　ほら、あれや――」"

[[dialogue]]
speaker = "ミヤハル"
# 「女の子同士でよく一緒にお花摘みに行きますやろ？　あれと同じノリやね<emoji=heart04>」
line = "「女の子同士でよく一緒にお花摘みに行きますやろ？　あれと同じノリやね<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「あっ、一緒にお花摘みに行くってわかる？　本当にお散歩するんじゃないんよ？　男の子的に言うたら連れションやろか<emoji=heart04>」
line = "「あっ、一緒にお花摘みに行くってわかる？　本当にお散歩するんじゃないんよ？　男の子的に言うたら連れションやろか<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「言い方っ！！」
line = "「言い方っ！！」"

[[dialogue]]
speaker = "マトイ"
# 「……だけど、うん――ありがとね、ミヤハル」
line = "「……だけど、うん――ありがとね、ミヤハル」"

[[dialogue]]
speaker = "ミヤハル"
# 「まあ、お役目のこともあるし、これまでは自分のことは自分で守らなあかん思うてたけど……」
line = "「まあ、お役目のこともあるし、これまでは自分のことは自分で守らなあかん思うてたけど……」"

[[dialogue]]
speaker = "ミヤハル"
# 「これからはマトイがうちのこと、助けてくれはるんやろ？　うち、ちょっとは甘えてもええんよね？」
line = "「これからはマトイがうちのこと、助けてくれはるんやろ？　うち、ちょっとは甘えてもええんよね？」"

[[dialogue]]
speaker = "マトイ"
# 「もちろん！　任せてよ。これでも誰かを攻撃から守るのは、得意なんだから！」
line = "「もちろん！　任せてよ。これでも誰かを攻撃から守るのは、得意なんだから！」"

[[dialogue]]
speaker = "マトイ"
# 「よし、このままみんなで頑張って、４人でお疲れ様会でも開こっか！」
line = "「よし、このままみんなで頑張って、４人でお疲れ様会でも開こっか！」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>」
line = "「ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「そうと決まれば、はよ片付けて、帰りに会長はんと４Ｐしに行きまひょ<emoji=heart04>」
line = "「そうと決まれば、はよ片付けて、帰りに会長はんと４Ｐしに行きまひょ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# なんて！？
line = "なんて！？"

[[dialogue]]
speaker = "マトイ"
# 「やっぱ訂正！　先に１人で帰って！　このドスケベ陰陽師っ！！」
line = "「やっぱ訂正！　先に１人で帰って！　このドスケベ陰陽師っ！！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あ～ん<emoji=heart04>　マトイってば、うちだけ仲間ハズレなんていけずやわぁ～<emoji=heart04>　ルリはんはみんな一緒の方が嬉しいやろ～？」
line = "「あ～ん<emoji=heart04>　マトイってば、うちだけ仲間ハズレなんていけずやわぁ～<emoji=heart04>　ルリはんはみんな一緒の方が嬉しいやろ～？」"

[[dialogue]]
speaker = "ルリエル"
# 「はいなのです♪」
line = "「はいなのです♪」"

[[dialogue]]
speaker = "unk"
# ３人はそんなやり取りをしつつも、息の合ったコンビネーションでモンスターをあっという間に殲滅して行く。
line = "３人はそんなやり取りをしつつも、息の合ったコンビネーションでモンスターをあっという間に殲滅して行く。"

[[dialogue]]
speaker = "unk"
# その日以降、ミヤハルは俺たちが戦っていると、よく助太刀に来てくれるようになるのだった――
line = "その日以降、ミヤハルは俺たちが戦っていると、よく助太刀に来てくれるようになるのだった――"
