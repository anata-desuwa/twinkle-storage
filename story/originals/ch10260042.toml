[[dialogue]]
speaker = "unk"
# 第２話,可愛い後輩と絵馬に願いごと,P
line = "第２話,可愛い後輩と絵馬に願いごと,P"

[[dialogue]]
speaker = "unk"
# 冬休みの最後日、リーリアは俺の家へ遊びにきていた。
line = "冬休みの最後日、リーリアは俺の家へ遊びにきていた。"

[[dialogue]]
speaker = "リーリア"
# 「センパ～イ、はいっ♪　口開けて下さい☆　あ～ん<emoji=heart04>」
line = "「センパ～イ、はいっ♪　口開けて下さい☆　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 肩をぴったりとくっ付け合っているリーリアが、剥いてあるミカンの１房を手に取って、俺の口へと運んでくれる。
line = "肩をぴったりとくっ付け合っているリーリアが、剥いてあるミカンの１房を手に取って、俺の口へと運んでくれる。"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ、どうです、センパイ？　可愛い後輩に食べさせてもらうミカンは甘いですか？　それとも甘酸っぱいですか～？」
line = "「ふふっ、どうです、センパイ？　可愛い後輩に食べさせてもらうミカンは甘いですか？　それとも甘酸っぱいですか～？」"

[[dialogue]]
speaker = "unk"
# う～ん、台詞の甘さが少し足りない
line = "う～ん、台詞の甘さが少し足りない"

[[dialogue]]
speaker = "リーリア"
# 「え～？　だったらセンパイ、見本を見せて下さいよ～」
line = "「え～？　だったらセンパイ、見本を見せて下さいよ～」"

[[dialogue]]
speaker = "unk"
# 俺は『愛を込めて、甘くな～れ♪』と言いながらミカンを１房持ち、リーリアの口へ運ぶ。
line = "俺は『愛を込めて、甘くな～れ♪』と言いながらミカンを１房持ち、リーリアの口へ運ぶ。"

[[dialogue]]
speaker = "リーリア"
# 「ぷっ……あははっ☆　なんの魔法ですか、それ～♪　あ～ん<emoji=heart04>　あむっ……もぐもぐ……」
line = "「ぷっ……あははっ☆　なんの魔法ですか、それ～♪　あ～ん<emoji=heart04>　あむっ……もぐもぐ……」"

[[dialogue]]
speaker = "unk"
# 甘くなってなかった？
line = "甘くなってなかった？"

[[dialogue]]
speaker = "リーリア"
# 「マジカル甘いに決まってるじゃないですか<emoji=heart04>　センパイに食べさせてもらってるんですから～♪　えへへへぇ<emoji=heart04>」
line = "「マジカル甘いに決まってるじゃないですか<emoji=heart04>　センパイに食べさせてもらってるんですから～♪　えへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「あっ、そうだ！　イチャイチャに夢中で忘れちゃってましたけど、お正月が終わる前に、センパイとしておきたかったことがあるんですよ～」
line = "「あっ、そうだ！　イチャイチャに夢中で忘れちゃってましたけど、お正月が終わる前に、センパイとしておきたかったことがあるんですよ～」"

[[dialogue]]
speaker = "unk"
# そう言って、リーリアが取り出してみせたのは『絵馬』と『カラフルなペン』だった。
line = "そう言って、リーリアが取り出してみせたのは『絵馬』と『カラフルなペン』だった。"

[[dialogue]]
speaker = "リーリア"
# 「じゃ～ん☆　せっかくお正月なんですから、センパイと絵馬に『恋人としての願いごと』を書いてみたいな～って♪」
line = "「じゃ～ん☆　せっかくお正月なんですから、センパイと絵馬に『恋人としての願いごと』を書いてみたいな～って♪」"

[[dialogue]]
speaker = "unk"
# リーリアの晴れ着フォームの能力は、『絵馬を召喚し、そこに描いた願いを具現化すること』だと聞かされていた。
line = "リーリアの晴れ着フォームの能力は、『絵馬を召喚し、そこに描いた願いを具現化すること』だと聞かされていた。"

[[dialogue]]
speaker = "リーリア"
# 「まあ、絵馬の具現化能力は、ある程度具体的なものでないと上手く行かなかったり、条件も色々厳しかったりして、まだまだ試行錯誤中なんですけどね～」
line = "「まあ、絵馬の具現化能力は、ある程度具体的なものでないと上手く行かなかったり、条件も色々厳しかったりして、まだまだ試行錯誤中なんですけどね～」"

[[dialogue]]
speaker = "リーリア"
# 「なので今回、『恋人としての願いごと』を書くのはただの願掛けになるんですけど、こういうのは願うことで『自分の気持ちを目標に向ける』ことが重要だと思うので♪」
line = "「なので今回、『恋人としての願いごと』を書くのはただの願掛けになるんですけど、こういうのは願うことで『自分の気持ちを目標に向ける』ことが重要だと思うので♪」"

[[dialogue]]
speaker = "unk"
# そんなわけで、俺たちはそれぞれ絵馬に願いを書き、発表し合うことになった。
line = "そんなわけで、俺たちはそれぞれ絵馬に願いを書き、発表し合うことになった。"

[[dialogue]]
speaker = "リーリア"
# 「では、私からですね～。私が書いたのは、ズバリこれです♪　じゃじゃ～ん、『センパイとのラブラブな結婚生活』☆」
line = "「では、私からですね～。私が書いたのは、ズバリこれです♪　じゃじゃ～ん、『センパイとのラブラブな結婚生活』☆」"

[[dialogue]]
speaker = "リーリア"
# 「あ～、今ちょっとバカにしましたね！　ステップ飛ばしすぎとか、全然そんなことないですから！」
line = "「あ～、今ちょっとバカにしましたね！　ステップ飛ばしすぎとか、全然そんなことないですから！」"

[[dialogue]]
speaker = "リーリア"
# 「本当はこれ、初夢で見る予定だったのに、全然見れなくてショックだったんですから……！」
line = "「本当はこれ、初夢で見る予定だったのに、全然見れなくてショックだったんですから……！」"

[[dialogue]]
speaker = "リーリア"
# 「センパイとの関係がもっと進んだ『未来の夢』が見てみたいな～って、センパイの写真を枕元に置いて眠ったのに、その日何も夢を見なかったんです」
line = "「センパイとの関係がもっと進んだ『未来の夢』が見てみたいな～って、センパイの写真を枕元に置いて眠ったのに、その日何も夢を見なかったんです」"

[[dialogue]]
speaker = "リーリア"
# 「──夢なんかに頼らなくても、そのうち叶うから安心していい……って、えへへ<emoji=heart04>　それ、ほぼプロポーズですよ、センパイ<emoji=heart04>」
line = "「──夢なんかに頼らなくても、そのうち叶うから安心していい……って、えへへ<emoji=heart04>　それ、ほぼプロポーズですよ、センパイ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「ええっと、それで……センパイはどんな願いごとを書いたんですか？」
line = "「ええっと、それで……センパイはどんな願いごとを書いたんですか？」"

[[dialogue]]
speaker = "unk"
# 俺は『リーリアの夢を手伝いたい』
line = "俺は『リーリアの夢を手伝いたい』"

[[dialogue]]
speaker = "リーリア"
# 「――私が目標にしてる『若い魔女が人間界にもっと来やすくなれるようにしたい』という夢を、一緒に手伝いたい……？」
line = "「――私が目標にしてる『若い魔女が人間界にもっと来やすくなれるようにしたい』という夢を、一緒に手伝いたい……？」"

[[dialogue]]
speaker = "リーリア"
# 「～～～っ<emoji=heart04><emoji=heart04>　もう、相変わらずセンパイは、キュンキュンしちゃうことを平気で言っちゃうんですから～<emoji=heart04>」
line = "「～～～っ<emoji=heart04><emoji=heart04>　もう、相変わらずセンパイは、キュンキュンしちゃうことを平気で言っちゃうんですから～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアは感激したように抱きついてきて、その勢いで俺たちはベッドに仰向けに倒れ込んでしまう。
line = "リーリアは感激したように抱きついてきて、その勢いで俺たちはベッドに仰向けに倒れ込んでしまう。"

[[dialogue]]
speaker = "unk"
# リーリアはそのまま、胸元に顔を擦り寄せ、甘えるようにスリスリしてきた。
line = "リーリアはそのまま、胸元に顔を擦り寄せ、甘えるようにスリスリしてきた。"

[[dialogue]]
speaker = "リーリア"
# 「んふ～<emoji=heart04>　センパイは今日も、いい匂いがします……<emoji=heart04>」
line = "「んふ～<emoji=heart04>　センパイは今日も、いい匂いがします……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアは俺の匂いをよく褒めてくれるよな
line = "リーリアは俺の匂いをよく褒めてくれるよな"

[[dialogue]]
speaker = "リーリア"
# 「センパイが私のこと、可愛いって言ってくれるのと同じですよ。褒められると自己肯定感が上がるでしょう？」
line = "「センパイが私のこと、可愛いって言ってくれるのと同じですよ。褒められると自己肯定感が上がるでしょう？」"

[[dialogue]]
speaker = "リーリア"
# 「あと、別に嘘を言っているわけじゃなくて、私はセンパイの匂い、本当に好きですから♪　こうしていると安心します<emoji=heart04>」
line = "「あと、別に嘘を言っているわけじゃなくて、私はセンパイの匂い、本当に好きですから♪　こうしていると安心します<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「センパイも私の匂い、好きなんですか？　ふふっ、どんな感じの匂いがします？」
line = "「センパイも私の匂い、好きなんですか？　ふふっ、どんな感じの匂いがします？」"

[[dialogue]]
speaker = "リーリア"
# 「――可愛いフェロモンがいっぱい出ててキュンキュンする？　もう、センパイってば～、エッチなんですから～<emoji=heart04>」
line = "「――可愛いフェロモンがいっぱい出ててキュンキュンする？　もう、センパイってば～、エッチなんですから～<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「このままセンパイとうとうとしながら眠ったら、いい夢が見られそうって思ってたのに……ドキドキしたら眠れなくなっちゃうじゃないですか～<emoji=heart04>　えへへぇ<emoji=heart04>」
line = "「このままセンパイとうとうとしながら眠ったら、いい夢が見られそうって思ってたのに……ドキドキしたら眠れなくなっちゃうじゃないですか～<emoji=heart04>　えへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 添い寝のような態勢になったまま、ちょっと眠くなってきたのか、言葉をとろんとさせるリーリア。
line = "添い寝のような態勢になったまま、ちょっと眠くなってきたのか、言葉をとろんとさせるリーリア。"

[[dialogue]]
speaker = "リーリア"
# 「それで、どうしますかぁ、センパイ？　このまま、２人で眠っちゃいますか？　ふふふ……<emoji=heart04>」
line = "「それで、どうしますかぁ、センパイ？　このまま、２人で眠っちゃいますか？　ふふふ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「――センパイ……セ～ンパイ」
line = "「――センパイ……セ～ンパイ」"

[[dialogue]]
speaker = "リーリア"
# 「あっ、起きましたか～？　ふふふっ<emoji=heart04>」
line = "「あっ、起きましたか～？　ふふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 目を覚ますと、俺はリビングのソファーで眠っていて、リーリアから頬を人差し指でつんつんされていた。
line = "目を覚ますと、俺はリビングのソファーで眠っていて、リーリアから頬を人差し指でつんつんされていた。"

[[dialogue]]
speaker = "リーリア"
# 「眠っちゃってたんですね～♪　おはようございます、あ・な・た<emoji=heart04>」
line = "「眠っちゃってたんですね～♪　おはようございます、あ・な・た<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「って、驚いたような顔して、どうしました？　あっ、もしかして、寝ぼけちゃってます？」
line = "「って、驚いたような顔して、どうしました？　あっ、もしかして、寝ぼけちゃってます？」"

[[dialogue]]
speaker = "リーリア"
# 「もう、今日の予定を忘れちゃうなんて酷いですよ～。私たち、新婚なのに～♪」
line = "「もう、今日の予定を忘れちゃうなんて酷いですよ～。私たち、新婚なのに～♪」"

[[dialogue]]
speaker = "unk"
# 新婚！？！？
line = "新婚！？！？"

[[dialogue]]
speaker = "リーリア"
# 「えへへへぇ<emoji=heart04>」
line = "「えへへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 幸せそうな照れ笑いを浮かべるリーリアに、俺は驚いて目をぱちくりさせてしまうのだった。
line = "幸せそうな照れ笑いを浮かべるリーリアに、俺は驚いて目をぱちくりさせてしまうのだった。"
