[[dialogue]]
speaker = "unk"
# 第５話,ぎゃんぶらぁ伝説,B
line = "第５話,ぎゃんぶらぁ伝説,B"

[[dialogue]]
speaker = "ウェンディ"
# 「まったく！　ひどい目に遭いました！！」
line = "「まったく！　ひどい目に遭いました！！」"

[[dialogue]]
speaker = "ウェンディ"
# 「あの研究バカときたら、本当にロクなことをしやがりません！」
line = "「あの研究バカときたら、本当にロクなことをしやがりません！」"

[[dialogue]]
speaker = "ウェンディ"
# 「…………はぁ」
line = "「…………はぁ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「実はこのバトルスーツ強化装置、まだ重大な欠陥を抱えてるんだよ」
line = "「実はこのバトルスーツ強化装置、まだ重大な欠陥を抱えてるんだよ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「それが一定時間経つと、注ぎ込まれる魔力に戦闘服が耐えられなくなって、光になってはじけ飛んじゃうんだよね」
line = "「それが一定時間経つと、注ぎ込まれる魔力に戦闘服が耐えられなくなって、光になってはじけ飛んじゃうんだよね」"

[[dialogue]]
speaker = "セドナ"
# 「それは重大過ぎる欠点だな」
line = "「それは重大過ぎる欠点だな」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「これだとやっぱ予算……もらえないかな？」
line = "「これだとやっぱ予算……もらえないかな？」"

[[dialogue]]
speaker = "ウェンディ"
# 「既に実用レベルまで完成しているというならまだしも、こんな状態のものに予算を割けるわけがないでしょう」
line = "「既に実用レベルまで完成しているというならまだしも、こんな状態のものに予算を割けるわけがないでしょう」"

[[dialogue]]
speaker = "セドナ"
# 「そうだな……しかし、この研究が非常に有用なことは間違いない。完成すればネビュラにとって大きな力になるだろう」
line = "「そうだな……しかし、この研究が非常に有用なことは間違いない。完成すればネビュラにとって大きな力になるだろう」"

[[dialogue]]
speaker = "セドナ"
# 「今は財政的な余裕がない。我々も急ぎ財政基盤を整えるので、それまで凍結ということにしておいてくれ」
line = "「今は財政的な余裕がない。我々も急ぎ財政基盤を整えるので、それまで凍結ということにしておいてくれ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「うん、わかったよ。つまり全てはウェンディの手腕次第ってことね、頼んだよん♪」
line = "「うん、わかったよ。つまり全てはウェンディの手腕次第ってことね、頼んだよん♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「わ、分かっています！　すぐに何とかしてみせますから、それまで大人しく待っていなさい！」
line = "「わ、分かっています！　すぐに何とかしてみせますから、それまで大人しく待っていなさい！」"

[[dialogue]]
speaker = "ウェンディ"
# 「……そうなんですよね。技術自体はとんでもないものなんですよ」
line = "「……そうなんですよね。技術自体はとんでもないものなんですよ」"

[[dialogue]]
speaker = "ウェンディ"
# 「お金に余裕がありさえすれば、私だって全力で支援したいくらいの代物です」
line = "「お金に余裕がありさえすれば、私だって全力で支援したいくらいの代物です」"

[[dialogue]]
speaker = "ウェンディ"
# 「けれど、そのためにはネビュラの運営資金の健全化が必須……」
line = "「けれど、そのためにはネビュラの運営資金の健全化が必須……」"

[[dialogue]]
speaker = "ウェンディ"
# （一朝一夕に、現状を解決する手段はありません）
line = "（一朝一夕に、現状を解決する手段はありません）"

[[dialogue]]
speaker = "ウェンディ"
# （私に出来ることは……もう一度、地道に人間界に財政基盤を築いていくこと）
line = "（私に出来ることは……もう一度、地道に人間界に財政基盤を築いていくこと）"

[[dialogue]]
speaker = "ウェンディ"
# 「そのための糸口を、一刻も早く見つけないと……」
line = "「そのための糸口を、一刻も早く見つけないと……」"

[[dialogue]]
speaker = "アイリーン"
# 「あれ？　ウェンディさんだ、こんにちは～」
line = "「あれ？　ウェンディさんだ、こんにちは～」"

[[dialogue]]
speaker = "ウェンディ"
# 「アイリーン？　こんなところで何をしているのですか？」
line = "「アイリーン？　こんなところで何をしているのですか？」"

[[dialogue]]
speaker = "アイリーン"
# 「えへへ、人間界を偵察しているのです～」
line = "「えへへ、人間界を偵察しているのです～」"

[[dialogue]]
speaker = "ウェンディ"
# 「任務中でしたか。それは失礼しました、お疲れ様です」
line = "「任務中でしたか。それは失礼しました、お疲れ様です」"

[[dialogue]]
speaker = "アイリーン"
# 「わわわっ、冗談だよっ！　ホントはただのお散歩♪」
line = "「わわわっ、冗談だよっ！　ホントはただのお散歩♪」"

[[dialogue]]
speaker = "アイリーン"
# 「ウェンディさんこそどうしたの？　こんなところで出くわすなんて思わなかったよ～」
line = "「ウェンディさんこそどうしたの？　こんなところで出くわすなんて思わなかったよ～」"

[[dialogue]]
speaker = "ウェンディ"
# 「私は、まあ……傷心を紛らわせつつ、組織の今後についてあれこれ考えていました」
line = "「私は、まあ……傷心を紛らわせつつ、組織の今後についてあれこれ考えていました」"

[[dialogue]]
speaker = "アイリーン"
# 「傷心？　何かあったの？」
line = "「傷心？　何かあったの？」"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ、実はですね──」
line = "「ええ、実はですね──」"

[[dialogue]]
speaker = "アイリーン"
# 「へ～、そんな事があったんだ」
line = "「へ～、そんな事があったんだ」"

[[dialogue]]
speaker = "ウェンディ"
# 「発明自体は非常に有用なのですが、そんな欠点を抱えているとなると、実用には耐えないでしょう？」
line = "「発明自体は非常に有用なのですが、そんな欠点を抱えているとなると、実用には耐えないでしょう？」"

[[dialogue]]
speaker = "アイリーン"
# 「そうだね～、いつ変身が解けちゃうかわからないってなると、実践で使うのはちょっと恐いかな～」
line = "「そうだね～、いつ変身が解けちゃうかわからないってなると、実践で使うのはちょっと恐いかな～」"

[[dialogue]]
speaker = "アイリーン"
# 「でも、もしそんなパワーアップができるなら、戦術もいろいろ幅が生まれていいねっ♪」
line = "「でも、もしそんなパワーアップができるなら、戦術もいろいろ幅が生まれていいねっ♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「ええ……その技術を元にして資金を生み出すことも考えられるのですが……」
line = "「ええ……その技術を元にして資金を生み出すことも考えられるのですが……」"

[[dialogue]]
speaker = "アイリーン"
# 「うーん……お金ないのって、大変だね……」
line = "「うーん……お金ないのって、大変だね……」"

[[dialogue]]
speaker = "ウェンディ"
# 「そうなんです……」
line = "「そうなんです……」"

[[dialogue]]
speaker = "アイリーン"
# 「何かいい方法、ないかな～……うーん……」
line = "「何かいい方法、ないかな～……うーん……」"

[[dialogue]]
speaker = "ウェンディ"
# 「うーん……」
line = "「うーん……」"

[[dialogue]]
speaker = "アイリーン"
# 「あっ、そうだ思い出した！」
line = "「あっ、そうだ思い出した！」"

[[dialogue]]
speaker = "ウェンディ"
# 「どうしました？　何か良いアイデアが浮かびましたか？」
line = "「どうしました？　何か良いアイデアが浮かびましたか？」"

[[dialogue]]
speaker = "アイリーン"
# 「うん！　前に人間界で出会った人から、お金に困ったらここにいけばいい、って教えてもらったんだよ！」
line = "「うん！　前に人間界で出会った人から、お金に困ったらここにいけばいい、って教えてもらったんだよ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「あからさまに怪しいですが……誰なんです、その人？」
line = "「あからさまに怪しいですが……誰なんです、その人？」"

[[dialogue]]
speaker = "アイリーン"
# 「『さすらいの旅人』だって言ってたよ。名前は教えてもらえなかったんだ～」
line = "「『さすらいの旅人』だって言ってたよ。名前は教えてもらえなかったんだ～」"

[[dialogue]]
speaker = "ウェンディ"
# 「ますます怪しいじゃないですか、騙されちゃだめですよ！」
line = "「ますます怪しいじゃないですか、騙されちゃだめですよ！」"

[[dialogue]]
speaker = "アイリーン"
# 「え～、でもいいヒトそうだったよ？　行くだけでも行ってみない？」
line = "「え～、でもいいヒトそうだったよ？　行くだけでも行ってみない？」"

[[dialogue]]
speaker = "ウェンディ"
# 「うーん……そうですね。何がビジネスに繋がるか分かりませんし、アイリーンを一人で行かせるのも危険な気がします」
line = "「うーん……そうですね。何がビジネスに繋がるか分かりませんし、アイリーンを一人で行かせるのも危険な気がします」"

[[dialogue]]
speaker = "ウェンディ"
# 「分かりました。では行くだけ行ってみましょう」
line = "「分かりました。では行くだけ行ってみましょう」"

[[dialogue]]
speaker = "アイリーン"
# 「わーい♪」
line = "「わーい♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「って、ここは……」
line = "「って、ここは……」"

[[dialogue]]
speaker = "ウェンディ"
# 「カジノじゃないですかっ！！！！」
line = "「カジノじゃないですかっ！！！！」"

[[dialogue]]
speaker = "アイリーン"
# 「そうだね～、キラキラした建物ですごいね～♪」
line = "「そうだね～、キラキラした建物ですごいね～♪」"

[[dialogue]]
speaker = "ウェンディ"
# 「ギャンブルなんてとんでもありません！　トータルで見れば損するように出来てるんですから」
line = "「ギャンブルなんてとんでもありません！　トータルで見れば損するように出来てるんですから」"

[[dialogue]]
speaker = "アイリーン"
# 「でも、運よく大金を稼げちゃうかもしれないよ？」
line = "「でも、運よく大金を稼げちゃうかもしれないよ？」"

[[dialogue]]
speaker = "ウェンディ"
# 「運任せで稼ごうなんて金銭に対する冒涜です！」
line = "「運任せで稼ごうなんて金銭に対する冒涜です！」"

[[dialogue]]
speaker = "アイリーン"
# 「あれ？　でも『さすらいの旅人』さん、こんなこと言ってたかも……」
line = "「あれ？　でも『さすらいの旅人』さん、こんなこと言ってたかも……」"

[[dialogue]]
speaker = "アイリーン"
# 「『ギャンブルは運の強い者が勝つんじゃない、数字に強い者が勝つんだ』って」
line = "「『ギャンブルは運の強い者が勝つんじゃない、数字に強い者が勝つんだ』って」"

[[dialogue]]
speaker = "アイリーン"
# 「だったらウェンディさんって、ギャンブル最強なんじゃないかな？」
line = "「だったらウェンディさんって、ギャンブル最強なんじゃないかな？」"

[[dialogue]]
speaker = "ウェンディ"
# 「うっ……！」
line = "「うっ……！」"

[[dialogue]]
speaker = "アイリーン"
# 「せっかく来たんだし、気晴らしのつもりで遊んでいこうよ～、ねっ♪」
line = "「せっかく来たんだし、気晴らしのつもりで遊んでいこうよ～、ねっ♪」"

[[dialogue]]
speaker = "ウェンディ"
# （……もしかしてアイリーン、私が根を詰めていることを心配して、遊びに連れて来てくれたのでしょうか？）
line = "（……もしかしてアイリーン、私が根を詰めていることを心配して、遊びに連れて来てくれたのでしょうか？）"

[[dialogue]]
speaker = "ウェンディ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ウェンディ"
# 「わかりました。たまにはいいかもしれませんね」
line = "「わかりました。たまにはいいかもしれませんね」"

[[dialogue]]
speaker = "アイリーン"
# 「やっちゃえ、ウェンディさん！」
line = "「やっちゃえ、ウェンディさん！」"

[[dialogue]]
speaker = "ウェンディ"
# 「数字に強いものがギャンブルを征す……その言葉、私が証明して見せますよ！」
line = "「数字に強いものがギャンブルを征す……その言葉、私が証明して見せますよ！」"
