[[dialogue]]
speaker = "unk"
# 時はさかのぼって、ネビュラ基地。
line = "時はさかのぼって、ネビュラ基地。"

[[dialogue]]
speaker = "ヴァレリー"
# 「行ってしまいましたね。レイラたちの水着姿をこの目に収めたかったのですが、同行できなくて残念です」
line = "「行ってしまいましたね。レイラたちの水着姿をこの目に収めたかったのですが、同行できなくて残念です」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「もしわたくしが水着をいただきましても、ヴァレリー様の前では着ませんわ。レイラ様方もきっと同じでございます」
line = "「もしわたくしが水着をいただきましても、ヴァレリー様の前では着ませんわ。レイラ様方もきっと同じでございます」"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフ、いけずですね。ところで、皆さんはこれからのことは考えていますか？」
line = "「フフ、いけずですね。ところで、皆さんはこれからのことは考えていますか？」"

[[dialogue]]
speaker = "メテオラ"
# 「んー？　どういうことだー？」
line = "「んー？　どういうことだー？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「我々コラプサーは戦闘員。ですが、戦う相手がいなければ……ね？」
line = "「我々コラプサーは戦闘員。ですが、戦う相手がいなければ……ね？」"

[[dialogue]]
speaker = "エンジュ"
# 「コラプサーがなくなるかもって、そう言いたいのか？」
line = "「コラプサーがなくなるかもって、そう言いたいのか？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「そこまでは言いませんが、何かしらの備えはあってもよいかと」
line = "「そこまでは言いませんが、何かしらの備えはあってもよいかと」"

[[dialogue]]
speaker = "メテオラ"
# 「コラプサーがなくなるなんてイヤだぞ！　みんな仲間なんだぞ！」
line = "「コラプサーがなくなるなんてイヤだぞ！　みんな仲間なんだぞ！」"

[[dialogue]]
speaker = "メテオラ"
# 「……あたしは生まれつき力が強くて、触るだけでなんでも壊しちゃうから、パパもママも困って、施設に預けられて……」
line = "「……あたしは生まれつき力が強くて、触るだけでなんでも壊しちゃうから、パパもママも困って、施設に預けられて……」"

[[dialogue]]
speaker = "メテオラ"
# 「そこでもあたしは怖がられて、先生も怪我させちゃって……パパも、ママも、友達も、先生も好きなのに……好きだから傷付けたくなくて、一緒にいられなくて」
line = "「そこでもあたしは怖がられて、先生も怪我させちゃって……パパも、ママも、友達も、先生も好きなのに……好きだから傷付けたくなくて、一緒にいられなくて」"

[[dialogue]]
speaker = "メテオラ"
# 「でも、コラプサーのみんなだけが、一緒にいていいって言ってくれたんだ！」
line = "「でも、コラプサーのみんなだけが、一緒にいていいって言ってくれたんだ！」"

[[dialogue]]
speaker = "メテオラ"
# 「だからコラプサーがなくなるなんて絶対にイヤだ！」
line = "「だからコラプサーがなくなるなんて絶対にイヤだ！」"

[[dialogue]]
speaker = "エンジュ"
# 「あたしだって帰る場所がないのは同じだ」
line = "「あたしだって帰る場所がないのは同じだ」"

[[dialogue]]
speaker = "エンジュ"
# 「故郷はモンスターのせいでもうない。故郷を見捨てて、モンスターから逃げたあいつに復讐しようにも、未だに行方知れずだ」
line = "「故郷はモンスターのせいでもうない。故郷を見捨てて、モンスターから逃げたあいつに復讐しようにも、未だに行方知れずだ」"

[[dialogue]]
speaker = "エンジュ"
# 「復讐心が消えたわけじゃない。だけど今のあたしは、復讐だけがすべてじゃない。レイラがコラプサーに誘ってくれたから、あたしは今ここにいる」
line = "「復讐心が消えたわけじゃない。だけど今のあたしは、復讐だけがすべてじゃない。レイラがコラプサーに誘ってくれたから、あたしは今ここにいる」"

[[dialogue]]
speaker = "エンジュ"
# 「それにお前ら危なっかしいからな。レイラもメテオラも、放っておくには心配すぎる」
line = "「それにお前ら危なっかしいからな。レイラもメテオラも、放っておくには心配すぎる」"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフ、エンジュは優しいですね。ジュリエッテはいかがですか？」
line = "「フフ、エンジュは優しいですね。ジュリエッテはいかがですか？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「わたくしでございますか？　わたくしは……少なくとも実家に帰ることはございませんわね。家は捨てましたわ」
line = "「わたくしでございますか？　わたくしは……少なくとも実家に帰ることはございませんわね。家は捨てましたわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「実家ではわたくしはいらない子でございましたから。星力に目覚めず、何の取柄もないわたくしは……落ちこぼれとも言われておりました」
line = "「実家ではわたくしはいらない子でございましたから。星力に目覚めず、何の取柄もないわたくしは……落ちこぼれとも言われておりました」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「家出して、荒野をさまよって……そんな時にコラプサーに出会ったのでございます」
line = "「家出して、荒野をさまよって……そんな時にコラプサーに出会ったのでございます」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「世界を救い、英雄ともなれば、三界支配の足掛かり──もとい立身出世になると考えて、ご一緒したのでございますわ」
line = "「世界を救い、英雄ともなれば、三界支配の足掛かり──もとい立身出世になると考えて、ご一緒したのでございますわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「それにあのメスガ……コホン、シャルレーヌ様にギャフンと言わせなければわたくしの気が収まりませんわ」
line = "「それにあのメスガ……コホン、シャルレーヌ様にギャフンと言わせなければわたくしの気が収まりませんわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ヴァレリー様こそ、お家はよろしいのでございますか？　確か火事で焼け出されたと伺いましたが」
line = "「ヴァレリー様こそ、お家はよろしいのでございますか？　確か火事で焼け出されたと伺いましたが」"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフ、スチュアート家のご心配ありがとうございます。ですが、手持ちの屋敷がひとつ燃えただけですから大丈夫です」
line = "「フフ、スチュアート家のご心配ありがとうございます。ですが、手持ちの屋敷がひとつ燃えただけですから大丈夫です」"

[[dialogue]]
speaker = "ヴァレリー"
# 「人的被害もなく……いえ、正確には私だけ死んでしまっていたのですが」
line = "「人的被害もなく……いえ、正確には私だけ死んでしまっていたのですが」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ブラックホールの力で生き永らえていなければ、美術品と一緒に灰になっていたでしょうね。……まぁ、それはそれで悪くない最期かもしれません」
line = "「ブラックホールの力で生き永らえていなければ、美術品と一緒に灰になっていたでしょうね。……まぁ、それはそれで悪くない最期かもしれません」"

[[dialogue]]
speaker = "メテオラ"
# 「ヴァレリーの家族は無事なんだな！　よかったぞ！　……あ、じゃあ、実家に帰っちゃうのか？」
line = "「ヴァレリーの家族は無事なんだな！　よかったぞ！　……あ、じゃあ、実家に帰っちゃうのか？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「いえ？　そんなこと露も考えていませんよ。私は快楽のためにコラプサーにいますからね」
line = "「いえ？　そんなこと露も考えていませんよ。私は快楽のためにコラプサーにいますからね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「火事で美術品が焼け落ち、真の美に目覚めた私に、彼女は言いました。『もっと美しいものを見に行こう』と。その言葉に従ってよかったです」
line = "「火事で美術品が焼け落ち、真の美に目覚めた私に、彼女は言いました。『もっと美しいものを見に行こう』と。その言葉に従ってよかったです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「そのおかげでみんなに、そして星騎士の皆さんに出会えましたからね」
line = "「そのおかげでみんなに、そして星騎士の皆さんに出会えましたからね」"

[[dialogue]]
speaker = "メテオラ"
# 「そっかー。それはよかったな！」
line = "「そっかー。それはよかったな！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ええ、本当に。美しい星騎士たちが傷つくところを特等席で観られたのですから、それはもう眼福でした……フフ、フフフフ」
line = "「ええ、本当に。美しい星騎士たちが傷つくところを特等席で観られたのですから、それはもう眼福でした……フフ、フフフフ」"

[[dialogue]]
speaker = "メテオラ"
# 「そ、それはよかったのかー！？」
line = "「そ、それはよかったのかー！？」"

[[dialogue]]
speaker = "エンジュ"
# （変態だ）
line = "（変態だ）"

[[dialogue]]
speaker = "ジュリエッテ"
# （変態でございますわ）
line = "（変態でございますわ）"
