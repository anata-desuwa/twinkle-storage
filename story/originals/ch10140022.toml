[[dialogue]]
speaker = "unk"
# 第２話,恋愛相談,P
line = "第２話,恋愛相談,P"

[[dialogue]]
speaker = "unk"
# 街の喫茶店の窓際の席に腰かけたわたしとマリオン。
line = "街の喫茶店の窓際の席に腰かけたわたしとマリオン。"

[[dialogue]]
speaker = "unk"
# わたしは他に相談できる相手も思いつかず、同級生のマリオンを呼び出して、話を聞いてもらっていたのだった。
line = "わたしは他に相談できる相手も思いつかず、同級生のマリオンを呼び出して、話を聞いてもらっていたのだった。"

[[dialogue]]
speaker = "トワ先生"
# 「というのが、今日あった出来事のあらましです……」
line = "「というのが、今日あった出来事のあらましです……」"

[[dialogue]]
speaker = "マリオン"
# 「あらあら、トワ。あなた、思っていたよりも魔性の女ですね？」
line = "「あらあら、トワ。あなた、思っていたよりも魔性の女ですね？」"

[[dialogue]]
speaker = "トワ先生"
# 「そんなんじゃないよ……！」
line = "「そんなんじゃないよ……！」"

[[dialogue]]
speaker = "トワ先生"
# 「そんなんじゃなくてぇ……うぅぅぅ、わたし、本当にどうしよう……」
line = "「そんなんじゃなくてぇ……うぅぅぅ、わたし、本当にどうしよう……」"

[[dialogue]]
speaker = "マリオン"
# 「改めて、話を整理いたしましょうか」
line = "「改めて、話を整理いたしましょうか」"

[[dialogue]]
speaker = "マリオン"
# 「トワはついうっかり、教え子の男の子のことを先日好きになってしまった」
line = "「トワはついうっかり、教え子の男の子のことを先日好きになってしまった」"

[[dialogue]]
speaker = "トワ先生"
# 「うぐぅ……っ」
line = "「うぐぅ……っ」"

[[dialogue]]
speaker = "マリオン"
# 「そしてなんと、その想い人の方も、同じくトワのことを好きになっていた、と」
line = "「そしてなんと、その想い人の方も、同じくトワのことを好きになっていた、と」"

[[dialogue]]
speaker = "マリオン"
# 「素晴らしいハッピーエンドじゃありませんか♪　いったい何を悩んでいるのですか？」
line = "「素晴らしいハッピーエンドじゃありませんか♪　いったい何を悩んでいるのですか？」"

[[dialogue]]
speaker = "トワ先生"
# 「そんなの一目瞭然でしょ！　わたしと会長くんは、先生と生徒なんだよ……！」
line = "「そんなの一目瞭然でしょ！　わたしと会長くんは、先生と生徒なんだよ……！」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふ♪　普段からトワはお可愛らしいですが、今日は一段と輝いていますよ<emoji=heart04>」
line = "「まあまあ、うふふ♪　普段からトワはお可愛らしいですが、今日は一段と輝いていますよ<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「とはいえ、今のあなたはあまり余裕がないみたいですから、あまりからかいすぎるのもよくありませんね」
line = "「とはいえ、今のあなたはあまり余裕がないみたいですから、あまりからかいすぎるのもよくありませんね」"

[[dialogue]]
speaker = "マリオン"
# 「改めて確認なのですが、問題点は先生と生徒という関係性であり、そうでなければ何も問題はない、ということでしょうか？」
line = "「改めて確認なのですが、問題点は先生と生徒という関係性であり、そうでなければ何も問題はない、ということでしょうか？」"

[[dialogue]]
speaker = "トワ先生"
# 「うぅぅぅ～～～。いじわるな質問だよ、それは……」
line = "「うぅぅぅ～～～。いじわるな質問だよ、それは……」"

[[dialogue]]
speaker = "マリオン"
# 「ちなみに知っていましたか、トワ。流星市国には教師と生徒の恋愛を禁止する法律はありません♪」
line = "「ちなみに知っていましたか、トワ。流星市国には教師と生徒の恋愛を禁止する法律はありません♪」"

[[dialogue]]
speaker = "トワ先生"
# 「そんなのもちろん知って……って、ええぇぇえぇぇっ！？」
line = "「そんなのもちろん知って……って、ええぇぇえぇぇっ！？」"

[[dialogue]]
speaker = "マリオン"
# 「もちろん、流星学園や新星学園の雇用契約にも、その手の禁止事項はありません」
line = "「もちろん、流星学園や新星学園の雇用契約にも、その手の禁止事項はありません」"

[[dialogue]]
speaker = "トワ先生"
# 「でもでもでも！　昔から教師と生徒の恋愛は禁断の恋って、相場が決まってるじゃん！？」
line = "「でもでもでも！　昔から教師と生徒の恋愛は禁断の恋って、相場が決まってるじゃん！？」"

[[dialogue]]
speaker = "マリオン"
# 「はい。そういう時代、そういう倫理観が当たり前だった時期が長いのは、事実のようです」
line = "「はい。そういう時代、そういう倫理観が当たり前だった時期が長いのは、事実のようです」"

[[dialogue]]
speaker = "マリオン"
# 「ただ、リクリエの<ruby=ほんぱ>本波</ruby>が近づいてきていると予測されている昨今、星騎士とそのサポートをする教員が恋仲になることは、決して悪いことではないと、考えが改められたようです」
line = "「ただ、リクリエの<ruby>本波<rt>ほんぱ</rt></ruby>が近づいてきていると予測されている昨今、星騎士とそのサポートをする教員が恋仲になることは、決して悪いことではないと、考えが改められたようです」"

[[dialogue]]
speaker = "マリオン"
# 「恋人や妻のいる世界を守る、そうした星騎士が十二分に力を発揮できるようサポートする……」
line = "「恋人や妻のいる世界を守る、そうした星騎士が十二分に力を発揮できるようサポートする……」"

[[dialogue]]
speaker = "マリオン"
# 「そういった具体的で確固たる目的やモチベーションがある方が、世界を守る戦士として心強い、という見方があるようです」
line = "「そういった具体的で確固たる目的やモチベーションがある方が、世界を守る戦士として心強い、という見方があるようです」"

[[dialogue]]
speaker = "マリオン"
# 「ちなみに、この見解は教皇庁の立法機関が出している、公式な見解ですよ？　びっくりしましたか？　うふふっ<emoji=heart04>」
line = "「ちなみに、この見解は教皇庁の立法機関が出している、公式な見解ですよ？　びっくりしましたか？　うふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「ど、どうしてマリオンは、その法律にそんなに詳しいの……？」
line = "「ど、どうしてマリオンは、その法律にそんなに詳しいの……？」"

[[dialogue]]
speaker = "マリオン"
# 「一時期、教員になるのも悪くないかと思って、ちょっとだけ調べものをしていたんです<emoji=heart04>」
line = "「一時期、教員になるのも悪くないかと思って、ちょっとだけ調べものをしていたんです<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「せっかく可愛い年下の子たちを沢山愛でられる立場になっても、すぐに職を追われるようなことになっては、つまらないじゃありませんか」
line = "「せっかく可愛い年下の子たちを沢山愛でられる立場になっても、すぐに職を追われるようなことになっては、つまらないじゃありませんか」"

[[dialogue]]
speaker = "トワ先生"
# 「アウトーーー！？」
line = "「アウトーーー！？」"

[[dialogue]]
speaker = "トワ先生"
# 「生徒にちょっかいをかける気満々で教師になる奴がいますかぁ！」
line = "「生徒にちょっかいをかける気満々で教師になる奴がいますかぁ！」"

[[dialogue]]
speaker = "マリオン"
# 「はい。なのでやめておきました♪　それに<ruby=わたくし>私</ruby>は、教えるよりもお世話をする方が好きなのだと、気付きましたので」
line = "「はい。なのでやめておきました♪　それに<ruby>私<rt>わたくし</rt></ruby>は、教えるよりもお世話をする方が好きなのだと、気付きましたので」"

[[dialogue]]
speaker = "マリオン"
# 「ですがトワ、これであなたも、<ruby=わたくし>私</ruby>と同じ穴のムジナですね<emoji=heart04>」
line = "「ですがトワ、これであなたも、<ruby>私<rt>わたくし</rt></ruby>と同じ穴のムジナですね<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「うぐぐぐぐぐぐ……」
line = "「うぐぐぐぐぐぐ……」"

[[dialogue]]
speaker = "マリオン"
# 「あらあら、まあまあ♪　あまりお可愛らしい顔をすると、会長様の前に<ruby=わたくし>私</ruby>がつまみ食いをしてしまいますよ？」
line = "「あらあら、まあまあ♪　あまりお可愛らしい顔をすると、会長様の前に<ruby>私<rt>わたくし</rt></ruby>がつまみ食いをしてしまいますよ？」"

[[dialogue]]
speaker = "トワ先生"
# 「今、わたしに触ったら、本気で噛みつくからね！？」
line = "「今、わたしに触ったら、本気で噛みつくからね！？」"

[[dialogue]]
speaker = "unk"
# わたしはこれまでちょっかいをかけられたことがなかったが、マリオンは手癖が悪いうえに恋愛対象が女の子なので、今かなりぞくっと寒気がした。
line = "わたしはこれまでちょっかいをかけられたことがなかったが、マリオンは手癖が悪いうえに恋愛対象が女の子なので、今かなりぞくっと寒気がした。"

[[dialogue]]
speaker = "マリオン"
# 「結構本気だったことがバレてしまいましたか。やはりあなたは<ruby=わたくし>私</ruby>の友人です」
line = "「結構本気だったことがバレてしまいましたか。やはりあなたは<ruby>私<rt>わたくし</rt></ruby>の友人です」"

[[dialogue]]
speaker = "マリオン"
# 「うふふっ<emoji=heart04>　話が脱線してしまいましたが、とにかく教師と生徒が禁断の恋だったのはすでに昔のお話」
line = "「うふふっ<emoji=heart04>　話が脱線してしまいましたが、とにかく教師と生徒が禁断の恋だったのはすでに昔のお話」"

[[dialogue]]
speaker = "マリオン"
# 「これからはあなたがより星騎士のために働き、会長様はあなたを守るためにより精一杯世界を守る、そのようにあることが、国からも学園からも望まれていることなんです」
line = "「これからはあなたがより星騎士のために働き、会長様はあなたを守るためにより精一杯世界を守る、そのようにあることが、国からも学園からも望まれていることなんです」"

[[dialogue]]
speaker = "マリオン"
# 「であればこそ、あとはあなたの気持ち次第、ということです<emoji=heart04>」
line = "「であればこそ、あとはあなたの気持ち次第、ということです<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、来てくれたんだ、会長くん。空き教室に呼びつけちゃったりして、ごめんね」
line = "「あっ、来てくれたんだ、会長くん。空き教室に呼びつけちゃったりして、ごめんね」"

[[dialogue]]
speaker = "unk"
# こっちこそ、昨日は突然ごめんなさい
line = "こっちこそ、昨日は突然ごめんなさい"

[[dialogue]]
speaker = "トワ先生"
# 「ううん、違うの。あれはわたしに、覚悟が足りてなかったから……」
line = "「ううん、違うの。あれはわたしに、覚悟が足りてなかったから……」"

[[dialogue]]
speaker = "トワ先生"
# 「年下のキミにばっかり、勇気を出させちゃって、本当にごめんね」
line = "「年下のキミにばっかり、勇気を出させちゃって、本当にごめんね」"

[[dialogue]]
speaker = "トワ先生"
# 「わたしも一晩、真剣に考えてきたの……だから改めて、返事をさせてほしいな」
line = "「わたしも一晩、真剣に考えてきたの……だから改めて、返事をさせてほしいな」"

[[dialogue]]
speaker = "トワ先生"
# 「わたしもね……キミのことが、好きですっ」
line = "「わたしもね……キミのことが、好きですっ」"

[[dialogue]]
speaker = "トワ先生"
# 「ちょっと前に、ね？　『リクリエは俺が止めます』って言ってくれたでしょう？　『……そうしたら、先生は安心してくれますか？』って」
line = "「ちょっと前に、ね？　『リクリエは俺が止めます』って言ってくれたでしょう？　『……そうしたら、先生は安心してくれますか？』って」"

[[dialogue]]
speaker = "トワ先生"
# 「あれを言ってもらえた時、すごく嬉しくて、かっこよくて、女の子として、キミのことがどうしようもなく、好きになっちゃってた」
line = "「あれを言ってもらえた時、すごく嬉しくて、かっこよくて、女の子として、キミのことがどうしようもなく、好きになっちゃってた」"

[[dialogue]]
speaker = "トワ先生"
# 「だから……わたしの方から、改めて言うね」
line = "「だから……わたしの方から、改めて言うね」"

[[dialogue]]
speaker = "トワ先生"
# 「好きです、会長くん。わたしの……恋人になってくださいっ」
line = "「好きです、会長くん。わたしの……恋人になってくださいっ」"

[[dialogue]]
speaker = "unk"
# はい。喜んで！　トワちゃん
line = "はい。喜んで！　トワちゃん"

[[dialogue]]
speaker = "トワ先生"
# 「えっへへぇ～。なんだかちょっと、恥ずかしい……けど、それ以上に嬉しいなっ」
line = "「えっへへぇ～。なんだかちょっと、恥ずかしい……けど、それ以上に嬉しいなっ」"

[[dialogue]]
speaker = "トワ先生"
# 「あっ！　でもでも、節度のないお付き合いは先生、認められませんからねっ！」
line = "「あっ！　でもでも、節度のないお付き合いは先生、認められませんからねっ！」"

[[dialogue]]
speaker = "トワ先生"
# 「せめてキミが卒業するまでは、周囲には秘密にするくらい、こっそりと……ね？」
line = "「せめてキミが卒業するまでは、周囲には秘密にするくらい、こっそりと……ね？」"
