[[dialogue]]
speaker = "unk"
# 第５話,マリオンの実力,B
line = "第５話,マリオンの実力,B"

[[dialogue]]
speaker = "unk"
# キリカ師匠とマリオンさんが模擬戦をすると聞きつけて、アリーナにはメイド隊の子たちを中心として、人が集まってきていた。
line = "キリカ師匠とマリオンさんが模擬戦をすると聞きつけて、アリーナにはメイド隊の子たちを中心として、人が集まってきていた。"

[[dialogue]]
speaker = "フェニエル"
# 「わぁ～、私たちだけじゃなく、流星学園の生徒の人たちも沢山集まってきてますね……！」
line = "「わぁ～、私たちだけじゃなく、流星学園の生徒の人たちも沢山集まってきてますね……！」"

[[dialogue]]
speaker = "ナミエル"
# 「注目されるのは当然です。キリカさんは学園に通っていた当時、メイドの職務や修行があるため星徒会に入ることはなかったそうですが――」
line = "「注目されるのは当然です。キリカさんは学園に通っていた当時、メイドの職務や修行があるため星徒会に入ることはなかったそうですが――」"

[[dialogue]]
speaker = "ナミエル"
# 「学園随一の実力者として、数々の異変を解決していたことから、今でも星騎士として有名な方ですから」
line = "「学園随一の実力者として、数々の異変を解決していたことから、今でも星騎士として有名な方ですから」"

[[dialogue]]
speaker = "ナミエル"
# 「そんなキリカさんと、<b>あの</b>マリオンさんが戦うとなれば……」
line = "「そんなキリカさんと、<b>あの</b>マリオンさんが戦うとなれば……」"

[[dialogue]]
speaker = "マリオン"
# 「うふふっ♪　まさかキリカさんと戦うことになるだなんて、思いませんでした<emoji=heart04>　いつ以来でしょう？」
line = "「うふふっ♪　まさかキリカさんと戦うことになるだなんて、思いませんでした<emoji=heart04>　いつ以来でしょう？」"

[[dialogue]]
speaker = "キリカ"
# 「私が学園に通ってた時以来ですね。あなたが特別講師として授業した際に、模擬戦で手合わせをしました」
line = "「私が学園に通ってた時以来ですね。あなたが特別講師として授業した際に、模擬戦で手合わせをしました」"

[[dialogue]]
speaker = "unk"
# 特別講師？
line = "特別講師？"

[[dialogue]]
speaker = "ナミエル"
# 「マリオンさんは、星見家のメイドとして戦闘技術も一級品で、現在もキリカさんと同じく特別星騎士として、有事の際には戦闘許可が与えられています」
line = "「マリオンさんは、星見家のメイドとして戦闘技術も一級品で、現在もキリカさんと同じく特別星騎士として、有事の際には戦闘許可が与えられています」"

[[dialogue]]
speaker = "ナミエル"
# 「ですから、模擬戦の相手として、流星学園で特別講師として招かれることもあるんです」
line = "「ですから、模擬戦の相手として、流星学園で特別講師として招かれることもあるんです」"

[[dialogue]]
speaker = "フェニエル"
# 「キリカさんがお強い星騎士なのは、会長さんとよく訓練しているのを見かけて知っていましたが、マリオンさんもお強い方だったんですね……！」
line = "「キリカさんがお強い星騎士なのは、会長さんとよく訓練しているのを見かけて知っていましたが、マリオンさんもお強い方だったんですね……！」"

[[dialogue]]
speaker = "ナミエル"
# 「強いなんてものじゃありません。あの方は――」
line = "「強いなんてものじゃありません。あの方は――」"

[[dialogue]]
speaker = "キリカ"
# 「構えて下さい、マリオンさん」
line = "「構えて下さい、マリオンさん」"

[[dialogue]]
speaker = "キリカ"
# 「私は最初から、全力でぶつからせてもらいます」
line = "「私は最初から、全力でぶつからせてもらいます」"

[[dialogue]]
speaker = "マリオン"
# 「キリカさんの全力ですか。……ならば私も、本気でお相手せねばなりませんね」
line = "「キリカさんの全力ですか。……ならば私も、本気でお相手せねばなりませんね」"

[[dialogue]]
speaker = "マリオン"
# 「――変身」
line = "「――変身」"

[[dialogue]]
speaker = "フェニエル"
# 「あれが、マリオンさんの戦闘服姿……！」
line = "「あれが、マリオンさんの戦闘服姿……！」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。マリオンさんの星術は、人形を召喚して兵隊のように操ります。ですが、その真骨頂は――」
line = "「はい。マリオンさんの星術は、人形を召喚して兵隊のように操ります。ですが、その真骨頂は――」"

[[dialogue]]
speaker = "マリオン"
# 「人形縫製」
line = "「人形縫製」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "フェニエル"
# 「ま、マリオンさんが３人に分裂した……！？」
line = "「ま、マリオンさんが３人に分裂した……！？」"

[[dialogue]]
speaker = "ナミエル"
# 「マリオンさんの本気は、見た目だけでなく強さまで瓜２つと思わせる、<b>自分自身の人形</b>まで作り出すこと」
line = "「マリオンさんの本気は、見た目だけでなく強さまで瓜２つと思わせる、<b>自分自身の人形</b>まで作り出すこと」"

[[dialogue]]
speaker = "ナミエル"
# 「通称『ドールズマスター』」
line = "「通称『ドールズマスター』」"

[[dialogue]]
speaker = "ナミエル"
# 「今から１２年前に流星学園に通っていたＯＧであり――」
line = "「今から１２年前に流星学園に通っていたＯＧであり――」"

[[dialogue]]
speaker = "ナミエル"
# 「当時最強の、流星学園星徒会長だった方です」
line = "「当時最強の、流星学園星徒会長だった方です」"

[[dialogue]]
speaker = "マリオン"
# 「さあ、行きますよ？　キリカさん」
line = "「さあ、行きますよ？　キリカさん」"

[[dialogue]]
speaker = "キリカ"
# 「がっ……ぐっ……！」
line = "「がっ……ぐっ……！」"

[[dialogue]]
speaker = "マリオン"
# 「どうやら、ここまでのようですね」
line = "「どうやら、ここまでのようですね」"

[[dialogue]]
speaker = "unk"
# あの師匠が、負けるなんて……！
line = "あの師匠が、負けるなんて……！"

[[dialogue]]
speaker = "フェニエル"
# 「沢山の人形を操って、まるで軍隊みたいで……１人であんな数を使いこなせるなんて……すごい……！」
line = "「沢山の人形を操って、まるで軍隊みたいで……１人であんな数を使いこなせるなんて……すごい……！」"

[[dialogue]]
speaker = "フェニエル"
# 「マリオンさんは戦いながらも、次々と人形を作り出していくことができます。そうして増えに増えた圧倒的物量で場を制圧する……それがあの方の強さです」
line = "「マリオンさんは戦いながらも、次々と人形を作り出していくことができます。そうして増えに増えた圧倒的物量で場を制圧する……それがあの方の強さです」"

[[dialogue]]
speaker = "キリカ"
# 「っ……マリオンさん……やはりあなたは、私よりも強い……」
line = "「っ……マリオンさん……やはりあなたは、私よりも強い……」"

[[dialogue]]
speaker = "キリカ"
# 「それだけじゃなく……メイドとしても、誇るべき優秀な能力を持っている……なのに……！」
line = "「それだけじゃなく……メイドとしても、誇るべき優秀な能力を持っている……なのに……！」"

[[dialogue]]
speaker = "キリカ"
# 「どうして、自分がメイド長に相応しくないなどと言うのですか……！？」
line = "「どうして、自分がメイド長に相応しくないなどと言うのですか……！？」"

[[dialogue]]
speaker = "キリカ"
# 「なぜ、私にメイド長の座を譲ったのですか……！？」
line = "「なぜ、私にメイド長の座を譲ったのですか……！？」"

[[dialogue]]
speaker = "キリカ"
# 「私にはやはり、納得ができません……！」
line = "「私にはやはり、納得ができません……！」"

[[dialogue]]
speaker = "マリオン"
# 「……理由は、大きくわけて２つありますが……そうですね、その内の１つを少し話しますと――」
line = "「……理由は、大きくわけて２つありますが……そうですね、その内の１つを少し話しますと――」"

[[dialogue]]
speaker = "マリオン"
# 「私が星見家のメイドとして働こうと思ったのは、流星学園のことを好きになったからです」
line = "「私が星見家のメイドとして働こうと思ったのは、流星学園のことを好きになったからです」"

[[dialogue]]
speaker = "マリオン"
# 「星見家のメイドになれば、流星学園を――そこに通うお可愛くて若い子達の成長を、見守ることができますから」
line = "「星見家のメイドになれば、流星学園を――そこに通うお可愛くて若い子達の成長を、見守ることができますから」"

[[dialogue]]
speaker = "マリオン"
# 「私がメイド長になったのは、その延長です」
line = "「私がメイド長になったのは、その延長です」"

[[dialogue]]
speaker = "マリオン"
# 「でも、キリカさん。あなたは私とは違いますよね？」
line = "「でも、キリカさん。あなたは私とは違いますよね？」"

[[dialogue]]
speaker = "マリオン"
# 「星見家メイド隊の長であれば、星見家のメイドとして相応しくあるべきです。私はあなたがその座に最も相応しいと思った」
line = "「星見家メイド隊の長であれば、星見家のメイドとして相応しくあるべきです。私はあなたがその座に最も相応しいと思った」"

[[dialogue]]
speaker = "マリオン"
# 「キリカさん、あなたは自分のことを、メイド長としてこれまで相応しくないと思っていたんですか？」
line = "「キリカさん、あなたは自分のことを、メイド長としてこれまで相応しくないと思っていたんですか？」"

[[dialogue]]
speaker = "キリカ"
# 「それは……任されたからには、相応しくあろうと心がけています」
line = "「それは……任されたからには、相応しくあろうと心がけています」"

[[dialogue]]
speaker = "マリオン"
# 「任されたからには、ですか。真面目なキリカさんらしい答えですが……」
line = "「任されたからには、ですか。真面目なキリカさんらしい答えですが……」"

[[dialogue]]
speaker = "マリオン"
# 「……うん、決めました」
line = "「……うん、決めました」"

[[dialogue]]
speaker = "マリオン"
# 「そういうことであれば、やはりメイド長の座は返してもらいましょうか♪　風邪を引いて、迷惑をかけた責任として」
line = "「そういうことであれば、やはりメイド長の座は返してもらいましょうか♪　風邪を引いて、迷惑をかけた責任として」"

[[dialogue]]
speaker = "キリカ"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "マリオン"
# 「もしメイド長の座が欲しいのなら、今度は力づくで奪って下さい。だって、そうでしょう？」
line = "「もしメイド長の座が欲しいのなら、今度は力づくで奪って下さい。だって、そうでしょう？」"

[[dialogue]]
speaker = "マリオン"
# 「あなたの言い分では、強い私の方がメイド長に相応しいということですから」
line = "「あなたの言い分では、強い私の方がメイド長に相応しいということですから」"

[[dialogue]]
speaker = "マリオン"
# 「そういうわけで、後は会長様、よろしくお願い致しますね♪」
line = "「そういうわけで、後は会長様、よろしくお願い致しますね♪」"

[[dialogue]]
speaker = "マリオン"
# 「それでは皆様、失礼致します」
line = "「それでは皆様、失礼致します」"

[[dialogue]]
speaker = "キリカ"
# 「あ……」
line = "「あ……」"

[[dialogue]]
speaker = "キリカ"
# 「私は……」
line = "「私は……」"

[[dialogue]]
speaker = "unk"
# 去っていくマリオンさんに、師匠はそれ以上、声をかけることができなかった。
line = "去っていくマリオンさんに、師匠はそれ以上、声をかけることができなかった。"
