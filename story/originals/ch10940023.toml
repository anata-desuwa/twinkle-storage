[[dialogue]]
speaker = "unk"
# 第３話,ご飯をオカズにご飯を食べる,P
line = "第３話,ご飯をオカズにご飯を食べる,P"

[[dialogue]]
speaker = "美鶴"
# 「ん、よし。これで生地もボタンも揃った、と。会長さん、道案内ありがとね」
line = "「ん、よし。これで生地もボタンも揃った、と。会長さん、道案内ありがとね」"

[[dialogue]]
speaker = "美鶴"
# 「初めて行くお店だったから、よくわかんなくてさ。うち、基本的に引きこもってばっかだし」
line = "「初めて行くお店だったから、よくわかんなくてさ。うち、基本的に引きこもってばっかだし」"

[[dialogue]]
speaker = "美鶴"
# 「あ……小腹空いたと思ったら、もうお昼過ぎてんじゃん。会長さんと過ごしてると、時間があっという間だね」
line = "「あ……小腹空いたと思ったら、もうお昼過ぎてんじゃん。会長さんと過ごしてると、時間があっという間だね」"

[[dialogue]]
speaker = "美鶴"
# 「会長さん、お昼ご飯食べてかない？　この辺にどんなお店があるかも知らんけど」
line = "「会長さん、お昼ご飯食べてかない？　この辺にどんなお店があるかも知らんけど」"

[[dialogue]]
speaker = "美鶴"
# 「買い物に付き合ってくれたお礼。うちが奢るよ」
line = "「買い物に付き合ってくれたお礼。うちが奢るよ」"

[[dialogue]]
speaker = "unk"
# 何か食べたいものはある？
line = "何か食べたいものはある？"

[[dialogue]]
speaker = "美鶴"
# 「んー……これと言って嫌いなものってないんだよね。出されれば、なんでも食べるし」
line = "「んー……これと言って嫌いなものってないんだよね。出されれば、なんでも食べるし」"

[[dialogue]]
speaker = "美鶴"
# 「てか、人間界って何食べてもだいたい美味しいからさー……あそこはイタリアンのお店？　パスタとかピザ、嫌いじゃないよ」
line = "「てか、人間界って何食べてもだいたい美味しいからさー……あそこはイタリアンのお店？　パスタとかピザ、嫌いじゃないよ」"

[[dialogue]]
speaker = "美鶴"
# 「あっちはファーストフードだよね。ハンバーガーも嫌いじゃない」
line = "「あっちはファーストフードだよね。ハンバーガーも嫌いじゃない」"

[[dialogue]]
speaker = "unk"
# お寿司は？
line = "お寿司は？"

[[dialogue]]
speaker = "美鶴"
# 「あー、わりと好きかも。ハンバーガーよりはお寿司だね」
line = "「あー、わりと好きかも。ハンバーガーよりはお寿司だね」"

[[dialogue]]
speaker = "unk"
# パンよりご飯派ってこと？
line = "パンよりご飯派ってこと？"

[[dialogue]]
speaker = "美鶴"
# 「うん！　絶対、ご飯！　白米！」
line = "「うん！　絶対、ご飯！　白米！」"

[[dialogue]]
speaker = "unk"
# 食い気味に被せてきた。
line = "食い気味に被せてきた。"

[[dialogue]]
speaker = "unk"
# いつもはダウナーな美鶴が、こんなにはっきり断言するのは珍しい。
line = "いつもはダウナーな美鶴が、こんなにはっきり断言するのは珍しい。"

[[dialogue]]
speaker = "unk"
# ……そんなに好きなんだ？
line = "……そんなに好きなんだ？"

[[dialogue]]
speaker = "美鶴"
# 「あー……まあ、そっすね」
line = "「あー……まあ、そっすね」"

[[dialogue]]
speaker = "美鶴"
# 「ご飯の真の美味しさを知ったのは、こっちに来てからかな。人間界のお米、美味しすぎでしょ」
line = "「ご飯の真の美味しさを知ったのは、こっちに来てからかな。人間界のお米、美味しすぎでしょ」"

[[dialogue]]
speaker = "美鶴"
# 「おぎゃあと生まれた時から、あんなん食べてるとかマジ贅沢。そりゃ舌肥えるって」
line = "「おぎゃあと生まれた時から、あんなん食べてるとかマジ贅沢。そりゃ舌肥えるって」"

[[dialogue]]
speaker = "美鶴"
# 「粘り気と甘味のバランスが神ってるし。いつまでも噛んでられる。毎日食べても飽きない食べ物なんて、他にないよ」
line = "「粘り気と甘味のバランスが神ってるし。いつまでも噛んでられる。毎日食べても飽きない食べ物なんて、他にないよ」"

[[dialogue]]
speaker = "unk"
# そんなに白米好きなんだ
line = "そんなに白米好きなんだ"

[[dialogue]]
speaker = "美鶴"
# 「好きすね。大好き。白米推し」
line = "「好きすね。大好き。白米推し」"

[[dialogue]]
speaker = "美鶴"
# 「メイド仲間に『好きな食べ物なに？』って聞かれたりするんすけど……返答に困るんすよね。白米が好きすぎて」
line = "「メイド仲間に『好きな食べ物なに？』って聞かれたりするんすけど……返答に困るんすよね。白米が好きすぎて」"

[[dialogue]]
speaker = "美鶴"
# 「ほら、普通、好きな食べ物って聞かれたら、みんなはカレーとかハンバーグとか、ご飯に合うオカズを言うじゃないすか」
line = "「ほら、普通、好きな食べ物って聞かれたら、みんなはカレーとかハンバーグとか、ご飯に合うオカズを言うじゃないすか」"

[[dialogue]]
speaker = "美鶴"
# 「わりと『白米』って言いづらいんすよ。おひついっぱいの白米があるだけで、うち、十分幸せなんすけど」
line = "「わりと『白米』って言いづらいんすよ。おひついっぱいの白米があるだけで、うち、十分幸せなんすけど」"

[[dialogue]]
speaker = "美鶴"
# 「こんな話してたら、もう絶対白米しか食べる気しないすわ……あっ。あそこのお店、ご飯食べ放題だって」
line = "「こんな話してたら、もう絶対白米しか食べる気しないすわ……あっ。あそこのお店、ご飯食べ放題だって」"

[[dialogue]]
speaker = "美鶴"
# 「……え、あのお店でいいの？　ぶっちゃけ、どこにでもある定食屋さんだよ。うちはめちゃ嬉しいけど」
line = "「……え、あのお店でいいの？　ぶっちゃけ、どこにでもある定食屋さんだよ。うちはめちゃ嬉しいけど」"

[[dialogue]]
speaker = "unk"
# 俺は美鶴の手を引き、お洒落とは縁遠い定食屋さんに入った。
line = "俺は美鶴の手を引き、お洒落とは縁遠い定食屋さんに入った。"

[[dialogue]]
speaker = "美鶴"
# 「いただきまーす」
line = "「いただきまーす」"

[[dialogue]]
speaker = "unk"
# 俺は生姜焼き定食、美鶴はサバ味噌定食を注文。
line = "俺は生姜焼き定食、美鶴はサバ味噌定食を注文。"

[[dialogue]]
speaker = "美鶴"
# 「ぱく、ぱく、ぱく、ぱく、ん～～～っ<emoji=heart04>」
line = "「ぱく、ぱく、ぱく、ぱく、ん～～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
# 「はー……うま、うっまぁ……<emoji=heart04>　こんな美味しいご飯が、無限におかわりできるとかマジ最高～……<emoji=heart04>」
line = "「はー……うま、うっまぁ……<emoji=heart04>　こんな美味しいご飯が、無限におかわりできるとかマジ最高～……<emoji=heart04>」"

[[dialogue]]
speaker = "美鶴"
# 「このサバ味噌、味濃いめで白米にめちゃ合う～。ヤバ、サバ１口で白米１杯食べられる」
line = "「このサバ味噌、味濃いめで白米にめちゃ合う～。ヤバ、サバ１口で白米１杯食べられる」"

[[dialogue]]
speaker = "美鶴"
# 「もぐもぐもぐ……すみません、おかわりください」
line = "「もぐもぐもぐ……すみません、おかわりください」"

[[dialogue]]
speaker = "美鶴"
# 「あれ、会長さんはおかわりしないの？　うちばっか食べてんの、ちょい恥ずいんすけど……」
line = "「あれ、会長さんはおかわりしないの？　うちばっか食べてんの、ちょい恥ずいんすけど……」"

[[dialogue]]
speaker = "美鶴"
# 「なにニヤニヤしてんの。うちが食べてるとこ見てても別に面白くないでしょ。あんま見んなし」
line = "「なにニヤニヤしてんの。うちが食べてるとこ見てても別に面白くないでしょ。あんま見んなし」"

[[dialogue]]
speaker = "美鶴"
# 「あ、おかわり来た。炊き立てアッツアツすね。いただきまーす」
line = "「あ、おかわり来た。炊き立てアッツアツすね。いただきまーす」"

[[dialogue]]
speaker = "美鶴"
# 「はふ、ほふ……は～～、マジうま～……<emoji=heart04>」
line = "「はふ、ほふ……は～～、マジうま～……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 結局、美鶴はご飯を５回おかわりした。
line = "結局、美鶴はご飯を５回おかわりした。"

[[dialogue]]
speaker = "unk"
# 俺の頼んだ生姜焼きもご飯に合う味付けでとても美味しかったけれど、それ以上に。
line = "俺の頼んだ生姜焼きもご飯に合う味付けでとても美味しかったけれど、それ以上に。"

[[dialogue]]
speaker = "unk"
# いつになく満面の笑顔でご飯を幸せそうに頬張る美鶴を見てるだけで、お腹と胸がいっぱいになったのだった。
line = "いつになく満面の笑顔でご飯を幸せそうに頬張る美鶴を見てるだけで、お腹と胸がいっぱいになったのだった。"
