[[dialogue]]
speaker = "unk"
# 今日はマトイの巫女フォームの自主練に付き合うため、浅草安倍野神社にやって来ていた。
line = "今日はマトイの巫女フォームの自主練に付き合うため、浅草安倍野神社にやって来ていた。"

[[dialogue]]
speaker = "unk"
# 休憩中、ミヤハルが試しに作ったという和菓子の『よもぎ団子』を差し入れに来て、マトイと２人で食べていたのだが――
line = "休憩中、ミヤハルが試しに作ったという和菓子の『よもぎ団子』を差し入れに来て、マトイと２人で食べていたのだが――"

[[dialogue]]
speaker = "マトイ"
# 「これ、美味しいね！　ミヤハル、意外とお菓子作り上手だったんだ……。後で一緒に作ったりしないかって誘ってみようかな？」
line = "「これ、美味しいね！　ミヤハル、意外とお菓子作り上手だったんだ……。後で一緒に作ったりしないかって誘ってみようかな？」"

[[dialogue]]
speaker = "クロト"
# 「うぐっ……！？」
line = "「うぐっ……！？」"

[[dialogue]]
speaker = "マトイ"
# 「会長！？　急にどうしたの！？」
line = "「会長！？　急にどうしたの！？」"

[[dialogue]]
speaker = "クロト"
# 「このよもぎ団子……たぶん中に何か……！」
line = "「このよもぎ団子……たぶん中に何か……！」"

[[dialogue]]
speaker = "unk"
# なんだかすごく体が熱くなって行くのを感じる。
line = "なんだかすごく体が熱くなって行くのを感じる。"

[[dialogue]]
speaker = "マトイ"
# 「えっ！？　あっ、なんかお皿の上に敷いてあった和紙が光って……文字が浮き出てる！？　えっと――」
line = "「えっ！？　あっ、なんかお皿の上に敷いてあった和紙が光って……文字が浮き出てる！？　えっと――」"

[[dialogue]]
speaker = "マトイ"
# 「――陰陽術で試しに作った媚薬を入れてみたので、後でナニをどうしたか感想を聞かせておくれやす<emoji=heart04>　ｂｙミヤハル……」
line = "「――陰陽術で試しに作った媚薬を入れてみたので、後でナニをどうしたか感想を聞かせておくれやす<emoji=heart04>　ｂｙミヤハル……」"

[[dialogue]]
speaker = "マトイ"
# 「あ、あんのドスケベ陰陽師～～～っ！」
line = "「あ、あんのドスケベ陰陽師～～～っ！」"

[[dialogue]]
speaker = "unk"
