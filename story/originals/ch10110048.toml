# 「っ……んぶぅっ<emoji=heart04><emoji=heart04><emoji=heart04>　んん～～～～～～～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「っ……んぶぅっ<emoji=heart04><emoji=heart04><emoji=heart04>　んん～～～～～～～～～～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 限界に達した俺は、マトイの口内に思いっきり精を吐き出した。
line = "限界に達した俺は、マトイの口内に思いっきり精を吐き出した。"

[[dialogue]]
speaker = "マトイ"
# 「んくっ……んくっ……んくっ……ぷはぁっ<emoji=heart04>　んっ……んむぅっ<emoji=heart04>」
line = "「んくっ……んくっ……んくっ……ぷはぁっ<emoji=heart04>　んっ……んむぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「……んぶっ<emoji=heart04>　ぷあぁっ<emoji=heart04>　飲み切れなくて、こぼれちゃう……はぁんっ<emoji=heart04>」
line = "「……んぶっ<emoji=heart04>　ぷあぁっ<emoji=heart04>　飲み切れなくて、こぼれちゃう……はぁんっ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「んむっ……んくっ……ごっくん<emoji=heart04>　あっ<emoji=heart04>　はあぁ――っ<emoji=heart04><emoji=heart04>」
line = "「んむっ……んくっ……ごっくん<emoji=heart04>　あっ<emoji=heart04>　はあぁ――っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ふあぁぁあんっ<emoji=heart04><emoji=heart04>　あああっ<emoji=heart04>　精液の匂いと味で、もう１回イっちゃったぁ……<emoji=heart04>」
line = "「ふあぁぁあんっ<emoji=heart04><emoji=heart04>　あああっ<emoji=heart04>　精液の匂いと味で、もう１回イっちゃったぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マトイがイった拍子に口を離して、彼女の顔や体に精液がかかってしまう。
line = "マトイがイった拍子に口を離して、彼女の顔や体に精液がかかってしまう。"

[[dialogue]]
speaker = "マトイ"
# 「んっ……<emoji=heart04>　はあぁ<emoji=heart04>　ふうぅ……<emoji=heart04>　会長のオスの匂いがいっぱいで、すごぉい……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　はあぁ<emoji=heart04>　ふうぅ……<emoji=heart04>　会長のオスの匂いがいっぱいで、すごぉい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# しかし、その顔は全然嫌そうではなく……むしろ嬉しそうで。
line = "しかし、その顔は全然嫌そうではなく……むしろ嬉しそうで。"

[[dialogue]]
speaker = "マトイ"
# 「私、自分で思ってたよりも会長のおち○ちんしゃぶるの、好きかも……<emoji=heart04>　自分が好きな人の匂いで染められてる感じがして……<emoji=heart04>」
line = "「私、自分で思ってたよりも会長のおち○ちんしゃぶるの、好きかも……<emoji=heart04>　自分が好きな人の匂いで染められてる感じがして……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ね、ねぇ……会長？」
line = "「ね、ねぇ……会長？」"

[[dialogue]]
speaker = "マトイ"
# 「朝、会長の家まで起こしに行ってさ、モーニングフェラで起こしてみたい……って言ったら、引く？」
line = "「朝、会長の家まで起こしに行ってさ、モーニングフェラで起こしてみたい……って言ったら、引く？」"

[[dialogue]]
speaker = "unk"
# 上目遣いで言われて、俺は思わず想像してしまう。
line = "上目遣いで言われて、俺は思わず想像してしまう。"

[[dialogue]]
speaker = "マトイ"
# 「あっ<emoji=heart04>　すごい……<emoji=heart04>　会長のおち○ちん、もう復活して<emoji=heart04>」
line = "「あっ<emoji=heart04>　すごい……<emoji=heart04>　会長のおち○ちん、もう復活して<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「んふふっ<emoji=heart04>　じゃあ今度、実際にやってみるから……楽しみにしててね、会長<emoji=heart04>」
line = "「んふふっ<emoji=heart04>　じゃあ今度、実際にやってみるから……楽しみにしててね、会長<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 精液まみれになったマトイはうっとりした顔で笑って、そんなことを言うのだった。
line = "精液まみれになったマトイはうっとりした顔で笑って、そんなことを言うのだった。"
