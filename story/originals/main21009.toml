[[dialogue]]
speaker = "unk"
# 第９話,グレイス,B
line = "第９話,グレイス,B"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ノヴァセイクリッドアロー！」
line = "「ノヴァセイクリッドアロー！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが大剣を振るうと、斬撃が光の矢となって極星従騎を貫く。
line = "ヴィーナスが大剣を振るうと、斬撃が光の矢となって極星従騎を貫く。"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィン……！」
line = "「ヒヒィン……！」"

[[dialogue]]
speaker = "unk"
# 矢が極星従騎に風穴を開け、神馬の巨体が光となって消滅した。
line = "矢が極星従騎に風穴を開け、神馬の巨体が光となって消滅した。"

[[dialogue]]
speaker = "unk"
# 無数にいた極星従騎ももう残っておらず、残るはグレイスだけだ。
line = "無数にいた極星従騎ももう残っておらず、残るはグレイスだけだ。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「……っ」
line = "「……っ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ごめんなさい、極星従騎は片付けたけど、星力切れだわ……」
line = "「ごめんなさい、極星従騎は片付けたけど、星力切れだわ……」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう、ヴィーナス。今は休んでいてくれ」
line = "「ありがとう、ヴィーナス。今は休んでいてくれ」"

[[dialogue]]
speaker = "メルエル"
# 「うん、後は任せて！」
line = "「うん、後は任せて！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、お願い！」
line = "「ええ、お願い！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスを庇うように前に立ち、俺とメルエルでグレイスに対峙する。
line = "ヴィーナスを庇うように前に立ち、俺とメルエルでグレイスに対峙する。"

[[dialogue]]
speaker = "グレイス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "クロト"
# 「もう一度言う。アルタイルはデネブと戦うつもりはない」
line = "「もう一度言う。アルタイルはデネブと戦うつもりはない」"

[[dialogue]]
speaker = "クロト"
# 「俺たち新星学園の星騎士は、アルタイルもデネブも救いたいと思っている。一緒に戦うことはできないか？」
line = "「俺たち新星学園の星騎士は、アルタイルもデネブも救いたいと思っている。一緒に戦うことはできないか？」"

[[dialogue]]
speaker = "グレイス"
# 「何度も言わせないでください。あなたの言うことはもう信じません！」
line = "「何度も言わせないでください。あなたの言うことはもう信じません！」"

[[dialogue]]
speaker = "クロト"
# （もう信じない……？　まるで一度は信じていたような……）
line = "（もう信じない……？　まるで一度は信じていたような……）"

[[dialogue]]
speaker = "グレイス"
# 「それに私はルヴィを信じています！　ルヴィに任務を与えられてここにいる以上、失敗するわけにはいきません！」
line = "「それに私はルヴィを信じています！　ルヴィに任務を与えられてここにいる以上、失敗するわけにはいきません！」"

[[dialogue]]
speaker = "グレイス"
# 「あなたたちには、ここで消えてもらいます！」
line = "「あなたたちには、ここで消えてもらいます！」"

[[dialogue]]
speaker = "メルエル"
# 「させないよ！」
line = "「させないよ！」"

[[dialogue]]
speaker = "unk"
# 音速を超えて迫る茨の鞭を、メルエルの剣が切り払う。
line = "音速を超えて迫る茨の鞭を、メルエルの剣が切り払う。"

[[dialogue]]
speaker = "メルエル"
# 「っ……攻撃が重い……！」
line = "「っ……攻撃が重い……！」"

[[dialogue]]
speaker = "unk"
# 鞭の恐ろしさはその射程と、加速が乗った時のスピードと威力。
line = "鞭の恐ろしさはその射程と、加速が乗った時のスピードと威力。"

[[dialogue]]
speaker = "unk"
# しかし至近距離では振り回すことができず、その力は発揮できないはず。
line = "しかし至近距離では振り回すことができず、その力は発揮できないはず。"

[[dialogue]]
speaker = "クロト"
# 「それなら……残念だが実力で止めさせてもらう！」
line = "「それなら……残念だが実力で止めさせてもらう！」"

[[dialogue]]
speaker = "グレイス"
# 「やれるものならどうぞ！」
line = "「やれるものならどうぞ！」"

[[dialogue]]
speaker = "unk"
# グレイスの懐に飛び込み、零距離から拳を叩き込む──！
line = "グレイスの懐に飛び込み、零距離から拳を叩き込む──！"

[[dialogue]]
speaker = "グレイス"
# 「そう来るのはわかっていました！」
line = "「そう来るのはわかっていました！」"

[[dialogue]]
speaker = "unk"
# グレイスが飛び退くと同時に蒼い翅が煌めき、視界を埋め尽くすほどの蝶の群れが俺を襲う。
line = "グレイスが飛び退くと同時に蒼い翅が煌めき、視界を埋め尽くすほどの蝶の群れが俺を襲う。"

[[dialogue]]
speaker = "クロト"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "unk"
# 反撃しながら俺の追撃を封じる、巧妙な一手だ。だが攻めの手は緩めない。
line = "反撃しながら俺の追撃を封じる、巧妙な一手だ。だが攻めの手は緩めない。"

[[dialogue]]
speaker = "メルエル"
# 「こっちからいくよ──」
line = "「こっちからいくよ──」"

[[dialogue]]
speaker = "グレイス"
# 「させません──」
line = "「させません──」"

[[dialogue]]
speaker = "メルエル"
# 「ディヴォーテッド・ワルツ！」
line = "「ディヴォーテッド・ワルツ！」"

[[dialogue]]
speaker = "グレイス"
# 「フェアリー・サークレット！」
line = "「フェアリー・サークレット！」"

[[dialogue]]
speaker = "unk"
# 光と水が弧を描き、２つの円が激しくぶつかり合って弾けた。
line = "光と水が弧を描き、２つの円が激しくぶつかり合って弾けた。"

[[dialogue]]
speaker = "グレイス"
# 「ベアトが言っていましたね。リクリエを起こそうとしているのは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』で、ルヴィはその存在に生み出されたと」
line = "「ベアトが言っていましたね。リクリエを起こそうとしているのは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』で、ルヴィはその存在に生み出されたと」"

[[dialogue]]
speaker = "グレイス"
# 「ベアトがお人好しなのをいいことに、よくもそんな壮大な嘘を吹き込んでくれましたね、魔王！」
line = "「ベアトがお人好しなのをいいことに、よくもそんな壮大な嘘を吹き込んでくれましたね、魔王！」"

[[dialogue]]
speaker = "クロト"
# 「嘘じゃない！　俺たちはフィーニスの塔で、女神テルルから聞いたんだ」
line = "「嘘じゃない！　俺たちはフィーニスの塔で、女神テルルから聞いたんだ」"

[[dialogue]]
speaker = "グレイス"
# 「神の声を聞いた……！？　ルヴィの真似ですか！？」
line = "「神の声を聞いた……！？　ルヴィの真似ですか！？」"

[[dialogue]]
speaker = "グレイス"
# 「不愉快です！　私たちの世界を見捨てた卑怯者に、女神様の声が聞こえるはずがないでしょう！」
line = "「不愉快です！　私たちの世界を見捨てた卑怯者に、女神様の声が聞こえるはずがないでしょう！」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィは、モンスターが出現すれば誰よりも早く駆けつけるデネブの英雄です……！」
line = "「ルヴィは、モンスターが出現すれば誰よりも早く駆けつけるデネブの英雄です……！」"

[[dialogue]]
speaker = "グレイス"
# 「流星市国の再建にも携わり、効率的な復興計画を立て、常に市民に寄り添い、見守ってきました！！」
line = "「流星市国の再建にも携わり、効率的な復興計画を立て、常に市民に寄り添い、見守ってきました！！」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィは誰よりもデネブに尽くしてきたんです！　これから滅ぼす世界のために、そんなことをするなんてあり得ません！」
line = "「ルヴィは誰よりもデネブに尽くしてきたんです！　これから滅ぼす世界のために、そんなことをするなんてあり得ません！」"

[[dialogue]]
speaker = "unk"
# 一度は滅びかけたデネブを救い、崩壊した流星市国をあそこまで再建させた。
line = "一度は滅びかけたデネブを救い、崩壊した流星市国をあそこまで再建させた。"

[[dialogue]]
speaker = "unk"
# デネブの住民からすれば、救世の英雄と呼ぶに値する偉業なのは間違いない。
line = "デネブの住民からすれば、救世の英雄と呼ぶに値する偉業なのは間違いない。"

[[dialogue]]
speaker = "unk"
# だが俺たちもフィーニスの塔で真実に触れた以上、譲ることはできない。
line = "だが俺たちもフィーニスの塔で真実に触れた以上、譲ることはできない。"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィが今まで私たちを裏切ったことはありません！」
line = "「ルヴィが今まで私たちを裏切ったことはありません！」"

[[dialogue]]
speaker = "グレイス"
# 「なのに魔王は……あなたは……」
line = "「なのに魔王は……あなたは……」"

[[dialogue]]
speaker = "グレイス"
# 「守るって、言ってくれたのに……！」
line = "「守るって、言ってくれたのに……！」"

[[dialogue]]
speaker = "クロト"
# 「言ってくれた……？　やはり君はデネブの俺と会ったことがあるのか！？」
line = "「言ってくれた……？　やはり君はデネブの俺と会ったことがあるのか！？」"

[[dialogue]]
speaker = "グレイス"
# 「会ったことがあるのか……ですって？　はっ……やっぱり忘れてましたか。そうだろうとは思ってましたけど……！」
line = "「会ったことがあるのか……ですって？　はっ……やっぱり忘れてましたか。そうだろうとは思ってましたけど……！」"

[[dialogue]]
speaker = "グレイス"
# 「そうですよ！　私がまだ幼かった頃、リクリエが起きる前の流星市国で、あなたと会いました！」
line = "「そうですよ！　私がまだ幼かった頃、リクリエが起きる前の流星市国で、あなたと会いました！」"

[[dialogue]]
speaker = "グレイス"
# 「あなたにとっては、どうでもいい小娘と会っただけの、なんてことない時間だったのかもしれませんけど……！」
line = "「あなたにとっては、どうでもいい小娘と会っただけの、なんてことない時間だったのかもしれませんけど……！」"

[[dialogue]]
speaker = "グレイス"
# 「幼い私にとっては……『魔王』と呼ばれるヒトと初めて出会った、かけがえのない思い出だったんです！」
line = "「幼い私にとっては……『魔王』と呼ばれるヒトと初めて出会った、かけがえのない思い出だったんです！」"

[[dialogue]]
speaker = "グレイス"
# 「『魔王』は太陽の壁画で、世界を滅ぼそうとした悪だと伝えられている。ならばあなたも悪なのかと……」
line = "「『魔王』は太陽の壁画で、世界を滅ぼそうとした悪だと伝えられている。ならばあなたも悪なのかと……」"

[[dialogue]]
speaker = "グレイス"
# 「けれどあなたは否定し、この世界を守ると言った……幼かった私と約束をしてくれた……してくれたのに……！」
line = "「けれどあなたは否定し、この世界を守ると言った……幼かった私と約束をしてくれた……してくれたのに……！」"

[[dialogue]]
speaker = "グレイス"
# 「それなのにあなたは、デネブを裏切ってアルタイルに逃げたんです……！」
line = "「それなのにあなたは、デネブを裏切ってアルタイルに逃げたんです……！」"

[[dialogue]]
speaker = "メルエル"
# 「それは違うよ！」
line = "「それは違うよ！」"

[[dialogue]]
speaker = "メルエル"
# 「私、小さい頃に会長くんと会ったことあるんだから！　だから今ここにいる会長くんは、アルタイルの会長くんだよ！」
line = "「私、小さい頃に会長くんと会ったことあるんだから！　だから今ここにいる会長くんは、アルタイルの会長くんだよ！」"

[[dialogue]]
speaker = "クロト"
# 「今の君には信じられないかもしれないけど……デネブの緋宮クロトと俺は違う存在だ！」
line = "「今の君には信じられないかもしれないけど……デネブの緋宮クロトと俺は違う存在だ！」"

[[dialogue]]
speaker = "クロト"
# 「リクリエに負けて、世界を守れなかったことは事実だけど、彼も命を懸けて戦っていたんだ！」
line = "「リクリエに負けて、世界を守れなかったことは事実だけど、彼も命を懸けて戦っていたんだ！」"

[[dialogue]]
speaker = "グレイス"
# 「そんなこと言われたって……今更信じられません！」
line = "「そんなこと言われたって……今更信じられません！」"

[[dialogue]]
speaker = "unk"
# グレイスが再び鞭を振るい、俺が拳で迎え撃つ。
line = "グレイスが再び鞭を振るい、俺が拳で迎え撃つ。"

[[dialogue]]
speaker = "クロト"
# 「ぐっ……！」
line = "「ぐっ……！」"

[[dialogue]]
speaker = "unk"
# 攻撃を相殺することには成功したが、その衝撃に体が軋んだ。
line = "攻撃を相殺することには成功したが、その衝撃に体が軋んだ。"

[[dialogue]]
speaker = "クロト"
# 「この威力、チナと戦った時の力か……！」
line = "「この威力、チナと戦った時の力か……！」"

[[dialogue]]
speaker = "グレイス"
# 「ええ、そうです。これはルヴィから与えられた──いえ、ルヴィが女神様から借り受けた霊力……！」
line = "「ええ、そうです。これはルヴィから与えられた──いえ、ルヴィが女神様から借り受けた霊力……！」"

[[dialogue]]
speaker = "unk"
# かつてチナも所持していた──俺たちとは違う色味をしたセレスティアが怪しく輝くと、さらにグレイスのまとう力が膨れ上がる。
line = "かつてチナも所持していた──俺たちとは違う色味をしたセレスティアが怪しく輝くと、さらにグレイスのまとう力が膨れ上がる。"

[[dialogue]]
speaker = "unk"
# 俺がかつて守護天使から借りた、<ruby=クロスダスト>霊屑</ruby>のようなものか──それでようやく合点がいった。
line = "俺がかつて守護天使から借りた、<ruby>霊屑<rt>クロスダスト</rt></ruby>のようなものか──それでようやく合点がいった。"

[[dialogue]]
speaker = "unk"
# チナと再戦した時からずっと疑問に思っていた。なぜ短期間であれほどまでに戦闘力が飛躍していたのかを。
line = "チナと再戦した時からずっと疑問に思っていた。なぜ短期間であれほどまでに戦闘力が飛躍していたのかを。"

[[dialogue]]
speaker = "unk"
# 察するにあのセレスティアには霊力が込められており、任意にその力を引き出す機能が備わっている。
line = "察するにあのセレスティアには霊力が込められており、任意にその力を引き出す機能が備わっている。"

[[dialogue]]
speaker = "unk"
# ルヴィネは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を通じて、星力以外の力も引っ張ってこられるということ──その脅威もそうだが、このままではまずい。
line = "ルヴィネは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を通じて、星力以外の力も引っ張ってこられるということ──その脅威もそうだが、このままではまずい。"

[[dialogue]]
speaker = "unk"
# 霊力を無理やり体に注ぎこみ、負担と引き換えに戦闘力を極端に増大させるそれは、正に諸刃の剣だから──！
line = "霊力を無理やり体に注ぎこみ、負担と引き換えに戦闘力を極端に増大させるそれは、正に諸刃の剣だから──！"

[[dialogue]]
speaker = "グレイス"
# 「失敗の可能性が高ければ撤退と言われましたが……ここであなたたちを倒せばいいんです！　命を懸ける価値はあります！」
line = "「失敗の可能性が高ければ撤退と言われましたが……ここであなたたちを倒せばいいんです！　命を懸ける価値はあります！」"

[[dialogue]]
speaker = "クロト"
# 「やめろ！　チナの時にも見た……出力を増やすな！　君の体が持たないぞ！！」
line = "「やめろ！　チナの時にも見た……出力を増やすな！　君の体が持たないぞ！！」"

[[dialogue]]
speaker = "グレイス"
# 「──っ！　やめてください……！　裏切り者のあなたにだけは、そんな心配、されたくありません！！」
line = "「──っ！　やめてください……！　裏切り者のあなたにだけは、そんな心配、されたくありません！！」"

[[dialogue]]
speaker = "グレイス"
# 「はあぁあああっ……！！」
line = "「はあぁあああっ……！！」"

[[dialogue]]
speaker = "クロト"
# 「くぅぅっ！」
line = "「くぅぅっ！」"

[[dialogue]]
speaker = "unk"
# 鞭が生み出した強烈な衝撃が全身が響き、体が悲鳴を上げる。
line = "鞭が生み出した強烈な衝撃が全身が響き、体が悲鳴を上げる。"

[[dialogue]]
speaker = "グレイス"
# 「蝶よ舞え！　バタフライカーテン！」
line = "「蝶よ舞え！　バタフライカーテン！」"

[[dialogue]]
speaker = "unk"
# またグレイスの翅が羽ばたき、無数の蝶が俺とメルエルを襲った。
line = "またグレイスの翅が羽ばたき、無数の蝶が俺とメルエルを襲った。"

[[dialogue]]
speaker = "クロト"
# 「ぐっ……！」
line = "「ぐっ……！」"

[[dialogue]]
speaker = "メルエル"
# 「きゃあああっ！？」
line = "「きゃあああっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「２人とも大丈夫！？」
line = "「２人とも大丈夫！？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、俺たちならまだ戦える」
line = "「ああ、俺たちならまだ戦える」"

[[dialogue]]
speaker = "unk"
# だけど……
line = "だけど……"

[[dialogue]]
speaker = "グレイス"
# 「はぁ、はぁ……勝つのは、私たちです……！」
line = "「はぁ、はぁ……勝つのは、私たちです……！」"

[[dialogue]]
speaker = "unk"
# グレイスの苛烈な攻撃がこちらを攻め立てるが、力を使うたびにグレイスの顔から血の気が失せ、消耗が激しくなっていく。
line = "グレイスの苛烈な攻撃がこちらを攻め立てるが、力を使うたびにグレイスの顔から血の気が失せ、消耗が激しくなっていく。"

[[dialogue]]
speaker = "メルエル"
# 「やめて、そんなことしたらあなたが危険だよ！」
line = "「やめて、そんなことしたらあなたが危険だよ！」"

[[dialogue]]
speaker = "グレイス"
# 「私が死ぬ前に、あなたたちを倒せばいいだけのことです！」
line = "「私が死ぬ前に、あなたたちを倒せばいいだけのことです！」"

[[dialogue]]
speaker = "unk"
# グレイスが鞭に星力を込め、茨が大きく、鋭く変形していく。
line = "グレイスが鞭に星力を込め、茨が大きく、鋭く変形していく。"

[[dialogue]]
speaker = "unk"
# さらに鞭を回転させ、空気を切る音とともに風が吹き荒れる。
line = "さらに鞭を回転させ、空気を切る音とともに風が吹き荒れる。"

[[dialogue]]
speaker = "グレイス"
# 「この一撃であなたたちを葬ります！　せめて苦しまずに終わらせてあげます！」
line = "「この一撃であなたたちを葬ります！　せめて苦しまずに終わらせてあげます！」"

[[dialogue]]
speaker = "メルエル"
# 「あんな攻撃受けたら粉々……ううん、跡形も残らないよ！」
line = "「あんな攻撃受けたら粉々……ううん、跡形も残らないよ！」"

[[dialogue]]
speaker = "unk"
# このままでは後ろにいるヴィーナスごと、３人まとめて消し飛ばされてしまうだろう。
line = "このままでは後ろにいるヴィーナスごと、３人まとめて消し飛ばされてしまうだろう。"

[[dialogue]]
speaker = "unk"
# ならば破滅の力を呼び起こしてでも、グレイスを止める……！
line = "ならば破滅の力を呼び起こしてでも、グレイスを止める……！"

[[dialogue]]
speaker = "クロト"
# 「デッドリー……クラスター！」
line = "「デッドリー……クラスター！」"

[[dialogue]]
speaker = "クロト"
# 「ぐっ……！」
line = "「ぐっ……！」"

[[dialogue]]
speaker = "unk"
# リクリエの力を拳に乗せて叩きつけるが、グレイスの鞭に弾き返される。
line = "リクリエの力を拳に乗せて叩きつけるが、グレイスの鞭に弾き返される。"

[[dialogue]]
speaker = "unk"
# 今のグレイスは触れるもの全てを破壊する嵐そのもの。
line = "今のグレイスは触れるもの全てを破壊する嵐そのもの。"

[[dialogue]]
speaker = "unk"
# グレイスは相討ち覚悟で俺たちを仕留めるつもりだ。
line = "グレイスは相討ち覚悟で俺たちを仕留めるつもりだ。"

[[dialogue]]
speaker = "クロト"
# （俺の中の厄災よ……力を貸せ！）
line = "（俺の中の厄災よ……力を貸せ！）"

[[dialogue]]
speaker = "unk"
# リクリエは世界を創り変える機構。
line = "リクリエは世界を創り変える機構。"

[[dialogue]]
speaker = "unk"
# なら、この力を制するのに必要になのは無我ではない。
line = "なら、この力を制するのに必要になのは無我ではない。"

[[dialogue]]
speaker = "unk"
# 世界を変えたいという意志だ。
line = "世界を変えたいという意志だ。"

[[dialogue]]
speaker = "unk"
# 世界を塗り潰せ。
line = "世界を塗り潰せ。"

[[dialogue]]
speaker = "unk"
# 俺の野望で。
line = "俺の野望で。"

[[dialogue]]
speaker = "unk"
# 俺の理想で。
line = "俺の理想で。"

[[dialogue]]
speaker = "unk"
# この手が届く全てを救うんだ……！
line = "この手が届く全てを救うんだ……！"

[[dialogue]]
speaker = "クロト"
# 「──メルエル！」
line = "「──メルエル！」"

[[dialogue]]
speaker = "メルエル"
# 「うん、いくよ！」
line = "「うん、いくよ！」"

[[dialogue]]
speaker = "unk"
# 俺の力、リクリエの力、そしてメルエルの星力を重ね、全力でグレイスにぶつける！
line = "俺の力、リクリエの力、そしてメルエルの星力を重ね、全力でグレイスにぶつける！"

[[dialogue]]
speaker = "グレイス"
# 「マグニフィセント・ティターニア！！」
line = "「マグニフィセント・ティターニア！！」"

[[dialogue]]
speaker = "クロト"
# 「カオステンペスト！！」
line = "「カオステンペスト！！」"

[[dialogue]]
speaker = "unk"
# 力と力が真っ向から衝突する。
line = "力と力が真っ向から衝突する。"

[[dialogue]]
speaker = "unk"
# 正面からぶつかってくるグレイスの攻撃と、俺の中で暴れるリクリエの力で体が千切れそうだ。
line = "正面からぶつかってくるグレイスの攻撃と、俺の中で暴れるリクリエの力で体が千切れそうだ。"

[[dialogue]]
speaker = "unk"
# それでも──
line = "それでも──"

[[dialogue]]
speaker = "クロト"
# 「おおおぉおおーーーーっ！！」
line = "「おおおぉおおーーーーっ！！」"

[[dialogue]]
speaker = "メルエル"
# 「いっけーーーーーっ！！」
line = "「いっけーーーーーっ！！」"

[[dialogue]]
speaker = "グレイス"
# 「きゃあぁあああっ────！！」
line = "「きゃあぁあああっ────！！」"

[[dialogue]]
speaker = "unk"
# 俺の拳が勝ち、茨ごと鞭が砕け散った。
line = "俺の拳が勝ち、茨ごと鞭が砕け散った。"

[[dialogue]]
speaker = "unk"
# そしてグレイスのセレスティアも砕け、変身が解けた。
line = "そしてグレイスのセレスティアも砕け、変身が解けた。"

[[dialogue]]
speaker = "メルエル"
# 「勝った……のかな？」
line = "「勝った……のかな？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、グレイスにもう戦う力はないはずだ」
line = "「ああ、グレイスにもう戦う力はないはずだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「お疲れ様！　２人ともかっこよかったわよ！」
line = "「お疲れ様！　２人ともかっこよかったわよ！」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。ヴィーナスはもう大丈夫？」
line = "「ありがとう。ヴィーナスはもう大丈夫？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、もう戦えるぐらいにはなったわ。それにそろそろ飛べるようになったんじゃない？」
line = "「ええ、もう戦えるぐらいにはなったわ。それにそろそろ飛べるようになったんじゃない？」"

[[dialogue]]
speaker = "クロト"
# 「そう言われれば……」
line = "「そう言われれば……」"

[[dialogue]]
speaker = "unk"
# 星力で自分を浮かせるイメージをすると、ふわりと体が浮遊する。
line = "星力で自分を浮かせるイメージをすると、ふわりと体が浮遊する。"

[[dialogue]]
speaker = "unk"
# ヴィーナスの言う通り、飛行能力も回復したようだ。
line = "ヴィーナスの言う通り、飛行能力も回復したようだ。"

[[dialogue]]
speaker = "グレイス"
# 「はぁ、はぁ……こんなところで失敗するわけには……ぐっ……」
line = "「はぁ、はぁ……こんなところで失敗するわけには……ぐっ……」"

[[dialogue]]
speaker = "unk"
# グレイスは拳を握って悔しがるが、今の彼女は傷つき立ち上がる力さえない。
line = "グレイスは拳を握って悔しがるが、今の彼女は傷つき立ち上がる力さえない。"

[[dialogue]]
speaker = "メルエル"
# 「！　危ない！」
line = "「！　危ない！」"

[[dialogue]]
speaker = "unk"
# さっきの戦いの余波で神殿の一部が崩れ、グレイスの上に柱の破片が落ちてくる。
line = "さっきの戦いの余波で神殿の一部が崩れ、グレイスの上に柱の破片が落ちてくる。"

[[dialogue]]
speaker = "グレイス"
# 「っ────」
line = "「っ────」"

[[dialogue]]
speaker = "グレイス"
# 「……え？　何も起きない……？」
line = "「……え？　何も起きない……？」"

[[dialogue]]
speaker = "クロト"
# 「大丈夫だよ。瓦礫は俺が破壊したから」
line = "「大丈夫だよ。瓦礫は俺が破壊したから」"

[[dialogue]]
speaker = "グレイス"
# 「！？　どうしてあなたが私を助けたんですか！？　敵なんですよ！」
line = "「！？　どうしてあなたが私を助けたんですか！？　敵なんですよ！」"

[[dialogue]]
speaker = "クロト"
# 「どうしてって……」
line = "「どうしてって……」"

[[dialogue]]
speaker = "グレイス"
# 「命を救えば、私が恩に着るとでも思いましたか！？　舐めないでくださいっ、私はっ……あ、あなたに、何をされても、言われても！　もうっ……！！」
line = "「命を救えば、私が恩に着るとでも思いましたか！？　舐めないでくださいっ、私はっ……あ、あなたに、何をされても、言われても！　もうっ……！！」"

[[dialogue]]
speaker = "クロト"
# 「……危ない目に遭っている人を助けるのが星騎士だから」
line = "「……危ない目に遭っている人を助けるのが星騎士だから」"

[[dialogue]]
speaker = "グレイス"
# 「──っ！！」
line = "「──っ！！」"

[[dialogue]]
speaker = "クロト"
# 「少なくとも、俺はそう思ってるよ」
line = "「少なくとも、俺はそう思ってるよ」"

[[dialogue]]
speaker = "グレイス"
# 「あ──ぁ──」
line = "「あ──ぁ──」"

[[dialogue]]
speaker = "unk"
# ──１０年前。
line = "──１０年前。"

[[dialogue]]
speaker = "unk"
# あの忌まわしい使徒がデネブで暴れる数ヶ月前に、私は……
line = "あの忌まわしい使徒がデネブで暴れる数ヶ月前に、私は……"

[[dialogue]]
speaker = "グレイス"
# 『巷では魔王は悪者だって言われてますよね！？　どうなんですか、緋宮クロトさん！』
line = "『巷では魔王は悪者だって言われてますよね！？　どうなんですか、緋宮クロトさん！』"

[[dialogue]]
speaker = "グレイス"
# 『私、あなたが本当に悪者なのか──確かめに来ました！』
line = "『私、あなたが本当に悪者なのか──確かめに来ました！』"

[[dialogue]]
speaker = "クロト"
# 『はは……直球に聞いてくる子だな。それを聞くためだけに、学園に無断で入って来たのかな？』
line = "『はは……直球に聞いてくる子だな。それを聞くためだけに、学園に無断で入って来たのかな？』"

[[dialogue]]
speaker = "グレイス"
# 『はい！　潜入捜査です！　それで、どうなんですか！？』
line = "『はい！　潜入捜査です！　それで、どうなんですか！？』"

[[dialogue]]
speaker = "クロト"
# 『元気な子だなあ……』
line = "『元気な子だなあ……』"

[[dialogue]]
speaker = "unk"
# 彼は苦笑しながら、私の頭を撫でて言いました。
line = "彼は苦笑しながら、私の頭を撫でて言いました。"

[[dialogue]]
speaker = "クロト"
# 『俺は魔王だけど、悪者じゃないよ。君や、この世界に住むみんなを守りたいと思ってる』
line = "『俺は魔王だけど、悪者じゃないよ。君や、この世界に住むみんなを守りたいと思ってる』"

[[dialogue]]
speaker = "グレイス"
# 『魔王さんが世界を守ってくれるんですか？　本当に？　私のお父さんも、お母さんも、友達も……みんなですか？』
line = "『魔王さんが世界を守ってくれるんですか？　本当に？　私のお父さんも、お母さんも、友達も……みんなですか？』"

[[dialogue]]
speaker = "クロト"
# 『うん、もちろん守るよ。危ない目に遭っている人を助けるのが星騎士だからね』
line = "『うん、もちろん守るよ。危ない目に遭っている人を助けるのが星騎士だからね』"

[[dialogue]]
speaker = "グレイス"
# 「あ……うぅ……」
line = "「あ……うぅ……」"

[[dialogue]]
speaker = "グレイス"
# 「うぅ──あああぁあああああっ！！」
line = "「うぅ──あああぁあああああっ！！」"
