# 「くっ……来てる……もうすぐ出そうですっ……！」
line = "「くっ……来てる……もうすぐ出そうですっ……！」"

[[dialogue]]
speaker = "グロリア"
# 「ふぇ……えっ……？　出る？　出るって、もしかして、精液、ですかっ……？」
line = "「ふぇ……えっ……？　出る？　出るって、もしかして、精液、ですかっ……？」"

[[dialogue]]
speaker = "グロリア"
# 「ひぁ、あっ、おち○ちん、またおっきく、かたぁくなってます……！　我慢汁の匂いも濃くなって……びくんびくんして……ひぁ、ちょっと怖いです……！」
line = "「ひぁ、あっ、おち○ちん、またおっきく、かたぁくなってます……！　我慢汁の匂いも濃くなって……びくんびくんして……ひぁ、ちょっと怖いです……！」"

[[dialogue]]
speaker = "クロト"
# 「大丈夫ですからっ……！　このまま、グロリアさんのおっぱいの中に……！」
line = "「大丈夫ですからっ……！　このまま、グロリアさんのおっぱいの中に……！」"

[[dialogue]]
speaker = "グロリア"
# 「はぁ、うぅ……い、いいですよ……私の、おっぱいに、いっぱい精液、出してください……ぶっかけてくださぁい……<emoji=heart04>」
line = "「はぁ、うぅ……い、いいですよ……私の、おっぱいに、いっぱい精液、出してください……ぶっかけてくださぁい……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
# 「精液、だ、出して……おち○ちん、鎮めて……ください、私のおっきくてえっちなおっぱいに、いっぱい、いっぱい……精液……出して、く、くらひゃぁい……<emoji=heart04>」
line = "「精液、だ、出して……おち○ちん、鎮めて……ください、私のおっきくてえっちなおっぱいに、いっぱい、いっぱい……精液……出して、く、くらひゃぁい……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
# 「ふぁ、んぁ、あ、あっ……！？　おち○ちん、びくんびくん、どくんどくんって――」
line = "「ふぁ、んぁ、あ、あっ……！？　おち○ちん、びくんびくん、どくんどくんって――」"

[[dialogue]]
speaker = "グロリア"
# 「ひゃぁんっ！？　んぁ、あっ、わっ、んぁぷっ！？」
line = "「ひゃぁんっ！？　んぁ、あっ、わっ、んぁぷっ！？」"

[[dialogue]]
speaker = "unk"
# 初めて自分で導いた射精を、グロリアさんは顔面とおっぱいで受け止めた。
line = "初めて自分で導いた射精を、グロリアさんは顔面とおっぱいで受け止めた。"

[[dialogue]]
speaker = "グロリア"
# 「ひぁっ！　やっ、す、すごいですっ、んぅ！　ひゃ、あっ、あ、熱いのが、いっぱぁいっ……きゃんっ！？」
line = "「ひぁっ！　やっ、す、すごいですっ、んぅ！　ひゃ、あっ、あ、熱いのが、いっぱぁいっ……きゃんっ！？」"

[[dialogue]]
speaker = "unk"
# 精液を避けようにも、俺に跨がられて、胸を鷲掴みにされているグロリアさんは身動きが取れない。
line = "精液を避けようにも、俺に跨がられて、胸を鷲掴みにされているグロリアさんは身動きが取れない。"

[[dialogue]]
speaker = "グロリア"
# 「んあ、あっ、まだ、んぁはっ……！　まだ、ぴゅるぴゅる、精液出て……ぱいずりで、いっぱい、気持ちよぉく、なってくれたんですね……ふふ<emoji=heart04>」
line = "「んあ、あっ、まだ、んぁはっ……！　まだ、ぴゅるぴゅる、精液出て……ぱいずりで、いっぱい、気持ちよぉく、なってくれたんですね……ふふ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 射精が止まるまで抵抗もすることなく、恍惚の笑みを浮かべながら白濁のシャワーを浴び続けたのだった。
line = "射精が止まるまで抵抗もすることなく、恍惚の笑みを浮かべながら白濁のシャワーを浴び続けたのだった。"

[[dialogue]]
speaker = "グロリア"
# 「んぁ、はぁ、ぁぷっ……精液で、溺れてしまうかと思いました……射精って、こんなにたくさん出るものなんですね？」
line = "「んぁ、はぁ、ぁぷっ……精液で、溺れてしまうかと思いました……射精って、こんなにたくさん出るものなんですね？」"

[[dialogue]]
speaker = "unk"
# ひとしきり射精を終えたところで、精液まみれになったグロリアさんはうっとりと惚けた顔で問いかけてきた。
line = "ひとしきり射精を終えたところで、精液まみれになったグロリアさんはうっとりと惚けた顔で問いかけてきた。"

[[dialogue]]
speaker = "クロト"
# 「グロリアさんのおっぱいが気持ち良すぎて、いつもよりたくさん出てしまいました。すみません」
line = "「グロリアさんのおっぱいが気持ち良すぎて、いつもよりたくさん出てしまいました。すみません」"

[[dialogue]]
speaker = "グロリア"
# 「そうなんですね……ふふ、気にしないでください。会長さんのお役に立てたのなら、何よりです」
line = "「そうなんですね……ふふ、気にしないでください。会長さんのお役に立てたのなら、何よりです」"

[[dialogue]]
speaker = "グロリア"
# 「あなたが私で興奮して……気持ちよくなってくれたのが、とっても嬉しいんです……<emoji=heart04>」
line = "「あなたが私で興奮して……気持ちよくなってくれたのが、とっても嬉しいんです……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
# 「愛する人を快感の高みへ導くのって……とてもときめくものなんですね……<emoji=heart04>」
line = "「愛する人を快感の高みへ導くのって……とてもときめくものなんですね……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ドロドロの精液を顔や胸に張りつかせたまま微笑むグロリアさんが、たまらなくいやらしくて、どうしようもなく可愛く見えた。
line = "ドロドロの精液を顔や胸に張りつかせたまま微笑むグロリアさんが、たまらなくいやらしくて、どうしようもなく可愛く見えた。"

[[dialogue]]
speaker = "グロリア"
# 「はぁ……顔もおっぱいも、精液でべとべとです……すん、すん……嗅いだことのない、独特な匂い……」
line = "「はぁ……顔もおっぱいも、精液でべとべとです……すん、すん……嗅いだことのない、独特な匂い……」"

[[dialogue]]
speaker = "グロリア"
# 「つまめるくらい濃くって……精液というから、もっとさらっとした液体かと思っていたのですけど……ねっとりしているんですね……ぺろっ」
line = "「つまめるくらい濃くって……精液というから、もっとさらっとした液体かと思っていたのですけど……ねっとりしているんですね……ぺろっ」"

[[dialogue]]
speaker = "unk"
# 唇に張り付いていた精液を、味見するみたいにぺろりと舐め取る。
line = "唇に張り付いていた精液を、味見するみたいにぺろりと舐め取る。"

[[dialogue]]
speaker = "グロリア"
# 「んぅ……むぐっ……！？　ちょっとしょっぱくて、苦いれふ……これは、大人の味れひゅね……」
line = "「んぅ……むぐっ……！？　ちょっとしょっぱくて、苦いれふ……これは、大人の味れひゅね……」"

[[dialogue]]
speaker = "グロリア"
# 「むぐ、むぐ……でも、これが会長さんの味だと思うと全然、嫌じゃないれふ……なんだか愛しい味です……<emoji=heart04>」
line = "「むぐ、むぐ……でも、これが会長さんの味だと思うと全然、嫌じゃないれふ……なんだか愛しい味です……<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
# 「あ……おち○ちんの方ばかり見ていて、あなたが射精する時の顔をじっくり見れませんでした……」
line = "「あ……おち○ちんの方ばかり見ていて、あなたが射精する時の顔をじっくり見れませんでした……」"

[[dialogue]]
speaker = "グロリア"
# 「次は私のおっぱいに夢中になっている会長さんを、じっくり見ててあげますからね、ふふ<emoji=heart04>」
line = "「次は私のおっぱいに夢中になっている会長さんを、じっくり見ててあげますからね、ふふ<emoji=heart04>」"

[[dialogue]]
speaker = "グロリア"
# 「あら……？　おち○ちんがまだ勃起したままですけど……こんなにたっぷり射精したのに鎮まってないんですか？」
line = "「あら……？　おち○ちんがまだ勃起したままですけど……こんなにたっぷり射精したのに鎮まってないんですか？」"

[[dialogue]]
speaker = "グロリア"
# 「まだ射精し足りないってことでしょうか……？　それなら、あの……もう１回、ぱいずり……しておきます？」
line = "「まだ射精し足りないってことでしょうか……？　それなら、あの……もう１回、ぱいずり……しておきます？」"

[[dialogue]]
speaker = "グロリア"
# 「今度は、会長さんの気持ちよくなってる顔、ちゃんと見ておきますからね……ふふ<emoji=heart04>」
line = "「今度は、会長さんの気持ちよくなってる顔、ちゃんと見ておきますからね……ふふ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# この後、すっかりグロリアさんのふわもちおっぱいの虜になってしまったペニスは、なかなか収まってくれず。
line = "この後、すっかりグロリアさんのふわもちおっぱいの虜になってしまったペニスは、なかなか収まってくれず。"

[[dialogue]]
speaker = "unk"
# もう３回出し切るまで、グロリアさんのパイズリご奉仕にお世話されてしまったのだった。
line = "もう３回出し切るまで、グロリアさんのパイズリご奉仕にお世話されてしまったのだった。"
