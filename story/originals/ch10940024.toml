[[dialogue]]
speaker = "unk"
# 第４話,必勝の舞鶴、その極意,P
line = "第４話,必勝の舞鶴、その極意,P"

[[dialogue]]
speaker = "美鶴"
# 「お、また新星の勝ちじゃん。おめでとー。ウチの運動部ってめちゃ強いね」
line = "「お、また新星の勝ちじゃん。おめでとー。ウチの運動部ってめちゃ強いね」"

[[dialogue]]
speaker = "ミルフィー"
# 「ううん、ここまで強くはなかったはずなんだけど……美鶴ちゃんが応援した試合って絶対に勝つんだよね」
line = "「ううん、ここまで強くはなかったはずなんだけど……美鶴ちゃんが応援した試合って絶対に勝つんだよね」"

[[dialogue]]
speaker = "美鶴"
# 「いやいや絶対はないでしょ。負け試合だって何回かは……あれ？　見たことないね」
line = "「いやいや絶対はないでしょ。負け試合だって何回かは……あれ？　見たことないね」"

[[dialogue]]
speaker = "ミルフィー"
# 「でしょー？　美鶴ちゃんは勝利の女神様なんだよ。陰で『必勝の舞鶴』なんて呼んでる人もいるんだから」
line = "「でしょー？　美鶴ちゃんは勝利の女神様なんだよ。陰で『必勝の舞鶴』なんて呼んでる人もいるんだから」"

[[dialogue]]
speaker = "美鶴"
# 「なんそれ。うちの知らんとこで二つ名がついてる。カッコよ」
line = "「なんそれ。うちの知らんとこで二つ名がついてる。カッコよ」"

[[dialogue]]
speaker = "美鶴"
# 「そーいったわけでね、ここんとこ、うちは応援団に引っ張りだこだったってワケ」
line = "「そーいったわけでね、ここんとこ、うちは応援団に引っ張りだこだったってワケ」"

[[dialogue]]
speaker = "美鶴"
# 「勝利の女神なんて持ち上げられてもね。そんなん、たまたま──」
line = "「勝利の女神なんて持ち上げられてもね。そんなん、たまたま──」"

[[dialogue]]
speaker = "美鶴"
# 「でもないかもね。会長さん、必勝の極意、教えてあげよっか」
line = "「でもないかもね。会長さん、必勝の極意、教えてあげよっか」"

[[dialogue]]
speaker = "unk"
# なんでもするから教えて！
line = "なんでもするから教えて！"

[[dialogue]]
speaker = "unk"
# 極意！？　知りたい！
line = "極意！？　知りたい！"

[[dialogue]]
speaker = "美鶴"
# 「そんなに食いつくんだ。ふうん、なんでも……なんでもねー」
line = "「そんなに食いつくんだ。ふうん、なんでも……なんでもねー」"

[[dialogue]]
speaker = "美鶴"
# 「そこまでいうなら、会長さんにだけ特別に教えてあげよっかな」
line = "「そこまでいうなら、会長さんにだけ特別に教えてあげよっかな」"

[[dialogue]]
speaker = "美鶴"
# 「とりあえずさ、チアガールの気持ちを理解するのが大事だから、会長さんもチアガールになってみるといいよ」
line = "「とりあえずさ、チアガールの気持ちを理解するのが大事だから、会長さんもチアガールになってみるといいよ」"

[[dialogue]]
speaker = "美鶴"
# 「というわけで。はい、会長さん用のチアガール衣装」
line = "「というわけで。はい、会長さん用のチアガール衣装」"

[[dialogue]]
speaker = "unk"
# しかもチアガール！？
line = "しかもチアガール！？"

[[dialogue]]
speaker = "unk"
# なんで俺用！？
line = "なんで俺用！？"

[[dialogue]]
speaker = "美鶴"
# 「こんなこともあろうかと作っといた」
line = "「こんなこともあろうかと作っといた」"

[[dialogue]]
speaker = "美鶴"
# 「前に言わなかったっけ。うち、暇な時には会長さんに着せたい衣装作ってるからさ」
line = "「前に言わなかったっけ。うち、暇な時には会長さんに着せたい衣装作ってるからさ」"

[[dialogue]]
speaker = "美鶴"
# 「うちのクローゼットに眠ってる会長さん用の服、まだまだこんなもんじゃないよ」
line = "「うちのクローゼットに眠ってる会長さん用の服、まだまだこんなもんじゃないよ」"

[[dialogue]]
speaker = "美鶴"
# 「これ着てくれたら、うちの極意、教えてあげる」
line = "「これ着てくれたら、うちの極意、教えてあげる」"

[[dialogue]]
speaker = "unk"
# なんでもすると言った以上引っ込みがつかない。美鶴が持ってきた衣装に着替える。
line = "なんでもすると言った以上引っ込みがつかない。美鶴が持ってきた衣装に着替える。"

[[dialogue]]
speaker = "美鶴"
# 「ホントに着てくれたんだ。うんうん、やっぱ会長さんは女物でも似合うね。めちゃかわー」
line = "「ホントに着てくれたんだ。うんうん、やっぱ会長さんは女物でも似合うね。めちゃかわー」"

[[dialogue]]
speaker = "美鶴"
# 「チア衣装に袖通して、どんな気持ち？　人を応援したい気持ち、湧いてこない？」
line = "「チア衣装に袖通して、どんな気持ち？　人を応援したい気持ち、湧いてこない？」"

[[dialogue]]
speaker = "美鶴"
# 「ほら、言ってみよ。試しにうちを応援すんの。『がんばれ、がんばれ、み・つ・る<emoji=heart04>』って」
line = "「ほら、言ってみよ。試しにうちを応援すんの。『がんばれ、がんばれ、み・つ・る<emoji=heart04>』って」"

[[dialogue]]
speaker = "美鶴"
# 「ほらほら、恥ずかしがってないでー。気持ちが籠ってないよー。そんなんじゃバフかかんないってば」
line = "「ほらほら、恥ずかしがってないでー。気持ちが籠ってないよー。そんなんじゃバフかかんないってば」"

[[dialogue]]
speaker = "美鶴"
# 「縮こまって動きが小さいのもよくないよね。うちらが星霊祭の時にやってたみたいにさ」
line = "「縮こまって動きが小さいのもよくないよね。うちらが星霊祭の時にやってたみたいにさ」"

[[dialogue]]
speaker = "美鶴"
# 「ほらほら、もっと足上げて。ワンツー、ワンツー」
line = "「ほらほら、もっと足上げて。ワンツー、ワンツー」"

[[dialogue]]
speaker = "美鶴"
# 「アンスコはいてるんだから恥ずかしがらない。チアガールはみんな脚広げてるんだから」
line = "「アンスコはいてるんだから恥ずかしがらない。チアガールはみんな脚広げてるんだから」"

[[dialogue]]
speaker = "美鶴"
# 「ほら、うちに続いて。プリーズ・リピート・アフター・ミー。『大好き、大好き、み・つ・る』」
line = "「ほら、うちに続いて。プリーズ・リピート・アフター・ミー。『大好き、大好き、み・つ・る』」"

[[dialogue]]
speaker = "unk"
# ドサクサ紛れに何言わそうとしてんの！？
line = "ドサクサ紛れに何言わそうとしてんの！？"

[[dialogue]]
speaker = "unk"
# 大好き、大好き……
line = "大好き、大好き……"

[[dialogue]]
speaker = "美鶴"
# 「ちぇ、バレた」
line = "「ちぇ、バレた」"

[[dialogue]]
speaker = "美鶴"
# 「じゃ、うちは会長さんを応援するから、会長さんはうちを応援して」
line = "「じゃ、うちは会長さんを応援するから、会長さんはうちを応援して」"

[[dialogue]]
speaker = "美鶴"
# 「目の前に同じカッコしてる人がいれば、恥ずかしいのも薄れるでしょ」
line = "「目の前に同じカッコしてる人がいれば、恥ずかしいのも薄れるでしょ」"

[[dialogue]]
speaker = "美鶴"
# 「フレー、フレー、会長さーん。がんばれ、がんばれ、会長さーん」
line = "「フレー、フレー、会長さーん。がんばれ、がんばれ、会長さーん」"

[[dialogue]]
speaker = "unk"
# 美鶴の言う通りにチアガールの真似をしている内に、自然と羞恥心は薄れていった。
line = "美鶴の言う通りにチアガールの真似をしている内に、自然と羞恥心は薄れていった。"

[[dialogue]]
speaker = "美鶴"
# 「うんうん、いいカンジ。だんだんと気持ちが入ってきたね」
line = "「うんうん、いいカンジ。だんだんと気持ちが入ってきたね」"

[[dialogue]]
speaker = "unk"
# 応援の極意は！？
line = "応援の極意は！？"

[[dialogue]]
speaker = "unk"
# 何か忘れてるような……
line = "何か忘れてるような……"

[[dialogue]]
speaker = "美鶴"
# 「ちぇ、思い出しちゃった」
line = "「ちぇ、思い出しちゃった」"

[[dialogue]]
speaker = "美鶴"
# 「てかさ、極意なんてあるわけないじゃん。うちが応援に行った時にたまたま勝ってるだけだよ。単なる偶然」
line = "「てかさ、極意なんてあるわけないじゃん。うちが応援に行った時にたまたま勝ってるだけだよ。単なる偶然」"

[[dialogue]]
speaker = "unk"
# これを着せるための口実かーっ！
line = "これを着せるための口実かーっ！"

[[dialogue]]
speaker = "unk"
# 騙されたーっ！？
line = "騙されたーっ！？"

[[dialogue]]
speaker = "美鶴"
# 「やっと気づいたんだ。ふふ、おもしろ」
line = "「やっと気づいたんだ。ふふ、おもしろ」"

[[dialogue]]
speaker = "美鶴"
# 「うち１人の応援だけで、試合が左右されるとかありえないって。本物の神様じゃないんだからさ」
line = "「うち１人の応援だけで、試合が左右されるとかありえないって。本物の神様じゃないんだからさ」"

[[dialogue]]
speaker = "美鶴"
# 「試合で勝ててるのは、みんなが努力してる結果。うちはチアで踊ってるだけ」
line = "「試合で勝ててるのは、みんなが努力してる結果。うちはチアで踊ってるだけ」"

[[dialogue]]
speaker = "美鶴"
# 「うちみたいなやる気なし子さんの気まぐれで勝ち負けが決まっちゃったらさ、そりゃ努力に対する冒涜ってもんでしょ」
line = "「うちみたいなやる気なし子さんの気まぐれで勝ち負けが決まっちゃったらさ、そりゃ努力に対する冒涜ってもんでしょ」"

[[dialogue]]
speaker = "美鶴"
# 「ま、うちが応援に行った方がジンクスだとかで盛り上がるみたいだし？　しばらくは『必勝の舞鶴』様を演じるけどね」
line = "「ま、うちが応援に行った方がジンクスだとかで盛り上がるみたいだし？　しばらくは『必勝の舞鶴』様を演じるけどね」"

[[dialogue]]
speaker = "美鶴"
# 「でも、うちより会長さんの応援の方が、みんなやる気出すんじゃない？　さっきの会長さんの応援、ビビッて来たよ」
line = "「でも、うちより会長さんの応援の方が、みんなやる気出すんじゃない？　さっきの会長さんの応援、ビビッて来たよ」"

[[dialogue]]
speaker = "unk"
# たっぷり気持ちをこめてます
line = "たっぷり気持ちをこめてます"

[[dialogue]]
speaker = "unk"
# 美鶴だけのスペシャル応援だからね
line = "美鶴だけのスペシャル応援だからね"

[[dialogue]]
speaker = "美鶴"
# 「っ……！？　そーゆーの目ぇ見てまっすぐ言うのズルだから！」
line = "「っ……！？　そーゆーの目ぇ見てまっすぐ言うのズルだから！」"

[[dialogue]]
speaker = "美鶴"
# 「結局、好きな人からもらう応援が、一番やる気出るってことだよね……」
line = "「結局、好きな人からもらう応援が、一番やる気出るってことだよね……」"

[[dialogue]]
speaker = "美鶴"
# 「会長さんに応援されると、めちゃドキドキするしさ。今ならなんでもやれそうな気ぃするよ」
line = "「会長さんに応援されると、めちゃドキドキするしさ。今ならなんでもやれそうな気ぃするよ」"

[[dialogue]]
speaker = "unk"
# 俺も美鶴からのスペシャル応援欲しいな
line = "俺も美鶴からのスペシャル応援欲しいな"

[[dialogue]]
speaker = "美鶴"
# 「えー……んなこと口にしたら、うち、絶対に止まんなくなるんだけど……責任取ってくれんの……？」
line = "「えー……んなこと口にしたら、うち、絶対に止まんなくなるんだけど……責任取ってくれんの……？」"

[[dialogue]]
speaker = "美鶴"
# 「──あ、そう。言ったね？　どうなっても知らないよ」
line = "「──あ、そう。言ったね？　どうなっても知らないよ」"

[[dialogue]]
speaker = "美鶴"
# 「んじゃ、目ぇ見ながらだと恥ずいから……」
line = "「んじゃ、目ぇ見ながらだと恥ずいから……」"

[[dialogue]]
speaker = "unk"
# 距離を詰めた美鶴は、俺の耳元に唇を添える。
line = "距離を詰めた美鶴は、俺の耳元に唇を添える。"

[[dialogue]]
speaker = "美鶴"
# 「好き好き、か・い・ちょ<emoji=heart04>　だぁい好き<emoji=heart04>」
line = "「好き好き、か・い・ちょ<emoji=heart04>　だぁい好き<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 甘い媚薬のような言葉を注がれた直後、両肩を掴まれて。
line = "甘い媚薬のような言葉を注がれた直後、両肩を掴まれて。"

[[dialogue]]
speaker = "美鶴"
# 「えいっ<emoji=heart04>」
line = "「えいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その勢いのままに押し倒されたのだった──
line = "その勢いのままに押し倒されたのだった──"
