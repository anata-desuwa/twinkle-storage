[[dialogue]]
speaker = "unk"
# 第１話,クラス委員登場！,P
line = "第１話,クラス委員登場！,P"

[[dialogue]]
speaker = "マトイ"
# 「会長、昨日はありがとね。おかげで大量の書類を片付けられたよ」
line = "「会長、昨日はありがとね。おかげで大量の書類を片付けられたよ」"

[[dialogue]]
speaker = "マトイ"
# 「アナもすっごく助かったって言ってたよ。ほんとヴィーナスが会長だった頃とは大違いだって」
line = "「アナもすっごく助かったって言ってたよ。ほんとヴィーナスが会長だった頃とは大違いだって」"

[[dialogue]]
speaker = "？？？"
# 「流石会長くん、星徒会でも大活躍みたいだね」
line = "「流石会長くん、星徒会でも大活躍みたいだね」"

[[dialogue]]
speaker = "unk"
# えっと、どちら様でしょうか……？
line = "えっと、どちら様でしょうか……？"

[[dialogue]]
speaker = "ミルフィー"
# 「ひどい！　私だよ私！　クラス委員長のミルフィーだよ！」
line = "「ひどい！　私だよ私！　クラス委員長のミルフィーだよ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「もう会長くんってば、いじわるなんだから～」
line = "「もう会長くんってば、いじわるなんだから～」"

[[dialogue]]
speaker = "unk"
# ミルフィーはからかいがいがあるからね
line = "ミルフィーはからかいがいがあるからね"

[[dialogue]]
speaker = "ミルフィー"
# 「もうもうっ、女の子には優しくしないとダメなんだからっ」
line = "「もうもうっ、女の子には優しくしないとダメなんだからっ」"

[[dialogue]]
speaker = "マトイ"
# 「ポカポカ会長の肩叩いてる……２人とも仲いいんだねぇ」
line = "「ポカポカ会長の肩叩いてる……２人とも仲いいんだねぇ」"

[[dialogue]]
speaker = "ミルフィー"
# 「会長くんとはそこそこ長い付き合いだからねぇ。会長職で忙しい時とかに、日直を手伝ったりしてたし」
line = "「会長くんとはそこそこ長い付き合いだからねぇ。会長職で忙しい時とかに、日直を手伝ったりしてたし」"

[[dialogue]]
speaker = "ミルフィー"
# 「懐かしいなぁ……星徒会長になりたての頃とか、よく頼ってくれてたよね。最近は私がいなくても大丈夫なくらい、余裕が出てきたみたいだけど……」
line = "「懐かしいなぁ……星徒会長になりたての頃とか、よく頼ってくれてたよね。最近は私がいなくても大丈夫なくらい、余裕が出てきたみたいだけど……」"

[[dialogue]]
speaker = "unk"
# それもミルフィーが世話を焼いてくれたおかげだ
line = "それもミルフィーが世話を焼いてくれたおかげだ"

[[dialogue]]
speaker = "ミルフィー"
# 「そうかなぁ～……そうだったらいいんだけど」
line = "「そうかなぁ～……そうだったらいいんだけど」"

[[dialogue]]
speaker = "ミルフィー"
# 「まあでも、会長くんとは軽い冗談を言い合えるくらい仲良くなれたし、それだけでも充分なんだけどね」
line = "「まあでも、会長くんとは軽い冗談を言い合えるくらい仲良くなれたし、それだけでも充分なんだけどね」"

[[dialogue]]
speaker = "マトイ"
# 「へぇ～、２人はそんな関係だったんだ。でも会長は女の子と仲良くなるの得意だし、不思議でもないか」
line = "「へぇ～、２人はそんな関係だったんだ。でも会長は女の子と仲良くなるの得意だし、不思議でもないか」"

[[dialogue]]
speaker = "ミルフィー"
# 「だよねぇ～。会長くんは周りの人をちゃんと見て、細かいところまで気配りができる人だし」
line = "「だよねぇ～。会長くんは周りの人をちゃんと見て、細かいところまで気配りができる人だし」"

[[dialogue]]
speaker = "ミルフィー"
# 「それに星徒会の会長として、いつもみんなを助けてくれるヒーローみたいな存在だもん」
line = "「それに星徒会の会長として、いつもみんなを助けてくれるヒーローみたいな存在だもん」"

[[dialogue]]
speaker = "マトイ"
# 「うん、確かに会長は男の子としても、会長としても優秀だよね」
line = "「うん、確かに会長は男の子としても、会長としても優秀だよね」"

[[dialogue]]
speaker = "ミルフィー"
# 「そうそう、会長くんは本当に偉いよっ」
line = "「そうそう、会長くんは本当に偉いよっ」"

[[dialogue]]
speaker = "unk"
# いや、そういうミルフィーだって偉いよ
line = "いや、そういうミルフィーだって偉いよ"

[[dialogue]]
speaker = "マトイ"
# 「確かに委員長もクラス委員として、いつも頑張ってるよね。毎日１番早く教室に来て掃除したり、教室の花瓶のお水を替えたりとか」
line = "「確かに委員長もクラス委員として、いつも頑張ってるよね。毎日１番早く教室に来て掃除したり、教室の花瓶のお水を替えたりとか」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなのクラス委員として当然のことだよ。私なんて会長くんたちと比べたら、全然普通だから」
line = "「そんなのクラス委員として当然のことだよ。私なんて会長くんたちと比べたら、全然普通だから」"

[[dialogue]]
speaker = "マトイ"
# 「それを普通って言えるのが偉いよ……私より全然偉い……」
line = "「それを普通って言えるのが偉いよ……私より全然偉い……」"

[[dialogue]]
speaker = "マトイ"
# 「ハッ……！　普通な私はこのままじゃ、いらない子扱いされて星徒会から追い出されるんじゃ！？」
line = "「ハッ……！　普通な私はこのままじゃ、いらない子扱いされて星徒会から追い出されるんじゃ！？」"

[[dialogue]]
speaker = "マトイ"
# 「委員長は成績も優秀だし、プリマステラとしても大活躍してるし……！」
line = "「委員長は成績も優秀だし、プリマステラとしても大活躍してるし……！」"

[[dialogue]]
speaker = "ミルフィー"
# 「いやいやいや、マトイさんが追い出されるわけないよ」
line = "「いやいやいや、マトイさんが追い出されるわけないよ」"

[[dialogue]]
speaker = "マトイ"
# 「だって私なんて、これといった個性も無いＴＨＥ・普通人間だし……」
line = "「だって私なんて、これといった個性も無いＴＨＥ・普通人間だし……」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんなことないよ！　マトイさんは普通じゃないよ！」
line = "「そんなことないよ！　マトイさんは普通じゃないよ！」"

[[dialogue]]
speaker = "マトイ"
# 「普通……じゃない？」
line = "「普通……じゃない？」"

[[dialogue]]
speaker = "ミルフィー"
# 「そもそも星徒会に選ばれてるだけで普通じゃないし、会長くんだってマトイさんのこと頼りにしてるって言ってたよ！」
line = "「そもそも星徒会に選ばれてるだけで普通じゃないし、会長くんだってマトイさんのこと頼りにしてるって言ってたよ！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ね、会長くん！」
line = "「ね、会長くん！」"

[[dialogue]]
speaker = "unk"
# ああ、マトイは頼りになる仲間だよ
line = "ああ、マトイは頼りになる仲間だよ"

[[dialogue]]
speaker = "マトイ"
# 「２人がそこまで言うなら……うん、信じるよ」
line = "「２人がそこまで言うなら……うん、信じるよ」"

[[dialogue]]
speaker = "ミルフィー"
# （よかった……なんとかネガティブモードから復活してくれた……。会長くんもフォローありがとうね）
line = "（よかった……なんとかネガティブモードから復活してくれた……。会長くんもフォローありがとうね）"

[[dialogue]]
speaker = "マトイ"
# 「ねぇ２人とも、何をこそこそ話してるの？」
line = "「ねぇ２人とも、何をこそこそ話してるの？」"

[[dialogue]]
speaker = "ミルフィー"
# 「えへへ……マトイさんには秘密かな」
line = "「えへへ……マトイさんには秘密かな」"

[[dialogue]]
speaker = "マトイ"
# 「えー、なんか怪しい……」
line = "「えー、なんか怪しい……」"

[[dialogue]]
speaker = "ミルフィー"
# 「別に怪しくなんかないって……！」
line = "「別に怪しくなんかないって……！」"

[[dialogue]]
speaker = "マトイ"
# 「そんなこと言って息ぴったりだし、もしかして陰で付き合ったりしてるの？」
line = "「そんなこと言って息ぴったりだし、もしかして陰で付き合ったりしてるの？」"

[[dialogue]]
speaker = "ミルフィー"
# 「そ、そそそんなことないよ！　会長くんとだなんて、畏れ多い！」
line = "「そ、そそそんなことないよ！　会長くんとだなんて、畏れ多い！」"

[[dialogue]]
speaker = "unk"
# 俺だって、ミルフィーとは畏れ多いよ
line = "俺だって、ミルフィーとは畏れ多いよ"

[[dialogue]]
speaker = "ミルフィー"
# 「いやいや、私の方が畏れ多いよ！」
line = "「いやいや、私の方が畏れ多いよ！」"

[[dialogue]]
speaker = "マトイ"
# 「ほら、やっぱり息ぴったりじゃん。素直になって付き合っちゃえばいいのに」
line = "「ほら、やっぱり息ぴったりじゃん。素直になって付き合っちゃえばいいのに」"

[[dialogue]]
speaker = "ミルフィー"
# 「す、素直になってって……」
line = "「す、素直になってって……」"

[[dialogue]]
speaker = "ミルフィー"
# 「私と、会長くんが付き合ったりしたら……」
line = "「私と、会長くんが付き合ったりしたら……」"

[[dialogue]]
speaker = "ミルフィー"
# 「…………………～～～～～～～～～ッ！！」
line = "「…………………～～～～～～～～～ッ！！」"

[[dialogue]]
speaker = "ミルフィー"
# 「ふ、ふふ不純異性交遊はダメなんだからー！」
line = "「ふ、ふふ不純異性交遊はダメなんだからー！」"

[[dialogue]]
speaker = "マトイ"
# 「行っちゃったね……どんな妄想をしてたんだろう……。でもちょっとからかいすぎたかな。委員長に悪いことしちゃったかも」
line = "「行っちゃったね……どんな妄想をしてたんだろう……。でもちょっとからかいすぎたかな。委員長に悪いことしちゃったかも」"

[[dialogue]]
speaker = "unk"
# その後、次の授業のチャイムが鳴ると同時に、ミルフィーは帰ってきたのだが……
line = "その後、次の授業のチャイムが鳴ると同時に、ミルフィーは帰ってきたのだが……"

[[dialogue]]
speaker = "ミルフィー"
# 「ちらちら……」
line = "「ちらちら……」"

[[dialogue]]
speaker = "unk"
# ミルフィーの視線が気になり、授業にあまり集中出来なかった。
line = "ミルフィーの視線が気になり、授業にあまり集中出来なかった。"
