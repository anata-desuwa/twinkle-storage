[[dialogue]]
speaker = "unk"
# 第８話,天界へ,B
line = "第８話,天界へ,B"

[[dialogue]]
speaker = "unk"
# ベアトリスが会議室から戻ってきて、チナから聞いた情報を俺たちに話してくれた。
line = "ベアトリスが会議室から戻ってきて、チナから聞いた情報を俺たちに話してくれた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「このままじゃ女神の神殿が破壊されて、天使も天界も消滅しちゃうってこと！？　早くその神殿に行かないと！」
line = "「このままじゃ女神の神殿が破壊されて、天使も天界も消滅しちゃうってこと！？　早くその神殿に行かないと！」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが神殿の場所がわからなければ、動きようがありません。天界にあることしか判明していないのでは……」
line = "「ですが神殿の場所がわからなければ、動きようがありません。天界にあることしか判明していないのでは……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめんなさい、場所まではチナちゃんもわからないって……」
line = "「ごめんなさい、場所まではチナちゃんもわからないって……」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトのせいじゃない。むしろベアトのおかげで天界の神殿襲撃について知ることができた」
line = "「ベアトのせいじゃない。むしろベアトのおかげで天界の神殿襲撃について知ることができた」"

[[dialogue]]
speaker = "アナ"
# 「しかし女神の神殿は、今まで存在すら知られていませんでした。チナさんが偽の情報を教えて、こちらを撹乱しようとしている可能性もあるのでは？」
line = "「しかし女神の神殿は、今まで存在すら知られていませんでした。チナさんが偽の情報を教えて、こちらを撹乱しようとしている可能性もあるのでは？」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、それはないと思うよ。チナちゃんは嘘がつけない子だし……」
line = "「そ、それはないと思うよ。チナちゃんは嘘がつけない子だし……」"

[[dialogue]]
speaker = "アナ"
# 「そもそもチナさんが嘘を教えられている可能性もあります。偽の情報で誘導し、守りが薄くなった流星市国をまた襲撃する計画かもしれません」
line = "「そもそもチナさんが嘘を教えられている可能性もあります。偽の情報で誘導し、守りが薄くなった流星市国をまた襲撃する計画かもしれません」"

[[dialogue]]
speaker = "ベアトリス"
# 「それは……そうかもしれないけど……」
line = "「それは……そうかもしれないけど……」"

[[dialogue]]
speaker = "unk"
# 目指す場所がわからない上に、情報も確証がない。
line = "目指す場所がわからない上に、情報も確証がない。"

[[dialogue]]
speaker = "unk"
# 一刻も早く動かないといけないという焦りが、余計に疑心暗鬼に陥らせる。
line = "一刻も早く動かないといけないという焦りが、余計に疑心暗鬼に陥らせる。"

[[dialogue]]
speaker = "ナターシャ"
# 「いや、チナが言ってることは本当だと思うよ。だって私、女神の神殿の場所、知ってるから」
line = "「いや、チナが言ってることは本当だと思うよ。だって私、女神の神殿の場所、知ってるから」"

[[dialogue]]
speaker = "ベアトリス"
# 「ええっ！？」
line = "「ええっ！？」"

[[dialogue]]
speaker = "unk"
# 驚きとともに、ナターシャにみんなの注目が集まる。
line = "驚きとともに、ナターシャにみんなの注目が集まる。"

[[dialogue]]
speaker = "アポロ"
# 「ナターシャ、知ってたのか！？　なら天界が襲われてるって聞いた時に言ってくれればよかっただろ！」
line = "「ナターシャ、知ってたのか！？　なら天界が襲われてるって聞いた時に言ってくれればよかっただろ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「女神の神殿が狙いだって確証がなかったから、そう簡単に言えなかったんだよ」
line = "「女神の神殿が狙いだって確証がなかったから、そう簡単に言えなかったんだよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「薄々そっちが本命じゃないかと思ってたけど、全ての天使の命に関わることだから、聖庭園でも上位の秘匿事項になっててね」
line = "「薄々そっちが本命じゃないかと思ってたけど、全ての天使の命に関わることだから、聖庭園でも上位の秘匿事項になっててね」"

[[dialogue]]
speaker = "ナターシャ"
# 「だけど女神の神殿が狙いなら話が早いや。とりあえず聖庭園に行こう。そこからが一番近い」
line = "「だけど女神の神殿が狙いなら話が早いや。とりあえず聖庭園に行こう。そこからが一番近い」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なら決まりね！　みんなで聖庭園に行くわよ！」
line = "「なら決まりね！　みんなで聖庭園に行くわよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「う～ん、ちょっと待って。本命が女神の神殿でも、守護天使の神殿が極星従騎に襲われているのは変わらないのよね～」
line = "「う～ん、ちょっと待って。本命が女神の神殿でも、守護天使の神殿が極星従騎に襲われているのは変わらないのよね～」"

[[dialogue]]
speaker = "アナ"
# 「ええ。女神の神殿も守る必要がありますが、守護天使の神殿が破壊されても世界は崩壊します」
line = "「ええ。女神の神殿も守る必要がありますが、守護天使の神殿が破壊されても世界は崩壊します」"

[[dialogue]]
speaker = "マトイ"
# 「結局、全部守らないといけないんだね……」
line = "「結局、全部守らないといけないんだね……」"

[[dialogue]]
speaker = "メルエル"
# 「ごめん、さっき聖庭園に行くって聞こえてきたんだけど……」
line = "「ごめん、さっき聖庭園に行くって聞こえてきたんだけど……」"

[[dialogue]]
speaker = "クロト"
# 「メルエル？　どうしてここに？」
line = "「メルエル？　どうしてここに？」"

[[dialogue]]
speaker = "マトイ"
# 「姫咲さんは私たちと一緒に守護天使の神殿に行く予定で、待機してもらってたんだ」
line = "「姫咲さんは私たちと一緒に守護天使の神殿に行く予定で、待機してもらってたんだ」"

[[dialogue]]
speaker = "メルエル"
# 「うん、私もそのつもりだったんだけど……会長くんたちは聖庭園に行くんだよね？」
line = "「うん、私もそのつもりだったんだけど……会長くんたちは聖庭園に行くんだよね？」"

[[dialogue]]
speaker = "メルエル"
# 「じゃあ私も聖庭園に行くよ！」
line = "「じゃあ私も聖庭園に行くよ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「え？　メルエルが？」
line = "「え？　メルエルが？」"

[[dialogue]]
speaker = "メルエル"
# 「女神様の神殿が破壊されれば、天使と天界が消滅する……ということは、天使みんなの命が懸かってるんだよね」
line = "「女神様の神殿が破壊されれば、天使と天界が消滅する……ということは、天使みんなの命が懸かってるんだよね」"

[[dialogue]]
speaker = "メルエル"
# 「それなら私たち天使が戦わないと！　それに聖庭園なら私の故郷だし、きっと力になれると思うんだ」
line = "「それなら私たち天使が戦わないと！　それに聖庭園なら私の故郷だし、きっと力になれると思うんだ」"

[[dialogue]]
speaker = "クロト"
# 「確かにメルエルがいてくれるのは心強いけど……」
line = "「確かにメルエルがいてくれるのは心強いけど……」"

[[dialogue]]
speaker = "ナターシャ"
# 「ちょっと待った。女神の神殿にはおそらく極星星徒会が直接やってくる。一番の激戦になるよ」
line = "「ちょっと待った。女神の神殿にはおそらく極星星徒会が直接やってくる。一番の激戦になるよ」"

[[dialogue]]
speaker = "メルエル"
# 「戦いが危険なのはわかってる。でも天使みんなが消えるかどうかなんだから、ここで戦わなきゃ！」
line = "「戦いが危険なのはわかってる。でも天使みんなが消えるかどうかなんだから、ここで戦わなきゃ！」"

[[dialogue]]
speaker = "メルエル"
# 「絶対に足手まといにはならない……ううん、絶対に役に立つから！」
line = "「絶対に足手まといにはならない……ううん、絶対に役に立つから！」"

[[dialogue]]
speaker = "ナターシャ"
# 「そう言われてもなぁ……」
line = "「そう言われてもなぁ……」"

[[dialogue]]
speaker = "ナターシャ"
# （メルエルに危険が及ぶのは困るんだけど……でもここで無理に止めるのも不自然だし……）
line = "（メルエルに危険が及ぶのは困るんだけど……でもここで無理に止めるのも不自然だし……）"

[[dialogue]]
speaker = "ナターシャ"
# 「はぁ……わかった。私は止めない。でも最終的に決めるのは会長さんだからね？」
line = "「はぁ……わかった。私は止めない。でも最終的に決めるのは会長さんだからね？」"

[[dialogue]]
speaker = "unk"
# チラリとナターシャが俺を見やる。
line = "チラリとナターシャが俺を見やる。"

[[dialogue]]
speaker = "unk"
# 親友を危険に晒したくないナターシャの気持ちは理解できるが、メルエルも立派なプリマステラだ。ここはメルエルを頼らせてもらう。
line = "親友を危険に晒したくないナターシャの気持ちは理解できるが、メルエルも立派なプリマステラだ。ここはメルエルを頼らせてもらう。"

[[dialogue]]
speaker = "クロト"
# 「メルエルの気持ちはわかった。一緒に戦ってくれ、メルエル」
line = "「メルエルの気持ちはわかった。一緒に戦ってくれ、メルエル」"

[[dialogue]]
speaker = "メルエル"
# 「うん、絶対に天界を守ろうね！」
line = "「うん、絶対に天界を守ろうね！」"

[[dialogue]]
speaker = "ナターシャ"
# 「あぁ～……やっぱそうなるかー」
line = "「あぁ～……やっぱそうなるかー」"

[[dialogue]]
speaker = "ナターシャ"
# （こうなって欲しくなかったんだけどなぁ……ま、結局やることは変わらないか。メルエルを守るのが仕事だし）
line = "（こうなって欲しくなかったんだけどなぁ……ま、結局やることは変わらないか。メルエルを守るのが仕事だし）"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃん？」
line = "「ナターシャちゃん？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ああ、ううん、何でもない。女神の神殿がやられたら私も消えるんだから、真剣に戦わないとね」
line = "「ああ、ううん、何でもない。女神の神殿がやられたら私も消えるんだから、真剣に戦わないとね」"

[[dialogue]]
speaker = "クロト"
# 「それじゃ、誰がどこに行くか改めて決めよう」
line = "「それじゃ、誰がどこに行くか改めて決めよう」"

[[dialogue]]
speaker = "クロト"
# 「全員で女神の神殿に向かいたいところだが、報告を聞く限り、守護天使の神殿を防衛する戦力も足りていない」
line = "「全員で女神の神殿に向かいたいところだが、報告を聞く限り、守護天使の神殿を防衛する戦力も足りていない」"

[[dialogue]]
speaker = "クロト"
# 「だからノヴァフォームを持つマトイたちは、分かれて守護天使の神殿を守ってくれ」
line = "「だからノヴァフォームを持つマトイたちは、分かれて守護天使の神殿を守ってくれ」"

[[dialogue]]
speaker = "マトイ"
# 「うん、わかった！　ノヴァフォームなら複数の極星従騎も相手できるしね」
line = "「うん、わかった！　ノヴァフォームなら複数の極星従騎も相手できるしね」"

[[dialogue]]
speaker = "フィオナ"
# 「私も先行している流星星徒会と合流して、守護天使の神殿の防衛に回ります」
line = "「私も先行している流星星徒会と合流して、守護天使の神殿の防衛に回ります」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、頼んだぞ、フィオナ！」
line = "「ああ、頼んだぞ、フィオナ！」"

[[dialogue]]
speaker = "クロト"
# 「俺とヴィーナス、メルエルは女神の神殿へ。選挙管理委員会も一緒に来てくれ。ベアトリスなら極星星徒会を説得できるかもしれない」
line = "「俺とヴィーナス、メルエルは女神の神殿へ。選挙管理委員会も一緒に来てくれ。ベアトリスなら極星星徒会を説得できるかもしれない」"

[[dialogue]]
speaker = "ベアトリス"
# 「わかりました！」
line = "「わかりました！」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、極星学園の好きにはさせない」
line = "「ああ、極星学園の好きにはさせない」"

[[dialogue]]
speaker = "シノ"
# 「では私は、残った星騎士とともに流星市国の防衛を。エステルさんもご協力お願いできますか？」
line = "「では私は、残った星騎士とともに流星市国の防衛を。エステルさんもご協力お願いできますか？」"

[[dialogue]]
speaker = "エステル"
# 「かしこまりました。私は複雑な立場ですから、どなたかと行動を共にしていた方がよろしいでしょう」
line = "「かしこまりました。私は複雑な立場ですから、どなたかと行動を共にしていた方がよろしいでしょう」"

[[dialogue]]
speaker = "シノ"
# 「ご理解が早くて助かります。エステルさんを疑うわけではありませんが、周囲に余計な心配をさせないためにも、そういった配慮は必要ですから」
line = "「ご理解が早くて助かります。エステルさんを疑うわけではありませんが、周囲に余計な心配をさせないためにも、そういった配慮は必要ですから」"

[[dialogue]]
speaker = "リノ"
# 『こちらネビュラ基地のリノよ。世界樹への魔力充填、完了したわよ。いつでも行けるわ！』
line = "『こちらネビュラ基地のリノよ。世界樹への魔力充填、完了したわよ。いつでも行けるわ！』"

[[dialogue]]
speaker = "クロト"
# 「母さん！」
line = "「母さん！」"

[[dialogue]]
speaker = "unk"
# そこに母さんから通信が入ってきた。
line = "そこに母さんから通信が入ってきた。"

[[dialogue]]
speaker = "unk"
# どうやら母さんが世界樹の管制を担当してくれているらしい。
line = "どうやら母さんが世界樹の管制を担当してくれているらしい。"

[[dialogue]]
speaker = "リノ"
# 『あらクロト、アルタイルに戻ったとは聞いたけど、もう元気なのね』
line = "『あらクロト、アルタイルに戻ったとは聞いたけど、もう元気なのね』"

[[dialogue]]
speaker = "クロト"
# 「ああ、向こうの母さんが助けてくれたんだ」
line = "「ああ、向こうの母さんが助けてくれたんだ」"

[[dialogue]]
speaker = "リノ"
# 『デネブの私に会ったの！？　向こうの私がどうなってるのか気になるわね。落ち着いたら聞かせてちょうだい』
line = "『デネブの私に会ったの！？　向こうの私がどうなってるのか気になるわね。落ち着いたら聞かせてちょうだい』"

[[dialogue]]
speaker = "unk"
# アルタイルの母さんは無事だとわかっていたはずなのに、声を聞いただけで安堵してしまう。
line = "アルタイルの母さんは無事だとわかっていたはずなのに、声を聞いただけで安堵してしまう。"

[[dialogue]]
speaker = "unk"
# もっと話をしたいけど、残念ながら今は天界に行かなければいけない。
line = "もっと話をしたいけど、残念ながら今は天界に行かなければいけない。"

[[dialogue]]
speaker = "クロト"
# 「ごめん、母さん。守護天使の神殿だけじゃなくて、聖庭園にも行かないといけないんだ」
line = "「ごめん、母さん。守護天使の神殿だけじゃなくて、聖庭園にも行かないといけないんだ」"

[[dialogue]]
speaker = "unk"
# ベアトリスがくれた情報を手短に母さんに伝える。
line = "ベアトリスがくれた情報を手短に母さんに伝える。"

[[dialogue]]
speaker = "リノ"
# 『なるほど、女神の神殿ね……確かにそっちも無視できないわ』
line = "『なるほど、女神の神殿ね……確かにそっちも無視できないわ』"

[[dialogue]]
speaker = "リノ"
# 『だけど世界樹の魔力が足りるかどうか……あ、クラウディア様がＯＫしてくれたわ！』
line = "『だけど世界樹の魔力が足りるかどうか……あ、クラウディア様がＯＫしてくれたわ！』"

[[dialogue]]
speaker = "リノ"
# 『“余に無茶をさせたからには必ず成し遂げてみせよ”──だって』
line = "『“余に無茶をさせたからには必ず成し遂げてみせよ”──だって』"

[[dialogue]]
speaker = "クロト"
# 「ああ、わかった。必ず天界を守るよ」
line = "「ああ、わかった。必ず天界を守るよ」"

[[dialogue]]
speaker = "リノ"
# 『じゃあ星徒会室に世界樹を繋げるわ。聖庭園には私が話を通しておくわね』
line = "『じゃあ星徒会室に世界樹を繋げるわ。聖庭園には私が話を通しておくわね』"

[[dialogue]]
speaker = "リノ"
# 『それじゃ──行ってらっしゃい！』
line = "『それじゃ──行ってらっしゃい！』"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。行ってきます！」
line = "「ありがとう。行ってきます！」"

[[dialogue]]
speaker = "unk"
# そして俺たちは、世界樹の根を通って天界に登った──
line = "そして俺たちは、世界樹の根を通って天界に登った──"
