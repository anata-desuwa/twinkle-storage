[[dialogue]]
speaker = "unk"
# お菓子をくれるパーティー会場の星騎士たちを強制変身させて、次々と勝負を挑んでいくジャック・オー・ランタン。
line = "お菓子をくれるパーティー会場の星騎士たちを強制変身させて、次々と勝負を挑んでいくジャック・オー・ランタン。"

[[dialogue]]
speaker = "unk"
# 誰もハロウィンの幽霊に勝つことはできず、カボチャ頭にされて気を失ってしまっていた。
line = "誰もハロウィンの幽霊に勝つことはできず、カボチャ頭にされて気を失ってしまっていた。"

[[dialogue]]
speaker = "セナリィ"
# 「ま、マズい……！　これは本格的にヤベェですわ！　ジャック様、全然こちらの言うことを聞いてくれませんわよ！？」
line = "「ま、マズい……！　これは本格的にヤベェですわ！　ジャック様、全然こちらの言うことを聞いてくれませんわよ！？」"

[[dialogue]]
speaker = "unk"
# 倒れてる子たち、外傷はないみたいだけど
line = "倒れてる子たち、外傷はないみたいだけど"

[[dialogue]]
speaker = "ネーゼマイン"
# 「とは言えこんだけの人数気絶させといて、後で会場を盛り上げる為のレクリエーションでした～って誤魔化すのは、ちょ～っと交渉が難しいかもね～♪」
line = "「とは言えこんだけの人数気絶させといて、後で会場を盛り上げる為のレクリエーションでした～って誤魔化すのは、ちょ～っと交渉が難しいかもね～♪」"

[[dialogue]]
speaker = "セナリィ"
# 「こうなったら……！　非常に勿体ないですけれど、止むを得ませんわ！」
line = "「こうなったら……！　非常に勿体ないですけれど、止むを得ませんわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「ヒトリ様！　ジャック様の召喚を解いて、帰ってもらって下さいまし！」
line = "「ヒトリ様！　ジャック様の召喚を解いて、帰ってもらって下さいまし！」"

[[dialogue]]
speaker = "ヒトリ"
# 「え？　召喚を解く？　えっと……」
line = "「え？　召喚を解く？　えっと……」"

[[dialogue]]
speaker = "セナリィ"
# 「お早くお願いしますわ！　ヒトリ様！」
line = "「お早くお願いしますわ！　ヒトリ様！」"

[[dialogue]]
speaker = "ヒトリ"
# 「そ、その……ごめんなさい。私の星術は、幽霊のいる場所との門を作って、繋ぐことはできますけど……」
line = "「そ、その……ごめんなさい。私の星術は、幽霊のいる場所との門を作って、繋ぐことはできますけど……」"

[[dialogue]]
speaker = "ヒトリ"
# 「生きている人と同じように、来て欲しい時はお話して、お願いするような形なので……強制的に戻ってもらう術とかはなくて……」
line = "「生きている人と同じように、来て欲しい時はお話して、お願いするような形なので……強制的に戻ってもらう術とかはなくて……」"

[[dialogue]]
speaker = "セナリィ"
# 「ま、まさか……」
line = "「ま、まさか……」"

[[dialogue]]
speaker = "ヒトリ"
# 「どうにかして、説得して止める以外にはないかと……」
line = "「どうにかして、説得して止める以外にはないかと……」"

[[dialogue]]
speaker = "セナリィ"
# 「ど――」
line = "「ど――」"

[[dialogue]]
speaker = "セナリィ"
# 「どうしてこうなりますのぉーーーっ！？」
line = "「どうしてこうなりますのぉーーーっ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはははっ♪　セナリィ、やっちゃったね～～～っ♪」
line = "「きゃはははっ♪　セナリィ、やっちゃったね～～～っ♪」"

[[dialogue]]
speaker = "サラン"
# 「わ～い！　ジャックちゃんと一緒に遊ぶの楽しい～♪」
line = "「わ～い！　ジャックちゃんと一緒に遊ぶの楽しい～♪」"

[[dialogue]]
speaker = "サラン"
# 「みんな、ジャックちゃんにだけじゃなくて、サランにもお菓子をくれて、ふわふわ～♪」
line = "「みんな、ジャックちゃんにだけじゃなくて、サランにもお菓子をくれて、ふわふわ～♪」"

[[dialogue]]
speaker = "ジャック"
# 「ケラケラケラ♪」
line = "「ケラケラケラ♪」"

[[dialogue]]
speaker = "サラン"
# 「サランとジャックちゃんのコンビで、また勝っちゃったね～♪　うぇ～い♪」
line = "「サランとジャックちゃんのコンビで、また勝っちゃったね～♪　うぇ～い♪」"

[[dialogue]]
speaker = "セナリィ"
# 「というか、サラン様はいつの間にかジャック様とタッグ組んで暴れてるんですけど！？　どうしてそうなりますのっ！？」
line = "「というか、サラン様はいつの間にかジャック様とタッグ組んで暴れてるんですけど！？　どうしてそうなりますのっ！？」"

[[dialogue]]
speaker = "unk"
# 『美食酔い』してるな、あれは……
line = "『美食酔い』してるな、あれは……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひっ♪　あれが桜十路先輩の美食酔いか～。美味しい物を食べると、ふわふわな気分になって酔っ払ったみたいになっちゃうんだっけ？」
line = "「にひひっ♪　あれが桜十路先輩の美食酔いか～。美味しい物を食べると、ふわふわな気分になって酔っ払ったみたいになっちゃうんだっけ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「周りはカボチャ頭で倒れてる人だらけ、その中心で笑ってる幽霊と酔っ払いとか、まさにカオスな状況だね～♪　きゃはははっ♪」
line = "「周りはカボチャ頭で倒れてる人だらけ、その中心で笑ってる幽霊と酔っ払いとか、まさにカオスな状況だね～♪　きゃはははっ♪」"

[[dialogue]]
speaker = "サラン"
# 「あ～♪　マインちゃんが笑ってる～♪」
line = "「あ～♪　マインちゃんが笑ってる～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おっと……先輩、いつの間にかこっちに……」
line = "「おっと……先輩、いつの間にかこっちに……」"

[[dialogue]]
speaker = "サラン"
# 「マインちゃん、すっごく楽しそうな顔してるよ～？　マインちゃんも、気分ふわふわ～？」
line = "「マインちゃん、すっごく楽しそうな顔してるよ～？　マインちゃんも、気分ふわふわ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁ、これは私の悪い癖で……台風が来ると、ついテンション上がっちゃうタイプというか……」
line = "「まぁ、これは私の悪い癖で……台風が来ると、ついテンション上がっちゃうタイプというか……」"

[[dialogue]]
speaker = "サラン"
# 「そうなんだ～♪　会長ちゃんに悪戯してる時も楽しそうな顔してたけど、なんだかジャックちゃんみたいだね～♪」
line = "「そうなんだ～♪　会長ちゃんに悪戯してる時も楽しそうな顔してたけど、なんだかジャックちゃんみたいだね～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "サラン"
# 「ほら、ジャックちゃんって、ハロウィンの幽霊だから、悪戯が好きなんだよ～♪　それがなんだか、マインちゃんに似てるな～って♪」
line = "「ほら、ジャックちゃんって、ハロウィンの幽霊だから、悪戯が好きなんだよ～♪　それがなんだか、マインちゃんに似てるな～って♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……そっか、なるほど。つまり、今のジャックさんは、私と同じ気持ちってことか……」
line = "「……そっか、なるほど。つまり、今のジャックさんは、私と同じ気持ちってことか……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――わかったよ、会長。ジャックさんとの交渉方法が」
line = "「――わかったよ、会長。ジャックさんとの交渉方法が」"

[[dialogue]]
speaker = "unk"
# ああ、俺もわかった
line = "ああ、俺もわかった"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ジャックさんはハロウィンを楽しみたくて、悪戯をしてる。だから、止めるには、その欲求を満足させてあげればいい」
line = "「ジャックさんはハロウィンを楽しみたくて、悪戯をしてる。だから、止めるには、その欲求を満足させてあげればいい」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうと決まれば……桜十路先輩！」
line = "「そうと決まれば……桜十路先輩！」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？」
line = "「ぽよ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今から私、ジャックさんと勝負しようと思うんで、一緒にやりませんか～？」
line = "「今から私、ジャックさんと勝負しようと思うんで、一緒にやりませんか～？」"

[[dialogue]]
speaker = "サラン"
# 「マインちゃんと一緒にっ？　うんっ、サランもやる～っ♪」
line = "「マインちゃんと一緒にっ？　うんっ、サランもやる～っ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「交渉成立ですね♪　それじゃあ戦闘服に変身して～、って……ん？　なんか衣装が光って――」
line = "「交渉成立ですね♪　それじゃあ戦闘服に変身して～、って……ん？　なんか衣装が光って――」"

[[dialogue]]
speaker = "サラン"
# 「わ～♪　サランも光ってるよ～？」
line = "「わ～♪　サランも光ってるよ～？」"

[[dialogue]]
speaker = "ジャック"
# 「ケラケラケラ♪」
line = "「ケラケラケラ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これは……ハロウィン衣装のまま、戦闘服に変身した……！？」
line = "「これは……ハロウィン衣装のまま、戦闘服に変身した……！？」"

[[dialogue]]
speaker = "サラン"
# 「すご～い♪　なんだか力が、すっごくふわふわ湧いてくるよ～♪」
line = "「すご～い♪　なんだか力が、すっごくふわふわ湧いてくるよ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「どうやらこれは、ジャックさんの仕業かな？」
line = "「どうやらこれは、ジャックさんの仕業かな？」"

[[dialogue]]
speaker = "ジャック"
# 「ケラケラケラ♪」
line = "「ケラケラケラ♪」"

[[dialogue]]
speaker = "サラン"
# 「そうみたい～♪　ジャックちゃんも、マインちゃんと遊びたいみたいだよ～？」
line = "「そうみたい～♪　ジャックちゃんも、マインちゃんと遊びたいみたいだよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　そういうことなら、ご好意に甘えて――」
line = "「にひひ♪　そういうことなら、ご好意に甘えて――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私もハロウィンを、本気で遊んじゃおうかなっ！」
line = "「私もハロウィンを、本気で遊んじゃおうかなっ！」"

[[dialogue]]
speaker = "サラン"
# 「レディ～！　ゴ～ッ♪」
line = "「レディ～！　ゴ～ッ♪」"

[[dialogue]]
speaker = "unk"
# いつになく楽しそうな顔をしたネーゼマインは、サランと共に、ジャック・オー・ランタンへ勝負を挑むのだった――
line = "いつになく楽しそうな顔をしたネーゼマインは、サランと共に、ジャック・オー・ランタンへ勝負を挑むのだった――"
