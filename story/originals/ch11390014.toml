[[dialogue]]
speaker = "unk"
# 第４話,ヴィーナスの夢,P
line = "第４話,ヴィーナスの夢,P"

[[dialogue]]
speaker = "unk"
# とある休日。俺はヴィーナスに誘われて、九浄家へ遊びにやってきていた。
line = "とある休日。俺はヴィーナスに誘われて、九浄家へ遊びにやってきていた。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパ～！　いらっしゃ～い♪」
line = "「パパ～！　いらっしゃ～い♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「おお、魔王よ、よく来たな。今日はゆっくりしていくがよい」
line = "「おお、魔王よ、よく来たな。今日はゆっくりしていくがよい」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「えへへ～♪　今日はパパにいっぱい甘えたい日だから、リトルフォームで待ってたわ！」
line = "「えへへ～♪　今日はパパにいっぱい甘えたい日だから、リトルフォームで待ってたわ！」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ。ヴィーナス、子供のようにはしゃいで……」
line = "「ふふっ。ヴィーナス、子供のようにはしゃいで……」"

[[dialogue]]
speaker = "ヘレナ"
# 「リトルフォーム、実によいものだな。見るたびに可愛くて、つい色々な衣装を着せたくなってしまう」
line = "「リトルフォーム、実によいものだな。見るたびに可愛くて、つい色々な衣装を着せたくなってしまう」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私もリトルフォームになると、ヘレナちゃん<b>ママ</b>がよく頭を撫でてくれるから、つい変身したくなっちゃうわ♪」
line = "「私もリトルフォームになると、ヘレナちゃん<b>ママ</b>がよく頭を撫でてくれるから、つい変身したくなっちゃうわ♪」"

[[dialogue]]
speaker = "unk"
# ママって呼んでいるところ、初めてみた
line = "ママって呼んでいるところ、初めてみた"

[[dialogue]]
speaker = "ヘレナ"
# 「私も初めて呼ばれた時は、思わず胸がキュンとしてしまった。まさか、ヴィーナスからそう呼ばれる日が来ようとはな」
line = "「私も初めて呼ばれた時は、思わず胸がキュンとしてしまった。まさか、ヴィーナスからそう呼ばれる日が来ようとはな」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「セシアもよく『ママは何人いてもいい』って言っているし、ヘレナちゃんママは『魔王ハーレム建造計画』の一員だから、モーマンタイよ♪」
line = "「セシアもよく『ママは何人いてもいい』って言っているし、ヘレナちゃんママは『魔王ハーレム建造計画』の一員だから、モーマンタイよ♪」"

[[dialogue]]
speaker = "ヘレナ"
# 「ふふっ、まるで本当に娘ができたような感じがするな、魔王パパ<emoji=heart04>」
line = "「ふふっ、まるで本当に娘ができたような感じがするな、魔王パパ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その呼び方はリアクションに困るよ！？
line = "その呼び方はリアクションに困るよ！？"

[[dialogue]]
speaker = "ヘレナ"
# 「ヴィーナスが呼んでいるから、<ruby=モーマンタイ>無問題</ruby>であろう？　ふふふっ♪」
line = "「ヴィーナスが呼んでいるから、<ruby>無問題<rt>モーマンタイ</rt></ruby>であろう？　ふふふっ♪」"

[[dialogue]]
speaker = "unk"
# ヘレナちゃんはイタズラっぽくウインクしながら、笑ってみせるのだった。
line = "ヘレナちゃんはイタズラっぽくウインクしながら、笑ってみせるのだった。"

[[dialogue]]
speaker = "unk"
# それから俺はヴィーナスと、彼女の部屋へと移動した。
line = "それから俺はヴィーナスと、彼女の部屋へと移動した。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ここからは、私がパパを独り占めね♪」
line = "「ここからは、私がパパを独り占めね♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ねぇ、パパ～、抱っこして～<emoji=heart04>　ん～♪　すりすり～<emoji=heart04>」
line = "「ねぇ、パパ～、抱っこして～<emoji=heart04>　ん～♪　すりすり～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは俺の膝の上で、向かい合うような形で座ると、顔をすりすりさせてくる。
line = "ヴィーナスは俺の膝の上で、向かい合うような形で座ると、顔をすりすりさせてくる。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――そうだわ！　あのね、今日はパパに相談したいことがあったの」
line = "「――そうだわ！　あのね、今日はパパに相談したいことがあったの」"

[[dialogue]]
speaker = "unk"
# 相談したいこと？
line = "相談したいこと？"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私ね、パパのハーレム計画とは別に、ここ最近、自分が学園を卒業したらどうなりたいかって考えてたの！」
line = "「私ね、パパのハーレム計画とは別に、ここ最近、自分が学園を卒業したらどうなりたいかって考えてたの！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ほら、『こどもの日をお祝いしてもらいたい』ってことで、このリトルフォームに変身できるようになったでしょ？」
line = "「ほら、『こどもの日をお祝いしてもらいたい』ってことで、このリトルフォームに変身できるようになったでしょ？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「その時にレミカが、アイドルとして本気で夢を追っているのを見て――」
line = "「その時にレミカが、アイドルとして本気で夢を追っているのを見て――」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私が将来やりたいこと……『夢』ってなんだろうって、考えてみるようになったの」
line = "「私が将来やりたいこと……『夢』ってなんだろうって、考えてみるようになったの」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「それでね、私――学園に通って、仲間がたくさんできて、今の毎日がすごく楽しいの！」
line = "「それでね、私――学園に通って、仲間がたくさんできて、今の毎日がすごく楽しいの！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「だけど、いつかは学園を卒業しなくちゃいけない時が来るでしょ？」
line = "「だけど、いつかは学園を卒業しなくちゃいけない時が来るでしょ？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「それなら私、学園を卒業しても──そのまま学園に居られる仕事がしたいって思ったの！」
line = "「それなら私、学園を卒業しても──そのまま学園に居られる仕事がしたいって思ったの！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私にどんな仕事ができるのかは、まだよくわからないけれど――」
line = "「私にどんな仕事ができるのかは、まだよくわからないけれど――」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「そのことも含めて、ヘレナちゃんに『卒業したら、学園に関わる仕事がしたい』って相談しようと思ってるの！」
line = "「そのことも含めて、ヘレナちゃんに『卒業したら、学園に関わる仕事がしたい』って相談しようと思ってるの！」"

[[dialogue]]
speaker = "unk"
# まだ相談はしてないんだ？
line = "まだ相談はしてないんだ？"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「うん！　最初に話すのは、パパがいいなって。パパが私のやりたいことをどう思うか、聞きたかったの！」
line = "「うん！　最初に話すのは、パパがいいなって。パパが私のやりたいことをどう思うか、聞きたかったの！」"

[[dialogue]]
speaker = "unk"
# 俺は、ヴィーナスの将来の『夢』はすごくいいと思った。
line = "俺は、ヴィーナスの将来の『夢』はすごくいいと思った。"

[[dialogue]]
speaker = "unk"
# 星徒会だけじゃなく『新星学園のフィクサー』になるヴィーナスの姿が、すぐにイメージとして思い浮かんでくる感じがした。
line = "星徒会だけじゃなく『新星学園のフィクサー』になるヴィーナスの姿が、すぐにイメージとして思い浮かんでくる感じがした。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「新星学園のフィクサー……！　それ、すごく素敵ね！」
line = "「新星学園のフィクサー……！　それ、すごく素敵ね！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私、これから色々勉強して、もっとすごいフィクサーになれるように頑張るわ♪」
line = "「私、これから色々勉強して、もっとすごいフィクサーになれるように頑張るわ♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「あっ！　もちろん、パパのお嫁さんになるのも忘れてないわよ♪」
line = "「あっ！　もちろん、パパのお嫁さんになるのも忘れてないわよ♪」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「私の夢の１つは、パパと一緒に子供がたくさんいる、幸せな家族を作ることなんだから♪」
line = "「私の夢の１つは、パパと一緒に子供がたくさんいる、幸せな家族を作ることなんだから♪」"

[[dialogue]]
speaker = "unk"
# 俺も、ヴィーナスと幸せな家庭を築きたい
line = "俺も、ヴィーナスと幸せな家庭を築きたい"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「えへへへへへぇ<emoji=heart04>　嬉しい<emoji=heart04>」
line = "「えへへへへへぇ<emoji=heart04>　嬉しい<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――うん？　でも、魔王ハーレム建造は要相談？」
line = "「――うん？　でも、魔王ハーレム建造は要相談？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「う～ん、みんなと仲よく家族になれたら、すっごく楽しいだろうなって私は思うんだけど～」
line = "「う～ん、みんなと仲よく家族になれたら、すっごく楽しいだろうなって私は思うんだけど～」"

[[dialogue]]
speaker = "unk"
# 俺はヴィーナスが１番好きだから。
line = "俺はヴィーナスが１番好きだから。"

[[dialogue]]
speaker = "unk"
# ヴィーナス自身が思ってるよりも、俺はヴィーナスのことが好きなんだ、と真っすぐに彼女の目を見て伝える。
line = "ヴィーナス自身が思ってるよりも、俺はヴィーナスのことが好きなんだ、と真っすぐに彼女の目を見て伝える。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「……！？　パパっ<emoji=heart04>　私、今すっごく『好き』って気持ちが、いっぱい溢れてきたわ<emoji=heart04>」
line = "「……！？　パパっ<emoji=heart04>　私、今すっごく『好き』って気持ちが、いっぱい溢れてきたわ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「――え？　だからもうしばらくは、私を独り占めにして、２人っきりの恋人生活を楽しみたい？」
line = "「――え？　だからもうしばらくは、私を独り占めにして、２人っきりの恋人生活を楽しみたい？」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「わかったわ♪　つまり、私がリトルフォームでパパに甘えたいみたいに、パパも恋人として私に甘えたいってことね<emoji=heart04>」
line = "「わかったわ♪　つまり、私がリトルフォームでパパに甘えたいみたいに、パパも恋人として私に甘えたいってことね<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「じゃあ……今日はお休みだから、パパも遠慮しないで、思いっきり私に甘えていいわよ<emoji=heart04>」
line = "「じゃあ……今日はお休みだから、パパも遠慮しないで、思いっきり私に甘えていいわよ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ん～っ<emoji=heart04>」
line = "「ん～っ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが俺の顔を見上げて唇を差し出し、おねだりの顔をみせる。
line = "ヴィーナスが俺の顔を見上げて唇を差し出し、おねだりの顔をみせる。"

[[dialogue]]
speaker = "unk"
# 俺はそっと、彼女の顔に近づいて――
line = "俺はそっと、彼女の顔に近づいて――"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「ちゅっ<emoji=heart04>　……パパ、大好き<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　……パパ、大好き<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# キスを交わして、愛の言葉を囁き合う。
line = "キスを交わして、愛の言葉を囁き合う。"

[[dialogue]]
speaker = "unk"
# 俺も大好きだ、ヴィーナス
line = "俺も大好きだ、ヴィーナス"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「んっ……パパっ<emoji=heart04>　ちゅっ、ちゅっ<emoji=heart04>」
line = "「んっ……パパっ<emoji=heart04>　ちゅっ、ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「パパ、もっとぉ……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」
line = "「パパ、もっとぉ……<emoji=heart04>　んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ２人だけの空間で、俺は最愛の彼女と幸せな時間を過ごすのだった。
line = "２人だけの空間で、俺は最愛の彼女と幸せな時間を過ごすのだった。"
