[[dialogue]]
speaker = "unk"
# 第１話,希崎レイト,B
line = "第１話,希崎レイト,B"

[[dialogue]]
speaker = "unk"
# ──ある男の話をしよう。
line = "──ある男の話をしよう。"

[[dialogue]]
speaker = "unk"
# 彼は流星市国のごく一般的な家庭に生まれた。
line = "彼は流星市国のごく一般的な家庭に生まれた。"

[[dialogue]]
speaker = "unk"
# 彼の名は<ruby=きざき>希崎</ruby>レイト。
line = "彼の名は<ruby>希崎<rt>きざき</rt></ruby>レイト。"

[[dialogue]]
speaker = "unk"
# レイトは、これといった取り柄こそないものの、素朴な少年として育っていく。
line = "レイトは、これといった取り柄こそないものの、素朴な少年として育っていく。"

[[dialogue]]
speaker = "unk"
# 問題があったとすれば彼の歪んだ人格だろうか。
line = "問題があったとすれば彼の歪んだ人格だろうか。"

[[dialogue]]
speaker = "unk"
# 希崎レイトは幼少の<ruby=みぎり>砌</ruby>より、著しく他者への共感性を欠いていた。
line = "希崎レイトは幼少の<ruby>砌<rt>みぎり</rt></ruby>より、著しく他者への共感性を欠いていた。"

[[dialogue]]
speaker = "unk"
# 有り体に言って、人の気持ちがあまりわからない子だった。
line = "有り体に言って、人の気持ちがあまりわからない子だった。"

[[dialogue]]
speaker = "unk"
# クラスメイトへの陰湿ないじめや、野生の小動物に対する虐待など、悪行が問題視されるようになった。教師はしばしば彼を叱った。
line = "クラスメイトへの陰湿ないじめや、野生の小動物に対する虐待など、悪行が問題視されるようになった。教師はしばしば彼を叱った。"

[[dialogue]]
speaker = "unk"
# 彼が成長していくにつれ、その傾向は顕著になっていった。
line = "彼が成長していくにつれ、その傾向は顕著になっていった。"

[[dialogue]]
speaker = "unk"
# また、その頃には両親の不和も悪化し、彼は家庭という居場所も失った。
line = "また、その頃には両親の不和も悪化し、彼は家庭という居場所も失った。"

[[dialogue]]
speaker = "unk"
# 希崎レイトはますます荒んでいくようになった。
line = "希崎レイトはますます荒んでいくようになった。"

[[dialogue]]
speaker = "unk"
# それでも、彼は生来のサイコパスとは異なり、自身の性根が歪んでいることを自覚していた。
line = "それでも、彼は生来のサイコパスとは異なり、自身の性根が歪んでいることを自覚していた。"

[[dialogue]]
speaker = "unk"
# ただ、人間なら誰しも多少は抱く嗜虐的な感情を、隠そうともしなかっただけなのだ。
line = "ただ、人間なら誰しも多少は抱く嗜虐的な感情を、隠そうともしなかっただけなのだ。"

[[dialogue]]
speaker = "unk"
# そのことによる弊害もあった。
line = "そのことによる弊害もあった。"

[[dialogue]]
speaker = "unk"
# 彼が我慢ならなかったのは、他の悪人たちがみな外面を取り繕っているせいで、自分だけが巨悪かのように非難されることだった。
line = "彼が我慢ならなかったのは、他の悪人たちがみな外面を取り繕っているせいで、自分だけが巨悪かのように非難されることだった。"

[[dialogue]]
speaker = "unk"
# 自分と同じように性格のねじ曲がった人間たちが、その本性を隠して『うまくやっている』姿に多大な苛立ちを覚えるようになる。
line = "自分と同じように性格のねじ曲がった人間たちが、その本性を隠して『うまくやっている』姿に多大な苛立ちを覚えるようになる。"

[[dialogue]]
speaker = "unk"
# だが──彼には悪に染まりきるだけの『力』もなかった。
line = "だが──彼には悪に染まりきるだけの『力』もなかった。"

[[dialogue]]
speaker = "unk"
# 財力は言うに及ばず、知力も、腕力も、人並み以下の能力しか持ち合わせていなかった。
line = "財力は言うに及ばず、知力も、腕力も、人並み以下の能力しか持ち合わせていなかった。"

[[dialogue]]
speaker = "unk"
# たとえば彼の住まう流星市国では、毎日のように星騎士たちが超常的な力をふるい、戦っていた。
line = "たとえば彼の住まう流星市国では、毎日のように星騎士たちが超常的な力をふるい、戦っていた。"

[[dialogue]]
speaker = "unk"
# その光景を何度も目にしていた希崎青年。
line = "その光景を何度も目にしていた希崎青年。"

[[dialogue]]
speaker = "unk"
# そんな彼に、ある日、突然星力が芽生える──なんてストーリーも当然なかった。
line = "そんな彼に、ある日、突然星力が芽生える──なんてストーリーも当然なかった。"

[[dialogue]]
speaker = "unk"
# ──自分には、何もない。
line = "──自分には、何もない。"

[[dialogue]]
speaker = "unk"
# 何かを守る正義になることも、何かを壊す悪に染まることもできない、中途半端な己を嫌悪するようになっていった。
line = "何かを守る正義になることも、何かを壊す悪に染まることもできない、中途半端な己を嫌悪するようになっていった。"

[[dialogue]]
speaker = "unk"
# 男子として成熟した希崎レイトは、同時に<ruby=あんたん>暗澹</ruby>たる将来へ絶望することになる。
line = "男子として成熟した希崎レイトは、同時に<ruby>暗澹<rt>あんたん</rt></ruby>たる将来へ絶望することになる。"

[[dialogue]]
speaker = "unk"
# ──自分の居場所は、どこにもない。
line = "──自分の居場所は、どこにもない。"

[[dialogue]]
speaker = "unk"
# ──ならもう、生きていても仕方ない。
line = "──ならもう、生きていても仕方ない。"

[[dialogue]]
speaker = "unk"
# 生きていることにも意味を見いだせなくなった彼は、この世を去ろうと思い立つ。
line = "生きていることにも意味を見いだせなくなった彼は、この世を去ろうと思い立つ。"

[[dialogue]]
speaker = "unk"
# そして生まれつきの嗜虐性が、最後にも彼を奮い立たせた。
line = "そして生まれつきの嗜虐性が、最後にも彼を奮い立たせた。"

[[dialogue]]
speaker = "unk"
# ──どうせなら、他の人間も道連れにしてやろう。
line = "──どうせなら、他の人間も道連れにしてやろう。"

[[dialogue]]
speaker = "unk"
# 彼は通り魔的な犯行を画策した。
line = "彼は通り魔的な犯行を画策した。"

[[dialogue]]
speaker = "unk"
# ひとしきり通行人をナイフで切りつけて、満足したところで、適当な高所から身をなげうって死のう……と。
line = "ひとしきり通行人をナイフで切りつけて、満足したところで、適当な高所から身をなげうって死のう……と。"

[[dialogue]]
speaker = "unk"
# やがて最後の日がやってきた。
line = "やがて最後の日がやってきた。"

[[dialogue]]
speaker = "unk"
# 希崎青年は柄にもなく緊張していた。
line = "希崎青年は柄にもなく緊張していた。"

[[dialogue]]
speaker = "unk"
# 死への恐怖と殺人への興奮が入り混じった、えもいえぬ高揚感に包まれていた。
line = "死への恐怖と殺人への興奮が入り混じった、えもいえぬ高揚感に包まれていた。"

[[dialogue]]
speaker = "unk"
# ──２人か。３人か。うまくやれば１０人以上も。
line = "──２人か。３人か。うまくやれば１０人以上も。"

[[dialogue]]
speaker = "unk"
# 胸元にダガーナイフを仕込み、機をうかがう。
line = "胸元にダガーナイフを仕込み、機をうかがう。"

[[dialogue]]
speaker = "unk"
# せめて、この居たたまれない社会に、自分の生きた証を刻んでやろうと。
line = "せめて、この居たたまれない社会に、自分の生きた証を刻んでやろうと。"

[[dialogue]]
speaker = "unk"
# だが……彼の犯行が行われることはなかった。
line = "だが……彼の犯行が行われることはなかった。"

[[dialogue]]
speaker = "unk"
# 『彼女』との出会いが、青年の運命を変えたのだ。
line = "『彼女』との出会いが、青年の運命を変えたのだ。"

[[dialogue]]
speaker = "unk"
# 『──よぉ。何してんだ、そんなところで』
line = "『──よぉ。何してんだ、そんなところで』"

[[dialogue]]
speaker = "unk"
# 『──通り魔？　ははっ。んなチンケなことしてないでよ、いっそドカーンと世界ごとぶち壊してやろうぜ！』
line = "『──通り魔？　ははっ。んなチンケなことしてないでよ、いっそドカーンと世界ごとぶち壊してやろうぜ！』"

[[dialogue]]
speaker = "unk"
# 『──あたしと一緒にな』
line = "『──あたしと一緒にな』"

[[dialogue]]
speaker = "unk"
# リクリエ──誰もが知る世界の終わり。
line = "リクリエ──誰もが知る世界の終わり。"

[[dialogue]]
speaker = "unk"
# その日、偶然にも出会った少女は、彼をそんな運命へと誘った。
line = "その日、偶然にも出会った少女は、彼をそんな運命へと誘った。"

[[dialogue]]
speaker = "unk"
# 彼は今まで『リクリエに抗う者』しか見たことがなかった。
line = "彼は今まで『リクリエに抗う者』しか見たことがなかった。"

[[dialogue]]
speaker = "unk"
# 光り輝く正義のもとで戦う彼らを、疎ましく、そして羨ましく思っていた。
line = "光り輝く正義のもとで戦う彼らを、疎ましく、そして羨ましく思っていた。"

[[dialogue]]
speaker = "unk"
# だが目の前の少女は──堂々とその終焉を歓迎すると言い放った。
line = "だが目の前の少女は──堂々とその終焉を歓迎すると言い放った。"

[[dialogue]]
speaker = "unk"
# そして、共に世界を終わらせようと手を差し伸べた。
line = "そして、共に世界を終わらせようと手を差し伸べた。"

[[dialogue]]
speaker = "unk"
# それは青年にとって──自分を認めない世界へ亀裂を入れる、希望に満ちあふれた提案だったのだ。
line = "それは青年にとって──自分を認めない世界へ亀裂を入れる、希望に満ちあふれた提案だったのだ。"

[[dialogue]]
speaker = "unk"
# 『──名を』
line = "『──名を』"

[[dialogue]]
speaker = "unk"
# 『──名をください。我が主』
line = "『──名をください。我が主』"
