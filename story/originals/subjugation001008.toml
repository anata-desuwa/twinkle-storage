[[dialogue]]
speaker = "unk"
# リクリエの瘴気に体を操られた守護天使２人との戦いは続いていた。
line = "リクリエの瘴気に体を操られた守護天使２人との戦いは続いていた。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「くっ……ダメです！　攻撃が止められない！　意識まで乗っ取られる前に私たちを倒して下さい、ナミエル！」
line = "「くっ……ダメです！　攻撃が止められない！　意識まで乗っ取られる前に私たちを倒して下さい、ナミエル！」"

[[dialogue]]
speaker = "ナミエル"
# 「はぁ……はぁ……！　嫌です！　私は……学園に入学すると決めた時から――」
line = "「はぁ……はぁ……！　嫌です！　私は……学園に入学すると決めた時から――」"

[[dialogue]]
speaker = "ナミエル"
# 「ヒトを殺す暗殺者としてではなく……ヒトを救う星騎士として戦うと、そう誓ったんです！」
line = "「ヒトを殺す暗殺者としてではなく……ヒトを救う星騎士として戦うと、そう誓ったんです！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ナミエル……！」
line = "「ナミエル……！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「だが、このまま耐える戦いなんて続けていたら、お前たちが先に死んでしまうぞ！」
line = "「だが、このまま耐える戦いなんて続けていたら、お前たちが先に死んでしまうぞ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「そうなる前にセシア……頼むのだ！　我らを倒してくれ！」
line = "「そうなる前にセシア……頼むのだ！　我らを倒してくれ！」"

[[dialogue]]
speaker = "セシア"
# 「いいえ。クロトママが諦めないと決めた以上、セシアもその判断に従うわ。それに――」
line = "「いいえ。クロトママが諦めないと決めた以上、セシアもその判断に従うわ。それに――」"

[[dialogue]]
speaker = "セシア"
# 「クロトママとの付き合いは、アルモタヘル、マグダレナ、あなた達２人の方が長いのでしょう？」
line = "「クロトママとの付き合いは、アルモタヘル、マグダレナ、あなた達２人の方が長いのでしょう？」"

[[dialogue]]
speaker = "セシア"
# 「だったら、もっと信じなさい。クロトママのことを！」
line = "「だったら、もっと信じなさい。クロトママのことを！」"

[[dialogue]]
speaker = "unk"
# そうだ、諦めずに信じろ！　仲間のことを！
line = "そうだ、諦めずに信じろ！　仲間のことを！"

[[dialogue]]
speaker = "unk"
# 俺も仲間のことを信じている。俺たちは１人でリクリエと戦っているわけではない。
line = "俺も仲間のことを信じている。俺たちは１人でリクリエと戦っているわけではない。"

[[dialogue]]
speaker = "unk"
# 俺たちは――みんなで『<ruby=スターナイツ>星騎士</ruby>』なんだ！
line = "俺たちは――みんなで『<ruby>星騎士<rt>スターナイツ</rt></ruby>』なんだ！"

[[dialogue]]
speaker = "？？？"
# 「――やぁ、待たせたネ」
line = "「――やぁ、待たせたネ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「その声は……！」
line = "「その声は……！」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪」
line = "「フヒ♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「アニマさま……！」
line = "「アニマさま……！」"

[[dialogue]]
speaker = "アニマ"
# 「会長ならきっと、時間を稼いでくれると信じていたヨ」
line = "「会長ならきっと、時間を稼いでくれると信じていたヨ」"

[[dialogue]]
speaker = "アニマ"
# 「――１秒だけ失礼するヨ、マグたん、アルモたん」
line = "「――１秒だけ失礼するヨ、マグたん、アルモたん」"

[[dialogue]]
speaker = "unk"
# パチンッとアニマ先輩が指を鳴らす。次の一瞬、守護天使２人の動きが停止して――
line = "パチンッとアニマ先輩が指を鳴らす。次の一瞬、守護天使２人の動きが停止して――"

[[dialogue]]
speaker = "アニマ"
# 「ワクチンボム」
line = "「ワクチンボム」"

[[dialogue]]
speaker = "unk"
# すかさず、アニマ先輩が杖から光弾を放ち、２人の近くで爆発させる。眩い光が守護天使の体を包み、禍々しい霧を、リクリエの瘴気を取り払っていく。
line = "すかさず、アニマ先輩が杖から光弾を放ち、２人の近くで爆発させる。眩い光が守護天使の体を包み、禍々しい霧を、リクリエの瘴気を取り払っていく。"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「……！　体が自由に動くのだ！」
line = "「……！　体が自由に動くのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「この攻撃は一体……？」
line = "「この攻撃は一体……？」"

[[dialogue]]
speaker = "アニマ"
# 「病気のウィルスに対するワクチンというべきものだヨ」
line = "「病気のウィルスに対するワクチンというべきものだヨ」"

[[dialogue]]
speaker = "アニマ"
# 「なかなか取り払えないリクリエの瘴気。アニマはそこに異常を感じて、仮定シタ」
line = "「なかなか取り払えないリクリエの瘴気。アニマはそこに異常を感じて、仮定シタ」"

[[dialogue]]
speaker = "アニマ"
# 「新種のモンスターはまだ死んでおらず、ウィルスのような状態で、３人の体に潜伏しているのではないカト」
line = "「新種のモンスターはまだ死んでおらず、ウィルスのような状態で、３人の体に潜伏しているのではないカト」"

[[dialogue]]
speaker = "アニマ"
# 「そして、会長の体はどうやら、強い耐性があったみたいでネ」
line = "「そして、会長の体はどうやら、強い耐性があったみたいでネ」"

[[dialogue]]
speaker = "アニマ"
# 「そのデータを元に、特効星術を作り出したというわけダ」
line = "「そのデータを元に、特効星術を作り出したというわけダ」"

[[dialogue]]
speaker = "アニマ"
# 「まぁ、先にモンスターに勘付かれて、動かれてしまったから、時間との勝負ダッタが――」
line = "「まぁ、先にモンスターに勘付かれて、動かれてしまったから、時間との勝負ダッタが――」"

[[dialogue]]
speaker = "アニマ"
# 「アニマたちの勝ちダ。姿を現すがイイ」
line = "「アニマたちの勝ちダ。姿を現すがイイ」"

[[dialogue]]
speaker = "バグキメラ"
# 「グオォォォッ……！」
line = "「グオォォォッ……！」"

[[dialogue]]
speaker = "セシア"
# 「これが、２人を操っていたモンスターね」
line = "「これが、２人を操っていたモンスターね」"

[[dialogue]]
speaker = "unk"
# 後はこいつを倒すだけだ！
line = "後はこいつを倒すだけだ！"

[[dialogue]]
speaker = "ナミエル"
# 「でも、倒したらまた、瘴気の姿になって誰かの体に乗り移ろうとするんじゃ……！？」
line = "「でも、倒したらまた、瘴気の姿になって誰かの体に乗り移ろうとするんじゃ……！？」"

[[dialogue]]
speaker = "アニマ"
# 「いいや、もう逃げられナイ。リクリエの瘴気を１つにまとめ、実体化させる──」
line = "「いいや、もう逃げられナイ。リクリエの瘴気を１つにまとめ、実体化させる──」"

[[dialogue]]
speaker = "アニマ"
# 「先程使ったワクチンボムは、そういう星術ダ」
line = "「先程使ったワクチンボムは、そういう星術ダ」"

[[dialogue]]
speaker = "アニマ"
# 「マグたんとアルモたんは戦えそうカナ？」
line = "「マグたんとアルモたんは戦えそうカナ？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい、大丈夫です！」
line = "「はい、大丈夫です！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんもいけるのだ！」
line = "「アルモたんもいけるのだ！」"

[[dialogue]]
speaker = "アニマ"
# 「ならば――全員揃って、世界を救う実験を始めヨウ！」
line = "「ならば――全員揃って、世界を救う実験を始めヨウ！」"

[[dialogue]]
speaker = "unk"
# パチンッと再びアニマ先輩が指を鳴らすと、周囲の結界がひび割れ、一斉に砕けて――
line = "パチンッと再びアニマ先輩が指を鳴らすと、周囲の結界がひび割れ、一斉に砕けて――"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「え……！？」
line = "「え……！？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「これは……！？」
line = "「これは……！？」"

[[dialogue]]
speaker = "unk"
# そこには、鬼ごっこに参加していた流星学園附属校１年Ｃ組のクラスメイト達が、戦闘服姿で揃っていた。
line = "そこには、鬼ごっこに参加していた流星学園附属校１年Ｃ組のクラスメイト達が、戦闘服姿で揃っていた。"

[[dialogue]]
speaker = "附属校女子Ａ"
# 「アルモたん、ママダレナ！　ナミエルちゃんも、無事だった！？」
line = "「アルモたん、ママダレナ！　ナミエルちゃんも、無事だった！？」"

[[dialogue]]
speaker = "附属校男子Ｂ"
# 「会長に、セッシ―も！　準備して待ってたぜ！」
line = "「会長に、セッシ―も！　準備して待ってたぜ！」"

[[dialogue]]
speaker = "附属校男子Ｃ"
# 「そいつがアニマ先輩の言ってたモンスターか！」
line = "「そいつがアニマ先輩の言ってたモンスターか！」"

[[dialogue]]
speaker = "附属校女子Ｄ"
# 「加勢するよ！　私たちだって、スターナイツの卵なんだから！」
line = "「加勢するよ！　私たちだって、スターナイツの卵なんだから！」"

[[dialogue]]
speaker = "ナミエル"
# 「みんな……！　いつの間に……！？」
line = "「みんな……！　いつの間に……！？」"

[[dialogue]]
speaker = "バグキメラ"
# 「……！？」
line = "「……！？」"

[[dialogue]]
speaker = "unk"
# 大勢に周囲を取り囲まれたモンスターが、気圧されて一歩後ずさる。
line = "大勢に周囲を取り囲まれたモンスターが、気圧されて一歩後ずさる。"

[[dialogue]]
speaker = "アニマ"
# 「――残念ながらアニマは、星騎士としては天才ではナイ」
line = "「――残念ながらアニマは、星騎士としては天才ではナイ」"

[[dialogue]]
speaker = "アニマ"
# 「いま目の前にいるモンスターに真正面から立ち向かえば、アニマはまず勝てないダロウ」
line = "「いま目の前にいるモンスターに真正面から立ち向かえば、アニマはまず勝てないダロウ」"

[[dialogue]]
speaker = "アニマ"
# 「だから、アニマは事前に、入念に準備するんダ。天才でなくとも、リクリエから世界を救えるように」
line = "「だから、アニマは事前に、入念に準備するんダ。天才でなくとも、リクリエから世界を救えるように」"

[[dialogue]]
speaker = "アニマ"
# 「錬金術師として切り札を生み出し、勝ち筋を作り出す――」
line = "「錬金術師として切り札を生み出し、勝ち筋を作り出す――」"

[[dialogue]]
speaker = "アニマ"
# 「それこそが、星騎士アニマの戦いダ」
line = "「それこそが、星騎士アニマの戦いダ」"

[[dialogue]]
speaker = "ナミエル"
# （すごい……これが……）
line = "（すごい……これが……）"

[[dialogue]]
speaker = "ナミエル"
# （新星学園が誇る、不可能を可能にする天才。対リクリエの切り札とも評される、『救世の錬金術師』……！）
line = "（新星学園が誇る、不可能を可能にする天才。対リクリエの切り札とも評される、『救世の錬金術師』……！）"

[[dialogue]]
speaker = "アニマ"
# 「状況は作った。あとの指揮は任せるヨ、会長！」
line = "「状況は作った。あとの指揮は任せるヨ、会長！」"

[[dialogue]]
speaker = "unk"
# よし！　みんな、やるぞ！！！
line = "よし！　みんな、やるぞ！！！"

[[dialogue]]
speaker = "クラスメイト達"
# 「おーっ！！！」
line = "「おーっ！！！」"

[[dialogue]]
speaker = "unk"
# かけ声と共に、モンスターとの決戦が始まるのだった――
line = "かけ声と共に、モンスターとの決戦が始まるのだった――"
