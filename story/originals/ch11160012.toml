[[dialogue]]
speaker = "unk"
# 第２話,バカっていうやつがバカなんだぞ！,P
line = "第２話,バカっていうやつがバカなんだぞ！,P"

[[dialogue]]
speaker = "unk"
# メテオラとエンジュが流星市国を訪れる前。出会ったばかりの頃の出来事。
line = "メテオラとエンジュが流星市国を訪れる前。出会ったばかりの頃の出来事。"

[[dialogue]]
speaker = "メテオラ"
# 「おりゃー、ぼんぼんグレネードっ！」
line = "「おりゃー、ぼんぼんグレネードっ！」"

[[dialogue]]
speaker = "エンジュ"
# 「甘いっ！　ヴェンジフル・エクリプス！」
line = "「甘いっ！　ヴェンジフル・エクリプス！」"

[[dialogue]]
speaker = "メテオラ"
# 「ふふーん、そのくらいじゃ、あたしはやられないぞっ！　どっかんミサーイルッ！」
line = "「ふふーん、そのくらいじゃ、あたしはやられないぞっ！　どっかんミサーイルッ！」"

[[dialogue]]
speaker = "エンジュ"
# 「ふう……やるじゃないか。メテオラっていったか」
line = "「ふう……やるじゃないか。メテオラっていったか」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュもなかなかやるなー！　あたしが思いっきりやっても壊れないやつは、あんましいないぞ！」
line = "「エンジュもなかなかやるなー！　あたしが思いっきりやっても壊れないやつは、あんましいないぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「お前の強さは認めるよ、認めるけどな……ぼんぼんとかどっかんとか……」
line = "「お前の強さは認めるよ、認めるけどな……ぼんぼんとかどっかんとか……」"

[[dialogue]]
speaker = "エンジュ"
# 「メテオラの技の名前……いくらなんでもバカっぽくないか？」
line = "「メテオラの技の名前……いくらなんでもバカっぽくないか？」"

[[dialogue]]
speaker = "メテオラ"
# 「えぇーっ！？　あたし、バカなのかー！？」
line = "「えぇーっ！？　あたし、バカなのかー！？」"

[[dialogue]]
speaker = "エンジュ"
# 「えっ、まあ……どちらかといえば……」
line = "「えっ、まあ……どちらかといえば……」"

[[dialogue]]
speaker = "メテオラ"
# 「ショックだぞ！？　バカなんて初めて言われたぞ！」
line = "「ショックだぞ！？　バカなんて初めて言われたぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「……初めてか。みんな優しいんだな」
line = "「……初めてか。みんな優しいんだな」"

[[dialogue]]
speaker = "メテオラ"
# 「人にバカって言っちゃいけないんだぞ！　バカって言う方がバカなんだぞ！」
line = "「人にバカって言っちゃいけないんだぞ！　バカって言う方がバカなんだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「誰がバカだ！　それなら今バカって言ったメテオラもバカだろ！」
line = "「誰がバカだ！　それなら今バカって言ったメテオラもバカだろ！」"

[[dialogue]]
speaker = "メテオラ"
# 「ホントだ！　バカになっちゃったぞ！？　あたしはおバカだったのかー……」
line = "「ホントだ！　バカになっちゃったぞ！？　あたしはおバカだったのかー……」"

[[dialogue]]
speaker = "エンジュ"
# 「えっ、本気でショック受けてる……？　ごめん、メテオラ……」
line = "「えっ、本気でショック受けてる……？　ごめん、メテオラ……」"

[[dialogue]]
speaker = "エンジュ"
# （もしかして、あたし、言っちゃいけないことを言っちゃったのか……？　正直、みんな思っていても指摘しなかっただけだと思うが……）
line = "（もしかして、あたし、言っちゃいけないことを言っちゃったのか……？　正直、みんな思っていても指摘しなかっただけだと思うが……）"

[[dialogue]]
speaker = "エンジュ"
# 「あー……こほん。つまり、あたしが言いたいのはな。今のままじゃ、メテオラは星騎士たちにバカだと思われそうということだ」
line = "「あー……こほん。つまり、あたしが言いたいのはな。今のままじゃ、メテオラは星騎士たちにバカだと思われそうということだ」"

[[dialogue]]
speaker = "メテオラ"
# 「なんだとー！　星騎士め！　許さないぞ！」
line = "「なんだとー！　星騎士め！　許さないぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「よし、その意気だ。賢そうな名前をつけて、星騎士たちを見返してやろう」
line = "「よし、その意気だ。賢そうな名前をつけて、星騎士たちを見返してやろう」"

[[dialogue]]
speaker = "メテオラ"
# 「おー！　頭のいい名前つけるぞー！」
line = "「おー！　頭のいい名前つけるぞー！」"

[[dialogue]]
speaker = "エンジュ"
# 「──よし、いくつか考えてみた。なかなかの自信作だ。読んでみろ」
line = "「──よし、いくつか考えてみた。なかなかの自信作だ。読んでみろ」"

[[dialogue]]
speaker = "メテオラ"
# 「おーっ！　えーっと……とーむなえ・ばずめーじぇ……？　くらーめしゅ……な・かたふとろーは……？　なんだ、これー？」
line = "「おーっ！　えーっと……とーむなえ・ばずめーじぇ……？　くらーめしゅ……な・かたふとろーは……？　なんだ、これー？」"

[[dialogue]]
speaker = "エンジュ"
# 「格好いいだろ！　溢れる知性で星騎士たちも恐れおののくに違いない」
line = "「格好いいだろ！　溢れる知性で星騎士たちも恐れおののくに違いない」"

[[dialogue]]
speaker = "メテオラ"
# 「……難しすぎだぞ。舌噛みそう……あたしのミサイルも困って、ヘロヘロだぞ……」
line = "「……難しすぎだぞ。舌噛みそう……あたしのミサイルも困って、ヘロヘロだぞ……」"

[[dialogue]]
speaker = "エンジュ"
# 「慣れだ、慣れ。格好いい技名と決めポーズとともに放つ、逃げ場のないほどの多数のミサイル……うんうん、映えるじゃないか」
line = "「慣れだ、慣れ。格好いい技名と決めポーズとともに放つ、逃げ場のないほどの多数のミサイル……うんうん、映えるじゃないか」"

[[dialogue]]
speaker = "メテオラ"
# 「あー、あたし、知ってる。こういうのチューニビョーって言うんだぞ！」
line = "「あー、あたし、知ってる。こういうのチューニビョーって言うんだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「チュ……誰が厨二病だ！？　どうしてそんな言葉は知っている！　あたしは拗らせてなんか、ない！」
line = "「チュ……誰が厨二病だ！？　どうしてそんな言葉は知っている！　あたしは拗らせてなんか、ない！」"

[[dialogue]]
speaker = "メテオラ"
# 「わけわかんないのより、どっかんミサイルの方がカッコいいぞ！」
line = "「わけわかんないのより、どっかんミサイルの方がカッコいいぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「あたしの方が格好いい！　バカにされちゃえばいいんだ、バカメテオラ！　バーカバーカ！」
line = "「あたしの方が格好いい！　バカにされちゃえばいいんだ、バカメテオラ！　バーカバーカ！」"

[[dialogue]]
speaker = "メテオラ"
# 「またバカってゆったなー！？　エンジュのバーカバーカ！　バカエンジュ！　イーーーッだ！　もうお喋りしてあげない！」
line = "「またバカってゆったなー！？　エンジュのバーカバーカ！　バカエンジュ！　イーーーッだ！　もうお喋りしてあげない！」"

[[dialogue]]
speaker = "エンジュ"
# 「さすがにちょっと言い過ぎたよな……っていうか、あたし、厨二病なんかじゃないよな……？」
line = "「さすがにちょっと言い過ぎたよな……っていうか、あたし、厨二病なんかじゃないよな……？」"

[[dialogue]]
speaker = "メテオラ"
# 「おー、エンジュ、どうしたんだー？　元気ないぞ」
line = "「おー、エンジュ、どうしたんだー？　元気ないぞ」"

[[dialogue]]
speaker = "エンジュ"
# 「メ、メテオラ……！？　お前、あたしに話しかけないんじゃなかったのか……？」
line = "「メ、メテオラ……！？　お前、あたしに話しかけないんじゃなかったのか……？」"

[[dialogue]]
speaker = "メテオラ"
# 「なんでだー？　エンジュとお喋りしないと寂しいぞ。エンジュはあたしのこと、嫌いになっちゃったのかー？」
line = "「なんでだー？　エンジュとお喋りしないと寂しいぞ。エンジュはあたしのこと、嫌いになっちゃったのかー？」"

[[dialogue]]
speaker = "エンジュ"
# 「あたしたち、さっきケンカしてただろ……」
line = "「あたしたち、さっきケンカしてただろ……」"

[[dialogue]]
speaker = "メテオラ"
# 「そーだったかー？　もう忘れた！　細かいことはどーでもいーからな！　あははは！」
line = "「そーだったかー？　もう忘れた！　細かいことはどーでもいーからな！　あははは！」"

[[dialogue]]
speaker = "エンジュ"
# 「ぷっ……！　なんだ、それ……あたしは気にしてたのに……細かいことで悩んでた自分がバカみたいじゃないか」
line = "「ぷっ……！　なんだ、それ……あたしは気にしてたのに……細かいことで悩んでた自分がバカみたいじゃないか」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュはバカじゃないぞ？」
line = "「エンジュはバカじゃないぞ？」"

[[dialogue]]
speaker = "エンジュ"
# 「……わかってるよ。メテオラ、お前もバカなんかじゃない。あたしが悪かった」
line = "「……わかってるよ。メテオラ、お前もバカなんかじゃない。あたしが悪かった」"

[[dialogue]]
speaker = "メテオラ"
# 「おー？　なんで謝った？　悪いことしたのか？」
line = "「おー？　なんで謝った？　悪いことしたのか？」"

[[dialogue]]
speaker = "unk"
# 結局メテオラの技は、彼女のフィーリングによって現在のものに至ったのだった。
line = "結局メテオラの技は、彼女のフィーリングによって現在のものに至ったのだった。"
