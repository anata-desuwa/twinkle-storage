[[dialogue]]
speaker = "unk"
# 第２話,突然の同居生活,P
line = "第２話,突然の同居生活,P"

[[dialogue]]
speaker = "unk"
# ある年の瀬の日。トイレの電球が切れたため、近くのコンビニに行ってきた。
line = "ある年の瀬の日。トイレの電球が切れたため、近くのコンビニに行ってきた。"

[[dialogue]]
speaker = "unk"
# 電球のついでにいくつか買い物をして、見慣れた道を戻り、同じく見慣れた家へと帰ってくる。
line = "電球のついでにいくつか買い物をして、見慣れた道を戻り、同じく見慣れた家へと帰ってくる。"

[[dialogue]]
speaker = "フィオナ"
# 「お帰りなさい、あなた」
line = "「お帰りなさい、あなた」"

[[dialogue]]
speaker = "フィオナ"
# 「電球、ありました？　……ならよかったです。今、温かいお茶を淹れますね」
line = "「電球、ありました？　……ならよかったです。今、温かいお茶を淹れますね」"

[[dialogue]]
speaker = "unk"
# ドアを開けるとフィオナが出迎えてくれる。どうして彼女がここにいるのかというと……
line = "ドアを開けるとフィオナが出迎えてくれる。どうして彼女がここにいるのかというと……"

[[dialogue]]
speaker = "フィオナ"
# 「こんにちは、緋宮会長。今日からしばらくの間、お世話になります」
line = "「こんにちは、緋宮会長。今日からしばらくの間、お世話になります」"

[[dialogue]]
speaker = "unk"
# こ、こんにちは……？
line = "こ、こんにちは……？"

[[dialogue]]
speaker = "リノ"
# 「いらっしゃ～い！　せまい家だけど自分の家だと思ってくつろいでってね」
line = "「いらっしゃ～い！　せまい家だけど自分の家だと思ってくつろいでってね」"

[[dialogue]]
speaker = "リノ"
# 「フィオナちゃん家、配管トラブルで改装中なんだって。だから冬休み中はうちで預かることにしたわ。教皇庁も大変ね」
line = "「フィオナちゃん家、配管トラブルで改装中なんだって。だから冬休み中はうちで預かることにしたわ。教皇庁も大変ね」"

[[dialogue]]
speaker = "フィオナ"
# 「無理を言ってしまってすみません。本当に助かりました。ありがとうございます」
line = "「無理を言ってしまってすみません。本当に助かりました。ありがとうございます」"

[[dialogue]]
speaker = "リノ"
# 「いいのよ～。むしろ来てくれて嬉しいわ～」
line = "「いいのよ～。むしろ来てくれて嬉しいわ～」"

[[dialogue]]
speaker = "リノ"
# 「あ、ごめん。ちょっと電話出るわね……はい、緋宮です。あ、セドナ？　どうしたの、あなたから連絡なんて珍し……観測データに異常？　分かった、私も行くわ」
line = "「あ、ごめん。ちょっと電話出るわね……はい、緋宮です。あ、セドナ？　どうしたの、あなたから連絡なんて珍し……観測データに異常？　分かった、私も行くわ」"

[[dialogue]]
speaker = "リノ"
# 「というわけでごめんなさいね。急な出張が入っちゃった。しばらく家を空けるけど、２人なら大丈夫よね？」
line = "「というわけでごめんなさいね。急な出張が入っちゃった。しばらく家を空けるけど、２人なら大丈夫よね？」"

[[dialogue]]
speaker = "フィオナ"
# 「え、あ、はい」
line = "「え、あ、はい」"

[[dialogue]]
speaker = "リノ"
# 「なるべくゆっくり帰ってくるから安心して。あ、でも、２人きりだからってハメを外しすぎちゃダメだからね？　じゃ、行ってきま～す」
line = "「なるべくゆっくり帰ってくるから安心して。あ、でも、２人きりだからってハメを外しすぎちゃダメだからね？　じゃ、行ってきま～す」"

[[dialogue]]
speaker = "unk"
# 行ってらっしゃい……
line = "行ってらっしゃい……"

[[dialogue]]
speaker = "フィオナ"
# 「ど、どうしましょう……２人きりになってしまいました」
line = "「ど、どうしましょう……２人きりになってしまいました」"

[[dialogue]]
speaker = "unk"
# 本当に新婚さんみたいになっちゃった
line = "本当に新婚さんみたいになっちゃった"

[[dialogue]]
speaker = "フィオナ"
# 「し、新婚！？　そんな梨緒さんみたいなこと言って……でも確かにそうですね」
line = "「し、新婚！？　そんな梨緒さんみたいなこと言って……でも確かにそうですね」"

[[dialogue]]
speaker = "フィオナ"
# 「ならいっそ、やってみましょうか、新婚生活。……ね、あなた？」
line = "「ならいっそ、やってみましょうか、新婚生活。……ね、あなた？」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、電球と一緒に流星ライダーグミも買ってきてくれたんですね。ありがとうございます！」
line = "「あ、電球と一緒に流星ライダーグミも買ってきてくれたんですね。ありがとうございます！」"

[[dialogue]]
speaker = "フィオナ"
# 「今期バージョンのグミはなかなか手に入らなくて……すごく嬉しいです。ん～、ジューシー！」
line = "「今期バージョンのグミはなかなか手に入らなくて……すごく嬉しいです。ん～、ジューシー！」"

[[dialogue]]
speaker = "フィオナ"
# 「さっそく姉さんに自慢します。……見て見て、旦那さんが買ってきてくれたよ、と」
line = "「さっそく姉さんに自慢します。……見て見て、旦那さんが買ってきてくれたよ、と」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、悔しがってる悔しがってる」
line = "「ふふ、悔しがってる悔しがってる」"

[[dialogue]]
speaker = "unk"
# 待って、俺のこと旦那さんって！？
line = "待って、俺のこと旦那さんって！？"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、梨緒さんのことがあってから、たまにですけど、姉さんとの間ではそう呼んでます」
line = "「ええ、梨緒さんのことがあってから、たまにですけど、姉さんとの間ではそう呼んでます」"

[[dialogue]]
speaker = "フィオナ"
# 「えっと、イヤでしたら控えますけど……イヤじゃない？　ふふ、ありがとうございます」
line = "「えっと、イヤでしたら控えますけど……イヤじゃない？　ふふ、ありがとうございます」"

[[dialogue]]
speaker = "unk"
# 俺とフィオナは夕食後、一緒に年末番組を観ていた。
line = "俺とフィオナは夕食後、一緒に年末番組を観ていた。"

[[dialogue]]
speaker = "unk"
# ○×クイズで選んだ選択肢に飛び込み、間違えれば粉だらけになってしまう、定番のやつだ。
line = "○×クイズで選んだ選択肢に飛び込み、間違えれば粉だらけになってしまう、定番のやつだ。"

[[dialogue]]
speaker = "フィオナ"
# 「バラエティってあんまり見てきませんでしたけど、こんな感じなんですね」
line = "「バラエティってあんまり見てきませんでしたけど、こんな感じなんですね」"

[[dialogue]]
speaker = "フィオナ"
# 「え、セット組みのアルバイトに参加したことあるんですか！？　なるほど、この巨大なセットも人の手で作られてるんですね。当たり前といえば当たり前ですけど、すごいです」
line = "「え、セット組みのアルバイトに参加したことあるんですか！？　なるほど、この巨大なセットも人の手で作られてるんですね。当たり前といえば当たり前ですけど、すごいです」"

[[dialogue]]
speaker = "フィオナ"
# 「次のクイズジャンルは……サブカルですね。『流星ライダー初の女性変身者は５作目で登場した。○か×か』ですか」
line = "「次のクイズジャンルは……サブカルですね。『流星ライダー初の女性変身者は５作目で登場した。○か×か』ですか」"

[[dialogue]]
speaker = "unk"
# （フィオナの距離が近い……）
line = "（フィオナの距離が近い……）"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど、難しい問題ですね。世間でもそう言われているようですが、実は女性変身者は４作目のスピンオフ劇場版で登場しているんです」
line = "「なるほど、難しい問題ですね。世間でもそう言われているようですが、実は女性変身者は４作目のスピンオフ劇場版で登場しているんです」"

[[dialogue]]
speaker = "フィオナ"
# 「そしてその放映日は５作目の女性の変身の１週間前……つまり、答えは×です！」
line = "「そしてその放映日は５作目の女性の変身の１週間前……つまり、答えは×です！」"

[[dialogue]]
speaker = "フィオナ"
# 「ほら、やっぱり！　ふふ、回答者さん、粉まみれになっちゃいましたね。芸人としてはその方が美味しいのかもしれませんけど」
line = "「ほら、やっぱり！　ふふ、回答者さん、粉まみれになっちゃいましたね。芸人としてはその方が美味しいのかもしれませんけど」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、すみません、盛り上がりすぎましたね……いつの間にか密着してしまって」
line = "「あ、すみません、盛り上がりすぎましたね……いつの間にか密着してしまって」"

[[dialogue]]
speaker = "フィオナ"
# 「２人きりなんだから、もっと盛り上がろう……？　ふふ、ならとっておきを用意してるんです」
line = "「２人きりなんだから、もっと盛り上がろう……？　ふふ、ならとっておきを用意してるんです」"

[[dialogue]]
speaker = "フィオナ"
# 「……覚悟、してくださいね」
line = "「……覚悟、してくださいね」"

[[dialogue]]
speaker = "フィオナ"
# 「ふぅ……流星ライダーセレクション一気見はちょっとやり過ぎでしたかね。いつもならとっくに寝ている時間です」
line = "「ふぅ……流星ライダーセレクション一気見はちょっとやり過ぎでしたかね。いつもならとっくに寝ている時間です」"

[[dialogue]]
speaker = "フィオナ"
# 「……さすがに、そろそろ寝ましょうか」
line = "「……さすがに、そろそろ寝ましょうか」"

[[dialogue]]
speaker = "フィオナ"
# 「今日はすごく楽しかったです。なんだか眠るのがもったいないくらい」
line = "「今日はすごく楽しかったです。なんだか眠るのがもったいないくらい」"

[[dialogue]]
speaker = "フィオナ"
# 「……明日も、明後日も一緒？　ふふ、そうでした。一緒に暮らしてるんですもんね」
line = "「……明日も、明後日も一緒？　ふふ、そうでした。一緒に暮らしてるんですもんね」"

[[dialogue]]
speaker = "フィオナ"
# 「おやすみのキスをください。明日、起きたらおはようのキスをしましょう」
line = "「おやすみのキスをください。明日、起きたらおはようのキスをしましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「……ちゅっ<emoji=heart04>」
line = "「……ちゅっ<emoji=heart04>」"
