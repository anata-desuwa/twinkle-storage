[[dialogue]]
speaker = "水着フワッチ"
# 「イ～……」
line = "「イ～……」"

[[dialogue]]
speaker = "梨緒"
# 「ふぅ。ナターシャの推測は当たっていたようだな。モンスターを倒せば倒すほど、体が軽くなっていく」
line = "「ふぅ。ナターシャの推測は当たっていたようだな。モンスターを倒せば倒すほど、体が軽くなっていく」"

[[dialogue]]
speaker = "ベアトリス"
# 「水着フォームにも慣れてきたね。段階を踏んで力を使いこなすのも、修行としてはいいかも」
line = "「水着フォームにも慣れてきたね。段階を踏んで力を使いこなすのも、修行としてはいいかも」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは最初から全力全開で戦える方が好みだけどな！　ちまちまモンスターを倒すのにも飽きてきたぜ～」
line = "「あたしは最初から全力全開で戦える方が好みだけどな！　ちまちまモンスターを倒すのにも飽きてきたぜ～」"

[[dialogue]]
speaker = "ナターシャ"
# 「そろそろ休憩を入れてもいいんじゃない？　周辺のモンスターも狩り尽くしちゃったみたいだし」
line = "「そろそろ休憩を入れてもいいんじゃない？　周辺のモンスターも狩り尽くしちゃったみたいだし」"

[[dialogue]]
speaker = "梨緒"
# 「そうだな。ある程度レベルも上がったようだし、せっかくのリゾートを満喫するのも──」
line = "「そうだな。ある程度レベルも上がったようだし、せっかくのリゾートを満喫するのも──」"

[[dialogue]]
speaker = "アポロ"
# 「いいのかっ？　なら、ざっぱーんっ！！」
line = "「いいのかっ？　なら、ざっぱーんっ！！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ふふ、よっぽど遊びたかったみたいだね」
line = "「ふふ、よっぽど遊びたかったみたいだね」"

[[dialogue]]
speaker = "梨緒"
# 「あんまり１人で遠くに泳いでいくんじゃないぞー！」
line = "「あんまり１人で遠くに泳いでいくんじゃないぞー！」"

[[dialogue]]
speaker = "ベアトリス"
# 「いいなぁ、気持ち良さそうだなー……」
line = "「いいなぁ、気持ち良さそうだなー……」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトは泳げないのか？　そう言えば吸血鬼は流れる水を渡れないとか、水に沈むとか聞いたことがあるが……」
line = "「ベアトは泳げないのか？　そう言えば吸血鬼は流れる水を渡れないとか、水に沈むとか聞いたことがあるが……」"

[[dialogue]]
speaker = "ベアトリス"
# 「自分でもわかんない。こんな大きな水たまりに入ったことないし……」
line = "「自分でもわかんない。こんな大きな水たまりに入ったことないし……」"

[[dialogue]]
speaker = "ナターシャ"
# 「不安なら海の家から浮き輪でも持ってくる？　探せばあると思うけど」
line = "「不安なら海の家から浮き輪でも持ってくる？　探せばあると思うけど」"

[[dialogue]]
speaker = "ベアトリス"
# 「うーん。できれば自分で泳ぎたいなぁ。アポロちゃんがあんなに楽しそうに泳いでるところを見てると……」
line = "「うーん。できれば自分で泳ぎたいなぁ。アポロちゃんがあんなに楽しそうに泳いでるところを見てると……」"

[[dialogue]]
speaker = "アポロ"
# 「何してるんだーっ？　みんなも早く泳ごーぜっ！」
line = "「何してるんだーっ？　みんなも早く泳ごーぜっ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううっ、やっぱり自分で泳ぎたいっ」
line = "「ううっ、やっぱり自分で泳ぎたいっ」"

[[dialogue]]
speaker = "梨緒"
# 「なら泳ごう、ベアト」
line = "「なら泳ごう、ベアト」"

[[dialogue]]
speaker = "梨緒"
# 「もし沈んでも私たちが何とかする。大丈夫だ」
line = "「もし沈んでも私たちが何とかする。大丈夫だ」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "ベアトリス"
# 「うんっ！　ありがとうっ──！！」
line = "「うんっ！　ありがとうっ──！！」"

[[dialogue]]
speaker = "梨緒"
# 「な──！？　いきなり海の真ん中にダイブしろとは……！？」
line = "「な──！？　いきなり海の真ん中にダイブしろとは……！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "梨緒"
# 「ベ、ベアト……？」
line = "「ベ、ベアト……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「浮かんでこないね……」
line = "「浮かんでこないね……」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトーーっっ！！！？」
line = "「ベアトーーっっ！！！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ぷっはぁっ！！　あははっ、きっもちいい～っ！！　良かったぁ、泳げるみたいっ！！」
line = "「ぷっはぁっ！！　あははっ、きっもちいい～っ！！　良かったぁ、泳げるみたいっ！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「って、どうしたの、梨緒ちゃん？　口をそんなに大きく開けて」
line = "「って、どうしたの、梨緒ちゃん？　口をそんなに大きく開けて」"

[[dialogue]]
speaker = "梨緒"
# 「……はぁ。飛び込むなら先に言ってくれ。溺れたのかと思って助けに行くところだったぞ」
line = "「……はぁ。飛び込むなら先に言ってくれ。溺れたのかと思って助けに行くところだったぞ」"

[[dialogue]]
speaker = "ベアトリス"
# 「あはは、ごめんごめん」
line = "「あはは、ごめんごめん」"

[[dialogue]]
speaker = "アポロ"
# 「梨緒とナターシャも早く来いよー！　じゃねーと、あたしとベアトで海を独占しちまうぜっ！」
line = "「梨緒とナターシャも早く来いよー！　じゃねーと、あたしとベアトで海を独占しちまうぜっ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「それは困るね。じゃあ私たちも馳せ参じるとしよっか♪」
line = "「それは困るね。じゃあ私たちも馳せ参じるとしよっか♪」"

[[dialogue]]
speaker = "梨緒"
# 「わっ、ちょっと押すんじゃないっ！」
line = "「わっ、ちょっと押すんじゃないっ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「きゃっ」
line = "「きゃっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「ぷはっ。大丈夫、梨緒ちゃん？」
line = "「ぷはっ。大丈夫、梨緒ちゃん？」"

[[dialogue]]
speaker = "梨緒"
# 「あ、ああ。すまない。受け止めるつもりが、逆に受け止められてしまったな」
line = "「あ、ああ。すまない。受け止めるつもりが、逆に受け止められてしまったな」"

[[dialogue]]
speaker = "ベアトリス"
# 「ふふ、仕方ないよ。飛びこんできたの、梨緒ちゃんの方だったし」
line = "「ふふ、仕方ないよ。飛びこんできたの、梨緒ちゃんの方だったし」"

[[dialogue]]
speaker = "ベアトリス"
# 「それに私、嬉しかったよ？　もし沈んでも何とかするって梨緒ちゃんが言ってくれて」
line = "「それに私、嬉しかったよ？　もし沈んでも何とかするって梨緒ちゃんが言ってくれて」"

[[dialogue]]
speaker = "ベアトリス"
# 「あの言葉のおかげで私、勇気を出して飛びこめたんだから」
line = "「あの言葉のおかげで私、勇気を出して飛びこめたんだから」"

[[dialogue]]
speaker = "梨緒"
# 「ベアト……」
line = "「ベアト……」"

[[dialogue]]
speaker = "ベアトリス"
# 「この新モード、必ずクリアしようね？　梨緒ちゃんが……ううん、選管のみんなが一緒ならできる気がするんだ」
line = "「この新モード、必ずクリアしようね？　梨緒ちゃんが……ううん、選管のみんなが一緒ならできる気がするんだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「みんなと一緒ならいくらでも勇気が出てくるもん。力がどんどん湧いてくるから」
line = "「みんなと一緒ならいくらでも勇気が出てくるもん。力がどんどん湧いてくるから」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、そうだな。必ずクリアしよう！」
line = "「ああ、そうだな。必ずクリアしよう！」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも、今は──」
line = "「でも、今は──」"

[[dialogue]]
speaker = "アポロ"
# 「おーい、２人とも～！　抱き合ってないで遊ぼうぜ～！　それ、ナターシャ、あっちあっち～！」
line = "「おーい、２人とも～！　抱き合ってないで遊ぼうぜ～！　それ、ナターシャ、あっちあっち～！」"

[[dialogue]]
speaker = "ナターシャ"
# 「ちょっ、アポロ、私の胸は浮き輪じゃないよっ」
line = "「ちょっ、アポロ、私の胸は浮き輪じゃないよっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「みんなでリゾートも満喫したいな♪　私、ビーチで遊ぶの楽しみにしてたんだから♪」
line = "「みんなでリゾートも満喫したいな♪　私、ビーチで遊ぶの楽しみにしてたんだから♪」"

[[dialogue]]
speaker = "梨緒"
# 「ふふ、もちろんだ。みんなで思いっきり遊び尽くそう！」
line = "「ふふ、もちろんだ。みんなで思いっきり遊び尽くそう！」"
