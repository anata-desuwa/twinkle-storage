[[dialogue]]
speaker = "unk"
# 第４話,プランニングビギナー,P
line = "第４話,プランニングビギナー,P"

[[dialogue]]
speaker = "ミウ"
# 「う～ん、どうしよう……」
line = "「う～ん、どうしよう……」"

[[dialogue]]
speaker = "ミウ"
# 「あっ、会長さん。そろそろ定期試験の時期じゃないですか」
line = "「あっ、会長さん。そろそろ定期試験の時期じゃないですか」"

[[dialogue]]
speaker = "ミウ"
# 「ゴールデングースの活動に入れこんじゃったんで、今回はちょっと心配なんです」
line = "「ゴールデングースの活動に入れこんじゃったんで、今回はちょっと心配なんです」"

[[dialogue]]
speaker = "ミウ"
# 「なので、頼れる先輩に勉強を教えてもらえたらなーって思うんですけど……チラッ、チラッ」
line = "「なので、頼れる先輩に勉強を教えてもらえたらなーって思うんですけど……チラッ、チラッ」"

[[dialogue]]
speaker = "unk"
# ……俺で良かったら、教えようか？
line = "……俺で良かったら、教えようか？"

[[dialogue]]
speaker = "ミウ"
# 「いいんですか！？　ありがとうございます！」
line = "「いいんですか！？　ありがとうございます！」"

[[dialogue]]
speaker = "unk"
# こうして俺は、テストまでの間、ミウに勉強を教える特別講師となった。
line = "こうして俺は、テストまでの間、ミウに勉強を教える特別講師となった。"

[[dialogue]]
speaker = "ミウ"
# 「ああ……それでこっちの三角形とこっちの三角形が同じになって……なるほど、解けました！」
line = "「ああ……それでこっちの三角形とこっちの三角形が同じになって……なるほど、解けました！」"

[[dialogue]]
speaker = "ミウ"
# 「お稽古の時も思いましたけど、会長さんって人に教えるの、すごく上手ですよね。先生になれるんじゃないですか？」
line = "「お稽古の時も思いましたけど、会長さんって人に教えるの、すごく上手ですよね。先生になれるんじゃないですか？」"

[[dialogue]]
speaker = "ミウ"
# 「お散歩の時に助けてもらったのといい、お稽古といい、会長さんには甘えっぱなしです。いつもありがとうございます」
line = "「お散歩の時に助けてもらったのといい、お稽古といい、会長さんには甘えっぱなしです。いつもありがとうございます」"

[[dialogue]]
speaker = "unk"
# 可愛い後輩のためなら、どうってことないよ
line = "可愛い後輩のためなら、どうってことないよ"

[[dialogue]]
speaker = "ミウ"
# 「『可愛い後輩』……ですか。『可愛い』って言われるのは嬉しいですけど、枕詞みたいですよね……」
line = "「『可愛い後輩』……ですか。『可愛い』って言われるのは嬉しいですけど、枕詞みたいですよね……」"

[[dialogue]]
speaker = "ミウ"
# 「数学の試験範囲は、ここまでです。これなら数学は無事に乗り切れそうです！」
line = "「数学の試験範囲は、ここまでです。これなら数学は無事に乗り切れそうです！」"

[[dialogue]]
speaker = "ミウ"
# 「え……？　俺が教えるまでもなかった……？」
line = "「え……？　俺が教えるまでもなかった……？」"

[[dialogue]]
speaker = "ミウ"
# 「い、いえ、まだ数学だけですから……！　他の教科も心配なので……！」
line = "「い、いえ、まだ数学だけですから……！　他の教科も心配なので……！」"

[[dialogue]]
speaker = "ミウ"
# 「会長さんの大切なお時間を奪っちゃうのは心苦しいんですけど……良かったらまた勉強に付き合ってもらえませんか？」
line = "「会長さんの大切なお時間を奪っちゃうのは心苦しいんですけど……良かったらまた勉強に付き合ってもらえませんか？」"

[[dialogue]]
speaker = "unk"
# それから数日。俺は空き時間を見ては、ミウの試験勉強を見てあげた。
line = "それから数日。俺は空き時間を見ては、ミウの試験勉強を見てあげた。"

[[dialogue]]
speaker = "unk"
# 教える度にめきめきと成果を出してくれる、実に教え甲斐のある生徒だった。
line = "教える度にめきめきと成果を出してくれる、実に教え甲斐のある生徒だった。"

[[dialogue]]
speaker = "unk"
# そして、試験前日の最終日。試験を模した小テスト。
line = "そして、試験前日の最終日。試験を模した小テスト。"

[[dialogue]]
speaker = "ミウ"
# 「ドキドキ……ど、どうですか……？」
line = "「ドキドキ……ど、どうですか……？」"

[[dialogue]]
speaker = "ミウ"
# 「１００点満点！？　やったぁっ……！　会長さんの教え方が上手だったおかげです。ありがとうございます！」
line = "「１００点満点！？　やったぁっ……！　会長さんの教え方が上手だったおかげです。ありがとうございます！」"

[[dialogue]]
speaker = "unk"
# ミウ自身の努力のおかげだよ
line = "ミウ自身の努力のおかげだよ"

[[dialogue]]
speaker = "ミウ"
# 「そ、そうでしょうか……そう言ってもらえると、嬉しいです……えへへ」
line = "「そ、そうでしょうか……そう言ってもらえると、嬉しいです……えへへ」"

[[dialogue]]
speaker = "ミウ"
# 「あの、会長さん……頭を撫でてくれませんか？　会長さんからパワーをもらえたら、本番も頑張れると思うんで！」
line = "「あの、会長さん……頭を撫でてくれませんか？　会長さんからパワーをもらえたら、本番も頑張れると思うんで！」"

[[dialogue]]
speaker = "unk"
# よくできました。よしよし
line = "よくできました。よしよし"

[[dialogue]]
speaker = "ミウ"
# 「はぅうぅぅん……♪　も、もっと、パワーを……なでなでしてください……」
line = "「はぅうぅぅん……♪　も、もっと、パワーを……なでなでしてください……」"

[[dialogue]]
speaker = "unk"
# よしよし、よしよし
line = "よしよし、よしよし"

[[dialogue]]
speaker = "ミウ"
# 「はぅ、はぅ、はぅうぅんっ……♪」
line = "「はぅ、はぅ、はぅうぅんっ……♪」"

[[dialogue]]
speaker = "unk"
# ……このくらいで大丈夫？
line = "……このくらいで大丈夫？"

[[dialogue]]
speaker = "ミウ"
# 「はっ……！？　おっ、お忙しい中、本当にありがとうございました。会長さんの教えを無駄にしないよう、頑張ってきます！」
line = "「はっ……！？　おっ、お忙しい中、本当にありがとうございました。会長さんの教えを無駄にしないよう、頑張ってきます！」"

[[dialogue]]
speaker = "ミウ"
# 「会長さんのことはセナリィ社長の次に尊敬しています。それは今も変わりません。でも……」
line = "「会長さんのことはセナリィ社長の次に尊敬しています。それは今も変わりません。でも……」"

[[dialogue]]
speaker = "ミウ"
# 「好きなのは、会長さんです」
line = "「好きなのは、会長さんです」"

[[dialogue]]
speaker = "ミウ"
# 「あっ！？　その、今の『好き』っていうのは、ひ、人としてですよ！？　恋愛感情とかそういうのではなくて！」
line = "「あっ！？　その、今の『好き』っていうのは、ひ、人としてですよ！？　恋愛感情とかそういうのではなくて！」"

[[dialogue]]
speaker = "unk"
# わかってる、嬉しいよ。ありがとう、ミウ
line = "わかってる、嬉しいよ。ありがとう、ミウ"

[[dialogue]]
speaker = "ミウ"
# 「わかられちゃダメなのに……」
line = "「わかられちゃダメなのに……」"

[[dialogue]]
speaker = "ミウ"
# 「あっ、いえ、な、なんでもないですっ！　そのー、しっ、失礼しまぁす！」
line = "「あっ、いえ、な、なんでもないですっ！　そのー、しっ、失礼しまぁす！」"

[[dialogue]]
speaker = "ミウ"
# 「はぁぁ……あっ、ヒマワリちゃん……」
line = "「はぁぁ……あっ、ヒマワリちゃん……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ミウ、どうしたのー、ため息なんてついちゃってさー。会長さんに勉強教わってたんでしょ？　上手くいった？」
line = "「ミウ、どうしたのー、ため息なんてついちゃってさー。会長さんに勉強教わってたんでしょ？　上手くいった？」"

[[dialogue]]
speaker = "ミウ"
# 「うーん……０点、かな」
line = "「うーん……０点、かな」"

[[dialogue]]
speaker = "ヒマワリ"
# 「えー！？　学年トップレベルのミウが！？」
line = "「えー！？　学年トップレベルのミウが！？」"

[[dialogue]]
speaker = "ミウ"
# 「会長さんに私の想い、ちっとも届かなかったみたいだから」
line = "「会長さんに私の想い、ちっとも届かなかったみたいだから」"

[[dialogue]]
speaker = "ヒマワリ"
# 「あー、そっちの話かー。会長さん、肝心なとこでニブチンっぽいもんねー」
line = "「あー、そっちの話かー。会長さん、肝心なとこでニブチンっぽいもんねー」"

[[dialogue]]
speaker = "ミウ"
# 「ううん、会長さんのせいじゃない。私の問題だよ」
line = "「ううん、会長さんのせいじゃない。私の問題だよ」"

[[dialogue]]
speaker = "ミウ"
# 「会長さんの前だと、いつもみたいに冷静ではいられなくなっちゃう……恋愛のプランニングはまだまだ初心者だね」
line = "「会長さんの前だと、いつもみたいに冷静ではいられなくなっちゃう……恋愛のプランニングはまだまだ初心者だね」"

[[dialogue]]
speaker = "unk"
# 翌日、おこなわれた定期試験。
line = "翌日、おこなわれた定期試験。"

[[dialogue]]
speaker = "unk"
# ミウはぶっちぎりの学年１位になったと聞いて、俺も嬉しく思ったのだった。
line = "ミウはぶっちぎりの学年１位になったと聞いて、俺も嬉しく思ったのだった。"
