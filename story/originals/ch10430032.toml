[[dialogue]]
speaker = "unk"
# 第２話,サチと妹同盟,P
line = "第２話,サチと妹同盟,P"

[[dialogue]]
speaker = "unk"
# ルルカやリコリンも戦闘訓練に参加する中、リバースフォームが暴走し、精神が反転してしまったサチ。
line = "ルルカやリコリンも戦闘訓練に参加する中、リバースフォームが暴走し、精神が反転してしまったサチ。"

[[dialogue]]
speaker = "unk"
# あれからしばらくして、熱が冷めるようにサチは元に戻ったのだが……。
line = "あれからしばらくして、熱が冷めるようにサチは元に戻ったのだが……。"

[[dialogue]]
speaker = "サチ"
# 「え、エッチに暴走してる私を見られてしまいましたぁぁぁ～～～っ！！！」
line = "「え、エッチに暴走してる私を見られてしまいましたぁぁぁ～～～っ！！！」"

[[dialogue]]
speaker = "サチ"
# 「は、恥ずかしくて死んでしまいそうです……っ！！」
line = "「は、恥ずかしくて死んでしまいそうです……っ！！」"

[[dialogue]]
speaker = "ルルカ"
# 「あははは……す、すごかったね……」
line = "「あははは……す、すごかったね……」"

[[dialogue]]
speaker = "unk"
# 大丈夫だ、落ち着いて
line = "大丈夫だ、落ち着いて"

[[dialogue]]
speaker = "unk"
# 俺はサチの頭を優しく撫でる。
line = "俺はサチの頭を優しく撫でる。"

[[dialogue]]
speaker = "サチ"
# 「うぅ……リバースフォームを使いこなそうとすること自体が、間違っているのでしょうか……？」
line = "「うぅ……リバースフォームを使いこなそうとすること自体が、間違っているのでしょうか……？」"

[[dialogue]]
speaker = "ルルカ"
# 「う～ん、それなら――」
line = "「う～ん、それなら――」"

[[dialogue]]
speaker = "ルルカ"
# 「サチちゃんがリバースフォームを使いこなせるように、あたしたちも協力するよ！」
line = "「サチちゃんがリバースフォームを使いこなせるように、あたしたちも協力するよ！」"

[[dialogue]]
speaker = "サチ"
# 「えっ……？　いいんですか……？」
line = "「えっ……？　いいんですか……？」"

[[dialogue]]
speaker = "ルルカ"
# 「もちろん♪　あたしたち『妹同盟』の仲で、友達でしょ？」
line = "「もちろん♪　あたしたち『妹同盟』の仲で、友達でしょ？」"

[[dialogue]]
speaker = "ルルカ"
# 「それに一応、あたしはサチちゃんの先輩でもあるしね♪」
line = "「それに一応、あたしはサチちゃんの先輩でもあるしね♪」"

[[dialogue]]
speaker = "サチ"
# 「ルルカ先輩……！」
line = "「ルルカ先輩……！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リコリンも、妹同盟の仲間として協力するよ～♪　サチお姉ちゃん♪」
line = "「リコリンも、妹同盟の仲間として協力するよ～♪　サチお姉ちゃん♪」"

[[dialogue]]
speaker = "サチ"
# 「リコリンちゃんも、ありがとうございます♪　私、気を取り直して頑張ります！」
line = "「リコリンちゃんも、ありがとうございます♪　私、気を取り直して頑張ります！」"

[[dialogue]]
speaker = "unk"
# 仮想結界のフィールドを切り替え、それからしばらく訓練を続けて。
line = "仮想結界のフィールドを切り替え、それからしばらく訓練を続けて。"

[[dialogue]]
speaker = "リコリンフィア"
# 「ふむふむ、なるほど～。ちょっとわかってきたかも～」
line = "「ふむふむ、なるほど～。ちょっとわかってきたかも～」"

[[dialogue]]
speaker = "ルルカ"
# 「リコリンちゃん、何か思いついたの？」
line = "「リコリンちゃん、何か思いついたの？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「うん。サチお姉ちゃんは、リバースフォームに『抗おう』とし過ぎて、上手く行ってない気がするな～」
line = "「うん。サチお姉ちゃんは、リバースフォームに『抗おう』とし過ぎて、上手く行ってない気がするな～」"

[[dialogue]]
speaker = "サチ"
# 「えっと、それってどういう……？」
line = "「えっと、それってどういう……？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「例えばね、リコリンの能力って『毒』を作ることなんだけど～」
line = "「例えばね、リコリンの能力って『毒』を作ることなんだけど～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「毒って悪いイメージがあるでしょ？　でも、その成分をうまく使えば、人を助ける薬にもなるんだよ」
line = "「毒って悪いイメージがあるでしょ？　でも、その成分をうまく使えば、人を助ける薬にもなるんだよ」"

[[dialogue]]
speaker = "リコリンフィア"
# 「サチお姉ちゃんのリバースフォームも同じで、考え方を変えて向き合えば、もっと上手な使い方ができるんじゃないかな？」
line = "「サチお姉ちゃんのリバースフォームも同じで、考え方を変えて向き合えば、もっと上手な使い方ができるんじゃないかな？」"

[[dialogue]]
speaker = "サチ"
# 「考え方を変える……」
line = "「考え方を変える……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「暴走しちゃった時のサチお姉ちゃん、性格は確かに変わっちゃってたけど――」
line = "「暴走しちゃった時のサチお姉ちゃん、性格は確かに変わっちゃってたけど――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リコリンは別に、そこまで悪いお姉ちゃんだとは思わなかったよ？」
line = "「リコリンは別に、そこまで悪いお姉ちゃんだとは思わなかったよ？」"

[[dialogue]]
speaker = "ルルカ"
# 「！　そうだよ、サチちゃん！」
line = "「！　そうだよ、サチちゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「いっそ暴走したまま――精神が反転した状態で戦ってみるっていうのはどう？」
line = "「いっそ暴走したまま――精神が反転した状態で戦ってみるっていうのはどう？」"

[[dialogue]]
speaker = "サチ"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "unk"
# サチは２人のアドバイスを受け、訓練を再開する。
line = "サチは２人のアドバイスを受け、訓練を再開する。"

[[dialogue]]
speaker = "サチ"
# 「――ふぅ……精神がまた、暴走状態に入っちゃいました♪」
line = "「――ふぅ……精神がまた、暴走状態に入っちゃいました♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ねぇ、サチちゃん、どう？　その状態で戦える？」
line = "「ねぇ、サチちゃん、どう？　その状態で戦える？」"

[[dialogue]]
speaker = "サチ"
# 「ふふっ、ルルカ先輩、もちろんですよ♪　今なら――」
line = "「ふふっ、ルルカ先輩、もちろんですよ♪　今なら――」"

[[dialogue]]
speaker = "サチ"
# 「アンラッキーが起きることすら、楽しめちゃいそうな気がします♪」
line = "「アンラッキーが起きることすら、楽しめちゃいそうな気がします♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――そうだ。サチ、それでいい」
line = "「――そうだ。サチ、それでいい」"

[[dialogue]]
speaker = "リコリンフィア"
# 「今のキミは、本来の自分とは異なる、反転した力を使っている」
line = "「今のキミは、本来の自分とは異なる、反転した力を使っている」"

[[dialogue]]
speaker = "リコリンフィア"
# 「その力に合うように精神も変化させることは、何もおかしいことじゃない。だから――」
line = "「その力に合うように精神も変化させることは、何もおかしいことじゃない。だから――」"

[[dialogue]]
speaker = "リコリンフィア"
# 「今のリコリンみたいに、役になりきるつもりで演じちゃおっ♪」
line = "「今のリコリンみたいに、役になりきるつもりで演じちゃおっ♪」"

[[dialogue]]
speaker = "ルルカ"
# 「それにサチちゃん！　性格が変わっても、あたしたちはちゃんとわかってるから大丈夫だよ！」
line = "「それにサチちゃん！　性格が変わっても、あたしたちはちゃんとわかってるから大丈夫だよ！」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしたち――友達なんだから♪」
line = "「あたしたち――友達なんだから♪」"

[[dialogue]]
speaker = "unk"
# 恋人の俺もいるぞ！
line = "恋人の俺もいるぞ！"

[[dialogue]]
speaker = "サチ"
# 「みなさん……そんなことを言われたら私――」
line = "「みなさん……そんなことを言われたら私――」"

[[dialogue]]
speaker = "サチ"
# 「思いっきり、アンラッキーで大暴れしたくなっちゃいます♪」
line = "「思いっきり、アンラッキーで大暴れしたくなっちゃいます♪」"

[[dialogue]]
speaker = "unk"
# ――やがて、サチの斧がモンスターに強烈な一撃を叩き込む。
line = "――やがて、サチの斧がモンスターに強烈な一撃を叩き込む。"

[[dialogue]]
speaker = "ブヒモス"
# 「ブヒーーーッ！？」
line = "「ブヒーーーッ！？」"

[[dialogue]]
speaker = "サチ"
# 「あ……私……」
line = "「あ……私……」"

[[dialogue]]
speaker = "unk"
# 暴走状態が収まったサチは、驚いたように目を見開きながら言う。
line = "暴走状態が収まったサチは、驚いたように目を見開きながら言う。"

[[dialogue]]
speaker = "サチ"
# 「自分の力で、モンスターを倒すことができた……？」
line = "「自分の力で、モンスターを倒すことができた……？」"

[[dialogue]]
speaker = "unk"
# ついにやったな！
line = "ついにやったな！"

[[dialogue]]
speaker = "サチ"
# 「――ひゃっ！？　お、お兄さん、こんなところでそんな、抱き着いたりしちゃダメです！　エッチなことは禁止です～～っ！」
line = "「――ひゃっ！？　お、お兄さん、こんなところでそんな、抱き着いたりしちゃダメです！　エッチなことは禁止です～～っ！」"

[[dialogue]]
speaker = "unk"
# 感激のあまり、俺はサチをぎゅっと抱きしめてしまう。
line = "感激のあまり、俺はサチをぎゅっと抱きしめてしまう。"

[[dialogue]]
speaker = "ルルカ"
# 「おめでとう、サチちゃん！」
line = "「おめでとう、サチちゃん！」"

[[dialogue]]
speaker = "リコリンフィア"
# 「すごくカッコよかったよ！　サチお姉ちゃん♪」
line = "「すごくカッコよかったよ！　サチお姉ちゃん♪」"

[[dialogue]]
speaker = "サチ"
# 「ありがとうございます。お２人が私に、アドバイスをくれたおかげです」
line = "「ありがとうございます。お２人が私に、アドバイスをくれたおかげです」"

[[dialogue]]
speaker = "サチ"
# 「実際に暴走状態で戦ってみて、わかったんです」
line = "「実際に暴走状態で戦ってみて、わかったんです」"

[[dialogue]]
speaker = "サチ"
# 「私……アンラッキーの能力も、精神が反転してしまうことも、ずっとネガティブなものだと思って、抑え込もうとしていました」
line = "「私……アンラッキーの能力も、精神が反転してしまうことも、ずっとネガティブなものだと思って、抑え込もうとしていました」"

[[dialogue]]
speaker = "サチ"
# 「だから、リバースフォームをうまく使いこなせていなかったんだと思います」
line = "「だから、リバースフォームをうまく使いこなせていなかったんだと思います」"

[[dialogue]]
speaker = "サチ"
# 「精神が反転している時……アンラッキーが起きる『予兆』みたいな感覚をなんとなく掴めるようになっていたのに……私はそのことに全然気づけていなかったんです」
line = "「精神が反転している時……アンラッキーが起きる『予兆』みたいな感覚をなんとなく掴めるようになっていたのに……私はそのことに全然気づけていなかったんです」"

[[dialogue]]
speaker = "unk"
# 先ほどの暴走状態のサチは、それが当たり前であるかのようにアンラッキーを逆利用し、敵を翻弄してみせた。
line = "先ほどの暴走状態のサチは、それが当たり前であるかのようにアンラッキーを逆利用し、敵を翻弄してみせた。"

[[dialogue]]
speaker = "サチ"
# 「これからは、考え方を改めて……この力と、ちゃんと向き合っていきたいと思います」
line = "「これからは、考え方を改めて……この力と、ちゃんと向き合っていきたいと思います」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リコリンは、これからもサチお姉ちゃんの『妹仲間』だよ♪　困ったことがあったら、いつでも相談してね！」
line = "「リコリンは、これからもサチお姉ちゃんの『妹仲間』だよ♪　困ったことがあったら、いつでも相談してね！」"

[[dialogue]]
speaker = "サチ"
# 「はい。ありがとうございます、リコリンちゃん♪」
line = "「はい。ありがとうございます、リコリンちゃん♪」"

[[dialogue]]
speaker = "リコリンフィア"
# 「――ねぇねぇ、サチお姉ちゃん♪　今度はリコリンが相談してもいい？」
line = "「――ねぇねぇ、サチお姉ちゃん♪　今度はリコリンが相談してもいい？」"

[[dialogue]]
speaker = "サチ"
# 「はい、なんでしょう？」
line = "「はい、なんでしょう？」"

[[dialogue]]
speaker = "リコリンフィア"
# 「リコリンね、ちょっと気になってることがあって～」
line = "「リコリンね、ちょっと気になってることがあって～」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お兄ちゃんとサチお姉ちゃんが、恋人同士として２人きりの時、どんなふうに過ごしてるのか……教えてほしいな～♪」
line = "「お兄ちゃんとサチお姉ちゃんが、恋人同士として２人きりの時、どんなふうに過ごしてるのか……教えてほしいな～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「あっ、それあたしも知りた～い♪」
line = "「あっ、それあたしも知りた～い♪」"

[[dialogue]]
speaker = "サチ"
# 「えっ、えぇっ……！？　そ、それはちょっと……」
line = "「えっ、えぇっ……！？　そ、それはちょっと……」"

[[dialogue]]
speaker = "リコリンフィア"
# 「お姉ちゃん、お願い～！　うるうる……」
line = "「お姉ちゃん、お願い～！　うるうる……」"

[[dialogue]]
speaker = "サチ"
# 「う……そんな目で見られると……」
line = "「う……そんな目で見られると……」"

[[dialogue]]
speaker = "ルルカ"
# 「サチちゃん、あたしからもお願～い♪　うるうる……♪」
line = "「サチちゃん、あたしからもお願～い♪　うるうる……♪」"

[[dialogue]]
speaker = "サチ"
# 「ルルカ先輩まで！？」
line = "「ルルカ先輩まで！？」"

[[dialogue]]
speaker = "unk"
# ――その後。
line = "――その後。"

[[dialogue]]
speaker = "unk"
# 恋愛事情について２人から根掘り葉掘り聞かれ、すっかり振り回されてしまうサチと俺なのであった。
line = "恋愛事情について２人から根掘り葉掘り聞かれ、すっかり振り回されてしまうサチと俺なのであった。"
