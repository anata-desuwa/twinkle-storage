[[dialogue]]
speaker = "unk"
# 第１話,魔界へ降り立つ,B
line = "第１話,魔界へ降り立つ,B"

[[dialogue]]
speaker = "アイリーン"
# 「『<ruby=ユグドラシル>世界樹</ruby>』起動──目標は魔界Ⅳ－Ｒ１３地点！　<ruby=ボン・ボヤージュ>良き旅を</ruby>！」
line = "「『<ruby>世界樹<rt>ユグドラシル</rt></ruby>』起動──目標は魔界Ⅳ－Ｒ１３地点！　<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>！」"

[[dialogue]]
speaker = "クロト"
# （待っていてくれ──ヴィーナス！）
line = "（待っていてくれ──ヴィーナス！）"

[[dialogue]]
speaker = "unk"
# ……。
line = "……。"

[[dialogue]]
speaker = "unk"
# …………。
line = "…………。"

[[dialogue]]
speaker = "マトイ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フィオナ"
# 「ここが……」
line = "「ここが……」"

[[dialogue]]
speaker = "クロト"
# 「魔界──か」
line = "「魔界──か」"

[[dialogue]]
speaker = "unk"
# 見果てぬ原野が広がっていた。
line = "見果てぬ原野が広がっていた。"

[[dialogue]]
speaker = "unk"
# 魔界のスケールをありありと示すような、<ruby=ぼうばく>茫漠</ruby>たる荒野──
line = "魔界のスケールをありありと示すような、<ruby>茫漠<rt>ぼうばく</rt></ruby>たる荒野──"

[[dialogue]]
speaker = "unk"
# 『世界樹のうろ』を通過した俺たちは、移動の時間を感じる間もなくここへ着いていた。
line = "『世界樹のうろ』を通過した俺たちは、移動の時間を感じる間もなくここへ着いていた。"

[[dialogue]]
speaker = "サーシャ"
# 「ああ……懐かしいわね、この風。涼しげで、渇いていて」
line = "「ああ……懐かしいわね、この風。涼しげで、渇いていて」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんよりは離れて日も浅いですが──そうですね。帰ってきたって感じがします」
line = "「姉さんよりは離れて日も浅いですが──そうですね。帰ってきたって感じがします」"

[[dialogue]]
speaker = "クロト"
# 「サーシャ先輩たちにとっては──故郷ですもんね」
line = "「サーシャ先輩たちにとっては──故郷ですもんね」"

[[dialogue]]
speaker = "unk"
# 初めて組の俺たちが圧倒される中で、奏姉妹の２人だけは感慨に浸っていた。
line = "初めて組の俺たちが圧倒される中で、奏姉妹の２人だけは感慨に浸っていた。"

[[dialogue]]
speaker = "ユウリ"
# 「あたしのママは魔族だけど、<ruby=こっち>魔界</ruby>に来んのは初めてだぜ──つか、こんなに寒ぃのか……！？」
line = "「あたしのママは魔族だけど、<ruby>魔界<rt>こっち</rt></ruby>に来んのは初めてだぜ──つか、こんなに寒ぃのか……！？」"

[[dialogue]]
speaker = "マトイ"
# 「確かに……なんか着替えてくればよかったかも……」
line = "「確かに……なんか着替えてくればよかったかも……」"

[[dialogue]]
speaker = "サーシャ"
# 「んー。どこもそうってわけじゃないんだけど」
line = "「んー。どこもそうってわけじゃないんだけど」"

[[dialogue]]
speaker = "フィオナ"
# 「魔界とひと口に言っても──面積は人間界の十倍以上と言われています。気候、風土も、それだけ多岐に渡るのでしょう」
line = "「魔界とひと口に言っても──面積は人間界の十倍以上と言われています。気候、風土も、それだけ多岐に渡るのでしょう」"

[[dialogue]]
speaker = "クロト"
# 「ああ。そして俺たちは、そんな広大な世界から──一人の人間を探し出さなくちゃならない」
line = "「ああ。そして俺たちは、そんな広大な世界から──一人の人間を探し出さなくちゃならない」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス……」
line = "「ヴィーナス……」"

[[dialogue]]
speaker = "unk"
# 困難は必至。
line = "困難は必至。"

[[dialogue]]
speaker = "unk"
# だが、何もかも覚悟の上で来た。
line = "だが、何もかも覚悟の上で来た。"

[[dialogue]]
speaker = "フィオナ"
# 「ソフィア──大丈夫？　唇まで真っ青だけど……」
line = "「ソフィア──大丈夫？　唇まで真っ青だけど……」"

[[dialogue]]
speaker = "ソフィア"
# 「な……何がですか、フィオナ会長。ソフィアは寒がってなどいません。至ってホ、ホ、ホットな……」
line = "「な……何がですか、フィオナ会長。ソフィアは寒がってなどいません。至ってホ、ホ、ホットな……」"

[[dialogue]]
speaker = "ユウリ"
# 「いや、超寒がりじゃんおまえ」
line = "「いや、超寒がりじゃんおまえ」"

[[dialogue]]
speaker = "ソフィア"
# 「寒いくらいで音を上げている場合ではないのです……！　ぷるぷる……！」
line = "「寒いくらいで音を上げている場合ではないのです……！　ぷるぷる……！」"

[[dialogue]]
speaker = "ソフィア"
# 「それに寒いということはむしろ好都合──あれ？　なんでしょう、このブランケットは……？」
line = "「それに寒いということはむしろ好都合──あれ？　なんでしょう、このブランケットは……？」"

[[dialogue]]
speaker = "クロト"
# 「念のために持ってきた防寒具だ。余ってるから使ってくれ」
line = "「念のために持ってきた防寒具だ。余ってるから使ってくれ」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、ありがとうございます……。ですが、それだと新星会長さんが寒さにやられてしまいます」
line = "「あ、ありがとうございます……。ですが、それだと新星会長さんが寒さにやられてしまいます」"

[[dialogue]]
speaker = "ソフィア"
# 「私は魔界の住人……こ、これしきの寒さで凍えているわけには……！」
line = "「私は魔界の住人……こ、これしきの寒さで凍えているわけには……！」"

[[dialogue]]
speaker = "クロト"
# 「俺は平気だ。昔、冷凍マグロの倉庫でバイトをしてたからな」
line = "「俺は平気だ。昔、冷凍マグロの倉庫でバイトをしてたからな」"

[[dialogue]]
speaker = "ソフィア"
# 「そ、そうですか……ならお言葉に甘えて……くるまるとしましょう。ぬくぬく」
line = "「そ、そうですか……ならお言葉に甘えて……くるまるとしましょう。ぬくぬく」"

[[dialogue]]
speaker = "unk"
# 俺からのブランケットを受け取ったソフィアちゃんは、それを大事そうに自分の首へ巻きつけた。
line = "俺からのブランケットを受け取ったソフィアちゃんは、それを大事そうに自分の首へ巻きつけた。"

[[dialogue]]
speaker = "マトイ"
# （って言いながら緋宮くんも震えてるけど……）
line = "（って言いながら緋宮くんも震えてるけど……）"

[[dialogue]]
speaker = "サーシャ"
# （ふふ。気づかないふりをしてあげましょ）
line = "（ふふ。気づかないふりをしてあげましょ）"

[[dialogue]]
speaker = "unk"
# ようやくソフィアちゃんの身震いも収まってきた──その矢先だった。
line = "ようやくソフィアちゃんの身震いも収まってきた──その矢先だった。"

[[dialogue]]
speaker = "狒々の魔獣"
# 「──ガウガッ！　ガウガウガッ！」
line = "「──ガウガッ！　ガウガウガッ！」"

[[dialogue]]
speaker = "マトイ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "ユウリ"
# 「なんだ──モンスターか──！？」
line = "「なんだ──モンスターか──！？」"

[[dialogue]]
speaker = "ソフィア"
# 「魔獣です──どうやら、珍しい匂いにつられて寄ってきたみたいです」
line = "「魔獣です──どうやら、珍しい匂いにつられて寄ってきたみたいです」"

[[dialogue]]
speaker = "unk"
# 気づけば俺たちの背後に多数の魔獣が忍び寄っていた。
line = "気づけば俺たちの背後に多数の魔獣が忍び寄っていた。"

[[dialogue]]
speaker = "unk"
# 『リクリエ』由来のモンスターとも違う──魔界だけに原生する凶暴なけものだ。
line = "『リクリエ』由来のモンスターとも違う──魔界だけに原生する凶暴なけものだ。"

[[dialogue]]
speaker = "サーシャ"
# 「寒冷地の原野に棲む魔獣は──炎が明確な弱点よ。頼むわね、ユウリちゃん」
line = "「寒冷地の原野に棲む魔獣は──炎が明確な弱点よ。頼むわね、ユウリちゃん」"

[[dialogue]]
speaker = "ユウリ"
# 「ＯＫ、アナもいねえしあたしに任せな！」
line = "「ＯＫ、アナもいねえしあたしに任せな！」"

[[dialogue]]
speaker = "クロト"
# 「速やかに迎撃する──各自、六人での連携を試すぞ」
line = "「速やかに迎撃する──各自、六人での連携を試すぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「承知です──っ！」
line = "「承知です──っ！」"

[[dialogue]]
speaker = "狒々の魔獣"
# 「ガウガァ────ッ！！」
line = "「ガウガァ────ッ！！」"
