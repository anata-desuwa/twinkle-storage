[[dialogue]]
speaker = "unk"
# 第１０話,死の森にて,B
line = "第１０話,死の森にて,B"

[[dialogue]]
speaker = "unk"
# ……。
line = "……。"

[[dialogue]]
speaker = "unk"
# …………。
line = "…………。"

[[dialogue]]
speaker = "ヴィーナス"
# 「くぅぅぅぅッ……！」
line = "「くぅぅぅぅッ……！」"

[[dialogue]]
speaker = "unk"
# <ruby=ヴィーナス>金星</ruby>の波動が爆ぜる──だが、彼女の<ruby=いまし>縛</ruby>めが解かれることはなかった。
line = "<ruby>金星<rt>ヴィーナス</rt></ruby>の波動が爆ぜる──だが、彼女の<ruby>縛<rt>いまし</rt></ruby>めが解かれることはなかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ッ……なんなのよ、この縄みたいの──全っ然ほどけないんだけど……！」
line = "「ッ……なんなのよ、この縄みたいの──全っ然ほどけないんだけど……！」"

[[dialogue]]
speaker = "黒騎士"
# 『──無駄なことだ。それは旧世界の<ruby=ことわり>理</ruby>によって編まれた縛鎖……星の力では抗いきれぬ』
line = "『──無駄なことだ。それは旧世界の<ruby>理<rt>ことわり</rt></ruby>によって編まれた縛鎖……星の力では抗いきれぬ』"

[[dialogue]]
speaker = "黒騎士"
# 『いい加減学習するべきだな。もはや抵抗の手立てなどないということを』
line = "『いい加減学習するべきだな。もはや抵抗の手立てなどないということを』"

[[dialogue]]
speaker = "unk"
# ヴィーナスはこの地に幽閉されていた。
line = "ヴィーナスはこの地に幽閉されていた。"

[[dialogue]]
speaker = "unk"
# 霊力で編まれた帯が、彼女の両手を縛りつけている。
line = "霊力で編まれた帯が、彼女の両手を縛りつけている。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっそ……第一、どこなのよここは。<b>人間界ですらない</b>わね」
line = "「あっそ……第一、どこなのよここは。<b>人間界ですらない</b>わね」"

[[dialogue]]
speaker = "黒騎士"
# 『フ──肌でそれを察するか。ああ』
line = "『フ──肌でそれを察するか。ああ』"

[[dialogue]]
speaker = "黒騎士"
# 『ここは魔界──リクリエに冒されし死の森・ネメシス』
line = "『ここは魔界──リクリエに冒されし死の森・ネメシス』"

[[dialogue]]
speaker = "黒騎士"
# 『魔界の住人さえ寄り付かない、リクリエに侵食されきった物象の末路だ』
line = "『魔界の住人さえ寄り付かない、リクリエに侵食されきった物象の末路だ』"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "unk"
# 冥森林ネメシス──
line = "冥森林ネメシス──"

[[dialogue]]
speaker = "unk"
# 魔界にてそう称されたこの森は、あらゆる自然とあらゆる生態系が戯画的までに狂っていた。
line = "魔界にてそう称されたこの森は、あらゆる自然とあらゆる生態系が戯画的までに狂っていた。"

[[dialogue]]
speaker = "unk"
# そして周囲に満ちる濃紫の<ruby=まがまが>禍々</ruby>しさを……ヴィーナスの体は覚えている。
line = "そして周囲に満ちる濃紫の<ruby>禍々<rt>まがまが</rt></ruby>しさを……ヴィーナスの体は覚えている。"

[[dialogue]]
speaker = "ヴィーナス"
# （フィーニスの塔を汚染してたのと同じ……再構築の瘴気、だったかしら）
line = "（フィーニスの塔を汚染してたのと同じ……再構築の瘴気、だったかしら）"

[[dialogue]]
speaker = "ヴィーナス"
# （この匂いはあれと同じ──ううん、あれより濃い……！）
line = "（この匂いはあれと同じ──ううん、あれより濃い……！）"

[[dialogue]]
speaker = "unk"
# 樹皮が波のようにうごめく。枯れ木と合成された羽虫が地を這う。
line = "樹皮が波のようにうごめく。枯れ木と合成された羽虫が地を這う。"

[[dialogue]]
speaker = "unk"
# 存在の根幹を組み替える──それこそが<ruby=リクリエイション>再構築</ruby>の本質。
line = "存在の根幹を組み替える──それこそが<ruby>再構築<rt>リクリエイション</rt></ruby>の本質。"

[[dialogue]]
speaker = "unk"
# 生命のあり方を冒涜しているような光景に、ヴィーナスは苦々しい顔をした。
line = "生命のあり方を冒涜しているような光景に、ヴィーナスは苦々しい顔をした。"

[[dialogue]]
speaker = "黒騎士"
# 『──この意味がわかるな？　たとえお仲間が察知してこちらへ来ようと、森へ踏み入れた瞬間<b>こうなる</b>ということだ』
line = "『──この意味がわかるな？　たとえお仲間が察知してこちらへ来ようと、森へ踏み入れた瞬間<b>こうなる</b>ということだ』"

[[dialogue]]
speaker = "ヴィーナス"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なら──あんたは私を連れ出して、何がしたいのよ……！　目的はなんなの……！？」
line = "「なら──あんたは私を連れ出して、何がしたいのよ……！　目的はなんなの……！？」"

[[dialogue]]
speaker = "黒騎士"
# 『ふむ……私の目的──か』
line = "『ふむ……私の目的──か』"

[[dialogue]]
speaker = "unk"
# すると男は、一瞬考えたように視線を伏して……
line = "すると男は、一瞬考えたように視線を伏して……"

[[dialogue]]
speaker = "黒騎士"
# 『──おまえの目的こそなんだ？　九浄の娘』
line = "『──おまえの目的こそなんだ？　九浄の娘』"

[[dialogue]]
speaker = "ヴィーナス"
# 「私の──って、はあっ！？」
line = "「私の──って、はあっ！？」"

[[dialogue]]
speaker = "unk"
# どうして捕まっているはずの私がそんなこと聞かれなきゃならないのか──ヴィーナスは眼力だけでそう反論した。
line = "どうして捕まっているはずの私がそんなこと聞かれなきゃならないのか──ヴィーナスは眼力だけでそう反論した。"

[[dialogue]]
speaker = "黒騎士"
# 『おまえがただの娘でないことはわかっている。デネブより飛来せし異分子──わけもなく紛れ込んだはずがない』
line = "『おまえがただの娘でないことはわかっている。デネブより飛来せし異分子──わけもなく紛れ込んだはずがない』"

[[dialogue]]
speaker = "ヴィーナス"
# 「まーた人のことデブデブって……さっきから何言ってんのかさっぱりわかんないのよ！」
line = "「まーた人のことデブデブって……さっきから何言ってんのかさっぱりわかんないのよ！」"

[[dialogue]]
speaker = "unk"
# 甲冑の男──黒騎士──とヴィーナスは、ここに至るまで何度も押し問答を続けていた。
line = "甲冑の男──黒騎士──とヴィーナスは、ここに至るまで何度も押し問答を続けていた。"

[[dialogue]]
speaker = "unk"
# 互いに理解し合うための決定的なピースが足りていないような、不自由な噛み合わなさだ。
line = "互いに理解し合うための決定的なピースが足りていないような、不自由な噛み合わなさだ。"

[[dialogue]]
speaker = "黒騎士"
# 『記憶が安定していないのか？　まあいい』
line = "『記憶が安定していないのか？　まあいい』"

[[dialogue]]
speaker = "黒騎士"
# 『ならば物的な証左をいただくまでだ──“未来の日誌”を持っているな？』
line = "『ならば物的な証左をいただくまでだ──“未来の日誌”を持っているな？』"

[[dialogue]]
speaker = "ヴィーナス"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "黒騎士"
# 『渡せ。どこへ隠した。あれは、デネブの出来事が刻まれた記録のはず』
line = "『渡せ。どこへ隠した。あれは、デネブの出来事が刻まれた記録のはず』"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんであんたが日誌のこと知ってんのよ──って言いたいところだけど。あげるわけないでしょ、私の宝物なんだから」
line = "「なんであんたが日誌のこと知ってんのよ──って言いたいところだけど。あげるわけないでしょ、私の宝物なんだから」"

[[dialogue]]
speaker = "黒騎士"
# 『そうか。なれば……直接漁らせてもらおう』
line = "『そうか。なれば……直接漁らせてもらおう』"

[[dialogue]]
speaker = "ヴィーナス"
# 「っっ……！？」
line = "「っっ……！？」"

[[dialogue]]
speaker = "unk"
# 黒騎士が手のひらを差し出し──宙を鷲掴みにする。
line = "黒騎士が手のひらを差し出し──宙を鷲掴みにする。"

[[dialogue]]
speaker = "unk"
# すると、霊力の縛鎖が万力のようにヴィーナスの体を締めつけていった。
line = "すると、霊力の縛鎖が万力のようにヴィーナスの体を締めつけていった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──ッ──くッ、あぁぁぁッ……！」
line = "「──ッ──くッ、あぁぁぁッ……！」"

[[dialogue]]
speaker = "黒騎士"
# 『無駄な抵抗と言っただろう。どこにしまおうと、こじ開けるまで』
line = "『無駄な抵抗と言っただろう。どこにしまおうと、こじ開けるまで』"

[[dialogue]]
speaker = "unk"
# 残る星力を自衛に費やしてしまったヴィーナスの懐から、圧縮して隠していたはずの日誌がこぼれ落ちる。
line = "残る星力を自衛に費やしてしまったヴィーナスの懐から、圧縮して隠していたはずの日誌がこぼれ落ちる。"

[[dialogue]]
speaker = "黒騎士"
# 『ふむ……これがデネブの日誌か。実に奇妙な……あるいはこの中に、あちら側への鍵もあるのか……』
line = "『ふむ……これがデネブの日誌か。実に奇妙な……あるいはこの中に、あちら側への鍵もあるのか……』"

[[dialogue]]
speaker = "unk"
# 日誌を手に取った黒騎士は、ここではないどこかを見つめるようにして独りごちた……。
line = "日誌を手に取った黒騎士は、ここではないどこかを見つめるようにして独りごちた……。"

[[dialogue]]
speaker = "黒騎士"
# 『さて──再度、問おうか。おまえは何者だ。九浄の娘。何の目的があってこれを持ち、ここへ来た？』
line = "『さて──再度、問おうか。おまえは何者だ。九浄の娘。何の目的があってこれを持ち、ここへ来た？』"

[[dialogue]]
speaker = "ヴィーナス"
# 「答えることなんて……っ、ないわ……！　あったとしても、アンタに屈するなんて真っ平ごめん……！」
line = "「答えることなんて……っ、ないわ……！　あったとしても、アンタに屈するなんて真っ平ごめん……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アンタがいくら粘ろうと──私は絶対に音をあげないんだから！　こうなったら我慢勝負よ！」
line = "「アンタがいくら粘ろうと──私は絶対に音をあげないんだから！　こうなったら我慢勝負よ！」"

[[dialogue]]
speaker = "黒騎士"
# 『いいや──無駄なことだ。じきにこの森も大いなる冬によって凍てつく……座してばかりでは死を待つのみだぞ』
line = "『いいや──無駄なことだ。じきにこの森も大いなる冬によって凍てつく……座してばかりでは死を待つのみだぞ』"

[[dialogue]]
speaker = "黒騎士"
# 『せめて命が惜しければ──おとなしく全てを吐くことだな』
line = "『せめて命が惜しければ──おとなしく全てを吐くことだな』"

[[dialogue]]
speaker = "ヴィーナス"
# （……？　大いなる……冬……？）
line = "（……？　大いなる……冬……？）"

[[dialogue]]
speaker = "unk"
# 『ねーねー会長──魔界の気候ってどんなカンジだったの？』
line = "『ねーねー会長──魔界の気候ってどんなカンジだったの？』"

[[dialogue]]
speaker = "サーシャ"
# 『魔界の気候？　そうねえ……私の地元じゃ年に一回、大いなる冬っていうのがあったわ』
line = "『魔界の気候？　そうねえ……私の地元じゃ年に一回、大いなる冬っていうのがあったわ』"

[[dialogue]]
speaker = "サーシャ"
# 『もう寒いどころじゃなくて──何もかも凍りついちゃうのよ。あれは大変だったわ～』
line = "『もう寒いどころじゃなくて──何もかも凍りついちゃうのよ。あれは大変だったわ～』"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの脳裏に一瞬、在りし日の記憶がよぎった。
line = "ヴィーナスの脳裏に一瞬、在りし日の記憶がよぎった。"

[[dialogue]]
speaker = "unk"
# それは、まだアナやクロトが入学するより前の……サーシャが会長だった頃の思い出だった。
line = "それは、まだアナやクロトが入学するより前の……サーシャが会長だった頃の思い出だった。"

[[dialogue]]
speaker = "黒騎士"
# 『……まあいい。もし記憶にないのなら──整理しておくことだ。おまえがどこから来たのか』
line = "『……まあいい。もし記憶にないのなら──整理しておくことだ。おまえがどこから来たのか』"

[[dialogue]]
speaker = "ヴィーナス"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "黒騎士"
# 『そろそろ時間だ──また来る。せいぜい<ruby=しい>思惟</ruby>を澄ませておけ』
line = "『そろそろ時間だ──また来る。せいぜい<ruby>思惟<rt>しい</rt></ruby>を澄ませておけ』"

[[dialogue]]
speaker = "unk"
# そう言い残し、黒騎士は影となって消えた。
line = "そう言い残し、黒騎士は影となって消えた。"

[[dialogue]]
speaker = "ヴィーナス"
# （消えた……けど、ああもう。全っ然動けやしないじゃない）
line = "（消えた……けど、ああもう。全っ然動けやしないじゃない）"

[[dialogue]]
speaker = "ヴィーナス"
# （ホント参ったわね──私の体力だって、無限じゃないし……はぁ、はぁ）
line = "（ホント参ったわね──私の体力だって、無限じゃないし……はぁ、はぁ）"

[[dialogue]]
speaker = "unk"
# ガーディアン──煌竜──黒騎士──
line = "ガーディアン──煌竜──黒騎士──"

[[dialogue]]
speaker = "unk"
# 度重なる戦闘の末にここへ拉致されてきたヴィーナスは、体力も星力も万全とは程遠い状態に成り果てていた。
line = "度重なる戦闘の末にここへ拉致されてきたヴィーナスは、体力も星力も万全とは程遠い状態に成り果てていた。"

[[dialogue]]
speaker = "unk"
# 虚勢を張るべき相手もいなくなった今、その体からは絶え絶えの吐息がこぼれる。
line = "虚勢を張るべき相手もいなくなった今、その体からは絶え絶えの吐息がこぼれる。"

[[dialogue]]
speaker = "ヴィーナス"
# （日誌を見れたら答えが──ううん。そんなんじゃダメ……クロトと約束したじゃない、自分の力で切り拓くんだって）
line = "（日誌を見れたら答えが──ううん。そんなんじゃダメ……クロトと約束したじゃない、自分の力で切り拓くんだって）"

[[dialogue]]
speaker = "unk"
# 彼女が生来すがってきた『未来の日誌』は黒騎士の手により持ち去られてしまっていた。
line = "彼女が生来すがってきた『未来の日誌』は黒騎士の手により持ち去られてしまっていた。"

[[dialogue]]
speaker = "unk"
# この先の道筋を示すものは何もない──
line = "この先の道筋を示すものは何もない──"

[[dialogue]]
speaker = "unk"
# 今までのヴィーナスなら、とうに<ruby=ひたん>悲嘆</ruby>に暮れていただろう。だが。
line = "今までのヴィーナスなら、とうに<ruby>悲嘆<rt>ひたん</rt></ruby>に暮れていただろう。だが。"

[[dialogue]]
speaker = "ヴィーナス"
# （……大丈夫。望みは、繋げた！）
line = "（……大丈夫。望みは、繋げた！）"

[[dialogue]]
speaker = "unk"
# 彼女が最後に手元まで隠し持っていたもの。
line = "彼女が最後に手元まで隠し持っていたもの。"

[[dialogue]]
speaker = "unk"
# それは戦闘と縛鎖、そして混沌の瘴気によりボロボロに朽ちてしまったＤＩＳＣだった。
line = "それは戦闘と縛鎖、そして混沌の瘴気によりボロボロに朽ちてしまったＤＩＳＣだった。"

[[dialogue]]
speaker = "unk"
# 『未来の日誌』を強引に奪い去られた、あの時──
line = "『未来の日誌』を強引に奪い去られた、あの時──"

[[dialogue]]
speaker = "unk"
# ヴィーナスはあたかも屈したような素振りを見せたが、その実、奥深くには残骸とも言えるＤＩＳＣをしまい込んでいたのだ。
line = "ヴィーナスはあたかも屈したような素振りを見せたが、その実、奥深くには残骸とも言えるＤＩＳＣをしまい込んでいたのだ。"

[[dialogue]]
speaker = "ヴィーナス"
# （私が信じるべきは日誌なんかじゃなくて、あなただから──そうでしょ。クロト）
line = "（私が信じるべきは日誌なんかじゃなくて、あなただから──そうでしょ。クロト）"

[[dialogue]]
speaker = "クロト"
# 『ヴィーナスは──自分が気づいてなかっただけで、ちゃんと重大な決断を下してきてるよ。一人じゃ何も決められないなんてことはない』
line = "『ヴィーナスは──自分が気づいてなかっただけで、ちゃんと重大な決断を下してきてるよ。一人じゃ何も決められないなんてことはない』"

[[dialogue]]
speaker = "クロト"
# 『もし、それでも、寄る辺がなくて不安だっていうなら』
line = "『もし、それでも、寄る辺がなくて不安だっていうなら』"

[[dialogue]]
speaker = "クロト"
# 『俺を頼れ』
line = "『俺を頼れ』"

[[dialogue]]
speaker = "ヴィーナス"
# （ここは魔界──人間界には繋がらない。当然、魔界に他の知り合いなんていない……）
line = "（ここは魔界──人間界には繋がらない。当然、魔界に他の知り合いなんていない……）"

[[dialogue]]
speaker = "ヴィーナス"
# （それでも、みんなを信じるなら──薄い可能性でも賭けるっきゃないでしょ……！）
line = "（それでも、みんなを信じるなら──薄い可能性でも賭けるっきゃないでしょ……！）"

[[dialogue]]
speaker = "unk"
# 壊れかけのＤＩＳＣは辛うじて最低限の通信機能を保っていた。
line = "壊れかけのＤＩＳＣは辛うじて最低限の通信機能を保っていた。"

[[dialogue]]
speaker = "unk"
# しかし、この地の侵食によって破壊されきるのも時間の問題と思われた。
line = "しかし、この地の侵食によって破壊されきるのも時間の問題と思われた。"

[[dialogue]]
speaker = "ヴィーナス"
# （っ……縛りがきつくて、手が使えないわ……！　でも、こうすればなんとか──！）
line = "（っ……縛りがきつくて、手が使えないわ……！　でも、こうすればなんとか──！）"

[[dialogue]]
speaker = "unk"
# ヴィーナスはわずかな星力を振り絞って──置き去りにされた自らのロッドを動かそうとする。
line = "ヴィーナスはわずかな星力を振り絞って──置き去りにされた自らのロッドを動かそうとする。"

[[dialogue]]
speaker = "unk"
# その<ruby=テレキネシス>念動力</ruby>にも等しい遠隔操作には、針の糸を通すようなコントロールが要求されていた。
line = "その<ruby>念動力<rt>テレキネシス</rt></ruby>にも等しい遠隔操作には、針の糸を通すようなコントロールが要求されていた。"

[[dialogue]]
speaker = "unk"
# 彼女は巧みにロッドを念のみで操り、一文字……また一文字と……器用にメッセージを打ち込んでいく。
line = "彼女は巧みにロッドを念のみで操り、一文字……また一文字と……器用にメッセージを打ち込んでいく。"

[[dialogue]]
speaker = "ヴィーナス"
# （チャンスはこれっきり──お願いみんな、気づいて……！）
line = "（チャンスはこれっきり──お願いみんな、気づいて……！）"

[[dialogue]]
speaker = "unk"
# ヴィーナスが残したメッセージ──
line = "ヴィーナスが残したメッセージ──"

[[dialogue]]
