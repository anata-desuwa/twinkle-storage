[[dialogue]]
speaker = "unk"
# バレンタインの後日。俺は恋人のトワちゃん先生とリゾート結界でデートを楽しんだ後、夜の食事会をしていた。
line = "バレンタインの後日。俺は恋人のトワちゃん先生とリゾート結界でデートを楽しんだ後、夜の食事会をしていた。"

