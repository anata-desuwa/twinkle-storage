# 「ねぇ、会長く～ん<emoji=heart04>　この後はトワ先生と～」
line = "「ねぇ、会長く～ん<emoji=heart04>　この後はトワ先生と～」"

[[dialogue]]
speaker = "unk"
# トワちゃんが密着するように横に寄り添い、耳元で甘く囁く。
