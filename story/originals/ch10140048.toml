line = "トワちゃんはキッチンを借りて、俺に手料理を作って食べさせてくれる。ただ、楽しそうにお酒を飲んでいた彼女は、食事が終わる頃にはすっかり酔っぱらってしまっていて――"

[[dialogue]]
