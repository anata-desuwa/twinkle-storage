[[dialogue]]
speaker = "unk"
# 第９話,ポラリス,B
line = "第９話,ポラリス,B"

[[dialogue]]
speaker = "unk"
# 魔王クロトに代わって現れた、女神テルルの遣い・ルヴィネ。
line = "魔王クロトに代わって現れた、女神テルルの遣い・ルヴィネ。"

[[dialogue]]
speaker = "unk"
# ルヴィネは見た目こそ華奢で小さいが、とても聡明な少女だった。常に避難民たちが生き残れるよう、的確な指示を出し続けた。
line = "ルヴィネは見た目こそ華奢で小さいが、とても聡明な少女だった。常に避難民たちが生き残れるよう、的確な指示を出し続けた。"

[[dialogue]]
speaker = "unk"
# 流星市国内から手に入れたわずかな物資を厳密に、そして公平に管理して皆に分け与えて。
line = "流星市国内から手に入れたわずかな物資を厳密に、そして公平に管理して皆に分け与えて。"

[[dialogue]]
speaker = "unk"
# モンスターが出現すると誰よりも早く急行し、誰よりも早く起きて、誰よりも遅く眠った。
line = "モンスターが出現すると誰よりも早く急行し、誰よりも早く起きて、誰よりも遅く眠った。"

[[dialogue]]
speaker = "unk"
# ルヴィネへの信頼と尊敬は、日を追うごとに強くなっていく──それはチナも例外ではなかった。
line = "ルヴィネへの信頼と尊敬は、日を追うごとに強くなっていく──それはチナも例外ではなかった。"

[[dialogue]]
speaker = "unk"
# 戦闘でサポートできないぶん、チナは街中を駆け回った。半壊した学園の図書館でサバイバルの知識を得たり、民家の中に残った防災グッズから食料を集めたり──
line = "戦闘でサポートできないぶん、チナは街中を駆け回った。半壊した学園の図書館でサバイバルの知識を得たり、民家の中に残った防災グッズから食料を集めたり──"

[[dialogue]]
speaker = "unk"
# ルヴィネのサポートは上手くいっていたが、当時のチナはグレイスとぎくしゃくしていた。
line = "ルヴィネのサポートは上手くいっていたが、当時のチナはグレイスとぎくしゃくしていた。"

[[dialogue]]
speaker = "グレイス"
# 「…………ふんっ」
line = "「…………ふんっ」"

[[dialogue]]
speaker = "チナ"
# 「おいグレイス。お前なあ、その態度……」
line = "「おいグレイス。お前なあ、その態度……」"

[[dialogue]]
speaker = "グレイス"
# 「魔王さんを卑怯者呼ばわりする人は、み、みんな嫌いです……！」
line = "「魔王さんを卑怯者呼ばわりする人は、み、みんな嫌いです……！」"

[[dialogue]]
speaker = "チナ"
# 「またその話かよ。いい加減しつこいぞ、お前……！」
line = "「またその話かよ。いい加減しつこいぞ、お前……！」"

[[dialogue]]
speaker = "unk"
# グレイスは直接、魔王クロトと会ったことがあるらしい。
line = "グレイスは直接、魔王クロトと会ったことがあるらしい。"

[[dialogue]]
speaker = "unk"
# 出会った頃から明るかったグレイスが、いつからか焚き火を囲むこともなくなってしまって。
line = "出会った頃から明るかったグレイスが、いつからか焚き火を囲むこともなくなってしまって。"

[[dialogue]]
speaker = "unk"
# チナもどうすればいいかわからず、よくケンカをした。
line = "チナもどうすればいいかわからず、よくケンカをした。"

[[dialogue]]
speaker = "unk"
# だがある日、転機が訪れる。
line = "だがある日、転機が訪れる。"

[[dialogue]]
speaker = "グレイス"
# 「ひぐっ……ぐすっ……うぅぅう……」
line = "「ひぐっ……ぐすっ……うぅぅう……」"

[[dialogue]]
speaker = "チナ"
# 「もう泣くなよグレイス……喉渇いて、腹減るだけだぞ……？」
line = "「もう泣くなよグレイス……喉渇いて、腹減るだけだぞ……？」"

[[dialogue]]
speaker = "unk"
# ある日、がれきの下からグレイスの両親の亡骸が見つかった。チナは埋葬を手伝った。
line = "ある日、がれきの下からグレイスの両親の亡骸が見つかった。チナは埋葬を手伝った。"

[[dialogue]]
speaker = "チナ"
# 「そうだ……これ。お前の母さんの、セレスティア。ルヴィネが見つけてきてくれたって」
line = "「そうだ……これ。お前の母さんの、セレスティア。ルヴィネが見つけてきてくれたって」"

[[dialogue]]
speaker = "グレイス"
# 「…………はい」
line = "「…………はい」"

[[dialogue]]
speaker = "グレイス"
# 「帰ったら、ルヴィネさんに、ちゃんとお礼を、言います……」
line = "「帰ったら、ルヴィネさんに、ちゃんとお礼を、言います……」"

[[dialogue]]
speaker = "チナ"
# 「そうしろ。ほら、帰ろうぜ……？」
line = "「そうしろ。ほら、帰ろうぜ……？」"

[[dialogue]]
speaker = "グレイス"
# 「……チナさんも、ありがとう、ございます」
line = "「……チナさんも、ありがとう、ございます」"

[[dialogue]]
speaker = "グレイス"
# 「お父さんとお母さんの……お墓。手伝ってくれて……手も、合わせてくれて……」
line = "「お父さんとお母さんの……お墓。手伝ってくれて……手も、合わせてくれて……」"

[[dialogue]]
speaker = "チナ"
# 「……お前だって一昨日、アタシに同じことしてくれただろ」
line = "「……お前だって一昨日、アタシに同じことしてくれただろ」"

[[dialogue]]
speaker = "unk"
# チナはポケットに入れていた、父親のセレスティアに触れた。これもルヴィネが渡してくれたものだった。
line = "チナはポケットに入れていた、父親のセレスティアに触れた。これもルヴィネが渡してくれたものだった。"

[[dialogue]]
speaker = "グレイス"
# 「私、強くなりたいです……」
line = "「私、強くなりたいです……」"

[[dialogue]]
speaker = "チナ"
# 「ああ。なりたいな……」
line = "「ああ。なりたいな……」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィネさんや、ベアトリスさん……レティシアさんみたいに……」
line = "「ルヴィネさんや、ベアトリスさん……レティシアさんみたいに……」"

[[dialogue]]
speaker = "チナ"
# 「あいつらがおかしいんだよ。普通、アタシらの年齢じゃ星騎士になんて──」
line = "「あいつらがおかしいんだよ。普通、アタシらの年齢じゃ星騎士になんて──」"

[[dialogue]]
speaker = "グレイス"
# 「…………あれ？」
line = "「…………あれ？」"

[[dialogue]]
speaker = "チナ"
# 「……うそだろ、お前」
line = "「……うそだろ、お前」"

[[dialogue]]
speaker = "unk"
# チナとグレイスのわだかまりが溶けたその日、グレイスもまた星騎士として覚醒を果たした。
line = "チナとグレイスのわだかまりが溶けたその日、グレイスもまた星騎士として覚醒を果たした。"

[[dialogue]]
speaker = "チナ"
# 「どうやったら星力って目覚めるんだ……アタシだけまだなんだけど……コツとかあるのかな……」
line = "「どうやったら星力って目覚めるんだ……アタシだけまだなんだけど……コツとかあるのかな……」"

[[dialogue]]
speaker = "ベアトリス"
# 「わ、わからないなあ……私はある日いきなりだったから」
line = "「わ、わからないなあ……私はある日いきなりだったから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私も啓示を受けた身だから……グレイスさんに詳しく聞いてみたら？」
line = "「私も啓示を受けた身だから……グレイスさんに詳しく聞いてみたら？」"

[[dialogue]]
speaker = "チナ"
# 「聞いたよ。でも、よくわかんないって……」
line = "「聞いたよ。でも、よくわかんないって……」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃんは？」
line = "「レティシアちゃんは？」"

[[dialogue]]
speaker = "チナ"
# 「なーんも。てか話しかけても反応してくれねーんだけど……」
line = "「なーんも。てか話しかけても反応してくれねーんだけど……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「照れてるのね」
line = "「照れてるのね」"

[[dialogue]]
speaker = "ベアトリス"
# 「照れてるんだよ、きっと」
line = "「照れてるんだよ、きっと」"

[[dialogue]]
speaker = "チナ"
# 「そうかぁ……？」
line = "「そうかぁ……？」"

[[dialogue]]
speaker = "unk"
# そうして補給もままならない状況のまま、１ヵ月が過ぎた。
line = "そうして補給もままならない状況のまま、１ヵ月が過ぎた。"

[[dialogue]]
speaker = "unk"
# 自分だけ星騎士として、役に立つことができないもどかしさ。
line = "自分だけ星騎士として、役に立つことができないもどかしさ。"

[[dialogue]]
speaker = "unk"
# 年齢も境遇もほとんど変わらないのに、自分だけが足を引っ張っている──そのうしろめたさから、共に焚き火を囲むことにチナが抵抗を感じ始めた頃……
line = "年齢も境遇もほとんど変わらないのに、自分だけが足を引っ張っている──そのうしろめたさから、共に焚き火を囲むことにチナが抵抗を感じ始めた頃……"

[[dialogue]]
speaker = "ルヴィネ"
# 「げほっ……ごほっ……！」
line = "「げほっ……ごほっ……！」"

[[dialogue]]
speaker = "unk"
# ルヴィネが高熱を出した──無理がたたったのだ。
line = "ルヴィネが高熱を出した──無理がたたったのだ。"

[[dialogue]]
speaker = "unk"
# この時の避難地は、デネブの住人たちの絶望は、すさまじかった。
line = "この時の避難地は、デネブの住人たちの絶望は、すさまじかった。"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィネちゃん、しっかり……しっかりして……！」
line = "「ルヴィネちゃん、しっかり……しっかりして……！」"

[[dialogue]]
speaker = "グレイス"
# 「どどど、どうしましょうっ……お薬、もうありません……」
line = "「どどど、どうしましょうっ……お薬、もうありません……」"

[[dialogue]]
speaker = "流星市国民"
# 「大変ですっ！　モンスターが暴れてます……ルヴィネ様！」
line = "「大変ですっ！　モンスターが暴れてます……ルヴィネ様！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「わ、わかった……すぐに……」
line = "「わ、わかった……すぐに……」"

[[dialogue]]
speaker = "チナ"
# 「バカ、寝てろ！！　マジで死ぬぞお前！！」
line = "「バカ、寝てろ！！　マジで死ぬぞお前！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「モンスターは私たちで何とかするから、休んでて！」
line = "「モンスターは私たちで何とかするから、休んでて！」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　レティシアさん、行きましょう！」
line = "「はい！　レティシアさん、行きましょう！」"

[[dialogue]]
speaker = "レティシア"
# 「…………ルヴィネ。行って、いい？」
line = "「…………ルヴィネ。行って、いい？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………ええ。おねがい。２人を、守ってあげて……」
line = "「…………ええ。おねがい。２人を、守ってあげて……」"

[[dialogue]]
speaker = "レティシア"
# 「……ん。守る……」
line = "「……ん。守る……」"

[[dialogue]]
speaker = "unk"
# その日から、ルヴィネが戦えなくなった。
line = "その日から、ルヴィネが戦えなくなった。"

[[dialogue]]
speaker = "unk"
# 額を触ると、ぞっとするほどに熱い。滋養を取らせて休ませようにも、そもそもの食料自体が不足していた。
line = "額を触ると、ぞっとするほどに熱い。滋養を取らせて休ませようにも、そもそもの食料自体が不足していた。"

[[dialogue]]
speaker = "unk"
# 流星市国内の薬局にある薬は、すでに避難民たちが消費しており、ルヴィネ自身の回復力にすがるしかない。
line = "流星市国内の薬局にある薬は、すでに避難民たちが消費しており、ルヴィネ自身の回復力にすがるしかない。"

[[dialogue]]
speaker = "unk"
# チナは三日三晩、寝ずに看病した。指先が内出血を起こし、爪が割れても冷水のタオルをしぼり、ルヴィネの額の汗をぬぐい続けた。
line = "チナは三日三晩、寝ずに看病した。指先が内出血を起こし、爪が割れても冷水のタオルをしぼり、ルヴィネの額の汗をぬぐい続けた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………ぁ。う……？」
line = "「…………ぁ。う……？」"

[[dialogue]]
speaker = "チナ"
# 「あ──ルヴィネ……！　目ぇ、さめたか……調子はどうだ？」
line = "「あ──ルヴィネ……！　目ぇ、さめたか……調子はどうだ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………だいぶ、楽になった、と思う」
line = "「…………だいぶ、楽になった、と思う」"

[[dialogue]]
speaker = "チナ"
# 「無茶しすぎなんだよ……お前、全然寝ないし、食べないし……お前は機械か？　実はヒトじゃない生き物か？　違うだろ……？」
line = "「無茶しすぎなんだよ……お前、全然寝ないし、食べないし……お前は機械か？　実はヒトじゃない生き物か？　違うだろ……？」"

[[dialogue]]
speaker = "チナ"
# 「ちゃんと食べて寝なきゃ、体壊すって……もう、ぜったいに無茶しないでくれ……」
line = "「ちゃんと食べて寝なきゃ、体壊すって……もう、ぜったいに無茶しないでくれ……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……チナさん。泣きそうなのに、怒ってる……不思議な顔……」
line = "「……チナさん。泣きそうなのに、怒ってる……不思議な顔……」"

[[dialogue]]
speaker = "チナ"
# 「そりゃそうだろ……友達が病気で苦しそうにしてたら……つらいよ……」
line = "「そりゃそうだろ……友達が病気で苦しそうにしてたら……つらいよ……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……友達。私とチナさんは……友達？」
line = "「……友達。私とチナさんは……友達？」"

[[dialogue]]
speaker = "チナ"
# 「アタシはそう思ってるよ……ルヴィネはめちゃくちゃすごいやつだよ。テルル様に選ばれるだなんて、すげーよ……特別な天使だ……」
line = "「アタシはそう思ってるよ……ルヴィネはめちゃくちゃすごいやつだよ。テルル様に選ばれるだなんて、すげーよ……特別な天使だ……」"

[[dialogue]]
speaker = "チナ"
# 「でも、友達だろ……友達はな。対等でないとダメなんだ……」
line = "「でも、友達だろ……友達はな。対等でないとダメなんだ……」"

[[dialogue]]
speaker = "チナ"
# 「ちくしょう……アタシも変身できたら。ルヴィネにこんな無茶、させずにすむのに……」
line = "「ちくしょう……アタシも変身できたら。ルヴィネにこんな無茶、させずにすむのに……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……その気持ちだけで嬉しいわ」
line = "「……その気持ちだけで嬉しいわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それにチナさんの存在に、私、救われてる……だってあなたは私のこと、『様』をつけて呼ばないから……」
line = "「それにチナさんの存在に、私、救われてる……だってあなたは私のこと、『様』をつけて呼ばないから……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ここだけの話……『ルヴィネ様』って呼ばれるの、ちょっとだけイヤなの……ふふ。内緒よ……？」
line = "「ここだけの話……『ルヴィネ様』って呼ばれるの、ちょっとだけイヤなの……ふふ。内緒よ……？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あの人たちも辛いだろうから。すがる対象がいて楽になるのなら、と判断したけれど……本当はイヤ……」
line = "「あの人たちも辛いだろうから。すがる対象がいて楽になるのなら、と判断したけれど……本当はイヤ……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「別に崇めて欲しいわけじゃない……だからチナさんとお喋りするのは、友達って呼んでもらえるのは……」
line = "「別に崇めて欲しいわけじゃない……だからチナさんとお喋りするのは、友達って呼んでもらえるのは……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「すごく──嬉しい」
line = "「すごく──嬉しい」"

[[dialogue]]
speaker = "チナ"
# 「……へへ、そっか」
line = "「……へへ、そっか」"

[[dialogue]]
speaker = "チナ"
# 「あ……じゃあ、呼び方！　友達だっていうんなら『チナさん』はやめろよ、<b>ルヴィ</b>！」
line = "「あ……じゃあ、呼び方！　友達だっていうんなら『チナさん』はやめろよ、<b>ルヴィ</b>！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ルヴィ……？　ああ、それって、あれね？　愛称って、やつね。ヒト同士が、友好の証を証明する際に用いる、呼び名ね……」
line = "「ルヴィ……？　ああ、それって、あれね？　愛称って、やつね。ヒト同士が、友好の証を証明する際に用いる、呼び名ね……」"

[[dialogue]]
speaker = "チナ"
# 「合ってるけど……お前たまに変なこと言うよなあ。ま、いいや。好きに呼んでくれよ」
line = "「合ってるけど……お前たまに変なこと言うよなあ。ま、いいや。好きに呼んでくれよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……じゃあ、<b>チナ</b>。今日からそう呼ぶわ」
line = "「……じゃあ、<b>チナ</b>。今日からそう呼ぶわ」"

[[dialogue]]
speaker = "チナ"
# 「おう！　そうだ、明日あいつらにもさ、好きな呼び方、聞いてみようぜ？」
line = "「おう！　そうだ、明日あいつらにもさ、好きな呼び方、聞いてみようぜ？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「…………うん」
line = "「…………うん」"

[[dialogue]]
speaker = "unk"
# 微笑むルヴィネを見て、チナは思う──この子は女神の遣いではあるが、それを除けば自分とまったく変わらない、１人の少女なのだと。
line = "微笑むルヴィネを見て、チナは思う──この子は女神の遣いではあるが、それを除けば自分とまったく変わらない、１人の少女なのだと。"

[[dialogue]]
speaker = "チナ"
# （ああ──アタシも戦いたい。いや、違うな……ルヴィに無理、させたくないんだ……）
line = "（ああ──アタシも戦いたい。いや、違うな……ルヴィに無理、させたくないんだ……）"

[[dialogue]]
speaker = "チナ"
# （お父さんとお母さんみたいな星騎士に、誰かを助けられる星騎士に、アタシも──）
line = "（お父さんとお母さんみたいな星騎士に、誰かを助けられる星騎士に、アタシも──）"

[[dialogue]]
speaker = "ルヴィネ"
# 「……チナ？　あなた、ポケットが光ってるわ……？」
line = "「……チナ？　あなた、ポケットが光ってるわ……？」"

[[dialogue]]
speaker = "チナ"
# 「え？　あっ──」
line = "「え？　あっ──」"

[[dialogue]]
speaker = "チナ"
# 「…………マジか」
line = "「…………マジか」"

[[dialogue]]
speaker = "ルヴィネ"
# 「おめでとう、チナ。これで５人目ね……」
line = "「おめでとう、チナ。これで５人目ね……」"

[[dialogue]]
speaker = "unk"
# 香堂チナは守護星を得た。流星群以降、失ってばかりの彼女にとって、それはようやく手に入れた確かな希望だった──
line = "香堂チナは守護星を得た。流星群以降、失ってばかりの彼女にとって、それはようやく手に入れた確かな希望だった──"

[[dialogue]]
speaker = "unk"
# 緋宮クロトに見捨てられ、陸の孤島となったデネブの流星市国には、何もなかった。
line = "緋宮クロトに見捨てられ、陸の孤島となったデネブの流星市国には、何もなかった。"

[[dialogue]]
speaker = "unk"
# まともな食糧はすでになく。『ひずみ』のほんの小さな隙間から降り注ぐわずかな雨水を、布と砂利で<ruby=こ>濾</ruby>して、沸騰させてから飲むような暮らし。
line = "まともな食糧はすでになく。『ひずみ』のほんの小さな隙間から降り注ぐわずかな雨水を、布と砂利で<ruby>濾<rt>こ</rt></ruby>して、沸騰させてから飲むような暮らし。"

[[dialogue]]
speaker = "unk"
# おしゃれもできない、遊ぶものもない、学園もないし、家族もいない。
line = "おしゃれもできない、遊ぶものもない、学園もないし、家族もいない。"

[[dialogue]]
speaker = "unk"
# けれど、そんな状況でも彼女たちは懸命に生き続けた。
line = "けれど、そんな状況でも彼女たちは懸命に生き続けた。"

[[dialogue]]
speaker = "チナ"
# （魔王クロトがいなくなった今、アタシたちがデネブを守るんだ……！）
line = "（魔王クロトがいなくなった今、アタシたちがデネブを守るんだ……！）"

[[dialogue]]
speaker = "unk"
# 極限状況で星力を身に着けた５人の間には、いつしか深い絆が芽生えていた。
line = "極限状況で星力を身に着けた５人の間には、いつしか深い絆が芽生えていた。"

[[dialogue]]
speaker = "unk"
# 全員が北極星にまつわる守護星をもつ彼女たちは、避難民にとって心の支えであり……
line = "全員が北極星にまつわる守護星をもつ彼女たちは、避難民にとって心の支えであり……"

[[dialogue]]
speaker = "unk"
# ルヴィネをリーダーとしたこの５人は、避難民たちから『ポラリス』と呼ばれるようになるのだった。
line = "ルヴィネをリーダーとしたこの５人は、避難民たちから『ポラリス』と呼ばれるようになるのだった。"

[[dialogue]]
speaker = "unk"
# そうして流星群から、ちょうど４ヵ月が経過した頃──流星市国を取り囲む空間のひずみは消失し、救助のヘリがやってきた。
line = "そうして流星群から、ちょうど４ヵ月が経過した頃──流星市国を取り囲む空間のひずみは消失し、救助のヘリがやってきた。"

[[dialogue]]
speaker = "unk"
# ５人の少女たちが守りぬいた、流星市国民の総数は３９７人。
line = "５人の少女たちが守りぬいた、流星市国民の総数は３９７人。"

[[dialogue]]
speaker = "unk"
# 多数の負傷者に病人、全員が栄養失調状態でこそあったが、全住民が死亡したと噂されていた諸外国にとって、それはまさに不幸の中に輝く快挙。
line = "多数の負傷者に病人、全員が栄養失調状態でこそあったが、全住民が死亡したと噂されていた諸外国にとって、それはまさに不幸の中に輝く快挙。"

[[dialogue]]
speaker = "unk"
# その日から流星市国を救った奇跡の天使と、その友人である少女たちの名前は、デネブの人々に強く強く記憶されることになる──
line = "その日から流星市国を救った奇跡の天使と、その友人である少女たちの名前は、デネブの人々に強く強く記憶されることになる──"
