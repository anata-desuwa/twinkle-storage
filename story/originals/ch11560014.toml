[[dialogue]]
speaker = "unk"
# 第４話,それぞれの世界へ,P
line = "第４話,それぞれの世界へ,P"

[[dialogue]]
speaker = "unk"
# トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。
line = "トレジアンナからの連絡を受けて、いろは、花織、ここあの３人は渋谷へと向かう。"

[[dialogue]]
speaker = "unk"
# そこは彼女たちが、異世界より最初にたどり着いた場所だった。
line = "そこは彼女たちが、異世界より最初にたどり着いた場所だった。"

[[dialogue]]
speaker = "トレジアンナ"
# 「──戻って来たようです！」
line = "「──戻って来たようです！」"

[[dialogue]]
speaker = "unk"
# トレジアンナがそう発した直後、目の前の空間が歪んだ。
line = "トレジアンナがそう発した直後、目の前の空間が歪んだ。"

[[dialogue]]
speaker = "unk"
# そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。
line = "そして次の瞬間、オムニスを抱えた、いろはたちのよく知る陽彩の姿が現れた。"

[[dialogue]]
speaker = "陽彩"
# 「ごめん、みんな……心配をかけた」
line = "「ごめん、みんな……心配をかけた」"

[[dialogue]]
speaker = "unk"
# 陽彩は寄生していた悪魔から、無事に解放された。
line = "陽彩は寄生していた悪魔から、無事に解放された。"

[[dialogue]]
speaker = "unk"
# 事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。
line = "事の顛末を陽彩の口から聞いた後、いよいよいろはたちは元の世界へと戻ることになった。"

[[dialogue]]
speaker = "花織"
# 「いろは、帰りの準備はちゃんと出来てる？　忘れ物してても取りには戻れないんだからね？」
line = "「いろは、帰りの準備はちゃんと出来てる？　忘れ物してても取りには戻れないんだからね？」"

[[dialogue]]
speaker = "いろは"
# 「大丈夫だって。カオリンこそ忘れ物はない？」
line = "「大丈夫だって。カオリンこそ忘れ物はない？」"

[[dialogue]]
speaker = "花織"
# 「もちろん！　ルカルカちゃんのトレカもちゃんと持ってるよ！」
line = "「もちろん！　ルカルカちゃんのトレカもちゃんと持ってるよ！」"

[[dialogue]]
speaker = "ここあ"
# 「でも世界を転移した時に無くなっちゃうかもしれないんだから、覚悟はちゃーんとしとかないと」
line = "「でも世界を転移した時に無くなっちゃうかもしれないんだから、覚悟はちゃーんとしとかないと」"

[[dialogue]]
speaker = "花織"
# 「悲しいけど、その時は潔く諦めます……」
line = "「悲しいけど、その時は潔く諦めます……」"

[[dialogue]]
speaker = "サチ"
# 「花織さん、短い間でしたけど、一緒に過ごせて楽しかったです」
line = "「花織さん、短い間でしたけど、一緒に過ごせて楽しかったです」"

[[dialogue]]
speaker = "花織"
# 「ありがとう、サチちゃん。ウチもだよ！」
line = "「ありがとう、サチちゃん。ウチもだよ！」"

[[dialogue]]
speaker = "オムニス"
# 「みんながお世話になったみたいで、ありがとう」
line = "「みんながお世話になったみたいで、ありがとう」"

[[dialogue]]
speaker = "サチ"
# 「どういたしまして。花織さんもこれでようやく安心できますね」
line = "「どういたしまして。花織さんもこれでようやく安心できますね」"

[[dialogue]]
speaker = "花織"
# 「えっ？」
line = "「えっ？」"

[[dialogue]]
speaker = "サチ"
# 「オムニスさんと離れ離れになって、ずいぶんと不安そうにされていましたから」
line = "「オムニスさんと離れ離れになって、ずいぶんと不安そうにされていましたから」"

[[dialogue]]
speaker = "オムニス"
# 「そうなのか？　心配かけて悪かったな」
line = "「そうなのか？　心配かけて悪かったな」"

[[dialogue]]
speaker = "花織"
# 「いやいや！　心配なんてしてなかったし！」
line = "「いやいや！　心配なんてしてなかったし！」"

[[dialogue]]
speaker = "花織"
# 「こっちの世界でもサチちゃんや、他にもいっぱい友達が出来て、全然寂しくなんかなかったんだからっ」
line = "「こっちの世界でもサチちゃんや、他にもいっぱい友達が出来て、全然寂しくなんかなかったんだからっ」"

[[dialogue]]
speaker = "プリムラ"
# 「なんじゃ、素直じゃないのう」
line = "「なんじゃ、素直じゃないのう」"

[[dialogue]]
speaker = "ここあ"
# 「繊細な乙女心ってやつかな～♪　オムにゃん、ちゃんと察してあげてね～」
line = "「繊細な乙女心ってやつかな～♪　オムにゃん、ちゃんと察してあげてね～」"

[[dialogue]]
speaker = "オムニス"
# 「え？　察するって、何を……」
line = "「え？　察するって、何を……」"

[[dialogue]]
speaker = "花織"
# 「そんなんじゃありませんってば！」
line = "「そんなんじゃありませんってば！」"

[[dialogue]]
speaker = "いろは"
# 「大丈夫だよ！　今日からまたオムオムと一緒だし、寂しくないって！」
line = "「大丈夫だよ！　今日からまたオムオムと一緒だし、寂しくないって！」"

[[dialogue]]
speaker = "いろは"
# 「欲を言えば、オムオムにもこっちの世界を楽しんで欲しかったな～」
line = "「欲を言えば、オムオムにもこっちの世界を楽しんで欲しかったな～」"

[[dialogue]]
speaker = "花織"
# 「それは本当にそうだね」
line = "「それは本当にそうだね」"

[[dialogue]]
speaker = "花織"
# 「ウチらの居た世界とよく似てるけど、ちょっとずつ色んなところが違ってる世界」
line = "「ウチらの居た世界とよく似てるけど、ちょっとずつ色んなところが違ってる世界」"

[[dialogue]]
speaker = "花織"
# 「みんなウチらに本当に良くしてくれて……あはは、これでお別れだって思うと、ちょっと寂しいかも」
line = "「みんなウチらに本当に良くしてくれて……あはは、これでお別れだって思うと、ちょっと寂しいかも」"

[[dialogue]]
speaker = "トレジアンナ"
# 「まあまあ、一度来ることが出来たのですから、二度目もあるかもしれませんし」
line = "「まあまあ、一度来ることが出来たのですから、二度目もあるかもしれませんし」"

[[dialogue]]
speaker = "シズハ"
# 「その時にはオムニスさんも一緒に遊びましょう♪」
line = "「その時にはオムニスさんも一緒に遊びましょう♪」"

[[dialogue]]
speaker = "オムニス"
# 「ああ、よろしく頼む」
line = "「ああ、よろしく頼む」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ではそろそろ始めましょう。みなさん心の準備はよろしいですか？」
line = "「ではそろそろ始めましょう。みなさん心の準備はよろしいですか？」"

[[dialogue]]
speaker = "花織"
# 「うん、大丈夫」
line = "「うん、大丈夫」"

[[dialogue]]
speaker = "いろは"
# 「いつでもお願いしまーす♪」
line = "「いつでもお願いしまーす♪」"

[[dialogue]]
speaker = "サチ"
# 「悪魔との戦い、大変なことが待ち受けていると思いますが、頑張ってくださいね」
line = "「悪魔との戦い、大変なことが待ち受けていると思いますが、頑張ってくださいね」"

[[dialogue]]
speaker = "サチ"
# 「必ず生き残って、また会いましょう！」
line = "「必ず生き残って、また会いましょう！」"

[[dialogue]]
speaker = "花織"
# 「ありがとう！　ウチ、頑張るから！」
line = "「ありがとう！　ウチ、頑張るから！」"

[[dialogue]]
speaker = "花織"
# 「みんなで力を合わせて世界を守ってみせる。だから、サチちゃんたちも頑張って世界を守ってね！」
line = "「みんなで力を合わせて世界を守ってみせる。だから、サチちゃんたちも頑張って世界を守ってね！」"

[[dialogue]]
speaker = "サチ"
# 「はいっ！」
line = "「はいっ！」"

[[dialogue]]
speaker = "オムニス"
# 「ではトレジアンナさん、お願いします」
line = "「ではトレジアンナさん、お願いします」"

[[dialogue]]
speaker = "unk"
# ──こうして、突然始まった花織たちの異世界生活は幕を閉じた。
line = "──こうして、突然始まった花織たちの異世界生活は幕を閉じた。"

[[dialogue]]
speaker = "unk"
# 再び、魔法少女たちがまみえる可能性は限りなく低い。
line = "再び、魔法少女たちがまみえる可能性は限りなく低い。"

[[dialogue]]
speaker = "unk"
# だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。
line = "だが、ゼロではないその可能性を信じて、２つの世界の魔法少女たちは、それぞれに立ちはだかる試練に向かって挑んでいくのだった。"
