line = "「――髪が綺麗だから、どうしても１度やってみたかった？　あ、あなたが私の髪をそんな性的な目で見てるなんて……へ、変態ですわよっ<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「んっ……<emoji=heart04>　頭を優しくなでながら、お願いするのは……卑怯ですわ<emoji=heart04>」
