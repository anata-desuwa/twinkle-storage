[[dialogue]]
speaker = "unk"
# ヒルディオーネ先輩と恋人になり、付き合い始めてからしばらく経った、ある日のこと。
line = "ヒルディオーネ先輩と恋人になり、付き合い始めてからしばらく経った、ある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は先輩と一緒に、日課の夜トレーニングをこなしていた――
line = "俺は先輩と一緒に、日課の夜トレーニングをこなしていた――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふぅ……今日はこれくらいにしておきましょうか。ふふっ、会長、出会った頃とは比較にならない程に強くなりましたね」
line = "「ふぅ……今日はこれくらいにしておきましょうか。ふふっ、会長、出会った頃とは比較にならない程に強くなりましたね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「土壇場の覚醒などなくとも、スチームドレスで身体強化している私と格闘戦で互角。もはや誰も、あなたの実力を疑う者などおりませんわ」
line = "「土壇場の覚醒などなくとも、スチームドレスで身体強化している私と格闘戦で互角。もはや誰も、あなたの実力を疑う者などおりませんわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それでこそ私の……ん、んんっ……いえ、何でもありませんわ。さて、会長……今日はまだ、時間はありますかしら？」
line = "「それでこそ私の……ん、んんっ……いえ、何でもありませんわ。さて、会長……今日はまだ、時間はありますかしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「こ、こほんっ。……よろしければ、この後、私の部屋でティータイムでもいかがでしょう？」
line = "「こ、こほんっ。……よろしければ、この後、私の部屋でティータイムでもいかがでしょう？」"

[[dialogue]]
speaker = "unk"
# 先輩が『部屋でティータイム』と言い出すのは、防音設備のしっかりしている流星寮の自室で、誰にも見られないように<b>したい</b>という合図だ。
line = "先輩が『部屋でティータイム』と言い出すのは、防音設備のしっかりしている流星寮の自室で、誰にも見られないように<b>したい</b>という合図だ。"

[[dialogue]]
speaker = "unk"
# それは最近、もう１つの日課とも言えるくらいの頻度になりつつあり……そのせいで俺は、トレーニング中からついつい期待してしまっているのだった――
line = "それは最近、もう１つの日課とも言えるくらいの頻度になりつつあり……そのせいで俺は、トレーニング中からついつい期待してしまっているのだった――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「って、突然なんですのこれーーーーーーっ！！？」
line = "「って、突然なんですのこれーーーーーーっ！！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「シャワーを浴びるならお願いがあるって、なにかと思えば……か、髪コキだなんて、私の髪はおもちゃじゃありませんのよ！？」
line = "「シャワーを浴びるならお願いがあるって、なにかと思えば……か、髪コキだなんて、私の髪はおもちゃじゃありませんのよ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
