[[dialogue]]
speaker = "unk"
# 第２話,演劇とヒメ,P
line = "第２話,演劇とヒメ,P"

[[dialogue]]
speaker = "unk"
# 今日はヒメのために、新星学園を案内していた。
line = "今日はヒメのために、新星学園を案内していた。"

[[dialogue]]
speaker = "unk"
# 彼女がとりわけ興味を持ったのは演劇部だ。
line = "彼女がとりわけ興味を持ったのは演劇部だ。"

[[dialogue]]
speaker = "藍"
# 「……ふぅ。こんなところでしょうか」
line = "「……ふぅ。こんなところでしょうか」"

[[dialogue]]
speaker = "オオヒメ"
# 「見事な演技だった、藍殿。稽古中に押しかけてしまってすまないな」
line = "「見事な演技だった、藍殿。稽古中に押しかけてしまってすまないな」"

[[dialogue]]
speaker = "藍"
# 「いえいえそんな、守護天使様にお褒めいただくなんて、畏れ多いです……」
line = "「いえいえそんな、守護天使様にお褒めいただくなんて、畏れ多いです……」"

[[dialogue]]
speaker = "オオヒメ"
# 「だがこれから研鑽を積み、本番ではより真に迫った演技になる。脚本が真価を発揮するのはその時だ。そうだろう？」
line = "「だがこれから研鑽を積み、本番ではより真に迫った演技になる。脚本が真価を発揮するのはその時だ。そうだろう？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「ほう、わかるか。さすがは守護天使といったところだな」
line = "「ほう、わかるか。さすがは守護天使といったところだな」"

[[dialogue]]
speaker = "オオヒメ"
# 「まぁ、芸を見るのはただの趣味なのだが。私の権能とは特に関係ないところだ」
line = "「まぁ、芸を見るのはただの趣味なのだが。私の権能とは特に関係ないところだ」"

[[dialogue]]
speaker = "unk"
# そろそろ次の部に行く？
line = "そろそろ次の部に行く？"

[[dialogue]]
speaker = "ロクサーナ"
# 「おっと、その前に体験入部といかないか？　舞台に興味があるのなら、一度役者になってみるのも悪くなかろう」
line = "「おっと、その前に体験入部といかないか？　舞台に興味があるのなら、一度役者になってみるのも悪くなかろう」"

[[dialogue]]
speaker = "オオヒメ"
# 「私が役者に……ということか？　お願いしたいところではあるが、稽古で忙しいのではないか？」
line = "「私が役者に……ということか？　お願いしたいところではあるが、稽古で忙しいのではないか？」"

[[dialogue]]
speaker = "藍"
# 「部長がお客さんに親切にするなんて珍しいですね。いつもは人が来ても邪魔だって追い返すのに」
line = "「部長がお客さんに親切にするなんて珍しいですね。いつもは人が来ても邪魔だって追い返すのに」"

[[dialogue]]
speaker = "ロクサーナ"
# 「私とて守護天使に褒められれば機嫌も良くなるものだ。それに取材も兼ねている。守護天使とお近づきになる機会はそうそうないからな」
line = "「私とて守護天使に褒められれば機嫌も良くなるものだ。それに取材も兼ねている。守護天使とお近づきになる機会はそうそうないからな」"

[[dialogue]]
speaker = "オオヒメ"
# 「なるほど、そういうことであればお言葉に甘えさせてもらおう」
line = "「なるほど、そういうことであればお言葉に甘えさせてもらおう」"

[[dialogue]]
speaker = "ロクサーナ"
# 「では藍、ラプンツェルの台本を持ってきてくれ」
line = "「では藍、ラプンツェルの台本を持ってきてくれ」"

[[dialogue]]
speaker = "オオヒメ"
# 「ラプンツェル……塔の上から長い髪を垂らして、王子を招き入れるのだったか。　ん？　もしかして私がやるのはラプンツェルか……？」
line = "「ラプンツェル……塔の上から長い髪を垂らして、王子を招き入れるのだったか。　ん？　もしかして私がやるのはラプンツェルか……？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「もちろんだ。せっかくの体験入部だというのに、端役をやってどうする」
line = "「もちろんだ。せっかくの体験入部だというのに、端役をやってどうする」"

[[dialogue]]
speaker = "ロクサーナ"
# 「そして相手役の王子は会長だ。会長は我が部の舞台の主役を務めたこともあるからな、優しくエスコートしてくれるぞ」
line = "「そして相手役の王子は会長だ。会長は我が部の舞台の主役を務めたこともあるからな、優しくエスコートしてくれるぞ」"

[[dialogue]]
speaker = "オオヒメ"
# 「なっ！？　そそ、それは心の準備が──」
line = "「なっ！？　そそ、それは心の準備が──」"

[[dialogue]]
speaker = "unk"
# よろしく、ヒメ
line = "よろしく、ヒメ"

[[dialogue]]
speaker = "オオヒメ"
# 「あ……うぅ……よ、よろしく頼む」
line = "「あ……うぅ……よ、よろしく頼む」"

[[dialogue]]
speaker = "藍"
# 「台本をどうぞ。書き込みもあるので少し読みにくいかもしれませんが」
line = "「台本をどうぞ。書き込みもあるので少し読みにくいかもしれませんが」"

[[dialogue]]
speaker = "オオヒメ"
# 「あ、ありがとう。どれどれ……なるほど、舞台の脚本はこうなっているのか」
line = "「あ、ありがとう。どれどれ……なるほど、舞台の脚本はこうなっているのか」"

[[dialogue]]
speaker = "オオヒメ"
# 「ひぁっ！？　キ、キスのシーンもあるのか！？」
line = "「ひぁっ！？　キ、キスのシーンもあるのか！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「キスくらいで驚いてどうする。これでも随分マイルドにしたのだ。原典では王子と──」
line = "「キスくらいで驚いてどうする。これでも随分マイルドにしたのだ。原典では王子と──」"

[[dialogue]]
speaker = "オオヒメ"
# 「わ～～～～っ！？　それは言わなくていい！」
line = "「わ～～～～っ！？　それは言わなくていい！」"

[[dialogue]]
speaker = "unk"
# そして台本読みの後、実際に演技をしてみることに。
line = "そして台本読みの後、実際に演技をしてみることに。"

[[dialogue]]
speaker = "藍"
# 「王子はラプンツェルの髪を梯子にして塔を登りました。しかしラプンツェルは、初めて見た男性に驚き、怯えてしまいます」
line = "「王子はラプンツェルの髪を梯子にして塔を登りました。しかしラプンツェルは、初めて見た男性に驚き、怯えてしまいます」"

[[dialogue]]
speaker = "オオヒメ"
# 「あ、あの……」
line = "「あ、あの……」"

[[dialogue]]
speaker = "unk"
# 君があの歌声の主だったんだね
line = "君があの歌声の主だったんだね"

[[dialogue]]
speaker = "オオヒメ"
# 「は、はい……塔の中では他にすることがありませんでしたので……。お<ruby=かあさま>義母様</ruby>はうるさいと言うのですが、あなたのお気に召したのでしょうか」
line = "「は、はい……塔の中では他にすることがありませんでしたので……。お<ruby>義母様<rt>かあさま</rt></ruby>はうるさいと言うのですが、あなたのお気に召したのでしょうか」"

[[dialogue]]
speaker = "unk"
# ああ、今までで最高の歌だよ
line = "ああ、今までで最高の歌だよ"

[[dialogue]]
speaker = "オオヒメ"
# 「──！　そ、そうですか……」
line = "「──！　そ、そうですか……」"

[[dialogue]]
speaker = "unk"
# 君の髪もとっても綺麗だ
line = "君の髪もとっても綺麗だ"

[[dialogue]]
speaker = "オオヒメ"
# 「そんな……お恥ずかしいです……」
line = "「そんな……お恥ずかしいです……」"

[[dialogue]]
speaker = "藍"
# （王子に褒められてあんなに嬉しそうに……初めてとは思えない演技ですね）
line = "（王子に褒められてあんなに嬉しそうに……初めてとは思えない演技ですね）"

[[dialogue]]
speaker = "ロクサーナ"
# （いや、あれは演技か？　チョロいだけにしか見えんが）
line = "（いや、あれは演技か？　チョロいだけにしか見えんが）"

[[dialogue]]
speaker = "ロクサーナ"
# 「何度か会ううちにラプンツェルの恐怖心は薄れ、やがて王子に好意を抱くようになる。そして２人はしっぽりと──」
line = "「何度か会ううちにラプンツェルの恐怖心は薄れ、やがて王子に好意を抱くようになる。そして２人はしっぽりと──」"

[[dialogue]]
speaker = "オオヒメ"
# 「待て待て待て待て！？　舞台どころではなくなってしまうぞ！？」
line = "「待て待て待て待て！？　舞台どころではなくなってしまうぞ！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「まったく、そこがラプンツェルの肝だろうに。とはいえ廃部になってはたまらんから、演劇部の脚本ではキスでごまかしてある」
line = "「まったく、そこがラプンツェルの肝だろうに。とはいえ廃部になってはたまらんから、演劇部の脚本ではキスでごまかしてある」"

[[dialogue]]
speaker = "オオヒメ"
# 「そ、そうか、それなら大丈夫……」
line = "「そ、そうか、それなら大丈夫……」"

[[dialogue]]
speaker = "オオヒメ"
# 「──ではない！？　そうだ、そのシーンがあるのだったな……」
line = "「──ではない！？　そうだ、そのシーンがあるのだったな……」"

[[dialogue]]
speaker = "オオヒメ"
# 「……キスするふり？　ま、まぁ、そういうことなら──って近い近い近い！？」
line = "「……キスするふり？　ま、まぁ、そういうことなら──って近い近い近い！？」"

[[dialogue]]
speaker = "ロクサーナ"
# 「何を臆している！　守護天使だろうが役者ならば容赦はせんぞ！」
line = "「何を臆している！　守護天使だろうが役者ならば容赦はせんぞ！」"

[[dialogue]]
speaker = "オオヒメ"
# 「そう言われても……！？」
line = "「そう言われても……！？」"

[[dialogue]]
speaker = "unk"
# 嫌ならここでやめておくけど
line = "嫌ならここでやめておくけど"

[[dialogue]]
speaker = "オオヒメ"
# 「い、嫌ではないんだが……」
line = "「い、嫌ではないんだが……」"

[[dialogue]]
speaker = "unk"
# それじゃいくよ
line = "それじゃいくよ"

[[dialogue]]
speaker = "オオヒメ"
# 「ま、ままま、待って、心の準備が──」
line = "「ま、ままま、待って、心の準備が──」"

[[dialogue]]
speaker = "オオヒメ"
# 「ひぁああああああ～～～～～～～～っ！！？」
line = "「ひぁああああああ～～～～～～～～っ！！？」"

[[dialogue]]
speaker = "unk"
# ヒメは目を回してひっくり返ってしまい、演劇部の体験入部は中止に。
line = "ヒメは目を回してひっくり返ってしまい、演劇部の体験入部は中止に。"

[[dialogue]]
speaker = "unk"
# 「役者は大変なのだな……」と後にヒメは語ったのだった。
line = "「役者は大変なのだな……」と後にヒメは語ったのだった。"
