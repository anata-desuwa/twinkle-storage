[[dialogue]]
speaker = "unk"
# 第３話,ベアトと水泳デート,P
line = "第３話,ベアトと水泳デート,P"

[[dialogue]]
speaker = "ベアトリス"
# 「手を交互に回しながら、はぁはぁっ、水を蹴るように足を動かして……」
line = "「手を交互に回しながら、はぁはぁっ、水を蹴るように足を動かして……」"

[[dialogue]]
speaker = "ベアトリス"
# 「ぷはっ。どうですか？　上手に泳げてますか？」
line = "「ぷはっ。どうですか？　上手に泳げてますか？」"

[[dialogue]]
speaker = "unk"
# 上手い上手い、しっかり泳げてるよ
line = "上手い上手い、しっかり泳げてるよ"

[[dialogue]]
speaker = "ベアトリス"
# 「えへへ、良かったです。この間、リゾート結界の新モードに挑戦した時に、選管のみんなに泳ぎ方を教えてもらったんですよ」
line = "「えへへ、良かったです。この間、リゾート結界の新モードに挑戦した時に、選管のみんなに泳ぎ方を教えてもらったんですよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「みんなそれぞれ違った泳ぎ方を教えようとしてくれて、でも途中で話が脱線して──ふふ、あれは面白かったなぁ」
line = "「みんなそれぞれ違った泳ぎ方を教えようとしてくれて、でも途中で話が脱線して──ふふ、あれは面白かったなぁ」"

[[dialogue]]
speaker = "アポロ"
# 「海で泳ぐ方法？　それなら、こうだ！　手足を思いっきりバタバタさせれば、どこまででも泳げるぞ！」
line = "「海で泳ぐ方法？　それなら、こうだ！　手足を思いっきりバタバタさせれば、どこまででも泳げるぞ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「犬かきでそこまで速度が出るのはアポロだけだよ。大事なのは水音を立てないことじゃない？　獲物に気付かれちゃうから」
line = "「犬かきでそこまで速度が出るのはアポロだけだよ。大事なのは水音を立てないことじゃない？　獲物に気付かれちゃうから」"

[[dialogue]]
speaker = "梨緒"
# 「そう静かに速く泳げるのもナターシャくらいだ。基本はやはりクロールや平泳ぎじゃないか？」
line = "「そう静かに速く泳げるのもナターシャくらいだ。基本はやはりクロールや平泳ぎじゃないか？」"

[[dialogue]]
speaker = "梨緒"
# 「もっとも、まずは水に浮くことに慣れるのが先決だと思うぞ。浮かないことには溺れてしまうからな」
line = "「もっとも、まずは水に浮くことに慣れるのが先決だと思うぞ。浮かないことには溺れてしまうからな」"

[[dialogue]]
speaker = "アポロ"
# 「つったら、やっぱ手足をバタバタ動かすのが一番だろ！　動いてねーと沈んでいくばっかだからな！」
line = "「つったら、やっぱ手足をバタバタ動かすのが一番だろ！　動いてねーと沈んでいくばっかだからな！」"

[[dialogue]]
speaker = "ナターシャ"
# 「それだと体力を消耗しちゃうって。水面から目と鼻だけを出して、静かにしたたかに、水を蹴って浮くのが潜伏泳法のコツだよ」
line = "「それだと体力を消耗しちゃうって。水面から目と鼻だけを出して、静かにしたたかに、水を蹴って浮くのが潜伏泳法のコツだよ」"

[[dialogue]]
speaker = "梨緒"
# 「潜伏する必要はないだろう。むしろ両手両足を大きく広げて、体の力をできるだけ抜いて水面に寝転がるといい」
line = "「潜伏する必要はないだろう。むしろ両手両足を大きく広げて、体の力をできるだけ抜いて水面に寝転がるといい」"

[[dialogue]]
speaker = "アポロ"
# 「背泳ぎってヤツだろー？　でも、それはナターシャやベアトみてーにデッカい浮き袋が胸についてるヤツ限定じゃねーのかっ！？」
line = "「背泳ぎってヤツだろー？　でも、それはナターシャやベアトみてーにデッカい浮き袋が胸についてるヤツ限定じゃねーのかっ！？」"

[[dialogue]]
speaker = "アポロ"
# 「あたしとか梨緒は、手足をバタバタさせた方が浮けるって！　絶対そーだぜっ！」
line = "「あたしとか梨緒は、手足をバタバタさせた方が浮けるって！　絶対そーだぜっ！」"

[[dialogue]]
speaker = "梨緒"
# 「……待て、聞き捨てならない。胸の大きさが関係あるかはさておき、ナターシャほどじゃないが私もそれなりにあるんだぞ」
line = "「……待て、聞き捨てならない。胸の大きさが関係あるかはさておき、ナターシャほどじゃないが私もそれなりにあるんだぞ」"

[[dialogue]]
speaker = "ナターシャ"
# 「なら背泳ぎ勝負でもする？　案外、梨緒が最初に脱落しちゃうかもよ？」
line = "「なら背泳ぎ勝負でもする？　案外、梨緒が最初に脱落しちゃうかもよ？」"

[[dialogue]]
speaker = "梨緒"
# 「望むところだ……！　ちょっと大きめのブイがついているからって調子に乗るんじゃないぞナターシャ！　むしろ過剰な浮力は不安定さに繋がるんだからなっ！」
line = "「望むところだ……！　ちょっと大きめのブイがついているからって調子に乗るんじゃないぞナターシャ！　むしろ過剰な浮力は不安定さに繋がるんだからなっ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「それから泳ぎ方を教えるのそっちのけで、誰が最後まで水に浮いていられるのか勝負になって──気付いたら、ただみんなと海ではしゃぎ回ってて」
line = "「それから泳ぎ方を教えるのそっちのけで、誰が最後まで水に浮いていられるのか勝負になって──気付いたら、ただみんなと海ではしゃぎ回ってて」"

[[dialogue]]
speaker = "ベアトリス"
# 「おかげで泳ぎ方はほとんど我流になっちゃいました。沈まないようにするのだけは得意中の得意になりましたけど♪」
line = "「おかげで泳ぎ方はほとんど我流になっちゃいました。沈まないようにするのだけは得意中の得意になりましたけど♪」"

[[dialogue]]
speaker = "unk"
# 背泳ぎ勝負か……
line = "背泳ぎ勝負か……"

[[dialogue]]
speaker = "ベアトリス"
# 「わわっ、どこを見てるんですかっ。エッチですよ、エッチ……！　そういうのは、バレないように覗いてください……！」
line = "「わわっ、どこを見てるんですかっ。エッチですよ、エッチ……！　そういうのは、バレないように覗いてください……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「バレないように覗かれる分には、私も恥ずかしくありませんから……。会長さんに見られる分には、その、私も悪い気はしませんし……」
line = "「バレないように覗かれる分には、私も恥ずかしくありませんから……。会長さんに見られる分には、その、私も悪い気はしませんし……」"

[[dialogue]]
speaker = "ベアトリス"
# 「って──私はなんの話をっ！？　そうじゃなくてですね、今日は泳ぎの練習に付き合って欲しいってお願いしてるんですっ！」
line = "「って──私はなんの話をっ！？　そうじゃなくてですね、今日は泳ぎの練習に付き合って欲しいってお願いしてるんですっ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「結局、我流になっちゃいましたから、改めてきちんとした泳ぎ方を覚えたくて。会長さんの時間をもらっちゃって悪いんですけど」
line = "「結局、我流になっちゃいましたから、改めてきちんとした泳ぎ方を覚えたくて。会長さんの時間をもらっちゃって悪いんですけど」"

[[dialogue]]
speaker = "unk"
# 俺も楽しんでるから気にしないで
line = "俺も楽しんでるから気にしないで"

[[dialogue]]
speaker = "ベアトリス"
# 「そう言ってもらえると安心です。私も、その、楽しいですよ？」
line = "「そう言ってもらえると安心です。私も、その、楽しいですよ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さんに手取り足取り、泳ぎ方を教えてもらえて。勇気を出してお願いしてみて正解でした」
line = "「会長さんに手取り足取り、泳ぎ方を教えてもらえて。勇気を出してお願いしてみて正解でした」"

[[dialogue]]
speaker = "ベアトリス"
# 「それにここなら……誰にも邪魔されずに２人きりで過ごせますしね……？」
line = "「それにここなら……誰にも邪魔されずに２人きりで過ごせますしね……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「って──さっきから私、何を言って……！？　あはは、海に入ってるのに顔が熱くなってきちゃいましたっ」
line = "「って──さっきから私、何を言って……！？　あはは、海に入ってるのに顔が熱くなってきちゃいましたっ」"

[[dialogue]]
speaker = "ベアトリス"
# 「泳ぎましょう！　泳げるうちに泳がなくちゃ損ですし！」
line = "「泳ぎましょう！　泳げるうちに泳がなくちゃ損ですし！」"

[[dialogue]]
speaker = "ベアトリス"
# 「こうして泳げるのも今だけかもしれませんからっ。星力がなくなったら、水に沈む体質になっちゃうかもしれませんし！」
line = "「こうして泳げるのも今だけかもしれませんからっ。星力がなくなったら、水に沈む体質になっちゃうかもしれませんし！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ということで、バシャバシャバシャ～～！！」
line = "「ということで、バシャバシャバシャ～～！！」"

[[dialogue]]
speaker = "unk"
# その時は
line = "その時は"

[[dialogue]]
speaker = "ベアトリス"
# 「はい？」
line = "「はい？」"

[[dialogue]]
speaker = "unk"
# その時は俺が支えるよ
line = "その時は俺が支えるよ"

[[dialogue]]
speaker = "ベアトリス"
# 「～～っ！！　ふ、不思議、です。選管のみんなにも同じようなこと言ってもらったのに……」
line = "「～～っ！！　ふ、不思議、です。選管のみんなにも同じようなこと言ってもらったのに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「会長さんに言われると、なんだか胸がドキドキして……。今にも全力で泳ぎ回りたいほどソワソワしちゃって……」
line = "「会長さんに言われると、なんだか胸がドキドキして……。今にも全力で泳ぎ回りたいほどソワソワしちゃって……」"

[[dialogue]]
speaker = "ベアトリス"
# 「それじゃあ、お願いしてもいいですか？」
line = "「それじゃあ、お願いしてもいいですか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「もし私がいつか泳げない体になったら、こうして……支えてくれるって」
line = "「もし私がいつか泳げない体になったら、こうして……支えてくれるって」"

[[dialogue]]
speaker = "ベアトリス"
# 「……ふふ、約束ですよ？　浮き輪じゃ嫌ですからね？　こうして体に手を回して……しっかり私を支えてくださいよ？」
line = "「……ふふ、約束ですよ？　浮き輪じゃ嫌ですからね？　こうして体に手を回して……しっかり私を支えてくださいよ？」"

[[dialogue]]
speaker = "unk"
# ベアトがそう望むなら
line = "ベアトがそう望むなら"

[[dialogue]]
speaker = "ベアトリス"
# 「ふふ、もう少し泳ぐの下手っぴのままでいるべきでした。そうしたら、こうしてたくさん会長さんと密着できたのに」
line = "「ふふ、もう少し泳ぐの下手っぴのままでいるべきでした。そうしたら、こうしてたくさん会長さんと密着できたのに」"

[[dialogue]]
speaker = "ベアトリス"
# 「普段恥ずかしくて中々近くで見られないお顔とか……じーっと見られたのに……」
line = "「普段恥ずかしくて中々近くで見られないお顔とか……じーっと見られたのに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「んっ……<emoji=heart04>　ちゅっ……んんっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
# 「え、えへへ、どうしましょう……。沈んじゃいそうです……。星力も失っていないのに……」
line = "「え、えへへ、どうしましょう……。沈んじゃいそうです……。星力も失っていないのに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「約束……果たしてくださいね？　ちゃんと支えていてくださいよ？」
line = "「約束……果たしてくださいね？　ちゃんと支えていてくださいよ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ぎゅっと私のこと抱き締めて……私を溺れさせないでください」
line = "「ぎゅっと私のこと抱き締めて……私を溺れさせないでください」"

[[dialogue]]
speaker = "ベアトリス"
# 「んっ<emoji=heart04>　んふ、ちゅっ、んんっ……<emoji=heart04>」
line = "「んっ<emoji=heart04>　んふ、ちゅっ、んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ベアトリス"
# 「はぁはぁ、えへへ……溺れちゃいそうです<emoji=heart04>」
line = "「はぁはぁ、えへへ……溺れちゃいそうです<emoji=heart04>」"
