[[dialogue]]
speaker = "ヴィライア"
# 『煌竜ヴィライアが、こんないいようにやられるなんて……これが魔将の力……！？』
line = "『煌竜ヴィライアが、こんないいようにやられるなんて……これが魔将の力……！？』"

[[dialogue]]
speaker = "ヴィライア"
# 『それに魔本の制御が利かない……！　私は書庫の管理システムなのに……！』
line = "『それに魔本の制御が利かない……！　私は書庫の管理システムなのに……！』"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「決めましょう、ウィステリアさん！」
line = "「決めましょう、ウィステリアさん！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ええ！　極限術式起動──」
line = "「ええ！　極限術式起動──」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ルシファーアセンション！」
line = "「ルシファーアセンション！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「ベルフェゴールディプラヴィティ！」
line = "「ベルフェゴールディプラヴィティ！」"

[[dialogue]]
speaker = "ヴィライア"
# 『くああああっ……！！』
line = "『くああああっ……！！』"

[[dialogue]]
speaker = "unk"
# 闇の奔流を受け、竜が虚空に溶けるように消える。
line = "闇の奔流を受け、竜が虚空に溶けるように消える。"

[[dialogue]]
speaker = "unk"
# そこに残されたのは、書庫の管理システムと名乗った少女の姿だった。
line = "そこに残されたのは、書庫の管理システムと名乗った少女の姿だった。"

[[dialogue]]
speaker = "管理システム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 少女が呆けた表情で床に転がっている。作り物めいた見た目も相まって、人形が打ち捨てられているかのようだ。
line = "少女が呆けた表情で床に転がっている。作り物めいた見た目も相まって、人形が打ち捨てられているかのようだ。"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「思ったよりあっさりだったわね。どうしたの？　お腹でも痛い？」
line = "「思ったよりあっさりだったわね。どうしたの？　お腹でも痛い？」"

[[dialogue]]
speaker = "管理システム"
# 「痛くない。魔本たちが私の言うことを聞かなくなったのよ。魔本の魔力の供給がなければ、ヴィライアの姿も維持できないわ」
line = "「痛くない。魔本たちが私の言うことを聞かなくなったのよ。魔本の魔力の供給がなければ、ヴィライアの姿も維持できないわ」"

[[dialogue]]
speaker = "unk"
# そう言って少女がモネを見やると、モネは書庫の本たちに囲まれていた。
line = "そう言って少女がモネを見やると、モネは書庫の本たちに囲まれていた。"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ありがとう、みんなのおかげで勝てたよ。えっ、かっこよかった？　照れちゃうな～。あははは」
line = "「ありがとう、みんなのおかげで勝てたよ。えっ、かっこよかった？　照れちゃうな～。あははは」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# （紙屋敷さんの周りに本がいくつも浮いてる。即死級の呪いの本なんだけど、平然としてるわ……）
line = "（紙屋敷さんの周りに本がいくつも浮いてる。即死級の呪いの本なんだけど、平然としてるわ……）"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「見事に魔本に裏切られたわね」
line = "「見事に魔本に裏切られたわね」"

[[dialogue]]
speaker = "管理システム"
# 「そうね、あの娘をあまりにも見くびっていたわ」
line = "「そうね、あの娘をあまりにも見くびっていたわ」"

[[dialogue]]
speaker = "管理システム"
# 「紙屋敷モネ」
line = "「紙屋敷モネ」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「ひゃいっ！？」
line = "「ひゃいっ！？」"

[[dialogue]]
speaker = "管理システム"
# 「あなたを『傲慢』の魔将として認めるわ。本たちをよろしく」
line = "「あなたを『傲慢』の魔将として認めるわ。本たちをよろしく」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「はい！　みんな大事な友達です！」
line = "「はい！　みんな大事な友達です！」"

[[dialogue]]
speaker = "管理システム"
# 「それから、魔将に適合しそうな魔族……でなくてもいいけど、できれば魔族がいいわ。目ぼしい候補者がいたら、ここへ連れてきなさい」
line = "「それから、魔将に適合しそうな魔族……でなくてもいいけど、できれば魔族がいいわ。目ぼしい候補者がいたら、ここへ連れてきなさい」"

[[dialogue]]
speaker = "管理システム"
# 「呪いの暴走は今は収まっているけれど、解決したわけではないわ」
line = "「呪いの暴走は今は収まっているけれど、解決したわけではないわ」"

[[dialogue]]
speaker = "管理システム"
# 「分割されようと、担い手がいなければ呪いはいずれ暴走するわ。それを防ぐためにも、そしてもちろんリクリエと戦うためにも、魔将は必要よ」
line = "「分割されようと、担い手がいなければ呪いはいずれ暴走するわ。それを防ぐためにも、そしてもちろんリクリエと戦うためにも、魔将は必要よ」"

[[dialogue]]
speaker = "管理システム"
# 「ウィステリアが全て受け入れていれば、そんな心配はなかったのだけど」
line = "「ウィステリアが全て受け入れていれば、そんな心配はなかったのだけど」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「私のせいみたいに言わないで。無理なものは無理よ」
line = "「私のせいみたいに言わないで。無理なものは無理よ」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「さて、帰りましょうか。地下図書館の正体も分かったことだし、早く報告しておかなくちゃ」
line = "「さて、帰りましょうか。地下図書館の正体も分かったことだし、早く報告しておかなくちゃ」"

[[dialogue]]
speaker = "管理システム"
# 「そうね、早く行きなさい。あなたの顔を見てると口から火が出るわ。しっし」
line = "「そうね、早く行きなさい。あなたの顔を見てると口から火が出るわ。しっし」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「……あなたも一緒に来ませんか？」
line = "「……あなたも一緒に来ませんか？」"

[[dialogue]]
speaker = "管理システム"
# 「……え？」
line = "「……え？」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「読書を豊かにするのは、本だけではありません。広い世界を知ることで、より深く書と向き合うことができるんです」
line = "「読書を豊かにするのは、本だけではありません。広い世界を知ることで、より深く書と向き合うことができるんです」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「それもお祖父さんが言ってたの？」
line = "「それもお祖父さんが言ってたの？」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「いえ、私の体験です。祖父の書斎を出て、私は多くの人と出会い、多くのことを学びました。その経験があるから、今は前より読書が楽しいんです」
line = "「いえ、私の体験です。祖父の書斎を出て、私は多くの人と出会い、多くのことを学びました。その経験があるから、今は前より読書が楽しいんです」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「だから、あなたも一緒に……どうですか？」
line = "「だから、あなたも一緒に……どうですか？」"

[[dialogue]]
speaker = "unk"
# そう言って、モネは手を伸ばす。もう片方に本を持ちながら。
line = "そう言って、モネは手を伸ばす。もう片方に本を持ちながら。"

[[dialogue]]
speaker = "管理システム"
# 「でも私は……魔族でも人間でもない……名前もないし…………」
line = "「でも私は……魔族でも人間でもない……名前もないし…………」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「なら、私が贈ります」
line = "「なら、私が贈ります」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「あなたは……リィベル・ビブリオテーク」
line = "「あなたは……リィベル・ビブリオテーク」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「幼い頃に読んだ本に出てきた、本の妖精の名前です」
line = "「幼い頃に読んだ本に出てきた、本の妖精の名前です」"

[[dialogue]]
speaker = "リィベル"
# 「リィベル・ビブリオテーク……」
line = "「リィベル・ビブリオテーク……」"

[[dialogue]]
speaker = "リィベル"
# 「……まぁ、悪くはないわ」
line = "「……まぁ、悪くはないわ」"

[[dialogue]]
speaker = "unk"
# 竜翼の少女は初めて微笑み、モネの手をとった。
line = "竜翼の少女は初めて微笑み、モネの手をとった。"
