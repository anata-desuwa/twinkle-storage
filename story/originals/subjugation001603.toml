[[dialogue]]
speaker = "unk"
# ハロウィン当日。
line = "ハロウィン当日。"

[[dialogue]]
speaker = "unk"
# ジャクリーヌに人間界のハロウィンを楽しんでもらうため、俺たちは大聖堂カフェテリアにやってきた。
line = "ジャクリーヌに人間界のハロウィンを楽しんでもらうため、俺たちは大聖堂カフェテリアにやってきた。"

[[dialogue]]
speaker = "ヒトリ"
# 「うわぁ、色んな衣装を着ている人がいっぱいです……」
line = "「うわぁ、色んな衣装を着ている人がいっぱいです……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「お菓子♪　お菓子♪」
line = "「お菓子♪　お菓子♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「ジャクリーヌさん、楽しみなのはわかりますが、先に行っちゃダメです……迷子になっちゃいます。あと、ゆーちゃんもさっきから早いよぉ……」
line = "「ジャクリーヌさん、楽しみなのはわかりますが、先に行っちゃダメです……迷子になっちゃいます。あと、ゆーちゃんもさっきから早いよぉ……」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！」
line = "「ゆー！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ヒトリおそいのー！　早く早く、こっちの方から美味しそうな匂いがすゆー！」
line = "「ヒトリおそいのー！　早く早く、こっちの方から美味しそうな匂いがすゆー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「もう、待ってくださーい……！」
line = "「もう、待ってくださーい……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆっ、あそこにいるのは……っ！」
line = "「ゆゆっ、あそこにいるのは……っ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「サランなのー！　ここで何をしてゆ？」
line = "「サランなのー！　ここで何をしてゆ？」"

[[dialogue]]
speaker = "サラン"
# 「ここでお店を出してるんだよ～♪」
line = "「ここでお店を出してるんだよ～♪」"

[[dialogue]]
speaker = "unk"
# お菓子作りが得意なサランらしいな
line = "お菓子作りが得意なサランらしいな"

[[dialogue]]
speaker = "サラン"
# 「実は前回の実績が認められてね～。ブースを出店することになったから、こうして新作のお菓子を売ってるの～♪」
line = "「実は前回の実績が認められてね～。ブースを出店することになったから、こうして新作のお菓子を売ってるの～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「それで朝早くから登校されてたんですね。すごいです、サランさん！」
line = "「それで朝早くから登校されてたんですね。すごいです、サランさん！」"

[[dialogue]]
speaker = "サラン"
# 「えへへ、ありがと～。頑張った甲斐があったよ～」
line = "「えへへ、ありがと～。頑張った甲斐があったよ～」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「トリックオアトリート！　さっそくお菓子くれなの！」
line = "「トリックオアトリート！　さっそくお菓子くれなの！」"

[[dialogue]]
speaker = "ヒトリ"
# 「あっ、ジャクリーヌさん。こういうところではテルスを出して買わないといけなくて……」
line = "「あっ、ジャクリーヌさん。こういうところではテルスを出して買わないといけなくて……」"

[[dialogue]]
speaker = "サラン"
# 「いいの、いいの～。お菓子の感想をくれる知り合いには無料で配ってるし、今日はジャクリーヌちゃんがいるってわかってたから、多めに作っておいたんだ～」
line = "「いいの、いいの～。お菓子の感想をくれる知り合いには無料で配ってるし、今日はジャクリーヌちゃんがいるってわかってたから、多めに作っておいたんだ～」"

[[dialogue]]
speaker = "サラン"
# 「というわけで、ジャクリーヌちゃん。どれを食べてみたい～？」
line = "「というわけで、ジャクリーヌちゃん。どれを食べてみたい～？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「いっぱいあって迷っちゃうの～……じゃあ、そこにある丸くて真ん中に穴が開いてるのにすゆ！」
line = "「いっぱいあって迷っちゃうの～……じゃあ、そこにある丸くて真ん中に穴が開いてるのにすゆ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ドーナツですね。おいしいですよね～」
line = "「ドーナツですね。おいしいですよね～」"

[[dialogue]]
speaker = "サラン"
# 「じゃあ、カボチャみたいなジャクリーヌちゃんには、このハロウィン限定パンプキン味のドーナツをあげちゃう～<emoji=heart04>」
line = "「じゃあ、カボチャみたいなジャクリーヌちゃんには、このハロウィン限定パンプキン味のドーナツをあげちゃう～<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆ♪　それじゃあ、いただきますなのー！」
line = "「ゆーっゆっゆっゆ♪　それじゃあ、いただきますなのー！」"

[[dialogue]]
speaker = "サラン"
# 「ヒトリちゃんと会長ちゃんもどうぞ～♪」
line = "「ヒトリちゃんと会長ちゃんもどうぞ～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「あ、ありがとうございます、いただきます……！」
line = "「あ、ありがとうございます、いただきます……！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「はぐっ！　んぐんぐ……もぐもぐ……んん～～～！　おいしいのー！」
line = "「はぐっ！　んぐんぐ……もぐもぐ……んん～～～！　おいしいのー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「パンプキン味のドーナツなんて初めてですけど、これはおいしいですね！」
line = "「パンプキン味のドーナツなんて初めてですけど、これはおいしいですね！」"

[[dialogue]]
speaker = "unk"
# 甘すぎなくて美味しい！
これは一杯売れそうな気がする
line = "甘すぎなくて美味しい！\nこれは一杯売れそうな気がする"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんもありがとね～！」
line = "「会長ちゃんもありがとね～！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「これは食べやすくて穴も空いてるから、いくらでもイケちゃうのー！　もう１個くれゆ！」
line = "「これは食べやすくて穴も空いてるから、いくらでもイケちゃうのー！　もう１個くれゆ！」"

[[dialogue]]
speaker = "サラン"
# 「は～い♪　どんどん食べてねー！」
line = "「は～い♪　どんどん食べてねー！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「もぐもぐ、んぐんぐ……ほれじゃあふぎは……ごっくん！　そこにある色んな形になってるお菓子をもらうの！」
line = "「もぐもぐ、んぐんぐ……ほれじゃあふぎは……ごっくん！　そこにある色んな形になってるお菓子をもらうの！」"

[[dialogue]]
speaker = "サラン"
# 「これはクッキーって言うんだよ～。ハロウィンだからジャックちゃんの形だったり、幽霊の形にしてみたんだ～♪」
line = "「これはクッキーって言うんだよ～。ハロウィンだからジャックちゃんの形だったり、幽霊の形にしてみたんだ～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「うわぁ～♪　これはかわいいです♪　これなんて、ゆーちゃんみたいですし！」
line = "「うわぁ～♪　これはかわいいです♪　これなんて、ゆーちゃんみたいですし！」"

[[dialogue]]
speaker = "サラン"
# 「そうなの～。ゆーちゃんを意識して作ったんだよ～♪」
line = "「そうなの～。ゆーちゃんを意識して作ったんだよ～♪」"

[[dialogue]]
speaker = "unk"
# 霊感のない人には普段見ることのできないゆーちゃんだが、ハロウィンの日は普通の人にも見えるらしい。
line = "霊感のない人には普段見ることのできないゆーちゃんだが、ハロウィンの日は普通の人にも見えるらしい。"

[[dialogue]]
speaker = "unk"
# それに加えて、ハロウィンフォームになったヒトリの周りには『ハロウィンの力』が渦巻いているらしく……
line = "それに加えて、ハロウィンフォームになったヒトリの周りには『ハロウィンの力』が渦巻いているらしく……"

[[dialogue]]
speaker = "unk"
# ヒトリと常に一緒にいるゆーちゃんの姿は、昨日の段階から俺やサランにもはっきりと見えていた。
line = "ヒトリと常に一緒にいるゆーちゃんの姿は、昨日の段階から俺やサランにもはっきりと見えていた。"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！　ゆー！」
line = "「ゆー！　ゆー！」"

[[dialogue]]
speaker = "ヒトリ"
# 「でも、似すぎてて食べちゃうのが、ちょっと勿体ない感じもします……」
line = "「でも、似すぎてて食べちゃうのが、ちょっと勿体ない感じもします……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それ、いただきなのー！　ぱくっ！」
line = "「それ、いただきなのー！　ぱくっ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「ああっ！？」
line = "「ああっ！？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「あぐあぐ、んぐんぐ……ごっくん！　これもおいしいの～♪」
line = "「あぐあぐ、んぐんぐ……ごっくん！　これもおいしいの～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「ゆ、ゆーちゃんが……ジャクリーヌさんのお腹の中に……」
line = "「ゆ、ゆーちゃんが……ジャクリーヌさんのお腹の中に……」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「ゆー！？」
line = "「ゆー！？」"

[[dialogue]]
speaker = "サラン"
# 「クッキーだから心配しなくても大丈夫だよ～♪」
line = "「クッキーだから心配しなくても大丈夫だよ～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「だ、だって、あまりにも似ているので……。すみません！　おいしそうなのは本当なんですけど……わたし、これは勿体なくて食べられません……っ！」
line = "「だ、だって、あまりにも似ているので……。すみません！　おいしそうなのは本当なんですけど……わたし、これは勿体なくて食べられません……っ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「こっちのパパみたいな形したのもいただくのー！」
line = "「こっちのパパみたいな形したのもいただくのー！」"

[[dialogue]]
speaker = "サラン"
# 「どうぞどうぞー！　いっぱい食べてね～♪」
line = "「どうぞどうぞー！　いっぱい食べてね～♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ん～～～♪　このクッキーもいくら食べても飽きないの～♪」
line = "「ん～～～♪　このクッキーもいくら食べても飽きないの～♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「すっごい食べっぷりです……他の人が食べる前に無くなっちゃいそう……」
line = "「すっごい食べっぷりです……他の人が食べる前に無くなっちゃいそう……」"

[[dialogue]]
speaker = "サラン"
# 「大丈夫～、後ろの方にもまだまだあるから～！　次はこれとかどうかな～？」
line = "「大丈夫～、後ろの方にもまだまだあるから～！　次はこれとかどうかな～？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余はまだまだ食べられるから、どんどん来るゆ！」
line = "「余はまだまだ食べられるから、どんどん来るゆ！」"

[[dialogue]]
speaker = "ヒトリ"
# 「こ、これまたおっきぃですね……！」
line = "「こ、これまたおっきぃですね……！」"

[[dialogue]]
speaker = "サラン"
# 「ジャクリーヌちゃんの歓迎用ってのもあるんだけど～。会長ちゃんやヒトリちゃんにも食べてほしくて、気合い入れちゃったんだ～<emoji=heart04>」
line = "「ジャクリーヌちゃんの歓迎用ってのもあるんだけど～。会長ちゃんやヒトリちゃんにも食べてほしくて、気合い入れちゃったんだ～<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆ♪　これまた美味しそうなの♪　遠慮なくいただくゆ！」
line = "「ゆーっゆっゆっゆ♪　これまた美味しそうなの♪　遠慮なくいただくゆ！」"

[[dialogue]]
speaker = "サラン"
# 「ほら、２人も食べちゃって～」
line = "「ほら、２人も食べちゃって～」"

[[dialogue]]
speaker = "ヒトリ"
# 「ほ、ホントにいいんですか？」
line = "「ほ、ホントにいいんですか？」"

[[dialogue]]
speaker = "サラン"
# 「サランはもう十分味見しちゃってるから～。ジャクリーヌちゃんとヒトリちゃんと会長ちゃんに食べて欲しいんだ～」
line = "「サランはもう十分味見しちゃってるから～。ジャクリーヌちゃんとヒトリちゃんと会長ちゃんに食べて欲しいんだ～」"

[[dialogue]]
speaker = "ヒトリ"
# 「わ、わかりました……い、いただきます！」
line = "「わ、わかりました……い、いただきます！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「はぐはぐはぐはぐ！　もぐもぐもぐもぐ！！」
line = "「はぐはぐはぐはぐ！　もぐもぐもぐもぐ！！」"

[[dialogue]]
speaker = "ヒトリ"
# 「もぐもぐ、んぐんぐ……」
line = "「もぐもぐ、んぐんぐ……」"

[[dialogue]]
speaker = "サラン"
# 「どうかな～？　自信作なんだけど……」
line = "「どうかな～？　自信作なんだけど……」"

[[dialogue]]
speaker = "unk"
# これもめちゃくちゃおいしい！
line = "これもめちゃくちゃおいしい！"

[[dialogue]]
speaker = "ヒトリ"
# 「はい！　とってもおいしいです！」
line = "「はい！　とってもおいしいです！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「あぐあぐあぐあぐ！　がつがつがつがつ！！　ん～～～～、今日食べたので一番おいしいの～～～♪」
line = "「あぐあぐあぐあぐ！　がつがつがつがつ！！　ん～～～～、今日食べたので一番おいしいの～～～♪」"

[[dialogue]]
speaker = "サラン"
# 「えへへ～<emoji=heart04>　そう言ってもらえてサランも嬉しいな～<emoji=heart04>」
line = "「えへへ～<emoji=heart04>　そう言ってもらえてサランも嬉しいな～<emoji=heart04>」"

[[dialogue]]
speaker = "サラン"
# 「じゃんじゃん食べてって～！　本当にたくさん作ってきたんだから～♪」
line = "「じゃんじゃん食べてって～！　本当にたくさん作ってきたんだから～♪」"

[[dialogue]]
speaker = "unk"
# そんなこんなで、サランが作ってくれたお菓子をたらふく食べつつ、ハロウィンパーティーは大盛況のうちに終わったのだった。
line = "そんなこんなで、サランが作ってくれたお菓子をたらふく食べつつ、ハロウィンパーティーは大盛況のうちに終わったのだった。"
