[[dialogue]]
speaker = "unk"
# 大聖堂カフェテリアに突然現れた異様な存在に、生徒たちはざわめいていた――
line = "大聖堂カフェテリアに突然現れた異様な存在に、生徒たちはざわめいていた――"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんかゴーレムっぽいのが出たわ！」
line = "「なんかゴーレムっぽいのが出たわ！」"

[[dialogue]]
speaker = "男子生徒"
# 「うわっ、テーブルをなぎ倒しながら、こっちに歩いてくるぞ！？」
line = "「うわっ、テーブルをなぎ倒しながら、こっちに歩いてくるぞ！？」"

[[dialogue]]
speaker = "女子生徒"
# 「両腕を振り上げてるけど、大丈夫なのアレ！？」
line = "「両腕を振り上げてるけど、大丈夫なのアレ！？」"

[[dialogue]]
speaker = "unk"
# とりあえず止めないと！
line = "とりあえず止めないと！"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね！　星徒会の私たちが木っ端ミジンコに――」
line = "「そうね！　星徒会の私たちが木っ端ミジンコに――」"

[[dialogue]]
speaker = "蘭美"
# 「いいえ、お嬢様の手を煩わせるまでもないわ」
line = "「いいえ、お嬢様の手を煩わせるまでもないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「蘭美？」
line = "「蘭美？」"

[[dialogue]]
speaker = "蘭美"
# 「――変身！」
line = "「――変身！」"

[[dialogue]]
speaker = "蘭美"
# 「メイドとして、この私が光速で片付けてあげるわ！」
line = "「メイドとして、この私が光速で片付けてあげるわ！」"

[[dialogue]]
speaker = "蘭美"
# 「加速操作！」
line = "「加速操作！」"

[[dialogue]]
speaker = "unk"
# 速い！　一瞬で相手の懐に！？
line = "速い！　一瞬で相手の懐に！？"

[[dialogue]]
speaker = "蘭美"
# 「ダッシュハンマー！」
line = "「ダッシュハンマー！」"

[[dialogue]]
speaker = "ゴーレム？"
# 「…………！」
line = "「…………！」"

[[dialogue]]
speaker = "unk"
# 蘭美の攻撃で、ゴーレムは倒れて砕け散る。
line = "蘭美の攻撃で、ゴーレムは倒れて砕け散る。"

[[dialogue]]
speaker = "unk"
# そして、一瞬の出来事に驚いている生徒たちの方へ向き直り、蘭美はメイドとして華麗にお辞儀をしてみせた。
line = "そして、一瞬の出来事に驚いている生徒たちの方へ向き直り、蘭美はメイドとして華麗にお辞儀をしてみせた。"

[[dialogue]]
speaker = "蘭美"
# 「皆様、大変お騒がせ致しました。問題は九浄家メイド隊の方で対処させて頂きましたので、引き続きご歓談をお楽しみ下さいませ♪」
line = "「皆様、大変お騒がせ致しました。問題は九浄家メイド隊の方で対処させて頂きましたので、引き続きご歓談をお楽しみ下さいませ♪」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、生徒たちから拍手と歓声が湧き上がった。
line = "次の瞬間、生徒たちから拍手と歓声が湧き上がった。"

[[dialogue]]
speaker = "女子生徒"
# 「キャーッ♪　メイド長ちゃん、素敵～～～っ♪」
line = "「キャーッ♪　メイド長ちゃん、素敵～～～っ♪」"

[[dialogue]]
speaker = "男子生徒"
# 「さすが、光速のメイドスター！」
line = "「さすが、光速のメイドスター！」"

[[dialogue]]
speaker = "蘭美"
# 「ふふんっ♪」
line = "「ふふんっ♪」"

[[dialogue]]
speaker = "unk"
# 連続攻撃が速過ぎて、目で追い切れなかった
line = "連続攻撃が速過ぎて、目で追い切れなかった"

[[dialogue]]
speaker = "蘭美"
# 「あら、それでも、高速で何発も叩き込んでたのは見えたのね？　さすがはお嬢様を倒して、会長の座を引き継いだだけあるじゃない」
line = "「あら、それでも、高速で何発も叩き込んでたのは見えたのね？　さすがはお嬢様を倒して、会長の座を引き継いだだけあるじゃない」"

[[dialogue]]
speaker = "ヴィーナス"
# 「蘭美は学園最速と言われるスピードを持つ、『光速のメイドスター』 の２つ名で有名な星騎士なのよ！」
line = "「蘭美は学園最速と言われるスピードを持つ、『光速のメイドスター』 の２つ名で有名な星騎士なのよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『加速操作』という固有の星術で、自身と、触れている物の速度を操ることができるの！」
line = "「『加速操作』という固有の星術で、自身と、触れている物の速度を操ることができるの！」"

[[dialogue]]
speaker = "蘭美"
# 「そういうこと。最速の座に関しては、ヴィーナスお嬢様や、会長――貴方にだって譲らないわ♪」
line = "「そういうこと。最速の座に関しては、ヴィーナスお嬢様や、会長――貴方にだって譲らないわ♪」"

[[dialogue]]
speaker = "unk"
# まさに、飛び級の実力ってわけか……！
line = "まさに、飛び級の実力ってわけか……！"

[[dialogue]]
speaker = "蘭美"
# 「ところで、さっきの……ゴーレム？　みたいのは何だったのかしら。モンスターとは違う手応えだったけど……」
line = "「ところで、さっきの……ゴーレム？　みたいのは何だったのかしら。モンスターとは違う手応えだったけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ねぇ、倒して床に散らばった破片、なんだか甘い匂いがしない？」
line = "「ねぇ、倒して床に散らばった破片、なんだか甘い匂いがしない？」"

[[dialogue]]
speaker = "蘭美"
# 「くんくん……確かに、お嬢様の言う通りね。これって……」
line = "「くんくん……確かに、お嬢様の言う通りね。これって……」"

[[dialogue]]
speaker = "せつな"
# 「あ、あの……！　皆様……！」
line = "「あ、あの……！　皆様……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら？　せつな、どうしたの？　今日は随分とかわいい服を着ているわね！」
line = "「あら？　せつな、どうしたの？　今日は随分とかわいい服を着ているわね！」"

[[dialogue]]
speaker = "unk"
# かわいい！　すごく似合ってるよ
line = "かわいい！　すごく似合ってるよ"

[[dialogue]]
speaker = "せつな"
# 「えっ！？　そ、そうでござるか！？　主様から褒められると、せつな嬉しくなってニヤニヤが止まらなくなってしまうでござるにゃん<emoji=heart04>」
line = "「えっ！？　そ、そうでござるか！？　主様から褒められると、せつな嬉しくなってニヤニヤが止まらなくなってしまうでござるにゃん<emoji=heart04>」"

[[dialogue]]
speaker = "せつな"
# 「えへへぇ♪」
line = "「えへへぇ♪」"

[[dialogue]]
speaker = "unk"
# 彼女は、蘭美と同じく九浄家メイド隊に所属する、新星学園１年生の『せつな』。
line = "彼女は、蘭美と同じく九浄家メイド隊に所属する、新星学園１年生の『せつな』。"

[[dialogue]]
speaker = "unk"
# 日本に現存する最後の忍者の隠れ里――『<ruby=しおう>紫桜</ruby>の里』出身で、本物の忍者でもある。
line = "日本に現存する最後の忍者の隠れ里――『<ruby>紫桜<rt>しおう</rt></ruby>の里』出身で、本物の忍者でもある。"

[[dialogue]]
speaker = "unk"
# かつて、アステライトの出現で里が被害を受けた際、九浄家が経済的支援を実施。彼女はその恩を返す為に、メイド隊で働いているという経緯がある。
line = "かつて、アステライトの出現で里が被害を受けた際、九浄家が経済的支援を実施。彼女はその恩を返す為に、メイド隊で働いているという経緯がある。"

[[dialogue]]
speaker = "せつな"
# 「――って、ハッ……！　浮かれて喜んでいる場合ではなかったでござる……！」
line = "「――って、ハッ……！　浮かれて喜んでいる場合ではなかったでござる……！」"

[[dialogue]]
speaker = "unk"
# 我に返った様子のせつなは、なんといきなりその場に土下座をし出した。
line = "我に返った様子のせつなは、なんといきなりその場に土下座をし出した。"

[[dialogue]]
speaker = "せつな"
# 「ヴィーナスお嬢様！　主様！　大変申し訳ございませぬ！」
line = "「ヴィーナスお嬢様！　主様！　大変申し訳ございませぬ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え！？　せつな、いきなりどうしたのよ」
line = "「え！？　せつな、いきなりどうしたのよ」"

[[dialogue]]
speaker = "せつな"
# 「実は……さっきここに現れた、異形のことなのですが……」
line = "「実は……さっきここに現れた、異形のことなのですが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ゴーレムっぽいやつのこと？」
line = "「ゴーレムっぽいやつのこと？」"

[[dialogue]]
speaker = "せつな"
# 「左様でござる。そのゴーレムは――」
line = "「左様でござる。そのゴーレムは――」"

[[dialogue]]
speaker = "せつな"
# 「せつなが作り出してしまったものなのでござる！」
line = "「せつなが作り出してしまったものなのでござる！」"

[[dialogue]]
speaker = "unk"
# それは一体どういう……？
line = "それは一体どういう……？"

[[dialogue]]
speaker = "せつな"
# 「う……！　そ、それは……！」
line = "「う……！　そ、それは……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それは？」
line = "「それは？」"

[[dialogue]]
speaker = "せつな"
# 「あ――」
line = "「あ――」"

[[dialogue]]
speaker = "せつな"
# 「主様の前では、言えないでござるぅぅぅ～～～っ！！！」
line = "「主様の前では、言えないでござるぅぅぅ～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# えぇっ！？　ちょっと、せつな！？
line = "えぇっ！？　ちょっと、せつな！？"

[[dialogue]]
speaker = "unk"
# 彼女は忍者らしい素早い身のこなしで、あっという間にカフェテリアの外へと飛び出していってしまった。
line = "彼女は忍者らしい素早い身のこなしで、あっという間にカフェテリアの外へと飛び出していってしまった。"

[[dialogue]]
speaker = "unk"
# 何か事情がある気がして、俺が追いかけようとすると――
line = "何か事情がある気がして、俺が追いかけようとすると――"

[[dialogue]]
speaker = "蘭美"
# 「待ちなさい、会長」
line = "「待ちなさい、会長」"

[[dialogue]]
speaker = "蘭美"
# 「最速ですぐに追いかけようとしたのはナイスよ。でも、せつなは九浄家メイド隊の一員だから――」
line = "「最速ですぐに追いかけようとしたのはナイスよ。でも、せつなは九浄家メイド隊の一員だから――」"

[[dialogue]]
speaker = "蘭美"
# 「ここはメイド長の私に、一旦預けてくれないかしら？」
line = "「ここはメイド長の私に、一旦預けてくれないかしら？」"
