[[dialogue]]
speaker = "unk"
# 第３話,いつか空の向こうへ、一緒に,P
line = "第３話,いつか空の向こうへ、一緒に,P"

[[dialogue]]
speaker = "unk"
# それはまだ、冬休みが明ける前のこと。
line = "それはまだ、冬休みが明ける前のこと。"

[[dialogue]]
speaker = "unk"
# 俺とアナは初詣デートに出かけ、２人並んで参拝していた。
line = "俺とアナは初詣デートに出かけ、２人並んで参拝していた。"

[[dialogue]]
speaker = "unk"
# 俺とアナはお賽銭を投げ、<ruby=わにぐち>鰐口</ruby>を鳴らす。一礼の後、胸の前で手を合わせ、静かに祈りを捧げた。
line = "俺とアナはお賽銭を投げ、<ruby>鰐口<rt>わにぐち</rt></ruby>を鳴らす。一礼の後、胸の前で手を合わせ、静かに祈りを捧げた。"

[[dialogue]]
speaker = "アナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# それから甘酒をもらいに行き、２人で口にしながら、お寺の境内をぶらりと歩く。
line = "それから甘酒をもらいに行き、２人で口にしながら、お寺の境内をぶらりと歩く。"

[[dialogue]]
speaker = "アナ"
# 「前から思っていたのですが、甘酒の味って、ちょっと和菓子っぽいですよね」
line = "「前から思っていたのですが、甘酒の味って、ちょっと和菓子っぽいですよね」"

[[dialogue]]
speaker = "アナ"
# 「――それは思いつかなかった、ですか？　しかし、ネットで調べてみると甘酒を使った和菓子は色々出てきます」
line = "「――それは思いつかなかった、ですか？　しかし、ネットで調べてみると甘酒を使った和菓子は色々出てきます」"

[[dialogue]]
speaker = "アナ"
# 「甘酒ようかんや、甘酒をあんこに使用したどら焼き、後は甘酒プリンなるものもあったりするようで……想像しただけで、ちょっとよだれが出てきてしまいます。じゅるり……♪」
line = "「甘酒ようかんや、甘酒をあんこに使用したどら焼き、後は甘酒プリンなるものもあったりするようで……想像しただけで、ちょっとよだれが出てきてしまいます。じゅるり……♪」"

[[dialogue]]
speaker = "アナ"
# 「浅草にも甘酒の和菓子を取り扱っているお店があるみたいなので……よろしければこの後、一緒に食べに行きませんか？」
line = "「浅草にも甘酒の和菓子を取り扱っているお店があるみたいなので……よろしければこの後、一緒に食べに行きませんか？」"

[[dialogue]]
speaker = "アナ"
# 「ふふっ、そうと決まれば、早く向かいましょうっ。わくわく……♪」
line = "「ふふっ、そうと決まれば、早く向かいましょうっ。わくわく……♪」"

[[dialogue]]
speaker = "アナ"
# 「ふんふんふん、ふっふふ～ん……♪」
line = "「ふんふんふん、ふっふふ～ん……♪」"

[[dialogue]]
speaker = "unk"
# 俺と恋人繋ぎで手を取り、アナは上機嫌に鼻歌を口ずさみながら、寄り添うように歩く。
line = "俺と恋人繋ぎで手を取り、アナは上機嫌に鼻歌を口ずさみながら、寄り添うように歩く。"

[[dialogue]]
speaker = "unk"
# アナは初詣で、何をお願いしたんだ？
line = "アナは初詣で、何をお願いしたんだ？"

[[dialogue]]
speaker = "アナ"
# 「無難ですが、無病息災、必勝祈願、といったところです。会長は何を？」
line = "「無難ですが、無病息災、必勝祈願、といったところです。会長は何を？」"

[[dialogue]]
speaker = "unk"
# ――俺も大体同じだった。誰１人欠けることなく、リクリエに勝ちたい。
line = "――俺も大体同じだった。誰１人欠けることなく、リクリエに勝ちたい。"

[[dialogue]]
speaker = "アナ"
# 「そうですね……ただ、最近は『勝った後のこと』も考えるようになりました」
line = "「そうですね……ただ、最近は『勝った後のこと』も考えるようになりました」"

[[dialogue]]
speaker = "unk"
# 俺はそこまで頭が回ってなかったかも
line = "俺はそこまで頭が回ってなかったかも"

[[dialogue]]
speaker = "unk"
# 勝った後のこと、か……。
line = "勝った後のこと、か……。"

[[dialogue]]
speaker = "アナ"
# 「特別高尚なことを考えていたわけじゃありませんよ」
line = "「特別高尚なことを考えていたわけじゃありませんよ」"

[[dialogue]]
speaker = "アナ"
# 「ただ、リクリエとの戦いを通じて、星力や三界の仕組みについて、過去の歴史でも類を見ないほどに急速な理解と進歩が見られます」
line = "「ただ、リクリエとの戦いを通じて、星力や三界の仕組みについて、過去の歴史でも類を見ないほどに急速な理解と進歩が見られます」"

[[dialogue]]
speaker = "アナ"
# 「会長に昔、話したことを覚えていますか？　私は、人間界と天界の移動方法を増やしたいと考えていました」
line = "「会長に昔、話したことを覚えていますか？　私は、人間界と天界の移動方法を増やしたいと考えていました」"

[[dialogue]]
speaker = "アナ"
# 「<ruby=ラーゴ・シエロ>鏡界の湖</ruby>を使っての、ヒトや物の移動は四半期に１回だけ……ですが、私たちは魔女の森にある世界樹を通じて、それ以外の移動方法が実在していることを知りました」
line = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>を使っての、ヒトや物の移動は四半期に１回だけ……ですが、私たちは魔女の森にある世界樹を通じて、それ以外の移動方法が実在していることを知りました」"

[[dialogue]]
speaker = "アナ"
# 「他にも、フィーニスの塔をたどることで、天界や魔界に移動する方法もある。当然、こちらは星騎士でない人に耐えられる移動方法ではありませんが……」
line = "「他にも、フィーニスの塔をたどることで、天界や魔界に移動する方法もある。当然、こちらは星騎士でない人に耐えられる移動方法ではありませんが……」"

[[dialogue]]
speaker = "アナ"
# 「私は、自分が生きているうちに、三界の移動方法が本当に増えるとは思っていませんでした」
line = "「私は、自分が生きているうちに、三界の移動方法が本当に増えるとは思っていませんでした」"

[[dialogue]]
speaker = "アナ"
# 「しかし今の調子であれば、遠くない未来、本当に正規の手段での三界の移動方法が増えてしまいそうです」
line = "「しかし今の調子であれば、遠くない未来、本当に正規の手段での三界の移動方法が増えてしまいそうです」"

[[dialogue]]
speaker = "アナ"
# 「ただ、理論が確立されたとしても、実際にそれを交通インフラとして落とし込むのは、大変な仕事になるでしょう」
line = "「ただ、理論が確立されたとしても、実際にそれを交通インフラとして落とし込むのは、大変な仕事になるでしょう」"

[[dialogue]]
speaker = "アナ"
# 「実現するのは１年後か１０年後か、はたまた５０年後か。おそらく誰にもわかりません」
line = "「実現するのは１年後か１０年後か、はたまた５０年後か。おそらく誰にもわかりません」"

[[dialogue]]
speaker = "アナ"
# 「もし間に合うのなら、私は新星学園を卒業した後、そうしたインフラに関わる仕事に携わりたいと、少し前から考えていました」
line = "「もし間に合うのなら、私は新星学園を卒業した後、そうしたインフラに関わる仕事に携わりたいと、少し前から考えていました」"

[[dialogue]]
speaker = "unk"
# 天界に和菓子屋さんを作る夢はどうする？
line = "天界に和菓子屋さんを作る夢はどうする？"

[[dialogue]]
speaker = "アナ"
# 「そっちも、もちろん忘れていません」
line = "「そっちも、もちろん忘れていません」"

[[dialogue]]
speaker = "アナ"
# 「ですが、まずはあんこを人間界から安定して仕入れるルートを確立してからでないと、話は始まりません」
line = "「ですが、まずはあんこを人間界から安定して仕入れるルートを確立してからでないと、話は始まりません」"

[[dialogue]]
speaker = "アナ"
# 「星力や三界の仕組みを研究するのは、リノさんも所属している研究機関『ヘキサグラム』の仕事です」
line = "「星力や三界の仕組みを研究するのは、リノさんも所属している研究機関『ヘキサグラム』の仕事です」"

[[dialogue]]
speaker = "アナ"
# 「なので卒業後の具体的な進路としては、ヘキサグラムはありえると思っていました」
line = "「なので卒業後の具体的な進路としては、ヘキサグラムはありえると思っていました」"

[[dialogue]]
speaker = "unk"
# アナと母さんが同僚になる未来もあるってことかぁ……と、白衣を着ているアナをちょっと想像する。
line = "アナと母さんが同僚になる未来もあるってことかぁ……と、白衣を着ているアナをちょっと想像する。"

[[dialogue]]
speaker = "unk"
# ――うん、めちゃくちゃ似合ってるな。
line = "――うん、めちゃくちゃ似合ってるな。"

[[dialogue]]
speaker = "アナ"
# 「それ以外だと、ヒルディオーネ先輩のご実家が経営されている『<ruby=せんおんじ>千園寺</ruby>ギャラクティック』なども候補に挙がります」
line = "「それ以外だと、ヒルディオーネ先輩のご実家が経営されている『<ruby>千園寺<rt>せんおんじ</rt></ruby>ギャラクティック』なども候補に挙がります」"

[[dialogue]]
speaker = "アナ"
# 「以前も話題にしましたが、天界と人間界の宇宙は『概念的な距離』が近いとされています」
line = "「以前も話題にしましたが、天界と人間界の宇宙は『概念的な距離』が近いとされています」"

[[dialogue]]
speaker = "アナ"
# 「天界へのゲートや港を作るのであれば、宇宙やそれに近い高所に作られる可能性は高い」
line = "「天界へのゲートや港を作るのであれば、宇宙やそれに近い高所に作られる可能性は高い」"

[[dialogue]]
speaker = "unk"
# どんな風になるのか、全然想像もつかないな
line = "どんな風になるのか、全然想像もつかないな"

[[dialogue]]
speaker = "アナ"
# 「そうですね。でも、世界樹の存在も、フィーニスの塔の内部も、私たちの想像の外にありましたが……今はもう、そうではありません」
line = "「そうですね。でも、世界樹の存在も、フィーニスの塔の内部も、私たちの想像の外にありましたが……今はもう、そうではありません」"

[[dialogue]]
speaker = "アナ"
# 「課題を１つずつ解決していった先に、きっと私たちが想像もできなかったようなすごいことが待っている、そんな気がして、ちょっとワクワクします」
line = "「課題を１つずつ解決していった先に、きっと私たちが想像もできなかったようなすごいことが待っている、そんな気がして、ちょっとワクワクします」"

[[dialogue]]
speaker = "unk"
# そこまで考えてるなんて、やっぱりアナはすごい、と俺は感心する。
line = "そこまで考えてるなんて、やっぱりアナはすごい、と俺は感心する。"

[[dialogue]]
speaker = "アナ"
# 「いえ、アニマ先輩と違って、世界を救うのとは直接関係ない分野ですから、そこまで立派な考えではないですよ」
line = "「いえ、アニマ先輩と違って、世界を救うのとは直接関係ない分野ですから、そこまで立派な考えではないですよ」"

[[dialogue]]
speaker = "アナ"
# 「ただ、私はやっぱり……自分の知らなかったことを知るのが、すごく好きだなって思ったんです」
line = "「ただ、私はやっぱり……自分の知らなかったことを知るのが、すごく好きだなって思ったんです」"

[[dialogue]]
speaker = "アナ"
# 「そういう意味では、天界のことを抜きにしても、『宇宙』というものにはとても心惹かれます」
line = "「そういう意味では、天界のことを抜きにしても、『宇宙』というものにはとても心惹かれます」"

[[dialogue]]
speaker = "アナ"
# 「千園寺ギャラクティックについては、三界移動のインフラ事業を抜きにしても、魅力的な就職先です」
line = "「千園寺ギャラクティックについては、三界移動のインフラ事業を抜きにしても、魅力的な就職先です」"

[[dialogue]]
speaker = "unk"
# 宇宙って、それだけでワクワクするもんな！
line = "宇宙って、それだけでワクワクするもんな！"

[[dialogue]]
speaker = "アナ"
# 「ふふ、さすが会長。わかってる」
line = "「ふふ、さすが会長。わかってる」"

[[dialogue]]
speaker = "アナ"
# 「実はこの間、『モデルロケット』というものを知りました。とても興味深いものだったので、今度会長にもシェアします」
line = "「実はこの間、『モデルロケット』というものを知りました。とても興味深いものだったので、今度会長にもシェアします」"

[[dialogue]]
speaker = "アナ"
# 「それでもし、もしもの話なんですが……私が千園寺ギャラクティックに就職すると言ったら――」
line = "「それでもし、もしもの話なんですが……私が千園寺ギャラクティックに就職すると言ったら――」"

[[dialogue]]
speaker = "アナ"
# 「会長も、一緒に来てくれますか？」
line = "「会長も、一緒に来てくれますか？」"

[[dialogue]]
speaker = "unk"
# 宇宙開発と関わる大企業に、俺も就職！？
line = "宇宙開発と関わる大企業に、俺も就職！？"

[[dialogue]]
speaker = "アナ"
# 「ダメ……でしょうか？」
line = "「ダメ……でしょうか？」"

[[dialogue]]
speaker = "unk"
# いや、ダメじゃない！　全然ダメじゃない！　けれども……！！
line = "いや、ダメじゃない！　全然ダメじゃない！　けれども……！！"

[[dialogue]]
speaker = "アナ"
# 「――私はともかく、会長の成績だと、その就職先は受かるか心配……？」
line = "「――私はともかく、会長の成績だと、その就職先は受かるか心配……？」"

[[dialogue]]
speaker = "アナ"
# 「ノープロブレム。勉強は得意♪」
line = "「ノープロブレム。勉強は得意♪」"

[[dialogue]]
speaker = "アナ"
# 「成績や試験が問題というだけなら、私と一緒に勉強しましょう。ふんすっ♪」
line = "「成績や試験が問題というだけなら、私と一緒に勉強しましょう。ふんすっ♪」"

[[dialogue]]
speaker = "unk"
# 乗り気なアナを前に、俺は『勉強も頑張る』という新年の新たな目標が加わるのだった。
line = "乗り気なアナを前に、俺は『勉強も頑張る』という新年の新たな目標が加わるのだった。"
