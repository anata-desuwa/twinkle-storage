[[dialogue]]
speaker = "unk"
# かつてネビュラに所属していた『追憶の魔女』について、マリオンさんから話を聞く。
line = "かつてネビュラに所属していた『追憶の魔女』について、マリオンさんから話を聞く。"

[[dialogue]]
speaker = "マリオン"
# 「イザベラは私と同期で、彼女は研究者としてネビュラの職務に従事していました」
line = "「イザベラは私と同期で、彼女は研究者としてネビュラの職務に従事していました」"

[[dialogue]]
speaker = "マリオン"
# 「彼女の研究テーマの１つに、魔女の森の結界と光の魔女がありました。特に先代たるトリュファイナ様について、熱心に調べていましたね」
line = "「彼女の研究テーマの１つに、魔女の森の結界と光の魔女がありました。特に先代たるトリュファイナ様について、熱心に調べていましたね」"

[[dialogue]]
speaker = "マリオン"
# 「魔女の森を再現するために、光の魔女を人為的に生み出す。それがイザベラが犯した禁忌です」
line = "「魔女の森を再現するために、光の魔女を人為的に生み出す。それがイザベラが犯した禁忌です」"

[[dialogue]]
speaker = "マリオン"
# 「禁忌が露呈したイザベラは逃亡しながら研究を続け、とうとう光の魔女の複製体を生み出しました。私がイザベラを討ったのはその直後です」
line = "「禁忌が露呈したイザベラは逃亡しながら研究を続け、とうとう光の魔女の複製体を生み出しました。私がイザベラを討ったのはその直後です」"

[[dialogue]]
speaker = "マリオン"
# 「複製体は戦闘の際に行方不明となっていましたが……この複製体こそ、コハルコ様なのです」
line = "「複製体は戦闘の際に行方不明となっていましたが……この複製体こそ、コハルコ様なのです」"

[[dialogue]]
speaker = "リーリア"
# 「私、ネビュラなのにその辺の事情、聞かされてなかったんですけど……」
line = "「私、ネビュラなのにその辺の事情、聞かされてなかったんですけど……」"

[[dialogue]]
speaker = "マリオン"
# 「ええ、あなたの権限ではアクセスできない秘匿事項でしたから」
line = "「ええ、あなたの権限ではアクセスできない秘匿事項でしたから」"

[[dialogue]]
speaker = "マリオン"
# 「イザベラとコハルコ様については以上です。今は、秋葉原周辺に潜ませた私の人形たちが敵の居場所を特定中です。特定でき次第、救出に……あ」
line = "「イザベラとコハルコ様については以上です。今は、秋葉原周辺に潜ませた私の人形たちが敵の居場所を特定中です。特定でき次第、救出に……あ」"

[[dialogue]]
speaker = "ナツコ"
# 「リーリアさん、宿題おわったよ！　ゲームしよ！　あれ、お姉ちゃんは？」
line = "「リーリアさん、宿題おわったよ！　ゲームしよ！　あれ、お姉ちゃんは？」"

[[dialogue]]
speaker = "トウコ"
# 「会長さん、来てたんですね。コハルコお姉ちゃん知りませんか？」
line = "「会長さん、来てたんですね。コハルコお姉ちゃん知りませんか？」"

[[dialogue]]
speaker = "リーリア"
# 「えっと、コハルコ先輩は……」
line = "「えっと、コハルコ先輩は……」"

[[dialogue]]
speaker = "コハルコ父"
# 「お姉ちゃんは急な用事があってお出かけしてるよ。でも、迷子になっちゃったみたいだ」
line = "「お姉ちゃんは急な用事があってお出かけしてるよ。でも、迷子になっちゃったみたいだ」"

[[dialogue]]
speaker = "unk"
# 今から迎えに行ってくるね
line = "今から迎えに行ってくるね"

[[dialogue]]
speaker = "トウコ"
# 「会長さん、お姉ちゃんをよろしくお願いします」
line = "「会長さん、お姉ちゃんをよろしくお願いします」"

[[dialogue]]
speaker = "ナツコ"
# 「かいちょーさんなら安心だね！　じゃあ、リーリアさんゲームしよっ」
line = "「かいちょーさんなら安心だね！　じゃあ、リーリアさんゲームしよっ」"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、どうしましょう……」
line = "「センパイ、どうしましょう……」"

[[dialogue]]
speaker = "unk"
# リーリアはふたりについていてあげて
line = "リーリアはふたりについていてあげて"

[[dialogue]]
speaker = "unk"
# 秋葉原で戦闘になる可能性を考えると、誰かついていた方がいいだろう。それに、ナツコちゃんとトウコちゃんを不安にさせたくない。
line = "秋葉原で戦闘になる可能性を考えると、誰かついていた方がいいだろう。それに、ナツコちゃんとトウコちゃんを不安にさせたくない。"

[[dialogue]]
speaker = "リーリア"
# 「分かりました。コハルコ先輩のこと、お願いしますね。……よし、じゃあゲームしよっか！」
line = "「分かりました。コハルコ先輩のこと、お願いしますね。……よし、じゃあゲームしよっか！」"

[[dialogue]]
speaker = "コハルコ父"
# 「緋宮くん。コハルコは何か事件に巻き込まれているんだろう？　……いつも君たち星騎士を危険に晒してすまない。でも、どうかコハルコを連れて帰ってきてほしい」
line = "「緋宮くん。コハルコは何か事件に巻き込まれているんだろう？　……いつも君たち星騎士を危険に晒してすまない。でも、どうかコハルコを連れて帰ってきてほしい」"

[[dialogue]]
speaker = "コハルコ父"
# 「あの子は、なまじ何でもできるから、１人で抱え込んでしまう。情けないけど、僕ではダメだ。でも君なら……」
line = "「あの子は、なまじ何でもできるから、１人で抱え込んでしまう。情けないけど、僕ではダメだ。でも君なら……」"

[[dialogue]]
speaker = "unk"
# 必ずコハルコさんを助けます
line = "必ずコハルコさんを助けます"

[[dialogue]]
speaker = "コハルコ父"
# 「ありがとう。どうかあの子を……よろしく頼む」
line = "「ありがとう。どうかあの子を……よろしく頼む」"

[[dialogue]]
speaker = "unk"
# コハルコさんのお父さんの言葉に強く頷き、朝比奈家を後にした。
line = "コハルコさんのお父さんの言葉に強く頷き、朝比奈家を後にした。"

[[dialogue]]
speaker = "unk"
# マリオンさんの人形がイザベラの潜伏場所を見つけた。マリオンさんの案内に従って秋葉原を進む。
line = "マリオンさんの人形がイザベラの潜伏場所を見つけた。マリオンさんの案内に従って秋葉原を進む。"

[[dialogue]]
speaker = "マリオン"
# 「秋葉原中に人形を張り巡らせた甲斐がありました。懐かしい気配がします」
line = "「秋葉原中に人形を張り巡らせた甲斐がありました。懐かしい気配がします」"

[[dialogue]]
speaker = "unk"
# さっき、なんで隠れたんですか？
line = "さっき、なんで隠れたんですか？"

[[dialogue]]
speaker = "unk"
# コハルコさんの家族が店から出てきたとき、マリオンさんは姿を消していた。おそらく幻惑魔法か何かだろう。
line = "コハルコさんの家族が店から出てきたとき、マリオンさんは姿を消していた。おそらく幻惑魔法か何かだろう。"

[[dialogue]]
speaker = "マリオン"
# 「……ネビュラは当初、光の魔女の複製体──コハルコ様も粛清対象としていました。光の魔女は一代に１人しか生まれないからです」
line = "「……ネビュラは当初、光の魔女の複製体──コハルコ様も粛清対象としていました。光の魔女は一代に１人しか生まれないからです」"

[[dialogue]]
speaker = "マリオン"
# 「不完全な光の魔女の存在が、新たな光の魔女の誕生を妨げないように、と。クラウディア様がお生まれになったため、その方針は取り消されましたが」
line = "「不完全な光の魔女の存在が、新たな光の魔女の誕生を妨げないように、と。クラウディア様がお生まれになったため、その方針は取り消されましたが」"

[[dialogue]]
speaker = "マリオン"
# 「私はコハルコ様をも手にかけようとしていたのです。あの頃の私は、それを疑問に思わなかった」
line = "「私はコハルコ様をも手にかけようとしていたのです。あの頃の私は、それを疑問に思わなかった」"

[[dialogue]]
speaker = "マリオン"
# 「人間と深く関わる前……トワと出会う前の私は酷く薄情な女でしたから、今になって、後ろめたくなってしまって……コハルコ様と彼女の家族に顔向け出来なかったのです」
line = "「人間と深く関わる前……トワと出会う前の私は酷く薄情な女でしたから、今になって、後ろめたくなってしまって……コハルコ様と彼女の家族に顔向け出来なかったのです」"

[[dialogue]]
speaker = "マリオン"
# 「その贖罪というわけではありませんが、コハルコ様は必ず……」
line = "「その贖罪というわけではありませんが、コハルコ様は必ず……」"

[[dialogue]]
speaker = "マリオン"
# 「──！　会長様！」
line = "「──！　会長様！」"

[[dialogue]]
speaker = "unk"
# マリオンさんが注意を促した瞬間、俺たちの目の前が弾けた。
line = "マリオンさんが注意を促した瞬間、俺たちの目の前が弾けた。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "レイラ"
# 「そこまでです、魔王さん」
line = "「そこまでです、魔王さん」"

[[dialogue]]
speaker = "レイラ"
# 「ここから先はお通しできません。通りたければ、コラプサー首領、百目騎レイラがお相手いたします」
line = "「ここから先はお通しできません。通りたければ、コラプサー首領、百目騎レイラがお相手いたします」"
