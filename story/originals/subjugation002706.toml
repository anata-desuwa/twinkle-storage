[[dialogue]]
speaker = "unk"
# 忍の里に、賑やかな夜が訪れる。
line = "忍の里に、賑やかな夜が訪れる。"

[[dialogue]]
speaker = "unk"
# 遠方からの来客である俺たちを、里のみんなは盛大にもてなしてくれた。
line = "遠方からの来客である俺たちを、里のみんなは盛大にもてなしてくれた。"

[[dialogue]]
speaker = "ウズメイア"
# 「ヤバ！　これすっごくおいしい～！」
line = "「ヤバ！　これすっごくおいしい～！」"

[[dialogue]]
speaker = "ヨミ"
# 「素材がいいんでしょうか、滋味深い味わいがありますね」
line = "「素材がいいんでしょうか、滋味深い味わいがありますね」"

[[dialogue]]
speaker = "unk"
# ウズメやヨミたちを少し遠目に見ながら、俺も用意された食事に舌つづみを打つ。
line = "ウズメやヨミたちを少し遠目に見ながら、俺も用意された食事に舌つづみを打つ。"

[[dialogue]]
speaker = "シズル"
# 「どうですか？　歓迎の宴は楽しんでいますか？」
line = "「どうですか？　歓迎の宴は楽しんでいますか？」"

[[dialogue]]
speaker = "unk"
# ありがとうございます！
line = "ありがとうございます！"

[[dialogue]]
speaker = "unk"
# はい、とっても！
line = "はい、とっても！"

[[dialogue]]
speaker = "シズル"
# 「よかったです、遠慮せずにどんどんおかわりしてください♪」
line = "「よかったです、遠慮せずにどんどんおかわりしてください♪」"

[[dialogue]]
speaker = "シズル"
# 「そうそう、せっかくなので魔王さんにせつなのことを聞いてもいいですか？」
line = "「そうそう、せっかくなので魔王さんにせつなのことを聞いてもいいですか？」"

[[dialogue]]
speaker = "unk"
# メキメキ力をつけています
line = "メキメキ力をつけています"

[[dialogue]]
speaker = "unk"
# 心配ありませんよ
line = "心配ありませんよ"

[[dialogue]]
speaker = "シズル"
# 「ほうほう、そうですか。……ですがそれは忍として、その戦闘能力が、ということですよね？」
line = "「ほうほう、そうですか。……ですがそれは忍として、その戦闘能力が、ということですよね？」"

[[dialogue]]
speaker = "unk"
# 他に何か？
line = "他に何か？"

[[dialogue]]
speaker = "シズル"
# 「いーえ、何もありませんよ？　でも……なるほど……今の反応でおおよそ理解しました」
line = "「いーえ、何もありませんよ？　でも……なるほど……今の反応でおおよそ理解しました」"

[[dialogue]]
speaker = "シズル"
# 「まあ、いいでしょう。急いては事をし損じると言いますし、長い目で見ることにします……今後もせつなをよろしくお願いしますね、魔王さん♪」
line = "「まあ、いいでしょう。急いては事をし損じると言いますし、長い目で見ることにします……今後もせつなをよろしくお願いしますね、魔王さん♪」"

[[dialogue]]
speaker = "せつな"
# 「おや主様、どうしたでござるか？　何をこんな所で突っ立っているのでござる？」
line = "「おや主様、どうしたでござるか？　何をこんな所で突っ立っているのでござる？」"

[[dialogue]]
speaker = "せつな"
# 「ささっ、こちらへ！　皆に主様のことをちゃんと紹介したいでござるよ！」
line = "「ささっ、こちらへ！　皆に主様のことをちゃんと紹介したいでござるよ！」"

[[dialogue]]
speaker = "せつな"
# 「ちとせ、さつき、改めてこの人がせつなの主様でござる」
line = "「ちとせ、さつき、改めてこの人がせつなの主様でござる」"

[[dialogue]]
speaker = "ちとせ"
# 「うんうん、せつなの大事な主様だよね」
line = "「うんうん、せつなの大事な主様だよね」"

[[dialogue]]
speaker = "さつき"
# 「せつなの手紙でいつも登場する愛しの人──」
line = "「せつなの手紙でいつも登場する愛しの人──」"

[[dialogue]]
speaker = "せつな"
# 「にゃああっ！！！　なっ、何を言うでござるか！　デタラメなことを吹き込まないで欲しいでござるっ！」
line = "「にゃああっ！！！　なっ、何を言うでござるか！　デタラメなことを吹き込まないで欲しいでござるっ！」"

[[dialogue]]
speaker = "ちとせ"
# 「デタラメじゃないでしょ？　仕えるべき主様を見つけたってそれはもう詳しーく教えてくれたじゃない」
line = "「デタラメじゃないでしょ？　仕えるべき主様を見つけたってそれはもう詳しーく教えてくれたじゃない」"

[[dialogue]]
speaker = "さつき"
# 「せつなの手紙にはいつも名前が出てくるのも本当のこと」
line = "「せつなの手紙にはいつも名前が出てくるのも本当のこと」"

[[dialogue]]
speaker = "せつな"
# 「それはそうでござるがっ！　そんなハレンチな書き方は断じてしていないでござるよっ！」
line = "「それはそうでござるがっ！　そんなハレンチな書き方は断じてしていないでござるよっ！」"

[[dialogue]]
speaker = "せつな"
# 「おふざけはそこまででござる！　からかうなら主様の紹介はしないでござる！」
line = "「おふざけはそこまででござる！　からかうなら主様の紹介はしないでござる！」"

[[dialogue]]
speaker = "ちとせ"
# 「あはは、ごめんだって」
line = "「あはは、ごめんだって」"

[[dialogue]]
speaker = "さつき"
# 「でも、最後にひとつだけ確認させて欲しい……房中術はもうしたの？」
line = "「でも、最後にひとつだけ確認させて欲しい……房中術はもうしたの？」"

[[dialogue]]
speaker = "せつな"
# 「にゃにゃにゃにゃあっ！！！！！」
line = "「にゃにゃにゃにゃあっ！！！！！」"

[[dialogue]]
speaker = "unk"
# 虫よけ？
line = "虫よけ？"

[[dialogue]]
speaker = "unk"
# 防虫術？
line = "防虫術？"

[[dialogue]]
speaker = "ちとせ"
# 「違うよ～、夜の秘術の方だよ。せつなの具合がどうだったか、感想を聞かせて欲しいな～って」
line = "「違うよ～、夜の秘術の方だよ。せつなの具合がどうだったか、感想を聞かせて欲しいな～って」"

[[dialogue]]
speaker = "さつき"
# 「ちとせ……今の反応を見る限り、多分まだ何もしていないっぽい」
line = "「ちとせ……今の反応を見る限り、多分まだ何もしていないっぽい」"

[[dialogue]]
speaker = "せつな"
# 「そ、そんなことはっ……あっ、あ、あるまじきでござるっ！　それはもう毎晩毎夜、使いまくりの乱れまくりでござるっ！」
line = "「そ、そんなことはっ……あっ、あ、あるまじきでござるっ！　それはもう毎晩毎夜、使いまくりの乱れまくりでござるっ！」"

[[dialogue]]
speaker = "さつき"
# 「せつなからの手紙にはいろいろ書いてあるのに、その話題だけ頑なに触れてないのはおかしいよ」
line = "「せつなからの手紙にはいろいろ書いてあるのに、その話題だけ頑なに触れてないのはおかしいよ」"

[[dialogue]]
speaker = "ちとせ"
# 「確かにそうかも！　こらせつな、隠さないで白状しなさいっ！」
line = "「確かにそうかも！　こらせつな、隠さないで白状しなさいっ！」"

[[dialogue]]
speaker = "せつな"
# 「ううう……さすがはさつき、痛いところを突いてくるでござる」
line = "「ううう……さすがはさつき、痛いところを突いてくるでござる」"

[[dialogue]]
speaker = "せつな"
# 「いかにも……主様とはまだ、床へ呼ばれる関係に至っていないでござるが……」
line = "「いかにも……主様とはまだ、床へ呼ばれる関係に至っていないでござるが……」"

[[dialogue]]
speaker = "せつな"
# 「お願いでござるっ！　２人ともこの事は師匠には内密にして欲しいでござるっ！　こんな事を知られたら大目玉でござるっ！」
line = "「お願いでござるっ！　２人ともこの事は師匠には内密にして欲しいでござるっ！　こんな事を知られたら大目玉でござるっ！」"

[[dialogue]]
speaker = "ちとせ"
# 「ま、せつなだから仕方ないね」
line = "「ま、せつなだから仕方ないね」"

[[dialogue]]
speaker = "さつき"
# 「ここはひとつ、笹団子で手を打とうじゃない」
line = "「ここはひとつ、笹団子で手を打とうじゃない」"

[[dialogue]]
speaker = "せつな"
# 「それでお願いするでござる……」
line = "「それでお願いするでござる……」"

[[dialogue]]
speaker = "unk"
# 仲良しなんだね
line = "仲良しなんだね"

[[dialogue]]
speaker = "unk"
# 楽しそうだね
line = "楽しそうだね"

[[dialogue]]
speaker = "せつな"
# 「この２人は同い年で、互いに切磋琢磨してきた大切な仲間なのでござる」
line = "「この２人は同い年で、互いに切磋琢磨してきた大切な仲間なのでござる」"

[[dialogue]]
speaker = "ちとせ"
# 「村がピンチの時も肩を並べて戦ったしね。私たちは固い絆で結ばれてるんだ～」
line = "「村がピンチの時も肩を並べて戦ったしね。私たちは固い絆で結ばれてるんだ～」"

[[dialogue]]
speaker = "ちとせ"
# 「そんなせつなが選んだ主様は、私たちにとっても特別な人なんだよ。だからほら、もっと飲んで、食べて！　めいっぱい盛り上がってよ♪」
line = "「そんなせつなが選んだ主様は、私たちにとっても特別な人なんだよ。だからほら、もっと飲んで、食べて！　めいっぱい盛り上がってよ♪」"

[[dialogue]]
speaker = "せつな"
# 「そうでござる♪　ささ、主様。料理を取り分けたでござる。師匠が作ってくれたご馳走を、いっぱい味わって欲しいでござる！」
line = "「そうでござる♪　ささ、主様。料理を取り分けたでござる。師匠が作ってくれたご馳走を、いっぱい味わって欲しいでござる！」"

[[dialogue]]
speaker = "せつな"
# 「師匠は秘薬づくりもさることながら、料理の腕も天下一品でござるから！」
line = "「師匠は秘薬づくりもさることながら、料理の腕も天下一品でござるから！」"

[[dialogue]]
speaker = "unk"
# こうして、宴の夜は賑やかに過ぎていくのだった。
line = "こうして、宴の夜は賑やかに過ぎていくのだった。"
