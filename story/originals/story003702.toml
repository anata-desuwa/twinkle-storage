[[dialogue]]
speaker = "unk"
# 世界樹を通り、コラプサーたちは魔界に到着した。
line = "世界樹を通り、コラプサーたちは魔界に到着した。"

[[dialogue]]
speaker = "キサナ"
# 「世界樹ってやつは本当に便利だな。密航なんざ面倒なことしなくてもいいし」
line = "「世界樹ってやつは本当に便利だな。密航なんざ面倒なことしなくてもいいし」"

[[dialogue]]
speaker = "リーナ"
# 「キレイな海ー！　すごいすごーい！」
line = "「キレイな海ー！　すごいすごーい！」"

[[dialogue]]
speaker = "レイラ"
# 「景色はいいけどあっつーい！　さっそく変身、水着フォーム！」
line = "「景色はいいけどあっつーい！　さっそく変身、水着フォーム！」"

[[dialogue]]
speaker = "レイラ"
# 「じゃーん！　胸がちょっときつい気がするけど、帰ったら調整してもらいます！」
line = "「じゃーん！　胸がちょっときつい気がするけど、帰ったら調整してもらいます！」"

[[dialogue]]
speaker = "リーナ"
# 「見て見て、レイラお姉ちゃん！　可愛い水着でしょ！」
line = "「見て見て、レイラお姉ちゃん！　可愛い水着でしょ！」"

[[dialogue]]
speaker = "unk"
# レイラの目の前で、リーナがくるっと回ってみせる。
line = "レイラの目の前で、リーナがくるっと回ってみせる。"

[[dialogue]]
speaker = "レイラ"
# 「うん、可愛いね。ナデナデしちゃいたいな」
line = "「うん、可愛いね。ナデナデしちゃいたいな」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、褒めてくれるかな？　……褒めてくれるよね？」
line = "「お兄ちゃん、褒めてくれるかな？　……褒めてくれるよね？」"

[[dialogue]]
speaker = "レイラ"
# 「う、うん……帰ったらお兄ちゃんと一緒にプール行こうね」
line = "「う、うん……帰ったらお兄ちゃんと一緒にプール行こうね」"

[[dialogue]]
speaker = "キサナ"
# 「それにしても、あっちーな」
line = "「それにしても、あっちーな」"

[[dialogue]]
speaker = "レイラ"
# 「キサナの水着は……というか、キサナが水着を着ること自体が意外かも」
line = "「キサナの水着は……というか、キサナが水着を着ること自体が意外かも」"

[[dialogue]]
speaker = "キサナ"
# 「ああ？　アタシが水着を着ちゃ悪いかよ」
line = "「ああ？　アタシが水着を着ちゃ悪いかよ」"

[[dialogue]]
speaker = "レイラ"
# 「その凄み方やめてよ～。される度に寿命がちょっと縮みそう」
line = "「その凄み方やめてよ～。される度に寿命がちょっと縮みそう」"

[[dialogue]]
speaker = "キサナ"
# 「オマエはアタシを怖がってんのかバカにしてんのかどっちなんだよ……それよりメシだメシ」
line = "「オマエはアタシを怖がってんのかバカにしてんのかどっちなんだよ……それよりメシだメシ」"

[[dialogue]]
speaker = "レイラ"
# 「そうだった！　今日は絶好のＢＢＱ日和！　肉を焼かねば女がすたる！」
line = "「そうだった！　今日は絶好のＢＢＱ日和！　肉を焼かねば女がすたる！」"

[[dialogue]]
speaker = "unk"
# 持参したクーラーボックスを、レイラがパンパン叩く。
line = "持参したクーラーボックスを、レイラがパンパン叩く。"

[[dialogue]]
speaker = "キサナ"
# 「いいから早く焼け」
line = "「いいから早く焼け」"

[[dialogue]]
speaker = "レイラ"
# 「はいはい、キサナも手伝ってよね。イングリットも……」
line = "「はいはい、キサナも手伝ってよね。イングリットも……」"

[[dialogue]]
speaker = "イングリット"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "レイラ"
# 「イングリット？」
line = "「イングリット？」"

[[dialogue]]
speaker = "イングリット"
# 「……戦いだ」
line = "「……戦いだ」"

[[dialogue]]
speaker = "イングリット"
# 「新しい力を得たのなら、それを試したいと思うのが道理だろう。まずは貴様からだ、レイラ」
line = "「新しい力を得たのなら、それを試したいと思うのが道理だろう。まずは貴様からだ、レイラ」"

[[dialogue]]
speaker = "レイラ"
# （えぇ……どうしよう）
line = "（えぇ……どうしよう）"

[[dialogue]]
speaker = "キサナ"
# （適当に誤魔化せよ。それが<ruby=ボス>首領</ruby>の仕事だろ）
line = "（適当に誤魔化せよ。それが<ruby>首領<rt>ボス</rt></ruby>の仕事だろ）"

[[dialogue]]
speaker = "レイラ"
# 「イングリット。今日は任務で来ているの。あなたとは戦いません」
line = "「イングリット。今日は任務で来ているの。あなたとは戦いません」"

[[dialogue]]
speaker = "イングリット"
# 「肉を焼くことが任務なのか？　遊びに来たようにしか見えないが。なら私と戦ってもいいはずだ」
line = "「肉を焼くことが任務なのか？　遊びに来たようにしか見えないが。なら私と戦ってもいいはずだ」"

[[dialogue]]
speaker = "レイラ"
# 「ファッ！？　イングリットがまさかの正論パンチ！？」
line = "「ファッ！？　イングリットがまさかの正論パンチ！？」"

[[dialogue]]
speaker = "キサナ"
# 「はぁ……しゃあねえな。まずは仕事を片付けるぞ。それからアタシは肉を食う。テメエはレイラに遊んでもらえ。いいな？」
line = "「はぁ……しゃあねえな。まずは仕事を片付けるぞ。それからアタシは肉を食う。テメエはレイラに遊んでもらえ。いいな？」"

[[dialogue]]
speaker = "イングリット"
# 「ふん、いいだろう。レイラ、必ず私と戦ってもらうからな」
line = "「ふん、いいだろう。レイラ、必ず私と戦ってもらうからな」"

[[dialogue]]
speaker = "レイラ"
# 「え。私、戦うことになってる……？」
line = "「え。私、戦うことになってる……？」"

[[dialogue]]
speaker = "老人の魔族"
# 「お客人ですかな？」
line = "「お客人ですかな？」"

[[dialogue]]
speaker = "レイラ"
# 「うわ！　……えっと、どちら様でしょうか？」
line = "「うわ！　……えっと、どちら様でしょうか？」"

[[dialogue]]
speaker = "unk"
# 振り返ると、そこには現地の住人らしき魔族の姿があった。
line = "振り返ると、そこには現地の住人らしき魔族の姿があった。"

[[dialogue]]
speaker = "老人の魔族"
# 「わしは近くの村で村長をしとる者じゃ。魔族以外もおるようじゃが、こちらに来られるのは初めてかな？」
line = "「わしは近くの村で村長をしとる者じゃ。魔族以外もおるようじゃが、こちらに来られるのは初めてかな？」"

[[dialogue]]
speaker = "老人の魔族"
# 「悪いことは言わん。砂浜の奥に行ってはいかんよ」
line = "「悪いことは言わん。砂浜の奥に行ってはいかんよ」"

[[dialogue]]
speaker = "老人の魔族"
# 「凶悪な怪物を封印した祠があってな。それを壊すと封印が解けて、怪物が出てくると伝えられておるのじゃ」
line = "「凶悪な怪物を封印した祠があってな。それを壊すと封印が解けて、怪物が出てくると伝えられておるのじゃ」"

[[dialogue]]
speaker = "unk"
# それだけ言うと、老人は踵を返して帰っていった。
line = "それだけ言うと、老人は踵を返して帰っていった。"

[[dialogue]]
speaker = "キサナ"
# 「なんだったんだ、今のジジイは」
line = "「なんだったんだ、今のジジイは」"

[[dialogue]]
speaker = "レイラ"
# 「さぁ……でも、その祠が空間の歪みと関係あるのかも。探してみよう」
line = "「さぁ……でも、その祠が空間の歪みと関係あるのかも。探してみよう」"

[[dialogue]]
speaker = "リーナ"
# 「レイラお姉ちゃん、お地蔵さまみたいなの見つけたよ！」
line = "「レイラお姉ちゃん、お地蔵さまみたいなの見つけたよ！」"

[[dialogue]]
speaker = "レイラ"
# 「うん、ありがとう、リーナ」
line = "「うん、ありがとう、リーナ」"

[[dialogue]]
speaker = "レイラ"
# 「見た感じ、ただの小さな祠だけど、キサナはどう思う？」
line = "「見た感じ、ただの小さな祠だけど、キサナはどう思う？」"

[[dialogue]]
speaker = "キサナ"
# 「どうも何もねぇよ。ちゃっちゃと調査とやらを終わらせて、肉食おうぜ」
line = "「どうも何もねぇよ。ちゃっちゃと調査とやらを終わらせて、肉食おうぜ」"

[[dialogue]]
speaker = "レイラ"
# 「……イングリットは？」
line = "「……イングリットは？」"

[[dialogue]]
speaker = "イングリット"
# 「てい！」
line = "「てい！」"

[[dialogue]]
speaker = "レイラ"
# 「あの祠を壊したんか……じゃなくて、なんで祠壊しちゃったのぉ！？」
line = "「あの祠を壊したんか……じゃなくて、なんで祠壊しちゃったのぉ！？」"

[[dialogue]]
speaker = "イングリット"
# 「知れたこと。凶悪な怪物が出るというなら、それと戦うのが戦士だろう。……さぁ、来い！」
line = "「知れたこと。凶悪な怪物が出るというなら、それと戦うのが戦士だろう。……さぁ、来い！」"

[[dialogue]]
speaker = "モンスター"
# 「キシャーーーーッ！！」
line = "「キシャーーーーッ！！」"

[[dialogue]]
speaker = "レイラ"
# 「本当にモンスター出たぁ～～～っ！！？」
line = "「本当にモンスター出たぁ～～～っ！！？」"
