[[dialogue]]
speaker = "unk"
# 第６話,帰路,B
line = "第６話,帰路,B"

[[dialogue]]
speaker = "unk"
# そうして俺たちはトリシャさんに別れを告げ、レゾフの町を飛び出した。
line = "そうして俺たちはトリシャさんに別れを告げ、レゾフの町を飛び出した。"

[[dialogue]]
speaker = "unk"
# まだ吹雪も収まっていない荒野を大急ぎで翔け抜けていく……。
line = "まだ吹雪も収まっていない荒野を大急ぎで翔け抜けていく……。"

[[dialogue]]
speaker = "unk"
# しかし。
line = "しかし。"

[[dialogue]]
speaker = "マトイ"
# 「あ、あれ……！？　私達、このへんから出てきたはずだよね……！？」
line = "「あ、あれ……！？　私達、このへんから出てきたはずだよね……！？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。見失わないよう──そこの樹に星術で印をつけていたはずよ」
line = "「ええ。見失わないよう──そこの樹に星術で印をつけていたはずよ」"

[[dialogue]]
speaker = "ソフィア"
# 「星術で残した印は……しっかり残っています。ここで間違いありません」
line = "「星術で残した印は……しっかり残っています。ここで間違いありません」"

[[dialogue]]
speaker = "クロト"
# 「……妙だな」
line = "「……妙だな」"

[[dialogue]]
speaker = "unk"
# 俺たちが魔界へ降りた地には到着した。
line = "俺たちが魔界へ降りた地には到着した。"

[[dialogue]]
speaker = "unk"
# だが……俺たちが出てきたはずの『うろ』のホールが見当たらない。
line = "だが……俺たちが出てきたはずの『うろ』のホールが見当たらない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういえば……聞くの忘れてたけど、みんなはどうやって魔界まで来たの？」
line = "「そういえば……聞くの忘れてたけど、みんなはどうやって魔界まで来たの？」"

[[dialogue]]
speaker = "クロト"
# 「世界樹のうろ──ってトンネルを通じて、ネビュラの基地から飛んできたんだ」
line = "「世界樹のうろ──ってトンネルを通じて、ネビュラの基地から飛んできたんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ネビュラって──あの魔女たちの！？」
line = "「ネビュラって──あの魔女たちの！？」"

[[dialogue]]
speaker = "ソフィア"
# 「かくかくしかじかなのです」
line = "「かくかくしかじかなのです」"

[[dialogue]]
speaker = "ニャリオン"
# 「それじゃ伝わらないニャ……」
line = "「それじゃ伝わらないニャ……」"

[[dialogue]]
speaker = "unk"
# 改めて、ヴィーナスにも事のいきさつをあらかた説明した……。
line = "改めて、ヴィーナスにも事のいきさつをあらかた説明した……。"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほどね～！　あの森にたどり着くまでに、そんな経緯があったなんて！」
line = "「なるほどね～！　あの森にたどり着くまでに、そんな経緯があったなんて！」"

[[dialogue]]
speaker = "ユウリ"
# 「そういや、来るときは急展開すぎて、帰り道についちゃ聞いてなかったな……」
line = "「そういや、来るときは急展開すぎて、帰り道についちゃ聞いてなかったな……」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、ここに降りてからもホールは残ってたはずよね？」
line = "「でも、ここに降りてからもホールは残ってたはずよね？」"

[[dialogue]]
speaker = "クロト"
# 「そうですね。確かこのへんに──」
line = "「そうですね。確かこのへんに──」"

[[dialogue]]
speaker = "unk"
# ──と、宙をまさぐっていると……
line = "──と、宙をまさぐっていると……"

[[dialogue]]
speaker = "リスの使い魔"
# 「──キィ」
line = "「──キィ」"

[[dialogue]]
speaker = "クロト"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "ニャリオン"
# 「なんニャ。急に鳴き真似ニャんかして」
line = "「なんニャ。急に鳴き真似ニャんかして」"

[[dialogue]]
speaker = "クロト"
# 「いや……俺じゃない。そこに何かいる」
line = "「いや……俺じゃない。そこに何かいる」"

[[dialogue]]
speaker = "ソフィア"
# 「リスですね。雪の下に隠れていたようですが……」
line = "「リスですね。雪の下に隠れていたようですが……」"

[[dialogue]]
speaker = "リスの使い魔"
# 「キィ。キィ」
line = "「キィ。キィ」"

[[dialogue]]
speaker = "unk"
# 子猫くらいのサイズがあるリスだった。
line = "子猫くらいのサイズがあるリスだった。"

[[dialogue]]
speaker = "unk"
# 見た目は可愛いが俺たちの知るリスではなく、背中にコウモリのような羽根が生えていた。
line = "見た目は可愛いが俺たちの知るリスではなく、背中にコウモリのような羽根が生えていた。"

[[dialogue]]
speaker = "フィオナ"
# 「魔界の固有種でしょうか？」
line = "「魔界の固有種でしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「ううん、こんなの見たことないわ。ただのリスじゃないと思うんだけど……」
line = "「ううん、こんなの見たことないわ。ただのリスじゃないと思うんだけど……」"

[[dialogue]]
speaker = "ニャリオン"
# 「うーむ……ニャんだかワガハイに似た気配を感じるニャンね」
line = "「うーむ……ニャんだかワガハイに似た気配を感じるニャンね」"

[[dialogue]]
speaker = "クロト"
# 「……魔力を感じる。恐らく、魔女たちの使い魔だろう」
line = "「……魔力を感じる。恐らく、魔女たちの使い魔だろう」"

[[dialogue]]
speaker = "フィオナ"
# 「確かに。微力な魔力をまとっていますね」
line = "「確かに。微力な魔力をまとっていますね」"

[[dialogue]]
speaker = "リスの使い魔"
# 「キィ。キィ」
line = "「キィ。キィ」"

[[dialogue]]
speaker = "unk"
# リスの使い魔はパタパタと滞空しながらクルミをかじっている。
line = "リスの使い魔はパタパタと滞空しながらクルミをかじっている。"

[[dialogue]]
speaker = "unk"
# かよわいながら、ネビュラの一員ということになるのだろうか……？
line = "かよわいながら、ネビュラの一員ということになるのだろうか……？"

[[dialogue]]
speaker = "リスの使い魔"
# 「キィ、キィ……キィ。キィ、キィ」
line = "「キィ、キィ……キィ。キィ、キィ」"

[[dialogue]]
speaker = "ソフィア"
# 「……えっと…………？」
line = "「……えっと…………？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何か言いたげね」
line = "「何か言いたげね」"

[[dialogue]]
speaker = "リスの使い魔"
# 「キィ」
line = "「キィ」"

[[dialogue]]
speaker = "マトイ"
# 「あっ消えちゃった……」
line = "「あっ消えちゃった……」"

[[dialogue]]
speaker = "ユウリ"
# 「なんだったんだ？」
line = "「なんだったんだ？」"

[[dialogue]]
speaker = "フィオナ"
# 「待ってください。何か落ちてきました」
line = "「待ってください。何か落ちてきました」"

[[dialogue]]
speaker = "unk"
# 使い魔のリスは去り際、何かを残していった。
line = "使い魔のリスは去り際、何かを残していった。"

[[dialogue]]
speaker = "unk"
# 俺ははらりと舞い落ちたそれを拾い上げる。
line = "俺ははらりと舞い落ちたそれを拾い上げる。"

[[dialogue]]
speaker = "クロト"
# 「これは……手紙？」
line = "「これは……手紙？」"

[[dialogue]]
speaker = "unk"
# それは一枚の手紙だった。もしかしてあのリスは、これを届けにきたのだろうか？
line = "それは一枚の手紙だった。もしかしてあのリスは、これを届けにきたのだろうか？"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあこれ……魔女たちからの手紙ってこと？」
line = "「じゃあこれ……魔女たちからの手紙ってこと？」"

[[dialogue]]
speaker = "クロト"
# 「かもしれない。なら、あのリスはさしずめメッセンジャー──ってところか」
line = "「かもしれない。なら、あのリスはさしずめメッセンジャー──ってところか」"

[[dialogue]]
speaker = "フィオナ"
# 「読んでみましょう。連絡事項かもしれません」
line = "「読んでみましょう。連絡事項かもしれません」"

[[dialogue]]
speaker = "セドナ"
# 『流星学園ならびに新星学園の諸君』
line = "『流星学園ならびに新星学園の諸君』"

[[dialogue]]
speaker = "セドナ"
# 『魔界での目的は果たせたかね？　ここに戻ってきたということは、なんらかのケリはつけられたわけだ』
line = "『魔界での目的は果たせたかね？　ここに戻ってきたということは、なんらかのケリはつけられたわけだ』"

[[dialogue]]
speaker = "セドナ"
# 『ところでひとつ残念なお知らせだ。君たちを送ったこの世界樹のうろだが、都合によりしばらく封鎖させてもらう』
line = "『ところでひとつ残念なお知らせだ。君たちを送ったこの世界樹のうろだが、都合によりしばらく封鎖させてもらう』"

[[dialogue]]
speaker = "セドナ"
# 『なお、<ruby=ラーゴ・シエロ>鏡界の湖</ruby>も我々が抑えさせてもらった。大交流の船も動かせないゆえ、無駄足は控えるのが賢明だ』
line = "『なお、<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>も我々が抑えさせてもらった。大交流の船も動かせないゆえ、無駄足は控えるのが賢明だ』"

[[dialogue]]
speaker = "セドナ"
# 『リクリエについてはこちらで何とかする。それまでは魔界でのひと時をゆるりと過ごしていてくれたまえ。では、<ruby=ボン・ボヤージュ>良き旅を</ruby>』
line = "『リクリエについてはこちらで何とかする。それまでは魔界でのひと時をゆるりと過ごしていてくれたまえ。では、<ruby>良き旅を<rt>ボン・ボヤージュ</rt></ruby>』"

[[dialogue]]
speaker = "unk"
# わずかなメッセージを読み終えた俺たちは……しばらくその場で凍ったように固まっていた。
line = "わずかなメッセージを読み終えた俺たちは……しばらくその場で凍ったように固まっていた。"

[[dialogue]]
speaker = "ユウリ"
# 「んなっ……！？」
line = "「んなっ……！？」"

[[dialogue]]
speaker = "マトイ"
# 「つ──都合により封鎖ってなに！？」
line = "「つ──都合により封鎖ってなに！？」"

[[dialogue]]
speaker = "クロト"
# 「世界樹のうろは開かない──唯一の帰り道が、なくなった」
line = "「世界樹のうろは開かない──唯一の帰り道が、なくなった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たち……ここに置いてけぼりってこと？」
line = "「私たち……ここに置いてけぼりってこと？」"

[[dialogue]]
speaker = "unk"
# 全員が顔を見合わせる。
line = "全員が顔を見合わせる。"

[[dialogue]]
speaker = "unk"
# 魔界の片隅にある極寒の荒野で、俺たちは立ち往生を余儀なくされてしまった。
line = "魔界の片隅にある極寒の荒野で、俺たちは立ち往生を余儀なくされてしまった。"

[[dialogue]]
speaker = "ニャリオン"
# 「さ、最悪ニャン……！　よりにもよって人間界が危ない時にニャン──！？」
line = "「さ、最悪ニャン……！　よりにもよって人間界が危ない時にニャン──！？」"

[[dialogue]]
speaker = "フィオナ"
# 「もしかすると……それこそがネビュラの計算だったのかもしれません」
line = "「もしかすると……それこそがネビュラの計算だったのかもしれません」"

[[dialogue]]
speaker = "クロト"
# 「……セドナさんは抜け目のないヒトに見えた。その可能性は高そうだ」
line = "「……セドナさんは抜け目のないヒトに見えた。その可能性は高そうだ」"

[[dialogue]]
speaker = "マトイ"
# 「ど、どういうこと？」
line = "「ど、どういうこと？」"

[[dialogue]]
speaker = "クロト"
# 「俺たちは無理を言って『うろ』を使わせてもらった。あの時、当然だけどアイリーンさんはかなり渋っていた」
line = "「俺たちは無理を言って『うろ』を使わせてもらった。あの時、当然だけどアイリーンさんはかなり渋っていた」"

[[dialogue]]
speaker = "フィオナ"
# 「魔女が人間に『うろ』を許可した過去はない──とのことでしたね」
line = "「魔女が人間に『うろ』を許可した過去はない──とのことでしたね」"

[[dialogue]]
speaker = "クロト"
# 「ああ。だけど……思えばセドナさんにはそこまで拒絶されなかった。あのクラウディアって娘にしても」
line = "「ああ。だけど……思えばセドナさんにはそこまで拒絶されなかった。あのクラウディアって娘にしても」"

[[dialogue]]
speaker = "ヴィーナス"
# 「セドナって……あのいかつい感じの女の人よね？　いかにも厳しそうじゃない？」
line = "「セドナって……あのいかつい感じの女の人よね？　いかにも厳しそうじゃない？」"

[[dialogue]]
speaker = "ニャリオン"
# 「確かに、やけに気前はよかったニャンね」
line = "「確かに、やけに気前はよかったニャンね」"

[[dialogue]]
speaker = "unk"
# もちろん、俺たちの必死の願いが通じたという見方もできる。
line = "もちろん、俺たちの必死の願いが通じたという見方もできる。"

[[dialogue]]
speaker = "クロト"
# 「だけど、もし、<b>こうなる</b>ことまで見越していたのなら──彼女たちの態度にも納得がいくと思ってな」
line = "「だけど、もし、<b>こうなる</b>ことまで見越していたのなら──彼女たちの態度にも納得がいくと思ってな」"

[[dialogue]]
speaker = "サーシャ"
# 「私たちを魔界へ一方的に送る──」
line = "「私たちを魔界へ一方的に送る──」"

[[dialogue]]
speaker = "ユウリ"
# 「やられた……ってことか」
line = "「やられた……ってことか」"

[[dialogue]]
speaker = "unk"
# ネビュラにはネビュラの思惑があって当然。
line = "ネビュラにはネビュラの思惑があって当然。"

[[dialogue]]
speaker = "unk"
# 俺たち星騎士の勢力を分断させたかった──そんな意図があったのなら、これまでの行動にも理解はできる。
line = "俺たち星騎士の勢力を分断させたかった──そんな意図があったのなら、これまでの行動にも理解はできる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふうん……どんな取引があったか知らないけど、してやられたってわけね」
line = "「ふうん……どんな取引があったか知らないけど、してやられたってわけね」"

[[dialogue]]
speaker = "クロト"
# 「ああ。だけど、文句を言える筋合いはない。頼みを聞いてくれたのは確かなわけだから」
line = "「ああ。だけど、文句を言える筋合いはない。頼みを聞いてくれたのは確かなわけだから」"

[[dialogue]]
speaker = "サーシャ"
# 「なあんか、大人のやり口って感じで嫌ねえ」
line = "「なあんか、大人のやり口って感じで嫌ねえ」"

[[dialogue]]
speaker = "ソフィア"
# 「しかも『リクリエについてはこちらで何とかする』──って、まるで私たちを除け者にするみたいな」
line = "「しかも『リクリエについてはこちらで何とかする』──って、まるで私たちを除け者にするみたいな」"

[[dialogue]]
speaker = "クロト"
# 「トリシャさんの占星術の結果と合わせて考えると……アポロの出現か、リクリエの本波の到来か。最悪、その両方ってところかもしれないな」
line = "「トリシャさんの占星術の結果と合わせて考えると……アポロの出現か、リクリエの本波の到来か。最悪、その両方ってところかもしれないな」"

[[dialogue]]
speaker = "ユウリ"
# 「<ruby=ラーゴ・シエロ>鏡界の湖</ruby>までジャックしてやがるってなると……かなり前から準備してた行動に見えるな」
line = "「<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>までジャックしてやがるってなると……かなり前から準備してた行動に見えるな」"

[[dialogue]]
speaker = "クロト"
# 「ああ。ますます見逃せなくなってきた」
line = "「ああ。ますます見逃せなくなってきた」"

[[dialogue]]
speaker = "マトイ"
# 「で、でも──今からじゃ戻れっこないよ！　頑張って見つけた唯一のルートだったのに──！」
line = "「で、でも──今からじゃ戻れっこないよ！　頑張って見つけた唯一のルートだったのに──！」"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね……大交流の船まで使えないとなると、もう本当に隔絶されています」
line = "「そうですね……大交流の船まで使えないとなると、もう本当に隔絶されています」"

[[dialogue]]
speaker = "unk"
# みんなに絶望の気色が浮かぶ。
line = "みんなに絶望の気色が浮かぶ。"

[[dialogue]]
speaker = "unk"
# その折、沈思黙考にふけっていたフィオナが面を上げた。
line = "その折、沈思黙考にふけっていたフィオナが面を上げた。"

[[dialogue]]
speaker = "フィオナ"
# 「……いえ」
line = "「……いえ」"

[[dialogue]]
speaker = "フィオナ"
# 「たったひとつだけ──残されています。魔界と人間界を繋ぐ、一筋の道が」
line = "「たったひとつだけ──残されています。魔界と人間界を繋ぐ、一筋の道が」"

[[dialogue]]
speaker = "マトイ"
# 「えぇっ！？　そ、そんな裏ワザみたいなルートがあるの……？」
line = "「えぇっ！？　そ、そんな裏ワザみたいなルートがあるの……？」"

[[dialogue]]
speaker = "サーシャ"
# 「本当？　フィオナちゃん──私たちも聞いたことがないけど」
line = "「本当？　フィオナちゃん──私たちも聞いたことがないけど」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。確実に存在はしています。ただ……あまりにも険しい道です。そのルートを辿れたヒトは、歴史上一人も記録されていません」
line = "「はい。確実に存在はしています。ただ……あまりにも険しい道です。そのルートを辿れたヒトは、歴史上一人も記録されていません」"

[[dialogue]]
speaker = "クロト"
# 「そんなルートが……いや。待て。もしかして……」
line = "「そんなルートが……いや。待て。もしかして……」"

[[dialogue]]
speaker = "unk"
# フィオナが言わんとしていることを察する。
line = "フィオナが言わんとしていることを察する。"

[[dialogue]]
speaker = "unk"
# 誰も通ったことのない道筋──けれど確実に存在しているもの──それは。
line = "誰も通ったことのない道筋──けれど確実に存在しているもの──それは。"

[[dialogue]]
speaker = "フィオナ"
# 「フィーニスの塔──あれを通れば魔界から人間界、いえ……天界にすら至ることができるでしょう」
line = "「フィーニスの塔──あれを通れば魔界から人間界、いえ……天界にすら至ることができるでしょう」"

[[dialogue]]
speaker = "ユウリ"
# 「！　あの塔か──」
line = "「！　あの塔か──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たちにはおなじみね。でも、入るには結局、学園に戻らなくちゃじゃない？」
line = "「私たちにはおなじみね。でも、入るには結局、学園に戻らなくちゃじゃない？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そうではないニャ。きっと、魔界からも入れるってことニャ」
line = "「そうではないニャ。きっと、魔界からも入れるってことニャ」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。フィーニスの塔で森羅歴以前の歴史を知った後……私は、改めて星見家の古文書を読み漁りました」
line = "「はい。フィーニスの塔で森羅歴以前の歴史を知った後……私は、改めて星見家の古文書を読み漁りました」"

[[dialogue]]
speaker = "フィオナ"
# 「そして、ある古文書にはこう記されていました──」
line = "「そして、ある古文書にはこう記されていました──」"

[[dialogue]]
speaker = "フィオナ"
# 「この世界で唯一、三界にまたがって存在する建造物──それが女神のましますフィーニスの塔なのだと。この記述を信じるなら……」
line = "「この世界で唯一、三界にまたがって存在する建造物──それが女神のましますフィーニスの塔なのだと。この記述を信じるなら……」"

[[dialogue]]
speaker = "クロト"
# 「魔界にも、俺たちの知る塔が通じている──」
line = "「魔界にも、俺たちの知る塔が通じている──」"

[[dialogue]]
speaker = "マトイ"
# 「すごい！　星見家の古文書なら信憑性もあるし、行けそうだよ！」
line = "「すごい！　星見家の古文書なら信憑性もあるし、行けそうだよ！」"

[[dialogue]]
speaker = "unk"
# 俺たちに希望の光が差し込んだ。
line = "俺たちに希望の光が差し込んだ。"

[[dialogue]]
speaker = "フィオナ"
# 「セイファート学園長は人間界の第一層から、天界の頂までを昇りつめて『制覇者』となりました」
line = "「セイファート学園長は人間界の第一層から、天界の頂までを昇りつめて『制覇者』となりました」"

[[dialogue]]
speaker = "フィオナ"
# 「対して魔界の塔は、私たちの知るそれよりもさらに深みに根ざしています」
line = "「対して魔界の塔は、私たちの知るそれよりもさらに深みに根ざしています」"

[[dialogue]]
speaker = "フィオナ"
# 「第零層──古文書によれば、そう記されていました」
line = "「第零層──古文書によれば、そう記されていました」"

[[dialogue]]
speaker = "ソフィア"
# 「第零層……」
line = "「第零層……」"

[[dialogue]]
speaker = "unk"
# 異質なその響きに、全員が息を呑んだ。
line = "異質なその響きに、全員が息を呑んだ。"

[[dialogue]]
speaker = "ユウリ"
# 「つっても……どこにあるんだ？　そんなの」
line = "「つっても……どこにあるんだ？　そんなの」"

[[dialogue]]
speaker = "フィオナ"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さん。もしかして」
line = "「姉さん。もしかして」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。あそこしか聞いたことないわね」
line = "「ええ。あそこしか聞いたことないわね」"

[[dialogue]]
speaker = "unk"
# 魔族の二人が、思い当たったように言った。
line = "魔族の二人が、思い当たったように言った。"

[[dialogue]]
speaker = "サーシャ"
# 「確かに魔界にも──フィーニスの塔はあるわ。語られる伝説も人間界とおおよそ変わらない」
line = "「確かに魔界にも──フィーニスの塔はあるわ。語られる伝説も人間界とおおよそ変わらない」"

[[dialogue]]
speaker = "サーシャ"
# 「でも……あれはレゾフの住人からすれば、あまりに縁遠いものなの。もちろん直接見たこともないわ」
line = "「でも……あれはレゾフの住人からすれば、あまりに縁遠いものなの。もちろん直接見たこともないわ」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャんでニャ？」
line = "「ニャんでニャ？」"

[[dialogue]]
speaker = "ソフィア"
# 「遠いからです。途方もなく」
line = "「遠いからです。途方もなく」"

[[dialogue]]
speaker = "ソフィア"
# 「魔界のフィーニスの塔は──シャリオン地方にあります。ここズヴィエダからすると、完全に別世界のお話です」
line = "「魔界のフィーニスの塔は──シャリオン地方にあります。ここズヴィエダからすると、完全に別世界のお話です」"

[[dialogue]]
speaker = "ユウリ"
# 「魔界の住人にとっての『遠い』って……ヤな予感がするな」
line = "「魔界の住人にとっての『遠い』って……ヤな予感がするな」"

[[dialogue]]
speaker = "ソフィア"
# 「……ご想像の通りかと」
line = "「……ご想像の通りかと」"

[[dialogue]]
speaker = "unk"
# ここからレゾフに向かうのさえ、人間界でいう州境をいくつも超えるほど距離があった。
line = "ここからレゾフに向かうのさえ、人間界でいう州境をいくつも超えるほど距離があった。"

[[dialogue]]
speaker = "unk"
# 別の地方へ赴くとなるとその数倍か、数十倍か。
line = "別の地方へ赴くとなるとその数倍か、数十倍か。"

[[dialogue]]
speaker = "ヴィーナス"
# 「──大丈夫。私が連れていくわ」
line = "「──大丈夫。私が連れていくわ」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス……？」
line = "「ヴィーナス……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「みんなは……私を助けるために魔界まで来てくれたのよね」
line = "「みんなは……私を助けるために魔界まで来てくれたのよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、そのせいで今度は人間界のアナ達がピンチになってる。だったら次は──私が駆けつけてあげなきゃダメでしょ！」
line = "「でも、そのせいで今度は人間界のアナ達がピンチになってる。だったら次は──私が駆けつけてあげなきゃダメでしょ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさん……」
line = "「ヴィーナスさん……」"

[[dialogue]]
speaker = "unk"
# それからヴィーナスは、俺たち全員に金星のブーストをかけた。
line = "それからヴィーナスは、俺たち全員に金星のブーストをかけた。"

[[dialogue]]
speaker = "ユウリ"
# 「おいおい、無茶すんなよ」
line = "「おいおい、無茶すんなよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「平気よ！　一晩ぐっすり寝たし、ようやく自由に動けるんだから。むしろ暴れたくてウズウズしてるの！」
line = "「平気よ！　一晩ぐっすり寝たし、ようやく自由に動けるんだから。むしろ暴れたくてウズウズしてるの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私がみんなに加護をかけたから──これなら、音速レベルでぶっ飛ばしても平気なはずよ！」
line = "「私がみんなに加護をかけたから──これなら、音速レベルでぶっ飛ばしても平気なはずよ！」"

[[dialogue]]
speaker = "ニャリオン"
# 「そこまで元気が有り余ってるのかニャン……？」
line = "「そこまで元気が有り余ってるのかニャン……？」"

[[dialogue]]
speaker = "クロト"
# 「……俺も一緒にやる。実を言うと、俺も元気が有り余ってるんだ」
line = "「……俺も一緒にやる。実を言うと、俺も元気が有り余ってるんだ」"

[[dialogue]]
speaker = "unk"
# 力を解放し──今度は俺の霊力をみんなに付与した。
line = "力を解放し──今度は俺の霊力をみんなに付与した。"

[[dialogue]]
speaker = "unk"
# 魔王の覚醒を引き出せるようになってからというもの……
line = "魔王の覚醒を引き出せるようになってからというもの……"

[[dialogue]]
speaker = "unk"
# 体の奥底からみなぎるエネルギーを抑えるのも大変で、少しくらい発散していないと窮屈なくらいだったのだ。
line = "体の奥底からみなぎるエネルギーを抑えるのも大変で、少しくらい発散していないと窮屈なくらいだったのだ。"

[[dialogue]]
speaker = "クロト"
# 「一刻も早く人間界へ駆けつける。たとえ、どんなに長い道のりでも」
line = "「一刻も早く人間界へ駆けつける。たとえ、どんなに長い道のりでも」"

[[dialogue]]
speaker = "サーシャ"
# 「……そうね。今さら、無茶がどうとか言ってられないわ」
line = "「……そうね。今さら、無茶がどうとか言ってられないわ」"

[[dialogue]]
speaker = "ソフィア"
# 「お二人とも、感謝します。私たちも初めての場所ですが──ある程度の案内ならできます」
line = "「お二人とも、感謝します。私たちも初めての場所ですが──ある程度の案内ならできます」"

[[dialogue]]
speaker = "unk"
# みんな腹はくくったようだった。
line = "みんな腹はくくったようだった。"

[[dialogue]]
speaker = "unk"
# すでに長い旅路だった魔界の行軍を締めくくるのは、さらに遠路はるばるの人間界への道のり。
line = "すでに長い旅路だった魔界の行軍を締めくくるのは、さらに遠路はるばるの人間界への道のり。"

[[dialogue]]
speaker = "フィオナ"
# 「参りましょう──誰ひとり欠かさず、人間界へ！」
line = "「参りましょう──誰ひとり欠かさず、人間界へ！」"
