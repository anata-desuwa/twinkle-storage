[[dialogue]]
speaker = "unk"
# 第４話,癒しのトリックオアトリート,P
line = "第４話,癒しのトリックオアトリート,P"

[[dialogue]]
speaker = "unk"
# 今日は特別、星徒会の仕事が忙しい１日だった。
line = "今日は特別、星徒会の仕事が忙しい１日だった。"

[[dialogue]]
speaker = "unk"
# 夜まで星徒会室に居残って仕事をしていて、それもようやくひと段落ついた。
line = "夜まで星徒会室に居残って仕事をしていて、それもようやくひと段落ついた。"

[[dialogue]]
speaker = "unk"
# と、そんな時、部屋のドアがノックされた。
line = "と、そんな時、部屋のドアがノックされた。"

[[dialogue]]
speaker = "ウズメイア"
# 「ガオガオ、トリックオアトリート♪　お菓子をくれなきゃイタズラしちゃうぞ～」
line = "「ガオガオ、トリックオアトリート♪　お菓子をくれなきゃイタズラしちゃうぞ～」"

[[dialogue]]
speaker = "unk"
# そんな格好でどうしたの？
line = "そんな格好でどうしたの？"

[[dialogue]]
speaker = "unk"
# ハロウィンはもう終わってるよ
line = "ハロウィンはもう終わってるよ"

[[dialogue]]
speaker = "ウズメイア"
# 「そんな格好っていうか、普通に戦闘服！　ハロウィンフォームだし！　ハロウィンの時以外、着ちゃいけないって法律はないし！」
line = "「そんな格好っていうか、普通に戦闘服！　ハロウィンフォームだし！　ハロウィンの時以外、着ちゃいけないって法律はないし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「わかればよろしい。ではお菓子とイタズラ、どっちがいいか選ぶし」
line = "「わかればよろしい。ではお菓子とイタズラ、どっちがいいか選ぶし」"

[[dialogue]]
speaker = "ウズメイア"
# 「あーっ、ちょちょちょっと！　なんで戸棚からお菓子を出そうとしてるの！？」
line = "「あーっ、ちょちょちょっと！　なんで戸棚からお菓子を出そうとしてるの！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「どちらがいいか選べとは言ったけど……そこはそうじゃなくて……」
line = "「どちらがいいか選べとは言ったけど……そこはそうじゃなくて……」"

[[dialogue]]
speaker = "ウズメイア"
# 「えーいっ！　問答無用だしっ！！」
line = "「えーいっ！　問答無用だしっ！！」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ、捕まえた♪」
line = "「えへへ、捕まえた♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「お菓子をくれなきゃイタズラするしかないし……まずはくすぐり攻撃♪　こしょこしょこしょ！」
line = "「お菓子をくれなきゃイタズラするしかないし……まずはくすぐり攻撃♪　こしょこしょこしょ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「むーっ、何でこんなことするのかって……そのくらい察して欲しいし！」
line = "「むーっ、何でこんなことするのかって……そのくらい察して欲しいし！」"

[[dialogue]]
speaker = "ウズメイア"
# 「今日はずっと忙しそうで、構ってもらえなかったし。だから、ちょっとした遊び心だし……」
line = "「今日はずっと忙しそうで、構ってもらえなかったし。だから、ちょっとした遊び心だし……」"

[[dialogue]]
speaker = "ウズメイア"
# 「というわけで、会長くんは全力くすぐりの刑なの！」
line = "「というわけで、会長くんは全力くすぐりの刑なの！」"

[[dialogue]]
speaker = "unk"
# か、かんにんして！
line = "か、かんにんして！"

[[dialogue]]
speaker = "unk"
# お代官様！
line = "お代官様！"

[[dialogue]]
speaker = "ウズメイア"
# 「ふふふ、良いではないか、良いではないか」
line = "「ふふふ、良いではないか、良いではないか」"

[[dialogue]]
speaker = "ウズメイア"
# 「なんとも愛い娘よのぉ～、今宵はたっぷり可愛がってやろうぞ……くっくっく！」
line = "「なんとも愛い娘よのぉ～、今宵はたっぷり可愛がってやろうぞ……くっくっく！」"

[[dialogue]]
speaker = "ウズメイア"
# 「この辺りはどうじゃ、こしょこしょ♪　おうおう、ではこの辺りも攻めてみようか？　ほれほれ……」
line = "「この辺りはどうじゃ、こしょこしょ♪　おうおう、ではこの辺りも攻めてみようか？　ほれほれ……」"

[[dialogue]]
speaker = "ウズメイア"
# 「はぁはぁ、お主があまりにも良い声で鳴きよるから、だんだん変な気分になってきたではないか」
line = "「はぁはぁ、お主があまりにも良い声で鳴きよるから、だんだん変な気分になってきたではないか」"

[[dialogue]]
speaker = "unk"
# ごめん、そろそろ本当に勘弁して
line = "ごめん、そろそろ本当に勘弁して"

[[dialogue]]
speaker = "ウズメイア"
# 「む～、振っておいて素に戻るのは反則だし……」
line = "「む～、振っておいて素に戻るのは反則だし……」"

[[dialogue]]
speaker = "ウズメイア"
# 「でも仕方が無いから別なイタズラにしてあげるし♪　ふふ～ん、どんなイタズラにしようかな～」
line = "「でも仕方が無いから別なイタズラにしてあげるし♪　ふふ～ん、どんなイタズラにしようかな～」"

[[dialogue]]
speaker = "unk"
# トリックオアトリート
line = "トリックオアトリート"

[[dialogue]]
speaker = "ウズメイア"
# 「へっ！？」
line = "「へっ！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「イタズラすることしか考えてなかったから、お菓子とか用意してないし……」
line = "「イタズラすることしか考えてなかったから、お菓子とか用意してないし……」"

[[dialogue]]
speaker = "ウズメイア"
# 「ということは、会長くんにイタズラの逆襲されちゃうってこと？」
line = "「ということは、会長くんにイタズラの逆襲されちゃうってこと？」"

[[dialogue]]
speaker = "unk"
# お覚悟めされよ……
line = "お覚悟めされよ……"

[[dialogue]]
speaker = "ウズメイア"
# 「か、会長くん……目が真剣だぁ。何をするつもりなの……？」
line = "「か、会長くん……目が真剣だぁ。何をするつもりなの……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「まさか会長くん、必殺の仕事人になって、あたしのことをくすぐりの刑に処すんじゃ……」
line = "「まさか会長くん、必殺の仕事人になって、あたしのことをくすぐりの刑に処すんじゃ……」"

[[dialogue]]
speaker = "unk"
# もっとひどい事をするよ
line = "もっとひどい事をするよ"

[[dialogue]]
speaker = "ウズメイア"
# 「もっとひどい事！？　え、えへへ……イタズラされるのはいいけど、ちょ～っとだけ手加減して欲しいかも……」
line = "「もっとひどい事！？　え、えへへ……イタズラされるのはいいけど、ちょ～っとだけ手加減して欲しいかも……」"

[[dialogue]]
speaker = "unk"
# 問答無用！
line = "問答無用！"

[[dialogue]]
speaker = "ウズメイア"
# 「ひゃっ！？　あ……ギューって抱きしめて……」
line = "「ひゃっ！？　あ……ギューって抱きしめて……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、う……頭、なでなでして……ダメ、だよ……会長くん……<emoji=heart04>」
line = "「あっ、う……頭、なでなでして……ダメ、だよ……会長くん……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「そんな風に優しくいろいろされちゃったら……あたし、おかしくなっちゃうよ……<emoji=heart04>」
line = "「そんな風に優しくいろいろされちゃったら……あたし、おかしくなっちゃうよ……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# （これが会長くんのイタズラ……？　ひどいどころか、むしろ嬉しいけど……でも、でも……）
line = "（これが会長くんのイタズラ……？　ひどいどころか、むしろ嬉しいけど……でも、でも……）"

[[dialogue]]
speaker = "ウズメイア"
# （会長くんの手が、お耳や尻尾も優しく撫でて……身体がビクンって反応しちゃうし……）
line = "（会長くんの手が、お耳や尻尾も優しく撫でて……身体がビクンって反応しちゃうし……）"

[[dialogue]]
speaker = "ウズメイア"
# （恥ずかしいよぉ……でも、恥ずかしいけど……もっとされたい……イタズラ、して欲しい……<emoji=heart04>）
line = "（恥ずかしいよぉ……でも、恥ずかしいけど……もっとされたい……イタズラ、して欲しい……<emoji=heart04>）"

[[dialogue]]
speaker = "ウズメイア"
# 「ん、ちゅ……んん……<emoji=heart04>」
line = "「ん、ちゅ……んん……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# （キス、してくれた……）
line = "（キス、してくれた……）"

[[dialogue]]
speaker = "ウズメイア"
# （もーっ、会長くん……！　何であたしの気持ち、分かってくれるかなあ……カッコ良すぎるんですけどっ<emoji=heart04>）
line = "（もーっ、会長くん……！　何であたしの気持ち、分かってくれるかなあ……カッコ良すぎるんですけどっ<emoji=heart04>）"

[[dialogue]]
speaker = "ウズメイア"
# 「ちゅ、ん……ふ……ちゅっ……<emoji=heart04>」
line = "「ちゅ、ん……ふ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「ふぁ……えへへ、イタズラされちゃった……<emoji=heart04>　でも、こういうイタズラなら大歓迎かも……<emoji=heart04>」
line = "「ふぁ……えへへ、イタズラされちゃった……<emoji=heart04>　でも、こういうイタズラなら大歓迎かも……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言ってウズメは俺に抱きつき返してくる。
line = "そう言ってウズメは俺に抱きつき返してくる。"

[[dialogue]]
speaker = "unk"
# 可愛い彼女のイタズラのおかげで、たまっていた疲れは一気に吹き飛んだのだった。
line = "可愛い彼女のイタズラのおかげで、たまっていた疲れは一気に吹き飛んだのだった。"
