[[dialogue]]
speaker = "unk"
# 第９話,聖庭園,B
line = "第９話,聖庭園,B"

[[dialogue]]
speaker = "unk"
# 俺とヴィーナス、メルエル、選挙管理委員会の梨緒、ベアトリス、ナターシャ、アポロ……計７人が世界樹を通って天界に到着した。
line = "俺とヴィーナス、メルエル、選挙管理委員会の梨緒、ベアトリス、ナターシャ、アポロ……計７人が世界樹を通って天界に到着した。"

[[dialogue]]
speaker = "メルエル"
# 「着いたよみんな！　あそこの扉をくぐれば聖庭園だよ！」
line = "「着いたよみんな！　あそこの扉をくぐれば聖庭園だよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これが天界なのね！　まさにって感じだわ！」
line = "「これが天界なのね！　まさにって感じだわ！」"

[[dialogue]]
speaker = "アポロ"
# 「おお～っ！　本当に空の上なんだな！　めちゃくちゃ空気が澄んでるぞ！」
line = "「おお～っ！　本当に空の上なんだな！　めちゃくちゃ空気が澄んでるぞ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「うわぁ、高い……落ちたらどうなるか、想像したくないよ……」
line = "「うわぁ、高い……落ちたらどうなるか、想像したくないよ……」"

[[dialogue]]
speaker = "ナターシャ"
# 「一応言っとくけど、物理的に繋がってるわけじゃないから、落ちていっても人間界には行けないよ」
line = "「一応言っとくけど、物理的に繋がってるわけじゃないから、落ちていっても人間界には行けないよ」"

[[dialogue]]
speaker = "ベアトリス"
# 「へぇ、そうなんだ～」
line = "「へぇ、そうなんだ～」"

[[dialogue]]
speaker = "unk"
# 透き通るような青い空が広がり、白い雲がそよ風に乗って<ruby=たゆた>揺蕩</ruby>う。
line = "透き通るような青い空が広がり、白い雲がそよ風に乗って<ruby>揺蕩<rt>たゆた</rt></ruby>う。"

[[dialogue]]
speaker = "unk"
# 扉の前には、大理石のような素材で作られた純白の像が鎮座し、扉を守るように槍を掲げている。
line = "扉の前には、大理石のような素材で作られた純白の像が鎮座し、扉を守るように槍を掲げている。"

[[dialogue]]
speaker = "unk"
# だが人間界と最も大きく異なるのは、頭上だけでなく、足元にも雲が広がっていることだ。
line = "だが人間界と最も大きく異なるのは、頭上だけでなく、足元にも雲が広がっていることだ。"

[[dialogue]]
speaker = "ナターシャ"
# 「天界は空中島になってるんだ。天使が天界から人間界に来ると、足元に雲がないことに驚く子もいるね」
line = "「天界は空中島になってるんだ。天使が天界から人間界に来ると、足元に雲がないことに驚く子もいるね」"

[[dialogue]]
speaker = "梨緒"
# 「絶景ではあるが、残念ながら景観を楽しむ時間はないな。早く女神の神殿に向かわなければ」
line = "「絶景ではあるが、残念ながら景観を楽しむ時間はないな。早く女神の神殿に向かわなければ」"

[[dialogue]]
speaker = "メルエル"
# 「みんな、こっちだよ！」
line = "「みんな、こっちだよ！」"

[[dialogue]]
speaker = "unk"
# メルエルに案内されるまま、扉をくぐり、その先の階段を降りていく。
line = "メルエルに案内されるまま、扉をくぐり、その先の階段を降りていく。"

[[dialogue]]
speaker = "unk"
# すると──
line = "すると──"

[[dialogue]]
speaker = "クロト"
# 「ここが聖庭園……」
line = "「ここが聖庭園……」"

[[dialogue]]
speaker = "ベアトリス"
# 「わぁっ、綺麗な場所……！」
line = "「わぁっ、綺麗な場所……！」"

[[dialogue]]
speaker = "unk"
# 聖庭園は天界の政治的な中心であり、意思決定がなされる場であるという。
line = "聖庭園は天界の政治的な中心であり、意思決定がなされる場であるという。"

[[dialogue]]
speaker = "unk"
# 向こうに見える荘厳な建物は、どうやら聖庭園議会の議事堂のようだ。
line = "向こうに見える荘厳な建物は、どうやら聖庭園議会の議事堂のようだ。"

[[dialogue]]
speaker = "クロト"
# （つまり俺の監視……場合によっては暗殺をナターシャに命令した機関か）
line = "（つまり俺の監視……場合によっては暗殺をナターシャに命令した機関か）"

[[dialogue]]
speaker = "unk"
# 俺が魔王であるからこそ、その力を警戒するのは理解できる。
line = "俺が魔王であるからこそ、その力を警戒するのは理解できる。"

[[dialogue]]
speaker = "unk"
# しかし暗殺まで考慮に入れるのは過激にも感じるが、それだけ魔王の脅威を重く見ているということなのだろうか。
line = "しかし暗殺まで考慮に入れるのは過激にも感じるが、それだけ魔王の脅威を重く見ているということなのだろうか。"

[[dialogue]]
speaker = "ケイティ"
# 「ようこそいらっしゃいました、新星学園の星騎士の皆様。私は聖庭園の衛兵隊長、ケイティと申します」
line = "「ようこそいらっしゃいました、新星学園の星騎士の皆様。私は聖庭園の衛兵隊長、ケイティと申します」"

[[dialogue]]
speaker = "クロト"
# 「初めまして。新星学園星徒会長の緋宮クロトです」
line = "「初めまして。新星学園星徒会長の緋宮クロトです」"

[[dialogue]]
speaker = "ケイティ"
# 「あなたが今代の魔王様ですね。リノ様からお話は伺っております」
line = "「あなたが今代の魔王様ですね。リノ様からお話は伺っております」"

[[dialogue]]
speaker = "unk"
# 見たところ俺よりも少し年齢は上だろうか。衛兵隊長という肩書が意外に思える、穏やかそうな女性だ。
line = "見たところ俺よりも少し年齢は上だろうか。衛兵隊長という肩書が意外に思える、穏やかそうな女性だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は新星星徒会のスーパフィクサー、九浄ヴィーナスよ！　よろしくね！」
line = "「私は新星星徒会のスーパフィクサー、九浄ヴィーナスよ！　よろしくね！」"

[[dialogue]]
speaker = "ケイティ"
# 「フィク……サー……？」
line = "「フィク……サー……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「やっぱり姉さんもいたんだ」
line = "「やっぱり姉さんもいたんだ」"

[[dialogue]]
speaker = "ケイティ"
# 「あらナターシャ、久しぶりですね。メルエルも元気そうで何よりです」
line = "「あらナターシャ、久しぶりですね。メルエルも元気そうで何よりです」"

[[dialogue]]
speaker = "メルエル"
# 「ケイティお姉ちゃんも変わらないね！」
line = "「ケイティお姉ちゃんも変わらないね！」"

[[dialogue]]
speaker = "アポロ"
# 「姉さん？　お姉ちゃん？　ナターシャとメルエルは姉妹だったのか！？」
line = "「姉さん？　お姉ちゃん？　ナターシャとメルエルは姉妹だったのか！？」"

[[dialogue]]
speaker = "メルエル"
# 「ううん、そうじゃないよ。ケイティお姉ちゃんは近所に住むお姉さんで、小さい頃は私やナターシャちゃんとよく遊んでくれてたんだ」
line = "「ううん、そうじゃないよ。ケイティお姉ちゃんは近所に住むお姉さんで、小さい頃は私やナターシャちゃんとよく遊んでくれてたんだ」"

[[dialogue]]
speaker = "ケイティ"
# 「２人の幼なじみ……と言ってもいいかもしれませんね」
line = "「２人の幼なじみ……と言ってもいいかもしれませんね」"

[[dialogue]]
speaker = "ナターシャ"
# 「幼なじみの幼なじみが増えたね」
line = "「幼なじみの幼なじみが増えたね」"

[[dialogue]]
speaker = "アポロ"
# 「なるほど、そういうことか！　３人は仲良しなんだな！」
line = "「なるほど、そういうことか！　３人は仲良しなんだな！」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、そうそう、ケイティ姉さんは『制圧天使』って呼ばれてるから、怒らせない方がいいよ」
line = "「あ、そうそう、ケイティ姉さんは『制圧天使』って呼ばれてるから、怒らせない方がいいよ」"

[[dialogue]]
speaker = "ケイティ"
# 「もう、その呼び名はやめてくださいと言っているのに……」
line = "「もう、その呼び名はやめてくださいと言っているのに……」"

[[dialogue]]
speaker = "クロト"
# （制圧天使……？）
line = "（制圧天使……？）"

[[dialogue]]
speaker = "unk"
# 聖庭園の衛兵隊長には相応しい二つ名だろうが、目の前の彼女がそう呼ばれているとは思えなかった。
line = "聖庭園の衛兵隊長には相応しい二つ名だろうが、目の前の彼女がそう呼ばれているとは思えなかった。"

[[dialogue]]
speaker = "ベアトリス"
# 「そういえばナターシャちゃんもメルエルさんも、ご家族には会わなくてもいいの？　聖庭園の出身なんでしょ？」
line = "「そういえばナターシャちゃんもメルエルさんも、ご家族には会わなくてもいいの？　聖庭園の出身なんでしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「うん。うちの家族は流星市国にいるから。仕事の関係で家族ごと引っ越したんだ」
line = "「うん。うちの家族は流星市国にいるから。仕事の関係で家族ごと引っ越したんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「うちもどうせ出払ってるだろうしね。気にしなくていいよ」
line = "「うちもどうせ出払ってるだろうしね。気にしなくていいよ」"

[[dialogue]]
speaker = "クロト"
# 「聖庭園には『シエルの<ruby=はこ>筐</ruby>』を託してくれたリガルタ翁もおられたはず。ゆっくり話す余裕はないけど、一言お礼だけでも──」
line = "「聖庭園には『シエルの<ruby>筐<rt>はこ</rt></ruby>』を託してくれたリガルタ翁もおられたはず。ゆっくり話す余裕はないけど、一言お礼だけでも──」"

[[dialogue]]
speaker = "ケイティ"
# 「リガルタ様は現在ご不在です。申し訳ありません」
line = "「リガルタ様は現在ご不在です。申し訳ありません」"

[[dialogue]]
speaker = "クロト"
# （……？　今ケイティさんの表情が少し曇ったような……）
line = "（……？　今ケイティさんの表情が少し曇ったような……）"

[[dialogue]]
speaker = "unk"
# その時、議会の方からこちらに男性が駆けてきた。
line = "その時、議会の方からこちらに男性が駆けてきた。"

[[dialogue]]
speaker = "聖庭園議員"
# 「姫！　お戻りになられたのですね──！」
line = "「姫！　お戻りになられたのですね──！」"

[[dialogue]]
speaker = "unk"
# 『姫』とは誰のことだろうと首を傾げたが、彼はメルエルの前に来て……
line = "『姫』とは誰のことだろうと首を傾げたが、彼はメルエルの前に来て……"

[[dialogue]]
speaker = "聖庭園議員"
# 「お帰りをお待ちしていました、姫！」
line = "「お帰りをお待ちしていました、姫！」"

[[dialogue]]
speaker = "メルエル"
# 「えっ！？　姫って私のこと！？」
line = "「えっ！？　姫って私のこと！？」"

[[dialogue]]
speaker = "unk"
# 男性は明らかにメルエルに呼びかけていた。
line = "男性は明らかにメルエルに呼びかけていた。"

[[dialogue]]
speaker = "unk"
# そこにナターシャが割って入る。
line = "そこにナターシャが割って入る。"

[[dialogue]]
speaker = "ナターシャ"
# 「あーはいはい。今それどころじゃないからお帰り願いまーす」
line = "「あーはいはい。今それどころじゃないからお帰り願いまーす」"

[[dialogue]]
speaker = "ナターシャ"
# 「それとも力ずくでわからせてあげようか？」
line = "「それとも力ずくでわからせてあげようか？」"

[[dialogue]]
speaker = "聖庭園議員"
# 「ぐ……」
line = "「ぐ……」"

[[dialogue]]
speaker = "unk"
# ナターシャがにらみを利かせると、男性は踵を返して、すごすごと議事堂の方に戻っていった。
line = "ナターシャがにらみを利かせると、男性は踵を返して、すごすごと議事堂の方に戻っていった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「今の、何だったのかしら……？」
line = "「今の、何だったのかしら……？」"

[[dialogue]]
speaker = "メルエル"
# 「姫って……お姫様ってこと……？　私、人間界で使ってる苗字は姫咲だけど、そういう感じじゃなかったよね……？」
line = "「姫って……お姫様ってこと……？　私、人間界で使ってる苗字は姫咲だけど、そういう感じじゃなかったよね……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「さぁ？　誰かと勘違いしたんじゃない？」
line = "「さぁ？　誰かと勘違いしたんじゃない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「それより姉さん、状況を教えてもらっていい？　聖庭園なら各地の戦況も把握してるでしょ」
line = "「それより姉さん、状況を教えてもらっていい？　聖庭園なら各地の戦況も把握してるでしょ」"

[[dialogue]]
speaker = "ケイティ"
# 「もちろんです。ですがその前に、みなさんに天界の構造を軽く説明いたしましょう」
line = "「もちろんです。ですがその前に、みなさんに天界の構造を軽く説明いたしましょう」"

[[dialogue]]
speaker = "ケイティ"
# 「天界は人間界や魔界と違い、天界全体で１つの国家のようになっています。そのため機能に特化した都市を作ることができました」
line = "「天界は人間界や魔界と違い、天界全体で１つの国家のようになっています。そのため機能に特化した都市を作ることができました」"

[[dialogue]]
speaker = "ケイティ"
# 「学術都市ウル、武闘都市ウリル、医療都市ラファル、芸術都市イオルなどがあります」
line = "「学術都市ウル、武闘都市ウリル、医療都市ラファル、芸術都市イオルなどがあります」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ウルは確かアナの故郷だったわね。学術都市なんて、なんだかアナらしいわ」
line = "「ウルは確かアナの故郷だったわね。学術都市なんて、なんだかアナらしいわ」"

[[dialogue]]
speaker = "ケイティ"
# 「現在襲撃を受けているのは、各都市の付近にある守護天使様の神殿です」
line = "「現在襲撃を受けているのは、各都市の付近にある守護天使様の神殿です」"

[[dialogue]]
speaker = "ケイティ"
# 「守護天使様の神殿は本山があり、分社も天界各地に分散しておりますが、分社は今のところ攻撃を受けていないようです」
line = "「守護天使様の神殿は本山があり、分社も天界各地に分散しておりますが、分社は今のところ攻撃を受けていないようです」"

[[dialogue]]
speaker = "unk"
# 確かミルフィーは守護天使マグダレナを、イクシーは守護天使アルモタヘルを祀る一族だったはず。
line = "確かミルフィーは守護天使マグダレナを、イクシーは守護天使アルモタヘルを祀る一族だったはず。"

[[dialogue]]
speaker = "unk"
# 彼女たちもきっと今、神殿を守るために戦っているところだろう。
line = "彼女たちもきっと今、神殿を守るために戦っているところだろう。"

[[dialogue]]
speaker = "ケイティ"
# 「流星・新星・ネビュラの方々が救援に来られておりますが、世界樹による人員輸送には限りがあり、どこも余裕がありません」
line = "「流星・新星・ネビュラの方々が救援に来られておりますが、世界樹による人員輸送には限りがあり、どこも余裕がありません」"

[[dialogue]]
speaker = "ケイティ"
# 「いずれの戦場も激戦になっていることでしょう。我々も助けに向かいたいところですが……」
line = "「いずれの戦場も激戦になっていることでしょう。我々も助けに向かいたいところですが……」"

[[dialogue]]
speaker = "ナターシャ"
# 「こっちはこっちで女神の神殿を守らないとね」
line = "「こっちはこっちで女神の神殿を守らないとね」"

[[dialogue]]
speaker = "ケイティ"
# 「はい。それにここ聖庭園は天界の中枢、情報が集まる場所です。<ruby=かくらん>撹乱</ruby>のためにこちらを狙ってくるかもしれません」
line = "「はい。それにここ聖庭園は天界の中枢、情報が集まる場所です。<ruby>撹乱<rt>かくらん</rt></ruby>のためにこちらを狙ってくるかもしれません」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル……！」
line = "「ブルルル……！」"

[[dialogue]]
speaker = "ケイティ"
# 「！　やはり現れましたね」
line = "「！　やはり現れましたね」"

[[dialogue]]
speaker = "ケイティ"
# 「平和を乱すものは許しません」
line = "「平和を乱すものは許しません」"

[[dialogue]]
speaker = "ナターシャ"
# 「聖庭園にケンカを売るからには、覚悟してもらわないとね」
line = "「聖庭園にケンカを売るからには、覚悟してもらわないとね」"

[[dialogue]]
speaker = "メルエル"
# 「うん。天界の平和は私たちが守るんだから！」
line = "「うん。天界の平和は私たちが守るんだから！」"
