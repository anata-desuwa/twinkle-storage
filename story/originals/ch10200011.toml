[[dialogue]]
speaker = "unk"
# 第１話,大人気のＶチューバー,P
line = "第１話,大人気のＶチューバー,P"

[[dialogue]]
speaker = "unk"
# 海野辺ルルカ。最近知り合った、アナのクラスメイトだという後輩だ。
line = "海野辺ルルカ。最近知り合った、アナのクラスメイトだという後輩だ。"

[[dialogue]]
speaker = "unk"
# 歌が得意で、大聖堂の聖歌隊に所属しているらしい。そんな彼女が今、目の前にいるのだが……
line = "歌が得意で、大聖堂の聖歌隊に所属しているらしい。そんな彼女が今、目の前にいるのだが……"

[[dialogue]]
speaker = "ルルカ"
# 「うぅう～っ……」
line = "「うぅう～っ……」"

[[dialogue]]
speaker = "unk"
# ルルカ。どうかした？
line = "ルルカ。どうかした？"

[[dialogue]]
speaker = "ルルカ"
# 「駄目だぁ。ぜんっぜん登録者が増えてない……やっぱりここらで頭打ちなのかなあ……」
line = "「駄目だぁ。ぜんっぜん登録者が増えてない……やっぱりここらで頭打ちなのかなあ……」"

[[dialogue]]
speaker = "ルルカ"
# 「鬼辛カップラーメン３倍チャレンジ……今のトレンドだよねー？　まだ古いネタじゃないはずなのに……」
line = "「鬼辛カップラーメン３倍チャレンジ……今のトレンドだよねー？　まだ古いネタじゃないはずなのに……」"

[[dialogue]]
speaker = "ルルカ"
# 「えーっと、なになに、コメントは……」
line = "「えーっと、なになに、コメントは……」"

[[dialogue]]
speaker = "ルルカ"
# 「いくら何でも声が汚い、ずっと鼻水ずびずびで草、ろれつ回ってなくて草、これは汚いルカルカ、嗚咽たすかる……」
line = "「いくら何でも声が汚い、ずっと鼻水ずびずびで草、ろれつ回ってなくて草、これは汚いルカルカ、嗚咽たすかる……」"

[[dialogue]]
speaker = "ルルカ"
# 「ウケてる……ウケてるけどっ……常連しかコメントしてないじゃん！」
line = "「ウケてる……ウケてるけどっ……常連しかコメントしてないじゃん！」"

[[dialogue]]
speaker = "ルルカ"
# 「新規層！　新規層が……欲しいのにっ……！」
line = "「新規層！　新規層が……欲しいのにっ……！」"

[[dialogue]]
speaker = "ルルカ"
# 「あんなに体を張ったのに……むせすぎてマイク壊しそうだったのにー……いまいちだぁ～」
line = "「あんなに体を張ったのに……むせすぎてマイク壊しそうだったのにー……いまいちだぁ～」"

[[dialogue]]
speaker = "ルルカ"
# 「ゲーム実況もなぁ。最近、聖歌隊の活動が忙しくって時間取りづらいし……うぅ～ん……」
line = "「ゲーム実況もなぁ。最近、聖歌隊の活動が忙しくって時間取りづらいし……うぅ～ん……」"

[[dialogue]]
speaker = "ルルカ"
# 「こ、こうなったら、ちょっぴり過激な、え、ええ、えっちなシチュエーションボイスとか、やるべきかも……！？」
line = "「こ、こうなったら、ちょっぴり過激な、え、ええ、えっちなシチュエーションボイスとか、やるべきかも……！？」"

[[dialogue]]
speaker = "ルルカ"
# 「一歩間違えばアカウント停止だけどっ。効果は絶大……のはず……！」
line = "「一歩間違えばアカウント停止だけどっ。効果は絶大……のはず……！」"

[[dialogue]]
speaker = "ルルカ"
# 「うん。何もやらないよりはいいよね。検索しよ。えーっと、バイノーラル、配信、コツ……」
line = "「うん。何もやらないよりはいいよね。検索しよ。えーっと、バイノーラル、配信、コツ……」"

[[dialogue]]
speaker = "unk"
# えーっと……ルルカ？
line = "えーっと……ルルカ？"

[[dialogue]]
speaker = "ルルカ"
# 「えっ──」
line = "「えっ──」"

[[dialogue]]
speaker = "ルルカ"
# 「お、お、おお、お兄ちゃんっ！？」
line = "「お、お、おお、お兄ちゃんっ！？」"

[[dialogue]]
speaker = "unk"
# その子、Ｖチューバーの『ルカルカ』？
line = "その子、Ｖチューバーの『ルカルカ』？"

[[dialogue]]
speaker = "ルルカ"
# 「ち、ちちちちちちっ、違うよ！？」
line = "「ち、ちちちちちちっ、違うよ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、あたしはルルカ！　この子はルカルカ！　ぜんっぜん名前も違うよね！？」
line = "「あ、あたしはルルカ！　この子はルカルカ！　ぜんっぜん名前も違うよね！？」"

[[dialogue]]
speaker = "ルルカ"
# 「つまり２人は別人ってことなの！　うん、そう！　ルルカは、ルカルカと何の関係もないんだっ、あはははっ！！」
line = "「つまり２人は別人ってことなの！　うん、そう！　ルルカは、ルカルカと何の関係もないんだっ、あはははっ！！」"

[[dialogue]]
speaker = "ルルカ"
# 「配信の時間帯傾向から、学生じゃないか～って言われてるけど！　あれは根も葉もない噂！　噂だし！」
line = "「配信の時間帯傾向から、学生じゃないか～って言われてるけど！　あれは根も葉もない噂！　噂だし！」"

[[dialogue]]
speaker = "ルルカ"
# 「昨日の夕食は確かに激辛カップラーメンだったけど……それはたまたま偶然の一致っていうか！」
line = "「昨日の夕食は確かに激辛カップラーメンだったけど……それはたまたま偶然の一致っていうか！」"

[[dialogue]]
speaker = "unk"
# ……自分から正体をバラしすぎじゃないか？
line = "……自分から正体をバラしすぎじゃないか？"

[[dialogue]]
speaker = "ルルカ"
# 「うっ……！　ああああああっ……！　どうしようっ……とうとう知り合いに、身バレしちゃったよぉ～っ……！！」
line = "「うっ……！　ああああああっ……！　どうしようっ……とうとう知り合いに、身バレしちゃったよぉ～っ……！！」"

[[dialogue]]
speaker = "ルルカ"
# 「はい……そうです……あたしが、Ｖチューバー『汐ルカルカ』の中の人です……」
line = "「はい……そうです……あたしが、Ｖチューバー『汐ルカルカ』の中の人です……」"

[[dialogue]]
speaker = "ルルカ"
# 「登録者数は最近５０万越えたところ……って自分で言うと嫌味っぽいかな。あはは……」
line = "「登録者数は最近５０万越えたところ……って自分で言うと嫌味っぽいかな。あはは……」"

[[dialogue]]
speaker = "ルルカ"
# 「初めは、歌ってみたを投稿するちっちゃなチャンネルだったんだよね」
line = "「初めは、歌ってみたを投稿するちっちゃなチャンネルだったんだよね」"

[[dialogue]]
speaker = "ルルカ"
# 「大好きなアイドルソングを歌って、公開するだけ。案の定、埋もれちゃったんだよね……」
line = "「大好きなアイドルソングを歌って、公開するだけ。案の定、埋もれちゃったんだよね……」"

[[dialogue]]
speaker = "ルルカ"
# 「サムネイルとか、色々工夫してみたんだけど、あんまり伸びなくって」
line = "「サムネイルとか、色々工夫してみたんだけど、あんまり伸びなくって」"

[[dialogue]]
speaker = "ルルカ"
# 「で、どうしようって思ってた時に……ちょうどＶチューバーの間で流行ってたゲームがあったの。フィットネス系の実況配信」
line = "「で、どうしようって思ってた時に……ちょうどＶチューバーの間で流行ってたゲームがあったの。フィットネス系の実況配信」"

[[dialogue]]
speaker = "ルルカ"
# 「試しにやってみたら『息切れが喘ぎ声みたいでエロい』って……なんか知らないけどすっごいバズっちゃって」
line = "「試しにやってみたら『息切れが喘ぎ声みたいでエロい』って……なんか知らないけどすっごいバズっちゃって」"

[[dialogue]]
speaker = "ルルカ"
# 「で……ああ、こういうのがウケるんだって思ったから……徹底的に真似したんだ。人気配信者のアプローチってやつ」
line = "「で……ああ、こういうのがウケるんだって思ったから……徹底的に真似したんだ。人気配信者のアプローチってやつ」"

[[dialogue]]
speaker = "ルルカ"
# 「運が良かったんだと思う。ありがたいことに、人気Ｖチューバーのランキングにも常連になって……」
line = "「運が良かったんだと思う。ありがたいことに、人気Ｖチューバーのランキングにも常連になって……」"

[[dialogue]]
speaker = "ルルカ"
# 「でも、もう限界なの～っ！」
line = "「でも、もう限界なの～っ！」"

[[dialogue]]
speaker = "ルルカ"
# 「流行りすたりが激しいから市場調査だけでとんでもない労力だし……！」
line = "「流行りすたりが激しいから市場調査だけでとんでもない労力だし……！」"

[[dialogue]]
speaker = "ルルカ"
# 「メンバー用のコンテンツも最近マンネリしちゃって飽きられてる気がするし……！」
line = "「メンバー用のコンテンツも最近マンネリしちゃって飽きられてる気がするし……！」"

[[dialogue]]
speaker = "ルルカ"
# 「歌系のチャンネルなのに、ラーメン食べて鼻水すすってる動画の方が伸びちゃうし……！！」
line = "「歌系のチャンネルなのに、ラーメン食べて鼻水すすってる動画の方が伸びちゃうし……！！」"

[[dialogue]]
speaker = "ルルカ"
# 「いや、最後のはしょうがないんだけど……そーいうアプローチを選んだのはあたしだから……」
line = "「いや、最後のはしょうがないんだけど……そーいうアプローチを選んだのはあたしだから……」"

[[dialogue]]
speaker = "ルルカ"
# 「でも、もう個人でやってくのは限界だよ……！　プレッシャーでつぶれちゃいそう！！」
line = "「でも、もう個人でやってくのは限界だよ……！　プレッシャーでつぶれちゃいそう！！」"

[[dialogue]]
speaker = "unk"
# 俺にできることがあるなら、手伝うよ
line = "俺にできることがあるなら、手伝うよ"

[[dialogue]]
speaker = "ルルカ"
# 「……へ？　い、いいの？　でもどうして？　別にお兄ちゃんって、Ｖチューバーが好きなわけじゃないよね？」
line = "「……へ？　い、いいの？　でもどうして？　別にお兄ちゃんって、Ｖチューバーが好きなわけじゃないよね？」"

[[dialogue]]
speaker = "unk"
# ルカルカの歌は好きで、よく聞いていた
line = "ルカルカの歌は好きで、よく聞いていた"

[[dialogue]]
speaker = "ルルカ"
# 「えっ、お兄ちゃんってリスナーさんだったの！？　わぁぁ……な、なんか恥ずかしいかも……」
line = "「えっ、お兄ちゃんってリスナーさんだったの！？　わぁぁ……な、なんか恥ずかしいかも……」"

[[dialogue]]
speaker = "ルルカ"
# 「でも、助けてくれるのはすっごく助かるかも！　こう、アシスタント、みたいな？　精神的な支えが欲しくって……」
line = "「でも、助けてくれるのはすっごく助かるかも！　こう、アシスタント、みたいな？　精神的な支えが欲しくって……」"

[[dialogue]]
speaker = "ルルカ"
# 「いいの？　うぅっ……ありがと！　すっごく心強いよ！」
line = "「いいの？　うぅっ……ありがと！　すっごく心強いよ！」"

[[dialogue]]
speaker = "ルルカ"
# 「アイデアを交換したり、あたしの考えた企画に意見をしてくれたら嬉しいなっ……！」
line = "「アイデアを交換したり、あたしの考えた企画に意見をしてくれたら嬉しいなっ……！」"

[[dialogue]]
speaker = "ルルカ"
# 「あ、でもね。Ｖチューバー活動を手伝ってもらうにあたって、気をつけて欲しいことがあるの」
line = "「あ、でもね。Ｖチューバー活動を手伝ってもらうにあたって、気をつけて欲しいことがあるの」"

[[dialogue]]
speaker = "ルルカ"
# 「汐ルカルカの正体……誰にもバラしちゃ駄目だよ！！」
line = "「汐ルカルカの正体……誰にもバラしちゃ駄目だよ！！」"

[[dialogue]]
speaker = "unk"
# （まさかルルカに言われるとは……）
line = "（まさかルルカに言われるとは……）"

[[dialogue]]
speaker = "ルルカ"
# 「い～い？　学園の友達とかにも、家族にも言っちゃ駄目だよ。お兄ちゃんとルルカだけの、ヒミツ！」
line = "「い～い？　学園の友達とかにも、家族にも言っちゃ駄目だよ。お兄ちゃんとルルカだけの、ヒミツ！」"

[[dialogue]]
speaker = "ルルカ"
# 「約束、だからね！」
line = "「約束、だからね！」"
