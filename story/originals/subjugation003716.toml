[[dialogue]]
speaker = "unk"
# 第１６話,愛おしい世界の形（中編）,B
line = "第１６話,愛おしい世界の形（中編）,B"

[[dialogue]]
speaker = "unk"
# 場所は変わって──平行世界アルタイル。
line = "場所は変わって──平行世界アルタイル。"

[[dialogue]]
speaker = "unk"
# デネブからやってきたグレイスたちは、緋宮クロトによって案内された場所で待機していた。
line = "デネブからやってきたグレイスたちは、緋宮クロトによって案内された場所で待機していた。"

[[dialogue]]
speaker = "unk"
# 新星学園の会議室では、グレイスが１人。
line = "新星学園の会議室では、グレイスが１人。"

[[dialogue]]
speaker = "グレイス"
# 「よぅしっ！　まずはお茶の準備ですねっ！」
line = "「よぅしっ！　まずはお茶の準備ですねっ！」"

[[dialogue]]
speaker = "unk"
# かつて軟禁場所として使われていた、新星学園の会議室。
line = "かつて軟禁場所として使われていた、新星学園の会議室。"

[[dialogue]]
speaker = "unk"
# グレイスにとっては勝手知ったる我が家のようなもの。てきぱきとお湯を沸かし、ティーカップを<b>３つ</b>用意する。
line = "グレイスにとっては勝手知ったる我が家のようなもの。てきぱきとお湯を沸かし、ティーカップを<b>３つ</b>用意する。"

[[dialogue]]
speaker = "グレイス"
# 「ふっふっふ。今日この日のために、おいしいお茶の淹れ方はレティシアからばっちり習ってきています！」
line = "「ふっふっふ。今日この日のために、おいしいお茶の淹れ方はレティシアからばっちり習ってきています！」"

[[dialogue]]
speaker = "グレイス"
# 「お湯の温度、茶葉の量──蒸らす時間にカップの色味のチョイスも完璧！　最高の一杯を出さなくては！」
line = "「お湯の温度、茶葉の量──蒸らす時間にカップの色味のチョイスも完璧！　最高の一杯を出さなくては！」"

[[dialogue]]
speaker = "unk"
# 張り切るのも当然だった。
line = "張り切るのも当然だった。"

[[dialogue]]
speaker = "unk"
# グレイスにとって──１０年ぶりの再会なのだから。
line = "グレイスにとって──１０年ぶりの再会なのだから。"

[[dialogue]]
speaker = "グレイス"
# 「あ、あれっ？　あれれっ……？　手が震えてっ……あ、またこぼしちゃいましたっ……」
line = "「あ、あれっ？　あれれっ……？　手が震えてっ……あ、またこぼしちゃいましたっ……」"

[[dialogue]]
speaker = "グレイス"
# 「こ、こんな調子じゃいけませんねっ！　深呼吸しましょう！」
line = "「こ、こんな調子じゃいけませんねっ！　深呼吸しましょう！」"

[[dialogue]]
speaker = "グレイス"
# 「すー……はー……！　すー……はー……！」
line = "「すー……はー……！　すー……はー……！」"

[[dialogue]]
speaker = "unk"
# しかし、どれだけ落ち着こうとしても手が震えてしまう。ティーポットを持つ手がかたかたと震えて、紅茶がうまく淹れられない。
line = "しかし、どれだけ落ち着こうとしても手が震えてしまう。ティーポットを持つ手がかたかたと震えて、紅茶がうまく淹れられない。"

[[dialogue]]
speaker = "グレイス"
# 「こ、こんな調子じゃいけませんねっ！　『どんな時でも明るく笑え』がオベロニアの教えですっ！」
line = "「こ、こんな調子じゃいけませんねっ！　『どんな時でも明るく笑え』がオベロニアの教えですっ！」"

[[dialogue]]
speaker = "グレイス"
# 「笑顔には自信がありますからね。お父さんたちも、デネブが１０年先の未来だということは魔王さんから聞いているはずですし……！」
line = "「笑顔には自信がありますからね。お父さんたちも、デネブが１０年先の未来だということは魔王さんから聞いているはずですし……！」"

[[dialogue]]
speaker = "グレイス"
# 「ばっちり大人のレディに成長したところを見せて、安心してもらわないといけません！」
line = "「ばっちり大人のレディに成長したところを見せて、安心してもらわないといけません！」"

[[dialogue]]
speaker = "グレイス"
# 「にっこり笑顔で、ばっちりお出迎えしなくてはっ！」
line = "「にっこり笑顔で、ばっちりお出迎えしなくてはっ！」"

[[dialogue]]
speaker = "グレイス"
# 「──っ！！」
line = "「──っ！！」"

[[dialogue]]
speaker = "unk"
# まだ準備ができていないのに、もう来てしまった──廊下で待たせるわけにはいかない。
line = "まだ準備ができていないのに、もう来てしまった──廊下で待たせるわけにはいかない。"

[[dialogue]]
speaker = "グレイス"
# 「…………ど、どうぞ！！」
line = "「…………ど、どうぞ！！」"

[[dialogue]]
speaker = "unk"
# そうしてやってきたのは、１組の男女だった。
line = "そうしてやってきたのは、１組の男女だった。"

[[dialogue]]
speaker = "unk"
# 見間違えるはずがない。大好きだった、心から尊敬していた両親。
line = "見間違えるはずがない。大好きだった、心から尊敬していた両親。"

[[dialogue]]
speaker = "unk"
# グレイス自らの手で埋葬をした両親が──確かに生きて、そこにいる。
line = "グレイス自らの手で埋葬をした両親が──確かに生きて、そこにいる。"

[[dialogue]]
speaker = "グレイスの父"
# 「……待たせたね」
line = "「……待たせたね」"

[[dialogue]]
speaker = "グレイスの母"
# 「星徒会長様から、平行世界の存在を聞いた時は驚きましたが……」
line = "「星徒会長様から、平行世界の存在を聞いた時は驚きましたが……」"

[[dialogue]]
speaker = "グレイスの父"
# 「ああ。１０年経っていようが……見間違えるわけがない。私たちの──大切な、娘だ」
line = "「ああ。１０年経っていようが……見間違えるわけがない。私たちの──大切な、娘だ」"

[[dialogue]]
speaker = "グレイスの母"
# 「……グレイス。もっと近くに来て、顔をよく見せてくれますか？」
line = "「……グレイス。もっと近くに来て、顔をよく見せてくれますか？」"

[[dialogue]]
speaker = "グレイス"
# 「あ………………ぁぁぁ………………」
line = "「あ………………ぁぁぁ………………」"

[[dialogue]]
speaker = "unk"
# ──お久しぶりです！　お父さん、お母さん！
line = "──お久しぶりです！　お父さん、お母さん！"

[[dialogue]]
speaker = "unk"
# ──平行世界の娘の、グレイスですっ！！
line = "──平行世界の娘の、グレイスですっ！！"

[[dialogue]]
speaker = "unk"
# ──お父さんやお母さんが胸を張れるような、立派な星騎士に成長したんですよ～！！
line = "──お父さんやお母さんが胸を張れるような、立派な星騎士に成長したんですよ～！！"

[[dialogue]]
speaker = "unk"
# …………用意していた言葉は、何１つ発することができなかった。
line = "…………用意していた言葉は、何１つ発することができなかった。"

[[dialogue]]
speaker = "グレイス"
# 「──うぁあぁあぁぁぁああっ！！」
line = "「──うぁあぁあぁぁぁああっ！！」"

[[dialogue]]
speaker = "unk"
# グレイスは、気づいた時には両親の胸へ飛び込んでいた。
line = "グレイスは、気づいた時には両親の胸へ飛び込んでいた。"

[[dialogue]]
speaker = "グレイス"
# 「おとうさんっ……おかあさんっ……！！　会いたかった……ずっと、ずっと会いたかったですっ……！！」
line = "「おとうさんっ……おかあさんっ……！！　会いたかった……ずっと、ずっと会いたかったですっ……！！」"

[[dialogue]]
speaker = "unk"
# 父のぬくもり。母のぬくもり。１０年前に取り上げられたそれに触れていると、涙が止まらなかった。
line = "父のぬくもり。母のぬくもり。１０年前に取り上げられたそれに触れていると、涙が止まらなかった。"

[[dialogue]]
speaker = "グレイスの父"
# 「デネブで何があったか。その後の１０年、どう過ごしてきたか……全て新星学園の会長から聞いたよ」
line = "「デネブで何があったか。その後の１０年、どう過ごしてきたか……全て新星学園の会長から聞いたよ」"

[[dialogue]]
speaker = "グレイスの母"
# 「ええ。そして世界を守るために、あなたがどれだけ尽くしたかのかも……本当によく頑張りましたね、グレイス」
line = "「ええ。そして世界を守るために、あなたがどれだけ尽くしたかのかも……本当によく頑張りましたね、グレイス」"

[[dialogue]]
speaker = "unk"
# 両親に頭を撫でられ、褒められて──グレイスの胸がじわりと温かくなる。
line = "両親に頭を撫でられ、褒められて──グレイスの胸がじわりと温かくなる。"

[[dialogue]]
speaker = "unk"
# 『そうなんですよ！　私、頑張りました！！』
line = "『そうなんですよ！　私、頑張りました！！』"

[[dialogue]]
speaker = "unk"
# 『いっぱい褒めてください！　えっへん！！』
line = "『いっぱい褒めてください！　えっへん！！』"

[[dialogue]]
speaker = "unk"
# 用意していたはずの言葉は言えず──グレイスは首を横に振った。
line = "用意していたはずの言葉は言えず──グレイスは首を横に振った。"

[[dialogue]]
speaker = "グレイス"
# 「違いますっ……違いますっ……私、ほ、褒められるようなこと、してません……！」
line = "「違いますっ……違いますっ……私、ほ、褒められるようなこと、してません……！」"

[[dialogue]]
speaker = "グレイスの父"
# 「おや……？」
line = "「おや……？」"

[[dialogue]]
speaker = "グレイス"
# 「頑張りましたけど……この１０年っ！　い、いっぱい……お父さんたちとの約束、破りましたっ……！」
line = "「頑張りましたけど……この１０年っ！　い、いっぱい……お父さんたちとの約束、破りましたっ……！」"

[[dialogue]]
speaker = "グレイス"
# 「お友達と喧嘩も、いっぱいしましたしっ……授業中に居眠りもしましたっ……お寝坊だって、たくさん……！」
line = "「お友達と喧嘩も、いっぱいしましたしっ……授業中に居眠りもしましたっ……お寝坊だって、たくさん……！」"

[[dialogue]]
speaker = "グレイスの母"
# 「あら……？」
line = "「あら……？」"

[[dialogue]]
speaker = "グレイス"
# 「ついさっきだって、星徒会のお仕事、うっかりしてて……友達に手伝ってもらって……！」
line = "「ついさっきだって、星徒会のお仕事、うっかりしてて……友達に手伝ってもらって……！」"

[[dialogue]]
speaker = "グレイスの父"
# 「──ふふ。そうだったんだね」
line = "「──ふふ。そうだったんだね」"

[[dialogue]]
speaker = "グレイスの母"
# 「あらあら……ふふ。それはいけませんね、グレイス？」
line = "「あらあら……ふふ。それはいけませんね、グレイス？」"

[[dialogue]]
speaker = "グレイス"
# 「はいっ……だから私……魔王さんたちが、言っているような、いい子じゃないですっ……！」
line = "「はいっ……だから私……魔王さんたちが、言っているような、いい子じゃないですっ……！」"

[[dialogue]]
speaker = "unk"
# たくさん褒めて欲しかった。自慢の娘ですと胸を張りたかった──けれど。
line = "たくさん褒めて欲しかった。自慢の娘ですと胸を張りたかった──けれど。"

[[dialogue]]
speaker = "unk"
# グレイスは、大好きな両親に嘘を吐くことが何よりも嫌だった。
line = "グレイスは、大好きな両親に嘘を吐くことが何よりも嫌だった。"

[[dialogue]]
speaker = "unk"
# この１０年間、良いことしかしていなかったわけがない。両親に知られたら、お小言を言われるようなこともたくさんしてしまった。
line = "この１０年間、良いことしかしていなかったわけがない。両親に知られたら、お小言を言われるようなこともたくさんしてしまった。"

[[dialogue]]
speaker = "unk"
# それらを包み隠さず伝えたい。叱られてもいい。自分のことを余さず知って欲しい──それがグレイスの本心だった。
line = "それらを包み隠さず伝えたい。叱られてもいい。自分のことを余さず知って欲しい──それがグレイスの本心だった。"

[[dialogue]]
speaker = "グレイスの父"
# 「この子は本当に……」
line = "「この子は本当に……」"

[[dialogue]]
speaker = "グレイスの母"
# 「ええ。隠し事のできない、可愛い子ですね。あなた？」
line = "「ええ。隠し事のできない、可愛い子ですね。あなた？」"

[[dialogue]]
speaker = "グレイスの父"
# 「グレイス。新星学園の星徒会長さんや……向こうにいるルヴィネさんとも事前に話をしているよ、私たちは」
line = "「グレイス。新星学園の星徒会長さんや……向こうにいるルヴィネさんとも事前に話をしているよ、私たちは」"

[[dialogue]]
speaker = "グレイス"
# 「そう……なんですか……？」
line = "「そう……なんですか……？」"

[[dialogue]]
speaker = "グレイスの母"
# 「ええ。グレイスの良いところも、ちょっぴりいけないところも……全部聞いていますからね」
line = "「ええ。グレイスの良いところも、ちょっぴりいけないところも……全部聞いていますからね」"

[[dialogue]]
speaker = "グレイスの父"
# 「いつも明るくて、賑やかで、奔放で……少し周りを困らせることもあるけれど……」
line = "「いつも明るくて、賑やかで、奔放で……少し周りを困らせることもあるけれど……」"

[[dialogue]]
speaker = "グレイスの母"
# 「安心して背中を任せられる、頼りになる星騎士です──って」
line = "「安心して背中を任せられる、頼りになる星騎士です──って」"

[[dialogue]]
speaker = "グレイスの父"
# 「グレイス。本当に立派になったね。お父さんたちの、自慢の娘だ」
line = "「グレイス。本当に立派になったね。お父さんたちの、自慢の娘だ」"

[[dialogue]]
speaker = "グレイス"
# 「────────っ」
line = "「────────っ」"

[[dialogue]]
speaker = "グレイスの母"
# 「さぁ、お母様からの言いつけですよ？　オベロニアの教えを守りなさい、グレイス──」
line = "「さぁ、お母様からの言いつけですよ？　オベロニアの教えを守りなさい、グレイス──」"

[[dialogue]]
speaker = "グレイスの母"
# 「……私たちの大好きな、可愛い笑顔を見せてくれますか？」
line = "「……私たちの大好きな、可愛い笑顔を見せてくれますか？」"

[[dialogue]]
speaker = "グレイス"
# 「ぁ……ぅ……うぅっ……！」
line = "「ぁ……ぅ……うぅっ……！」"

[[dialogue]]
speaker = "unk"
# グレイスはごしごしと目元を袖でぬぐい──
line = "グレイスはごしごしと目元を袖でぬぐい──"

[[dialogue]]
speaker = "グレイス"
# 「────はい！　お父さん、お母さんっ！！！」
line = "「────はい！　お父さん、お母さんっ！！！」"

[[dialogue]]
speaker = "unk"
# ようやくグレイスは、彼女らしい笑顔を浮かべたのだった。
line = "ようやくグレイスは、彼女らしい笑顔を浮かべたのだった。"

[[dialogue]]
speaker = "unk"
# ──同刻。
line = "──同刻。"

[[dialogue]]
speaker = "unk"
# アルタイルの繁華街──<ruby=ローローハンテン>肉肉飯店</ruby>の近くにて。
line = "アルタイルの繁華街──<ruby>肉肉飯店<rt>ローローハンテン</rt></ruby>の近くにて。"

[[dialogue]]
speaker = "チナ"
# 「…………っ！」
line = "「…………っ！」"

[[dialogue]]
speaker = "unk"
# クロトから聞いた待ち合わせ場所に到着したチナは、肉まんがたっぷり詰まった紙袋を持つ両親の姿を捉えた。
line = "クロトから聞いた待ち合わせ場所に到着したチナは、肉まんがたっぷり詰まった紙袋を持つ両親の姿を捉えた。"

[[dialogue]]
speaker = "チナの父"
# 「やあ、<b>この前ぶり</b>だね──チナ」
line = "「やあ、<b>この前ぶり</b>だね──チナ」"

[[dialogue]]
speaker = "unk"
# アルタイル滞在時に、チナは一度両親たちと、偶然の再会を果たしていた。
line = "アルタイル滞在時に、チナは一度両親たちと、偶然の再会を果たしていた。"

[[dialogue]]
speaker = "unk"
# その時は素性を隠し、誤魔化していたが──今は状況が違う。
line = "その時は素性を隠し、誤魔化していたが──今は状況が違う。"

[[dialogue]]
speaker = "unk"
# １０年未来を進んでいるデネブの娘が会いたがっていると、緋宮クロトが伝えてくれているのだ。
line = "１０年未来を進んでいるデネブの娘が会いたがっていると、緋宮クロトが伝えてくれているのだ。"

[[dialogue]]
speaker = "チナ"
# 「……ど、どうも。その……あの日、偶然出会ったアタシが……その、香堂チナ、なんだ……」
line = "「……ど、どうも。その……あの日、偶然出会ったアタシが……その、香堂チナ、なんだ……」"

[[dialogue]]
speaker = "チナ"
# 「魔王から話を聞いた時に……お、驚いた、でしょ……？」
line = "「魔王から話を聞いた時に……お、驚いた、でしょ……？」"

[[dialogue]]
speaker = "チナの父"
# 「驚きは──しなかったかなぁ」
line = "「驚きは──しなかったかなぁ」"

[[dialogue]]
speaker = "チナ"
# 「え──」
line = "「え──」"

[[dialogue]]
speaker = "チナの母"
# 「チナとぶつかったあの日……ずーっと何かが引っ掛かってて。お別れした後にね、お父さんと話をしたのよ？」
line = "「チナとぶつかったあの日……ずーっと何かが引っ掛かってて。お別れした後にね、お父さんと話をしたのよ？」"

[[dialogue]]
speaker = "チナの母"
# 「さっきの女の子は、もしかしてチナなんじゃないかって」
line = "「さっきの女の子は、もしかしてチナなんじゃないかって」"

[[dialogue]]
speaker = "チナ"
# 「う、嘘……？」
line = "「う、嘘……？」"

[[dialogue]]
speaker = "チナの父"
# 「本当だよ。根拠はないし、ありえない事だし……２人して何を言ってるんだろうって思いながら──でもね」
line = "「本当だよ。根拠はないし、ありえない事だし……２人して何を言ってるんだろうって思いながら──でもね」"

[[dialogue]]
speaker = "チナの母"
# 「面影とか、雰囲気とか……私たちの宝物にそっくりだったんだもの」
line = "「面影とか、雰囲気とか……私たちの宝物にそっくりだったんだもの」"

[[dialogue]]
speaker = "チナの父"
# 「それでこの間、新星の会長から事情を聞いてね──やっぱり、って言っちゃったんだよな」
line = "「それでこの間、新星の会長から事情を聞いてね──やっぱり、って言っちゃったんだよな」"

[[dialogue]]
speaker = "チナ"
# 「わかる……もん、なんだ……？　１０年も経ってる、のに……」
line = "「わかる……もん、なんだ……？　１０年も経ってる、のに……」"

[[dialogue]]
speaker = "チナの母"
# 「当然でしょう。大切な娘のことだもの」
line = "「当然でしょう。大切な娘のことだもの」"

[[dialogue]]
speaker = "チナの父"
# 「まさか平行世界の、未来のチナだなんてことまでは、わからなかったけどね」
line = "「まさか平行世界の、未来のチナだなんてことまでは、わからなかったけどね」"

