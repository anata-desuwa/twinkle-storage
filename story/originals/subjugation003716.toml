[[dialogue]]
speaker = "マルキア"
# 「だから言ったでしょう？　この子は昔から、あなたにべったりだったのですから。会いたいに決まっています」
line = "「だから言ったでしょう？　この子は昔から、あなたにべったりだったのですから。会いたいに決まっています」"

[[dialogue]]
speaker = "セイファート"
# 「……しかし。こちらの私は──」
line = "「……しかし。こちらの私は──」"

[[dialogue]]
speaker = "アニュラス"
# 「──もう、いいのです」
line = "「──もう、いいのです」"

[[dialogue]]
speaker = "アニュラス"
# 「こちらのお父様とは、別れを交わしていますから……」
line = "「こちらのお父様とは、別れを交わしていますから……」"

[[dialogue]]
speaker = "アニュラス"
# 「私は、あの人の名誉を守り、過ちを雪ぐために……剣を振るうと誓いました。ですからデネブのお父様が、気にする必要はありません……」
line = "「私は、あの人の名誉を守り、過ちを雪ぐために……剣を振るうと誓いました。ですからデネブのお父様が、気にする必要はありません……」"

[[dialogue]]
speaker = "セイファート"
# 「──そうか。私は……アニュラスの逞しさを、見誤っていたようだな……だが、これだけは伝えさせてくれ」
line = "「──そうか。私は……アニュラスの逞しさを、見誤っていたようだな……だが、これだけは伝えさせてくれ」"

[[dialogue]]
speaker = "セイファート"
# 「お前のことを省みることができず……すまなかった。許してくれ、アニュラス……」
line = "「お前のことを省みることができず……すまなかった。許してくれ、アニュラス……」"

[[dialogue]]
speaker = "アニュラス"
# 「……いいのです。もう十分です。私はもう──満たされました」
line = "「……いいのです。もう十分です。私はもう──満たされました」"

[[dialogue]]
speaker = "unk"
# アニュラスは星騎士となってから、母の行方を探し続けていた。
line = "アニュラスは星騎士となってから、母の行方を探し続けていた。"

[[dialogue]]
speaker = "unk"
# そしてリクリエの騒動に関わっていくうちに、母は使徒として平行世界デネブで散ったことを知った。
line = "そしてリクリエの騒動に関わっていくうちに、母は使徒として平行世界デネブで散ったことを知った。"

[[dialogue]]
speaker = "unk"
# 黒騎士となり、堕ちてしまった父の凶行も──新星の会長は、娘であるアニュラスにはそれとなく真実を隠そうとしていたが──知ってしまった。
line = "黒騎士となり、堕ちてしまった父の凶行も──新星の会長は、娘であるアニュラスにはそれとなく真実を隠そうとしていたが──知ってしまった。"

[[dialogue]]
speaker = "unk"
# しかし、すべて承知の上で──彼女は今日まで折れずに、駆け抜けてきたのだ。
line = "しかし、すべて承知の上で──彼女は今日まで折れずに、駆け抜けてきたのだ。"

[[dialogue]]
speaker = "unk"
# これからは過去に囚われることなく。未来を見据え、人々の平和を守る……十全の、流星の騎士となれるように。
line = "これからは過去に囚われることなく。未来を見据え、人々の平和を守る……十全の、流星の騎士となれるように。"

[[dialogue]]
speaker = "アニュラス"
# 「たくさん、話が聞きたいです……お父様、お母様。幼かった頃の私の話も……デネブの世界のことも……」
line = "「たくさん、話が聞きたいです……お父様、お母様。幼かった頃の私の話も……デネブの世界のことも……」"

[[dialogue]]
speaker = "アニュラス"
# 「この後、祝勝会にも出られるのですよね……？　その後は、いつまでアルタイルに……？」
line = "「この後、祝勝会にも出られるのですよね……？　その後は、いつまでアルタイルに……？」"

[[dialogue]]
speaker = "セイファート"
# 「極星の星徒会長──ルヴィネより長い休暇を貰っている。お前が満足するまで、付き合おう」
line = "「極星の星徒会長──ルヴィネより長い休暇を貰っている。お前が満足するまで、付き合おう」"

[[dialogue]]
speaker = "マルキア"
# 「あなた、そんなことを言って大丈夫？　学園長としての仕事は、どんどん溜まっていくのですよ？」
line = "「あなた、そんなことを言って大丈夫？　学園長としての仕事は、どんどん溜まっていくのですよ？」"

[[dialogue]]
speaker = "アニュラス"
# 「え……学園長？」
line = "「え……学園長？」"

[[dialogue]]
speaker = "セイファート"
# 「──ああ。今の私の肩書きは、極星学園の学園長だ。何、心配はいらない。アニュラスには寂しい思いをさせてきた」
line = "「──ああ。今の私の肩書きは、極星学園の学園長だ。何、心配はいらない。アニュラスには寂しい思いをさせてきた」"

[[dialogue]]
speaker = "セイファート"
# 「何とかするさ。お前との時間の方が──大切だ」
line = "「何とかするさ。お前との時間の方が──大切だ」"

[[dialogue]]
speaker = "アニュラス"
# 「──お父様っ！！」
line = "「──お父様っ！！」"

[[dialogue]]
speaker = "unk"
# 愛しい人と死に別れた時──ヒトは『やり直したい』と望むのかもしれない。
line = "愛しい人と死に別れた時──ヒトは『やり直したい』と望むのかもしれない。"

[[dialogue]]
speaker = "unk"
# けれどアニュラスは思うのだ。
line = "けれどアニュラスは思うのだ。"

[[dialogue]]
speaker = "アニュラス"
# （不幸を呑み込み、それでも前を向いた時にこそ、出会うことのできる『奇蹟』もある──）
line = "（不幸を呑み込み、それでも前を向いた時にこそ、出会うことのできる『奇蹟』もある──）"

[[dialogue]]
speaker = "アニュラス"
# （……ありがとう、会長）
line = "（……ありがとう、会長）"

[[dialogue]]
speaker = "アニュラス"
# （私は今、この上もなく──幸せだ！！）
line = "（私は今、この上もなく──幸せだ！！）"
