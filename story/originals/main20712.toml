[[dialogue]]
speaker = "unk"
# 第１２話,梨緒とベアト,B
line = "第１２話,梨緒とベアト,B"

[[dialogue]]
speaker = "梨緒"
# 「っ……はぁ……」
line = "「っ……はぁ……」"

[[dialogue]]
speaker = "unk"
# 流星市国・新市街の広場。その中央に造られたモニュメントは、三界の調和をイメージしているのだとか。
line = "流星市国・新市街の広場。その中央に造られたモニュメントは、三界の調和をイメージしているのだとか。"

[[dialogue]]
speaker = "unk"
# その片隅で、梨緒は痛みに顔を歪めていた。
line = "その片隅で、梨緒は痛みに顔を歪めていた。"

[[dialogue]]
speaker = "unk"
# 庇うように押さえた腕からは、ポタポタと血が雫となって垂れている。
line = "庇うように押さえた腕からは、ポタポタと血が雫となって垂れている。"

[[dialogue]]
speaker = "unk"
# そこに現れたのは──
line = "そこに現れたのは──"

[[dialogue]]
speaker = "ベアトリス"
# 「はぁはぁ、梨緒ちゃん、大丈夫！？」
line = "「はぁはぁ、梨緒ちゃん、大丈夫！？」"

[[dialogue]]
speaker = "梨緒"
# 「待っていたぞ、ベアト」
line = "「待っていたぞ、ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「え──」
line = "「え──」"

[[dialogue]]
speaker = "unk"
# ベアトリスが意表を突かれて目を見開く。
line = "ベアトリスが意表を突かれて目を見開く。"

[[dialogue]]
speaker = "unk"
# 梨緒は表情を強張らせながらも、真っ直ぐベアトリスを見つめていた。
line = "梨緒は表情を強張らせながらも、真っ直ぐベアトリスを見つめていた。"

[[dialogue]]
speaker = "梨緒"
# 「騙して悪いが、この傷はナターシャがつけたものだ」
line = "「騙して悪いが、この傷はナターシャがつけたものだ」"

[[dialogue]]
speaker = "梨緒"
# 「吸血鬼は嗅覚が鋭いと聞いた。そして血の匂いには特別敏感だとも」
line = "「吸血鬼は嗅覚が鋭いと聞いた。そして血の匂いには特別敏感だとも」"

[[dialogue]]
speaker = "梨緒"
# 「だから私の血の匂いを感じれば、君が来ると思った。君の優しさを利用させてもらった」
line = "「だから私の血の匂いを感じれば、君が来ると思った。君の優しさを利用させてもらった」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そうなんだ……大丈夫なんだね……」
line = "「そ、そうなんだ……大丈夫なんだね……」"

[[dialogue]]
speaker = "unk"
# 予想外の出来事に、困惑と安堵が混ざったような表情を浮かべるベアトリス。
line = "予想外の出来事に、困惑と安堵が混ざったような表情を浮かべるベアトリス。"

[[dialogue]]
speaker = "unk"
# その顔には涙の跡が浮かんでいた。
line = "その顔には涙の跡が浮かんでいた。"

[[dialogue]]
speaker = "梨緒"
# （赦すとか、受け入れるとか、難しいことは私にはまだわからない……それでも……！）
line = "（赦すとか、受け入れるとか、難しいことは私にはまだわからない……それでも……！）"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめん、また梨緒ちゃんの前に現れちゃったね。私はもういない方がいいって言ったのに……」
line = "「ごめん、また梨緒ちゃんの前に現れちゃったね。私はもういない方がいいって言ったのに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「じゃあね、梨緒ちゃん──」
line = "「じゃあね、梨緒ちゃん──」"

[[dialogue]]
speaker = "梨緒"
# 「行くな、ベアト！」
line = "「行くな、ベアト！」"

[[dialogue]]
speaker = "ベアトリス"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "unk"
# 背中を向けようとするベアトリスを、梨緒の声が引き留める。
line = "背中を向けようとするベアトリスを、梨緒の声が引き留める。"

[[dialogue]]
speaker = "梨緒"
# 「敵か味方かよりも、もう仲間を失いたくない。君を失いたくない」
line = "「敵か味方かよりも、もう仲間を失いたくない。君を失いたくない」"

[[dialogue]]
speaker = "梨緒"
# 「だから待ってくれ。もう一度話をしよう」
line = "「だから待ってくれ。もう一度話をしよう」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "梨緒"
# 「君が何のためにアルタイルに来て、新星学園に入ったのか。事情があるなら知りたい」
line = "「君が何のためにアルタイルに来て、新星学園に入ったのか。事情があるなら知りたい」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトが私たちを騙して、裏でほくそ笑んでたとは思っていない」
line = "「ベアトが私たちを騙して、裏でほくそ笑んでたとは思っていない」"

[[dialogue]]
speaker = "梨緒"
# 「でも敵だったら敵でいい。騙していたのならそれでいい。だけど君の言葉で言ってくれないと納得しない」
line = "「でも敵だったら敵でいい。騙していたのならそれでいい。だけど君の言葉で言ってくれないと納得しない」"

[[dialogue]]
speaker = "梨緒"
# 「だからベアトが何のために戦っているのか、私に教えてほしい」
line = "「だからベアトが何のために戦っているのか、私に教えてほしい」"

[[dialogue]]
speaker = "ベアトリス"
# 「い、いいの……？」
line = "「い、いいの……？」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、何もできなかった。梨緒ちゃんを傷つけただけだった」
line = "「私、何もできなかった。梨緒ちゃんを傷つけただけだった」"

[[dialogue]]
speaker = "ベアトリス"
# 「それでも……情けないと思わない？」
line = "「それでも……情けないと思わない？」"

[[dialogue]]
speaker = "梨緒"
# 「大丈夫だ、情けなさなら私も負けてない！」
line = "「大丈夫だ、情けなさなら私も負けてない！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ええっ！？」
line = "「ええっ！？」"

[[dialogue]]
speaker = "unk"
# 予想だにしなかった梨緒の返事に、ベアトリスが素っ頓狂な声を上げる。
line = "予想だにしなかった梨緒の返事に、ベアトリスが素っ頓狂な声を上げる。"

[[dialogue]]
speaker = "梨緒"
# 「負けて、負けて、負け続けて、世界まで滅ぼされて、それでもおめおめと生き残って、そんな私より情けないやつなんているか……！」
line = "「負けて、負けて、負け続けて、世界まで滅ぼされて、それでもおめおめと生き残って、そんな私より情けないやつなんているか……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「そ、そんなことないし、梨緒ちゃんは立派だと思うけど……」
line = "「そ、そんなことないし、梨緒ちゃんは立派だと思うけど……」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも……うん……梨緒ちゃんがそこまで言うのなら、私も……言うね」
line = "「でも……うん……梨緒ちゃんがそこまで言うのなら、私も……言うね」"

[[dialogue]]
speaker = "ベアトリス"
# 「私は、デネブもアルタイルも滅びない道を見つけたかった」
line = "「私は、デネブもアルタイルも滅びない道を見つけたかった」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィは私に教えてくれた。デネブを守るには、アルタイルを滅ぼさなきゃいけない。それしかないって」
line = "「ルヴィは私に教えてくれた。デネブを守るには、アルタイルを滅ぼさなきゃいけない。それしかないって」"

[[dialogue]]
speaker = "ベアトリス"
# 「どちらかを救うには、どちらかを見捨てないといけない。私はそれが嫌だった」
line = "「どちらかを救うには、どちらかを見捨てないといけない。私はそれが嫌だった」"

[[dialogue]]
speaker = "ベアトリス"
# 「吸血鬼はとっても生命力が強い種族なんだけど、ごくまれに虚弱体質で生まれることもあるの。それが私だった」
line = "「吸血鬼はとっても生命力が強い種族なんだけど、ごくまれに虚弱体質で生まれることもあるの。それが私だった」"

[[dialogue]]
speaker = "ベアトリス"
# 「たまたま旅の人に助けられて、大きくなることができたけど、私は一族の中で見捨てられる側だった」
line = "「たまたま旅の人に助けられて、大きくなることができたけど、私は一族の中で見捨てられる側だった」"

[[dialogue]]
speaker = "ベアトリス"
# 「私は見捨てられる側の心細さも、怖さも知ってる。だから私はアルタイルの人たちも見捨てたくないと思って……アルタイルへ向かった」
line = "「私は見捨てられる側の心細さも、怖さも知ってる。だから私はアルタイルの人たちも見捨てたくないと思って……アルタイルへ向かった」"

[[dialogue]]
speaker = "ベアトリス"
# 「ここを使えばきっとアルタイルに行ける……はず」
line = "「ここを使えばきっとアルタイルに行ける……はず」"

[[dialogue]]
speaker = "ベアトリス"
# 「魔界に伝わる伝承によれば……<ruby=ラーゴ・シエロ>鏡界の湖</ruby>に落ちた渡し守は、三界とは違う世界に行き、大きな力を手に入れた」
line = "「魔界に伝わる伝承によれば……<ruby>鏡界の湖<rt>ラーゴ・シエロ</rt></ruby>に落ちた渡し守は、三界とは違う世界に行き、大きな力を手に入れた」"

[[dialogue]]
speaker = "ベアトリス"
# 「きっと鏡界の湖は、時空の穴に近いものだと思う。だからこの穴を超えれば……」
line = "「きっと鏡界の湖は、時空の穴に近いものだと思う。だからこの穴を超えれば……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「待ちなさい、ベアト」
line = "「待ちなさい、ベアト」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィ！？　どうしてここに……！？」
line = "「ルヴィ！？　どうしてここに……！？」"

[[dialogue]]
speaker = "ルヴィネ"
# 「それはこっちのセリフよ。深夜に１人でこんなところに来てなんのつもり？」
line = "「それはこっちのセリフよ。深夜に１人でこんなところに来てなんのつもり？」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、思ったの。自分たちの世界を守るためでも、他の世界を犠牲にしたくないって」
line = "「私、思ったの。自分たちの世界を守るためでも、他の世界を犠牲にしたくないって」"

[[dialogue]]
speaker = "ベアトリス"
# 「アルタイルに行けば、両方の世界を救う方法が何か見つかるかもしれない」
line = "「アルタイルに行けば、両方の世界を救う方法が何か見つかるかもしれない」"

[[dialogue]]
speaker = "ベアトリス"
# 「だから私、アルタイルに行くよ」
line = "「だから私、アルタイルに行くよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「な──！？　言ったでしょう、これからアルタイルを滅ぼすって！　それしかないのよ！？」
line = "「な──！？　言ったでしょう、これからアルタイルを滅ぼすって！　それしかないのよ！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィを信じてないわけじゃないよ。でもルヴィも知らない方法が他にあるかもしれない」
line = "「ルヴィを信じてないわけじゃないよ。でもルヴィも知らない方法が他にあるかもしれない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「だからって体ひとつでアルタイルに行くつもり？　無茶だわ！」
line = "「だからって体ひとつでアルタイルに行くつもり？　無茶だわ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「時空の穴は簡単にコントロールできるものじゃない。アルタイルに辿り着くどころか、バラバラになるかもしれないわ」
line = "「時空の穴は簡単にコントロールできるものじゃない。アルタイルに辿り着くどころか、バラバラになるかもしれないわ」"

[[dialogue]]
speaker = "ベアトリス"
# 「それでも行くよ。何もしないまま諦めるよりはマシだから」
line = "「それでも行くよ。何もしないまま諦めるよりはマシだから」"

[[dialogue]]
speaker = "ベアトリス"
# 「──！　穴が開いた！　今なら！」
line = "「──！　穴が開いた！　今なら！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「待ちなさい！　どうしてもというなら力ずくで──」
line = "「待ちなさい！　どうしてもというなら力ずくで──」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめん！」
line = "「ごめん！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「くっ……！？　ベアト！？」
line = "「くっ……！？　ベアト！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「そうして、私はルヴィの制止を振り切って、時空の穴へと飛び込んだ」
line = "「そうして、私はルヴィの制止を振り切って、時空の穴へと飛び込んだ」"

[[dialogue]]
speaker = "ベアトリス"
# 「そしたらアルタイルの魔界……しかも鏡界の湖の近くに出ちゃって」
line = "「そしたらアルタイルの魔界……しかも鏡界の湖の近くに出ちゃって」"

[[dialogue]]
speaker = "ベアトリス"
# 「さらにその時モンスターが現れて、咄嗟に倒したら、流星市国への留学生だと勘違いされちゃって」
line = "「さらにその時モンスターが現れて、咄嗟に倒したら、流星市国への留学生だと勘違いされちゃって」"

[[dialogue]]
speaker = "ベアトリス"
# 「その流れで新星学園に入ることに……」
line = "「その流れで新星学園に入ることに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「そして新星学園に入った私は、留学生を装いながら、デネブとアルタイル両方が生き残る道を探した」
line = "「そして新星学園に入った私は、留学生を装いながら、デネブとアルタイル両方が生き残る道を探した」"

[[dialogue]]
speaker = "ベアトリス"
# 「最初、私がデネブから来たって言わなかったのは、アルタイルがどう考えているかわからなかったから」
line = "「最初、私がデネブから来たって言わなかったのは、アルタイルがどう考えているかわからなかったから」"

[[dialogue]]
speaker = "ベアトリス"
# 「もしアルタイルがデネブのように、平行世界を犠牲にするつもりだったら、私の身に危険が及ぶ可能性があった」
line = "「もしアルタイルがデネブのように、平行世界を犠牲にするつもりだったら、私の身に危険が及ぶ可能性があった」"

[[dialogue]]
speaker = "ベアトリス"
# 「でもアルタイルはデネブと一緒に戦おうとした。だから本当のことを言えたはずなのに……」
line = "「でもアルタイルはデネブと一緒に戦おうとした。だから本当のことを言えたはずなのに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんやみんなに嫌われたくなくて、信じてもらえるか不安で……言えなかった」
line = "「梨緒ちゃんやみんなに嫌われたくなくて、信じてもらえるか不安で……言えなかった」"

[[dialogue]]
speaker = "ベアトリス"
# 「私は、デネブもアルタイルも救いたかった。そのためにアルタイルに来た。そのはずなのに……」
line = "「私は、デネブもアルタイルも救いたかった。そのためにアルタイルに来た。そのはずなのに……」"

[[dialogue]]
speaker = "ベアトリス"
# 「私は何もできなかった。２つの世界を救う方法なんて見つからなかったし、極星学園との戦いを止めることもできなかった」
line = "「私は何もできなかった。２つの世界を救う方法なんて見つからなかったし、極星学園との戦いを止めることもできなかった」"

[[dialogue]]
speaker = "ベアトリス"
# 「もしこの気持ちが否定されたらと思うと怖くて、本当のことを言えなかった」
line = "「もしこの気持ちが否定されたらと思うと怖くて、本当のことを言えなかった」"

[[dialogue]]
speaker = "ベアトリス"
# 「諦めない梨緒ちゃんを見習いたかったけど、ダメだった」
line = "「諦めない梨緒ちゃんを見習いたかったけど、ダメだった」"

[[dialogue]]
speaker = "ベアトリス"
# 「私が弱かったから、梨緒ちゃんを傷つけた」
line = "「私が弱かったから、梨緒ちゃんを傷つけた」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめん……ごめんなさい……梨緒ちゃん」
line = "「ごめん……ごめんなさい……梨緒ちゃん」"

[[dialogue]]
speaker = "ベアトリス"
# 「私……どうすればいいのかな……？」
line = "「私……どうすればいいのかな……？」"

[[dialogue]]
speaker = "梨緒"
# 「……先にひとつ言っておく」
line = "「……先にひとつ言っておく」"

[[dialogue]]
speaker = "ベアトリス"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "梨緒"
# 「何もできなくても、失敗しても、その気持ちがなかったことにはならない。それが間違ったことになるわけじゃない」
line = "「何もできなくても、失敗しても、その気持ちがなかったことにはならない。それが間違ったことになるわけじゃない」"

[[dialogue]]
speaker = "梨緒"
# 「少なくとも、私はそう思う」
line = "「少なくとも、私はそう思う」"

[[dialogue]]
speaker = "梨緒"
# 「だから堂々としているんだ。私はデネブとアルタイル、２つの世界を救おうとしているんだって」
line = "「だから堂々としているんだ。私はデネブとアルタイル、２つの世界を救おうとしているんだって」"

[[dialogue]]
speaker = "ベアトリス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "梨緒"
# 「ありがとう、ベアトリス。君の言葉で言ってくれて。私は君を信じる」
line = "「ありがとう、ベアトリス。君の言葉で言ってくれて。私は君を信じる」"

[[dialogue]]
speaker = "梨緒"
# 「確かに君は出自を偽っていた。今、私たちにとって極星学園は敵で、君はそこからやってきた」
line = "「確かに君は出自を偽っていた。今、私たちにとって極星学園は敵で、君はそこからやってきた」"

[[dialogue]]
speaker = "梨緒"
# 「それでも……私は君を赦す」
line = "「それでも……私は君を赦す」"

[[dialogue]]
speaker = "ベアトリス"
# 「いいの……？」
line = "「いいの……？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。まぁ、赦すという言い方が適切かはわからないが……」
line = "「ああ。まぁ、赦すという言い方が適切かはわからないが……」"

[[dialogue]]
speaker = "梨緒"
# 「君は君なりにデネブとアルタイル、２つの世界を救おうとしていた。私もリクリエから世界を守りたいと思っている。君と私の目的は同じだ」
line = "「君は君なりにデネブとアルタイル、２つの世界を救おうとしていた。私もリクリエから世界を守りたいと思っている。君と私の目的は同じだ」"

[[dialogue]]
speaker = "梨緒"
# 「だから今後も、私と一緒に戦ってくれ」
line = "「だから今後も、私と一緒に戦ってくれ」"

[[dialogue]]
speaker = "ベアトリス"
