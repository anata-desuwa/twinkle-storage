[[dialogue]]
speaker = "unk"
# 第１話,大人になったアポロ,P
line = "第１話,大人になったアポロ,P"

[[dialogue]]
speaker = "unk"
# 事故によってデネブにやってきた俺たちは、デネブにいる間、極星学園の会長ルヴィネに反抗するレジスタンスの秘密基地でお世話になっていた。
line = "事故によってデネブにやってきた俺たちは、デネブにいる間、極星学園の会長ルヴィネに反抗するレジスタンスの秘密基地でお世話になっていた。"

[[dialogue]]
speaker = "unk"
# そしてそのレジスタンスの中心人物が──
line = "そしてそのレジスタンスの中心人物が──"

[[dialogue]]
speaker = "ヴィーナス"
# 「それにしても大きくなったわね～。見違えたわよ、アポロ」
line = "「それにしても大きくなったわね～。見違えたわよ、アポロ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「まぁな。もうお前たちより年上だぞ」
line = "「まぁな。もうお前たちより年上だぞ」"

[[dialogue]]
speaker = "unk"
# デネブに帰還し、十年の成長を経た大人のアポロだ。
line = "デネブに帰還し、十年の成長を経た大人のアポロだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「すっかり背が伸びて、かっこよくなったわね。それに──」
line = "「すっかり背が伸びて、かっこよくなったわね。それに──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「おっぱいが大きくなったわ！」
line = "「おっぱいが大きくなったわ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスっ！？
line = "ヴィーナスっ！？"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、大きくなったぞ。大人だからな。ヴィーナスにも負けてないんじゃないか？」
line = "「ああ、大きくなったぞ。大人だからな。ヴィーナスにも負けてないんじゃないか？」"

[[dialogue]]
speaker = "unk"
# アポロは子どもから大人になり、背丈は大きくなって、顔立ちも美人になった。
line = "アポロは子どもから大人になり、背丈は大きくなって、顔立ちも美人になった。"

[[dialogue]]
speaker = "unk"
# 体も胸やお尻など出るところが出ていて、とても女性らしくなっていた。
line = "体も胸やお尻など出るところが出ていて、とても女性らしくなっていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナとアポロは双子なんだし、フィオナも将来こんな感じのお姉さんになるのかしら」
line = "「フィオナとアポロは双子なんだし、フィオナも将来こんな感じのお姉さんになるのかしら」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね、私もいずれこんなふうに……」
line = "「そうですね、私もいずれこんなふうに……」"

[[dialogue]]
speaker = "フィオナ"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「おーい、視線が胸に行ってるぞー」
line = "「おーい、視線が胸に行ってるぞー」"

[[dialogue]]
speaker = "フィオナ"
# 「ごご、ごめんなさいっ。だって本当に大きくなってるから……」
line = "「ごご、ごめんなさいっ。だって本当に大きくなってるから……」"

[[dialogue]]
speaker = "フィオナ"
# 「コホン。胸の話はやめましょう。私たちだけならともかく、緋宮会長が気まずくなってしまいます」
line = "「コホン。胸の話はやめましょう。私たちだけならともかく、緋宮会長が気まずくなってしまいます」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、すまんすまん。男の前でする話じゃなかったな」
line = "「ああ、すまんすまん。男の前でする話じゃなかったな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だが……魔王からも視線を感じるな？」
line = "「だが……魔王からも視線を感じるな？」"

[[dialogue]]
speaker = "unk"
# ギクッ……！？
line = "ギクッ……！？"

[[dialogue]]
speaker = "アポロ（大人）"
# 「はは、気にするな。男子が美人の年上お姉さんを気にしてしまうのは不可抗力だ」
line = "「はは、気にするな。男子が美人の年上お姉さんを気にしてしまうのは不可抗力だ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「どうだ、女らしくなったろう？　魔王とあたしの仲だ、胸をチラチラ見るくらいならいいぞ」
line = "「どうだ、女らしくなったろう？　魔王とあたしの仲だ、胸をチラチラ見るくらいならいいぞ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私のおっぱいも見ていいわよ、クロト！」
line = "「私のおっぱいも見ていいわよ、クロト！」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、緋宮会長の顔がますます赤く……ほんとにもうやめましょう、この話は……」
line = "「あ、緋宮会長の顔がますます赤く……ほんとにもうやめましょう、この話は……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ははは、魔王には刺激が強かったか？　だったら悪かったな」
line = "「ははは、魔王には刺激が強かったか？　だったら悪かったな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「さてみんな、今日の夕飯の希望はあるか？　今ある材料で作れるものなら何でもいいぞ」
line = "「さてみんな、今日の夕飯の希望はあるか？　今ある材料で作れるものなら何でもいいぞ」"

[[dialogue]]
speaker = "フィオナ"
# 「こっちの姉さんは本当に料理が上手ですよね」
line = "「こっちの姉さんは本当に料理が上手ですよね」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「何せレジスタンスだからな。気軽にコンビニに行くわけにはいかないし。保存食ばかりじゃ飽きるし栄養も偏る。自前で作れるに越したことはない」
line = "「何せレジスタンスだからな。気軽にコンビニに行くわけにはいかないし。保存食ばかりじゃ飽きるし栄養も偏る。自前で作れるに越したことはない」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「特に希望がないなら、あたしが得意なやつにするぞ。餃子とサバの味噌煮は特に自信がある」
line = "「特に希望がないなら、あたしが得意なやつにするぞ。餃子とサバの味噌煮は特に自信がある」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうして餃子とサバの味噌煮なの？」
line = "「どうして餃子とサバの味噌煮なの？」"

[[dialogue]]
speaker = "フィオナ"
# 「！　流星ライダードラゴンと流星ライダービートルですね！」
line = "「！　流星ライダードラゴンと流星ライダービートルですね！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ。餃子はドラゴンの主人公の得意料理で、サバ味噌はビートルでよく食べてたんだ」
line = "「ああ。餃子はドラゴンの主人公の得意料理で、サバ味噌はビートルでよく食べてたんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ～、大人になっても流星ライダーが好きなのね。そこは変わらないんだ」
line = "「へぇ～、大人になっても流星ライダーが好きなのね。そこは変わらないんだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「もちろんだ。あたしが料理をしようと思った理由の１つは、流星ライダーメニューを自分で作れるようになりたいと思ったからだしな」
line = "「もちろんだ。あたしが料理をしようと思った理由の１つは、流星ライダーメニューを自分で作れるようになりたいと思ったからだしな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「というわけで、餃子とサバ味噌ならどっちが──と思ったがひき肉は残り少なかったな。サバ味噌でいいか？」
line = "「というわけで、餃子とサバ味噌ならどっちが──と思ったがひき肉は残り少なかったな。サバ味噌でいいか？」"

[[dialogue]]
speaker = "unk"
# 楽しみにしてるよ
line = "楽しみにしてるよ"

[[dialogue]]
speaker = "アポロ（大人）"
# 「おう、任せておけ！」
line = "「おう、任せておけ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「よし、できたぞー」
line = "「よし、できたぞー」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます、姉さん。流星ライダーに出てきそうな、美味しそうなサバ味噌です」
line = "「ありがとうございます、姉さん。流星ライダーに出てきそうな、美味しそうなサバ味噌です」"

[[dialogue]]
speaker = "フィオナ"
# 「姉さんのサバ味噌を食べるなんて、ちょっと不思議な気分です」
line = "「姉さんのサバ味噌を食べるなんて、ちょっと不思議な気分です」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ははっ、あたしもエリシアに作るなんて想像してなかったよ」
line = "「ははっ、あたしもエリシアに作るなんて想像してなかったよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃ……いただきまーす！」
line = "「それじゃ……いただきまーす！」"

[[dialogue]]
speaker = "unk"
# めちゃくちゃ美味しい！
line = "めちゃくちゃ美味しい！"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん～っ♪　やるじゃない、アポロ！」
line = "「ん～っ♪　やるじゃない、アポロ！」"

[[dialogue]]
speaker = "フィオナ"
# 「本当に美味しいです……これならビートルのサバ味噌にも勝てるのでは？」
line = "「本当に美味しいです……これならビートルのサバ味噌にも勝てるのでは？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だろ？　サバのくさみを丁寧に取るのと、ショウガをほどよく利かせるのがコツだ」
line = "「だろ？　サバのくさみを丁寧に取るのと、ショウガをほどよく利かせるのがコツだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# （ところで魔王。お前、恋人とかいるのか？）
line = "（ところで魔王。お前、恋人とかいるのか？）"

[[dialogue]]
speaker = "unk"
# ぶふっ──！？
line = "ぶふっ──！？"

[[dialogue]]
speaker = "アポロ（大人）"
# （やっぱり一番近くにいるヴィーナスか？　それともエリシアか？）
line = "（やっぱり一番近くにいるヴィーナスか？　それともエリシアか？）"

[[dialogue]]
speaker = "アポロ（大人）"
# （どうしてそんなこと聞くんだって……？　久しぶりに会ったんだ、気になるだろそういうの）
line = "（どうしてそんなこと聞くんだって……？　久しぶりに会ったんだ、気になるだろそういうの）"

[[dialogue]]
speaker = "unk"
# （距離が近い……！）
line = "（距離が近い……！）"

[[dialogue]]
speaker = "フィオナ"
# 「姉さん、少し酔ってます……？」
line = "「姉さん、少し酔ってます……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ああ、大人だからな。酒くらい飲むさ」
line = "「ああ、大人だからな。酒くらい飲むさ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「秘密基地暮らしじゃ貴重品だが、妹や魔王たちに久しぶりに会えたんだ。めでたい時くらい飲んでいいだろ」
line = "「秘密基地暮らしじゃ貴重品だが、妹や魔王たちに久しぶりに会えたんだ。めでたい時くらい飲んでいいだろ」"

[[dialogue]]
speaker = "unk"
# ほんのり顔が赤いアポロを間近にしながら、いろんな意味で大人になったと実感させられるのだった。
line = "ほんのり顔が赤いアポロを間近にしながら、いろんな意味で大人になったと実感させられるのだった。"
