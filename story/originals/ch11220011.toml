[[dialogue]]
speaker = "unk"
# 第１話,斉天大聖と終末兵器,P
line = "第１話,斉天大聖と終末兵器,P"

[[dialogue]]
speaker = "unk"
# 紅明たちと共に、新たに確認されたＳＳ級モンスター『牛魔王』を討伐してから、少し経ったある日のこと。
line = "紅明たちと共に、新たに確認されたＳＳ級モンスター『牛魔王』を討伐してから、少し経ったある日のこと。"

[[dialogue]]
speaker = "クーシェン"
# 「あっ、にーにーだ♪　え～いっ！」
line = "「あっ、にーにーだ♪　え～いっ！」"

[[dialogue]]
speaker = "unk"
# 最近聞き慣れた声が聞こえて来たかと思うと、突然お腹めがけて抱き着かれる。
line = "最近聞き慣れた声が聞こえて来たかと思うと、突然お腹めがけて抱き着かれる。"

[[dialogue]]
speaker = "クーシェン"
# 「えっへへへぇ、おっす☆　にーにー♪」
line = "「えっへへへぇ、おっす☆　にーにー♪」"

[[dialogue]]
speaker = "unk"
# 彼女はこの前、流星学園附属校へ転入した魔族の――クーシェン。
line = "彼女はこの前、流星学園附属校へ転入した魔族の――クーシェン。"

[[dialogue]]
speaker = "unk"
# 魔界で悪党退治しながらさすらっていたところを、ネビュラ所属の魔女――マリオンにスカウトされてやってきた、小さな星騎士である。
line = "魔界で悪党退治しながらさすらっていたところを、ネビュラ所属の魔女――マリオンにスカウトされてやってきた、小さな星騎士である。"

[[dialogue]]
speaker = "クーシェン"
# 「――あのね、聞いて聞いて！　ボク、ここ数日、西遊記について漫画で読んで勉強したんだ～」
line = "「――あのね、聞いて聞いて！　ボク、ここ数日、西遊記について漫画で読んで勉強したんだ～」"

[[dialogue]]
speaker = "クーシェン"
# 「孫悟空、すごいカッコよかった！　まあ、ボクもこれから、負けないくらい大活躍しちゃうけどね～！」
line = "「孫悟空、すごいカッコよかった！　まあ、ボクもこれから、負けないくらい大活躍しちゃうけどね～！」"

[[dialogue]]
speaker = "クーシェン"
# 「それで、漫画で初めて知ったんだけど、<b>前世</b>の孫悟空が使ってた技で、今のボクが覚えてないものが、実は結構あるみたいなんだ！」
line = "「それで、漫画で初めて知ったんだけど、<b>前世</b>の孫悟空が使ってた技で、今のボクが覚えてないものが、実は結構あるみたいなんだ！」"

[[dialogue]]
speaker = "クーシェン"
# 「ボク、それを知って、すごくウキウキしてきちゃってさ♪　今日から早速練習して、新技習得に挑戦してみようと思うんだ！」
line = "「ボク、それを知って、すごくウキウキしてきちゃってさ♪　今日から早速練習して、新技習得に挑戦してみようと思うんだ！」"

[[dialogue]]
speaker = "クーシェン"
# 「にーにーもボクのカッコいい新技、早く見たいでしょ？　だから練習、付き合わせてあげてもいいよ～？　ウキキ♪」
line = "「にーにーもボクのカッコいい新技、早く見たいでしょ？　だから練習、付き合わせてあげてもいいよ～？　ウキキ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「クーシェン、貴様、また『前世』の話をしてるのか？」
line = "「クーシェン、貴様、また『前世』の話をしてるのか？」"

[[dialogue]]
speaker = "クーシェン"
# 「あっ、プリムラじゃん！　おっす～☆」
line = "「あっ、プリムラじゃん！　おっす～☆」"

[[dialogue]]
speaker = "unk"
# ２人は知り合いなの？
line = "２人は知り合いなの？"

[[dialogue]]
speaker = "クーシェン"
# 「うん！　附属校で同じクラスになったんだ～」
line = "「うん！　附属校で同じクラスになったんだ～」"

[[dialogue]]
speaker = "プリムラ"
# 「この間、眷族がこやつに御前試合で世話になったところを我も見ていたのでな。クラスメイトとして、挨拶をしてやったのじゃ」
line = "「この間、眷族がこやつに御前試合で世話になったところを我も見ていたのでな。クラスメイトとして、挨拶をしてやったのじゃ」"

[[dialogue]]
speaker = "プリムラ"
# 「それで聞けば、前世が孫悟空だとかぬかしておったから、『そういう年頃』なのかとスルーしてやっていたのじゃが……」
line = "「それで聞けば、前世が孫悟空だとかぬかしておったから、『そういう年頃』なのかとスルーしてやっていたのじゃが……」"

[[dialogue]]
speaker = "クーシェン"
# 「ふっふっふ……プリムラ！　自己紹介の時にも言ったけど、実はボクは西遊記の英雄――斉天大聖『孫悟空』の生まれ変わりなんだよ！」
line = "「ふっふっふ……プリムラ！　自己紹介の時にも言ったけど、実はボクは西遊記の英雄――斉天大聖『孫悟空』の生まれ変わりなんだよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「じゃが、前世の記憶は持っているわけではないと」
line = "「じゃが、前世の記憶は持っているわけではないと」"

[[dialogue]]
speaker = "クーシェン"
# 「うんっ！　全く覚えてないんだよね～」
line = "「うんっ！　全く覚えてないんだよね～」"

[[dialogue]]
speaker = "プリムラ"
# 「覚えとらんのに、なんで前世が孫悟空だとわかるんじゃ……」
line = "「覚えとらんのに、なんで前世が孫悟空だとわかるんじゃ……」"

[[dialogue]]
speaker = "クーシェン"
# 「紅明ねーねーが前世で会ったことあるらしいんだけど、ボクは孫悟空と見た目が瓜二つなんだって！」
line = "「紅明ねーねーが前世で会ったことあるらしいんだけど、ボクは孫悟空と見た目が瓜二つなんだって！」"

[[dialogue]]
speaker = "プリムラ"
# 「前世で会ったってどういうことなんじゃ……」
line = "「前世で会ったってどういうことなんじゃ……」"

[[dialogue]]
speaker = "unk"
# 怪訝そうな顔を浮かべるプリムラに、俺はクーシェンの言っていることが本当だと説明する。
line = "怪訝そうな顔を浮かべるプリムラに、俺はクーシェンの言っていることが本当だと説明する。"

[[dialogue]]
speaker = "プリムラ"
# 「なに？　紅明の奴が、実は牛魔王の娘『<ruby=こうがいじ>紅孩児</ruby>』の転生体で、前世の記憶を持っているじゃと……？」
line = "「なに？　紅明の奴が、実は牛魔王の娘『<ruby>紅孩児<rt>こうがいじ</rt></ruby>』の転生体で、前世の記憶を持っているじゃと……？」"

[[dialogue]]
speaker = "プリムラ"
# 「――ふむ……クーシェンの言っていることは自称だと思っておったが、眷族がそこまで言うのなら、本当のことなのじゃろう」
line = "「――ふむ……クーシェンの言っていることは自称だと思っておったが、眷族がそこまで言うのなら、本当のことなのじゃろう」"

[[dialogue]]
speaker = "クーシェン"
# 「うん、ごめんね！　プリムラが『悪の終末兵器』って名乗ってるのと違って、ボクは自称じゃないんだ」
line = "「うん、ごめんね！　プリムラが『悪の終末兵器』って名乗ってるのと違って、ボクは自称じゃないんだ」"

[[dialogue]]
speaker = "プリムラ"
# 「我も自称じゃないんじゃが！？」
line = "「我も自称じゃないんじゃが！？」"

[[dialogue]]
speaker = "クーシェン"
# 「そうなの？」
line = "「そうなの？」"

[[dialogue]]
speaker = "unk"
# そう、プリムラもまた自称ではなく、元々はとある黒幕によって作られた本当の終末兵器であり、現在は『魔法少女』として活動していたりする。俺がそのことを説明すると――
line = "そう、プリムラもまた自称ではなく、元々はとある黒幕によって作られた本当の終末兵器であり、現在は『魔法少女』として活動していたりする。俺がそのことを説明すると――"

[[dialogue]]
speaker = "クーシェン"
# 「魔法少女って……何？」
line = "「魔法少女って……何？」"

[[dialogue]]
speaker = "プリムラ"
# 「なんじゃ貴様、知らんのか？　そういうジャンルのアニメがあるんじゃ」
line = "「なんじゃ貴様、知らんのか？　そういうジャンルのアニメがあるんじゃ」"

[[dialogue]]
speaker = "クーシェン"
# 「アニメ！　それならボクも観てみたい！　プリムラ、オススメのやつを教えて！」
line = "「アニメ！　それならボクも観てみたい！　プリムラ、オススメのやつを教えて！」"

[[dialogue]]
speaker = "プリムラ"
# 「は？　我のオススメじゃと？」
line = "「は？　我のオススメじゃと？」"

[[dialogue]]
speaker = "unk"
# 数日後――俺はプリムラとクーシェンが２人で一緒に昼食をしているところを見かけて、声をかける。
line = "数日後――俺はプリムラとクーシェンが２人で一緒に昼食をしているところを見かけて、声をかける。"

[[dialogue]]
speaker = "クーシェン"
# 「むにゃむにゃ……もぐもぐ……。あっ、にーにー！　おっす～♪」
line = "「むにゃむにゃ……もぐもぐ……。あっ、にーにー！　おっす～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ん……ふわぁ～……。おお、眷族か……」
line = "「ん……ふわぁ～……。おお、眷族か……」"

[[dialogue]]
speaker = "unk"
# なんだか２人とも眠そう？
line = "なんだか２人とも眠そう？"

[[dialogue]]
speaker = "クーシェン"
# 「うん！　この前言ってた魔法少女のアニメを、プリムラと一緒に全話観たんだ～」
line = "「うん！　この前言ってた魔法少女のアニメを、プリムラと一緒に全話観たんだ～」"

[[dialogue]]
speaker = "プリムラ"
# 「ここ数日、クーシェンが流星寮の我の部屋に押しかけてきて、夜遅くまで魔法少女のアニメを観る羽目になったのじゃ……」
line = "「ここ数日、クーシェンが流星寮の我の部屋に押しかけてきて、夜遅くまで魔法少女のアニメを観る羽目になったのじゃ……」"

[[dialogue]]
speaker = "クーシェン"
# 「にーにー、それでね！　すごかったんだよ！　魔法少女の服が破けて、大人おっぱいがドーンって！」
line = "「にーにー、それでね！　すごかったんだよ！　魔法少女の服が破けて、大人おっぱいがドーンって！」"

[[dialogue]]
speaker = "unk"
# 見たのってまさか、深夜アニメの方！？
line = "見たのってまさか、深夜アニメの方！？"

[[dialogue]]
speaker = "プリムラ"
# 「け、眷族、なんじゃその目は！？　違うぞ！　我も今まで１から全部観たものがなかったから、トレジアンナに聞いて、面白いと勧めてきたやつを観たのじゃ！」
line = "「け、眷族、なんじゃその目は！？　違うぞ！　我も今まで１から全部観たものがなかったから、トレジアンナに聞いて、面白いと勧めてきたやつを観たのじゃ！」"

[[dialogue]]
speaker = "プリムラ"
# 「そしたら、そういう破廉恥な描写があるやつで……！」
line = "「そしたら、そういう破廉恥な描写があるやつで……！」"

[[dialogue]]
speaker = "クーシェン"
# 「え～！？　でも、すごくプリムラも見入ってたじゃん！　特に敵が触手を召喚して、エッチな攻撃をしてくるとことか！」
line = "「え～！？　でも、すごくプリムラも見入ってたじゃん！　特に敵が触手を召喚して、エッチな攻撃をしてくるとことか！」"

[[dialogue]]
speaker = "プリムラ"
# 「ばっ！？　公衆の面前で何を言っとるんじゃ、貴様！？」
line = "「ばっ！？　公衆の面前で何を言っとるんじゃ、貴様！？」"

[[dialogue]]
speaker = "クーシェン"
# 「ボクはもう、ウキウキしたよ♪　絵なのに、あんな風にエッチなおっぱいの質感を再現できるなんて！　大人おっぱい最高！！」
line = "「ボクはもう、ウキウキしたよ♪　絵なのに、あんな風にエッチなおっぱいの質感を再現できるなんて！　大人おっぱい最高！！」"

[[dialogue]]
speaker = "プリムラ"
# 「おっぱいおっぱい、大きな声でぬかすでないっ、このエロ猿が！」
line = "「おっぱいおっぱい、大きな声でぬかすでないっ、このエロ猿が！」"

[[dialogue]]
speaker = "クーシェン"
# 「え～？　プリムラは子供だな～、そんなことで恥ずかしがるなんて～♪」
line = "「え～？　プリムラは子供だな～、そんなことで恥ずかしがるなんて～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「誰が子供じゃ！　『好きゲージ』が貯まると妊娠するとか、わけわからんことぬかすやつに言われたくないわ！」
line = "「誰が子供じゃ！　『好きゲージ』が貯まると妊娠するとか、わけわからんことぬかすやつに言われたくないわ！」"

[[dialogue]]
speaker = "クーシェン"
# 「わかってるわかってる♪　プリムラもそのうち、エッチなことがわかる時がくるから♪」
line = "「わかってるわかってる♪　プリムラもそのうち、エッチなことがわかる時がくるから♪」"

[[dialogue]]
speaker = "プリムラ"
# 「なんで我の方が貴様より子供みたいになっとるんじゃああああああっ！」
line = "「なんで我の方が貴様より子供みたいになっとるんじゃああああああっ！」"

[[dialogue]]
speaker = "クーシェン"
# 「わぁ～！　プリムラが怒ったぁ～♪　ウキキキ♪」
line = "「わぁ～！　プリムラが怒ったぁ～♪　ウキキキ♪」"

[[dialogue]]
speaker = "unk"
# その後、楽しそうに笑いながら、プリムラと追いかけっこをするクーシェンなのであった――
line = "その後、楽しそうに笑いながら、プリムラと追いかけっこをするクーシェンなのであった――"
