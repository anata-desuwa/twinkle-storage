[[dialogue]]
speaker = "unk"
# 第１２話,眠りの姫,B
line = "第１２話,眠りの姫,B"

[[dialogue]]
speaker = "unk"
# 流星教皇庁・星見家公邸──
line = "流星教皇庁・星見家公邸──"

[[dialogue]]
speaker = "unk"
# 宮殿に住まう一人の少女が、その廊下を歩いていた。
line = "宮殿に住まう一人の少女が、その廊下を歩いていた。"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 流星学園の星徒会長として務めを終えた彼女は、束の間の休息を得ようと実家まで戻ってきた。
line = "流星学園の星徒会長として務めを終えた彼女は、束の間の休息を得ようと実家まで戻ってきた。"

[[dialogue]]
speaker = "unk"
# ここ最近の間に吹き込んだ新たな風に、固めた決意が揺り動かされたのかもしれない。
line = "ここ最近の間に吹き込んだ新たな風に、固めた決意が揺り動かされたのかもしれない。"

[[dialogue]]
speaker = "unk"
# 彼女が見上げた先には、壁画があった。
line = "彼女が見上げた先には、壁画があった。"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フィオナ"
# 「月の壁画……」
line = "「月の壁画……」"

[[dialogue]]
speaker = "unk"
# 太古の歴史を思わせる巨大な石版。そこに描かれていたのはやはり、魔王。
line = "太古の歴史を思わせる巨大な石版。そこに描かれていたのはやはり、魔王。"

[[dialogue]]
speaker = "unk"
# しかしその様子は、大聖堂に飾られていた《太陽の壁画》とはまるで異なるものだった。
line = "しかしその様子は、大聖堂に飾られていた《太陽の壁画》とはまるで異なるものだった。"

[[dialogue]]
speaker = "フィオナ"
# 「……うん」
line = "「……うん」"

[[dialogue]]
speaker = "unk"
# 得心するように頷くと、彼女はすぐに踵を返した。
line = "得心するように頷くと、彼女はすぐに踵を返した。"

[[dialogue]]
speaker = "フィオナ"
# （大丈夫──私はやれる──フィオナとしても、魔王としても）
line = "（大丈夫──私はやれる──フィオナとしても、魔王としても）"

[[dialogue]]
speaker = "unk"
# 自分に言い聞かせるように胸中で唱え、彼女は再び歩き出す。
line = "自分に言い聞かせるように胸中で唱え、彼女は再び歩き出す。"

[[dialogue]]
speaker = "unk"
# 自らのルーツが今も眠る、その部屋へ向かって……
line = "自らのルーツが今も眠る、その部屋へ向かって……"

[[dialogue]]
speaker = "フィオナ"
# 「ねえ──お姉ちゃん」
line = "「ねえ──お姉ちゃん」"

[[dialogue]]
speaker = "unk"
# 遠い昔日にしまった微笑みを、ほんの一瞬だけ覗かせていた。
line = "遠い昔日にしまった微笑みを、ほんの一瞬だけ覗かせていた。"
