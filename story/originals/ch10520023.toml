[[dialogue]]
speaker = "unk"
# 第３話,ハバネロソースのかき氷,P
line = "第３話,ハバネロソースのかき氷,P"

[[dialogue]]
speaker = "unk"
# 今日も俺とセドナさんは、リゾート結界にやって来ていた。
line = "今日も俺とセドナさんは、リゾート結界にやって来ていた。"

[[dialogue]]
speaker = "unk"
# ただし今日はオフ。アルバイトではなくお休み。泳ぎや日光浴を楽しむバケーションだ。
line = "ただし今日はオフ。アルバイトではなくお休み。泳ぎや日光浴を楽しむバケーションだ。"

[[dialogue]]
speaker = "セドナ"
# 「常夏のビーチを年中再現できるというのは、改めて考えても驚異的な星力だな」
line = "「常夏のビーチを年中再現できるというのは、改めて考えても驚異的な星力だな」"

[[dialogue]]
speaker = "セドナ"
# 「ここの海はとても心地がいい。時間が許すかぎり、訪れたくなってしまう」
line = "「ここの海はとても心地がいい。時間が許すかぎり、訪れたくなってしまう」"

[[dialogue]]
speaker = "セドナ"
# 「私は『焔の魔女』の名前のとおり、暑い所が好きでな。基地にある休憩室よりも、リゾート結界の方がずっと羽根を伸ばせる気がする」
line = "「私は『焔の魔女』の名前のとおり、暑い所が好きでな。基地にある休憩室よりも、リゾート結界の方がずっと羽根を伸ばせる気がする」"

[[dialogue]]
speaker = "セドナ"
# 「こうしてパラソルを挿して寝転ぶだけでも、乙なものだ……」
line = "「こうしてパラソルを挿して寝転ぶだけでも、乙なものだ……」"

[[dialogue]]
speaker = "unk"
# 賑やかなのに癒されますね
line = "賑やかなのに癒されますね"

[[dialogue]]
speaker = "セドナ"
# 「ああ、そうだな」
line = "「ああ、そうだな」"

[[dialogue]]
speaker = "セドナ"
# 「……以前までの私なら、騒がしいところでは休めなかったものだが。お前と過ごしているうちに嗜好も少々変わったかもしれん」
line = "「……以前までの私なら、騒がしいところでは休めなかったものだが。お前と過ごしているうちに嗜好も少々変わったかもしれん」"

[[dialogue]]
speaker = "セドナ"
# 「それによくよく見れば、うちの構成員の姿もあちこちに見られる」
line = "「それによくよく見れば、うちの構成員の姿もあちこちに見られる」"

[[dialogue]]
speaker = "セドナ"
# 「せっかく同盟を結んだのだから、リゾート結界も遠慮なく使わせてもらえと指示をしたのだが……ちゃんと楽しめているのなら何よりだ」
line = "「せっかく同盟を結んだのだから、リゾート結界も遠慮なく使わせてもらえと指示をしたのだが……ちゃんと楽しめているのなら何よりだ」"

[[dialogue]]
speaker = "unk"
# 部下の人達も来やすくなったんでしょう
line = "部下の人達も来やすくなったんでしょう"

[[dialogue]]
speaker = "unk"
# セドナさんが何度も足を運んでいるから
line = "セドナさんが何度も足を運んでいるから"

[[dialogue]]
speaker = "セドナ"
# 「お前に言われたからな。トップが休まねば部下は休めない、と。初めは少し不安だったが、ちゃんと休みを取らせた方が仕事の能率も上がっているようだ」
line = "「お前に言われたからな。トップが休まねば部下は休めない、と。初めは少し不安だったが、ちゃんと休みを取らせた方が仕事の能率も上がっているようだ」"

[[dialogue]]
speaker = "セドナ"
# 「今後もネビュラの魔女と合同訓練をする機会は多いだろう。互いに実りのある時間を過ごせるよう、よろしく頼むぞ」
line = "「今後もネビュラの魔女と合同訓練をする機会は多いだろう。互いに実りのある時間を過ごせるよう、よろしく頼むぞ」"

[[dialogue]]
speaker = "セドナ"
# 「……っと、そろそろ昼だな。海の家に何か食べに行くとするか」
line = "「……っと、そろそろ昼だな。海の家に何か食べに行くとするか」"

[[dialogue]]
speaker = "セドナ"
# 「相変わらず、見事な焼きそばだな。実にうまい」
line = "「相変わらず、見事な焼きそばだな。実にうまい」"

[[dialogue]]
speaker = "セドナ"
# 「そして──フフ。この卓上調味料のハバネロソースも素晴らしい。１０周、回しかけることによってさらにうまくなる」
line = "「そして──フフ。この卓上調味料のハバネロソースも素晴らしい。１０周、回しかけることによってさらにうまくなる」"

[[dialogue]]
speaker = "unk"
# 相変わらずの辛党ですね……
line = "相変わらずの辛党ですね……"

[[dialogue]]
speaker = "セドナ"
# 「相変わらずお前はプレーンで食べるのか。試してみる価値はあるのだがな」
line = "「相変わらずお前はプレーンで食べるのか。試してみる価値はあるのだがな」"

[[dialogue]]
speaker = "セドナ"
# 「何？　騙されたと思って食べてみたら、舌を焼いた……まだあの時のことを根に持っているのか」
line = "「何？　騙されたと思って食べてみたら、舌を焼いた……まだあの時のことを根に持っているのか」"

[[dialogue]]
speaker = "セドナ"
# 「……残念だ。うまいんだがな」
line = "「……残念だ。うまいんだがな」"

[[dialogue]]
speaker = "unk"
# セドナさんはイメージ通りというか、とにかく辛い物を好む。焼きそばやラーメン、チャーハンなんかにもハバネロソースを振りかけるところを今まで何度も見てきた。
line = "セドナさんはイメージ通りというか、とにかく辛い物を好む。焼きそばやラーメン、チャーハンなんかにもハバネロソースを振りかけるところを今まで何度も見てきた。"

[[dialogue]]
speaker = "unk"
# だが俺は今日、信じられない光景を目の当たりにすることになる──
line = "だが俺は今日、信じられない光景を目の当たりにすることになる──"

[[dialogue]]
speaker = "セドナ"
# 「なんだ、イチゴのかき氷、いつ頼んだ？　それに２つも……聞くまでもないが、１つは私の分か」
line = "「なんだ、イチゴのかき氷、いつ頼んだ？　それに２つも……聞くまでもないが、１つは私の分か」"

[[dialogue]]
speaker = "セドナ"
# 「確かに以前、一緒にジェラートを食べたことはあったが……あれは例外だぞ。基本的には私は、甘い物は不得手だ」
line = "「確かに以前、一緒にジェラートを食べたことはあったが……あれは例外だぞ。基本的には私は、甘い物は不得手だ」"

[[dialogue]]
speaker = "セドナ"
# 「辛い物を食べた後とはいえ、かき氷のシロップみたいな、甘みの強いものは──」
line = "「辛い物を食べた後とはいえ、かき氷のシロップみたいな、甘みの強いものは──」"

[[dialogue]]
speaker = "セドナ"
# 「……いや待て。今の私にはハバネロソースがある。このイチゴのかき氷に、かけてみるのはどうだ……？」
line = "「……いや待て。今の私にはハバネロソースがある。このイチゴのかき氷に、かけてみるのはどうだ……？」"

[[dialogue]]
speaker = "unk"
# 無しでしょ！？
line = "無しでしょ！？"

[[dialogue]]
speaker = "セドナ"
# 「いいや、試してみる価値はある。どのみち甘いままでは、食べきれるか怪しい。残すよりはマシだろう」
line = "「いいや、試してみる価値はある。どのみち甘いままでは、食べきれるか怪しい。残すよりはマシだろう」"

[[dialogue]]
speaker = "セドナ"
# 「というわけで──ハバネロソース、投下だ」
line = "「というわけで──ハバネロソース、投下だ」"

[[dialogue]]
speaker = "unk"
# 本当にかけたーーー！？
line = "本当にかけたーーー！？"

[[dialogue]]
speaker = "unk"
# うわあああああああ！？
line = "うわあああああああ！？"

[[dialogue]]
speaker = "セドナ"
# 「──これでよし。ふむ、見た目はイチゴのかき氷だが……フフ。喉を刺す香りがするな」
line = "「──これでよし。ふむ、見た目はイチゴのかき氷だが……フフ。喉を刺す香りがするな」"

[[dialogue]]
speaker = "セドナ"
# 「ではいただこう──む！　こ、これは……！？」
line = "「ではいただこう──む！　こ、これは……！？」"

[[dialogue]]
speaker = "セドナ"
# 「────うまいな」
line = "「────うまいな」"

[[dialogue]]
speaker = "unk"
# いやいやいやいや！
line = "いやいやいやいや！"

[[dialogue]]
speaker = "セドナ"
# 「嘘ではない。ひやりとした氷に絡んだハバネロソースが喉を焼く……しかしその奥にわずかに残るイチゴの風味と甘み！　堪えられんうまさだ！」
line = "「嘘ではない。ひやりとした氷に絡んだハバネロソースが喉を焼く……しかしその奥にわずかに残るイチゴの風味と甘み！　堪えられんうまさだ！」"

[[dialogue]]
speaker = "セドナ"
# 「ほら魔王。騙されたと思って一口、食べてみろ。あーん、だ」
line = "「ほら魔王。騙されたと思って一口、食べてみろ。あーん、だ」"

[[dialogue]]
speaker = "unk"
# もっと美味しそうなやつがいいです……
line = "もっと美味しそうなやつがいいです……"

[[dialogue]]
speaker = "unk"
# あーんするなら、
line = "あーんするなら、"

[[dialogue]]
speaker = "セドナ"
# 「だからうまいと言ってるだろう。ほら、あーん」
line = "「だからうまいと言ってるだろう。ほら、あーん」"

[[dialogue]]
speaker = "unk"
# あ……あーん……
line = "あ……あーん……"

[[dialogue]]
speaker = "セドナ"
# 「──どうだ。これぞかき氷の新境地と言える味だろう。な？」
line = "「──どうだ。これぞかき氷の新境地と言える味だろう。な？」"

[[dialogue]]
speaker = "unk"
# からああああああああいいい！！
line = "からああああああああいいい！！"

[[dialogue]]
speaker = "unk"
# 騙されたと思って食べたものって、実はおいしいっていうオチがつくものなんじゃないのか。
line = "騙されたと思って食べたものって、実はおいしいっていうオチがつくものなんじゃないのか。"

[[dialogue]]
speaker = "unk"
# 本当にただ辛いだけで『わずかに残るイチゴの甘み』は行方不明状態。
line = "本当にただ辛いだけで『わずかに残るイチゴの甘み』は行方不明状態。"

[[dialogue]]
speaker = "セドナ"
# 「味の分からん奴だ。うむ──やはりうまい。リップルに提案して新メニューにしてもらってはどうだろう……？」
line = "「味の分からん奴だ。うむ──やはりうまい。リップルに提案して新メニューにしてもらってはどうだろう……？」"

[[dialogue]]
speaker = "unk"
# そんな不穏なこと呟く、辛党のセドナさんなのだった。
line = "そんな不穏なこと呟く、辛党のセドナさんなのだった。"
