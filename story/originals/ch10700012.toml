[[dialogue]]
speaker = "unk"
# 第２話,好きの瞳は曇らない,P
line = "第２話,好きの瞳は曇らない,P"

[[dialogue]]
speaker = "unk"
# ある日の昼休み。俺はウズメとソフィアの２人と昼食を一緒にし、談笑していたのだが――
line = "ある日の昼休み。俺はウズメとソフィアの２人と昼食を一緒にし、談笑していたのだが――"

[[dialogue]]
speaker = "ウズメイア"
# 「そういえば、この間さ～。あたし、忍者の子を見たんだよね～」
line = "「そういえば、この間さ～。あたし、忍者の子を見たんだよね～」"

[[dialogue]]
speaker = "unk"
# もしかして、せつなのこと？
line = "もしかして、せつなのこと？"

[[dialogue]]
speaker = "ウズメイア"
# 「そうそう！　九浄家メイド隊の、ござるちゃん！」
line = "「そうそう！　九浄家メイド隊の、ござるちゃん！」"

[[dialogue]]
speaker = "ウズメイア"
# 「この間、戦闘していた時にたまたま一緒になったんだけど、忍者ってやっぱカッコいいよね～。素早い身のこなしと忍術、見ててウズウズしちゃったし♪」
line = "「この間、戦闘していた時にたまたま一緒になったんだけど、忍者ってやっぱカッコいいよね～。素早い身のこなしと忍術、見ててウズウズしちゃったし♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「まさに、ジャパニーズクールって感じ。日本のよき伝統文化だよね～」
line = "「まさに、ジャパニーズクールって感じ。日本のよき伝統文化だよね～」"

[[dialogue]]
speaker = "ソフィア"
# 「そうなんですか？　忍者というのは、せつなさん以外に見たことがありませんが……」
line = "「そうなんですか？　忍者というのは、せつなさん以外に見たことがありませんが……」"

[[dialogue]]
speaker = "ウズメイア"
# 「なに言ってんの、ソフィ！　日本には忍者が沢山いるんだよ。ござるちゃんは星騎士だから目立ってるけど、そのほかの忍者は、その名の通り忍んでるだけで！」
line = "「なに言ってんの、ソフィ！　日本には忍者が沢山いるんだよ。ござるちゃんは星騎士だから目立ってるけど、そのほかの忍者は、その名の通り忍んでるだけで！」"

[[dialogue]]
speaker = "unk"
# いや、一般社会にはいないんじゃないかな……
line = "いや、一般社会にはいないんじゃないかな……"

[[dialogue]]
speaker = "ウズメイア"
# 「ええっ！？」
line = "「ええっ！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「いやいや、そんなことないっしょ！　あたしのオタク友達で、ござるって口調でしゃべる子知ってるし！」
line = "「いやいや、そんなことないっしょ！　あたしのオタク友達で、ござるって口調でしゃべる子知ってるし！」"

[[dialogue]]
speaker = "ソフィア"
# 「それはオタクだからでは……？」
line = "「それはオタクだからでは……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「武器で手裏剣使ってる星騎士の子とか見たし！」
line = "「武器で手裏剣使ってる星騎士の子とか見たし！」"

[[dialogue]]
speaker = "unk"
# あれはチャクラムらしいよ
line = "あれはチャクラムらしいよ"

[[dialogue]]
speaker = "ウズメイア"
# 「そんなぁ……！？」
line = "「そんなぁ……！？」"

[[dialogue]]
speaker = "ソフィア"
# 「ウズメのいつもの勘違いパターンですね」
line = "「ウズメのいつもの勘違いパターンですね」"

[[dialogue]]
speaker = "？？？"
# 「ふっふっふ……なるほど、その発想はなかったぜ☆」
line = "「ふっふっふ……なるほど、その発想はなかったぜ☆」"

[[dialogue]]
speaker = "紅明"
# 「女という漢字を分解して、くノ一。故にさりげなく匂わせる忍者ファッション……面白いじゃん！」
line = "「女という漢字を分解して、くノ一。故にさりげなく匂わせる忍者ファッション……面白いじゃん！」"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、紅明先輩！　ちょりっす♪」
line = "「あっ、紅明先輩！　ちょりっす♪」"

[[dialogue]]
speaker = "紅明"
# 「ウズメっち、おいっす～☆　今日も元気してる？　ウェ～イ♪」
line = "「ウズメっち、おいっす～☆　今日も元気してる？　ウェ～イ♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「もち元気です♪　ウェ～イ！」
line = "「もち元気です♪　ウェ～イ！」"

[[dialogue]]
speaker = "紅明"
# 「ソフィっちも元気してるかい？」
line = "「ソフィっちも元気してるかい？」"

[[dialogue]]
speaker = "ソフィア"
# 「どうもです、紅明さん。おかげさまで、ホットです」
line = "「どうもです、紅明さん。おかげさまで、ホットです」"

[[dialogue]]
speaker = "unk"
# 紅明、ウズメと知り合いだったんだ
line = "紅明、ウズメと知り合いだったんだ"

[[dialogue]]
speaker = "紅明"
# 「ダーリン♪　うん、そうなんよ！」
line = "「ダーリン♪　うん、そうなんよ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「セーラ先輩繋がりで知り合ったんだ～♪　ギャルの先輩としてもマジリスペクトって感じ♪」
line = "「セーラ先輩繋がりで知り合ったんだ～♪　ギャルの先輩としてもマジリスペクトって感じ♪」"

[[dialogue]]
speaker = "紅明"
# 「ところでさっきの話、聞いてたぜ。ウズメっち、忍者が好きなんだって？」
line = "「ところでさっきの話、聞いてたぜ。ウズメっち、忍者が好きなんだって？」"

[[dialogue]]
speaker = "ウズメイア"
# 「そうなんです！　忍者、めっちゃクールだと思うんですよね！」
line = "「そうなんです！　忍者、めっちゃクールだと思うんですよね！」"

[[dialogue]]
speaker = "紅明"
# 「確かに、せつなっち、戦闘中カッコいいよな。しかも、普段はめっちゃ可愛いっていう――」
line = "「確かに、せつなっち、戦闘中カッコいいよな。しかも、普段はめっちゃ可愛いっていう――」"

[[dialogue]]
speaker = "紅明"
# 「アタシが思うにあれだ……あの手裏剣の髪飾り、よくない？」
line = "「アタシが思うにあれだ……あの手裏剣の髪飾り、よくない？」"

[[dialogue]]
speaker = "ウズメイア"
# 「わかります！　あたしもあれ欲しいんですけど、どこに売ってるんですかね！？」
line = "「わかります！　あたしもあれ欲しいんですけど、どこに売ってるんですかね！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「それとあたし的に、あの忍者マスクもファッションとしてアリだと思うんですよ！」
line = "「それとあたし的に、あの忍者マスクもファッションとしてアリだと思うんですよ！」"

[[dialogue]]
speaker = "紅明"
# 「それな！　あと扇子も持ち歩いてみたりとか！」
line = "「それな！　あと扇子も持ち歩いてみたりとか！」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ～！　ヤバい、めっちゃアリ！　うわ～、なんかあたし、忍者ファッションしてみたくなってきたかも♪」
line = "「あ～！　ヤバい、めっちゃアリ！　うわ～、なんかあたし、忍者ファッションしてみたくなってきたかも♪」"

[[dialogue]]
speaker = "紅明"
# 「ウズメっち、今度の休みとか空いてる？　ちょっくら街にアイテム探しに行ってみようぜ！」
line = "「ウズメっち、今度の休みとか空いてる？　ちょっくら街にアイテム探しに行ってみようぜ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「いいですね！　セーラ先輩も誘っちゃいましょう！　ソフィと会長くんは予定だいじょぶ！？」
line = "「いいですね！　セーラ先輩も誘っちゃいましょう！　ソフィと会長くんは予定だいじょぶ！？」"

[[dialogue]]
speaker = "ソフィア"
# 「えっ？　私もですか？」
line = "「えっ？　私もですか？」"

[[dialogue]]
speaker = "紅明"
# 「ソフィっちも久しぶりに遊ぼうぜ☆　アタシ、この間、美味しいパンケーキのお店を見つけたんよ～。お姉さん奢っちゃうぜ？」
line = "「ソフィっちも久しぶりに遊ぼうぜ☆　アタシ、この間、美味しいパンケーキのお店を見つけたんよ～。お姉さん奢っちゃうぜ？」"

[[dialogue]]
speaker = "ソフィア"
# 「ぱ、パンケーキですか……ごくり」
line = "「ぱ、パンケーキですか……ごくり」"

[[dialogue]]
speaker = "unk"
# そんなこんなで忍者談義が盛り上がり――
line = "そんなこんなで忍者談義が盛り上がり――"

[[dialogue]]
speaker = "unk"
# 後日、世間では手裏剣型のアクセサリーや、マスクや扇子が若い女性の間で大流行していた――
line = "後日、世間では手裏剣型のアクセサリーや、マスクや扇子が若い女性の間で大流行していた――"

[[dialogue]]
speaker = "ソフィア"
# 「まさか、紅明さんのＳＮＳ発信で、本当に忍者ファッションが流行るとは……」
line = "「まさか、紅明さんのＳＮＳ発信で、本当に忍者ファッションが流行るとは……」"

[[dialogue]]
speaker = "ウズメイア"
# 「これはズバリ――」
line = "「これはズバリ――」"

[[dialogue]]
speaker = "ウズメイア"
# 「これまで忍んでいた忍者の子たちが、流行に乗じて存在を露わにしたってことじゃん！？」
line = "「これまで忍んでいた忍者の子たちが、流行に乗じて存在を露わにしたってことじゃん！？」"

[[dialogue]]
speaker = "unk"
# いや違うよ！？
line = "いや違うよ！？"

[[dialogue]]
speaker = "ソフィア"
# 「まぁ、ウズメなので……」
line = "「まぁ、ウズメなので……」"

[[dialogue]]
speaker = "unk"
# 瞳を曇らせることなく、晴れやかに忍者を信じ続けるウズメなのだった――
line = "瞳を曇らせることなく、晴れやかに忍者を信じ続けるウズメなのだった――"
