[[dialogue]]
speaker = "unk"
# 第１話,女神の幼体の目覚め,B
line = "第１話,女神の幼体の目覚め,B"

[[dialogue]]
speaker = "unk"
# その日、創造神『ＸＥＬＯＳ』は、新たな命を創り出した。
line = "その日、創造神『ＸＥＬＯＳ』は、新たな命を創り出した。"

[[dialogue]]
speaker = "unk"
# 今は亡きベガと同じ末路に、デネブとアルタイルを導くために。
line = "今は亡きベガと同じ末路に、デネブとアルタイルを導くために。"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ──目が覚めたか、<b>ルヴィネ</b>。
line = "──目が覚めたか、<b>ルヴィネ</b>。"

[[dialogue]]
speaker = "ルヴィネ"
# 「……ルヴィネ。それが、私という個体の名称なのですね。お父様」
line = "「……ルヴィネ。それが、私という個体の名称なのですね。お父様」"

[[dialogue]]
speaker = "unk"
# ──お前が製造された目的は、なんだ？
line = "──お前が製造された目的は、なんだ？"

[[dialogue]]
speaker = "ルヴィネ"
# 「……リクリエを遂行すること。それ以外にありません」
line = "「……リクリエを遂行すること。それ以外にありません」"

[[dialogue]]
speaker = "unk"
# ──女神テルルを、どう思うか？
line = "──女神テルルを、どう思うか？"

[[dialogue]]
speaker = "ルヴィネ"
# 「旧時代の、壊れた女神。お父様のご意思に背く、愚か者です」
line = "「旧時代の、壊れた女神。お父様のご意思に背く、愚か者です」"

[[dialogue]]
speaker = "unk"
# ──地上にはびこる人類をどう思うか？
line = "──地上にはびこる人類をどう思うか？"

[[dialogue]]
speaker = "ルヴィネ"
# 「虫と変わりません。邪魔をするなら、踏みつぶすだけです」
line = "「虫と変わりません。邪魔をするなら、踏みつぶすだけです」"

[[dialogue]]
speaker = "unk"
# ──よろしい。人の身では決して敵わぬ霊力を授けた。上手く使え。
line = "──よろしい。人の身では決して敵わぬ霊力を授けた。上手く使え。"

[[dialogue]]
speaker = "ルヴィネ"
# 「はい。ありがとうございます」
line = "「はい。ありがとうございます」"

[[dialogue]]
speaker = "ルヴィネ"
# 「私はルヴィネ……テルルに代わる、新たな女神の幼体……」
line = "「私はルヴィネ……テルルに代わる、新たな女神の幼体……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「出来損ないの姉を排除し、お父様の望みを実現してみせます」
line = "「出来損ないの姉を排除し、お父様の望みを実現してみせます」"

[[dialogue]]
speaker = "ルヴィネ"
# 「見ていてください、お父様。必ずや、世界の刷新を──」
line = "「見ていてください、お父様。必ずや、世界の刷新を──」"
