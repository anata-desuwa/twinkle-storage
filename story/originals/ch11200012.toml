[[dialogue]]
speaker = "unk"
# 第２話,独特グルメ,P
line = "第２話,独特グルメ,P"

[[dialogue]]
speaker = "シノ"
# 「今日もありがとうございました。忙しいのにいろいろ案内していただいて」
line = "「今日もありがとうございました。忙しいのにいろいろ案内していただいて」"

[[dialogue]]
speaker = "unk"
# 学園長就任の告知がされた後も、案内役としてシノさんを連れて学園のあちこちを回っていた。
line = "学園長就任の告知がされた後も、案内役としてシノさんを連れて学園のあちこちを回っていた。"

[[dialogue]]
speaker = "unk"
# そして案内の最後にはカフェテリアへ、というのも恒例として定着しつつある。
line = "そして案内の最後にはカフェテリアへ、というのも恒例として定着しつつある。"

[[dialogue]]
speaker = "シノ"
# 「思ったより長い時間、つき合わせてしまいましたね。会長さんもお疲れでしょう？　せっかくですから少し休んでいきましょう」
line = "「思ったより長い時間、つき合わせてしまいましたね。会長さんもお疲れでしょう？　せっかくですから少し休んでいきましょう」"

[[dialogue]]
speaker = "シノ"
# 「カフェラテ、甘くて美味しい……糖分が全身を駆け巡っていくのを感じますね……」
line = "「カフェラテ、甘くて美味しい……糖分が全身を駆け巡っていくのを感じますね……」"

[[dialogue]]
speaker = "シノ"
# 「ふふ、すみません、情けない姿をお見せしてしまって。デスクワークが多いもので、体力にはあまり自信がないんです」
line = "「ふふ、すみません、情けない姿をお見せしてしまって。デスクワークが多いもので、体力にはあまり自信がないんです」"

[[dialogue]]
speaker = "シノ"
# 「もっと体力をつけないといけないんですけどね……なかなか時間が取れなくて」
line = "「もっと体力をつけないといけないんですけどね……なかなか時間が取れなくて」"

[[dialogue]]
speaker = "シノ"
# 「会長さんも何か注文して下さい。払いは私が持ちますので遠慮なく」
line = "「会長さんも何か注文して下さい。払いは私が持ちますので遠慮なく」"

[[dialogue]]
speaker = "シノ"
# 「お腹が空いていたら軽食を頼んでもいいですよ。私は……こちらをいただきますので」
line = "「お腹が空いていたら軽食を頼んでもいいですよ。私は……こちらをいただきますので」"

[[dialogue]]
speaker = "シノ"
# 「これですか？　これはですね、カロリーたっぷりの完全栄養食です。なんとこれ１本で１日分の栄養が補給できる優れものです」
line = "「これですか？　これはですね、カロリーたっぷりの完全栄養食です。なんとこれ１本で１日分の栄養が補給できる優れものです」"

[[dialogue]]
speaker = "シノ"
# 「ぽそぽそしてるのが難点ですけど……飲み物で流し込んでしまえば……」
line = "「ぽそぽそしてるのが難点ですけど……飲み物で流し込んでしまえば……」"

[[dialogue]]
speaker = "シノ"
# 「はむっ……もぐもぐもぐ……ずずずずず……ごくんっ」
line = "「はむっ……もぐもぐもぐ……ずずずずず……ごくんっ」"

[[dialogue]]
speaker = "シノ"
# 「ふふ、ざっとこんな感じです」
line = "「ふふ、ざっとこんな感じです」"

[[dialogue]]
speaker = "unk"
# おいしいんですか、それ？
line = "おいしいんですか、それ？"

[[dialogue]]
speaker = "シノ"
# 「これがなかなかどうして美味しいんですよ。微妙な味わいが癖になるんです！」
line = "「これがなかなかどうして美味しいんですよ。微妙な味わいが癖になるんです！」"

[[dialogue]]
speaker = "シノ"
# 「短時間でしっかり満足できますし、ビジネスマンのつよ～い味方！　会長さんも常備しておくと、いざという時に助かりますよ」
line = "「短時間でしっかり満足できますし、ビジネスマンのつよ～い味方！　会長さんも常備しておくと、いざという時に助かりますよ」"

[[dialogue]]
speaker = "シノ"
# 「そうだ、せっかくですから味見してみませんか？　ねっ、ねっ？」
line = "「そうだ、せっかくですから味見してみませんか？　ねっ、ねっ？」"

[[dialogue]]
speaker = "unk"
# 目も爛々と輝いて、ちょっと恐いです
line = "目も爛々と輝いて、ちょっと恐いです"

[[dialogue]]
speaker = "unk"
# あ、あの、急に押しが強く……
line = "あ、あの、急に押しが強く……"

[[dialogue]]
speaker = "シノ"
# 「恐くありませんよ～、種類もたくさんありますからね～。会長さんには何をオススメするべきでしょうか……ふふ、迷ってしまいます」
line = "「恐くありませんよ～、種類もたくさんありますからね～。会長さんには何をオススメするべきでしょうか……ふふ、迷ってしまいます」"

[[dialogue]]
speaker = "シノ"
# 「決めました！　出し惜しみしていても仕方ありませんから、いきなりとっておきの『超完全栄養食』でいってみましょう！」
line = "「決めました！　出し惜しみしていても仕方ありませんから、いきなりとっておきの『超完全栄養食』でいってみましょう！」"

[[dialogue]]
speaker = "シノ"
# 「はい、こちらは通常の完全栄養食に、更に栄養を追加したものになっています」
line = "「はい、こちらは通常の完全栄養食に、更に栄養を追加したものになっています」"

[[dialogue]]
speaker = "シノ"
# 「これを食べればどんなに疲れが溜まっていても、たちどころに元気になってしまうんですね」
line = "「これを食べればどんなに疲れが溜まっていても、たちどころに元気になってしまうんですね」"

[[dialogue]]
speaker = "シノ"
# 「私も週に一度は食べている、栄養マシマシな逸品です。さあさあ会長さん、ぜひ食べてみてください！」
line = "「私も週に一度は食べている、栄養マシマシな逸品です。さあさあ会長さん、ぜひ食べてみてください！」"

[[dialogue]]
speaker = "シノ"
# 「ええ～、そんなに警戒しなくてもいいじゃありませんか～」
line = "「ええ～、そんなに警戒しなくてもいいじゃありませんか～」"

[[dialogue]]
speaker = "シノ"
# 「ちゃんと食品メーカーが製品として扱っているものですから、見た目はよくないかもしれませんが危険はありませんよ」
line = "「ちゃんと食品メーカーが製品として扱っているものですから、見た目はよくないかもしれませんが危険はありませんよ」"

[[dialogue]]
speaker = "unk"
# 頂きますっ、あむっ！
line = "頂きますっ、あむっ！"

[[dialogue]]
speaker = "unk"
# そ、そうですよね。それじゃ……
line = "そ、そうですよね。それじゃ……"

[[dialogue]]
speaker = "シノ"
# 「ふふ、目をぱちくりさせて驚いていますね」
line = "「ふふ、目をぱちくりさせて驚いていますね」"

[[dialogue]]
speaker = "シノ"
# 「どうです、会長さん？　意外と美味しくありませんか？　それにお手軽に栄養補給が出来るから私も愛用しているんです」
line = "「どうです、会長さん？　意外と美味しくありませんか？　それにお手軽に栄養補給が出来るから私も愛用しているんです」"

[[dialogue]]
speaker = "シノ"
# 「忙しい時なんて特にこれが手放せません。超完全栄養食、気に入っていただけましたか？」
line = "「忙しい時なんて特にこれが手放せません。超完全栄養食、気に入っていただけましたか？」"

[[dialogue]]
speaker = "unk"
# 確かにこれはいいかもしれない
line = "確かにこれはいいかもしれない"

[[dialogue]]
speaker = "シノ"
# 「ですよね！　会長さんなら分かってくれると信じてましたよ♪」
line = "「ですよね！　会長さんなら分かってくれると信じてましたよ♪」"

[[dialogue]]
speaker = "シノ"
# 「それでは次はこちらのフルーツ味の方を──」
line = "「それでは次はこちらのフルーツ味の方を──」"

[[dialogue]]
speaker = "蛍火"
# 「あ、あの……せっかくカフェにいらしたのですから、出来れば料理を楽しんで欲しいのですが……」
line = "「あ、あの……せっかくカフェにいらしたのですから、出来れば料理を楽しんで欲しいのですが……」"

[[dialogue]]
speaker = "シノ"
# 「あら、その格好は……もしかして、<ruby=しののめ>東雲</ruby><ruby=けいか>蛍火</ruby>さんですか？」
line = "「あら、その格好は……もしかして、<ruby>東雲<rt>しののめ</rt></ruby><ruby>蛍火<rt>けいか</rt></ruby>さんですか？」"

[[dialogue]]
speaker = "蛍火"
# 「はい、このカフェテリアで料理人を務めさせて頂いております」
line = "「はい、このカフェテリアで料理人を務めさせて頂いております」"

[[dialogue]]
speaker = "蛍火"
# 「あなたは先日、新星学園の学園長になられた十六夜シノさん……ですよね？」
line = "「あなたは先日、新星学園の学園長になられた十六夜シノさん……ですよね？」"

[[dialogue]]
speaker = "シノ"
# 「はい、そうです」
line = "「はい、そうです」"

[[dialogue]]
speaker = "シノ"
# 「あっ……もしかしてこのカフェテリアは食べ物の持ち込みは禁止でしたか？」
line = "「あっ……もしかしてこのカフェテリアは食べ物の持ち込みは禁止でしたか？」"

[[dialogue]]
speaker = "蛍火"
# 「いえ、それは問題ありませんし、栄養食について否定するつもりもないのですが……」
line = "「いえ、それは問題ありませんし、栄養食について否定するつもりもないのですが……」"

[[dialogue]]
speaker = "シノ"
# 「……蛍火さんの作る料理が美味しいという噂は、学園長に就任する前より耳にしていました」
line = "「……蛍火さんの作る料理が美味しいという噂は、学園長に就任する前より耳にしていました」"

[[dialogue]]
speaker = "シノ"
# 「そんな方のいらっしゃるお店で、お料理を頼まず栄養食を広げるのは確かに失礼でした……ごめんなさい、気を悪くされましたよね？」
line = "「そんな方のいらっしゃるお店で、お料理を頼まず栄養食を広げるのは確かに失礼でした……ごめんなさい、気を悪くされましたよね？」"

[[dialogue]]
speaker = "蛍火"
# 「あ、う……そんなことは無いのですが……その……」
line = "「あ、う……そんなことは無いのですが……その……」"

[[dialogue]]
speaker = "ヨミ"
# 「東雲先輩は学園長さんを、料理でおもてなししたいだけなんですよ～」
line = "「東雲先輩は学園長さんを、料理でおもてなししたいだけなんですよ～」"

[[dialogue]]
speaker = "シノ"
# 「あなたは<ruby=あまがさき>天ヶ崎</ruby>ヨミさんですね？　ふふ、こちらもまた噂通り、可愛らしい方です」
line = "「あなたは<ruby>天ヶ崎<rt>あまがさき</rt></ruby>ヨミさんですね？　ふふ、こちらもまた噂通り、可愛らしい方です」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　か、かわいいなんて……ちょっと恥ずかしいですけど」
line = "「こやっ！？　か、かわいいなんて……ちょっと恥ずかしいですけど」"

[[dialogue]]
speaker = "ヨミ"
# 「コホン、クエスト受付嬢のヨミです。新しい学園長さん、初めまして。今後ともよろしくお願いします」
line = "「コホン、クエスト受付嬢のヨミです。新しい学園長さん、初めまして。今後ともよろしくお願いします」"

[[dialogue]]
speaker = "シノ"
# 「はい、よろしくお願いします」
line = "「はい、よろしくお願いします」"

[[dialogue]]
speaker = "ヨミ"
# 「学園長、東雲先輩の作る料理も美味しくて栄養たっぷりですよ。だからぜひ、食べてあげてください」
line = "「学園長、東雲先輩の作る料理も美味しくて栄養たっぷりですよ。だからぜひ、食べてあげてください」"

[[dialogue]]
speaker = "シノ"
# 「ありがとうございます。では蛍火さん、シェフのオススメをお願いできますか？」
line = "「ありがとうございます。では蛍火さん、シェフのオススメをお願いできますか？」"

[[dialogue]]
speaker = "蛍火"
# 「はい、喜んで……！」
line = "「はい、喜んで……！」"

[[dialogue]]
speaker = "ヨミ"
# 「お邪魔しました～。お料理が出来るまで今しばらくお待ちくださーい♪」
line = "「お邪魔しました～。お料理が出来るまで今しばらくお待ちくださーい♪」"

[[dialogue]]
speaker = "シノ"
# 「歓迎してくれていますね、みんな……私のことを」
line = "「歓迎してくれていますね、みんな……私のことを」"

[[dialogue]]
speaker = "シノ"
# 「私は学園生のみなさんとそれほど歳が変わりません。だからこの若さを不安視したり反発したりする声もあるだろうと覚悟していたのですが……」
line = "「私は学園生のみなさんとそれほど歳が変わりません。だからこの若さを不安視したり反発したりする声もあるだろうと覚悟していたのですが……」"

[[dialogue]]
speaker = "シノ"
# 「本当にどこに行っても歓迎してくださいます。嬉しいことですね……」
line = "「本当にどこに行っても歓迎してくださいます。嬉しいことですね……」"

[[dialogue]]
speaker = "unk"
# みんなと友達になってください
line = "みんなと友達になってください"

[[dialogue]]
speaker = "シノ"
# 「友達……いいですね。ふふ、ありがとうございます」
line = "「友達……いいですね。ふふ、ありがとうございます」"

[[dialogue]]
speaker = "シノ"
# 「では会長さん。あなたともお友達、そういうことでいいでしょうか？」
line = "「では会長さん。あなたともお友達、そういうことでいいでしょうか？」"

[[dialogue]]
speaker = "unk"
# ええ、もちろんです
line = "ええ、もちろんです"

[[dialogue]]
speaker = "シノ"
# 「ふふ、ありがとうございます」
line = "「ふふ、ありがとうございます」"

[[dialogue]]
speaker = "シノ"
# 「蛍火さんとヨミさん、お２人ともお友達になりたいですね。いいえ、それだけでなく学園のみなさん、全員と」
line = "「蛍火さんとヨミさん、お２人ともお友達になりたいですね。いいえ、それだけでなく学園のみなさん、全員と」"

[[dialogue]]
speaker = "unk"
# そう言ってシノさんは、歳相応の楽しそうな笑顔を覗かせたのだった。
line = "そう言ってシノさんは、歳相応の楽しそうな笑顔を覗かせたのだった。"
