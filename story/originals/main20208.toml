[[dialogue]]
speaker = "unk"
# 第８話,宣戦布告,B
line = "第８話,宣戦布告,B"

[[dialogue]]
speaker = "unk"
# 今日、星徒会主催のクイズオリエンテーションの概要が発表された。
line = "今日、星徒会主催のクイズオリエンテーションの概要が発表された。"

[[dialogue]]
speaker = "unk"
# 参加希望の生徒はチームを組んでクイズ大会に応募してもらう。
line = "参加希望の生徒はチームを組んでクイズ大会に応募してもらう。"

[[dialogue]]
speaker = "unk"
# 本番は一週間後。留学生・在校生ともに多くの生徒の参加を期待したい。
line = "本番は一週間後。留学生・在校生ともに多くの生徒の参加を期待したい。"

[[dialogue]]
speaker = "マトイ"
# 「クイズ大会、みんな参加してくれるかな？　応募が全然なくて中止、なんてことになったり……」
line = "「クイズ大会、みんな参加してくれるかな？　応募が全然なくて中止、なんてことになったり……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「マトイったら心配しすぎよ。うちの生徒はお祭り好きなんだから、今にこぞって応募してくるわ」
line = "「マトイったら心配しすぎよ。うちの生徒はお祭り好きなんだから、今にこぞって応募してくるわ」"

[[dialogue]]
speaker = "マトイ"
# 「みんながみんなヴィーナスみたいだったらいいんだけど……」
line = "「みんながみんなヴィーナスみたいだったらいいんだけど……」"

[[dialogue]]
speaker = "クロト"
# 「だけど確かに、留学生にはチームを組むのはハードルが高かったかもしれないな。そのために賞品もあるけど……」
line = "「だけど確かに、留学生にはチームを組むのはハードルが高かったかもしれないな。そのために賞品もあるけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その辺は在校生にお願いしてもいいかもしれないわね。留学生に声をかけてチームになってあげてって」
line = "「その辺は在校生にお願いしてもいいかもしれないわね。留学生に声をかけてチームになってあげてって」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろん留学生同士でチームを組んでもいいし。ま、少し様子を見ましょ」
line = "「もちろん留学生同士でチームを組んでもいいし。ま、少し様子を見ましょ」"

[[dialogue]]
speaker = "unk"
# 校舎の前で出会ったあの子は参加してくれるだろうか。在校生と打ち解けられるだろうか。
line = "校舎の前で出会ったあの子は参加してくれるだろうか。在校生と打ち解けられるだろうか。"

[[dialogue]]
speaker = "unk"
# オリエンテーションを通して友達ができるといいな──なんて考えていると。
line = "オリエンテーションを通して友達ができるといいな──なんて考えていると。"

[[dialogue]]
speaker = "梨緒"
# 「緋宮会長」
line = "「緋宮会長」"

[[dialogue]]
speaker = "unk"
# 俺を呼び止める声に振り返る。
line = "俺を呼び止める声に振り返る。"

[[dialogue]]
speaker = "クロト"
# 「梨緒──と、ベアトリスか」
line = "「梨緒──と、ベアトリスか」"

[[dialogue]]
speaker = "ベアトリス"
# 「こ、こんにちは……」
line = "「こ、こんにちは……」"

[[dialogue]]
speaker = "ベアトリス"
# （ひぃぃ！？　魔王クロト……！）
line = "（ひぃぃ！？　魔王クロト……！）"

[[dialogue]]
speaker = "unk"
# まだ新星学園に慣れていないのか、ベアトリスの表情はどこかぎこちない。
line = "まだ新星学園に慣れていないのか、ベアトリスの表情はどこかぎこちない。"

[[dialogue]]
speaker = "クロト"
# 「どうして２人が一緒に？」
line = "「どうして２人が一緒に？」"

[[dialogue]]
speaker = "梨緒"
# 「ベアトリスが選管に入ってくれたんだ。今後会う機会があるだろうから、紹介しておこうと思ったんだが、彼女のことはすでに知っていたか」
line = "「ベアトリスが選管に入ってくれたんだ。今後会う機会があるだろうから、紹介しておこうと思ったんだが、彼女のことはすでに知っていたか」"

[[dialogue]]
speaker = "クロト"
# 「ああ、この前少しだけ話したんだ」
line = "「ああ、この前少しだけ話したんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ベアトリスが選管に入るなんて意外ね、そういうの向いてなさそうなのに。梨緒が１人だから同情して、とかじゃないの」
line = "「ベアトリスが選管に入るなんて意外ね、そういうの向いてなさそうなのに。梨緒が１人だから同情して、とかじゃないの」"

[[dialogue]]
speaker = "梨緒"
# 「くふっ……！？」
line = "「くふっ……！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ち、違います！　私は梨緒さんの言葉に共感して、自分の意志で入ったんですから」
line = "「ち、違います！　私は梨緒さんの言葉に共感して、自分の意志で入ったんですから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなの？」
line = "「そうなの？」"

[[dialogue]]
speaker = "ベアトリス"
# 「は、はい」
line = "「は、はい」"

[[dialogue]]
speaker = "unk"
# 控えめに頷くベアトリス。
line = "控えめに頷くベアトリス。"

[[dialogue]]
speaker = "unk"
# 確かに選管に入るのは意外だったけど、留学してすぐ仲間ができたのは良かった。
line = "確かに選管に入るのは意外だったけど、留学してすぐ仲間ができたのは良かった。"

[[dialogue]]
speaker = "ナターシャ"
# 「見ーつけた」
line = "「見ーつけた」"

[[dialogue]]
speaker = "クロト"
# 「！　君は……」
line = "「！　君は……」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、また会ったね、魔王様」
line = "「あ、また会ったね、魔王様」"

[[dialogue]]
speaker = "ヴィーナス"
# 「知り合いなの？」
line = "「知り合いなの？」"

[[dialogue]]
speaker = "クロト"
# 「まぁ……一応」
line = "「まぁ……一応」"

[[dialogue]]
speaker = "unk"
# 昨日の今日で、また会うとは思わなかった。
line = "昨日の今日で、また会うとは思わなかった。"

[[dialogue]]
speaker = "unk"
# 暗殺者に狙われるなんて映画の中みたいだが、夢ではなかったらしい。
line = "暗殺者に狙われるなんて映画の中みたいだが、夢ではなかったらしい。"

[[dialogue]]
speaker = "ナターシャ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 「暗殺者ってことは秘密だよ」と、ナターシャが視線で告げている。
line = "「暗殺者ってことは秘密だよ」と、ナターシャが視線で告げている。"

[[dialogue]]
speaker = "unk"
# 釘を刺さずとも、おいそれと言う気はない。
line = "釘を刺さずとも、おいそれと言う気はない。"

[[dialogue]]
speaker = "ナターシャ"
# 「私は<ruby=ちるの>散乃</ruby>ナターシャ。聖庭園から来たんだ。魔王の様子を見ろって言われててね」
line = "「私は<ruby>散乃<rt>ちるの</rt></ruby>ナターシャ。聖庭園から来たんだ。魔王の様子を見ろって言われててね」"

[[dialogue]]
speaker = "ナターシャ"
# 「というわけで、私も選挙管理委員会に入れてもらっていい？　あなたが委員長の梨緒だよね？」
line = "「というわけで、私も選挙管理委員会に入れてもらっていい？　あなたが委員長の梨緒だよね？」"

[[dialogue]]
speaker = "梨緒"
# 「……ふむ」
line = "「……ふむ」"

[[dialogue]]
speaker = "ナターシャ"
# （おや？　ちょっと警戒してる感じ？　……意外と勘はいいんだ）
line = "（おや？　ちょっと警戒してる感じ？　……意外と勘はいいんだ）"

[[dialogue]]
speaker = "梨緒"
# 「目的は同じ──というわけか。わかった、君も今日から選挙管理委員会の一員だ」
line = "「目的は同じ──というわけか。わかった、君も今日から選挙管理委員会の一員だ」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん、ありがとう♪」
line = "「うん、ありがとう♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、ベアトリス・シェイドです。私も選管なんです」
line = "「私、ベアトリス・シェイドです。私も選管なんです」"

[[dialogue]]
speaker = "ナターシャ"
# 「あ、梨緒１人だって聞いてたけど、先に入った人いたんだ。よろしくね♪」
line = "「あ、梨緒１人だって聞いてたけど、先に入った人いたんだ。よろしくね♪」"

[[dialogue]]
speaker = "梨緒"
# 「では、３人になった選挙管理委員会の最初の仕事だ」
line = "「では、３人になった選挙管理委員会の最初の仕事だ」"

[[dialogue]]
speaker = "ナターシャ"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "unk"
# すると梨緒は小気味良い音が出そうなほど、ビシッと俺を指差して──
line = "すると梨緒は小気味良い音が出そうなほど、ビシッと俺を指差して──"

[[dialogue]]
speaker = "梨緒"
# 「選挙管理委員会は私とベアトリス、ナターシャの３人。クイズ大会の参加条件を満たした」
line = "「選挙管理委員会は私とベアトリス、ナターシャの３人。クイズ大会の参加条件を満たした」"

[[dialogue]]
speaker = "梨緒"
# 「我々選挙管理委員会は、君たち新星星徒会にクイズで勝負を申し込む！」
line = "「我々選挙管理委員会は、君たち新星星徒会にクイズで勝負を申し込む！」"

[[dialogue]]
speaker = "ベアトリス"
# 「えええええ～～～っ！！？」
line = "「えええええ～～～っ！！？」"

[[dialogue]]
speaker = "unk"
# 驚きの声を上げたのは、勝負を挑んできた側だった。
line = "驚きの声を上げたのは、勝負を挑んできた側だった。"

[[dialogue]]
speaker = "クロト"
# 「星徒会は開催する側なんだけど……」
line = "「星徒会は開催する側なんだけど……」"

[[dialogue]]
speaker = "梨緒"
# 「概要によれば、クイズはクイズ研究会の作成。進行も放送委員会が行う。星徒会の参加も不可能ではないはずだ」
line = "「概要によれば、クイズはクイズ研究会の作成。進行も放送委員会が行う。星徒会の参加も不可能ではないはずだ」"

[[dialogue]]
speaker = "梨緒"
# 「リクリエに関する知識もクイズで問われると聞く。星徒会の適性を計るいい機会だ」
line = "「リクリエに関する知識もクイズで問われると聞く。星徒会の適性を計るいい機会だ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フッ……勝負を挑まれて逃げるわけにはいかないわね。受けて立つわ！」
line = "「フッ……勝負を挑まれて逃げるわけにはいかないわね。受けて立つわ！」"

[[dialogue]]
speaker = "マトイ"
# 「やっぱりぃ……」
line = "「やっぱりぃ……」"

[[dialogue]]
speaker = "unk"
# ノリノリで勝負を受けるヴィーナスに、げんなりと項垂れるマトイ。
line = "ノリノリで勝負を受けるヴィーナスに、げんなりと項垂れるマトイ。"

[[dialogue]]
speaker = "クロト"
# 「まぁ……星徒会で相談してみて、問題なさそうなら考えるよ」
line = "「まぁ……星徒会で相談してみて、問題なさそうなら考えるよ」"

[[dialogue]]
speaker = "梨緒"
# 「先日挑み損ねた勝負の代わりだ。会場で待っているぞ、緋宮会長」
line = "「先日挑み損ねた勝負の代わりだ。会場で待っているぞ、緋宮会長」"

[[dialogue]]
speaker = "unk"
# 梨緒の矢のような視線が真っ直ぐに俺を見つめる。
line = "梨緒の矢のような視線が真っ直ぐに俺を見つめる。"

[[dialogue]]
speaker = "unk"
# 凛々しい彼女には、その真剣な表情が様になっていた。
line = "凛々しい彼女には、その真剣な表情が様になっていた。"

[[dialogue]]
speaker = "ナターシャ"
# 「へ～、クイズかー。面白そうじゃん」
line = "「へ～、クイズかー。面白そうじゃん」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、こちらに来たばかりで足を引っ張らないでしょうか……？」
line = "「私、こちらに来たばかりで足を引っ張らないでしょうか……？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま、オリエンテーションなんだし気楽にやればいいんじゃない？」
line = "「ま、オリエンテーションなんだし気楽にやればいいんじゃない？」"

[[dialogue]]
speaker = "梨緒"
# 「いいや、勝負するからには勝利を目指すぞ」
line = "「いいや、勝負するからには勝利を目指すぞ」"

[[dialogue]]
speaker = "梨緒"
# 「だがベアトリス、心配する必要はない。私たちはチームだ。困った時は助け合えばいい」
line = "「だがベアトリス、心配する必要はない。私たちはチームだ。困った時は助け合えばいい」"

[[dialogue]]
speaker = "梨緒"
# 「私も答えられない時があるかもしれない。その時は頼んだぞ」
line = "「私も答えられない時があるかもしれない。その時は頼んだぞ」"

[[dialogue]]
speaker = "ベアトリス"
# 「！　……はいっ」
line = "「！　……はいっ」"

[[dialogue]]
speaker = "ナターシャ"
# 「──あ」
line = "「──あ」"

[[dialogue]]
speaker = "unk"
# 選挙管理委員会がチームとしてまとまり始めたところで、ナターシャの眉がピクリと動いた。
line = "選挙管理委員会がチームとしてまとまり始めたところで、ナターシャの眉がピクリと動いた。"

[[dialogue]]
speaker = "メルエル"
# 「ナターシャちゃーん！　今度のクイズ大会、一緒に出ない？」
line = "「ナターシャちゃーん！　今度のクイズ大会、一緒に出ない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ごめんメルエル、今チーム決まったところだからムリ」
line = "「ごめんメルエル、今チーム決まったところだからムリ」"

[[dialogue]]
speaker = "メルエル"
# 「え～っ、そんな～っ！？」
line = "「え～っ、そんな～っ！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「あはは♪」
line = "「あはは♪」"

[[dialogue]]
speaker = "unk"
# メルエルが驚きの声を上げると、ナターシャが愉快そうに笑う。
line = "メルエルが驚きの声を上げると、ナターシャが愉快そうに笑う。"

[[dialogue]]
speaker = "クロト"
# 「２人は親しいようだけど、知り合い？」
line = "「２人は親しいようだけど、知り合い？」"

[[dialogue]]
speaker = "メルエル"
# 「あっ、会長くんっ！　こ、こんにちはっ」
line = "「あっ、会長くんっ！　こ、こんにちはっ」"

[[dialogue]]
speaker = "unk"
# こちらに気が付いたメルエルは、いそいそと自分の髪の毛を撫でつけたり、身だしなみをチェックするように制服の裾をピッと引っ張ったりしながら、挨拶をした。
line = "こちらに気が付いたメルエルは、いそいそと自分の髪の毛を撫でつけたり、身だしなみをチェックするように制服の裾をピッと引っ張ったりしながら、挨拶をした。"

[[dialogue]]
speaker = "メルエル"
# 「えっとね、前にもお話したかもしれないんだけど、私、天界の聖庭園が地元なの」
line = "「えっとね、前にもお話したかもしれないんだけど、私、天界の聖庭園が地元なの」"

[[dialogue]]
speaker = "メルエル"
# 「だからナターシャちゃんは、あっちの幼なじみなんだっ」
line = "「だからナターシャちゃんは、あっちの幼なじみなんだっ」"

[[dialogue]]
speaker = "ナターシャ"
# 「そ。会長さんからすれば、幼なじみの幼なじみってわけ」
line = "「そ。会長さんからすれば、幼なじみの幼なじみってわけ」"

[[dialogue]]
speaker = "メルエル"
# 「そういえばナターシャちゃん。チームって、誰と組むの？」
line = "「そういえばナターシャちゃん。チームって、誰と組むの？」"

[[dialogue]]
speaker = "ナターシャ"
# 「梨緒とベアトリス。私、選挙管理委員会に入ったから」
line = "「梨緒とベアトリス。私、選挙管理委員会に入ったから」"

[[dialogue]]
speaker = "メルエル"
# 「ええっ！？　そうなの？」
line = "「ええっ！？　そうなの？」"

[[dialogue]]
speaker = "ナターシャ"
# 「私は仕事込みで新星学園に来てるからね。表向きは魔王って悪者でしょ？　だから天界でも一応警戒して監視しようってなったの」
line = "「私は仕事込みで新星学園に来てるからね。表向きは魔王って悪者でしょ？　だから天界でも一応警戒して監視しようってなったの」"

[[dialogue]]
speaker = "ナターシャ"
# 「で、魔王を監視するならちょうどいいってことで選管に入ったんだ」
line = "「で、魔王を監視するならちょうどいいってことで選管に入ったんだ」"

[[dialogue]]
speaker = "メルエル"
# 「会長くんは良い魔王だから、監視なんていらないよっ！」
line = "「会長くんは良い魔王だから、監視なんていらないよっ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「そうであることを確認して、議会に報告するのが、私のお仕事ってこと」
line = "「そうであることを確認して、議会に報告するのが、私のお仕事ってこと」"

[[dialogue]]
speaker = "メルエル"
# 「う～ん、そういうものかぁ……。確かに、自分で見てないものを、勝手に決めつけるわけにはいかないもんね」
line = "「う～ん、そういうものかぁ……。確かに、自分で見てないものを、勝手に決めつけるわけにはいかないもんね」"

[[dialogue]]
speaker = "メルエル"
# 「それにしても、まだ学生なのにもう天界のお仕事を任せられるなんて、さすがナターシャちゃんだね！」
line = "「それにしても、まだ学生なのにもう天界のお仕事を任せられるなんて、さすがナターシャちゃんだね！」"

[[dialogue]]
speaker = "unk"
# うんうん、と幼なじみの活躍を我がことのように喜ぶメルエル。
line = "うんうん、と幼なじみの活躍を我がことのように喜ぶメルエル。"

[[dialogue]]
speaker = "unk"
# だけど……
line = "だけど……"

[[dialogue]]
speaker = "ナターシャ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "メルエル"
# 「？　ナターシャちゃん？」
line = "「？　ナターシャちゃん？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ううん、メルエルは変わらないなーって」
line = "「ううん、メルエルは変わらないなーって」"

[[dialogue]]
speaker = "クロト"
# （今、メルエルに妙な視線を向けていたような……？）
line = "（今、メルエルに妙な視線を向けていたような……？）"

[[dialogue]]
speaker = "unk"
# 幼なじみや友人に向けるのとは違う、まるで見定めるような目。
line = "幼なじみや友人に向けるのとは違う、まるで見定めるような目。"

[[dialogue]]
speaker = "unk"
# 刃のような剣呑さはなくとも、ひやりと胸の奥が冷えるものを感じた。
line = "刃のような剣呑さはなくとも、ひやりと胸の奥が冷えるものを感じた。"

[[dialogue]]
speaker = "クロト"
# （ナターシャが暗殺者だと知ってるから、思い込みでそう感じるのだろうか……？）
line = "（ナターシャが暗殺者だと知ってるから、思い込みでそう感じるのだろうか……？）"

[[dialogue]]
speaker = "ナターシャ"
# 「いや～、会長さんのことは小さい頃からメルエルに聞いてたけど、その彼がまさか私の監視対象になるなんてね」
line = "「いや～、会長さんのことは小さい頃からメルエルに聞いてたけど、その彼がまさか私の監視対象になるなんてね」"

[[dialogue]]
speaker = "メルエル"
# 「ひゃ～っ！？　それは言わないで～！？」
line = "「ひゃ～っ！？　それは言わないで～！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「メルエルの恥ずかしい話、いっぱいしちゃおっかな～♪」
line = "「メルエルの恥ずかしい話、いっぱいしちゃおっかな～♪」"

[[dialogue]]
speaker = "メルエル"
# 「やめて～～～っ」
line = "「やめて～～～っ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ、メルエルとナターシャは仲がいいのね」
line = "「ふふ、メルエルとナターシャは仲がいいのね」"

[[dialogue]]
speaker = "ナターシャ"
# 「そのメルエルもお世話になってる、星徒会とその会長さんだからね」
line = "「そのメルエルもお世話になってる、星徒会とその会長さんだからね」"

[[dialogue]]
speaker = "ナターシャ"
# 「監視っていうのもあくまで一応だよ、一応。天界のお偉いさんには、彼がいい人かどうかなんてわからないから」
line = "「監視っていうのもあくまで一応だよ、一応。天界のお偉いさんには、彼がいい人かどうかなんてわからないから」"

[[dialogue]]
speaker = "ナターシャ"
# 「しばらく会長さんを観察して、怪しいことがなければ、何もありませんでしたって報告して終わり！」
line = "「しばらく会長さんを観察して、怪しいことがなければ、何もありませんでしたって報告して終わり！」"

[[dialogue]]
speaker = "メルエル"
# 「そっか。なら絶対大丈夫だね！　だって相手は会長くんなんだもん」
line = "「そっか。なら絶対大丈夫だね！　だって相手は会長くんなんだもん」"

[[dialogue]]
speaker = "メルエル"
# 「じゃあ梨緒ちゃん……とベアトリスちゃん。ナターシャちゃんをよろしくね」
line = "「じゃあ梨緒ちゃん……とベアトリスちゃん。ナターシャちゃんをよろしくね」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。一緒にクイズ大会で、星徒会に勝ってみせる」
line = "「ああ。一緒にクイズ大会で、星徒会に勝ってみせる」"

[[dialogue]]
speaker = "unk"
# 梨緒の宣言に笑顔でうなずいて、メルエルは去っていった。
line = "梨緒の宣言に笑顔でうなずいて、メルエルは去っていった。"

[[dialogue]]
speaker = "梨緒"
# 「さて、それでは正式に、この３人でクイズ大会に参加する登録を済ませてしまうとするか」
line = "「さて、それでは正式に、この３人でクイズ大会に参加する登録を済ませてしまうとするか」"

[[dialogue]]
speaker = "アポロ"
# 「その登録、ちょっと待ったぁーーー！！」
line = "「その登録、ちょっと待ったぁーーー！！」"

[[dialogue]]
speaker = "アポロ"
# 「待たせたな、梨緒！　あたしも選挙管理委員会に入らせてもらうぜ！」
line = "「待たせたな、梨緒！　あたしも選挙管理委員会に入らせてもらうぜ！」"

[[dialogue]]
speaker = "アポロ"
# 「そんでもって、あたしも一緒にそのクイズ大会に参加させてもらおう！」
line = "「そんでもって、あたしも一緒にそのクイズ大会に参加させてもらおう！」"

[[dialogue]]
speaker = "unk"
# メルエルと入れ違いになるような形で、附属校の制服を着たアポロが俺たちの元に駆け込んできた。
line = "メルエルと入れ違いになるような形で、附属校の制服を着たアポロが俺たちの元に駆け込んできた。"

[[dialogue]]
speaker = "梨緒"
# 「フィオナ……じゃなかった、アポロか。先日のあれは、気まぐれというわけじゃなかったんだな」
line = "「フィオナ……じゃなかった、アポロか。先日のあれは、気まぐれというわけじゃなかったんだな」"

[[dialogue]]
speaker = "アポロ"
# 「もちろんだ！　星見家家族会議も済ませてきたし、ちょっと渋られたが、フィオナからもあたしの活動は正式に認めてもらった！」
line = "「もちろんだ！　星見家家族会議も済ませてきたし、ちょっと渋られたが、フィオナからもあたしの活動は正式に認めてもらった！」"

[[dialogue]]
speaker = "アポロ"
# 「というわけで、梨緒！　あたしもその選挙管理委員会とやらに入らせてもらうぞ！」
line = "「というわけで、梨緒！　あたしもその選挙管理委員会とやらに入らせてもらうぞ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「えっと、附属校の制服を着ている、こちらの方はいったい……」
line = "「えっと、附属校の制服を着ている、こちらの方はいったい……」"

[[dialogue]]
speaker = "ナターシャ"
# 「……星見アポロ。教皇庁である星見家に、養子として迎えられた女の子だね」
line = "「……星見アポロ。教皇庁である星見家に、養子として迎えられた女の子だね」"

[[dialogue]]
speaker = "unk"
# アポロは当然、「長年眠り続けていた星見<ruby=エリシア>フィオナ</ruby>の双子の姉」と名乗るわけにはいかない。
line = "アポロは当然、「長年眠り続けていた星見<ruby>フィオナ<rt>エリシア</rt></ruby>の双子の姉」と名乗るわけにはいかない。"

[[dialogue]]
speaker = "unk"
# 現状は『特別な身分にあるため出自は明かせないが、星見家の一族に迎えられた養子』という扱いになっている。正確ではないが、意外と嘘が少ない肩書だ。
line = "現状は『特別な身分にあるため出自は明かせないが、星見家の一族に迎えられた養子』という扱いになっている。正確ではないが、意外と嘘が少ない肩書だ。"

[[dialogue]]
speaker = "アポロ"
# 「そっちの２人は初めましてだな！　あたしはアポロ。見ての通り流星附属校に通う星騎士だ！」
line = "「そっちの２人は初めましてだな！　あたしはアポロ。見ての通り流星附属校に通う星騎士だ！」"

[[dialogue]]
speaker = "unk"
# そうして、初顔合わせとなるアポロ、ベアトリス、ナターシャの３人はそれぞれ簡単な自己紹介を交わし合った。
line = "そうして、初顔合わせとなるアポロ、ベアトリス、ナターシャの３人はそれぞれ簡単な自己紹介を交わし合った。"

[[dialogue]]
speaker = "アポロ"
# 「どうやらあたしが最後になったみたいだが……改めて、選挙管理委員会への入会を希望するぜ！」
line = "「どうやらあたしが最後になったみたいだが……改めて、選挙管理委員会への入会を希望するぜ！」"

[[dialogue]]
speaker = "アポロ"
# 「ただし、ただの同志としてってわけじゃない。星徒会を監視する選挙管理委員会が暴走しないよう、その活動を中から監視する、『内部監査官』としてだ！」
line = "「ただし、ただの同志としてってわけじゃない。星徒会を監視する選挙管理委員会が暴走しないよう、その活動を中から監視する、『内部監査官』としてだ！」"

[[dialogue]]
speaker = "梨緒"
# 「内部監査官……？」
line = "「内部監査官……？」"

[[dialogue]]
speaker = "アポロ"
# 「へへ～ん、どうだ？　委員長よりも、何やらカッコよさそうな肩書だろう！？　フィオナにそういう役職があるって聞いたんだ！」
line = "「へへ～ん、どうだ？　委員長よりも、何やらカッコよさそうな肩書だろう！？　フィオナにそういう役職があるって聞いたんだ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「た、確かに、組織にはそういった役割の仕事も、あったりしますよね……」
line = "「た、確かに、組織にはそういった役割の仕事も、あったりしますよね……」"

[[dialogue]]
speaker = "ナターシャ"
# 「本来は国際取引をするような企業に必要な役職だよ。普通、選挙管理委員会に付けるようなポジションじゃないけど……まあ言いたいことはわかるかな」
line = "「本来は国際取引をするような企業に必要な役職だよ。普通、選挙管理委員会に付けるようなポジションじゃないけど……まあ言いたいことはわかるかな」"

[[dialogue]]
speaker = "ナターシャ"
# 「選管だけが一方的に監視するのはフェアじゃないから、星徒会の身内を１人、こっちの内部に置けってことでしょ」
line = "「選管だけが一方的に監視するのはフェアじゃないから、星徒会の身内を１人、こっちの内部に置けってことでしょ」"

[[dialogue]]
speaker = "アポロ"
# 「むずかしい話はよくわからんが、まあ、そういうことだ！」
line = "「むずかしい話はよくわからんが、まあ、そういうことだ！」"

[[dialogue]]
speaker = "マトイ"
# 「いや、わかってないんかい」
line = "「いや、わかってないんかい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「むむむっ。内部監査官……中々かっこいい肩書ね。私も負けてられないわ！」
line = "「むむむっ。内部監査官……中々かっこいい肩書ね。私も負けてられないわ！」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナス、話がややこしくなるから、<ruby=わたしたち>新星星徒会</ruby>はちょっと黙ってよっか？」
line = "「ヴィーナス、話がややこしくなるから、<ruby>新星星徒会<rt>わたしたち</rt></ruby>はちょっと黙ってよっか？」"

[[dialogue]]
speaker = "アポロ"
# 「もちろん！　星見家としても魔王の暴走は阻止したい立場だ。だから選管の活動自体は協力するし、あたしは梨緒の仲間になる」
line = "「もちろん！　星見家としても魔王の暴走は阻止したい立場だ。だから選管の活動自体は協力するし、あたしは梨緒の仲間になる」"

[[dialogue]]
speaker = "アポロ"
# 「あたしの目が<ruby=あか>緋</ruby>いうちは、オマエの正気はあたしが保証してやろう！」
line = "「あたしの目が<ruby>緋<rt>あか</rt></ruby>いうちは、オマエの正気はあたしが保証してやろう！」"

[[dialogue]]
speaker = "アポロ"
# 「だから梨緒、あたしをオマエの仲間に入れろ！！」
line = "「だから梨緒、あたしをオマエの仲間に入れろ！！」"

[[dialogue]]
speaker = "梨緒"
# 「！　……わかった。選挙管理委員会は同じ志を持つ者を拒まない」
line = "「！　……わかった。選挙管理委員会は同じ志を持つ者を拒まない」"

[[dialogue]]
speaker = "梨緒"
# 「アポロ……私たちは今から同志だ。よろしく頼む」
line = "「アポロ……私たちは今から同志だ。よろしく頼む」"

[[dialogue]]
speaker = "アポロ"
# 「おう！　正義のヒーローになれるよう、一緒に頑張ろう！」
line = "「おう！　正義のヒーローになれるよう、一緒に頑張ろう！」"

[[dialogue]]
speaker = "梨緒"
# 「ところで……新星学園のオリエンテーションに、附属生は参加できるのか？」
line = "「ところで……新星学園のオリエンテーションに、附属生は参加できるのか？」"

[[dialogue]]
speaker = "アポロ"
# 「魔王！　何とかしてくれ！！」
line = "「魔王！　何とかしてくれ！！」"

[[dialogue]]
speaker = "クロト"
# 「無茶振りすぎる……！」
line = "「無茶振りすぎる……！」"

[[dialogue]]
speaker = "unk"
# その後、あちこちに手を回して『新星学園の委員会である、選挙管理委員会に所属している』という理由付けで、附属生であるアポロのクイズ大会への参加を取り付けた。
line = "その後、あちこちに手を回して『新星学園の委員会である、選挙管理委員会に所属している』という理由付けで、附属生であるアポロのクイズ大会への参加を取り付けた。"

[[dialogue]]
speaker = "unk"
# ちなみに、一部の附属生から「贔屓である」との抗議が殺到したが、今回は封殺させてもらった。
line = "ちなみに、一部の附属生から「贔屓である」との抗議が殺到したが、今回は封殺させてもらった。"

[[dialogue]]
speaker = "unk"
# この行事はあくまでも、新星学園の留学生のためのオリエンテーションである。附属生たちにイベントを乗っ取られてはかなわないのだ。
line = "この行事はあくまでも、新星学園の留学生のためのオリエンテーションである。附属生たちにイベントを乗っ取られてはかなわないのだ。"
