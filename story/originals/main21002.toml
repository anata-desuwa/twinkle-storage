[[dialogue]]
speaker = "unk"
# 第２話,極星星徒会,B
line = "第２話,極星星徒会,B"

[[dialogue]]
speaker = "グリコーン"
# 「クルルルーッ！！」
line = "「クルルルーッ！！」"

[[dialogue]]
speaker = "？？？"
# 「フッ──」
line = "「フッ──」"

[[dialogue]]
speaker = "グリコーン"
# 「クルル！？」
line = "「クルル！？」"

[[dialogue]]
speaker = "unk"
# 紫炎を帯びた斬撃がガーディアンを両断し、残骸が炎に包まれて落下していく。
line = "紫炎を帯びた斬撃がガーディアンを両断し、残骸が炎に包まれて落下していく。"

[[dialogue]]
speaker = "？？？"
# 「まぁこんなものかしら」
line = "「まぁこんなものかしら」"

[[dialogue]]
speaker = "アリコーン"
# 「ヒヒィィン！！」
line = "「ヒヒィィン！！」"

[[dialogue]]
speaker = "unk"
# 天馬のガーディアンが女性に突進を仕掛けるが……
line = "天馬のガーディアンが女性に突進を仕掛けるが……"

[[dialogue]]
speaker = "？？？"
# 「させませんっ！」
line = "「させませんっ！」"

[[dialogue]]
speaker = "unk"
# 茨の鞭がガーディアンの翼を絡め取り、動きを封じる。
line = "茨の鞭がガーディアンの翼を絡め取り、動きを封じる。"

[[dialogue]]
speaker = "？？？"
# 「これで終わりです！」
line = "「これで終わりです！」"

[[dialogue]]
speaker = "unk"
# そして蝶の<ruby=はね>翅</ruby>の騎士がもう一度鞭を振るい、ガーディアンを地面に叩きつける。
line = "そして蝶の<ruby>翅<rt>はね</rt></ruby>の騎士がもう一度鞭を振るい、ガーディアンを地面に叩きつける。"

[[dialogue]]
speaker = "unk"
# 空を駆けていたガーディアンは地に伏し、そのまま動かなくなった。
line = "空を駆けていたガーディアンは地に伏し、そのまま動かなくなった。"

[[dialogue]]
speaker = "unk"
# ここは天界の空、雲の海の中にある女神の神殿。
line = "ここは天界の空、雲の海の中にある女神の神殿。"

[[dialogue]]
speaker = "unk"
# 少女たちに<ruby=ほふ>屠</ruby>られたのは、その神殿を守るガーディアンたちだ。
line = "少女たちに<ruby>屠<rt>ほふ</rt></ruby>られたのは、その神殿を守るガーディアンたちだ。"

[[dialogue]]
speaker = "？？？"
# 「ふぅ──神殿外部を防衛するガーディアンはあらかた片付きましたね！」
line = "「ふぅ──神殿外部を防衛するガーディアンはあらかた片付きましたね！」"

[[dialogue]]
speaker = "？？？"
# 「ええ、今のところは予定どおり。グレイス、怪我はないかしら？」
line = "「ええ、今のところは予定どおり。グレイス、怪我はないかしら？」"

[[dialogue]]
speaker = "グレイス"
# 「もちろんです！　ルヴィの指令はたくさんありますから、こんなところで躓いていられません！」
line = "「もちろんです！　ルヴィの指令はたくさんありますから、こんなところで躓いていられません！」"

[[dialogue]]
speaker = "グレイス"
# 「レティシアも危ない時は私を頼ってください！　ここは敵地ですからね！」
line = "「レティシアも危ない時は私を頼ってください！　ここは敵地ですからね！」"

[[dialogue]]
speaker = "レティシア"
# 「ふふ、頼もしいわね。それじゃあ改めて、作戦の確認をしましょうか？」
line = "「ふふ、頼もしいわね。それじゃあ改めて、作戦の確認をしましょうか？」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　私たちはこれから女神の神殿内部に侵入。神殿の中枢部分を破壊し、機能を停止させます！」
line = "「はい！　私たちはこれから女神の神殿内部に侵入。神殿の中枢部分を破壊し、機能を停止させます！」"

[[dialogue]]
speaker = "グレイス"
# 「そうすると、アルタイルの全ての天使が消滅します。……合ってますよね？」
line = "「そうすると、アルタイルの全ての天使が消滅します。……合ってますよね？」"

[[dialogue]]
speaker = "レティシア"
# 「ええ、大丈夫よ」
line = "「ええ、大丈夫よ」"

[[dialogue]]
speaker = "グレイス"
# 「念のためもう一度聞きますけど……アルタイルにある女神の神殿を破壊しても、レティシアは消えないんですよね？」
line = "「念のためもう一度聞きますけど……アルタイルにある女神の神殿を破壊しても、レティシアは消えないんですよね？」"

[[dialogue]]
speaker = "レティシア"
# 「もちろん。私はデネブの天使だもの。アルタイルの神殿を破壊しても消滅したりしないわ」
line = "「もちろん。私はデネブの天使だもの。アルタイルの神殿を破壊しても消滅したりしないわ」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィから何度も説明は受けたでしょう？　まだ不安なのかしら」
line = "「ルヴィから何度も説明は受けたでしょう？　まだ不安なのかしら」"

[[dialogue]]
speaker = "グレイス"
# 「当然ですっ！　神殿の機能が止まった途端、レティシアがふわーって消えちゃったらイヤです！　泣きますからね、私！」
line = "「当然ですっ！　神殿の機能が止まった途端、レティシアがふわーって消えちゃったらイヤです！　泣きますからね、私！」"

[[dialogue]]
speaker = "レティシア"
# 「グレイスは心配症ね。大丈夫よ。『ベアトとチナを連れ帰れ』というのも、ルヴィの指令の１つだもの」
line = "「グレイスは心配症ね。大丈夫よ。『ベアトとチナを連れ帰れ』というのも、ルヴィの指令の１つだもの」"

[[dialogue]]
speaker = "レティシア"
# 「与えられた指令を果たすまで、私は死なないわ」
line = "「与えられた指令を果たすまで、私は死なないわ」"

[[dialogue]]
speaker = "unk"
# 蝶の翅を持ち、茨の鞭を携えた騎士はグレイス・オベロニア。
line = "蝶の翅を持ち、茨の鞭を携えた騎士はグレイス・オベロニア。"

[[dialogue]]
speaker = "unk"
# 身の丈に届きそうな刀を持ち、妖艶な雰囲気をまとった天使はレティシア・オルティース。
line = "身の丈に届きそうな刀を持ち、妖艶な雰囲気をまとった天使はレティシア・オルティース。"

[[dialogue]]
speaker = "unk"
# ２人とも極星学園星徒会の一員で、星徒会長であるルヴィネから天界襲撃作戦を任されている。
line = "２人とも極星学園星徒会の一員で、星徒会長であるルヴィネから天界襲撃作戦を任されている。"

[[dialogue]]
speaker = "グレイス"
# 「それなら安心ですね──っと。今さらですけど、転送装置。私が持ってていいんでしょうか？」
line = "「それなら安心ですね──っと。今さらですけど、転送装置。私が持ってていいんでしょうか？」"

[[dialogue]]
speaker = "レティシア"
# 「あら、どうして？」
line = "「あら、どうして？」"

[[dialogue]]
speaker = "グレイス"
# 「いや、だってこれ……最後の１個じゃないですか？」
line = "「いや、だってこれ……最後の１個じゃないですか？」"

[[dialogue]]
speaker = "グレイス"
# 「星徒会のみなさん、いつもは壊れたらまずいものは私に預けてくれないのに……いったいどういう風の吹き回しなのかな～と……」
line = "「星徒会のみなさん、いつもは壊れたらまずいものは私に預けてくれないのに……いったいどういう風の吹き回しなのかな～と……」"

[[dialogue]]
speaker = "レティシア"
# 「あなたを信頼しているから預けるのよ」
line = "「あなたを信頼しているから預けるのよ」"

[[dialogue]]
speaker = "グレイス"
# 「ほんとですか！　嬉しいです！」
line = "「ほんとですか！　嬉しいです！」"

[[dialogue]]
speaker = "レティシア"
# 「というのは、実は嘘なの」
line = "「というのは、実は嘘なの」"

[[dialogue]]
speaker = "グレイス"
# 「そんな！　嘘だったのですか！」
line = "「そんな！　嘘だったのですか！」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィからの言いつけよ。転送装置はグレイスに持たせてあげてって」
line = "「ルヴィからの言いつけよ。転送装置はグレイスに持たせてあげてって」"

[[dialogue]]
speaker = "レティシア"
# 「デネブへ帰還するにも、極星従騎を呼び出すにも、転送装置は不可欠でしょう？」
line = "「デネブへ帰還するにも、極星従騎を呼び出すにも、転送装置は不可欠でしょう？」"

[[dialogue]]
speaker = "レティシア"
# 「アルタイルの星騎士と戦う際、強力なサポートになるものだわ。私には必要ないから、大切に使ってちょうだい」
line = "「アルタイルの星騎士と戦う際、強力なサポートになるものだわ。私には必要ないから、大切に使ってちょうだい」"

[[dialogue]]
speaker = "グレイス"
# 「う～、敵地なのに、この余裕の態度……」
line = "「う～、敵地なのに、この余裕の態度……」"

[[dialogue]]
speaker = "レティシア"
# 「私の方が、あなたより強いもの」
line = "「私の方が、あなたより強いもの」"

[[dialogue]]
speaker = "グレイス"
# 「確かにルヴィといい勝負ができるのはレティシアくらいですけれど……悔しいです！　いつか私が勝ちますからね！」
line = "「確かにルヴィといい勝負ができるのはレティシアくらいですけれど……悔しいです！　いつか私が勝ちますからね！」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。楽しみにしているわ。それと転送装置のことだけど、注意事項よ」
line = "「ええ。楽しみにしているわ。それと転送装置のことだけど、注意事項よ」"

[[dialogue]]
speaker = "レティシア"
# 「もし劣勢になったとしても、チナの時のように決して暴走はさせないこと」
line = "「もし劣勢になったとしても、チナの時のように決して暴走はさせないこと」"

[[dialogue]]
speaker = "グレイス"
# 「わかってます。私たちがいない間に、チナが捨て身の作戦を行ったって……ルヴィもチナを１人で行かせたこと、ひどく後悔してましたから……」
line = "「わかってます。私たちがいない間に、チナが捨て身の作戦を行ったって……ルヴィもチナを１人で行かせたこと、ひどく後悔してましたから……」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィが自爆特攻なんて望んでないって、わかってるのならいいわ」
line = "「ルヴィが自爆特攻なんて望んでないって、わかってるのならいいわ」"

[[dialogue]]
speaker = "グレイス"
# 「もちろんです！」
line = "「もちろんです！」"

[[dialogue]]
speaker = "レティシア"
# 「──そういうことを頼むなら、私に頼めばいいのにね」
line = "「──そういうことを頼むなら、私に頼めばいいのにね」"

[[dialogue]]
speaker = "グレイス"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "レティシア"
# 「いいえ、何でも──ともかくルヴィの指令よ。装置の暴走は禁止。危なくなったら撤退を優先。わかったかしら？」
line = "「いいえ、何でも──ともかくルヴィの指令よ。装置の暴走は禁止。危なくなったら撤退を優先。わかったかしら？」"

[[dialogue]]
speaker = "グレイス"
# 「はい、了解です！」
line = "「はい、了解です！」"

[[dialogue]]
speaker = "グレイス"
# 「それにしてもチナが生きてたのは嬉しい報告ですね。アルタイルの人達にどのような扱いを受けているかはわかりませんが……」
line = "「それにしてもチナが生きてたのは嬉しい報告ですね。アルタイルの人達にどのような扱いを受けているかはわかりませんが……」"

[[dialogue]]
speaker = "レティシア"
# 「ルヴィが言うには、魔王クロトの所に捕らえられているみたいね。救出は骨が折れそうだわ」
line = "「ルヴィが言うには、魔王クロトの所に捕らえられているみたいね。救出は骨が折れそうだわ」"

[[dialogue]]
speaker = "グレイス"
# 「ですが見捨てたりできません！　天界襲撃が終わったら、すぐ人間界に向かいましょう！」
line = "「ですが見捨てたりできません！　天界襲撃が終わったら、すぐ人間界に向かいましょう！」"

[[dialogue]]
speaker = "グレイス"
# 「……魔王クロトはひどい人です。チナがどんな目に遭っているか……早く助けだしてあげないと」
line = "「……魔王クロトはひどい人です。チナがどんな目に遭っているか……早く助けだしてあげないと」"

[[dialogue]]
speaker = "レティシア"
# 「そうね。１０年前に、私たちを見捨てた借りも返さないといけないわ」
line = "「そうね。１０年前に、私たちを見捨てた借りも返さないといけないわ」"

[[dialogue]]
speaker = "グレイス"
# 「はい！　行きましょう、レティシ──」
line = "「はい！　行きましょう、レティシ──」"

[[dialogue]]
speaker = "ナターシャ"
# 「とうちゃーく」
line = "「とうちゃーく」"

[[dialogue]]
speaker = "ヴィーナス"
# 「待ちなさーい！　神殿を破壊なんてさせないわ！」
line = "「待ちなさーい！　神殿を破壊なんてさせないわ！」"

[[dialogue]]
speaker = "グレイス"
# 「──！　アルタイルの星騎士……ずいぶん早い到着ですね！？」
line = "「──！　アルタイルの星騎士……ずいぶん早い到着ですね！？」"

[[dialogue]]
speaker = "unk"
# グレイスたちが神殿内部に侵入しようとしたところに、ナターシャたちアルタイルの星騎士たちが駆け付ける。
line = "グレイスたちが神殿内部に侵入しようとしたところに、ナターシャたちアルタイルの星騎士たちが駆け付ける。"

[[dialogue]]
speaker = "unk"
# そしてその中に──
line = "そしてその中に──"

[[dialogue]]
speaker = "ベアトリス"
# 「グレイスちゃん！　レティシアちゃん！」
line = "「グレイスちゃん！　レティシアちゃん！」"

[[dialogue]]
speaker = "グレイス"
# 「ベアト……！？」
line = "「ベアト……！？」"
