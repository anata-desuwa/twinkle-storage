[[dialogue]]
speaker = "unk"
# 第３話,ドーナツ作るぞ！,P
line = "第３話,ドーナツ作るぞ！,P"

[[dialogue]]
speaker = "unk"
# エンジュとメテオラの２人は、自発的にモンスターと戦っていたことが認められ、監視付きなら外出が許されるようになった。
line = "エンジュとメテオラの２人は、自発的にモンスターと戦っていたことが認められ、監視付きなら外出が許されるようになった。"

[[dialogue]]
speaker = "unk"
# のだが──
line = "のだが──"

[[dialogue]]
speaker = "メテオラ"
# 「おー！　魔王、いいとこで会ったな！　ドーナツ作るぞー！」
line = "「おー！　魔王、いいとこで会ったな！　ドーナツ作るぞー！」"

[[dialogue]]
speaker = "unk"
# ドーナツを作る？
line = "ドーナツを作る？"

[[dialogue]]
speaker = "unk"
# 突然だなぁ！
line = "突然だなぁ！"

[[dialogue]]
speaker = "メテオラ"
# 「あたしな、エンジュにドーナツをお腹いっぱい食べさせてあげたいんだ」
line = "「あたしな、エンジュにドーナツをお腹いっぱい食べさせてあげたいんだ」"

[[dialogue]]
speaker = "メテオラ"
# 「でもあたし、ちょっとしかお金持ってないから……そしたらな、いっぱい食べるなら、買うより作る方が安いし簡単って教えてもらったぞ」
line = "「でもあたし、ちょっとしかお金持ってないから……そしたらな、いっぱい食べるなら、買うより作る方が安いし簡単って教えてもらったぞ」"

[[dialogue]]
speaker = "メテオラ"
# 「ドーナツって、ぱてしえじゃなくても作れるんだなー！　だからな、魔王！　いっしょにドーナツ作るぞー！」
line = "「ドーナツって、ぱてしえじゃなくても作れるんだなー！　だからな、魔王！　いっしょにドーナツ作るぞー！」"

[[dialogue]]
speaker = "メテオラ"
# 「ドーナツなー。どーやって作るんだー？　この粉を使うのかー？　ホット、ケーキ、ミックス……？」
line = "「ドーナツなー。どーやって作るんだー？　この粉を使うのかー？　ホット、ケーキ、ミックス……？」"

[[dialogue]]
speaker = "メテオラ"
# 「あははは、あたしが作りたいのは、ホットケーキじゃないぞー？　しっかりしろー」
line = "「あははは、あたしが作りたいのは、ホットケーキじゃないぞー？　しっかりしろー」"

[[dialogue]]
speaker = "unk"
# ホットケーキミックスで簡単に作れるんだよ
line = "ホットケーキミックスで簡単に作れるんだよ"

[[dialogue]]
speaker = "メテオラ"
# 「うーん？　ホットケーキなのにドーナツができるのかー？　不思議だなー」
line = "「うーん？　ホットケーキなのにドーナツができるのかー？　不思議だなー」"

[[dialogue]]
speaker = "unk"
# ホットケーキミックス、卵、牛乳、バターを混ぜ合わせて生地を作り、リング状にして揚げるだけでドーナツのできあがり。
line = "ホットケーキミックス、卵、牛乳、バターを混ぜ合わせて生地を作り、リング状にして揚げるだけでドーナツのできあがり。"

[[dialogue]]
speaker = "unk"
# 説明すれば、たったこれだけのことなのに、ここからが困難の連続だった。
line = "説明すれば、たったこれだけのことなのに、ここからが困難の連続だった。"

[[dialogue]]
speaker = "メテオラ"
# 「卵を割るんだなー？　よーし、あたしに任せろ！　えいっ！」
line = "「卵を割るんだなー？　よーし、あたしに任せろ！　えいっ！」"

[[dialogue]]
speaker = "メテオラ"
# 「ぎゃー！　べちゃべちゃだー！　卵割るのってむつかしーな……」
line = "「ぎゃー！　べちゃべちゃだー！　卵割るのってむつかしーな……」"

[[dialogue]]
speaker = "メテオラ"
# 「牛乳を入れるのか？　えいっ！　うわー！　あふれちゃったぞー！」
line = "「牛乳を入れるのか？　えいっ！　うわー！　あふれちゃったぞー！」"

[[dialogue]]
speaker = "メテオラ"
# 「ゆっくり混ぜるんだな？　がしゃがしゃがしゃ！　わー！　またべちゃべちゃだぞー！？」
line = "「ゆっくり混ぜるんだな？　がしゃがしゃがしゃ！　わー！　またべちゃべちゃだぞー！？」"

[[dialogue]]
speaker = "unk"
# 力が有り余っているメテオラが何かする度に、キッチンは汚れていくが、それもまぁ想定内。
line = "力が有り余っているメテオラが何かする度に、キッチンは汚れていくが、それもまぁ想定内。"

[[dialogue]]
speaker = "メテオラ"
# 「おー？　白くて、ぶにゅぶにゅのができたなー……こんなのがドーナツになるのか？　魔王、あたしを騙してないか？」
line = "「おー？　白くて、ぶにゅぶにゅのができたなー……こんなのがドーナツになるのか？　魔王、あたしを騙してないか？」"

[[dialogue]]
speaker = "メテオラ"
# 「ふんふん……生地を丸めて、真ん中をくり抜く……と」
line = "「ふんふん……生地を丸めて、真ん中をくり抜く……と」"

[[dialogue]]
speaker = "メテオラ"
# 「輪っかになったぞー！　ドーナツだー！　くんくん、甘い匂いがするぞ……うまそうな匂い……まだ食べちゃダメかー？」
line = "「輪っかになったぞー！　ドーナツだー！　くんくん、甘い匂いがするぞ……うまそうな匂い……まだ食べちゃダメかー？」"

[[dialogue]]
speaker = "unk"
# 揚げたら完成だから、いい子に待ってね
line = "揚げたら完成だから、いい子に待ってね"

[[dialogue]]
speaker = "unk"
# 生で食べたらお腹壊すよ！
line = "生で食べたらお腹壊すよ！"

[[dialogue]]
speaker = "メテオラ"
# 「待つぞー。あたしはいい子だからなー。じゅわじゅわじゅわ……♪　はー、いい匂いだなー……魔王はぱてしえだったんだなー」
line = "「待つぞー。あたしはいい子だからなー。じゅわじゅわじゅわ……♪　はー、いい匂いだなー……魔王はぱてしえだったんだなー」"

[[dialogue]]
speaker = "メテオラ"
# 「あたし、いつもエンジュにめいわくかけてるからなー。おんがえししたいんだぞ」
line = "「あたし、いつもエンジュにめいわくかけてるからなー。おんがえししたいんだぞ」"

[[dialogue]]
speaker = "メテオラ"
# 「エンジュ、ドーナツ食べてる時はニコニコになるんだ。すごくかわいいんだぞ」
line = "「エンジュ、ドーナツ食べてる時はニコニコになるんだ。すごくかわいいんだぞ」"

[[dialogue]]
speaker = "メテオラ"
# 「あたしはニコニコしてるエンジュが好きなんだー。プンプンばっかじゃなくて、ニコニコしてればいいのになー」
line = "「あたしはニコニコしてるエンジュが好きなんだー。プンプンばっかじゃなくて、ニコニコしてればいいのになー」"

[[dialogue]]
speaker = "unk"
# はい、揚がったよ
line = "はい、揚がったよ"

[[dialogue]]
speaker = "unk"
# ドーナツを食べれば、ニコニコになるね
line = "ドーナツを食べれば、ニコニコになるね"

[[dialogue]]
speaker = "メテオラ"
# 「うおーー！　ドーナツだーーーっ！　ホントにドーナツになったぞー！？　すげーーーっ！」
line = "「うおーー！　ドーナツだーーーっ！　ホントにドーナツになったぞー！？　すげーーーっ！」"

[[dialogue]]
speaker = "メテオラ"
# 「揚げたてでアチアチだー……えっ、食べていいのか？　エンジュの分、なくなんないな？　ホントに食べちゃうぞ？」
line = "「揚げたてでアチアチだー……えっ、食べていいのか？　エンジュの分、なくなんないな？　ホントに食べちゃうぞ？」"

[[dialogue]]
speaker = "メテオラ"
# 「ぱくっ、あちちち……んんーっ！　うめーっ！　なんだ、これはーっ！　魔王のドーナツ、今まで食べたドーナツで一番うめーぞ！　魔王すげーな！」
line = "「ぱくっ、あちちち……んんーっ！　うめーっ！　なんだ、これはーっ！　魔王のドーナツ、今まで食べたドーナツで一番うめーぞ！　魔王すげーな！」"

[[dialogue]]
speaker = "unk"
# 俺とメテオラが一緒に作ったドーナツ、だよ
line = "俺とメテオラが一緒に作ったドーナツ、だよ"

[[dialogue]]
speaker = "unk"
# 俺だけじゃないよ
line = "俺だけじゃないよ"

[[dialogue]]
speaker = "メテオラ"
# 「そうだ、あたしも作った！　あたしもすげーんだな！？　エンジュ、喜んでくれるかなー、えへへへ」
line = "「そうだ、あたしも作った！　あたしもすげーんだな！？　エンジュ、喜んでくれるかなー、えへへへ」"

[[dialogue]]
speaker = "メテオラ"
# 「おーい、エンジュー」
line = "「おーい、エンジュー」"

[[dialogue]]
speaker = "エンジュ"
# 「どうした、メテオラ……ん？　魔王も一緒なのか。何の用だ」
line = "「どうした、メテオラ……ん？　魔王も一緒なのか。何の用だ」"

[[dialogue]]
speaker = "メテオラ"
# 「はい、エンジュ！　ドーナツのプレゼントだ！　たっぷりだぞ！」
line = "「はい、エンジュ！　ドーナツのプレゼントだ！　たっぷりだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「ドーナツ……？　この袋に入ってるの全部、ドーナツなのか！？　こんなにたくさんどうしたんだ！？」
line = "「ドーナツ……？　この袋に入ってるの全部、ドーナツなのか！？　こんなにたくさんどうしたんだ！？」"

[[dialogue]]
speaker = "メテオラ"
# 「作ったんだぞ！」
line = "「作ったんだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「メテオラが！？　ドーナツを！？　作れたのか？」
line = "「メテオラが！？　ドーナツを！？　作れたのか？」"

[[dialogue]]
speaker = "メテオラ"
# 「魔王と一緒にな！」
line = "「魔王と一緒にな！」"

[[dialogue]]
speaker = "エンジュ"
# 「どうせ魔王がほとんど作ったんだろうが、匂いは美味そうだな……。本当に食べても大丈夫か？　毒なんか入れてないだろうな？」
line = "「どうせ魔王がほとんど作ったんだろうが、匂いは美味そうだな……。本当に食べても大丈夫か？　毒なんか入れてないだろうな？」"

[[dialogue]]
speaker = "メテオラ"
# 「あたし、試食した！　チョーうまかったぞ！」
line = "「あたし、試食した！　チョーうまかったぞ！」"

[[dialogue]]
speaker = "unk"
# 心配なら一緒に食べる？
line = "心配なら一緒に食べる？"

[[dialogue]]
speaker = "unk"
# 味は保障するよ
line = "味は保障するよ"

[[dialogue]]
speaker = "エンジュ"
# 「誰がお前なんかと一緒に……だけどこの香ばしい匂い……嗅げば嗅ぐほど、お腹が減って……くそっ、我慢できない……！　ぱくっ！」
line = "「誰がお前なんかと一緒に……だけどこの香ばしい匂い……嗅げば嗅ぐほど、お腹が減って……くそっ、我慢できない……！　ぱくっ！」"

[[dialogue]]
speaker = "メテオラ"
# 「どうだ？　美味いか？　美味いだろー？」
line = "「どうだ？　美味いか？　美味いだろー？」"

[[dialogue]]
speaker = "エンジュ"
# 「ん～～～っ！？　美味し～～いっ！　外はサクっとしてるのに中はしっとりで……甘さも甘すぎなくて、絶妙だ」
line = "「ん～～～っ！？　美味し～～いっ！　外はサクっとしてるのに中はしっとりで……甘さも甘すぎなくて、絶妙だ」"

[[dialogue]]
speaker = "メテオラ"
# 「だろー！？　エンジュが好きな味はおみとーしなんだぞ！」
line = "「だろー！？　エンジュが好きな味はおみとーしなんだぞ！」"

[[dialogue]]
speaker = "エンジュ"
# 「それにしても、いったいいくつ作ったんだ……１０個や２０個どころじゃないぞ……」
line = "「それにしても、いったいいくつ作ったんだ……１０個や２０個どころじゃないぞ……」"

[[dialogue]]
speaker = "メテオラ"
# 「１００個！　エンジュにお腹いっぱい食べてほしいからな！」
line = "「１００個！　エンジュにお腹いっぱい食べてほしいからな！」"

[[dialogue]]
speaker = "エンジュ"
# 「いくらあたしでも１００個は食べきれそうにないな。一緒に食べるか、メテオラ。……魔王は来るなよ」
line = "「いくらあたしでも１００個は食べきれそうにないな。一緒に食べるか、メテオラ。……魔王は来るなよ」"

[[dialogue]]
speaker = "メテオラ"
# 「えー、一緒に食べた方が美味いのに……エンジュ、イジワルだなー」
line = "「えー、一緒に食べた方が美味いのに……エンジュ、イジワルだなー」"

[[dialogue]]
speaker = "エンジュ"
# 「うるさい。魔王にやるドーナツはないんだよ」
line = "「うるさい。魔王にやるドーナツはないんだよ」"

[[dialogue]]
speaker = "unk"
# おふたりでごゆっくり
line = "おふたりでごゆっくり"

[[dialogue]]
speaker = "unk"
# 大事そうにドーナツを抱えながら去ってく２人の背中を見送るのは、ちょっと寂しかったけれども。
line = "大事そうにドーナツを抱えながら去ってく２人の背中を見送るのは、ちょっと寂しかったけれども。"

[[dialogue]]
speaker = "メテオラ"
# 「えへへへへ♪　魔王、あーりがーとなー！」
line = "「えへへへへ♪　魔王、あーりがーとなー！」"

[[dialogue]]
speaker = "unk"
# メテオラの満面の笑みは、そんな寂しさも帳消しにしてくれたのだった。
line = "メテオラの満面の笑みは、そんな寂しさも帳消しにしてくれたのだった。"
