[[dialogue]]
speaker = "unk"
# 第４話,煩悩と甘い休日,P
line = "第４話,煩悩と甘い休日,P"

[[dialogue]]
speaker = "unk"
# その日は休日で、恋人のマトイが家に遊びにやって来ていた――
line = "その日は休日で、恋人のマトイが家に遊びにやって来ていた――"

[[dialogue]]
speaker = "マトイ"
# 「会長、あのね？　今日なんだけど……」
line = "「会長、あのね？　今日なんだけど……」"

[[dialogue]]
speaker = "マトイ"
# 「巫女フォームの修行がしたいな～って、思ってて……」
line = "「巫女フォームの修行がしたいな～って、思ってて……」"

[[dialogue]]
speaker = "unk"
# 巫女フォームの修業？
line = "巫女フォームの修業？"

[[dialogue]]
speaker = "マトイ"
# 「えっとね……『煩悩全開で、本当にしたいイチャイチャを口に出す』っていう……」
line = "「えっとね……『煩悩全開で、本当にしたいイチャイチャを口に出す』っていう……」"

[[dialogue]]
speaker = "unk"
# ミヤハルから前に聞いた話では、巫女の力を使いこなすには煩悩を解放し、それと向き合う必要があるという。
line = "ミヤハルから前に聞いた話では、巫女の力を使いこなすには煩悩を解放し、それと向き合う必要があるという。"

[[dialogue]]
speaker = "マトイ"
# 「た、例えば……創作とかに出て来るような、『だいしゅきホールド』ってやつとか……」
line = "「た、例えば……創作とかに出て来るような、『だいしゅきホールド』ってやつとか……」"

[[dialogue]]
speaker = "unk"
# おそらく、修行というのは建前だろう。しかし、それをわざわざ指摘するのは野暮というものだ。
line = "おそらく、修行というのは建前だろう。しかし、それをわざわざ指摘するのは野暮というものだ。"

[[dialogue]]
speaker = "マトイ"
# 「――いいの？　えへへ<emoji=heart04>　ありがとっ<emoji=heart04>」
line = "「――いいの？　えへへ<emoji=heart04>　ありがとっ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「じゃあ～……しちゃう、ね？」
line = "「じゃあ～……しちゃう、ね？」"

[[dialogue]]
speaker = "unk"
# ソファーに腰かけている俺と向かい合うように、膝の上に乗っかって来るマトイ。
line = "ソファーに腰かけている俺と向かい合うように、膝の上に乗っかって来るマトイ。"

[[dialogue]]
speaker = "マトイ"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の背中に両手と両足を回して来て、『だいしゅきホールド』をする。
line = "俺の背中に両手と両足を回して来て、『だいしゅきホールド』をする。"

[[dialogue]]
speaker = "マトイ"
# 「はぁっ、あぁぁ……っ<emoji=heart04>　こ、これ、密着感がすごいね<emoji=heart04>　体の全部が、会長とくっ付いちゃってる、みたいな……<emoji=heart04>」
line = "「はぁっ、あぁぁ……っ<emoji=heart04>　こ、これ、密着感がすごいね<emoji=heart04>　体の全部が、会長とくっ付いちゃってる、みたいな……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「会長、あのね……？　このまま、背中撫でて欲しい……<emoji=heart04>」
line = "「会長、あのね……？　このまま、背中撫でて欲しい……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう口にするマトイの要望に応えて、俺は彼女の背中を優しく撫でる。
line = "そう口にするマトイの要望に応えて、俺は彼女の背中を優しく撫でる。"

[[dialogue]]
speaker = "マトイ"
# 「はあぁ<emoji=heart04>　んんんぅ……<emoji=heart04>　それで、この間みたいに、耳元で愛を囁いて欲しい……な、なんちゃってっ」
line = "「はあぁ<emoji=heart04>　んんんぅ……<emoji=heart04>　それで、この間みたいに、耳元で愛を囁いて欲しい……な、なんちゃってっ」"

[[dialogue]]
speaker = "unk"
# マトイ、好きだ。愛してる
line = "マトイ、好きだ。愛してる"

[[dialogue]]
speaker = "マトイ"
# 「ふあぁあぁ～～っ<emoji=heart04>　わ、私もぉ……<emoji=heart04>」
line = "「ふあぁあぁ～～っ<emoji=heart04>　わ、私もぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「会長のこと、大好き……<emoji=heart04>」
line = "「会長のこと、大好き……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「ね、ねぇ、会長……<emoji=heart04>　次は――」
line = "「ね、ねぇ、会長……<emoji=heart04>　次は――」"

[[dialogue]]
speaker = "マトイ"
# 「キス……して欲しい<emoji=heart04>」
line = "「キス……して欲しい<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「あっ<emoji=heart04>　んんっ……<emoji=heart04>」
line = "「あっ<emoji=heart04>　んんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マトイの唇を奪い、キスをする。
line = "マトイの唇を奪い、キスをする。"

[[dialogue]]
speaker = "マトイ"
# 「ちゅっ……ちゅっ<emoji=heart04>　んちゅっ……<emoji=heart04>」
line = "「ちゅっ……ちゅっ<emoji=heart04>　んちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「んっ――はあぁ<emoji=heart04>　この抱き着き方でキスすると、すごい幸せな気分になっちゃう……<emoji=heart04>」
line = "「んっ――はあぁ<emoji=heart04>　この抱き着き方でキスすると、すごい幸せな気分になっちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺も煩悩を口にしてもいい？
line = "俺も煩悩を口にしてもいい？"

[[dialogue]]
speaker = "マトイ"
# 「会長も……？　――うん、もちろん<emoji=heart04>」
line = "「会長も……？　――うん、もちろん<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「会長のしたいこと、私もしてあげたいから……教えて<emoji=heart04>」
line = "「会長のしたいこと、私もしてあげたいから……教えて<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 将来、俺と結婚して欲しい
line = "将来、俺と結婚して欲しい"

[[dialogue]]
speaker = "マトイ"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "マトイ"
# 「ちょっ、それって……えぇっ！？」
line = "「ちょっ、それって……えぇっ！？」"

[[dialogue]]
speaker = "マトイ"
# 「――これは煩悩全開でしたいことを口にする修業だから？」
line = "「――これは煩悩全開でしたいことを口にする修業だから？」"

[[dialogue]]
speaker = "マトイ"
# 「た、確かにそうなんだけど……うぅっ、そこまでは予想してなかったよぉ……！」
line = "「た、確かにそうなんだけど……うぅっ、そこまでは予想してなかったよぉ……！」"

[[dialogue]]
speaker = "unk"
# こういう煩悩はダメだった？
line = "こういう煩悩はダメだった？"

[[dialogue]]
speaker = "マトイ"
# 「う、ううん。私が最初に言い出したんだもんね……」
line = "「う、ううん。私が最初に言い出したんだもんね……」"

[[dialogue]]
speaker = "マトイ"
# 「それに、私たちは恋人だし、これは普通にイチャイチャしてるだけなんだし……」
line = "「それに、私たちは恋人だし、これは普通にイチャイチャしてるだけなんだし……」"

[[dialogue]]
speaker = "マトイ"
# 「すー……はー……！」
line = "「すー……はー……！」"

[[dialogue]]
speaker = "マトイ"
# 「そ、その……」
line = "「そ、その……」"

[[dialogue]]
speaker = "マトイ"
# 「不束者ですが……末永く、よろしくお願いします<emoji=heart04>」
line = "「不束者ですが……末永く、よろしくお願いします<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マトイ！
line = "マトイ！"

[[dialogue]]
speaker = "unk"
# 愛おしさが抑え切れずに、俺は再び彼女を抱き締める。
line = "愛おしさが抑え切れずに、俺は再び彼女を抱き締める。"

[[dialogue]]
speaker = "マトイ"
# 「あっ<emoji=heart04>　会長……<emoji=heart04>」
line = "「あっ<emoji=heart04>　会長……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「――また、キスしたいの？　うん……私も<emoji=heart04>」
line = "「――また、キスしたいの？　うん……私も<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「んっ……<emoji=heart04>　ちゅっ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺たちはそれからも、お互いにしたい煩悩を口にしながら、とても甘い休日を過ごすのであった――
line = "俺たちはそれからも、お互いにしたい煩悩を口にしながら、とても甘い休日を過ごすのであった――"
