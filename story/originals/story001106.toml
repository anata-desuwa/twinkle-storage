[[dialogue]]
speaker = "シアン"
# 「はぁ、はぁ……手応えはあったんだが……<ruby=やっこ>奴</ruby>さんはこの通りか」
line = "「はぁ、はぁ……手応えはあったんだが……<ruby>奴<rt>やっこ</rt></ruby>さんはこの通りか」"

[[dialogue]]
speaker = "ヴァレリー"
# 「いい攻撃でした。コラプサーの力で威力を軽減していなければ、とっくに倒れていたでしょう」
line = "「いい攻撃でした。コラプサーの力で威力を軽減していなければ、とっくに倒れていたでしょう」"

[[dialogue]]
speaker = "ヴァレリー"
# 「もちろん私のダメージはゼロではありませんが……美しい星術で受けた傷は、とても甘美な痛みです」
line = "「もちろん私のダメージはゼロではありませんが……美しい星術で受けた傷は、とても甘美な痛みです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「若き戦士たちが己の命と青春を賭し、世界を守るために戦う……なんと美しい志でしょう。星騎士の名の通り、まさしく星のような輝きだ」
line = "「若き戦士たちが己の命と青春を賭し、世界を守るために戦う……なんと美しい志でしょう。星騎士の名の通り、まさしく星のような輝きだ」"

[[dialogue]]
speaker = "シアン"
# 「そう思うならなんであたしらの邪魔すんだよ。世界を滅ぼしてえのか？」
line = "「そう思うならなんであたしらの邪魔すんだよ。世界を滅ぼしてえのか？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私の抑えようがない<ruby=さが>性</ruby>なのですよ。世界に滅んでほしいわけではないのですが……」
line = "「私の抑えようがない<ruby>性<rt>さが</rt></ruby>なのですよ。世界に滅んでほしいわけではないのですが……」"

[[dialogue]]
speaker = "ヴァレリー"
# 「いえ。せっかく３０００年に一度の機会に巡り合わせたのですから……この美しい世界が滅びゆくさまを眺めるのもまた一興ですね」
line = "「いえ。せっかく３０００年に一度の機会に巡り合わせたのですから……この美しい世界が滅びゆくさまを眺めるのもまた一興ですね」"

[[dialogue]]
speaker = "シアン"
# 「狂ってやがる……！」
line = "「狂ってやがる……！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「自覚はあります。ですが快楽というものは目覚めるとなかなかやめられないものでして」
line = "「自覚はあります。ですが快楽というものは目覚めるとなかなかやめられないものでして」"

[[dialogue]]
speaker = "ヴァレリー"
# 「では世界の破滅より先に──目の前の可憐な花を手折るとしましょう」
line = "「では世界の破滅より先に──目の前の可憐な花を手折るとしましょう」"

[[dialogue]]
speaker = "シアン"
# 「あいつの剣に力が収束している──！？　まさかあの技は──」
line = "「あいつの剣に力が収束している──！？　まさかあの技は──」"

[[dialogue]]
speaker = "ヴァレリー"
# 「サヴェージ・ヴァンダ──」
line = "「サヴェージ・ヴァンダ──」"

[[dialogue]]
speaker = "ヴァレリー"
# 「！　また邪魔されてしまいましたか。目の前にばかり夢中になってしまうのは悪い癖ですね」
line = "「！　また邪魔されてしまいましたか。目の前にばかり夢中になってしまうのは悪い癖ですね」"

[[dialogue]]
speaker = "シアン"
# 「ったく、遅いぞ会長さん」
line = "「ったく、遅いぞ会長さん」"

[[dialogue]]
speaker = "unk"
# 遅れてすみません
line = "遅れてすみません"

[[dialogue]]
speaker = "ヴァレリー"
# 「あなたが新星の星徒会長さんですね。前会長ヴィーナスさんを破ったというその力……ぜひ拝見したい！」
line = "「あなたが新星の星徒会長さんですね。前会長ヴィーナスさんを破ったというその力……ぜひ拝見したい！」"

[[dialogue]]
speaker = "？？？"
# 「主様だけではござりませぬ！」
line = "「主様だけではござりませぬ！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "せつな"
# 「九浄家メイド隊・せつな、ここに推参つかまつりまする！」
line = "「九浄家メイド隊・せつな、ここに推参つかまつりまする！」"

[[dialogue]]
speaker = "セナリィ"
# 「<ruby=わたくし>私</ruby>もおりましてよ！」
line = "「<ruby>私<rt>わたくし</rt></ruby>もおりましてよ！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「<ruby=しおう>紫桜</ruby>の里の忍びに、傭兵バンデット・セナリィ……フフフ、楽しくなってきましたね」
line = "「<ruby>紫桜<rt>しおう</rt></ruby>の里の忍びに、傭兵バンデット・セナリィ……フフフ、楽しくなってきましたね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　こっちの仕事が早く終わったから来ちゃった♪」
line = "「にひひ♪　こっちの仕事が早く終わったから来ちゃった♪」"

[[dialogue]]
speaker = "シアン"
# 「なんだ、遅刻組勢ぞろいかよ。どうせ来るなら早く来いっての」
line = "「なんだ、遅刻組勢ぞろいかよ。どうせ来るなら早く来いっての」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「またまた、嬉しいくせに♪　先輩ってば素直じゃないんだから」
line = "「またまた、嬉しいくせに♪　先輩ってば素直じゃないんだから」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ですが多勢に無勢という言葉があります。ここは一旦退かせていただきます」
line = "「ですが多勢に無勢という言葉があります。ここは一旦退かせていただきます」"

[[dialogue]]
speaker = "セナリィ"
# 「ちょっと！　ここで逃げるんですの！？」
line = "「ちょっと！　ここで逃げるんですの！？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ええ、逃げますよ。私も用事があったのを思い出したもので」
line = "「ええ、逃げますよ。私も用事があったのを思い出したもので」"

[[dialogue]]
speaker = "シアン"
# 「チッ、ほんとに逃げやがった……」
line = "「チッ、ほんとに逃げやがった……」"

[[dialogue]]
speaker = "せつな"
# 「ですがこれで一段落──」
line = "「ですがこれで一段落──」"

[[dialogue]]
speaker = "蛍火"
# 「すみません、私はここまでのようです……」
line = "「すみません、私はここまでのようです……」"

[[dialogue]]
speaker = "せつな"
# 「蛍火殿！？」
line = "「蛍火殿！？」"

[[dialogue]]
speaker = "シアン"
# 「蛍火のやつ、意識はあるがけっこう重傷だ。復帰するまでしばらくかかるだろう」
line = "「蛍火のやつ、意識はあるがけっこう重傷だ。復帰するまでしばらくかかるだろう」"

[[dialogue]]
speaker = "シアン"
# 「あたしが来るまでもずいぶん持ちこたえてくれたからな。さすがは元星徒会役員だぜ」
line = "「あたしが来るまでもずいぶん持ちこたえてくれたからな。さすがは元星徒会役員だぜ」"

[[dialogue]]
speaker = "unk"
# 俺がもっと早く駆けつけていれば……
line = "俺がもっと早く駆けつけていれば……"

[[dialogue]]
speaker = "シアン"
# 「それを言ったらキリがねえ。たらればの話より、今はコラプサーをどうするかだ」
line = "「それを言ったらキリがねえ。たらればの話より、今はコラプサーをどうするかだ」"

[[dialogue]]
speaker = "シアン"
# 「それに蛍火は、後は頼むって言ってたんだ。ここでやらなきゃ男が廃るぞ」
line = "「それに蛍火は、後は頼むって言ってたんだ。ここでやらなきゃ男が廃るぞ」"

[[dialogue]]
speaker = "シアン"
# 「んじゃ──面子が揃ったところで情報の整理といくか。蛍火から聞いたが、あいつはヴァレリー・スチュアート。見ての通りコラプサーの一員だ」
line = "「んじゃ──面子が揃ったところで情報の整理といくか。蛍火から聞いたが、あいつはヴァレリー・スチュアート。見ての通りコラプサーの一員だ」"

[[dialogue]]
speaker = "unk"
# 新しいコラプサー……
line = "新しいコラプサー……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やっぱり以前現れたキサナだけじゃなかったんだ。あんなのが何人もいると思うとぞっとしないね」
line = "「やっぱり以前現れたキサナだけじゃなかったんだ。あんなのが何人もいると思うとぞっとしないね」"

[[dialogue]]
speaker = "セナリィ"
# 「星力を無効化し、元星徒会役員である東雲蛍火様を下すほどの難敵……。ですがその分、討伐に成功すれば報酬は弾んでいただけるのですわよね！？」
line = "「星力を無効化し、元星徒会役員である東雲蛍火様を下すほどの難敵……。ですがその分、討伐に成功すれば報酬は弾んでいただけるのですわよね！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もち。こんだけ出すよ」
line = "「もち。こんだけ出すよ」"

[[dialogue]]
speaker = "セナリィ"
# 「んなっ！？　これだけあればゴールデングースの事務所も豪華ジャグジー付きですわ！？」
line = "「んなっ！？　これだけあればゴールデングースの事務所も豪華ジャグジー付きですわ！？」"

[[dialogue]]
speaker = "せつな"
# 「セナリィ殿は相変わらずでござるな」
line = "「セナリィ殿は相変わらずでござるな」"

[[dialogue]]
speaker = "シアン"
# 「倒せればの話だけどな。タヌキの皮算用の前に、どう仕留めるか考えろ」
line = "「倒せればの話だけどな。タヌキの皮算用の前に、どう仕留めるか考えろ」"

[[dialogue]]
speaker = "unk"
# ところで気になったことがあったんですが
line = "ところで気になったことがあったんですが"

[[dialogue]]
speaker = "せつな"
# 「そうでござった。シアン殿はヴァレリーの攻撃に反応していたようでござったが……」
line = "「そうでござった。シアン殿はヴァレリーの攻撃に反応していたようでござったが……」"

[[dialogue]]
speaker = "シアン"
# 「ああ。あたしはあいつを知っている──」
line = "「ああ。あたしはあいつを知っている──」"
