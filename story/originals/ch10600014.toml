[[dialogue]]
speaker = "unk"
# 第４話,アイドルの恋愛練習,P
line = "第４話,アイドルの恋愛練習,P"

[[dialogue]]
speaker = "unk"
# レミカの現プロデューサーが、実は俺が以前やっていたバイト――アイドルのアシスタントマネージャーをした際にお世話になった人だった。
line = "レミカの現プロデューサーが、実は俺が以前やっていたバイト――アイドルのアシスタントマネージャーをした際にお世話になった人だった。"

[[dialogue]]
speaker = "unk"
# その伝手で、俺は１日だけレミカの代理プロデューサーを任されることになり、仕事は無事終わったのだが――
line = "その伝手で、俺は１日だけレミカの代理プロデューサーを任されることになり、仕事は無事終わったのだが――"

[[dialogue]]
speaker = "レミカ"
# 「会長、１日プロデューサーお疲れ様。凄い手際が良くて、助かったよ」
line = "「会長、１日プロデューサーお疲れ様。凄い手際が良くて、助かったよ」"

[[dialogue]]
speaker = "レミカ"
# 「おかげで映画のプロモーション撮影、パーフェクトな出来だったと思う」
line = "「おかげで映画のプロモーション撮影、パーフェクトな出来だったと思う」"

[[dialogue]]
speaker = "unk"
# 学園で撮影するなんて思わなかったな
line = "学園で撮影するなんて思わなかったな"

[[dialogue]]
speaker = "レミカ"
# 「映画の原作が少女漫画なのと、私が通っている場所でちょうどいいって理由らしいよ」
line = "「映画の原作が少女漫画なのと、私が通っている場所でちょうどいいって理由らしいよ」"

[[dialogue]]
speaker = "レミカ"
# 「――ん？　なに、会長？　聞きたいことがあるって……」
line = "「――ん？　なに、会長？　聞きたいことがあるって……」"

[[dialogue]]
speaker = "unk"
# レミカ、ひょっとして何か悩んでる？
line = "レミカ、ひょっとして何か悩んでる？"

[[dialogue]]
speaker = "レミカ"
# 「え？　どうしてそんなこと――今日１日仕事を見てて、何だか不安そうに感じた？」
line = "「え？　どうしてそんなこと――今日１日仕事を見てて、何だか不安そうに感じた？」"

[[dialogue]]
speaker = "レミカ"
# 「そっか……会長には分かっちゃうんだ……」
line = "「そっか……会長には分かっちゃうんだ……」"

[[dialogue]]
speaker = "レミカ"
# 「今度の映画、原作が少女漫画じゃない？　だからさ、やっぱり主人公の女の子と男の子の恋愛が、ストーリーのメインになってくるんだよね」
line = "「今度の映画、原作が少女漫画じゃない？　だからさ、やっぱり主人公の女の子と男の子の恋愛が、ストーリーのメインになってくるんだよね」"

[[dialogue]]
speaker = "レミカ"
# 「でも私、恋愛経験は１度もないし……それどころか正直、これまで特定の男の子に恋愛感情を持ったことなんてなくて……」
line = "「でも私、恋愛経験は１度もないし……それどころか正直、これまで特定の男の子に恋愛感情を持ったことなんてなくて……」"

[[dialogue]]
speaker = "レミカ"
# 「情けない話だけど、恋愛ってものが全然ピンと来ないんだ」
line = "「情けない話だけど、恋愛ってものが全然ピンと来ないんだ」"

[[dialogue]]
speaker = "レミカ"
# 「それでも、私が主人公のイメージに合うからって、熱心にオファーしてくれた仕事だし……できる限り、その期待に応えたいと思ってて」
line = "「それでも、私が主人公のイメージに合うからって、熱心にオファーしてくれた仕事だし……できる限り、その期待に応えたいと思ってて」"

[[dialogue]]
speaker = "unk"
# 俺でよければ、何でも相談に乗る
line = "俺でよければ、何でも相談に乗る"

[[dialogue]]
speaker = "レミカ"
# 「ありがと、会長。どうにかして、恋愛の感覚を掴む方法を考えてるんだけど……そうだ」
line = "「ありがと、会長。どうにかして、恋愛の感覚を掴む方法を考えてるんだけど……そうだ」"

[[dialogue]]
speaker = "レミカ"
# 「会長はこの後、まだ時間ある？　せっかくだし、こんなこと会長以外には頼めないから――」
line = "「会長はこの後、まだ時間ある？　せっかくだし、こんなこと会長以外には頼めないから――」"

[[dialogue]]
speaker = "レミカ"
# 「私とデート、してくれない？」
line = "「私とデート、してくれない？」"

[[dialogue]]
speaker = "レミカ"
# 「い、いや、まあ、あくまで恋愛イメージを得る為の練習だけど。アイドルとして、仕事に必要なレッスンとして……」
line = "「い、いや、まあ、あくまで恋愛イメージを得る為の練習だけど。アイドルとして、仕事に必要なレッスンとして……」"

[[dialogue]]
speaker = "レミカ"
# 「――いいの？　そ、それなら……えっと。まずは……手を繋いで、歩く練習をしたい、かな」
line = "「――いいの？　そ、それなら……えっと。まずは……手を繋いで、歩く練習をしたい、かな」"

[[dialogue]]
speaker = "レミカ"
# 「……よし。じゃあ会長、手を出して……繋ぐよ。ん……」
line = "「……よし。じゃあ会長、手を出して……繋ぐよ。ん……」"

[[dialogue]]
speaker = "レミカ"
# （会長の手、温かい……それと、思ってたより大きい……これが男の子の手なんだ……）
line = "（会長の手、温かい……それと、思ってたより大きい……これが男の子の手なんだ……）"

[[dialogue]]
speaker = "レミカ"
# （って、何か私……緊張してる？　会長と一緒にいるのは慣れてるはずなのに、手が触れてるだけでドキドキしてる……）
line = "（って、何か私……緊張してる？　会長と一緒にいるのは慣れてるはずなのに、手が触れてるだけでドキドキしてる……）"

[[dialogue]]
speaker = "レミカ"
# 「こ、このまま学園の中を歩いてみてもいい、かな？　この時間なら生徒もほとんど残ってないだろうから、視線を気にする必要もないし……」
line = "「こ、このまま学園の中を歩いてみてもいい、かな？　この時間なら生徒もほとんど残ってないだろうから、視線を気にする必要もないし……」"

[[dialogue]]
speaker = "レミカ"
# 「夜の校舎だから、やっぱり静かだね……」
line = "「夜の校舎だから、やっぱり静かだね……」"

[[dialogue]]
speaker = "レミカ"
# （静かだから、お互いの呼吸音まで聞こえる。自分の心臓の音も気になる……緊張してるの、会長にバレてない、よね？）
line = "（静かだから、お互いの呼吸音まで聞こえる。自分の心臓の音も気になる……緊張してるの、会長にバレてない、よね？）"

[[dialogue]]
speaker = "レミカ"
# （め、目が合ったらバレちゃいそうで、顔が見れない……というか私、手汗かいてない？　なんかそれ、凄く恥ずかしいんだけど……っ）
line = "（め、目が合ったらバレちゃいそうで、顔が見れない……というか私、手汗かいてない？　なんかそれ、凄く恥ずかしいんだけど……っ）"

[[dialogue]]
speaker = "レミカ"
# 「と、とりあえず……手を繋ぐ感覚は分かったかな、うん。一旦ここまでで大丈夫――」
line = "「と、とりあえず……手を繋ぐ感覚は分かったかな、うん。一旦ここまでで大丈夫――」"

[[dialogue]]
speaker = "レミカ"
# 「って、あ……」
line = "「って、あ……」"

[[dialogue]]
speaker = "レミカ"
# （なんか手を離したら、温もりが消えて寂しい感じ……ドキドキしたけど、もっと繋いでてもよかった、かも……）
line = "（なんか手を離したら、温もりが消えて寂しい感じ……ドキドキしたけど、もっと繋いでてもよかった、かも……）"

[[dialogue]]
speaker = "レミカ"
# 「――え？　う、ううん、何でもない。ステップアップして、次に行こう」
line = "「――え？　う、ううん、何でもない。ステップアップして、次に行こう」"

[[dialogue]]
speaker = "レミカ"
# 「次は、映画でもシーンがあるんだけど、腕を組む練習がしたい」
line = "「次は、映画でもシーンがあるんだけど、腕を組む練習がしたい」"

[[dialogue]]
speaker = "レミカ"
# 「……よし。じゃあ会長、腕を借りるね。ん――」
line = "「……よし。じゃあ会長、腕を借りるね。ん――」"

[[dialogue]]
speaker = "レミカ"
# （って、これ手を繋ぐのと、全然違う……！？　か、体が密着して、心臓がドキドキしてる音、伝わっちゃうでしょこれ……っ）
line = "（って、これ手を繋ぐのと、全然違う……！？　か、体が密着して、心臓がドキドキしてる音、伝わっちゃうでしょこれ……っ）"

[[dialogue]]
speaker = "レミカ"
# 「っ……！　ご、ごめん会長、ちょっと待って！　少し離れて気分を落ち着かせて……って、きゃっ！？　足が机にっ――」
line = "「っ……！　ご、ごめん会長、ちょっと待って！　少し離れて気分を落ち着かせて……って、きゃっ！？　足が机にっ――」"

[[dialogue]]
speaker = "unk"
# おっと……大丈夫か？
line = "おっと……大丈夫か？"

[[dialogue]]
speaker = "レミカ"
# （あっ……転びそうになったのを、会長に抱き止められて……さっきよりも密着しちゃってる……）
line = "（あっ……転びそうになったのを、会長に抱き止められて……さっきよりも密着しちゃってる……）"

[[dialogue]]
speaker = "レミカ"
# （会長、線が細いように見えて、鍛えているから逞しい体つきしてるんだよね……力強くて、ドキドキする……）
line = "（会長、線が細いように見えて、鍛えているから逞しい体つきしてるんだよね……力強くて、ドキドキする……）"

[[dialogue]]
speaker = "レミカ"
# （腕を組んだ時はビックリしちゃったけど……こうしてくっ付いてると、手を繋いでた時みたいな温もりが感じられて……安心する、かも）
line = "（腕を組んだ時はビックリしちゃったけど……こうしてくっ付いてると、手を繋いでた時みたいな温もりが感じられて……安心する、かも）"

[[dialogue]]
speaker = "レミカ"
# （これが男の人の――会長の感じなんだ……）
line = "（これが男の人の――会長の感じなんだ……）"

[[dialogue]]
speaker = "unk"
# レミカ、気分は落ち着いた？
line = "レミカ、気分は落ち着いた？"

[[dialogue]]
speaker = "レミカ"
# 「え！？　う、うん……もう大丈夫」
line = "「え！？　う、うん……もう大丈夫」"

[[dialogue]]
speaker = "レミカ"
# （というか、気にしてる余裕なかったけど……会長は、私みたいにドキドキ、してないのかな？　それは、なんか……）
line = "（というか、気にしてる余裕なかったけど……会長は、私みたいにドキドキ、してないのかな？　それは、なんか……）"

[[dialogue]]
speaker = "レミカ"
# 「――あ、あのさ……会長。会長は……私と手を繋いだり、腕を組んだりして、ドキドキとかしてないの？　あ、いや別に、私はしてるとか、そういうわけじゃないけどっ」
line = "「――あ、あのさ……会長。会長は……私と手を繋いだり、腕を組んだりして、ドキドキとかしてないの？　あ、いや別に、私はしてるとか、そういうわけじゃないけどっ」"

[[dialogue]]
speaker = "unk"
# 俺はドキドキしてるよ
line = "俺はドキドキしてるよ"

[[dialogue]]
speaker = "レミカ"
# 「――恥ずかしいから、そう見えないように取り繕ってるだけ？　ふ、ふ～ん……そうなんだ」
line = "「――恥ずかしいから、そう見えないように取り繕ってるだけ？　ふ、ふ～ん……そうなんだ」"

[[dialogue]]
speaker = "レミカ"
# （何かそれを聞いたら……ちょっと嬉しい、かも）
line = "（何かそれを聞いたら……ちょっと嬉しい、かも）"

[[dialogue]]
speaker = "レミカ"
# 「ん、どうしたの、会長？　驚いたような顔して……」
line = "「ん、どうしたの、会長？　驚いたような顔して……」"

[[dialogue]]
speaker = "レミカ"
# 「――わ、私が仕事の時よりも、いい笑顔してたから？　う、嘘っ……？」
line = "「――わ、私が仕事の時よりも、いい笑顔してたから？　う、嘘っ……？」"

[[dialogue]]
speaker = "unk"
# レミカが頬をムニムニさせている一方、先程の思わずドキッとするような笑顔で、俺も顔が熱くなってしまっているのを自覚せざるを得なかった――
line = "レミカが頬をムニムニさせている一方、先程の思わずドキッとするような笑顔で、俺も顔が熱くなってしまっているのを自覚せざるを得なかった――"
