[[dialogue]]
speaker = "unk"
# 第１０話,魔女の躍動,B
line = "第１０話,魔女の躍動,B"

[[dialogue]]
speaker = "unk"
# 同刻・ネビュラ基地──
line = "同刻・ネビュラ基地──"

[[dialogue]]
speaker = "unk"
# <ruby=エージェント>魔女</ruby>たちは首を揃えて、上官の指令を待っていた。すなわち──
line = "<ruby>魔女<rt>エージェント</rt></ruby>たちは首を揃えて、上官の指令を待っていた。すなわち──"

[[dialogue]]
speaker = "セドナ"
# 「──時は来た」
line = "「──時は来た」"

[[dialogue]]
speaker = "セドナ"
# 「フィヴォス流星群──これは、我々がかねてより予測していた前触れの到来に他ならない。事は計画通りに進んでいる」
line = "「フィヴォス流星群──これは、我々がかねてより予測していた前触れの到来に他ならない。事は計画通りに進んでいる」"

[[dialogue]]
speaker = "アイリーン"
# 「星騎士たちは主要戦力の大部分を欠いています。とりわけ二名の魔王候補の欠落は重大」
line = "「星騎士たちは主要戦力の大部分を欠いています。とりわけ二名の魔王候補の欠落は重大」"

[[dialogue]]
speaker = "アイリーン"
# 「また、世界樹のうろは封鎖済み……緋宮クロトたちが魔界から帰還する術は、ありません」
line = "「また、世界樹のうろは封鎖済み……緋宮クロトたちが魔界から帰還する術は、ありません」"

[[dialogue]]
speaker = "カヤ"
# 「人間界は壊滅……このままいけば」
line = "「人間界は壊滅……このままいけば」"

[[dialogue]]
speaker = "セドナ"
# 「然りだ。それ自体は無論、嘆かわしきこと──魔女と人間の<ruby=ゆうわ>宥和</ruby>を願った<ruby=せんだつ>先達</ruby>たちにも背くこととなろう」
line = "「然りだ。それ自体は無論、嘆かわしきこと──魔女と人間の<ruby>宥和<rt>ゆうわ</rt></ruby>を願った<ruby>先達<rt>せんだつ</rt></ruby>たちにも背くこととなろう」"

[[dialogue]]
speaker = "セドナ"
# 「しかし！　今の我々に残された手立ては少ない。祖の宿願を叶え、過去最大のリクリエから、三界を守り抜くためにはただひとつ──」
line = "「しかし！　今の我々に残された手立ては少ない。祖の宿願を叶え、過去最大のリクリエから、三界を守り抜くためにはただひとつ──」"

[[dialogue]]
speaker = "unk"
# セドナは拳を振り上げ、高らかにその場で言い放った。
line = "セドナは拳を振り上げ、高らかにその場で言い放った。"

[[dialogue]]
speaker = "セドナ"
# 「ただいまよりここに──『グレート・ウォール計画』の始動を宣言する──！」
line = "「ただいまよりここに──『グレート・ウォール計画』の始動を宣言する──！」"

[[dialogue]]
speaker = "unk"
# それは彼女たち魔女、そしてネビュラという機関が、長年にわたって練り上げてきた最終プランの発動だった。
line = "それは彼女たち魔女、そしてネビュラという機関が、長年にわたって練り上げてきた最終プランの発動だった。"

[[dialogue]]
speaker = "unk"
# だが……
line = "だが……"

[[dialogue]]
speaker = "unk"
# 「<b>人間界を犠牲に</b>他の二界を救う──なんて。そんなギャンビットは、あまり褒められた手ではないわね」
line = "「<b>人間界を犠牲に</b>他の二界を救う──なんて。そんなギャンビットは、あまり褒められた手ではないわね」"

[[dialogue]]
speaker = "リノ"
# 「私の息子──どこへやったのかしら？　セドナ」
line = "「私の息子──どこへやったのかしら？　セドナ」"

[[dialogue]]
speaker = "unk"
# いつかの制服に身を包んだ緋宮リノが、数年ぶりに古巣へと足を踏み入れていた。
line = "いつかの制服に身を包んだ緋宮リノが、数年ぶりに古巣へと足を踏み入れていた。"
