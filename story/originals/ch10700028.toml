# 射精中にもうわごとみたいに『好き』と言われて、そのたびに背筋が震えて射精が止まらない。
line = "射精中にもうわごとみたいに『好き』と言われて、そのたびに背筋が震えて射精が止まらない。"

[[dialogue]]
speaker = "ウズメイア"
# 「あっ、あっあっ……好きぃ<emoji=heart04>　大好きなの<emoji=heart04>　ほんとに好きぃ……<emoji=heart04>　ん、んんんうっ……んんん～～っ<emoji=heart04><emoji=heart04>」
line = "「あっ、あっあっ……好きぃ<emoji=heart04>　大好きなの<emoji=heart04>　ほんとに好きぃ……<emoji=heart04>　ん、んんんうっ……んんん～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして長い長い射精が、ようやく終わって──
line = "そうして長い長い射精が、ようやく終わって──"

[[dialogue]]
speaker = "ウズメイア"
# 「はぁぁぁ……ふぅうっ<emoji=heart04>　はぁああっ……んんぅ～っ……<emoji=heart04>」
line = "「はぁぁぁ……ふぅうっ<emoji=heart04>　はぁああっ……んんぅ～っ……<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「すっごぉ～……<emoji=heart04>　はぁぁ<emoji=heart04>　めちゃくちゃ出たねぇ……おま○こに精液、入りきらないしぃ<emoji=heart04>」
line = "「すっごぉ～……<emoji=heart04>　はぁぁ<emoji=heart04>　めちゃくちゃ出たねぇ……おま○こに精液、入りきらないしぃ<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「ねぇ、会長くん<emoji=heart04>　きょ、今日はこれで終わり……？」
line = "「ねぇ、会長くん<emoji=heart04>　きょ、今日はこれで終わり……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あたしとしては、もうちょっとだけホワイトデーのお返し……先払いしてもらいたいな～って思ってたり<emoji=heart04>」
line = "「あたしとしては、もうちょっとだけホワイトデーのお返し……先払いしてもらいたいな～って思ってたり<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# すっかり性欲に火が点いてしまった俺は、繋いだ手に力を込めて頷き、セックス続行の意思を伝える。
line = "すっかり性欲に火が点いてしまった俺は、繋いだ手に力を込めて頷き、セックス続行の意思を伝える。"

[[dialogue]]
speaker = "ウズメイア"
# 「んふふふっ<emoji=heart04>　ヤバいくらい嬉し～……<emoji=heart04>　じゃあじゃあ、このまま２回戦、始めちゃおっか<emoji=heart04>」
line = "「んふふふっ<emoji=heart04>　ヤバいくらい嬉し～……<emoji=heart04>　じゃあじゃあ、このまま２回戦、始めちゃおっか<emoji=heart04>」"

[[dialogue]]
speaker = "ウズメイア"
# 「会長くんのおち○ぽで、あたしのおま○こ……バカになっちゃうくらい、感じさせて欲しいし<emoji=heart04>」
line = "「会長くんのおち○ぽで、あたしのおま○こ……バカになっちゃうくらい、感じさせて欲しいし<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そうして俺とウズメは、お互いが疲れ果てるまで行為に及んだのだが……
line = "そうして俺とウズメは、お互いが疲れ果てるまで行為に及んだのだが……"

