[[dialogue]]
speaker = "unk"
# 第９話,２人だけのアステラ攻略戦,B
line = "第９話,２人だけのアステラ攻略戦,B"

[[dialogue]]
speaker = "アナ"
# 「これがアステラ内での戦い……思っていた以上に、体が上手く動かないですね」
line = "「これがアステラ内での戦い……思っていた以上に、体が上手く動かないですね」"

[[dialogue]]
speaker = "アナ"
# 「それに追い払っても追い払っても、また新手が……どこからでも湧いて出てきます」
line = "「それに追い払っても追い払っても、また新手が……どこからでも湧いて出てきます」"

[[dialogue]]
speaker = "マトイ"
# 「まったく、春先の虫じゃないんだから……チョウチョくらい可愛げがあればまだマシなんだけど」
line = "「まったく、春先の虫じゃないんだから……チョウチョくらい可愛げがあればまだマシなんだけど」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩……これはかなり危険な状況なのでは」
line = "「マトイ先輩……これはかなり危険な状況なのでは」"

[[dialogue]]
speaker = "マトイ"
# 「大丈夫、会長たちが来てくれるから！　だから頑張ろ、アナちゃん！」
line = "「大丈夫、会長たちが来てくれるから！　だから頑張ろ、アナちゃん！」"

[[dialogue]]
speaker = "マトイ"
# （明らかに私たちはモンスターの猛攻に押されている）
line = "（明らかに私たちはモンスターの猛攻に押されている）"

[[dialogue]]
speaker = "マトイ"
# （このままだとジリ貧。いずれ防衛ラインは決壊するだろう）
line = "（このままだとジリ貧。いずれ防衛ラインは決壊するだろう）"

[[dialogue]]
speaker = "マトイ"
# （それでも。それでもだ）
line = "（それでも。それでもだ）"

[[dialogue]]
speaker = "マトイ"
# （先輩の私が、アナちゃんより先に弱音を吐くわけにはいかない）
line = "（先輩の私が、アナちゃんより先に弱音を吐くわけにはいかない）"

[[dialogue]]
speaker = "マトイ"
# （どんな窮地でも笑顔を絶やさない。ヴィーナス会長みたいに――！）
line = "（どんな窮地でも笑顔を絶やさない。ヴィーナス会長みたいに――！）"

[[dialogue]]
speaker = "マトイ"
# （──会長みたいに？）
line = "（──会長みたいに？）"

[[dialogue]]
speaker = "マトイ"
# 「なぁんだ……このくらいの攻撃、どうってことないじゃない！」
line = "「なぁんだ……このくらいの攻撃、どうってことないじゃない！」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩？」
line = "「マトイ先輩？」"

[[dialogue]]
speaker = "マトイ"
# 「私はあのヴィーナス会長の必殺技だって耐えきった星騎士だよ！　あの無茶苦茶に比べたら、この程度！」
line = "「私はあのヴィーナス会長の必殺技だって耐えきった星騎士だよ！　あの無茶苦茶に比べたら、この程度！」"

[[dialogue]]
speaker = "マトイ"
# 「このくらいで音を上げたら、会長に鼻で笑われる！」
line = "「このくらいで音を上げたら、会長に鼻で笑われる！」"

[[dialogue]]
speaker = "マトイ"
# 「だからね、アナちゃん。ノープロブレム！　アナちゃんへの攻撃は、全部私が防ぐからね！」
line = "「だからね、アナちゃん。ノープロブレム！　アナちゃんへの攻撃は、全部私が防ぐからね！」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩……ありがとうございます」
line = "「マトイ先輩……ありがとうございます」"

[[dialogue]]
speaker = "マトイ"
# 「うん、元気なお返事！　いいよっ！」
line = "「うん、元気なお返事！　いいよっ！」"

[[dialogue]]
speaker = "アナ"
# 「ひとつ、聞いてもいいですか？」
line = "「ひとつ、聞いてもいいですか？」"

[[dialogue]]
speaker = "マトイ"
# 「ひとつと言わず、何個でもどうぞ」
line = "「ひとつと言わず、何個でもどうぞ」"

[[dialogue]]
speaker = "アナ"
# 「会長たちが来るまで持ち堪えるのが、私たちの役目ですけど」
line = "「会長たちが来るまで持ち堪えるのが、私たちの役目ですけど」"

[[dialogue]]
speaker = "アナ"
# 「私たちで殲滅しちゃってもノープロブレムですね？」
line = "「私たちで殲滅しちゃってもノープロブレムですね？」"

[[dialogue]]
speaker = "マトイ"
# 「もちろん！」
line = "「もちろん！」"

[[dialogue]]
speaker = "アナ"
# 「命令してください、マトイ先輩」
line = "「命令してください、マトイ先輩」"

[[dialogue]]
speaker = "マトイ"
# 「行くよ、<b>アナ</b>！　モンスターを殲滅する！」
line = "「行くよ、<b>アナ</b>！　モンスターを殲滅する！」"

[[dialogue]]
speaker = "マトイ"
# 「ふええ……案外、何とかなったけど……疲れたぁ……」
line = "「ふええ……案外、何とかなったけど……疲れたぁ……」"

[[dialogue]]
speaker = "アナ"
# 「はぁー、ふぅー、ふひゅー、空気が美味しいです」
line = "「はぁー、ふぅー、ふひゅー、空気が美味しいです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私の見せ場を奪ってくれたわね！」
line = "「私の見せ場を奪ってくれたわね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──なーんてね。お疲れ様。よくやったわ！」
line = "「──なーんてね。お疲れ様。よくやったわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「２人とも頑張ったわね～」
line = "「２人とも頑張ったわね～」"

[[dialogue]]
speaker = "マトイ"
# 「……遅かったじゃないですか」
line = "「……遅かったじゃないですか」"

[[dialogue]]
speaker = "サーシャ"
# 「人的被害はゼロ、建物の被害も極めて軽微。お手柄よ～」
line = "「人的被害はゼロ、建物の被害も極めて軽微。お手柄よ～」"

[[dialogue]]
speaker = "サーシャ"
# 「まさか２人だけで片づけちゃうなんて思わなかったわ～」
line = "「まさか２人だけで片づけちゃうなんて思わなかったわ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何言ってるの、サーシャさん！　私が見つけてきた役員なんだから当然よ！」
line = "「何言ってるの、サーシャさん！　私が見つけてきた役員なんだから当然よ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「２人ともよくやってくれたわ。特にマトイは自主練の帰りだったんじゃないの？　疲れてたでしょうに、大変だったでしょ」
line = "「２人ともよくやってくれたわ。特にマトイは自主練の帰りだったんじゃないの？　疲れてたでしょうに、大変だったでしょ」"

[[dialogue]]
speaker = "アナ"
# 「自主練……そうだったんですか？」
line = "「自主練……そうだったんですか？」"

[[dialogue]]
speaker = "マトイ"
# 「んー……まあね。これでも星徒会役員なんだから頑張らなきゃって思って」
line = "「んー……まあね。これでも星徒会役員なんだから頑張らなきゃって思って」"

[[dialogue]]
speaker = "ヴィーナス"
# 「誰も気づかないところで、並々ならぬ努力をしてるのがマトイなのよ」
line = "「誰も気づかないところで、並々ならぬ努力をしてるのがマトイなのよ」"

[[dialogue]]
speaker = "マトイ"
# 「並々ならなくないです。普通ですよ。努力なんて誰でもできるじゃないですか」
line = "「並々ならなくないです。普通ですよ。努力なんて誰でもできるじゃないですか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とんでもないわ！　マトイ、あなたは今、世界の半分を敵に回したわよ！」
line = "「とんでもないわ！　マトイ、あなたは今、世界の半分を敵に回したわよ！」"

[[dialogue]]
speaker = "マトイ"
# 「何十億人も！？」
line = "「何十億人も！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いい？　ほとんどの人間は、努力なんてしなくていいなら、したくないものなの」
line = "「いい？　ほとんどの人間は、努力なんてしなくていいなら、したくないものなの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「誰が褒めてくれるわけでもないのに、努力を重ねられるマトイのそれは立派な才能なのよ！」
line = "「誰が褒めてくれるわけでもないのに、努力を重ねられるマトイのそれは立派な才能なのよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「マトイちゃんは毎日、頑張ってて、本当に偉いわね～。花丸あげちゃ～う。なでなで、よしよし♪」
line = "「マトイちゃんは毎日、頑張ってて、本当に偉いわね～。花丸あげちゃ～う。なでなで、よしよし♪」"

[[dialogue]]
speaker = "マトイ"
# 「あ、ありがとうございます」
line = "「あ、ありがとうございます」"

[[dialogue]]
speaker = "アナ"
# 「ヴィーナス会長は、もう少し努力をした方が良いのでは。主に書類仕事の」
line = "「ヴィーナス会長は、もう少し努力をした方が良いのでは。主に書類仕事の」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えー、イヤよ！　努力してもできないものはあるし！」
line = "「えー、イヤよ！　努力してもできないものはあるし！」"

[[dialogue]]
speaker = "マトイ"
# 「あはは……」
line = "「あはは……」"

[[dialogue]]
speaker = "アナ"
# 「ありがとうございます、マトイ先輩」
line = "「ありがとうございます、マトイ先輩」"

[[dialogue]]
speaker = "マトイ"
# 「アナちゃん……」
line = "「アナちゃん……」"

[[dialogue]]
speaker = "アナ"
# 「アナでＯＫです」
line = "「アナでＯＫです」"

[[dialogue]]
speaker = "アナ"
# 「マトイ先輩が私の前に立ってくれてたおかげで、安心して戦うことができました」
line = "「マトイ先輩が私の前に立ってくれてたおかげで、安心して戦うことができました」"

[[dialogue]]
speaker = "マトイ"
# 「私からも、ありがとう。アナが必ずやってくれるって信じてたから、前で踏ん張れたんだよ」
line = "「私からも、ありがとう。アナが必ずやってくれるって信じてたから、前で踏ん張れたんだよ」"

[[dialogue]]
speaker = "アナ"
# 「きっと、大福を食べてたおかげですね」
line = "「きっと、大福を食べてたおかげですね」"

[[dialogue]]
speaker = "マトイ"
# 「ふふ、そうだね。大福さまさまだ」
line = "「ふふ、そうだね。大福さまさまだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なになに？　何の話？」
line = "「なになに？　何の話？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今回の件は、マトイの自信に繋がったみたいね。私たちの出番はなかったけど、ケガニのダイミョウだわ！」
line = "「今回の件は、マトイの自信に繋がったみたいね。私たちの出番はなかったけど、ケガニのダイミョウだわ！」"

[[dialogue]]
speaker = "サーシャ"
# 「美味しそうね～。でもそれを言うなら怪我の功名かしら～」
line = "「美味しそうね～。でもそれを言うなら怪我の功名かしら～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう、それそれ」
line = "「そう、それそれ」"

[[dialogue]]
speaker = "サーシャ"
# 「マトイちゃんもアナちゃんも、きっともっと頼れる星徒会役員になってくれるわね～。これからが楽しみだわ～」
line = "「マトイちゃんもアナちゃんも、きっともっと頼れる星徒会役員になってくれるわね～。これからが楽しみだわ～」"
