[[dialogue]]
speaker = "unk"
# 第１話,ゴシックファッションの傭兵,P
line = "第１話,ゴシックファッションの傭兵,P"

[[dialogue]]
speaker = "unk"
# 星徒会長に就任して間もなくのこと。１人で執務していた時に、ある女生徒がやって来た――
line = "星徒会長に就任して間もなくのこと。１人で執務していた時に、ある女生徒がやって来た――"

[[dialogue]]
speaker = "セナリィ"
# 「失礼致しますわ。会長様、ただいまお時間よろしいでしょうか？」
line = "「失礼致しますわ。会長様、ただいまお時間よろしいでしょうか？」"

[[dialogue]]
speaker = "セナリィ"
# 「ありがとうございます。それでは名乗らせて頂きますわ――」
line = "「ありがとうございます。それでは名乗らせて頂きますわ――」"

[[dialogue]]
speaker = "セナリィ"
# 「私は傭兵、人呼んでバンデット・セナリィと申しますわ。所属としては、新星学園の２年生になりますわね」
line = "「私は傭兵、人呼んでバンデット・セナリィと申しますわ。所属としては、新星学園の２年生になりますわね」"

[[dialogue]]
speaker = "セナリィ"
# 「ちなみに自称ではなく、私、学園に来るまでは武器商人の下で傭兵を務めておりましたの。嘘だとお思いでしたら、興信所で調査をして頂いても結構ですわよ」
line = "「ちなみに自称ではなく、私、学園に来るまでは武器商人の下で傭兵を務めておりましたの。嘘だとお思いでしたら、興信所で調査をして頂いても結構ですわよ」"

[[dialogue]]
speaker = "セナリィ"
# 「それで、私が今日やって来たのは、会長様へビジネスの提案をする為ですわ」
line = "「それで、私が今日やって来たのは、会長様へビジネスの提案をする為ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「傭兵であると同時に、最近新たな会社を起業しましたの。その名も『秘密結社ゴールデングース』。金のガチョウとは実に縁起の良い名前でしょう？」
line = "「傭兵であると同時に、最近新たな会社を起業しましたの。その名も『秘密結社ゴールデングース』。金のガチョウとは実に縁起の良い名前でしょう？」"

[[dialogue]]
speaker = "unk"
# 会社というと、他にもメンバーが？
line = "会社というと、他にもメンバーが？"

[[dialogue]]
speaker = "セナリィ"
# 「お恥ずかしながら、まだ正式な社員は私１人だけですわ。勧誘している方は何人かいるのですが……」
line = "「お恥ずかしながら、まだ正式な社員は私１人だけですわ。勧誘している方は何人かいるのですが……」"

[[dialogue]]
speaker = "セナリィ"
# 「業務内容については、傭兵稼業を始めとして、見合う金額さえ払って頂ければ、喜んで何でも致しますわ――」
line = "「業務内容については、傭兵稼業を始めとして、見合う金額さえ払って頂ければ、喜んで何でも致しますわ――」"

[[dialogue]]
speaker = "セナリィ"
# 「それこそ大金ならば、言葉の通り何でも、ね♪」
line = "「それこそ大金ならば、言葉の通り何でも、ね♪」"

[[dialogue]]
speaker = "セナリィ"
# 「どんなものにも、表と裏はあるものですわ。善があれば、悪が存在するのも必然。私はその裏側をビジネスにしたいと考えておりますの」
line = "「どんなものにも、表と裏はあるものですわ。善があれば、悪が存在するのも必然。私はその裏側をビジネスにしたいと考えておりますの」"

[[dialogue]]
speaker = "セナリィ"
# 「会長様の星徒会は、言うなれば表側で、善の組織。しかし善であるが故に出来ない、綺麗事ではどうにもならないということは絶対に存在しますわ」
line = "「会長様の星徒会は、言うなれば表側で、善の組織。しかし善であるが故に出来ない、綺麗事ではどうにもならないということは絶対に存在しますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「そこで私が今回、裏側をサポートしたいという提案をしに来たというわけですの」
line = "「そこで私が今回、裏側をサポートしたいという提案をしに来たというわけですの」"

[[dialogue]]
speaker = "セナリィ"
# 「私の美学は『悪即善』。お金とは幸せであり、悪とは儲かるもの。故に悪＝金＝善……つまりは、悪行も巡り巡れば善行になる、ということですわ」
line = "「私の美学は『悪即善』。お金とは幸せであり、悪とは儲かるもの。故に悪＝金＝善……つまりは、悪行も巡り巡れば善行になる、ということですわ」"

[[dialogue]]
speaker = "unk"
# 会ったばかりだから、簡単には頷けないな
line = "会ったばかりだから、簡単には頷けないな"

[[dialogue]]
speaker = "セナリィ"
# 「ふふっ、ご安心下さいな。私としても１回会っただけで信用頂けるとは思っておりませんので。営業とは繰り返し行って、信頼関係を築いて行くものですから」
line = "「ふふっ、ご安心下さいな。私としても１回会っただけで信用頂けるとは思っておりませんので。営業とは繰り返し行って、信頼関係を築いて行くものですから」"

[[dialogue]]
speaker = "セナリィ"
# 「ですが……私の力が必要になる時は、必ず来ると確信しておりますわ。何せ世界には今、リクリエという綺麗事では済まない事態が迫りつつあるのですから」
line = "「ですが……私の力が必要になる時は、必ず来ると確信しておりますわ。何せ世界には今、リクリエという綺麗事では済まない事態が迫りつつあるのですから」"

[[dialogue]]
speaker = "セナリィ"
# 「猫の手ならぬ、悪の手も借りたい状況……絶対にあるでしょう？」
line = "「猫の手ならぬ、悪の手も借りたい状況……絶対にあるでしょう？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「お話し中のところ、失礼致しますわ」
line = "「お話し中のところ、失礼致しますわ」"

[[dialogue]]
speaker = "unk"
# そう言って入ってきたのは流星学園の寮長である、<ruby=せんおんじ>千園寺</ruby>ヒルディオーネ先輩だった。
line = "そう言って入ってきたのは流星学園の寮長である、<ruby>千園寺<rt>せんおんじ</rt></ruby>ヒルディオーネ先輩だった。"

[[dialogue]]
speaker = "セナリィ"
# 「ちょっと！　いきなり何ですの！？　ビジネスの途中ですわよ！」
line = "「ちょっと！　いきなり何ですの！？　ビジネスの途中ですわよ！」"

[[dialogue]]
speaker = "unk"
# どうしてここに？
line = "どうしてここに？"

[[dialogue]]
speaker = "unk"
# 千園寺先輩……！
line = "千園寺先輩……！"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「新星の会長様を次のお茶会へご招待にと参りましたの。そうしたら、何やら気に入らない内容が聞こえて来たものですから」
line = "「新星の会長様を次のお茶会へご招待にと参りましたの。そうしたら、何やら気に入らない内容が聞こえて来たものですから」"

[[dialogue]]
speaker = "セナリィ"
# 「千園寺……流星市国五名門の……！」
line = "「千園寺……流星市国五名門の……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「貴方のことは私も知っていましてよ、バンデット・セナリィ。幼い時から戦場で銃を手に取り、対峙したら星術は使わず逃げろとまで言われるゴシックファッションの傭兵」
line = "「貴方のことは私も知っていましてよ、バンデット・セナリィ。幼い時から戦場で銃を手に取り、対峙したら星術は使わず逃げろとまで言われるゴシックファッションの傭兵」"

[[dialogue]]
speaker = "セナリィ"
# 「光栄ですわ、千園寺ヒルディオーネ様。星力を持たぬうちから槍を振るい続け、固有の星術を得るに至った才能の超越者、星騎士の模範と呼ばれる貴方が、私に何の用ですの？」
line = "「光栄ですわ、千園寺ヒルディオーネ様。星力を持たぬうちから槍を振るい続け、固有の星術を得るに至った才能の超越者、星騎士の模範と呼ばれる貴方が、私に何の用ですの？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「単刀直入に申しましょう。私の同志たる会長に、下らない誘いはお止めなさいな。今の会長にとって、貴方の提案はまさに悪影響以外の何物でもありませんわ」
line = "「単刀直入に申しましょう。私の同志たる会長に、下らない誘いはお止めなさいな。今の会長にとって、貴方の提案はまさに悪影響以外の何物でもありませんわ」"

[[dialogue]]
speaker = "セナリィ"
# 「そんなこと、貴方に言われる筋合いはありませんわ。第一、ビジネス中の横入りは無礼なのではなくて？」
line = "「そんなこと、貴方に言われる筋合いはありませんわ。第一、ビジネス中の横入りは無礼なのではなくて？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　あいにく私、悪行を良しとする人間に払う礼儀は持ち合わせていませんの」
line = "「おーっほっほっほ！　あいにく私、悪行を良しとする人間に払う礼儀は持ち合わせていませんの」"

[[dialogue]]
speaker = "セナリィ"
# 「価値観の相違ですわね。まあ、私としても世間知らずの令嬢に払う敬意はありませんので、どうしてもビジネスの邪魔をするというのなら戦闘で決着を――」
line = "「価値観の相違ですわね。まあ、私としても世間知らずの令嬢に払う敬意はありませんので、どうしてもビジネスの邪魔をするというのなら戦闘で決着を――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いえ、お金が必要と言うのなら、わざわざ悪行などせずとも、私が貴方の会社に出資すればいいのですわ」
line = "「いえ、お金が必要と言うのなら、わざわざ悪行などせずとも、私が貴方の会社に出資すればいいのですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「ホワイ！？」
line = "「ホワイ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「悪行はお金が儲かるからやるのであって、お金が儲かるのであれば悪行に固執する必要はない。違いますかしら？」
line = "「悪行はお金が儲かるからやるのであって、お金が儲かるのであれば悪行に固執する必要はない。違いますかしら？」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふ……ふふふ……ふふふふふふ！　その通りですわ、千園寺様！　先程は大変失礼致しました。貴方は、私が想像していたよりもずっと聡明な方でいらっしゃいますわ！」
line = "「ふふ……ふふふ……ふふふふふふ！　その通りですわ、千園寺様！　先程は大変失礼致しました。貴方は、私が想像していたよりもずっと聡明な方でいらっしゃいますわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふふっ、貴方の強さを真っ当に活かせそうで何よりですわ。それで、どの程度ご入用かしら？」
line = "「ふふっ、貴方の強さを真っ当に活かせそうで何よりですわ。それで、どの程度ご入用かしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ゴールデングースとは学園の外部組織とお見受けしましたが、従業員がどのくらい居らっしゃるのか、お聞かせ願えますこと？」
line = "「ゴールデングースとは学園の外部組織とお見受けしましたが、従業員がどのくらい居らっしゃるのか、お聞かせ願えますこと？」"

[[dialogue]]
speaker = "セナリィ"
# 「それは……いや、そう、３０人！　およそ学園の１クラス分ですわ！」
line = "「それは……いや、そう、３０人！　およそ学園の１クラス分ですわ！」"

[[dialogue]]
speaker = "unk"
# いや、まだ１人だけって……
line = "いや、まだ１人だけって……"

[[dialogue]]
speaker = "セナリィ"
# 「ちょっ……会長様！　余計なことを……！　ビジネスの邪魔をするんじゃねぇですわ！」
line = "「ちょっ……会長様！　余計なことを……！　ビジネスの邪魔をするんじゃねぇですわ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　さすが会長、正直者でいらっしゃいますわね！」
line = "「おーっほっほっほ！　さすが会長、正直者でいらっしゃいますわね！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「バンデット・セナリィ。貴方が見栄を張ったことに対して責める気はございませんし、出資に見合う実力を備えていることは、経歴からも信用出来ますわ」
line = "「バンデット・セナリィ。貴方が見栄を張ったことに対して責める気はございませんし、出資に見合う実力を備えていることは、経歴からも信用出来ますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「しかし他に社員が居ない以上、取締役としての貴方の人望が見えないことも事実。まずは貴方が自信を持って口に出来る人数を揃えてから、私のところへ来なさいな」
line = "「しかし他に社員が居ない以上、取締役としての貴方の人望が見えないことも事実。まずは貴方が自信を持って口に出来る人数を揃えてから、私のところへ来なさいな」"

[[dialogue]]
speaker = "セナリィ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「期待していますわよ、傭兵さん？」
line = "「期待していますわよ、傭兵さん？」"

[[dialogue]]
speaker = "セナリィ"
# 「くそっ、大金ゲットのチャンスを逃しましたわ～～～っ！　これも会長様が余計な茶々を入れるから……！」
line = "「くそっ、大金ゲットのチャンスを逃しましたわ～～～っ！　これも会長様が余計な茶々を入れるから……！」"

[[dialogue]]
speaker = "unk"
# 信用を築くものだって言ってたよね？
line = "信用を築くものだって言ってたよね？"

[[dialogue]]
speaker = "unk"
# でも、営業は繰り返し行って
line = "でも、営業は繰り返し行って"

[[dialogue]]
speaker = "セナリィ"
# 「それは……ええ、確かに自分でそう言いましたわね……ふぅ……。恥ずかしいところを見せてしまいましたわ。でも……」
line = "「それは……ええ、確かに自分でそう言いましたわね……ふぅ……。恥ずかしいところを見せてしまいましたわ。でも……」"

[[dialogue]]
speaker = "セナリィ"
# 「会長様にはもうちょっと、大金の価値を分かって貰いたいですわ」
line = "「会長様にはもうちょっと、大金の価値を分かって貰いたいですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「むーっ……」
line = "「むーっ……」"

[[dialogue]]
speaker = "unk"
# 拗ねたように剥れてみせるセナリィを見て、意外と可愛げのある子なのかもしれない、と思うのであった。
line = "拗ねたように剥れてみせるセナリィを見て、意外と可愛げのある子なのかもしれない、と思うのであった。"
