[[dialogue]]
speaker = "unk"
# 第3話,因縁の相手？,P
line = "第3話,因縁の相手？,P"

[[dialogue]]
speaker = "キリカ"
# 「当然、お屋敷に必要なものを購入するのもメイドの仕事です。余計なものを買わないように、買い忘れもないように気を付けてください」
line = "「当然、お屋敷に必要なものを購入するのもメイドの仕事です。余計なものを買わないように、買い忘れもないように気を付けてください」"

[[dialogue]]
speaker = "キリカ"
# 「後で清算するのに必要ですので、お店で領収書をもらうのを忘れないでください。良いですね？」
line = "「後で清算するのに必要ですので、お店で領収書をもらうのを忘れないでください。良いですね？」"

[[dialogue]]
speaker = "unk"
# わかりました、師匠！
line = "わかりました、師匠！"

[[dialogue]]
speaker = "キリカ"
# 「いつも返事に元気がありますね。良いことです」
line = "「いつも返事に元気がありますね。良いことです」"

[[dialogue]]
speaker = "キリカ"
# 「ですが本当は、今日はお休みを出されているのです」
line = "「ですが本当は、今日はお休みを出されているのです」"

[[dialogue]]
speaker = "キリカ"
# 「しかし仕事がないとやることがありません。休日は不要だとお嬢様にも申し上げたのですが……」
line = "「しかし仕事がないとやることがありません。休日は不要だとお嬢様にも申し上げたのですが……」"

[[dialogue]]
speaker = "フィオナ"
# 『メイド長がそんな姿勢だと他のメイドも休みを取りにくくなります。キリカの教育のおかげで、メイド長がいなくても屋敷は回せるから今日は休みなさい』
line = "『メイド長がそんな姿勢だと他のメイドも休みを取りにくくなります。キリカの教育のおかげで、メイド長がいなくても屋敷は回せるから今日は休みなさい』"

[[dialogue]]
speaker = "キリカ"
# 「――と言われてしまいました。これが働き方改革……」
line = "「――と言われてしまいました。これが働き方改革……」"

[[dialogue]]
speaker = "キリカ"
# 「ですので、本日はお屋敷で使う品物を買い集めようと考えた次第です」
line = "「ですので、本日はお屋敷で使う品物を買い集めようと考えた次第です」"

[[dialogue]]
speaker = "unk"
# （それって結局働いているような……）
line = "（それって結局働いているような……）"

[[dialogue]]
speaker = "キリカ"
# 「食品はたくさん持てませんし、次はメイド服を修繕するための布を……」
line = "「食品はたくさん持てませんし、次はメイド服を修繕するための布を……」"

[[dialogue]]
speaker = "ウィステリア"
# 「──あ」
line = "「──あ」"

[[dialogue]]
speaker = "キリカ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# ２人はお知り合いですか？
line = "２人はお知り合いですか？"

[[dialogue]]
speaker = "キリカ"
# 「知り合いというか……そうですね、いわゆる腐れ縁です」
line = "「知り合いというか……そうですね、いわゆる腐れ縁です」"

[[dialogue]]
speaker = "ウィステリア"
# 「ま、そういう言い方しかないわよね。仲良くした覚えはないんだし」
line = "「ま、そういう言い方しかないわよね。仲良くした覚えはないんだし」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、そんなにビビらなくても大丈夫。今すぐケンカになったりはしないから」
line = "「あ、そんなにビビらなくても大丈夫。今すぐケンカになったりはしないから」"

[[dialogue]]
speaker = "ウィステリア"
# 「ねぇ会長くん知ってる？　って学園違うし知るわけないか。フィオナちゃんも私たちと入れ替わりだったし」
line = "「ねぇ会長くん知ってる？　って学園違うし知るわけないか。フィオナちゃんも私たちと入れ替わりだったし」"

[[dialogue]]
speaker = "ウィステリア"
# 「キリカってば、学生時代はクールビューティーとか言われてすごい人気だったんだから。星徒会には入ってなかったけど、戦闘力はトップクラスだったしね」
line = "「キリカってば、学生時代はクールビューティーとか言われてすごい人気だったんだから。星徒会には入ってなかったけど、戦闘力はトップクラスだったしね」"

[[dialogue]]
speaker = "キリカ"
# 「それ以上話すとあなたの過去も知れますよ」
line = "「それ以上話すとあなたの過去も知れますよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「あっ、しまった！？」
line = "「あっ、しまった！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「……まったく、相変わらずね。今もメイドの仕事中？」
line = "「……まったく、相変わらずね。今もメイドの仕事中？」"

[[dialogue]]
speaker = "キリカ"
# 「あなたこそ、本当に新星学園の司書になったのですね。路頭に迷うようならまた雇って差し上げようかと思いましたが、良い再就職先があって安心しました」
line = "「あなたこそ、本当に新星学園の司書になったのですね。路頭に迷うようならまた雇って差し上げようかと思いましたが、良い再就職先があって安心しました」"

[[dialogue]]
speaker = "ウィステリア"
# 「なんですって～？　ていうかさっきの師匠って何？」
line = "「なんですって～？　ていうかさっきの師匠って何？」"

[[dialogue]]
speaker = "キリカ"
# 「そう呼びたいと仰ったのです。師と呼ばれたからには、ふさわしいよう指導しているまでです」
line = "「そう呼びたいと仰ったのです。師と呼ばれたからには、ふさわしいよう指導しているまでです」"

[[dialogue]]
speaker = "ウィステリア"
# 「大丈夫？　このメイド長、小姑みたいに細かいし、相当いびられてるんじゃない？」
line = "「大丈夫？　このメイド長、小姑みたいに細かいし、相当いびられてるんじゃない？」"

[[dialogue]]
speaker = "キリカ"
# 「図書館を利用する際にご不便されていませんか？　ウィステリアは仕事が大雑把なので」
line = "「図書館を利用する際にご不便されていませんか？　ウィステリアは仕事が大雑把なので」"

[[dialogue]]
speaker = "ウィステリア"
# 「むむむむ……」
line = "「むむむむ……」"

[[dialogue]]
speaker = "キリカ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "キリカ"
# 「またモンスターですか。良い機会です。実戦で指導いたしましょう」
line = "「またモンスターですか。良い機会です。実戦で指導いたしましょう」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、クモ──っぽいモンスター」
line = "「あ、クモ──っぽいモンスター」"

[[dialogue]]
speaker = "キリカ"
# 「……訓練は中止です。速やかに撃滅します」
line = "「……訓練は中止です。速やかに撃滅します」"

[[dialogue]]
speaker = "キリカ"
# 「殲滅完了。お疲れ様でした」
line = "「殲滅完了。お疲れ様でした」"

[[dialogue]]
speaker = "ウィステリア"
# 「とか言って、ほとんどあなたが倒したじゃない。私たちが手を出す暇なかったわよ」
line = "「とか言って、ほとんどあなたが倒したじゃない。私たちが手を出す暇なかったわよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「（よく見たらそんなにクモに似てなかったけど、キリカはちょっとでもクモっぽいと見境なくなるのよね……）」
line = "「（よく見たらそんなにクモに似てなかったけど、キリカはちょっとでもクモっぽいと見境なくなるのよね……）」"

[[dialogue]]
speaker = "unk"
# （キリカさんってクモが苦手なのか……）
line = "（キリカさんってクモが苦手なのか……）"

[[dialogue]]
speaker = "キリカ"
# 「なんですか、その顔は。私に苦手なものなどありません。星見家に仕える精鋭メイドたる私に弱点などあるはずがありません」
line = "「なんですか、その顔は。私に苦手なものなどありません。星見家に仕える精鋭メイドたる私に弱点などあるはずがありません」"

[[dialogue]]
speaker = "キリカ"
# 「……まだ納得されていない表情ですね。良いでしょう、後で稽古をつけて差し上げます」
line = "「……まだ納得されていない表情ですね。良いでしょう、後で稽古をつけて差し上げます」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふっ、ヤブヘビヤブヘビ。頑張ってね」
line = "「ふふっ、ヤブヘビヤブヘビ。頑張ってね」"

[[dialogue]]
speaker = "キリカ"
# 「ウィステリア。１人暮らしだからといって、生活が乱れていませんか？」
line = "「ウィステリア。１人暮らしだからといって、生活が乱れていませんか？」"

[[dialogue]]
speaker = "ウィステリア"
# 「はいはい、学生の頃バイトでさんざん注意されたから心配しなくても大丈夫。あなたこそワーカーホリック気味なのなんとかしなさい」
line = "「はいはい、学生の頃バイトでさんざん注意されたから心配しなくても大丈夫。あなたこそワーカーホリック気味なのなんとかしなさい」"

[[dialogue]]
speaker = "ウィステリア"
# 「私はこれで──あ、そうそう。ちょっとだけ教えてあげる」
line = "「私はこれで──あ、そうそう。ちょっとだけ教えてあげる」"

[[dialogue]]
speaker = "ウィステリア"
# 「キリカってね、ショートケーキのイチゴは必ず最後に食べるの。好きなものはとっておくタイプなんだけど、カワイイところもあるわよね」
line = "「キリカってね、ショートケーキのイチゴは必ず最後に食べるの。好きなものはとっておくタイプなんだけど、カワイイところもあるわよね」"

[[dialogue]]
speaker = "ウィステリア"
# 「じゃ、また図書館でね～」
line = "「じゃ、また図書館でね～」"

[[dialogue]]
speaker = "unk"
# 今の本当ですか？
line = "今の本当ですか？"

[[dialogue]]
speaker = "キリカ"
# 「それはイチゴが特別好きなわけではなく、イチゴの酸味で口をすっきりさせたいからであって……」
line = "「それはイチゴが特別好きなわけではなく、イチゴの酸味で口をすっきりさせたいからであって……」"

[[dialogue]]
speaker = "キリカ"
# 「私の作ったケーキを美味しいと言って食べていたのに……まったく……」
line = "「私の作ったケーキを美味しいと言って食べていたのに……まったく……」"

[[dialogue]]
speaker = "キリカ"
# 「いえ、何でもありません。どうやら今日は特別厳しく指導されたいようですので……覚悟してください」
line = "「いえ、何でもありません。どうやら今日は特別厳しく指導されたいようですので……覚悟してください」"
