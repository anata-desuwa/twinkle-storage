[[dialogue]]
speaker = "unk"
# ついに覚醒したヒルディオーネはマハムートと再び激戦を開始し、試合は一気にクライマックスへと突入していた――
line = "ついに覚醒したヒルディオーネはマハムートと再び激戦を開始し、試合は一気にクライマックスへと突入していた――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「はあああぁーーーっ！！」
line = "「はあああぁーーーっ！！」"

[[dialogue]]
speaker = "unk"
# スチームオーバーブーストの時よりも更なる超速で動き回るヒルディオーネは、マハムートの引力球の追尾を抜けて、肉薄する。
line = "スチームオーバーブーストの時よりも更なる超速で動き回るヒルディオーネは、マハムートの引力球の追尾を抜けて、肉薄する。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「メテオクローッ！」
line = "「メテオクローッ！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「スパイラルエクストリームッ！！」
line = "「スパイラルエクストリームッ！！」"

[[dialogue]]
speaker = "unk"
# マハムートの爪撃と、ヒルディオーネの槍が激突する。競り負け吹き飛ばされたのは――マハムートの方だった。
line = "マハムートの爪撃と、ヒルディオーネの槍が激突する。競り負け吹き飛ばされたのは――マハムートの方だった。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ぐっ……！？」
line = "「ぐっ……！？」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# （ヒルディオーネの覚醒フォームの<ruby=フィジカル>身体能力</ruby>は、竜の力を最大限引き出せる私のノヴァフォームをも上回っている……！）
line = "（ヒルディオーネの覚醒フォームの<ruby>身体能力<rt>フィジカル</rt></ruby>は、竜の力を最大限引き出せる私のノヴァフォームをも上回っている……！）"

[[dialogue]]
speaker = "マハムート（覚醒）"
# （いや、これは能力で『物理法則に干渉』している……！？　だからこそ、竜の膂力すらも真正面から吹き飛ばすことができる……！）
line = "（いや、これは能力で『物理法則に干渉』している……！？　だからこそ、竜の膂力すらも真正面から吹き飛ばすことができる……！）"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「っ……だとしても！　――引力球！」
line = "「っ……だとしても！　――引力球！」"

[[dialogue]]
speaker = "unk"
# マハムートは無数の引力球を全方位に発生させ、ヒルディオーネの動きに制限をかけようとするが――
line = "マハムートは無数の引力球を全方位に発生させ、ヒルディオーネの動きに制限をかけようとするが――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「――全て打ち砕きますわ！！　ミラージュペネトレイターッ！！！」
line = "「――全て打ち砕きますわ！！　ミラージュペネトレイターッ！！！」"

[[dialogue]]
speaker = "unk"
# 槍のドリルが回転し、そこから発せられる螺旋の波動が竜巻のごとく、周囲の引力球を飲み込み、一掃する。
line = "槍のドリルが回転し、そこから発せられる螺旋の波動が竜巻のごとく、周囲の引力球を飲み込み、一掃する。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# （これまで１度も砕けなかった引力球が、ドリルの回転の余波だけであっさりと破壊される……！）
line = "（これまで１度も砕けなかった引力球が、ドリルの回転の余波だけであっさりと破壊される……！）"

[[dialogue]]
speaker = "マハムート（覚醒）"
# （あの槍の前ではもう、迂闊に引力球を使えない！）
line = "（あの槍の前ではもう、迂闊に引力球を使えない！）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「今ですわ！　ミーティアスマッシャーッ！！」
line = "「今ですわ！　ミーティアスマッシャーッ！！」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「っ……！！」
line = "「っ……！！」"

[[dialogue]]
speaker = "unk"
# 一瞬で距離を詰めたヒルディオーネが、マハムートに拳を叩き込む。咄嗟に防御の体勢を取るマハムートだが、再び吹き飛ばされる。
line = "一瞬で距離を詰めたヒルディオーネが、マハムートに拳を叩き込む。咄嗟に防御の体勢を取るマハムートだが、再び吹き飛ばされる。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# （このまま一気に押し切りますわ！）
line = "（このまま一気に押し切りますわ！）"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「っ……甘いわよ！　デストームテイルッ！！」
line = "「っ……甘いわよ！　デストームテイルッ！！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「かはっ――！？」
line = "「かはっ――！？」"

[[dialogue]]
speaker = "unk"
# ヒルディオーネが繰り出した蹴りを受け流し、マハムートがカウンターで尻尾の鉄球を<ruby=みぞおち>鳩尾</ruby>に叩き込む。
line = "ヒルディオーネが繰り出した蹴りを受け流し、マハムートがカウンターで尻尾の鉄球を<ruby>鳩尾<rt>みぞおち</rt></ruby>に叩き込む。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……どうやら、覚醒したばかりで、まだ力の加減と感覚の調整が間に合ってないようね」
line = "「……どうやら、覚醒したばかりで、まだ力の加減と感覚の調整が間に合ってないようね」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「いくら<ruby=フィジカル>身体能力</ruby>で上回ろうと、そこに隙がある限りは――」
line = "「いくら<ruby>身体能力<rt>フィジカル</rt></ruby>で上回ろうと、そこに隙がある限りは――」"

[[dialogue]]
speaker = "unk"
# 今度はマハムートが一気に距離を詰め、ヒルディオーネの蹴りをかわして、ガードの上から強烈な拳の一撃を叩きこむ。
line = "今度はマハムートが一気に距離を詰め、ヒルディオーネの蹴りをかわして、ガードの上から強烈な拳の一撃を叩きこむ。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「この私を圧倒できるなどと、決して思い上がらないことねっ、ヒルディオーネ！」
line = "「この私を圧倒できるなどと、決して思い上がらないことねっ、ヒルディオーネ！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「くうぅっ……！？」
line = "「くうぅっ……！？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# （<ruby=わたくし>私</ruby>には覚醒した力をすぐさま使いこなせるような<ruby=センス>才能</ruby>はない。そして、覚醒フォームの練度はマムの方が遥かに上……！　その『技』に今、打ち勝つには――）
line = "（<ruby>私<rt>わたくし</rt></ruby>には覚醒した力をすぐさま使いこなせるような<ruby>才能<rt>センス</rt></ruby>はない。そして、覚醒フォームの練度はマムの方が遥かに上……！　その『技』に今、打ち勝つには――）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# （絶対に負けないという強い意志！　『心』で上回るしかありませんわ！）
line = "（絶対に負けないという強い意志！　『心』で上回るしかありませんわ！）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「はああぁっーーー！！」
line = "「はああぁっーーー！！」"

[[dialogue]]
speaker = "unk"
# 全力で再び加速し、マハムートと格闘戦を繰り広げるヒルディオーネ。
line = "全力で再び加速し、マハムートと格闘戦を繰り広げるヒルディオーネ。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ふんっ――！！」
line = "「ふんっ――！！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「はぁっ――！！」
line = "「はぁっ――！！」"

[[dialogue]]
speaker = "unk"
# 吹き飛ばし、吹き飛ばされの応酬を繰り返し、やがてマハムートが手の平をかざす。
line = "吹き飛ばし、吹き飛ばされの応酬を繰り返し、やがてマハムートが手の平をかざす。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「森羅万象――引力操作！」
line = "「森羅万象――引力操作！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「っ……！！」
line = "「っ……！！」"

[[dialogue]]
speaker = "unk"
# ヒルディオーネに足枷をはめるように引力球が形成され、その場に拘束される。
line = "ヒルディオーネに足枷をはめるように引力球が形成され、その場に拘束される。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「たった１つに能力を収束させた特製引力球よ。あなたのドリルで無効化できるにしても、一瞬の隙は生まれる」
line = "「たった１つに能力を収束させた特製引力球よ。あなたのドリルで無効化できるにしても、一瞬の隙は生まれる」"

[[dialogue]]
speaker = "unk"
# マハムートが口を開き、これまでで最大の星力が急速に１点の炎球となって、収束する。
line = "マハムートが口を開き、これまでで最大の星力が急速に１点の炎球となって、収束する。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「だから――この一撃で、終わらせるわ！！」
line = "「だから――この一撃で、終わらせるわ！！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# （避けられない……！　いや――）
line = "（避けられない……！　いや――）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# （だったら、ここで打ち勝つしかありませんの！！）
line = "（だったら、ここで打ち勝つしかありませんの！！）"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「ドラゴニックノヴァフレアーーーッ！！！」
line = "「ドラゴニックノヴァフレアーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# マハムートが放つ全力の<ruby=ドラゴンブレス>炎の息吹</ruby>。ヒルディオーネはそれを真正面から、今できる最大の一撃で迎え撃つ。
line = "マハムートが放つ全力の<ruby>炎の息吹<rt>ドラゴンブレス</rt></ruby>。ヒルディオーネはそれを真正面から、今できる最大の一撃で迎え撃つ。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「――不可能を超えて、限界のその先へ！」
line = "「――不可能を超えて、限界のその先へ！」"

[[dialogue]]
speaker = "unk"
# 槍のドリルが回転し、水の星力が眩い輝きを纏って螺旋を描く。
line = "槍のドリルが回転し、水の星力が眩い輝きを纏って螺旋を描く。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「打ち砕け！！　アンリミテッドブレイカァァァーーーッ！！！」
line = "「打ち砕け！！　アンリミテッドブレイカァァァーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# 両者の全力がぶつかり合い、せめぎ合う。
line = "両者の全力がぶつかり合い、せめぎ合う。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「はあああぁぁぁーーーっ！！！」
line = "「はあああぁぁぁーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# 洗練されたマムの本気の星力が、ヒルディオーネの螺旋を飲み込んでいく。
line = "洗練されたマムの本気の星力が、ヒルディオーネの螺旋を飲み込んでいく。"

[[dialogue]]
speaker = "unk"
# だが、ヒルディオーネは決して一歩も引かない。
line = "だが、ヒルディオーネは決して一歩も引かない。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# （……敗北には慣れていますの。後輩にも、何度もみっともない負け姿を晒してきましたわ）
line = "（……敗北には慣れていますの。後輩にも、何度もみっともない負け姿を晒してきましたわ）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# （それでも、言ってくれましたの）
line = "（それでも、言ってくれましたの）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# （お姉様はお姉様らしく、一番カッコいいところを見せて、と）
line = "（お姉様はお姉様らしく、一番カッコいいところを見せて、と）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「だから――」
line = "「だから――」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「私は何度負けたって！」
line = "「私は何度負けたって！」"

[[dialogue]]
speaker = "unk"
# 己の可能性を信じる『心』でドリルを回し、螺旋を描く！！
line = "己の可能性を信じる『心』でドリルを回し、螺旋を描く！！"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「何度だって、立ち上がり続けてみせますわぁぁぁーーーッ！！！」
line = "「何度だって、立ち上がり続けてみせますわぁぁぁーーーッ！！！」"

[[dialogue]]
speaker = "unk"
# 果たして、全力の撃ち合いの末、最後まで立っていたのは――
line = "果たして、全力の撃ち合いの末、最後まで立っていたのは――"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「くっ……」
line = "「くっ……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「はぁ……はぁ……はぁ……」
line = "「はぁ……はぁ……はぁ……」"

[[dialogue]]
speaker = "unk"
# 妃竜院マハムートではなく――千園寺ヒルディオーネの方だった。
line = "妃竜院マハムートではなく――千園寺ヒルディオーネの方だった。"

[[dialogue]]
speaker = "寮生Ｃ"
# 「……あ」
line = "「……あ」"

[[dialogue]]
speaker = "寮生Ｄ"
# 「お姉様が……」
line = "「お姉様が……」"

[[dialogue]]
speaker = "寮生Ｅ"
# 「お姉様がついに……！」
line = "「お姉様がついに……！」"

[[dialogue]]
speaker = "フェニエル"
# 「っ……マムに……勝ちました……！」
line = "「っ……マムに……勝ちました……！」"

[[dialogue]]
speaker = "紅明"
# 『しょ、勝者は――』
line = "『しょ、勝者は――』"

[[dialogue]]
speaker = "紅明"
# 『千園寺ヒルディオーネ先輩だぁぁぁーーーっ！！　あの最強無敗のマムを打ち破り、星霊舞闘会、ついに初優勝ぉぉぉぁーーーっ！！！』
line = "『千園寺ヒルディオーネ先輩だぁぁぁーーーっ！！　あの最強無敗のマムを打ち破り、星霊舞闘会、ついに初優勝ぉぉぉぁーーーっ！！！』"

[[dialogue]]
speaker = "unk"
# 紅明の宣言と同時に、大歓声に湧き立つアリーナ。
line = "紅明の宣言と同時に、大歓声に湧き立つアリーナ。"

[[dialogue]]
speaker = "寮生Ａ"
# 「お姉様が勝った……！　ずっと……ずっと追いかけ続けてきた、マムに……！」
line = "「お姉様が勝った……！　ずっと……ずっと追いかけ続けてきた、マムに……！」"

[[dialogue]]
speaker = "寮生Ｂ"
# 「すごいですわ……！　お姉様、本当にすごい……！」
line = "「すごいですわ……！　お姉様、本当にすごい……！」"

[[dialogue]]
speaker = "unk"
# 嗚咽を漏らし、涙をボロボロとこぼす寮生たち。
line = "嗚咽を漏らし、涙をボロボロとこぼす寮生たち。"

[[dialogue]]
speaker = "unk"
# そんな中、ヒルディオーネは息を整えながら、倒れているマムへとゆっくりと歩み寄る。
line = "そんな中、ヒルディオーネは息を整えながら、倒れているマムへとゆっくりと歩み寄る。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「……マム」
line = "「……マム」"

[[dialogue]]
speaker = "unk"
# 声を掛け、手を差し出す。
line = "声を掛け、手を差し出す。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# マハムートは黙ってその手を取り、起き上がる。
line = "マハムートは黙ってその手を取り、起き上がる。"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……私」
line = "「……私」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「今……死ぬほど悔しいわ」
line = "「今……死ぬほど悔しいわ」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ええ。そうでしょうね」
line = "「ええ。そうでしょうね」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「私もいつも思っておりますわ。だって――宿命のライバルですもの」
line = "「私もいつも思っておりますわ。だって――宿命のライバルですもの」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「……ふっ」
line = "「……ふっ」"

[[dialogue]]
speaker = "マハムート（覚醒）"
# 「優勝おめでとう、ヒルディー」
line = "「優勝おめでとう、ヒルディー」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ありがとうございますわ、マム」
line = "「ありがとうございますわ、マム」"

[[dialogue]]
speaker = "unk"
# 大歓声と拍手に包まれる中、２人は柔らかな表情を浮かべて、握手を交わすのだった――
line = "大歓声と拍手に包まれる中、２人は柔らかな表情を浮かべて、握手を交わすのだった――"
