[[dialogue]]
speaker = "ウズメイア"
# 「くんくん……いるいる、次のターゲット発見だし♪」
line = "「くんくん……いるいる、次のターゲット発見だし♪」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ナイス追跡ですわ！　匂いで相手の居場所を探り当てられるなんて、とんでもなく便利な能力ですわ！」
line = "「ナイス追跡ですわ！　匂いで相手の居場所を探り当てられるなんて、とんでもなく便利な能力ですわ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ、そうかな？」
line = "「えへへ、そうかな？」"

[[dialogue]]
speaker = "ソフィア"
# 「ですがなぜネーゼマインさんをターゲットに？」
line = "「ですがなぜネーゼマインさんをターゲットに？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「もちろん小癪なあのヤローを一度、ぎゃふんと言わせてやりたいからですわ！」
line = "「もちろん小癪なあのヤローを一度、ぎゃふんと言わせてやりたいからですわ！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「さあ、後は私の作戦通り頼みましたわよ！」
line = "「さあ、後は私の作戦通り頼みましたわよ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「オッケー、それじゃソフィ、お願いするし♪」
line = "「オッケー、それじゃソフィ、お願いするし♪」"

[[dialogue]]
speaker = "ソフィア"
# 「分かりました。では、失礼して……ぎゅーっ、と」
line = "「分かりました。では、失礼して……ぎゅーっ、と」"

[[dialogue]]
speaker = "ヒトリ"
# 「はうっ！？　ソフィアさんが背中からウズメイアさんをぎゅーって抱きしめて」
line = "「はうっ！？　ソフィアさんが背中からウズメイアさんをぎゅーって抱きしめて」"

[[dialogue]]
speaker = "ヒトリ"
# 「イタズラで姿を隠すためとはいえ、なんだかとってもてぇてぇの香りがしますね、ゆーちゃん♪」
line = "「イタズラで姿を隠すためとはいえ、なんだかとってもてぇてぇの香りがしますね、ゆーちゃん♪」"

[[dialogue]]
speaker = "ゆーちゃん"
# 「てーてー」
line = "「てーてー」"

[[dialogue]]
speaker = "ヒトリ"
# 「あっ……透明になってしまうと姿が消えてしまうのですか」
line = "「あっ……透明になってしまうと姿が消えてしまうのですか」"

[[dialogue]]
speaker = "ヒトリ"
# 「２人のてぇてぇが見えなくなってしまうのは難点ですね……でも見えないからこそのこの感じも……」
line = "「２人のてぇてぇが見えなくなってしまうのは難点ですね……でも見えないからこそのこの感じも……」"

[[dialogue]]
speaker = "ソフィア"
# 「変な想像を膨らませるのはやめてください！」
line = "「変な想像を膨らませるのはやめてください！」"

[[dialogue]]
speaker = "ウズメイア"
# 「えへへ、いーじゃん。見えないのをいいことにソフィにイタズラしちゃおうかな？　こちょこちょこちょ、っと」
line = "「えへへ、いーじゃん。見えないのをいいことにソフィにイタズラしちゃおうかな？　こちょこちょこちょ、っと」"

[[dialogue]]
speaker = "ソフィア"
# 「ひゃっ！？　や、やめなさいって！」
line = "「ひゃっ！？　や、やめなさいって！」"

[[dialogue]]
speaker = "ヒトリ"
# 「こ、声だけでもてぇてぇです……姿が見えない状態で２人はどんなことをしているんでしょう……」
line = "「こ、声だけでもてぇてぇです……姿が見えない状態で２人はどんなことをしているんでしょう……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「遊んでる場合じゃねーですわよ！　ターゲットに気付かれる前に作戦決行ですわ！」
line = "「遊んでる場合じゃねーですわよ！　ターゲットに気付かれる前に作戦決行ですわ！」"

[[dialogue]]
speaker = "ソフィア＆ウズメイア"
# 「らじゃー！」
line = "「らじゃー！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いやはや、学園はどこもかしこも盛り上がってるね～」
line = "「いやはや、学園はどこもかしこも盛り上がってるね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ひとりでぶらぶらしてるのも飽きてきたし、セナリィが忙しくしてるなら少しくらい手伝いに行ってあげようかな～」
line = "「ひとりでぶらぶらしてるのも飽きてきたし、セナリィが忙しくしてるなら少しくらい手伝いに行ってあげようかな～」"

[[dialogue]]
speaker = "ソフィア"
# （準備はいいですか？）
line = "（準備はいいですか？）"

[[dialogue]]
speaker = "ウズメイア"
# （いつでもいいし！）
line = "（いつでもいいし！）"

[[dialogue]]
speaker = "ソフィア"
# （では、ウズメイア砲、発射体勢よろし……３、２、１、発射っ！！！）
line = "（では、ウズメイア砲、発射体勢よろし……３、２、１、発射っ！！！）"

[[dialogue]]
speaker = "ウズメイア"
# 「ガオガオ<emoji=heart04>　トリックオアトリート♪　お菓子をくれなきゃイタズラしちゃうぞーっ！」
line = "「ガオガオ<emoji=heart04>　トリックオアトリート♪　お菓子をくれなきゃイタズラしちゃうぞーっ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ、あれ……？」
line = "「あ、あれ……？」"

[[dialogue]]
speaker = "ソフィア"
# 「これは予想外の反応です……」
line = "「これは予想外の反応です……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ぁ……ぅ……」
line = "「ぁ……ぅ……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ほほほ！　声を上げることも出来ずにへたり込むなんて情けないですわね、マイン！」
line = "「ほほほ！　声を上げることも出来ずにへたり込むなんて情けないですわね、マイン！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィ……」
line = "「セナリィ……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ひ、酷いよ……私がこういうの苦手だって知ってるくせに……」
line = "「ひ、酷いよ……私がこういうの苦手だって知ってるくせに……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「は……？　そ、そんなの初耳ですわよ……？」
line = "「は……？　そ、そんなの初耳ですわよ……？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「うっ、ぐすっ……セナリィのこと、見損なった……私、ゴールデングースに入るのやめます……」
line = "「うっ、ぐすっ……セナリィのこと、見損なった……私、ゴールデングースに入るのやめます……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ええっ！！！？」
line = "「ええっ！！！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今後は仕事も受けないし着信も拒否します。金庫のお金も全部もらうし、対抗組織を作ってヒマワリちゃんとミウちゃんも引き抜きます。あとアジトも奪います」
line = "「今後は仕事も受けないし着信も拒否します。金庫のお金も全部もらうし、対抗組織を作ってヒマワリちゃんとミウちゃんも引き抜きます。あとアジトも奪います」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ちょ、ちょいと待ちやがれですわ！　いくら何でもそれは横暴ですわ！」
line = "「ちょ、ちょいと待ちやがれですわ！　いくら何でもそれは横暴ですわ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ううっ、ぐすっ……しくしく……ううううっ……」
line = "「ううっ、ぐすっ……しくしく……ううううっ……」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「あうぅ……そ、そんなに泣くことないじゃありませんの。いい加減に泣き止んで──」
line = "「あうぅ……そ、そんなに泣くことないじゃありませんの。いい加減に泣き止んで──」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「わっ！！！！！」
line = "「わっ！！！！！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「ほぎゃあああああっ！！！！！！」
line = "「ほぎゃあああああっ！！！！！！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははははっ、嘘だよ～♪　びっくりした？」
line = "「きゃははははっ、嘘だよ～♪　びっくりした？」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「び、ビックリしましたわ、もう！！」
line = "「び、ビックリしましたわ、もう！！」"

[[dialogue]]
speaker = "ウズメイア"
# 「もしかして最初から気付いてたのかな？」
line = "「もしかして最初から気付いてたのかな？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁね～。でっかい叫び声が聞こえたからさ。ほぎゃーーー、って情けない声がね☆」
line = "「まぁね～。でっかい叫び声が聞こえたからさ。ほぎゃーーー、って情けない声がね☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「で、セナリィの事だからぜーったい私のところにちょっかいかけに来るだろうなって。そしたら案の定だったよ、にひひ、残念でした～♪」
line = "「で、セナリィの事だからぜーったい私のところにちょっかいかけに来るだろうなって。そしたら案の定だったよ、にひひ、残念でした～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「すっご、完全に読み切ってるし！」
line = "「すっご、完全に読み切ってるし！」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「キーッ、悔しい！！！」
line = "「キーッ、悔しい！！！」"

[[dialogue]]
speaker = "ソフィア"
# 「イタズラするつもりが、逆にイタズラされてしまいましたね」
line = "「イタズラするつもりが、逆にイタズラされてしまいましたね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なになに？　みんなはイタズラがしたいの？」
line = "「なになに？　みんなはイタズラがしたいの？」"

[[dialogue]]
speaker = "ソフィア"
# 「そうなんです。このハロウィンフォームを解除するために必要なことなので」
line = "「そうなんです。このハロウィンフォームを解除するために必要なことなので」"

[[dialogue]]
speaker = "ウズメイア"
# 「そのためにゆゆ姫ちゃんとハロウィンを思いっきり楽しむし♪」
line = "「そのためにゆゆ姫ちゃんとハロウィンを思いっきり楽しむし♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「なぁるほどね。了解了解、私もイタズラのアイデアくらいなら協力するよ♪」
line = "「なぁるほどね。了解了解、私もイタズラのアイデアくらいなら協力するよ♪」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「あんまりえげつないのはダメですわよ」
line = "「あんまりえげつないのはダメですわよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「その辺の空気は読めるから。セナリィのポンコツなイタズラよりはまともな作戦を立てられると思うよ」
line = "「その辺の空気は読めるから。セナリィのポンコツなイタズラよりはまともな作戦を立てられると思うよ」"

[[dialogue]]
speaker = "セナリィ（覚醒）"
# 「なぁんですのぉっ！！！！」
line = "「なぁんですのぉっ！！！！」"
