[[dialogue]]
speaker = "unk"
# 第１話,新しい学園長,P
line = "第１話,新しい学園長,P"

[[dialogue]]
speaker = "unk"
# 廊下を歩いていると、窓の外を眺めながら深いため息をついている百合崎ミアを見つけた。
line = "廊下を歩いていると、窓の外を眺めながら深いため息をついている百合崎ミアを見つけた。"

[[dialogue]]
speaker = "ミア"
# 「あっ、会長さん」
line = "「あっ、会長さん」"

[[dialogue]]
speaker = "ミア"
# 「実は……さっき校則違反をしている生徒を見かけたから注意しようとしたんだけど……」
line = "「実は……さっき校則違反をしている生徒を見かけたから注意しようとしたんだけど……」"

[[dialogue]]
speaker = "ミア"
# 「そしたらそのヒト、私のこと迷子の附属生扱いして、ぜんぜん言う事を聞いてくれなかったから」
line = "「そしたらそのヒト、私のこと迷子の附属生扱いして、ぜんぜん言う事を聞いてくれなかったから」"

[[dialogue]]
speaker = "ミア"
# 「それでカッとなって、思いっきり怒鳴りつけちゃったんだ……」
line = "「それでカッとなって、思いっきり怒鳴りつけちゃったんだ……」"

[[dialogue]]
speaker = "ミア"
# 「コラプサーとの戦いを通じて、精神的に少しは成長したつもりだったんだけど……」
line = "「コラプサーとの戦いを通じて、精神的に少しは成長したつもりだったんだけど……」"

[[dialogue]]
speaker = "ミア"
# 「でも背が低いことをあれこれ言われてしまって、そうしたら自分が抑えられなくなっちゃって」
line = "「でも背が低いことをあれこれ言われてしまって、そうしたら自分が抑えられなくなっちゃって」"

[[dialogue]]
speaker = "unk"
# 爆発しちゃったんだ
line = "爆発しちゃったんだ"

[[dialogue]]
speaker = "ミア"
# 「ええ……そんなの軽く受け流しとけばよかったのに」
line = "「ええ……そんなの軽く受け流しとけばよかったのに」"

[[dialogue]]
speaker = "ミア"
# 「どうして私、いつまでたっても大人な振る舞いができないんだろ？」
line = "「どうして私、いつまでたっても大人な振る舞いができないんだろ？」"

[[dialogue]]
speaker = "ミア"
# 「全然成長できてないじゃないって、そんなこと思ってたら……ちょっと落ち込んできちゃって……えへへ」
line = "「全然成長できてないじゃないって、そんなこと思ってたら……ちょっと落ち込んできちゃって……えへへ」"

[[dialogue]]
speaker = "unk"
# 相手のやつの方が失礼だ！
line = "相手のやつの方が失礼だ！"

[[dialogue]]
speaker = "unk"
# ミアは何も悪くない！
line = "ミアは何も悪くない！"

[[dialogue]]
speaker = "ミア"
# 「……どの口が言ってるの？　会長さんだって初めて会った時、私のこと附属生だって勘違いしてたじゃない」
line = "「……どの口が言ってるの？　会長さんだって初めて会った時、私のこと附属生だって勘違いしてたじゃない」"

[[dialogue]]
speaker = "シノ"
# 「あら、あなたは……緋宮クロトさんじゃないですか」
line = "「あら、あなたは……緋宮クロトさんじゃないですか」"

[[dialogue]]
speaker = "unk"
# ミアと話しているところに声をかけてきたのは、新しく学園長に就任したばかりの女性──十六夜シノさんだった。
line = "ミアと話しているところに声をかけてきたのは、新しく学園長に就任したばかりの女性──十六夜シノさんだった。"

[[dialogue]]
speaker = "ミア"
# 「この方は……会長さんのお知り合い？」
line = "「この方は……会長さんのお知り合い？」"

[[dialogue]]
speaker = "unk"
# 新しい学園長さんだよ
line = "新しい学園長さんだよ"

[[dialogue]]
speaker = "ミア"
# 「えっ！？」
line = "「えっ！？」"

[[dialogue]]
speaker = "シノ"
# 「初めまして、<ruby=いざよい>十六夜</ruby>シノです。近日中に発表があると思いますが、この度新星学園の学園長に就任しました」
line = "「初めまして、<ruby>十六夜<rt>いざよい</rt></ruby>シノです。近日中に発表があると思いますが、この度新星学園の学園長に就任しました」"

[[dialogue]]
speaker = "ミア"
# 「そ、そうだったんですか！　大変失礼しました。新星学園１年、風紀委員の<ruby=ゆりさき>百合崎</ruby>ミアです」
line = "「そ、そうだったんですか！　大変失礼しました。新星学園１年、風紀委員の<ruby>百合崎<rt>ゆりさき</rt></ruby>ミアです」"

[[dialogue]]
speaker = "シノ"
# 「今後ともよろしくお願いします」
line = "「今後ともよろしくお願いします」"

[[dialogue]]
speaker = "シノ"
# 「それで……ミアさんは何か落ち込むようなことがあったのですか？」
line = "「それで……ミアさんは何か落ち込むようなことがあったのですか？」"

[[dialogue]]
speaker = "ミア"
# 「は、はい。ええと、実は──」
line = "「は、はい。ええと、実は──」"

[[dialogue]]
speaker = "unk"
# それからシノさんは、ミアがその生徒を注意した時の状況や、相手とのやり取りを細かく確認していった。
line = "それからシノさんは、ミアがその生徒を注意した時の状況や、相手とのやり取りを細かく確認していった。"

[[dialogue]]
speaker = "unk"
# 急がず、丁寧に、親身な様子でミアの話を引き出していく。
line = "急がず、丁寧に、親身な様子でミアの話を引き出していく。"

[[dialogue]]
speaker = "unk"
# そして一通り話を聞き終わると、満面の笑みを浮かべながら大きく頷いてみせた。
line = "そして一通り話を聞き終わると、満面の笑みを浮かべながら大きく頷いてみせた。"

[[dialogue]]
speaker = "シノ"
# 「ありがとうございます。何があったのかとてもよく分かりました」
line = "「ありがとうございます。何があったのかとてもよく分かりました」"

[[dialogue]]
speaker = "シノ"
# 「それで……ミアさんは先走ってしまったり、つい頭に血が上ってしまう自分に落ち込んでしまっていた、と……」
line = "「それで……ミアさんは先走ってしまったり、つい頭に血が上ってしまう自分に落ち込んでしまっていた、と……」"

[[dialogue]]
speaker = "ミア"
# 「はい……」
line = "「はい……」"

[[dialogue]]
speaker = "シノ"
# 「自分の欠点を認め、それを改めようと努力することは、とても大変な事です」
line = "「自分の欠点を認め、それを改めようと努力することは、とても大変な事です」"

[[dialogue]]
speaker = "シノ"
# 「でもミアさんはその事から逃げていません。真剣に向き合っています。これは本当に尊敬すべきことだと思います」
line = "「でもミアさんはその事から逃げていません。真剣に向き合っています。これは本当に尊敬すべきことだと思います」"

[[dialogue]]
speaker = "ミア"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "シノ"
# 「努力は裏切りません。きっと実を結ぶはずですよ」
line = "「努力は裏切りません。きっと実を結ぶはずですよ」"

[[dialogue]]
speaker = "シノ"
# 「だから落ち込まなくても大丈夫、自分を責めなくても大丈夫」
line = "「だから落ち込まなくても大丈夫、自分を責めなくても大丈夫」"

[[dialogue]]
speaker = "シノ"
# 「それよりもっと褒めてあげましょう、頑張り屋のミアさんのことを、あなたが１番に、ね？」
line = "「それよりもっと褒めてあげましょう、頑張り屋のミアさんのことを、あなたが１番に、ね？」"

[[dialogue]]
speaker = "ミア"
# 「学園長……あ、ありがとうございます！」
line = "「学園長……あ、ありがとうございます！」"

[[dialogue]]
speaker = "unk"
# 元気、出たみたいだね
line = "元気、出たみたいだね"

[[dialogue]]
speaker = "ミア"
# 「ええ！　<ruby=はくじつせいてん>白日晴天</ruby>、学園長のおかげで心の曇りはすっかり晴れました。これからも一層、風紀委員の活動に打ち込めそうです」
line = "「ええ！　<ruby>白日晴天<rt>はくじつせいてん</rt></ruby>、学園長のおかげで心の曇りはすっかり晴れました。これからも一層、風紀委員の活動に打ち込めそうです」"

[[dialogue]]
speaker = "ミア"
# 「って言ってるそばから校則違反発見です！　っと、今度は先走らないように注意して……」
line = "「って言ってるそばから校則違反発見です！　っと、今度は先走らないように注意して……」"

[[dialogue]]
speaker = "ミア"
# 「そこのヒトー！　ちょっといいですかー！」
line = "「そこのヒトー！　ちょっといいですかー！」"

[[dialogue]]
speaker = "シノ"
# 「ふふ、力になれたようで良かったです。さて……私は彼女に注意されたという生徒さんからもお話を聞いてきますね」
line = "「ふふ、力になれたようで良かったです。さて……私は彼女に注意されたという生徒さんからもお話を聞いてきますね」"

[[dialogue]]
speaker = "シノ"
# 「ええ、そうですね。一方の側の話しか聞かずに全てを決めつけてしまうのは良くありませんから」
line = "「ええ、そうですね。一方の側の話しか聞かずに全てを決めつけてしまうのは良くありませんから」"

[[dialogue]]
speaker = "シノ"
# 「問題ないですよ。お相手の方が誰なのかは、ミアさんのお話で目星はついています」
line = "「問題ないですよ。お相手の方が誰なのかは、ミアさんのお話で目星はついています」"

[[dialogue]]
speaker = "unk"
# 事も無げに言って、軽い会釈とともにその場を去っていった。
line = "事も無げに言って、軽い会釈とともにその場を去っていった。"

[[dialogue]]
speaker = "unk"
# 確かにミアから相手のことについての話も聞いていたけれど、それだけで特定するには情報が足りなさすぎる。
line = "確かにミアから相手のことについての話も聞いていたけれど、それだけで特定するには情報が足りなさすぎる。"

[[dialogue]]
speaker = "unk"
# それでも目星が付けられたのは、学園の生徒の情報がしっかり頭に叩き込まれているからだろう。就任が決まってまだ時間も経っていないというのに。
line = "それでも目星が付けられたのは、学園の生徒の情報がしっかり頭に叩き込まれているからだろう。就任が決まってまだ時間も経っていないというのに。"

[[dialogue]]
speaker = "unk"
# そして、翌日──
line = "そして、翌日──"

[[dialogue]]
speaker = "unk"
# 昨日と同じ場所でシノさんに呼び止められた。
line = "昨日と同じ場所でシノさんに呼び止められた。"

[[dialogue]]
speaker = "シノ"
# 「会長さん。ミアさんから注意を受けたという生徒さんともお話が出来ましたよ」
line = "「会長さん。ミアさんから注意を受けたという生徒さんともお話が出来ましたよ」"

[[dialogue]]
speaker = "シノ"
# 「最初、附属生と間違えてしまったことに悪気はなかったようなのですが、その後身長についてからかったり、注意を無視したのは意図的だったそうです」
line = "「最初、附属生と間違えてしまったことに悪気はなかったようなのですが、その後身長についてからかったり、注意を無視したのは意図的だったそうです」"

[[dialogue]]
speaker = "シノ"
# 「語気荒く注意されたことが気に入らず、ついつい反発してしまったとのことでした」
line = "「語気荒く注意されたことが気に入らず、ついつい反発してしまったとのことでした」"

[[dialogue]]
speaker = "シノ"
# 「ミアさんがとても落ち込んでしまっているという話をすると、すぐに彼女のところへ謝罪しに行ってくれました」
line = "「ミアさんがとても落ち込んでしまっているという話をすると、すぐに彼女のところへ謝罪しに行ってくれました」"

[[dialogue]]
speaker = "シノ"
# 「謝りに来た彼に対して、ミアさんも今度は熱くならずに対応できたようです」
line = "「謝りに来た彼に対して、ミアさんも今度は熱くならずに対応できたようです」"

[[dialogue]]
speaker = "シノ"
# 「これが彼女の自信に、少しでも繋がってくれれば良いのですが……」
line = "「これが彼女の自信に、少しでも繋がってくれれば良いのですが……」"

[[dialogue]]
speaker = "unk"
# 大丈夫、きっと繋がりましたよ！
line = "大丈夫、きっと繋がりましたよ！"

[[dialogue]]
speaker = "シノ"
# 「ふふっ、星徒会長さんからのお墨付きをいただけたなら安心ですね」
line = "「ふふっ、星徒会長さんからのお墨付きをいただけたなら安心ですね」"

[[dialogue]]
speaker = "シノ"
# 「えっ？　いえいえ、そんなに褒められると恥ずかしいです……まだ学園長に就任することになったばかりで、右も左も分からない状態なのですから」
line = "「えっ？　いえいえ、そんなに褒められると恥ずかしいです……まだ学園長に就任することになったばかりで、右も左も分からない状態なのですから」"

[[dialogue]]
speaker = "シノ"
# 「会長さんにはこれからも色々頼ることになるかと思います。その時は力を貸してくださいね」
line = "「会長さんにはこれからも色々頼ることになるかと思います。その時は力を貸してくださいね」"

[[dialogue]]
speaker = "unk"
# もちろんです！
line = "もちろんです！"

[[dialogue]]
speaker = "シノ"
# 「はは……ありがとうございます」
line = "「はは……ありがとうございます」"

[[dialogue]]
speaker = "シノ"
# 「では会長さん、お言葉に甘えてもう少しだけ、お時間をいただいてもいいですか？」
line = "「では会長さん、お言葉に甘えてもう少しだけ、お時間をいただいてもいいですか？」"

[[dialogue]]
speaker = "シノ"
# 「初めてお会いした時もいろいろ教えてもらいましたが、もっともっと学園のことについて教えて欲しいんです」
line = "「初めてお会いした時もいろいろ教えてもらいましたが、もっともっと学園のことについて教えて欲しいんです」"

[[dialogue]]
speaker = "シノ"
# 「そうですね、今度は会長さんの個人的なことについても、お願いしますね……ふふ」
line = "「そうですね、今度は会長さんの個人的なことについても、お願いしますね……ふふ」"

[[dialogue]]
speaker = "unk"
# そう言って、上品な笑みを浮かべる。
line = "そう言って、上品な笑みを浮かべる。"

[[dialogue]]
speaker = "unk"
# こうして、この教育熱心な若き学園長に学園の事について教えることが、日常になっていったのだった。
line = "こうして、この教育熱心な若き学園長に学園の事について教えることが、日常になっていったのだった。"
