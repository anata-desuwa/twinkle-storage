[[dialogue]]
speaker = "unk"
# 第１話,ナミエルたちのお泊り会,P
line = "第１話,ナミエルたちのお泊り会,P"

[[dialogue]]
speaker = "unk"
# それは、ナミエルとアムがクリスマスフォームになり、１メートル以上離れられない二人三脚状態になってしまっていた、ある日のこと。
line = "それは、ナミエルとアムがクリスマスフォームになり、１メートル以上離れられない二人三脚状態になってしまっていた、ある日のこと。"

[[dialogue]]
speaker = "unk"
# ２人は離れられない状態のままで上手く戦えるようにと、運動場で訓練を行っていた。
line = "２人は離れられない状態のままで上手く戦えるようにと、運動場で訓練を行っていた。"

[[dialogue]]
speaker = "アム"
# 「よしっ、ドッジボールの成果が出てるね、ナミエル♪」
line = "「よしっ、ドッジボールの成果が出てるね、ナミエル♪」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、アム先輩。これならモンスターが現れても、なんとか戦えそうです。ただ……」
line = "「はい、アム先輩。これならモンスターが現れても、なんとか戦えそうです。ただ……」"

[[dialogue]]
speaker = "ナミエル"
# 「先程からその……強い視線をずっと、背中に感じているのですが……」
line = "「先程からその……強い視線をずっと、背中に感じているのですが……」"

[[dialogue]]
speaker = "unk"
# ナミエルがチラッと少し離れた物陰に目をやると、そこからこちらを覗き見ている人物が１人。
line = "ナミエルがチラッと少し離れた物陰に目をやると、そこからこちらを覗き見ている人物が１人。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# それは、アムのライバルにしてクラスメイトでもある、附属校３年生の『桜十路エルデリーゼ』であった。
line = "それは、アムのライバルにしてクラスメイトでもある、附属校３年生の『桜十路エルデリーゼ』であった。"

[[dialogue]]
speaker = "アム"
# 「えっと……エルゼ？　なんでわざわざ隠れて覗いてるの？」
line = "「えっと……エルゼ？　なんでわざわざ隠れて覗いてるの？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「い、いえ、別に……私はただ、ライバルであるアムの近況を確認しにきただけですわ」
line = "「い、いえ、別に……私はただ、ライバルであるアムの近況を確認しにきただけですわ」"

[[dialogue]]
speaker = "ナミエル"
# 「え、エルデリーゼ先輩、ごきげんよう」
line = "「え、エルデリーゼ先輩、ごきげんよう」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あっ、ナミエル様……ご、ごきげんようですわ」
line = "「あっ、ナミエル様……ご、ごきげんようですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「申し訳ございません。私、ナミエル様の訓練を邪魔するつもりはなくて。ですが、その……」
line = "「申し訳ございません。私、ナミエル様の訓練を邪魔するつもりはなくて。ですが、その……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アムのライバルとしては、最近、戦闘訓練ができていなかったので、どのような状況なのか気になってしまいまして……」
line = "「アムのライバルとしては、最近、戦闘訓練ができていなかったので、どのような状況なのか気になってしまいまして……」"

[[dialogue]]
speaker = "アム"
# 「う～ん……そういえば２人って、今まであんまり接点がなかったよね？　――よし！　だったら、エルゼも混ぜて、みんなでお泊り会をしよう！」
line = "「う～ん……そういえば２人って、今まであんまり接点がなかったよね？　――よし！　だったら、エルゼも混ぜて、みんなでお泊り会をしよう！」"

[[dialogue]]
speaker = "２人"
# 「えっ……？」
line = "「えっ……？」"

[[dialogue]]
speaker = "ナミエル"
# 「まさか、私の部屋でお泊り会を開くことになるなんて……」
line = "「まさか、私の部屋でお泊り会を開くことになるなんて……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私、サランお姉様以外のお家にお泊りするのは初めてですわ……！　ワクワク♪」
line = "「私、サランお姉様以外のお家にお泊りするのは初めてですわ……！　ワクワク♪」"

[[dialogue]]
speaker = "ナミエル"
# （ワクワクしているエルデリーゼ先輩は可愛いので、いいのですが……）
line = "（ワクワクしているエルデリーゼ先輩は可愛いので、いいのですが……）"

[[dialogue]]
speaker = "エルデリーゼ"
# 「――改めましてナミエル様、本日は部屋に押しかけるような形になってしまい、申し訳ございませんわ」
line = "「――改めましてナミエル様、本日は部屋に押しかけるような形になってしまい、申し訳ございませんわ」"

[[dialogue]]
speaker = "ナミエル"
# 「あ、いえ……！　言い出したのは、アム先輩ですし……」
line = "「あ、いえ……！　言い出したのは、アム先輩ですし……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ですが、せっかくこうして一緒にお泊り会をする機会を頂けた以上、これを機に私、ナミエル様と親交を深めたいですわ」
line = "「ですが、せっかくこうして一緒にお泊り会をする機会を頂けた以上、これを機に私、ナミエル様と親交を深めたいですわ」"

[[dialogue]]
speaker = "ナミエル"
# 「……そうですね。共にリクリエと戦う星騎士として、交流を深めておくことは確かに大事だと、私も思います」
line = "「……そうですね。共にリクリエと戦う星騎士として、交流を深めておくことは確かに大事だと、私も思います」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ええ。それでは――ナミエル様のご趣味からお聞きしてもよろしいでしょうか？」
line = "「ええ。それでは――ナミエル様のご趣味からお聞きしてもよろしいでしょうか？」"

[[dialogue]]
speaker = "ナミエル"
# 「え？　はい。えっと……趣味は、たとえば……『勉学に励む』ことでしょうか？」
line = "「え？　はい。えっと……趣味は、たとえば……『勉学に励む』ことでしょうか？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「まあ！　ナミエル様は勉学にご興味がありますのね♪　私もですわ！　うふふっ♪」
line = "「まあ！　ナミエル様は勉学にご興味がありますのね♪　私もですわ！　うふふっ♪」"

[[dialogue]]
speaker = "アム"
# 「あの……エルゼ？　なんかお見合いしてるみたいな感じになってるけど？」
line = "「あの……エルゼ？　なんかお見合いしてるみたいな感じになってるけど？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ちなみに、ナミエル様はどんな教科がお好みですの？」
line = "「ちなみに、ナミエル様はどんな教科がお好みですの？」"

[[dialogue]]
speaker = "ナミエル"
# 「そうですね……数学が特に好きでしょうか？　難しい問題の数式が綺麗に解けた時の感覚は、塵１つ残さず掃除を完了させた時の感覚と、通ずるものがあります」
line = "「そうですね……数学が特に好きでしょうか？　難しい問題の数式が綺麗に解けた時の感覚は、塵１つ残さず掃除を完了させた時の感覚と、通ずるものがあります」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「わかりますわ！　答えが１つに定まる『確実性』ですわよね♪　パズルを解くみたいで、すごく楽しいですの♪」
line = "「わかりますわ！　答えが１つに定まる『確実性』ですわよね♪　パズルを解くみたいで、すごく楽しいですの♪」"

[[dialogue]]
speaker = "ナミエル"
# 「……！　あの、でしたらエルデリーゼ先輩、よろしければ勉強を教えて頂くことはお願いできますでしょうか？」
line = "「……！　あの、でしたらエルデリーゼ先輩、よろしければ勉強を教えて頂くことはお願いできますでしょうか？」"

[[dialogue]]
speaker = "ナミエル"
# 「実は私、附属校３年の範囲まで事前に勉強を進めているのですが、数学でわからない部分があって――」
line = "「実は私、附属校３年の範囲まで事前に勉強を進めているのですが、数学でわからない部分があって――」"

[[dialogue]]
speaker = "アム"
# 「は！？　ちょっと待ってナミエル、１年生なのにもうそんな先まで勉強してるの……！？」
line = "「は！？　ちょっと待ってナミエル、１年生なのにもうそんな先まで勉強してるの……！？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「す……素晴らしいですわ、ナミエル様！　勉強に対して、そこまでの強い意欲をお持ちだなんて……！　私でよければ、ぜひ協力致しますわ！」
line = "「す……素晴らしいですわ、ナミエル様！　勉強に対して、そこまでの強い意欲をお持ちだなんて……！　私でよければ、ぜひ協力致しますわ！」"

[[dialogue]]
speaker = "ナミエル"
# 「ありがとうございます……！　少しお待ち下さい。３年生の履修範囲の問題集で……えっと、この問題なのですが……」
line = "「ありがとうございます……！　少しお待ち下さい。３年生の履修範囲の問題集で……えっと、この問題なのですが……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「なるほど……これはちょっと、複雑な式ですわね。では、ノートとペンをお借りして……」
line = "「なるほど……これはちょっと、複雑な式ですわね。では、ノートとペンをお借りして……」"

[[dialogue]]
speaker = "アム"
# 「待って待って！　お泊り会なのに、なんか勉強会が始まっているんだけど！？」
line = "「待って待って！　お泊り会なのに、なんか勉強会が始まっているんだけど！？」"

[[dialogue]]
speaker = "ナミエル"
# 「――なるほど……！　その数式を使えば、綺麗に解まで繋がるんですねっ……！　さすがです……！」
line = "「――なるほど……！　その数式を使えば、綺麗に解まで繋がるんですねっ……！　さすがです……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「うふふっ♪　実は私も前に、このタイプの問題で頭を悩ませたことがあったので、その時に解法をしっかりと覚えておきましたの♪」
line = "「うふふっ♪　実は私も前に、このタイプの問題で頭を悩ませたことがあったので、その時に解法をしっかりと覚えておきましたの♪」"

[[dialogue]]
speaker = "ナミエル"
# 「ありがとうございます、エルデリーゼ先輩……！　おかげで綺麗に理解することができました」
line = "「ありがとうございます、エルデリーゼ先輩……！　おかげで綺麗に理解することができました」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「いえいえ。――ナミエル様、どうか今後は私のことをエルゼとお呼び下さいまし。勉強好きの仲間として、その方が私も嬉しいですわ♪」
line = "「いえいえ。――ナミエル様、どうか今後は私のことをエルゼとお呼び下さいまし。勉強好きの仲間として、その方が私も嬉しいですわ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「……！　はい、エルゼ先輩。よろしければ、他の教科などもご相談させて頂いてもよろしいでしょうか？」
line = "「……！　はい、エルゼ先輩。よろしければ、他の教科などもご相談させて頂いてもよろしいでしょうか？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふふっ、もちろんですわ♪　私、気の合う素敵な後輩ができて嬉しいですの♪」
line = "「ふふっ、もちろんですわ♪　私、気の合う素敵な後輩ができて嬉しいですの♪」"

[[dialogue]]
speaker = "アム"
# 「あれ？　なんかナミエル、あたしとよりもエルゼの方と仲良くなってない？」
line = "「あれ？　なんかナミエル、あたしとよりもエルゼの方と仲良くなってない？」"

[[dialogue]]
speaker = "ナミエル"
# 「よろしければ、アム先輩も勉強会に混ざりますか？」
line = "「よろしければ、アム先輩も勉強会に混ざりますか？」"

[[dialogue]]
speaker = "アム"
# 「できれば勉強以外でお願いしたいんだけど！？」
line = "「できれば勉強以外でお願いしたいんだけど！？」"

[[dialogue]]
speaker = "unk"
# こうして、お泊り会を通して、エルデリーゼとも接点ができたナミエルなのだった。
line = "こうして、お泊り会を通して、エルデリーゼとも接点ができたナミエルなのだった。"
