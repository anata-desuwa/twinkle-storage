[[dialogue]]
speaker = "unk"
# 第７話,太陽と金星のティータイム,B
line = "第７話,太陽と金星のティータイム,B"

[[dialogue]]
speaker = "unk"
# それから……しばし俺たちは待機していた。
line = "それから……しばし俺たちは待機していた。"

[[dialogue]]
speaker = "unk"
# 世界もアポロも救うハッピーエンドを求めて、ヴィーナスは『日誌』の導きを待ち続けた。
line = "世界もアポロも救うハッピーエンドを求めて、ヴィーナスは『日誌』の導きを待ち続けた。"

[[dialogue]]
speaker = "unk"
# 一日、また一日と……平穏な日々が過ぎてゆく。
line = "一日、また一日と……平穏な日々が過ぎてゆく。"

[[dialogue]]
speaker = "unk"
# しかし、待てど暮らせど『日誌』は次のページを記してくれなかった。
line = "しかし、待てど暮らせど『日誌』は次のページを記してくれなかった。"

[[dialogue]]
speaker = "unk"
# フィオナの本当のお姉さんが昏睡状態にあるままで──ただ、いたずらに時間が過ぎていく……。
line = "フィオナの本当のお姉さんが昏睡状態にあるままで──ただ、いたずらに時間が過ぎていく……。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……はぁぁ……どうして、肝心な時に……！」
line = "「……はぁぁ……どうして、肝心な時に……！」"

[[dialogue]]
speaker = "unk"
# 机に突っ伏して唸るヴィーナス。
line = "机に突っ伏して唸るヴィーナス。"

[[dialogue]]
speaker = "unk"
# 気づけば星見家での会合から、十日ばかりの月日が経過していた。
line = "気づけば星見家での会合から、十日ばかりの月日が経過していた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「今までなら……困った時はすぐ、次の一歩を示してくれたのに……」
line = "「今までなら……困った時はすぐ、次の一歩を示してくれたのに……」"

[[dialogue]]
speaker = "unk"
# ──未来の日誌。
line = "──未来の日誌。"

[[dialogue]]
speaker = "unk"
# 彼女がそう称するダイアリーは未だに進展を見せず、焦燥はますます募っていくばかりだった。
line = "彼女がそう称するダイアリーは未だに進展を見せず、焦燥はますます募っていくばかりだった。"

[[dialogue]]
speaker = "unk"
# 厳密には数日おきに書き込まれてはいたものの、そのどれもが取るに足らない出来事だった。
line = "厳密には数日おきに書き込まれてはいたものの、そのどれもが取るに足らない出来事だった。"

[[dialogue]]
speaker = "ヴィーナス"
# （急がないと……フィオナのお姉さんは、今も苦しんでるかもしれないっていうのに……！）
line = "（急がないと……フィオナのお姉さんは、今も苦しんでるかもしれないっていうのに……！）"

[[dialogue]]
speaker = "unk"
# ヴィーナスはいてもたってもいられず、大聖堂へと駆け出していた。
line = "ヴィーナスはいてもたってもいられず、大聖堂へと駆け出していた。"

[[dialogue]]
speaker = "unk"
# ここに来れば何かヒントが得られるかもと期待して──『太陽の壁画』の前に立ち尽くす。
line = "ここに来れば何かヒントが得られるかもと期待して──『太陽の壁画』の前に立ち尽くす。"

[[dialogue]]
speaker = "ヴィーナス"
# 「はあ、はあ……ふぅ」
line = "「はあ、はあ……ふぅ」"

[[dialogue]]
speaker = "ヴィーナス"
# （何も……起こらないわよね。まあ、わかってたけど）
line = "（何も……起こらないわよね。まあ、わかってたけど）"

[[dialogue]]
speaker = "ヴィーナス"
# （じれったいわね──どう動けばいいかもわからない時間なんて……）
line = "（じれったいわね──どう動けばいいかもわからない時間なんて……）"

[[dialogue]]
speaker = "unk"
# 日誌の記述が増えたり、あるいは数奇な<ruby=しおり>栞</ruby>がもたらされたりと……
line = "日誌の記述が増えたり、あるいは数奇な<ruby>栞<rt>しおり</rt></ruby>がもたらされたりと……"

[[dialogue]]
speaker = "unk"
# ヴィーナスのこれまでの行動には、常に何かしらの道しるべが存在してきた。
line = "ヴィーナスのこれまでの行動には、常に何かしらの道しるべが存在してきた。"

[[dialogue]]
speaker = "unk"
# しかし今の彼女には、頼るべき指標が見つからない。
line = "しかし今の彼女には、頼るべき指標が見つからない。"

[[dialogue]]
speaker = "unk"
# 友人の姉を救いたいという一心に──答えてくれるものが何もない。
line = "友人の姉を救いたいという一心に──答えてくれるものが何もない。"

[[dialogue]]
speaker = "unk"
# ヴィーナスにとって、そんな五里霧中は生まれて初めての事態だった。
line = "ヴィーナスにとって、そんな五里霧中は生まれて初めての事態だった。"

[[dialogue]]
speaker = "unk"
# そこへ……
line = "そこへ……"

[[dialogue]]
speaker = "フィオナ"
# 「あら──ヴィーナスさん。奇遇ですね」
line = "「あら──ヴィーナスさん。奇遇ですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナ……」
line = "「フィオナ……」"

[[dialogue]]
speaker = "フィオナ"
# 「よかったら──お茶でもしていきませんか？　たまには女子会というのも、悪くないのではないかと」
line = "「よかったら──お茶でもしていきませんか？　たまには女子会というのも、悪くないのではないかと」"

[[dialogue]]
speaker = "unk"
# カフェテリアへと入ったヴィーナスにフィオナ。
line = "カフェテリアへと入ったヴィーナスにフィオナ。"

[[dialogue]]
speaker = "unk"
# ２人のテーブルに注文した品々が運ばれてくる。
line = "２人のテーブルに注文した品々が運ばれてくる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナの……それ、何？」
line = "「フィオナの……それ、何？」"

[[dialogue]]
speaker = "フィオナ"
# 「野いちごのハーブティーです。初めて頼むメニューでしたが」
line = "「野いちごのハーブティーです。初めて頼むメニューでしたが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へえ、おいしそうね！　なんかおしゃれだし」
line = "「へえ、おいしそうね！　なんかおしゃれだし」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。ヴィーナスさんは──」
line = "「ふふ。ヴィーナスさんは──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私はスパイシーハニーチャイ！　とアフタヌーンティーセット！」
line = "「私はスパイシーハニーチャイ！　とアフタヌーンティーセット！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの目の前には豪奢なケーキスタンドが鎮座していた。
line = "ヴィーナスの目の前には豪奢なケーキスタンドが鎮座していた。"

[[dialogue]]
speaker = "unk"
# 三段トレイにはスコーンから林檎のカップケーキ、ラズベリーのマカロンといった品々が丁寧に並べられている。
line = "三段トレイにはスコーンから林檎のカップケーキ、ラズベリーのマカロンといった品々が丁寧に並べられている。"

[[dialogue]]
speaker = "フィオナ"
# 「……そ、そんなに食べ切れるのですか」
line = "「……そ、そんなに食べ切れるのですか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「楽勝よ！　全部おすすめだから、シェアして一緒に食べましょ！」
line = "「楽勝よ！　全部おすすめだから、シェアして一緒に食べましょ！」"

[[dialogue]]
speaker = "unk"
# 突発的に始まったティーパーティーは賑やかに進んでいった。
line = "突発的に始まったティーパーティーは賑やかに進んでいった。"

[[dialogue]]
speaker = "unk"
# しばらくお茶を楽しんだのち、ヴィーナスは思い立ったように訊ねる。
line = "しばらくお茶を楽しんだのち、ヴィーナスは思い立ったように訊ねる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「それで……もしかしてなんだけど、私のこと探してた？」
line = "「それで……もしかしてなんだけど、私のこと探してた？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。はい。鋭いですね」
line = "「ふふ。はい。鋭いですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いきなりすぎたもの。でも、どうして？」
line = "「いきなりすぎたもの。でも、どうして？」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ……まずは、謝ろうと思って」
line = "「ええ……まずは、謝ろうと思って」"

[[dialogue]]
speaker = "ヴィーナス"
# 「謝る？」
line = "「謝る？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。あの時は──私もつい、むきになってしまいました。せっかくのご厚意だったのに、頑なになってしまって、ごめんなさい」
line = "「はい。あの時は──私もつい、むきになってしまいました。せっかくのご厚意だったのに、頑なになってしまって、ごめんなさい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ああ──別にいいわよ。そんなの」
line = "「ああ──別にいいわよ。そんなの」"

[[dialogue]]
speaker = "unk"
# あの時──というのが星見邸宅における一件を指していたのは、ヴィーナスにも伝わった。
line = "あの時──というのが星見邸宅における一件を指していたのは、ヴィーナスにも伝わった。"

[[dialogue]]
speaker = "unk"
# 彼女らが顔を合わせるのはあれ以来となる。
line = "彼女らが顔を合わせるのはあれ以来となる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、そう言うってことは考えも変わったってこと？」
line = "「でも、そう言うってことは考えも変わったってこと？」"

[[dialogue]]
speaker = "フィオナ"
# 「……いいえ。今もなすべきことに変わりはありません」
line = "「……いいえ。今もなすべきことに変わりはありません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「が、頑固ねえ……！」
line = "「が、頑固ねえ……！」"

[[dialogue]]
speaker = "unk"
# アポロを抹殺する──星見フィオナは自らそう宣言した。
line = "アポロを抹殺する──星見フィオナは自らそう宣言した。"

[[dialogue]]
speaker = "unk"
# ヴィーナスにとって、それこそが許しがたい一線だった。
line = "ヴィーナスにとって、それこそが許しがたい一線だった。"

[[dialogue]]
speaker = "フィオナ"
# 「誤解しないでくださいね。ヴィーナスさんのお気持ちは……大変ありがたいものと思っています」
line = "「誤解しないでくださいね。ヴィーナスさんのお気持ちは……大変ありがたいものと思っています」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが……現実。私はもう、五年も姉さんと会話をしていません。歳も、ずいぶん離れてしまいました」
line = "「ですが……現実。私はもう、五年も姉さんと会話をしていません。歳も、ずいぶん離れてしまいました」"

[[dialogue]]
speaker = "フィオナ"
# 「会いたくない──と言えば、嘘になりますが。心のどこかで諦めてしまっていたのも事実です」
line = "「会いたくない──と言えば、嘘になりますが。心のどこかで諦めてしまっていたのも事実です」"

[[dialogue]]
speaker = "unk"
# そんな時に現れたのが──仮面を被ったあの存在だった。
line = "そんな時に現れたのが──仮面を被ったあの存在だった。"

[[dialogue]]
speaker = "unk"
# 儚げに遠くを眺めるフィオナを見て、ヴィーナスにもその心情がありありと伝わった。
line = "儚げに遠くを眺めるフィオナを見て、ヴィーナスにもその心情がありありと伝わった。"

[[dialogue]]
speaker = "フィオナ"
# 「確かに私は姉さんのことを皆さんに打ち明けました。しかしそれは、同じ仲間として共有しないのは不誠実だと思ったからです」
line = "「確かに私は姉さんのことを皆さんに打ち明けました。しかしそれは、同じ仲間として共有しないのは不誠実だと思ったからです」"

[[dialogue]]
speaker = "フィオナ"
# 「仮面の少女──アポロが姉の形をした<ruby=やくさい>厄災</ruby>であることに変わりありません。学園の決定通り、討伐すべきでしょう」
line = "「仮面の少女──アポロが姉の形をした<ruby>厄災<rt>やくさい</rt></ruby>であることに変わりありません。学園の決定通り、討伐すべきでしょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……考えを変える気はないのね」
line = "「……考えを変える気はないのね」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。私は──流星学園の星徒会長にして、星見家を担うフィオナですから」
line = "「ええ。私は──流星学園の星徒会長にして、星見家を担うフィオナですから」"

[[dialogue]]
speaker = "unk"
# まっすぐにフィオナの視線を受け止めたあと、ヴィーナスもまた凛々しく返した。
line = "まっすぐにフィオナの視線を受け止めたあと、ヴィーナスもまた凛々しく返した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナは──自分の役目に縛られすぎてる。無理をしすぎよ、どう見ても」
line = "「フィオナは──自分の役目に縛られすぎてる。無理をしすぎよ、どう見ても」"

[[dialogue]]
speaker = "ヴィーナス"
# 「本当はお姉さんのことを助けたいのに……みんなに迷惑がかかるからって、本心を押し殺してる。違う？」
line = "「本当はお姉さんのことを助けたいのに……みんなに迷惑がかかるからって、本心を押し殺してる。違う？」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# それはフィオナにとって図星だった。
line = "それはフィオナにとって図星だった。"

[[dialogue]]
speaker = "unk"
# 抱えるものの多い彼女にとって、姉を助けたいという想いはエゴでしかないと切り捨てていた。
line = "抱えるものの多い彼女にとって、姉を助けたいという想いはエゴでしかないと切り捨てていた。"

[[dialogue]]
speaker = "フィオナ"
# 「だったら……なんなのです。もし仮にそうだとしても、私は私の役目を果た──もぐっ！？」
line = "「だったら……なんなのです。もし仮にそうだとしても、私は私の役目を果た──もぐっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うるさい！　私のマカロンでも食べてなさい！」
line = "「うるさい！　私のマカロンでも食べてなさい！」"

[[dialogue]]
speaker = "フィオナ"
# 「も、もぐもぐ……ふぁ、ふぁひをふるんへふは」
line = "「も、もぐもぐ……ふぁ、ふぁひをふるんへふは」"

[[dialogue]]
speaker = "ヴィーナス"
# 「言っておくけどねえ、それくらいで私が諦めると思ったら大間違いよ」
line = "「言っておくけどねえ、それくらいで私が諦めると思ったら大間違いよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が救うと言ったら救うの。アポロのことも、お姉さんのことも……絶対に諦めないんだから！」
line = "「私が救うと言ったら救うの。アポロのことも、お姉さんのことも……絶対に諦めないんだから！」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 清々しいほど強引なヴィーナスの主張は、先日から少しも揺らいでいなかった。
line = "清々しいほど強引なヴィーナスの主張は、先日から少しも揺らいでいなかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「安心しなさいフィオナ。今は、ちょっと停滞してるけど……日誌が私たちを導いてくれるはずだから」
line = "「安心しなさいフィオナ。今は、ちょっと停滞してるけど……日誌が私たちを導いてくれるはずだから」"

[[dialogue]]
speaker = "フィオナ"
# 「これまでのように──ですか」
line = "「これまでのように──ですか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。きっと、クロトが世界もアポロも救うための道筋を──示してくれるはずよ♪」
line = "「ええ。きっと、クロトが世界もアポロも救うための道筋を──示してくれるはずよ♪」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長のことを──信頼しているのですね」
line = "「緋宮会長のことを──信頼しているのですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん？　まあね。クロトこそ真の魔王だもの──そこはお姉さんにも譲れないわ」
line = "「ん？　まあね。クロトこそ真の魔王だもの──そこはお姉さんにも譲れないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# （っと思ったけど、別に魔王って２人いてもいいのかしら？　そこは考えたことなかったわね……）
line = "（っと思ったけど、別に魔王って２人いてもいいのかしら？　そこは考えたことなかったわね……）"

[[dialogue]]
speaker = "フィオナ"
# 「……お２人の関係性はとても不思議です。隣の学園で御前試合が行われたと聞いた時は、どんなに<b>ばちばち</b>しているかと思っていましたのに」
line = "「……お２人の関係性はとても不思議です。隣の学園で御前試合が行われたと聞いた時は、どんなに<b>ばちばち</b>しているかと思っていましたのに」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あはは。あれはちょっとクロトを試したかっただけよ♪」
line = "「あはは。あれはちょっとクロトを試したかっただけよ♪」"

[[dialogue]]
speaker = "フィオナ"
# 「そうなのですか？　よい機会ですから、お話を聞いてみたいですね」
line = "「そうなのですか？　よい機会ですから、お話を聞いてみたいですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、あれはね……」
line = "「ええ、あれはね……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスはクロトの入学から御前試合までの経緯を語った。
line = "ヴィーナスはクロトの入学から御前試合までの経緯を語った。"

[[dialogue]]
speaker = "unk"
# それからクロトとの出会いまで、あらかじめ日誌に記されていたことも……。
line = "それからクロトとの出会いまで、あらかじめ日誌に記されていたことも……。"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういうわけだから──私はそもそも、クロトのことを最初から認識していたの。運命のパートナーみたいなものね！」
line = "「そういうわけだから──私はそもそも、クロトのことを最初から認識していたの。運命のパートナーみたいなものね！」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど。ヴィーナスさんにとっては──その日誌こそが、人生そのものなのですね」
line = "「なるほど。ヴィーナスさんにとっては──その日誌こそが、人生そのものなのですね」"

[[dialogue]]
speaker = "フィオナ"
# 「それに、運命のパートナー──ですか」
line = "「それに、運命のパートナー──ですか」"

[[dialogue]]
speaker = "unk"
# そうして、全てを聞いたフィオナはひと言。
line = "そうして、全てを聞いたフィオナはひと言。"

[[dialogue]]
speaker = "フィオナ"
# 「お付き合いされているんですか？」
line = "「お付き合いされているんですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぶっ」
line = "「ぶっ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスがチャイを噴き出した。
line = "ヴィーナスがチャイを噴き出した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「な、なんなのよ藪からステッキに！　そんな話してないじゃない！」
line = "「な、なんなのよ藪からステッキに！　そんな話してないじゃない！」"

[[dialogue]]
speaker = "フィオナ"
# 「至って自然な解釈です。運命の赤い糸で結ばれた男女ならば、その後も関係が深まっていくものと思われます」
line = "「至って自然な解釈です。運命の赤い糸で結ばれた男女ならば、その後も関係が深まっていくものと思われます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちち、違うわよ！　私たちの関係は出会った時から変わってないってば！」
line = "「ちち、違うわよ！　私たちの関係は出会った時から変わってないってば！」"

[[dialogue]]
speaker = "フィオナ"
# 「あら。意外でした。デートくらいは済ませているものかと」
line = "「あら。意外でした。デートくらいは済ませているものかと」"

[[dialogue]]
speaker = "フィオナ"
# 「それに……その出会いは何年も前から記されていたんですよね。ふふふ……非常にドラマチックです」
line = "「それに……その出会いは何年も前から記されていたんですよね。ふふふ……非常にドラマチックです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィーオーナー……！」
line = "「フィーオーナー……！」"

[[dialogue]]
speaker = "unk"
# 自分がからかわれていることに気づいたヴィーナスは、頬を膨らませてフィオナをにらんだ。
line = "自分がからかわれていることに気づいたヴィーナスは、頬を膨らませてフィオナをにらんだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私がクロトと出会ったのは──クロトを鍛えるためよ。クロトは魔王なのに、それを自覚していないから」
line = "「私がクロトと出会ったのは──クロトを鍛えるためよ。クロトは魔王なのに、それを自覚していないから」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど。私の印象としては、そこが少し意外です。ヴィーナスさんなら──自分が魔王になってやる、と考えそうなものですが」
line = "「なるほど。私の印象としては、そこが少し意外です。ヴィーナスさんなら──自分が魔王になってやる、と考えそうなものですが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私にその資格はないもの。魔王の血統の話は──フィオナもよく知ってるでしょ」
line = "「私にその資格はないもの。魔王の血統の話は──フィオナもよく知ってるでしょ」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ、それはそうですが……」
line = "「ええ、それはそうですが……」"

[[dialogue]]
speaker = "unk"
# フィオナの疑問は何も彼女に限った話ではなかった。
line = "フィオナの疑問は何も彼女に限った話ではなかった。"

[[dialogue]]
speaker = "unk"
# 新星星徒会の面々もみな、クロトのことになるとサポートに徹そうとするヴィーナスを当初は不思議に思っていた。
line = "新星星徒会の面々もみな、クロトのことになるとサポートに徹そうとするヴィーナスを当初は不思議に思っていた。"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長を鍛えるようにと──日誌に記されていたのですか？」
line = "「緋宮会長を鍛えるようにと──日誌に記されていたのですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そりゃもちろ、ん……ん？　もち……ろん……あれ？」
line = "「そりゃもちろ、ん……ん？　もち……ろん……あれ？」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナスさん……？」
line = "「ヴィーナスさん……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、いや、えっと──よくよく思い返すと、直接書かれてたわけじゃなかったわね」
line = "「あ、いや、えっと──よくよく思い返すと、直接書かれてたわけじゃなかったわね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、クロトと運命の出会いを果たして、彼の魔王としての素質を目覚めさせる──なんて書いてあるんだから。それはもう私が手ずから鍛え上げろって書いてあるようなものよね！」
line = "「でも、クロトと運命の出会いを果たして、彼の魔王としての素質を目覚めさせる──なんて書いてあるんだから。それはもう私が手ずから鍛え上げろって書いてあるようなものよね！」"

[[dialogue]]
speaker = "フィオナ"
# 「そ、そうでしょうか？」
line = "「そ、そうでしょうか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うんうん！　実際、出会ったばかりのクロトは全然そんな自覚なかったし」
line = "「うんうん！　実際、出会ったばかりのクロトは全然そんな自覚なかったし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから御前試合の後もビシバシ鍛えてあげてるのよ！　早くクロトが立派な魔王になれますようにって！」
line = "「だから御前試合の後もビシバシ鍛えてあげてるのよ！　早くクロトが立派な魔王になれますようにって！」"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど……」
line = "「なるほど……」"

[[dialogue]]
speaker = "フィオナ"
# 「でもそれって、解釈次第ではありますよね」
line = "「でもそれって、解釈次第ではありますよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "フィオナ"
# 「魔王の素質を目覚めさせる──という意味なら、例の御前試合の際に役目は一度終えているはずです」
line = "「魔王の素質を目覚めさせる──という意味なら、例の御前試合の際に役目は一度終えているはずです」"

[[dialogue]]
speaker = "フィオナ"
# 「そしてヴィーナスさんの立場からすれば──その後、彼に負けないよう己を高める、という道もありえたでしょう」
line = "「そしてヴィーナスさんの立場からすれば──その後、彼に負けないよう己を高める、という道もありえたでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「けれどヴィーナスさんは、最後まで緋宮会長につきっきりで鍛え上げるという選択をした……」
line = "「けれどヴィーナスさんは、最後まで緋宮会長につきっきりで鍛え上げるという選択をした……」"

[[dialogue]]
speaker = "フィオナ"
# 「その理由は一体、なぜなんでしょうね？」
line = "「その理由は一体、なぜなんでしょうね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ、それは……考えたこともなかったけど。私なんかより、クロトのほうが優先っていうか……」
line = "「そ、それは……考えたこともなかったけど。私なんかより、クロトのほうが優先っていうか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんとなく……？　私が、クロトの面倒みてあげなきゃって気がして……えっと、特に深い理由はないんだけど……！」
line = "「なんとなく……？　私が、クロトの面倒みてあげなきゃって気がして……えっと、特に深い理由はないんだけど……！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ──いえ。他愛ない冗談です。ヴィーナスさんはそれほど、緋宮会長と一緒にいたいのかと思って」
line = "「ふふ──いえ。他愛ない冗談です。ヴィーナスさんはそれほど、緋宮会長と一緒にいたいのかと思って」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だ、だからそういう関係じゃないってばっ」
line = "「だ、だからそういう関係じゃないってばっ」"

[[dialogue]]
speaker = "unk"
# 話がひと段落つくと、２人のドリンクも底をつき始めた。
line = "話がひと段落つくと、２人のドリンクも底をつき始めた。"

[[dialogue]]
speaker = "フィオナ"
# 「……もし」
line = "「……もし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "フィオナ"
# 「もし──その日誌に書かれた未来が、絶望的なものだったとしたら、どうしますか？」
line = "「もし──その日誌に書かれた未来が、絶望的なものだったとしたら、どうしますか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　よくない未来……ってこと？」
line = "「！　よくない未来……ってこと？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。未来を記す──と言っても、それは必ずしも楽観的な道筋を示すばかりではないでしょう」
line = "「はい。未来を記す──と言っても、それは必ずしも楽観的な道筋を示すばかりではないでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「時には……計り知れない試練が見えることもあるはずです」
line = "「時には……計り知れない試練が見えることもあるはずです」"

[[dialogue]]
speaker = "フィオナ"
# 「立ち向かってもどうしようもないような壁が──この先にそびえ立っている。そんな事実がもしわかったとしても、打つ手はない」
line = "「立ち向かってもどうしようもないような壁が──この先にそびえ立っている。そんな事実がもしわかったとしても、打つ手はない」"

[[dialogue]]
speaker = "フィオナ"
# 「そんな時……ヴィーナスさんだったら、どうするのかと思いまして」
line = "「そんな時……ヴィーナスさんだったら、どうするのかと思いまして」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んー……確かに、そうなったら参っちゃうわよね」
line = "「んー……確かに、そうなったら参っちゃうわよね」"

[[dialogue]]
speaker = "unk"
# おとがいに手をあてて考えるヴィーナス。
line = "おとがいに手をあてて考えるヴィーナス。"

[[dialogue]]
speaker = "unk"
# しかしその思考は短く、そしてあっけなく切り上げられた。
line = "しかしその思考は短く、そしてあっけなく切り上げられた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、みんなに任せればいいんじゃない？　私たちって１人じゃないし♪」
line = "「ま、みんなに任せればいいんじゃない？　私たちって１人じゃないし♪」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスのあっけらかんとした答えを聞いて、フィオナは目を丸くした。
line = "ヴィーナスのあっけらかんとした答えを聞いて、フィオナは目を丸くした。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が頼ってるのはクロトだけじゃないもの。アナにもマトイにもサーシャさんにも、最近じゃ流星のみんなにだってお世話になってる」
line = "「私が頼ってるのはクロトだけじゃないもの。アナにもマトイにもサーシャさんにも、最近じゃ流星のみんなにだってお世話になってる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろんフィオナもね。だから──もし絶望的な未来が見えたら、お任せしちゃうかも！」
line = "「もちろんフィオナもね。だから──もし絶望的な未来が見えたら、お任せしちゃうかも！」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ……ダメですよ。ヴィーナスさんも立ち向かってもらわないと」
line = "「ふふ……ダメですよ。ヴィーナスさんも立ち向かってもらわないと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、そうね。でも、そん時はそん時くらいでいいのよ♪」
line = "「ええ、そうね。でも、そん時はそん時くらいでいいのよ♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ……はい。私も少し、ヴィーナスさんを見習うべきかもと思えてきました」
line = "「ふふ……はい。私も少し、ヴィーナスさんを見習うべきかもと思えてきました」"

[[dialogue]]
speaker = "unk"
# 日誌を頼る。そこに無理筋が記されていたら、みんなを頼る。
line = "日誌を頼る。そこに無理筋が記されていたら、みんなを頼る。"

[[dialogue]]
speaker = "unk"
# どこまでも自分以外の誰かを信頼できるヴィーナスの姿は──フィオナにとって、なぜだか輝かしく映っていた。
line = "どこまでも自分以外の誰かを信頼できるヴィーナスの姿は──フィオナにとって、なぜだか輝かしく映っていた。"
