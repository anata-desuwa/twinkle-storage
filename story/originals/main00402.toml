[[dialogue]]
speaker = "unk"
# 第２話,星見姉妹？,B
line = "第２話,星見姉妹？,B"

[[dialogue]]
speaker = "unk"
# と、<ruby=しい>思惟</ruby>を巡らせていると……
line = "と、<ruby>思惟<rt>しい</rt></ruby>を巡らせていると……"

[[dialogue]]
speaker = "フィオナ"
# 「あ──２人とも」
line = "「あ──２人とも」"

[[dialogue]]
speaker = "クロト＆ヴィーナス"
# 「──のわああぁぁっ！？」
line = "「──のわああぁぁっ！？」"

[[dialogue]]
speaker = "unk"
# すっかり人気のなかった大聖堂に、流星星徒会会長──フィオナがやってきていた。
line = "すっかり人気のなかった大聖堂に、流星星徒会会長──フィオナがやってきていた。"

[[dialogue]]
speaker = "unk"
# 俺たちは思わず距離を取って離れる。
line = "俺たちは思わず距離を取って離れる。"

[[dialogue]]
speaker = "フィオナ"
# 「２人ともずいぶん近くでお話されておりましたが……お邪魔してしまったでしょうか？」
line = "「２人ともずいぶん近くでお話されておりましたが……お邪魔してしまったでしょうか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そ、そういうやつじゃないから！　べべべ別にやましいこととかこれっぽっちも」
line = "「そ、そういうやつじゃないから！　べべべ別にやましいこととかこれっぽっちも」"

[[dialogue]]
speaker = "クロト"
# 「フィオナこそ、どうしたんだ？　一人みたいだけど」
line = "「フィオナこそ、どうしたんだ？　一人みたいだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あんたは冷静さ取り戻すの早すぎ！！」
line = "「あんたは冷静さ取り戻すの早すぎ！！」"

[[dialogue]]
speaker = "unk"
# 理不尽な叱責を受けた。
line = "理不尽な叱責を受けた。"

[[dialogue]]
speaker = "unk"
# 俺たちの様子に和んだのか、フィオナも相好を崩して笑う。
line = "俺たちの様子に和んだのか、フィオナも相好を崩して笑う。"

[[dialogue]]
speaker = "フィオナ"
# 「ちょっと息抜きに。カフェテリアのソイラテが飲みたくなりまして」
line = "「ちょっと息抜きに。カフェテリアのソイラテが飲みたくなりまして」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ああ、あれ！　私も好き、けっこー女子に人気なのよね♪」
line = "「ああ、あれ！　私も好き、けっこー女子に人気なのよね♪」"

[[dialogue]]
speaker = "クロト"
# 「へえ。そんなに評判なら俺も飲んでみようかな」
line = "「へえ。そんなに評判なら俺も飲んでみようかな」"

[[dialogue]]
speaker = "unk"
# 息抜きか。確かにフィオナは背負うものも多くて大変そうだ。
line = "息抜きか。確かにフィオナは背負うものも多くて大変そうだ。"

[[dialogue]]
speaker = "unk"
# 俺たちはフィオナと一緒にカフェテリアまで移動した。
line = "俺たちはフィオナと一緒にカフェテリアまで移動した。"

[[dialogue]]
speaker = "フィオナ"
# 「一昨日は……新星の皆さんのほうが、大変だったようですね。この間は間に合わなくてごめんなさい」
line = "「一昨日は……新星の皆さんのほうが、大変だったようですね。この間は間に合わなくてごめんなさい」"

[[dialogue]]
speaker = "クロト"
# 「アポロの件か。あれは確かに……大変だった」
line = "「アポロの件か。あれは確かに……大変だった」"

[[dialogue]]
speaker = "unk"
# いいタイミングだと思い、俺たちはこの前の事件の詳細をフィオナに語った。
line = "いいタイミングだと思い、俺たちはこの前の事件の詳細をフィオナに語った。"

[[dialogue]]
speaker = "ヴィーナス"
# 「生意気なちびっ子が暴れまわって、ちょー大変だったんだから！　なんか星降らす能力もついてるし……！」
line = "「生意気なちびっ子が暴れまわって、ちょー大変だったんだから！　なんか星降らす能力もついてるし……！」"

[[dialogue]]
speaker = "フィオナ"
# 「子どもの仕業だった──というのは聞き及んでいますが。お二人が苦戦されるほど脅威だったのですか？」
line = "「子どもの仕業だった──というのは聞き及んでいますが。お二人が苦戦されるほど脅威だったのですか？」"

[[dialogue]]
speaker = "クロト"
# 「ああ。これくらいの大剣をかついで……正直、一歩遅ければ被害は尋常じゃなかったと思う」
line = "「ああ。これくらいの大剣をかついで……正直、一歩遅ければ被害は尋常じゃなかったと思う」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ドガーンって剣振り回すだけならまだしも、モンスターまで湧いてくる始末だしね」
line = "「ドガーンって剣振り回すだけならまだしも、モンスターまで湧いてくる始末だしね」"

[[dialogue]]
speaker = "フィオナ"
# 「モンスターまで……なるほど。見た目にそぐわぬ脅威、ということですね」
line = "「モンスターまで……なるほど。見た目にそぐわぬ脅威、ということですね」"

[[dialogue]]
speaker = "unk"
# 事の経緯は既に聞き及んでいるのか、冷静に俺たちの証言を分析するフィオナ。
line = "事の経緯は既に聞き及んでいるのか、冷静に俺たちの証言を分析するフィオナ。"

[[dialogue]]
speaker = "クロト"
# 「最後だって、なぜか見逃されたようなものだったしな」
line = "「最後だって、なぜか見逃されたようなものだったしな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……そうね。あれは間違いなくただのちびっ子じゃないわ。だって……」
line = "「……そうね。あれは間違いなくただのちびっ子じゃないわ。だって……」"

[[dialogue]]
speaker = "フィオナ"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "unk"
# 言いよどむヴィーナス。
line = "言いよどむヴィーナス。"

[[dialogue]]
speaker = "unk"
# しかし、フィオナは事情を知っていると思い直して例の件についても話した。
line = "しかし、フィオナは事情を知っていると思い直して例の件についても話した。"

[[dialogue]]
speaker = "フィオナ"
# 「なるほど。例の日誌が……となると、フィーニスで出会った天使の言葉とも関連していそうですね」
line = "「なるほど。例の日誌が……となると、フィーニスで出会った天使の言葉とも関連していそうですね」"

[[dialogue]]
speaker = "クロト"
# （フィオナは飲み込みが早いな……超常的な話には違いないんだけど）
line = "（フィオナは飲み込みが早いな……超常的な話には違いないんだけど）"

[[dialogue]]
speaker = "フィオナ"
# 「運命を書き換えられる少女……リクリエの使徒……アポロ……」
line = "「運命を書き換えられる少女……リクリエの使徒……アポロ……」"

[[dialogue]]
speaker = "unk"
# 物思いにふけるフィオナ。
line = "物思いにふけるフィオナ。"

[[dialogue]]
speaker = "unk"
# 息抜きにきたという彼女を悩ませるのはあまり良くなかっただろうか。
line = "息抜きにきたという彼女を悩ませるのはあまり良くなかっただろうか。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、強いったって所詮はガキンチョだけどね！　自分は流星ライダーだーなんて、ヒーローごっこしてたくらいだし！」
line = "「ま、強いったって所詮はガキンチョだけどね！　自分は流星ライダーだーなんて、ヒーローごっこしてたくらいだし！」"

[[dialogue]]
speaker = "フィオナ"
# 「流星ライダー……アポロ……？」
line = "「流星ライダー……アポロ……？」"

[[dialogue]]
speaker = "クロト"
# 「もしかしてフィオナも子どもの頃は観てたとか……？」
line = "「もしかしてフィオナも子どもの頃は観てたとか……？」"

[[dialogue]]
speaker = "unk"
# 『流星ライダーアポロ』というのは、数年前に放映していた子ども向け変身ヒーローもののタイトルだ。
line = "『流星ライダーアポロ』というのは、数年前に放映していた子ども向け変身ヒーローもののタイトルだ。"

[[dialogue]]
speaker = "フィオナ"
# 「あ、いえ、えっと……その。初耳でした」
line = "「あ、いえ、えっと……その。初耳でした」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうよクロト。フィオナがそんなの観てるわけないじゃない！」
line = "「そうよクロト。フィオナがそんなの観てるわけないじゃない！」"

[[dialogue]]
speaker = "クロト"
# 「男の子向けの番組だしな」
line = "「男の子向けの番組だしな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナって昔からなんか大人びてそうだし。子ども向け番組って柄じゃないわよね」
line = "「フィオナって昔からなんか大人びてそうだし。子ども向け番組って柄じゃないわよね」"

[[dialogue]]
speaker = "フィオナ"
# 「む……」
line = "「む……」"

[[dialogue]]
speaker = "unk"
# 確かにイメージにそぐわない。
line = "確かにイメージにそぐわない。"

[[dialogue]]
speaker = "unk"
# だが、なぜかフィオナは対抗心を燃やしたらしく……
line = "だが、なぜかフィオナは対抗心を燃やしたらしく……"

[[dialogue]]
speaker = "フィオナ"
# 「私は子どものころ姉と『探偵騎士スクープナイト』を毎週欠かさず観ていました」
line = "「私は子どものころ姉と『探偵騎士スクープナイト』を毎週欠かさず観ていました」"

[[dialogue]]
speaker = "クロト"
# 「マニアックなアニメが出てきた……」
line = "「マニアックなアニメが出てきた……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「な、何それ……知らないんだけどなんか悔しい」
line = "「な、何それ……知らないんだけどなんか悔しい」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふふ」
line = "「ふふふ」"

[[dialogue]]
speaker = "unk"
# なぜか勝ち誇った顔をするフィオナ。意外な一面だった。
line = "なぜか勝ち誇った顔をするフィオナ。意外な一面だった。"

[[dialogue]]
speaker = "unk"
# だが……
line = "だが……"

[[dialogue]]
speaker = "クロト"
# （教皇庁の第一皇女である星見フィオナに、姉……？）
line = "（教皇庁の第一皇女である星見フィオナに、姉……？）"

[[dialogue]]
speaker = "unk"
# さすがに星見家の家族構成がすべて公表されているわけではないが、第一皇女の姉という話は初耳だ。
line = "さすがに星見家の家族構成がすべて公表されているわけではないが、第一皇女の姉という話は初耳だ。"

[[dialogue]]
speaker = "unk"
# 一緒に育った姉代わりのような人がいたのか、あるいは……
line = "一緒に育った姉代わりのような人がいたのか、あるいは……"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナにはお姉さんがいるのね！　ちょっと意外かも」
line = "「フィオナにはお姉さんがいるのね！　ちょっと意外かも」"

[[dialogue]]
speaker = "フィオナ"
# 「そう、でしょうか……？」
line = "「そう、でしょうか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん！　フィオナって面倒見が良さそうだから、どっちかって言うと妹がいそうなイメージなのよね～」
line = "「うん！　フィオナって面倒見が良さそうだから、どっちかって言うと妹がいそうなイメージなのよね～」"

[[dialogue]]
speaker = "フィオナ"
# 「くすくす。褒め言葉として受け取っておきます」
line = "「くすくす。褒め言葉として受け取っておきます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ、もしかしてお姉さんも流星学園生？」
line = "「あ、もしかしてお姉さんも流星学園生？」"

[[dialogue]]
speaker = "フィオナ"
# 「……いえ。姉はこの学園には──もちろん新星にもいません」
line = "「……いえ。姉はこの学園には──もちろん新星にもいません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いたらもっと話題になってるか」
line = "「いたらもっと話題になってるか」"

[[dialogue]]
speaker = "クロト"
# 「フィオナのお姉さんとなると……きっとしっかりした人なんだろうな」
line = "「フィオナのお姉さんとなると……きっとしっかりした人なんだろうな」"

[[dialogue]]
speaker = "フィオナ"
# 「……ええ。とても使命感の強い──自慢の姉です」
line = "「……ええ。とても使命感の強い──自慢の姉です」"

[[dialogue]]
speaker = "unk"
# どうやら聞き間違いや言い間違い、という感じではなさそうだが……
line = "どうやら聞き間違いや言い間違い、という感じではなさそうだが……"

[[dialogue]]
speaker = "フィオナ"
# 「──こほん。ですが、兄弟姉妹がいることくらい珍しいことではありません。うちのソフィアも新星学園に姉がいると言っていました」
line = "「──こほん。ですが、兄弟姉妹がいることくらい珍しいことではありません。うちのソフィアも新星学園に姉がいると言っていました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアちゃん……ってあの小さな魔族の子だっけ？　へー！」
line = "「ソフィアちゃん……ってあの小さな魔族の子だっけ？　へー！」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# あまり触れたくない話題だったのだろうか。話を切り替えてきた。
line = "あまり触れたくない話題だったのだろうか。話を切り替えてきた。"

[[dialogue]]
speaker = "unk"
# フィオナがそのつもりなら、わざわざ深掘りするでもないか。
line = "フィオナがそのつもりなら、わざわざ深掘りするでもないか。"

[[dialogue]]
speaker = "フィオナ"
# 「それより……お二人はここで“壁画”を眺められていたみたいですが」
line = "「それより……お二人はここで“壁画”を眺められていたみたいですが」"

[[dialogue]]
speaker = "クロト"
# 「あ、うん……」
line = "「あ、うん……」"

[[dialogue]]
speaker = "unk"
# “魔王は英雄だ”──という言説を、流星教皇の娘であるフィオナに語るのはなんだか不穏な気がしなくもない。
line = "“魔王は英雄だ”──という言説を、流星教皇の娘であるフィオナに語るのはなんだか不穏な気がしなくもない。"

[[dialogue]]
speaker = "unk"
# ただ、ヴィーナスはそこまで空気の読める子ではなかった。
line = "ただ、ヴィーナスはそこまで空気の読める子ではなかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「この壁画が嘘っぱちだって話をしてたのよ！　魔王はリクリエから世界を救った英雄なんだから！」
line = "「この壁画が嘘っぱちだって話をしてたのよ！　魔王はリクリエから世界を救った英雄なんだから！」"

[[dialogue]]
speaker = "フィオナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 予想通りと言うべきか、これまで通りの言説を披露するヴィーナス。
line = "予想通りと言うべきか、これまで通りの言説を披露するヴィーナス。"

[[dialogue]]
speaker = "クロト"
# 「ごめんフィオナ。こういうのは……星見家からしたら不謹慎だよな」
line = "「ごめんフィオナ。こういうのは……星見家からしたら不謹慎だよな」"

[[dialogue]]
speaker = "フィオナ"
# 「……いえ。そんなことは、ありません」
line = "「……いえ。そんなことは、ありません」"

[[dialogue]]
speaker = "unk"
# フィオナは真摯な表情で受け止める。
line = "フィオナは真摯な表情で受け止める。"

[[dialogue]]
speaker = "unk"
# そういえば……ヴィーナスとアポロ以外にも、彼女から言われていたのを思い出した。
line = "そういえば……ヴィーナスとアポロ以外にも、彼女から言われていたのを思い出した。"

[[dialogue]]
speaker = "フィオナ"
# 『……緋宮会長。あなたは……“魔王”なのですか？』
line = "『……緋宮会長。あなたは……“魔王”なのですか？』"

[[dialogue]]
speaker = "フィオナ"
# 「？　どうされましたか、緋宮会長」
line = "「？　どうされましたか、緋宮会長」"

[[dialogue]]
speaker = "クロト"
# 「いや……なんでも」
line = "「いや……なんでも」"

[[dialogue]]
speaker = "クロト"
# （あれはヴィーナスが俺のことを魔王と紹介したからだ。フィオナは、それに冗談で答えたにすぎない……）
line = "（あれはヴィーナスが俺のことを魔王と紹介したからだ。フィオナは、それに冗談で答えたにすぎない……）"

[[dialogue]]
speaker = "unk"
# だが、なぜだろう。
line = "だが、なぜだろう。"

[[dialogue]]
speaker = "unk"
# 冗談めかしたあの言葉が、他の誰よりも突き刺さっている──
line = "冗談めかしたあの言葉が、他の誰よりも突き刺さっている──"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなこんなでアポロちゃんの出現で私の日誌もパーになって、色々滅入っちゃってるってわけ」
line = "「そんなこんなでアポロちゃんの出現で私の日誌もパーになって、色々滅入っちゃってるってわけ」"

[[dialogue]]
speaker = "フィオナ"
# 「よくわかりました。やはりヴィーナスさんには、我々にない何かがあるようです」
line = "「よくわかりました。やはりヴィーナスさんには、我々にない何かがあるようです」"

[[dialogue]]
speaker = "unk"
# さすがに自分が魔王としてのクロトを鍛えるうんぬんという下りは端折っていたが、悩んでいたことを伝えるヴィーナス。
line = "さすがに自分が魔王としてのクロトを鍛えるうんぬんという下りは端折っていたが、悩んでいたことを伝えるヴィーナス。"

[[dialogue]]
speaker = "unk"
# フィオナもその真摯さを汲んでか、俺が考えていたのと同じ提案をしてきた。
line = "フィオナもその真摯さを汲んでか、俺が考えていたのと同じ提案をしてきた。"

[[dialogue]]
speaker = "フィオナ"
# 「再びあの地へ向かう時かもしれませんね。ヴィーナスさんのわだかまりを解消するなら」
line = "「再びあの地へ向かう時かもしれませんね。ヴィーナスさんのわだかまりを解消するなら」"

[[dialogue]]
speaker = "クロト"
# 「あの地って……もしかして『塔』か」
line = "「あの地って……もしかして『塔』か」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。こうして手をこまねいているよりは──前進するべきではないかと」
line = "「はい。こうして手をこまねいているよりは──前進するべきではないかと」"

[[dialogue]]
speaker = "ヴィーナス"
# 「確かに。あの時の収穫はありすぎたくらいだし」
line = "「確かに。あの時の収穫はありすぎたくらいだし」"

[[dialogue]]
speaker = "フィオナ"
# 「フィーニスの塔であれば魔王の真実にも……近づけそうですし」
line = "「フィーニスの塔であれば魔王の真実にも……近づけそうですし」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# いつもと変わらない理知的なフィオナの語調。
line = "いつもと変わらない理知的なフィオナの語調。"

[[dialogue]]
speaker = "unk"
# しかしなぜか、今の彼女には揺るぎない意思が宿っているように聞こえた。
line = "しかしなぜか、今の彼女には揺るぎない意思が宿っているように聞こえた。"

[[dialogue]]
speaker = "フィオナ"
# 「とはいえ……勝手な立ち入りは禁じられているのも事実です。強要するわけにも──」
line = "「とはいえ……勝手な立ち入りは禁じられているのも事実です。強要するわけにも──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいえ。行くに決まっているわ、だってあそこからは──私を呼ぶ声だって聞こえたんだもの」
line = "「いいえ。行くに決まっているわ、だってあそこからは──私を呼ぶ声だって聞こえたんだもの」"

[[dialogue]]
speaker = "クロト"
# 「──日誌と栞が示した先なのに変わりはないしな」
line = "「──日誌と栞が示した先なのに変わりはないしな」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔──
line = "フィーニスの塔──"

[[dialogue]]
speaker = "unk"
# 前回は日誌に促されるままに導かれ、その果てでマグダレナさんという守護天使と邂逅した。
line = "前回は日誌に促されるままに導かれ、その果てでマグダレナさんという守護天使と邂逅した。"

[[dialogue]]
speaker = "unk"
# そして彼女はあの時、あそこが第一階層の終着点であると語っていた。
line = "そして彼女はあの時、あそこが第一階層の終着点であると語っていた。"

[[dialogue]]
speaker = "unk"
# その言葉を信じるなら、あそこにはまだ『先』があるということになる。
line = "その言葉を信じるなら、あそこにはまだ『先』があるということになる。"

[[dialogue]]
speaker = "クロト"
# 「……俺も気持ちは同じだ。真実が転がっているなら虎穴でも臨みたい」
line = "「……俺も気持ちは同じだ。真実が転がっているなら虎穴でも臨みたい」"

[[dialogue]]
speaker = "クロト"
# 「ただ、もし前回と似たような感じなら長期の戦闘が予想される。すぐに向かうのは避けたほうがいいだろう」
line = "「ただ、もし前回と似たような感じなら長期の戦闘が予想される。すぐに向かうのは避けたほうがいいだろう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それもそうね」
line = "「それもそうね」"

[[dialogue]]
speaker = "フィオナ"
# 「先日の事件の影響も、未だ調査が続けられています。そちらが落ち着いてから、こっそり出動するとしましょうか」
line = "「先日の事件の影響も、未だ調査が続けられています。そちらが落ち着いてから、こっそり出動するとしましょうか」"

[[dialogue]]
speaker = "クロト"
# 「ああ。星徒会長が揃って消えたなんてことになっても、まずいしな」
line = "「ああ。星徒会長が揃って消えたなんてことになっても、まずいしな」"

[[dialogue]]
speaker = "unk"
# そうして俺たちは一時解散し、次なる『フィーニスの塔・攻略』が可能な日を待つことにした。
line = "そうして俺たちは一時解散し、次なる『フィーニスの塔・攻略』が可能な日を待つことにした。"

[[dialogue]]
speaker = "unk"
# 先日の事件の対応や、またまた増えたアステラの対応なんかに追われつつも……
line = "先日の事件の対応や、またまた増えたアステラの対応なんかに追われつつも……"

[[dialogue]]
speaker = "unk"
# 一週間ばかり経ってようやく、俺たちは再び集合できた。
line = "一週間ばかり経ってようやく、俺たちは再び集合できた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「よーし、揃ったわね」
line = "「よーし、揃ったわね」"

[[dialogue]]
speaker = "unk"
# フィーニスの塔へ到着した俺たち。
line = "フィーニスの塔へ到着した俺たち。"

[[dialogue]]
speaker = "unk"
# 今日はアステラの報告もなく平穏なため、ここを調べるには絶好の機会と捉えた。
line = "今日はアステラの報告もなく平穏なため、ここを調べるには絶好の機会と捉えた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「誰も見てないわね？　先生とか」
line = "「誰も見てないわね？　先生とか」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。なんだか不良になってしまったようです」
line = "「ふふ。なんだか不良になってしまったようです」"

[[dialogue]]
speaker = "クロト"
# 「共犯だな」
line = "「共犯だな」"

[[dialogue]]
speaker = "unk"
# 相変わらず塔の周囲には結界が張り巡らされており、生徒の立ち入りも禁じられている。
line = "相変わらず塔の周囲には結界が張り巡らされており、生徒の立ち入りも禁じられている。"

[[dialogue]]
speaker = "unk"
# 太古の昔に女神が建てたシンボル──いくら星徒会といえども易々と踏み入れていい場所ではない。
line = "太古の昔に女神が建てたシンボル──いくら星徒会といえども易々と踏み入れていい場所ではない。"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも背に腹は代えられないわ。前と同じメンバーだし、大丈夫でしょ！」
line = "「でも背に腹は代えられないわ。前と同じメンバーだし、大丈夫でしょ！」"

[[dialogue]]
speaker = "クロト"
# 「そういえば、今日はニャリオンとキリカさんがいないんだな」
line = "「そういえば、今日はニャリオンとキリカさんがいないんだな」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカは今日、実家でメイド隊への修練があるらしくて。ニャリオンは……星徒会室で仕事をすると張り切っていましたが、どうでしょう」
line = "「キリカは今日、実家でメイド隊への修練があるらしくて。ニャリオンは……星徒会室で仕事をすると張り切っていましたが、どうでしょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ニャリオンはきっとサボってるわね」
line = "「ニャリオンはきっとサボってるわね」"

[[dialogue]]
speaker = "クロト"
# 「少しは信用してあげてもいいんじゃないか？」
line = "「少しは信用してあげてもいいんじゃないか？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。ですが、ニャリオンは呼ぼうと思えばいつでも呼べるのです。私の召喚獣ですから」
line = "「ふふ。ですが、ニャリオンは呼ぼうと思えばいつでも呼べるのです。私の召喚獣ですから」"

[[dialogue]]
speaker = "unk"
# フィオナの星術は召喚に特化している。
line = "フィオナの星術は召喚に特化している。"

[[dialogue]]
speaker = "unk"
# その優秀さは前回の共闘を経てもよくわかったし、そばにいてくれると頼もしい。
line = "その優秀さは前回の共闘を経てもよくわかったし、そばにいてくれると頼もしい。"

[[dialogue]]
speaker = "クロト"
# 「前回は確か……ヴィーナスが開けって手をかざしたら招かれたんだよな」
line = "「前回は確か……ヴィーナスが開けって手をかざしたら招かれたんだよな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね！　今回も私の腕前にまっかせなさい♪」
line = "「そうね！　今回も私の腕前にまっかせなさい♪」"

[[dialogue]]
speaker = "フィオナ"
# 「少々お待ちを。その前に、連絡を済ませておいたほうがよいかと思われます。前回は中へ入ると……電波が閉ざされてしまいましたから」
line = "「少々お待ちを。その前に、連絡を済ませておいたほうがよいかと思われます。前回は中へ入ると……電波が閉ざされてしまいましたから」"

[[dialogue]]
speaker = "クロト"
# 「わかった。新星のみんなには俺から連絡しておくよ」
line = "「わかった。新星のみんなには俺から連絡しておくよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「よろしくー♪」
line = "「よろしくー♪」"

[[dialogue]]
speaker = "unk"
# と、俺は懐から<ruby=ディスク>ＤＩＳＣ</ruby>を取り出した──のだが──
line = "と、俺は懐から<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>を取り出した──のだが──"

[[dialogue]]
speaker = "ヴィーナス"
# 「──っえ……！？　これ──塔の──っ……！？」
line = "「──っえ……！？　これ──塔の──っ……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「……！　私たちが、ここに立った時点で──」
line = "「……！　私たちが、ここに立った時点で──」"

[[dialogue]]
speaker = "クロト"
# 「問答無用──ってことか……！」
line = "「問答無用──ってことか……！」"

[[dialogue]]
speaker = "unk"
# 想定外の強引な招待──
line = "想定外の強引な招待──"

[[dialogue]]
speaker = "unk"
# そうして、俺たちはそのまま光に呑み込まれていった……。
line = "そうして、俺たちはそのまま光に呑み込まれていった……。"
