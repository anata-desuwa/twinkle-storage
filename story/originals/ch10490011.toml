[[dialogue]]
speaker = "unk"
# 第１話,紅い元気印,P
line = "第１話,紅い元気印,P"

[[dialogue]]
speaker = "unk"
# 彼女が現れたのは、星徒会長になって間もない、とある放課後のことだった──
line = "彼女が現れたのは、星徒会長になって間もない、とある放課後のことだった──"

[[dialogue]]
speaker = "紅明"
# 「失礼しまーす！！！　星徒会に元気のお届けものでーす！！！」
line = "「失礼しまーす！！！　星徒会に元気のお届けものでーす！！！」"

[[dialogue]]
speaker = "unk"
# うわっ！？　声デッカ！？
line = "うわっ！？　声デッカ！？"

[[dialogue]]
speaker = "紅明"
# 「ありゃりゃ？　やっちまったぜ☆　アタシ、声デカいってよく注意されるんだよね～。メンゴメンゴ」
line = "「ありゃりゃ？　やっちまったぜ☆　アタシ、声デカいってよく注意されるんだよね～。メンゴメンゴ」"

[[dialogue]]
speaker = "アナ"
# 「いきなり誰かと思えば、<ruby=こうめい>紅明</ruby>さんじゃないですか。何か星徒会にご用ですか？」
line = "「いきなり誰かと思えば、<ruby>紅明<rt>こうめい</rt></ruby>さんじゃないですか。何か星徒会にご用ですか？」"

[[dialogue]]
speaker = "紅明"
# 「おっす♪　アナっち元気～！？　いや～、今日も小さく可愛い～ね☆　ゲへへ、オジサンに撫でさせてくれまいか」
line = "「おっす♪　アナっち元気～！？　いや～、今日も小さく可愛い～ね☆　ゲへへ、オジサンに撫でさせてくれまいか」"

[[dialogue]]
speaker = "アナ"
# 「笑い方が下品なんでノーセンキュー。お引き取り下さい」
line = "「笑い方が下品なんでノーセンキュー。お引き取り下さい」"

[[dialogue]]
speaker = "紅明"
# 「アハハ、冗談だって～☆　今日はあれよ、噂の星徒会長に営業しに来たわけよ！」
line = "「アハハ、冗談だって～☆　今日はあれよ、噂の星徒会長に営業しに来たわけよ！」"

[[dialogue]]
speaker = "unk"
# あれ？　キミの顔、どこかで見たことあるような……
line = "あれ？　キミの顔、どこかで見たことあるような……"

[[dialogue]]
speaker = "アナ"
# 「おそらくテレビですね。紅明さんは有名なタレントなんですよ」
line = "「おそらくテレビですね。紅明さんは有名なタレントなんですよ」"

[[dialogue]]
speaker = "紅明"
# 「はじめまして、会長さん。アタシの名は、<ruby=ぎゅう>牛</ruby>紅明！　新星学園２年の元気印だぜ☆」
line = "「はじめまして、会長さん。アタシの名は、<ruby>牛<rt>ぎゅう</rt></ruby>紅明！　新星学園２年の元気印だぜ☆」"

[[dialogue]]
speaker = "unk"
# あっ、エナジードリンクのＣМでよく観る！
line = "あっ、エナジードリンクのＣМでよく観る！"

[[dialogue]]
speaker = "紅明"
# 「そうそう、それよ！　エナジー牛乳『ホルスタミン』のＣМな！」
line = "「そうそう、それよ！　エナジー牛乳『ホルスタミン』のＣМな！」"

[[dialogue]]
speaker = "紅明"
# 「なに、この間のバラエティー番組も観た？　お～、面白かったなら良かったぜ！」
line = "「なに、この間のバラエティー番組も観た？　お～、面白かったなら良かったぜ！」"

[[dialogue]]
speaker = "紅明"
# 「アタシがタレントやってるのは、世の為人の為、皆に元気届けたいからなんでね♪」
line = "「アタシがタレントやってるのは、世の為人の為、皆に元気届けたいからなんでね♪」"

[[dialogue]]
speaker = "紅明"
# 「アタシ、元々はグラビアアイドルとしてスカウトされて、ノリで仕事やってたんよ。でも、ある時テレビ出演したら、ありがたいことに人気が出てさ～」
line = "「アタシ、元々はグラビアアイドルとしてスカウトされて、ノリで仕事やってたんよ。でも、ある時テレビ出演したら、ありがたいことに人気が出てさ～」"

[[dialogue]]
speaker = "アナ"
# 「紅明さんは、さっき会長が言っていた、『ホルスタミン』のイメージキャラクターも務めています」
line = "「紅明さんは、さっき会長が言っていた、『ホルスタミン』のイメージキャラクターも務めています」"

[[dialogue]]
speaker = "アナ"
# 「そのテレビＣМに出演したことで、ＳＮＳで話題となり、ブレイクしたというわけですね」
line = "「そのテレビＣМに出演したことで、ＳＮＳで話題となり、ブレイクしたというわけですね」"

[[dialogue]]
speaker = "紅明"
# 「そこからタレントとして仕事が増えて行って、今に至るって感じかな」
line = "「そこからタレントとして仕事が増えて行って、今に至るって感じかな」"

[[dialogue]]
speaker = "紅明"
# 「ちなみに牛家は見ての通りの魔族だが、アタシの実家は人間界にあってな？　乳製品を取り扱う『善哉乳業』って会社を経営してんのさ！」
line = "「ちなみに牛家は見ての通りの魔族だが、アタシの実家は人間界にあってな？　乳製品を取り扱う『善哉乳業』って会社を経営してんのさ！」"

[[dialogue]]
speaker = "紅明"
# 「実はホルスタミンってのも、そこで作ってるエナジードリンクなんだよね！」
line = "「実はホルスタミンってのも、そこで作ってるエナジードリンクなんだよね！」"

[[dialogue]]
speaker = "unk"
# 善哉乳業って乳製品の最大手メーカーじゃないか！
line = "善哉乳業って乳製品の最大手メーカーじゃないか！"

[[dialogue]]
speaker = "紅明"
# 「そうなのよ。だから、善哉乳業がタレント活動のネームバリューにもなってるし、タレント活動が実家の宣伝にもなってるんで、超ラッキーって感じ☆」
line = "「そうなのよ。だから、善哉乳業がタレント活動のネームバリューにもなってるし、タレント活動が実家の宣伝にもなってるんで、超ラッキーって感じ☆」"

[[dialogue]]
speaker = "紅明"
# 「そんなわけで、先程から話題に上がっていたエナジー牛乳、ホルスタミンがこちらです！　はい、ドーン！！！」
line = "「そんなわけで、先程から話題に上がっていたエナジー牛乳、ホルスタミンがこちらです！　はい、ドーン！！！」"

[[dialogue]]
speaker = "unk"
# うわっ！？　まさかの１ケース！？
line = "うわっ！？　まさかの１ケース！？"

[[dialogue]]
speaker = "紅明"
# 「体力回復に効果抜群、しかも健康に害は無く、なんと医療でも使われる、善哉乳業最大のロングセラー商品、２４個入りだぜ☆」
line = "「体力回復に効果抜群、しかも健康に害は無く、なんと医療でも使われる、善哉乳業最大のロングセラー商品、２４個入りだぜ☆」"

[[dialogue]]
speaker = "紅明"
# 「今日はアタシとこのホルスタミンを星徒会に売り込む為に来たんで、これは仕事の合間にでも飲んで下さいな！」
line = "「今日はアタシとこのホルスタミンを星徒会に売り込む為に来たんで、これは仕事の合間にでも飲んで下さいな！」"

[[dialogue]]
speaker = "アナ"
# 「おー、ホルスタミンは私も愛用している逸品。せっかくですし、１本いただきます。ごくっ……ごくごく……」
line = "「おー、ホルスタミンは私も愛用している逸品。せっかくですし、１本いただきます。ごくっ……ごくごく……」"

[[dialogue]]
speaker = "unk"
# ありがとう。これからよろしくな、紅明
line = "ありがとう。これからよろしくな、紅明"

[[dialogue]]
speaker = "紅明"
# 「いやいや！　こちらこそ末永くよろしくだぜ、<b>ダーリン</b>♪」
line = "「いやいや！　こちらこそ末永くよろしくだぜ、<b>ダーリン</b>♪」"

[[dialogue]]
speaker = "アナ"
# 「ブフォッ！？」
line = "「ブフォッ！？」"

[[dialogue]]
speaker = "unk"
# だ、ダーリン！？
line = "だ、ダーリン！？"

[[dialogue]]
speaker = "アナ"
# 「ごほっ……ごほごほっ……！　む、むせました……！」
line = "「ごほっ……ごほごほっ……！　む、むせました……！」"

[[dialogue]]
speaker = "紅明"
# 「いや～、御前試合を観てた時からそんな気がしてたんだけど、実際に会ったら確信したよね！」
line = "「いや～、御前試合を観てた時からそんな気がしてたんだけど、実際に会ったら確信したよね！」"

[[dialogue]]
speaker = "紅明"
# 「やっべ！　会長さんマジ、ダーリンじゃんって！！！」
line = "「やっべ！　会長さんマジ、ダーリンじゃんって！！！」"

[[dialogue]]
speaker = "unk"
# いや、どういうこと！？
line = "いや、どういうこと！？"

[[dialogue]]
speaker = "紅明"
# 「おっとアカン、もうこんな時間か。実は今日この後、バラエティー番組の収録あんだよね！　ダッシュで行かないと！」
line = "「おっとアカン、もうこんな時間か。実は今日この後、バラエティー番組の収録あんだよね！　ダッシュで行かないと！」"

[[dialogue]]
speaker = "紅明"
# 「じゃあダーリン、また会いに来るから♪　アデュー☆」
line = "「じゃあダーリン、また会いに来るから♪　アデュー☆」"

[[dialogue]]
speaker = "アナ"
# 「これは……前会長に報告ですね（ジト目）」
line = "「これは……前会長に報告ですね（ジト目）」"

[[dialogue]]
speaker = "unk"
# 俺にもよくわかんないんだって！
line = "俺にもよくわかんないんだって！"

[[dialogue]]
speaker = "unk"
# 待って、違う！
line = "待って、違う！"

[[dialogue]]
speaker = "unk"
# 嵐のように彼女が去った後、俺はアナに釈明する羽目になるのだった。
line = "嵐のように彼女が去った後、俺はアナに釈明する羽目になるのだった。"
