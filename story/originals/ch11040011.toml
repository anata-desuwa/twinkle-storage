[[dialogue]]
speaker = "unk"
# 第１話,憑依型女優の真骨頂（前編）,P
line = "第１話,憑依型女優の真骨頂（前編）,P"

[[dialogue]]
speaker = "unk"
# 文化祭公演にて、藍との『ロミオとジュリエット』共演を終えた後──
line = "文化祭公演にて、藍との『ロミオとジュリエット』共演を終えた後──"

[[dialogue]]
speaker = "藍"
# 「事務所のマネージャーさんも、文化祭の劇を見に来てくれてまして……会長さんの演技もすごく褒めてましたよ。とても初主演の素人とは思えないって」
line = "「事務所のマネージャーさんも、文化祭の劇を見に来てくれてまして……会長さんの演技もすごく褒めてましたよ。とても初主演の素人とは思えないって」"

[[dialogue]]
speaker = "unk"
# 俺には慣れてくれたようで、視線を外されることなく、普通に会話ができるようになっていた。
line = "俺には慣れてくれたようで、視線を外されることなく、普通に会話ができるようになっていた。"

[[dialogue]]
speaker = "藍"
# 「あっ、会長さんには報告しておかなきゃ。今度、ドラマ出演が決まったんです！」
line = "「あっ、会長さんには報告しておかなきゃ。今度、ドラマ出演が決まったんです！」"

[[dialogue]]
speaker = "unk"
# やったね、おめでとう！
line = "やったね、おめでとう！"

[[dialogue]]
speaker = "藍"
# 「ありがとうございます。文化祭での熱演がマネージャーさんの胸にも響いたそうで……会長さんのおかげです」
line = "「ありがとうございます。文化祭での熱演がマネージャーさんの胸にも響いたそうで……会長さんのおかげです」"

[[dialogue]]
speaker = "藍"
# 「出演といってもヒロインのレミカ先輩のクラスメイトっていう……出番はちょっとだけで、５分も映らないような端役なんですけどね」
line = "「出演といってもヒロインのレミカ先輩のクラスメイトっていう……出番はちょっとだけで、５分も映らないような端役なんですけどね」"

[[dialogue]]
speaker = "藍"
# 「近いうちに、渋谷で撮影があるんです……あっ、恥ずかしいので、絶対に見に来ないでくださいね……絶対ですよ？」
line = "「近いうちに、渋谷で撮影があるんです……あっ、恥ずかしいので、絶対に見に来ないでくださいね……絶対ですよ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それはフリね！　絶対に見に行くしかないわ！」
line = "「それはフリね！　絶対に見に行くしかないわ！」"

[[dialogue]]
speaker = "unk"
# そのことが巡り巡ってヴィーナスの耳に届けば、こうなるのは自明の理。
line = "そのことが巡り巡ってヴィーナスの耳に届けば、こうなるのは自明の理。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私も文化祭で藍のファンになったもの！　今の内に未来の大女優からサインを貰っておいた方が良さそうね！」
line = "「私も文化祭で藍のファンになったもの！　今の内に未来の大女優からサインを貰っておいた方が良さそうね！」"

[[dialogue]]
speaker = "アナ"
# 「随分な青田買いですね。会長、ヴィーナス先輩の暴走ストッパー、よろしくお願いします」
line = "「随分な青田買いですね。会長、ヴィーナス先輩の暴走ストッパー、よろしくお願いします」"

[[dialogue]]
speaker = "unk"
# よろしく任された……
line = "よろしく任された……"

[[dialogue]]
speaker = "藍"
# 「うわぁ、うわぁ……ドラマや映画で見たことある顔の人がいっぱい……！」
line = "「うわぁ、うわぁ……ドラマや映画で見たことある顔の人がいっぱい……！」"

[[dialogue]]
speaker = "レミカ"
# 「藍、今日はよろしくね。ポラリスプロダクションの役者は凄いんだってとこ、見せつけよう」
line = "「藍、今日はよろしくね。ポラリスプロダクションの役者は凄いんだってとこ、見せつけよう」"

[[dialogue]]
speaker = "藍"
# 「は、はいっ、レミカ先輩との初共演、が、が、頑張りましゅっ！」
line = "「は、はいっ、レミカ先輩との初共演、が、が、頑張りましゅっ！」"

[[dialogue]]
speaker = "レミカ"
# 「あー、ガッチガチだね……文化祭のジュリエットみたいにメインじゃないし、もっと気楽に行こ？　あんまり気張りすぎないように──って、あれ？」
line = "「あー、ガッチガチだね……文化祭のジュリエットみたいにメインじゃないし、もっと気楽に行こ？　あんまり気張りすぎないように──って、あれ？」"

[[dialogue]]
speaker = "レミカ"
# 「ねぇ、藍、あそこにいるのって、会長とヴィーナス……だよね？」
line = "「ねぇ、藍、あそこにいるのって、会長とヴィーナス……だよね？」"

[[dialogue]]
speaker = "藍"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっほ～、レミカに藍。応援に来たわ！」
line = "「やっほ～、レミカに藍。応援に来たわ！」"

[[dialogue]]
speaker = "藍"
# 「か、会長さんっ！？　来ないでって言ったのに、なんで来ちゃうんですかぁ！？」
line = "「か、会長さんっ！？　来ないでって言ったのに、なんで来ちゃうんですかぁ！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの暴走は誰にも止められないんだ
line = "ヴィーナスの暴走は誰にも止められないんだ"

[[dialogue]]
speaker = "unk"
# 一応、止めたんだけど
line = "一応、止めたんだけど"

[[dialogue]]
speaker = "ヴィーナス"
# 「文化祭のジュリエット、とてもマーベラスだったわ！　あなたに直接伝えたかったの！」
line = "「文化祭のジュリエット、とてもマーベラスだったわ！　あなたに直接伝えたかったの！」"

[[dialogue]]
speaker = "藍"
# 「あ、ありがとうございます。ヴィーナス先輩にそう言っていただけるなんて……とっても嬉しいです」
line = "「あ、ありがとうございます。ヴィーナス先輩にそう言っていただけるなんて……とっても嬉しいです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、今回のはフリじゃなかったのね？　ダメよ、そうならそうと、もっと上手に伝えてくれないと！」
line = "「でも、今回のはフリじゃなかったのね？　ダメよ、そうならそうと、もっと上手に伝えてくれないと！」"

[[dialogue]]
speaker = "藍"
# 「えっ、ご、ごめんなさい……？　ええ……？　なんで私、怒られてるんですか……？　ヴィーナス先輩、部長とは違った意味で手強い方ですね……」
line = "「えっ、ご、ごめんなさい……？　ええ……？　なんで私、怒られてるんですか……？　ヴィーナス先輩、部長とは違った意味で手強い方ですね……」"

[[dialogue]]
speaker = "女学生Ａ"
# 「なになに、なんかの撮影？　あっ！？　あそこにいるのって、レミカちゃんじゃん！？　実物ヤッバー！」
line = "「なになに、なんかの撮影？　あっ！？　あそこにいるのって、レミカちゃんじゃん！？　実物ヤッバー！」"

[[dialogue]]
speaker = "女学生Ｂ"
# 「マジ！？　きゃわわの極み！　顔面、天才すぎんでしょ！」
line = "「マジ！？　きゃわわの極み！　顔面、天才すぎんでしょ！」"

[[dialogue]]
speaker = "レミカ"
# 「あはは、応援ありがと♪」
line = "「あはは、応援ありがと♪」"

[[dialogue]]
speaker = "女学生Ａ"
# 「きゃーっ！　ファンサも神ってるー！　んで、レミカちゃんの横の背ぇ高い子って……誰？　知ってるー？」
line = "「きゃーっ！　ファンサも神ってるー！　んで、レミカちゃんの横の背ぇ高い子って……誰？　知ってるー？」"

[[dialogue]]
speaker = "女学生Ｂ"
# 「知んなーい。新人じゃん？　可愛いけど花がないってゆーか、なんか地味めー。レミカちゃんしか勝たんし」
line = "「知んなーい。新人じゃん？　可愛いけど花がないってゆーか、なんか地味めー。レミカちゃんしか勝たんし」"

[[dialogue]]
speaker = "レミカ"
# 「結構ギャラリー集まってきちゃったね。早めに撮らないとヤバそうだけど……」
line = "「結構ギャラリー集まってきちゃったね。早めに撮らないとヤバそうだけど……」"

[[dialogue]]
speaker = "藍"
# 「あわ、あわわわ、視線がいっぱい……！」
line = "「あわ、あわわわ、視線がいっぱい……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「人が集まってきたってことは、むしろ目立つチャンスじゃない。地味とか言ってた子たちに、カニみたく一泡吹かせてやりましょ！」
line = "「人が集まってきたってことは、むしろ目立つチャンスじゃない。地味とか言ってた子たちに、カニみたく一泡吹かせてやりましょ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスみたいにメンタルお化けじゃないから
line = "ヴィーナスみたいにメンタルお化けじゃないから"

[[dialogue]]
speaker = "unk"
# 藍の緊張はＭＡＸの中、撮影はスタートする。
line = "藍の緊張はＭＡＸの中、撮影はスタートする。"

[[dialogue]]
speaker = "レミカ"
# 「──ごめんなさい。いきなりアイドルグループになんて勧誘されても困るよね」
line = "「──ごめんなさい。いきなりアイドルグループになんて勧誘されても困るよね」"

[[dialogue]]
speaker = "藍"
# 「しょ、しょんなことっ、ない、よぉ！　でも、あたしにはグループなんて、絶対無理、だ、しぃ……！」
line = "「しょ、しょんなことっ、ない、よぉ！　でも、あたしにはグループなんて、絶対無理、だ、しぃ……！」"

[[dialogue]]
speaker = "監督"
# 「カット、カーット！　キミぃ、ＮＧ何度目？」
line = "「カット、カーット！　キミぃ、ＮＧ何度目？」"

[[dialogue]]
speaker = "藍"
# 「ひっ……！　ご、ごめんなさい、ごめんなさい！」
line = "「ひっ……！　ご、ごめんなさい、ごめんなさい！」"

[[dialogue]]
speaker = "レミカ"
# 「監督さん、彼女、大きな現場は初めてだから緊張しちゃってるんですよ。スイッチの入った彼女の演技は本当に凄いですから、期待しててください」
line = "「監督さん、彼女、大きな現場は初めてだから緊張しちゃってるんですよ。スイッチの入った彼女の演技は本当に凄いですから、期待しててください」"

[[dialogue]]
speaker = "監督"
# 「そうかい？　レミカちゃんがそういうんなら間違いないんだろうけどさぁ……」
line = "「そうかい？　レミカちゃんがそういうんなら間違いないんだろうけどさぁ……」"

[[dialogue]]
speaker = "レミカ"
# 「彼女が落ち着くまで、私だけでも撮れるシーン、先回しにできますか？　──はい、ありがとうございます！」
line = "「彼女が落ち着くまで、私だけでも撮れるシーン、先回しにできますか？　──はい、ありがとうございます！」"

[[dialogue]]
speaker = "藍"
# 「レミカ先輩……ごめんなさい、主演ドラマを台無しにしちゃうような真似……！」
line = "「レミカ先輩……ごめんなさい、主演ドラマを台無しにしちゃうような真似……！」"

[[dialogue]]
speaker = "レミカ"
# 「大丈夫、全然大丈夫。落ち着いてこ？　会長、藍のこと、頼むね」
line = "「大丈夫、全然大丈夫。落ち着いてこ？　会長、藍のこと、頼むね」"

[[dialogue]]
speaker = "藍"
# 「はぁ……会長さんのおかげで、男の人にも少しは慣れたと思ったんですけど……やっぱりまだ苦手なままみたいです……私、ダメダメですね……」
line = "「はぁ……会長さんのおかげで、男の人にも少しは慣れたと思ったんですけど……やっぱりまだ苦手なままみたいです……私、ダメダメですね……」"

[[dialogue]]
speaker = "unk"
# ダメダメなんかじゃないよ
line = "ダメダメなんかじゃないよ"

[[dialogue]]
speaker = "unk"
# 場の緊張に加え、監督の圧にすっかりやられてしまっていた。
line = "場の緊張に加え、監督の圧にすっかりやられてしまっていた。"

[[dialogue]]
speaker = "unk"
# それでも藍なら──藍の天才的な演技力があれば、この場を打開できる策がきっとあるはずだ。
line = "それでも藍なら──藍の天才的な演技力があれば、この場を打開できる策がきっとあるはずだ。"
