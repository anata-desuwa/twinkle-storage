[[dialogue]]
speaker = "unk"
# 第１話,ルルカの新衣装,P
line = "第１話,ルルカの新衣装,P"

[[dialogue]]
speaker = "unk"
# とある平日の午後──俺はルルカと共に、リップルが作り出したリゾート結界を訪れていた。
line = "とある平日の午後──俺はルルカと共に、リップルが作り出したリゾート結界を訪れていた。"

[[dialogue]]
speaker = "unk"
# リゾート結界は観光地としても有名になってしまったが、リップルに頼めば別空間のプライベートビーチに入れてもらうこともできる。
line = "リゾート結界は観光地としても有名になってしまったが、リップルに頼めば別空間のプライベートビーチに入れてもらうこともできる。"

[[dialogue]]
speaker = "unk"
# Ｖチューバー関連の打ち合わせをするにはもってこいの場所なのだ。
line = "Ｖチューバー関連の打ち合わせをするにはもってこいの場所なのだ。"

[[dialogue]]
speaker = "ルルカ"
# 「──で、これが今度の新曲と一緒に披露する、ルカルカの新衣装のラフイラストだよ！」
line = "「──で、これが今度の新曲と一緒に披露する、ルカルカの新衣装のラフイラストだよ！」"

[[dialogue]]
speaker = "ルルカ"
# 「とっても素敵な水着姿をデザインしてもらったんだぁ。このイルカの浮き輪も可愛いよね～♪」
line = "「とっても素敵な水着姿をデザインしてもらったんだぁ。このイルカの浮き輪も可愛いよね～♪」"

[[dialogue]]
speaker = "unk"
# もう夏は過ぎてるのに水着？
line = "もう夏は過ぎてるのに水着？"

[[dialogue]]
speaker = "ルルカ"
# 「ぅぐっ──！　そ、それはあの、えっとー……あたしのスタートダッシュが遅かったと言うか、何と言うか……」
line = "「ぅぐっ──！　そ、それはあの、えっとー……あたしのスタートダッシュが遅かったと言うか、何と言うか……」"

[[dialogue]]
speaker = "ルルカ"
# 「本当は夏に間に合わせるつもりだったんだけど、予想以上に時間がかかっちゃって……」
line = "「本当は夏に間に合わせるつもりだったんだけど、予想以上に時間がかかっちゃって……」"

[[dialogue]]
speaker = "ルルカ"
# 「配信とかで忙しくてついつい後回しになって……ようやくラフが上がってきたのが今だったの……」
line = "「配信とかで忙しくてついつい後回しになって……ようやくラフが上がってきたのが今だったの……」"

[[dialogue]]
speaker = "ルルカ"
# 「で、でもＶチューバーが夏でない時期に水着になっちゃいけないって法律はないし！　ないよねっ！？」
line = "「で、でもＶチューバーが夏でない時期に水着になっちゃいけないって法律はないし！　ないよねっ！？」"

[[dialogue]]
speaker = "ルルカ"
# 「それにクオリティの高い動画でさえあれば何も問題ない、はず……！」
line = "「それにクオリティの高い動画でさえあれば何も問題ない、はず……！」"

[[dialogue]]
speaker = "ルルカ"
# 「新曲もすっごく自信のあるやつだし、動画編集もいつもの人にお願いする予定だし……きっとみんなに気に入ってもらえると思うんだ！」
line = "「新曲もすっごく自信のあるやつだし、動画編集もいつもの人にお願いする予定だし……きっとみんなに気に入ってもらえると思うんだ！」"

[[dialogue]]
speaker = "ルルカ"
# 「──って、脱線しちゃったね。とりあえず水着の感想が欲しいの。お兄ちゃんはどう思う？」
line = "「──って、脱線しちゃったね。とりあえず水着の感想が欲しいの。お兄ちゃんはどう思う？」"

[[dialogue]]
speaker = "unk"
# すごく可愛いと思う。それに……
line = "すごく可愛いと思う。それに……"

[[dialogue]]
speaker = "ルルカ"
# 「それに？」
line = "「それに？」"

[[dialogue]]
speaker = "unk"
# 公開前の衣装が見られるのが嬉しい
line = "公開前の衣装が見られるのが嬉しい"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ♪　それはもちろん、お兄ちゃんは『汐ルカルカ』の秘密を共有するパートナーだもん！」
line = "「えへへ♪　それはもちろん、お兄ちゃんは『汐ルカルカ』の秘密を共有するパートナーだもん！」"

[[dialogue]]
speaker = "ルルカ"
# 「それにー……あ、あたしの彼氏さんでもあるし？　こ、このくらいの特別扱いは良いかなぁ～って……」
line = "「それにー……あ、あたしの彼氏さんでもあるし？　こ、このくらいの特別扱いは良いかなぁ～って……」"

[[dialogue]]
speaker = "ルルカ"
# 「ふふ～♪　今でも信じられないよ～。まさかお兄ちゃんに告白をＯＫしてもらえるって思ってなかったから」
line = "「ふふ～♪　今でも信じられないよ～。まさかお兄ちゃんに告白をＯＫしてもらえるって思ってなかったから」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃん、覚えてる？　あたしが告白したのも、このリゾート結界の中だったよね？」
line = "「お兄ちゃん、覚えてる？　あたしが告白したのも、このリゾート結界の中だったよね？」"

[[dialogue]]
speaker = "unk"
# もちろん覚えている。あれは数カ月前。リゾート結界でいつものようにルルカの歌の練習に付き合った帰り道のこと──
line = "もちろん覚えている。あれは数カ月前。リゾート結界でいつものようにルルカの歌の練習に付き合った帰り道のこと──"

[[dialogue]]
speaker = "ルルカ"
# 「お、お兄ちゃんって、今はお付き合いしてる人、いないよね！？」
line = "「お、お兄ちゃんって、今はお付き合いしてる人、いないよね！？」"

[[dialogue]]
speaker = "ルルカ"
# 「も、もしよかったら……あたしの恋人になって欲しいのっ！」
line = "「も、もしよかったら……あたしの恋人になって欲しいのっ！」"

[[dialogue]]
speaker = "ルルカ"
# 「あたしが落ち込んだ時、いつも自分のことみたいに考えてくれる優しいお兄ちゃんのことが、すごくすごく、大好きなの……」
line = "「あたしが落ち込んだ時、いつも自分のことみたいに考えてくれる優しいお兄ちゃんのことが、すごくすごく、大好きなの……」"

[[dialogue]]
speaker = "ルルカ"
# 「それにお兄ちゃんって魔王なんでしょ？　これからどんどん危ない戦いに立ち向かっていかなきゃいけないんだよね？」
line = "「それにお兄ちゃんって魔王なんでしょ？　これからどんどん危ない戦いに立ち向かっていかなきゃいけないんだよね？」"

[[dialogue]]
speaker = "ルルカ"
# 「あたし、星騎士としてだけじゃなくて、恋人としてもお兄ちゃんのことを支えたいって思ってるんだ……」
line = "「あたし、星騎士としてだけじゃなくて、恋人としてもお兄ちゃんのことを支えたいって思ってるんだ……」"

[[dialogue]]
speaker = "ルルカ"
# 「星徒会の人みたいに優秀じゃないし、可愛くもないかもだけど……お兄ちゃんを想う気持ちなら誰にも負けないから！」
line = "「星徒会の人みたいに優秀じゃないし、可愛くもないかもだけど……お兄ちゃんを想う気持ちなら誰にも負けないから！」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃんの隣に立てるように頑張るから……だから、えっと……お、お返事、聞かせてくれる？」
line = "「お兄ちゃんの隣に立てるように頑張るから……だから、えっと……お、お返事、聞かせてくれる？」"

[[dialogue]]
speaker = "ルルカ"
# 「……え？　付き合ってもいいけど、１つだけお願いがある……？」
line = "「……え？　付き合ってもいいけど、１つだけお願いがある……？」"

[[dialogue]]
speaker = "ルルカ"
# 「う、うん！　いいよっ！　お兄ちゃんとお付き合いできるなら、何でも言って！　どんなこと！？」
line = "「う、うん！　いいよっ！　お兄ちゃんとお付き合いできるなら、何でも言って！　どんなこと！？」"

[[dialogue]]
speaker = "ルルカ"
# 「あの時、すっごく緊張してたし不安だったけど、その後のお願いを聞いて一気に肩の力が抜けたんだよね～」
line = "「あの時、すっごく緊張してたし不安だったけど、その後のお願いを聞いて一気に肩の力が抜けたんだよね～」"

[[dialogue]]
speaker = "ルルカ"
# 「驚いたよ～。まさか恋人になった後も『お兄ちゃん』って呼んで欲しいって言われると思ってなかったもん」
line = "「驚いたよ～。まさか恋人になった後も『お兄ちゃん』って呼んで欲しいって言われると思ってなかったもん」"

[[dialogue]]
speaker = "ルルカ"
# 「──ううん、嫌じゃないよ？　あたしもお兄ちゃんのこと、お兄ちゃんって呼ぶの、好きだから」
line = "「──ううん、嫌じゃないよ？　あたしもお兄ちゃんのこと、お兄ちゃんって呼ぶの、好きだから」"

[[dialogue]]
speaker = "ルルカ"
# 「ただ呼び方を変えてないから、未だにあたしとお兄ちゃんがお付き合いしてないって思ってる友達も、けっこういるんだよね……」
line = "「ただ呼び方を変えてないから、未だにあたしとお兄ちゃんがお付き合いしてないって思ってる友達も、けっこういるんだよね……」"

[[dialogue]]
speaker = "ルルカ"
# 「でも時間が解決してくれるよね。ふふ♪　学園でもいつもいちゃいちゃしてるもん、あたしたち」
line = "「でも時間が解決してくれるよね。ふふ♪　学園でもいつもいちゃいちゃしてるもん、あたしたち」"

[[dialogue]]
speaker = "ルルカ"
# 「……で！　実はまだお兄ちゃんに見せたいものがあるんだ～。よーく見ててね！」
line = "「……で！　実はまだお兄ちゃんに見せたいものがあるんだ～。よーく見ててね！」"

[[dialogue]]
speaker = "ルルカ"
# 「いくよー……変身っ！」
line = "「いくよー……変身っ！」"

[[dialogue]]
speaker = "ルルカ"
# 「じゃーんっ！　どうかな、どうかなー♪　驚いた、お兄ちゃん？」
line = "「じゃーんっ！　どうかな、どうかなー♪　驚いた、お兄ちゃん？」"

[[dialogue]]
speaker = "unk"
# さっきのイラストと同じ水着……！？
line = "さっきのイラストと同じ水着……！？"

[[dialogue]]
speaker = "ルルカ"
# 「そう！　あたしの普段の戦闘服って、Ｖチューバーのアバターとおんなじデザインでしょ？」
line = "「そう！　あたしの普段の戦闘服って、Ｖチューバーのアバターとおんなじデザインでしょ？」"

[[dialogue]]
speaker = "ルルカ"
# 「イメージから引っ張られてるんだと思うんだけど……だったら水着でも同じ効果が得られるんじゃないかなって思って」
line = "「イメージから引っ張られてるんだと思うんだけど……だったら水着でも同じ効果が得られるんじゃないかなって思って」"

[[dialogue]]
speaker = "ルルカ"
# 「アナちゃんやサーシャ先輩も、リゾート結界で水着フォームを獲得したって聞いたから、昨日試したんだ～♪」
line = "「アナちゃんやサーシャ先輩も、リゾート結界で水着フォームを獲得したって聞いたから、昨日試したんだ～♪」"

[[dialogue]]
speaker = "ルルカ"
# 「モンスターとの戦いよりも先に、大好きなお兄ちゃんに水着フォームを見て欲しかったの♪」
line = "「モンスターとの戦いよりも先に、大好きなお兄ちゃんに水着フォームを見て欲しかったの♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ど、どうかな。変じゃないかなぁ……？」
line = "「ど、どうかな。変じゃないかなぁ……？」"

[[dialogue]]
speaker = "unk"
# Ｖチューバーのアバターより可愛い！
line = "Ｖチューバーのアバターより可愛い！"

[[dialogue]]
speaker = "ルルカ"
# 「そ、それは褒めすぎじゃないかな……！　でへへぇ、でもありがと♪」
line = "「そ、それは褒めすぎじゃないかな……！　でへへぇ、でもありがと♪」"

[[dialogue]]
speaker = "ルルカ"
# 「ここで提案なんだけど。お兄ちゃん。今日は打ち合わせの前に、ちょっとだけ海で遊んで行かない？」
line = "「ここで提案なんだけど。お兄ちゃん。今日は打ち合わせの前に、ちょっとだけ海で遊んで行かない？」"

[[dialogue]]
speaker = "unk"
# それもいいけど、その前に……
line = "それもいいけど、その前に……"

[[dialogue]]
speaker = "ルルカ"
# 「わ。あ、あはは<emoji=heart04>　お兄ちゃん、お顔近いよぉ……？　ルルカが可愛くて我慢できなくなっちゃった？」
line = "「わ。あ、あはは<emoji=heart04>　お兄ちゃん、お顔近いよぉ……？　ルルカが可愛くて我慢できなくなっちゃった？」"

[[dialogue]]
speaker = "ルルカ"
# 「んー……キスしてもいいかって、そ、そういうこと、聞かなくてもいいんだよ？」
line = "「んー……キスしてもいいかって、そ、そういうこと、聞かなくてもいいんだよ？」"

[[dialogue]]
speaker = "ルルカ"
# 「汐ルカルカはみんなのアイドルだけど、ルルカはお兄ちゃんだけの恋人なんだから」
line = "「汐ルカルカはみんなのアイドルだけど、ルルカはお兄ちゃんだけの恋人なんだから」"

[[dialogue]]
speaker = "ルルカ"
# 「んっ……ちゅっ<emoji=heart04>　ちゅ、んちゅぅっ……ちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>　ちゅ、んちゅぅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「えへへ……うん。いっぱい可愛いって言って？　お兄ちゃん、好きっ……んちゅ、ちゅぅっ……ちゅっ<emoji=heart04>」
line = "「えへへ……うん。いっぱい可愛いって言って？　お兄ちゃん、好きっ……んちゅ、ちゅぅっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「ふぅっ──学園と違って、ここだと誰もいないから、いっぱいキスできるね？」
line = "「ふぅっ──学園と違って、ここだと誰もいないから、いっぱいキスできるね？」"

[[dialogue]]
speaker = "ルルカ"
# 「でもあんまりキスばっかりしてたら、海に泳ぎに行けないよ……？」
line = "「でもあんまりキスばっかりしてたら、海に泳ぎに行けないよ……？」"

[[dialogue]]
speaker = "ルルカ"
# 「あ──んんっ<emoji=heart04>　ちゅぅっ……ちゅ、ちゅぅーっ……<emoji=heart04>」
line = "「あ──んんっ<emoji=heart04>　ちゅぅっ……ちゅ、ちゅぅーっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ルルカ"
# 「もぉ……しょうがないお兄ちゃん。えへ……ん、ちゅぅ<emoji=heart04>」
line = "「もぉ……しょうがないお兄ちゃん。えへ……ん、ちゅぅ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 水着姿のルルカがあまりに可愛くて、愛おしくて。俺はいつまでも恋人である彼女を抱き寄せ、キスをしてしまうのだった──
line = "水着姿のルルカがあまりに可愛くて、愛おしくて。俺はいつまでも恋人である彼女を抱き寄せ、キスをしてしまうのだった──"
