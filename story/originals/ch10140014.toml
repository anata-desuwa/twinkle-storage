[[dialogue]]
speaker = "unk"
# 第４話,酒酔いトワイライト・後編,P
line = "第４話,酒酔いトワイライト・後編,P"

[[dialogue]]
speaker = "unk"
# 俺の胸に抱き付いたまま眠ってしまったトワ先生。それから小一時間ほど経過し、回復体質によって、完全に酔いが醒めたようで──
line = "俺の胸に抱き付いたまま眠ってしまったトワ先生。それから小一時間ほど経過し、回復体質によって、完全に酔いが醒めたようで──"

[[dialogue]]
speaker = "トワ先生"
# 「んんっ……ここは……？」
line = "「んんっ……ここは……？」"

[[dialogue]]
speaker = "unk"
# あっ、先生。目が覚めましたか？
line = "あっ、先生。目が覚めましたか？"

[[dialogue]]
speaker = "トワ先生"
# 「あれ……どうしてキミが……？　なんでだっけ……？」
line = "「あれ……どうしてキミが……？　なんでだっけ……？」"

[[dialogue]]
speaker = "トワ先生"
# 「ええと、確か……酔っているわたしを、キミが介抱してくれて、それで──」
line = "「ええと、確か……酔っているわたしを、キミが介抱してくれて、それで──」"

[[dialogue]]
speaker = "トワ先生"
# 「……って、なんじゃこりゃあぁぁぁっ！？」
line = "「……って、なんじゃこりゃあぁぁぁっ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「え！？　ちょっと待って、なんで！？　どうして先生、キミに赤ちゃん抱っこされてるの！？」
line = "「え！？　ちょっと待って、なんで！？　どうして先生、キミに赤ちゃん抱っこされてるの！？」"

[[dialogue]]
speaker = "トワ先生"
# 「そ、そう！　キミに泣きついて眠っちゃったのは思い出したけども！　赤ちゃん抱っことかしてなかったよね！？」
line = "「そ、そう！　キミに泣きついて眠っちゃったのは思い出したけども！　赤ちゃん抱っことかしてなかったよね！？」"

[[dialogue]]
speaker = "unk"
# 寝言で赤ちゃん抱っこがいい、って言っていたので──
line = "寝言で赤ちゃん抱っこがいい、って言っていたので──"

[[dialogue]]
speaker = "トワ先生"
# 「ま、まさか……なんでそんな……はっ！？」
line = "「ま、まさか……なんでそんな……はっ！？」"

[[dialogue]]
speaker = "トワ先生"
# （心当たりは……ある！）
line = "（心当たりは……ある！）"

[[dialogue]]
speaker = "トワ先生"
# （結婚式に来てた友達に、彼氏に抱き締められながら飲むお酒が凄く幸せな気分になるとか、惚気を聞かされたのを覚えてる）
line = "（結婚式に来てた友達に、彼氏に抱き締められながら飲むお酒が凄く幸せな気分になるとか、惚気を聞かされたのを覚えてる）"

[[dialogue]]
speaker = "トワ先生"
# （赤ちゃん抱っこの体勢が特に癖になるとか何とか……。わたし、もともと酔うと抱き付き魔になるって自覚はあったし）
line = "（赤ちゃん抱っこの体勢が特に癖になるとか何とか……。わたし、もともと酔うと抱き付き魔になるって自覚はあったし）"

[[dialogue]]
speaker = "トワ先生"
# 「ま、まさか……それでわたし、無意識に……？」
line = "「ま、まさか……それでわたし、無意識に……？」"

[[dialogue]]
speaker = "トワ先生"
# 「う……うわぁぁぁ！　恥ずかしいぃぃぃ！　何やっちゃってんの、わたしぃぃぃ！」
line = "「う……うわぁぁぁ！　恥ずかしいぃぃぃ！　何やっちゃってんの、わたしぃぃぃ！」"

[[dialogue]]
speaker = "トワ先生"
# 「いくら彼氏がいないからって、先生が生徒に赤ちゃん抱っこおねだりとか！　う……うぅぅ……うえぇぇぇん！」
line = "「いくら彼氏がいないからって、先生が生徒に赤ちゃん抱っこおねだりとか！　う……うぅぅ……うえぇぇぇん！」"

[[dialogue]]
speaker = "トワ先生"
# 「しかも酔ってた時と寝言で２度も……うぅぅぅ！」
line = "「しかも酔ってた時と寝言で２度も……うぅぅぅ！」"

[[dialogue]]
speaker = "トワ先生"
# 「それだけじゃなくて、ぐすっ……不安になって、キミに変なこと色々言っちゃったし！」
line = "「それだけじゃなくて、ぐすっ……不安になって、キミに変なこと色々言っちゃったし！」"

[[dialogue]]
speaker = "トワ先生"
# 「恥ずかし過ぎて、先生もう生きていけないぃ！　うわぁぁぁん！」
line = "「恥ずかし過ぎて、先生もう生きていけないぃ！　うわぁぁぁん！」"

[[dialogue]]
speaker = "unk"
# 先生、落ち着いて
line = "先生、落ち着いて"

[[dialogue]]
speaker = "トワ先生"
# 「そんなの無理だよ！　こんなの泣くに決まってるでしょ！？」
line = "「そんなの無理だよ！　こんなの泣くに決まってるでしょ！？」"

[[dialogue]]
speaker = "トワ先生"
# 「うぅぅぅ！　わたしは先生なのに、生徒のキミにこんなところ見られて……！」
line = "「うぅぅぅ！　わたしは先生なのに、生徒のキミにこんなところ見られて……！」"

[[dialogue]]
speaker = "トワ先生"
# 「とんでもなく迷惑掛けまくってるし！　ぐすっ……年上としても立場がなくて、もうどうしたらいいかわかんないよぉ！　うわぁぁぁん！」
line = "「とんでもなく迷惑掛けまくってるし！　ぐすっ……年上としても立場がなくて、もうどうしたらいいかわかんないよぉ！　うわぁぁぁん！」"

[[dialogue]]
speaker = "unk"
# 俺は、先生のことを知れて良かったって思ってますよ
line = "俺は、先生のことを知れて良かったって思ってますよ"

[[dialogue]]
speaker = "トワ先生"
# 「うぇっ！？　そ、それってどういう……！？」
line = "「うぇっ！？　そ、それってどういう……！？」"

[[dialogue]]
speaker = "トワ先生"
# 「先生……キミとは年とか離れてるのに……？　それは何というかその……ありが、とう……？」
line = "「先生……キミとは年とか離れてるのに……？　それは何というかその……ありが、とう……？」"

[[dialogue]]
speaker = "トワ先生"
# 「いや、先生は確かにちっちゃくて可愛いけども！　それはそれとして……ずっと年上なんだから、年下の男の子に女の子扱いされたら……やっぱり照れるの！」
line = "「いや、先生は確かにちっちゃくて可愛いけども！　それはそれとして……ずっと年上なんだから、年下の男の子に女の子扱いされたら……やっぱり照れるの！」"

[[dialogue]]
speaker = "トワ先生"
# 「……これからも愚痴とか聞いてくれるの？　それはあんまり先生らしくないっていうか……。で、でも、またこういう状況になって、迷惑掛けちゃうのもあれだし」
line = "「……これからも愚痴とか聞いてくれるの？　それはあんまり先生らしくないっていうか……。で、でも、またこういう状況になって、迷惑掛けちゃうのもあれだし」"

[[dialogue]]
speaker = "トワ先生"
# 「愚痴とは言わないまでも、ときどき話を聞いてもらっちゃおう、かな……？」
line = "「愚痴とは言わないまでも、ときどき話を聞いてもらっちゃおう、かな……？」"

[[dialogue]]
speaker = "unk"
# なので、酔い過ぎて夜に一人歩きしたりしないように
line = "なので、酔い過ぎて夜に一人歩きしたりしないように"

[[dialogue]]
speaker = "トワ先生"
# 「う……それは、確かに……。危なかったよね。ごめんなさい、反省します……」
line = "「う……それは、確かに……。危なかったよね。ごめんなさい、反省します……」"

[[dialogue]]
speaker = "トワ先生"
# （というか、今思い出した。キミがあの時、わたしに言ってくれたこと──）
line = "（というか、今思い出した。キミがあの時、わたしに言ってくれたこと──）"

[[dialogue]]
speaker = "トワ先生"
# （リクリエは俺が止めます、そうしたら安心してくれますか、って……）
line = "（リクリエは俺が止めます、そうしたら安心してくれますか、って……）"

[[dialogue]]
speaker = "トワ先生"
# （わたし、凄く嬉しかった。それこそ涙が止まらないくらいに）
line = "（わたし、凄く嬉しかった。それこそ涙が止まらないくらいに）"

[[dialogue]]
speaker = "トワ先生"
# （あの瞬間にわたしは、キミのことを──）
line = "（あの瞬間にわたしは、キミのことを──）"

[[dialogue]]
speaker = "トワ先生"
# 「あ、あの……もう１つお願い、してもいい？」
line = "「あ、あの……もう１つお願い、してもいい？」"

[[dialogue]]
speaker = "トワ先生"
# 「その……少しでいいんだけど、まだこのままでいて、いいかな？」
line = "「その……少しでいいんだけど、まだこのままでいて、いいかな？」"

[[dialogue]]
speaker = "トワ先生"
# 「ほ、本当？　ありがとう……えへへ♪」
line = "「ほ、本当？　ありがとう……えへへ♪」"

[[dialogue]]
speaker = "unk"
# 先生、寝言でこの方が安心するって言ってましたから
line = "先生、寝言でこの方が安心するって言ってましたから"

[[dialogue]]
speaker = "トワ先生"
# 「そ、そんなことまで！？　うぅぅぅ……恥ずかしいよぉ……」
line = "「そ、そんなことまで！？　うぅぅぅ……恥ずかしいよぉ……」"

[[dialogue]]
speaker = "トワ先生"
# 「じゃあ、えっと……こっちからもうちょっとだけくっ付くのも、大丈夫……かな？　その方が安心、するし……？」
line = "「じゃあ、えっと……こっちからもうちょっとだけくっ付くのも、大丈夫……かな？　その方が安心、するし……？」"

[[dialogue]]
speaker = "トワ先生"
# 「い、いいの？　それじゃあ……」
line = "「い、いいの？　それじゃあ……」"

[[dialogue]]
speaker = "トワ先生"
# 「うん……確かに、凄く安心する……」
line = "「うん……確かに、凄く安心する……」"

[[dialogue]]
speaker = "トワ先生"
# （心臓はドキドキしてて、全然落ち着かないけど）
line = "（心臓はドキドキしてて、全然落ち着かないけど）"

[[dialogue]]
speaker = "トワ先生"
# （あっ、でも……キミのドキドキも伝わって来る。ふふっ、わたしと一緒なんだ）
line = "（あっ、でも……キミのドキドキも伝わって来る。ふふっ、わたしと一緒なんだ）"

[[dialogue]]
speaker = "トワ先生"
# 「……先生、やっぱり彼氏いなくてよかったかも」
line = "「……先生、やっぱり彼氏いなくてよかったかも」"

[[dialogue]]
speaker = "トワ先生"
# 「どうしてって？　……それは内緒♪」
line = "「どうしてって？　……それは内緒♪」"

[[dialogue]]
speaker = "unk"
# トワ先生はそう言って、なんだか嬉しそうに微笑むのだった。
line = "トワ先生はそう言って、なんだか嬉しそうに微笑むのだった。"
