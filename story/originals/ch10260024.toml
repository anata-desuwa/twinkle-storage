[[dialogue]]
speaker = "unk"
# 第４話,じゃれ合いはこれからも,P
line = "第４話,じゃれ合いはこれからも,P"

[[dialogue]]
speaker = "unk"
# リーリアとじゃれ合った日からしばらくが経ち、とある放課後。
line = "リーリアとじゃれ合った日からしばらくが経ち、とある放課後。"

[[dialogue]]
speaker = "リーリア"
# 「いや～、センパイってば、私のこと好きすぎちゃって困るな～☆」
line = "「いや～、センパイってば、私のこと好きすぎちゃって困るな～☆」"

[[dialogue]]
speaker = "unk"
# はいはい、愛してますよ～
line = "はいはい、愛してますよ～"

[[dialogue]]
speaker = "リーリア"
# 「って、もっと心込めて下さいよ、センパ～イ！　まあ、言葉にしてくれるのは嬉しいですけど♪」
line = "「って、もっと心込めて下さいよ、センパ～イ！　まあ、言葉にしてくれるのは嬉しいですけど♪」"

[[dialogue]]
speaker = "unk"
# デスクワーク中だから、後でね
line = "デスクワーク中だから、後でね"

[[dialogue]]
speaker = "アナ"
# 「そうですよ、リーリアさん。会長に構ってアピールしてないで、仕事して下さい。遊びじゃなく手伝いに来てるんですよね？」
line = "「そうですよ、リーリアさん。会長に構ってアピールしてないで、仕事して下さい。遊びじゃなく手伝いに来てるんですよね？」"

[[dialogue]]
speaker = "リーリア"
# 「心配ナッシング☆　ほら、アナちゃん、さっきの書類はもうできてるから♪」
line = "「心配ナッシング☆　ほら、アナちゃん、さっきの書類はもうできてるから♪」"

[[dialogue]]
speaker = "アナ"
# 「……見かけによらず、仕事できますね、リーリアさん。学園の成績も上位ですし……」
line = "「……見かけによらず、仕事できますね、リーリアさん。学園の成績も上位ですし……」"

[[dialogue]]
speaker = "リーリア"
# 「ふふん、可愛い見た目に騙されるなかれ♪　こう見えても、私は若くして学園へのスパイ任務に抜擢された、ネビュラの優秀なエージェントなんだから☆」
line = "「ふふん、可愛い見た目に騙されるなかれ♪　こう見えても、私は若くして学園へのスパイ任務に抜擢された、ネビュラの優秀なエージェントなんだから☆」"

[[dialogue]]
speaker = "アナ"
# 「いや可愛いとは別に言ってないですけど。――でも、最近すっかり、リーリアさんも星徒会メンバーみたいな感じになっちゃいましたね」
line = "「いや可愛いとは別に言ってないですけど。――でも、最近すっかり、リーリアさんも星徒会メンバーみたいな感じになっちゃいましたね」"

[[dialogue]]
speaker = "リーリア"
# 「私はセンパイの可愛い後輩彼女にして、有能秘書なんで☆」
line = "「私はセンパイの可愛い後輩彼女にして、有能秘書なんで☆」"

[[dialogue]]
speaker = "アナ"
# 「はいはい、ごちそうさまです」
line = "「はいはい、ごちそうさまです」"

[[dialogue]]
speaker = "unk"
# というか、リーリアって若かったんだな
line = "というか、リーリアって若かったんだな"

[[dialogue]]
speaker = "リーリア"
# 「え」
line = "「え」"

[[dialogue]]
speaker = "リーリア"
# 「ちょっと待って下さい、センパイ。何ですその反応？　確かに今まで年齢明かしたことなかったですけど……まさかすごく高齢だと思ってたとか言わないですよね！？」
line = "「ちょっと待って下さい、センパイ。何ですその反応？　確かに今まで年齢明かしたことなかったですけど……まさかすごく高齢だと思ってたとか言わないですよね！？」"

[[dialogue]]
speaker = "アナ"
# 「まあ、正体が魔女だと聞いて、実は見た目が若いだけで、私たちの何倍も年上なのに、会長よりも年下の後輩と偽って、『センパ～イ☆』とかあざとく言ってた――」
line = "「まあ、正体が魔女だと聞いて、実は見た目が若いだけで、私たちの何倍も年上なのに、会長よりも年下の後輩と偽って、『センパ～イ☆』とかあざとく言ってた――」"

[[dialogue]]
speaker = "アナ"
# 「みたいな、そういうちょっと気まずいパターンもあり得ると思ってたので、若いと聞いてほっとしました。……で、実際はどのくらい年上なんです？」
line = "「みたいな、そういうちょっと気まずいパターンもあり得ると思ってたので、若いと聞いてほっとしました。……で、実際はどのくらい年上なんです？」"

[[dialogue]]
speaker = "リーリア"
# 「アナちゃん！？」
line = "「アナちゃん！？」"

[[dialogue]]
speaker = "unk"
# 俺はそこで深呼吸をして――
line = "俺はそこで深呼吸をして――"

[[dialogue]]
speaker = "unk"
# 心の準備はできてる
line = "心の準備はできてる"

[[dialogue]]
speaker = "unk"
# リーリア、大丈夫だ
line = "リーリア、大丈夫だ"

[[dialogue]]
speaker = "リーリア"
# 「センパイ！？　いや、待って！　なんか年上であることが確定になってません！？　違いますから！　私、ちゃんとセンパイよりも年下ですから！！！」
line = "「センパイ！？　いや、待って！　なんか年上であることが確定になってません！？　違いますから！　私、ちゃんとセンパイよりも年下ですから！！！」"

[[dialogue]]
speaker = "リーリア"
# 「アナちゃんと同い年！　リアル年齢がちょうど学園に通うのにぴったりだったってのが、スパイに選ばれた理由の１つなんです！　本当ですよ！？」
line = "「アナちゃんと同い年！　リアル年齢がちょうど学園に通うのにぴったりだったってのが、スパイに選ばれた理由の１つなんです！　本当ですよ！？」"

[[dialogue]]
speaker = "アナ"
# 「……冗談です。この前、私と会長でセドナさんと話す機会があって、世間話でリーリアさんってぶっちゃけ何歳なんですかって聞いてたんで」
line = "「……冗談です。この前、私と会長でセドナさんと話す機会があって、世間話でリーリアさんってぶっちゃけ何歳なんですかって聞いてたんで」"

[[dialogue]]
speaker = "リーリア"
# 「えっ……ってことは、センパイもわかってやってたんですか！？　可愛い彼女を騙しましたね～！？」
line = "「えっ……ってことは、センパイもわかってやってたんですか！？　可愛い彼女を騙しましたね～！？」"

[[dialogue]]
speaker = "unk"
# てへぺろ☆
line = "てへぺろ☆"

[[dialogue]]
speaker = "リーリア"
# 「くっ……可愛い！　怒りたいのに許しちゃう！」
line = "「くっ……可愛い！　怒りたいのに許しちゃう！」"

[[dialogue]]
speaker = "アナ"
# 「バカップルですか。――よし、会長。エスメラルダ先生から確認を頼まれてた書類が終わったんで、ちょっと職員室に届けて来ます」
line = "「バカップルですか。――よし、会長。エスメラルダ先生から確認を頼まれてた書類が終わったんで、ちょっと職員室に届けて来ます」"

[[dialogue]]
speaker = "unk"
# と、アナが席を外し、星徒会室で２人になるや否や――
line = "と、アナが席を外し、星徒会室で２人になるや否や――"

[[dialogue]]
speaker = "リーリア"
# 「セ～ンパイ<emoji=heart04>」
line = "「セ～ンパイ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアは、すすすっと俺の隣に寄ってきて、
line = "リーリアは、すすすっと俺の隣に寄ってきて、"

[[dialogue]]
speaker = "リーリア"
# 「２人きりになったので、ちょっと休憩しましょ<emoji=heart04>　じゃれ合いモードもお休みして、優しくして欲しいです。ん～<emoji=heart04>」
line = "「２人きりになったので、ちょっと休憩しましょ<emoji=heart04>　じゃれ合いモードもお休みして、優しくして欲しいです。ん～<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「ん……センパイ、好き……<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」
line = "「ん……センパイ、好き……<emoji=heart04>　ちゅっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「んっ……ふぅ……<emoji=heart04>　えへへ……イチャイチャの甘さでとろけちゃいそう……<emoji=heart04>」
line = "「んっ……ふぅ……<emoji=heart04>　えへへ……イチャイチャの甘さでとろけちゃいそう……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、頭も撫でて欲しいです<emoji=heart04>　あ……<emoji=heart04>」
line = "「センパイ、頭も撫でて欲しいです<emoji=heart04>　あ……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「はあぁ……<emoji=heart04>　じゃれ合いもいいですけど、こうして優しくされるのも、やっぱり好きです……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　じゃれ合いもいいですけど、こうして優しくされるのも、やっぱり好きです……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「ね、センパイ……？　キス、もう１回……<emoji=heart04>」
line = "「ね、センパイ……？　キス、もう１回……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「――え？　あんまりやり過ぎるとムラムラしちゃう、ですか？」
line = "「――え？　あんまりやり過ぎるとムラムラしちゃう、ですか？」"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ……<emoji=heart04>　センパイのえっち<emoji=heart04>」
line = "「ふふっ……<emoji=heart04>　センパイのえっち<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんな風にしばらくイチャイチャしていると――
line = "そんな風にしばらくイチャイチャしていると――"

[[dialogue]]
speaker = "アナ"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "リーリア"
# 「って、うわぁ！？　アナちゃん！？　もう戻って来てたの！？」
line = "「って、うわぁ！？　アナちゃん！？　もう戻って来てたの！？」"

[[dialogue]]
speaker = "アナ"
# 「ええ。しかし、なるほど……会長と２人きりになると、リーリアさんってそんな感じになるんですね」
line = "「ええ。しかし、なるほど……会長と２人きりになると、リーリアさんってそんな感じになるんですね」"

[[dialogue]]
speaker = "リーリア"
# 「～～～っ！」
line = "「～～～っ！」"

[[dialogue]]
speaker = "アナ"
# 「あっ、私のことはお構いなく。どうぞ続けて下さい」
line = "「あっ、私のことはお構いなく。どうぞ続けて下さい」"

[[dialogue]]
speaker = "リーリア"
# 「いや無理でしょ！」
line = "「いや無理でしょ！」"

[[dialogue]]
speaker = "アナ"
# 「……しかし、ヒトとは変わるものですね。最初はスパイ活動としてあざとく会長に擦り寄ってたのに、今ではすっかり本気になってしまってメロメロと……」
line = "「……しかし、ヒトとは変わるものですね。最初はスパイ活動としてあざとく会長に擦り寄ってたのに、今ではすっかり本気になってしまってメロメロと……」"

[[dialogue]]
speaker = "リーリア"
# 「い、今のは、他の人には秘密にして～！」
line = "「い、今のは、他の人には秘密にして～！」"

[[dialogue]]
speaker = "unk"
# 顔を真っ赤にして慌てるリーリア。俺はそんな彼女も可愛いと思って、つい笑ってしまうのだった。
line = "顔を真っ赤にして慌てるリーリア。俺はそんな彼女も可愛いと思って、つい笑ってしまうのだった。"
