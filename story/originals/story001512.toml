[[dialogue]]
speaker = "unk"
# 砲撃の眩い光が消え去った後――そこにディーラックの姿はなかった。
line = "砲撃の眩い光が消え去った後――そこにディーラックの姿はなかった。"

[[dialogue]]
speaker = "unk"
# 一瞬、消滅してしまったのかとも思ったが、トレジアンナさん曰く、そうではないらしい。
line = "一瞬、消滅してしまったのかとも思ったが、トレジアンナさん曰く、そうではないらしい。"

[[dialogue]]
speaker = "トレジアンナ"
# 「最後の言葉の直後、ロストアイテムの反応を感じました。おそらく、ディーラックさんは別のロストアイテムも隠し持っていたんでしょう」
line = "「最後の言葉の直後、ロストアイテムの反応を感じました。おそらく、ディーラックさんは別のロストアイテムも隠し持っていたんでしょう」"

[[dialogue]]
speaker = "サチ"
# 「だからこそ、トレジアンナさんが回収術式を放った時に、ディーラックさんは避けた。当たれば隠し持っているロストアイテムがバレてしまうから」
line = "「だからこそ、トレジアンナさんが回収術式を放った時に、ディーラックさんは避けた。当たれば隠し持っているロストアイテムがバレてしまうから」"

[[dialogue]]
speaker = "プリムラ"
# 「ディーラックは最終手段として、それを使って逃げたということか。用意周到な奴じゃ」
line = "「ディーラックは最終手段として、それを使って逃げたということか。用意周到な奴じゃ」"

[[dialogue]]
speaker = "サーシャ"
# 「すぐに使わなかったのは、おそらく私の凍結能力を警戒してたのね。プリムラちゃんの攻撃の閃光で、私たちの視界から外れるタイミングを狙ったんだわ」
line = "「すぐに使わなかったのは、おそらく私の凍結能力を警戒してたのね。プリムラちゃんの攻撃の閃光で、私たちの視界から外れるタイミングを狙ったんだわ」"

[[dialogue]]
speaker = "シズハ"
# 「とりあえず、ディーちゃんは逃げて、まだ生きているってことね」
line = "「とりあえず、ディーちゃんは逃げて、まだ生きているってことね」"

[[dialogue]]
speaker = "シズハ"
# 「なら……」
line = "「なら……」"

[[dialogue]]
speaker = "シズハ"
# 「次に会ったら、私が悪さを止めてみせる――」
line = "「次に会ったら、私が悪さを止めてみせる――」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃんは、私の友達だから」
line = "「ディーちゃんは、私の友達だから」"

[[dialogue]]
speaker = "プリムラ"
# 「おい、シズハ」
line = "「おい、シズハ」"

[[dialogue]]
speaker = "プリムラ"
# 「まさか、１人でとは言わぬじゃろうな？」
line = "「まさか、１人でとは言わぬじゃろうな？」"

[[dialogue]]
speaker = "シズハ"
# 「……！　プリムラちゃん」
line = "「……！　プリムラちゃん」"

[[dialogue]]
speaker = "プリムラ"
# 「我も当然、参加するぞ。あやつの顔に、拳を叩き込み損ねたからな」
line = "「我も当然、参加するぞ。あやつの顔に、拳を叩き込み損ねたからな」"

[[dialogue]]
speaker = "サチ"
# 「そうだよ。私たちも力を貸すから！　ディーラックさんがロストアイテムをまた暴走させようとするなら、止めないと」
line = "「そうだよ。私たちも力を貸すから！　ディーラックさんがロストアイテムをまた暴走させようとするなら、止めないと」"

[[dialogue]]
speaker = "トレジアンナ"
# 「元はと言えば、ディーラックさんを生み出したのは私たちの責任でもあります。当然、私もお手伝いします！」
line = "「元はと言えば、ディーラックさんを生み出したのは私たちの責任でもあります。当然、私もお手伝いします！」"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃん、トレジアンナさん」
line = "「サチちゃん、トレジアンナさん」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろん、私も力を貸すわよ。シズハちゃんが困っている時は、年上のお姉さんとして、いつでも駆け付けるから♪」
line = "「もちろん、私も力を貸すわよ。シズハちゃんが困っている時は、年上のお姉さんとして、いつでも駆け付けるから♪」"

[[dialogue]]
speaker = "シズハ"
# 「サーシャさん」
line = "「サーシャさん」"

[[dialogue]]
speaker = "unk"
# 俺たちはもう、シズハの仲間だ
だから、一緒に戦おう
line = "俺たちはもう、シズハの仲間だ
だから、一緒に戦おう"

[[dialogue]]
speaker = "シズハ"
# 「会長……みんな、ありがとう！」
line = "「会長……みんな、ありがとう！」"

[[dialogue]]
speaker = "シズハ"
# （ディーちゃん、私、あなたのおかげで、こうして沢山の友達と出会うことができたよ）
line = "（ディーちゃん、私、あなたのおかげで、こうして沢山の友達と出会うことができたよ）"

[[dialogue]]
speaker = "シズハ"
# （だからそう簡単に、あなたのことを諦めないから）
line = "（だからそう簡単に、あなたのことを諦めないから）"

[[dialogue]]
speaker = "シズハ"
# （今度会った時は――）
line = "（今度会った時は――）"

[[dialogue]]
speaker = "シズハ"
# （あなたの叶えたい願いが何なのか、私に教えて欲しい）
line = "（あなたの叶えたい願いが何なのか、私に教えて欲しい）"

[[dialogue]]
speaker = "unk"
# シズハは決意した表情で、空を見上げるのだった――
line = "シズハは決意した表情で、空を見上げるのだった――"

[[dialogue]]
speaker = "unk"
# 後日。
line = "後日。"

[[dialogue]]
speaker = "unk"
# 日常に戻り、俺とサーシャさんが星徒会室で書類仕事をしていると――
line = "日常に戻り、俺とサーシャさんが星徒会室で書類仕事をしていると――"

[[dialogue]]
speaker = "シズハ"
# 「失礼しま～す！」
line = "「失礼しま～す！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、シズハちゃん。いらっしゃい♪」
line = "「あら、シズハちゃん。いらっしゃい♪」"

[[dialogue]]
speaker = "シズハ"
# 「あっ、サーシャさん！　ごきげんよう♪　……って、机に書類が山積みだけど、もしかして今日は忙しい日だった？」
line = "「あっ、サーシャさん！　ごきげんよう♪　……って、机に書類が山積みだけど、もしかして今日は忙しい日だった？」"

[[dialogue]]
speaker = "unk"
# 大丈夫
line = "大丈夫"

[[dialogue]]
speaker = "サーシャ"
# 「ちょうど、少ししたら休憩にしようって会長くんと話してたところだったの。それで、今日はどうしたの？」
line = "「ちょうど、少ししたら休憩にしようって会長くんと話してたところだったの。それで、今日はどうしたの？」"

[[dialogue]]
speaker = "シズハ"
# 「えへへ♪　実はね、私、附属校で部活に入ることになって。そのことを会長とサーシャさんに報告しようと思って来たんだ！」
line = "「えへへ♪　実はね、私、附属校で部活に入ることになって。そのことを会長とサーシャさんに報告しようと思って来たんだ！」"

[[dialogue]]
speaker = "unk"
# なんの部活にしたんだ？
line = "なんの部活にしたんだ？"

[[dialogue]]
speaker = "シズハ"
# 「えっとね――合気道部！」
line = "「えっとね――合気道部！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　いいじゃない。シズハちゃんは格闘技が好きだって言ってたものね」
line = "「あら～♪　いいじゃない。シズハちゃんは格闘技が好きだって言ってたものね」"

[[dialogue]]
speaker = "シズハ"
# 「うん！　今までは病気だったから、映像で観るだけだったけど、治ったからには自分でもやってみたいなと思って♪」
line = "「うん！　今までは病気だったから、映像で観るだけだったけど、治ったからには自分でもやってみたいなと思って♪」"

[[dialogue]]
speaker = "unk"
# それから、部活の話題で盛り上がっていると――
line = "それから、部活の話題で盛り上がっていると――"

[[dialogue]]
speaker = "unk"
# シズハのＤＩＳＣが鳴って、彼女は画面を開く。
line = "シズハのＤＩＳＣが鳴って、彼女は画面を開く。"

[[dialogue]]
speaker = "シズハ"
# 「サチちゃんからだ。……って！　新たなロストアイテムが現れたみたい！　私、ちょっと行って来るね！」
line = "「サチちゃんからだ。……って！　新たなロストアイテムが現れたみたい！　私、ちょっと行って来るね！」"

[[dialogue]]
speaker = "unk"
# 俺たちもまた手伝うよ
line = "俺たちもまた手伝うよ"

[[dialogue]]
speaker = "シズハ"
# 「ありがとう。でも、今日は星徒会の仕事が忙しいんだよね？　だったら、任せて！」
line = "「ありがとう。でも、今日は星徒会の仕事が忙しいんだよね？　だったら、任せて！」"

[[dialogue]]
speaker = "シズハ"
# 「――変身！」
line = "「――変身！」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃんがいなくとも、私は魔法少女なんだから！」
line = "「ディーちゃんがいなくとも、私は魔法少女なんだから！」"

[[dialogue]]
speaker = "サーシャ"
# 「わかったわ。でもピンチになったら、ちゃんと呼ぶのよ？」
line = "「わかったわ。でもピンチになったら、ちゃんと呼ぶのよ？」"

[[dialogue]]
speaker = "シズハ"
# 「うん、大丈夫！　私、誰かに頼るのは得意だから♪　――なんてね♪」
line = "「うん、大丈夫！　私、誰かに頼るのは得意だから♪　――なんてね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふ♪　それじゃあ――」
line = "「あらあら、うふふ♪　それじゃあ――」"

[[dialogue]]
speaker = "サーシャ"
# 「気を付けて行ってらっしゃい、シズハちゃん」
line = "「気を付けて行ってらっしゃい、シズハちゃん」"

[[dialogue]]
speaker = "シズハ"
# 「うん、サーシャさん、会長！　行って来ます！」
line = "「うん、サーシャさん、会長！　行って来ます！」"

[[dialogue]]
speaker = "unk"
# そう言って、新たな魔法少女は自分の足で、元気に部屋から駆け出していくのだった――
line = "そう言って、新たな魔法少女は自分の足で、元気に部屋から駆け出していくのだった――"
