[[dialogue]]
speaker = "マハムート"
# 「さて、２人の転入生を賭けて競うことになったわけだけど――」
line = "「さて、２人の転入生を賭けて競うことになったわけだけど――」"

[[dialogue]]
speaker = "マハムート"
# 「フニは流星市国外から来て間もないということだし、改めて状況を説明しておこうかしら」
line = "「フニは流星市国外から来て間もないということだし、改めて状況を説明しておこうかしら」"

[[dialogue]]
speaker = "フェニエル"
# 「ありがとうございます……。北海道にもモンスターは出るんですけど、私は事故のショックなのか、戦った時の記憶が曖昧で……」
line = "「ありがとうございます……。北海道にもモンスターは出るんですけど、私は事故のショックなのか、戦った時の記憶が曖昧で……」"

[[dialogue]]
speaker = "フェニエル"
# 「自分に星力がある、って言われても、まだいまいち実感が持てていない状態なので……」
line = "「自分に星力がある、って言われても、まだいまいち実感が持てていない状態なので……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「状況を説明……というのは、『学園対抗杯』の仕組みを、ですの？」
line = "「状況を説明……というのは、『学園対抗杯』の仕組みを、ですの？」"

[[dialogue]]
speaker = "マハムート"
# 「そうね。でも、何故そんなものがあるかを知るためにも、元凶であるリクリエの話からしておくべきでしょう」
line = "「そうね。でも、何故そんなものがあるかを知るためにも、元凶であるリクリエの話からしておくべきでしょう」"

[[dialogue]]
speaker = "マハムート"
# 「――これは普通の学園でも習うことだと思うけど、３０００年前に、リクリエというこの世を滅ぼしかねない<ruby=やくさい>厄災</ruby>が起こったわ」
line = "「――これは普通の学園でも習うことだと思うけど、３０００年前に、リクリエというこの世を滅ぼしかねない<ruby>厄災<rt>やくさい</rt></ruby>が起こったわ」"

[[dialogue]]
speaker = "マハムート"
# 「それは魔族である私の故郷の魔界、天使のハーフであるヒルディオーネのルーツがある天界、そしてここ人間界……その三界すべてを飲み込む悪夢だったと言われているの」
line = "「それは魔族である私の故郷の魔界、天使のハーフであるヒルディオーネのルーツがある天界、そしてここ人間界……その三界すべてを飲み込む悪夢だったと言われているの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「３０００年前は、天使、魔族、人間がそれぞれ協力して、リクリエの厄災を防いだそうですわ。その時の最終決戦場がここ、流星市国であった……と」
line = "「３０００年前は、天使、魔族、人間がそれぞれ協力して、リクリエの厄災を防いだそうですわ。その時の最終決戦場がここ、流星市国であった……と」"

[[dialogue]]
speaker = "フェニエル"
# 「……ごくりっ」
line = "「……ごくりっ」"

[[dialogue]]
speaker = "マハムート"
# 「ことの詳細は伏せられているけれど、代々流星市国を治めている教皇庁の星見家は、３０００年前のリクリエ収束の立役者の一族とされているわ」
line = "「ことの詳細は伏せられているけれど、代々流星市国を治めている教皇庁の星見家は、３０００年前のリクリエ収束の立役者の一族とされているわ」"

[[dialogue]]
speaker = "マハムート"
# 「そして、３０００年前から、リクリエはこれで終わりではない、また再び、より力を増して戻って来るであろうことが予言されていたの」
line = "「そして、３０００年前から、リクリエはこれで終わりではない、また再び、より力を増して戻って来るであろうことが予言されていたの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「かつての厄災を防いだ者達は、『クルセイダース』と呼ばれていましたわ。彼らは『霊力』と呼ばれる力を使い、リクリエと戦っていたそうです」
line = "「かつての厄災を防いだ者達は、『クルセイダース』と呼ばれていましたわ。彼らは『霊力』と呼ばれる力を使い、リクリエと戦っていたそうです」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「しかし、霊力は３０００年前の戦いで失われてしまいました。その代わりとして、我々が崇める女神様が新たに与えてくださった力が、『星力』ですの」
line = "「しかし、霊力は３０００年前の戦いで失われてしまいました。その代わりとして、我々が崇める女神様が新たに与えてくださった力が、『星力』ですの」"

[[dialogue]]
speaker = "マハムート"
# 「そうは言っても、３０００年も前の話よ。権威化された神話であるし、どこまでが史実で、どこからが創作なのか、後世の民である我々には計りようもないけれどね」
line = "「そうは言っても、３０００年も前の話よ。権威化された神話であるし、どこまでが史実で、どこからが創作なのか、後世の民である我々には計りようもないけれどね」"

[[dialogue]]
speaker = "unk"
# マムは女神を信仰したりしてないんですか？
line = "マムは女神を信仰したりしてないんですか？"

[[dialogue]]
speaker = "マハムート"
# 「微妙なところね。流星教の信徒かと言われれば、明確にノーよ。だけど、女神の加護をまったく信じていないのかと言えば、そういうわけでもないわ」
line = "「微妙なところね。流星教の信徒かと言われれば、明確にノーよ。だけど、女神の加護をまったく信じていないのかと言えば、そういうわけでもないわ」"

[[dialogue]]
speaker = "マハムート"
# 「この世界に女神の足跡を裏付けるものはいくつかあって、『星力』はそのうちのひとつ。竜の魔族として、力には敬意を払う用意があるわ」
line = "「この世界に女神の足跡を裏付けるものはいくつかあって、『星力』はそのうちのひとつ。竜の魔族として、力には敬意を払う用意があるわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「全く……女神様の加護をただの力呼ばわりだなんて、とんだ不信心者ですわ」
line = "「全く……女神様の加護をただの力呼ばわりだなんて、とんだ不信心者ですわ」"

[[dialogue]]
speaker = "マハムート"
# 「わざわざ天界から流星市国に帰化した天使様の一族に、信心で競おうとは思わないわよ」
line = "「わざわざ天界から流星市国に帰化した天使様の一族に、信心で競おうとは思わないわよ」"

[[dialogue]]
speaker = "フェニエル"
# 「わ、私も……本当は天使らしいのですが、信心とかはよくわからなくて……。ううっ、ごめんなさい、お姉様……」
line = "「わ、私も……本当は天使らしいのですが、信心とかはよくわからなくて……。ううっ、ごめんなさい、お姉様……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いいのよ、フニ。信仰は与えられるものでも、強制されるものでもありませんわ。これからの人生で、あなたがあなたの信ずるものを見つけられればいいんですの」
line = "「いいのよ、フニ。信仰は与えられるものでも、強制されるものでもありませんわ。これからの人生で、あなたがあなたの信ずるものを見つけられればいいんですの」"

[[dialogue]]
speaker = "フェニエル"
# 「お姉様……！　私、女神様のことはなにもわからなくても、女神様を信じているお姉様のことなら、信じられますっ」
line = "「お姉様……！　私、女神様のことはなにもわからなくても、女神様を信じているお姉様のことなら、信じられますっ」"

[[dialogue]]
speaker = "マハムート"
# 「こんな純粋無垢な子を、ヒルディーのところに預けていいのかは、本気で心配になってきたわね」
line = "「こんな純粋無垢な子を、ヒルディーのところに預けていいのかは、本気で心配になってきたわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「３０００年前に発見された星力は、特に若者に多く発現し、大人になると多くは消失してしまう能力であることも判明しましたわ」
line = "「３０００年前に発見された星力は、特に若者に多く発現し、大人になると多くは消失してしまう能力であることも判明しましたわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「予言によれば、リクリエは再びやってくるとのことでしたから、その対策と研究のために設立されたのが、現在に至るまで存在し続けている流星学園というわけですの」
line = "「予言によれば、リクリエは再びやってくるとのことでしたから、その対策と研究のために設立されたのが、現在に至るまで存在し続けている流星学園というわけですの」"

[[dialogue]]
speaker = "マハムート"
# 「流星市国と流星学園は、リクリエの余波であるアステライトとモンスター対策も、長年担当してきた歴史があるわ」
line = "「流星市国と流星学園は、リクリエの余波であるアステライトとモンスター対策も、長年担当してきた歴史があるわ」"

[[dialogue]]
speaker = "マハムート"
# 「そして、予言に謳われたリクリエの厄災の再出現が、もうすぐであるという予想があるの」
line = "「そして、予言に謳われたリクリエの厄災の再出現が、もうすぐであるという予想があるの」"

[[dialogue]]
speaker = "マハムート"
# 「その備えの一環として、数十年前から準備されていて、つい６年前に開校されたのが、私たちの所属する新星学園というわけね」
line = "「その備えの一環として、数十年前から準備されていて、つい６年前に開校されたのが、私たちの所属する新星学園というわけね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「新星学園の特徴としては、流星学園よりも実験的な試みが多く、今まで以上に天界や魔界などから生徒を募集している点が挙げられますわね」
line = "「新星学園の特徴としては、流星学園よりも実験的な試みが多く、今まで以上に天界や魔界などから生徒を募集している点が挙げられますわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そして、そんな流星学園と新星学園は、姉妹校であると同時に唯一無二のライバル校でもありますわ！」
line = "「そして、そんな流星学園と新星学園は、姉妹校であると同時に唯一無二のライバル校でもありますわ！」"

[[dialogue]]
speaker = "フェニエル"
# 「ライバル校……仲間のはずなのに、争ってしまうんですか？」
line = "「ライバル校……仲間のはずなのに、争ってしまうんですか？」"

[[dialogue]]
speaker = "マハムート"
# 「切磋琢磨、というやつよ。両学園は競い合い、互いに貪欲な勝利を求めあうことが推奨されているの。校則にすら、そう書かれているわ」
line = "「切磋琢磨、というやつよ。両学園は競い合い、互いに貪欲な勝利を求めあうことが推奨されているの。校則にすら、そう書かれているわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「全ては来たるべきリクリエとの決戦に向けて備える為。私達は日々、競い合うことで、力を高め合っているのですわ」
line = "「全ては来たるべきリクリエとの決戦に向けて備える為。私達は日々、競い合うことで、力を高め合っているのですわ」"

[[dialogue]]
speaker = "マハムート"
# 「そして、その競争を推奨し、象徴する制度こそが、『学園対抗杯』なのよ」
line = "「そして、その競争を推奨し、象徴する制度こそが、『学園対抗杯』なのよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「学園の星騎士の出撃は記録されていて、倒したモンスターの数や強さ、攻略したアステラはすべて明らかにされておりますの」
line = "「学園の星騎士の出撃は記録されていて、倒したモンスターの数や強さ、攻略したアステラはすべて明らかにされておりますの」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「学園は新星開校以来、この数字を生徒たちにも公開して、両学園の生徒たちに競わせているのですわ」
line = "「学園は新星開校以来、この数字を生徒たちにも公開して、両学園の生徒たちに競わせているのですわ」"

[[dialogue]]
speaker = "マハムート"
# 「ん？　会長、何か質問かしら？」
line = "「ん？　会長、何か質問かしら？」"

[[dialogue]]
speaker = "マハムート"
# 「――新星と流星の星騎士間で、敵の取り合いは発生しないのかって？」
line = "「――新星と流星の星騎士間で、敵の取り合いは発生しないのかって？」"

[[dialogue]]
speaker = "マハムート"
# 「ほぼほぼ発生しないわね。プリマステラになるような子たちだもの、モンスターの危険性はみんなわかっているわ」
line = "「ほぼほぼ発生しないわね。プリマステラになるような子たちだもの、モンスターの危険性はみんなわかっているわ」"

[[dialogue]]
speaker = "マハムート"
# 「でも、例えば流星が先に交戦したモンスターに、救援要請がないのに新星が手出ししない、みたいな暗黙の了解はあるわ」
line = "「でも、例えば流星が先に交戦したモンスターに、救援要請がないのに新星が手出ししない、みたいな暗黙の了解はあるわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あとはそうですわね……アステライトの攻略については、早急な排除が求められる為、対処に当たった星徒会には平等に点が入るようになっていますわ」
line = "「あとはそうですわね……アステライトの攻略については、早急な排除が求められる為、対処に当たった星徒会には平等に点が入るようになっていますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ダンジョン内はより危険ですし、点取り合戦に熱中して、コアの排除が遅れたら元も子もありませんもの。協力してアステラを消滅させるのが優先ということですわ」
line = "「ダンジョン内はより危険ですし、点取り合戦に熱中して、コアの排除が遅れたら元も子もありませんもの。協力してアステラを消滅させるのが優先ということですわ」"

[[dialogue]]
speaker = "マハムート"
# 「そういう理由もあって、アステラの対処をすることが多い星徒会同士は、代々ライバル意識が薄いのよ。一緒にアステラ攻略をした仲だから、みたいな感じでね」
line = "「そういう理由もあって、アステラの対処をすることが多い星徒会同士は、代々ライバル意識が薄いのよ。一緒にアステラ攻略をした仲だから、みたいな感じでね」"

[[dialogue]]
speaker = "フェニエル"
# 「確かに……それは仲良くなってしまいそうですね」
line = "「確かに……それは仲良くなってしまいそうですね」"

[[dialogue]]
speaker = "マハムート"
# 「だけど――」
line = "「だけど――」"

[[dialogue]]
speaker = "マハムート"
# 「私の寮長政権下では、そんなぬるま湯は言語道断よ……！！」
line = "「私の寮長政権下では、そんなぬるま湯は言語道断よ……！！」"

[[dialogue]]
speaker = "マハムート"
# 「学園対抗杯の優勝で手に入るのは、名誉だけではないわ！　次年度の学園運営予算――」
line = "「学園対抗杯の優勝で手に入るのは、名誉だけではないわ！　次年度の学園運営予算――」"

[[dialogue]]
speaker = "マハムート"
# 「そう！　特に<b>寮予算</b>が、勝利した学園には多く割り振られるのよ！」
line = "「そう！　特に<b>寮予算</b>が、勝利した学園には多く割り振られるのよ！」"

[[dialogue]]
speaker = "マハムート"
# 「会長も見たでしょう！？　流星寮のあり得ない高級設備を……！」
line = "「会長も見たでしょう！？　流星寮のあり得ない高級設備を……！」"

[[dialogue]]
speaker = "unk"
# あれって学園対抗杯の影響なんですか！？
line = "あれって学園対抗杯の影響なんですか！？"

[[dialogue]]
speaker = "マハムート"
# 「そんなことあるわけないでしょう！！」
line = "「そんなことあるわけないでしょう！！」"

[[dialogue]]
speaker = "unk"
# ええぇぇ！？
line = "ええぇぇ！？"

[[dialogue]]
speaker = "マハムート"
# 「流星は卒業生が多いのをいいことに、ＯＢ、ＯＧの寄付金で寮を好き勝手にグレードアップしてるのよ！」
line = "「流星は卒業生が多いのをいいことに、ＯＢ、ＯＧの寄付金で寮を好き勝手にグレードアップしてるのよ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　それこそが伝統！　それだけ優秀な星騎士の方々を輩出して来たということですわ！」
line = "「おーっほっほっほ！　それこそが伝統！　それだけ優秀な星騎士の方々を輩出して来たということですわ！」"

[[dialogue]]
speaker = "マハムート"
# 「こっちはまだ開校して６年なのよ！？　不平等でしょうがっ！！」
line = "「こっちはまだ開校して６年なのよ！？　不平等でしょうがっ！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふふっ、積み重ね＝パワーですわよ、マハムート。とはいえ、寮の設備云々で撃墜スコアが決まるわけではありませんわよね？」
line = "「ふふっ、積み重ね＝パワーですわよ、マハムート。とはいえ、寮の設備云々で撃墜スコアが決まるわけではありませんわよね？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「３年連続で流星が勝利しているのは、私たち流星学園の生徒がそれだけ優秀だという証拠ですわ！」
line = "「３年連続で流星が勝利しているのは、私たち流星学園の生徒がそれだけ優秀だという証拠ですわ！」"

[[dialogue]]
speaker = "マハムート"
# 「<ruby=せいれいさい>星霊祭</ruby>の舞闘会は、３年連続で新星が優勝してるのよ」
line = "「<ruby>星霊祭<rt>せいれいさい</rt></ruby>の舞闘会は、３年連続で新星が優勝してるのよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ。個人技の能力──特にマハムート、あなたの力は高く評価していますわ」
line = "「ええ。個人技の能力──特にマハムート、あなたの力は高く評価していますわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「だから今年こそは、私がその天狗のように伸びた鼻っ面を叩き折って差し上げましてよ！」
line = "「だから今年こそは、私がその天狗のように伸びた鼻っ面を叩き折って差し上げましてよ！」"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ……出来るものならやってみなさいな、蒸気女」
line = "「ふふっ……出来るものならやってみなさいな、蒸気女」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おほほっ♪　何なら今から戦ってもよろしくてよ？　チビドラゴンさん？」
line = "「おほほっ♪　何なら今から戦ってもよろしくてよ？　チビドラゴンさん？」"

[[dialogue]]
speaker = "unk"
# 先輩方、脱線してますよ
line = "先輩方、脱線してますよ"

[[dialogue]]
speaker = "マハムート"
# 「……コホン。ともかく、寮予算が潤沢にある流星に、これ以上いい思いはさせられないってわけ」
line = "「……コホン。ともかく、寮予算が潤沢にある流星に、これ以上いい思いはさせられないってわけ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私たちも、先輩方が築き上げてきた栄光を、ここで終わらせるわけにはいかないという矜持がありますわ」
line = "「私たちも、先輩方が築き上げてきた栄光を、ここで終わらせるわけにはいかないという矜持がありますわ」"

[[dialogue]]
speaker = "フェニエル"
