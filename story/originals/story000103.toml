line = "「で、会長にとっては、今日私が教えていた月次報告書に話が戻るというわけね」"

[[dialogue]]
speaker = "マハムート"
# 「これで毎月の撃墜スコアを集計して、年度末になるとそれを合算……その結果で、その年の学園対抗杯の勝者が決まるわ」
line = "「これで毎月の撃墜スコアを集計して、年度末になるとそれを合算……その結果で、その年の学園対抗杯の勝者が決まるわ」"

[[dialogue]]
speaker = "マハムート"
# 「まあでも、ひと月分だって負けるのは気に食わないもの。今月分だけでも１回白黒付けましょう、というのが今回の催し――」
line = "「まあでも、ひと月分だって負けるのは気に食わないもの。今月分だけでも１回白黒付けましょう、というのが今回の催し――」"

[[dialogue]]
speaker = "マハムート"
# 「『寮生争奪チキチキ花いちもんめバトルウィーク』の主旨よ」
line = "「『寮生争奪チキチキ花いちもんめバトルウィーク』の主旨よ」"

[[dialogue]]
speaker = "unk"
# マムって、意外とノリいいですよね……
line = "マムって、意外とノリいいですよね……"

[[dialogue]]
speaker = "マハムート"
# 「力比べとゲームは好きよ。特にそこの調子に乗ってるお嬢様には、ギャフンと言わせてやらないと」
line = "「力比べとゲームは好きよ。特にそこの調子に乗ってるお嬢様には、ギャフンと言わせてやらないと」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、その言葉、そっくりそのままお返し致しますわ♪」
line = "「あら、その言葉、そっくりそのままお返し致しますわ♪」"

[[dialogue]]
speaker = "マハムート"
# 「というわけで、明日から<ruby=ラルーナ>新星寮</ruby>全員でパトロールの本数を増やして、どんどんモンスターを狩っていくわ。会長も参加なさい」
line = "「というわけで、明日から<ruby>新星寮<rt>ラルーナ</rt></ruby>全員でパトロールの本数を増やして、どんどんモンスターを狩っていくわ。会長も参加なさい」"

[[dialogue]]
speaker = "ヒルディオーネ"
