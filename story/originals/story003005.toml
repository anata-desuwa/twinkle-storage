[[dialogue]]
speaker = "舞亜"
# 「ごめんね～、付き合って貰っちゃって」
line = "「ごめんね～、付き合って貰っちゃって」"

[[dialogue]]
speaker = "舞亜"
# 「頭の中を整理するのに、誰かにお話、聞いて欲しいな～って思って」
line = "「頭の中を整理するのに、誰かにお話、聞いて欲しいな～って思って」"

[[dialogue]]
speaker = "unk"
# ローラースケート？
line = "ローラースケート？"

[[dialogue]]
speaker = "舞亜"
# 「車輪が一列だからインラインスケート。滑りながらの方が考えがまとまりそうだから」
line = "「車輪が一列だからインラインスケート。滑りながらの方が考えがまとまりそうだから」"

[[dialogue]]
speaker = "unk"
# スケート靴に履きかえた舞亜は、さっそく軽やかな動きで路上を滑っていく。
line = "スケート靴に履きかえた舞亜は、さっそく軽やかな動きで路上を滑っていく。"

[[dialogue]]
speaker = "unk"
# 滑るものなら何でもいけるんだ
line = "滑るものなら何でもいけるんだ"

[[dialogue]]
speaker = "unk"
# さすが……
line = "さすが……"

[[dialogue]]
speaker = "舞亜"
# 「あはは、その言い方よくなーい」
line = "「あはは、その言い方よくなーい」"

[[dialogue]]
speaker = "unk"
# 笑いながら綺麗なターンを決めて見せる舞亜。
line = "笑いながら綺麗なターンを決めて見せる舞亜。"

[[dialogue]]
speaker = "unk"
# その流麗さはさすがというほか無く、思わず見入ってしまうほどだった。
line = "その流麗さはさすがというほか無く、思わず見入ってしまうほどだった。"

[[dialogue]]
speaker = "舞亜"
# 「──でね、考えごとっていうのはクリスマスパーティーの事なんだけどね」
line = "「──でね、考えごとっていうのはクリスマスパーティーの事なんだけどね」"

[[dialogue]]
speaker = "舞亜"
# 「アポロちゃんのアイデアは突拍子もないものばかりで驚かされちゃったけど、どれも楽しそうなものばかりだった」
line = "「アポロちゃんのアイデアは突拍子もないものばかりで驚かされちゃったけど、どれも楽しそうなものばかりだった」"

[[dialogue]]
speaker = "舞亜"
# 「小さくまとまってなくて、自由奔放で……何より心からパーティーを楽しもうとしてる、それってすっごく大切な事なんだよね」
line = "「小さくまとまってなくて、自由奔放で……何より心からパーティーを楽しもうとしてる、それってすっごく大切な事なんだよね」"

[[dialogue]]
speaker = "舞亜"
# 「でも、きっとアポロちゃんのイメージに乗っかって進めていったら、寮長さんが思い描いていたものとは違う形になっちゃう」
line = "「でも、きっとアポロちゃんのイメージに乗っかって進めていったら、寮長さんが思い描いていたものとは違う形になっちゃう」"

[[dialogue]]
speaker = "舞亜"
# 「だったらアニュラスの提案したアイデアの方が、そのイメージに近い……騎士っぽい思考をしてるから、オーダーにはしっかり応えたいって気持ちが強いのかな？」
line = "「だったらアニュラスの提案したアイデアの方が、そのイメージに近い……騎士っぽい思考をしてるから、オーダーにはしっかり応えたいって気持ちが強いのかな？」"

[[dialogue]]
speaker = "舞亜"
# 「アポロちゃんにはあんまり刺さってなかったみたいだけど、実はアニュラスの提案も私は素敵だと思うの」
line = "「アポロちゃんにはあんまり刺さってなかったみたいだけど、実はアニュラスの提案も私は素敵だと思うの」"

[[dialogue]]
speaker = "舞亜"
# 「それに流星寮のクリスマスパーティーでしか味わえない上品な空気感も、大切にしなきゃいけないものだと思うんだよね」
line = "「それに流星寮のクリスマスパーティーでしか味わえない上品な空気感も、大切にしなきゃいけないものだと思うんだよね」"

[[dialogue]]
speaker = "舞亜"
# 「どっちの意見もわかる、ちょーど中間……」
line = "「どっちの意見もわかる、ちょーど中間……」"

[[dialogue]]
speaker = "舞亜"
# 「だから２人の話を聞きながら、どうやったら両方とも納得できるパーティーになるんだろうって、ずーっと考えてたの」
line = "「だから２人の話を聞きながら、どうやったら両方とも納得できるパーティーになるんだろうって、ずーっと考えてたの」"

[[dialogue]]
speaker = "舞亜"
# 「でも真逆の意見だから、いい塩梅のトコを取るって難しいんだよね……」
line = "「でも真逆の意見だから、いい塩梅のトコを取るって難しいんだよね……」"

[[dialogue]]
speaker = "unk"
# どうしたものやら
line = "どうしたものやら"

[[dialogue]]
speaker = "unk"
# そうだな……
line = "そうだな……"

[[dialogue]]
speaker = "舞亜"
# 「そうそう、どーしたものやらだよ……」
line = "「そうそう、どーしたものやらだよ……」"

[[dialogue]]
speaker = "舞亜"
# 「多分、あのまま考え続けても、いい感じにはならないだろうなーって思って」
line = "「多分、あのまま考え続けても、いい感じにはならないだろうなーって思って」"

[[dialogue]]
speaker = "unk"
# それで会議を終わりにしたわけか
line = "それで会議を終わりにしたわけか"

[[dialogue]]
speaker = "舞亜"
# 「考えがまとまらない時は、とりあえず身体を動かしてみるのが１番かなって」
line = "「考えがまとまらない時は、とりあえず身体を動かしてみるのが１番かなって」"

[[dialogue]]
speaker = "舞亜"
# 「演目のこととか演技のこととかも、滑ってるときに思いつくことが多いんだよね」
line = "「演目のこととか演技のこととかも、滑ってるときに思いつくことが多いんだよね」"

[[dialogue]]
speaker = "舞亜"
# 「でも、今回はダメそうかも。考えても考えても何にも浮かんでこないみたい」
line = "「でも、今回はダメそうかも。考えても考えても何にも浮かんでこないみたい」"

[[dialogue]]
speaker = "舞亜"
# 「だって正反対の意見だもんね……それを融合しようなんて難しいに決まってる……よっ、と」
line = "「だって正反対の意見だもんね……それを融合しようなんて難しいに決まってる……よっ、と」"

[[dialogue]]
speaker = "unk"
# 舞亜は呟きながら、再び綺麗なターンを決める。
line = "舞亜は呟きながら、再び綺麗なターンを決める。"

[[dialogue]]
speaker = "unk"
# その姿は美しく上品で、それでいて見ている者を自然に楽しい気持ちにさせてくれる──
line = "その姿は美しく上品で、それでいて見ている者を自然に楽しい気持ちにさせてくれる──"

[[dialogue]]
speaker = "舞亜"
# 「ん、どうしたの？」
line = "「ん、どうしたの？」"

[[dialogue]]
speaker = "unk"
# ……今、演技してる？
line = "……今、演技してる？"

[[dialogue]]
speaker = "舞亜"
# 「え？　してないけど……でも、まあいつもの感じで。慣れ、みたいな？」
line = "「え？　してないけど……でも、まあいつもの感じで。慣れ、みたいな？」"

[[dialogue]]
speaker = "舞亜"
# 「滑ってるときはいつもお客さんの目を意識してるから、ついついそういう滑り方になっちゃってたかもしれない」
line = "「滑ってるときはいつもお客さんの目を意識してるから、ついついそういう滑り方になっちゃってたかもしれない」"

[[dialogue]]
speaker = "unk"
# すごく上品だし
line = "すごく上品だし"

[[dialogue]]
speaker = "unk"
# すごく楽しそうだし
line = "すごく楽しそうだし"

[[dialogue]]
speaker = "舞亜"
# 「う、うん……ありがとう……」
line = "「う、うん……ありがとう……」"

[[dialogue]]
speaker = "舞亜"
# 「でもそっか、もしかしたら同じなのかもしれないね」
line = "「でもそっか、もしかしたら同じなのかもしれないね」"

[[dialogue]]
speaker = "舞亜"
# 「フィギュアスケートは競技だから、その表現の正確さや上品さが求められる。でも同時に見ている人たちには、私の演技で思いっきり楽しくなって欲しいって思ってる」
line = "「フィギュアスケートは競技だから、その表現の正確さや上品さが求められる。でも同時に見ている人たちには、私の演技で思いっきり楽しくなって欲しいって思ってる」"

[[dialogue]]
speaker = "舞亜"
# 「つまり私がいつもやってることなんだ…………うん、そう考えたら、全然イケそうな気がしてきた！」
line = "「つまり私がいつもやってることなんだ…………うん、そう考えたら、全然イケそうな気がしてきた！」"

[[dialogue]]
speaker = "舞亜"
# 「私、やってみるね。アポロちゃんとアニュラス、２人ともが納得できるようなクリスマスパーティーを実現してみせる」
line = "「私、やってみるね。アポロちゃんとアニュラス、２人ともが納得できるようなクリスマスパーティーを実現してみせる」"

[[dialogue]]
speaker = "舞亜"
# 「意見は正反対かもしれないけど、最高にワクワクするクリスマスにしたいって気持ちは同じなんだから！　絶対に大丈夫だよ！」
line = "「意見は正反対かもしれないけど、最高にワクワクするクリスマスにしたいって気持ちは同じなんだから！　絶対に大丈夫だよ！」"

[[dialogue]]
speaker = "unk"
# その意気だ！
line = "その意気だ！"

[[dialogue]]
speaker = "舞亜"
# 「よーし、それじゃあ会長さんにも１つお願いしちゃおうかな」
line = "「よーし、それじゃあ会長さんにも１つお願いしちゃおうかな」"

[[dialogue]]
speaker = "舞亜"
# 「寮長さんの件。私たちがやろうとしてるプランを知ったら、途中で止められちゃうかもしれないでしょ？」
line = "「寮長さんの件。私たちがやろうとしてるプランを知ったら、途中で止められちゃうかもしれないでしょ？」"

[[dialogue]]
speaker = "舞亜"
# 「ワクワクなクリスマスパーティーを実際に見たら、あの人も納得すると思うけど、事前に理解してもらうのは難しいと思うから」
line = "「ワクワクなクリスマスパーティーを実際に見たら、あの人も納得すると思うけど、事前に理解してもらうのは難しいと思うから」"

[[dialogue]]
speaker = "舞亜"
# 「だから、上手くごまかしといて欲しいの。会長さんの言葉なら、あの人も聞いてくれるんじゃないかって」
line = "「だから、上手くごまかしといて欲しいの。会長さんの言葉なら、あの人も聞いてくれるんじゃないかって」"

[[dialogue]]
speaker = "unk"
# やってみるよ
line = "やってみるよ"

[[dialogue]]
speaker = "unk"
# わかった
line = "わかった"

[[dialogue]]
speaker = "舞亜"
# 「ありがと。これで１つハードルがなくなった」
line = "「ありがと。これで１つハードルがなくなった」"

[[dialogue]]
speaker = "舞亜"
# 「でも、まだ何か足りない気がするんだよね……うーん、もう１つ足さなきゃ」
line = "「でも、まだ何か足りない気がするんだよね……うーん、もう１つ足さなきゃ」"

[[dialogue]]
speaker = "舞亜"
# 「ま、それは追々考える。相談出来る仲間もいるし、会長さんのアイデアにも期待させてもらうからね」
line = "「ま、それは追々考える。相談出来る仲間もいるし、会長さんのアイデアにも期待させてもらうからね」"

[[dialogue]]
speaker = "舞亜"
# 「全部集まったら、まとめてくっつけるのは私に任せて。キュピーンって見える瞬間があるんだよ。こういうのは感性の成せる技だね」
line = "「全部集まったら、まとめてくっつけるのは私に任せて。キュピーンって見える瞬間があるんだよ。こういうのは感性の成せる技だね」"

[[dialogue]]
speaker = "unk"
# 舞亜の気持ちが固まり、こうしてクリスマスパーティーに向けてそれぞれが進み始めるのだった。
line = "舞亜の気持ちが固まり、こうしてクリスマスパーティーに向けてそれぞれが進み始めるのだった。"
