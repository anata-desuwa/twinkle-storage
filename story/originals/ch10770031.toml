[[dialogue]]
speaker = "リノ"
# 「ふふっ、クールに見えるけど可愛いわね～♪　ほんと、こんないい子がお嫁さんになってくれるなんて嬉しいわ」
line = "「ふふっ、クールに見えるけど可愛いわね～♪　ほんと、こんないい子がお嫁さんになってくれるなんて嬉しいわ」"

[[dialogue]]
speaker = "リノ"
