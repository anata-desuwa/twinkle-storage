[[dialogue]]
speaker = "unk"
# 第１話,蘭美の義母娘交流,P
line = "第１話,蘭美の義母娘交流,P"

[[dialogue]]
speaker = "unk"
# 蘭美と恋人関係になって、しばらく経った、とある休日。
line = "蘭美と恋人関係になって、しばらく経った、とある休日。"

[[dialogue]]
speaker = "unk"
# 九浄家メイド隊の長として忙しいのに、蘭美は空き時間を捻出して俺に会いに来てくれる。
line = "九浄家メイド隊の長として忙しいのに、蘭美は空き時間を捻出して俺に会いに来てくれる。"

[[dialogue]]
speaker = "蘭美"
# 「リビングの清掃はこれで完了よ！　確認をお願いするわ！！」
line = "「リビングの清掃はこれで完了よ！　確認をお願いするわ！！」"

[[dialogue]]
speaker = "蘭美"
# 「最速で行ったけれど、当然仕事は丁寧にさせてもらったから、そちらも評価して頂戴」
line = "「最速で行ったけれど、当然仕事は丁寧にさせてもらったから、そちらも評価して頂戴」"

[[dialogue]]
speaker = "リノ"
