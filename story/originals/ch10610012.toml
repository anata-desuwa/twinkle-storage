[[dialogue]]
speaker = "unk"
# 第2話,メイドと先生,P
line = "第2話,メイドと先生,P"

[[dialogue]]
speaker = "unk"
# ある日、カフェテリアに行くと、マリオンさんとトワちゃん先生が一緒にランチしている姿を見かけた。
line = "ある日、カフェテリアに行くと、マリオンさんとトワちゃん先生が一緒にランチしている姿を見かけた。"

[[dialogue]]
speaker = "トワ先生"
# 「あっ、会長くんだ～♪　キミもお昼を食べにきたの？」
line = "「あっ、会長くんだ～♪　キミもお昼を食べにきたの？」"

[[dialogue]]
speaker = "マリオン"
# 「会長様、ご機嫌麗しゅう。ああ、今日も実にお可愛らしいご尊顔ですこと♪　見ているだけでこのマリオン、ご飯を何杯もおかわりできてしまいそうです<emoji=heart04>」
line = "「会長様、ご機嫌麗しゅう。ああ、今日も実にお可愛らしいご尊顔ですこと♪　見ているだけでこのマリオン、ご飯を何杯もおかわりできてしまいそうです<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「え！？　な、何言ってんのマリオン……会長くんはどう見ても男の子で、マリオンの好きな女の子じゃないけど……って、まさか！？」
line = "「え！？　な、何言ってんのマリオン……会長くんはどう見ても男の子で、マリオンの好きな女の子じゃないけど……って、まさか！？」"

[[dialogue]]
speaker = "マリオン"
# 「ええ、その通りです、トワ。会長様こそが、私が先程話していた、最近気になってアプローチしている男の子です」
line = "「ええ、その通りです、トワ。会長様こそが、私が先程話していた、最近気になってアプローチしている男の子です」"

[[dialogue]]
speaker = "トワ先生"
# 「私の教え子なんだけど！？」
line = "「私の教え子なんだけど！？」"

[[dialogue]]
speaker = "マリオン"
# 「大丈夫です。私は齢が離れていても気にしませんので。むしろ可愛い年下の子は大好物です」
line = "「大丈夫です。私は齢が離れていても気にしませんので。むしろ可愛い年下の子は大好物です」"

[[dialogue]]
speaker = "トワ先生"
# 「それは年下側が言う台詞だからね！？」
line = "「それは年下側が言う台詞だからね！？」"

[[dialogue]]
speaker = "unk"
# えっと……２人は知り合いだったの？
line = "えっと……２人は知り合いだったの？"

[[dialogue]]
speaker = "マリオン"
# 「ええ、実はそうなんです。私が昔、流星学園に通っていた時の同級生で――」
line = "「ええ、実はそうなんです。私が昔、流星学園に通っていた時の同級生で――」"

[[dialogue]]
speaker = "トワ先生"
# 「昔じゃなくて、最近ね！？　まだ最近だから！」
line = "「昔じゃなくて、最近ね！？　まだ最近だから！」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふ♪　トワは今も変わらずお可愛いので、大丈夫ですよ<emoji=heart04>」
line = "「まあまあ、うふふ♪　トワは今も変わらずお可愛いので、大丈夫ですよ<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「――それで、私とトワは、流星学園に在学中、一緒に星徒会をやっていた仲なんです」
line = "「――それで、私とトワは、流星学園に在学中、一緒に星徒会をやっていた仲なんです」"

[[dialogue]]
speaker = "unk"
# ２人は星徒会所属だったの！？
line = "２人は星徒会所属だったの！？"

[[dialogue]]
speaker = "トワ先生"
# 「えっへん♪　実はそうなんだ。しかもマリオンは、それだけじゃなくて――」
line = "「えっへん♪　実はそうなんだ。しかもマリオンは、それだけじゃなくて――」"

[[dialogue]]
speaker = "トワ先生"
# 「なんと！　当時最強の星徒会長だったんだよ～！」
line = "「なんと！　当時最強の星徒会長だったんだよ～！」"

[[dialogue]]
speaker = "マリオン"
# 「――最強は大げさですが、お恥ずかしながら一時期、務めさせていただいておりました」
line = "「――最強は大げさですが、お恥ずかしながら一時期、務めさせていただいておりました」"

[[dialogue]]
speaker = "トワ先生"
# 「なに言ってんの。今だって現役の星騎士で、実戦形式の訓練指導を頼まれるくらい強いじゃない」
line = "「なに言ってんの。今だって現役の星騎士で、実戦形式の訓練指導を頼まれるくらい強いじゃない」"

[[dialogue]]
speaker = "unk"
# 現役なのに、どうしてメイドを？
line = "現役なのに、どうしてメイドを？"

[[dialogue]]
speaker = "マリオン"
# 「必要とあらばもちろん戦いますが、私は戦うことよりも、皆様のお世話をする方が好きなんですよ」
line = "「必要とあらばもちろん戦いますが、私は戦うことよりも、皆様のお世話をする方が好きなんですよ」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ♪　こうして星見家のメイドとして働いていれば、学園に仕事として出入りできて、誰の目もはばかることなく、可愛い子を沢山愛でることができますから<emoji=heart04>」
line = "「ふふっ♪　こうして星見家のメイドとして働いていれば、学園に仕事として出入りできて、誰の目もはばかることなく、可愛い子を沢山愛でることができますから<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「そこはもう少し、はばかってほしいけどね！？」
line = "「そこはもう少し、はばかってほしいけどね！？」"

[[dialogue]]
speaker = "マリオン"
# 「それに私は、星見家メイド隊の雑務担当。物量で仕事を回すのが得意ですので」
line = "「それに私は、星見家メイド隊の雑務担当。物量で仕事を回すのが得意ですので」"

[[dialogue]]
speaker = "unk"
# 物量って、どういう……？
line = "物量って、どういう……？"

[[dialogue]]
speaker = "マリオン"
# 「そこはまだ、会長様に説明していませんでしたね。こういうことです――」
line = "「そこはまだ、会長様に説明していませんでしたね。こういうことです――」"

[[dialogue]]
speaker = "マリオン"
# 「お目汚し失礼致します、会長様」
line = "「お目汚し失礼致します、会長様」"

[[dialogue]]
speaker = "unk"
# えっ！？　マリオンが２人！？
line = "えっ！？　マリオンが２人！？"

[[dialogue]]
speaker = "トワ先生"
# 「マリオンの能力はね、『星力の糸で人形を縫って作る』ことなんだ。簡単に言うなら、『人形使い』ってやつだね」
line = "「マリオンの能力はね、『星力の糸で人形を縫って作る』ことなんだ。簡単に言うなら、『人形使い』ってやつだね」"

[[dialogue]]
speaker = "トワ先生"
# 「マリオンが学園最強の星徒会長だったのは、そうして人形を大量生産できることによる圧倒的物量戦術が強かったからなんだよ」
line = "「マリオンが学園最強の星徒会長だったのは、そうして人形を大量生産できることによる圧倒的物量戦術が強かったからなんだよ」"

[[dialogue]]
speaker = "マリオン"
# 「この能力もあって、皆様の身の回りをお世話するメイドの仕事は、まさに私の天職というわけです」
line = "「この能力もあって、皆様の身の回りをお世話するメイドの仕事は、まさに私の天職というわけです」"

[[dialogue]]
speaker = "マリオン"
# 「ですから会長様も、私にご用命の際は遠慮なくお呼び下さいね♪」
line = "「ですから会長様も、私にご用命の際は遠慮なくお呼び下さいね♪」"

[[dialogue]]
speaker = "マリオン"
# 「会長様の為なら私、喜んでなんでもご奉仕致しますので……うふふっ<emoji=heart04>」
line = "「会長様の為なら私、喜んでなんでもご奉仕致しますので……うふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "トワ先生"
# 「なんでもは禁止で！」
line = "「なんでもは禁止で！」"

[[dialogue]]
speaker = "マリオン"
# 「え～。ダメですか？」
line = "「え～。ダメですか？」"

[[dialogue]]
speaker = "トワ先生"
# 「何がなんでもです！　マリオンの何でもは、アウトな匂いがするから、先生権限で禁止！」
line = "「何がなんでもです！　マリオンの何でもは、アウトな匂いがするから、先生権限で禁止！」"

[[dialogue]]
speaker = "マリオン"
# 「む～。会長様だって、男の子だから色々と持て余すと思うのですが……」
line = "「む～。会長様だって、男の子だから色々と持て余すと思うのですが……」"

[[dialogue]]
speaker = "トワ先生"
# 「アウト丸出しなんだけど！？」
line = "「アウト丸出しなんだけど！？」"

[[dialogue]]
speaker = "マリオン"
# 「～♪　～～♪」
line = "「～♪　～～♪」"

[[dialogue]]
speaker = "unk"
# えっと……マリオンさん？
line = "えっと……マリオンさん？"

[[dialogue]]
speaker = "マリオン"
# 「はい♪　なんでしょう、会長様」
line = "「はい♪　なんでしょう、会長様」"

[[dialogue]]
speaker = "マリオン"
# 「――最近ずっと側にいる気がする、ですか？」
line = "「――最近ずっと側にいる気がする、ですか？」"

[[dialogue]]
speaker = "マリオン"
# 「ふふっ♪　ご心配なく。星見家や流星学園での仕事は、ちゃんと人形達に任せておりますので、大丈夫です」
line = "「ふふっ♪　ご心配なく。星見家や流星学園での仕事は、ちゃんと人形達に任せておりますので、大丈夫です」"

[[dialogue]]
speaker = "マリオン"
# 「何でも、というのはトワに禁止されてしまいましたが、お世話禁止とは言われておりませんので――」
line = "「何でも、というのはトワに禁止されてしまいましたが、お世話禁止とは言われておりませんので――」"

[[dialogue]]
speaker = "マリオン"
# 「これからは会長様のメイドとしても、働かせていただきますね<emoji=heart04>」
line = "「これからは会長様のメイドとしても、働かせていただきますね<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それ以降、マリオンさんは本当に俺の世話を焼いてくれるようになるのだった。
line = "それ以降、マリオンさんは本当に俺の世話を焼いてくれるようになるのだった。"
