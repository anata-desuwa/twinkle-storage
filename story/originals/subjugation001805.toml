[[dialogue]]
speaker = "モネ"
# （私にとってのクリスマス……クリスマスプレゼントとしてもらった本、クリスマスを題材にした本、クリスマスに自分で手に取った本……）
line = "（私にとってのクリスマス……クリスマスプレゼントとしてもらった本、クリスマスを題材にした本、クリスマスに自分で手に取った本……）"

[[dialogue]]
speaker = "モネ"
# （本の思い出はたくさんある。だけど一番はっきりと覚えているのは……）
line = "（本の思い出はたくさんある。だけど一番はっきりと覚えているのは……）"

[[dialogue]]
speaker = "モネ"
# 「思い出しました……私にとって、一番大切なクリスマスを」
line = "「思い出しました……私にとって、一番大切なクリスマスを」"

[[dialogue]]
speaker = "リップル"
# 「ホントですか♪　ゼヒ教えてくださ～い♪」
line = "「ホントですか♪　ゼヒ教えてくださ～い♪」"

[[dialogue]]
speaker = "モネ"
# 「……私にとってのクリスマスは、祖父との思い出です」
line = "「……私にとってのクリスマスは、祖父との思い出です」"

[[dialogue]]
speaker = "リップル"
# 「オジイチャンとの思い出……ですか？」
line = "「オジイチャンとの思い出……ですか？」"

[[dialogue]]
speaker = "モネ"
# 「はい。祖父とはいつも一緒に書斎で本を読んでいて、おじいちゃん子なので」
line = "「はい。祖父とはいつも一緒に書斎で本を読んでいて、おじいちゃん子なので」"

[[dialogue]]
speaker = "リップル"
# 「気にナリます♪　モネの一番のクリスマス♪」
line = "「気にナリます♪　モネの一番のクリスマス♪」"

[[dialogue]]
speaker = "モネ"
# 「ふふ、あれはまだ私がずっと小さかった頃の話です」
line = "「ふふ、あれはまだ私がずっと小さかった頃の話です」"

[[dialogue]]
speaker = "モネ"
# 「あの頃の私にとってクリスマスは、美味しい食べ物に囲まれて、プレゼントを貰える本当にお祭りのような……特別な日だったんです」
line = "「あの頃の私にとってクリスマスは、美味しい食べ物に囲まれて、プレゼントを貰える本当にお祭りのような……特別な日だったんです」"

[[dialogue]]
speaker = "モネ"
# 「まだ幼かった私は、サンタクロースの存在を本気で信じていました」
line = "「まだ幼かった私は、サンタクロースの存在を本気で信じていました」"

[[dialogue]]
speaker = "リップル"
# 「サンタクロースって存在しないんデスか！？」
line = "「サンタクロースって存在しないんデスか！？」"

[[dialogue]]
speaker = "モネ"
# 「いえ、サンタクロースは存在しますよ。ただ、当時の私が思い描いていたような魔法のような存在は……私の前には現れてくれませんでした」
line = "「いえ、サンタクロースは存在しますよ。ただ、当時の私が思い描いていたような魔法のような存在は……私の前には現れてくれませんでした」"

[[dialogue]]
speaker = "モネ"
# 「クリスマスイブの夜……私はサンタクロースからのプレゼントを楽しみにして、ぐっすり眠っていました」
line = "「クリスマスイブの夜……私はサンタクロースからのプレゼントを楽しみにして、ぐっすり眠っていました」"

[[dialogue]]
speaker = "モネ"
# 「ですが、その日私にプレゼントを届けにきたサンタクロースは、少しおっちょこちょいで物音を立ててしまったんです」
line = "「ですが、その日私にプレゼントを届けにきたサンタクロースは、少しおっちょこちょいで物音を立ててしまったんです」"

[[dialogue]]
speaker = "モネ"
# 「そして私は……ぼんやりと目を覚まし、サンタクロースの正体を見てしまったんです」
line = "「そして私は……ぼんやりと目を覚まし、サンタクロースの正体を見てしまったんです」"

[[dialogue]]
speaker = "リップル"
# 「サンタクロースのショウタイ……！　それは一体ダレなんです……！？」
line = "「サンタクロースのショウタイ……！　それは一体ダレなんです……！？」"

[[dialogue]]
speaker = "モネ"
# 「ふふ……サンタクロースの正体は、私の祖父だったんです」
line = "「ふふ……サンタクロースの正体は、私の祖父だったんです」"

[[dialogue]]
speaker = "リップル"
# 「モネのオジイチャンがサンタクロース！？　ということは、モネはサンタクロースのマゴだったんデスね！」
line = "「モネのオジイチャンがサンタクロース！？　ということは、モネはサンタクロースのマゴだったんデスね！」"

[[dialogue]]
speaker = "モネ"
# 「それは少し違います……。確かにあの日の祖父はサンタクロースでしたが、あくまでもサンタクロースの代理だったんです」
line = "「それは少し違います……。確かにあの日の祖父はサンタクロースでしたが、あくまでもサンタクロースの代理だったんです」"

[[dialogue]]
speaker = "リップル"
# 「サンタクロースのダイリ？　誰でもサンタクロースになれるというコトです？」
line = "「サンタクロースのダイリ？　誰でもサンタクロースになれるというコトです？」"

[[dialogue]]
speaker = "モネ"
# 「そうですね……なろうと思えば、誰でもなれるのがサンタクロースなんだと思います」
line = "「そうですね……なろうと思えば、誰でもなれるのがサンタクロースなんだと思います」"

[[dialogue]]
speaker = "リップル"
# 「なんというショウゲキのシンジツ……！？」
line = "「なんというショウゲキのシンジツ……！？」"

[[dialogue]]
speaker = "モネ"
# 「当時の私は、本気でサンタクロースの存在を信じていました。ですが、祖父がサンタクロースの代わりをしていたことを知っても、不思議と悲しくならなかったんです」
line = "「当時の私は、本気でサンタクロースの存在を信じていました。ですが、祖父がサンタクロースの代わりをしていたことを知っても、不思議と悲しくならなかったんです」"

[[dialogue]]
speaker = "リップル"
# 「それは、ドウシテです？」
line = "「それは、ドウシテです？」"

[[dialogue]]
speaker = "モネ"
# 「祖父は不器用ながらも、私にまごころと愛をプレゼントしてくれたからです」
line = "「祖父は不器用ながらも、私にまごころと愛をプレゼントしてくれたからです」"

[[dialogue]]
speaker = "モネ"
# 「少し慌てながらプレゼントの絵本を枕元に置いた祖父は、私の頭を優しく撫でて……そのまま部屋を去りました。祖父の手のひらの温もりは、今でも思い出すことができます」
line = "「少し慌てながらプレゼントの絵本を枕元に置いた祖父は、私の頭を優しく撫でて……そのまま部屋を去りました。祖父の手のひらの温もりは、今でも思い出すことができます」"

[[dialogue]]
speaker = "モネ"
# 「そんな祖父の愛情をはっきりと感じたからこそ、私はサンタクロースの真実を受け止められたんです」
line = "「そんな祖父の愛情をはっきりと感じたからこそ、私はサンタクロースの真実を受け止められたんです」"

[[dialogue]]
speaker = "リップル"
# 「ナルホド……優しいオジイチャンだったんですね……」
line = "「ナルホド……優しいオジイチャンだったんですね……」"

[[dialogue]]
speaker = "モネ"
# 「はい、私の自慢の祖父です。今はきっと天国で見守ってくれています」
line = "「はい、私の自慢の祖父です。今はきっと天国で見守ってくれています」"

[[dialogue]]
speaker = "リップル"
# 「デスが、サンタクロースのショウタイ……ちょっとビックリしました……」
line = "「デスが、サンタクロースのショウタイ……ちょっとビックリしました……」"

[[dialogue]]
speaker = "モネ"
# 「実際に全世界の子どもに１人でプレゼントを配るなんて不可能ですからね」
line = "「実際に全世界の子どもに１人でプレゼントを配るなんて不可能ですからね」"

[[dialogue]]
speaker = "モネ"
# 「だから、サンタクロースはいくつもの善意が重なり合って存在している……そんな風に私は思っています」
line = "「だから、サンタクロースはいくつもの善意が重なり合って存在している……そんな風に私は思っています」"

[[dialogue]]
speaker = "リップル"
# 「とってもステキな考えで～す♪　サンタクロースは優しさのカタマリってことデスね♪」
line = "「とってもステキな考えで～す♪　サンタクロースは優しさのカタマリってことデスね♪」"

[[dialogue]]
speaker = "モネ"
# 「なので翌日の私は、祖父にサンタクロースの正体の話はしませんでした。サンタクロースからのプレゼントを素直に喜ぶ女の子を演じました」
line = "「なので翌日の私は、祖父にサンタクロースの正体の話はしませんでした。サンタクロースからのプレゼントを素直に喜ぶ女の子を演じました」"

[[dialogue]]
speaker = "モネ"
# 「祖父は喜ぶ私を見て、とても嬉しそうにしていました。祖父の膝の上に座って、プレゼントの絵本を読んでもらったあの日は……忘れたくても忘れられないです」
line = "「祖父は喜ぶ私を見て、とても嬉しそうにしていました。祖父の膝の上に座って、プレゼントの絵本を読んでもらったあの日は……忘れたくても忘れられないです」"

[[dialogue]]
speaker = "モネ"
# 「これが、私にとってのクリスマス……人生で一番の愛情と優しさに包まれたクリスマスの思い出です」
line = "「これが、私にとってのクリスマス……人生で一番の愛情と優しさに包まれたクリスマスの思い出です」"
