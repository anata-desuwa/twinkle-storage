[[dialogue]]
speaker = "unk"
# 第１話,通い妻ナミエル,P
line = "第１話,通い妻ナミエル,P"

[[dialogue]]
speaker = "ナミエル"
# 「全く……いつまで寝ているのですか」
line = "「全く……いつまで寝ているのですか」"

[[dialogue]]
speaker = "ナミエル"
# 「おはようございます、寝ぼすけさん。またソファーなんかで寝て。だらしがないですよ？」
line = "「おはようございます、寝ぼすけさん。またソファーなんかで寝て。だらしがないですよ？」"

[[dialogue]]
speaker = "ナミエル"
# 「大方、昨夜も遅くまで訓練でもしていたのでしょうが。しかし、そんなところで寝ては取れる疲れも取れません。きちんとベッドで寝てください」
line = "「大方、昨夜も遅くまで訓練でもしていたのでしょうが。しかし、そんなところで寝ては取れる疲れも取れません。きちんとベッドで寝てください」"

[[dialogue]]
speaker = "リノ"
# 「ふふ、ナミエルちゃんたらすっかり通い妻ね～♪　助かるわ～♪　もっと言ってあげて～♪」
line = "「ふふ、ナミエルちゃんたらすっかり通い妻ね～♪　助かるわ～♪　もっと言ってあげて～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「っっ……！？　毎朝お邪魔しているのは申し訳ありませんが、おかしな冗談は言わないでください」
line = "「っっ……！？　毎朝お邪魔しているのは申し訳ありませんが、おかしな冗談は言わないでください」"

[[dialogue]]
speaker = "ナミエル"
# 「私はただ、待ち惚けを食らいたくないだけです。こうして起こしに来ないと、待ち合わせ場所にも現れませんし」
line = "「私はただ、待ち惚けを食らいたくないだけです。こうして起こしに来ないと、待ち合わせ場所にも現れませんし」"

[[dialogue]]
speaker = "リノ"
# 「いっそもう我が家に住んじゃえばいいのに♪　ねね、式はいつ挙げるの？　お義母さんって呼んでくれていいのよ？」
line = "「いっそもう我が家に住んじゃえばいいのに♪　ねね、式はいつ挙げるの？　お義母さんって呼んでくれていいのよ？」"

[[dialogue]]
speaker = "ナミエル"
# 「ですから冗談を言わないでくださいっ。私は星見家所属のメイドですっ。それに式なんて学生の身で挙げるものでは……！」
line = "「ですから冗談を言わないでくださいっ。私は星見家所属のメイドですっ。それに式なんて学生の身で挙げるものでは……！」"

[[dialogue]]
speaker = "リノ"
# 「あら？　最近ドレスの試着に行ったんじゃないの？　ナミエルちゃんのウェディングドレス姿が可愛かったって息子がのろけてたわよ？」
line = "「あら？　最近ドレスの試着に行ったんじゃないの？　ナミエルちゃんのウェディングドレス姿が可愛かったって息子がのろけてたわよ？」"

[[dialogue]]
speaker = "ナミエル"
# 「あ、あれは事故で着ただけで……！　というか緋宮会長は一体何を話されているのですか、何を！？」
line = "「あ、あれは事故で着ただけで……！　というか緋宮会長は一体何を話されているのですか、何を！？」"

[[dialogue]]
speaker = "リノ"
# 「付き合ってるなら名前で呼んであげたらいいのに～。名字呼びが長いとナミエルちゃんが緋宮姓になった時に困るわよ？」
line = "「付き合ってるなら名前で呼んであげたらいいのに～。名字呼びが長いとナミエルちゃんが緋宮姓になった時に困るわよ？」"

[[dialogue]]
speaker = "ナミエル"
# 「余計なお世話です！　緋宮会長もいつまでも寝ていないで起きてくださいっ。登校の準備は済ませてあるのでしょうねっ？」
line = "「余計なお世話です！　緋宮会長もいつまでも寝ていないで起きてくださいっ。登校の準備は済ませてあるのでしょうねっ？」"

[[dialogue]]
speaker = "unk"
# んん……今日は、白か……
line = "んん……今日は、白か……"

[[dialogue]]
speaker = "ナミエル"
# 「は……？　～～っっ！？　な、何を寝惚けて覗き込んでいるのですかっ！　この変態！　スケベ！　変質者！」
line = "「は……？　～～っっ！？　な、何を寝惚けて覗き込んでいるのですかっ！　この変態！　スケベ！　変質者！」"

[[dialogue]]
speaker = "リノ"
# 「今日はってことは……今までも覗いたことがあるのね。意外と手の早い息子だこと……」
line = "「今日はってことは……今までも覗いたことがあるのね。意外と手の早い息子だこと……」"

[[dialogue]]
speaker = "ナミエル"
# 「ち、違いますっ！　ああもう、早く起きてくださいってばっ。おかしな勘違いをされているではありませんかっ」
line = "「ち、違いますっ！　ああもう、早く起きてくださいってばっ。おかしな勘違いをされているではありませんかっ」"

[[dialogue]]
speaker = "リノ"
# 「まぁまぁ。登校時間まで時間はあるから。朝ご飯もまだ食べていないしね」
line = "「まぁまぁ。登校時間まで時間はあるから。朝ご飯もまだ食べていないしね」"

[[dialogue]]
speaker = "リノ"
# 「あ、そうだナミエルちゃん。せっかくだし息子に朝食でも作ってあげて？」
line = "「あ、そうだナミエルちゃん。せっかくだし息子に朝食でも作ってあげて？」"

[[dialogue]]
speaker = "ナミエル"
# 「朝食、ですか？　でも私、料理は──……」
line = "「朝食、ですか？　でも私、料理は──……」"

[[dialogue]]
speaker = "unk"
# ナミエルが──料理！？
line = "ナミエルが──料理！？"

[[dialogue]]
speaker = "ナミエル"
# 「……ふふ。何故そこで飛び起きるんです？　よほど私の料理を食べたくないようですね？」
line = "「……ふふ。何故そこで飛び起きるんです？　よほど私の料理を食べたくないようですね？」"

[[dialogue]]
speaker = "ナミエル"
# 「わかりました。作ってあげます。そこまで舐められては星見家メイド隊の沽券に関わりますから」
line = "「わかりました。作ってあげます。そこまで舐められては星見家メイド隊の沽券に関わりますから」"

[[dialogue]]
speaker = "ナミエル"
# 「これでも日々努力と鍛錬を続けているんです。上達した料理の腕を今ここで披露してあげますよ」
line = "「これでも日々努力と鍛錬を続けているんです。上達した料理の腕を今ここで披露してあげますよ」"

[[dialogue]]
speaker = "ナミエル"
# 「出来上がりました。どうぞお召し上がりください」
line = "「出来上がりました。どうぞお召し上がりください」"

[[dialogue]]
speaker = "リノ"
# 「へー、ひじきの炒め物かしら」
line = "「へー、ひじきの炒め物かしら」"

[[dialogue]]
speaker = "ナミエル"
# 「……卵焼きです……」
line = "「……卵焼きです……」"

[[dialogue]]
speaker = "unk"
# いただきます
line = "いただきます"

[[dialogue]]
speaker = "ナミエル"
# 「あっ。無理して食べなくともっ……。失敗したのはわかっていますからっ……」
line = "「あっ。無理して食べなくともっ……。失敗したのはわかっていますからっ……」"

[[dialogue]]
speaker = "ナミエル"
# 「汗も噴き出しておりますし、顔まで青くなってますよっ……。は、早く吐き出してくださいっ……！」
line = "「汗も噴き出しておりますし、顔まで青くなってますよっ……。は、早く吐き出してくださいっ……！」"

[[dialogue]]
speaker = "リノ"
# 「ふふ、大丈夫大丈夫。無理して食べてるわけじゃないわ」
line = "「ふふ、大丈夫大丈夫。無理して食べてるわけじゃないわ」"

[[dialogue]]
speaker = "リノ"
# 「可愛い彼女の手料理だもの。むしろ嬉しくて仕方ないんじゃないかしら」
line = "「可愛い彼女の手料理だもの。むしろ嬉しくて仕方ないんじゃないかしら」"

[[dialogue]]
speaker = "ナミエル"
# 「で、ですが先程は飛び起きてしまうほど嫌がってるご様子でしたし……」
line = "「で、ですが先程は飛び起きてしまうほど嫌がってるご様子でしたし……」"

[[dialogue]]
speaker = "リノ"
# 「照れ隠しよ♪　ね？」
line = "「照れ隠しよ♪　ね？」"

[[dialogue]]
speaker = "unk"
# 前よりも確実に上達してるよ
line = "前よりも確実に上達してるよ"

[[dialogue]]
speaker = "ナミエル"
# 「本当……ですか？　それなら嬉しい、ですけど……」
line = "「本当……ですか？　それなら嬉しい、ですけど……」"

[[dialogue]]
speaker = "ナミエル"
# 「一応、その。アレンジもしてみたんです。疲労が溜まっておられるようでしたので、元気を出していただければと……」
line = "「一応、その。アレンジもしてみたんです。疲労が溜まっておられるようでしたので、元気を出していただければと……」"

[[dialogue]]
speaker = "ナミエル"
# 「卵の中にレバーとカツオとイチゴを混ぜてみて……。鉄分とタンパク質とビタミンを摂取できるように手を加えてみたのですが……」
line = "「卵の中にレバーとカツオとイチゴを混ぜてみて……。鉄分とタンパク質とビタミンを摂取できるように手を加えてみたのですが……」"

[[dialogue]]
speaker = "unk"
# その優しさだけで美味しく感じるよ
line = "その優しさだけで美味しく感じるよ"

[[dialogue]]
speaker = "ナミエル"
# 「っっ。や、やっぱり不味かったんですねっ。格好付けて食べなくても良かったのに……」
line = "「っっ。や、やっぱり不味かったんですねっ。格好付けて食べなくても良かったのに……」"

[[dialogue]]
speaker = "リノ"
# 「それだけナミエルちゃんのことが好きなのよ♪　ふふふ、彼女とラブラブみたいで私も安心だわ♪」
line = "「それだけナミエルちゃんのことが好きなのよ♪　ふふふ、彼女とラブラブみたいで私も安心だわ♪」"

[[dialogue]]
speaker = "リノ"
# 「ま、息子のことなら安心しなさい。私の微妙な味付けの料理も美味しい美味しいって食べてくれる子だもの。未来のお嫁さんの手料理を不味いなんて思うわけがないわ」
line = "「ま、息子のことなら安心しなさい。私の微妙な味付けの料理も美味しい美味しいって食べてくれる子だもの。未来のお嫁さんの手料理を不味いなんて思うわけがないわ」"

[[dialogue]]
speaker = "ナミエル"
# 「未来のお嫁さ──冷やかさないでくださいっ。気が早いですからっ」
line = "「未来のお嫁さ──冷やかさないでくださいっ。気が早いですからっ」"

[[dialogue]]
speaker = "リノ"
# 「あら。気が早いってことは、いつかはこの子のお嫁さんになってくれるつもりはあるのね？」
line = "「あら。気が早いってことは、いつかはこの子のお嫁さんになってくれるつもりはあるのね？」"

[[dialogue]]
speaker = "ナミエル"
# 「あっ──～～っっ。い、今のは言葉の綾というもので……！」
line = "「あっ──～～っっ。い、今のは言葉の綾というもので……！」"

[[dialogue]]
speaker = "リノ"
# 「よーし、それなら私も一肌脱いじゃおうかしら。未来の<ruby=むすめ>義娘</ruby>に母の味ってものを伝授してあげる♪」
line = "「よーし、それなら私も一肌脱いじゃおうかしら。未来の<ruby>義娘<rt>むすめ</rt></ruby>に母の味ってものを伝授してあげる♪」"

[[dialogue]]
speaker = "リノ"
# 「ナミエルちゃんとは料理に対する考え方も似てるみたいだし。味はともかく栄養だけは満点の料理を教えてあげられるわよ？」
line = "「ナミエルちゃんとは料理に対する考え方も似てるみたいだし。味はともかく栄養だけは満点の料理を教えてあげられるわよ？」"

[[dialogue]]
speaker = "ナミエル"
# 「で、ですから冷やかさないでくださいってば。娘扱いしていただいても困ります」
line = "「で、ですから冷やかさないでくださいってば。娘扱いしていただいても困ります」"

[[dialogue]]
speaker = "ナミエル"
# 「ですが、その……」
line = "「ですが、その……」"

[[dialogue]]
speaker = "ナミエル"
# 「リノさまさえよろしければ……伝授していただけると嬉しいです」
line = "「リノさまさえよろしければ……伝授していただけると嬉しいです」"

[[dialogue]]
speaker = "ナミエル"
# 「私も健気な彼氏さんに、美味しいと言ってもらえる料理を作ってあげたいですから……」
line = "「私も健気な彼氏さんに、美味しいと言ってもらえる料理を作ってあげたいですから……」"
