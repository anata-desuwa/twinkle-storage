[[dialogue]]
speaker = "unk"
# 第１話,附属校の生徒会長,P
line = "第１話,附属校の生徒会長,P"

[[dialogue]]
speaker = "unk"
# 御前試合に勝ち、星徒会長に就任してから間もない、ある日のこと――
line = "御前試合に勝ち、星徒会長に就任してから間もない、ある日のこと――"

[[dialogue]]
speaker = "？？？"
# 「失礼致します。会長さん、只今お時間はありますでしょうか？」
line = "「失礼致します。会長さん、只今お時間はありますでしょうか？」"

[[dialogue]]
speaker = "unk"
# はい、大丈夫ですが、キミは……？
line = "はい、大丈夫ですが、キミは……？"

[[dialogue]]
speaker = "？？？"
# 「ありがとうございます。私は流星学園<b>附属校</b>の生徒で――」
line = "「ありがとうございます。私は流星学園<b>附属校</b>の生徒で――」"

[[dialogue]]
speaker = "サチ"
# 「<b>生徒会長</b>を務めております、３年生の<ruby=しろつめ>白詰</ruby>サチと申します。本日は新しく就任された新星学園の会長さんにご挨拶をと思い、やってきた次第です」
line = "「<b>生徒会長</b>を務めております、３年生の<ruby>白詰<rt>しろつめ</rt></ruby>サチと申します。本日は新しく就任された新星学園の会長さんにご挨拶をと思い、やってきた次第です」"

[[dialogue]]
speaker = "unk"
# 附属校の会長……！　これはご丁寧にどうも
line = "附属校の会長……！　これはご丁寧にどうも"

[[dialogue]]
speaker = "サチ"
# 「私はプリマステラでもありますので、今後は協力してモンスターと戦うことも多いかと思います。その時はよろしくお願いしますね」
line = "「私はプリマステラでもありますので、今後は協力してモンスターと戦うことも多いかと思います。その時はよろしくお願いしますね」"

[[dialogue]]
speaker = "？？？"
# 「サチさんはすごいんですよ～。附属生でありながら、本校の星徒会メンバーに匹敵すると言われる程の実力を持つと言われていて」
line = "「サチさんはすごいんですよ～。附属生でありながら、本校の星徒会メンバーに匹敵すると言われる程の実力を持つと言われていて」"

[[dialogue]]
speaker = "？？？"
# 「１年前にリクリエの原因になるかもしれない災厄を防いだことで、特別にプリマステラの資格が与えられた、附属校最強の生徒会長なんです！」
line = "「１年前にリクリエの原因になるかもしれない災厄を防いだことで、特別にプリマステラの資格が与えられた、附属校最強の生徒会長なんです！」"

[[dialogue]]
speaker = "unk"
# 四つ葉の髪飾りが点滅して、声が……！？
line = "四つ葉の髪飾りが点滅して、声が……！？"

[[dialogue]]
speaker = "サチ"
# 「トレジアンナさん！　いきなり喋り出さないで下さい！　会長さんがびっくりしているじゃないですかっ」
line = "「トレジアンナさん！　いきなり喋り出さないで下さい！　会長さんがびっくりしているじゃないですかっ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「おっと、これは失礼しました。私も自己紹介しないとですね！」
line = "「おっと、これは失礼しました。私も自己紹介しないとですね！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「変・身！」
line = "「変・身！」"

[[dialogue]]
speaker = "サチ"
# 「えっ、ちょっ――」
line = "「えっ、ちょっ――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「魔法少女トレジャー☆サチ！　今日は特に平和を守る為じゃないけど、可愛く参上♪」
line = "「魔法少女トレジャー☆サチ！　今日は特に平和を守る為じゃないけど、可愛く参上♪」"

[[dialogue]]
speaker = "サチ"
# 「勝手に名乗らないで貰えます！？　あと変身も！　初対面の人に恥ずかしいじゃないですかっ」
line = "「勝手に名乗らないで貰えます！？　あと変身も！　初対面の人に恥ずかしいじゃないですかっ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「改めまして、サチさんの武器『ルーレットロット』に憑依しております、トレジアンナと申します♪　まあ、とりあえず魔法少女の相棒的な存在だと思って頂ければ」
line = "「改めまして、サチさんの武器『ルーレットロット』に憑依しております、トレジアンナと申します♪　まあ、とりあえず魔法少女の相棒的な存在だと思って頂ければ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あっ、ちなみに変身してない時は、サチさんの付けてる四つ葉のクローバーの髪飾りに憑依してます♪」
line = "「あっ、ちなみに変身してない時は、サチさんの付けてる四つ葉のクローバーの髪飾りに憑依してます♪」"

[[dialogue]]
speaker = "unk"
# えっと……魔法少女というのは？
line = "えっと……魔法少女というのは？"

[[dialogue]]
speaker = "サチ"
# 「そ、それは、トレジアンナさんが勝手に言っているだけで……」
line = "「そ、それは、トレジアンナさんが勝手に言っているだけで……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「実は私とサチさんは、この世界に散らばっている危険なアーティファクト、『ロストアイテム』というものを収集しているのです」
line = "「実は私とサチさんは、この世界に散らばっている危険なアーティファクト、『ロストアイテム』というものを収集しているのです」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私もロストアイテムの１つなんですけど、２年前にサチさんと出会ってから、魔法少女として収集を手伝って貰ってる形ですね」
line = "「私もロストアイテムの１つなんですけど、２年前にサチさんと出会ってから、魔法少女として収集を手伝って貰ってる形ですね」"

[[dialogue]]
speaker = "サチ"
# 「ちょっ……何ベラベラ喋ってるんですか！？　いつもロストアイテムは危険だから、クラスの皆には秘密ですよとか言ってるじゃないですか！」
line = "「ちょっ……何ベラベラ喋ってるんですか！？　いつもロストアイテムは危険だから、クラスの皆には秘密ですよとか言ってるじゃないですか！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ん～、何か新星の会長さんは、ロストアイテム収集で重要になって来そうな予感がするんですよね～。なので、先に正体を明かしちゃいました♪　てへぺろ☆」
line = "「ん～、何か新星の会長さんは、ロストアイテム収集で重要になって来そうな予感がするんですよね～。なので、先に正体を明かしちゃいました♪　てへぺろ☆」"

[[dialogue]]
speaker = "サチ"
# 「いつもながら適当過ぎません！？　しかも説明が雑だから、会長さん半信半疑の顔してますけど！？」
line = "「いつもながら適当過ぎません！？　しかも説明が雑だから、会長さん半信半疑の顔してますけど！？」"

[[dialogue]]
speaker = "unk"
# いやでも、心当たりはあるから理解できるよ
line = "いやでも、心当たりはあるから理解できるよ"

[[dialogue]]
speaker = "unk"
# ヴィーナスの『未来の日記』……あれも、もしかするとロストアイテムなのかもしれない。
line = "ヴィーナスの『未来の日記』……あれも、もしかするとロストアイテムなのかもしれない。"

[[dialogue]]
speaker = "サチ"
# 「え！？　そうなんですか？　まさかトレジアンナさんはそれを知っていて……」
line = "「え！？　そうなんですか？　まさかトレジアンナさんはそれを知っていて……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「勘が当たりましたね！」
line = "「勘が当たりましたね！」"

[[dialogue]]
speaker = "サチ"
# 「ダメだ、この杖……！」
line = "「ダメだ、この杖……！」"

[[dialogue]]
speaker = "unk"
# とりあえず、何かあれば力を貸せると思う
line = "とりあえず、何かあれば力を貸せると思う"

[[dialogue]]
speaker = "トレジアンナ"
# 「ありがとうございます、会長さん♪　よかったですね、サチさん。これも<b>幸運体質</b>によるラッキーですよ、きっと！」
line = "「ありがとうございます、会長さん♪　よかったですね、サチさん。これも<b>幸運体質</b>によるラッキーですよ、きっと！」"

[[dialogue]]
speaker = "サチ"
# 「あのですね。私はあくまで人事を尽くして天命を待つ主義なのであって、幸運頼りの行き当たりばったりは好きじゃないと、何度も……」
line = "「あのですね。私はあくまで人事を尽くして天命を待つ主義なのであって、幸運頼りの行き当たりばったりは好きじゃないと、何度も……」"

[[dialogue]]
speaker = "unk"
# 幸運体質って？
line = "幸運体質って？"

[[dialogue]]
speaker = "サチ"
# 「ああ、えっと、私が生まれつき持ってる固有の星術で、『幸運の流れを引き寄せる』ことが出来るんですよ」
line = "「ああ、えっと、私が生まれつき持ってる固有の星術で、『幸運の流れを引き寄せる』ことが出来るんですよ」"

[[dialogue]]
speaker = "サチ"
# 「認定された術式名は『<ruby=ラッキースター>幸運流星</ruby>』。自動発動型、というか正確には私自身も制御は出来ないんですけど、簡単に言うと幸運体質ってことですね」
line = "「認定された術式名は『<ruby>幸運流星<rt>ラッキースター</rt></ruby>』。自動発動型、というか正確には私自身も制御は出来ないんですけど、簡単に言うと幸運体質ってことですね」"

[[dialogue]]
speaker = "トレジアンナ"
# 「嘘みたいですけど、本当にサチさんは超が付くレベルのラッキーガールなんですよ～？　だからこそ私は、サチさんを自身のマスターとして、魔法少女に選んだんですから♪」
line = "「嘘みたいですけど、本当にサチさんは超が付くレベルのラッキーガールなんですよ～？　だからこそ私は、サチさんを自身のマスターとして、魔法少女に選んだんですから♪」"

[[dialogue]]
speaker = "サチ"
# 「そのうち戦闘で、お見せできるかもしれません。ひとまず、私もこの後、生徒会の仕事がありますので、今日はこの辺りでお暇しようと思います」
line = "「そのうち戦闘で、お見せできるかもしれません。ひとまず、私もこの後、生徒会の仕事がありますので、今日はこの辺りでお暇しようと思います」"

[[dialogue]]
speaker = "サチ"
# 「それではまた……って、わわっ！？　急に足元が滑って！？」
line = "「それではまた……って、わわっ！？　急に足元が滑って！？」"

[[dialogue]]
speaker = "unk"
# 危ない！
line = "危ない！"

[[dialogue]]
speaker = "サチ"
# 「痛たた……足元には何も無かったはずなのに、いきなり滑るなんてどうして……って、えっ！？」
line = "「痛たた……足元には何も無かったはずなのに、いきなり滑るなんてどうして……って、えっ！？」"

[[dialogue]]
speaker = "サチ"
# 「かかか会長さん！？　顔が近い近い近い！　っていうか、どこ触って！？」
line = "「かかか会長さん！？　顔が近い近い近い！　っていうか、どこ触って！？」"

[[dialogue]]
speaker = "unk"
# 受け止めたつもりだったんだけど、その……
line = "受け止めたつもりだったんだけど、その……"

[[dialogue]]
speaker = "サチ"
# 「え？　両手がなにかに引っ掛かって抜けない？　って、それは私の、パ、パパパ……！」
line = "「え？　両手がなにかに引っ掛かって抜けない？　って、それは私の、パ、パパパ……！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「パンツですね！」
line = "「パンツですね！」"

[[dialogue]]
speaker = "サチ"
# 「え――」
line = "「え――」"

[[dialogue]]
speaker = "サチ"
# 「エッチなことは禁止ですぅぅぅ～～～～～～～～～っ！！！」
line = "「エッチなことは禁止ですぅぅぅ～～～～～～～～～っ！！！」"

[[dialogue]]
speaker = "unk"
# うわぁっ！？　ごめん！
line = "うわぁっ！？　ごめん！"

[[dialogue]]
speaker = "トレジアンナ"
# 「う～ん、これはラッキーですね！」
line = "「う～ん、これはラッキーですね！」"

[[dialogue]]
speaker = "unk"
# 叫ぶサチを横目に、１人納得したように言うトレジアンナさんなのだった。
line = "叫ぶサチを横目に、１人納得したように言うトレジアンナさんなのだった。"
