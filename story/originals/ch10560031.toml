[[dialogue]]
speaker = "unk"
# 第１話,アムの仲良しコミュニケーション,P
line = "第１話,アムの仲良しコミュニケーション,P"

[[dialogue]]
speaker = "unk"
# それはクリスマス前に、アムとナミエルがクリスマスフォームの不思議な力によって、物理的に離れられない状態になってしまっていた初日のこと。
line = "それはクリスマス前に、アムとナミエルがクリスマスフォームの不思議な力によって、物理的に離れられない状態になってしまっていた初日のこと。"

[[dialogue]]
speaker = "unk"
# アムは、附属校１年のナミエルの所属する１年Ｃ組で一緒に授業を受けた後、集まってきたクラスメイトたちに挨拶をしていた。
line = "アムは、附属校１年のナミエルの所属する１年Ｃ組で一緒に授業を受けた後、集まってきたクラスメイトたちに挨拶をしていた。"

[[dialogue]]
speaker = "アム"
# 「――というわけで、しばらくあたし、ナミエルと二人三脚状態で、授業を受けることになりそうなんだ」
line = "「――というわけで、しばらくあたし、ナミエルと二人三脚状態で、授業を受けることになりそうなんだ」"

[[dialogue]]
speaker = "ナミエル"
# 「原因はまだわかっていませんが、解決しなければならない問題であることは間違いありません」
line = "「原因はまだわかっていませんが、解決しなければならない問題であることは間違いありません」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「変身状態が解除できない上に、１メートル以上離れられないなんて、なんだかすごく面白そうなことになっているのだ！」
line = "「変身状態が解除できない上に、１メートル以上離れられないなんて、なんだかすごく面白そうなことになっているのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「冬の精霊が記憶喪失とは、セシアの時を思い出しますね～。もし私たちに協力できることがあれば、遠慮なく仰って下さいね♪」
line = "「冬の精霊が記憶喪失とは、セシアの時を思い出しますね～。もし私たちに協力できることがあれば、遠慮なく仰って下さいね♪」"

[[dialogue]]
speaker = "アム"
# 「うんっ、ありがとうね、ママダレナ！　アルモたんも、今日からよろしくね♪」
line = "「うんっ、ありがとうね、ママダレナ！　アルモたんも、今日からよろしくね♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「よろしくなのだ、アム！　アルモたん的には、クラスの新しい仲間が増えて嬉しいのだ♪」
line = "「よろしくなのだ、アム！　アルモたん的には、クラスの新しい仲間が増えて嬉しいのだ♪」"

[[dialogue]]
speaker = "アム"
# 「――そうだ！　せっかく仲良くなれる機会だし、みんなで『ドッジボール』しない？　みんなで仲良くなるには、一緒に遊ぶのが手っ取り早いからね♪」
line = "「――そうだ！　せっかく仲良くなれる機会だし、みんなで『ドッジボール』しない？　みんなで仲良くなるには、一緒に遊ぶのが手っ取り早いからね♪」"

[[dialogue]]
speaker = "unk"
# そんなわけで、戦闘訓練も兼ねたドッジボールが、放課後に開催されることになった。
line = "そんなわけで、戦闘訓練も兼ねたドッジボールが、放課後に開催されることになった。"

[[dialogue]]
speaker = "アム"
# 「よ～し、行っくぞ～！　とりゃあっ！」
line = "「よ～し、行っくぞ～！　とりゃあっ！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ボールをキャ～ッチ、なのだ！」
line = "「ボールをキャ～ッチ、なのだ！」"

[[dialogue]]
speaker = "アム"
# 「おっ、やるね～、アルモたん♪」
line = "「おっ、やるね～、アルモたん♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「えへへっ、そう簡単にはやられないのだ！」
line = "「えへへっ、そう簡単にはやられないのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「アムさんもドッジボールお上手ですね～。スポーツは得意なんですか？」
line = "「アムさんもドッジボールお上手ですね～。スポーツは得意なんですか？」"

[[dialogue]]
speaker = "アム"
# 「えへへっ、まあね～。あたし、昔から運動神経には自信があるんだ！」
line = "「えへへっ、まあね～。あたし、昔から運動神経には自信があるんだ！」"

[[dialogue]]
speaker = "ナミエル"
# 「あの……アム先輩、ちょっといいでしょうか？」
line = "「あの……アム先輩、ちょっといいでしょうか？」"

[[dialogue]]
speaker = "アム"
# 「うん？　どうしたの、ナミエル？」
line = "「うん？　どうしたの、ナミエル？」"

[[dialogue]]
speaker = "ナミエル"
# 「私たちが現状二人三脚状態といっても、わざわざ<b>手を繋ぐ</b>必要はないんじゃ……」
line = "「私たちが現状二人三脚状態といっても、わざわざ<b>手を繋ぐ</b>必要はないんじゃ……」"

[[dialogue]]
speaker = "unk"
# ２人は現在、アムの提案で、手を繋いだ状態でドッジボールをしていた。
line = "２人は現在、アムの提案で、手を繋いだ状態でドッジボールをしていた。"

[[dialogue]]
speaker = "アム"
# 「それはほら、もしかすると、あたしたちが今の状態のまま、モンスターが出現して、戦うことになったりするかもしれないじゃない？」
line = "「それはほら、もしかすると、あたしたちが今の状態のまま、モンスターが出現して、戦うことになったりするかもしれないじゃない？」"

[[dialogue]]
speaker = "アム"
# 「その時にちゃんと戦えなくて、大切なものを守れなくて、後悔したくないからさ」
line = "「その時にちゃんと戦えなくて、大切なものを守れなくて、後悔したくないからさ」"

[[dialogue]]
speaker = "アム"
# 「だから、その訓練も兼ねて、まずは手を繋いだ状態で『１メートルしか離れられない』っていう制限の距離感を掴んでおきたいと思ってね」
line = "「だから、その訓練も兼ねて、まずは手を繋いだ状態で『１メートルしか離れられない』っていう制限の距離感を掴んでおきたいと思ってね」"

[[dialogue]]
speaker = "ナミエル"
# 「アム先輩……星騎士としては、本当に真面目ですよね」
line = "「アム先輩……星騎士としては、本当に真面目ですよね」"

[[dialogue]]
speaker = "アム"
# 「うん♪　あたしは本気で、世界を守れる最強の星騎士を目指しているからね！」
line = "「うん♪　あたしは本気で、世界を守れる最強の星騎士を目指しているからね！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そういえば、気になっていたのですが、ドッジボールを選んだのは何か理由があったりするのでしょうか？」
line = "「そういえば、気になっていたのですが、ドッジボールを選んだのは何か理由があったりするのでしょうか？」"

[[dialogue]]
speaker = "アム"
# 「ん？　ああ、それはね～。あたしが附属校の前に通っていた学校で、転校生の子がやってきたことがあってさ」
line = "「ん？　ああ、それはね～。あたしが附属校の前に通っていた学校で、転校生の子がやってきたことがあってさ」"

[[dialogue]]
speaker = "アム"
# 「その子は口数が少ない子で、なかなかクラスに馴染めずにいたんだけど……」
line = "「その子は口数が少ない子で、なかなかクラスに馴染めずにいたんだけど……」"

[[dialogue]]
speaker = "アム"
# 「当時は休み時間にドッジボールをするのが流行ってて、どうにかその子と仲良くなれないかな～って思って、試しに『みんなでドッジしよう！』って誘ったんだ」
line = "「当時は休み時間にドッジボールをするのが流行ってて、どうにかその子と仲良くなれないかな～って思って、試しに『みんなでドッジしよう！』って誘ったんだ」"

[[dialogue]]
speaker = "アム"
# 「そしたらさ、不思議なんだけど……普通に話そうとしても上手く行かなかったのに、ボールを投げ合って遊んでいたら、自然と仲良くなれたんだよね」
line = "「そしたらさ、不思議なんだけど……普通に話そうとしても上手く行かなかったのに、ボールを投げ合って遊んでいたら、自然と仲良くなれたんだよね」"

[[dialogue]]
speaker = "アム"
# 「後からその子に聞いたら、上手く喋れなくても、一緒にドッジボールをしていたら、周りの子たちが優しくて悪い子じゃないって、なんとなく感じたんだってさ」
line = "「後からその子に聞いたら、上手く喋れなくても、一緒にドッジボールをしていたら、周りの子たちが優しくて悪い子じゃないって、なんとなく感じたんだってさ」"

[[dialogue]]
speaker = "アム"
# 「その経験があったから、ライバルのエルゼとも、附属３年で初めて同じクラスになって知り合った時に、ドッジボールをしようってあたしが誘ってさ」
line = "「その経験があったから、ライバルのエルゼとも、附属３年で初めて同じクラスになって知り合った時に、ドッジボールをしようってあたしが誘ってさ」"

[[dialogue]]
speaker = "アム"
# 「最後、１対１で内野に残るまで戦って、それでお互いに『コイツ、できる……！』って感じになって、ライバルとして仲良くなったんだよね～」
line = "「最後、１対１で内野に残るまで戦って、それでお互いに『コイツ、できる……！』って感じになって、ライバルとして仲良くなったんだよね～」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「なるほど。アムさんにとって、ドッジボールは思い入れのあるスポーツなんですね」
line = "「なるほど。アムさんにとって、ドッジボールは思い入れのあるスポーツなんですね」"

[[dialogue]]
speaker = "アム"
# 「うん♪　ドッジボールはめっちゃ好きだよ！」
line = "「うん♪　ドッジボールはめっちゃ好きだよ！」"

[[dialogue]]
speaker = "unk"
# それから１時間程、ドッジボールで勝った負けたと遊び続けて――
line = "それから１時間程、ドッジボールで勝った負けたと遊び続けて――"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「負けちゃったのだ～！」
line = "「負けちゃったのだ～！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「アルモ、残念でしたね～、よしよし♪」
line = "「アルモ、残念でしたね～、よしよし♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「いっぱい動き回ったから、お腹が空いたのだ～」
line = "「いっぱい動き回ったから、お腹が空いたのだ～」"

[[dialogue]]
speaker = "ナミエル"
# 「ふぅ……なんとか今度は、最後まで残ることができましたね」
line = "「ふぅ……なんとか今度は、最後まで残ることができましたね」"

[[dialogue]]
speaker = "アム"
# 「いぇ～い♪　ナイスコンビネーション！　上手く行ったね♪」
line = "「いぇ～い♪　ナイスコンビネーション！　上手く行ったね♪」"

[[dialogue]]
speaker = "ナミエル"
# 「ま、まあ……。しかし、アム先輩、やはりすごいですね。一緒に戦ってみて、星騎士としての実力を感じました」
line = "「ま、まあ……。しかし、アム先輩、やはりすごいですね。一緒に戦ってみて、星騎士としての実力を感じました」"

[[dialogue]]
speaker = "アム"
# 「ふふふっ、そうでしょ～？」
line = "「ふふふっ、そうでしょ～？」"

[[dialogue]]
speaker = "アム"
# 「でも、ナミエルもすごい戦えるじゃん！　あたし、これからもっと仲良くなりたいって思ったよ♪」
line = "「でも、ナミエルもすごい戦えるじゃん！　あたし、これからもっと仲良くなりたいって思ったよ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「仲良く……そ、そうですか」
line = "「仲良く……そ、そうですか」"

[[dialogue]]
speaker = "アム"
# 「とりあえずナミエル、勝利のハイタッチしよっ♪」
line = "「とりあえずナミエル、勝利のハイタッチしよっ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「え？　は、はい……！」
line = "「え？　は、はい……！」"

[[dialogue]]
speaker = "unk"
# 少し気恥ずかしさを感じながらもナミエルが手の平を上に差し出すと、アムは笑顔を浮かべながら、元気にハイタッチを交わすのだった。
line = "少し気恥ずかしさを感じながらもナミエルが手の平を上に差し出すと、アムは笑顔を浮かべながら、元気にハイタッチを交わすのだった。"
