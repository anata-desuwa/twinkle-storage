[[dialogue]]
speaker = "unk"
# 第３話,２人のパンケーキ作り,P
line = "第３話,２人のパンケーキ作り,P"

[[dialogue]]
speaker = "unk"
# ソフィアが家にやってきて、一緒にパンケーキを作ることになった。
line = "ソフィアが家にやってきて、一緒にパンケーキを作ることになった。"

[[dialogue]]
speaker = "unk"
# 前回はサーシャさん用に作ったパンケーキだったから、今回は俺用に作りたい……と、最初はそういう話だった。
line = "前回はサーシャさん用に作ったパンケーキだったから、今回は俺用に作りたい……と、最初はそういう話だった。"

[[dialogue]]
speaker = "unk"
# けれどお菓子作りなら俺も参加できるので、せっかくだから２人で一緒に作ろうということになった次第だ。
line = "けれどお菓子作りなら俺も参加できるので、せっかくだから２人で一緒に作ろうということになった次第だ。"

[[dialogue]]
speaker = "ソフィア"
# 「いかにお菓子作りが得意な会長さんでも、こちらはサラン先生の直伝、負けるわけにはいきません。──あ、卵を割ってくれてありがとうございます」
line = "「いかにお菓子作りが得意な会長さんでも、こちらはサラン先生の直伝、負けるわけにはいきません。──あ、卵を割ってくれてありがとうございます」"

[[dialogue]]
speaker = "ソフィア"
# 「どちらが美味しいパンケーキを作るか勝負ですよ！　──やっぱりハチミツとバターはたっぷり乗せがいいですよね？　やはり私たちは気が合います」
line = "「どちらが美味しいパンケーキを作るか勝負ですよ！　──やっぱりハチミツとバターはたっぷり乗せがいいですよね？　やはり私たちは気が合います」"

[[dialogue]]
speaker = "ソフィア"
# 「ああ、お皿を取って並べておいてくれたんですね。私では背が届かなくて困っていたんです、ありがとうございます」
line = "「ああ、お皿を取って並べておいてくれたんですね。私では背が届かなくて困っていたんです、ありがとうございます」"

[[dialogue]]
speaker = "unk"
# とまあ、そんな調子で仲良くお菓子作りに没頭し──
line = "とまあ、そんな調子で仲良くお菓子作りに没頭し──"

[[dialogue]]
speaker = "ソフィア"
# 「完成～♪」
line = "「完成～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「それでは早速頂きましょう。まずは私の作ったものを食べてもらいましょうか」
line = "「それでは早速頂きましょう。まずは私の作ったものを食べてもらいましょうか」"

[[dialogue]]
speaker = "ソフィア"
# 「はい、あ～ん<emoji=heart04>」
line = "「はい、あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 食べさせてくれるの？
line = "食べさせてくれるの？"

[[dialogue]]
speaker = "ソフィア"
# 「ええ、もちろんです。恋人が食べさせてくれる、というのもパンケーキを美味しくする味付けのひとつなのですよ」
line = "「ええ、もちろんです。恋人が食べさせてくれる、というのもパンケーキを美味しくする味付けのひとつなのですよ」"

[[dialogue]]
speaker = "ソフィア"
# 「どうですか、私のパンケーキは？　美味しいでしょう？」
line = "「どうですか、私のパンケーキは？　美味しいでしょう？」"

[[dialogue]]
speaker = "unk"
# それじゃ俺のも
line = "それじゃ俺のも"

[[dialogue]]
speaker = "unk"
# 美味し過ぎる
line = "美味し過ぎる"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんも私に食べさせてくれるのですか？」
line = "「会長さんも私に食べさせてくれるのですか？」"

[[dialogue]]
speaker = "ソフィア"
# 「まあ仕方ありませんね。条件はフェアでなくては……あーんっ<emoji=heart04>」
line = "「まあ仕方ありませんね。条件はフェアでなくては……あーんっ<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「う……さすが会長さん、私の作ったのに負けず劣らずの美味しさです……」
line = "「う……さすが会長さん、私の作ったのに負けず劣らずの美味しさです……」"

[[dialogue]]
speaker = "ソフィア"
# 「悔しいですが今日のところは引き分けという事にしておきましょう」
line = "「悔しいですが今日のところは引き分けという事にしておきましょう」"

[[dialogue]]
speaker = "ソフィア"
# 「もっと腕を磨いておきますので、またこうやって一緒に作って食べさせ合いましょう♪」
line = "「もっと腕を磨いておきますので、またこうやって一緒に作って食べさせ合いましょう♪」"

[[dialogue]]
speaker = "unk"
# 受けて立とう！
line = "受けて立とう！"

[[dialogue]]
speaker = "unk"
# その後も仲良く互いにあーんしながら、２人で作ったパンケーキを食べ終えた。
line = "その後も仲良く互いにあーんしながら、２人で作ったパンケーキを食べ終えた。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "unk"
# 他に何かしたいことある？
line = "他に何かしたいことある？"

[[dialogue]]
speaker = "unk"
# お腹もふくれたところで
line = "お腹もふくれたところで"

[[dialogue]]
speaker = "ソフィア"
# 「そうですね……今日の目的であるパンケーキ作りは達成したので、あとはお話でもしながらゆっくりしましょう」
line = "「そうですね……今日の目的であるパンケーキ作りは達成したので、あとはお話でもしながらゆっくりしましょう」"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ソフィア"
# 「ところで会長さん、聞きたいことがあったのですが」
line = "「ところで会長さん、聞きたいことがあったのですが」"

[[dialogue]]
speaker = "ソフィア"
# 「会長さんが妹好きというのは本当ですか？」
line = "「会長さんが妹好きというのは本当ですか？」"

[[dialogue]]
speaker = "unk"
# 誤報だ！！
line = "誤報だ！！"

[[dialogue]]
speaker = "unk"
# どこ情報！！？
line = "どこ情報！！？"

[[dialogue]]
speaker = "ソフィア"
# 「おや、間違いなのですか……」
line = "「おや、間違いなのですか……」"

[[dialogue]]
speaker = "ソフィア"
# 「私は体型的に小柄ですし、何より実際妹でもあります」
line = "「私は体型的に小柄ですし、何より実際妹でもあります」"

[[dialogue]]
speaker = "ソフィア"
# 「もし会長さんがお望みなら、『お兄ちゃん』と呼んであげても良いのですが？」
line = "「もし会長さんがお望みなら、『お兄ちゃん』と呼んであげても良いのですが？」"

[[dialogue]]
speaker = "unk"
# ソフィアが、お兄ちゃん……
line = "ソフィアが、お兄ちゃん……"

[[dialogue]]
speaker = "unk"
# っ……
line = "っ……"

[[dialogue]]
speaker = "ソフィア"
# 「じと～……これはクロですね」
line = "「じと～……これはクロですね」"

[[dialogue]]
speaker = "ソフィア"
# 「素直になったらどうです？　お兄ちゃんになって私からそう呼ばれたいと」
line = "「素直になったらどうです？　お兄ちゃんになって私からそう呼ばれたいと」"

[[dialogue]]
speaker = "ソフィア"
# 「ふふっ、分かりました。では兄妹ごっこをしましょう。今から会長さんは私のお兄ちゃんです、いいですね？」
line = "「ふふっ、分かりました。では兄妹ごっこをしましょう。今から会長さんは私のお兄ちゃんです、いいですね？」"

[[dialogue]]
speaker = "ソフィア"
# 「えへへ、それではお兄ちゃん、いつものをお願いします♪」
line = "「えへへ、それではお兄ちゃん、いつものをお願いします♪」"

[[dialogue]]
speaker = "ソフィア"
# 「もー、いつものあれに決まってるじゃないですか。お膝の上に座らせてください<emoji=heart04>」
line = "「もー、いつものあれに決まってるじゃないですか。お膝の上に座らせてください<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「よいしょっと。やっぱり妹の定位置は、お兄ちゃんのお膝の上ですね♪」
line = "「よいしょっと。やっぱり妹の定位置は、お兄ちゃんのお膝の上ですね♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ほらほら、お膝の上に乗せているだけですか？　お兄ちゃんならもっと妹を可愛がってくれなくては」
line = "「ほらほら、お膝の上に乗せているだけですか？　お兄ちゃんならもっと妹を可愛がってくれなくては」"

[[dialogue]]
speaker = "unk"
# 抱きしめようか？
line = "抱きしめようか？"

[[dialogue]]
speaker = "unk"
# 頭を撫でようか？
line = "頭を撫でようか？"

[[dialogue]]
speaker = "ソフィア"
# 「両方です、両方。ぎゅーっと抱きしめながら頭をなでなでしてください」
line = "「両方です、両方。ぎゅーっと抱きしめながら頭をなでなでしてください」"

[[dialogue]]
speaker = "ソフィア"
# 「そうそう、いい感じです。姉さんに抱っこされるのとはまた違った感じがしていいですね」
line = "「そうそう、いい感じです。姉さんに抱っこされるのとはまた違った感じがしていいですね」"

[[dialogue]]
speaker = "ソフィア"
# 「むっ……今、ちょっと邪心が入りましたか？　なでなでがちょっとエッチな感じでしたよ？」
line = "「むっ……今、ちょっと邪心が入りましたか？　なでなでがちょっとエッチな感じでしたよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「お兄ちゃんは妹に対してエッチな感情を抱かないものです。だから、そういう気持ちは捨てて可愛がってください<emoji=heart04>」
line = "「お兄ちゃんは妹に対してエッチな感情を抱かないものです。だから、そういう気持ちは捨てて可愛がってください<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 難しい要求をされながら、俺とソフィアは食後のまったりした時間を過ごしたのだった。
line = "難しい要求をされながら、俺とソフィアは食後のまったりした時間を過ごしたのだった。"
