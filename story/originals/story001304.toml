[[dialogue]]
speaker = "unk"
# 一方、マトイと同じくビーチバレー特訓を受けているアムはというと――
line = "一方、マトイと同じくビーチバレー特訓を受けているアムはというと――"

[[dialogue]]
speaker = "アム"
# 「とりゃあぁぁぁーーーっ！」
line = "「とりゃあぁぁぁーーーっ！」"

[[dialogue]]
speaker = "unk"
# 気合いのかけ声と共に、マムの放つビーチボール千本ノックを弾いて行く。
line = "気合いのかけ声と共に、マムの放つビーチボール千本ノックを弾いて行く。"

[[dialogue]]
speaker = "unk"
# 途中、盾だけでは手数が足りなくなったところで――
line = "途中、盾だけでは手数が足りなくなったところで――"

[[dialogue]]
speaker = "アム"
# 「重力バリアー、全面展開！」
line = "「重力バリアー、全面展開！」"

[[dialogue]]
speaker = "unk"
# アムの周囲に球形のバリアーが張られ、複数のビーチボールを防ぎ切ってみせた。
line = "アムの周囲に球形のバリアーが張られ、複数のビーチボールを防ぎ切ってみせた。"

[[dialogue]]
speaker = "アム"
# 「えへへっ、よし！　今回はノーミスで防衛成功！　どうですか、マム！」
line = "「えへへっ、よし！　今回はノーミスで防衛成功！　どうですか、マム！」"

[[dialogue]]
speaker = "マハムート"
# 「悪くないわね。あなたの反射神経は強い武器よ。ただ、それに任せて雑な行動選択も少なくない」
line = "「悪くないわね。あなたの反射神経は強い武器よ。ただ、それに任せて雑な行動選択も少なくない」"

[[dialogue]]
speaker = "マハムート"
# 「その結果、最後に危なくなったら重力操作に頼るというパターンが多くなっているわ」
line = "「その結果、最後に危なくなったら重力操作に頼るというパターンが多くなっているわ」"

[[dialogue]]
speaker = "アム"
# 「ふむふむ……」
line = "「ふむふむ……」"

[[dialogue]]
speaker = "マハムート"
# 「だから、反射神経はそのままに、頭もちゃんと使うようにしなさい。がむしゃらに動くだけでなく、どう防ぐのが最適か考えるの」
line = "「だから、反射神経はそのままに、頭もちゃんと使うようにしなさい。がむしゃらに動くだけでなく、どう防ぐのが最適か考えるの」"

[[dialogue]]
speaker = "マハムート"
# 「重力バリアーの全面展開は、星力の消耗が大きいはず。そして、発動後に一点突破の強力な攻撃が来たら、力が分散しているから防ぎ切れず突破される」
line = "「重力バリアーの全面展開は、星力の消耗が大きいはず。そして、発動後に一点突破の強力な攻撃が来たら、力が分散しているから防ぎ切れず突破される」"

[[dialogue]]
speaker = "マハムート"
# 「それはすなわち、あなたの防御に隙ができているということよ。あなたのライバルだっていう、エルデリーゼの『最強の矛』をそれで防ぎ切れるかしら？」
line = "「それはすなわち、あなたの防御に隙ができているということよ。あなたのライバルだっていう、エルデリーゼの『最強の矛』をそれで防ぎ切れるかしら？」"

[[dialogue]]
speaker = "アム"
# 「……！　いや、エルゼの<ruby=グレイブ>矛</ruby>なら貫いてきます！　絶対に！」
line = "「……！　いや、エルゼの<ruby>矛<rt>グレイブ</rt></ruby>なら貫いてきます！　絶対に！」"

[[dialogue]]
speaker = "マハムート"
# 「なら、重力操作の全面展開は、可能な限り使わないように心がけなさい」
line = "「なら、重力操作の全面展開は、可能な限り使わないように心がけなさい」"

[[dialogue]]
speaker = "アム"
# 「イエス・マム！」
line = "「イエス・マム！」"

[[dialogue]]
speaker = "unk"
# そうして、アドバイスを受け、再度ビーチボールの千本ノックに挑んだアムは――
line = "そうして、アドバイスを受け、再度ビーチボールの千本ノックに挑んだアムは――"

[[dialogue]]
speaker = "アム"
# 「よし、頭をちゃんと使って――とりゃあぁぁぁっ！」
line = "「よし、頭をちゃんと使って――とりゃあぁぁぁっ！」"

[[dialogue]]
speaker = "アム"
# 「ヘディングブロック！！！」
line = "「ヘディングブロック！！！」"

[[dialogue]]
speaker = "unk"
# 頭を使うってそういうこと！？
line = "頭を使うってそういうこと！？"

[[dialogue]]
speaker = "マハムート"
# 「アム、そうじゃないわ。もう１度説明するから聞きなさい」
line = "「アム、そうじゃないわ。もう１度説明するから聞きなさい」"

[[dialogue]]
speaker = "アム"
# 「イエス、マム！」
line = "「イエス、マム！」"

[[dialogue]]
speaker = "マハムート"
# 「返事はいいのよね、この子……」
line = "「返事はいいのよね、この子……」"

[[dialogue]]
speaker = "アム"
# 「えへへ♪　それ程でも～♪」
line = "「えへへ♪　それ程でも～♪」"

[[dialogue]]
speaker = "unk"
# それからしばらく訓練を続け、アムはマトイと交代して休憩となった。
line = "それからしばらく訓練を続け、アムはマトイと交代して休憩となった。"

[[dialogue]]
speaker = "アム"
# 「ふんふんふふ～ん♪　ご飯～、ご飯～♪」
line = "「ふんふんふふ～ん♪　ご飯～、ご飯～♪」"

[[dialogue]]
speaker = "unk"
# アム、お疲れ様
line = "アム、お疲れ様"

[[dialogue]]
speaker = "unk"
# 海の家の中で休んでいる彼女に、俺は声をかける。
line = "海の家の中で休んでいる彼女に、俺は声をかける。"

[[dialogue]]
speaker = "アム"
# 「あっ、会長～！　会長もお昼ご飯食べに来たの？」
line = "「あっ、会長～！　会長もお昼ご飯食べに来たの？」"

[[dialogue]]
speaker = "リップル"
# 「ヘイ、オマチドウでーす！　アムの注文した、ハンバーグカレーですよ～♪」
line = "「ヘイ、オマチドウでーす！　アムの注文した、ハンバーグカレーですよ～♪」"

[[dialogue]]
speaker = "アム"
# 「わ～い♪　リップル先輩、ありがとうございます！　美味しそ～って、ハッ……！？」
line = "「わ～い♪　リップル先輩、ありがとうございます！　美味しそ～って、ハッ……！？」"

[[dialogue]]
speaker = "アム"
# 「か、会長！　言っとくけど、これはたまたまだから！」
line = "「か、会長！　言っとくけど、これはたまたまだから！」"

[[dialogue]]
speaker = "アム"
# 「――何がって……その、ハンバーグカレー！　今日はたまたまそういう気分だっただけで、いつも頼んでるというわけじゃないから！」
line = "「――何がって……その、ハンバーグカレー！　今日はたまたまそういう気分だっただけで、いつも頼んでるというわけじゃないから！」"

[[dialogue]]
speaker = "アム"
# 「って会長、何その全部わかってますよって顔は！？　子供っぽいとか思ってるでしょ、絶対！？」
line = "「って会長、何その全部わかってますよって顔は！？　子供っぽいとか思ってるでしょ、絶対！？」"

[[dialogue]]
speaker = "リップル"
# 「アムはいつも、ＢＩＧ美味しそうに食べてくれるから、ワタシ嬉しいで～す♪」
line = "「アムはいつも、ＢＩＧ美味しそうに食べてくれるから、ワタシ嬉しいで～す♪」"

[[dialogue]]
speaker = "アム"
# 「ちょっ、リップル先輩、言わないで！」
line = "「ちょっ、リップル先輩、言わないで！」"

[[dialogue]]
speaker = "リップル"
# 「ふふっ、テヘペロで～す♪」
line = "「ふふっ、テヘペロで～す♪」"

[[dialogue]]
speaker = "unk"
# せっかくだし、俺も同じのを頼もうかな
line = "せっかくだし、俺も同じのを頼もうかな"

[[dialogue]]
speaker = "リップル"
# 「ヘイ、会長、ご注文アザマース！　ただいま作ってキマスね～♪」
line = "「ヘイ、会長、ご注文アザマース！　ただいま作ってキマスね～♪」"

[[dialogue]]
speaker = "アム"
# 「も、もう！　――ところで会長、聞いたよ！　あたしが休憩してて見てなかった時に、マムと水着フォームで戦ったらしいじゃん？」
line = "「も、もう！　――ところで会長、聞いたよ！　あたしが休憩してて見てなかった時に、マムと水着フォームで戦ったらしいじゃん？」"

[[dialogue]]
speaker = "アム"
# 「あたしもまだ勝負してなかったのに、ずるい！　会長の水着フォーム！」
line = "「あたしもまだ勝負してなかったのに、ずるい！　会長の水着フォーム！」"

[[dialogue]]
speaker = "unk"
# そう、俺にも同じように、以前手に入れた『水着フォーム』が存在する。
line = "そう、俺にも同じように、以前手に入れた『水着フォーム』が存在する。"

[[dialogue]]
speaker = "unk"
# 俺の海パンのことが……！
line = "俺の海パンのことが……！"

[[dialogue]]
speaker = "unk"
# ふっ、そんなに気になるのか
line = "ふっ、そんなに気になるのか"

[[dialogue]]
speaker = "アム"
# 「いや、気になるのは能力の方だからね！？　海パン自体じゃないから！」
line = "「いや、気になるのは能力の方だからね！？　海パン自体じゃないから！」"

[[dialogue]]
speaker = "unk"
# 俺の海パン――水着フォームの能力は、守護星である地球上の概念『夏』を力に変換することだと、アムに説明する。
line = "俺の海パン――水着フォームの能力は、守護星である地球上の概念『夏』を力に変換することだと、アムに説明する。"

[[dialogue]]
speaker = "unk"
# リップルの言葉を借りるなら、『夏パワー』と言うべき力。それを星力にプラスして使うことができる。
line = "リップルの言葉を借りるなら、『夏パワー』と言うべき力。それを星力にプラスして使うことができる。"

[[dialogue]]
speaker = "unk"
# 簡単に言うなら、通常戦闘服の２倍の出力で戦えるのだ。
line = "簡単に言うなら、通常戦闘服の２倍の出力で戦えるのだ。"

[[dialogue]]
speaker = "アム"
# 「えっ、２倍って単純だけど、めっちゃ強くない！？　――他にも、夏パワーを使ったサマースキルを発動できる？　なにそれ見たい！」
line = "「えっ、２倍って単純だけど、めっちゃ強くない！？　――他にも、夏パワーを使ったサマースキルを発動できる？　なにそれ見たい！」"

[[dialogue]]
speaker = "アム"
# 「――ただし、夏の期間しか力を発揮できない？　なるほど、季節限定だからこその強さってことか……」
line = "「――ただし、夏の期間しか力を発揮できない？　なるほど、季節限定だからこその強さってことか……」"

[[dialogue]]
speaker = "アム"
# 「そう聞くと、ますます勝負したくなってきたかも！　会長はあたしのライバルでもあるわけだし、マムとだけ戦うなんてずるいもん！」
line = "「そう聞くと、ますます勝負したくなってきたかも！　会長はあたしのライバルでもあるわけだし、マムとだけ戦うなんてずるいもん！」"

[[dialogue]]
speaker = "アム"
# 「あと……マトイ先輩が見たって言ってたけど、なんかマムの水着姿もベタ褒めしてたらしいじゃん！？　あたしのはまだ褒めてもらってないのに！」
line = "「あと……マトイ先輩が見たって言ってたけど、なんかマムの水着姿もベタ褒めしてたらしいじゃん！？　あたしのはまだ褒めてもらってないのに！」"

[[dialogue]]
speaker = "unk"
# あれ？　似合ってるって言わなかったっけ？
line = "あれ？　似合ってるって言わなかったっけ？"

[[dialogue]]
speaker = "アム"
# 「確かに言われたけど、それだけだし！　学園指定のスク水がカッコいいのは当然だけど、もっとこう……他にもあるでしょ！　あたしだって、レディなんだし……」
line = "「確かに言われたけど、それだけだし！　学園指定のスク水がカッコいいのは当然だけど、もっとこう……他にもあるでしょ！　あたしだって、レディなんだし……」"

[[dialogue]]
speaker = "アム"
# 「って、なんで笑ってるのさ！？　もしかしてまた、子供っぽいとか思ってる！？　あたしは別に、拗ねてるわけじゃないからね！？」
line = "「って、なんで笑ってるのさ！？　もしかしてまた、子供っぽいとか思ってる！？　あたしは別に、拗ねてるわけじゃないからね！？」"

[[dialogue]]
speaker = "unk"
# ごめん。でも――
line = "ごめん。でも――"

[[dialogue]]
speaker = "unk"
# アムらしい水着で、ちゃんと可愛いなって思ってるよ――俺はそう伝える。
line = "アムらしい水着で、ちゃんと可愛いなって思ってるよ――俺はそう伝える。"

[[dialogue]]
speaker = "アム"
# 「っ……！」
line = "「っ……！」"

[[dialogue]]
speaker = "アム"
# 「ま、まあ、それ程でもあるけどねっ……えへへ」
line = "「ま、まあ、それ程でもあるけどねっ……えへへ」"

[[dialogue]]
speaker = "アム"
# 「――い、いや、照れてないよ！？」
line = "「――い、いや、照れてないよ！？」"

[[dialogue]]
speaker = "アム"
# 「とにかく！　お昼ご飯食べ終わったら、あたしと勝負だからね、会長っ。――いただきます！」
line = "「とにかく！　お昼ご飯食べ終わったら、あたしと勝負だからね、会長っ。――いただきます！」"

[[dialogue]]
speaker = "unk"
# 照れてるのを誤魔化すようにカレーを頬張るアムを見て、やっぱり可愛いと思ってしまう俺なのだった。
line = "照れてるのを誤魔化すようにカレーを頬張るアムを見て、やっぱり可愛いと思ってしまう俺なのだった。"
