[[dialogue]]
speaker = "unk"
# 第２話,星座を成すように,P
line = "第２話,星座を成すように,P"

[[dialogue]]
speaker = "unk"
# カフェテリアに顔を出すと、トリシャさんが新しいフォームで占いをしていた。
line = "カフェテリアに顔を出すと、トリシャさんが新しいフォームで占いをしていた。"

[[dialogue]]
speaker = "トリシャ"
# 「……出ました。過食は己を滅ぼす……注意すべしと占いが告げています……」
line = "「……出ました。過食は己を滅ぼす……注意すべしと占いが告げています……」"

[[dialogue]]
speaker = "ウズメイア"
# 「やっばー、お菓子食べすぎだったかなぁ。にしても、占いでそんなことわかっちゃうんだ、すごいね？」
line = "「やっばー、お菓子食べすぎだったかなぁ。にしても、占いでそんなことわかっちゃうんだ、すごいね？」"

[[dialogue]]
speaker = "ミルフィー"
# 「だってトリシャさんの占いだもん。すごく当たるんだから」
line = "「だってトリシャさんの占いだもん。すごく当たるんだから」"

[[dialogue]]
speaker = "舞亜"
# 「次、私が占ってもらってもいい？　次の大会で使う曲目を迷ってるんだけど」
line = "「次、私が占ってもらってもいい？　次の大会で使う曲目を迷ってるんだけど」"

[[dialogue]]
speaker = "ソフィア"
# 「まだ決めてなかったんだ？　次の大会って、もうすぐだったと思うけど」
line = "「まだ決めてなかったんだ？　次の大会って、もうすぐだったと思うけど」"

[[dialogue]]
speaker = "舞亜"
# 「うん、だから神頼みならぬトリシャさん頼みで！」
line = "「うん、だから神頼みならぬトリシャさん頼みで！」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……私は構いませんが……舞亜さんは運命を占いに任せず、ご自分で決断した方がよろしいかと……」
line = "「フフフ……私は構いませんが……舞亜さんは運命を占いに任せず、ご自分で決断した方がよろしいかと……」"

[[dialogue]]
speaker = "舞亜"
# 「そうかな？」
line = "「そうかな？」"

[[dialogue]]
speaker = "トリシャ"
# 「そう、占いに出ています」
line = "「そう、占いに出ています」"

[[dialogue]]
speaker = "ウズメイア"
# 「あははっ、結局は占いなんだ？　で、舞亜はどうするの？」
line = "「あははっ、結局は占いなんだ？　で、舞亜はどうするの？」"

[[dialogue]]
speaker = "舞亜"
# 「うーん……じゃあ自分で決めるよ」
line = "「うーん……じゃあ自分で決めるよ」"

[[dialogue]]
speaker = "トリシャ"
# 「わかりました。次はどなたを占いましょうか？」
line = "「わかりました。次はどなたを占いましょうか？」"

[[dialogue]]
speaker = "ミルフィー"
# 「いったん休憩でどう？　トリシャさんも続けて占ったから疲れたでしょ」
line = "「いったん休憩でどう？　トリシャさんも続けて占ったから疲れたでしょ」"

[[dialogue]]
speaker = "トリシャ"
# 「いえ、疲れなど感じていませんが……」
line = "「いえ、疲れなど感じていませんが……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「嘘なの♪　占いはすっごく疲れるの。映画でもへとへとになってたゆ～♪」
line = "「嘘なの♪　占いはすっごく疲れるの。映画でもへとへとになってたゆ～♪」"

[[dialogue]]
speaker = "舞亜"
# 「確かにね。本気で占うと精神力が削られるっていうか」
line = "「確かにね。本気で占うと精神力が削られるっていうか」"

[[dialogue]]
speaker = "ソフィア"
# 「トリシャさんなら星力が消耗しているはずです」
line = "「トリシャさんなら星力が消耗しているはずです」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「星力が足りないならお菓子を食べるゆ♪　甘いもので回復するゆ～♪」
line = "「星力が足りないならお菓子を食べるゆ♪　甘いもので回復するゆ～♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ちょっ、あたしのケーキ取るな～」
line = "「ちょっ、あたしのケーキ取るな～」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆっゆっゆ♪　食べすぎはよくないって言われたばかりなの。占いの結果はちゃんと聞くゆ♪」
line = "「ゆっゆっゆ♪　食べすぎはよくないって言われたばかりなの。占いの結果はちゃんと聞くゆ♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「ぐぬぬぬぬ～、悔しいけど言い返せない……」
line = "「ぐぬぬぬぬ～、悔しいけど言い返せない……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ケーキおいしいの♪　そっちのプリンも食べたいの♪　お菓子全部よこすゆ～♪」
line = "「ケーキおいしいの♪　そっちのプリンも食べたいの♪　お菓子全部よこすゆ～♪」"

[[dialogue]]
speaker = "ミルフィー"
# 「っとと、トリシャさんのは取っちゃダメだよ。貴重な糖分なんだから」
line = "「っとと、トリシャさんのは取っちゃダメだよ。貴重な糖分なんだから」"

[[dialogue]]
speaker = "トリシャ"
# 「ミルフィーさん、優しいです……これがオトモダチ的配慮……」
line = "「ミルフィーさん、優しいです……これがオトモダチ的配慮……」"

[[dialogue]]
speaker = "ミルフィー"
# 「そんな大袈裟だよ。仲良しなんだから、これくらい普通だって」
line = "「そんな大袈裟だよ。仲良しなんだから、これくらい普通だって」"

[[dialogue]]
speaker = "舞亜"
# 「そうそう。ということで、はい、トリシャさん。私のもあげる」
line = "「そうそう。ということで、はい、トリシャさん。私のもあげる」"

[[dialogue]]
speaker = "トリシャ"
# 「い、いいのですか？」
line = "「い、いいのですか？」"

[[dialogue]]
speaker = "舞亜"
# 「うん。私も大会が近いし控えようかなって。それにミルフィーさんばっかりトリシャさんにあげてていいなーって思うし」
line = "「うん。私も大会が近いし控えようかなって。それにミルフィーさんばっかりトリシャさんにあげてていいなーって思うし」"

[[dialogue]]
speaker = "ソフィア"
# 「トリシャさんにとってミルフィーさんは特別かもしれませんけど、私たちもちょっとくらいは」
line = "「トリシャさんにとってミルフィーさんは特別かもしれませんけど、私たちもちょっとくらいは」"

[[dialogue]]
speaker = "unk"
# トリシャさんにこの豆大福をあげます
line = "トリシャさんにこの豆大福をあげます"

[[dialogue]]
speaker = "unk"
# そういうことなら俺も
line = "そういうことなら俺も"

[[dialogue]]
speaker = "トリシャ"
# 「にへへ……こんなの夢みたい……」
line = "「にへへ……こんなの夢みたい……」"

[[dialogue]]
speaker = "舞亜"
# 「これを機にトリシャさんをどんどん甘やかそう」
line = "「これを機にトリシャさんをどんどん甘やかそう」"

[[dialogue]]
speaker = "ソフィア"
# 「仲良しだよって言ってもなかなか信じてもらえないしね」
line = "「仲良しだよって言ってもなかなか信じてもらえないしね」"

[[dialogue]]
speaker = "ミルフィー"
# 「トリシャさんってばちょっと頑固なとこあるから。私とオトモダチになってくれるまで少し時間かかったし」
line = "「トリシャさんってばちょっと頑固なとこあるから。私とオトモダチになってくれるまで少し時間かかったし」"

[[dialogue]]
speaker = "トリシャ"
# 「それは……その……ごめんなさい……」
line = "「それは……その……ごめんなさい……」"

[[dialogue]]
speaker = "ウズメイア"
# 「けど、なんだかんだでこうして受け入れてくれたよね～。それってやっぱり会長くんのおかげ？」
line = "「けど、なんだかんだでこうして受け入れてくれたよね～。それってやっぱり会長くんのおかげ？」"

[[dialogue]]
speaker = "unk"
# 何もした覚えないんだけど
line = "何もした覚えないんだけど"

[[dialogue]]
speaker = "unk"
# お、俺！？
line = "お、俺！？"

[[dialogue]]
speaker = "ウズメイア"
# 「またまた～、いつのまにか告白して、彼女にしちゃったくせに」
line = "「またまた～、いつのまにか告白して、彼女にしちゃったくせに」"

[[dialogue]]
speaker = "ミルフィー"
# 「オトモダチよりも彼氏のほうがずっとハードル高いよね」
line = "「オトモダチよりも彼氏のほうがずっとハードル高いよね」"

[[dialogue]]
speaker = "舞亜"
# 「会長さんの彼女になる、なんて高難易度をクリアしてたら、友達付き合いくらい余裕でしょ」
line = "「会長さんの彼女になる、なんて高難易度をクリアしてたら、友達付き合いくらい余裕でしょ」"

[[dialogue]]
speaker = "ソフィア"
# 「実際、トリシャさんは以前よりだいぶ話しやすくなったように感じます」
line = "「実際、トリシャさんは以前よりだいぶ話しやすくなったように感じます」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……皆さんの心遣いの賜物だと思いますが……努力の結果もいくらか影響しているでしょうね……」
line = "「フフフ……皆さんの心遣いの賜物だと思いますが……努力の結果もいくらか影響しているでしょうね……」"

[[dialogue]]
speaker = "ミルフィー"
# 「ほんと、トリシャさんの周りに人が増えたよね。うんうん、オトモダチのよさがみんなにも伝わってるみたいで嬉しいよ」
line = "「ほんと、トリシャさんの周りに人が増えたよね。うんうん、オトモダチのよさがみんなにも伝わってるみたいで嬉しいよ」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……気がつけば、お菓子が山積みになってしまいました……にへへ……本当に皆さん優しいです……」
line = "「フフフ……気がつけば、お菓子が山積みになってしまいました……にへへ……本当に皆さん優しいです……」"

[[dialogue]]
speaker = "トリシャ"
# 「半分くらいジャクリーヌさんに持って行かれた気もしますが、それでもこんなに残りました……」
line = "「半分くらいジャクリーヌさんに持って行かれた気もしますが、それでもこんなに残りました……」"

[[dialogue]]
speaker = "トリシャ"
# 「私は人付き合いが苦手なままで……何も変わっていないというのに……」
line = "「私は人付き合いが苦手なままで……何も変わっていないというのに……」"

[[dialogue]]
speaker = "unk"
# いい笑顔を見せるようになった
line = "いい笑顔を見せるようになった"

[[dialogue]]
speaker = "unk"
# トリシャさんは変わったよ
line = "トリシャさんは変わったよ"

[[dialogue]]
speaker = "トリシャ"
# 「そう、でしょうか……？　自分ではよくわかりません……」
line = "「そう、でしょうか……？　自分ではよくわかりません……」"

[[dialogue]]
speaker = "トリシャ"
# 「ただ……会長さんと知り合って……まるで星々が繋がり星座を成すように、人々が集い始めたように感じます……」
line = "「ただ……会長さんと知り合って……まるで星々が繋がり星座を成すように、人々が集い始めたように感じます……」"

[[dialogue]]
speaker = "トリシャ"
# 「ですから……会長さんのおかげ？　フフフ……」
line = "「ですから……会長さんのおかげ？　フフフ……」"

[[dialogue]]
speaker = "トリシャ"
# 「たとえそうだったとしても……オトモダチが増えたのはとても嬉しいです……」
line = "「たとえそうだったとしても……オトモダチが増えたのはとても嬉しいです……」"

[[dialogue]]
speaker = "トリシャ"
# 「今までに感じたことのない気持ち……私は幸せです……」
line = "「今までに感じたことのない気持ち……私は幸せです……」"

[[dialogue]]
speaker = "トリシャ"
# 「フフフ……」
line = "「フフフ……」"

[[dialogue]]
speaker = "unk"
# いつもの意味深な笑みの中に、隠しきれない喜びを滲ませるトリシャさんだった。
line = "いつもの意味深な笑みの中に、隠しきれない喜びを滲ませるトリシャさんだった。"
