[[dialogue]]
speaker = "ナナカ"
# 「ティンクル☆くるせいだーすコラボ第二弾──」
line = "「ティンクル☆くるせいだーすコラボ第二弾──」"

[[dialogue]]
speaker = "ロロット"
# 「始まりました～～♪」
line = "「始まりました～～♪」"

[[dialogue]]
speaker = "ロロット"
# 「というわけで早速、会計さんが副会長さんみたいにベッコボコにされる討伐イベントが開催です☆」
line = "「というわけで早速、会計さんが副会長さんみたいにベッコボコにされる討伐イベントが開催です☆」"

[[dialogue]]
speaker = "ナナカ"
# 「え？　アタシじゃなくてロロちゃんがメッタメタにされるって聞いてるけど？」
line = "「え？　アタシじゃなくてロロちゃんがメッタメタにされるって聞いてるけど？」"

[[dialogue]]
speaker = "パッキー"
# 「まったく適当だなぁ、お前らは。今回『ドドドドド、ボゴゴゴゴ、グワッシャン！』ってされるのは天使が持ってるその貯金箱だぜ」
line = "「まったく適当だなぁ、お前らは。今回『ドドドドド、ボゴゴゴゴ、グワッシャン！』ってされるのは天使が持ってるその貯金箱だぜ」"

[[dialogue]]
speaker = "ロロット"
# 「ええっ、トントロが！？　って、天使じゃありませーん！」
line = "「ええっ、トントロが！？　って、天使じゃありませーん！」"

[[dialogue]]
speaker = "ナナカ"
# 「クルスタ世界じゃ種族をあんまり隠す意味もないみたいだし、そろそろこのネタ擦らなくてもいいんじゃない？」
line = "「クルスタ世界じゃ種族をあんまり隠す意味もないみたいだし、そろそろこのネタ擦らなくてもいいんじゃない？」"

[[dialogue]]
speaker = "パッキー"
# 「てなわけで、コラボイベントスペシャルバトル――」
line = "「てなわけで、コラボイベントスペシャルバトル――」"

[[dialogue]]
speaker = "ロロット"
# 「はじまりはじまり～～♪」
line = "「はじまりはじまり～～♪」"
