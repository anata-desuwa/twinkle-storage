[[dialogue]]
speaker = "モンスター"
# 「イ～～～～……」
line = "「イ～～～～……」"

[[dialogue]]
speaker = "カティア"
# 「ふぅ……ようやくモンスターから解放された……」
line = "「ふぅ……ようやくモンスターから解放された……」"

[[dialogue]]
speaker = "イングリット"
# 「あの程度の雑魚共なら、助けなど不要だったのだがな」
line = "「あの程度の雑魚共なら、助けなど不要だったのだがな」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ええ、イングリット様なら余裕でしょうけど、あのまま見過ごすわけにもいきませんでしたので」
line = "「ええ、イングリット様なら余裕でしょうけど、あのまま見過ごすわけにもいきませんでしたので」"

[[dialogue]]
speaker = "イングリット"
# 「フン」
line = "「フン」"

[[dialogue]]
speaker = "マリーベル"
# 「それより、あなたが星騎士を襲ってセレスティアを奪った犯人なの？」
line = "「それより、あなたが星騎士を襲ってセレスティアを奪った犯人なの？」"

[[dialogue]]
speaker = "イングリット"
# 「そうだ。何か問題でも？」
line = "「そうだ。何か問題でも？」"

[[dialogue]]
speaker = "マリーベル"
# 「問題あるに決まってるじゃない。あれがないと星騎士は変身できないんだから」
line = "「問題あるに決まってるじゃない。あれがないと星騎士は変身できないんだから」"

[[dialogue]]
speaker = "イングリット"
# 「弱者があんなものを持っていてもしょうがないだろう。だから、勲章代わりに奪ってやったまでだ」
line = "「弱者があんなものを持っていてもしょうがないだろう。だから、勲章代わりに奪ってやったまでだ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「セレスティアを奪うのは、コラプサーの任務でございませんわ……なので完全にイングリット様の趣味でございますわね」
line = "「セレスティアを奪うのは、コラプサーの任務でございませんわ……なので完全にイングリット様の趣味でございますわね」"

[[dialogue]]
speaker = "マリーベル"
# 「本当に悪趣味ね……」
line = "「本当に悪趣味ね……」"

[[dialogue]]
speaker = "ジュリエッテ"
# （イングリット様、星騎士から星力を集めるという任務を忘れていらっしゃいますわね……。やはり三歩歩けば忘れる戦闘バカでございますわ）
line = "（イングリット様、星騎士から星力を集めるという任務を忘れていらっしゃいますわね……。やはり三歩歩けば忘れる戦闘バカでございますわ）"

[[dialogue]]
speaker = "ジュリエッテ"
# （まぁ、バカならバカなりに利用させていただきましょう。せいぜいわたくしの役に立つがいいでございますわ！）
line = "（まぁ、バカならバカなりに利用させていただきましょう。せいぜいわたくしの役に立つがいいでございますわ！）"

[[dialogue]]
speaker = "unk"
# セレスティアを返してくれないか？
line = "セレスティアを返してくれないか？"

[[dialogue]]
speaker = "イングリット"
# 「いいだろう、返してやる。──無論、タダではないがな」
line = "「いいだろう、返してやる。──無論、タダではないがな」"

[[dialogue]]
speaker = "イングリット"
# 「私が望むものはただひとつ。強者との血沸き肉躍る戦いだ」
line = "「私が望むものはただひとつ。強者との血沸き肉躍る戦いだ」"

[[dialogue]]
speaker = "マリーベル"
# 「……やはり戦闘は避けられないようね」
line = "「……やはり戦闘は避けられないようね」"

[[dialogue]]
speaker = "イングリット"
# 「魔王、私と一踊りしてもらおうか！」
line = "「魔王、私と一踊りしてもらおうか！」"

[[dialogue]]
speaker = "イングリット"
# 「ほう、この一撃を避けたか」
line = "「ほう、この一撃を避けたか」"

[[dialogue]]
speaker = "カティア"
# 「いきなり攻撃するなんて卑怯だワン……！！」
line = "「いきなり攻撃するなんて卑怯だワン……！！」"

[[dialogue]]
speaker = "イングリット"
# 「なに、魔王の強さを推し量ったまでだ。くく、期待通りの強さのようだな」
line = "「なに、魔王の強さを推し量ったまでだ。くく、期待通りの強さのようだな」"

[[dialogue]]
speaker = "イングリット"
# 「おっと、貴様らは動くなよ？　私は魔王と戦うために来たんだからな」
line = "「おっと、貴様らは動くなよ？　私は魔王と戦うために来たんだからな」"

[[dialogue]]
speaker = "unk"
# 大丈夫。任せて
line = "大丈夫。任せて"

[[dialogue]]
speaker = "マリーベル"
# 「……わかった。信じるわよ」
line = "「……わかった。信じるわよ」"

[[dialogue]]
speaker = "イングリット"
# 「さあ魔王、存分に殺し合おうじゃないか！」
line = "「さあ魔王、存分に殺し合おうじゃないか！」"

[[dialogue]]
speaker = "カティア"
# 「はわわ……！　攻撃が早すぎて目で追えません……！」
line = "「はわわ……！　攻撃が早すぎて目で追えません……！」"

[[dialogue]]
speaker = "マリーベル"
# 「でもさすがは会長さんね、紙一重で回避してるわ」
line = "「でもさすがは会長さんね、紙一重で回避してるわ」"

[[dialogue]]
speaker = "イングリット"
# 「だが逃げてばかりでは私を倒すことは出来ないぞ……！」
line = "「だが逃げてばかりでは私を倒すことは出来ないぞ……！」"

[[dialogue]]
speaker = "イングリット"
# 「くっ……！　カウンターとは中々やるじゃないか！」
line = "「くっ……！　カウンターとは中々やるじゃないか！」"

[[dialogue]]
speaker = "カティア"
# 「魔王様の攻撃が通った！」
line = "「魔王様の攻撃が通った！」"

[[dialogue]]
speaker = "マリーベル"
# 「でも違和感があるわ。会長さんがいくら強くても、あんなに簡単にダメージが通るかしら？」
line = "「でも違和感があるわ。会長さんがいくら強くても、あんなに簡単にダメージが通るかしら？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「そうでございますわね……きっとイングリット様は手加減して戦っていらっしゃいますわ」
line = "「そうでございますわね……きっとイングリット様は手加減して戦っていらっしゃいますわ」"

[[dialogue]]
speaker = "unk"
# コラプサーの力を使っていない……？
line = "コラプサーの力を使っていない……？"

[[dialogue]]
speaker = "イングリット"
# 「そうだ、私はまだコラプサーの力を使っていない。全力を出すに値するか、貴様を試しているのだ」
line = "「そうだ、私はまだコラプサーの力を使っていない。全力を出すに値するか、貴様を試しているのだ」"

[[dialogue]]
speaker = "カティア"
# 「んな……！？　魔王様に舐めプとか無礼なやつだワン！」
line = "「んな……！？　魔王様に舐めプとか無礼なやつだワン！」"

[[dialogue]]
speaker = "マリーベル"
# 「……とんだ自信家ね」
line = "「……とんだ自信家ね」"

[[dialogue]]
speaker = "イングリット"
# 「それに本気を出していないのは、私だけじゃないだろ？　なあ、魔王よ」
line = "「それに本気を出していないのは、私だけじゃないだろ？　なあ、魔王よ」"

[[dialogue]]
speaker = "unk"
# ……俺は本気で戦っている
line = "……俺は本気で戦っている"

[[dialogue]]
speaker = "イングリット"
# 「だがそれは、魔王の力抜きでの全力だろう？　魔王の力はもっと圧倒的で無慈悲なはずだ。貴様が本物の魔王ならば、私にその力を示してみろ！」
line = "「だがそれは、魔王の力抜きでの全力だろう？　魔王の力はもっと圧倒的で無慈悲なはずだ。貴様が本物の魔王ならば、私にその力を示してみろ！」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「イングリット様がギアを上げましたわね……並の星騎士では、一太刀で瞬殺でございますわ」
line = "「イングリット様がギアを上げましたわね……並の星騎士では、一太刀で瞬殺でございますわ」"

[[dialogue]]
speaker = "ジュリエッテ"
# （ふむ、どうやら魔王の力は十全には使えないご様子。ムフフ……それがわかっただけでも、イングリット様にしては上出来でございますわ）
line = "（ふむ、どうやら魔王の力は十全には使えないご様子。ムフフ……それがわかっただけでも、イングリット様にしては上出来でございますわ）"

[[dialogue]]
speaker = "カティア"
# 「魔王様は普通の星騎士とは違うワン！　魔王様頑張って！！」
line = "「魔王様は普通の星騎士とは違うワン！　魔王様頑張って！！」"

[[dialogue]]
speaker = "イングリット"
# 「さあさあさあ！　魔王の力を見せろ！　私をもっと楽しませろ！」
line = "「さあさあさあ！　魔王の力を見せろ！　私をもっと楽しませろ！」"

[[dialogue]]
speaker = "unk"
# セレスティアは……返してもらう！
line = "セレスティアは……返してもらう！"

[[dialogue]]
speaker = "カティア"
# 「──！？　攻撃がぶつかり合って……どっちが勝ったんですか！？」
line = "「──！？　攻撃がぶつかり合って……どっちが勝ったんですか！？」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「く……目が眩んで見えませんわ」
line = "「く……目が眩んで見えませんわ」"

[[dialogue]]
speaker = "イングリット"
# 「く……」
line = "「く……」"

[[dialogue]]
speaker = "カティア"
# 「やった！　魔王様の勝利です！」
line = "「やった！　魔王様の勝利です！」"

[[dialogue]]
speaker = "イングリット"
# 「ふふ……そうこなくてはな。これでようやく本気を出せるというものだ！」
line = "「ふふ……そうこなくてはな。これでようやく本気を出せるというものだ！」"

[[dialogue]]
speaker = "マリーベル"
# 「まぁそうなるわよね。私も戦うわ」
line = "「まぁそうなるわよね。私も戦うわ」"

[[dialogue]]
speaker = "カティア"
# 「魔王様、私にも手伝わせてください！」
line = "「魔王様、私にも手伝わせてください！」"

[[dialogue]]
speaker = "イングリット"
# 「失せろ。私は魔王との戦いを楽しみたいんだ」
line = "「失せろ。私は魔王との戦いを楽しみたいんだ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「いいではございませんか、イングリット様」
line = "「いいではございませんか、イングリット様」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「彼女たちはプリマステラではございません。プリマステラでもないザコがいくら増えたところで何も変わらないのでは？」
line = "「彼女たちはプリマステラではございません。プリマステラでもないザコがいくら増えたところで何も変わらないのでは？」"

[[dialogue]]
speaker = "イングリット"
# 「それもそうか。ジュリエッテ、貴様は手を出すなよ」
line = "「それもそうか。ジュリエッテ、貴様は手を出すなよ」"

[[dialogue]]
speaker = "ジュリエッテ"
# 「ええ、言われずとも」
line = "「ええ、言われずとも」"

[[dialogue]]
speaker = "ジュリエッテ"
# （クックック……ざまーみろでございますの！　わたくしに迷惑をかけた分、ボコボコにされちまえですわ！）
line = "（クックック……ざまーみろでございますの！　わたくしに迷惑をかけた分、ボコボコにされちまえですわ！）"

[[dialogue]]
speaker = "イングリット"
# 「よし、貴様たちもかかってこい。まとめて葬り去ってやる！」
line = "「よし、貴様たちもかかってこい。まとめて葬り去ってやる！」"
