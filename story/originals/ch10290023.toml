[[dialogue]]
speaker = "unk"
# 第３話,わからせリバーシ,P
line = "第３話,わからせリバーシ,P"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ねえ会長さん。せっかくの休日ですし、何かゲームでもしません？」
line = "「ねえ会長さん。せっかくの休日ですし、何かゲームでもしません？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「私、人間界に来てからチェスを覚えたんです。けっこう自信があるんですよ」
line = "「私、人間界に来てからチェスを覚えたんです。けっこう自信があるんですよ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ちょうどお部屋に遊戯盤みたいなものがありますし……ふぅん、あれは将棋っていうの？　盤面は似てるけど、違うゲームなのね」
line = "「ちょうどお部屋に遊戯盤みたいなものがありますし……ふぅん、あれは将棋っていうの？　盤面は似てるけど、違うゲームなのね」"

[[dialogue]]
speaker = "unk"
# ルールブックをどうぞ
line = "ルールブックをどうぞ"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ゲーム性はチェスと似ているけれど……ちょっとルールが気に食わないわね」
line = "「ゲーム性はチェスと似ているけれど……ちょっとルールが気に食わないわね」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「取った相手の駒は、自分の駒として使える……奥深さは出るみたいだけど、手下が寝返るのはちょっと気分が良くないかも」
line = "「取った相手の駒は、自分の駒として使える……奥深さは出るみたいだけど、手下が寝返るのはちょっと気分が良くないかも」"

[[dialogue]]
speaker = "unk"
# だったらこのゲームはどう？
line = "だったらこのゲームはどう？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「リバーシ……？　黒石と白石に別れて交互に打つ。相手の駒を挟むと裏返って自分の色になる。最終的に数が多い方が勝ち……？」
line = "「リバーシ……？　黒石と白石に別れて交互に打つ。相手の駒を挟むと裏返って自分の色になる。最終的に数が多い方が勝ち……？」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「シンプルですが面白そうですね。魔界にも似たようなボードゲームがありますから、ハンデはいらないですよ」
line = "「シンプルですが面白そうですね。魔界にも似たようなボードゲームがありますから、ハンデはいらないですよ」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あっ、どうせなら罰ゲームもします？　……そうですね。負けた方が１枚ずつ服を脱ぐ、なんてのはどうでしょうか♪」
line = "「あっ、どうせなら罰ゲームもします？　……そうですね。負けた方が１枚ずつ服を脱ぐ、なんてのはどうでしょうか♪」"

[[dialogue]]
speaker = "unk"
# シャルレーヌはこのゲーム初めてなんだから
line = "シャルレーヌはこのゲーム初めてなんだから"

[[dialogue]]
speaker = "unk"
# そ、それはまずいよ！
line = "そ、それはまずいよ！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くふふ<emoji=heart04>　もしかして私が負ける心配してくれてるんですか～？」
line = "「くふふ<emoji=heart04>　もしかして私が負ける心配してくれてるんですか～？」"

[[dialogue]]
speaker = "unk"
# 初心者じゃ経験者には勝てないぞ！
line = "初心者じゃ経験者には勝てないぞ！"

[[dialogue]]
speaker = "unk"
# どんなゲームにも定石があるんだよ
line = "どんなゲームにも定石があるんだよ"

[[dialogue]]
speaker = "シャルレーヌ"
# 「まあ……♪　会長さんってやっぱり紳士ですよね。素敵です<emoji=heart04>」
line = "「まあ……♪　会長さんってやっぱり紳士ですよね。素敵です<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「でもゲームは強い人とやらないとコツを覚えられないでしょうし……」
line = "「でもゲームは強い人とやらないとコツを覚えられないでしょうし……」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「賭けるものがあった方が真剣になれます。会長さんの御心配は嬉しいですが、ぜひ挑ませてください♪」
line = "「賭けるものがあった方が真剣になれます。会長さんの御心配は嬉しいですが、ぜひ挑ませてください♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ……言っておきますけど、手加減はしないでくださいね？　私、そういうの一番嫌いなんで」
line = "「あ……言っておきますけど、手加減はしないでくださいね？　私、そういうの一番嫌いなんで」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「大丈夫です。もし裸にされちゃっても、会長さんに恨み言をいったりしませんから♪　全部私の自己責任です」
line = "「大丈夫です。もし裸にされちゃっても、会長さんに恨み言をいったりしませんから♪　全部私の自己責任です」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「……くふ<emoji=heart04>　さっきから私が負ける心配ばっかり……こういう時くらい、日頃のお返しをすればいいのに」
line = "「……くふ<emoji=heart04>　さっきから私が負ける心配ばっかり……こういう時くらい、日頃のお返しをすればいいのに」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「やってみたくないですか～？　クソ生意気な後輩をボッコボコに負かせて、恥ずかしい思いまでさせられるチャンスですよ～？」
line = "「やってみたくないですか～？　クソ生意気な後輩をボッコボコに負かせて、恥ずかしい思いまでさせられるチャンスですよ～？」"

[[dialogue]]
speaker = "unk"
# ……後悔しても知らないぞ？
line = "……後悔しても知らないぞ？"

[[dialogue]]
speaker = "シャルレーヌ"
# 「は～い<emoji=heart04>　それでは……ゲームスタートですっ♪」
line = "「は～い<emoji=heart04>　それでは……ゲームスタートですっ♪」"

[[dialogue]]
speaker = "unk"
# ──数時間後。
line = "──数時間後。"

[[dialogue]]
speaker = "シャルレーヌ"
# 「は～い、シャルレーヌの勝ちぃ～<emoji=heart04>　会長さん、ほ～ら、シャツを脱げっ<emoji=heart04>　脱～げっ<emoji=heart04>」
line = "「は～い、シャルレーヌの勝ちぃ～<emoji=heart04>　会長さん、ほ～ら、シャツを脱げっ<emoji=heart04>　脱～げっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「キャハハハっ<emoji=heart04>　おパンツだけになっちゃいましたね～。何だかプルプル震えて寒そう～♪」
line = "「キャハハハっ<emoji=heart04>　おパンツだけになっちゃいましたね～。何だかプルプル震えて寒そう～♪」"

[[dialogue]]
speaker = "unk"
# リバーシには自信があったのに……！
line = "リバーシには自信があったのに……！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「自信があったって～……くふふ<emoji=heart04>　今までざこ狩りばっかりしてたんじゃないんですかあ？　井の中の<ruby=かわず>蛙</ruby>～<emoji=heart04>　ざこガエル～<emoji=heart04>」
line = "「自信があったって～……くふふ<emoji=heart04>　今までざこ狩りばっかりしてたんじゃないんですかあ？　井の中の<ruby>蛙<rt>かわず</rt></ruby>～<emoji=heart04>　ざこガエル～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「あ～あ。せめて靴下くらいは脱がせて欲しかったな～？　会長さんばっかり脱いでつまんな～い<emoji=heart04>」
line = "「あ～あ。せめて靴下くらいは脱がせて欲しかったな～？　会長さんばっかり脱いでつまんな～い<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 次こそは勝つ！　わからせてやる！
line = "次こそは勝つ！　わからせてやる！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「は～い、じゃあラストゲームですね～」
line = "「は～い、じゃあラストゲームですね～」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「ぱち……ぱち……ぱち……♪　くふふ、やっぱりそこに打ちましたね？　かかったなアホが<emoji=heart04>　食らえっ<emoji=heart04>」
line = "「ぱち……ぱち……ぱち……♪　くふふ、やっぱりそこに打ちましたね？　かかったなアホが<emoji=heart04>　食らえっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ──うわああああああああああああ！！！
line = "──うわああああああああああああ！！！"

[[dialogue]]
speaker = "シャルレーヌ"
# 「くすくす。リバーシのルールの中に、すっごく好みの一文があったんですよね～」
line = "「くすくす。リバーシのルールの中に、すっごく好みの一文があったんですよね～」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「どこにも石を打てない時はパスできる。でも、打てる場所がある時は『必ず打たないといけない』<emoji=heart04>」
line = "「どこにも石を打てない時はパスできる。でも、打てる場所がある時は『必ず打たないといけない』<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「相手をコントロールしてる感じがたまらないです♪　ほおら、倍返しされるのわかってるけど～、そこに石を置け<emoji=heart04>　ざ～こっ<emoji=heart04>」
line = "「相手をコントロールしてる感じがたまらないです♪　ほおら、倍返しされるのわかってるけど～、そこに石を置け<emoji=heart04>　ざ～こっ<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「は～い、私の勝ちで～す<emoji=heart04>　でもおパンツだけは勘弁してあげましょうか♪」
line = "「は～い、私の勝ちで～す<emoji=heart04>　でもおパンツだけは勘弁してあげましょうか♪」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「会長さん、代わりに正座して？　それで『シャルレーヌ様には勝てません』って紙に書いて、紐を付けて首にぶら下げて～<emoji=heart04>」
line = "「会長さん、代わりに正座して？　それで『シャルレーヌ様には勝てません』って紙に書いて、紐を付けて首にぶら下げて～<emoji=heart04>」"

[[dialogue]]
speaker = "シャルレーヌ"
# 「キャハハハハっ<emoji=heart04>　とってもお似合いですよ～、可愛すぎます、会長さんっ<emoji=heart04>」
line = "「キャハハハハっ<emoji=heart04>　とってもお似合いですよ～、可愛すぎます、会長さんっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 結局その後、服を着てからも、俺はシャルレーヌに勝つことはできず、徹底的にわからせられてしまうのだった……
line = "結局その後、服を着てからも、俺はシャルレーヌに勝つことはできず、徹底的にわからせられてしまうのだった……"
