[[dialogue]]
speaker = "unk"
# 第２話,可愛すぎる後輩,P
line = "第２話,可愛すぎる後輩,P"

[[dialogue]]
speaker = "unk"
# ２度目の告白から数週間が経ったある休日。俺はリーリアと２人で、リゾート結界へデートしに来ていた。
line = "２度目の告白から数週間が経ったある休日。俺はリーリアと２人で、リゾート結界へデートしに来ていた。"

[[dialogue]]
speaker = "unk"
# ちなみに、星徒会室から繋がる、他に誰もいないプライベートビーチの方である。
line = "ちなみに、星徒会室から繋がる、他に誰もいないプライベートビーチの方である。"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ、今日は１日、２人きりですね……センパイ<emoji=heart04>」
line = "「ふふっ、今日は１日、２人きりですね……センパイ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアの水着、今日もすごく可愛いよ
line = "リーリアの水着、今日もすごく可愛いよ"

[[dialogue]]
speaker = "リーリア"
# 「えへへ……ありがとうございます<emoji=heart04>」
line = "「えへへ……ありがとうございます<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「でも本当は……私のスタイルがもっと良かったら、センパイの前でも堂々としていられたんですけど……」
line = "「でも本当は……私のスタイルがもっと良かったら、センパイの前でも堂々としていられたんですけど……」"

[[dialogue]]
speaker = "unk"
# そう言って、上に着たＴシャツの裾をぐいっと掴むリーリア。
line = "そう言って、上に着たＴシャツの裾をぐいっと掴むリーリア。"

[[dialogue]]
speaker = "unk"
# 彼女には身体的コンプレックスがある。それは、バストの大きさだ。
line = "彼女には身体的コンプレックスがある。それは、バストの大きさだ。"

[[dialogue]]
speaker = "unk"
# Ｔシャツには幻影魔法がかけてあるそうで、本当は今確認できる見た目ほど、胸のサイズは大きくない。
line = "Ｔシャツには幻影魔法がかけてあるそうで、本当は今確認できる見た目ほど、胸のサイズは大きくない。"

[[dialogue]]
speaker = "リーリア"
# 「――この前２度目の告白をしてから、今まで以上に気にしてるように見える？　だって……」
line = "「――この前２度目の告白をしてから、今まで以上に気にしてるように見える？　だって……」"

[[dialogue]]
speaker = "リーリア"
# 「センパイには、彼女として魅力的だと思ってもらいたいですから……」
line = "「センパイには、彼女として魅力的だと思ってもらいたいですから……」"

[[dialogue]]
speaker = "unk"
# １度も思ったことないぞ
line = "１度も思ったことないぞ"

[[dialogue]]
speaker = "unk"
# 俺は、リーリアのスタイルが悪いだなんて
line = "俺は、リーリアのスタイルが悪いだなんて"

[[dialogue]]
speaker = "unk"
# ――今のままのリーリアが、心から可愛いと思ってる。だから、気にしなくていい。……いや、違う。
line = "――今のままのリーリアが、心から可愛いと思ってる。だから、気にしなくていい。……いや、違う。"

[[dialogue]]
speaker = "リーリア"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# そのままで最高に可愛い！！
line = "そのままで最高に可愛い！！"

[[dialogue]]
speaker = "unk"
# 俺は今のリーリアの胸が好きだ！
line = "俺は今のリーリアの胸が好きだ！"

[[dialogue]]
speaker = "リーリア"
# 「せ、センパイ……そんな堂々と……！？」
line = "「せ、センパイ……そんな堂々と……！？」"

[[dialogue]]
speaker = "リーリア"
# 「――言葉を選んでいるから、不安にさせちゃう？　だから、はっきりと言うことにした？」
line = "「――言葉を選んでいるから、不安にさせちゃう？　だから、はっきりと言うことにした？」"

[[dialogue]]
speaker = "リーリア"
# 「なんですか……それ。ふふっ……でも――」
line = "「なんですか……それ。ふふっ……でも――」"

[[dialogue]]
speaker = "リーリア"
# 「えへへ<emoji=heart04>　ありがとうございます、センパイ。嬉しいです……<emoji=heart04>」
line = "「えへへ<emoji=heart04>　ありがとうございます、センパイ。嬉しいです……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「センパイのそういうストレートにぶつかって来るところ、男らしくてカッコよくて……私、大好きです<emoji=heart04>」
line = "「センパイのそういうストレートにぶつかって来るところ、男らしくてカッコよくて……私、大好きです<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女の紅潮した頬と潤んだ瞳に、俺は思わず、ドキッとしてしまう。
line = "彼女の紅潮した頬と潤んだ瞳に、俺は思わず、ドキッとしてしまう。"

[[dialogue]]
speaker = "unk"
# 素直に言うようになったよね。そういうこと
line = "素直に言うようになったよね。そういうこと"

[[dialogue]]
speaker = "unk"
# リーリアもストレートに……
line = "リーリアもストレートに……"

[[dialogue]]
speaker = "リーリア"
# 「ふふっ、これからはセンパイに自分のことを秘密にしないようにって、決めたので♪」
line = "「ふふっ、これからはセンパイに自分のことを秘密にしないようにって、決めたので♪」"

[[dialogue]]
speaker = "リーリア"
# 「気を取り直して、センパイ、海デートの定番――カップル追いかけっこをしましょう☆」
line = "「気を取り直して、センパイ、海デートの定番――カップル追いかけっこをしましょう☆」"

[[dialogue]]
speaker = "unk"
# か、カップル追いかけっこ……！？
line = "か、カップル追いかけっこ……！？"

[[dialogue]]
speaker = "リーリア"
# 「砂浜を走りながら～、私を捕まえて～♪　待て待て～♪　きゃっきゃうふふ<emoji=heart04>　――なやつです☆　前から１度やってみたかったんですよね～♪」
line = "「砂浜を走りながら～、私を捕まえて～♪　待て待て～♪　きゃっきゃうふふ<emoji=heart04>　――なやつです☆　前から１度やってみたかったんですよね～♪」"

[[dialogue]]
speaker = "リーリア"
# 「ちなみに、センパイが見事、私を捕まえたら、ご褒美をあげちゃいます♪」
line = "「ちなみに、センパイが見事、私を捕まえたら、ご褒美をあげちゃいます♪」"

[[dialogue]]
speaker = "リーリア"
# 「……あっ♪　ご褒美が何なのか気になっちゃう感じですか～？　ふふふっ……そ・れ・は～」
line = "「……あっ♪　ご褒美が何なのか気になっちゃう感じですか～？　ふふふっ……そ・れ・は～」"

[[dialogue]]
speaker = "unk"
# 彼女は俺に顔を近づけると、そっと耳元で囁く。
line = "彼女は俺に顔を近づけると、そっと耳元で囁く。"

[[dialogue]]
speaker = "リーリア"
# 「もちろん、恋人同士の……甘～い行為ですよ？」
line = "「もちろん、恋人同士の……甘～い行為ですよ？」"

[[dialogue]]
speaker = "リーリア"
# 「はい、センパイ<emoji=heart04>　あ～ん<emoji=heart04>」
line = "「はい、センパイ<emoji=heart04>　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言いながら、彼女は俺の口元に箸を差し出して、手作りのお弁当を食べさせてくれる。
line = "そう言いながら、彼女は俺の口元に箸を差し出して、手作りのお弁当を食べさせてくれる。"

[[dialogue]]
speaker = "unk"
# な、なるほど。これがご褒美か……あ～ん
line = "な、なるほど。これがご褒美か……あ～ん"

[[dialogue]]
speaker = "リーリア"
# 「どうですか？　一応、保存魔法がかけてあって、作りたての味だとは思うんですけど……」
line = "「どうですか？　一応、保存魔法がかけてあって、作りたての味だとは思うんですけど……」"

[[dialogue]]
speaker = "unk"
# うまい！　リーリアは料理も上手なんだな！
line = "うまい！　リーリアは料理も上手なんだな！"

[[dialogue]]
speaker = "リーリア"
# 「本当ですか？　やった♪　センパイに喜んでもらえて嬉しいです……えへへ<emoji=heart04>」
line = "「本当ですか？　やった♪　センパイに喜んでもらえて嬉しいです……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「今日の為に、練習した甲斐がありました。たくさん食べて下さいね、センパイ♪」
line = "「今日の為に、練習した甲斐がありました。たくさん食べて下さいね、センパイ♪」"

[[dialogue]]
speaker = "リーリア"
# 「はい、あ～ん<emoji=heart04>」
line = "「はい、あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それから海で水遊びもして、少し休憩しようという話になった。
line = "それから海で水遊びもして、少し休憩しようという話になった。"

[[dialogue]]
speaker = "unk"
# リーリアはビーチチェアーをくっ付けて、俺の腕に抱き着きながら寝っ転がる。
line = "リーリアはビーチチェアーをくっ付けて、俺の腕に抱き着きながら寝っ転がる。"

[[dialogue]]
speaker = "リーリア"
# 「ねぇ……センパイ<emoji=heart04>」
line = "「ねぇ……センパイ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女の潤んだ瞳と、甘えるような声に、俺はまたドキッとしてしまう。
line = "彼女の潤んだ瞳と、甘えるような声に、俺はまたドキッとしてしまう。"

[[dialogue]]
speaker = "リーリア"
# 「カップル追いかけっこの時なんですけど……本当は――」
line = "「カップル追いかけっこの時なんですけど……本当は――」"

[[dialogue]]
speaker = "リーリア"
# 「ご褒美、別のことを期待してたんじゃないですか……？」
line = "「ご褒美、別のことを期待してたんじゃないですか……？」"

[[dialogue]]
speaker = "unk"
# そ、それは……
line = "そ、それは……"

[[dialogue]]
speaker = "リーリア"
# 「センパイ、大好きです……<emoji=heart04>」
line = "「センパイ、大好きです……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はドキドキしながら、頷いて――
line = "俺はドキドキしながら、頷いて――"

[[dialogue]]
speaker = "unk"
# 俺も……好きだよ
line = "俺も……好きだよ"

[[dialogue]]
speaker = "リーリア"
# 「愛してます……<emoji=heart04>」
line = "「愛してます……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「だから、センパイ……デザートにリーリアをどうぞ<emoji=heart04>」
line = "「だから、センパイ……デザートにリーリアをどうぞ<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「ん……<emoji=heart04>」
line = "「ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女はそっと唇を近づけて、キスのおねだりをしてくる。俺はドキドキが限界に達して――
line = "彼女はそっと唇を近づけて、キスのおねだりをしてくる。俺はドキドキが限界に達して――"

[[dialogue]]
speaker = "unk"
# っ……！　ち、ちょっと泳いでくる～～っ！
line = "っ……！　ち、ちょっと泳いでくる～～っ！"

[[dialogue]]
speaker = "リーリア"
# 「へ！？　えっ……ちょっと、センパ～イ！？」
line = "「へ！？　えっ……ちょっと、センパ～イ！？」"

[[dialogue]]
speaker = "リーリア"
# 「い、今すごくいい雰囲気だったはずなのに……どういうこと～！？」
line = "「い、今すごくいい雰囲気だったはずなのに……どういうこと～！？」"

[[dialogue]]
speaker = "unk"
# 俺は海の家の近くまで走ってきていた。
line = "俺は海の家の近くまで走ってきていた。"

[[dialogue]]
speaker = "unk"
# あ、危なかった……
line = "あ、危なかった……"

[[dialogue]]
speaker = "unk"
# ここ最近、２度目の告白があってから――
line = "ここ最近、２度目の告白があってから――"

[[dialogue]]
speaker = "unk"
# 素直になったリーリアが可愛い過ぎて、俺は時々、好きという気持ちが暴走しかけていた。
line = "素直になったリーリアが可愛い過ぎて、俺は時々、好きという気持ちが暴走しかけていた。"

[[dialogue]]
speaker = "unk"
# 先程、あのままキスをしていたら……俺はおそらく、それだけでは済まなくなっていただろう。
line = "先程、あのままキスをしていたら……俺はおそらく、それだけでは済まなくなっていただろう。"

[[dialogue]]
speaker = "unk"
# ――せっかくリーリアが素直に好意を見せてくれるようになったのだ。
line = "――せっかくリーリアが素直に好意を見せてくれるようになったのだ。"

[[dialogue]]
speaker = "unk"
# だから……これからはもっと、彼女のことを大切にしたい。
line = "だから……これからはもっと、彼女のことを大切にしたい。"

[[dialogue]]
speaker = "unk"
# 俺は近くの海に入りながら、頭を冷やすのだった――
line = "俺は近くの海に入りながら、頭を冷やすのだった――"
