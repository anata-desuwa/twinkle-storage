[[dialogue]]
speaker = "unk"
# 第２話,水着フォーム対決,P
line = "第２話,水着フォーム対決,P"

[[dialogue]]
speaker = "アム"
# 「待ってたよ、ついにエルゼも水着フォームを手に入れたみたいだね」
line = "「待ってたよ、ついにエルゼも水着フォームを手に入れたみたいだね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ええ、『流星附属最強の槍と盾』、どちらが強いかいよいよ決着がつきますわ」
line = "「ええ、『流星附属最強の槍と盾』、どちらが強いかいよいよ決着がつきますわ」"

[[dialogue]]
speaker = "unk"
# プライベートビーチを借りて、エルゼとアムの名物対決が始まる。
line = "プライベートビーチを借りて、エルゼとアムの名物対決が始まる。"

[[dialogue]]
speaker = "unk"
# アムはエルゼよりも先に水着フォームを手に入れていた。
line = "アムはエルゼよりも先に水着フォームを手に入れていた。"

[[dialogue]]
speaker = "unk"
# だが、今回エルゼが水着フォームを手に入れたことで対等の条件で勝負が出来る。
line = "だが、今回エルゼが水着フォームを手に入れたことで対等の条件で勝負が出来る。"

[[dialogue]]
speaker = "unk"
# これはエルゼもアムも、両者が待ち望んでいたことだろう。
line = "これはエルゼもアムも、両者が待ち望んでいたことだろう。"

[[dialogue]]
speaker = "unk"
# ……って、２人ともスク水なのね？
line = "……って、２人ともスク水なのね？"

[[dialogue]]
speaker = "アム"
# 「そうだけど何か？」
line = "「そうだけど何か？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「学生にとって制服が正装。すなわちスクール水着は正装なのですわ」
line = "「学生にとって制服が正装。すなわちスクール水着は正装なのですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「このフォームに変身すると、身も心も引き締まる思いです……アムもそうですわよね？」
line = "「このフォームに変身すると、身も心も引き締まる思いです……アムもそうですわよね？」"

[[dialogue]]
speaker = "アム"
# 「うん、全く同感だよ！」
line = "「うん、全く同感だよ！」"

[[dialogue]]
speaker = "unk"
# しっかり意見は合っている様子だ。
line = "しっかり意見は合っている様子だ。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ですが……アム、少々引っ掛かっていることがあるんですの」
line = "「ですが……アム、少々引っ掛かっていることがあるんですの」"

[[dialogue]]
speaker = "アム"
# 「引っ掛かってること？　何なの、それは？」
line = "「引っ掛かってること？　何なの、それは？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私、ヘレナ様よりこの戦闘服を頂いたことが嬉しくて、寮のお友達にお披露目して回ったんですわ」
line = "「私、ヘレナ様よりこの戦闘服を頂いたことが嬉しくて、寮のお友達にお披露目して回ったんですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そうしたら、大勢の方が会長様と同じような反応をしましたの」
line = "「そうしたら、大勢の方が会長様と同じような反応をしましたの」"

[[dialogue]]
speaker = "アム"
# 「そう言えば、あたしも似たような経験をした気が……」
line = "「そう言えば、あたしも似たような経験をした気が……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それに私たちの模擬戦を見に来てくださる方々は以前より大勢いらっしゃいましたが……」
line = "「それに私たちの模擬戦を見に来てくださる方々は以前より大勢いらっしゃいましたが……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「その人数が最近、急に増えたように思えてなりませんの」
line = "「その人数が最近、急に増えたように思えてなりませんの」"

[[dialogue]]
speaker = "アム"
# 「えっと……あれじゃない？　流星学園附属が誇る最強の盾と矛が、ついに水着フォームで激突ってことで注目を集めてるとか」
line = "「えっと……あれじゃない？　流星学園附属が誇る最強の盾と矛が、ついに水着フォームで激突ってことで注目を集めてるとか」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そういったものとは違う種類の、熱のこもった視線を感じることがありますわ」
line = "「そういったものとは違う種類の、熱のこもった視線を感じることがありますわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「もしかして、なのですが……私たちの戦闘服、かなり特殊なのではありませんか？」
line = "「もしかして、なのですが……私たちの戦闘服、かなり特殊なのではありませんか？」"

[[dialogue]]
speaker = "アム"
# 「はは、まさかそんなことあるわけ……」
line = "「はは、まさかそんなことあるわけ……」"

[[dialogue]]
speaker = "アム"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アム"
# 「どうなの、会長！！？」
line = "「どうなの、会長！！？」"

[[dialogue]]
speaker = "unk"
# べ、別におかしなものではないよ！
line = "べ、別におかしなものではないよ！"

[[dialogue]]
speaker = "アム"
# 「そ、そうだよね。いや～、まったく驚かせないでよ、エルゼ～」
line = "「そ、そうだよね。いや～、まったく驚かせないでよ、エルゼ～」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「も、申し訳ありませんわ～」
line = "「も、申し訳ありませんわ～」"

[[dialogue]]
speaker = "アム"
# 「よし、それじゃ気を取り直して勝負だっ！」
line = "「よし、それじゃ気を取り直して勝負だっ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ええ、参りますわ！」
line = "「ええ、参りますわ！」"

[[dialogue]]
speaker = "unk"
# ビーチパラソルを構えるエルゼ。
line = "ビーチパラソルを構えるエルゼ。"

[[dialogue]]
speaker = "unk"
# その攻撃を受け流そうと、アムはホバークラフトを構える。
line = "その攻撃を受け流そうと、アムはホバークラフトを構える。"

[[dialogue]]
speaker = "unk"
# 緊張の一瞬──のはずなんだけど、砂浜でじゃれ合う無邪気な女の子たち感が凄い。
line = "緊張の一瞬──のはずなんだけど、砂浜でじゃれ合う無邪気な女の子たち感が凄い。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「バラッジ・オブ・パラソルっ！」
line = "「バラッジ・オブ・パラソルっ！」"

[[dialogue]]
speaker = "アム"
# 「グラビティタックルっ！」
line = "「グラビティタックルっ！」"

[[dialogue]]
speaker = "unk"
# ──というのは見た目だけで、戦いが始まってしまえばさすがの迫力の２人ではあるのだった。
line = "──というのは見た目だけで、戦いが始まってしまえばさすがの迫力の２人ではあるのだった。"

[[dialogue]]
speaker = "アム"
# 「今日のところは負けかな～、うー、悔しいっ」
line = "「今日のところは負けかな～、うー、悔しいっ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そんなことはありませんわ。確かに攻勢の時間が続きましたけれど、手ごたえある一撃は一度も入れられていません」
line = "「そんなことはありませんわ。確かに攻勢の時間が続きましたけれど、手ごたえある一撃は一度も入れられていません」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「私の水着フォームの性能を知らないことを考えると、むしろアムの方が優勢だったと言えるのではありませんの？」
line = "「私の水着フォームの性能を知らないことを考えると、むしろアムの方が優勢だったと言えるのではありませんの？」"

[[dialogue]]
speaker = "アム"
# 「それは謙遜してるの？」
line = "「それは謙遜してるの？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「アムに対して謙遜する理由なんてありませんわ」
line = "「アムに対して謙遜する理由なんてありませんわ」"

[[dialogue]]
speaker = "アム"
# 「それもそっか……」
line = "「それもそっか……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様は戦いを見ていてどう思いましたの？」
line = "「会長様は戦いを見ていてどう思いましたの？」"

[[dialogue]]
speaker = "unk"
# それ以外の言葉が出てこない
line = "それ以外の言葉が出てこない"

[[dialogue]]
speaker = "unk"
# 互角……
line = "互角……"

[[dialogue]]
speaker = "アム"
# 「……そうだよね。もう聞き飽きた結果だけど、その評価が順当かもしれない」
line = "「……そうだよね。もう聞き飽きた結果だけど、その評価が順当かもしれない」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ですが次こそは、しっかり決着をつけさせてもらいますわ」
line = "「ですが次こそは、しっかり決着をつけさせてもらいますわ」"

[[dialogue]]
speaker = "アム"
# 「望むところだよ！」
line = "「望むところだよ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あら……なんだか会長様が笑顔ですわ」
line = "「あら……なんだか会長様が笑顔ですわ」"

[[dialogue]]
speaker = "アム"
# 「な、なに、ニヤニヤして……」
line = "「な、なに、ニヤニヤして……」"

[[dialogue]]
speaker = "unk"
# 仲良しだな～と思って
line = "仲良しだな～と思って"

[[dialogue]]
speaker = "エルデリーゼ"
# 「っ……！　あ、あの、一応アムとは友情というよりライバルという関係ですのよ」
line = "「っ……！　あ、あの、一応アムとは友情というよりライバルという関係ですのよ」"

[[dialogue]]
speaker = "アム"
# 「そうそう！　そこは誤解しないでね！」
line = "「そうそう！　そこは誤解しないでね！」"

[[dialogue]]
speaker = "unk"
# 仲良く訂正してくる２人の様子に、ますます笑みを止められなくなってしまうのだった。
line = "仲良く訂正してくる２人の様子に、ますます笑みを止められなくなってしまうのだった。"
