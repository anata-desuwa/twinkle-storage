[[dialogue]]
speaker = "unk"
# 第４話,イレーナの表と裏,P
line = "第４話,イレーナの表と裏,P"

[[dialogue]]
speaker = "unk"
# 教皇庁の神官であり、聖女と謳われるイレーナは、ジューンブライドの結婚式シーズンで引っ張りだこになっていた。
line = "教皇庁の神官であり、聖女と謳われるイレーナは、ジューンブライドの結婚式シーズンで引っ張りだこになっていた。"

[[dialogue]]
speaker = "unk"
# 今日は裏からその仕事を見学させてもらっている。
line = "今日は裏からその仕事を見学させてもらっている。"

[[dialogue]]
speaker = "イレーナ"
# 「あなた方は今日、夫婦となる誓いを立てようとしています。希望に満ち溢れたおふたりの顔を見ることができて、私も嬉しく思います」
line = "「あなた方は今日、夫婦となる誓いを立てようとしています。希望に満ち溢れたおふたりの顔を見ることができて、私も嬉しく思います」"

[[dialogue]]
speaker = "unk"
# 結婚式を挙げるカップルと参列者の前で、神官として説教をするイレーナ。
line = "結婚式を挙げるカップルと参列者の前で、神官として説教をするイレーナ。"

[[dialogue]]
speaker = "イレーナ"
# 「ですがこれは終わりではありません。新たな生活、新たな人生の始まりなのです」
line = "「ですがこれは終わりではありません。新たな生活、新たな人生の始まりなのです」"

[[dialogue]]
speaker = "イレーナ"
# 「この道行きの先には、様々な苦労や困難が待ち受けています。もちろん覚悟の上だとお思いでしょう」
line = "「この道行きの先には、様々な苦労や困難が待ち受けています。もちろん覚悟の上だとお思いでしょう」"

[[dialogue]]
speaker = "イレーナ"
# 「しかし困難というものは、想像を上回ってくるもの」
line = "「しかし困難というものは、想像を上回ってくるもの」"

[[dialogue]]
speaker = "イレーナ"
# 「そんな時は誰が隣にいるのかを見てください。あなたは決して１人ではありません」
line = "「そんな時は誰が隣にいるのかを見てください。あなたは決して１人ではありません」"

[[dialogue]]
speaker = "イレーナ"
# 「共にいることでより強く、より優しくなれると思ったからこそ、今隣にいる人を選んだはずです」
line = "「共にいることでより強く、より優しくなれると思ったからこそ、今隣にいる人を選んだはずです」"

[[dialogue]]
speaker = "イレーナ"
# 「自分と伴侶を信じて険しい道を歩み、幸福を掴み取っていただきたいと思います」
line = "「自分と伴侶を信じて険しい道を歩み、幸福を掴み取っていただきたいと思います」"

[[dialogue]]
speaker = "イレーナ"
# 「では誓いの言葉を」
line = "「では誓いの言葉を」"

[[dialogue]]
speaker = "イレーナ"
# 「病める時も健やかなる時も、富める時も貧しき時も、新郎は新婦を愛し、慈しむことを誓いますか？」
line = "「病める時も健やかなる時も、富める時も貧しき時も、新郎は新婦を愛し、慈しむことを誓いますか？」"

[[dialogue]]
speaker = "イレーナ"
# 「病める時も健やかなる時も、富める時も貧しき時も、新婦は新郎を愛し、慈しむことを誓いますか？」
line = "「病める時も健やかなる時も、富める時も貧しき時も、新婦は新郎を愛し、慈しむことを誓いますか？」"

[[dialogue]]
speaker = "イレーナ"
# 「……よろしい。では神官イレーナが、女神テルル様の下、２人が夫婦であることを認めます」
line = "「……よろしい。では神官イレーナが、女神テルル様の下、２人が夫婦であることを認めます」"

[[dialogue]]
speaker = "unk"
# 静粛な雰囲気の中、イレーナが新郎新婦の宣誓を見届けた。
line = "静粛な雰囲気の中、イレーナが新郎新婦の宣誓を見届けた。"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ～……疲れた……」
line = "「はぁ～……疲れた……」"

[[dialogue]]
speaker = "unk"
# お疲れ様。大変だったね
line = "お疲れ様。大変だったね"

[[dialogue]]
speaker = "イレーナ"
# 「ホントよ……今日だけで何組結婚式やったか数えきれないわ……」
line = "「ホントよ……今日だけで何組結婚式やったか数えきれないわ……」"

[[dialogue]]
speaker = "イレーナ"
# 「聖女で有名だからって、あたしを名指ししてくるカップルだっているし、手当たくさんもらわないとやってられないわ」
line = "「聖女で有名だからって、あたしを名指ししてくるカップルだっているし、手当たくさんもらわないとやってられないわ」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、説教の時はちょっとすかっとするけどね。偉そうなこと言えるいい機会だし」
line = "「ま、説教の時はちょっとすかっとするけどね。偉そうなこと言えるいい機会だし」"

[[dialogue]]
speaker = "イレーナ"
# 「……カップルごとに説教が違うって？　そりゃあ使い回しってわけにはいかないでしょ。事前に新郎新婦のことを聞いたり、当日の顔色を見たりして内容を変えてるの」
line = "「……カップルごとに説教が違うって？　そりゃあ使い回しってわけにはいかないでしょ。事前に新郎新婦のことを聞いたり、当日の顔色を見たりして内容を変えてるの」"

[[dialogue]]
speaker = "イレーナ"
# 「不安そうだったら勇気づけたり、浮かれてたらちょっと気を引き締めたり、アドリブ利かせてんのよ。あたしが結婚式やった以上、別れられたらちょっと気分悪いし」
line = "「不安そうだったら勇気づけたり、浮かれてたらちょっと気を引き締めたり、アドリブ利かせてんのよ。あたしが結婚式やった以上、別れられたらちょっと気分悪いし」"

[[dialogue]]
speaker = "unk"
# 立派な聖女様だ
line = "立派な聖女様だ"

[[dialogue]]
speaker = "イレーナ"
# 「聖女……ねぇ」
line = "「聖女……ねぇ」"

[[dialogue]]
speaker = "イレーナ"
# 「前から気になってたんだけどさ……」
line = "「前から気になってたんだけどさ……」"

[[dialogue]]
speaker = "イレーナ"
# 「あんた、素のあたしが好きだって、こっちが恥ずかしくなるくらい言ってくれるじゃない？」
line = "「あんた、素のあたしが好きだって、こっちが恥ずかしくなるくらい言ってくれるじゃない？」"

[[dialogue]]
speaker = "unk"
# ああ、大好きだ
line = "ああ、大好きだ"

[[dialogue]]
speaker = "イレーナ"
# 「そ、そこまで言わなくてもいいわよ……」
line = "「そ、そこまで言わなくてもいいわよ……」"

[[dialogue]]
speaker = "イレーナ"
# 「それはいいとして、猫被って聖女やってるあたしのことはどう思ってるの？」
line = "「それはいいとして、猫被って聖女やってるあたしのことはどう思ってるの？」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしは口も性格も悪くて、そんな女が外面を取り繕って、優しい聖女様を演じてる」
line = "「あたしは口も性格も悪くて、そんな女が外面を取り繕って、優しい聖女様を演じてる」"

[[dialogue]]
speaker = "イレーナ"
# 「本当のあたしが好きだっていうなら、聖女の方のあたしは嫌いなんじゃないの？」
line = "「本当のあたしが好きだっていうなら、聖女の方のあたしは嫌いなんじゃないの？」"

[[dialogue]]
speaker = "unk"
# 聖女のイレーナも好きだ
line = "聖女のイレーナも好きだ"

[[dialogue]]
speaker = "イレーナ"
# 「そうなの？　どうして？」
line = "「そうなの？　どうして？」"

[[dialogue]]
speaker = "イレーナ"
# 「優しい聖女を演じられるのは、イレーナが優しいから……？　聖女のイレーナもあたしの一部……？」
line = "「優しい聖女を演じられるのは、イレーナが優しいから……？　聖女のイレーナもあたしの一部……？」"

[[dialogue]]
speaker = "イレーナ"
# 「そう言ってくれるのは嬉しいけど、優しいふりだけ得意なやつもいるわよ？」
line = "「そう言ってくれるのは嬉しいけど、優しいふりだけ得意なやつもいるわよ？」"

[[dialogue]]
speaker = "イレーナ"
# 「……ううん、あんたの言ってること、ちょっとは素直に受け止めるべきね」
line = "「……ううん、あんたの言ってること、ちょっとは素直に受け止めるべきね」"

[[dialogue]]
speaker = "イレーナ"
# 「聖女ってほどじゃなくても、あたしはちゃんと優しくなれる。好きになってもらえる。そういう人間なんだって」
line = "「聖女ってほどじゃなくても、あたしはちゃんと優しくなれる。好きになってもらえる。そういう人間なんだって」"

[[dialogue]]
speaker = "イレーナ"
# 「少し前のあたしなら、『やっぱり聖女の方が好きなんじゃない』って言ってたかもしれないけど、今なら受け入れられる気がするわ」
line = "「少し前のあたしなら、『やっぱり聖女の方が好きなんじゃない』って言ってたかもしれないけど、今なら受け入れられる気がするわ」"

[[dialogue]]
speaker = "イレーナ"
# 「でもよかったわ。あっちのあたしは好きじゃないって言われてたら、それはそれでモヤモヤしてたし」
line = "「でもよかったわ。あっちのあたしは好きじゃないって言われてたら、それはそれでモヤモヤしてたし」"

[[dialogue]]
speaker = "unk"
# 俺はイレーナの全部が好きだよ
line = "俺はイレーナの全部が好きだよ"

[[dialogue]]
speaker = "イレーナ"
# 「あんた……」
line = "「あんた……」"

[[dialogue]]
speaker = "イレーナ"
# 「あ、でも、あんたが他の女の子と結婚式挙げるの見てて、内心けっこうムカついてたんだからね」
line = "「あ、でも、あんたが他の女の子と結婚式挙げるの見てて、内心けっこうムカついてたんだからね」"

[[dialogue]]
speaker = "unk"
# それはごめん！
line = "それはごめん！"

[[dialogue]]
speaker = "イレーナ"
# 「だから今から埋め合わせしなさい。ウェディングフォームを解除するためじゃなくて、ちゃんと誓うの」
line = "「だから今から埋め合わせしなさい。ウェディングフォームを解除するためじゃなくて、ちゃんと誓うの」"

[[dialogue]]
speaker = "イレーナ"
# 「ほら、あたしの手を取って」
line = "「ほら、あたしの手を取って」"

[[dialogue]]
speaker = "unk"
# イレーナがウェディングフォームに変身し、まるで式を挙げる新郎新婦のように、２人で大聖堂の真ん中を歩む。
line = "イレーナがウェディングフォームに変身し、まるで式を挙げる新郎新婦のように、２人で大聖堂の真ん中を歩む。"

[[dialogue]]
speaker = "イレーナ"
# 「本当なら神官がやるんだけど、あたしも神官だから、自分でやっちゃうわ」
line = "「本当なら神官がやるんだけど、あたしも神官だから、自分でやっちゃうわ」"

[[dialogue]]
speaker = "イレーナ"
# 「病める時も健やかなる時も、富める時も貧しき時も、あたしを愛し、慈しむことを誓いますか？」
line = "「病める時も健やかなる時も、富める時も貧しき時も、あたしを愛し、慈しむことを誓いますか？」"

[[dialogue]]
speaker = "unk"
# 誓います
line = "誓います"

[[dialogue]]
speaker = "イレーナ"
# 「あたしも誓うわ。病める時も健やかなる時も、富める時も貧しき時も、どんな時でもあんたを愛するって」
line = "「あたしも誓うわ。病める時も健やかなる時も、富める時も貧しき時も、どんな時でもあんたを愛するって」"

[[dialogue]]
speaker = "イレーナ"
# 「それじゃ、誓いの口付けを」
line = "「それじゃ、誓いの口付けを」"

[[dialogue]]
speaker = "イレーナ"
# 「ん……ちゅ<emoji=heart04>」
line = "「ん……ちゅ<emoji=heart04>」"
