[[dialogue]]
speaker = "クロト"
# 「ああ、すごくいやらしいよ」
line = "「ああ、すごくいやらしいよ」"

[[dialogue]]
speaker = "舞亜"
# 「えへへ……恥ずかしいけど嬉しい<emoji=heart04>　じゃあ、あなただけのために……エッチな演技、してあげるね<emoji=heart04>　はぁ……あ……ん……<emoji=heart04>」
line = "「えへへ……恥ずかしいけど嬉しい<emoji=heart04>　じゃあ、あなただけのために……エッチな演技、してあげるね<emoji=heart04>　はぁ……あ……ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 舞亜が腰を前後に揺らし、ペニスに割れ目を擦り付ける。
