[[dialogue]]
speaker = "unk"
# 先日、舞亜がフィギュアスケートの国際大会に出場した。
line = "先日、舞亜がフィギュアスケートの国際大会に出場した。"

[[dialogue]]
speaker = "unk"
# 俺は流星市国を離れることができず、テレビ越しでの応援になったが、舞亜は見事優勝。
line = "俺は流星市国を離れることができず、テレビ越しでの応援になったが、舞亜は見事優勝。"

[[dialogue]]
speaker = "unk"
# 彼女の帰国を待っていたのだが──
line = "彼女の帰国を待っていたのだが──"

[[dialogue]]
speaker = "舞亜"
# 「ただいま～♪」
line = "「ただいま～♪」"

[[dialogue]]
speaker = "クロト"
# 「おかえり。だけど帰国は明日じゃなかったっけ？」
line = "「おかえり。だけど帰国は明日じゃなかったっけ？」"

[[dialogue]]
speaker = "舞亜"
# 「会長さんに会いたいから、いろいろ前倒しして帰ってきたんだ。大会、見ててくれた？」
line = "「会長さんに会いたいから、いろいろ前倒しして帰ってきたんだ。大会、見ててくれた？」"

[[dialogue]]
speaker = "クロト"
# 「もちろん。ショートプログラムで少し崩れてハラハラしたけど、フリーは完璧だった。今までで最高の出来だと思う」
line = "「もちろん。ショートプログラムで少し崩れてハラハラしたけど、フリーは完璧だった。今までで最高の出来だと思う」"

[[dialogue]]
speaker = "舞亜"
# 「ありがとう。会長さんに情けないところ見せられないって思ったら、頑張れたんだよね。だから会長さんのおかげだよ」
line = "「ありがとう。会長さんに情けないところ見せられないって思ったら、頑張れたんだよね。だから会長さんのおかげだよ」"

[[dialogue]]
speaker = "舞亜"
# 「会長さん……ちゅっ<emoji=heart04>　んちゅっ、ちゅっ<emoji=heart04>　ん……ちゅるっ、じゅる……ちゅるれろ……じゅる、ちゅぷるるっ<emoji=heart04>」
line = "「会長さん……ちゅっ<emoji=heart04>　んちゅっ、ちゅっ<emoji=heart04>　ん……ちゅるっ、じゅる……ちゅるれろ……じゅる、ちゅぷるるっ<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
# 「ぷぁ……<emoji=heart04>　最近会えてなかったから、こうして会長さんと触れ合えて嬉しいな……<emoji=heart04>　あ、そうだ」
line = "「ぷぁ……<emoji=heart04>　最近会えてなかったから、こうして会長さんと触れ合えて嬉しいな……<emoji=heart04>　あ、そうだ」"

[[dialogue]]
speaker = "舞亜"
# 「じゃ～ん♪　巫女さんにへんし～ん♪　これ、エキシビションでも着てたんだけど、見ててくれた？」
line = "「じゃ～ん♪　巫女さんにへんし～ん♪　これ、エキシビションでも着てたんだけど、見ててくれた？」"

[[dialogue]]
speaker = "クロト"
# 「うん、それも見てたよ。競技とはまた違う、優雅な演技だった」
line = "「うん、それも見てたよ。競技とはまた違う、優雅な演技だった」"

[[dialogue]]
speaker = "舞亜"
# 「えへへ……嬉しいな♪　それで、これから会長さんのためだけに演技を披露しようと思うんだけど……見てくれる？」
line = "「えへへ……嬉しいな♪　それで、これから会長さんのためだけに演技を披露しようと思うんだけど……見てくれる？」"

[[dialogue]]
speaker = "クロト"
# 「俺のためだけに……？」
line = "「俺のためだけに……？」"

[[dialogue]]
speaker = "舞亜"
# 「うん。会長さんにしか見せられない演技を……ね<emoji=heart04>」
line = "「うん。会長さんにしか見せられない演技を……ね<emoji=heart04>」"

[[dialogue]]
speaker = "舞亜"
# 「どう？　これは会長さんしか見せられないでしょ？」
line = "「どう？　これは会長さんしか見せられないでしょ？」"

[[dialogue]]
speaker = "unk"
# 巫女装束をはだけ、俺の上に跨る舞亜。
line = "巫女装束をはだけ、俺の上に跨る舞亜。"

[[dialogue]]
speaker = "unk"
# 秘部も胸も大胆にさらけ出していて、身じろぎする度に、スケーターらしくない大きなおっぱいが揺れる。
line = "秘部も胸も大胆にさらけ出していて、身じろぎする度に、スケーターらしくない大きなおっぱいが揺れる。"

