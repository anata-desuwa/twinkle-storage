[[dialogue]]
speaker = "unk"
# 第２話,ぬいぐるみ職人リーナ,P
line = "第２話,ぬいぐるみ職人リーナ,P"

[[dialogue]]
speaker = "リーナ"
# 「いらっしゃい、お兄ちゃん」
line = "「いらっしゃい、お兄ちゃん」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんが来てくれたのは嬉しいけど……本当にお勉強しなきゃダメ？」
line = "「お兄ちゃんが来てくれたのは嬉しいけど……本当にお勉強しなきゃダメ？」"

[[dialogue]]
speaker = "unk"
# 勉強はしようね
line = "勉強はしようね"

[[dialogue]]
speaker = "unk"
# そう、今日はリーナに勉強を教えるために来た。
line = "そう、今日はリーナに勉強を教えるために来た。"

[[dialogue]]
speaker = "unk"
# リーナは学年で言うと附属１年生と同じ歳で、まだまだお勉強が必要だ。
line = "リーナは学年で言うと附属１年生と同じ歳で、まだまだお勉強が必要だ。"

[[dialogue]]
speaker = "リーナ"
# 「……勉強すると、色んな将来を選べるようになるから？　リーナ、将来なんて分かんないよ」
line = "「……勉強すると、色んな将来を選べるようになるから？　リーナ、将来なんて分かんないよ」"

[[dialogue]]
speaker = "リーナ"
# 「え、リーナの将来なりたいもの？　……う～ん、やっぱり分かんないよぉ。リーナにはお兄ちゃんがいてくれたらいいもんっ」
line = "「え、リーナの将来なりたいもの？　……う～ん、やっぱり分かんないよぉ。リーナにはお兄ちゃんがいてくれたらいいもんっ」"

[[dialogue]]
speaker = "unk"
# じゃあ、リーナの好きなことや楽しいことは？
line = "じゃあ、リーナの好きなことや楽しいことは？"

[[dialogue]]
speaker = "リーナ"
# 「リーナの好きなことや楽しいこと……お兄ちゃん以外で？　う～ん……あ、リーナ、ぬいぐるみ作るの好き！」
line = "「リーナの好きなことや楽しいこと……お兄ちゃん以外で？　う～ん……あ、リーナ、ぬいぐるみ作るの好き！」"

[[dialogue]]
speaker = "リーナ"
# 「このクマさんもリーナが作ったんだよっ！　リーナのお友達なんだ。でも、いつの間にかすぐに怪我しちゃうの」
line = "「このクマさんもリーナが作ったんだよっ！　リーナのお友達なんだ。でも、いつの間にかすぐに怪我しちゃうの」"

[[dialogue]]
speaker = "unk"
# 周囲を見渡すと、ぬいぐるみ作りに使う生地や糸が散乱していた。熱中すると周りが見えなくなるタイプのようだ。
line = "周囲を見渡すと、ぬいぐるみ作りに使う生地や糸が散乱していた。熱中すると周りが見えなくなるタイプのようだ。"

[[dialogue]]
speaker = "マリオン"
# 「失礼いたします。お勉強と聞いて、お飲み物とお菓子をお持ちしました」
line = "「失礼いたします。お勉強と聞いて、お飲み物とお菓子をお持ちしました」"

[[dialogue]]
speaker = "リーナ"
# 「ありがとう、マリオンさん。あ、ショートケーキだ～！　リーナ、マリオンさんのケーキ好き～！」
line = "「ありがとう、マリオンさん。あ、ショートケーキだ～！　リーナ、マリオンさんのケーキ好き～！」"

[[dialogue]]
speaker = "マリオン"
# 「ふふ、ありがとうございます。会長様はコーヒーでよろしかったでしょうか？」
line = "「ふふ、ありがとうございます。会長様はコーヒーでよろしかったでしょうか？」"

[[dialogue]]
speaker = "unk"
# ありがとうございます
line = "ありがとうございます"

[[dialogue]]
speaker = "リーナ"
# 「マリオンさん、何でもできるんだよ。お菓子もお洋服も作れるし、リーナも縫いもの教えてもらってるんだ」
line = "「マリオンさん、何でもできるんだよ。お菓子もお洋服も作れるし、リーナも縫いもの教えてもらってるんだ」"

[[dialogue]]
speaker = "マリオン"
# 「そんなそんな、お褒めいただき光栄です。おかわいいリーナ様からそこまで言われると私も昂ってしまいます……ふふふ」
line = "「そんなそんな、お褒めいただき光栄です。おかわいいリーナ様からそこまで言われると私も昂ってしまいます……ふふふ」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん。レイラお姉ちゃんから、マリオンさんが気持ち悪くなったらブザーを押すように言われてるんだけど、押した方がいいかな？」
line = "「お兄ちゃん。レイラお姉ちゃんから、マリオンさんが気持ち悪くなったらブザーを押すように言われてるんだけど、押した方がいいかな？」"

[[dialogue]]
speaker = "unk"
# 押しちゃおっか
line = "押しちゃおっか"

[[dialogue]]
speaker = "マリオン"
# 「おやおや。リーナ様、ブザーをしまってください。私がイレイザーフェニックスされてしまいます」
line = "「おやおや。リーナ様、ブザーをしまってください。私がイレイザーフェニックスされてしまいます」"

[[dialogue]]
speaker = "リーナ"
# 「は～い」
line = "「は～い」"

[[dialogue]]
speaker = "マリオン"
# 「リーナ様は覚えが早いので、私も教えていて楽しいです。こんな形で教え子が増えるなんて思いもしませんでした」
line = "「リーナ様は覚えが早いので、私も教えていて楽しいです。こんな形で教え子が増えるなんて思いもしませんでした」"

[[dialogue]]
speaker = "リーナ"
# 「えへへ～♪　ねぇ見て！　これ、次の新作なんだ」
line = "「えへへ～♪　ねぇ見て！　これ、次の新作なんだ」"

[[dialogue]]
speaker = "unk"
# リーナが取り出したスケッチブックには、見覚えのある姿が描かれていた。
line = "リーナが取り出したスケッチブックには、見覚えのある姿が描かれていた。"

[[dialogue]]
speaker = "リーナ"
# 「アイリーンちゃんのミーちゃんと、カヤちゃんの……名前は分からないけど、いつも連れてる子。ぬいぐるみができたら２人にあげるんだ」
line = "「アイリーンちゃんのミーちゃんと、カヤちゃんの……名前は分からないけど、いつも連れてる子。ぬいぐるみができたら２人にあげるんだ」"

[[dialogue]]
speaker = "unk"
# ミーちゃんとはアイリーンの使い魔のフクロウのことで、本来の名前はミネルバという。
line = "ミーちゃんとはアイリーンの使い魔のフクロウのことで、本来の名前はミネルバという。"

[[dialogue]]
speaker = "unk"
# また、カヤはいつも小動物を連れている。名前は分からないけど、大事にしているようだ。
line = "また、カヤはいつも小動物を連れている。名前は分からないけど、大事にしているようだ。"

[[dialogue]]
speaker = "リーナ"
# 「アイリーンちゃんとはゲームでよく遊ぶの。カヤちゃんはあんまりゲームはしないけど、一緒に武器のお手入れするんだ。おかげでリーナのチェーンソーもピカピカだよ」
line = "「アイリーンちゃんとはゲームでよく遊ぶの。カヤちゃんはあんまりゲームはしないけど、一緒に武器のお手入れするんだ。おかげでリーナのチェーンソーもピカピカだよ」"

[[dialogue]]
speaker = "マリオン"
# 「歳が近いからか、２人ともリーナ様とは仲良くしていただいているようです。まぁ、ゲームにはイニシュも混じりますが……」
line = "「歳が近いからか、２人ともリーナ様とは仲良くしていただいているようです。まぁ、ゲームにはイニシュも混じりますが……」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんは何かリーナに作ってほしいものある？　お兄ちゃんが欲しいって言ってくれたら、リーナ頑張るよ」
line = "「お兄ちゃんは何かリーナに作ってほしいものある？　お兄ちゃんが欲しいって言ってくれたら、リーナ頑張るよ」"

[[dialogue]]
speaker = "unk"
# うーん、そうだなぁ……
line = "うーん、そうだなぁ……"

[[dialogue]]
speaker = "マリオン"
# 「会長様。本日はリーナ様にお勉強を教えるためにいらしたのですよね？　そろそろ本題に戻られてはいかがでしょう」
line = "「会長様。本日はリーナ様にお勉強を教えるためにいらしたのですよね？　そろそろ本題に戻られてはいかがでしょう」"

[[dialogue]]
speaker = "マリオン"
# 「リーナ様も。お勉強しないと会長様が帰ってしまうかもしれませんよ？」
line = "「リーナ様も。お勉強しないと会長様が帰ってしまうかもしれませんよ？」"

[[dialogue]]
speaker = "リーナ"
# 「はーい」
line = "「はーい」"

[[dialogue]]
speaker = "リーナ"
# 「……え、分からない教科はないかって？　うーんとね、全部！」
line = "「……え、分からない教科はないかって？　うーんとね、全部！」"

[[dialogue]]
speaker = "unk"
# 交通事故以来、コラプサーと一緒にいたリーナは勉強から遠ざかってしまっていた。どうやら大仕事になりそうだ。
line = "交通事故以来、コラプサーと一緒にいたリーナは勉強から遠ざかってしまっていた。どうやら大仕事になりそうだ。"

[[dialogue]]
speaker = "unk"
# あれからも度々リーナのところを訪れ、リーナの勉強を見たり、一緒に漫画を読んだりしている。
line = "あれからも度々リーナのところを訪れ、リーナの勉強を見たり、一緒に漫画を読んだりしている。"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃん、作って欲しいもの決まった？　まだ決まらない？　じゃあリーナが選んであげる！」
line = "「お兄ちゃん、作って欲しいもの決まった？　まだ決まらない？　じゃあリーナが選んであげる！」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんは好きな動物いる？　リーナはやっぱりクマさん！」
line = "「お兄ちゃんは好きな動物いる？　リーナはやっぱりクマさん！」"

[[dialogue]]
speaker = "リーナ"
# 「動物が決められないならキャラクターは？　お兄ちゃん、時代劇好きだったよね？」
line = "「動物が決められないならキャラクターは？　お兄ちゃん、時代劇好きだったよね？」"

[[dialogue]]
speaker = "リーナ"
# 「……え、テレビでは５分で退場するのに漫画では大活躍する悪役？」
line = "「……え、テレビでは５分で退場するのに漫画では大活躍する悪役？」"

[[dialogue]]
speaker = "リーナ"
# 「えぇ……悪役がいいの？　お兄ちゃん、変わってるね……」
line = "「えぇ……悪役がいいの？　お兄ちゃん、変わってるね……」"

[[dialogue]]
speaker = "リーナ"
# 「お兄ちゃんが言うなら頑張って作ってみるけど…………ううん、とにかくやってみるね」
line = "「お兄ちゃんが言うなら頑張って作ってみるけど…………ううん、とにかくやってみるね」"

[[dialogue]]
speaker = "リーナ"
# 「じゃあスケッチから……お兄ちゃん、その悪役が出てくる漫画貸して？　ふーん、こんな顔なんだ」
line = "「じゃあスケッチから……お兄ちゃん、その悪役が出てくる漫画貸して？　ふーん、こんな顔なんだ」"

[[dialogue]]
speaker = "unk"
# リーナがスケッチブックに悪役の姿を描いていく。ぬいぐるみなのでかなりデフォルメされているが、面影を残したままポップにアレンジされている。
line = "リーナがスケッチブックに悪役の姿を描いていく。ぬいぐるみなのでかなりデフォルメされているが、面影を残したままポップにアレンジされている。"

[[dialogue]]
speaker = "unk"
# 絵、うまいね
line = "絵、うまいね"

[[dialogue]]
speaker = "リーナ"
# 「え、ホント！？　お兄ちゃんに褒められて嬉しいけど、くすぐったいよぉ……」
line = "「え、ホント！？　お兄ちゃんに褒められて嬉しいけど、くすぐったいよぉ……」"

[[dialogue]]
speaker = "リーナ"
# 「え、えっと、とりあえずスケッチ仕上げちゃうねっ」
line = "「え、えっと、とりあえずスケッチ仕上げちゃうねっ」"

[[dialogue]]
speaker = "リーナ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 今まで見たことない、真剣な横顔。素敵なものが出来上がりそうな予感とともに、リーナの知らない一面を見れた嬉しさを感じたのだった。
line = "今まで見たことない、真剣な横顔。素敵なものが出来上がりそうな予感とともに、リーナの知らない一面を見れた嬉しさを感じたのだった。"
