[[dialogue]]
speaker = "ルリエル"
# 「落ち着いてくださ～いっ！」
line = "「落ち着いてくださ～いっ！」"

[[dialogue]]
speaker = "イクシリオン"
# 「慌てずこちらへ避難をっ」
line = "「慌てずこちらへ避難をっ」"

[[dialogue]]
speaker = "ウィステリア"
# 「大規模なアステラが発生しちゃってるわね。これじゃバカンスどころの騒ぎじゃないわ」
line = "「大規模なアステラが発生しちゃってるわね。これじゃバカンスどころの騒ぎじゃないわ」"

[[dialogue]]
speaker = "unk"
# ビーチのみんなはっ？
line = "ビーチのみんなはっ？"

[[dialogue]]
speaker = "イクシリオン"
# 「無事に安全な場所へ誘導しました。すみません、おひとりでモンスターを食い止めていただいて」
line = "「無事に安全な場所へ誘導しました。すみません、おひとりでモンスターを食い止めていただいて」"

[[dialogue]]
speaker = "ルリエル"
# 「許せませんっ……！　せっかく皆さん、海で楽しく過ごしてましたのに……！　焼きたてのたこ焼きだって作ってもらってる最中だったんですよぉ……！」
line = "「許せませんっ……！　せっかく皆さん、海で楽しく過ごしてましたのに……！　焼きたてのたこ焼きだって作ってもらってる最中だったんですよぉ……！」"

[[dialogue]]
speaker = "イクシリオン"
# 「救援を呼んでいる暇はありませんね。あのアステラは私たちで片付けるしかなさそうです」
line = "「救援を呼んでいる暇はありませんね。あのアステラは私たちで片付けるしかなさそうです」"

[[dialogue]]
speaker = "ルリエル"
# 「で、でも、わたしたちにやれるでしょうか……。まだ星力の制御に不安が……」
line = "「で、でも、わたしたちにやれるでしょうか……。まだ星力の制御に不安が……」"

[[dialogue]]
speaker = "イクシリオン"
# 「うっ。それは確かに……」
line = "「うっ。それは確かに……」"

[[dialogue]]
speaker = "unk"
# ２人なら大丈夫だよ
line = "２人なら大丈夫だよ"

[[dialogue]]
speaker = "ルリエル"
# 「会長さん……？」
line = "「会長さん……？」"

[[dialogue]]
speaker = "unk"
# 自信を持って！
line = "自信を持って！"

[[dialogue]]
speaker = "イクシリオン"
# 「会長……」
line = "「会長……」"

[[dialogue]]
speaker = "子ども"
# 「ふぇ～ん、お母さんどこ～っ」
line = "「ふぇ～ん、お母さんどこ～っ」"

[[dialogue]]
speaker = "ルリエル"
# 「！　いけませんっ、逃げ遅れた子が──！」
line = "「！　いけませんっ、逃げ遅れた子が──！」"

[[dialogue]]
speaker = "水着フワッチ"
# 「イ～～～～～ッ」
line = "「イ～～～～～ッ」"

[[dialogue]]
speaker = "子ども"
# 「きゃああああああっっ～～！！？」
line = "「きゃああああああっっ～～！！？」"

[[dialogue]]
speaker = "ルリエル"
# 「あ……あれ？　ちゃんと使えちゃいました……」
line = "「あ……あれ？　ちゃんと使えちゃいました……」"

[[dialogue]]
speaker = "イクシリオン"
# 「わ、私もです。あれこれ考えずとっさに放った星術でしたのに……」
line = "「わ、私もです。あれこれ考えずとっさに放った星術でしたのに……」"

[[dialogue]]
speaker = "子ども"
# 「ぐす、ありがとう、星騎士のお姉さんたち……」
line = "「ぐす、ありがとう、星騎士のお姉さんたち……」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、いえいえ、もー安全ですよぉ～！」
line = "「あっ、いえいえ、もー安全ですよぉ～！」"

[[dialogue]]
speaker = "イクシリオン"
# 「お怪我はありませんか？　怖かったですよね」
line = "「お怪我はありませんか？　怖かったですよね」"

[[dialogue]]
speaker = "ウィステリア"
# 「さ、早くこっちへ。お母さんも待ってるわ」
line = "「さ、早くこっちへ。お母さんも待ってるわ」"

[[dialogue]]
speaker = "子ども"
# 「うん、ありがとうっ」
line = "「うん、ありがとうっ」"

[[dialogue]]
speaker = "ルリエル"
# 「力が湧いてきて……今なら負ける気がしません！」
line = "「力が湧いてきて……今なら負ける気がしません！」"

[[dialogue]]
speaker = "イクシリオン"
# 「戦闘服が体に馴染みます。まるで生まれた時から着ていたような……裸になったみたいですっ」
line = "「戦闘服が体に馴染みます。まるで生まれた時から着ていたような……裸になったみたいですっ」"

[[dialogue]]
speaker = "unk"
# みんな揃って空回りしちゃってたのかもな
line = "みんな揃って空回りしちゃってたのかもな"

[[dialogue]]
speaker = "イクシリオン"
# 「空回り、ですか。ふふ、確かにそうかもしれませんね。水着を着て、海へ来て、変に意気込みすぎていたのかもしれません」
line = "「空回り、ですか。ふふ、確かにそうかもしれませんね。水着を着て、海へ来て、変に意気込みすぎていたのかもしれません」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしも初めての海と水着に浮ついちゃってましたぁ。そっかぁー、最初から普段通りの心構えで気楽に過ごしていれば良かったんですねぇ」
line = "「わたしも初めての海と水着に浮ついちゃってましたぁ。そっかぁー、最初から普段通りの心構えで気楽に過ごしていれば良かったんですねぇ」"

[[dialogue]]
speaker = "イクシリオン"
# 「ありがとうございます、会長。会長が励ましてくださったおかげで、いつもの自分を取り戻せました」
line = "「ありがとうございます、会長。会長が励ましてくださったおかげで、いつもの自分を取り戻せました」"

[[dialogue]]
speaker = "ルリエル"
# 「えへへっ、わたし、根が単純ですからねっ。会長さんに『大丈夫』ってひと言言ってもらえるだけで自信モリモリ、ハイパー天使ですよぉ～！」
line = "「えへへっ、わたし、根が単純ですからねっ。会長さんに『大丈夫』ってひと言言ってもらえるだけで自信モリモリ、ハイパー天使ですよぉ～！」"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふ。どうやら私のアドバイスなんて不要だったみたいね。やっぱり先輩風なんて吹かせるものじゃないわ」
line = "「ふふ。どうやら私のアドバイスなんて不要だったみたいね。やっぱり先輩風なんて吹かせるものじゃないわ」"

[[dialogue]]
speaker = "水着フワッチ"
# 「イーーーッ！」
line = "「イーーーッ！」"

[[dialogue]]
speaker = "ルリエル"
# 「っと！　こーしちゃいられません！　ちゃっちゃとアステラを攻略して、モンスターの発生を止めましょう！」
line = "「っと！　こーしちゃいられません！　ちゃっちゃとアステラを攻略して、モンスターの発生を止めましょう！」"

[[dialogue]]
speaker = "イクシリオン"
# 「そうですね。この際、水着の食い込みは気にしないことにします。モンスターに見られても何も感じませんから」
line = "「そうですね。この際、水着の食い込みは気にしないことにします。モンスターに見られても何も感じませんから」"

[[dialogue]]
speaker = "ウィステリア"
# 「私も手伝わせてもらうわ。私の不運であのモンスターを呼び寄せちゃったのかもしれないし。他人を巻き込むわけにはいかないもの」
line = "「私も手伝わせてもらうわ。私の不運であのモンスターを呼び寄せちゃったのかもしれないし。他人を巻き込むわけにはいかないもの」"

[[dialogue]]
speaker = "unk"
# よし、俺たちでビーチの平和を守るぞ！
line = "よし、俺たちでビーチの平和を守るぞ！"

[[dialogue]]
speaker = "ルリエル"
# 「はいなのです！　これでも流星学園の星徒会役員ですから！」
line = "「はいなのです！　これでも流星学園の星徒会役員ですから！」"

[[dialogue]]
speaker = "イクシリオン"
# 「はい！　保健委員イクシリオン・グレゴール、参ります！」
line = "「はい！　保健委員イクシリオン・グレゴール、参ります！」"
