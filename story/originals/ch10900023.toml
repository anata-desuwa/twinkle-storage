[[dialogue]]
speaker = "unk"
# 第３話,新衣装で遊園地デート♪,P
line = "第３話,新衣装で遊園地デート♪,P"

[[dialogue]]
speaker = "unk"
# 色々あったが、無事に元の世界へと戻ってこれた俺たち。それから少し経った、とある休日。
line = "色々あったが、無事に元の世界へと戻ってこれた俺たち。それから少し経った、とある休日。"

[[dialogue]]
speaker = "unk"
# 俺はメイプルと２人で、遊園地へとやって来ていた――
line = "俺はメイプルと２人で、遊園地へとやって来ていた――"

[[dialogue]]
speaker = "メイプル"
# 「わぁ～♪　ここが遊園地か～♪　人がいっぱいだね！」
line = "「わぁ～♪　ここが遊園地か～♪　人がいっぱいだね！」"

[[dialogue]]
speaker = "unk"
# メイプルは魔界出身の為、遊園地は今回が初めてだと言う。以前から「遊園地に行きたい！」とおねだりされたのだ。
line = "メイプルは魔界出身の為、遊園地は今回が初めてだと言う。以前から「遊園地に行きたい！」とおねだりされたのだ。"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃん、今日は連れて来てくれてありがとう♪　にへへっ。絶叫マシーン、楽しみ～♪」
line = "「お兄ちゃん、今日は連れて来てくれてありがとう♪　にへへっ。絶叫マシーン、楽しみ～♪」"

[[dialogue]]
speaker = "unk"
# メイプル、今日はその衣装なんだな
line = "メイプル、今日はその衣装なんだな"

[[dialogue]]
speaker = "メイプル"
# 「あっ、うん♪　この『クルセイダーフォーム』、可愛くて私服っぽいし、気に入っているんだ～♪」
line = "「あっ、うん♪　この『クルセイダーフォーム』、可愛くて私服っぽいし、気に入っているんだ～♪」"

[[dialogue]]
speaker = "メイプル"
# 「ちなみにフォーム名はね～、ナナお姉ちゃんやロロットたちの『流星クルセイダース』から取ってきたんだ♪」
line = "「ちなみにフォーム名はね～、ナナお姉ちゃんやロロットたちの『流星クルセイダース』から取ってきたんだ♪」"

[[dialogue]]
speaker = "メイプル"
# 「――そういえばこの前、上着の状態が違ったって？」
line = "「――そういえばこの前、上着の状態が違ったって？」"

[[dialogue]]
speaker = "メイプル"
# 「それは『軽装モード』だね♪　不思議なんだけど、このフォーム、モード切り替えができるんだよ～。――えいっ♪」
line = "「それは『軽装モード』だね♪　不思議なんだけど、このフォーム、モード切り替えができるんだよ～。――えいっ♪」"

[[dialogue]]
speaker = "メイプル"
# 「ほら、こんな感じ♪」
line = "「ほら、こんな感じ♪」"

[[dialogue]]
speaker = "メイプル"
# 「ちなみに、お兄ちゃんはどっちの方が好きかな？」
line = "「ちなみに、お兄ちゃんはどっちの方が好きかな？」"

[[dialogue]]
speaker = "メイプル"
# 「――どっちも可愛い？ にへへ～<emoji=heart04> ありがと♪」
line = "「――どっちも可愛い？ にへへ～<emoji=heart04> ありがと♪」"

[[dialogue]]
speaker = "メイプル"
# 「じゃあ、そろそろ絶叫マシーンに乗りに行こっか♪　お兄ちゃん♪」
line = "「じゃあ、そろそろ絶叫マシーンに乗りに行こっか♪　お兄ちゃん♪」"

[[dialogue]]
speaker = "unk"
# そう言って、メイプルは何気なく俺の腕を取り、抱き着いてくる。
line = "そう言って、メイプルは何気なく俺の腕を取り、抱き着いてくる。"

[[dialogue]]
speaker = "unk"
# 俺は思わずドキッとしてしまい――
line = "俺は思わずドキッとしてしまい――"

[[dialogue]]
speaker = "メイプル"
# 「ん？　どうかした？　お兄ちゃん」
line = "「ん？　どうかした？　お兄ちゃん」"

[[dialogue]]
speaker = "unk"
# い、いや、なんでもない
line = "い、いや、なんでもない"

[[dialogue]]
speaker = "unk"
# 俺は誤魔化して、そのままメイプルと一緒に歩き出すのだった。
line = "俺は誤魔化して、そのままメイプルと一緒に歩き出すのだった。"

[[dialogue]]
speaker = "unk"
# そうして、ジェットコースターに乗ることになって――
line = "そうして、ジェットコースターに乗ることになって――"

[[dialogue]]
speaker = "メイプル"
# 「わあああぁぁぁ～っ！　すごいすごいすご～いっ♪」
line = "「わあああぁぁぁ～っ！　すごいすごいすご～いっ♪」"

[[dialogue]]
speaker = "メイプル"
# 「星騎士の力で空を飛ぶのとは違う感覚！　スリルを楽しむ為の乗り物って、こんなに面白いんだ！」
line = "「星騎士の力で空を飛ぶのとは違う感覚！　スリルを楽しむ為の乗り物って、こんなに面白いんだ！」"

[[dialogue]]
speaker = "メイプル"
# 「ふっ……あはははははっ♪　この妹魔王を怖がらせようとは笑止千万！　甘いぞ、ジェットコースター！　もっと恐怖を味合わせてみせるがいい！」
line = "「ふっ……あはははははっ♪　この妹魔王を怖がらせようとは笑止千万！　甘いぞ、ジェットコースター！　もっと恐怖を味合わせてみせるがいい！」"

[[dialogue]]
speaker = "unk"
# こらっ、あんまりはしゃいでると舌噛むぞ！
line = "こらっ、あんまりはしゃいでると舌噛むぞ！"

[[dialogue]]
speaker = "メイプル"
# 「は～い！　ごめんなさい、お兄ちゃんっ♪」
line = "「は～い！　ごめんなさい、お兄ちゃんっ♪」"

[[dialogue]]
speaker = "unk"
# それから幾つかの絶叫マシーンを楽しんだ後、俺たちはフードコートの席で休憩することになった。
line = "それから幾つかの絶叫マシーンを楽しんだ後、俺たちはフードコートの席で休憩することになった。"

[[dialogue]]
speaker = "メイプル"
# 「ん～！　絶叫マシーン、最高～！」
line = "「ん～！　絶叫マシーン、最高～！」"

[[dialogue]]
speaker = "メイプル"
# 「ふぅっ♪　やっぱり、人間界ってすごいね！ こんなに楽しい乗り物が存在するなんて！」
line = "「ふぅっ♪　やっぱり、人間界ってすごいね！ こんなに楽しい乗り物が存在するなんて！」"

[[dialogue]]
speaker = "メイプル"
# 「星騎士をやってるからこそ、純粋にスリルを楽しめて、気分爽快！　って感じ♪」
line = "「星騎士をやってるからこそ、純粋にスリルを楽しめて、気分爽快！　って感じ♪」"

[[dialogue]]
speaker = "unk"
# 気に入ったなら何よりだ
line = "気に入ったなら何よりだ"

[[dialogue]]
speaker = "メイプル"
# 「うん♪　でも、絶叫マシーンばっかりじゃなくて、デートの方も忘れずに楽しまないとね」
line = "「うん♪　でも、絶叫マシーンばっかりじゃなくて、デートの方も忘れずに楽しまないとね」"

[[dialogue]]
speaker = "メイプル"
# 「というわけで、お兄ちゃん、パフェ食べさせて♪」
line = "「というわけで、お兄ちゃん、パフェ食べさせて♪」"

[[dialogue]]
speaker = "メイプル"
# 「はい、あ～ん♪」
line = "「はい、あ～ん♪」"

[[dialogue]]
speaker = "メイプル"
# 「――あむっ♪　ん～、美味しい～<emoji=heart04>　人間界のスイーツってやっぱりいいよね～♪　お口の中が幸せで、顔がふにゃふにゃになっちゃう<emoji=heart04>」
line = "「――あむっ♪　ん～、美味しい～<emoji=heart04>　人間界のスイーツってやっぱりいいよね～♪　お口の中が幸せで、顔がふにゃふにゃになっちゃう<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、メイプルは俺の腕に再び抱き着いてくる。
line = "そう言って、メイプルは俺の腕に再び抱き着いてくる。"

[[dialogue]]
speaker = "unk"
# そう……メイプルが座っているのはテーブルを挟んだ向かい側ではなく――俺のすぐ隣。肩も腕もくっつくほどの、真隣だった。
line = "そう……メイプルが座っているのはテーブルを挟んだ向かい側ではなく――俺のすぐ隣。肩も腕もくっつくほどの、真隣だった。"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃ～ん、もう１回食べさせて？　あ～ん<emoji=heart04>」
line = "「お兄ちゃ～ん、もう１回食べさせて？　あ～ん<emoji=heart04>」"

[[dialogue]]
speaker = "メイプル"
# 「あむっ。んふふ～♪　甘～い<emoji=heart04>」
line = "「あむっ。んふふ～♪　甘～い<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんなぴったりくっ付いた状態で可愛く甘えられては、ドキドキせざるを得ない。
line = "そんなぴったりくっ付いた状態で可愛く甘えられては、ドキドキせざるを得ない。"

[[dialogue]]
speaker = "unk"
# だって俺は……もう既に１度、言葉で伝えているくらい、メイプルに恋愛的な意味での好意を抱いているのだから。
line = "だって俺は……もう既に１度、言葉で伝えているくらい、メイプルに恋愛的な意味での好意を抱いているのだから。"

[[dialogue]]
speaker = "unk"
# 今までになく、積極的じゃないか？
line = "今までになく、積極的じゃないか？"

[[dialogue]]
speaker = "unk"
# 今日のメイプルはなんか……
line = "今日のメイプルはなんか……"

[[dialogue]]
speaker = "メイプル"
# 「ほぇ？　――ああ、そっか！」
line = "「ほぇ？　――ああ、そっか！」"

[[dialogue]]
speaker = "メイプル"
# 「そういえばまだ、そのことをお兄ちゃんに話してなかったね。実は――」
line = "「そういえばまだ、そのことをお兄ちゃんに話してなかったね。実は――」"

[[dialogue]]
speaker = "メイプル"
# 「このクルセイダーフォームになるとね、なんだか不思議と<b>いつもよりお兄ちゃんに甘えたくなる</b>の♪」
line = "「このクルセイダーフォームになるとね、なんだか不思議と<b>いつもよりお兄ちゃんに甘えたくなる</b>の♪」"

[[dialogue]]
speaker = "unk"
# なにその効果！？
line = "なにその効果！？"

[[dialogue]]
speaker = "メイプル"
# 「つまりは、妹力アップ♪　みたいな？　にへへ♪」
line = "「つまりは、妹力アップ♪　みたいな？　にへへ♪」"

[[dialogue]]
speaker = "メイプル"
# 「だから今日のデートは、魔王の妹として、いっぱい甘えさせてくれると嬉しいな♪」
line = "「だから今日のデートは、魔王の妹として、いっぱい甘えさせてくれると嬉しいな♪」"

[[dialogue]]
speaker = "メイプル"
# 「ねっ、お兄ちゃん<emoji=heart04>」
line = "「ねっ、お兄ちゃん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そんな風に甘い声でおねだりされて、断れるわけがなく。
line = "そんな風に甘い声でおねだりされて、断れるわけがなく。"

[[dialogue]]
speaker = "unk"
# 俺はその後もドキドキしながら、デートをすることになるのだった――
line = "俺はその後もドキドキしながら、デートをすることになるのだった――"
