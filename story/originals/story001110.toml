[[dialogue]]
speaker = "ネーゼマイン"
# 「まさか迷子探しのついでだったとはねー。とんだ骨折り損のくたびれ儲けってやつだよ～」
line = "「まさか迷子探しのついでだったとはねー。とんだ骨折り損のくたびれ儲けってやつだよ～」"

[[dialogue]]
speaker = "セナリィ"
# 「くうぅ……一攫千金が遠のきましたわ。あと一歩でコラプサーを捕まえられましたのに……」
line = "「くうぅ……一攫千金が遠のきましたわ。あと一歩でコラプサーを捕まえられましたのに……」"

[[dialogue]]
speaker = "せつな"
# 「やっぱりセナリィ殿は相変わらずでござるな……」
line = "「やっぱりセナリィ殿は相変わらずでござるな……」"

[[dialogue]]
speaker = "unk"
# ヴァレリーを捕まえられなくて残念でした
line = "ヴァレリーを捕まえられなくて残念でした"

[[dialogue]]
speaker = "シアン"
# 「まあな」
line = "「まあな」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「取り逃がしたのに平気そうだね？　わざわざイギリスから追ってきたんでしょ」
line = "「取り逃がしたのに平気そうだね？　わざわざイギリスから追ってきたんでしょ」"

[[dialogue]]
speaker = "シアン"
# 「追って逃げられて、また追って、なんてのは慣れっこだ。いちいち落ち込んでたらキリがねえ」
line = "「追って逃げられて、また追って、なんてのは慣れっこだ。いちいち落ち込んでたらキリがねえ」"

[[dialogue]]
speaker = "シアン"
# 「やつはいつか必ず捕まえる。どうせあの調子じゃ、また姿を現すだろ」
line = "「やつはいつか必ず捕まえる。どうせあの調子じゃ、また姿を現すだろ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ダウナーなふりしてやる気満々だね～。さすが<ruby=ハウンドドッグ>猟犬</ruby>先輩だ」
line = "「ダウナーなふりしてやる気満々だね～。さすが<ruby>猟犬<rt>ハウンドドッグ</rt></ruby>先輩だ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「だ・け・ど～……すごく大事な発見もあったよね」
line = "「だ・け・ど～……すごく大事な発見もあったよね」"

[[dialogue]]
speaker = "unk"
# セナリィの星眼が効いた
line = "セナリィの星眼が効いた"

[[dialogue]]
speaker = "セナリィ"
# 「ええ。<ruby=わたくし>私</ruby>の『強奪の星眼』で奪えるということは、星術を行使しているということですわ」
line = "「ええ。<ruby>私<rt>わたくし</rt></ruby>の『強奪の星眼』で奪えるということは、星術を行使しているということですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「それがヴァレリー・スチュアートだけなのか、コラプサー全員に共通しているのかはわかりませんけれど……」
line = "「それがヴァレリー・スチュアートだけなのか、コラプサー全員に共通しているのかはわかりませんけれど……」"

[[dialogue]]
speaker = "せつな"
# 「今回のデータは各所に共有しておきまする。何かわかればよいのでござるが」
line = "「今回のデータは各所に共有しておきまする。何かわかればよいのでござるが」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「新たに判明したコラプサー構成員はヴァレリーとリーナの２人。この前のキサナと合わせて３人だけど、あの調子じゃまだいそうだったね～」
line = "「新たに判明したコラプサー構成員はヴァレリーとリーナの２人。この前のキサナと合わせて３人だけど、あの調子じゃまだいそうだったね～」"

[[dialogue]]
speaker = "シアン"
# 「ま、今日は全員命があって何よりだ。ゆっくり休もうぜ」
line = "「ま、今日は全員命があって何よりだ。ゆっくり休もうぜ」"

[[dialogue]]
speaker = "蛍火"
# 「皆さん、お疲れさまでした。私も戦闘に参加できればよかったのですが……申し訳ありません」
line = "「皆さん、お疲れさまでした。私も戦闘に参加できればよかったのですが……申し訳ありません」"

[[dialogue]]
speaker = "unk"
# 蛍火はよく頑張ってくれた
line = "蛍火はよく頑張ってくれた"

[[dialogue]]
speaker = "シアン"
# 「ああ。あんたがいなきゃ、あたしはヴァレリーのやつに滅多切りにされてたぜ」
line = "「ああ。あんたがいなきゃ、あたしはヴァレリーのやつに滅多切りにされてたぜ」"

[[dialogue]]
speaker = "蛍火"
# 「ありがとうございます。戦闘で空腹かと思いましたので、簡単なお夜食を作らせていただきました。よければ召し上がってください」
line = "「ありがとうございます。戦闘で空腹かと思いましたので、簡単なお夜食を作らせていただきました。よければ召し上がってください」"

[[dialogue]]
speaker = "せつな"
# 「おお、かたじけない！」
line = "「おお、かたじけない！」"

[[dialogue]]
speaker = "セナリィ"
# 「ん～、このおにぎり、絶品ですわ！」
line = "「ん～、このおにぎり、絶品ですわ！」"

[[dialogue]]
speaker = "蛍火"
# 「ところで皆さんは何の集まりで？　特につながりがないように見えるのですが……」
line = "「ところで皆さんは何の集まりで？　特につながりがないように見えるのですが……」"

[[dialogue]]
speaker = "unk"
# あー……
line = "あー……"

[[dialogue]]
speaker = "シアン"
# 「仲良しサークル……かな」
line = "「仲良しサークル……かな」"

[[dialogue]]
speaker = "ヴァレリー"
# 「お久しぶりです、キサナ。<ruby=かくらん>攪乱</ruby>お疲れ様です」
line = "「お久しぶりです、キサナ。<ruby>攪乱<rt>かくらん</rt></ruby>お疲れ様です」"

[[dialogue]]
speaker = "キサナ"
# 「チッ。テメエに言われると無性に腹が立つぜ」
line = "「チッ。テメエに言われると無性に腹が立つぜ」"

[[dialogue]]
speaker = "キサナ"
# 「ここの場所は掴ませないようにしてるが、じきに限界は来る。いつまでも逃げ回ってられねえぞ」
line = "「ここの場所は掴ませないようにしてるが、じきに限界は来る。いつまでも逃げ回ってられねえぞ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「その時はその時、暴れてやりましょう。ですがその前に<b>計画</b>の準備が整うはずです」
line = "「その時はその時、暴れてやりましょう。ですがその前に<b>計画</b>の準備が整うはずです」"

[[dialogue]]
speaker = "キサナ"
# 「計画、ねぇ……。アタシは何ひとつ知らされてねえが、本当に進んでんのか？」
line = "「計画、ねぇ……。アタシは何ひとつ知らされてねえが、本当に進んでんのか？」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ええ、順調に進行中ですよ。ターゲットの所在も特定済みです」
line = "「ええ、順調に進行中ですよ。ターゲットの所在も特定済みです」"

[[dialogue]]
speaker = "キサナ"
# 「ふうん、ならいいがな。……で、合流は昨日の予定だったのにオマエらは何してたんだ？」
line = "「ふうん、ならいいがな。……で、合流は昨日の予定だったのにオマエらは何してたんだ？」"

[[dialogue]]
speaker = "リーナ"
# 「あのね、お兄ちゃんに会ってたの！」
line = "「あのね、お兄ちゃんに会ってたの！」"

[[dialogue]]
speaker = "キサナ"
# 「は？　オマエの兄貴って死んだんじゃなかったっけ？」
line = "「は？　オマエの兄貴って死んだんじゃなかったっけ？」"

[[dialogue]]
speaker = "リーナ"
# 「も～、違うよ！　リーナのお兄ちゃんはお兄ちゃんなの！」
line = "「も～、違うよ！　リーナのお兄ちゃんはお兄ちゃんなの！」"

[[dialogue]]
speaker = "ヴァレリー"
# 「新星学園の会長さんですよ、リーナのお兄ちゃんは」
line = "「新星学園の会長さんですよ、リーナのお兄ちゃんは」"

[[dialogue]]
speaker = "キサナ"
# 「あいつが？　お兄ちゃん？　わけわかんねえ」
line = "「あいつが？　お兄ちゃん？　わけわかんねえ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「それがなかなか面白いことになりまして。リーナを探していたら星騎士と戦闘になって、さらにリーナにズタズタにされかけました」
line = "「それがなかなか面白いことになりまして。リーナを探していたら星騎士と戦闘になって、さらにリーナにズタズタにされかけました」"

[[dialogue]]
speaker = "キサナ"
# 「マジかよ。アタシもリーナに加勢すればよかったぜ」
line = "「マジかよ。アタシもリーナに加勢すればよかったぜ」"

[[dialogue]]
speaker = "リーナ"
# 「キサナお姉ちゃんはお兄ちゃんをいじめそうだからダメ！」
line = "「キサナお姉ちゃんはお兄ちゃんをいじめそうだからダメ！」"

[[dialogue]]
speaker = "キサナ"
# 「なんだそりゃ。バカバカしい」
line = "「なんだそりゃ。バカバカしい」"

[[dialogue]]
speaker = "ヴァレリー"
# 「フフフ……もし会長さんがリーナの御眼鏡に敵わなければ、刃を向けられていたのは会長さんだったかもしれません」
line = "「フフフ……もし会長さんがリーナの御眼鏡に敵わなければ、刃を向けられていたのは会長さんだったかもしれません」"

[[dialogue]]
speaker = "ヴァレリー"
# 「命拾いをしましたね、会長さん」
line = "「命拾いをしましたね、会長さん」"
