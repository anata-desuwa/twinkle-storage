[[dialogue]]
speaker = "unk"
# 第５話,もう１人の使徒,B
line = "第５話,もう１人の使徒,B"

[[dialogue]]
speaker = "unk"
# ディザスターハンドの件で中断したが、アルタイル側からの情報共有は続く。
line = "ディザスターハンドの件で中断したが、アルタイル側からの情報共有は続く。"

[[dialogue]]
speaker = "梨緒"
# 「他にも共有しておきたい情報がある。アルタイルに現れた新たなリクリエの使徒──ジグについてだ」
line = "「他にも共有しておきたい情報がある。アルタイルに現れた新たなリクリエの使徒──ジグについてだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしの他にもアルタイルに使徒がいたのか？」
line = "「あたしの他にもアルタイルに使徒がいたのか？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。彼女はレナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート」
line = "「ああ。彼女はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート」"

[[dialogue]]
speaker = "梨緒"
# 「ジグは、ベガの新星学園で星徒会長をしていた。ベガの君にも匹敵する実力者で、私もあいつには何度も敗れた」
line = "「ジグは、ベガの新星学園で星徒会長をしていた。ベガの君にも匹敵する実力者で、私もあいつには何度も敗れた」"

[[dialogue]]
speaker = "梨緒"
# 「同じ星徒会で共に戦った者として、私はジグに勝ち、あいつをリクリエの使徒から解放したいと思っている」
line = "「同じ星徒会で共に戦った者として、私はジグに勝ち、あいつをリクリエの使徒から解放したいと思っている」"

[[dialogue]]
speaker = "ラクシャ"
# 「ジグとはセイファートと行動してる時に一度接触したことあるけど、よくわかんないやつだったな」
line = "「ジグとはセイファートと行動してる時に一度接触したことあるけど、よくわかんないやつだったな」"

[[dialogue]]
speaker = "梨緒"
# 「ジグを知っていたのか！？　ならどうして言わなかった？」
line = "「ジグを知っていたのか！？　ならどうして言わなかった？」"

[[dialogue]]
speaker = "ラクシャ"
# 「いやキミの知り合いとか知らなかったし。ボクもあいつについては全然情報がないから、言ったら余計混乱させると思ったんだよ」
line = "「いやキミの知り合いとか知らなかったし。ボクもあいつについては全然情報がないから、言ったら余計混乱させると思ったんだよ」"

[[dialogue]]
speaker = "ラクシャ"
# 「だけどアルタイルではあまり動きを見せてなかったし、デネブの方で何かやってたのかも」
line = "「だけどアルタイルではあまり動きを見せてなかったし、デネブの方で何かやってたのかも」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ふむ……あたしはデネブで遭遇したことはないが、どこかで暗躍していたのかもしれないな」
line = "「ふむ……あたしはデネブで遭遇したことはないが、どこかで暗躍していたのかもしれないな」"

[[dialogue]]
speaker = "unk"
# リクリエの使徒は平行世界を超えて現れる。
line = "リクリエの使徒は平行世界を超えて現れる。"

[[dialogue]]
speaker = "unk"
# ならベガの使徒が、デネブに現れても不思議ではない。
line = "ならベガの使徒が、デネブに現れても不思議ではない。"

[[dialogue]]
speaker = "クロト"
# 「そしてジグは自身を“真なる神”の騎士と呼んでいた。何か心当たりはないか？」
line = "「そしてジグは自身を“真なる神”の騎士と呼んでいた。何か心当たりはないか？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「“真なる神”……？　いいや、あたしもリクリエの使徒だったが、聞いたことがないな」
line = "「“真なる神”……？　いいや、あたしもリクリエの使徒だったが、聞いたことがないな」"

[[dialogue]]
speaker = "unk"
# アルタイルのアポロと同じく、“真なる神”についてはわからないらしい。
line = "アルタイルのアポロと同じく、“真なる神”についてはわからないらしい。"

[[dialogue]]
speaker = "unk"
# 使徒は思考にリクリエの影響を受けるといっても、アポロとジグでは影響の及ぼし方がやはり違うようだ。
line = "使徒は思考にリクリエの影響を受けるといっても、アポロとジグでは影響の及ぼし方がやはり違うようだ。"

[[dialogue]]
speaker = "クロト"
# 「俺たちは、その“真なる神”が、かつてバジュラ教団が信仰していたチャカパラ神と関係があるんじゃないかと思ってる」
line = "「俺たちは、その“真なる神”が、かつてバジュラ教団が信仰していたチャカパラ神と関係があるんじゃないかと思ってる」"

[[dialogue]]
speaker = "リノ"
# 「チャカパラ神……確か魔王ラクシスと対立していたのよね。魔王ラクシスがリクリエを止めた時だから、もう３０００年以上も前のことだわ」
line = "「チャカパラ神……確か魔王ラクシスと対立していたのよね。魔王ラクシスがリクリエを止めた時だから、もう３０００年以上も前のことだわ」"

[[dialogue]]
speaker = "クロト"
# 「ああ、だけどバジュラ教団と同じような信仰は、いろんな時代や地域にあったらしい」
line = "「ああ、だけどバジュラ教団と同じような信仰は、いろんな時代や地域にあったらしい」"

[[dialogue]]
speaker = "クロト"
# 「チャカパラ神は名前を変えて、常に世界に存在し続けているのかもしれない」
line = "「チャカパラ神は名前を変えて、常に世界に存在し続けているのかもしれない」"

[[dialogue]]
speaker = "クロト"
# 「アルタイルでもネビュラにあたってみたんだけど、関連する資料が散逸してるらしいんだ。だからデネブに資料があればと思ったんだけど……」
line = "「アルタイルでもネビュラにあたってみたんだけど、関連する資料が散逸してるらしいんだ。だからデネブに資料があればと思ったんだけど……」"

[[dialogue]]
speaker = "リノ"
# 「……もしかしたらネビュラ基地から持ち出した資料にあるかもしれないわ。探してみるわね」
line = "「……もしかしたらネビュラ基地から持ち出した資料にあるかもしれないわ。探してみるわね」"

[[dialogue]]
speaker = "クロト"
# 「本当に？　お願いするよ」
line = "「本当に？　お願いするよ」"

[[dialogue]]
speaker = "unk"
# デネブではネビュラが活動していないから期待はできないかと思ったが、もし資料があるならありがたい。
line = "デネブではネビュラが活動していないから期待はできないかと思ったが、もし資料があるならありがたい。"

[[dialogue]]
speaker = "ナターシャ"
# 「情報共有はだいたい済んだかな」
line = "「情報共有はだいたい済んだかな」"

[[dialogue]]
speaker = "ナターシャ"
# 「それじゃ……ベアトのことについて話してもらっていい、委員長？」
line = "「それじゃ……ベアトのことについて話してもらっていい、委員長？」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ」
line = "「……ああ」"

[[dialogue]]
speaker = "梨緒"
# 「レジスタンスの２人に説明しておくと、私は緋宮クロトを監視するために、新星学園に選挙管理委員会を作った。アルタイルのアポロも選挙管理委員会に入っている」
line = "「レジスタンスの２人に説明しておくと、私は緋宮クロトを監視するために、新星学園に選挙管理委員会を作った。アルタイルのアポロも選挙管理委員会に入っている」"

[[dialogue]]
speaker = "梨緒"
# 「その選挙管理委員会に、ベアトリスという生徒がいた。魔界からの留学生……ということになっていた」
line = "「その選挙管理委員会に、ベアトリスという生徒がいた。魔界からの留学生……ということになっていた」"

[[dialogue]]
speaker = "梨緒"
# 「だが彼女は、実はデネブからやってきた、極星学園の生徒だった」
line = "「だが彼女は、実はデネブからやってきた、極星学園の生徒だった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ベアトリスが極星の……！？　どういうこと……！？」
line = "「ベアトリスが極星の……！？　どういうこと……！？」"

[[dialogue]]
speaker = "梨緒"
# 「詳しいことはわからない。だがチナはベアトのことを『副会長』と呼び、ベアトはチナを助けた」
line = "「詳しいことはわからない。だがチナはベアトのことを『副会長』と呼び、ベアトはチナを助けた」"

[[dialogue]]
speaker = "梨緒"
# 「デネブで再会したベアトにそのことを聞くと、極星学園の星徒会副会長であることを認めた」
line = "「デネブで再会したベアトにそのことを聞くと、極星学園の星徒会副会長であることを認めた」"

[[dialogue]]
speaker = "ナターシャ"
# 「へぇ、ただの生徒じゃなくて副会長だったんだ」
line = "「へぇ、ただの生徒じゃなくて副会長だったんだ」"

[[dialogue]]
speaker = "梨緒"
# 「どうして素性を隠して新星学園に入ったのか、私はベアトに聞こうとしたが……逃げられてしまった。ラクシャに見つかったのはその後だ」
line = "「どうして素性を隠して新星学園に入ったのか、私はベアトに聞こうとしたが……逃げられてしまった。ラクシャに見つかったのはその後だ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ふむ。そのベアトリスについてもなんとかしないといけないか。もしスパイだとすれば、重要な情報を持っている可能性がある」
line = "「ふむ。そのベアトリスについてもなんとかしないといけないか。もしスパイだとすれば、重要な情報を持っている可能性がある」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「情報を共有できたところで、これからどう動くか決めたいところだが──」
line = "「情報を共有できたところで、これからどう動くか決めたいところだが──」"

[[dialogue]]
speaker = "梨緒"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「今日はさすがにいろいろありすぎた。もう遅いし、一晩休んでからまた話し合おう」
line = "「今日はさすがにいろいろありすぎた。もう遅いし、一晩休んでからまた話し合おう」"

[[dialogue]]
speaker = "リノ"
# 「ええ、そうね。みんなには休息が必要だわ」
line = "「ええ、そうね。みんなには休息が必要だわ」"

[[dialogue]]
speaker = "リノ"
# 「魔法で秘密基地を拡張して、みんなに個室を用意したわ。デネブに飛ばされて困惑しているだろうけど、今日はゆっくり休んでね」
line = "「魔法で秘密基地を拡張して、みんなに個室を用意したわ。デネブに飛ばされて困惑しているだろうけど、今日はゆっくり休んでね」"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとうございます。デネブでは行く宛てがなかったので、とても助かります」
line = "「ありがとうございます。デネブでは行く宛てがなかったので、とても助かります」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ありがとう、おばあちゃん！　さすが空間の魔女ね！」
line = "「ありがとう、おばあちゃん！　さすが空間の魔女ね！」"

[[dialogue]]
speaker = "リノ"
# 「ふふふ♪　孫の笑顔を見るのは嬉しいものね～♪」
line = "「ふふふ♪　孫の笑顔を見るのは嬉しいものね～♪」"
