[[dialogue]]
speaker = "unk"
# 第３話,お嬢様とサイリウム,P
line = "第３話,お嬢様とサイリウム,P"

[[dialogue]]
speaker = "unk"
# ──ある日の夜、俺はまた繁華街の方へ足を伸ばした。
line = "──ある日の夜、俺はまた繁華街の方へ足を伸ばした。"

[[dialogue]]
speaker = "unk"
# 今日は空腹を埋めるためではなく、エルデリーゼからの直々の呼び出し。
line = "今日は空腹を埋めるためではなく、エルデリーゼからの直々の呼び出し。"

[[dialogue]]
speaker = "unk"
# また夜間外出……いい加減、寮長に見つかったら怒られるぞと思いながら、俺は待ち合わせ場所に向かった。
line = "また夜間外出……いい加減、寮長に見つかったら怒られるぞと思いながら、俺は待ち合わせ場所に向かった。"

[[dialogue]]
speaker = "エルデリーゼ"
# 「──お待ちしておりました、会長様。時間通りですわね」
line = "「──お待ちしておりました、会長様。時間通りですわね」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「不躾ですが時間が押しておりますの。どうぞこれをお持ちになってくださいませ」
line = "「不躾ですが時間が押しておりますの。どうぞこれをお持ちになってくださいませ」"

[[dialogue]]
speaker = "unk"
# これは……サイリウム？
line = "これは……サイリウム？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「さすが会長様、ご存じでしたか。使い方は……そう、パキッと折ると光ります。２本どうぞ」
line = "「さすが会長様、ご存じでしたか。使い方は……そう、パキッと折ると光ります。２本どうぞ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「では移動しながら説明いたします。付いて来てくださいませ！」
line = "「では移動しながら説明いたします。付いて来てくださいませ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「非常に悩みました。１人でも多くの方に協力を願いたいところですが、私の夜間外出は絶対の秘密です」
line = "「非常に悩みました。１人でも多くの方に協力を願いたいところですが、私の夜間外出は絶対の秘密です」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「友人であるアムにも、敬愛するフィオナ会長にもお頼みしづらい用件でしたが……会長様を思い出したのですわ」
line = "「友人であるアムにも、敬愛するフィオナ会長にもお頼みしづらい用件でしたが……会長様を思い出したのですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「お心が広いだけでなく秘密もしっかり守ってくださる。まさに理想のパートナーですので……」
line = "「お心が広いだけでなく秘密もしっかり守ってくださる。まさに理想のパートナーですので……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「今宵の応援を頼ませていただきました」
line = "「今宵の応援を頼ませていただきました」"

[[dialogue]]
speaker = "unk"
# 応援……？
line = "応援……？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はい。応援です。良いですか。今日これから行く場所は、私たちよりも輝くべき者たちがいます。私も会長様も黒子に徹するのですわ」
line = "「はい。応援です。良いですか。今日これから行く場所は、私たちよりも輝くべき者たちがいます。私も会長様も黒子に徹するのですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「その場所の空気を吸えることを感謝しつつも、厳粛に。かつ情熱的に。サイリウムを振り回しましょう」
line = "「その場所の空気を吸えることを感謝しつつも、厳粛に。かつ情熱的に。サイリウムを振り回しましょう」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「今日は私の推し。地下アイドルグループのライブなのですわ……！」
line = "「今日は私の推し。地下アイドルグループのライブなのですわ……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「きゃああああああ！　素敵！　素敵ですわー！」
line = "「きゃああああああ！　素敵！　素敵ですわー！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「大好きー！　ですわ～！」
line = "「大好きー！　ですわ～！」"

[[dialogue]]
speaker = "unk"
# いわゆる地下アイドルのライブに連れて行かれた俺は、エルデリーゼと共に力の限りその場を盛り上げたのだった──
line = "いわゆる地下アイドルのライブに連れて行かれた俺は、エルデリーゼと共に力の限りその場を盛り上げたのだった──"

[[dialogue]]
speaker = "エルデリーゼ"
# 「はー……最っ高でしたわ……メンバー全員が一丸となって歌い踊る……フィナーレまで圧倒されっぱなしでした」
line = "「はー……最っ高でしたわ……メンバー全員が一丸となって歌い踊る……フィナーレまで圧倒されっぱなしでした」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「会長様、ありがとうございます。不慣れな場でもすぐに順応してくださり感無量ですわ」
line = "「会長様、ありがとうございます。不慣れな場でもすぐに順応してくださり感無量ですわ」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「今日はメンバーの方の１人が卒業されることもあり、どうしても盛大に送ってさしあげたかったのです」
line = "「今日はメンバーの方の１人が卒業されることもあり、どうしても盛大に送ってさしあげたかったのです」"

[[dialogue]]
speaker = "unk"
# 地下アイドル、好きだったんだ？
line = "地下アイドル、好きだったんだ？"

[[dialogue]]
speaker = "エルデリーゼ"
# 「あ……はい。ですがこの事は誰にも言わないでくださいね。会長様と私だけの秘密ということで」
line = "「あ……はい。ですがこの事は誰にも言わないでくださいね。会長様と私だけの秘密ということで」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「以前にお話しましたが、私。流星学園の寮に入るまで、ずっとお目付けの厳しい実家にいたのです」
line = "「以前にお話しましたが、私。流星学園の寮に入るまで、ずっとお目付けの厳しい実家にいたのです」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「寮に入り、夜間外出を覚えて間もない頃でした……路上で配られたチラシに誘われ、先ほどのグループのことを知ったのです」
line = "「寮に入り、夜間外出を覚えて間もない頃でした……路上で配られたチラシに誘われ、先ほどのグループのことを知ったのです」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「美しい光景でした。ステージで輝こうとする同世代の少女たちは、とてもまっすぐで……」
line = "「美しい光景でした。ステージで輝こうとする同世代の少女たちは、とてもまっすぐで……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「五名門の私が、誰かを無心で応援できたのです。応援する心情を勘繰られることもなく、政治も絡まない」
line = "「五名門の私が、誰かを無心で応援できたのです。応援する心情を勘繰られることもなく、政治も絡まない」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「それが、それがっ……ものすっごく心地よくって！」
line = "「それが、それがっ……ものすっごく心地よくって！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「星騎士の鍛錬で伸び悩んだ時。アムとの模擬戦に敗れた時。気分が落ち込むたび、彼女たちは元気をくれるのですわ……！」
line = "「星騎士の鍛錬で伸び悩んだ時。アムとの模擬戦に敗れた時。気分が落ち込むたび、彼女たちは元気をくれるのですわ……！」"

[[dialogue]]
speaker = "unk"
# 本当に好きなんだな
line = "本当に好きなんだな"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ええ！　推しのためならこの命、いくらでも賭けられますわ……！」
line = "「ええ！　推しのためならこの命、いくらでも賭けられますわ……！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「……っと。すみません。私、彼女たちのことが絡むとつい熱くなってしまうようで……」
line = "「……っと。すみません。私、彼女たちのことが絡むとつい熱くなってしまうようで……」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「え……？　会長様も、元気をもらえたのですか？　……また、ライブに連れて行ってほしい……？」
line = "「え……？　会長様も、元気をもらえたのですか？　……また、ライブに連れて行ってほしい……？」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「ふふっ！　ぜひ！　こちらこそ、よろしくお願いいたしますわ！　ファンは多ければ多いほど、彼女たちは輝くのです！」
line = "「ふふっ！　ぜひ！　こちらこそ、よろしくお願いいたしますわ！　ファンは多ければ多いほど、彼女たちは輝くのです！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「そうと決まれば予習が必要ですわね。リリースされたＣＤはすべて購入しております。またお貸ししますわ！」
line = "「そうと決まれば予習が必要ですわね。リリースされたＣＤはすべて購入しております。またお貸ししますわ！」"

[[dialogue]]
speaker = "エルデリーゼ"
# 「頑張って盛り上げていきましょうね、会長様！」
line = "「頑張って盛り上げていきましょうね、会長様！」"

[[dialogue]]
speaker = "unk"
# 食いしん坊で、好奇心の強いお嬢様・エルデリーゼ。そんな彼女の新たな一面を知ることができた。
line = "食いしん坊で、好奇心の強いお嬢様・エルデリーゼ。そんな彼女の新たな一面を知ることができた。"

[[dialogue]]
speaker = "unk"
# 華やかに歌い、踊るアイドルたちから元気をもらえたのは俺も同じ。明日以降も星騎士としての活動を頑張ろう──そう思ったのだった。
line = "華やかに歌い、踊るアイドルたちから元気をもらえたのは俺も同じ。明日以降も星騎士としての活動を頑張ろう──そう思ったのだった。"
