[[dialogue]]
speaker = "unk"
# 第１話,ハニートラップマイン,P
line = "第１話,ハニートラップマイン,P"

[[dialogue]]
speaker = "unk"
# マインと恋人として付き合い始めてからしばらく経ち、迎えた夏のある日。
line = "マインと恋人として付き合い始めてからしばらく経ち、迎えた夏のある日。"

[[dialogue]]
speaker = "unk"
# 俺はマインとリゾート結界へ遊びに来ていた――
line = "俺はマインとリゾート結界へ遊びに来ていた――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　会長～♪」
line = "「にひひ♪　会長～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「公安委員会の件もひと段落して、やっと２人きりで海で遊べるね♪」
line = "「公安委員会の件もひと段落して、やっと２人きりで海で遊べるね♪」"

[[dialogue]]
speaker = "unk"
# 水着姿、今日も似合ってるよ
line = "水着姿、今日も似合ってるよ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひっ、わざわざ褒め直すなんて、紳士なこと言うじゃ～ん」
line = "「にひっ、わざわざ褒め直すなんて、紳士なこと言うじゃ～ん」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――２人で海デートしに来たから、改めてちゃんと言いたかったって？」
line = "「――２人で海デートしに来たから、改めてちゃんと言いたかったって？」"

[[dialogue]]
speaker = "unk"
# それに、恋人フィルターを無視したとしても、マインの水着姿はついつい見惚れてしまうくらいに可愛い。
line = "それに、恋人フィルターを無視したとしても、マインの水着姿はついつい見惚れてしまうくらいに可愛い。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そこまで褒めてくれるなら、素直に受け取っておこうかな♪　この水着フォームの元になったのは、私自身で選んだやつだしね」
line = "「そこまで褒めてくれるなら、素直に受け取っておこうかな♪　この水着フォームの元になったのは、私自身で選んだやつだしね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それじゃあ会長、デート始めよっか<emoji=heart04>」
line = "「それじゃあ会長、デート始めよっか<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# まずは２人で結界内を散歩しようとなり、ビーチを歩いていたのだが――マインは美少女で目立つ容姿をしている為、周囲から注目を浴びる。
line = "まずは２人で結界内を散歩しようとなり、ビーチを歩いていたのだが――マインは美少女で目立つ容姿をしている為、周囲から注目を浴びる。"

[[dialogue]]
speaker = "unk"
# 俺がちょっと目を離していると、どこぞの男がナンパして来て――
line = "俺がちょっと目を離していると、どこぞの男がナンパして来て――"

[[dialogue]]
speaker = "男"
# 「ねぇ、キミ可愛いね～。俺と遊ばない？」
line = "「ねぇ、キミ可愛いね～。俺と遊ばない？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ごめんね～。残念だけど私、彼氏いるんだ～」
line = "「ごめんね～。残念だけど私、彼氏いるんだ～」"

[[dialogue]]
speaker = "unk"
# ネーゼマインはこちらに駆け寄ると、腕に抱き着いてきて、俺は思わずドキッとしてしまう。
line = "ネーゼマインはこちらに駆け寄ると、腕に抱き着いてきて、俺は思わずドキッとしてしまう。"

[[dialogue]]
speaker = "unk"
# 水着で肌面積が多い為、マインの<b>柔らかな部分</b>の感触が、腕にダイレクトに伝わって来る。
line = "水着で肌面積が多い為、マインの<b>柔らかな部分</b>の感触が、腕にダイレクトに伝わって来る。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあね～」
line = "「じゃあね～」"

[[dialogue]]
speaker = "unk"
# 恨めしそうな視線を俺に向けつつ去っていく男に、手を振って見送るマイン。
line = "恨めしそうな視線を俺に向けつつ去っていく男に、手を振って見送るマイン。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「これくらいくっ付いてるところ見せとけば、ナンパも諦めるでしょ」
line = "「これくらいくっ付いてるところ見せとけば、ナンパも諦めるでしょ」"

[[dialogue]]
speaker = "unk"
# そう言うと、彼女はあっさりと俺の腕から離れる。
line = "そう言うと、彼女はあっさりと俺の腕から離れる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「さて、散歩の続きをしよっか☆」
line = "「さて、散歩の続きをしよっか☆」"

[[dialogue]]
speaker = "unk"
# それからしばらくして、俺とマインは海に入り、彼女の能力で作った『水風船』でバレーを行っていた。
line = "それからしばらくして、俺とマインは海に入り、彼女の能力で作った『水風船』でバレーを行っていた。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははっ☆　これで私の３連勝～♪　会長、弱～い☆」
line = "「きゃははっ☆　これで私の３連勝～♪　会長、弱～い☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――水風船を割らないコツが分かってきたって？　本当かな～？」
line = "「――水風船を割らないコツが分かってきたって？　本当かな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ、次の水風船行くよ～♪」
line = "「じゃあ、次の水風船行くよ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「おっと」
line = "「おっと」"

[[dialogue]]
speaker = "unk"
# 水風船を投げようと前のめりになって、姿勢を崩したマイン。俺は咄嗟にそれを支える。
line = "水風船を投げようと前のめりになって、姿勢を崩したマイン。俺は咄嗟にそれを支える。"

[[dialogue]]
speaker = "unk"
# マインと肌がくっ付いて、今にも唇が触れあいそうな距離。目も合って、お互いに見つめ合う。
line = "マインと肌がくっ付いて、今にも唇が触れあいそうな距離。目も合って、お互いに見つめ合う。"

[[dialogue]]
speaker = "unk"
# マイン……
line = "マイン……"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長、支えてくれてありがと♪」
line = "「会長、支えてくれてありがと♪」"

[[dialogue]]
speaker = "unk"
# しかし、お礼を言って、さっと体を離すマイン。
line = "しかし、お礼を言って、さっと体を離すマイン。"

[[dialogue]]
speaker = "unk"
# そんなことが続き、俺は彼女に正直な気持ちを伝えることにした。
line = "そんなことが続き、俺は彼女に正直な気持ちを伝えることにした。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～？　どうしたの、会長？」
line = "「ん～？　どうしたの、会長？」"

[[dialogue]]
speaker = "unk"
# ……マインと触れ合いたい
line = "……マインと触れ合いたい"

[[dialogue]]
speaker = "unk"
# すると彼女は、わざとらしく悪戯っぽい笑みを浮かべて――
line = "すると彼女は、わざとらしく悪戯っぽい笑みを浮かべて――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪」
line = "「にひひ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え～？　私まだ、海で遊び足りないんだけどな～？」
line = "「え～？　私まだ、海で遊び足りないんだけどな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まあ、恋人だし、会長がそういうことをしたいっていうなら仕方ないけど♪」
line = "「まあ、恋人だし、会長がそういうことをしたいっていうなら仕方ないけど♪」"

[[dialogue]]
speaker = "unk"
# 俺たちは他に人がいないプライベートビーチの方へと移動する。
line = "俺たちは他に人がいないプライベートビーチの方へと移動する。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それで？　会長はこんな誰も見ていないところに連れ込んで、私とどんなスキンシップがお望みなのかな～？」
line = "「それで？　会長はこんな誰も見ていないところに連れ込んで、私とどんなスキンシップがお望みなのかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――ん～？　ハグしたいの？　仕方ないな～♪」
line = "「――ん～？　ハグしたいの？　仕方ないな～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ、会長の方からどうぞ♪」
line = "「じゃあ、会長の方からどうぞ♪」"

[[dialogue]]
speaker = "unk"
# 俺は彼女の体を抱き寄せる。
line = "俺は彼女の体を抱き寄せる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んっ<emoji=heart04>　にひっ……<emoji=heart04>　そんな、ぎゅ～ってしたかったんだ？」
line = "「んっ<emoji=heart04>　にひっ……<emoji=heart04>　そんな、ぎゅ～ってしたかったんだ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「水着だから、お肌の触れ合い密度マシマシだね<emoji=heart04>」
line = "「水着だから、お肌の触れ合い密度マシマシだね<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはっ<emoji=heart04>　背中に回した手の触れ方が、なんかすごくエッチな感じがするんだけど～<emoji=heart04>」
line = "「きゃはっ<emoji=heart04>　背中に回した手の触れ方が、なんかすごくエッチな感じがするんだけど～<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん？　なぁに、会長、聞きたいことって？」
line = "「ん？　なぁに、会長、聞きたいことって？」"

[[dialogue]]
speaker = "unk"
# もしかして今日、わざと誘うようにしてた？
line = "もしかして今日、わざと誘うようにしてた？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　なんのことかな～？」
line = "「にひひ♪　なんのことかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それで？　会長はもう、スキンシップは満足なのかな？」
line = "「それで？　会長はもう、スキンシップは満足なのかな？」"

[[dialogue]]
speaker = "unk"
# キスがしたい
line = "キスがしたい"

[[dialogue]]
speaker = "ネーゼマイン"
# 「仕方ないな～」
line = "「仕方ないな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～……<emoji=heart04>」
line = "「ん～……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はい、これでいい？　――もっとしたいの？」
line = "「はい、これでいい？　――もっとしたいの？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　会長ってばエッチ～<emoji=heart04>」
line = "「にひひ♪　会長ってばエッチ～<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マインはからかいながらも、俺の要望に応えてくれる。
line = "マインはからかいながらも、俺の要望に応えてくれる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ん～<emoji=heart04>　ちゅっ<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# それからも、俺たちは２人きりの海で、甘いスキンシップの時間を楽しむのだった――
line = "それからも、俺たちは２人きりの海で、甘いスキンシップの時間を楽しむのだった――"
