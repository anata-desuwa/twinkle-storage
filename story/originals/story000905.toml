[[dialogue]]
speaker = "ユウリ"
# 「はぁ、男ってホントアホだな……」
line = "「はぁ、男ってホントアホだな……」"

[[dialogue]]
speaker = "ユーリス"
# 「コ、コホン。ユウリさんの言うとおりだよ会長。そんな風にベタベタしてくる女性が好みだったのかい？　チップまであげて……」
line = "「コ、コホン。ユウリさんの言うとおりだよ会長。そんな風にベタベタしてくる女性が好みだったのかい？　チップまであげて……」"

[[dialogue]]
speaker = "セーラ"
# 「ふふ、その言い方だとまるで会長さんがうちに誘惑されちって、ヤキモチ焼いてるように聞こえるけど～」
line = "「ふふ、その言い方だとまるで会長さんがうちに誘惑されちって、ヤキモチ焼いてるように聞こえるけど～」"

