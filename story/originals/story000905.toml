line = "「めっちゃ真面目に仕事してた！」"

[[dialogue]]
speaker = "セーラ"
# 「ついでに聞き込みしてたら、なんかいっぱいチップ貰っちった♪」
line = "「ついでに聞き込みしてたら、なんかいっぱいチップ貰っちった♪」"

[[dialogue]]
speaker = "ユウリ"
# 「副収入まで！？」
line = "「副収入まで！？」"

[[dialogue]]
speaker = "セーラ"
# 「ふふ、このバイト相当儲かるよ♪　ユウリちゃんもお客さんに聞き込みして回ったら？」
line = "「ふふ、このバイト相当儲かるよ♪　ユウリちゃんもお客さんに聞き込みして回ったら？」"

[[dialogue]]
speaker = "ユウリ"
# 「あ、あたしはセーラさんほど節操なしじゃないんすよ！」
line = "「あ、あたしはセーラさんほど節操なしじゃないんすよ！」"

[[dialogue]]
speaker = "セーラ"
# 「人を尻軽みたいにゆーなし。ま、九浄家のカジノだけあって、鼻の下伸ばしたおじさまなんてそうそういないけどね」
line = "「人を尻軽みたいにゆーなし。ま、九浄家のカジノだけあって、鼻の下伸ばしたおじさまなんてそうそういないけどね」"

[[dialogue]]
speaker = "unk"
# 良かった……
line = "良かった……"

[[dialogue]]
speaker = "セーラ"
# 「ん～？　もしかして会長さんも心配しちゃってた感じ？　ふふ、うちのバニーガール姿、独り占めにしておきたいんだ？」
line = "「ん～？　もしかして会長さんも心配しちゃってた感じ？　ふふ、うちのバニーガール姿、独り占めにしておきたいんだ？」"

[[dialogue]]
speaker = "ユウリ"
# 「え……今すぐ出てけ、同じ空気吸いたくねえ」
