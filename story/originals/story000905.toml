speaker = "セーラ"
# 「……あれ？　冗談で言ったつもりだったのにこの反応……。王子って、そっちの人だったり？」
line = "「……あれ？　冗談で言ったつもりだったのにこの反応……。王子って、そっちの人だったり？」"

