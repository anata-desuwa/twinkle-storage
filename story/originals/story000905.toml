[[dialogue]]
speaker = "セーラ"
# 「でもでも、ユウリちゃんに目移りしてる間は独り占めはさせてあげないよ♪　うちだけを見てくんなきゃ……ね？（谷間チラチラっ<emoji=heart04>）」
line = "「でもでも、ユウリちゃんに目移りしてる間は独り占めはさせてあげないよ♪　うちだけを見てくんなきゃ……ね？（谷間チラチラっ<emoji=heart04>）」"

[[dialogue]]
speaker = "unk"
# チップをどうぞ！
