line = "「うぅ……もう帰りてぇ……。女の子らしい格好してみたいとは思ってたけど、こういうのじゃねえし……」"

[[dialogue]]
speaker = "unk"
# 笑顔を忘れてるよ
line = "笑顔を忘れてるよ"

[[dialogue]]
speaker = "ユウリ"
# 「うわっ、急になんだっ！？　つか人の仕事ぶりコソコソ観察してんじゃねえ！　過保護なお兄ちゃんか！」
line = "「うわっ、急になんだっ！？　つか人の仕事ぶりコソコソ観察してんじゃねえ！　過保護なお兄ちゃんか！」"

[[dialogue]]
speaker = "ユウリ"
# 「てかやっぱあたしにはバニーガールなんて無理だって……！　ぜってーなんだコイツって目で見られてっから……！」
line = "「てかやっぱあたしにはバニーガールなんて無理だって……！　ぜってーなんだコイツって目で見られてっから……！」"

[[dialogue]]
speaker = "ユウリ"
# 「会長さんだって思ってんだろっ？　似合わねえ格好してんなって！」
line = "「会長さんだって思ってんだろっ？　似合わねえ格好してんなって！」"

[[dialogue]]
speaker = "unk"
# よく似合っててかわいいと思うけど
line = "よく似合っててかわいいと思うけど"

[[dialogue]]
speaker = "ユウリ"
# 「かわい──～～っっ！　またあんたはそういうナンパなセリフを……！　褒めときゃ女が喜ぶと思ったら大間違いだってのっ！」
line = "「かわい──～～っっ！　またあんたはそういうナンパなセリフを……！　褒めときゃ女が喜ぶと思ったら大間違いだってのっ！」"

[[dialogue]]
speaker = "セーラ"
# 「あっれー、ユウリちゃん、なんかいいことあったー？　なんかすっごいにやけてるケド」
line = "「あっれー、ユウリちゃん、なんかいいことあったー？　なんかすっごいにやけてるケド」"

[[dialogue]]
speaker = "ユウリ"
# 「ににに、にやけてねえっすよ！　つかどこ行ってたんすかっ！」
line = "「ににに、にやけてねえっすよ！　つかどこ行ってたんすかっ！」"

[[dialogue]]
speaker = "セーラ"
# 「給仕しながら店内の見回りをしてたんだよ～。ほらモンスターが隠れ潜んでるかもって話だったじゃん？」
line = "「給仕しながら店内の見回りをしてたんだよ～。ほらモンスターが隠れ潜んでるかもって話だったじゃん？」"

[[dialogue]]
speaker = "ユウリ"
