[[dialogue]]
speaker = "unk"
# 第４話,お姉ちゃんはどこにもいかない,P
line = "第４話,お姉ちゃんはどこにもいかない,P"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、ちょっと時間あるかしら～？」
line = "「会長くん、ちょっと時間あるかしら～？」"

[[dialogue]]
speaker = "サーシャ"
# 「そのマント、少し糸が解れちゃってない？　そのままだとカッコつかないから、縫い直させてもらっていいかしら？」
line = "「そのマント、少し糸が解れちゃってない？　そのままだとカッコつかないから、縫い直させてもらっていいかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、本当ね。端っこのほう糸が解れちゃってるわ。サーシャさんが作ってくれたものなんだから、もっと丁寧に扱わないとダメよ？」
line = "「あら、本当ね。端っこのほう糸が解れちゃってるわ。サーシャさんが作ってくれたものなんだから、もっと丁寧に扱わないとダメよ？」"

[[dialogue]]
speaker = "unk"
# これ、サーシャさんの手縫いなんですか！？
line = "これ、サーシャさんの手縫いなんですか！？"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。ヴィーナスちゃんに頼まれてね～。もう代替わりしちゃうなんて、作った半年前には想像もつかなかったわ」
line = "「うふふ。ヴィーナスちゃんに頼まれてね～。もう代替わりしちゃうなんて、作った半年前には想像もつかなかったわ」"

[[dialogue]]
speaker = "サーシャ"
# 「と、いうわけで。裁縫セットを買いに行こうと思うの。会長くんはどうする～？」
line = "「と、いうわけで。裁縫セットを買いに行こうと思うの。会長くんはどうする～？」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃん、１人で買い出しに行くのは寂しいな～♪」
line = "「お姉ちゃん、１人で買い出しに行くのは寂しいな～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ。お仕事以外でこうして浅草に立ち寄るのは久しぶりね～。あら、あんなところに新しいお店ができてるわね。ちょっと寄ってみようかしら～♪」
line = "「ふふっ。お仕事以外でこうして浅草に立ち寄るのは久しぶりね～。あら、あんなところに新しいお店ができてるわね。ちょっと寄ってみようかしら～♪」"

[[dialogue]]
speaker = "unk"
# 裁縫セットを買いに来ただけなのに
line = "裁縫セットを買いに来ただけなのに"

[[dialogue]]
speaker = "サーシャ"
# 「え～？　せっかくお外に出たんだから、どこか寄っていかないと損じゃない。会長くんも急ぎの仕事はないって言ってたわよね？」
line = "「え～？　せっかくお外に出たんだから、どこか寄っていかないと損じゃない。会長くんも急ぎの仕事はないって言ってたわよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「それはつまり、お姉ちゃんに付き合ってくれるってことよね♪」
line = "「それはつまり、お姉ちゃんに付き合ってくれるってことよね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「さ、この人混みだと迷子になるといけないから、手を繋ぎましょ。ほーら♪」
line = "「さ、この人混みだと迷子になるといけないから、手を繋ぎましょ。ほーら♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あら？　いい匂い～。こっちのほうからかしら～？」
line = "「あら？　いい匂い～。こっちのほうからかしら～？」"

[[dialogue]]
speaker = "サーシャ"
# 「なんだか珍しそうなものを売ってるわね～。どれどれ……♪」
line = "「なんだか珍しそうなものを売ってるわね～。どれどれ……♪」"

[[dialogue]]
speaker = "サーシャ"
# 「これが有名な雷おこし？　アナちゃんが好きそう～」
line = "「これが有名な雷おこし？　アナちゃんが好きそう～」"

[[dialogue]]
speaker = "サーシャ"
# 「このストラップ、可愛いわ～。みんなにもひとつずつ買っていってあげましょう、ふふっ♪」
line = "「このストラップ、可愛いわ～。みんなにもひとつずつ買っていってあげましょう、ふふっ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「どう？　寄り道も楽しくないかしら？　いつもお友達からは、ふらふら１人で放浪する癖があるから危なっかしいって言われるんだけど……」
line = "「どう？　寄り道も楽しくないかしら？　いつもお友達からは、ふらふら１人で放浪する癖があるから危なっかしいって言われるんだけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「今日はこうして手を繋いでるから、安心ね♪」
line = "「今日はこうして手を繋いでるから、安心ね♪」"

[[dialogue]]
speaker = "サーシャ"
# 「それに……これってなんだか、デートみたいだと思わない？」
line = "「それに……これってなんだか、デートみたいだと思わない？」"

[[dialogue]]
speaker = "unk"
# い、言われてみれば……
line = "い、言われてみれば……"

[[dialogue]]
speaker = "サーシャ"
# 「だけど実は私、デートがどういうものなのか、よくわからないのよね～。今のも、読んだ本を参考にして、なんとなくなぞってみただけなの。ごめんなさい」
line = "「だけど実は私、デートがどういうものなのか、よくわからないのよね～。今のも、読んだ本を参考にして、なんとなくなぞってみただけなの。ごめんなさい」"

[[dialogue]]
speaker = "サーシャ"
# 「……私、昔から恋愛ってものに疎くて、あまり人を好きになったりしたことがないの」
line = "「……私、昔から恋愛ってものに疎くて、あまり人を好きになったりしたことがないの」"

[[dialogue]]
speaker = "サーシャ"
# 「恋愛ものの小説とかドラマを見ても、よくわかんないな～、つまんないな～って思っちゃうのよね……」
line = "「恋愛ものの小説とかドラマを見ても、よくわかんないな～、つまんないな～って思っちゃうのよね……」"

[[dialogue]]
speaker = "サーシャ"
# 「でも、会長くんとだったら、もしかしたらわかるかもしれないな～って、思ったのよ」
line = "「でも、会長くんとだったら、もしかしたらわかるかもしれないな～って、思ったのよ」"

[[dialogue]]
speaker = "unk"
# どうして、俺なんです？
line = "どうして、俺なんです？"

[[dialogue]]
speaker = "サーシャ"
# 「──私の、大切な存在だからよ」
line = "「──私の、大切な存在だからよ」"

[[dialogue]]
speaker = "サーシャ"
# 「男の子でここまで大事にしたいって思った人は、たぶん会長くんが初めて……。星徒会は家族だって思ってるから、やっぱり恋愛とは少し違うのかもしれないけど……」
line = "「男の子でここまで大事にしたいって思った人は、たぶん会長くんが初めて……。星徒会は家族だって思ってるから、やっぱり恋愛とは少し違うのかもしれないけど……」"

[[dialogue]]
speaker = "サーシャ"
# 「それでも、『もしかしたら』って期待しちゃうじゃない？　うふふ♪」
line = "「それでも、『もしかしたら』って期待しちゃうじゃない？　うふふ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「それに、前に図書館で言ってくれたこと……私がいなくなると寂しいから、一緒についてきてくれるって言ってたでしょ？」
line = "「それに、前に図書館で言ってくれたこと……私がいなくなると寂しいから、一緒についてきてくれるって言ってたでしょ？」"

[[dialogue]]
speaker = "サーシャ"
# 「あの言葉で少しだけ……ほんの少しだけ、ドキッとした気がするのよ、私」
line = "「あの言葉で少しだけ……ほんの少しだけ、ドキッとした気がするのよ、私」"

[[dialogue]]
speaker = "サーシャ"
# 「だから、そんな会長くんにお願い。──私に、恋をする気持ちを、教えてくれないかしら？」
line = "「だから、そんな会長くんにお願い。──私に、恋をする気持ちを、教えてくれないかしら？」"

[[dialogue]]
speaker = "unk"
# ……俺は、何をすれば？
line = "……俺は、何をすれば？"

[[dialogue]]
speaker = "サーシャ"
# 「付き合ってくれるのね、さすが会長くん♪　頼りになるわ～♪」
line = "「付き合ってくれるのね、さすが会長くん♪　頼りになるわ～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「とりあえず、私のしたいことに付き合ってくれるかしら？　本を読むよりも、実際に体験してみないとわからないことは沢山あるから♪」
line = "「とりあえず、私のしたいことに付き合ってくれるかしら？　本を読むよりも、実際に体験してみないとわからないことは沢山あるから♪」"

[[dialogue]]
speaker = "サーシャ"
# 「腕を組んじゃったり～♪」
line = "「腕を組んじゃったり～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「手を握っちゃったり～♪」
line = "「手を握っちゃったり～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「あとは、またお姉ちゃんって呼んでくれたら完ぺきよ♪」
line = "「あとは、またお姉ちゃんって呼んでくれたら完ぺきよ♪」"

[[dialogue]]
speaker = "unk"
# 恋愛を知りたいって話でしたよね！？
line = "恋愛を知りたいって話でしたよね！？"

[[dialogue]]
speaker = "unk"
# お姉ちゃん！？
line = "お姉ちゃん！？"

[[dialogue]]
speaker = "サーシャ"
# 「あとはそうね～、恋愛で思い付くものというと……」
line = "「あとはそうね～、恋愛で思い付くものというと……」"

[[dialogue]]
speaker = "サーシャ"
# 「──キス、とか？」
line = "「──キス、とか？」"

[[dialogue]]
speaker = "unk"
# それはさすがに、今はマズいのでは！？
line = "それはさすがに、今はマズいのでは！？"

[[dialogue]]
speaker = "サーシャ"
# 「むぅ～、お姉ちゃんとキスするのは嫌なの～？」
line = "「むぅ～、お姉ちゃんとキスするのは嫌なの～？」"

[[dialogue]]
speaker = "サーシャ"
# 「──なーんてね。冗談よ。いくらなんでも、お試しでやることじゃないわよね～」
line = "「──なーんてね。冗談よ。いくらなんでも、お試しでやることじゃないわよね～」"

[[dialogue]]
speaker = "サーシャ"
# 「そういうことは……本当に好きになった時の為にとっておかないと、もったいないもの♪」
line = "「そういうことは……本当に好きになった時の為にとっておかないと、もったいないもの♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、顔真っ赤になっちゃって、会長くんは本当に可愛いわね～♪　この気持ちが『好き』って気持ちだったら、こんなに悩まなくてもよかったのに～」
line = "「ふふっ、顔真っ赤になっちゃって、会長くんは本当に可愛いわね～♪　この気持ちが『好き』って気持ちだったら、こんなに悩まなくてもよかったのに～」"

[[dialogue]]
speaker = "サーシャ"
# 「これからは、色んなことを会長くんに教えてもらうんだから」
line = "「これからは、色んなことを会長くんに教えてもらうんだから」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃんに黙って、居なくなったりしちゃダメよ？」
line = "「お姉ちゃんに黙って、居なくなったりしちゃダメよ？」"

[[dialogue]]
speaker = "unk"
# それって……
line = "それって……"

[[dialogue]]
speaker = "unk"
# 振り向くとそこには、サーシャさんの包み込むような柔らかな笑顔があって。
line = "振り向くとそこには、サーシャさんの包み込むような柔らかな笑顔があって。"

[[dialogue]]
speaker = "unk"
# 俺は繋いだ手が離れないように、そっと握り返すのだった。
line = "俺は繋いだ手が離れないように、そっと握り返すのだった。"
