[[dialogue]]
speaker = "unk"
# 第１１話,手負いの堕天使,B
line = "第１１話,手負いの堕天使,B"

[[dialogue]]
speaker = "サーシャ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "セーラ"
# 「今、なんか……」
line = "「今、なんか……」"

[[dialogue]]
speaker = "unk"
# 彼女たちの振り向いた先──
line = "彼女たちの振り向いた先──"

[[dialogue]]
speaker = "unk"
# そこには、混沌の瘴気をまとった化け物が顕現していた。
line = "そこには、混沌の瘴気をまとった化け物が顕現していた。"

[[dialogue]]
speaker = "アルモタヘル"
# 「……ヅ……グ……ア……！」
line = "「……ヅ……グ……ア……！」"

[[dialogue]]
speaker = "市民Ａ"
# 「え──何あれ、モンスター……？　……きゃあぁっ！」
line = "「え──何あれ、モンスター……？　……きゃあぁっ！」"

[[dialogue]]
speaker = "ユウリ"
# 「っ──近くの皆さん、なるべく遠くへ避難してください！　まだ、危ない存在かどうかはわかんねえけど──！」
line = "「っ──近くの皆さん、なるべく遠くへ避難してください！　まだ、危ない存在かどうかはわかんねえけど──！」"

[[dialogue]]
speaker = "unk"
# 突如、街中に現れた異形の存在。
line = "突如、街中に現れた異形の存在。"

[[dialogue]]
speaker = "unk"
# その邪悪なる気配に危機を察して、星徒会連合は惑う市民たちの避難を誘導する。
line = "その邪悪なる気配に危機を察して、星徒会連合は惑う市民たちの避難を誘導する。"

[[dialogue]]
speaker = "ソフィア"
# 「翼があります。あれは……」
line = "「翼があります。あれは……」"

[[dialogue]]
speaker = "セーラ"
# 「前にアステラで見たヒトに近いね。堕天使──ってやつだっけ？」
line = "「前にアステラで見たヒトに近いね。堕天使──ってやつだっけ？」"

[[dialogue]]
speaker = "ユウリ"
# 「でもよ、ここはアステラでもねえのに……」
line = "「でもよ、ここはアステラでもねえのに……」"

[[dialogue]]
speaker = "unk"
# 流星学園の四人はその姿に既視感を覚えた。
line = "流星学園の四人はその姿に既視感を覚えた。"

[[dialogue]]
speaker = "unk"
# 一方で、アナは対象の状態を分析する。
line = "一方で、アナは対象の状態を分析する。"

[[dialogue]]
speaker = "アナ"
# 「……怪我をしています。それから全身を覆う<ruby=リクリエ>再構築</ruby>の瘴気。眼の焦点は合っていません」
line = "「……怪我をしています。それから全身を覆う<ruby>再構築<rt>リクリエ</rt></ruby>の瘴気。眼の焦点は合っていません」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ア……ア……グッ……ヅゥッ……ニン……ゲン」
line = "「ア……ア……グッ……ヅゥッ……ニン……ゲン」"

[[dialogue]]
speaker = "unk"
# ふらふらと、闇の瘴気を振りまきながらさまよう堕天使。
line = "ふらふらと、闇の瘴気を振りまきながらさまよう堕天使。"

[[dialogue]]
speaker = "unk"
# その虚ろな瞳がマトイの姿を捉えた。
line = "その虚ろな瞳がマトイの姿を捉えた。"

[[dialogue]]
speaker = "アルモタヘル"
# 「……人間」
line = "「……人間」"

[[dialogue]]
speaker = "マトイ"
# 「……え、え？」
line = "「……え、え？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……魔族」
line = "「……魔族」"

[[dialogue]]
speaker = "サーシャ"
# 「……私？」
line = "「……私？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「……天使」
line = "「……天使」"

[[dialogue]]
speaker = "ルリエル"
# 「はい、ルリエルは天使です！　堕天使さんも……」
line = "「はい、ルリエルは天使です！　堕天使さんも……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人間──天使──魔族──」
line = "「人間──天使──魔族──」"

[[dialogue]]
speaker = "unk"
# セーラに、アナに、ソフィアに……
line = "セーラに、アナに、ソフィアに……"

[[dialogue]]
speaker = "unk"
# ひとりひとり、堕天使は魔女のような爪先で確認していく。
line = "ひとりひとり、堕天使は魔女のような爪先で確認していく。"

[[dialogue]]
speaker = "アルモタヘル"
# 「魔族……否。人間？」
line = "「魔族……否。人間？」"

[[dialogue]]
speaker = "ユウリ"
# 「ああ。あたしはハーフだからな──一応、人間界で生まれたから人間か？」
line = "「ああ。あたしはハーフだからな──一応、人間界で生まれたから人間か？」"

[[dialogue]]
speaker = "unk"
# そして最後にユウリ。
line = "そして最後にユウリ。"

[[dialogue]]
speaker = "unk"
# 彼女の姿を見たアルモタヘルは、さらに苦しそうな声を上げて呻き始めた。
line = "彼女の姿を見たアルモタヘルは、さらに苦しそうな声を上げて呻き始めた。"

[[dialogue]]
speaker = "アルモタヘル"
# 「ココハ……人間界……故……否……アア……面倒ダ」
line = "「ココハ……人間界……故……否……アア……面倒ダ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「全員、去レ」
line = "「全員、去レ」"

[[dialogue]]
speaker = "ユウリ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "アナ"
# 「！　ユウリ先輩──大丈夫ですか！？」
line = "「！　ユウリ先輩──大丈夫ですか！？」"

[[dialogue]]
speaker = "ユウリ"
# 「っっ、ああ……！　あたしじゃなかったらヤバかったかもしれねえけどな」
line = "「っっ、ああ……！　あたしじゃなかったらヤバかったかもしれねえけどな」"

[[dialogue]]
speaker = "unk"
# <ruby=かいな>腕</ruby>の一振りにより生じた闇の熱線は、最前線にいたユウリがハルバードを振るい受け止めた。
line = "<ruby>腕<rt>かいな</rt></ruby>の一振りにより生じた闇の熱線は、最前線にいたユウリがハルバードを振るい受け止めた。"

[[dialogue]]
speaker = "unk"
# 事実、ユウリの目算通り──食らったのが彼女でなければ致命傷となりえていただろう。
line = "事実、ユウリの目算通り──食らったのが彼女でなければ致命傷となりえていただろう。"

[[dialogue]]
speaker = "アルモタヘル"
# 「消エロ……滅ベ……総テヲ……零ニ……」
line = "「消エロ……滅ベ……総テヲ……零ニ……」"

[[dialogue]]
speaker = "unk"
# 呪詛を濛々と呟いて迫る堕天使。
line = "呪詛を濛々と呟いて迫る堕天使。"

[[dialogue]]
speaker = "unk"
# 緩やかに羽ばたくその邪翼からは、濃紫の瘴気が一帯に吹き散らされていた。
line = "緩やかに羽ばたくその邪翼からは、濃紫の瘴気が一帯に吹き散らされていた。"

[[dialogue]]
speaker = "サーシャ"
# 「前の堕天使さんはどうだったのかしら、ソフィ」
line = "「前の堕天使さんはどうだったのかしら、ソフィ」"

[[dialogue]]
speaker = "ソフィア"
# 「フィオナ会長と私たちでやっつけたら正気に戻ってくれました。なので、今回も……」
line = "「フィオナ会長と私たちでやっつけたら正気に戻ってくれました。なので、今回も……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「人間──魔族──天使──消エテ、無クナレッ！」
line = "「人間──魔族──天使──消エテ、無クナレッ！」"

[[dialogue]]
speaker = "unk"
# 今度は全員が攻撃の回避に成功する。
line = "今度は全員が攻撃の回避に成功する。"

[[dialogue]]
speaker = "unk"
# その刹那、ソフィアが堕天使の体に何かを発見した。
line = "その刹那、ソフィアが堕天使の体に何かを発見した。"

[[dialogue]]
speaker = "ソフィア"
# 「っ──！　ユウリ先輩、右肩のところを見てください！」
line = "「っ──！　ユウリ先輩、右肩のところを見てください！」"

[[dialogue]]
speaker = "ユウリ"
# 「──？　ああ──なんか焼けてるっぽいな？」
line = "「──？　ああ──なんか焼けてるっぽいな？」"

[[dialogue]]
speaker = "ソフィア"
# 「あれはフィオナ会長の──エクリプスディザスターの焦げ跡です！　間違いありません！」
line = "「あれはフィオナ会長の──エクリプスディザスターの焦げ跡です！　間違いありません！」"

[[dialogue]]
speaker = "ユウリ"
# 「！？　言われてみりゃあ、確かに……」
line = "「！？　言われてみりゃあ、確かに……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「フィオ……ナ……？　ググ……人間、血族、魔王ノ……」
line = "「フィオ……ナ……？　ググ……人間、血族、魔王ノ……」"

[[dialogue]]
speaker = "セーラ"
# 「フィオナちゃんの術の痕、それから半端ない紫の瘴気……ふーん」
line = "「フィオナちゃんの術の痕、それから半端ない紫の瘴気……ふーん」"

[[dialogue]]
speaker = "サーシャ"
# 「なんとなく、どこから来たのかわかっちゃったわね」
line = "「なんとなく、どこから来たのかわかっちゃったわね」"

[[dialogue]]
speaker = "unk"
# 彼らは全員がこの流星市国にそびえる一柱の塔を見やる。
line = "彼らは全員がこの流星市国にそびえる一柱の塔を見やる。"

[[dialogue]]
speaker = "unk"
# フィーニスの塔──
line = "フィーニスの塔──"

[[dialogue]]
speaker = "unk"
# そこは今まさに彼らのトップ、クロトら三名が乗り込んでいるはずの舞台だった。
line = "そこは今まさに彼らのトップ、クロトら三名が乗り込んでいるはずの舞台だった。"

[[dialogue]]
speaker = "ソフィア"
# 「どんな事情かわかりませんが……“塔”から弾き出された堕天使さんのようです」
line = "「どんな事情かわかりませんが……“塔”から弾き出された堕天使さんのようです」"

[[dialogue]]
speaker = "ユウリ"
# 「あっちもあっちで何か起きてる、ってか」
line = "「あっちもあっちで何か起きてる、ってか」"

[[dialogue]]
speaker = "サーシャ"
# 「なら、私たちに任された──ってことかしらね」
line = "「なら、私たちに任された──ってことかしらね」"

[[dialogue]]
speaker = "マトイ"
# 「元は良い天使さんなら……私たちで解放してあげないと！」
line = "「元は良い天使さんなら……私たちで解放してあげないと！」"

[[dialogue]]
speaker = "ルリエル"
# 「流星新星星徒会連合──参りますっ！」
line = "「流星新星星徒会連合──参りますっ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「──ウグアァァッ！！」
line = "「──ウグアァァッ！！」"
