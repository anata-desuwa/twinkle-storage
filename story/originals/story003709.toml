[[dialogue]]
speaker = "レイラ"
# 「ジャンジャジャ～ン！　ジュリエッテ特製スパイス～！」
line = "「ジャンジャジャ～ン！　ジュリエッテ特製スパイス～！」"

[[dialogue]]
speaker = "レイラ"
# 「説明しよう！　ジュリエッテ特製スパイスとは、どんなクセあり魔獣の肉でもそれなりに食べられる味にしてくれる魔法の粉なのだ！」
line = "「説明しよう！　ジュリエッテ特製スパイスとは、どんなクセあり魔獣の肉でもそれなりに食べられる味にしてくれる魔法の粉なのだ！」"

[[dialogue]]
speaker = "キサナ"
# 「知ってるつーの。誰に向かって説明してんだ」
line = "「知ってるつーの。誰に向かって説明してんだ」"

[[dialogue]]
speaker = "リーナ"
# 「リーナ、これ好き～！　ピリ辛でおいしいよね！」
line = "「リーナ、これ好き～！　ピリ辛でおいしいよね！」"

[[dialogue]]
speaker = "unk"
# クーラーボックスを回収したレイラたちは、バーベキューをやり直すことにした。中に入っていた肉は流石にダメになっていたので、魔獣の釣り餌にした。
line = "クーラーボックスを回収したレイラたちは、バーベキューをやり直すことにした。中に入っていた肉は流石にダメになっていたので、魔獣の釣り餌にした。"

[[dialogue]]
speaker = "レイラ"
# 「お客様。その辺にいた魔獣のグリル～ジュリエッテ風～その辺に生えてた果物を添えて、でございます」
line = "「お客様。その辺にいた魔獣のグリル～ジュリエッテ風～その辺に生えてた果物を添えて、でございます」"

[[dialogue]]
speaker = "キサナ"
# 「その小芝居は昨日やっただろ」
line = "「その小芝居は昨日やっただろ」"

[[dialogue]]
speaker = "レイラ"
# 「テンドンという日本の伝統料理にございます」
line = "「テンドンという日本の伝統料理にございます」"

[[dialogue]]
speaker = "キサナ"
# 「うるせえ。マジでうるせえ」
line = "「うるせえ。マジでうるせえ」"

[[dialogue]]
speaker = "リーナ"
# 「この果物、リーナがとってきたんだよ！」
line = "「この果物、リーナがとってきたんだよ！」"

[[dialogue]]
speaker = "キサナ"
# 「ああ？　魔獣はともかく、これ食えんだろうな？」
line = "「ああ？　魔獣はともかく、これ食えんだろうな？」"

[[dialogue]]
speaker = "レイラ"
# 「私が味見したから大丈夫。ダメだったら桜の木の下に埋めてもらってもかまわないよ」
line = "「私が味見したから大丈夫。ダメだったら桜の木の下に埋めてもらってもかまわないよ」"

[[dialogue]]
speaker = "キサナ"
# 「いや普通にその辺に埋めるわ。魔界の土になれや。で、味の方は……お、イケんじゃねぇか」
line = "「いや普通にその辺に埋めるわ。魔界の土になれや。で、味の方は……お、イケんじゃねぇか」"

[[dialogue]]
speaker = "キサナ"
# 「リーナ、よくやった。レイラ埋めていいぞ」
line = "「リーナ、よくやった。レイラ埋めていいぞ」"

[[dialogue]]
speaker = "リーナ"
# 「わ～い！　どうやって埋めよっかな～？」
line = "「わ～い！　どうやって埋めよっかな～？」"

[[dialogue]]
speaker = "レイラ"
# 「いやー！　お助けー！」
line = "「いやー！　お助けー！」"

[[dialogue]]
speaker = "リーナ"
# 「くすくす、冗談だよ♪　リーナがレイラお姉ちゃんにひどいことするわけないよ」
line = "「くすくす、冗談だよ♪　リーナがレイラお姉ちゃんにひどいことするわけないよ」"

[[dialogue]]
speaker = "レイラ"
# 「……う、うん。リーナは優しい子だもんね」
line = "「……う、うん。リーナは優しい子だもんね」"

[[dialogue]]
speaker = "レイラ"
# 「では、気を取り直して私もお肉を……いただきます！　ひゅごっ……もぐもぐ……」
line = "「では、気を取り直して私もお肉を……いただきます！　ひゅごっ……もぐもぐ……」"

[[dialogue]]
speaker = "レイラ"
# 「おいし～～～！！」
line = "「おいし～～～！！」"

[[dialogue]]
speaker = "レイラ"
# 「独特な魔獣のクセがスパイスによって中和され、旨みに昇華されていますね。……数種類の香草と香辛料が複雑に絡み合い、味に奥行きを生んでいます。シェフを！」
line = "「独特な魔獣のクセがスパイスによって中和され、旨みに昇華されていますね。……数種類の香草と香辛料が複雑に絡み合い、味に奥行きを生んでいます。シェフを！」"

[[dialogue]]
speaker = "キサナ"
# 「うるせぇつってんだろ！　いい加減にしねえとマジで埋めっぞ！」
line = "「うるせぇつってんだろ！　いい加減にしねえとマジで埋めっぞ！」"

[[dialogue]]
speaker = "レイラ"
# 「すん……ひゅごっ……もぐもぐ……」
line = "「すん……ひゅごっ……もぐもぐ……」"

[[dialogue]]
speaker = "キサナ"
# 「しっかし、ようやくまともなメシにありつけたぜ。さすがに昨日のは味しなかったしな」
line = "「しっかし、ようやくまともなメシにありつけたぜ。さすがに昨日のは味しなかったしな」"

[[dialogue]]
speaker = "レイラ"
# 「キサナも変わったね。昔は食うものがあるだけマシって言って味は気にしなかったのに」
line = "「キサナも変わったね。昔は食うものがあるだけマシって言って味は気にしなかったのに」"

[[dialogue]]
speaker = "キサナ"
# 「昔の事なんざ覚えてねえよ。食うならウマい方がいいに決まってんだろ」
line = "「昔の事なんざ覚えてねえよ。食うならウマい方がいいに決まってんだろ」"

[[dialogue]]
speaker = "イングリット"
# 「この匂い、肉だな！　私にも肉を食わせろ！　早くよこせ！」
line = "「この匂い、肉だな！　私にも肉を食わせろ！　早くよこせ！」"

[[dialogue]]
speaker = "unk"
# 極度の疲労で動けないらしく、寝転がったまま声を上げるイングリット。
line = "極度の疲労で動けないらしく、寝転がったまま声を上げるイングリット。"

[[dialogue]]
speaker = "リーナ"
# 「あ、イングリットお姉ちゃん起きた」
line = "「あ、イングリットお姉ちゃん起きた」"

[[dialogue]]
speaker = "キサナ"
# 「はっ、欲しけりゃ自分で取りに来い」
line = "「はっ、欲しけりゃ自分で取りに来い」"

[[dialogue]]
speaker = "レイラ"
# 「もう、イジワルしないの。食べさせてあげるからじっとしててね。はい、あ～ん」
line = "「もう、イジワルしないの。食べさせてあげるからじっとしててね。はい、あ～ん」"

[[dialogue]]
speaker = "イングリット"
# 「あ～……あつっ！？　熱すぎる！　少し冷ませ」
line = "「あ～……あつっ！？　熱すぎる！　少し冷ませ」"

[[dialogue]]
speaker = "レイラ"
# 「えー、ワガママだなぁ……ふー、ふー……はい、あ～ん」
line = "「えー、ワガママだなぁ……ふー、ふー……はい、あ～ん」"

[[dialogue]]
speaker = "イングリット"
# 「あ～ん……うまい！　何の肉かさっぱり分からんが、肉の味がするぞ！」
line = "「あ～ん……うまい！　何の肉かさっぱり分からんが、肉の味がするぞ！」"

[[dialogue]]
speaker = "レイラ"
# 「お客様。その辺にいた魔獣のグリル～ジュリエッテ風～でございます」
line = "「お客様。その辺にいた魔獣のグリル～ジュリエッテ風～でございます」"

[[dialogue]]
speaker = "キサナ"
# 「それはもういいつってんだろ」
line = "「それはもういいつってんだろ」"

[[dialogue]]
speaker = "イングリット"
# 「もぐもぐ……もぐもぐ……復活！」
line = "「もぐもぐ……もぐもぐ……復活！」"

[[dialogue]]
speaker = "unk"
# イングリットがさながら、蛹から羽化した蝶のように立ち上がる。
line = "イングリットがさながら、蛹から羽化した蝶のように立ち上がる。"

[[dialogue]]
speaker = "イングリット"
# 「私と戦え、レイラ！　約束、忘れたとは言わせんぞ」
line = "「私と戦え、レイラ！　約束、忘れたとは言わせんぞ」"

[[dialogue]]
speaker = "レイラ"
# 「げ。忘れててほしかった……はぁ、しょうがないな」
line = "「げ。忘れててほしかった……はぁ、しょうがないな」"

[[dialogue]]
speaker = "レイラ"
# 「コラプサー首領、百目騎レイラが受けて立ちます」
line = "「コラプサー首領、百目騎レイラが受けて立ちます」"

[[dialogue]]
speaker = "イングリット"
# 「ようやくだ。ようやく貴様とまた戦える……」
line = "「ようやくだ。ようやく貴様とまた戦える……」"

[[dialogue]]
speaker = "レイラ"
# 「キサナ。分かってると思うけど、手出し無用だからね」
line = "「キサナ。分かってると思うけど、手出し無用だからね」"

[[dialogue]]
speaker = "キサナ"
# 「んな野暮なことしねえよ。オマエこそ負けたら分かってんだろうな」
line = "「んな野暮なことしねえよ。オマエこそ負けたら分かってんだろうな」"

[[dialogue]]
speaker = "レイラ"
# 「うん、大丈夫だから見てて。リーナは……」
line = "「うん、大丈夫だから見てて。リーナは……」"

[[dialogue]]
speaker = "リーナ"
# 「リーナ、貝殻探してくる！　持って帰るのにクーラーボックス使っていい？」
line = "「リーナ、貝殻探してくる！　持って帰るのにクーラーボックス使っていい？」"

[[dialogue]]
speaker = "レイラ"
# 「いいよー。でもあんまり遠くまで行かないでね」
line = "「いいよー。でもあんまり遠くまで行かないでね」"

[[dialogue]]
speaker = "リーナ"
# 「はーい」
line = "「はーい」"

[[dialogue]]
speaker = "レイラ"
# 「じゃあ、やろうか」
line = "「じゃあ、やろうか」"

[[dialogue]]
speaker = "イングリット"
# 「今度こそ、貴様に勝つ。勝って私は最強になる！」
line = "「今度こそ、貴様に勝つ。勝って私は最強になる！」"
