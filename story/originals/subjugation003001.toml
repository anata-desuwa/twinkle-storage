[[dialogue]]
speaker = "ナミエル"
# （――私は、クリスマスが苦手だ）
line = "（――私は、クリスマスが苦手だ）"

[[dialogue]]
speaker = "ナミエル"
# （決して忘れられない、昔の記憶を思い出すから）
line = "（決して忘れられない、昔の記憶を思い出すから）"

[[dialogue]]
speaker = "附属生Ａ"
# 「もうすぐクリスマスだね～！　ねぇねぇ、当日はどうする？」
line = "「もうすぐクリスマスだね～！　ねぇねぇ、当日はどうする？」"

[[dialogue]]
speaker = "附属生Ｂ"
# 「実は、流星寮でクリスマスパーティーが開かれるらしいんだよね。せっかくだから、一緒に参加しようよ！」
line = "「実は、流星寮でクリスマスパーティーが開かれるらしいんだよね。せっかくだから、一緒に参加しようよ！」"

[[dialogue]]
speaker = "ナミエル"
# 「はぁ……」
line = "「はぁ……」"

[[dialogue]]
speaker = "unk"
# 前を歩く附属生たちの明るい会話が聞こえてきて、星見家メイド隊所属の流星学園附属校１年生――『ナミエル・クレシェンテ』は、小さく白い息を吐いた。
line = "前を歩く附属生たちの明るい会話が聞こえてきて、星見家メイド隊所属の流星学園附属校１年生――『ナミエル・クレシェンテ』は、小さく白い息を吐いた。"

[[dialogue]]
speaker = "unk"
# 季節は冬。クリスマスまであと２週間という時期とあって、朝から空気は冷たく、肌寒い。
line = "季節は冬。クリスマスまであと２週間という時期とあって、朝から空気は冷たく、肌寒い。"

[[dialogue]]
speaker = "アム"
# 「あっ、ナミエルだ～！　おっはよ～♪」
line = "「あっ、ナミエルだ～！　おっはよ～♪」"

[[dialogue]]
speaker = "ナミエル"
# 「……ごきげんよう。アム先輩」
line = "「……ごきげんよう。アム先輩」"

[[dialogue]]
speaker = "アム"
# 「ナミエルと会うのは、結構久しぶりだね！　最近、元気してた？」
line = "「ナミエルと会うのは、結構久しぶりだね！　最近、元気してた？」"

[[dialogue]]
speaker = "unk"
# ナミエルの後ろから元気よく声をかけてきたのは、流星学園附属校３年生の『<ruby=しろたて>白楯</ruby>アム』だった。『附属最強の盾』とも呼ばれる、盾使いとして有名な附属生である。
line = "ナミエルの後ろから元気よく声をかけてきたのは、流星学園附属校３年生の『<ruby>白楯<rt>しろたて</rt></ruby>アム』だった。『附属最強の盾』とも呼ばれる、盾使いとして有名な附属生である。"

[[dialogue]]
speaker = "ナミエル"
# 「ええ、まあ……はい。アム先輩は、朝からすごく元気ですね」
line = "「ええ、まあ……はい。アム先輩は、朝からすごく元気ですね」"

[[dialogue]]
speaker = "アム"
# 「うんっ♪　あたしは毎朝早起きして、朝練してるからね～。今も運動場から戻ってきたところ！　だから、冬の寒さなんてへっちゃらなくらい、体が温まってるよ♪」
line = "「うんっ♪　あたしは毎朝早起きして、朝練してるからね～。今も運動場から戻ってきたところ！　だから、冬の寒さなんてへっちゃらなくらい、体が温まってるよ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「そうでしたか。さすがですね」
line = "「そうでしたか。さすがですね」"

[[dialogue]]
speaker = "アム"
# 「えへへっ、でしょ～？　あたしは本校に進学したら、学園最強の星騎士――星徒会長になるのが目標だからね～！」
line = "「えへへっ、でしょ～？　あたしは本校に進学したら、学園最強の星騎士――星徒会長になるのが目標だからね～！」"

[[dialogue]]
speaker = "ナミエル"
# （アム先輩、『陽キャ』でやたらテンションの高い感じはちょっと苦手ですが……星騎士としては、訓練量がすごくて、意外と真面目な人なんですよね）
line = "（アム先輩、『陽キャ』でやたらテンションの高い感じはちょっと苦手ですが……星騎士としては、訓練量がすごくて、意外と真面目な人なんですよね）"

[[dialogue]]
speaker = "unk"
# ナミエルにとってアムは、会えば挨拶はするが、正直そこまで親しい間柄というわけでもない。
line = "ナミエルにとってアムは、会えば挨拶はするが、正直そこまで親しい間柄というわけでもない。"

[[dialogue]]
speaker = "unk"
# 以前、『オペレーション・ペンタグラム』という作戦で一緒に戦ったことがあり、そこでアムが話しかけてきて顔見知りになった、といった感じだった。
line = "以前、『オペレーション・ペンタグラム』という作戦で一緒に戦ったことがあり、そこでアムが話しかけてきて顔見知りになった、といった感じだった。"

[[dialogue]]
speaker = "アム"
# 「ん？　なんか上から落ちてきてるの――アレ、何だろう？」
line = "「ん？　なんか上から落ちてきてるの――アレ、何だろう？」"

[[dialogue]]
speaker = "unk"
# ふと、アムが空を見上げて、ナミエルもそちらに視線を向ける。風に吹かれた何かが飛んできて、それはナミエルの足元にふわりと落ちた。
line = "ふと、アムが空を見上げて、ナミエルもそちらに視線を向ける。風に吹かれた何かが飛んできて、それはナミエルの足元にふわりと落ちた。"

[[dialogue]]
speaker = "ナミエル"
# 「これは――シルクハットでしょうか……？」
line = "「これは――シルクハットでしょうか……？」"

[[dialogue]]
speaker = "unk"
# 頭に被るにはやや小さめの帽子。それをナミエルが手に取り、拾い上げた瞬間。
line = "頭に被るにはやや小さめの帽子。それをナミエルが手に取り、拾い上げた瞬間。"

[[dialogue]]
speaker = "ナミエル"
# 「きゃっ……！？」
line = "「きゃっ……！？」"

[[dialogue]]
speaker = "アム"
# 「わっ、何！？」
line = "「わっ、何！？」"

[[dialogue]]
speaker = "ナミエル"
# 「か、勝手に変身して、衣装が……！？」
line = "「か、勝手に変身して、衣装が……！？」"

[[dialogue]]
speaker = "アム"
# 「これ、水着フォームになった時と似てる……？　もしかしてあたし達、<b>クリスマスフォーム</b>に覚醒したの……！？」
line = "「これ、水着フォームになった時と似てる……？　もしかしてあたし達、<b>クリスマスフォーム</b>に覚醒したの……！？」"

[[dialogue]]
speaker = "？？？"
# 「あれ？　ここは……どこ？」
line = "「あれ？　ここは……どこ？」"

[[dialogue]]
speaker = "アム"
# 「なんか、小さい雪だるまみたいなのが現れた！？」
line = "「なんか、小さい雪だるまみたいなのが現れた！？」"

[[dialogue]]
speaker = "ナミエル"
# 「……リクリエの気配は感じませんね。それに喋っていますし、モンスターとは少し違うようですが……」
line = "「……リクリエの気配は感じませんね。それに喋っていますし、モンスターとは少し違うようですが……」"

[[dialogue]]
speaker = "ナミエル"
# （あと、『ぬいぐるみ』みたいで可愛い……）
line = "（あと、『ぬいぐるみ』みたいで可愛い……）"

[[dialogue]]
speaker = "雪だるま？"
# 「？　キミたちは誰……？」
line = "「？　キミたちは誰……？」"

[[dialogue]]
speaker = "ナミエル"
# 「えっと……私は、ナミエル・クレシェンテと言います。あなたは……？」
line = "「えっと……私は、ナミエル・クレシェンテと言います。あなたは……？」"

[[dialogue]]
speaker = "スノーマンL"
# 「ボク？　ボクは『スノーマン』！　冬の精霊だよっ♪」
line = "「ボク？　ボクは『スノーマン』！　冬の精霊だよっ♪」"

[[dialogue]]
speaker = "unk"
# そうして、クリスマスが近づきつつあったその日、ナミエルとアムは不思議な存在に出会うのだった。
line = "そうして、クリスマスが近づきつつあったその日、ナミエルとアムは不思議な存在に出会うのだった。"
