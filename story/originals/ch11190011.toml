[[dialogue]]
speaker = "unk"
# 第１話,大怪盗と祓魔師,P
line = "第１話,大怪盗と祓魔師,P"

[[dialogue]]
speaker = "unk"
# 怪盗事件から少し経ったある日のこと。
line = "怪盗事件から少し経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は大聖堂カフェテリアへと、昼食をしにやって来ていた――
line = "俺は大聖堂カフェテリアへと、昼食をしにやって来ていた――"

[[dialogue]]
speaker = "ミネコ"
# 「おっ、会長～♪　もしかして今日は、お昼ご飯１人？」
line = "「おっ、会長～♪　もしかして今日は、お昼ご飯１人？」"

[[dialogue]]
speaker = "ミネコ"
# 「――ふふっ、ラッキー♪　じゃあ今日は、私と一緒にお昼ご飯にしちゃう？」
line = "「――ふふっ、ラッキー♪　じゃあ今日は、私と一緒にお昼ご飯にしちゃう？」"

[[dialogue]]
speaker = "ミネコ"
# 「私的には大歓迎だよ♪　ジュエリーに勝つ為にも、会長とは仲良くなりたいからね♪」
line = "「私的には大歓迎だよ♪　ジュエリーに勝つ為にも、会長とは仲良くなりたいからね♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「そう簡単にはさせないよ、ミネコ」
line = "「そう簡単にはさせないよ、ミネコ」"

[[dialogue]]
speaker = "ミネコ"
# 「おやおや、噂をすれば名探偵のご登場だね♪」
line = "「おやおや、噂をすれば名探偵のご登場だね♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「彼は私の助手だからね。キミが話しかけているのを見かければ、スルーできるはずもないだろう？」
line = "「彼は私の助手だからね。キミが話しかけているのを見かければ、スルーできるはずもないだろう？」"

[[dialogue]]
speaker = "フェリシー"
# 「こんにちは～♪　そちらの子は、会長くんやジュエリーの友達？」
line = "「こんにちは～♪　そちらの子は、会長くんやジュエリーの友達？」"

[[dialogue]]
speaker = "ミネコ"
# 「うんっ、そうなんだ～♪　よろしくね☆」
line = "「うんっ、そうなんだ～♪　よろしくね☆」"

[[dialogue]]
speaker = "ジュエリー"
# 「待ちたまえ。友達と言うと語弊がある。明解に換言するならば、ライバルと言ったところだ」
line = "「待ちたまえ。友達と言うと語弊がある。明解に換言するならば、ライバルと言ったところだ」"

[[dialogue]]
speaker = "unk"
# フェリシー、今日はジュエリーとお昼？
line = "フェリシー、今日はジュエリーとお昼？"

[[dialogue]]
speaker = "フェリシー"
# 「うん♪　一緒に食べようって約束してたんだ」
line = "「うん♪　一緒に食べようって約束してたんだ」"

[[dialogue]]
speaker = "ジュエリー"
# 「ちょうどいい機会だ。同じ『選星者』として、フェリシーには紹介しておこう」
line = "「ちょうどいい機会だ。同じ『選星者』として、フェリシーには紹介しておこう」"

[[dialogue]]
speaker = "フェリシー"
# 「え？　選星者？」
line = "「え？　選星者？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ミネコもそれでいいかい？」
line = "「ミネコもそれでいいかい？」"

[[dialogue]]
speaker = "ミネコ"
# 「選星者同士なら、私はオッケーだよ♪」
line = "「選星者同士なら、私はオッケーだよ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「それじゃ、自分の口から直接名乗らせてもらおうかな――」
line = "「それじゃ、自分の口から直接名乗らせてもらおうかな――」"

[[dialogue]]
speaker = "ミネコ"
# 「私は流星学園１年の『ミネコ・フランボワーズ』。キミと同じ選星者の１人、『大怪盗』の役職を承った者だよ♪」
line = "「私は流星学園１年の『ミネコ・フランボワーズ』。キミと同じ選星者の１人、『大怪盗』の役職を承った者だよ♪」"

[[dialogue]]
speaker = "unk"
# 選星者――それは、女神から『<ruby=ロール>役職</ruby>』を授けられた者のことを指すという。それ故に、海外では『ロールスター』という呼び方もされたりするとか。
line = "選星者――それは、女神から『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のことを指すという。それ故に、海外では『ロールスター』という呼び方もされたりするとか。"

[[dialogue]]
speaker = "unk"
# ミネコの役職は『大怪盗』。ジュエリーは『名探偵』。フェリシーは『<ruby=エクソシスト>祓魔師</ruby>』。
line = "ミネコの役職は『大怪盗』。ジュエリーは『名探偵』。フェリシーは『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』。"

[[dialogue]]
speaker = "unk"
# 選星者は女神からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。
line = "選星者は女神からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。"

[[dialogue]]
speaker = "フェリシー"
# 「大怪盗！？　それじゃあミネコちゃんが、まさかあの……！？」
line = "「大怪盗！？　それじゃあミネコちゃんが、まさかあの……！？」"

[[dialogue]]
speaker = "ミネコ"
# 「そう、世界を騒がす怪盗の片割れ、『大怪盗フランボウ』とは、ズバリ私のこと！　――あっ、ちなみに、これは秘密でお願いね♪」
line = "「そう、世界を騒がす怪盗の片割れ、『大怪盗フランボウ』とは、ズバリ私のこと！　――あっ、ちなみに、これは秘密でお願いね♪」"

[[dialogue]]
speaker = "フェリシー"
# 「いや、カフェテリアのど真ん中で堂々と公言しちゃってるけど！？　大丈夫なの……！？」
line = "「いや、カフェテリアのど真ん中で堂々と公言しちゃってるけど！？　大丈夫なの……！？」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふ、問題ないよ♪　この会話の情報は、後でみんなの頭の中からちょちょいっと消しておくから♪」
line = "「ふふふ、問題ないよ♪　この会話の情報は、後でみんなの頭の中からちょちょいっと消しておくから♪」"

[[dialogue]]
speaker = "フェリシー"
# 「え？　それってどういう……？」
line = "「え？　それってどういう……？」"

[[dialogue]]
speaker = "ジュエリー"
# 「それが『大怪盗』の能力なんだよ、フェリシー」
line = "「それが『大怪盗』の能力なんだよ、フェリシー」"

[[dialogue]]
speaker = "ミネコ"
# 「私の能力は『情報改竄』。目に見える物理的なものから、頭の中にある記憶まで、書き換えることができる」
line = "「私の能力は『情報改竄』。目に見える物理的なものから、頭の中にある記憶まで、書き換えることができる」"

[[dialogue]]
speaker = "ミネコ"
# 「たとえば、いつの間にかジュエリーのクラスメイトとして、流星学園に通っていたことにしたりね♪」
line = "「たとえば、いつの間にかジュエリーのクラスメイトとして、流星学園に通っていたことにしたりね♪」"

[[dialogue]]
speaker = "フェリシー"
# 「あ！　道理でジュエリーの友達なのに、今まで見かけたことがないなって……！」
line = "「あ！　道理でジュエリーの友達なのに、今まで見かけたことがないなって……！」"

[[dialogue]]
speaker = "ミネコ"
# 「ちなみに、キミのことは調べてあるから、自己紹介は不要だよ、『<ruby=めぐはら>恵原</ruby>フェリシー』ちゃん♪　学園に潜入するに当たって、同じ選星者は下調べしておいたからね」
line = "「ちなみに、キミのことは調べてあるから、自己紹介は不要だよ、『<ruby>恵原<rt>めぐはら</rt></ruby>フェリシー』ちゃん♪　学園に潜入するに当たって、同じ選星者は下調べしておいたからね」"

[[dialogue]]
speaker = "ミネコ"
# 「ただ、心の内でどう思うかまでは、実際に聞かないと私にもわからない。――ということで、フェリシーちゃんに１つ質問してもいい？」
line = "「ただ、心の内でどう思うかまでは、実際に聞かないと私にもわからない。――ということで、フェリシーちゃんに１つ質問してもいい？」"

[[dialogue]]
speaker = "ミネコ"
# 「『祓魔師』のキミとしては――『大怪盗』の私をどう思う？」
line = "「『祓魔師』のキミとしては――『大怪盗』の私をどう思う？」"

[[dialogue]]
speaker = "フェリシー"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フェリシー"
# 「私は――」
line = "「私は――」"

[[dialogue]]
speaker = "フェリシー"
# 「……ヒトの物を盗むのは、理由はどうあれ、悪いことだと思う」
line = "「……ヒトの物を盗むのは、理由はどうあれ、悪いことだと思う」"

[[dialogue]]
speaker = "フェリシー"
# 「大怪盗には大怪盗なりの誇りがあるんだと思う。だけど、誇りがあって相手を選べば、犯罪が許されるわけじゃない」
line = "「大怪盗には大怪盗なりの誇りがあるんだと思う。だけど、誇りがあって相手を選べば、犯罪が許されるわけじゃない」"

[[dialogue]]
speaker = "フェリシー"
# 「でも……選星者は女神様が選んだ存在だから、『大怪盗』が世界に必要なんだってことも、私は信じてる」
line = "「でも……選星者は女神様が選んだ存在だから、『大怪盗』が世界に必要なんだってことも、私は信じてる」"

[[dialogue]]
speaker = "フェリシー"
# 「女神様は祝福や救いと同時に、試練をお与えになる。だからきっと、この世のすべてのことには意味があると思うの」
line = "「女神様は祝福や救いと同時に、試練をお与えになる。だからきっと、この世のすべてのことには意味があると思うの」"

[[dialogue]]
speaker = "フェリシー"
# 「まだ私は、その意味のすべてを知っているわけじゃない。だから同じ選星者として、あなたからも学ばせてほしい……かな♪」
line = "「まだ私は、その意味のすべてを知っているわけじゃない。だから同じ選星者として、あなたからも学ばせてほしい……かな♪」"

[[dialogue]]
speaker = "ミネコ"
# 「私が怪盗をやっているのは、使命ではなく『趣味』だと言っても？」
line = "「私が怪盗をやっているのは、使命ではなく『趣味』だと言っても？」"

[[dialogue]]
speaker = "フェリシー"
# 「私はまだあなたのことをよく知らないから、何を言われても、まずは知るところからだよ」
line = "「私はまだあなたのことをよく知らないから、何を言われても、まずは知るところからだよ」"

[[dialogue]]
speaker = "フェリシー"
# 「私は祓魔師として、祓うべきか否かは自分の目で見てから決める。だから、これから仲良くなって――」
line = "「私は祓魔師として、祓うべきか否かは自分の目で見てから決める。だから、これから仲良くなって――」"

[[dialogue]]
speaker = "フェリシー"
# 「あなたが間違ったことをしていると思ったら、友達として私が魔を祓って、改心させる」
line = "「あなたが間違ったことをしていると思ったら、友達として私が魔を祓って、改心させる」"

[[dialogue]]
speaker = "ミネコ"
# 「私たち、友達にはなれそう？」
line = "「私たち、友達にはなれそう？」"

[[dialogue]]
speaker = "フェリシー"
# 「もちろん。ミネコ、って呼んでもいいかな？」
line = "「もちろん。ミネコ、って呼んでもいいかな？」"

[[dialogue]]
speaker = "ミネコ"
# 「オッケー♪　じゃあ私も、フェリシーって呼ぶね」
line = "「オッケー♪　じゃあ私も、フェリシーって呼ぶね」"

[[dialogue]]
speaker = "フェリシー"
# 「うんっ。今日からよろしくね、ミネコ」
line = "「うんっ。今日からよろしくね、ミネコ」"

[[dialogue]]
speaker = "unk"
# ２人はそうして、笑顔で握手を交わすのだった。
line = "２人はそうして、笑顔で握手を交わすのだった。"

[[dialogue]]
speaker = "ミネコ"
# 「――あっ、そうだ！　こうして選星者同士、せっかく知り合ったんだし、仲を深める為にも『お泊り会』しない？」
line = "「――あっ、そうだ！　こうして選星者同士、せっかく知り合ったんだし、仲を深める為にも『お泊り会』しない？」"

[[dialogue]]
speaker = "フェリシー"
# 「いいねいいね♪　ミネコも多分、流星寮住まいだよね？　だったら、私の部屋に来る？」
line = "「いいねいいね♪　ミネコも多分、流星寮住まいだよね？　だったら、私の部屋に来る？」"

[[dialogue]]
speaker = "ミネコ"
# 「いいの？　ありがと～♪　そうと決まれば、当然ジュエリーも参加ね！」
line = "「いいの？　ありがと～♪　そうと決まれば、当然ジュエリーも参加ね！」"

[[dialogue]]
speaker = "ジュエリー"
# 「え、また私もかい？　キミとのお泊り会は、この前したばかりだろう」
line = "「え、また私もかい？　キミとのお泊り会は、この前したばかりだろう」"

[[dialogue]]
speaker = "フェリシー"
# 「何それ、私知らないんだけど！？　なんで私も呼んでくれなかったの、ジュエリ～！」
line = "「何それ、私知らないんだけど！？　なんで私も呼んでくれなかったの、ジュエリ～！」"

[[dialogue]]
speaker = "ジュエリー"
# 「いや、その時は計画的なものではなく、突然夜にミネコが部屋に押しかけてきて、半ば無理矢理そのまま居座ってだね……」
line = "「いや、その時は計画的なものではなく、突然夜にミネコが部屋に押しかけてきて、半ば無理矢理そのまま居座ってだね……」"

[[dialogue]]
speaker = "ミネコ"
# 「そこは因縁の名探偵相手だからね～。距離を縮めるには、多少強引に行かないとダメかな～って思ったんだよ♪」
line = "「そこは因縁の名探偵相手だからね～。距離を縮めるには、多少強引に行かないとダメかな～って思ったんだよ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「ねぇ、いいじゃん、ジュエリー。こうしてフェリシーとも友達になったわけだし、役職的には敵同士でも、プライベートでは仲良くしようよ～」
line = "「ねぇ、いいじゃん、ジュエリー。こうしてフェリシーとも友達になったわけだし、役職的には敵同士でも、プライベートでは仲良くしようよ～」"

[[dialogue]]
speaker = "ジュエリー"
# 「どういう理屈なんだ。むしろやりづらいだろう」
line = "「どういう理屈なんだ。むしろやりづらいだろう」"

[[dialogue]]
speaker = "ミネコ"
# 「あっ！　会長もお泊り会、参加しちゃう？」
line = "「あっ！　会長もお泊り会、参加しちゃう？」"

[[dialogue]]
speaker = "unk"
# いや俺は男だし、さすがに……
line = "いや俺は男だし、さすがに……"

[[dialogue]]
speaker = "フェリシー"
# 「え～？　私は全然気にしないよ？　会長くんなら変なことしないって信じてるし♪」
line = "「え～？　私は全然気にしないよ？　会長くんなら変なことしないって信じてるし♪」"

[[dialogue]]
speaker = "unk"
# そうして、なんだかんだお泊り会が決定したのだった――
line = "そうして、なんだかんだお泊り会が決定したのだった――"
