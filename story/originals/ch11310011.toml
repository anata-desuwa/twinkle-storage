[[dialogue]]
speaker = "unk"
# 第１話,シズルの街さんぽ,P
line = "第１話,シズルの街さんぽ,P"

[[dialogue]]
speaker = "unk"
# 紫桜の里から戻ってしばらくが経ち、今度は逆にシズルさんが転移装置を使って流星市国に遊びに来ていた。
line = "紫桜の里から戻ってしばらくが経ち、今度は逆にシズルさんが転移装置を使って流星市国に遊びに来ていた。"

[[dialogue]]
speaker = "シズル"
# 「おや、魔王さん。こんなところで会うなんて偶然ですね♪」
line = "「おや、魔王さん。こんなところで会うなんて偶然ですね♪」"

[[dialogue]]
speaker = "unk"
# こんにちは、何をしてたんですか？
line = "こんにちは、何をしてたんですか？"

[[dialogue]]
speaker = "シズル"
# 「えへへ、お散歩を少々。毎日ちゃんと運動しないと、足腰が弱っちゃうと聞きますし」
line = "「えへへ、お散歩を少々。毎日ちゃんと運動しないと、足腰が弱っちゃうと聞きますし」"

[[dialogue]]
speaker = "シズル"
# 「ちゃんと万歩計で測ってるんですよ。さーて、今日はどれくらい歩いたかな～？」
line = "「ちゃんと万歩計で測ってるんですよ。さーて、今日はどれくらい歩いたかな～？」"

[[dialogue]]
speaker = "シズル"
# 「やったー！　５万歩達成です～♪　今日はまあまあ歩きましたねっ」
line = "「やったー！　５万歩達成です～♪　今日はまあまあ歩きましたねっ」"

[[dialogue]]
speaker = "unk"
# 歩きすぎでは……？
line = "歩きすぎでは……？"

[[dialogue]]
speaker = "unk"
# ５万歩！？
line = "５万歩！？"

[[dialogue]]
speaker = "シズル"
# 「こんなものじゃありませんか？　里では測ってませんでしたから、比較は出来ませんけど」
line = "「こんなものじゃありませんか？　里では測ってませんでしたから、比較は出来ませんけど」"

[[dialogue]]
speaker = "シズル"
# 「昔はも～っといっぱい歩けたんですよ。でも今はもうダメダメですね。すぐに疲れてしまいます」
line = "「昔はも～っといっぱい歩けたんですよ。でも今はもうダメダメですね。すぐに疲れてしまいます」"

[[dialogue]]
speaker = "シズル"
# 「だから、こうやって休憩しながら歩いていたところなんですが……あれ？」
line = "「だから、こうやって休憩しながら歩いていたところなんですが……あれ？」"

[[dialogue]]
speaker = "シズル"
# 「ま、待って下さい。ここはどこですかっ？　まるで覚えがない場所ですっ！」
line = "「ま、待って下さい。ここはどこですかっ？　まるで覚えがない場所ですっ！」"

[[dialogue]]
speaker = "unk"
# もしかして方向音痴ですか？
line = "もしかして方向音痴ですか？"

[[dialogue]]
speaker = "シズル"
# 「そんなことはないと思います。任務に支障をきたしたことはありませんし……」
line = "「そんなことはないと思います。任務に支障をきたしたことはありませんし……」"

[[dialogue]]
speaker = "シズル"
# 「でも最近気が付いたら、お外に出かけた覚えもないのに、全然知らない場所を歩いていたりすることがあるんです」
line = "「でも最近気が付いたら、お外に出かけた覚えもないのに、全然知らない場所を歩いていたりすることがあるんです」"

[[dialogue]]
speaker = "シズル"
# 「その度に里の子が総出で私を見つけてくれるんですが、みんなに苦労をかけてしまうのが申し訳なくて」
line = "「その度に里の子が総出で私を見つけてくれるんですが、みんなに苦労をかけてしまうのが申し訳なくて」"

[[dialogue]]
speaker = "unk"
# （それって……）
line = "（それって……）"

[[dialogue]]
speaker = "シズル"
# 「でも都会はさすがですね。迷子になっていると親切なお巡りさんがやってきて、すぐに保護してくれるんですよ」
line = "「でも都会はさすがですね。迷子になっていると親切なお巡りさんがやってきて、すぐに保護してくれるんですよ」"

[[dialogue]]
speaker = "シズル"
# 「ちっちゃい子扱いされるのが玉に瑕ですが……あはは」
line = "「ちっちゃい子扱いされるのが玉に瑕ですが……あはは」"

[[dialogue]]
speaker = "シズル"
# 「まだまだ元気いっぱい、頑張らなきゃです。こんな時こそ、すぺしゃるな秘薬を……」
line = "「まだまだ元気いっぱい、頑張らなきゃです。こんな時こそ、すぺしゃるな秘薬を……」"

[[dialogue]]
speaker = "シズル"
# 「ごくっ、ごくっ、ごくっ……ぷっは～～～っ、まじゅい！　我ながらなんて激マズな秘薬を作るんだとびっくりしちゃいますね」
line = "「ごくっ、ごくっ、ごくっ……ぷっは～～～っ、まじゅい！　我ながらなんて激マズな秘薬を作るんだとびっくりしちゃいますね」"

[[dialogue]]
speaker = "シズル"
# 「でも、全身がポッポしてきましたよ～！　これであと１０万歩は歩けますっ！」
line = "「でも、全身がポッポしてきましたよ～！　これであと１０万歩は歩けますっ！」"

[[dialogue]]
speaker = "せつな"
# 「主様ぁ～～～～っ！」
line = "「主様ぁ～～～～っ！」"

[[dialogue]]
speaker = "unk"
# そんなに急いでどうしたの？
line = "そんなに急いでどうしたの？"

[[dialogue]]
speaker = "unk"
# あれ？　せつな？
line = "あれ？　せつな？"

[[dialogue]]
speaker = "せつな"
# 「い、一大事にござる！　師匠が行方不明になったでござるよ～！」
line = "「い、一大事にござる！　師匠が行方不明になったでござるよ～！」"

[[dialogue]]
speaker = "せつな"
# 「師匠らしき女子を保護したと連絡を貰ったのでござるが、すぐにどこかに消えてしまったらしく！」
line = "「師匠らしき女子を保護したと連絡を貰ったのでござるが、すぐにどこかに消えてしまったらしく！」"

[[dialogue]]
speaker = "せつな"
# 「どうすればよいでござろう！　見た目はか弱き少女ゆえ、小脇に抱えてさらわれたら一大事でござるよ～～っ！」
line = "「どうすればよいでござろう！　見た目はか弱き少女ゆえ、小脇に抱えてさらわれたら一大事でござるよ～～っ！」"

[[dialogue]]
speaker = "unk"
# シズルさんならそこにいるよ
line = "シズルさんならそこにいるよ"

[[dialogue]]
speaker = "せつな"
# 「なんと……？　どこにいるでござるか？」
line = "「なんと……？　どこにいるでござるか？」"

[[dialogue]]
speaker = "unk"
# いつの間にかいない……
line = "いつの間にかいない……"

[[dialogue]]
speaker = "unk"
# あれ？
line = "あれ？"

[[dialogue]]
speaker = "せつな"
# 「くんくん、これは……確かに師匠の残り香でござる！　あのまっずい秘薬の臭いがするでござるよ」
line = "「くんくん、これは……確かに師匠の残り香でござる！　あのまっずい秘薬の臭いがするでござるよ」"

[[dialogue]]
speaker = "せつな"
# 「ぐぬぬ～、相変わらずの行動力でござる。当主様直々に、師匠の供をせよと命じられておりますのに、何度も何度も見失ってしまって！」
line = "「ぐぬぬ～、相変わらずの行動力でござる。当主様直々に、師匠の供をせよと命じられておりますのに、何度も何度も見失ってしまって！」"

[[dialogue]]
speaker = "せつな"
# 「主様、お願いでござる！　一緒に師匠を探して欲しいでござる！」
line = "「主様、お願いでござる！　一緒に師匠を探して欲しいでござる！」"

[[dialogue]]
speaker = "シズル"
# 「おや？　魔王さんとはぐれてしまいましたね……」
line = "「おや？　魔王さんとはぐれてしまいましたね……」"

[[dialogue]]
speaker = "シズル"
# 「でもせつなの気配を感じたので、ちょうどよかったかもです。お目付役がいると自由に都会を満喫できませんからね」
line = "「でもせつなの気配を感じたので、ちょうどよかったかもです。お目付役がいると自由に都会を満喫できませんからね」"

[[dialogue]]
speaker = "シズル"
# 「……ここはどこでしょう？　都会の中でも、一番都会っぽい感じのするところですね……大きなビルが沢山建ってます……」
line = "「……ここはどこでしょう？　都会の中でも、一番都会っぽい感じのするところですね……大きなビルが沢山建ってます……」"

[[dialogue]]
speaker = "シズル"
# 「うんうん、いいじゃないですか♪　ここなら思う存分都会を満喫できそうです♪」
line = "「うんうん、いいじゃないですか♪　ここなら思う存分都会を満喫できそうです♪」"

[[dialogue]]
speaker = "シズル"
# 「あ、こんにちはお巡りさん、何か御用ですか？」
line = "「あ、こんにちはお巡りさん、何か御用ですか？」"

[[dialogue]]
speaker = "シズル"
# 「えっ……あ、違うんです、私はこれでも立派な大人でして……ふえっ、続きの話は派出所で！？　いえいえ、そういうのは結構ですから！」
line = "「えっ……あ、違うんです、私はこれでも立派な大人でして……ふえっ、続きの話は派出所で！？　いえいえ、そういうのは結構ですから！」"

[[dialogue]]
speaker = "せつな"
# 「くんくんくん……この辺りにも師匠の居た痕跡が……」
line = "「くんくんくん……この辺りにも師匠の居た痕跡が……」"

[[dialogue]]
speaker = "せつな"
# 「はっ！？　危ないっ、撒き菱でござるっ！」
line = "「はっ！？　危ないっ、撒き菱でござるっ！」"

[[dialogue]]
speaker = "せつな"
# 「いや～、間一髪でござったな。まさかこんな所で撒き菱が使われているなんて、世も末でござるよ～」
line = "「いや～、間一髪でござったな。まさかこんな所で撒き菱が使われているなんて、世も末でござるよ～」"

[[dialogue]]
speaker = "unk"
# シズルさんが使った撒き菱では？
line = "シズルさんが使った撒き菱では？"

[[dialogue]]
speaker = "せつな"
# 「きっと、そうでござる！　さすがは主様、慧眼にござる！」
line = "「きっと、そうでござる！　さすがは主様、慧眼にござる！」"

[[dialogue]]
speaker = "せつな"
# 「しかし……なぜ撒き菱を？　はっ、つまり何者かに追われていた！！」
line = "「しかし……なぜ撒き菱を？　はっ、つまり何者かに追われていた！！」"

[[dialogue]]
speaker = "せつな"
# 「師匠の身に危険が迫っているでござる！　せつなが案じた通り、曲者にお持ち帰りされてしまったでござるよ！」
line = "「師匠の身に危険が迫っているでござる！　せつなが案じた通り、曲者にお持ち帰りされてしまったでござるよ！」"

[[dialogue]]
speaker = "せつな"
# 「どこでござるか、師匠～っ！　せつなはここでござる～！」
line = "「どこでござるか、師匠～っ！　せつなはここでござる～！」"

[[dialogue]]
speaker = "シズル"
# 「せつなぁ……助けて……」
line = "「せつなぁ……助けて……」"

[[dialogue]]
speaker = "せつな"
# 「はっ！　師匠！　よかった、無事でござったか！」
line = "「はっ！　師匠！　よかった、無事でござったか！」"

[[dialogue]]
speaker = "シズル"
# 「ぐすん……無事じゃないですよ～……何度説明しても、お巡りさんが解放してくれなくて……」
line = "「ぐすん……無事じゃないですよ～……何度説明しても、お巡りさんが解放してくれなくて……」"

[[dialogue]]
speaker = "シズル"
# 「補導回数が２桁になっちゃいました。私、何も悪いことしてないのに～」
line = "「補導回数が２桁になっちゃいました。私、何も悪いことしてないのに～」"

[[dialogue]]
speaker = "unk"
# こうしてシズルさんを無事保護したが、この人から目を離してはいけないと、強く思ったのだった。
line = "こうしてシズルさんを無事保護したが、この人から目を離してはいけないと、強く思ったのだった。"
