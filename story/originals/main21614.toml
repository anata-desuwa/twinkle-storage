[[dialogue]]
speaker = "unk"
# 第１４話,終焉,B
line = "第１４話,終焉,B"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「────────ッ！？！？」
line = "「────────ッ！？！？」"

[[dialogue]]
speaker = "unk"
# この創造神を消滅させる──ベガの世界の無念を、晴らしてみせる。
line = "この創造神を消滅させる──ベガの世界の無念を、晴らしてみせる。"

[[dialogue]]
speaker = "ルヴィネ"
# 「ディザスターハンドの力を取り込んだ……これが魔王の、真の力！？」
line = "「ディザスターハンドの力を取り込んだ……これが魔王の、真の力！？」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「２つの世界の、緋宮会長の力を合わせた──」
line = "「２つの世界の、緋宮会長の力を合わせた──」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「すごい……これが、パパの本気なのね！！」
line = "「すごい……これが、パパの本気なのね！！」"

[[dialogue]]
speaker = "クロト"
# 「──滅ぼす！！」
line = "「──滅ぼす！！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギ──ギギ────！？」
line = "「ギ──ギギ────！？」"

[[dialogue]]
speaker = "クロト"
# 「お前を、この世から──消滅させる！！！」
line = "「お前を、この世から──消滅させる！！！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギ────ガ──────！？！？」
line = "「ギ────ガ──────！？！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「お父様！　逃げてください！！　魔王を止められません──このままでは、お父様が！！」
line = "「お父様！　逃げてください！！　魔王を止められません──このままでは、お父様が！！」"

[[dialogue]]
speaker = "クロト"
# 「みんな。複製体を抑えてくれ！　俺は逃げた『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を追撃する──！」
line = "「みんな。複製体を抑えてくれ！　俺は逃げた『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を追撃する──！」"

[[dialogue]]
speaker = "unk"
# トレジアンナたちが奮戦する極星学園の中庭に『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は降り立った。いや、それはむしろ避難か──
line = "トレジアンナたちが奮戦する極星学園の中庭に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は降り立った。いや、それはむしろ避難か──"

[[dialogue]]
speaker = "トレジアンナ"
# 「わ、わわわっ！？」
line = "「わ、わわわっ！？」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「これが──『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』！？」
line = "「これが──『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』！？」"

[[dialogue]]
speaker = "クロト"
# 「カオス──ディメンションッ！！」
line = "「カオス──ディメンションッ！！」"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギイィイ────ガガ、ガガガッ────！？！？」
line = "「ギイィイ────ガガ、ガガガッ────！？！？」"

[[dialogue]]
speaker = "unk"
# どこへ逃げようとも、魔王の追撃は止まらない。
line = "どこへ逃げようとも、魔王の追撃は止まらない。"

[[dialogue]]
speaker = "unk"
# かつて世界を滅ぼした破壊の拳が、創造神に突き刺さっていく。
line = "かつて世界を滅ぼした破壊の拳が、創造神に突き刺さっていく。"

[[dialogue]]
speaker = "クロト"
# 「おおおおぉおおッ──！！！」
line = "「おおおおぉおおッ──！！！」"

[[dialogue]]
speaker = "サチ（覚醒）"
# 「悪神が、悲鳴をあげて……逃げ回って……？」
line = "「悪神が、悲鳴をあげて……逃げ回って……？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「……会長さん！！　何だかとんでもない力を手に入れちゃったみたいですね☆」
line = "「……会長さん！！　何だかとんでもない力を手に入れちゃったみたいですね☆」"

[[dialogue]]
speaker = "unk"
# たまらず『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は再び逃亡を始め──それを追いかける、魔王の少年。
line = "たまらず『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は再び逃亡を始め──それを追いかける、魔王の少年。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「やめろ……お父様をこれ以上傷つけることは許さない！　やめろ！！！」
line = "「やめろ……お父様をこれ以上傷つけることは許さない！　やめろ！！！」"

[[dialogue]]
speaker = "クロト"
# 「対話での解決を拒んだのはお前たち神だ！！　悪いが、ここから先はヒトに時代を明け渡してもらう！！」
line = "「対話での解決を拒んだのはお前たち神だ！！　悪いが、ここから先はヒトに時代を明け渡してもらう！！」"

[[dialogue]]
speaker = "unk"
# 緋宮クロトの放つ拳の一撃一撃は、ディザスターハンドの暴虐に匹敵している。
line = "緋宮クロトの放つ拳の一撃一撃は、ディザスターハンドの暴虐に匹敵している。"

[[dialogue]]
speaker = "unk"
# もはやホロウの複製体など壁にもならない。
line = "もはやホロウの複製体など壁にもならない。"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「が、はぁっ──！？」
line = "「が、はぁっ──！？」"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は“合理的にしか在ることができない”『神』である。
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は“合理的にしか在ることができない”『神』である。"

[[dialogue]]
speaker = "unk"
# ヒトと違い、無駄な行為を行うことができない、宇宙規模の巨大なプログラム。
line = "ヒトと違い、無駄な行為を行うことができない、宇宙規模の巨大なプログラム。"

[[dialogue]]
speaker = "unk"
# ゆえに──
line = "ゆえに──"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギ──────ギギギ────グゥウゥ────！？」
line = "「ギ──────ギギギ────グゥウゥ────！？」"

[[dialogue]]
speaker = "クロト"
# 「……そんなに消えたくないか、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』」
line = "「……そんなに消えたくないか、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』」"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』はデネブの流星市国中を逃げ惑う。敵わないからだ。
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』はデネブの流星市国中を逃げ惑う。敵わないからだ。"

[[dialogue]]
speaker = "unk"
# 厄災の右腕を取り込み、人智を超越したヒト──魔王。
line = "厄災の右腕を取り込み、人智を超越したヒト──魔王。"

[[dialogue]]
speaker = "unk"
# この怪物を斃すことができない。だから逃げる──逃げるしか、<b>することがない</b>のだ。
line = "この怪物を斃すことができない。だから逃げる──逃げるしか、<b>することがない</b>のだ。"

[[dialogue]]
speaker = "ＸＥＬＯＳ"
# 「ギィィイィィィィイ────！？！？」
line = "「ギィィイィィィィイ────！？！？」"

[[dialogue]]
speaker = "unk"
# 『ＸＥＬＯＳ』が離脱し、それを高速で追いかける緋宮クロト。
line = "『ＸＥＬＯＳ』が離脱し、それを高速で追いかける緋宮クロト。"

[[dialogue]]
speaker = "レイラ"
# 「…………ファッ！？　何ですか今の！？！？」
line = "「…………ファッ！？　何ですか今の！？！？」"

[[dialogue]]
speaker = "キサナ"
# 「──はは。どっちがバケモノかわかりゃしねえな。あれが魔王の全力ってやつか……！」
line = "「──はは。どっちがバケモノかわかりゃしねえな。あれが魔王の全力ってやつか……！」"

[[dialogue]]
speaker = "メルエル（覚醒）"
# 「みんな！　ホロウたちをできる限り抑えて──これが本当に最後の戦いだよっ！」
line = "「みんな！　ホロウたちをできる限り抑えて──これが本当に最後の戦いだよっ！」"

[[dialogue]]
speaker = "ネーゼマイン（覚醒）"
# 「会長が親玉を倒すお手伝い。最後の踏ん張りどころってね！」
line = "「会長が親玉を倒すお手伝い。最後の踏ん張りどころってね！」"

[[dialogue]]
speaker = "クロト"
# 「アビス・オーバーロード！！！」
line = "「アビス・オーバーロード！！！」"

[[dialogue]]
speaker = "unk"
# ──幾度目かの致命の一撃が、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の核を打ち貫く。
line = "──幾度目かの致命の一撃が、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の核を打ち貫く。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「お父様……！　私たちに割いている霊力を全てお戻しします！　どうか──どうか！」
line = "「お父様……！　私たちに割いている霊力を全てお戻しします！　どうか──どうか！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「この惑星ごと消滅を！　それ以外に魔王を止める術はありません……！」
line = "「この惑星ごと消滅を！　それ以外に魔王を止める術はありません……！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「そんな──！？」
line = "「そんな──！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「まずいです！　複製体がどんどん消えていって……『ＸＥＬＯＳ』に霊力が集中しています！」
line = "「まずいです！　複製体がどんどん消えていって……『ＸＥＬＯＳ』に霊力が集中しています！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「惑星ごとって……そんなこと、絶対にやらせられないわ！」
line = "「惑星ごとって……そんなこと、絶対にやらせられないわ！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「ふふふ……これでいい……」
line = "「ふふふ……これでいい……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「地球の核にお父様の全霊力を注いで、壊滅させる……！」
line = "「地球の核にお父様の全霊力を注いで、壊滅させる……！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「お父様にも甚大な被害が出てしまうけれど……」
line = "「お父様にも甚大な被害が出てしまうけれど……」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「──アハハハハハ！　これでいい！」
line = "「──アハハハハハ！　これでいい！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「お前たちは、消えるしかない──！！」
line = "「お前たちは、消えるしかない──！！」"

[[dialogue]]
speaker = "クロト"
# 「やらせるかあぁぁあぁああッ────！！！」
line = "「やらせるかあぁぁあぁああッ────！！！」"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』が最後の一撃を放つ前に──こいつをデネブの世界そのものから追い出す！！
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が最後の一撃を放つ前に──こいつをデネブの世界そのものから追い出す！！"

[[dialogue]]
speaker = "unk"
# 教皇庁前に開いている時空の裂け目──かつてデネブの俺が残した負の遺産──これを利用する以外に手はない！
line = "教皇庁前に開いている時空の裂け目──かつてデネブの俺が残した負の遺産──これを利用する以外に手はない！"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「待って！？　クロト──ダメ！　ダメよ！　待って！！」
line = "「待って！？　クロト──ダメ！　ダメよ！　待って！！」"

[[dialogue]]
speaker = "クロト"
# 「おおぉぉぉおぉぉぉぉおッ────！！！」
line = "「おおぉぉぉおぉぉぉぉおッ────！！！」"

[[dialogue]]
speaker = "unk"
# そして俺は──『ＸＥＬＯＳ』ともども。
line = "そして俺は──『ＸＥＬＯＳ』ともども。"

[[dialogue]]
speaker = "unk"
# 時空の裂け目へと飛び込んだ…………
line = "時空の裂け目へと飛び込んだ…………"

[[dialogue]]
speaker = "unk"
# 創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』。そして神に付き従う複製体の全てがいなくなったデネブの教皇庁前は──穏やかな静けさを取り戻していた。
line = "創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』。そして神に付き従う複製体の全てがいなくなったデネブの教皇庁前は──穏やかな静けさを取り戻していた。"

[[dialogue]]
speaker = "グレイス"
# 「魔王……さん？　そんな……」
line = "「魔王……さん？　そんな……」"

[[dialogue]]
speaker = "チナ"
# 「お、おいっ！　こんなのって、ないぞ……！　戻ってこられるんだろ、なあっ！？」
line = "「お、おいっ！　こんなのって、ないぞ……！　戻ってこられるんだろ、なあっ！？」"

[[dialogue]]
speaker = "レティシア"
# 「ベアトの時は、偶然アルタイルにたどり着けたと聞いているけれど……」
line = "「ベアトの時は、偶然アルタイルにたどり着けたと聞いているけれど……」"

[[dialogue]]
speaker = "ベアトリス"
# 「わ、私が行く！　一度は無事にアルタイルにたどり着けたんだし、きっと今回も……！」
line = "「わ、私が行く！　一度は無事にアルタイルにたどり着けたんだし、きっと今回も……！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ダメよベアト！　幸運は二度も続かないわ……！　どこに飛ばされるかもわからない……危険すぎる！」
line = "「ダメよベアト！　幸運は二度も続かないわ……！　どこに飛ばされるかもわからない……危険すぎる！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「そんなっ……クロト！　クロト────ッ！？」
line = "「そんなっ……クロト！　クロト────ッ！？」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「間一髪でした……お父様、よくぞ御無事で……」
line = "「間一髪でした……お父様、よくぞ御無事で……」"

[[dialogue]]
speaker = "unk"
# 『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』による地球の破壊は未遂に終わったが──上手くいった。
line = "『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』による地球の破壊は未遂に終わったが──上手くいった。"

[[dialogue]]
speaker = "unk"
# 当初の目論見どおり、星を破壊できればそれでよし。
line = "当初の目論見どおり、星を破壊できればそれでよし。"

[[dialogue]]
speaker = "unk"
# そうならなくとも、緋宮クロトならば必ず我が身を<ruby=てい>挺</ruby>してでも、時空の裂け目への道連れを選ぶだろうことは予想がついていた。
line = "そうならなくとも、緋宮クロトならば必ず我が身を<ruby>挺<rt>てい</rt></ruby>してでも、時空の裂け目への道連れを選ぶだろうことは予想がついていた。"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「もう緋宮クロトは、デネブにもアルタイルにも帰ることは叶いません」
line = "「もう緋宮クロトは、デネブにもアルタイルにも帰ることは叶いません」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「あの者さえいなくなれば、世界の再創生はたやすい。ただちにデネブに戻り、今度こそ世界の刷新を成し遂げましょう」
line = "「あの者さえいなくなれば、世界の再創生はたやすい。ただちにデネブに戻り、今度こそ世界の刷新を成し遂げましょう」"

[[dialogue]]
speaker = "ホロウ・ルヴィネL"
# 「ご安心ください、お父様。デネブへ帰る経路は、はっきりと記憶しておりますので──ふふふふっ！」
line = "「ご安心ください、お父様。デネブへ帰る経路は、はっきりと記憶しておりますので──ふふふふっ！」"
