[[dialogue]]
speaker = "プトラ"
# 「初めまして、プトラって言います！　こことは違う世界、イリスクラウドからやってきました！」
line = "「初めまして、プトラって言います！　こことは違う世界、イリスクラウドからやってきました！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アルテ"
# 「……どうやら私と同じ境遇の、また別の世界からやってきた人、ということのようですね」
line = "「……どうやら私と同じ境遇の、また別の世界からやってきた人、ということのようですね」"

[[dialogue]]
speaker = "プトラ"
# 「ってことはあなたもそうなんだね？　よろしく～♪」
line = "「ってことはあなたもそうなんだね？　よろしく～♪」"

[[dialogue]]
speaker = "フィオナ"
# 「プトラさんとはつい先ほど出会ったんですが──」
line = "「プトラさんとはつい先ほど出会ったんですが──」"

[[dialogue]]
speaker = "プトラ"
# 「ふきゃっ！！」
line = "「ふきゃっ！！」"

[[dialogue]]
speaker = "プトラ"
# 「こ、ここってどこ？　セントイリスの拠点で待機してたはずなのに……」
line = "「こ、ここってどこ？　セントイリスの拠点で待機してたはずなのに……」"

[[dialogue]]
speaker = "プトラ"
# 「それに、この格好はいったい……？　あ、でも可愛い。好きかも」
line = "「それに、この格好はいったい……？　あ、でも可愛い。好きかも」"

[[dialogue]]
speaker = "フィオナ"
# 「あの……あなたは？　流星学園の制服を着ているということは、うちの生徒、ですよね？」
line = "「あの……あなたは？　流星学園の制服を着ているということは、うちの生徒、ですよね？」"

[[dialogue]]
speaker = "プトラ"
# 「りゅーせー学園？　違うよ？　あたしはプトラ。<ruby=とくべつてっきたい>特別鉄軌隊</ruby>──通称、<ruby=とくてつたい>特鉄隊</ruby>所属の隊員だよ」
line = "「りゅーせー学園？　違うよ？　あたしはプトラ。<ruby>特別鉄軌隊<rt>とくべつてっきたい</rt></ruby>──通称、<ruby>特鉄隊<rt>とくてつたい</rt></ruby>所属の隊員だよ」"

[[dialogue]]
speaker = "フィオナ"
# 「特鉄隊？　部活でしょうか……いえ、そういった名前は記憶にありませんね」
line = "「特鉄隊？　部活でしょうか……いえ、そういった名前は記憶にありませんね」"

[[dialogue]]
speaker = "プトラ"
# 「イリスクラウド五国が共同開発した魔導列車『ミストトレイン』に乗って、<ruby=げんむ>幻霧</ruby>の中から現れるミストモンスターたちと戦う」
line = "「イリスクラウド五国が共同開発した魔導列車『ミストトレイン』に乗って、<ruby>幻霧<rt>げんむ</rt></ruby>の中から現れるミストモンスターたちと戦う」"

[[dialogue]]
speaker = "プトラ"
# 「その為の特殊な訓練を受けた部隊──それが特鉄隊だよ」
line = "「その為の特殊な訓練を受けた部隊──それが特鉄隊だよ」"

[[dialogue]]
speaker = "フィオナ"
# 「ミストトレイン……ごめんなさい、そんな車両は聞いたことがありません。あなたの所属しているという、その特別鉄軌隊というものも……」
line = "「ミストトレイン……ごめんなさい、そんな車両は聞いたことがありません。あなたの所属しているという、その特別鉄軌隊というものも……」"

[[dialogue]]
speaker = "プトラ"
# 「そ、そうなんだ……」
line = "「そ、そうなんだ……」"

[[dialogue]]
speaker = "プトラ"
# 「さすがにミストトレインや特鉄隊のことを全く聞いたことがないっていうのは変だよね……」
line = "「さすがにミストトレインや特鉄隊のことを全く聞いたことがないっていうのは変だよね……」"

[[dialogue]]
speaker = "プトラ"
# 「周りの景色も、見たことない感じだし……いつの間にか知らない制服に着替えてる……」
line = "「周りの景色も、見たことない感じだし……いつの間にか知らない制服に着替えてる……」"

[[dialogue]]
speaker = "プトラ"
