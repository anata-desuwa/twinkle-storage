[[dialogue]]
speaker = "レミカ"
# 「私たち『アーネスト』！　求める声が聞こえれば、世界の果てであっても駆け付ける！」
line = "「私たち『アーネスト』！　求める声が聞こえれば、世界の果てであっても駆け付ける！」"

[[dialogue]]
speaker = "メルエル"
# 「ハートをガッチリ掴むと言えば、もちろん、アイドルだよね！」
line = "「ハートをガッチリ掴むと言えば、もちろん、アイドルだよね！」"

[[dialogue]]
speaker = "unk"
# ２人がどうしてここに！？
line = "２人がどうしてここに！？"

[[dialogue]]
speaker = "メルエル"
# 「会長くんの困ってる声が聞こえたの！　なーんてね」
line = "「会長くんの困ってる声が聞こえたの！　なーんてね」"

[[dialogue]]
speaker = "レミカ"
# 「トリシャさんとヘレナさんにお願いされたんだ。世界のピンチだったら１日限りのユニットも限定復活！　さ、楽しませればいいのは、どこの誰？」
line = "「トリシャさんとヘレナさんにお願いされたんだ。世界のピンチだったら１日限りのユニットも限定復活！　さ、楽しませればいいのは、どこの誰？」"

[[dialogue]]
speaker = "ソフィア"
# 「なんて心強い。守護天使オオヒメ様は、あの神殿の中にいます！」
line = "「なんて心強い。守護天使オオヒメ様は、あの神殿の中にいます！」"

[[dialogue]]
speaker = "メルエル"
# 「りょーかいっ！　行こっか、レミカちゃん！」
line = "「りょーかいっ！　行こっか、レミカちゃん！」"

[[dialogue]]
speaker = "レミカ"
# 「ちゃんとついてきてね、メルエル！」
line = "「ちゃんとついてきてね、メルエル！」"

[[dialogue]]
speaker = "メルエル"
# 「『アイドルスターナイト・フィーバー！』私たちの歌を、聴っけーーーーーっ！！」
line = "「『アイドルスターナイト・フィーバー！』私たちの歌を、聴っけーーーーーっ！！」"

[[dialogue]]
speaker = "レミカ"
# 「合いの手よろしく！　みんなも盛り上げて！」
line = "「合いの手よろしく！　みんなも盛り上げて！」"

[[dialogue]]
speaker = "unk"
# イェーーーーーーッ！！！
line = "イェーーーーーーッ！！！"

[[dialogue]]
speaker = "ウズメイア"
# 「最っ高！　め～っちゃアッガる～っ！」
line = "「最っ高！　め～っちゃアッガる～っ！」"

[[dialogue]]
speaker = "ソフィア"
# 「これがアイドルの力……！　おふたりを見てるだけで、胸の奥からドキドキとワクワクが込み上げてきます……！」
line = "「これがアイドルの力……！　おふたりを見てるだけで、胸の奥からドキドキとワクワクが込み上げてきます……！」"

[[dialogue]]
speaker = "舞亜"
# 「すごいね、なんだか体が疼いてきちゃう……今なら私も──」
line = "「すごいね、なんだか体が疼いてきちゃう……今なら私も──」"

[[dialogue]]
speaker = "フィオナ"
# 「ぐっ……！　ヴィーナスさん、私たちもこのままでは終われませんね」
line = "「ぐっ……！　ヴィーナスさん、私たちもこのままでは終われませんね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「当たり前じゃない。傘回しよりもっとすごい技で、オオヒメだけじゃなくて、みんなギャフンと言わせてやるんだから！」
line = "「当たり前じゃない。傘回しよりもっとすごい技で、オオヒメだけじゃなくて、みんなギャフンと言わせてやるんだから！」"

[[dialogue]]
speaker = "アイリーン"
# 「ひゃー！　これまで披露された芸とはレベルが違うねー！」
line = "「ひゃー！　これまで披露された芸とはレベルが違うねー！」"

[[dialogue]]
speaker = "マグダレナ"
# 「神殿に引きこもっているオオヒメも大いに興味を示しているようです。もう少しで表に出てくるかもしれません」
line = "「神殿に引きこもっているオオヒメも大いに興味を示しているようです。もう少しで表に出てくるかもしれません」"

[[dialogue]]
speaker = "メルエル"
# 「みんなーっ！　あーりがとーっ！」
line = "「みんなーっ！　あーりがとーっ！」"

[[dialogue]]
speaker = "レミカ"
# 「会場のボルテージは高まったかな？　じゃ、私たちに続いては──ワールドスケーター舞亜の登場だよ！」
line = "「会場のボルテージは高まったかな？　じゃ、私たちに続いては──ワールドスケーター舞亜の登場だよ！」"

[[dialogue]]
speaker = "舞亜"
# 「ありがとう、アイドルさんたち。せっかくあったまった空気だけど、氷で冷やしちゃうね」
line = "「ありがとう、アイドルさんたち。せっかくあったまった空気だけど、氷で冷やしちゃうね」"

[[dialogue]]
speaker = "アイリーン"
# 「出てきたのは、金メダルのフィギュアスケート選手、柊舞亜さんー！　これは勝ち確かなー！？」
line = "「出てきたのは、金メダルのフィギュアスケート選手、柊舞亜さんー！　これは勝ち確かなー！？」"

[[dialogue]]
speaker = "舞亜"
# 「行くよ……ふぅーっ……」
line = "「行くよ……ふぅーっ……」"

[[dialogue]]
speaker = "フィオナ"
# 「舞亜さんが息を吹きかけたら、空中にスケートリンクが……！？　氷の星術にはこんな使い方もあるんですね」
line = "「舞亜さんが息を吹きかけたら、空中にスケートリンクが……！？　氷の星術にはこんな使い方もあるんですね」"

[[dialogue]]
speaker = "舞亜"
# 「まだ準備しただけ。私の演技はここからだよ。みんな、見てて……」
line = "「まだ準備しただけ。私の演技はここからだよ。みんな、見てて……」"

[[dialogue]]
speaker = "メルエル"
# 「すごーい！　……あれ？　レミカちゃん、あのフリって私たちのダンスにちょっと似てない？　ほら、今のとこも……」
line = "「すごーい！　……あれ？　レミカちゃん、あのフリって私たちのダンスにちょっと似てない？　ほら、今のとこも……」"

[[dialogue]]
speaker = "レミカ"
# 「もしかして、ちょっと見ただけの私たちのダンスを、自分の演技に取り入れてる……！？　なんて記憶力と順応性……」
line = "「もしかして、ちょっと見ただけの私たちのダンスを、自分の演技に取り入れてる……！？　なんて記憶力と順応性……」"

[[dialogue]]
speaker = "ソフィア"
# 「伸び悩んでるなんて、ウソみたい……やっぱり舞亜のスケートは世界一です……！」
line = "「伸び悩んでるなんて、ウソみたい……やっぱり舞亜のスケートは世界一です……！」"

[[dialogue]]
speaker = "unk"
# みんなが息を呑み、世界の命運がかかっているということすら忘れて、空を滑り、回り、飛び跳ねる舞亜の姿に見惚れていた。
line = "みんなが息を呑み、世界の命運がかかっているということすら忘れて、空を滑り、回り、飛び跳ねる舞亜の姿に見惚れていた。"

[[dialogue]]
speaker = "舞亜"
# 「ふぅ……ありがとうございました」
line = "「ふぅ……ありがとうございました」"

[[dialogue]]
speaker = "アイリーン"
# 「はっ……うっとりしてたら終わっちゃった……！　素晴らしい演技でしたー！　舞亜さんに大きな拍手ーっ！」
line = "「はっ……うっとりしてたら終わっちゃった……！　素晴らしい演技でしたー！　舞亜さんに大きな拍手ーっ！」"

[[dialogue]]
speaker = "マグダレナ"
# 「人の為しうる最高レベルの演技、そして、表現だったのではないでしょうか。まさに完璧、１０点満点です」
line = "「人の為しうる最高レベルの演技、そして、表現だったのではないでしょうか。まさに完璧、１０点満点です」"

[[dialogue]]
speaker = "アイリーン"
# 「出ました、マグダレナさんも納得の１０点満点！　さぁ、神殿の扉は開かれるのかー！　開いてくださーい！」
line = "「出ました、マグダレナさんも納得の１０点満点！　さぁ、神殿の扉は開かれるのかー！　開いてくださーい！」"

[[dialogue]]
speaker = "unk"
# …………あれ？
line = "…………あれ？"

[[dialogue]]
speaker = "ウズメイア"
# 「あれれ～？　反応なさげ～！？」
line = "「あれれ～？　反応なさげ～！？」"

[[dialogue]]
speaker = "ソフィア"
# 「ど、どうしてですか！？　あれを見ても心を揺さぶられないなんて……本当に神殿の奥にオオヒメさんはいるんですか！？」
line = "「ど、どうしてですか！？　あれを見ても心を揺さぶられないなんて……本当に神殿の奥にオオヒメさんはいるんですか！？」"

[[dialogue]]
speaker = "マグダレナ"
# 「いるのは間違いありません。あれほどの演技を見ても満足しないとは、オオヒメの目がよほど肥えているのか、ただ意固地なのか……」
line = "「いるのは間違いありません。あれほどの演技を見ても満足しないとは、オオヒメの目がよほど肥えているのか、ただ意固地なのか……」"

[[dialogue]]
speaker = "ウズメイア"
# 「最高のアイドルソングに、金メダルのフィギュアスケートだよ？　隠しレベルをめっちゃ超えた芸術でも満足しないんじゃ、他に打つ手なんてなくない……？」
line = "「最高のアイドルソングに、金メダルのフィギュアスケートだよ？　隠しレベルをめっちゃ超えた芸術でも満足しないんじゃ、他に打つ手なんてなくない……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「待ちなさい！　まだクロトの一発芸が残ってるわ！」
line = "「待ちなさい！　まだクロトの一発芸が残ってるわ！」"

[[dialogue]]
speaker = "unk"
# 無理だから！
ここは一旦、退こう
line = "無理だから！
ここは一旦、退こう"

[[dialogue]]
speaker = "アイリーン"
# 「このままだと世界がマズいけど、あれ以上の芸をやれる人なんていないもんね……」
line = "「このままだと世界がマズいけど、あれ以上の芸をやれる人なんていないもんね……」"

[[dialogue]]
speaker = "フィオナ"
# 「少なくとも何の準備もなしには不可能ですね。一度引くのに賛成します」
line = "「少なくとも何の準備もなしには不可能ですね。一度引くのに賛成します」"

[[dialogue]]
speaker = "マグダレナ"
# 「またすぐに戻ってきます、オオヒメ。その時は、もう少し素直になってくれると助かるのですが」
line = "「またすぐに戻ってきます、オオヒメ。その時は、もう少し素直になってくれると助かるのですが」"

[[dialogue]]
speaker = "unk"
# マグダレナの言葉は、果たして神殿の最奥にいるオオヒメに届いたのかどうか、果たして──
line = "マグダレナの言葉は、果たして神殿の最奥にいるオオヒメに届いたのかどうか、果たして──"
