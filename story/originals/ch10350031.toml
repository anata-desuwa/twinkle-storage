[[dialogue]]
speaker = "unk"
# 第１話,娯楽を体験しよう～遊園地デート編～,P
line = "第１話,娯楽を体験しよう～遊園地デート編～,P"

[[dialogue]]
speaker = "unk"
# セナリィと恋愛パートナー契約を結んでしばらく経った、とある休日──
line = "セナリィと恋愛パートナー契約を結んでしばらく経った、とある休日──"

[[dialogue]]
speaker = "セナリィ"
# 「なるほど、これが遊園地……。広い園内にアトラクションの数々。道行く人は誰もかれも浮かれてばかり」
line = "「なるほど、これが遊園地……。広い園内にアトラクションの数々。道行く人は誰もかれも浮かれてばかり」"

[[dialogue]]
speaker = "セナリィ"
# 「まさか悪の総帥である私が遊園地デートをすることになるだなんて思いませんでしたわ」
line = "「まさか悪の総帥である私が遊園地デートをすることになるだなんて思いませんでしたわ」"

[[dialogue]]
speaker = "unk"
# 遊園地に行ったことがないって聞いたから
line = "遊園地に行ったことがないって聞いたから"

[[dialogue]]
speaker = "セナリィ"
# 「ええ。幼少の頃から、武器商人の元で生きてきた私です」
line = "「ええ。幼少の頃から、武器商人の元で生きてきた私です」"

[[dialogue]]
speaker = "セナリィ"
# 「いわゆる普通の女性が経験するようなことは、未経験なことがほとんど。それは否定しませんわ」
line = "「いわゆる普通の女性が経験するようなことは、未経験なことがほとんど。それは否定しませんわ」"

[[dialogue]]
speaker = "セナリィ"
# 「けれど本当に大丈夫でしょうか……？　戦場で数え切れないほど命のやり取りをし、この世の酸いも甘いも知り尽くしている私ですわよ？」
line = "「けれど本当に大丈夫でしょうか……？　戦場で数え切れないほど命のやり取りをし、この世の酸いも甘いも知り尽くしている私ですわよ？」"

[[dialogue]]
speaker = "セナリィ"
# 「期待されているリアクションは、できないかもしれません。私がはしゃがなければ、誘った会長様も面白くないのではありませんか？」
line = "「期待されているリアクションは、できないかもしれません。私がはしゃがなければ、誘った会長様も面白くないのではありませんか？」"

[[dialogue]]
speaker = "unk"
# バッチリ楽しませてみせるよ
line = "バッチリ楽しませてみせるよ"

[[dialogue]]
speaker = "セナリィ"
# 「あら……ふふふっ♪　では会長様のエスコート、期待していますわ」
line = "「あら……ふふふっ♪　では会長様のエスコート、期待していますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「裏世界を股にかける私、バンデット・セナリィを満足させるアトラクションがあるかどうかは甚だ疑問ですが……」
line = "「裏世界を股にかける私、バンデット・セナリィを満足させるアトラクションがあるかどうかは甚だ疑問ですが……」"

[[dialogue]]
speaker = "セナリィ"
# 「せっかくの恋人とのお出かけですし、羽を伸ばすことにいたしましょう♪」
line = "「せっかくの恋人とのお出かけですし、羽を伸ばすことにいたしましょう♪」"

[[dialogue]]
speaker = "unk"
# まず、遊園地の目玉であるジェットコースターに誘ってみた結果──
line = "まず、遊園地の目玉であるジェットコースターに誘ってみた結果──"

[[dialogue]]
speaker = "セナリィ"
# 「すっげ～迫力でしたわッ！　何ですのあのコースター！　座るのではなく立ったまま固定して、背面走行だなんて予想外ですわ～！」
line = "「すっげ～迫力でしたわッ！　何ですのあのコースター！　座るのではなく立ったまま固定して、背面走行だなんて予想外ですわ～！」"

[[dialogue]]
speaker = "セナリィ"
# 「直立したまま全身で風を受けつつ、背面走行ゆえにどのような動きになるかもわからない……スリルとサプライズがタップリで……！」
line = "「直立したまま全身で風を受けつつ、背面走行ゆえにどのような動きになるかもわからない……スリルとサプライズがタップリで……！」"

[[dialogue]]
speaker = "セナリィ"
# 「後半を過ぎたあたりからの４連続ループ……クセになりそうなほどの刺激がありましたわ。ああ、まだ足元がフワフワする……！」
line = "「後半を過ぎたあたりからの４連続ループ……クセになりそうなほどの刺激がありましたわ。ああ、まだ足元がフワフワする……！」"

[[dialogue]]
speaker = "unk"
# 楽しんでくれてよかった
line = "楽しんでくれてよかった"

[[dialogue]]
speaker = "セナリィ"
# 「──ファっ！？　い、いえいえ。ちょっぴり新鮮な刺激だっただけで……ふふん。ま、まぁまぁでしたわ！　よいチョイスでしたわよ！」
line = "「──ファっ！？　い、いえいえ。ちょっぴり新鮮な刺激だっただけで……ふふん。ま、まぁまぁでしたわ！　よいチョイスでしたわよ！」"

[[dialogue]]
speaker = "セナリィ"
# 「それで次はどこに……え？　お化け屋敷に行く？　まぁ……それは構いませんが」
line = "「それで次はどこに……え？　お化け屋敷に行く？　まぁ……それは構いませんが」"

[[dialogue]]
speaker = "セナリィ"
# 「ジェットコースターと違って、オバケの被り物をしたスタッフが驚かせてくるだけでしょう？」
line = "「ジェットコースターと違って、オバケの被り物をしたスタッフが驚かせてくるだけでしょう？」"

[[dialogue]]
speaker = "セナリィ"
# 「私、五感は鋭いですから。スタッフが近づけば気配ですぐにわかってしまいます。流石に楽しめないと思いますが……あら？」
line = "「私、五感は鋭いですから。スタッフが近づけば気配ですぐにわかってしまいます。流石に楽しめないと思いますが……あら？」"

[[dialogue]]
speaker = "セナリィ"
# 「へぇ……入場する時、手首にバンドを付けて心拍数を計測する仕組みですって？　なるほど。どれほどビビったのかが可視化されるわけですわね」
line = "「へぇ……入場する時、手首にバンドを付けて心拍数を計測する仕組みですって？　なるほど。どれほどビビったのかが可視化されるわけですわね」"

[[dialogue]]
speaker = "セナリィ"
# 「では、心拍数が高かった方が昼食を奢るというのはいかがです？　ちょっとしたゲームですわ！」
line = "「では、心拍数が高かった方が昼食を奢るというのはいかがです？　ちょっとしたゲームですわ！」"

[[dialogue]]
speaker = "セナリィ"
# 「──受けていただけるんですね？　では事前に宣言させてもらいましょう。ランチご馳走様ですわ、会長様！！」
line = "「──受けていただけるんですね？　では事前に宣言させてもらいましょう。ランチご馳走様ですわ、会長様！！」"

[[dialogue]]
speaker = "unk"
# 受付で渡された心拍測定器を着け、お化け屋敷を踏破した結果──
line = "受付で渡された心拍測定器を着け、お化け屋敷を踏破した結果──"

[[dialogue]]
speaker = "セナリィ"
# 「やややややっ──やっべぇですわ～！？　あのお化け屋敷、尋常じゃないクオリティなんですがっ！？」
line = "「やややややっ──やっべぇですわ～！？　あのお化け屋敷、尋常じゃないクオリティなんですがっ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「実際にあった廃病院を改築して、リアリティを極限まで高めたって……看板に偽り無しではないですか！　普通にチビりそうでしたわ！？」
line = "「実際にあった廃病院を改築して、リアリティを極限まで高めたって……看板に偽り無しではないですか！　普通にチビりそうでしたわ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「しかも！　あの驚かせてきたスタッフ、気配がありませんでした！　私の五感で捉えられないだなんて！？」
line = "「しかも！　あの驚かせてきたスタッフ、気配がありませんでした！　私の五感で捉えられないだなんて！？」"

[[dialogue]]
speaker = "unk"
# 彼女、ステルス能力を持ってるからね
line = "彼女、ステルス能力を持ってるからね"

[[dialogue]]
speaker = "unk"
# 俺の友人の星騎士がバイトしてるんだ
line = "俺の友人の星騎士がバイトしてるんだ"

[[dialogue]]
speaker = "セナリィ"
# 「あんまりじゃありません！？　油断していたところへ不意打ちされて、めちゃくちゃ叫んじゃいましたわよ！？」
line = "「あんまりじゃありません！？　油断していたところへ不意打ちされて、めちゃくちゃ叫んじゃいましたわよ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「そして心拍数が……ああ！」
line = "「そして心拍数が……ああ！」"

[[dialogue]]
speaker = "unk"
# セナリィ、お昼ご飯よろしく！
line = "セナリィ、お昼ご飯よろしく！"

[[dialogue]]
speaker = "セナリィ"
# 「うぐぅ！　しかし負けは負けっ……！　悪の総帥に二言はありませんわ。レストランへ参りましょう！」
line = "「うぐぅ！　しかし負けは負けっ……！　悪の総帥に二言はありませんわ。レストランへ参りましょう！」"

[[dialogue]]
speaker = "セナリィ"
# 「えぇぇえ！？　オムライスが３０００テルス！？　ステーキセットは５０００テルス！？」
line = "「えぇぇえ！？　オムライスが３０００テルス！？　ステーキセットは５０００テルス！？」"

[[dialogue]]
speaker = "セナリィ"
# 「何ですのこれ、ダイヤでも入ってますの……！？　これが世に聞く遊園地価格！？」
line = "「何ですのこれ、ダイヤでも入ってますの……！？　これが世に聞く遊園地価格！？」"

[[dialogue]]
speaker = "セナリィ"
# 「でも約束を反故にはできません。す、好きなものをお頼みなさい！」
line = "「でも約束を反故にはできません。す、好きなものをお頼みなさい！」"

[[dialogue]]
speaker = "セナリィ"
# 「──ってぇ！？　ちょっと、ステーキにドリンクにデザートまで！？　容赦なさすぎですわっ！？」
line = "「──ってぇ！？　ちょっと、ステーキにドリンクにデザートまで！？　容赦なさすぎですわっ！？」"

[[dialogue]]
speaker = "unk"
# こうして賑やかな遊園地デートは陽が傾くまで続いて……
line = "こうして賑やかな遊園地デートは陽が傾くまで続いて……"

[[dialogue]]
speaker = "セナリィ"
# 「会長様……訂正いたしますわ」
line = "「会長様……訂正いたしますわ」"

[[dialogue]]
speaker = "セナリィ"
# 「頭で考えていた以上に、実際に体験する遊園地はとても素敵でした」
line = "「頭で考えていた以上に、実際に体験する遊園地はとても素敵でした」"

[[dialogue]]
speaker = "セナリィ"
# 「傭兵稼業や星騎士の学園生活だけでは体験できない、新鮮なスリルと興奮がありましたし……」
line = "「傭兵稼業や星騎士の学園生活だけでは体験できない、新鮮なスリルと興奮がありましたし……」"

[[dialogue]]
speaker = "セナリィ"
# 「想い人の貴方と一緒にめぐると、遊園地ってこんなにも素敵な場所だったのですね……」
line = "「想い人の貴方と一緒にめぐると、遊園地ってこんなにも素敵な場所だったのですね……」"

[[dialogue]]
speaker = "セナリィ"
# 「よろしければまたお誘いいただけます？　今日みたいに私の知らない、普通の学生が経験する娯楽……もっと教えていただきたいですわ」
line = "「よろしければまたお誘いいただけます？　今日みたいに私の知らない、普通の学生が経験する娯楽……もっと教えていただきたいですわ」"

[[dialogue]]
speaker = "unk"
# もちろんだよ
line = "もちろんだよ"

[[dialogue]]
speaker = "セナリィ"
# 「あ……ふふ♪　会長様ったら……<emoji=heart04>　ええ、私もキスしたいですわ……<emoji=heart04>」
line = "「あ……ふふ♪　会長様ったら……<emoji=heart04>　ええ、私もキスしたいですわ……<emoji=heart04>」"

[[dialogue]]
speaker = "セナリィ"
# 「ん──ちゅっ<emoji=heart04>」
line = "「ん──ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 始めこそ渋っていたセナリィだったが、楽しんでもらえたようで何よりだ。
line = "始めこそ渋っていたセナリィだったが、楽しんでもらえたようで何よりだ。"

[[dialogue]]
speaker = "unk"
# 傭兵という特殊な出自の彼女に、これからも色々なことを経験してもらいたいなと思う俺なのだった──
line = "傭兵という特殊な出自の彼女に、これからも色々なことを経験してもらいたいなと思う俺なのだった──"
