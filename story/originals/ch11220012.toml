[[dialogue]]
speaker = "unk"
# 第２話,いっぱいおっぱいボク元気,P
line = "第２話,いっぱいおっぱいボク元気,P"

[[dialogue]]
speaker = "unk"
# クーシェンから「今日もバトルしようよ！」とＤＩＳＣにメッセージが送られてきたので、トレーニング施設へ向かうと――
line = "クーシェンから「今日もバトルしようよ！」とＤＩＳＣにメッセージが送られてきたので、トレーニング施設へ向かうと――"

[[dialogue]]
speaker = "クーシェン"
# 「へっへ～ん♪　今日もまたボクが勝っちゃうかんね～！」
line = "「へっへ～ん♪　今日もまたボクが勝っちゃうかんね～！」"

[[dialogue]]
speaker = "プリムラ"
# 「ほざけ！　ここまで１２勝１２敗で引き分けじゃろうが！」
line = "「ほざけ！　ここまで１２勝１２敗で引き分けじゃろうが！」"

[[dialogue]]
speaker = "unk"
# そこには最近よく見るようになった光景――クーシェンとプリムラが一緒に手合わせをしていた。
line = "そこには最近よく見るようになった光景――クーシェンとプリムラが一緒に手合わせをしていた。"

[[dialogue]]
speaker = "クーシェン"
# 「やあやあ我こそは、現代に生まれ変わりし斉天大聖！　またの名を、魔法少女フィジカル☆クーシェン！　女神様に代わって、お仕置きしちゃうよ！」
line = "「やあやあ我こそは、現代に生まれ変わりし斉天大聖！　またの名を、魔法少女フィジカル☆クーシェン！　女神様に代わって、お仕置きしちゃうよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「ふん、自称するのは勝手じゃが、本物の魔法少女を名乗りたいなら、この漆黒の魔法少女、プリムラ†ノワールに勝ち越してからにするのじゃな！」
line = "「ふん、自称するのは勝手じゃが、本物の魔法少女を名乗りたいなら、この漆黒の魔法少女、プリムラ†ノワールに勝ち越してからにするのじゃな！」"

[[dialogue]]
speaker = "unk"
# ２人はすっかり仲良くなったね
line = "２人はすっかり仲良くなったね"

[[dialogue]]
speaker = "プリムラ"
# 「どこがじゃ！？」
line = "「どこがじゃ！？」"

[[dialogue]]
speaker = "クーシェン"
# 「あっ、にーにー♪　うんっ！　ボクたち、もう『友達』だよ♪」
line = "「あっ、にーにー♪　うんっ！　ボクたち、もう『友達』だよ♪」"

[[dialogue]]
speaker = "プリムラ"
# 「はぁっ！？　何を言っとるんじゃ貴様！　我はそんなこと認めてなど……」
line = "「はぁっ！？　何を言っとるんじゃ貴様！　我はそんなこと認めてなど……」"

[[dialogue]]
speaker = "クーシェン"
# 「あれ～？　もしかしてプリムラ、恥ずかしがってるの～？　ウキキキ♪」
line = "「あれ～？　もしかしてプリムラ、恥ずかしがってるの～？　ウキキキ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「クラスで一番よく話すし～、最近はお昼も一緒に食べることが多いし～、こうしてバトルも一緒にする仲じゃ～ん☆」
line = "「クラスで一番よく話すし～、最近はお昼も一緒に食べることが多いし～、こうしてバトルも一緒にする仲じゃ～ん☆」"

[[dialogue]]
speaker = "プリムラ"
# 「それは貴様がやたら我に構って来るからじゃろ！」
line = "「それは貴様がやたら我に構って来るからじゃろ！」"

[[dialogue]]
speaker = "unk"
# 最近プリムラが楽しそうにしてるって
line = "最近プリムラが楽しそうにしてるって"

[[dialogue]]
speaker = "unk"
# サチも言ってたよ。
line = "サチも言ってたよ。"

[[dialogue]]
speaker = "プリムラ"
# 「なっ！？　サチの奴も何を言っとるんじゃ！？　そんなの勝手な思い込みじゃ！」
line = "「なっ！？　サチの奴も何を言っとるんじゃ！？　そんなの勝手な思い込みじゃ！」"

[[dialogue]]
speaker = "クーシェン"
# 「そっかそっか～、ウキキ♪　プリムラ、実はボクといると楽しいんだ～？　素直じゃないな～、このこの～♪」
line = "「そっかそっか～、ウキキ♪　プリムラ、実はボクといると楽しいんだ～？　素直じゃないな～、このこの～♪」"

[[dialogue]]
speaker = "unk"
# 嬉しそうな笑みを浮かべながら、プリムラに肩を組みに行くクーシェン。
line = "嬉しそうな笑みを浮かべながら、プリムラに肩を組みに行くクーシェン。"

[[dialogue]]
speaker = "プリムラ"
# 「ちょっ、気安くくっ付くでない、暑苦しい！　眷族が変なこと言うから、こやつが調子に乗り出しおったじゃろうが！」
line = "「ちょっ、気安くくっ付くでない、暑苦しい！　眷族が変なこと言うから、こやつが調子に乗り出しおったじゃろうが！」"

[[dialogue]]
speaker = "クーシェン"
# 「ねぇ、プリムラ、また今度お泊り会しようよ！　次はサチにシズハに、トマルやにーにーも誘って！」
line = "「ねぇ、プリムラ、また今度お泊り会しようよ！　次はサチにシズハに、トマルやにーにーも誘って！」"

[[dialogue]]
speaker = "プリムラ"
# 「いくら流星寮の部屋が大きくても、そんな大人数じゃ狭いわっ！」
line = "「いくら流星寮の部屋が大きくても、そんな大人数じゃ狭いわっ！」"

[[dialogue]]
speaker = "クーシェン"
# 「部屋があればいいの！？　なら、紅明ねーねーにお願いしてみる！　ねーねーはお金持ちだし、高級マンションの部屋が幾つか空いてるって言ってたから♪」
line = "「部屋があればいいの！？　なら、紅明ねーねーにお願いしてみる！　ねーねーはお金持ちだし、高級マンションの部屋が幾つか空いてるって言ってたから♪」"

[[dialogue]]
speaker = "プリムラ"
# 「ちょっと待て！　今のは言葉の綾じゃ！　なんか実現しちゃいそうな気がしてきたのじゃが！？」
line = "「ちょっと待て！　今のは言葉の綾じゃ！　なんか実現しちゃいそうな気がしてきたのじゃが！？」"

[[dialogue]]
speaker = "プリムラ"
# 「大体、眷族とトマルは男なのじゃから、一緒にお泊り会するとサチの奴がうるさく『エッチなのは禁止です！』とか言い出すぞ！」
line = "「大体、眷族とトマルは男なのじゃから、一緒にお泊り会するとサチの奴がうるさく『エッチなのは禁止です！』とか言い出すぞ！」"

[[dialogue]]
speaker = "クーシェン"
# 「え～？　全く、サチも子供だな～。『大人ゲージ』が貯まってない内は、『好きゲージ』も貯まらないから、男の子と一緒に寝ても妊娠はしないのに♪」
line = "「え～？　全く、サチも子供だな～。『大人ゲージ』が貯まってない内は、『好きゲージ』も貯まらないから、男の子と一緒に寝ても妊娠はしないのに♪」"

[[dialogue]]
speaker = "プリムラ"
# 「またその意味不明な『謎ゲージ理論』を……。いつも思うが貴様、それは一体どこで仕入れた性知識なんじゃ……？」
line = "「またその意味不明な『謎ゲージ理論』を……。いつも思うが貴様、それは一体どこで仕入れた性知識なんじゃ……？」"

[[dialogue]]
speaker = "クーシェン"
# 「ふっ……そんなのもちろん、ボクの賢い頭脳で、大人たちが断片的に話す内容から推理したに決まってるじゃないか！」
line = "「ふっ……そんなのもちろん、ボクの賢い頭脳で、大人たちが断片的に話す内容から推理したに決まってるじゃないか！」"

[[dialogue]]
speaker = "プリムラ"
# 「どこをどう推理したら、謎ゲージに行き着くんじゃ……」
line = "「どこをどう推理したら、謎ゲージに行き着くんじゃ……」"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキ♪　そんなにゲージのことが知りたいの～？　プリムラって、にーにーと同じで実はムッツリドスケベだよね～♪」
line = "「ウキキ♪　そんなにゲージのことが知りたいの～？　プリムラって、にーにーと同じで実はムッツリドスケベだよね～♪」"

[[dialogue]]
speaker = "プリムラ"
# 「誰がムッツリドスケベじゃ！？　眷族やサチじゃあるまいし！」
line = "「誰がムッツリドスケベじゃ！？　眷族やサチじゃあるまいし！」"

[[dialogue]]
speaker = "unk"
# 俺も違うんだが！？
line = "俺も違うんだが！？"

[[dialogue]]
speaker = "クーシェン"
# 「仕方ないな～！　そんなに知りたいなら、ボクがゲージの存在に気づいた理由を、特別に教えてあげるよ♪」
line = "「仕方ないな～！　そんなに知りたいなら、ボクがゲージの存在に気づいた理由を、特別に教えてあげるよ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「それはズバリ――おっぱいの存在だよ！」
line = "「それはズバリ――おっぱいの存在だよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「本当におっぱい好きじゃな、こやつ……」
line = "「本当におっぱい好きじゃな、こやつ……」"

[[dialogue]]
speaker = "クーシェン"
# 「うんっ！　ボク、大きなおっぱい大好き！！！」
line = "「うんっ！　ボク、大きなおっぱい大好き！！！」"

[[dialogue]]
speaker = "クーシェン"
# 「それで、世の中には小さなおっぱいと、大きなおっぱいのヒトで分かれてるじゃない？」
line = "「それで、世の中には小さなおっぱいと、大きなおっぱいのヒトで分かれてるじゃない？」"

[[dialogue]]
speaker = "クーシェン"
# 「それでボクはある時、ハッと気づいたんだよ！　大きなおっぱいに成長するには、きっかけが必要なんじゃないかって！」
line = "「それでボクはある時、ハッと気づいたんだよ！　大きなおっぱいに成長するには、きっかけが必要なんじゃないかって！」"

[[dialogue]]
speaker = "クーシェン"
# 「それがすなわち――大人への『進化』！　子供は、大人になる為の見えない『大人ゲージ』が貯まることで、それが可能になるんだよ！」
line = "「それがすなわち――大人への『進化』！　子供は、大人になる為の見えない『大人ゲージ』が貯まることで、それが可能になるんだよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「いや、色々矛盾しとるじゃろ。附属生でも大きなおっぱいのやつはいたりするし。逆に大人でも胸がないやつはおるじゃろ」
line = "「いや、色々矛盾しとるじゃろ。附属生でも大きなおっぱいのやつはいたりするし。逆に大人でも胸がないやつはおるじゃろ」"

[[dialogue]]
speaker = "クーシェン"
# 「ちっちっち♪　甘いよ、プリムラ。年齢は関係ないんだ！」
line = "「ちっちっち♪　甘いよ、プリムラ。年齢は関係ないんだ！」"

[[dialogue]]
speaker = "クーシェン"
# 「大人ゲージが貯まりさえすれば、体が大人に進化する！　つまり、附属生でもおっぱいが大きかったら、大人ってことさ！」
line = "「大人ゲージが貯まりさえすれば、体が大人に進化する！　つまり、附属生でもおっぱいが大きかったら、大人ってことさ！」"

[[dialogue]]
speaker = "プリムラ"
# 「なら、男はどうなるんじゃ？　大人の男は別におっぱいが大きくなったりせんじゃろ」
line = "「なら、男はどうなるんじゃ？　大人の男は別におっぱいが大きくなったりせんじゃろ」"

[[dialogue]]
speaker = "クーシェン"
# 「え～？　プリムラ、知らないの～？　男のヒトはね～」
line = "「え～？　プリムラ、知らないの～？　男のヒトはね～」"

[[dialogue]]
speaker = "クーシェン"
# 「大人になると■■■■■が大きくなるんだよ！」
line = "「大人になると■■■■■が大きくなるんだよ！」"

[[dialogue]]
speaker = "unk"
# ちょっ！！？
line = "ちょっ！！？"

[[dialogue]]
speaker = "プリムラ"
# 「ななな、なに大きな声で言っとるんじゃ、このエロ猿はああぁっ！！？　少しは羞恥心というものがないのか貴様ァ！？」
line = "「ななな、なに大きな声で言っとるんじゃ、このエロ猿はああぁっ！！？　少しは羞恥心というものがないのか貴様ァ！？」"

[[dialogue]]
speaker = "クーシェン"
# 「プリムラが聞いたんじゃんか～！　大人の男はエッチなことをする時、■■■■■が大きく変身するようになってるんだよ！！」
line = "「プリムラが聞いたんじゃんか～！　大人の男はエッチなことをする時、■■■■■が大きく変身するようになってるんだよ！！」"

[[dialogue]]
speaker = "クーシェン"
# 「ボク、聞いちゃったんだから！　その変身する現象のことを――『勃起』って言うんだって！！」
line = "「ボク、聞いちゃったんだから！　その変身する現象のことを――『勃起』って言うんだって！！」"

[[dialogue]]
speaker = "プリムラ"
# 「おいいいいいぃっ！！　わかったから、それ以上はもう喋るでない！　マジでガチの破廉恥なのじゃああああああっ！！！」
line = "「おいいいいいぃっ！！　わかったから、それ以上はもう喋るでない！　マジでガチの破廉恥なのじゃああああああっ！！！」"

[[dialogue]]
speaker = "クーシェン"
# 「え～？　なんか響きがカッコ良くない？　あっ！　ちなみにボク、更に知ってるんだけど、大人の女のヒトは乳首も勃起するんだよ！！」
line = "「え～？　なんか響きがカッコ良くない？　あっ！　ちなみにボク、更に知ってるんだけど、大人の女のヒトは乳首も勃起するんだよ！！」"

[[dialogue]]
speaker = "クーシェン"
# 「ふっ……ボクもつい乳首が『勃起』してしまったよ――って１度は言ってみたくない！？　みたくな～いっ！？」
line = "「ふっ……ボクもつい乳首が『勃起』してしまったよ――って１度は言ってみたくない！？　みたくな～いっ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「眷族ぅぅぅっ！　ダメじゃこのエロ猿、早くなんとかしないと！！！」
line = "「眷族ぅぅぅっ！　ダメじゃこのエロ猿、早くなんとかしないと！！！」"

[[dialogue]]
speaker = "クーシェン"
# 「ウキキ♪　プリムラはやっぱり子供だな～♪」
line = "「ウキキ♪　プリムラはやっぱり子供だな～♪」"

[[dialogue]]
speaker = "unk"
# 顔を赤くして慌てるプリムラを見ながら、悪戯っぽく笑うクーシェンなのであった。
line = "顔を赤くして慌てるプリムラを見ながら、悪戯っぽく笑うクーシェンなのであった。"
