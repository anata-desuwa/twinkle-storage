[[dialogue]]
speaker = "unk"
# 第２話,先輩と遊園地デート,P
line = "第２話,先輩と遊園地デート,P"

[[dialogue]]
speaker = "unk"
# 恋人として付き合い始めて少し経った、とある休日。
line = "恋人として付き合い始めて少し経った、とある休日。"

[[dialogue]]
speaker = "unk"
# 俺はアニマ先輩と遊園地へやって来ていた――
line = "俺はアニマ先輩と遊園地へやって来ていた――"

[[dialogue]]
speaker = "アニマ"
# 「ほほう……！　これが遊園地か……！」
line = "「ほほう……！　これが遊園地か……！」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　実際に来てみると、思っていたよりもワクワクするものだナ♪　さて、会長、どこから回ろうカ？」
line = "「フヒ♪　実際に来てみると、思っていたよりもワクワクするものだナ♪　さて、会長、どこから回ろうカ？」"

[[dialogue]]
speaker = "unk"
# 聞けばアニマ先輩は、遊園地に来るのは今回が初めてだという。
line = "聞けばアニマ先輩は、遊園地に来るのは今回が初めてだという。"

[[dialogue]]
speaker = "unk"
# そんな彼女が最初に選んだのは――
line = "そんな彼女が最初に選んだのは――"

[[dialogue]]
speaker = "アニマ"
# 「よし、会長。アニマは、ジェットコースターに決めたゾ♪」
line = "「よし、会長。アニマは、ジェットコースターに決めたゾ♪」"

[[dialogue]]
speaker = "アニマ"
# 「ソワソワ……」
line = "「ソワソワ……」"

[[dialogue]]
speaker = "unk"
# そうして、ジェットコースターの待機列に並んでいる最中、何やら落ち着かない様子のアニマ先輩。
line = "そうして、ジェットコースターの待機列に並んでいる最中、何やら落ち着かない様子のアニマ先輩。"

[[dialogue]]
speaker = "unk"
# アニマ先輩、どうかしましたか？
line = "アニマ先輩、どうかしましたか？"

[[dialogue]]
speaker = "アニマ"
# 「ふぇっ！？　ああ、いや、その……アニマも初めて来る場所だからナ、色々気になってしまうというか……」
line = "「ふぇっ！？　ああ、いや、その……アニマも初めて来る場所だからナ、色々気になってしまうというか……」"

[[dialogue]]
speaker = "アニマ"
# 「――遊園地が初めてなのは意外だった……？」
line = "「――遊園地が初めてなのは意外だった……？」"

[[dialogue]]
speaker = "アニマ"
# 「興味は以前からあったが、こういう場所は１人だとなかなか来ようと思わないダロウ？　足を運ぶタイミングが無くてネ」
line = "「興味は以前からあったが、こういう場所は１人だとなかなか来ようと思わないダロウ？　足を運ぶタイミングが無くてネ」"

[[dialogue]]
speaker = "unk"
# それから、ジェットコースターに乗ることになり――
line = "それから、ジェットコースターに乗ることになり――"

[[dialogue]]
speaker = "アニマ"
# 「ふおおおぉぉぉっ！？　アハハハッ♪　すごい、すごいゾ！　これが人間の生み出した『絶叫マシーン』というものか！」
line = "「ふおおおぉぉぉっ！？　アハハハッ♪　すごい、すごいゾ！　これが人間の生み出した『絶叫マシーン』というものか！」"

[[dialogue]]
speaker = "アニマ"
# 「星騎士として、こういった激しく動き回る物は大したことナイと、甘く見ていたが、なるほど！　ヒトを楽しませる為に特化すると、こういう乗り心地になるのか！　面白イ♪」
line = "「星騎士として、こういった激しく動き回る物は大したことナイと、甘く見ていたが、なるほど！　ヒトを楽しませる為に特化すると、こういう乗り心地になるのか！　面白イ♪」"

[[dialogue]]
speaker = "アニマ"
# 「会長、閃いたゾ！　リップルのリゾート結界にも、遊園地を作ってみるのはどうダ！？　そこに、星騎士が楽しめるように特化した、スーパー絶叫マシーンを設置するんダ！」
line = "「会長、閃いたゾ！　リップルのリゾート結界にも、遊園地を作ってみるのはどうダ！？　そこに、星騎士が楽しめるように特化した、スーパー絶叫マシーンを設置するんダ！」"

[[dialogue]]
speaker = "アニマ"
# 「そうすれば、通常の絶叫マシーンでは物足りないという星騎士たちも、ストレス解消できるに違いナイぃぃぃっ！」
line = "「そうすれば、通常の絶叫マシーンでは物足りないという星騎士たちも、ストレス解消できるに違いナイぃぃぃっ！」"

[[dialogue]]
speaker = "unk"
# 先輩！　そんな喋ってると舌噛みますよ！？
line = "先輩！　そんな喋ってると舌噛みますよ！？"

[[dialogue]]
speaker = "アニマ"
# 「フヒッ♪　アハハハハハッ♪」
line = "「フヒッ♪　アハハハハハッ♪」"

[[dialogue]]
speaker = "unk"
# ジェットコースターを乗り終えた後、更にいくつかの絶叫マシーンを楽しんで、それからフードコートで休憩することになった。
line = "ジェットコースターを乗り終えた後、更にいくつかの絶叫マシーンを楽しんで、それからフードコートで休憩することになった。"

[[dialogue]]
speaker = "アニマ"
# 「――ふぅ♪　少し気分が落ち着いたゾ」
line = "「――ふぅ♪　少し気分が落ち着いたゾ」"

[[dialogue]]
speaker = "unk"
# アニマ先輩、滅茶苦茶楽しそうでしたね
line = "アニマ先輩、滅茶苦茶楽しそうでしたね"

[[dialogue]]
speaker = "アニマ"
# 「ああ、想像以上に面白かったとも♪」
line = "「ああ、想像以上に面白かったとも♪」"

[[dialogue]]
speaker = "アニマ"
# 「知識だけではなく、実際に体験することが大事――という師の言葉を改めて思い出したヨ」
line = "「知識だけではなく、実際に体験することが大事――という師の言葉を改めて思い出したヨ」"

[[dialogue]]
speaker = "unk"
# 師匠？　先輩の……？
line = "師匠？　先輩の……？"

[[dialogue]]
speaker = "アニマ"
# 「ああ、アニマの錬金術の師匠ダ。そういえば、会長にはアニマの過去を話したことがなかったナ」
line = "「ああ、アニマの錬金術の師匠ダ。そういえば、会長にはアニマの過去を話したことがなかったナ」"

[[dialogue]]
speaker = "アニマ"
# 「アニマは、魔界の片田舎の生まれだったんだが……幸運なことに、故郷に有名な錬金術師が住んでいたんダ」
line = "「アニマは、魔界の片田舎の生まれだったんだが……幸運なことに、故郷に有名な錬金術師が住んでいたんダ」"

[[dialogue]]
speaker = "アニマ"
# 「アニマから見ても変わり者だったが、錬金術の腕前は素晴らしいものだっタ。まだ幼かったアニマもその技に魅せられて、弟子入りをしたんダ」
line = "「アニマから見ても変わり者だったが、錬金術の腕前は素晴らしいものだっタ。まだ幼かったアニマもその技に魅せられて、弟子入りをしたんダ」"

[[dialogue]]
speaker = "アニマ"
# 「そうして錬金術を学ぶ中で、師匠からよく言われたのが、知識だけでなく体験を大事にせよ、ということだった。当時の幼いアニマは、その意味がよく分からずにいたが――」
line = "「そうして錬金術を学ぶ中で、師匠からよく言われたのが、知識だけでなく体験を大事にせよ、ということだった。当時の幼いアニマは、その意味がよく分からずにいたが――」"

[[dialogue]]
speaker = "アニマ"
# 「実際に理解することになったのは、アニマが独り立ちをして、自分の工房を作り、１年間研究に没頭していた時のことダ」
line = "「実際に理解することになったのは、アニマが独り立ちをして、自分の工房を作り、１年間研究に没頭していた時のことダ」"

[[dialogue]]
speaker = "アニマ"
# 「ある時から、閃きが極端に少なくなった。新しい発見というものができなくなっていったんダ」
line = "「ある時から、閃きが極端に少なくなった。新しい発見というものができなくなっていったんダ」"

[[dialogue]]
speaker = "アニマ"
# 「冷静に考えれば、当たり前のコトだった。新しいものを生み出すには、新しい何かに触れる必要があるのダカラ」
line = "「冷静に考えれば、当たり前のコトだった。新しいものを生み出すには、新しい何かに触れる必要があるのダカラ」"

[[dialogue]]
speaker = "アニマ"
# 「つまりはそれが、知識だけではなく、体験をするというコト」
line = "「つまりはそれが、知識だけではなく、体験をするというコト」"

[[dialogue]]
speaker = "アニマ"
# 「だから、アニマは工房を出て、１人旅に出た。そうして、人間界へ――新星学園へとやって来たんダ」
line = "「だから、アニマは工房を出て、１人旅に出た。そうして、人間界へ――新星学園へとやって来たんダ」"

[[dialogue]]
speaker = "アニマ"
# 「その選択は正解だったヨ。人間界は、魔界にはない面白いものに溢れてイタ」
line = "「その選択は正解だったヨ。人間界は、魔界にはない面白いものに溢れてイタ」"

[[dialogue]]
speaker = "アニマ"
# 「リクリエの最前線に来たことで、世界を守るという、新たな目的意識もアニマの中に生まれタ。それから、同年代の友人や、何より――」
line = "「リクリエの最前線に来たことで、世界を守るという、新たな目的意識もアニマの中に生まれタ。それから、同年代の友人や、何より――」"

[[dialogue]]
speaker = "アニマ"
# 「こうして、キミと出会うことができタ。おかげで、アニマは今まで考えもしなかった恋愛を体験することができてイル」
line = "「こうして、キミと出会うことができタ。おかげで、アニマは今まで考えもしなかった恋愛を体験することができてイル」"

[[dialogue]]
speaker = "アニマ"
# 「新たな閃きに困らない、実に面白い毎日だヨ。フヒ♪」
line = "「新たな閃きに困らない、実に面白い毎日だヨ。フヒ♪」"

[[dialogue]]
speaker = "unk"
# 沢山楽しみましょう
line = "沢山楽しみましょう"

[[dialogue]]
speaker = "unk"
# なら、今日は初めての遊園地を
line = "なら、今日は初めての遊園地を"

[[dialogue]]
speaker = "アニマ"
# 「ああ、そうだナ♪」
line = "「ああ、そうだナ♪」"

[[dialogue]]
speaker = "unk"
# その後、俺たちは時間の許す限り遊園地の様々なアトラクションを体験して、帰路へと着いていた。
line = "その後、俺たちは時間の許す限り遊園地の様々なアトラクションを体験して、帰路へと着いていた。"

[[dialogue]]
speaker = "アニマ"
# 「ソワソワ……」
line = "「ソワソワ……」"

[[dialogue]]
speaker = "unk"
# ふと、アニマ先輩がまた落ち着かない様子になっていることに気づく。なんだかチラチラとこちらの様子を伺っているような……
line = "ふと、アニマ先輩がまた落ち着かない様子になっていることに気づく。なんだかチラチラとこちらの様子を伺っているような……"

[[dialogue]]
speaker = "unk"
# アニマ先輩、何かありました？
line = "アニマ先輩、何かありました？"

[[dialogue]]
speaker = "unk"
# 俺が尋ねると、先輩は意を決したように口を開いて――
line = "俺が尋ねると、先輩は意を決したように口を開いて――"

[[dialogue]]
speaker = "アニマ"
# 「えっと、その、ダ……会長」
line = "「えっと、その、ダ……会長」"

[[dialogue]]
speaker = "アニマ"
# 「帰り道の間、手を繋いでもいいダロウか……！？」
line = "「帰り道の間、手を繋いでもいいダロウか……！？」"

[[dialogue]]
speaker = "unk"
# え？
line = "え？"

[[dialogue]]
speaker = "アニマ"
# 「――ほ、本当はだナ……遊園地での待ち時間に、実験してみようと思っていたんダ」
line = "「――ほ、本当はだナ……遊園地での待ち時間に、実験してみようと思っていたんダ」"

[[dialogue]]
speaker = "アニマ"
# 「しかし、想像よりも人口密度が高くてナ。いざ試そうとしたら、なぜかとても恥ずかしい気持ちがしたんダ……」
line = "「しかし、想像よりも人口密度が高くてナ。いざ試そうとしたら、なぜかとても恥ずかしい気持ちがしたんダ……」"

[[dialogue]]
speaker = "アニマ"
# 「おかしなものダ……アニマはこれまで、他人の目など気にしたことはなかっタ。いや、今も特に気にしていナイ」
line = "「おかしなものダ……アニマはこれまで、他人の目など気にしたことはなかっタ。いや、今も特に気にしていナイ」"

[[dialogue]]
speaker = "アニマ"
# 「だが、アニマが他人から見て変なことをしていると、キミに思われることを避けたかったんダ……」
line = "「だが、アニマが他人から見て変なことをしていると、キミに思われることを避けたかったんダ……」"

[[dialogue]]
speaker = "unk"
# 何やら難しい話を始めてしまったアニマ先輩がおかしくて、つい笑ってしまった。
line = "何やら難しい話を始めてしまったアニマ先輩がおかしくて、つい笑ってしまった。"

[[dialogue]]
speaker = "unk"
# だからあの時、ソワソワしていたんですね
line = "だからあの時、ソワソワしていたんですね"

[[dialogue]]
speaker = "アニマ"
# 「わ、笑わなくてもいいダロウ？」
line = "「わ、笑わなくてもいいダロウ？」"

[[dialogue]]
speaker = "アニマ"
# 「――初々しいアニマが可愛くてつい？　そ、そんな風に言われると、余計に恥ずかしいじゃナイか……」
line = "「――初々しいアニマが可愛くてつい？　そ、そんな風に言われると、余計に恥ずかしいじゃナイか……」"

[[dialogue]]
speaker = "unk"
# 俺はそんな彼女の手を取り、握る。
line = "俺はそんな彼女の手を取り、握る。"

[[dialogue]]
speaker = "アニマ"
# 「あっ……」
line = "「あっ……」"

[[dialogue]]
speaker = "unk"
# 次のデートでは、最初から繋ぎましょう
line = "次のデートでは、最初から繋ぎましょう"

[[dialogue]]
speaker = "unk"
# 恋人と手を繋ぎたいのは、変じゃないです
line = "恋人と手を繋ぎたいのは、変じゃないです"

[[dialogue]]
speaker = "アニマ"
# 「あ、ああ。ドキドキしそうだが……でも――」
line = "「あ、ああ。ドキドキしそうだが……でも――」"

[[dialogue]]
speaker = "アニマ"
# 「キミとまた新しい体験ができるのは、楽しみダ♪　フヒ♪」
line = "「キミとまた新しい体験ができるのは、楽しみダ♪　フヒ♪」"

[[dialogue]]
speaker = "unk"
# 先輩は照れた笑みを浮かべながら、俺の手を握り返してくれるのだった。
line = "先輩は照れた笑みを浮かべながら、俺の手を握り返してくれるのだった。"
