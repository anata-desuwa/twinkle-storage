[[dialogue]]
speaker = "unk"
# 第４話,恋はお菓子とともに,P
line = "第４話,恋はお菓子とともに,P"

[[dialogue]]
speaker = "unk"
# ジャクリーヌを探すことに夢中になりすぎて、気づけば夜になってしまっていた。
line = "ジャクリーヌを探すことに夢中になりすぎて、気づけば夜になってしまっていた。"

[[dialogue]]
speaker = "unk"
# もう見つけられないのかと思った矢先、ハロウィン騒動のことを思い出してカフェテリアへとやってきた。
line = "もう見つけられないのかと思った矢先、ハロウィン騒動のことを思い出してカフェテリアへとやってきた。"

[[dialogue]]
speaker = "unk"
# すると――
line = "すると――"

[[dialogue]]
speaker = "unk"
# やっと見つけた
line = "やっと見つけた"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余のことは放っておいてなの！」
line = "「余のことは放っておいてなの！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「だって……会長は余のこと嫌いなんだゆ！？」
line = "「だって……会長は余のこと嫌いなんだゆ！？」"

[[dialogue]]
speaker = "unk"
# そんなわけない！
line = "そんなわけない！"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ……？」
line = "「ゆ……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余のこと、嫌いになったんじゃないゆ……？」
line = "「余のこと、嫌いになったんじゃないゆ……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「お菓子をあげても、会長は変な反応だったの……。いっぱいおめかしした姿を見せたときだって……」
line = "「お菓子をあげても、会長は変な反応だったの……。いっぱいおめかしした姿を見せたときだって……」"

[[dialogue]]
speaker = "unk"
# それは……
line = "それは……"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「無理しないで、正直に言ってくれていいの」
line = "「無理しないで、正直に言ってくれていいの」"

[[dialogue]]
speaker = "unk"
# 俺は勇気を振り絞って言った。
line = "俺は勇気を振り絞って言った。"

[[dialogue]]
speaker = "unk"
# ジャクリーヌのことが好きだから！
line = "ジャクリーヌのことが好きだから！"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「………………」
line = "「………………」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「…………それ、本当なの？」
line = "「…………それ、本当なの？」"

[[dialogue]]
speaker = "unk"
# こくりと頷く。
line = "こくりと頷く。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「だ、だったらなんで……お菓子あげても……？」
line = "「だ、だったらなんで……お菓子あげても……？」"

[[dialogue]]
speaker = "unk"
# それはただ、恥ずかしかったから……
line = "それはただ、恥ずかしかったから……"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「あっ♪　会長も余と同じ気持ちだったってことゆ？　……それはなんだか、嬉しいの♪」
line = "「あっ♪　会長も余と同じ気持ちだったってことゆ？　……それはなんだか、嬉しいの♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余も、余もね……？　会長のこと……大好きなの♪」
line = "「余も、余もね……？　会長のこと……大好きなの♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「だから……逃げ出す前、恥ずかしくて、カボチャ姿になって……踊っちゃったゆ……」
line = "「だから……逃げ出す前、恥ずかしくて、カボチャ姿になって……踊っちゃったゆ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ……ゆへへ。ぐすっ……嬉しすぎて、泣いちゃうの……」
line = "「ゆ……ゆへへ。ぐすっ……嬉しすぎて、泣いちゃうの……」"

[[dialogue]]
speaker = "unk"
# 実は同じ気持ちでいてくれて、いつも明るくて元気なジャクリーヌが泣くほど喜んでくれるなんて、告白してよかった。
line = "実は同じ気持ちでいてくれて、いつも明るくて元気なジャクリーヌが泣くほど喜んでくれるなんて、告白してよかった。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆ♪　どっちも恥ずかしがって変になってたなんて……おかしいゆ<emoji=heart04>」
line = "「ゆーっゆっゆっゆ♪　どっちも恥ずかしがって変になってたなんて……おかしいゆ<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余たち、似た者同士なの！」
line = "「余たち、似た者同士なの！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「でも、本当に余でいいの？　……余は人間じゃなくて、パンプキンファントムなの」
line = "「でも、本当に余でいいの？　……余は人間じゃなくて、パンプキンファントムなの」"

[[dialogue]]
speaker = "unk"
# そこも含めて好きになったんだから
line = "そこも含めて好きになったんだから"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆへへ♪　会長、また顔が赤くなってるの<emoji=heart04>」
line = "「ゆへへ♪　会長、また顔が赤くなってるの<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余だって、きっと、すっごく赤くなってるの……でも、全然恥ずかしくない……むしろ嬉しいゆ<emoji=heart04>」
line = "「余だって、きっと、すっごく赤くなってるの……でも、全然恥ずかしくない……むしろ嬉しいゆ<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「これで余と会長は恋人同士なの？　……どういうことをすれば、本当の恋人同士になるゆ？」
line = "「これで余と会長は恋人同士なの？　……どういうことをすれば、本当の恋人同士になるゆ？」"

[[dialogue]]
speaker = "unk"
# ジャクリーヌのその問いに対して、俺はこれからも彼女をしっかりエスコートしようと決意した。
line = "ジャクリーヌのその問いに対して、俺はこれからも彼女をしっかりエスコートしようと決意した。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「あ、でも、１つだけ知ってることがあるの♪　会長、少しかがんでほしいゆ」
line = "「あ、でも、１つだけ知ってることがあるの♪　会長、少しかがんでほしいゆ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「うん、それでいいの……じゃあ、目をつぶってほしいゆ……」
line = "「うん、それでいいの……じゃあ、目をつぶってほしいゆ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ありがとなの。じゃあ、行くゆ！」
line = "「ありがとなの。じゃあ、行くゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# キスされていることに気づいたのは、驚いて目を開けた時だった。
line = "キスされていることに気づいたのは、驚いて目を開けた時だった。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ん……ちゅ<emoji=heart04>」
line = "「ん……ちゅ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 時間にしたら短かったかもしれない。お互いゆっくりと重ねていた唇を離す。
line = "時間にしたら短かったかもしれない。お互いゆっくりと重ねていた唇を離す。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆへへ<emoji=heart04>　キス、しちゃったの……<emoji=heart04>」
line = "「ゆへへ<emoji=heart04>　キス、しちゃったの……<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「とっても恥ずかしかったの……でもなんだか、すっごく気分がいいの<emoji=heart04>」
line = "「とっても恥ずかしかったの……でもなんだか、すっごく気分がいいの<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「これから、もっともっと教えてゆ……よろしくなの<emoji=heart04>」
line = "「これから、もっともっと教えてゆ……よろしくなの<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、顔を耳まで真っ赤にしながらニッコリと笑ったジャクリーヌは、ゆらゆらと揺れながら、恥ずかしそうに少しだけ距離をとるのだった。
line = "そう言って、顔を耳まで真っ赤にしながらニッコリと笑ったジャクリーヌは、ゆらゆらと揺れながら、恥ずかしそうに少しだけ距離をとるのだった。"
