line = "（先頭に立って戦って、一番ダメージを受けて……それでも平気だとばかりに堂々と立っている……これが、あなたの戦い方なのね）"

[[dialogue]]
speaker = "サーシャ"
# （シルヴィに自覚があるかどうかはわからないけど……戦って戦うほど、多くを守れる）
line = "（シルヴィに自覚があるかどうかはわからないけど……戦って戦うほど、多くを守れる）"

[[dialogue]]
speaker = "サーシャ"
# （それは星騎士として、星徒会として、これ以上ない資質だわ）
