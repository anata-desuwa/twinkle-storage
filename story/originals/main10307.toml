line = "（戦場に立てば、実力以上の数の敵と相対してしまうリスクがあるわ）"

[[dialogue]]
speaker = "サーシャ"
# （私があの子を副会長にするか迷った理由はそれなんだけど……）
line = "（私があの子を副会長にするか迷った理由はそれなんだけど……）"

[[dialogue]]
speaker = "シルヴィ"
# 「ガンガン行くよ！　ライジン・ブラストビートっ！」
line = "「ガンガン行くよ！　ライジン・ブラストビートっ！」"

[[dialogue]]
speaker = "イグニック"
# 「キシャアア！！」
line = "「キシャアア！！」"

[[dialogue]]
speaker = "ズシオーン"
# 「ブオーーーーッ！」
line = "「ブオーーーーッ！」"

[[dialogue]]
speaker = "蛍火"
