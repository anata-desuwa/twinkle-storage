line = "「幸い、近くにいた星騎士が駆けつけてくれて、人が死んだりはしなかったんだけど、まぁ町がすごいことになっちゃった」"

[[dialogue]]
speaker = "シルヴィ"
# 「家も壊れて住めなくなっちゃうし、広場でも遊べなくてさ。『楽しくない』って思ったんだ」
line = "「家も壊れて住めなくなっちゃうし、広場でも遊べなくてさ。『楽しくない』って思ったんだ」"

[[dialogue]]
speaker = "シルヴィ"
# 「思えば、そのときまでずっと『楽しい』だったの。でも、それは誰かが守ってくれてたからなんだって」
line = "「思えば、そのときまでずっと『楽しい』だったの。でも、それは誰かが守ってくれてたからなんだって」"

