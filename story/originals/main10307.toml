line = "「散開していたモンスターが全てこちらに集まってきています！」"

[[dialogue]]
speaker = "サーシャ"
# （空では飛行型のモンスターが、地上では獣型のモンスターがシルヴィを狙ってる）
line = "（空では飛行型のモンスターが、地上では獣型のモンスターがシルヴィを狙ってる）"

[[dialogue]]
speaker = "サーシャ"
# 「シルヴィ、一人で敵の注意を引きすぎてるわ！　少し抑えて！」
line = "「シルヴィ、一人で敵の注意を引きすぎてるわ！　少し抑えて！」"

[[dialogue]]
speaker = "シルヴィ"
# 「大丈夫、問題ないよっ！」
line = "「大丈夫、問題ないよっ！」"

[[dialogue]]
speaker = "unk"
# モンスターの攻撃を受け吹っ飛ばされても、シルヴィはすぐに立ち上がる。
line = "モンスターの攻撃を受け吹っ飛ばされても、シルヴィはすぐに立ち上がる。"

[[dialogue]]
speaker = "unk"
# 恵まれたフィジカルが彼女の戦い方を支えている。彼女が戦場で倒れている姿は見たことがない。
line = "恵まれたフィジカルが彼女の戦い方を支えている。彼女が戦場で倒れている姿は見たことがない。"

[[dialogue]]
speaker = "unk"
# けれど、モンスターやアステラの発生率が上がり続けている。リクリエが近付いていることは間違いない。
line = "けれど、モンスターやアステラの発生率が上がり続けている。リクリエが近付いていることは間違いない。"

