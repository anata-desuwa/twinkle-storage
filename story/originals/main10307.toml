line = "「ふふっ、シルヴィがそう言ってくれると嬉しいわ～。あなたは？　卒業後、何がしたい？」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしはまだそういうの見つからないんだよね～。なんでも『楽しい』から決められないんだ。でもまずは自分の町に帰るかな～」
line = "「あたしはまだそういうの見つからないんだよね～。なんでも『楽しい』から決められないんだ。でもまずは自分の町に帰るかな～」"

[[dialogue]]
speaker = "シルヴィ"
# 「あ、そうだ。大聖堂に行こう！」
line = "「あ、そうだ。大聖堂に行こう！」"

[[dialogue]]
speaker = "サーシャ"
# 「？」
line = "「？」"
