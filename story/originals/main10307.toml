line = "シルヴィがツインメイスを振るう度、爆音と閃光が吹き荒れる。"

[[dialogue]]
speaker = "unk"
# その圧倒的な存在感に、モンスターたちは彼女を無視できない。
line = "その圧倒的な存在感に、モンスターたちは彼女を無視できない。"

[[dialogue]]
speaker = "サーシャ"
# （相変わらずド派手ね～）
line = "（相変わらずド派手ね～）"

[[dialogue]]
speaker = "サーシャ"
# （シルヴィは数多くいる星騎士の中でも、特に『目立つ』存在）
line = "（シルヴィは数多くいる星騎士の中でも、特に『目立つ』存在）"

[[dialogue]]
speaker = "サーシャ"
