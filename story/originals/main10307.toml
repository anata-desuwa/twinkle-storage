line = "「……先輩、他の生徒のみなさんが見ています」"

[[dialogue]]
speaker = "シルヴィ"
# 「あっ、みんな一緒に戦ってくれてありがとう！　星徒会だけじゃ大変だったから助かったよ～！」
line = "「あっ、みんな一緒に戦ってくれてありがとう！　星徒会だけじゃ大変だったから助かったよ～！」"

[[dialogue]]
