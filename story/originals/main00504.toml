[[dialogue]]
speaker = "unk"
# 第６話,魔王の因子,B
line = "第６話,魔王の因子,B"

[[dialogue]]
speaker = "アルモタヘル"
# 「ウ……ヅヅ……ググ……！」
line = "「ウ……ヅヅ……ググ……！」"

[[dialogue]]
speaker = "unk"
# 戦闘終了──
line = "戦闘終了──"

[[dialogue]]
speaker = "unk"
# 暴走していた堕天使の勢いは収まり、その場にうずくまる。
line = "暴走していた堕天使の勢いは収まり、その場にうずくまる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「解放できた……かしら……？」
line = "「解放できた……かしら……？」"

[[dialogue]]
speaker = "クロト"
# 「恐らく……？」
line = "「恐らく……？」"

[[dialogue]]
speaker = "フィオナ"
# 「──まだです！」
line = "「──まだです！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──っ！？」
line = "「──っ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「召喚陣展開……！」
line = "「召喚陣展開……！」"

[[dialogue]]
speaker = "フィオナ"
# 「エクリプスディザスター──！」
line = "「エクリプスディザスター──！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「──づぅぅっ！？」
line = "「──づぅぅっ！？」"

[[dialogue]]
speaker = "unk"
# とどめとばかりに放たれた熱線が、今度こそ堕天使を鎮静した。
line = "とどめとばかりに放たれた熱線が、今度こそ堕天使を鎮静した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ……ありがとう……フィオナ……」
line = "「あ……ありがとう……フィオナ……」"

[[dialogue]]
speaker = "クロト"
# 「……今のは本気でやばかったな。助かった」
line = "「……今のは本気でやばかったな。助かった」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ。強いて言うなら──ふふ、<ruby=しんがり>殿</ruby>を任されたおかげでしょうか」
line = "「いえ。強いて言うなら──ふふ、<ruby>殿<rt>しんがり</rt></ruby>を任されたおかげでしょうか」"

[[dialogue]]
speaker = "unk"
# やはり、フィオナの冷静沈着さは俺たちにないものだ。誰よりも周りが見えている。
line = "やはり、フィオナの冷静沈着さは俺たちにないものだ。誰よりも周りが見えている。"

[[dialogue]]
speaker = "unk"
# 彼女は謙遜して微笑みつつも……まだ警戒を解くことはなかった。
line = "彼女は謙遜して微笑みつつも……まだ警戒を解くことはなかった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど……つまり、チームワークの勝利ね！」
line = "「なるほど……つまり、チームワークの勝利ね！」"

[[dialogue]]
speaker = "クロト"
# 「都合よくまとめすぎじゃないか？」
line = "「都合よくまとめすぎじゃないか？」"

[[dialogue]]
speaker = "unk"
# しかし……
line = "しかし……"

[[dialogue]]
speaker = "アルモタヘル"
# 「ユル……セヌ……人間、デスラ、ナイ者……ググ……！」
line = "「ユル……セヌ……人間、デスラ、ナイ者……ググ……！」"

[[dialogue]]
speaker = "フィオナ"
# 「まだ瘴気に捕われているよう……危険です！」
line = "「まだ瘴気に捕われているよう……危険です！」"

[[dialogue]]
speaker = "クロト"
# 「まだ、足りないか……！」
line = "「まだ、足りないか……！」"

[[dialogue]]
speaker = "unk"
# 解放どころかますます膨れ上がる堕天使の瘴気。
line = "解放どころかますます膨れ上がる堕天使の瘴気。"

[[dialogue]]
speaker = "unk"
# 彼女を守護天使に戻すには、今以上の力をぶつけないと……！
line = "彼女を守護天使に戻すには、今以上の力をぶつけないと……！"

[[dialogue]]
speaker = "アルモタヘル"
# 「消エロ……全員、コノママ、滅ボシ尽クシテ……！！」
line = "「消エロ……全員、コノママ、滅ボシ尽クシテ……！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まずいわね。クロト、フィオナ、私の後ろに下がって──」
line = "「まずいわね。クロト、フィオナ、私の後ろに下がって──」"

[[dialogue]]
speaker = "unk"
# しかし、その刹那。
line = "しかし、その刹那。"

[[dialogue]]
speaker = "unk"
# 『どいて……アルモタヘル』
line = "『どいて……アルモタヘル』"

[[dialogue]]
speaker = "アルモタヘル"
# 「ン……？　グアアッ！？」
line = "「ン……？　グアアッ！？」"

[[dialogue]]
speaker = "クロト"
# 「な──！？」
line = "「な──！？」"

[[dialogue]]
speaker = "unk"
# どこからか振るわれた光の柱が、薙ぎ払うようにして守護天使を放逐する。
line = "どこからか振るわれた光の柱が、薙ぎ払うようにして守護天使を放逐する。"

[[dialogue]]
speaker = "unk"
# 凄まじい衝撃に叩きつけられた彼女は、そのままこのフロアからも姿を消してしまった。
line = "凄まじい衝撃に叩きつけられた彼女は、そのままこのフロアからも姿を消してしまった。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "unk"
# 『よく……来てくれました……ヴィーナス』
line = "『よく……来てくれました……ヴィーナス』"

[[dialogue]]
speaker = "クロト"
# 「この、声は……」
line = "「この、声は……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私を呼んでた……！」
line = "「私を呼んでた……！」"

[[dialogue]]
speaker = "unk"
# 誰もいないはずの空間に女性の声が木霊する。
line = "誰もいないはずの空間に女性の声が木霊する。"

[[dialogue]]
speaker = "unk"
# 先ほどまでの一触即発の剣呑さは、その登場によって拭い去られてしまっていた。
line = "先ほどまでの一触即発の剣呑さは、その登場によって拭い去られてしまっていた。"

[[dialogue]]
speaker = "フィオナ"
# （第七階層──第八階層──いや、ともすればそれよりさらに上……）
line = "（第七階層──第八階層──いや、ともすればそれよりさらに上……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「一階層の時も、聞こえてたわよね。あなたは……あなたは誰なの！？」
line = "「一階層の時も、聞こえてたわよね。あなたは……あなたは誰なの！？」"

[[dialogue]]
speaker = "unk"
# 虚空に向かって叫ぶヴィーナス。
line = "虚空に向かって叫ぶヴィーナス。"

[[dialogue]]
speaker = "unk"
# その聖なる存在は、どこで聞いているのかゆっくりと答え始めた。
line = "その聖なる存在は、どこで聞いているのかゆっくりと答え始めた。"

[[dialogue]]
speaker = "unk"
# 『答えられません……今の私は、名すらも奪われていますから』
line = "『答えられません……今の私は、名すらも奪われていますから』"

[[dialogue]]
speaker = "ヴィーナス"
# 「な、名前も言えないの……！？」
line = "「な、名前も言えないの……！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスもまた声の正体を判じかねている様子。
line = "ヴィーナスもまた声の正体を判じかねている様子。"

[[dialogue]]
speaker = "unk"
# だが、彼女だけが特別扱いされているのはこれまでの体験からも明白だった。
line = "だが、彼女だけが特別扱いされているのはこれまでの体験からも明白だった。"

[[dialogue]]
speaker = "クロト"
# （マグダレナさんたち守護天使はフィーニスの塔を守るもの──彼女たちの主は流星教皇庁も崇める女神テルル……）
line = "（マグダレナさんたち守護天使はフィーニスの塔を守るもの──彼女たちの主は流星教皇庁も崇める女神テルル……）"

[[dialogue]]
speaker = "クロト"
# （ん……？　なら待て──この声は、女神様本人の可能性もあるってことか……！？）
line = "（ん……？　なら待て──この声は、女神様本人の可能性もあるってことか……！？）"

[[dialogue]]
speaker = "unk"
# 女神テルル。
line = "女神テルル。"

[[dialogue]]
speaker = "unk"
# その御名は三界の創造主にして、生きとし生ける者の守護者である。
line = "その御名は三界の創造主にして、生きとし生ける者の守護者である。"

[[dialogue]]
speaker = "クロト"
# （話が飛躍しすぎた──だが、どこまでが真実だ）
line = "（話が飛躍しすぎた──だが、どこまでが真実だ）"

[[dialogue]]
speaker = "unk"
# マグダレナさんの語っていた情報に嘘はなかった──ように思う。
line = "マグダレナさんの語っていた情報に嘘はなかった──ように思う。"

[[dialogue]]
speaker = "unk"
# 騙す意味がないし、騙すとすればもっとマシな過程をでっち上げるだろう。
line = "騙す意味がないし、騙すとすればもっとマシな過程をでっち上げるだろう。"

[[dialogue]]
speaker = "unk"
# その上で、彼女らよりさらに上位の存在が、わざわざヴィーナスを手招きしている意味とはなんだ。
line = "その上で、彼女らよりさらに上位の存在が、わざわざヴィーナスを手招きしている意味とはなんだ。"

[[dialogue]]
speaker = "unk"
# なぜ俺たちを導くのか。鍵は、そこに秘められているように思えた。
line = "なぜ俺たちを導くのか。鍵は、そこに秘められているように思えた。"

[[dialogue]]
speaker = "クロト"
# （だからと言って……女神様のお告げが聞こえて、なんて、鵜呑みにするのも危険だ。今は保留としよう）
line = "（だからと言って……女神様のお告げが聞こえて、なんて、鵜呑みにするのも危険だ。今は保留としよう）"

[[dialogue]]
speaker = "unk"
# この声の主から正体が語られたとてそれが真実とは限らない。
line = "この声の主から正体が語られたとてそれが真実とは限らない。"

[[dialogue]]
speaker = "unk"
# 今の俺にできるのは、この機会に多くの情報を得ることだ。
line = "今の俺にできるのは、この機会に多くの情報を得ることだ。"

[[dialogue]]
speaker = "unk"
# この声と会話ができるのはヴィーナスだけ──今は２人のやり取りを傾聴しよう。
line = "この声と会話ができるのはヴィーナスだけ──今は２人のやり取りを傾聴しよう。"

[[dialogue]]
speaker = "unk"
# 『リクリエがどういうものか。きっと理解してもらえたでしょう』
line = "『リクリエがどういうものか。きっと理解してもらえたでしょう』"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！　そうね──それについては、よくわかったわ！」
line = "「……！　そうね──それについては、よくわかったわ！」"

[[dialogue]]
speaker = "unk"
# 『よい子です、ヴィーナス。ならば今、世界に訪れている事象も把握したはず』
line = "『よい子です、ヴィーナス。ならば今、世界に訪れている事象も把握したはず』"

[[dialogue]]
speaker = "unk"
# 『此度のリクリエは一度阻止され、変異したものであり』
line = "『此度のリクリエは一度阻止され、変異したものであり』"

[[dialogue]]
speaker = "unk"
# 『もし、二度目の制覇を願うのなら──最強の魔王が必要なのです』
line = "『もし、二度目の制覇を願うのなら──最強の魔王が必要なのです』"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "フィオナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# 俺たち全員が身構えた。
line = "俺たち全員が身構えた。"

[[dialogue]]
speaker = "unk"
# 最強の魔王……寓話めいたその言葉に、今は不思議と実感がこもる。
line = "最強の魔王……寓話めいたその言葉に、今は不思議と実感がこもる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「や……やっぱりそうよね！　うん！　私も、それしかないと思ってクロトを頼っていたんだもの！」
line = "「や……やっぱりそうよね！　うん！　私も、それしかないと思ってクロトを頼っていたんだもの！」"

[[dialogue]]
speaker = "unk"
# 俺たちの視線は、自然と『月の壁画』へと集まっていく。
line = "俺たちの視線は、自然と『月の壁画』へと集まっていく。"

[[dialogue]]
speaker = "unk"
# 『壁画に描かれた前回のリクリエから３０００年の時が経ちました。その間に魔王の血統は分かれ、三界すべてにその<ruby=こうえい>後裔</ruby>が散っている状態』
line = "『壁画に描かれた前回のリクリエから３０００年の時が経ちました。その間に魔王の血統は分かれ、三界すべてにその<ruby>後裔<rt>こうえい</rt></ruby>が散っている状態』"

[[dialogue]]
speaker = "unk"
# 『三界それぞれに一人ずつ、適合率の極めて高い正統なる魔王の因子が存在します』
line = "『三界それぞれに一人ずつ、適合率の極めて高い正統なる魔王の因子が存在します』"

[[dialogue]]
speaker = "ヴィーナス"
# 「正統なる魔王の因子……！」
line = "「正統なる魔王の因子……！」"

[[dialogue]]
speaker = "unk"
# 『魔界の皇妃──<ruby=コウレイ>煌嶺</ruby>。彼女は頽廃都市キュリオスを統べ、人のみならずアステラ由来のモンスターをも従えています』
line = "『魔界の皇妃──<ruby>煌嶺<rt>コウレイ</rt></ruby>。彼女は頽廃都市キュリオスを統べ、人のみならずアステラ由来のモンスターをも従えています』"

[[dialogue]]
speaker = "unk"
# １人目。無論、聞いたことのない名だ。
line = "１人目。無論、聞いたことのない名だ。"

[[dialogue]]
speaker = "unk"
# 『天界の天使──リガルタ。聖庭園の長老として知られる彼ですが、魔王の血であることは古くより悟られぬよう暮らしているようです』
line = "『天界の天使──リガルタ。聖庭園の長老として知られる彼ですが、魔王の血であることは古くより悟られぬよう暮らしているようです』"

[[dialogue]]
speaker = "unk"
# ２人目。俺たちは天界に縁がないため、こちらも知らない。
line = "２人目。俺たちは天界に縁がないため、こちらも知らない。"

[[dialogue]]
speaker = "unk"
# 『そして……最も色濃く魔王の血を引く人物。それは今、人間界に存在します』
line = "『そして……最も色濃く魔王の血を引く人物。それは今、人間界に存在します』"

[[dialogue]]
speaker = "unk"
# だが、３人目は──
line = "だが、３人目は──"

[[dialogue]]
speaker = "unk"
# 『流星市国の娘──星見フィオナ』
line = "『流星市国の娘──星見フィオナ』"

[[dialogue]]
speaker = "フィオナ"
# 「！！」
line = "「！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へ……クロトじゃなくて！？」
line = "「へ……クロトじゃなくて！？」"

[[dialogue]]
speaker = "クロト"
# 「フィオナが……？」
line = "「フィオナが……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「えーっとえーっとちょっと待ってね……頭が混乱してるんだ私……つまり……その」
line = "「えーっとえーっとちょっと待ってね……頭が混乱してるんだ私……つまり……その」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナも魔王だった……ってこと！？」
line = "「フィオナも魔王だった……ってこと！？」"

[[dialogue]]
speaker = "フィオナ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "フィオナ"
# 「家では、そう伝えられてきました。それがための……『月の壁画』です」
line = "「家では、そう伝えられてきました。それがための……『月の壁画』です」"

[[dialogue]]
speaker = "クロト"
# 「フィオナの家には……この絵がそのままあるんだったか」
line = "「フィオナの家には……この絵がそのままあるんだったか」"

[[dialogue]]
speaker = "unk"
# 魔王というワードに彼女が反応する理由もわかった。これ以上なく簡潔だった。
line = "魔王というワードに彼女が反応する理由もわかった。これ以上なく簡潔だった。"

[[dialogue]]
speaker = "unk"
# 星見家とは──リクリエから世界を救った、魔王の血統なのだ。
line = "星見家とは──リクリエから世界を救った、魔王の血統なのだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、でもでもだとしたらここに描かれてるクロトは何なの！？　そっくりさんだとしても──」
line = "「で、でもでもだとしたらここに描かれてるクロトは何なの！？　そっくりさんだとしても──」"

[[dialogue]]
speaker = "unk"
# 『私に言えるのはここまでです。ここから先は──次の階層にて知るべきこと』
line = "『私に言えるのはここまでです。ここから先は──次の階層にて知るべきこと』"

[[dialogue]]
speaker = "unk"
# 『ですが、まずは塔の外にリクリエの使徒お目見えです──彼女を退け、運命を切り開かんことを祈っています』
line = "『ですが、まずは塔の外にリクリエの使徒お目見えです──彼女を退け、運命を切り開かんことを祈っています』"

[[dialogue]]
speaker = "ヴィーナス"
# 「リクリエの使徒って……？　え、待っ──」
line = "「リクリエの使徒って……？　え、待っ──」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが手を伸ばすも意味はなく。
line = "ヴィーナスが手を伸ばすも意味はなく。"

[[dialogue]]
speaker = "unk"
# 荘厳なる女性の声は、その存在感と共に儚く消えてしまった。
line = "荘厳なる女性の声は、その存在感と共に儚く消えてしまった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「い、いっちゃった……もう！　この塔に来るとわかることもわかんないことも多すぎ！」
line = "「い、いっちゃった……もう！　この塔に来るとわかることもわかんないことも多すぎ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの気持ちは非常によくわかる。
line = "ヴィーナスの気持ちは非常によくわかる。"

[[dialogue]]
speaker = "unk"
# とにかく今回は、頭がパンクしそうなほど情報を詰め込まれた気分だ。
line = "とにかく今回は、頭がパンクしそうなほど情報を詰め込まれた気分だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「っとと……地震？」
line = "「っとと……地震？」"

[[dialogue]]
speaker = "フィオナ"
# 「……ここまでのようですね。追い出されます」
line = "「……ここまでのようですね。追い出されます」"

[[dialogue]]
speaker = "クロト"
# 「ちょうどいい。何やら外で起こるみたいなことも言ってたしな」
line = "「ちょうどいい。何やら外で起こるみたいなことも言ってたしな」"

[[dialogue]]
speaker = "unk"
# 続けて第三階層──とはならず。
line = "続けて第三階層──とはならず。"

[[dialogue]]
speaker = "unk"
# 俺たちは招かれた時と同様に、フィーニスの塔から一方的に追放された。
line = "俺たちは招かれた時と同様に、フィーニスの塔から一方的に追放された。"
