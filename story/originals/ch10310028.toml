# 「んんんっ<emoji=heart04>　はぁぁぁん<emoji=heart04>　一緒に出そう<emoji=heart04><emoji=heart04>　アニマのおま○こに、一緒に種付けすりゅぅぅぅ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「んんんっ<emoji=heart04>　はぁぁぁん<emoji=heart04>　一緒に出そう<emoji=heart04><emoji=heart04>　アニマのおま○こに、一緒に種付けすりゅぅぅぅ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「あっあっあっあっあっ<emoji=heart04>　んあああぁぁぁっ<emoji=heart04><emoji=heart04>　イクっ<emoji=heart04><emoji=heart04>　イクイクイクイクっ――<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「あっあっあっあっあっ<emoji=heart04>　んあああぁぁぁっ<emoji=heart04><emoji=heart04>　イクっ<emoji=heart04><emoji=heart04>　イクイクイクイクっ――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「イっ――――<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「イックうぅぅぅーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>　ふあああああああああぁぁぁ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「イックうぅぅぅーーーーっ<emoji=heart04><emoji=heart04><emoji=heart04>　ふあああああああああぁぁぁ～～～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺は限界まで高まった欲望の猛りを、彼女の中に全部ぶちまけた。
line = "俺は限界まで高まった欲望の猛りを、彼女の中に全部ぶちまけた。"

[[dialogue]]
speaker = "アニマ"
# 「んあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　アニマの子宮にいっぱい、キミの精液入って来るぅぅぅっ<emoji=heart04>　はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>」
line = "「んあああぁぁぁ～～～～～～っ<emoji=heart04><emoji=heart04><emoji=heart04>　アニマの子宮にいっぱい、キミの精液入って来るぅぅぅっ<emoji=heart04>　はあああぁぁぁ～～～っ<emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「んっ<emoji=heart04>　あああぁぁぁ～～～っ<emoji=heart04>　すごイ……<emoji=heart04>　射精止まらナイ<emoji=heart04>　さすが魔王だナ……<emoji=heart04>」
line = "「んっ<emoji=heart04>　あああぁぁぁ～～～っ<emoji=heart04>　すごイ……<emoji=heart04>　射精止まらナイ<emoji=heart04>　さすが魔王だナ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# やがて、長かった射精が終わって――
line = "やがて、長かった射精が終わって――"

[[dialogue]]
speaker = "アニマ"
# 「はぁ……<emoji=heart04>　はぁ……<emoji=heart04>　やっと止まっタ……<emoji=heart04>　あんっ<emoji=heart04>　チ○ポ抜けて……<emoji=heart04>」
line = "「はぁ……<emoji=heart04>　はぁ……<emoji=heart04>　やっと止まっタ……<emoji=heart04>　あんっ<emoji=heart04>　チ○ポ抜けて……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「はあぁ……ふうぅ……<emoji=heart04>　フヒ<emoji=heart04>　今日もいっぱい、元気に出たナ……<emoji=heart04>　アニマの中に入り切らなくて、おま○こから溢れて来てるゾ……<emoji=heart04>」
line = "「はあぁ……ふうぅ……<emoji=heart04>　フヒ<emoji=heart04>　今日もいっぱい、元気に出たナ……<emoji=heart04>　アニマの中に入り切らなくて、おま○こから溢れて来てるゾ……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「ん……<emoji=heart04>　今回の媚薬はすごく良かっタ<emoji=heart04>　快楽を共有したエッチ、またいけない『性の扉』を開いてしまった感じダ……<emoji=heart04>」
line = "「ん……<emoji=heart04>　今回の媚薬はすごく良かっタ<emoji=heart04>　快楽を共有したエッチ、またいけない『性の扉』を開いてしまった感じダ……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「何より、キミがアニマで気持ちよくなってくれているのが、よくわかるのがイイ。すごく嬉しかったゾ……<emoji=heart04>」
line = "「何より、キミがアニマで気持ちよくなってくれているのが、よくわかるのがイイ。すごく嬉しかったゾ……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「あっ……アニマのおっぱいからまた、母乳が汗みたい染み出て、垂れて来てしまってイル……<emoji=heart04>」
line = "「あっ……アニマのおっぱいからまた、母乳が汗みたい染み出て、垂れて来てしまってイル……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はそれを見て、乳首に再び吸い付いて味わう。
line = "俺はそれを見て、乳首に再び吸い付いて味わう。"

[[dialogue]]
speaker = "アニマ"
# 「あんっ<emoji=heart04>　会長……またおっぱいに吸い付いて……<emoji=heart04>」
line = "「あんっ<emoji=heart04>　会長……またおっぱいに吸い付いて……<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ<emoji=heart04>　本当に母乳――『アニマミルク』が気に入ったみたいだナ<emoji=heart04>　そんなに夢中になって吸われると、どんな味がするのか、アニマ自身でも気になるところダ」
line = "「フヒ<emoji=heart04>　本当に母乳――『アニマミルク』が気に入ったみたいだナ<emoji=heart04>　そんなに夢中になって吸われると、どんな味がするのか、アニマ自身でも気になるところダ」"

[[dialogue]]
speaker = "アニマ"
# 「どれどれ、会長、失礼するヨ――」
line = "「どれどれ、会長、失礼するヨ――」"

[[dialogue]]
speaker = "unk"
# アニマ先輩はそう言うと、俺の頬に両手を添えて、顔を上げて――
line = "アニマ先輩はそう言うと、俺の頬に両手を添えて、顔を上げて――"

[[dialogue]]
speaker = "アニマ"
# 「ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 不意打ちのキスをする。
line = "不意打ちのキスをする。"

[[dialogue]]
speaker = "アニマ"
# 「――んっ……<emoji=heart04>　なるほど……<emoji=heart04>　これは、ほんのりエッチなミルク味だナ<emoji=heart04>　フヒ<emoji=heart04>」
line = "「――んっ……<emoji=heart04>　なるほど……<emoji=heart04>　これは、ほんのりエッチなミルク味だナ<emoji=heart04>　フヒ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、ペロリと舌なめずりして笑うアニマ先輩は、堪らなくエッチで。
line = "そう言って、ペロリと舌なめずりして笑うアニマ先輩は、堪らなくエッチで。"

[[dialogue]]
speaker = "クロト"
# 「先輩……！」
line = "「先輩……！」"

[[dialogue]]
speaker = "アニマ"
# 「あっ、あんっ<emoji=heart04>　会長、まだ媚薬の効果が続いてるのか？　チ○ポがまたムクムクと大きくなってるゾ<emoji=heart04>」
line = "「あっ、あんっ<emoji=heart04>　会長、まだ媚薬の効果が続いてるのか？　チ○ポがまたムクムクと大きくなってるゾ<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ<emoji=heart04>　なら、仕方ない。薬を飲ませた責任を取って、アニマがちゃんと鎮めないとナ<emoji=heart04>」
line = "「フヒ<emoji=heart04>　なら、仕方ない。薬を飲ませた責任を取って、アニマがちゃんと鎮めないとナ<emoji=heart04>」"

[[dialogue]]
speaker = "アニマ"
# 「んっ……ちゅっ……<emoji=heart04>」
line = "「んっ……ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 言いつつ、再びキスをして。
line = "言いつつ、再びキスをして。"

[[dialogue]]
speaker = "unk"
# それから媚薬の効果が収まるまで、俺と先輩は甘い快楽を求めて、気持ちいいところを擦り合わせ続けるのだった――
line = "それから媚薬の効果が収まるまで、俺と先輩は甘い快楽を求めて、気持ちいいところを擦り合わせ続けるのだった――"
