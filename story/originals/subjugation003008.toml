[[dialogue]]
speaker = "unk"
# ――果たして、ナミエルとアム達は巨大スノーマンを倒すことに成功し、アステラは消滅を開始した。
line = "――果たして、ナミエルとアム達は巨大スノーマンを倒すことに成功し、アステラは消滅を開始した。"

[[dialogue]]
speaker = "アム"
# 「わぁっ♪　本当に外にも光る雪が降ってるよ。ホワイトクリスマスだ～♪」
line = "「わぁっ♪　本当に外にも光る雪が降ってるよ。ホワイトクリスマスだ～♪」"

[[dialogue]]
speaker = "スノーマン"
# 「２人共、ありがとう。おかげで冬の力、戻ったみたい」
line = "「２人共、ありがとう。おかげで冬の力、戻ったみたい」"

[[dialogue]]
speaker = "ナミエル"
# 「いえ。これが私たちの――星騎士の仕事ですから」
line = "「いえ。これが私たちの――星騎士の仕事ですから」"

[[dialogue]]
speaker = "unk"
# それから夜になり、流星寮ではクリスマスパーティーが開催されていた。
line = "それから夜になり、流星寮ではクリスマスパーティーが開催されていた。"

[[dialogue]]
speaker = "アム"
# 「ナミエル～、お疲れ～！」
line = "「ナミエル～、お疲れ～！」"

[[dialogue]]
speaker = "ナミエル"
# 「アム先輩、お疲れ様です」
line = "「アム先輩、お疲れ様です」"

[[dialogue]]
speaker = "アム"
# 「いや～、１メートル以上離れられない縛りも無事に解けたみたいで、よかったね♪」
line = "「いや～、１メートル以上離れられない縛りも無事に解けたみたいで、よかったね♪」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。なので、今夜のパーティーが終わったら、久しぶりに寝間着に着替えて、１人でぐっすり寝られそうです」
line = "「はい。なので、今夜のパーティーが終わったら、久しぶりに寝間着に着替えて、１人でぐっすり寝られそうです」"

[[dialogue]]
speaker = "アム"
# 「え～？　あたしとしては、１人だとむしろ落ち着かなくて、寝られなくなっちゃいそうだな～。今日もナミエルのところに泊まっちゃおうかな～？　なんちゃって♪」
line = "「え～？　あたしとしては、１人だとむしろ落ち着かなくて、寝られなくなっちゃいそうだな～。今日もナミエルのところに泊まっちゃおうかな～？　なんちゃって♪」"

[[dialogue]]
speaker = "ナミエル"
# 「アム先輩、そこまで私のことを心配して頂かなくても、大丈夫ですよ」
line = "「アム先輩、そこまで私のことを心配して頂かなくても、大丈夫ですよ」"

[[dialogue]]
speaker = "アム"
# 「えっ、もしかして……バレてる？」
line = "「えっ、もしかして……バレてる？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。このところずっと一緒にいましたから」
line = "「はい。このところずっと一緒にいましたから」"

[[dialogue]]
speaker = "ナミエル"
# 「――とりあえず、クリスマスの装飾や料理が可愛いので、写真を撮って回ろうと思っています」
line = "「――とりあえず、クリスマスの装飾や料理が可愛いので、写真を撮って回ろうと思っています」"

[[dialogue]]
speaker = "アム"
# 「そっか……うん、いいね！　それとまた、スノーマンと一緒に、３人で写真も撮ろうよ！　スノーマンの記憶が戻った記念にさ♪」
line = "「そっか……うん、いいね！　それとまた、スノーマンと一緒に、３人で写真も撮ろうよ！　スノーマンの記憶が戻った記念にさ♪」"

[[dialogue]]
speaker = "アム"
# 「って、会長だ。ちょうどいいところに！　お～い、会長～！」
line = "「って、会長だ。ちょうどいいところに！　お～い、会長～！」"

[[dialogue]]
speaker = "unk"
# アムはクロトが会場内を歩いてくるのを見つけて、声をかける。
line = "アムはクロトが会場内を歩いてくるのを見つけて、声をかける。"

[[dialogue]]
speaker = "アム"
# 「会長、お願いがあるんだけど、いい？　あたし達３人、写真撮って欲しくてさ～」
line = "「会長、お願いがあるんだけど、いい？　あたし達３人、写真撮って欲しくてさ～」"

[[dialogue]]
speaker = "unk"
# スノーマンはどこにいるんだ？
line = "スノーマンはどこにいるんだ？"

[[dialogue]]
speaker = "unk"
# もちろんいいよ。それで
line = "もちろんいいよ。それで"

[[dialogue]]
speaker = "ナミエル"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "アム"
# 「あれ？　そういえば、いなくなってる……？」
line = "「あれ？　そういえば、いなくなってる……？」"

[[dialogue]]
speaker = "ナミエル"
# 「さっきまで、一緒にいたはずなんですけど……」
line = "「さっきまで、一緒にいたはずなんですけど……」"

[[dialogue]]
speaker = "unk"
# ナミエルはふと、嫌な胸騒ぎがした。
line = "ナミエルはふと、嫌な胸騒ぎがした。"

[[dialogue]]
speaker = "ナミエル"
# （スノーマンが現れてから今まで、近くからいなくなったことなんて１度も……）
line = "（スノーマンが現れてから今まで、近くからいなくなったことなんて１度も……）"

[[dialogue]]
speaker = "ナミエル"
# 「……私、ちょっと探してきます！」
line = "「……私、ちょっと探してきます！」"

[[dialogue]]
speaker = "アム"
# 「あっ！　ナミエル、ちょっと待って！」
line = "「あっ！　ナミエル、ちょっと待って！」"

[[dialogue]]
speaker = "unk"
# ナミエルは胸騒ぎが止まらなくて、焦燥感と共に学園内を探し回った。
line = "ナミエルは胸騒ぎが止まらなくて、焦燥感と共に学園内を探し回った。"

[[dialogue]]
speaker = "ナミエル"
# 「はぁっ……はぁっ……！」
line = "「はぁっ……はぁっ……！」"

[[dialogue]]
speaker = "ナミエル"
# 「スノーマン、一体どこに……？」
line = "「スノーマン、一体どこに……？」"

[[dialogue]]
speaker = "スノーマン"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ナミエル"
# 「いた……！　スノーマンッ！！」
line = "「いた……！　スノーマンッ！！」"

[[dialogue]]
speaker = "スノーマン"
# 「ナミエル……」
line = "「ナミエル……」"

[[dialogue]]
speaker = "unk"
# スノーマンは最初に出会った校門前で、１人ぼんやりと、空を見上げていた。
line = "スノーマンは最初に出会った校門前で、１人ぼんやりと、空を見上げていた。"

[[dialogue]]
speaker = "アム"
# 「――ナミエル！　スノーマンは見つかったの？」
line = "「――ナミエル！　スノーマンは見つかったの？」"

[[dialogue]]
speaker = "スノーマン"
# 「アムも……。見つかっちゃった……」
line = "「アムも……。見つかっちゃった……」"

[[dialogue]]
speaker = "ナミエル"
# 「スノーマン、一体こんなところで何を……えっ？」
line = "「スノーマン、一体こんなところで何を……えっ？」"

[[dialogue]]
speaker = "unk"
# ナミエルは気づいて、目を見開く。
line = "ナミエルは気づいて、目を見開く。"

[[dialogue]]
speaker = "unk"
# スノーマンの体は……もはや見て分かる程に、<b>溶けかけていた</b>。
line = "スノーマンの体は……もはや見て分かる程に、<b>溶けかけていた</b>。"

[[dialogue]]
speaker = "ナミエル"
# 「どうして……体が溶けているんですか……？」
line = "「どうして……体が溶けているんですか……？」"

[[dialogue]]
speaker = "スノーマン"
# 「ボク、本体が消えちゃったから……。それに、ボクの力も２人に渡したから……もう残ってないんだ」
line = "「ボク、本体が消えちゃったから……。それに、ボクの力も２人に渡したから……もう残ってないんだ」"

[[dialogue]]
speaker = "ナミエル"
# 「っ……！　なんで……それを早く言ってくれなかったんですか！？」
line = "「っ……！　なんで……それを早く言ってくれなかったんですか！？」"

[[dialogue]]
speaker = "スノーマン"
# 「これは、どうしようもないことだから……それに……」
line = "「これは、どうしようもないことだから……それに……」"

[[dialogue]]
speaker = "スノーマンL"
# 「ボク……ナミエルの、クリスマスの<b>嫌な思い出</b>を……増やしたくなかった」
line = "「ボク……ナミエルの、クリスマスの<b>嫌な思い出</b>を……増やしたくなかった」"

[[dialogue]]
speaker = "ナミエル"
# 「スノーマン……私の、為に……？」
line = "「スノーマン……私の、為に……？」"

[[dialogue]]
speaker = "スノーマン"
# 「ボクのあとに生まれてくる、代わりのボクは多分……２人のことを覚えてないと思う……。季節の精霊は……そういう存在だから……」
line = "「ボクのあとに生まれてくる、代わりのボクは多分……２人のことを覚えてないと思う……。季節の精霊は……そういう存在だから……」"

[[dialogue]]
speaker = "ナミエル"
# 「そんな……」
line = "「そんな……」"

[[dialogue]]
speaker = "スノーマン"
# 「でも……できるなら――」
line = "「でも……できるなら――」"

[[dialogue]]
speaker = "スノーマンL"
# 「ナミエルとアムには、ボクとの記憶、覚えておいてくれると嬉しい……」
line = "「ナミエルとアムには、ボクとの記憶、覚えておいてくれると嬉しい……」"

[[dialogue]]
speaker = "ナミエル"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "unk"
# ナミエルは、ぎゅっと強く胸が締め付けられるような気持ちになる。それでも――
line = "ナミエルは、ぎゅっと強く胸が締め付けられるような気持ちになる。それでも――"

[[dialogue]]
speaker = "ナミエル"
# 「はい……決して、忘れません」
line = "「はい……決して、忘れません」"

[[dialogue]]
speaker = "unk"
# ナミエルはスノーマンの目線に近づけるように、その場に膝を着いて、スノーマンの体に触れる。
line = "ナミエルはスノーマンの目線に近づけるように、その場に膝を着いて、スノーマンの体に触れる。"

[[dialogue]]
speaker = "unk"
# そして、精一杯に微笑んで。
line = "そして、精一杯に微笑んで。"

[[dialogue]]
speaker = "ナミエル"
# 「大切な、思い出ですから」
line = "「大切な、思い出ですから」"

[[dialogue]]
speaker = "スノーマンL"
# 「ありがとう、ナミエル」
line = "「ありがとう、ナミエル」"

[[dialogue]]
speaker = "スノーマンL"
# 「アムも、ありがとう。――バイバイ、２人共」
line = "「アムも、ありがとう。――バイバイ、２人共」"

[[dialogue]]
speaker = "アム"
# 「あたしは……バイバイなんて言わないよ！」
line = "「あたしは……バイバイなんて言わないよ！」"

[[dialogue]]
speaker = "スノーマン"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "アム"
# 「死ぬんじゃなくて、生まれ変わるんでしょ？　だから――」
line = "「死ぬんじゃなくて、生まれ変わるんでしょ？　だから――」"

[[dialogue]]
speaker = "アム"
# 「またね、スノーマン」
line = "「またね、スノーマン」"

[[dialogue]]
speaker = "スノーマンL"
# 「……！　うんっ……♪」
line = "「……！　うんっ……♪」"

[[dialogue]]
speaker = "unk"
# スノーマンは光に包まれて――
line = "スノーマンは光に包まれて――"

[[dialogue]]
speaker = "スノーマン"
# 「またね、２人共――」
line = "「またね、２人共――」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、また……」
line = "「はい、また……」"

[[dialogue]]
speaker = "unk"
# そうして、スノーマンは光の中に溶けて……消えていった。
line = "そうして、スノーマンは光の中に溶けて……消えていった。"

[[dialogue]]
speaker = "アム"
# 「……ナミエル、大丈夫？」
line = "「……ナミエル、大丈夫？」"

[[dialogue]]
speaker = "ナミエル"
# 「……はい、大丈夫です」
line = "「……はい、大丈夫です」"

[[dialogue]]
speaker = "unk"
# アムに見えないように目元を拭いながら、ナミエルは立ち上がる。
line = "アムに見えないように目元を拭いながら、ナミエルは立ち上がる。"

[[dialogue]]
speaker = "ナミエル"
# 「スノーマンとの別れを悲しい思い出で終わらせたくないので。だから、クリスマスをちゃんと楽しまないと……！」
line = "「スノーマンとの別れを悲しい思い出で終わらせたくないので。だから、クリスマスをちゃんと楽しまないと……！」"

[[dialogue]]
speaker = "アム"
# 「そっか……じゃあ――あたしとパーティーを思いっきり楽しもう♪」
line = "「そっか……じゃあ――あたしとパーティーを思いっきり楽しもう♪」"

[[dialogue]]
speaker = "ナミエル"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "unk"
# ナミエルはアムに肩を組まれながら、一緒にパーティー会場へと戻っていくのだった。
line = "ナミエルはアムに肩を組まれながら、一緒にパーティー会場へと戻っていくのだった。"

[[dialogue]]
speaker = "unk"
# 翌日。雪は積もっていなかった。まるで、降っていたことが夢であったかのように……。
line = "翌日。雪は積もっていなかった。まるで、降っていたことが夢であったかのように……。"

[[dialogue]]
speaker = "アム"
# 「ナミエル～！」
line = "「ナミエル～！」"

[[dialogue]]
speaker = "ナミエル"
# 「アム先輩、おはようございます」
line = "「アム先輩、おはようございます」"

[[dialogue]]
speaker = "アム"
# 「ねぇ、それで、ナミエルはどうだった？」
line = "「ねぇ、それで、ナミエルはどうだった？」"

[[dialogue]]
speaker = "ナミエル"
# 「ええ、私も――」
line = "「ええ、私も――」"

[[dialogue]]
speaker = "unk"
# ２人は頷き合って、同時に変身してみせる。
line = "２人は頷き合って、同時に変身してみせる。"

[[dialogue]]
speaker = "ナミエル"
# 「――今朝起きてからも、クリスマスフォームの力は残ったままでした」
line = "「――今朝起きてからも、クリスマスフォームの力は残ったままでした」"

[[dialogue]]
speaker = "アム"
# 「スノーマンからの、クリスマスプレゼントだね」
line = "「スノーマンからの、クリスマスプレゼントだね」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。最初は恥ずかしかったし、全然嬉しくなかったのに……今は前とは違う気持ちです」
line = "「はい。最初は恥ずかしかったし、全然嬉しくなかったのに……今は前とは違う気持ちです」"

[[dialogue]]
speaker = "unk"
# ナミエルはそっと衣装に手を触れ、撫でる。
line = "ナミエルはそっと衣装に手を触れ、撫でる。"

[[dialogue]]
speaker = "アム"
# 「あのさ、ナミエル。昨日はセンチメンタルな空気になっちゃったから、渡しそびれちゃったんだけど……」
line = "「あのさ、ナミエル。昨日はセンチメンタルな空気になっちゃったから、渡しそびれちゃったんだけど……」"

[[dialogue]]
speaker = "unk"
# アムはそう言って、鞄からある物を取り出して、手渡す。
line = "アムはそう言って、鞄からある物を取り出して、手渡す。"

[[dialogue]]
speaker = "ナミエル"
# 「これ……もしかして、クリスマスプレゼントですか？」
line = "「これ……もしかして、クリスマスプレゼントですか？」"

[[dialogue]]
speaker = "unk"
# アムが渡したのは、ぬいぐるみだった。
line = "アムが渡したのは、ぬいぐるみだった。"

[[dialogue]]
speaker = "アム"
# 「うん。ナミエルに少しでも、クリスマスにいい思い出ができたらって、あたしから」
line = "「うん。ナミエルに少しでも、クリスマスにいい思い出ができたらって、あたしから」"

[[dialogue]]
speaker = "ナミエル"
# 「このぬいぐるみ……スノーマンにそっくりです！」
line = "「このぬいぐるみ……スノーマンにそっくりです！」"

[[dialogue]]
speaker = "アム"
# 「えへへっ、実はマリオンさんに頼んで、実際のスノーマンを見て作ってもらってたんだ～」
line = "「えへへっ、実はマリオンさんに頼んで、実際のスノーマンを見て作ってもらってたんだ～」"

[[dialogue]]
speaker = "ナミエル"
# 「私も、実は……」
line = "「私も、実は……」"

[[dialogue]]
speaker = "unk"
# 続いてナミエルが取り出したのは、なんと同じく、ぬいぐるみだった。
line = "続いてナミエルが取り出したのは、なんと同じく、ぬいぐるみだった。"

[[dialogue]]
speaker = "アム"
# 「え？　このトナカイのぬいぐるみ、あたしに用意してくれてたの！？」
line = "「え？　このトナカイのぬいぐるみ、あたしに用意してくれてたの！？」"

[[dialogue]]
speaker = "ナミエル"
# 「は、はい。アム先輩とは、その……なんだかんだ親しくなったので……」
line = "「は、はい。アム先輩とは、その……なんだかんだ親しくなったので……」"

[[dialogue]]
speaker = "アム"
# 「ありがとう、ナミエル！　あたし、持っているぬいぐるみの中で、いちばん大切にするよ♪」
line = "「ありがとう、ナミエル！　あたし、持っているぬいぐるみの中で、いちばん大切にするよ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「あと……」
line = "「あと……」"

[[dialogue]]
speaker = "ナミエル"
# 「この前話した、両親の写真――久しぶりに、出してみたんです」
line = "「この前話した、両親の写真――久しぶりに、出してみたんです」"

[[dialogue]]
speaker = "アム"
# 「！　お父さんとお母さんの写真を……？」
line = "「！　お父さんとお母さんの写真を……？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい。たとえ２度と会えなくても……そのヒトと一緒にいた記憶は、私にとって大切なものだって気づいたんです」
line = "「はい。たとえ２度と会えなくても……そのヒトと一緒にいた記憶は、私にとって大切なものだって気づいたんです」"

[[dialogue]]
speaker = "ナミエル"
# 「両親やスノーマンのことは、すごく寂しくて辛いですけど……でも、それを忘れてなかったことにしてしまう方が、もっと寂しいって」
line = "「両親やスノーマンのことは、すごく寂しくて辛いですけど……でも、それを忘れてなかったことにしてしまう方が、もっと寂しいって」"

[[dialogue]]
speaker = "ナミエル"
# 「たとえ思い出して辛くなってしまう時があっても、一緒に過ごした楽しい思い出はしっかりと覚えておきたいって、今回のクリスマスでそう思ったんです」
line = "「たとえ思い出して辛くなってしまう時があっても、一緒に過ごした楽しい思い出はしっかりと覚えておきたいって、今回のクリスマスでそう思ったんです」"

[[dialogue]]
speaker = "アム"
# 「そっか……ナミエルが少しでもクリスマスを楽しかったって思えたなら、よかったよ」
line = "「そっか……ナミエルが少しでもクリスマスを楽しかったって思えたなら、よかったよ」"

[[dialogue]]
speaker = "アム"
# 「それってつまり……あたしとの共同生活が楽しかったってことでもあるしね♪」
line = "「それってつまり……あたしとの共同生活が楽しかったってことでもあるしね♪」"

[[dialogue]]
speaker = "ナミエル"
# 「えっ？　べ、別に、そうとは言ってませんけど……」
line = "「えっ？　べ、別に、そうとは言ってませんけど……」"

[[dialogue]]
speaker = "アム"
# 「あれ、照れてる？　ナミエル、もしかして照れてる～？」
line = "「あれ、照れてる？　ナミエル、もしかして照れてる～？」"

[[dialogue]]
speaker = "ナミエル"
# 「っ……知りませんっ！　もう行きますから……！　ごきげんよう、アム先輩！」
line = "「っ……知りませんっ！　もう行きますから……！　ごきげんよう、アム先輩！」"

[[dialogue]]
speaker = "アム"
# 「あっ、ごめんって！　途中まで一緒に行こうよ、ナミエルってば～！」
line = "「あっ、ごめんって！　途中まで一緒に行こうよ、ナミエルってば～！」"

[[dialogue]]
speaker = "unk"
# ぬいぐるみが沢山置かれた、ナミエルの部屋。
line = "ぬいぐるみが沢山置かれた、ナミエルの部屋。"

[[dialogue]]
speaker = "unk"
# その中には、ナミエルが幼い頃に撮った両親との写真が置かれていて。
line = "その中には、ナミエルが幼い頃に撮った両親との写真が置かれていて。"

[[dialogue]]
speaker = "unk"
# そして、その横にはもう１つ――
line = "そして、その横にはもう１つ――"

[[dialogue]]
speaker = "unk"
# アムとスノーマンと一緒に撮った記念写真が、新たに飾られているのだった。
line = "アムとスノーマンと一緒に撮った記念写真が、新たに飾られているのだった。"
