[[dialogue]]
speaker = "？？？"
# 「ヘンタイ……嗚呼、タイヘンよい響きです……！」
line = "「ヘンタイ……嗚呼、タイヘンよい響きです……！」"

[[dialogue]]
speaker = "ダッチ"
# 「ご挨拶が遅れました。私、当カジノ『ラビットガーデン』の総支配人──ダッチと申します」
line = "「ご挨拶が遅れました。私、当カジノ『ラビットガーデン』の総支配人──ダッチと申します」"

[[dialogue]]
speaker = "ダッチ"
# 「歓迎いたしますよ。新星学園の星徒会長、緋宮クロト様」
line = "「歓迎いたしますよ。新星学園の星徒会長、緋宮クロト様」"

[[dialogue]]
speaker = "ダッチ"
# 「貴女は公安委員会所属のネゴシエーター。コードネーム『チャッティー』……立朽ネーゼマイン様ですね」
line = "「貴女は公安委員会所属のネゴシエーター。コードネーム『チャッティー』……立朽ネーゼマイン様ですね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……どうしてその名前まで」
line = "「……どうしてその名前まで」"

[[dialogue]]
speaker = "ダッチ"
# 「そちらの淑女は流星市国の五名門、<ruby=せんおんじ>千園寺</ruby>財閥の次女、ヒルディオーネ様。嗚呼、『<ruby=エトワール・イルソーレ>白昼の極星</ruby>』の名にふさわしい美貌です！」
line = "「そちらの淑女は流星市国の五名門、<ruby>千園寺<rt>せんおんじ</rt></ruby>財閥の次女、ヒルディオーネ様。嗚呼、『<ruby>白昼の極星<rt>エトワール・イルソーレ</rt></ruby>』の名にふさわしい美貌です！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「貴方、なぜ私たちの情報を……！？」
line = "「貴方、なぜ私たちの情報を……！？」"

[[dialogue]]
speaker = "ダッチ"
# 「そして……おや？　貴女は存じ上げませんね。お名前をお伺いしても？」
line = "「そして……おや？　貴女は存じ上げませんね。お名前をお伺いしても？」"

[[dialogue]]
speaker = "セナリィ"
# 「あんまりでしょう！？　秘密結社ゴールデングース総帥！　泣く子も黙るバンデット・セナリィとは私のこと！」
line = "「あんまりでしょう！？　秘密結社ゴールデングース総帥！　泣く子も黙るバンデット・セナリィとは私のこと！」"

[[dialogue]]
speaker = "ダッチ"
# 「申し訳ございません。私、ゆえあって九浄家カジノ内で交わされた言葉でなければ見聞きができないのです」
line = "「申し訳ございません。私、ゆえあって九浄家カジノ内で交わされた言葉でなければ見聞きができないのです」"

[[dialogue]]
speaker = "ダッチ"
# 「しかし秘密結社……？　秘密すぎて名前が広まっていないのでは？　会社の運営は大丈夫なのでしょうか」
line = "「しかし秘密結社……？　秘密すぎて名前が広まっていないのでは？　会社の運営は大丈夫なのでしょうか」"

[[dialogue]]
speaker = "セナリィ"
# 「ムキー！？　ぶっ飛ばされてぇんですの！？」
line = "「ムキー！？　ぶっ飛ばされてぇんですの！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まぁセナリィの会社の認知度は置いておくとして……」
line = "「まぁセナリィの会社の認知度は置いておくとして……」"

[[dialogue]]
speaker = "セナリィ"
# 「置いておいちゃ駄目ですわ！？」
line = "「置いておいちゃ駄目ですわ！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ダッチ、だっけ。単刀直入に聞くけど、九浄家のカジノに出てくるトランプモンスターは……」
line = "「ダッチ、だっけ。単刀直入に聞くけど、九浄家のカジノに出てくるトランプモンスターは……」"

[[dialogue]]
speaker = "ダッチ"
# 「はい。すべてこの空間に住む者たちです。私の手下でございますね」
line = "「はい。すべてこの空間に住む者たちです。私の手下でございますね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「神隠し事件の犯人も……？」
line = "「神隠し事件の犯人も……？」"

[[dialogue]]
speaker = "ダッチ"
# 「ええ、ええ！　私でございます！」
line = "「ええ、ええ！　私でございます！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「随分とあっさり認めましたわね。このカジノに飛ばされてから、公安委員会の調査のことなど、多少の説明は受けましたが……」
line = "「随分とあっさり認めましたわね。このカジノに飛ばされてから、公安委員会の調査のことなど、多少の説明は受けましたが……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「この空間は一体何なんですの！？　それに、あなたは何者でいらっしゃいますの！？」
line = "「この空間は一体何なんですの！？　それに、あなたは何者でいらっしゃいますの！？」"

[[dialogue]]
speaker = "ダッチ"
# 「当カジノ『ラビットガーデン』は、九浄家カジノの裏側に貼りつくようにして存在を隠す、異世界カジノ……」
line = "「当カジノ『ラビットガーデン』は、九浄家カジノの裏側に貼りつくようにして存在を隠す、異世界カジノ……」"

[[dialogue]]
speaker = "ダッチ"
# 「元の空間は皆様もよくご存じでしょう──アステラですよ。そこに少々、私の力で手を加えております」
line = "「元の空間は皆様もよくご存じでしょう──アステラですよ。そこに少々、私の力で手を加えております」"

[[dialogue]]
speaker = "セナリィ"
# 「アステラを自分の力で改造……？　そんなこと、モンスターにできるわけありませんわ……」
line = "「アステラを自分の力で改造……？　そんなこと、モンスターにできるわけありませんわ……」"

[[dialogue]]
speaker = "ダッチ"
# 「一介の、人語も解さぬモンスターには無理でしょう。しかし私は違う。なぜなら、私はモンスターではないからです」
line = "「一介の、人語も解さぬモンスターには無理でしょう。しかし私は違う。なぜなら、私はモンスターではないからです」"

[[dialogue]]
speaker = "ダッチ"
# 「私は自我を持った『ロストアイテム』。博識な星徒会長様ならば、この意味がお分かりでしょう？」
line = "「私は自我を持った『ロストアイテム』。博識な星徒会長様ならば、この意味がお分かりでしょう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ロストアイテム……？　聞いたことがない単語だね」
line = "「ロストアイテム……？　聞いたことがない単語だね」"

[[dialogue]]
speaker = "セナリィ"
# 「何ですの会長様、その『ロストアイテム』って。売ったら高値で売れそうですが」
line = "「何ですの会長様、その『ロストアイテム』って。売ったら高値で売れそうですが」"

[[dialogue]]
speaker = "unk"
# 『ロストアイテム』とは──はるか昔……リクリエで世界が再構築されるよりも以前、すでに消え去った歴史の中で製造された、特殊な力を持つオーパーツだ。
line = "『ロストアイテム』とは──はるか昔……リクリエで世界が再構築されるよりも以前、すでに消え去った歴史の中で製造された、特殊な力を持つオーパーツだ。"

[[dialogue]]
speaker = "unk"
# その多くは休眠状態だったが、リクリエ到来の影響でオーパーツたちが目覚めてしまっているらしい。今まで俺は、いくつかのロストアイテムの騒動に巻き込まれていた。
line = "その多くは休眠状態だったが、リクリエ到来の影響でオーパーツたちが目覚めてしまっているらしい。今まで俺は、いくつかのロストアイテムの騒動に巻き込まれていた。"

[[dialogue]]
speaker = "unk"
# ロストアイテムは魔法少女たちが秘密裏に回収する役目を担っている。混乱を避けるためにあまりこの話は広めないと、トレジアンナさんとは約束を交わしている──
line = "ロストアイテムは魔法少女たちが秘密裏に回収する役目を担っている。混乱を避けるためにあまりこの話は広めないと、トレジアンナさんとは約束を交わしている──"

[[dialogue]]
speaker = "unk"
# 俺は魔法少女たちの存在は隠しつつ、リクリエとはまた別個の『世界にバグを引き起こす可能性のある危険なアイテムである』ことをセナリィたちに伝えた。
line = "俺は魔法少女たちの存在は隠しつつ、リクリエとはまた別個の『世界にバグを引き起こす可能性のある危険なアイテムである』ことをセナリィたちに伝えた。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そんなものが……リクリエとは出自の違う、異能を持った特殊なアイテム、ですか」
line = "「そんなものが……リクリエとは出自の違う、異能を持った特殊なアイテム、ですか」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ロストアイテムはそれぞれ、司っている二つ名に応じた権能を持つ……ふーん。なるほどね」
line = "「ロストアイテムはそれぞれ、司っている二つ名に応じた権能を持つ……ふーん。なるほどね」"

[[dialogue]]
speaker = "セナリィ"
# 「しかしアステラもモンスターも、リクリエを由来とする異常のはずですわ。それを操り、改造するだなんて……」
line = "「しかしアステラもモンスターも、リクリエを由来とする異常のはずですわ。それを操り、改造するだなんて……」"

[[dialogue]]
speaker = "ダッチ"
# 「フフフ。そう褒めないでくださいませ、セナリィ様」
line = "「フフフ。そう褒めないでくださいませ、セナリィ様」"

[[dialogue]]
speaker = "セナリィ"
# 「褒めてませんわ！　貴方が私だけ知らなかったこと、まだ根に持っておりますからね！？」
line = "「褒めてませんわ！　貴方が私だけ知らなかったこと、まだ根に持っておりますからね！？」"

[[dialogue]]
speaker = "ダッチ"
# 「いやはや申し訳ない限りです……では無礼のお詫びにお伝えしましょう。私が司る権能は……『欲望』です」
line = "「いやはや申し訳ない限りです……では無礼のお詫びにお伝えしましょう。私が司る権能は……『欲望』です」"

[[dialogue]]
speaker = "ダッチ"
# 「私は『欲望』のロストアイテムのダッチ。名前のとおり、己の欲望を具現化する力を備えております」
line = "「私は『欲望』のロストアイテムのダッチ。名前のとおり、己の欲望を具現化する力を備えております」"

[[dialogue]]
speaker = "ダッチ"
# 「アステラを改造できたのも、リクリエモンスターを手なずけられているのも、今ここに貴女がたをご招待できたのも──」
line = "「アステラを改造できたのも、リクリエモンスターを手なずけられているのも、今ここに貴女がたをご招待できたのも──」"

[[dialogue]]
speaker = "ダッチ"
# 「すべて！　<b>私が望んだからそうなった</b>のですよ！」
line = "「すべて！　<b>私が望んだからそうなった</b>のですよ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふざけた雰囲気だけど……会長、こいつヤバいよ。今まで見てきたアステラモンスターの比じゃない……」
line = "「ふざけた雰囲気だけど……会長、こいつヤバいよ。今まで見てきたアステラモンスターの比じゃない……」"

[[dialogue]]
speaker = "セナリィ"
# 「それで？　拉致した上に頭のおかしな衣装を着させた目的、そろそろ喋って欲しいですわね！」
line = "「それで？　拉致した上に頭のおかしな衣装を着させた目的、そろそろ喋って欲しいですわね！」"

[[dialogue]]
speaker = "ダッチ"
# 「承知いたしました。子ウサギの皆様……私とゲームをしていただけませんか？」
line = "「承知いたしました。子ウサギの皆様……私とゲームをしていただけませんか？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ゲーム……？」
line = "「ゲーム……？」"

[[dialogue]]
speaker = "ダッチ"
# 「ええ。命と尊厳を賭けたゲームです！」
line = "「ええ。命と尊厳を賭けたゲームです！」"

[[dialogue]]
speaker = "ダッチ"
# 「私、現実世界で誘拐した方々とゲームをするのが生き甲斐なのですよ」
line = "「私、現実世界で誘拐した方々とゲームをするのが生き甲斐なのですよ」"

[[dialogue]]
speaker = "ダッチ"
# 「勝てば現実への帰還を許し……しかし負ければ私のモノになっていただく。そういう類のデスゲームです」
line = "「勝てば現実への帰還を許し……しかし負ければ私のモノになっていただく。そういう類のデスゲームです」"

[[dialogue]]
speaker = "ダッチ"
# 「誘拐した直後に意識を奪い去り、傀儡にしても良いのですが……それではあまりにも趣がなさすぎますゆえ」
line = "「誘拐した直後に意識を奪い去り、傀儡にしても良いのですが……それではあまりにも趣がなさすぎますゆえ」"

[[dialogue]]
speaker = "ダッチ"
# 「ゲームを通して相手の性格を知る。嗜好を知る。心を知る……そうして理解を深めたのち──私のモノにする」
line = "「ゲームを通して相手の性格を知る。嗜好を知る。心を知る……そうして理解を深めたのち──私のモノにする」"

[[dialogue]]
speaker = "ダッチ"
# 「それでこそ私の子ウサギコレクションは価値が増す──そう考えているのです、私」
line = "「それでこそ私の子ウサギコレクションは価値が増す──そう考えているのです、私」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「子ウサギコレクションって……」
line = "「子ウサギコレクションって……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ま──まさか！　あちらでトランプモンスターと戯れているバニーガールの方々は……！？」
line = "「ま──まさか！　あちらでトランプモンスターと戯れているバニーガールの方々は……！？」"

[[dialogue]]
speaker = "ダッチ"
# 「そのとおり。私が<ruby=かどわ>拐</ruby>かした、九浄家のカジノで失踪を遂げた方々です」
line = "「そのとおり。私が<ruby>拐<rt>かどわ</rt></ruby>かした、九浄家のカジノで失踪を遂げた方々です」"

[[dialogue]]
speaker = "ダッチ"
# 「美しい女性はそのままバニーガールに。男性のお客は若い女性へと変身させて、後は同じ……」
line = "「美しい女性はそのままバニーガールに。男性のお客は若い女性へと変身させて、後は同じ……」"

[[dialogue]]
speaker = "ダッチ"
# 「このカジノのゲームで負ければ一生、私に逆らえない仕組み……ずうっとここの住人でいていただくということです……フフフ！」
line = "「このカジノのゲームで負ければ一生、私に逆らえない仕組み……ずうっとここの住人でいていただくということです……フフフ！」"

[[dialogue]]
speaker = "ダッチ"
# 「私に勝てばこのアステラカジノから現実世界へお返ししましょう……よろしいですか、淑女の皆様？」
line = "「私に勝てばこのアステラカジノから現実世界へお返ししましょう……よろしいですか、淑女の皆様？」"

[[dialogue]]
speaker = "セナリィ"
# 「ハっ。何を勝手な理由をツラツラと──あなたの目の前にいるのは星騎士ですわよ！？」
line = "「ハっ。何を勝手な理由をツラツラと──あなたの目の前にいるのは星騎士ですわよ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「女帝フォーム、起動しますわ！　けちょんけちょんにしてやりますわよ！！」
line = "「女帝フォーム、起動しますわ！　けちょんけちょんにしてやりますわよ！！」"

[[dialogue]]
speaker = "セナリィ"
# 「あ──あれ？　あれれっ！？　変身できませんわ……！？」
line = "「あ──あれ？　あれれっ！？　変身できませんわ……！？」"

[[dialogue]]
speaker = "ダッチ"
# 「ご説明が遅くなりました。当カジノは『暴力行為を一切禁止』しております」
line = "「ご説明が遅くなりました。当カジノは『暴力行為を一切禁止』しております」"

[[dialogue]]
speaker = "ダッチ"
# 「私の『欲望』の力によって、そのようなルールをこの世界に強制しています。相手に危害を加える星力行使は一切不可能」
line = "「私の『欲望』の力によって、そのようなルールをこの世界に強制しています。相手に危害を加える星力行使は一切不可能」"

[[dialogue]]
speaker = "セナリィ"
# 「そんなのアリですの！？」
line = "「そんなのアリですの！？」"

[[dialogue]]
speaker = "ダッチ"
# 「フフフ！　だってこうしなくては、星騎士の皆様と遊べないではありませんか！」
line = "「フフフ！　だってこうしなくては、星騎士の皆様と遊べないではありませんか！」"

[[dialogue]]
speaker = "ダッチ"
# 「さぁ、ゲームだ！　ゲームをしましょう、皆様！」
line = "「さぁ、ゲームだ！　ゲームをしましょう、皆様！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……度し難い趣味をしておりますわね」
line = "「……度し難い趣味をしておりますわね」"

[[dialogue]]
speaker = "セナリィ"
# 「まったくヘレナ様……これは報酬、弾んでもらわなくちゃなりませんわよ！」
line = "「まったくヘレナ様……これは報酬、弾んでもらわなくちゃなりませんわよ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もしも勝ったら……私たちだけじゃない。ここに誘拐された人たちも全員、外に出すことはできるのかな？」
line = "「もしも勝ったら……私たちだけじゃない。ここに誘拐された人たちも全員、外に出すことはできるのかな？」"

[[dialogue]]
speaker = "ダッチ"
# 「ええ。貴女たちの『欲望』がそう望むのであれば！　叶えましょうとも！」
line = "「ええ。貴女たちの『欲望』がそう望むのであれば！　叶えましょうとも！」"

[[dialogue]]
speaker = "ダッチ"
# 「さぁ……状況は飲み込めましたか？　それでは楽しいゲームのスタートです！！」
line = "「さぁ……状況は飲み込めましたか？　それでは楽しいゲームのスタートです！！」"
