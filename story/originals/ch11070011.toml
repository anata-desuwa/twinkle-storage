[[dialogue]]
speaker = "unk"
# 第１話,天使の歌声,P
line = "第１話,天使の歌声,P"

[[dialogue]]
speaker = "unk"
# 流星学園の校門前に３人が整列している。
line = "流星学園の校門前に３人が整列している。"

[[dialogue]]
speaker = "unk"
# 俺、フィオナ、ナナカ。そして俺たちの前には、ロロットがドーンと構えている。
line = "俺、フィオナ、ナナカ。そして俺たちの前には、ロロットがドーンと構えている。"

[[dialogue]]
speaker = "unk"
# 今日はロロットに声をかけてもらい、こちらの流星学園の中を案内してもらうことになったのだ。
line = "今日はロロットに声をかけてもらい、こちらの流星学園の中を案内してもらうことになったのだ。"

[[dialogue]]
speaker = "ロロット"
# 「さて皆さん、ちゃ～んと時間通りに集まれたようですね」
line = "「さて皆さん、ちゃ～んと時間通りに集まれたようですね」"

[[dialogue]]
speaker = "ナナカ"
# 「隊長～、なんなら隊長が一番来るの遅かったです」
line = "「隊長～、なんなら隊長が一番来るの遅かったです」"

[[dialogue]]
speaker = "ロロット"
# 「隊長は一番偉いので、問題ないのです」
line = "「隊長は一番偉いので、問題ないのです」"

[[dialogue]]
speaker = "ナナカ"
# 「横暴だー！」
line = "「横暴だー！」"

[[dialogue]]
speaker = "ロロット"
# 「それでは新星の会長さん、フィオナ会長、<b>私たちの</b>流星学園をご案内しますね」
line = "「それでは新星の会長さん、フィオナ会長、<b>私たちの</b>流星学園をご案内しますね」"

[[dialogue]]
speaker = "フィオナ"
# 「よろしくお願いします」
line = "「よろしくお願いします」"

[[dialogue]]
speaker = "unk"
# よろしくね
line = "よろしくね"

[[dialogue]]
speaker = "ナナカ"
# 「スルーするなー！　そしてアタシも人数に入れろー！」
line = "「スルーするなー！　そしてアタシも人数に入れろー！」"

[[dialogue]]
speaker = "ロロット"
# 「はて……？　会計さんにはお声がけしていなかったはずですが……まあ、一緒にいていただく分には構いません。なにせ、わたしは心が広いので」
line = "「はて……？　会計さんにはお声がけしていなかったはずですが……まあ、一緒にいていただく分には構いません。なにせ、わたしは心が広いので」"

[[dialogue]]
speaker = "ナナカ"
# 「ロロちゃん、いつもフワフワしてるからさ、ちゃんと案内できるか心配なんだって」
line = "「ロロちゃん、いつもフワフワしてるからさ、ちゃんと案内できるか心配なんだって」"

[[dialogue]]
speaker = "ナナカ"
# 「その点、しっかり者のアタシがいれば安心でしょ？」
line = "「その点、しっかり者のアタシがいれば安心でしょ？」"

[[dialogue]]
speaker = "ロロット"
# 「しかし、肝心な時にへたれてしまう会計さんでは、ちょっぴり安心感が足りないのです」
line = "「しかし、肝心な時にへたれてしまう会計さんでは、ちょっぴり安心感が足りないのです」"

[[dialogue]]
speaker = "ナナカ"
# 「辛い！　ワサビを溶かしすぎた蕎麦つゆみたいにツーンとくる辛さだよっ！」
line = "「辛い！　ワサビを溶かしすぎた蕎麦つゆみたいにツーンとくる辛さだよっ！」"

[[dialogue]]
speaker = "フィオナ"
# 「まあまあ、にぎやかな方が楽しいですから……ふふふっ」
line = "「まあまあ、にぎやかな方が楽しいですから……ふふふっ」"

[[dialogue]]
speaker = "unk"
# ナナカも案内を頼むよ
line = "ナナカも案内を頼むよ"

[[dialogue]]
speaker = "ナナカ"
# 「ありがとー、２人ともっ！」
line = "「ありがとー、２人ともっ！」"

[[dialogue]]
speaker = "ロロット"
# 「それでは参りましょう～」
line = "「それでは参りましょう～」"

[[dialogue]]
speaker = "フィオナ"
# 「これがこちらの流星学園……」
line = "「これがこちらの流星学園……」"

[[dialogue]]
speaker = "ロロット"
# 「おや？　もう何度か来られていたのでは？」
line = "「おや？　もう何度か来られていたのでは？」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、ですが改めて見ると、感慨深いと言いますか」
line = "「はい、ですが改めて見ると、感慨深いと言いますか」"

[[dialogue]]
speaker = "unk"
# 似てるような似てないような
line = "似てるような似てないような"

[[dialogue]]
speaker = "フィオナ"
# 「そうですそうです！　見た目は全く違うんですが、どことなく似ている雰囲気があるんです」
line = "「そうですそうです！　見た目は全く違うんですが、どことなく似ている雰囲気があるんです」"

[[dialogue]]
speaker = "ロロット"
# 「ほほう～、不思議なこともあるのです。そちらの流星学園がどんな風なのか、わたしも気になってきちゃいました♪」
line = "「ほほう～、不思議なこともあるのです。そちらの流星学園がどんな風なのか、わたしも気になってきちゃいました♪」"

[[dialogue]]
speaker = "ナナカ"
# 「確か、聖沙とリア先輩は、そっちの学園にも行ったことあるんだよね？」
line = "「確か、聖沙とリア先輩は、そっちの学園にも行ったことあるんだよね？」"

[[dialogue]]
speaker = "フィオナ"
# 「そうですね、お２人のことは私たちが案内させて頂きました」
line = "「そうですね、お２人のことは私たちが案内させて頂きました」"

[[dialogue]]
speaker = "ナナカ"
# 「いいなー。ロロちゃんもそう思わない？」
line = "「いいなー。ロロちゃんもそう思わない？」"

[[dialogue]]
speaker = "ロロット"
# 「思います、羨ましいのです。実際に行ってみなければ分からないことは、たくさんありますから。探検は足が命なのです」
line = "「思います、羨ましいのです。実際に行ってみなければ分からないことは、たくさんありますから。探検は足が命なのです」"

[[dialogue]]
speaker = "フィオナ"
# 「では、ロロットさんがいらした際には、私たちの流星学園をご案内しますね」
line = "「では、ロロットさんがいらした際には、私たちの流星学園をご案内しますね」"

[[dialogue]]
speaker = "ロロット"
# 「おお～、ぜひとも！　今からワクワクしてしまいますね～。おすすめの場所はどこなのでしょう？」
line = "「おお～、ぜひとも！　今からワクワクしてしまいますね～。おすすめの場所はどこなのでしょう？」"

[[dialogue]]
speaker = "フィオナ"
# 「おすすめの場所、ですか……ええと……」
line = "「おすすめの場所、ですか……ええと……」"

[[dialogue]]
speaker = "unk"
# 大聖堂とかどうかな？
line = "大聖堂とかどうかな？"

[[dialogue]]
speaker = "ロロット"
# 「大聖堂！　それは、そこはかとなく気になります」
line = "「大聖堂！　それは、そこはかとなく気になります」"

[[dialogue]]
speaker = "ナナカ"
# 「こっちの教会とは違うんだよね、やっぱり」
line = "「こっちの教会とは違うんだよね、やっぱり」"

[[dialogue]]
speaker = "ロロット"
# 「ではでは、まずはこちらの教会を見ていただきましょう。なかなか立派なのです～」
line = "「ではでは、まずはこちらの教会を見ていただきましょう。なかなか立派なのです～」"

[[dialogue]]
speaker = "フィオナ"
# 「おお……これがこちらの教会ですか……」
line = "「おお……これがこちらの教会ですか……」"

[[dialogue]]
speaker = "ロロット"
# 「いかがでしょう？」
line = "「いかがでしょう？」"

[[dialogue]]
speaker = "フィオナ"
# 「大変荘厳で、でも何だか落ち着く場所ですね……私は好きです」
line = "「大変荘厳で、でも何だか落ち着く場所ですね……私は好きです」"

[[dialogue]]
speaker = "unk"
# こっちの教会もいいな
line = "こっちの教会もいいな"

[[dialogue]]
speaker = "ロロット"
# 「えへへ、そう言ってもらえると、誇らしくなってしまいますね～」
line = "「えへへ、そう言ってもらえると、誇らしくなってしまいますね～」"

[[dialogue]]
speaker = "ナナカ"
# 「ロロちゃん、凄く嬉しそうじゃん」
line = "「ロロちゃん、凄く嬉しそうじゃん」"

[[dialogue]]
speaker = "ロロット"
# 「別の世界の方にまで気に入ってもらえたのですから、当然なのです。これは、もっとも～っと知ってもらわなければいけませんね！」
line = "「別の世界の方にまで気に入ってもらえたのですから、当然なのです。これは、もっとも～っと知ってもらわなければいけませんね！」"

[[dialogue]]
speaker = "フィオナ"
# 「はい、よければこの教会のこと、もっと教えてもらっていいでしょうか？」
line = "「はい、よければこの教会のこと、もっと教えてもらっていいでしょうか？」"

[[dialogue]]
speaker = "ロロット"
# 「そうですねぇ……今日はお休みですが、いつもは聖歌隊が活動していたりしますよ。エミリナがいてくれればよかったのですが……」
line = "「そうですねぇ……今日はお休みですが、いつもは聖歌隊が活動していたりしますよ。エミリナがいてくれればよかったのですが……」"

[[dialogue]]
speaker = "ナナカ"
# 「アタシ、呼んでこよっか？」
line = "「アタシ、呼んでこよっか？」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、そこまでしていただくのは悪いですから大丈夫ですよ」
line = "「いえ、そこまでしていただくのは悪いですから大丈夫ですよ」"

[[dialogue]]
speaker = "フィオナ"
# 「……我々の流星学園にも聖歌隊がいるんですよ。大聖堂で日々聖歌を捧げています」
line = "「……我々の流星学園にも聖歌隊がいるんですよ。大聖堂で日々聖歌を捧げています」"

[[dialogue]]
speaker = "ナナカ"
# 「フィオナも歌うの？」
line = "「フィオナも歌うの？」"

[[dialogue]]
speaker = "フィオナ"
# 「私は生憎とメンバーではありませんから……ときどき参加する、くらいでしょうか」
line = "「私は生憎とメンバーではありませんから……ときどき参加する、くらいでしょうか」"

[[dialogue]]
speaker = "ナナカ"
# 「え～、聞いてみたいな～。よし、ならロロちゃん、いっちょやってみてよ！」
line = "「え～、聞いてみたいな～。よし、ならロロちゃん、いっちょやってみてよ！」"

[[dialogue]]
speaker = "ロロット"
# 「えぇっ、わたしですか！？」
line = "「えぇっ、わたしですか！？」"

[[dialogue]]
speaker = "ナナカ"
# 「一緒に歌ったら、もっと仲良くなれそうだしさっ」
line = "「一緒に歌ったら、もっと仲良くなれそうだしさっ」"

[[dialogue]]
speaker = "ロロット"
# 「あわわ、突然言われましても～！」
line = "「あわわ、突然言われましても～！」"

[[dialogue]]
speaker = "ナナカ"
# 「ロロちゃん、うまいんだから大丈夫だって！　江戸っ子なら覚悟決めやがれい！」
line = "「ロロちゃん、うまいんだから大丈夫だって！　江戸っ子なら覚悟決めやがれい！」"

[[dialogue]]
speaker = "ロロット"
# 「江戸っ子じゃありませ～ん！」
line = "「江戸っ子じゃありませ～ん！」"

[[dialogue]]
speaker = "unk"
# 天使だったね
line = "天使だったね"

[[dialogue]]
speaker = "ロロット"
# 「て、天使でもありませんってば～～～！！」
line = "「て、天使でもありませんってば～～～！！」"

[[dialogue]]
speaker = "フィオナ"
# 「どちらでも構いませんよ。ロロットさんが一緒に歌って下さったら嬉しいですけど」
line = "「どちらでも構いませんよ。ロロットさんが一緒に歌って下さったら嬉しいですけど」"

[[dialogue]]
speaker = "ナナカ"
# 「おおっ、乗り気じゃん！　どうすんのさ、ロロちゃん？　ちなみにアタシは、いつでも歌う覚悟は出来てるからね！」
line = "「おおっ、乗り気じゃん！　どうすんのさ、ロロちゃん？　ちなみにアタシは、いつでも歌う覚悟は出来てるからね！」"

[[dialogue]]
speaker = "ロロット"
# 「まったく～、そこまで期待されてしまっては、仕方がありませんね！　わたしが天使ではないことを、歌で証明してご覧に入れましょう」
line = "「まったく～、そこまで期待されてしまっては、仕方がありませんね！　わたしが天使ではないことを、歌で証明してご覧に入れましょう」"

[[dialogue]]
speaker = "unk"
# こうして、覚悟を決めたロロットは俺たちと一緒に歌声を響かせるのだった。
line = "こうして、覚悟を決めたロロットは俺たちと一緒に歌声を響かせるのだった。"
