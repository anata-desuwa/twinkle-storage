[[dialogue]]
speaker = "シズル"
# 「はじめまして、鵜飼シズルです。ようこそ紫桜の里へお越しくださいました。みなさんを歓迎します」
line = "「はじめまして、鵜飼シズルです。ようこそ紫桜の里へお越しくださいました。みなさんを歓迎します」"

[[dialogue]]
speaker = "unk"
# この方が師匠……？
line = "この方が師匠……？"

[[dialogue]]
speaker = "unk"
# ええと……？
line = "ええと……？"

[[dialogue]]
speaker = "シズル"
# 「初めましての方には大抵驚かれてしまいますが、これでもそれなりに年を重ねているんですよ」
line = "「初めましての方には大抵驚かれてしまいますが、これでもそれなりに年を重ねているんですよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「どっからどう見ても、ちっちゃかわいい女の子でしょー」
line = "「どっからどう見ても、ちっちゃかわいい女の子でしょー」"

[[dialogue]]
speaker = "せつな"
# 「師匠は若作りでござるからなぁ」
line = "「師匠は若作りでござるからなぁ」"

[[dialogue]]
speaker = "シズル"
# 「もー、若作りとは何事ですか？　いつまでもお若くて良いですね～、とかいろいろ言い方はあるでしょう？」
line = "「もー、若作りとは何事ですか？　いつまでもお若くて良いですね～、とかいろいろ言い方はあるでしょう？」"

[[dialogue]]
speaker = "ヨミ"
# 「若いなんてレベルじゃないんですけど……それに、只者じゃないオーラを感じます……」
line = "「若いなんてレベルじゃないんですけど……それに、只者じゃないオーラを感じます……」"

[[dialogue]]
speaker = "ヨミ"
# 「って……ひー、ふー、みー、よー……９本！？　ってことはもしかして『九尾の狐』なんですか！？」
line = "「って……ひー、ふー、みー、よー……９本！？　ってことはもしかして『九尾の狐』なんですか！？」"

[[dialogue]]
speaker = "ウズメイア"
# 「尻尾が多い方がいいの？　じゃあヨミヨミのちょー凄いバージョンってことだ～」
line = "「尻尾が多い方がいいの？　じゃあヨミヨミのちょー凄いバージョンってことだ～」"

[[dialogue]]
speaker = "ヨミ"
# 「同じ狐耳ではありますが、種族としては全く違う種族です……でも、ちょー凄いってところはその通りです」
line = "「同じ狐耳ではありますが、種族としては全く違う種族です……でも、ちょー凄いってところはその通りです」"

[[dialogue]]
speaker = "ウズメイア"
# 「へえ～、そうなんだー！　あ、記念にちょっちモフらせてもらっていいですかっ？」
line = "「へえ～、そうなんだー！　あ、記念にちょっちモフらせてもらっていいですかっ？」"

[[dialogue]]
speaker = "シズル"
# 「もふ、ですか……？」
line = "「もふ、ですか……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「触って、撫でて、その感触を確かめたいってことですよ～」
line = "「触って、撫でて、その感触を確かめたいってことですよ～」"

[[dialogue]]
speaker = "ヨミ"
# 「ちょっ、ウズメさん、失礼ですよっ」
line = "「ちょっ、ウズメさん、失礼ですよっ」"

[[dialogue]]
speaker = "シズル"
# 「えへへっ♪　触るくらいでしたらいいですよ、どうぞどうぞです♪」
line = "「えへへっ♪　触るくらいでしたらいいですよ、どうぞどうぞです♪」"

[[dialogue]]
speaker = "ウズメイア"
# 「やったー！　それじゃ遠慮なく……もふもふもふもふ……おーっ、めっちゃもふもふだぁ～」
line = "「やったー！　それじゃ遠慮なく……もふもふもふもふ……おーっ、めっちゃもふもふだぁ～」"

[[dialogue]]
speaker = "unk"
# 俺ももふってみたい
line = "俺ももふってみたい"

[[dialogue]]
speaker = "unk"
# もふもふが気になる
line = "もふもふが気になる"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　会長まで！」
line = "「こやっ！？　会長まで！」"

[[dialogue]]
speaker = "シズル"
# 「お客人と親睦を深めるためなら、尻尾の１もふや２もふくらいは喜んでお受けします♪」
line = "「お客人と親睦を深めるためなら、尻尾の１もふや２もふくらいは喜んでお受けします♪」"

[[dialogue]]
speaker = "シズル"
# 「ヨミさんもどうですか？　せつなも久し振りにいいですよ～」
line = "「ヨミさんもどうですか？　せつなも久し振りにいいですよ～」"

[[dialogue]]
speaker = "せつな"
# 「やったー！　師匠の尻尾でござる～！　もふもふもふもふ……」
line = "「やったー！　師匠の尻尾でござる～！　もふもふもふもふ……」"

[[dialogue]]
speaker = "ヨミ"
# 「みんなしてずるいです！　わ、私も……シズルさんのお尻尾をもふらせて頂きます！」
line = "「みんなしてずるいです！　わ、私も……シズルさんのお尻尾をもふらせて頂きます！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁぁんっ、なんとしゅばらしい手触り……もふもふもふもふ……」
line = "「こやぁぁんっ、なんとしゅばらしい手触り……もふもふもふもふ……」"

[[dialogue]]
speaker = "シズル"
# 「こんなとき尻尾が沢山あってよかったと思いますね～」
line = "「こんなとき尻尾が沢山あってよかったと思いますね～」"

[[dialogue]]
speaker = "せつな"
# 「師匠～、師匠ぉ～、会いたかったでござる～～」
line = "「師匠～、師匠ぉ～、会いたかったでござる～～」"

[[dialogue]]
speaker = "ウズメイア"
# 「あ、そっか。シズルさんってござるちゃんのおししょー様なんだっけ。一瞬忘れかけてたかも……」
line = "「あ、そっか。シズルさんってござるちゃんのおししょー様なんだっけ。一瞬忘れかけてたかも……」"

[[dialogue]]
speaker = "せつな"
# 「そうでござるよ。里の者はみんな、師匠の教えを受けて立派な忍者に成長するでござる！」
line = "「そうでござるよ。里の者はみんな、師匠の教えを受けて立派な忍者に成長するでござる！」"

[[dialogue]]
speaker = "せつな"
# 「師匠はすごいんでござるよ。ちっちゃくても、誰も敵わない最強の忍者でござる！」
line = "「師匠はすごいんでござるよ。ちっちゃくても、誰も敵わない最強の忍者でござる！」"

[[dialogue]]
speaker = "シズル"
# 「そんなことはありませんよ。日々、己の未熟さを痛感するばかりです」
line = "「そんなことはありませんよ。日々、己の未熟さを痛感するばかりです」"

[[dialogue]]
speaker = "unk"
# 偉いぞ、よしよし
line = "偉いぞ、よしよし"

[[dialogue]]
speaker = "unk"
# こんなに小さいのに！
line = "こんなに小さいのに！"

[[dialogue]]
speaker = "シズル"
# 「あはっ、褒められてしまいました♪」
line = "「あはっ、褒められてしまいました♪」"

[[dialogue]]
speaker = "せつな"
# 「主様……忘れているかもしれませぬが、師匠はせつなたちよりずっと高齢なのでござるよ」
line = "「主様……忘れているかもしれませぬが、師匠はせつなたちよりずっと高齢なのでござるよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「そうなん？　しょーじきそんな風には見えないけど……何歳くらいなんですか？」
line = "「そうなん？　しょーじきそんな風には見えないけど……何歳くらいなんですか？」"

[[dialogue]]
speaker = "シズル"
# 「正確には覚えていないんですが……５００歳くらいでしょうか？」
line = "「正確には覚えていないんですが……５００歳くらいでしょうか？」"

[[dialogue]]
speaker = "ウズメイア"
# 「わ……思ってた以上にご長寿だし！」
line = "「わ……思ってた以上にご長寿だし！」"

[[dialogue]]
speaker = "ヨミ"
# 「九尾の狐は魔界のあらゆる種族の中でも特に長命の種族なんですよ」
line = "「九尾の狐は魔界のあらゆる種族の中でも特に長命の種族なんですよ」"

[[dialogue]]
speaker = "せつな"
# 「師匠は村の長よりも年長なのでござる」
line = "「師匠は村の長よりも年長なのでござる」"

[[dialogue]]
speaker = "シズル"
# 「あの子のおしめを替えていた、そんな時期もありましたね～」
line = "「あの子のおしめを替えていた、そんな時期もありましたね～」"

[[dialogue]]
speaker = "せつな"
# 「里の者は大抵そうなのでござる。師匠はみんなのお母さんでもあるのでござる」
line = "「里の者は大抵そうなのでござる。師匠はみんなのお母さんでもあるのでござる」"

[[dialogue]]
speaker = "シズル"
# 「そうですね……でもせつなは特別です。赤ちゃんのころから我が子のように手塩にかけて育てたんですから」
line = "「そうですね……でもせつなは特別です。赤ちゃんのころから我が子のように手塩にかけて育てたんですから」"

[[dialogue]]
speaker = "シズル"
# 「せつなは期待に応えて立派に育ってくれました、私の誇りですよ♪」
line = "「せつなは期待に応えて立派に育ってくれました、私の誇りですよ♪」"

[[dialogue]]
speaker = "せつな"
# 「し、ししょおぉ～～～っ」
line = "「し、ししょおぉ～～～っ」"

[[dialogue]]
speaker = "シズル"
# 「まったくもう、甘えんぼさんなんですね～。みなさんすみません、恥ずかしいところをお見せしてしまって」
line = "「まったくもう、甘えんぼさんなんですね～。みなさんすみません、恥ずかしいところをお見せしてしまって」"

[[dialogue]]
speaker = "ウズメイア"
# 「たまにはいいっしょ。ござるちゃんも久し振りのおししょー様にめいっぱい甘えちゃいな～」
line = "「たまにはいいっしょ。ござるちゃんも久し振りのおししょー様にめいっぱい甘えちゃいな～」"

[[dialogue]]
speaker = "せつな"
# 「ウズメ殿～、お言葉に甘えるでござる～！！」
line = "「ウズメ殿～、お言葉に甘えるでござる～！！」"

[[dialogue]]
speaker = "unk"
# こうして、久し振りの師匠との再会に甘えまくるせつなだった。
line = "こうして、久し振りの師匠との再会に甘えまくるせつなだった。"
