[[dialogue]]
speaker = "unk"
# 第４話,フロレンシアとスミカ,P
line = "第４話,フロレンシアとスミカ,P"

[[dialogue]]
speaker = "フロレンシア"
# 「弱点克服作戦パート２、です！」
line = "「弱点克服作戦パート２、です！」"

[[dialogue]]
speaker = "unk"
# どんな作戦……？
line = "どんな作戦……？"

[[dialogue]]
speaker = "フロレンシア"
# 「さすがに会長さんに何度も攻撃するのは申し訳ないですから、こうして会長さんと一緒にいようかと。そのうち血を見る機会もあるでしょうから」
line = "「さすがに会長さんに何度も攻撃するのは申し訳ないですから、こうして会長さんと一緒にいようかと。そのうち血を見る機会もあるでしょうから」"

[[dialogue]]
speaker = "フロレンシア"
# 「私のことはお構いなく。いないものだと思ってください」
line = "「私のことはお構いなく。いないものだと思ってください」"

[[dialogue]]
speaker = "フロレンシア"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "フロレンシア"
# 「あ」
line = "「あ」"

[[dialogue]]
speaker = "unk"
# 何か食べる？
line = "何か食べる？"

[[dialogue]]
speaker = "フロレンシア"
# 「……はい、いただきます」
line = "「……はい、いただきます」"

[[dialogue]]
speaker = "フロレンシア"
# 「これは……人形焼き！　わわ、出来たてで熱いです」
line = "「これは……人形焼き！　わわ、出来たてで熱いです」"

[[dialogue]]
speaker = "フロレンシア"
# 「存在は知ってはいましたが、実物を見るのは初めてです。人形焼きという名前なのに、提灯とか塔とかいろんな形があるんですね。どれどれ……あむ」
line = "「存在は知ってはいましたが、実物を見るのは初めてです。人形焼きという名前なのに、提灯とか塔とかいろんな形があるんですね。どれどれ……あむ」"

[[dialogue]]
speaker = "フロレンシア"
# 「ん～～っ！　おいしいです！」
line = "「ん～～っ！　おいしいです！」"

[[dialogue]]
speaker = "フロレンシア"
# 「甘さ控えめなあんこと、さくっとした生地が絶妙なバランスで、これはたまりません♪」
line = "「甘さ控えめなあんこと、さくっとした生地が絶妙なバランスで、これはたまりません♪」"

[[dialogue]]
speaker = "フロレンシア"
# 「……なるほど、焼きたてだからこんなにさくっとしてるんですね。時間が経つとしっとり……そちらも食べてみたいです」
line = "「……なるほど、焼きたてだからこんなにさくっとしてるんですね。時間が経つとしっとり……そちらも食べてみたいです」"

[[dialogue]]
speaker = "フロレンシア"
# 「でも他のお店も気になる……甘いものばっかり食べてたら太っちゃう……」
line = "「でも他のお店も気になる……甘いものばっかり食べてたら太っちゃう……」"

[[dialogue]]
speaker = "unk"
# 食べちゃえ食べちゃえ
line = "食べちゃえ食べちゃえ"

[[dialogue]]
speaker = "フロレンシア"
# 「うぅ～っ、もし太ったら会長さんを恨みますからねっ」
line = "「うぅ～っ、もし太ったら会長さんを恨みますからねっ」"

[[dialogue]]
speaker = "フロレンシア"
# 「──あ」
line = "「──あ」"

[[dialogue]]
speaker = "フロレンシア"
# 「あのー……ご気分大丈夫ですか？」
line = "「あのー……ご気分大丈夫ですか？」"

[[dialogue]]
speaker = "unk"
# フロレンシアは隅でうずくまっているおばあさんに気付くと、優しく声をかけた。
line = "フロレンシアは隅でうずくまっているおばあさんに気付くと、優しく声をかけた。"

[[dialogue]]
speaker = "unk"
# おばあさんは観光で浅草を訪れたが、人が多くて気分が悪くなってしまったという。
line = "おばあさんは観光で浅草を訪れたが、人が多くて気分が悪くなってしまったという。"

[[dialogue]]
speaker = "フロレンシア"
# 「なるほど、そういうことありますよね。それじゃ休めるところに行きましょうか」
line = "「なるほど、そういうことありますよね。それじゃ休めるところに行きましょうか」"

[[dialogue]]
speaker = "フロレンシア"
# 「実は私たち、新星学園の星騎士で──」
line = "「実は私たち、新星学園の星騎士で──」"

[[dialogue]]
speaker = "フロレンシア"
# 「いわゆる人酔いですね。少しお休みしたら顔色も良くなりましたし、安心しました」
line = "「いわゆる人酔いですね。少しお休みしたら顔色も良くなりましたし、安心しました」"

[[dialogue]]
speaker = "フロレンシア"
# 「……私はモンスターと戦う星騎士です。でも人を脅かすのはモンスターだけではありません」
line = "「……私はモンスターと戦う星騎士です。でも人を脅かすのはモンスターだけではありません」"

[[dialogue]]
speaker = "フロレンシア"
# 「怪我とか病気とかいろんな理由で、思うように生きられない人はたくさんいます」
line = "「怪我とか病気とかいろんな理由で、思うように生きられない人はたくさんいます」"

[[dialogue]]
speaker = "フロレンシア"
# 「リクリエとかモンスター関係なく、誰もが健やかに生きられるようにしたいと私は思っているんです」
line = "「リクリエとかモンスター関係なく、誰もが健やかに生きられるようにしたいと私は思っているんです」"

[[dialogue]]
speaker = "フロレンシア"
# 「って、つい真面目になっちゃいました。休日なんですからそういうのは忘れましょう」
line = "「って、つい真面目になっちゃいました。休日なんですからそういうのは忘れましょう」"

[[dialogue]]
speaker = "フロレンシア"
# 「さぁ、浅草散策の続きですっ」
line = "「さぁ、浅草散策の続きですっ」"

[[dialogue]]
speaker = "フロレンシア"
# 「あれ……？　当初の目的を忘れているような……ま、たまにはいいですよね！」
line = "「あれ……？　当初の目的を忘れているような……ま、たまにはいいですよね！」"

[[dialogue]]
speaker = "スミカ"
# 「よう。フロレンシアなら疲れて寝ちまったよ」
line = "「よう。フロレンシアなら疲れて寝ちまったよ」"

[[dialogue]]
speaker = "スミカ"
# 「会長サンとのデートがずいぶん楽しかったみたいだな。……デートじゃないとか言うなよ。フロレンシアがかわいそうだろ」
line = "「会長サンとのデートがずいぶん楽しかったみたいだな。……デートじゃないとか言うなよ。フロレンシアがかわいそうだろ」"

[[dialogue]]
speaker = "スミカ"
# 「で、念押ししとくが、アタシのことは他のヤツには言ってないだろうな。うっかりでも喋ったら注射だぞテメェ」
line = "「で、念押ししとくが、アタシのことは他のヤツには言ってないだろうな。うっかりでも喋ったら注射だぞテメェ」"

[[dialogue]]
speaker = "スミカ"
# 「……なんだその顔は？　正直に言えば、フロレンシアがアタシを認めてくれるとでも思ってんのか？」
line = "「……なんだその顔は？　正直に言えば、フロレンシアがアタシを認めてくれるとでも思ってんのか？」"

[[dialogue]]
speaker = "スミカ"
# 「確かにあいつはお人好しだが、自分の中に別の存在がいるってのは、相当不愉快だと思うがねぇ」
line = "「確かにあいつはお人好しだが、自分の中に別の存在がいるってのは、相当不愉快だと思うがねぇ」"

[[dialogue]]
speaker = "スミカ"
# 「ていうか、そうなった方がイヤだねアタシは」
line = "「ていうか、そうなった方がイヤだねアタシは」"

[[dialogue]]
speaker = "スミカ"
# 「言ったはずだ、アタシは星力によって生まれた人格だって」
line = "「言ったはずだ、アタシは星力によって生まれた人格だって」"

[[dialogue]]
speaker = "スミカ"
# 「星騎士はいずれ星力を使えなくなる。つまり……いずれアタシは消える」
line = "「星騎士はいずれ星力を使えなくなる。つまり……いずれアタシは消える」"

[[dialogue]]
speaker = "unk"
# ──！
line = "──！"

[[dialogue]]
speaker = "スミカ"
# 「なんだ、わかってなかったのか、会長サン。察しが悪いじゃねえか」
line = "「なんだ、わかってなかったのか、会長サン。察しが悪いじゃねえか」"

[[dialogue]]
speaker = "スミカ"
# 「想像してみろ。アイツが泣きそうな顔で『消えないで～』とか言ってきたら気持ち悪くてたまらねえ」
line = "「想像してみろ。アイツが泣きそうな顔で『消えないで～』とか言ってきたら気持ち悪くてたまらねえ」"

[[dialogue]]
speaker = "スミカ"
# 「アタシが消えたら会長サンもせいせいするだろ。つっても、会長さんの方があがりは早いか？　魔王とやらはその辺どうなってんのか知らねえが」
line = "「アタシが消えたら会長サンもせいせいするだろ。つっても、会長さんの方があがりは早いか？　魔王とやらはその辺どうなってんのか知らねえが」"

[[dialogue]]
speaker = "スミカ"
# 「……何残念そうな顔してやがる。当然のことだろうが」
line = "「……何残念そうな顔してやがる。当然のことだろうが」"

[[dialogue]]
speaker = "スミカ"
# 「フロレンシアが完全に星力を使えなくなるより、アタシが消える方がはえーかもしれねえな」
line = "「フロレンシアが完全に星力を使えなくなるより、アタシが消える方がはえーかもしれねえな」"

[[dialogue]]
speaker = "スミカ"
# 「ん？　待てよ？　そうするとフロレンシアが自分で治療するハメになるわけで……ヒャハハハッ、そいつはこえーな！　会長サンがビビるわけだ！」
line = "「ん？　待てよ？　そうするとフロレンシアが自分で治療するハメになるわけで……ヒャハハハッ、そいつはこえーな！　会長サンがビビるわけだ！」"

[[dialogue]]
speaker = "スミカ"
# 「でももし会長サンがアタシのことを惜しんでくれるなら……そうだな、想い出にキスでもしてくれよ」
line = "「でももし会長サンがアタシのことを惜しんでくれるなら……そうだな、想い出にキスでもしてくれよ」"

[[dialogue]]
speaker = "スミカ"
# 「消えるんだからそれくらいいいだろ。これでも会長サンのことは気に入ってるんだぜ？」
line = "「消えるんだからそれくらいいいだろ。これでも会長サンのことは気に入ってるんだぜ？」"

[[dialogue]]
speaker = "スミカ"
# 「じっとしててくれよ──」
line = "「じっとしててくれよ──」"

[[dialogue]]
speaker = "フロレンシア"
# 「！？　かか、会長さん！？」
line = "「！？　かか、会長さん！？」"

[[dialogue]]
speaker = "unk"
# （急に戻った！？）
line = "（急に戻った！？）"

[[dialogue]]
speaker = "フロレンシア"
# 「な、なんでこんな近いんですか……？」
line = "「な、なんでこんな近いんですか……？」"

[[dialogue]]
speaker = "フロレンシア"
# 「でも、それなら……」
line = "「でも、それなら……」"

[[dialogue]]
speaker = "フロレンシア"
# 「ちゅっ」
line = "「ちゅっ」"

[[dialogue]]
speaker = "フロレンシア"
# 「えへへ、ほっぺにチュウしちゃいました」
line = "「えへへ、ほっぺにチュウしちゃいました」"

[[dialogue]]
speaker = "フロレンシア"
# 「それじゃ……えっと、その……おやすみなさ～いっ」
line = "「それじゃ……えっと、その……おやすみなさ～いっ」"
