[[dialogue]]
speaker = "unk"
# 第９話,リクリエの使徒,B
line = "第９話,リクリエの使徒,B"

[[dialogue]]
speaker = "unk"
# 俺とヴィーナス──
line = "俺とヴィーナス──"

[[dialogue]]
speaker = "unk"
# それからサーシャ先輩と流星のソフィアちゃんは、本丸であるアポロ目がけて夜空を駆けていた。
line = "それからサーシャ先輩と流星のソフィアちゃんは、本丸であるアポロ目がけて夜空を駆けていた。"

[[dialogue]]
speaker = "ソフィア"
# 「この夜に切り替わった瞬間、一度だけそれらしき影を目視しました。こちらへ向かっていったと思われますが……」
line = "「この夜に切り替わった瞬間、一度だけそれらしき影を目視しました。こちらへ向かっていったと思われますが……」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふ、お手柄よソフィ。出会ったこともないのによくわかったわね」
line = "「ふふ、お手柄よソフィ。出会ったこともないのによくわかったわね」"

[[dialogue]]
speaker = "ソフィア"
# 「危険な相手ということで、情報は集めていましたから…………って頭を撫でようとしないでくださいっ」
line = "「危険な相手ということで、情報は集めていましたから…………って頭を撫でようとしないでくださいっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　見ないうちに仲良くなったのね……？」
line = "「？　見ないうちに仲良くなったのね……？」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# サーシャ先輩は後輩を可愛がる傾向にある。
line = "サーシャ先輩は後輩を可愛がる傾向にある。"

[[dialogue]]
speaker = "unk"
# ただ、それでも……ソフィアちゃんに対する微笑みは、俺に向けるそれと異なっているように見えた。
line = "ただ、それでも……ソフィアちゃんに対する微笑みは、俺に向けるそれと異なっているように見えた。"

[[dialogue]]
speaker = "unk"
# そして、飛行を続けること十数分──
line = "そして、飛行を続けること十数分──"

[[dialogue]]
speaker = "ヴィーナス"
# 「──いた！」
line = "「──いた！」"

[[dialogue]]
speaker = "unk"
# 東京タワーの遥か上空。ようやく彼女の影を見つけた。
line = "東京タワーの遥か上空。ようやく彼女の影を見つけた。"

[[dialogue]]
speaker = "アポロ"
# 「出てこい、サイキョーの魔王！　さもなくばこの人間界はぜ～んぶまっさらにしてアポロ様のおもちゃ箱にしちゃうぞ！」
line = "「出てこい、サイキョーの魔王！　さもなくばこの人間界はぜ～んぶまっさらにしてアポロ様のおもちゃ箱にしちゃうぞ！」"

[[dialogue]]
speaker = "ギエル"
# 「ハハハ、お見事でございますアポロ様！」
line = "「ハハハ、お見事でございますアポロ様！」"

[[dialogue]]
speaker = "unk"
# ペンでも回すかのように大剣を振るい、新たなモンスターを地上へ生み落としているアポロ。
line = "ペンでも回すかのように大剣を振るい、新たなモンスターを地上へ生み落としているアポロ。"

[[dialogue]]
speaker = "unk"
# 俺たちはそれらを撃滅しつつ姿を現した。
line = "俺たちはそれらを撃滅しつつ姿を現した。"

[[dialogue]]
speaker = "クロト"
# 「アポロ……」
line = "「アポロ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっぱりいたわね、ガキンチョ！　今回は逃がさないんだからね！」
line = "「やっぱりいたわね、ガキンチョ！　今回は逃がさないんだからね！」"

[[dialogue]]
speaker = "アポロ"
# 「お、来たな？　待ちくたびれたぞ、へっへっへ」
line = "「お、来たな？　待ちくたびれたぞ、へっへっへ」"

[[dialogue]]
speaker = "unk"
# アポロは以前よりさらに強大な紫の瘴気をまとってそこにいた。
line = "アポロは以前よりさらに強大な紫の瘴気をまとってそこにいた。"

[[dialogue]]
speaker = "unk"
# 彼女のお付きである執事も、主の奔放を喝采して微笑みをたたえている。
line = "彼女のお付きである執事も、主の奔放を喝采して微笑みをたたえている。"

[[dialogue]]
speaker = "ソフィア"
# 「あれが“星読事変”の首謀者……ほんとに、私より幼い……」
line = "「あれが“星読事変”の首謀者……ほんとに、私より幼い……」"

[[dialogue]]
speaker = "サーシャ"
# 「見た目だけは可愛いんだけどねえ。やることは全然可愛くなくって」
line = "「見た目だけは可愛いんだけどねえ。やることは全然可愛くなくって」"

[[dialogue]]
speaker = "unk"
# アポロはリクリエの使徒である。
line = "アポロはリクリエの使徒である。"

[[dialogue]]
speaker = "unk"
# アナは彼女をそう分析し、謎の声もまたアポロのことをそう匂わせた。
line = "アナは彼女をそう分析し、謎の声もまたアポロのことをそう匂わせた。"

[[dialogue]]
speaker = "unk"
# 『何もかもまっさらに』──言動の節々からうかがえるそのスタンスは、まさにリクリエそのもの。
line = "『何もかもまっさらに』──言動の節々からうかがえるそのスタンスは、まさにリクリエそのもの。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "アポロ"
# 「フィーニスの塔二階層を突破したよーだな。それでこそ我が最大の宿敵・魔王にふさわしい！」
line = "「フィーニスの塔二階層を突破したよーだな。それでこそ我が最大の宿敵・魔王にふさわしい！」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# だからこそアポロは魔王に執着する。
line = "だからこそアポロは魔王に執着する。"

[[dialogue]]
speaker = "unk"
# いわく最強の魔王とやらをライバル視して、俺を仮想のボス敵に仕立て上げている。
line = "いわく最強の魔王とやらをライバル視して、俺を仮想のボス敵に仕立て上げている。"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんでまたあんたは私たちの動きを掴んでんのよ。まあいいけど……前の私と思ったら大違いだから」
line = "「なんでまたあんたは私たちの動きを掴んでんのよ。まあいいけど……前の私と思ったら大違いだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もうこれに頼り切りにはならない。だから、私たちの力だけであんたを倒すわ」
line = "「もうこれに頼り切りにはならない。だから、私たちの力だけであんたを倒すわ」"

[[dialogue]]
speaker = "アポロ"
# 「ふふふん。いい度胸だ魔王の家来よ」
line = "「ふふふん。いい度胸だ魔王の家来よ」"

[[dialogue]]
speaker = "ギエル"
# 「フフフ。身の程を教えてさしあげましょう、アポロ様」
line = "「フフフ。身の程を教えてさしあげましょう、アポロ様」"
