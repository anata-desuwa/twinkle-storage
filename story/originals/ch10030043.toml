[[dialogue]]
speaker = "unk"
# 第３話,カミングアウトは突然に,P
line = "第３話,カミングアウトは突然に,P"

[[dialogue]]
speaker = "unk"
# とある長閑な休日──
line = "とある長閑な休日──"

[[dialogue]]
speaker = "ヴィーナス"
# 「水着デートをするわよ、クロト！」
line = "「水着デートをするわよ、クロト！」"

[[dialogue]]
speaker = "unk"
# なぜかすでに水着に着替えたヴィーナスが、俺の前に立ちはだかった。
line = "なぜかすでに水着に着替えたヴィーナスが、俺の前に立ちはだかった。"

[[dialogue]]
speaker = "unk"
# 早い早い早い！！
line = "早い早い早い！！"

[[dialogue]]
speaker = "ヴィーナス"
# 「突然どうしたって……そんなの、おニューの水着をもっと良く見てもらうために決まってるじゃない！」
line = "「突然どうしたって……そんなの、おニューの水着をもっと良く見てもらうために決まってるじゃない！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトってば、この間の合宿ではリーリアとセドナばっかりで、あんまり私に構ってくれなかったじゃない？」
line = "「クロトってば、この間の合宿ではリーリアとセドナばっかりで、あんまり私に構ってくれなかったじゃない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そもそも、恋人の新しい水着に対して、感想が一言もないっていうのはどういうことなのよ！」
line = "「そもそも、恋人の新しい水着に対して、感想が一言もないっていうのはどういうことなのよ！」"

[[dialogue]]
speaker = "unk"
# うん、新しい水着も凄く可愛い
line = "うん、新しい水着も凄く可愛い"

[[dialogue]]
speaker = "unk"
# それは本当にごめん……
line = "それは本当にごめん……"

[[dialogue]]
speaker = "ヴィーナス"
# 「えへへぇ♪　そうでしょう？　可愛くなるように、一杯頑張ったんだから！」
line = "「えへへぇ♪　そうでしょう？　可愛くなるように、一杯頑張ったんだから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、一言褒めるだけじゃダメ～♪　もう穴が開くくらい、私の水着姿をジロジロ見つめてくれなくっちゃ、嫌なんだから！」
line = "「でも、一言褒めるだけじゃダメ～♪　もう穴が開くくらい、私の水着姿をジロジロ見つめてくれなくっちゃ、嫌なんだから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん？　肌色面積が多くて目の毒……？　ダメで～す♪　クロトはもっと、上から下まで、私の体を舐めるように見つめなさいっ」
line = "「ん？　肌色面積が多くて目の毒……？　ダメで～す♪　クロトはもっと、上から下まで、私の体を舐めるように見つめなさいっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほらほら～<emoji=heart04>　胸の谷間も、しっかり見つめるのよ？　大胆に見せちゃってる脇の下も～、きゅっとくびれた腰回りもね～♪」
line = "「ほらほら～<emoji=heart04>　胸の谷間も、しっかり見つめるのよ？　大胆に見せちゃってる脇の下も～、きゅっとくびれた腰回りもね～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトがおっぱいをチラチラ見てることなんて、ちゃんと気付いてるんだから！　隠れて見るくらいなら、しっかりガン見して褒めたたえなさい！」
line = "「クロトがおっぱいをチラチラ見てることなんて、ちゃんと気付いてるんだから！　隠れて見るくらいなら、しっかりガン見して褒めたたえなさい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなにおっぱいが好きなら、手で持ち上げて、ゆさゆさってしちゃおうかしら～♪　ねっ、パーパ<emoji=heart04>」
line = "「そんなにおっぱいが好きなら、手で持ち上げて、ゆさゆさってしちゃおうかしら～♪　ねっ、パーパ<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それは流石にはしたないからやめなさい……？　あははっ。顔真っ赤にしちゃって、今のクロト、すっごく可愛いわよ♪」
line = "「それは流石にはしたないからやめなさい……？　あははっ。顔真っ赤にしちゃって、今のクロト、すっごく可愛いわよ♪」"

[[dialogue]]
speaker = "unk"
# 水着の件は反省してるから、許してくれ
line = "水着の件は反省してるから、許してくれ"

[[dialogue]]
speaker = "unk"
# 悪かった……
line = "悪かった……"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあお詫びにこの後、リゾート結界でデートしてくれる？」
line = "「じゃあお詫びにこの後、リゾート結界でデートしてくれる？」"

[[dialogue]]
speaker = "unk"
# 喜んで
line = "喜んで"

[[dialogue]]
speaker = "ヴィーナス"
# 「やったぁ♪　じゃあ今日は１日、私と遊んでもらうわよ、クロト<emoji=heart04>　……ん～、ちゅっ<emoji=heart04>」
line = "「やったぁ♪　じゃあ今日は１日、私と遊んでもらうわよ、クロト<emoji=heart04>　……ん～、ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは水着姿で腕に抱き着きながら、大胆にキスをしてくれる。
line = "ヴィーナスは水着姿で腕に抱き着きながら、大胆にキスをしてくれる。"

[[dialogue]]
speaker = "unk"
# その時だった──
line = "その時だった──"

[[dialogue]]
speaker = "リーリア"
# 「えっ。セン、パイ……？」
line = "「えっ。セン、パイ……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら？　リーリアじゃない。どうかしたの？」
line = "「あら？　リーリアじゃない。どうかしたの？」"

[[dialogue]]
speaker = "リーリア"
# 「え？　あの、そのぉ……お取込み中、でしたかねっ！　す、すすす、すみませんっ」
line = "「え？　あの、そのぉ……お取込み中、でしたかねっ！　す、すすす、すみませんっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「全然気にしなくていいのよ！　というか、あなたそんなに慌てて、どうかしたのかしら？」
line = "「全然気にしなくていいのよ！　というか、あなたそんなに慌てて、どうかしたのかしら？」"

[[dialogue]]
speaker = "リーリア"
# 「ええええっ！？　どうして見られた側がそんなに平然としてるんです！？」
line = "「ええええっ！？　どうして見られた側がそんなに平然としてるんです！？」"

[[dialogue]]
speaker = "リーリア"
# 「というかセンパイたち、親娘って話でしたよね……？　いくら肉親とはいえ、ちょっと不健全な距離感じゃないですか！？」
line = "「というかセンパイたち、親娘って話でしたよね……？　いくら肉親とはいえ、ちょっと不健全な距離感じゃないですか！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あれ？　言ってなかったかしら？　私、パパとは恋人同士よ？」
line = "「あれ？　言ってなかったかしら？　私、パパとは恋人同士よ？」"

[[dialogue]]
speaker = "リーリア"
# 「は！？！？！！？？？！　なっ！！！　……ええっ！？！？！？」
line = "「は！？！？！！？？？！　なっ！！！　……ええっ！？！？！？」"

[[dialogue]]
speaker = "unk"
# 突然のカミングアウトに、リーリアは完全に頭が真っ白、という顔になった。
line = "突然のカミングアウトに、リーリアは完全に頭が真っ白、という顔になった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう言えば魔女って、世界樹から産まれるから、男がいないんだったっけ？」
line = "「そう言えば魔女って、世界樹から産まれるから、男がいないんだったっけ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「人間界では、パパとツガイになる娘もいるってことよ……！」
line = "「人間界では、パパとツガイになる娘もいるってことよ……！」"

[[dialogue]]
speaker = "セドナ"
# 「無茶苦茶を教えるのはよしてもらおう、九浄ヴィーナス」
line = "「無茶苦茶を教えるのはよしてもらおう、九浄ヴィーナス」"

[[dialogue]]
speaker = "セドナ"
# 「世界広しと言えど、実の父親に発情する娘は貴様くらいのものだ。部下に誤った知識を教え込まないように」
line = "「世界広しと言えど、実の父親に発情する娘は貴様くらいのものだ。部下に誤った知識を教え込まないように」"

[[dialogue]]
speaker = "ヴィーナス"
# 「パパの子供が産みたいって、そんなに不自然なことかしら？」
line = "「パパの子供が産みたいって、そんなに不自然なことかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「一番近くにいる男子で、それがこれだけかっこいいんだから、自然な成り行きだと思うのだけれど」
line = "「一番近くにいる男子で、それがこれだけかっこいいんだから、自然な成り行きだと思うのだけれど」"

[[dialogue]]
speaker = "セドナ"
# 「普通は遺伝的に忌避感を覚えるようだぞ。貴様の場合は、出自も親の血統も特殊だろうから、あまりそういう影響を受けなかったのかもしれないが」
line = "「普通は遺伝的に忌避感を覚えるようだぞ。貴様の場合は、出自も親の血統も特殊だろうから、あまりそういう影響を受けなかったのかもしれないが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う～～ん、よくわからないわ！　ネビュラってお堅いのね」
line = "「う～～ん、よくわからないわ！　ネビュラってお堅いのね」"

[[dialogue]]
speaker = "unk"
# 『そういう問題か？』とは思ったものの、俺は口をつぐむことを選択した。
line = "『そういう問題か？』とは思ったものの、俺は口をつぐむことを選択した。"

[[dialogue]]
speaker = "unk"
# なにも地雷原で切腹を始める必要はない。
line = "なにも地雷原で切腹を始める必要はない。"

[[dialogue]]
speaker = "リーリア"
# 「あ……あ、あぁぁ……？　あの、えっと、ドッキリとかではなく？　もしかしてこれが、脳を破壊されるって奴なんですかぁ！？」
line = "「あ……あ、あぁぁ……？　あの、えっと、ドッキリとかではなく？　もしかしてこれが、脳を破壊されるって奴なんですかぁ！？」"

[[dialogue]]
speaker = "unk"
# へなへなとその場に崩れ落ちるリーリア。
line = "へなへなとその場に崩れ落ちるリーリア。"

[[dialogue]]
speaker = "unk"
# 無力な先輩ですまない……。
line = "無力な先輩ですまない……。"

[[dialogue]]
speaker = "アナ"
# 「強く生きてください。あと、入れないので入り口でしゃがみ込まないように、リーリアさん」
line = "「強く生きてください。あと、入れないので入り口でしゃがみ込まないように、リーリアさん」"

[[dialogue]]
speaker = "リーリア"
# 「うわあああああああん！！　アナちゃんがいじめたぁぁぁぁぁ！！」
line = "「うわあああああああん！！　アナちゃんがいじめたぁぁぁぁぁ！！」"

[[dialogue]]
speaker = "アナ"
# 「はぁ～～～、やれやれ。いい加減、どうにかしてください会長。あと、なんで前会長は半裸姿なんですか」
line = "「はぁ～～～、やれやれ。いい加減、どうにかしてください会長。あと、なんで前会長は半裸姿なんですか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「失礼ね！　これは水着よ！」
line = "「失礼ね！　これは水着よ！」"

[[dialogue]]
speaker = "セドナ"
# （帰りたい……）
line = "（帰りたい……）"

[[dialogue]]
speaker = "unk"
# 完全にカオスと化してしまった星徒会室を沈静化するのに、それから１時間もの時間を要するのだった。
line = "完全にカオスと化してしまった星徒会室を沈静化するのに、それから１時間もの時間を要するのだった。"
