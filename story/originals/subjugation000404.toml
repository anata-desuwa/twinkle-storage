[[dialogue]]
speaker = "unk"
# １週間後、準備を終えた俺達は学園のハロウィンパーティー当日を迎えた。
line = "１週間後、準備を終えた俺達は学園のハロウィンパーティー当日を迎えた。"

[[dialogue]]
speaker = "セナリィ"
# 「トリックオアトリート♪　さぁさ、寄ってらっしゃい、見てらっしゃい！」
line = "「トリックオアトリート♪　さぁさ、寄ってらっしゃい、見てらっしゃい！」"

[[dialogue]]
speaker = "セナリィ"
# 「学園の名パティシエ、桜十路サランの手による、ここでしか食べられない、ハロウィン特製カップケーキの販売ですわ～！」
line = "「学園の名パティシエ、桜十路サランの手による、ここでしか食べられない、ハロウィン特製カップケーキの販売ですわ～！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「トリックオアトリート～♪　お１つ５００テルスになります～。いかがですか～？」
line = "「トリックオアトリート～♪　お１つ５００テルスになります～。いかがですか～？」"

[[dialogue]]
speaker = "サラン"
# 「は～い、お１つですね～♪　ありがとうございます～♪　どうぞ～♪」
line = "「は～い、お１つですね～♪　ありがとうございます～♪　どうぞ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや～、繁盛してるね～。さすがは桜十路先輩のネームバリュー。お菓子の評判もどんどん広まって、飛ぶように売れていくよ」
line = "「いや～、繁盛してるね～。さすがは桜十路先輩のネームバリュー。お菓子の評判もどんどん広まって、飛ぶように売れていくよ」"

[[dialogue]]
speaker = "セナリィ"
# 「ウフッ<emoji=heart04>　ウフフフッ<emoji=heart04>　笑いが止まらないとは、まさにこのことですわぁ～♪」
line = "「ウフッ<emoji=heart04>　ウフフフッ<emoji=heart04>　笑いが止まらないとは、まさにこのことですわぁ～♪」"

[[dialogue]]
speaker = "サラン"
# 「みんなもお菓子食べて、美味しいって言ってくれて、ふわふわ～♪」
line = "「みんなもお菓子食べて、美味しいって言ってくれて、ふわふわ～♪」"

[[dialogue]]
speaker = "サラン"
# 「これでセナリィちゃんも、ハロウィンの仮装ができてたら、もっとよかったんだけど～……」
line = "「これでセナリィちゃんも、ハロウィンの仮装ができてたら、もっとよかったんだけど～……」"

[[dialogue]]
speaker = "セナリィ"
# 「気にかけてくださり、ありがとうございますわ、サラン様。残念ながら、衣装は２着までが予算の限界でしたの」
line = "「気にかけてくださり、ありがとうございますわ、サラン様。残念ながら、衣装は２着までが予算の限界でしたの」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「全く、私のじゃなく自分のを用意すればよかったのに……まあ、もしかすると、その分の予算を別のところに回したのかもしれないけど」
line = "「全く、私のじゃなく自分のを用意すればよかったのに……まあ、もしかすると、その分の予算を別のところに回したのかもしれないけど」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふふ、それは秘密ですわ♪」
line = "「ふふふ、それは秘密ですわ♪」"

[[dialogue]]
speaker = "セナリィ"
# 「――おっと、そろそろ時間ですわね。マイン、サラン様。休憩に行ってきていいですわよ」
line = "「――おっと、そろそろ時間ですわね。マイン、サラン様。休憩に行ってきていいですわよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？　いや、お客さんはまだ沢山来てるから、もう少し落ち着いてからの方がいいんじゃない？」
line = "「え？　いや、お客さんはまだ沢山来てるから、もう少し落ち着いてからの方がいいんじゃない？」"

[[dialogue]]
speaker = "セナリィ"
# 「別にこれくらい、戦場に飛び交う銃弾を捌くことに比べたら、どうってことありませんわ」
line = "「別にこれくらい、戦場に飛び交う銃弾を捌くことに比べたら、どうってことありませんわ」"

[[dialogue]]
speaker = "サラン"
# 「それじゃあ、セナリィちゃん、会長ちゃん。せっかくだしサランたち、パーティー会場の中を見てまわってくるね～」
line = "「それじゃあ、セナリィちゃん、会長ちゃん。せっかくだしサランたち、パーティー会場の中を見てまわってくるね～」"

[[dialogue]]
speaker = "サラン"
# 「行こっ♪　マインちゃん」
line = "「行こっ♪　マインちゃん」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ、ちょっと、桜十路先輩！？　手を引っ張ってどこに――」
line = "「あっ、ちょっと、桜十路先輩！？　手を引っ張ってどこに――」"

[[dialogue]]
speaker = "セナリィ"
# 「――さて。会長様には、宣伝の看板を持って会場内を周り、お客様の呼び込みをお願いしたいのですけれど、よろしいかしら？」
line = "「――さて。会長様には、宣伝の看板を持って会場内を周り、お客様の呼び込みをお願いしたいのですけれど、よろしいかしら？」"

[[dialogue]]
speaker = "unk"
# 任された。行ってくるよ
line = "任された。行ってくるよ"

[[dialogue]]
speaker = "ネーゼマイン"
# （なんか、桜十路先輩に引っ張られるまま付いてきちゃったけど……）
line = "（なんか、桜十路先輩に引っ張られるまま付いてきちゃったけど……）"

[[dialogue]]
speaker = "サラン"
# 「うん、ここら辺なら大丈夫かな。――ねぇ、マインちゃん、お願いがあるんだっ」
line = "「うん、ここら辺なら大丈夫かな。――ねぇ、マインちゃん、お願いがあるんだっ」"

[[dialogue]]
speaker = "サラン"
# 「サラン、会長ちゃんに悪戯をして、驚かせたいの～！」
line = "「サラン、会長ちゃんに悪戯をして、驚かせたいの～！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？　桜十路先輩がですか？　なんでそんな……」
line = "「え？　桜十路先輩がですか？　なんでそんな……」"

[[dialogue]]
speaker = "サラン"
# 「だって、せっかくのハロウィンパーティーだし～♪　やっぱり、トリックオアトリートを楽しみたいじゃない？」
line = "「だって、せっかくのハロウィンパーティーだし～♪　やっぱり、トリックオアトリートを楽しみたいじゃない？」"

[[dialogue]]
speaker = "サラン"
# 「でもサラン、悪戯らしい悪戯って全然したことがないんだ～。だから、マインちゃんにやり方を教えて欲しいの～！」
line = "「でもサラン、悪戯らしい悪戯って全然したことがないんだ～。だから、マインちゃんにやり方を教えて欲しいの～！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……あ～、なるほど……そういうことですか」
line = "「……あ～、なるほど……そういうことですか」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「桜十路先輩、それ、セナリィの入れ知恵ですか？」
line = "「桜十路先輩、それ、セナリィの入れ知恵ですか？」"

[[dialogue]]
speaker = "サラン"
# 「ええっ！？　なんでわかったの～！？」
line = "「ええっ！？　なんでわかったの～！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あはは、反応が正直者ですね。そりゃあ分かりますよ～」
line = "「あはは、反応が正直者ですね。そりゃあ分かりますよ～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィが休憩を出すタイミングが不自然でしたし、桜十路先輩も示し合わせたように私を連れ出しましたから」
line = "「セナリィが休憩を出すタイミングが不自然でしたし、桜十路先輩も示し合わせたように私を連れ出しましたから」"

[[dialogue]]
speaker = "サラン"
# 「……あのね、実は、サランがセナリィちゃんに相談したの。どうしたらマインちゃんと仲良くなれるのかって……」
line = "「……あのね、実は、サランがセナリィちゃんに相談したの。どうしたらマインちゃんと仲良くなれるのかって……」"

[[dialogue]]
speaker = "サラン"
# 「ほら、マインちゃんとセナリィちゃんは、すごく仲が良いでしょう？」
line = "「ほら、マインちゃんとセナリィちゃんは、すごく仲が良いでしょう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「う～ん、セナリィとは仕事仲間っていうか……まぁ、属性が似てるって意味では合ってますけど……」
line = "「う～ん、セナリィとは仕事仲間っていうか……まぁ、属性が似てるって意味では合ってますけど……」"

[[dialogue]]
speaker = "サラン"
# 「この間、マインちゃんと連絡先も交換したけど、セナリィちゃんと比べると、なんだか距離を感じるな～って……」
line = "「この間、マインちゃんと連絡先も交換したけど、セナリィちゃんと比べると、なんだか距離を感じるな～って……」"

[[dialogue]]
speaker = "サラン"
# 「セナリィちゃんにそのことを言ったら、一緒に『悪戯したらいいんじゃないか』って教えてもらったの～」
line = "「セナリィちゃんにそのことを言ったら、一緒に『悪戯したらいいんじゃないか』って教えてもらったの～」"

[[dialogue]]
speaker = "サラン"
# 「マインちゃんなら、ハロウィンに必ず、会長ちゃんへの悪戯を仕掛けるだろうからって！」
line = "「マインちゃんなら、ハロウィンに必ず、会長ちゃんへの悪戯を仕掛けるだろうからって！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィのやつぅ……これは後でお仕置き案件だな～」
line = "「セナリィのやつぅ……これは後でお仕置き案件だな～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ええと……桜十路先輩、期待に応えられなくて申し訳ないですが、悪戯の準備なんて別にしてなくてですね――」
line = "「ええと……桜十路先輩、期待に応えられなくて申し訳ないですが、悪戯の準備なんて別にしてなくてですね――」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　これを使って悪戯をするんじゃないの？」
line = "「ぽよ？　これを使って悪戯をするんじゃないの？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「って、それは私のトラップ爆弾セット！？　バスケットに入ってたはずなのに……いつの間にか中身がなくなってる！？」
line = "「って、それは私のトラップ爆弾セット！？　バスケットに入ってたはずなのに……いつの間にか中身がなくなってる！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「セナリィの仕業か……！　あんにゃろ～……」
line = "「セナリィの仕業か……！　あんにゃろ～……」"

[[dialogue]]
speaker = "サラン"
# 「うん、セナリィちゃんから渡されたの～。『会長専用』って書いてあるから、これで会長ちゃんに悪戯するってことで間違いないよね？」
line = "「うん、セナリィちゃんから渡されたの～。『会長専用』って書いてあるから、これで会長ちゃんに悪戯するってことで間違いないよね？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いやいや、だからって無理して悪戯に付き合う必要はないですよ？　準備しといてなんですけど、悪戯っていいことではないですし……」
line = "「いやいや、だからって無理して悪戯に付き合う必要はないですよ？　準備しといてなんですけど、悪戯っていいことではないですし……」"

[[dialogue]]
speaker = "サラン"
# 「無理なんてしてないよ？　サラン、悪戯とかしたことなかったから、楽しみでワクワクしてるんだ～♪」
line = "「無理なんてしてないよ？　サラン、悪戯とかしたことなかったから、楽しみでワクワクしてるんだ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「桜十路先輩。１度落ち着いて、よく考えた方が……」
line = "「桜十路先輩。１度落ち着いて、よく考えた方が……」"

[[dialogue]]
speaker = "サラン"
# 「いいから、いいから♪　早くいこ～♪」
line = "「いいから、いいから♪　早くいこ～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちょっ……待ってください！　桜十路先輩！」
line = "「ちょっ……待ってください！　桜十路先輩！」"

[[dialogue]]
speaker = "サラン"
# 「あっ、会長ちゃん、見つけた～♪　こっち見てないから、気づかれてはいないよね？　……よ～し！」
line = "「あっ、会長ちゃん、見つけた～♪　こっち見てないから、気づかれてはいないよね？　……よ～し！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「桜十路先輩、待った待った！　トラップ爆弾にはいくつか種類があって……あぁ～！」
line = "「桜十路先輩、待った待った！　トラップ爆弾にはいくつか種類があって……あぁ～！」"

[[dialogue]]
speaker = "サラン"
# 「え～い♪」
line = "「え～い♪」"

[[dialogue]]
speaker = "unk"
# ん！？　なんかお尻にくっ付いた！？
line = "ん！？　なんかお尻にくっ付いた！？"

[[dialogue]]
speaker = "サラン"
# 「わぁ～♪　白い爆弾がお尻にくっ付いてる～♪　ウサギちゃんの尻尾みたいで可愛い～♪」
line = "「わぁ～♪　白い爆弾がお尻にくっ付いてる～♪　ウサギちゃんの尻尾みたいで可愛い～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「白いのはトリモチ爆弾ですね……一定時間経つと、粘着力が弱まって外れる仕組みで――」
line = "「白いのはトリモチ爆弾ですね……一定時間経つと、粘着力が弱まって外れる仕組みで――」"

[[dialogue]]
speaker = "サラン"
# 「え～い♪」
line = "「え～い♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「って、また投げてる！？　ちゃんと爆弾の仕組みを理解して、タイミングを計らないと、せっかくの面白い効果が……！」
line = "「って、また投げてる！？　ちゃんと爆弾の仕組みを理解して、タイミングを計らないと、せっかくの面白い効果が……！」"

[[dialogue]]
speaker = "unk"
# なんか煙が！？　……声が高くなった！？
line = "なんか煙が！？　……声が高くなった！？"

[[dialogue]]
speaker = "サラン"
# 「あ～♪　会長ちゃんの声が変になってる～♪」
line = "「あ～♪　会長ちゃんの声が変になってる～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それはヘリウム爆弾で……本当は誰かと話している時に悪戯すると、面白くなるやつなんです……！」
line = "「それはヘリウム爆弾で……本当は誰かと話している時に悪戯すると、面白くなるやつなんです……！」"

[[dialogue]]
speaker = "サラン"
# 「じゃあ、次は～」
line = "「じゃあ、次は～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ああもう！　桜十路先輩、ちゃんと使い方教えますから、こっちに渡してください！」
line = "「……ああもう！　桜十路先輩、ちゃんと使い方教えますから、こっちに渡してください！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いいですか？　この爆弾は、会長に向かって投げるんじゃなくて、こう使うんですよ……それっ！」
line = "「いいですか？　この爆弾は、会長に向かって投げるんじゃなくて、こう使うんですよ……それっ！」"

[[dialogue]]
speaker = "サラン"
# 「会場の上に向かって……？　なんか雲ができてる……？　あっ、雨が降ってきた～！」
line = "「会場の上に向かって……？　なんか雲ができてる……？　あっ、雨が降ってきた～！」"

[[dialogue]]
speaker = "unk"
# うわっ！？　なんで俺にだけ雨が～！？
line = "うわっ！？　なんで俺にだけ雨が～！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひっ！　会長ってば、慌ててる慌ててる♪　今投げたのは、雨雲爆弾で、会長を追跡して一定時間雨を降らす爆弾なんですよ～」
line = "「にひひっ！　会長ってば、慌ててる慌ててる♪　今投げたのは、雨雲爆弾で、会長を追跡して一定時間雨を降らす爆弾なんですよ～」"

[[dialogue]]
speaker = "サラン"
# 「わ～、すご～い♪　面白～い♪　他にはどんな爆弾があるの～？」
line = "「わ～、すご～い♪　面白～い♪　他にはどんな爆弾があるの～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「やれやれ、仕方ないですね。他には～♪」
line = "「やれやれ、仕方ないですね。他には～♪」"

[[dialogue]]
speaker = "unk"
# 見～つ～け～た～ぞ～！
line = "見～つ～け～た～ぞ～！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ」
line = "「あ」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんにバレちゃった～♪」
line = "「会長ちゃんにバレちゃった～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「逃げますよ！　桜十路先輩！」
line = "「逃げますよ！　桜十路先輩！」"

[[dialogue]]
speaker = "サラン"
# 「は～い♪　わかった～！」
line = "「は～い♪　わかった～！」"

[[dialogue]]
speaker = "unk"
# こらぁぁぁ！　２人とも、待てーーー！
line = "こらぁぁぁ！　２人とも、待てーーー！"

[[dialogue]]
speaker = "unk"
# その後、罠爆弾を駆使しながら、ネーゼマインとサランは逃げ切ることに成功した。
line = "その後、罠爆弾を駆使しながら、ネーゼマインとサランは逃げ切ることに成功した。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まさか、私が桜十路先輩の手を引っ張って、逃げることになるとは……」
line = "「まさか、私が桜十路先輩の手を引っ張って、逃げることになるとは……」"

[[dialogue]]
speaker = "サラン"
# 「なんとか逃げ切ったね～♪　あ～、悪戯面白かった～♪」
line = "「なんとか逃げ切ったね～♪　あ～、悪戯面白かった～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……先輩は、こういうことはしたがらないって思ってましたよ」
line = "「……先輩は、こういうことはしたがらないって思ってましたよ」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　そんなことないよ～？　マインちゃんが言ってたみたいに、周りからよくダメだって止められちゃうだけで……」
line = "「ぽよ？　そんなことないよ～？　マインちゃんが言ってたみたいに、周りからよくダメだって止められちゃうだけで……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、それはよくわかるかも。先輩、ふわふわしてて危なっかしいっていうか……」
line = "「あ～、それはよくわかるかも。先輩、ふわふわしてて危なっかしいっていうか……」"

[[dialogue]]
speaker = "サラン"
# 「あ～。それ、よく言われる～♪」
line = "「あ～。それ、よく言われる～♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「よく言われるって……にひっ……にひひっ♪」
line = "「よく言われるって……にひっ……にひひっ♪」"

[[dialogue]]
speaker = "サラン"
# 「えへっ……えへへっ♪」
line = "「えへっ……えへへっ♪」"

[[dialogue]]
speaker = "unk"
# なんだかおかしくなって、笑い合ってしまう２人なのだった。
line = "なんだかおかしくなって、笑い合ってしまう２人なのだった。"
