[[dialogue]]
speaker = "unk"
# 第２話,妄想メルトダウン,P
line = "第２話,妄想メルトダウン,P"

[[dialogue]]
speaker = "unk"
# これはメルエルと恋人同士になってすぐの頃に伝えられた話──
line = "これはメルエルと恋人同士になってすぐの頃に伝えられた話──"

[[dialogue]]
speaker = "メルエル"
# 「会長くんとお付き合いできるようになったから、その……思い切って言っちゃうんだけど……」
line = "「会長くんとお付き合いできるようになったから、その……思い切って言っちゃうんだけど……」"

[[dialogue]]
speaker = "メルエル"
# 「私ね。よく妄想を始めちゃう癖があるの……！　考え事をし始めたら、そのままこう、意識が旅立っちゃうっていうか……！」
line = "「私ね。よく妄想を始めちゃう癖があるの……！　考え事をし始めたら、そのままこう、意識が旅立っちゃうっていうか……！」"

[[dialogue]]
speaker = "メルエル"
# 「キミと１０年も会えなかったからかな、色んな事を想像するのが癖になっちゃってて……」
line = "「キミと１０年も会えなかったからかな、色んな事を想像するのが癖になっちゃってて……」"

[[dialogue]]
speaker = "メルエル"
# 「だから、ぼーっとしてたら肩を揺すってくれていいからね。お願い！」
line = "「だから、ぼーっとしてたら肩を揺すってくれていいからね。お願い！」"

[[dialogue]]
speaker = "unk"
# 打ち明けられた当時こそよくわからなかったが、今となっては慣れっこだ。
line = "打ち明けられた当時こそよくわからなかったが、今となっては慣れっこだ。"

[[dialogue]]
speaker = "unk"
# というより、俺もメルエルの妄想が始まるのを楽しみにしている節があって……
line = "というより、俺もメルエルの妄想が始まるのを楽しみにしている節があって……"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、お仕事お疲れ様♪　コーヒー淹れてきたよ～」
line = "「会長くん、お仕事お疲れ様♪　コーヒー淹れてきたよ～」"

[[dialogue]]
speaker = "unk"
# ありがとう、メルエル
line = "ありがとう、メルエル"

[[dialogue]]
speaker = "メルエル"
# 「ふふ～っ……えへへへ<emoji=heart04>」
line = "「ふふ～っ……えへへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺の顔、何かついてる？
line = "俺の顔、何かついてる？"

[[dialogue]]
speaker = "メルエル"
# 「あっ、ううん、そんなことないよ！　その、コーヒー片手に資料を読むキミもかっこいいなぁ～……って」
line = "「あっ、ううん、そんなことないよ！　その、コーヒー片手に資料を読むキミもかっこいいなぁ～……って」"

[[dialogue]]
speaker = "メルエル"
# 「あ、何だか恥ずかしいこと言っちゃってるね、私……！」
line = "「あ、何だか恥ずかしいこと言っちゃってるね、私……！」"

[[dialogue]]
speaker = "メルエル"
# 「お仕事の邪魔しちゃってごめんねっ。席外してた方がいいかな？」
line = "「お仕事の邪魔しちゃってごめんねっ。席外してた方がいいかな？」"

[[dialogue]]
speaker = "unk"
# メルエルには側にいてほしい
line = "メルエルには側にいてほしい"

[[dialogue]]
speaker = "unk"
# そんなことないよ
line = "そんなことないよ"

[[dialogue]]
speaker = "メルエル"
# 「うんっ。ありがとう、じゃあ近くにいるね」
line = "「うんっ。ありがとう、じゃあ近くにいるね」"

[[dialogue]]
speaker = "メルエル"
# 「──退屈？　ううん、そんなことないよ！」
line = "「──退屈？　ううん、そんなことないよ！」"

[[dialogue]]
speaker = "メルエル"
# （大好きなキミと一緒にいられるんだもん、退屈なわけないよー……<emoji=heart04>）
line = "（大好きなキミと一緒にいられるんだもん、退屈なわけないよー……<emoji=heart04>）"

[[dialogue]]
speaker = "メルエル"
# （でもこうやってのどかな休日を過ごすの、久しぶりだなあ。最近、出動要請も多かったし）
line = "（でもこうやってのどかな休日を過ごすの、久しぶりだなあ。最近、出動要請も多かったし）"

[[dialogue]]
speaker = "メルエル"
# （リクリエの危機が過ぎ去ったら、毎日を平和に過ごせるようになるのかな。そうなったら素敵だなー♪）
line = "（リクリエの危機が過ぎ去ったら、毎日を平和に過ごせるようになるのかな。そうなったら素敵だなー♪）"

[[dialogue]]
speaker = "メルエル"
# （ううん、平和な未来のために私たちは戦ってるんだもん。頑張らなきゃ……！）
line = "（ううん、平和な未来のために私たちは戦ってるんだもん。頑張らなきゃ……！）"

[[dialogue]]
speaker = "メルエル"
# （世界が平和になって……私たちは学園を卒業して、結婚して……一緒のお家に住んで……）
line = "（世界が平和になって……私たちは学園を卒業して、結婚して……一緒のお家に住んで……）"

[[dialogue]]
speaker = "メルエル"
# （私はお料理を作りながら、会長くんがお仕事から帰ってくるのを待ってー……あ、その未来、すっごく素敵かも……！）
line = "（私はお料理を作りながら、会長くんがお仕事から帰ってくるのを待ってー……あ、その未来、すっごく素敵かも……！）"

[[dialogue]]
speaker = "メルエル"
# 「ふんふん、ふ～んっ♪　今日は会長くんが早く帰ってくる日～♪」
line = "「ふんふん、ふ～んっ♪　今日は会長くんが早く帰ってくる日～♪」"

[[dialogue]]
speaker = "メルエル"
# 「お仕事で疲れてるだろうし、会長くんの大好きなアイドル衣装でお出迎えしちゃお～っと♪」
line = "「お仕事で疲れてるだろうし、会長くんの大好きなアイドル衣装でお出迎えしちゃお～っと♪」"

[[dialogue]]
speaker = "メルエル"
# 「学生の頃の服だから恥ずかしいけど、これを着たら会長くん、すっごく喜んでくれるんだよねっ<emoji=heart04>」
line = "「学生の頃の服だから恥ずかしいけど、これを着たら会長くん、すっごく喜んでくれるんだよねっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「夕ご飯の準備もばっちり、なんだけど……ちょっと作りすぎちゃったかなぁ？」
line = "「夕ご飯の準備もばっちり、なんだけど……ちょっと作りすぎちゃったかなぁ？」"

[[dialogue]]
speaker = "メルエル"
# 「あ、リノお義母さんも呼んじゃおうかな！　ご飯は賑やかなのが一番だし！」
line = "「あ、リノお義母さんも呼んじゃおうかな！　ご飯は賑やかなのが一番だし！」"

[[dialogue]]
speaker = "メルエル"
# 「ふふ～。まだかな、まだかなっ……会長くん、早く帰ってこないかなー……♪」
line = "「ふふ～。まだかな、まだかなっ……会長くん、早く帰ってこないかなー……♪」"

[[dialogue]]
speaker = "unk"
# ただいま、メルエル
line = "ただいま、メルエル"

[[dialogue]]
speaker = "メルエル"
# 「あっ──お帰りっ、会長くん！　お疲れ様っ！」
line = "「あっ──お帰りっ、会長くん！　お疲れ様っ！」"

[[dialogue]]
speaker = "unk"
# また『会長くん』って呼んでる
line = "また『会長くん』って呼んでる"

[[dialogue]]
speaker = "メルエル"
# 「あっ、ご、ごめんねっ……学生の頃の癖が抜けなくって……！」
line = "「あっ、ご、ごめんねっ……学生の頃の癖が抜けなくって……！」"

[[dialogue]]
speaker = "メルエル"
# 「えっと……お、お帰りなさい、あなたっ<emoji=heart04>」
line = "「えっと……お、お帰りなさい、あなたっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「あ、うんっ……この衣装、変じゃないかな。これ着るとあなたが喜んでくれるから……えへへ<emoji=heart04>」
line = "「あ、うんっ……この衣装、変じゃないかな。これ着るとあなたが喜んでくれるから……えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「あ、だ、ダメだよぉ<emoji=heart04>　チューされると嬉しくなって……もっとしたいって思っちゃう。お料理冷めちゃうし……後にしよ？」
line = "「あ、だ、ダメだよぉ<emoji=heart04>　チューされると嬉しくなって……もっとしたいって思っちゃう。お料理冷めちゃうし……後にしよ？」"

[[dialogue]]
speaker = "メルエル"
# 「ぁ──んんっ……ちゅっ<emoji=heart04>　んちゅっ……ちゅぅっ……でも、強引なあなたも、好きっ……<emoji=heart04>」
line = "「ぁ──んんっ……ちゅっ<emoji=heart04>　んちゅっ……ちゅぅっ……でも、強引なあなたも、好きっ……<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「えへへへへぇ～～<emoji=heart04>　メルトしちゃうよぉ……<emoji=heart04>」
line = "「えへへへへぇ～～<emoji=heart04>　メルトしちゃうよぉ……<emoji=heart04>」"

[[dialogue]]
speaker = "リノ"
# 「ね、ねえクロト？　メルエルちゃんどうしちゃったの……？　さっきからぽやや～んってしてるけど……」
line = "「ね、ねえクロト？　メルエルちゃんどうしちゃったの……？　さっきからぽやや～んってしてるけど……」"

[[dialogue]]
speaker = "unk"
# 可愛いよね
line = "可愛いよね"

[[dialogue]]
speaker = "リノ"
# 「確かに可愛らしいけれど……お、起こしてあげた方がいいんじゃないかしら～？」
line = "「確かに可愛らしいけれど……お、起こしてあげた方がいいんじゃないかしら～？」"

[[dialogue]]
speaker = "メルエル"
# 「ほわほわほわ～ん……<emoji=heart04>　会長くん、しゅきー……<emoji=heart04>」
line = "「ほわほわほわ～ん……<emoji=heart04>　会長くん、しゅきー……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 幸せそうに妄想に浸るメルエルの傍で、俺はその日の仕事をどんどん片付けていった。
line = "幸せそうに妄想に浸るメルエルの傍で、俺はその日の仕事をどんどん片付けていった。"

[[dialogue]]
speaker = "unk"
# メルエルが妄想に描いている以上の幸せを実現してみせる。そのためにリクリエだって退けてみせると、心に誓いながら──
line = "メルエルが妄想に描いている以上の幸せを実現してみせる。そのためにリクリエだって退けてみせると、心に誓いながら──"
