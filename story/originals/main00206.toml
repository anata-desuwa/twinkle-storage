[[dialogue]]
speaker = "unk"
# 第８話,未来の日誌,B
line = "第８話,未来の日誌,B"

[[dialogue]]
speaker = "クロト"
# 「堕天使──それに、守護天使……か」
line = "「堕天使──それに、守護天使……か」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アステラの奥でそんなことがあったなんて……」
line = "「アステラの奥でそんなことがあったなんて……」"

[[dialogue]]
speaker = "unk"
# フィオナから聞いた話は奇妙なものだった。
line = "フィオナから聞いた話は奇妙なものだった。"

[[dialogue]]
speaker = "unk"
# 強く汚染されたアステラ。最奥に佇んでいた堕天使。そして彼女から託された謎のアイテム……。
line = "強く汚染されたアステラ。最奥に佇んでいた堕天使。そして彼女から託された謎のアイテム……。"

[[dialogue]]
speaker = "フィオナ"
# 「守護天使さまはこれを“主の鍵”と称しておりましたが……その意味までは汲み取れませんでした」
line = "「守護天使さまはこれを“主の鍵”と称しておりましたが……その意味までは汲み取れませんでした」"

[[dialogue]]
speaker = "フィオナ"
# 「この栞の正しい用途は何なのか、どうして私たちに渡したのか……まだわからないことも多く」
line = "「この栞の正しい用途は何なのか、どうして私たちに渡したのか……まだわからないことも多く」"

[[dialogue]]
speaker = "クロト"
# 「普通、読む本がなければ意味のない代物だものな」
line = "「普通、読む本がなければ意味のない代物だものな」"

[[dialogue]]
speaker = "フィオナ"
# 「はい。ひとまず手近な本や教科書に挟んでみましたが、何も起こりませんでした」
line = "「はい。ひとまず手近な本や教科書に挟んでみましたが、何も起こりませんでした」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス。何かわかるか？」
line = "「ヴィーナス。何かわかるか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「んー……守護天使っていうの……どこかで聞いたことがあるような気もするんだけど」
line = "「んー……守護天使っていうの……どこかで聞いたことがあるような気もするんだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナを連れてくればよかったかしら……」
line = "「アナを連れてくればよかったかしら……」"

[[dialogue]]
speaker = "unk"
# ──守護天使。
line = "──守護天使。"

[[dialogue]]
speaker = "unk"
# 彼女らを待ち受けていたマグダレナという堕天使は、自らをそう名乗ったという。
line = "彼女らを待ち受けていたマグダレナという堕天使は、自らをそう名乗ったという。"

[[dialogue]]
speaker = "フィオナ"
# 「それならうちの天使──ルリエルに簡単な話を聞きました。なんでも、天界で祀られている大存在の一柱のようです」
line = "「それならうちの天使──ルリエルに簡単な話を聞きました。なんでも、天界で祀られている大存在の一柱のようです」"

[[dialogue]]
speaker = "クロト"
# 「なるほど……天使よりさらに上の存在、って感じか」
line = "「なるほど……天使よりさらに上の存在、って感じか」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、そんなのがアステラに……？」
line = "「でも、そんなのがアステラに……？」"

[[dialogue]]
speaker = "キリカ"
# 「そこが不審な点ですね。ルリエル様も、その理由までは不明とのことでした」
line = "「そこが不審な点ですね。ルリエル様も、その理由までは不明とのことでした」"

[[dialogue]]
speaker = "フィオナ"
# 「アステラはモンスターの巣窟です。なのでその奥には、ヌシのようなモンスターが待ち構えているのが通例なのですが……」
line = "「アステラはモンスターの巣窟です。なのでその奥には、ヌシのようなモンスターが待ち構えているのが通例なのですが……」"

[[dialogue]]
speaker = "クロト"
# 「アステラの奥、か。確かに、強大なモンスターがいたのは覚えてる……」
line = "「アステラの奥、か。確かに、強大なモンスターがいたのは覚えてる……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういえば、クロトは小さい頃アステラにさらわれたんだっけ」
line = "「そういえば、クロトは小さい頃アステラにさらわれたんだっけ」"

[[dialogue]]
speaker = "フィオナ"
# 「さらわれ……！？　だ、大丈夫だったのですか」
line = "「さらわれ……！？　だ、大丈夫だったのですか」"

[[dialogue]]
speaker = "クロト"
# 「ああ、なんとか。……それこそ助かったのは星騎士のおかげだけど」
line = "「ああ、なんとか。……それこそ助かったのは星騎士のおかげだけど」"

[[dialogue]]
speaker = "クロト"
# 「（俺の『体質』については──語り始めると長いし黙っておこう）」
line = "「（俺の『体質』については──語り始めると長いし黙っておこう）」"

[[dialogue]]
speaker = "キリカ"
# 「不思議なこともあるものですね。ただの人間を、モンスターがアステラに連れ込むなんて……」
line = "「不思議なこともあるものですね。ただの人間を、モンスターがアステラに連れ込むなんて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、確かに不思議よね。フツーその場でパックンチョされておしまいよ！」
line = "「ま、確かに不思議よね。フツーその場でパックンチョされておしまいよ！」"

[[dialogue]]
speaker = "クロト"
# 「そうなってたら、俺はもうここにいないよ」
line = "「そうなってたら、俺はもうここにいないよ」"

[[dialogue]]
speaker = "ニャリオン"
# 「仲間だと思われたのニャン？　そうじゃニャきゃ、上玉としてボスに献上されそうになったのニャン！」
line = "「仲間だと思われたのニャン？　そうじゃニャきゃ、上玉としてボスに献上されそうになったのニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「ニャーリーオン。緋宮会長にとっては冗談ではありませんよ」
line = "「ニャーリーオン。緋宮会長にとっては冗談ではありませんよ」"

[[dialogue]]
speaker = "クロト"
# 「はは……大丈夫。そのトラウマも、最近は乗り越えられたから」
line = "「はは……大丈夫。そのトラウマも、最近は乗り越えられたから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふ、その意気よ。……でもそっか、クロトはアステラの内部を見たことがあるのね」
line = "「ふふ、その意気よ。……でもそっか、クロトはアステラの内部を見たことがあるのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「本当は今日の初出動でどばーん！　とお披露目して、ビックリさせてあげようと思ってたのに」
line = "「本当は今日の初出動でどばーん！　とお披露目して、ビックリさせてあげようと思ってたのに」"

[[dialogue]]
speaker = "クロト"
# 「はは……流星星徒会に倒してもらえてラッキーとも言えるけどね」
line = "「はは……流星星徒会に倒してもらえてラッキーとも言えるけどね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんな弱腰じゃダメよ！　新星と流星は、競い合うライバルでもあるんだから」
line = "「そんな弱腰じゃダメよ！　新星と流星は、競い合うライバルでもあるんだから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトはまだ学園に入ったばかりの、よちよち歩きの星徒会長なんだもの！　実戦でしっかり経験値を貯めなくっちゃ！」
line = "「クロトはまだ学園に入ったばかりの、よちよち歩きの星徒会長なんだもの！　実戦でしっかり経験値を貯めなくっちゃ！」"

[[dialogue]]
speaker = "フィオナ"
# 「……転入一週間でのご着任、ですものね。本当に驚きです」
line = "「……転入一週間でのご着任、ですものね。本当に驚きです」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長は<ruby=スターナイト>星騎士</ruby>としてはルーキー、ということですか」
line = "「緋宮会長は<ruby>星騎士<rt>スターナイト</rt></ruby>としてはルーキー、ということですか」"

[[dialogue]]
speaker = "クロト"
# 「そうなる。もちろん、それにかこつけて腑抜けるつもりはないが」
line = "「そうなる。もちろん、それにかこつけて腑抜けるつもりはないが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、いざとなれば私もサポートするしね♪」
line = "「ま、いざとなれば私もサポートするしね♪」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。大丈夫です、誠実なお人柄なのは……こうして話しているだけでも伝わりますから」
line = "「ふふ。大丈夫です、誠実なお人柄なのは……こうして話しているだけでも伝わりますから」"

[[dialogue]]
speaker = "unk"
# フィオナは偏見なく新会長の俺を受け入れてくれた。
line = "フィオナは偏見なく新会長の俺を受け入れてくれた。"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャーッニャッニャッニャッ！　ならワガハイのほうが先輩なのニャン！　新星会長よ、ニャーを崇め奉るのニャ！」
line = "「ニャーッニャッニャッニャッ！　ならワガハイのほうが先輩なのニャン！　新星会長よ、ニャーを崇め奉るのニャ！」"

[[dialogue]]
speaker = "キリカ"
# 「緋宮さま、失礼しました。これの言うことはお気になさらず」
line = "「緋宮さま、失礼しました。これの言うことはお気になさらず」"

[[dialogue]]
speaker = "ニャリオン"
# 「い、いでででで！　ニャーを引っ張って伸ばすのはやめるニャン！」
line = "「い、いでででで！　ニャーを引っ張って伸ばすのはやめるニャン！」"

[[dialogue]]
speaker = "unk"
# キリカさんにお仕置きされているニャリオン。
line = "キリカさんにお仕置きされているニャリオン。"

[[dialogue]]
speaker = "unk"
# フィオナも気に留めていないのを見ると、普段の光景らしかった。
line = "フィオナも気に留めていないのを見ると、普段の光景らしかった。"

[[dialogue]]
speaker = "キリカ"
# 「お話を戻しますと。こちらの栞ですが、星術による分析をかけても目立った情報は得られませんでした」
line = "「お話を戻しますと。こちらの栞ですが、星術による分析をかけても目立った情報は得られませんでした」"

[[dialogue]]
speaker = "キリカ"
# 「わかったのは、ただ──まとっている白き光がまったく未知のものであるということだけです」
line = "「わかったのは、ただ──まとっている白き光がまったく未知のものであるということだけです」"

[[dialogue]]
speaker = "unk"
# 厳かな光をたたえる栞。
line = "厳かな光をたたえる栞。"

[[dialogue]]
speaker = "unk"
# ただ、少なくとも禍々しいオーラを感じるものではない。
line = "ただ、少なくとも禍々しいオーラを感じるものではない。"

[[dialogue]]
speaker = "マグダレナ"
# 『これこそ主の鍵──<ruby=しおり>栞</ruby>です。これを──ミコ……に……』
line = "『これこそ主の鍵──<ruby>栞<rt>しおり</rt></ruby>です。これを──ミコ……に……』"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、とりあえずいじくってみればいいのよ！　もしかしたらジャキンジャキンって変身するかもしれないし！」
line = "「ま、とりあえずいじくってみればいいのよ！　もしかしたらジャキンジャキンって変身するかもしれないし！」"

[[dialogue]]
speaker = "unk"
# 俺は試しに栞を拾い上げてみる。
line = "俺は試しに栞を拾い上げてみる。"

[[dialogue]]
speaker = "クロト"
# 「何も起こらないな……」
line = "「何も起こらないな……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「裏面とかは？」
line = "「裏面とかは？」"

[[dialogue]]
speaker = "クロト"
# 「ないな。高級そうな栞には見えるけど」
line = "「ないな。高級そうな栞には見えるけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「流星市国に神社なんてないわよね？」
line = "「流星市国に神社なんてないわよね？」"

[[dialogue]]
speaker = "フィオナ"
# 「ありませんね。教皇庁の管理する区域ですから……」
line = "「ありませんね。教皇庁の管理する区域ですから……」"

[[dialogue]]
speaker = "ニャリオン"
# 「でもニャ、都内の神社ニャら一時間も経たずに行けるはずニャン」
line = "「でもニャ、都内の神社ニャら一時間も経たずに行けるはずニャン」"

[[dialogue]]
speaker = "キリカ"
# 「しかし、守護天使さま──というのが神社におわすものとも考えがたいですね」
line = "「しかし、守護天使さま──というのが神社におわすものとも考えがたいですね」"

[[dialogue]]
speaker = "クロト"
# 「確かに……この栞、どうやって使うものなんだろうな」
line = "「確かに……この栞、どうやって使うものなんだろうな」"

[[dialogue]]
speaker = "unk"
# 普通に考えるなら、何らかの本に挟むものだが。
line = "普通に考えるなら、何らかの本に挟むものだが。"

[[dialogue]]
speaker = "unk"
# 巫女に栞──どこか意味深な二つの言葉、その符号……
line = "巫女に栞──どこか意味深な二つの言葉、その符号……"

[[dialogue]]
speaker = "クロト"
# 「──あっ」
line = "「──あっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　なによ、クロト。私の顔をじーっと見たりして」
line = "「？　なによ、クロト。私の顔をじーっと見たりして」"

[[dialogue]]
speaker = "クロト"
# 「不思議な栞にふさわしいアイテム──ひとつだけ心当たりがあった。ヴィーナス、あの日誌を見せてくれ」
line = "「不思議な栞にふさわしいアイテム──ひとつだけ心当たりがあった。ヴィーナス、あの日誌を見せてくれ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「日誌？　日誌って……ああ、もしかして」
line = "「日誌？　日誌って……ああ、もしかして」"

[[dialogue]]
speaker = "ニャリオン"
# 「日記なんかつけてるニャンか。九浄の娘は意外と乙女なのニャン？」
line = "「日記なんかつけてるニャンか。九浄の娘は意外と乙女なのニャン？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「失礼ね。私はいつでも乙女よ、デブ猫」
line = "「失礼ね。私はいつでも乙女よ、デブ猫」"

[[dialogue]]
speaker = "ニャリオン"
# 「太ってはないニャン！」
line = "「太ってはないニャン！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトが言ってるのって……これよね？」
line = "「クロトが言ってるのって……これよね？」"

[[dialogue]]
speaker = "クロト"
# 「ああ」
line = "「ああ」"

[[dialogue]]
speaker = "フィオナ"
# 「それがヴィーナスさんの日誌──なのですか……？」
line = "「それがヴィーナスさんの日誌──なのですか……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん。て言っても、私が書いてるわけじゃないんだけどね」
line = "「うん。て言っても、私が書いてるわけじゃないんだけどね」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャ……？　自分が書かない日誌なんてあるのかニャン……？」
line = "「ニャニャ……？　自分が書かない日誌なんてあるのかニャン……？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスに頼んで取り出してもらったもの。
line = "ヴィーナスに頼んで取り出してもらったもの。"

[[dialogue]]
speaker = "unk"
# それは──彼女の持つ未来の日誌だった。
line = "それは──彼女の持つ未来の日誌だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 『この『未来の日誌』にしかと記されていたの。魔王クロト──あなたがあの日、新星学園を訪れるってことはね！』
line = "『この『未来の日誌』にしかと記されていたの。魔王クロト──あなたがあの日、新星学園を訪れるってことはね！』"

[[dialogue]]
speaker = "unk"
# あれは日誌といっても、ヴィーナス本人がつけているものではない。
line = "あれは日誌といっても、ヴィーナス本人がつけているものではない。"

[[dialogue]]
speaker = "unk"
# なんでも本人すら十分には理解できていない、謎に包まれた書物のはずで──
line = "なんでも本人すら十分には理解できていない、謎に包まれた書物のはずで──"

[[dialogue]]
speaker = "ヴィーナス"
# 「へ？」
line = "「へ？」"

[[dialogue]]
speaker = "フィオナ"
# 「！　栞が共鳴を示しています！」
line = "「！　栞が共鳴を示しています！」"

[[dialogue]]
speaker = "unk"
# 栞をその日誌に挟んでみる──
line = "栞をその日誌に挟んでみる──"

[[dialogue]]
speaker = "unk"
# すると栞のまとっていた白い光が、とたんにさらなる輝きを見せた。
line = "すると栞のまとっていた白い光が、とたんにさらなる輝きを見せた。"

[[dialogue]]
speaker = "ニャリオン"
# 「九浄の娘は巫女だったのかニャン！？　確かに最近はそんなバイトもあるって聞くニャンが……」
line = "「九浄の娘は巫女だったのかニャン！？　確かに最近はそんなバイトもあるって聞くニャンが……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「バカ、違うわよ！　バイトしてたとかもないし！」
line = "「バカ、違うわよ！　バイトしてたとかもないし！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、ホントにこれに反応するなんて……！」
line = "「でも、ホントにこれに反応するなんて……！」"

[[dialogue]]
speaker = "クロト"
# 「俺の身の回りで、同じ不可思議なアイテムといったらそれだったからな……」
line = "「俺の身の回りで、同じ不可思議なアイテムといったらそれだったからな……」"

[[dialogue]]
speaker = "unk"
# やがて共鳴の光が収まっていく。
line = "やがて共鳴の光が収まっていく。"

[[dialogue]]
speaker = "unk"
# ヴィーナスが急いで日誌の中身を確認すると、さらに超常的なことが起こっていた。
line = "ヴィーナスが急いで日誌の中身を確認すると、さらに超常的なことが起こっていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ページが増えてる」
line = "「……ページが増えてる」"

[[dialogue]]
speaker = "フィオナ"
# 「……そんなことがあるのですか」
line = "「……そんなことがあるのですか」"

[[dialogue]]
speaker = "ニャリオン"
# 「どういう日誌なのニャン？　他人に書かれる日誌なんて聞いたことないニャン……」
line = "「どういう日誌なのニャン？　他人に書かれる日誌なんて聞いたことないニャン……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは必死で増えたページに目を通していた。
line = "ヴィーナスは必死で増えたページに目を通していた。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ！」
line = "「あっ！」"

[[dialogue]]
speaker = "クロト"
# 「どうした？」
line = "「どうした？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「これよ！　わかったわ！　今すぐ塔へ向かうわよ、みんな！」
line = "「これよ！　わかったわ！　今すぐ塔へ向かうわよ、みんな！」"

[[dialogue]]
speaker = "フィオナ"
# 「あっ──ヴィーナスさん！？」
line = "「あっ──ヴィーナスさん！？」"

[[dialogue]]
speaker = "ニャリオン"
