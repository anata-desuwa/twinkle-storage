[[dialogue]]
speaker = "unk"
# 第１話,司書のお姉さん,P
line = "第１話,司書のお姉さん,P"

[[dialogue]]
speaker = "unk"
# 俺が新星学園に転入して数日、御前試合の前のこと――
line = "俺が新星学園に転入して数日、御前試合の前のこと――"

[[dialogue]]
speaker = "ウィステリア"
# 「こんにちは、君が噂の転入生ね。今日のオリエンテーションを担当させてもらう、司書のウィステリアよ」
line = "「こんにちは、君が噂の転入生ね。今日のオリエンテーションを担当させてもらう、司書のウィステリアよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「わざわざ放課後に来てもらって悪いわね。本当なら１年生が入学後に受けるものだけど、このタイミングの転入だから１人で受けてもらうわ」
line = "「わざわざ放課後に来てもらって悪いわね。本当なら１年生が入学後に受けるものだけど、このタイミングの転入だから１人で受けてもらうわ」"

[[dialogue]]
speaker = "unk"
# こちらこそありがとうございます
line = "こちらこそありがとうございます"

[[dialogue]]
speaker = "ウィステリア"
# 「うん、いい返事。じゃあまず基本的なことから」
line = "「うん、いい返事。じゃあまず基本的なことから」"

[[dialogue]]
speaker = "ウィステリア"
# 「<ruby=ディスク>ＤＩＳＣ</ruby>に生徒用のアプリを入れたでしょう？　入館にも本の貸し出しにもアプリでの認証が必要になるから忘れないでね」
line = "「<ruby>ＤＩＳＣ<rt>ディスク</rt></ruby>に生徒用のアプリを入れたでしょう？　入館にも本の貸し出しにもアプリでの認証が必要になるから忘れないでね」"

[[dialogue]]
speaker = "unk"
# すぐに消すことになるかも
line = "すぐに消すことになるかも"

[[dialogue]]
speaker = "ウィステリア"
# 「どういうこと？　……ああ、御前試合ね。何がどうなってそうなったか全く想像できないけど、あの会長に挑むとは大した度胸ね」
line = "「どういうこと？　……ああ、御前試合ね。何がどうなってそうなったか全く想像できないけど、あの会長に挑むとは大した度胸ね」"

[[dialogue]]
speaker = "ウィステリア"
# 「って、君が御前試合を挑まれた方なの？　それは災難だったわね。私もそういう経験にはちょっと覚えが……いえ、何でもないわ」
line = "「って、君が御前試合を挑まれた方なの？　それは災難だったわね。私もそういう経験にはちょっと覚えが……いえ、何でもないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「でもそんなに困った顔してないわね。むしろ前向きっていうか、やる気みなぎるって感じ。ふふっ、面白いわね、君」
line = "「でもそんなに困った顔してないわね。むしろ前向きっていうか、やる気みなぎるって感じ。ふふっ、面白いわね、君」"

[[dialogue]]
speaker = "ウィステリア"
# 「勝てる勝てないは私の口から言うつもりないけど、もし負けて退学することになったら、抗議するの手伝ってあげる」
line = "「勝てる勝てないは私の口から言うつもりないけど、もし負けて退学することになったら、抗議するの手伝ってあげる」"

[[dialogue]]
speaker = "ウィステリア"
# 「あるいは、流星学園に転入し直すのもありかもしれないわね。向こうに知り合いがいるから相談には乗れるわよ」
line = "「あるいは、流星学園に転入し直すのもありかもしれないわね。向こうに知り合いがいるから相談には乗れるわよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「大丈夫、なんとかなるわ。全力で挑むのはもちろんだけど、気負い過ぎないようにね」
line = "「大丈夫、なんとかなるわ。全力で挑むのはもちろんだけど、気負い過ぎないようにね」"

[[dialogue]]
speaker = "ウィステリア"
# 「放課後は自主トレしてるんだっけ？　じゃあオリエンテーションはさくっと終わらせましょうか」
line = "「放課後は自主トレしてるんだっけ？　じゃあオリエンテーションはさくっと終わらせましょうか」"

[[dialogue]]
speaker = "ウィステリア"
# 「本を借りる時はカウンターに持っていって、ピッと。こうしてバーコード読み取ってもらえば貸し出し手続き完了。簡単でしょ？」
line = "「本を借りる時はカウンターに持っていって、ピッと。こうしてバーコード読み取ってもらえば貸し出し手続き完了。簡単でしょ？」"

[[dialogue]]
speaker = "ウィステリア"
# 「パソコンで図書の検索や貸し出し予約をする場合はここをクリックして……はい、こうするの。ＤＩＳＣのアプリからもできるわよ」
line = "「パソコンで図書の検索や貸し出し予約をする場合はここをクリックして……はい、こうするの。ＤＩＳＣのアプリからもできるわよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「それと、星術やリクリエに関する論文、あと新星学園の星騎士が今まで対応した案件のレポートなんかも読めるの」
line = "「それと、星術やリクリエに関する論文、あと新星学園の星騎士が今まで対応した案件のレポートなんかも読めるの」"

[[dialogue]]
speaker = "ウィステリア"
# 「利用する生徒は多くないけど、星徒会長になったらお世話になるかもね」
line = "「利用する生徒は多くないけど、星徒会長になったらお世話になるかもね」"

[[dialogue]]
speaker = "unk"
# ありがとうございました！
line = "ありがとうございました！"

[[dialogue]]
speaker = "ウィステリア"
# 「いえいえ、これも私の仕事ですから」
line = "「いえいえ、これも私の仕事ですから」"

[[dialogue]]
speaker = "ウィステリア"
# 「オリエンテーションはこれで終わりだけど、質問はある？　わからないことがあったら何でも聞いてね」
line = "「オリエンテーションはこれで終わりだけど、質問はある？　わからないことがあったら何でも聞いてね」"

[[dialogue]]
speaker = "unk"
# 手に持ってるその本は……？
line = "手に持ってるその本は……？"

[[dialogue]]
speaker = "ウィステリア"
# 「あ～、これ？　この本は肌身離さず持ってなきゃいけないというか、捨てても勝手に戻ってくるっていうか……」
line = "「あ～、これ？　この本は肌身離さず持ってなきゃいけないというか、捨てても勝手に戻ってくるっていうか……」"

[[dialogue]]
speaker = "ウィステリア"
# 「まぁ、仕事道具みたいなものよ。一応、できるだけ触らないで――」
line = "「まぁ、仕事道具みたいなものよ。一応、できるだけ触らないで――」"

[[dialogue]]
speaker = "モネ"
# 「あわわわっ、本が重くてバランスが……」
line = "「あわわわっ、本が重くてバランスが……」"

[[dialogue]]
speaker = "ウィステリア"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「あたた……無理して本を持ったら危ないって言ってるでしょ、紙屋敷さん……」
line = "「あたた……無理して本を持ったら危ないって言ってるでしょ、紙屋敷さん……」"

[[dialogue]]
speaker = "モネ"
# 「ごめんなさい～っ」
line = "「ごめんなさい～っ」"

[[dialogue]]
speaker = "unk"
# 大丈夫ですか？
line = "大丈夫ですか？"

[[dialogue]]
speaker = "ウィステリア"
# 「あっ、ごめんなさい、下敷きにしてたわね。私は大丈夫だけど君は？　怪我はない？」
line = "「あっ、ごめんなさい、下敷きにしてたわね。私は大丈夫だけど君は？　怪我はない？」"

[[dialogue]]
speaker = "ウィステリア"
# 「……平気？　良かった～。受け止めてくれてありがとう。すぐどくから」
line = "「……平気？　良かった～。受け止めてくれてありがとう。すぐどくから」"

[[dialogue]]
speaker = "ウィステリア"
# 「あっ、近――」
line = "「あっ、近――」"

[[dialogue]]
speaker = "ウィステリア"
# （至近距離で見つめ合う２人……これは出会い？　出会いなの？　いつもの不運かと思ったけどこれはきっかけ？）
line = "（至近距離で見つめ合う２人……これは出会い？　出会いなの？　いつもの不運かと思ったけどこれはきっかけ？）"

[[dialogue]]
speaker = "ウィステリア"
# （転入早々、退学を突き付けられた男子生徒。窮地に立たされた彼を支えるのは、親身になって優しくしてくれる年上のお姉さん……）
line = "（転入早々、退学を突き付けられた男子生徒。窮地に立たされた彼を支えるのは、親身になって優しくしてくれる年上のお姉さん……）"

[[dialogue]]
speaker = "ウィステリア"
# （２人が特別な関係になるのに時間はかからない……）
line = "（２人が特別な関係になるのに時間はかからない……）"

[[dialogue]]
speaker = "ウィステリア"
# （いいえ、生徒とそんな関係になるなんてダメよっ）
line = "（いいえ、生徒とそんな関係になるなんてダメよっ）"

[[dialogue]]
speaker = "ウィステリア"
# （でも教師じゃないし、節度があれば大丈夫……？　年下……ありかしら……？）
line = "（でも教師じゃないし、節度があれば大丈夫……？　年下……ありかしら……？）"

[[dialogue]]
speaker = "モネ"
# 「ウィステリアさん？」
line = "「ウィステリアさん？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ひゃあっ！？」
line = "「ひゃあっ！？」"

[[dialogue]]
speaker = "ウィステリア"
# 「あ、あはは……大丈夫、ぼーっとしてただけ。図書館は静かにしないとよね。それに重かったわよね、ごめんなさい」
line = "「あ、あはは……大丈夫、ぼーっとしてただけ。図書館は静かにしないとよね。それに重かったわよね、ごめんなさい」"

[[dialogue]]
speaker = "ウィステリア"
# 「図書のことでも学園生活のことでも相談に乗るから、歳も近いし声をかけてね」
line = "「図書のことでも学園生活のことでも相談に乗るから、歳も近いし声をかけてね」"

[[dialogue]]
speaker = "ウィステリア"
# 「じゃ、御前試合頑張って！　星徒会長になった君を図書館で待ってるわ！」
line = "「じゃ、御前試合頑張って！　星徒会長になった君を図書館で待ってるわ！」"
