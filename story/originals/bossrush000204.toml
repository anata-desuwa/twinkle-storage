[[dialogue]]
speaker = "梨緒"
# 「その後平行世界デネブに渡った私たちは、女神の上位に位置する創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の存在を知った」
line = "「その後平行世界デネブに渡った私たちは、女神の上位に位置する創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の存在を知った」"

[[dialogue]]
speaker = "梨緒"
# 「その『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』こそ、ジグが言っていた“真なる神”。リクリエを起こそうとする元凶ともいえる存在だった」
line = "「その『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』こそ、ジグが言っていた“真なる神”。リクリエを起こそうとする元凶ともいえる存在だった」"

[[dialogue]]
speaker = "梨緒"
# 「そして次は──女神の神殿」
line = "「そして次は──女神の神殿」"

[[dialogue]]
speaker = "梨緒"
# 「リクリエの使徒・ジグと、私たち星騎士の決着の場所だ」
line = "「リクリエの使徒・ジグと、私たち星騎士の決着の場所だ」"

[[dialogue]]
speaker = "unk"
# 『デネブの極星学園が天界を襲撃し、女神の神殿を破壊しようとしている』『もし女神の神殿が破壊されれば、天使と天界が消滅する』──そう聞いた俺たちは急遽天界に渡った。
line = "『デネブの極星学園が天界を襲撃し、女神の神殿を破壊しようとしている』『もし女神の神殿が破壊されれば、天使と天界が消滅する』──そう聞いた俺たちは急遽天界に渡った。"

[[dialogue]]
speaker = "unk"
# 激闘の末に何とか極星学園を退け、アルタイルの天使たちを守れたかに思えたが……そこにジグが現れた。
line = "激闘の末に何とか極星学園を退け、アルタイルの天使たちを守れたかに思えたが……そこにジグが現れた。"

[[dialogue]]
speaker = "ジグ"
# 『やぁ、こうして会うのは久しぶりだね、星騎士の諸君』
line = "『やぁ、こうして会うのは久しぶりだね、星騎士の諸君』"

[[dialogue]]
speaker = "梨緒"
# 『女神の神殿が揺れて……いや、動いている！？　何をした、ジグ！？』
line = "『女神の神殿が揺れて……いや、動いている！？　何をした、ジグ！？』"

[[dialogue]]
speaker = "ジグ"
# 『神殿の機能をいじって行き先を設定させてもらったんだ』
line = "『神殿の機能をいじって行き先を設定させてもらったんだ』"

[[dialogue]]
speaker = "ジグ"
# 『女神の神殿はもうすぐ──聖庭園に衝突するよ』
line = "『女神の神殿はもうすぐ──聖庭園に衝突するよ』"

[[dialogue]]
speaker = "梨緒"
# 「女神の神殿をぶつけようなんて、大それたことをしたものだ」
line = "「女神の神殿をぶつけようなんて、大それたことをしたものだ」"

[[dialogue]]
speaker = "梨緒"
# 「だがジグの思い通りにはならなかった」
line = "「だがジグの思い通りにはならなかった」"

[[dialogue]]
speaker = "unk"
# ジグは神殿の機能で魔王の力を封じたため、守護天使の力を持つ梨緒が戦った。
line = "ジグは神殿の機能で魔王の力を封じたため、守護天使の力を持つ梨緒が戦った。"

[[dialogue]]
speaker = "梨緒"
# 「私はジグと対峙し、『可能性はない』と言っていた言葉の意味をようやく理解した」
line = "「私はジグと対峙し、『可能性はない』と言っていた言葉の意味をようやく理解した」"

[[dialogue]]
speaker = "梨緒"
# 「ジグは『<ruby=てんき>天機</ruby>の星眼』で、対象の可能性を見ることができたんだ。ジグに勝つには星眼の予測を打ち破る必要があった」
line = "「ジグは『<ruby>天機<rt>てんき</rt></ruby>の星眼』で、対象の可能性を見ることができたんだ。ジグに勝つには星眼の予測を打ち破る必要があった」"

[[dialogue]]
speaker = "梨緒"
# 「私は『因果』の摂理を司る守護天使、《運命》のノルンの力を使い、ジグに対抗した。そして──」
line = "「私は『因果』の摂理を司る守護天使、《運命》のノルンの力を使い、ジグに対抗した。そして──」"
