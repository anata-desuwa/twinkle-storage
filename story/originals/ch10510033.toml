[[dialogue]]
speaker = "unk"
# 第３話,公認の仲,P
line = "第３話,公認の仲,P"

[[dialogue]]
speaker = "unk"
# ある日、クラウディアから呼び出された──
line = "ある日、クラウディアから呼び出された──"

[[dialogue]]
speaker = "クラウディア"
# 「──とまあ、そんなことがあってな」
line = "「──とまあ、そんなことがあってな」"

[[dialogue]]
speaker = "クラウディア"
# 「せっかく余がこの『ホーリー・ベル』の機能をふんだんに使って、１２月２５日を盛り上げようとしていたのに。結局セドナ達に止められてしまった」
line = "「せっかく余がこの『ホーリー・ベル』の機能をふんだんに使って、１２月２５日を盛り上げようとしていたのに。結局セドナ達に止められてしまった」"

[[dialogue]]
speaker = "unk"
# クラウディアは、その衣装にまつわる事の顛末を教えてくれた。
line = "クラウディアは、その衣装にまつわる事の顛末を教えてくれた。"

[[dialogue]]
speaker = "unk"
# どうやらクラウディアは、また基地を飛び出しててんやわんやを仕出かしていたらしい。
line = "どうやらクラウディアは、また基地を飛び出しててんやわんやを仕出かしていたらしい。"

[[dialogue]]
speaker = "ウェンディ"
# 「もう。本当に大変だったんですからね」
line = "「もう。本当に大変だったんですからね」"

[[dialogue]]
speaker = "クラウディア"
# 「文句ならちぇちゅーりえに言うがよい。あやつが余のために開発した特別品なのだからな」
line = "「文句ならちぇちゅーりえに言うがよい。あやつが余のために開発した特別品なのだからな」"

[[dialogue]]
speaker = "ウェンディ"
# 「文句は<ruby=ぬか>糠</ruby>に釘なので後回しとして、請求書はしっかり送りつけておきました」
line = "「文句は<ruby>糠<rt>ぬか</rt></ruby>に釘なので後回しとして、請求書はしっかり送りつけておきました」"

[[dialogue]]
speaker = "クラウディア"
# 「まあ大目に見てやってくれ。余もすっかりこの服が気に入ってしまったからのう」
line = "「まあ大目に見てやってくれ。余もすっかりこの服が気に入ってしまったからのう」"

[[dialogue]]
speaker = "セドナ"
# 「せっかく新開発された戦闘服だ。姫様にも実験に協力してもらって、なるべくデータを取ることとしよう」
line = "「せっかく新開発された戦闘服だ。姫様にも実験に協力してもらって、なるべくデータを取ることとしよう」"

[[dialogue]]
speaker = "セドナ"
# 「それより、魔王よ。学園に戻る際、このレポートをついでに届けてきてくれないか」
line = "「それより、魔王よ。学園に戻る際、このレポートをついでに届けてきてくれないか」"

[[dialogue]]
speaker = "クラウディア"
# 「あ、こら。セドナ。余の魔王を勝手に小間使いにするでない」
line = "「あ、こら。セドナ。余の魔王を勝手に小間使いにするでない」"

[[dialogue]]
speaker = "セドナ"
# 「姫様だけのものではないでしょう……」
line = "「姫様だけのものではないでしょう……」"

[[dialogue]]
speaker = "クラウディア"
# 「いーや、余だけのものだ！　余の最愛のぱーとなーなのだ！」
line = "「いーや、余だけのものだ！　余の最愛のぱーとなーなのだ！」"

[[dialogue]]
speaker = "セドナ"
# 「お熱いのは結構ですが、ほら。彼も引き受けてくださるようですよ」
line = "「お熱いのは結構ですが、ほら。彼も引き受けてくださるようですよ」"

[[dialogue]]
speaker = "クラウディア"
# 「む……さすがは魔王だ。懐が深い。それでこそ余の認めた伴侶だな！」
line = "「む……さすがは魔王だ。懐が深い。それでこそ余の認めた伴侶だな！」"

[[dialogue]]
speaker = "クラウディア"
# 「だが──魔王よ。さっきからずっと疑問げな顔をしていないか？」
line = "「だが──魔王よ。さっきからずっと疑問げな顔をしていないか？」"

[[dialogue]]
speaker = "unk"
# ここにいていいの？
line = "ここにいていいの？"

[[dialogue]]
speaker = "unk"
# 今さらだけど……
line = "今さらだけど……"

[[dialogue]]
speaker = "クラウディア"
# 「どういう意味だ？　なに──ネビュラの部外者なのに基地にいてよいのか、と？」
line = "「どういう意味だ？　なに──ネビュラの部外者なのに基地にいてよいのか、と？」"

[[dialogue]]
speaker = "クラウディア"
# 「無論だ！　余が認めた相手なのだから、どこへなりとも自由に行くがよい！」
line = "「無論だ！　余が認めた相手なのだから、どこへなりとも自由に行くがよい！」"

[[dialogue]]
speaker = "セドナ"
# 「姫様の理屈は通りません。が、魔王の出入りに関しては我々も認可している。気負う必要はない」
line = "「姫様の理屈は通りません。が、魔王の出入りに関しては我々も認可している。気負う必要はない」"

[[dialogue]]
speaker = "セドナ"
# 「魔王がいない時も、姫様はお前の話ばかりするのだ。一緒に<ruby=ひるげ>昼餉</ruby>を摂っただの遊んだだの、再三聞かされるこっちの身にもなってくれ」
line = "「魔王がいない時も、姫様はお前の話ばかりするのだ。一緒に<ruby>昼餉<rt>ひるげ</rt></ruby>を摂っただの遊んだだの、再三聞かされるこっちの身にもなってくれ」"

[[dialogue]]
speaker = "クラウディア"
# 「ああっ！　セ、セドナ！　魔王がいない時の話などするでない！」
line = "「ああっ！　セ、セドナ！　魔王がいない時の話などするでない！」"

[[dialogue]]
speaker = "ウェンディ"
# 「ふふっ、クラウディア様でも恥ずかしがることあるんですね～」
line = "「ふふっ、クラウディア様でも恥ずかしがることあるんですね～」"

[[dialogue]]
speaker = "クラウディア"
# 「むぅ……！」
line = "「むぅ……！」"

[[dialogue]]
speaker = "セドナ"
# 「ま、公認の仲ということだ。今後も自由に我が基地を訪れてくれていい。むしろ姫様の相手をしてくれた方が我々も助かるというもの」
line = "「ま、公認の仲ということだ。今後も自由に我が基地を訪れてくれていい。むしろ姫様の相手をしてくれた方が我々も助かるというもの」"

[[dialogue]]
speaker = "セドナ"
# 「それに、今は学園とネビュラも歩調を合わせるときだ。魔王と親しく交流することは、お互いにとっても悪いことじゃないだろう」
line = "「それに、今は学園とネビュラも歩調を合わせるときだ。魔王と親しく交流することは、お互いにとっても悪いことじゃないだろう」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。ま、そういうことだ」
line = "「うむ。ま、そういうことだ」"

[[dialogue]]
speaker = "セドナ"
# 「魔王を自由に行き来させていれば、そのうち姫様を通じて機密情報が掴めるかもしれないしな……」
line = "「魔王を自由に行き来させていれば、そのうち姫様を通じて機密情報が掴めるかもしれないしな……」"

[[dialogue]]
speaker = "ウェンディ"
# 「あくどい部分が出てますよ、セドナ長官」
line = "「あくどい部分が出てますよ、セドナ長官」"

[[dialogue]]
speaker = "セドナ"
# 「ふふっ、冗談だ。いずれにせよ──魔王が姫様と一緒にいてくれれば、私としても手間が省けてありがたい」
line = "「ふふっ、冗談だ。いずれにせよ──魔王が姫様と一緒にいてくれれば、私としても手間が省けてありがたい」"

[[dialogue]]
speaker = "セドナ"
# 「これからも姫様が無茶しないように頼むぞ、魔王」
line = "「これからも姫様が無茶しないように頼むぞ、魔王」"

[[dialogue]]
speaker = "unk"
# それからも──
line = "それからも──"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「──あ、クラウディア様。それに魔王ちゃん。今日も２人でお家デート？　アツアツだね～」
line = "「──あ、クラウディア様。それに魔王ちゃん。今日も２人でお家デート？　アツアツだね～」"

[[dialogue]]
speaker = "クラウディア"
# 「おお、ちぇちゅーりえ！　お主にもらったこのフォームは今も大活躍だぞ！」
line = "「おお、ちぇちゅーりえ！　お主にもらったこのフォームは今も大活躍だぞ！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「気に入ってくれてるみたいで何より。お２人さん、いつまでも仲睦まじくね～」
line = "「気に入ってくれてるみたいで何より。お２人さん、いつまでも仲睦まじくね～」"

[[dialogue]]
speaker = "クラウディア"
# 「──やれやれ、ここの者どもときたら。余と魔王を見かけたらすぐ寄ってきおる」
line = "「──やれやれ、ここの者どもときたら。余と魔王を見かけたらすぐ寄ってきおる」"

[[dialogue]]
speaker = "クラウディア"
# 「こういうのは、なんだ……野次馬、というのか？　余と魔王のらぶらぶっぷりが羨ましいのだろうな、はっはっは！」
line = "「こういうのは、なんだ……野次馬、というのか？　余と魔王のらぶらぶっぷりが羨ましいのだろうな、はっはっは！」"

[[dialogue]]
speaker = "unk"
# 大切な仲間なんだな
line = "大切な仲間なんだな"

[[dialogue]]
speaker = "unk"
# クラウディアにとって……
line = "クラウディアにとって……"

[[dialogue]]
speaker = "クラウディア"
# 「？　何を今さら」
line = "「？　何を今さら」"

[[dialogue]]
speaker = "クラウディア"
# 「とはいえ、まー……そうだな。最近は、余にとってネビュラがより大切になったのを感じる」
line = "「とはいえ、まー……そうだな。最近は、余にとってネビュラがより大切になったのを感じる」"

[[dialogue]]
speaker = "クラウディア"
# 「なにせ森にいた頃は、魔女しかいない環境というものが普通だった。外敵もいないのだから、仲間意識など芽生えるはずもない」
line = "「なにせ森にいた頃は、魔女しかいない環境というものが普通だった。外敵もいないのだから、仲間意識など芽生えるはずもない」"

[[dialogue]]
speaker = "クラウディア"
# 「魔女であることは普通で、ただ光の魔女である余だけが特別──なものだと思っていた」
line = "「魔女であることは普通で、ただ光の魔女である余だけが特別──なものだと思っていた」"

[[dialogue]]
speaker = "クラウディア"
# 「だが……こうしてネビュラが人間界に開かれてからというもの、魔女という種族そのものが仲間なのだと、自然と思えるようになった」
line = "「だが……こうしてネビュラが人間界に開かれてからというもの、魔女という種族そのものが仲間なのだと、自然と思えるようになった」"

[[dialogue]]
speaker = "クラウディア"
# 「口うるさいセドナも、ちゃらんぽらんなちぇちゅーりえも……みな、魔女のために動いてくれておる」
line = "「口うるさいセドナも、ちゃらんぽらんなちぇちゅーりえも……みな、魔女のために動いてくれておる」"

[[dialogue]]
speaker = "クラウディア"
# 「余もその頭として──ふさわしい振る舞いをしなくてはならん。正直、今の余はまだまだなのだろう」
line = "「余もその頭として──ふさわしい振る舞いをしなくてはならん。正直、今の余はまだまだなのだろう」"

[[dialogue]]
speaker = "unk"
# いつの間にか大人びた意見を持っていた彼女に、そこはかとない感動を覚える。
line = "いつの間にか大人びた意見を持っていた彼女に、そこはかとない感動を覚える。"

[[dialogue]]
speaker = "unk"
# いい子いい子
line = "いい子いい子"

[[dialogue]]
speaker = "unk"
# 成長してるんだな
line = "成長してるんだな"

[[dialogue]]
speaker = "クラウディア"
# 「……む？　なんだ？　急に余の頭を撫でて──子ども扱いするでない！　余は泣く子も恐れる光の魔女だぞ！」
line = "「……む？　なんだ？　急に余の頭を撫でて──子ども扱いするでない！　余は泣く子も恐れる光の魔女だぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「魔王！　お主も余の伴侶として、魔女を導くふさわしい振る舞いを身につけるのだ～！」
line = "「魔王！　お主も余の伴侶として、魔女を導くふさわしい振る舞いを身につけるのだ～！」"
