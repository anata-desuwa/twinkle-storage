[[dialogue]]
speaker = "unk"
# 第５話,神殿の奥にあるもの,B
line = "第５話,神殿の奥にあるもの,B"

[[dialogue]]
speaker = "unk"
# 極星従騎に乗って女神の神殿に再突入したのは、梨緒・Ａ・クリステレス、ベアトリス・シェイド、散乃ナターシャの３名。
line = "極星従騎に乗って女神の神殿に再突入したのは、梨緒・Ａ・クリステレス、ベアトリス・シェイド、散乃ナターシャの３名。"

[[dialogue]]
speaker = "unk"
# 名目上監査であるアポロを除いた選挙管理委員会のメンバーが、神殿を奪還すべく、深部への到達を試みる。
line = "名目上監査であるアポロを除いた選挙管理委員会のメンバーが、神殿を奪還すべく、深部への到達を試みる。"

[[dialogue]]
speaker = "ナターシャ"
# 「ところでベアトって、いつの間に極星従騎を操れるようになったの？」
line = "「ところでベアトって、いつの間に極星従騎を操れるようになったの？」"

[[dialogue]]
speaker = "ベアトリス"
# 「いつからって言うか……実は最初から？　チナちゃんに教えてもらったんだけど、この子たちって極星星徒会役員の命令を聞くようになってるみたい」
line = "「いつからって言うか……実は最初から？　チナちゃんに教えてもらったんだけど、この子たちって極星星徒会役員の命令を聞くようになってるみたい」"

[[dialogue]]
speaker = "ナターシャ"
# 「ああ、そういえば極星従騎がベアトの前で止まったこともあったね」
line = "「ああ、そういえば極星従騎がベアトの前で止まったこともあったね」"

[[dialogue]]
speaker = "梨緒"
# 「……ナターシャは大丈夫なのか？」
line = "「……ナターシャは大丈夫なのか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「大丈夫って……？　あぁ、メルエルのこと？」
line = "「大丈夫って……？　あぁ、メルエルのこと？」"

[[dialogue]]
speaker = "ナターシャ"
# 「私は全然平気だよ。さっきは頭に血が上っていろいろ言っちゃったけど、おかげでスッキリもしたし。今は落ち着いたよ」
line = "「私は全然平気だよ。さっきは頭に血が上っていろいろ言っちゃったけど、おかげでスッキリもしたし。今は落ち着いたよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ていうか、大丈夫って聞きたいのはこっちの方なんだけど。梨緒の方こそ戦えるの？」
line = "「ていうか、大丈夫って聞きたいのはこっちの方なんだけど。梨緒の方こそ戦えるの？」"

[[dialogue]]
speaker = "梨緒"
# 「戦えるか戦えないかじゃない。戦わないとダメなんだ」
line = "「戦えるか戦えないかじゃない。戦わないとダメなんだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「うーん……本当に大丈夫かな？」
line = "「うーん……本当に大丈夫かな？」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん、何かあったの？」
line = "「梨緒ちゃん、何かあったの？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、欠けていた記憶が何なのか、思い出したんだ」
line = "「ああ、欠けていた記憶が何なのか、思い出したんだ」"

[[dialogue]]
speaker = "梨緒"
# 「ベガの滅びの時、ジグは『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』によってリクリエの使徒にされた」
line = "「ベガの滅びの時、ジグは『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』によってリクリエの使徒にされた」"

[[dialogue]]
speaker = "梨緒"
# 「その瞬間、私は何もできなかった」
line = "「その瞬間、私は何もできなかった」"

[[dialogue]]
speaker = "梨緒"
# 「……いや、何もしなかった。『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を前に心折れ、抵抗することすら諦めた」
line = "「……いや、何もしなかった。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を前に心折れ、抵抗することすら諦めた」"

[[dialogue]]
speaker = "梨緒"
# 「私は……ジグを見捨てたんだ」
line = "「私は……ジグを見捨てたんだ」"

[[dialogue]]
speaker = "梨緒"
# 「だから私は今度こそ、ジグを救わなければいけないんだ……」
line = "「だから私は今度こそ、ジグを救わなければいけないんだ……」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん……」
line = "「梨緒ちゃん……」"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルゥ……！」
line = "「グルルゥ……！」"

[[dialogue]]
speaker = "エレマル"
# 「ビビビビ！」
line = "「ビビビビ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「機械型モンスター……ジグのやつ、やっぱり神殿にも連れてきてたんだ」
line = "「機械型モンスター……ジグのやつ、やっぱり神殿にも連れてきてたんだ」"

[[dialogue]]
speaker = "unk"
# 神殿の奥に向かう梨緒たちの行く手に、機械型モンスターが立ちはだかる。
line = "神殿の奥に向かう梨緒たちの行く手に、機械型モンスターが立ちはだかる。"

[[dialogue]]
speaker = "梨緒"
# 「神殿が聖庭園にぶつかるまで時間がない。ベアト、ナターシャ、ここは任せていいか？」
line = "「神殿が聖庭園にぶつかるまで時間がない。ベアト、ナターシャ、ここは任せていいか？」"

[[dialogue]]
speaker = "ナターシャ"
# 「戦力の分散はいい手じゃないし、やりたくないんだけどね。今の梨緒がどこまで戦えるか不安だし」
line = "「戦力の分散はいい手じゃないし、やりたくないんだけどね。今の梨緒がどこまで戦えるか不安だし」"

[[dialogue]]
speaker = "ナターシャ"
# 「それでも……モンスターがどれだけいるかわからない以上、そうするしかないか」
line = "「それでも……モンスターがどれだけいるかわからない以上、そうするしかないか」"

[[dialogue]]
speaker = "ベアトリス"
# 「極星従騎がいるから、こっちは何とかなると思う！」
line = "「極星従騎がいるから、こっちは何とかなると思う！」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ、持たせるしかないよね。わかった。行ってきて、梨緒」
line = "「まぁ、持たせるしかないよね。わかった。行ってきて、梨緒」"

[[dialogue]]
speaker = "梨緒"
# 「すまない。任せた」
line = "「すまない。任せた」"

[[dialogue]]
speaker = "梨緒"
# 「ジグは必ず私が止める。では行ってくる」
line = "「ジグは必ず私が止める。では行ってくる」"

[[dialogue]]
speaker = "unk"
# 梨緒は極星従騎の背を降り、神殿の深部に向かって加速する。
line = "梨緒は極星従騎の背を降り、神殿の深部に向かって加速する。"

[[dialogue]]
speaker = "エレマル"
# 「ビビビ！」
line = "「ビビビ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃんの邪魔はさせないよ！　極星従騎！」
line = "「梨緒ちゃんの邪魔はさせないよ！　極星従騎！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルル！」
line = "「ブルルル！」"

[[dialogue]]
speaker = "unk"
# 行く手を阻むモンスターを、極星従騎が二振りの刃で蹴散らす。
line = "行く手を阻むモンスターを、極星従騎が二振りの刃で蹴散らす。"

[[dialogue]]
speaker = "ナターシャ"
# 「おお、極星従騎にはさんざん苦戦させられたけど、味方になるとけっこう頼りになるじゃん」
line = "「おお、極星従騎にはさんざん苦戦させられたけど、味方になるとけっこう頼りになるじゃん」"

[[dialogue]]
speaker = "unk"
# 梨緒は最高速でモンスターの間を駆け抜け、先ほどは辿り着けなかった神殿の最奥に向かった。
line = "梨緒は最高速でモンスターの間を駆け抜け、先ほどは辿り着けなかった神殿の最奥に向かった。"

[[dialogue]]
speaker = "梨緒"
# 「ここが神殿の奥……？　何だ、この空間は……？」
line = "「ここが神殿の奥……？　何だ、この空間は……？」"

[[dialogue]]
speaker = "梨緒"
# 「今まで見ていた神殿とはまるで違う……これが本当に女神の神殿なのか……？」
line = "「今まで見ていた神殿とはまるで違う……これが本当に女神の神殿なのか……？」"

[[dialogue]]
speaker = "unk"
# 神殿の深部には広大な空間が広がっていた。
line = "神殿の深部には広大な空間が広がっていた。"

[[dialogue]]
speaker = "unk"
# だがその景色は神殿の外部とも、これまで通ってきた内部とも違う。
line = "だがその景色は神殿の外部とも、これまで通ってきた内部とも違う。"

[[dialogue]]
speaker = "unk"
# 足元は石造りの神殿だが、周囲には暗い闇が広がり、無数の光が浮かんでは消える。
line = "足元は石造りの神殿だが、周囲には暗い闇が広がり、無数の光が浮かんでは消える。"

[[dialogue]]
speaker = "unk"
# 頭上には巨大な球体が浮かび、無機質な光のラインが瞬いていた。
line = "頭上には巨大な球体が浮かび、無機質な光のラインが瞬いていた。"

[[dialogue]]
speaker = "ジグ"
# 「言っただろう、神殿の奥はコントロールルームになっていると。その球体はメインコンピューターといったところかな」
line = "「言っただろう、神殿の奥はコントロールルームになっていると。その球体はメインコンピューターといったところかな」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……！」
line = "「ジグ……！」"

[[dialogue]]
speaker = "unk"
# 闇の向こうから、ジグが余裕のある足取りでやってくる。
line = "闇の向こうから、ジグが余裕のある足取りでやってくる。"

[[dialogue]]
speaker = "ジグ"
# 「なんだ、アガサじゃないか。私は魔王を待っていたのにがっかりだよ」
line = "「なんだ、アガサじゃないか。私は魔王を待っていたのにがっかりだよ」"

[[dialogue]]
speaker = "梨緒"
# 「魔王は来ない。私が相手だ」
line = "「魔王は来ない。私が相手だ」"

[[dialogue]]
speaker = "梨緒"
# 「私が君を倒して、神殿を止める……！」
line = "「私が君を倒して、神殿を止める……！」"

[[dialogue]]
speaker = "ジグ"
# 「君が私に勝てるとでも？　私が“真なる神”の加護を与えられる前から、君が勝てた試しがないのに？」
line = "「君が私に勝てるとでも？　私が“真なる神”の加護を与えられる前から、君が勝てた試しがないのに？」"

[[dialogue]]
speaker = "梨緒"
# 「それでも私は勝つ。勝たなければならない」
line = "「それでも私は勝つ。勝たなければならない」"

[[dialogue]]
speaker = "梨緒"
# 「そして君をリクリエの呪縛から解放する！　私が君を救うんだ！」
line = "「そして君をリクリエの呪縛から解放する！　私が君を救うんだ！」"

[[dialogue]]
speaker = "ジグ"
# 「ふぅん……威勢のいいことだね。『弱い犬ほどよく咆える』──なんて言葉が浮かんだよ」
line = "「ふぅん……威勢のいいことだね。『弱い犬ほどよく咆える』──なんて言葉が浮かんだよ」"

[[dialogue]]
speaker = "ジグ"
# 「まぁいいや。君を血祭に上げれば、魔王もこちらに来る気になるだろう」
line = "「まぁいいや。君を血祭に上げれば、魔王もこちらに来る気になるだろう」"

[[dialogue]]
speaker = "梨緒"
# 「いいや、魔王をディザスターハンドにはさせない。今度こそ……私が勝つ！」
line = "「いいや、魔王をディザスターハンドにはさせない。今度こそ……私が勝つ！」"

[[dialogue]]
speaker = "梨緒"
# （守護天使ノルン……どうして私に力を貸してくれたのかはわからないが、今となっては君も私の一部だ）
line = "（守護天使ノルン……どうして私に力を貸してくれたのかはわからないが、今となっては君も私の一部だ）"

[[dialogue]]
speaker = "梨緒"
# （どうか私にジグを救う力をくれ……！）
line = "（どうか私にジグを救う力をくれ……！）"

[[dialogue]]
speaker = "unk"
# 自分の中の守護天使に呼びかけ、梨緒の背に翼が顕現する。
line = "自分の中の守護天使に呼びかけ、梨緒の背に翼が顕現する。"

[[dialogue]]
speaker = "梨緒"
# （守護天使《運命》のノルンは『因果』の摂理を司る）
line = "（守護天使《運命》のノルンは『因果』の摂理を司る）"

[[dialogue]]
speaker = "梨緒"
# （つまり『原因』と『結果』を結び付ける力。ノルンの力を使えば、リクリエの使徒であろうと動きを予測することができるはずだ）
line = "（つまり『原因』と『結果』を結び付ける力。ノルンの力を使えば、リクリエの使徒であろうと動きを予測することができるはずだ）"

[[dialogue]]
speaker = "unk"
# ノルンの力をまとった梨緒は、速度や星術の威力の向上のみならず、未来予知に等しい予測が可能となる。
line = "ノルンの力をまとった梨緒は、速度や星術の威力の向上のみならず、未来予知に等しい予測が可能となる。"

[[dialogue]]
speaker = "unk"
# 純粋な攻撃力やスピードでは勝てずとも、ノルンの力があれば優位に立てると梨緒は計算していた。
line = "純粋な攻撃力やスピードでは勝てずとも、ノルンの力があれば優位に立てると梨緒は計算していた。"

[[dialogue]]
speaker = "梨緒"
# （見通せ……ジグの動きを……未来を……！）
line = "（見通せ……ジグの動きを……未来を……！）"

[[dialogue]]
speaker = "unk"
# 梨緒が予測した未来の中で、ジグが動き出す。
line = "梨緒が予測した未来の中で、ジグが動き出す。"

[[dialogue]]
speaker = "unk"
# 星力を後方に放出して加速し、劫火を帯びた一閃を見舞う、単純明快にして必殺の動作。
line = "星力を後方に放出して加速し、劫火を帯びた一閃を見舞う、単純明快にして必殺の動作。"

[[dialogue]]
speaker = "梨緒"
# （見えた……！）
line = "（見えた……！）"

[[dialogue]]
speaker = "unk"
# 魔剣の斬撃と吹き荒れる炎の嵐──その暴威の中にわずかな<ruby=かんげき>間隙</ruby>を見つけ、背後を取って雷の矢を放つ……！
line = "魔剣の斬撃と吹き荒れる炎の嵐──その暴威の中にわずかな<ruby>間隙<rt>かんげき</rt></ruby>を見つけ、背後を取って雷の矢を放つ……！"

[[dialogue]]
speaker = "ジグ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "梨緒"
# （──！？　この動きではジグに斬られる……！？）
line = "（──！？　この動きではジグに斬られる……！？）"

[[dialogue]]
speaker = "梨緒"
# （ジグがノルンの予測を上回った……？　ならば今度は私から──）
line = "（ジグがノルンの予測を上回った……？　ならば今度は私から──）"

[[dialogue]]
speaker = "unk"
# 距離を保ちながら矢の雨を放つと、ジグは剣で矢を軽々と切り払う。
line = "距離を保ちながら矢の雨を放つと、ジグは剣で矢を軽々と切り払う。"

[[dialogue]]
speaker = "unk"
# しかしそれは牽制。瞬時に頭上を取り、クロスボウを撃つ。
line = "しかしそれは牽制。瞬時に頭上を取り、クロスボウを撃つ。"

[[dialogue]]
speaker = "梨緒"
# （この矢を受け止めようとして、ジグの姿勢が崩れたところをさらに追撃する……）
line = "（この矢を受け止めようとして、ジグの姿勢が崩れたところをさらに追撃する……）"

[[dialogue]]
speaker = "梨緒"
# （ここだ……！）
line = "（ここだ……！）"

[[dialogue]]
speaker = "unk"
# 矢が旋風を巻き起こしながらジグに迫る。だが──
line = "矢が旋風を巻き起こしながらジグに迫る。だが──"

[[dialogue]]
speaker = "ジグ"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# しかしジグは剣から炎を迸らせ、矢ごと斬って捨てた。
line = "しかしジグは剣から炎を迸らせ、矢ごと斬って捨てた。"

[[dialogue]]
speaker = "梨緒"
# （く──！？　また斬られた……！？）
line = "（く──！？　また斬られた……！？）"

[[dialogue]]
speaker = "梨緒"
# （それなら次は──）
line = "（それなら次は──）"

[[dialogue]]
speaker = "unk"
# 右から、左から、あるいは下から。攻め方を変えて、一瞬の間に何通りもの未来を予測する。
line = "右から、左から、あるいは下から。攻め方を変えて、一瞬の間に何通りもの未来を予測する。"

[[dialogue]]
speaker = "unk"
# しかし届かない。何度動きを読もうとも、その度にジグが梨緒の予測を上回る。
line = "しかし届かない。何度動きを読もうとも、その度にジグが梨緒の予測を上回る。"

[[dialogue]]
speaker = "ジグ"
# 「フフ……」
line = "「フフ……」"

[[dialogue]]
speaker = "梨緒"
# （何だ、この違和感は……？）
line = "（何だ、この違和感は……？）"

[[dialogue]]
speaker = "unk"
# 梨緒が何をしても、予測の中のジグは、梨緒の動きを見透かしたように反応してくる。
line = "梨緒が何をしても、予測の中のジグは、梨緒の動きを見透かしたように反応してくる。"

[[dialogue]]
speaker = "unk"
# まるで鏡を見ているような奇妙な感覚が、梨緒を戸惑わせていた。
line = "まるで鏡を見ているような奇妙な感覚が、梨緒を戸惑わせていた。"

[[dialogue]]
speaker = "ジグ"
# 「おや、驚いたな」
line = "「おや、驚いたな」"

[[dialogue]]
speaker = "unk"
# しかし、驚嘆の声を漏らしたのはジグの方だった。
line = "しかし、驚嘆の声を漏らしたのはジグの方だった。"

[[dialogue]]
speaker = "ジグ"
# 「私が見た可能性に干渉してくるなんてね。なかなか心地が悪い」
line = "「私が見た可能性に干渉してくるなんてね。なかなか心地が悪い」"

[[dialogue]]
speaker = "梨緒"
# 「可能性……？」
line = "「可能性……？」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、私には見えるんだよ。可能性がね」
line = "「ああ、私には見えるんだよ。可能性がね」"

[[dialogue]]
speaker = "ジグ"
# 「せっかくだし、そろそろ種明かしをしてもいいかな」
line = "「せっかくだし、そろそろ種明かしをしてもいいかな」"

[[dialogue]]
speaker = "ジグ"
# 「私の……いや、レナーテ・Ｚ・サイフリートの祖先は竜殺しの英雄ジークフリート──あるいはシグルドだそうだ」
line = "「私の……いや、レナーテ・Ｚ・サイフリートの祖先は竜殺しの英雄ジークフリート──あるいはシグルドだそうだ」"

[[dialogue]]
speaker = "ジグ"
# 「そしてサイフリートの一族は、ある能力を発現することがある」
line = "「そしてサイフリートの一族は、ある能力を発現することがある」"

[[dialogue]]
speaker = "ジグ"
# 「それはものに秘められた才能や潜在能力を見通すというもの」
line = "「それはものに秘められた才能や潜在能力を見通すというもの」"

[[dialogue]]
speaker = "ジグ"
# 「私は一族の中でも特に強い力を持って生まれ、事象に紐づく可能性すら見ることができた」
line = "「私は一族の中でも特に強い力を持って生まれ、事象に紐づく可能性すら見ることができた」"

[[dialogue]]
speaker = "ジグ"
# 「私はこれを『<ruby=てんき>天機</ruby>の星眼』と呼んでいる」
line = "「私はこれを『<ruby>天機<rt>てんき</rt></ruby>の星眼』と呼んでいる」"

[[dialogue]]
speaker = "ジグ"
# 「どちらかといえば、ジークフリートというより、レギンの裏切りを知ったシグルドの方に近いけど……まぁ些細なことだ」
line = "「どちらかといえば、ジークフリートというより、レギンの裏切りを知ったシグルドの方に近いけど……まぁ些細なことだ」"

[[dialogue]]
speaker = "ジグ"
# 「君にも言ったことがあっただろう。『不可能が可能になるような大層な力じゃない』と」
line = "「君にも言ったことがあっただろう。『不可能が可能になるような大層な力じゃない』と」"

[[dialogue]]
speaker = "ジグ"
# 「だけど君の『可能性』を見通せば、どう動くか手に取るようにわかる」
line = "「だけど君の『可能性』を見通せば、どう動くか手に取るようにわかる」"

[[dialogue]]
speaker = "梨緒"
# 「私が感じた違和感はそのせいか……！」
line = "「私が感じた違和感はそのせいか……！」"

[[dialogue]]
speaker = "ジグ"
# 「そうだ。原理は違うものの、私もアガサも同種の力を持ったせいで、お互い妙な感覚を覚えていたようだね」
line = "「そうだ。原理は違うものの、私もアガサも同種の力を持ったせいで、お互い妙な感覚を覚えていたようだね」"

[[dialogue]]
speaker = "ジグ"
# 「本来、私が一度見た可能性は変わらないものだ」
line = "「本来、私が一度見た可能性は変わらないものだ」"

[[dialogue]]
speaker = "ジグ"
# 「私がその可能性を確定させる選択をすれば、未来もそうなる。だけど今の君は例外らしい」
line = "「私がその可能性を確定させる選択をすれば、未来もそうなる。だけど今の君は例外らしい」"

[[dialogue]]
speaker = "ジグ"
# 「君の方は……ふむ。『因果』を司る守護天使、《運命》のノルンの力か」
line = "「君の方は……ふむ。『因果』を司る守護天使、《運命》のノルンの力か」"

[[dialogue]]
speaker = "ジグ"
# 「彼女は遥か昔に消滅したはずだけど、よくそんなものを引っ張り出してきたものだ。リクリエに敗北した者同士お似合いだよ」
line = "「彼女は遥か昔に消滅したはずだけど、よくそんなものを引っ張り出してきたものだ。リクリエに敗北した者同士お似合いだよ」"

[[dialogue]]
speaker = "梨緒"
# 「ジグ……！」
line = "「ジグ……！」"

[[dialogue]]
speaker = "ジグ"
# 「だけど因果の糸を辿って理解したんじゃないかい？　ノルンの力では、私に勝つことはできないと」
line = "「だけど因果の糸を辿って理解したんじゃないかい？　ノルンの力では、私に勝つことはできないと」"

[[dialogue]]
speaker = "梨緒"
# 「……ッ！」
line = "「……ッ！」"

[[dialogue]]
speaker = "ジグ"
# 「では君に、可能性ではなく現実の敗北を与えよう」
line = "「では君に、可能性ではなく現実の敗北を与えよう」"

[[dialogue]]
speaker = "unk"
# ジグが剣を構え、星力を爆発させて一直線に迫る。それは梨緒が予測で見た光景だ。
line = "ジグが剣を構え、星力を爆発させて一直線に迫る。それは梨緒が予測で見た光景だ。"

[[dialogue]]
speaker = "梨緒"
# （紙一重でかいくぐり、背後から狙い撃つ──いや、それはすでに破られた）
line = "（紙一重でかいくぐり、背後から狙い撃つ──いや、それはすでに破られた）"

[[dialogue]]
speaker = "梨緒"
# （それなら距離を取って──）
line = "（それなら距離を取って──）"

[[dialogue]]
speaker = "ジグ"
# 「無駄だよ」
line = "「無駄だよ」"

[[dialogue]]
speaker = "unk"
# ジグは梨緒の動きがわかっていたかのように……いや、わかっていて、さらに加速する。
line = "ジグは梨緒の動きがわかっていたかのように……いや、わかっていて、さらに加速する。"

[[dialogue]]
speaker = "梨緒"
# 「──ッ」
line = "「──ッ」"

[[dialogue]]
speaker = "梨緒"
# 「くああああぁっ！！」
line = "「くああああぁっ！！」"
