[[dialogue]]
speaker = "unk"
# 第２話,竜は素直じゃない,P
line = "第２話,竜は素直じゃない,P"

[[dialogue]]
speaker = "unk"
# 流星寮の寮長であり、マムと並んで学園最強クラスの星騎士であるヒルディオーネ先輩に、訓練を見てもらっていたある日のこと――
line = "流星寮の寮長であり、マムと並んで学園最強クラスの星騎士であるヒルディオーネ先輩に、訓練を見てもらっていたある日のこと――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「会長、今の打撃はちょっと動きを直した方がいいかもしれませんわね」
line = "「会長、今の打撃はちょっと動きを直した方がいいかもしれませんわね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ちょっと失礼しますわ。大きな隙ができないように、構えはこうして……」
line = "「ちょっと失礼しますわ。大きな隙ができないように、構えはこうして……」"

[[dialogue]]
speaker = "マハムート"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "unk"
# えっと……マム？
line = "えっと……マム？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ここ最近、訓練になるとよく見に来ていますけれど、何か気になることでもあるんですの？」
line = "「ここ最近、訓練になるとよく見に来ていますけれど、何か気になることでもあるんですの？」"

[[dialogue]]
speaker = "マハムート"
# 「何よ。他人の訓練を見るのは、別におかしいことじゃないでしょう？」
line = "「何よ。他人の訓練を見るのは、別におかしいことじゃないでしょう？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……ひょっとしてと思っていたのですけれど、マム、あなた……」
line = "「……ひょっとしてと思っていたのですけれど、マム、あなた……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「会長と付き合い始めましたの？」
line = "「会長と付き合い始めましたの？」"

[[dialogue]]
speaker = "マハムート"
# 「！？　…………何を言っているの？　そんなわけないでしょう」
line = "「！？　…………何を言っているの？　そんなわけないでしょう」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いま、思いっきり間がありましたわよ？」
line = "「いま、思いっきり間がありましたわよ？」"

[[dialogue]]
speaker = "マハムート"
# 「気のせいよ。変な勘繰りをしないで頂戴」
line = "「気のせいよ。変な勘繰りをしないで頂戴」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、そうですの？　じゃあ別に、会長を千園寺家の婿候補にさせて頂いても構いませんわね？」
line = "「あら、そうですの？　じゃあ別に、会長を千園寺家の婿候補にさせて頂いても構いませんわね？」"

[[dialogue]]
speaker = "マハムート"
# 「は！？　何よいきなり！？」
line = "「は！？　何よいきなり！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「実は、前々から考えていたのですわ。会長と一緒に鍛練をするようになって、真面目な男性であると実感しておりましたし――」
line = "「実は、前々から考えていたのですわ。会長と一緒に鍛練をするようになって、真面目な男性であると実感しておりましたし――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私とは気も合いますし、婿として早めに勧誘しておくのが、よいのではないかと」
line = "「私とは気も合いますし、婿として早めに勧誘しておくのが、よいのではないかと」"

[[dialogue]]
speaker = "マハムート"
# 「何よそれ……そんな一方的な……」
line = "「何よそれ……そんな一方的な……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「まあ、そこは千園寺家の事情というものですわ。妃竜院家だって、いずれは婿を迎えなければならないのでしょう？」
line = "「まあ、そこは千園寺家の事情というものですわ。妃竜院家だって、いずれは婿を迎えなければならないのでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「それは、そうだけど……」
line = "「それは、そうだけど……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「というわけで会長、今日からあなたを我が千園寺家の婿候補とさせて頂きますわ♪　つきましてはこの後、カフェテリアでじっくりお話を……」
line = "「というわけで会長、今日からあなたを我が千園寺家の婿候補とさせて頂きますわ♪　つきましてはこの後、カフェテリアでじっくりお話を……」"

[[dialogue]]
speaker = "マハムート"
# 「……引力操作！」
line = "「……引力操作！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おっと、ミラージュブレイカー♪」
line = "「おっと、ミラージュブレイカー♪」"

[[dialogue]]
speaker = "マハムート"
# 「くっ……相変わらずデタラメな星術ね……！」
line = "「くっ……相変わらずデタラメな星術ね……！」"

[[dialogue]]
speaker = "unk"
# ――ヒルディオーネ先輩がマムと互角と言われ、そして彼女が周りから『努力する星騎士の模範』と言われる<ruby=ゆえん>所以</ruby>。
line = "――ヒルディオーネ先輩がマムと互角と言われ、そして彼女が周りから『努力する星騎士の模範』と言われる<ruby>所以<rt>ゆえん</rt></ruby>。"

[[dialogue]]
speaker = "unk"
# それが、努力によって後天的に得た固有の星術『ミラージュブレイカー』である。
line = "それが、努力によって後天的に得た固有の星術『ミラージュブレイカー』である。"

[[dialogue]]
speaker = "unk"
# 相手の技を『物理的に破壊可能な対象』として定義し、ドリルの一撃によって打ち砕く。それはマムの強力な『引力操作』でさえも、決して例外ではない。
line = "相手の技を『物理的に破壊可能な対象』として定義し、ドリルの一撃によって打ち砕く。それはマムの強力な『引力操作』でさえも、決して例外ではない。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いかがしましたか、マム？　まさか妃竜院家の婿として、会長が惜しくなりましたの？」
line = "「いかがしましたか、マム？　まさか妃竜院家の婿として、会長が惜しくなりましたの？」"

[[dialogue]]
speaker = "マハムート"
# 「……違うわ。家は関係ない。私はただ――」
line = "「……違うわ。家は関係ない。私はただ――」"

[[dialogue]]
speaker = "マハムート"
# 「人の<b>彼氏</b>に手を出すな、とそう言いたいだけよ」
line = "「人の<b>彼氏</b>に手を出すな、とそう言いたいだけよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、さっきは否定していましたわよ？」
line = "「あら、さっきは否定していましたわよ？」"

[[dialogue]]
speaker = "マハムート"
# 「……あなた、本当は気づいていてやってるでしょう」
line = "「……あなた、本当は気づいていてやってるでしょう」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふふっ……ふふふっ、おーっほっほっほ！　バレてしまいましたか♪」
line = "「ふふっ……ふふふっ、おーっほっほっほ！　バレてしまいましたか♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「――でも、まさかあのマムが焼き餅を焼くだなんて。まるで普通の乙女みたいで、ニヤニヤを抑えるのが大変でしたわ♪」
line = "「――でも、まさかあのマムが焼き餅を焼くだなんて。まるで普通の乙女みたいで、ニヤニヤを抑えるのが大変でしたわ♪」"

[[dialogue]]
speaker = "マハムート"
# 「失礼なドリルね。引力操作でその髪、無理矢理ストレートパーマにするわよ」
line = "「失礼なドリルね。引力操作でその髪、無理矢理ストレートパーマにするわよ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーほっほっほ♪　やれるものならやってみなさい！　いくら試したところで――」
line = "「おーほっほっほ♪　やれるものならやってみなさい！　いくら試したところで――」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「千園寺家伝統の縦ロールは、ミラージュブレイカーのごとくストレートパーマを一切受け付けませんことよ！」
line = "「千園寺家伝統の縦ロールは、ミラージュブレイカーのごとくストレートパーマを一切受け付けませんことよ！」"

[[dialogue]]
speaker = "unk"
# 血筋による癖っ毛だった！？
line = "血筋による癖っ毛だった！？"

[[dialogue]]
speaker = "マハムート"
# 「……悪かったわね、ヒルディー。素直に謝るわ」
line = "「……悪かったわね、ヒルディー。素直に謝るわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「いや憐れまないで下さる！？　そこは謝る方が失礼でしてよ！？」
line = "「いや憐れまないで下さる！？　そこは謝る方が失礼でしてよ！？」"

[[dialogue]]
speaker = "unk"
# それから訓練を終えて、新星学園への帰り道。マムと２人で歩いていると――
line = "それから訓練を終えて、新星学園への帰り道。マムと２人で歩いていると――"

[[dialogue]]
speaker = "マハムート"
# 「訓練が終わっても、まだ星徒会の仕事が残ってるとはね。大変そうだけど、大丈夫なの？」
line = "「訓練が終わっても、まだ星徒会の仕事が残ってるとはね。大変そうだけど、大丈夫なの？」"

[[dialogue]]
speaker = "マハムート"
# 「――スケジュール通り？　本当かしら？」
line = "「――スケジュール通り？　本当かしら？」"

[[dialogue]]
speaker = "マハムート"
# 「って、どうしたの？　――さっきのこと？」
line = "「って、どうしたの？　――さっきのこと？」"

[[dialogue]]
speaker = "unk"
# マム、俺のことを『彼氏』って……
line = "マム、俺のことを『彼氏』って……"

[[dialogue]]
speaker = "マハムート"
# 「あれは……」
line = "「あれは……」"

[[dialogue]]
speaker = "マハムート"
# 「貴方を試すとは言ったけど、付き合っていることに……変わりはないでしょう？」
line = "「貴方を試すとは言ったけど、付き合っていることに……変わりはないでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「何か文句ある？」
line = "「何か文句ある？」"

[[dialogue]]
speaker = "unk"
# ありません！　むしろ嬉しいです！
line = "ありません！　むしろ嬉しいです！"

[[dialogue]]
speaker = "マハムート"
# 「……何よ、ヒルディオーネみたいにニヤニヤして……。でも、そういうわけだから……」
line = "「……何よ、ヒルディオーネみたいにニヤニヤして……。でも、そういうわけだから……」"

[[dialogue]]
speaker = "マハムート"
# 「貴方も変に浮気とか、するんじゃないわよ」
line = "「貴方も変に浮気とか、するんじゃないわよ」"

[[dialogue]]
speaker = "unk"
# イエス・マム！
line = "イエス・マム！"

[[dialogue]]
speaker = "マハムート"
# 「……星徒会の仕事、まだあるなら手伝ってあげるわ」
line = "「……星徒会の仕事、まだあるなら手伝ってあげるわ」"

[[dialogue]]
speaker = "unk"
# 少し照れ臭そうな顔をしながらも、一緒に星徒会室へと向かってくれるマムなのだった――
line = "少し照れ臭そうな顔をしながらも、一緒に星徒会室へと向かってくれるマムなのだった――"
