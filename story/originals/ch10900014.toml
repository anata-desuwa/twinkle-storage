[[dialogue]]
speaker = "unk"
# 第４話,絆の形,P
line = "第４話,絆の形,P"

[[dialogue]]
speaker = "unk"
# それは、トワ先生と、新しい力『ノヴァフォーム』の訓練している時のことだった。
line = "それは、トワ先生と、新しい力『ノヴァフォーム』の訓練している時のことだった。"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「――よし、Ｓランクモンスター複数でもクリア！　ノヴァフォーム、だいぶ使い慣れてきたよ」
line = "「――よし、Ｓランクモンスター複数でもクリア！　ノヴァフォーム、だいぶ使い慣れてきたよ」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「凄まじい星力を発揮できる反面、消耗は激しくて、使う時はやっぱり切り札としてだね」
line = "「凄まじい星力を発揮できる反面、消耗は激しくて、使う時はやっぱり切り札としてだね」"

[[dialogue]]
speaker = "メイプル"
# 「じ～っ……」
line = "「じ～っ……」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「ってメイプルちゃん、最近よく、私たちの訓練を見に来てるよね。何かあった？」
line = "「ってメイプルちゃん、最近よく、私たちの訓練を見に来てるよね。何かあった？」"

[[dialogue]]
speaker = "メイプル"
# 「う、ううん！　なんでもないよ、別に……！」
line = "「う、ううん！　なんでもないよ、別に……！」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「明らかに何かあるって顔だよね。ねぇ、会長くん。先生からのお願いなんだけど――」
line = "「明らかに何かあるって顔だよね。ねぇ、会長くん。先生からのお願いなんだけど――」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「メイプルちゃんのこと、任せても大丈夫かな？」
line = "「メイプルちゃんのこと、任せても大丈夫かな？」"

[[dialogue]]
speaker = "unk"
# メイプルを探しに出た俺は、校舎の方へ歩いていく後ろ姿を見つけて、声をかけた。
line = "メイプルを探しに出た俺は、校舎の方へ歩いていく後ろ姿を見つけて、声をかけた。"

[[dialogue]]
speaker = "メイプル"
# 「あっ、お兄ちゃん……」
line = "「あっ、お兄ちゃん……」"

[[dialogue]]
speaker = "unk"
# トワ先生が心配してたぞ
line = "トワ先生が心配してたぞ"

[[dialogue]]
speaker = "メイプル"
# 「うん……そうだよね。わかってる。先生を困らせたくはないんだけど……」
line = "「うん……そうだよね。わかってる。先生を困らせたくはないんだけど……」"

[[dialogue]]
speaker = "メイプル"
# 「ねぇ、お兄ちゃん、１つお願いしてもいい？」
line = "「ねぇ、お兄ちゃん、１つお願いしてもいい？」"

[[dialogue]]
speaker = "メイプル"
# 「あたしにも、『アルケインコード』を試してみてくれないかな？」
line = "「あたしにも、『アルケインコード』を試してみてくれないかな？」"

[[dialogue]]
speaker = "unk"
# アルケインコード――それはメイプルの実家、モノクラウン家が代々継承し、伝えてきたという魔王の秘伝である。
line = "アルケインコード――それはメイプルの実家、モノクラウン家が代々継承し、伝えてきたという魔王の秘伝である。"

[[dialogue]]
speaker = "unk"
# 以前、強力なモンスターと相対した際に、メイプルから教えてもらい、それを使ったことで、トワ先生は新たな力の覚醒を果たした。
line = "以前、強力なモンスターと相対した際に、メイプルから教えてもらい、それを使ったことで、トワ先生は新たな力の覚醒を果たした。"

[[dialogue]]
speaker = "unk"
# そして、覚醒するにはメイプル曰く、『魔王との絆』が必要であるらしいのだが……
line = "そして、覚醒するにはメイプル曰く、『魔王との絆』が必要であるらしいのだが……"

[[dialogue]]
speaker = "メイプル"
# 「ダメだ……やっぱり発動しない……。あたしはまだ、トワ先生みたいに覚醒できない……」
line = "「ダメだ……やっぱり発動しない……。あたしはまだ、トワ先生みたいに覚醒できない……」"

[[dialogue]]
speaker = "unk"
# どうして試してみたいと思ったんだ？
line = "どうして試してみたいと思ったんだ？"

[[dialogue]]
speaker = "メイプル"
# 「……前は気にならなかったんだけど――」
line = "「……前は気にならなかったんだけど――」"

[[dialogue]]
speaker = "メイプル"
# 「その……アルケインコードが発動できるのって、お兄ちゃんとの間に絆があるって証拠でしょ？」
line = "「その……アルケインコードが発動できるのって、お兄ちゃんとの間に絆があるって証拠でしょ？」"

[[dialogue]]
speaker = "メイプル"
# 「それで、あたしもお兄ちゃんと出会ってから、しばらく経つし……最近は仲良くなれてきたなって思ってたから……」
line = "「それで、あたしもお兄ちゃんと出会ってから、しばらく経つし……最近は仲良くなれてきたなって思ってたから……」"

[[dialogue]]
speaker = "メイプル"
# 「あたしはトワ先生と比べて、お兄ちゃんとどれぐらい仲良くなれてるのか、気になっちゃって……」
line = "「あたしはトワ先生と比べて、お兄ちゃんとどれぐらい仲良くなれてるのか、気になっちゃって……」"

[[dialogue]]
speaker = "メイプル"
# 「でも、ダメだった……あたしは、トワ先生に負けてる……」
line = "「でも、ダメだった……あたしは、トワ先生に負けてる……」"

[[dialogue]]
speaker = "unk"
# 悲しそうな顔をするメイプル。俺はそれを見て――
line = "悲しそうな顔をするメイプル。俺はそれを見て――"

[[dialogue]]
speaker = "unk"
# 絆の形って、人それぞれだと思うんだ
line = "絆の形って、人それぞれだと思うんだ"

[[dialogue]]
speaker = "メイプル"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "unk"
# 先生とは確かに信頼し合えていると思う。ただ、メイプルとの関係は、先生とはまた違うものだ。
line = "先生とは確かに信頼し合えていると思う。ただ、メイプルとの関係は、先生とはまた違うものだ。"

[[dialogue]]
speaker = "unk"
# メイプルは俺のこと、どう思ってる？
line = "メイプルは俺のこと、どう思ってる？"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃんは……優しくて、いざという時、カッコよく助けてくれる魔王で。本当のお兄ちゃんみたいだって思ってるよ」
line = "「お兄ちゃんは……優しくて、いざという時、カッコよく助けてくれる魔王で。本当のお兄ちゃんみたいだって思ってるよ」"

[[dialogue]]
speaker = "メイプル"
# 「お兄ちゃんは……？」
line = "「お兄ちゃんは……？」"

[[dialogue]]
speaker = "unk"
# 俺はちょっと違う
line = "俺はちょっと違う"

[[dialogue]]
speaker = "メイプル"
# 「まさかの妹だとは思われてなかったパターン！？」
line = "「まさかの妹だとは思われてなかったパターン！？」"

[[dialogue]]
speaker = "メイプル"
# 「――そうじゃなくて、前は妹みたいだと思ってた……？　今は違うってこと……？」
line = "「――そうじゃなくて、前は妹みたいだと思ってた……？　今は違うってこと……？」"

[[dialogue]]
speaker = "unk"
# 今の俺にとって、メイプルは可愛い女の子だ
line = "今の俺にとって、メイプルは可愛い女の子だ"

[[dialogue]]
speaker = "メイプル"
# 「……？　えっ！？　そ、それって……」
line = "「……？　えっ！？　そ、それって……」"

[[dialogue]]
speaker = "メイプル"
# 「つまり……そういうこと……？」
line = "「つまり……そういうこと……？」"

[[dialogue]]
speaker = "unk"
# 俺が頷いてみせると、彼女は顔を赤くして――
line = "俺が頷いてみせると、彼女は顔を赤くして――"

[[dialogue]]
speaker = "メイプル"
# 「そ、そっか……じゃあ確かに、絆を結べてたとは言えないよね……」
line = "「そ、そっか……じゃあ確かに、絆を結べてたとは言えないよね……」"

[[dialogue]]
speaker = "メイプル"
# 「あたし、お兄ちゃんがそんな風に思ってたなんて、気付けてなかったし……」
line = "「あたし、お兄ちゃんがそんな風に思ってたなんて、気付けてなかったし……」"

[[dialogue]]
speaker = "メイプル"
# 「で、でも……ごめん。あたし……いきなりだから、これからお兄ちゃんとどう接していけばいいのか、考えがすぐにはまとまらなくて……」
line = "「で、でも……ごめん。あたし……いきなりだから、これからお兄ちゃんとどう接していけばいいのか、考えがすぐにはまとまらなくて……」"

[[dialogue]]
speaker = "unk"
# 焦らずゆっくり考えていけばいい
line = "焦らずゆっくり考えていけばいい"

[[dialogue]]
speaker = "メイプル"
# 「う、うん……ありがとう」
line = "「う、うん……ありがとう」"

[[dialogue]]
speaker = "メイプル"
# 「あ、でも――前にデートした時、お兄ちゃんがお姫様抱っこしてくれたでしょ？」
line = "「あ、でも――前にデートした時、お兄ちゃんがお姫様抱っこしてくれたでしょ？」"

[[dialogue]]
speaker = "メイプル"
# 「あの時……本当はすごくドキドキしたの」
line = "「あの時……本当はすごくドキドキしたの」"

[[dialogue]]
speaker = "メイプル"
# 「だからその……お兄ちゃんのことが嫌なわけじゃないから、気持ちが落ち着くまで、少し待ってて欲しいかな……」
line = "「だからその……お兄ちゃんのことが嫌なわけじゃないから、気持ちが落ち着くまで、少し待ってて欲しいかな……」"

[[dialogue]]
speaker = "unk"
# 焦らずゆっくり考えていけばいい
line = "焦らずゆっくり考えていけばいい"

[[dialogue]]
speaker = "メイプル"
# 「あ……！　うん♪　そうだね、改めてお互いのことを知る為にも♪」
line = "「あ……！　うん♪　そうだね、改めてお互いのことを知る為にも♪」"

[[dialogue]]
speaker = "メイプル"
# 「にへへ……♪」
line = "「にへへ……♪」"

[[dialogue]]
speaker = "unk"
# 彼女は照れた笑顔を見せるのだった――
line = "彼女は照れた笑顔を見せるのだった――"
