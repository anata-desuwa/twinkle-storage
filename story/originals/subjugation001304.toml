[[dialogue]]
speaker = "パテル"
# 「我は死神。生者に安寧を与える者……」
line = "「我は死神。生者に安寧を与える者……」"

[[dialogue]]
speaker = "ソフィア"
# 「いきます──」
line = "「いきます──」"

[[dialogue]]
speaker = "３人"
# 「コキュートススピナー！！」
line = "「コキュートススピナー！！」"

[[dialogue]]
speaker = "パテル"
# 「試練を……乗り越えたか…………」
line = "「試練を……乗り越えたか…………」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「パテルを倒したのだ！　本来の居場所であるフィーニスの塔に戻ったのだ！」
line = "「パテルを倒したのだ！　本来の居場所であるフィーニスの塔に戻ったのだ！」"

[[dialogue]]
speaker = "ソフィア"
# 「ふぅ……無事に大役を果たせましたね。神殿の周りにいたモンスターも消えましたし」
line = "「ふぅ……無事に大役を果たせましたね。神殿の周りにいたモンスターも消えましたし」"

[[dialogue]]
speaker = "ソフィア"
# 「でも、なんでウズメもコキュートススピナーって言ったの？」
line = "「でも、なんでウズメもコキュートススピナーって言ったの？」"

[[dialogue]]
speaker = "ウズメイア"
# 「え～、だって仲間外れ寂しいじゃ～ん！　お揃いの星術とか羨ましいし～」
line = "「え～、だって仲間外れ寂しいじゃ～ん！　お揃いの星術とか羨ましいし～」"

[[dialogue]]
speaker = "舞亜"
# 「じゃあ３人で合体技作っちゃう？」
line = "「じゃあ３人で合体技作っちゃう？」"

[[dialogue]]
speaker = "ウズメイア"
# 「いいねいいね～。舞亜ちゃんとは同じ学年なのにニアミスしてばっかりでちゃんと話したことなかったから、なんか新鮮」
line = "「いいねいいね～。舞亜ちゃんとは同じ学年なのにニアミスしてばっかりでちゃんと話したことなかったから、なんか新鮮」"

[[dialogue]]
speaker = "ウズメイア"
# 「てか舞亜って呼んでいい？　同じ学年なんだし」
line = "「てか舞亜って呼んでいい？　同じ学年なんだし」"

[[dialogue]]
speaker = "舞亜"
# 「うん、もちろん。よろしくね、ウズメ」
line = "「うん、もちろん。よろしくね、ウズメ」"

[[dialogue]]
speaker = "ウズメイア"
# 「よろ～♪」
line = "「よろ～♪」"

[[dialogue]]
speaker = "ソフィア"
# （さすがウズメ、コミュニケーション能力が高い……）
line = "（さすがウズメ、コミュニケーション能力が高い……）"

[[dialogue]]
speaker = "ウズメイア"
# 「でも前から気になってたんだけどさ～、ソフィってどうして舞亜さんって呼んでるの？　同い年じゃん」
line = "「でも前から気になってたんだけどさ～、ソフィってどうして舞亜さんって呼んでるの？　同い年じゃん」"

[[dialogue]]
speaker = "ソフィア"
# 「だって、フィギュアスケーターとしては遥かに格上だし、畏れ多いし……」
line = "「だって、フィギュアスケーターとしては遥かに格上だし、畏れ多いし……」"

[[dialogue]]
speaker = "舞亜"
# 「私のライバルなんでしょ？　私に勝つんでしょ？　なら畏れ多いとか言ってないでさ」
line = "「私のライバルなんでしょ？　私に勝つんでしょ？　なら畏れ多いとか言ってないでさ」"

[[dialogue]]
speaker = "ソフィア"
# 「う……じゃ、じゃあ…………舞亜」
line = "「う……じゃ、じゃあ…………舞亜」"

[[dialogue]]
speaker = "舞亜"
# 「うん。帰ったら一緒に練習しようね、フィギュアも星術も」
line = "「うん。帰ったら一緒に練習しようね、フィギュアも星術も」"

[[dialogue]]
speaker = "ウズメイア"
# 「いいな～、あたしもスケートやってみたいな～」
line = "「いいな～、あたしもスケートやってみたいな～」"

[[dialogue]]
speaker = "ソフィア"
# 「それなら教えるよ。一度フィギュア部に遊びに来て」
line = "「それなら教えるよ。一度フィギュア部に遊びに来て」"

[[dialogue]]
speaker = "ウズメイア"
# 「やったぁ♪　絶対行くからね！」
line = "「やったぁ♪　絶対行くからね！」"

[[dialogue]]
speaker = "ラティエ"
# 「さてと……」
line = "「さてと……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あら、どこに行かれるのですか、学園長？　帰還の準備ができるまで待機のはずでは？」
line = "「あら、どこに行かれるのですか、学園長？　帰還の準備ができるまで待機のはずでは？」"

[[dialogue]]
speaker = "ラティエ"
# 「ああ、わかっているよ。だがこんな旧い神殿を訪れる機会はそうないし、せっかくだから探索しようと思ってね」
line = "「ああ、わかっているよ。だがこんな旧い神殿を訪れる機会はそうないし、せっかくだから探索しようと思ってね」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「なるほど、それなら私もご一緒したいところですわ」
line = "「なるほど、それなら私もご一緒したいところですわ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ですが……まさかそのまま旅に出ようとお考えではありませんわよね？」
line = "「ですが……まさかそのまま旅に出ようとお考えではありませんわよね？」"

[[dialogue]]
speaker = "ラティエ"
# 「ははは」
line = "「ははは」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「『ははは』ではありませんわ！　図星ではありませんの！」
line = "「『ははは』ではありませんわ！　図星ではありませんの！」"

[[dialogue]]
speaker = "イレーナ"
# 「ラティエ学園長を逃がしてはならないと、教皇庁に言い含められておりますので。大人しくしていてくださいね」
line = "「ラティエ学園長を逃がしてはならないと、教皇庁に言い含められておりますので。大人しくしていてくださいね」"

[[dialogue]]
speaker = "ラティエ"
# 「おや、教皇庁にも目を付けられていたか。困ったものだ」
line = "「おや、教皇庁にも目を付けられていたか。困ったものだ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「それはこちらのセリフですわ！　絶対に逃がしませんからね！」
line = "「それはこちらのセリフですわ！　絶対に逃がしませんからね！」"

[[dialogue]]
speaker = "カヤ"
# 「任務完了。……ふぅ」
line = "「任務完了。……ふぅ」"

[[dialogue]]
speaker = "カヤ"
# 「後は世界樹が開くまで待機。向こうに洞穴がある。寒さがマシになる」
line = "「後は世界樹が開くまで待機。向こうに洞穴がある。寒さがマシになる」"

[[dialogue]]
speaker = "サーシャ"
# 「よく知ってるのね。ズヴィエダの子じゃないのに」
line = "「よく知ってるのね。ズヴィエダの子じゃないのに」"

[[dialogue]]
speaker = "カヤ"
# 「この神殿は私が発見した。魔界の調査も私の任務だったから」
line = "「この神殿は私が発見した。魔界の調査も私の任務だったから」"

[[dialogue]]
speaker = "サーシャ"
# 「じゃあ守護天使を見つけられたのは、あなたのおかげなのね～。お礼に……ナデナデ♪」
line = "「じゃあ守護天使を見つけられたのは、あなたのおかげなのね～。お礼に……ナデナデ♪」"

[[dialogue]]
speaker = "カヤ"
# 「撫でるな。鬱陶しい」
line = "「撫でるな。鬱陶しい」"

[[dialogue]]
speaker = "ソフィア"
# 「そうなると姉さんはなかなか止まりませんよ。観念して、私の分まで撫でられてください」
line = "「そうなると姉さんはなかなか止まりませんよ。観念して、私の分まで撫でられてください」"

[[dialogue]]
speaker = "サーシャ"
# 「ナ～デナ～デ♪」
line = "「ナ～デナ～デ♪」"

[[dialogue]]
speaker = "カヤ"
# 「むぅ……」
line = "「むぅ……」"
