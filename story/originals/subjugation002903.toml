[[dialogue]]
speaker = "unk"
# 果たして、ノヴァフォームに覚醒したフニと、ヒルディオーネ先輩の手合わせの結果は――
line = "果たして、ノヴァフォームに覚醒したフニと、ヒルディオーネ先輩の手合わせの結果は――"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……ここまでですわね」
line = "「……ここまでですわね」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「はぁっ……はぁっ……！」
line = "「はぁっ……はぁっ……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私の――負けですわ。フニ」
line = "「私の――負けですわ。フニ」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「やり……ました……！　これで、お姉様の悩みを少しでも……」
line = "「やり……ました……！　これで、お姉様の悩みを少しでも……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「フニ！」
line = "「フニ！」"

[[dialogue]]
speaker = "unk"
# 先輩が駆け寄り、気を失って地面に倒れ込みそうになったフニの体を受け止める。
line = "先輩が駆け寄り、気を失って地面に倒れ込みそうになったフニの体を受け止める。"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ありがとうですわ、フニ……。私の為に……」
line = "「ありがとうですわ、フニ……。私の為に……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# （それでも……私にとって１番大切なものは――）
line = "（それでも……私にとって１番大切なものは――）"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……会長、アルケインコードのことなのですけれど」
line = "「……会長、アルケインコードのことなのですけれど」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「私、もう少し……星霊祭が始まるギリギリまで、頑張ってみたいと思いますわ」
line = "「私、もう少し……星霊祭が始まるギリギリまで、頑張ってみたいと思いますわ」"

[[dialogue]]
speaker = "unk"
# そう言って、力を使い果たして眠るフニの頭を、そっと優しく撫でるヒルディオーネ先輩なのだった――
line = "そう言って、力を使い果たして眠るフニの頭を、そっと優しく撫でるヒルディオーネ先輩なのだった――"

[[dialogue]]
speaker = "unk"
# そして、１週間後の週明け。
line = "そして、１週間後の週明け。"

[[dialogue]]
speaker = "unk"
# ついに７日間に渡って行われる星霊祭がスタートした。
line = "ついに７日間に渡って行われる星霊祭がスタートした。"

[[dialogue]]
speaker = "unk"
# 運動場の方で様々な競技が行われる中――
line = "運動場の方で様々な競技が行われる中――"

[[dialogue]]
speaker = "unk"
# アリーナの方でも、星霊舞闘会のトーナメント１回戦が開始されていた。
line = "アリーナの方でも、星霊舞闘会のトーナメント１回戦が開始されていた。"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「――ホウちゃん、一緒に行くよっ」
line = "「――ホウちゃん、一緒に行くよっ」"

[[dialogue]]
speaker = "ホウちゃん"
# 「ええ、フニ。いつでも！」
line = "「ええ、フニ。いつでも！」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「全力を燃やします！」
line = "「全力を燃やします！」"

[[dialogue]]
speaker = "２人"
# 「――ビッグバーンフェニックス！！」
line = "「――ビッグバーンフェニックス！！」"

[[dialogue]]
speaker = "新星学園星騎士"
# 「きゃっ！？　くぅっ……！」
line = "「きゃっ！？　くぅっ……！」"

[[dialogue]]
speaker = "unk"
# フェニエルのノヴァフォームが繰り出した凄まじい火力の蒼い炎が、アリーナ中央を取り囲むように展開された『仮想結界』内で炸裂する。
line = "フェニエルのノヴァフォームが繰り出した凄まじい火力の蒼い炎が、アリーナ中央を取り囲むように展開された『仮想結界』内で炸裂する。"

[[dialogue]]
speaker = "紅明"
# 『フニ選手、不死鳥ホウちゃんとのコンビネーション技が決まったーーーっ！！』
line = "『フニ選手、不死鳥ホウちゃんとのコンビネーション技が決まったーーーっ！！』"

[[dialogue]]
speaker = "unk"
# 司会を務める紅明がマイクで実況し、会場が大いに盛り上がる。
line = "司会を務める紅明がマイクで実況し、会場が大いに盛り上がる。"

[[dialogue]]
speaker = "紅明"
# 『新たにお披露目されたノヴァフォーム、これは可愛いだけじゃなくて、とんでもない強さだぞぉ～！？　見事に大勝利だ～～！』
line = "『新たにお披露目されたノヴァフォーム、これは可愛いだけじゃなくて、とんでもない強さだぞぉ～！？　見事に大勝利だ～～！』"

[[dialogue]]
speaker = "unk"
# そんなフェニエルの活躍を、観客席から見守っていたヒルディオーネ。
line = "そんなフェニエルの活躍を、観客席から見守っていたヒルディオーネ。"

[[dialogue]]
speaker = "ヒルディオーネ"
# （フニのノヴァフォーム、やはりとんでもない力ですわね。合宿で私を打ち負かしてみせた不死鳥の力……）
line = "（フニのノヴァフォーム、やはりとんでもない力ですわね。合宿で私を打ち負かしてみせた不死鳥の力……）"

[[dialogue]]
speaker = "ヒルディオーネ"
# （ですが、次の２回戦……明日戦うことになるであろう相手は――）
line = "（ですが、次の２回戦……明日戦うことになるであろう相手は――）"

[[dialogue]]
speaker = "unk"
# 星霊舞闘会２日目――
line = "星霊舞闘会２日目――"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# （まさか、こんなに早くぶつかることになるなんて……）
line = "（まさか、こんなに早くぶつかることになるなんて……）"

[[dialogue]]
speaker = "unk"
# フェニエルは２回戦の相手と、対峙する。
line = "フェニエルは２回戦の相手と、対峙する。"

[[dialogue]]
speaker = "マハムート"
# 「……フニ。あなたのノヴァフォーム、なかなか悪くないわね」
line = "「……フニ。あなたのノヴァフォーム、なかなか悪くないわね」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「マム……！」
line = "「マム……！」"

[[dialogue]]
speaker = "マハムート"
# 「最初に言っておくわ。これが何回戦だろうと関係ない」
line = "「最初に言っておくわ。これが何回戦だろうと関係ない」"

[[dialogue]]
speaker = "マハムート"
# 「竜たる私と戦う以上、今この瞬間こそが――決勝戦よ」
line = "「竜たる私と戦う以上、今この瞬間こそが――決勝戦よ」"

[[dialogue]]
speaker = "マハムート"
# 「畏怖をもって、全力でかかって来なさい」
line = "「畏怖をもって、全力でかかって来なさい」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「……イエス・マム！」
line = "「……イエス・マム！」"

[[dialogue]]
speaker = "unk"
# フェニエルと、前舞闘会の覇者・妃竜院マハムートの試合が始まるのだった――
line = "フェニエルと、前舞闘会の覇者・妃竜院マハムートの試合が始まるのだった――"
