[[dialogue]]
speaker = "unk"
# 第8話,もう１つの理由,B
line = "第8話,もう１つの理由,B"

[[dialogue]]
speaker = "unk"
# 後日。マリオンが拭き掃除をしていると――
line = "後日。マリオンが拭き掃除をしていると――"

[[dialogue]]
speaker = "マリオン"
# 「～～♪　～～～♪」
line = "「～～♪　～～～♪」"

[[dialogue]]
speaker = "キリカ"
# 「マリオンさん」
line = "「マリオンさん」"

[[dialogue]]
speaker = "マリオン"
# 「あら、キリカさん♪　今日もメイド服が似合っていて、お可愛らしいですこと<emoji=heart04>　どうされました？」
line = "「あら、キリカさん♪　今日もメイド服が似合っていて、お可愛らしいですこと<emoji=heart04>　どうされました？」"

[[dialogue]]
speaker = "マリオン"
# 「フィオナお嬢様でしたら、今は星徒会室にいらっしゃいませんけれど……」
line = "「フィオナお嬢様でしたら、今は星徒会室にいらっしゃいませんけれど……」"

[[dialogue]]
speaker = "キリカ"
# 「いえ、あなたに用があってきました」
line = "「いえ、あなたに用があってきました」"

[[dialogue]]
speaker = "マリオン"
# 「私に？　なんでしょう？」
line = "「私に？　なんでしょう？」"

[[dialogue]]
speaker = "キリカ"
# 「実は気になっていたことが１つありまして……」
line = "「実は気になっていたことが１つありまして……」"

[[dialogue]]
speaker = "キリカ"
# 「模擬戦の時に口にしていた、マリオンさんが私にメイド長の座を譲った、もう１つの理由についてです」
line = "「模擬戦の時に口にしていた、マリオンさんが私にメイド長の座を譲った、もう１つの理由についてです」"

[[dialogue]]
speaker = "マリオン"
# 「ああ、そのことですか。こちらはあの時に言っても、伝わらないだろうと思い伏せたのですが……」
line = "「ああ、そのことですか。こちらはあの時に言っても、伝わらないだろうと思い伏せたのですが……」"

[[dialogue]]
speaker = "マリオン"
# 「なんとなく……キリカさんが、昔の私に重なって見えたんですよ」
line = "「なんとなく……キリカさんが、昔の私に重なって見えたんですよ」"

[[dialogue]]
speaker = "キリカ"
# 「私がマリオンさんに……？」
line = "「私がマリオンさんに……？」"

[[dialogue]]
speaker = "マリオン"
# 「こう見えて私、流星学園に通っていた時は、キリカさんよりも真面目だったんですよ。悪い意味でね」
line = "「こう見えて私、流星学園に通っていた時は、キリカさんよりも真面目だったんですよ。悪い意味でね」"

[[dialogue]]
speaker = "マリオン"
# 「表現するなら、真面目に動くように作られた人形、というような感じでした」
line = "「表現するなら、真面目に動くように作られた人形、というような感じでした」"

[[dialogue]]
speaker = "マリオン"
# 「それで、当時の星徒会長は何を思ったのか、次の星徒会長に私を指名したんです。会長権限を使って、半ば脅して押し付けるような形で」
line = "「それで、当時の星徒会長は何を思ったのか、次の星徒会長に私を指名したんです。会長権限を使って、半ば脅して押し付けるような形で」"

[[dialogue]]
speaker = "マリオン"
# 「星徒会長になってからは大変でした。望んでなったわけでもなく……かといって真面目な私は、自分から役目を投げ出すこともできなかった。ですが――」
line = "「星徒会長になってからは大変でした。望んでなったわけでもなく……かといって真面目な私は、自分から役目を投げ出すこともできなかった。ですが――」"

[[dialogue]]
speaker = "マリオン"
# 「私はその時、星徒会長になったからこそ、自分の好きという気持ちを知ることができたのだと思っています」
line = "「私はその時、星徒会長になったからこそ、自分の好きという気持ちを知ることができたのだと思っています」"

[[dialogue]]
speaker = "マリオン"
# 「だから、私はキリカさんにも、自分の好きを知って欲しかったんです」
line = "「だから、私はキリカさんにも、自分の好きを知って欲しかったんです」"

[[dialogue]]
speaker = "マリオン"
# 「――伝わりましたかね？」
line = "「――伝わりましたかね？」"

[[dialogue]]
speaker = "キリカ"
# 「ええ。身をもって体験しましたから」
line = "「ええ。身をもって体験しましたから」"

[[dialogue]]
speaker = "マリオン"
# 「そうですか。それならよかったです」
line = "「そうですか。それならよかったです」"

[[dialogue]]
speaker = "キリカ"
# 「――前メイド長。改めて、この間はありがとうございました」
line = "「――前メイド長。改めて、この間はありがとうございました」"

[[dialogue]]
speaker = "マリオン"
# 「あら♪　いえいえ、どういたしまして。私もキリカさんが素敵に成長する姿が見られて、嬉しかったですよ」
line = "「あら♪　いえいえ、どういたしまして。私もキリカさんが素敵に成長する姿が見られて、嬉しかったですよ」"

[[dialogue]]
speaker = "キリカ"
# 「これからもメイドの師匠として、ご指導をよろしくお願い致します」
line = "「これからもメイドの師匠として、ご指導をよろしくお願い致します」"

[[dialogue]]
speaker = "マリオン"
# 「もちろんです♪」
line = "「もちろんです♪」"

[[dialogue]]
speaker = "マリオン"
# 「私にとって、これが自分の好きなことですから……うふふ<emoji=heart04>」
line = "「私にとって、これが自分の好きなことですから……うふふ<emoji=heart04>」"

[[dialogue]]
speaker = "キリカ"
# 「それと……今度は私の番です」
line = "「それと……今度は私の番です」"

[[dialogue]]
speaker = "マリオン"
# 「キリカさん……？」
line = "「キリカさん……？」"

[[dialogue]]
speaker = "キリカ"
# 「マリオンさんが道に迷った時は、私に相談してください」
line = "「マリオンさんが道に迷った時は、私に相談してください」"

[[dialogue]]
speaker = "キリカ"
# 「たとえあなたがどんな秘密を抱えていたとしても、ちゃんと話を聞きますから」
line = "「たとえあなたがどんな秘密を抱えていたとしても、ちゃんと話を聞きますから」"

[[dialogue]]
speaker = "マリオン"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マリオン"
# 「……参りましたね。そのことについて、今は上手い返しが見つかりませんが……」
line = "「……参りましたね。そのことについて、今は上手い返しが見つかりませんが……」"

[[dialogue]]
speaker = "マリオン"
# 「その言葉、しっかりと胸に結んでおきます。気にかけてくれて、ありがとう。キリカさん」
line = "「その言葉、しっかりと胸に結んでおきます。気にかけてくれて、ありがとう。キリカさん」"

[[dialogue]]
speaker = "キリカ"
# 「いえ。これでも、メイド長ですから」
line = "「いえ。これでも、メイド長ですから」"

[[dialogue]]
speaker = "マリオン"
# 「まあまあ、うふふ<emoji=heart04>」
line = "「まあまあ、うふふ<emoji=heart04>」"

[[dialogue]]
speaker = "マリオン"
# 「――さて、星徒会室の掃除も終わりますし、そろそろ別の場所に行くとしましょう♪」
line = "「――さて、星徒会室の掃除も終わりますし、そろそろ別の場所に行くとしましょう♪」"

[[dialogue]]
speaker = "マリオン"
# 「～～♪　～～～♪」
line = "「～～♪　～～～♪」"

[[dialogue]]
speaker = "？？？"
# 「ほう？　今日はいつもより機嫌がよさそうではないか、マリオンよ」
line = "「ほう？　今日はいつもより機嫌がよさそうではないか、マリオンよ」"

[[dialogue]]
speaker = "マリオン"
# 「まあ♪　これはこれは――」
line = "「まあ♪　これはこれは――」"

[[dialogue]]
speaker = "マリオン"
# 「クラウディア様。ごきげん麗しゅう♪　本日も実にお可愛らしいご尊顔ですこと<emoji=heart04>　それにセドナさんも♪」
line = "「クラウディア様。ごきげん麗しゅう♪　本日も実にお可愛らしいご尊顔ですこと<emoji=heart04>　それにセドナさんも♪」"

[[dialogue]]
speaker = "セドナ"
# 「マリオン。クラウディア様に対して、可愛いなどという気安い褒め言葉を使うなといつも……！」
line = "「マリオン。クラウディア様に対して、可愛いなどという気安い褒め言葉を使うなといつも……！」"

[[dialogue]]
speaker = "マリオン"
# 「あら、私にとっては、セドナさんも甲乙つけ難いくらいお可愛いですよ<emoji=heart04>　うふふ♪」
line = "「あら、私にとっては、セドナさんも甲乙つけ難いくらいお可愛いですよ<emoji=heart04>　うふふ♪」"

[[dialogue]]
speaker = "セドナ"
# 「そういうことを言っているのではない！　ええい、<b>貴方</b>は一体、いつからこんな風におかしくなったのか……！」
line = "「そういうことを言っているのではない！　ええい、<b>貴方</b>は一体、いつからこんな風におかしくなったのか……！」"

[[dialogue]]
speaker = "クラウディア"
# 「ふはは、余は今のマリオンの方が、昔の人形のようであった頃よりも、面白くて好きだがな♪」
line = "「ふはは、余は今のマリオンの方が、昔の人形のようであった頃よりも、面白くて好きだがな♪」"

[[dialogue]]
speaker = "クラウディア"
# 「それで？　人間界の方で、なんぞいいことでもあったのか？」
line = "「それで？　人間界の方で、なんぞいいことでもあったのか？」"

[[dialogue]]
speaker = "マリオン"
# 「ええ、実は先程、人形からのバックアップデータが定期連絡で届きまして♪」
line = "「ええ、実は先程、人形からのバックアップデータが定期連絡で届きまして♪」"

[[dialogue]]
speaker = "セドナ"
# 「マリオン……人形を通しての連絡係が貴方の仕事とはいえ、あまり人間界に入れ込みすぎないように」
line = "「マリオン……人形を通しての連絡係が貴方の仕事とはいえ、あまり人間界に入れ込みすぎないように」"

[[dialogue]]
speaker = "マリオン"
# 「わかっていますとも♪　でも、セドナさん。あなたも１度、人間界で過ごしてみるのもいいのでは？」
line = "「わかっていますとも♪　でも、セドナさん。あなたも１度、人間界で過ごしてみるのもいいのでは？」"

[[dialogue]]
speaker = "マリオン"
# 「百聞は一見に如かず。人間界のことわざですが、魔女にも言えることだと、私は思いますよ？」
line = "「百聞は一見に如かず。人間界のことわざですが、魔女にも言えることだと、私は思いますよ？」"

[[dialogue]]
speaker = "マリオン"
# 「うふふ♪」
line = "「うふふ♪」"

[[dialogue]]
speaker = "unk"
# ネビュラの魔女――マリオンは、人間界にいる人形と変わらぬ笑顔を浮かべるのだった。
line = "ネビュラの魔女――マリオンは、人間界にいる人形と変わらぬ笑顔を浮かべるのだった。"
