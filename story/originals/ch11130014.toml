line = "第４話,レナーテの素顔,P"

[[dialogue]]
speaker = "ジグ"
# 「やぁ、魔王じゃないか。もしかして私を探してここまで来たのかい？」
line = "「やぁ、魔王じゃないか。もしかして私を探してここまで来たのかい？」"

[[dialogue]]
speaker = "ジグ"
# 「私が心配……？　何かしてしまったかな？」
line = "「私が心配……？　何かしてしまったかな？」"

[[dialogue]]
speaker = "ジグ"
# 「ふむ。私がベガ出身だから<ruby=こっち>アルタイル</ruby>に馴染めてないんじゃないかって？」
line = "「ふむ。私がベガ出身だから<ruby>アルタイル<rt>こっち</rt></ruby>に馴染めてないんじゃないかって？」"

[[dialogue]]
speaker = "ジグ"
# 「それなら心配は無用だ。元リクリエの使徒だった私にも、周りは良くしてくれているよ」
line = "「それなら心配は無用だ。元リクリエの使徒だった私にも、周りは良くしてくれているよ」"

[[dialogue]]
speaker = "unk"
# 時々遠くを見てるけど
line = "時々遠くを見てるけど"

[[dialogue]]
speaker = "ジグ"
# 「おや、見ていたのか。確かに物思いに耽ることはあるけど──」
line = "「おや、見ていたのか。確かに物思いに耽ることはあるけど──」"

[[dialogue]]
speaker = "ジグ"
# 「しまった……可能性が見えてしまった。ここで私が適当にごまかしても、君が意地でも私の本心を聞こうとするだろう」
line = "「しまった……可能性が見えてしまった。ここで私が適当にごまかしても、君が意地でも私の本心を聞こうとするだろう」"

[[dialogue]]
speaker = "ジグ"
# 「だけど、私が<ruby=ベガ>故郷</ruby>のことを思い出して悲しんでいると思っているなら違うよ」
line = "「だけど、私が<ruby>故郷<rt>ベガ</rt></ruby>のことを思い出して悲しんでいると思っているなら違うよ」"

[[dialogue]]
speaker = "ジグ"
# 「うーん……どう言おうかな。まだ実感がないんだよね」
line = "「うーん……どう言おうかな。まだ実感がないんだよね」"

[[dialogue]]
speaker = "ジグ"
# 「故郷を失くした悲しみも、リクリエの使徒から解放された喜びも、どこか遠いもののように感じる」
line = "「故郷を失くした悲しみも、リクリエの使徒から解放された喜びも、どこか遠いもののように感じる」"

[[dialogue]]
speaker = "ジグ"
# 「星騎士レナーテ・Ｚ・サイフリートは死んだ……リクリエの使徒であった頃の私はそう言っていたね」
line = "「星騎士レナーテ・Ｚ・サイフリートは死んだ……リクリエの使徒であった頃の私はそう言っていたね」"

[[dialogue]]
speaker = "ジグ"
# 「ベガでは、アガサ以外は私をレナーテと呼んでいた。だけど今、レナーテと呼ばれても自分のことだという実感がない」
line = "「ベガでは、アガサ以外は私をレナーテと呼んでいた。だけど今、レナーテと呼ばれても自分のことだという実感がない」"

[[dialogue]]
speaker = "ジグ"
# 「だから、レナーテは死んだ。それは間違っていないのかもしれない」
line = "「だから、レナーテは死んだ。それは間違っていないのかもしれない」"

[[dialogue]]
speaker = "ジグ"
# 「私はベガの戦いで心折れたままの亡霊なのかもしれないね」
line = "「私はベガの戦いで心折れたままの亡霊なのかもしれないね」"

[[dialogue]]
speaker = "unk"
# ジグ……
line = "ジグ……"

[[dialogue]]
speaker = "ジグ"
# 「実はベガにいた頃から味覚も鈍くなっていてね。最近は随分良くなってはいるんだけど」
line = "「実はベガにいた頃から味覚も鈍くなっていてね。最近は随分良くなってはいるんだけど」"

[[dialogue]]
speaker = "ジグ"
# 「ついでにもうひとつ……女神様の前だから告白しておこうか」
line = "「ついでにもうひとつ……女神様の前だから告白しておこうか」"

[[dialogue]]
speaker = "ジグ"
# 「ベガやアルタイル、それにリクリエとも関係なく、私は元々人が嫌いだし、苦手なんだ」
line = "「ベガやアルタイル、それにリクリエとも関係なく、私は元々人が嫌いだし、苦手なんだ」"

[[dialogue]]
speaker = "unk"
# え……！？
line = "え……！？"

[[dialogue]]
speaker = "ジグ"
# 「別に憎いとか、どうにかしてやりたいとか思っているわけじゃないよ。少しだけ煩わしいと感じてるだけだ」
line = "「別に憎いとか、どうにかしてやりたいとか思っているわけじゃないよ。少しだけ煩わしいと感じてるだけだ」"

[[dialogue]]
speaker = "ジグ"
# 「人が集まると、何かと比べたり、比べられたりする。それが<ruby=さが>性</ruby>というもの」
line = "「人が集まると、何かと比べたり、比べられたりする。それが<ruby>性<rt>さが</rt></ruby>というもの」"

[[dialogue]]
speaker = "ジグ"
# 「だけど私は星眼のおかげで、簡単に自身の才能を開花させることができた」
line = "「だけど私は星眼のおかげで、簡単に自身の才能を開花させることができた」"

[[dialogue]]
speaker = "ジグ"
# 「だから私は何をしても勝った。勝ててしまった。勝負事が好きじゃなくて、負けた方を可哀想に思うくらいなのに」
line = "「だから私は何をしても勝った。勝ててしまった。勝負事が好きじゃなくて、負けた方を可哀想に思うくらいなのに」"

[[dialogue]]
speaker = "ジグ"
# 「私は嫉妬や羨望の視線を避けるために、星眼のことを隠し、ただ運がいいだけだと<ruby=うそぶ>嘯</ruby>くようになった」
line = "「私は嫉妬や羨望の視線を避けるために、星眼のことを隠し、ただ運がいいだけだと<ruby>嘯<rt>うそぶ</rt></ruby>くようになった」"

[[dialogue]]
speaker = "ジグ"
# 「いつしか軽薄な仮面を被り、人と距離を取るようになってしまった。……どちらからと言えば、１人で引きこもっていたい方なんだよ、私は」
line = "「いつしか軽薄な仮面を被り、人と距離を取るようになってしまった。……どちらからと言えば、１人で引きこもっていたい方なんだよ、私は」"

[[dialogue]]
speaker = "unk"
# 梨緒のことも嫌い？
line = "梨緒のことも嫌い？"

[[dialogue]]
speaker = "ジグ"
# 「アガサは……また別の意味で嫌いだね」
line = "「アガサは……また別の意味で嫌いだね」"

[[dialogue]]
speaker = "ジグ"
# 「無遠慮で、諦めが悪くて、距離を取ってもズカズカと踏み込んでくる」
line = "「無遠慮で、諦めが悪くて、距離を取ってもズカズカと踏み込んでくる」"

[[dialogue]]
speaker = "ジグ"
# 「何度敗れても懲りずに勝負を挑んできて……アガサだけは遠慮なく負かすことができた」
line = "「何度敗れても懲りずに勝負を挑んできて……アガサだけは遠慮なく負かすことができた」"

[[dialogue]]
speaker = "ジグ"
# 「結局、アガサは私を１人にさせてくれなかった」
line = "「結局、アガサは私を１人にさせてくれなかった」"

[[dialogue]]
speaker = "ジグ"
# 「まぁ、私の眼のことを知ってもなお、勝負を挑んでくる負けず嫌いにはいささか呆れるけど……アガサらしいや」
line = "「まぁ、私の眼のことを知ってもなお、勝負を挑んでくる負けず嫌いにはいささか呆れるけど……アガサらしいや」"

[[dialogue]]
speaker = "ジグ"
# 「ふぅ……ちょっと素直になりすぎたかな」
line = "「ふぅ……ちょっと素直になりすぎたかな」"

[[dialogue]]
speaker = "ジグ"
# 「私なりに君を信頼して話したのだから、他の人には内緒にしておいてくれるとありがたい」
line = "「私なりに君を信頼して話したのだから、他の人には内緒にしておいてくれるとありがたい」"

[[dialogue]]
speaker = "ジグ"
# 「とはいえ、私の本性を知ったからには、どう付き合うかは君の自由だ。軽蔑するなり距離を取るなり好きにしてくれ」
line = "「とはいえ、私の本性を知ったからには、どう付き合うかは君の自由だ。軽蔑するなり距離を取るなり好きにしてくれ」"

[[dialogue]]
speaker = "ジグ"
# 「もちろん、人嫌いだからって戦いで迷惑をかけることはしないよ。手を抜いたりしないし、必要に応じて連携も取るとも」
line = "「もちろん、人嫌いだからって戦いで迷惑をかけることはしないよ。手を抜いたりしないし、必要に応じて連携も取るとも」"

[[dialogue]]
speaker = "unk"
# 今、好きにしてくれって言った？
line = "今、好きにしてくれって言った？"

[[dialogue]]
speaker = "ジグ"
# 「……しまった。失言だった。また可能性が見えてしまったよ」
line = "「……しまった。失言だった。また可能性が見えてしまったよ」"

[[dialogue]]
speaker = "unk"
# 俺は君に寄り添いたい
line = "俺は君に寄り添いたい"

[[dialogue]]
speaker = "ジグ"
# 「寄り添う……か。余計なお世話だと言いたいところけど、好きにしてくれと言ったし、私には拒む余力もない」
line = "「寄り添う……か。余計なお世話だと言いたいところけど、好きにしてくれと言ったし、私には拒む余力もない」"

[[dialogue]]
speaker = "ジグ"
# 「君が私の性根を知った上でそう言うのなら、甘えさせてもらおうかな」
line = "「君が私の性根を知った上でそう言うのなら、甘えさせてもらおうかな」"

[[dialogue]]
speaker = "unk"
# あと、レナーテって呼んでいい？
line = "あと、レナーテって呼んでいい？"

[[dialogue]]
speaker = "ジグ"
# 「レナーテと呼ばれていれば、いずれ実感が戻ってくるかもしれない……？」
line = "「レナーテと呼ばれていれば、いずれ実感が戻ってくるかもしれない……？」"

[[dialogue]]
speaker = "ジグ"
# 「なるほど。名前で呼ばれても実感がないのではなく、呼ばれないから実感がない、と。それはありうるね」
line = "「なるほど。名前で呼ばれても実感がないのではなく、呼ばれないから実感がない、と。それはありうるね」"

[[dialogue]]
speaker = "ジグ"
# 「わかった、いいよ。君が私をどう呼ぶかは、君が決めることだしね」
line = "「わかった、いいよ。君が私をどう呼ぶかは、君が決めることだしね」"

[[dialogue]]
speaker = "ジグ"
# 「だけどレナーテと呼ぶのは、２人きりの時だけにしてくれ。その様子を人に見られると誤解を生んでしまいそうだ」
line = "「だけどレナーテと呼ぶのは、２人きりの時だけにしてくれ。その様子を人に見られると誤解を生んでしまいそうだ」"

[[dialogue]]
speaker = "ジグ"
# 「星徒会長同士の秘密──ということにしておこうじゃないか」
line = "「星徒会長同士の秘密──ということにしておこうじゃないか」"
