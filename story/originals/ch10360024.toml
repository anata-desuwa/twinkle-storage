[[dialogue]]
speaker = "unk"
# 第４話,雨と甘噛み,P
line = "第４話,雨と甘噛み,P"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ふぅ。雨、降ってきてしまいましたわね……急いで戻りませんと……」
line = "「ふぅ。雨、降ってきてしまいましたわね……急いで戻りませんと……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「──ん？　何ですの、あそこに置いてあるのは……段ボール？」
line = "「──ん？　何ですの、あそこに置いてあるのは……段ボール？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「中身は────ひぃっ！？」
line = "「中身は────ひぃっ！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あっ、緋宮会長！　こ、こちらですわ！」
line = "「あっ、緋宮会長！　こ、こちらですわ！」"

[[dialogue]]
speaker = "unk"
# 何か困った事でも！？
line = "何か困った事でも！？"

[[dialogue]]
speaker = "unk"
# 急に電話で呼び出しだなんて
line = "急に電話で呼び出しだなんて"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あ……あちらの段ボールっ！　捨て犬みたいなのですが、ど、どうすればよいのかと思って……！」
line = "「あ……あちらの段ボールっ！　捨て犬みたいなのですが、ど、どうすればよいのかと思って……！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「緋宮会長はペットショップでアルバイトの経験もあるとのこと。犬の扱いには慣れているのではなくて……！？」
line = "「緋宮会長はペットショップでアルバイトの経験もあるとのこと。犬の扱いには慣れているのではなくて……！？」"

[[dialogue]]
speaker = "unk"
# ええ、大丈夫です。開けてみますね
line = "ええ、大丈夫です。開けてみますね"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「気を付けてくださいましっ？　中を見る時は油断せず、ですわよっ？」
line = "「気を付けてくださいましっ？　中を見る時は油断せず、ですわよっ？」"

[[dialogue]]
speaker = "unk"
# 怯え切った様子の先輩を見るに、そうとう躾のなっていない凶暴な捨て犬なのかもしれない。俺は警戒しながら、そうっと段ボールを開けてみた──
line = "怯え切った様子の先輩を見るに、そうとう躾のなっていない凶暴な捨て犬なのかもしれない。俺は警戒しながら、そうっと段ボールを開けてみた──"

[[dialogue]]
speaker = "子犬"
# 「くぅ～～ん……」
line = "「くぅ～～ん……」"

[[dialogue]]
speaker = "unk"
# ──ちっっっっさ！？
line = "──ちっっっっさ！？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「小さくても犬は犬です……わ、私には無理ですの……！」
line = "「小さくても犬は犬です……わ、私には無理ですの……！」"

[[dialogue]]
speaker = "unk"
# 先輩って、犬が苦手なんですか？
line = "先輩って、犬が苦手なんですか？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「え、ええ……小さい頃にお友達が飼っていた犬に追いかけまわされて、その……を、噛まれて以来……」
line = "「え、ええ……小さい頃にお友達が飼っていた犬に追いかけまわされて、その……を、噛まれて以来……」"

[[dialogue]]
speaker = "unk"
# え、どこを噛まれたって？
line = "え、どこを噛まれたって？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「お……り、ですわ……」
line = "「お……り、ですわ……」"

[[dialogue]]
speaker = "unk"
# すみません、雨でよく聞こえないです
line = "すみません、雨でよく聞こえないです"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「あぁもう──お尻！　お尻ですわ！　逃げ回る私を嬉々として追い回して、がぶりとやられたんですの！！」
line = "「あぁもう──お尻！　お尻ですわ！　逃げ回る私を嬉々として追い回して、がぶりとやられたんですの！！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「傷痕は残りませんでしたが……うぅっ！　今でも思い出しただけで背筋が凍りますわ。あの時は本当にお尻から食べられるかと！」
line = "「傷痕は残りませんでしたが……うぅっ！　今でも思い出しただけで背筋が凍りますわ。あの時は本当にお尻から食べられるかと！」"

[[dialogue]]
speaker = "unk"
# なるほど、それで苦手に……？
line = "なるほど、それで苦手に……？"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ええ……情けないでしょう？　『<ruby=エトワール・イルソーレ>真昼の極星</ruby>』などと持て囃されておきながら、こんな子犬にも怖くて触れないのですわ……」
line = "「ええ……情けないでしょう？　『<ruby>真昼の極星<rt>エトワール・イルソーレ</rt></ruby>』などと持て囃されておきながら、こんな子犬にも怖くて触れないのですわ……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「お、恐ろしくはありますが、この子が弱っているのもわかっています。雨に濡れて、震えて可哀想で……」
line = "「お、恐ろしくはありますが、この子が弱っているのもわかっています。雨に濡れて、震えて可哀想で……」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「だ、だから緋宮会長をお呼びしたのですわ……抱き上げて、せめて濡れないところへ連れて行ってあげてくださいませんこと？」
line = "「だ、だから緋宮会長をお呼びしたのですわ……抱き上げて、せめて濡れないところへ連れて行ってあげてくださいませんこと？」"

[[dialogue]]
speaker = "子犬"
# 「きゅぅ～～……！？」
line = "「きゅぅ～～……！？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ど、どうしましたの？　会長が手を伸ばしたら、急に怯えだしましたわ……！？」
line = "「ど、どうしましたの？　会長が手を伸ばしたら、急に怯えだしましたわ……！？」"

[[dialogue]]
speaker = "unk"
# もしかしたら前の飼い主が……
line = "もしかしたら前の飼い主が……"

[[dialogue]]
speaker = "unk"
# 男性が怖いのかもしれませんね
line = "男性が怖いのかもしれませんね"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「そんなっ。では……どうすれば……？」
line = "「そんなっ。では……どうすれば……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「わ──私が抱っこするんですの！？　そんな、むむ、無理ですわっ……怖い、怖いですわ……！」
line = "「わ──私が抱っこするんですの！？　そんな、むむ、無理ですわっ……怖い、怖いですわ……！」"

[[dialogue]]
speaker = "unk"
# 俺もついていますから
line = "俺もついていますから"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「……わ、わかりましたわ。緋宮会長がいてくださるなら……ゆ、勇気を出して……」
line = "「……わ、わかりましたわ。緋宮会長がいてくださるなら……ゆ、勇気を出して……」"

[[dialogue]]
speaker = "unk"
# 恐る恐る……本当にゆっくりと、ヒルディー先輩がその両手に子犬を抱き上げる。
line = "恐る恐る……本当にゆっくりと、ヒルディー先輩がその両手に子犬を抱き上げる。"

[[dialogue]]
speaker = "子犬"
# 「くぅーん……♪　かぷっ」
line = "「くぅーん……♪　かぷっ」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ひっ！？　指を噛まれ──あ、あれ……？　痛くない、ですわ……？」
line = "「ひっ！？　指を噛まれ──あ、あれ……？　痛くない、ですわ……？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「これが……甘噛み、ですの？　あ……甘えておりますのね、この子……？」
line = "「これが……甘噛み、ですの？　あ……甘えておりますのね、この子……？」"

[[dialogue]]
speaker = "子犬"
# 「きゅー……きゅー……かぷ、かぷ……<emoji=heart04>」
line = "「きゅー……きゅー……かぷ、かぷ……<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「と──」
line = "「と──」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「とっっっても……可愛いですわ……<emoji=heart04>」
line = "「とっっっても……可愛いですわ……<emoji=heart04>」"

[[dialogue]]
speaker = "マハムート"
# 「ふぅん。それで子犬を飼うことになったのね。名前は何て言うのかしら？」
line = "「ふぅん。それで子犬を飼うことになったのね。名前は何て言うのかしら？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「『千園寺ユニバース』ですわー！　この子は我が流星寮の最年少メンバーであり、私の妹も同然！　親しみを込めて『ユニ』とお呼びなさい！」
line = "「『千園寺ユニバース』ですわー！　この子は我が流星寮の最年少メンバーであり、私の妹も同然！　親しみを込めて『ユニ』とお呼びなさい！」"

[[dialogue]]
speaker = "マハムート"
# 「『<ruby=ユニバース>宇宙</ruby>』ってまた安直なネーミングね……メスでしょう？　もっと可愛い名前を付けてあげればいいのに……」
line = "「『<ruby>宇宙<rt>ユニバース</rt></ruby>』ってまた安直なネーミングね……メスでしょう？　もっと可愛い名前を付けてあげればいいのに……」"

[[dialogue]]
speaker = "マハムート"
# 「というかあなたね、寮長が寮に動物を連れ込んだりしていいわけ？」
line = "「というかあなたね、寮長が寮に動物を連れ込んだりしていいわけ？」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　<ruby=イルソーレ>流星寮</ruby>はもう１年以上前からペット可の物件でしてよ！」
line = "「おーっほっほっほ！　<ruby>流星寮<rt>イルソーレ</rt></ruby>はもう１年以上前からペット可の物件でしてよ！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ロビーや寮内も定期的な清掃が入りますし、希望者がいればペットホテルの業者様もすぐに呼べますわ！」
line = "「ロビーや寮内も定期的な清掃が入りますし、希望者がいればペットホテルの業者様もすぐに呼べますわ！」"

[[dialogue]]
speaker = "マハムート"
# 「相変わらず、どこからそんなお金が湯水のように湧き出てくるんだか……って、あら？」
line = "「相変わらず、どこからそんなお金が湯水のように湧き出てくるんだか……って、あら？」"

[[dialogue]]
speaker = "マハムート"
# 「ユニってば、床に寝転んでお腹を見せてるわ……フフ♪　私への畏怖を全身でアピールしているのね？」
line = "「ユニってば、床に寝転んでお腹を見せてるわ……フフ♪　私への畏怖を全身でアピールしているのね？」"

[[dialogue]]
speaker = "マハムート"
# 「素直な子は好きよ。たっぷり撫でてあげるわ♪」
line = "「素直な子は好きよ。たっぷり撫でてあげるわ♪」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「ああっ、マム！　ユニのお腹を独り占めするのはずるいですわよ！　私もナデナデ……！」
line = "「ああっ、マム！　ユニのお腹を独り占めするのはずるいですわよ！　私もナデナデ……！」"

[[dialogue]]
speaker = "ユニバース"
# 「きゅぅ～～ん<emoji=heart04>」
line = "「きゅぅ～～ん<emoji=heart04>」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「おーっほっほっほ！　撫でるたびに可愛らしく鳴いて……でもよいですかユニ！　貴女はもう千園寺の一員です！」
line = "「おーっほっほっほ！　撫でるたびに可愛らしく鳴いて……でもよいですかユニ！　貴女はもう千園寺の一員です！」"

[[dialogue]]
speaker = "ヒルディオーネ"
# 「己が雑種だということは忘れなさい！　優雅かつゴージャスに！　誇り高きワンコになるのですわっ！」
line = "「己が雑種だということは忘れなさい！　優雅かつゴージャスに！　誇り高きワンコになるのですわっ！」"

[[dialogue]]
speaker = "unk"
# こうして捨てられていた子犬は『千園寺ユニバース』と名付けられ、流星寮でヒルディー先輩と共に暮らすようになるのだった──
line = "こうして捨てられていた子犬は『千園寺ユニバース』と名付けられ、流星寮でヒルディー先輩と共に暮らすようになるのだった──"
