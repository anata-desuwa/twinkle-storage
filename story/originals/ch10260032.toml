[[dialogue]]
speaker = "unk"
# 第２話,後輩と竜の先輩,P
line = "第２話,後輩と竜の先輩,P"

[[dialogue]]
speaker = "unk"
# とある放課後、俺はリーリアに頼まれ買い物に付き合っていた――
line = "とある放課後、俺はリーリアに頼まれ買い物に付き合っていた――"

[[dialogue]]
speaker = "リーリア"
# 「ありがとうございます、センパイ。マジカル感謝です☆　おかげでいい物が見つかりました♪」
line = "「ありがとうございます、センパイ。マジカル感謝です☆　おかげでいい物が見つかりました♪」"

[[dialogue]]
speaker = "リーリア"
# 「それじゃあ私、行って来ますね！」
line = "「それじゃあ私、行って来ますね！」"

[[dialogue]]
speaker = "unk"
# リーリアは自身の住んでいる場所でもある新星寮へと戻り、小さな背中に声をかける。
line = "リーリアは自身の住んでいる場所でもある新星寮へと戻り、小さな背中に声をかける。"

[[dialogue]]
speaker = "リーリア"
# 「あの、マム、今ちょっといいですか？」
line = "「あの、マム、今ちょっといいですか？」"

[[dialogue]]
speaker = "マハムート"
# 「あら、リーリア、おかえりなさい。何かしら？」
line = "「あら、リーリア、おかえりなさい。何かしら？」"

[[dialogue]]
speaker = "unk"
# その相手は、新星学園ラルーナ寮の寮長、妃竜院マハムートであった。
line = "その相手は、新星学園ラルーナ寮の寮長、妃竜院マハムートであった。"

[[dialogue]]
speaker = "リーリア"
# 「あっ、はい。ただいまです。えっと……」
line = "「あっ、はい。ただいまです。えっと……」"

[[dialogue]]
speaker = "リーリア"
# 「実は私、マムにお礼がしたくて」
line = "「実は私、マムにお礼がしたくて」"

[[dialogue]]
speaker = "マハムート"
# 「お礼？」
line = "「お礼？」"

[[dialogue]]
speaker = "リーリア"
# 「はい。マムには先日、アルカンシェルフォームになる為にお世話になったので……これ、どうぞ受け取って下さい」
line = "「はい。マムには先日、アルカンシェルフォームになる為にお世話になったので……これ、どうぞ受け取って下さい」"

[[dialogue]]
speaker = "unk"
# リーリアはマムに、紙袋を渡す。
line = "リーリアはマムに、紙袋を渡す。"

[[dialogue]]
speaker = "リーリア"
# 「中身は、新しい『ハンドフォーク』です」
line = "「中身は、新しい『ハンドフォーク』です」"

[[dialogue]]
speaker = "unk"
# それは園芸用の道具で、スコップの代わりに使ったりするものだった。
line = "それは園芸用の道具で、スコップの代わりに使ったりするものだった。"

[[dialogue]]
speaker = "マハムート"
# 「……私がこれを欲しがってるって、よく気づいたわね。もしかして、会長に聞いたのかしら？」
line = "「……私がこれを欲しがってるって、よく気づいたわね。もしかして、会長に聞いたのかしら？」"

[[dialogue]]
speaker = "リーリア"
# 「はい。マムが最近、そろそろ買い替え時かもと呟いていたとのことだったので……」
line = "「はい。マムが最近、そろそろ買い替え時かもと呟いていたとのことだったので……」"

[[dialogue]]
speaker = "マハムート"
# 「ふっ、とんだサプライズね。趣味の園芸道具を誰かにプレゼントされたのは、初めてだわ」
line = "「ふっ、とんだサプライズね。趣味の園芸道具を誰かにプレゼントされたのは、初めてだわ」"

[[dialogue]]
speaker = "リーリア"
# 「マムは実用的な物の方が嬉しいかなと思ったんですけど……どうでしたか？」
line = "「マムは実用的な物の方が嬉しいかなと思ったんですけど……どうでしたか？」"

[[dialogue]]
speaker = "マハムート"
# 「合格よ。素直に感謝しておくわ、リーリア」
line = "「合格よ。素直に感謝しておくわ、リーリア」"

[[dialogue]]
speaker = "リーリア"
# 「いえ、喜んでもらえてよかったです」
line = "「いえ、喜んでもらえてよかったです」"

[[dialogue]]
speaker = "マハムート"
# 「感謝を忘れないのはいい心がけね。でも、本当に私へお礼がしたいというのなら、これからは『新星学園の星騎士』として全力で活躍してみせなさい」
line = "「感謝を忘れないのはいい心がけね。でも、本当に私へお礼がしたいというのなら、これからは『新星学園の星騎士』として全力で活躍してみせなさい」"

[[dialogue]]
speaker = "マハムート"
# 「あなた、本当は強いんだから」
line = "「あなた、本当は強いんだから」"

[[dialogue]]
speaker = "リーリア"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "マハムート"
# 「バトルフェスタで、あなたがネビュラの魔女であり、元々はスパイであったことは、一般の星騎士まで知る事実となった」
line = "「バトルフェスタで、あなたがネビュラの魔女であり、元々はスパイであったことは、一般の星騎士まで知る事実となった」"

[[dialogue]]
speaker = "マハムート"
# 「わざわざ言いづらいことを宣言して謝罪したりせずに、こっそり元の組織に戻る選択肢はあったはずよ」
line = "「わざわざ言いづらいことを宣言して謝罪したりせずに、こっそり元の組織に戻る選択肢はあったはずよ」"

[[dialogue]]
speaker = "マハムート"
# 「でもあなたはここに残った。だったら、もう実力を隠したりせず堂々と活躍して、あなたを受け入れてくれたヒトたちの信頼に応えてみせなさい」
line = "「でもあなたはここに残った。だったら、もう実力を隠したりせず堂々と活躍して、あなたを受け入れてくれたヒトたちの信頼に応えてみせなさい」"

[[dialogue]]
speaker = "リーリア"
# 「――イエス・マム。私、マムの期待にも応えられるように、頑張ります！」
line = "「――イエス・マム。私、マムの期待にも応えられるように、頑張ります！」"

[[dialogue]]
speaker = "マハムート"
# 「ふふっ、いい返事だこと。畏怖をもって精進なさい」
line = "「ふふっ、いい返事だこと。畏怖をもって精進なさい」"

[[dialogue]]
speaker = "リーリア"
# 「あの……マムにもう１つ、相談してもいいですか？」
line = "「あの……マムにもう１つ、相談してもいいですか？」"

[[dialogue]]
speaker = "マハムート"
# 「もう１つ？　まあ、構わないわよ。後輩の相談に乗るのは、寮長の仕事だもの」
line = "「もう１つ？　まあ、構わないわよ。後輩の相談に乗るのは、寮長の仕事だもの」"

[[dialogue]]
speaker = "リーリア"
# 「無人島の時みたいに、これからもまた訓練の指導をお願いできたりとかってしますか……？」
line = "「無人島の時みたいに、これからもまた訓練の指導をお願いできたりとかってしますか……？」"

[[dialogue]]
speaker = "unk"
# 『無人島の時』というのは、バトルフェスタが始まる前、リーリアが覚醒フォームへ至ることを望んだ際に、マムの指導で行われた特訓のことであった。
line = "『無人島の時』というのは、バトルフェスタが始まる前、リーリアが覚醒フォームへ至ることを望んだ際に、マムの指導で行われた特訓のことであった。"

[[dialogue]]
speaker = "マハムート"
# 「そこまで面倒見る義理はない……と言いたいところだったけれど、いいわよ。あなたのレベルなら、私自身の訓練にもなるから、付き合ってあげるわ」
line = "「そこまで面倒見る義理はない……と言いたいところだったけれど、いいわよ。あなたのレベルなら、私自身の訓練にもなるから、付き合ってあげるわ」"

[[dialogue]]
speaker = "マハムート"
# 「いつにするか、後で希望の予定を教えなさい。それに合わせて、私もスケジュール調整をしてあげるわ」
line = "「いつにするか、後で希望の予定を教えなさい。それに合わせて、私もスケジュール調整をしてあげるわ」"

[[dialogue]]
speaker = "リーリア"
# 「ありがとうございます！　じゃあ――」
line = "「ありがとうございます！　じゃあ――」"

[[dialogue]]
speaker = "リーリア"
# 「ついでに、今度食事とかも一緒にどうですか？　せっかく仲良くなったわけですし、交流を深める為にも――」
line = "「ついでに、今度食事とかも一緒にどうですか？　せっかく仲良くなったわけですし、交流を深める為にも――」"

[[dialogue]]
speaker = "マハムート"
# 「は？　嫌よ」
line = "「は？　嫌よ」"

[[dialogue]]
speaker = "リーリア"
# 「なんでですか！？　ここはなんだかんだ、了承してくれる流れなんじゃないんですか！？」
line = "「なんでですか！？　ここはなんだかんだ、了承してくれる流れなんじゃないんですか！？」"

[[dialogue]]
speaker = "マハムート"
# 「そんなわけないでしょ。私のことを何だと思っているのよ。食事なら気の合う同級生の子たちと行けばいいじゃない」
line = "「そんなわけないでしょ。私のことを何だと思っているのよ。食事なら気の合う同級生の子たちと行けばいいじゃない」"

[[dialogue]]
speaker = "リーリア"
# 「そりゃあ友達とも食事しますよ？　てかめっちゃしてます！　私たち、仲いいんですから！」
line = "「そりゃあ友達とも食事しますよ？　てかめっちゃしてます！　私たち、仲いいんですから！」"

[[dialogue]]
speaker = "リーリア"
# 「でも、先輩後輩で仲良くする為に食事に行くってのも、社会では大事なことですよね！？」
line = "「でも、先輩後輩で仲良くする為に食事に行くってのも、社会では大事なことですよね！？」"

[[dialogue]]
speaker = "マハムート"
# 「……必要ならそうするけど、別に今、食事しながら話さなくちゃならないような案件は、特にないでしょう？」
line = "「……必要ならそうするけど、別に今、食事しながら話さなくちゃならないような案件は、特にないでしょう？」"

[[dialogue]]
speaker = "リーリア"
# 「いやいや、ウィンウィンな関係を築いて行く為には、寮長の仕事を抜きにしてプライベートな話をする機会も、時には必要ですよね！？」
line = "「いやいや、ウィンウィンな関係を築いて行く為には、寮長の仕事を抜きにしてプライベートな話をする機会も、時には必要ですよね！？」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ……全く、生意気な後輩ね」
line = "「やれやれ……全く、生意気な後輩ね」"

[[dialogue]]
speaker = "マハムート"
# 「言っておくけれど、先輩だからって奢ったりしないわよ」
line = "「言っておくけれど、先輩だからって奢ったりしないわよ」"

[[dialogue]]
speaker = "リーリア"
# 「大丈夫です！　私の方からお願いしたんですから、むしろ払わせて頂きます☆」
line = "「大丈夫です！　私の方からお願いしたんですから、むしろ払わせて頂きます☆」"

[[dialogue]]
speaker = "マハムート"
# 「は？　それじゃあ私の面子が立たないじゃない。折半に決まってるでしょ」
line = "「は？　それじゃあ私の面子が立たないじゃない。折半に決まってるでしょ」"

[[dialogue]]
speaker = "unk"
# 後日。約束通り、リーリアとマムは食事に出かけたのだが――
line = "後日。約束通り、リーリアとマムは食事に出かけたのだが――"

[[dialogue]]
speaker = "リーリア"
# 「あれ？　マム、お会計は折半だったはずじゃ……」
line = "「あれ？　マム、お会計は折半だったはずじゃ……」"

[[dialogue]]
speaker = "マハムート"
# 「面倒だから別にいいわ。その代わり、畏怖をもって感謝なさい」
line = "「面倒だから別にいいわ。その代わり、畏怖をもって感謝なさい」"

[[dialogue]]
speaker = "リーリア"
# 「……！　イエス・マム！　マジカルごちになります♪」
line = "「……！　イエス・マム！　マジカルごちになります♪」"

[[dialogue]]
speaker = "マハムート"
# 「やれやれ、いい返事だこと」
line = "「やれやれ、いい返事だこと」"

[[dialogue]]
speaker = "unk"
# 何だかんだ後輩に食事を奢ってしまうマムなのであった――
line = "何だかんだ後輩に食事を奢ってしまうマムなのであった――"
