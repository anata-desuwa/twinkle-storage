line = "「手出しは無用じゃぞ、眷族！　自分の代わりにヒトを差し出すような悪い裏切り者には、報復が必要なのじゃ！」"

[[dialogue]]
speaker = "unk"
# ――どうやら星徒会室で騒いでいたのは、俺がちょうど留守のタイミングで、サチが逃げ込んできたかららしい。
line = "――どうやら星徒会室で騒いでいたのは、俺がちょうど留守のタイミングで、サチが逃げ込んできたかららしい。"

[[dialogue]]
speaker = "サチ"
