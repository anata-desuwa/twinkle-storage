[[dialogue]]
speaker = "unk"
# 第２話,尻フェチガール,P
line = "第２話,尻フェチガール,P"

[[dialogue]]
speaker = "unk"
# 放課後、俺が星徒会室に戻ってくると、部屋の中でシズハ、サチ、プリムラの３人が何やら騒いでいた。
line = "放課後、俺が星徒会室に戻ってくると、部屋の中でシズハ、サチ、プリムラの３人が何やら騒いでいた。"

[[dialogue]]
speaker = "シズハ"
# 「さあ、今度はサチちゃんの番よ♪」
line = "「さあ、今度はサチちゃんの番よ♪」"

[[dialogue]]
speaker = "サチ"
# 「いや～！　待って！　ちょっと待って～！」
line = "「いや～！　待って！　ちょっと待って～！」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「よくもこの我を生贄に差し出してくれたな！　次は貴様の番じゃぞ、サチ～！」
line = "「よくもこの我を生贄に差し出してくれたな！　次は貴様の番じゃぞ、サチ～！」"

[[dialogue]]
speaker = "unk"
# 見れば、サチがシズハとプリムラに追いかけ回されている。
line = "見れば、サチがシズハとプリムラに追いかけ回されている。"

[[dialogue]]
speaker = "サチ"
# 「あっ、お兄さん！　助けて下さい～！　このままじゃ私――」
line = "「あっ、お兄さん！　助けて下さい～！　このままじゃ私――」"

[[dialogue]]
speaker = "サチ"
# 「２時間たっぷりお尻を揉みしだかれちゃいますぅ～～～っ！」
line = "「２時間たっぷりお尻を揉みしだかれちゃいますぅ～～～っ！」"

[[dialogue]]
speaker = "unk"
# どういう状況！？
line = "どういう状況！？"

[[dialogue]]
speaker = "unk"
# すると、サチが頭に付けている四つ葉のクローバーの髪飾りが点滅し、そこに憑依しているトレジアンナさんが喋り出す。
line = "すると、サチが頭に付けている四つ葉のクローバーの髪飾りが点滅し、そこに憑依しているトレジアンナさんが喋り出す。"

[[dialogue]]
speaker = "トレジアンナ"
# 「会長さん、実はですね～。シズハさんのいつもの面白い性癖が、また発動しまして～」
line = "「会長さん、実はですね～。シズハさんのいつもの面白い性癖が、また発動しまして～」"

[[dialogue]]
speaker = "トレジアンナ"
# 「サチさんとプリムラさんのお尻を追いかけ回しているんですよ♪」
line = "「サチさんとプリムラさんのお尻を追いかけ回しているんですよ♪」"

[[dialogue]]
speaker = "シズハ"
# 「ふふっ、別にそんな大したことじゃないわ。これはお互い仲良くする為の、コミュニケーションなんだから♪」
line = "「ふふっ、別にそんな大したことじゃないわ。これはお互い仲良くする為の、コミュニケーションなんだから♪」"

[[dialogue]]
speaker = "サチ"
# 「女の子同士でも、お尻を勝手に触ろうとするのはセクハラだからね！？」
line = "「女の子同士でも、お尻を勝手に触ろうとするのはセクハラだからね！？」"

[[dialogue]]
speaker = "シズハ"
# 「大丈夫よ♪　私だけじゃなくて、次はサチちゃんも私のお尻を触っていいから♪」
line = "「大丈夫よ♪　私だけじゃなくて、次はサチちゃんも私のお尻を触っていいから♪」"

[[dialogue]]
speaker = "サチ"
# 「それはそれでおかしいよね！？　普通のコミュニケーションじゃないよ！？」
line = "「それはそれでおかしいよね！？　普通のコミュニケーションじゃないよ！？」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
# 「我も散々、尻を揉まれたのじゃ……」
line = "「我も散々、尻を揉まれたのじゃ……」"

[[dialogue]]
speaker = "プリムラ（覚醒）"
