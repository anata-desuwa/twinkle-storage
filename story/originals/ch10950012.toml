line = "「サチのやつ、自分が逃がれる為に、尻を揉むなら我の方にすべきじゃと、シズハに差し出しおったのじゃ！」"

[[dialogue]]
speaker = "シズハ"
# 「いや～、やっぱりプリムラちゃんはいいお尻してるわよね～♪　小さい体なのに、揉み甲斐のあるプリプリもちもち肌で、青い果実って感じがして～」
line = "「いや～、やっぱりプリムラちゃんはいいお尻してるわよね～♪　小さい体なのに、揉み甲斐のあるプリプリもちもち肌で、青い果実って感じがして～」"

[[dialogue]]
speaker = "サチ"
# 「言ってることが、完全に変態のおじさんだよ！？」
line = "「言ってることが、完全に変態のおじさんだよ！？」"

[[dialogue]]
speaker = "シズハ"
# 「それで今はプリムラちゃんと協力して、サチちゃんとコミュケーションしようとしてるところなの♪」
line = "「それで今はプリムラちゃんと協力して、サチちゃんとコミュケーションしようとしてるところなの♪」"

[[dialogue]]
