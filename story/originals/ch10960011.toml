[[dialogue]]
speaker = "unk"
# 第１話,ＶＳ爆盛り,P
line = "第１話,ＶＳ爆盛り,P"

[[dialogue]]
speaker = "unk"
# コラプサーによってプリマステラが襲撃され、セレスティアを強奪される事件が起きた。
line = "コラプサーによってプリマステラが襲撃され、セレスティアを強奪される事件が起きた。"

[[dialogue]]
speaker = "unk"
# しかしカティアとマリーベルの協力のもと犯人を撃退し、セレスティアの奪還に成功。
line = "しかしカティアとマリーベルの協力のもと犯人を撃退し、セレスティアの奪還に成功。"

[[dialogue]]
speaker = "unk"
# それから数日後──
line = "それから数日後──"

[[dialogue]]
speaker = "イングリット"
# 「じーーっ」
line = "「じーーっ」"

[[dialogue]]
speaker = "unk"
# 俺は事件の犯人にストーキングされていた。
line = "俺は事件の犯人にストーキングされていた。"

[[dialogue]]
speaker = "イングリット"
# 「じーーーー……」
line = "「じーーーー……」"

[[dialogue]]
speaker = "イングリット"
# 「クク……魔王め。この私に隙を見せるとは甘いな。このまま闇討ちでもしてやろうか」
line = "「クク……魔王め。この私に隙を見せるとは甘いな。このまま闇討ちでもしてやろうか」"

[[dialogue]]
speaker = "unk"
# いや、バレバレだから
line = "いや、バレバレだから"

[[dialogue]]
speaker = "イングリット"
# 「ふっ、よく私の存在に気づいたな。少し殺気を出し過ぎたか」
line = "「ふっ、よく私の存在に気づいたな。少し殺気を出し過ぎたか」"

[[dialogue]]
speaker = "unk"
# コラプサーが堂々と何の用？
line = "コラプサーが堂々と何の用？"

[[dialogue]]
speaker = "イングリット"
# 「何の用だと？　そんなのひとつに決まっているだろう」
line = "「何の用だと？　そんなのひとつに決まっているだろう」"

[[dialogue]]
speaker = "イングリット"
# 「この私と戦え。私は今血に飢えている。早く変身しろ」
line = "「この私と戦え。私は今血に飢えている。早く変身しろ」"

[[dialogue]]
speaker = "unk"
# こんな街中では戦えない
line = "こんな街中では戦えない"

[[dialogue]]
speaker = "イングリット"
# 「何故だ？　貴様は魔王なのだろう？　悪逆の化身ではなかったのか？」
line = "「何故だ？　貴様は魔王なのだろう？　悪逆の化身ではなかったのか？」"

[[dialogue]]
speaker = "イングリット"
# 「……俺は街を守る星騎士だ？　ハンッ、魔王と呼ばれる者が随分お優しいことだな」
line = "「……俺は街を守る星騎士だ？　ハンッ、魔王と呼ばれる者が随分お優しいことだな」"

[[dialogue]]
speaker = "イングリット"
# 「だが私はどれだけ街が壊れようが構わない。私の闘争心が満たされればそれでいい……！」
line = "「だが私はどれだけ街が壊れようが構わない。私の闘争心が満たされればそれでいい……！」"

[[dialogue]]
speaker = "カティア"
# 「いいわけないワン！」
line = "「いいわけないワン！」"

[[dialogue]]
speaker = "イングリット"
# 「なんだ犬か。急に現れてどうした」
line = "「なんだ犬か。急に現れてどうした」"

[[dialogue]]
speaker = "カティア"
# 「どうもこうもないワン！　魔王様に迷惑をかけるだけじゃなくて、街まで破壊しようとするなんて許せないガオ！」
line = "「どうもこうもないワン！　魔王様に迷惑をかけるだけじゃなくて、街まで破壊しようとするなんて許せないガオ！」"

[[dialogue]]
speaker = "イングリット"
# 「フン、貴様の許しなど誰も求めていない」
line = "「フン、貴様の許しなど誰も求めていない」"

[[dialogue]]
speaker = "カティア"
# 「なんて自己中なやつだワン……。世界は自分を中心に回っているとでも思ってるんじゃないガオ？」
line = "「なんて自己中なやつだワン……。世界は自分を中心に回っているとでも思ってるんじゃないガオ？」"

[[dialogue]]
speaker = "イングリット"
# 「何を当然のことを。私の中心はこの私だ」
line = "「何を当然のことを。私の中心はこの私だ」"

[[dialogue]]
speaker = "カティア"
# 「言い切った！？　どういう育て方をしたら、こんなモンスターが生まれるガオ……」
line = "「言い切った！？　どういう育て方をしたら、こんなモンスターが生まれるガオ……」"

[[dialogue]]
speaker = "イングリット"
# 「それよりも犬、そこをどけ。私は魔王に用があるんだ」
line = "「それよりも犬、そこをどけ。私は魔王に用があるんだ」"

[[dialogue]]
speaker = "カティア"
# 「どかないワン。お前みたいな人格破綻者を魔王様に近づけるわけにはいかないワン」
line = "「どかないワン。お前みたいな人格破綻者を魔王様に近づけるわけにはいかないワン」"

[[dialogue]]
speaker = "イングリット"
# 「ならば斬り捨てるまで」
line = "「ならば斬り捨てるまで」"

[[dialogue]]
speaker = "カティア"
# 「うっ……大体この前魔王様に負けたくせに、また戦おうだなんて無謀だワン」
line = "「うっ……大体この前魔王様に負けたくせに、また戦おうだなんて無謀だワン」"

[[dialogue]]
speaker = "イングリット"
# 「私は負けてなどいない。犬と槍女が邪魔しなければ勝っていた」
line = "「私は負けてなどいない。犬と槍女が邪魔しなければ勝っていた」"

[[dialogue]]
speaker = "カティア"
# 「ザコならいてもいいって言ったのはお前だガオ」
line = "「ザコならいてもいいって言ったのはお前だガオ」"

[[dialogue]]
speaker = "イングリット"
# 「貴様との問答は時間の無駄だ。さぁ魔王、一戦交えようじゃないか」
line = "「貴様との問答は時間の無駄だ。さぁ魔王、一戦交えようじゃないか」"

[[dialogue]]
speaker = "カティア"
# 「むむむ……なら魔王様と戦う前に私と勝負だワン！」
line = "「むむむ……なら魔王様と戦う前に私と勝負だワン！」"

[[dialogue]]
speaker = "イングリット"
# 「犬が私と勝負だと？　死にたいのか？」
line = "「犬が私と勝負だと？　死にたいのか？」"

[[dialogue]]
speaker = "カティア"
# 「誰も暴力で勝負だなんて言ってないガオ！　ここは平和的に大食いバトルを挑むワン！」
line = "「誰も暴力で勝負だなんて言ってないガオ！　ここは平和的に大食いバトルを挑むワン！」"

[[dialogue]]
speaker = "イングリット"
# 「大食いバトル……？」
line = "「大食いバトル……？」"

[[dialogue]]
speaker = "カティア"
# 「そうガオ。流星市国には歴戦のフードファイターも恐れをなす爆盛り中華料理屋があるワン」
line = "「そうガオ。流星市国には歴戦のフードファイターも恐れをなす爆盛り中華料理屋があるワン」"

[[dialogue]]
speaker = "カティア"
# 「そこでスペシャルチャーハンを完食出来たら魔王様と戦っていいガオ」
line = "「そこでスペシャルチャーハンを完食出来たら魔王様と戦っていいガオ」"

[[dialogue]]
speaker = "イングリット"
# 「フン、いいだろう。たかがチャーハンなど私の敵ではない」
line = "「フン、いいだろう。たかがチャーハンなど私の敵ではない」"

[[dialogue]]
speaker = "カティア"
# 「魔王様すみません、勝手に勝負の内容を決めてしまって……この場所で戦わせないためにはこれくらいしか思いつかなくて……」
line = "「魔王様すみません、勝手に勝負の内容を決めてしまって……この場所で戦わせないためにはこれくらいしか思いつかなくて……」"

[[dialogue]]
speaker = "unk"
# 大丈夫。カティアのこと信じてるから
line = "大丈夫。カティアのこと信じてるから"

[[dialogue]]
speaker = "カティア"
# 「魔王様……！　ありがとうございますワン！」
line = "「魔王様……！　ありがとうございますワン！」"

[[dialogue]]
speaker = "イングリット"
# 「さあ犬、私をその中華料理屋に案内しろ。丁度腹が減ってきたところだ」
line = "「さあ犬、私をその中華料理屋に案内しろ。丁度腹が減ってきたところだ」"

[[dialogue]]
speaker = "カティア"
# 「付いてくるがいいワン……！　そして後悔するがいいガオ！」
line = "「付いてくるがいいワン……！　そして後悔するがいいガオ！」"

[[dialogue]]
speaker = "イングリット"
# 「この私が負けるわけがない。舐めるなよ、犬」
line = "「この私が負けるわけがない。舐めるなよ、犬」"

[[dialogue]]
speaker = "イングリット"
# 「うぐっ……！　１０キロのチャーハンなど食い切れるか……！！」
line = "「うぐっ……！　１０キロのチャーハンなど食い切れるか……！！」"

[[dialogue]]
speaker = "カティア"
# 「あんなに自信満々だったから完食されるかと思ったけど……全然余裕だったガオ」
line = "「あんなに自信満々だったから完食されるかと思ったけど……全然余裕だったガオ」"

[[dialogue]]
speaker = "イングリット"
# 「そもそも、こんな量のチャーハンを食った後で戦えるわけがないだろ！」
line = "「そもそも、こんな量のチャーハンを食った後で戦えるわけがないだろ！」"

[[dialogue]]
speaker = "カティア"
# 「今ごろ気づいたワン？　最初から魔王様と戦わせるつもりなんて、これっぽっちもなかったガオ」
line = "「今ごろ気づいたワン？　最初から魔王様と戦わせるつもりなんて、これっぽっちもなかったガオ」"

[[dialogue]]
speaker = "イングリット"
# 「犬め、<ruby=たばかった>謀った</ruby>な……！」
line = "「犬め、<ruby>謀った<rt>たばかった</rt></ruby>な……！」"

[[dialogue]]
speaker = "カティア"
# 「人聞きが悪いワン。こんなのに引っかかる方が悪いワン」
line = "「人聞きが悪いワン。こんなのに引っかかる方が悪いワン」"

[[dialogue]]
speaker = "イングリット"
# 「く……魔王よ、勝負は預けたぞ！」
line = "「く……魔王よ、勝負は預けたぞ！」"

[[dialogue]]
speaker = "カティア"
# 「ふぅ……なんとか危機は去りましたね、魔王様。街の平和が守られてよかったです……」
line = "「ふぅ……なんとか危機は去りましたね、魔王様。街の平和が守られてよかったです……」"

[[dialogue]]
speaker = "カティア"
# 「ただその……爆盛りチャーハンを１人で食べきれなかったらお金を払わないといけなくて……」
line = "「ただその……爆盛りチャーハンを１人で食べきれなかったらお金を払わないといけなくて……」"

[[dialogue]]
speaker = "unk"
# ……俺も払うよ
line = "……俺も払うよ"

[[dialogue]]
speaker = "カティア"
# 「うわーん！　魔王様すみませんっ！！」
line = "「うわーん！　魔王様すみませんっ！！」"

[[dialogue]]
speaker = "unk"
# こうして尊い犠牲によって、街は守られたのだった……
line = "こうして尊い犠牲によって、街は守られたのだった……"
