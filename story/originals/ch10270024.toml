line = "さすが日本一の電気街と呼ばれる秋葉原。パーツショップがあちこちにある。"

[[dialogue]]
speaker = "コハルコ"
# 「最近はパソコンの自作もけっこう一般的だよね。競合店が多くて困っちゃうけど、選択肢があるのは個人的には嬉しいかな」
line = "「最近はパソコンの自作もけっこう一般的だよね。競合店が多くて困っちゃうけど、選択肢があるのは個人的には嬉しいかな」"

[[dialogue]]
speaker = "コハルコ"
