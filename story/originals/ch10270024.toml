[[dialogue]]
speaker = "コハルコ"
# 「……もちろんＯＫ？　ありがとう。会長さんならそう言ってくれると思ってた」
line = "「……もちろんＯＫ？　ありがとう。会長さんならそう言ってくれると思ってた」"

[[dialogue]]
