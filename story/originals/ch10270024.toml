line = "「会長さんの新しいパソコン、２人でパーツ選んで組んでみようよ。秋葉原中を回って、１台のパソコンを作るの」"

[[dialogue]]
speaker = "コハルコ"
# 「……え、うちの店で買わなくていいのって？　それはそれで嬉しいんだけど……それじゃつまらないっていうか……」
line = "「……え、うちの店で買わなくていいのって？　それはそれで嬉しいんだけど……それじゃつまらないっていうか……」"

[[dialogue]]
speaker = "コハルコ"
# 「君と秋葉原を見て回りたいんだ。……ダメかな？」
