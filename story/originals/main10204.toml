[[dialogue]]
speaker = "unk"
# 第４話,結局、パワーがモノをいう,B
line = "第４話,結局、パワーがモノをいう,B"

[[dialogue]]
speaker = "美鶴"
# 「到着っとー……んんー？」
line = "「到着っとー……んんー？」"

[[dialogue]]
speaker = "ヨミ"
# 「なんだか様子がおかしいですね。何とはハッキリ言いづらいんですけど……」
line = "「なんだか様子がおかしいですね。何とはハッキリ言いづらいんですけど……」"

[[dialogue]]
speaker = "美鶴"
# 「わかる。なんかモヤモヤすんね」
line = "「わかる。なんかモヤモヤすんね」"

[[dialogue]]
speaker = "せつな"
# 「おお、美鶴殿、ヨミ殿！　待っていたでござる！」
line = "「おお、美鶴殿、ヨミ殿！　待っていたでござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「せつなさん、ご無事でよかったです！　何かおかしなことはありましたか？」
line = "「せつなさん、ご無事でよかったです！　何かおかしなことはありましたか？」"

[[dialogue]]
speaker = "せつな"
# 「おかしなことばかりでござるよ！」
line = "「おかしなことばかりでござるよ！」"

[[dialogue]]
speaker = "せつな"
# 「まずは手始めに、軽く見回してもお分かりの通り、いつもならばあるはずの動物の気配がしませぬ」
line = "「まずは手始めに、軽く見回してもお分かりの通り、いつもならばあるはずの動物の気配がしませぬ」"

[[dialogue]]
speaker = "美鶴"
# 「そーだね、言われてみれば」
line = "「そーだね、言われてみれば」"

[[dialogue]]
speaker = "ヨミ"
# 「獣除けがされているのでしょうか……もしくは何らかの術で近づけなくしている……？」
line = "「獣除けがされているのでしょうか……もしくは何らかの術で近づけなくしている……？」"

[[dialogue]]
speaker = "せつな"
# 「そして、もうひとつ。せつなはここでただ待っていたわけではないでござる。幾度と森に踏み込んではみたものの、いつの間にやら入口に戻ってきてしまうのでござる」
line = "「そして、もうひとつ。せつなはここでただ待っていたわけではないでござる。幾度と森に踏み込んではみたものの、いつの間にやら入口に戻ってきてしまうのでござる」"

[[dialogue]]
speaker = "美鶴"
# 「ふりだしに戻ってるってコト？　仮にも忍者のせつなを欺くって相当スゴいね」
line = "「ふりだしに戻ってるってコト？　仮にも忍者のせつなを欺くって相当スゴいね」"

[[dialogue]]
speaker = "せつな"
# 「仮ではないでござる。せつなはれっきとした、由緒正しき忍でござる！」
line = "「仮ではないでござる。せつなはれっきとした、由緒正しき忍でござる！」"

[[dialogue]]
speaker = "せつな"
# 「我が両眼にかかれば、並の異変ならば見抜けるのでござるが……これは皆目見当がつかないでござる。面妖な力が渦巻いてるのは確実でござるな」
line = "「我が両眼にかかれば、並の異変ならば見抜けるのでござるが……これは皆目見当がつかないでござる。面妖な力が渦巻いてるのは確実でござるな」"

[[dialogue]]
speaker = "ヨミ"
# 「湖に向かう道のりが、迷路になってるなんて話は、当主様からも聞いてないですしね……どうしましょう、美鶴さん。私たちも進んでみますか」
line = "「湖に向かう道のりが、迷路になってるなんて話は、当主様からも聞いてないですしね……どうしましょう、美鶴さん。私たちも進んでみますか」"

[[dialogue]]
speaker = "美鶴"
# 「行ってみなきゃわかんないしね。３人まとまってこか」
line = "「行ってみなきゃわかんないしね。３人まとまってこか」"

[[dialogue]]
speaker = "せつな"
# 「まとまってでござるか？　こういう時は手分けして探すのがセオリーではござらぬか」
line = "「まとまってでござるか？　こういう時は手分けして探すのがセオリーではござらぬか」"

[[dialogue]]
speaker = "美鶴"
# 「そんなん、いっちゃんヤバいって。１人ずつやられるのがオチだよ。Ｂ級ホラー映画でも１人で活動するヤツが真っ先に狙われるじゃん？」
line = "「そんなん、いっちゃんヤバいって。１人ずつやられるのがオチだよ。Ｂ級ホラー映画でも１人で活動するヤツが真っ先に狙われるじゃん？」"

[[dialogue]]
speaker = "せつな"
# 「確かに。乳繰り合ってるカップルも襲われがちでござるな」
line = "「確かに。乳繰り合ってるカップルも襲われがちでござるな」"

[[dialogue]]
speaker = "美鶴"
# 「あれ、せつなって映画わかる子？」
line = "「あれ、せつなって映画わかる子？」"

[[dialogue]]
speaker = "せつな"
# 「概ね、濡れ場を抜粋して観てるでござるよ」
line = "「概ね、濡れ場を抜粋して観てるでござるよ」"

[[dialogue]]
speaker = "美鶴"
# 「うちとは趣味が合わねーね」
line = "「うちとは趣味が合わねーね」"

[[dialogue]]
speaker = "美鶴"
# 「んじゃ、試しにちょっと進んでみよっか」
line = "「んじゃ、試しにちょっと進んでみよっか」"

[[dialogue]]
speaker = "ヨミ"
# 「あれ……？　あの木に書いてある『☆』って、最初につけたマークですよね」
line = "「あれ……？　あの木に書いてある『☆』って、最初につけたマークですよね」"

[[dialogue]]
speaker = "せつな"
# 「ほんの３分前でござるな。やはり先に進めぬでござろう？」
line = "「ほんの３分前でござるな。やはり先に進めぬでござろう？」"

[[dialogue]]
speaker = "ヨミ"
# 「誰かが幻惑の術でもかけているのでしょうか……」
line = "「誰かが幻惑の術でもかけているのでしょうか……」"

[[dialogue]]
speaker = "美鶴"
# 「てことは、ここに異変が起きてるってことだね」
line = "「てことは、ここに異変が起きてるってことだね」"

[[dialogue]]
speaker = "美鶴"
# 「うちらの仕事は調査なワケだしさ。『異変はありました。迷路になってました』って報告に帰るのも正解っちゃ正解だよね」
line = "「うちらの仕事は調査なワケだしさ。『異変はありました。迷路になってました』って報告に帰るのも正解っちゃ正解だよね」"

[[dialogue]]
speaker = "ヨミ"
# 「それはそうですが……迷路を生み出している原因は究明するべきじゃないでしょうか？」
line = "「それはそうですが……迷路を生み出している原因は究明するべきじゃないでしょうか？」"

[[dialogue]]
speaker = "美鶴"
# 「だよねー。この程度の調査じゃ、さすがに給料泥棒になっちゃうよね。しゃーない。もうちょっと働くか」
line = "「だよねー。この程度の調査じゃ、さすがに給料泥棒になっちゃうよね。しゃーない。もうちょっと働くか」"

[[dialogue]]
speaker = "せつな"
# 「自然発生なのか、人為的なものなのかは判明させたいところでござるな」
line = "「自然発生なのか、人為的なものなのかは判明させたいところでござるな」"

[[dialogue]]
speaker = "美鶴"
# 「なんかさ、この迷い方って何かに似てる気がしない？」
line = "「なんかさ、この迷い方って何かに似てる気がしない？」"

[[dialogue]]
speaker = "ヨミ"
# 「迷い方が……ですか？　なんでしょう？　ちょっとピンと来ませんけど……」
line = "「迷い方が……ですか？　なんでしょう？　ちょっとピンと来ませんけど……」"

[[dialogue]]
speaker = "美鶴"
# 「えーと、ほら……アレっぽいじゃん。んー……ここまで出かかってるんだけど……」
line = "「えーと、ほら……アレっぽいじゃん。んー……ここまで出かかってるんだけど……」"

[[dialogue]]
speaker = "せつな"
# 「しかし、このままでは埒が明かぬでござるな。とりあえず、攻撃してみるも一興！」
line = "「しかし、このままでは埒が明かぬでござるな。とりあえず、攻撃してみるも一興！」"

[[dialogue]]
speaker = "せつな"
# 「必殺の十字手裏剣！　とくと味わうでござる！」
line = "「必殺の十字手裏剣！　とくと味わうでござる！」"

[[dialogue]]
speaker = "ヨミ"
# 「こやーっ！？　ちょっ、せつなさーん！？」
line = "「こやーっ！？　ちょっ、せつなさーん！？」"

[[dialogue]]
speaker = "美鶴"
# 「目にも止まらぬ早業だ。止める隙もありゃしない」
line = "「目にも止まらぬ早業だ。止める隙もありゃしない」"

[[dialogue]]
speaker = "せつな"
# 「むうっ！？　手裏剣が返ってきたでござる！？」
line = "「むうっ！？　手裏剣が返ってきたでござる！？」"

[[dialogue]]
speaker = "せつな"
# 「しかし回転、角度のクセも、せつなと同一でござった。一旦受け止めて、投げ返してきたわけではないでござる。せつなの投擲と写し鏡が如きでござる」
line = "「しかし回転、角度のクセも、せつなと同一でござった。一旦受け止めて、投げ返してきたわけではないでござる。せつなの投擲と写し鏡が如きでござる」"

[[dialogue]]
speaker = "美鶴"
# 「写し鏡かー……んー……んんー？」
line = "「写し鏡かー……んー……んんー？」"

[[dialogue]]
speaker = "ヨミ"
# 「美鶴さん、どうかしました？」
line = "「美鶴さん、どうかしました？」"

[[dialogue]]
speaker = "美鶴"
# 「いつの間にか入口に戻ってる迷いの森……攻撃をそのまま反射する写し鏡……」
line = "「いつの間にか入口に戻ってる迷いの森……攻撃をそのまま反射する写し鏡……」"

[[dialogue]]
speaker = "美鶴"
# 「そうだ。この森ってミラーハウスっぽい」
line = "「そうだ。この森ってミラーハウスっぽい」"

[[dialogue]]
speaker = "せつな"
# 「ミラーハウス、でござるか？」
line = "「ミラーハウス、でござるか？」"

[[dialogue]]
speaker = "ヨミ"
# 「遊園地などにあるアトラクションですよね。四方八方を鏡に囲まれていて、まるで万華鏡みたいに」
line = "「遊園地などにあるアトラクションですよね。四方八方を鏡に囲まれていて、まるで万華鏡みたいに」"

[[dialogue]]
speaker = "せつな"
# 「得心でござる！　エッチなホテルにある鏡張りの部屋でござるな！」
line = "「得心でござる！　エッチなホテルにある鏡張りの部屋でござるな！」"

[[dialogue]]
speaker = "ヨミ"
# 「そんな部屋があるんですか！？」
line = "「そんな部屋があるんですか！？」"

[[dialogue]]
speaker = "せつな"
# 「知らないでござるか？　古き良きエロ文化と聞き及んでるでござるが」
line = "「知らないでござるか？　古き良きエロ文化と聞き及んでるでござるが」"

[[dialogue]]
speaker = "美鶴"
# 「うちも知らんよ」
line = "「うちも知らんよ」"

[[dialogue]]
speaker = "せつな"
# 「なんと……『ラーゴ・シエロ』に『エロ』が含まれていたのは伏線だったのかと思ったでござる」
line = "「なんと……『ラーゴ・シエロ』に『エロ』が含まれていたのは伏線だったのかと思ったでござる」"

[[dialogue]]
speaker = "ヨミ"
# 「確かに、入ってるなぁ……とは思ってましたけど……」
line = "「確かに、入ってるなぁ……とは思ってましたけど……」"

[[dialogue]]
speaker = "美鶴"
# 「いやその発想はなかったわ」
line = "「いやその発想はなかったわ」"

[[dialogue]]
speaker = "せつな"
# 「ヨミ殿は助平でござるなぁ」
line = "「ヨミ殿は助平でござるなぁ」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁーん！？　私だけですか！？　濡れ衣です！　せつなさんにだけは言われたくないです！」
line = "「こやぁーん！？　私だけですか！？　濡れ衣です！　せつなさんにだけは言われたくないです！」"

[[dialogue]]
speaker = "せつな"
# 「濡れ衣……濡れ衣でござるかぁ……それもまた、そこはかとなくエロスを含んだ素晴らしい単語でござるなぁ」
line = "「濡れ衣……濡れ衣でござるかぁ……それもまた、そこはかとなくエロスを含んだ素晴らしい単語でござるなぁ」"

[[dialogue]]
speaker = "ヨミ"
# 「この話、いつまで続けるんです！？」
line = "「この話、いつまで続けるんです！？」"

[[dialogue]]
speaker = "美鶴"
# 「無限ループするのは、この森だけで満足よ」
line = "「無限ループするのは、この森だけで満足よ」"

[[dialogue]]
speaker = "美鶴"
# 「ま、せつなの手裏剣攻撃のおかげで、突破の糸口は見えたね。つまり、うちらが進むのを邪魔してるのが鏡の壁っていうならさ」
line = "「ま、せつなの手裏剣攻撃のおかげで、突破の糸口は見えたね。つまり、うちらが進むのを邪魔してるのが鏡の壁っていうならさ」"

[[dialogue]]
speaker = "せつな"
# 「どうするでござるか？」
line = "「どうするでござるか？」"

[[dialogue]]
speaker = "美鶴"
# 「３人がかりの物理でぶっ壊す」
line = "「３人がかりの物理でぶっ壊す」"

[[dialogue]]
speaker = "ヨミ"
# 「力技ぁーーっ！？」
line = "「力技ぁーーっ！？」"

[[dialogue]]
speaker = "美鶴"
# 「シンプル・イズ・ベストでしょ」
line = "「シンプル・イズ・ベストでしょ」"
