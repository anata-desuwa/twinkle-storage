line = "「というわけで、出発は<b>３日後</b>よ」"

[[dialogue]]
speaker = "エグザエル"
# 「御意！」
line = "「御意！」"

[[dialogue]]
speaker = "ルネア"
# 「異世界の魔王……女神の降臨を楽しみに待ってなさい」
line = "「異世界の魔王……女神の降臨を楽しみに待ってなさい」"

[[dialogue]]
speaker = "エグザエル"
# 「ふはははは！　人間界の諸君、我が輩もこうしてリニューアルした姿で登場するが故、全裸で待機しているがいい！」
line = "「ふはははは！　人間界の諸君、我が輩もこうしてリニューアルした姿で登場するが故、全裸で待機しているがいい！」"

[[dialogue]]
speaker = "エグザエル"
# 「ということで、ルネア様も当日に履いていく勝負下着などを我が輩の中へ――」
line = "「ということで、ルネア様も当日に履いていく勝負下着などを我が輩の中へ――」"

[[dialogue]]
speaker = "ルネア"
# 「履かんわ！」
line = "「履かんわ！」"

[[dialogue]]
speaker = "エグザエル"
# 「ノォォォーーパンッ！？」
line = "「ノォォォーーパンッ！？」"

[[dialogue]]
speaker = "ルネア"
# 「いや、普通の下着を履くから！　勝負下着はシンの前だけなんだからっ」
line = "「いや、普通の下着を履くから！　勝負下着はシンの前だけなんだからっ」"

[[dialogue]]
speaker = "ルネア"
# 「とにかく、３日後のコラボイベント開始をお楽しみにね」
line = "「とにかく、３日後のコラボイベント開始をお楽しみにね」"

[[dialogue]]
speaker = "エグザエル"
# 「ルネア様の麗しき姿を、パンツを脱いで待っているがいい！」
line = "「ルネア様の麗しき姿を、パンツを脱いで待っているがいい！」"
