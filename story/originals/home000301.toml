line = "「エグザエル、あなたの新しい依り代の準備はもうできたのかしら？」"

[[dialogue]]
speaker = "エグザエル"
# 「はっ！　ド派手に『キャリーケース』を連結させて、憑依できておりますぞ！」
line = "「はっ！　ド派手に『キャリーケース』を連結させて、憑依できておりますぞ！」"

[[dialogue]]
speaker = "エグザエル"
# 「崇高なる我が創造神、ルネア様！」
line = "「崇高なる我が創造神、ルネア様！」"

[[dialogue]]
speaker = "ルネア"
# 「ふふっ、以前の棺桶もよかったけど、今回新調したキャリーケースも実にいい形状ね♪」
line = "「ふふっ、以前の棺桶もよかったけど、今回新調したキャリーケースも実にいい形状ね♪」"

[[dialogue]]
speaker = "エグザエル"
# 「ふっふっふ……この大きさならば、旅先の異世界で生意気な小娘共を中に閉じ込め、様々な衣装に着せ替えるのも自由自在……！」
line = "「ふっふっふ……この大きさならば、旅先の異世界で生意気な小娘共を中に閉じ込め、様々な衣装に着せ替えるのも自由自在……！」"

[[dialogue]]
speaker = "エグザエル"
# 「ルネア様！　向かわれる前に１度、御身が我が輩の中へと入り、着せ替えるのに問題がないか、ぜひ試して頂きたく――」
line = "「ルネア様！　向かわれる前に１度、御身が我が輩の中へと入り、着せ替えるのに問題がないか、ぜひ試して頂きたく――」"

[[dialogue]]
speaker = "ルネア"
# 「着替え、ないっ！」
line = "「着替え、ないっ！」"

[[dialogue]]
speaker = "エグザエル"
# 「ぬあはぁーーっ！？」
line = "「ぬあはぁーーっ！？」"

[[dialogue]]
speaker = "エグザエル"
# 「せ、せっかく中も派手にミラーコーティングして、全身鏡仕様にしておいたというのに……！」
line = "「せ、せっかく中も派手にミラーコーティングして、全身鏡仕様にしておいたというのに……！」"

[[dialogue]]
speaker = "ルネア"
# 「当日までに直しておきなさい！」
line = "「当日までに直しておきなさい！」"

[[dialogue]]
speaker = "ルネア"
# 「い・い・わ・ね？」
line = "「い・い・わ・ね？」"

[[dialogue]]
speaker = "エグザエル"
# 「アッ、ハイ……」
line = "「アッ、ハイ……」"

[[dialogue]]
speaker = "ルネア"
# 「全く、この天使長は相変わらず変態なんだから……」
line = "「全く、この天使長は相変わらず変態なんだから……」"

