[[dialogue]]
speaker = "unk"
# リゾート結界でたくさん読書を楽しんだモネとリップル。
line = "リゾート結界でたくさん読書を楽しんだモネとリップル。"

[[dialogue]]
speaker = "unk"
# そして寮に帰ってきたモネは、結界のお礼にリップルに膝枕をすることになり──
line = "そして寮に帰ってきたモネは、結界のお礼にリップルに膝枕をすることになり──"

[[dialogue]]
speaker = "リップル"
# 「ふふふ、モネのオヒザとっても気持ちいいで～す♪」
line = "「ふふふ、モネのオヒザとっても気持ちいいで～す♪」"

[[dialogue]]
speaker = "モネ"
# 「これでお礼になってるかわからないですけど、いっぱい堪能してください」
line = "「これでお礼になってるかわからないですけど、いっぱい堪能してください」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　今日はここがワタシのトクトウセキです♪」
line = "「ハイ♪　今日はここがワタシのトクトウセキです♪」"

[[dialogue]]
speaker = "モネ"
# 「ふふっ、リップルさんかわいいですね……なんだか、母性本能がくすぐられるかも……」
line = "「ふふっ、リップルさんかわいいですね……なんだか、母性本能がくすぐられるかも……」"

[[dialogue]]
speaker = "リップル"
# 「モネがお母さんデスか？　それはとっても似合うと思いマ～ス！」
line = "「モネがお母さんデスか？　それはとっても似合うと思いマ～ス！」"

[[dialogue]]
speaker = "モネ"
# 「えと、老けて見えるとかそういう話じゃないですよね……？」
line = "「えと、老けて見えるとかそういう話じゃないですよね……？」"

[[dialogue]]
speaker = "リップル"
# 「違いま～す。モネはホーヨーリョクがいっぱいってコトです！」
line = "「違いま～す。モネはホーヨーリョクがいっぱいってコトです！」"

[[dialogue]]
speaker = "モネ"
# 「そういう意味なら、嬉しいかも……えへへ」
line = "「そういう意味なら、嬉しいかも……えへへ」"

[[dialogue]]
speaker = "リップル"
# 「それにきっとモネはいいお母さんになれマス。モネの優しさに包まれる子どもはキット幸せだとオモイます」
line = "「それにきっとモネはいいお母さんになれマス。モネの優しさに包まれる子どもはキット幸せだとオモイます」"

[[dialogue]]
speaker = "モネ"
# 「私がお母さん……全然想像がつかないや……」
line = "「私がお母さん……全然想像がつかないや……」"

[[dialogue]]
speaker = "リップル"
# 「まずはカレシを見つけるトコロからですね♪」
line = "「まずはカレシを見つけるトコロからですね♪」"

[[dialogue]]
speaker = "モネ"
# 「かか彼氏……！？　そんなっ、私になんて恐れ多い……！」
line = "「かか彼氏……！？　そんなっ、私になんて恐れ多い……！」"

[[dialogue]]
speaker = "リップル"
# 「ワタシが男の子だったら、きっとモネにメロメロになりマスよ？　それくらいモネはミリョク的で～す！」
line = "「ワタシが男の子だったら、きっとモネにメロメロになりマスよ？　それくらいモネはミリョク的で～す！」"

[[dialogue]]
speaker = "モネ"
# 「そ、そんな……照れちゃいますよ……」
line = "「そ、そんな……照れちゃいますよ……」"

[[dialogue]]
speaker = "リップル"
# 「照れてるモネもカワイイです♪　ますますメロメロになりま～す♪」
line = "「照れてるモネもカワイイです♪　ますますメロメロになりま～す♪」"

[[dialogue]]
speaker = "モネ"
# 「そういうリップルさんも、かわいい女の子なんですからねっ」
line = "「そういうリップルさんも、かわいい女の子なんですからねっ」"

[[dialogue]]
speaker = "リップル"
# 「アリガトございます！　モネに褒められてと～ってもウレシイです♪」
line = "「アリガトございます！　モネに褒められてと～ってもウレシイです♪」"

[[dialogue]]
speaker = "モネ"
# 「全然照れない……さすが陽の存在……。褒められた時の反応が１００点満点すぎるよ……」
line = "「全然照れない……さすが陽の存在……。褒められた時の反応が１００点満点すぎるよ……」"

[[dialogue]]
speaker = "リップル"
# 「そんなコトより、モネにまた本を読んでモライたいです」
line = "「そんなコトより、モネにまた本を読んでモライたいです」"

[[dialogue]]
speaker = "モネ"
# 「リゾート結界であんなに本を読んだのにですか？　もしかして本の楽しさに目覚めてくれたんです？」
line = "「リゾート結界であんなに本を読んだのにですか？　もしかして本の楽しさに目覚めてくれたんです？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ♪　モネと読んだ本はどれもＢＩＧハッピーでした♪　本のこともモネと同じくらいダイスキです♪」
line = "「ハイ♪　モネと読んだ本はどれもＢＩＧハッピーでした♪　本のこともモネと同じくらいダイスキです♪」"

[[dialogue]]
speaker = "モネ"
# 「本好きに目覚めてくれるなんて……嬉しいですリップルさん！」
line = "「本好きに目覚めてくれるなんて……嬉しいですリップルさん！」"

[[dialogue]]
speaker = "リップル"
# 「でもまだ１人で読むのはムツカシイです。だからモネに読んでホシイです」
line = "「でもまだ１人で読むのはムツカシイです。だからモネに読んでホシイです」"

[[dialogue]]
speaker = "モネ"
# 「うん、それじゃあ……私の一番好きな絵本を読んであげますね」
line = "「うん、それじゃあ……私の一番好きな絵本を読んであげますね」"

[[dialogue]]
speaker = "リップル"
# 「モネのナンバーワンですか？　それはタノシミです！」
line = "「モネのナンバーワンですか？　それはタノシミです！」"

[[dialogue]]
speaker = "モネ"
# 「うん、私の一番の……クリスマスの思い出が詰まった絵本を……」
line = "「うん、私の一番の……クリスマスの思い出が詰まった絵本を……」"

[[dialogue]]
speaker = "モネ"
# （私がリップルさんに読んであげたのは、おじいちゃんにもらったあの絵本）
line = "（私がリップルさんに読んであげたのは、おじいちゃんにもらったあの絵本）"

[[dialogue]]
speaker = "モネ"
# （まるで母が子にするように、優しく頭を撫でてあげながら）
line = "（まるで母が子にするように、優しく頭を撫でてあげながら）"

[[dialogue]]
speaker = "モネ"
# （あのクリスマスの日に、おじいちゃんがしてくれたように、ゆっくり読み聞かせました）
line = "（あのクリスマスの日に、おじいちゃんがしてくれたように、ゆっくり読み聞かせました）"

[[dialogue]]
speaker = "リップル"
# 「……とってもステキな絵本でした。クリスマスがテーマの本はハッピーな気持ちにナレます」
line = "「……とってもステキな絵本でした。クリスマスがテーマの本はハッピーな気持ちにナレます」"

[[dialogue]]
speaker = "モネ"
# 「はい。子どもの頃から大好きで何度も何度も読み返してるんです」
line = "「はい。子どもの頃から大好きで何度も何度も読み返してるんです」"

[[dialogue]]
speaker = "リップル"
# 「ワタシ、クリスマスのコト知れてよかったです」
line = "「ワタシ、クリスマスのコト知れてよかったです」"

[[dialogue]]
speaker = "モネ"
# 「私もリップルさんのおかげでクリスマスのことがもっと好きになれました」
line = "「私もリップルさんのおかげでクリスマスのことがもっと好きになれました」"

[[dialogue]]
speaker = "リップル"
# 「誰かをヨロコバせたい。大好きな誰かと一緒にタノシミたい……クリスマスはそんなハッピーが集まった、特別な日ナンですね」
line = "「誰かをヨロコバせたい。大好きな誰かと一緒にタノシミたい……クリスマスはそんなハッピーが集まった、特別な日ナンですね」"

[[dialogue]]
speaker = "リップル"
# 「んん～～～！　今からクリスマスの日が楽しみにナッテきました！」
line = "「んん～～～！　今からクリスマスの日が楽しみにナッテきました！」"

[[dialogue]]
speaker = "リップル"
# 「モネ、一緒にステキなクリスマスを過ごしまショウね！」
line = "「モネ、一緒にステキなクリスマスを過ごしまショウね！」"

[[dialogue]]
speaker = "モネ"
# 「はい！　リゾート結界でいっぱい楽しみましょう！」
line = "「はい！　リゾート結界でいっぱい楽しみましょう！」"
