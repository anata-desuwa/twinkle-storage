[[dialogue]]
speaker = "unk"
# 第４話,再び戦いの地へ,B
line = "第４話,再び戦いの地へ,B"

[[dialogue]]
speaker = "メルエル"
# 「会長くん。私は神殿の中じゃ戦えないし、聖庭園に戻るよ」
line = "「会長くん。私は神殿の中じゃ戦えないし、聖庭園に戻るよ」"

[[dialogue]]
speaker = "メルエル"
# 「リガルタ様──今はまだお父さんだと思えないけど……お父さんが残したアルケインコードが役に立つかもしれない」
line = "「リガルタ様──今はまだお父さんだと思えないけど……お父さんが残したアルケインコードが役に立つかもしれない」"

[[dialogue]]
speaker = "メルエル"
# 「それに、今起きてることを聖庭園のみんなに伝えないと！」
line = "「それに、今起きてることを聖庭園のみんなに伝えないと！」"

[[dialogue]]
speaker = "メルエル"
# 「万が一、女神様の神殿が止められなかったら、聖庭園のみんなが潰されちゃう」
line = "「万が一、女神様の神殿が止められなかったら、聖庭園のみんなが潰されちゃう」"

[[dialogue]]
speaker = "メルエル"
# 「神殿が聖庭園にぶつかったら、天使はみんな消えちゃうかもしれないけど、念のため避難はしておいた方がいいと思うんだ」
line = "「神殿が聖庭園にぶつかったら、天使はみんな消えちゃうかもしれないけど、念のため避難はしておいた方がいいと思うんだ」"

[[dialogue]]
speaker = "クロト"
# 「確かに……できることはしておいた方がいいか」
line = "「確かに……できることはしておいた方がいいか」"

[[dialogue]]
speaker = "unk"
# この状況では、聖庭園にどんな被害が及ぶかわからない。
line = "この状況では、聖庭園にどんな被害が及ぶかわからない。"

[[dialogue]]
speaker = "unk"
# 聖庭園に滞在している人間や魔族もいるかもしれないし、避難するに越したことはないだろう。
line = "聖庭園に滞在している人間や魔族もいるかもしれないし、避難するに越したことはないだろう。"

[[dialogue]]
speaker = "アポロ"
# 「神殿を止める以外にも、激突を避ける方法があればいいんだが……」
line = "「神殿を止める以外にも、激突を避ける方法があればいいんだが……」"

[[dialogue]]
speaker = "メルエル"
# 「女神様の神殿と聖庭園がぶつからないようにする方法…………あ！」
line = "「女神様の神殿と聖庭園がぶつからないようにする方法…………あ！」"

[[dialogue]]
speaker = "アポロ"
# 「メルエル？　何か思いついたのか？」
line = "「メルエル？　何か思いついたのか？」"

[[dialogue]]
speaker = "メルエル"
# 「うん、聖庭園の土地というか、空中島を壊しちゃえばいいんだよ！」
line = "「うん、聖庭園の土地というか、空中島を壊しちゃえばいいんだよ！」"

[[dialogue]]
speaker = "アポロ"
# 「はぁっ！？」
line = "「はぁっ！？」"

[[dialogue]]
speaker = "クロト"
# 「聖庭園を……壊す……？」
line = "「聖庭園を……壊す……？」"

[[dialogue]]
speaker = "unk"
# メルエルの口から出た、思いもよらない提案に一瞬耳を疑った。
line = "メルエルの口から出た、思いもよらない提案に一瞬耳を疑った。"

[[dialogue]]
speaker = "メルエル"
# 「もちろん最悪の場合の話だけど、聖庭園がその軌道上になければ、神殿がぶつかることはないでしょ？」
line = "「もちろん最悪の場合の話だけど、聖庭園がその軌道上になければ、神殿がぶつかることはないでしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「聖庭園は故郷だし、大事な場所だけど、天界そのものがなくなるよりはいいよ！」
line = "「聖庭園は故郷だし、大事な場所だけど、天界そのものがなくなるよりはいいよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほど！　確かに一理あるわね！」
line = "「なるほど！　確かに一理あるわね！」"

[[dialogue]]
speaker = "アポロ"
# （メルエルって意外と脳筋なところがあるな……）
line = "（メルエルって意外と脳筋なところがあるな……）"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ、ジグを倒すのに賭けるしかないよりはマシじゃない？」
line = "「まぁ、ジグを倒すのに賭けるしかないよりはマシじゃない？」"

[[dialogue]]
speaker = "ナターシャ"
# 「壊すんじゃなくても、神殿みたいに動かす方法はあるかもしれないし、聖庭園の議会の連中に提案してみる価値はあると思うよ」
line = "「壊すんじゃなくても、神殿みたいに動かす方法はあるかもしれないし、聖庭園の議会の連中に提案してみる価値はあると思うよ」"

[[dialogue]]
speaker = "メルエル"
# 「うん。その案を伝えるためにも、私は聖庭園に向かうね！」
line = "「うん。その案を伝えるためにも、私は聖庭園に向かうね！」"

[[dialogue]]
speaker = "アポロ"
# 「ならあたしも行くぞ！　神殿の中じゃ戦えないし、本当に聖庭園の空中島をバラバラにする必要があるなら、魔王の力が要るかもしれない」
line = "「ならあたしも行くぞ！　神殿の中じゃ戦えないし、本当に聖庭園の空中島をバラバラにする必要があるなら、魔王の力が要るかもしれない」"

[[dialogue]]
speaker = "チナ"
# 「じゃあアタシの極星従騎に乗れ」
line = "「じゃあアタシの極星従騎に乗れ」"

[[dialogue]]
speaker = "チナ"
# 「リクリエの使徒は気になるが、戦えないグレイスとレティシアを連れていくのは危険だし、アタシも聖庭園に戻る」
line = "「リクリエの使徒は気になるが、戦えないグレイスとレティシアを連れていくのは危険だし、アタシも聖庭園に戻る」"

[[dialogue]]
speaker = "グレイス"
# 「うぅ、面目ない……」
line = "「うぅ、面目ない……」"

[[dialogue]]
speaker = "unk"
# メルエルと、アポロ、極星星徒会の３人は聖庭園に戻ることになった。
line = "メルエルと、アポロ、極星星徒会の３人は聖庭園に戻ることになった。"

[[dialogue]]
speaker = "unk"
# 改めてジグと戦うメンバーを決めなければいけないが、消去法でいくと──
line = "改めてジグと戦うメンバーを決めなければいけないが、消去法でいくと──"

[[dialogue]]
speaker = "梨緒"
# 「さっきは却下されたが、やはり私が行こう」
line = "「さっきは却下されたが、やはり私が行こう」"

[[dialogue]]
speaker = "梨緒"
# 「魔王の力が使えない今、リクリエの使徒であるジグに対抗できる可能性があるのは、私の中の守護天使ノルンの力だけだ」
line = "「魔王の力が使えない今、リクリエの使徒であるジグに対抗できる可能性があるのは、私の中の守護天使ノルンの力だけだ」"

[[dialogue]]
speaker = "梨緒"
# 「そのノルンの力も未知数ではあるが、それに頼るしかない」
line = "「そのノルンの力も未知数ではあるが、それに頼るしかない」"

[[dialogue]]
speaker = "ナターシャ"
# 「ま……正直今の梨緒を行かせたくはないけど、仕方ないか。そもそも頭数が足りてないし」
line = "「ま……正直今の梨緒を行かせたくはないけど、仕方ないか。そもそも頭数が足りてないし」"

[[dialogue]]
speaker = "ナターシャ"
# 「もちろん私も行くよ。天使全員の命が懸かってるしね」
line = "「もちろん私も行くよ。天使全員の命が懸かってるしね」"

[[dialogue]]
speaker = "ベアトリス"
# 「私も戦うよ！　天使のみんなを消させたりしないから！」
line = "「私も戦うよ！　天使のみんなを消させたりしないから！」"

[[dialogue]]
speaker = "unk"
# 今の戦力で、ジグと戦えるのは梨緒、ナターシャ、ベアトリスの３人だけ。
line = "今の戦力で、ジグと戦えるのは梨緒、ナターシャ、ベアトリスの３人だけ。"

[[dialogue]]
speaker = "unk"
# 本来は率先して戦うのが星徒会の役目だが、ここは選挙管理委員会の３人に託すしかない。
line = "本来は率先して戦うのが星徒会の役目だが、ここは選挙管理委員会の３人に託すしかない。"

[[dialogue]]
speaker = "クロト"
# 「すまないが、ジグのことは任せる。言いたくはないけど、天界の命運は梨緒たちに懸かっている」
line = "「すまないが、ジグのことは任せる。言いたくはないけど、天界の命運は梨緒たちに懸かっている」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、理解している。ここでジグに勝てなければ、天界に……そしてアルタイルに未来はない」
line = "「ああ、理解している。ここでジグに勝てなければ、天界に……そしてアルタイルに未来はない」"

[[dialogue]]
speaker = "アポロ"
# 「悪い……あたしも一緒に戦いたいが、一緒に行っても足手まといになるだけだ」
line = "「悪い……あたしも一緒に戦いたいが、一緒に行っても足手まといになるだけだ」"

[[dialogue]]
speaker = "アポロ"
# 「頼んだぞ。梨緒、ベアト、ナターシャ」
line = "「頼んだぞ。梨緒、ベアト、ナターシャ」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、アポロちゃんの分まで戦うよ」
line = "「うん、アポロちゃんの分まで戦うよ」"

[[dialogue]]
speaker = "ナターシャ"
# 「生きてまた会えるといいね」
line = "「生きてまた会えるといいね」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、必ずジグに勝つ」
line = "「ああ、必ずジグに勝つ」"

[[dialogue]]
speaker = "梨緒"
# 「……では行こう。時間は限られている」
line = "「……では行こう。時間は限られている」"

[[dialogue]]
speaker = "unk"
# チナの極星従騎には、チナ本人と、メルエル、アポロ、グレイス、レティシア。
line = "チナの極星従騎には、チナ本人と、メルエル、アポロ、グレイス、レティシア。"

[[dialogue]]
speaker = "unk"
# ベアトリスの極星従騎には、梨緒、ベアトリス、ナターシャ。
line = "ベアトリスの極星従騎には、梨緒、ベアトリス、ナターシャ。"

[[dialogue]]
speaker = "unk"
# 神殿の外に出て飛べるようになった俺とヴィーナスは、その場で待機して、２騎が飛び立つのを見送ろうとしたが──
line = "神殿の外に出て飛べるようになった俺とヴィーナスは、その場で待機して、２騎が飛び立つのを見送ろうとしたが──"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルァアッ！」
line = "「グルルァアッ！」"

[[dialogue]]
speaker = "クロト"
# 「ジグが連れてきた機械型モンスターか！」
line = "「ジグが連れてきた機械型モンスターか！」"

[[dialogue]]
speaker = "unk"
# どうやら神殿の外に離脱した俺たちを見逃すつもりはないらしい。
line = "どうやら神殿の外に離脱した俺たちを見逃すつもりはないらしい。"

[[dialogue]]
speaker = "unk"
# だが神殿の外なら、魔王因子への干渉も届かない。俺もヴィーナスも戦える。
line = "だが神殿の外なら、魔王因子への干渉も届かない。俺もヴィーナスも戦える。"

[[dialogue]]
speaker = "unk"
# 神殿内で戦う梨緒たちの敵が少しでも減るよう、俺たちも戦わなければ……！
line = "神殿内で戦う梨緒たちの敵が少しでも減るよう、俺たちも戦わなければ……！"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス、モンスターを迎撃するぞ！」
line = "「ヴィーナス、モンスターを迎撃するぞ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、木っ端ミジンコにしてやるわ！」
line = "「ええ、木っ端ミジンコにしてやるわ！」"
