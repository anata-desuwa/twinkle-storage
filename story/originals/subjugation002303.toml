[[dialogue]]
speaker = "unk"
# あまりにも埒が明かないので、エッチな話題はまた今度ということにしてもらって、改めてクーシェンの身の上話を聞かせてもらうことにした。
line = "あまりにも埒が明かないので、エッチな話題はまた今度ということにしてもらって、改めてクーシェンの身の上話を聞かせてもらうことにした。"

[[dialogue]]
speaker = "クーシェン"
# 「――親？　そんなものはいないよ！　さっきも言ったけど、ボクは大岩の中から生まれたんだから！」
line = "「――親？　そんなものはいないよ！　さっきも言ったけど、ボクは大岩の中から生まれたんだから！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「生まれた場所も、岩から生まれたって逸話も、悟空のまんまなんだよね～」
line = "「生まれた場所も、岩から生まれたって逸話も、悟空のまんまなんだよね～」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「２０００年前は、お師匠様が親代わりみたいなものだったんだけど、今回はそういう人にはまだ出会えてないって感じかな？」
line = "「２０００年前は、お師匠様が親代わりみたいなものだったんだけど、今回はそういう人にはまだ出会えてないって感じかな？」"

[[dialogue]]
speaker = "unk"
# ちなみに、クーシェンが起きたのはいつ頃なんだ？
line = "ちなみに、クーシェンが起きたのはいつ頃なんだ？"

[[dialogue]]
speaker = "クーシェン"
# 「えっと、ボクが目覚めたのは……」
line = "「えっと、ボクが目覚めたのは……」"

[[dialogue]]
speaker = "unk"
# それからクーシェンが告げた時期は――
line = "それからクーシェンが告げた時期は――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「それって……ちょうど『オペレーション・ペンタグラム』が行われた頃なんじゃ？」
line = "「それって……ちょうど『オペレーション・ペンタグラム』が行われた頃なんじゃ？」"

[[dialogue]]
speaker = "unk"
# オペレーション・ペンタグラム――それは黒騎士によって魔界各地に封印された守護天使５柱を解放する為、新星学園、流星学園、ネビュラが協力して行った作戦のことである。
line = "オペレーション・ペンタグラム――それは黒騎士によって魔界各地に封印された守護天使５柱を解放する為、新星学園、流星学園、ネビュラが協力して行った作戦のことである。"

[[dialogue]]
speaker = "unk"
# これにより守護天使の解放に成功し、俺たちは世界の秩序を守ることができたのだが――
line = "これにより守護天使の解放に成功し、俺たちは世界の秩序を守ることができたのだが――"

[[dialogue]]
speaker = "クーシェン"
# 「しゅごてんし……？　よくわからないけど、そんなことがあったんだ……」
line = "「しゅごてんし……？　よくわからないけど、そんなことがあったんだ……」"

[[dialogue]]
speaker = "クーシェン"
# 「言われてみると、目覚める前に何か禍々しい力のようなものを感じたんだよね～。それで気が付いたら、岩が割れて、そこにいたって感じで……」
line = "「言われてみると、目覚める前に何か禍々しい力のようなものを感じたんだよね～。それで気が付いたら、岩が割れて、そこにいたって感じで……」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「悟空は強い相手と戦うのが、めちゃめちゃ好きだったからね～。アタシたちと守護天使の壮絶なバトルの気配を感じて、起きたのかも？」
line = "「悟空は強い相手と戦うのが、めちゃめちゃ好きだったからね～。アタシたちと守護天使の壮絶なバトルの気配を感じて、起きたのかも？」"

[[dialogue]]
speaker = "クーシェン"
# 「うんっ！　強いヒトと戦うのはボクも大好きだよっ♪」
line = "「うんっ！　強いヒトと戦うのはボクも大好きだよっ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「マリオンにここへ連れて来てもらったのも、ここには強い星騎士が沢山いて、その中でも最強って言われてる魔王と手合わせしてみたかったからだし！」
line = "「マリオンにここへ連れて来てもらったのも、ここには強い星騎士が沢山いて、その中でも最強って言われてる魔王と手合わせしてみたかったからだし！」"

[[dialogue]]
speaker = "クーシェン"
# 「それに今は――紅明とも戦ってみたい！」
line = "「それに今は――紅明とも戦ってみたい！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「およ？　アタシ？」
line = "「およ？　アタシ？」"

[[dialogue]]
speaker = "クーシェン"
# 「うん♪　その衣装から、とてつもなく強い星力を感じて……ボク、すっごくウキウキしてるんだ！」
line = "「うん♪　その衣装から、とてつもなく強い星力を感じて……ボク、すっごくウキウキしてるんだ！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「…………ふふっ、そっか」
line = "「…………ふふっ、そっか」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「記憶が無くとも、そこはアタシのよく知ってる孫悟空ってわけだ♪」
line = "「記憶が無くとも、そこはアタシのよく知ってる孫悟空ってわけだ♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「なら、いいぜ☆　この姿はアタシが前世で親父殿――牛魔王と戦う為に手に入れた決戦用戦闘服」
line = "「なら、いいぜ☆　この姿はアタシが前世で親父殿――牛魔王と戦う為に手に入れた決戦用戦闘服」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「今っぽく改めて名づけるなら、『<ruby=ラクシャシー>羅刹</ruby>フォーム』ってところか！　こうして２０００年ぶりに巡り会ったんだし、一丁テンション上げてバトっちゃいますか☆」
line = "「今っぽく改めて名づけるなら、『<ruby>羅刹<rt>ラクシャシー</rt></ruby>フォーム』ってところか！　こうして２０００年ぶりに巡り会ったんだし、一丁テンション上げてバトっちゃいますか☆」"

[[dialogue]]
speaker = "クーシェン"
# 「いいの！？　やった～っ！」
line = "「いいの！？　やった～っ！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「うっしっし☆　アタシにいい考えがあるから任せておきな♪」
line = "「うっしっし☆　アタシにいい考えがあるから任せておきな♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「せっかくバトルするなら、元気全開で盛り上げて行くぜ～っ！」
line = "「せっかくバトルするなら、元気全開で盛り上げて行くぜ～っ！」"

[[dialogue]]
speaker = "unk"
# 紅明はテンション高く、芭蕉扇を上に掲げるのだった。
line = "紅明はテンション高く、芭蕉扇を上に掲げるのだった。"

[[dialogue]]
speaker = "unk"
# ３日後――
line = "３日後――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『――皆様、ついに再びこの日がやって参りました！』
line = "『――皆様、ついに再びこの日がやって参りました！』"

[[dialogue]]
speaker = "unk"
# 紅明は空いた片手にマイクを持ちながら、仰々しく告げる。
line = "紅明は空いた片手にマイクを持ちながら、仰々しく告げる。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『新星学園星徒会長の座をかけて――「御前試合」の開催だ～っ！！！』
line = "『新星学園星徒会長の座をかけて――「御前試合」の開催だ～っ！！！』"

[[dialogue]]
speaker = "unk"
# 紅明はアタシにいい考えがある！　と言った後、凄まじい行動力をもって、わずか数日で両学園の全校生徒へと周知し、アリーナ満員状態で御前試合を開催させてしまった――
line = "紅明はアタシにいい考えがある！　と言った後、凄まじい行動力をもって、わずか数日で両学園の全校生徒へと周知し、アリーナ満員状態で御前試合を開催させてしまった――"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『改めまして、まずは軽くアタシの自己紹介から！』
line = "『改めまして、まずは軽くアタシの自己紹介から！』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『今回、御前試合の司会役に名乗り出させてもらった、放送委員会所属、新星学園２年生の牛紅明だぜ！　みんな、よろしくな～っ☆』
line = "『今回、御前試合の司会役に名乗り出させてもらった、放送委員会所属、新星学園２年生の牛紅明だぜ！　みんな、よろしくな～っ☆』"

[[dialogue]]
speaker = "女生徒Ａ"
# 「知ってる～！」
line = "「知ってる～！」"

[[dialogue]]
speaker = "附属生Ｂ"
# 「紅明センパーイ！」
line = "「紅明センパーイ！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『ウェ～イ♪　歓声ありがと～！　今日はみんな、盛り上がって行こうぜ～っ！』
line = "『ウェ～イ♪　歓声ありがと～！　今日はみんな、盛り上がって行こうぜ～っ！』"

[[dialogue]]
speaker = "unk"
# 紅明の元気な声に合わせるように、更に盛り上がりを増す会場。
line = "紅明の元気な声に合わせるように、更に盛り上がりを増す会場。"

[[dialogue]]
speaker = "セシア"
# 「紅明ママ～！　新しい衣装、すっごくママの波動を感じて、似合っているわ～♪」
line = "「紅明ママ～！　新しい衣装、すっごくママの波動を感じて、似合っているわ～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「むむむっ、みんなのママを目指す者として、紅明さんの衣装、すごく気になってしまいます……！」
line = "「むむむっ、みんなのママを目指す者として、紅明さんの衣装、すごく気になってしまいます……！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「紅明～！　その衣装は何なのだ～？」
line = "「紅明～！　その衣装は何なのだ～？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『お～っ！　セッシー、ママダレナ、アルモたん♪　こいつはつい先日手に入れた、アタシの覚醒戦闘服なんだぜ☆』
line = "『お～っ！　セッシー、ママダレナ、アルモたん♪　こいつはつい先日手に入れた、アタシの覚醒戦闘服なんだぜ☆』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『なんでこれを着てきたかってのは、後でのお楽しみ♪　ってことで、次は今回の主役――ニューチャレンジャーの登場っしょ！』
line = "『なんでこれを着てきたかってのは、後でのお楽しみ♪　ってことで、次は今回の主役――ニューチャレンジャーの登場っしょ！』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『紹介するぜ！　魔界からやって来た、新たな星騎士――クーシェン！』
line = "『紹介するぜ！　魔界からやって来た、新たな星騎士――クーシェン！』"

[[dialogue]]
speaker = "unk"
# 紅明がアリーナの入り口を指差す。
line = "紅明がアリーナの入り口を指差す。"

[[dialogue]]
speaker = "unk"
# するとそこからバック転をしながら、小さな影が会場の中心へと勢いよく飛び出してきて、着地する。
line = "するとそこからバック転をしながら、小さな影が会場の中心へと勢いよく飛び出してきて、着地する。"

[[dialogue]]
speaker = "クーシェン"
# 「いよっと！　やあやあ、みんな、どうも♪」
line = "「いよっと！　やあやあ、みんな、どうも♪」"

[[dialogue]]
speaker = "クーシェン"
# 「ボクはさすらいの星術使い、クーシェン！　これからよろしくね～っ！」
line = "「ボクはさすらいの星術使い、クーシェン！　これからよろしくね～っ！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『この子は３日前に人間界へやって来たばかりなんだ！　学園にスカウトされてな♪　つまり――』
line = "『この子は３日前に人間界へやって来たばかりなんだ！　学園にスカウトされてな♪　つまり――』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『これからアタシたちと同じ、星騎士の仲間になる転入生ってこと！　ってなわけでみんな、仲良くしてあげてくれよな～☆』
line = "『これからアタシたちと同じ、星騎士の仲間になる転入生ってこと！　ってなわけでみんな、仲良くしてあげてくれよな～☆』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『ちなみにあだ名は、クーちん♪　学年は――』
line = "『ちなみにあだ名は、クーちん♪　学年は――』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『あれ？　そういえばちゃんと聞いてなかった。クーちん、２年生で合ってるよね？』
line = "『あれ？　そういえばちゃんと聞いてなかった。クーちん、２年生で合ってるよね？』"

[[dialogue]]
speaker = "クーシェン"
# 「うん！　ボク、２年生だよ！」
line = "「うん！　ボク、２年生だよ！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『だよね！　アタシと同い年――』
line = "『だよね！　アタシと同い年――』"

[[dialogue]]
speaker = "クーシェン"
# 「ん？　ボク、紅明とは学年違うよ？」
line = "「ん？　ボク、紅明とは学年違うよ？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『え？』
line = "『え？』"

[[dialogue]]
speaker = "クーシェン"
# 「ボクは紅明よりも年下だから――」
line = "「ボクは紅明よりも年下だから――」"

[[dialogue]]
speaker = "クーシェン"
# 「<b>附属校</b>の２年生になるんだよ？」
line = "「<b>附属校</b>の２年生になるんだよ？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『えっ……えええぇぇぇ～～～っ！？！？　クーちん、アタシより年下だったん！？』
line = "『えっ……えええぇぇぇ～～～っ！？！？　クーちん、アタシより年下だったん！？』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『む、昔と背丈が全く変わらないから、てっきり同い年のままかと……。おっと、いかんいかん！　司会の途中だった』
line = "『む、昔と背丈が全く変わらないから、てっきり同い年のままかと……。おっと、いかんいかん！　司会の途中だった』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『メンゴメンゴ☆　そういうことらしいんで、流星学園附属校の子たちは、クーちんのことをどうかよろしくな～っ！』
line = "『メンゴメンゴ☆　そういうことらしいんで、流星学園附属校の子たちは、クーちんのことをどうかよろしくな～っ！』"

[[dialogue]]
speaker = "サチ"
# 「プリムラ、聞いた？　クーシェンちゃん、附属校２年生だって！」
line = "「プリムラ、聞いた？　クーシェンちゃん、附属校２年生だって！」"

[[dialogue]]
speaker = "プリムラ"
# 「ほう……我と同じか。フフフ、ならば後で名乗りに行かねばな」
line = "「ほう……我と同じか。フフフ、ならば後で名乗りに行かねばな」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『さて、それじゃあいよいよ次は、クーちんの挑戦を受けて立つ――我らが新星学園星徒会長の紹介だ～～～っ！！！』
line = "『さて、それじゃあいよいよ次は、クーちんの挑戦を受けて立つ――我らが新星学園星徒会長の紹介だ～～～っ！！！』"

[[dialogue]]
speaker = "ヴィーナス"
# 「魔王としての力、しっかり見せてやりなさい、クロト！」
line = "「魔王としての力、しっかり見せてやりなさい、クロト！」"

[[dialogue]]
speaker = "ルルカ"
# 「お兄ちゃ～ん！　頑張ってーーー！！」
line = "「お兄ちゃ～ん！　頑張ってーーー！！」"

[[dialogue]]
speaker = "unk"
# 俺はアリーナの中央で、クーシェンと向き合う。
line = "俺はアリーナの中央で、クーシェンと向き合う。"

[[dialogue]]
speaker = "クーシェン"
# 「結構人気あるんだね～、魔王様♪」
line = "「結構人気あるんだね～、魔王様♪」"

[[dialogue]]
speaker = "unk"
# ありがたいことにね
line = "ありがたいことにね"

[[dialogue]]
speaker = "クーシェン"
# 「みんなが認める魔王がどれほど強いのか……ボク、俄然ウキウキしてきたよ♪」
line = "「みんなが認める魔王がどれほど強いのか……ボク、俄然ウキウキしてきたよ♪」"

[[dialogue]]
speaker = "クーシェン"
# 「でも、ボクも結構強いよ？」
line = "「でも、ボクも結構強いよ？」"

[[dialogue]]
speaker = "クーシェン"
# 「油断してると――星徒会長の座、あっさり奪っちゃうから気をつけてね☆」
line = "「油断してると――星徒会長の座、あっさり奪っちゃうから気をつけてね☆」"

[[dialogue]]
speaker = "unk"
# そう言って、静かに構えるクーシェン。
line = "そう言って、静かに構えるクーシェン。"

[[dialogue]]
speaker = "unk"
# と同時に、周囲の空間を急に張り詰めるような感覚が、ひしひしと伝わって来る。決して、星力がわかりやすく大きくなったわけじゃない。
line = "と同時に、周囲の空間を急に張り詰めるような感覚が、ひしひしと伝わって来る。決して、星力がわかりやすく大きくなったわけじゃない。"

[[dialogue]]
speaker = "unk"
# むしろ逆だ。星力が小さく収束して研ぎ澄まされたような気配。だからこそ、わかった。
line = "むしろ逆だ。星力が小さく収束して研ぎ澄まされたような気配。だからこそ、わかった。"

[[dialogue]]
speaker = "unk"
# （この子は、強い……！）
line = "（この子は、強い……！）"

[[dialogue]]
speaker = "unk"
# 彼女の言葉は嘘じゃない。気を抜けば、一瞬で敗北させられるだろう。――俺は拳を構える。
line = "彼女の言葉は嘘じゃない。気を抜けば、一瞬で敗北させられるだろう。――俺は拳を構える。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『――よし。それじゃあ、行くぜ～？』
line = "『――よし。それじゃあ、行くぜ～？』"

[[dialogue]]
speaker = "紅明（羅刹）"
# 『会長ＶＳクーシェン……御前試合、レディ～――ゴー！！！』
line = "『会長ＶＳクーシェン……御前試合、レディ～――ゴー！！！』"

[[dialogue]]
speaker = "unk"
# こうして、俺とクーシェンと御前試合が開始されるのだった――
line = "こうして、俺とクーシェンと御前試合が開始されるのだった――"
