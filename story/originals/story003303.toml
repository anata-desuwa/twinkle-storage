[[dialogue]]
speaker = "unk"
# 海上や海中をひとしきり探した後、今度は砂浜でパテルストーンを探す。
line = "海上や海中をひとしきり探した後、今度は砂浜でパテルストーンを探す。"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「うんしょ、うんしょ……」
line = "「うんしょ、うんしょ……」"

[[dialogue]]
speaker = "unk"
# マグダレナのスコップが、ザク、ザクと砂を割って穴を掘る。
line = "マグダレナのスコップが、ザク、ザクと砂を割って穴を掘る。"

[[dialogue]]
speaker = "unk"
# そしてスコップの切っ先がカツンと硬い音を立てて──
line = "そしてスコップの切っ先がカツンと硬い音を立てて──"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ、パテルストーン、ありました～♪」
line = "「あ、パテルストーン、ありました～♪」"

[[dialogue]]
speaker = "unk"
# お手柄だね
line = "お手柄だね"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「うふふ、ありがとうございます～」
line = "「うふふ、ありがとうございます～」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「アルモたんもパテルストーンを見つけたのだ！」
line = "「アルモたんもパテルストーンを見つけたのだ！」"

[[dialogue]]
speaker = "パテル"
# 「あたしもー！」
line = "「あたしもー！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「これで集めたパテルストーンは……２０個ですね。あといくつあるんでしょう？」
line = "「これで集めたパテルストーンは……２０個ですね。あといくつあるんでしょう？」"

[[dialogue]]
speaker = "パテル"
# 「あたしの感覚では、これで半分くらいかな」
line = "「あたしの感覚では、これで半分くらいかな」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「思ったよりあるのだ！　でも遊びながらだからいいのだ！」
line = "「思ったよりあるのだ！　でも遊びながらだからいいのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そうですね。まだまだ遊べちゃいます♪」
line = "「そうですね。まだまだ遊べちゃいます♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ただ、夢中で掘っているうちに、砂浜を穴だらけにしてしまいました……埋めないといけませんね」
line = "「ただ、夢中で掘っているうちに、砂浜を穴だらけにしてしまいました……埋めないといけませんね」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ、でも砂がたくさんあるんですから、埋める前にこの砂で遊んでみませんか？　砂のお城とか作ってみたかったんです」
line = "「あ、でも砂がたくさんあるんですから、埋める前にこの砂で遊んでみませんか？　砂のお城とか作ってみたかったんです」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「それは楽しそうなのだ！　アルモたんもやるのだ！」
line = "「それは楽しそうなのだ！　アルモたんもやるのだ！」"

[[dialogue]]
speaker = "パテル"
# 「魔王城を作るぞ～！　世界を支配してやる～！」
line = "「魔王城を作るぞ～！　世界を支配してやる～！」"

[[dialogue]]
speaker = "unk"
# 俺も一緒にやる
line = "俺も一緒にやる"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい、みんなで立派なお城を作りましょう♪」
line = "「はい、みんなで立派なお城を作りましょう♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ここに砂を盛って……真ん中を一番高くして……ここから形を整えていきましょう」
line = "「ここに砂を盛って……真ん中を一番高くして……ここから形を整えていきましょう」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私は会長と一緒に、お城のてっぺんを……ペタペタ」
line = "「私は会長と一緒に、お城のてっぺんを……ペタペタ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ペタペタ……ペタペタ……えへへ♪　一緒にお城を作って、会長と仲良しです♪」
line = "「ペタペタ……ペタペタ……えへへ♪　一緒にお城を作って、会長と仲良しです♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい、できました！」
line = "「はい、できました！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「おお、マグダレナの背と同じぐらいの大きさの立派なお城なのだ！」
line = "「おお、マグダレナの背と同じぐらいの大きさの立派なお城なのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「でもお城だけじゃ寂しい気がしますね。それじゃ……うんしょ、よいしょ……」
line = "「でもお城だけじゃ寂しい気がしますね。それじゃ……うんしょ、よいしょ……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「お、おお……これは……」
line = "「お、おお……これは……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「じゃーん！　できました！」
line = "「じゃーん！　できました！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「お城の周りにすごい城壁ができてるのだ……蟻んこ一匹通さない鉄壁なのだ」
line = "「お城の周りにすごい城壁ができてるのだ……蟻んこ一匹通さない鉄壁なのだ」"

[[dialogue]]
speaker = "パテル"
# 「さすが《境界》のマグダレナだね……」
line = "「さすが《境界》のマグダレナだね……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「たくさんお砂遊びできて楽しかったです。でもお片づけはちゃんとしないといけませんね」
line = "「たくさんお砂遊びできて楽しかったです。でもお片づけはちゃんとしないといけませんね」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「よいしょ、よいしょ……穴を埋めて……はい、ビーチが綺麗になりました♪」
line = "「よいしょ、よいしょ……穴を埋めて……はい、ビーチが綺麗になりました♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「次は何をしましょうか。パテルストーンを探しながらできることは……」
line = "「次は何をしましょうか。パテルストーンを探しながらできることは……」"

[[dialogue]]
speaker = "unk"
# 潮干狩りなんかもいいかも
line = "潮干狩りなんかもいいかも"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「いいですね♪　浜辺を探しながら、貝も採れたりして一石二鳥です。たくさん採れたらお料理しましょう」
line = "「いいですね♪　浜辺を探しながら、貝も採れたりして一石二鳥です。たくさん採れたらお料理しましょう」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「潮干狩りの道具なら、リップルから借りてるのだ！」
line = "「潮干狩りの道具なら、リップルから借りてるのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「じゃあ早速潮干狩りしましょう～♪」
line = "「じゃあ早速潮干狩りしましょう～♪」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「じゃりじゃり……じゃりじゃり……あ、貝が出てきました！　この小さな貝はアサリでしょうか。こっちの大きいのはハマグリですね」
line = "「じゃりじゃり……じゃりじゃり……あ、貝が出てきました！　この小さな貝はアサリでしょうか。こっちの大きいのはハマグリですね」"

[[dialogue]]
speaker = "パテル"
# 「海藻も流れ着いてるね。あ、マグダレナのサンダルにも海藻付いてるよ。取ってあげる」
line = "「海藻も流れ着いてるね。あ、マグダレナのサンダルにも海藻付いてるよ。取ってあげる」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ありがとうございます～」
line = "「ありがとうございます～」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「こっちはカニがいるのだ！」
line = "「こっちはカニがいるのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「どれどれ……あ、ホントですね、ちっちゃなカニがいます！　横歩きしてかわいいですね～」
line = "「どれどれ……あ、ホントですね、ちっちゃなカニがいます！　横歩きしてかわいいですね～」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「そ～っと……つんつん、つんつん。あ、ハサミを振り上げて威嚇してます。イタズラしちゃってごめんなさい」
line = "「そ～っと……つんつん、つんつん。あ、ハサミを振り上げて威嚇してます。イタズラしちゃってごめんなさい」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あ、砂の中に硬いのが……あ、これはアサリじゃなくてパテルストーンですね。また１つ見つけました」
line = "「あ、砂の中に硬いのが……あ、これはアサリじゃなくてパテルストーンですね。また１つ見つけました」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ふぅ……見てください、貝がたくさん採れましたよ♪　大きなサザエも採れました♪」
line = "「ふぅ……見てください、貝がたくさん採れましたよ♪　大きなサザエも採れました♪」"

[[dialogue]]
speaker = "unk"
# ちなみになんだけど……
line = "ちなみになんだけど……"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「普通の海では勝手に貝や海藻を採っちゃいけない……？」
line = "「普通の海では勝手に貝や海藻を採っちゃいけない……？」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「……なるほど、漁業権というのがあって、漁師さん以外は採っちゃダメなんですね。潮干狩りはちゃんと決められた範囲で行われている、と」
line = "「……なるほど、漁業権というのがあって、漁師さん以外は採っちゃダメなんですね。潮干狩りはちゃんと決められた範囲で行われている、と」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「漁にも人が定めた領域があります。『領域』を司る守護天使として、ちゃんとルールは守らないといけませんね」
line = "「漁にも人が定めた領域があります。『領域』を司る守護天使として、ちゃんとルールは守らないといけませんね」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「でもここはリゾート結界だから採り放題なのだ！」
line = "「でもここはリゾート結界だから採り放題なのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「はい、めいっぱい潮干狩りを楽しんじゃいましょう♪」
line = "「はい、めいっぱい潮干狩りを楽しんじゃいましょう♪」"

[[dialogue]]
speaker = "？？？"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「──ッ」
line = "「──ッ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あれ？　誰もいない……？」
line = "「あれ？　誰もいない……？」"

[[dialogue]]
speaker = "unk"
# 何かあった？
line = "何かあった？"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「後ろに誰かいた気がするんですが……振り返ったら誰もいなくて……」
line = "「後ろに誰かいた気がするんですが……振り返ったら誰もいなくて……」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「きっと気のせいだと思います。気を取り直して潮干狩りを続けましょう♪」
line = "「きっと気のせいだと思います。気を取り直して潮干狩りを続けましょう♪」"

[[dialogue]]
speaker = "unk"
# それからまたみんなで貝を採り、パテルストーンもいくつか見つけたのだった。
line = "それからまたみんなで貝を採り、パテルストーンもいくつか見つけたのだった。"
