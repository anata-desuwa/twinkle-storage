[[dialogue]]
speaker = "unk"
# 第７話,レゾフの冬,B
line = "第７話,レゾフの冬,B"

[[dialogue]]
speaker = "unk"
# 南口の魔獣を討伐し、朝の鍛錬も終えた俺は──
line = "南口の魔獣を討伐し、朝の鍛錬も終えた俺は──"

[[dialogue]]
speaker = "unk"
# 起きてきたみんなとも合流して、行動指針を決めることにした。
line = "起きてきたみんなとも合流して、行動指針を決めることにした。"

[[dialogue]]
speaker = "クロト"
# 「──さて。改めておはよう、みんな」
line = "「──さて。改めておはよう、みんな」"

[[dialogue]]
speaker = "フィオナ"
# 「おはようございます。私たち……魔界で一晩を過ごしたのですね」
line = "「おはようございます。私たち……魔界で一晩を過ごしたのですね」"

[[dialogue]]
speaker = "ユウリ"
# 「ま、なんか実感湧かないよな」
line = "「ま、なんか実感湧かないよな」"

[[dialogue]]
speaker = "マトイ"
# 「うう……それにしても、朝は一段と冷え込むね」
line = "「うう……それにしても、朝は一段と冷え込むね」"

[[dialogue]]
speaker = "ソフィア"
# 「うぐ……人間界ではありえなかったコールド具合……ぶるぶる……」
line = "「うぐ……人間界ではありえなかったコールド具合……ぶるぶる……」"

[[dialogue]]
speaker = "ユウリ"
# 「あたしが適当に火の玉でも召喚しといてやるよ。フィオナみたいに上手くコントロールはできねえけどな」
line = "「あたしが適当に火の玉でも召喚しといてやるよ。フィオナみたいに上手くコントロールはできねえけどな」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～助かるわね～」
line = "「あら～助かるわね～」"

[[dialogue]]
speaker = "クロト"
# 「確かに。これなら制服でも大丈夫そうだ」
line = "「確かに。これなら制服でも大丈夫そうだ」"

[[dialogue]]
speaker = "unk"
# ユウリの生んでくれた火の玉は自在に周囲を泳ぎ、俺たちに適度な熱をもたらしてくれていた。星術のストーブだ。
line = "ユウリの生んでくれた火の玉は自在に周囲を泳ぎ、俺たちに適度な熱をもたらしてくれていた。星術のストーブだ。"

[[dialogue]]
speaker = "ソフィア"
# 「私と違って──フィオナ会長は変身すれば太陽の暑さを得られますから、大丈夫ですよね！」
line = "「私と違って──フィオナ会長は変身すれば太陽の暑さを得られますから、大丈夫ですよね！」"

[[dialogue]]
speaker = "フィオナ"
# 「……そ、そうね……」
line = "「……そ、そうね……」"

[[dialogue]]
speaker = "フィオナ"
# （でも……ここであの姿に変身するのは……さすがに目立ちすぎるというか……）
line = "（でも……ここであの姿に変身するのは……さすがに目立ちすぎるというか……）"

[[dialogue]]
speaker = "ニャリオン"
# 「──よくやったニャ、ユウリ！　これでワガハイも外を覗けるというものだニャン！」
line = "「──よくやったニャ、ユウリ！　これでワガハイも外を覗けるというものだニャン！」"

[[dialogue]]
speaker = "ユウリ"
# 「うお、アホ猫！？　いたのかよ」
line = "「うお、アホ猫！？　いたのかよ」"

[[dialogue]]
speaker = "ニャリオン"
# 「いたに決まってるニャン！　ワガハイは寒いのが苦手ニャンから、顔も出せなかっただけニャンよ！」
line = "「いたに決まってるニャン！　ワガハイは寒いのが苦手ニャンから、顔も出せなかっただけニャンよ！」"

[[dialogue]]
speaker = "フィオナ"
# 「猫はこたつで丸くなると言いますからね」
line = "「猫はこたつで丸くなると言いますからね」"

[[dialogue]]
speaker = "ソフィア"
# 「別に丸まってくれたままでもよかったですが」
line = "「別に丸まってくれたままでもよかったですが」"

[[dialogue]]
speaker = "ニャリオン"
# 「こ、心のほうも寒すぎるニャン……！？」
line = "「こ、心のほうも寒すぎるニャン……！？」"

[[dialogue]]
speaker = "クロト"
# 「俺は待ってたよ、ニャリオン」
line = "「俺は待ってたよ、ニャリオン」"

[[dialogue]]
speaker = "unk"
# ともかくも──これで６人＋１匹の体制となった。ところで。
line = "ともかくも──これで６人＋１匹の体制となった。ところで。"

[[dialogue]]
speaker = "フィオナ"
# 「──こほん。それでは、今日の行動指針を立てましょうか」
line = "「──こほん。それでは、今日の行動指針を立てましょうか」"

[[dialogue]]
speaker = "ユウリ"
# 「だな。ヴィーナス捜索──のんびりしてる暇はねえ」
line = "「だな。ヴィーナス捜索──のんびりしてる暇はねえ」"

[[dialogue]]
speaker = "マトイ"
# 「アニマ先輩のアンテナはどうだったの？　緋宮くん」
line = "「アニマ先輩のアンテナはどうだったの？　緋宮くん」"

[[dialogue]]
speaker = "クロト"
# 「ダメだった。やっぱり──そう簡単には辿らせてくれない」
line = "「ダメだった。やっぱり──そう簡単には辿らせてくれない」"

[[dialogue]]
speaker = "フィオナ"
# 「敵は霊力の使い手……何かしらのバリアが施されているのか。それとも……」
line = "「敵は霊力の使い手……何かしらのバリアが施されているのか。それとも……」"

[[dialogue]]
speaker = "unk"
# 広大な魔界には対応しきれていないのかもしれない。
line = "広大な魔界には対応しきれていないのかもしれない。"

[[dialogue]]
speaker = "unk"
# いずれにせよ、イージーな手段はなくなった。
line = "いずれにせよ、イージーな手段はなくなった。"

[[dialogue]]
speaker = "フィオナ"
# 「私も──ソフィア、サーシャさんの力を借りて、改めて周囲の方に説明はしておきました。私たちは人探しのために滞留していると」
line = "「私も──ソフィア、サーシャさんの力を借りて、改めて周囲の方に説明はしておきました。私たちは人探しのために滞留していると」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。それとヴィーナスちゃんや、黒い騎士さんについても、それとなく探ってみたのだけど……」
line = "「ええ。それとヴィーナスちゃんや、黒い騎士さんについても、それとなく探ってみたのだけど……」"

[[dialogue]]
speaker = "フィオナ"
# 「……有力な情報は得られませんでしたね」
line = "「……有力な情報は得られませんでしたね」"

[[dialogue]]
speaker = "クロト"
# 「……仕方ないか」
line = "「……仕方ないか」"

[[dialogue]]
speaker = "unk"
# 魔界にいる──と判明したのが昨日。
line = "魔界にいる──と判明したのが昨日。"

[[dialogue]]
speaker = "unk"
# さすがに、こちらへ着いて最初の都市で手がかりが掴めるほど甘くはないか。
line = "さすがに、こちらへ着いて最初の都市で手がかりが掴めるほど甘くはないか。"

[[dialogue]]
speaker = "unk"
# と、そこへ……
line = "と、そこへ……"

[[dialogue]]
speaker = "レゾフの住人"
# 「──おぉい。ちょっとあんたら、どいてくれ」
line = "「──おぉい。ちょっとあんたら、どいてくれ」"

[[dialogue]]
speaker = "クロト"
# 「おっと──すみません。こちらでいいですか」
line = "「おっと──すみません。こちらでいいですか」"

[[dialogue]]
speaker = "レゾフの住人"
# 「んにゃ、もうちょっと向こうで頼む。そこは防風網を設置する予定なんだ」
line = "「んにゃ、もうちょっと向こうで頼む。そこは防風網を設置する予定なんだ」"

[[dialogue]]
speaker = "レゾフの住人"
# 「それから街の外周はどこも雪囲いが配備されるからな──もっと中心に行っといてくれ」
line = "「それから街の外周はどこも雪囲いが配備されるからな──もっと中心に行っといてくれ」"

[[dialogue]]
speaker = "unk"
# 通行人の方に促され、俺たちは街路の外れから中央の広場へと移動する。
line = "通行人の方に促され、俺たちは街路の外れから中央の広場へと移動する。"

[[dialogue]]
speaker = "マトイ"
# 「すみっこのほうが邪魔にならないかと思ったんだけど……違ったのかな？」
line = "「すみっこのほうが邪魔にならないかと思ったんだけど……違ったのかな？」"

[[dialogue]]
speaker = "ユウリ"
# 「つうか、防風網ってなんだ？　さっきからネットを持った連中を見かけるけど……」
line = "「つうか、防風網ってなんだ？　さっきからネットを持った連中を見かけるけど……」"

[[dialogue]]
speaker = "クロト"
# 「確かに──なんだか慌ただしいな」
line = "「確かに──なんだか慌ただしいな」"

[[dialogue]]
speaker = "unk"
# 起床してきて行き交う人々も、何やら忙しく動き回っている様子だった。
line = "起床してきて行き交う人々も、何やら忙しく動き回っている様子だった。"

[[dialogue]]
speaker = "ソフィア"
# 「……そっか。今の時期は……」
line = "「……そっか。今の時期は……」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。ちょうど──大いなる冬が近づいているから」
line = "「ええ。ちょうど──大いなる冬が近づいているから」"

[[dialogue]]
speaker = "フィオナ"
# 「……？　大いなる冬……？」
line = "「……？　大いなる冬……？」"

[[dialogue]]
speaker = "クロト"
# 「そういえばその単語──さっき、旅人を名乗る人からも聞いたな」
line = "「そういえばその単語──さっき、旅人を名乗る人からも聞いたな」"

[[dialogue]]
speaker = "？？？"
# 「もうじき、大いなる冬も訪れる──ここは嵐の渦中になるだろうからね」
line = "「もうじき、大いなる冬も訪れる──ここは嵐の渦中になるだろうからね」"

[[dialogue]]
speaker = "unk"
# あの人特有の言い回しかと思っていたが、どうやらレゾフの地に根付いた単語らしかった。
line = "あの人特有の言い回しかと思っていたが、どうやらレゾフの地に根付いた単語らしかった。"

[[dialogue]]
speaker = "ユウリ"
# 「要するに、このクソ寒い気候のことか？」
line = "「要するに、このクソ寒い気候のことか？」"

[[dialogue]]
speaker = "ソフィア"
# 「いいえ、違います。この寒さは至って通常の気温です。憎らしいことに」
line = "「いいえ、違います。この寒さは至って通常の気温です。憎らしいことに」"

[[dialogue]]
speaker = "ソフィア"
# 「『大いなる冬』が来たら──レゾフはこの何倍、何十倍という冷気に覆われることになります」
line = "「『大いなる冬』が来たら──レゾフはこの何倍、何十倍という冷気に覆われることになります」"

[[dialogue]]
speaker = "マトイ"
# 「……！？」
line = "「……！？」"

[[dialogue]]
speaker = "ニャリオン"
# 「そ、想像しただけで身震いするニャン……！」
line = "「そ、想像しただけで身震いするニャン……！」"

[[dialogue]]
speaker = "クロト"
# 「つまり街の人たちがバタバタしているのも……そのせいだと？」
line = "「つまり街の人たちがバタバタしているのも……そのせいだと？」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。少々、時期が悪かったかもしれません」
line = "「はい。少々、時期が悪かったかもしれません」"

[[dialogue]]
speaker = "ユウリ"
# 「ツイてねえな。色々聞きたいことはあるってのに……」
line = "「ツイてねえな。色々聞きたいことはあるってのに……」"

[[dialogue]]
speaker = "unk"
# リタおばさんも去り際、俺に対して『こんな時期に災難』と発していた。
line = "リタおばさんも去り際、俺に対して『こんな時期に災難』と発していた。"

[[dialogue]]
speaker = "unk"
# 恐らくレゾフの人々にとっての常識なのだろう。
line = "恐らくレゾフの人々にとっての常識なのだろう。"

[[dialogue]]
speaker = "クロト"
# 「……サーシャ先輩。もう少し詳しく聞かせてもらってもいいですか？」
line = "「……サーシャ先輩。もう少し詳しく聞かせてもらってもいいですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。これは、そうね……人間界でいうと梅雨や台風みたいな、季節柄の災害ってことになるかしら」
line = "「ええ。これは、そうね……人間界でいうと梅雨や台風みたいな、季節柄の災害ってことになるかしら」"

[[dialogue]]
speaker = "unk"
# サーシャ先輩はそう前置きして、語り始めた。
line = "サーシャ先輩はそう前置きして、語り始めた。"

[[dialogue]]
speaker = "サーシャ"
# 「大いなる冬──それは、一年に一度、魔界全体を巻き込んで訪れる大寒波のこと」
line = "「大いなる冬──それは、一年に一度、魔界全体を巻き込んで訪れる大寒波のこと」"

[[dialogue]]
speaker = "サーシャ"
# 「そして……レゾフは魔界の中でも元々極寒の地域。大いなる冬は、毎年、都市の存続を脅かすほどの災害になるわ」
line = "「そして……レゾフは魔界の中でも元々極寒の地域。大いなる冬は、毎年、都市の存続を脅かすほどの災害になるわ」"

[[dialogue]]
speaker = "サーシャ"
# 「これは、ただ寒いとか乾燥するとかとは、訳が違うの。その日に訪れる猛吹雪は──文字通り何もかもを凍りつかせる」
line = "「これは、ただ寒いとか乾燥するとかとは、訳が違うの。その日に訪れる猛吹雪は──文字通り何もかもを凍りつかせる」"

[[dialogue]]
speaker = "サーシャ"
# 「それこそ魔獣も、モンスターも、アステライトだって。あらゆる自然が完全に凍結して……活動を停止しちゃうくらい」
line = "「それこそ魔獣も、モンスターも、アステライトだって。あらゆる自然が完全に凍結して……活動を停止しちゃうくらい」"

[[dialogue]]
speaker = "フィオナ"
# 「アステラが──凍りつく……？」
line = "「アステラが──凍りつく……？」"

[[dialogue]]
speaker = "クロト"
# 「信じられないな──どんな氷の星術でも、そこまでの所業はできないはずだ」
line = "「信じられないな──どんな氷の星術でも、そこまでの所業はできないはずだ」"

[[dialogue]]
speaker = "ユウリ"
# 「けど、それが魔界の天災ってことか……」
line = "「けど、それが魔界の天災ってことか……」"

[[dialogue]]
speaker = "unk"
# 人間界では起こり得ないほどの、滅亡級の大寒波──
line = "人間界では起こり得ないほどの、滅亡級の大寒波──"

[[dialogue]]
speaker = "unk"
# それが魔界における『大いなる冬』ということだった。
line = "それが魔界における『大いなる冬』ということだった。"

[[dialogue]]
speaker = "マトイ"
# 「あ！　それってもしかして──去年にサーシャさんが話してくれたやつ？」
line = "「あ！　それってもしかして──去年にサーシャさんが話してくれたやつ？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうそう～♪　よく覚えててくれたわねー、マトイちゃん」
line = "「そうそう～♪　よく覚えててくれたわねー、マトイちゃん」"

[[dialogue]]
speaker = "ソフィア"
# 「レゾフに住んでいたなら──この時期は死活問題ですから」
line = "「レゾフに住んでいたなら──この時期は死活問題ですから」"

[[dialogue]]
speaker = "ソフィア"
# 「事前に地下に避難したり、屋根を特殊な革で覆ったり……あらゆる手立てを講じておくのが風習となっています」
line = "「事前に地下に避難したり、屋根を特殊な革で覆ったり……あらゆる手立てを講じておくのが風習となっています」"

[[dialogue]]
speaker = "ニャリオン"
# 「リクリエ以外にも、けったいな災厄があったものニャンねえ」
line = "「リクリエ以外にも、けったいな災厄があったものニャンねえ」"

[[dialogue]]
speaker = "マトイ"
# 「私たちもここにいたら、対応しなくちゃいけない……？」
line = "「私たちもここにいたら、対応しなくちゃいけない……？」"

[[dialogue]]
speaker = "ユウリ"
# 「話を聞く限り、あたしなら力になれそうだが──」
line = "「話を聞く限り、あたしなら力になれそうだが──」"

[[dialogue]]
speaker = "unk"
# 皆が天災に思いを巡らせる──その時だ。
line = "皆が天災に思いを巡らせる──その時だ。"

[[dialogue]]
speaker = "クロト"
# 「──『冬』だ」
line = "「──『冬』だ」"

[[dialogue]]
speaker = "ユウリ"
# 「？　ああ、大いなる冬……」
line = "「？　ああ、大いなる冬……」"

[[dialogue]]
speaker = "クロト"
# 「違う。ヴィーナスのメッセージにあった『冬』──あれも、同じものを指してると考えられないか？」
line = "「違う。ヴィーナスのメッセージにあった『冬』──あれも、同じものを指してると考えられないか？」"

[[dialogue]]
speaker = "マトイ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "フィオナ"
# 「……今の気候はあくまで平常。ですが、数日後には明確な『冬』が訪れる。そういうことですね」
line = "「……今の気候はあくまで平常。ですが、数日後には明確な『冬』が訪れる。そういうことですね」"

[[dialogue]]
speaker = "unk"
# 『冬』『森』『来て』──
line = "『冬』『森』『来て』──"

[[dialogue]]
speaker = "unk"
# 魔界を降りた俺たちに与えられた『いつ』『どこで』『何を』のメッセージ。
line = "魔界を降りた俺たちに与えられた『いつ』『どこで』『何を』のメッセージ。"

[[dialogue]]
speaker = "unk"
# 中でも『冬』という時機に関しては、あまりに大ざっぱすぎる指定なのが疑問だったが……
line = "中でも『冬』という時機に関しては、あまりに大ざっぱすぎる指定なのが疑問だったが……"

[[dialogue]]
speaker = "サーシャ"
# 「自然な解釈ね。魔界における『冬』は特別な言葉──ヴィーナスちゃんがそう言っていてもおかしくないわ」
line = "「自然な解釈ね。魔界における『冬』は特別な言葉──ヴィーナスちゃんがそう言っていてもおかしくないわ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが魔界の風土に詳しいとは思えないが──
line = "ヴィーナスが魔界の風土に詳しいとは思えないが──"

[[dialogue]]
speaker = "unk"
# マトイと同様にサーシャ先輩の話を覚えていたなら、短いワードで『いつ』を伝える言葉に選んだ可能性はある。
line = "マトイと同様にサーシャ先輩の話を覚えていたなら、短いワードで『いつ』を伝える言葉に選んだ可能性はある。"

[[dialogue]]
speaker = "ニャリオン"
# 「ってことは──何ニャン？　あの娘はその大変な『冬』に来いと言ってるのかニャン？」
line = "「ってことは──何ニャン？　あの娘はその大変な『冬』に来いと言ってるのかニャン？」"

[[dialogue]]
speaker = "クロト"
# 「そうなるな」
line = "「そうなるな」"

[[dialogue]]
speaker = "マトイ"
# 「で、でも……何もかも凍りついちゃうくらいの、すごい吹雪になるんでしょ？」
line = "「で、でも……何もかも凍りついちゃうくらいの、すごい吹雪になるんでしょ？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。出歩くなんて考えられない──人どころか魔獣も凍っちゃうくらいの、とんでもない災いよ」
line = "「ええ。出歩くなんて考えられない──人どころか魔獣も凍っちゃうくらいの、とんでもない災いよ」"

[[dialogue]]
speaker = "ニャリオン"
# 「や、やばすぎるニャン……！？」
line = "「や、やばすぎるニャン……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが、あのヴィーナスさんがそれを望んだ──」
line = "「ですが、あのヴィーナスさんがそれを望んだ──」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。もしかしたら、何か狙いがあるのかも。ふふ……ヴィーナスちゃんらしいじゃない」
line = "「ええ。もしかしたら、何か狙いがあるのかも。ふふ……ヴィーナスちゃんらしいじゃない」"

[[dialogue]]
speaker = "ユウリ"
# 「はっ。確かにな」
line = "「はっ。確かにな」"

[[dialogue]]
speaker = "unk"
# ヴィーナスからのメッセージは──つまり言ってしまえば<b>無茶振り</b>だ。
line = "ヴィーナスからのメッセージは──つまり言ってしまえば<b>無茶振り</b>だ。"

[[dialogue]]
speaker = "unk"
# だが、彼女からの強引な指示はむしろ<b>らしい</b>と思えて、俺たちはニヤリとほくそ笑むのだった。
line = "だが、彼女からの強引な指示はむしろ<b>らしい</b>と思えて、俺たちはニヤリとほくそ笑むのだった。"

[[dialogue]]
speaker = "クロト"
# 「そして『大いなる冬』が訪れるのは……」
line = "「そして『大いなる冬』が訪れるのは……」"

[[dialogue]]
speaker = "ソフィア"
# 「恐らく数日後になるだろうと、リタおばさんは言っていました」
line = "「恐らく数日後になるだろうと、リタおばさんは言っていました」"

[[dialogue]]
speaker = "unk"
# それまではヴィーナスに耐えてもらうしかない──
line = "それまではヴィーナスに耐えてもらうしかない──"

[[dialogue]]
speaker = "unk"
# が、彼女が打ち立てた目標日だ。恐らく勝算があるのだろう。
line = "が、彼女が打ち立てた目標日だ。恐らく勝算があるのだろう。"

[[dialogue]]
speaker = "クロト"
# 「これに気づけただけでも大きな進歩だ──後はその当日にも、動ける状態にしておくこと」
line = "「これに気づけただけでも大きな進歩だ──後はその当日にも、動ける状態にしておくこと」"

[[dialogue]]
speaker = "フィオナ"
# 「準備が必要ですね。それほどの天災なら」
line = "「準備が必要ですね。それほどの天災なら」"

[[dialogue]]
speaker = "ユウリ"
# 「んで、ヴィーナスがどこにいるか──か。いいぜ、近づいてきたじゃねえか」
line = "「んで、ヴィーナスがどこにいるか──か。いいぜ、近づいてきたじゃねえか」"

[[dialogue]]
speaker = "マトイ"
# 「よ、よし……私もできること頑張るよ！」
line = "「よ、よし……私もできること頑張るよ！」"
