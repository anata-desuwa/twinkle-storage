[[dialogue]]
speaker = "unk"
# 第５話,再構築の瘴気,B
line = "第５話,再構築の瘴気,B"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ。順調ね～」
line = "「うふふ。順調ね～」"

[[dialogue]]
speaker = "マトイ"
# 「順調……順調、なんですけど……」
line = "「順調……順調、なんですけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「？　どしたの、マトイ」
line = "「？　どしたの、マトイ」"

[[dialogue]]
speaker = "マトイ"
# 「なんか……この前の話を聞いたら、余計にこの瘴気が怖くなっちゃったというか……」
line = "「なんか……この前の話を聞いたら、余計にこの瘴気が怖くなっちゃったというか……」"

[[dialogue]]
speaker = "unk"
# マトイが示したのは──アステラ内部に立ち込める薄紫の瘴気。
line = "マトイが示したのは──アステラ内部に立ち込める薄紫の瘴気。"

[[dialogue]]
speaker = "unk"
# 見慣れた存在ではあったものの、先日俺たちはこのおぞましい正体について知ったばかりだった。
line = "見慣れた存在ではあったものの、先日俺たちはこのおぞましい正体について知ったばかりだった。"

[[dialogue]]
speaker = "unk"
# それは先々日のこと。
line = "それは先々日のこと。"

[[dialogue]]
speaker = "unk"
# アナに呼び出された俺たちは、揃って学園のトレーニング施設に集合していた。
line = "アナに呼び出された俺たちは、揃って学園のトレーニング施設に集合していた。"

[[dialogue]]
speaker = "クロト"
# 「どうしたんだ、アナ。みんなを集めて……」
line = "「どうしたんだ、アナ。みんなを集めて……」"

[[dialogue]]
speaker = "アナ"
# 「はい。アニマさんとコハルコさんの協力も得て、この前の解析結果が出ました」
line = "「はい。アニマさんとコハルコさんの協力も得て、この前の解析結果が出ました」"

[[dialogue]]
speaker = "unk"
# アナは、ぺこりと頭を下げるやすぐに本題を切り出してきた。
line = "アナは、ぺこりと頭を下げるやすぐに本題を切り出してきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「！　さすがアナね！」
line = "「！　さすがアナね！」"

[[dialogue]]
speaker = "マトイ"
# 「この前の……って、もしかして、例の……？」
line = "「この前の……って、もしかして、例の……？」"

[[dialogue]]
speaker = "アナ"
# 「これですね。暴走したという機械のパーツ」
line = "「これですね。暴走したという機械のパーツ」"

[[dialogue]]
speaker = "アナ"
# 「残っていた瘴気も合わせて分析し、私なりに推測を立ててみました」
line = "「残っていた瘴気も合わせて分析し、私なりに推測を立ててみました」"

[[dialogue]]
speaker = "unk"
# 俺とヴィーナスが《フィーニスの塔》第一階層を攻略したあの日──
line = "俺とヴィーナスが《フィーニスの塔》第一階層を攻略したあの日──"

[[dialogue]]
speaker = "unk"
# フィオナの助言から、俺たちは最後に立ちはだかったガーディアンの残骸を持ち帰っていた。
line = "フィオナの助言から、俺たちは最後に立ちはだかったガーディアンの残骸を持ち帰っていた。"

[[dialogue]]
speaker = "unk"
# さすがに４０００階にものぼるという塔を踏破することは叶わなかったものの、せめて次なる情報を得たかったのだ。
line = "さすがに４０００階にものぼるという塔を踏破することは叶わなかったものの、せめて次なる情報を得たかったのだ。"

[[dialogue]]
speaker = "アナ"
# 「結論から言うと、このガーディアンには目についた存在すべてを排斥するプログラムが組まれていました」
line = "「結論から言うと、このガーディアンには目についた存在すべてを排斥するプログラムが組まれていました」"

[[dialogue]]
speaker = "サーシャ"
# 「ずいぶん乱暴なのね」
line = "「ずいぶん乱暴なのね」"

[[dialogue]]
speaker = "アナ"
# 「それと、フィーニスの塔のガーディアンといえば古い書物にデータが残っていて……」
line = "「それと、フィーニスの塔のガーディアンといえば古い書物にデータが残っていて……」"

[[dialogue]]
speaker = "unk"
# アナは手元のタブレットを操作し、目の前に小さいホログラム映像を出現させた。
line = "アナは手元のタブレットを操作し、目の前に小さいホログラム映像を出現させた。"

[[dialogue]]
speaker = "アナ"
# 「ガーディアンＭ型Ⅱ号。こんなフォルムでしたか？」
line = "「ガーディアンＭ型Ⅱ号。こんなフォルムでしたか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんとなく、こんなのだったと思うけど……」
line = "「なんとなく、こんなのだったと思うけど……」"

[[dialogue]]
speaker = "クロト"
# 「もっと腕部が凶暴な感じだったな」
line = "「もっと腕部が凶暴な感じだったな」"

[[dialogue]]
speaker = "アナ"
# 「じゃあ、こんな？」
line = "「じゃあ、こんな？」"

[[dialogue]]
speaker = "unk"
# すると今度は、別のホログラムを立ち上がらせたアナ。
line = "すると今度は、別のホログラムを立ち上がらせたアナ。"

[[dialogue]]
speaker = "unk"
# それは……
line = "それは……"

[[dialogue]]
speaker = "ヴィーナス"
# 「あ！　そうそう！　ちょうどこいつみたいな感じだった！」
line = "「あ！　そうそう！　ちょうどこいつみたいな感じだった！」"

[[dialogue]]
speaker = "マトイ"
# 「でも、これって……」
line = "「でも、これって……」"

[[dialogue]]
speaker = "サーシャ"
# 「モンスター、よね？」
line = "「モンスター、よね？」"

[[dialogue]]
speaker = "アナ"
# 「はい。なので件のガーディアンは、モンスターと融合させられた形態だったということになります」
line = "「はい。なので件のガーディアンは、モンスターと融合させられた形態だったということになります」"

[[dialogue]]
speaker = "クロト"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# ガーディアンは塔を守りし聖なるもの。
line = "ガーディアンは塔を守りし聖なるもの。"

[[dialogue]]
speaker = "unk"
# そんな存在とモンスターが結合するなんて、どう考えても無理やりで……
line = "そんな存在とモンスターが結合するなんて、どう考えても無理やりで……"

[[dialogue]]
speaker = "アナ"
# 「つまり、<ruby=リクリエイション>再構築</ruby>」
line = "「つまり、<ruby>再構築<rt>リクリエイション</rt></ruby>」"

[[dialogue]]
speaker = "アナ"
# 「フィーニスの塔を汚染している瘴気は、存在の根幹を組み替える作用を持っています」
line = "「フィーニスの塔を汚染している瘴気は、存在の根幹を組み替える作用を持っています」"

[[dialogue]]
speaker = "unk"
# アナが俺たちに語ったのは──
line = "アナが俺たちに語ったのは──"

[[dialogue]]
speaker = "unk"
# これまで何度も目にしてきた紫の瘴気、その正体だった。
line = "これまで何度も目にしてきた紫の瘴気、その正体だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「い、遺伝子組み換え食品……？」
line = "「い、遺伝子組み換え食品……？」"

[[dialogue]]
speaker = "アナ"
# 「食品ではありませんが、おおむねそんな感じかと」
line = "「食品ではありませんが、おおむねそんな感じかと」"

[[dialogue]]
speaker = "unk"
# 言うなれば、遺伝子組み換えガスと言ったところか。字面以上に恐ろしい。
line = "言うなれば、遺伝子組み換えガスと言ったところか。字面以上に恐ろしい。"

[[dialogue]]
speaker = "サーシャ"
# 「アステラも～、よく瘴気に汚染されてるけど……同じものなのかな？」
line = "「アステラも～、よく瘴気に汚染されてるけど……同じものなのかな？」"

[[dialogue]]
speaker = "アナ"
# 「濃度の違いはあれ、どちらもリクリエに起因するものなので本質は同じでしょう」
line = "「濃度の違いはあれ、どちらもリクリエに起因するものなので本質は同じでしょう」"

[[dialogue]]
speaker = "unk"
# あの時に出会った天使──マグダレナさんは、フィオナいわく別の場所で“堕天使”化していたという。
line = "あの時に出会った天使──マグダレナさんは、フィオナいわく別の場所で“堕天使”化していたという。"

[[dialogue]]
speaker = "unk"
# それは単に正気を失っていたのではなく、根っこから改造されかけていたがゆえの不調だったということになる。
line = "それは単に正気を失っていたのではなく、根っこから改造されかけていたがゆえの不調だったということになる。"

[[dialogue]]
speaker = "アナ"
# 「この汚染は、深く進めば進むほど不可逆なものになります」
line = "「この汚染は、深く進めば進むほど不可逆なものになります」"

[[dialogue]]
speaker = "アナ"
# 「なのでその場でガーディアンを破壊したのは正解だったと言えますね」
line = "「なのでその場でガーディアンを破壊したのは正解だったと言えますね」"

[[dialogue]]
speaker = "クロト"
# 「明らかに<ruby=けんのん>剣呑</ruby>そうな相手だったからな──」
line = "「明らかに<ruby>剣呑<rt>けんのん</rt></ruby>そうな相手だったからな──」"

[[dialogue]]
speaker = "アナ"
# 「より高層はもっとひどいかも。塔の中身自体、組み替えられてるかもしれません」
line = "「より高層はもっとひどいかも。塔の中身自体、組み替えられてるかもしれません」"

[[dialogue]]
speaker = "マトイ"
# 「怖っ……」
line = "「怖っ……」"

[[dialogue]]
speaker = "サーシャ"
# 「いつも身近にあったのに……あの塔の中で、そんなことが起きてるなんて」
line = "「いつも身近にあったのに……あの塔の中で、そんなことが起きてるなんて」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ、あまりフィーニスの塔には近寄らないほうがいいのか……？」
line = "「じゃあ、あまりフィーニスの塔には近寄らないほうがいいのか……？」"

[[dialogue]]
speaker = "アナ"
# 「基本的には、星騎士であれば星の加護がついているので平気です──が」
line = "「基本的には、星騎士であれば星の加護がついているので平気です──が」"

[[dialogue]]
speaker = "アナ"
# 「ただならないイレギュラーが生じている恐れはあります。平気でない場所だって、あるかもしれません」
line = "「ただならないイレギュラーが生じている恐れはあります。平気でない場所だって、あるかもしれません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……でも、昇らなきゃダメよ！　だってあの守護天使さんだって、頂上を目指せって言ってたし」
line = "「……でも、昇らなきゃダメよ！　だってあの守護天使さんだって、頂上を目指せって言ってたし」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それに──上の方からずっと、私を呼ぶ声がしたから……」
line = "「それに──上の方からずっと、私を呼ぶ声がしたから……」"

[[dialogue]]
speaker = "unk"
# そうなのだ。
line = "そうなのだ。"

[[dialogue]]
speaker = "unk"
# 異変があったのは、何も相手方だけではない。
line = "異変があったのは、何も相手方だけではない。"

[[dialogue]]
speaker = "アナ"
# 「それについてはよくわかりませんが……例の『瘴気』の危険性については忠告しておきます」
line = "「それについてはよくわかりませんが……例の『瘴気』の危険性については忠告しておきます」"

[[dialogue]]
speaker = "アナ"
# 「もし、高濃度のリクリエ瘴気に冒されれば……人ですらなくなる蓋然性すら生じますから」
line = "「もし、高濃度のリクリエ瘴気に冒されれば……人ですらなくなる蓋然性すら生じますから」"

[[dialogue]]
speaker = "マトイ"
# 「ひぇっ……」
line = "「ひぇっ……」"

[[dialogue]]
speaker = "unk"
# 虎穴に入らずんば虎子を得ず。
line = "虎穴に入らずんば虎子を得ず。"

[[dialogue]]
speaker = "unk"
# 危険な高層に進むほど、未だ俺たちの知らない何かが眠っている……という話だ。
line = "危険な高層に進むほど、未だ俺たちの知らない何かが眠っている……という話だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、また入れなくなっちゃったのよね」
line = "「でも、また入れなくなっちゃったのよね」"

[[dialogue]]
speaker = "クロト"
# 「何か解除の条件があるのかもな。今度は別の栞を見つけるとか……」
line = "「何か解除の条件があるのかもな。今度は別の栞を見つけるとか……」"

[[dialogue]]
speaker = "マトイ"
# 「もうっ……この２人、少しは物怖じした方がいいと思うの！」
line = "「もうっ……この２人、少しは物怖じした方がいいと思うの！」"

[[dialogue]]
speaker = "unk"
# あの時もマトイは真剣に俺たちを心配してくれていた。
line = "あの時もマトイは真剣に俺たちを心配してくれていた。"

[[dialogue]]
speaker = "unk"
# 今までもずっと目にしてきたものだが、正体がわかってよりおぞましくなったというのは同感だった。
line = "今までもずっと目にしてきたものだが、正体がわかってよりおぞましくなったというのは同感だった。"

[[dialogue]]
speaker = "クロト"
# 「存在の再構築を促す瘴気……とんでもないよな」
line = "「存在の再構築を促す瘴気……とんでもないよな」"

[[dialogue]]
speaker = "アナ"
# 「あまり長居しなければ大丈夫です。《塔》のガーディアン達は、逃げ場がなかったせいで呑まれたものかと」
line = "「あまり長居しなければ大丈夫です。《塔》のガーディアン達は、逃げ場がなかったせいで呑まれたものかと」"

[[dialogue]]
speaker = "unk"
# 何にせよ、こんなものが外に流出しては大問題だ。
line = "何にせよ、こんなものが外に流出しては大問題だ。"

[[dialogue]]
speaker = "unk"
# 一刻も早くこのアステライトを解放する──という目的に変わりはない。
line = "一刻も早くこのアステライトを解放する──という目的に変わりはない。"

[[dialogue]]
speaker = "マトイ"
# 「もうけっこう進んできたけど、まだなのかな……？」
line = "「もうけっこう進んできたけど、まだなのかな……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「大丈夫。そろそろ最奥に達するわ」
line = "「大丈夫。そろそろ最奥に達するわ」"

[[dialogue]]
speaker = "クロト"
# 「そんなことわかるのか？」
line = "「そんなことわかるのか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ。でもって、待ち受ける敵は豚みたいな大怪獣よ！」
line = "「ええ。でもって、待ち受ける敵は豚みたいな大怪獣よ！」"

[[dialogue]]
speaker = "unk"
# まるで見てきたかのように語るヴィーナス。
line = "まるで見てきたかのように語るヴィーナス。"

[[dialogue]]
speaker = "unk"
# 彼女がこんな自信満々になるのは、決まって例の根拠がある時だ。
line = "彼女がこんな自信満々になるのは、決まって例の根拠がある時だ。"

[[dialogue]]
speaker = "マトイ"
# 「それも……例の“日誌”なのね？」
line = "「それも……例の“日誌”なのね？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ！」
line = "「ええ！」"

[[dialogue]]
speaker = "unk"
# そう言ってヴィーナスは、見慣れた装丁の一冊を取り出して広げる。
line = "そう言ってヴィーナスは、見慣れた装丁の一冊を取り出して広げる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「『<ruby=あらたか>荒鷹</ruby>ノ月十四日。知の殿堂を司りし魔族と初の邂逅を果たす』──っと、これはさっきの出来事ね」
line = "「『<ruby>荒鷹<rt>あらたか</rt></ruby>ノ月十四日。知の殿堂を司りし魔族と初の邂逅を果たす』──っと、これはさっきの出来事ね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『その後、私たちは市街に出没した<ruby=せいうんそう>星雲巣</ruby>を撃破する。最奥に待ち受けていたのは大豚の如き大怪獣』」
line = "「『その後、私たちは市街に出没した<ruby>星雲巣<rt>せいうんそう</rt></ruby>を撃破する。最奥に待ち受けていたのは大豚の如き大怪獣』」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『星騎士の勢力は日に日に高まっていた。これよりしばらくは目立った巣の出現もなく、平穏な<ruby=とき>刻</ruby>が続く』」
line = "「『星騎士の勢力は日に日に高まっていた。これよりしばらくは目立った巣の出現もなく、平穏な<ruby>刻<rt>とき</rt></ruby>が続く』」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『『魔王』の力は未だ眠りの中にあるが、焦る必要はない。彼の力は星雲巣の解放を通じて着々と育っているのだから』」
line = "「『『魔王』の力は未だ眠りの中にあるが、焦る必要はない。彼の力は星雲巣の解放を通じて着々と育っているのだから』」"

[[dialogue]]
speaker = "ヴィーナス"
# 「『彼ならばきっと、此度のリクリエにも対抗しうるだろう……』」
line = "「『彼ならばきっと、此度のリクリエにも対抗しうるだろう……』」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──ね！　このように、未来の日誌にも今日の平和は保証されているのよ！」
line = "「──ね！　このように、未来の日誌にも今日の平和は保証されているのよ！」"

[[dialogue]]
speaker = "マトイ"
# 「なんか、予知しすぎてて怖いんですけど……」
line = "「なんか、予知しすぎてて怖いんですけど……」"

[[dialogue]]
speaker = "アナ"
# 「まあ、不穏なことが書かれていないだけ良いでしょう」
line = "「まあ、不穏なことが書かれていないだけ良いでしょう」"

[[dialogue]]
speaker = "サーシャ"
# 「実際、なんだかんだで的中してるんだものね～」
line = "「実際、なんだかんだで的中してるんだものね～」"

[[dialogue]]
speaker = "unk"
# 堕天使マグダレナが託したという“栞”を手に入れたあと──
line = "堕天使マグダレナが託したという“栞”を手に入れたあと──"

[[dialogue]]
speaker = "unk"
# ヴィーナスの持っていた日誌には“俺と出会って以降のページ”が追加された。それだけでも尋常でない力が働いていることがわかる。
line = "ヴィーナスの持っていた日誌には“俺と出会って以降のページ”が追加された。それだけでも尋常でない力が働いていることがわかる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「昨日のどしゃ降りも、一昨日の地震だって書かれてあったんだから。これさえあれば私たちは無敵よ」
line = "「昨日のどしゃ降りも、一昨日の地震だって書かれてあったんだから。これさえあれば私たちは無敵よ」"

[[dialogue]]
speaker = "マトイ"
# 「いつか私の真の力覚醒エピソードも書かれてないかなあ……」
line = "「いつか私の真の力覚醒エピソードも書かれてないかなあ……」"

[[dialogue]]
speaker = "アナ"
# 「欲望だだ漏れになってますよ、マトイ先輩」
line = "「欲望だだ漏れになってますよ、マトイ先輩」"

[[dialogue]]
speaker = "unk"
# まるで俺たちを導くかのように記されていく日誌。
line = "まるで俺たちを導くかのように記されていく日誌。"

[[dialogue]]
speaker = "unk"
# 俺たちはこの内容に従うべきか、それとも抗うべきなのか──
line = "俺たちはこの内容に従うべきか、それとも抗うべきなのか──"

[[dialogue]]
speaker = "クロト"
# （あるいは……抗ったところで意味なんてないのか）
line = "（あるいは……抗ったところで意味なんてないのか）"

[[dialogue]]
speaker = "クロト"
# （いや……やめよう。ひとまず日誌を信じるヴィーナスを信じると決めたんだ。悪いことが起きたら、その時に考えよう）
line = "（いや……やめよう。ひとまず日誌を信じるヴィーナスを信じると決めたんだ。悪いことが起きたら、その時に考えよう）"

[[dialogue]]
speaker = "unk"
# 不思議な思いを抱えつつ、俺たちはアステラの最奥へ向かった……。
line = "不思議な思いを抱えつつ、俺たちはアステラの最奥へ向かった……。"

[[dialogue]]
speaker = "unk"
# そうして、辿り着いた行き止まり。
line = "そうして、辿り着いた行き止まり。"

[[dialogue]]
speaker = "モンスター"
# 「ブオオオオオウ！　ブォッ、ブォッ……ブオオオオン！！」
line = "「ブオオオオオウ！　ブォッ、ブォッ……ブオオオオン！！」"

[[dialogue]]
speaker = "マトイ"
# 「ほ……ほんとに豚みたいなモンスター！」
line = "「ほ……ほんとに豚みたいなモンスター！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やっぱり日誌は正しいわね！　《魔王》クロト、やっちゃいなさい！」
line = "「やっぱり日誌は正しいわね！　《魔王》クロト、やっちゃいなさい！」"

[[dialogue]]
speaker = "クロト"
# 「みんなで戦うんだよ──いくぞ！」
line = "「みんなで戦うんだよ──いくぞ！」"
