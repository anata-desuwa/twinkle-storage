[[dialogue]]
speaker = "unk"
# クマ型ロボットとの戦闘の後、アナとサーシャさんに連絡を取ってみたが、相変わらず通話がつながらない。
line = "クマ型ロボットとの戦闘の後、アナとサーシャさんに連絡を取ってみたが、相変わらず通話がつながらない。"

[[dialogue]]
speaker = "unk"
# メッセージを送っておいたが、今、俺たちが想像している状況ならば返信はこないだろう。
line = "メッセージを送っておいたが、今、俺たちが想像している状況ならば返信はこないだろう。"

[[dialogue]]
speaker = "unk"
# ひとまず優先すべきはアルテ……ということになり、俺たちは彼女を連れて新星星徒会室にやってきた。
line = "ひとまず優先すべきはアルテ……ということになり、俺たちは彼女を連れて新星星徒会室にやってきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「多分、アルテがこちらの世界に来たのと同じように、２人も別の世界に行っちゃってるってことだと思うわ」
line = "「多分、アルテがこちらの世界に来たのと同じように、２人も別の世界に行っちゃってるってことだと思うわ」"

[[dialogue]]
speaker = "アルテ"
# 「なるほど……私の世界に飛ばされたのであれば、無事に夢幻美術館へ辿り着けているといいのですが」
line = "「なるほど……私の世界に飛ばされたのであれば、無事に夢幻美術館へ辿り着けているといいのですが」"

[[dialogue]]
speaker = "unk"
# 夢幻美術館ってどういうところなの？
line = "夢幻美術館ってどういうところなの？"

[[dialogue]]
speaker = "アルテ"
# 「先ほどもお話しした通り、藝術都市アテネスに建つ美術館です」
line = "「先ほどもお話しした通り、藝術都市アテネスに建つ美術館です」"

[[dialogue]]
speaker = "アルテ"
# 「古くからある由緒正しき美術館なのですが、諸々の事情から一時廃れた状態になっていたらしく……」
line = "「古くからある由緒正しき美術館なのですが、諸々の事情から一時廃れた状態になっていたらしく……」"

[[dialogue]]
speaker = "アルテ"
# 「そこで私を筆頭に新進気鋭の藝術家たちが集い、いまいち頼りない館長を支えつつ芸術活動に勤しんでいる、というわけですね」
line = "「そこで私を筆頭に新進気鋭の藝術家たちが集い、いまいち頼りない館長を支えつつ芸術活動に勤しんでいる、というわけですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「へぇ～、なんだか素敵なところじゃない」
line = "「へぇ～、なんだか素敵なところじゃない」"

[[dialogue]]
speaker = "アルテ"
# 「まあ、良いところばかりではありません。街では色々と危険なことが起きていますから」
line = "「まあ、良いところばかりではありません。街では色々と危険なことが起きていますから」"

[[dialogue]]
speaker = "アルテ"
# 「特に『死の芸術』と呼ばれるものに出くわしたら大変です」
line = "「特に『死の芸術』と呼ばれるものに出くわしたら大変です」"

[[dialogue]]
speaker = "ヴィーナス"
# 「めちゃくちゃ物騒な名前ね！　アナとサーシャさん、あの２人なら大丈夫だと思うけど……」
line = "「めちゃくちゃ物騒な名前ね！　アナとサーシャさん、あの２人なら大丈夫だと思うけど……」"

[[dialogue]]
speaker = "アルテ"
# 「美術館の館長と上手く会えていれば、きっと保護してくれるはずですよ。根っからのお人よしですから」
line = "「美術館の館長と上手く会えていれば、きっと保護してくれるはずですよ。根っからのお人よしですから」"

[[dialogue]]
speaker = "アルテ"
# 「それに館長は置くとしても、その補佐をしているサンソヴィーノや他の藝術家はとても優秀で頼れるので」
line = "「それに館長は置くとしても、その補佐をしているサンソヴィーノや他の藝術家はとても優秀で頼れるので」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナやサーシャさんのことは、無事を祈るしかできなさそうね……」
line = "「アナやサーシャさんのことは、無事を祈るしかできなさそうね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それよりも今は、この異変の原因を一刻も早く解明することだわ！」
line = "「それよりも今は、この異変の原因を一刻も早く解明することだわ！」"

[[dialogue]]
speaker = "unk"
# 手がかりはあのクマ型ロボットかな？
line = "手がかりはあのクマ型ロボットかな？"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう！　あのクマロボよ！」
line = "「そう！　あのクマロボよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あいつらを送り込んできたのが、世界をぐちゃぐちゃにしている元凶に違いないわ！」
line = "「あいつらを送り込んできたのが、世界をぐちゃぐちゃにしている元凶に違いないわ！」"

[[dialogue]]
speaker = "？？？"
# 『そのとーり……くまっ♪』
line = "『そのとーり……くまっ♪』"

[[dialogue]]
speaker = "アルテ"
# 「っ！！？　この声は、私がこの世界に飛ばされる時に聞こえてきた──」
line = "「っ！！？　この声は、私がこの世界に飛ばされる時に聞こえてきた──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この声、どこから！？　姿を現しなさい！！」
line = "「この声、どこから！？　姿を現しなさい！！」"

[[dialogue]]
speaker = "黒ベア子"
# 「じゃじゃーん！」
line = "「じゃじゃーん！」"

[[dialogue]]
speaker = "アルテ"
# 「まさか本当に現れてくれるとは思いませんでしたが……ぶっ飛ばされる覚悟はできているようですね」
line = "「まさか本当に現れてくれるとは思いませんでしたが……ぶっ飛ばされる覚悟はできているようですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたは何者？　どうしてこんなことをするの？　アナやサーシャさんは無事なんでしょうね？」
line = "「あなたは何者？　どうしてこんなことをするの？　アナやサーシャさんは無事なんでしょうね？」"

[[dialogue]]
speaker = "黒ベア子"
# 「そんなにいっぺんに聞かれても答えられないんだくまっ！」
line = "「そんなにいっぺんに聞かれても答えられないんだくまっ！」"

[[dialogue]]
speaker = "黒ベア子"
# 「わたしは黒ベア子！　異世界に送ったお仲間さんたちも、ちゃんと向こうの人と合流できてるよ」
line = "「わたしは黒ベア子！　異世界に送ったお仲間さんたちも、ちゃんと向こうの人と合流できてるよ」"

[[dialogue]]
speaker = "黒ベア子"
# 「そしてっ、なぜこんなことをしたか！　それはぁ……お祭りっくま～～♪♪」
line = "「そしてっ、なぜこんなことをしたか！　それはぁ……お祭りっくま～～♪♪」"

[[dialogue]]
speaker = "アルテ"
# 「……お祭り、ですか？」
line = "「……お祭り、ですか？」"

[[dialogue]]
speaker = "黒ベア子"
# 「普段は一緒に遊べないお仲間さんと、いーーーっぱい盛り上がって欲しいくまっ！」
line = "「普段は一緒に遊べないお仲間さんと、いーーーっぱい盛り上がって欲しいくまっ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わけの分からないことを言ってないで元の世界に帰しなさい！」
line = "「わけの分からないことを言ってないで元の世界に帰しなさい！」"

[[dialogue]]
speaker = "黒ベア子"
# 「それはもっとみんなが楽しんでからくま♪　よーし、頑張るくまよ～～、じゃーあねぇー♪」
line = "「それはもっとみんなが楽しんでからくま♪　よーし、頑張るくまよ～～、じゃーあねぇー♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ、ちょっと待ちなさい──！　って、消えたわね」
line = "「あっ、ちょっと待ちなさい──！　って、消えたわね」"

[[dialogue]]
speaker = "unk"
# でもアナとサーシャさんが無事なのは……
line = "でもアナとサーシャさんが無事なのは……"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね、ひとまず安心したわ」
line = "「そうね、ひとまず安心したわ」"

[[dialogue]]
speaker = "アルテ"
# 「では、その黒クマの『お祭り』とやらに備えるとして……こちらの世界ではあなたたちのお世話になることにしましょう」
line = "「では、その黒クマの『お祭り』とやらに備えるとして……こちらの世界ではあなたたちのお世話になることにしましょう」"

[[dialogue]]
speaker = "アルテ"
# 「では、よっこらせっと……」
line = "「では、よっこらせっと……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっとちょっと、何でソファで寝ようとしてるのよ！」
line = "「ちょっとちょっと、何でソファで寝ようとしてるのよ！」"

[[dialogue]]
speaker = "アルテ"
# 「まずは寝床を確保しなければならないと思いまして」
line = "「まずは寝床を確保しなければならないと思いまして」"

[[dialogue]]
speaker = "アルテ"
# 「ちょうど寝心地の良さそうなソファがありましたので横になってみましたが、これはなかなか……」
line = "「ちょうど寝心地の良さそうなソファがありましたので横になってみましたが、これはなかなか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたは私の家で面倒見てあげるわ。だから応接用のソファを占拠しないの」
line = "「あなたは私の家で面倒見てあげるわ。だから応接用のソファを占拠しないの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まったくとんでもない居候が舞い込んできたものね」
line = "「まったくとんでもない居候が舞い込んできたものね」"

[[dialogue]]
speaker = "アルテ"
# 「ほう、どこかの誰かみたいなことを言いますね」
line = "「ほう、どこかの誰かみたいなことを言いますね」"

[[dialogue]]
speaker = "アルテ"
# 「では私もいつかのこのセリフをお返しするとしましょう、私が寝るところは私が決めます、と……ふふっ」
line = "「では私もいつかのこのセリフをお返しするとしましょう、私が寝るところは私が決めます、と……ふふっ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「何を得意げな顔をしてるのよ、もっと寝心地のいい寝床を用意してあげるって言ってるんだから素直に聞きなさい」
line = "「何を得意げな顔をしてるのよ、もっと寝心地のいい寝床を用意してあげるって言ってるんだから素直に聞きなさい」"

[[dialogue]]
speaker = "アルテ"
# 「ふむ、折角の好意を無下にはできませんね。ではお言葉に甘えるとしましょうか」
line = "「ふむ、折角の好意を無下にはできませんね。ではお言葉に甘えるとしましょうか」"

[[dialogue]]
speaker = "unk"
# あれ、お客さんかな？
line = "あれ、お客さんかな？"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうぞ、開いてるわよ～」
line = "「どうぞ、開いてるわよ～」"

[[dialogue]]
speaker = "フィオナ"
# 「失礼します……」
line = "「失礼します……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いらっしゃい、フィオナ。と──」
line = "「いらっしゃい、フィオナ。と──」"

[[dialogue]]
speaker = "プトラ"
# 「こんにちはー、お邪魔しまーす♪」
line = "「こんにちはー、お邪魔しまーす♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「その子は……誰？」
line = "「その子は……誰？」"
