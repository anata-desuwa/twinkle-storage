[[dialogue]]
speaker = "unk"
# あれから数日──やっぱりメルエルの様子がおかしい。
line = "あれから数日──やっぱりメルエルの様子がおかしい。"

[[dialogue]]
speaker = "unk"
# ダンスも歌声もバッチリだ。けれど、ふとした時に表情が曇る気がする。
line = "ダンスも歌声もバッチリだ。けれど、ふとした時に表情が曇る気がする。"

[[dialogue]]
speaker = "unk"
# 俺が聞いても『何でもないよ』と言うけれど、その表情は明らかに無理をしているようで……
line = "俺が聞いても『何でもないよ』と言うけれど、その表情は明らかに無理をしているようで……"

[[dialogue]]
speaker = "レミカ"
# 「そっか……会長も気になってたんだ。うん、私もちょっと違和感があったんだ」
line = "「そっか……会長も気になってたんだ。うん、私もちょっと違和感があったんだ」"

[[dialogue]]
speaker = "レミカ"
# 「歌もダンスもどんどん上手になってるのに、メルエルの気持ちがついていってないみたいで……」
line = "「歌もダンスもどんどん上手になってるのに、メルエルの気持ちがついていってないみたいで……」"

[[dialogue]]
speaker = "レミカ"
# 「私が学びたかったメルエルの魅力にも、ある時期から陰りを感じてた」
line = "「私が学びたかったメルエルの魅力にも、ある時期から陰りを感じてた」"

[[dialogue]]
speaker = "レミカ"
# 「オッケー。女の子同士の方が話しやすいこともあるかもだし。２人きりの時に聞いてみるね。今日の放課後の練習は、なしでもいいかな？」
line = "「オッケー。女の子同士の方が話しやすいこともあるかもだし。２人きりの時に聞いてみるね。今日の放課後の練習は、なしでもいいかな？」"

[[dialogue]]
speaker = "メルエル"
# 「本当によかったの、練習しなくても？　まだライブまでは時間があるけど……」
line = "「本当によかったの、練習しなくても？　まだライブまでは時間があるけど……」"

[[dialogue]]
speaker = "レミカ"
# 「プロデューサーである会長からのご命令だよ。たまには羽を伸ばしてこいって」
line = "「プロデューサーである会長からのご命令だよ。たまには羽を伸ばしてこいって」"

[[dialogue]]
speaker = "メルエル"
# 「そうなんだ。会長くんが……」
line = "「そうなんだ。会長くんが……」"

[[dialogue]]
speaker = "レミカ"
# 「うん。せっかくだし、前から私が行きたかったスイーツショップに行ってもいい？」
line = "「うん。せっかくだし、前から私が行きたかったスイーツショップに行ってもいい？」"

[[dialogue]]
speaker = "レミカ"
# 「買い食いするとマネージャーに怒られるし、寄り道するのって久しぶりなんだよね。ぁ、メルエルは甘いもの、大丈夫？」
line = "「買い食いするとマネージャーに怒られるし、寄り道するのって久しぶりなんだよね。ぁ、メルエルは甘いもの、大丈夫？」"

[[dialogue]]
speaker = "メルエル"
# 「も、もちろん！　大好きだよ！」
line = "「も、もちろん！　大好きだよ！」"

[[dialogue]]
speaker = "レミカ"
# 「うん、それじゃあ行こっか」
line = "「うん、それじゃあ行こっか」"

[[dialogue]]
speaker = "メルエル"
# 「は～♪　おいしかったぁ、また行こうね、レミカちゃん！」
line = "「は～♪　おいしかったぁ、また行こうね、レミカちゃん！」"

[[dialogue]]
speaker = "レミカ"
# 「うん。新鮮で楽しかった。メルエルが、ショートケーキの苺は最後に食べる派だってわかったし」
line = "「うん。新鮮で楽しかった。メルエルが、ショートケーキの苺は最後に食べる派だってわかったし」"

[[dialogue]]
speaker = "メルエル"
# 「あはは……楽しみは後に取っておくタイプなんだ、私」
line = "「あはは……楽しみは後に取っておくタイプなんだ、私」"

[[dialogue]]
speaker = "メルエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "メルエル"
# 「勘違いだったらごめん、なんだけど……もしかしてレミカちゃん、何かお話したいことがあったりする……？」
line = "「勘違いだったらごめん、なんだけど……もしかしてレミカちゃん、何かお話したいことがあったりする……？」"

[[dialogue]]
speaker = "レミカ"
# 「……うん。そろそろ切り出そうと思ってたんだけど、先に言われちゃったね」
line = "「……うん。そろそろ切り出そうと思ってたんだけど、先に言われちゃったね」"

[[dialogue]]
speaker = "レミカ"
# 「メルエル、何か悩んでること、ないかな？　ここで聞いたことは、私の胸の中だけに留めておくから。よかったら相談してほしいかも」
line = "「メルエル、何か悩んでること、ないかな？　ここで聞いたことは、私の胸の中だけに留めておくから。よかったら相談してほしいかも」"

[[dialogue]]
speaker = "メルエル"
# 「……色々気を遣ってくれたみたいで、ありがとう」
line = "「……色々気を遣ってくれたみたいで、ありがとう」"

[[dialogue]]
speaker = "メルエル"
# 「うん。せっかくだから、相談に乗ってもらっちゃおう、かな……実はね──」
line = "「うん。せっかくだから、相談に乗ってもらっちゃおう、かな……実はね──」"

[[dialogue]]
speaker = "レミカ"
# 「……そっか。メルエルには片想いしてる人がいるんだね。その人を想って浮かべる笑顔を、ステージで観客に向けていいのかどうか、か」
line = "「……そっか。メルエルには片想いしてる人がいるんだね。その人を想って浮かべる笑顔を、ステージで観客に向けていいのかどうか、か」"

[[dialogue]]
speaker = "メルエル"
# 「うん。よくアイドルのライブで『みんな大好き～！』とか『愛してるよ～っ！』とか、言うでしょ？」
line = "「うん。よくアイドルのライブで『みんな大好き～！』とか『愛してるよ～っ！』とか、言うでしょ？」"

[[dialogue]]
speaker = "メルエル"
# 「コメントで見ちゃったんだ。恋人がいるのに嘘の笑顔を向けやがってー、みたいな……それを読んで、ドキっとしちゃって」
line = "「コメントで見ちゃったんだ。恋人がいるのに嘘の笑顔を向けやがってー、みたいな……それを読んで、ドキっとしちゃって」"

[[dialogue]]
speaker = "レミカ"
# 「そっか……ちょっと懐かしいかも。私もファンを騙してるんじゃないかって、悩んだ時期があったから」
line = "「そっか……ちょっと懐かしいかも。私もファンを騙してるんじゃないかって、悩んだ時期があったから」"

[[dialogue]]
speaker = "メルエル"
# 「レミカちゃんが……？」
line = "「レミカちゃんが……？」"

[[dialogue]]
speaker = "レミカ"
# 「うん。言ったことなかったと思うけど、私がアイドルデビューしたきっかけって、お父さんの会社の経営が悪くなったからなんだよね」
line = "「うん。言ったことなかったと思うけど、私がアイドルデビューしたきっかけって、お父さんの会社の経営が悪くなったからなんだよね」"

[[dialogue]]
speaker = "メルエル"
# 「えっ……！？」
line = "「えっ……！？」"

[[dialogue]]
speaker = "レミカ"
# 「共同経営者に騙されたっていう、よくある話。そこに助け船を出して出資してくれたのが、ポラリスプロダクションの社長だったの」
line = "「共同経営者に騙されたっていう、よくある話。そこに助け船を出して出資してくれたのが、ポラリスプロダクションの社長だったの」"

[[dialogue]]
speaker = "レミカ"
# 「その社長が出資の条件にしたのが、ポラリスプロダクションからの、私のアイドルデビューだった」
line = "「その社長が出資の条件にしたのが、ポラリスプロダクションからの、私のアイドルデビューだった」"

[[dialogue]]
speaker = "レミカ"
# 「その頃の私は、まだ附属生にもなってない頃だったんだけど……あちこちのカラオケ大会に出場してて、一部ではちょっと有名だった」
line = "「その頃の私は、まだ附属生にもなってない頃だったんだけど……あちこちのカラオケ大会に出場してて、一部ではちょっと有名だった」"

[[dialogue]]
speaker = "レミカ"
# 「社長はその噂を聞きつけて、私の歌はお金になる、って思ったみたい」
line = "「社長はその噂を聞きつけて、私の歌はお金になる、って思ったみたい」"

[[dialogue]]
speaker = "メルエル"
# 「お、お金にって……！」
line = "「お、お金にって……！」"

[[dialogue]]
speaker = "レミカ"
# 「あっ、勘違いしないで欲しいんだけど、ポラプロの社長はちゃんとした人だよ。出資もアイドルも、ビジネスだからね」
line = "「あっ、勘違いしないで欲しいんだけど、ポラプロの社長はちゃんとした人だよ。出資もアイドルも、ビジネスだからね」"

[[dialogue]]
speaker = "レミカ"
# 「それで、私も元々アイドルがやりたかったから、そのオファー自体は二つ返事だったよ」
line = "「それで、私も元々アイドルがやりたかったから、そのオファー自体は二つ返事だったよ」"

[[dialogue]]
speaker = "レミカ"
# 「デビュー前、最初のプロデューサーとはたくさん作戦会議をした」
line = "「デビュー前、最初のプロデューサーとはたくさん作戦会議をした」"

[[dialogue]]
speaker = "レミカ"
# 「私はもちろん、『みんなに元気をあげられるような、カワイイアイドル』がやりたいって言った」
line = "「私はもちろん、『みんなに元気をあげられるような、カワイイアイドル』がやりたいって言った」"

[[dialogue]]
speaker = "レミカ"
# 「でも、その時のプロデューサーは冷静だったよ」
line = "「でも、その時のプロデューサーは冷静だったよ」"

[[dialogue]]
speaker = "プロデューサー"
# 「君には歌唱の才能があるが、『カワイイ』アイドルは決して君の適性ではないよ」
line = "「君には歌唱の才能があるが、『カワイイ』アイドルは決して君の適性ではないよ」"

[[dialogue]]
speaker = "プロデューサー"
# 「君の持つ才能を活かすのなら、『クール』アイドル……アーティスティックでかっこいい、女性が憧れるようなアイドル像がいいだろう」
line = "「君の持つ才能を活かすのなら、『クール』アイドル……アーティスティックでかっこいい、女性が憧れるようなアイドル像がいいだろう」"

[[dialogue]]
speaker = "レミカ"
# 「プロデューサーの読みは当たった」
line = "「プロデューサーの読みは当たった」"

[[dialogue]]
speaker = "レミカ"
# 「私のデビュー曲はミリオンセラーになって、一気にスターアイドルになった」
line = "「私のデビュー曲はミリオンセラーになって、一気にスターアイドルになった」"

[[dialogue]]
speaker = "レミカ"
# 「この売り方に関して、不満はないよ。アイドルもビジネスなんだから、より勝算の高い方を選ぶべきだし、プロデューサーの目利きは実際確かだった」
line = "「この売り方に関して、不満はないよ。アイドルもビジネスなんだから、より勝算の高い方を選ぶべきだし、プロデューサーの目利きは実際確かだった」"

[[dialogue]]
speaker = "レミカ"
# 「でも、あまりにも爆発的にヒットしちゃったし、『愛戸レミカと言えばクール』みたいなイメージがあっと言う間に定着しちゃったから、焦ったし悩んだ」
line = "「でも、あまりにも爆発的にヒットしちゃったし、『愛戸レミカと言えばクール』みたいなイメージがあっと言う間に定着しちゃったから、焦ったし悩んだ」"

[[dialogue]]
speaker = "レミカ"
# 「私自身は『カワイイ』こそがアイドルの王道だと思ってるのに、それとはまったく違う演出やパフォーマンスを見せてる」
line = "「私自身は『カワイイ』こそがアイドルの王道だと思ってるのに、それとはまったく違う演出やパフォーマンスを見せてる」"

[[dialogue]]
speaker = "レミカ"
# 「アイドルをやっていく中で、『クール』こそが自分の道だって信じられたらよかったんだけど、結局『カワイイ』アイドルへの憧れを手放せなかったんだ」
line = "「アイドルをやっていく中で、『クール』こそが自分の道だって信じられたらよかったんだけど、結局『カワイイ』アイドルへの憧れを手放せなかったんだ」"

[[dialogue]]
speaker = "レミカ"
# 「そんな半端者だったから……アイドルを始めてしばらくして、自分はファンを騙しているんじゃないかって思うようになってた」
line = "「そんな半端者だったから……アイドルを始めてしばらくして、自分はファンを騙しているんじゃないかって思うようになってた」"

[[dialogue]]
speaker = "メルエル"
# 「レミカちゃん……」
line = "「レミカちゃん……」"

[[dialogue]]
speaker = "レミカ"
# 「でもね……初代プロデューサーに言われたんだ。『自分の思い込みに囚われずに、自分を好いてくれている人の声を聴け』って」
line = "「でもね……初代プロデューサーに言われたんだ。『自分の思い込みに囚われずに、自分を好いてくれている人の声を聴け』って」"

[[dialogue]]
speaker = "レミカ"
# 「それから、デビューしてから届いたファンレターを、全部読み返したんだ」
line = "「それから、デビューしてから届いたファンレターを、全部読み返したんだ」"

[[dialogue]]
speaker = "レミカ"
# 「ファンレターには、私の格好いい姿に勇気をもらえたとか、不登校だけど頑張ってみるとか、そういう女の子からのエールがいっぱい届いてて……」
line = "「ファンレターには、私の格好いい姿に勇気をもらえたとか、不登校だけど頑張ってみるとか、そういう女の子からのエールがいっぱい届いてて……」"

[[dialogue]]
speaker = "レミカ"
# 「その時に気づいたんだよね。小さい頃に憧れた、キラキラしたアイドルではないけれど、ステージの上で私は嘘をついていないって」
line = "「その時に気づいたんだよね。小さい頃に憧れた、キラキラしたアイドルではないけれど、ステージの上で私は嘘をついていないって」"

[[dialogue]]
speaker = "レミカ"
# 「最初にやりたかったこととは違ったけれど、適当にやったことなんか１回もなかった。だったらそれは、本物ってことなんじゃないかって」
line = "「最初にやりたかったこととは違ったけれど、適当にやったことなんか１回もなかった。だったらそれは、本物ってことなんじゃないかって」"

[[dialogue]]
speaker = "レミカ"
# 「少なくとも、常に私はファンのために本気だった。そこに嘘や騙しの気持ちは一切なかったよ」
line = "「少なくとも、常に私はファンのために本気だった。そこに嘘や騙しの気持ちは一切なかったよ」"

[[dialogue]]
speaker = "メルエル"
# 「やり方は違っても、届けたい気持ちは同じ……誠意の問題ってこと？」
line = "「やり方は違っても、届けたい気持ちは同じ……誠意の問題ってこと？」"

[[dialogue]]
speaker = "レミカ"
# 「簡潔にまとめると、そういうことになるかな」
line = "「簡潔にまとめると、そういうことになるかな」"

[[dialogue]]
speaker = "メルエル"
# 「でもそれじゃあ、私は余計にダメなんじゃないかなあ……」
line = "「でもそれじゃあ、私は余計にダメなんじゃないかなあ……」"

[[dialogue]]
speaker = "メルエル"
# 「私の笑顔も、私の気持ちも、全部全部、好きな人のためにあるんだよ……？」
line = "「私の笑顔も、私の気持ちも、全部全部、好きな人のためにあるんだよ……？」"

[[dialogue]]
speaker = "メルエル"
# 「他の人たちがどんなに私を『カワイイ』って思ってくれても、私はその姿を、本当はたった１人のために作ってるの」
line = "「他の人たちがどんなに私を『カワイイ』って思ってくれても、私はその姿を、本当はたった１人のために作ってるの」"

[[dialogue]]
speaker = "レミカ"
# 「たぶん、気持ちを『恋愛』に限定するからいけないんだよ」
line = "「たぶん、気持ちを『恋愛』に限定するからいけないんだよ」"

[[dialogue]]
speaker = "メルエル"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "レミカ"
# 「メルエルはライブを見に来てくれる人のために、一生懸命練習してるよ。歌を聴いて元気になってほしいと思ってるし、愛情を持ってパフォーマンスをしてる」
line = "「メルエルはライブを見に来てくれる人のために、一生懸命練習してるよ。歌を聴いて元気になってほしいと思ってるし、愛情を持ってパフォーマンスをしてる」"

[[dialogue]]
speaker = "レミカ"
# 「その溢れんばかりの『愛』は……横で一緒にレッスンをしていた私が、一番よく分かってる」
line = "「その溢れんばかりの『愛』は……横で一緒にレッスンをしていた私が、一番よく分かってる」"

[[dialogue]]
speaker = "レミカ"
# 「そう、『愛』なんだよ……それこそが私がメルエルから学びたかった才能で、魅力で、アイドルとしての素質だから」
line = "「そう、『愛』なんだよ……それこそが私がメルエルから学びたかった才能で、魅力で、アイドルとしての素質だから」"

[[dialogue]]
speaker = "メルエル"
# 「はうぅぅ……真っすぐに『愛』って言われちゃうと、ちょっと照れちゃうよぉ」
line = "「はうぅぅ……真っすぐに『愛』って言われちゃうと、ちょっと照れちゃうよぉ」"

[[dialogue]]
speaker = "レミカ"
# 「でも、それがメルエルだから」
line = "「でも、それがメルエルだから」"

[[dialogue]]
speaker = "レミカ"
# 「私も理解するまでは、『愛』なんて直球な言葉を使うのは照れ臭かったけど……でも、アイドルの本質は『愛』なんだと思う」
line = "「私も理解するまでは、『愛』なんて直球な言葉を使うのは照れ臭かったけど……でも、アイドルの本質は『愛』なんだと思う」"

[[dialogue]]
speaker = "レミカ"
# 「私はファンを愛してるし、メルエルもちゃんと愛してる。そこに嘘はないって確信してるんだ」
line = "「私はファンを愛してるし、メルエルもちゃんと愛してる。そこに嘘はないって確信してるんだ」"

[[dialogue]]
speaker = "レミカ"
# 「それに……まだデビューしてないメルエルが、ファンとの距離感に悩む必要はないよ」
line = "「それに……まだデビューしてないメルエルが、ファンとの距離感に悩む必要はないよ」"

[[dialogue]]
speaker = "レミカ"
# 「そういうしがらみに巻き込まないための１日限定ユニット、１日限定デビューだからね」
line = "「そういうしがらみに巻き込まないための１日限定ユニット、１日限定デビューだからね」"

[[dialogue]]
speaker = "メルエル"
# 「た、確かに……！　私、ちょっとおこがましかったかもっ」
line = "「た、確かに……！　私、ちょっとおこがましかったかもっ」"

[[dialogue]]
speaker = "メルエル"
# 「いくらレミカちゃんと一緒にライブするって言っても、私自身はまだアイドルでも何でもなかったのにねっ」
line = "「いくらレミカちゃんと一緒にライブするって言っても、私自身はまだアイドルでも何でもなかったのにねっ」"

[[dialogue]]
speaker = "レミカ"
# 「あはは、そこは心配しなくていいけどね。メルエルだったら、１日もあれば１００万人はファンが付くだろうから」
line = "「あはは、そこは心配しなくていいけどね。メルエルだったら、１日もあれば１００万人はファンが付くだろうから」"

[[dialogue]]
speaker = "レミカ"
# 「まあでも、ファンに疑似恋愛させるだけがアイドルじゃないから」
line = "「まあでも、ファンに疑似恋愛させるだけがアイドルじゃないから」"

[[dialogue]]
speaker = "メルエル"
# 「ふえ……？」
line = "「ふえ……？」"

[[dialogue]]
speaker = "レミカ"
# 「『アイドル』って聞くとそういう対象として見てくるお客さんがいるのも事実だし、そういう売り方をするアイドルも否定しないけど……」
line = "「『アイドル』って聞くとそういう対象として見てくるお客さんがいるのも事実だし、そういう売り方をするアイドルも否定しないけど……」"

[[dialogue]]
speaker = "レミカ"
# 「アイドルの『愛』は、そんな小さな器に収まるものじゃないよ……！」
line = "「アイドルの『愛』は、そんな小さな器に収まるものじゃないよ……！」"

[[dialogue]]
speaker = "レミカ"
# 「たった１人の男の子に片想いしてるアイドルがいても、いいんじゃないかな？　むしろ、その人のことを好きだって気持ち、隠さない方がいいよ」
line = "「たった１人の男の子に片想いしてるアイドルがいても、いいんじゃないかな？　むしろ、その人のことを好きだって気持ち、隠さない方がいいよ」"

[[dialogue]]
speaker = "メルエル"
# 「い、いいの……！？」
line = "「い、いいの……！？」"

[[dialogue]]
speaker = "レミカ"
# 「そうだ、せっかくだから、ライブ前のＭＣで堂々と宣言しちゃうのはどう？　『私には片想いしている人がいます！』って」
line = "「そうだ、せっかくだから、ライブ前のＭＣで堂々と宣言しちゃうのはどう？　『私には片想いしている人がいます！』って」"

[[dialogue]]
speaker = "レミカ"
# 「『片想い系純愛アイドル』……！　うんうん、すごくいいキャッチフレーズなんじゃないかな」
line = "「『片想い系純愛アイドル』……！　うんうん、すごくいいキャッチフレーズなんじゃないかな」"

[[dialogue]]
speaker = "メルエル"
# 「全然ダメだよ！？　それすっごく恥ずかしいからっ！」
line = "「全然ダメだよ！？　それすっごく恥ずかしいからっ！」"

[[dialogue]]
speaker = "レミカ"
# 「あはは、まあそれは冗談にしてもさ……さっきも言ったでしょ、アイドルの本質は『愛』だから」
line = "「あはは、まあそれは冗談にしてもさ……さっきも言ったでしょ、アイドルの本質は『愛』だから」"

[[dialogue]]
speaker = "レミカ"
# 「その人と話した時の楽しさとか、親切にしてもらえた時の喜びとか……幸せいっぱいの、偽りない笑顔を観客に届けてくれたら、それでいいんだよ」
line = "「その人と話した時の楽しさとか、親切にしてもらえた時の喜びとか……幸せいっぱいの、偽りない笑顔を観客に届けてくれたら、それでいいんだよ」"

[[dialogue]]
speaker = "メルエル"
# 「レミカちゃん……」
line = "「レミカちゃん……」"

[[dialogue]]
speaker = "レミカ"
# 「メルエルと同じように、片想いしてる女の子を勇気づけて、笑顔にしちゃうようなアイドルになればいいんじゃない？」
line = "「メルエルと同じように、片想いしてる女の子を勇気づけて、笑顔にしちゃうようなアイドルになればいいんじゃない？」"

[[dialogue]]
speaker = "レミカ"
# 「──と、まあ。私に言えるのはこれくらいなんだけど……少しは参考になったかな」
line = "「──と、まあ。私に言えるのはこれくらいなんだけど……少しは参考になったかな」"

[[dialogue]]
speaker = "メルエル"
# 「うん……ありがとう、レミカちゃん！　ちょっとだけだけど、舞台の上で自分がどんな表情をすればいいのか、見えてきた気がする！」
line = "「うん……ありがとう、レミカちゃん！　ちょっとだけだけど、舞台の上で自分がどんな表情をすればいいのか、見えてきた気がする！」"

[[dialogue]]
speaker = "レミカ"
# 「それならよかった。会長も心配してたからさ、明日の放課後はばっちり決まってるダンス、見せてあげようよ」
line = "「それならよかった。会長も心配してたからさ、明日の放課後はばっちり決まってるダンス、見せてあげようよ」"

[[dialogue]]
speaker = "メルエル"
# 「──うん！！」
line = "「──うん！！」"

[[dialogue]]
speaker = "レミカ"
# 「来たね、会長」
line = "「来たね、会長」"

[[dialogue]]
speaker = "メルエル"
# 「会長くん！　昨日はありがとうね！」
line = "「会長くん！　昨日はありがとうね！」"

[[dialogue]]
speaker = "unk"
# 俺は何もしてないよ
line = "俺は何もしてないよ"

[[dialogue]]
speaker = "メルエル"
# 「ううん。レミカちゃんから、会長くんも心配してるって聞いたから……でもおかげで、もうばっちりだよ！」
line = "「ううん。レミカちゃんから、会長くんも心配してるって聞いたから……でもおかげで、もうばっちりだよ！」"

[[dialogue]]
speaker = "レミカ"
# 「見せてあげなよ、メルエル」
line = "「見せてあげなよ、メルエル」"

[[dialogue]]
speaker = "メルエル"
# 「うんっ──変身！」
line = "「うんっ──変身！」"

[[dialogue]]
speaker = "メルエル"
# 「私も戦闘服を起動できるようになったよ！　これでもっとキミの役に立てそう！」
line = "「私も戦闘服を起動できるようになったよ！　これでもっとキミの役に立てそう！」"

[[dialogue]]
speaker = "レミカ"
# 「さ、会長。アーネストの準備はばっちりだよ？」
line = "「さ、会長。アーネストの準備はばっちりだよ？」"

[[dialogue]]
speaker = "メルエル"
# 「今日もコーチ、よろしくお願いしますっ！」
line = "「今日もコーチ、よろしくお願いしますっ！」"

[[dialogue]]
speaker = "unk"
# よし、２人とも練習開始だ！
line = "よし、２人とも練習開始だ！"

[[dialogue]]
speaker = "unk"
# メルエルの悩みの内容までは把握できなかったけれど、うまくいったようで何よりだ。
line = "メルエルの悩みの内容までは把握できなかったけれど、うまくいったようで何よりだ。"

[[dialogue]]
speaker = "unk"
# 歌とダンスのクオリティもどんどん向上している──アーネストのライブ成功は、もはや疑いなしだ。
line = "歌とダンスのクオリティもどんどん向上している──アーネストのライブ成功は、もはや疑いなしだ。"

[[dialogue]]
speaker = "unk"
# 数日後のオープンキャンパスが終われば俺も楽になる。当日は星徒会のみんなを誘って観に行くことにしよう──
line = "数日後のオープンキャンパスが終われば俺も楽になる。当日は星徒会のみんなを誘って観に行くことにしよう──"

[[dialogue]]
speaker = "unk"
# その日──愛戸レミカは芸能事務所でのレッスンを終え、帰路についていた。
line = "その日──愛戸レミカは芸能事務所でのレッスンを終え、帰路についていた。"

[[dialogue]]
speaker = "unk"
# かつて憧れていた『カワイイ』アイドルのライブまであと少し。もっとよい歌を、もっとよいパフォーマンスを──と考えながら歩いていた。
line = "かつて憧れていた『カワイイ』アイドルのライブまであと少し。もっとよい歌を、もっとよいパフォーマンスを──と考えながら歩いていた。"

[[dialogue]]
speaker = "レミカ"
# 「楽しみだな……アーネストのライブ。メルエルの上達もすごいし、会長の指示も的確だし」
line = "「楽しみだな……アーネストのライブ。メルエルの上達もすごいし、会長の指示も的確だし」"

[[dialogue]]
speaker = "レミカ"
# 「私もようやく、『カワイイ』の極意が掴めてきた気がするよ。やっぱり才能のある人に学ぶって大切なことだな」
line = "「私もようやく、『カワイイ』の極意が掴めてきた気がするよ。やっぱり才能のある人に学ぶって大切なことだな」"

[[dialogue]]
speaker = "レミカ"
# 「ふふっ、父さんも社長も絶対に呼ばないとね。すごいライブ、見せてあげよう……」
line = "「ふふっ、父さんも社長も絶対に呼ばないとね。すごいライブ、見せてあげよう……」"

[[dialogue]]
speaker = "レミカ"
# 「あれ。社長から……？　何だろ」
line = "「あれ。社長から……？　何だろ」"

[[dialogue]]
speaker = "レミカ"
# 「もしもし。どうかしました？」
line = "「もしもし。どうかしました？」"

[[dialogue]]
speaker = "レミカ"
# 「…………えっ？」
line = "「…………えっ？」"

[[dialogue]]
speaker = "レミカ"
# 「アーネストのライブを、取りやめる……！？　ど、どういうことですか、それっ……！？」
line = "「アーネストのライブを、取りやめる……！？　ど、どういうことですか、それっ……！？」"
