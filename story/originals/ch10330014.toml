[[dialogue]]
speaker = "unk"
# 第４話,ご褒美はチョコレート,P
line = "第４話,ご褒美はチョコレート,P"

[[dialogue]]
speaker = "unk"
# ──アニュラスの補修テストがあるというので、俺は自宅で勉強を教えていた。
line = "──アニュラスの補修テストがあるというので、俺は自宅で勉強を教えていた。"

[[dialogue]]
speaker = "アニュラス"
# 「――こんなところか。会長、感謝する。これで何とか明日のテストに臨めそうだ」
line = "「――こんなところか。会長、感謝する。これで何とか明日のテストに臨めそうだ」"

[[dialogue]]
speaker = "アニュラス"
# 「それにしても、お前の家はいつも居心地がいいな。勉強も何故か自宅の数倍は捗るんだ」
line = "「それにしても、お前の家はいつも居心地がいいな。勉強も何故か自宅の数倍は捗るんだ」"

[[dialogue]]
speaker = "アニュラス"
# 「惜しむべきは少し学園から道がわかりにくいことくらいか。まあ、迷ったりはしないんだが」
line = "「惜しむべきは少し学園から道がわかりにくいことくらいか。まあ、迷ったりはしないんだが」"

[[dialogue]]
speaker = "unk"
# いや、毎回迷って遅れて来るよね！？
line = "いや、毎回迷って遅れて来るよね！？"

[[dialogue]]
speaker = "アニュラス"
# 「安心して欲しい、次こそは約束の時間通りに到着してみせる」
line = "「安心して欲しい、次こそは約束の時間通りに到着してみせる」"

[[dialogue]]
speaker = "リノ"
# 「アニュラスちゃん、お茶とお紅茶、どっちがいいとかある？」
line = "「アニュラスちゃん、お茶とお紅茶、どっちがいいとかある？」"

[[dialogue]]
speaker = "アニュラス"
# 「あっ、お母様。何卒お構いなく。今日はそろそろお暇致しますので」
line = "「あっ、お母様。何卒お構いなく。今日はそろそろお暇致しますので」"

[[dialogue]]
speaker = "リノ"
# 「あら、そうなの？　でも、せっかくお茶菓子もいただいたんだし、一緒に食べて行けばいいんじゃない？」
line = "「あら、そうなの？　でも、せっかくお茶菓子もいただいたんだし、一緒に食べて行けばいいんじゃない？」"

[[dialogue]]
speaker = "アニュラス"
# 「いえ、甘いものは特別な時にしか食べないと心に誓っておりますので。どうぞ皆様で召し上がってください」
line = "「いえ、甘いものは特別な時にしか食べないと心に誓っておりますので。どうぞ皆様で召し上がってください」"

[[dialogue]]
speaker = "リノ"
# 「そ、そう……？」
line = "「そ、そう……？」"

[[dialogue]]
speaker = "リノ"
# （礼儀正しいし、息子のお嫁さんにしたいくらい可愛い子なんだけど、どうしていつも仮面をつけたままなのかしら……？）
line = "（礼儀正しいし、息子のお嫁さんにしたいくらい可愛い子なんだけど、どうしていつも仮面をつけたままなのかしら……？）"

[[dialogue]]
speaker = "アニュラス"
# 「では、会長。明日のテストの結果、楽しみにしておいて欲しい。成果を必ず出せるように頑張ってくる！」
line = "「では、会長。明日のテストの結果、楽しみにしておいて欲しい。成果を必ず出せるように頑張ってくる！」"

[[dialogue]]
speaker = "アニュラス"
# 「さて、出口はこっちだったか」
line = "「さて、出口はこっちだったか」"

[[dialogue]]
speaker = "リノ"
# 「そっちはお手洗いね」
line = "「そっちはお手洗いね」"

[[dialogue]]
speaker = "アニュラス"
# 「失礼。こっちでしたね」
line = "「失礼。こっちでしたね」"

[[dialogue]]
speaker = "リノ"
# 「そっちは息子の部屋ね」
line = "「そっちは息子の部屋ね」"

[[dialogue]]
speaker = "アニュラス"
# 「……か、会長、すまないが出来れば見送りを頼みたい」
line = "「……か、会長、すまないが出来れば見送りを頼みたい」"

[[dialogue]]
speaker = "unk"
# （次回からは迎えに行くようにしよう……）
line = "（次回からは迎えに行くようにしよう……）"

[[dialogue]]
speaker = "unk"
# ――それから三日後。
line = "――それから三日後。"

[[dialogue]]
speaker = "アニュラス"
# 「今日、テストの結果が帰ってきた。会長と一緒に確認したいと思って、まだ中身を見ていない」
line = "「今日、テストの結果が帰ってきた。会長と一緒に確認したいと思って、まだ中身を見ていない」"

[[dialogue]]
speaker = "アニュラス"
# 「正直、わからない解答も多々あった。しかし、私は分数ができるようになっていたし、歴史のテストを睡眠の時間に使うこともなくなった」
line = "「正直、わからない解答も多々あった。しかし、私は分数ができるようになっていたし、歴史のテストを睡眠の時間に使うこともなくなった」"

[[dialogue]]
speaker = "unk"
# （テーブルに置かれたテストの結果を見る）
line = "（テーブルに置かれたテストの結果を見る）"

[[dialogue]]
speaker = "アニュラス"
# 「だからその……間違えは多くても、明らかな成長を感じていることだけは確かだ」
line = "「だからその……間違えは多くても、明らかな成長を感じていることだけは確かだ」"

[[dialogue]]
speaker = "アニュラス"
# 「か、会長……どうだ？」
line = "「か、会長……どうだ？」"

[[dialogue]]
speaker = "unk"
# 国語、３１点。英語、３８点！
line = "国語、３１点。英語、３８点！"

[[dialogue]]
speaker = "unk"
# 数学、６５点。歴史、４２点
line = "数学、６５点。歴史、４２点"

[[dialogue]]
speaker = "アニュラス"
# 「あ、赤点が……１つも……ない……！？」
line = "「あ、赤点が……１つも……ない……！？」"

[[dialogue]]
speaker = "アニュラス"
# 「す、凄いぞ、会長！　しかも数学においては、集中して勉強したおかげか５０点を超えている……！　こんなことは１０年ぶりだ！」
line = "「す、凄いぞ、会長！　しかも数学においては、集中して勉強したおかげか５０点を超えている……！　こんなことは１０年ぶりだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「やった……私はついにやったんだ……！」
line = "「やった……私はついにやったんだ……！」"

[[dialogue]]
speaker = "アニュラス"
# 「ありがとう、会長！　この恩は忘れない。苦手なことでも、１つ１つ努力を積み重ねれば実を結ぶのだな……！」
line = "「ありがとう、会長！　この恩は忘れない。苦手なことでも、１つ１つ努力を積み重ねれば実を結ぶのだな……！」"

[[dialogue]]
speaker = "unk"
# 頑張ったアニュラスに、ご褒美がある
line = "頑張ったアニュラスに、ご褒美がある"

[[dialogue]]
speaker = "アニュラス"
# 「ご褒美……？　あ、これは……チョコレート……！」
line = "「ご褒美……？　あ、これは……チョコレート……！」"

[[dialogue]]
speaker = "アニュラス"
# 「ありがとう……これ、食べてもいいのか？　……うむ。そうしたら、いただきます。あぁーむ……んくっ」
line = "「ありがとう……これ、食べてもいいのか？　……うむ。そうしたら、いただきます。あぁーむ……んくっ」"

[[dialogue]]
speaker = "アニュラス"
# 「――甘くて美味しいな。明日からも、頑張れそうだ！」
line = "「――甘くて美味しいな。明日からも、頑張れそうだ！」"

[[dialogue]]
speaker = "アニュラス"
# 「……会長は、お父様に少し似ているところがある。優しさと厳しさを兼ね備えていたりするところとか、私が欲しいものを察してくれるところとか」
line = "「……会長は、お父様に少し似ているところがある。優しさと厳しさを兼ね備えていたりするところとか、私が欲しいものを察してくれるところとか」"

[[dialogue]]
speaker = "アニュラス"
# 「いや、他人と比べるのは失礼だな。会長、私は……」
line = "「いや、他人と比べるのは失礼だな。会長、私は……」"

[[dialogue]]
speaker = "アニュラス"
# 「――お前のことを好ましく思っているのかもしれない」
line = "「――お前のことを好ましく思っているのかもしれない」"

[[dialogue]]
speaker = "unk"
# え！？　そ、それって……
line = "え！？　そ、それって……"

[[dialogue]]
speaker = "アニュラス"
# 「ふふ……だから、これからも見極めさせてもらおうと思う」
line = "「ふふ……だから、これからも見極めさせてもらおうと思う」"

[[dialogue]]
speaker = "アニュラス"
# 「お前が、私にとってお父様とは別の、大切な人になるのかどうかを、な」
line = "「お前が、私にとってお父様とは別の、大切な人になるのかどうかを、な」"

[[dialogue]]
speaker = "unk"
# ……いや、ダメだな。それはできない
line = "……いや、ダメだな。それはできない"

[[dialogue]]
speaker = "アニュラス"
# 「まさかの即失恋！？」
line = "「まさかの即失恋！？」"

[[dialogue]]
speaker = "アニュラス"
# 「いや、待て会長！　私の何がダメなんだ！？　仮面か！？　この仮面なのか！？　これちゃんと取り外しできるから！　ほら！」
line = "「いや、待て会長！　私の何がダメなんだ！？　仮面か！？　この仮面なのか！？　これちゃんと取り外しできるから！　ほら！」"

[[dialogue]]
speaker = "unk"
# まだ、アニュラスに実力で認めさせてない
line = "まだ、アニュラスに実力で認めさせてない"

[[dialogue]]
speaker = "アニュラス"
# 「……！　そうか……そうだったな」
line = "「……！　そうか……そうだったな」"

[[dialogue]]
speaker = "アニュラス"
# 「それで？　お前の表情を見るに、どうやら準備は出来ているといった雰囲気だが？」
line = "「それで？　お前の表情を見るに、どうやら準備は出来ているといった雰囲気だが？」"

[[dialogue]]
speaker = "unk"
# ああ、今日これから勝負だ、アニュラス！
line = "ああ、今日これから勝負だ、アニュラス！"

[[dialogue]]
speaker = "アニュラス"
# 「いいだろう、会長。受けて立つ！」
line = "「いいだろう、会長。受けて立つ！」"

[[dialogue]]
speaker = "アニュラス"
# 「私に、お前を認めさせてみろ！」
line = "「私に、お前を認めさせてみろ！」"

[[dialogue]]
speaker = "unk"
# ――その時、アニュラスの浮かべた笑顔に、ドキッと胸の高鳴る自分がいて。
line = "――その時、アニュラスの浮かべた笑顔に、ドキッと胸の高鳴る自分がいて。"

[[dialogue]]
speaker = "unk"
# 初めて会った日とは違う火が、いつの間にか胸に灯っていたことに、俺は気付くのだった。
line = "初めて会った日とは違う火が、いつの間にか胸に灯っていたことに、俺は気付くのだった。"
