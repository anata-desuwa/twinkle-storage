[[dialogue]]
speaker = "unk"
# 第１話,マトイのお母さん,P
line = "第１話,マトイのお母さん,P"

[[dialogue]]
speaker = "unk"
# マトイがノヴァフォームを手に入れてから少し経ったある日の放課後。俺は恋人でもある彼女と一緒に、トレーニング施設で訓練を行っていた。
line = "マトイがノヴァフォームを手に入れてから少し経ったある日の放課後。俺は恋人でもある彼女と一緒に、トレーニング施設で訓練を行っていた。"

[[dialogue]]
speaker = "unk"
# Ｓランクモンスター複数体を仮想敵として出現させ、２人で挑んでいたのだが――
line = "Ｓランクモンスター複数体を仮想敵として出現させ、２人で挑んでいたのだが――"

[[dialogue]]
speaker = "unk"
# よし、やったぞ！　両学園の最速記録を更新だ！
line = "よし、やったぞ！　両学園の最速記録を更新だ！"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「うん！　息ピッタリだったね、えへへ♪」
line = "「うん！　息ピッタリだったね、えへへ♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ノヴァフォーム、少しずつ慣れてきた感じがするよ」
line = "「ノヴァフォーム、少しずつ慣れてきた感じがするよ」"

[[dialogue]]
speaker = "unk"
# ふと、ぱちぱちと拍手する音が聞こえて――
line = "ふと、ぱちぱちと拍手する音が聞こえて――"

[[dialogue]]
speaker = "トマル"
# 「お２人とも素晴らしかったです。姉さまの新しい力、見させて頂きました」
line = "「お２人とも素晴らしかったです。姉さまの新しい力、見させて頂きました」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「トマル！　来てたの？」
line = "「トマル！　来てたの？」"

[[dialogue]]
speaker = "unk"
# 流星学園附属校３年生、詠野トマル――
line = "流星学園附属校３年生、詠野トマル――"

[[dialogue]]
speaker = "unk"
# 彼は、マトイの<b>弟</b>である。
line = "彼は、マトイの<b>弟</b>である。"

[[dialogue]]
speaker = "unk"
# とはいえ、トマルはマトイのような『普通の女の子』になりたいという憧れを持つ、いわゆる男の娘である。
line = "とはいえ、トマルはマトイのような『普通の女の子』になりたいという憧れを持つ、いわゆる男の娘である。"

[[dialogue]]
speaker = "トマル"
# 「姉さま、とても格好良かったです。これからは姉さまに憧れる生徒も多くなりそうですね」
line = "「姉さま、とても格好良かったです。これからは姉さまに憧れる生徒も多くなりそうですね」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ありがとう。どうなるかは正直わからないけど、私は私らしく、普通を忘れないように頑張るよ」
line = "「ありがとう。どうなるかは正直わからないけど、私は私らしく、普通を忘れないように頑張るよ」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「これは特別な力だから。会長のおかげで使えるようになっただけで、私ひとりの力ってわけじゃない」
line = "「これは特別な力だから。会長のおかげで使えるようになっただけで、私ひとりの力ってわけじゃない」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「大切なのは、普通じゃない力に驕らず、努力し続けること。それこそが困難な状況に陥った時、諦めず立ち上がれる強さに変わるって、この前の戦いでわかったから」
line = "「大切なのは、普通じゃない力に驕らず、努力し続けること。それこそが困難な状況に陥った時、諦めず立ち上がれる強さに変わるって、この前の戦いでわかったから」"

[[dialogue]]
speaker = "？？？"
# 「ふふっ、マトイ、また１つ成長したのね♪」
line = "「ふふっ、マトイ、また１つ成長したのね♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「えっ……！？　その声は――」
line = "「えっ……！？　その声は――」"

[[dialogue]]
speaker = "unk"
# 振り返ると、そこにはマトイが大人になったかのような綺麗な女性がいて――
line = "振り返ると、そこにはマトイが大人になったかのような綺麗な女性がいて――"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「お母さん！？」
line = "「お母さん！？」"

[[dialogue]]
speaker = "マトイ母"
# 「は～い♪　トマルに案内して貰って、来ちゃった♪」
line = "「は～い♪　トマルに案内して貰って、来ちゃった♪」"

[[dialogue]]
speaker = "トマル"
# 「会長さま、紹介しますね。こちら、私たち<ruby=きょうだい>姉弟</ruby>の母さまで――」
line = "「会長さま、紹介しますね。こちら、私たち<ruby>姉弟<rt>きょうだい</rt></ruby>の母さまで――」"

[[dialogue]]
speaker = "マトイ母"
# 「<ruby=よみの>詠野</ruby>マモリで～す♪　普通の主婦をやってます♪　子供たちがいつもお世話になってます、会長くん♪　特にマトイは、色々とね？　ふふっ♪」
line = "「<ruby>詠野<rt>よみの</rt></ruby>マモリで～す♪　普通の主婦をやってます♪　子供たちがいつもお世話になってます、会長くん♪　特にマトイは、色々とね？　ふふっ♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「お母さん、どうして学園に……！？」
line = "「お母さん、どうして学園に……！？」"

[[dialogue]]
speaker = "マトイ母"
# 「マトイが星騎士として普通じゃない力を手に入れたったって聞いたから、気になってつい♪」
line = "「マトイが星騎士として普通じゃない力を手に入れたったって聞いたから、気になってつい♪」"

[[dialogue]]
speaker = "マトイ母"
# 「ほら、写真も沢山撮ったのよ♪　よく写ってるでしょ～？」
line = "「ほら、写真も沢山撮ったのよ♪　よく写ってるでしょ～？」"

[[dialogue]]
speaker = "unk"
# そう言いながら、ＤＩＳＣの画面を俺たちに見せてくるマモリさん。
line = "そう言いながら、ＤＩＳＣの画面を俺たちに見せてくるマモリさん。"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ちょっ、何枚撮ってるの！？」
line = "「ちょっ、何枚撮ってるの！？」"

[[dialogue]]
speaker = "マトイ母"
# 「今日はお父さん、仕事だから。後で見せてあげようと思って～」
line = "「今日はお父さん、仕事だから。後で見せてあげようと思って～」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「やめてよ、恥ずかしい！」
line = "「やめてよ、恥ずかしい！」"

[[dialogue]]
speaker = "マトイ母"
# 「ふふっ、マトイってば、照れちゃって～♪」
line = "「ふふっ、マトイってば、照れちゃって～♪」"

[[dialogue]]
speaker = "マトイ母"
# 「あ、そうだ。会長くんも撮ったのよ、ほら♪」
line = "「あ、そうだ。会長くんも撮ったのよ、ほら♪」"

[[dialogue]]
speaker = "unk"
# えっ、俺も！？
line = "えっ、俺も！？"

[[dialogue]]
speaker = "マトイ母"
# 「うん、格好良かったから♪　それに、マトイの彼氏さんだしね♪　お父さんの為にも偵察をしとこうと思って～」
line = "「うん、格好良かったから♪　それに、マトイの彼氏さんだしね♪　お父さんの為にも偵察をしとこうと思って～」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「偵察って！　いやいや、会長に失礼でしょ！」
line = "「偵察って！　いやいや、会長に失礼でしょ！」"

[[dialogue]]
speaker = "unk"
# ご、ご両親への挨拶が遅れてしまいましてっ
line = "ご、ご両親への挨拶が遅れてしまいましてっ"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ほら、会長が気を遣っちゃってるじゃん！」
line = "「ほら、会長が気を遣っちゃってるじゃん！」"

[[dialogue]]
speaker = "マトイ母"
# 「大丈夫よ、会長くん。うちのお父さんは、可愛い娘に彼氏ができて気が気じゃないだけで、中身は優しい普通のおじさんだから♪」
line = "「大丈夫よ、会長くん。うちのお父さんは、可愛い娘に彼氏ができて気が気じゃないだけで、中身は優しい普通のおじさんだから♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「いやフォローになってないよ！？」
line = "「いやフォローになってないよ！？」"

[[dialogue]]
speaker = "マトイ母"
# 「あっ、そうだわ。お近づきの印に――」
line = "「あっ、そうだわ。お近づきの印に――」"

[[dialogue]]
speaker = "マトイ母"
# 「私と組手をしない？」
line = "「私と組手をしない？」"

[[dialogue]]
speaker = "unk"
# えっ！？
line = "えっ！？"

[[dialogue]]
speaker = "unk"
# そして、マモリさんの希望で、『星術を使わない』という制限での組手を行うことになったのだが――
line = "そして、マモリさんの希望で、『星術を使わない』という制限での組手を行うことになったのだが――"

[[dialogue]]
speaker = "マトイ母"
# 「なるほど、実戦経験の豊富さが伺えるいい動きだわ。だけど――それっ！」
line = "「なるほど、実戦経験の豊富さが伺えるいい動きだわ。だけど――それっ！」"

[[dialogue]]
speaker = "unk"
# 俺がマモリさんへと突き出した拳は、巻き取るように掴まれて、投げられてしまう。転がるように距離を取り――
line = "俺がマモリさんへと突き出した拳は、巻き取るように掴まれて、投げられてしまう。転がるように距離を取り――"

[[dialogue]]
speaker = "unk"
# つ、強い……！
line = "つ、強い……！"

[[dialogue]]
speaker = "マトイ母"
# 「ふぅ～♪　この辺りで止めときましょうか。これ以上はガチの戦いになっちゃうだろうし……」
line = "「ふぅ～♪　この辺りで止めときましょうか。これ以上はガチの戦いになっちゃうだろうし……」"

[[dialogue]]
speaker = "unk"
# 星術は使わずとも、星力で身体能力を底上げしているのに、結局一本も取れなかった。それどころかむしろ、力を逆手に取られている感じがした。これは――
line = "星術は使わずとも、星力で身体能力を底上げしているのに、結局一本も取れなかった。それどころかむしろ、力を逆手に取られている感じがした。これは――"

[[dialogue]]
speaker = "トマル"
# 「母さまは、合気道が使えるんですよ。それも普通じゃないレベルで」
line = "「母さまは、合気道が使えるんですよ。それも普通じゃないレベルで」"

[[dialogue]]
speaker = "マトイ母"
# 「え～、これくらい割と普通じゃない？」
line = "「え～、これくらい割と普通じゃない？」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「いや普通じゃないから！　普通の主婦は、星騎士と組手で互角以上に戦えたりしないっ！」
line = "「いや普通じゃないから！　普通の主婦は、星騎士と組手で互角以上に戦えたりしないっ！」"

[[dialogue]]
speaker = "マトイ母"
# 「そう？　でもとりあえず、お母さん、久しぶりに強い子と戦えて嬉しかった～♪」
line = "「そう？　でもとりあえず、お母さん、久しぶりに強い子と戦えて嬉しかった～♪」"

[[dialogue]]
speaker = "マトイ母"
# 「さてと、これで会長くんとも拳を交えて語り合った仲になったわけだし～♪　お母さんに教えて欲しいんだけど～」
line = "「さてと、これで会長くんとも拳を交えて語り合った仲になったわけだし～♪　お母さんに教えて欲しいんだけど～」"

[[dialogue]]
speaker = "マトイ母"
# 「ぶっちゃけ、マトイとはどこまで行ってるの？　例えばキスとか――」
line = "「ぶっちゃけ、マトイとはどこまで行ってるの？　例えばキスとか――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ちょっと！　娘の前でなに聞いてんの！？　普通に教えるわけないでしょ！？」
line = "「ちょっと！　娘の前でなに聞いてんの！？　普通に教えるわけないでしょ！？」"

[[dialogue]]
speaker = "マトイ母"
# 「え～？　いいじゃない～。家だといつも、会長くんの話題を振ると、これでもかってくらい饒舌に話してるのに」
line = "「え～？　いいじゃない～。家だといつも、会長くんの話題を振ると、これでもかってくらい饒舌に話してるのに」"

[[dialogue]]
speaker = "マトイ母"
# 「あれが格好いいとか～、何が凄かったとか～、ベタ褒めよ？　ベタ褒め。完全にノロケよね～♪」
line = "「あれが格好いいとか～、何が凄かったとか～、ベタ褒めよ？　ベタ褒め。完全にノロケよね～♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「わあああああああああっ！！！　やめてやめて！　会長の前でっ、恥ずかしいからっ！！」
line = "「わあああああああああっ！！！　やめてやめて！　会長の前でっ、恥ずかしいからっ！！」"

[[dialogue]]
speaker = "マトイ母"
# 「ふふっ、マトイったら顔が赤くなってる～♪」
line = "「ふふっ、マトイったら顔が赤くなってる～♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「会長、まともに話聞かなくていいから！　完全にこの母、からかって楽しんでるだけだから！」
line = "「会長、まともに話聞かなくていいから！　完全にこの母、からかって楽しんでるだけだから！」"

[[dialogue]]
speaker = "unk"
# 大丈夫。むしろ家でも褒めてくれてて嬉しい
line = "大丈夫。むしろ家でも褒めてくれてて嬉しい"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「えっ！？　あっ……だ、だって、その――」
line = "「えっ！？　あっ……だ、だって、その――」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「か、会長のこと……好きだし」
line = "「か、会長のこと……好きだし」"

[[dialogue]]
speaker = "unk"
# 俺も好きだ
line = "俺も好きだ"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「あ……えへへぇ<emoji=heart04>」
line = "「あ……えへへぇ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ母"
# 「あら、ふふっ、お熱いわね♪　会長くん、いい彼氏じゃない♪」
line = "「あら、ふふっ、お熱いわね♪　会長くん、いい彼氏じゃない♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「う、うん……<emoji=heart04>」
line = "「う、うん……<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ母"
# 「改めて、会長くん。――マトイのこと、これからもよろしく頼むわね♪」
line = "「改めて、会長くん。――マトイのこと、これからもよろしく頼むわね♪」"

[[dialogue]]
speaker = "unk"
# もちろんです。マモリさん
line = "もちろんです。マモリさん"

[[dialogue]]
speaker = "マトイ母"
# 「あっ、ちなみに私のことは、お義母さんって呼んでくれてもいいわよ♪」
line = "「あっ、ちなみに私のことは、お義母さんって呼んでくれてもいいわよ♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「それは早過ぎるから……！」
line = "「それは早過ぎるから……！」"

[[dialogue]]
speaker = "トマル"
# 「はっ……！　ということは、会長さまが私の義兄さまに！？　……末永く、よろしくお願いいたします、義兄さま♪」
line = "「はっ……！　ということは、会長さまが私の義兄さまに！？　……末永く、よろしくお願いいたします、義兄さま♪」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「トマル！？　それはちょっと、私が危機感覚えるくらい破壊力高いんだけど！？」
line = "「トマル！？　それはちょっと、私が危機感覚えるくらい破壊力高いんだけど！？」"

[[dialogue]]
speaker = "unk"
# 楽しそうに話す３人に、俺は詠野家の一家団欒を垣間見た気がして、微笑ましい気持ちになるのだった――
line = "楽しそうに話す３人に、俺は詠野家の一家団欒を垣間見た気がして、微笑ましい気持ちになるのだった――"
