[[dialogue]]
speaker = "unk"
# 初めて顔を合わせた紅明とクーシェン。
line = "初めて顔を合わせた紅明とクーシェン。"

[[dialogue]]
speaker = "紅明"
# 「まさか、悟空……！？　『孫悟空』なのか！？」
line = "「まさか、悟空……！？　『孫悟空』なのか！？」"

[[dialogue]]
speaker = "クーシェン"
# 「そんごくう……？　いや、ボクの名前は、クーシェンだけど？」
line = "「そんごくう……？　いや、ボクの名前は、クーシェンだけど？」"

[[dialogue]]
speaker = "紅明"
# 「えぇっ！？　まさかの他人の空似っ！？　……いやでも、その格好はどう見ても、前世の悟空と瓜二つだし！」
line = "「えぇっ！？　まさかの他人の空似っ！？　……いやでも、その格好はどう見ても、前世の悟空と瓜二つだし！」"

[[dialogue]]
speaker = "unk"
# 芭蕉扇を見てから何となく予感があった俺は、クーシェンに尋ねてみる。
line = "芭蕉扇を見てから何となく予感があった俺は、クーシェンに尋ねてみる。"

[[dialogue]]
speaker = "unk"
# クーシェンの生い立ちとか、聞いてもいい？
line = "クーシェンの生い立ちとか、聞いてもいい？"

[[dialogue]]
speaker = "クーシェン"
# 「ボクの？　仕方ないな～、そんなに知りたいなら、特別に教えてあげる♪」
line = "「ボクの？　仕方ないな～、そんなに知りたいなら、特別に教えてあげる♪」"

[[dialogue]]
speaker = "クーシェン"
# 「といっても、ボクも昔の記憶がないというか、実は目覚めたのは割と最近のことなんだけどね～」
line = "「といっても、ボクも昔の記憶がないというか、実は目覚めたのは割と最近のことなんだけどね～」"

[[dialogue]]
speaker = "クーシェン"
# 「魔界に『<ruby=かかざん>花果山</ruby>』っていうところがあるんだけど、ボクはそこにある大きな岩の中で目覚めたんだ！」
line = "「魔界に『<ruby>花果山<rt>かかざん</rt></ruby>』っていうところがあるんだけど、ボクはそこにある大きな岩の中で目覚めたんだ！」"

[[dialogue]]
speaker = "紅明"
# 「！　それ、悟空が生まれた場所と同じっしょ！」
line = "「！　それ、悟空が生まれた場所と同じっしょ！」"

[[dialogue]]
speaker = "クーシェン"
# 「そうなの？　ていうか、さっきから言ってる、その『ごくう』って誰？」
line = "「そうなの？　ていうか、さっきから言ってる、その『ごくう』って誰？」"

[[dialogue]]
speaker = "紅明"
# 「えっと、人間界で有名な『西遊記』って伝説があってな？　と言っても、魔界生まれだとわからないか……」
line = "「えっと、人間界で有名な『西遊記』って伝説があってな？　と言っても、魔界生まれだとわからないか……」"

[[dialogue]]
speaker = "紅明"
# 「簡単に言うと、『孫悟空』は今から２０００年前、魔王を名乗って人間界に侵攻した悪い魔族を倒し、人間界を救った英雄なのさ」
line = "「簡単に言うと、『孫悟空』は今から２０００年前、魔王を名乗って人間界に侵攻した悪い魔族を倒し、人間界を救った英雄なのさ」"

[[dialogue]]
speaker = "クーシェン"
# 「英雄……！　ん？　でも、おかしくない？　２０００年前の英雄なのに、どうしてボクと瓜二つだなんてわかるの？」
line = "「英雄……！　ん？　でも、おかしくない？　２０００年前の英雄なのに、どうしてボクと瓜二つだなんてわかるの？」"

[[dialogue]]
speaker = "紅明"
# 「それは――アタシが昔、実際に会ったことがあるからさ」
line = "「それは――アタシが昔、実際に会ったことがあるからさ」"

[[dialogue]]
speaker = "クーシェン"
# 「？　どういうこと……？」
line = "「？　どういうこと……？」"

[[dialogue]]
speaker = "紅明"
# 「嘘を言ってないって信じてもらう為にも、まずは見てもらった方がいいかな。ダーリン、芭蕉扇をこっちにもらってもいいかい？」
line = "「嘘を言ってないって信じてもらう為にも、まずは見てもらった方がいいかな。ダーリン、芭蕉扇をこっちにもらってもいいかい？」"

[[dialogue]]
speaker = "unk"
# クーシェン、いいか？
line = "クーシェン、いいか？"

[[dialogue]]
speaker = "クーシェン"
# 「うん。マリオンからも、本来の持ち主がいるから返してあげて欲しいって聞いてたし、それは別に構わないけど……」
line = "「うん。マリオンからも、本来の持ち主がいるから返してあげて欲しいって聞いてたし、それは別に構わないけど……」"

[[dialogue]]
speaker = "紅明"
# 「こいつはアタシにとって、思い入れのある物なんだ――あんがとね！」
line = "「こいつはアタシにとって、思い入れのある物なんだ――あんがとね！」"

[[dialogue]]
speaker = "unk"
# 紅明は、俺が差し出した芭蕉扇を手に取ると――
line = "紅明は、俺が差し出した芭蕉扇を手に取ると――"

[[dialogue]]
speaker = "紅明"
# 「羅刹再臨！」
line = "「羅刹再臨！」"

[[dialogue]]
speaker = "クーシェン"
# 「わっ……！？」
line = "「わっ……！？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「威風堂々――元気羅刹、ここに再臨！　今こそ羅刹のごとく、勝利の風を吹かすぜ！」
line = "「威風堂々――元気羅刹、ここに再臨！　今こそ羅刹のごとく、勝利の風を吹かすぜ！」"

[[dialogue]]
speaker = "unk"
# 紅明の戦闘服が覚醒した……！
line = "紅明の戦闘服が覚醒した……！"

[[dialogue]]
speaker = "クーシェン"
# 「す、すごいっ！　とんでもない星力……！　キミは一体、何者なの！？」
line = "「す、すごいっ！　とんでもない星力……！　キミは一体、何者なの！？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「うっし☆　改めて名乗らせてもらうぜ！　我こそは、前世にて<ruby=てっせんこうしゅ>鉄扇公主</ruby>が娘、<ruby=ぜんざいどうじ>善哉童子</ruby>『<ruby=こうがいじ>紅孩児</ruby>』！」
line = "「うっし☆　改めて名乗らせてもらうぜ！　我こそは、前世にて<ruby>鉄扇公主<rt>てっせんこうしゅ</rt></ruby>が娘、<ruby>善哉童子<rt>ぜんざいどうじ</rt></ruby>『<ruby>紅孩児<rt>こうがいじ</rt></ruby>』！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「そして現世に転生し、今に名乗るは『<ruby=ぎゅうこうめい>牛紅明</ruby>』！　ってなわけで、アタシのことは気軽に紅明ちゃんって呼んでくれよな、クーちん♪」
line = "「そして現世に転生し、今に名乗るは『<ruby>牛紅明<rt>ぎゅうこうめい</rt></ruby>』！　ってなわけで、アタシのことは気軽に紅明ちゃんって呼んでくれよな、クーちん♪」"

[[dialogue]]
speaker = "クーシェン"
# 「クーちん！？　それってボクのこと……！？」
line = "「クーちん！？　それってボクのこと……！？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「おうよ☆　アタシ、友達はあだ名で呼ぶ派だからさ♪　クーシェンって名前なら、クーちんって呼ぶのが可愛いって思ったんだけど、どうよ？」
line = "「おうよ☆　アタシ、友達はあだ名で呼ぶ派だからさ♪　クーシェンって名前なら、クーちんって呼ぶのが可愛いって思ったんだけど、どうよ？」"

[[dialogue]]
speaker = "クーシェン"
# 「え～？　ボクは魔界で助けたおじいちゃんに付けてもらった、このクーシェンって名前がカッコよくて気に入ってるんだけど……」
line = "「え～？　ボクは魔界で助けたおじいちゃんに付けてもらった、このクーシェンって名前がカッコよくて気に入ってるんだけど……」"

[[dialogue]]
speaker = "クーシェン"
# 「なんか、空飛ぶ神様と書いて、『<ruby=クーシェン>空神</ruby>』って読むんだって！」
line = "「なんか、空飛ぶ神様と書いて、『<ruby>空神<rt>クーシェン</rt></ruby>』って読むんだって！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「なるほど、わかるマン。でも、カッコいい本名と、友達からのあだ名は別物っしょ☆　あだ名は可愛い方が親しみを持てるじゃん？」
line = "「なるほど、わかるマン。でも、カッコいい本名と、友達からのあだ名は別物っしょ☆　あだ名は可愛い方が親しみを持てるじゃん？」"

[[dialogue]]
speaker = "クーシェン"
# 「そ、そう？　まぁ、なら仕方ないな～。そこまでボクのカッコ可愛さを称えたいって言うなら、クーちんって呼ばせてあげてもいいけど～？」
line = "「そ、そう？　まぁ、なら仕方ないな～。そこまでボクのカッコ可愛さを称えたいって言うなら、クーちんって呼ばせてあげてもいいけど～？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「うっし♪　それじゃあクーちんのことは、たった今からクーちんで！　ウェ～イ☆」
line = "「うっし♪　それじゃあクーちんのことは、たった今からクーちんで！　ウェ～イ☆」"

[[dialogue]]
speaker = "クーシェン"
# 「って、そんなことより、紅明が『芭蕉扇』で変身したことだよ！　そのすごい力は一体何なの！？」
line = "「って、そんなことより、紅明が『芭蕉扇』で変身したことだよ！　そのすごい力は一体何なの！？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「――この『芭蕉扇』は、アタシの前世のお袋殿……『羅刹女』の持ち物でね」
line = "「――この『芭蕉扇』は、アタシの前世のお袋殿……『羅刹女』の持ち物でね」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「２０００年前、当時のアタシは、お袋殿からこれを譲り受けて、それはもう必死に修業した果てに、この姿に変身できるようになったってわけよ」
line = "「２０００年前、当時のアタシは、お袋殿からこれを譲り受けて、それはもう必死に修業した果てに、この姿に変身できるようになったってわけよ」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「こうして実際に変身してみせた後なら、信じてもらえると思うんだけど――」
line = "「こうして実際に変身してみせた後なら、信じてもらえると思うんだけど――」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「アタシは、前世で『孫悟空』が戦った悪の親玉……『牛魔王』の娘で、後に悟空と友達になって、一緒に旅をした仲間だったんだ。つまり――」
line = "「アタシは、前世で『孫悟空』が戦った悪の親玉……『牛魔王』の娘で、後に悟空と友達になって、一緒に旅をした仲間だったんだ。つまり――」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「今ここにいるアタシは、２０００年前に存在した『紅孩児』って魔族が、生まれ変わった存在ってわけさ☆」
line = "「今ここにいるアタシは、２０００年前に存在した『紅孩児』って魔族が、生まれ変わった存在ってわけさ☆」"

[[dialogue]]
speaker = "クーシェン"
# 「そんなことが本当に……！？　あっ！　じゃあ、もしかして……？」
line = "「そんなことが本当に……！？　あっ！　じゃあ、もしかして……？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「そう。アタシと同じく、クーちんも孫悟空の生まれ変わりなんじゃないかって、アタシは思ってるんだ」
line = "「そう。アタシと同じく、クーちんも孫悟空の生まれ変わりなんじゃないかって、アタシは思ってるんだ」"

[[dialogue]]
speaker = "クーシェン"
# 「ボクが、英雄の生まれ変わり……！」
line = "「ボクが、英雄の生まれ変わり……！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「アタシと違って、どうして前世の記憶を持っていないのかはわからないけど……」
line = "「アタシと違って、どうして前世の記憶を持っていないのかはわからないけど……」"

[[dialogue]]
speaker = "unk"
# いや、本来は逆じゃないか？
line = "いや、本来は逆じゃないか？"

[[dialogue]]
speaker = "unk"
# 大変今更ではあるのだが、本来は前世の記憶を持っている方がおかしい。紅明とは付き合いも長くなってきて、すっかり違和感がなくなってきてしまったけれども。
line = "大変今更ではあるのだが、本来は前世の記憶を持っている方がおかしい。紅明とは付き合いも長くなってきて、すっかり違和感がなくなってきてしまったけれども。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「おぉ～、言われてみれば確かに！　ダーリン、ナイスツッコミ☆」
line = "「おぉ～、言われてみれば確かに！　ダーリン、ナイスツッコミ☆」"

[[dialogue]]
speaker = "クーシェン"
# 「前世のボクは……紅明の仲間……一緒に旅をした、仲間……？」
line = "「前世のボクは……紅明の仲間……一緒に旅をした、仲間……？」"

[[dialogue]]
speaker = "unk"
# クーシェンは何故か紅明の豊かな胸元をチラチラを盗み見ながら、そんなことをブツブツとつぶやき始める。
line = "クーシェンは何故か紅明の豊かな胸元をチラチラを盗み見ながら、そんなことをブツブツとつぶやき始める。"

[[dialogue]]
speaker = "クーシェン"
# 「うっ、頭が……！」
line = "「うっ、頭が……！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「およ？　どした、クーちん？」
line = "「およ？　どした、クーちん？」"

[[dialogue]]
speaker = "クーシェン"
# 「はっ！？　思い……出した！」
line = "「はっ！？　思い……出した！」"

[[dialogue]]
speaker = "クーシェン"
# 「紅明！　紅明じゃないか！　いや～、久しぶりだなー、紅明！！」
line = "「紅明！　紅明じゃないか！　いや～、久しぶりだなー、紅明！！」"

[[dialogue]]
speaker = "unk"
# そう言ってクーシェンは紅明に駆け寄り――胸元に飛び込んだ。
line = "そう言ってクーシェンは紅明に駆け寄り――胸元に飛び込んだ。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「おおぅっ！？　おっぱいの間に思いっきり顔面ツッコミが入ったけど、どした！？」
line = "「おおぅっ！？　おっぱいの間に思いっきり顔面ツッコミが入ったけど、どした！？」"

[[dialogue]]
speaker = "クーシェン"
# 「うっ――おおおおおおおおっ！！！　これが大人おっぱい！　もっちりしてて、柔らかくって、ウキウキしてきたぁ～～～っ！！！！」
line = "「うっ――おおおおおおおおっ！！！　これが大人おっぱい！　もっちりしてて、柔らかくって、ウキウキしてきたぁ～～～っ！！！！」"

[[dialogue]]
speaker = "unk"
# 紅明のおっぱいに顔を埋めながら、テンション高く言うクーシェン。
line = "紅明のおっぱいに顔を埋めながら、テンション高く言うクーシェン。"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「……もしかしてクーちん、おっぱい好きなん？」
line = "「……もしかしてクーちん、おっぱい好きなん？」"

[[dialogue]]
speaker = "クーシェン"
# 「うん！！！　あっ、いや違う！　これは再会を喜んでるだけだよ！」
line = "「うん！！！　あっ、いや違う！　これは再会を喜んでるだけだよ！」"

[[dialogue]]
speaker = "unk"
# 思いっきり欲望が口から出てたけど……
line = "思いっきり欲望が口から出てたけど……"

[[dialogue]]
speaker = "クーシェン"
# 「はっ！？　しまった！？」
line = "「はっ！？　しまった！？」"

[[dialogue]]
speaker = "クーシェン"
# 「記憶が戻ったと言って自然な流れで抱き着いたら、おっきいおっぱいに触れるかなと思って……！」
line = "「記憶が戻ったと言って自然な流れで抱き着いたら、おっきいおっぱいに触れるかなと思って……！」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「別にそんなことせんでも、おっぱいくらい好きに触っていいぜ？」
line = "「別にそんなことせんでも、おっぱいくらい好きに触っていいぜ？」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「アタシは自分の立派なおっぱいに自負と自信を持ってるからね！　女の子同士の戯れなら、別に触られても気にしないっしょ☆」
line = "「アタシは自分の立派なおっぱいに自負と自信を持ってるからね！　女の子同士の戯れなら、別に触られても気にしないっしょ☆」"

[[dialogue]]
speaker = "クーシェン"
# 「いいの！？　わ～い！！！　ボク、おっぱいに限らず、エッチなもの大好き♪」
line = "「いいの！？　わ～い！！！　ボク、おっぱいに限らず、エッチなもの大好き♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「うん、これは確かに悟空だわ。記憶は戻ってないけど、このエッチなお猿さんな感じは、間違いなく孫悟空です」
line = "「うん、これは確かに悟空だわ。記憶は戻ってないけど、このエッチなお猿さんな感じは、間違いなく孫悟空です」"

[[dialogue]]
speaker = "unk"
# え、英雄のイメージが……
line = "え、英雄のイメージが……"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「伝説ってのは美化されるものだからね～」
line = "「伝説ってのは美化されるものだからね～」"

[[dialogue]]
speaker = "クーシェン"
# 「あぁ～っ♪　このぱふぱふという、おっぱいの音ぉ～♪」
line = "「あぁ～っ♪　このぱふぱふという、おっぱいの音ぉ～♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あ、そうだ♪　ついでだし――ダーリンもおっぱい揉む？」
line = "「あ、そうだ♪　ついでだし――ダーリンもおっぱい揉む？」"

[[dialogue]]
speaker = "unk"
# ちょっ、何言ってんの！？
line = "ちょっ、何言ってんの！？"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「あははっ☆　そんな慌てなくてもいいじゃ～ん♪　男の子でも、ダーリンだったら、アタシは全然構わないっしょ♪」
line = "「あははっ☆　そんな慌てなくてもいいじゃ～ん♪　男の子でも、ダーリンだったら、アタシは全然構わないっしょ♪」"

[[dialogue]]
speaker = "紅明（羅刹）"
# 「だって、ダーリンは、アタシのダーリンだし<emoji=heart04>　うしし☆」
line = "「だって、ダーリンは、アタシのダーリンだし<emoji=heart04>　うしし☆」"

[[dialogue]]
speaker = "unk"
# 紅明は時々、こうやってさらっと好意をぶつけて来るので、正直照れてしまう……。
line = "紅明は時々、こうやってさらっと好意をぶつけて来るので、正直照れてしまう……。"

[[dialogue]]
speaker = "クーシェン"
# 「あっ！　おっぱいと言えばさ、ねぇねぇ知ってる！？」
line = "「あっ！　おっぱいと言えばさ、ねぇねぇ知ってる！？」"

[[dialogue]]
