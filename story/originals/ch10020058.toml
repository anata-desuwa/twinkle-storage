# 「あぁんっ<emoji=heart04>　卵子の中に、弟くん精子がもう１つ入ってきて、双子受精しちゃうかもぉ<emoji=heart04>　はああぁ～っ……<emoji=heart04>」
line = "「あぁんっ<emoji=heart04>　卵子の中に、弟くん精子がもう１つ入ってきて、双子受精しちゃうかもぉ<emoji=heart04>　はああぁ～っ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ――やがて、長かった射精が終わり、サーシャさんの豊満な胸に顔を埋めて快楽の余韻に浸っていた俺は、ペニスをゆっくりと膣から引き抜く。
line = "――やがて、長かった射精が終わり、サーシャさんの豊満な胸に顔を埋めて快楽の余韻に浸っていた俺は、ペニスをゆっくりと膣から引き抜く。"

[[dialogue]]
speaker = "サーシャ"
# 「あぁあんっ……<emoji=heart04>」
line = "「あぁあんっ……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「んっ……<emoji=heart04>　はあぁ……ふうぅ……<emoji=heart04>　姫始めの種付けエッチ、ものすごく気持ち良くイっちゃったわ<emoji=heart04>」
line = "「んっ……<emoji=heart04>　はあぁ……ふうぅ……<emoji=heart04>　姫始めの種付けエッチ、ものすごく気持ち良くイっちゃったわ<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「ほら、見て<emoji=heart04>　弟くんのすごくねっとりとした濃い精液、お姉ちゃんの膣から溢れてきちゃう……<emoji=heart04>」
line = "「ほら、見て<emoji=heart04>　弟くんのすごくねっとりとした濃い精液、お姉ちゃんの膣から溢れてきちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃん、本当に赤ちゃんできちゃったかも……ふふふっ<emoji=heart04>　孕ませエッチ、弟くんも気持ちよかった……？」
line = "「お姉ちゃん、本当に赤ちゃんできちゃったかも……ふふふっ<emoji=heart04>　孕ませエッチ、弟くんも気持ちよかった……？」"

[[dialogue]]
speaker = "クロト"
# 「そりゃあもう……。でも俺……サーシャさんに甘え過ぎて、ダメ人間になっちゃいそうで、ちょっと怖いです」
line = "「そりゃあもう……。でも俺……サーシャさんに甘え過ぎて、ダメ人間になっちゃいそうで、ちょっと怖いです」"

[[dialogue]]
speaker = "unk"
# 俺がどんなに甘えても、サーシャさんはいつも笑顔で受け入れてくれるので、ついつい我慢できずに激しく劣情をぶつけてしまう。
line = "俺がどんなに甘えても、サーシャさんはいつも笑顔で受け入れてくれるので、ついつい我慢できずに激しく劣情をぶつけてしまう。"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら、うふふっ♪　こ～ら、『サーシャさん』じゃなくて『お姉ちゃん』、でしょ？」
line = "「あらあら、うふふっ♪　こ～ら、『サーシャさん』じゃなくて『お姉ちゃん』、でしょ？」"

[[dialogue]]
speaker = "クロト"
# 「えっ、それはだって……」
line = "「えっ、それはだって……」"

[[dialogue]]
speaker = "unk"
# セックスが終わった後だと、どうしても気恥ずかしくなってしまう。
line = "セックスが終わった後だと、どうしても気恥ずかしくなってしまう。"

[[dialogue]]
speaker = "サーシャ"
# 「『でも』も『だって』もありません。聞き分けのない弟くんは、お姉ちゃんのおま○こでわからせちゃうぞ<emoji=heart04>」
line = "「『でも』も『だって』もありません。聞き分けのない弟くんは、お姉ちゃんのおま○こでわからせちゃうぞ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そう言って、サーシャさんは俺の背中に手を回して抱き寄せながら、耳元で囁く。
line = "そう言って、サーシャさんは俺の背中に手を回して抱き寄せながら、耳元で囁く。"

[[dialogue]]
speaker = "サーシャ"
# 「――大丈夫よ、<b>会長くん</b>。ダメ人間にならないように、お姉ちゃんがきちんと管理してあげるから<emoji=heart04>」
line = "「――大丈夫よ、<b>会長くん</b>。ダメ人間にならないように、お姉ちゃんがきちんと管理してあげるから<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「だから今日は……ハメを外して、ずっと弟くんのままで、ね？」
line = "「だから今日は……ハメを外して、ずっと弟くんのままで、ね？」"

[[dialogue]]
speaker = "unk"
# 年上の恋人から、甘い声でそんな風に優しく言われてしまえば、我慢できるはずもなく──
line = "年上の恋人から、甘い声でそんな風に優しく言われてしまえば、我慢できるはずもなく──"

[[dialogue]]
speaker = "unk"
# 俺はそれからも、夜が更けるまで『お姉ちゃん』に甘え続けてしまうのだった。
line = "俺はそれからも、夜が更けるまで『お姉ちゃん』に甘え続けてしまうのだった。"
