[[dialogue]]
speaker = "unk"
# 第１話,ふわふわ美食ガール,P
line = "第１話,ふわふわ美食ガール,P"

[[dialogue]]
speaker = "unk"
# ある日の昼休み、カフェテリアに昼食をとりに行くと、何やら困っている様子の女の子と出会った。
line = "ある日の昼休み、カフェテリアに昼食をとりに行くと、何やら困っている様子の女の子と出会った。"

[[dialogue]]
speaker = "サラン"
# 「う～ん、どうしよ～。やっぱり１度、教室に戻らないとダメかなぁ～？」
line = "「う～ん、どうしよ～。やっぱり１度、教室に戻らないとダメかなぁ～？」"

[[dialogue]]
speaker = "サラン"
# 「あぅ～……お腹減ったよぉ……」
line = "「あぅ～……お腹減ったよぉ……」"

[[dialogue]]
speaker = "unk"
# どうしたんだ？
line = "どうしたんだ？"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　あっ、星徒会長さんだぁ～。こんにちは～」
line = "「ぽよ？　あっ、星徒会長さんだぁ～。こんにちは～」"

[[dialogue]]
speaker = "サラン"
# 「……うん、実は困ってて～。サラン、お昼ご飯を食べに来たんだけど、実は教室にお財布を忘れて来ちゃって」
line = "「……うん、実は困ってて～。サラン、お昼ご飯を食べに来たんだけど、実は教室にお財布を忘れて来ちゃって」"

[[dialogue]]
speaker = "サラン"
# 「でも、誰かに借りるのも悪いかな～って思っちゃって……」
line = "「でも、誰かに借りるのも悪いかな～って思っちゃって……」"

[[dialogue]]
speaker = "unk"
# だったら、俺が貸すよ
line = "だったら、俺が貸すよ"

[[dialogue]]
speaker = "サラン"
# 「会長さんが？　いいの？」
line = "「会長さんが？　いいの？」"

[[dialogue]]
speaker = "サラン"
# 「わぁ～、ありがと～♪　ねぇ、せっかくだし、一緒にお昼食べない？」
line = "「わぁ～、ありがと～♪　ねぇ、せっかくだし、一緒にお昼食べない？」"

[[dialogue]]
speaker = "サラン"
# 「これまでお話したことなかったよね？　サラン、会長さんと仲良くなりたいな～♪」
line = "「これまでお話したことなかったよね？　サラン、会長さんと仲良くなりたいな～♪」"

[[dialogue]]
speaker = "unk"
# 何かの縁だし、ご一緒させて貰おうかな
line = "何かの縁だし、ご一緒させて貰おうかな"

[[dialogue]]
speaker = "サラン"
# 「わ～い、楽しいお昼ご飯になりそう♪　それじゃあ一緒に注文しに行こ～」
line = "「わ～い、楽しいお昼ご飯になりそう♪　それじゃあ一緒に注文しに行こ～」"

[[dialogue]]
speaker = "unk"
# 注文後、テーブルに着いて料理を待つ間、俺は彼女に自己紹介する。
line = "注文後、テーブルに着いて料理を待つ間、俺は彼女に自己紹介する。"

[[dialogue]]
speaker = "サラン"
# 「うん、キミのことは御前試合を見ていたから知ってるよ～。あの時は格好よかったなぁ～♪」
line = "「うん、キミのことは御前試合を見ていたから知ってるよ～。あの時は格好よかったなぁ～♪」"

[[dialogue]]
speaker = "サラン"
# 「今度はサランが自己紹介するね。名前は、桜十路サランっていうの～」
line = "「今度はサランが自己紹介するね。名前は、桜十路サランっていうの～」"

[[dialogue]]
speaker = "サラン"
# 「新星学園の２年生で、プリマステラをやっているんだぁ～。よろしくね～♪」
line = "「新星学園の２年生で、プリマステラをやっているんだぁ～。よろしくね～♪」"

[[dialogue]]
speaker = "サラン"
# 「ねぇねぇ、キミのこと、『会長ちゃん』って呼んでもいいかなぁ？　友達としてのあだ名、みたいな～」
line = "「ねぇねぇ、キミのこと、『会長ちゃん』って呼んでもいいかなぁ？　友達としてのあだ名、みたいな～」"

[[dialogue]]
speaker = "unk"
# ちょっと恥ずかしいけど……
line = "ちょっと恥ずかしいけど……"

[[dialogue]]
speaker = "サラン"
# 「え～、そんなことないよ～。サランは、可愛いと思うけどな～」
line = "「え～、そんなことないよ～。サランは、可愛いと思うけどな～」"

[[dialogue]]
speaker = "サラン"
# 「……呼んでもいいの？　わ～い、これから仲良くしようね、会長ちゃん♪」
line = "「……呼んでもいいの？　わ～い、これから仲良くしようね、会長ちゃん♪」"

[[dialogue]]
speaker = "サラン"
# 「あっ、店員さんが呼んでるよ～。料理が出来たみたい～」
line = "「あっ、店員さんが呼んでるよ～。料理が出来たみたい～」"

[[dialogue]]
speaker = "unk"
# それから２人で料理をとって来ると――
line = "それから２人で料理をとって来ると――"

[[dialogue]]
speaker = "サラン"
# 「それじゃあ、手を合わせて……いただきま～す♪　今日の日替わりメニュー、美味しそ～♪」
line = "「それじゃあ、手を合わせて……いただきま～す♪　今日の日替わりメニュー、美味しそ～♪」"

[[dialogue]]
speaker = "unk"
# り、量多くないか……？
line = "り、量多くないか……？"

[[dialogue]]
speaker = "unk"
# サランの前には、日替わりメニューだけでなく、他の定食などが軽く４～５人分は並んでいた。
line = "サランの前には、日替わりメニューだけでなく、他の定食などが軽く４～５人分は並んでいた。"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　そうかな～？　サランはいつもこれくらい食べるよ？」
line = "「ぽよ？　そうかな～？　サランはいつもこれくらい食べるよ？」"

[[dialogue]]
speaker = "サラン"
# 「あ～ん、もぐもぐ……ん～！　美味しい～♪」
line = "「あ～ん、もぐもぐ……ん～！　美味しい～♪」"

[[dialogue]]
speaker = "サラン"
# 「幸せで、ふわふわ～♪」
line = "「幸せで、ふわふわ～♪」"

[[dialogue]]
speaker = "unk"
# （こっちまで幸せな気持ちになって来る笑顔だ）
line = "（こっちまで幸せな気持ちになって来る笑顔だ）"

[[dialogue]]
speaker = "サラン"
# 「ふわぁ、ごちそうさま～♪」
line = "「ふわぁ、ごちそうさま～♪」"

[[dialogue]]
speaker = "サラン"
# 「今日のお昼ご飯も、凄く美味しかった～♪」
line = "「今日のお昼ご飯も、凄く美味しかった～♪」"

[[dialogue]]
speaker = "unk"
# 本当に全部残さず食べるなんて……！
line = "本当に全部残さず食べるなんて……！"

[[dialogue]]
speaker = "サラン"
# 「えへへ、お腹もいっぱいで、ふわふわする～♪」
line = "「えへへ、お腹もいっぱいで、ふわふわする～♪」"

[[dialogue]]
speaker = "サラン"
# 「いえ～い、気分良いのでサラン歌っちゃいま～す♪　ふわふわ、ぷくぷく、らんららん♪」
line = "「いえ～い、気分良いのでサラン歌っちゃいま～す♪　ふわふわ、ぷくぷく、らんららん♪」"

[[dialogue]]
speaker = "unk"
# どうしたいきなり！？
line = "どうしたいきなり！？"

[[dialogue]]
speaker = "サラン"
# 「ん～？　サラン、別に酔ってらいよ～？」
line = "「ん～？　サラン、別に酔ってらいよ～？」"

[[dialogue]]
speaker = "サラン"
# 「ほら～？　お酒臭くなんからいでしょ～？」
line = "「ほら～？　お酒臭くなんからいでしょ～？」"

[[dialogue]]
speaker = "unk"
# いや、呂律回ってないし！
line = "いや、呂律回ってないし！"

[[dialogue]]
speaker = "心配性の女生徒"
# 「ねぇ、ちょっと見てよ。あれ、星徒会長じゃない？」
line = "「ねぇ、ちょっと見てよ。あれ、星徒会長じゃない？」"

[[dialogue]]
speaker = "噂好きの女生徒"
# 「なんか星徒会長が、昼間から女子生徒を泥酔させてるらしいよ……！」
line = "「なんか星徒会長が、昼間から女子生徒を泥酔させてるらしいよ……！」"

[[dialogue]]
speaker = "unk"
# ちょっ！？　俺は何もやってなーい！
line = "ちょっ！？　俺は何もやってなーい！"

[[dialogue]]
speaker = "サラン"
# 「えへへ～、ふわふわ～♪」
line = "「えへへ～、ふわふわ～♪」"

[[dialogue]]
speaker = "unk"
# こうしてまた１人、個性的な女の子と知り合うこととなったのだった。
line = "こうしてまた１人、個性的な女の子と知り合うこととなったのだった。"
