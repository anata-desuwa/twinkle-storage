[[dialogue]]
speaker = "unk"
# 第４話,キスしたいって言わせたい,P
line = "第４話,キスしたいって言わせたい,P"

[[dialogue]]
speaker = "unk"
# 夏も終わりに差し掛かったある日のこと。
line = "夏も終わりに差し掛かったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺はマインからリゾート結界のプライべートビーチに呼び出しを受けて、向かったのだが――
line = "俺はマインからリゾート結界のプライべートビーチに呼び出しを受けて、向かったのだが――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ、会長～、こっちこっち～♪」
line = "「あっ、会長～、こっちこっち～♪」"

[[dialogue]]
speaker = "unk"
# ビーチチェアーに腰掛けて、手招きするマインの元へ向かう。
line = "ビーチチェアーに腰掛けて、手招きするマインの元へ向かう。"

[[dialogue]]
speaker = "unk"
# すると――カチッと足元で音がして、次の瞬間。
line = "すると――カチッと足元で音がして、次の瞬間。"

[[dialogue]]
speaker = "unk"
# ちょっ！？　なんか爆発したああぁっ！？
line = "ちょっ！？　なんか爆発したああぁっ！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はいっ♪　久しぶりのラプチャーガムで捕まえた～っと☆」
line = "「はいっ♪　久しぶりのラプチャーガムで捕まえた～っと☆」"

[[dialogue]]
speaker = "unk"
# ガムのような粘着性の星力によって、俺はその場から動けなくなってしまった。
line = "ガムのような粘着性の星力によって、俺はその場から動けなくなってしまった。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長～、これでもう逃げられないよ？」
line = "「会長～、これでもう逃げられないよ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ズバリ聞きたいことがあるんだけどさ――」
line = "「ズバリ聞きたいことがあるんだけどさ――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「最近、私と<b>キス</b>するの、わざと避けてない？」
line = "「最近、私と<b>キス</b>するの、わざと避けてない？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「もうかれこれ２週間くらい、してない気がするんだけど？」
line = "「もうかれこれ２週間くらい、してない気がするんだけど？」"

[[dialogue]]
speaker = "unk"
# ……そうだっけ？
line = "……そうだっけ？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうでしょ。スキンシップはするけど、いざキスしそうになると、唇じゃなく頬っぺにして誤魔化して……」
line = "「そうでしょ。スキンシップはするけど、いざキスしそうになると、唇じゃなく頬っぺにして誤魔化して……」"

[[dialogue]]
speaker = "unk"
# マインは俺とキスしたいの？
line = "マインは俺とキスしたいの？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「…………別にそうじゃないけど」
line = "「…………別にそうじゃないけど」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ただ、唇にキスをしないのは、あまりに不自然だよねって話。子供の恋愛じゃないんだから……」
line = "「ただ、唇にキスをしないのは、あまりに不自然だよねって話。子供の恋愛じゃないんだから……」"

[[dialogue]]
speaker = "unk"
# そっか、残念……
line = "そっか、残念……"

[[dialogue]]
speaker = "unk"
# マインは別に俺とキスしたいわけじゃないのか～、とわざとらしく落ち込んだように肩を落として見せる。
line = "マインは別に俺とキスしたいわけじゃないのか～、とわざとらしく落ち込んだように肩を落として見せる。"

[[dialogue]]
speaker = "unk"
# なら、仕方ない。頬っぺたにキスも止めよう
line = "なら、仕方ない。頬っぺたにキスも止めよう"

[[dialogue]]
speaker = "ネーゼマイン"
# 「えっ？　ちょっと待って、なんでそういう話に……！？」
line = "「えっ？　ちょっと待って、なんでそういう話に……！？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――いつも自分からキスしたいと言っているけど、私からは全然、キスしたいって言わないから？」
line = "「――いつも自分からキスしたいと言っているけど、私からは全然、キスしたいって言わないから？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いや、それは……」
line = "「いや、それは……」"

[[dialogue]]
speaker = "unk"
# 俺はキスしたいけど、マインが嫌なら仕方ない
line = "俺はキスしたいけど、マインが嫌なら仕方ない"

[[dialogue]]
speaker = "ネーゼマイン"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、もう！　わかった！　言えばいいんでしょ！」
line = "「あ～、もう！　わかった！　言えばいいんでしょ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私も本当は――会長とキスしたいです！」
line = "「私も本当は――会長とキスしたいです！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「スキンシップでストレス解消はできてても、ムラムラしちゃってるから！！　――これでいい！？」
line = "「スキンシップでストレス解消はできてても、ムラムラしちゃってるから！！　――これでいい！？」"

[[dialogue]]
speaker = "unk"
# やっと、マインの方からそう言ってくれたな
line = "やっと、マインの方からそう言ってくれたな"

[[dialogue]]
speaker = "unk"
# ２週間我慢するのは俺も楽ではなかったが、男心に、マインの方から『キスしたい』と言って欲しかったのだ。
line = "２週間我慢するのは俺も楽ではなかったが、男心に、マインの方から『キスしたい』と言って欲しかったのだ。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふ～んだ……どうせ私は面倒臭い女ですよ～」
line = "「ふ～んだ……どうせ私は面倒臭い女ですよ～」"

[[dialogue]]
speaker = "unk"
# ぷいっとそっぽを向きながら、恥ずかしそうに顔を赤くするマイン。
line = "ぷいっとそっぽを向きながら、恥ずかしそうに顔を赤くするマイン。"

[[dialogue]]
speaker = "unk"
# 大丈夫だ
line = "大丈夫だ"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え？　――そんな私が可愛いから、つい悪戯したくなっちゃう……？」
line = "「え？　――そんな私が可愛いから、つい悪戯したくなっちゃう……？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「っ……んもう、会長ってば、そんな言い方ずるい……」
line = "「っ……んもう、会長ってば、そんな言い方ずるい……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「いつもは私が悪戯する側だから怒れないし――」
line = "「いつもは私が悪戯する側だから怒れないし――」"

[[dialogue]]
speaker = "unk"
# マインはビーチチェアーから立ち上がると、俺の方に近づいて来て。
line = "マインはビーチチェアーから立ち上がると、俺の方に近づいて来て。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「気持ちがまた、ボムっちゃうじゃん……<emoji=heart04>」
line = "「気持ちがまた、ボムっちゃうじゃん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女が手を伸ばして、俺の頬に触れると同時に、足元の粘着トラップが消えて、動けるようになる。
line = "彼女が手を伸ばして、俺の頬に触れると同時に、足元の粘着トラップが消えて、動けるようになる。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長……<emoji=heart04>」
line = "「会長……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 熱を帯びた瞳で見つめて来るマインに、俺はそっと顔を寄せて――
line = "熱を帯びた瞳で見つめて来るマインに、俺はそっと顔を寄せて――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「んっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ２週間ぶりの、唇を触れ合わせたキスを交わす。
line = "２週間ぶりの、唇を触れ合わせたキスを交わす。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はあぁ……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ムラムラ、解消できた？
line = "ムラムラ、解消できた？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んっ……ばか<emoji=heart04>　分かってる癖に……<emoji=heart04>」
line = "「んっ……ばか<emoji=heart04>　分かってる癖に……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今日まで貯めた分、彼氏としてちゃんと付き合ってくれなきゃ、許さないんだから<emoji=heart04>」
line = "「今日まで貯めた分、彼氏としてちゃんと付き合ってくれなきゃ、許さないんだから<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちゅっ……ん……<emoji=heart04>」
line = "「ちゅっ……ん……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マインは俺のこと、好き？
line = "マインは俺のこと、好き？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そんなの……付き合ってるんだから当たり前でしょ」
line = "「そんなの……付き合ってるんだから当たり前でしょ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――ちゃんと言って欲しいって？」
line = "「――ちゃんと言って欲しいって？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……ばか。意地悪会長<emoji=heart04>」
line = "「……ばか。意地悪会長<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# マインは恥ずかしそうに、俺の耳元に口を寄せながら、そっと――
line = "マインは恥ずかしそうに、俺の耳元に口を寄せながら、そっと――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……好き<emoji=heart04>」
line = "「……好き<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あっ……<emoji=heart04>」
line = "「あっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 照れるマインの可愛さに我慢できず、俺は彼女を抱き締める。
line = "照れるマインの可愛さに我慢できず、俺は彼女を抱き締める。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「んっ……<emoji=heart04>　会長……もっと<emoji=heart04>」
line = "「んっ……<emoji=heart04>　会長……もっと<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ちゅっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」
line = "「ちゅっ……<emoji=heart04>　ちゅっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その日はマインが満足するまで、２人きりのリゾート結界で沢山キスをし続けるのだった――
line = "その日はマインが満足するまで、２人きりのリゾート結界で沢山キスをし続けるのだった――"
