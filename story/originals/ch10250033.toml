[[dialogue]]
speaker = "unk"
# 第３話,パティシエ舞亜の不思議なスイーツ,P
line = "第３話,パティシエ舞亜の不思議なスイーツ,P"

[[dialogue]]
speaker = "舞亜"
# 「ごめんね、会長さん。迷惑かけちゃって」
line = "「ごめんね、会長さん。迷惑かけちゃって」"

[[dialogue]]
speaker = "舞亜"
# 「まさか、私のスイーツで犠牲者を出しちゃうなんて……」
line = "「まさか、私のスイーツで犠牲者を出しちゃうなんて……」"

[[dialogue]]
speaker = "unk"
# アニュラスはまだ生きてる！
line = "アニュラスはまだ生きてる！"

[[dialogue]]
speaker = "unk"
# 死んでない死んでない！
line = "死んでない死んでない！"

[[dialogue]]
speaker = "アニュラス"
# 「りょ、料理は……出来るのでは……なかったのか……」
line = "「りょ、料理は……出来るのでは……なかったのか……」"

[[dialogue]]
speaker = "舞亜"
# 「普通に出来るはずなんだけど……どうしてお菓子作りだと上手くいかなかったんだろ」
line = "「普通に出来るはずなんだけど……どうしてお菓子作りだと上手くいかなかったんだろ」"

[[dialogue]]
speaker = "unk"
# スイーツの先生を呼んできました
line = "スイーツの先生を呼んできました"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんに呼ばれて来ました～♪　スイーツの先生、サランだよ～♪」
line = "「会長ちゃんに呼ばれて来ました～♪　スイーツの先生、サランだよ～♪」"

[[dialogue]]
speaker = "舞亜"
# 「サランさん？　わざわざありがとうございます」
line = "「サランさん？　わざわざありがとうございます」"

[[dialogue]]
speaker = "サラン"
# 「気にしなくていいよ～。会長ちゃんの頼みだし、可愛い後輩ちゃんのお手伝いができるなら喜んで引き受けちゃうかも～♪」
line = "「気にしなくていいよ～。会長ちゃんの頼みだし、可愛い後輩ちゃんのお手伝いができるなら喜んで引き受けちゃうかも～♪」"

[[dialogue]]
speaker = "サラン"
# 「アニュラスちゃんを昇天させかけたスイーツっていうのはどれかな～？」
line = "「アニュラスちゃんを昇天させかけたスイーツっていうのはどれかな～？」"

[[dialogue]]
speaker = "舞亜"
# 「……こ、これです」
line = "「……こ、これです」"

[[dialogue]]
speaker = "サラン"
# 「う～ん、見た目は普通のクッキーだね～♪　ん～、はむっ」
line = "「う～ん、見た目は普通のクッキーだね～♪　ん～、はむっ」"

[[dialogue]]
speaker = "舞亜"
# 「食べちゃダメっ！　本当にヤバいから！」
line = "「食べちゃダメっ！　本当にヤバいから！」"

[[dialogue]]
speaker = "サラン"
# 「ん～、確かに失敗しちゃってるかも～♪　でもでも全然ダメじゃなくて～、ちょっと惜しいかな～って感じ～」
line = "「ん～、確かに失敗しちゃってるかも～♪　でもでも全然ダメじゃなくて～、ちょっと惜しいかな～って感じ～」"

[[dialogue]]
speaker = "舞亜"
# 「え……ほんとにですか？」
line = "「え……ほんとにですか？」"

[[dialogue]]
speaker = "サラン"
# 「本当だよ～♪　もしかしたらアニュラスちゃんがこういう味に慣れてなかっただけかも」
line = "「本当だよ～♪　もしかしたらアニュラスちゃんがこういう味に慣れてなかっただけかも」"

[[dialogue]]
speaker = "アニュラス"
# 「たしかに……初めて口にする、味だった……が……」
line = "「たしかに……初めて口にする、味だった……が……」"

[[dialogue]]
speaker = "サラン"
# 「レシピ通りに作ったわけじゃなさそうだね～。何を入れたんだろ……？　きのこと……ハーブかな～……？」
line = "「レシピ通りに作ったわけじゃなさそうだね～。何を入れたんだろ……？　きのこと……ハーブかな～……？」"

[[dialogue]]
speaker = "舞亜"
# 「わ、正解です！　さすがですね……」
line = "「わ、正解です！　さすがですね……」"

[[dialogue]]
speaker = "サラン"
# 「この組み合わせってことは～、舞亜ちゃんはこんな感じの味にしたかったってことだから～」
line = "「この組み合わせってことは～、舞亜ちゃんはこんな感じの味にしたかったってことだから～」"

[[dialogue]]
speaker = "サラン"
# 「うんうん、そうだよね……いけそうかも～♪」
line = "「うんうん、そうだよね……いけそうかも～♪」"

[[dialogue]]
speaker = "舞亜"
# 「えっ？　すごい！　もしかして私のやりたいこと、分かっちゃった感じですか？」
line = "「えっ？　すごい！　もしかして私のやりたいこと、分かっちゃった感じですか？」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ～、分かっちゃったかも～♪」
line = "「ぽよ～、分かっちゃったかも～♪」"

[[dialogue]]
speaker = "unk"
# 俺にはさっぱり理解出来ない
line = "俺にはさっぱり理解出来ない"

[[dialogue]]
speaker = "サラン"
# 「舞亜ちゃんはセンスいいと思うよ～♪　サランも、なるほど～って感心しちゃった♪」
line = "「舞亜ちゃんはセンスいいと思うよ～♪　サランも、なるほど～って感心しちゃった♪」"

[[dialogue]]
speaker = "舞亜"
# 「サランさんもすごいです。私の意図を読み取って、すぐにどうしたらいいか教えてくれるんですから！」
line = "「サランさんもすごいです。私の意図を読み取って、すぐにどうしたらいいか教えてくれるんですから！」"

[[dialogue]]
speaker = "サラン"
# 「ありがと～。舞亜ちゃんとは話が合うかも～♪」
line = "「ありがと～。舞亜ちゃんとは話が合うかも～♪」"

[[dialogue]]
speaker = "舞亜"
# 「今日だけじゃなく、これからもいろいろ教えてくれると嬉しいです」
line = "「今日だけじゃなく、これからもいろいろ教えてくれると嬉しいです」"

[[dialogue]]
speaker = "サラン"
# 「クリスマスパーティー用のスイーツ、もっと種類があった方がいいと思うから、いろいろ教えとくね～」
line = "「クリスマスパーティー用のスイーツ、もっと種類があった方がいいと思うから、いろいろ教えとくね～」"

[[dialogue]]
speaker = "舞亜"
# 「ブッシュドノエルを……大きく出来たりしますか？　出来れば実物大で」
line = "「ブッシュドノエルを……大きく出来たりしますか？　出来れば実物大で」"

[[dialogue]]
speaker = "サラン"
# 「うーん、実物大だと難しくなるけど、大丈夫だと思うよ～」
line = "「うーん、実物大だと難しくなるけど、大丈夫だと思うよ～」"

[[dialogue]]
speaker = "サラン"
# 「でもそれは後でね。今日はさっきのクッキーをおいしく作っちゃおう♪」
line = "「でもそれは後でね。今日はさっきのクッキーをおいしく作っちゃおう♪」"

[[dialogue]]
speaker = "舞亜"
# 「はいっ、よろしくお願いします！」
line = "「はいっ、よろしくお願いします！」"

[[dialogue]]
speaker = "サラン"
# 「材料は……これとこれとこれ……でいいかな～」
line = "「材料は……これとこれとこれ……でいいかな～」"

[[dialogue]]
speaker = "舞亜"
# 「分かりました。やってみます！」
line = "「分かりました。やってみます！」"

[[dialogue]]
speaker = "舞亜"
# 「まずはバターとたまご、お砂糖を、このハンドミキサーを使って、混ぜ混ぜします」
line = "「まずはバターとたまご、お砂糖を、このハンドミキサーを使って、混ぜ混ぜします」"

[[dialogue]]
speaker = "舞亜"
# 「はい、こんな感じ。しっかり混ざってるね。どうかな、サランさん？」
line = "「はい、こんな感じ。しっかり混ざってるね。どうかな、サランさん？」"

[[dialogue]]
speaker = "サラン"
# 「うん！　上出来です♪」
line = "「うん！　上出来です♪」"

[[dialogue]]
speaker = "舞亜"
# 「あとは具材かな。サランさんが選んでくれた組み合わせなら、絶対おいしくなるよ」
line = "「あとは具材かな。サランさんが選んでくれた組み合わせなら、絶対おいしくなるよ」"

[[dialogue]]
speaker = "unk"
# やっぱりピンと来ない
line = "やっぱりピンと来ない"

[[dialogue]]
speaker = "unk"
# きのことハーブなのに？
line = "きのことハーブなのに？"

[[dialogue]]
speaker = "サラン"
# 「あ、きのこはもうちょっと細かく刻んだ方がいいかも♪」
line = "「あ、きのこはもうちょっと細かく刻んだ方がいいかも♪」"

[[dialogue]]
speaker = "舞亜"
# 「その方がうまみと香りが立つってことですね、やってみます」
line = "「その方がうまみと香りが立つってことですね、やってみます」"

[[dialogue]]
speaker = "サラン"
# 「頑張って～♪」
line = "「頑張って～♪」"

[[dialogue]]
speaker = "舞亜"
# 「刻んだ具材を生地に入れて……よし、次はこのヘラの出番だね。全体をざっくりと混ぜ混ぜして～……うん、こんなもんかな」
line = "「刻んだ具材を生地に入れて……よし、次はこのヘラの出番だね。全体をざっくりと混ぜ混ぜして～……うん、こんなもんかな」"

[[dialogue]]
speaker = "舞亜"
# 「はいっ。じゃあ、成型して焼きますね～」
line = "「はいっ。じゃあ、成型して焼きますね～」"

[[dialogue]]
speaker = "舞亜"
# 「はいっ、出来ました～♪　んー、いい香り」
line = "「はいっ、出来ました～♪　んー、いい香り」"

[[dialogue]]
speaker = "unk"
# 信じられない
line = "信じられない"

[[dialogue]]
speaker = "unk"
# あの組み合わせでこの香り？
line = "あの組み合わせでこの香り？"

[[dialogue]]
speaker = "舞亜"
# 「とりあえず食べてみてよ。会長さんたちもサランさんも試食をお願いします」
line = "「とりあえず食べてみてよ。会長さんたちもサランさんも試食をお願いします」"

[[dialogue]]
speaker = "サラン"
# 「はーい♪　はむっ、もぐもぐもぐ……うんっ、ばっちり！　とってもおいしく出来たね～♪」
line = "「はーい♪　はむっ、もぐもぐもぐ……うんっ、ばっちり！　とってもおいしく出来たね～♪」"

[[dialogue]]
speaker = "アニュラス"
# 「本当だ……味の方向性は同じなのに、今度のはちゃんと美味しい……」
line = "「本当だ……味の方向性は同じなのに、今度のはちゃんと美味しい……」"

[[dialogue]]
speaker = "舞亜"
# 「えへへ～、サランさんの指導のおかげですよ」
line = "「えへへ～、サランさんの指導のおかげですよ」"

[[dialogue]]
speaker = "サラン"
# 「サランはちょこっとアドバイスしただけだよ～♪」
line = "「サランはちょこっとアドバイスしただけだよ～♪」"

[[dialogue]]
speaker = "舞亜"
# 「そうだ、会長さんは？　さっきから反応ないんだけど……」
line = "「そうだ、会長さんは？　さっきから反応ないんだけど……」"

[[dialogue]]
speaker = "unk"
# なんだこの絶妙なハーモニーは
line = "なんだこの絶妙なハーモニーは"

[[dialogue]]
speaker = "unk"
# う、うまぁーーい！！
line = "う、うまぁーーい！！"

[[dialogue]]
speaker = "舞亜"
# 「おいしかったんだ？　よかった～」
line = "「おいしかったんだ？　よかった～」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんも大喜びだし、大成功かも～♪」
line = "「会長ちゃんも大喜びだし、大成功かも～♪」"

[[dialogue]]
speaker = "舞亜"
# 「はいっ、もっともっと色んなスイーツに挑戦して、クリスマスパーティーを盛り上げたいです」
line = "「はいっ、もっともっと色んなスイーツに挑戦して、クリスマスパーティーを盛り上げたいです」"

[[dialogue]]
speaker = "unk"
# こうして作り出された舞亜の不思議なスイーツは、後のクリスマスパーティーでも大人気の一品となるのだった。
line = "こうして作り出された舞亜の不思議なスイーツは、後のクリスマスパーティーでも大人気の一品となるのだった。"
