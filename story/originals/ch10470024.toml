[[dialogue]]
speaker = "unk"
# 第４話,あなただけのアイドル,P
line = "第４話,あなただけのアイドル,P"

[[dialogue]]
speaker = "unk"
# どうしてこう、星徒会の業務ってやつは次から次へとやってくるんだろう？
line = "どうしてこう、星徒会の業務ってやつは次から次へとやってくるんだろう？"

[[dialogue]]
speaker = "unk"
# なんとかメルエルとデートの約束を取り付けたいけれど、それもままならない多忙な日々が続いていた──
line = "なんとかメルエルとデートの約束を取り付けたいけれど、それもままならない多忙な日々が続いていた──"

[[dialogue]]
speaker = "メルエル"
# 「会長くん、よかったら今日の放課後、一緒に帰らない？　素敵な猫カフェを見つけたんだけど……！」
line = "「会長くん、よかったら今日の放課後、一緒に帰らない？　素敵な猫カフェを見つけたんだけど……！」"

[[dialogue]]
speaker = "unk"
# また今度でもいいかな……？
line = "また今度でもいいかな……？"

[[dialogue]]
speaker = "unk"
# ごめん、メルエル
line = "ごめん、メルエル"

[[dialogue]]
speaker = "メルエル"
# 「あ……お仕事、忙しかった？　ごめんね、呼び止めちゃって……」
line = "「あ……お仕事、忙しかった？　ごめんね、呼び止めちゃって……」"

[[dialogue]]
speaker = "unk"
# 猫カフェは今度の週末に行こう！
line = "猫カフェは今度の週末に行こう！"

[[dialogue]]
speaker = "unk"
# こっちこそ時間取れなくてごめん
line = "こっちこそ時間取れなくてごめん"

[[dialogue]]
speaker = "メルエル"
# 「うん、それじゃあ頑張ってね……！」
line = "「うん、それじゃあ頑張ってね……！」"

[[dialogue]]
speaker = "メルエル"
# 「はあ。今日も会長くん、大変そうだったなあ……でも私は役員じゃないから、流石にお仕事には首を突っ込めないし……」
line = "「はあ。今日も会長くん、大変そうだったなあ……でも私は役員じゃないから、流石にお仕事には首を突っ込めないし……」"

[[dialogue]]
speaker = "メルエル"
# 「来年こそは星徒会役員に立候補したいし。訓練も欠かせないんだけど……何だか身が入らないよ～……」
line = "「来年こそは星徒会役員に立候補したいし。訓練も欠かせないんだけど……何だか身が入らないよ～……」"

[[dialogue]]
speaker = "レミカ"
# 「あれ……メルエル。どうかしたの、浮かない顔して」
line = "「あれ……メルエル。どうかしたの、浮かない顔して」"

[[dialogue]]
speaker = "メルエル"
# 「レミカちゃん。実は──」
line = "「レミカちゃん。実は──」"

[[dialogue]]
speaker = "レミカ"
# 「なるほど。彼氏が大変そうなのに、その手伝いができないことを気にしてるんだ？」
line = "「なるほど。彼氏が大変そうなのに、その手伝いができないことを気にしてるんだ？」"

[[dialogue]]
speaker = "メルエル"
# 「肝心な時に支えられないのが歯がゆいっていうか……恋人なのにふがいないっていうか……」
line = "「肝心な時に支えられないのが歯がゆいっていうか……恋人なのにふがいないっていうか……」"

[[dialogue]]
speaker = "レミカ"
# 「うーん……だったら、仕事以外のところで支えてあげるのはどうかな。お弁当を作ってあげるとか」
line = "「うーん……だったら、仕事以外のところで支えてあげるのはどうかな。お弁当を作ってあげるとか」"

[[dialogue]]
speaker = "メルエル"
# 「それはさせてもらってるよ！　今日も会長くんの好きなものでお弁当箱をぎっちりにして、でも栄養バランスも考えて……！」
line = "「それはさせてもらってるよ！　今日も会長くんの好きなものでお弁当箱をぎっちりにして、でも栄養バランスも考えて……！」"

[[dialogue]]
speaker = "レミカ"
# 「してるんだ。じゃあ、朝起こしに行ってあげるとか……」
line = "「してるんだ。じゃあ、朝起こしに行ってあげるとか……」"

[[dialogue]]
speaker = "メルエル"
# 「それもさせてもらってる！　合鍵あるし！　ぁ、でもリノお義母さんに『あんまり甘やかさなくていいのよ』って言われちゃって……しょぼん」
line = "「それもさせてもらってる！　合鍵あるし！　ぁ、でもリノお義母さんに『あんまり甘やかさなくていいのよ』って言われちゃって……しょぼん」"

[[dialogue]]
speaker = "レミカ"
# 「してるんだ……それなら仮眠のサポートとかどうかな。昼休みとかの短い時間に、ちょっとでも寝てもらうの」
line = "「してるんだ……それなら仮眠のサポートとかどうかな。昼休みとかの短い時間に、ちょっとでも寝てもらうの」"

[[dialogue]]
speaker = "レミカ"
# 「私もマネージャーさんに『１０分経ったら起こして』ってお願いすることあるし」
line = "「私もマネージャーさんに『１０分経ったら起こして』ってお願いすることあるし」"

[[dialogue]]
speaker = "メルエル"
# 「それもさせてもらってるよ！　お昼休みに膝枕してあげてね、頭を撫でたり、たまに耳かきをしてあげたり！」
line = "「それもさせてもらってるよ！　お昼休みに膝枕してあげてね、頭を撫でたり、たまに耳かきをしてあげたり！」"

[[dialogue]]
speaker = "レミカ"
# 「してるんだ……え、むしろ何ならしてないの？　もう十分だと思うけど」
line = "「してるんだ……え、むしろ何ならしてないの？　もう十分だと思うけど」"

[[dialogue]]
speaker = "メルエル"
# 「ぜんぜん十分じゃないよ～っ……あんなに大変そうなのに。頑張って！　って言うことしかできないし……」
line = "「ぜんぜん十分じゃないよ～っ……あんなに大変そうなのに。頑張って！　って言うことしかできないし……」"

[[dialogue]]
speaker = "レミカ"
# 「いや、至れり尽くせりでしょ。完全無欠、パーフェクトな彼女だよ」
line = "「いや、至れり尽くせりでしょ。完全無欠、パーフェクトな彼女だよ」"

[[dialogue]]
speaker = "メルエル"
# 「そうなのかなあ……もっと私にできること、ないかなあ……」
line = "「そうなのかなあ……もっと私にできること、ないかなあ……」"

[[dialogue]]
speaker = "レミカ"
# 「──良いこと思いついた。ねぇ、もう一度『アーネスト』を結成してみない？」
line = "「──良いこと思いついた。ねぇ、もう一度『アーネスト』を結成してみない？」"

[[dialogue]]
speaker = "レミカ"
# 「男の子の元気を引き出すには、アイドルのライブが一番だよ。ね、会長のためにさ？」
line = "「男の子の元気を引き出すには、アイドルのライブが一番だよ。ね、会長のためにさ？」"

[[dialogue]]
speaker = "メルエル"
# 「アイドルは１日で終わりって約束したよねっ！？　レミカちゃんが再結成したいだけのような気がするっ……！」
line = "「アイドルは１日で終わりって約束したよねっ！？　レミカちゃんが再結成したいだけのような気がするっ……！」"

[[dialogue]]
speaker = "レミカ"
# 「残念、またフられちゃった」
line = "「残念、またフられちゃった」"

[[dialogue]]
speaker = "メルエル"
# 「も～っ……私は会長くんとお付き合いしてるから、アイドル活動は無理なんだってば～……！」
line = "「も～っ……私は会長くんとお付き合いしてるから、アイドル活動は無理なんだってば～……！」"

[[dialogue]]
speaker = "メルエル"
# （……あれ？　でも、再結成はしなくても、アイドルの衣装で元気づけることはできるんじゃ……？）
line = "（……あれ？　でも、再結成はしなくても、アイドルの衣装で元気づけることはできるんじゃ……？）"

[[dialogue]]
speaker = "unk"
# メルエルの放課後デートを断って、書類を片付けているうちに夜になってしまった。
line = "メルエルの放課後デートを断って、書類を片付けているうちに夜になってしまった。"

[[dialogue]]
speaker = "unk"
# お腹は空いたし、目はしょぼしょぼするし、くたびれた……飲み物のお使いに出かけたヴィーナスはまだかな……？
line = "お腹は空いたし、目はしょぼしょぼするし、くたびれた……飲み物のお使いに出かけたヴィーナスはまだかな……？"

[[dialogue]]
speaker = "unk"
# あ。おかえり、ヴィーナ──
line = "あ。おかえり、ヴィーナ──"

[[dialogue]]
speaker = "メルエル"
# 「会長くんっ！　お疲れ様っ<emoji=heart04>　今夜だけ復帰しちゃいました、アーネストの姫咲メルエルですっ！」
line = "「会長くんっ！　お疲れ様っ<emoji=heart04>　今夜だけ復帰しちゃいました、アーネストの姫咲メルエルですっ！」"

[[dialogue]]
speaker = "unk"
# メルエル！？　その衣装は……！
line = "メルエル！？　その衣装は……！"

[[dialogue]]
speaker = "メルエル"
# 「えへへっ、お仕事を頑張ってるキミが、元気になったらいいなって思って……変身してきちゃった！」
line = "「えへへっ、お仕事を頑張ってるキミが、元気になったらいいなって思って……変身してきちゃった！」"

[[dialogue]]
speaker = "メルエル"
# 「ど、どうかなっ……ちょっとは癒しになったかな……？」
line = "「ど、どうかなっ……ちょっとは癒しになったかな……？」"

[[dialogue]]
speaker = "unk"
# ２４時間、戦える！！
line = "２４時間、戦える！！"

[[dialogue]]
speaker = "メルエル"
# 「わわっ！？　そんなに喜んでくれるなんて思わなかったな……ふふっ<emoji=heart04>」
line = "「わわっ！？　そんなに喜んでくれるなんて思わなかったな……ふふっ<emoji=heart04>」"

[[dialogue]]
speaker = "メルエル"
# 「それじゃあもっと元気いっぱいになるように……歌とダンスで応援しちゃってもいい？」
line = "「それじゃあもっと元気いっぱいになるように……歌とダンスで応援しちゃってもいい？」"

[[dialogue]]
speaker = "unk"
# ありがとう、メルエル！
line = "ありがとう、メルエル！"

[[dialogue]]
speaker = "メルエル"
# 「それじゃあ早速。ライブで一番盛り上がったあの曲、いっちゃうね～！」
line = "「それじゃあ早速。ライブで一番盛り上がったあの曲、いっちゃうね～！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「待たせたわね、クロト！　さっきそこでレミカに会ったの！　一緒に晩御飯でもどうかしら！」
line = "「待たせたわね、クロト！　さっきそこでレミカに会ったの！　一緒に晩御飯でもどうかしら！」"

[[dialogue]]
speaker = "レミカ"
# 「失礼します、会長──」
line = "「失礼します、会長──」"

[[dialogue]]
speaker = "メルエル"
# 「ラブハート・ペネトレイターっ<emoji=heart04>　──って！？」
line = "「ラブハート・ペネトレイターっ<emoji=heart04>　──って！？」"

[[dialogue]]
speaker = "メルエル"
# 「あ、２人とも、これはね、え～っと……」
line = "「あ、２人とも、これはね、え～っと……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もしかしてこれは……アーネスト再結成……ってコト！？」
line = "「もしかしてこれは……アーネスト再結成……ってコト！？」"

[[dialogue]]
speaker = "メルエル"
# 「違うよ！？　これは会長くんを元気づけようと思って……！」
line = "「違うよ！？　これは会長くんを元気づけようと思って……！」"

[[dialogue]]
speaker = "メルエル"
# 「レミカちゃん！　無言で変身しないでーっ！？」
line = "「レミカちゃん！　無言で変身しないでーっ！？」"

[[dialogue]]
speaker = "レミカ"
# 「──いいね、再結成。待ちわびてたんだ」
line = "「──いいね、再結成。待ちわびてたんだ」"

[[dialogue]]
speaker = "メルエル"
# 「話を聞いて～っ……！！」
line = "「話を聞いて～っ……！！」"

[[dialogue]]
speaker = "unk"
# その後、メルエルはレミカの勧誘攻撃を何とかかわしきり──けれど一晩だけなら、ということで。
line = "その後、メルエルはレミカの勧誘攻撃を何とかかわしきり──けれど一晩だけなら、ということで。"

[[dialogue]]
speaker = "unk"
# 俺とヴィーナスだけを観客に、トレーニング施設で一夜限りのアーネスト復活ライブを見せてくれたのだった──
line = "俺とヴィーナスだけを観客に、トレーニング施設で一夜限りのアーネスト復活ライブを見せてくれたのだった──"
