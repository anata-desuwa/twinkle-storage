[[dialogue]]
speaker = "unk"
# 数日後――
line = "数日後――"

[[dialogue]]
speaker = "unk"
# ロストアイテムを巡るディーラックとの戦いは終わり、俺たちはいつもの日常に戻っていた。
line = "ロストアイテムを巡るディーラックとの戦いは終わり、俺たちはいつもの日常に戻っていた。"

[[dialogue]]
speaker = "トレジアンナ"
# 「――それで、後からシズハさんの体を魔法で検査したところ……」
line = "「――それで、後からシズハさんの体を魔法で検査したところ……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「シズハさんの中にある『聖杯』に、多くの<b>ヒビ割れ</b>が発生していた痕跡が見つかりました」
line = "「シズハさんの中にある『聖杯』に、多くの<b>ヒビ割れ</b>が発生していた痕跡が見つかりました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「もし放置していれば、遠からず破損して聖杯は砕けてしまっていたでしょう。ですが――」
line = "「もし放置していれば、遠からず破損して聖杯は砕けてしまっていたでしょう。ですが――」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そのヒビは全て、ディーラックさんが使った幸運のロストアイテムによって、修復が為されていました」
line = "「そのヒビは全て、ディーラックさんが使った幸運のロストアイテムによって、修復が為されていました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ロストアイテムは本来、リクリエの力でも分解できないほどの存在強度を持つ、手を加えるのが極めて難しい代物です」
line = "「ロストアイテムは本来、リクリエの力でも分解できないほどの存在強度を持つ、手を加えるのが極めて難しい代物です」"

[[dialogue]]
speaker = "トレジアンナ"
# 「しかしそこへ、幸運のロストアイテムを使って<b>成功確率を引き上げる</b>ことで、修復可能にしたんでしょう」
line = "「しかしそこへ、幸運のロストアイテムを使って<b>成功確率を引き上げる</b>ことで、修復可能にしたんでしょう」"

[[dialogue]]
speaker = "トレジアンナ"
# 「逆に言えば、だからこそ『幸運のロストアイテム』を作り出すことが必要だった――」
line = "「逆に言えば、だからこそ『幸運のロストアイテム』を作り出すことが必要だった――」"

[[dialogue]]
speaker = "サチ"
# 「つまり、ディーラックさんの叶えたかった願いというのは、シズハちゃんの聖杯を直すことだったんですね」
line = "「つまり、ディーラックさんの叶えたかった願いというのは、シズハちゃんの聖杯を直すことだったんですね」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん……」
line = "「ディーちゃん……」"

[[dialogue]]
speaker = "トマル"
# 「でも、どうして……」
line = "「でも、どうして……」"

[[dialogue]]
speaker = "unk"
# それなら、本人に聞いてみよう
line = "それなら、本人に聞いてみよう"

[[dialogue]]
speaker = "プリムラ"
# 「確かに、それが一番手っ取り早いのじゃ。のう？　ディーラックよ」
line = "「確かに、それが一番手っ取り早いのじゃ。のう？　ディーラックよ」"

[[dialogue]]
speaker = "ディーラック"
# 「ふん……」
line = "「ふん……」"

[[dialogue]]
speaker = "unk"
# そう。あれから力尽きたディーラックではあるが、シズハたっての願いで、無事（？）に生存を果たしていた。
line = "そう。あれから力尽きたディーラックではあるが、シズハたっての願いで、無事（？）に生存を果たしていた。"

[[dialogue]]
speaker = "unk"
# その代わり、悪さができないようにトレジアンナさん特製の鳥カゴ魔道具に入ってもらうという条件付きで。
line = "その代わり、悪さができないようにトレジアンナさん特製の鳥カゴ魔道具に入ってもらうという条件付きで。"

[[dialogue]]
speaker = "ディーラック"
# 「ボクがシズハちゃんを助けたのは、そんなにおかしいことかい？」
line = "「ボクがシズハちゃんを助けたのは、そんなにおかしいことかい？」"

[[dialogue]]
speaker = "プリムラ"
# 「いや、これまで、どう考えても我らの敵っぽいムーブをかましてたじゃろ、貴様……」
line = "「いや、これまで、どう考えても我らの敵っぽいムーブをかましてたじゃろ、貴様……」"

[[dialogue]]
speaker = "ディーラック"
# 「そうだとも。ヒトカス共はボクにとって家畜サ。だけど――」
line = "「そうだとも。ヒトカス共はボクにとって家畜サ。だけど――」"

[[dialogue]]
speaker = "ディーラック"
# 「キミたちだって、牧場で育てている家畜が病気になれば、治そうとするだろう？　それと同じサ」
line = "「キミたちだって、牧場で育てている家畜が病気になれば、治そうとするだろう？　それと同じサ」"

[[dialogue]]
speaker = "ディーラック"
# 「本当は、幸運のロストアイテムでキミたちが邪魔できないように制圧してから、もっと慎重に聖杯のヒビを修復する予定だったのサ」
line = "「本当は、幸運のロストアイテムでキミたちが邪魔できないように制圧してから、もっと慎重に聖杯のヒビを修復する予定だったのサ」"

[[dialogue]]
speaker = "ディーラック"
# 「ロストアイテムの修理なんて、ボクも初めてだからネ。そうして目的を果たした後は、魔界の奥地にでも逃げ込んで、自身を封印して眠るつもりだった」
line = "「ロストアイテムの修理なんて、ボクも初めてだからネ。そうして目的を果たした後は、魔界の奥地にでも逃げ込んで、自身を封印して眠るつもりだった」"

[[dialogue]]
speaker = "ディーラック"
# 「ボクのことを知るキミたちの寿命が尽きて、この世から居なくなるまで、ゆっくりとネ」
line = "「ボクのことを知るキミたちの寿命が尽きて、この世から居なくなるまで、ゆっくりとネ」"

[[dialogue]]
speaker = "ディーラック"
# 「エネルギー生命体であるボクには、寿命が存在しないからサ。面倒なら、逃げて寝とけばいいと思ったんだよ」
line = "「エネルギー生命体であるボクには、寿命が存在しないからサ。面倒なら、逃げて寝とけばいいと思ったんだよ」"

[[dialogue]]
speaker = "ディーラック"
# 「まあ、その隠居計画も、サチちゃんの言う『みんなの幸運』とやらで、見事にご破算にされたわけだけど」
line = "「まあ、その隠居計画も、サチちゃんの言う『みんなの幸運』とやらで、見事にご破算にされたわけだけど」"

[[dialogue]]
speaker = "シズハ"
# 「……そっか」
line = "「……そっか」"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん、ありがとね」
line = "「ディーちゃん、ありがとね」"

[[dialogue]]
speaker = "ディーラック"
# 「は？　……別に、シズハちゃんの為にやったわけじゃないのサ。ボクの、自分でも反吐が出るくらい、愚かな自己満足のためだよ」
line = "「は？　……別に、シズハちゃんの為にやったわけじゃないのサ。ボクの、自分でも反吐が出るくらい、愚かな自己満足のためだよ」"

[[dialogue]]
speaker = "シズハ"
# 「だとしても、私はディーちゃんに２度も命を助けられた。聖杯がもしこのまま砕けてしまうことになってたら……私、死んじゃってたんだよね？」
line = "「だとしても、私はディーちゃんに２度も命を助けられた。聖杯がもしこのまま砕けてしまうことになってたら……私、死んじゃってたんだよね？」"

[[dialogue]]
speaker = "ディーラック"
# 「…………さあね」
line = "「…………さあね」"

[[dialogue]]
speaker = "ディーラック"
# 「でも、まあ……せいぜい幸運に感謝して、愚かに生き続ければいいんじゃない？」
line = "「でも、まあ……せいぜい幸運に感謝して、愚かに生き続ければいいんじゃない？」"

[[dialogue]]
speaker = "シズハ"
# 「うん！　私、ディーちゃんからもらった命、大切にする。あと――」
line = "「うん！　私、ディーちゃんからもらった命、大切にする。あと――」"

[[dialogue]]
speaker = "シズハ"
# 「私、ディーちゃんがマイナスエネルギーじゃなくてもお腹いっぱいになれる方法を、見つけてみせるから！」
line = "「私、ディーちゃんがマイナスエネルギーじゃなくてもお腹いっぱいになれる方法を、見つけてみせるから！」"

[[dialogue]]
speaker = "ディーラック"
# 「ふん……何も方策が思いついてない癖に、威勢だけは一丁前。つくづく愚かなヒトカスなのサ」
line = "「ふん……何も方策が思いついてない癖に、威勢だけは一丁前。つくづく愚かなヒトカスなのサ」"

[[dialogue]]
speaker = "ディーラック"
# 「ボクを生かしておいたこと、いつか絶対後悔するよ？　シズハちゃん」
line = "「ボクを生かしておいたこと、いつか絶対後悔するよ？　シズハちゃん」"

[[dialogue]]
speaker = "シズハ"
# 「絶対に後悔しない。生きててよかったって、いつか必ず思わせてみせるよ！」
line = "「絶対に後悔しない。生きててよかったって、いつか必ず思わせてみせるよ！」"

[[dialogue]]
speaker = "シズハ"
# 「だから、見てて！　ディーちゃん♪」
line = "「だから、見てて！　ディーちゃん♪」"

[[dialogue]]
speaker = "unk"
# そう言って、シズハは嬉しそうに笑う。
line = "そう言って、シズハは嬉しそうに笑う。"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "サチ"
# 「……あっ、お兄さん、ちょっと失礼しますね」
line = "「……あっ、お兄さん、ちょっと失礼しますね」"

[[dialogue]]
speaker = "unk"
# サチ、どうしたの？
line = "サチ、どうしたの？"

[[dialogue]]
speaker = "サチ"
# 「お兄さんの制服の肩に、小さな糸くずが乗ってるのが見えて……よいしょっと……」
line = "「お兄さんの制服の肩に、小さな糸くずが乗ってるのが見えて……よいしょっと……」"

[[dialogue]]
speaker = "unk"
# サチがちょっと背伸びをしながら手を伸ばしてきて、俺は取りやすいように腰を少しかがめる。
line = "サチがちょっと背伸びをしながら手を伸ばしてきて、俺は取りやすいように腰を少しかがめる。"

[[dialogue]]
speaker = "unk"
# すると――
line = "すると――"

[[dialogue]]
speaker = "サチ"
# 「えっ……きゃっ！？」
line = "「えっ……きゃっ！？」"

[[dialogue]]
speaker = "unk"
# なんと、つま先立ちをしたサチがバランスを崩して、俺の方へ倒れ込んで来る。
line = "なんと、つま先立ちをしたサチがバランスを崩して、俺の方へ倒れ込んで来る。"

[[dialogue]]
speaker = "unk"
# 咄嗟に彼女の体を受け止めようとするが、俺も半端な姿勢だった為、同じくバランスを崩して――
line = "咄嗟に彼女の体を受け止めようとするが、俺も半端な姿勢だった為、同じくバランスを崩して――"

[[dialogue]]
speaker = "サチ"
# 「う、う～ん……はっ！？」
line = "「う、う～ん……はっ！？」"

[[dialogue]]
speaker = "unk"
# 気づけば俺はサチに押し倒され、彼女の小さな胸に真正面から顔を埋めるような態勢になっており。
line = "気づけば俺はサチに押し倒され、彼女の小さな胸に真正面から顔を埋めるような態勢になっており。"

[[dialogue]]
speaker = "unk"
# そして、俺の両手は何故か彼女のお尻を掴むような形になってしまっていた。
line = "そして、俺の両手は何故か彼女のお尻を掴むような形になってしまっていた。"

[[dialogue]]
speaker = "サチ"
# 「な、ななな、なっ……！？」
line = "「な、ななな、なっ……！？」"

[[dialogue]]
speaker = "サチ"
# 「きゃああああああぁ～～～っ！？　どこ触ってるんですか、お兄さんっ！？」
line = "「きゃああああああぁ～～～っ！？　どこ触ってるんですか、お兄さんっ！？」"

[[dialogue]]
speaker = "プリムラ"
# 「おっ！　久しぶりに見たのじゃ、この光景！　安定の破廉恥っぷりじゃな♪」
line = "「おっ！　久しぶりに見たのじゃ、この光景！　安定の破廉恥っぷりじゃな♪」"

[[dialogue]]
speaker = "トマル"
# 「相変わらず、お２人とも仲がよろしくて、羨ま……いえ、喜ばしく……<emoji=heart04>」
line = "「相変わらず、お２人とも仲がよろしくて、羨ま……いえ、喜ばしく……<emoji=heart04>」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ふふふっ♪　こっちも一件落着で、めでたしめでたしですね☆」
line = "「ふふふっ♪　こっちも一件落着で、めでたしめでたしですね☆」"

[[dialogue]]
speaker = "サチ"
# 「エッ――」
line = "「エッ――」"

[[dialogue]]
speaker = "サチ"
# 「エッチなのは禁止ですーーーーーーーーーっ！！！」
line = "「エッチなのは禁止ですーーーーーーーーーっ！！！」"

[[dialogue]]
speaker = "unk"
# いつも通りのサチの元気な叫び声と、魔法少女たちの楽しそうな笑い声が、学園の空に響くのだった――
line = "いつも通りのサチの元気な叫び声と、魔法少女たちの楽しそうな笑い声が、学園の空に響くのだった――"
