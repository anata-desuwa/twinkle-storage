[[dialogue]]
speaker = "unk"
# 第１話,集結,B
line = "第１話,集結,B"

[[dialogue]]
speaker = "unk"
# 時を遡ること、数時間──
line = "時を遡ること、数時間──"

[[dialogue]]
speaker = "ルヴィネ"
# 「遅くなってごめんなさい、魔王」
line = "「遅くなってごめんなさい、魔王」"

[[dialogue]]
speaker = "ヴィーナス"
# 「来たわね、ルヴィネ！　それに極星学園のみんなも！」
line = "「来たわね、ルヴィネ！　それに極星学園のみんなも！」"

[[dialogue]]
speaker = "ベアトリス"
# 「お、お邪魔しますっ」
line = "「お、お邪魔しますっ」"

[[dialogue]]
speaker = "グレイス"
# 「ひぇ～っ……こんな豪邸に入るのは初めてですっ。凄いですね、エステル！」
line = "「ひぇ～っ……こんな豪邸に入るのは初めてですっ。凄いですね、エステル！」"

[[dialogue]]
speaker = "エステル"
# 「は、はい。お話には聞いていましたが、ヴィーナスさんは本当にお嬢様なんですね……」
line = "「は、はい。お話には聞いていましたが、ヴィーナスさんは本当にお嬢様なんですね……」"

[[dialogue]]
speaker = "グレイス"
# 「お庭もすっごく広かったですし、お屋敷内を探検してみたいところですが──」
line = "「お庭もすっごく広かったですし、お屋敷内を探検してみたいところですが──」"

[[dialogue]]
speaker = "レティシア"
# 「いい子にしていないとダメよ、グレイス。今から『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』討伐の作戦会議をするのだから」
line = "「いい子にしていないとダメよ、グレイス。今から『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』討伐の作戦会議をするのだから」"

[[dialogue]]
speaker = "チナ"
# 「魔王、デネブでの戦いの傷はもういいのか？」
line = "「魔王、デネブでの戦いの傷はもういいのか？」"

[[dialogue]]
speaker = "クロト"
# 「ああ、問題ない。極星学園のみんなも元気そうで何よりだ」
line = "「ああ、問題ない。極星学園のみんなも元気そうで何よりだ」"

[[dialogue]]
speaker = "梨緒"
# 「ベアト、デネブからよく来てくれた。また君と戦えることが嬉しいぞ」
line = "「ベアト、デネブからよく来てくれた。また君と戦えることが嬉しいぞ」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん、私もだよ梨緒ちゃん！　それに選管のみんなも！」
line = "「うん、私もだよ梨緒ちゃん！　それに選管のみんなも！」"

[[dialogue]]
speaker = "ナターシャ"
# 「いらっしゃーい、なんて言ったら家主に悪いかな？」
line = "「いらっしゃーい、なんて言ったら家主に悪いかな？」"

[[dialogue]]
speaker = "アポロ"
# 「いよいよ最終決戦だ、ド派手に行くぞっ！」
line = "「いよいよ最終決戦だ、ド派手に行くぞっ！」"

[[dialogue]]
speaker = "ジグ"
# 「魔王。これで頼れる援軍は最後だ──会議に必要なメンバーは全員招集できたね」
line = "「魔王。これで頼れる援軍は最後だ──会議に必要なメンバーは全員招集できたね」"

[[dialogue]]
speaker = "クロト"
# 「ああ──」
line = "「ああ──」"

[[dialogue]]
speaker = "unk"
# 俺は九浄家の大広間に集まった面々を見渡す。
line = "俺は九浄家の大広間に集まった面々を見渡す。"

[[dialogue]]
speaker = "unk"
# フィオナたち流星星徒会──
line = "フィオナたち流星星徒会──"

[[dialogue]]
speaker = "unk"
# ──聖庭園。
line = "──聖庭園。"

[[dialogue]]
speaker = "unk"
# 頽廃都市キュリオスの面々──煌嶺の後ろには、先の『<ruby=スター・リユニオン>星の再会</ruby>』作戦で奮ってくれた星術使いの姿もあった。
line = "頽廃都市キュリオスの面々──煌嶺の後ろには、先の『<ruby>星の再会<rt>スター・リユニオン</rt></ruby>』作戦で奮ってくれた星術使いの姿もあった。"

[[dialogue]]
speaker = "unk"
# そしてネビュラの魔女たちに、コラプサー。
line = "そしてネビュラの魔女たちに、コラプサー。"

[[dialogue]]
speaker = "unk"
# デネブ世界から駆けつけてくれたセイファート学園長。そして、アルタイルの現新星学園長であるシノさん、流星学園のラティエ学園長の姿もある。
line = "デネブ世界から駆けつけてくれたセイファート学園長。そして、アルタイルの現新星学園長であるシノさん、流星学園のラティエ学園長の姿もある。"

[[dialogue]]
speaker = "unk"
# 他にも多くのメンバーが集まっている──アルタイル・デネブ連合軍の集会だった。
line = "他にも多くのメンバーが集まっている──アルタイル・デネブ連合軍の集会だった。"

[[dialogue]]
speaker = "クロト"
# 「──待たせたな、みんな。それじゃあ始めよう」
line = "「──待たせたな、みんな。それじゃあ始めよう」"

[[dialogue]]
speaker = "クロト"
# 「創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』の息の根を止める、最後の戦いの作戦会議だ！」
line = "「創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』の息の根を止める、最後の戦いの作戦会議だ！」"

[[dialogue]]
speaker = "クロト"
# 「まずは現在の状況を共有する──アニマ先輩、トレジアンナさん。お願いします」
line = "「まずは現在の状況を共有する──アニマ先輩、トレジアンナさん。お願いします」"

[[dialogue]]
speaker = "アニマ"
# 「単刀直入にいくゾ。我々が倒すべき創造神『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』──奴の居場所は、崩壊せし平行世界『ベガ』ダ！」
line = "「単刀直入にいくゾ。我々が倒すべき創造神『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』──奴の居場所は、崩壊せし平行世界『ベガ』ダ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「デネブで会長さんに追い詰められた『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は、次元の裂け目に逃げ込みましたが、その逃亡先を割り出すことに成功しました☆」
line = "「デネブで会長さんに追い詰められた『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は、次元の裂け目に逃げ込みましたが、その逃亡先を割り出すことに成功しました☆」"

[[dialogue]]
speaker = "セドナ"
# 「──ほう。よくぞ尻尾を捕らえることができたな」
line = "「──ほう。よくぞ尻尾を捕らえることができたな」"

[[dialogue]]
speaker = "アニマ"
# 「次代の女神、ルヴィネの協力があったからナ！　フィーニスの塔のコントロール権はすでに取り戻していル」
line = "「次代の女神、ルヴィネの協力があったからナ！　フィーニスの塔のコントロール権はすでに取り戻していル」"

[[dialogue]]
speaker = "アニマ"
# 「塔の頂上にある神の視座──かつて女神テルルが、３つの平行世界を観測した場所を使えば、造作もないことダ」
line = "「塔の頂上にある神の視座──かつて女神テルルが、３つの平行世界を観測した場所を使えば、造作もないことダ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今の私は霊力が扱えないから、塔のコントロールには守護天使たちの力を借りる必要があったけれど……」
line = "「今の私は霊力が扱えないから、塔のコントロールには守護天使たちの力を借りる必要があったけれど……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「テルルと同じく、神の視座から次元を超えた『<ruby=とおみ>遠見</ruby>』を行うことはできるわ。<ruby=しゅうしゅう>蒐集</ruby>の魔女、準備はできているかしら？」
line = "「テルルと同じく、神の視座から次元を超えた『<ruby>遠見<rt>とおみ</rt></ruby>』を行うことはできるわ。<ruby>蒐集<rt>しゅうしゅう</rt></ruby>の魔女、準備はできているかしら？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「もちろんですよ～！　色々と大変でしたが、神の視座で確認した光景を映像にしてきました♪」
line = "「もちろんですよ～！　色々と大変でしたが、神の視座で確認した光景を映像にしてきました♪」"

[[dialogue]]
speaker = "セドナ"
# 「……出鱈目な力だな、本当に」
line = "「……出鱈目な力だな、本当に」"

[[dialogue]]
speaker = "トレジアンナ"
# 「むっふっふ。これが年の功ってやつですよ、セドナさん☆　では、こちらのモニターをどうぞ～♪」
line = "「むっふっふ。これが年の功ってやつですよ、セドナさん☆　では、こちらのモニターをどうぞ～♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「これが、梨緒ちゃんたちの……」
line = "「これが、梨緒ちゃんたちの……」"

[[dialogue]]
speaker = "梨緒"
# 「……ああ。私とジグの故郷。ベガだ」
line = "「……ああ。私とジグの故郷。ベガだ」"

[[dialogue]]
speaker = "ジグ"
# 「皮肉なものだね。こんな光景を見て、懐かしいだなんて思いたくはなかったが」
line = "「皮肉なものだね。こんな光景を見て、懐かしいだなんて思いたくはなかったが」"

[[dialogue]]
speaker = "クロト"
# 「これがベガの世界……正確に言えば、ベガの人間界。ちょうど流星教皇庁が建っていたあたりと聞いている」
line = "「これがベガの世界……正確に言えば、ベガの人間界。ちょうど流星教皇庁が建っていたあたりと聞いている」"

[[dialogue]]
speaker = "フィオナ"
# 「…………こうして映像で見ると、衝撃的ですね」
line = "「…………こうして映像で見ると、衝撃的ですね」"

[[dialogue]]
speaker = "アニマ"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は今、ベガにいる。そのことは間違いない、確実ダ」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は今、ベガにいる。そのことは間違いない、確実ダ」"

[[dialogue]]
speaker = "チナ"
# 「じゃあ乗り込んでぶっ倒せばいいってことだな！　一番槍はアタシに任せてくれよ！」
line = "「じゃあ乗り込んでぶっ倒せばいいってことだな！　一番槍はアタシに任せてくれよ！」"

[[dialogue]]
speaker = "クロト"
# 「そう行きたいのは山々なんだが、問題が持ち上がってるんだ」
line = "「そう行きたいのは山々なんだが、問題が持ち上がってるんだ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「懸念点はいくつかあるんですが～……まずは一番ヤバいところからいきましょうか☆」
line = "「懸念点はいくつかあるんですが～……まずは一番ヤバいところからいきましょうか☆」"

[[dialogue]]
speaker = "トレジアンナ"
# 「現在、ベガの地に降りると、我々の最高戦力である会長さんは、実力の全てを発揮することができません！」
line = "「現在、ベガの地に降りると、我々の最高戦力である会長さんは、実力の全てを発揮することができません！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ええっ！？　ど、どういうことですか？」
line = "「ええっ！？　ど、どういうことですか？」"

[[dialogue]]
speaker = "アニマ"
# 「会長の守護星は地球。ベガ世界で戦うなら当然、ベガの地球から星力を受け取ることになるんだガ……」
line = "「会長の守護星は地球。ベガ世界で戦うなら当然、ベガの地球から星力を受け取ることになるんだガ……」"

[[dialogue]]
speaker = "アニマ"
# 「ベガの地球は今、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に<b>喰われている</b>んだヨ」
line = "「ベガの地球は今、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に<b>喰われている</b>んだヨ」"

[[dialogue]]
speaker = "アポロ"
# 「喰われてる……！？」
line = "「喰われてる……！？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「映像で見てもらった方がわかりやすいですね～」
line = "「映像で見てもらった方がわかりやすいですね～」"

[[dialogue]]
speaker = "梨緒"
# 「ホロウ……！？　って、なんだ、あいつの足元にある、おかしな紋章は──！？」
line = "「ホロウ……！？　って、なんだ、あいつの足元にある、おかしな紋章は──！？」"

[[dialogue]]
speaker = "アニマ"
# 「あれは霊力で編まれた術式と推測されル。地球を、文字通り喰いちぎって飲み込み、糧としているんダ」
line = "「あれは霊力で編まれた術式と推測されル。地球を、文字通り喰いちぎって飲み込み、糧としているんダ」"

[[dialogue]]
speaker = "煌嶺"
# 「随分と生き汚い──なるほど。デネブで負った傷を、ああして癒しているということか」
line = "「随分と生き汚い──なるほど。デネブで負った傷を、ああして癒しているということか」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ええ、その通りです！　非効率ですが、星の質量を無理やり霊力に変換している様子でして～」
line = "「ええ、その通りです！　非効率ですが、星の質量を無理やり霊力に変換している様子でして～」"

[[dialogue]]
speaker = "グレイス"
# 「──っ！　『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』も、あそこに……！」
line = "「──っ！　『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』も、あそこに……！」"

[[dialogue]]
speaker = "レティシア"
# 「厄災の力を備えた魔王に痛めつけられた、その傷を治すためになりふり構っていられないということかしら」
line = "「厄災の力を備えた魔王に痛めつけられた、その傷を治すためになりふり構っていられないということかしら」"

[[dialogue]]
speaker = "アニマ"
# 「その通りダ。我々は便宜上、コレを『星喰らい』と呼ぶことにしたヨ」
line = "「その通りダ。我々は便宜上、コレを『星喰らい』と呼ぶことにしたヨ」"

[[dialogue]]
speaker = "クラウディア"
# 「ふむ。地球から星力を受け取る魔王にとって、これ以上ない妨害というわけか……」
line = "「ふむ。地球から星力を受け取る魔王にとって、これ以上ない妨害というわけか……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』はよほど会長さんを恐れているのでしょう」
line = "「はい。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』はよほど会長さんを恐れているのでしょう」"

[[dialogue]]
speaker = "トレジアンナ"
# 「本来なら『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は、こうして姿を見せることすら避けたかったはずです！」
line = "「本来なら『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は、こうして姿を見せることすら避けたかったはずです！」"

[[dialogue]]
speaker = "アニマ"
# 「時空の裂け目の中で、ひたすら息を潜められればよかったのだろうガ……奴は早急に回復をする必要性に迫られたようダ」
line = "「時空の裂け目の中で、ひたすら息を潜められればよかったのだろうガ……奴は早急に回復をする必要性に迫られたようダ」"

[[dialogue]]
speaker = "チナ"
# 「……何かトラブルがあったってことか？」
line = "「……何かトラブルがあったってことか？」"

[[dialogue]]
speaker = "アニマ"
# 「うム。『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』にとっては計算外の痛手がネ」
line = "「うム。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』にとっては計算外の痛手がネ」"

[[dialogue]]
speaker = "レティシア"
# 「……痛手？」
line = "「……痛手？」"

[[dialogue]]
speaker = "クロト"
# 「デネブの戦いで、奴が最後に……地球そのものを壊そうと大量のホロウを一気に吸収しただろう？」
line = "「デネブの戦いで、奴が最後に……地球そのものを壊そうと大量のホロウを一気に吸収しただろう？」"

[[dialogue]]
speaker = "クロト"
# 「その時に、煌嶺が仕込んでいてくれたんだ。『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』を蝕む呪いをな」
line = "「その時に、煌嶺が仕込んでいてくれたんだ。『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』を蝕む呪いをな」"

[[dialogue]]
speaker = "梨緒"
# 「……煌嶺は、多数のホロウたちをあの時、九尾の炎で使役下に置いていた」
line = "「……煌嶺は、多数のホロウたちをあの時、九尾の炎で使役下に置いていた」"

[[dialogue]]
speaker = "煌嶺"
# 「そうだ。ホロウが自裁するよりも早く、炎で包み傀儡としていた。あの時、魔王が死んだことで悪神もホロウも慢心していたからな」
line = "「そうだ。ホロウが自裁するよりも早く、炎で包み傀儡としていた。あの時、魔王が死んだことで悪神もホロウも慢心していたからな」"

[[dialogue]]
speaker = "煌嶺"
# 「妾に何体か奪われても構わんと高を括りおって。クク、だから寝首を掻かれるのだ」
line = "「妾に何体か奪われても構わんと高を括りおって。クク、だから寝首を掻かれるのだ」"

[[dialogue]]
speaker = "クロト"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は、煌嶺の支配下にあったホロウたちも、自らの内側に取り込んだ。爆弾を飲み込んだようなものだ」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は、煌嶺の支配下にあったホロウたちも、自らの内側に取り込んだ。爆弾を飲み込んだようなものだ」"

[[dialogue]]
speaker = "煌嶺"
# 「時空の狭間でゆったり何十年か待つ予定だったのだろうが、そうはさせぬ。傀儡の複製体を、奴の裡側で永劫の炎に変えてやった」
line = "「時空の狭間でゆったり何十年か待つ予定だったのだろうが、そうはさせぬ。傀儡の複製体を、奴の裡側で永劫の炎に変えてやった」"

[[dialogue]]
speaker = "煌嶺"
# 「消そうにも消せぬ、星力の炎で身の裡から灼かれる経験は、さしもの創造神も初めてであっただろうな」
line = "「消そうにも消せぬ、星力の炎で身の裡から灼かれる経験は、さしもの創造神も初めてであっただろうな」"

[[dialogue]]
speaker = "チナ"
# 「…………えっぐ」
line = "「…………えっぐ」"

[[dialogue]]
speaker = "クロト"
# 「煌嶺のお手柄だ。おかげで奴は、早急な回復の必要性に迫られ──ベガの世界に降り立った」
line = "「煌嶺のお手柄だ。おかげで奴は、早急な回復の必要性に迫られ──ベガの世界に降り立った」"

[[dialogue]]
speaker = "アニマ"
# 「あまりに激しい消耗を補うためニ、身をさらしてでも糧を得る『食事』を行わなければならなかっタ……そういうことダ」
line = "「あまりに激しい消耗を補うためニ、身をさらしてでも糧を得る『食事』を行わなければならなかっタ……そういうことダ」"

[[dialogue]]
speaker = "ベアトリス"
# 「さっきのホロウがいた場所が、食事──ううん。『星喰らい』をしているポイントってことですね」
line = "「さっきのホロウがいた場所が、食事──ううん。『星喰らい』をしているポイントってことですね」"

[[dialogue]]
speaker = "クロト"
# 「その通りだ。だけどそれは──１ヵ所だけじゃない」
line = "「その通りだ。だけどそれは──１ヵ所だけじゃない」"

[[dialogue]]
speaker = "梨緒"
# 「ここは天界……？　そうか。崩壊してはいても、ベガにも三界はある──」
line = "「ここは天界……？　そうか。崩壊してはいても、ベガにも三界はある──」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。そしてここを守護しているのが──」
line = "「はい。そしてここを守護しているのが──」"

[[dialogue]]
speaker = "ジグ"
# 「……やれやれ。また趣味の悪い番人を用意したものだね」
line = "「……やれやれ。また趣味の悪い番人を用意したものだね」"

[[dialogue]]
speaker = "unk"
# 使徒だった頃のジグの劣化コピーである、シャドウ。そして……
line = "使徒だった頃のジグの劣化コピーである、シャドウ。そして……"

[[dialogue]]
speaker = "ルリエル"
# 「あれれっ？　『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』がこっちにもいるのです！？」
line = "「あれれっ？　『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がこっちにもいるのです！？」"

[[dialogue]]
speaker = "アニマ"
# 「そうダ。『星喰らい』の全ての拠点に『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』はイル。地球のエネルギーを効率よく吸い上げる子機みたいなものダロウ」
line = "「そうダ。『星喰らい』の全ての拠点に『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』はイル。地球のエネルギーを効率よく吸い上げる子機みたいなものダロウ」"

[[dialogue]]
speaker = "ユウリ"
# 「分身してる、って感じか……？」
line = "「分身してる、って感じか……？」"

[[dialogue]]
speaker = "ソフィア"
# 「本体は姿を隠していて、どこにいるのかわからない……そういうことですね」
line = "「本体は姿を隠していて、どこにいるのかわからない……そういうことですね」"

[[dialogue]]
speaker = "アニマ"
# 「その通りダ。だからまず、当面の脅威である『星喰らい』から──次は聖庭園ダ」
line = "「その通りダ。だからまず、当面の脅威である『星喰らい』から──次は聖庭園ダ」"

[[dialogue]]
speaker = "アポロ"
# 「あたしの偽物も……」
line = "「あたしの偽物も……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「天界はこちらの２ヵ所です。次は魔界ですね！」
line = "「天界はこちらの２ヵ所です。次は魔界ですね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こっちはギエルね！　クロトの守護星を好き勝手してくれちゃって……！」
line = "「こっちはギエルね！　クロトの守護星を好き勝手してくれちゃって……！」"

[[dialogue]]
speaker = "フィオナ"
# 「フィヴォス流星群の折に戦った個体とは、正確には別物に見えますが──」
line = "「フィヴォス流星群の折に戦った個体とは、正確には別物に見えますが──」"

[[dialogue]]
speaker = "アポロ"
# 「あたしのシャドウと同じで、似せて造ってるみたいだな。とはいえ、相当手強そうだ……」
line = "「あたしのシャドウと同じで、似せて造ってるみたいだな。とはいえ、相当手強そうだ……」"

[[dialogue]]
speaker = "アニマ"
# 「次が最後、５ヵ所目ダ」
line = "「次が最後、５ヵ所目ダ」"

[[dialogue]]
speaker = "セイファート"
# 「……アルタイルの私の、模造品か」
line = "「……アルタイルの私の、模造品か」"

[[dialogue]]
speaker = "クロト"
# 「……はい。俺が魔王として覚醒しなかったら、確実に負けていた相手です」
line = "「……はい。俺が魔王として覚醒しなかったら、確実に負けていた相手です」"

[[dialogue]]
speaker = "ルヴィネ"
# 「シャドウの出力は本物の６割から７割程度……けれどそれは、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』がある程度量産を意識した時のスペックよ」
line = "「シャドウの出力は本物の６割から７割程度……けれどそれは、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』がある程度量産を意識した時のスペックよ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「この『星喰らい』を行う個体に関しては、コピー元以上の力が与えられている可能性が高いわね」
line = "「この『星喰らい』を行う個体に関しては、コピー元以上の力が与えられている可能性が高いわね」"

[[dialogue]]
speaker = "アニマ"
# 「さらにバッドニュースがある。ベガの人間界を映すゾ」
line = "「さらにバッドニュースがある。ベガの人間界を映すゾ」"

[[dialogue]]
speaker = "チナ"
# 「ま、まだあんのかよ──！？」
line = "「ま、まだあんのかよ──！？」"

[[dialogue]]
speaker = "セーラ"
# 「な、何これっ！？　ホロウじゃ──ない！？」
line = "「な、何これっ！？　ホロウじゃ──ない！？」"

[[dialogue]]
speaker = "アニマ"
# 「ホロウ・ルヴィネには違いなイ。ただ、それをさらに劣化コピーした、『シャドウ・ホロウルヴィネ』の軍勢だナ」
line = "「ホロウ・ルヴィネには違いなイ。ただ、それをさらに劣化コピーした、『シャドウ・ホロウルヴィネ』の軍勢だナ」"

[[dialogue]]
speaker = "アニマ"
# 「今現在観測できているだけデモ、１００万体弱はいるゾ」
line = "「今現在観測できているだけデモ、１００万体弱はいるゾ」"

[[dialogue]]
speaker = "ルリエル"
# 「ええぇ～～っ！？　数が多すぎるのです！？」
line = "「ええぇ～～っ！？　数が多すぎるのです！？」"

[[dialogue]]
speaker = "アニマ"
# 「……最初は『星喰らい』たちだけだったんだがネ。ベガ世界を観測していたら、ある瞬間から爆発的に増殖を始めタ」
line = "「……最初は『星喰らい』たちだけだったんだがネ。ベガ世界を観測していたら、ある瞬間から爆発的に増殖を始めタ」"

[[dialogue]]
speaker = "アニマ"
# 「おそらくアニマたちの『遠見』に、奴らも気づいたのダロウ。星喰らいの活動を妨げようとする輩を、徹底して排除するつもりダ」
line = "「おそらくアニマたちの『遠見』に、奴らも気づいたのダロウ。星喰らいの活動を妨げようとする輩を、徹底して排除するつもりダ」"

[[dialogue]]
speaker = "アニマ"
# 「ご覧の通リ。ベガの地球は今、星喰らいの影響で疲弊していル──これを解決しない限リ、会長は厄災の右腕を振るうことができなイ」
line = "「ご覧の通リ。ベガの地球は今、星喰らいの影響で疲弊していル──これを解決しない限リ、会長は厄災の右腕を振るうことができなイ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そして星喰らいのポイントは全部で５ヵ所。各地を攻略するにあたって、戦力を分散しなくてはなりません！」
line = "「そして星喰らいのポイントは全部で５ヵ所。各地を攻略するにあたって、戦力を分散しなくてはなりません！」"

[[dialogue]]
speaker = "アナ"
# 「おまけに『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』は分身体が各地に点在し、本体の居場所が掴めず……」
line = "「おまけに『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』は分身体が各地に点在し、本体の居場所が掴めず……」"

[[dialogue]]
speaker = "マトイ"
# 「ホロウのシャドウも大軍勢になって、守りを固めてる……」
line = "「ホロウのシャドウも大軍勢になって、守りを固めてる……」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら～……」
line = "「あらあら～……」"

[[dialogue]]
speaker = "アポロ"
# 「魔王。これ……どうするんだ？」
line = "「魔王。これ……どうするんだ？」"

[[dialogue]]
speaker = "クロト"
# 「もちろん突破する──まずは５ヵ所の星喰らいを攻略するところからだ」
line = "「もちろん突破する──まずは５ヵ所の星喰らいを攻略するところからだ」"

[[dialogue]]
speaker = "フィオナ"
# 「それはわかりますが、肝心の方法が……」
line = "「それはわかりますが、肝心の方法が……」"

[[dialogue]]
speaker = "クロト"
# 「その点についても問題ない──トリシャさん」
line = "「その点についても問題ない──トリシャさん」"

[[dialogue]]
speaker = "トリシャ"
# 「──はい。迷える子羊たちに、可能性を提示いたします……」
line = "「──はい。迷える子羊たちに、可能性を提示いたします……」"

[[dialogue]]
speaker = "トリシャ"
# 「会長さんの持つ、魔王ラクシスの権能を使えば……何とかなるかもしれません……フ、フフフ……！」
line = "「会長さんの持つ、魔王ラクシスの権能を使えば……何とかなるかもしれません……フ、フフフ……！」"
