[[dialogue]]
speaker = "unk"
# 第６話,魔王の力,B
line = "第６話,魔王の力,B"

[[dialogue]]
speaker = "unk"
# アポロとルリエルは一時流星学園を離れ、負傷した星騎士たちの撤退支援を行っていたが――
line = "アポロとルリエルは一時流星学園を離れ、負傷した星騎士たちの撤退支援を行っていたが――"

[[dialogue]]
speaker = "アポロ"
# 「ヒーローはっ……決して諦めない！　――はああぁっ！！」
line = "「ヒーローはっ……決して諦めない！　――はああぁっ！！」"

[[dialogue]]
speaker = "unk"
# 傷ついた星騎士を庇い、<ruby=しんがり>殿</ruby>を務めながら流星学園へと撤退していくアポロたち。
line = "傷ついた星騎士を庇い、<ruby>殿<rt>しんがり</rt></ruby>を務めながら流星学園へと撤退していくアポロたち。"

[[dialogue]]
speaker = "アポロ"
# 「はぁ……はぁ……！」
line = "「はぁ……はぁ……！」"

[[dialogue]]
speaker = "unk"
# アポロは魔王の力を使って敵を次々と撃破するが、連戦の消耗は激しく、成長の遅れたアポロの体には大きな負荷をかけていた。
line = "アポロは魔王の力を使って敵を次々と撃破するが、連戦の消耗は激しく、成長の遅れたアポロの体には大きな負荷をかけていた。"

[[dialogue]]
speaker = "アポロ"
# （選管のみんなは無事か！？　ナターシャはともかく、梨緒は危なっかしいしベアトはドジだし、心配になるぞ……）
line = "（選管のみんなは無事か！？　ナターシャはともかく、梨緒は危なっかしいしベアトはドジだし、心配になるぞ……）"

[[dialogue]]
speaker = "アポロ"
# （つっても、こっちもこっちで向こうに合流する余裕はないけどな……）
line = "（つっても、こっちもこっちで向こうに合流する余裕はないけどな……）"

[[dialogue]]
speaker = "ルリエル"
# 「アポロさん、大丈夫ですか！？」
line = "「アポロさん、大丈夫ですか！？」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、これくらいヒーローなら平気だ、ルリ！　オマエこそ大丈夫か？」
line = "「ああ、これくらいヒーローなら平気だ、ルリ！　オマエこそ大丈夫か？」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルはもうヘトヘトのくたくたなのですよ～……」
line = "「ルリエルはもうヘトヘトのくたくたなのですよ～……」"

[[dialogue]]
speaker = "ルリエル"
# 「――でも、負けません！　わたしたちの学園も、星騎士も、絶対に守ってみせます！」
line = "「――でも、負けません！　わたしたちの学園も、星騎士も、絶対に守ってみせます！」"

[[dialogue]]
speaker = "アポロ"
# 「ああ、その意気だ！　また来るぞ！」
line = "「ああ、その意気だ！　また来るぞ！」"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「シャーーッ！！」
line = "「シャーーッ！！」"

[[dialogue]]
speaker = "ルリエル"
# 「こっちめがけて高速で突っ込んでくるのですーーっ！？」
line = "「こっちめがけて高速で突っ込んでくるのですーーっ！？」"

[[dialogue]]
speaker = "アポロ"
# 「一刀爆散！　メテオライト――キャリバー！！」
line = "「一刀爆散！　メテオライト――キャリバー！！」"

[[dialogue]]
speaker = "unk"
# 大剣がモンスターを真一文字に切り裂き、さながらヒーローに敗れた怪獣のごとく、敵が閃光とともに爆散した。
line = "大剣がモンスターを真一文字に切り裂き、さながらヒーローに敗れた怪獣のごとく、敵が閃光とともに爆散した。"

[[dialogue]]
speaker = "ルリエル"
# 「た、助かりました！　ありがとうございます、アポロさん！」
line = "「た、助かりました！　ありがとうございます、アポロさん！」"

[[dialogue]]
speaker = "アポロ"
# 「背中は任せておけ！　だけど、ガーディアンもモンスターも、あとどんだけいるんだ……？」
line = "「背中は任せておけ！　だけど、ガーディアンもモンスターも、あとどんだけいるんだ……？」"

[[dialogue]]
speaker = "アポロ"
# （敵がたくさんいて……フィヴォス流星群の時を思い出すな）
line = "（敵がたくさんいて……フィヴォス流星群の時を思い出すな）"

[[dialogue]]
speaker = "アポロ"
# （まぁあたしは、流星群を起こす側だったんだけど……あの時、操られていたとは言え、あたしは本気で流星市国を、世界を滅ぼそうとしてた）
line = "（まぁあたしは、流星群を起こす側だったんだけど……あの時、操られていたとは言え、あたしは本気で流星市国を、世界を滅ぼそうとしてた）"

[[dialogue]]
speaker = "アポロ"
# （だけど今度は、あたしが世界を守るんだ……！　そうじゃなきゃみんなに……エリシアに顔向けできない！）
line = "（だけど今度は、あたしが世界を守るんだ……！　そうじゃなきゃみんなに……エリシアに顔向けできない！）"

[[dialogue]]
speaker = "アポロ"
# 「来い！　平和を脅かす悪党共！　この流星ライダーアポロが、いくらでも相手になってやる！！」
line = "「来い！　平和を脅かす悪党共！　この流星ライダーアポロが、いくらでも相手になってやる！！」"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルゥ！」
line = "「グルルゥ！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルル……！」
line = "「ブルル……！」"

[[dialogue]]
speaker = "ルリエル"
# 「！？　敵性反応、増援多数なのです──！？」
line = "「！？　敵性反応、増援多数なのです──！？」"

[[dialogue]]
speaker = "ルリエル"
# 「周辺のモンスター及びガーディアンの数……１００……３００……５００体以上！？　１体ずつでも大変なのに、そんな大群とても相手しきれませんよぉ！？」
line = "「周辺のモンスター及びガーディアンの数……１００……３００……５００体以上！？　１体ずつでも大変なのに、そんな大群とても相手しきれませんよぉ！？」"

[[dialogue]]
speaker = "アポロ"
# 「５００……！」
line = "「５００……！」"

[[dialogue]]
speaker = "unk"
# アポロの指は疲労に震え、すでに剣を握るのもやっとの状態だった。
line = "アポロの指は疲労に震え、すでに剣を握るのもやっとの状態だった。"

[[dialogue]]
speaker = "unk"
# それでも――
line = "それでも――"

[[dialogue]]
speaker = "アポロ"
# 「……上等だ！　逆境で強くなるヒーローの底力を見せてやる！」
line = "「……上等だ！　逆境で強くなるヒーローの底力を見せてやる！」"

[[dialogue]]
speaker = "アポロ"
# 「決して消えぬ星の輝きを恐れぬならば――全員まとめて、かかって来やがれ！！」
line = "「決して消えぬ星の輝きを恐れぬならば――全員まとめて、かかって来やがれ！！」"

[[dialogue]]
speaker = "unk"
# アポロは剣を力の限り握って、ルリエルと背中合わせに、一斉に襲い来る大群に立ち向かう──！
line = "アポロは剣を力の限り握って、ルリエルと背中合わせに、一斉に襲い来る大群に立ち向かう──！"

[[dialogue]]
speaker = "アポロ"
# 「うおおおぉぉ――ッ！！！」
line = "「うおおおぉぉ――ッ！！！」"

[[dialogue]]
speaker = "unk"
# アポロが限界を超えて星力を絞り出し、敵を一撃の元に次々と斬り裂いていく。
line = "アポロが限界を超えて星力を絞り出し、敵を一撃の元に次々と斬り裂いていく。"

[[dialogue]]
speaker = "unk"
# もはや技ではなく気合いそのもので全力斬りを繰り出し続け、襲い来る大群を捌き続ける。
line = "もはや技ではなく気合いそのもので全力斬りを繰り出し続け、襲い来る大群を捌き続ける。"

[[dialogue]]
speaker = "ルリエル"
# 「アポロさん……！　だったら、わたしも火事場の底力なのです！　――グリスターウェーブ！！」
line = "「アポロさん……！　だったら、わたしも火事場の底力なのです！　――グリスターウェーブ！！」"

[[dialogue]]
speaker = "unk"
# ルリエルの奥の手である、角笛を砲身としてビームを撃ち出す星術。
line = "ルリエルの奥の手である、角笛を砲身としてビームを撃ち出す星術。"

[[dialogue]]
speaker = "unk"
# その威力はアポロの斬撃とは比べるべくもないが、密集して押し寄せる敵の足を止めさせ、よろめいた個体を吹き飛ばすことには成功した。
line = "その威力はアポロの斬撃とは比べるべくもないが、密集して押し寄せる敵の足を止めさせ、よろめいた個体を吹き飛ばすことには成功した。"

[[dialogue]]
speaker = "アポロ"
# 「ルリもやるじゃんか！　その調子でじゃんじゃん撃ちまくれ！！」
line = "「ルリもやるじゃんか！　その調子でじゃんじゃん撃ちまくれ！！」"

[[dialogue]]
speaker = "ルリエル"
# 「はい！　やってやりますよぉ――ッ！！」
line = "「はい！　やってやりますよぉ――ッ！！」"

[[dialogue]]
speaker = "unk"
# ……それから、どれだけ時間が経っただろうか。
line = "……それから、どれだけ時間が経っただろうか。"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルオォ――ッ！」
line = "「グルルオォ――ッ！」"

[[dialogue]]
speaker = "アポロ"
# 「ぐあぁっ！？」
line = "「ぐあぁっ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「アポロさん！　――きゃあぁっ！？」
line = "「アポロさん！　――きゃあぁっ！？」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィンッ！」
line = "「ヒヒィンッ！」"

[[dialogue]]
speaker = "unk"
# ２人の限界を超えた死闘によって、倒した敵の数は３０体を超えていた。
line = "２人の限界を超えた死闘によって、倒した敵の数は３０体を超えていた。"

[[dialogue]]
speaker = "unk"
# しかし、多勢に無勢。絶え間なく襲い来る圧倒的な物量によって、アポロとルリエルは何度もダメージを受け、すでに意識を保つことすらギリギリの所まで追い詰められていた。
line = "しかし、多勢に無勢。絶え間なく襲い来る圧倒的な物量によって、アポロとルリエルは何度もダメージを受け、すでに意識を保つことすらギリギリの所まで追い詰められていた。"

[[dialogue]]
speaker = "アポロ"
# 「はぁ、はぁ、はぁ……」
line = "「はぁ、はぁ、はぁ……」"

[[dialogue]]
speaker = "アポロ"
# 「ルリ、敵はあと何体残ってる……？」
line = "「ルリ、敵はあと何体残ってる……？」"

[[dialogue]]
speaker = "ルリエル"
# 「はぁ……はぁ……。４００体以上、なのです……」
line = "「はぁ……はぁ……。４００体以上、なのです……」"

[[dialogue]]
speaker = "アポロ"
# 「…………そうか。なら、仕方ない、な」
line = "「…………そうか。なら、仕方ない、な」"

[[dialogue]]
speaker = "アポロ"
# 「ルリ。オマエ――ここから全力で逃げろ」
line = "「ルリ。オマエ――ここから全力で逃げろ」"

[[dialogue]]
speaker = "unk"
# 敵の攻撃を剣で弾きながら、アポロは告げる。
line = "敵の攻撃を剣で弾きながら、アポロは告げる。"

[[dialogue]]
speaker = "ルリエル"
# 「は？　何を……何を言ってるのですか、アポロさん！？」
line = "「は？　何を……何を言ってるのですか、アポロさん！？」"

[[dialogue]]
speaker = "unk"
# ルリエルは地面に片膝を着いて、息絶え絶えに角笛を吹きながら、聞き返す。
line = "ルリエルは地面に片膝を着いて、息絶え絶えに角笛を吹きながら、聞き返す。"

[[dialogue]]
speaker = "アポロ"
# 「他のみんながどこまで避難できたかは分からない。だけど、やれるだけはやった」
line = "「他のみんながどこまで避難できたかは分からない。だけど、やれるだけはやった」"

[[dialogue]]
speaker = "アポロ"
# 「だから、ルリ。オマエももう撤退しろ。あたしがオマエの逃げる時間を、敵の首に食らいついてでも稼いでやる」
line = "「だから、ルリ。オマエももう撤退しろ。あたしがオマエの逃げる時間を、敵の首に食らいついてでも稼いでやる」"

[[dialogue]]
speaker = "アポロ"
# 「それが……あたしにできる最後の罪滅ぼしだ」
line = "「それが……あたしにできる最後の罪滅ぼしだ」"

[[dialogue]]
speaker = "ルリエル"
# 「嫌なのです！」
line = "「嫌なのです！」"

[[dialogue]]
speaker = "アポロ"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "ルリエル"
# 「わたしは、アポロさんを置いて逃げたりしません！　フィオナ会長は、アポロさんを助けることを諦めませんでした！」
line = "「わたしは、アポロさんを置いて逃げたりしません！　フィオナ会長は、アポロさんを助けることを諦めませんでした！」"

[[dialogue]]
speaker = "ルリエル"
# 「だからわたしも、最後まで絶対に諦めたりしないのです！」
line = "「だからわたしも、最後まで絶対に諦めたりしないのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「それに……ルリエルはこう見えても、星力総量だけは流星星徒会で１番なのです！」
line = "「それに……ルリエルはこう見えても、星力総量だけは流星星徒会で１番なのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「やるしかないのなら……ルリエルはあと４００発、敵を倒しきるまで角笛ビームを撃ち込んでやりますよぉ――ッ！！」
line = "「やるしかないのなら……ルリエルはあと４００発、敵を倒しきるまで角笛ビームを撃ち込んでやりますよぉ――ッ！！」"

[[dialogue]]
speaker = "unk"
# ふらつく足で気丈に立ち上がり、声を上げるルリエル。
line = "ふらつく足で気丈に立ち上がり、声を上げるルリエル。"

[[dialogue]]
speaker = "アポロ"
# 「ルリ、オマエ……！」
line = "「ルリ、オマエ……！」"

[[dialogue]]
speaker = "アポロ"
# 「ああ……忘れてたよ。オマエもあの時、フィオナと一緒にあたしを救いに来てくれたヒーローだったんだよな」
line = "「ああ……忘れてたよ。オマエもあの時、フィオナと一緒にあたしを救いに来てくれたヒーローだったんだよな」"

[[dialogue]]
speaker = "unk"
# と、アポロがルリエルの体を突き飛ばす。
line = "と、アポロがルリエルの体を突き飛ばす。"

[[dialogue]]
speaker = "ルリエル"
# 「アポロさんッ！？」
line = "「アポロさんッ！？」"

[[dialogue]]
speaker = "アポロ"
# 「だから、後は託すぜ、あたしのヒーロー」
line = "「だから、後は託すぜ、あたしのヒーロー」"

[[dialogue]]
speaker = "unk"
# アポロはわかってしまった。満身創痍で立ち上がったルリエルの背後に、敵の攻撃が迫っていることが。
line = "アポロはわかってしまった。満身創痍で立ち上がったルリエルの背後に、敵の攻撃が迫っていることが。"

[[dialogue]]
speaker = "unk"
# そして、その攻撃は、今の自分に残された力では防ぎ切れないことも。
line = "そして、その攻撃は、今の自分に残された力では防ぎ切れないことも。"

[[dialogue]]
speaker = "アポロ"
# （悪い、エリシア。後は頼んだ）
line = "（悪い、エリシア。後は頼んだ）"

[[dialogue]]
speaker = "unk"
# もう１人のヒーローである妹へ、想いを馳せる。
line = "もう１人のヒーローである妹へ、想いを馳せる。"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「シャアァ―――ッ！！！」
line = "「シャアァ―――ッ！！！」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "？？？"
# 「待たせてごめんなさい、姉さん！！」
line = "「待たせてごめんなさい、姉さん！！」"

[[dialogue]]
speaker = "unk"
# 直径数十メートルの灼熱の光球──小さな太陽が、周囲十数体の極星従騎たちを呑み込み、欠片も残らないほどに焼き尽くした。
line = "直径数十メートルの灼熱の光球──小さな太陽が、周囲十数体の極星従騎たちを呑み込み、欠片も残らないほどに焼き尽くした。"

[[dialogue]]
speaker = "アポロ"
# 「これは、まさか……！？」
line = "「これは、まさか……！？」"

[[dialogue]]
speaker = "unk"
# そして――
line = "そして――"

[[dialogue]]
speaker = "フィオナ"
# 「流星学園星徒会長、星見フィオナ。ただいま戻りました」
line = "「流星学園星徒会長、星見フィオナ。ただいま戻りました」"

[[dialogue]]
speaker = "ルリエル"
# 「ふぃ、フィオナ会長～～～～っ！！」
line = "「ふぃ、フィオナ会長～～～～っ！！」"

[[dialogue]]
speaker = "アポロ"
# 「エリシア！　魔界での戦いは終わったのか……！？」
line = "「エリシア！　魔界での戦いは終わったのか……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「ええ。正直、何度死ぬと思ったかわかりませんが、それでもなんとか邪竜を討ち取ることができました」
line = "「ええ。正直、何度死ぬと思ったかわかりませんが、それでもなんとか邪竜を討ち取ることができました」"

[[dialogue]]
speaker = "unk"
# 森羅暦以前の歴史──リクリエによってリセットされる前の世界を滅ぼした煌竜ヴィライア。
line = "森羅暦以前の歴史──リクリエによってリセットされる前の世界を滅ぼした煌竜ヴィライア。"

[[dialogue]]
speaker = "unk"
# それと同等の存在がついに森羅暦にも現れ、フィオナは魔女と共にそれと戦っていたのだ。
line = "それと同等の存在がついに森羅暦にも現れ、フィオナは魔女と共にそれと戦っていたのだ。"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルァ……！」
line = "「グルルァ……！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィン！」
line = "「ヒヒィン！」"

[[dialogue]]
speaker = "unk"
# 次々と押し寄せてくる機械型モンスターと極星従騎が、新しく現れたフィオナを敵と認識し、一斉に敵意を向ける。
line = "次々と押し寄せてくる機械型モンスターと極星従騎が、新しく現れたフィオナを敵と認識し、一斉に敵意を向ける。"

[[dialogue]]
speaker = "unk"
# そしてモンスターの炎が、ガーディアンの剣が、フィオナに殺到する──！
line = "そしてモンスターの炎が、ガーディアンの剣が、フィオナに殺到する──！"

[[dialogue]]
speaker = "アポロ"
# 「マズい！　エリシアっ！！」
line = "「マズい！　エリシアっ！！」"

[[dialogue]]
speaker = "フィオナ"
# 「大丈夫です、姉さん」
line = "「大丈夫です、姉さん」"

[[dialogue]]
speaker = "unk"
# アポロの耳に、凛とした澄んだ声が響く。
line = "アポロの耳に、凛とした澄んだ声が響く。"

[[dialogue]]
speaker = "unk"
# それは落ち着いていて、しかし力強く――
line = "それは落ち着いていて、しかし力強く――"

[[dialogue]]
speaker = "フィオナ"
# 「『アルケインソーラーブレイズ』！」
line = "「『アルケインソーラーブレイズ』！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「これが――邪竜を討ち取った魔王の新たな力です」
line = "「これが――邪竜を討ち取った魔王の新たな力です」"

[[dialogue]]
speaker = "unk"
# フィオナが変身するのと同時に、殺到していた攻撃は何事もなかったかのように収まり、それどころか攻撃を仕掛けた敵さえも一瞬で<b>消え去っていた</b>。
line = "フィオナが変身するのと同時に、殺到していた攻撃は何事もなかったかのように収まり、それどころか攻撃を仕掛けた敵さえも一瞬で<b>消え去っていた</b>。"

[[dialogue]]
speaker = "アポロ"
# 「エリシア……オマエ、その姿……！」
line = "「エリシア……オマエ、その姿……！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「今までの私の力では、<b>万全の状態</b>で現れたヴィライアは倒せませんでした。ですから魔界に隠されていたアルケインコードを手に入れたんです」
line = "「今までの私の力では、<b>万全の状態</b>で現れたヴィライアは倒せませんでした。ですから魔界に隠されていたアルケインコードを手に入れたんです」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「新たなコードの名は──アルケインソーラーブレイズ」
line = "「新たなコードの名は──アルケインソーラーブレイズ」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「その力で私の中の魔王因子を活性化させることで、この姿――『魔王フォーム』に至ったんです」
line = "「その力で私の中の魔王因子を活性化させることで、この姿――『魔王フォーム』に至ったんです」"

[[dialogue]]
speaker = "アポロ"
# 「め、滅茶苦茶かっこいいぃ～～～っ！！！」
line = "「め、滅茶苦茶かっこいいぃ～～～っ！！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「そ、そうですか？　ちょっと……というか、かなり大胆なような……」
line = "「そ、そうですか？　ちょっと……というか、かなり大胆なような……」"

[[dialogue]]
speaker = "アポロ"
# 「いや、いいじゃんか！　魔王らしく程良くブラックテイストで、ワイルドだぞ！？　角もすげぇ強そうだし！！」
line = "「いや、いいじゃんか！　魔王らしく程良くブラックテイストで、ワイルドだぞ！？　角もすげぇ強そうだし！！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「この角は……ラクシスに流れていた魔族の血が目覚めたんでしょうか？　正直まだ慣れてなくて、少しくすぐったいです……」
line = "「この角は……ラクシスに流れていた魔族の血が目覚めたんでしょうか？　正直まだ慣れてなくて、少しくすぐったいです……」"

[[dialogue]]
speaker = "unk"
# <ruby=あか>緋</ruby>い目が覚醒した魔王の証。
line = "<ruby>緋<rt>あか</rt></ruby>い目が覚醒した魔王の証。"

[[dialogue]]
speaker = "unk"
# モンスターとガーディアンの猛攻を浴びようとも傷ひとつなく、力が燃えるように滾る。
line = "モンスターとガーディアンの猛攻を浴びようとも傷ひとつなく、力が燃えるように滾る。"

[[dialogue]]
speaker = "マキナ・スクアルス"
# 「シャアァーーッ！！」
line = "「シャアァーーッ！！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィンッ！！」
line = "「ヒヒィンッ！！」"

[[dialogue]]
speaker = "unk"
# だが、その炎を吹き消さんと、先程よりも更に多くの極星従騎たちが攻撃を仕掛けて来る。
line = "だが、その炎を吹き消さんと、先程よりも更に多くの極星従騎たちが攻撃を仕掛けて来る。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「……久しぶりの流星市国ですが、帰郷を喜んでいる場合ではありませんね。早急に敵を倒し、流星学園に戻りましょう」
line = "「……久しぶりの流星市国ですが、帰郷を喜んでいる場合ではありませんね。早急に敵を倒し、流星学園に戻りましょう」"

[[dialogue]]
speaker = "unk"
# フィオナは敵に向けて、手の平をかざして。
line = "フィオナは敵に向けて、手の平をかざして。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「プロミネンスシェード！」
line = "「プロミネンスシェード！」"

[[dialogue]]
speaker = "unk"
# その技を口にすると同時に、フィオナの体から闇色の炎が湧き上がり、太陽のごとく吹き荒れる。
line = "その技を口にすると同時に、フィオナの体から闇色の炎が湧き上がり、太陽のごとく吹き荒れる。"

[[dialogue]]
speaker = "アポロ"
# 「おおぉっ！？」
line = "「おおぉっ！？」"

[[dialogue]]
speaker = "unk"
# 炎は近くにいたアポロやルリエルも巻き込むが……
line = "炎は近くにいたアポロやルリエルも巻き込むが……"

[[dialogue]]
speaker = "ルリエル"
# 「あれ！？　温かいですけど、熱くないのです！？」
line = "「あれ！？　温かいですけど、熱くないのです！？」"

[[dialogue]]
speaker = "unk"
# その一方で、その炎に包まれた敵は――
line = "その一方で、その炎に包まれた敵は――"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒヒィィィィンッ！！」
line = "「ヒヒィィィィンッ！！」"

[[dialogue]]
speaker = "unk"
# 瞬く間に灰のようになって、次々と消滅していく。
line = "瞬く間に灰のようになって、次々と消滅していく。"

[[dialogue]]
speaker = "unk"
# ならばと敵が遠距離から攻撃を一斉に放って来るが──
line = "ならばと敵が遠距離から攻撃を一斉に放って来るが──"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「無駄です」
line = "「無駄です」"

[[dialogue]]
speaker = "unk"
# その攻撃さえも、フィオナが火の粉を払うように手を振ると、<b>蒸発するように</b>消えてしまう。
line = "その攻撃さえも、フィオナが火の粉を払うように手を振ると、<b>蒸発するように</b>消えてしまう。"

[[dialogue]]
speaker = "アポロ"
# 「全部防いでる……！？　いや、もしかして燃やしてるのか！？」
line = "「全部防いでる……！？　いや、もしかして燃やしてるのか！？」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「はい。善を守り、悪しきを浄化する太陽の炎。こちらに敵意をぶつけてくるものを捕捉し、焼き尽くします」
line = "「はい。善を守り、悪しきを浄化する太陽の炎。こちらに敵意をぶつけてくるものを捕捉し、焼き尽くします」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「そしてその対象は、物理的なものだけではなく、能力や概念にまで及ぶ。私自身を太陽そのものと規定し、『近づこうとする万象一切を灰燼に帰す』」
line = "「そしてその対象は、物理的なものだけではなく、能力や概念にまで及ぶ。私自身を太陽そのものと規定し、『近づこうとする万象一切を灰燼に帰す』」"

[[dialogue]]
speaker = "unk"
# フィオナの手の中に小さな炎が浮かび上がる。
line = "フィオナの手の中に小さな炎が浮かび上がる。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「それが、魔王フォームで覚醒した私の新たな能力――『<ruby=じしょうめっきゃく>事象滅却</ruby>』です」
line = "「それが、魔王フォームで覚醒した私の新たな能力――『<ruby>事象滅却<rt>じしょうめっきゃく</rt></ruby>』です」"

[[dialogue]]
speaker = "アポロ"
# 「か、かっこいい……！！」
line = "「か、かっこいい……！！」"

[[dialogue]]
speaker = "unk"
# フィオナの圧倒的な力を前に、極星従騎の軍勢が二の足を踏む。ここまでずっと、ガーディアンたちは数に物を言わせ、消耗戦を強いる戦術を用いて来た。
line = "フィオナの圧倒的な力を前に、極星従騎の軍勢が二の足を踏む。ここまでずっと、ガーディアンたちは数に物を言わせ、消耗戦を強いる戦術を用いて来た。"

[[dialogue]]
speaker = "unk"
# しかし、アポロとルリエルを背中で守るように立つフィオナを前にして、ついにジリジリと距離を計るような動きを取り始めた。
line = "しかし、アポロとルリエルを背中で守るように立つフィオナを前にして、ついにジリジリと距離を計るような動きを取り始めた。"

[[dialogue]]
speaker = "アポロ"
# 「アルケインコードってことは、魔王の力なんだよな？　そんなのどこにあったんだ！？」
line = "「アルケインコードってことは、魔王の力なんだよな？　そんなのどこにあったんだ！？」"

[[dialogue]]
speaker = "unk"
# アルケインコードは、先代の魔王ラクシスが遺した、魔王のみが使える秘術。
line = "アルケインコードは、先代の魔王ラクシスが遺した、魔王のみが使える秘術。"

[[dialogue]]
speaker = "unk"
# マトイたちをノヴァフォームに覚醒させた『アルケインノヴァエクストリーム』もその１つだ。
line = "マトイたちをノヴァフォームに覚醒させた『アルケインノヴァエクストリーム』もその１つだ。"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「キュリオスの<ruby=モノクラウン家>メイプルさん</ruby>が伝承していたように、アルケインコードは世界に散らばっているようです」
line = "「キュリオスの<ruby>メイプルさん<rt>モノクラウン家</rt></ruby>が伝承していたように、アルケインコードは世界に散らばっているようです」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「ネビュラが見つけてくれたのですが、強力な魔獣が持つ秘宝にアルケインコードが刻まれていて……ヴィライアほどではないですが、その魔獣を倒すのも苦労しました」
line = "「ネビュラが見つけてくれたのですが、強力な魔獣が持つ秘宝にアルケインコードが刻まれていて……ヴィライアほどではないですが、その魔獣を倒すのも苦労しました」"

[[dialogue]]
speaker = "unk"
# 襲い掛かるタイミングを計っている軍勢に目を配りながら、フィオナは先ほど生み出した手のひらの上の小さな炎を、徐々に上空へと持ち上げていく。
line = "襲い掛かるタイミングを計っている軍勢に目を配りながら、フィオナは先ほど生み出した手のひらの上の小さな炎を、徐々に上空へと持ち上げていく。"

[[dialogue]]
speaker = "アポロ"
# 「秘宝は強～いボスが守ってるのがお決まりだもんな！　魔王の力ってことは、あたしも使えるのか！？」
line = "「秘宝は強～いボスが守ってるのがお決まりだもんな！　魔王の力ってことは、あたしも使えるのか！？」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「このアルケインコードの能力は、魔王因子の活性化」
line = "「このアルケインコードの能力は、魔王因子の活性化」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「肉体に大きな負荷をかける代わりに、一時的に星力・魔力・霊力の燃焼効率を上昇させ、より強大な力を引き出します」
line = "「肉体に大きな負荷をかける代わりに、一時的に星力・魔力・霊力の燃焼効率を上昇させ、より強大な力を引き出します」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「命に関わるほどではないですけど、やはり負担が大きいので、今の姉さんの体だと難しいかもしれません……」
line = "「命に関わるほどではないですけど、やはり負担が大きいので、今の姉さんの体だと難しいかもしれません……」"

[[dialogue]]
speaker = "アポロ"
# 「あたしじゃ使えないのか～……」
line = "「あたしじゃ使えないのか～……」"

[[dialogue]]
speaker = "アポロ"
# 「だけど反動があるパワーアップとか、すげーかっこいいな！　その分強いんだろ！」
line = "「だけど反動があるパワーアップとか、すげーかっこいいな！　その分強いんだろ！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「はい、もちろん！　邪竜を倒した力、お見せします！」
line = "「はい、もちろん！　邪竜を倒した力、お見せします！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「このフォームは消耗が激しいので、短期決戦と行きましょう……大規模攻撃のための準備、整いました！」
line = "「このフォームは消耗が激しいので、短期決戦と行きましょう……大規模攻撃のための準備、整いました！」"

[[dialogue]]
speaker = "unk"
# 先程、フィオナが手の平に浮かべていた小さな炎。それは頭上へと昇りながら、段々と巨大な光球へと育っていた。
line = "先程、フィオナが手の平に浮かべていた小さな炎。それは頭上へと昇りながら、段々と巨大な光球へと育っていた。"

[[dialogue]]
speaker = "unk"
# それはさながら、流星市国に生まれた小さな太陽のように――
line = "それはさながら、流星市国に生まれた小さな太陽のように――"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「悪しきを浄化せし、太陽の聖炎！」
line = "「悪しきを浄化せし、太陽の聖炎！」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「――ソルフレアバーストッ！！」
line = "「――ソルフレアバーストッ！！」"

[[dialogue]]
speaker = "unk"
# フィオナの詠唱すると同時に、光球が一気に膨れ上がり、周辺一帯を巻き込む程の大爆発を引き起こす。
line = "フィオナの詠唱すると同時に、光球が一気に膨れ上がり、周辺一帯を巻き込む程の大爆発を引き起こす。"

[[dialogue]]
speaker = "unk"
# だがそれは、街に傷一つ付けることなく、敵だけをことごとく焼き尽くす劫火の奔流。
line = "だがそれは、街に傷一つ付けることなく、敵だけをことごとく焼き尽くす劫火の奔流。"

[[dialogue]]
speaker = "スレイプニル"
# 「ッ――――！！」
line = "「ッ――――！！」"

[[dialogue]]
speaker = "unk"
# 爆発が収まった後、周囲からは敵の気配が完全に消え去っていた。
line = "爆発が収まった後、周囲からは敵の気配が完全に消え去っていた。"

[[dialogue]]
speaker = "ルリエル"
# 「す、すごいのです……！　周辺の敵反応ゼロ！　４００体以上残っていた敵を、まとめて全部倒しちゃったのです！」
line = "「す、すごいのです……！　周辺の敵反応ゼロ！　４００体以上残っていた敵を、まとめて全部倒しちゃったのです！」"

[[dialogue]]
speaker = "アポロ"
# 「マジか！？　これがフィオナの新しい魔王の力……！」
line = "「マジか！？　これがフィオナの新しい魔王の力……！」"

[[dialogue]]
speaker = "ルリエル"
# 「いえ～い♪　フィオナ会長がいれば、流星星徒会は無敵なのです！」
line = "「いえ～い♪　フィオナ会長がいれば、流星星徒会は無敵なのです！」"

[[dialogue]]
speaker = "アポロ"
# 「とりあえず……この場は切り抜けたみたいだな。おっと……」
line = "「とりあえず……この場は切り抜けたみたいだな。おっと……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「姉さんっ」
line = "「姉さんっ」"

[[dialogue]]
speaker = "unk"
# 緊張の糸が途切れ、倒れかかったアポロをフィオナが受け止める。
line = "緊張の糸が途切れ、倒れかかったアポロをフィオナが受け止める。"

[[dialogue]]
speaker = "アポロ"
# 「へへ、悪い……星力を使い過ぎたみたいだ。しばらく動けそうにない……」
line = "「へへ、悪い……星力を使い過ぎたみたいだ。しばらく動けそうにない……」"

[[dialogue]]
speaker = "フィオナ（魔王）"
# 「大丈夫です。後は任せてください、姉さん」
line = "「大丈夫です。後は任せてください、姉さん」"

[[dialogue]]
speaker = "unk"
# そう言って、フィオナは力強い笑みを姉に見せるのだった――
line = "そう言って、フィオナは力強い笑みを姉に見せるのだった――"
