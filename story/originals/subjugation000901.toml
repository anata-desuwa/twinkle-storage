line = "「お前……誰なの？」"

[[dialogue]]
speaker = "ソフレ"
# 「建物の周りは雷雲で囲っていて、そう簡単に入ってこれないはずなのに……」
line = "「建物の周りは雷雲で囲っていて、そう簡単に入ってこれないはずなのに……」"

[[dialogue]]
speaker = "？？？"
# 「あいにく、普通はあり得ないような奇跡を起こすのが得意でね」
line = "「あいにく、普通はあり得ないような奇跡を起こすのが得意でね」"

[[dialogue]]
speaker = "フェリーチェ"
# 「アタシは、フェリーチェ・パッショーネ。『<ruby=ロールスター>選星者</ruby>』って呼ばれる内の１人――」
line = "「アタシは、フェリーチェ・パッショーネ。『<ruby>選星者<rt>ロールスター</rt></ruby>』って呼ばれる内の１人――」"

[[dialogue]]
speaker = "フェリーチェ"
# 「さすらいの『<ruby=エクソシスト>祓魔師</ruby>』さ」
line = "「さすらいの『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』さ」"

[[dialogue]]
speaker = "unk"
# ああ、久しぶりに……
line = "ああ、久しぶりに……"

[[dialogue]]
speaker = "unk"
# イヤな奴の夢を見てしまったのだわ――
line = "イヤな奴の夢を見てしまったのだわ――"
