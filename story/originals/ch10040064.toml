[[dialogue]]
speaker = "unk"
# 第４話,最高のクリスマスプレゼント,P
line = "第４話,最高のクリスマスプレゼント,P"

[[dialogue]]
speaker = "unk"
# 楽しかった流星寮のクリスマスパーティーも終わり、家に帰ってきた。
line = "楽しかった流星寮のクリスマスパーティーも終わり、家に帰ってきた。"

[[dialogue]]
speaker = "アポロ"
# 「ありがとな、家に連れてきてくれて」
line = "「ありがとな、家に連れてきてくれて」"

[[dialogue]]
speaker = "アポロ"
# 「あたしも後片付けを手伝いたかったけど、後はこっちでやる～って他のみんなに取られちゃったんだ」
line = "「あたしも後片付けを手伝いたかったけど、後はこっちでやる～って他のみんなに取られちゃったんだ」"

[[dialogue]]
speaker = "unk"
# 流星寮の寮生じゃないからなぁ
line = "流星寮の寮生じゃないからなぁ"

[[dialogue]]
speaker = "unk"
# 俺も同じだ
line = "俺も同じだ"

[[dialogue]]
speaker = "アポロ"
# 「魔王はここまで手伝ってくれただけで十分だ。アニュラスも舞亜もすごく感謝してたぞ」
line = "「魔王はここまで手伝ってくれただけで十分だ。アニュラスも舞亜もすごく感謝してたぞ」"

[[dialogue]]
speaker = "アポロ"
# 「とにかく、片付けは他の連中に任せた！　フィオナとメイド達も、楽しませてもらったぶん仕事はすると言っていたからな」
line = "「とにかく、片付けは他の連中に任せた！　フィオナとメイド達も、楽しませてもらったぶん仕事はすると言っていたからな」"

[[dialogue]]
speaker = "アポロ"
# 「…………だから、ちょっと寂しい」
line = "「…………だから、ちょっと寂しい」"

[[dialogue]]
speaker = "アポロ"
# 「今、家に帰ってもみんないないからな。だから……その……もうちょっとだけ、一緒にいたい」
line = "「今、家に帰ってもみんないないからな。だから……その……もうちょっとだけ、一緒にいたい」"

[[dialogue]]
speaker = "アポロ"
# 「なんだ、その顔は！　あたしらしくないと言いたいんだろう？」
line = "「なんだ、その顔は！　あたしらしくないと言いたいんだろう？」"

[[dialogue]]
speaker = "アポロ"
# 「でもヒーローは強いだけじゃダメなんだ。弱さもあって、それを乗り越えるところがかっこいいんだ」
line = "「でもヒーローは強いだけじゃダメなんだ。弱さもあって、それを乗り越えるところがかっこいいんだ」"

[[dialogue]]
speaker = "アポロ"
# 「つまり……あたしも弱いところを見せて、いいか……？　いいだろ……恋人のおまえにくらい甘えても……」
line = "「つまり……あたしも弱いところを見せて、いいか……？　いいだろ……恋人のおまえにくらい甘えても……」"

[[dialogue]]
speaker = "unk"
# 大歓迎だ！
line = "大歓迎だ！"

[[dialogue]]
speaker = "アポロ"
# 「そうか！　ありがとな、魔王！」
line = "「そうか！　ありがとな、魔王！」"

[[dialogue]]
speaker = "アポロ"
# 「ほら、残り物をくすねてきたぞ。アニュラスが焼いたチキンもあるんだ！」
line = "「ほら、残り物をくすねてきたぞ。アニュラスが焼いたチキンもあるんだ！」"

[[dialogue]]
speaker = "アポロ"
# 「あそこじゃ魔王も忙しくて、あまり食べてないんだろ？　あたしもそうだからお腹がペコペコなんだ」
line = "「あそこじゃ魔王も忙しくて、あまり食べてないんだろ？　あたしもそうだからお腹がペコペコなんだ」"

[[dialogue]]
speaker = "アポロ"
# 「よーし、ここからは２人だけのパーティーだ！　いいな、魔王！」
line = "「よーし、ここからは２人だけのパーティーだ！　いいな、魔王！」"

[[dialogue]]
speaker = "アポロ"
# 「準備はいいかー？　それじゃ、行くぞー」
line = "「準備はいいかー？　それじゃ、行くぞー」"

[[dialogue]]
speaker = "アポロ＆クロト"
# 「かんぱーい！」
line = "「かんぱーい！」"

[[dialogue]]
speaker = "unk"
# ジュースを注いだグラスを合わせると、チンと小気味よい音が響く。
line = "ジュースを注いだグラスを合わせると、チンと小気味よい音が響く。"

[[dialogue]]
speaker = "アポロ"
# 「むぐむぐむぐ……んまい！　アニュラスはチキンを焼くのだけは上手だな！」
line = "「むぐむぐむぐ……んまい！　アニュラスはチキンを焼くのだけは上手だな！」"

[[dialogue]]
speaker = "アポロ"
# 「他の連中が作ったのもあるぞ。こっちのは見たことないな、試してみよう！」
line = "「他の連中が作ったのもあるぞ。こっちのは見たことないな、試してみよう！」"

[[dialogue]]
speaker = "unk"
# みんな料理上手だ
line = "みんな料理上手だ"

[[dialogue]]
speaker = "unk"
# どれもおいしい
line = "どれもおいしい"

[[dialogue]]
speaker = "アポロ"
# 「魔王だって料理上手だろ？　みんな褒めてたぞ」
line = "「魔王だって料理上手だろ？　みんな褒めてたぞ」"

[[dialogue]]
speaker = "アポロ"
# 「恋人が褒められるとうれしいな！　ちょっぴりくすぐったいけど、幸せな感じがする」
line = "「恋人が褒められるとうれしいな！　ちょっぴりくすぐったいけど、幸せな感じがする」"

[[dialogue]]
speaker = "アポロ"
# 「クリスマスフォームも褒められすぎてうんざりしたけど、別に嫌じゃないんだ。可愛いって思われたいって気持ちがないわけじゃないからな」
line = "「クリスマスフォームも褒められすぎてうんざりしたけど、別に嫌じゃないんだ。可愛いって思われたいって気持ちがないわけじゃないからな」"

[[dialogue]]
speaker = "アポロ"
# 「なぁ、魔王……。あたしのこと、どう思う？　可愛いって思ってくれるか？」
line = "「なぁ、魔王……。あたしのこと、どう思う？　可愛いって思ってくれるか？」"

[[dialogue]]
speaker = "unk"
# 可愛いしかない！
line = "可愛いしかない！"

[[dialogue]]
speaker = "unk"
# 可愛いよ！
line = "可愛いよ！"

[[dialogue]]
speaker = "アポロ"
# 「そ、そっか。えへへ、やっぱり何度言われても嬉しいものだな<emoji=heart04>」
line = "「そ、そっか。えへへ、やっぱり何度言われても嬉しいものだな<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
# 「ここにはおまえしかいないから……特別に見せてやるか」
line = "「ここにはおまえしかいないから……特別に見せてやるか」"

[[dialogue]]
speaker = "アポロ"
# 「どうだ？　魔王は特別だから、じっくり見ていいぞ……」
line = "「どうだ？　魔王は特別だから、じっくり見ていいぞ……」"

[[dialogue]]
speaker = "アポロ"
# 「うおっ、めちゃくちゃ近づいたな？」
line = "「うおっ、めちゃくちゃ近づいたな？」"

[[dialogue]]
speaker = "unk"
# もっと近くでもいい
line = "もっと近くでもいい"

[[dialogue]]
speaker = "unk"
# この距離がベストだ
line = "この距離がベストだ"

[[dialogue]]
speaker = "アポロ"
# 「こんなの……息がかかっちゃいそうだぞ。って、スハスハするな！　今、けっこう汗かいてるんだ！」
line = "「こんなの……息がかかっちゃいそうだぞ。って、スハスハするな！　今、けっこう汗かいてるんだ！」"

[[dialogue]]
speaker = "アポロ"
# 「ううう～っ、おまえが恋人じゃなきゃ、ぜったい許さないところだ……」
line = "「ううう～っ、おまえが恋人じゃなきゃ、ぜったい許さないところだ……」"

[[dialogue]]
speaker = "アポロ"
# 「くそっ、あたしも反撃だ！　おまえのことめちゃくちゃ見てやるぞ！　匂いもかいじゃうからな！」
line = "「くそっ、あたしも反撃だ！　おまえのことめちゃくちゃ見てやるぞ！　匂いもかいじゃうからな！」"

[[dialogue]]
speaker = "アポロ"
# 「すんすん……すんっ……」
line = "「すんすん……すんっ……」"

[[dialogue]]
speaker = "アポロ"
# 「ううっ、なんだこれ……恥ずかしすぎるぞ！　どうして正気でこんなこと出来るんだ！？」
line = "「ううっ、なんだこれ……恥ずかしすぎるぞ！　どうして正気でこんなこと出来るんだ！？」"

[[dialogue]]
speaker = "unk"
# アポロに恋してるから
line = "アポロに恋してるから"

[[dialogue]]
speaker = "アポロ"
# 「お、おまえなぁぁっ！！　そういうのは反則だ！」
line = "「お、おまえなぁぁっ！！　そういうのは反則だ！」"

[[dialogue]]
speaker = "アポロ"
# 「ったく、あたしみたいなののどこがいいんだ？　恋してるとか、普通じゃないぞ」
line = "「ったく、あたしみたいなののどこがいいんだ？　恋してるとか、普通じゃないぞ」"

[[dialogue]]
speaker = "アポロ"
# 「でも、そんなおまえだから、あたしも……うん……好きになっちゃったんだろうな……<emoji=heart04>」
line = "「でも、そんなおまえだから、あたしも……うん……好きになっちゃったんだろうな……<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
# 「もうっ、なにを言ってもこっちが恥ずかしい感じになりそうだから、この話は終わりだ！」
line = "「もうっ、なにを言ってもこっちが恥ずかしい感じになりそうだから、この話は終わりだ！」"

[[dialogue]]
speaker = "アポロ"
# 「パーティーのときはお互い忙しかったから、後回しになっちゃったけど……」
line = "「パーティーのときはお互い忙しかったから、後回しになっちゃったけど……」"

[[dialogue]]
speaker = "アポロ"
# 「クリスマスプレゼントだ、もらってくれるか？」
line = "「クリスマスプレゼントだ、もらってくれるか？」"

[[dialogue]]
speaker = "アポロ"
# 「あたしはおまえの恋人だからな。ちゃんと彼女らしいことも出来るって見せないと」
line = "「あたしはおまえの恋人だからな。ちゃんと彼女らしいことも出来るって見せないと」"

[[dialogue]]
speaker = "unk"
# お返しに俺も
line = "お返しに俺も"

[[dialogue]]
speaker = "unk"
# ありがとう
line = "ありがとう"

[[dialogue]]
speaker = "アポロ"
# 「おまえも用意してたのか？　いや、クリスマスプレゼントくらい普通か」
line = "「おまえも用意してたのか？　いや、クリスマスプレゼントくらい普通か」"

[[dialogue]]
speaker = "アポロ"
# 「でも期待してなかったからうれしいぞ。サプライズってやつだな！」
line = "「でも期待してなかったからうれしいぞ。サプライズってやつだな！」"

[[dialogue]]
speaker = "アポロ"
# 「おまえがくれたクリスマスプレゼントかぁ……えへへ……なんだよこれ、めちゃくちゃうれしいぞ」
line = "「おまえがくれたクリスマスプレゼントかぁ……えへへ……なんだよこれ、めちゃくちゃうれしいぞ」"

[[dialogue]]
speaker = "アポロ"
# 「なにをくれたのか気になるけど、開けるのは後にしよう」
line = "「なにをくれたのか気になるけど、開けるのは後にしよう」"

[[dialogue]]
speaker = "アポロ"
# 「今見たら、あたし絶対でれでれしちゃいそうだもんな。いくらおまえ相手でも、恥ずかしすぎる」
line = "「今見たら、あたし絶対でれでれしちゃいそうだもんな。いくらおまえ相手でも、恥ずかしすぎる」"

[[dialogue]]
speaker = "unk"
# でれでれアポロが見たい！
line = "でれでれアポロが見たい！"

[[dialogue]]
speaker = "unk"
# 開けて！
line = "開けて！"

[[dialogue]]
speaker = "アポロ"
# 「ほんとにおねだり上手だな、おまえは。今まで何回それにやられたことか……」
line = "「ほんとにおねだり上手だな、おまえは。今まで何回それにやられたことか……」"

[[dialogue]]
speaker = "アポロ"
# 「でもっ、今回はダメだ！　絶対開けないからな！」
line = "「でもっ、今回はダメだ！　絶対開けないからな！」"

[[dialogue]]
speaker = "アポロ"
# 「その代わり……これをやるぞ」
line = "「その代わり……これをやるぞ」"

[[dialogue]]
speaker = "アポロ"
# 「ちゅ<emoji=heart04>」
line = "「ちゅ<emoji=heart04>」"

[[dialogue]]
speaker = "アポロ"
# 「……………………ちゅーしちゃった。自分から、魔王にちゅーしちゃった……」
line = "「……………………ちゅーしちゃった。自分から、魔王にちゅーしちゃった……」"

[[dialogue]]
speaker = "アポロ"
# 「うわぁぁ、なにやってんだ、あたし。こら、こっち見んな！　顔赤くなってないからな！」
line = "「うわぁぁ、なにやってんだ、あたし。こら、こっち見んな！　顔赤くなってないからな！」"

[[dialogue]]
speaker = "アポロ"
# 「くそぉ～～～っ、なんでこうなるんだよぉ～～～～っ！！」
line = "「くそぉ～～～っ、なんでこうなるんだよぉ～～～～っ！！」"
