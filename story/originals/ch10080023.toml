[[dialogue]]
speaker = "unk"
# 第３話,誰にも譲りません,P
line = "第３話,誰にも譲りません,P"

[[dialogue]]
speaker = "アナ"
# 「会長、こちらも書類終わりです。ダブルチェックお願いします」
line = "「会長、こちらも書類終わりです。ダブルチェックお願いします」"

[[dialogue]]
speaker = "ヴィーナス"
# 「凄いわ！　アナ、もう全部終わったの！？」
line = "「凄いわ！　アナ、もう全部終わったの！？」"

[[dialogue]]
speaker = "アナ"
# 「イエス。我ながら、絶好調です。チェックの結果は、いかがでしょう？」
line = "「イエス。我ながら、絶好調です。チェックの結果は、いかがでしょう？」"

[[dialogue]]
speaker = "unk"
# １つもミス無しだ。さすがアナだな
line = "１つもミス無しだ。さすがアナだな"

[[dialogue]]
speaker = "アナ"
# 「あ……<emoji=heart04>　ふ……ふふ……頭撫でて貰うの、イイ感じです……<emoji=heart04>」
line = "「あ……<emoji=heart04>　ふ……ふふ……頭撫でて貰うの、イイ感じです……<emoji=heart04>」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナってば、クロトと付き合い始めてから、凄く女の子らしい表情をするようになったわね」
line = "「アナってば、クロトと付き合い始めてから、凄く女の子らしい表情をするようになったわね」"

[[dialogue]]
speaker = "アナ"
# 「ん……会長に頭ナデナデしてもらって、活力を補充することで、次なる仕事のやる気に繋がる。そのやる気でバリバリと仕事をこなして、また会長に褒めてもらう――」
line = "「ん……会長に頭ナデナデしてもらって、活力を補充することで、次なる仕事のやる気に繋がる。そのやる気でバリバリと仕事をこなして、また会長に褒めてもらう――」"

[[dialogue]]
speaker = "アナ"
# 「これぞ、恋人という立場を利用した合理的サイクルです」
line = "「これぞ、恋人という立場を利用した合理的サイクルです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほどね！　でも、そんなに効果あるなら、私も１度試してみたいわ！」
line = "「なるほどね！　でも、そんなに効果あるなら、私も１度試してみたいわ！」"

[[dialogue]]
speaker = "アナ"
# 「ダメです。これはあくまで、会長の恋人である私の特権」
line = "「ダメです。これはあくまで、会長の恋人である私の特権」"

[[dialogue]]
speaker = "ヴィーナス"
# 「え～、ずるいわ！　……って、あら？　なんか外、急に暗くなってゴロゴロ言ってない？」
line = "「え～、ずるいわ！　……って、あら？　なんか外、急に暗くなってゴロゴロ言ってない？」"

[[dialogue]]
speaker = "アナ"
# 「こ、これは……まさか――」
line = "「こ、これは……まさか――」"

[[dialogue]]
speaker = "アナ"
# 「ひゃあっ！？」
line = "「ひゃあっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「停電だわ！　アナ、凄い声がしたけど大丈夫！？」
line = "「停電だわ！　アナ、凄い声がしたけど大丈夫！？」"

[[dialogue]]
speaker = "アナ"
# 「あわわわわわ……」
line = "「あわわわわわ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「電気が復旧したわね……って、アナがクロトに抱き着いて、めちゃくちゃ震えてるわ！？」
line = "「電気が復旧したわね……って、アナがクロトに抱き着いて、めちゃくちゃ震えてるわ！？」"

[[dialogue]]
speaker = "アナ"
# 「がくがくぶるぶる……」
line = "「がくがくぶるぶる……」"

[[dialogue]]
speaker = "unk"
# もしかして雷が苦手なのか……？
line = "もしかして雷が苦手なのか……？"

[[dialogue]]
speaker = "アナ"
# 「エマージェンシーです……！　落雷は良くない……良くないです……！」
line = "「エマージェンシーです……！　落雷は良くない……良くないです……！」"

[[dialogue]]
speaker = "アナ"
# 「天界の一部では、落雷は不吉の予兆であると言われています。根拠となるデータは存在しませんが、一方で火のないところに煙は立たないともいう……」
line = "「天界の一部では、落雷は不吉の予兆であると言われています。根拠となるデータは存在しませんが、一方で火のないところに煙は立たないともいう……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アナ、迷信に妙に過敏なところがあるわよね……ここまで怖がるのは初めて見たわ」
line = "「アナ、迷信に妙に過敏なところがあるわよね……ここまで怖がるのは初めて見たわ」"

[[dialogue]]
speaker = "アナ"
# 「――俺がついているから大丈夫？　会長……でも……」
line = "「――俺がついているから大丈夫？　会長……でも……」"

[[dialogue]]
speaker = "アナ"
# 「ふわぁっ！？」
line = "「ふわぁっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「また落雷があったみたい。連続なんて珍しいわね」
line = "「また落雷があったみたい。連続なんて珍しいわね」"

[[dialogue]]
speaker = "アナ"
# 「そ、そんな……２回目……！　３回目がもし起こったら……！」
line = "「そ、そんな……２回目……！　３回目がもし起こったら……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ちょっとアナ、顔が真っ青よ！？　これ以上まだ何か迷信があるの？」
line = "「ちょっとアナ、顔が真っ青よ！？　これ以上まだ何か迷信があるの？」"

[[dialogue]]
speaker = "アナ"
# 「３回目の落雷は……恋愛の破局の予兆とされています。そ、そんなの……」
line = "「３回目の落雷は……恋愛の破局の予兆とされています。そ、そんなの……」"

[[dialogue]]
speaker = "アナ"
# 「そんなの嫌です……！　私、会長と別れたくありません……！」
line = "「そんなの嫌です……！　私、会長と別れたくありません……！」"

[[dialogue]]
speaker = "unk"
# ……ヴィーナス、アナのこと頼めるか
line = "……ヴィーナス、アナのこと頼めるか"

[[dialogue]]
speaker = "ヴィーナス"
# 「ん？　……クロト、もしかして今、私と同じこと考えてる？」
line = "「ん？　……クロト、もしかして今、私と同じこと考えてる？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なら、ここはアナの恋人であるクロトに譲るべきよね。手伝いとかはしなくても平気？」
line = "「なら、ここはアナの恋人であるクロトに譲るべきよね。手伝いとかはしなくても平気？」"

[[dialogue]]
speaker = "アナ"
# 「会長……あの、一体何を……？　どこに行くんですか、会長……！？」
line = "「会長……あの、一体何を……？　どこに行くんですか、会長……！？」"

[[dialogue]]
speaker = "unk"
# 俺はアナに１度微笑んでみせると、星徒会室を飛び出した――
line = "俺はアナに１度微笑んでみせると、星徒会室を飛び出した――"

[[dialogue]]
speaker = "ヴィーナス"
# 「――アナ、そんな心配そうな顔をしなくても大丈夫よ。クロトはアナの為に、雷を止めに行ったんだもの」
line = "「――アナ、そんな心配そうな顔をしなくても大丈夫よ。クロトはアナの為に、雷を止めに行ったんだもの」"

[[dialogue]]
speaker = "アナ"
# 「え？　それはどういう……」
line = "「え？　それはどういう……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「簡単よ！　雷雲に星術でも何でも撃って、雲を散らしちゃえばいいんだもの」
line = "「簡単よ！　雷雲に星術でも何でも撃って、雲を散らしちゃえばいいんだもの」"

[[dialogue]]
speaker = "アナ"
# 「はっ！？　そんな無茶苦茶な……！　そんな威力の星術を使えるのは、規格外の星力を持つ前会長くらいなもので――」
line = "「はっ！？　そんな無茶苦茶な……！　そんな威力の星術を使えるのは、規格外の星力を持つ前会長くらいなもので――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「出来るわよ、クロトなら」
line = "「出来るわよ、クロトなら」"

[[dialogue]]
speaker = "アナ"
# 「な、なんでそんな自信を持って言えるんですか……」
line = "「な、なんでそんな自信を持って言えるんですか……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だってクロトは――私を倒した魔王だもの！」
line = "「だってクロトは――私を倒した魔王だもの！」"

[[dialogue]]
speaker = "アナ"
# 「きゃっ……！？　落雷とは違う音……！？」
line = "「きゃっ……！？　落雷とは違う音……！？」"

[[dialogue]]
speaker = "アナ"
# 「あ……窓の外が晴れて……ま、まさか本当に……！？」
line = "「あ……窓の外が晴れて……ま、まさか本当に……！？」"

[[dialogue]]
speaker = "unk"
# 空に向かって星術ぶっ放してきた
line = "空に向かって星術ぶっ放してきた"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほらね！　私の言った通りでしょう？」
line = "「ほらね！　私の言った通りでしょう？」"

[[dialogue]]
speaker = "アナ"
# 「む、むむむ……！」
line = "「む、むむむ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「雷雲を吹き飛ばして３回目の落雷も防げたし、めでたしめでたしね！　……って、なんでアナは不機嫌そうなのよ？」
line = "「雷雲を吹き飛ばして３回目の落雷も防げたし、めでたしめでたしね！　……って、なんでアナは不機嫌そうなのよ？」"

[[dialogue]]
speaker = "アナ"
# 「やっぱり落雷は不吉の象徴です……言っておきますが、会長は私の彼氏で、誰にも譲りませんからね……！」
line = "「やっぱり落雷は不吉の象徴です……言っておきますが、会長は私の彼氏で、誰にも譲りませんからね……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなに抱き着いてアピールしなくても、知ってるけど？」
line = "「そんなに抱き着いてアピールしなくても、知ってるけど？」"

[[dialogue]]
speaker = "unk"
# （なんかアナ、嫉妬してる……？）
line = "（なんかアナ、嫉妬してる……？）"

[[dialogue]]
speaker = "unk"
# 俺のいない間に何があったか分からないが、恋人の可愛い嫉妬姿に愛を感じて、こっそり嬉しくなってしまうのだった。
line = "俺のいない間に何があったか分からないが、恋人の可愛い嫉妬姿に愛を感じて、こっそり嬉しくなってしまうのだった。"
