[[dialogue]]
speaker = "unk"
# ミネコと初めて会った日から少し経った、ある日のこと。彼女から「一緒に遊ぼう♪」という連絡があった。
line = "ミネコと初めて会った日から少し経った、ある日のこと。彼女から「一緒に遊ぼう♪」という連絡があった。"

[[dialogue]]
speaker = "unk"
# これまたいつの間にか彼女が住み始めているらしい流星寮へと呼び出されて、足を運ぶと――
line = "これまたいつの間にか彼女が住み始めているらしい流星寮へと呼び出されて、足を運ぶと――"

[[dialogue]]
speaker = "ミネコ"
# 「おっ、ジュエリー、会長！　こっちこっち～♪」
line = "「おっ、ジュエリー、会長！　こっちこっち～♪」"

[[dialogue]]
speaker = "unk"
# 並んでいるテーブルの一席に腰かけて、明るくぶんぶんと手を振っている彼女のところへ向かう。
line = "並んでいるテーブルの一席に腰かけて、明るくぶんぶんと手を振っている彼女のところへ向かう。"

[[dialogue]]
speaker = "ジュエリー"
# 「ミネコ、今日は一体何の用だい？　私はキミと仲よくするよりも、助手と愛を深めるので忙しいのだが……」
line = "「ミネコ、今日は一体何の用だい？　私はキミと仲よくするよりも、助手と愛を深めるので忙しいのだが……」"

[[dialogue]]
speaker = "ジュエリー"
# 「って、そのテーブルの上に置いてあるのは……？」
line = "「って、そのテーブルの上に置いてあるのは……？」"

[[dialogue]]
speaker = "ミネコ"
# 「ふっふっふ……よくぞ聞いてくれたね、名探偵！　実は２人と仲良くなろうと思って――」
line = "「ふっふっふ……よくぞ聞いてくれたね、名探偵！　実は２人と仲良くなろうと思って――」"

[[dialogue]]
speaker = "ミネコ"
# 「趣味のボドゲを持ってきたんだ～♪　３人でやろうよ☆」
line = "「趣味のボドゲを持ってきたんだ～♪　３人でやろうよ☆」"

[[dialogue]]
speaker = "unk"
# ボードゲームを……？
line = "ボードゲームを……？"

[[dialogue]]
speaker = "unk"
# 大怪盗の彼女からの呼び出しで内心警戒していたのだが、なんだか拍子抜けしてしまう。
line = "大怪盗の彼女からの呼び出しで内心警戒していたのだが、なんだか拍子抜けしてしまう。"

[[dialogue]]
speaker = "ミネコ"
# 「ジュエリーの趣味を聞き出したら、なんとゲームが好きだって言うじゃん？　ってことは、まさかの偶然！　私たち趣味が合うじゃん♪」
line = "「ジュエリーの趣味を聞き出したら、なんとゲームが好きだって言うじゃん？　ってことは、まさかの偶然！　私たち趣味が合うじゃん♪」"

[[dialogue]]
speaker = "ミネコ"
# 「それなら善は急げでしょ！　ってことで、お気に入りのやつを持ってきたんだ～♪」
line = "「それなら善は急げでしょ！　ってことで、お気に入りのやつを持ってきたんだ～♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「確かにキミの、『ヘイ彼女、好きなもの教えてよ』というナンパのようなノリに付き合って、ゲームと助手の２つを答えたとも」
line = "「確かにキミの、『ヘイ彼女、好きなもの教えてよ』というナンパのようなノリに付き合って、ゲームと助手の２つを答えたとも」"

[[dialogue]]
speaker = "ジュエリー"
# 「しかしあいにく、私が好きなのは、『電子ゲーム』の方だよ。世界的に売れてる家庭用ゲーム機があるだろう？」
line = "「しかしあいにく、私が好きなのは、『電子ゲーム』の方だよ。世界的に売れてる家庭用ゲーム機があるだろう？」"

[[dialogue]]
speaker = "ジュエリー"
# 「それの新作ソフトが出る度、発売日にダウンロードして、徹夜でプレイして最速攻略し――」
line = "「それの新作ソフトが出る度、発売日にダウンロードして、徹夜でプレイして最速攻略し――」"

[[dialogue]]
speaker = "ジュエリー"
# 「ネットの盛り上がりを眺めながらゲームの『批評』をするのが好きな、ライトユーザーさ」
line = "「ネットの盛り上がりを眺めながらゲームの『批評』をするのが好きな、ライトユーザーさ」"

[[dialogue]]
speaker = "ミネコ"
# 「それはライトなのかな……？」
line = "「それはライトなのかな……？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ボードゲームもプレイするのは嫌いじゃないが、あまり積極的に嗜まないね」
line = "「ボードゲームもプレイするのは嫌いじゃないが、あまり積極的に嗜まないね」"

[[dialogue]]
speaker = "ジュエリー"
# 「チェスは好きだけど、それもするなら基本、パソコン上でのオンライン対戦がメインだよ」
line = "「チェスは好きだけど、それもするなら基本、パソコン上でのオンライン対戦がメインだよ」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふふっ♪　大丈夫、私も電子ゲームはよくプレイしてるから♪　そっちのフレンド登録とオンライン対戦については、また後でのお楽しみとして――」
line = "「ふふふっ♪　大丈夫、私も電子ゲームはよくプレイしてるから♪　そっちのフレンド登録とオンライン対戦については、また後でのお楽しみとして――」"

[[dialogue]]
speaker = "ミネコ"
# 「まずはリアルに顔を合わせてるわけだし、ボドゲで遊ぶところから始めようよ♪」
line = "「まずはリアルに顔を合わせてるわけだし、ボドゲで遊ぶところから始めようよ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「それに、ジュエリーは少なからず興味あると思うよ～？　何故なら――」
line = "「それに、ジュエリーは少なからず興味あると思うよ～？　何故なら――」"

[[dialogue]]
speaker = "ミネコ"
# 「このボドゲ、ジュエリーが好きだって言ってたゲームクリエイターが、若い頃に手がけた作品だからね♪」
line = "「このボドゲ、ジュエリーが好きだって言ってたゲームクリエイターが、若い頃に手がけた作品だからね♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「……！　まさか、同人作品で出回った数が少ないから、数十万テルスのプレミアが付いているっていう噂の……！？」
line = "「……！　まさか、同人作品で出回った数が少ないから、数十万テルスのプレミアが付いているっていう噂の……！？」"

[[dialogue]]
speaker = "ミネコ"
# 「そう、今ではなかなか手に入らないレア物ボードゲーム。それがこれだよ♪　値段もさることながら、そもそも数が少ないせいで、市場に出回ってないんだよね～」
line = "「そう、今ではなかなか手に入らないレア物ボードゲーム。それがこれだよ♪　値段もさることながら、そもそも数が少ないせいで、市場に出回ってないんだよね～」"

[[dialogue]]
speaker = "ミネコ"
# 「ああ、一応言っとくけど、これは盗んだわけじゃなく、ちゃんと買ったやつだから、安心してね」
line = "「ああ、一応言っとくけど、これは盗んだわけじゃなく、ちゃんと買ったやつだから、安心してね」"

[[dialogue]]
speaker = "ミネコ"
# 「レア物とはいえ、お金を出せば買える程度の量産品を盗むのは、私の主義じゃないんで♪」
line = "「レア物とはいえ、お金を出せば買える程度の量産品を盗むのは、私の主義じゃないんで♪」"

[[dialogue]]
speaker = "ミネコ"
# 「で、どうかな、ジュエリー？　有名クリエイターが若かりし頃に手がけたゲーム……遊んでみたくない？」
line = "「で、どうかな、ジュエリー？　有名クリエイターが若かりし頃に手がけたゲーム……遊んでみたくない？」"

[[dialogue]]
speaker = "ジュエリー"
# 「ごくり……」
line = "「ごくり……」"

[[dialogue]]
speaker = "ジュエリー"
# 「……いいだろう。キミの思考の癖をトレースするのにも役立つだろうし、そこまで言うなら付き合おうじゃないか」
line = "「……いいだろう。キミの思考の癖をトレースするのにも役立つだろうし、そこまで言うなら付き合おうじゃないか」"

[[dialogue]]
speaker = "unk"
# （遊んでみたくなったんだな……）
line = "（遊んでみたくなったんだな……）"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ。じゃあ、決まりだね♪　このボードゲームのタイトルは、おあつらえ向きに『名探偵と大怪盗』！」
line = "「ふふっ。じゃあ、決まりだね♪　このボードゲームのタイトルは、おあつらえ向きに『名探偵と大怪盗』！」"

[[dialogue]]
speaker = "ミネコ"
# 「今日は立場を忘れて、楽しく勝負と行こうじゃないか、名探偵！」
line = "「今日は立場を忘れて、楽しく勝負と行こうじゃないか、名探偵！」"

[[dialogue]]
speaker = "unk"
# それからミネコにルールを教えてもらい、ゲームをプレイする俺たちだったが――
line = "それからミネコにルールを教えてもらい、ゲームをプレイする俺たちだったが――"

[[dialogue]]
speaker = "ミネコ"
# 「あはははははっ♪　ざんね～ん！　また『大怪盗』の勝ち～！　お宝、も～らいっ♪」
line = "「あはははははっ♪　ざんね～ん！　また『大怪盗』の勝ち～！　お宝、も～らいっ♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「くうぅっ。さ、３連敗……！」
line = "「くうぅっ。さ、３連敗……！」"

[[dialogue]]
speaker = "unk"
# ジュエリーが珍しく、眉間に皺を寄せながら悔しそうな顔を浮かべていた。
line = "ジュエリーが珍しく、眉間に皺を寄せながら悔しそうな顔を浮かべていた。"

[[dialogue]]
speaker = "ミネコ"
# 「いや～、ごめんね～♪　本当の名探偵が相手だから、手加減できなくってさ～」
line = "「いや～、ごめんね～♪　本当の名探偵が相手だから、手加減できなくってさ～」"

[[dialogue]]
speaker = "ジュエリー"
# 「というかこれ、ゲームバランスおかしくないかい！？　どう考えても怪盗側が有利なゲームだろう！？」
line = "「というかこれ、ゲームバランスおかしくないかい！？　どう考えても怪盗側が有利なゲームだろう！？」"

[[dialogue]]
speaker = "ミネコ"
# 「あはははっ♪　やっぱ気づいた？　実はそうなんだよね～」
line = "「あはははっ♪　やっぱ気づいた？　実はそうなんだよね～」"

[[dialogue]]
speaker = "ミネコ"
# 「ほら、３人目のプレイヤーである会長は、探偵の助手としてサポート役になるわけじゃない？」
line = "「ほら、３人目のプレイヤーである会長は、探偵の助手としてサポート役になるわけじゃない？」"

[[dialogue]]
speaker = "ミネコ"
# 「一方で、怪盗は常に単独プレイを迫られるから、変装システムでパワーバランスを取ろうとしてるわけだけど――」
line = "「一方で、怪盗は常に単独プレイを迫られるから、変装システムでパワーバランスを取ろうとしてるわけだけど――」"

[[dialogue]]
speaker = "ミネコ"
# 「この変装がぶっ壊れで、しかも探偵側の助手が増えれば増えるだけ使用可能な回数が増えて、怪盗側有利になるっていうね！」
line = "「この変装がぶっ壊れで、しかも探偵側の助手が増えれば増えるだけ使用可能な回数が増えて、怪盗側有利になるっていうね！」"

[[dialogue]]
speaker = "ジュエリー"
# 「クソゲーじゃないか！　ゲーム状況見ながら、助手の行動が実は変装でしたって後出しできるのは、推理のしようがないぞ！？」
line = "「クソゲーじゃないか！　ゲーム状況見ながら、助手の行動が実は変装でしたって後出しできるのは、推理のしようがないぞ！？」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ……ふふふっ♪」
line = "「ふふっ……ふふふっ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「そう、ジュエリー、これは『クソゲー』なんだよ……！　だからこそ、再販なんてされてなくて、プレミアが付いてるってわけ♪」
line = "「そう、ジュエリー、これは『クソゲー』なんだよ……！　だからこそ、再販なんてされてなくて、プレミアが付いてるってわけ♪」"

[[dialogue]]
speaker = "ミネコ"
# 「でも――」
line = "「でも――」"

[[dialogue]]
speaker = "ミネコ"
# 「そんな理不尽なクソゲーだからこそ、もし探偵側で勝てたら、とんでもないエクスタシーが生まれると思わない……！？」
line = "「そんな理不尽なクソゲーだからこそ、もし探偵側で勝てたら、とんでもないエクスタシーが生まれると思わない……！？」"

[[dialogue]]
speaker = "ジュエリー"
# 「いや、無理だろう……ゲーム内容を理解すれば理解する程、逆転が難しくなるイメージしか湧かないんだが……」
line = "「いや、無理だろう……ゲーム内容を理解すれば理解する程、逆転が難しくなるイメージしか湧かないんだが……」"

[[dialogue]]
speaker = "ミネコ"
# 「なら役を交代してみる？」
line = "「なら役を交代してみる？」"

[[dialogue]]
speaker = "ミネコ"
# 「ふふっ♪　理不尽に私がどう立ち向かうのか、しっかりと見ときなよ～！」
line = "「ふふっ♪　理不尽に私がどう立ち向かうのか、しっかりと見ときなよ～！」"

[[dialogue]]
speaker = "unk"
# そうして、お互いの役を交換した結果――
line = "そうして、お互いの役を交換した結果――"

[[dialogue]]
speaker = "ジュエリー"
# 「……よし、私の勝ちだっ！」
line = "「……よし、私の勝ちだっ！」"

[[dialogue]]
speaker = "ジュエリー"
# 「ほら見たまえ！　やっぱり、このゲームは熟練者でも怪盗には勝てないじゃないか。ふふふっ」
line = "「ほら見たまえ！　やっぱり、このゲームは熟練者でも怪盗には勝てないじゃないか。ふふふっ」"

[[dialogue]]
speaker = "unk"
# ようやく勝ったからだろう。ジュエリーは小さくガッツポーズの手をしながら、嬉しそうに言う。
line = "ようやく勝ったからだろう。ジュエリーは小さくガッツポーズの手をしながら、嬉しそうに言う。"

[[dialogue]]
speaker = "unk"
# 一方の敗北したミネコはというと――
line = "一方の敗北したミネコはというと――"

[[dialogue]]
speaker = "ミネコ"
# 「ふっ……ふふふふふふっ♪　ああ……やっぱり――」
line = "「ふっ……ふふふふふふっ♪　ああ……やっぱり――」"

[[dialogue]]
speaker = "ミネコ"
# 「クソゲーって、すごくイイよね……♪」
line = "「クソゲーって、すごくイイよね……♪」"

[[dialogue]]
speaker = "ジュエリー"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "ミネコ"
# 「どうしようもない理不尽に打ちのめされて、敗北を突き付けられるこの瞬間……！」
line = "「どうしようもない理不尽に打ちのめされて、敗北を突き付けられるこの瞬間……！」"

[[dialogue]]
speaker = "ミネコ"
# 「はあぁ……<emoji=heart04>　すごく――ゾクゾクする<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　すごく――ゾクゾクする<emoji=heart04>」"

[[dialogue]]
speaker = "ジュエリー"
# 「なんで嬉しそうなんだ、キミは……？」
line = "「なんで嬉しそうなんだ、キミは……？」"

[[dialogue]]
speaker = "ミネコ"
# 「それと同じくらい、他人が同じ理不尽な状況を味わって、感情的に悶える姿を見るのもまたイイ……♪」
line = "「それと同じくらい、他人が同じ理不尽な状況を味わって、感情的に悶える姿を見るのもまたイイ……♪」"

[[dialogue]]
speaker = "ミネコ"
# 「だって、あのいつも冷静に私を追い詰めてくる名探偵のジュエリーが、理不尽にフルボッコにされて、悔しそうな顔を見せるんだよ……？」
line = "「だって、あのいつも冷静に私を追い詰めてくる名探偵のジュエリーが、理不尽にフルボッコにされて、悔しそうな顔を見せるんだよ……？」"

[[dialogue]]
speaker = "ミネコ"
# 「そんなの、ゲームバランス崩壊してるクソゲーじゃなきゃ味わえないじゃん<emoji=heart04>」
line = "「そんなの、ゲームバランス崩壊してるクソゲーじゃなきゃ味わえないじゃん<emoji=heart04>」"

[[dialogue]]
speaker = "ミネコ"
# 「だからクソゲーは、自分でプレイするのも、他人のプレイを見るのも、大っ好きなんだよ♪」
line = "「だからクソゲーは、自分でプレイするのも、他人のプレイを見るのも、大っ好きなんだよ♪」"

[[dialogue]]
speaker = "unk"
# えぇ……
line = "えぇ……"

[[dialogue]]
speaker = "ジュエリー"
# 「これは批評し難い性癖が出てきたな……」
line = "「これは批評し難い性癖が出てきたな……」"

[[dialogue]]
speaker = "ミネコ"
# 「じゃあ次は、会長が探偵役でプレイする番ね♪　私が助手になるから、一緒に極上の理不尽を味わおう<emoji=heart04>」
line = "「じゃあ次は、会長が探偵役でプレイする番ね♪　私が助手になるから、一緒に極上の理不尽を味わおう<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 勝つのが目的じゃなくなってるんだけど！？
line = "勝つのが目的じゃなくなってるんだけど！？"

[[dialogue]]
speaker = "ミネコ"
# 「ジュエリー？　ドン引きしてる場合じゃないよ！　愛する助手がクソゲーに苦しめられるところ、見たくない？」
line = "「ジュエリー？　ドン引きしてる場合じゃないよ！　愛する助手がクソゲーに苦しめられるところ、見たくない？」"

[[dialogue]]
speaker = "ジュエリー"
# 「助手の悔しがる顔……ごくり」
line = "「助手の悔しがる顔……ごくり」"

[[dialogue]]
speaker = "ジュエリー"
# 「――仕方ない。もう１度勝負してやろう、ミネコ」
line = "「――仕方ない。もう１度勝負してやろう、ミネコ」"

[[dialogue]]
speaker = "unk"
# ジュエリーさん！？
line = "ジュエリーさん！？"

[[dialogue]]
speaker = "ミネコ"
# 「ふっふっふっ♪　さあ、クソゲーを思う存分楽しもう～！」
line = "「ふっふっふっ♪　さあ、クソゲーを思う存分楽しもう～！」"

[[dialogue]]
speaker = "unk"
# その後、理不尽なゲームバランスに阿鼻叫喚しながら、なんだかんだ繰り返しボードゲームを楽しむ俺たちなのだった――
line = "その後、理不尽なゲームバランスに阿鼻叫喚しながら、なんだかんだ繰り返しボードゲームを楽しむ俺たちなのだった――"
