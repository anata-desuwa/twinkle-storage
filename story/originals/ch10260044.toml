[[dialogue]]
speaker = "unk"
# 第４話,可愛い後輩と夢の続き,P
line = "第４話,可愛い後輩と夢の続き,P"

[[dialogue]]
speaker = "unk"
# 『例の夢』を見てしまった翌日。リーリアは俺と顔を合わせると、真っ赤になって退散、ということを繰り返していた。
line = "『例の夢』を見てしまった翌日。リーリアは俺と顔を合わせると、真っ赤になって退散、ということを繰り返していた。"

[[dialogue]]
speaker = "unk"
# なので放課後、俺はいつかと同じ空き教室へ、リーリアを呼び出すことにした。
line = "なので放課後、俺はいつかと同じ空き教室へ、リーリアを呼び出すことにした。"

[[dialogue]]
speaker = "リーリア"
# 「セ、センパイ、話って……昨日の夢のことですか……？」
line = "「セ、センパイ、話って……昨日の夢のことですか……？」"

[[dialogue]]
speaker = "unk"
# 俺は頷いて、リーリアに近づき、頭を撫でる。
line = "俺は頷いて、リーリアに近づき、頭を撫でる。"

[[dialogue]]
speaker = "リーリア"
# 「あ……センパイ……？」
line = "「あ……センパイ……？」"

[[dialogue]]
speaker = "unk"
# 夢のことでそんなに恥ずかしがらなくていい
line = "夢のことでそんなに恥ずかしがらなくていい"

[[dialogue]]
speaker = "unk"
# 俺はあの夢を見て、リーリアとは将来、あんな風になれたらいいと思った。
line = "俺はあの夢を見て、リーリアとは将来、あんな風になれたらいいと思った。"

[[dialogue]]
speaker = "unk"
# だから、そんなに恥ずかしがらなくても大丈夫だと、俺は恋人の頭を優しく撫でながら伝える。
line = "だから、そんなに恥ずかしがらなくても大丈夫だと、俺は恋人の頭を優しく撫でながら伝える。"

[[dialogue]]
speaker = "リーリア"
# 「あ、ありがとうございます……<emoji=heart04>　センパイがそう思ってくれてたなら、嬉しいです。えへへ<emoji=heart04>」
line = "「あ、ありがとうございます……<emoji=heart04>　センパイがそう思ってくれてたなら、嬉しいです。えへへ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアはもじもじと照れながらも、嬉しそうな笑顔を見せてくれた。俺はそこで、夢の中で１つ気になっていたことを尋ねる。
line = "リーリアはもじもじと照れながらも、嬉しそうな笑顔を見せてくれた。俺はそこで、夢の中で１つ気になっていたことを尋ねる。"

[[dialogue]]
speaker = "リーリア"
# 「――夢の中で、私が新星学園の先生になっていたことについて、ですか？」
line = "「――夢の中で、私が新星学園の先生になっていたことについて、ですか？」"

[[dialogue]]
speaker = "リーリア"
# 「それについては、夢特有の<ruby=こうとうむけい>荒唐無稽</ruby>な設定というわけじゃなくて……夢の私がそうだったきっかけ、みたいなものがありまして」
line = "「それについては、夢特有の<ruby>荒唐無稽<rt>こうとうむけい</rt></ruby>な設定というわけじゃなくて……夢の私がそうだったきっかけ、みたいなものがありまして」"

[[dialogue]]
speaker = "リーリア"
# 「元旦に羽根突き勝負をした時、私がみんなに、獅子舞さんの技を攻略するコツを教えることになったんですけど……」
line = "「元旦に羽根突き勝負をした時、私がみんなに、獅子舞さんの技を攻略するコツを教えることになったんですけど……」"

[[dialogue]]
speaker = "リーリア"
# 「そこでみんなから『教え方が上手くて先生みたい』って褒められちゃいまして……それで、先生って選択肢もあるのか～って最近は考えてたんですよね☆」
line = "「そこでみんなから『教え方が上手くて先生みたい』って褒められちゃいまして……それで、先生って選択肢もあるのか～って最近は考えてたんですよね☆」"

[[dialogue]]
speaker = "リーリア"
# 「ほら、魔女と人間界の橋渡しができる『魔女の友好大使』になりたいって話、したことがあったじゃないですか」
line = "「ほら、魔女と人間界の橋渡しができる『魔女の友好大使』になりたいって話、したことがあったじゃないですか」"

[[dialogue]]
speaker = "リーリア"
# 「それで、私が学園の先生になったら、魔女の子たちが学べるような環境も作っていけるんじゃないかな～って……」
line = "「それで、私が学園の先生になったら、魔女の子たちが学べるような環境も作っていけるんじゃないかな～って……」"

[[dialogue]]
speaker = "リーリア"
# 「まだ先生って選択肢が思いついてからそんなに経ってないので、自分が先生になるための具体的な方法すら、見えてはいないんですけど――」
line = "「まだ先生って選択肢が思いついてからそんなに経ってないので、自分が先生になるための具体的な方法すら、見えてはいないんですけど――」"

[[dialogue]]
speaker = "リーリア"
# 「でもいつか先生になったら、『人間が魔法を学べる環境』とか、『魔女の森の方に留学できる仕組み』とか」
line = "「でもいつか先生になったら、『人間が魔法を学べる環境』とか、『魔女の森の方に留学できる仕組み』とか」"

[[dialogue]]
speaker = "リーリア"
# 「そういうのも作れたら、みんなが楽しいんじゃないかな～、なんて考えちゃってました♪」
line = "「そういうのも作れたら、みんなが楽しいんじゃないかな～、なんて考えちゃってました♪」"

[[dialogue]]
speaker = "リーリア"
# 「とは言え、魔女の森の元老会が絶対ネックになるし、ネビュラもどちらかというと保守派が多いので、魔女の森に外の人を呼び込むのは相当ハードルが高いんですが……」
line = "「とは言え、魔女の森の元老会が絶対ネックになるし、ネビュラもどちらかというと保守派が多いので、魔女の森に外の人を呼び込むのは相当ハードルが高いんですが……」"

[[dialogue]]
speaker = "リーリア"
# 「種族関係なく手を取り合って、リクリエを乗り越えようとしているこんな時代だからこそ、関係性を見直す最大のチャンスだと思っています！」
line = "「種族関係なく手を取り合って、リクリエを乗り越えようとしているこんな時代だからこそ、関係性を見直す最大のチャンスだと思っています！」"

[[dialogue]]
speaker = "unk"
# 正直、惚れ直しちゃったぞ
line = "正直、惚れ直しちゃったぞ"

[[dialogue]]
speaker = "unk"
# リーリアはすごいな……
line = "リーリアはすごいな……"

[[dialogue]]
speaker = "リーリア"
# 「ほ、惚れ直したって、そんな……えへへへへへぇ～<emoji=heart04>」
line = "「ほ、惚れ直したって、そんな……えへへへへへぇ～<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「センパイってば、今日は私が喜ぶことばっかり言って、甘やかすと調子に乗っちゃいますよ～？」
line = "「センパイってば、今日は私が喜ぶことばっかり言って、甘やかすと調子に乗っちゃいますよ～？」"

[[dialogue]]
speaker = "リーリア"
# 「――でも先生になるのと、子供ができてお母さんをやるのは、両立が大変そう？」
line = "「――でも先生になるのと、子供ができてお母さんをやるのは、両立が大変そう？」"

[[dialogue]]
speaker = "リーリア"
# 「そ、そこは夢なので、整合性はあまり考えてなかったというか～。まあ、それでも……」
line = "「そ、そこは夢なので、整合性はあまり考えてなかったというか～。まあ、それでも……」"

[[dialogue]]
speaker = "リーリア"
# 「私は両方、叶えちゃいたいな～って思ってますけどね<emoji=heart04>」
line = "「私は両方、叶えちゃいたいな～って思ってますけどね<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「センパイの方は、どうですか……？」
line = "「センパイの方は、どうですか……？」"

[[dialogue]]
speaker = "unk"
# なら、その夢の為に俺も頑張らないとな
line = "なら、その夢の為に俺も頑張らないとな"

[[dialogue]]
speaker = "リーリア"
# 「――リモートワークで、家でできる仕事を探すという手もある、ですか？」
line = "「――リモートワークで、家でできる仕事を探すという手もある、ですか？」"

[[dialogue]]
speaker = "unk"
# 今時なら、そういう仕事も探せばある。育児だって、夫婦で一緒にするものだろう。
line = "今時なら、そういう仕事も探せばある。育児だって、夫婦で一緒にするものだろう。"

[[dialogue]]
speaker = "unk"
# 要するに、俺はリーリアの夢を応援する為に、自分ができることをなんだってするつもりだ。
line = "要するに、俺はリーリアの夢を応援する為に、自分ができることをなんだってするつもりだ。"

[[dialogue]]
speaker = "リーリア"
# 「センパイ……<emoji=heart04>　ありがとうございます！　えへへっ♪」
line = "「センパイ……<emoji=heart04>　ありがとうございます！　えへへっ♪」"

[[dialogue]]
speaker = "リーリア"
# 「あ、あの～<emoji=heart04>　そのですね……」
line = "「あ、あの～<emoji=heart04>　そのですね……」"

[[dialogue]]
speaker = "リーリア"
# 「センパイと話していたら、なんだかイチャイチャしたくなってきちゃいました<emoji=heart04>」
line = "「センパイと話していたら、なんだかイチャイチャしたくなってきちゃいました<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 珍しく、１日中一緒にいなかったしな
line = "珍しく、１日中一緒にいなかったしな"

[[dialogue]]
speaker = "リーリア"
# 「丸１日センパイを摂取してなかったのに、いきなり高濃度のラブを浴びたので、今ちょっとしたセンパイ中毒ですよ、私<emoji=heart04>」
line = "「丸１日センパイを摂取してなかったのに、いきなり高濃度のラブを浴びたので、今ちょっとしたセンパイ中毒ですよ、私<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「あっ……センパイ……<emoji=heart04>」
line = "「あっ……センパイ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はリーリアの腰を取り、そっと体を抱き寄せた。
line = "俺はリーリアの腰を取り、そっと体を抱き寄せた。"

[[dialogue]]
speaker = "unk"
# リーリア、これからもっと幸せにするからな
line = "リーリア、これからもっと幸せにするからな"

[[dialogue]]
speaker = "unk"
# それは夢の中で伝えた言葉。それを改めて口にする。
line = "それは夢の中で伝えた言葉。それを改めて口にする。"

[[dialogue]]
speaker = "リーリア"
# 「……！　はいっ♪　私も――」
line = "「……！　はいっ♪　私も――」"

[[dialogue]]
speaker = "リーリア"
# 「私もです、センパイ<emoji=heart04>　センパイに素敵な未来の色を見せて、ずっと幸せって言ってもらえるように頑張りますから！」
line = "「私もです、センパイ<emoji=heart04>　センパイに素敵な未来の色を見せて、ずっと幸せって言ってもらえるように頑張りますから！」"

[[dialogue]]
speaker = "リーリア"
# 「――もうずっと幸せだから大丈夫？　ダメです～。こんなもので満足されても、私はまだまだ、センパイを幸せにし足りないんです<emoji=heart04>」
line = "「――もうずっと幸せだから大丈夫？　ダメです～。こんなもので満足されても、私はまだまだ、センパイを幸せにし足りないんです<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「私だって、もっともっとセンパイに幸せにしてほしいです<emoji=heart04>　だから……」
line = "「私だって、もっともっとセンパイに幸せにしてほしいです<emoji=heart04>　だから……」"

[[dialogue]]
speaker = "リーリア"
# 「今はとりあえず、キス、して欲しいです……<emoji=heart04>　んっ……<emoji=heart04>」
line = "「今はとりあえず、キス、して欲しいです……<emoji=heart04>　んっ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# リーリアのお願いに応えて、唇をそっと重ねる。
line = "リーリアのお願いに応えて、唇をそっと重ねる。"

[[dialogue]]
speaker = "リーリア"
# 「ちゅっ<emoji=heart04>　はあぁ……<emoji=heart04>　センパイ……もっと……<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>　はあぁ……<emoji=heart04>　センパイ……もっと……<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「んっ……ちゅっ<emoji=heart04>　はぁぁ<emoji=heart04>　センパイ……大好きです<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>　はぁぁ<emoji=heart04>　センパイ……大好きです<emoji=heart04>」"

[[dialogue]]
speaker = "リーリア"
# 「ちゅっ<emoji=heart04>」
line = "「ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# その後、校舎の外れにある空き教室で、生徒がほとんど来ないのをいいことに、俺たちは何度も甘い音を響かせ続けてしまうのだった。
line = "その後、校舎の外れにある空き教室で、生徒がほとんど来ないのをいいことに、俺たちは何度も甘い音を響かせ続けてしまうのだった。"
