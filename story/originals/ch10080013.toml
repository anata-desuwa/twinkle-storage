[[dialogue]]
speaker = "unk"
# 第３話,いつか空の向こうへ,P
line = "第３話,いつか空の向こうへ,P"

[[dialogue]]
speaker = "unk"
# 天界のことについて調べようと、図書館を訪れると──新星学園の司書であるウィステリアさんが声をかけてきてくれた。
line = "天界のことについて調べようと、図書館を訪れると──新星学園の司書であるウィステリアさんが声をかけてきてくれた。"

[[dialogue]]
speaker = "ウィステリア"
# 「こんにちは。今日はどうしたの？　なにか調べもの？」
line = "「こんにちは。今日はどうしたの？　なにか調べもの？」"

[[dialogue]]
speaker = "unk"
# 天界のことについて、少し
line = "天界のことについて、少し"

[[dialogue]]
speaker = "ウィステリア"
# 「ふうん。あ、そういえばさっきアナさんも来てたわよ。暇つぶしに勉強しにきたって言ってたから、手伝ってもらったらどう？」
line = "「ふうん。あ、そういえばさっきアナさんも来てたわよ。暇つぶしに勉強しにきたって言ってたから、手伝ってもらったらどう？」"

[[dialogue]]
speaker = "アナ"
# 「……やっぱり、自重に耐えられない。静止衛星の問題は解決できる。ステーションを中継させれば、いける……？」
line = "「……やっぱり、自重に耐えられない。静止衛星の問題は解決できる。ステーションを中継させれば、いける……？」"

[[dialogue]]
speaker = "unk"
# アナ。勉強の調子はどう？
line = "アナ。勉強の調子はどう？"

[[dialogue]]
speaker = "アナ"
# 「会長。図書館に来るなんて珍しい。お昼寝しに来たんですか？」
line = "「会長。図書館に来るなんて珍しい。お昼寝しに来たんですか？」"

[[dialogue]]
speaker = "アナ"
# 「……わかります。図書館はお昼寝に最適。静かだし、教室と違って寝てても誰にも注意されない。グッドプレイス」
line = "「……わかります。図書館はお昼寝に最適。静かだし、教室と違って寝てても誰にも注意されない。グッドプレイス」"

[[dialogue]]
speaker = "アナ"
# 「え、違うんですか。勉強……？」
line = "「え、違うんですか。勉強……？」"

[[dialogue]]
speaker = "アナ"
# 「勉強でしたら、私が力になれるかもしれません。わからないことがあれば聞いてください。……２年生の範囲もバッチリ予習しています」
line = "「勉強でしたら、私が力になれるかもしれません。わからないことがあれば聞いてください。……２年生の範囲もバッチリ予習しています」"

[[dialogue]]
speaker = "unk"
# ──俺はアナに、天界のことをもっと知りたいと話した。
line = "──俺はアナに、天界のことをもっと知りたいと話した。"

[[dialogue]]
speaker = "アナ"
# 「……なるほど。天界についてなら、ちょうどいいです。少し私に付き合ってくれますか？」
line = "「……なるほど。天界についてなら、ちょうどいいです。少し私に付き合ってくれますか？」"

[[dialogue]]
speaker = "アナ"
# 「今、静止衛星と地表を結ぶ軌道エレベーターを、どうすれば実現可能なのかを考えていたんです」
line = "「今、静止衛星と地表を結ぶ軌道エレベーターを、どうすれば実現可能なのかを考えていたんです」"

[[dialogue]]
speaker = "アナ"
# 「……はい。会長の想像しているものと同じです。宇宙と地球を結ぶ、長い、長いエレベーターのことです」
line = "「……はい。会長の想像しているものと同じです。宇宙と地球を結ぶ、長い、長いエレベーターのことです」"

[[dialogue]]
speaker = "アナ"
# 「会長は、天界がどこにあるか知っていますか？」
line = "「会長は、天界がどこにあるか知っていますか？」"

[[dialogue]]
speaker = "unk"
# ……天界って言うくらいだから、空の向こう？
line = "……天界って言うくらいだから、空の向こう？"

[[dialogue]]
speaker = "アナ"
# 「そうですね。概念的にも、位置関係的にも大きく間違っていません。ただ、人間界における宇宙から物理的に繋がっているわけではありません」
line = "「そうですね。概念的にも、位置関係的にも大きく間違っていません。ただ、人間界における宇宙から物理的に繋がっているわけではありません」"

[[dialogue]]
speaker = "unk"
# じゃあ軌道エレベーター関係ないんじゃ……
line = "じゃあ軌道エレベーター関係ないんじゃ……"

[[dialogue]]
speaker = "アナ"
# 「いえ、そうとも言えないことが、最近の研究でわかってきました」
line = "「いえ、そうとも言えないことが、最近の研究でわかってきました」"

[[dialogue]]
speaker = "アナ"
# 「宇宙の果てを旅すれば、天界にたどり着くわけではありませんが……それでも、宇宙は天界に『近い』」
line = "「宇宙の果てを旅すれば、天界にたどり着くわけではありませんが……それでも、宇宙は天界に『近い』」"

[[dialogue]]
speaker = "アナ"
# 「宇宙に、天界と繋がるアクセスポイントを作ることができれば、もっと天界と人間界の行き来は楽になるはずなんです」
line = "「宇宙に、天界と繋がるアクセスポイントを作ることができれば、もっと天界と人間界の行き来は楽になるはずなんです」"

[[dialogue]]
speaker = "アナ"
# 「会長も知っての通り、現在の確立された三界の移動方法は、『穴』を通じて四半期に１回しかできません」
line = "「会長も知っての通り、現在の確立された三界の移動方法は、『穴』を通じて四半期に１回しかできません」"

[[dialogue]]
speaker = "アナ"
# 「しかし、その『穴』を使わない抜け道は、いくつか存在しているという噂です」
line = "「しかし、その『穴』を使わない抜け道は、いくつか存在しているという噂です」"

[[dialogue]]
speaker = "アナ"
# 「抜け道があるのなら、正規のルートも増やせるのではないか……それこそ、気軽に旅行へ行くような、そんな感覚で三界を渡ることも、いつかは可能になるかもしれません」
line = "「抜け道があるのなら、正規のルートも増やせるのではないか……それこそ、気軽に旅行へ行くような、そんな感覚で三界を渡ることも、いつかは可能になるかもしれません」"

[[dialogue]]
speaker = "アナ"
# 「……まあ、天界の方々が人間と交流を持ちたがっているかは、微妙なところですけど。私のようなタイプは多分、天使の中でも珍しいので」
line = "「……まあ、天界の方々が人間と交流を持ちたがっているかは、微妙なところですけど。私のようなタイプは多分、天使の中でも珍しいので」"

[[dialogue]]
speaker = "unk"
# それが、アナの夢なんだな
line = "それが、アナの夢なんだな"

[[dialogue]]
speaker = "アナ"
# 「夢……そう考えたことはありませんでしたが、そうかもしれません」
line = "「夢……そう考えたことはありませんでしたが、そうかもしれません」"

[[dialogue]]
speaker = "アナ"
# 「私は天界の、『ウル』という学術都市が出身。だから人間界に興味を持つことができた」
line = "「私は天界の、『ウル』という学術都市が出身。だから人間界に興味を持つことができた」"

[[dialogue]]
speaker = "アナ"
# 「でも、ほとんどの天使はそうじゃない。ウルで三界について研究している天使はいても、実際に来たことがある天使はほとんどいない」
line = "「でも、ほとんどの天使はそうじゃない。ウルで三界について研究している天使はいても、実際に来たことがある天使はほとんどいない」"

[[dialogue]]
speaker = "アナ"
# 「……人間界はとても特殊。魔族もいて、天使もいるような場所はほかにない。人間界に来れば、色々な刺激を受けられる」
line = "「……人間界はとても特殊。魔族もいて、天使もいるような場所はほかにない。人間界に来れば、色々な刺激を受けられる」"

[[dialogue]]
speaker = "アナ"
# 「いつかお互いの世界を気楽に行き来できるようになれば、文化や文明にいい影響を及ぼすと思うし……」
line = "「いつかお互いの世界を気楽に行き来できるようになれば、文化や文明にいい影響を及ぼすと思うし……」"

[[dialogue]]
speaker = "アナ"
# 「それに……人間界がいいところだって、私はみんなに知ってもらいたい」
line = "「それに……人間界がいいところだって、私はみんなに知ってもらいたい」"

[[dialogue]]
speaker = "アナ"
# 「──ふむ。会長も、天界がどういうところなのか気になっていたと？」
line = "「──ふむ。会長も、天界がどういうところなのか気になっていたと？」"

[[dialogue]]
speaker = "アナ"
# 「ですが、天界はそんなに楽しいところではありませんよ」
line = "「ですが、天界はそんなに楽しいところではありませんよ」"

[[dialogue]]
speaker = "unk"
# ……そうなの？
line = "……そうなの？"

[[dialogue]]
speaker = "アナ"
# 「娯楽があまりありませんから。天界にはゲームセンターもありませんし、お菓子屋さんもありません」
line = "「娯楽があまりありませんから。天界にはゲームセンターもありませんし、お菓子屋さんもありません」"

[[dialogue]]
speaker = "アナ"
# 「……そう考えたら、帰りたくなくなってきました」
line = "「……そう考えたら、帰りたくなくなってきました」"

[[dialogue]]
speaker = "アナ"
# 「もしかして、和菓子を天界に持ち帰る方法を考えるほうが先？　でも、和菓子は日持ちしないし、どうすれば……」
line = "「もしかして、和菓子を天界に持ち帰る方法を考えるほうが先？　でも、和菓子は日持ちしないし、どうすれば……」"

[[dialogue]]
speaker = "アナ"
# 「和菓子屋を天界に作れば……でも、職人さんと原材料を確保するためには、やっぱり人間界との交流は持たないと……」
line = "「和菓子屋を天界に作れば……でも、職人さんと原材料を確保するためには、やっぱり人間界との交流は持たないと……」"

[[dialogue]]
speaker = "アナ"
# 「──うん。決めた」
line = "「──うん。決めた」"

[[dialogue]]
speaker = "アナ"
# 「私の夢は、天界に和菓子屋さんを作ること。そのために、三界の行き来をよくする」
line = "「私の夢は、天界に和菓子屋さんを作ること。そのために、三界の行き来をよくする」"

[[dialogue]]
speaker = "unk"
# でも、アナらしくていいんじゃないか？
line = "でも、アナらしくていいんじゃないか？"

[[dialogue]]
speaker = "unk"
# 現金だな！
line = "現金だな！"

[[dialogue]]
speaker = "アナ"
# 「やはり、世界が良くなるためには和菓子屋が必要。美味しいは正義」
line = "「やはり、世界が良くなるためには和菓子屋が必要。美味しいは正義」"

[[dialogue]]
speaker = "アナ"
# 「そうと決まれば、会長。私は軌道エレベーターのことについてもっと調べるから、会長はどんな和菓子をメニューにおくべきか検討しておいて欲しい」
line = "「そうと決まれば、会長。私は軌道エレベーターのことについてもっと調べるから、会長はどんな和菓子をメニューにおくべきか検討しておいて欲しい」"

[[dialogue]]
speaker = "アナ"
# 「できれば、モナカと羊羹、あとは金平糖とカステラは置いておいて欲しい。どうしてもというのならカスタードもあり。私は多様性を否定しない」
line = "「できれば、モナカと羊羹、あとは金平糖とカステラは置いておいて欲しい。どうしてもというのならカスタードもあり。私は多様性を否定しない」"

[[dialogue]]
speaker = "unk"
# 和菓子屋を開くように聞こえるんだけど
line = "和菓子屋を開くように聞こえるんだけど"

[[dialogue]]
speaker = "unk"
# なんか、俺とアナで……
line = "なんか、俺とアナで……"

[[dialogue]]
speaker = "アナ"
# 「そのつもりですが……嫌でしたか？」
line = "「そのつもりですが……嫌でしたか？」"

[[dialogue]]
speaker = "アナ"
# 「私は、会長となら楽しそうだと思ったのですが……」
line = "「私は、会長となら楽しそうだと思ったのですが……」"

[[dialogue]]
speaker = "unk"
# なら、チョコレート味のモナカとか、どう？
line = "なら、チョコレート味のモナカとか、どう？"

[[dialogue]]
speaker = "unk"
# なるほど。
line = "なるほど。"

[[dialogue]]
speaker = "unk"
# 俺は提案しつつ、アナの横の席に座る。
line = "俺は提案しつつ、アナの横の席に座る。"

[[dialogue]]
speaker = "アナ"
# 「邪道ですが、認めます。ですが……」
line = "「邪道ですが、認めます。ですが……」"

[[dialogue]]
speaker = "unk"
# すると、アナは席から立ち上がって、当たり前のように俺の膝上に移動しつつ──
line = "すると、アナは席から立ち上がって、当たり前のように俺の膝上に移動しつつ──"

[[dialogue]]
speaker = "アナ"
# 「チョコレートには、緑茶じゃなくて、紅茶を出したいですね」
line = "「チョコレートには、緑茶じゃなくて、紅茶を出したいですね」"

[[dialogue]]
speaker = "unk"
# ちらりと横目で見上げながら、嬉しそうに笑うのだった。
line = "ちらりと横目で見上げながら、嬉しそうに笑うのだった。"
