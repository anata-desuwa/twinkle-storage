[[dialogue]]
speaker = "unk"
# 第３話,出禁のレイラ,P
line = "第３話,出禁のレイラ,P"

[[dialogue]]
speaker = "unk"
# レイラとのデートは仕切り直しになった。その待ち合わせに向かっていると──
line = "レイラとのデートは仕切り直しになった。その待ち合わせに向かっていると──"

[[dialogue]]
speaker = "キサナ"
# 「テメエは出禁だ！　さっさと出てけ！」
line = "「テメエは出禁だ！　さっさと出てけ！」"

[[dialogue]]
speaker = "レイラ"
# 「そんなぁ！」
line = "「そんなぁ！」"

[[dialogue]]
speaker = "キサナ"
# 「テメエが出入りすると店が潰れんだよ！」
line = "「テメエが出入りすると店が潰れんだよ！」"

[[dialogue]]
speaker = "unk"
# そのレイラが飲食店からつまみ出されていた。しかもつまみ出したのは彼女の仲間であるキサナだ。
line = "そのレイラが飲食店からつまみ出されていた。しかもつまみ出したのは彼女の仲間であるキサナだ。"

[[dialogue]]
speaker = "キサナ"
# 「お、魔王じゃねえか。ちょうどいい。そのバカ、オマエのツレだろ。早く連れてけ」
line = "「お、魔王じゃねえか。ちょうどいい。そのバカ、オマエのツレだろ。早く連れてけ」"

[[dialogue]]
speaker = "キサナ"
# 「じゃあな」
line = "「じゃあな」"

[[dialogue]]
speaker = "unk"
# 何があったの？
line = "何があったの？"

[[dialogue]]
speaker = "レイラ"
# 「私、魔王さんもご存知の通りたくさん食べるので、食べ放題のお店をよく利用するのですが、ことごとく出禁を食らっていまして……」
line = "「私、魔王さんもご存知の通りたくさん食べるので、食べ放題のお店をよく利用するのですが、ことごとく出禁を食らっていまして……」"

[[dialogue]]
speaker = "レイラ"
# 「さっきのお店で流星市国の食べ放題全てで出禁になってしまいました」
line = "「さっきのお店で流星市国の食べ放題全てで出禁になってしまいました」"

[[dialogue]]
speaker = "レイラ"
# 「こんなことが、こんなことが許されていいんですか……っ！」
line = "「こんなことが、こんなことが許されていいんですか……っ！」"

[[dialogue]]
speaker = "unk"
# 残念ながら当然
line = "残念ながら当然"

[[dialogue]]
speaker = "レイラ"
# 「なんですと！？」
line = "「なんですと！？」"

[[dialogue]]
speaker = "unk"
# レイラの健啖ぶりは大食いという範疇には収まらない。食べ放題のお店からすればたまったものではないだろう。
line = "レイラの健啖ぶりは大食いという範疇には収まらない。食べ放題のお店からすればたまったものではないだろう。"

[[dialogue]]
speaker = "レイラ"
# 「前回は私の用事で振り回してしまいましたから、デートで食べすぎないよう、先に何か食べていこうと思ったのですが……恥ずかしいところをお見せしてしまいました」
line = "「前回は私の用事で振り回してしまいましたから、デートで食べすぎないよう、先に何か食べていこうと思ったのですが……恥ずかしいところをお見せしてしまいました」"

[[dialogue]]
speaker = "unk"
# よく分からないが、レイラなりの気遣いということだろうか。
line = "よく分からないが、レイラなりの気遣いということだろうか。"

[[dialogue]]
speaker = "レイラ"
# 「……恋人なんだから、そんなに気を遣わなくても大丈夫？　……魔王さん、優しいです。キのつく魔族とは大違いです」
line = "「……恋人なんだから、そんなに気を遣わなくても大丈夫？　……魔王さん、優しいです。キのつく魔族とは大違いです」"

[[dialogue]]
speaker = "レイラ"
# 「それに、今日デートで行くのは空腹の心配が要らないところ……？　そんな楽園が本当にあるんですか！？」
line = "「それに、今日デートで行くのは空腹の心配が要らないところ……？　そんな楽園が本当にあるんですか！？」"

[[dialogue]]
speaker = "レイラ"
# 「海だぁ！」
line = "「海だぁ！」"

[[dialogue]]
speaker = "unk"
# ここは本物の海ではなく、リップルによって作られたリゾート結界だ。ここでは星術によって夏の海を再現している。
line = "ここは本物の海ではなく、リップルによって作られたリゾート結界だ。ここでは星術によって夏の海を再現している。"

[[dialogue]]
speaker = "レイラ"
# 「訓練でプライベート結界をお借りしたことはありますけど、こちら側のリゾート結界にお邪魔するのは初めてですね」
line = "「訓練でプライベート結界をお借りしたことはありますけど、こちら側のリゾート結界にお邪魔するのは初めてですね」"

[[dialogue]]
speaker = "unk"
# 水着、似合ってる
line = "水着、似合ってる"

[[dialogue]]
speaker = "レイラ"
# 「な！？　と、突然何を言ってるんですか。魔王さんのエッチ……でも、ありがとうございます」
line = "「な！？　と、突然何を言ってるんですか。魔王さんのエッチ……でも、ありがとうございます」"

[[dialogue]]
speaker = "unk"
# 照れのあまり、くねくねするレイラ。可愛いけどちょっと刺激的すぎる。
line = "照れのあまり、くねくねするレイラ。可愛いけどちょっと刺激的すぎる。"

[[dialogue]]
speaker = "リップル"
# 「ラッシャッセー、カイチョー！　と、珍シイお客サンですね？」
line = "「ラッシャッセー、カイチョー！　と、珍シイお客サンですね？」"

[[dialogue]]
speaker = "レイラ"
# 「私は百目騎レイラと申します。コラプサーの……いえ、今日は違いますね。魔王さんとデートに来ました」
line = "「私は百目騎レイラと申します。コラプサーの……いえ、今日は違いますね。魔王さんとデートに来ました」"

[[dialogue]]
speaker = "リップル"
# 「Ｏｈ！　カイチョーとレイラ、ＢＩＧナカヨシ！　ラブラブですね！」
line = "「Ｏｈ！　カイチョーとレイラ、ＢＩＧナカヨシ！　ラブラブですね！」"

[[dialogue]]
speaker = "レイラ"
# 「そんな、私と魔王さんがラブラブだなんて……本当のことですけど<emoji=heart04>」
line = "「そんな、私と魔王さんがラブラブだなんて……本当のことですけど<emoji=heart04>」"

[[dialogue]]
speaker = "レイラ"
# 「リップルさん。ところでこちら、食べ放題と伺ったのですが、それは<ruby=トゥルー>真実</ruby>ですか？」
line = "「リップルさん。ところでこちら、食べ放題と伺ったのですが、それは<ruby>真実<rt>トゥルー</rt></ruby>ですか？」"

[[dialogue]]
speaker = "リップル"
# 「モチのロンです！　リゾート結界は全メニュー、タベホーダイでーす！」
line = "「モチのロンです！　リゾート結界は全メニュー、タベホーダイでーす！」"

[[dialogue]]
speaker = "レイラ"
# 「すごい！　楽園は本当にあったんだ！」
line = "「すごい！　楽園は本当にあったんだ！」"

[[dialogue]]
speaker = "レイラ"
# 「じゃあ、まずカレーをお願いします！」
line = "「じゃあ、まずカレーをお願いします！」"

[[dialogue]]
speaker = "リップル"
# 「はーい、タダイマー！」
line = "「はーい、タダイマー！」"

[[dialogue]]
speaker = "レイラ"
# 「うめ……うめ……海の家とは思えない本格的なカレーですね。あとを引く辛さでスプーンが止まりません」
line = "「うめ……うめ……海の家とは思えない本格的なカレーですね。あとを引く辛さでスプーンが止まりません」"

[[dialogue]]
speaker = "unk"
# おかわりもいいぞ
line = "おかわりもいいぞ"

[[dialogue]]
speaker = "レイラ"
# 「はい！　ではラーメンもいただきます。醤油、味噌、塩、とんこつのメジャーどころだけでなく、まぜそばまで完備とは、リゾート結界おそるべし」
line = "「はい！　ではラーメンもいただきます。醤油、味噌、塩、とんこつのメジャーどころだけでなく、まぜそばまで完備とは、リゾート結界おそるべし」"

[[dialogue]]
speaker = "レイラ"
# 「すいませーん！　全部ください！」
line = "「すいませーん！　全部ください！」"

[[dialogue]]
speaker = "リップル"
# 「タダイマー！」
line = "「タダイマー！」"

[[dialogue]]
speaker = "レイラ"
# 「んー！　味によって麺まで違う！　とんこつにはやっぱり細麺ですよね。ひゅごっ……うめ……うめ……」
line = "「んー！　味によって麺まで違う！　とんこつにはやっぱり細麺ですよね。ひゅごっ……うめ……うめ……」"

[[dialogue]]
speaker = "レイラ"
# 「リップルさん、ハンバーガーはお取り扱いありますか？」
line = "「リップルさん、ハンバーガーはお取り扱いありますか？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　オススメはＢＩＧステーキをハサんだステーキバーガーです！」
line = "「ハイ！　オススメはＢＩＧステーキをハサんだステーキバーガーです！」"

[[dialogue]]
speaker = "レイラ"
# 「じゃあそれを──ハッ！　リップルさん、少しお耳を」
line = "「じゃあそれを──ハッ！　リップルさん、少しお耳を」"

[[dialogue]]
speaker = "リップル"
# 「……ふむふむ、なるホド。それはグッドアイディアです！　サッソクやってみまーす！」
line = "「……ふむふむ、なるホド。それはグッドアイディアです！　サッソクやってみまーす！」"

[[dialogue]]
speaker = "unk"
# リップルがキッチンに入り、しばらくして戻ってくる。
line = "リップルがキッチンに入り、しばらくして戻ってくる。"

[[dialogue]]
speaker = "リップル"
# 「オマタセしましタ！」
line = "「オマタセしましタ！」"

[[dialogue]]
speaker = "レイラ"
# 「デカァァァァいッ説明不要！　ＢＩＧバーガータワー！」
line = "「デカァァァァいッ説明不要！　ＢＩＧバーガータワー！」"

[[dialogue]]
speaker = "レイラ"
# 「人の顔ほどもある巨大バーガーを贅沢にも積み重ねた逸品！　まさしく食の重犯罪！　罪重ねるだけに！　ＨＡＨＡＨＡ！！」
line = "「人の顔ほどもある巨大バーガーを贅沢にも積み重ねた逸品！　まさしく食の重犯罪！　罪重ねるだけに！　ＨＡＨＡＨＡ！！」"

[[dialogue]]
speaker = "レイラ"
# 「これこそ人の夢！　人の業！　圧巻です。生きててよかった……うめ……うめ……」
line = "「これこそ人の夢！　人の業！　圧巻です。生きててよかった……うめ……うめ……」"

[[dialogue]]
speaker = "レイラ"
# 「ん？　魔王さん、私の顔に何か付いてます？」
line = "「ん？　魔王さん、私の顔に何か付いてます？」"

[[dialogue]]
speaker = "unk"
# 幸せそうに食べるなって
line = "幸せそうに食べるなって"

[[dialogue]]
speaker = "レイラ"
# 「はい！　だって幸せですから！　……うめ……うめ……うめぇ……」
line = "「はい！　だって幸せですから！　……うめ……うめ……うめぇ……」"

[[dialogue]]
speaker = "unk"
# 一心不乱にハンバーガーを頬張るレイラ。見ているだけでこっちも幸せになりそうな笑顔だった。
line = "一心不乱にハンバーガーを頬張るレイラ。見ているだけでこっちも幸せになりそうな笑顔だった。"
