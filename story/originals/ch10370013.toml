[[dialogue]]
speaker = "unk"
# 第３話,ふわふわフードジーニアス,P
line = "第３話,ふわふわフードジーニアス,P"

[[dialogue]]
speaker = "unk"
# とある休日、街へ出かけていると、オープンカフェに座っている珍しい２人組を見かけた。
line = "とある休日、街へ出かけていると、オープンカフェに座っている珍しい２人組を見かけた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「さすがサランね。ここのズコットケーキ、凄く美味しいわ！」
line = "「さすがサランね。ここのズコットケーキ、凄く美味しいわ！」"

[[dialogue]]
speaker = "サラン"
# 「でしょ～？　ヴィーちゃん、きっと好きだろうな～って思って。最近見つけた中で１番のおすすめスイーツなんだ～」
line = "「でしょ～？　ヴィーちゃん、きっと好きだろうな～って思って。最近見つけた中で１番のおすすめスイーツなんだ～」"

[[dialogue]]
speaker = "unk"
# 珍しい組み合わせだな
line = "珍しい組み合わせだな"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら、クロトじゃない。１人で買い物に来たの？」
line = "「あら、クロトじゃない。１人で買い物に来たの？」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんだ～。やっほ～♪　会長ちゃんも、一緒にスイーツ食べる～？」
line = "「会長ちゃんだ～。やっほ～♪　会長ちゃんも、一緒にスイーツ食べる～？」"

[[dialogue]]
speaker = "unk"
# まさか２人が仲良いだなんて知らなかったよ
line = "まさか２人が仲良いだなんて知らなかったよ"

[[dialogue]]
speaker = "サラン"
# 「サランとヴィ―ちゃんはね、学園に入学する前からの友達なんだよ～」
line = "「サランとヴィ―ちゃんはね、学園に入学する前からの友達なんだよ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「九浄も桜十路も流星市国の『五名門』だから。家同士の繋がりがあるのよ」
line = "「九浄も桜十路も流星市国の『五名門』だから。家同士の繋がりがあるのよ」"

[[dialogue]]
speaker = "unk"
# 五名門？
line = "五名門？"

[[dialogue]]
speaker = "サラン"
# 「流星市国には『五名門』っていう５つの大きな家があってね、サランの桜十路家や、ヴィーちゃんの九浄家がその１つなんだよ～」
line = "「流星市国には『五名門』っていう５つの大きな家があってね、サランの桜十路家や、ヴィーちゃんの九浄家がその１つなんだよ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「各家には流星市国内における重要な役割があるわ。九浄家は『人材』――」
line = "「各家には流星市国内における重要な役割があるわ。九浄家は『人材』――」"

[[dialogue]]
speaker = "サラン"
# 「桜十路家は、『食品』の分野で色々経営しているんだよ～♪」
line = "「桜十路家は、『食品』の分野で色々経営しているんだよ～♪」"

[[dialogue]]
speaker = "unk"
# そこまで話していると、パティシエの格好をした男性がケーキを持ってやって来る。
line = "そこまで話していると、パティシエの格好をした男性がケーキを持ってやって来る。"

[[dialogue]]
speaker = "カフェの店長"
# 「サランお嬢様、ようこそいらっしゃいました」
line = "「サランお嬢様、ようこそいらっしゃいました」"

[[dialogue]]
speaker = "サラン"
# 「店長さん、こんにちは～。今日は友達とズコットケーキを食べに来ました～」
line = "「店長さん、こんにちは～。今日は友達とズコットケーキを食べに来ました～」"

[[dialogue]]
speaker = "unk"
# お嬢様？
line = "お嬢様？"

[[dialogue]]
speaker = "サラン"
# 「えっとね、ここの店長さんは前に桜十路系列の洋菓子店で働いてたことがあって～。独立して、ここのお店を開く時に、桜十路が一部出資したの～」
line = "「えっとね、ここの店長さんは前に桜十路系列の洋菓子店で働いてたことがあって～。独立して、ここのお店を開く時に、桜十路が一部出資したの～」"

[[dialogue]]
speaker = "カフェの店長"
# 「左様でございます。しかし、それを抜きにしても、お嬢様のことはいちパティシエとして深く尊敬しております」
line = "「左様でございます。しかし、それを抜きにしても、お嬢様のことはいちパティシエとして深く尊敬しております」"

[[dialogue]]
speaker = "サラン"
# 「ところで店長さん、その凄く美味しそうなズコットケーキは何ですか～？　サラン、このお店のケーキは全部食べたけど、見たことないような～？」
line = "「ところで店長さん、その凄く美味しそうなズコットケーキは何ですか～？　サラン、このお店のケーキは全部食べたけど、見たことないような～？」"

[[dialogue]]
speaker = "カフェの店長"
# 「一目で見抜くとは流石です。実は今度新しくメニューに加えようと思っている新作のケーキでして」
line = "「一目で見抜くとは流石です。実は今度新しくメニューに加えようと思っている新作のケーキでして」"

[[dialogue]]
speaker = "カフェの店長"
# 「サランお嬢様がいらっしゃっているとスタッフから聞いて、是非試食して頂ければと思いまして。もちろん、お代は要りません！」
line = "「サランお嬢様がいらっしゃっているとスタッフから聞いて、是非試食して頂ければと思いまして。もちろん、お代は要りません！」"

[[dialogue]]
speaker = "サラン"
# 「えっ、食べていいんですか～？　やった～♪」
line = "「えっ、食べていいんですか～？　やった～♪」"

[[dialogue]]
speaker = "サラン"
# 「それじゃあ、いただきま～す♪　あむっ……もぐもぐ……んんっ！？」
line = "「それじゃあ、いただきま～す♪　あむっ……もぐもぐ……んんっ！？」"

[[dialogue]]
speaker = "サラン"
# 「ふわ～、美味しい～！　店長さん、これ凄く美味しいです～♪　ふわふわする～♪」
line = "「ふわ～、美味しい～！　店長さん、これ凄く美味しいです～♪　ふわふわする～♪」"

[[dialogue]]
speaker = "カフェの店長"
# 「本当ですか！？　ありがとうございます！」
line = "「本当ですか！？　ありがとうございます！」"

[[dialogue]]
speaker = "サラン"
# 「見た目も、とっても可愛いし～♪　女の子中心にＳＮＳとかで広がって、大人気メニューになるかも～♪」
line = "「見た目も、とっても可愛いし～♪　女の子中心にＳＮＳとかで広がって、大人気メニューになるかも～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サランが言うなら、これはもう間違いないわね」
line = "「サランが言うなら、これはもう間違いないわね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サランは凄いのよ。小さい時からサランが味を認めた料理や新商品は必ず大成功を収めているの！」
line = "「サランは凄いのよ。小さい時からサランが味を認めた料理や新商品は必ず大成功を収めているの！」"

[[dialogue]]
speaker = "unk"
# この前のケーキも凄く美味しかった
line = "この前のケーキも凄く美味しかった"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう、サランはお菓子作りの腕も含めて『甘味の天才』と呼ばれている、有名な美食家なのよ！」
line = "「そう、サランはお菓子作りの腕も含めて『甘味の天才』と呼ばれている、有名な美食家なのよ！」"

[[dialogue]]
speaker = "サラン"
# 「いえ～い♪　会長ちゃんも新作ケーキ食べて、サランと一緒にふわふわしよ～♪」
line = "「いえ～い♪　会長ちゃんも新作ケーキ食べて、サランと一緒にふわふわしよ～♪」"

[[dialogue]]
speaker = "サラン"
# 「そうだ～、サランがフォークで食べさせたげる～♪　ほら、あ～ん♪」
line = "「そうだ～、サランがフォークで食べさせたげる～♪　ほら、あ～ん♪」"

[[dialogue]]
speaker = "unk"
# って、サランまた酔っ払ってる！？
line = "って、サランまた酔っ払ってる！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「サランの『美食酔い』ね。本当に美味しいものを食べると、サランは気分がふわふわと高揚して、酔っ払ったみたいになってしまうのよ！」
line = "「サランの『美食酔い』ね。本当に美味しいものを食べると、サランは気分がふわふわと高揚して、酔っ払ったみたいになってしまうのよ！」"

[[dialogue]]
speaker = "unk"
# 大丈夫なのか、その特異体質……！？
line = "大丈夫なのか、その特異体質……！？"

[[dialogue]]
speaker = "unk"
# 普通に解説してるけど！
line = "普通に解説してるけど！"

[[dialogue]]
speaker = "カフェの店長"
# 「おお……！　まさか、ふわ神様まで降臨なされるとは、ありがたや……！」
line = "「おお……！　まさか、ふわ神様まで降臨なされるとは、ありがたや……！」"

[[dialogue]]
speaker = "unk"
# ふわ神様って何！？
line = "ふわ神様って何！？"

[[dialogue]]
speaker = "サラン"
# 「ねぇってば～、会長ちゃ～ん、フォークのケーキ食べて～。あ～んして、あ～ん♪」
line = "「ねぇってば～、会長ちゃ～ん、フォークのケーキ食べて～。あ～んして、あ～ん♪」"

[[dialogue]]
speaker = "サラン"
# 「あ～、ひょっとして、あ～んされるの恥ずかしがってる？　会長ちゃん、可愛い～♪」
line = "「あ～、ひょっとして、あ～んされるの恥ずかしがってる？　会長ちゃん、可愛い～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……クロト、随分とサランに懐かれてるのね」
line = "「……クロト、随分とサランに懐かれてるのね」"

[[dialogue]]
speaker = "unk"
# ヴィーナスなんか怒ってない！？
line = "ヴィーナスなんか怒ってない！？"

[[dialogue]]
speaker = "unk"
# ――後日、サランが褒めた新作ケーキは本当にＳＮＳで話題となり、お店は大繁盛するのだった。
line = "――後日、サランが褒めた新作ケーキは本当にＳＮＳで話題となり、お店は大繁盛するのだった。"
