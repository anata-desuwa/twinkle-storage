[[dialogue]]
speaker = "unk"
# 第３話,普通じゃないアプローチ,P
line = "第３話,普通じゃないアプローチ,P"

[[dialogue]]
speaker = "unk"
# とある休日。マトイから、一緒に買い物に行きたいというお誘いがあった。
line = "とある休日。マトイから、一緒に買い物に行きたいというお誘いがあった。"

[[dialogue]]
speaker = "マトイ"
# 「ご、ごめんね……私のわけわからない提案に付き合ってもらっちゃって……」
line = "「ご、ごめんね……私のわけわからない提案に付き合ってもらっちゃって……」"

[[dialogue]]
speaker = "マトイ"
# 「『普通じゃないお出かけ』がしてみたいなんて話、本当に受けてくれるとは思わなくて……な、何かごめんなさいっ」
line = "「『普通じゃないお出かけ』がしてみたいなんて話、本当に受けてくれるとは思わなくて……な、何かごめんなさいっ」"

[[dialogue]]
speaker = "unk"
# よろこんで協力するよ
line = "よろこんで協力するよ"

[[dialogue]]
speaker = "マトイ"
# 「そ、そう？　よかった……受けてくれるとは思わなかったって言ったけど、断られた時のことも考えてなくて……えへへ」
line = "「そ、そう？　よかった……受けてくれるとは思わなかったって言ったけど、断られた時のことも考えてなくて……えへへ」"

[[dialogue]]
speaker = "マトイ"
# 「そ、それでね、今日なんだけど……テーマはさっきも言ったとおり『普通じゃないお出かけ』なんだ」
line = "「そ、それでね、今日なんだけど……テーマはさっきも言ったとおり『普通じゃないお出かけ』なんだ」"

[[dialogue]]
speaker = "マトイ"
# 「やっぱり、その、普通のままじゃいやだなって思って。だって普通のままだったら、気になる人が出来ても注目してもらえないじゃない……？」
line = "「やっぱり、その、普通のままじゃいやだなって思って。だって普通のままだったら、気になる人が出来ても注目してもらえないじゃない……？」"

[[dialogue]]
speaker = "マトイ"
# 「それで私、もうちょっと頑張ってみたいって思ったの……！」
line = "「それで私、もうちょっと頑張ってみたいって思ったの……！」"

[[dialogue]]
speaker = "マトイ"
# 「だから、今日はよろしくお願いしますっ」
line = "「だから、今日はよろしくお願いしますっ」"

[[dialogue]]
speaker = "マトイ"
# 「え～と……買い物リストを見る限りでは、これが最後かな。まったくヴィーナスってば、人使いが荒いんだから」
line = "「え～と……買い物リストを見る限りでは、これが最後かな。まったくヴィーナスってば、人使いが荒いんだから」"

[[dialogue]]
speaker = "マトイ"
# 「ていうか、ＵＭＯとかチェスとか、遊ぶ気満々じゃない！　……まあ、いいけど」
line = "「ていうか、ＵＭＯとかチェスとか、遊ぶ気満々じゃない！　……まあ、いいけど」"

[[dialogue]]
speaker = "マトイ"
# 「会長、ごめんね。荷物、重くない？　結構な量になっちゃってるけど……」
line = "「会長、ごめんね。荷物、重くない？　結構な量になっちゃってるけど……」"

[[dialogue]]
speaker = "unk"
# でも、今のところ普通の買い出しだな
line = "でも、今のところ普通の買い出しだな"

[[dialogue]]
speaker = "unk"
# 鍛えてるから大丈夫。
line = "鍛えてるから大丈夫。"

[[dialogue]]
speaker = "マトイ"
# 「へっ！？　そ、そうかな……？　まあ、確かにそうかも……」
line = "「へっ！？　そ、そうかな……？　まあ、確かにそうかも……」"

[[dialogue]]
speaker = "マトイ"
# 「……よ、よしっ。ねえ、荷物重そうだし、一緒に持つよ」
line = "「……よ、よしっ。ねえ、荷物重そうだし、一緒に持つよ」"

[[dialogue]]
speaker = "マトイ"
# 「女の子に持たせるのは気が引ける……？　そ、そんなの気にしなくていいから。ほらっ、貸して貸してっ……！」
line = "「女の子に持たせるのは気が引ける……？　そ、そんなの気にしなくていいから。ほらっ、貸して貸してっ……！」"

[[dialogue]]
speaker = "unk"
# ま、マトイ……？　手が……
line = "ま、マトイ……？　手が……"

[[dialogue]]
speaker = "マトイ"
# 「い、一緒に持つって、言ったじゃない？　だだだ、だからほら……こうやって会長の手を握ってね、一緒に持ってあげてるっていうかっ……！」
line = "「い、一緒に持つって、言ったじゃない？　だだだ、だからほら……こうやって会長の手を握ってね、一緒に持ってあげてるっていうかっ……！」"

[[dialogue]]
speaker = "マトイ"
# 「こ、これって、ほら、ふ、普通じゃないよね！？　普通の子は、こんなことしないよね！？」
line = "「こ、これって、ほら、ふ、普通じゃないよね！？　普通の子は、こんなことしないよね！？」"

[[dialogue]]
speaker = "マトイ"
# 「わ、私なら大丈夫だから！　ほらっ、このまま次いこっ！　私お腹減っちゃった！」
line = "「わ、私なら大丈夫だから！　ほらっ、このまま次いこっ！　私お腹減っちゃった！」"

[[dialogue]]
speaker = "unk"
# 手が触れ合ったまま、マトイのオススメだというクレープ屋へ向かった──
line = "手が触れ合ったまま、マトイのオススメだというクレープ屋へ向かった──"

[[dialogue]]
speaker = "マトイ"
# 「結構早く買えたね……あそこのクレープ屋さん、いつも並んでるから時間かかると思ったんだけど」
line = "「結構早く買えたね……あそこのクレープ屋さん、いつも並んでるから時間かかると思ったんだけど」"

[[dialogue]]
speaker = "マトイ"
# 「早速食べよっか。はぁぁむっ……んんっ、……んん！　お、美味しい……！　生地がぱりぱり系なのかな？　ちょっと新しい食感かも♪」
line = "「早速食べよっか。はぁぁむっ……んんっ、……んん！　お、美味しい……！　生地がぱりぱり系なのかな？　ちょっと新しい食感かも♪」"

[[dialogue]]
speaker = "マトイ"
# 「会長のは？　チョコレート味だったよね。美味しい？」
line = "「会長のは？　チョコレート味だったよね。美味しい？」"

[[dialogue]]
speaker = "マトイ"
# 「…………ね、ねえ、ひ、１口交換してみない？　そっちの味も気になるし」
line = "「…………ね、ねえ、ひ、１口交換してみない？　そっちの味も気になるし」"

[[dialogue]]
speaker = "マトイ"
# 「へっ、か、間接キスになるんじゃないかって……そそそそ、そんなの全然大丈夫だよっ！　同級生同士なら全然普通のことだってっ」
line = "「へっ、か、間接キスになるんじゃないかって……そそそそ、そんなの全然大丈夫だよっ！　同級生同士なら全然普通のことだってっ」"

[[dialogue]]
speaker = "マトイ"
# 「はむっ……もぐ、もぐ……んっ、んんっ！？　こっちもすっごく美味しい～～！　中にベリー系のジャムが入ってるのかな、ちょっと酸味もあっていい感じ～♪」
line = "「はむっ……もぐ、もぐ……んっ、んんっ！？　こっちもすっごく美味しい～～！　中にベリー系のジャムが入ってるのかな、ちょっと酸味もあっていい感じ～♪」"

[[dialogue]]
speaker = "unk"
# （マトイの頬についたチョコレートを取ってあげる）
line = "（マトイの頬についたチョコレートを取ってあげる）"

[[dialogue]]
speaker = "マトイ"
# 「っっ──！？！？！？」
line = "「っっ──！？！？！？」"

[[dialogue]]
speaker = "マトイ"
# 「そっ、そういうことを軽々しくするのは、普通じゃないよ！？　女の子は勘違いしちゃうんだからね……っ！」
line = "「そっ、そういうことを軽々しくするのは、普通じゃないよ！？　女の子は勘違いしちゃうんだからね……っ！」"

[[dialogue]]
speaker = "unk"
# 普通じゃなくていいはずなのに、何か怒られた！？
line = "普通じゃなくていいはずなのに、何か怒られた！？"

[[dialogue]]
speaker = "マトイ"
# 「……今日は付き合ってくれて、ありがとうね。なんか、空回りしっぱなしだった気もするけど……うぅ……じ、自己嫌悪……」
line = "「……今日は付き合ってくれて、ありがとうね。なんか、空回りしっぱなしだった気もするけど……うぅ……じ、自己嫌悪……」"

[[dialogue]]
speaker = "マトイ"
# 「そ、そもそも、私からしたら、男の子と２人でお出かけすること自体が、普通じゃなかったというか……ちょっと高望みしすぎたのかも……」
line = "「そ、そもそも、私からしたら、男の子と２人でお出かけすること自体が、普通じゃなかったというか……ちょっと高望みしすぎたのかも……」"

[[dialogue]]
speaker = "マトイ"
# 「その……ごめんね？　つまらなかった、よね……？　でも、少しでも、気になる人に見てもらえるようになりたくて……」
line = "「その……ごめんね？　つまらなかった、よね……？　でも、少しでも、気になる人に見てもらえるようになりたくて……」"

[[dialogue]]
speaker = "unk"
# 俺は楽しかったよ。マトイは楽しくなかった？
line = "俺は楽しかったよ。マトイは楽しくなかった？"

[[dialogue]]
speaker = "マトイ"
# 「へっ？　う、ううんっ、そんなことない！　私も、とっても楽しかった……！」
line = "「へっ？　う、ううんっ、そんなことない！　私も、とっても楽しかった……！」"

[[dialogue]]
speaker = "マトイ"
# 「でも……本当に？　ずっと私がワタワタしてるばっかりだったし……」
line = "「でも……本当に？　ずっと私がワタワタしてるばっかりだったし……」"

[[dialogue]]
speaker = "unk"
# 今日のマトイは『普通』じゃなかった
line = "今日のマトイは『普通』じゃなかった"

[[dialogue]]
speaker = "マトイ"
# 「そ、そうかな……？　その……今日くらい普通じゃなかったら、気になる人にも見てもらえるようになる、かな……？」
line = "「そ、そうかな……？　その……今日くらい普通じゃなかったら、気になる人にも見てもらえるようになる、かな……？」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、気になる人っていうのは、そのっ！　へ、変な意味じゃないよ！？」
line = "「あっ、気になる人っていうのは、そのっ！　へ、変な意味じゃないよ！？」"

[[dialogue]]
speaker = "マトイ"
# 「気になる人はいるけど、いないっていうかっ！　ああいや、いないわけじゃないんだけど、誤解しないで欲しいっていうか……って、何わけのわかんないこと言ってるんだ、私……！」
line = "「気になる人はいるけど、いないっていうかっ！　ああいや、いないわけじゃないんだけど、誤解しないで欲しいっていうか……って、何わけのわかんないこと言ってるんだ、私……！」"

[[dialogue]]
speaker = "unk"
# でもきっと、相手凄く意識すると……思うぞ？
line = "でもきっと、相手凄く意識すると……思うぞ？"

[[dialogue]]
speaker = "unk"
# そ、そっか……。
line = "そ、そっか……。"

[[dialogue]]
speaker = "マトイ"
# 「ほ、本当？　それなら今日は、頑張ってよかったかな。……えへへ♪」
line = "「ほ、本当？　それなら今日は、頑張ってよかったかな。……えへへ♪」"

[[dialogue]]
speaker = "マトイ"
# 「その……よければまた、こういうことに付き合ってくれると、嬉しいな。どうしても振り向いて欲しい人がいるから、頑張りたいの。ダメ……かな？」
line = "「その……よければまた、こういうことに付き合ってくれると、嬉しいな。どうしても振り向いて欲しい人がいるから、頑張りたいの。ダメ……かな？」"

[[dialogue]]
speaker = "unk"
# ダメじゃない。また一緒に出掛けよう
line = "ダメじゃない。また一緒に出掛けよう"

[[dialogue]]
speaker = "マトイ"
# 「う、うん！　それじゃあ会長……約束ね♪」
line = "「う、うん！　それじゃあ会長……約束ね♪」"

[[dialogue]]
speaker = "マトイ"
# 「じゃ、じゃあ私は星徒会室に荷物だけ届けてくるからっ。ま、また明日～～～っ！」
line = "「じゃ、じゃあ私は星徒会室に荷物だけ届けてくるからっ。ま、また明日～～～っ！」"

[[dialogue]]
speaker = "unk"
# 夜でもわかるくらい、顔を赤く染めて走り去って行くマトイ。残された俺はというと──
line = "夜でもわかるくらい、顔を赤く染めて走り去って行くマトイ。残された俺はというと──"

[[dialogue]]
speaker = "unk"
# （マトイの気になる人って……）
line = "（マトイの気になる人って……）"

[[dialogue]]
speaker = "unk"
# 『普通の女の子』だからこそ伝わってきてしまう好意に、どうしようもなく顔が熱くなってしまうのだった。
line = "『普通の女の子』だからこそ伝わってきてしまう好意に、どうしようもなく顔が熱くなってしまうのだった。"
