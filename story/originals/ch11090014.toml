[[dialogue]]
speaker = "unk"
# 第４話,アルテの残したもの,P
line = "第４話,アルテの残したもの,P"

[[dialogue]]
speaker = "unk"
# 流星市国内でアステラが発生。新星星徒会が急行しようとしたのだが──
line = "流星市国内でアステラが発生。新星星徒会が急行しようとしたのだが──"

[[dialogue]]
speaker = "アルテ"
# 「またアステラとかいうのが発生したのですか？　でしたら私も一緒に行きます」
line = "「またアステラとかいうのが発生したのですか？　でしたら私も一緒に行きます」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしたのよ、急に。何か変な物でも食べた？　それともこの前のお肉の恨みがまだ晴らしきれてないとか？」
line = "「どうしたのよ、急に。何か変な物でも食べた？　それともこの前のお肉の恨みがまだ晴らしきれてないとか？」"

[[dialogue]]
speaker = "アルテ"
# 「あなたは私を、食べることしか頭に無い人間だと思っていませんか？」
line = "「あなたは私を、食べることしか頭に無い人間だと思っていませんか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ぶっちゃけ思ってるわ！」
line = "「ぶっちゃけ思ってるわ！」"

[[dialogue]]
speaker = "アルテ"
# 「まったく失礼な人ですね。天才美少女藝術家である私を捕まえて」
line = "「まったく失礼な人ですね。天才美少女藝術家である私を捕まえて」"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあどういう風の吹き回しよ」
line = "「じゃあどういう風の吹き回しよ」"

[[dialogue]]
speaker = "アルテ"
# 「ここ最近、美味しいものを毎日のように食べていますからね。たまには運動するのもいいと思いまして」
line = "「ここ最近、美味しいものを毎日のように食べていますからね。たまには運動するのもいいと思いまして」"

[[dialogue]]
speaker = "アルテ"
# 「元の世界に戻った時、無神経な館長に無神経なことを言われたくありませんし」
line = "「元の世界に戻った時、無神経な館長に無神経なことを言われたくありませんし」"

[[dialogue]]
speaker = "マトイ"
# 「私たち的には人手がある方が助かるけど、いいの？」
line = "「私たち的には人手がある方が助かるけど、いいの？」"

[[dialogue]]
speaker = "アルテ"
# 「いいですよ。いろいろお世話になっていますし、たまには恩返しをさせてもらいます」
line = "「いいですよ。いろいろお世話になっていますし、たまには恩返しをさせてもらいます」"

[[dialogue]]
speaker = "unk"
# アルテを伴って、アステラの発生現場に向かう。
line = "アルテを伴って、アステラの発生現場に向かう。"

[[dialogue]]
speaker = "unk"
# 現れたモンスターたちは強力だったが、アルテが戦力に加わってくれたおかげで無事に倒すことが出来た。
line = "現れたモンスターたちは強力だったが、アルテが戦力に加わってくれたおかげで無事に倒すことが出来た。"

[[dialogue]]
speaker = "ヴィーナス"
# 「すっかりこっちの世界での戦い方も板についてきたわね」
line = "「すっかりこっちの世界での戦い方も板についてきたわね」"

[[dialogue]]
speaker = "マトイ"
# 「アルテさんがいてくれて本当に助かるよ～」
line = "「アルテさんがいてくれて本当に助かるよ～」"

[[dialogue]]
speaker = "アルテ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# どうしたの？
line = "どうしたの？"

[[dialogue]]
speaker = "アルテ"
# 「いえ、少し考えごとをしていただけです」
line = "「いえ、少し考えごとをしていただけです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういえばさっきの戦いの最中も、私たちのことをじっと見てる感じがあったわね」
line = "「そういえばさっきの戦いの最中も、私たちのことをじっと見てる感じがあったわね」"

[[dialogue]]
speaker = "アルテ"
# 「目ざといですね、気付いていたんですか？」
line = "「目ざといですね、気付いていたんですか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふふ、甘く見ないことね……私にかかればなんだってお見通しよ！」
line = "「ふふふ、甘く見ないことね……私にかかればなんだってお見通しよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうね……あなた、私たちを絵のモチーフにしようとしているんじゃないかしら？」
line = "「そうね……あなた、私たちを絵のモチーフにしようとしているんじゃないかしら？」"

[[dialogue]]
speaker = "アルテ"
# 「うわぁ……その得意げな顔、腹立ちますね……」
line = "「うわぁ……その得意げな顔、腹立ちますね……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「アルテにだけは言われたくないわ！」
line = "「アルテにだけは言われたくないわ！」"

[[dialogue]]
speaker = "マトイ"
# 「でも、アルテさんに描いてもらえるなら嬉しいな。もしかしたらその絵が、後世に語り継がれる名画になったりして……」
line = "「でも、アルテさんに描いてもらえるなら嬉しいな。もしかしたらその絵が、後世に語り継がれる名画になったりして……」"

[[dialogue]]
speaker = "アルテ"
# 「まあ私が描けば歴史に残る名作が生まれること間違いなしですが、すべては気分次第ですね」
line = "「まあ私が描けば歴史に残る名作が生まれること間違いなしですが、すべては気分次第ですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そんなに自信があるなら、たまには描いてみせてよ」
line = "「そんなに自信があるなら、たまには描いてみせてよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それともアルテってもしかして口だけで、本当は絵なんて描けないんじゃないかしら？」
line = "「それともアルテってもしかして口だけで、本当は絵なんて描けないんじゃないかしら？」"

[[dialogue]]
speaker = "アルテ"
# 「おや、そんなこと言っていいんですか？　私の絵を見たら、恥ずかしさと後悔で震えることになりますよ？」
line = "「おや、そんなこと言っていいんですか？　私の絵を見たら、恥ずかしさと後悔で震えることになりますよ？」"

[[dialogue]]
speaker = "アルテ"
# 「まあ、描くとしても元の世界に戻ってから、ということになると思いますが」
line = "「まあ、描くとしても元の世界に戻ってから、ということになると思いますが」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はぁ！？　それじゃ完成しても私たちが見れないじゃない！　何とかして届けて！」
line = "「はぁ！？　それじゃ完成しても私たちが見れないじゃない！　何とかして届けて！」"

[[dialogue]]
speaker = "アルテ"
# 「無理に決まってるでしょう」
line = "「無理に決まってるでしょう」"

[[dialogue]]
speaker = "unk"
# でもアルテの絵は純粋に見てみたいな
line = "でもアルテの絵は純粋に見てみたいな"

[[dialogue]]
speaker = "アルテ"
# 「そうですか？　では、あまり期待しないで待っていてください」
line = "「そうですか？　では、あまり期待しないで待っていてください」"

[[dialogue]]
speaker = "unk"
# と、そんな話をした数日後のこと。
line = "と、そんな話をした数日後のこと。"

[[dialogue]]
speaker = "unk"
# 別れはあっけなく訪れた。
line = "別れはあっけなく訪れた。"

[[dialogue]]
speaker = "unk"
# このお祭り騒ぎの元凶である黒ベア子が、突然現れたベア子という少女によって連れ戻されたのだ。
line = "このお祭り騒ぎの元凶である黒ベア子が、突然現れたベア子という少女によって連れ戻されたのだ。"

[[dialogue]]
speaker = "unk"
# そして、首謀者がいなくなったことで異変は収まり、アルテとプトラはそれぞれの世界へと帰っていった。
line = "そして、首謀者がいなくなったことで異変は収まり、アルテとプトラはそれぞれの世界へと帰っていった。"

[[dialogue]]
speaker = "マトイ"
# 「あれ？　日誌に描いてあるこの絵って、もしかしてアルテさんが描いたものかな？」
line = "「あれ？　日誌に描いてあるこの絵って、もしかしてアルテさんが描いたものかな？」"

[[dialogue]]
speaker = "unk"
# どれどれ？
line = "どれどれ？"

[[dialogue]]
speaker = "アナ"
# 「これはまた前衛的な……この絵を描いた人が私たちと入れ替わりにこちらに来ていた人なのですね」
line = "「これはまた前衛的な……この絵を描いた人が私たちと入れ替わりにこちらに来ていた人なのですね」"

[[dialogue]]
speaker = "サーシャ"
# 「不思議な迫力が伝わってくる絵だわ～」
line = "「不思議な迫力が伝わってくる絵だわ～」"

[[dialogue]]
speaker = "ヴィーナス"
# 「言葉にできないけど、目が離せないわね……あの子、本当にちゃんとした藝術家だったのね」
line = "「言葉にできないけど、目が離せないわね……あの子、本当にちゃんとした藝術家だったのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……あれ？　もしかしてこれ、この絵のモデルって私たちじゃない？」
line = "「……あれ？　もしかしてこれ、この絵のモデルって私たちじゃない？」"

[[dialogue]]
speaker = "unk"
# 言われてみたらそんな気もするな
line = "言われてみたらそんな気もするな"

[[dialogue]]
speaker = "ヴィーナス"
# 「ほら、一緒にモンスターと戦った時の！　間違いないわ！」
line = "「ほら、一緒にモンスターと戦った時の！　間違いないわ！」"

[[dialogue]]
speaker = "マトイ"
# 「アルテさん、ちゃんと私たちの絵を描いてくれてたんだね」
line = "「アルテさん、ちゃんと私たちの絵を描いてくれてたんだね」"

[[dialogue]]
speaker = "マトイ"
# 「でもどれが私なんだろ？　独特な絵でわかりにくいような……」
line = "「でもどれが私なんだろ？　独特な絵でわかりにくいような……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いや、案外特徴を捉えてるわよ。この子でしょ、マトイって。そっくりじゃない」
line = "「いや、案外特徴を捉えてるわよ。この子でしょ、マトイって。そっくりじゃない」"

[[dialogue]]
speaker = "アナ"
# 「ええ、私もマトイ先輩は一番に分かりました」
line = "「ええ、私もマトイ先輩は一番に分かりました」"

[[dialogue]]
speaker = "サーシャ"
# 「目立つところに描いてもらってよかったわね～」
line = "「目立つところに描いてもらってよかったわね～」"

[[dialogue]]
speaker = "マトイ"
# 「……なんかちょっと複雑な気分なんですけど」
line = "「……なんかちょっと複雑な気分なんですけど」"

[[dialogue]]
speaker = "unk"
# アルテの絵の描かれた日誌をみんなで覗き込んで笑い合う。
line = "アルテの絵の描かれた日誌をみんなで覗き込んで笑い合う。"

[[dialogue]]
speaker = "unk"
# そして、アルテが帰ってしまったのはついこの間だというのに、もう寂しい気持ちになってしまって……
line = "そして、アルテが帰ってしまったのはついこの間だというのに、もう寂しい気持ちになってしまって……"

[[dialogue]]
speaker = "unk"
# アルテのお気に入りだったソファについ目をやるのだった。
line = "アルテのお気に入りだったソファについ目をやるのだった。"
