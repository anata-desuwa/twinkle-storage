[[dialogue]]
speaker = "unk"
# シャドウマリオンとの戦いを繰り広げるトワとリーリア達。
line = "シャドウマリオンとの戦いを繰り広げるトワとリーリア達。"

[[dialogue]]
speaker = "unk"
# マリオンの能力である人形縫製によって、倒しても倒してもシャドウの数は増え続けるが――
line = "マリオンの能力である人形縫製によって、倒しても倒してもシャドウの数は増え続けるが――"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「リーリアちゃん、本当にすごい……！」
line = "「リーリアちゃん、本当にすごい……！」"

[[dialogue]]
speaker = "unk"
# トワが味方全員の星力をブーストさせているとはいえ、それ以上にリーリアの戦闘能力の伸びは凄まじかった。
line = "トワが味方全員の星力をブーストさせているとはいえ、それ以上にリーリアの戦闘能力の伸びは凄まじかった。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「仮想空間ですから、出し惜しみ無しでぶっ放しちゃいますよ！　福音の魔弾、８連！　ハピネスイエロー！！」
line = "「仮想空間ですから、出し惜しみ無しでぶっ放しちゃいますよ！　福音の魔弾、８連！　ハピネスイエロー！！」"

[[dialogue]]
speaker = "unk"
# １発１発が凄まじい威力を誇る魔弾の早撃ちによって、シャドウが次々と倒されて行く。
line = "１発１発が凄まじい威力を誇る魔弾の早撃ちによって、シャドウが次々と倒されて行く。"

[[dialogue]]
speaker = "ルルカ"
# 「すごい連射と火力……！　これ相手がマリオンさんじゃなかったら、一瞬で決着しちゃうレベルだよ！？」
line = "「すごい連射と火力……！　これ相手がマリオンさんじゃなかったら、一瞬で決着しちゃうレベルだよ！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「ですが、その火力をもってしても、シャドウが増えるスピードとは互角です」
line = "「ですが、その火力をもってしても、シャドウが増えるスピードとは互角です」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「そうだね。だけど――」
line = "「そうだね。だけど――」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「想いに名付ける色は、もう決まった！」
line = "「想いに名付ける色は、もう決まった！」"

[[dialogue]]
speaker = "unk"
# そう言って、リーリアは片手に魔弾を生成し始める――！
line = "そう言って、リーリアは片手に魔弾を生成し始める――！"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「始まりは大いなる漆黒！　原点の魔弾、ジェネシスブラック！」
line = "「始まりは大いなる漆黒！　原点の魔弾、ジェネシスブラック！」"

[[dialogue]]
speaker = "unk"
# 指で魔弾を弾き、それは新たなる武器である巨大ライフルへと装填されていく。
line = "指で魔弾を弾き、それは新たなる武器である巨大ライフルへと装填されていく。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「絆を繋ぐ新たなる純白！　新星の魔弾、スーパーノヴァホワイト！」
line = "「絆を繋ぐ新たなる純白！　新星の魔弾、スーパーノヴァホワイト！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「そして――最後の１発を彩るは、我が愛しき友たちとの青春！　アオハルレインボー！」
line = "「そして――最後の１発を彩るは、我が愛しき友たちとの青春！　アオハルレインボー！」"

[[dialogue]]
speaker = "unk"
# ３発の弾倉に全て魔弾が収まり、リーリアはシャドウたちから大きく距離を取りながら、ライフルの砲口を向けた。
line = "３発の弾倉に全て魔弾が収まり、リーリアはシャドウたちから大きく距離を取りながら、ライフルの砲口を向けた。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「撃ち抜け！　愛と絆の<b>融合</b>魔弾！！」
line = "「撃ち抜け！　愛と絆の<b>融合</b>魔弾！！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ディアレストレインボー！！！」
line = "「ディアレストレインボー！！！」"

[[dialogue]]
speaker = "unk"
# ライフルから虹色に輝く魔法が撃ち放たれる。
line = "ライフルから虹色に輝く魔法が撃ち放たれる。"

[[dialogue]]
speaker = "unk"
# そして、それは無数の色へと分かれ、全てのシャドウを追尾する閃光となる！
line = "そして、それは無数の色へと分かれ、全てのシャドウを追尾する閃光となる！"

[[dialogue]]
speaker = "シャドウマリオン"
# 「っ――――！」
line = "「っ――――！」"

[[dialogue]]
speaker = "unk"
# ――果たして。
line = "――果たして。"

[[dialogue]]
speaker = "unk"
# 虹色の輝きが収まった後、マリオンのシャドウは仮想空間から一体残らず消え去っていた。
line = "虹色の輝きが収まった後、マリオンのシャドウは仮想空間から一体残らず消え去っていた。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ふぅ……マジカルフィニッシュ☆　ってね」
line = "「ふぅ……マジカルフィニッシュ☆　ってね」"

[[dialogue]]
speaker = "ルルカ"
# 「や、やった……！」
line = "「や、やった……！」"

[[dialogue]]
speaker = "メイプル"
# 「リーリアが、マリオンさんに勝った！」
line = "「リーリアが、マリオンさんに勝った！」"

[[dialogue]]
speaker = "ヨミ"
# 「これがリーリアさんの本気……！　爆裂すごいです！」
line = "「これがリーリアさんの本気……！　爆裂すごいです！」"

[[dialogue]]
speaker = "ルルカ"
# 「うわぁ～！　リーリアちゃん、カッコいいぃ～～～っ！　あたし、感動しちゃったよ～！」
line = "「うわぁ～！　リーリアちゃん、カッコいいぃ～～～っ！　あたし、感動しちゃったよ～！」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「ふふっ、でしょ～？　このアルカンシェルフォームに覚醒するの、マジカル苦労したんだから～」
line = "「ふふっ、でしょ～？　このアルカンシェルフォームに覚醒するの、マジカル苦労したんだから～」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「マムに無人島へ放り込まれたとか言ってましたね」
line = "「マムに無人島へ放り込まれたとか言ってましたね」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「そう！　すごいスパルタでしんどくてさ～」
line = "「そう！　すごいスパルタでしんどくてさ～」"

[[dialogue]]
speaker = "unk"
# 今回のバトルフェスタで魔女代表として選出された際、自身では力不足だと感じていたリーリアは、クロトにアルケインコードを試してもらおうと星徒会室を訪ねていた。
line = "今回のバトルフェスタで魔女代表として選出された際、自身では力不足だと感じていたリーリアは、クロトにアルケインコードを試してもらおうと星徒会室を訪ねていた。"

[[dialogue]]
speaker = "unk"
# その際、マハムートが偶然その場に居合わせており、「仕方ないから覚醒するまで鍛えてあげる」と何故か無人島で命がけのマンツーマンレッスンをすることになったのだった。
line = "その際、マハムートが偶然その場に居合わせており、「仕方ないから覚醒するまで鍛えてあげる」と何故か無人島で命がけのマンツーマンレッスンをすることになったのだった。"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「――それで、なんか私のついでにアルケインコードを使ってもらって、さらっと自分だけ先にノヴァフォームに覚醒してるし～」
line = "「――それで、なんか私のついでにアルケインコードを使ってもらって、さらっと自分だけ先にノヴァフォームに覚醒してるし～」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「でもまぁ、おかげで私もこのフォームに覚醒することができたんで、マムには感謝してるけど……」
line = "「でもまぁ、おかげで私もこのフォームに覚醒することができたんで、マムには感謝してるけど……」"

[[dialogue]]
speaker = "ルルカ"
# 「とりあえず、勝ったからみんなで胴上げしよ、胴上げ！」
line = "「とりあえず、勝ったからみんなで胴上げしよ、胴上げ！」"

[[dialogue]]
speaker = "メイプル"
# 「おっ、いいね～！　ふふふっ、渋谷リーリア。この妹魔王がそなたを今日の勇者と認めてしんぜよう♪」
line = "「おっ、いいね～！　ふふふっ、渋谷リーリア。この妹魔王がそなたを今日の勇者と認めてしんぜよう♪」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「えっ、ちょっ……本当にやるの！？」
line = "「えっ、ちょっ……本当にやるの！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「肯定。自分でもチヤホヤして欲しいと言ってましたしね」
line = "「肯定。自分でもチヤホヤして欲しいと言ってましたしね」"

[[dialogue]]
speaker = "ヨミ"
# 「そういうことなら、私も爆裂お祝いしちゃいます！」
line = "「そういうことなら、私も爆裂お祝いしちゃいます！」"

[[dialogue]]
speaker = "ルルカ"
# 「よ～し、満場一致だね！　それじゃあ、せ～のっ♪」
line = "「よ～し、満場一致だね！　それじゃあ、せ～のっ♪」"

[[dialogue]]
speaker = "リーリア（覚醒）"
# 「待って待って！　胴上げってされるの、私生まれて初めてで……きゃあっ！？」
line = "「待って待って！　胴上げってされるの、私生まれて初めてで……きゃあっ！？」"

[[dialogue]]
speaker = "アナ（覚醒）"
# 「いぇ～い。わっしょいわっしょい」
line = "「いぇ～い。わっしょいわっしょい」"

[[dialogue]]
speaker = "ルルカ"
# 「わ～っしょい♪　わ～っしょい♪」
line = "「わ～っしょい♪　わ～っしょい♪」"

[[dialogue]]
speaker = "unk"
# そんな新星学園１年生組の胴上げを見つめるトワ。
line = "そんな新星学園１年生組の胴上げを見つめるトワ。"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「ふふっ、リーリアちゃん、よかった」
line = "「ふふっ、リーリアちゃん、よかった」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「トワ、なんだか自分のことのように嬉しそうですね」
line = "「トワ、なんだか自分のことのように嬉しそうですね」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「あ、マリオン！　うん、まあね♪」
line = "「あ、マリオン！　うん、まあね♪」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「もしかして最初から、リーリアさんの為に私のシャドウと戦いに来たんですか？」
line = "「もしかして最初から、リーリアさんの為に私のシャドウと戦いに来たんですか？」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「星騎士として、わたしがマリオンに挑戦したかったのは、嘘じゃないよ」
line = "「星騎士として、わたしがマリオンに挑戦したかったのは、嘘じゃないよ」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「ただ……せっかく強くなったのに、リーリアちゃんが自信なさそうにしてるのは、もったいないなぁって」
line = "「ただ……せっかく強くなったのに、リーリアちゃんが自信なさそうにしてるのは、もったいないなぁって」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「リーリアちゃん自身が一番強さを理解してるマリオンに勝てれば、いいきっかけになるでしょ？」
line = "「リーリアちゃん自身が一番強さを理解してるマリオンに勝てれば、いいきっかけになるでしょ？」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「だから共通のライバルであるマリオンのところまで、リーリアちゃんを引っ張ってきたんだぁ♪」
line = "「だから共通のライバルであるマリオンのところまで、リーリアちゃんを引っ張ってきたんだぁ♪」"

[[dialogue]]
speaker = "マリオン（覚醒）"
# 「ふふっ、いい大人になりましたね、トワ」
line = "「ふふっ、いい大人になりましたね、トワ」"

[[dialogue]]
speaker = "トワ先生（覚醒）"
# 「いやいや、まだ全然若いけどね！？　私は！」
line = "「いやいや、まだ全然若いけどね！？　私は！」"

[[dialogue]]
speaker = "unk"
# そう言って、リーリア達を見ながら笑い合うＯＧ組の２人なのだった――
line = "そう言って、リーリア達を見ながら笑い合うＯＧ組の２人なのだった――"
