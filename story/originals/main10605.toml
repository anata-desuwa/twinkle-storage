[[dialogue]]
speaker = "unk"
# 第５話,第５話『クラウディアを追え！』,B
line = "第５話,第５話『クラウディアを追え！』,B"

[[dialogue]]
speaker = "unk"
# 一方──
line = "一方──"

[[dialogue]]
speaker = "セドナ"
# 「──何？　姫様がいない！？」
line = "「──何？　姫様がいない！？」"

[[dialogue]]
speaker = "アイリーン"
# 「は、はい……さっき外にかっ飛んでっちゃいました」
line = "「は、はい……さっき外にかっ飛んでっちゃいました」"

[[dialogue]]
speaker = "セドナ"
# 「なんということだ……部屋がもぬけの殻だと思ったら」
line = "「なんということだ……部屋がもぬけの殻だと思ったら」"

[[dialogue]]
speaker = "ウェンディ"
# 「そういえばさっき、ツェツィーリエがクラウディア様の部屋を訪ねていたような──」
line = "「そういえばさっき、ツェツィーリエがクラウディア様の部屋を訪ねていたような──」"

[[dialogue]]
speaker = "アイリーン"
# 「それが、ツェツィも一緒に飛び出して……」
line = "「それが、ツェツィも一緒に飛び出して……」"

[[dialogue]]
speaker = "ウェンディ"
# 「あ……あの女！　クラウディア様を止めるべき立場でしょうに！　本当にろくなことをしやがりませんね！」
line = "「あ……あの女！　クラウディア様を止めるべき立場でしょうに！　本当にろくなことをしやがりませんね！」"

[[dialogue]]
speaker = "セドナ"
# 「最近、姫様にかまってやれる時間も少なかったからな──すねてしまったのかもしれん」
line = "「最近、姫様にかまってやれる時間も少なかったからな──すねてしまったのかもしれん」"

[[dialogue]]
speaker = "アイリーン"
# 「ごめんなさい、私が止めるべきでした……！」
line = "「ごめんなさい、私が止めるべきでした……！」"

[[dialogue]]
speaker = "セドナ"
# 「姫様の衝動は止めようがないし、我々の監督不行き届きと言えよう」
line = "「姫様の衝動は止めようがないし、我々の監督不行き届きと言えよう」"

[[dialogue]]
speaker = "セドナ"
# 「ところでなんだ、その湯たんぽは」
line = "「ところでなんだ、その湯たんぽは」"

[[dialogue]]
speaker = "アイリーン"
# 「えーと……これは、クラウディア様がくれました。プレゼントにって」
line = "「えーと……これは、クラウディア様がくれました。プレゼントにって」"

[[dialogue]]
speaker = "アイリーン"
# 「なんでもサンタより早くプレゼントを配ることで、サンタを用なしにしてやるとかなんとか……」
line = "「なんでもサンタより早くプレゼントを配ることで、サンタを用なしにしてやるとかなんとか……」"

[[dialogue]]
speaker = "セドナ"
# 「さっぱり意味がわからないが……ともかくそんな調子で外に出られてはきっとろくなことをするまい。行くぞ、ウェンディ！」
line = "「さっぱり意味がわからないが……ともかくそんな調子で外に出られてはきっとろくなことをするまい。行くぞ、ウェンディ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「はい。ツェツィーリエも捕まえないと──追いかけましょう！」
line = "「はい。ツェツィーリエも捕まえないと──追いかけましょう！」"

[[dialogue]]
speaker = "クラウディア"
# 「ほほ～、こんなところがあったのか」
line = "「ほほ～、こんなところがあったのか」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ここには悲喜こもごも、人間たちの欲望が渦巻いてるから、プレゼントをあげるにはぴったりの場所じゃないかな？」
line = "「ここには悲喜こもごも、人間たちの欲望が渦巻いてるから、プレゼントをあげるにはぴったりの場所じゃないかな？」"

[[dialogue]]
speaker = "クラウディア"
# 「なるほど！　いい場所に連れてきてくれて感謝するぞ」
line = "「なるほど！　いい場所に連れてきてくれて感謝するぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「む？　そこのお主、何やら沈んだ顔つきをしておるな」
line = "「む？　そこのお主、何やら沈んだ顔つきをしておるな」"

[[dialogue]]
speaker = "クラウディア"
# 「そんなことではいかんぞ。何か欲しいものはあるか？　ほう、バカラで全額スッてしまったからコインが欲しい──と」
line = "「そんなことではいかんぞ。何か欲しいものはあるか？　ほう、バカラで全額スッてしまったからコインが欲しい──と」"

[[dialogue]]
speaker = "クラウディア"
# 「余に任せるがよい！　サンタなどより早く、お主にプレゼントを贈呈してみせよう！」
line = "「余に任せるがよい！　サンタなどより早く、お主にプレゼントを贈呈してみせよう！」"

[[dialogue]]
speaker = "クラウディア"
# 「はっはっはっ、余にかかればこんなものだ。礼などよい」
line = "「はっはっはっ、余にかかればこんなものだ。礼などよい」"

[[dialogue]]
speaker = "クラウディア"
# 「全額は難しかったが、１／３くらいは戻ってきたのではないか？」
line = "「全額は難しかったが、１／３くらいは戻ってきたのではないか？」"

[[dialogue]]
speaker = "クラウディア"
# 「よいことをすると気分がよいぞ。そこのお主はどうだ？　欲しいものは？　ほう、コインとな。余に任せるがよい！」
line = "「よいことをすると気分がよいぞ。そこのお主はどうだ？　欲しいものは？　ほう、コインとな。余に任せるがよい！」"

[[dialogue]]
speaker = "クラウディア"
# 「はっはっは、余にかかればサンタなど目ではない！　いくらでもプレゼントを恵んでくれようぞ」
line = "「はっはっは、余にかかればサンタなど目ではない！　いくらでもプレゼントを恵んでくれようぞ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「絶好調だねえ、クラウディア様」
line = "「絶好調だねえ、クラウディア様」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。これもお主のベルのおかげだ！　褒めてつかわす！」
line = "「うむ。これもお主のベルのおかげだ！　褒めてつかわす！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「いえいえ、それほどでも～」
line = "「いえいえ、それほどでも～」"

[[dialogue]]
speaker = "ツェツィーリエ"
# （いやあ、クラウディア様がいっぱいホーリー・ベルを使ってくれるおかげで、たくさんデータが取れるなあ……）
line = "（いやあ、クラウディア様がいっぱいホーリー・ベルを使ってくれるおかげで、たくさんデータが取れるなあ……）"

[[dialogue]]
speaker = "クラウディア"
# 「それに……見よ！　皆が余に感謝するではないか！」
line = "「それに……見よ！　皆が余に感謝するではないか！」"

[[dialogue]]
speaker = "クラウディア"
# 「１２月２５日は余、クラウディアの誕生日！　皆の衆、もう覚えたな？　覚えたなら、決して忘れるでない」
line = "「１２月２５日は余、クラウディアの誕生日！　皆の衆、もう覚えたな？　覚えたなら、決して忘れるでない」"

[[dialogue]]
speaker = "クラウディア"
# 「はっはっは、実に気分がよい！　この調子でどんどんプレゼントを配るのだ。さあ、次の場所へ向かうぞ～！」
line = "「はっはっは、実に気分がよい！　この調子でどんどんプレゼントを配るのだ。さあ、次の場所へ向かうぞ～！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「あいあいさーっ」
line = "「あいあいさーっ」"

[[dialogue]]
speaker = "ヘレナ"
# 「先程から我がカジノでコインをばらまいているという輩は誰だ？」
line = "「先程から我がカジノでコインをばらまいているという輩は誰だ？」"

[[dialogue]]
speaker = "ヘレナ"
# 「こんなことをされては経営が成り立たなくなってしまうではないか……即座に没収せよ！」
line = "「こんなことをされては経営が成り立たなくなってしまうではないか……即座に没収せよ！」"

[[dialogue]]
speaker = "セドナ"
# 「姫様はどこに──！」
line = "「姫様はどこに──！」"

[[dialogue]]
speaker = "ウェンディ"
# 「このカジノに来たという情報が──あっ、もういない。遅かったかもしれません……！」
line = "「このカジノに来たという情報が──あっ、もういない。遅かったかもしれません……！」"

[[dialogue]]
speaker = "ヘレナ"
# 「む？　セドナ殿にウェンディ殿──先ほど、貴殿らの姫君がカジノ荒らしにきていたぞ！」
line = "「む？　セドナ殿にウェンディ殿──先ほど、貴殿らの姫君がカジノ荒らしにきていたぞ！」"

[[dialogue]]
speaker = "ウェンディ"
# 「う──そ、それは申し訳ありません。増えたコイン分はお支払いしますので……」
line = "「う──そ、それは申し訳ありません。増えたコイン分はお支払いしますので……」"

[[dialogue]]
speaker = "セドナ"
# 「姫様……はあ。なんと<ruby=ほんぽう>奔放</ruby>にやってくれるものだ」
line = "「姫様……はあ。なんと<ruby>奔放<rt>ほんぽう</rt></ruby>にやってくれるものだ」"

[[dialogue]]
speaker = "ウェンディ"
# 「うう、これでネビュラの資金繰りがまた悪化するぅ～……！」
line = "「うう、これでネビュラの資金繰りがまた悪化するぅ～……！」"
