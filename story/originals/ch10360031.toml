[[dialogue]]
speaker = "unk"
# 第１話,螺旋のフェチズム,P
line = "第１話,螺旋のフェチズム,P"

[[dialogue]]
speaker = "unk"
# 星霊祭を経て、努力する姿を周囲に隠さなくなったヒルディオーネ先輩。
line = "星霊祭を経て、努力する姿を周囲に隠さなくなったヒルディオーネ先輩。"

[[dialogue]]
speaker = "unk"
# 恋人である俺は、彼女と一緒に、昼間もトレーニングをこなすようになっていた――
line = "恋人である俺は、彼女と一緒に、昼間もトレーニングをこなすようになっていた――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「――ふぅ。会長、日課の基礎訓練もひと通り終わりましたし、一旦休憩に致しましょうか」
line = "「――ふぅ。会長、日課の基礎訓練もひと通り終わりましたし、一旦休憩に致しましょうか」"

[[dialogue]]
speaker = "unk"
# はい。それにしても――
line = "はい。それにしても――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ん？　――『ミーティアフォーム』で訓練しているのに、ずっと変身を維持し続けていてすごい、ですの？」
line = "「ん？　――『ミーティアフォーム』で訓練しているのに、ずっと変身を維持し続けていてすごい、ですの？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「おーっほっほっほ！　そうでしょうそうでしょう♪　そこに関しては、ノヴァフォームよりも優れている点だと、自負しておりますわ♪」
line = "「おーっほっほっほ！　そうでしょうそうでしょう♪　そこに関しては、ノヴァフォームよりも優れている点だと、自負しておりますわ♪」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ミーティアフォームは大きな力を扱うが故の制御の難しさはあっても、変身の持続時間に関しては、実は通常戦闘服と大きく変わりませんのよ」
line = "「ミーティアフォームは大きな力を扱うが故の制御の難しさはあっても、変身の持続時間に関しては、実は通常戦闘服と大きく変わりませんのよ」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「おそらく自力で覚醒まで辿り着いたからではないかと分析しておりますけれど、いずれにせよ、これこそがまさにエレガントな覚醒フォームというものですわ♪」
line = "「おそらく自力で覚醒まで辿り着いたからではないかと分析しておりますけれど、いずれにせよ、これこそがまさにエレガントな覚醒フォームというものですわ♪」"

[[dialogue]]
speaker = "unk"
# まさに先輩専用の覚醒フォームですね
line = "まさに先輩専用の覚醒フォームですね"

[[dialogue]]
speaker = "unk"
# 綺麗だし、カッコよくて素敵です
line = "綺麗だし、カッコよくて素敵です"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「なっ……！？　か、会長、いきなりそんなことを言うのはずるいですわよ……！」
line = "「なっ……！？　か、会長、いきなりそんなことを言うのはずるいですわよ……！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「こ、後輩たちも見ておりますのに、<ruby=わたくし>私</ruby>、照れてしまいますわ……<emoji=heart04>」
line = "「こ、後輩たちも見ておりますのに、<ruby>私<rt>わたくし</rt></ruby>、照れてしまいますわ……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「会長とヒルディーお姉様、ごきげんよう♪　お２人でトレーニングですか？」
line = "「会長とヒルディーお姉様、ごきげんよう♪　お２人でトレーニングですか？」"

[[dialogue]]
speaker = "unk"
# と、そこへやってきたのは、流星学園附属校３年生の『染井シズハ』だった。
line = "と、そこへやってきたのは、流星学園附属校３年生の『染井シズハ』だった。"

[[dialogue]]
speaker = "unk"
# 実は周囲には秘密にしているが、彼女は『ロストアイテム』と呼ばれる物の回収を行っている『魔法少女』の１人だったりする。
line = "実は周囲には秘密にしているが、彼女は『ロストアイテム』と呼ばれる物の回収を行っている『魔法少女』の１人だったりする。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「あら、シズハ、ごきげんようですわ。こうして顔を合わせて話すのは、流星寮に入寮してきた時以来ですわね」
line = "「あら、シズハ、ごきげんようですわ。こうして顔を合わせて話すのは、流星寮に入寮してきた時以来ですわね」"

[[dialogue]]
speaker = "シズハ"
# 「あはは、すみません。部活の合気道と、あと、えっと……趣味の<b>ボランティア活動</b>？　で朝とか放課後とか、忙しくて……」
line = "「あはは、すみません。部活の合気道と、あと、えっと……趣味の<b>ボランティア活動</b>？　で朝とか放課後とか、忙しくて……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ボランティア？　あなた……それは本当ですの？」
line = "「ボランティア？　あなた……それは本当ですの？」"

[[dialogue]]
speaker = "シズハ"
# 「えっ」
line = "「えっ」"

[[dialogue]]
speaker = "unk"
# シズハはギクリと体を硬直させ、顔を引きつらせる。先輩はそんな彼女の肩に手を置いて――
line = "シズハはギクリと体を硬直させ、顔を引きつらせる。先輩はそんな彼女の肩に手を置いて――"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「まさか……あなたがそんな偉いことをしていたなんて知りませんでしたわ！　淑女として、実にエレガントな行いでしてよ！」
line = "「まさか……あなたがそんな偉いことをしていたなんて知りませんでしたわ！　淑女として、実にエレガントな行いでしてよ！」"

[[dialogue]]
speaker = "unk"
# うんうんと力強く頷きながら、笑顔を浮かべて褒める。
line = "うんうんと力強く頷きながら、笑顔を浮かべて褒める。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「私にも協力できることがあれば、気軽に相談しに来てくださいましね。寮長として、あなたが良き学園生活を送れるように全力でサポート致しますわ！」
line = "「私にも協力できることがあれば、気軽に相談しに来てくださいましね。寮長として、あなたが良き学園生活を送れるように全力でサポート致しますわ！」"

[[dialogue]]
speaker = "シズハ"
# 「あっ……はいっ♪　ありがとうございます！　ヒルディオーネ先輩って……みんなが言う通り、強いだけじゃなくて、とっても素敵なお姉様ですね♪」
line = "「あっ……はいっ♪　ありがとうございます！　ヒルディオーネ先輩って……みんなが言う通り、強いだけじゃなくて、とっても素敵なお姉様ですね♪」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ですわ！　おーっほっほっほ♪　私、千園寺ヒルディオーネは、理想の淑女と最強の星騎士を日々追い求め続ける『努力の天才』でしてよ♪」
line = "「ですわ！　おーっほっほっほ♪　私、千園寺ヒルディオーネは、理想の淑女と最強の星騎士を日々追い求め続ける『努力の天才』でしてよ♪」"

[[dialogue]]
speaker = "シズハ"
# 「か、カッコいい……！　あと、美しい……！」
line = "「か、カッコいい……！　あと、美しい……！」"

[[dialogue]]
speaker = "unk"
# ああ。俺の自慢の『彼女』だからな
line = "ああ。俺の自慢の『彼女』だからな"

[[dialogue]]
speaker = "シズハ"
# 「ねぇ、会長……ちょっと聞いてもいい？」
line = "「ねぇ、会長……ちょっと聞いてもいい？」"

[[dialogue]]
speaker = "シズハ"
# 「先輩のあの美しい<b>お尻</b>って……触っても大丈夫なのかな？」
line = "「先輩のあの美しい<b>お尻</b>って……触っても大丈夫なのかな？」"

[[dialogue]]
speaker = "unk"
# 美しいってそっち！？
line = "美しいってそっち！？"

[[dialogue]]
speaker = "シズハ"
# 「当たり前じゃん！　ヒルディオーネ先輩のアレは、誰がどう見てもわかる、超高級な『ロイヤル<ruby=びしり>美尻</ruby>』だよ！？」
line = "「当たり前じゃん！　ヒルディオーネ先輩のアレは、誰がどう見てもわかる、超高級な『ロイヤル<ruby>美尻<rt>びしり</rt></ruby>』だよ！？」"

[[dialogue]]
speaker = "シズハ"
# 「私がここに来たのも、あのお尻があまりにも魅力的で、つい惹かれちゃったからなんだから……！」
line = "「私がここに来たのも、あのお尻があまりにも魅力的で、つい惹かれちゃったからなんだから……！」"

[[dialogue]]
speaker = "unk"
# （ブレないな、この尻フェチ附属生……）
line = "（ブレないな、この尻フェチ附属生……）"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「お２人共、一体なんの相談をしておりますの？」
line = "「お２人共、一体なんの相談をしておりますの？」"

[[dialogue]]
speaker = "シズハ"
# 「えっと……それが、先輩にはちょっと言い出しづらいことでして……」
line = "「えっと……それが、先輩にはちょっと言い出しづらいことでして……」"

[[dialogue]]
speaker = "unk"
# 俺はそこで、躊躇っているシズハの代わりに、先輩に説明する。
line = "俺はそこで、躊躇っているシズハの代わりに、先輩に説明する。"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「え？　――お近づきの印としてお尻を触りたい？　今時の附属生の子たちの間では、そんなコミュニケーション方法が流行っておりますの……！？」
line = "「え？　――お近づきの印としてお尻を触りたい？　今時の附属生の子たちの間では、そんなコミュニケーション方法が流行っておりますの……！？」"

[[dialogue]]
speaker = "シズハ"
# 「流行っているかどうかは分かりませんけど……例えば、最近はプリムラちゃんがサチちゃんのお尻をよく触ったりしますね」
line = "「流行っているかどうかは分かりませんけど……例えば、最近はプリムラちゃんがサチちゃんのお尻をよく触ったりしますね」"

[[dialogue]]
speaker = "シズハ"
# 「で、サチちゃんが怒って、そのお返しに、プリムラちゃんのお尻を触り返して――」
line = "「で、サチちゃんが怒って、そのお返しに、プリムラちゃんのお尻を触り返して――」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ですわ！？　あの真面目な附属校生徒会長のサチが、そんなことを……！？」
line = "「ですわ！？　あの真面目な附属校生徒会長のサチが、そんなことを……！？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「で、でも、それが本当なら……すごく恥ずかしいですけれど、先輩として後輩達の流行を理解し、柔軟に合わせる努力をしなければなりませんわね……！」
line = "「で、でも、それが本当なら……すごく恥ずかしいですけれど、先輩として後輩達の流行を理解し、柔軟に合わせる努力をしなければなりませんわね……！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「――よし、シズハ！　そういうことでしたら、私のお尻、触っても構いませんことよ！」
line = "「――よし、シズハ！　そういうことでしたら、私のお尻、触っても構いませんことよ！」"

[[dialogue]]
speaker = "シズハ"
# 「いいんですか！？」
line = "「いいんですか！？」"

[[dialogue]]
speaker = "unk"
# ただのシズハの趣味ですから！！
line = "ただのシズハの趣味ですから！！"

[[dialogue]]
speaker = "unk"
# いやいやいやいや！
line = "いやいやいやいや！"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「えっ！？　そうなんですの！？」
line = "「えっ！？　そうなんですの！？」"

[[dialogue]]
speaker = "シズハ"
# 「……確かに、会長の言う通り趣味です。でも、決してふざけているわけじゃありません！　私は、<b>本気</b>でお姉様のお尻と触れ合いたいと思ったんです！」
line = "「……確かに、会長の言う通り趣味です。でも、決してふざけているわけじゃありません！　私は、<b>本気</b>でお姉様のお尻と触れ合いたいと思ったんです！」"

[[dialogue]]
speaker = "シズハ"
# 「お姉様も、恋人の会長さんと触れ合いたいと思うことはありますよね！？」
line = "「お姉様も、恋人の会長さんと触れ合いたいと思うことはありますよね！？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「……！　確かに……」
line = "「……！　確かに……」"

[[dialogue]]
speaker = "シズハ"
# 「それと同じです！　私はお姉様の美しいお尻と、心からコミュニケーションしたいと思ったんです！」
line = "「それと同じです！　私はお姉様の美しいお尻と、心からコミュニケーションしたいと思ったんです！」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「……今、言われて気づきましたけれど、私――」
line = "「……今、言われて気づきましたけれど、私――」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「恋人なのに、まだ会長のお尻を触ったことがありませんでしたわ……！」
line = "「恋人なのに、まだ会長のお尻を触ったことがありませんでしたわ……！」"

[[dialogue]]
speaker = "unk"
# えっ？
line = "えっ？"

[[dialogue]]
speaker = "シズハ"
# 「えぇっ！？　あの女の子らしい柔らかさと、男らしい力強さが合わさった会長のハイブリッドプリケツを、まだ１度もですか！？」
line = "「えぇっ！？　あの女の子らしい柔らかさと、男らしい力強さが合わさった会長のハイブリッドプリケツを、まだ１度もですか！？」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「ですわ！　制服越しでもすごくいい形をしていると、前から気付いておりましたのに……」
line = "「ですわ！　制服越しでもすごくいい形をしていると、前から気付いておりましたのに……」"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「……細マッチョな会長のお尻……ごくり」
line = "「……細マッチョな会長のお尻……ごくり」"

[[dialogue]]
speaker = "unk"
# 先輩！？　落ち着いて下さい！
line = "先輩！？　落ち着いて下さい！"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「会長――お体に触りますわよ？」
line = "「会長――お体に触りますわよ？」"

[[dialogue]]
speaker = "unk"
# ちょっ……！　アッーーー！？
line = "ちょっ……！　アッーーー！？"

[[dialogue]]
speaker = "ヒルディオーネ（覚醒）"
# 「こ、これは、エレガントな<ruby=だいでんきん>大臀筋</ruby>ですわ……<emoji=heart04>」
line = "「こ、これは、エレガントな<ruby>大臀筋<rt>だいでんきん</rt></ruby>ですわ……<emoji=heart04>」"

[[dialogue]]
speaker = "シズハ"
# 「！　お姉様、お尻の筋肉にお詳しいんですね！」
line = "「！　お姉様、お尻の筋肉にお詳しいんですね！」"

[[dialogue]]
speaker = "unk"
# 先輩の発言にシズハが食いついてきて、それから２人は『お尻の筋肉』の話題で盛り上がり、仲良くなるのだった――
line = "先輩の発言にシズハが食いついてきて、それから２人は『お尻の筋肉』の話題で盛り上がり、仲良くなるのだった――"
