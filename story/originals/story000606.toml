[[dialogue]]
speaker = "unk"
# 翌日の昼休み、俺たちは再び星徒会室に集まることになった――
line = "翌日の昼休み、俺たちは再び星徒会室に集まることになった――"

[[dialogue]]
speaker = "ヴィーナス"
# 「というわけで、アナとアニマ先輩が一晩でやってくれたわ！」
line = "「というわけで、アナとアニマ先輩が一晩でやってくれたわ！」"

[[dialogue]]
speaker = "紅明"
# 「マジか！　アタシの戦闘服のデータを渡して１日も経ってないのに！　アナっちとアニっち先輩、マジで天才っしょ♪」
line = "「マジか！　アタシの戦闘服のデータを渡して１日も経ってないのに！　アナっちとアニっち先輩、マジで天才っしょ♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それじゃあ早速、人工的に生み出した、試作戦闘服第１号のお披露目よ！　入ってきていいわよ、ヨミヨミ！」
line = "「それじゃあ早速、人工的に生み出した、試作戦闘服第１号のお披露目よ！　入ってきていいわよ、ヨミヨミ！」"

[[dialogue]]
speaker = "ヨミ"
# 「は、はい……」
line = "「は、はい……」"

[[dialogue]]
speaker = "ヨミ"
# 「ええっと……天ヶ崎ヨミ、クリスマスフォーム、です……」
line = "「ええっと……天ヶ崎ヨミ、クリスマスフォーム、です……」"

[[dialogue]]
speaker = "ヨミ"
# 「って、お嬢様！　なんで私までクリスマス衣装を着ることに！？」
line = "「って、お嬢様！　なんで私までクリスマス衣装を着ることに！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それは――」
line = "「それは――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「かわいいからよ！　それに、サンタの補佐として、ピッタリの衣装じゃない？」
line = "「かわいいからよ！　それに、サンタの補佐として、ピッタリの衣装じゃない？」"

[[dialogue]]
speaker = "ヨミ"
# 「いや、爆裂恥ずかしいんですけど！？」
line = "「いや、爆裂恥ずかしいんですけど！？」"

[[dialogue]]
speaker = "セシア"
# 「わたくしは、かわいくて似合っていると思うわよ？　モフモフで」
line = "「わたくしは、かわいくて似合っていると思うわよ？　モフモフで」"

[[dialogue]]
speaker = "ヨミ"
# 「それ衣装関係なくないですか！？」
line = "「それ衣装関係なくないですか！？」"

[[dialogue]]
speaker = "紅明"
# 「そんなことないぜ、ヨミヨミ！　マジでかわいいから！　ねぇ、ＳＮＳに上げていい！？　こんなのバズりまくりっしょ♪」
line = "「そんなことないぜ、ヨミヨミ！　マジでかわいいから！　ねぇ、ＳＮＳに上げていい！？　こんなのバズりまくりっしょ♪」"

[[dialogue]]
speaker = "ヨミ"
# 「ダメです！　ＤＩＳＣで写真撮るのは禁止ですからっ！」
line = "「ダメです！　ＤＩＳＣで写真撮るのは禁止ですからっ！」"

[[dialogue]]
speaker = "紅明"
# 「え～、マジでかわいいのに～！　ダーリンもそう思うっしょ？」
line = "「え～、マジでかわいいのに～！　ダーリンもそう思うっしょ？」"

[[dialogue]]
speaker = "unk"
# 本当にすごく似合ってるよ
line = "本当にすごく似合ってるよ"

[[dialogue]]
speaker = "unk"
# かわいいと思う
line = "かわいいと思う"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？　か、会長、そんな……かわいいだなんて。えへへ……♪」
line = "「こやっ！？　か、会長、そんな……かわいいだなんて。えへへ……♪」"

[[dialogue]]
speaker = "セシア"
# 「ヨミヨミ、会長に言われると照れた反応をするのね」
line = "「ヨミヨミ、会長に言われると照れた反応をするのね」"

[[dialogue]]
speaker = "ヨミ"
# 「はっ……！？　い、いやいや、そんなんじゃないですよ！？」
line = "「はっ……！？　い、いやいや、そんなんじゃないですよ！？」"

[[dialogue]]
speaker = "ヨミ"
# 「と、というか！　私よりセシアちゃんがクリスマス衣装着た方がよかったのでは……？　絶対にかわいいと思うんですけど……」
line = "「と、というか！　私よりセシアちゃんがクリスマス衣装着た方がよかったのでは……？　絶対にかわいいと思うんですけど……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「残念ながら、セシアは力を取り戻してる最中で、戦闘データがまだまだ足りてないのよ」
line = "「残念ながら、セシアは力を取り戻してる最中で、戦闘データがまだまだ足りてないのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それにヨミは、私が認める優秀な星騎士だもの。新しい力も必ず使いこなせるはずだって思ったのよ！」
line = "「それにヨミは、私が認める優秀な星騎士だもの。新しい力も必ず使いこなせるはずだって思ったのよ！」"

[[dialogue]]
speaker = "ヨミ"
# 「お嬢様……！」
line = "「お嬢様……！」"

[[dialogue]]
speaker = "ヨミ"
# 「――私、恥ずかしいですけど、クリスマスフォーム頑張ります……！」
line = "「――私、恥ずかしいですけど、クリスマスフォーム頑張ります……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それでこそヨミよ！　期待しているわ♪」
line = "「それでこそヨミよ！　期待しているわ♪」"

[[dialogue]]
speaker = "紅明"
# 「クリスマスフォームか……。ならアタシも、『<ruby=せんいにしき>戦衣弐式</ruby>』から呼び方を今時に改めて、そう名乗るとするぜ！」
line = "「クリスマスフォームか……。ならアタシも、『<ruby>戦衣弐式<rt>せんいにしき</rt></ruby>』から呼び方を今時に改めて、そう名乗るとするぜ！」"

[[dialogue]]
speaker = "紅明"
# 「よっしゃあ！　それじゃいよいよ、今日からプレゼント配りを開始していくっしょ～☆」
line = "「よっしゃあ！　それじゃいよいよ、今日からプレゼント配りを開始していくっしょ～☆」"

[[dialogue]]
speaker = "セシア"
# 「楽しみだわ♪　お～♪」
line = "「楽しみだわ♪　お～♪」"

[[dialogue]]
speaker = "unk"
# そうして放課後になり、いざクリスマスフォームで生徒たちの前に立つヨミだったが――
line = "そうして放課後になり、いざクリスマスフォームで生徒たちの前に立つヨミだったが――"

[[dialogue]]
speaker = "ヨミ"
# 「ごめんなさい！　やっぱり恥ずかしいですぅぅ～～っ！！」
line = "「ごめんなさい！　やっぱり恥ずかしいですぅぅ～～っ！！」"

[[dialogue]]
speaker = "女生徒Ａ"
# 「ヨミちゃん、クリスマス衣装、めっちゃかわいい～～～っ<emoji=heart04>　顔隠さないでこっち向いて～～～っ<emoji=heart04>」
line = "「ヨミちゃん、クリスマス衣装、めっちゃかわいい～～～っ<emoji=heart04>　顔隠さないでこっち向いて～～～っ<emoji=heart04>」"

[[dialogue]]
speaker = "女生徒Ｂ"
# 「や～ん！　ヨミちゃん、照れて顔真っ赤にして、可愛いすぎでしょっ<emoji=heart04>　一緒に写真撮ろ？　ほら、チーズ♪」
line = "「や～ん！　ヨミちゃん、照れて顔真っ赤にして、可愛いすぎでしょっ<emoji=heart04>　一緒に写真撮ろ？　ほら、チーズ♪」"

[[dialogue]]
speaker = "ヨミ"
# 「こやぁ！？　写真はダメです！　拡散されたら、爆裂恥ずかしすぎますからっ！」
line = "「こやぁ！？　写真はダメです！　拡散されたら、爆裂恥ずかしすぎますからっ！」"

[[dialogue]]
speaker = "unk"
# 照れるヨミヨミ、かわいい！
line = "照れるヨミヨミ、かわいい！"

[[dialogue]]
speaker = "ヨミ"
# 「ちょっ、会長まで！？　そんなかわいいかわいいって、沢山言われたら恥ずかしさで私――」
line = "「ちょっ、会長まで！？　そんなかわいいかわいいって、沢山言われたら恥ずかしさで私――」"

[[dialogue]]
speaker = "ヨミ"
# 「爆裂しちゃいますぅぅぅ！　こやあぁぁぁ～～～ん！！！」
line = "「爆裂しちゃいますぅぅぅ！　こやあぁぁぁ～～～ん！！！」"

[[dialogue]]
speaker = "unk"
# ヨミのかわいい叫びが、冬の空に木霊するのであった。
line = "ヨミのかわいい叫びが、冬の空に木霊するのであった。"
