[[dialogue]]
speaker = "unk"
# ソフィアの本心を聞いたサーシャさんは、見たことがない程に落ち込んでいる様子だった――
line = "ソフィアの本心を聞いたサーシャさんは、見たことがない程に落ち込んでいる様子だった――"

[[dialogue]]
speaker = "サーシャ"
# 「私、これまでずっと気づけなかったけれど……ソフィに対して間違ったことをしてしまっていたみたいだわ……」
line = "「私、これまでずっと気づけなかったけれど……ソフィに対して間違ったことをしてしまっていたみたいだわ……」"

[[dialogue]]
speaker = "サーシャ"
# 「信じられないって言われちゃったけど……私ね、ソフィのことは本当に大切に思っているのよ」
line = "「信じられないって言われちゃったけど……私ね、ソフィのことは本当に大切に思っているのよ」"

[[dialogue]]
speaker = "サーシャ"
# 「心から愛しているわ。でも……伝わっていなかった、ってことなのよね？」
line = "「心から愛しているわ。でも……伝わっていなかった、ってことなのよね？」"

[[dialogue]]
speaker = "サーシャ"
# 「家族だから、姉妹だから――心で繋がっているから、離れていても大丈夫だって、そう思っていたの……」
line = "「家族だから、姉妹だから――心で繋がっているから、離れていても大丈夫だって、そう思っていたの……」"

[[dialogue]]
speaker = "サーシャ"
# 「３年前のあの時、私はどうすればよかったのかしら……」
line = "「３年前のあの時、私はどうすればよかったのかしら……」"

[[dialogue]]
speaker = "サーシャ"
# 「私は……自分の冒険心を抑えることができない」
line = "「私は……自分の冒険心を抑えることができない」"

[[dialogue]]
speaker = "サーシャ"
# 「人間界へどうしても来てみたくて、学園へ入学することを選んだわ。学園を卒業したら、今度は天界にも行ってみたい」
line = "「人間界へどうしても来てみたくて、学園へ入学することを選んだわ。学園を卒業したら、今度は天界にも行ってみたい」"

[[dialogue]]
speaker = "サーシャ"
# 「たとえ過去に戻ってやり直せたとしても、結局、私は人間界へ来ることを選ぶと思うわ」
line = "「たとえ過去に戻ってやり直せたとしても、結局、私は人間界へ来ることを選ぶと思うわ」"

[[dialogue]]
speaker = "サーシャ"
# 「１つのところに留まれない自分を、簡単には変えられない……」
line = "「１つのところに留まれない自分を、簡単には変えられない……」"

[[dialogue]]
speaker = "サーシャ"
# 「うん。……変えられないのよ」
line = "「うん。……変えられないのよ」"

[[dialogue]]
speaker = "ウズメイア"
# 「サーシャ先輩……」
line = "「サーシャ先輩……」"

[[dialogue]]
speaker = "ウズメイア"
# 「あのっ……あたしも、同じです」
line = "「あのっ……あたしも、同じです」"

[[dialogue]]
speaker = "サーシャ"
# 「ウズメちゃんも……？」
line = "「ウズメちゃんも……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「はい。あたしの場合、日本の歴史、文化が好きだという気持ちを抑えることができずに、人間界へやってきました」
line = "「はい。あたしの場合、日本の歴史、文化が好きだという気持ちを抑えることができずに、人間界へやってきました」"

[[dialogue]]
speaker = "ウズメイア"
# 「好きっていう気持ちは、なかなか抑えられないですよね」
line = "「好きっていう気持ちは、なかなか抑えられないですよね」"

[[dialogue]]
speaker = "ウズメイア"
# 「だからこそ、ソフィアも悲しくなっちゃうんだと思います」
line = "「だからこそ、ソフィアも悲しくなっちゃうんだと思います」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィも……？」
line = "「ソフィも……？」"

[[dialogue]]
speaker = "ウズメイア"
# 「はい」
line = "「はい」"

[[dialogue]]
speaker = "ウズメイア"
# 「自分がどうやっても、サーシャ先輩の１番になれないってことが」
line = "「自分がどうやっても、サーシャ先輩の１番になれないってことが」"

[[dialogue]]
speaker = "サーシャ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「好きだからこそ、わかっちゃうんだと思います」
line = "「好きだからこそ、わかっちゃうんだと思います」"

[[dialogue]]
speaker = "サーシャ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "サーシャ"
# 「……ウズメちゃん、１つ相談してもいい？」
line = "「……ウズメちゃん、１つ相談してもいい？」"

[[dialogue]]
speaker = "ウズメイア"
# 「なんでしょうか？」
line = "「なんでしょうか？」"

[[dialogue]]
speaker = "サーシャ"
# 「教えて欲しいことがあるの。……天界では、愛を伝える時って、どんな風にするのかしら？」
line = "「教えて欲しいことがあるの。……天界では、愛を伝える時って、どんな風にするのかしら？」"

[[dialogue]]
speaker = "ウズメイア"
# 「愛が伝わる方法……」
line = "「愛が伝わる方法……」"

[[dialogue]]
speaker = "unk"
# ウズメは少し考えた後──
line = "ウズメは少し考えた後──"

[[dialogue]]
speaker = "ウズメイア"
# 「そうですね……天界の風習というよりは、あたしの家族の話なんですけど――」
line = "「そうですね……天界の風習というよりは、あたしの家族の話なんですけど――」"

[[dialogue]]
speaker = "unk"
# 一方、サーシャのところから逃げ出したソフィアのことは、ヴィーナスが追いかけていた。
line = "一方、サーシャのところから逃げ出したソフィアのことは、ヴィーナスが追いかけていた。"

[[dialogue]]
speaker = "ソフィア"
# 「はぁ、はぁ、はぁ……」
line = "「はぁ、はぁ、はぁ……」"

[[dialogue]]
speaker = "ソフィア"
# （結局、姉さんの前から逃げ出してしまいました……）
line = "（結局、姉さんの前から逃げ出してしまいました……）"

[[dialogue]]
speaker = "unk"
# ふと、ポツリと頭に冷たい水滴が当たる。
line = "ふと、ポツリと頭に冷たい水滴が当たる。"

[[dialogue]]
speaker = "ソフィア"
# 「雨……？　晴れてるのに……」
line = "「雨……？　晴れてるのに……」"

[[dialogue]]
speaker = "unk"
# 太陽は見えている一方で、上空にある雲から雨粒が降ってくる。そう、『天気雨』だった――
line = "太陽は見えている一方で、上空にある雲から雨粒が降ってくる。そう、『天気雨』だった――"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィア！」
line = "「ソフィア！」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……ヴィーナスさん……」
line = "「あ……ヴィーナスさん……」"

[[dialogue]]
speaker = "ソフィア"
# 「ごめんなさい……私……」
line = "「ごめんなさい……私……」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さんの答えを聞くのが怖くなって……」
line = "「姉さんの答えを聞くのが怖くなって……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「戦略的撤退、ってところかしら！　頑張ったと思うわよ！」
line = "「戦略的撤退、ってところかしら！　頑張ったと思うわよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「とりあえず、門の下に移動して、雨宿りしましょ」
line = "「とりあえず、門の下に移動して、雨宿りしましょ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィア、天気雨で濡れてるわ。ハンカチで拭くから、じっとしてなさい」
line = "「ソフィア、天気雨で濡れてるわ。ハンカチで拭くから、じっとしてなさい」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……はい。ありがとうございます……」
line = "「あ……はい。ありがとうございます……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ねぇ、ソフィア。サーシャさんって、変わってる人よね」
line = "「……ねぇ、ソフィア。サーシャさんって、変わってる人よね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私ね、新星学園に入学したばかりの頃、未来の日誌で、星徒会に入る未来がわかっていたわ」
line = "「私ね、新星学園に入学したばかりの頃、未来の日誌で、星徒会に入る未来がわかっていたわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからすぐに、当時の星徒会長をしていたサーシャさんのところへ会いに行ったの。星徒会メンバーにしてもらう為にね」
line = "「だからすぐに、当時の星徒会長をしていたサーシャさんのところへ会いに行ったの。星徒会メンバーにしてもらう為にね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それで、星徒会に入りたい理由を聞かれて、未来の日誌について話したわ」
line = "「それで、星徒会に入りたい理由を聞かれて、未来の日誌について話したわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさん、その時、私の話を全く疑わなかったのよ。ニコニコしながら、じゃあ一緒に星徒会をやりましょうかって言ってくれたの」
line = "「サーシャさん、その時、私の話を全く疑わなかったのよ。ニコニコしながら、じゃあ一緒に星徒会をやりましょうかって言ってくれたの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は気になって、どうして私の話を信じてくれたのかって聞いたわ」
line = "「私は気になって、どうして私の話を信じてくれたのかって聞いたわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そしたら、サーシャさん、なんて言ったと思う？」
line = "「そしたら、サーシャさん、なんて言ったと思う？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「未来の日誌に書かれていることが本当に起こるなら、ワクワクするじゃない？　――そう言ったのよ」
line = "「未来の日誌に書かれていることが本当に起こるなら、ワクワクするじゃない？　――そう言ったのよ」"

[[dialogue]]
speaker = "ソフィア"
# 「……姉さんらしいですね」
line = "「……姉さんらしいですね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でしょう？　私も、面白い人だなって思ったわ」
line = "「でしょう？　私も、面白い人だなって思ったわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「――サーシャさんって、自分の好きなことにバカ正直な人なのよ」
line = "「――サーシャさんって、自分の好きなことにバカ正直な人なのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「で、サーシャさんといえば、『あらあらうふふ♪』じゃない？」
line = "「で、サーシャさんといえば、『あらあらうふふ♪』じゃない？」"

[[dialogue]]
speaker = "ソフィア"
# 「あらあらうふふ？」
line = "「あらあらうふふ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そう。サーシャさんって相手の気持ちがよくわかってなくても、『あらあらうふふ』って言うのよ！」
line = "「そう。サーシャさんって相手の気持ちがよくわかってなくても、『あらあらうふふ』って言うのよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィア相手にわざわざ言うことじゃないかもしれないけれど、サーシャさんが適当に喋ってるって意味じゃないわ」
line = "「ソフィア相手にわざわざ言うことじゃないかもしれないけれど、サーシャさんが適当に喋ってるって意味じゃないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「う～ん、なんて言えばいいのかわかんないけど……そうね、サーシャさんは、相手のこともバカ正直に信じようとするのね」
line = "「う～ん、なんて言えばいいのかわかんないけど……そうね、サーシャさんは、相手のこともバカ正直に信じようとするのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからソフィアの言葉も、信じて疑わないんだわ」
line = "「だからソフィアの言葉も、信じて疑わないんだわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「たぶん、サーシャさんがあまり自分から会いに行かなかったのは、ソフィアの『姉離れ』って言葉をそのまま信じたからじゃないかしら？」
line = "「たぶん、サーシャさんがあまり自分から会いに行かなかったのは、ソフィアの『姉離れ』って言葉をそのまま信じたからじゃないかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「私が……姉さんから距離を置こうとしていたから……？」
line = "「私が……姉さんから距離を置こうとしていたから……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「もちろん、人寂しさをあまり感じないサーシャさん個人の問題も十分あるわ！　そこは別に、ソフィアのためを思って、みたいな話じゃないのよ」
line = "「もちろん、人寂しさをあまり感じないサーシャさん個人の問題も十分あるわ！　そこは別に、ソフィアのためを思って、みたいな話じゃないのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、私よりもずっと長くサーシャさんと過ごしてきたソフィアなら、もう気づいているんじゃないかしら？」
line = "「でも、私よりもずっと長くサーシャさんと過ごしてきたソフィアなら、もう気づいているんじゃないかしら？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさんの『好き』に、嘘はないのよ」
line = "「サーシャさんの『好き』に、嘘はないのよ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアの『不安だ』っていう気持ちは伝えたんだから、サーシャさんならきっとなんとかしてくれるはずよ。だって――」
line = "「ソフィアの『不安だ』っていう気持ちは伝えたんだから、サーシャさんならきっとなんとかしてくれるはずよ。だって――」"

[[dialogue]]
speaker = "ヴィーナス"
# 「サーシャさんは、私たちの頼れる先輩で……」
line = "「サーシャさんは、私たちの頼れる先輩で……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィアの愛する、お姉ちゃんなんだから！」
line = "「ソフィアの愛する、お姉ちゃんなんだから！」"

[[dialogue]]
speaker = "ソフィア"
# 「……ヴィーナスさん、ありがとうございます」
line = "「……ヴィーナスさん、ありがとうございます」"

[[dialogue]]
speaker = "ソフィア"
# 「私、もう１度姉さんと話してこようと思います」
line = "「私、もう１度姉さんと話してこようと思います」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ええ、頑張って、ソフィア！」
line = "「ええ、頑張って、ソフィア！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……って、あら？」
line = "「……って、あら？」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ～！」
line = "「ソフィ～！」"

[[dialogue]]
speaker = "サーシャ"
# 「よかった。ここで雨宿りしてたのね」
line = "「よかった。ここで雨宿りしてたのね」"

[[dialogue]]
speaker = "ソフィア"
# 「姉さん……！」
line = "「姉さん……！」"

[[dialogue]]
speaker = "unk"
# 天気雨が降り続ける中、奏姉妹は再び向き合うのだった――
line = "天気雨が降り続ける中、奏姉妹は再び向き合うのだった――"
