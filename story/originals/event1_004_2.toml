[[dialogue]]
speaker = "unk"
# マトイやトマルと話す内にわかってきたが、どうやら短期の記憶喪失になってしまったらしい。
line = "マトイやトマルと話す内にわかってきたが、どうやら短期の記憶喪失になってしまったらしい。"

[[dialogue]]
speaker = "マトイ"
# 「そんな……まさか、会長が記憶喪失だなんて……！」
line = "「そんな……まさか、会長が記憶喪失だなんて……！」"

[[dialogue]]
speaker = "unk"
# まさか、トマルが男だなんて……！
line = "まさか、トマルが男だなんて……！"

[[dialogue]]
speaker = "マトイ"
# 「記憶喪失よりも気にするの、そこ！？」
line = "「記憶喪失よりも気にするの、そこ！？」"

[[dialogue]]
speaker = "トマル"
# 「……私、男ですけど、姉さまのような素敵な女の子に憧れているんです」
line = "「……私、男ですけど、姉さまのような素敵な女の子に憧れているんです」"

[[dialogue]]
speaker = "トマル"
# 「体の作りは変えられませんけど、外見は努力で変えられますから」
line = "「体の作りは変えられませんけど、外見は努力で変えられますから」"

[[dialogue]]
speaker = "マトイ"
# 「その結果、普通の女の子をも超越した美少女が誕生しちゃってるわけだけど……」
line = "「その結果、普通の女の子をも超越した美少女が誕生しちゃってるわけだけど……」"

[[dialogue]]
speaker = "トマル"
# 「？　私は、姉さまの方が普通に可愛いと思いますけど……」
line = "「？　私は、姉さまの方が普通に可愛いと思いますけど……」"

[[dialogue]]
speaker = "unk"
# 可愛いのはもちろん、可憐な美少女って感じ
line = "可愛いのはもちろん、可憐な美少女って感じ"

[[dialogue]]
speaker = "トマル"
# 「お恥ずかしい限りです……。とはいえ、性別は会長さまと同じ男ですから、遠慮せずに気安く接してください」
line = "「お恥ずかしい限りです……。とはいえ、性別は会長さまと同じ男ですから、遠慮せずに気安く接してください」"

[[dialogue]]
speaker = "マトイ"
# 「うん。トマルは普通じゃないくらい可愛い、私の自慢の弟よ」
line = "「うん。トマルは普通じゃないくらい可愛い、私の自慢の弟よ」"

[[dialogue]]
speaker = "トマル"
# 「わ、私のことはさておき、会長さまの記憶喪失のことです！」
line = "「わ、私のことはさておき、会長さまの記憶喪失のことです！」"

[[dialogue]]
speaker = "トマル"
# 「会長さま、マトイ姉さまのことは覚えてらっしゃるんですよね？」
line = "「会長さま、マトイ姉さまのことは覚えてらっしゃるんですよね？」"

[[dialogue]]
speaker = "マトイ"
# 「ヴィーナスやアナ、サーシャさんのことは覚えている……でも、トマルのことは思い出せない、だっけ？」
line = "「ヴィーナスやアナ、サーシャさんのことは覚えている……でも、トマルのことは思い出せない、だっけ？」"

[[dialogue]]
speaker = "トマル"
# 「私が初めて会長さまと会ったのが、会長に就任されて間もなくの時期でしたから、おそらく――」
line = "「私が初めて会長さまと会ったのが、会長に就任されて間もなくの時期でしたから、おそらく――」"

[[dialogue]]
speaker = "マトイ"
# 「御前試合が終わった直後くらいから、最近までの記憶が抜けちゃってるってことかぁ……」
line = "「御前試合が終わった直後くらいから、最近までの記憶が抜けちゃってるってことかぁ……」"

[[dialogue]]
speaker = "マトイ"
# 「でもなんで突然、記憶喪失なんかに……？　頭でも強く打ったとか？　だけど、会長を診察した先生は、外傷はないって言ってたし……」
line = "「でもなんで突然、記憶喪失なんかに……？　頭でも強く打ったとか？　だけど、会長を診察した先生は、外傷はないって言ってたし……」"

[[dialogue]]
speaker = "トマル"
# 「……私に１つ、心当たりがあります」
line = "「……私に１つ、心当たりがあります」"

[[dialogue]]
speaker = "トマル"
# 「会長さまは今、おそらく<b>サチさま</b>と同じ状況です」
line = "「会長さまは今、おそらく<b>サチさま</b>と同じ状況です」"

[[dialogue]]
speaker = "マトイ"
# 「えっ！？　それって、サチちゃんも記憶喪失になってるってこと！？」
line = "「えっ！？　それって、サチちゃんも記憶喪失になってるってこと！？」"

[[dialogue]]
speaker = "unk"
# サチ？　どこかで聞いたことあるような……
line = "サチ？　どこかで聞いたことあるような……"

[[dialogue]]
speaker = "トマル"
# 「実は、サチさまのことで協力していただきたくて、私は会長さまを探していたのです」
line = "「実は、サチさまのことで協力していただきたくて、私は会長さまを探していたのです」"

[[dialogue]]
speaker = "？？？"
# 「――あー、テステス！　トマルさん！　トマルさん、聞こえてますか～！？」
line = "「――あー、テステス！　トマルさん！　トマルさん、聞こえてますか～！？」"

[[dialogue]]
speaker = "マトイ"
# 「！？　誰の声……？　校内放送とも違うけど……どこから聞こえてきてるの？」
line = "「！？　誰の声……？　校内放送とも違うけど……どこから聞こえてきてるの？」"

[[dialogue]]
speaker = "トマル"
# 「トレジアンナさん、聞こえてます！　ひょっとして、ロストアイテムを見つけたんですか？」
line = "「トレジアンナさん、聞こえてます！　ひょっとして、ロストアイテムを見つけたんですか？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい～。今、新星学園の校門前で戦ってます。人払いの星術は使ってるので、被害者はいませんが……」
line = "「はい～。今、新星学園の校門前で戦ってます。人払いの星術は使ってるので、被害者はいませんが……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「魔法少女のお２人が大ピンチです～！　どうかヘルプをお願いします～！」
line = "「魔法少女のお２人が大ピンチです～！　どうかヘルプをお願いします～！」"

[[dialogue]]
speaker = "unk"
# 魔法、少女……？
line = "魔法、少女……？"

[[dialogue]]
speaker = "トマル"
# 「わかりました！　今いきます！」
line = "「わかりました！　今いきます！」"

[[dialogue]]
speaker = "トマル"
# 「すみません、会長さま、姉さま。詳しい説明は後ほどちゃんとしますが……」
line = "「すみません、会長さま、姉さま。詳しい説明は後ほどちゃんとしますが……」"

[[dialogue]]
speaker = "トマル"
# 「私たちの魔法少女活動に、協力していただけませんか！？」
line = "「私たちの魔法少女活動に、協力していただけませんか！？」"

[[dialogue]]
speaker = "unk"
# 現場に向かうと、そこには空中を高速で飛び回る本と格闘する、２人の少女の姿があった。
line = "現場に向かうと、そこには空中を高速で飛び回る本と格闘する、２人の少女の姿があった。"

[[dialogue]]
speaker = "？？？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# （なんだ、あの本……！？）
line = "（なんだ、あの本……！？）"

[[dialogue]]
speaker = "サチ"
# 「くっ……！　速い……！　それにやっぱり、こっちの動きを読まれてる……！」
line = "「くっ……！　速い……！　それにやっぱり、こっちの動きを読まれてる……！」"

[[dialogue]]
speaker = "プリムラ"
# 「なにをやっとるんじゃ、サチ！　敵に読まれる以前の問題、全然我と動きを合わせられておらんではないか！」
line = "「なにをやっとるんじゃ、サチ！　敵に読まれる以前の問題、全然我と動きを合わせられておらんではないか！」"

[[dialogue]]
speaker = "サチ"
# 「思い出せないんだから、仕方ないでしょ！　覚えてるなら、プリムラが合わせてよ！」
line = "「思い出せないんだから、仕方ないでしょ！　覚えてるなら、プリムラが合わせてよ！」"

[[dialogue]]
speaker = "プリムラ"
# 「我はちゃんとやっておるわ！　ええい、情けない姿を晒しおって……！」
line = "「我はちゃんとやっておるわ！　ええい、情けない姿を晒しおって……！」"

[[dialogue]]
speaker = "トマル"
# 「サチさま！　プリムラさま！　加勢します！」
line = "「サチさま！　プリムラさま！　加勢します！」"

[[dialogue]]
speaker = "マトイ"
# 「なんだかわからないけど、とりあえずあの本を倒せばいいのよね？」
line = "「なんだかわからないけど、とりあえずあの本を倒せばいいのよね？」"

[[dialogue]]
speaker = "トマル"
# 「そうです！　――って、いけない！　ロストアイテムがまた逃げようとしてます！」
line = "「そうです！　――って、いけない！　ロストアイテムがまた逃げようとしてます！」"

[[dialogue]]
speaker = "トマル"
# 「サーバントアロー！」
line = "「サーバントアロー！」"

[[dialogue]]
speaker = "ロストアイテム"
# 「…………！」
line = "「…………！」"

[[dialogue]]
speaker = "プリムラ"
# 「足が止まった！　逃がさん！」
line = "「足が止まった！　逃がさん！」"

[[dialogue]]
speaker = "サチ"
# 「よし！　私が拘束して――」
line = "「よし！　私が拘束して――」"

[[dialogue]]
speaker = "プリムラ"
# 「ちょっ！？　なんでお前も一緒に突撃しとるんじゃ！　おわぁっ！？」
line = "「ちょっ！？　なんでお前も一緒に突撃しとるんじゃ！　おわぁっ！？」"

[[dialogue]]
speaker = "サチ"
# 「きゃあっ！？」
line = "「きゃあっ！？」"

[[dialogue]]
speaker = "トマル"
# 「お２人とも、大丈夫ですか！？」
line = "「お２人とも、大丈夫ですか！？」"

[[dialogue]]
speaker = "ロストアイテム"
# 「…………♪」
line = "「…………♪」"

[[dialogue]]
speaker = "マトイ"
# 「あっ、本に逃げられちゃった……」
line = "「あっ、本に逃げられちゃった……」"

[[dialogue]]
speaker = "プリムラ"
# 「さ、サチぃ～！　貴様という奴は――」
line = "「さ、サチぃ～！　貴様という奴は――」"

[[dialogue]]
speaker = "プリムラ"
# 「なにをやっとるんじゃ、馬鹿者ぉぉぉっ！　拘束する役は体を変形させられる我と、いつも決まっておろうが！」
line = "「なにをやっとるんじゃ、馬鹿者ぉぉぉっ！　拘束する役は体を変形させられる我と、いつも決まっておろうが！」"

[[dialogue]]
speaker = "サチ"
# 「あのね……！　だから、そういうの思い出せないんだって言ってるでしょ！？　ちゃんと口に出して言いなさいよ！」
line = "「あのね……！　だから、そういうの思い出せないんだって言ってるでしょ！？　ちゃんと口に出して言いなさいよ！」"

[[dialogue]]
speaker = "トマル"
# 「やはり……今のままだと、ロストアイテムの回収は難しそうですね……」
line = "「やはり……今のままだと、ロストアイテムの回収は難しそうですね……」"

[[dialogue]]
speaker = "unk"
# ロストアイテムって、さっきの本のこと？
line = "ロストアイテムって、さっきの本のこと？"

[[dialogue]]
speaker = "トマル"
# 「はい。あれがサチさまと、そしておそらく会長さまの記憶も奪った原因――」
line = "「はい。あれがサチさまと、そしておそらく会長さまの記憶も奪った原因――」"

[[dialogue]]
speaker = "トマル"
# 「『記憶のロストアイテム』です」
line = "「『記憶のロストアイテム』です」"

[[dialogue]]
speaker = "unk"
# トマルは真剣な表情で告げるのだった。
line = "トマルは真剣な表情で告げるのだった。"
