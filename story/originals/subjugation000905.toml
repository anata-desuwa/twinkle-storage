[[dialogue]]
speaker = "unk"
# ――吸血鬼の中で、極めて稀に『デイマスター』と呼ばれる上位種が誕生することがある。
line = "――吸血鬼の中で、極めて稀に『デイマスター』と呼ばれる上位種が誕生することがある。"

[[dialogue]]
speaker = "unk"
# 吸血鬼という魔族は、強力な自己再生能力と、長い寿命を持つ代わりに、日の光に極端に弱いという欠点を持つ。
line = "吸血鬼という魔族は、強力な自己再生能力と、長い寿命を持つ代わりに、日の光に極端に弱いという欠点を持つ。"

[[dialogue]]
speaker = "unk"
# デイマスターとは、その『日の光に弱い』という欠点を克服した個体のこと。
line = "デイマスターとは、その『日の光に弱い』という欠点を克服した個体のこと。"

[[dialogue]]
speaker = "unk"
# そして、ソフレはそのデイマスターとして、魔界の吸血鬼一族『ヴァートリン家』に生を受けた。
line = "そして、ソフレはそのデイマスターとして、魔界の吸血鬼一族『ヴァートリン家』に生を受けた。"

[[dialogue]]
speaker = "unk"
# 三姉妹の末っ子であったソフレは、デイマスターであることを両親にもてはやされて育った。
line = "三姉妹の末っ子であったソフレは、デイマスターであることを両親にもてはやされて育った。"

[[dialogue]]
speaker = "unk"
# しかし、自身が家族の誰よりも優れていると言われ続けたことで調子に乗り、プライドは高く、どんどんワガママになっていった。
line = "しかし、自身が家族の誰よりも優れていると言われ続けたことで調子に乗り、プライドは高く、どんどんワガママになっていった。"

[[dialogue]]
speaker = "unk"
# そうして、家族の誰にも手が付けられない程、好き勝手に振る舞うようになったソフレは、やがて家から追放されることとなった――。
line = "そうして、家族の誰にも手が付けられない程、好き勝手に振る舞うようになったソフレは、やがて家から追放されることとなった――。"

[[dialogue]]
speaker = "unk"
# もちろん、凄く腹が立った。ムシャクシャして、色んな場所で暴れまわった。強大な星力を振るえば、誰にも止められはしなかった。
line = "もちろん、凄く腹が立った。ムシャクシャして、色んな場所で暴れまわった。強大な星力を振るえば、誰にも止められはしなかった。"

[[dialogue]]
speaker = "unk"
# すると、いつしか『暴虐の吸血鬼』なんて呼ばれるようになり、ソフレはますます調子に乗っていった。
line = "すると、いつしか『暴虐の吸血鬼』なんて呼ばれるようになり、ソフレはますます調子に乗っていった。"

[[dialogue]]
speaker = "unk"
# そのうち魔界にも飽きて退屈だと感じたソフレは、人間界へと乗り込むことにした。
line = "そのうち魔界にも飽きて退屈だと感じたソフレは、人間界へと乗り込むことにした。"

[[dialogue]]
speaker = "unk"
# 人間というのは脆弱な種族の癖に、威勢だけはよくて、ムカつく連中だった。
line = "人間というのは脆弱な種族の癖に、威勢だけはよくて、ムカつく連中だった。"

[[dialogue]]
speaker = "unk"
# でも、それを力で屈服させるのが面白くて、ソフレは魔界にいた時以上に暴れ回り続けた。
line = "でも、それを力で屈服させるのが面白くて、ソフレは魔界にいた時以上に暴れ回り続けた。"

[[dialogue]]
speaker = "unk"
# そして、１００年前のあの日……
line = "そして、１００年前のあの日……"

[[dialogue]]
speaker = "unk"
# ソフレはここ、流星市国で、イヤな祓魔師――フェリーチェ・パッショーネに出会うことになった――。
line = "ソフレはここ、流星市国で、イヤな祓魔師――フェリーチェ・パッショーネに出会うことになった――。"

[[dialogue]]
speaker = "ソフレ"
# 「かはっ！？　ぐっ……！」
line = "「かはっ！？　ぐっ……！」"

[[dialogue]]
speaker = "ソフレ"
# 「お前……！　ソフレに……一体なんの術式を使ったの！？　星術が発動できないのだわ……！」
line = "「お前……！　ソフレに……一体なんの術式を使ったの！？　星術が発動できないのだわ……！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「――どうやら、封印は上手くいったみたいだな」
line = "「――どうやら、封印は上手くいったみたいだな」"

[[dialogue]]
speaker = "ソフレ"
# 「封印、ですって……！？」
line = "「封印、ですって……！？」"

[[dialogue]]
speaker = "フェリーチェ"
# 「そう、大きく２つの行動を封じる楔をアンタに打ち込んだ」
line = "「そう、大きく２つの行動を封じる楔をアンタに打ち込んだ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「１つ目は、悪意を持っての殺傷行為及び、破壊行為の禁止」
line = "「１つ目は、悪意を持っての殺傷行為及び、破壊行為の禁止」"

[[dialogue]]
speaker = "フェリーチェ"
# 「２つ目は、流星市国の外に出られないという行動制限」
line = "「２つ目は、流星市国の外に出られないという行動制限」"

[[dialogue]]
speaker = "フェリーチェ"
# 「以上２つを今後３００年間、封印させて……って、ありゃ？」
line = "「以上２つを今後３００年間、封印させて……って、ありゃ？」"

[[dialogue]]
speaker = "フェリーチェ"
# 「……あ～、上手く封印したつもりだったんだが――」
line = "「……あ～、上手く封印したつもりだったんだが――」"

[[dialogue]]
speaker = "ソフレ"
# 「まさか……失敗でもした？　キャハハハ！　ざまぁみろなのだわ！　ソフレをそんな長い間封印できるわけが――」
line = "「まさか……失敗でもした？　キャハハハ！　ざまぁみろなのだわ！　ソフレをそんな長い間封印できるわけが――」"

[[dialogue]]
speaker = "フェリーチェ"
# 「悪い、一桁間違えて、封印をかけたっぽい。３０００年間になってるみてぇだわ」
line = "「悪い、一桁間違えて、封印をかけたっぽい。３０００年間になってるみてぇだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「は！？」
line = "「は！？」"

[[dialogue]]
speaker = "ソフレ"
# 「さ、３０００年！？　嘘でしょ……！？　吸血鬼だって、そんな長く生きることはできないのだわ！」
line = "「さ、３０００年！？　嘘でしょ……！？　吸血鬼だって、そんな長く生きることはできないのだわ！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「いやマジで、すまん。アンタがあまりにもムカつく態度取るもんだから、加減が狂ったみてぇだわ」
line = "「いやマジで、すまん。アンタがあまりにもムカつく態度取るもんだから、加減が狂ったみてぇだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「ふざけるんじゃないのだわッ！　今すぐ、封印を解きなさい！！　この下等種風情が！！！」
line = "「ふざけるんじゃないのだわッ！　今すぐ、封印を解きなさい！！　この下等種風情が！！！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「下等種ね……ははっ」
line = "「下等種ね……ははっ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「……まぁ、あれだ。確かにミスりはしたが――」
line = "「……まぁ、あれだ。確かにミスりはしたが――」"

[[dialogue]]
speaker = "フェリーチェ"
# 「どちらにせよ、アンタには反省する時間が必要だろうよ。アタシが何を言ったところで、今は聞く耳を持たねぇだろうし」
line = "「どちらにせよ、アンタには反省する時間が必要だろうよ。アタシが何を言ったところで、今は聞く耳を持たねぇだろうし」"

[[dialogue]]
speaker = "ソフレ"
# 「当たり前なのだわ！　３０００年も封印されるくらいなら、殺された方がマシなのよ！！」
line = "「当たり前なのだわ！　３０００年も封印されるくらいなら、殺された方がマシなのよ！！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「わかるぜ。ただ……あいにく、どんなにアンタにムカつこうが、アタシはエクソシスト。祈るのが専門で、殺すのが仕事じゃねぇんだわ」
line = "「わかるぜ。ただ……あいにく、どんなにアンタにムカつこうが、アタシはエクソシスト。祈るのが専門で、殺すのが仕事じゃねぇんだわ」"

[[dialogue]]
speaker = "フェリーチェ"
# 「いずれにしても――」
line = "「いずれにしても――」"

[[dialogue]]
speaker = "フェリーチェ"
# 「アンタは負けたんだよ。テメェが舐めた人間ってやつに」
line = "「アンタは負けたんだよ。テメェが舐めた人間ってやつに」"

[[dialogue]]
speaker = "ソフレ"
# 「くっ……！」
line = "「くっ……！」"

[[dialogue]]
speaker = "フェリーチェ"
# 「じゃあな。あばよ、吸血鬼――」
line = "「じゃあな。あばよ、吸血鬼――」"

[[dialogue]]
speaker = "unk"
# そうして、ソフレは３０００年間、流星市国から出られなくなった。
line = "そうして、ソフレは３０００年間、流星市国から出られなくなった。"

[[dialogue]]
speaker = "unk"
# 実質、ゆるやかな死刑宣告。
line = "実質、ゆるやかな死刑宣告。"

[[dialogue]]
speaker = "unk"
# ソフレのプライドは、時間の経過と共にどんどんと失墜していった……。
line = "ソフレのプライドは、時間の経過と共にどんどんと失墜していった……。"

[[dialogue]]
speaker = "unk"
# 封印されたソフレの身柄は、流星教皇庁――星見家の監視下におかれることになった。流星学園の星騎士として働くことを条件に、保護観察処分となったのだ。
line = "封印されたソフレの身柄は、流星教皇庁――星見家の監視下におかれることになった。流星学園の星騎士として働くことを条件に、保護観察処分となったのだ。"

[[dialogue]]
speaker = "unk"
# もちろん、やる気など出るはずもない。ソフレは暴虐の吸血鬼として有名になっていたから、周りから腫れ物扱いされ、近寄る者もいなかった。
line = "もちろん、やる気など出るはずもない。ソフレは暴虐の吸血鬼として有名になっていたから、周りから腫れ物扱いされ、近寄る者もいなかった。"

[[dialogue]]
speaker = "unk"
# ソフレは吸血鬼だというのに、そこからの年月は長く感じた。何も面白くない、退屈な日々。それが３０００年も続くのだと思うたび、深く絶望した。
line = "ソフレは吸血鬼だというのに、そこからの年月は長く感じた。何も面白くない、退屈な日々。それが３０００年も続くのだと思うたび、深く絶望した。"

[[dialogue]]
speaker = "unk"
# だから、ソフレはいつしか、多くの時間を眠って過ごすようになった。
line = "だから、ソフレはいつしか、多くの時間を眠って過ごすようになった。"

[[dialogue]]
speaker = "unk"
# 眠っていれば、イヤなことを忘れられる。夢の中だけは自由だ。
line = "眠っていれば、イヤなことを忘れられる。夢の中だけは自由だ。"

[[dialogue]]
speaker = "unk"
# ソフレは眠るのが好きになった。それが現実逃避だとしても……唯一の幸せだった。
line = "ソフレは眠るのが好きになった。それが現実逃避だとしても……唯一の幸せだった。"

[[dialogue]]
speaker = "unk"
# そうして、ソフレは授業をサボって昼寝しながらも、流星学園に通い続けた。
line = "そうして、ソフレは授業をサボって昼寝しながらも、流星学園に通い続けた。"

[[dialogue]]
speaker = "unk"
# ３年生になるまで通ったら、また１年生からやり直し。３０００年の封印があるソフレは、死ぬまで学園を卒業することができない。
line = "３年生になるまで通ったら、また１年生からやり直し。３０００年の封印があるソフレは、死ぬまで学園を卒業することができない。"

[[dialogue]]
speaker = "unk"
# たった１人、延々と学年のサイクルを繰り返す。何度も、何度も、延々と――。
line = "たった１人、延々と学年のサイクルを繰り返す。何度も、何度も、延々と――。"

[[dialogue]]
speaker = "unk"
# そうして、すっかり授業に出なくなって、自分がいま何年生で、どこのクラスなのかも忘れた頃……
line = "そうして、すっかり授業に出なくなって、自分がいま何年生で、どこのクラスなのかも忘れた頃……"

[[dialogue]]
speaker = "？？？"
# 「ねぇ、キミがもしかして、暴虐の吸血鬼さん？」
line = "「ねぇ、キミがもしかして、暴虐の吸血鬼さん？」"

[[dialogue]]
speaker = "ソフレ"
# 「ん……ソフレの眠りを妨げるのは、一体誰なのだわ……？」
line = "「ん……ソフレの眠りを妨げるのは、一体誰なのだわ……？」"

[[dialogue]]
speaker = "フェリシー"
# 「やっぱり！　ソフレ・ヴァートリンさんだよね！？」
line = "「やっぱり！　ソフレ・ヴァートリンさんだよね！？」"

[[dialogue]]
speaker = "ソフレ"
# 「……！　お前……フェリーチェ！？」
line = "「……！　お前……フェリーチェ！？」"

[[dialogue]]
speaker = "フェリシー"
# 「あっ、私がひいお祖母ちゃんに似てるのって、本当なんだね！　お祖母ちゃんが私を見て、そっくりだってよく言ってたんだ～」
line = "「あっ、私がひいお祖母ちゃんに似てるのって、本当なんだね！　お祖母ちゃんが私を見て、そっくりだってよく言ってたんだ～」"

[[dialogue]]
speaker = "ソフレ"
# 「ひいお祖母ちゃん……？　ってことは、フェリーチェの子孫……？」
line = "「ひいお祖母ちゃん……？　ってことは、フェリーチェの子孫……？」"

[[dialogue]]
speaker = "フェリシー"
# 「うんっ！　私、フェリーチェ・パッショーネのひ孫で、恵原フェリシーっていうの！」
line = "「うんっ！　私、フェリーチェ・パッショーネのひ孫で、恵原フェリシーっていうの！」"

[[dialogue]]
speaker = "フェリシー"
# 「よろしくね、吸血鬼さん♪」
line = "「よろしくね、吸血鬼さん♪」"

[[dialogue]]
speaker = "unk"
# それが、ソフレが封印されてから、９９年目の春。
line = "それが、ソフレが封印されてから、９９年目の春。"

[[dialogue]]
speaker = "unk"
# 今から１年前の出来事だったのだわ――。
line = "今から１年前の出来事だったのだわ――。"

[[dialogue]]
speaker = "unk"
# 時は戻って、現在。
line = "時は戻って、現在。"

[[dialogue]]
speaker = "ソフレ"
# 「スヤスヤ……」
line = "「スヤスヤ……」"

[[dialogue]]
speaker = "unk"
# 保健室から逃げ出したソフレが、図書館の片隅で眠っていると――
line = "保健室から逃げ出したソフレが、図書館の片隅で眠っていると――"

[[dialogue]]
speaker = "ウィステリア"
# 「図書館は居眠りする為の場所じゃないわよ」
line = "「図書館は居眠りする為の場所じゃないわよ」"

[[dialogue]]
speaker = "ソフレ"
# 「ん……」
line = "「ん……」"

[[dialogue]]
speaker = "ソフレ"
# 「ふわぁ～。酷く禍々しい気配がするかと思えば……」
line = "「ふわぁ～。酷く禍々しい気配がするかと思えば……」"

[[dialogue]]
speaker = "ソフレ"
# 「ウィステリア。今日は面倒なことがあって疲れているから、元クラスメイトのよしみで、大目に見るのだわ……」
line = "「ウィステリア。今日は面倒なことがあって疲れているから、元クラスメイトのよしみで、大目に見るのだわ……」"

[[dialogue]]
speaker = "ウィステリア"
# 「禍々しいとか言わないでくれる！？　それ、私じゃなくて、この魔導書のせいだから！」
line = "「禍々しいとか言わないでくれる！？　それ、私じゃなくて、この魔導書のせいだから！」"

[[dialogue]]
speaker = "unk"
# 新星学園の図書館司書、ウィステリア。
line = "新星学園の図書館司書、ウィステリア。"

[[dialogue]]
speaker = "unk"
# 魔界の古い一族に生まれ、次期当主として幼い頃から呪術の英才教育を受けてきた才女。しかし、その際に呪いの魔導書を与えられ、彼女は常に軽度の不運に見舞われている。
line = "魔界の古い一族に生まれ、次期当主として幼い頃から呪術の英才教育を受けてきた才女。しかし、その際に呪いの魔導書を与えられ、彼女は常に軽度の不運に見舞われている。"

[[dialogue]]
speaker = "unk"
# そしてソフレが――１つ前の学年サイクルを繰り返していた時のクラスメイトでもあった。
line = "そしてソフレが――１つ前の学年サイクルを繰り返していた時のクラスメイトでもあった。"

[[dialogue]]
speaker = "ウィステリア"
# 「ともかく……もう放課後なのだから、寝るなら自分の寮の部屋で寝なさい、ソフレ」
line = "「ともかく……もう放課後なのだから、寝るなら自分の寮の部屋で寝なさい、ソフレ」"

[[dialogue]]
speaker = "ソフレ"
# 「そんなわかりやすいところで寝ていたら、すぐにまたフェリシーに見つかるのだわ……」
line = "「そんなわかりやすいところで寝ていたら、すぐにまたフェリシーに見つかるのだわ……」"

[[dialogue]]
speaker = "ウィステリア"
# 「はぁ……相変わらずね。でも、恵原さんといえば――」
line = "「はぁ……相変わらずね。でも、恵原さんといえば――」"

[[dialogue]]
speaker = "ウィステリア"
# 「あなた、封印を解く方法が見つかったんでしょう？　よかったじゃない」
line = "「あなた、封印を解く方法が見つかったんでしょう？　よかったじゃない」"

[[dialogue]]
speaker = "ソフレ"
# 「フェリシーから聞いたの？」
line = "「フェリシーから聞いたの？」"

[[dialogue]]
speaker = "ウィステリア"
# 「ええ。星騎士として活躍すれば、３０００年の刑期が短くなっていくって。嬉しそうに話してたわよ」
line = "「ええ。星騎士として活躍すれば、３０００年の刑期が短くなっていくって。嬉しそうに話してたわよ」"

[[dialogue]]
speaker = "ソフレ"
# 「ふん……そんなの全部、今更なのだわ」
line = "「ふん……そんなの全部、今更なのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「ソフレのやる気はとっくの昔に失せて、もう残っていないのよ。今のモット―は、『働いたら負け』なのだわ」
line = "「ソフレのやる気はとっくの昔に失せて、もう残っていないのよ。今のモット―は、『働いたら負け』なのだわ」"

[[dialogue]]
speaker = "ソフレ"
# 「そんな面倒臭いことなんか忘れて、平和に惰眠を貪っているのが１番なのよ――」
line = "「そんな面倒臭いことなんか忘れて、平和に惰眠を貪っているのが１番なのよ――」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "unk"
# あっ、ソフレ、見つけた！
line = "あっ、ソフレ、見つけた！"

[[dialogue]]
speaker = "ウィステリア"
# 「あら、会長くん、こんにちは」
line = "「あら、会長くん、こんにちは」"

[[dialogue]]
speaker = "ソフレ"
# 「お前……まさか、ソフレを探しにきたの？」
line = "「お前……まさか、ソフレを探しにきたの？」"

[[dialogue]]
speaker = "ソフレ"
# 「――保健室の調査依頼で聞きたいことがあって、フェリシーと手分けして探してた？　なんなのだわ、それ。面倒な予感しかしないのよ……」
line = "「――保健室の調査依頼で聞きたいことがあって、フェリシーと手分けして探してた？　なんなのだわ、それ。面倒な予感しかしないのよ……」"

[[dialogue]]
speaker = "unk"
# 俺はフェリシーから、ソフレが１００年前に、フェリシーのひいお祖母ちゃんの手によって流星市国に封印された話を聞かされた――
line = "俺はフェリシーから、ソフレが１００年前に、フェリシーのひいお祖母ちゃんの手によって流星市国に封印された話を聞かされた――"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレは、人間の私では想像もできない３０００年って長い刑期を突き付けられて、それから自暴自棄になってしまったんだと思う」
line = "「ソフレは、人間の私では想像もできない３０００年って長い刑期を突き付けられて、それから自暴自棄になってしまったんだと思う」"

[[dialogue]]
speaker = "フェリシー"
# 「封印のせいで、流星学園を卒業することなく、永遠に通い続けて」
line = "「封印のせいで、流星学園を卒業することなく、永遠に通い続けて」"

[[dialogue]]
speaker = "フェリシー"
# 「封印が解ける前に、どうせ次のリクリエがやってきて、何もかも滅茶苦茶になってしまうのだからって……」
line = "「封印が解ける前に、どうせ次のリクリエがやってきて、何もかも滅茶苦茶になってしまうのだからって……」"

[[dialogue]]
speaker = "フェリシー"
# 「未来に絶望して、やる気を無くしちゃったんだよ」
line = "「未来に絶望して、やる気を無くしちゃったんだよ」"

[[dialogue]]
speaker = "フェリシー"
# 「でもね、だからこそ、今のソフレはそこまで邪悪な存在じゃないって、私には感じられるんだ」
line = "「でもね、だからこそ、今のソフレはそこまで邪悪な存在じゃないって、私には感じられるんだ」"

[[dialogue]]
speaker = "フェリシー"
# 「１００年前のソフレがどうだったのかは、わからない。だけど今は、絶望を知ったからこそ、前より人に優しくなれるようになったんじゃないかって思うの」
line = "「１００年前のソフレがどうだったのかは、わからない。だけど今は、絶望を知ったからこそ、前より人に優しくなれるようになったんじゃないかって思うの」"

[[dialogue]]
speaker = "フェリシー"
# 「だから、私は今回の不審者の件をちゃんと解決して、ソフレにかかった疑いを晴らしたいんだ！」
line = "「だから、私は今回の不審者の件をちゃんと解決して、ソフレにかかった疑いを晴らしたいんだ！」"

[[dialogue]]
speaker = "ソフレ"
# 「アイツ、そんなことを……」
line = "「アイツ、そんなことを……」"

[[dialogue]]
speaker = "ソフレ"
# 「でも、とんだ勘違いなのだわ。ソフレは優しくなんてないのよ。ただ封印の縛りで、人を傷付けられないだけ」
line = "「でも、とんだ勘違いなのだわ。ソフレは優しくなんてないのよ。ただ封印の縛りで、人を傷付けられないだけ」"

[[dialogue]]
speaker = "ソフレ"
# 「別に犯人として疑われようが、ソフレは構わないのだわ」
line = "「別に犯人として疑われようが、ソフレは構わないのだわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「まったく、どうしようもないヘソ曲がりね」
line = "「まったく、どうしようもないヘソ曲がりね」"

[[dialogue]]
speaker = "ウィステリア"
# 「そんなことじゃ、私もこの半年間、恵原さんの調べものを手伝った甲斐がないわ」
line = "「そんなことじゃ、私もこの半年間、恵原さんの調べものを手伝った甲斐がないわ」"

[[dialogue]]
speaker = "ソフレ"
# 「なによそれ……どういうことなのだわ？」
line = "「なによそれ……どういうことなのだわ？」"

[[dialogue]]
speaker = "ウィステリア"
# 「どうもこうも、さっき言ってた、あなたの封印を解く方法が見つかったって話よ」
line = "「どうもこうも、さっき言ってた、あなたの封印を解く方法が見つかったって話よ」"

[[dialogue]]
speaker = "ウィステリア"
# 「学園の星術研究の資料や、禁書庫になっている『地下図書館』の資料の一部にも当たって、恵原さんが必死に調査した成果なんでしょう？　私も結構手伝ったんだから」
line = "「学園の星術研究の資料や、禁書庫になっている『地下図書館』の資料の一部にも当たって、恵原さんが必死に調査した成果なんでしょう？　私も結構手伝ったんだから」"

[[dialogue]]
speaker = "ウィステリア"
# 「って、その顔……ソフレ、あなたもしかして、聞かされてなかったの？」
line = "「って、その顔……ソフレ、あなたもしかして、聞かされてなかったの？」"

[[dialogue]]
speaker = "ソフレ"
# 「アイツ、そんなことは一言も……」
line = "「アイツ、そんなことは一言も……」"

[[dialogue]]
speaker = "ソフレ"
# 「偶然見つけたから、一緒に頑張ろうって、いつもの能天気にうるさい感じで……」
line = "「偶然見つけたから、一緒に頑張ろうって、いつもの能天気にうるさい感じで……」"

[[dialogue]]
speaker = "ウィステリア"
# 「……そう。恵原さんらしいわね」
line = "「……そう。恵原さんらしいわね」"

[[dialogue]]
speaker = "ウィステリア"
# 「それで？　あなたは自分の為に頑張ってくれた恵原さんの行動を知ってもなお、惰眠を貪り続ける気なのかしら？」
line = "「それで？　あなたは自分の為に頑張ってくれた恵原さんの行動を知ってもなお、惰眠を貪り続ける気なのかしら？」"

[[dialogue]]
speaker = "ソフレ"
# 「別に……ソフレはそんなこと、頼んでなんかいないのだわ」
line = "「別に……ソフレはそんなこと、頼んでなんかいないのだわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「私も、あなたと同じで面倒な呪いに悩まされる身だから、正直やけになる気持ちがわからないわけじゃないわ」
line = "「私も、あなたと同じで面倒な呪いに悩まされる身だから、正直やけになる気持ちがわからないわけじゃないわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「それでも、あれだけ歩み寄ってくれる相手に対して、勝手に決めつけて距離を取るのは感心しないわよ」
line = "「それでも、あれだけ歩み寄ってくれる相手に対して、勝手に決めつけて距離を取るのは感心しないわよ」"

[[dialogue]]
speaker = "ソフレ"
# 「……そんなの、善意の押し付けなのだわ」
line = "「……そんなの、善意の押し付けなのだわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「あなただって悪ぶってるけど、さっき自分でも、平和に眠るのが１番だって言ってたじゃない」
line = "「あなただって悪ぶってるけど、さっき自分でも、平和に眠るのが１番だって言ってたじゃない」"

[[dialogue]]
speaker = "ソフレ"
# 「それは……」
line = "「それは……」"

[[dialogue]]
speaker = "ウィステリア"
# 「それにあなた、私に対して借りが１つあったでしょう？」
line = "「それにあなた、私に対して借りが１つあったでしょう？」"

[[dialogue]]
speaker = "ウィステリア"
# 「学生時代に、私の教えた呪術のおかげで、封印の行動範囲制限を誤魔化して東京まで出られるようになった……まさか寝ぼけて忘れたわけじゃないわよね？」
line = "「学生時代に、私の教えた呪術のおかげで、封印の行動範囲制限を誤魔化して東京まで出られるようになった……まさか寝ぼけて忘れたわけじゃないわよね？」"

[[dialogue]]
speaker = "ソフレ"
# 「まさか、今その話を持ち出す気なの……？」
line = "「まさか、今その話を持ち出す気なの……？」"

[[dialogue]]
speaker = "ウィステリア"
# 「恵原さんが抱えている事件を、あなたが協力して解決したら、その借りはチャラでいいわ」
line = "「恵原さんが抱えている事件を、あなたが協力して解決したら、その借りはチャラでいいわ」"

[[dialogue]]
speaker = "ウィステリア"
# 「あなたは１度、ちゃんとあの子と向き合ってみなさい」
line = "「あなたは１度、ちゃんとあの子と向き合ってみなさい」"

[[dialogue]]
speaker = "ソフレ"
# 「ウィステリア……お前、司書になってから、少し変わったのかしら？　学生時代のお前なら、そんなこと言わなかったはずよ」
line = "「ウィステリア……お前、司書になってから、少し変わったのかしら？　学生時代のお前なら、そんなこと言わなかったはずよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「ええ、そうかもね。だけど……」
line = "「ええ、そうかもね。だけど……」"

[[dialogue]]
speaker = "ウィステリア"
# 「こんな呪い持ちの私でもね、ちゃんと向き合ってくれる人はいるんだって、気づいたのよ。図書委員の子たちだったり――」
line = "「こんな呪い持ちの私でもね、ちゃんと向き合ってくれる人はいるんだって、気づいたのよ。図書委員の子たちだったり――」"

[[dialogue]]
speaker = "ウィステリア"
# 「そこにいる会長くんだったりね」
line = "「そこにいる会長くんだったりね」"

[[dialogue]]
speaker = "ウィステリア"
# 「……って、噂をすれば、ほら――」
line = "「……って、噂をすれば、ほら――」"

[[dialogue]]
speaker = "フェリシー"
# 「ソフレ！」
line = "「ソフレ！」"

[[dialogue]]
speaker = "フェリシー"
# 「やっと見つけた！　探したんだよ、も～」
line = "「やっと見つけた！　探したんだよ、も～」"

[[dialogue]]
speaker = "ソフレ"
# 「……会長。さっきからこっそりＤＩＳＣ弄ってたけど、さてはソフレの居場所をフェリシーに教えてたわね？」
line = "「……会長。さっきからこっそりＤＩＳＣ弄ってたけど、さてはソフレの居場所をフェリシーに教えてたわね？」"

[[dialogue]]
speaker = "unk"
# 無実はちゃんと晴らさないと
line = "無実はちゃんと晴らさないと"

[[dialogue]]
speaker = "ソフレ"
# 「はぁ……お前もフェリシーと同じで、お節介焼きなのだわ……」
line = "「はぁ……お前もフェリシーと同じで、お節介焼きなのだわ……」"

[[dialogue]]
speaker = "unk"
# ソフレは困ったような顔をして、肩をすくめるのだった。
line = "ソフレは困ったような顔をして、肩をすくめるのだった。"
