[[dialogue]]
speaker = "unk"
# 第３話,魔女の苦手,P
line = "第３話,魔女の苦手,P"

[[dialogue]]
speaker = "イニシュ"
# 「濃厚魚介つけ麺、ごちそうさまでした。ポタージュのようなスープに負けない太麺の小麦の風味。主張と主張がぶつかり合いながらも見事に調和していました」
line = "「濃厚魚介つけ麺、ごちそうさまでした。ポタージュのようなスープに負けない太麺の小麦の風味。主張と主張がぶつかり合いながらも見事に調和していました」"

[[dialogue]]
speaker = "イニシュ"
# 「今日もお付き合いいただいてありがとうございます、魔王」
line = "「今日もお付き合いいただいてありがとうございます、魔王」"

[[dialogue]]
speaker = "unk"
# 何か思い出せた？
line = "何か思い出せた？"

[[dialogue]]
speaker = "イニシュ"
# 「最近、魔王と行動を共にしていて感じたのですが……」
line = "「最近、魔王と行動を共にしていて感じたのですが……」"

[[dialogue]]
speaker = "イニシュ"
# 「昔の私はいつも誰かと一緒にいた気がします。誰か大切な人と」
line = "「昔の私はいつも誰かと一緒にいた気がします。誰か大切な人と」"

[[dialogue]]
speaker = "unk"
# 大切な人……家族？　恋人？
line = "大切な人……家族？　恋人？"

[[dialogue]]
speaker = "イニシュ"
# 「いえ……違う気がします」
line = "「いえ……違う気がします」"

[[dialogue]]
speaker = "イニシュ"
# 「誰かはわかりませんが……私は１人ではなかった。今の私からすると、自分でもいささか意外ではありますが」
line = "「誰かはわかりませんが……私は１人ではなかった。今の私からすると、自分でもいささか意外ではありますが」"

[[dialogue]]
speaker = "イニシュ"
# 「！　モンスターの出現を感知」
line = "「！　モンスターの出現を感知」"

[[dialogue]]
speaker = "イニシュ"
# 「モンスターを駆逐します」
line = "「モンスターを駆逐します」"

[[dialogue]]
speaker = "イニシュ"
# 「殲滅完了」
line = "「殲滅完了」"

[[dialogue]]
speaker = "イニシュ"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 失った記憶はモンスター嫌いと関係している？
line = "失った記憶はモンスター嫌いと関係している？"

[[dialogue]]
speaker = "イニシュ"
# 「認識の訂正を求めます」
line = "「認識の訂正を求めます」"

[[dialogue]]
speaker = "イニシュ"
# 「モンスターが嫌いなのではありません。私が許せないのはリクリエです」
line = "「モンスターが嫌いなのではありません。私が許せないのはリクリエです」"

[[dialogue]]
speaker = "イニシュ"
# 「モンスターはリクリエの末端。ゆえに駆除する。それだけです」
line = "「モンスターはリクリエの末端。ゆえに駆除する。それだけです」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャニャ？　さっきの警報は誤報ニャン？　全然モンスターがいないニャ」
line = "「ニャニャ？　さっきの警報は誤報ニャン？　全然モンスターがいないニャ」"

[[dialogue]]
speaker = "イニシュ"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "フィオナ"
# 「こんにちは、緋宮会長。どうやら私たちは一足遅かったみたいですね」
line = "「こんにちは、緋宮会長。どうやら私たちは一足遅かったみたいですね」"

[[dialogue]]
speaker = "ユウリ"
# 「なんだ、あたしたちは用無しか。ま、平和なのが一番だけどな」
line = "「なんだ、あたしたちは用無しか。ま、平和なのが一番だけどな」"

[[dialogue]]
speaker = "ニャリオン"
# 「んん？　そっちのは見ない顔だニャン」
line = "「んん？　そっちのは見ない顔だニャン」"

[[dialogue]]
speaker = "イニシュ"
# 「ひんっ！？」
line = "「ひんっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「あ、緋宮会長の後ろに隠れましたね」
line = "「あ、緋宮会長の後ろに隠れましたね」"

[[dialogue]]
speaker = "ユウリ"
# 「アホ猫がまたなんかしやがったんじゃねーだろーな？」
line = "「アホ猫がまたなんかしやがったんじゃねーだろーな？」"

[[dialogue]]
speaker = "ニャリオン"
# 「ワガハイは悲鳴を上げられるようなことはしてないニャン！」
line = "「ワガハイは悲鳴を上げられるようなことはしてないニャン！」"

[[dialogue]]
speaker = "イニシュ"
# 「なぜかあの生き物──猫を見ると体が勝手に……」
line = "「なぜかあの生き物──猫を見ると体が勝手に……」"

[[dialogue]]
speaker = "イニシュ"
# 「自分でも理由はわかりませんが、畏怖の感情を覚えます。記憶を失う前に何かあったのかもしれません……」
line = "「自分でも理由はわかりませんが、畏怖の感情を覚えます。記憶を失う前に何かあったのかもしれません……」"

[[dialogue]]
speaker = "イニシュ"
# 「失礼しました。流星学園星徒会の方ですね。私はイニシュ。ネビュラの魔女です」
line = "「失礼しました。流星学園星徒会の方ですね。私はイニシュ。ネビュラの魔女です」"

[[dialogue]]
speaker = "フィオナ"
# 「ネビュラの……」
line = "「ネビュラの……」"

[[dialogue]]
speaker = "ユウリ"
# 「ってーと、もしかしてこないだアステラをまとめて蹴散らしたやつか？」
line = "「ってーと、もしかしてこないだアステラをまとめて蹴散らしたやつか？」"

[[dialogue]]
speaker = "イニシュ"
# 「今ここであなた方と敵対するつもりはありません。警戒は不要です」
line = "「今ここであなた方と敵対するつもりはありません。警戒は不要です」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャハハ！　いざとなったらさっきみたいにワガハイがやっつけてやるニャン！」
line = "「ニャハハ！　いざとなったらさっきみたいにワガハイがやっつけてやるニャン！」"

[[dialogue]]
speaker = "イニシュ"
# 「ひゃぅっ！？」
line = "「ひゃぅっ！？」"

[[dialogue]]
speaker = "フィオナ"
# 「ニャーリーオーン」
line = "「ニャーリーオーン」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャ！？　わわ、悪気はなかったのニャン！」
line = "「ニャ！？　わわ、悪気はなかったのニャン！」"

[[dialogue]]
speaker = "フィオナ"
# 「しかし、魔女なのに猫が苦手なんですね。どちらかというと雰囲気に合っているような気がしましたが」
line = "「しかし、魔女なのに猫が苦手なんですね。どちらかというと雰囲気に合っているような気がしましたが」"

[[dialogue]]
speaker = "ニャリオン"
# 「ワガハイの強大さに恐れおののいているのニャン」
line = "「ワガハイの強大さに恐れおののいているのニャン」"

[[dialogue]]
speaker = "ユウリ"
# 「単に猫にビビっただけだろ。んなこともわかんねーのかアホ猫」
line = "「単に猫にビビっただけだろ。んなこともわかんねーのかアホ猫」"

[[dialogue]]
speaker = "イニシュ"
# 「アホ猫と言いますが、あなたも猫系の魔族では……？」
line = "「アホ猫と言いますが、あなたも猫系の魔族では……？」"

[[dialogue]]
speaker = "ユウリ"
# 「あんだと？」
line = "「あんだと？」"

[[dialogue]]
speaker = "ニャリオン"
# 「脳筋のユウリと一緒にするニャ！」
line = "「脳筋のユウリと一緒にするニャ！」"

[[dialogue]]
speaker = "イニシュ"
# 「失礼しましたっ」
line = "「失礼しましたっ」"

[[dialogue]]
speaker = "unk"
# イニシュもかわいいところがあるんだな
line = "イニシュもかわいいところがあるんだな"

[[dialogue]]
speaker = "イニシュ"
# 「かわいい……ですか？　私が……？」
line = "「かわいい……ですか？　私が……？」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。お知り合いのようですし、彼女のことは緋宮会長にお任せしますね」
line = "「ふふ。お知り合いのようですし、彼女のことは緋宮会長にお任せしますね」"

[[dialogue]]
speaker = "ユウリ"
# 「んじゃ、あたしらはこの辺で。久々に友達同士で遊びに来たんだから、ちっとは楽しまないとな」
line = "「んじゃ、あたしらはこの辺で。久々に友達同士で遊びに来たんだから、ちっとは楽しまないとな」"

[[dialogue]]
speaker = "ユウリ"
# 「そうだ、クレープ食おうぜー、クレープ」
line = "「そうだ、クレープ食おうぜー、クレープ」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ、ユウリは好きだね」
line = "「ふふ、ユウリは好きだね」"

[[dialogue]]
speaker = "イニシュ"
# 「とも……だち……」
line = "「とも……だち……」"

[[dialogue]]
speaker = "イニシュ"
# 「ともだち……友達……」
line = "「ともだち……友達……」"

[[dialogue]]
speaker = "unk"
# イニシュ……？
line = "イニシュ……？"

[[dialogue]]
speaker = "イニシュ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "イニシュ"
# 「すみません、魔王……今日は失礼します」
line = "「すみません、魔王……今日は失礼します」"
