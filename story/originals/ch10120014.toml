[[dialogue]]
speaker = "unk"
# 第4話,主と友と,P
line = "第4話,主と友と,P"

[[dialogue]]
speaker = "unk"
# どうぞ、お嬢様
line = "どうぞ、お嬢様"

[[dialogue]]
speaker = "フィオナ"
# 「ありがとう」
line = "「ありがとう」"

[[dialogue]]
speaker = "フィオナ"
# 「――って、ついうちのメイドのつもりで接してしまいました。すみません」
line = "「――って、ついうちのメイドのつもりで接してしまいました。すみません」"

[[dialogue]]
speaker = "キリカ"
# 「紅茶を淹れるのが様になってきましたね。味も良くなったと思います」
line = "「紅茶を淹れるのが様になってきましたね。味も良くなったと思います」"

[[dialogue]]
speaker = "キリカ"
# 「達人の域には及びませんが、戦闘でも隙が少なくなりました」
line = "「達人の域には及びませんが、戦闘でも隙が少なくなりました」"

[[dialogue]]
speaker = "フィオナ"
# 「まぁ……この前はずいぶん厳しくしていたしね。キリカも指導お疲れ様。緋宮会長とは仲良くなれた？」
line = "「まぁ……この前はずいぶん厳しくしていたしね。キリカも指導お疲れ様。緋宮会長とは仲良くなれた？」"

[[dialogue]]
speaker = "キリカ"
# 「いえ、特にそのようなことは」
line = "「いえ、特にそのようなことは」"

[[dialogue]]
speaker = "フィオナ"
# 「そう？　少し楽しそうだったように見えたけど」
line = "「そう？　少し楽しそうだったように見えたけど」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様の気のせいかと」
line = "「お嬢様の気のせいかと」"

[[dialogue]]
speaker = "キリカ"
# 「とはいえ、思いのほか吸収が早いので教えがいがありました」
line = "「とはいえ、思いのほか吸収が早いので教えがいがありました」"

[[dialogue]]
speaker = "フィオナ"
# 「ふーん……」
line = "「ふーん……」"

[[dialogue]]
speaker = "キリカ"
# 「これで修業は一区切りです。使用人としても、星騎士としても、成長されたと思います」
line = "「これで修業は一区切りです。使用人としても、星騎士としても、成長されたと思います」"

[[dialogue]]
speaker = "キリカ"
# 「もし星見家に仕えるおつもりがありましたら、より本格的に指導させていただきます。どこに出しても恥ずかしくない一流の使用人にしてみせましょう」
line = "「もし星見家に仕えるおつもりがありましたら、より本格的に指導させていただきます。どこに出しても恥ずかしくない一流の使用人にしてみせましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長が星見家の執事になる日も近い……？」
line = "「緋宮会長が星見家の執事になる日も近い……？」"

[[dialogue]]
speaker = "キリカ"
# 「まずはアルバイトからですね」
line = "「まずはアルバイトからですね」"

[[dialogue]]
speaker = "フィオナ"
# 「それとも緋宮会長はメイドの方がいいですか？」
line = "「それとも緋宮会長はメイドの方がいいですか？」"

[[dialogue]]
speaker = "キリカ"
# 「メイド服、着られますか？　大きめのサイズなら余っています」
line = "「メイド服、着られますか？　大きめのサイズなら余っています」"

[[dialogue]]
speaker = "unk"
# 遠慮しておきます……
line = "遠慮しておきます……"

[[dialogue]]
speaker = "フィオナ"
# 「けっこう似合うと思うんですが……ふふっ、冗談です」
line = "「けっこう似合うと思うんですが……ふふっ、冗談です」"

[[dialogue]]
speaker = "キリカ"
# 「楽しそうですね、お嬢様」
line = "「楽しそうですね、お嬢様」"

[[dialogue]]
speaker = "フィオナ"
# 「キリカこそ。やっぱり弟子はかわいいんじゃない？」
line = "「キリカこそ。やっぱり弟子はかわいいんじゃない？」"

[[dialogue]]
speaker = "キリカ"
# 「かわいくはないですね」
line = "「かわいくはないですね」"

[[dialogue]]
speaker = "フィオナ"
# 「あっ、緋宮会長がちょっとショックを受けてる。ふふ、キリカってば手厳しい」
line = "「あっ、緋宮会長がちょっとショックを受けてる。ふふ、キリカってば手厳しい」"

[[dialogue]]
speaker = "フィオナ"
# 「では私は自室に戻ります。キリカ、１５時になったら部屋に紅茶を持ってきて」
line = "「では私は自室に戻ります。キリカ、１５時になったら部屋に紅茶を持ってきて」"

[[dialogue]]
speaker = "キリカ"
# 「お茶菓子はどうなさいましょう」
line = "「お茶菓子はどうなさいましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「どうしようかな……じゃあクッキーを少し。お茶を飲んだらきっとキリカのクッキーが欲しくなるもの」
line = "「どうしようかな……じゃあクッキーを少し。お茶を飲んだらきっとキリカのクッキーが欲しくなるもの」"

[[dialogue]]
speaker = "キリカ"
# 「かしこまりました」
line = "「かしこまりました」"

[[dialogue]]
speaker = "unk"
# キリカさんとフィオナ、少し姉妹みたいだ
line = "キリカさんとフィオナ、少し姉妹みたいだ"

[[dialogue]]
speaker = "キリカ"
# 「そう見えますか？　……なら、私もまだまだということです」
line = "「そう見えますか？　……なら、私もまだまだということです」"

[[dialogue]]
speaker = "キリカ"
# 「確かに私はただの使用人ではありません」
line = "「確かに私はただの使用人ではありません」"

[[dialogue]]
speaker = "キリカ"
# 「すでに語ったこともあるかもしれませんが……私がフィオナ様と出会ったのは、まだお互い幼かった頃です」
line = "「すでに語ったこともあるかもしれませんが……私がフィオナ様と出会ったのは、まだお互い幼かった頃です」"

[[dialogue]]
speaker = "キリカ"
# 「あの頃は仲の良い友人のような間柄でした。ですが大きくなるにつれて、自分の役割を理解していきました」
line = "「あの頃は仲の良い友人のような間柄でした。ですが大きくなるにつれて、自分の役割を理解していきました」"

[[dialogue]]
speaker = "キリカ"
# 「私の方が年上でしたので、遊んでとせがまれることもありましたが……次第にお嬢様もご自身のお立場を理解されるようになりました」
line = "「私の方が年上でしたので、遊んでとせがまれることもありましたが……次第にお嬢様もご自身のお立場を理解されるようになりました」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様の世話係として、お目付け役として……そして護衛として、私はその責務を果たします」
line = "「お嬢様の世話係として、お目付け役として……そして護衛として、私はその責務を果たします」"

[[dialogue]]
speaker = "キリカ"
# 「上月神闘流を修めたのも、流星学園に入学して星騎士になったのも、そのためです」
line = "「上月神闘流を修めたのも、流星学園に入学して星騎士になったのも、そのためです」"

[[dialogue]]
speaker = "unk"
# 上月家だから星見家に仕えてるんですか？
line = "上月家だから星見家に仕えてるんですか？"

[[dialogue]]
speaker = "キリカ"
# 「そうですね。私が上月家の人間だから……それは間違いありません」
line = "「そうですね。私が上月家の人間だから……それは間違いありません」"

[[dialogue]]
speaker = "キリカ"
# 「上月家の者は代々星見家に仕えてきました。千年以上前から……私の前の代も、そのまた前の代も」
line = "「上月家の者は代々星見家に仕えてきました。千年以上前から……私の前の代も、そのまた前の代も」"

[[dialogue]]
speaker = "キリカ"
# 「ですが強制されたわけではありません。運命だと諦めたのでもありません」
line = "「ですが強制されたわけではありません。運命だと諦めたのでもありません」"

[[dialogue]]
speaker = "キリカ"
# 「上月家の人間は長きにわたって、それぞれが星見家に仕えることを選んできた」
line = "「上月家の人間は長きにわたって、それぞれが星見家に仕えることを選んできた」"

[[dialogue]]
speaker = "キリカ"
# 「きっとそうなのだろうと、私は思っています」
line = "「きっとそうなのだろうと、私は思っています」"

[[dialogue]]
speaker = "キリカ"
# 「……少々話し過ぎましたね。後頭部を殴って記憶を消しましょうか」
line = "「……少々話し過ぎましたね。後頭部を殴って記憶を消しましょうか」"

[[dialogue]]
speaker = "キリカ"
# 「冗談です。本気で慌てないでください」
line = "「冗談です。本気で慌てないでください」"

[[dialogue]]
speaker = "キリカ"
# 「ですが今お話したことはお嬢様には内密に。いえ、使用人として困ることはありませんが、恥ずかしいので。私が」
line = "「ですが今お話したことはお嬢様には内密に。いえ、使用人として困ることはありませんが、恥ずかしいので。私が」"

[[dialogue]]
speaker = "キリカ"
# 「……良いですね？」
line = "「……良いですね？」"

[[dialogue]]
speaker = "unk"
# はい、師匠！
line = "はい、師匠！"

[[dialogue]]
speaker = "キリカ"
# 「今日も良い返事です。……ですが」
line = "「今日も良い返事です。……ですが」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様とは、流星星徒会の方々が持ってこられたボードゲームで戯れることもあります。あなたが思っているより窮屈ではありませんよ」
line = "「お嬢様とは、流星星徒会の方々が持ってこられたボードゲームで戯れることもあります。あなたが思っているより窮屈ではありませんよ」"

[[dialogue]]
speaker = "キリカ"
# 「そろそろ１５時です。お嬢様に紅茶をお持ちしなくては」
line = "「そろそろ１５時です。お嬢様に紅茶をお持ちしなくては」"

[[dialogue]]
speaker = "キリカ"
# 「最近はあなたの紅茶をお飲みになることが多かったので、私の味を思い出していただかないと」
line = "「最近はあなたの紅茶をお飲みになることが多かったので、私の味を思い出していただかないと」"

[[dialogue]]
speaker = "unk"
# 妬いてます？
line = "妬いてます？"

[[dialogue]]
speaker = "キリカ"
# 「いいえ？　あなたではまだまだ私には及びませんから」
line = "「いいえ？　あなたではまだまだ私には及びませんから」"

[[dialogue]]
speaker = "キリカ"
# 「でもあなたとなら……ともにお嬢様に仕えるのも悪くないと思っていますよ」
line = "「でもあなたとなら……ともにお嬢様に仕えるのも悪くないと思っていますよ」"
