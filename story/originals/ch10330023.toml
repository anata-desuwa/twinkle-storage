[[dialogue]]
speaker = "unk"
# 第３話,ご褒美はキス,P
line = "第３話,ご褒美はキス,P"

[[dialogue]]
speaker = "unk"
# 霊力を用いて戦闘能力を飛躍的に伸ばすことに成功したアニュラス。
line = "霊力を用いて戦闘能力を飛躍的に伸ばすことに成功したアニュラス。"

[[dialogue]]
speaker = "unk"
# だが残念なことに、この世には女神から賜った霊力でも解決できない問題がある──そう、例えば数学のテストとか。
line = "だが残念なことに、この世には女神から賜った霊力でも解決できない問題がある──そう、例えば数学のテストとか。"

[[dialogue]]
speaker = "アニュラス"
# 「ぜ、全部解き終わったぞ会長。どうだ……模擬テスト、採点の結果は……！？」
line = "「ぜ、全部解き終わったぞ会長。どうだ……模擬テスト、採点の結果は……！？」"

[[dialogue]]
speaker = "unk"
# 数学が……赤点ですね……
line = "数学が……赤点ですね……"

[[dialogue]]
speaker = "アニュラス"
# 「なにぃ！？　こ、今回のは割と自信があったんだぞ！？」
line = "「なにぃ！？　こ、今回のは割と自信があったんだぞ！？」"

[[dialogue]]
speaker = "アニュラス"
# 「くっ……もしや数字の見間違いか？　３と８は似ているからな……！」
line = "「くっ……もしや数字の見間違いか？　３と８は似ているからな……！」"

[[dialogue]]
speaker = "unk"
# そもそも使う公式が違いますね……
line = "そもそも使う公式が違いますね……"

[[dialogue]]
speaker = "アニュラス"
# 「くうぅ、そっちか……！　どうして数学の公式はあんなにも複雑なんだ！？　覚えられるわけないだろう！」
line = "「くうぅ、そっちか……！　どうして数学の公式はあんなにも複雑なんだ！？　覚えられるわけないだろう！」"

[[dialogue]]
speaker = "アニュラス"
# 「そもそも、このうねうね動くグラフはなんだ！　日常生活で見た試しがないぞ！！」
line = "「そもそも、このうねうね動くグラフはなんだ！　日常生活で見た試しがないぞ！！」"

[[dialogue]]
speaker = "アニュラス"
# 「このままではまずい……流星の騎士というお父様の二つ名を継いだ身であるのに……！」
line = "「このままではまずい……流星の騎士というお父様の二つ名を継いだ身であるのに……！」"

[[dialogue]]
speaker = "アニュラス"
# 「定期試験で赤点などを取ってしまっては、セイファートの名に泥を塗ってしまう……！　私は一族の面汚しだ……！！」
line = "「定期試験で赤点などを取ってしまっては、セイファートの名に泥を塗ってしまう……！　私は一族の面汚しだ……！！」"

[[dialogue]]
speaker = "アニュラス"
# 「──そんなに大げさに考えなくてもいいだと！？　大問題だっ！　会長、どうすればいい……！？　テストまであと１週間しかない！」
line = "「──そんなに大げさに考えなくてもいいだと！？　大問題だっ！　会長、どうすればいい……！？　テストまであと１週間しかない！」"

[[dialogue]]
speaker = "unk"
# ここはご褒美作戦で乗り切ろうか
line = "ここはご褒美作戦で乗り切ろうか"

[[dialogue]]
speaker = "アニュラス"
# 「し、しかし……今もチョコレートをあ～んしてもらうことと、頭のナデナデをご褒美に設定しているじゃないか？　それなのに結果が出ていない……」
line = "「し、しかし……今もチョコレートをあ～んしてもらうことと、頭のナデナデをご褒美に設定しているじゃないか？　それなのに結果が出ていない……」"

[[dialogue]]
speaker = "unk"
# 赤点脱出までお預けにしてみる？
line = "赤点脱出までお預けにしてみる？"

[[dialogue]]
speaker = "unk"
# じゃあキスをご褒美にして……
line = "じゃあキスをご褒美にして……"

[[dialogue]]
speaker = "アニュラス"
# 「何！？　わ、私の大好きな、お前とのキスを……お預けだと！？」
line = "「何！？　わ、私の大好きな、お前とのキスを……お預けだと！？」"

[[dialogue]]
speaker = "アニュラス"
# 「おはようのキスも……？　え、行ってきますのキスも？　ただいまのキスもダメ……！？」
line = "「おはようのキスも……？　え、行ってきますのキスも？　ただいまのキスもダメ……！？」"

[[dialogue]]
speaker = "アニュラス"
# 「た、確かに効果がありそうだ……うん。お前とキスができないのは辛い……今よりもっと危機感を持って勉強に当たれそうな気がする……」
line = "「た、確かに効果がありそうだ……うん。お前とキスができないのは辛い……今よりもっと危機感を持って勉強に当たれそうな気がする……」"

[[dialogue]]
speaker = "アニュラス"
# 「よ、よし。やるぞ！　私はアニュラス・セイファート……流星の騎士の名を継ぐ者だ！！」
line = "「よ、よし。やるぞ！　私はアニュラス・セイファート……流星の騎士の名を継ぐ者だ！！」"

[[dialogue]]
speaker = "unk"
# こうしてアニュラスのテスト勉強が始まった。模擬テストの赤点脱出まで、キスをお預けした状態で尻に火を点ける作戦である。
line = "こうしてアニュラスのテスト勉強が始まった。模擬テストの赤点脱出まで、キスをお預けした状態で尻に火を点ける作戦である。"

[[dialogue]]
speaker = "unk"
# １日目──１６点。キスはお預け。
line = "１日目──１６点。キスはお預け。"

[[dialogue]]
speaker = "アニュラス"
# 「くぅっ……！！」
line = "「くぅっ……！！」"

[[dialogue]]
speaker = "ヨミ"
# 「お２人とも、お勉強お疲れ様です！　ご注文を取りに来ました～、何にしましょう！」
line = "「お２人とも、お勉強お疲れ様です！　ご注文を取りに来ました～、何にしましょう！」"

[[dialogue]]
speaker = "アニュラス"
# 「キスがしたい……」
line = "「キスがしたい……」"

[[dialogue]]
speaker = "ヨミ"
# 「こやっ！？」
line = "「こやっ！？」"

[[dialogue]]
speaker = "unk"
# ２日目──１９点（ちなみに赤点脱出は３０点から）。今日もキスはお預け。
line = "２日目──１９点（ちなみに赤点脱出は３０点から）。今日もキスはお預け。"

[[dialogue]]
speaker = "アニュラス"
# 「うっぐぅうっ……！！」
line = "「うっぐぅうっ……！！」"

[[dialogue]]
speaker = "リノ"
# 「お勉強、はかどってる～？　そうだアニュラスちゃん、紅茶とコーヒー、どっちがいいかしら？」
line = "「お勉強、はかどってる～？　そうだアニュラスちゃん、紅茶とコーヒー、どっちがいいかしら？」"

[[dialogue]]
speaker = "アニュラス"
# 「キスがしたい……！！」
line = "「キスがしたい……！！」"

[[dialogue]]
speaker = "リノ"
# 「──えぇっ！？」
line = "「──えぇっ！？」"

[[dialogue]]
speaker = "unk"
# そんなこんなで３日目は２２点。４日目は２７点……アニュラスは連敗を続けて──
line = "そんなこんなで３日目は２２点。４日目は２７点……アニュラスは連敗を続けて──"

[[dialogue]]
speaker = "unk"
# そして５日目──！
line = "そして５日目──！"

[[dialogue]]
speaker = "unk"
# やったな、アニュラ──
line = "やったな、アニュラ──"

[[dialogue]]
speaker = "unk"
# ３５点取れてる……！！
line = "３５点取れてる……！！"

[[dialogue]]
speaker = "アニュラス"
# 「んぅちゅっ……ちゅ、ちゅぅっ……んちゅっ……ちゅぅ<emoji=heart04>」
line = "「んぅちゅっ……ちゅ、ちゅぅっ……んちゅっ……ちゅぅ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# んむむむむ！？
line = "んむむむむ！？"

[[dialogue]]
speaker = "アニュラス"
# 「会長、動かないでくれっ。もう限界だ……ここ数日、すっごく辛かったんだ……！　ご褒美が欲しい、キスっ、もっと……！」
line = "「会長、動かないでくれっ。もう限界だ……ここ数日、すっごく辛かったんだ……！　ご褒美が欲しい、キスっ、もっと……！」"

[[dialogue]]
speaker = "アニュラス"
# 「ちゅぅ、んちゅちゅ、ちゅぅっ……ちゅぱ、ちゅぅっ<emoji=heart04>」
line = "「ちゅぅ、んちゅちゅ、ちゅぅっ……ちゅぱ、ちゅぅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ちょ、ちょっと落ち着いて……！
line = "ちょ、ちょっと落ち着いて……！"

[[dialogue]]
speaker = "unk"
# ──ぷはっ！
line = "──ぷはっ！"

[[dialogue]]
speaker = "アニュラス"
# 「こらぁ、逃げるなぁっ……４日ぶんのキス、今から取り戻すんだからっ……！」
line = "「こらぁ、逃げるなぁっ……４日ぶんのキス、今から取り戻すんだからっ……！」"

[[dialogue]]
speaker = "アニュラス"
# 「んちゅ、ちゅる、んちゅ、好きだぞ会長っ、んちゅっ、ちゅぅ～っ……<emoji=heart04>」
line = "「んちゅ、ちゅる、んちゅ、好きだぞ会長っ、んちゅっ、ちゅぅ～っ……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺はその後、キス魔と化したアニュラスと日が暮れるまでイチャイチャを続けることになった……
line = "俺はその後、キス魔と化したアニュラスと日が暮れるまでイチャイチャを続けることになった……"

[[dialogue]]
speaker = "unk"
# 後日のテスト本番も無事に乗り切れたのはいいが、キスをお預けするのは危険だ。反動がすさまじいので、今回限りにしようと俺は強く思うのだった──
line = "後日のテスト本番も無事に乗り切れたのはいいが、キスをお預けするのは危険だ。反動がすさまじいので、今回限りにしようと俺は強く思うのだった──"
