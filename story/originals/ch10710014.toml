[[dialogue]]
speaker = "unk"
# 第４話,キサナと束の間の日溜まり,P
line = "第４話,キサナと束の間の日溜まり,P"

[[dialogue]]
speaker = "キサナ"
# 「ようやく見つけたぜ、魔王。ちょっとツラ貸せ」
line = "「ようやく見つけたぜ、魔王。ちょっとツラ貸せ」"

[[dialogue]]
speaker = "キサナ"
# 「別にケンカを売りに来たわけじゃねえよ。アタシだって会いたくて会いに来たわけじゃねえ」
line = "「別にケンカを売りに来たわけじゃねえよ。アタシだって会いたくて会いに来たわけじゃねえ」"

[[dialogue]]
speaker = "キサナ"
# 「おらガキ、いつまでも背中に隠れてねえで出てきやがれ。正義の味方んとこまで連れてきてやったぞ」
line = "「おらガキ、いつまでも背中に隠れてねえで出てきやがれ。正義の味方んとこまで連れてきてやったぞ」"

[[dialogue]]
speaker = "キサナ"
# 「あぁ？　今更ビビってんじゃねえよ。テメエがテメエで決めたんだろうが」
line = "「あぁ？　今更ビビってんじゃねえよ。テメエがテメエで決めたんだろうが」"

[[dialogue]]
speaker = "キサナ"
# 「アタシは行くわけねえだろ。ちょっ──んっ、こればっかりは尻尾引っ張っても無駄だっ。アタシはコイツらに追われてるっつってんだろ……！」
line = "「アタシは行くわけねえだろ。ちょっ──んっ、こればっかりは尻尾引っ張っても無駄だっ。アタシはコイツらに追われてるっつってんだろ……！」"

[[dialogue]]
speaker = "unk"
# 用事っていうのはその子の？
line = "用事っていうのはその子の？"

[[dialogue]]
speaker = "キサナ"
# 「そうだよ。保護だ保護。施設でもなんでもちゃっちゃと連れてってやれ」
line = "「そうだよ。保護だ保護。施設でもなんでもちゃっちゃと連れてってやれ」"

[[dialogue]]
speaker = "キサナ"
# 「アタシは今でも信用してねえけどな。あーいう組織には必ず裏があんだよ。アタシがコラプサーに拾われるまでいたマフィアだって、表向きは華やかな商売してたしな」
line = "「アタシは今でも信用してねえけどな。あーいう組織には必ず裏があんだよ。アタシがコラプサーに拾われるまでいたマフィアだって、表向きは華やかな商売してたしな」"

[[dialogue]]
speaker = "キサナ"
# 「輝いて見えるもんにはその分だけ、どす黒い闇が潜んでるもんだ。少なくともアタシが生きてきた場所じゃそうだった」
line = "「輝いて見えるもんにはその分だけ、どす黒い闇が潜んでるもんだ。少なくともアタシが生きてきた場所じゃそうだった」"

[[dialogue]]
speaker = "キサナ"
# 「だが……それはあくまでアタシの考えだ。このガキが施設に行きてえって言うんなら止める理由もねえ」
line = "「だが……それはあくまでアタシの考えだ。このガキが施設に行きてえって言うんなら止める理由もねえ」"

[[dialogue]]
speaker = "キサナ"
# 「テメエのことはテメエで決める。このガキは行くって決めたんだ。だからオマエんとこに連れてきてやったんだよ」
line = "「テメエのことはテメエで決める。このガキは行くって決めたんだ。だからオマエんとこに連れてきてやったんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「わかったらとっとと連れてけ。アタシは新しい隠れ家を探さなきゃなんねーんだ」
line = "「わかったらとっとと連れてけ。アタシは新しい隠れ家を探さなきゃなんねーんだ」"

[[dialogue]]
speaker = "unk"
# 本当にいいのか？
line = "本当にいいのか？"

[[dialogue]]
speaker = "キサナ"
# 「あぁ？　今更何言ってんだ？　散々説得してきたのはオマエだろうが」
line = "「あぁ？　今更何言ってんだ？　散々説得してきたのはオマエだろうが」"

[[dialogue]]
speaker = "キサナ"
# 「このガキが行くっつってんだ。アタシには関係ねえ。これで今までの宿賃もチャラだ」
line = "「このガキが行くっつってんだ。アタシには関係ねえ。これで今までの宿賃もチャラだ」"

[[dialogue]]
speaker = "キサナ"
# 「ほらガキ。魔王んとこ行けよ。いい加減アタシの尻尾から手ぇ離せって。だからアタシは行かねえってのっ！」
line = "「ほらガキ。魔王んとこ行けよ。いい加減アタシの尻尾から手ぇ離せって。だからアタシは行かねえってのっ！」"

[[dialogue]]
speaker = "unk"
# 姉同然に慕われてるみたいだし
line = "姉同然に慕われてるみたいだし"

[[dialogue]]
speaker = "キサナ"
# 「姉だぁ……？　ハッ、生憎だがな。アタシは家族やら仲間やらってのは信じてねえんだよ」
line = "「姉だぁ……？　ハッ、生憎だがな。アタシは家族やら仲間やらってのは信じてねえんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「んなもんを信じたせいで死んだヤツを何人も見てきてる。アタシだって親にも、アタシを拾ったマフィアにも裏切られ続けてきた」
line = "「んなもんを信じたせいで死んだヤツを何人も見てきてる。アタシだって親にも、アタシを拾ったマフィアにも裏切られ続けてきた」"

[[dialogue]]
speaker = "キサナ"
# 「コラプサーのヤツらだって別に信用してねえしな。アイツらもアタシのことを仲間だとは考えちゃいねえよ」
line = "「コラプサーのヤツらだって別に信用してねえしな。アイツらもアタシのことを仲間だとは考えちゃいねえよ」"

[[dialogue]]
speaker = "キサナ"
# 「このガキがアタシんことをどう思ってるかは知らねえが、アタシは単に宿代代わりに世話してやっただけだ。それ以上でも以下でもねえ」
line = "「このガキがアタシんことをどう思ってるかは知らねえが、アタシは単に宿代代わりに世話してやっただけだ。それ以上でも以下でもねえ」"

[[dialogue]]
speaker = "キサナ"
# 「おらガキ。わかったらとっとと行け。これ以上アタシをイライラさせんな」
line = "「おらガキ。わかったらとっとと行け。これ以上アタシをイライラさせんな」"

[[dialogue]]
speaker = "キサナ"
# 「いいか？　アタシも今までテメエを利用してきたんだよ。手元にガキがいりゃ星騎士どもも簡単にアタシへ手出しできねえからな」
line = "「いいか？　アタシも今までテメエを利用してきたんだよ。手元にガキがいりゃ星騎士どもも簡単にアタシへ手出しできねえからな」"

[[dialogue]]
speaker = "キサナ"
# 「あぁ？　嘘じゃねえよ、どうして嘘つく必要があんだよ。ああもうマジでうぜえな……！　泣きそうな目で見てくんじゃねえ……！」
line = "「あぁ？　嘘じゃねえよ、どうして嘘つく必要があんだよ。ああもうマジでうぜえな……！　泣きそうな目で見てくんじゃねえ……！」"

[[dialogue]]
speaker = "キサナ"
# 「それ以上グダグダ言ってたら、マジでぶっ殺──」
line = "「それ以上グダグダ言ってたら、マジでぶっ殺──」"

[[dialogue]]
speaker = "キサナ"
# 「っっ──離れろガキっ！」
line = "「っっ──離れろガキっ！」"

[[dialogue]]
speaker = "キサナ"
# 「チッ、真っ昼間からモンスターだぁ？　正義の味方さまは何やってんだよ」
line = "「チッ、真っ昼間からモンスターだぁ？　正義の味方さまは何やってんだよ」"

[[dialogue]]
speaker = "キサナ"
# 「まだ話の途中だからな。手ぇ貸してやるよ魔王。さっさとコイツらぶっ潰すぞ！」
line = "「まだ話の途中だからな。手ぇ貸してやるよ魔王。さっさとコイツらぶっ潰すぞ！」"

[[dialogue]]
speaker = "キサナ"
# 「カラミティパイル！」
line = "「カラミティパイル！」"

[[dialogue]]
speaker = "キサナ"
# 「片付いたな。ガキは……んだよ、ビビッて気絶してんのか」
line = "「片付いたな。ガキは……んだよ、ビビッて気絶してんのか」"

[[dialogue]]
speaker = "キサナ"
# 「まぁ丁度いい。このまま施設とやらに連れてってやれ」
line = "「まぁ丁度いい。このまま施設とやらに連れてってやれ」"

[[dialogue]]
speaker = "キサナ"
# 「んだよ、その顔は。アタシには未練なんかねえっつの。たかだか数日一緒にいただけの仲じゃねえか」
line = "「んだよ、その顔は。アタシには未練なんかねえっつの。たかだか数日一緒にいただけの仲じゃねえか」"

[[dialogue]]
speaker = "キサナ"
# 「アタシと一緒にいるより、施設に行く方がコイツにはいい」
line = "「アタシと一緒にいるより、施設に行く方がコイツにはいい」"

[[dialogue]]
speaker = "キサナ"
# 「辛い日々を忘れられるくらい楽しくて、安全で、安心できるような場所だって、オマエがそう言ったんだろ」
line = "「辛い日々を忘れられるくらい楽しくて、安全で、安心できるような場所だって、オマエがそう言ったんだろ」"

[[dialogue]]
speaker = "キサナ"
# 「それがホントなら、裏切られねえように常に目ぇギラつかせる必要も、泥水啜ったり腐った食いもん食う必要もねえ」
line = "「それがホントなら、裏切られねえように常に目ぇギラつかせる必要も、泥水啜ったり腐った食いもん食う必要もねえ」"

[[dialogue]]
speaker = "キサナ"
# 「言葉にするだけで吐き気がするほど胡散臭えけどな。ま、アタシに泣きすがってくるようなこのガキにはぴったりな場所なんじゃねえか」
line = "「言葉にするだけで吐き気がするほど胡散臭えけどな。ま、アタシに泣きすがってくるようなこのガキにはぴったりな場所なんじゃねえか」"

[[dialogue]]
speaker = "unk"
# ああ、俺が保証する
line = "ああ、俺が保証する"

[[dialogue]]
speaker = "キサナ"
# 「フン、オマエに保証されてもな。……ま、他のヤツよりはマシか」
line = "「フン、オマエに保証されてもな。……ま、他のヤツよりはマシか」"

[[dialogue]]
speaker = "キサナ"
# 「オマエみてえなお節介野郎は初めてだ。見てると心底イライラするぜ」
line = "「オマエみてえなお節介野郎は初めてだ。見てると心底イライラするぜ」"

[[dialogue]]
speaker = "キサナ"
# 「んじゃな魔王。精々そのガキに恨まれねえよう祈っとけ。ろくでもない場所だったら後ろから刺される羽目になるぜ？」
line = "「んじゃな魔王。精々そのガキに恨まれねえよう祈っとけ。ろくでもない場所だったら後ろから刺される羽目になるぜ？」"

[[dialogue]]
speaker = "unk"
# 行くのか？
line = "行くのか？"

[[dialogue]]
speaker = "キサナ"
# 「ガキが目覚めちまうと面倒だからな。ちんたらしてるとオマエにお仲間を呼ばれちまうかもしんねえし」
line = "「ガキが目覚めちまうと面倒だからな。ちんたらしてるとオマエにお仲間を呼ばれちまうかもしんねえし」"

[[dialogue]]
speaker = "キサナ"
# 「そうだ。お仲間に言っとけ。アタシを追い回しても意味ねえぞってな」
line = "「そうだ。お仲間に言っとけ。アタシを追い回しても意味ねえぞってな」"

[[dialogue]]
speaker = "キサナ"
# 「アタシは下っ端だからコラプサーのことなんざよく知らねえし、大した情報は持ってねえ。組織の名前くらいが精々だ」
line = "「アタシは下っ端だからコラプサーのことなんざよく知らねえし、大した情報は持ってねえ。組織の名前くらいが精々だ」"

[[dialogue]]
speaker = "キサナ"
# 「命令がなきゃ前みたいに星騎士を襲うつもりもねえしな。今んとこ、そっちから仕掛けてこねえ限りはアタシも手出しはしねえ」
line = "「命令がなきゃ前みたいに星騎士を襲うつもりもねえしな。今んとこ、そっちから仕掛けてこねえ限りはアタシも手出しはしねえ」"

[[dialogue]]
speaker = "キサナ"
# 「ま、しばらくは高みの見物を決めさせてもらうぜ。恵まれた環境で生きてきた正義の味方どものなんちゃってヒーローショーをな」
line = "「ま、しばらくは高みの見物を決めさせてもらうぜ。恵まれた環境で生きてきた正義の味方どものなんちゃってヒーローショーをな」"

[[dialogue]]
speaker = "キサナ"
# 「ガキにはアタシのことは忘れるように……いや、そのうち勝手に忘れるか。やっぱ何も言わなくていいぜ」
line = "「ガキにはアタシのことは忘れるように……いや、そのうち勝手に忘れるか。やっぱ何も言わなくていいぜ」"

[[dialogue]]
speaker = "キサナ"
# 「じゃあな。せいぜい正義の味方を頑張れよ」
line = "「じゃあな。せいぜい正義の味方を頑張れよ」"
