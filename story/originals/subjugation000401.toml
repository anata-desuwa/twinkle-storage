[[dialogue]]
speaker = "unk"
# ハロウィンの時期が迫ってきたある日のこと。
line = "ハロウィンの時期が迫ってきたある日のこと。"

[[dialogue]]
speaker = "unk"
# セナリィから秘密結社『ゴールデングース』の定例会議に参加して欲しいと、大聖堂カフェテリアへ呼び出された。
line = "セナリィから秘密結社『ゴールデングース』の定例会議に参加して欲しいと、大聖堂カフェテリアへ呼び出された。"

[[dialogue]]
speaker = "セナリィ"
# 「ズバリ、ハロウィンはお金を稼ぐ、絶好のチャンスだと思いますの！」
line = "「ズバリ、ハロウィンはお金を稼ぐ、絶好のチャンスだと思いますの！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　セナリィのことだから、そう言い出すだろうと思ってたよ」
line = "「にひひ♪　セナリィのことだから、そう言い出すだろうと思ってたよ」"

[[dialogue]]
speaker = "unk"
# それはいいけど、なんで俺まで……？
line = "それはいいけど、なんで俺まで……？"

[[dialogue]]
speaker = "セナリィ"
# 「ふふっ、会長様に声をかけるのは当然ですわ」
line = "「ふふっ、会長様に声をかけるのは当然ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「なんせ我が社の重要な、幹部の１人ですもの♪」
line = "「なんせ我が社の重要な、幹部の１人ですもの♪」"

[[dialogue]]
speaker = "unk"
# いつの間に！？
line = "いつの間に！？"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私も別に、ゴールデングースに所属するなんて、まだ約束してないんだけどね～」
line = "「私も別に、ゴールデングースに所属するなんて、まだ約束してないんだけどね～」"

[[dialogue]]
speaker = "セナリィ"
# 「あら、マインだって、面白いものが見られるんじゃないかと期待しているからこそ、ここにいるのではなくて？」
line = "「あら、マインだって、面白いものが見られるんじゃないかと期待しているからこそ、ここにいるのではなくて？」"

[[dialogue]]
speaker = "セナリィ"
# 「あなたは本当に興味がないなら、何やかんやとはぐらかして断る。そういう女でしょう？」
line = "「あなたは本当に興味がないなら、何やかんやとはぐらかして断る。そういう女でしょう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はてさて、どうだかね～」
line = "「はてさて、どうだかね～」"

[[dialogue]]
speaker = "セナリィ"
# 「まあ、ノリ気ならなんでもいいですわ。ともかく、今日の議題はハロウィンの計画についてですの！」
line = "「まあ、ノリ気ならなんでもいいですわ。ともかく、今日の議題はハロウィンの計画についてですの！」"

[[dialogue]]
speaker = "unk"
# 彼女は新星学園２年生、人呼んで『バンデッド・セナリィ』。
line = "彼女は新星学園２年生、人呼んで『バンデッド・セナリィ』。"

[[dialogue]]
speaker = "unk"
# 幼い頃から武器商人の下で戦場を渡り歩いてきた本物の傭兵であり、学園には九浄家のスカウトを受けてやってきた。
line = "幼い頃から武器商人の下で戦場を渡り歩いてきた本物の傭兵であり、学園には九浄家のスカウトを受けてやってきた。"

[[dialogue]]
speaker = "unk"
# 現在は秘密結社『ゴールデングース』の総帥を名乗り、今回のようなお金稼ぎのチャンスを見つけては、積極的に活動を行っている。
line = "現在は秘密結社『ゴールデングース』の総帥を名乗り、今回のようなお金稼ぎのチャンスを見つけては、積極的に活動を行っている。"

[[dialogue]]
speaker = "unk"
# 悪戯な笑みを浮かべるもう１人は、新星学園１年の<ruby=たちくち>立朽</ruby>ネーゼマイン。
line = "悪戯な笑みを浮かべるもう１人は、新星学園１年の<ruby>立朽<rt>たちくち</rt></ruby>ネーゼマイン。"

[[dialogue]]
speaker = "unk"
# 学園の秘密組織『公安委員会』に所属するエージェントで、トラップ設置による妨害工作と、弁護士である父親譲りの交渉術を得意としている。
line = "学園の秘密組織『公安委員会』に所属するエージェントで、トラップ設置による妨害工作と、弁護士である父親譲りの交渉術を得意としている。"

[[dialogue]]
speaker = "unk"
# セナリィは公安委員会の外注エージェントとして活動もしており、ネーゼマインとは仕事をする際にバディを組む仲だ。
line = "セナリィは公安委員会の外注エージェントとして活動もしており、ネーゼマインとは仕事をする際にバディを組む仲だ。"

[[dialogue]]
speaker = "ネーゼマイン"
# 「――ふ～ん、学園のハロウィンパーティー当日に、お菓子の販売ねぇ」
line = "「――ふ～ん、学園のハロウィンパーティー当日に、お菓子の販売ねぇ」"

[[dialogue]]
speaker = "セナリィ"
# 「そう！　ハロウィンといえばお菓子ですわ！　各お菓子メーカーもハロウィン仕様の限定パッケージで販売したりするでしょう？」
line = "「そう！　ハロウィンといえばお菓子ですわ！　各お菓子メーカーもハロウィン仕様の限定パッケージで販売したりするでしょう？」"

[[dialogue]]
speaker = "セナリィ"
# 「これを逃がす手はありませんの！　ハロウィンパーティー開催中に、その場で美味しいお菓子を販売すれば、大儲け間違いなしですわ！」
line = "「これを逃がす手はありませんの！　ハロウィンパーティー開催中に、その場で美味しいお菓子を販売すれば、大儲け間違いなしですわ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「大儲けね～。……簡単に言うけど、セナリィなら当然知ってるでしょ？」
line = "「大儲けね～。……簡単に言うけど、セナリィなら当然知ってるでしょ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「学園のハロウィンパーティーは、新星学園と流星学園の共同開催。その為、会場は毎年――」
line = "「学園のハロウィンパーティーは、新星学園と流星学園の共同開催。その為、会場は毎年――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ここ、大聖堂カフェテリアになるってこと」
line = "「ここ、大聖堂カフェテリアになるってこと」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「当日はカフェテリアの方からも、バイキング形式でお菓子が提供される。そして周知の通り、カフェテリアの料理はどれも美味しいって評判が高い」
line = "「当日はカフェテリアの方からも、バイキング形式でお菓子が提供される。そして周知の通り、カフェテリアの料理はどれも美味しいって評判が高い」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「聞けば、毎年ハロウィンパーティーで出されるお菓子も美味しいっていうよ？　しかも、今年は――」
line = "「聞けば、毎年ハロウィンパーティーで出されるお菓子も美味しいっていうよ？　しかも、今年は――」"

[[dialogue]]
speaker = "セナリィ"
# 「今や学園では知らぬ者はいない程に有名な料理人、新星学園２年の<ruby=しののめけいか>東雲蛍火</ruby>様がいる、でしょう？」
line = "「今や学園では知らぬ者はいない程に有名な料理人、新星学園２年の<ruby>東雲蛍火<rt>しののめけいか</rt></ruby>様がいる、でしょう？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ただでさえ美味しいと評判だった大聖堂カフェテリアの料理が、彼女が厨房に立つようになってから、更に２段階上の次元に引き上げられたとまで言われてるよね」
line = "「ただでさえ美味しいと評判だった大聖堂カフェテリアの料理が、彼女が厨房に立つようになってから、更に２段階上の次元に引き上げられたとまで言われてるよね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「東雲先輩の料理の腕前はジャンルを問わないそうだし、ハロウィンのお菓子も作る可能性が高いと思うけど、そこら辺は考えてあるのかな？」
line = "「東雲先輩の料理の腕前はジャンルを問わないそうだし、ハロウィンのお菓子も作る可能性が高いと思うけど、そこら辺は考えてあるのかな？」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふふ、もちろん勝算あっての提案ですわ。確かに東雲様の作り出す料理はどれもプロ級と有名……」
line = "「ふふふ、もちろん勝算あっての提案ですわ。確かに東雲様の作り出す料理はどれもプロ級と有名……」"

[[dialogue]]
speaker = "セナリィ"
# 「しかし、お菓子は決して得意ジャンルではないとリサーチ済みですの。特に<b>洋菓子</b>に関しては、彼女をも上回る腕前の持ち主がいることも」
line = "「しかし、お菓子は決して得意ジャンルではないとリサーチ済みですの。特に<b>洋菓子</b>に関しては、彼女をも上回る腕前の持ち主がいることも」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、そうきたか～。プロのパティシエ級にお菓子作りが上手いっていうと――」
line = "「あ～、そうきたか～。プロのパティシエ級にお菓子作りが上手いっていうと――」"

[[dialogue]]
speaker = "セナリィ"
# 「新星学園２年生、<ruby=さくらじゅうじ>桜十路</ruby>サラン様ですわ」
line = "「新星学園２年生、<ruby>桜十路<rt>さくらじゅうじ</rt></ruby>サラン様ですわ」"

[[dialogue]]
speaker = "セナリィ"
# 「まだ直接、桜十路様のお菓子を口にしたことはありませんけれど、東雲様本人に聞いても、お菓子作りに関しては自分よりも上だと言っていたから、間違いありませんわ！」
line = "「まだ直接、桜十路様のお菓子を口にしたことはありませんけれど、東雲様本人に聞いても、お菓子作りに関しては自分よりも上だと言っていたから、間違いありませんわ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そこでわざわざ本人に聞いちゃうのが、セナリィって感じだよね～」
line = "「そこでわざわざ本人に聞いちゃうのが、セナリィって感じだよね～」"

[[dialogue]]
speaker = "セナリィ"
# 「ほほほ♪　悪とは邪道を駆使することですもの。それに今回は商売敵になってしまいますけれど、東雲様はビジネスパートナーとしても是非、懇意にしたい相手」
line = "「ほほほ♪　悪とは邪道を駆使することですもの。それに今回は商売敵になってしまいますけれど、東雲様はビジネスパートナーとしても是非、懇意にしたい相手」"

[[dialogue]]
speaker = "セナリィ"
# 「顔見知りになっておいて損はありませんわ。ただ、かなり警戒心の強い方でしたから、いずれ改めてご挨拶し直したいところですけれど……」
line = "「顔見知りになっておいて損はありませんわ。ただ、かなり警戒心の強い方でしたから、いずれ改めてご挨拶し直したいところですけれど……」"

[[dialogue]]
speaker = "セナリィ"
# 「ともあれ、今回の販売計画の要となるのは、桜十路様ですの」
line = "「ともあれ、今回の販売計画の要となるのは、桜十路様ですの」"

[[dialogue]]
speaker = "セナリィ"
# 「そして、彼女が実は、既に会長様と交友関係があることもリサーチ済みですわ！」
line = "「そして、彼女が実は、既に会長様と交友関係があることもリサーチ済みですわ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そんなことだろうと思った。会長ってば、肩書き抜きにしても、本当に顔が広いよね～」
line = "「そんなことだろうと思った。会長ってば、肩書き抜きにしても、本当に顔が広いよね～」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「特に女の子。私が紹介する前に、セナリィとも知り合いだったしさ～」
line = "「特に女の子。私が紹介する前に、セナリィとも知り合いだったしさ～」"

[[dialogue]]
speaker = "セナリィ"
# 「それを言うなら、いつの間にか会長様に、マインの正体と公安委員会の存在がバレてたのも驚きましたわよ」
line = "「それを言うなら、いつの間にか会長様に、マインの正体と公安委員会の存在がバレてたのも驚きましたわよ」"

[[dialogue]]
speaker = "セナリィ"
# 「で、会長様には、その広い人脈を活かして、今回の販売計画について、桜十路様との間を取り持って頂きたいのですわ」
line = "「で、会長様には、その広い人脈を活かして、今回の販売計画について、桜十路様との間を取り持って頂きたいのですわ」"

[[dialogue]]
speaker = "unk"
# いいけど、サランが頷くかはわからないぞ？
line = "いいけど、サランが頷くかはわからないぞ？"

[[dialogue]]
speaker = "セナリィ"
# 「そこは我が社の顧問交渉人である、マインの出番ですわ♪」
line = "「そこは我が社の顧問交渉人である、マインの出番ですわ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「顧問になった覚えはないんだけど……う～ん」
line = "「顧問になった覚えはないんだけど……う～ん」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「桜十路先輩かぁ……」
line = "「桜十路先輩かぁ……」"

[[dialogue]]
speaker = "サラン"
# 「――ハロウィンパーティーで、お菓子を売るの～？」
line = "「――ハロウィンパーティーで、お菓子を売るの～？」"

[[dialogue]]
speaker = "サラン"
# 「わ～♪　面白そう～♪」
line = "「わ～♪　面白そう～♪」"

[[dialogue]]
speaker = "サラン"
# 「サランも一緒にやりた～い♪　まぜてまぜて～♪」
line = "「サランも一緒にやりた～い♪　まぜてまぜて～♪」"

[[dialogue]]
speaker = "unk"
# まさかの即決！
line = "まさかの即決！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あらら、マジか～」
line = "「あらら、マジか～」"

[[dialogue]]
speaker = "セナリィ"
# 「ふふふ、あしなに♪　交渉成立ですわね」
line = "「ふふふ、あしなに♪　交渉成立ですわね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私の出る幕、なかったけどね」
line = "「私の出る幕、なかったけどね」"

[[dialogue]]
speaker = "セナリィ"
# 「運がこちらに向いているということですわ。なんにしても、これで前提条件はクリア――」
line = "「運がこちらに向いているということですわ。なんにしても、これで前提条件はクリア――」"

[[dialogue]]
speaker = "セナリィ"
# 「そうと決まれば、悪・即・善♪　楽しいハロウィン計画の始まりですわよ～！」
line = "「そうと決まれば、悪・即・善♪　楽しいハロウィン計画の始まりですわよ～！」"

[[dialogue]]
speaker = "サラン"
# 「お～♪」
line = "「お～♪」"

[[dialogue]]
speaker = "unk"
# こうして、ここにいる皆でハロウィンパーティーでお菓子販売をすることに決まったのだった。
line = "こうして、ここにいる皆でハロウィンパーティーでお菓子販売をすることに決まったのだった。"
