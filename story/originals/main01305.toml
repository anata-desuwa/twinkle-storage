[[dialogue]]
speaker = "unk"
# 第５話,最悪のマレフィック,B
line = "第５話,最悪のマレフィック,B"

[[dialogue]]
speaker = "unk"
# そうして、一夜が明け──
line = "そうして、一夜が明け──"

[[dialogue]]
speaker = "unk"
# 翌朝になって俺たちの元へ飛び込んできたのは、血相を変えたトリシャさんだった。
line = "翌朝になって俺たちの元へ飛び込んできたのは、血相を変えたトリシャさんだった。"

[[dialogue]]
speaker = "トリシャ"
# 「こ──仔羊える迷い子たちよ！　いいから聞いて落ち着くのです！」
line = "「こ──仔羊える迷い子たちよ！　いいから聞いて落ち着くのです！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、まずはトリシャが落ち着いて？」
line = "「ま、まずはトリシャが落ち着いて？」"

[[dialogue]]
speaker = "unk"
# 昨晩、共に夕食のテーブルを囲んだトリシャさんは、一旦自分のねぐらへ帰ったはずだった。
line = "昨晩、共に夕食のテーブルを囲んだトリシャさんは、一旦自分のねぐらへ帰ったはずだった。"

[[dialogue]]
speaker = "unk"
# しかし、明くる日になって再びここへ戻ってきた。
line = "しかし、明くる日になって再びここへ戻ってきた。"

[[dialogue]]
speaker = "トリシャ"
# 「こほん。失礼。私としたことが取り乱しました。しかし、これほどの凶星を目にして驚くなというほうが無理というもの」
line = "「こほん。失礼。私としたことが取り乱しました。しかし、これほどの凶星を目にして驚くなというほうが無理というもの」"

[[dialogue]]
speaker = "トリシャ"
# 「単刀直入に申し上げましょう。仔羊たち。あなた達は早急に人間界へ帰るべきです」
line = "「単刀直入に申し上げましょう。仔羊たち。あなた達は早急に人間界へ帰るべきです」"

[[dialogue]]
speaker = "フィオナ"
# 「人間界へ──？」
line = "「人間界へ──？」"

[[dialogue]]
speaker = "クロト"
# 「心配しなくても、大いなる冬が完全に落ち着いたら帰るつもりだけど……」
line = "「心配しなくても、大いなる冬が完全に落ち着いたら帰るつもりだけど……」"

[[dialogue]]
speaker = "トリシャ"
# 「それでは遅い。なるべく直ちに、今すぐにもです」
line = "「それでは遅い。なるべく直ちに、今すぐにもです」"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ。人間界で何か起きているのか？」
line = "「ふむ。人間界で何か起きているのか？」"

[[dialogue]]
speaker = "unk"
# 同じく夕食を囲んだのち、大酒を飲んで泊まり込んでいたラティエ学園長も顔を出した。
line = "同じく夕食を囲んだのち、大酒を飲んで泊まり込んでいたラティエ学園長も顔を出した。"

[[dialogue]]
speaker = "トリシャ"
# 「はい。人間界全域に恐るべき凶兆が出ている──これは千年に一度、いえ、それ以上ともいえる最悪の<ruby=マレフィック>凶星</ruby>です！」
line = "「はい。人間界全域に恐るべき凶兆が出ている──これは千年に一度、いえ、それ以上ともいえる最悪の<ruby>凶星<rt>マレフィック</rt></ruby>です！」"

[[dialogue]]
speaker = "マトイ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# トリシャさんは緊迫した面持ちでそう告げた。
line = "トリシャさんは緊迫した面持ちでそう告げた。"

[[dialogue]]
speaker = "unk"
# 彼女の首に提げられたペンデュラムが、かつてないほど強烈な光を放っていた。
line = "彼女の首に提げられたペンデュラムが、かつてないほど強烈な光を放っていた。"

[[dialogue]]
speaker = "トリシャ"
# 「振り子の示すところによれば──人間界は今、<ruby=しれつ>熾烈</ruby>な災禍に見舞われています。魔界の星々も<ruby=おのの>戦</ruby>いていますが、それ以上に」
line = "「振り子の示すところによれば──人間界は今、<ruby>熾烈<rt>しれつ</rt></ruby>な災禍に見舞われています。魔界の星々も<ruby>戦<rt>おのの</rt></ruby>いていますが、それ以上に」"

[[dialogue]]
speaker = "ヴィーナス"
# 「な、何よそれ！　黒騎士を倒したってのに早々にやばそうじゃない！？」
line = "「な、何よそれ！　黒騎士を倒したってのに早々にやばそうじゃない！？」"

[[dialogue]]
speaker = "ニャリオン"
# 「でも占いは占いニャン……？　そこまでアテになるのかニャン……？」
line = "「でも占いは占いニャン……？　そこまでアテになるのかニャン……？」"

[[dialogue]]
speaker = "クロト"
# 「トリシャさんの占星術は俺たちでいうところの星術だ。それが反応してるってことは……」
line = "「トリシャさんの占星術は俺たちでいうところの星術だ。それが反応してるってことは……」"

[[dialogue]]
speaker = "フィオナ"
# 「人間界全体を襲う災禍──リクリエ現象の可能性が濃厚ですね」
line = "「人間界全体を襲う災禍──リクリエ現象の可能性が濃厚ですね」"

[[dialogue]]
speaker = "unk"
# 向こうが実際どうなっているのか知りたいが、魔界からすぐに連絡は通じない。
line = "向こうが実際どうなっているのか知りたいが、魔界からすぐに連絡は通じない。"

[[dialogue]]
speaker = "unk"
# 緊急事態だというなら──直接動くしかないだろう。
line = "緊急事態だというなら──直接動くしかないだろう。"

[[dialogue]]
speaker = "トリシャ"
# 「ゆえに叶うのであれば即刻、あなた方は帰るべきでしょう。せっかくできたお友達と別れるのは……非常に残念ですが……」
line = "「ゆえに叶うのであれば即刻、あなた方は帰るべきでしょう。せっかくできたお友達と別れるのは……非常に残念ですが……」"

[[dialogue]]
speaker = "マトイ"
# 「また会いに来ますよ！　今度は星徒会のみんなも連れて！」
line = "「また会いに来ますよ！　今度は星徒会のみんなも連れて！」"

[[dialogue]]
speaker = "サーシャ"
# 「そうね。私とソフィからしたら地元だし」
line = "「そうね。私とソフィからしたら地元だし」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……ありがとうございます。こう見えて私は魔界の各地を渡ってきた流浪の占い師」
line = "「フフ……ありがとうございます。こう見えて私は魔界の各地を渡ってきた流浪の占い師」"

[[dialogue]]
speaker = "トリシャ"
# 「もしかすると、いずれは私が人間界へ赴くこともあるやもしれません……」
line = "「もしかすると、いずれは私が人間界へ赴くこともあるやもしれません……」"

[[dialogue]]
speaker = "unk"
# トリシャさんのお告げを受け、俺たちは至急人間界へ戻ることを決めた。
line = "トリシャさんのお告げを受け、俺たちは至急人間界へ戻ることを決めた。"

[[dialogue]]
speaker = "ユウリ"
# 「つっても、レゾフを放ってはおけないよな」
line = "「つっても、レゾフを放ってはおけないよな」"

[[dialogue]]
speaker = "ラティエ"
# 「ふむ。ならば私はこちらへ残ろう、スタンピードの余波がまだ来ないとも限らない」
line = "「ふむ。ならば私はこちらへ残ろう、スタンピードの余波がまだ来ないとも限らない」"

[[dialogue]]
speaker = "フィオナ"
# 「学園長──ありがとうございます。それなら安心です」
line = "「学園長──ありがとうございます。それなら安心です」"

[[dialogue]]
speaker = "フィオナ"
# 「ですが、事が済みましたら……すぐに学園へ帰ってきてくださいね。私では務まらない業務が溜まっていますから」
line = "「ですが、事が済みましたら……すぐに学園へ帰ってきてくださいね。私では務まらない業務が溜まっていますから」"

[[dialogue]]
speaker = "ソフィア"
# 「そうです！　それに……新星のセイファート学園長もいなくなってしまった以上、もっとしっかりしてもらわないと困ります」
line = "「そうです！　それに……新星のセイファート学園長もいなくなってしまった以上、もっとしっかりしてもらわないと困ります」"

[[dialogue]]
speaker = "ラティエ"
# 「やれやれ……逃がしてはくれないか。もう少し旅情に浸っていたかったのだがな」
line = "「やれやれ……逃がしてはくれないか。もう少し旅情に浸っていたかったのだがな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「学園かー……大して離れてたわけでもないのに、なんか懐かしい気もしちゃうわね」
line = "「学園かー……大して離れてたわけでもないのに、なんか懐かしい気もしちゃうわね」"

[[dialogue]]
speaker = "クロト"
# 「よし。じゃあ戻ろう──アナ達も心配して待ってるはずだ」
line = "「よし。じゃあ戻ろう──アナ達も心配して待ってるはずだ」"
