[[dialogue]]
speaker = "プトラ"
# 「プトラアターック！」
line = "「プトラアターック！」"

[[dialogue]]
speaker = "unk"
# プトラが水の槍を振り回し、クマロボたちをまとめてなぎ倒す。
line = "プトラが水の槍を振り回し、クマロボたちをまとめてなぎ倒す。"

[[dialogue]]
speaker = "unk"
# 一方では──
line = "一方では──"

[[dialogue]]
speaker = "アルテ"
# 「ローズブレード！」
line = "「ローズブレード！」"

[[dialogue]]
speaker = "クマロボ"
# 「クマァーーーーーーーーーー！！！！？？」
line = "「クマァーーーーーーーーーー！！！！？？」"

[[dialogue]]
speaker = "アルテ"
# 「ふむ……いい感じですね、さすが私です」
line = "「ふむ……いい感じですね、さすが私です」"

[[dialogue]]
speaker = "unk"
# 流麗な足さばきでクマロボの懐に入り込むと、一閃して鋼の胴体を切り払う。
line = "流麗な足さばきでクマロボの懐に入り込むと、一閃して鋼の胴体を切り払う。"

[[dialogue]]
speaker = "unk"
# ２人の加勢もあって、戦いはすぐに収束した。
line = "２人の加勢もあって、戦いはすぐに収束した。"

[[dialogue]]
speaker = "アポロ"
# 「おーい、そっちは大丈夫だったか？」
line = "「おーい、そっちは大丈夫だったか？」"

[[dialogue]]
speaker = "アルテ"
# 「もちろん。この私が後れを取ることなどありえません」
line = "「もちろん。この私が後れを取ることなどありえません」"

[[dialogue]]
speaker = "ヴィーナス"
# 「すごいわね、２人とも！」
line = "「すごいわね、２人とも！」"

[[dialogue]]
speaker = "プトラ"
# 「えへへ、みんなの変身を見て、かっこいいって思ってたんだ。だから、あたしも出来てうれしいよ♪」
line = "「えへへ、みんなの変身を見て、かっこいいって思ってたんだ。だから、あたしも出来てうれしいよ♪」"

[[dialogue]]
speaker = "アルテ"
# 「それで──敵の襲撃を退けたわけですが、私たちが元の世界に戻る気配はありませんね」
line = "「それで──敵の襲撃を退けたわけですが、私たちが元の世界に戻る気配はありませんね」"

[[dialogue]]
speaker = "アポロ"
# 「あたしのフォームも解除される気配はないな。まあ、あたしはこのフォームも好きだけど」
line = "「あたしのフォームも解除される気配はないな。まあ、あたしはこのフォームも好きだけど」"

[[dialogue]]
speaker = "フィオナ"
# 「先ほど倒したクマのロボットたちは尖兵のようですし、やはりこの異変を引き起こした元凶を倒さないと、元の世界には戻れないということなのでしょうね」
line = "「先ほど倒したクマのロボットたちは尖兵のようですし、やはりこの異変を引き起こした元凶を倒さないと、元の世界には戻れないということなのでしょうね」"

[[dialogue]]
speaker = "unk"
# あの黒い衣装を来た女の子……
line = "あの黒い衣装を来た女の子……"

[[dialogue]]
speaker = "黒ベア子"
# 『わたしは黒ベア子！　異世界に送ったお仲間さんたちも、ちゃんと向こうの人と合流できてるよ』
line = "『わたしは黒ベア子！　異世界に送ったお仲間さんたちも、ちゃんと向こうの人と合流できてるよ』"

[[dialogue]]
speaker = "黒ベア子"
# 『そしてっ、なぜこんなことをしたか！　それはぁ……お祭りっくま～～♪♪』
line = "『そしてっ、なぜこんなことをしたか！　それはぁ……お祭りっくま～～♪♪』"

[[dialogue]]
speaker = "黒ベア子"
# 『普段は一緒に遊べないお仲間さんたちと、いーーーっぱい盛り上がって欲しいくまっ！』
line = "『普段は一緒に遊べないお仲間さんたちと、いーーーっぱい盛り上がって欲しいくまっ！』"

[[dialogue]]
speaker = "ヴィーナス"
# 「じゃあ、その肝心の黒ベア子はどこにいるの、って話よ」
line = "「じゃあ、その肝心の黒ベア子はどこにいるの、って話よ」"

[[dialogue]]
speaker = "フィオナ"
# 「それはわかりません。愉快犯のようですから、しばらくこの状況を愉しむつもりかもしれません」
line = "「それはわかりません。愉快犯のようですから、しばらくこの状況を愉しむつもりかもしれません」"

[[dialogue]]
speaker = "アルテ"
# 「やれやれ、アテネスに帰れるのはもう暫く先になりそうですね」
line = "「やれやれ、アテネスに帰れるのはもう暫く先になりそうですね」"

[[dialogue]]
speaker = "アルテ"
# 「ま、そんなことよりご飯です！　水を差されてしまいましたが美味しいお肉を食べに行きましょう！」
line = "「ま、そんなことよりご飯です！　水を差されてしまいましたが美味しいお肉を食べに行きましょう！」"

[[dialogue]]
speaker = "プトラ"
# 「お魚もーっ♪」
line = "「お魚もーっ♪」"

[[dialogue]]
speaker = "プトラ"
# 「はーっ、食べた食べた♪　お魚美味しかった～♪　それであたしがこれからお世話になるのって……」
line = "「はーっ、食べた食べた♪　お魚美味しかった～♪　それであたしがこれからお世話になるのって……」"

[[dialogue]]
speaker = "アポロ"
# 「あれだ。教皇庁」
line = "「あれだ。教皇庁」"

[[dialogue]]
speaker = "プトラ"
# 「えええええ……！？　あれがフィオナとアポロのおうち……！？」
line = "「えええええ……！？　あれがフィオナとアポロのおうち……！？」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、私たちが住んでいるのは、裏の邸宅の方なんですが……」
line = "「いえ、私たちが住んでいるのは、裏の邸宅の方なんですが……」"

[[dialogue]]
speaker = "プトラ"
# 「それでもすっごい豪邸じゃない！？　も、もしかしてフィオナとアポロってすっごいお嬢様だったりする？」
line = "「それでもすっごい豪邸じゃない！？　も、もしかしてフィオナとアポロってすっごいお嬢様だったりする？」"

[[dialogue]]
speaker = "アポロ"
# 「この流星市国で一番偉いのが、流星教皇。んで、あたしたちはその娘だ」
line = "「この流星市国で一番偉いのが、流星教皇。んで、あたしたちはその娘だ」"

[[dialogue]]
speaker = "プトラ"
# 「ってことは、フィオナとアポロってお姫様……！？　ひゃ～っ……すっごーい……っ！」
line = "「ってことは、フィオナとアポロってお姫様……！？　ひゃ～っ……すっごーい……っ！」"

[[dialogue]]
speaker = "アポロ"
# 「ま、姫といえなくもないかな」
line = "「ま、姫といえなくもないかな」"

[[dialogue]]
speaker = "フィオナ"
# 「いえそんな、お姫様なんて……同年代なんですし、普通に接してください」
line = "「いえそんな、お姫様なんて……同年代なんですし、普通に接してください」"

[[dialogue]]
speaker = "プトラ"
# 「う、うん……頑張る……」
line = "「う、うん……頑張る……」"

[[dialogue]]
speaker = "キリカ"
# 「お嬢様、お部屋の準備が整いました」
line = "「お嬢様、お部屋の準備が整いました」"

[[dialogue]]
speaker = "プトラ"
# 「わっ！？　メイドさんだ！！」
line = "「わっ！？　メイドさんだ！！」"

[[dialogue]]
speaker = "キリカ"
# 「プトラ様、お荷物がありましたらお預かりします」
line = "「プトラ様、お荷物がありましたらお預かりします」"

[[dialogue]]
speaker = "プトラ"
# 「だ、大丈夫！　何にも持たずにこっちの世界にきちゃったから、荷物なんてないよ！」
line = "「だ、大丈夫！　何にも持たずにこっちの世界にきちゃったから、荷物なんてないよ！」"

[[dialogue]]
speaker = "キリカ"
# 「かしこまりました。では、お部屋までご案内させて頂きます」
line = "「かしこまりました。では、お部屋までご案内させて頂きます」"

[[dialogue]]
speaker = "プトラ"
# 「は、はいぃ……」
line = "「は、はいぃ……」"

[[dialogue]]
speaker = "アポロ"
# 「おーい、プトラ。手と足が同時に出ちゃってるぞ～」
line = "「おーい、プトラ。手と足が同時に出ちゃってるぞ～」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ……キリカ、プトラさんが緊張してしまっているから、もう少しフランクに接してあげて」
line = "「ふふ……キリカ、プトラさんが緊張してしまっているから、もう少しフランクに接してあげて」"

[[dialogue]]
speaker = "キリカ"
# 「かしこまりました、お嬢様。では参りましょう、プトラさん」
line = "「かしこまりました、お嬢様。では参りましょう、プトラさん」"

[[dialogue]]
speaker = "プトラ"
# 「あううう、素敵な笑顔～！　でもすっごく上品だよ～！　こんなメイドさんがいるなんて、やっぱりすごい家なんだ～～！！」
line = "「あううう、素敵な笑顔～！　でもすっごく上品だよ～！　こんなメイドさんがいるなんて、やっぱりすごい家なんだ～～！！」"
