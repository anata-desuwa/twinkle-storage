[[dialogue]]
speaker = "unk"
# 第１話,マムと休暇,P
line = "第１話,マムと休暇,P"

[[dialogue]]
speaker = "unk"
# 新星寮の寮長『マム』こと、妃竜院マハムートと知り合ってから月日が経ったある日のこと。
line = "新星寮の寮長『マム』こと、妃竜院マハムートと知り合ってから月日が経ったある日のこと。"

[[dialogue]]
speaker = "unk"
# 俺は彼女を誘って、リゾート結界へとやって来ていた。
line = "俺は彼女を誘って、リゾート結界へとやって来ていた。"

[[dialogue]]
speaker = "マハムート"
# 「――やっと来たわね。レディを待たせるとはいい度胸ね、会長？」
line = "「――やっと来たわね。レディを待たせるとはいい度胸ね、会長？」"

[[dialogue]]
speaker = "マハムート"
# 「……なんてね。まだ約束の１０分前だから、安心なさい」
line = "「……なんてね。まだ約束の１０分前だから、安心なさい」"

[[dialogue]]
speaker = "unk"
# 水着、今日も似合ってますね
line = "水着、今日も似合ってますね"

[[dialogue]]
speaker = "マハムート"
# 「なに？　どうしたの、今更改まって。この前のビーチバレー特訓で、毎日のように着てたじゃない。別に褒められて悪い気はしないけれど……」
line = "「なに？　どうしたの、今更改まって。この前のビーチバレー特訓で、毎日のように着てたじゃない。別に褒められて悪い気はしないけれど……」"

[[dialogue]]
speaker = "マハムート"
# 「会長、ちょっと顔を貸しなさい」
line = "「会長、ちょっと顔を貸しなさい」"

[[dialogue]]
speaker = "unk"
# そう言って、マムは両手で俺の頬に触れて、顔を近づけてくる。
line = "そう言って、マムは両手で俺の頬に触れて、顔を近づけてくる。"

[[dialogue]]
speaker = "マハムート"
# 「……調子が悪い、ということはなさそうね。ほら、昨日は星徒会の仕事で夜遅くまで残業していたでしょう？」
line = "「……調子が悪い、ということはなさそうね。ほら、昨日は星徒会の仕事で夜遅くまで残業していたでしょう？」"

[[dialogue]]
speaker = "マハムート"
# 「何だか、いつもと様子が違う気がしたから。一応聞いておくけど、寝不足で無理をしてるなんてことはないわよね？」
line = "「何だか、いつもと様子が違う気がしたから。一応聞いておくけど、寝不足で無理をしてるなんてことはないわよね？」"

[[dialogue]]
speaker = "unk"
# 俺はドキッとしたが、首を横に振る。
line = "俺はドキッとしたが、首を横に振る。"

[[dialogue]]
speaker = "マハムート"
# 「ふむ……まあ、いいわ。それで？　今日は純粋に夏の休暇を楽しむということでいいのかしら？」
line = "「ふむ……まあ、いいわ。それで？　今日は純粋に夏の休暇を楽しむということでいいのかしら？」"

[[dialogue]]
speaker = "マハムート"
# 「貴方が望むなら……この前の続きをしてあげてもいいけれど？」
line = "「貴方が望むなら……この前の続きをしてあげてもいいけれど？」"

[[dialogue]]
speaker = "マハムート"
# 「――何をって、決まってるじゃない。ふふ……」
line = "「――何をって、決まってるじゃない。ふふ……」"

[[dialogue]]
speaker = "マハムート"
# 「ビーチバレーの特訓よ♪」
line = "「ビーチバレーの特訓よ♪」"

[[dialogue]]
speaker = "unk"
# 普通の休暇でお願いします！
line = "普通の休暇でお願いします！"

[[dialogue]]
speaker = "マハムート"
# 「冗談よ。それじゃあ今日は、プライベートビーチでゆったり過ごすとしましょうか」
line = "「冗談よ。それじゃあ今日は、プライベートビーチでゆったり過ごすとしましょうか」"

[[dialogue]]
speaker = "unk"
# リゾート結界のプライベートビーチ――それは、結界の主であるリップルが、星徒会室から出入りできるように繋げてくれている専用の空間である。
line = "リゾート結界のプライベートビーチ――それは、結界の主であるリップルが、星徒会室から出入りできるように繋げてくれている専用の空間である。"

[[dialogue]]
speaker = "unk"
# その為、星徒会役員以外が利用することはほとんどなく、静かに過ごすにはうってつけの場所となっている。
line = "その為、星徒会役員以外が利用することはほとんどなく、静かに過ごすにはうってつけの場所となっている。"

[[dialogue]]
speaker = "unk"
# 俺とマムは大きなパラソルの下、２つ並んだビーチチェアーに座り、くつろぎながら過ごす。
line = "俺とマムは大きなパラソルの下、２つ並んだビーチチェアーに座り、くつろぎながら過ごす。"

[[dialogue]]
speaker = "マハムート"
# 「ふぅ……やっぱりここはいいわね」
line = "「ふぅ……やっぱりここはいいわね」"

[[dialogue]]
speaker = "マハムート"
# 「全く、こんな場所を年中自由に使えるなんて、とんだ役得よね。今更ながら、星徒会に入らせてもらおうかしら？」
line = "「全く、こんな場所を年中自由に使えるなんて、とんだ役得よね。今更ながら、星徒会に入らせてもらおうかしら？」"

[[dialogue]]
speaker = "unk"
# マムなら大歓迎ですよ
line = "マムなら大歓迎ですよ"

[[dialogue]]
speaker = "マハムート"
# 「冗談に決まってるでしょう、まったく。まぁ、そうは言っても、最近は貴方の仕事を手伝うことも増えてきてしまっているけれど」
line = "「冗談に決まってるでしょう、まったく。まぁ、そうは言っても、最近は貴方の仕事を手伝うことも増えてきてしまっているけれど」"

[[dialogue]]
speaker = "マハムート"
# 「――感謝してるって？　そうよ。畏怖を持って、先輩に感謝しなさい。……ふふっ」
line = "「――感謝してるって？　そうよ。畏怖を持って、先輩に感謝しなさい。……ふふっ」"

[[dialogue]]
speaker = "unk"
# いい感じの空気になったところで、俺は意を決して、切り出す。
line = "いい感じの空気になったところで、俺は意を決して、切り出す。"

[[dialogue]]
speaker = "unk"
# 実は今日、マムに話したいことがあって
line = "実は今日、マムに話したいことがあって"

[[dialogue]]
speaker = "マハムート"
# 「ん？　何かしら。相談事？」
line = "「ん？　何かしら。相談事？」"

[[dialogue]]
speaker = "unk"
# マムがビーチチェアーから起き上がって、こちらに向き直る。俺は深呼吸をしてから、告げた。
line = "マムがビーチチェアーから起き上がって、こちらに向き直る。俺は深呼吸をしてから、告げた。"

[[dialogue]]
speaker = "unk"
# マム、好きです。俺と付き合って下さい
line = "マム、好きです。俺と付き合って下さい"

[[dialogue]]
speaker = "マハムート"
# 「え？」
line = "「え？」"

[[dialogue]]
speaker = "マハムート"
# 「…………ち、ちょっと待ちなさい。何を言い出すのかと思えば……」
line = "「…………ち、ちょっと待ちなさい。何を言い出すのかと思えば……」"

[[dialogue]]
speaker = "マハムート"
# 「貴方が今日、いつもと様子が違う気がしたのって、そういうこと……？」
line = "「貴方が今日、いつもと様子が違う気がしたのって、そういうこと……？」"

[[dialogue]]
speaker = "unk"
# マムは俺のこと、どう思ってますか？
line = "マムは俺のこと、どう思ってますか？"

[[dialogue]]
speaker = "マハムート"
# 「ど、どうって……いきなりそんなこと言われても、返事に困るじゃない……」
line = "「ど、どうって……いきなりそんなこと言われても、返事に困るじゃない……」"

[[dialogue]]
speaker = "マハムート"
# 「大体、どうして私なわけ？　貴方なら、他にも仲のいい子が沢山いるでしょう。最近で言うと、マトイとか、アムとか……」
line = "「大体、どうして私なわけ？　貴方なら、他にも仲のいい子が沢山いるでしょう。最近で言うと、マトイとか、アムとか……」"

[[dialogue]]
speaker = "unk"
# １番親しい女の子は、マムだと思ってます
line = "１番親しい女の子は、マムだと思ってます"

[[dialogue]]
speaker = "マハムート"
# 「――私はどうなのかって？　それは……確かに、こうやって休みの日に、２人きりで過ごしたりする間柄ではあるし……」
line = "「――私はどうなのかって？　それは……確かに、こうやって休みの日に、２人きりで過ごしたりする間柄ではあるし……」"

[[dialogue]]
speaker = "マハムート"
# 「１番親しい異性が誰かと聞かれたら……貴方では、あるけれど……」
line = "「１番親しい異性が誰かと聞かれたら……貴方では、あるけれど……」"

[[dialogue]]
speaker = "マハムート"
# 「……だ、だけど！　こういうことは、もっと慎重に考えるべきよ、ええっ」
line = "「……だ、だけど！　こういうことは、もっと慎重に考えるべきよ、ええっ」"

[[dialogue]]
speaker = "マハムート"
# 「私は『竜』だもの。付き合う男性として貴方を認めるには、試練を与えて、ちゃんと見極める必要があるわ、うん！」
line = "「私は『竜』だもの。付き合う男性として貴方を認めるには、試練を与えて、ちゃんと見極める必要があるわ、うん！」"

[[dialogue]]
speaker = "マハムート"
# 「……ということで、まずは会長を試すところからになるけど、それでもいいのかしら……？」
line = "「……ということで、まずは会長を試すところからになるけど、それでもいいのかしら……？」"

[[dialogue]]
speaker = "unk"
# もちろん！　頑張ります！
line = "もちろん！　頑張ります！"

[[dialogue]]
speaker = "マハムート"
# 「そ、そう……」
line = "「そ、そう……」"

[[dialogue]]
speaker = "マハムート"
# 「じゃあ、そういうことで……」
line = "「じゃあ、そういうことで……」"

[[dialogue]]
speaker = "マハムート"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "マハムート"
# 「……って、異性として意識したら、まずは何から試すべきなのか、わからないわね……」
line = "「……って、異性として意識したら、まずは何から試すべきなのか、わからないわね……」"

[[dialogue]]
speaker = "unk"
# まずはゆったり２人で過ごして、慣れるとか
line = "まずはゆったり２人で過ごして、慣れるとか"

[[dialogue]]
speaker = "マハムート"
# 「……な、なるほど。一緒にいて、嫌じゃないかは大事よね、うん」
line = "「……な、なるほど。一緒にいて、嫌じゃないかは大事よね、うん」"

[[dialogue]]
speaker = "unk"
# その後、俺たち２人はちょっとこそばゆいながらも、穏やかな休暇を過ごすのだった――
line = "その後、俺たち２人はちょっとこそばゆいながらも、穏やかな休暇を過ごすのだった――"
