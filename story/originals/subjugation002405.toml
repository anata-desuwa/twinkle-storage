[[dialogue]]
speaker = "unk"
# サチの幸運がなくなってから２週間ほど経ったある日、俺たちはトレジアンナさんから呼び出しを受けて、再び集合することになった――
line = "サチの幸運がなくなってから２週間ほど経ったある日、俺たちはトレジアンナさんから呼び出しを受けて、再び集合することになった――"

[[dialogue]]
speaker = "トレジアンナ"
# 「じゃじゃ～ん☆　これを見て下さい、みなさん！」
line = "「じゃじゃ～ん☆　これを見て下さい、みなさん！」"

[[dialogue]]
speaker = "トマル"
# 「トレジアンナさま、それは……新しい武器、ですか？」
line = "「トレジアンナさま、それは……新しい武器、ですか？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい♪　私も現代っぽく戦闘スタイルをアップデートしようと思って、ネビュラから提供して頂いた技術を元に作り出した、魔法少女ステッキです♪」
line = "「はい♪　私も現代っぽく戦闘スタイルをアップデートしようと思って、ネビュラから提供して頂いた技術を元に作り出した、魔法少女ステッキです♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私は『光の魔女』ではありませんから、当時、『光魔法』の知識は記憶できても、習得だけはできなかったんですよ」
line = "「私は『光の魔女』ではありませんから、当時、『光魔法』の知識は記憶できても、習得だけはできなかったんですよ」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ですが、ネビュラの現代技術によって今、ついに疑似的に再現できるようになり、コレクション解禁になったというわけです♪」
line = "「ですが、ネビュラの現代技術によって今、ついに疑似的に再現できるようになり、コレクション解禁になったというわけです♪」"

[[dialogue]]
speaker = "トレジアンナ"
# 「あとは、もう１つ。サチさんにも渡したいものがあって」
line = "「あとは、もう１つ。サチさんにも渡したいものがあって」"

[[dialogue]]
speaker = "サチ"
# 「私に、ですか？」
line = "「私に、ですか？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい。サチさん専用にアップデートした『セレスティア』です」
line = "「はい。サチさん専用にアップデートした『セレスティア』です」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんはそう言って、星騎士が戦闘服へ変身する為に使うそれをサチに渡す。
line = "トレジアンナさんはそう言って、星騎士が戦闘服へ変身する為に使うそれをサチに渡す。"

[[dialogue]]
speaker = "unk"
# 試して欲しいと言われて、サチが変身してみると――
line = "試して欲しいと言われて、サチが変身してみると――"

[[dialogue]]
speaker = "サチ"
# 「この力は……！？」
line = "「この力は……！？」"

[[dialogue]]
speaker = "unk"
# 見た目こそ変わらないが、サチ本人だけでなく、俺たちも違いを感じ取ることができた。
line = "見た目こそ変わらないが、サチ本人だけでなく、俺たちも違いを感じ取ることができた。"

[[dialogue]]
speaker = "プリムラ"
# 「この感じ……シズハと同じなのじゃ！」
line = "「この感じ……シズハと同じなのじゃ！」"

[[dialogue]]
speaker = "シズハ"
# 「うん。サチちゃんから星力だけじゃなくて、私の中の聖杯ちゃんと同じ――『魔力』が出ているのを感じるよ！」
line = "「うん。サチちゃんから星力だけじゃなくて、私の中の聖杯ちゃんと同じ――『魔力』が出ているのを感じるよ！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「そう。２人の天才――学園が誇る錬金術師のアニマさんと、ネビュラの現代魔法技術を支える研究者・ツェツィーリエさんに協力をお願いして、共同で作り上げました」
line = "「そう。２人の天才――学園が誇る錬金術師のアニマさんと、ネビュラの現代魔法技術を支える研究者・ツェツィーリエさんに協力をお願いして、共同で作り上げました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「本来星騎士は、魔王である会長さんのような例外を除いて、星力しか使えません」
line = "「本来星騎士は、魔王である会長さんのような例外を除いて、星力しか使えません」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ですが、そのアップデートした戦闘服は、星力を魔力に変換することができ、魔女と同じように『魔法』を使うことができるようになります」
line = "「ですが、そのアップデートした戦闘服は、星力を魔力に変換することができ、魔女と同じように『魔法』を使うことができるようになります」"

[[dialogue]]
speaker = "トレジアンナ"
# 「また、人工ノヴァフォームの技術を取り入れ、事前に星力をチャージしておくことが可能となりました」
line = "「また、人工ノヴァフォームの技術を取り入れ、事前に星力をチャージしておくことが可能となりました」"

[[dialogue]]
speaker = "トレジアンナ"
# 「この仕様によって、以前よりも高出力かつ、星術と魔法のスムーズな並列使用を実現しています！」
line = "「この仕様によって、以前よりも高出力かつ、星術と魔法のスムーズな並列使用を実現しています！」"

[[dialogue]]
speaker = "トレジアンナ"
# 「つまり！　正真正銘、サチさん専用の『魔法少女衣装』というわけです！」
line = "「つまり！　正真正銘、サチさん専用の『魔法少女衣装』というわけです！」"

[[dialogue]]
speaker = "サチ"
# 「私が、魔法を使えるように……？」
line = "「私が、魔法を使えるように……？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私の力では現状、サチさんに幸運の力を戻すことはできません」
line = "「私の力では現状、サチさんに幸運の力を戻すことはできません」"

[[dialogue]]
speaker = "トレジアンナ"
# 「ですが魔法の力なら、差し上げることができます！　……まあ、サチさんは魔法少女を名乗るのは嫌かもしれませんが」
line = "「ですが魔法の力なら、差し上げることができます！　……まあ、サチさんは魔法少女を名乗るのは嫌かもしれませんが」"

[[dialogue]]
speaker = "サチ"
# 「いいえ。トレジアンナさん」
line = "「いいえ。トレジアンナさん」"

[[dialogue]]
speaker = "サチ"
# 「――私のために、ありがとうございます」
line = "「――私のために、ありがとうございます」"

[[dialogue]]
speaker = "サチ"
# 「本当は、私のほうからお願いすべきでした。……トレジアンナさんの知っている魔法を、教えてほしいです」
line = "「本当は、私のほうからお願いすべきでした。……トレジアンナさんの知っている魔法を、教えてほしいです」"

[[dialogue]]
speaker = "サチ"
# 「私を、本物の魔法少女にしてくれますか……？」
line = "「私を、本物の魔法少女にしてくれますか……？」"

[[dialogue]]
speaker = "トレジアンナ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "unk"
# トレジアンナさんはサチの言葉を聞いて、目を見開いたあと――
line = "トレジアンナさんはサチの言葉を聞いて、目を見開いたあと――"

[[dialogue]]
speaker = "トレジアンナ"
# 「はい、もちろんです！　だって……」
line = "「はい、もちろんです！　だって……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「私はサチさんのお助け妖精ポジションですから♪」
line = "「私はサチさんのお助け妖精ポジションですから♪」"

[[dialogue]]
speaker = "unk"
# そう言って、嬉しそうに微笑むのだった。
line = "そう言って、嬉しそうに微笑むのだった。"

[[dialogue]]
speaker = "unk"
# それから数日後――トレジアンナさんの探知魔法に、新たなロストアイテム反応が観測された。
line = "それから数日後――トレジアンナさんの探知魔法に、新たなロストアイテム反応が観測された。"

[[dialogue]]
speaker = "unk"
# 俺たちがそこへ向かうと――
line = "俺たちがそこへ向かうと――"

[[dialogue]]
speaker = "ディーラック"
# 「やあ。待っていたよ、魔法少女のみんな」
line = "「やあ。待っていたよ、魔法少女のみんな」"

[[dialogue]]
speaker = "unk"
# 周囲の景色が急に暗くなり、ふわりとディーラックが姿を現す。
line = "周囲の景色が急に暗くなり、ふわりとディーラックが姿を現す。"

[[dialogue]]
speaker = "シズハ"
# 「ディーちゃん……」
line = "「ディーちゃん……」"

[[dialogue]]
speaker = "トレジアンナ"
# 「これは、物理的な出入りを封鎖する結界魔法……！」
line = "「これは、物理的な出入りを封鎖する結界魔法……！」"

[[dialogue]]
speaker = "ディーラック"
# 「ボクもそろそろ、決着をつけたいと思っていたからサ。ロストアイテムの反応で、キミたちをおびき出させてもらったよ」
line = "「ボクもそろそろ、決着をつけたいと思っていたからサ。ロストアイテムの反応で、キミたちをおびき出させてもらったよ」"

[[dialogue]]
speaker = "ディーラック"
# 「で、キミたちももう気づいてるんだろう？　サチちゃんの幸運が、ボクに奪われたことにサ」
line = "「で、キミたちももう気づいてるんだろう？　サチちゃんの幸運が、ボクに奪われたことにサ」"

[[dialogue]]
speaker = "サチ"
# 「はい。前にわざわざ姿を現した目的は、それだったんですね」
line = "「はい。前にわざわざ姿を現した目的は、それだったんですね」"

[[dialogue]]
speaker = "ディーラック"
# 「解放のロストアイテムを取られちゃったのは予定外だったけど……でも、そのおかげで<b>これ</b>を作り出すことができたよ」
line = "「解放のロストアイテムを取られちゃったのは予定外だったけど……でも、そのおかげで<b>これ</b>を作り出すことができたよ」"

[[dialogue]]
speaker = "unk"
# そう言って、ディーラックが自分の前に浮かせて見せたのは――
line = "そう言って、ディーラックが自分の前に浮かせて見せたのは――"

[[dialogue]]
speaker = "ディーラック"
# 「『幸運のロストアイテム』。サチちゃんから奪った能力『<ruby=ラッキースター>幸運流星</ruby>』を元に、ボクが作り上げた逸品サ」
line = "「『幸運のロストアイテム』。サチちゃんから奪った能力『<ruby>幸運流星<rt>ラッキースター</rt></ruby>』を元に、ボクが作り上げた逸品サ」"

[[dialogue]]
speaker = "ディーラック"
# 「それじゃあ……早速、始めようか。――あ～ん」
line = "「それじゃあ……早速、始めようか。――あ～ん」"

[[dialogue]]
speaker = "unk"
# ディーラックは大きく口を開けると、幸運のロストアイテムをごっくんと飲み込む。そして……
line = "ディーラックは大きく口を開けると、幸運のロストアイテムをごっくんと飲み込む。そして……"

[[dialogue]]
speaker = "ディーラック"
# 「――招来」
line = "「――招来」"

[[dialogue]]
speaker = "サチ"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ディーラック"
# 「さあ、残念だけど――キミたちの運命は、ここからはハズレのみサ……！」
line = "「さあ、残念だけど――キミたちの運命は、ここからはハズレのみサ……！」"

[[dialogue]]
speaker = "unk"
# 新たな異様へと変貌し、圧倒的な威圧感を放つディーラックとの戦闘が、開始されるのだった――
line = "新たな異様へと変貌し、圧倒的な威圧感を放つディーラックとの戦闘が、開始されるのだった――"
