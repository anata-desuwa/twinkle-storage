[[dialogue]]
speaker = "unk"
# 第２話,勇者スキルは万能です,P
line = "第２話,勇者スキルは万能です,P"

[[dialogue]]
speaker = "ユーリス"
# 「──おや？　会長の制服、裾が少しほつれているね」
line = "「──おや？　会長の制服、裾が少しほつれているね」"

[[dialogue]]
speaker = "マトイ"
# 「あ、ホントだ。どこかに引っかけちゃったのかな？」
line = "「あ、ホントだ。どこかに引っかけちゃったのかな？」"

[[dialogue]]
speaker = "環"
# 「こんな時にさっと直してあげられたらいいんだけどねー。残念無念、ボクはお裁縫はできないぜ！」
line = "「こんな時にさっと直してあげられたらいいんだけどねー。残念無念、ボクはお裁縫はできないぜ！」"

[[dialogue]]
speaker = "マトイ"
# 「私も人にやってあげられるほどじゃないかなぁ……」
line = "「私も人にやってあげられるほどじゃないかなぁ……」"

[[dialogue]]
speaker = "unk"
# 帰ってから母さんに頼もうかな
line = "帰ってから母さんに頼もうかな"

[[dialogue]]
speaker = "ユーリス"
# 「こらこら。ダメだよ会長。君は生徒の模範になるべき立場なんだから。たとえ短い時間でも示しがつかないじゃないか」
line = "「こらこら。ダメだよ会長。君は生徒の模範になるべき立場なんだから。たとえ短い時間でも示しがつかないじゃないか」"

[[dialogue]]
speaker = "環"
# 「おぉ。流石は本物の王子様だ。言うことが違うなー」
line = "「おぉ。流石は本物の王子様だ。言うことが違うなー」"

[[dialogue]]
speaker = "ユーリス"
# 「私が直そう。上着を脱いで渡してもらえるかな？」
line = "「私が直そう。上着を脱いで渡してもらえるかな？」"

[[dialogue]]
speaker = "マトイ"
# 「ユーリスくんってお裁縫もできちゃうんだ？　すごい」
line = "「ユーリスくんってお裁縫もできちゃうんだ？　すごい」"

[[dialogue]]
speaker = "ユーリス"
# 「ささっと縫ってしまうね、会長。では──剣よ！」
line = "「ささっと縫ってしまうね、会長。では──剣よ！」"

[[dialogue]]
speaker = "マトイ"
# 「ユーリスくんのバッジが光った……！？」
line = "「ユーリスくんのバッジが光った……！？」"

[[dialogue]]
speaker = "ユーリス"
# 「このバッジは武器化していない時の我が聖剣『エーヴィヒリヒト』なんです」
line = "「このバッジは武器化していない時の我が聖剣『エーヴィヒリヒト』なんです」"

[[dialogue]]
speaker = "ユーリス"
# 「そして勇者スキル『裁縫』を発動しました」
line = "「そして勇者スキル『裁縫』を発動しました」"

[[dialogue]]
speaker = "マトイ"
# 「す、すごいよっ！　ユーリスくんの手つき、まるで職人さんみたいに高速で動いてるよ！？」
line = "「す、すごいよっ！　ユーリスくんの手つき、まるで職人さんみたいに高速で動いてるよ！？」"

[[dialogue]]
speaker = "ユーリス"
# 「エーヴィヒリヒトが記憶できるものは剣技だけに非ず。初代から先代まで、歴代から受け継いだ様々な技能を継承しています」
line = "「エーヴィヒリヒトが記憶できるものは剣技だけに非ず。初代から先代まで、歴代から受け継いだ様々な技能を継承しています」"

[[dialogue]]
speaker = "ユーリス"
# 「持ち主を万能へと近づける勇者の剣……それが我が聖剣の正体でして……ぬいぬい」
line = "「持ち主を万能へと近づける勇者の剣……それが我が聖剣の正体でして……ぬいぬい」"

[[dialogue]]
speaker = "環"
# 「めっちゃカッコいいこと言って制服のほつれ直してるのシュールだな～」
line = "「めっちゃカッコいいこと言って制服のほつれ直してるのシュールだな～」"

[[dialogue]]
speaker = "unk"
# 勇者スキルって他に何を覚えてるんだ？
line = "勇者スキルって他に何を覚えてるんだ？"

[[dialogue]]
speaker = "ユーリス"
# 「そうだね。シャツの染み抜きにポーチドエッグ作り。麻雀のつばめ返しにテーブルクロス引きまで万全さ」
line = "「そうだね。シャツの染み抜きにポーチドエッグ作り。麻雀のつばめ返しにテーブルクロス引きまで万全さ」"

[[dialogue]]
speaker = "マトイ"
# 「何だか急に庶民じみてきてない？　しかも反則技も入ってたような……聖剣ってそれでいいの……？」
line = "「何だか急に庶民じみてきてない？　しかも反則技も入ってたような……聖剣ってそれでいいの……？」"

[[dialogue]]
speaker = "環"
# 「いやぁでもこれ便利だね。どんなバイト先でも覇権取れちゃうぜ。その聖剣があれば無敵じゃない？」
line = "「いやぁでもこれ便利だね。どんなバイト先でも覇権取れちゃうぜ。その聖剣があれば無敵じゃない？」"

[[dialogue]]
speaker = "ユーリス"
# 「いえ、もちろんデメリットもあります」
line = "「いえ、もちろんデメリットもあります」"

[[dialogue]]
speaker = "ユーリス"
# 「私の力量を大きく越えた技を再現するには、星力の消費が激しく、体の負担も大きい。ですから聖剣を使いこなすには私自身も強くなければいけません」
line = "「私の力量を大きく越えた技を再現するには、星力の消費が激しく、体の負担も大きい。ですから聖剣を使いこなすには私自身も強くなければいけません」"

[[dialogue]]
speaker = "ユーリス"
# 「そして……私も聖剣に選ばれたからには、この剣にふさわしい技を残さなければ」
line = "「そして……私も聖剣に選ばれたからには、この剣にふさわしい技を残さなければ」"

[[dialogue]]
speaker = "ユーリス"
# 「未来でこの剣が必要になった時、人々を守れるように。誰かの役に立てるように」
line = "「未来でこの剣が必要になった時、人々を守れるように。誰かの役に立てるように」"

[[dialogue]]
speaker = "ユーリス"
# 「そんな願いとともにジルラント王国に代々受け継がれてきたのが、この聖剣なのです」
line = "「そんな願いとともにジルラント王国に代々受け継がれてきたのが、この聖剣なのです」"

[[dialogue]]
speaker = "マトイ"
# （つまり前の聖剣所有者は、裁縫ができたり、ポーチドエッグが作れたってこと？）
line = "（つまり前の聖剣所有者は、裁縫ができたり、ポーチドエッグが作れたってこと？）"

[[dialogue]]
speaker = "マトイ"
# （他にもテーブルクロス引きに麻雀に……ジルラント王家、けっこうフリーダムなのでは……？）
line = "（他にもテーブルクロス引きに麻雀に……ジルラント王家、けっこうフリーダムなのでは……？）"

[[dialogue]]
speaker = "ユーリス"
# 「──っと、はい。出来たよ会長。着心地はどうかな」
line = "「──っと、はい。出来たよ会長。着心地はどうかな」"

[[dialogue]]
speaker = "unk"
# ばっちりだ。ありがとう
line = "ばっちりだ。ありがとう"

[[dialogue]]
speaker = "ユーリス"
# 「あ。そんな雑に着たら……ほら。ネクタイが歪んじゃった。動かないで。直してあげるから」
line = "「あ。そんな雑に着たら……ほら。ネクタイが歪んじゃった。動かないで。直してあげるから」"

[[dialogue]]
speaker = "unk"
# ──！？
line = "──！？"

[[dialogue]]
speaker = "ユーリス"
# 「どうしたんだい、急に顔を赤くして」
line = "「どうしたんだい、急に顔を赤くして」"

[[dialogue]]
speaker = "ユーリス"
# 「じっとしていてくれ……うん、これでよし」
line = "「じっとしていてくれ……うん、これでよし」"

[[dialogue]]
speaker = "ユーリス"
# 「これで星徒会長らしくなったかな」
line = "「これで星徒会長らしくなったかな」"

[[dialogue]]
speaker = "環"
# 「王子様にネクタイ直させるなんて、ずいぶん偉くなったねー、会長」
line = "「王子様にネクタイ直させるなんて、ずいぶん偉くなったねー、会長」"

[[dialogue]]
speaker = "ユーリス"
# 「王子なんてただの身分ですよ。今の私は新星学園の星騎士にして、皆さんの仲間です」
line = "「王子なんてただの身分ですよ。今の私は新星学園の星騎士にして、皆さんの仲間です」"

[[dialogue]]
speaker = "ユーリス"
# 「皆さんの助けになるのなら、この聖剣のスキルを存分に振るいましょう」
line = "「皆さんの助けになるのなら、この聖剣のスキルを存分に振るいましょう」"

[[dialogue]]
speaker = "ユーリス"
# 「たとえば……料理を振る舞うのもやぶさかではありません。この聖剣には様々な料理のレシピが刻まれていますから」
line = "「たとえば……料理を振る舞うのもやぶさかではありません。この聖剣には様々な料理のレシピが刻まれていますから」"

[[dialogue]]
speaker = "unk"
# ユーリスはいいお嫁さんになりそうだな……
line = "ユーリスはいいお嫁さんになりそうだな……"

[[dialogue]]
speaker = "ユーリス"
# 「お嫁さん──！？」
line = "「お嫁さん──！？」"

[[dialogue]]
speaker = "ユーリス"
# 「な、何を言っているんだい会長は……私は王子……いや、それ以前に男だよ」
line = "「な、何を言っているんだい会長は……私は王子……いや、それ以前に男だよ」"

[[dialogue]]
speaker = "環"
# 「そーそー。王子様を捕まえてお嫁さんなんて、すっとこどっこいにも程があるよ」
line = "「そーそー。王子様を捕まえてお嫁さんなんて、すっとこどっこいにも程があるよ」"

[[dialogue]]
speaker = "環"
# 「ね、王子？」
line = "「ね、王子？」"

[[dialogue]]
speaker = "ユーリス"
# 「え、ええ……そうですね」
line = "「え、ええ……そうですね」"

[[dialogue]]
speaker = "ユーリス"
# 「ジルラント王国では、聖剣と王位は男性が継ぐものなんだ。だから性別には一応注意を払ってほしいかな……あはは」
line = "「ジルラント王国では、聖剣と王位は男性が継ぐものなんだ。だから性別には一応注意を払ってほしいかな……あはは」"
