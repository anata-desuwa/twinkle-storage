[[dialogue]]
speaker = "ソフィア"
# 「──滅！！」
line = "「──滅！！」"

[[dialogue]]
speaker = "アポロ"
# 「おおっすごいぜソフィア！　氷結の星術で虫たちを氷漬けだ！」
line = "「おおっすごいぜソフィア！　氷結の星術で虫たちを氷漬けだ！」"

[[dialogue]]
speaker = "ソフィア"
# 「──さらに滅！！」
line = "「──さらに滅！！」"

[[dialogue]]
speaker = "アナ"
# 「今度は流氷を一撃ノックアウト──さすがです！」
line = "「今度は流氷を一撃ノックアウト──さすがです！」"

[[dialogue]]
speaker = "ヴィーナス"
# （普段のアステラ討伐より張り切ってない？）
line = "（普段のアステラ討伐より張り切ってない？）"

[[dialogue]]
speaker = "サーシャ"
# （寒さの恨みは恐ろしいわ～）
line = "（寒さの恨みは恐ろしいわ～）"

[[dialogue]]
speaker = "unk"
# この『冬のイタズラ』という現象は──
line = "この『冬のイタズラ』という現象は──"

[[dialogue]]
speaker = "unk"
# リゾート結界の各地において、冷たい隙間風や流れ着く流氷といった形でたびたび発生するとのことだった。
line = "リゾート結界の各地において、冷たい隙間風や流れ着く流氷といった形でたびたび発生するとのことだった。"

[[dialogue]]
speaker = "unk"
# 無限かき氷を溶かし尽くした後も、ビーチのあちこちで『冬』めいた現象が目撃されるようになっていた。
line = "無限かき氷を溶かし尽くした後も、ビーチのあちこちで『冬』めいた現象が目撃されるようになっていた。"

[[dialogue]]
speaker = "フィオナ"
# 「参りましたね……向こうのヤシの木がいつの間にかモミの木に変わっていました」
line = "「参りましたね……向こうのヤシの木がいつの間にかモミの木に変わっていました」"

[[dialogue]]
speaker = "マトイ"
# 「そんなのもアリなの！？」
line = "「そんなのもアリなの！？」"

[[dialogue]]
speaker = "ルリエル"
# 「ひええ、ツリー型の魔獣が襲ってきますぅ～！」
line = "「ひええ、ツリー型の魔獣が襲ってきますぅ～！」"

[[dialogue]]
speaker = "ユウリ"
# 「任せな、ルリ。あたしの炎で撃退してやる──」
line = "「任せな、ルリ。あたしの炎で撃退してやる──」"

[[dialogue]]
speaker = "アポロ"
# 「ん？　待てユウリ、あの樹の枝になんかぶら下がってるぞ。あれは──」
line = "「ん？　待てユウリ、あの樹の枝になんかぶら下がってるぞ。あれは──」"

[[dialogue]]
speaker = "unk"
# ポチ袋だ
line = "ポチ袋だ"

[[dialogue]]
speaker = "アポロ"
# 「ってことは……お年玉だ！」
line = "「ってことは……お年玉だ！」"

[[dialogue]]
speaker = "ユウリ"
# 「なんでツリーにお年玉がついてるんだよ」
line = "「なんでツリーにお年玉がついてるんだよ」"

[[dialogue]]
speaker = "リップル"
# 「冬の風物詩だからデース！　冬のイタズラは冬にまつわることがなんでも起きてしまうのデース！」
line = "「冬の風物詩だからデース！　冬のイタズラは冬にまつわることがなんでも起きてしまうのデース！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ま、でもいいんじゃない？　私たちへのお駄賃ってことで──」
line = "「ま、でもいいんじゃない？　私たちへのお駄賃ってことで──」"

[[dialogue]]
speaker = "ソフィア"
# 「お年玉──滅！！」
line = "「お年玉──滅！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──えぇぇっ！？　お年玉はもらっておくもんじゃないの！？」
line = "「──えぇぇっ！？　お年玉はもらっておくもんじゃないの！？」"

[[dialogue]]
speaker = "ソフィア"
# 「我らが常夏の楽園に、冬の風物詩など不要です！」
line = "「我らが常夏の楽園に、冬の風物詩など不要です！」"

[[dialogue]]
speaker = "ユウリ"
# 「徹底してやがるぜ……」
line = "「徹底してやがるぜ……」"

[[dialogue]]
speaker = "ソフィア"
# 「ほら、新星会長さんもボサッとしてないで！　襲い来る冬の魔の手からリゾートを守るのですよ！」
line = "「ほら、新星会長さんもボサッとしてないで！　襲い来る冬の魔の手からリゾートを守るのですよ！」"

[[dialogue]]
speaker = "unk"
# ひときわ張り切るソフィア隊長によって、冬のイタズラたちは順調に駆逐されていった……。
line = "ひときわ張り切るソフィア隊長によって、冬のイタズラたちは順調に駆逐されていった……。"

[[dialogue]]
speaker = "リップル"
# 「──フゥ。ベリーベリーサンキューです、ソフィア。おかげでナントカ落ち着きました」
line = "「──フゥ。ベリーベリーサンキューです、ソフィア。おかげでナントカ落ち着きました」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ、お安い御用です。私たちの終わりなき夏　～ジ・エンドレス・サマー～　を壊させるわけにはいきませんから」
line = "「ええ、お安い御用です。私たちの終わりなき夏　～ジ・エンドレス・サマー～　を壊させるわけにはいきませんから」"

[[dialogue]]
speaker = "unk"
# ガシッと握手を交わす２人。
line = "ガシッと握手を交わす２人。"

[[dialogue]]
speaker = "unk"
# すっかり意気投合してしまっている。
line = "すっかり意気投合してしまっている。"

[[dialogue]]
speaker = "リップル"
# 「ジツは、ワタシ、このトコナツの結界で世界を覆い尽くそうとカンガえているのですっ！」
line = "「ジツは、ワタシ、このトコナツの結界で世界を覆い尽くそうとカンガえているのですっ！」"

[[dialogue]]
speaker = "リップル"
# 「このリゾート開発を繰り返していけば──いずれ世界は真のエンドレスサマーに包まれ、みんなハッピー♪　になれる素敵ケイカクなのですっ！」
line = "「このリゾート開発を繰り返していけば──いずれ世界は真のエンドレスサマーに包まれ、みんなハッピー♪　になれる素敵ケイカクなのですっ！」"

[[dialogue]]
speaker = "ソフィア"
# 「実に素晴らしいアイディアですね！　私も協力を惜しみません」
line = "「実に素晴らしいアイディアですね！　私も協力を惜しみません」"

[[dialogue]]
speaker = "アナ"
# 「まずいです。あの計画にシンパができてしまいました」
line = "「まずいです。あの計画にシンパができてしまいました」"

[[dialogue]]
speaker = "ソフィア"
# 「この調子でリゾートから徹底的に冬を追い出し、我らが真の楽園を取り戻すのです……！」
line = "「この調子でリゾートから徹底的に冬を追い出し、我らが真の楽園を取り戻すのです……！」"

[[dialogue]]
speaker = "リップル"
# 「その意気です、オー！」
line = "「その意気です、オー！」"

[[dialogue]]
speaker = "ユウリ"
# （あの熱気があればこのままでもいいんじゃねーか……？）
line = "（あの熱気があればこのままでもいいんじゃねーか……？）"

[[dialogue]]
speaker = "セーラ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ユウリ"
# 「ん？　どした、セーラさん」
line = "「ん？　どした、セーラさん」"

[[dialogue]]
speaker = "セーラ"
# 「あ、えっと……」
line = "「あ、えっと……」"

[[dialogue]]
speaker = "セーラ"
# （んー……気のせいかな？　今、影っぽいのが横切ったように見えたけど──）
line = "（んー……気のせいかな？　今、影っぽいのが横切ったように見えたけど──）"

[[dialogue]]
speaker = "？？？"
# 「フッフッフ……冬をオイダス、とは」
line = "「フッフッフ……冬をオイダス、とは」"

[[dialogue]]
speaker = "？？？"
# 「果たしてそうウマクいくカナ……？」
line = "「果たしてそうウマクいくカナ……？」"
