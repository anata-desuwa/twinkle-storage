[[dialogue]]
speaker = "unk"
# 第３話,魔王を止める者,B
line = "第３話,魔王を止める者,B"

[[dialogue]]
speaker = "unk"
# 一方その頃──
line = "一方その頃──"

[[dialogue]]
speaker = "unk"
# 街を破壊する極星従騎を必死に食い止めようとする星騎士たち。
line = "街を破壊する極星従騎を必死に食い止めようとする星騎士たち。"

[[dialogue]]
speaker = "unk"
# しかし敵の攻撃は苛烈で、星騎士も街も刻一刻と傷ついていった。
line = "しかし敵の攻撃は苛烈で、星騎士も街も刻一刻と傷ついていった。"

[[dialogue]]
speaker = "スレイプニル"
# 「ブルルッ！」
line = "「ブルルッ！」"

[[dialogue]]
speaker = "シルヴィ"
# 「させないよ！」
line = "「させないよ！」"

[[dialogue]]
speaker = "unk"
# メイスを交差させ、極星従騎の斬撃を真正面から受け止める。
line = "メイスを交差させ、極星従騎の斬撃を真正面から受け止める。"

[[dialogue]]
speaker = "unk"
# 星力の障壁のヒビが入るが、一歩も引かず、その威力を完全に削り切った。
line = "星力の障壁のヒビが入るが、一歩も引かず、その威力を完全に削り切った。"

[[dialogue]]
speaker = "unk"
# ガーディアンが再度剣を振り下ろそうとするが──
line = "ガーディアンが再度剣を振り下ろそうとするが──"

[[dialogue]]
speaker = "蛍火"
# 「そこです──！」
line = "「そこです──！」"

[[dialogue]]
speaker = "unk"
# 身の丈すら超える蛍火の包丁が、ガーディアンに一閃を見舞った。
line = "身の丈すら超える蛍火の包丁が、ガーディアンに一閃を見舞った。"

[[dialogue]]
speaker = "unk"
# 一瞬動きが止まるが、ガーディアンの鎧に亀裂が走るのみで、致命傷は与えられていない。
line = "一瞬動きが止まるが、ガーディアンの鎧に亀裂が走るのみで、致命傷は与えられていない。"

[[dialogue]]
speaker = "蛍火"
# 「今のを持ちこたえますか……ですがこれで十分！　サーシャ先輩！」
line = "「今のを持ちこたえますか……ですがこれで十分！　サーシャ先輩！」"

[[dialogue]]
speaker = "サーシャ（覚醒）"
# 「ええ、ありがとう。ブリザード・リーヴァー！」
line = "「ええ、ありがとう。ブリザード・リーヴァー！」"

[[dialogue]]
speaker = "unk"
# 全身を氷結させられたところを大鎌で両断され、ガーディアンは物言わぬ残骸と化した。
line = "全身を氷結させられたところを大鎌で両断され、ガーディアンは物言わぬ残骸と化した。"

[[dialogue]]
speaker = "サーシャ"
# 「ふぅ～」
line = "「ふぅ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「あ、いつもの戦闘服に戻っちゃった。さっきのがボサノヴァフォームだっけ？」
line = "「あ、いつもの戦闘服に戻っちゃった。さっきのがボサノヴァフォームだっけ？」"

[[dialogue]]
speaker = "サーシャ"
# 「ノヴァフォームよ～。そんなリズミカルな名前じゃないわ～」
line = "「ノヴァフォームよ～。そんなリズミカルな名前じゃないわ～」"

[[dialogue]]
speaker = "蛍火"
# 「やはりノヴァフォームは一段と強力ですね。さすがです」
line = "「やはりノヴァフォームは一段と強力ですね。さすがです」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがとう、蛍火ちゃん。でも消耗が激しいから、今は倒す時だけ変身してるのよ～」
line = "「ありがとう、蛍火ちゃん。でも消耗が激しいから、今は倒す時だけ変身してるのよ～」"

[[dialogue]]
speaker = "unk"
# 効率的と言えば効率的だが、あくまで苦肉の策だ。
line = "効率的と言えば効率的だが、あくまで苦肉の策だ。"

[[dialogue]]
speaker = "unk"
# フォームを切り替えることにも負担があり、星力の消費を幾分かマシにしているだけに過ぎない。
line = "フォームを切り替えることにも負担があり、星力の消費を幾分かマシにしているだけに過ぎない。"

[[dialogue]]
speaker = "シルヴィ"
# 「いや～、このメンバーで戦うのってかなり久しぶりじゃない？　昔を思い出すなー」
line = "「いや～、このメンバーで戦うのってかなり久しぶりじゃない？　昔を思い出すなー」"

[[dialogue]]
speaker = "蛍火"
# 「そうですね。シルヴィ先輩の頼もしさも、サーシャ先輩の鋭さも変わりません。いえ、むしろ以前より力を増しているように感じます」
line = "「そうですね。シルヴィ先輩の頼もしさも、サーシャ先輩の鋭さも変わりません。いえ、むしろ以前より力を増しているように感じます」"

[[dialogue]]
speaker = "蛍火"
# 「ですがシルヴィ先輩は、煌嶺と戦って負傷されていたはずでは？」
line = "「ですがシルヴィ先輩は、煌嶺と戦って負傷されていたはずでは？」"

[[dialogue]]
speaker = "シルヴィ"
# 「ははは、寝てたらだいたい治った！　ま、ほんとはまだ戦っちゃダメって言われてたけど、こんな状況だからね」
line = "「ははは、寝てたらだいたい治った！　ま、ほんとはまだ戦っちゃダメって言われてたけど、こんな状況だからね」"

[[dialogue]]
speaker = "サーシャ"
# 「もう、シルヴィってば相変わらず無茶なんだから……」
line = "「もう、シルヴィってば相変わらず無茶なんだから……」"

[[dialogue]]
speaker = "ドラケルス"
# 「グルルルル……！」
line = "「グルルルル……！」"

[[dialogue]]
speaker = "サーシャ"
# 「！　機械型モンスター……こんな時に……」
line = "「！　機械型モンスター……こんな時に……」"

[[dialogue]]
speaker = "unk"
# ただでさえ窮地だというのに、さらに強敵が現れた。
line = "ただでさえ窮地だというのに、さらに強敵が現れた。"

[[dialogue]]
speaker = "unk"
# まだ各地の戦線は維持できているが、このままではジリ貧だ。
line = "まだ各地の戦線は維持できているが、このままではジリ貧だ。"

[[dialogue]]
speaker = "unk"
# そして一ヵ所で戦線が崩壊してしまえば、一気に波及して全体が瓦解してしまうだろう。
line = "そして一ヵ所で戦線が崩壊してしまえば、一気に波及して全体が瓦解してしまうだろう。"

[[dialogue]]
speaker = "蛍火"
# 「やはり誰かが敵の指揮官を押さえるしかないのでしょうね」
line = "「やはり誰かが敵の指揮官を押さえるしかないのでしょうね」"

[[dialogue]]
speaker = "シルヴィ"
# 「それまで持久戦ってわけだね。そういうのは得意だから任せて！」
line = "「それまで持久戦ってわけだね。そういうのは得意だから任せて！」"

[[dialogue]]
speaker = "シルヴィ"
# 「ようやくサーシャや蛍火ちゃんと一緒に戦えるからね、暴れさせてもらうよ！」
line = "「ようやくサーシャや蛍火ちゃんと一緒に戦えるからね、暴れさせてもらうよ！」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、流星市国は第二の故郷だもの。みんなで守りましょう」
line = "「ええ、流星市国は第二の故郷だもの。みんなで守りましょう」"

[[dialogue]]
speaker = "サーシャ"
# （頼んだわよ……会長くん）
line = "（頼んだわよ……会長くん）"

[[dialogue]]
speaker = "クロト"
# 「グ……オオ……ッ！」
line = "「グ……オオ……ッ！」"

[[dialogue]]
speaker = "unk"
# クロトがまとうリクリエの瘴気はさらに濃く、禍々しく、破滅の色に染まっていく。
line = "クロトがまとうリクリエの瘴気はさらに濃く、禍々しく、破滅の色に染まっていく。"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃあっ！？」
line = "「きゃあっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「止まって、パパ──」
line = "「止まって、パパ──」"

[[dialogue]]
speaker = "梨緒"
# 「待て、それは危険だ」
line = "「待て、それは危険だ」"

[[dialogue]]
speaker = "unk"
# 咄嗟に父に呼びかけようとしたヴィーナスを、梨緒が制した。
line = "咄嗟に父に呼びかけようとしたヴィーナスを、梨緒が制した。"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうしてよ！？　アポロの時は──」
line = "「どうしてよ！？　アポロの時は──」"

[[dialogue]]
speaker = "梨緒"
# 「魔王の血が肉親の声に反応するということは、私も聞いている。だが今は魔王の力さえ暴走し得る」
line = "「魔王の血が肉親の声に反応するということは、私も聞いている。だが今は魔王の力さえ暴走し得る」"

[[dialogue]]
speaker = "梨緒"
# 「リクリエの力だけでなく魔王の力も制御できなくなれば、この世界は終わりだぞ」
line = "「リクリエの力だけでなく魔王の力も制御できなくなれば、この世界は終わりだぞ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "unk"
# 暴走しているのがリクリエの力だけであれば、まだマシといえるのだろう。
line = "暴走しているのがリクリエの力だけであれば、まだマシといえるのだろう。"

[[dialogue]]
speaker = "unk"
# クロトは今もリクリエに侵されまいと踏ん張っている。
line = "クロトは今もリクリエに侵されまいと踏ん張っている。"

[[dialogue]]
speaker = "梨緒"
# 「今は魔王に宿っているリクリエの力を削るしかない。彼が正気を取り戻すまでな」
line = "「今は魔王に宿っているリクリエの力を削るしかない。彼が正気を取り戻すまでな」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……そうね。私たちで目を覚まさせてあげましょう」
line = "「……そうね。私たちで目を覚まさせてあげましょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「せめて星徒会のみんなを呼び戻せれば……ううん、それも厳しそうね」
line = "「せめて星徒会のみんなを呼び戻せれば……ううん、それも厳しそうね」"

[[dialogue]]
speaker = "unk"
# 極星従騎のみならず新型モンスターまで出現したと連絡があった。
line = "極星従騎のみならず新型モンスターまで出現したと連絡があった。"

[[dialogue]]
speaker = "unk"
# 学園の周囲に散開している<ruby=マトイたち>ノヴァフォームの使い手</ruby>をここに集めてしまったら、戦線の崩壊は免れないだろう。
line = "学園の周囲に散開している<ruby>ノヴァフォームの使い手<rt>マトイたち</rt></ruby>をここに集めてしまったら、戦線の崩壊は免れないだろう。"

[[dialogue]]
speaker = "unk"
# そうなれば流星市国および東京の壊滅は確実だ。
line = "そうなれば流星市国および東京の壊滅は確実だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「せめて私もノヴァフォームになれれば……って、今更そんなこと言ってる場合じゃないわね！　パパが寝ぼけてる時は叩き起こすのが娘の役目よ！」
line = "「せめて私もノヴァフォームになれれば……って、今更そんなこと言ってる場合じゃないわね！　パパが寝ぼけてる時は叩き起こすのが娘の役目よ！」"

[[dialogue]]
speaker = "梨緒"
# 「父と娘という関係にはいまだに驚かされるが……私が気にすることではないな。魔王が完全に堕ちる前に、私が止める！」
line = "「父と娘という関係にはいまだに驚かされるが……私が気にすることではないな。魔王が完全に堕ちる前に、私が止める！」"

[[dialogue]]
speaker = "unk"
# 次の瞬間、梨緒がクロトに背後に回り、無数の矢を放った。
line = "次の瞬間、梨緒がクロトに背後に回り、無数の矢を放った。"

[[dialogue]]
speaker = "unk"
# 雨あられと降り注ぐ雷矢を、クロトは瘴気を盾にして防ぐ。
line = "雨あられと降り注ぐ雷矢を、クロトは瘴気を盾にして防ぐ。"

[[dialogue]]
speaker = "unk"
# しかし足を止めた瞬間、ヴィーナスの鎖がクロトを雁字搦めにする。
line = "しかし足を止めた瞬間、ヴィーナスの鎖がクロトを雁字搦めにする。"

[[dialogue]]
speaker = "ヴィーナス"
# 「痛いけど我慢してね──クロトハンマー・パート２！」
line = "「痛いけど我慢してね──クロトハンマー・パート２！」"

[[dialogue]]
speaker = "unk"
# まとう瘴気を振り払うようにクロトを振り回し、戦闘で荒れたアスファルトに叩きつけた。
line = "まとう瘴気を振り払うようにクロトを振り回し、戦闘で荒れたアスファルトに叩きつけた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「頑丈なのは知ってるから、容赦しないわよ！」
line = "「頑丈なのは知ってるから、容赦しないわよ！」"

[[dialogue]]
speaker = "unk"
# さらに鎖の１本１本が光を放ち、鮮烈な光がクロトを呑み込む。
line = "さらに鎖の１本１本が光を放ち、鮮烈な光がクロトを呑み込む。"

[[dialogue]]
speaker = "クロト"
# 「グゥ……ア……オオオッ！！」
line = "「グゥ……ア……オオオッ！！」"

[[dialogue]]
speaker = "unk"
# クロトを包む瘴気が晴れた、その刹那──
line = "クロトを包む瘴気が晴れた、その刹那──"

[[dialogue]]
speaker = "２人"
# 「ユニゾン！」
line = "「ユニゾン！」"

[[dialogue]]
speaker = "梨緒"
# 「ディヴァインサンダーボルト！」
line = "「ディヴァインサンダーボルト！」"

[[dialogue]]
speaker = "クロト"
# 「クオオオオオッ……！！」
line = "「クオオオオオッ……！！」"

[[dialogue]]
speaker = "unk"
# そして天空から一筋の稲妻が迸り、<ruby=あやま>過</ruby>たずクロトを撃ち貫いた。
line = "そして天空から一筋の稲妻が迸り、<ruby>過<rt>あやま</rt></ruby>たずクロトを撃ち貫いた。"

[[dialogue]]
speaker = "unk"
# だが次の瞬間──
line = "だが次の瞬間──"

[[dialogue]]
speaker = "クロト"
# 「グゥアアアアッ！！」
line = "「グゥアアアアッ！！」"

[[dialogue]]
speaker = "梨緒"
# 「──ッ！！？」
line = "「──ッ！！？」"

[[dialogue]]
speaker = "unk"
# 瞬時に肉薄したクロトの拳が、梨緒を襲った。
line = "瞬時に肉薄したクロトの拳が、梨緒を襲った。"

[[dialogue]]
speaker = "unk"
# 反応しきれずもろに食らい、その勢いのままにビルに激突する。
line = "反応しきれずもろに食らい、その勢いのままにビルに激突する。"

[[dialogue]]
speaker = "梨緒"
# 「カハッ……！」
line = "「カハッ……！」"

[[dialogue]]
speaker = "unk"
# 全身に走る痛み。骨が軋む衝撃。
line = "全身に走る痛み。骨が軋む衝撃。"

[[dialogue]]
speaker = "unk"
# 感覚が一瞬消えて、体が千切れたのかと錯覚する。
line = "感覚が一瞬消えて、体が千切れたのかと錯覚する。"

[[dialogue]]
speaker = "ヴィーナス"
# 「梨緒──！？」
line = "「梨緒──！？」"

[[dialogue]]
speaker = "クロト"
# 「グ──オオオオッ！！」
line = "「グ──オオオオッ！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃああああっ！！？」
line = "「きゃああああっ！！？」"

[[dialogue]]
speaker = "unk"
# 瘴気を帯びた一撃を受け、ヴィーナスがあっけなく吹き飛ばされた。
line = "瘴気を帯びた一撃を受け、ヴィーナスがあっけなく吹き飛ばされた。"

[[dialogue]]
speaker = "unk"
# そのまま地面に転がって動かなくなる。
line = "そのまま地面に転がって動かなくなる。"

[[dialogue]]
speaker = "梨緒"
# 「くっ……この……！」
line = "「くっ……この……！」"

[[dialogue]]
speaker = "unk"
# せめてヴィーナスへの追撃はさせまいと、梨緒が震える手でクロスボウを撃つ。
line = "せめてヴィーナスへの追撃はさせまいと、梨緒が震える手でクロスボウを撃つ。"

[[dialogue]]
speaker = "unk"
# しかし苦し紛れの攻撃が通じるはずもなく、軽く腕で払われた。
line = "しかし苦し紛れの攻撃が通じるはずもなく、軽く腕で払われた。"

[[dialogue]]
speaker = "クロト"
# 「コオオ……ッ」
line = "「コオオ……ッ」"

[[dialogue]]
speaker = "梨緒"
# 「くああああああっ！！」
line = "「くああああああっ！！」"

[[dialogue]]
speaker = "unk"
# 満足に動けない梨緒をクロトが追撃する。
line = "満足に動けない梨緒をクロトが追撃する。"

[[dialogue]]
speaker = "梨緒"
# 「がふっ……」
line = "「がふっ……」"

[[dialogue]]
speaker = "unk"
# 反撃しようにも、梨緒にはもう空を翔ける力さえ残されていない。
line = "反撃しようにも、梨緒にはもう空を翔ける力さえ残されていない。"

[[dialogue]]
speaker = "unk"
# 距離をとることすらできず、殴られ、嬲られ、蹂躙されるだけだ。
line = "距離をとることすらできず、殴られ、嬲られ、蹂躙されるだけだ。"

[[dialogue]]
speaker = "unk"
# 地面に倒れた梨緒を足蹴にし、さらに踏みつける。
line = "地面に倒れた梨緒を足蹴にし、さらに踏みつける。"

[[dialogue]]
speaker = "梨緒"
# 「があああっ……！！」
line = "「があああっ……！！」"

[[dialogue]]
speaker = "unk"
# 全身がヒビ割れ、砕けるような衝撃。
line = "全身がヒビ割れ、砕けるような衝撃。"

[[dialogue]]
speaker = "unk"
# もはや武器を握ることもできず、梨緒の意識が遠くなっていく。
line = "もはや武器を握ることもできず、梨緒の意識が遠くなっていく。"

[[dialogue]]
speaker = "梨緒"
# （ダメ……だったのか……）
line = "（ダメ……だったのか……）"

[[dialogue]]
speaker = "梨緒"
# （体が動かない……このまま諦めたら、楽になれるだろうか……）
line = "（体が動かない……このまま諦めたら、楽になれるだろうか……）"

[[dialogue]]
speaker = "梨緒"
# （そもそも私の世界はもう滅んでいる……どうせ戦う意味なんてないんだ……）
line = "（そもそも私の世界はもう滅んでいる……どうせ戦う意味なんてないんだ……）"

[[dialogue]]
speaker = "梨緒"
# （私が何をしたって、私が守ろうとしたものは、もうどこにもない……）
line = "（私が何をしたって、私が守ろうとしたものは、もうどこにもない……）"

[[dialogue]]
speaker = "梨緒"
# （私は弱者で……敗者で……何もできない、愚か者なんだ……）
line = "（私は弱者で……敗者で……何もできない、愚か者なんだ……）"

[[dialogue]]
speaker = "梨緒"
# （ああ……口の中、血の味がする……体の感覚がないのに、鉄の味だけ感じる……）
line = "（ああ……口の中、血の味がする……体の感覚がないのに、鉄の味だけ感じる……）"

[[dialogue]]
speaker = "梨緒"
# （私がよく知っている……敗北の味だ……）
line = "（私がよく知っている……敗北の味だ……）"

[[dialogue]]
speaker = "梨緒"
# （──）
line = "（──）"

[[dialogue]]
speaker = "梨緒"
# （私は……また、負けるのか……？）
line = "（私は……また、負けるのか……？）"

[[dialogue]]
speaker = "梨緒"
# （一度も勝てないまま終わるのか……？　それでいいのか……？）
line = "（一度も勝てないまま終わるのか……？　それでいいのか……？）"

[[dialogue]]
speaker = "梨緒"
# （私の世界は滅んだ。だけど守るものはまだある）
line = "（私の世界は滅んだ。だけど守るものはまだある）"

[[dialogue]]
speaker = "梨緒"
# （私は全てを失った。でも私は１人じゃない）
line = "（私は全てを失った。でも私は１人じゃない）"

[[dialogue]]
speaker = "梨緒"
# 「私は世界を守れなかった」
line = "「私は世界を守れなかった」"

[[dialogue]]
speaker = "梨緒"
# 「だから今度こそ君を止める。それだけだ」
line = "「だから今度こそ君を止める。それだけだ」"

[[dialogue]]
speaker = "梨緒"
# 「私にできるのか……？　仲間も、親友も、学園も、全て失っておきながら、おめおめと生き残った私に……」
line = "「私にできるのか……？　仲間も、親友も、学園も、全て失っておきながら、おめおめと生き残った私に……」"

[[dialogue]]
speaker = "梨緒"
# 「いや弱気になるな。今度こそ世界を救うんだろう」
line = "「いや弱気になるな。今度こそ世界を救うんだろう」"

[[dialogue]]
speaker = "梨緒"
# （そうだ。<ruby=アルタイルに来た>『やり直せる』と思った</ruby>あの時、決めたはずだ）
line = "（そうだ。<ruby>『やり直せる』と思った<rt>アルタイルに来た</rt></ruby>あの時、決めたはずだ）"

[[dialogue]]
speaker = "梨緒"
# （ここがベガじゃなくても、自分の世界が滅んだと知らなかったとしても──）
line = "（ここがベガじゃなくても、自分の世界が滅んだと知らなかったとしても──）"

[[dialogue]]
speaker = "梨緒"
# 「今度こそ世界を守ると誓ったんだ！！！」
line = "「今度こそ世界を守ると誓ったんだ！！！」"

[[dialogue]]
speaker = "unk"
# 梨緒は手の中に矢を生み出すと、弓に番えることなくそのままクロトの胸に突き立てた。
line = "梨緒は手の中に矢を生み出すと、弓に番えることなくそのままクロトの胸に突き立てた。"

[[dialogue]]
speaker = "クロト"
# 「グウウッ……！」
line = "「グウウッ……！」"

[[dialogue]]
speaker = "unk"
# なりふり構わない一撃でわずかに怯ませると、今度は両手にクロスボウを生成し、至近距離から乱れ撃ちを食らわせる！
line = "なりふり構わない一撃でわずかに怯ませると、今度は両手にクロスボウを生成し、至近距離から乱れ撃ちを食らわせる！"

[[dialogue]]
speaker = "クロト"
# 「クッ……」
line = "「クッ……」"

[[dialogue]]
speaker = "unk"
# クロトは嵐のように襲い来る矢を払いながら距離を取る。
line = "クロトは嵐のように襲い来る矢を払いながら距離を取る。"

[[dialogue]]
speaker = "梨緒"
# 「ふぅ……はぁ、はぁ……私はこんなところで負けていられない……」
line = "「ふぅ……はぁ、はぁ……私はこんなところで負けていられない……」"

[[dialogue]]
speaker = "梨緒"
# 「君にも、ジグにも……負けっぱなしなんてイヤなんだ！」
line = "「君にも、ジグにも……負けっぱなしなんてイヤなんだ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「梨緒ちゃん、大丈夫！？」
line = "「梨緒ちゃん、大丈夫！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「おや？　そろそろ出番かと思ったけど、まだだったかな。梨緒が魔王にやられた瞬間に背中からサクッとやろうと思ってたんだけど」
line = "「おや？　そろそろ出番かと思ったけど、まだだったかな。梨緒が魔王にやられた瞬間に背中からサクッとやろうと思ってたんだけど」"

[[dialogue]]
speaker = "梨緒"
# 「ああ、ありがとうベアト。生憎だが、ナターシャはもう少し見ていてくれ」
line = "「ああ、ありがとうベアト。生憎だが、ナターシャはもう少し見ていてくれ」"

[[dialogue]]
speaker = "ナターシャ"
# 「そ。それは残念」
line = "「そ。それは残念」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私だってまだやれるわよ……！」
line = "「私だってまだやれるわよ……！」"

[[dialogue]]
speaker = "梨緒"
# 「無事……ではないが、まだ戦えそうだな。心強い」
line = "「無事……ではないが、まだ戦えそうだな。心強い」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたこそ根性あるじゃない！」
line = "「あなたこそ根性あるじゃない！」"

[[dialogue]]
speaker = "unk"
# そしてヴィーナスも立ち上がり、再びリクリエに操られたクロトと対峙する。
line = "そしてヴィーナスも立ち上がり、再びリクリエに操られたクロトと対峙する。"

[[dialogue]]
speaker = "クロト"
# 「オオオッ──！！」
line = "「オオオッ──！！」"

[[dialogue]]
speaker = "unk"
# リクリエの──それも使徒の力を宿した緋宮クロトが、今度こそ完膚なきまでに撃滅しようと迫る。
line = "リクリエの──それも使徒の力を宿した緋宮クロトが、今度こそ完膚なきまでに撃滅しようと迫る。"

[[dialogue]]
speaker = "unk"
# 状況は圧倒的不利のまま。
line = "状況は圧倒的不利のまま。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "梨緒"
# 「負けて──たまるかぁあああああっ！！！」
line = "「負けて──たまるかぁあああああっ！！！」"

[[dialogue]]
speaker = "unk"
# その瞬間、顕現したのは光り輝く翼。
line = "その瞬間、顕現したのは光り輝く翼。"

[[dialogue]]
speaker = "unk"
# はためく翼が閃電と烈風を巻き起こし、リクリエの瘴気ごとクロトを薙ぎ払う。
line = "はためく翼が閃電と烈風を巻き起こし、リクリエの瘴気ごとクロトを薙ぎ払う。"

[[dialogue]]
speaker = "クロト"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「梨緒、あなた天使だったの！？　どうしたのよ、その羽！？」
line = "「梨緒、あなた天使だったの！？　どうしたのよ、その羽！？」"

[[dialogue]]
speaker = "梨緒"
# 「私は人間だ。少なくとも自分が知っている限りは……な」
line = "「私は人間だ。少なくとも自分が知っている限りは……な」"

[[dialogue]]
speaker = "梨緒"
# 「だが今はどうでもいい。今度こそ魔王を止めるぞ！」
line = "「だが今はどうでもいい。今度こそ魔王を止めるぞ！」"
