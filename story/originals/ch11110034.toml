[[dialogue]]
speaker = "unk"
# 第４話,ベアトのリゾート計画,P
line = "第４話,ベアトのリゾート計画,P"

[[dialogue]]
speaker = "リップル"
# 「──といったカンジですね～」
line = "「──といったカンジですね～」"

[[dialogue]]
speaker = "ベアトリス"
# 「なるほどなるほど……」
line = "「なるほどなるほど……」"

[[dialogue]]
speaker = "unk"
# 何かあったの？
line = "何かあったの？"

[[dialogue]]
speaker = "ベアトリス"
# 「あ、会長さん。なんでもないです、世間話ですよ、世間話」
line = "「あ、会長さん。なんでもないです、世間話ですよ、世間話」"

[[dialogue]]
speaker = "リップル"
# 「隠さなくてもイイじゃないですか！　とてもイイアイディアだと思いまーす！　故郷の洞窟を使ってリゾートを──」
line = "「隠さなくてもイイじゃないですか！　とてもイイアイディアだと思いまーす！　故郷の洞窟を使ってリゾートを──」"

[[dialogue]]
speaker = "ベアトリス"
# 「ああ、リップルさんっ。恥ずかしいですから。実現できるかもわからないのに」
line = "「ああ、リップルさんっ。恥ずかしいですから。実現できるかもわからないのに」"

[[dialogue]]
speaker = "unk"
# 故郷の洞窟にリゾートを？
line = "故郷の洞窟にリゾートを？"

[[dialogue]]
speaker = "ベアトリス"
# 「は、はい。もちろん戦いが終わってからですけど、造れたらいいなぁ……と」
line = "「は、はい。もちろん戦いが終わってからですけど、造れたらいいなぁ……と」"

[[dialogue]]
speaker = "ベアトリス"
# 「デネブはリクリエの時に大きな破壊を経験しました。魔界にも、天界にも、人間界にも、１０年経ってもまだ心に傷を負っている人はいる……」
line = "「デネブはリクリエの時に大きな破壊を経験しました。魔界にも、天界にも、人間界にも、１０年経ってもまだ心に傷を負っている人はいる……」"

[[dialogue]]
speaker = "ベアトリス"
# 「だからここのような素敵なリゾートがあれば、みんなの心も少しは癒やせるんじゃないかって」
line = "「だからここのような素敵なリゾートがあれば、みんなの心も少しは癒やせるんじゃないかって」"

[[dialogue]]
speaker = "ベアトリス"
# 「ここを訪れるお客さんたちのように、明るい笑顔を浮かべられるようになるんじゃないかって……そう思って」
line = "「ここを訪れるお客さんたちのように、明るい笑顔を浮かべられるようになるんじゃないかって……そう思って」"

[[dialogue]]
speaker = "リップル"
# 「うう、ＢＩＧステキな考えデス！　ワタシで良ければ、いくらでも相談にノリます！　イイエ、是非乗らせてクダさい！」
line = "「うう、ＢＩＧステキな考えデス！　ワタシで良ければ、いくらでも相談にノリます！　イイエ、是非乗らせてクダさい！」"

[[dialogue]]
speaker = "ベアトリス"
# 「わわ、泣かないでください。ふとした思いつきで相談したのが、申し訳なくなっちゃいますっ」
line = "「わわ、泣かないでください。ふとした思いつきで相談したのが、申し訳なくなっちゃいますっ」"

[[dialogue]]
speaker = "unk"
# でも、やる気はあるんでしょ？
line = "でも、やる気はあるんでしょ？"

[[dialogue]]
speaker = "ベアトリス"
# 「それは……──はい、もちろんです。みんなを笑顔にできるようなリゾートを造りたいです」
line = "「それは……──はい、もちろんです。みんなを笑顔にできるようなリゾートを造りたいです」"

[[dialogue]]
speaker = "unk"
# なら胸を張って頑張らないとね
line = "なら胸を張って頑張らないとね"

[[dialogue]]
speaker = "ベアトリス"
# 「はいっ！　リップルさん、お話の続きなんですけど。もっと色々とリゾート造りについて伺ってもいいですかっ？」
line = "「はいっ！　リップルさん、お話の続きなんですけど。もっと色々とリゾート造りについて伺ってもいいですかっ？」"

[[dialogue]]
speaker = "リップル"
# 「モチロンです！　ベアトリスの故郷のことも、もっと教えてクダさい！　ロケーションを活かしたリゾート造りをみんなで考えてミマしょう！」
line = "「モチロンです！　ベアトリスの故郷のことも、もっと教えてクダさい！　ロケーションを活かしたリゾート造りをみんなで考えてミマしょう！」"

[[dialogue]]
speaker = "unk"
# そうして、あれやこれやとみんなで意見を出し合って──
line = "そうして、あれやこれやとみんなで意見を出し合って──"

[[dialogue]]
speaker = "ベアトリス"
# 「遅くまで付き合ってもらって、ありがとうございました。おかげで造れそうな気がします。みんなを笑顔にできる素敵なリゾートを」
line = "「遅くまで付き合ってもらって、ありがとうございました。おかげで造れそうな気がします。みんなを笑顔にできる素敵なリゾートを」"

[[dialogue]]
speaker = "ベアトリス"
# 「まずは洞窟の改築からですね♪　故郷にある大きな地底湖をここのビーチのように大改造しちゃおうと思います♪」
line = "「まずは洞窟の改築からですね♪　故郷にある大きな地底湖をここのビーチのように大改造しちゃおうと思います♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「まぁ具体的にどう実現していくかはまだまだ全然決まってないんですけど」
line = "「まぁ具体的にどう実現していくかはまだまだ全然決まってないんですけど」"

[[dialogue]]
speaker = "ベアトリス"
# 「でも、１つだけ必ずやりたいことがあるんです。故郷の洞窟に空を作りたくて」
line = "「でも、１つだけ必ずやりたいことがあるんです。故郷の洞窟に空を作りたくて」"

[[dialogue]]
speaker = "ベアトリス"
# 「夕陽、綺麗ですよね。昼間の太陽も溌剌としていて好きですけど、私、同じくらいこのオレンジ色の空も大好きです」
line = "「夕陽、綺麗ですよね。昼間の太陽も溌剌としていて好きですけど、私、同じくらいこのオレンジ色の空も大好きです」"

[[dialogue]]
speaker = "ベアトリス"
# 「とても穏やかで、平和で、心が落ち着いて……。まるで太陽に優しく抱きしめてもらってる心地がして……」
line = "「とても穏やかで、平和で、心が落ち着いて……。まるで太陽に優しく抱きしめてもらってる心地がして……」"

[[dialogue]]
speaker = "ベアトリス"
# 「私、この景色を吸血鬼のみんなにも見せてあげたいんです。私の一族は太陽を見ずに一生を終える人が大半ですから」
line = "「私、この景色を吸血鬼のみんなにも見せてあげたいんです。私の一族は太陽を見ずに一生を終える人が大半ですから」"

[[dialogue]]
speaker = "ベアトリス"
# 「故郷ではいろいろありましたけど、それでも一族のことを大事に思っていますから」
line = "「故郷ではいろいろありましたけど、それでも一族のことを大事に思っていますから」"

[[dialogue]]
speaker = "ベアトリス"
# 「地底湖の天井に大きなスクリーンを張って、あの明るい青空を、この穏やかな夕陽を、再現できたらなぁって」
line = "「地底湖の天井に大きなスクリーンを張って、あの明るい青空を、この穏やかな夕陽を、再現できたらなぁって」"

[[dialogue]]
speaker = "ベアトリス"
# 「仮初めの太陽ですけど、それでも、みんなに元気と希望を与えられる気がするんです。いいえ、与えられるような空を作りたい」
line = "「仮初めの太陽ですけど、それでも、みんなに元気と希望を与えられる気がするんです。いいえ、与えられるような空を作りたい」"

[[dialogue]]
speaker = "ベアトリス"
# 「もちろん一族のみんなにだけじゃなくて、デネブの人も、アルタイルの人も、青い空の下でたくさん遊んでもらって、茜色の空の下で和気藹々と談笑してもらって」
line = "「もちろん一族のみんなにだけじゃなくて、デネブの人も、アルタイルの人も、青い空の下でたくさん遊んでもらって、茜色の空の下で和気藹々と談笑してもらって」"

[[dialogue]]
speaker = "ベアトリス"
# 「私がここで作った楽しい思い出を、みんなが作れるように。笑顔になれるように。常夏のリゾートを作りたい」
line = "「私がここで作った楽しい思い出を、みんなが作れるように。笑顔になれるように。常夏のリゾートを作りたい」"

[[dialogue]]
speaker = "ベアトリス"
# 「デネブもアルタイルも平和になって、私がリゾートを造った暁には、会長さんも遊びに来てくれますか？」
line = "「デネブもアルタイルも平和になって、私がリゾートを造った暁には、会長さんも遊びに来てくれますか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「……いいえ、必ず遊びに来て欲しいです。会長さんだけじゃなく、選管のみんなにも。そして、極星星徒会のみんなにも……」
line = "「……いいえ、必ず遊びに来て欲しいです。会長さんだけじゃなく、選管のみんなにも。そして、極星星徒会のみんなにも……」"

[[dialogue]]
speaker = "ベアトリス"
# 「私の大切な仲間たちに、私の大切な仲間たちを紹介したいですから」
line = "「私の大切な仲間たちに、私の大切な仲間たちを紹介したいですから」"

[[dialogue]]
speaker = "ベアトリス"
# 「そして選管のみんなも、極星星徒会のみんなも、みんな揃って、ビーチで大はしゃぎしたいです。もちろん、会長さんも一緒に」
line = "「そして選管のみんなも、極星星徒会のみんなも、みんな揃って、ビーチで大はしゃぎしたいです。もちろん、会長さんも一緒に」"

[[dialogue]]
speaker = "unk"
# 地底湖が揺れるほど騒ぎたいね
line = "地底湖が揺れるほど騒ぎたいね"

[[dialogue]]
speaker = "ベアトリス"
# 「ふふ、地底湖の天井に穴が空かないようにだけ気を付けてくださいね？　本物の太陽が顔を出したら、吸血鬼は大変なことになっちゃいますから」
line = "「ふふ、地底湖の天井に穴が空かないようにだけ気を付けてくださいね？　本物の太陽が顔を出したら、吸血鬼は大変なことになっちゃいますから」"

[[dialogue]]
speaker = "unk"
# 美味しいトマトジュースをお土産に持っていこう
line = "美味しいトマトジュースをお土産に持っていこう"

[[dialogue]]
speaker = "ベアトリス"
# 「それじゃあリップルさんに頼んで、ビーチの一角を貸してもらいましょう。２人で一からトマトを育てるんです♪」
line = "「それじゃあリップルさんに頼んで、ビーチの一角を貸してもらいましょう。２人で一からトマトを育てるんです♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「太陽の光をたっぷり浴びて、うんと甘いトマトになりますよ。きっと美味しいトマトジュースが作れると思います♪」
line = "「太陽の光をたっぷり浴びて、うんと甘いトマトになりますよ。きっと美味しいトマトジュースが作れると思います♪」"

[[dialogue]]
speaker = "ベアトリス"
# 「ふふ、戦う理由がまた１つ増えちゃいました。私、頑張ります。デネブもアルタイルも必ず救ってみせます」
line = "「ふふ、戦う理由がまた１つ増えちゃいました。私、頑張ります。デネブもアルタイルも必ず救ってみせます」"

[[dialogue]]
speaker = "ベアトリス"
# 「明るい未来を切り拓くために。大切な人とずっと平和に楽しく過ごしていくために」
line = "「明るい未来を切り拓くために。大切な人とずっと平和に楽しく過ごしていくために」"

[[dialogue]]
speaker = "ベアトリス"
# 「まだまだ思い出を作り足りませんから。これからも私と一緒に、色々な思い出を作っていってくださいね？」
line = "「まだまだ思い出を作り足りませんから。これからも私と一緒に、色々な思い出を作っていってくださいね？」"
