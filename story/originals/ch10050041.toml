[[dialogue]]
speaker = "unk"
# 第１話,ソフィアのパンケーキ,P
line = "第１話,ソフィアのパンケーキ,P"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「サラン、またお菓子を貰いにきたゆ！」
line = "「サラン、またお菓子を貰いにきたゆ！」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ？　ジャクリーヌちゃんいらっしゃいなの～♪」
line = "「ぽよ？　ジャクリーヌちゃんいらっしゃいなの～♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「トリックオアトリート。お菓子をよこすゆ～♪」
line = "「トリックオアトリート。お菓子をよこすゆ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ジャクリーヌさん、今日でなくてもよくサラン先輩にお菓子をねだりにいっているのでしょう？」
line = "「ジャクリーヌさん、今日でなくてもよくサラン先輩にお菓子をねだりにいっているのでしょう？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「サランのお菓子は絶品なの！　いつだって食べたいゆ♪」
line = "「サランのお菓子は絶品なの！　いつだって食べたいゆ♪」"

[[dialogue]]
speaker = "サラン"
# 「会長ちゃんにソフィアちゃんもいらっしゃ～い♪」
line = "「会長ちゃんにソフィアちゃんもいらっしゃ～い♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ハロウィンパーティーは盛況のようですが、サラン先輩のお店も大繁盛しているようですね」
line = "「ハロウィンパーティーは盛況のようですが、サラン先輩のお店も大繁盛しているようですね」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「行列が出来てたゆ！」
line = "「行列が出来てたゆ！」"

[[dialogue]]
speaker = "サラン"
# 「おかげさまでなの～」
line = "「おかげさまでなの～」"

[[dialogue]]
speaker = "ソフィア"
# 「さすがはお菓子作りの天才です」
line = "「さすがはお菓子作りの天才です」"

[[dialogue]]
speaker = "ソフィア"
# 「それで……お願いしていた、アレは……どうでしょう……？」
line = "「それで……お願いしていた、アレは……どうでしょう……？」"

[[dialogue]]
speaker = "サラン"
# 「もちろん用意できてるよ～♪」
line = "「もちろん用意できてるよ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、ありがとうございます！」
line = "「あ、ありがとうございます！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ソフィアはサランに何かお願いしてたゆ？」
line = "「ソフィアはサランに何かお願いしてたゆ？」"

[[dialogue]]
speaker = "ソフィア"
# 「実はパンケーキをお願いしていたのです」
line = "「実はパンケーキをお願いしていたのです」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「パンケーキ？　ソフィアはパンケーキが好きなのかゆ？」
line = "「パンケーキ？　ソフィアはパンケーキが好きなのかゆ？」"

[[dialogue]]
speaker = "ソフィア"
# 「ケーキの中では１番好きですね」
line = "「ケーキの中では１番好きですね」"

[[dialogue]]
speaker = "ソフィア"
# 「私の生まれ育ったレゾフという土地は年中雪に覆われた冷たい場所でした」
line = "「私の生まれ育ったレゾフという土地は年中雪に覆われた冷たい場所でした」"

[[dialogue]]
speaker = "ソフィア"
# 「そんな故郷で食べられるケーキと言えば、復活祭で食べられる『クリーチ』だけだったのですが……」
line = "「そんな故郷で食べられるケーキと言えば、復活祭で食べられる『クリーチ』だけだったのですが……」"

[[dialogue]]
speaker = "ソフィア"
# 「人間界にやってきて、それこそ多種多様なケーキが存在していることを知りました」
line = "「人間界にやってきて、それこそ多種多様なケーキが存在していることを知りました」"

[[dialogue]]
speaker = "ソフィア"
# 「中でも私を魅了したのがパンケーキです！」
line = "「中でも私を魅了したのがパンケーキです！」"

[[dialogue]]
speaker = "ソフィア"
# 「あのフワフワの柔らかさ。口に含んだだけでホカホカしてしまう温かさ……まさにケーキオブケーキです！」
line = "「あのフワフワの柔らかさ。口に含んだだけでホカホカしてしまう温かさ……まさにケーキオブケーキです！」"

[[dialogue]]
speaker = "ソフィア"
# 「私のハロウィンフォームにパンケーキを作る機能が備わっているのは、そのリスペクトを表しているのかもしれません」
line = "「私のハロウィンフォームにパンケーキを作る機能が備わっているのは、そのリスペクトを表しているのかもしれません」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「自分で作れるなら、パンケーキはいつでも食べられるゆ？　なのにどうしてサランにお願いしたんだゆ？」
line = "「自分で作れるなら、パンケーキはいつでも食べられるゆ？　なのにどうしてサランにお願いしたんだゆ？」"

[[dialogue]]
speaker = "ソフィア"
# 「何を言うんです！　お菓子作りの天才、サラン先輩の作るパンケーキですよ！　そんなの特別美味しいに決まってます！」
line = "「何を言うんです！　お菓子作りの天才、サラン先輩の作るパンケーキですよ！　そんなの特別美味しいに決まってます！」"

[[dialogue]]
speaker = "ソフィア"
# 「だからひとつ選べと言われたら、パンケーキ一択に決まってます！」
line = "「だからひとつ選べと言われたら、パンケーキ一択に決まってます！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「それはそうゆ！　サランの作るケーキなら特別ゆ！」
line = "「それはそうゆ！　サランの作るケーキなら特別ゆ！」"

[[dialogue]]
speaker = "ソフィア"
# 「わかっていただけたところで……サラン先輩、お願いします」
line = "「わかっていただけたところで……サラン先輩、お願いします」"

[[dialogue]]
speaker = "サラン"
# 「はい、どうぞ～♪」
line = "「はい、どうぞ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「おおおお～～～～<emoji=heart04>」
line = "「おおおお～～～～<emoji=heart04>」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「香りだけでもう美味しそうなの<emoji=heart04>」
line = "「香りだけでもう美味しそうなの<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「では、さっそく頂きますね……あ～、んむっ<emoji=heart04>」
line = "「では、さっそく頂きますね……あ～、んむっ<emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「お、美味しい……<emoji=heart04><emoji=heart04><emoji=heart04>」
line = "「お、美味しい……<emoji=heart04><emoji=heart04><emoji=heart04>」"

[[dialogue]]
speaker = "ソフィア"
# 「口の中に入れたら溶けて消えそうな柔らかい舌触り……確かなのにしつこさを感じさせない甘味……」
line = "「口の中に入れたら溶けて消えそうな柔らかい舌触り……確かなのにしつこさを感じさせない甘味……」"

[[dialogue]]
speaker = "ソフィア"
# 「最高です！　今まで食べたパンケーキの中でも１番です！　みなさーん、理想のパンケーキはここにありましたよ～っ！」
line = "「最高です！　今まで食べたパンケーキの中でも１番です！　みなさーん、理想のパンケーキはここにありましたよ～っ！」"

[[dialogue]]
speaker = "サラン"
# 「えへへ、ありがとう～♪」
line = "「えへへ、ありがとう～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「あむっ、もぐもぐ……こうなってくると、ひと口ひと口味わって大切に食べたいですね……一度に食べてしまうなんてもったいない」
line = "「あむっ、もぐもぐ……こうなってくると、ひと口ひと口味わって大切に食べたいですね……一度に食べてしまうなんてもったいない」"

[[dialogue]]
speaker = "サラン"
# 「心配しなくてもたくさん作ってあるから大丈夫……ぽよ？」
line = "「心配しなくてもたくさん作ってあるから大丈夫……ぽよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「ん、どうしました？」
line = "「ん、どうしました？」"

[[dialogue]]
speaker = "サラン"
# 「無くなっちゃったみたい……」
line = "「無くなっちゃったみたい……」"

[[dialogue]]
speaker = "ソフィア"
# 「え……？」
line = "「え……？」"

[[dialogue]]
speaker = "サラン"
# 「たくさん作ってたんだけど、ジャクリーヌちゃんが……」
line = "「たくさん作ってたんだけど、ジャクリーヌちゃんが……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「本当なの！　すっごく美味しいパンケーキなの！」
line = "「本当なの！　すっごく美味しいパンケーキなの！」"

[[dialogue]]
speaker = "サラン"
# 「いつの間にか残りを全部食べちゃったみたい」
line = "「いつの間にか残りを全部食べちゃったみたい」"

[[dialogue]]
speaker = "ソフィア"
# 「がーーーーーーーーーーーーん！！！！！！！！」
line = "「がーーーーーーーーーーーーん！！！！！！！！」"

[[dialogue]]
speaker = "サラン"
# 「ジャクリーヌちゃん。それはソフィアちゃんのために作ったものなんだから勝手に食べちゃダメかも～」
line = "「ジャクリーヌちゃん。それはソフィアちゃんのために作ったものなんだから勝手に食べちゃダメかも～」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ソフィアが美味しそうに食べるから我慢できなかったゆ」
line = "「ソフィアが美味しそうに食べるから我慢できなかったゆ」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……あ……私の……パンケーキ……」
line = "「あ……あ……私の……パンケーキ……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「わ、悪気はなかったゆ～！！！」
line = "「わ、悪気はなかったゆ～！！！」"

[[dialogue]]
speaker = "サラン"
# 「逃げちゃだめだよ～、えいっ」
line = "「逃げちゃだめだよ～、えいっ」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆっ！？　動けないゆ！！」
line = "「ゆゆっ！？　動けないゆ！！」"

[[dialogue]]
speaker = "サラン"
# 「ジャクリーヌちゃんは１ヶ月おやつ抜きだよ～」
line = "「ジャクリーヌちゃんは１ヶ月おやつ抜きだよ～」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ！？　それは酷いゆ！」
line = "「ゆ！？　それは酷いゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「何とか３日、いや２日で許して欲しいの！　１ヶ月もサランのお菓子を食べられないなんて死んじゃうの！」
line = "「何とか３日、いや２日で許して欲しいの！　１ヶ月もサランのお菓子を食べられないなんて死んじゃうの！」"

[[dialogue]]
speaker = "サラン"
# 「だめです♪　ちゃんと反省しようね～」
line = "「だめです♪　ちゃんと反省しようね～」"

[[dialogue]]
speaker = "サラン"
# 「ソフィアちゃん、パンケーキのおかわりはすぐに用意するから安心してね～」
line = "「ソフィアちゃん、パンケーキのおかわりはすぐに用意するから安心してね～」"

[[dialogue]]
speaker = "ソフィア"
# 「ほ、本当ですか！？」
line = "「ほ、本当ですか！？」"

[[dialogue]]
speaker = "サラン"
# 「ぽよ～、任せて～」
line = "「ぽよ～、任せて～」"

[[dialogue]]
speaker = "unk"
# その後、新たにパンケーキが用意され、ソフィアとついでに俺も一緒にそれを味わうことが出来たのだった。
line = "その後、新たにパンケーキが用意され、ソフィアとついでに俺も一緒にそれを味わうことが出来たのだった。"

[[dialogue]]
speaker = "unk"
# その間、隣で悲痛な叫びを上げているジャクリーヌを尻目に──
line = "その間、隣で悲痛な叫びを上げているジャクリーヌを尻目に──"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ごめんなさいなの～！　もうしないから許して欲しいゆ～～～～～っ！！！」
line = "「ごめんなさいなの～！　もうしないから許して欲しいゆ～～～～～っ！！！」"
