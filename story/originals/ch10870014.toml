[[dialogue]]
speaker = "unk"
# 個人の性癖を否定するつもりはないけれど、人に多大な迷惑がかかってしまうのは――
line = "個人の性癖を否定するつもりはないけれど、人に多大な迷惑がかかってしまうのは――"

[[dialogue]]
speaker = "ヴァレリー"
# 「ふむ、この魔法少女ステッキは、リーナへのお土産に良さそうですね。お値段も手頃です」
line = "「ふむ、この魔法少女ステッキは、リーナへのお土産に良さそうですね。お値段も手頃です」"

[[dialogue]]
speaker = "ヴァレリー"
# 「おや、会長さん、よくお会いしますね。あなたとの間に強い縁が結ばれたのでしょうか、フフフ」
line = "「おや、会長さん、よくお会いしますね。あなたとの間に強い縁が結ばれたのでしょうか、フフフ」"

[[dialogue]]
speaker = "unk"
# 噂をすれば、なんとやら。本当に彼女との間に縁が結ばれたのか、それとも、俺の行動パターンを把握してる……？
line = "噂をすれば、なんとやら。本当に彼女との間に縁が結ばれたのか、それとも、俺の行動パターンを把握してる……？"

[[dialogue]]
speaker = "ヴァレリー"
# 「ここ、秋葉原にも多種多様な美しさがひしめいていますからね。例えば、あのショーケースに入っている水着フィギュア……」
line = "「ここ、秋葉原にも多種多様な美しさがひしめいていますからね。例えば、あのショーケースに入っている水着フィギュア……」"

[[dialogue]]
speaker = "ヴァレリー"
# 「ああ……実に美しい……うら若き女体の艶めかしさを十全に表現している……！　滴る水の表現も完璧です。思わず、頬ずりしたくなりますね」
line = "「ああ……実に美しい……うら若き女体の艶めかしさを十全に表現している……！　滴る水の表現も完璧です。思わず、頬ずりしたくなりますね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「美しい物は等しく美しい。そこに貴賤はありません。このような美を生み出すことができる創作者もまた、素晴らしく尊いです」
line = "「美しい物は等しく美しい。そこに貴賤はありません。このような美を生み出すことができる創作者もまた、素晴らしく尊いです」"

[[dialogue]]
speaker = "ヴァレリー"
# 「もちろん、私も物作りを試したことがありますけどね」
line = "「もちろん、私も物作りを試したことがありますけどね」"

[[dialogue]]
speaker = "ヴァレリー"
# 「しかし、何度やっても、想い描いてる物をイメージ通りに出力できなかった。私が生み出す物は、私の求める美に遠く及ばなかった」
line = "「しかし、何度やっても、想い描いてる物をイメージ通りに出力できなかった。私が生み出す物は、私の求める美に遠く及ばなかった」"

[[dialogue]]
speaker = "ヴァレリー"
# 「なまじ、美を知ってしまっているが故の不幸でしょうか。美術をこの上なく愛する気持ちがあっても、自らの手で生み出す才能は与えられなかったのですよ」
line = "「なまじ、美を知ってしまっているが故の不幸でしょうか。美術をこの上なく愛する気持ちがあっても、自らの手で生み出す才能は与えられなかったのですよ」"

[[dialogue]]
speaker = "ヴァレリー"
# 「私が作った物は何ひとつとして残っていません。歪さに耐えかねて――快感を得るためではなく、ただの不快感で全て破壊しています」
line = "「私が作った物は何ひとつとして残っていません。歪さに耐えかねて――快感を得るためではなく、ただの不快感で全て破壊しています」"

[[dialogue]]
speaker = "ヴァレリー"
# 「自分で生み出した物を壊すことで快感を得られたのならば、もう少し己を愛することもできたことでしょう」
line = "「自分で生み出した物を壊すことで快感を得られたのならば、もう少し己を愛することもできたことでしょう」"

[[dialogue]]
speaker = "unk"
# 自分のことが嫌いなのか？
line = "自分のことが嫌いなのか？"

[[dialogue]]
speaker = "ヴァレリー"
# 「ええ。私の心も、体も、魂も……ヴァレリーという存在の全てが、己の審美眼に適わないものですから」
line = "「ええ。私の心も、体も、魂も……ヴァレリーという存在の全てが、己の審美眼に適わないものですから」"

[[dialogue]]
