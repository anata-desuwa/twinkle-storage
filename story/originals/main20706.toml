[[dialogue]]
speaker = "unk"
# 第６話,デネブの夜,B
line = "第６話,デネブの夜,B"

[[dialogue]]
speaker = "クロト"
# 「ふぅ……。個室にシャワーもあるんだな。至れり尽くせりだ」
line = "「ふぅ……。個室にシャワーもあるんだな。至れり尽くせりだ」"

[[dialogue]]
speaker = "unk"
# 連戦の汗を流した後、ベッドに体を預ける。
line = "連戦の汗を流した後、ベッドに体を預ける。"

[[dialogue]]
speaker = "クロト"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 今まで余裕がなかったけど、一度落ち着くと今日起きたことを思い出す。
line = "今まで余裕がなかったけど、一度落ち着くと今日起きたことを思い出す。"

[[dialogue]]
speaker = "unk"
# チナと戦ったり、デネブでルヴィネと遭遇したりと、本当にいろいろなことがあった。
line = "チナと戦ったり、デネブでルヴィネと遭遇したりと、本当にいろいろなことがあった。"

[[dialogue]]
speaker = "unk"
# それに──
line = "それに──"

[[dialogue]]
speaker = "unk"
# 自分の中にあるリクリエの力に呑み込まれ、我を失ってヴィーナスや梨緒を攻撃した。
line = "自分の中にあるリクリエの力に呑み込まれ、我を失ってヴィーナスや梨緒を攻撃した。"

[[dialogue]]
speaker = "unk"
# ２人を傷つけた。この拳で。
line = "２人を傷つけた。この拳で。"

[[dialogue]]
speaker = "unk"
# 暴走していた時は意識がぼやけていたのに、あの時の感触は鮮明に思い出されてしまう。
line = "暴走していた時は意識がぼやけていたのに、あの時の感触は鮮明に思い出されてしまう。"

[[dialogue]]
speaker = "unk"
# 俺がもっと強ければ、２人を傷つけずに済んだかもしれない。
line = "俺がもっと強ければ、２人を傷つけずに済んだかもしれない。"

[[dialogue]]
speaker = "unk"
# それにディザスターハンドの正体は、ベガの俺だった。
line = "それにディザスターハンドの正体は、ベガの俺だった。"

[[dialogue]]
speaker = "unk"
# 梨緒は俺を憎むことはなかったが、『緋宮クロト』が世界を滅ぼしたことに変わりはなく、罪悪感を覚えずにはいられない。
line = "梨緒は俺を憎むことはなかったが、『緋宮クロト』が世界を滅ぼしたことに変わりはなく、罪悪感を覚えずにはいられない。"

[[dialogue]]
speaker = "unk"
# この手でみんなの大事なものを、誰かの大切な人を、壊し尽くした。想像するだけで心に重いものがのしかかる。
line = "この手でみんなの大事なものを、誰かの大切な人を、壊し尽くした。想像するだけで心に重いものがのしかかる。"

[[dialogue]]
speaker = "クロト"
# 「──でも」
line = "「──でも」"

[[dialogue]]
speaker = "unk"
# 俯いてばかりはいられない。
line = "俯いてばかりはいられない。"

[[dialogue]]
speaker = "unk"
# 彼女たちを傷つけた分、前に進み、みんなや世界を守る。
line = "彼女たちを傷つけた分、前に進み、みんなや世界を守る。"

[[dialogue]]
speaker = "unk"
# 厄災の化身に堕ちないように心を強く持ち、己を鍛える。
line = "厄災の化身に堕ちないように心を強く持ち、己を鍛える。"

[[dialogue]]
speaker = "unk"
# それが俺にできる罪滅ぼしだ。
line = "それが俺にできる罪滅ぼしだ。"

[[dialogue]]
speaker = "クロト"
# （リクリエの力は星力や魔力とは異なる。到底制御できるものじゃない。……そう思っていたけど）
line = "（リクリエの力は星力や魔力とは異なる。到底制御できるものじゃない。……そう思っていたけど）"

[[dialogue]]
speaker = "unk"
# でもチナとの戦いでは、リクリエの力をほんの少しだけ自分のものにすることができた。
line = "でもチナとの戦いでは、リクリエの力をほんの少しだけ自分のものにすることができた。"

[[dialogue]]
speaker = "クロト"
# （自分の中にあるリクリエの力の強さや性質をより理解できれば、この力を制御できるようになるかもしれない……）
line = "（自分の中にあるリクリエの力の強さや性質をより理解できれば、この力を制御できるようになるかもしれない……）"

[[dialogue]]
speaker = "unk"
# 魔王の力が十全に使えない以上、使えるならリクリエの力だって使ってやる。
line = "魔王の力が十全に使えない以上、使えるならリクリエの力だって使ってやる。"

[[dialogue]]
speaker = "unk"
# それにディザスターハンドに勝つには、今までの魔王の力だけでは足りない。
line = "それにディザスターハンドに勝つには、今までの魔王の力だけでは足りない。"

[[dialogue]]
speaker = "クロト"
# （<ruby=リクリエ>厄災</ruby>の力だろうと、使いこなしてみせる──！）
line = "（<ruby>厄災<rt>リクリエ</rt></ruby>の力だろうと、使いこなしてみせる──！）"

[[dialogue]]
speaker = "unk"
# その頃、ヴィーナスはリノの部屋で過ごしていた。
line = "その頃、ヴィーナスはリノの部屋で過ごしていた。"

[[dialogue]]
speaker = "リノ"
# 「今日はおばあちゃんと一緒に寝ましょうね～♪」
line = "「今日はおばあちゃんと一緒に寝ましょうね～♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「わ～い♪」
line = "「わ～い♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……でも、おばあちゃんはおばあちゃんなのよね」
line = "「……でも、おばあちゃんはおばあちゃんなのよね」"

[[dialogue]]
speaker = "unk"
# リノを前にして、不思議そうに首を傾げるヴィーナス。
line = "リノを前にして、不思議そうに首を傾げるヴィーナス。"

[[dialogue]]
speaker = "unk"
# するとリノもきょとんとして同じように首を捻った。
line = "するとリノもきょとんとして同じように首を捻った。"

[[dialogue]]
speaker = "リノ"
# 「？　おばあちゃんはおばあちゃんよ？」
line = "「？　おばあちゃんはおばあちゃんよ？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だって、今一緒にいるクロトは平行世界のパパでしょ」
line = "「だって、今一緒にいるクロトは平行世界のパパでしょ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも目の前にいるのは、デネブのリノさん……デネブで生まれた私にとっては、“平行世界の”が付かないおばあちゃんなのよね」
line = "「でも目の前にいるのは、デネブのリノさん……デネブで生まれた私にとっては、“平行世界の”が付かないおばあちゃんなのよね」"

[[dialogue]]
speaker = "リノ"
# 「ああ、そういうことー。ふふ、平行世界ってややこしいわね」
line = "「ああ、そういうことー。ふふ、平行世界ってややこしいわね」"

[[dialogue]]
speaker = "unk"
# リノが腕を広げ、ヴィーナスの体をぎゅっと抱き締める。
line = "リノが腕を広げ、ヴィーナスの体をぎゅっと抱き締める。"

[[dialogue]]
speaker = "unk"
# 外見では２人の年齢はそう離れていないように見えるが、正真正銘祖母と孫の関係だ。
line = "外見では２人の年齢はそう離れていないように見えるが、正真正銘祖母と孫の関係だ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「おばあちゃん……」
line = "「おばあちゃん……」"

[[dialogue]]
speaker = "リノ"
# 「こうして孫を抱き締める日が来るなんて思わなかった。あの子の娘がこんなに大きくなってるなんて嬉しいわ」
line = "「こうして孫を抱き締める日が来るなんて思わなかった。あの子の娘がこんなに大きくなってるなんて嬉しいわ」"

[[dialogue]]
speaker = "リノ"
# 「あなたが平行世界に旅立った時、あなたはまだお母さんのお腹の中にいた」
line = "「あなたが平行世界に旅立った時、あなたはまだお母さんのお腹の中にいた」"

[[dialogue]]
speaker = "リノ"
# 「きっとあなたのお母さんは自分を犠牲にして、まだ生まれていないあなたを成長させてアルタイルに送り込んだのね」
line = "「きっとあなたのお母さんは自分を犠牲にして、まだ生まれていないあなたを成長させてアルタイルに送り込んだのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ママが私を……」
line = "「ママが私を……」"

[[dialogue]]
speaker = "リノ"
# 「あなたをこの目で見ることはできないと思っていたけど……会えてよかった」
line = "「あなたをこの目で見ることはできないと思っていたけど……会えてよかった」"

[[dialogue]]
speaker = "リノ"
# 「本当なら秘密基地じゃなくて、もっとちゃんとした場所でお出迎えしたかったけどね」
line = "「本当なら秘密基地じゃなくて、もっとちゃんとした場所でお出迎えしたかったけどね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ううん、この秘密基地だってかっこよくて素敵な場所だわ」
line = "「ううん、この秘密基地だってかっこよくて素敵な場所だわ」"

[[dialogue]]
speaker = "リノ"
# 「そう、なら良かった。……おかえり、ヴィーナスちゃん」
line = "「そう、なら良かった。……おかえり、ヴィーナスちゃん」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん……ただいま」
line = "「うん……ただいま」"
