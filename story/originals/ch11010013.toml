[[dialogue]]
speaker = "unk"
# 第３話,轟雷の守護者,P
line = "第３話,轟雷の守護者,P"

[[dialogue]]
speaker = "unk"
# リクリエ後もモンスターは断続的に現れている。リクリエの残滓か、あるいは別の異変かは分からないが、星騎士のやるべきことは変わらない。
line = "リクリエ後もモンスターは断続的に現れている。リクリエの残滓か、あるいは別の異変かは分からないが、星騎士のやるべきことは変わらない。"

[[dialogue]]
speaker = "モンスター"
# 「イ～～ッ！」
line = "「イ～～ッ！」"

[[dialogue]]
speaker = "モンスター"
# 「イーーーッ！」
line = "「イーーーッ！」"

[[dialogue]]
speaker = "シルヴィ"
# 「モンスターはあたしが引き付けるから、会長くんは一般人の避難誘導をお願い！」
line = "「モンスターはあたしが引き付けるから、会長くんは一般人の避難誘導をお願い！」"

[[dialogue]]
speaker = "モンスター"
# 「ブルルルル！！」
line = "「ブルルルル！！」"

[[dialogue]]
speaker = "シルヴィ"
# 「ッ──！」
line = "「ッ──！」"

[[dialogue]]
speaker = "unk"
# モンスターがシルヴィ先輩めがけて突進してくるが、先輩は一歩も引くことなく受け止めた。
line = "モンスターがシルヴィ先輩めがけて突進してくるが、先輩は一歩も引くことなく受け止めた。"

[[dialogue]]
speaker = "シルヴィ"
# 「パワーなら負けないよ！　サンダービートスマッシュ！」
line = "「パワーなら負けないよ！　サンダービートスマッシュ！」"

[[dialogue]]
speaker = "モンスター"
# 「ブルル……」
line = "「ブルル……」"

[[dialogue]]
speaker = "モンスター"
# 「パオ～～ンッ！！」
line = "「パオ～～ンッ！！」"

[[dialogue]]
speaker = "シルヴィ"
# 「おお、こいつはデカい！　あたしがモンスターの正面から突っ込むから、みんなは背後から攻撃して！」
line = "「おお、こいつはデカい！　あたしがモンスターの正面から突っ込むから、みんなは背後から攻撃して！」"

[[dialogue]]
speaker = "unk"
# 後日、カフェテリアで食事をとる２人を見つけた。
line = "後日、カフェテリアで食事をとる２人を見つけた。"

[[dialogue]]
speaker = "unk"
# シルヴィ先輩っていつもあんな戦い方なんですか？
line = "シルヴィ先輩っていつもあんな戦い方なんですか？"

[[dialogue]]
speaker = "シルヴィ"
# 「あんなってどんな？　めちゃくちゃカッコイイってこと？」
line = "「あんなってどんな？　めちゃくちゃカッコイイってこと？」"

[[dialogue]]
speaker = "シルヴィ"
# 「あ、もしかしてあたしに惚れちゃった？　じゃあドラムかスティックにサインを──え、違う？」
line = "「あ、もしかしてあたしに惚れちゃった？　じゃあドラムかスティックにサインを──え、違う？」"

[[dialogue]]
speaker = "シルヴィ"
# 「……え？　前に立って敵の攻撃を引き受けてるって？」
line = "「……え？　前に立って敵の攻撃を引き受けてるって？」"

[[dialogue]]
speaker = "シルヴィ"
# 「うん、そうだよ。あたしの星術は目立つし、狙われやすいから、みんなを守るにはちょうどいいんだよね」
line = "「うん、そうだよ。あたしの星術は目立つし、狙われやすいから、みんなを守るにはちょうどいいんだよね」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんからも言ってあげて～。いつか本当に死んじゃいますよって」
line = "「会長くんからも言ってあげて～。いつか本当に死んじゃいますよって」"

[[dialogue]]
speaker = "サーシャ"
# 「私から言っても聞かないから。バカにつける薬はないって本当ね～」
line = "「私から言っても聞かないから。バカにつける薬はないって本当ね～」"

[[dialogue]]
speaker = "シルヴィ"
# 「えぇっ、そんな風に思ってたんだ！？」
line = "「えぇっ、そんな風に思ってたんだ！？」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ。自分がどれだけ人に心配をかけてるか、たまには考えなさい」
line = "「そうよ。自分がどれだけ人に心配をかけてるか、たまには考えなさい」"

[[dialogue]]
speaker = "シルヴィ"
# 「う～ん。でも、戦い方を変えるつもりはないし、そんな簡単に変えられないからねー」
line = "「う～ん。でも、戦い方を変えるつもりはないし、そんな簡単に変えられないからねー」"

[[dialogue]]
speaker = "シルヴィ"
# 「会長くんも、戦い方を変えた方がいいって思う？」
line = "「会長くんも、戦い方を変えた方がいいって思う？」"

[[dialogue]]
speaker = "unk"
# 俺は心配です
line = "俺は心配です"

[[dialogue]]
speaker = "シルヴィ"
# 「別に早死にしたいわけでも痛いのが好きなわけでもないよ。誰かが傷つくより、自分が傷ついた方がいいってだけ」
line = "「別に早死にしたいわけでも痛いのが好きなわけでもないよ。誰かが傷つくより、自分が傷ついた方がいいってだけ」"

[[dialogue]]
speaker = "シルヴィ"
# 「会長くんには話したっけ？　あたしの故郷の町は天界の田舎町なんだけど、モンスターに襲われてめちゃくちゃになっちゃった」
line = "「会長くんには話したっけ？　あたしの故郷の町は天界の田舎町なんだけど、モンスターに襲われてめちゃくちゃになっちゃった」"

[[dialogue]]
speaker = "シルヴィ"
# 「Ｓランクモンスターとかじゃない、普通のモンスターにだよ」
line = "「Ｓランクモンスターとかじゃない、普通のモンスターにだよ」"

[[dialogue]]
speaker = "シルヴィ"
# 「その時、モンスターを倒してくれた星騎士のお姉さんに憧れて、あたしはこの学園に来たんだ」
line = "「その時、モンスターを倒してくれた星騎士のお姉さんに憧れて、あたしはこの学園に来たんだ」"

[[dialogue]]
speaker = "unk"
# 俺にも憧れの人がいます
line = "俺にも憧れの人がいます"

[[dialogue]]
speaker = "unk"
# その人は道を違えてしまったけれど、それでも見上げた星の輝きは、今も俺を照らしている。
line = "その人は道を違えてしまったけれど、それでも見上げた星の輝きは、今も俺を照らしている。"

[[dialogue]]
speaker = "シルヴィ"
# 「そうなんだ。あたしたち、実は似てるのかも」
line = "「そうなんだ。あたしたち、実は似てるのかも」"

[[dialogue]]
speaker = "シルヴィ"
# 「じゃあ、君なら分かるよね？　あたしの気持ち」
line = "「じゃあ、君なら分かるよね？　あたしの気持ち」"

[[dialogue]]
speaker = "unk"
# 正直、分かります
line = "正直、分かります"

[[dialogue]]
speaker = "シルヴィ"
# 「ほら、やっぱり！」
line = "「ほら、やっぱり！」"

[[dialogue]]
speaker = "サーシャ"
# 「あ～あ、会長くんも絆されちゃった」
line = "「あ～あ、会長くんも絆されちゃった」"

[[dialogue]]
speaker = "サーシャ"
# 「まぁ、そうなる気はしてたわ。会長くんは優しいから」
line = "「まぁ、そうなる気はしてたわ。会長くんは優しいから」"

[[dialogue]]
speaker = "unk"
# 身を挺してでも誰かを守りたい。そういう気持ちは、星騎士なら誰もが抱いていると思う。
line = "身を挺してでも誰かを守りたい。そういう気持ちは、星騎士なら誰もが抱いていると思う。"

[[dialogue]]
speaker = "unk"
# それを否定することはできない。
line = "それを否定することはできない。"

[[dialogue]]
speaker = "unk"
# だから、シルヴィ先輩も俺が守ります
line = "だから、シルヴィ先輩も俺が守ります"

[[dialogue]]
speaker = "シルヴィ"
# 「はいぃ！？　話聞いてた！？　あたしがみんなを守るんだって！」
line = "「はいぃ！？　話聞いてた！？　あたしがみんなを守るんだって！」"

[[dialogue]]
speaker = "シルヴィ"
# 「……みんなを守るあたしを守りたい？　なんかトンチみたいだね……」
line = "「……みんなを守るあたしを守りたい？　なんかトンチみたいだね……」"

[[dialogue]]
speaker = "サーシャ"
# 「ぷっ、あはははは！！」
line = "「ぷっ、あはははは！！」"

[[dialogue]]
speaker = "サーシャ"
# 「一本とられたわね、シルヴィ。……私からもお願いね。この子が無茶しないか見張っててちょうだい」
line = "「一本とられたわね、シルヴィ。……私からもお願いね。この子が無茶しないか見張っててちょうだい」"

[[dialogue]]
speaker = "unk"
# はい！
line = "はい！"

[[dialogue]]
speaker = "シルヴィ"
# 「え～！」
line = "「え～！」"

[[dialogue]]
speaker = "サーシャ"
# 「会長くんはあなたに似て、頑固者だから諦めなさいな」
line = "「会長くんはあなたに似て、頑固者だから諦めなさいな」"

[[dialogue]]
speaker = "シルヴィ"
# 「うーん、考えとく……」
line = "「うーん、考えとく……」"

[[dialogue]]
speaker = "シルヴィ"
# 「モヤモヤするから、から揚げおかわりしてくる！」
line = "「モヤモヤするから、から揚げおかわりしてくる！」"

[[dialogue]]
speaker = "サーシャ"
# 「太るわよ～」
line = "「太るわよ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「太ったら会長くんにダイエット付き合ってもらうもん！」
line = "「太ったら会長くんにダイエット付き合ってもらうもん！」"

[[dialogue]]
speaker = "unk"
# 遠ざかる背中に、にっこりと笑うサーシャ先輩だった。
line = "遠ざかる背中に、にっこりと笑うサーシャ先輩だった。"
