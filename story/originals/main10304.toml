[[dialogue]]
speaker = "unk"
# 第４話,まるで姉妹のようだった,B
line = "第４話,まるで姉妹のようだった,B"

[[dialogue]]
speaker = "unk"
# 星徒会室を後にしたサーシャとシルヴィは、食事をとろうとカフェテリアに足を運んだ。
line = "星徒会室を後にしたサーシャとシルヴィは、食事をとろうとカフェテリアに足を運んだ。"

[[dialogue]]
speaker = "シルヴィ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "蛍火"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "シルヴィ"
# 「……はっ！？　また反射的に<ruby=けいか>蛍火</ruby>ちゃんから隠れちゃった！」
line = "「……はっ！？　また反射的に<ruby>蛍火<rt>けいか</rt></ruby>ちゃんから隠れちゃった！」"

[[dialogue]]
speaker = "サーシャ"
# 「その癖、まだ治らないのね～。久々に見たわ～」
line = "「その癖、まだ治らないのね～。久々に見たわ～」"

[[dialogue]]
speaker = "シルヴィ"
# 「ごごごごめん、蛍火ちゃん、ホントにごめん！　あたしももう大丈夫だと思ったんだけど、つい！」
line = "「ごごごごめん、蛍火ちゃん、ホントにごめん！　あたしももう大丈夫だと思ったんだけど、つい！」"

[[dialogue]]
speaker = "蛍火"
# 「……いえ、常に柔らかい雰囲気を纏うことができれば、先輩を怯えさせることもないはず。私の精進が足りないのです」
line = "「……いえ、常に柔らかい雰囲気を纏うことができれば、先輩を怯えさせることもないはず。私の精進が足りないのです」"

[[dialogue]]
speaker = "シルヴィ"
# 「蛍火ちゃんは悪くないからー！！」
line = "「蛍火ちゃんは悪くないからー！！」"

[[dialogue]]
speaker = "サーシャ"
# （うふふ、またやってるわ～）
line = "（うふふ、またやってるわ～）"

[[dialogue]]
speaker = "unk"
# 彼女は<ruby=しののめ>東雲</ruby>蛍火。現・給食委員であり、元星徒会メンバーでもある。
line = "彼女は<ruby>東雲<rt>しののめ</rt></ruby>蛍火。現・給食委員であり、元星徒会メンバーでもある。"

[[dialogue]]
speaker = "unk"
# 強力な星騎士だったが、サーシャの推薦と本人の意向で、カフェテリアで料理人を務めている。
line = "強力な星騎士だったが、サーシャの推薦と本人の意向で、カフェテリアで料理人を務めている。"

[[dialogue]]
speaker = "unk"
# 極度の緊張しいと険しい表情で、初対面の相手をことごとく怖がらせる難儀な体質だ。
line = "極度の緊張しいと険しい表情で、初対面の相手をことごとく怖がらせる難儀な体質だ。"

[[dialogue]]
speaker = "unk"
# とはいえ人懐っこいシルヴィが、ここまで怯えるのには理由がある。
line = "とはいえ人懐っこいシルヴィが、ここまで怯えるのには理由がある。"

[[dialogue]]
speaker = "unk"
# シルヴィの話によると、子どものころお世話になった恩人に似ているらしく、つい怯えてしまうらしい。
line = "シルヴィの話によると、子どものころお世話になった恩人に似ているらしく、つい怯えてしまうらしい。"

[[dialogue]]
speaker = "サーシャ"
# 「そんなに似てるの？　蛍火ちゃんとそのお姉さん」
line = "「そんなに似てるの？　蛍火ちゃんとそのお姉さん」"

[[dialogue]]
speaker = "シルヴィ"
# 「そうなんだよ～。頭では違うって分かってても、つい体が反応しちゃうんだよ～」
line = "「そうなんだよ～。頭では違うって分かってても、つい体が反応しちゃうんだよ～」"

[[dialogue]]
speaker = "蛍火"
# 「少々お待ちください」
line = "「少々お待ちください」"

[[dialogue]]
speaker = "蛍火"
# 「こちらをどうぞ。チキン南蛮定食です」
line = "「こちらをどうぞ。チキン南蛮定食です」"

[[dialogue]]
speaker = "シルヴィ"
# 「っ！　いただきます！」
line = "「っ！　いただきます！」"

[[dialogue]]
speaker = "シルヴィ"
# 「ん～～～～！　おいしいっ！」
line = "「ん～～～～！　おいしいっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「んもう、またハムスターになってるわ～」
line = "「んもう、またハムスターになってるわ～」"

[[dialogue]]
speaker = "蛍火"
# 「フライドチキンや鶏のから揚げ、お好きだったかと思いましたので」
line = "「フライドチキンや鶏のから揚げ、お好きだったかと思いましたので」"

[[dialogue]]
speaker = "シルヴィ"
# 「うれっしい！　あたしの好きなもの覚えててくれたんだ！」
line = "「うれっしい！　あたしの好きなもの覚えててくれたんだ！」"

[[dialogue]]
speaker = "蛍火"
# 「無論です。尊敬するシルヴィ先輩のことを忘れるはずがありません」
line = "「無論です。尊敬するシルヴィ先輩のことを忘れるはずがありません」"

[[dialogue]]
speaker = "サーシャ"
# 「蛍火ちゃん、まだ固いわよ～。ほら、こちょこちょこちょ～」
line = "「蛍火ちゃん、まだ固いわよ～。ほら、こちょこちょこちょ～」"

[[dialogue]]
speaker = "蛍火"
# 「サーシャ先輩っ、あ、やめ………あは、あはははははっ、脇腹、やぁ、あ、あひ、あはははははっ！」
line = "「サーシャ先輩っ、あ、やめ………あは、あはははははっ、脇腹、やぁ、あ、あひ、あはははははっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「どう、これで柔らかくなったかしら？」
line = "「どう、これで柔らかくなったかしら？」"

[[dialogue]]
speaker = "蛍火"
# 「いきなりびっくりしました……スイッチを入れるみたいにくすぐるの、やめてください」
line = "「いきなりびっくりしました……スイッチを入れるみたいにくすぐるの、やめてください」"

[[dialogue]]
speaker = "サーシャ"
# 「ごめなんさいね～。でも、話しやすくなったでしょ？」
line = "「ごめなんさいね～。でも、話しやすくなったでしょ？」"

[[dialogue]]
speaker = "蛍火"
# 「それはそうですけどぉ……お久しぶりです、シルヴィ先輩。お元気そうで何よりです」
line = "「それはそうですけどぉ……お久しぶりです、シルヴィ先輩。お元気そうで何よりです」"

[[dialogue]]
speaker = "シルヴィ"
# 「蛍火ちゃんも、元気そうでよかった！　給食委員の仕事姿も決まってるよ！」
line = "「蛍火ちゃんも、元気そうでよかった！　給食委員の仕事姿も決まってるよ！」"

[[dialogue]]
speaker = "蛍火"
# 「そう言っていただけると嬉しいです。星徒会を離れたのは心苦しいですが、それでも、私なりのやり方でみなさんのお役に立ちたいんです」
line = "「そう言っていただけると嬉しいです。星徒会を離れたのは心苦しいですが、それでも、私なりのやり方でみなさんのお役に立ちたいんです」"

[[dialogue]]
speaker = "シルヴィ"
# 「自信持って！　こんな美味しい料理、蛍火ちゃんしか作れないんだから！」
line = "「自信持って！　こんな美味しい料理、蛍火ちゃんしか作れないんだから！」"

[[dialogue]]
speaker = "サーシャ"
# 「そうよ～。たとえ離れたり、役割が変わっても、私たちは仲間なのよ～」
line = "「そうよ～。たとえ離れたり、役割が変わっても、私たちは仲間なのよ～」"

[[dialogue]]
speaker = "蛍火"
# 「サーシャ先輩も、ありがとうございます。少し待っていてください、すぐ戻ります」
line = "「サーシャ先輩も、ありがとうございます。少し待っていてください、すぐ戻ります」"

[[dialogue]]
speaker = "蛍火"
# 「少し休憩をいただいてきました。私もご一緒してよろしいですか？」
line = "「少し休憩をいただいてきました。私もご一緒してよろしいですか？」"

[[dialogue]]
speaker = "２人"
# 「もちろん♪」
line = "「もちろん♪」"

[[dialogue]]
speaker = "蛍火"
# 「では、相席失礼して……こうしていると、星徒会のことを思い出しますね」
line = "「では、相席失礼して……こうしていると、星徒会のことを思い出しますね」"

[[dialogue]]
speaker = "サーシャ"
# 「書類仕事して、疲れたら、蛍火ちゃんが作ってくれたお菓子でお茶したり……」
line = "「書類仕事して、疲れたら、蛍火ちゃんが作ってくれたお菓子でお茶したり……」"

[[dialogue]]
speaker = "シルヴィ"
# 「モンスター退治して、帰りにフライドチキン食べたり……」
line = "「モンスター退治して、帰りにフライドチキン食べたり……」"

[[dialogue]]
speaker = "サーシャ"
# 「あんまり仕事がない日でも集まってＵＭＯしたり……」
line = "「あんまり仕事がない日でも集まってＵＭＯしたり……」"

[[dialogue]]
speaker = "シルヴィ"
# 「なんだかんだ、いつも一緒だったよね～」
line = "「なんだかんだ、いつも一緒だったよね～」"

[[dialogue]]
speaker = "蛍火"
# 「おふたりとも、まるで姉妹のようで、微笑ましかったです」
line = "「おふたりとも、まるで姉妹のようで、微笑ましかったです」"

[[dialogue]]
speaker = "２人"
# 「…………？」
line = "「…………？」"

[[dialogue]]
speaker = "サーシャ"
# 「姉妹？　私と、シルヴィが？」
line = "「姉妹？　私と、シルヴィが？」"

[[dialogue]]
speaker = "シルヴィ"
# 「う～ん、なんかしっくりこないな～」
line = "「う～ん、なんかしっくりこないな～」"

[[dialogue]]
speaker = "サーシャ"
# 「姉でも妹でもないし、しいて言うなら……犬？　気が付いたらそばにいるのよね～」
line = "「姉でも妹でもないし、しいて言うなら……犬？　気が付いたらそばにいるのよね～」"

[[dialogue]]
speaker = "シルヴィ"
# 「ならサーシャは猫だよね。いつの間にかふらっといなくなるし」
line = "「ならサーシャは猫だよね。いつの間にかふらっといなくなるし」"

[[dialogue]]
speaker = "２人"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "蛍火"
# 「あ、あの……おふたりとも、私の、その……あ、姉みたいものだと思ってますからっ！」
line = "「あ、あの……おふたりとも、私の、その……あ、姉みたいものだと思ってますからっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「もう～、可愛いこと言ってくれちゃって～♪　頭なでなでしちゃう～♪」
line = "「もう～、可愛いこと言ってくれちゃって～♪　頭なでなでしちゃう～♪」"

[[dialogue]]
speaker = "シルヴィ"
# 「あたしもあたしも～！　蛍火ちゃん可愛いなぁもう！」
line = "「あたしもあたしも～！　蛍火ちゃん可愛いなぁもう！」"

[[dialogue]]
speaker = "蛍火"
# 「お、お手柔らかに～！」
line = "「お、お手柔らかに～！」"

[[dialogue]]
speaker = "unk"
# ふたりがかりで可愛がられ、満更でもない蛍火であった。
line = "ふたりがかりで可愛がられ、満更でもない蛍火であった。"
