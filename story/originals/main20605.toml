[[dialogue]]
speaker = "unk"
# 第５話,明星はより鮮烈に,B
line = "第５話,明星はより鮮烈に,B"

[[dialogue]]
speaker = "unk"
# ルヴィネの光が俺を呑み込もうとするその刹那──
line = "ルヴィネの光が俺を呑み込もうとするその刹那──"

[[dialogue]]
speaker = "ルヴィネ"
# 「！　この鎖は──」
line = "「！　この鎖は──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「やらせないわよ！　クロトは私が守るんだから！」
line = "「やらせないわよ！　クロトは私が守るんだから！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが伸ばした鎖がルヴィネを拘束する。
line = "ヴィーナスが伸ばした鎖がルヴィネを拘束する。"

[[dialogue]]
speaker = "unk"
# けれどルヴィネから放たれた光が、すぐさま鎖を砕いた。
line = "けれどルヴィネから放たれた光が、すぐさま鎖を砕いた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「はぁ、はぁ……極星の会長だか、デネブの英雄だか知らないけど、好き勝手言ってくれちゃって……！」
line = "「はぁ、はぁ……極星の会長だか、デネブの英雄だか知らないけど、好き勝手言ってくれちゃって……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私、あなた嫌い！　あなたの話を聞いていると、なんだか無性に腹が立つわ！」
line = "「私、あなた嫌い！　あなたの話を聞いていると、なんだか無性に腹が立つわ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「……奇遇ね。私もあなたを好きになれそうにないわ」
line = "「……奇遇ね。私もあなたを好きになれそうにないわ」"

[[dialogue]]
speaker = "unk"
# ヴィーナスがマシンガンのように光条を連射する──が、ルヴィネのマントには焼け跡ひとつ付かない。
line = "ヴィーナスがマシンガンのように光条を連射する──が、ルヴィネのマントには焼け跡ひとつ付かない。"

[[dialogue]]
speaker = "unk"
# ルヴィネはマントをはためかせるだけでヴィーナスを薙ぎ払う。
line = "ルヴィネはマントをはためかせるだけでヴィーナスを薙ぎ払う。"

[[dialogue]]
speaker = "ヴィーナス"
# 「くぅぅっ……！」
line = "「くぅぅっ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「はぁ、はぁ……はぁっ……私の実力は、まだまだこんなもんじゃないんだから……！」
line = "「はぁ、はぁ……はぁっ……私の実力は、まだまだこんなもんじゃないんだから……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「この……！」
line = "「この……！」"

[[dialogue]]
speaker = "unk"
# 肩で息をしながら星術を放つヴィーナス。
line = "肩で息をしながら星術を放つヴィーナス。"

[[dialogue]]
speaker = "unk"
# しかし何度撃とうと、ルヴィネは眉ひとつ動かすこともない。むしろ撃てば撃つほどヴィーナスだけが疲弊していく。
line = "しかし何度撃とうと、ルヴィネは眉ひとつ動かすこともない。むしろ撃てば撃つほどヴィーナスだけが疲弊していく。"

[[dialogue]]
speaker = "ルヴィネ"
# 「無駄だってわからないの？」
line = "「無駄だってわからないの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふぅ……はぁ、はぁ……そんなのやってみなきゃわからないでしょ。１００発目が駄目でも１０１発目ならいけるかもしれないじゃない」
line = "「ふぅ……はぁ、はぁ……そんなのやってみなきゃわからないでしょ。１００発目が駄目でも１０１発目ならいけるかもしれないじゃない」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今のままじゃ、一万発撃っても届かないと思うけど」
line = "「今のままじゃ、一万発撃っても届かないと思うけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そういう問題じゃないでしょうが！　やるって決めたら何回でもやるの！」
line = "「そういう問題じゃないでしょうが！　やるって決めたら何回でもやるの！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトは御前試合の時、何度だって立ち上がった。梨緒だって暴走したクロトを止めてくれた」
line = "「クロトは御前試合の時、何度だって立ち上がった。梨緒だって暴走したクロトを止めてくれた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから今は私がやらないといけないの！」
line = "「だから今は私がやらないといけないの！」"

[[dialogue]]
speaker = "unk"
# 俺も立ち上がってヴィーナスと共に戦わないと。
line = "俺も立ち上がってヴィーナスと共に戦わないと。"

[[dialogue]]
speaker = "unk"
# そう思っているのに体が動かない。
line = "そう思っているのに体が動かない。"

[[dialogue]]
speaker = "unk"
# 手どころか指の一本すら言うことを聞かず、ヴィーナスに手を伸ばすことすらできない。
line = "手どころか指の一本すら言うことを聞かず、ヴィーナスに手を伸ばすことすらできない。"

[[dialogue]]
speaker = "クロト"
# 「ヴィー……ナス……」
line = "「ヴィー……ナス……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ひどい顔してるじゃない、クロト。ここは娘に任せて」
line = "「ひどい顔してるじゃない、クロト。ここは娘に任せて」"

[[dialogue]]
speaker = "クロト"
# 「なんとか……逃げて……」
line = "「なんとか……逃げて……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ダメよ。ルヴィネは私たちを逃がすつもりなんかないわ」
line = "「ダメよ。ルヴィネは私たちを逃がすつもりなんかないわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ええ、その通りよ。ここで処断すると、そう言ったでしょう」
line = "「ええ、その通りよ。ここで処断すると、そう言ったでしょう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ひぁああぁっ！？」
line = "「ひぁああぁっ！？」"

[[dialogue]]
speaker = "unk"
# ルヴィネの光の矢がヴィーナスを射貫く。
line = "ルヴィネの光の矢がヴィーナスを射貫く。"

[[dialogue]]
speaker = "ヴィーナス"
# 「く……うぅ……」
line = "「く……うぅ……」"

[[dialogue]]
speaker = "unk"
# 俺と同じように苦悶を漏らしながら地に伏すヴィーナス。
line = "俺と同じように苦悶を漏らしながら地に伏すヴィーナス。"

[[dialogue]]
speaker = "unk"
# だが拳を握り、力を振り絞ってまた立ち上がる。
line = "だが拳を握り、力を振り絞ってまた立ち上がる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「はぁ……はぁ……まだ負けてないわよ……！」
line = "「はぁ……はぁ……まだ負けてないわよ……！」"

[[dialogue]]
speaker = "unk"
# 何度も地面に叩きつけられ、その顔は汗と血でボロボロになっていた。
line = "何度も地面に叩きつけられ、その顔は汗と血でボロボロになっていた。"

[[dialogue]]
speaker = "unk"
# 髪も砂と塵で汚れ、天衣無縫なヴィーナスには似つかわしくない。
line = "髪も砂と塵で汚れ、天衣無縫なヴィーナスには似つかわしくない。"

[[dialogue]]
speaker = "unk"
# それでも。
line = "それでも。"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は……！　あなたに勝ってクロトを守る……！　そう決めたんだから！」
line = "「私は……！　あなたに勝ってクロトを守る……！　そう決めたんだから！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの瞳は輝きを失わず、俺たちを睥睨するルヴィネをにらんでいた。
line = "ヴィーナスの瞳は輝きを失わず、俺たちを睥睨するルヴィネをにらんでいた。"

[[dialogue]]
speaker = "ルヴィネ"
# 「戦いの勝敗はあなたが決めることではないと思うのだけど」
line = "「戦いの勝敗はあなたが決めることではないと思うのだけど」"

[[dialogue]]
speaker = "ヴィーナス"
# 「知っちゃこっちゃないわ！　私が勝つって言ったら勝つの！」
line = "「知っちゃこっちゃないわ！　私が勝つって言ったら勝つの！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「傲慢ね。神にでもなったつもりかしら」
line = "「傲慢ね。神にでもなったつもりかしら」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それはこっちのセリフよ。あなたより偉そうなやつ、他で見たことないわ！」
line = "「それはこっちのセリフよ。あなたより偉そうなやつ、他で見たことないわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ディバイン……スフィアッ！！」
line = "「ディバイン……スフィアッ！！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「懲りないわね……」
line = "「懲りないわね……」"

[[dialogue]]
speaker = "unk"
# ヴィーナスとルヴィネが放った光が正面からぶつかり合う。
line = "ヴィーナスとルヴィネが放った光が正面からぶつかり合う。"

[[dialogue]]
speaker = "unk"
# だがヴィーナスの星術はあっさりと呑み込まれ──
line = "だがヴィーナスの星術はあっさりと呑み込まれ──"

[[dialogue]]
speaker = "ヴィーナス"
# 「きゃああああっ！？」
line = "「きゃああああっ！？」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが悲鳴とともに吹き飛ばされた。
line = "ヴィーナスが悲鳴とともに吹き飛ばされた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あっ……ぐっ……うぅ……っ」
line = "「あっ……ぐっ……うぅ……っ」"

[[dialogue]]
speaker = "unk"
# 自身の血にまみれ、ひび割れた地面の上でのたうつヴィーナス。
line = "自身の血にまみれ、ひび割れた地面の上でのたうつヴィーナス。"

[[dialogue]]
speaker = "ルヴィネ"
# 「もう体が動かないでしょう？　これ以上あがくのは見苦しいわ」
line = "「もう体が動かないでしょう？　これ以上あがくのは見苦しいわ」"

[[dialogue]]
speaker = "ルヴィネ"
# 「あなたたちは頑張った。それは認めてあげる。だからもう楽になりなさい」
line = "「あなたたちは頑張った。それは認めてあげる。だからもう楽になりなさい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いや……よ」
line = "「いや……よ」"

[[dialogue]]
speaker = "unk"
# また立ち上がる。
line = "また立ち上がる。"

[[dialogue]]
speaker = "unk"
# 俺だって痛々しいヴィーナスの姿なんて見たくない。
line = "俺だって痛々しいヴィーナスの姿なんて見たくない。"

[[dialogue]]
speaker = "unk"
# だけどヴィーナスの背中は『止めるな』と言っているようで……
line = "だけどヴィーナスの背中は『止めるな』と言っているようで……"

[[dialogue]]
speaker = "ルヴィネ"
# 「はぁ……もうやめなさいと言っているのに」
line = "「はぁ……もうやめなさいと言っているのに」"

[[dialogue]]
speaker = "ルヴィネ"
# 「九浄ヴィーナス。デネブの魔王の娘。アルタイルの魔王を覚醒させるため、平行世界へと渡った」
line = "「九浄ヴィーナス。デネブの魔王の娘。アルタイルの魔王を覚醒させるため、平行世界へと渡った」"

[[dialogue]]
speaker = "ルヴィネ"
# 「魔王が覚醒した時点で、あなたの役目は終わった。あなたはもう用済みなの」
line = "「魔王が覚醒した時点で、あなたの役目は終わった。あなたはもう用済みなの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……そうね。日誌に縋っていた頃の私ならそうだったかもしれない。それが私の運命だと思っていたから」
line = "「……そうね。日誌に縋っていた頃の私ならそうだったかもしれない。それが私の運命だと思っていたから」"

[[dialogue]]
speaker = "unk"
# ルヴィネを見据えるヴィーナスの表情が引き締まる。
line = "ルヴィネを見据えるヴィーナスの表情が引き締まる。"

[[dialogue]]
speaker = "unk"
# 思いつきで突進したり、無茶を言ったりする時とは違う、成長した凛々しい横顔。
line = "思いつきで突進したり、無茶を言ったりする時とは違う、成長した凛々しい横顔。"

[[dialogue]]
speaker = "unk"
# 『成長した』なんて思うのは、平行世界の娘とはいえ、俺が父親だからだろうか。
line = "『成長した』なんて思うのは、平行世界の娘とはいえ、俺が父親だからだろうか。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あなたのことは気に入らないけど……１つだけ感謝するわ。どうして無性に腹が立つか、ちょっとわかった気がするから」
line = "「あなたのことは気に入らないけど……１つだけ感謝するわ。どうして無性に腹が立つか、ちょっとわかった気がするから」"

[[dialogue]]
speaker = "ヴィーナス"
# 「確かに私の目的は、クロトを魔王として目覚めさせることだった。それが私の使命だった」
line = "「確かに私の目的は、クロトを魔王として目覚めさせることだった。それが私の使命だった」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そしてクロトは魔王に覚醒して……使命は果たされた」
line = "「そしてクロトは魔王に覚醒して……使命は果たされた」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でもそれは終わりじゃない。始まりなの」
line = "「でもそれは終わりじゃない。始まりなの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「未来が記された日誌はもうない。私の人生はまだ白紙」
line = "「未来が記された日誌はもうない。私の人生はまだ白紙」"

[[dialogue]]
speaker = "ヴィーナス"
# 「白紙のページに書き込んでいくのは私自身。私の未来は私が決める。私の人生は私が生きる」
line = "「白紙のページに書き込んでいくのは私自身。私の未来は私が決める。私の人生は私が生きる」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だから私の邪魔をするやつは宇宙の彼方までぶっ飛ばしてやるわ」
line = "「だから私の邪魔をするやつは宇宙の彼方までぶっ飛ばしてやるわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そしてその邪魔があなたよ──ルヴィネ」
line = "「そしてその邪魔があなたよ──ルヴィネ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「リクリエだろうと、そうでなかろうと、邪魔はさせないんだから！」
line = "「リクリエだろうと、そうでなかろうと、邪魔はさせないんだから！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「自分で決める……ね。その結果、命を落とすことになりそうなんだけど？」
line = "「自分で決める……ね。その結果、命を落とすことになりそうなんだけど？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それがどうしたっていうのよ！」
line = "「それがどうしたっていうのよ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「危ないことも、苦しいことも、自分で選んで、進んで、乗り越える……！　私は自分の気持ちを貫き通すわ！」
line = "「危ないことも、苦しいことも、自分で選んで、進んで、乗り越える……！　私は自分の気持ちを貫き通すわ！」"

[[dialogue]]
speaker = "ルヴィネ"
# 「はぁ……愚かね」
line = "「はぁ……愚かね」"

[[dialogue]]
speaker = "ルヴィネ"
# 「ではあなたの言う『自分の意志』ごと消し飛ばしてあげましょう。苦しまないように一瞬で」
line = "「ではあなたの言う『自分の意志』ごと消し飛ばしてあげましょう。苦しまないように一瞬で」"

[[dialogue]]
speaker = "ルヴィネ"
# 「今度こそ消えなさい」
line = "「今度こそ消えなさい」"

[[dialogue]]
speaker = "ヴィーナス"
# 「シャイニングゴッデスビームッ！！！」
line = "「シャイニングゴッデスビームッ！！！」"

[[dialogue]]
speaker = "unk"
# 光と光が再び激突する。
line = "光と光が再び激突する。"

[[dialogue]]
speaker = "ヴィーナス"
# 「あああーーーっ！！！！」
line = "「あああーーーっ！！！！」"

[[dialogue]]
speaker = "unk"
# 一瞬の拮抗。
line = "一瞬の拮抗。"

[[dialogue]]
speaker = "unk"
# 閃光と閃光のぶつかり合いが衝撃を生み、ヴィーナスの星術がゆっくりと押し返す。
line = "閃光と閃光のぶつかり合いが衝撃を生み、ヴィーナスの星術がゆっくりと押し返す。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "ヴィーナス"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# ルヴィネの光がビームをかき消し、光の奔流がヴィーナスを呑み込んだ。
line = "ルヴィネの光がビームをかき消し、光の奔流がヴィーナスを呑み込んだ。"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ヴィーナスは悲鳴を上げることすらできずに倒れ、そのまま動かない。
line = "ヴィーナスは悲鳴を上げることすらできずに倒れ、そのまま動かない。"

[[dialogue]]
speaker = "unk"
# 指ひとつピクリとも動かず、まるで壊れた人形のようだ。
line = "指ひとつピクリとも動かず、まるで壊れた人形のようだ。"

[[dialogue]]
speaker = "クロト"
# 「ヴィー……ナス……」
line = "「ヴィー……ナス……」"

[[dialogue]]
speaker = "ルヴィネ"
# 「体は残ったのね。本当に丈夫なんだから」
line = "「体は残ったのね。本当に丈夫なんだから」"

[[dialogue]]
speaker = "ルヴィネ"
# 「でももう終わり──」
line = "「でももう終わり──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ま」
line = "「……ま」"

[[dialogue]]
speaker = "ルヴィネ"
# 「っ……」
line = "「っ……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「まだ……負けて……ない……」
line = "「まだ……負けて……ない……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私は、私の道を往く……！」
line = "「私は、私の道を往く……！」"

[[dialogue]]
speaker = "unk"
# もう声を絞り出すことすら苦しそうで、息も絶え絶えだ。
line = "もう声を絞り出すことすら苦しそうで、息も絶え絶えだ。"

[[dialogue]]
speaker = "unk"
# それでもロッドを支えにして、満身創痍の体でゆっくりと立ち上がる。
line = "それでもロッドを支えにして、満身創痍の体でゆっくりと立ち上がる。"

[[dialogue]]
speaker = "ルヴィネ"
# 「出力を上げるわ。街を傷つけてしまうから抑えていたけど、あなたたちを消し飛ばすには必要みたい」
line = "「出力を上げるわ。街を傷つけてしまうから抑えていたけど、あなたたちを消し飛ばすには必要みたい」"

[[dialogue]]
speaker = "ルヴィネ"
# 「できるだけそこから動かないで。２人仲良くこの世界から消滅させてあげる」
line = "「できるだけそこから動かないで。２人仲良くこの世界から消滅させてあげる」"

[[dialogue]]
speaker = "unk"
# ルヴィネが手をかざし、頭上に光が収束していく。
line = "ルヴィネが手をかざし、頭上に光が収束していく。"

[[dialogue]]
speaker = "unk"
# このままでは俺もヴィーナスも死ぬ。
line = "このままでは俺もヴィーナスも死ぬ。"

[[dialogue]]
speaker = "unk"
# それでもヴィーナスは一歩も退くことなく──
line = "それでもヴィーナスは一歩も退くことなく──"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロト、アルケインコードを私に……！」
line = "「クロト、アルケインコードを私に……！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスにアルケインコードを使うことは今まで何度も試してきた。だけど一度たりとも成功したことはなかった。
line = "ヴィーナスにアルケインコードを使うことは今まで何度も試してきた。だけど一度たりとも成功したことはなかった。"

[[dialogue]]
speaker = "unk"
# きっとヴィーナスにはアルケインコードを使えない理由がある。確証はないが、そう直感していた。
line = "きっとヴィーナスにはアルケインコードを使えない理由がある。確証はないが、そう直感していた。"

[[dialogue]]
speaker = "クロト"
# 「無茶だ……！」
line = "「無茶だ……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「無茶がなんだっていうのよ！　無茶を通してこそ魔王の娘、新星星徒会のフィクサーなんだから！」
line = "「無茶がなんだっていうのよ！　無茶を通してこそ魔王の娘、新星星徒会のフィクサーなんだから！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「不可能かどうかは私が決める！　お行儀よく諦めたりなんかしないわ！」
line = "「不可能かどうかは私が決める！　お行儀よく諦めたりなんかしないわ！」"

[[dialogue]]
speaker = "？？？"
# （大きくなったわね、ヴィーナス……）
line = "（大きくなったわね、ヴィーナス……）"

[[dialogue]]
speaker = "ヴィーナス"
# 「──！　この声は……」
line = "「──！　この声は……」"

[[dialogue]]
speaker = "？？？"
# 「この子は私の子どもだから、体の一部が霊力でできている」
line = "「この子は私の子どもだから、体の一部が霊力でできている」"

[[dialogue]]
speaker = "？？？"
# 「もし力を使い過ぎれば、霊力が枯渇し、この子自身が消滅してしまうわ」
line = "「もし力を使い過ぎれば、霊力が枯渇し、この子自身が消滅してしまうわ」"

[[dialogue]]
speaker = "？？？"
# 「私とあなたの子だから、この子はきっと世界のために力を使おうとするでしょう。そのために力を使い果たして消えてしまうかもしれない」
line = "「私とあなたの子だから、この子はきっと世界のために力を使おうとするでしょう。そのために力を使い果たして消えてしまうかもしれない」"

[[dialogue]]
speaker = "？？？"
# 「だけどこの子には自分のために生きてほしい。厳しい時代だとわかっているけど、それでも自分の幸せを忘れないでほしい」
line = "「だけどこの子には自分のために生きてほしい。厳しい時代だとわかっているけど、それでも自分の幸せを忘れないでほしい」"

[[dialogue]]
speaker = "？？？"
# 「だから力に制限をかけようと思うの。この子が自分の力に呑まれて消えてしまわないように」
line = "「だから力に制限をかけようと思うの。この子が自分の力に呑まれて消えてしまわないように」"

[[dialogue]]
speaker = "？？？"
# 「でももし、自分の存在を賭してでも、自分の道を切り開きたいと願うなら……」
line = "「でももし、自分の存在を賭してでも、自分の道を切り開きたいと願うなら……」"

[[dialogue]]
speaker = "？？？"
# 「私の願いを超えて、自分の足でその先へ行くのなら……」
line = "「私の願いを超えて、自分の足でその先へ行くのなら……」"

[[dialogue]]
speaker = "？？？"
# 「私は親として、娘の旅立ちを祝福するわ」
line = "「私は親として、娘の旅立ちを祝福するわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス……？」
line = "「ヴィーナス……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今、ママの記憶が流れ込んできたの。やっぱりママは私のことを考えてくれてたのね」
line = "「今、ママの記憶が流れ込んできたの。やっぱりママは私のことを考えてくれてたのね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「今ならいけるわ。だから来て、パパ──！」
line = "「今ならいけるわ。だから来て、パパ──！」"

[[dialogue]]
speaker = "クロト"
# 「ああ！　俺にも見えた──！」
line = "「ああ！　俺にも見えた──！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの中に見えた。煌々と輝く、新たな星の光が。
line = "ヴィーナスの中に見えた。煌々と輝く、新たな星の光が。"

[[dialogue]]
speaker = "unk"
# その光に向かって手を伸ばす。
line = "その光に向かって手を伸ばす。"

[[dialogue]]
speaker = "unk"
# 屍のような体を無理やり動かし、地を這い、ただ届けと願って名前を呼ぶ。
line = "屍のような体を無理やり動かし、地を這い、ただ届けと願って名前を呼ぶ。"

[[dialogue]]
speaker = "unk"
# 俺の娘であり、頼もしい仲間である彼女の名を──！
line = "俺の娘であり、頼もしい仲間である彼女の名を──！"

[[dialogue]]
speaker = "クロト"
# 「ヴィーナス──！」
line = "「ヴィーナス──！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「うん、クロト！」
line = "「うん、クロト！」"

[[dialogue]]
speaker = "クロト"
# 「アルケインノヴァエクストリーム！！」
line = "「アルケインノヴァエクストリーム！！」"

[[dialogue]]
speaker = "unk"
# そして目映い光に包まれて──
line = "そして目映い光に包まれて──"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# ついに顕現する、ヴィーナスの新たな姿。
line = "ついに顕現する、ヴィーナスの新たな姿。"

[[dialogue]]
speaker = "unk"
# 新星の名を冠するその光は、より眩しく、より鮮烈に輝く。
line = "新星の名を冠するその光は、より眩しく、より鮮烈に輝く。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「行ってくるわね、ママ」
line = "「行ってくるわね、ママ」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「スーパーフィクサー・ヴィーナス、ノヴァフォームに変身よ！　ルヴィネ、もうあなたの好きにはさせないわ！」
line = "「スーパーフィクサー・ヴィーナス、ノヴァフォームに変身よ！　ルヴィネ、もうあなたの好きにはさせないわ！」"
