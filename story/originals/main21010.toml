[[dialogue]]
speaker = "unk"
# 第１０話,レティシア,B
line = "第１０話,レティシア,B"

[[dialogue]]
speaker = "アポロ"
# 「はぁ、はぁ……このぉおおっ！！」
line = "「はぁ、はぁ……このぉおおっ！！」"

[[dialogue]]
speaker = "スレイプニル"
# 「ヒィン……！」
line = "「ヒィン……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「止まって、レティシアちゃん！」
line = "「止まって、レティシアちゃん！」"

[[dialogue]]
speaker = "レティシア"
# 「──」
line = "「──」"

[[dialogue]]
speaker = "unk"
# 神殿の空中でレティシアと激戦を繰り広げるアポロたち。
line = "神殿の空中でレティシアと激戦を繰り広げるアポロたち。"

[[dialogue]]
speaker = "レティシア"
# 「ずいぶんと息が上がってきたわね。まだ諦めない？」
line = "「ずいぶんと息が上がってきたわね。まだ諦めない？」"

[[dialogue]]
speaker = "アポロ"
# 「へっ……まだまだ元気いっぱいだっての！！」
line = "「へっ……まだまだ元気いっぱいだっての！！」"

[[dialogue]]
speaker = "レティシア"
# 「それなら、もっと出力を上げるわ──ルヴィ、力を貸して」
line = "「それなら、もっと出力を上げるわ──ルヴィ、力を貸して」"

[[dialogue]]
speaker = "unk"
# レティシアの持つ緋色のセレスティアが輝く──
line = "レティシアの持つ緋色のセレスティアが輝く──"

[[dialogue]]
speaker = "アポロ"
# 「なっ──！？」
line = "「なっ──！？」"

[[dialogue]]
speaker = "レティシア"
# 「よく止めたわね。流石は魔王の血統、ということかしら」
line = "「よく止めたわね。流石は魔王の血統、ということかしら」"

[[dialogue]]
speaker = "アポロ"
# 「何なんだこいつっ……いきなり星力があり得ないくらい跳ね上がって……！？」
line = "「何なんだこいつっ……いきなり星力があり得ないくらい跳ね上がって……！？」"

[[dialogue]]
speaker = "アポロ"
# 「いや、星力じゃない──この力……まさかっ！？」
line = "「いや、星力じゃない──この力……まさかっ！？」"

[[dialogue]]
speaker = "ベアトリス"
# 「レティシアちゃん、ダメ！　それは使ったらダメだよ！！」
line = "「レティシアちゃん、ダメ！　それは使ったらダメだよ！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィも言ってたでしょ！？　セレスティアのその機能は、霊力を無理やり体に帯びるもの……！」
line = "「ルヴィも言ってたでしょ！？　セレスティアのその機能は、霊力を無理やり体に帯びるもの……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「肉体の損傷は避けられないから、滅多なことがない限り使うなって……！」
line = "「肉体の損傷は避けられないから、滅多なことがない限り使うなって……！」"

[[dialogue]]
speaker = "レティシア"
# 「そうね。でも、今は使うべきと判断するわ。私の仲間を騙している敵との戦いだもの……死力を尽くさないとね」
line = "「そうね。でも、今は使うべきと判断するわ。私の仲間を騙している敵との戦いだもの……死力を尽くさないとね」"

[[dialogue]]
speaker = "アポロ"
# 「肉体の損傷と引き換えに、戦闘力を上げるセレスティア……！？　くっそ、無駄にカッコいいもん使いやがって……！」
line = "「肉体の損傷と引き換えに、戦闘力を上げるセレスティア……！？　くっそ、無駄にカッコいいもん使いやがって……！」"

[[dialogue]]
speaker = "アポロ"
# 「けど力を使うたびに傷つくなら、こっちにも勝機が……！」
line = "「けど力を使うたびに傷つくなら、こっちにも勝機が……！」"

[[dialogue]]
speaker = "レティシア"
# 「──<ruby=そんな>勝機なんて</ruby>もの、存在しないわ」
line = "「──<ruby>勝機なんて<rt>そんな</rt></ruby>もの、存在しないわ」"

[[dialogue]]
speaker = "unk"
# 互いに小さくないダメージが蓄積しているが、レティシアは自身が傷つくのもいとわず、アポロに猛攻を仕掛け続ける。
line = "互いに小さくないダメージが蓄積しているが、レティシアは自身が傷つくのもいとわず、アポロに猛攻を仕掛け続ける。"

[[dialogue]]
speaker = "アポロ"
# 「コイツ、ボロボロなのにっ、血を吐いてるのに全然止まらない……！　痛くないのかよ……！？」
line = "「コイツ、ボロボロなのにっ、血を吐いてるのに全然止まらない……！　痛くないのかよ……！？」"

[[dialogue]]
speaker = "レティシア"
# 「とても痛いわ。でもそれは、戦いをやめる理由にはならないでしょう？」
line = "「とても痛いわ。でもそれは、戦いをやめる理由にはならないでしょう？」"

[[dialogue]]
speaker = "レティシア"
# 「アルタイルを滅ぼす。ベアトとチナを連れ戻す。そのことの方がずうっと大切だもの」
line = "「アルタイルを滅ぼす。ベアトとチナを連れ戻す。そのことの方がずうっと大切だもの」"

[[dialogue]]
speaker = "アポロ"
# 「ちくしょうっ……リクリエの使徒とはまた違った、話の通じなさだな──！」
line = "「ちくしょうっ……リクリエの使徒とはまた違った、話の通じなさだな──！」"

[[dialogue]]
speaker = "レティシア"
# 「お喋りしてる暇があるのかしら？　もうすぐあなたの喉元に刃が届くわ」
line = "「お喋りしてる暇があるのかしら？　もうすぐあなたの喉元に刃が届くわ」"

[[dialogue]]
speaker = "アポロ"
# 「──くっそぉぉおっ！」
line = "「──くっそぉぉおっ！」"

[[dialogue]]
speaker = "unk"
# ルヴィネが擁する中でも最強の戦力であるとの自負に違わぬ、レティシアの斬撃の嵐。
line = "ルヴィネが擁する中でも最強の戦力であるとの自負に違わぬ、レティシアの斬撃の嵐。"

[[dialogue]]
speaker = "unk"
# 同じ剣という得物を操るアポロだったが、戦闘経験の格差、そして何よりも不規則に突発的に跳ね上がるレティシアの霊力に劣勢が続き──
line = "同じ剣という得物を操るアポロだったが、戦闘経験の格差、そして何よりも不規則に突発的に跳ね上がるレティシアの霊力に劣勢が続き──"

[[dialogue]]
speaker = "アポロ"
# 「しまっ──！？」
line = "「しまっ──！？」"

[[dialogue]]
speaker = "レティシア"
# 「──取ったわ。おやすみなさい」
line = "「──取ったわ。おやすみなさい」"

[[dialogue]]
speaker = "ベアトリス"
# 「やらせないっ──！！」
line = "「やらせないっ──！！」"

[[dialogue]]
speaker = "アポロ"
# 「悪い、ベアトっ──助かった！」
line = "「悪い、ベアトっ──助かった！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ううんっ、無事でよかった……！」
line = "「ううんっ、無事でよかった……！」"

[[dialogue]]
speaker = "レティシア"
# 「ベアト……あまり邪魔をしないでちょうだい？　あなたを殺さないようにしながら、この子だけを殺すのは骨が折れるのよ？」
line = "「ベアト……あまり邪魔をしないでちょうだい？　あなたを殺さないようにしながら、この子だけを殺すのは骨が折れるのよ？」"

[[dialogue]]
speaker = "ベアトリス"
# 「何回だって邪魔するよ！　アポロちゃんもレティシアちゃんも、大切なお友達だもん！」
line = "「何回だって邪魔するよ！　アポロちゃんもレティシアちゃんも、大切なお友達だもん！」"

[[dialogue]]
speaker = "レティシア"
# 「……困ったわね。本当に頑固な子」
line = "「……困ったわね。本当に頑固な子」"

[[dialogue]]
speaker = "ベアトリス"
# 「ごめんなさいっ、でも──これが私だから！」
line = "「ごめんなさいっ、でも──これが私だから！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ルヴィから、平行世界同士は争うしかないって、そう教えられた時から……私はずっと探してたの！」
line = "「ルヴィから、平行世界同士は争うしかないって、そう教えられた時から……私はずっと探してたの！」"

[[dialogue]]
speaker = "ベアトリス"
# 「デネブとアルタイル、どっちも滅ばずに済む方法はないかって……それがようやく見つかりそうなの。だから絶対に諦められない！！」
line = "「デネブとアルタイル、どっちも滅ばずに済む方法はないかって……それがようやく見つかりそうなの。だから絶対に諦められない！！」"

[[dialogue]]
speaker = "レティシア"
# 「私はルヴィを信じてるわ。平行世界同士は争うしかない。だったら滅ぶのはアルタイルしかあり得ない」
line = "「私はルヴィを信じてるわ。平行世界同士は争うしかない。だったら滅ぶのはアルタイルしかあり得ない」"

[[dialogue]]
speaker = "ベアトリス"
# 「させない……！　アルタイルが滅んだら、今度はデネブの番……！　ルヴィに、そんなひどいこと、絶対にさせちゃいけないの……！」
line = "「させない……！　アルタイルが滅んだら、今度はデネブの番……！　ルヴィに、そんなひどいこと、絶対にさせちゃいけないの……！」"

[[dialogue]]
speaker = "レティシア"
# 「平行線ね。ごめんねベアト、勝つためにはあなたの動きを封じる必要がありそう……本当はやりたくないの。許してちょうだい？」
line = "「平行線ね。ごめんねベアト、勝つためにはあなたの動きを封じる必要がありそう……本当はやりたくないの。許してちょうだい？」"

[[dialogue]]
speaker = "ベアトリス"
# 「──っ！？」
line = "「──っ！？」"

[[dialogue]]
speaker = "unk"
# レティシアの流麗な太刀筋が、嵐となってベアトリスに押し寄せる。
line = "レティシアの流麗な太刀筋が、嵐となってベアトリスに押し寄せる。"

[[dialogue]]
speaker = "unk"
# 鮮血色の槍を振るい、正面からレティシアと切り結ぶベアトリス──しかし、力の差は歴然としていた。
line = "鮮血色の槍を振るい、正面からレティシアと切り結ぶベアトリス──しかし、力の差は歴然としていた。"

[[dialogue]]
speaker = "アリコーン"
# 「ブルルル！」
line = "「ブルルル！」"

[[dialogue]]
speaker = "アポロ"
# 「くそっ……！？　こいつら、まだ動けたのか……邪魔だ！！」
line = "「くそっ……！？　こいつら、まだ動けたのか……邪魔だ！！」"

[[dialogue]]
speaker = "unk"
# アポロの動きが神殿のガーディアンによって阻まれる。一刀のもと切り捨てるが、ベアトリスの救援はとても間に合わない。
line = "アポロの動きが神殿のガーディアンによって阻まれる。一刀のもと切り捨てるが、ベアトリスの救援はとても間に合わない。"

[[dialogue]]
speaker = "レティシア"
# 「ベアトじゃ私には勝てないわ。訓練でも一度も勝てたことがないでしょう？」
line = "「ベアトじゃ私には勝てないわ。訓練でも一度も勝てたことがないでしょう？」"

[[dialogue]]
speaker = "ベアトリス"
# 「それでも……私は……！！」
line = "「それでも……私は……！！」"

[[dialogue]]
speaker = "レティシア"
# 「命は取らないわ。気を失わせるだけ。だから大人しくしていてちょうだい」
line = "「命は取らないわ。気を失わせるだけ。だから大人しくしていてちょうだい」"

[[dialogue]]
speaker = "unk"
# レティシアの刃がベアトリスに迫る──
line = "レティシアの刃がベアトリスに迫る──"

[[dialogue]]
speaker = "unk"
# だがそこに一筋の稲妻が走り、レティシアの刃を弾いた。
line = "だがそこに一筋の稲妻が走り、レティシアの刃を弾いた。"

[[dialogue]]
speaker = "チナ"
# 「はぁ、はぁ……久しぶりだな、レティシア……！」
line = "「はぁ、はぁ……久しぶりだな、レティシア……！」"

[[dialogue]]
speaker = "ベアトリス"
# 「チナちゃん！？」
line = "「チナちゃん！？」"

[[dialogue]]
speaker = "アポロ"
# 「オマエ、極星星徒会の……！？」
line = "「オマエ、極星星徒会の……！？」"

[[dialogue]]
speaker = "レティシア"
# 「──チナ。新星学園に拘束されていると聞いていたのだけど……？」
line = "「──チナ。新星学園に拘束されていると聞いていたのだけど……？」"

[[dialogue]]
speaker = "unk"
# 極星星徒会同士の戦い──そこに割って入ったのは、同じく極星星徒会のチナだった。
line = "極星星徒会同士の戦い──そこに割って入ったのは、同じく極星星徒会のチナだった。"

[[dialogue]]
speaker = "unk"
# 意外な参戦に、敵味方関係なく３人が驚く。
line = "意外な参戦に、敵味方関係なく３人が驚く。"

[[dialogue]]
speaker = "アポロ"
# （何をしに来たんだ……？　レティシアに加勢しに来たのか？）
line = "（何をしに来たんだ……？　レティシアに加勢しに来たのか？）"

[[dialogue]]
speaker = "unk"
# チナはかつてアルタイルを滅ぼそうとした敵だ。
line = "チナはかつてアルタイルを滅ぼそうとした敵だ。"

[[dialogue]]
speaker = "unk"
# 今ベアトリスを助けたばかりとはいえ、警戒せざるを得ない。
line = "今ベアトリスを助けたばかりとはいえ、警戒せざるを得ない。"

[[dialogue]]
speaker = "チナ"
# 「新星学園の学園長ってやつと話をした。それで思った」
line = "「新星学園の学園長ってやつと話をした。それで思った」"

[[dialogue]]
speaker = "チナ"
# 「アタシはアルタイルを滅ぼしたくない。十年前失ったものを、できるなら守りたい」
line = "「アタシはアルタイルを滅ぼしたくない。十年前失ったものを、できるなら守りたい」"

[[dialogue]]
speaker = "チナ"
# 「だけど、アタシが何より守りたいのはデネブだ。デネブを守るために必要なら、アタシはアルタイルを滅ぼす。今もその覚悟は変わらない」
line = "「だけど、アタシが何より守りたいのはデネブだ。デネブを守るために必要なら、アタシはアルタイルを滅ぼす。今もその覚悟は変わらない」"

[[dialogue]]
speaker = "アポロ"
# （コイツ、まだアルタイルを滅ぼす気なのか……？　それなら相手になるぞ……！）
line = "（コイツ、まだアルタイルを滅ぼす気なのか……？　それなら相手になるぞ……！）"

[[dialogue]]
speaker = "unk"
# レティシアだけでなく、チナとも戦う覚悟を心の中で固めるアポロ。
line = "レティシアだけでなく、チナとも戦う覚悟を心の中で固めるアポロ。"

[[dialogue]]
speaker = "unk"
# いつでも攻撃を仕掛けられるよう出方を伺う。
line = "いつでも攻撃を仕掛けられるよう出方を伺う。"

[[dialogue]]
speaker = "チナ"
# 「アタシにとって一番大事なのは、デネブを守ること」
line = "「アタシにとって一番大事なのは、デネブを守ること」"

[[dialogue]]
speaker = "チナ"
# 「だからアタシは、デネブを守るためなら誰とでも戦う！　それがたとえルヴィでもだ！」
line = "「だからアタシは、デネブを守るためなら誰とでも戦う！　それがたとえルヴィでもだ！」"

[[dialogue]]
speaker = "レティシア"
# 「……あなたまで、そんなことを」
line = "「……あなたまで、そんなことを」"

[[dialogue]]
speaker = "チナ"
# 「ルヴィが本当は何をする気なのか、アタシにはわからない」
line = "「ルヴィが本当は何をする気なのか、アタシにはわからない」"

[[dialogue]]
speaker = "チナ"
# 「だからアタシは、ルヴィがリクリエを起こす気なのか、ベアトと一緒に確かめる！」
line = "「だからアタシは、ルヴィがリクリエを起こす気なのか、ベアトと一緒に確かめる！」"

[[dialogue]]
speaker = "ベアトリス"
# 「チナちゃん！」
line = "「チナちゃん！」"

[[dialogue]]
speaker = "レティシア"
# 「……チナも敵になるのは、考えていなかったわね」
line = "「……チナも敵になるのは、考えていなかったわね」"

[[dialogue]]
speaker = "レティシア"
# 「人間界から救出する手間は省けたけれど……困ったわ」
line = "「人間界から救出する手間は省けたけれど……困ったわ」"

[[dialogue]]
speaker = "レティシア"
# 「さらに霊力の出力を上げないとこの状況は覆せない──持つかしら、私の体」
line = "「さらに霊力の出力を上げないとこの状況は覆せない──持つかしら、私の体」"

[[dialogue]]
speaker = "アポロ"
# 「なっ──オマエ、まだやる気なのか……！？」
line = "「なっ──オマエ、まだやる気なのか……！？」"

[[dialogue]]
speaker = "レティシア"
# 「ええ。私の仲間は騙されているもの。みんなをアルタイルから救い出して、ルヴィの元へ届けてあげないといけないわ」
line = "「ええ。私の仲間は騙されているもの。みんなをアルタイルから救い出して、ルヴィの元へ届けてあげないといけないわ」"

[[dialogue]]
speaker = "レティシア"
# 「５人みんなでデネブに戻る──そのためなら、死の危険なんて些細なことね」
line = "「５人みんなでデネブに戻る──そのためなら、死の危険なんて些細なことね」"

[[dialogue]]
speaker = "unk"
# レティシアは己の限界をさらに超えて、セレスティアから霊力を引き出し、刀を構えた。
line = "レティシアは己の限界をさらに超えて、セレスティアから霊力を引き出し、刀を構えた。"

[[dialogue]]
speaker = "チナ"
# 「悪いなレティシア！　今はベアトの側につかせてもらう！」
line = "「悪いなレティシア！　今はベアトの側につかせてもらう！」"

[[dialogue]]
speaker = "unk"
# 全身に紫炎をまとったレティシアが、ベアトリスとチナに向かって突進する──！
line = "全身に紫炎をまとったレティシアが、ベアトリスとチナに向かって突進する──！"

[[dialogue]]
speaker = "チナ"
# 「ベアト、合わせるぞ！」
line = "「ベアト、合わせるぞ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「うん！」
line = "「うん！」"

[[dialogue]]
speaker = "unk"
# ベアトリスとチナの星力が重なり、赤い槍にバチバチと稲妻が宿る。
line = "ベアトリスとチナの星力が重なり、赤い槍にバチバチと稲妻が宿る。"

[[dialogue]]
speaker = "レティシア"
# 「はぁぁああああッ──！」
line = "「はぁぁああああッ──！」"

[[dialogue]]
speaker = "チナ"
# 「行けーっ、ベアトーーっ！！」
line = "「行けーっ、ベアトーーっ！！」"

[[dialogue]]
speaker = "ベアトリス"
# 「ブラッディ──インベイション！！」
line = "「ブラッディ──インベイション！！」"

[[dialogue]]
speaker = "レティシア"
# 「──ッ！！」
line = "「──ッ！！」"

[[dialogue]]
speaker = "unk"
# ベアトリスの槍が斬撃を打ち破り、紫炎を吹き飛ばす。
line = "ベアトリスの槍が斬撃を打ち破り、紫炎を吹き飛ばす。"

[[dialogue]]
speaker = "unk"
