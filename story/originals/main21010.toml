line = "そしてレティシアがとうとう限界を迎え、ルヴィネから与えられたセレスティアも砕けた。"

[[dialogue]]
speaker = "アポロ"
# 「おっと！」
line = "「おっと！」"

[[dialogue]]
speaker = "unk"
# 力を失って落下しそうになったレティシアを、アポロが受け止める。
line = "力を失って落下しそうになったレティシアを、アポロが受け止める。"

[[dialogue]]
speaker = "ベアトリス"
# 「ありがとう、アポロちゃん！　レティシアちゃんは……」
line = "「ありがとう、アポロちゃん！　レティシアちゃんは……」"

[[dialogue]]
speaker = "レティシア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "アポロ"
# 「気絶してるだけみたいだな。あんなに暴れたのに頑丈なこった」
line = "「気絶してるだけみたいだな。あんなに暴れたのに頑丈なこった」"

[[dialogue]]
speaker = "ベアトリス"
