[[dialogue]]
speaker = "unk"
# 天気雨の中、俺とウズメはサーシャさんに追いつく。
line = "天気雨の中、俺とウズメはサーシャさんに追いつく。"

[[dialogue]]
speaker = "unk"
# すると、そこにはソフィアとヴィーナスの姿があった――
line = "すると、そこにはソフィアとヴィーナスの姿があった――"

[[dialogue]]
speaker = "ソフィア"
# 「姉さん、私を探しにきたんですか……？」
line = "「姉さん、私を探しにきたんですか……？」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ。今度はちゃんと、気持ちが伝わるように行動しなきゃって思ったから……」
line = "「ええ。今度はちゃんと、気持ちが伝わるように行動しなきゃって思ったから……」"

[[dialogue]]
speaker = "サーシャ"
# 「ねぇ、ソフィ」
line = "「ねぇ、ソフィ」"

[[dialogue]]
speaker = "サーシャ"
# 「今度から私と――交換日記をしてみない？」
line = "「今度から私と――交換日記をしてみない？」"

[[dialogue]]
speaker = "ソフィア"
# 「は……？　えっ？　こ、交換日記、ですか？」
line = "「は……？　えっ？　こ、交換日記、ですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「私はソフィのこと、大切な妹だって思ってるわ」
line = "「私はソフィのこと、大切な妹だって思ってるわ」"

[[dialogue]]
speaker = "サーシャ"
# 「私自身は、その確信があるからこそ、遠く離れていても大丈夫だったし、近くにいても会えた時に話せれば満足だった」
line = "「私自身は、その確信があるからこそ、遠く離れていても大丈夫だったし、近くにいても会えた時に話せれば満足だった」"

[[dialogue]]
speaker = "サーシャ"
# 「だけど、それはあくまで私個人の満足で、ソフィのことをちゃんと深く考えられてはいなかったわ。だから――」
line = "「だけど、それはあくまで私個人の満足で、ソフィのことをちゃんと深く考えられてはいなかったわ。だから――」"

[[dialogue]]
speaker = "サーシャ"
# 「交換日記を通じて、自分の気持ちや考えをもっともっと、ソフィに伝えられたらと思うの」
line = "「交換日記を通じて、自分の気持ちや考えをもっともっと、ソフィに伝えられたらと思うの」"

[[dialogue]]
speaker = "サーシャ"
# 「そして、ソフィの気持ちも……もっともっと、お姉ちゃんに教えてくれたら嬉しいわ」
line = "「そして、ソフィの気持ちも……もっともっと、お姉ちゃんに教えてくれたら嬉しいわ」"

[[dialogue]]
speaker = "ソフィア"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# ソフィアはしばし、目線を落として――
line = "ソフィアはしばし、目線を落として――"

[[dialogue]]
speaker = "ソフィア"
# 「といっても、姉さんは連絡や約束の内容が、ひどく大雑把な人ですから……」
line = "「といっても、姉さんは連絡や約束の内容が、ひどく大雑把な人ですから……」"

[[dialogue]]
speaker = "サーシャ"
# 「うっ……」
line = "「うっ……」"

[[dialogue]]
speaker = "ソフィア"
# 「でも……１度決めたのなら、約束を破らないことも、知っています」
line = "「でも……１度決めたのなら、約束を破らないことも、知っています」"

[[dialogue]]
speaker = "ソフィア"
# 「だから、日記の締め切りや、交換の為に会う時間も、しっかりと決める必要があります」
line = "「だから、日記の締め切りや、交換の為に会う時間も、しっかりと決める必要があります」"

[[dialogue]]
speaker = "unk"
# ソフィアは顔をあげて、サーシャさんの目を見て言った。
line = "ソフィアは顔をあげて、サーシャさんの目を見て言った。"

[[dialogue]]
speaker = "ソフィア"
# 「言い出しっぺなんですから、忘れずにちゃんと書いて下さいね？　姉さん」
line = "「言い出しっぺなんですから、忘れずにちゃんと書いて下さいね？　姉さん」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィ……！」
line = "「ソフィ……！」"

[[dialogue]]
speaker = "サーシャ"
# 「ええ！　約束するわ。ソフィと毎日会えるなんて、お姉ちゃん嬉しいっ」
line = "「ええ！　約束するわ。ソフィと毎日会えるなんて、お姉ちゃん嬉しいっ」"

[[dialogue]]
speaker = "ソフィア"
# 「ね、姉さん……そんな胸を顔に押し付けられたら、息ができないですから……！」
line = "「ね、姉さん……そんな胸を顔に押し付けられたら、息ができないですから……！」"

[[dialogue]]
speaker = "ウズメイア"
# 「と言いつつ、ソフィア、めっちゃ嬉しそうな顔してるし♪」
line = "「と言いつつ、ソフィア、めっちゃ嬉しそうな顔してるし♪」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ふふっ♪　雨降ってジ・エンドというやつね！」
line = "「ふふっ♪　雨降ってジ・エンドというやつね！」"

[[dialogue]]
speaker = "unk"
# ことわざは間違ってるけど、意味はわかる
line = "ことわざは間違ってるけど、意味はわかる"

[[dialogue]]
speaker = "unk"
# 姉妹仲良しな光景を目にして、俺たちも笑い合っていると――
line = "姉妹仲良しな光景を目にして、俺たちも笑い合っていると――"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！　アステラの発見アラートだわ！」
line = "「……！　アステラの発見アラートだわ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「マジ！？　いいところだったのに～！」
line = "「マジ！？　いいところだったのに～！」"

[[dialogue]]
speaker = "ヨミ"
# 『会長、任務管轄係より通達します！　浅草地域にて、新たなアステライトの出現を確認しました！』
line = "『会長、任務管轄係より通達します！　浅草地域にて、新たなアステライトの出現を確認しました！』"

[[dialogue]]
speaker = "ヴィーナス"
# 「ヨミヨミ！」
line = "「ヨミヨミ！」"

[[dialogue]]
speaker = "ヨミ"
# 『現在、会長やお嬢様を含むプリマステラが該当地域に複数確認できますが、対処可能でしょうか？』
line = "『現在、会長やお嬢様を含むプリマステラが該当地域に複数確認できますが、対処可能でしょうか？』"

[[dialogue]]
speaker = "unk"
# 大丈夫だ。すぐに出撃する！
line = "大丈夫だ。すぐに出撃する！"

[[dialogue]]
speaker = "ヨミ"
# 『ありがとうございます。元旦から申し訳ありませんが、よろしくお願いします！』
line = "『ありがとうございます。元旦から申し訳ありませんが、よろしくお願いします！』"

[[dialogue]]
speaker = "ソフィア"
# 「会長さん」
line = "「会長さん」"

[[dialogue]]
speaker = "ソフィア"
# 「私も手伝います。早く片づけて、初詣を再開しましょう」
line = "「私も手伝います。早く片づけて、初詣を再開しましょう」"

[[dialogue]]
speaker = "ウズメイア"
# 「おっ、ソフィア。いい顔つきになったじゃん♪」
line = "「おっ、ソフィア。いい顔つきになったじゃん♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ええ、おかげさまで」
line = "「ええ、おかげさまで」"

[[dialogue]]
speaker = "ウズメイア"
# 「なら――心機一転、大掃除と行っちゃうし！」
line = "「なら――心機一転、大掃除と行っちゃうし！」"

[[dialogue]]
speaker = "サーシャ"
# 「もちろん、姉妹一緒にね♪」
line = "「もちろん、姉妹一緒にね♪」"

[[dialogue]]
speaker = "ソフィア"
# 「はい、姉さん――」
line = "「はい、姉さん――」"

[[dialogue]]
speaker = "ソフィア"
# 「やりましょう！」
line = "「やりましょう！」"

[[dialogue]]
speaker = "unk"
# と、その時だった。
line = "と、その時だった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ソフィア、なんかあなたの晴れ着が光ってるわよ！」
line = "「ソフィア、なんかあなたの晴れ着が光ってるわよ！」"

[[dialogue]]
speaker = "ソフィア"
# 「え、これは……？」
line = "「え、これは……？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私たちの晴れ着も、ソフィアに合わせて、光り始めたわ！」
line = "「私たちの晴れ着も、ソフィアに合わせて、光り始めたわ！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「それになんだか、お寺の神聖な気が集まってきているような――」
line = "「それになんだか、お寺の神聖な気が集まってきているような――」"

[[dialogue]]
speaker = "ソフィア"
# 「はい。このホットな感じ、今なら……！」
line = "「はい。このホットな感じ、今なら……！」"

[[dialogue]]
speaker = "ソフィア"
# 「変身！」
line = "「変身！」"

[[dialogue]]
speaker = "unk"
# 掛け声と共に、空まで届く光の柱が立ち昇って――
line = "掛け声と共に、空まで届く光の柱が立ち昇って――"

[[dialogue]]
speaker = "unk"
# 輝きが収まった後には、天気雨も止み、晴れ間がさしていた。
line = "輝きが収まった後には、天気雨も止み、晴れ間がさしていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「やったわ！　星力が溢れてくるのを感じる……晴れ着フォーム、起動成功よ！」
line = "「やったわ！　星力が溢れてくるのを感じる……晴れ着フォーム、起動成功よ！」"

[[dialogue]]
speaker = "ウズメイア"
# 「すっご～い！　空の雨雲まで薙ぎ払っちゃったし！　これぞまさに、雨のち晴れって感じ♪」
line = "「すっご～い！　空の雨雲まで薙ぎ払っちゃったし！　これぞまさに、雨のち晴れって感じ♪」"

[[dialogue]]
speaker = "サーシャ"
# 「ソフィの強い気持ちに、きっと晴れ着フォームが応えてくれたのね」
line = "「ソフィの強い気持ちに、きっと晴れ着フォームが応えてくれたのね」"

[[dialogue]]
speaker = "ウズメイア"
# 「よっ、今日１番の晴れ女♪」
line = "「よっ、今日１番の晴れ女♪」"

[[dialogue]]
speaker = "ソフィア"
# 「なんなんですか、その煽りは……」
line = "「なんなんですか、その煽りは……」"

[[dialogue]]
speaker = "ソフィア"
# 「ですが今なら、どんなアステライトでも、攻略できそうな気がします」
line = "「ですが今なら、どんなアステライトでも、攻略できそうな気がします」"

[[dialogue]]
speaker = "unk"
# よし、みんな行くぞ！
line = "よし、みんな行くぞ！"

[[dialogue]]
speaker = "ソフィア"
# 「はい、会長さん！」
line = "「はい、会長さん！」"

[[dialogue]]
speaker = "ウズメイア"
# 「晴れ晴れしく、薙ぎ払っちゃうし！」
line = "「晴れ晴れしく、薙ぎ払っちゃうし！」"

[[dialogue]]
speaker = "unk"
# 新たな晴れ着フォームの力を得て、俺たちはアステライト攻略へと乗り出すのだった――
line = "新たな晴れ着フォームの力を得て、俺たちはアステライト攻略へと乗り出すのだった――"
