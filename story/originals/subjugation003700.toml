[[dialogue]]
speaker = "unk"
# 第０話,１，０００，０００,B
line = "第０話,１，０００，０００,B"

[[dialogue]]
speaker = "unk"
# 平行世界デネブの地で行われた『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』との決戦は、緋宮クロト率いる星騎士たちの勝利に終わった。
line = "平行世界デネブの地で行われた『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』との決戦は、緋宮クロト率いる星騎士たちの勝利に終わった。"

[[dialogue]]
speaker = "unk"
# しかし──創造神との決着は未だついていない。束の間の安息に胸を撫でおろす猶予は、緋宮クロトたちにはなかった。
line = "しかし──創造神との決着は未だついていない。束の間の安息に胸を撫でおろす猶予は、緋宮クロトたちにはなかった。"

[[dialogue]]
speaker = "unk"
# 創造神との雌雄を決する戦い。
line = "創造神との雌雄を決する戦い。"

[[dialogue]]
speaker = "unk"
# その火蓋は、終焉世界ベガにて幕を開ける──
line = "その火蓋は、終焉世界ベガにて幕を開ける──"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「不届き者。次元を渡りやってきた」
line = "「不届き者。次元を渡りやってきた」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「お父様の傷。回復の邪魔、させない──」
line = "「お父様の傷。回復の邪魔、させない──」"

[[dialogue]]
speaker = "セイファート"
# 「おぉぉぉおぉおっ──！！」
line = "「おぉぉぉおぉおっ──！！」"

[[dialogue]]
speaker = "パテル"
# 「おお、さすがあたしたち守護天使を封印しただけはあるね。それやったのアルタイルの方だけど」
line = "「おお、さすがあたしたち守護天使を封印しただけはあるね。それやったのアルタイルの方だけど」"

[[dialogue]]
speaker = "セイファート"
# 「お喋りをしている暇はないぞ、守護天使よ！」
line = "「お喋りをしている暇はないぞ、守護天使よ！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「代わり。いくらでもいる──」
line = "「代わり。いくらでもいる──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「悪しき星の騎士。お父様を守る──」
line = "「悪しき星の騎士。お父様を守る──」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「キリがありませんね……どれだけ焼き払っても、次から次へと湧き出てきます──！」
line = "「キリがありませんね……どれだけ焼き払っても、次から次へと湧き出てきます──！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「いくら先遣隊とはいえ、この軍勢はシャレになってないわよ！？　間違いなく一番の激戦区じゃない……！」
line = "「いくら先遣隊とはいえ、この軍勢はシャレになってないわよ！？　間違いなく一番の激戦区じゃない……！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「もしかして私の不運のせい！？　だったらごめんなさい……！」
line = "「もしかして私の不運のせい！？　だったらごめんなさい……！」"

[[dialogue]]
speaker = "リィベル"
# 「謝る必要はないわ。むしろ幸運よ。リクリエへの恨みを存分に晴らすことができるのだから」
line = "「謝る必要はないわ。むしろ幸運よ。リクリエへの恨みを存分に晴らすことができるのだから」"

[[dialogue]]
speaker = "リィベル"
# 「端から全て消し飛ばすわ。６６６番書架、開錠──ネイムレス・グリモワール！」
line = "「端から全て消し飛ばすわ。６６６番書架、開錠──ネイムレス・グリモワール！」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「お姉様たちの戦いの邪魔をさせるわけにはいきません！　せつなさん、援護をお願いします！」
line = "「お姉様たちの戦いの邪魔をさせるわけにはいきません！　せつなさん、援護をお願いします！」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「お任せでござる！　甲賀流忍者せつな──今日は忍ばず奮戦するでござるっ！！」
line = "「お任せでござる！　甲賀流忍者せつな──今日は忍ばず奮戦するでござるっ！！」"

[[dialogue]]
speaker = "unk"
# 流星の騎士セイファートが指揮する星騎士たちの猛攻に、次々になぎ倒されていくホロウ・ルヴィネのシャドウ。
line = "流星の騎士セイファートが指揮する星騎士たちの猛攻に、次々になぎ倒されていくホロウ・ルヴィネのシャドウ。"

[[dialogue]]
speaker = "unk"
# しかし空いた穴はすぐに埋められる──
line = "しかし空いた穴はすぐに埋められる──"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「無駄。無駄。無駄──ベガの地球が残っている限り。お父様から無限の霊力が届く──」
line = "「無駄。無駄。無駄──ベガの地球が残っている限り。お父様から無限の霊力が届く──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「『在庫』は尽きない。抵抗を続ける限り、１００万の大群で迎え撃つ」
line = "「『在庫』は尽きない。抵抗を続ける限り、１００万の大群で迎え撃つ」"

[[dialogue]]
speaker = "リィベル"
# 「いくらでも来なさい。リクリエに滅ぼされた者の怨念も、尽きることはないわ！」
line = "「いくらでも来なさい。リクリエに滅ぼされた者の怨念も、尽きることはないわ！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「停止、無抵抗を推奨。抵抗は合理的な行いとは程遠い──」
line = "「停止、無抵抗を推奨。抵抗は合理的な行いとは程遠い──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「どんな計画も無駄。リクリエを受け入れるべき──」
line = "「どんな計画も無駄。リクリエを受け入れるべき──」"

[[dialogue]]
speaker = "せつな（覚醒）"
# 「そうは問屋がおろさないでござる！　主様の命ゆえに！」
line = "「そうは問屋がおろさないでござる！　主様の命ゆえに！」"

[[dialogue]]
speaker = "フェニエル（覚醒）"
# 「お姉様たちと約束をしました！　必ず、勝って再会するって……約束を違えるわけにはいきませんっ！」
line = "「お姉様たちと約束をしました！　必ず、勝って再会するって……約束を違えるわけにはいきませんっ！」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「提案。魔王・緋宮クロトが天寿を全うするまで、リクリエを停止──」
line = "「提案。魔王・緋宮クロトが天寿を全うするまで、リクリエを停止──」"

[[dialogue]]
speaker = "ホロウ・ルヴィネ"
# 「あなたたちの親、友人が死ぬまでは──今のアルタイルを保存。お父様の慈悲」
line = "「あなたたちの親、友人が死ぬまでは──今のアルタイルを保存。お父様の慈悲」"

[[dialogue]]
speaker = "モネ（覚醒）"
# 「そんなこと……聞けません！　いずれ再創生の本波が来ることは確実じゃないですか！」
line = "「そんなこと……聞けません！　いずれ再創生の本波が来ることは確実じゃないですか！」"

[[dialogue]]
speaker = "パテル"
# 「おやおや、往生際が悪いんじゃない、創造神様？　あなたが淘汰される番が来たってことだよ」
line = "「おやおや、往生際が悪いんじゃない、創造神様？　あなたが淘汰される番が来たってことだよ」"

[[dialogue]]
speaker = "パテル"
# 「テルルが消えた以上、『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』が生き残れば、あたしたち守護天使も粛清だしね」
line = "「テルルが消えた以上、『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』が生き残れば、あたしたち守護天使も粛清だしね」"

[[dialogue]]
speaker = "パテル"
# 「生き残るのはあたしたちか、それとも創造神か……さぁ、試練の時だ！」
line = "「生き残るのはあたしたちか、それとも創造神か……さぁ、試練の時だ！」"

[[dialogue]]
speaker = "ウィステリア（覚醒）"
# 「『<ruby=ゼロス>ＸＥＬＯＳ</ruby>』に伝えなさい！　世界のためにも、後輩たちの未来のためにも……私たちが抵抗をやめることはあり得ないわ！」
line = "「『<ruby>ＸＥＬＯＳ<rt>ゼロス</rt></ruby>』に伝えなさい！　世界のためにも、後輩たちの未来のためにも……私たちが抵抗をやめることはあり得ないわ！」"

[[dialogue]]
speaker = "セイファート"
# 「その通りだ、悪神の遣いよ。勝つか負けるか……滅ぼすか、滅びるか！　我らの決着はそれ以外にない！！」
line = "「その通りだ、悪神の遣いよ。勝つか負けるか……滅ぼすか、滅びるか！　我らの決着はそれ以外にない！！」"

[[dialogue]]
speaker = "セイファート"
# 「総員──我々の役目は、５人の『<b>星喰らい</b>』たちの元へ、この大群を応援に向かわせぬこと！！」
line = "「総員──我々の役目は、５人の『<b>星喰らい</b>』たちの元へ、この大群を応援に向かわせぬこと！！」"

[[dialogue]]
speaker = "セイファート"
# 「死力を尽くし──奮え！！！」
line = "「死力を尽くし──奮え！！！」"
