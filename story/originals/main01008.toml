speaker = "トリシャ"
# 「占星術はあくまでも運命を視る術……ダウジングではありません……」
line = "「占星術はあくまでも運命を視る術……ダウジングではありません……」"

[[dialogue]]
speaker = "unk"
# 視えたのはそれだけで、より詳しい答えには行き着けないとのことだった。
line = "視えたのはそれだけで、より詳しい答えには行き着けないとのことだった。"

[[dialogue]]
speaker = "クロト"
# （それもそうか……いきなりポンと正解が出てくるはずもない）
line = "（それもそうか……いきなりポンと正解が出てくるはずもない）"

[[dialogue]]
speaker = "フィオナ"
# （そうですね。あくまで貴重な意見として、参考に留めるべきでしょう）
line = "（そうですね。あくまで貴重な意見として、参考に留めるべきでしょう）"

[[dialogue]]
speaker = "unk"
# 俺たちが目を見合わせる──と、トリシャさんは付け加えて言った。
line = "俺たちが目を見合わせる──と、トリシャさんは付け加えて言った。"

[[dialogue]]
speaker = "トリシャ"
# 「ふむ……さらなる運命の断片を求めますか」
line = "「ふむ……さらなる運命の断片を求めますか」"

[[dialogue]]
speaker = "トリシャ"
# 「では……振り子にも聞いてみましょうか」
line = "「では……振り子にも聞いてみましょうか」"

[[dialogue]]
speaker = "unk"
# トリシャさんはホロスコープを置いて再び夜空を見上げる。
line = "トリシャさんはホロスコープを置いて再び夜空を見上げる。"

[[dialogue]]
speaker = "unk"
# すると──首元に飾られていた彼女のペンデュラムに、星々の瞬く光が宿り始めた！
line = "すると──首元に飾られていた彼女のペンデュラムに、星々の瞬く光が宿り始めた！"

[[dialogue]]
speaker = "フィオナ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "クロト"
# 「！　待ってください──あなたは星騎士なんですか？」
line = "「！　待ってください──あなたは星騎士なんですか？」"

[[dialogue]]
speaker = "トリシャ"
# 「……？　せいきし……？」
line = "「……？　せいきし……？」"

[[dialogue]]
speaker = "クロト"
# 「スターナイト、とか……」
line = "「スターナイト、とか……」"

[[dialogue]]
speaker = "トリシャ"
# 「すたあないと……？」
line = "「すたあないと……？」"

[[dialogue]]
speaker = "unk"
# まったく通じていなかった。
line = "まったく通じていなかった。"

[[dialogue]]
speaker = "unk"
# だが、今しがた見せた輝きはまさしく星術の光そのもの──
line = "だが、今しがた見せた輝きはまさしく星術の光そのもの──"

[[dialogue]]
speaker = "トリシャ"
# 「ああ……<ruby=アルコル>おおぐま座８０番星</ruby>との交信のこと？　確かにあなた達も、それぞれ星と繋がっているようですね……」
line = "「ああ……<ruby>おおぐま座８０番星<rt>アルコル</rt></ruby>との交信のこと？　確かにあなた達も、それぞれ星と繋がっているようですね……」"

[[dialogue]]
speaker = "クロト"
# 「わかるのか──」
line = "「わかるのか──」"

[[dialogue]]
speaker = "トリシャ"
# 「地球に、太陽。実に興味深い……師匠と私以外で、ここまで星との結びつきが強い人は初めて」
line = "「地球に、太陽。実に興味深い……師匠と私以外で、ここまで星との結びつきが強い人は初めて」"

[[dialogue]]
speaker = "フィオナ"
# 「そこまで……」
line = "「そこまで……」"

[[dialogue]]
speaker = "unk"
# トリシャさんは変身状態にない俺たちと相対しただけで、各々の守護星を見抜いてきた。
line = "トリシャさんは変身状態にない俺たちと相対しただけで、各々の守護星を見抜いてきた。"

[[dialogue]]
speaker = "unk"
# こんな観察眼を持った相手は学園でも見たことがない。
line = "こんな観察眼を持った相手は学園でも見たことがない。"

[[dialogue]]
speaker = "トリシャ"
# 「昔から星をずっと見てきましたから……。占星術師にとって、星との対話は命……フフフ」
line = "「昔から星をずっと見てきましたから……。占星術師にとって、星との対話は命……フフフ」"

[[dialogue]]
speaker = "フィオナ"
# （さらに守護星とのリンク──もしかして、彼女は……）
line = "（さらに守護星とのリンク──もしかして、彼女は……）"

[[dialogue]]
speaker = "クロト"
# （ああ……どうやら俺たちとは違う系統の技術で星力を知覚しているみたいだ）
line = "（ああ……どうやら俺たちとは違う系統の技術で星力を知覚しているみたいだ）"

[[dialogue]]
speaker = "unk"
# 驚くべきことに──彼女は星騎士の存在も知らずして、星力を完全に会得していた。
line = "驚くべきことに──彼女は星騎士の存在も知らずして、星力を完全に会得していた。"

[[dialogue]]
speaker = "トリシャ"
# 「その、スターナイトというのは、何なのでしょう……？」
line = "「その、スターナイトというのは、何なのでしょう……？」"

[[dialogue]]
speaker = "フィオナ"
# 「リクリエ──いずれ訪れる破滅から世界を救うため、流星市国で組織された部隊のことです」
line = "「リクリエ──いずれ訪れる破滅から世界を救うため、流星市国で組織された部隊のことです」"

[[dialogue]]
speaker = "トリシャ"
# 「世界の破滅……ふむ。それはもしかすると……『大禍』のことでしょうか？」
line = "「世界の破滅……ふむ。それはもしかすると……『大禍』のことでしょうか？」"

[[dialogue]]
speaker = "クロト"
# 「大禍……？」
line = "「大禍……？」"

[[dialogue]]
speaker = "トリシャ"
# 「はい。刻一刻と、このアルタイルに迫りきている滅亡……いえ。<b>再生</b>の時」
line = "「はい。刻一刻と、このアルタイルに迫りきている滅亡……いえ。<b>再生</b>の時」"

[[dialogue]]
speaker = "フィオナ"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "トリシャ"
# 「我が師メラムもその訪れを警告していました……森羅万象が漂白され、無に帰すという世界の<ruby=ことわり>理</ruby>……」
line = "「我が師メラムもその訪れを警告していました……森羅万象が漂白され、無に帰すという世界の<ruby>理<rt>ことわり</rt></ruby>……」"

[[dialogue]]
speaker = "フィオナ"
# （リクリエの本質まで──もしや、自力で読み解いたというのですか）
line = "（リクリエの本質まで──もしや、自力で読み解いたというのですか）"

[[dialogue]]
speaker = "クロト"
# （さすがは占星術師……なのか？　というよりも、もしかしてこれは──）
line = "（さすがは占星術師……なのか？　というよりも、もしかしてこれは──）"

[[dialogue]]
speaker = "unk"
# レゾフで重宝されている占星術とは、流星市国で研究されている星術と根源を同じくするものなのかもしれない。
line = "レゾフで重宝されている占星術とは、流星市国で研究されている星術と根源を同じくするものなのかもしれない。"

[[dialogue]]
speaker = "unk"
# 『星騎士』という呼称や区分も、あくまで流星市国が名付けたものだ。広い魔界に、星騎士とは異なる流派の星術使いがいてもおかしくはない。
line = "『星騎士』という呼称や区分も、あくまで流星市国が名付けたものだ。広い魔界に、星騎士とは異なる流派の星術使いがいてもおかしくはない。"

[[dialogue]]
speaker = "unk"
# そして、もしそうだとするならば、依頼する「占い方」は変わってくる。
line = "そして、もしそうだとするならば、依頼する「占い方」は変わってくる。"

[[dialogue]]
speaker = "クロト"
# 「俺たちが探しているのも──同じ星力を宿した女の子なんです。それならどうですか？」
line = "「俺たちが探しているのも──同じ星力を宿した女の子なんです。それならどうですか？」"

[[dialogue]]
speaker = "フィオナ"
# 「彼女の守護星は<ruby=ヴィーナス>金星</ruby>──生きている限り、繋がりは切れていないはずです」
line = "「彼女の守護星は<ruby>金星<rt>ヴィーナス</rt></ruby>──生きている限り、繋がりは切れていないはずです」"

[[dialogue]]
speaker = "トリシャ"
# 「フフ……それなら、金星の反応を探ればよいだけです。それならそうと……最初から言ってくれればいい……」
line = "「フフ……それなら、金星の反応を探ればよいだけです。それならそうと……最初から言ってくれればいい……」"

[[dialogue]]
speaker = "クロト"
# 「できるんですか……！？」
line = "「できるんですか……！？」"

[[dialogue]]
speaker = "トリシャ"
# 「魔界の空は繋がっている──たとえどんな場所にいようと、このホロスコープに視えぬものなし」
line = "「魔界の空は繋がっている──たとえどんな場所にいようと、このホロスコープに視えぬものなし」"

[[dialogue]]
speaker = "トリシャ"
# 「それに……フフ。私たちもまた、友達の輪で繋がっています。星々のように……」
line = "「それに……フフ。私たちもまた、友達の輪で繋がっています。星々のように……」"

[[dialogue]]
speaker = "unk"
# 絶大な自信だった。
line = "絶大な自信だった。"

[[dialogue]]
speaker = "unk"
# アニマ先輩のアンテナでも届かなかったヴィーナスの反応を、必ず拾えると豪語するトリシャさん。
line = "アニマ先輩のアンテナでも届かなかったヴィーナスの反応を、必ず拾えると豪語するトリシャさん。"

[[dialogue]]
speaker = "unk"
# そうして輝くペンデュラムの光は、やがて一点に収束していき……
line = "そうして輝くペンデュラムの光は、やがて一点に収束していき……"

[[dialogue]]
speaker = "トリシャ"
# 「……視えました」
line = "「……視えました」"

[[dialogue]]
speaker = "クロト"
# 「一体、何が──」
line = "「一体、何が──」"

[[dialogue]]
speaker = "トリシャ"
# 「『森』ですね」
line = "「『森』ですね」"

[[dialogue]]
speaker = "クロト＆フィオナ"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "unk"
# 素直に驚いた。
line = "素直に驚いた。"

[[dialogue]]
speaker = "unk"
# ヴィーナスのメッセージについてはまだ伝えていない──トリシャさんは一発で、その情報を暴いてみせた。
line = "ヴィーナスのメッセージについてはまだ伝えていない──トリシャさんは一発で、その情報を暴いてみせた。"

[[dialogue]]
speaker = "unk"
# さらに……
line = "さらに……"

[[dialogue]]
speaker = "クロト"
# 「──それがどこの森か、とか……」
line = "「──それがどこの森か、とか……」"

[[dialogue]]
speaker = "トリシャ"
# 「ええ……視えました」
line = "「ええ……視えました」"

[[dialogue]]
speaker = "トリシャ"
# 「ただ……あまりいい結果ではありません」
line = "「ただ……あまりいい結果ではありません」"

[[dialogue]]
speaker = "クロト"
# 「何……？」
line = "「何……？」"

[[dialogue]]
speaker = "unk"
# そうしてトリシャさんは、ヴィーナスの現在地点を、告げる──
line = "そうしてトリシャさんは、ヴィーナスの現在地点を、告げる──"

[[dialogue]]
speaker = "トリシャ"
# 「冥森林ネメシス──ズヴィエダ地方でも指折りの、最低で最悪の場所です」
line = "「冥森林ネメシス──ズヴィエダ地方でも指折りの、最低で最悪の場所です」"
