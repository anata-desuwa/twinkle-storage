[[dialogue]]
speaker = "unk"
# カフェテリアのゴーレム騒動があってから、数日が経った。
line = "カフェテリアのゴーレム騒動があってから、数日が経った。"

[[dialogue]]
speaker = "unk"
# 俺は放課後、学園内を探し回って、ようやく見つけた彼女に、声をかける。
line = "俺は放課後、学園内を探し回って、ようやく見つけた彼女に、声をかける。"

[[dialogue]]
speaker = "unk"
# せつな、見つけた！
line = "せつな、見つけた！"

[[dialogue]]
speaker = "せつな"
# 「え？　主様……？　どうしたのでござるか？」
line = "「え？　主様……？　どうしたのでござるか？」"

[[dialogue]]
speaker = "せつな"
# 「――ここ数日、せつなの元気がなさそうに見えたから気になった？」
line = "「――ここ数日、せつなの元気がなさそうに見えたから気になった？」"

[[dialogue]]
speaker = "せつな"
# 「主様……ありがとうございまする。ご心配をおかけして、申し訳ございませぬ」
line = "「主様……ありがとうございまする。ご心配をおかけして、申し訳ございませぬ」"

[[dialogue]]
speaker = "せつな"
# 「――何があったのか、でござるか？　それは……その……」
line = "「――何があったのか、でござるか？　それは……その……」"

[[dialogue]]
speaker = "unk"
# 言いづらいこと？
line = "言いづらいこと？"

[[dialogue]]
speaker = "せつな"
# 「う、後ろめたいことがあるわけではないのでござる！　そこだけはせつな、主様に誓えまする！」
line = "「う、後ろめたいことがあるわけではないのでござる！　そこだけはせつな、主様に誓えまする！」"

[[dialogue]]
speaker = "unk"
# だったらこうしよう、と俺は彼女にある提案をする。
line = "だったらこうしよう、と俺は彼女にある提案をする。"

[[dialogue]]
speaker = "せつな"
# 「――気晴らしに、これから街へ遊びに……でござるか？」
line = "「――気晴らしに、これから街へ遊びに……でござるか？」"

[[dialogue]]
speaker = "unk"
# 俺はどうするか迷っているせつなの手を取って、学園の外に連れ出した。
line = "俺はどうするか迷っているせつなの手を取って、学園の外に連れ出した。"

[[dialogue]]
speaker = "せつな"
# （主様の命のまま、来てしまったでござるが……。正直、今はあまり、遊びを楽しめる心持ちでは……）
line = "（主様の命のまま、来てしまったでござるが……。正直、今はあまり、遊びを楽しめる心持ちでは……）"

[[dialogue]]
speaker = "せつな"
# 「――え？　ゲームセンターに行くのでござるか？」
line = "「――え？　ゲームセンターに行くのでござるか？」"

[[dialogue]]
speaker = "せつな"
# 「あっ、お待ち下さいませ、主様！」
line = "「あっ、お待ち下さいませ、主様！」"

[[dialogue]]
speaker = "unk"
# 俺はせつなをゲームセンターに引っ張って行き、２人プレイのガンシューティングゲームに付き合ってもらう。
line = "俺はせつなをゲームセンターに引っ張って行き、２人プレイのガンシューティングゲームに付き合ってもらう。"

[[dialogue]]
speaker = "せつな"
# 「ぞ、ゾンビを銃で撃つゲームでござるか！？　って、もういきなりスタート！？」
line = "「ぞ、ゾンビを銃で撃つゲームでござるか！？　って、もういきなりスタート！？」"

[[dialogue]]
speaker = "せつな"
# 「主様！　せつな、このゲームはやったことがなくて、細かい操作が分からなくて……！」
line = "「主様！　せつな、このゲームはやったことがなくて、細かい操作が分からなくて……！」"

[[dialogue]]
speaker = "せつな"
# 「わわっ、ゾンビが近づいてきてるでござる！　と、とりあえず撃つでござる！」
line = "「わわっ、ゾンビが近づいてきてるでござる！　と、とりあえず撃つでござる！」"

[[dialogue]]
speaker = "せつな"
# 「あっ、弾切れでござる！　リロードはどうしたら……！？」
line = "「あっ、弾切れでござる！　リロードはどうしたら……！？」"

[[dialogue]]
speaker = "せつな"
# 「あわわ、ゾンビにやられてしまうでござる！」
line = "「あわわ、ゾンビにやられてしまうでござる！」"

[[dialogue]]
speaker = "unk"
# 大丈夫だ、任せろ！
line = "大丈夫だ、任せろ！"

[[dialogue]]
speaker = "せつな"
# 「おぉっ！　主様、すごいでござる！　全てのゾンビをヘッドショットで、あっという間に倒してしまったでござる……！」
line = "「おぉっ！　主様、すごいでござる！　全てのゾンビをヘッドショットで、あっという間に倒してしまったでござる……！」"

[[dialogue]]
speaker = "せつな"
# 「あっ、今度は大きなゾンビが出現して……！　これがステージのボスでござるか！？　リロードの方法はなるほど……主様、教えてくれてありがとうございまする！」
line = "「あっ、今度は大きなゾンビが出現して……！　これがステージのボスでござるか！？　リロードの方法はなるほど……主様、教えてくれてありがとうございまする！」"

[[dialogue]]
speaker = "せつな"
# 「――ボスは耐久力が高くて、主様お１人では厳しい？　せつなの協力が必要……！」
line = "「――ボスは耐久力が高くて、主様お１人では厳しい？　せつなの協力が必要……！」"

[[dialogue]]
speaker = "せつな"
# 「はい！　お任せ下さいませ！　せつな、忍びとして主様を全力でお守り致しまする！」
line = "「はい！　お任せ下さいませ！　せつな、忍びとして主様を全力でお守り致しまする！」"

[[dialogue]]
speaker = "せつな"
# 「参りまする！　えいっ！　とやぁっ！　そこでござる！」
line = "「参りまする！　えいっ！　とやぁっ！　そこでござる！」"

[[dialogue]]
speaker = "せつな"
# 「よしっ！　ボスの弱点に当たって――倒しましたでござる！　これでステージクリアでござる～～～っ♪」
line = "「よしっ！　ボスの弱点に当たって――倒しましたでござる！　これでステージクリアでござる～～～っ♪」"

[[dialogue]]
speaker = "unk"
# ナイスだ、せつな！
line = "ナイスだ、せつな！"

[[dialogue]]
speaker = "せつな"
# 「えへへぇ～♪　せつなと主様の、主従の絆による勝利でござる♪」
line = "「えへへぇ～♪　せつなと主様の、主従の絆による勝利でござる♪」"

[[dialogue]]
speaker = "せつな"
# 「主様、クレーンゲームで景品を取って下さって、ありがとうございまする！」
line = "「主様、クレーンゲームで景品を取って下さって、ありがとうございまする！」"

[[dialogue]]
speaker = "せつな"
# 「忍者ネコのぬいぐるみ、せつな、家宝としてずっと大切に致しまする♪」
line = "「忍者ネコのぬいぐるみ、せつな、家宝としてずっと大切に致しまする♪」"

[[dialogue]]
speaker = "せつな"
# 「えへへぇ……♪」
line = "「えへへぇ……♪」"

[[dialogue]]
speaker = "unk"
# よかった。元気が出たみたいだな
line = "よかった。元気が出たみたいだな"

[[dialogue]]
speaker = "せつな"
# 「あ……！　気づいたら、主様と遊ぶのが楽しくて、忘れてしまっていたでござる……！」
line = "「あ……！　気づいたら、主様と遊ぶのが楽しくて、忘れてしまっていたでござる……！」"

[[dialogue]]
speaker = "せつな"
# 「というか、放課後とはいえ、せつなにこんなにも長い時間付き合って下さって、大丈夫だったのでござるか……？」
line = "「というか、放課後とはいえ、せつなにこんなにも長い時間付き合って下さって、大丈夫だったのでござるか……？」"

[[dialogue]]
speaker = "せつな"
# 「主様は、星徒会のお仕事とかあったのでは……？」
line = "「主様は、星徒会のお仕事とかあったのでは……？」"

[[dialogue]]
speaker = "せつな"
# 「え？　――昨日のうちに、今日の分を終わらせておいたから大丈夫、でござるか？」
line = "「え？　――昨日のうちに、今日の分を終わらせておいたから大丈夫、でござるか？」"

[[dialogue]]
speaker = "せつな"
# 「それってまさか……せつなの為に、わざわざ……？」
line = "「それってまさか……せつなの為に、わざわざ……？」"

[[dialogue]]
speaker = "unk"
# 俺は一応、せつなの『主様候補』だからな
line = "俺は一応、せつなの『主様候補』だからな"

[[dialogue]]
speaker = "せつな"
# 「主様……！」
line = "「主様……！」"

[[dialogue]]
speaker = "せつな"
# 「えへへ♪　主様……ありがとうございまする♪」
line = "「えへへ♪　主様……ありがとうございまする♪」"

[[dialogue]]
speaker = "蘭美"
# （心配して、こっそり付いて来ちゃったけど……）
line = "（心配して、こっそり付いて来ちゃったけど……）"

[[dialogue]]
speaker = "蘭美"
# （会長のおかげで、せつなはどうやら大丈夫そうね）
line = "（会長のおかげで、せつなはどうやら大丈夫そうね）"

[[dialogue]]
speaker = "unk"
# 影から様子を伺いながら、蘭美はふっと柔らかい笑みを浮かべるのだった――
line = "影から様子を伺いながら、蘭美はふっと柔らかい笑みを浮かべるのだった――"

[[dialogue]]
speaker = "unk"
# その翌日――
line = "その翌日――"

[[dialogue]]
speaker = "せつな"
# 「蘭美殿！　先日は修業を見て頂いたにも関わらず、泣き言を口にして、大変申し訳ございませぬ！」
line = "「蘭美殿！　先日は修業を見て頂いたにも関わらず、泣き言を口にして、大変申し訳ございませぬ！」"

[[dialogue]]
speaker = "蘭美"
# 「その格好で来たということは、チョコ作りを再開する気になったのかしら？」
line = "「その格好で来たということは、チョコ作りを再開する気になったのかしら？」"

[[dialogue]]
speaker = "せつな"
# 「はい！　せつなは何度失敗したとしても、やっぱり――」
line = "「はい！　せつなは何度失敗したとしても、やっぱり――」"

[[dialogue]]
speaker = "せつな"
# 「心からの愛を込めた『主様チョコ』を作って、バレンタインにお渡ししたいでござる！」
line = "「心からの愛を込めた『主様チョコ』を作って、バレンタインにお渡ししたいでござる！」"

[[dialogue]]
speaker = "蘭美"
# 「いい心意気ね。それでこそ、私の率いる九浄家メイド隊の一員よ！」
line = "「いい心意気ね。それでこそ、私の率いる九浄家メイド隊の一員よ！」"

[[dialogue]]
speaker = "蘭美"
# 「なら、私も貴方の本気に応えて、全力で指導してあげるわ！」
line = "「なら、私も貴方の本気に応えて、全力で指導してあげるわ！」"

[[dialogue]]
speaker = "せつな"
# 「はい！　改めて、よろしくお願い致しまする！」
line = "「はい！　改めて、よろしくお願い致しまする！」"

[[dialogue]]
speaker = "せつな"
# 「せつな、失敗を無駄にせずに、必ずやチョコを作り上げてみせまする！」
line = "「せつな、失敗を無駄にせずに、必ずやチョコを作り上げてみせまする！」"

[[dialogue]]
speaker = "蘭美"
# 「失敗を無駄にせず……ね」
line = "「失敗を無駄にせず……ね」"

[[dialogue]]
speaker = "蘭美"
# 「ねぇ、せつな。実は私、ちょっと思いついたことがあるの」
line = "「ねぇ、せつな。実は私、ちょっと思いついたことがあるの」"

[[dialogue]]
speaker = "蘭美"
# 「試すのは結構大変かもしれないけど、手伝ってくれるかしら？」
line = "「試すのは結構大変かもしれないけど、手伝ってくれるかしら？」"

[[dialogue]]
speaker = "せつな"
# 「もちろんでござる！　メイド長の命とあらば、お供致しまする！」
line = "「もちろんでござる！　メイド長の命とあらば、お供致しまする！」"

[[dialogue]]
speaker = "unk"
# せつなは力強く、頷いてみせるのだった――
line = "せつなは力強く、頷いてみせるのだった――"
