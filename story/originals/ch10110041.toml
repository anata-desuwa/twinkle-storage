[[dialogue]]
speaker = "unk"
# 第１話,二刀流の友,P
line = "第１話,二刀流の友,P"

[[dialogue]]
speaker = "unk"
# 巫女修行の後、<ruby=ふじゅつ>巫術</ruby>が使えるようになったマトイ。
line = "巫女修行の後、<ruby>巫術<rt>ふじゅつ</rt></ruby>が使えるようになったマトイ。"

[[dialogue]]
speaker = "unk"
# 彼女は二刀流の訓練がしたいと思い、ある星騎士に声をかけていた――
line = "彼女は二刀流の訓練がしたいと思い、ある星騎士に声をかけていた――"

[[dialogue]]
speaker = "マトイ"
# 「セナリィさん、今日は来てくれてありがとう！」
line = "「セナリィさん、今日は来てくれてありがとう！」"

[[dialogue]]
speaker = "セナリィ"
# 「いえいえ。お世話になっている新星星徒会からのご指名ですから、喜んで引き受けさせて頂きますわ♪」
line = "「いえいえ。お世話になっている新星星徒会からのご指名ですから、喜んで引き受けさせて頂きますわ♪」"

[[dialogue]]
speaker = "セナリィ"
# （少々面倒な頼みごとではありますけれど、社長としてお得様の接待も大事にしないといけませんわ！）
line = "（少々面倒な頼みごとではありますけれど、社長としてお得様の接待も大事にしないといけませんわ！）"

[[dialogue]]
speaker = "セナリィ"
# 「それでマトイ様、二刀流の指南をご希望ということでお間違いありませんわよね？　私、どちらかというと銃撃戦の方が得意なのですけれど……」
line = "「それでマトイ様、二刀流の指南をご希望ということでお間違いありませんわよね？　私、どちらかというと銃撃戦の方が得意なのですけれど……」"

[[dialogue]]
speaker = "マトイ"
# 「うん。だけど、セナリィさんは銃に付いている剣も使って戦ったりもするでしょ？　それを見ていて、教えてもらいたいって思ったんだ」
line = "「うん。だけど、セナリィさんは銃に付いている剣も使って戦ったりもするでしょ？　それを見ていて、教えてもらいたいって思ったんだ」"

[[dialogue]]
speaker = "マトイ"
# 「セナリィさんって多分――両利きだよね？」
line = "「セナリィさんって多分――両利きだよね？」"

[[dialogue]]
speaker = "セナリィ"
# 「……！　何故そう思いますの？」
line = "「……！　何故そう思いますの？」"

[[dialogue]]
speaker = "マトイ"
# 「実は私も両利きなんだ。だからなのかは分からないんだけど、その人を見れば、利き手がどっちなのか、なんとなく分かるんだよね」
line = "「実は私も両利きなんだ。だからなのかは分からないんだけど、その人を見れば、利き手がどっちなのか、なんとなく分かるんだよね」"

[[dialogue]]
speaker = "セナリィ"
# （へぇ……意外ですわ。マトイ様、星徒会の中では目立たない、普通の方だと思っていましたけれど……）
line = "（へぇ……意外ですわ。マトイ様、星徒会の中では目立たない、普通の方だと思っていましたけれど……）"

[[dialogue]]
speaker = "セナリィ"
# 「――私の場合は昔、傭兵時代に武器商人から矯正されたんですわ。両手どちらでも武器を自在に使えるようになれと、スパルタで」
line = "「――私の場合は昔、傭兵時代に武器商人から矯正されたんですわ。両手どちらでも武器を自在に使えるようになれと、スパルタで」"

[[dialogue]]
speaker = "マトイ"
# 「そっか……。普通じゃない経験をしてきたってことなんだね」
line = "「そっか……。普通じゃない経験をしてきたってことなんだね」"

[[dialogue]]
speaker = "マトイ"
# 「今まで見てきた両利きの星騎士の中でも、セナリィさんがいちばん武器の扱いがうまいと思う。だから、それを学んで自分の二刀流に活かしたいんだ」
line = "「今まで見てきた両利きの星騎士の中でも、セナリィさんがいちばん武器の扱いがうまいと思う。だから、それを学んで自分の二刀流に活かしたいんだ」"

[[dialogue]]
speaker = "セナリィ"
# 「なるほど……マトイ様の考えは分かりましたわ。では１度、模擬戦をして今の技量を拝見させて頂きましょうか」
line = "「なるほど……マトイ様の考えは分かりましたわ。では１度、模擬戦をして今の技量を拝見させて頂きましょうか」"

[[dialogue]]
speaker = "マトイ"
# 「うん。よろしくお願いします！」
line = "「うん。よろしくお願いします！」"

[[dialogue]]
speaker = "セナリィ"
# 「――とまあ、そんな経緯があったのですわ！　その後、激闘の末に私、マトイ様の力に感服いたしました！ ほんとにもう、すっげーですわね！」
line = "「――とまあ、そんな経緯があったのですわ！　その後、激闘の末に私、マトイ様の力に感服いたしました！ ほんとにもう、すっげーですわね！」"

[[dialogue]]
speaker = "unk"
# 数日後。訓練の時の様子を、俺はセナリィに聞かされていた。
line = "数日後。訓練の時の様子を、俺はセナリィに聞かされていた。"

[[dialogue]]
speaker = "unk"
# さすがはマトイだな（後方腕組み）
line = "さすがはマトイだな（後方腕組み）"

[[dialogue]]
speaker = "マトイ"
# 「いや、大げさだよ。普通に何度も負けて、セナリィさんには結局１回しか勝てなかったし」
line = "「いや、大げさだよ。普通に何度も負けて、セナリィさんには結局１回しか勝てなかったし」"

[[dialogue]]
speaker = "セナリィ"
# 「その１回がすごかったのですわ！　だからこそ依頼料を頂戴するのではなく、代わりにこうしてゴールデングースの業務を手伝って欲しいとお願いしましたのよ」
line = "「その１回がすごかったのですわ！　だからこそ依頼料を頂戴するのではなく、代わりにこうしてゴールデングースの業務を手伝って欲しいとお願いしましたのよ」"

[[dialogue]]
speaker = "マトイ"
# 「最近は色々なスキルを学んで行きたいと思ってるから、会社で働く経験をさせてもらえるのはありがたいよ」
line = "「最近は色々なスキルを学んで行きたいと思ってるから、会社で働く経験をさせてもらえるのはありがたいよ」"

[[dialogue]]
speaker = "セナリィ"
# 「というかやはり、マトイ様は『マルチタスク』――同時並行で複数のことをする能力がヤベェですわ！」
line = "「というかやはり、マトイ様は『マルチタスク』――同時並行で複数のことをする能力がヤベェですわ！」"

[[dialogue]]
speaker = "マトイ"
# 「そう？　これくらいは別に普通じゃない？」
line = "「そう？　これくらいは別に普通じゃない？」"

[[dialogue]]
speaker = "セナリィ"
# 「いやいや、左右の手それぞれで違う作業をしているのは、全然普通じゃありませんわよ！？」
line = "「いやいや、左右の手それぞれで違う作業をしているのは、全然普通じゃありませんわよ！？」"

[[dialogue]]
speaker = "unk"
# マトイは右手にペンを持って書類仕事をしながら、左手でパソコンのテンキーで数字の入力作業を行い、視線を交互に動かし続けている。
line = "マトイは右手にペンを持って書類仕事をしながら、左手でパソコンのテンキーで数字の入力作業を行い、視線を交互に動かし続けている。"

[[dialogue]]
speaker = "マトイ"
# 「そりゃあ私、両利きだし……」
line = "「そりゃあ私、両利きだし……」"

[[dialogue]]
speaker = "セナリィ"
# 「私はそんなことできませんわ！　一体頭の中はどういう風になってますの？」
line = "「私はそんなことできませんわ！　一体頭の中はどういう風になってますの？」"

[[dialogue]]
speaker = "マトイ"
# 「どうって……頭の中で右手を動かす自分がいて、慣れてくると、それとは別に左手を動かす自分が用意できて……みたいな？」
line = "「どうって……頭の中で右手を動かす自分がいて、慣れてくると、それとは別に左手を動かす自分が用意できて……みたいな？」"

[[dialogue]]
speaker = "セナリィ"
# 「なんで疑問形ですの……？」
line = "「なんで疑問形ですの……？」"

[[dialogue]]
speaker = "マトイ"
# 「いや、左手でコーヒー飲みながら、右手でパソコンのマウス操作をしているのと同じようなものだし……それって別に普通のことじゃないかな？」
line = "「いや、左手でコーヒー飲みながら、右手でパソコンのマウス操作をしているのと同じようなものだし……それって別に普通のことじゃないかな？」"

[[dialogue]]
speaker = "マトイ"
# 「利き手の違いはあっても、みんな両手は同時に使ったりするでしょ？　私は両利きな分、左右均等の配分で作業できるってだけで……」
line = "「利き手の違いはあっても、みんな両手は同時に使ったりするでしょ？　私は両利きな分、左右均等の配分で作業できるってだけで……」"

[[dialogue]]
speaker = "セナリィ"
# 「その二刀流は普通ではありませんわ！」
line = "「その二刀流は普通ではありませんわ！」"

[[dialogue]]
speaker = "マトイ"
# 「えっ。でも、それならセナリィさんは、一体どうやって二丁拳銃を……」
line = "「えっ。でも、それならセナリィさんは、一体どうやって二丁拳銃を……」"

[[dialogue]]
speaker = "セナリィ"
# 「私の場合、左右どちらの手でも武器を持てるように、反復訓練しただけですわ……」
line = "「私の場合、左右どちらの手でも武器を持てるように、反復訓練しただけですわ……」"

[[dialogue]]
speaker = "マトイ"
# 「なるほど！　セナリィさんは私と違って、無意識に二刀流を使いこなしてるんだね！　やっぱり天才傭兵は、センスが普通じゃないなぁ」
line = "「なるほど！　セナリィさんは私と違って、無意識に二刀流を使いこなしてるんだね！　やっぱり天才傭兵は、センスが普通じゃないなぁ」"

[[dialogue]]
speaker = "マトイ"
# 「私も自分なりに、セナリィさんの域まで近づけるように頑張らないと！」
line = "「私も自分なりに、セナリィさんの域まで近づけるように頑張らないと！」"

[[dialogue]]
speaker = "セナリィ"
# 「えっと……会長様？　マトイ様ってこれ、本気でおっしゃってますの？」
line = "「えっと……会長様？　マトイ様ってこれ、本気でおっしゃってますの？」"

[[dialogue]]
speaker = "unk"
# 地味に色々普通じゃないんだ
line = "地味に色々普通じゃないんだ"

[[dialogue]]
speaker = "セナリィ"
# 「つまりこれは……青田買い物件ということですわね！」
line = "「つまりこれは……青田買い物件ということですわね！」"

[[dialogue]]
speaker = "セナリィ"
# 「マトイ様！　このままゴールデングースでバイトを続けてみませんかしら？」
line = "「マトイ様！　このままゴールデングースでバイトを続けてみませんかしら？」"

[[dialogue]]
speaker = "セナリィ"
# 「星徒会業務との兼ね合いはもちろん考慮しますし、時給も良い値段でご相談させて頂きますわよ？」
line = "「星徒会業務との兼ね合いはもちろん考慮しますし、時給も良い値段でご相談させて頂きますわよ？」"

[[dialogue]]
speaker = "マトイ"
# 「え、いいの？　それなら時給をもらう代わりに、また二刀流の訓練を見てくれたら嬉しいな！」
line = "「え、いいの？　それなら時給をもらう代わりに、また二刀流の訓練を見てくれたら嬉しいな！」"

[[dialogue]]
speaker = "セナリィ"
# 「ええ、ええ♪　そんなことでよろしければ、時給にプラスした福利厚生としてサービスしますわよ♪　ふふふっ♪」
line = "「ええ、ええ♪　そんなことでよろしければ、時給にプラスした福利厚生としてサービスしますわよ♪　ふふふっ♪」"

[[dialogue]]
speaker = "unk"
# そうして２人は、継続的に合同訓練を行うことになったのだが――
line = "そうして２人は、継続的に合同訓練を行うことになったのだが――"

[[dialogue]]
speaker = "セナリィ"
# 「えっと……マトイ様？　確かに私、マトイ様が簡単な星術なら、両手で別々に扱えると聞いて……それは私でも出来るのか、とお聞きしましたわ……」
line = "「えっと……マトイ様？　確かに私、マトイ様が簡単な星術なら、両手で別々に扱えると聞いて……それは私でも出来るのか、とお聞きしましたわ……」"

[[dialogue]]
speaker = "マトイ"
# 「うん！　セナリィさんなら絶対にできるよ！」
line = "「うん！　セナリィさんなら絶対にできるよ！」"

[[dialogue]]
speaker = "セナリィ"
# 「もう１ヶ月続けてますけど、全っ然、出来ねぇですわ！？」
line = "「もう１ヶ月続けてますけど、全っ然、出来ねぇですわ！？」"

[[dialogue]]
speaker = "セナリィ"
# 「仮に成功したとして、実戦レベルになるとは思えねぇですわよ！？　やっぱり普通の技能ではねぇですわ、これ！？」
line = "「仮に成功したとして、実戦レベルになるとは思えねぇですわよ！？　やっぱり普通の技能ではねぇですわ、これ！？」"

[[dialogue]]
speaker = "unk"
# セナリィの右手にはライターを点けたような小さな火と、左手には豆粒のような水球が浮いていた。
line = "セナリィの右手にはライターを点けたような小さな火と、左手には豆粒のような水球が浮いていた。"

[[dialogue]]
speaker = "unk"
# 火も水もそれぞれ不安定に揺らいでおり、気を抜けば今にも消えてしまいそうになっている。
line = "火も水もそれぞれ不安定に揺らいでおり、気を抜けば今にも消えてしまいそうになっている。"

[[dialogue]]
speaker = "マトイ"
# 「――大事なのは諦めずに、『普通』を積み重ねること」
line = "「――大事なのは諦めずに、『普通』を積み重ねること」"

[[dialogue]]
speaker = "マトイ"
# 「だから私、できるようになるまで何日でも付き合うから！！」
line = "「だから私、できるようになるまで何日でも付き合うから！！」"

[[dialogue]]
speaker = "セナリィ"
# 「え！？　もしかしてこんなヤベェこと、できるようになるまで終わらないんですの！？」
line = "「え！？　もしかしてこんなヤベェこと、できるようになるまで終わらないんですの！？」"

[[dialogue]]
speaker = "マトイ"
# 「大丈夫！　普通の私でも使えるんだから、セナリィさんなら絶対に習得できるよ！」
line = "「大丈夫！　普通の私でも使えるんだから、セナリィさんなら絶対に習得できるよ！」"

[[dialogue]]
speaker = "セナリィ"
# 「わ、私が教える側のはずでしたのに、どうしてこうなりましたのぉ～～～っ！？」
line = "「わ、私が教える側のはずでしたのに、どうしてこうなりましたのぉ～～～っ！？」"

[[dialogue]]
speaker = "unk"
# こうして訓練仲間として、親しくなる２人なのであった――
line = "こうして訓練仲間として、親しくなる２人なのであった――"
