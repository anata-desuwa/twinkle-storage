[[dialogue]]
speaker = "unk"
# 第３話,悪の解消方法,P
line = "第３話,悪の解消方法,P"

[[dialogue]]
speaker = "unk"
# 星徒会で他に誰も居ないのに急ぎの仕事が山程舞い込んで来たある日。遊びに来たネーゼマインに手伝って貰っていたのだが――
line = "星徒会で他に誰も居ないのに急ぎの仕事が山程舞い込んで来たある日。遊びに来たネーゼマインに手伝って貰っていたのだが――"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ほい、こっちの書類も出来上がりっと。これで全部終わったかな？」
line = "「ほい、こっちの書類も出来上がりっと。これで全部終わったかな？」"

[[dialogue]]
speaker = "unk"
# 凄い！　残業コースだと思ってたのに
line = "凄い！　残業コースだと思ってたのに"

[[dialogue]]
speaker = "ネーゼマイン"
# 「お父さんの事務仕事、暇な時は手伝ったりしてるからね～。慣れてるってだけだよ」
line = "「お父さんの事務仕事、暇な時は手伝ったりしてるからね～。慣れてるってだけだよ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「お父さんの引き受ける裁判は、何でかいつも逆転に次ぐ逆転が起きて面白いからさ。ついつい首を突っ込んじゃうんだよね～」
line = "「お父さんの引き受ける裁判は、何でかいつも逆転に次ぐ逆転が起きて面白いからさ。ついつい首を突っ込んじゃうんだよね～」"

[[dialogue]]
speaker = "unk"
# 俺が出来ることなら何でもするから
line = "俺が出来ることなら何でもするから"

[[dialogue]]
speaker = "unk"
# ありがとう、マイン。お礼に今度
line = "ありがとう、マイン。お礼に今度"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……今、何でもするって言った？」
line = "「……今、何でもするって言った？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ♪　じゃあ会長、ソファーに俯せになって……そうそう♪」
line = "「にひひ♪　じゃあ会長、ソファーに俯せになって……そうそう♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ靴を脱いで……お背中失礼しま～す♪　よいしょっと☆」
line = "「じゃあ靴を脱いで……お背中失礼しま～す♪　よいしょっと☆」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「何をしているのかって？　背中と腰のマッサージだよ～♪　ほら、ずっと椅子に座って事務作業してたから、凝ってるんじゃないかっと思って♪」
line = "「何をしているのかって？　背中と腰のマッサージだよ～♪　ほら、ずっと椅子に座って事務作業してたから、凝ってるんじゃないかっと思って♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「それに、何でもするって言ったでしょ？　だったら今は、私が女王様で、会長は下僕ってことで♪　逆らっちゃダメだよ～？」
line = "「それに、何でもするって言ったでしょ？　だったら今は、私が女王様で、会長は下僕ってことで♪　逆らっちゃダメだよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「じゃあ早速……この辺りとかどうかな～？」
line = "「じゃあ早速……この辺りとかどうかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「大丈夫、前にもお父さん相手にやったことあるから。あ、でも、親の前だと恥ずかしいから、女王様ごっこは流石にやってないよ？」
line = "「大丈夫、前にもお父さん相手にやったことあるから。あ、でも、親の前だと恥ずかしいから、女王様ごっこは流石にやってないよ？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「会長がいけないんだよ～？　この前みたいに、ストレス解消に付き合うとか、今回みたいに、何でもするとか私の前で言っちゃうから～♪」
line = "「会長がいけないんだよ～？　この前みたいに、ストレス解消に付き合うとか、今回みたいに、何でもするとか私の前で言っちゃうから～♪」"

[[dialogue]]
speaker = "unk"
# マイン、結構Ｓだよね！？
line = "マイン、結構Ｓだよね！？"

[[dialogue]]
speaker = "unk"
# 前の時から思ってたけど
line = "前の時から思ってたけど"

[[dialogue]]
speaker = "ネーゼマイン"
# 「にひひ、言ったでしょ？　私は悪寄りだって。ほらほら、今度はこっちを踏むよ～？」
line = "「にひひ、言ったでしょ？　私は悪寄りだって。ほらほら、今度はこっちを踏むよ～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃはっ☆　いい声が出たね～。ひょっとして、気持ち良くなっちゃったのかな～？」
line = "「きゃはっ☆　いい声が出たね～。ひょっとして、気持ち良くなっちゃったのかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あ～、素直に認めないんだ～？　じゃあ、もっと踏み踏みされても問題ないよね～？　にひひ♪　そ～れ！」
line = "「あ～、素直に認めないんだ～？　じゃあ、もっと踏み踏みされても問題ないよね～？　にひひ♪　そ～れ！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あはっ、ほらほら、いっぱい声出てる～<emoji=heart04>　ねぇねぇ、本当は私に踏まれて、気持ち良くなってるんじゃないの～？」
line = "「あはっ、ほらほら、いっぱい声出てる～<emoji=heart04>　ねぇねぇ、本当は私に踏まれて、気持ち良くなってるんじゃないの～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「今は私が女王様だよ？　会長、何でもするって言ったよね～？　ほら～、下僕なんだから正直に答えろ<emoji=heart04>」
line = "「今は私が女王様だよ？　会長、何でもするって言ったよね～？　ほら～、下僕なんだから正直に答えろ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 正直、気持ち良いです……！
line = "正直、気持ち良いです……！"

[[dialogue]]
speaker = "unk"
# その……足が柔らかくて
line = "その……足が柔らかくて"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ふ……ふふ……会長、本当に認めちゃうんだ……♪」
line = "「ふ……ふふ……会長、本当に認めちゃうんだ……♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「真面目だと思ってたのに、会長の……へ・ん・た・い・さん<emoji=heart04>」
line = "「真面目だと思ってたのに、会長の……へ・ん・た・い・さん<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「まさか、自分より小さい女の子に踏まれて、気持ちよくなっちゃう変態さんだなんて……！　他の女の子が見たら、どう思うかな～？」
line = "「まさか、自分より小さい女の子に踏まれて、気持ちよくなっちゃう変態さんだなんて……！　他の女の子が見たら、どう思うかな～？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうだ、せっかくだから星徒会メンバーをここに呼んじゃう？　反応が見てみたいな～」
line = "「そうだ、せっかくだから星徒会メンバーをここに呼んじゃう？　反応が見てみたいな～」"

[[dialogue]]
speaker = "unk"
# ちょっ！？　それはやめて！
line = "ちょっ！？　それはやめて！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「きゃははは！　慌ててる慌ててる♪　でも、女王様に対する言葉遣いがそれじゃな～。下僕として、もっと頼み方ってものがあるんじゃない？」
line = "「きゃははは！　慌ててる慌ててる♪　でも、女王様に対する言葉遣いがそれじゃな～。下僕として、もっと頼み方ってものがあるんじゃない？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～？　声が小さくて、聞こえないな～？　ほら、恥ずかしがらずにちゃんと言って？」
line = "「ん～？　声が小さくて、聞こえないな～？　ほら、恥ずかしがらずにちゃんと言って？」"

[[dialogue]]
speaker = "unk"
# このことはどうか、ご内密に……！
line = "このことはどうか、ご内密に……！"

[[dialogue]]
speaker = "unk"
# 女王様、お願いします
line = "女王様、お願いします"

[[dialogue]]
speaker = "ネーゼマイン"
# 「はあぁ……<emoji=heart04>　屈服した会長の言葉、ゾクゾクしちゃう……<emoji=heart04>」
line = "「はあぁ……<emoji=heart04>　屈服した会長の言葉、ゾクゾクしちゃう……<emoji=heart04>」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「私の足でこうして気持ち良くなっている声も、録音して保存したいくらい<emoji=heart04>　これは癖になっちゃうかも……<emoji=heart04>」
line = "「私の足でこうして気持ち良くなっている声も、録音して保存したいくらい<emoji=heart04>　これは癖になっちゃうかも……<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ろ、録音！？　勘弁してくれ！
line = "ろ、録音！？　勘弁してくれ！"

[[dialogue]]
speaker = "ネーゼマイン"
# 「え～、どうしよっかな～？　……にひひ♪」
line = "「え～、どうしよっかな～？　……にひひ♪」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「ん～♪　スッキリした～！」
line = "「ん～♪　スッキリした～！」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あはは、会長は疲れた顔してる～。ごめ～ん、ちょっと調子に乗って、やり過ぎちゃったかな？」
line = "「あはは、会長は疲れた顔してる～。ごめ～ん、ちょっと調子に乗って、やり過ぎちゃったかな？」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「でも、今日は助かったよ。私の遊びに付き合ってくれて、ありがとう、会長」
line = "「でも、今日は助かったよ。私の遊びに付き合ってくれて、ありがとう、会長」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「バカみたいに思われるかもしれないけど、私、定期的に欲求不満を発散しないと、『悪いこと』をしたいっていう発作が起きちゃうんだ」
line = "「バカみたいに思われるかもしれないけど、私、定期的に欲求不満を発散しないと、『悪いこと』をしたいっていう発作が起きちゃうんだ」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「普段は戦闘で、敵にぶつけてストレス解消してるんだけどね」
line = "「普段は戦闘で、敵にぶつけてストレス解消してるんだけどね」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「そうやって自分を管理しておかないと、いつか悪に流されて堕ちてしまうかもしれない――」
line = "「そうやって自分を管理しておかないと、いつか悪に流されて堕ちてしまうかもしれない――」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「あはっ、な～んてね☆　冗談だよ♪」
line = "「あはっ、な～んてね☆　冗談だよ♪」"

[[dialogue]]
speaker = "unk"
# これからもストレス解消、手伝うよ
line = "これからもストレス解消、手伝うよ"

[[dialogue]]
speaker = "unk"
# でも、約束したからな
line = "でも、約束したからな"

[[dialogue]]
speaker = "ネーゼマイン"
# 「……！　もう……会長ってば、そんなこと言うと……」
line = "「……！　もう……会長ってば、そんなこと言うと……」"

[[dialogue]]
speaker = "ネーゼマイン"
# 「次はも～っと、過激なことをお願いしちゃうかもよ？」
line = "「次はも～っと、過激なことをお願いしちゃうかもよ？」"

[[dialogue]]
speaker = "unk"
# 耳元で悪戯っぽく囁くマインの声に、思わずドキッとしてしまう俺なのだった。
line = "耳元で悪戯っぽく囁くマインの声に、思わずドキッとしてしまう俺なのだった。"
