[[dialogue]]
speaker = "unk"
# 第２話,ブラックサンタのお導き……？,P
line = "第２話,ブラックサンタのお導き……？,P"

[[dialogue]]
speaker = "女の子"
# 「聖女さま～！　お祈りしたからプレゼントちょうだ～い」
line = "「聖女さま～！　お祈りしたからプレゼントちょうだ～い」"

[[dialogue]]
speaker = "イレーナ"
# 「ふふ、ちゃんとお祈りできて偉いですね。どうぞお好きなものをおひとつ選んでください」
line = "「ふふ、ちゃんとお祈りできて偉いですね。どうぞお好きなものをおひとつ選んでください」"

[[dialogue]]
speaker = "女の子"
# 「は～い。ありがとう、聖女さま～！　またね～！」
line = "「は～い。ありがとう、聖女さま～！　またね～！」"

[[dialogue]]
speaker = "イレーナ"
# 「ええ。あなたに女神様の変わらぬご加護が在らんことを。どうか明くる年も心穏やかに過ごせるようお祈りしております」
line = "「ええ。あなたに女神様の変わらぬご加護が在らんことを。どうか明くる年も心穏やかに過ごせるようお祈りしております」"

[[dialogue]]
speaker = "イレーナ"
# 「……あ、追加のプレゼント持ってきてくれたの。ありがと、そこ置いといて」
line = "「……あ、追加のプレゼント持ってきてくれたの。ありがと、そこ置いといて」"

[[dialogue]]
speaker = "イレーナ"
# 「ふぅ……それにしたってサンタは大変ね」
line = "「ふぅ……それにしたってサンタは大変ね」"

[[dialogue]]
speaker = "イレーナ"
# 「あたしだって子どもの夢の通りのサンタがいるとは本気で思ってないけど、サンタってたった一晩でプレゼントを配って回らなくちゃいけないじゃない？」
line = "「あたしだって子どもの夢の通りのサンタがいるとは本気で思ってないけど、サンタってたった一晩でプレゼントを配って回らなくちゃいけないじゃない？」"

[[dialogue]]
speaker = "イレーナ"
# 「そりゃ良い子にしか配ろうとしないわけよ。区別なく渡してたらキリがなさすぎるわ」
line = "「そりゃ良い子にしか配ろうとしないわけよ。区別なく渡してたらキリがなさすぎるわ」"

[[dialogue]]
speaker = "イレーナ"
# 「むしろ極力プレゼントを渡さないようにしてたんじゃないかしら。本人も忘れてるような遠い日の悪戯を槍玉に挙げて、はい君はダメーとか言うのよ」
line = "「むしろ極力プレゼントを渡さないようにしてたんじゃないかしら。本人も忘れてるような遠い日の悪戯を槍玉に挙げて、はい君はダメーとか言うのよ」"

[[dialogue]]
speaker = "イレーナ"
# 「って……なんて顔してるのよ。冗談よ、冗談。んなことしたら子どもの泣き声でクリスマスが彩られることになっちゃうだろうし」
line = "「って……なんて顔してるのよ。冗談よ、冗談。んなことしたら子どもの泣き声でクリスマスが彩られることになっちゃうだろうし」"

[[dialogue]]
speaker = "イレーナ"
# 「ま、子どものイタズラってどうあっても止められないもんだしね。むしろ道徳心ってのは他愛ないイタズラを経て身につくもんでしょ」
line = "「ま、子どものイタズラってどうあっても止められないもんだしね。むしろ道徳心ってのは他愛ないイタズラを経て身につくもんでしょ」"

[[dialogue]]
speaker = "イレーナ"
# 「子どものあれこれは大目に見てやんなくちゃ。その上で『あなたは良い子ですよ』ってプレゼント渡してやった方が逆に自省心が働くってものよ」
line = "「子どものあれこれは大目に見てやんなくちゃ。その上で『あなたは良い子ですよ』ってプレゼント渡してやった方が逆に自省心が働くってものよ」"

[[dialogue]]
speaker = "unk"
# イレーナが大人なことを言ってる……
line = "イレーナが大人なことを言ってる……"

[[dialogue]]
speaker = "イレーナ"
# 「うっさいわね、あたしは元から大人よ！」
line = "「うっさいわね、あたしは元から大人よ！」"

[[dialogue]]
speaker = "イレーナ"
# 「あんたも子どもが来たら適当に褒めてプレゼント渡してやりなさい。どんなことがあっても怒っちゃダメよ？」
line = "「あんたも子どもが来たら適当に褒めてプレゼント渡してやりなさい。どんなことがあっても怒っちゃダメよ？」"

[[dialogue]]
speaker = "イレーナ"
# 「子どもってのはまだまだ善悪の区別が付いてないもんなんだから。多少のイタズラなんて可愛いもんだと思って──」
line = "「子どもってのはまだまだ善悪の区別が付いてないもんなんだから。多少のイタズラなんて可愛いもんだと思って──」"

[[dialogue]]
speaker = "イレーナ"
# 「ぶふっ！？　ちべたっ！？」
line = "「ぶふっ！？　ちべたっ！？」"

[[dialogue]]
speaker = "男の子"
# 「やったぁ～、顔面に雪玉直撃～！　逃げろ逃げろ～！」
line = "「やったぁ～、顔面に雪玉直撃～！　逃げろ逃げろ～！」"

[[dialogue]]
speaker = "イレーナ"
# 「…………。あんのクソガキぃぃ……」
line = "「…………。あんのクソガキぃぃ……」"

[[dialogue]]
speaker = "イレーナ"
# 「コホン、あなたですね？　いま私に雪玉を放たれたのは」
line = "「コホン、あなたですね？　いま私に雪玉を放たれたのは」"

[[dialogue]]
speaker = "男の子"
# 「うわっ！？　は、離せ～！　悪の親玉みたいな格好してる聖女さまが悪いんじゃないか～！」
line = "「うわっ！？　は、離せ～！　悪の親玉みたいな格好してる聖女さまが悪いんじゃないか～！」"

[[dialogue]]
speaker = "イレーナ"
# 「悪の親玉──！？」
line = "「悪の親玉──！？」"

[[dialogue]]
speaker = "イレーナ"
# 「ふふふ、誰が悪の親玉ですか。この装いはブラックサンタを模しているのですよ。あなたのようなわるーい子どもに罰を与えるブラックサンタを、ね」
line = "「ふふふ、誰が悪の親玉ですか。この装いはブラックサンタを模しているのですよ。あなたのようなわるーい子どもに罰を与えるブラックサンタを、ね」"

[[dialogue]]
speaker = "男の子"
# 「ひぃ！？」
line = "「ひぃ！？」"

[[dialogue]]
speaker = "イレーナ"
# 「人を見た目で判断するとは言語道断。その上、突然雪玉を投げつけるなんて、とてもじゃありませんがプレゼントを渡せるような『良い子』ではありません」
line = "「人を見た目で判断するとは言語道断。その上、突然雪玉を投げつけるなんて、とてもじゃありませんがプレゼントを渡せるような『良い子』ではありません」"

[[dialogue]]
speaker = "イレーナ"
# 「心苦しいですが、ふふふ、少々罰を与えねばなりませんね」
line = "「心苦しいですが、ふふふ、少々罰を与えねばなりませんね」"

[[dialogue]]
speaker = "unk"
# まぁまぁ落ち着いて……
line = "まぁまぁ落ち着いて……"

[[dialogue]]
speaker = "イレーナ"
# 「何言ってるのよ。ここであっさり許しちゃったらつけあがるだけじゃない。大人を舐め腐った根性叩き直してあげないと」
line = "「何言ってるのよ。ここであっさり許しちゃったらつけあがるだけじゃない。大人を舐め腐った根性叩き直してあげないと」"

[[dialogue]]
speaker = "unk"
# その格好で罰とか言うと背徳感が……
line = "その格好で罰とか言うと背徳感が……"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ～～っ！？　だからブラックサンタだって言ってんでしょうにっ。何言い出してるのよ、このエロ会長！」
line = "「はぁ～～っ！？　だからブラックサンタだって言ってんでしょうにっ。何言い出してるのよ、このエロ会長！」"

[[dialogue]]
speaker = "イレーナ"
# 「……ですが、会長さんがそう仰るならいいでしょう。神官イレーナは彼を許します」
line = "「……ですが、会長さんがそう仰るならいいでしょう。神官イレーナは彼を許します」"

[[dialogue]]
speaker = "男の子"
# 「ほっ……」
line = "「ほっ……」"

[[dialogue]]
speaker = "イレーナ"
# 「もうこんなことをしてはいけませんよ。会長さんに感謝してくださいね。どうぞ、プレゼントです」
line = "「もうこんなことをしてはいけませんよ。会長さんに感謝してくださいね。どうぞ、プレゼントです」"

[[dialogue]]
speaker = "男の子"
# 「ありがとうございます、聖女さま、会長さん。もうしませんから……それじゃ、メリークリスマス！」
line = "「ありがとうございます、聖女さま、会長さん。もうしませんから……それじゃ、メリークリスマス！」"

[[dialogue]]
speaker = "イレーナ"
# 「ええ、メリークリスマス」
line = "「ええ、メリークリスマス」"

[[dialogue]]
speaker = "イレーナ"
# 「……行きましたね。それでは会長さん、お尻を出してください」
line = "「……行きましたね。それでは会長さん、お尻を出してください」"

[[dialogue]]
speaker = "unk"
# ええっ！？
line = "ええっ！？"

[[dialogue]]
speaker = "イレーナ"
# 「まだ未熟な彼の代わりに会長さんが贖うのでしょう？　まさかその覚悟もなしに、私に許せと、そう仰ったわけではないですよね？」
line = "「まだ未熟な彼の代わりに会長さんが贖うのでしょう？　まさかその覚悟もなしに、私に許せと、そう仰ったわけではないですよね？」"

[[dialogue]]
speaker = "unk"
# は、はい……
line = "は、はい……"

[[dialogue]]
speaker = "イレーナ"
# 「では私にお尻を向けてください。……ええ、そうです。見苦しいお尻を見たくないので、ズボンはそのままで結構ですよ」
line = "「では私にお尻を向けてください。……ええ、そうです。見苦しいお尻を見たくないので、ズボンはそのままで結構ですよ」"

[[dialogue]]
speaker = "イレーナ"
# 「それでは……」
line = "「それでは……」"

[[dialogue]]
speaker = "イレーナ"
# 「おやおや、痛そうな顔をして……でもいつもモンスターと戦っておられる会長さんにとっては、この程度序の口でしょう？」
line = "「おやおや、痛そうな顔をして……でもいつもモンスターと戦っておられる会長さんにとっては、この程度序の口でしょう？」"

[[dialogue]]
speaker = "イレーナ"
# 「次はもっと強くしますからね……」
line = "「次はもっと強くしますからね……」"

[[dialogue]]
speaker = "イレーナ"
# 「新星学園の星徒会長ともあろう方がこの程度で悲鳴を上げて情けない。これしきで音を上げては会長のマントが泣きますよ？」
line = "「新星学園の星徒会長ともあろう方がこの程度で悲鳴を上げて情けない。これしきで音を上げては会長のマントが泣きますよ？」"

[[dialogue]]
speaker = "イレーナ"
# 「あの子の分まで悔い改めなさい！」
line = "「あの子の分まで悔い改めなさい！」"

[[dialogue]]
speaker = "イレーナ"
# 「あらどうしましたか？　その物欲しそうな目は。まるで餌をねだる浅ましい豚のよう……いえ、それでは豚に失礼ですね」
line = "「あらどうしましたか？　その物欲しそうな目は。まるで餌をねだる浅ましい豚のよう……いえ、それでは豚に失礼ですね」"

[[dialogue]]
speaker = "イレーナ"
# 「自分から罰を求めるなんて、よほど後ろめたい気持ちがあったのでしょう。聖女である私があなたの罪を清めて差し上げます」
line = "「自分から罰を求めるなんて、よほど後ろめたい気持ちがあったのでしょう。聖女である私があなたの罪を清めて差し上げます」"

[[dialogue]]
speaker = "イレーナ"
# 「いい声で懺悔しなさい！　ほら、ほら──ほら！」
line = "「いい声で懺悔しなさい！　ほら、ほら──ほら！」"

[[dialogue]]
speaker = "unk"
# くぁあああっ！！
line = "くぁあああっ！！"

[[dialogue]]
speaker = "unk"
# イレーナに罰を受ける俺の姿を見た子どもたちは、決してイタズラをするまいと心に誓ったとか……
line = "イレーナに罰を受ける俺の姿を見た子どもたちは、決してイタズラをするまいと心に誓ったとか……"

[[dialogue]]
speaker = "unk"
# そして俺も、イレーナに叩かれたお尻の痛みが忘れられないのだった……
line = "そして俺も、イレーナに叩かれたお尻の痛みが忘れられないのだった……"
