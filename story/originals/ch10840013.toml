[[dialogue]]
speaker = "unk"
# 第３話,普遍と普通,P
line = "第３話,普遍と普通,P"

[[dialogue]]
speaker = "unk"
# 先日の続きで、今日は星徒会の案内だ。
line = "先日の続きで、今日は星徒会の案内だ。"

[[dialogue]]
speaker = "オオヒメ"
# 「お初にお目にかかる。守護天使が一柱《天恵》のオオヒメだ。呼びづらければヒメと呼んでくれ」
line = "「お初にお目にかかる。守護天使が一柱《天恵》のオオヒメだ。呼びづらければヒメと呼んでくれ」"

[[dialogue]]
speaker = "マトイ"
# 「ヒメ……かわいくていいですね♪」
line = "「ヒメ……かわいくていいですね♪」"

[[dialogue]]
speaker = "オオヒメ"
# 「そ、そうか？　呼びやすさを優先したのだが、私にはかわいすぎるのではないか……？」
line = "「そ、そうか？　呼びやすさを優先したのだが、私にはかわいすぎるのではないか……？」"

[[dialogue]]
speaker = "マトイ"
# 「そんなことないですよ。お似合いです」
line = "「そんなことないですよ。お似合いです」"

[[dialogue]]
speaker = "unk"
# 俺も似合ってると思うよ
line = "俺も似合ってると思うよ"

[[dialogue]]
speaker = "オオヒメ"
# 「う、うぅむ……魔王もそう思うか……」
line = "「う、うぅむ……魔王もそう思うか……」"

[[dialogue]]
speaker = "マトイ"
# 「私は星徒会書記の詠野マトイです。よかったら、お茶とお菓子どうぞ」
line = "「私は星徒会書記の詠野マトイです。よかったら、お茶とお菓子どうぞ」"

[[dialogue]]
speaker = "オオヒメ"
# 「ありがとう、いただくよ」
line = "「ありがとう、いただくよ」"

[[dialogue]]
speaker = "マトイ"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "オオヒメ"
# 「マトイ殿？　私の顔をじっと見てどうした？」
line = "「マトイ殿？　私の顔をじっと見てどうした？」"

[[dialogue]]
speaker = "マトイ"
# 「ああいや、その……ヒメさんが私と同じだって聞いて……」
line = "「ああいや、その……ヒメさんが私と同じだって聞いて……」"

[[dialogue]]
speaker = "オオヒメ"
# 「マトイ殿と同じ？」
line = "「マトイ殿と同じ？」"

[[dialogue]]
speaker = "マトイ"
# 「普通を司る守護天使って聞いたんですけど……」
line = "「普通を司る守護天使って聞いたんですけど……」"

[[dialogue]]
speaker = "オオヒメ"
# 「私が司る摂理は『普遍』だが」
line = "「私が司る摂理は『普遍』だが」"

[[dialogue]]
speaker = "マトイ"
# 「違った！？　守護天使様と同じなんて思い上がりでした！　ごめんなさいごめんなさいごめんなさい！」
line = "「違った！？　守護天使様と同じなんて思い上がりでした！　ごめんなさいごめんなさいごめんなさい！」"

[[dialogue]]
speaker = "オオヒメ"
# 「いや、そんなに謝らなくても……確かにわかりづらい概念ではあるからな」
line = "「いや、そんなに謝らなくても……確かにわかりづらい概念ではあるからな」"

[[dialogue]]
speaker = "unk"
# 普通と普遍の違いって？
line = "普通と普遍の違いって？"

[[dialogue]]
speaker = "オオヒメ"
# 「普通も説明するのは難しいが……ありふれていること、他と変わらないこと、だとしておこう」
line = "「普通も説明するのは難しいが……ありふれていること、他と変わらないこと、だとしておこう」"

[[dialogue]]
speaker = "オオヒメ"
# 「普遍とは、広く行き渡ること。全てのものに等しくあてはまること。これだけだと、普通と変わらないようにも思えるな」
line = "「普遍とは、広く行き渡ること。全てのものに等しくあてはまること。これだけだと、普通と変わらないようにも思えるな」"

[[dialogue]]
speaker = "オオヒメ"
# 「ところで、マトイ殿は魔界に行ったことがあるそうだな？」
line = "「ところで、マトイ殿は魔界に行ったことがあるそうだな？」"

[[dialogue]]
speaker = "マトイ"
# 「はい、レゾフやその近辺に」
line = "「はい、レゾフやその近辺に」"

[[dialogue]]
speaker = "オオヒメ"
# 「では、そのレゾフで太陽は見たか？　呼吸はできたか？　地に足は着いたか？」
line = "「では、そのレゾフで太陽は見たか？　呼吸はできたか？　地に足は着いたか？」"

[[dialogue]]
speaker = "マトイ"
# 「はい。でないと今大変なことになってます」
line = "「はい。でないと今大変なことになってます」"

[[dialogue]]
speaker = "オオヒメ"
# 「うむ、それが普遍だ。光、大気、重力……そういう『あって当たり前のもの』を三界に行き渡らせるのが私の役目だ」
line = "「うむ、それが普遍だ。光、大気、重力……そういう『あって当たり前のもの』を三界に行き渡らせるのが私の役目だ」"

[[dialogue]]
speaker = "マトイ"
# 「それってつまり世界の根幹なんじゃ……ていうかヒメさんがいないと、みんな息もできなくなるってこと！？」
line = "「それってつまり世界の根幹なんじゃ……ていうかヒメさんがいないと、みんな息もできなくなるってこと！？」"

[[dialogue]]
speaker = "オオヒメ"
# 「大雑把に言えばそういうことだ」
line = "「大雑把に言えばそういうことだ」"

[[dialogue]]
speaker = "マトイ"
# 「やっぱり守護天使様ってすごい存在なんだ……。それを私と同じなんて……私のバカバカ！」
line = "「やっぱり守護天使様ってすごい存在なんだ……。それを私と同じなんて……私のバカバカ！」"

[[dialogue]]
speaker = "オオヒメ"
# 「まぁ、自分を責めるのもほどほどにな？　責めすぎてもいいことはないぞ？」
line = "「まぁ、自分を責めるのもほどほどにな？　責めすぎてもいいことはないぞ？」"

[[dialogue]]
speaker = "マトイ"
# 「だけど……幸福……なんかは違うんですよね？」
line = "「だけど……幸福……なんかは違うんですよね？」"

[[dialogue]]
speaker = "マトイ"
# 「人が、生き物が生きるのに必要なものを行き渡らせる……それがヒメさんの力。でも、幸せも一緒に行き渡らせてくれたら……なんて思っちゃうんですけど」
line = "「人が、生き物が生きるのに必要なものを行き渡らせる……それがヒメさんの力。でも、幸せも一緒に行き渡らせてくれたら……なんて思っちゃうんですけど」"

[[dialogue]]
speaker = "オオヒメ"
# 「気持ちはわかるが、人々に幸福をもたらすのは私の役目ではない」
line = "「気持ちはわかるが、人々に幸福をもたらすのは私の役目ではない」"

[[dialogue]]
speaker = "unk"
# 幸福は自分で掴み取るものだから？
line = "幸福は自分で掴み取るものだから？"

[[dialogue]]
speaker = "オオヒメ"
# 「違うな。気難しいパテルじゃあるまいし、試すようなことはしない」
line = "「違うな。気難しいパテルじゃあるまいし、試すようなことはしない」"

[[dialogue]]
speaker = "オオヒメ"
# 「もっと単純なことだ。幸福はそれぞれ違うもの。例えば、金を稼ぐことが幸せの者もいれば、家族に愛されることが幸せである者もいるだろう」
line = "「もっと単純なことだ。幸福はそれぞれ違うもの。例えば、金を稼ぐことが幸せの者もいれば、家族に愛されることが幸せである者もいるだろう」"

[[dialogue]]
speaker = "オオヒメ"
# 「ある意味、幸福は普遍と正反対のものといえるだろうな」
line = "「ある意味、幸福は普遍と正反対のものといえるだろうな」"

[[dialogue]]
speaker = "unk"
# なるほど……
line = "なるほど……"

[[dialogue]]
speaker = "マトイ"
# 「難しいですけど、なんとなくわかった気がします……」
line = "「難しいですけど、なんとなくわかった気がします……」"

[[dialogue]]
speaker = "マトイ"
# 「！　モンスター！　早く行かないと！」
line = "「！　モンスター！　早く行かないと！」"

[[dialogue]]
speaker = "ドラケルス"
# 「グラァアアアッ！！」
line = "「グラァアアアッ！！」"

[[dialogue]]
speaker = "オオヒメ"
# 「都牟刈・八閃！」
line = "「都牟刈・八閃！」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「リフレクトゴッデスカリバー！」
line = "「リフレクトゴッデスカリバー！」"

[[dialogue]]
speaker = "ドラケルス"
# 「グゥゥ……」
line = "「グゥゥ……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「ふぅ、倒せた……ヒメさんのおかげです」
line = "「ふぅ、倒せた……ヒメさんのおかげです」"

[[dialogue]]
speaker = "オオヒメ"
# 「いいや、マトイ殿の力だよ。見事な太刀筋であった」
line = "「いいや、マトイ殿の力だよ。見事な太刀筋であった」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「えへへ……ありがとうございます」
line = "「えへへ……ありがとうございます」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「私、ヒメさんの話を聞いて思ったんです。普遍が世界に行き渡らせることなら……」
line = "「私、ヒメさんの話を聞いて思ったんです。普遍が世界に行き渡らせることなら……」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「私は、守りを世界に行き渡らせる、普遍の盾になりたいって。誰もが守られるのが普通にしたいです」
line = "「私は、守りを世界に行き渡らせる、普遍の盾になりたいって。誰もが守られるのが普通にしたいです」"

[[dialogue]]
speaker = "オオヒメ"
# 「普遍にして普通の盾か。素晴らしい志だ」
line = "「普遍にして普通の盾か。素晴らしい志だ」"

[[dialogue]]
speaker = "オオヒメ"
# 「確かに、幸福をもたらすのは守護天使の責務ではない」
line = "「確かに、幸福をもたらすのは守護天使の責務ではない」"

[[dialogue]]
speaker = "オオヒメ"
# 「だが今の私には肉体がある。守護天使の権能でなくとも、この手で人々の幸福を守ることができる」
line = "「だが今の私には肉体がある。守護天使の権能でなくとも、この手で人々の幸福を守ることができる」"

[[dialogue]]
speaker = "オオヒメ"
# 「ともに幸福を守ろう、マトイ殿」
line = "「ともに幸福を守ろう、マトイ殿」"

[[dialogue]]
speaker = "マトイ（覚醒）"
# 「はい！」
line = "「はい！」"

[[dialogue]]
speaker = "unk"
# 意気投合するヒメとマトイを見て、俺も世界を守ろうという決意を強くするのだった。
line = "意気投合するヒメとマトイを見て、俺も世界を守ろうという決意を強くするのだった。"
