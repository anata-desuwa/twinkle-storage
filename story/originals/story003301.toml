[[dialogue]]
speaker = "unk"
# リップルから『リゾート結界で不思議なものを拾った』と知らせを受け、俺は結界内の海の家に向かった。
line = "リップルから『リゾート結界で不思議なものを拾った』と知らせを受け、俺は結界内の海の家に向かった。"

[[dialogue]]
speaker = "リップル"
# 「カイチョー！　ヘイ、ラッシャーセー！　見てほしいのはコレでーす！」
line = "「カイチョー！　ヘイ、ラッシャーセー！　見てほしいのはコレでーす！」"

[[dialogue]]
speaker = "unk"
# リップルが差し出したのは、霊力を放つ小さな欠片だった。
line = "リップルが差し出したのは、霊力を放つ小さな欠片だった。"

[[dialogue]]
speaker = "unk"
# 守護天使が持つ霊力の結晶──『<ruby=クロスダスト>霊屑</ruby>』に近いような気もするが……
line = "守護天使が持つ霊力の結晶──『<ruby>霊屑<rt>クロスダスト</rt></ruby>』に近いような気もするが……"

[[dialogue]]
speaker = "？？？"
# 「だ～れだ？」
line = "「だ～れだ？」"

[[dialogue]]
speaker = "unk"
# 突然後ろから、小さな手で目隠しをされた。だがこの声の主ならわかる。
line = "突然後ろから、小さな手で目隠しをされた。だがこの声の主ならわかる。"

[[dialogue]]
speaker = "unk"
# パテル！
line = "パテル！"

[[dialogue]]
speaker = "パテル"
# 「せいか～い♪　久しぶりだね、おにーさん♪」
line = "「せいか～い♪　久しぶりだね、おにーさん♪」"

[[dialogue]]
speaker = "リップル"
# 「おや、ドナタですか？」
line = "「おや、ドナタですか？」"

[[dialogue]]
speaker = "パテル"
# 「あたしは『淘汰』の摂理を司る守護天使──《試練》のパテルだよ。よろしく」
line = "「あたしは『淘汰』の摂理を司る守護天使──《試練》のパテルだよ。よろしく」"

[[dialogue]]
speaker = "リップル"
# 「お～、パテルも守護天使なのですね！　ヨロシクでーす！　オペレーション・ペンタグラムではセシアにお世話にナリました！」
line = "「お～、パテルも守護天使なのですね！　ヨロシクでーす！　オペレーション・ペンタグラムではセシアにお世話にナリました！」"

[[dialogue]]
speaker = "パテル"
# 「こちらこそ、守護天使の本体を解放してくれて感謝するよ」
line = "「こちらこそ、守護天使の本体を解放してくれて感謝するよ」"

[[dialogue]]
speaker = "unk"
# その水着はどうしたの？
line = "その水着はどうしたの？"

[[dialogue]]
speaker = "パテル"
# 「ああ、これ？」
line = "「ああ、これ？」"

[[dialogue]]
speaker = "パテル"
# 「ペンタグラムで守護天使の本体が解放されて、霊力に融通が利くようになったから、星騎士を真似してチョイチョイっと弄ってみたんだ」
line = "「ペンタグラムで守護天使の本体が解放されて、霊力に融通が利くようになったから、星騎士を真似してチョイチョイっと弄ってみたんだ」"

[[dialogue]]
speaker = "パテル"
# 「どうどう？　かわいい？　似合ってる？　パテルちゃんマジ天使？」
line = "「どうどう？　かわいい？　似合ってる？　パテルちゃんマジ天使？」"

[[dialogue]]
speaker = "リップル"
# 「ハイ！　ＢＩＧカワイイでーす！」
line = "「ハイ！　ＢＩＧカワイイでーす！」"

[[dialogue]]
speaker = "unk"
# （パテルは最初から天使では……？）
line = "（パテルは最初から天使では……？）"

[[dialogue]]
speaker = "パテル"
# 「はいそこー、考えてることバレバレー。パテルちゃんはいつもの恰好でも水着でも、キュートでぷりちーな守護天使様なのだよ」
line = "「はいそこー、考えてることバレバレー。パテルちゃんはいつもの恰好でも水着でも、キュートでぷりちーな守護天使様なのだよ」"

[[dialogue]]
speaker = "リップル"
# 「でもどうしてパテルがリゾート結界に？　遊びにキテくれたんですか？」
line = "「でもどうしてパテルがリゾート結界に？　遊びにキテくれたんですか？」"

[[dialogue]]
speaker = "パテル"
# 「それはねー……」
line = "「それはねー……」"

[[dialogue]]
speaker = "パテル"
# 「ほら、前にあたしが堕天使だった時に、分身して逃げたことがあったでしょ？」
line = "「ほら、前にあたしが堕天使だった時に、分身して逃げたことがあったでしょ？」"

[[dialogue]]
speaker = "パテル"
# 「あの時に、分身の何体かがリゾート結界に逃げ込んでたみたいでさ」
line = "「あの時に、分身の何体かがリゾート結界に逃げ込んでたみたいでさ」"

[[dialogue]]
speaker = "パテル"
# 「だけど守護天使の本体がペンタグラムで解放されたから堕天使じゃなくなって、霊力だけが結晶として残されたってわけ」
line = "「だけど守護天使の本体がペンタグラムで解放されたから堕天使じゃなくなって、霊力だけが結晶として残されたってわけ」"

[[dialogue]]
speaker = "パテル"
# 「この結晶は、<ruby=クロスダスト>霊屑</ruby>の欠片ってとこかな」
line = "「この結晶は、<ruby>霊屑<rt>クロスダスト</rt></ruby>の欠片ってとこかな」"

[[dialogue]]
speaker = "パテル"
# 「つまりはあたしの力の一部。だからあたしが責任を持って回収しに来たんだ」
line = "「つまりはあたしの力の一部。だからあたしが責任を持って回収しに来たんだ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「あら～？」
line = "「あら～？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「パテルがリゾート結界にいるのだ。珍しいのだ」
line = "「パテルがリゾート結界にいるのだ。珍しいのだ」"

[[dialogue]]
speaker = "パテル"
# 「あ、マグダレナとアルモタヘルだ。しかも今日はちっちゃい方」
line = "「あ、マグダレナとアルモタヘルだ。しかも今日はちっちゃい方」"

[[dialogue]]
speaker = "パテル"
# 「大鎌使いとして、ちっちゃいアルモタヘルとは決着付けないとって思ってたんだよね。ここで会ったが百万年目！　やるか～！？」
line = "「大鎌使いとして、ちっちゃいアルモタヘルとは決着付けないとって思ってたんだよね。ここで会ったが百万年目！　やるか～！？」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「やらないぞ。アルモたんとマグダレナは、リップルから不思議な欠片のことを聞いて調査しに来たのだ」
line = "「やらないぞ。アルモたんとマグダレナは、リップルから不思議な欠片のことを聞いて調査しに来たのだ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「どうしてパテルがここにいるんですか？」
line = "「どうしてパテルがここにいるんですか？」"

[[dialogue]]
speaker = "パテル"
# 「それはね～……」
line = "「それはね～……」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「ふむふむ……なるほどなのだ！　リゾート結界で見つかったのは、パテルの力の一部だったのだ」
line = "「ふむふむ……なるほどなのだ！　リゾート結界で見つかったのは、パテルの力の一部だったのだ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「それなら私たちも欠片を探すのを手伝います。同じ守護天使として放っておけませんからね」
line = "「それなら私たちも欠片を探すのを手伝います。同じ守護天使として放っておけませんからね」"

[[dialogue]]
speaker = "パテル"
# 「ありがとー。助かるよ」
line = "「ありがとー。助かるよ」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「でもパテルだけ水着なのはずるいぞ！　アルモたんも水着を着たいのだ！」
line = "「でもパテルだけ水着なのはずるいぞ！　アルモたんも水着を着たいのだ！」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「私も水着欲しいです～っ」
line = "「私も水着欲しいです～っ」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「というわけで──」
line = "「というわけで──」"

[[dialogue]]
speaker = "マグダレナ（幼少）"
# 「ママダレナたちも水着に着替えちゃいました♪」
line = "「ママダレナたちも水着に着替えちゃいました♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「水着守護天使参上！　なのだ！」
line = "「水着守護天使参上！　なのだ！」"

[[dialogue]]
speaker = "リップル"
# 「ワオ！　ママダレナたちもＢＩＧカワイイでーす！」
line = "「ワオ！　ママダレナたちもＢＩＧカワイイでーす！」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「海で欠片探しって、宝探しみたいなのだ。ワクワクするのだ♪」
line = "「海で欠片探しって、宝探しみたいなのだ。ワクワクするのだ♪」"

[[dialogue]]
speaker = "パテル"
# 「宝探しか～、確かにそれっぽいね。でも探すのがただの欠片じゃ味気ないし……名付けて『パテルストーン』！　一番多く見つけた人はあたしがご褒美あげるね♪」
line = "「宝探しか～、確かにそれっぽいね。でも探すのがただの欠片じゃ味気ないし……名付けて『パテルストーン』！　一番多く見つけた人はあたしがご褒美あげるね♪」"

[[dialogue]]
speaker = "アルモタヘル（幼少）"
# 「よーし、リゾート結界で遊びながらパテルストーンを探すのだ！」
line = "「よーし、リゾート結界で遊びながらパテルストーンを探すのだ！」"
