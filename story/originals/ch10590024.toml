[[dialogue]]
speaker = "unk"
# 第４話,リップルクリスマス,P
line = "第４話,リップルクリスマス,P"

[[dialogue]]
speaker = "unk"
# 今日はリップルとのクリスマスデート。待ち合わせ場所に行くと──
line = "今日はリップルとのクリスマスデート。待ち合わせ場所に行くと──"

[[dialogue]]
speaker = "リップル"
# 「カイチョー！　メリークリスマース！」
line = "「カイチョー！　メリークリスマース！」"

[[dialogue]]
speaker = "unk"
# 勢いよく抱きついてくるリップルを受け止め、ぎゅっと抱き返す。
line = "勢いよく抱きついてくるリップルを受け止め、ぎゅっと抱き返す。"

[[dialogue]]
speaker = "unk"
# メリークリスマス、リップル
line = "メリークリスマス、リップル"

[[dialogue]]
speaker = "リップル"
# 「エヘヘ♪　カイチョー、ダイスキですー<emoji=heart04>」
line = "「エヘヘ♪　カイチョー、ダイスキですー<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
# 「そんなカイチョーに……クリスマスプレゼント♪　あったかテブクロでーす♪　ワタシのテブクロもお揃いです」
line = "「そんなカイチョーに……クリスマスプレゼント♪　あったかテブクロでーす♪　ワタシのテブクロもお揃いです」"

[[dialogue]]
speaker = "unk"
# ありがとう。じゃあ俺もプレゼントを……
line = "ありがとう。じゃあ俺もプレゼントを……"

[[dialogue]]
speaker = "リップル"
# 「！　コレは……マフラーですね！　コレなら水着でも使えます！」
line = "「！　コレは……マフラーですね！　コレなら水着でも使えます！」"

[[dialogue]]
speaker = "リップル"
# 「サンタみたいに赤いマフラー、カワイイです♪　でもとってもナガーいですね？」
line = "「サンタみたいに赤いマフラー、カワイイです♪　でもとってもナガーいですね？」"

[[dialogue]]
speaker = "リップル"
# 「２人でイッショに巻く……？　ワオ！　それはＢＩＧステキです♪　じゃあ……」
line = "「２人でイッショに巻く……？　ワオ！　それはＢＩＧステキです♪　じゃあ……」"

[[dialogue]]
speaker = "リップル"
# 「２人でイッショのマフラー……ドキドキしちゃいます……<emoji=heart04>　恋人のアカシですね……<emoji=heart04>」
line = "「２人でイッショのマフラー……ドキドキしちゃいます……<emoji=heart04>　恋人のアカシですね……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー……ちゅっ<emoji=heart04>」
line = "「カイチョー……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
# 「ホッペタじゃなくて、唇に……恋人のキスです<emoji=heart04>　ん……ちゅっ<emoji=heart04>　んちゅっ<emoji=heart04>　ちゅぷっ、んちゅっ<emoji=heart04>」
line = "「ホッペタじゃなくて、唇に……恋人のキスです<emoji=heart04>　ん……ちゅっ<emoji=heart04>　んちゅっ<emoji=heart04>　ちゅぷっ、んちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーがダイスキで、ついキスしちゃいマシた……<emoji=heart04>」
line = "「カイチョーがダイスキで、ついキスしちゃいマシた……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
# 「このままじゃキスでクリスマスが終わってシマイますね。デート、行きましょー♪」
line = "「このままじゃキスでクリスマスが終わってシマイますね。デート、行きましょー♪」"

[[dialogue]]
speaker = "unk"
# お揃いの手袋を付けた手を繋いで、クリスマスの繁華街を歩く。
line = "お揃いの手袋を付けた手を繋いで、クリスマスの繁華街を歩く。"

[[dialogue]]
speaker = "リップル"
# 「ワタシたちみたいに手を繋いでいる人たちがタクサンいます。みんなカップルなんでしょうか？　みんなハッピーな顔しています♪」
line = "「ワタシたちみたいに手を繋いでいる人たちがタクサンいます。みんなカップルなんでしょうか？　みんなハッピーな顔しています♪」"

[[dialogue]]
speaker = "リップル"
# 「みんなハッピーなら、ワタシもハッピーです♪　ＢＩＧウレシイです♪」
line = "「みんなハッピーなら、ワタシもハッピーです♪　ＢＩＧウレシイです♪」"

[[dialogue]]
speaker = "リップル"
# 「ハッ──！　カップルのラブラブな気持ちを取り入れられれば、エンドレスサマーをもっとオオキクできるのでは……！？」
line = "「ハッ──！　カップルのラブラブな気持ちを取り入れられれば、エンドレスサマーをもっとオオキクできるのでは……！？」"

[[dialogue]]
speaker = "unk"
# まさかの発想……！？
line = "まさかの発想……！？"

[[dialogue]]
speaker = "リップル"
# 「なんて、ジョーダンです♪　リゾート結界に活かせるホド、ワタシ、恋のコト知りません」
line = "「なんて、ジョーダンです♪　リゾート結界に活かせるホド、ワタシ、恋のコト知りません」"

[[dialogue]]
speaker = "リップル"
# 「だからカイチョーがオシエテください<emoji=heart04>」
line = "「だからカイチョーがオシエテください<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ああ、これから一緒に学んでいこう
line = "ああ、これから一緒に学んでいこう"

[[dialogue]]
speaker = "リップル"
# 「ハイ<emoji=heart04>　ヤクソクです<emoji=heart04>」
line = "「ハイ<emoji=heart04>　ヤクソクです<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
# 「あっ！　あそこ、チキンが売ってます！　クリスマスといえばチキンですよね♪　一緒に食べましょー♪」
line = "「あっ！　あそこ、チキンが売ってます！　クリスマスといえばチキンですよね♪　一緒に食べましょー♪」"

[[dialogue]]
speaker = "リップル"
# 「オジさーん！　チキンくださーい！」
line = "「オジさーん！　チキンくださーい！」"

[[dialogue]]
speaker = "リップル"
# 「ハイ、カイチョー、あーん<emoji=heart04>　……オイシイですか？」
line = "「ハイ、カイチョー、あーん<emoji=heart04>　……オイシイですか？」"

[[dialogue]]
speaker = "unk"
# とっても美味しい！
line = "とっても美味しい！"

[[dialogue]]
speaker = "リップル"
# 「ワタシにも食べさせてください。あ～んっ」
line = "「ワタシにも食べさせてください。あ～んっ」"

[[dialogue]]
speaker = "リップル"
# 「ん～っ、チキン美味しいです♪」
line = "「ん～っ、チキン美味しいです♪」"

[[dialogue]]
speaker = "リップル"
# 「チキンが美味しくて、デートもできて、クリスマスはイイコトばっかりデスね♪」
line = "「チキンが美味しくて、デートもできて、クリスマスはイイコトばっかりデスね♪」"

[[dialogue]]
speaker = "unk"
# 街を見て回っていると、時間はあっという間に過ぎて、最後はリップルのリゾート結界へ。
line = "街を見て回っていると、時間はあっという間に過ぎて、最後はリップルのリゾート結界へ。"

[[dialogue]]
speaker = "リップル"
# 「では……ヘンシーン！」
line = "「では……ヘンシーン！」"

[[dialogue]]
speaker = "リップル"
# 「リップル・クリスマスフォーム！　エヘヘ<emoji=heart04>　ワタシをカイチョーにプレゼント……です<emoji=heart04>」
line = "「リップル・クリスマスフォーム！　エヘヘ<emoji=heart04>　ワタシをカイチョーにプレゼント……です<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
# 「ニギヤカなリゾートもスキですが……静かな海もイイですね。星がキレイです」
line = "「ニギヤカなリゾートもスキですが……静かな海もイイですね。星がキレイです」"

[[dialogue]]
speaker = "リップル"
# 「モネとクリスマスのこと調べてオモイました。まだまだワタシの知らないコト、たくさんアリます」
line = "「モネとクリスマスのこと調べてオモイました。まだまだワタシの知らないコト、たくさんアリます」"

[[dialogue]]
speaker = "リップル"
# 「セカイのコト、恋のコト……そしてアナタのこと」
line = "「セカイのコト、恋のコト……そしてアナタのこと」"

[[dialogue]]
speaker = "リップル"
# 「カイチョーのこと、もっと知りたいです」
line = "「カイチョーのこと、もっと知りたいです」"

[[dialogue]]
speaker = "unk"
# 俺もリップルのこと、全部知りたい
line = "俺もリップルのこと、全部知りたい"

[[dialogue]]
speaker = "リップル"
# 「エヘヘ<emoji=heart04>　じゃあ同じキモチですね……<emoji=heart04>」
line = "「エヘヘ<emoji=heart04>　じゃあ同じキモチですね……<emoji=heart04>」"

[[dialogue]]
speaker = "リップル"
# 「ワタシが結界の外に出たトキ、カイチョーたちが学園に誘ってくれナカッたら、ワタシは今どこにいたんでしょうか」
line = "「ワタシが結界の外に出たトキ、カイチョーたちが学園に誘ってくれナカッたら、ワタシは今どこにいたんでしょうか」"

[[dialogue]]
speaker = "リップル"
# 「きっと学園に来ることはなくて、寮のミンナとも出会わなかったとオモイます。そしてカイチョーの隣にいるコトもありませんでした」
line = "「きっと学園に来ることはなくて、寮のミンナとも出会わなかったとオモイます。そしてカイチョーの隣にいるコトもありませんでした」"

[[dialogue]]
speaker = "リップル"
# 「だからアリガトございます、カイチョー。楽しい学園生活を送れてるのは、アナタのおかげです」
line = "「だからアリガトございます、カイチョー。楽しい学園生活を送れてるのは、アナタのおかげです」"

[[dialogue]]
speaker = "リップル"
# 「カイチョー、ＢＩＧＢＩＧダイスキです<emoji=heart04>　……ちゅっ<emoji=heart04>」
line = "「カイチョー、ＢＩＧＢＩＧダイスキです<emoji=heart04>　……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 紺碧の空と海に見守られながら、もう一度キスを交わした。
line = "紺碧の空と海に見守られながら、もう一度キスを交わした。"
