[[dialogue]]
speaker = "unk"
# 第２話,守護天使、味を知る,P
line = "第２話,守護天使、味を知る,P"

[[dialogue]]
speaker = "unk"
# ある日の放課後。義体を得たアルモが人間界を観光してみたいというので、俺とアニマ先輩は付き添って街へとやって来た。
line = "ある日の放課後。義体を得たアルモが人間界を観光してみたいというので、俺とアニマ先輩は付き添って街へとやって来た。"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふむ、これが人の子が発展させた街並みか。見事なものだ」
line = "「ふむ、これが人の子が発展させた街並みか。見事なものだ」"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　百聞は一見に如かずとも言う。通常の天使を模した肉体で実際に感じる情報は、長い時を生きてきた守護天使であっても新鮮に感じるのではないカ、アルモたん？」
line = "「フヒ♪　百聞は一見に如かずとも言う。通常の天使を模した肉体で実際に感じる情報は、長い時を生きてきた守護天使であっても新鮮に感じるのではないカ、アルモたん？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「然り。改めて見事な義体だ、アニマ。肉体だけでなく、精神もまた通常の天使に近くなっているようだ。我は今、感動というものを味わっている」
line = "「然り。改めて見事な義体だ、アニマ。肉体だけでなく、精神もまた通常の天使に近くなっているようだ。我は今、感動というものを味わっている」"

[[dialogue]]
speaker = "unk"
# なら、人間界の楽しいことをたくさん体験しないとね
line = "なら、人間界の楽しいことをたくさん体験しないとね"

[[dialogue]]
speaker = "アルモタヘル"
# 「ああ、今日は我に人の文化について色々と教えて欲しい」
line = "「ああ、今日は我に人の文化について色々と教えて欲しい」"

[[dialogue]]
speaker = "アルモタヘル"
# 「む？　くんくん……何か良き匂いがするな……？」
line = "「む？　くんくん……何か良き匂いがするな……？」"

[[dialogue]]
speaker = "アニマ"
# 「どうやら、あそこに出店している屋台からのようだナ。ケバブサンドを路上販売しているみたいダ♪」
line = "「どうやら、あそこに出店している屋台からのようだナ。ケバブサンドを路上販売しているみたいダ♪」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ケバブサンド？　何かの食べ物か？」
line = "「ケバブサンド？　何かの食べ物か？」"

[[dialogue]]
speaker = "アニマ"
# 「調味料で味付けした肉を大きな串に刺し、あのように回転させながら火を通ス。肉を包丁で削り取り、生野菜と一緒にピタパンという生地に挟んで食べるものダ」
line = "「調味料で味付けした肉を大きな串に刺し、あのように回転させながら火を通ス。肉を包丁で削り取り、生野菜と一緒にピタパンという生地に挟んで食べるものダ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「おお……何だかわからぬが、腹が鳴り出した。これは確か、空腹の合図であったか？」
line = "「おお……何だかわからぬが、腹が鳴り出した。これは確か、空腹の合図であったか？」"

[[dialogue]]
speaker = "unk"
# ちなみに、アルモの義体は物を食べられるの？
line = "ちなみに、アルモの義体は物を食べられるの？"

[[dialogue]]
speaker = "アニマ"
# 「ああ、もちろんダ。味覚も再現してあるし、食べた物は霊力に変換することが出来る」
line = "「ああ、もちろんダ。味覚も再現してあるし、食べた物は霊力に変換することが出来る」"

[[dialogue]]
speaker = "アニマ"
# 「逆に食べなくとも、霊力を変換すれば空腹を満たすことが出来るが……それを言うのは野暮というものダロウ。せっかくだしアルモたん、ケバブを食べてみるカ？」
line = "「逆に食べなくとも、霊力を変換すれば空腹を満たすことが出来るが……それを言うのは野暮というものダロウ。せっかくだしアルモたん、ケバブを食べてみるカ？」"

[[dialogue]]
speaker = "アルモタヘル"
# 「然り。人の子の食文化を理解する為にも、我はケバブとやらを所望する」
line = "「然り。人の子の食文化を理解する為にも、我はケバブとやらを所望する」"

[[dialogue]]
speaker = "屋台の店主"
# 「まいどあり！　姉ちゃん美人だから、特別サービスで大盛りにしといたぜ！」
line = "「まいどあり！　姉ちゃん美人だから、特別サービスで大盛りにしといたぜ！」"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ、店主よ、感謝する。実際に手に持つと、やはり良き匂いだ」
line = "「うむ、店主よ、感謝する。実際に手に持つと、やはり良き匂いだ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「それではいざ、初めての食事を体験してみるとしよう。もぐもぐ……」
line = "「それではいざ、初めての食事を体験してみるとしよう。もぐもぐ……」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ほほう、なるほど。これが味わうということか」
line = "「ほほう、なるほど。これが味わうということか」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ふっ……」
line = "「ふっ……」"

[[dialogue]]
speaker = "unk"
# アルモたぁぁぁ────んッ！！？
line = "アルモたぁぁぁ────んッ！！？"

[[dialogue]]
speaker = "アニマ"
# 「これは予想外の反応ダ。食事で感情が昂ぶった結果、溢れた霊力が爆発という形でそれを表現したというわけカ。フヒヒッ、これは興味深イ」
line = "「これは予想外の反応ダ。食事で感情が昂ぶった結果、溢れた霊力が爆発という形でそれを表現したというわけカ。フヒヒッ、これは興味深イ」"

[[dialogue]]
speaker = "アルモタヘル"
# 「──我は美味という言葉の意味自体は知っていた。だが、それが一体どういうことなのか、わかっていなかった」
line = "「──我は美味という言葉の意味自体は知っていた。だが、それが一体どういうことなのか、わかっていなかった」"

[[dialogue]]
speaker = "unk"
# 何事もなかったかのように着地した！？
line = "何事もなかったかのように着地した！？"

[[dialogue]]
speaker = "アルモタヘル"
# 「……我は今ならば、はっきりと告げることが出来る。美味とはこの、思わず爆発して吹き飛んでしまうような感情のことだと」
line = "「……我は今ならば、はっきりと告げることが出来る。美味とはこの、思わず爆発して吹き飛んでしまうような感情のことだと」"

[[dialogue]]
speaker = "アルモタヘル"
# 「もはや仔細は語るに及ばず。人の子がなぜ食文化を発展させてきたのか、我は心にて理解した」
line = "「もはや仔細は語るに及ばず。人の子がなぜ食文化を発展させてきたのか、我は心にて理解した」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ケバブ、実に美味だ！」
line = "「ケバブ、実に美味だ！」"

[[dialogue]]
speaker = "アニマ"
# 「実はアバターの味覚は強化してあってネ。その性能はプロの料理人の舌に匹敵する」
line = "「実はアバターの味覚は強化してあってネ。その性能はプロの料理人の舌に匹敵する」"

[[dialogue]]
speaker = "unk"
# どうして味覚の強化を？
line = "どうして味覚の強化を？"

[[dialogue]]
speaker = "アニマ"
# 「フヒ♪　そんなもの、趣味に決まっているダロウ？　せっかく守護天使のアバターを作るのだから、性能は盛れるだけ盛るに限ル」
line = "「フヒ♪　そんなもの、趣味に決まっているダロウ？　せっかく守護天使のアバターを作るのだから、性能は盛れるだけ盛るに限ル」"

[[dialogue]]
speaker = "アニマ"
# 「ちなみに盛ったのは味覚だけではなく、その他の五感、あらゆる身体能力も同様ダ。いずれも通常の天使を上回り、いわゆる超人仕様にしてある。どうダ、凄かろう？」
line = "「ちなみに盛ったのは味覚だけではなく、その他の五感、あらゆる身体能力も同様ダ。いずれも通常の天使を上回り、いわゆる超人仕様にしてある。どうダ、凄かろう？」"

[[dialogue]]
speaker = "unk"
# 先輩は頭のネジがぶっ飛んでるのでは！？
line = "先輩は頭のネジがぶっ飛んでるのでは！？"

[[dialogue]]
speaker = "アルモタヘル"
# 「アニマよ、もぐもぐ……お前の作り上げた義体のおかげで、もぐ……我は食の喜びを味わうことが出来た。もぐもぐ……感謝する」
line = "「アニマよ、もぐもぐ……お前の作り上げた義体のおかげで、もぐ……我は食の喜びを味わうことが出来た。もぐもぐ……感謝する」"

[[dialogue]]
speaker = "アルモタヘル"
# 「もぐもぐ……ごっくん。……店主よ、美味であった。もう１つ所望する」
line = "「もぐもぐ……ごっくん。……店主よ、美味であった。もう１つ所望する」"

[[dialogue]]
speaker = "屋台の店主"
# 「へい、６６個目まいどあり！」
line = "「へい、６６個目まいどあり！」"

[[dialogue]]
speaker = "アニマ"
# 「６６個目！？　幾らなんでも食べ過ぎではないかネ！？　アニマが義体の解説している合間に、店のケバブが粗方消え去っているゾ！？」
line = "「６６個目！？　幾らなんでも食べ過ぎではないかネ！？　アニマが義体の解説している合間に、店のケバブが粗方消え去っているゾ！？」"

[[dialogue]]
speaker = "屋台の店主"
# 「良い食いっぷりだ、姉ちゃん。割引しとくぜ（親指をグッと立てる）」
line = "「良い食いっぷりだ、姉ちゃん。割引しとくぜ（親指をグッと立てる）」"

[[dialogue]]
speaker = "アルモタヘル"
# 「ああ、店主よ。明日もまた食べに来るぞ（真似して親指を立てる）」
line = "「ああ、店主よ。明日もまた食べに来るぞ（真似して親指を立てる）」"

[[dialogue]]
speaker = "unk"
# 明日も！？
line = "明日も！？"

[[dialogue]]
speaker = "アニマ"
# 「……フヒ、会長」
line = "「……フヒ、会長」"

[[dialogue]]
speaker = "アニマ"
# 「──アニマはもしかすると、とんでもないものを作り出してしまったのかもしれなイ（遠い目）」
line = "「──アニマはもしかすると、とんでもないものを作り出してしまったのかもしれなイ（遠い目）」"

[[dialogue]]
speaker = "unk"
# 胃袋も超人仕様にしたりするから……
line = "胃袋も超人仕様にしたりするから……"

[[dialogue]]
speaker = "アルモタヘル"
# 「うむ……ケバブ、すべて美味であった」
line = "「うむ……ケバブ、すべて美味であった」"

[[dialogue]]
speaker = "アルモタヘル"
# 「２人とも。店主にこの街の、美味な肉料理の店を教えてもらった」
line = "「２人とも。店主にこの街の、美味な肉料理の店を教えてもらった」"

[[dialogue]]
speaker = "アルモタヘル"
# 「さあ、改めて観光に出発だ。お供せよ！」
line = "「さあ、改めて観光に出発だ。お供せよ！」"

[[dialogue]]
speaker = "unk"
# 目をキラキラと輝かせるアルモ。この日を境に、アルモは補給と称してケバブを常備するようになるのだった。
line = "目をキラキラと輝かせるアルモ。この日を境に、アルモは補給と称してケバブを常備するようになるのだった。"
