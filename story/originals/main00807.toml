line = "せっかくの苦労が何も報われず──ただただ希望の光が打ち砕かれたことに、ヴィーナスは取り乱していた。"

[[dialogue]]
speaker = "クロト"
# 「……落ち着いて。何かを失ったわけじゃないんだ、プラスに捉えよう」
line = "「……落ち着いて。何かを失ったわけじゃないんだ、プラスに捉えよう」"

[[dialogue]]
speaker = "クロト"
# 「ここにいた竜は──いずれ外界にも飛び出しかねない脅威だった。それを打ち倒せただけでも、今は十分じゃないか？」
line = "「ここにいた竜は──いずれ外界にも飛び出しかねない脅威だった。それを打ち倒せただけでも、今は十分じゃないか？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「──十分なはずないわ。リクリエだって、アポロだって、何も解決していないもの」
line = "「──十分なはずないわ。リクリエだって、アポロだって、何も解決していないもの」"

[[dialogue]]
speaker = "ヴィーナス"
# 「せっかく、クロトが体を張って私を助けてくれたのに──手がかりのひとつもくれないなんて……！」
line = "「せっかく、クロトが体を張って私を助けてくれたのに──手がかりのひとつもくれないなんて……！」"

[[dialogue]]
speaker = "クロト"
# 「確かに──進展はあったほうがいいに決まってる。……でもそんなのは、もともと保証のないことだろう」
line = "「確かに──進展はあったほうがいいに決まってる。……でもそんなのは、もともと保証のないことだろう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「保証はあるわよ！　日誌にちゃんと書かれてたんだから！」
line = "「保証はあるわよ！　日誌にちゃんと書かれてたんだから！」"

[[dialogue]]
speaker = "unk"
# 俺には彼女の気持ちがわかる気がした。
line = "俺には彼女の気持ちがわかる気がした。"

[[dialogue]]
speaker = "unk"
# そして、だからこそ、伝えてやらなきゃいけなかった。
