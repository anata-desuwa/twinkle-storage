speaker = "クロト"
# 「日誌を頼るのは、もうやめよう」
line = "「日誌を頼るのは、もうやめよう」"

[[dialogue]]
speaker = "ヴィーナス"
# 「────」
line = "「────」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なんで……どうして？」
line = "「なんで……どうして？」"

[[dialogue]]
speaker = "クロト"
# 「危険だからだ。確証のない情報に踊らされることは」
line = "「危険だからだ。確証のない情報に踊らされることは」"

[[dialogue]]
speaker = "ヴィーナス"
# 「危険……って。そんなことないわ──何もないより、方針のあったほうがいいでしょ？」
line = "「危険……って。そんなことないわ──何もないより、方針のあったほうがいいでしょ？」"

[[dialogue]]
speaker = "クロト"
# 「いいや、危険だ。君はさっき──わざわざ逆鱗を狙うために煌竜の喉元にまで迫った。そこが弱点と聞いていたから」
line = "「いいや、危険だ。君はさっき──わざわざ逆鱗を狙うために煌竜の喉元にまで迫った。そこが弱点と聞いていたから」"

[[dialogue]]
speaker = "クロト"
# 「でも実際には違った。あの行為は──竜にとって、ブレスの格好の餌食だった」
line = "「でも実際には違った。あの行為は──竜にとって、ブレスの格好の餌食だった」"

[[dialogue]]
speaker = "アナ"
# 「……そうですね。前会長はあの場面、明らかな悪手を選んでいました」
line = "「……そうですね。前会長はあの場面、明らかな悪手を選んでいました」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私が……間違ってたっていうの……？」
line = "「私が……間違ってたっていうの……？」"

