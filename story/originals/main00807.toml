line = "「せっかくみんなで必死に戦ったのに──何もないなんて、ありえないわ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「このままで終わっちゃうなら、フィオナは──フィオナのお姉さんはどうなるの？」
line = "「このままで終わっちゃうなら、フィオナは──フィオナのお姉さんはどうなるの？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「どうして──どうして何も答えてくれないのよ……っ！」
line = "「どうして──どうして何も答えてくれないのよ……っ！」"

[[dialogue]]
speaker = "フィオナ"
# 「ヴィーナス、さん……」
