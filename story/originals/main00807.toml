speaker = "クロト"
# 「間違ってたのはヴィーナスじゃない。その本だ」
line = "「間違ってたのはヴィーナスじゃない。その本だ」"

[[dialogue]]
speaker = "クロト"
# 「これからは誰にとっても予想のできない未来が待ってる。日誌の記述が現実と食い違ってきているのも、その兆候だろう」
line = "「これからは誰にとっても予想のできない未来が待ってる。日誌の記述が現実と食い違ってきているのも、その兆候だろう」"

[[dialogue]]
speaker = "クロト"
# 「だからこそ──俺たちは自分の足で歩いてかなきゃならないんだ」
