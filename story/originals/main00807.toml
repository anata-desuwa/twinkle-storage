line = "「《流れ星の魔王》を<ruby>縛<rt>いまし</rt></ruby>めから解き放つんだって──ちゃんと書いてあったじゃない……！？」"

[[dialogue]]
speaker = "unk"
# 必死に日誌をめくるヴィーナス。
line = "必死に日誌をめくるヴィーナス。"

[[dialogue]]
speaker = "unk"
