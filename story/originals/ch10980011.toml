[[dialogue]]
speaker = "unk"
# 第１話,ガチョウの雛鳥たち,P
line = "第１話,ガチョウの雛鳥たち,P"

[[dialogue]]
speaker = "unk"
# 今日は星徒会活動がないので、真っ直ぐ帰ろうとすると──
line = "今日は星徒会活動がないので、真っ直ぐ帰ろうとすると──"

[[dialogue]]
speaker = "ヒマワリ"
# 「あっ、会長さんだ！」
line = "「あっ、会長さんだ！」"

[[dialogue]]
speaker = "ミウ"
# 「お疲れさまです。今日は早いお帰りなんですね」
line = "「お疲れさまです。今日は早いお帰りなんですね」"

[[dialogue]]
speaker = "unk"
# ２人は附属生の鈴野ヒマワリと深沢ミウ。
line = "２人は附属生の鈴野ヒマワリと深沢ミウ。"

[[dialogue]]
speaker = "unk"
# セナリィに心酔するあまり、彼女の設立した秘密結社『ゴールデングース』に新たに加入した見習い社員だ。
line = "セナリィに心酔するあまり、彼女の設立した秘密結社『ゴールデングース』に新たに加入した見習い社員だ。"

[[dialogue]]
speaker = "ヒマワリ"
# 「この前のお仕事ではお世話になりました！　会長さんって、やっぱりめちゃ強なんですねー！」
line = "「この前のお仕事ではお世話になりました！　会長さんって、やっぱりめちゃ強なんですねー！」"

[[dialogue]]
speaker = "unk"
# ゴールデングースとの合同任務で彼女たちと知り合い、それ以降、すれ違う度に声をかけられる程度の仲には進展している。
line = "ゴールデングースとの合同任務で彼女たちと知り合い、それ以降、すれ違う度に声をかけられる程度の仲には進展している。"

[[dialogue]]
speaker = "ヒマワリ"
# 「ところで会長さん、小腹空いてませんか？」
line = "「ところで会長さん、小腹空いてませんか？」"

[[dialogue]]
speaker = "unk"
# お腹ペコペコだ
line = "お腹ペコペコだ"

[[dialogue]]
speaker = "ヒマワリ"
# 「やった！　頼れる援軍の到着だー！」
line = "「やった！　頼れる援軍の到着だー！」"

[[dialogue]]
speaker = "unk"
# 援軍？
line = "援軍？"

[[dialogue]]
speaker = "ヒマワリ"
# 「あたしたち、今からファーストフードに行くんですけど会長さんもいかがです？」
line = "「あたしたち、今からファーストフードに行くんですけど会長さんもいかがです？」"

[[dialogue]]
speaker = "ミウ"
# 「私はヒマワリちゃんの付き添いです。夕飯前にファーストフードなんて太っちゃうから、控えたいんですけど……」
line = "「私はヒマワリちゃんの付き添いです。夕飯前にファーストフードなんて太っちゃうから、控えたいんですけど……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「お金ならご心配なく！　全部あたしが奢りますんで！　胃袋を借りたいんです！」
line = "「お金ならご心配なく！　全部あたしが奢りますんで！　胃袋を借りたいんです！」"

[[dialogue]]
speaker = "ミウ"
# 「今、ラッキーセットのオマケが、ボンバーロボなんですけど……ご存じですか？　日曜日の朝にやってる特撮番組なんですけど」
line = "「今、ラッキーセットのオマケが、ボンバーロボなんですけど……ご存じですか？　日曜日の朝にやってる特撮番組なんですけど」"

[[dialogue]]
speaker = "ヒマワリ"
# 「全８種のパーツを集めないと爆裂無敵合体できないんで、コンプ狙ってるんです！　なので、手伝ってください！」
line = "「全８種のパーツを集めないと爆裂無敵合体できないんで、コンプ狙ってるんです！　なので、手伝ってください！」"

[[dialogue]]
speaker = "ミウ"
# 「８種類がランダムなんで、数をこなさなきゃいけないんです。３日連続通ってるんですけど、あと２つがどうしても出てくれなくて……」
line = "「８種類がランダムなんで、数をこなさなきゃいけないんです。３日連続通ってるんですけど、あと２つがどうしても出てくれなくて……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「コンプするまで思う存分食べていいですからね！」
line = "「コンプするまで思う存分食べていいですからね！」"

[[dialogue]]
speaker = "unk"
# ヒマワリの熱量に負けて、ファーストフード店に同行することにした。
line = "ヒマワリの熱量に負けて、ファーストフード店に同行することにした。"

[[dialogue]]
speaker = "ミウ"
# 「もぐもぐ……ごめん、ヒマワリちゃん。私もうギブアップ……」
line = "「もぐもぐ……ごめん、ヒマワリちゃん。私もうギブアップ……」"

[[dialogue]]
speaker = "ヒマワリ"
# 「もぐもぐ……けっぷ、右腕は出たから、残りは頭だけなのにー。やっぱり頭は封入率低いのかなぁ……うぅ、あたしも、もうギブ……」
line = "「もぐもぐ……けっぷ、右腕は出たから、残りは頭だけなのにー。やっぱり頭は封入率低いのかなぁ……うぅ、あたしも、もうギブ……」"

[[dialogue]]
speaker = "ミウ"
# 「ヒマワリちゃん、ネットでバラで買うとかじゃダメなの？」
line = "「ヒマワリちゃん、ネットでバラで買うとかじゃダメなの？」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ダメに決まってるでしょ！　自分で引かなきゃ意味ないの！」
line = "「ダメに決まってるでしょ！　自分で引かなきゃ意味ないの！」"

[[dialogue]]
speaker = "unk"
# あ、あと１セット行くぞ……！
line = "あ、あと１セット行くぞ……！"

[[dialogue]]
speaker = "ヒマワリ"
# 「うぅ、ありがとうございます、会長さん……！」
line = "「うぅ、ありがとうございます、会長さん……！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「んっ！？　これは今までと違う手触り！　この突起は、もしかして！」
line = "「んっ！？　これは今までと違う手触り！　この突起は、もしかして！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「やったー！　頭部パーツだ！　これでボンバーロボコンプリート！」
line = "「やったー！　頭部パーツだ！　これでボンバーロボコンプリート！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「ありがとうございます、会長さんの引きのおかげです！　ミウもありがとうね！」
line = "「ありがとうございます、会長さんの引きのおかげです！　ミウもありがとうね！」"

[[dialogue]]
speaker = "ミウ"
# 「良かったね、ヒマワリちゃん」
line = "「良かったね、ヒマワリちゃん」"

[[dialogue]]
speaker = "ヒマワリ"
# 「うんっ！　部屋に帰ったら、組み立てて飾ろうっと！」
line = "「うんっ！　部屋に帰ったら、組み立てて飾ろうっと！」"

[[dialogue]]
speaker = "unk"
# おめでとう、ヒマワリ。はい、ハンバーガー代
line = "おめでとう、ヒマワリ。はい、ハンバーガー代"

[[dialogue]]
speaker = "ヒマワリ"
# 「えっ、払わなくていいんですって！　あたしのわがままに付き合ってもらったんですから」
line = "「えっ、払わなくていいんですって！　あたしのわがままに付き合ってもらったんですから」"

[[dialogue]]
speaker = "unk"
# たまたまラッキーセットを５つ食べたかっただけだから
line = "たまたまラッキーセットを５つ食べたかっただけだから"

[[dialogue]]
speaker = "ヒマワリ"
# 「なにそれ！　カッコよ！　でも、ここで受け取ったら負けなんで！」
line = "「なにそれ！　カッコよ！　でも、ここで受け取ったら負けなんで！」"

[[dialogue]]
speaker = "unk"
# いやいや、受け取って
line = "いやいや、受け取って"

[[dialogue]]
speaker = "ヒマワリ"
# 「いやいや、もらえません」
line = "「いやいや、もらえません」"

[[dialogue]]
speaker = "ミウ"
# 「それじゃ私がもらっちゃおうかなー」
line = "「それじゃ私がもらっちゃおうかなー」"

[[dialogue]]
speaker = "ヒマワリ"
# 「なんでミウが持ってくねーん！　あはは！」
line = "「なんでミウが持ってくねーん！　あはは！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「どうしても、っていうなら受け取りますけど……それじゃ、あたしは会長さんに借り１です！」
line = "「どうしても、っていうなら受け取りますけど……それじゃ、あたしは会長さんに借り１です！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「この借りはいつか絶対に返しますんで！　覚えとけ！」
line = "「この借りはいつか絶対に返しますんで！　覚えとけ！」"

[[dialogue]]
speaker = "ミウ"
# 「ふふっ、ヒマワリちゃん、それ悪役の捨て台詞みたい」
line = "「ふふっ、ヒマワリちゃん、それ悪役の捨て台詞みたい」"

[[dialogue]]
speaker = "ヒマワリ"
# 「なんたって、あたしはセナリィ社長率いるゴールデングースの一員だからね！」
line = "「なんたって、あたしはセナリィ社長率いるゴールデングースの一員だからね！」"

[[dialogue]]
speaker = "ヒマワリ"
# 「とゆーわけで、会長さん、困ったこととかあたしにしてほしいことがあったら、いつでも言ってくださいね！　汚れ仕事でもなんでもやりますんで！」
line = "「とゆーわけで、会長さん、困ったこととかあたしにしてほしいことがあったら、いつでも言ってくださいね！　汚れ仕事でもなんでもやりますんで！」"

[[dialogue]]
speaker = "unk"
# こうして、数千カロリーと引き換えに心強い味方を得たのだった。
line = "こうして、数千カロリーと引き換えに心強い味方を得たのだった。"
