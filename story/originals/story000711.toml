[[dialogue]]
speaker = "unk"
# 初詣の後日、俺はサーシャさんと一緒に星徒会室で仕事をしていた――
line = "初詣の後日、俺はサーシャさんと一緒に星徒会室で仕事をしていた――"

[[dialogue]]
speaker = "サーシャ"
# 「会長くん、この書類のチェックをお願いしてもいいかしら？」
line = "「会長くん、この書類のチェックをお願いしてもいいかしら？」"

[[dialogue]]
speaker = "unk"
# 正月休みに手伝って貰って、申し訳ないです
line = "正月休みに手伝って貰って、申し訳ないです"

[[dialogue]]
speaker = "サーシャ"
# 「うふふ♪　気にしなくていいのよ」
line = "「うふふ♪　気にしなくていいのよ」"

[[dialogue]]
speaker = "サーシャ"
# 「初詣の件、会長くんも協力してくれてたんでしょう？」
line = "「初詣の件、会長くんも協力してくれてたんでしょう？」"

[[dialogue]]
speaker = "サーシャ"
# 「そのお返しってわけじゃないけど、私は星徒会のお姉ちゃんなんだから、いくらでも手伝うわ♪」
line = "「そのお返しってわけじゃないけど、私は星徒会のお姉ちゃんなんだから、いくらでも手伝うわ♪」"

[[dialogue]]
speaker = "unk"
# その時、ふと手に持っていたボールペンを落としてしまう。
line = "その時、ふと手に持っていたボールペンを落としてしまう。"

[[dialogue]]
speaker = "unk"
# それを拾おうと、机の下にしゃがみ込んでいた――その時だった。
line = "それを拾おうと、机の下にしゃがみ込んでいた――その時だった。"

[[dialogue]]
speaker = "ソフィア"
# 「失礼します」
line = "「失礼します」"

[[dialogue]]
speaker = "サーシャ"
# 「あら、ソフィ♪　いらっしゃ～い」
line = "「あら、ソフィ♪　いらっしゃ～い」"

[[dialogue]]
speaker = "ソフィア"
# 「あ……♪」
line = "「あ……♪」"

[[dialogue]]
speaker = "ソフィア"
# 「おはようございます。姉さん<emoji=heart04>」
line = "「おはようございます。姉さん<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 俺もソフィアに挨拶しようとして、思いとどまる。
line = "俺もソフィアに挨拶しようとして、思いとどまる。"

[[dialogue]]
speaker = "unk"
# サーシャさんと話すソフィアの声色が、聞いたこともないほどデレデレだったからだ……
line = "サーシャさんと話すソフィアの声色が、聞いたこともないほどデレデレだったからだ……"

[[dialogue]]
speaker = "ソフィア"
# 「今日の交換日記を渡しにきました」
line = "「今日の交換日記を渡しにきました」"

[[dialogue]]
speaker = "サーシャ"
# 「ありがと～♪」
line = "「ありがと～♪」"

[[dialogue]]
speaker = "サーシャ"
# 「お姉ちゃん、交換日記のおかげでソフィと毎日会えて、本当に嬉しいわ～」
line = "「お姉ちゃん、交換日記のおかげでソフィと毎日会えて、本当に嬉しいわ～」"

[[dialogue]]
speaker = "ソフィア"
# 「ま、まあ……そういう約束なので」
line = "「ま、まあ……そういう約束なので」"

[[dialogue]]
speaker = "ソフィア"
# 「それで、姉さん。えっと……またいつもの、お願いしてもいいですか？」
line = "「それで、姉さん。えっと……またいつもの、お願いしてもいいですか？」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあらうふふ♪　ソフィ、こっちにいらっしゃい」
line = "「あらあらうふふ♪　ソフィ、こっちにいらっしゃい」"

[[dialogue]]
speaker = "ソフィア"
# 「はい……♪」
line = "「はい……♪」"

[[dialogue]]
speaker = "サーシャ"
# 「それじゃあ――」
line = "「それじゃあ――」"

[[dialogue]]
speaker = "サーシャ"
# 「はい♪　お姉ちゃんハグで、今日１日分のパワー注入～♪」
line = "「はい♪　お姉ちゃんハグで、今日１日分のパワー注入～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ん……♪　はぁぁ<emoji=heart04>　あっ、頭も撫でて、欲しいです……<emoji=heart04>」
line = "「ん……♪　はぁぁ<emoji=heart04>　あっ、頭も撫でて、欲しいです……<emoji=heart04>」"

[[dialogue]]
speaker = "サーシャ"
# 「ふふっ、甘えん坊さんね～♪　もちろんいいわよ。ほら、なでなで～♪」
line = "「ふふっ、甘えん坊さんね～♪　もちろんいいわよ。ほら、なでなで～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「はふぅ……<emoji=heart04>　姉さんのハグ、温かくて心もホットです……♪」
line = "「はふぅ……<emoji=heart04>　姉さんのハグ、温かくて心もホットです……♪」"

[[dialogue]]
speaker = "unk"
# （み、見たことないくらいデレデレしてる……！）
line = "（み、見たことないくらいデレデレしてる……！）"

[[dialogue]]
speaker = "unk"
# 机の影から様子を伺っていて、驚いてまたポロッとペンを落としてしまう。
line = "机の影から様子を伺っていて、驚いてまたポロッとペンを落としてしまう。"

[[dialogue]]
speaker = "ソフィア"
# 「え……！？」
line = "「え……！？」"

[[dialogue]]
speaker = "unk"
# しまったと思った時にはもう遅く、物音で振り向いたソフィアと、目が合ってしまい――
line = "しまったと思った時にはもう遅く、物音で振り向いたソフィアと、目が合ってしまい――"

[[dialogue]]
speaker = "ソフィア"
# 「か、会長さん！？　いたんですか！？」
line = "「か、会長さん！？　いたんですか！？」"

[[dialogue]]
speaker = "ソフィア"
# 「い、今のまさか、全部見られて……！？」
line = "「い、今のまさか、全部見られて……！？」"

[[dialogue]]
speaker = "ソフィア"
# 「あ、あああ～……！」
line = "「あ、あああ～……！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあら♪　ソフィ、顔が真っ赤になってるわよ？」
line = "「あらあら♪　ソフィ、顔が真っ赤になってるわよ？」"

[[dialogue]]
speaker = "ソフィア"
# 「ね、姉さん！　会長さんがいるの、わかってましたよね！？　なんで言ってくれなかったんですかっ！」
line = "「ね、姉さん！　会長さんがいるの、わかってましたよね！？　なんで言ってくれなかったんですかっ！」"

[[dialogue]]
speaker = "サーシャ"
# 「え？　でも――」
line = "「え？　でも――」"

[[dialogue]]
speaker = "サーシャ"
# 「昔のソフィはずっと今みたいな感じだったし、見られても別にいいんじゃないかしら？」
line = "「昔のソフィはずっと今みたいな感じだったし、見られても別にいいんじゃないかしら？」"

[[dialogue]]
speaker = "ソフィア"
# 「な……！」
line = "「な……！」"

[[dialogue]]
speaker = "ソフィア"
# 「なんでそういうこと言っちゃうんですか、姉さんのバカバカバカ～～～っ！！」
line = "「なんでそういうこと言っちゃうんですか、姉さんのバカバカバカ～～～っ！！」"

[[dialogue]]
speaker = "サーシャ"
# 「あら～♪　昔と違って、見られて恥ずかしがるソフィも可愛いわ～♪」
line = "「あら～♪　昔と違って、見られて恥ずかしがるソフィも可愛いわ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「か、会長さん！　さっきのはその、今まで姉さんとは距離を置いていた分、反動がきてるというか……！」
line = "「か、会長さん！　さっきのはその、今まで姉さんとは距離を置いていた分、反動がきてるというか……！」"

[[dialogue]]
speaker = "ソフィア"
# 「と、とにかく全部忘れて下さい！　失礼します～～～っ！」
line = "「と、とにかく全部忘れて下さい！　失礼します～～～っ！」"

[[dialogue]]
speaker = "サーシャ"
# 「あらあらうふふ♪　ソフィったら、行っちゃったわ～」
line = "「あらあらうふふ♪　ソフィったら、行っちゃったわ～」"

[[dialogue]]
speaker = "unk"
# あれから仲良さそうですね
line = "あれから仲良さそうですね"

[[dialogue]]
speaker = "サーシャ"
# 「ええ、みんなのおかげよ」
line = "「ええ、みんなのおかげよ」"

[[dialogue]]
speaker = "サーシャ"
# 「昔みたいに……ううん。昔より、もっと仲良くなれそうだわ♪」
line = "「昔みたいに……ううん。昔より、もっと仲良くなれそうだわ♪」"

[[dialogue]]
speaker = "unk"
# そう言って、サーシャさんは大切そうに、交換日記を胸に抱えるのだった――
line = "そう言って、サーシャさんは大切そうに、交換日記を胸に抱えるのだった――"
