[[dialogue]]
speaker = "unk"
# 第４話,厄災の封印,B
line = "第４話,厄災の封印,B"

[[dialogue]]
speaker = "unk"
# 俺はアポロと母さんに、デネブに渡ってくるまでの一部始終を語った。
line = "俺はアポロと母さんに、デネブに渡ってくるまでの一部始終を語った。"

[[dialogue]]
speaker = "unk"
# 俺の魔王の力の暴走と、ベガから来た梨緒との御前試合。
line = "俺の魔王の力の暴走と、ベガから来た梨緒との御前試合。"

[[dialogue]]
speaker = "unk"
# 極星学園の襲来と宣戦布告。ディザスターハンドとの遭遇。
line = "極星学園の襲来と宣戦布告。ディザスターハンドとの遭遇。"

[[dialogue]]
speaker = "unk"
# 俺たちアルタイルはデネブと戦わない道を選んだこと。
line = "俺たちアルタイルはデネブと戦わない道を選んだこと。"

[[dialogue]]
speaker = "unk"
# チナの装置を破壊した余波で、デネブにやってきたことなどを一通り説明した。
line = "チナの装置を破壊した余波で、デネブにやってきたことなどを一通り説明した。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「なんだ、自分たちの意志で乗り込んできたんじゃなかったのか。それは災難だったな」
line = "「なんだ、自分たちの意志で乗り込んできたんじゃなかったのか。それは災難だったな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「しかし『デネブと共にリクリエと戦う』か……お前らしいな。かっこいいじゃないか」
line = "「しかし『デネブと共にリクリエと戦う』か……お前らしいな。かっこいいじゃないか」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「レジスタンスとしても望ましい方針だ。できるだけ協力しよう」
line = "「レジスタンスとしても望ましい方針だ。できるだけ協力しよう」"

[[dialogue]]
speaker = "クロト"
# 「ああ、助かるよ」
line = "「ああ、助かるよ」"

[[dialogue]]
speaker = "リノ"
# 「だけど大きな手……ディザスターハンドについては初めて聞く情報ね」
line = "「だけど大きな手……ディザスターハンドについては初めて聞く情報ね」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしは一度接触したことがあるが……リクリエの使徒だった頃の話だし、１０年前だったからすっかり忘れていたな」
line = "「あたしは一度接触したことがあるが……リクリエの使徒だった頃の話だし、１０年前だったからすっかり忘れていたな」"

[[dialogue]]
speaker = "クロト"
# 「ディザスターハンドについては、俺たちも多くを知らない。今のところどう対処するのかも検討中だ」
line = "「ディザスターハンドについては、俺たちも多くを知らない。今のところどう対処するのかも検討中だ」"

[[dialogue]]
speaker = "ラクシャ"
# 「そのディザスターハンドの正体なんだけどさー」
line = "「そのディザスターハンドの正体なんだけどさー」"

[[dialogue]]
speaker = "梨緒"
# 「！　それは秘密にするはずじゃなかったのか……！？」
line = "「！　それは秘密にするはずじゃなかったのか……！？」"

[[dialogue]]
speaker = "unk"
# ラクシャの言葉に、梨緒の顔色が変わる。
line = "ラクシャの言葉に、梨緒の顔色が変わる。"

[[dialogue]]
speaker = "unk"
# ディザスターハンドの情報は梨緒からもたらされたもの。
line = "ディザスターハンドの情報は梨緒からもたらされたもの。"

[[dialogue]]
speaker = "unk"
# 俺たちより情報を持っていてもおかしくないが、ならどうして今まで黙っていたんだ？
line = "俺たちより情報を持っていてもおかしくないが、ならどうして今まで黙っていたんだ？"

[[dialogue]]
speaker = "ラクシャ"
# 「いつまでも隠しているわけにはいかないし、何とかする目途が立ったからね」
line = "「いつまでも隠しているわけにはいかないし、何とかする目途が立ったからね」"

[[dialogue]]
speaker = "ラクシャ"
# 「梨緒の口から言いたくないならボクが言うけど？」
line = "「梨緒の口から言いたくないならボクが言うけど？」"

[[dialogue]]
speaker = "梨緒"
# 「……いや、私が言おう」
line = "「……いや、私が言おう」"

[[dialogue]]
speaker = "梨緒"
# 「ディザスターハンドの正体……それはベガの君だ、緋宮クロト」
line = "「ディザスターハンドの正体……それはベガの君だ、緋宮クロト」"

[[dialogue]]
speaker = "クロト"
# 「──！？」
line = "「──！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「クロトが！？　ディザスターハンド！？」
line = "「クロトが！？　ディザスターハンド！？」"

[[dialogue]]
speaker = "梨緒"
# 「あのディザスターハンドは、魔王であった緋宮クロトがリクリエの側に堕ち、姿を変えたものだ」
line = "「あのディザスターハンドは、魔王であった緋宮クロトがリクリエの側に堕ち、姿を変えたものだ」"

[[dialogue]]
speaker = "クロト"
# 「じゃあ俺がベガを滅ぼしたのか？」
line = "「じゃあ俺がベガを滅ぼしたのか？」"

[[dialogue]]
speaker = "梨緒"
# 「ああ。だが平行世界の緋宮クロトはあくまで別人だ。君を責めるつもりはない」
line = "「ああ。だが平行世界の緋宮クロトはあくまで別人だ。君を責めるつもりはない」"

[[dialogue]]
speaker = "ラクシャ"
# 「今まで秘密にしていたのは、君がディザスターハンドになる可能性を少しでも減らすためだ」
line = "「今まで秘密にしていたのは、君がディザスターハンドになる可能性を少しでも減らすためだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「ヴィーナスが君に『魔王になる』と知らせたように、可能性を知ることでその未来に近づくことがあるからね」
line = "「ヴィーナスが君に『魔王になる』と知らせたように、可能性を知ることでその未来に近づくことがあるからね」"

[[dialogue]]
speaker = "ラクシャ"
# 「デネブのクロトは、平行世界を超える力で、ベガの自分がディザスターハンドになったことを知った」
line = "「デネブのクロトは、平行世界を超える力で、ベガの自分がディザスターハンドになったことを知った」"

[[dialogue]]
speaker = "ラクシャ"
# 「だからボクは彼に頼まれて、アルタイルの緋宮クロトがそうならないように監視してたんだ」
line = "「だからボクは彼に頼まれて、アルタイルの緋宮クロトがそうならないように監視してたんだ」"

[[dialogue]]
speaker = "ラクシャ"
# 「だけど隠すにも限界があるし、暴走する可能性があるのは危険だし、魔王ラクシスの力を一時的に封印してしまおうってわけ」
line = "「だけど隠すにも限界があるし、暴走する可能性があるのは危険だし、魔王ラクシスの力を一時的に封印してしまおうってわけ」"

[[dialogue]]
speaker = "unk"
# 魔王ラクシスの力は、世界を超え、可能性を収束させる力。
line = "魔王ラクシスの力は、世界を超え、可能性を収束させる力。"

[[dialogue]]
speaker = "unk"
# リクリエの打ち勝つには必要なものだが、今は暴走の危険がある爆弾と化していた。
line = "リクリエの打ち勝つには必要なものだが、今は暴走の危険がある爆弾と化していた。"

[[dialogue]]
speaker = "クロト"
# 「そんなことが可能なのか？　もちろんできるならありがたいが……」
line = "「そんなことが可能なのか？　もちろんできるならありがたいが……」"

[[dialogue]]
speaker = "ラクシャ"
# 「ヴィーナスはノヴァフォームになったことで、女神に近づいた。そしてボクの手には今、セイファートから取り返した女神テルルの力がある。これで準備は整った」
line = "「ヴィーナスはノヴァフォームになったことで、女神に近づいた。そしてボクの手には今、セイファートから取り返した女神テルルの力がある。これで準備は整った」"

[[dialogue]]
speaker = "ラクシャ"
# 「というわけでヴィーナス、ノヴァフォームになってくれる？　ラクシスの力を封印するのに必要なんだ」
line = "「というわけでヴィーナス、ノヴァフォームになってくれる？　ラクシスの力を封印するのに必要なんだ」"

[[dialogue]]
speaker = "ヴィーナス"
# 「変身すればいいのね？　……チェンジ・ノヴァフォーム！」
line = "「変身すればいいのね？　……チェンジ・ノヴァフォーム！」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「なったけど……どうすればいいの？」
line = "「なったけど……どうすればいいの？」"

[[dialogue]]
speaker = "ラクシャ"
# 「まずヴィーナスに女神の力を渡すね。そしたらヴィーナスは、鎖を巻き付けるイメージで力を注ぎ込んでみて」
line = "「まずヴィーナスに女神の力を渡すね。そしたらヴィーナスは、鎖を巻き付けるイメージで力を注ぎ込んでみて」"

[[dialogue]]
speaker = "unk"
# ラクシャの手から光の球が浮かび、それがヴィーナスの中に吸い込まれる。
line = "ラクシャの手から光の球が浮かび、それがヴィーナスの中に吸い込まれる。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「これが女神の……ママの力……。温かいけど、透き通るみたいな……不思議な感じね」
line = "「これが女神の……ママの力……。温かいけど、透き通るみたいな……不思議な感じね」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「じゃあやるわよ、クロト」
line = "「じゃあやるわよ、クロト」"

[[dialogue]]
speaker = "クロト"
# 「ああ、頼む」
line = "「ああ、頼む」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが俺の胸にそっと手を当てる。
line = "ヴィーナスが俺の胸にそっと手を当てる。"

[[dialogue]]
speaker = "unk"
# そしてヴィーナスが目をつむって念じると──
line = "そしてヴィーナスが目をつむって念じると──"

[[dialogue]]
speaker = "クロト"
# 「！」
line = "「！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの手から女神の力を注がれ、自分の中に白い光が広がる。
line = "ヴィーナスの手から女神の力を注がれ、自分の中に白い光が広がる。"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「どう、クロト？」
line = "「どう、クロト？」"

[[dialogue]]
speaker = "クロト"
# 「自分でもよくわからないな……」
line = "「自分でもよくわからないな……」"

[[dialogue]]
speaker = "ラクシャ"
# 「じゃあ、ちゃんと封印されてるか試してもらっていい？」
line = "「じゃあ、ちゃんと封印されてるか試してもらっていい？」"

[[dialogue]]
speaker = "unk"
# おそるおそる慎重に、軽くアクセルを踏むように力を解き放つ。
line = "おそるおそる慎重に、軽くアクセルを踏むように力を解き放つ。"

[[dialogue]]
speaker = "クロト"
# 「フロンティアドライブ──」
line = "「フロンティアドライブ──」"

[[dialogue]]
speaker = "unk"
# ………………
line = "………………"

[[dialogue]]
speaker = "クロト"
# 「……何も起きないな」
line = "「……何も起きないな」"

[[dialogue]]
speaker = "ラクシャ"
# 「うん、成功だね」
line = "「うん、成功だね」"

[[dialogue]]
speaker = "ラクシャ"
# 「女神の力による封印だから、解けるのも女神に準ずる者だけ。来るべき時が来たら、ヴィーナスが魔王の力を解き放ってね」
line = "「女神の力による封印だから、解けるのも女神に準ずる者だけ。来るべき時が来たら、ヴィーナスが魔王の力を解き放ってね」"

[[dialogue]]
speaker = "ヴィーナス（覚醒）"
# 「ええ、わかったわ。ふふ、やっぱりクロトには私が必要ね！」
line = "「ええ、わかったわ。ふふ、やっぱりクロトには私が必要ね！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……ふぅ。だけど一日に二度もノヴァフォームになったら、さすがに疲れるわ」
line = "「……ふぅ。だけど一日に二度もノヴァフォームになったら、さすがに疲れるわ」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう、ヴィーナス」
line = "「ありがとう、ヴィーナス」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いいのよ。言ったでしょ、パパの面倒を見るのは私の仕事だって」
line = "「いいのよ。言ったでしょ、パパの面倒を見るのは私の仕事だって」"

[[dialogue]]
speaker = "ラクシャ"
# 「だけど今封印したのはラクシスの力。リクリエの力は相変わらず暴走する可能性があるから、そこは注意してね」
line = "「だけど今封印したのはラクシスの力。リクリエの力は相変わらず暴走する可能性があるから、そこは注意してね」"

[[dialogue]]
speaker = "クロト"
# 「ああ、わかってる」
line = "「ああ、わかってる」"

[[dialogue]]
speaker = "unk"
# 俺の体に潜む爆弾はもう１つ。
line = "俺の体に潜む爆弾はもう１つ。"

[[dialogue]]
speaker = "unk"
# <ruby=ディザスターハンド>厄災の化身</ruby>となって世界を滅ぼさないように、気を抜いてはいけないと自戒するのだった。
line = "<ruby>厄災の化身<rt>ディザスターハンド</rt></ruby>となって世界を滅ぼさないように、気を抜いてはいけないと自戒するのだった。"
