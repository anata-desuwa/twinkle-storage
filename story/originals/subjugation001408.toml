[[dialogue]]
speaker = "unk"
# あれから俺たちはアステラに突入し、モンスターを撃滅した。
line = "あれから俺たちはアステラに突入し、モンスターを撃滅した。"

[[dialogue]]
speaker = "unk"
# そして──
line = "そして──"

[[dialogue]]
speaker = "unk"
# ………………
line = "………………"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "unk"
# ……
line = "……"

[[dialogue]]
speaker = "フィオナ"
# 「ルリエルー、ルリエルーっ？」
line = "「ルリエルー、ルリエルーっ？」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、フィオナ会長～。会長もビーチに遊びに来たんですかぁ～？」
line = "「あ、フィオナ会長～。会長もビーチに遊びに来たんですかぁ～？」"

[[dialogue]]
speaker = "フィオナ"
# 「ルリエルを呼びに来たの。ビーチに発生したモンスターを討伐して以来、毎日毎日こっちで遊び呆けてるって聞いたけど」
line = "「ルリエルを呼びに来たの。ビーチに発生したモンスターを討伐して以来、毎日毎日こっちで遊び呆けてるって聞いたけど」"

[[dialogue]]
speaker = "ルリエル"
# 「ただ遊んでるわけじゃないですよぉ～。これは特訓です！　遊べば遊ぶほど力を使いこなせるようになるってわかりましたから！」
line = "「ただ遊んでるわけじゃないですよぉ～。これは特訓です！　遊べば遊ぶほど力を使いこなせるようになるってわかりましたから！」"

[[dialogue]]
speaker = "フィオナ"
# 「いえ、緋宮会長の話によると、ただ遊べばいいというわけではなかったような……」
line = "「いえ、緋宮会長の話によると、ただ遊べばいいというわけではなかったような……」"

[[dialogue]]
speaker = "ルリエル"
# 「まーまー、細かいことはいいじゃないですかぁ。それよりフィオナ会長も水着に着替えて一緒に遊びましょうよ～」
line = "「まーまー、細かいことはいいじゃないですかぁ。それよりフィオナ会長も水着に着替えて一緒に遊びましょうよ～」"

[[dialogue]]
speaker = "ルリエル"
# 「聞きましたよぉ？　サーフィンにドはまりしてるんですよね？　毎朝こっそり海の様子を見に行って、良い波が来てるかどうか確認してるとかぁ」
line = "「聞きましたよぉ？　サーフィンにドはまりしてるんですよね？　毎朝こっそり海の様子を見に行って、良い波が来てるかどうか確認してるとかぁ」"

[[dialogue]]
speaker = "フィオナ"
# 「どどど、どうしてそれを……！　誰にもバレないように気を付けていたはずなのに……！」
line = "「どどど、どうしてそれを……！　誰にもバレないように気を付けていたはずなのに……！」"

[[dialogue]]
speaker = "フロレンシア"
# 「え……？　私の戦闘服を、ですか……？」
line = "「え……？　私の戦闘服を、ですか……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「は、はいっ。鍛錬のためにも、そのビキニを貸していただけませんかっ？」
line = "「は、はいっ。鍛錬のためにも、そのビキニを貸していただけませんかっ？」"

[[dialogue]]
speaker = "フロレンシア"
# 「え……ええと。話の筋がよく見えなくて……。無事に新しい力を扱えるようになったんじゃ……？」
line = "「え……ええと。話の筋がよく見えなくて……。無事に新しい力を扱えるようになったんじゃ……？」"

[[dialogue]]
speaker = "イクシリオン"
# 「確かにその通りです。でもまだまだ水着姿の自分に慣れないことは変わっていません」
line = "「確かにその通りです。でもまだまだ水着姿の自分に慣れないことは変わっていません」"

[[dialogue]]
speaker = "イクシリオン"
# 「だからこそ、フロレンシアさんのようにもっと露出度の高い水着を着てみたいんです……！　その方が興奮する──ではなく、鍛錬になりますからっ！」
line = "「だからこそ、フロレンシアさんのようにもっと露出度の高い水着を着てみたいんです……！　その方が興奮する──ではなく、鍛錬になりますからっ！」"

[[dialogue]]
speaker = "フロレンシア"
# 「そもそも私のこれは水着ではなくて……。もし付けたとしてもサイズが、その……。色々とはみ出しかねないと言いますか……」
line = "「そもそも私のこれは水着ではなくて……。もし付けたとしてもサイズが、その……。色々とはみ出しかねないと言いますか……」"

[[dialogue]]
speaker = "イクシリオン"
# 「はみ出し──っっ。が、<ruby=がぜん>俄然</ruby>興味が出てきてしまいました……！　お願いしますっ、少しの間で構いませんのでっ、是非っ、是非っ！」
line = "「はみ出し──っっ。が、<ruby>俄然<rt>がぜん</rt></ruby>興味が出てきてしまいました……！　お願いしますっ、少しの間で構いませんのでっ、是非っ、是非っ！」"

[[dialogue]]
speaker = "フロレンシア"
# 「わわわっ！？　引っ張らないでくださいっ！　脱げますっ、脱げちゃいますからぁ～！？」
line = "「わわわっ！？　引っ張らないでくださいっ！　脱げますっ、脱げちゃいますからぁ～！？」"

[[dialogue]]
speaker = "unk"
# やはり、はしゃぎすぎなのでは……？
line = "やはり、はしゃぎすぎなのでは……？"

[[dialogue]]
speaker = "ウィステリア"
# 「あはは……。ま、まぁオンとオフを切り替えるのも大切よ」
line = "「あはは……。ま、まぁオンとオフを切り替えるのも大切よ」"

[[dialogue]]
speaker = "ウィステリア"
# 「でも２人とも一皮剥けたんじゃない？　星力の制御ができなくて困ってるって、背中を丸めて頼ってきた時とは大違いよ」
line = "「でも２人とも一皮剥けたんじゃない？　星力の制御ができなくて困ってるって、背中を丸めて頼ってきた時とは大違いよ」"

[[dialogue]]
speaker = "ウィステリア"
# 「会長くんも表情が前より柔らかくなってるしね？　やっぱり知らず知らずの間に教官役のプレッシャーがあったみたいね」
line = "「会長くんも表情が前より柔らかくなってるしね？　やっぱり知らず知らずの間に教官役のプレッシャーがあったみたいね」"

[[dialogue]]
speaker = "unk"
# 緊張が解けたのはウィステリアさんのおかげですよ
line = "緊張が解けたのはウィステリアさんのおかげですよ"

[[dialogue]]
speaker = "ウィステリア"
# 「ふふ、お世辞でも嬉しいわね。会長くんはそうやっていつも笑っていた方がいいわ。私、会長くんの笑顔好きよ」
line = "「ふふ、お世辞でも嬉しいわね。会長くんはそうやっていつも笑っていた方がいいわ。私、会長くんの笑顔好きよ」"

[[dialogue]]
speaker = "ウィステリア"
# （って──わ、私、会長くんをまじまじ見つめて何を言っているのかしらっ？　笑顔が好き、なんてまるで告白じゃない……！）
line = "（って──わ、私、会長くんをまじまじ見つめて何を言っているのかしらっ？　笑顔が好き、なんてまるで告白じゃない……！）"

[[dialogue]]
speaker = "ウィステリア"
# （生徒をそういう目で見ちゃいけないって何度も自省してきたのに。……で、でも、今の私は休暇中だし、私は職員だけど教師じゃないし……）
line = "（生徒をそういう目で見ちゃいけないって何度も自省してきたのに。……で、でも、今の私は休暇中だし、私は職員だけど教師じゃないし……）"

[[dialogue]]
speaker = "ウィステリア"
# （気のせいかもしれないけれど、会長くんも私をじっと見つめてくれているような……。大胆な水着が功を奏しているのかしら……？）
line = "（気のせいかもしれないけれど、会長くんも私をじっと見つめてくれているような……。大胆な水着が功を奏しているのかしら……？）"

[[dialogue]]
speaker = "ウィステリア"
# （もしここで『暑いわね』とか呟けば、ワンチャン会長くんも『涼みに行きますか？』なんて答えてくれて、そのままもっと熱い恋にまで発展しちゃったり──）
line = "（もしここで『暑いわね』とか呟けば、ワンチャン会長くんも『涼みに行きますか？』なんて答えてくれて、そのままもっと熱い恋にまで発展しちゃったり──）"

[[dialogue]]
speaker = "イクシリオン"
# 「くんくん……なんだかインモラルな匂いがしますね」
line = "「くんくん……なんだかインモラルな匂いがしますね」"

[[dialogue]]
speaker = "ウィステリア"
# 「ひぃあ！？」
line = "「ひぃあ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「まーたウィステリアさん、会長さんのことを独り占めにして～！　あ、髪にワカメが付いてますよ？　泳いだ時にくっつけちゃったんですかぁ？」
line = "「まーたウィステリアさん、会長さんのことを独り占めにして～！　あ、髪にワカメが付いてますよ？　泳いだ時にくっつけちゃったんですかぁ？」"

[[dialogue]]
speaker = "ウィステリア"
# 「えっ、嘘っ！？　そんなギャグみたいな姿で私、会長くんとずっと話してたの……！？　じゃあ会長くんが私を見つめていたのは……」
line = "「えっ、嘘っ！？　そんなギャグみたいな姿で私、会長くんとずっと話してたの……！？　じゃあ会長くんが私を見つめていたのは……」"

[[dialogue]]
speaker = "unk"
# ツッコむにツッコめなくて……
line = "ツッコむにツッコめなくて……"

[[dialogue]]
speaker = "ウィステリア"
# 「うう、やっぱり私、呪われてるわ……。そんなバカみたいな格好で、会長くんの笑顔が好き、とか言って……。穴があったら入りたい……」
line = "「うう、やっぱり私、呪われてるわ……。そんなバカみたいな格好で、会長くんの笑顔が好き、とか言って……。穴があったら入りたい……」"

[[dialogue]]
speaker = "ルリエル"
# 「よくわかりませんが、パーッと行きましょうよ、パーッと！　せっかく海に遊びに来てるんですから！」
line = "「よくわかりませんが、パーッと行きましょうよ、パーッと！　せっかく海に遊びに来てるんですから！」"

[[dialogue]]
speaker = "フィオナ"
# 「もうルリエルったら……。でも、ふふ、そうだね。良い波も来てるみたいだし、私も水着に着替えて遊んじゃおうかな」
line = "「もうルリエルったら……。でも、ふふ、そうだね。良い波も来てるみたいだし、私も水着に着替えて遊んじゃおうかな」"

[[dialogue]]
speaker = "フロレンシア"
# 「熱中症と脱水症状には気を付けてくださいね。海にはハプニングが付きものですから、お怪我のないようにしてください」
line = "「熱中症と脱水症状には気を付けてくださいね。海にはハプニングが付きものですから、お怪我のないようにしてください」"

[[dialogue]]
speaker = "イクシリオン"
# 「そうですね……海にはハプニングが……泳いでる間に、ポロリしてしまったり……」
line = "「そうですね……海にはハプニングが……泳いでる間に、ポロリしてしまったり……」"

[[dialogue]]
speaker = "unk"
# ま、まぁ、今はバカンスを楽しもうか！
line = "ま、まぁ、今はバカンスを楽しもうか！"

[[dialogue]]
speaker = "ルリエル"
# 「よーし、じゃあまずはバーベキューから始めましょう！　その後はビーチバレーをして、あとあと、足が付く場所で泳いだりもしたいですぅ～！」
line = "「よーし、じゃあまずはバーベキューから始めましょう！　その後はビーチバレーをして、あとあと、足が付く場所で泳いだりもしたいですぅ～！」"

[[dialogue]]
speaker = "イクシリオン"
# 「あ、私もバーベキューしたいです！　大きなソーセージ焼きましょう、ソーセージ！」
line = "「あ、私もバーベキューしたいです！　大きなソーセージ焼きましょう、ソーセージ！」"

[[dialogue]]
speaker = "ルリエル"
# 「イクシーさんはどうしてそんなにソーセージ推しなのですか？　ソーセージ美味しいですけど……」
line = "「イクシーさんはどうしてそんなにソーセージ推しなのですか？　ソーセージ美味しいですけど……」"

[[dialogue]]
speaker = "unk"
# それからバーベキューをして、ビーチバレーもして、花火もして、とにかくいろいろして……夏の海をみんなで満喫したのだった。
line = "それからバーベキューをして、ビーチバレーもして、花火もして、とにかくいろいろして……夏の海をみんなで満喫したのだった。"
