[[dialogue]]
speaker = "unk"
# 第４話,第４話『打倒サンタ』,B
line = "第４話,第４話『打倒サンタ』,B"

[[dialogue]]
speaker = "unk"
# 基地から飛び出した２人が向かったのは──
line = "基地から飛び出した２人が向かったのは──"

[[dialogue]]
speaker = "クラウディア"
# 「むう、すごい人でごった返しておるぞ」
line = "「むう、すごい人でごった返しておるぞ」"

[[dialogue]]
speaker = "クラウディア"
# 「クリスマスセール……イルミネーション……フライドチキンフェア……歳末ふれあい運動……」
line = "「クリスマスセール……イルミネーション……フライドチキンフェア……歳末ふれあい運動……」"

[[dialogue]]
speaker = "クラウディア"
# 「うーむ──やはり人間界はすっかりクリスマス一色。実にゆゆしき事態であるぞ」
line = "「うーむ──やはり人間界はすっかりクリスマス一色。実にゆゆしき事態であるぞ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「歳末ふれあい運動は違うんじゃないかな？」
line = "「歳末ふれあい運動は違うんじゃないかな？」"

[[dialogue]]
speaker = "クラウディア"
# 「やはり憎きはサンタよ。余から主役の座を奪いおって」
line = "「やはり憎きはサンタよ。余から主役の座を奪いおって」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「──ねえね、クラウディア様」
line = "「──ねえね、クラウディア様」"

[[dialogue]]
speaker = "クラウディア"
# 「なんだ？」
line = "「なんだ？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「サンタサンタって言うけど……クラウディア様、サンタクロースがどういうものか知ってるの？」
line = "「サンタサンタって言うけど……クラウディア様、サンタクロースがどういうものか知ってるの？」"

[[dialogue]]
speaker = "クラウディア"
# 「ふうん、馬鹿にしてもらっては困るな。余だってそれくらい理解しておる」
line = "「ふうん、馬鹿にしてもらっては困るな。余だってそれくらい理解しておる」"

[[dialogue]]
speaker = "クラウディア"
# 「──おい！　そこのパッとしない<ruby=おなご>女子</ruby>よ！」
line = "「──おい！　そこのパッとしない<ruby>女子<rt>おなご</rt></ruby>よ！」"

[[dialogue]]
speaker = "マトイ"
# 「わ、私？　いきなりすごい失礼なこと言われた気がする」
line = "「わ、私？　いきなりすごい失礼なこと言われた気がする」"

[[dialogue]]
speaker = "マトイ"
# 「──って、ネビュラのお姫様じゃない！？」
line = "「──って、ネビュラのお姫様じゃない！？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「ごめんね～、ちょっと付き合ってあげて～」
line = "「ごめんね～、ちょっと付き合ってあげて～」"

[[dialogue]]
speaker = "クラウディア"
# 「靴下を履いているな？　お主の望むものを、余がそこにねじ込んでやろう！」
line = "「靴下を履いているな？　お主の望むものを、余がそこにねじ込んでやろう！」"

[[dialogue]]
speaker = "マトイ"
# 「どういうこと！？」
line = "「どういうこと！？」"

[[dialogue]]
speaker = "クラウディア"
# 「クリスマスはサンタにプレゼントを入れてもらうため、靴下を用意するのだ。つまり、こやつはプレゼントを欲しておる！」
line = "「クリスマスはサンタにプレゼントを入れてもらうため、靴下を用意するのだ。つまり、こやつはプレゼントを欲しておる！」"

[[dialogue]]
speaker = "クラウディア"
# 「そういうことであろう、ちぇちゅーりえ？」
line = "「そういうことであろう、ちぇちゅーりえ？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「さっすがクラウディア様！（たはは、ぶっ飛びすぎだぁ……けど面白そうだからそういうことにしとこう♪）」
line = "「さっすがクラウディア様！（たはは、ぶっ飛びすぎだぁ……けど面白そうだからそういうことにしとこう♪）」"

[[dialogue]]
speaker = "クラウディア"
# 「ともかくだ。余がお主にプレゼントをやるぞ」
line = "「ともかくだ。余がお主にプレゼントをやるぞ」"

[[dialogue]]
speaker = "マトイ"
# 「私、何も祝われるようなことはしてないけど」
line = "「私、何も祝われるようなことはしてないけど」"

[[dialogue]]
speaker = "クラウディア"
# 「サンタクロースはよい子にプレゼントを配るのだ。お主も、クリスマスには何かを望んでいるのだろう」
line = "「サンタクロースはよい子にプレゼントを配るのだ。お主も、クリスマスには何かを望んでいるのだろう」"

[[dialogue]]
speaker = "マトイ"
# 「うーん……さすがにもうサンタさんにお願いする歳じゃないと思ってるんだけど……」
line = "「うーん……さすがにもうサンタさんにお願いする歳じゃないと思ってるんだけど……」"

[[dialogue]]
speaker = "マトイ"
# 「でも、欲しいものはあるっちゃある──かな」
line = "「でも、欲しいものはあるっちゃある──かな」"

[[dialogue]]
speaker = "クラウディア"
# 「それでよい！　その願い、余がしかと聞き届けた」
line = "「それでよい！　その願い、余がしかと聞き届けた」"

[[dialogue]]
speaker = "クラウディア"
# 「そーれ……メリークラウディアバースデ～！」
line = "「そーれ……メリークラウディアバースデ～！」"

[[dialogue]]
speaker = "マトイ"
# 「わ、すごい光──」
line = "「わ、すごい光──」"

[[dialogue]]
speaker = "マトイ"
# 「スティックみたいなものが舞い降りて……」
line = "「スティックみたいなものが舞い降りて……」"

[[dialogue]]
speaker = "マトイ"
# 「これって──すりこぎ棒……！？」
line = "「これって──すりこぎ棒……！？」"

[[dialogue]]
speaker = "クラウディア"
# 「ふっ。お主はそれが欲しかったのだろう……？」
line = "「ふっ。お主はそれが欲しかったのだろう……？」"

[[dialogue]]
speaker = "マトイ"
# 「私が欲しかったのは、メレンゲを泡立ててくれるハンドミキサーだったんだけど……」
line = "「私が欲しかったのは、メレンゲを泡立ててくれるハンドミキサーだったんだけど……」"

[[dialogue]]
speaker = "クラウディア"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クラウディア"
# 「まあ、でも、これだってかき混ぜられるからよいではないか」
line = "「まあ、でも、これだってかき混ぜられるからよいではないか」"

[[dialogue]]
speaker = "マトイ"
# 「そう……かも……？」
line = "「そう……かも……？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「そうそう！　ごま団子とか作れるし、似たようなものさ」
line = "「そうそう！　ごま団子とか作れるし、似たようなものさ」"

[[dialogue]]
speaker = "マトイ"
# 「え、これくれるの？」
line = "「え、これくれるの？」"

[[dialogue]]
speaker = "クラウディア"
# 「もちろんだ！　プレゼントだからな！」
line = "「もちろんだ！　プレゼントだからな！」"

[[dialogue]]
speaker = "マトイ"
# 「ありがとう！　なんだか悪い気もするけど……」
line = "「ありがとう！　なんだか悪い気もするけど……」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「大丈夫。その代わり、１２月２５日はクラウディア様の誕生日ってことだけ覚えといて♪」
line = "「大丈夫。その代わり、１２月２５日はクラウディア様の誕生日ってことだけ覚えといて♪」"

[[dialogue]]
speaker = "マトイ"
# 「わ、わかった！」
line = "「わ、わかった！」"

[[dialogue]]
speaker = "クラウディア"
# 「わっはっは！　よし、次の現場へ向かうぞ！」
line = "「わっはっは！　よし、次の現場へ向かうぞ！」"

[[dialogue]]
speaker = "クラウディア"
# 「たのもーう！」
line = "「たのもーう！」"

[[dialogue]]
speaker = "ナミエル"
# 「──どちら様ですか」
line = "「──どちら様ですか」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「おやおや、可愛いメイドさんだねえ」
line = "「おやおや、可愛いメイドさんだねえ」"

[[dialogue]]
speaker = "ナミエル"
# 「今日、来客の予定はなかったはずですが……魔女の方々ですか？」
line = "「今日、来客の予定はなかったはずですが……魔女の方々ですか？」"

[[dialogue]]
speaker = "クラウディア"
# 「うむ。お主だけか？　今日は星見の娘はおらんのか？」
line = "「うむ。お主だけか？　今日は星見の娘はおらんのか？」"

[[dialogue]]
speaker = "ナミエル"
# 「本日、お嬢様は星徒会長業務により留守にしております。お戻りは夜になられるかと」
line = "「本日、お嬢様は星徒会長業務により留守にしております。お戻りは夜になられるかと」"

[[dialogue]]
speaker = "ナミエル"
# 「ご用件であれば、私がうかがっておきます」
line = "「ご用件であれば、私がうかがっておきます」"

[[dialogue]]
speaker = "クラウディア"
# 「<ruby=ことづて>言伝</ruby>というわけにはいかんのだ。こればかりは」
line = "「<ruby>言伝<rt>ことづて</rt></ruby>というわけにはいかんのだ。こればかりは」"

[[dialogue]]
speaker = "クラウディア"
# 「そうだ。別にこの際、お主でもよいぞ」
line = "「そうだ。別にこの際、お主でもよいぞ」"

[[dialogue]]
speaker = "ナミエル"
# 「？」
line = "「？」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「何か欲しいものはある？　クラウディア様がなんでもプレゼントしてくれるよ♪」
line = "「何か欲しいものはある？　クラウディア様がなんでもプレゼントしてくれるよ♪」"

[[dialogue]]
speaker = "ナミエル"
# 「そのような怪しい話に乗るわけにはいきません」
line = "「そのような怪しい話に乗るわけにはいきません」"

[[dialogue]]
speaker = "クラウディア"
# 「そう警戒するでない。あくまで１２月２５日のプレゼントをやるというだけだ」
line = "「そう警戒するでない。あくまで１２月２５日のプレゼントをやるというだけだ」"

[[dialogue]]
speaker = "ナミエル"
# 「ああ、クリスマスの」
line = "「ああ、クリスマスの」"

[[dialogue]]
speaker = "クラウディア"
# 「クリスマスではない！　１２月２５日は余の誕生日だから、サンタより先にプレゼントを配ってやるのだ」
line = "「クリスマスではない！　１２月２５日は余の誕生日だから、サンタより先にプレゼントを配ってやるのだ」"

[[dialogue]]
speaker = "ナミエル"
# 「なるほど……意味がわかりません。ですが、あなたなりの意図は把握しました」
line = "「なるほど……意味がわかりません。ですが、あなたなりの意図は把握しました」"

[[dialogue]]
speaker = "ナミエル"
# 「ただ、欲しいものをと言われても今すぐにはパッと思いつかないような……」
line = "「ただ、欲しいものをと言われても今すぐにはパッと思いつかないような……」"

[[dialogue]]
speaker = "クラウディア"
# 「欲しいものが思いつかない？　なんと無欲なやつだ。そんなことあるものか！」
line = "「欲しいものが思いつかない？　なんと無欲なやつだ。そんなことあるものか！」"

[[dialogue]]
speaker = "ナミエル"
# 「今の私はメイド──星見家に雇っていただけたことが、人生で最大の幸運でした。それ以上望むべきものなどありません」
line = "「今の私はメイド──星見家に雇っていただけたことが、人生で最大の幸運でした。それ以上望むべきものなどありません」"

[[dialogue]]
speaker = "クラウディア"
# 「それでもやりたいことくらいあるだろう。仕事をラクにしたいとか、自分だけの豪邸が欲しいとか！」
line = "「それでもやりたいことくらいあるだろう。仕事をラクにしたいとか、自分だけの豪邸が欲しいとか！」"

[[dialogue]]
speaker = "ナミエル"
# 「ありません」
line = "「ありません」"

[[dialogue]]
speaker = "クラウディア"
# 「な……なんだと……」
line = "「な……なんだと……」"

[[dialogue]]
speaker = "クラウディア"
# 「じゃ、じゃあたらふくステーキが食べたいとか、この世のおもちゃをかき集めたいとか！　ずっと野菜を摂らなくてもよいとか！」
line = "「じゃ、じゃあたらふくステーキが食べたいとか、この世のおもちゃをかき集めたいとか！　ずっと野菜を摂らなくてもよいとか！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「それはクラウディア様の好きなものでしょ」
line = "「それはクラウディア様の好きなものでしょ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「──それじゃ、趣味とかは？」
line = "「──それじゃ、趣味とかは？」"

[[dialogue]]
speaker = "ナミエル"
# 「屋敷の掃除をするくらいで」
line = "「屋敷の掃除をするくらいで」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「なるほど……確かにこれは難敵だね」
line = "「なるほど……確かにこれは難敵だね」"

[[dialogue]]
speaker = "クラウディア"
# 「欲しいものがないんじゃ、プレゼントのしようがないぞ」
line = "「欲しいものがないんじゃ、プレゼントのしようがないぞ」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「大丈夫だよクラウディア様。ホーリー・ベルなら振ればきっと答えてくれる」
line = "「大丈夫だよクラウディア様。ホーリー・ベルなら振ればきっと答えてくれる」"

[[dialogue]]
speaker = "クラウディア"
# 「本当だろうな……」
line = "「本当だろうな……」"

[[dialogue]]
speaker = "クラウディア"
# 「それ──メリークラウディアバースデー！」
line = "「それ──メリークラウディアバースデー！」"

[[dialogue]]
speaker = "ナミエル"
# 「！　光が──」
line = "「！　光が──」"

[[dialogue]]
speaker = "ナミエル"
# 「あっ、小さいガチョウのぬいぐるみ……これはちょっと嬉しいかもしれません」
line = "「あっ、小さいガチョウのぬいぐるみ……これはちょっと嬉しいかもしれません」"

[[dialogue]]
speaker = "クラウディア"
# 「ほう！　やはりか！」
line = "「ほう！　やはりか！」"

[[dialogue]]
speaker = "ツェツィーリエ"
# 「うんうん。ホーリー・ベルは相手の望みをしっかり拾ってくれるのさ」
line = "「うんうん。ホーリー・ベルは相手の望みをしっかり拾ってくれるのさ」"

[[dialogue]]
speaker = "ナミエル"
# 「私にとっての思い出の品は、ガチョウではありませんでしたが……それでもこのようなぬいぐるみを見るとホッとします」
line = "「私にとっての思い出の品は、ガチョウではありませんでしたが……それでもこのようなぬいぐるみを見るとホッとします」"

[[dialogue]]
speaker = "ナミエル"
# 「ありがとうございます。ご厚意は素直に受け取っておきましょう」
line = "「ありがとうございます。ご厚意は素直に受け取っておきましょう」"

[[dialogue]]
speaker = "クラウディア"
# 「ふっふっふ！　感謝するがよい」
line = "「ふっふっふ！　感謝するがよい」"

[[dialogue]]
speaker = "クラウディア"
# 「それもこれも余の誕生日が１２月２５日であるからだ！　そのことを忘れるでないぞ！」
line = "「それもこれも余の誕生日が１２月２５日であるからだ！　そのことを忘れるでないぞ！」"

[[dialogue]]
speaker = "ナミエル"
# 「なるほど……ご自身の誕生日だというのに、人にプレゼントを。ご立派な方のようです」
line = "「なるほど……ご自身の誕生日だというのに、人にプレゼントを。ご立派な方のようです」"

[[dialogue]]
speaker = "ナミエル"
# 「１２月２５日はあなたの誕生日……覚えておきます」
line = "「１２月２５日はあなたの誕生日……覚えておきます」"

[[dialogue]]
speaker = "クラウディア"
# 「そうだ！　それでよい！　余はサンタを超える光の魔女！」
line = "「そうだ！　それでよい！　余はサンタを超える光の魔女！」"

[[dialogue]]
speaker = "クラウディア"
# 「この格好の時点ですでに少々負けている気もするが……とにかく！　星見家でもよろしく頼んだぞ～！」
line = "「この格好の時点ですでに少々負けている気もするが……とにかく！　星見家でもよろしく頼んだぞ～！」"
