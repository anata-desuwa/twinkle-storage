[[dialogue]]
speaker = "unk"
# 第３話,お嬢様ＬＯＶＥ,P
line = "第３話,お嬢様ＬＯＶＥ,P"

[[dialogue]]
speaker = "unk"
# ある日の昼休み、カフェテリアで席を探していると――
line = "ある日の昼休み、カフェテリアで席を探していると――"

[[dialogue]]
speaker = "ヨミ"
# 「こや？　……会長！　お昼ご飯食べに来たんですか？」
line = "「こや？　……会長！　お昼ご飯食べに来たんですか？」"

[[dialogue]]
speaker = "閃"
# 「席を探しているなら、こちらでご一緒しませんか？」
line = "「席を探しているなら、こちらでご一緒しませんか？」"

[[dialogue]]
speaker = "閃"
# 「私もたまたまヨミと会って、せっかくだから一緒に食べようと話していたところなんです」
line = "「私もたまたまヨミと会って、せっかくだから一緒に食べようと話していたところなんです」"

[[dialogue]]
speaker = "unk"
# そういえば、２人は同僚になるんだっけ
line = "そういえば、２人は同僚になるんだっけ"

[[dialogue]]
speaker = "ヨミ"
# 「そうです！　閃先輩とは同じ九浄家メイド隊で、九浄家のお屋敷に住み込みで働かせてもらっている同士なんですよ」
line = "「そうです！　閃先輩とは同じ九浄家メイド隊で、九浄家のお屋敷に住み込みで働かせてもらっている同士なんですよ」"

[[dialogue]]
speaker = "閃"
# 「こうして年も近いですから、良い友人関係を築かせてもらっています」
line = "「こうして年も近いですから、良い友人関係を築かせてもらっています」"

[[dialogue]]
speaker = "ヨミ"
# 「なんか改まって、閃先輩に友達って言って貰えると、照れちゃいますね。えへへ……♪」
line = "「なんか改まって、閃先輩に友達って言って貰えると、照れちゃいますね。えへへ……♪」"

[[dialogue]]
speaker = "unk"
# そうなると、ヴィーナスとも同じ家になるのか
line = "そうなると、ヴィーナスとも同じ家になるのか"

[[dialogue]]
speaker = "ヨミ"
# 「はい、会長も知っての通り、お嬢様は爆裂フレンドリーな方なので、私たちメイド隊にも家族のように接してくれています」
line = "「はい、会長も知っての通り、お嬢様は爆裂フレンドリーな方なので、私たちメイド隊にも家族のように接してくれています」"

[[dialogue]]
speaker = "閃"
# 「朝食や夕食の時は、お嬢様とメイド隊で同じ食卓を囲む日もあるくらいです」
line = "「朝食や夕食の時は、お嬢様とメイド隊で同じ食卓を囲む日もあるくらいです」"

[[dialogue]]
speaker = "unk"
# ヴィーナスらしいな
line = "ヴィーナスらしいな"

[[dialogue]]
speaker = "閃"
# 「ええ、本当にお嬢様らしい。まるで女神のようにお優しい方なんです……！」
line = "「ええ、本当にお嬢様らしい。まるで女神のようにお優しい方なんです……！」"

[[dialogue]]
speaker = "ヨミ"
# 「学園では有名な話ですが、ヴィーナスお嬢様は養子で、九浄家の血筋ではありません」
line = "「学園では有名な話ですが、ヴィーナスお嬢様は養子で、九浄家の血筋ではありません」"

[[dialogue]]
speaker = "ヨミ"
# 「ですがそんなこと関係なく、当主様はお嬢様のことを本当の子供のように大切にしていますし、我々使用人も皆、お嬢様のことを慕っています」
line = "「ですがそんなこと関係なく、当主様はお嬢様のことを本当の子供のように大切にしていますし、我々使用人も皆、お嬢様のことを慕っています」"

[[dialogue]]
speaker = "閃"
# 「九浄家のお嬢様だからではなく、九浄ヴィーナスという１人の女性として、尊敬できる方だと私は思っています」
line = "「九浄家のお嬢様だからではなく、九浄ヴィーナスという１人の女性として、尊敬できる方だと私は思っています」"

[[dialogue]]
speaker = "ヨミ"
# 「閃先輩はご実家に関係なく、お嬢様にお仕えしているってよく言ってますもんね」
line = "「閃先輩はご実家に関係なく、お嬢様にお仕えしているってよく言ってますもんね」"

[[dialogue]]
speaker = "unk"
# 閃の実家って？
line = "閃の実家って？"

[[dialogue]]
speaker = "閃"
# 「私の実家――藤岡家は、代々九浄家にお仕えしている家なんです」
line = "「私の実家――藤岡家は、代々九浄家にお仕えしている家なんです」"

[[dialogue]]
speaker = "閃"
# 「私は居合術で戦いますが、実家にはその剣術の道場があります。そこで磨いた剣技をもって、代々九浄家の護衛を務めてきました」
line = "「私は居合術で戦いますが、実家にはその剣術の道場があります。そこで磨いた剣技をもって、代々九浄家の護衛を務めてきました」"

[[dialogue]]
speaker = "閃"
# 「私とお嬢様の出会いは５年ほど前になります。お嬢様が九浄家の養子に迎え入れられた時、年が近いだろうという理由で護衛に任命されたんですが──」
line = "「私とお嬢様の出会いは５年ほど前になります。お嬢様が九浄家の養子に迎え入れられた時、年が近いだろうという理由で護衛に任命されたんですが──」"

[[dialogue]]
speaker = "閃"
# 「今では実家の家業としてだけではない……自分の意志でお嬢様にお仕えしたい、護衛としてお守りしたいと思っているんです」
line = "「今では実家の家業としてだけではない……自分の意志でお嬢様にお仕えしたい、護衛としてお守りしたいと思っているんです」"

[[dialogue]]
speaker = "unk"
# ヴィーナスが好きだから……？
line = "ヴィーナスが好きだから……？"

[[dialogue]]
speaker = "閃"
# 「か、会長さん、からかわないでください……。ヨミにも変な誤解をされるじゃないですか」
line = "「か、会長さん、からかわないでください……。ヨミにも変な誤解をされるじゃないですか」"

[[dialogue]]
speaker = "ヨミ"
# 「閃先輩がお嬢様を好き過ぎるのは、皆知っているので大丈夫ですよ？」
line = "「閃先輩がお嬢様を好き過ぎるのは、皆知っているので大丈夫ですよ？」"

[[dialogue]]
speaker = "閃"
# 「バ、バレてる！？　というか今、皆って言ってたような気が……？」
line = "「バ、バレてる！？　というか今、皆って言ってたような気が……？」"

[[dialogue]]
speaker = "ヨミ"
# 「メイド隊の中では周知の事実というか……」
line = "「メイド隊の中では周知の事実というか……」"

[[dialogue]]
speaker = "閃"
# 「そ、そんなぁ……！？」
line = "「そ、そんなぁ……！？」"

[[dialogue]]
speaker = "unk"
# 閃の護衛といえば、なんだけど――
line = "閃の護衛といえば、なんだけど――"

[[dialogue]]
speaker = "閃"
# 「え？　何故いつもギリギリのタイミングで助けに来るのか、ですか？」
line = "「え？　何故いつもギリギリのタイミングで助けに来るのか、ですか？」"

[[dialogue]]
speaker = "ヨミ"
# 「閃先輩あるあるですね。ピンチの時にだけ、間一髪で助けてくれるっていう」
line = "「閃先輩あるあるですね。ピンチの時にだけ、間一髪で助けてくれるっていう」"

[[dialogue]]
speaker = "閃"
# 「あるあるにしないでください……」
line = "「あるあるにしないでください……」"

[[dialogue]]
speaker = "unk"
# って、ヴィーナスは言ってたな
line = "って、ヴィーナスは言ってたな"

[[dialogue]]
speaker = "unk"
# 「きっとセンちゃんも色々と忙しいのよ！」
line = "「きっとセンちゃんも色々と忙しいのよ！」"

[[dialogue]]
speaker = "閃"
# 「お嬢様にもギリギリだと思われてるーーー！？」
line = "「お嬢様にもギリギリだと思われてるーーー！？」"

[[dialogue]]
speaker = "閃"
# 「いや、違うんです！　私にはベストなタイミングが<b>見えている</b>ので、助けに入るのを焦らしているとかそういうわけじゃないんです！」
line = "「いや、違うんです！　私にはベストなタイミングが<b>見えている</b>ので、助けに入るのを焦らしているとかそういうわけじゃないんです！」"

[[dialogue]]
speaker = "unk"
# 見えている？
line = "見えている？"

[[dialogue]]
speaker = "閃"
# 「はい。私は生まれつき、『予測の<ruby=せいがん>星眼</ruby>』という異能の眼を持っているんです。予測とは言いますが、戦闘では予知に等しい能力です」
line = "「はい。私は生まれつき、『予測の<ruby>星眼<rt>せいがん</rt></ruby>』という異能の眼を持っているんです。予測とは言いますが、戦闘では予知に等しい能力です」"

[[dialogue]]
speaker = "ヨミ"
# 「星眼というのは、特殊な星術を宿した眼のことです。星騎士の中ですら、とても珍しい爆裂レアアビリティなんですよ！」
line = "「星眼というのは、特殊な星術を宿した眼のことです。星騎士の中ですら、とても珍しい爆裂レアアビリティなんですよ！」"

[[dialogue]]
speaker = "閃"
# 「私は『眼が捉える周囲の情報から、未来に起こることを視認できる』んです。出力を最大にすれば、３分程度先まで実質的な予知が可能になります」
line = "「私は『眼が捉える周囲の情報から、未来に起こることを視認できる』んです。出力を最大にすれば、３分程度先まで実質的な予知が可能になります」"

[[dialogue]]
speaker = "閃"
# 「この眼によって、助けるべき瞬間がハッキリと分かるので、一見するとギリギリで助けに入っているように見えてしまう、というわけなんですっ」
line = "「この眼によって、助けるべき瞬間がハッキリと分かるので、一見するとギリギリで助けに入っているように見えてしまう、というわけなんですっ」"

[[dialogue]]
speaker = "unk"
# 閃が普段、目を細めているのって……
line = "閃が普段、目を細めているのって……"

[[dialogue]]
speaker = "閃"
# 「日常的に星眼を使用しているからですね。緊急時以外は視界に入って来る情報量を絞って、星眼の出力を制御するようにしています」
line = "「日常的に星眼を使用しているからですね。緊急時以外は視界に入って来る情報量を絞って、星眼の出力を制御するようにしています」"

[[dialogue]]
speaker = "ヨミ"
# 「閃先輩はいつでも美人ですけど、目を開くともっと美人なんですよ！　瞳も神秘的な色をしていて、とても綺麗ですし」
line = "「閃先輩はいつでも美人ですけど、目を開くともっと美人なんですよ！　瞳も神秘的な色をしていて、とても綺麗ですし」"

[[dialogue]]
speaker = "unk"
# それは見てみたいな
line = "それは見てみたいな"

[[dialogue]]
speaker = "閃"
# 「そ、そこまで大したものではありませんし、会長さんの期待に応えて……と言いたいところですが」
line = "「そ、そこまで大したものではありませんし、会長さんの期待に応えて……と言いたいところですが」"

[[dialogue]]
speaker = "閃"
# 「先程、お嬢様のことで私をからかったお返しです。会長さんには、まだ見せてあげません」
line = "「先程、お嬢様のことで私をからかったお返しです。会長さんには、まだ見せてあげません」"

[[dialogue]]
speaker = "unk"
# そんな～
line = "そんな～"

[[dialogue]]
speaker = "閃"
# 「ふふっ、甘えた顔をしてもダメです。反省してくださいね」
line = "「ふふっ、甘えた顔をしてもダメです。反省してくださいね」"

[[dialogue]]
speaker = "unk"
# いつか見せて貰えるくらい、彼女と仲良くなれたらいいなと思うのだった。
line = "いつか見せて貰えるくらい、彼女と仲良くなれたらいいなと思うのだった。"
