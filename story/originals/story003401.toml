[[dialogue]]
speaker = "ルリエル"
# 「すみませーん、失礼しま～す！」
line = "「すみませーん、失礼しま～す！」"

[[dialogue]]
speaker = "ルリエル"
# 「新星の会長さんにお手紙ですよ～！　今、大丈夫ですか？」
line = "「新星の会長さんにお手紙ですよ～！　今、大丈夫ですか？」"

[[dialogue]]
speaker = "unk"
# ああ……ありがと、ルリエル……
line = "ああ……ありがと、ルリエル……"

[[dialogue]]
speaker = "unk"
# …………
line = "…………"

[[dialogue]]
speaker = "ルリエル"
# 「ほぇ？　どうしたんですか、そんな気のない返事をしちゃって。会長さんらしくありませんよ？」
line = "「ほぇ？　どうしたんですか、そんな気のない返事をしちゃって。会長さんらしくありませんよ？」"

[[dialogue]]
speaker = "ルリエル"
# 「さては会長さん…………おヒマですねっ！！」
line = "「さては会長さん…………おヒマですねっ！！」"

[[dialogue]]
speaker = "unk"
# ちょっと考えごとをね……
line = "ちょっと考えごとをね……"

[[dialogue]]
speaker = "unk"
# ヒマなのは間違いないけど……
line = "ヒマなのは間違いないけど……"

[[dialogue]]
speaker = "unk"
# 珍しく──星徒会の仕事がない。
line = "珍しく──星徒会の仕事がない。"

[[dialogue]]
speaker = "unk"
# そして、俺以外の新星星徒会メンバーもいない。理由はそれぞれだが、偶然が重なってみんな学園を離れているのだ。
line = "そして、俺以外の新星星徒会メンバーもいない。理由はそれぞれだが、偶然が重なってみんな学園を離れているのだ。"

[[dialogue]]
speaker = "ルリエル"
# 「余裕があるのはいいことじゃありませんか。こっちなんてフィオナ会長が急にお出かけを決めちゃって、大変なんですから！」
line = "「余裕があるのはいいことじゃありませんか。こっちなんてフィオナ会長が急にお出かけを決めちゃって、大変なんですから！」"

[[dialogue]]
speaker = "ルリエル"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルリエル"
# 「あっ、これはもしや……なるほど、なるほど♪」
line = "「あっ、これはもしや……なるほど、なるほど♪」"

[[dialogue]]
speaker = "ルリエル"
# 「ズバリ！　会長さんの考え事はフィオナ会長ですねっ？」
line = "「ズバリ！　会長さんの考え事はフィオナ会長ですねっ？」"

[[dialogue]]
speaker = "ルリエル"
# 「異世界に行ってしまったフィオナ会長のことが、気になって仕方ないんじゃありませんか！？」
line = "「異世界に行ってしまったフィオナ会長のことが、気になって仕方ないんじゃありませんか！？」"

[[dialogue]]
speaker = "unk"
# いろいろ気になることはあるんだ
line = "いろいろ気になることはあるんだ"

[[dialogue]]
speaker = "unk"
# うん、まあ……そうだね……
line = "うん、まあ……そうだね……"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ？　なんか思ってたのと違う感じの反応です……気になることとは何ですか？」
line = "「ほえ？　なんか思ってたのと違う感じの反応です……気になることとは何ですか？」"

[[dialogue]]
speaker = "unk"
# フィオナの様子がちょっとね
line = "フィオナの様子がちょっとね"

[[dialogue]]
speaker = "unk"
# 異世界に行くって決めた時のさ
line = "異世界に行くって決めた時のさ"

[[dialogue]]
speaker = "ルリエル"
# 「とある赤ちゃんのパパ捜しに、異世界へ行っちゃったんですよね？」
line = "「とある赤ちゃんのパパ捜しに、異世界へ行っちゃったんですよね？」"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルもお話を聞いた時はちょっと驚きました！　何の相談もなく行っちゃうとは思いませんでしたから」
line = "「ルリエルもお話を聞いた時はちょっと驚きました！　何の相談もなく行っちゃうとは思いませんでしたから」"

[[dialogue]]
speaker = "ルリエル"
# 「流星星徒会でも話してたんですよ～。あんまりフィオナ会長っぽくないかもって！」
line = "「流星星徒会でも話してたんですよ～。あんまりフィオナ会長っぽくないかもって！」"

[[dialogue]]
speaker = "unk"
# 俺もフィオナらしくないって思ってて
line = "俺もフィオナらしくないって思ってて"

[[dialogue]]
speaker = "unk"
# そうなんだよ
line = "そうなんだよ"

[[dialogue]]
speaker = "ルリエル"
# 「なるほど！　会長さんはそれが引っ掛かっているんですね」
line = "「なるほど！　会長さんはそれが引っ掛かっているんですね」"

[[dialogue]]
speaker = "ルリエル"
# 「とはいえ、ルリエルもあまり詳しい話は聞いてませんでした。何があったのか教えてください！」
line = "「とはいえ、ルリエルもあまり詳しい話は聞いてませんでした。何があったのか教えてください！」"

[[dialogue]]
speaker = "unk"
# ルリエルに言われて、俺が知っている限りの経緯を話し始める。
line = "ルリエルに言われて、俺が知っている限りの経緯を話し始める。"

[[dialogue]]
speaker = "unk"
# それは、さかのぼること数日前──
line = "それは、さかのぼること数日前──"

[[dialogue]]
speaker = "unk"
# 星徒会室で仕事をしていた俺のところへ、流星学園の星徒会長であるフィオナと、新星寮の寮長であるマハムート先輩ことマムが乗り込んできたのだが──
line = "星徒会室で仕事をしていた俺のところへ、流星学園の星徒会長であるフィオナと、新星寮の寮長であるマハムート先輩ことマムが乗り込んできたのだが──"

[[dialogue]]
speaker = "unk"
# ２人は意外な人物を一緒に連れて来ていた。
line = "２人は意外な人物を一緒に連れて来ていた。"

[[dialogue]]
speaker = "unk"
# 以前、クマロボ騒ぎを起こした黒ベア子とベア子。
line = "以前、クマロボ騒ぎを起こした黒ベア子とベア子。"

[[dialogue]]
speaker = "unk"
# そして異世界からやってきたカーバンクル娘のルルゥという少女だった。
line = "そして異世界からやってきたカーバンクル娘のルルゥという少女だった。"

[[dialogue]]
speaker = "unk"
# 黒ベア子は抱えている『赤ちゃんクマロボ』を突き出してきて、俺の子ではないかと迫ってくる。
line = "黒ベア子は抱えている『赤ちゃんクマロボ』を突き出してきて、俺の子ではないかと迫ってくる。"

[[dialogue]]
speaker = "unk"
# 詳しい事情を訊いてみると、黒ベア子たちはその子の父親を捜して、過去に訪れた世界を巡っているとのことだった。
line = "詳しい事情を訊いてみると、黒ベア子たちはその子の父親を捜して、過去に訪れた世界を巡っているとのことだった。"

[[dialogue]]
speaker = "unk"
# もちろん俺にそんな心当たりは無かったので、自分は父親ではないと説明したところ、意外にもあっさりと納得してもらうことが出来た。
line = "もちろん俺にそんな心当たりは無かったので、自分は父親ではないと説明したところ、意外にもあっさりと納得してもらうことが出来た。"

[[dialogue]]
speaker = "unk"
# どうやら確たる疑いをもって突撃してきたわけではなく、本当に手当たり次第に訊ねて回っているだけらしい。
line = "どうやら確たる疑いをもって突撃してきたわけではなく、本当に手当たり次第に訊ねて回っているだけらしい。"

[[dialogue]]
speaker = "unk"
# 俺が父親でないことが分かると、黒ベア子たちはさっさと次の世界に向かおうとしていたのだが……
line = "俺が父親でないことが分かると、黒ベア子たちはさっさと次の世界に向かおうとしていたのだが……"

[[dialogue]]
speaker = "unk"
# 結局いろいろなトラブルがあり、準備が整うまで時間がかかってしまっていた。
line = "結局いろいろなトラブルがあり、準備が整うまで時間がかかってしまっていた。"

[[dialogue]]
speaker = "unk"
# いよいよ次の世界、『イリスクラウド』へ黒ベア子たちが出発しようとした時、フィオナが突然一緒についていくと言い出したのだった。
line = "いよいよ次の世界、『イリスクラウド』へ黒ベア子たちが出発しようとした時、フィオナが突然一緒についていくと言い出したのだった。"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長、少しの間、流星市国の留守をお願いできないでしょうか？　私も、この子の父親を見つけてあげたいんです」
line = "「緋宮会長、少しの間、流星市国の留守をお願いできないでしょうか？　私も、この子の父親を見つけてあげたいんです」"

[[dialogue]]
speaker = "unk"
# フィオナの性格を考えると、赤ちゃんクマロボの父親を見つけてあげたい、という気持ちになるのはそれほど不自然ではない。
line = "フィオナの性格を考えると、赤ちゃんクマロボの父親を見つけてあげたい、という気持ちになるのはそれほど不自然ではない。"

[[dialogue]]
speaker = "unk"
# けれど、それにしたってやや唐突な印象はぬぐえなかった。
line = "けれど、それにしたってやや唐突な印象はぬぐえなかった。"

[[dialogue]]
speaker = "ルリエル"
# 「うーん、フィオナ会長っぽいと言えばフィオナ会長っぽいですけど……」
line = "「うーん、フィオナ会長っぽいと言えばフィオナ会長っぽいですけど……」"

[[dialogue]]
speaker = "ルリエル"
# 「半日一緒に居ただけなのに、その赤ちゃんクマロボさんに入れ込み過ぎてるようにも感じますね？」
line = "「半日一緒に居ただけなのに、その赤ちゃんクマロボさんに入れ込み過ぎてるようにも感じますね？」"

[[dialogue]]
speaker = "ルリエル"
# 「……もしかしてその子、ものすごく可愛いんじゃないでしょうか！？　フィオナ会長は可愛いものに目がありませんから！！」
line = "「……もしかしてその子、ものすごく可愛いんじゃないでしょうか！？　フィオナ会長は可愛いものに目がありませんから！！」"

[[dialogue]]
speaker = "unk"
# クマロボの赤ちゃんだけど
line = "クマロボの赤ちゃんだけど"

[[dialogue]]
speaker = "unk"
# 可愛くはあったよ
line = "可愛くはあったよ"

[[dialogue]]
speaker = "ルリエル"
# 「その可愛さ補正で、フィオナ会長の母性に火が点いちゃったに違いありません！！」
line = "「その可愛さ補正で、フィオナ会長の母性に火が点いちゃったに違いありません！！」"

[[dialogue]]
speaker = "ルリエル"
# 「なんにせよ、フィオナ会長には早く帰ってきて欲しいのです～。でないと星徒会のお仕事が大変で大変で……」
line = "「なんにせよ、フィオナ会長には早く帰ってきて欲しいのです～。でないと星徒会のお仕事が大変で大変で……」"

[[dialogue]]
speaker = "unk"
# 無事に帰ってきて欲しいよ
line = "無事に帰ってきて欲しいよ"

[[dialogue]]
speaker = "unk"
# そうだね
line = "そうだね"

[[dialogue]]
speaker = "unk"
# と、そんな話をしていた矢先──
line = "と、そんな話をしていた矢先──"

[[dialogue]]
speaker = "ルリエル"
# 「わわわぁっ！？　何ですか、これ～！？」
line = "「わわわぁっ！？　何ですか、これ～！？」"

[[dialogue]]
speaker = "ルリエル"
# 「もしかして、これがお話に出てきた黒い穴？　なんでしょうか！？　ということはフィオナ会長が帰ってきた！？」
line = "「もしかして、これがお話に出てきた黒い穴？　なんでしょうか！？　ということはフィオナ会長が帰ってきた！？」"

[[dialogue]]
speaker = "unk"
# 俺もルリエルと同じことを考えた。
line = "俺もルリエルと同じことを考えた。"

[[dialogue]]
speaker = "unk"
# しかし次の瞬間、そこから姿を現したのはフィオナではなく、見知らぬ２人の女の子だった。
line = "しかし次の瞬間、そこから姿を現したのはフィオナではなく、見知らぬ２人の女の子だった。"

[[dialogue]]
speaker = "ラファエロ"
# 「おや、何事だい？　奇想天外なことが起きていることだけは、間違いなさそうだけど」
line = "「おや、何事だい？　奇想天外なことが起きていることだけは、間違いなさそうだけど」"

[[dialogue]]
speaker = "ステラ"
# 「あわわわわ！　こ、ここ、どこですか！？　お部屋でまったりしてたはずなのに！！？」
line = "「あわわわわ！　こ、ここ、どこですか！？　お部屋でまったりしてたはずなのに！！？」"
