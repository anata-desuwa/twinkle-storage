[[dialogue]]
speaker = "unk"
# 第４話,アポロの未来,P
line = "第４話,アポロの未来,P"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ひゃっほーーっ！！」
line = "「ひゃっほーーっ！！」"

[[dialogue]]
speaker = "unk"
# アポロが運転するバイクの後ろに乗り、風を切って走る。
line = "アポロが運転するバイクの後ろに乗り、風を切って走る。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「免許？　もちろんあるぞ。レジスタンスで偽造したやつだけどな」
line = "「免許？　もちろんあるぞ。レジスタンスで偽造したやつだけどな」"

[[dialogue]]
speaker = "unk"
# 完全な違法行為！？
line = "完全な違法行為！？"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ははっ、権力に刃向かうレジスタンスってのはそういうもんだ！」
line = "「ははっ、権力に刃向かうレジスタンスってのはそういうもんだ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「なぁに、事故なんてしないさ。あたしのライディングテクニックを見せてやる！」
line = "「なぁに、事故なんてしないさ。あたしのライディングテクニックを見せてやる！」"

[[dialogue]]
speaker = "unk"
# そのまま高速道路を駆け抜け、流星市国近辺を軽く一周した。
line = "そのまま高速道路を駆け抜け、流星市国近辺を軽く一周した。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ふぅ……久々に思いっきり走れた。やっぱりバイクで走ると気持ちがいい」
line = "「ふぅ……久々に思いっきり走れた。やっぱりバイクで走ると気持ちがいい」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「急に付き合わせて悪かったな。一度お前を乗せて走ってみたかったんだ」
line = "「急に付き合わせて悪かったな。一度お前を乗せて走ってみたかったんだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「お前も気に入ったか？　ならリノに隠蔽魔法を頼んでまで、魔王を引っ張り出した甲斐があったってもんだ」
line = "「お前も気に入ったか？　ならリノに隠蔽魔法を頼んでまで、魔王を引っ張り出した甲斐があったってもんだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王たちがデネブに来たのは事故だったが……正直言うと、来てくれてよかったとあたしは思ってる」
line = "「魔王たちがデネブに来たのは事故だったが……正直言うと、来てくれてよかったとあたしは思ってる」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「知っての通り、星力は年齢を重ねると使えなくなってしまう。あたしも星騎士としての<b>あがり</b>は近い」
line = "「知っての通り、星力は年齢を重ねると使えなくなってしまう。あたしも星騎士としての<b>あがり</b>は近い」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王の力も著しく弱体化してしまうだろう。あたしだけじゃルヴィネに勝てないし、いずれ時間切れになっていたはずだ」
line = "「魔王の力も著しく弱体化してしまうだろう。あたしだけじゃルヴィネに勝てないし、いずれ時間切れになっていたはずだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「その前にお前たちが来てくれて良かった。これで希望を持てる」
line = "「その前にお前たちが来てくれて良かった。これで希望を持てる」"

[[dialogue]]
speaker = "unk"
# 俺もアポロがいてくれて良かった
line = "俺もアポロがいてくれて良かった"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ははっ、デネブであたしと再会した時はビックリしたろ？　こんなにナイスバディなお姉さんになってたんだからな」
line = "「ははっ、デネブであたしと再会した時はビックリしたろ？　こんなにナイスバディなお姉さんになってたんだからな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……本当にありがとう。あたしがこうして生きてるのは、お前たちがあたしを敵として倒さず、救おうとしてくれたおかげだ」
line = "「……本当にありがとう。あたしがこうして生きてるのは、お前たちがあたしを敵として倒さず、救おうとしてくれたおかげだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「おかげで、あたしはちゃんと大人になれた。こんなに大きくなったよ」
line = "「おかげで、あたしはちゃんと大人になれた。こんなに大きくなったよ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……うん？　ああ……お前は誰が好きなんだ、ってこの前聞いたな」
line = "「……うん？　ああ……お前は誰が好きなんだ、ってこの前聞いたな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ま、からかい半分ってやつだ。気にするな。恋を急ぐ必要ない」
line = "「ま、からかい半分ってやつだ。気にするな。恋を急ぐ必要ない」"

[[dialogue]]
speaker = "unk"
# 俺が好きなのはアポロだ
line = "俺が好きなのはアポロだ"

[[dialogue]]
speaker = "アポロ（大人）"
# 「何！？　まさか<ruby=向こう>アルタイル</ruby>のあたしに手を出してたのか……それはさすがに引くぞ……」
line = "「何！？　まさか<ruby>アルタイル<rt>向こう</rt></ruby>のあたしに手を出してたのか……それはさすがに引くぞ……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そうじゃない？　好きなのは<ruby=こっち>デネブ</ruby>のアポロ……？」
line = "「そうじゃない？　好きなのは<ruby>デネブ<rt>こっち</rt></ruby>のアポロ……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「って、あたしぃ～～っ！！？」
line = "「って、あたしぃ～～っ！！？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王は年上好きだったのか……？　それとも体か？　やっぱり胸が大きい方がいいのか……？」
line = "「魔王は年上好きだったのか……？　それとも体か？　やっぱり胸が大きい方がいいのか……？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……大人として頼りになるところが好き？　バイクに乗るところがかっこよくて好き？　料理が上手いところが好き？」
line = "「……大人として頼りになるところが好き？　バイクに乗るところがかっこよくて好き？　料理が上手いところが好き？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ずっと流星ライダーが好きなところが好き？　レジスタンスとして諦めず戦い続けているところが好き？」
line = "「ずっと流星ライダーが好きなところが好き？　レジスタンスとして諦めず戦い続けているところが好き？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「わ、わかったから、そんなに好きばっかり言うな！　照れるだろうがっ！」
line = "「わ、わかったから、そんなに好きばっかり言うな！　照れるだろうがっ！」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そりゃ大人の余裕もなくなるさ……レジスタンスとして隠れて活動していたから、恋愛なんてする暇なんてなかったし」
line = "「そりゃ大人の余裕もなくなるさ……レジスタンスとして隠れて活動していたから、恋愛なんてする暇なんてなかったし」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしだって好きだよ、お前のこと……」
line = "「あたしだって好きだよ、お前のこと……」"

[[dialogue]]
speaker = "unk"
# ──！！
line = "──！！"

[[dialogue]]
speaker = "アポロ（大人）"
# 「嫌いなわけないだろ。あたしを救うために、あんなに頑張ってくれたんだから」
line = "「嫌いなわけないだろ。あたしを救うために、あんなに頑張ってくれたんだから」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「こっちでもあたしの夢を応援してくれた。お前はあの時から変わらない、いいやつだ」
line = "「こっちでもあたしの夢を応援してくれた。お前はあの時から変わらない、いいやつだ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「だいたい好きでもない男の前で、胸が大きくなったとか、女らしくなったとか言うもんか。大人のレディなんだから」
line = "「だいたい好きでもない男の前で、胸が大きくなったとか、女らしくなったとか言うもんか。大人のレディなんだから」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……だけどあたしたちは、好きって気持ちを確かめ合って、それでめでたしめでたしにはならない。文字通り住む世界が違うからな」
line = "「……だけどあたしたちは、好きって気持ちを確かめ合って、それでめでたしめでたしにはならない。文字通り住む世界が違うからな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「魔王はアルタイルに帰るんだろ？」
line = "「魔王はアルタイルに帰るんだろ？」"

[[dialogue]]
speaker = "unk"
# うん、帰らないといけない
line = "うん、帰らないといけない"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……だよな。いつ帰るんだ？」
line = "「……だよな。いつ帰るんだ？」"

[[dialogue]]
speaker = "unk"
# まだわからない
line = "まだわからない"

[[dialogue]]
speaker = "アポロ（大人）"
# 「そりゃそうか。でもきっと、急に来たように、急に帰るんだろうな」
line = "「そりゃそうか。でもきっと、急に来たように、急に帰るんだろうな」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ちょっとじっとしてろ」
line = "「ちょっとじっとしてろ」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……ちゅ」
line = "「……ちゅ」"

[[dialogue]]
speaker = "unk"
# アポロの顔が近づき、唇同士が触れた。柔らかな感触に体が熱くなる。
line = "アポロの顔が近づき、唇同士が触れた。柔らかな感触に体が熱くなる。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「……どうだ、あたしも大人になっただろ」
line = "「……どうだ、あたしも大人になっただろ」"

[[dialogue]]
speaker = "unk"
# アルタイルに帰っても絶対に会いに来るよ
line = "アルタイルに帰っても絶対に会いに来るよ"

[[dialogue]]
speaker = "アポロ（大人）"
# 「言ったな？　来なかったら恨むぞ？」
line = "「言ったな？　来なかったら恨むぞ？」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「約束したからには、不可能だって可能にしてこっちに戻ってこい！　でないとあたしがそっちに乗り込んじゃうからな！」
line = "「約束したからには、不可能だって可能にしてこっちに戻ってこい！　でないとあたしがそっちに乗り込んじゃうからな！」"

[[dialogue]]
speaker = "unk"
# 本来出会うはずのなかった俺たちが何度もぶつかり、別れ、再会した。だからきっとまた会える。
line = "本来出会うはずのなかった俺たちが何度もぶつかり、別れ、再会した。だからきっとまた会える。"

[[dialogue]]
speaker = "アポロ（大人）"
# 「流星ライダーアポロにはこういうセリフがあるんだ。『居場所は離れても、心は離れない』──って」
line = "「流星ライダーアポロにはこういうセリフがあるんだ。『居場所は離れても、心は離れない』──って」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「あたしとお前は、何があってもずっと一緒だ。だから……」
line = "「あたしとお前は、何があってもずっと一緒だ。だから……」"

[[dialogue]]
speaker = "アポロ（大人）"
# 「ん……ちゅっ」
line = "「ん……ちゅっ」"

[[dialogue]]
speaker = "unk"
# そしてもう一度キスを交わし、再会を誓い合った。
line = "そしてもう一度キスを交わし、再会を誓い合った。"
