[[dialogue]]
speaker = "unk"
# 『選星者』とは――
line = "『選星者』とは――"

[[dialogue]]
speaker = "unk"
# 女神から『<ruby=ロール>役職</ruby>』を授けられた者のことを指し、海外では『ロールスター』とも呼ばれている存在である。
line = "女神から『<ruby>役職<rt>ロール</rt></ruby>』を授けられた者のことを指し、海外では『ロールスター』とも呼ばれている存在である。"

[[dialogue]]
speaker = "unk"
# 彼らは天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。
line = "彼らは天からの啓示により、生まれながらにそのことを自覚し、役職に応じた特殊な能力を与えられている。"

[[dialogue]]
speaker = "unk"
# 俺が今までに出会ったのは――『名探偵』のジュエリー・ブラウン。
line = "俺が今までに出会ったのは――『名探偵』のジュエリー・ブラウン。"

[[dialogue]]
speaker = "unk"
# 『<ruby=エクソシスト>祓魔師</ruby>』の恵原フェリシー。
line = "『<ruby>祓魔師<rt>エクソシスト</rt></ruby>』の恵原フェリシー。"

[[dialogue]]
speaker = "unk"
# 『大怪盗』のミネコ・フランボワーズ。
line = "『大怪盗』のミネコ・フランボワーズ。"

[[dialogue]]
speaker = "unk"
# そして、今回の『陰陽師』――安倍野ミヤハルで４人目となる。
line = "そして、今回の『陰陽師』――安倍野ミヤハルで４人目となる。"

[[dialogue]]
speaker = "ミヤハル"
# 「それじゃあ改めて、はんなりと自己紹介させてもらいます<emoji=heart04>」
line = "「それじゃあ改めて、はんなりと自己紹介させてもらいます<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「うちは、陰陽師・安倍晴明はんの血を引く一族――現『安倍野』家、本家の長女をやっとります」
line = "「うちは、陰陽師・安倍晴明はんの血を引く一族――現『安倍野』家、本家の長女をやっとります」"

[[dialogue]]
speaker = "ミヤハル"
# 「ほんで、安倍野家は代々、選星者『陰陽師』のお役目を引き継いできたんよ」
line = "「ほんで、安倍野家は代々、選星者『陰陽師』のお役目を引き継いできたんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「ただ、よく勘違いされるんやけど、『陰陽術』は選星者の能力であって、安倍野家が<ruby=なりわい>生業</ruby>としてきたのは『巫女』の方なんよ」
line = "「ただ、よく勘違いされるんやけど、『陰陽術』は選星者の能力であって、安倍野家が<ruby>生業<rt>なりわい</rt></ruby>としてきたのは『巫女』の方なんよ」"

[[dialogue]]
speaker = "unk"
# だから、ミヤハルが指導役に呼ばれたのか
line = "だから、ミヤハルが指導役に呼ばれたのか"

[[dialogue]]
speaker = "ミヤハル"
# 「そういうことどす<emoji=heart04>　適正がある星騎士に、巫女の力──『<ruby=ふじゅつ>巫術</ruby>』を教えるのが、安倍野家のもう１つのお役目、というわけやね」
line = "「そういうことどす<emoji=heart04>　適正がある星騎士に、巫女の力──『<ruby>巫術<rt>ふじゅつ</rt></ruby>』を教えるのが、安倍野家のもう１つのお役目、というわけやね」"

[[dialogue]]
speaker = "ミヤハル"
# 「まぁ、正直、指導するのはちょ～っと<ruby=おっくう>億劫</ruby>なんやけど……」
line = "「まぁ、正直、指導するのはちょ～っと<ruby>億劫<rt>おっくう</rt></ruby>なんやけど……」"

[[dialogue]]
speaker = "ミヤハル"
# 「その代わり、こうしてやっと会長はんに会うことができて、うち、えろう嬉しいわぁ<emoji=heart04>」
line = "「その代わり、こうしてやっと会長はんに会うことができて、うち、えろう嬉しいわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 彼女はそう言って突然、俺の腕に抱きついて来た。
line = "彼女はそう言って突然、俺の腕に抱きついて来た。"

[[dialogue]]
speaker = "ミヤハル"
# 「はんなりとごめんやす<emoji=heart04>」
line = "「はんなりとごめんやす<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ミ、ミヤハルさん！？
line = "ミ、ミヤハルさん！？"

[[dialogue]]
speaker = "unk"
# 彼女のやたら大きく開けた胸元が腕に押し付けられて、その感触に思わずドキッとしてしまう。
line = "彼女のやたら大きく開けた胸元が腕に押し付けられて、その感触に思わずドキッとしてしまう。"

[[dialogue]]
speaker = "マトイ"
# 「いきなりボディータッチ！？」
line = "「いきなりボディータッチ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「大胆なのです！」
line = "「大胆なのです！」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ<emoji=heart04>　会長はん、近くで見ると、やっぱりえろうイケメンやねぇ<emoji=heart04>」
line = "「ふふっ<emoji=heart04>　会長はん、近くで見ると、やっぱりえろうイケメンやねぇ<emoji=heart04>」"

[[dialogue]]
speaker = "ミヤハル"
# 「それにこうして制服越しに体を触っても、しっかりと鍛えてはるのが伝わって来るわぁ<emoji=heart04>」
line = "「それにこうして制服越しに体を触っても、しっかりと鍛えてはるのが伝わって来るわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# そ、そんなやたら触られると……
line = "そ、そんなやたら触られると……"

[[dialogue]]
speaker = "マトイ"
# 「いやいやいや！　いくらなんでも、変なとこ触り過ぎだから！」
line = "「いやいやいや！　いくらなんでも、変なとこ触り過ぎだから！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あんっ<emoji=heart04>　ようやっと会長はんにお会いできたゆうのに、マトイはん、そんな引き剥がしたりして、いけずやわぁ<emoji=heart04>」
line = "「あんっ<emoji=heart04>　ようやっと会長はんにお会いできたゆうのに、マトイはん、そんな引き剥がしたりして、いけずやわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「頬とか太もも撫でるのは普通じゃないよ！？」
line = "「頬とか太もも撫でるのは普通じゃないよ！？」"

[[dialogue]]
speaker = "ルリエル"
# 「ちょっとセクシーな感じだったのです！」
line = "「ちょっとセクシーな感じだったのです！」"

[[dialogue]]
speaker = "ミヤハル"
# 「――うち、ほんまはず～っと前から、会長はんに会いたかったんよ。でも、選星者っていうのは、どうも星の巡りに左右されやすいらしくてな？」
line = "「――うち、ほんまはず～っと前から、会長はんに会いたかったんよ。でも、選星者っていうのは、どうも星の巡りに左右されやすいらしくてな？」"

[[dialogue]]
speaker = "ミヤハル"
# 「会おうとすると、必ずお邪魔イベントみたいな出来事が起こったり、ニアミスばかりで上手く行かなかったんよ」
line = "「会おうとすると、必ずお邪魔イベントみたいな出来事が起こったり、ニアミスばかりで上手く行かなかったんよ」"

[[dialogue]]
speaker = "ミヤハル"
# 「おかげで、えろう長いこと待ったわぁ。そのせいで、うち――」
line = "「おかげで、えろう長いこと待ったわぁ。そのせいで、うち――」"

[[dialogue]]
speaker = "ミヤハル"
# 「もう辛抱たまらんくらい、すっごく溜まっとるんよ<emoji=heart04>」
line = "「もう辛抱たまらんくらい、すっごく溜まっとるんよ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「溜まっ……！？」
line = "「溜まっ……！？」"

[[dialogue]]
speaker = "ルリエル"
# 「溜まっているっていうのは、具体的には何がどう溜まっているんですか？」
line = "「溜まっているっていうのは、具体的には何がどう溜まっているんですか？」"

[[dialogue]]
speaker = "マトイ"
# 「ルリエルちゃん！？」
line = "「ルリエルちゃん！？」"

[[dialogue]]
speaker = "ミヤハル"
# 「ふふっ、今まで欲求不満やった反動でな<emoji=heart04>　こうして会長はんにくっ付いとると、うち――」
line = "「ふふっ、今まで欲求不満やった反動でな<emoji=heart04>　こうして会長はんにくっ付いとると、うち――」"

[[dialogue]]
speaker = "ミヤハル"
# 「えろう<b>濡れて</b>しまうんよ<emoji=heart04>」
line = "「えろう<b>濡れて</b>しまうんよ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「なに言っちゃってんの、この人！？」
line = "「なに言っちゃってんの、この人！？」"

[[dialogue]]
speaker = "ルリエル"
# 「？　濡れているというのは、どこがなのです……？」
line = "「？　濡れているというのは、どこがなのです……？」"

[[dialogue]]
speaker = "マトイ"
# 「ルリエルちゃんっ！　それ以上深堀りしなくていいから！！」
line = "「ルリエルちゃんっ！　それ以上深堀りしなくていいから！！」"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ？」
line = "「ほえ？」"

[[dialogue]]
speaker = "マトイ"
# 「というか、今思い出した！　ミヤハルさんって確か、流星学園で、陰陽師って以外にも……」
line = "「というか、今思い出した！　ミヤハルさんって確か、流星学園で、陰陽師って以外にも……」"

[[dialogue]]
speaker = "マトイ"
# 「その……ちょっと言いづらい通称で呼ばれている……」
line = "「その……ちょっと言いづらい通称で呼ばれている……」"

[[dialogue]]
speaker = "ルリエル"
# 「はいはいはい！　ルリエル、知っているのです！」
line = "「はいはいはい！　ルリエル、知っているのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「ズバリ――『歩く１８禁』なのです！」
line = "「ズバリ――『歩く１８禁』なのです！」"

[[dialogue]]
speaker = "マトイ"
# 「あえて濁したのに言っちゃった！！」
line = "「あえて濁したのに言っちゃった！！」"

[[dialogue]]
speaker = "ミヤハル"
# 「あんっ<emoji=heart04>　そんなスケベぇな呼び方されたらうち、体が熱くなってまうわぁ<emoji=heart04>」
line = "「あんっ<emoji=heart04>　そんなスケベぇな呼び方されたらうち、体が熱くなってまうわぁ<emoji=heart04>」"

[[dialogue]]
speaker = "マトイ"
# 「なんか嬉しそう！？」
line = "「なんか嬉しそう！？」"

[[dialogue]]
speaker = "unk"
# ま、また、個性的な選星者が現れたな……
line = "ま、また、個性的な選星者が現れたな……"

[[dialogue]]
speaker = "マトイ"
# 「み、巫女の修行、大丈夫なのかな……」
line = "「み、巫女の修行、大丈夫なのかな……」"

[[dialogue]]
speaker = "unk"
# マトイとルリエルの２人は明日から、ミヤハルの元で巫女の力を制御する修行に入るという。
line = "マトイとルリエルの２人は明日から、ミヤハルの元で巫女の力を制御する修行に入るという。"

[[dialogue]]
speaker = "unk"
# 個性的な師匠の登場に、ちょっと不安そうな顔を浮かべるマトイなのだった――
line = "個性的な師匠の登場に、ちょっと不安そうな顔を浮かべるマトイなのだった――"

[[dialogue]]
speaker = "unk"
# ミヤハルと顔合わせをした翌日の放課後。
line = "ミヤハルと顔合わせをした翌日の放課後。"

[[dialogue]]
speaker = "unk"
# マトイとルリエルたちは、巫女修行をする為、流星市国から東京の浅草へとやって来ていた――
line = "マトイとルリエルたちは、巫女修行をする為、流星市国から東京の浅草へとやって来ていた――"

[[dialogue]]
speaker = "マトイ"
# 「この辺りはお正月とかでも来たことあるから、知っているけど……」
line = "「この辺りはお正月とかでも来たことあるから、知っているけど……」"

[[dialogue]]
speaker = "ルリエル"
# 「ミヤハルさん、神社ってどの辺りにあるのですか？」
line = "「ミヤハルさん、神社ってどの辺りにあるのですか？」"

[[dialogue]]
speaker = "ミヤハル"
# 「もうちょっとで着くから待ってておくれやす。近くに小さな鳥居があって、そこの<b>結界</b>を潜った先がうちの住んどる神社やから」
line = "「もうちょっとで着くから待ってておくれやす。近くに小さな鳥居があって、そこの<b>結界</b>を潜った先がうちの住んどる神社やから」"

[[dialogue]]
speaker = "マトイ"
# 「結界？」
line = "「結界？」"

[[dialogue]]
speaker = "ミヤハル"
# 「そう、ちょっと特殊な場所でな。星力を持っている人しか通り抜けられないようになってる結界の中にあるんよ」
line = "「そう、ちょっと特殊な場所でな。星力を持っている人しか通り抜けられないようになってる結界の中にあるんよ」"

[[dialogue]]
speaker = "unk"
# そうして、ミヤハルに連れられ、小さな路地を曲がった先にある、あまり目立たない鳥居を潜ると――
line = "そうして、ミヤハルに連れられ、小さな路地を曲がった先にある、あまり目立たない鳥居を潜ると――"

[[dialogue]]
speaker = "マトイ"
# 「ここが『浅草安倍野神社』……！」
line = "「ここが『浅草安倍野神社』……！」"

[[dialogue]]
speaker = "ルリエル"
# 「わぁ～♪　なんだかすごく、神聖な雰囲気の場所なのです！」
line = "「わぁ～♪　なんだかすごく、神聖な雰囲気の場所なのです！」"

[[dialogue]]
speaker = "ミヤハル"
# 「本当は会長はんも一緒に来てくれたら嬉しかったんやけどなぁ。まあ、それはまた今度、じっくり２人きりでということにして――」
line = "「本当は会長はんも一緒に来てくれたら嬉しかったんやけどなぁ。まあ、それはまた今度、じっくり２人きりでということにして――」"

[[dialogue]]
speaker = "ミヤハル"
# 「<b>３人共</b>、うちの神社へようこそおいでやす<emoji=heart04>」
line = "「<b>３人共</b>、うちの神社へようこそおいでやす<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 今回、巫女修行をするのは、マトイと、ルリエルと、もう１人――
line = "今回、巫女修行をするのは、マトイと、ルリエルと、もう１人――"

[[dialogue]]
speaker = "？？？"
# 「――はい」
line = "「――はい」"

[[dialogue]]
speaker = "トマル"
# 「マトイ姉さま共々、また巫女の力のご指導、よろしくお願い致します。ミヤハルさま」
line = "「マトイ姉さま共々、また巫女の力のご指導、よろしくお願い致します。ミヤハルさま」"

[[dialogue]]
speaker = "unk"
# 女の子にしか見えないマトイの<b>弟</b>・詠野トマルは、清楚な微笑みを浮かべるのだった――
line = "女の子にしか見えないマトイの<b>弟</b>・詠野トマルは、清楚な微笑みを浮かべるのだった――"
