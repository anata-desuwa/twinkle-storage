[[dialogue]]
speaker = "フィオナ"
# 「はぁ……何やってるんだろう、私……」
line = "「はぁ……何やってるんだろう、私……」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長がナミエルやキリカと結婚式をしているのを見ていたら、いてもたってもいられなくなって……こんなの私……」
line = "「緋宮会長がナミエルやキリカと結婚式をしているのを見ていたら、いてもたってもいられなくなって……こんなの私……」"

[[dialogue]]
speaker = "unk"
# フィオナ！
line = "フィオナ！"

[[dialogue]]
speaker = "フィオナ"
# 「！　緋宮会長……追いかけてきてくれたんですね」
line = "「！　緋宮会長……追いかけてきてくれたんですね」"

[[dialogue]]
speaker = "フィオナ"
# 「ごめんなさい。緋宮会長が悪いんじゃないんです。全部私が悪いんです」
line = "「ごめんなさい。緋宮会長が悪いんじゃないんです。全部私が悪いんです」"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長も、キリカもナミエルも、私のために頑張ってくれているのに、愛を誓っているところを見ると……胸が痛くなってしまって」
line = "「緋宮会長も、キリカもナミエルも、私のために頑張ってくれているのに、愛を誓っているところを見ると……胸が痛くなってしまって」"

[[dialogue]]
speaker = "フィオナ"
# 「わかってるんです。緋宮会長は、戦闘服を元に戻すために協力してくれているだけだって。でも……緋宮会長を取られたような気になってしまうんです」
line = "「わかってるんです。緋宮会長は、戦闘服を元に戻すために協力してくれているだけだって。でも……緋宮会長を取られたような気になってしまうんです」"

[[dialogue]]
speaker = "フィオナ"
# 「私、舞い上がっていたのかもしれません。緋宮会長と結婚式ごっこをするのも、花嫁修業をするのも楽しかった」
line = "「私、舞い上がっていたのかもしれません。緋宮会長と結婚式ごっこをするのも、花嫁修業をするのも楽しかった」"

[[dialogue]]
speaker = "フィオナ"
# 「でも結婚は楽しいばかりのものではありません。時に苦しいこと、つらいこともあるでしょう」
line = "「でも結婚は楽しいばかりのものではありません。時に苦しいこと、つらいこともあるでしょう」"

[[dialogue]]
speaker = "フィオナ"
# 「結婚という言葉に浮かれていた自分の浅はかさや、ナミエルやキリカに嫉妬してしまう心の小ささが嫌になってしまって……」
line = "「結婚という言葉に浮かれていた自分の浅はかさや、ナミエルやキリカに嫉妬してしまう心の小ささが嫌になってしまって……」"

[[dialogue]]
speaker = "フィオナ"
# 「私なんか花嫁にふさわしくないと、そう思うんです……」
line = "「私なんか花嫁にふさわしくないと、そう思うんです……」"

[[dialogue]]
speaker = "フィオナ"
# 「こんなことなら、結婚に憧れなければ良かった……」
line = "「こんなことなら、結婚に憧れなければ良かった……」"

[[dialogue]]
speaker = "unk"
# フィオナに言うことがあるんだ
line = "フィオナに言うことがあるんだ"

[[dialogue]]
speaker = "フィオナ"
# 「緋宮会長？　ひざまずいて何を──」
line = "「緋宮会長？　ひざまずいて何を──」"

[[dialogue]]
speaker = "unk"
# 俺と結婚してください、フィオナ
line = "俺と結婚してください、フィオナ"

[[dialogue]]
speaker = "フィオナ"
# 「──！」
line = "「──！」"

[[dialogue]]
speaker = "フィオナ"
# 「それって、プロポーズ……！？　でも、あくまで結婚式はふりですし……」
line = "「それって、プロポーズ……！？　でも、あくまで結婚式はふりですし……」"

[[dialogue]]
speaker = "フィオナ"
# 「もっと自信を持っていい……？　フィオナは素敵な女性だから、結婚出来たら幸せ……？　いえいえ、そんなことないですからっ」
line = "「もっと自信を持っていい……？　フィオナは素敵な女性だから、結婚出来たら幸せ……？　いえいえ、そんなことないですからっ」"

[[dialogue]]
speaker = "unk"
# フィオナは立派な花嫁だよ
line = "フィオナは立派な花嫁だよ"

[[dialogue]]
speaker = "フィオナ"
# 「！　そう……でしょうか。緋宮会長が言うなら信じてしまうかもしれません……」
line = "「！　そう……でしょうか。緋宮会長が言うなら信じてしまうかもしれません……」"

[[dialogue]]
speaker = "unk"
# 誰が何と言おうと俺が保証する
line = "誰が何と言おうと俺が保証する"

[[dialogue]]
speaker = "フィオナ"
# 「ふふ。力強いお言葉ですね。私がくよくよしていたのが馬鹿らしくなるくらい」
line = "「ふふ。力強いお言葉ですね。私がくよくよしていたのが馬鹿らしくなるくらい」"

[[dialogue]]
speaker = "フィオナ"
# 「でしたら信じます。あなたの言葉を。あなたが信じる私を」
line = "「でしたら信じます。あなたの言葉を。あなたが信じる私を」"

[[dialogue]]
speaker = "フィオナ"
# 「先ほどのプロポーズのお返事がまだでしたね」
line = "「先ほどのプロポーズのお返事がまだでしたね」"

[[dialogue]]
speaker = "フィオナ"
# 「もちろんお受けします。私でよければ結婚してください、緋宮会長」
line = "「もちろんお受けします。私でよければ結婚してください、緋宮会長」"

[[dialogue]]
speaker = "ナミエル"
# 「フィオナお嬢様に声をおかけしなくてよいのでしょうか？」
line = "「フィオナお嬢様に声をおかけしなくてよいのでしょうか？」"

[[dialogue]]
speaker = "キリカ"
# 「ええ、今しがた解決したようですので」
line = "「ええ、今しがた解決したようですので」"

[[dialogue]]
speaker = "ナミエル"
# 「むぅ……お嬢様にお仕えするのは私たちですのに」
line = "「むぅ……お嬢様にお仕えするのは私たちですのに」"

[[dialogue]]
speaker = "キリカ"
# 「確かに星見家メイド隊としては悔しいですが、我々では難しいことでした。緋宮会長に感謝しましょう」
line = "「確かに星見家メイド隊としては悔しいですが、我々では難しいことでした。緋宮会長に感謝しましょう」"

[[dialogue]]
speaker = "フィオナ"
# 「！　アステラの反応？」
line = "「！　アステラの反応？」"

[[dialogue]]
speaker = "フィオナ"
# 「アステラがこんな近くに……ですが好都合です」
line = "「アステラがこんな近くに……ですが好都合です」"

[[dialogue]]
speaker = "unk"
# 一緒に戦おう、フィオナ
line = "一緒に戦おう、フィオナ"

[[dialogue]]
speaker = "フィオナ"
# 「はい。たとえウェディングドレスをまとっていても、流星の星徒会長なのだと証明してみせます！」
line = "「はい。たとえウェディングドレスをまとっていても、流星の星徒会長なのだと証明してみせます！」"

[[dialogue]]
speaker = "ナミエル"
# 「おふたりがアステラに入られましたね。私たちも加勢しましょう、メイド長」
line = "「おふたりがアステラに入られましたね。私たちも加勢しましょう、メイド長」"

[[dialogue]]
speaker = "キリカ"
# 「おふたりなら必要ないでしょう。私たちはアステラから溢れてきたモンスターを掃討します」
line = "「おふたりなら必要ないでしょう。私たちはアステラから溢れてきたモンスターを掃討します」"

[[dialogue]]
speaker = "ナミエル"
# 「えっ？　でも……」
line = "「えっ？　でも……」"

[[dialogue]]
speaker = "キリカ"
# 「共同作業ですから。お邪魔をしてはお嬢様が拗ねてしまいます」
line = "「共同作業ですから。お邪魔をしてはお嬢様が拗ねてしまいます」"

[[dialogue]]
speaker = "ナミエル"
# 「……はい」
line = "「……はい」"

[[dialogue]]
speaker = "キリカ"
# 「普段の戦闘服とは違いますが、もちろん戦えますね？」
line = "「普段の戦闘服とは違いますが、もちろん戦えますね？」"

[[dialogue]]
speaker = "ナミエル"
# 「はい、そのために今までウェディングドレスを着ていましたから。メイドは百般を修めるもの。遅れはとりません」
line = "「はい、そのために今までウェディングドレスを着ていましたから。メイドは百般を修めるもの。遅れはとりません」"

[[dialogue]]
speaker = "キリカ"
# 「それでこそ星見家メイド隊です。では行きますよ、ナミエル」
line = "「それでこそ星見家メイド隊です。では行きますよ、ナミエル」"

[[dialogue]]
speaker = "フィオナ"
# 「ふふふ、今なら絶対に負ける気がしません。本当に浮かれてしまっていますね、私」
line = "「ふふふ、今なら絶対に負ける気がしません。本当に浮かれてしまっていますね、私」"

[[dialogue]]
speaker = "フィオナ"
# 「あのモンスターを倒すためには協力が必要です。力を合わせましょう、緋宮会長」
line = "「あのモンスターを倒すためには協力が必要です。力を合わせましょう、緋宮会長」"

[[dialogue]]
speaker = "フィオナ"
# 「太陽の輝きをここに──エタニティソーラーストーム！」
line = "「太陽の輝きをここに──エタニティソーラーストーム！」"
