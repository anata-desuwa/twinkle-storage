[[dialogue]]
speaker = "unk"
# とある放課後、新星学園２年生の教室が並ぶ廊下にて。
line = "とある放課後、新星学園２年生の教室が並ぶ廊下にて。"

[[dialogue]]
speaker = "unk"
# 同級生である３人が歓談を交わしていたのだが、その中であることが話題に上がる。
line = "同級生である３人が歓談を交わしていたのだが、その中であることが話題に上がる。"

[[dialogue]]
speaker = "ヴィーナス"
# 「こどもの日……！」
line = "「こどもの日……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「レミカに言われるまで、そんな日があることをすっかり忘れてたわ！」
line = "「レミカに言われるまで、そんな日があることをすっかり忘れてたわ！」"

[[dialogue]]
speaker = "レミカ"
# 「私も、街の広場のイベントで『鯉のぼり』が上げられているのを見て、思い出してさ」
line = "「私も、街の広場のイベントで『鯉のぼり』が上げられているのを見て、思い出してさ」"

[[dialogue]]
speaker = "メルエル"
# 「人間界の、子供の成長をお祝いする日か～。確かに、学園ではあんまり話題にならないよね？」
line = "「人間界の、子供の成長をお祝いする日か～。確かに、学園ではあんまり話題にならないよね？」"

[[dialogue]]
speaker = "レミカ"
# 「うん。小さい頃はお祝いしてもらった記憶があるけど、ある程度大きくなってからは家でも全然話題に上がらなくなったなって」
line = "「うん。小さい頃はお祝いしてもらった記憶があるけど、ある程度大きくなってからは家でも全然話題に上がらなくなったなって」"

[[dialogue]]
speaker = "unk"
# そんな風にヴィーナスと話しているのは、友人である『愛戸レミカ』と『姫咲メルエル』であった。
line = "そんな風にヴィーナスと話しているのは、友人である『愛戸レミカ』と『姫咲メルエル』であった。"

[[dialogue]]
speaker = "メルエル"
# 「そういうのってあるよね。子供の頃はお父さん、お母さんと遊びに出かけたりしたけど、学園に通うようになってからは、その頻度も減っていっちゃって……」
line = "「そういうのってあるよね。子供の頃はお父さん、お母さんと遊びに出かけたりしたけど、学園に通うようになってからは、その頻度も減っていっちゃって……」"

[[dialogue]]
speaker = "メルエル"
# 「気づいて思い返すと、ちょっと寂しい気持ちになっちゃったりするかも」
line = "「気づいて思い返すと、ちょっと寂しい気持ちになっちゃったりするかも」"

[[dialogue]]
speaker = "ヴィーナス"
# 「こどもの日と言えば……昔、ヘレナちゃんに家で鯉のぼりを上げてもらったこと、思い出したわ！」
line = "「こどもの日と言えば……昔、ヘレナちゃんに家で鯉のぼりを上げてもらったこと、思い出したわ！」"

[[dialogue]]
speaker = "レミカ"
# 「まあ、この年にもなって毎年お祝いされたりしたら、さすがに恥ずかしい気持ちになっちゃうからアレだけど……懐かしい気分にはなるよね」
line = "「まあ、この年にもなって毎年お祝いされたりしたら、さすがに恥ずかしい気持ちになっちゃうからアレだけど……懐かしい気分にはなるよね」"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうかしら？　私はクロトに『こどもの日』をお祝いしてもらえたら、今でもすごく嬉しいと思うわよ♪」
line = "「そうかしら？　私はクロトに『こどもの日』をお祝いしてもらえたら、今でもすごく嬉しいと思うわよ♪」"

[[dialogue]]
speaker = "メルエル"
# 「ふふっ、ヴィーナスちゃんのそういう純真なところ、とっても素敵だね♪」
line = "「ふふっ、ヴィーナスちゃんのそういう純真なところ、とっても素敵だね♪」"

[[dialogue]]
speaker = "レミカ"
# 「確かにヴィーナスらしい。私も『可愛いアイドル』を目指す上で、そういう子供心を思い出すことが重要なのかも……」
line = "「確かにヴィーナスらしい。私も『可愛いアイドル』を目指す上で、そういう子供心を思い出すことが重要なのかも……」"

[[dialogue]]
speaker = "レミカ"
# 「って、ヴィ、ヴィーナス……？　なんか体が光ってない？」
line = "「って、ヴィ、ヴィーナス……？　なんか体が光ってない？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「あら？」
line = "「あら？」"

[[dialogue]]
speaker = "メルエル"
# 「きゃっ！？」
line = "「きゃっ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「眩しくて何も見えないわ！」
line = "「眩しくて何も見えないわ！」"

[[dialogue]]
speaker = "unk"
# ヴィーナスの体が強く発光し、やがて収まると――
line = "ヴィーナスの体が強く発光し、やがて収まると――"

[[dialogue]]
speaker = "レミカ"
# 「なっ……！　これって！？」
line = "「なっ……！　これって！？」"

[[dialogue]]
speaker = "メルエル"
# 「えぇっ！？　どういうことぉ！？」
line = "「えぇっ！？　どういうことぉ！？」"

[[dialogue]]
speaker = "unk"
# そこに広がった光景を見て、３人は目を見開くのだった。
line = "そこに広がった光景を見て、３人は目を見開くのだった。"

[[dialogue]]
speaker = "ヴィーナス"
# 「ク～ロ～ト～！」
line = "「ク～ロ～ト～！」"

[[dialogue]]
speaker = "unk"
# 俺が星徒会室で事務作業に取りかかろうとしていると、ドタバタという足音と共に聞き慣れた声が近づいてきた。
line = "俺が星徒会室で事務作業に取りかかろうとしていると、ドタバタという足音と共に聞き慣れた声が近づいてきた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「大変よ！　また不思議なことが起きたわ！」
line = "「大変よ！　また不思議なことが起きたわ！」"

[[dialogue]]
speaker = "unk"
# 何事かと思っていると、ヴィーナスの後ろから小さな人影が元気よく飛び出してくる。
line = "何事かと思っていると、ヴィーナスの後ろから小さな人影が元気よく飛び出してくる。"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「じゃじゃ～ん♪」
line = "「じゃじゃ～ん♪」"

[[dialogue]]
speaker = "unk"
# えっ！？　ヴィーナスがもう１人！？
line = "えっ！？　ヴィーナスがもう１人！？"

[[dialogue]]
speaker = "ヴィーナス"
# 「そうなのよ！　なんか急に、小さい私が増えちゃったの！」
line = "「そうなのよ！　なんか急に、小さい私が増えちゃったの！」"

[[dialogue]]
speaker = "ヴィーナス（幼少）"
# 「よくわからないけど、体が小さくなって２人になったわ、パパ！」
line = "「よくわからないけど、体が小さくなって２人になったわ、パパ！」"

[[dialogue]]
speaker = "unk"
# 驚いて思考停止してしまっていると、続いて別の２人が星徒会室へ入ってくる。
line = "驚いて思考停止してしまっていると、続いて別の２人が星徒会室へ入ってくる。"

[[dialogue]]
speaker = "メルエル"
# 「か、会長くん、こんにちは。ちょっと相談があって……」
line = "「か、会長くん、こんにちは。ちょっと相談があって……」"

[[dialogue]]
speaker = "レミカ"
# 「ごめん、会長。面倒事が発生しちゃって……」
line = "「ごめん、会長。面倒事が発生しちゃって……」"

[[dialogue]]
speaker = "unk"
# それは、同級生であるメルエルやレミカであった。
line = "それは、同級生であるメルエルやレミカであった。"

[[dialogue]]
speaker = "unk"
# と、その後ろから――
line = "と、その後ろから――"

[[dialogue]]
speaker = "メルエル（幼少）"
# 「えへへ♪　キミの幼なじみも２人に増えちゃいました～、なんてね♪」
line = "「えへへ♪　キミの幼なじみも２人に増えちゃいました～、なんてね♪」"

[[dialogue]]
speaker = "レミカ（幼少）"
# 「私も……気づいたら、体がこうなっちゃってて……」
line = "「私も……気づいたら、体がこうなっちゃってて……」"

[[dialogue]]
speaker = "unk"
# メルエルとレミカも増えてる～～～っ！？
line = "メルエルとレミカも増えてる～～～っ！？"

[[dialogue]]
speaker = "unk"
# 突然増えてしまった３人の分身に、俺は驚きの声を上げてしまうのだった。
line = "突然増えてしまった３人の分身に、俺は驚きの声を上げてしまうのだった。"
