[[dialogue]]
speaker = "unk"
# 第４話,風邪の対処法,P
line = "第４話,風邪の対処法,P"

[[dialogue]]
speaker = "unk"
# ソフィアからメッセージが届き、俺は急ぎ保健室へと向かっていた。
line = "ソフィアからメッセージが届き、俺は急ぎ保健室へと向かっていた。"

[[dialogue]]
speaker = "unk"
# 保健室に入るとベッドにソフィアの姿を探す。
line = "保健室に入るとベッドにソフィアの姿を探す。"

[[dialogue]]
speaker = "unk"
# 布団がぽっこり膨らんでいるベッドを見つけると、俺は急いでそれに駆け寄った。
line = "布団がぽっこり膨らんでいるベッドを見つけると、俺は急いでそれに駆け寄った。"

[[dialogue]]
speaker = "ソフィア"
# 「会長さん……来てくれたんですね……」
line = "「会長さん……来てくれたんですね……」"

[[dialogue]]
speaker = "unk"
# 熱があるの？　大丈夫？
line = "熱があるの？　大丈夫？"

[[dialogue]]
speaker = "ソフィア"
# 「そこまで心配そうな顔をされると申し訳ないです」
line = "「そこまで心配そうな顔をされると申し訳ないです」"

[[dialogue]]
speaker = "ソフィア"
# 「おそらくただの風邪でしょう……熱は多少あるんですが、倒れたとかそういうことではなくて……」
line = "「おそらくただの風邪でしょう……熱は多少あるんですが、倒れたとかそういうことではなくて……」"

[[dialogue]]
speaker = "ソフィア"
# 「ちょっと具合が悪いので、保健室を借りて休ませてもらっているだけなんです……」
line = "「ちょっと具合が悪いので、保健室を借りて休ませてもらっているだけなんです……」"

[[dialogue]]
speaker = "unk"
# 大事でないならよかった……
line = "大事でないならよかった……"

[[dialogue]]
speaker = "ソフィア"
# 「はい、でも……」
line = "「はい、でも……」"

[[dialogue]]
speaker = "ソフィア"
# 「せっかく保健室まで来たのですから、しばらくここに居てくれませんか……？」
line = "「せっかく保健室まで来たのですから、しばらくここに居てくれませんか……？」"

[[dialogue]]
speaker = "ソフィア"
# 「わがままを言ってしまって……ごめんなさい……」
line = "「わがままを言ってしまって……ごめんなさい……」"

[[dialogue]]
speaker = "unk"
# 全然いいよ
line = "全然いいよ"

[[dialogue]]
speaker = "ソフィア"
# 「えへへ……ありがとうございます……」
line = "「えへへ……ありがとうございます……」"

[[dialogue]]
speaker = "unk"
# 弱々しく微笑むソフィア。
line = "弱々しく微笑むソフィア。"

[[dialogue]]
speaker = "unk"
# 体調が悪いせいで、気持ちが少し弱ってしまっているのが見て取れる。
line = "体調が悪いせいで、気持ちが少し弱ってしまっているのが見て取れる。"

[[dialogue]]
speaker = "unk"
# 俺は椅子を引っ張ってきてベッドの傍に座ると、ソフィアの手を握って看病することにした。
line = "俺は椅子を引っ張ってきてベッドの傍に座ると、ソフィアの手を握って看病することにした。"

[[dialogue]]
speaker = "unk"
# しばらくして……
line = "しばらくして……"

[[dialogue]]
speaker = "ソフィア"
# 「会長さん……ずっと手を握ってくれていてありがとうございます……」
line = "「会長さん……ずっと手を握ってくれていてありがとうございます……」"

[[dialogue]]
speaker = "ソフィア"
# 「そう言えば小さい頃、私が熱を出した時は姉さんも同じように手を握ってくれていました」
line = "「そう言えば小さい頃、私が熱を出した時は姉さんも同じように手を握ってくれていました」"

[[dialogue]]
speaker = "ソフィア"
# 「それがすごく安心できて……嬉しかった……」
line = "「それがすごく安心できて……嬉しかった……」"

[[dialogue]]
speaker = "ソフィア"
# 「あの……もうひとつ……わがままを言ってもいいですか……？」
line = "「あの……もうひとつ……わがままを言ってもいいですか……？」"

[[dialogue]]
speaker = "unk"
# なんでも言って
line = "なんでも言って"

[[dialogue]]
speaker = "ソフィア"
# 「私が熱を出して、なかなか下がらなかった時……姉さんは一緒にお布団に入って添い寝してくれました……」
line = "「私が熱を出して、なかなか下がらなかった時……姉さんは一緒にお布団に入って添い寝してくれました……」"

[[dialogue]]
speaker = "ソフィア"
# 「震える私のことを抱きしめて、大丈夫よって頭を撫でてくれて……」
line = "「震える私のことを抱きしめて、大丈夫よって頭を撫でてくれて……」"

[[dialogue]]
speaker = "ソフィア"
# 「だから……その……隣に寄り添って抱きしめてくれたら……もっと安心できると思うんです……」
line = "「だから……その……隣に寄り添って抱きしめてくれたら……もっと安心できると思うんです……」"

[[dialogue]]
speaker = "unk"
# わかった、いいよ
line = "わかった、いいよ"

[[dialogue]]
speaker = "ソフィア"
# 「いいんですか？　ありがとうございます……」
line = "「いいんですか？　ありがとうございます……」"

[[dialogue]]
speaker = "unk"
# 俺はベッドに横になると、ソフィアを抱きかかえるようにして添い寝した。
line = "俺はベッドに横になると、ソフィアを抱きかかえるようにして添い寝した。"

[[dialogue]]
speaker = "ソフィア"
# 「風邪、移しちゃうかもしれません……ごめんなさい……」
line = "「風邪、移しちゃうかもしれません……ごめんなさい……」"

[[dialogue]]
speaker = "ソフィア"
# 「でも、会長さんに抱きしめられていると……とっても、ホットで……安心します……」
line = "「でも、会長さんに抱きしめられていると……とっても、ホットで……安心します……」"

[[dialogue]]
speaker = "unk"
# ソフィアに添い寝してもらおうかな
line = "ソフィアに添い寝してもらおうかな"

[[dialogue]]
speaker = "unk"
# 今度俺が風邪を引いた時は
line = "今度俺が風邪を引いた時は"

[[dialogue]]
speaker = "ソフィア"
# 「はい……お任せください……」
line = "「はい……お任せください……」"

[[dialogue]]
speaker = "ソフィア"
# 「その時は私が、会長さんをしっかり抱きしめて……安心させてあげますからね……」
line = "「その時は私が、会長さんをしっかり抱きしめて……安心させてあげますからね……」"

[[dialogue]]
speaker = "unk"
# 健気なことを言ってくれるソフィアの頭を優しく撫でる。
line = "健気なことを言ってくれるソフィアの頭を優しく撫でる。"

[[dialogue]]
speaker = "unk"
# するとソフィアは安心しきったような顔つきで、小さな寝息を立て始める。
line = "するとソフィアは安心しきったような顔つきで、小さな寝息を立て始める。"

[[dialogue]]
speaker = "unk"
# そんなソフィアの顔を見ながら、目を覚ますまでずっと身を寄せたままでいるのだった。
line = "そんなソフィアの顔を見ながら、目を覚ますまでずっと身を寄せたままでいるのだった。"
