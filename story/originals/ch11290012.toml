[[dialogue]]
speaker = "unk"
# 第２話,ボランティア部への参加,P
line = "第２話,ボランティア部への参加,P"

[[dialogue]]
speaker = "unk"
# その日はシャロンの主催する子ども会が開かれていた。
line = "その日はシャロンの主催する子ども会が開かれていた。"

[[dialogue]]
speaker = "unk"
# その活動に参加してみたいとのことで、俺はエステルを連れて大聖堂へとやってきていた。
line = "その活動に参加してみたいとのことで、俺はエステルを連れて大聖堂へとやってきていた。"

[[dialogue]]
speaker = "シャロン"
# 「エステルさま、今日は子ども会の奉仕活動へのご協力ありがとうございますっ」
line = "「エステルさま、今日は子ども会の奉仕活動へのご協力ありがとうございますっ」"

[[dialogue]]
speaker = "エステル"
# 「いえいえ、こちらからお願いしたことですから」
line = "「いえいえ、こちらからお願いしたことですから」"

[[dialogue]]
speaker = "unk"
# メルエルも来てたんだ
line = "メルエルも来てたんだ"

[[dialogue]]
speaker = "メルエル"
# 「うん。初めましてエステルちゃん！　私、ボランティア部の姫咲メルエルだよ、宜しくねっ」
line = "「うん。初めましてエステルちゃん！　私、ボランティア部の姫咲メルエルだよ、宜しくねっ」"

[[dialogue]]
speaker = "エステル"
# 「ボランティア部ですか！？」
line = "「ボランティア部ですか！？」"

[[dialogue]]
speaker = "メルエル"
# 「えっ、そうだけど、な、何かな？」
line = "「えっ、そうだけど、な、何かな？」"

[[dialogue]]
speaker = "エステル"
# 「実は私も極星学園ではボランティア部に所属して活動していたんです」
line = "「実は私も極星学園ではボランティア部に所属して活動していたんです」"

[[dialogue]]
speaker = "メルエル"
# 「そうだったの？　わぁ～、同じ仲間だ～、うれしいよ～♪」
line = "「そうだったの？　わぁ～、同じ仲間だ～、うれしいよ～♪」"

[[dialogue]]
speaker = "エステル"
# 「今日は頑張って活動に励みましょう！」
line = "「今日は頑張って活動に励みましょう！」"

[[dialogue]]
speaker = "メルエル"
# 「うん、がんばろー！」
line = "「うん、がんばろー！」"

[[dialogue]]
speaker = "unk"
# と、盛り上がる一方で……
line = "と、盛り上がる一方で……"

[[dialogue]]
speaker = "イレーナ"
# 「はぁ……どうして私まで駆り出されなくちゃいけないのかしら」
line = "「はぁ……どうして私まで駆り出されなくちゃいけないのかしら」"

[[dialogue]]
speaker = "unk"
# そんなこと言わずに
line = "そんなこと言わずに"

[[dialogue]]
speaker = "イレーナ"
# 「なんかあのエステルって子が教会に来た時から嫌な予感はしてたのよね」
line = "「なんかあのエステルって子が教会に来た時から嫌な予感はしてたのよね」"

[[dialogue]]
speaker = "イレーナ"
# 「シャロンにすっかり火が点いちゃって困ってるんだけど」
line = "「シャロンにすっかり火が点いちゃって困ってるんだけど」"

[[dialogue]]
speaker = "エステル"
# 「あの……イレーナさん、私が何か？」
line = "「あの……イレーナさん、私が何か？」"

[[dialogue]]
speaker = "イレーナ"
# 「い、いえ、何でもありませんよ」
line = "「い、いえ、何でもありませんよ」"

[[dialogue]]
speaker = "シャロン"
# 「はーい、それでは今日は、みんなで大聖堂の掃除をします。はりきっていきましょ～っ」
line = "「はーい、それでは今日は、みんなで大聖堂の掃除をします。はりきっていきましょ～っ」"

[[dialogue]]
speaker = "エステル"
# 「よろしくお願いしま～す」
line = "「よろしくお願いしま～す」"

[[dialogue]]
speaker = "unk"
# こうしてボランティアに集まってくれた子どもたちと共に、大聖堂の大掃除が始まったのだった。
line = "こうしてボランティアに集まってくれた子どもたちと共に、大聖堂の大掃除が始まったのだった。"

[[dialogue]]
speaker = "エステル"
# 「いいですか？　では、みなさん説明したとおりにお願いしますね～」
line = "「いいですか？　では、みなさん説明したとおりにお願いしますね～」"

[[dialogue]]
speaker = "子供たち"
# 「はーい♪」
line = "「はーい♪」"

[[dialogue]]
speaker = "エステル"
# 「ふふっ、良いお返事です」
line = "「ふふっ、良いお返事です」"

[[dialogue]]
speaker = "メルエル"
# 「ふわぁ～、エステルちゃん。子供たちとの接し方が上手です～」
line = "「ふわぁ～、エステルちゃん。子供たちとの接し方が上手です～」"

[[dialogue]]
speaker = "エステル"
# 「えっ、そうですか？」
line = "「えっ、そうですか？」"

[[dialogue]]
speaker = "メルエル"
# 「そうだよ～！　中には手を焼きそうなやんちゃな子だっていたのに」
line = "「そうだよ～！　中には手を焼きそうなやんちゃな子だっていたのに」"

[[dialogue]]
speaker = "メルエル"
# 「それがエステルちゃんが声をかけたら、すっかり大人しくなっちゃって」
line = "「それがエステルちゃんが声をかけたら、すっかり大人しくなっちゃって」"

[[dialogue]]
speaker = "メルエル"
# 「何だかすっごくお姉さん味があって……ちょっと憧れちゃうかも」
line = "「何だかすっごくお姉さん味があって……ちょっと憧れちゃうかも」"

[[dialogue]]
speaker = "unk"
# 年下だとは思えない
line = "年下だとは思えない"

[[dialogue]]
speaker = "メルエル"
# 「年下なの！？」
line = "「年下なの！？」"

[[dialogue]]
speaker = "エステル"
# 「学年でいうと１年生になりますね」
line = "「学年でいうと１年生になりますね」"

[[dialogue]]
speaker = "メルエル"
# 「はぅ～、それなのにこんなにしっかりしてて……尊敬しちゃうよ～」
line = "「はぅ～、それなのにこんなにしっかりしてて……尊敬しちゃうよ～」"

[[dialogue]]
speaker = "エステル"
# 「ふふふ、そんな……魔王様に比べれば私なんてとてもとてもです」
line = "「ふふふ、そんな……魔王様に比べれば私なんてとてもとてもです」"

[[dialogue]]
speaker = "メルエル"
# 「会長くん？　そこでどうして会長くんが出てくるの？」
line = "「会長くん？　そこでどうして会長くんが出てくるの？」"

[[dialogue]]
speaker = "エステル"
# 「はい、デネブにいらっしゃった魔王様と少しの間ですが共闘したのです」
line = "「はい、デネブにいらっしゃった魔王様と少しの間ですが共闘したのです」"

[[dialogue]]
speaker = "エステル"
# 「その際も魔王様は、全員をまとめながら指揮をとり、皆に絶大な安心感を与えてくださっていました」
line = "「その際も魔王様は、全員をまとめながら指揮をとり、皆に絶大な安心感を与えてくださっていました」"

[[dialogue]]
speaker = "unk"
# ……そうだったっけ？
line = "……そうだったっけ？"

[[dialogue]]
speaker = "エステル"
# 「敵かもしれない私が声をかけた時も跳ね付ける様子はなく、きちんと落ち着いて話を聞いてくださいまして……」
line = "「敵かもしれない私が声をかけた時も跳ね付ける様子はなく、きちんと落ち着いて話を聞いてくださいまして……」"

[[dialogue]]
speaker = "エステル"
# 「きっと一目見た瞬間、私の考えを全て見抜いて対応してくださったんだと思います、そうですよね魔王様」
line = "「きっと一目見た瞬間、私の考えを全て見抜いて対応してくださったんだと思います、そうですよね魔王様」"

[[dialogue]]
speaker = "unk"
# それは持ち上げすぎ！
line = "それは持ち上げすぎ！"

[[dialogue]]
speaker = "unk"
# ちょっと待って！
line = "ちょっと待って！"

[[dialogue]]
speaker = "エステル"
# 「そんな事はありません。これでも魔王様の素晴らしさの一端すら言い表せていないのです」
line = "「そんな事はありません。これでも魔王様の素晴らしさの一端すら言い表せていないのです」"

[[dialogue]]
speaker = "エステル"
# 「本来、私と魔王様は出会うべき世界線に居ませんでした……ですがこうして奇跡的にお会いして、お話しすることが出来ているのです」
line = "「本来、私と魔王様は出会うべき世界線に居ませんでした……ですがこうして奇跡的にお会いして、お話しすることが出来ているのです」"

[[dialogue]]
speaker = "エステル"
# 「あぁ、女神様……魔王様に出会わせてくださったこの奇跡を感謝いたします……」
line = "「あぁ、女神様……魔王様に出会わせてくださったこの奇跡を感謝いたします……」"

[[dialogue]]
speaker = "メルエル"
# 「なんだか会長くんに対する熱量がすごくない？」
line = "「なんだか会長くんに対する熱量がすごくない？」"

[[dialogue]]
speaker = "エステル"
# 「それはもう、魔王様は私の命の恩人でもありますから」
line = "「それはもう、魔王様は私の命の恩人でもありますから」"

[[dialogue]]
speaker = "メルエル"
# 「えっ……それってどういうこと？」
line = "「えっ……それってどういうこと？」"

[[dialogue]]
speaker = "エステル"
# 「実は私……」
line = "「実は私……」"

[[dialogue]]
speaker = "unk"
# エステルは俺との出会いのことをメルエルに説明する。
line = "エステルは俺との出会いのことをメルエルに説明する。"

[[dialogue]]
speaker = "メルエル"
# 「そうなんだ……その時、エステルちゃんを守ってくれたのが会長くん……」
line = "「そうなんだ……その時、エステルちゃんを守ってくれたのが会長くん……」"

[[dialogue]]
speaker = "メルエル"
# 「もしかして……恋に落ちたりするのかな？」
line = "「もしかして……恋に落ちたりするのかな？」"

[[dialogue]]
speaker = "エステル"
# 「ふふっ、私は魔王様のことを尊敬しているだけですから……恋愛感情を抱くなんて恐れ多いことですよ」
line = "「ふふっ、私は魔王様のことを尊敬しているだけですから……恋愛感情を抱くなんて恐れ多いことですよ」"

[[dialogue]]
speaker = "メルエル"
# 「そ、そうなんだ……」
line = "「そ、そうなんだ……」"

[[dialogue]]
speaker = "unk"
# ふられた……
line = "ふられた……"

[[dialogue]]
speaker = "エステル"
# 「えっ？　私、魔王様をがっかりさせてしまったでしょうか？」
line = "「えっ？　私、魔王様をがっかりさせてしまったでしょうか？」"

[[dialogue]]
speaker = "エステル"
# 「元気を出してください……その為なら私、何でもいたしますから」
line = "「元気を出してください……その為なら私、何でもいたしますから」"

[[dialogue]]
speaker = "メルエル"
# 「何でもは、ちょっとまずいんじゃないかな～」
line = "「何でもは、ちょっとまずいんじゃないかな～」"

[[dialogue]]
speaker = "エステル"
# 「……そうですね、何でもは言い過ぎました。けれど命を捧げる程度の覚悟ならありますので……」
line = "「……そうですね、何でもは言い過ぎました。けれど命を捧げる程度の覚悟ならありますので……」"

[[dialogue]]
speaker = "メルエル"
# 「やっぱり重いよーーーっ！！！」
line = "「やっぱり重いよーーーっ！！！」"

[[dialogue]]
speaker = "女の子"
# 「ねえねえ、おねーさん。ここのお掃除終わったよ～」
line = "「ねえねえ、おねーさん。ここのお掃除終わったよ～」"

[[dialogue]]
speaker = "男の子"
# 「次は何すればいいんだ～」
line = "「次は何すればいいんだ～」"

[[dialogue]]
speaker = "エステル"
# 「はーい、分かりました。それじゃ次はね～……」
line = "「はーい、分かりました。それじゃ次はね～……」"

[[dialogue]]
speaker = "unk"
# ちょっと怖いくらい、俺のことを持ち上げてくれるエステル。
line = "ちょっと怖いくらい、俺のことを持ち上げてくれるエステル。"

[[dialogue]]
speaker = "unk"
# けれど、それはあくまで恋愛感情とは違うものであるらしかった。
line = "けれど、それはあくまで恋愛感情とは違うものであるらしかった。"

[[dialogue]]
speaker = "unk"
# しかし、そうはっきり言われてしまうと、少し寂しい気持ちがしてしまうのだった。
line = "しかし、そうはっきり言われてしまうと、少し寂しい気持ちがしてしまうのだった。"
