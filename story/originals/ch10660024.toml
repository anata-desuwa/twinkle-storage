[[dialogue]]
speaker = "unk"
# 第４話,永い旅路の果てに,P
line = "第４話,永い旅路の果てに,P"

[[dialogue]]
speaker = "unk"
# 俺と学園長は、魔界の色々な場所を旅した。
line = "俺と学園長は、魔界の色々な場所を旅した。"

[[dialogue]]
speaker = "unk"
# 辛く苦しい時もあったが、それらは全て２人の力で乗り越えてきた。
line = "辛く苦しい時もあったが、それらは全て２人の力で乗り越えてきた。"

[[dialogue]]
speaker = "unk"
# そんな長い長い旅の果てに、たどり着いたのはこの町──レゾフだった。
line = "そんな長い長い旅の果てに、たどり着いたのはこの町──レゾフだった。"

[[dialogue]]
speaker = "ラティエ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# そんな風に物思いにふけっちゃって
line = "そんな風に物思いにふけっちゃって"

[[dialogue]]
speaker = "unk"
# どうしたの、ラティエ？
line = "どうしたの、ラティエ？"

[[dialogue]]
speaker = "ラティエ"
# 「今までにきみと歩んできた旅路を振り返っていたんだ」
line = "「今までにきみと歩んできた旅路を振り返っていたんだ」"

[[dialogue]]
speaker = "ラティエ"
# 「魔界も広い、広いと思っていたけれど、気が付けば端から端まで旅をして……」
line = "「魔界も広い、広いと思っていたけれど、気が付けば端から端まで旅をして……」"

[[dialogue]]
speaker = "ラティエ"
# 「始めは頼りなかったきみも、どんどん頼もしくなっていって、今はこんなにも逞しくなってくれた」
line = "「始めは頼りなかったきみも、どんどん頼もしくなっていって、今はこんなにも逞しくなってくれた」"

[[dialogue]]
speaker = "ラティエ"
# 「頼りがいのある相方に出会えて、私は本当に幸運だったと思うよ」
line = "「頼りがいのある相方に出会えて、私は本当に幸運だったと思うよ」"

[[dialogue]]
speaker = "ラティエ"
# 「出会いと言えば……フフ、そうだよ。私ときみはこのレゾフで初めて出会ったんだ」
line = "「出会いと言えば……フフ、そうだよ。私ときみはこのレゾフで初めて出会ったんだ」"

[[dialogue]]
speaker = "ラティエ"
# 「何となく、その時のことを思い出していたんだよ」
line = "「何となく、その時のことを思い出していたんだよ」"

[[dialogue]]
speaker = "ラティエ"
# 「きみは私が流星学園の学園長だとは気付かなくて……」
line = "「きみは私が流星学園の学園長だとは気付かなくて……」"

[[dialogue]]
speaker = "ラティエ"
# 「無理もない話か、私も『さすらいの旅人』などと名乗っていたのだからな」
line = "「無理もない話か、私も『さすらいの旅人』などと名乗っていたのだからな」"

[[dialogue]]
speaker = "ラティエ"
# 「そんな私ときみが共に旅をして、その旅の果てに生涯の伴侶となり、今こうして出会いの場所であるレゾフに骨を<ruby=うず>埋</ruby>めようというのだから」
line = "「そんな私ときみが共に旅をして、その旅の果てに生涯の伴侶となり、今こうして出会いの場所であるレゾフに骨を<ruby>埋<rt>うず</rt></ruby>めようというのだから」"

[[dialogue]]
speaker = "ラティエ"
# 「まったく、人生というのは分からないものだよ」
line = "「まったく、人生というのは分からないものだよ」"

[[dialogue]]
speaker = "unk"
# 本当にね……
line = "本当にね……"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、きみまでしんみりさせてしまったな」
line = "「はっはっは、きみまでしんみりさせてしまったな」"

[[dialogue]]
speaker = "ラティエ"
# 「それより長話に興じていると、せっかくきみが作ってくれたシチューが冷めてしまう」
line = "「それより長話に興じていると、せっかくきみが作ってくれたシチューが冷めてしまう」"

[[dialogue]]
speaker = "ラティエ"
# 「人間界では夏の盛りでも、レゾフはもう温かいシチューが嬉しい寒さだな」
line = "「人間界では夏の盛りでも、レゾフはもう温かいシチューが嬉しい寒さだな」"

[[dialogue]]
speaker = "unk"
# 何か羽織るものを持ってこようか？
line = "何か羽織るものを持ってこようか？"

[[dialogue]]
speaker = "ラティエ"
# 「ありがとう、大丈夫だよ」
line = "「ありがとう、大丈夫だよ」"

[[dialogue]]
speaker = "ラティエ"
# 「それよりも隣に、私の近くに居てくれ。そして私がお願いしたら、そっと抱きしめてくれればいい」
line = "「それよりも隣に、私の近くに居てくれ。そして私がお願いしたら、そっと抱きしめてくれればいい」"

[[dialogue]]
speaker = "ラティエ"
# 「きみに抱きしめてもらえれば、どんな寒さでも凌ぐことが出来るからな」
line = "「きみに抱きしめてもらえれば、どんな寒さでも凌ぐことが出来るからな」"

[[dialogue]]
speaker = "ラティエ"
# 「旅をしていた頃も、レゾフに流れ着いてからも、私にとってそれが最高の暖の取り方さ」
line = "「旅をしていた頃も、レゾフに流れ着いてからも、私にとってそれが最高の暖の取り方さ」"

[[dialogue]]
speaker = "ラティエ"
# 「何といっても身体だけでなく、心まで芯から暖かくなれるのだからな」
line = "「何といっても身体だけでなく、心まで芯から暖かくなれるのだからな」"

[[dialogue]]
speaker = "unk"
# こうして俺と学園長──いや、ラティエは温かいシチューでお腹を満たして……
line = "こうして俺と学園長──いや、ラティエは温かいシチューでお腹を満たして……"

[[dialogue]]
speaker = "unk"
# それから訪れるレゾフの夜を、いつものように抱きしめ合って過ごすのだった。
line = "それから訪れるレゾフの夜を、いつものように抱きしめ合って過ごすのだった。"

[[dialogue]]
speaker = "unk"
# ……………………。
line = "……………………。"

[[dialogue]]
speaker = "ラティエ"
# 「────……会長くん……会長くん」
line = "「────……会長くん……会長くん」"

[[dialogue]]
speaker = "ラティエ"
# 「フフ、気持ちよく眠っているな……だが、そろそろ目を覚ましてくれ」
line = "「フフ、気持ちよく眠っているな……だが、そろそろ目を覚ましてくれ」"

[[dialogue]]
speaker = "ラティエ"
# 「おはよう。仕事中に居眠りとは、きみらしくないように思うが」
line = "「おはよう。仕事中に居眠りとは、きみらしくないように思うが」"

[[dialogue]]
speaker = "ラティエ"
# 「まあ書類の山を前にしたら、眠たくなってしまう気持ちはわかってやれるがな」
line = "「まあ書類の山を前にしたら、眠たくなってしまう気持ちはわかってやれるがな」"

[[dialogue]]
speaker = "ラティエ"
# 「もしかして疲れているのか？」
line = "「もしかして疲れているのか？」"

[[dialogue]]
speaker = "unk"
# だ、大丈夫です
line = "だ、大丈夫です"

[[dialogue]]
speaker = "ラティエ"
# 「そうか……でも無理はするなよ」
line = "「そうか……でも無理はするなよ」"

[[dialogue]]
speaker = "ラティエ"
# 「それにしても……寝言で何度も私の名前を呼んでいたようだが、どんな夢を見ていたんだ？」
line = "「それにしても……寝言で何度も私の名前を呼んでいたようだが、どんな夢を見ていたんだ？」"

[[dialogue]]
speaker = "unk"
# っ！！？
line = "っ！！？"

[[dialogue]]
speaker = "ラティエ"
# 「フフ……これは詳しく追及したいところだ。さあ、白状したまえ……」
line = "「フフ……これは詳しく追及したいところだ。さあ、白状したまえ……」"

[[dialogue]]
speaker = "ラティエ"
# 「最近はきみに１本取られてしまうことが多いからな、私がこの機会を逃すと思うなよ？」
line = "「最近はきみに１本取られてしまうことが多いからな、私がこの機会を逃すと思うなよ？」"

[[dialogue]]
speaker = "ラティエ"
# 「はっはっは、私と一緒に旅をして、レゾフで一緒に暮らしている夢を見たか！」
line = "「はっはっは、私と一緒に旅をして、レゾフで一緒に暮らしている夢を見たか！」"

[[dialogue]]
speaker = "ラティエ"
# 「夢にまで見てしまうとは、きみの想いは切実だな……」
line = "「夢にまで見てしまうとは、きみの想いは切実だな……」"

[[dialogue]]
speaker = "ラティエ"
# 「わかったわかった。抱きしめ合って眠ってやることは出来ないが、少しはサービスしてやろうじゃないか」
line = "「わかったわかった。抱きしめ合って眠ってやることは出来ないが、少しはサービスしてやろうじゃないか」"

[[dialogue]]
speaker = "ラティエ"
# 「ほら、こっちにこい……私の膝を貸してやろう」
line = "「ほら、こっちにこい……私の膝を貸してやろう」"

[[dialogue]]
speaker = "ラティエ"
# 「机に突っ伏して寝ていると、身体を痛めてしまうかもしれないからな。寝るならばちゃんと横になった方がいい」
line = "「机に突っ伏して寝ていると、身体を痛めてしまうかもしれないからな。寝るならばちゃんと横になった方がいい」"

[[dialogue]]
speaker = "ラティエ"
# 「寝心地は保証しないが、私の脚を枕にしてゆっくり休め」
line = "「寝心地は保証しないが、私の脚を枕にしてゆっくり休め」"

[[dialogue]]
speaker = "unk"
# お、お願いします
line = "お、お願いします"

[[dialogue]]
speaker = "unk"
# 変な夢をみたせいで、余計に学園長のことを意識してしまって、ドキドキしながら学園長の脚に頭を預ける。
line = "変な夢をみたせいで、余計に学園長のことを意識してしまって、ドキドキしながら学園長の脚に頭を預ける。"

[[dialogue]]
speaker = "unk"
# 毎日鍛錬によって鍛え上げられている学園長の身体だったが、その膝枕はとてもやわらかいもので──
line = "毎日鍛錬によって鍛え上げられている学園長の身体だったが、その膝枕はとてもやわらかいもので──"

[[dialogue]]
speaker = "unk"
# 俺はその心地よさに、すぐにまどろみに落ちてしまったのだった
line = "俺はその心地よさに、すぐにまどろみに落ちてしまったのだった"
