[[dialogue]]
speaker = "unk"
# 第１話,星見エリシア,B
line = "第１話,星見エリシア,B"

[[dialogue]]
speaker = "unk"
# 急速の飛行を続け、ようやく先行したフィオナのもとへ到着した俺たち。
line = "急速の飛行を続け、ようやく先行したフィオナのもとへ到着した俺たち。"

[[dialogue]]
speaker = "unk"
# そこでは……予想だにしない光景が待ち受けていた。
line = "そこでは……予想だにしない光景が待ち受けていた。"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオ──えっ……？」
line = "「フィオ──えっ……？」"

[[dialogue]]
speaker = "フィオナ？"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "アポロ？"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 佇むフィオナ。崩折れるアポロ。
line = "佇むフィオナ。崩折れるアポロ。"

[[dialogue]]
speaker = "unk"
# 見知った２人──のはずだが、その雰囲気はどちらも異様。
line = "見知った２人──のはずだが、その雰囲気はどちらも異様。"

[[dialogue]]
speaker = "unk"
# 常に冷静だったはずのフィオナから、静かな激情の炎が燃え立つのを感じる。
line = "常に冷静だったはずのフィオナから、静かな激情の炎が燃え立つのを感じる。"

[[dialogue]]
speaker = "unk"
# また何より、知らない顔がそこにいたのも確かで……
line = "また何より、知らない顔がそこにいたのも確かで……"

[[dialogue]]
speaker = "マトイ"
# 「仮面が……！」
line = "「仮面が……！」"

[[dialogue]]
speaker = "アポロ？"
# 「っ……っ……！」
line = "「っ……っ……！」"

[[dialogue]]
speaker = "unk"
# 頭痛に苛まれるように、額を片手で押さえる少女。
line = "頭痛に苛まれるように、額を片手で押さえる少女。"

[[dialogue]]
speaker = "unk"
# その手つきは、失われた仮面を探しているようにも映る。
line = "その手つきは、失われた仮面を探しているようにも映る。"

[[dialogue]]
speaker = "クロト"
# 「……フィオナ？」
line = "「……フィオナ？」"

[[dialogue]]
speaker = "フィオナ？"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# ──君がやったのか？
line = "──君がやったのか？"

[[dialogue]]
speaker = "unk"
# そう言外に問いかけると、彼女はゆっくり時間をかけて頷いた。
line = "そう言外に問いかけると、彼女はゆっくり時間をかけて頷いた。"

[[dialogue]]
speaker = "unk"
# この一帯では──太陽の星力が未だ余熱をくすぶらせている。
line = "この一帯では──太陽の星力が未だ余熱をくすぶらせている。"

[[dialogue]]
speaker = "unk"
# そして……
line = "そして……"

[[dialogue]]
speaker = "アポロ？"
# 「……何のつもりだ」
line = "「……何のつもりだ」"

[[dialogue]]
speaker = "フィオナ？"
# 「化けの皮を剥いだのみです。よもや素顔まで模しているとは思いませんでしたが」
line = "「化けの皮を剥いだのみです。よもや素顔まで模しているとは思いませんでしたが」"

[[dialogue]]
speaker = "フィオナ？"
# 「──あなたは誰です？　一体誰に断って、その姿をしているのですか？」
line = "「──あなたは誰です？　一体誰に断って、その姿をしているのですか？」"

[[dialogue]]
speaker = "アポロ？"
# 「ふ……ふふっ。ふふふっ」
line = "「ふ……ふふっ。ふふふっ」"

[[dialogue]]
speaker = "unk"
# フィオナの問いかけに対して──アポロはくつくつと笑った。
line = "フィオナの問いかけに対して──アポロはくつくつと笑った。"

[[dialogue]]
speaker = "unk"
# それから、どこか儚げな表情で、ふっと漏らす。
line = "それから、どこか儚げな表情で、ふっと漏らす。"

[[dialogue]]
speaker = "アポロ？"
# 「相変わらず──悪ふざけには厳しいのだな。エリシア」
line = "「相変わらず──悪ふざけには厳しいのだな。エリシア」"

[[dialogue]]
speaker = "フィオナ？"
# 「っ……！？」
line = "「っ……！？」"

[[dialogue]]
speaker = "unk"
# エリシア。
line = "エリシア。"

[[dialogue]]
speaker = "unk"
# そう呼ばれたフィオナは、なぜか身をのけぞらせるほどに驚いていた。
line = "そう呼ばれたフィオナは、なぜか身をのけぞらせるほどに驚いていた。"

[[dialogue]]
speaker = "フィオナ？"
# 「……そう。そうですか。ただの偽者と思っていましたが──そう単純なわけでもないようですね」
line = "「……そう。そうですか。ただの偽者と思っていましたが──そう単純なわけでもないようですね」"

[[dialogue]]
speaker = "フィオナ？"
# 「ならば、私と向き合ってもらいましょうか──<b>姉さん</b>」
line = "「ならば、私と向き合ってもらいましょうか──<b>姉さん</b>」"

[[dialogue]]
speaker = "ソフィア"
# 「！？」
line = "「！？」"

[[dialogue]]
speaker = "クロト"
# 「お姉さん──だって……？」
line = "「お姉さん──だって……？」"

[[dialogue]]
speaker = "アナ"
# 「それに──聞いたことのない名前も……」
line = "「それに──聞いたことのない名前も……」"

[[dialogue]]
speaker = "unk"
# 外野である俺たちには意図が汲み取れずにいる──と、彼女はさらに衝撃的な告白をした。
line = "外野である俺たちには意図が汲み取れずにいる──と、彼女はさらに衝撃的な告白をした。"

[[dialogue]]
speaker = "フィオナ？"
# 「……黙っていてすみません、皆さん。私は今まで自らを偽ってきました」
line = "「……黙っていてすみません、皆さん。私は今まで自らを偽ってきました」"

[[dialogue]]
speaker = "ニャリオン"
# 「ニャッ……！？！？」
line = "「ニャッ……！？！？」"

[[dialogue]]
speaker = "ユウリ"
# 「偽るって──どういうことだよ……！？」
line = "「偽るって──どういうことだよ……！？」"

[[dialogue]]
speaker = "フィオナ？"
# 「私は、星見フィオナではありません」
line = "「私は、星見フィオナではありません」"

[[dialogue]]
speaker = "unk"
# フィオナは──何かを諦めたような、落ち着き払った語調で言った。
line = "フィオナは──何かを諦めたような、落ち着き払った語調で言った。"

[[dialogue]]
speaker = "ユウリ"
# 「フィ、フィオナじゃねえって……どういうことだよ！　どっからどう見たって、あたしの知ってるフィオナだぞ」
line = "「フィ、フィオナじゃねえって……どういうことだよ！　どっからどう見たって、あたしの知ってるフィオナだぞ」"

[[dialogue]]
speaker = "ソフィア"
# 「そ……そうです！　会長は今も、私の憧れる凛々しきお姿です！」
line = "「そ……そうです！　会長は今も、私の憧れる凛々しきお姿です！」"

[[dialogue]]
speaker = "unk"
# 新星の俺たちだけじゃない。
line = "新星の俺たちだけじゃない。"

[[dialogue]]
speaker = "unk"
# 彼女と長い付き合いのはずの流星メンバーまで、驚愕を受けて戸惑っていた。
line = "彼女と長い付き合いのはずの流星メンバーまで、驚愕を受けて戸惑っていた。"

[[dialogue]]
speaker = "unk"
# むしろ付き合いの浅い俺たちでは口を挟めないほどに。
line = "むしろ付き合いの浅い俺たちでは口を挟めないほどに。"

[[dialogue]]
speaker = "セーラ"
# 「ん～、目の前にいるフィオナちゃんが偽者ってこと？　でも、うち的にはどう見ても本物だけど」
line = "「ん～、目の前にいるフィオナちゃんが偽者ってこと？　でも、うち的にはどう見ても本物だけど」"

[[dialogue]]
speaker = "セーラ"
# 「もしフィオナちゃんのそっくりさんだとしても、守護星まではなりすませなくない？」
line = "「もしフィオナちゃんのそっくりさんだとしても、守護星まではなりすませなくない？」"

[[dialogue]]
speaker = "アナ"
# 「ん……そうですね。太陽の守護星を持つ方が、２人３人もいるとは思えません」
line = "「ん……そうですね。太陽の守護星を持つ方が、２人３人もいるとは思えません」"

[[dialogue]]
speaker = "フィオナ？"
# 「ええ。ですから」
line = "「ええ。ですから」"

[[dialogue]]
speaker = "フィオナ？"
# 「皆さんと出会った時からずっと──私は名を偽っていたということです」
line = "「皆さんと出会った時からずっと──私は名を偽っていたということです」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "ルリエル"
# 「そ……そんな……」
line = "「そ……そんな……」"

[[dialogue]]
speaker = "unk"
# フィオナ──否、フィオナでないと明かした彼女の告白は強い波紋を呼んだ。
line = "フィオナ──否、フィオナでないと明かした彼女の告白は強い波紋を呼んだ。"

[[dialogue]]
speaker = "ニャリオン"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "クロト"
# 「……」
line = "「……」"

[[dialogue]]
speaker = "unk"
# 皆の表情が驚きに満ちる中、ニャリオンだけが別種の当惑を浮かべていたのを見逃さない。
line = "皆の表情が驚きに満ちる中、ニャリオンだけが別種の当惑を浮かべていたのを見逃さない。"

[[dialogue]]
speaker = "unk"
# どうやらニャリオンだけは事情を知っているようだが──
line = "どうやらニャリオンだけは事情を知っているようだが──"

[[dialogue]]
speaker = "フィオナ？"
# 「ですよね──フィオナ姉さん？」
line = "「ですよね──フィオナ姉さん？」"

[[dialogue]]
speaker = "アポロ？"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# よろめきながら立ち上がるアポロ。
line = "よろめきながら立ち上がるアポロ。"

[[dialogue]]
speaker = "unk"
# だが、仮面のなくなった少女は必死に<ruby=かぶり>頭</ruby>を振って……
line = "だが、仮面のなくなった少女は必死に<ruby>頭<rt>かぶり</rt></ruby>を振って……"

[[dialogue]]
speaker = "アポロ？"
# 「っ……いや……ちが、う」
line = "「っ……いや……ちが、う」"

[[dialogue]]
speaker = "アポロ？"
# 「あたしは……アポロだ。フィオナなんて奴は──知らない」
line = "「あたしは……アポロだ。フィオナなんて奴は──知らない」"

[[dialogue]]
speaker = "フィオナ？"
# 「あなたは今、私のことを呼びました。……私の名を知る者は、星見の人間以外にありえません」
line = "「あなたは今、私のことを呼びました。……私の名を知る者は、星見の人間以外にありえません」"

[[dialogue]]
speaker = "フィオナ？"
# 「本当は覚えているのに──知らぬふりを押し通すつもりですか？」
line = "「本当は覚えているのに──知らぬふりを押し通すつもりですか？」"

[[dialogue]]
speaker = "アポロ？"
# 「うる、さい──黙れっ……！」
line = "「うる、さい──黙れっ……！」"

[[dialogue]]
speaker = "unk"
# アポロはさらに苦しみながら首を振っていた。
line = "アポロはさらに苦しみながら首を振っていた。"

[[dialogue]]
speaker = "unk"
# まるで、嫌な考えを頭から追い出すみたいに……
line = "まるで、嫌な考えを頭から追い出すみたいに……"

[[dialogue]]
speaker = "ユウリ"
# 「フィオナがフィオナって……！　ああもう、頭が混乱してついてけねー！」
line = "「フィオナがフィオナって……！　ああもう、頭が混乱してついてけねー！」"

[[dialogue]]
speaker = "アナ"
# 「どうやら……先ほど聞こえたものが、流星会長のお名前のようです」
line = "「どうやら……先ほど聞こえたものが、流星会長のお名前のようです」"

[[dialogue]]
speaker = "エリシア"
# 「はい。私の本名は星見エリシア──眠れる姉に代わって、名を受け継いでいたにすぎません」
line = "「はい。私の本名は星見エリシア──眠れる姉に代わって、名を受け継いでいたにすぎません」"

[[dialogue]]
speaker = "エリシア"
# 「そして。本来の『フィオナ』はあそこにいる──姉さんのことを指します」
line = "「そして。本来の『フィオナ』はあそこにいる──姉さんのことを指します」"

[[dialogue]]
speaker = "アポロ？"
# 「違う──違う違う違う！　あたしは……あたしはアポロだ、フィオナなんかじゃない！」
line = "「違う──違う違う違う！　あたしは……あたしはアポロだ、フィオナなんかじゃない！」"

[[dialogue]]
speaker = "エリシア"
# 「いいえ姉さん。あなたはフィオナ。星見家の長女として生まれ、魔王となる宿命を背負った人間です」
line = "「いいえ姉さん。あなたはフィオナ。星見家の長女として生まれ、魔王となる宿命を背負った人間です」"

[[dialogue]]
speaker = "エリシア"
# 「それとも──妹の顔も忘れてしまいましたか？　私ばかりが成長してしまったから」
line = "「それとも──妹の顔も忘れてしまいましたか？　私ばかりが成長してしまったから」"

[[dialogue]]
speaker = "アポロ？"
# 「っ……黙れ！　オマエなんか知らない──勝手に妹ヅラするな！」
line = "「っ……黙れ！　オマエなんか知らない──勝手に妹ヅラするな！」"

[[dialogue]]
speaker = "アポロ？"
# 「あたしは──あたしの名前は、アポロなんだ──！！」
line = "「あたしは──あたしの名前は、アポロなんだ──！！」"

[[dialogue]]
speaker = "エリシア"
# 「っ──！」
line = "「っ──！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「フィオナを守るわよ──！」
line = "「フィオナを守るわよ──！」"

[[dialogue]]
speaker = "unk"
# 瀕死の流星が再びアポロに渦を巻き、フィオナへと押し寄せる。
line = "瀕死の流星が再びアポロに渦を巻き、フィオナへと押し寄せる。"

[[dialogue]]
speaker = "unk"
# 全員で彼女をかばおうとした、その時──
line = "全員で彼女をかばおうとした、その時──"
