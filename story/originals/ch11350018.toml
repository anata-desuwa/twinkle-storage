# 「……こういうのは、学園を卒業してからだと思ってたけど――」
line = "「……こういうのは、学園を卒業してからだと思ってたけど――」"

[[dialogue]]
speaker = "unk"
# 僕だって男だ――だから、覚悟を決めて、告げる。
line = "僕だって男だ――だから、覚悟を決めて、告げる。"

[[dialogue]]
speaker = "シン"
# 「ルネア、僕と結婚してくれますか？」
line = "「ルネア、僕と結婚してくれますか？」"

[[dialogue]]
speaker = "ルネア"
# 「……！」
line = "「……！」"

[[dialogue]]
speaker = "シン"
# 「僕もルネアに、子供を産んでほしい。一生一緒にいたい」
line = "「僕もルネアに、子供を産んでほしい。一生一緒にいたい」"

[[dialogue]]
speaker = "ルネア"
# 「結婚！？　ほ、本当にいいの……？」
line = "「結婚！？　ほ、本当にいいの……？」"

[[dialogue]]
speaker = "シン"
# 「うん。ルネアのこと、心から愛してるから」
line = "「うん。ルネアのこと、心から愛してるから」"

[[dialogue]]
speaker = "シン"
# 「だから――これから家族が増えるんだし、沢山稼げるようにならなくちゃね！」
line = "「だから――これから家族が増えるんだし、沢山稼げるようにならなくちゃね！」"

[[dialogue]]
speaker = "ルネア"
# 「～～～っ<emoji=heart04>　シンっ！　嬉しいっ<emoji=heart04>」
line = "「～～～っ<emoji=heart04>　シンっ！　嬉しいっ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# ルネアはそのまま僕に抱き着いて、キスをして来る。
line = "ルネアはそのまま僕に抱き着いて、キスをして来る。"

[[dialogue]]
speaker = "ルネア"
# 「んっ……ちゅっ<emoji=heart04>」
line = "「んっ……ちゅっ<emoji=heart04>」"

[[dialogue]]
speaker = "ルネア"
# 「――宇宙一大好きよ、シン<emoji=heart04>　愛しているわ<emoji=heart04>」
line = "「――宇宙一大好きよ、シン<emoji=heart04>　愛しているわ<emoji=heart04>」"

[[dialogue]]
speaker = "unk"
# 僕の女神様はそう言って、心から幸せそうな笑顔を浮かべてくれるのだった――
line = "僕の女神様はそう言って、心から幸せそうな笑顔を浮かべてくれるのだった――"
