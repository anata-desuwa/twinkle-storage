line = "「ワオ！　この常夏でもひんやりクールなヨーグルト──大変珍しいデース！」"

[[dialogue]]
speaker = "リップル"
# 「ン～、火照った体に染み渡りマース！　かき氷と並べて海の家に置いたら、人気が出そうデース！」
line = "「ン～、火照った体に染み渡りマース！　かき氷と並べて海の家に置いたら、人気が出そうデース！」"

[[dialogue]]
speaker = "ヘレナ"
