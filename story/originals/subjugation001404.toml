line = "「は、はい。全くその通りで。こんな過激な姿で堂々と外を歩いてる自分を意識するだけでも、昂ぶってしまうくらいでして……」"

[[dialogue]]
speaker = "ルリエル"
# 「あ、それもわかります……！　海で水着になるのって特別感がありますよね！　とっても爽快な気分になって、ドキドキしちゃいますもん！」
line = "「あ、それもわかります……！　海で水着になるのって特別感がありますよね！　とっても爽快な気分になって、ドキドキしちゃいますもん！」"

[[dialogue]]
speaker = "イクシリオン"
# 「全くその通りで……！　すれ違う人から視線を向けられるたびに、心がゾクゾクしてしまいますし……！」
line = "「全くその通りで……！　すれ違う人から視線を向けられるたびに、心がゾクゾクしてしまいますし……！」"

[[dialogue]]
speaker = "ルリエル"
