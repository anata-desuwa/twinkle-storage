[[dialogue]]
speaker = "unk"
# 第３話,意識し始めるふたり,P
line = "第３話,意識し始めるふたり,P"

[[dialogue]]
speaker = "unk"
# カップル専用ドリンクを一緒に飲んでから、今まで以上に俺と一緒にいることが増えたジャクリーヌ。
line = "カップル専用ドリンクを一緒に飲んでから、今まで以上に俺と一緒にいることが増えたジャクリーヌ。"

[[dialogue]]
speaker = "unk"
# 最近では――
line = "最近では――"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「トリックオアトリート♪　お菓子あげゆ♪」
line = "「トリックオアトリート♪　お菓子あげゆ♪」"

[[dialogue]]
speaker = "unk"
# そっちが貰う側じゃないのか？
line = "そっちが貰う側じゃないのか？"

[[dialogue]]
speaker = "unk"
# トリックオアトリートって、
line = "トリックオアトリートって、"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「細かいことは気にしないでいいゆ！」
line = "「細かいことは気にしないでいいゆ！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「人間界では、バレンタイン？　に女の子が男の子にチョコをあげることもあるって聞いたゆ！　だからあげるの！」
line = "「人間界では、バレンタイン？　に女の子が男の子にチョコをあげることもあるって聞いたゆ！　だからあげるの！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そのお菓子は、最近のお気に入りのガトーショコラだから、味わって食べるの！」
line = "「そのお菓子は、最近のお気に入りのガトーショコラだから、味わって食べるの！」"

[[dialogue]]
speaker = "unk"
# わかった。ありがたく貰っておくよ。
line = "わかった。ありがたく貰っておくよ。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「あとで感想教えてなの！」
line = "「あとで感想教えてなの！」"

[[dialogue]]
speaker = "unk"
# ジャクリーヌは俺に対して、自分が気に入ったお菓子をよくくれるようになった。
line = "ジャクリーヌは俺に対して、自分が気に入ったお菓子をよくくれるようになった。"

[[dialogue]]
speaker = "unk"
# その度に心臓は高鳴って――
line = "その度に心臓は高鳴って――"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「トリックオアトリート♪　生チョコロールケーキをあげるの♪」
line = "「トリックオアトリート♪　生チョコロールケーキをあげるの♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ～ん！　今日はマカロンをたくさんあげるのー！」
line = "「ゆ～ん！　今日はマカロンをたくさんあげるのー！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆ♪　今日は～……ゆ～ん！　パンプキン味のプリンをあげるなの！」
line = "「ゆーっゆっゆっゆ♪　今日は～……ゆ～ん！　パンプキン味のプリンをあげるなの！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆ……ゆゆ……も、もう……食べられないの……」
line = "「ゆ……ゆゆ……も、もう……食べられないの……」"

[[dialogue]]
speaker = "unk"
# ホントにたくさんのお菓子をもらい、時にはお腹が苦しくなるまで一緒に食べたこともあった。
line = "ホントにたくさんのお菓子をもらい、時にはお腹が苦しくなるまで一緒に食べたこともあった。"

[[dialogue]]
speaker = "unk"
# そんなこんなで、今日はジャクリーヌに呼び出されたヒトリが一緒に星徒会室まで来ていた。
line = "そんなこんなで、今日はジャクリーヌに呼び出されたヒトリが一緒に星徒会室まで来ていた。"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆゆーん！　今日の衣装の着こなしはどうゆ？」
line = "「ゆゆーん！　今日の衣装の着こなしはどうゆ？」"

[[dialogue]]
speaker = "ヒトリ"
# 「とってもかわいいです！　今日の萌え袖は……一段となびいていて最高です……！」
line = "「とってもかわいいです！　今日の萌え袖は……一段となびいていて最高です……！」"

[[dialogue]]
speaker = "unk"
# 萌え袖と合わさって、絶妙な可愛さだぞ！
line = "萌え袖と合わさって、絶妙な可愛さだぞ！"

[[dialogue]]
speaker = "unk"
# ふわっと広がったスカートも
line = "ふわっと広がったスカートも"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆへへ、ゆへへへ♪　余のためにあるような服だから当然なの！」
line = "「ゆへへ、ゆへへへ♪　余のためにあるような服だから当然なの！」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「で、でも……今日は特にそこを意識して着こなしたから、会長にそう言ってもらえて、嬉しいゆ……♪」
line = "「で、でも……今日は特にそこを意識して着こなしたから、会長にそう言ってもらえて、嬉しいゆ……♪」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「な、なんだか……急にすっごく、恥ずかしいの……」
line = "「な、なんだか……急にすっごく、恥ずかしいの……」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「ゆーっゆっゆっゆっゆ♪」
line = "「ゆーっゆっゆっゆっゆ♪」"

[[dialogue]]
speaker = "ヒトリ"
# 「あれ？　なんかジャクリーヌちゃん、いつもと様子が違う……？　恥ずかしさを隠してる感じ……？」
line = "「あれ？　なんかジャクリーヌちゃん、いつもと様子が違う……？　恥ずかしさを隠してる感じ……？」"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「トリックオアトリート♪　褒めてくれたお礼に、今日はパンプキンパイをあげるゆ！」
line = "「トリックオアトリート♪　褒めてくれたお礼に、今日はパンプキンパイをあげるゆ！」"

[[dialogue]]
speaker = "unk"
# カボチャ姿で踊りながら、いつものように俺にお菓子をあげてくるジャクリーヌ。
line = "カボチャ姿で踊りながら、いつものように俺にお菓子をあげてくるジャクリーヌ。"

[[dialogue]]
speaker = "unk"
# どうした？　ホントに最近変だぞ？
line = "どうした？　ホントに最近変だぞ？"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「そうなの？　余はいつも通りのつもりだゆ？」
line = "「そうなの？　余はいつも通りのつもりだゆ？」"

[[dialogue]]
speaker = "unk"
# ヒトリにももっと……
line = "ヒトリにももっと……"

[[dialogue]]
speaker = "unk"
# どうして俺にだけお菓子をくれるんだ？
line = "どうして俺にだけお菓子をくれるんだ？"

[[dialogue]]
speaker = "unk"
# それが失言だったと気づいた時にはすでに遅く……
line = "それが失言だったと気づいた時にはすでに遅く……"

[[dialogue]]
speaker = "ジャクリーヌ"
# 「余のプレゼントの何が気に入らないゆ！？　会長のバカーーーーっ！！」
line = "「余のプレゼントの何が気に入らないゆ！？　会長のバカーーーーっ！！」"

[[dialogue]]
speaker = "ヒトリ"
# 「会長さん……今の発言は、ダメ、だと思います……」
line = "「会長さん……今の発言は、ダメ、だと思います……」"

[[dialogue]]
speaker = "ヒトリ"
# 「だって……ジャクリーヌちゃんは会長さんのこと、異性として意識してるんじゃないかと……」
line = "「だって……ジャクリーヌちゃんは会長さんのこと、異性として意識してるんじゃないかと……」"

[[dialogue]]
speaker = "ヒトリ"
# 「だから会長さんにだけ……大好きなお菓子をあげてたんだと思いますよ？」
line = "「だから会長さんにだけ……大好きなお菓子をあげてたんだと思いますよ？」"

[[dialogue]]
speaker = "unk"
# ヒトリからの指摘でやっと気づいた。
line = "ヒトリからの指摘でやっと気づいた。"

[[dialogue]]
speaker = "unk"
# ジャクリーヌと一緒にいると心臓が高鳴る理由。それは、俺もジャクリーヌのことを女の子として意識しているからなんだ。
line = "ジャクリーヌと一緒にいると心臓が高鳴る理由。それは、俺もジャクリーヌのことを女の子として意識しているからなんだ。"

[[dialogue]]
speaker = "unk"
# そうだと理解した瞬間、ジャクリーヌを追いかけるために全速力で走り出したのだった。
line = "そうだと理解した瞬間、ジャクリーヌを追いかけるために全速力で走り出したのだった。"

[[dialogue]]
speaker = "ヒトリ"
# 「頑張ってください会長さん……！」
line = "「頑張ってください会長さん……！」"
