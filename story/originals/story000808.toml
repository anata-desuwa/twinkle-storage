[[dialogue]]
speaker = "unk"
# 後日──
line = "後日──"

[[dialogue]]
speaker = "女生徒"
# 「見つけてくれて本当にありがとう！　とても……とても大切な物だったから！　ほとんどもう諦めかけてて……！」
line = "「見つけてくれて本当にありがとう！　とても……とても大切な物だったから！　ほとんどもう諦めかけてて……！」"

[[dialogue]]
speaker = "モナカ"
# 「えへへ。良かったね、喜んでもらえて」
line = "「えへへ。良かったね、喜んでもらえて」"

[[dialogue]]
speaker = "シフォン"
# 「ええ。あの笑顔を見られただけで頑張った甲斐があるというものです」
line = "「ええ。あの笑顔を見られただけで頑張った甲斐があるというものです」"

[[dialogue]]
speaker = "パルミエ"
# 「体おも～い、だる～い。ちょっと働き過ぎちゃったわ～」
line = "「体おも～い、だる～い。ちょっと働き過ぎちゃったわ～」"

[[dialogue]]
speaker = "モナカ"
# 「ふふ、モナカがマッサージしてあげるね？　モナカたちのために、たくさん動き回ってくれてたみたいだし」
line = "「ふふ、モナカがマッサージしてあげるね？　モナカたちのために、たくさん動き回ってくれてたみたいだし」"

[[dialogue]]
speaker = "パルミエ"
# 「なら、お願いしちゃおうかしら～。モナカのマッサージは気持ちいいのよね～」
line = "「なら、お願いしちゃおうかしら～。モナカのマッサージは気持ちいいのよね～」"

[[dialogue]]
speaker = "シフォン"
# 「待ってください、モナカ。そこまでする必要はないかもしれませんよ」
line = "「待ってください、モナカ。そこまでする必要はないかもしれませんよ」"

[[dialogue]]
speaker = "モナカ"
# 「ふぇ？　どうして？」
line = "「ふぇ？　どうして？」"

[[dialogue]]
speaker = "シフォン"
# 「このグータラ女がおなか部に届いた相談をこっそり星徒会に押しつけていたからですよ。それもずーっと前から」
line = "「このグータラ女がおなか部に届いた相談をこっそり星徒会に押しつけていたからですよ。それもずーっと前から」"

[[dialogue]]
speaker = "パルミエ"
# 「ギクっ！　ど、どうしてそれを……！」
line = "「ギクっ！　ど、どうしてそれを……！」"

[[dialogue]]
speaker = "シフォン"
# 「ヴィーナスさんから聞きました。ちっとも相談が届かないわけです」
line = "「ヴィーナスさんから聞きました。ちっとも相談が届かないわけです」"

[[dialogue]]
speaker = "シフォン"
# 「今回の件も星徒会の机にこっそり手紙を置こうとしたところをヴィーナスさんに見つかって始まったそうですね？」
line = "「今回の件も星徒会の机にこっそり手紙を置こうとしたところをヴィーナスさんに見つかって始まったそうですね？」"

[[dialogue]]
speaker = "シフォン"
# 「しかもヴィーナスさんに怒られないように、私たちのことを言い訳に使って──」
line = "「しかもヴィーナスさんに怒られないように、私たちのことを言い訳に使って──」"

[[dialogue]]
speaker = "パルミエ"
# 「シフォンもモナカも、すごく臆病で繊細な子でねっ？　自分の羽根の色をずっと気にしてたり、自分を落ちこぼれだって言い続けたりしてるのよ……！」
line = "「シフォンもモナカも、すごく臆病で繊細な子でねっ？　自分の羽根の色をずっと気にしてたり、自分を落ちこぼれだって言い続けたりしてるのよ……！」"

[[dialogue]]
speaker = "パルミエ"
# 「だから年長者としてあまり難しい仕事は受けさせたくなくて……！　もしも失敗しちゃったら立ち直れなくなっちゃうかもしれないから……！」
line = "「だから年長者としてあまり難しい仕事は受けさせたくなくて……！　もしも失敗しちゃったら立ち直れなくなっちゃうかもしれないから……！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「なるほどね、事情はわかったわ。パルミエさんの気持ちもわからなくもないし」
line = "「なるほどね、事情はわかったわ。パルミエさんの気持ちもわからなくもないし」"

[[dialogue]]
speaker = "パルミエ"
# 「ほっ……。助かった……」
line = "「ほっ……。助かった……」"

[[dialogue]]
speaker = "ヴィーナス"
# 「でも、それならいっそ思いっきり難しい相談を２人に頼んでみましょ！」
line = "「でも、それならいっそ思いっきり難しい相談を２人に頼んでみましょ！」"

[[dialogue]]
speaker = "パルミエ"
# 「えっ！？　ど、どういうこと～？」
line = "「えっ！？　ど、どういうこと～？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「私も２人のことは気になってたのよ。あと一歩でプリマステラになれそうな人材なのに勿体ないって」
line = "「私も２人のことは気になってたのよ。あと一歩でプリマステラになれそうな人材なのに勿体ないって」"

[[dialogue]]
speaker = "ヴィーナス"
# 「だからこそあえて崖から突き落としてみようってこと♪　一皮むけてくれるかもしれないわ♪　例えば──」
line = "「だからこそあえて崖から突き落としてみようってこと♪　一皮むけてくれるかもしれないわ♪　例えば──」"

[[dialogue]]
speaker = "パルミエ"
# 「へぇ、なるほどね～。確かに面白いかも。そういうお悩み相談なら、あの子たちも本気になれるかもしれないし」
line = "「へぇ、なるほどね～。確かに面白いかも。そういうお悩み相談なら、あの子たちも本気になれるかもしれないし」"

[[dialogue]]
speaker = "パルミエ"
# 「それに上手くいけば星徒会に仕事を押しつけてたこともシフォンにバレないし……♪　ふふふ、喜んで協力させてもらうわ」
line = "「それに上手くいけば星徒会に仕事を押しつけてたこともシフォンにバレないし……♪　ふふふ、喜んで協力させてもらうわ」"

[[dialogue]]
speaker = "モナカ"
# 「パルちゃん……。マッサージなし」
line = "「パルちゃん……。マッサージなし」"

[[dialogue]]
speaker = "パルミエ"
# 「え～！　結果的に押しつけてた仕事はやったじゃな～い！　校門の掃除も、倉庫の整理も、カフェテリアの手伝いとかも～！」
line = "「え～！　結果的に押しつけてた仕事はやったじゃな～い！　校門の掃除も、倉庫の整理も、カフェテリアの手伝いとかも～！」"

[[dialogue]]
speaker = "シフォン"
# 「当然ですよ。今までどれだけの相談を星徒会に押しつけてきたんですか。おなか部を作ろうって言ったのはパルミエでしょうに」
line = "「当然ですよ。今までどれだけの相談を星徒会に押しつけてきたんですか。おなか部を作ろうって言ったのはパルミエでしょうに」"

[[dialogue]]
speaker = "モナカ"
# 「そうだよ。次からはモナカにちゃんと相談して？　もし本当に難しい相談なら、にぃ様に協力してってお願いしたりするから……」
line = "「そうだよ。次からはモナカにちゃんと相談して？　もし本当に難しい相談なら、にぃ様に協力してってお願いしたりするから……」"

[[dialogue]]
speaker = "パルミエ"
# 「あら……」
line = "「あら……」"

[[dialogue]]
speaker = "パルミエ"
# 「……確かにこれからはあんまり星徒会に仕事を押しつける必要はなさそうね。ふふ、本当に一皮むけられたみたいだし」
line = "「……確かにこれからはあんまり星徒会に仕事を押しつける必要はなさそうね。ふふ、本当に一皮むけられたみたいだし」"

[[dialogue]]
speaker = "シフォン"
# 「何か言いましたか？」
line = "「何か言いましたか？」"

[[dialogue]]
speaker = "パルミエ"
# 「ううん、何も♪」
line = "「ううん、何も♪」"

[[dialogue]]
speaker = "モナカ"
# 「でも……えへへ。本物のモンスターを倒して、３人揃ってプリマステラにしてもらえて良かったね？」
line = "「でも……えへへ。本物のモンスターを倒して、３人揃ってプリマステラにしてもらえて良かったね？」"

[[dialogue]]
speaker = "シフォン"
# 「怪我の功名でしたけどね。てっきり勝手な真似をして当分試験も受けられないかと思いましたが」
line = "「怪我の功名でしたけどね。てっきり勝手な真似をして当分試験も受けられないかと思いましたが」"

[[dialogue]]
speaker = "パルミエ"
# 「辞退もさせてくれなかったものね～。はぁ、これからの学園生活が憂鬱だわ～」
line = "「辞退もさせてくれなかったものね～。はぁ、これからの学園生活が憂鬱だわ～」"

[[dialogue]]
speaker = "シフォン"
# 「そういえばあのモンスターはどうして新星学園に現れたのでしょうか？」
line = "「そういえばあのモンスターはどうして新星学園に現れたのでしょうか？」"

[[dialogue]]
speaker = "パルミエ"
# 「モンスターに化けた水精ちゃんをうちの部室に匿ってたからじゃない？　ほら２人が一度取り逃がしちゃった時も部室に隠してたのよ」
line = "「モンスターに化けた水精ちゃんをうちの部室に匿ってたからじゃない？　ほら２人が一度取り逃がしちゃった時も部室に隠してたのよ」"

[[dialogue]]
speaker = "モナカ"
# 「仲間だと思って、つい部室に来ちゃったってこと……？　ならラッキーだったね。おかげで指輪を取り戻せたから……」
line = "「仲間だと思って、つい部室に来ちゃったってこと……？　ならラッキーだったね。おかげで指輪を取り戻せたから……」"

[[dialogue]]
speaker = "シフォン"
# 「……待ってください。あの盗まれたように見せかけていたお菓子、パルミエが買ったとか言ってませんでした？」
line = "「……待ってください。あの盗まれたように見せかけていたお菓子、パルミエが買ったとか言ってませんでした？」"

[[dialogue]]
speaker = "シフォン"
# 「そのお金ってどこから出てるんです？　あなたお金にだらしなくて年中金欠ですよね？」
line = "「そのお金ってどこから出てるんです？　あなたお金にだらしなくて年中金欠ですよね？」"

[[dialogue]]
speaker = "パルミエ"
# 「ギクっ」
line = "「ギクっ」"

[[dialogue]]
speaker = "シフォン"
# 「思えば、身に覚えのないお菓子が昨日も置いてありました。まさかまた貴重な部費を使い込んで──」
line = "「思えば、身に覚えのないお菓子が昨日も置いてありました。まさかまた貴重な部費を使い込んで──」"

[[dialogue]]
speaker = "パルミエ"
# 「ひ、必要経費よ～。だってシフォン、いつも倹約倹約でお菓子の１つも買ってくれないから～」
line = "「ひ、必要経費よ～。だってシフォン、いつも倹約倹約でお菓子の１つも買ってくれないから～」"

[[dialogue]]
speaker = "シフォン"
# 「だからいつも言ってるじゃないですか！　部費はお菓子を買うためのお金じゃないんですよ！」
line = "「だからいつも言ってるじゃないですか！　部費はお菓子を買うためのお金じゃないんですよ！」"

[[dialogue]]
speaker = "パルミエ"
# 「ついでに高級枕も買っちゃった♪　２人もお昼寝する時、使ってくれていいわよ～♪」
line = "「ついでに高級枕も買っちゃった♪　２人もお昼寝する時、使ってくれていいわよ～♪」"

[[dialogue]]
speaker = "シフォン"
# 「ですから無駄遣いしないでくださいって！」
line = "「ですから無駄遣いしないでくださいって！」"

[[dialogue]]
speaker = "モナカ"
# 「ふふ、たまにはいいじゃない。モナカ、お茶淹れてくるね？　パルちゃんの買ったお菓子でお茶会でもしよ？」
line = "「ふふ、たまにはいいじゃない。モナカ、お茶淹れてくるね？　パルちゃんの買ったお菓子でお茶会でもしよ？」"

[[dialogue]]
speaker = "パルミエ"
# 「あらあら、流石はモナカね～。もちろん茶葉も買ってきてあるわよ～」
line = "「あらあら、流石はモナカね～。もちろん茶葉も買ってきてあるわよ～」"

[[dialogue]]
speaker = "シフォン"
# 「はぁ……。また今月も財政難が続きそうですね……」
line = "「はぁ……。また今月も財政難が続きそうですね……」"

[[dialogue]]
speaker = "モナカ"
# 「あ……。このアラート……」
line = "「あ……。このアラート……」"

[[dialogue]]
speaker = "シフォン"
# 「どうやらまた街のどこかにアステラが出現したみたいですね……」
line = "「どうやらまた街のどこかにアステラが出現したみたいですね……」"

[[dialogue]]
speaker = "パルミエ"
# 「ホント最近多いわね～？　物騒な世の中だわ～」
line = "「ホント最近多いわね～？　物騒な世の中だわ～」"

[[dialogue]]
speaker = "シフォン"
# 「他人事みたいに言ってないで行きますよ。私たちはもうプリマステラなんですから」
line = "「他人事みたいに言ってないで行きますよ。私たちはもうプリマステラなんですから」"

[[dialogue]]
speaker = "モナカ"
# 「今もモンスターに襲われて困ってる人がいるかもしれないもんね。早く駆けつけて、少しでも助けになってあげなきゃ」
line = "「今もモンスターに襲われて困ってる人がいるかもしれないもんね。早く駆けつけて、少しでも助けになってあげなきゃ」"

[[dialogue]]
speaker = "パルミエ"
# 「もーせっかくお茶会を始めようってところだったのに。ふふ、でもまぁ仕方ないわね。面倒だけど２人に付き合うわ」
line = "「もーせっかくお茶会を始めようってところだったのに。ふふ、でもまぁ仕方ないわね。面倒だけど２人に付き合うわ」"

[[dialogue]]
speaker = "モナカ"
# 「それじゃあ行こう！　おなか部、出動だよ！」
line = "「それじゃあ行こう！　おなか部、出動だよ！」"
