[[dialogue]]
speaker = "unk"
# 第６話,グレイスの決意,B
line = "第６話,グレイスの決意,B"

[[dialogue]]
speaker = "グレイス"
# 「まあ、こんな感じですね！　１０年前、デネブの新星学園に潜入した時にお２人に出会ったんです！」
line = "「まあ、こんな感じですね！　１０年前、デネブの新星学園に潜入した時にお２人に出会ったんです！」"

[[dialogue]]
speaker = "クロト"
# 「……君は昔からけっこうめちゃくちゃだったんだな」
line = "「……君は昔からけっこうめちゃくちゃだったんだな」"

[[dialogue]]
speaker = "グレイス"
# 「めちゃくちゃだなんてとんでもない！　大事なことですよ。自分の目で見て判断しなければ、真実はわかりませんからね！」
line = "「めちゃくちゃだなんてとんでもない！　大事なことですよ。自分の目で見て判断しなければ、真実はわかりませんからね！」"

[[dialogue]]
speaker = "グレイス"
# 「それに私、わかっちゃいました。こっちの世界の魔王さんとヴィーナスさんは──」
line = "「それに私、わかっちゃいました。こっちの世界の魔王さんとヴィーナスさんは──」"

[[dialogue]]
speaker = "ヴィーナス"
# 「……私たちは？」
line = "「……私たちは？」"

[[dialogue]]
speaker = "グレイス"
# 「お付き合いしていないっ！　そうでしょう！　デネブのお２人と雰囲気が違いますからね！！」
line = "「お付き合いしていないっ！　そうでしょう！　デネブのお２人と雰囲気が違いますからね！！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「いきなりすぎて意味がわからないわ！？」
line = "「いきなりすぎて意味がわからないわ！？」"

[[dialogue]]
speaker = "ヴィーナス"
# 「というか私とパパは、お付き合いなんていう次元を飛び越えた関係なんですけど！？」
line = "「というか私とパパは、お付き合いなんていう次元を飛び越えた関係なんですけど！？」"

[[dialogue]]
speaker = "グレイス"
# 「今度はパパ……？　あの、たまにヴィーナスさん、おかしなことを言いますよね。いったいどういう事なんです？」
line = "「今度はパパ……？　あの、たまにヴィーナスさん、おかしなことを言いますよね。いったいどういう事なんです？」"

[[dialogue]]
speaker = "unk"
# デネブで暮らしてきたグレイスにとって、無関係の話ではない──俺はグレイスにできる限りのことを伝えた。
line = "デネブで暮らしてきたグレイスにとって、無関係の話ではない──俺はグレイスにできる限りのことを伝えた。"

[[dialogue]]
speaker = "unk"
# ヴィーナスが『人間に転生した女神テルル』と『デネブの緋宮クロト』の子であること。
line = "ヴィーナスが『人間に転生した女神テルル』と『デネブの緋宮クロト』の子であること。"

[[dialogue]]
speaker = "unk"
# デネブの緋宮クロトが、最期の最期までデネブのために戦い続け、事切れたこと。
line = "デネブの緋宮クロトが、最期の最期までデネブのために戦い続け、事切れたこと。"

[[dialogue]]
speaker = "unk"
# 戦死する直前に、アルタイル世界にヴィーナスを託したことも──
line = "戦死する直前に、アルタイル世界にヴィーナスを託したことも──"

[[dialogue]]
speaker = "グレイス"
# 「デネブのクロトさんと、テルルさんのお子様……そう、だったんですね……」
line = "「デネブのクロトさんと、テルルさんのお子様……そう、だったんですね……」"

[[dialogue]]
speaker = "グレイス"
# 「びっくりしましたけど……うん。ようやくスッキリしました。お２人ともそっくりなのに、私の記憶とちょびっとずつ違ってましたから」
line = "「びっくりしましたけど……うん。ようやくスッキリしました。お２人ともそっくりなのに、私の記憶とちょびっとずつ違ってましたから」"

[[dialogue]]
speaker = "グレイス"
# 「それに、デネブの魔王さんの最期も教えていただき、ありがとうございました……」
line = "「それに、デネブの魔王さんの最期も教えていただき、ありがとうございました……」"

[[dialogue]]
speaker = "グレイス"
# 「あの人は卑怯者なんかじゃない。裏切り者でもない……」
line = "「あの人は卑怯者なんかじゃない。裏切り者でもない……」"

[[dialogue]]
speaker = "グレイス"
# 「私との約束を違えないように、戦ってくれていた……あはは……そう、でしたか……」
line = "「私との約束を違えないように、戦ってくれていた……あはは……そう、でしたか……」"

[[dialogue]]
speaker = "グレイス"
# 「…………魔王さんは、ちゃんと私との約束を、果たそうとしてくれたんですね」
line = "「…………魔王さんは、ちゃんと私との約束を、果たそうとしてくれたんですね」"

[[dialogue]]
speaker = "unk"
# 心のしこりが消えた今ならば、グレイスに『ルヴィネ死亡の未来』のことを伝えられる気がした。
line = "心のしこりが消えた今ならば、グレイスに『ルヴィネ死亡の未来』のことを伝えられる気がした。"

[[dialogue]]
speaker = "unk"
# 俺は慎重に言葉を選んで、ジグの星眼のこと、そして起こりうる未来の可能性について話をした。
line = "俺は慎重に言葉を選んで、ジグの星眼のこと、そして起こりうる未来の可能性について話をした。"

[[dialogue]]
speaker = "unk"
# ベアトリス同様に驚いていたグレイスだったが──
line = "ベアトリス同様に驚いていたグレイスだったが──"

[[dialogue]]
speaker = "グレイス"
# 「──ルヴィが死んでしまう未来。それを変えて、リクリエを止める……それが魔王さんたちのスタンスなんですね」
line = "「──ルヴィが死んでしまう未来。それを変えて、リクリエを止める……それが魔王さんたちのスタンスなんですね」"

[[dialogue]]
speaker = "クロト"
# 「ああ。だからグレイスにも協力してほしいんだ」
line = "「ああ。だからグレイスにも協力してほしいんだ」"

[[dialogue]]
speaker = "クロト"
# 「……俺たちと一緒に、戦ってくれないか」
line = "「……俺たちと一緒に、戦ってくれないか」"

[[dialogue]]
speaker = "グレイス"
# 「──はい！」
line = "「──はい！」"

[[dialogue]]
speaker = "ヴィーナス"
# 「ず、ずいぶんあっさりなのね……？」
line = "「ず、ずいぶんあっさりなのね……？」"

[[dialogue]]
speaker = "グレイス"
# 「魔王さんもヴィーナスさんも、嘘を言っているようには思えません。それに……」
line = "「魔王さんもヴィーナスさんも、嘘を言っているようには思えません。それに……」"

[[dialogue]]
speaker = "グレイス"
# 「私もできることなら、デネブもアルタイルも両方が滅びない未来を目指したいです！」
line = "「私もできることなら、デネブもアルタイルも両方が滅びない未来を目指したいです！」"

[[dialogue]]
speaker = "グレイス"
# 「極星学園星徒会、グレイス・オベロニア。あなたたちアルタイルと共闘します」
line = "「極星学園星徒会、グレイス・オベロニア。あなたたちアルタイルと共闘します」"

[[dialogue]]
speaker = "グレイス"
# 「ルヴィの説得と救出……私にも、協力させてください！」
line = "「ルヴィの説得と救出……私にも、協力させてください！」"

[[dialogue]]
speaker = "unk"
# その日の夜──極星学園生の就寝場所となっている会議室。
line = "その日の夜──極星学園生の就寝場所となっている会議室。"

[[dialogue]]
speaker = "unk"
# 用意された寝具に頭までくるまって、グレイスは──
line = "用意された寝具に頭までくるまって、グレイスは──"

[[dialogue]]
speaker = "グレイス"
# 「…………魔王さん、ごめんなさい」
line = "「…………魔王さん、ごめんなさい」"

[[dialogue]]
speaker = "グレイス"
# 「指きりしてくれたのに……あなたは嘘なんて吐かないって、わかってたはずなのに……１０年も恨んで……本当にごめんなさい……」
line = "「指きりしてくれたのに……あなたは嘘なんて吐かないって、わかってたはずなのに……１０年も恨んで……本当にごめんなさい……」"

[[dialogue]]
speaker = "グレイス"
# 「私、絶対にリクリエを止めてみせます。もう二度と、大切なものを亡くさないように……」
line = "「私、絶対にリクリエを止めてみせます。もう二度と、大切なものを亡くさないように……」"

[[dialogue]]
speaker = "グレイス"
# 「世界も……<ruby=ルヴィ>友達</ruby>も……絶対に手放しませんから……」
line = "「世界も……<ruby>友達<rt>ルヴィ</rt></ruby>も……絶対に手放しませんから……」"

[[dialogue]]
speaker = "unk"
# あの日に憧れた『魔王さん』はもう死んでしまって、どこにもいない。
line = "あの日に憧れた『魔王さん』はもう死んでしまって、どこにもいない。"

[[dialogue]]
speaker = "unk"
# けれど、グレイスは誓う。あの日のように。
line = "けれど、グレイスは誓う。あの日のように。"

[[dialogue]]
speaker = "グレイス"
# 「あなたの──デネブの英雄の意思を継ぎます。今度こそ、破られない約束をしますから……」
line = "「あなたの──デネブの英雄の意思を継ぎます。今度こそ、破られない約束をしますから……」"

[[dialogue]]
speaker = "グレイス"
# 「もう一度、私と指きり、してくれますか……？」
line = "「もう一度、私と指きり、してくれますか……？」"

[[dialogue]]
speaker = "unk"
# 立てた小指に願いを込めて、明日からはまたたくさん笑うことも同時に誓って。
line = "立てた小指に願いを込めて、明日からはまたたくさん笑うことも同時に誓って。"

[[dialogue]]
speaker = "unk"
# グレイスは、その夜だけは──デネブのクロトへ想いを馳せるのだった。
line = "グレイスは、その夜だけは──デネブのクロトへ想いを馳せるのだった。"
