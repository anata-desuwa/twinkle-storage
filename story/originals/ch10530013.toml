[[dialogue]]
speaker = "unk"
# 第３話,ウェンディの経済講座,P
line = "第３話,ウェンディの経済講座,P"

[[dialogue]]
speaker = "ウェンディ"
# 「私に相談事があると聞いて来てみれば……試験のために、社会科の勉強を私に教わりたいと？」
line = "「私に相談事があると聞いて来てみれば……試験のために、社会科の勉強を私に教わりたいと？」"

[[dialogue]]
speaker = "unk"
# やっぱりダメ？
line = "やっぱりダメ？"

[[dialogue]]
speaker = "ウェンディ"
# 「いいえ、分野が金融・経済となれば私が適任でしょう。本格的な経済学を教えるには時間が足りませんが、授業に出るくらいなら十分です」
line = "「いいえ、分野が金融・経済となれば私が適任でしょう。本格的な経済学を教えるには時間が足りませんが、授業に出るくらいなら十分です」"

[[dialogue]]
speaker = "ウェンディ"
# 「私は魔女の森で銀行を作ろうとして追放されかけたくらいですからね」
line = "「私は魔女の森で銀行を作ろうとして追放されかけたくらいですからね」"

[[dialogue]]
speaker = "ウェンディ"
# 「実は、ネビュラ内で銀行を設立して通貨を発行しようという案も出したんです。通貨を“セドナ”にしようとして却下されましたが」
line = "「実は、ネビュラ内で銀行を設立して通貨を発行しようという案も出したんです。通貨を“セドナ”にしようとして却下されましたが」"

[[dialogue]]
speaker = "ウェンディ"
# 「まぁ実際に通貨を作ったとしても、いろいろな問題で機能しなかったでしょうが」
line = "「まぁ実際に通貨を作ったとしても、いろいろな問題で機能しなかったでしょうが」"

[[dialogue]]
speaker = "ウェンディ"
# 「……というわけで、私の失敗を踏まえつつ試験範囲の為替について学んでいきましょう」
line = "「……というわけで、私の失敗を踏まえつつ試験範囲の為替について学んでいきましょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「例えばＡ国がＡテルス、Ｂ国がＢテルスという通貨を持っていたとします」
line = "「例えばＡ国がＡテルス、Ｂ国がＢテルスという通貨を持っていたとします」"

[[dialogue]]
speaker = "ウェンディ"
# 「１Ａテルス＝１００Ｂテルスとしましょう。この交換レートを為替相場といいます。なぜこの為替相場の変動が起こるかですが──」
line = "「１Ａテルス＝１００Ｂテルスとしましょう。この交換レートを為替相場といいます。なぜこの為替相場の変動が起こるかですが──」"

[[dialogue]]
speaker = "ウェンディ"
# 「Ａ国の商品やサービスを購入するには、Ａテルスが必要です。Ｂ国のＢテルスも同様です」
line = "「Ａ国の商品やサービスを購入するには、Ａテルスが必要です。Ｂ国のＢテルスも同様です」"

[[dialogue]]
speaker = "ウェンディ"
# 「たとえば、Ａ国は高品質な商品やバラエティ豊富なサービスがあり、また観光においても魅力のある国とします」
line = "「たとえば、Ａ国は高品質な商品やバラエティ豊富なサービスがあり、また観光においても魅力のある国とします」"

[[dialogue]]
speaker = "ウェンディ"
# 「Ａ国のものが欲しい。Ａ国に行って美味しいものが食べたい。そのためにはＡ国の通貨であるＡテルスが欲しい」
line = "「Ａ国のものが欲しい。Ａ国に行って美味しいものが食べたい。そのためにはＡ国の通貨であるＡテルスが欲しい」"

[[dialogue]]
speaker = "ウェンディ"
# 「みんながＡテルスが求めるようになったらどうなるか……」
line = "「みんながＡテルスが求めるようになったらどうなるか……」"

[[dialogue]]
speaker = "ウェンディ"
# 「いえ、言い方を変えましょう。自分はＡテルスを持っている。たくさんの人がＡテルスが欲しいと言っている」
line = "「いえ、言い方を変えましょう。自分はＡテルスを持っている。たくさんの人がＡテルスが欲しいと言っている」"

[[dialogue]]
speaker = "ウェンディ"
# 「あなたならどうしますか？」
line = "「あなたならどうしますか？」"

[[dialogue]]
speaker = "ウェンディ"
# 「会長さんならそのまま１００Ｂテルスで交換しそうですね。でも私ならそう──高いお金を出した人にＡテルスを交換します」
line = "「会長さんならそのまま１００Ｂテルスで交換しそうですね。でも私ならそう──高いお金を出した人にＡテルスを交換します」"

[[dialogue]]
speaker = "ウェンディ"
# 「するとＡテルスの価格が上がります。たとえば１Ａテルスを手に入れるのに、１１０Ｂテルスが必要になります」
line = "「するとＡテルスの価格が上がります。たとえば１Ａテルスを手に入れるのに、１１０Ｂテルスが必要になります」"

[[dialogue]]
speaker = "ウェンディ"
# 「これがＡテルス高、Ｂテルス安ですね」
line = "「これがＡテルス高、Ｂテルス安ですね」"

[[dialogue]]
speaker = "ウェンディ"
# 「需要が上がると価格も上がる。需要が下がると価格も下がる。それが原則と思ってください」
line = "「需要が上がると価格も上がる。需要が下がると価格も下がる。それが原則と思ってください」"

[[dialogue]]
speaker = "ウェンディ"
# 「なお、為替相場は金利の影響も大きいです」
line = "「なお、為替相場は金利の影響も大きいです」"

[[dialogue]]
speaker = "ウェンディ"
# 「金利というのは、銀行に預けたお金や、貸し借りしたお金の利息の割合のことです」
line = "「金利というのは、銀行に預けたお金や、貸し借りしたお金の利息の割合のことです」"

[[dialogue]]
speaker = "ウェンディ"
# 「景気というのはよく使われる言葉の割にぼんやりとした概念ですが、今は景気が良くなると金利が上がる、くらいに考えてください」
line = "「景気というのはよく使われる言葉の割にぼんやりとした概念ですが、今は景気が良くなると金利が上がる、くらいに考えてください」"

[[dialogue]]
speaker = "ウェンディ"
# 「例えばＢ国が好景気で、Ｂ国の銀行に預けると、Ａ国よりお金が増えるとします。するとＡ国の人はＢ国に預けたくなりますよね」
line = "「例えばＢ国が好景気で、Ｂ国の銀行に預けると、Ａ国よりお金が増えるとします。するとＡ国の人はＢ国に預けたくなりますよね」"

[[dialogue]]
speaker = "ウェンディ"
# 「今度はさっきとは逆に、ＡテルスをＢテルスに交換する需要が増えます。つまりＡテルス安、Ｂテルス高になります」
line = "「今度はさっきとは逆に、ＡテルスをＢテルスに交換する需要が増えます。つまりＡテルス安、Ｂテルス高になります」"

[[dialogue]]
speaker = "ウェンディ"
# 「このように、為替相場は国の経済を表す指標になりうるのです」
line = "「このように、為替相場は国の経済を表す指標になりうるのです」"

[[dialogue]]
speaker = "ウェンディ"
# 「また情勢不安も通貨下落の原因になります。国がなくなればお金も価値を失くしますから」
line = "「また情勢不安も通貨下落の原因になります。国がなくなればお金も価値を失くしますから」"

[[dialogue]]
speaker = "ウェンディ"
# 「そういう意味では、あなたたち星騎士の活動も影響します」
line = "「そういう意味では、あなたたち星騎士の活動も影響します」"

[[dialogue]]
speaker = "ウェンディ"
# 「もし“星騎士が世界を守れない”と思われれば、保有資産を現金化して消費する動きも出るでしょう。経済の混乱が予想されます」
line = "「もし“星騎士が世界を守れない”と思われれば、保有資産を現金化して消費する動きも出るでしょう。経済の混乱が予想されます」"

[[dialogue]]
speaker = "unk"
# 俺たちは経済も守っているのか……
line = "俺たちは経済も守っているのか……"

[[dialogue]]
speaker = "ウェンディ"
# 「そうですそうです。ふふ、責任重大ですね」
line = "「そうですそうです。ふふ、責任重大ですね」"

[[dialogue]]
speaker = "ウェンディ"
# 「さっきまでのネビュラと人間界に当てはめると……」
line = "「さっきまでのネビュラと人間界に当てはめると……」"

[[dialogue]]
speaker = "ウェンディ"
# 「ネビュラの側には魅力的な商品はあまりありません。経済的な基盤も脆弱です」
line = "「ネビュラの側には魅力的な商品はあまりありません。経済的な基盤も脆弱です」"

[[dialogue]]
speaker = "ウェンディ"
# 「一方、人間界には様々な商品があります。テルスの使い道はいくらでもあります」
line = "「一方、人間界には様々な商品があります。テルスの使い道はいくらでもあります」"

[[dialogue]]
speaker = "ウェンディ"
# 「給金をセドナで支払っても、ネビュラ構成員はすぐにテルスに換金しようとするでしょう」
line = "「給金をセドナで支払っても、ネビュラ構成員はすぐにテルスに換金しようとするでしょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「するとセドナとテルスの為替相場はどうなると思います？」
line = "「するとセドナとテルスの為替相場はどうなると思います？」"

[[dialogue]]
speaker = "unk"
# セドナ安のテルス高？
line = "セドナ安のテルス高？"

[[dialogue]]
speaker = "ウェンディ"
# 「その通り。テルスに対して圧倒的セドナ安になるでしょう」
line = "「その通り。テルスに対して圧倒的セドナ安になるでしょう」"

[[dialogue]]
speaker = "ウェンディ"
# 「セドナ長官を尊敬する身として、そんなの認められません！」
line = "「セドナ長官を尊敬する身として、そんなの認められません！」"

[[dialogue]]
speaker = "ウェンディ"
# 「いずれ正式に銀行を設立する際は、ちゃんと通用する通貨にしてみせます！」
line = "「いずれ正式に銀行を設立する際は、ちゃんと通用する通貨にしてみせます！」"

[[dialogue]]
speaker = "unk"
# やっぱり諦めてないんだ……
line = "やっぱり諦めてないんだ……"

[[dialogue]]
speaker = "ウェンディ"
# 「当然です。偉大な経営者は、何度失敗しても諦めずに挑戦し続けてきました」
line = "「当然です。偉大な経営者は、何度失敗しても諦めずに挑戦し続けてきました」"

[[dialogue]]
speaker = "ウェンディ"
# 「息をするように人に迷惑をかけるサイコパスで、虫のような生命力で蘇り、最後には成功を強引に掴み取るんです！」
line = "「息をするように人に迷惑をかけるサイコパスで、虫のような生命力で蘇り、最後には成功を強引に掴み取るんです！」"

[[dialogue]]
speaker = "unk"
# 人として最悪じゃないかな！？
line = "人として最悪じゃないかな！？"

[[dialogue]]
speaker = "ウェンディ"
# 「成功する経営者とはそういうものなんです！」
line = "「成功する経営者とはそういうものなんです！」"

[[dialogue]]
speaker = "ウェンディ"
# 「よし！　せっかくの勉強の機会ですから、世界を変えた名だたる経営者について、会長さんに教えてあげましょう！」
line = "「よし！　せっかくの勉強の機会ですから、世界を変えた名だたる経営者について、会長さんに教えてあげましょう！」"

[[dialogue]]
speaker = "unk"
# ええ～～～～～～っ！？
line = "ええ～～～～～～っ！？"
