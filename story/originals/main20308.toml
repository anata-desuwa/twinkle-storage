[[dialogue]]
speaker = "unk"
# 第８話,情報共有,B
line = "第８話,情報共有,B"

[[dialogue]]
speaker = "unk"
# 目を覚ました梨緒が俺を呼んでいるという話を聞いて、保健室へと向かった。
line = "目を覚ました梨緒が俺を呼んでいるという話を聞いて、保健室へと向かった。"

[[dialogue]]
speaker = "unk"
# 保健室には、ベッドに腰かけた梨緒と、選挙管理委員会のメンバーが待ち受けていた。
line = "保健室には、ベッドに腰かけた梨緒と、選挙管理委員会のメンバーが待ち受けていた。"

[[dialogue]]
speaker = "梨緒"
# 「さっそくですまないが、情報共有がしたい。あのリクリエの使徒について、私が知っていることを話す」
line = "「さっそくですまないが、情報共有がしたい。あのリクリエの使徒について、私が知っていることを話す」"

[[dialogue]]
speaker = "クロト"
# 「願ってもない申し出だ。ただそういうことなら、星徒会で話し合ったことを先に共有してもいいだろうか？」
line = "「願ってもない申し出だ。ただそういうことなら、星徒会で話し合ったことを先に共有してもいいだろうか？」"

[[dialogue]]
speaker = "unk"
# 俺の言葉に、梨緒は頷いてみせた。
line = "俺の言葉に、梨緒は頷いてみせた。"

[[dialogue]]
speaker = "unk"
# 俺は先ほどまで星徒会室で整理していた、デネブと極星学園の話を選挙管理委員会のメンバーにも共有するのだった。
line = "俺は先ほどまで星徒会室で整理していた、デネブと極星学園の話を選挙管理委員会のメンバーにも共有するのだった。"

[[dialogue]]
speaker = "アポロ"
# 「香堂チナに、デネブの星騎士。極星学園……か」
line = "「香堂チナに、デネブの星騎士。極星学園……か」"

[[dialogue]]
speaker = "ベアトリス"
# 「…………っ」
line = "「…………っ」"

[[dialogue]]
speaker = "アポロ"
# 「ベアト？　どうかしたか？」
line = "「ベアト？　どうかしたか？」"

[[dialogue]]
speaker = "ベアトリス"
# 「う、ううんっ！　なんでもないよっ」
line = "「う、ううんっ！　なんでもないよっ」"

[[dialogue]]
speaker = "ナターシャ"
# 「一応確認しておくんだけど、梨緒は『極星学園』に心当たりはないの？」
line = "「一応確認しておくんだけど、梨緒は『極星学園』に心当たりはないの？」"

[[dialogue]]
speaker = "梨緒"
# 「ない、な。私が知っているのは、流星学園と新星学園だけだ」
line = "「ない、な。私が知っているのは、流星学園と新星学園だけだ」"

[[dialogue]]
speaker = "ナターシャ"
# 「ということは、梨緒が知ってるジグと極星学園は別陣営ってわけだ。ややこしいね」
line = "「ということは、梨緒が知ってるジグと極星学園は別陣営ってわけだ。ややこしいね」"

[[dialogue]]
speaker = "クロト"
# 「ジグ本人の口ぶりからもそういった印象は受けた。彼女はアルタイルとデネブの星騎士の衝突を見に来たと言っていた」
line = "「ジグ本人の口ぶりからもそういった印象は受けた。彼女はアルタイルとデネブの星騎士の衝突を見に来たと言っていた」"

[[dialogue]]
speaker = "クロト"
# 「ともあれ、現状はチナの発言を鵜呑みにはせず、デネブに関する情報収集に専念する、というのが星徒会の暫定的な方針だ」
line = "「ともあれ、現状はチナの発言を鵜呑みにはせず、デネブに関する情報収集に専念する、というのが星徒会の暫定的な方針だ」"

[[dialogue]]
speaker = "梨緒"
# 「選挙管理委員会としても異議はない。冷静な対応だと思う」
line = "「選挙管理委員会としても異議はない。冷静な対応だと思う」"

[[dialogue]]
speaker = "クロト"
# 「ありがとう。それじゃあ、本題の方に移ろうか」
line = "「ありがとう。それじゃあ、本題の方に移ろうか」"

[[dialogue]]
speaker = "梨緒"
# 「その前に、今一度『リクリエの使徒』という概念について、説明してもらってもいいだろうか？」
line = "「その前に、今一度『リクリエの使徒』という概念について、説明してもらってもいいだろうか？」"

[[dialogue]]
speaker = "梨緒"
# 「私は一度聞かされているが、ここにいる全員がその事情に明るいわけじゃない」
line = "「私は一度聞かされているが、ここにいる全員がその事情に明るいわけじゃない」"

[[dialogue]]
speaker = "梨緒"
# 「話によればアポロはその被害者らしいが……」
line = "「話によればアポロはその被害者らしいが……」"

[[dialogue]]
speaker = "アポロ"
# 「あたしは被害者ってわけじゃ……！　いや、すまん。それは今重要なことじゃないな……」
line = "「あたしは被害者ってわけじゃ……！　いや、すまん。それは今重要なことじゃないな……」"

[[dialogue]]
speaker = "クロト"
# 「込み入った話ではあるんだが、ひとまずアポロが『当事者』であることは間違いない」
line = "「込み入った話ではあるんだが、ひとまずアポロが『当事者』であることは間違いない」"

[[dialogue]]
speaker = "unk"
# 俺の言葉に、アポロは自戒を込めるように、こくんと深く頷いた。
line = "俺の言葉に、アポロは自戒を込めるように、こくんと深く頷いた。"

[[dialogue]]
speaker = "クロト"
# 「『リクリエの使徒』というのが何なのか、俺たちも詳しく知っているわけじゃない」
line = "「『リクリエの使徒』というのが何なのか、俺たちも詳しく知っているわけじゃない」"

[[dialogue]]
speaker = "クロト"
# 「ただ星徒会はリクリエの使徒と戦ってきた。その時、仮面を被せられ、俺たちの前に立ちはだかったのは……平行世界に住むアポロだった」
line = "「ただ星徒会はリクリエの使徒と戦ってきた。その時、仮面を被せられ、俺たちの前に立ちはだかったのは……平行世界に住むアポロだった」"

[[dialogue]]
speaker = "unk"
# リクリエの使徒はなぜか、平行世界の人間が選ばれる。仮面を被り、世界の再創生を望み、リクリエの瘴気とモンスターを使役する。
line = "リクリエの使徒はなぜか、平行世界の人間が選ばれる。仮面を被り、世界の再創生を望み、リクリエの瘴気とモンスターを使役する。"

[[dialogue]]
speaker = "unk"
# 俺たち星徒会が戦ってきたのは、そうした『リクリエの使徒』と、その従者であるギエルだった。
line = "俺たち星徒会が戦ってきたのは、そうした『リクリエの使徒』と、その従者であるギエルだった。"

[[dialogue]]
speaker = "unk"
# またそれらに関連して、アポロの正体がフィオナの双子の姉であり、リクリエの使徒の影響で長く眠っていたこと、星見家が魔王の系譜であること……
line = "またそれらに関連して、アポロの正体がフィオナの双子の姉であり、リクリエの使徒の影響で長く眠っていたこと、星見家が魔王の系譜であること……"

[[dialogue]]
speaker = "unk"
# 世界の再創生を望み、リクリエに与したセイファート前学園長との戦いの顛末も、簡単に説明した。
line = "世界の再創生を望み、リクリエに与したセイファート前学園長との戦いの顛末も、簡単に説明した。"

[[dialogue]]
speaker = "ベアトリス"
# 「アポロちゃんが、流星学園の会長のお姉さん……？　信じられない話ばっかりで目が回るよ～……」
line = "「アポロちゃんが、流星学園の会長のお姉さん……？　信じられない話ばっかりで目が回るよ～……」"

[[dialogue]]
speaker = "ナターシャ"
# 「へー」
line = "「へー」"

[[dialogue]]
speaker = "ベアトリス"
# 「ナターシャちゃん全然驚いてない！？」
line = "「ナターシャちゃん全然驚いてない！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「いや、驚いてるよ？　聖庭園からある程度聞いてはいたけど、初耳な話も多かったし」
line = "「いや、驚いてるよ？　聖庭園からある程度聞いてはいたけど、初耳な話も多かったし」"

[[dialogue]]
speaker = "ナターシャ"
# 「ただ、仕事柄あからさまにビックリするようなリアクションはしないだけ」
line = "「ただ、仕事柄あからさまにビックリするようなリアクションはしないだけ」"

[[dialogue]]
speaker = "アポロ"
# 「おお、暗殺者はビビらないって本当だったんだな！　本物っぽいぞ！」
line = "「おお、暗殺者はビビらないって本当だったんだな！　本物っぽいぞ！」"

[[dialogue]]
speaker = "ナターシャ"
# 「うん、本物だからね」
line = "「うん、本物だからね」"

[[dialogue]]
speaker = "unk"
# 暗殺者というと剣呑な印象だが、味方である分には心強い……かもしれない。
line = "暗殺者というと剣呑な印象だが、味方である分には心強い……かもしれない。"

[[dialogue]]
speaker = "ナターシャ"
# 「でもちょっと質問。さっきから当たり前のように平行世界の話してるけど、それって星徒会じゃ常識？」
line = "「でもちょっと質問。さっきから当たり前のように平行世界の話してるけど、それって星徒会じゃ常識？」"

[[dialogue]]
speaker = "クロト"
# 「常識……というか、色々あって前提になってる。物証を見せることは難しいが、フィーニスの塔で見聞きしたことや、女神テルルらしき存在の説明からも、ほぼ間違いない」
line = "「常識……というか、色々あって前提になってる。物証を見せることは難しいが、フィーニスの塔で見聞きしたことや、女神テルルらしき存在の説明からも、ほぼ間違いない」"

[[dialogue]]
speaker = "ナターシャ"
# 「──待って。女神様と喋ったことあるの？」
line = "「──待って。女神様と喋ったことあるの？」"

[[dialogue]]
speaker = "クロト"
# 「説明が難しいんだが、一方的に言葉を聞いたっていうのが一番近いかもしれない。ただ、俺も覚えてないところで、会話したことがあるような……気がする」
line = "「説明が難しいんだが、一方的に言葉を聞いたっていうのが一番近いかもしれない。ただ、俺も覚えてないところで、会話したことがあるような……気がする」"

[[dialogue]]
speaker = "ナターシャ"
# 「何それ。はっきりしてよ」
line = "「何それ。はっきりしてよ」"

[[dialogue]]
speaker = "unk"
# 守護天使たちや女神テルルの言動から、ヴィーナスは女神の娘である可能性が高い。そして、ヴィーナスはデネブの緋宮クロトの娘だという。
line = "守護天使たちや女神テルルの言動から、ヴィーナスは女神の娘である可能性が高い。そして、ヴィーナスはデネブの緋宮クロトの娘だという。"

[[dialogue]]
speaker = "unk"
# 今まであまり真面目に考えないようにしてきたのだが、つまりデネブの俺は女神様と……？
line = "今まであまり真面目に考えないようにしてきたのだが、つまりデネブの俺は女神様と……？"

[[dialogue]]
speaker = "アポロ"
# 「というか、ブッテキ証拠はあるじゃねーか。ヴィーナスはデネブで生まれた、緋宮クロトの娘なんだろ？」
line = "「というか、ブッテキ証拠はあるじゃねーか。ヴィーナスはデネブで生まれた、緋宮クロトの娘なんだろ？」"

[[dialogue]]
speaker = "梨緒"
# 「は？」
line = "「は？」"

[[dialogue]]
speaker = "ナターシャ"
# 「ん？」
line = "「ん？」"

[[dialogue]]
speaker = "ベアトリス"
# 「ふぇっ！？」
line = "「ふぇっ！？」"

[[dialogue]]
speaker = "クロト"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "unk"
# 一応、この件は新星・流星の星徒会メンバーや、それに近しい人たちには伝えてある。
line = "一応、この件は新星・流星の星徒会メンバーや、それに近しい人たちには伝えてある。"

[[dialogue]]
speaker = "unk"
# なので、別に選挙管理委員会のメンバーに知られても問題はないのだが……元々の知り合いではなく、知り合って日が浅い人たちにバレるのは、よくわからない気まずさがあった。
line = "なので、別に選挙管理委員会のメンバーに知られても問題はないのだが……元々の知り合いではなく、知り合って日が浅い人たちにバレるのは、よくわからない気まずさがあった。"

[[dialogue]]
speaker = "ナターシャ"
# 「えーっと……ちょっと呑み込みづらいんだけど……」
line = "「えーっと……ちょっと呑み込みづらいんだけど……」"

[[dialogue]]
speaker = "ナターシャ"
# 「つまり、いつも仲良く乳繰りあってるあの賑やかな子は、血の繋がった自分の娘なの？」
line = "「つまり、いつも仲良く乳繰りあってるあの賑やかな子は、血の繋がった自分の娘なの？」"

[[dialogue]]
speaker = "クロト"
# 「いつ俺がヴィーナスと乳繰りあってたって！？」
line = "「いつ俺がヴィーナスと乳繰りあってたって！？」"

[[dialogue]]
speaker = "ナターシャ"
# 「これは暗殺者も引く」
line = "「これは暗殺者も引く」"

[[dialogue]]
speaker = "ベアトリス"
# 「吸血鬼も引く」
line = "「吸血鬼も引く」"

[[dialogue]]
speaker = "梨緒"
# 「というか誰でも引く」
line = "「というか誰でも引く」"

[[dialogue]]
speaker = "クロト"
# 「だから乳繰り合ってないって！　全員で引かないでくれ！」
line = "「だから乳繰り合ってないって！　全員で引かないでくれ！」"

[[dialogue]]
speaker = "ベアトリス"
# 「うーん、娘って言っても平行世界の娘なら、ほとんど赤の他人と変わらないのかな。歳も同じだし」
line = "「うーん、娘って言っても平行世界の娘なら、ほとんど赤の他人と変わらないのかな。歳も同じだし」"

[[dialogue]]
speaker = "ナターシャ"
# 「まぁ、それもそう……そうかな？」
line = "「まぁ、それもそう……そうかな？」"

[[dialogue]]
speaker = "ナターシャ"
# （メルエルに、『こいつだけはやめておけ』って言った方がいいのかなぁ……）
line = "（メルエルに、『こいつだけはやめておけ』って言った方がいいのかなぁ……）"

[[dialogue]]
speaker = "梨緒"
# 「いや、倫理的な面を追及するのは後にしよう。話が進まない」
line = "「いや、倫理的な面を追及するのは後にしよう。話が進まない」"

[[dialogue]]
speaker = "梨緒"
# 「とりあえず、星徒会は平行世界の存在を認識していて、それを前提に動いている、というわけだな」
line = "「とりあえず、星徒会は平行世界の存在を認識していて、それを前提に動いている、というわけだな」"

[[dialogue]]
speaker = "unk"
# すでに事情を話したことがある梨緒から、的確なパスが飛んできた。
line = "すでに事情を話したことがある梨緒から、的確なパスが飛んできた。"

[[dialogue]]
speaker = "クロト"
# 「そういうことになる。梨緒にはすでに一度話したが、星徒会は梨緒が平行世界から迷い込んだ人物だろうと推測していた」
line = "「そういうことになる。梨緒にはすでに一度話したが、星徒会は梨緒が平行世界から迷い込んだ人物だろうと推測していた」"

[[dialogue]]
speaker = "クロト"
# 「俺たちがいるこの世界は『アルタイル』だ。残りは『デネブ』と『ベガ』。今までは、梨緒がどこの世界からやってきたのかは不明だったんだが……」
line = "「俺たちがいるこの世界は『アルタイル』だ。残りは『デネブ』と『ベガ』。今までは、梨緒がどこの世界からやってきたのかは不明だったんだが……」"

[[dialogue]]
speaker = "クロト"
# 「極星星徒会が『デネブの星騎士』を名乗ったことで、梨緒がやってきたのは『ベガ』である可能性が高くなった」
line = "「極星星徒会が『デネブの星騎士』を名乗ったことで、梨緒がやってきたのは『ベガ』である可能性が高くなった」"

[[dialogue]]
speaker = "クロト"
# 「とはいえ、チナの発言は鵜呑みにせず情報収集に徹する、という方針だ。この件に関しては、わからないことを無理やり憶測で話すことは自重したいと思っている」
line = "「とはいえ、チナの発言は鵜呑みにせず情報収集に徹する、という方針だ。この件に関しては、わからないことを無理やり憶測で話すことは自重したいと思っている」"

[[dialogue]]
speaker = "梨緒"
# 「私としても、自分が平行世界の人間である、という話を受け入れたわけではない」
line = "「私としても、自分が平行世界の人間である、という話を受け入れたわけではない」"

[[dialogue]]
speaker = "梨緒"
# 「情報共有には感謝するが、私は私でこの状況を見極めさせてもらいたい」
line = "「情報共有には感謝するが、私は私でこの状況を見極めさせてもらいたい」"

[[dialogue]]
speaker = "クロト"
# 「それで構わない。今はまだ情報を収集する段階だ。色んな視点やアプローチがあった方がいいだろう」
line = "「それで構わない。今はまだ情報を収集する段階だ。色んな視点やアプローチがあった方がいいだろう」"

[[dialogue]]
speaker = "unk"
# 俺の言葉に、梨緒は小さく頷く。
line = "俺の言葉に、梨緒は小さく頷く。"

[[dialogue]]
speaker = "梨緒"
# 「さて、色々回り道をしてしまったが、ようやく本題に入ろう」
line = "「さて、色々回り道をしてしまったが、ようやく本題に入ろう」"

[[dialogue]]
speaker = "梨緒"
# 「昨日現れた、“真なる神の騎士”を名乗る星騎士、ジグ」
line = "「昨日現れた、“真なる神の騎士”を名乗る星騎士、ジグ」"

[[dialogue]]
speaker = "梨緒"
# 「彼女の本名はレナーテ・<ruby=ジグ>Ｚ</ruby>・サイフリート」
line = "「彼女の本名はレナーテ・<ruby>Ｚ<rt>ジグ</rt></ruby>・サイフリート」"

[[dialogue]]
speaker = "梨緒"
# 「私がいた新星学園の……星徒会長だ」
line = "「私がいた新星学園の……星徒会長だ」"
