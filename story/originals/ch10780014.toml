[[dialogue]]
speaker = "unk"
# 第４話,木苺ジャムのティータイム,P
line = "第４話,木苺ジャムのティータイム,P"

[[dialogue]]
speaker = "unk"
# 持つべきは心優しい錬金術師の先輩だ。
line = "持つべきは心優しい錬金術師の先輩だ。"

[[dialogue]]
speaker = "unk"
# 『試作段階だがそれでも数時間は持つだろウ』。そう言われて貸し出された新型の義体の効果は──
line = "『試作段階だがそれでも数時間は持つだろウ』。そう言われて貸し出された新型の義体の効果は──"

[[dialogue]]
speaker = "トリュファイナ"
# 「あぁ……！　素敵です、素晴らしいです、魔王様！」
line = "「あぁ……！　素敵です、素晴らしいです、魔王様！」"

[[dialogue]]
speaker = "unk"
# 義体の調子、よさそうですね
line = "義体の調子、よさそうですね"

[[dialogue]]
speaker = "トリュファイナ"
# 「ええ！　頬をなでる風の強さも、道行く人の香り温かみも……手に取るように感じられます」
line = "「ええ！　頬をなでる風の強さも、道行く人の香り温かみも……手に取るように感じられます」"

[[dialogue]]
speaker = "トリュファイナ"
# 「アニマ様は素晴らしいお方ですね。またお礼を言わなければ……！」
line = "「アニマ様は素晴らしいお方ですね。またお礼を言わなければ……！」"

[[dialogue]]
speaker = "トリュファイナ"
# 「しかし少々困ってしまいますね。自由に触れることができると思うと、いったいどこから回ればよいのでしょう……！」
line = "「しかし少々困ってしまいますね。自由に触れることができると思うと、いったいどこから回ればよいのでしょう……！」"

[[dialogue]]
speaker = "unk"
# じゃあエスコートしますよ
line = "じゃあエスコートしますよ"

[[dialogue]]
speaker = "トリュファイナ"
# 「よろしいのですか……え、もっと近くに？」
line = "「よろしいのですか……え、もっと近くに？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あ……手を握られて……ふふ♪　はい。本日はどうぞよろしくお願いいたします、魔王様」
line = "「あ……手を握られて……ふふ♪　はい。本日はどうぞよろしくお願いいたします、魔王様」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ここは衣装を売られているお店なのですね。まぁ……手触りのよい生地……♪」
line = "「ここは衣装を売られているお店なのですね。まぁ……手触りのよい生地……♪」"

[[dialogue]]
speaker = "トリュファイナ"
# 「この衣装もきっと魔法で編まれた──なんて。ふふ、冗談です。これも技術で作られているのでしょう？」
line = "「この衣装もきっと魔法で編まれた──なんて。ふふ、冗談です。これも技術で作られているのでしょう？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「少しずつですがわかってまいりました。３０００年の時を経て、魔力や霊力に依存しない、そんな術を人々は身に付けられている」
line = "「少しずつですがわかってまいりました。３０００年の時を経て、魔力や霊力に依存しない、そんな術を人々は身に付けられている」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あっ、あちらのスカートも可愛らしい……！　はぁ、試着、というものもできるのですか」
line = "「あっ、あちらのスカートも可愛らしい……！　はぁ、試着、というものもできるのですか」"

[[dialogue]]
speaker = "トリュファイナ"
# 「──はい、私、やってみたいです！　魔王様！」
line = "「──はい、私、やってみたいです！　魔王様！」"

[[dialogue]]
speaker = "unk"
# 伝説の７代目・光の魔女様だとか。３０００年前に魔王の因子がこの世に残るよう禁術を用いた聖女だとか──そういうことは今、関係ない。
line = "伝説の７代目・光の魔女様だとか。３０００年前に魔王の因子がこの世に残るよう禁術を用いた聖女だとか──そういうことは今、関係ない。"

[[dialogue]]
speaker = "unk"
# 魔王ラクシスが守ったこの現代を、トリュファイナさんが肩の力を抜いて楽しめるように。俺はそれだけを願って色々な店を練り歩いた──
line = "魔王ラクシスが守ったこの現代を、トリュファイナさんが肩の力を抜いて楽しめるように。俺はそれだけを願って色々な店を練り歩いた──"

[[dialogue]]
speaker = "トリュファイナ"
# 「ふふ、メニューがたくさんあって迷います。どれを注文いたしましょうか……♪」
line = "「ふふ、メニューがたくさんあって迷います。どれを注文いたしましょうか……♪」"

[[dialogue]]
speaker = "unk"
# お茶の場所、本当にここでいいんですか？
line = "お茶の場所、本当にここでいいんですか？"

[[dialogue]]
speaker = "トリュファイナ"
# 「ええ！　私、身体を持てるようになったらまず、学園のカフェでお茶をしたかったのです」
line = "「ええ！　私、身体を持てるようになったらまず、学園のカフェでお茶をしたかったのです」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私と縁のある皆様がくつろぐこの場所で、共に時間を過ごしたかったので……」
line = "「私と縁のある皆様がくつろぐこの場所で、共に時間を過ごしたかったので……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「あ──魔王様、このロシアンティーというのは何なのでしょうか？」
line = "「あ──魔王様、このロシアンティーというのは何なのでしょうか？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「砂糖の代わりに、ジャムを入れていただくお紅茶のこと……？」
line = "「砂糖の代わりに、ジャムを入れていただくお紅茶のこと……？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「では私、これにいたします。ふふ、ジャムは好物なのです。魔女の森でもよく木苺を摘んで作っておりました」
line = "「では私、これにいたします。ふふ、ジャムは好物なのです。魔女の森でもよく木苺を摘んで作っておりました」"

[[dialogue]]
speaker = "トリュファイナ"
# 「そうですよ？　３０００年前でもジャムはございますからね？」
line = "「そうですよ？　３０００年前でもジャムはございますからね？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「お近くの店員様をお呼びして……すみません。こちらのお紅茶を１つ。木苺のジャムでお願いいたします♪」
line = "「お近くの店員様をお呼びして……すみません。こちらのお紅茶を１つ。木苺のジャムでお願いいたします♪」"

[[dialogue]]
speaker = "トリュファイナ"
# 「はぁー……人心地、つけましたね。今日はエスコートしていただき、ありがとうございました」
line = "「はぁー……人心地、つけましたね。今日はエスコートしていただき、ありがとうございました」"

[[dialogue]]
speaker = "unk"
# ずいぶん連れまわしちゃいましたね
line = "ずいぶん連れまわしちゃいましたね"

[[dialogue]]
speaker = "トリュファイナ"
# 「お気になさらず。むしろ嬉しかったです。光の魔女の任を持っていた時は、それはそれは厳重に囲われておりましたので」
line = "「お気になさらず。むしろ嬉しかったです。光の魔女の任を持っていた時は、それはそれは厳重に囲われておりましたので」"

[[dialogue]]
speaker = "トリュファイナ"
# 「どこかへ行く時もお忍びで、窮屈な旅が多かったのです。このように自由に、ぶらつくお散歩は憧れでした」
line = "「どこかへ行く時もお忍びで、窮屈な旅が多かったのです。このように自由に、ぶらつくお散歩は憧れでした」"

[[dialogue]]
speaker = "unk"
# 立場のある人は大変ですね
line = "立場のある人は大変ですね"

[[dialogue]]
speaker = "トリュファイナ"
# 「ええ──しかしそれも力を持って生まれたものの責務。魔王様、あなたと同じです」
line = "「ええ──しかしそれも力を持って生まれたものの責務。魔王様、あなたと同じです」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……？　ご自分が責務を果たせているかどうか、ご不安なのですか？」
line = "「……？　ご自分が責務を果たせているかどうか、ご不安なのですか？」"

[[dialogue]]
speaker = "トリュファイナ"
# 「そう謙遜なさらずとも。あなた様は、ご立派に魔王としての務めを果たしているではないですか」
line = "「そう謙遜なさらずとも。あなた様は、ご立派に魔王としての務めを果たしているではないですか」"

[[dialogue]]
speaker = "トリュファイナ"
# 「本当ですよ？　生まれ変わり、名こそ変われど……あなた様は少しも変わっておりません」
line = "「本当ですよ？　生まれ変わり、名こそ変われど……あなた様は少しも変わっておりません」"

[[dialogue]]
speaker = "トリュファイナ"
# 「ご自身のことよりも周りの人を愛す。これは簡単なようで、とても難しいこと……」
line = "「ご自身のことよりも周りの人を愛す。これは簡単なようで、とても難しいこと……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「救世の英雄には、優れた武力よりも大切なことがございます。それは──愛。他者への優しさに他なりません」
line = "「救世の英雄には、優れた武力よりも大切なことがございます。それは──愛。他者への優しさに他なりません」"

[[dialogue]]
speaker = "トリュファイナ"
# 「霊体となった私に気づいて手を握ってくださった。交流の輪を次々に広げて、奇異の目も気にせず現代のことを教えていただけた……」
line = "「霊体となった私に気づいて手を握ってくださった。交流の輪を次々に広げて、奇異の目も気にせず現代のことを教えていただけた……」"

[[dialogue]]
speaker = "トリュファイナ"
# 「平和な街を歩く喜びを伝えてくださり、今も甘い紅茶を楽しめる午後のひと時を与えてくださっています」
line = "「平和な街を歩く喜びを伝えてくださり、今も甘い紅茶を楽しめる午後のひと時を与えてくださっています」"

[[dialogue]]
speaker = "トリュファイナ"
# 「世界を救うほどのお力を持つ御方に、これ以上ない優しさと愛情が備わっている。これほど嬉しいことはないではありませんか」
line = "「世界を救うほどのお力を持つ御方に、これ以上ない優しさと愛情が備わっている。これほど嬉しいことはないではありませんか」"

[[dialogue]]
speaker = "トリュファイナ"
# 「……当然のことをしているだけ、ですか？　ふふ。やっぱりあなた様はお変わりありませんね」
line = "「……当然のことをしているだけ、ですか？　ふふ。やっぱりあなた様はお変わりありませんね」"

[[dialogue]]
speaker = "トリュファイナ"
# 「私、この身が潰えるまであなたのお傍におります。どうかもう一度、３０００年の時を超えた、救世の英雄譚を見せてくださいませ」
line = "「私、この身が潰えるまであなたのお傍におります。どうかもう一度、３０００年の時を超えた、救世の英雄譚を見せてくださいませ」"

[[dialogue]]
speaker = "トリュファイナ"
# 「それが限定的な再誕を果たした光の魔女の、たった１つの希望です」
line = "「それが限定的な再誕を果たした光の魔女の、たった１つの希望です」"

[[dialogue]]
speaker = "unk"
# 三界の、三種族すべてが平和に暮らせる時代が来て欲しい。そう願うトリュファイナさんに俺は応えたいと思う。
line = "三界の、三種族すべてが平和に暮らせる時代が来て欲しい。そう願うトリュファイナさんに俺は応えたいと思う。"

[[dialogue]]
speaker = "unk"
# 三種族だけじゃなく、魔女のみんなも一緒に平和に──そう伝えると、これ以上ないほどに可愛らしいはにかみを彼女は返してくれたのだった。
line = "三種族だけじゃなく、魔女のみんなも一緒に平和に──そう伝えると、これ以上ないほどに可愛らしいはにかみを彼女は返してくれたのだった。"
