[[dialogue]]
speaker = "unk"
# 第３話,ベガの星騎士の装い？,P
line = "第３話,ベガの星騎士の装い？,P"

[[dialogue]]
speaker = "unk"
# 俺とマトイ、梨緒、ジグの４人で機械型モンスターの討伐に出撃した。
line = "俺とマトイ、梨緒、ジグの４人で機械型モンスターの討伐に出撃した。"

[[dialogue]]
speaker = "unk"
# だが──
line = "だが──"

[[dialogue]]
speaker = "モンスター"
# 「グルルゥ！」
line = "「グルルゥ！」"

[[dialogue]]
speaker = "ジグ"
# 「ブラントアングリフ」
line = "「ブラントアングリフ」"

[[dialogue]]
speaker = "モンスター"
# 「グゥゥッ！！？」
line = "「グゥゥッ！！？」"

[[dialogue]]
speaker = "マトイ"
# 「すごい……ジグさんだけで機械型モンスターをほとんど倒しちゃった……」
line = "「すごい……ジグさんだけで機械型モンスターをほとんど倒しちゃった……」"

[[dialogue]]
speaker = "梨緒"
# 「これでも本調子ではないはずだが、元星徒会長の実力は健在ということか……」
line = "「これでも本調子ではないはずだが、元星徒会長の実力は健在ということか……」"

[[dialogue]]
speaker = "unk"
# さすがベガ最強の星騎士
line = "さすがベガ最強の星騎士"

[[dialogue]]
speaker = "ジグ"
# 「魔王である君にそう言われると恐縮だ。確かに最強と呼ばれたことはあるが、君と違って自分の世界は守れなかったからね」
line = "「魔王である君にそう言われると恐縮だ。確かに最強と呼ばれたことはあるが、君と違って自分の世界は守れなかったからね」"

[[dialogue]]
speaker = "ジグ"
# 「まぁ、その“最強”も、星眼あってのものだけど」
line = "「まぁ、その“最強”も、星眼あってのものだけど」"

[[dialogue]]
speaker = "ジグ"
# 「対象の可能性を見る星眼だが、この眼は自分を見ることもできる」
line = "「対象の可能性を見る星眼だが、この眼は自分を見ることもできる」"

[[dialogue]]
speaker = "ジグ"
# 「自分に秘められた可能性を見て、見た通りに限界まで力を伸ばす──」
line = "「自分に秘められた可能性を見て、見た通りに限界まで力を伸ばす──」"

[[dialogue]]
speaker = "ジグ"
# 「つまり私は他の人より圧倒的に容易に、自分の才能を限界まで引き出せる。一種のチートといえるかもしれないね」
line = "「つまり私は他の人より圧倒的に容易に、自分の才能を限界まで引き出せる。一種のチートといえるかもしれないね」"

[[dialogue]]
speaker = "マトイ"
# 「いやでも、可能性を見て実際にできるのってすごいことなんじゃ……私が同じ力を持ってても、使いこなせる気がしないよ……」
line = "「いやでも、可能性を見て実際にできるのってすごいことなんじゃ……私が同じ力を持ってても、使いこなせる気がしないよ……」"

[[dialogue]]
speaker = "梨緒"
# 「だが、どうして今も機械型モンスターが出現するんだ？　あれはリクリエの使徒となったジグが生み出したものだろう？」
line = "「だが、どうして今も機械型モンスターが出現するんだ？　あれはリクリエの使徒となったジグが生み出したものだろう？」"

[[dialogue]]
speaker = "ジグ"
# 「リクリエがあのモンスターを記憶してしまったんだと思う。これからは私に関係なく出現するだろう」
line = "「リクリエがあのモンスターを記憶してしまったんだと思う。これからは私に関係なく出現するだろう」"

[[dialogue]]
speaker = "ジグ"
# 「迷惑をかけてすまないが、私も率先してあのモンスターを駆逐するよ」
line = "「迷惑をかけてすまないが、私も率先してあのモンスターを駆逐するよ」"

[[dialogue]]
speaker = "マトイ"
# 「そっか……機械型モンスターの相手は大変だけど、私も頑張るよ！」
line = "「そっか……機械型モンスターの相手は大変だけど、私も頑張るよ！」"

[[dialogue]]
speaker = "unk"
# （ところで、梨緒とジグの戦闘服って……）
line = "（ところで、梨緒とジグの戦闘服って……）"

[[dialogue]]
speaker = "ジグ"
# 「ん？　こっちを見てどうしたんだい」
line = "「ん？　こっちを見てどうしたんだい」"

[[dialogue]]
speaker = "ジグ"
# 「ああ、私とアガサの戦闘服が気になるのか」
line = "「ああ、私とアガサの戦闘服が気になるのか」"

[[dialogue]]
speaker = "unk"
# ぶふぉっ！？
line = "ぶふぉっ！？"

[[dialogue]]
speaker = "梨緒"
# 「ど、どこを見ている！？　真剣に戦っているのにハレンチだぞ！！」
line = "「ど、どこを見ている！？　真剣に戦っているのにハレンチだぞ！！」"

[[dialogue]]
speaker = "マトイ"
# 「いや確かに、２人とも戦闘服が際どいと思ってたけど……」
line = "「いや確かに、２人とも戦闘服が際どいと思ってたけど……」"

[[dialogue]]
speaker = "梨緒"
# 「マトイまでそう思ってたのか！？」
line = "「マトイまでそう思ってたのか！？」"

[[dialogue]]
speaker = "マトイ"
# 「うん、特に股間のところが……」
line = "「うん、特に股間のところが……」"

[[dialogue]]
speaker = "梨緒"
# 「具体的に言わないでくれ！　余計恥ずかしくなる！」
line = "「具体的に言わないでくれ！　余計恥ずかしくなる！」"

[[dialogue]]
speaker = "ジグ"
# 「私に最適化された戦闘服がこれなのだから仕方ないよ」
line = "「私に最適化された戦闘服がこれなのだから仕方ないよ」"

[[dialogue]]
speaker = "ジグ"
# 「それに私は英雄の家に生まれ、世界を守る騎士として育った。この魔剣バルムンクも騎士の証として先祖代々受け継いできたもの」
line = "「それに私は英雄の家に生まれ、世界を守る騎士として育った。この魔剣バルムンクも騎士の証として先祖代々受け継いできたもの」"

[[dialogue]]
speaker = "ジグ"
# 「<ruby=むこ>無辜</ruby>の人々を守るためならば、衆目があろうとも一糸まとわぬ姿で戦うさ。魔王だってそうだろう？」
line = "「<ruby>無辜<rt>むこ</rt></ruby>の人々を守るためならば、衆目があろうとも一糸まとわぬ姿で戦うさ。魔王だってそうだろう？」"

[[dialogue]]
speaker = "unk"
# それはそうだけど……
line = "それはそうだけど……"

[[dialogue]]
speaker = "ジグ"
# 「むむ……？」
line = "「むむ……？」"

[[dialogue]]
speaker = "ジグ"
# 「私の星眼が、可能性を見てしまった」
line = "「私の星眼が、可能性を見てしまった」"

[[dialogue]]
speaker = "ジグ"
# 「公衆の面前で裸になって、羞恥に震えながら戦う私を、魔王は下卑た視線で見つめて楽しんでいる……」
line = "「公衆の面前で裸になって、羞恥に震えながら戦う私を、魔王は下卑た視線で見つめて楽しんでいる……」"

[[dialogue]]
speaker = "ジグ"
# 「さすが魔王と呼ばれるだけはあるね……」
line = "「さすが魔王と呼ばれるだけはあるね……」"

[[dialogue]]
speaker = "梨緒"
# 「なんて下劣な趣味なんだ！！　やはり星徒会長として認めるわけにはいかない！！」
line = "「なんて下劣な趣味なんだ！！　やはり星徒会長として認めるわけにはいかない！！」"

[[dialogue]]
speaker = "マトイ"
# 「会長、それはひどいよ！」
line = "「会長、それはひどいよ！」"

[[dialogue]]
speaker = "unk"
# ジグが勝手に言ってるだけだから！
line = "ジグが勝手に言ってるだけだから！"

[[dialogue]]
speaker = "ジグ"
# 「ははは、冗談だよ。少なくとも今はそんな可能性は見えていない」
line = "「ははは、冗談だよ。少なくとも今はそんな可能性は見えていない」"

[[dialogue]]
speaker = "マトイ"
# 「ごめん、会長ならありえるかもって思っちゃった……」
line = "「ごめん、会長ならありえるかもって思っちゃった……」"

[[dialogue]]
speaker = "梨緒"
# 「本当に冗談か？　裸で戦う機会があるかはともかく、そのくらいのことは魔王ならやりそうな気がするんだが……」
line = "「本当に冗談か？　裸で戦う機会があるかはともかく、そのくらいのことは魔王ならやりそうな気がするんだが……」"

[[dialogue]]
speaker = "マトイ"
# 「だけどベガ出身の２人の戦闘服がこれってことは、ベガの私もあそこが際どい戦闘服だったのかな……？」
line = "「だけどベガ出身の２人の戦闘服がこれってことは、ベガの私もあそこが際どい戦闘服だったのかな……？」"

[[dialogue]]
speaker = "梨緒"
# 「いや、ベガの君も、戦闘服は今着ているものと同じだったぞ……」
line = "「いや、ベガの君も、戦闘服は今着ているものと同じだったぞ……」"

[[dialogue]]
speaker = "ジグ"
# 「私にとっては今さらだけどね。戦闘服の露出が大きい星騎士なら他にもいるし」
line = "「私にとっては今さらだけどね。戦闘服の露出が大きい星騎士なら他にもいるし」"

[[dialogue]]
speaker = "ジグ"
# 「でも際どさでは、今の新星の学園長には負けるよ」
line = "「でも際どさでは、今の新星の学園長には負けるよ」"

[[dialogue]]
speaker = "マトイ"
# 「確かにベガっぽいよね、シノ学園長の戦闘服……」
line = "「確かにベガっぽいよね、シノ学園長の戦闘服……」"

[[dialogue]]
speaker = "梨緒"
# 「ベガっぽいって何だ！？　風評被害だ！！」
line = "「ベガっぽいって何だ！？　風評被害だ！！」"

[[dialogue]]
speaker = "シノ"
# 「あ、みなさん、ご無事ですか？」
line = "「あ、みなさん、ご無事ですか？」"

[[dialogue]]
speaker = "シノ"
# 「たまたま近くにいたので駆けつけましたが、不要だったようですね」
line = "「たまたま近くにいたので駆けつけましたが、不要だったようですね」"

[[dialogue]]
speaker = "マトイ"
# 「はい、ジグさんが機械型モンスターをみんな倒してくれて……」
line = "「はい、ジグさんが機械型モンスターをみんな倒してくれて……」"

[[dialogue]]
speaker = "マトイ"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "梨緒"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "ジグ"
# 「じー……」
line = "「じー……」"

[[dialogue]]
speaker = "unk"
# じー……
line = "じー……"

[[dialogue]]
speaker = "シノ"
# 「みなさんどうしてそんなに私をじっと見るんですかっ！？」
line = "「みなさんどうしてそんなに私をじっと見るんですかっ！？」"

[[dialogue]]
speaker = "ジグ"
# 「ベガでは、十六夜シノという女性は星騎士になっていなかった」
line = "「ベガでは、十六夜シノという女性は星騎士になっていなかった」"

[[dialogue]]
speaker = "ジグ"
# 「だけど彼女がベガでも星騎士になっていたら、もっとすごいことになっていたかもしれないね……」
line = "「だけど彼女がベガでも星騎士になっていたら、もっとすごいことになっていたかもしれないね……」"

[[dialogue]]
speaker = "マトイ"
# 「ごくっ……」
line = "「ごくっ……」"

[[dialogue]]
speaker = "シノ"
# 「いったい何の話ですか！？　何の想像してるんですか～～っ！？」
line = "「いったい何の話ですか！？　何の想像してるんですか～～っ！？」"

[[dialogue]]
speaker = "unk"
# 確かにベガ出身の２人の戦闘服は際どい。
line = "確かにベガ出身の２人の戦闘服は際どい。"

[[dialogue]]
speaker = "unk"
# だけど上には上がいるということを思い知ったのだった……
line = "だけど上には上がいるということを思い知ったのだった……"
