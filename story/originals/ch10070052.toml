[[dialogue]]
speaker = "unk"
# 第２話,トロンボーン・アート,P
line = "第２話,トロンボーン・アート,P"

[[dialogue]]
speaker = "ルリエル"
# 「ほえ～っ……絵画と音楽って、そんなに密接な関わりがあるのですか！」
line = "「ほえ～っ……絵画と音楽って、そんなに密接な関わりがあるのですか！」"

[[dialogue]]
speaker = "ラファエロ"
# 「その通り。パトロンからは色々な要望があるからね」
line = "「その通り。パトロンからは色々な要望があるからね」"

[[dialogue]]
speaker = "ラファエロ"
# 「妻のピアノ演奏から得たインスピレーションで絵画をおこしてくれ──そんな依頼を請けることもしょっちゅうさ」
line = "「妻のピアノ演奏から得たインスピレーションで絵画をおこしてくれ──そんな依頼を請けることもしょっちゅうさ」"

[[dialogue]]
speaker = "ソフィア"
# 「素敵ですね。藝術家の方とお話する機会なんて滅多にないので、とても新鮮で面白いです」
line = "「素敵ですね。藝術家の方とお話する機会なんて滅多にないので、とても新鮮で面白いです」"

[[dialogue]]
speaker = "ルリエル"
# 「じゃあじゃあ、ルリエルが演奏した曲から、絵を描いてもらうこともできちゃうんですかっ？」
line = "「じゃあじゃあ、ルリエルが演奏した曲から、絵を描いてもらうこともできちゃうんですかっ？」"

[[dialogue]]
speaker = "ラファエロ"
# 「もちろんできるとも。きみはどんな楽器を嗜んでいるんだい？」
line = "「もちろんできるとも。きみはどんな楽器を嗜んでいるんだい？」"

[[dialogue]]
speaker = "ルリエル"
# 「トロンボーンです！　ふっふっふ～♪　腕前、ちょっぴり自信があるのですよ～♪」
line = "「トロンボーンです！　ふっふっふ～♪　腕前、ちょっぴり自信があるのですよ～♪」"

[[dialogue]]
speaker = "ソフィア"
# 「ちょっとルリ。ラファエロさんは本職の藝術家さんだよ。素人の音楽でお願いなんて失礼じゃ……」
line = "「ちょっとルリ。ラファエロさんは本職の藝術家さんだよ。素人の音楽でお願いなんて失礼じゃ……」"

[[dialogue]]
speaker = "ラファエロ"
# 「構わないよ！　それに、音楽の価値は演奏者の技術だけじゃない。どれだけの想いや熱量が込められているかが大切だからね」
line = "「構わないよ！　それに、音楽の価値は演奏者の技術だけじゃない。どれだけの想いや熱量が込められているかが大切だからね」"

[[dialogue]]
speaker = "ラファエロ"
# 「よし！　ルリエル、きみの奏でる調べに、天才であるぼくの絵を載せようじゃないか！」
line = "「よし！　ルリエル、きみの奏でる調べに、天才であるぼくの絵を載せようじゃないか！」"

[[dialogue]]
speaker = "unk"
# 俺も興味があるな
line = "俺も興味があるな"

[[dialogue]]
speaker = "ラファエロ"
# 「もちろん、完成したらこの部屋の一番見栄えのいい場所に飾ってくれるんだよね？」
line = "「もちろん、完成したらこの部屋の一番見栄えのいい場所に飾ってくれるんだよね？」"

[[dialogue]]
speaker = "ルリエル"
# 「はいなのです！　えへへ、フィオナ会長が帰ってきたら、きっとびっくりしちゃいますよ～♪」
line = "「はいなのです！　えへへ、フィオナ会長が帰ってきたら、きっとびっくりしちゃいますよ～♪」"

[[dialogue]]
speaker = "unk"
# そうしてルリエルが、流星寮の自室からトロンボーンを持ってきた。
line = "そうしてルリエルが、流星寮の自室からトロンボーンを持ってきた。"

[[dialogue]]
speaker = "ルリエル"
# （よ～し、せっかくだから聴きごたえのある、かっこいい曲をやっちゃうのです！）
line = "（よ～し、せっかくだから聴きごたえのある、かっこいい曲をやっちゃうのです！）"

[[dialogue]]
speaker = "ルリエル"
# （ちょっと難易度が高いですけど、ばっちりしっかり演奏しちゃいますよ～……！）
line = "（ちょっと難易度が高いですけど、ばっちりしっかり演奏しちゃいますよ～……！）"

[[dialogue]]
speaker = "ルリエル"
# 「それじゃあ始めるのです！」
line = "「それじゃあ始めるのです！」"

[[dialogue]]
speaker = "ルリエル"
# 「ぼぇ～っ♪　ぼえぼえぼえ、ぼえ～っ♪」
line = "「ぼぇ～っ♪　ぼえぼえぼえ、ぼえ～っ♪」"

[[dialogue]]
speaker = "ルリエル"
# （あ、あれ？　ちょっぴり間違っちゃったかも！？　で、でもでも！　ルリエルはめげないのです！）
line = "（あ、あれ？　ちょっぴり間違っちゃったかも！？　で、でもでも！　ルリエルはめげないのです！）"

[[dialogue]]
speaker = "ラファエロ"
# 「…………」
line = "「…………」"

[[dialogue]]
speaker = "ルリエル"
# 「ぼっぼっぼっぼ～♪　ぼえぼえぼえ～っ♪」
line = "「ぼっぼっぼっぼ～♪　ぼえぼえぼえ～っ♪」"

[[dialogue]]
speaker = "ルリエル"
# （あれあれ？　やっぱり選曲、間違っちゃったでしょうか～！？　でも今さら止められないですし～……！！）
line = "（あれあれ？　やっぱり選曲、間違っちゃったでしょうか～！？　でも今さら止められないですし～……！！）"

[[dialogue]]
speaker = "unk"
# ルリエルの演奏に合わせて、ラファエロが即興で筆を走らせていく。
line = "ルリエルの演奏に合わせて、ラファエロが即興で筆を走らせていく。"

[[dialogue]]
speaker = "unk"
# そうして演奏が終わり、しばらくしてから絵画が完成したのだが──
line = "そうして演奏が終わり、しばらくしてから絵画が完成したのだが──"

[[dialogue]]
speaker = "ルリエル"
# 「ふぇええ！？　なんですか、このおどろおどろしい絵は～！？」
line = "「ふぇええ！？　なんですか、このおどろおどろしい絵は～！？」"

[[dialogue]]
speaker = "ソフィア"
# 「素晴らしい絵画であることは、わかるのですが……」
line = "「素晴らしい絵画であることは、わかるのですが……」"

[[dialogue]]
speaker = "unk"
# 色も全体的にどす黒い……
line = "色も全体的にどす黒い……"

[[dialogue]]
speaker = "unk"
# 怪物がたくさん……
line = "怪物がたくさん……"

[[dialogue]]
speaker = "ソフィア"
# 「こ、これがルリの曲に込められたイメージ……？　何か心に闇でも抱えているんですか？」
line = "「こ、これがルリの曲に込められたイメージ……？　何か心に闇でも抱えているんですか？」"

[[dialogue]]
speaker = "ルリエル"
# 「違いますよぉ！？　いったいどんな着想を得たんですか、ラファエロさん！？」
line = "「違いますよぉ！？　いったいどんな着想を得たんですか、ラファエロさん！？」"

[[dialogue]]
speaker = "ラファエロ"
# 「だってきみが演奏したのは、血で血を洗う地獄をテーマにした曲だろう？」
line = "「だってきみが演奏したのは、血で血を洗う地獄をテーマにした曲だろう？」"

[[dialogue]]
speaker = "ルリエル"
# 「違うのです！　旧森羅歴の、リクリエとの決戦で奮戦する、大天使さまたちの勇壮なお姿を表現した曲ですよぉ！？」
line = "「違うのです！　旧森羅歴の、リクリエとの決戦で奮戦する、大天使さまたちの勇壮なお姿を表現した曲ですよぉ！？」"

[[dialogue]]
speaker = "ラファエロ"
# 「戦いの曲か。じゃあやっぱりぼくの解釈は正しかったということだね！」
line = "「戦いの曲か。じゃあやっぱりぼくの解釈は正しかったということだね！」"

[[dialogue]]
speaker = "ラファエロ"
# 「さて。どこに飾ろうか……そうだ！　星徒会長の椅子の後ろの壁、ここがいいんじゃないかな？」
line = "「さて。どこに飾ろうか……そうだ！　星徒会長の椅子の後ろの壁、ここがいいんじゃないかな？」"

[[dialogue]]
speaker = "ルリエル"
# 「こんな迫力満点の絵が飾ってあったら、フィオナ会長がびっくりしちゃいますよ～！！」
line = "「こんな迫力満点の絵が飾ってあったら、フィオナ会長がびっくりしちゃいますよ～！！」"

[[dialogue]]
speaker = "ルリエル"
# 「しょんぼりなのです……フィオナ会長に喜んでもらうつもりだったのに～……」
line = "「しょんぼりなのです……フィオナ会長に喜んでもらうつもりだったのに～……」"

[[dialogue]]
speaker = "unk"
# 選曲が間違ってたのかもね
line = "選曲が間違ってたのかもね"

[[dialogue]]
speaker = "ルリエル"
# 「──あう。やっぱり会長さんにはバレてしまったのです……」
line = "「──あう。やっぱり会長さんにはバレてしまったのです……」"

[[dialogue]]
speaker = "ルリエル"
# 「せっかく星徒会室に飾るならかっこいい絵にして欲しくて、まだ完璧じゃない曲を選んじゃいました……」
line = "「せっかく星徒会室に飾るならかっこいい絵にして欲しくて、まだ完璧じゃない曲を選んじゃいました……」"

[[dialogue]]
speaker = "unk"
# ルリエルも演奏中、不安があったはずだ
line = "ルリエルも演奏中、不安があったはずだ"

[[dialogue]]
speaker = "ルリエル"
# 「ルリエルが慌てたり、焦ったりする気持ちを察知して……ラファエロさんはああいう絵を起こした、ですか？」
line = "「ルリエルが慌てたり、焦ったりする気持ちを察知して……ラファエロさんはああいう絵を起こした、ですか？」"

[[dialogue]]
speaker = "unk"
# ルリエルが一番好きな曲を演奏しよう！
line = "ルリエルが一番好きな曲を演奏しよう！"

[[dialogue]]
speaker = "unk"
# 明日、もう一回頼んでみたら？
line = "明日、もう一回頼んでみたら？"

[[dialogue]]
speaker = "ルリエル"
# 「……そうですね。ラファエロさんなら快く引き受けてくれそうなのです」
line = "「……そうですね。ラファエロさんなら快く引き受けてくれそうなのです」"

[[dialogue]]
speaker = "ルリエル"
# 「わかりました！　それじゃあルリエルの故郷、フィリスティアに伝わる曲を演奏しちゃいます！」
line = "「わかりました！　それじゃあルリエルの故郷、フィリスティアに伝わる曲を演奏しちゃいます！」"

[[dialogue]]
speaker = "ルリエル"
# 「明日のための練習です。会長さん、しっかり聴いててください！」
line = "「明日のための練習です。会長さん、しっかり聴いててください！」"

[[dialogue]]
speaker = "unk"
# そうして、昼間の演奏とは百八十度違う、穏やかで優しい調べの曲が始まった──
line = "そうして、昼間の演奏とは百八十度違う、穏やかで優しい調べの曲が始まった──"

[[dialogue]]
speaker = "ラファエロ"
# 「会長に用事があったんだけれど……なるほど、やはりそうだったのか」
line = "「会長に用事があったんだけれど……なるほど、やはりそうだったのか」"

[[dialogue]]
speaker = "ラファエロ"
# 「……ぼくのために背伸びをして、無茶な難易度の曲を演奏していたんだね」
line = "「……ぼくのために背伸びをして、無茶な難易度の曲を演奏していたんだね」"

[[dialogue]]
speaker = "ラファエロ"
# 「うん──いい曲だ。晴れ渡る青い空。土と草の穏やかな香り。色とりどりの花に、頬を撫でるそよ風……」
line = "「うん──いい曲だ。晴れ渡る青い空。土と草の穏やかな香り。色とりどりの花に、頬を撫でるそよ風……」"

[[dialogue]]
speaker = "ラファエロ"
# 「どんどんインスピレーションが湧いてくるよ、素晴らしい……！」
line = "「どんどんインスピレーションが湧いてくるよ、素晴らしい……！」"

[[dialogue]]
speaker = "ラファエロ"
# 「それじゃ、ぼくもさっそく取り掛かるとしようかな？」
line = "「それじゃ、ぼくもさっそく取り掛かるとしようかな？」"

[[dialogue]]
speaker = "unk"
# 翌日──
line = "翌日──"

[[dialogue]]
speaker = "ルリエル"
# 「あれっ？　壁にある絵が、替わってるのです！？」
line = "「あれっ？　壁にある絵が、替わってるのです！？」"

[[dialogue]]
speaker = "ソフィア"
# 「さっきラファエロさんが来て、取り替えていったんだよ」
line = "「さっきラファエロさんが来て、取り替えていったんだよ」"

[[dialogue]]
speaker = "ルリエル"
# 「はぇえ～、ルリエルの故郷の風景にそっくり……うぅん、それ以上に綺麗なのです！　でも、いったいどうやって……？」
line = "「はぇえ～、ルリエルの故郷の風景にそっくり……うぅん、それ以上に綺麗なのです！　でも、いったいどうやって……？」"

[[dialogue]]
speaker = "ソフィア"
# 「ラファエロさんから伝言も預かってるよ」
line = "「ラファエロさんから伝言も預かってるよ」"

[[dialogue]]
speaker = "ソフィア"
# 「『またアテネスに帰る前に、昨夜のトロンボーンの演奏を聴かせてくれるかい？』とのことです」
line = "「『またアテネスに帰る前に、昨夜のトロンボーンの演奏を聴かせてくれるかい？』とのことです」"

[[dialogue]]
speaker = "ルリエル"
# 「ぁ……！！」
line = "「ぁ……！！」"

[[dialogue]]
speaker = "unk"
# 昨夜の演奏をどこかで聴いていたのだろうか──それだけでここまで美しい絵画を生み出せるだなんて。
line = "昨夜の演奏をどこかで聴いていたのだろうか──それだけでここまで美しい絵画を生み出せるだなんて。"

[[dialogue]]
speaker = "unk"
# 俺たちは改めて、ラファエロの天才ぶりに驚くのだった。
line = "俺たちは改めて、ラファエロの天才ぶりに驚くのだった。"
